s them, and are they available?\" consumes types from this module. The catalog is loaded from TOML files shipped in the `librefang-registry` and merged with user-defined providers at runtime. The types here are intentionally free of I/O or business logic — they are pure data with lightweight helper methods.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TOML[\"providers/*.toml<br/>(catalog files)\"] -->|deserialize| MCF[ModelCatalogFile]\n    MCF -->|provider field| PCT[ProviderCatalogToml]\n    MCF -->|models array| MCE[ModelCatalogEntry]\n    PCT -->|.into()| PI[ProviderInfo]\n    ALIASES[\"aliases.toml\"] -->|deserialize| ACF[AliasesCatalogFile]\n    PI -->|consumed by| RUNTIME[\"librefang-runtime<br/>model_catalog\"]\n    MCE -->|consumed by| RUNTIME\n    MCE -->|consumed by| METERING[\"librefang-kernel-metering\"]\n```\n\n## Key Types\n\n### `ModelTier`\n\nCapability tier classification for models. Serde uses `lowercase` renaming (`\"frontier\"`, `\"smart\"`, etc.).\n\n| Variant | Semantics | Default |\n|---------|-----------|---------|\n| `Frontier` | Most capable, highest cost (e.g. Claude Opus, GPT-4.1) | |\n| `Smart` | Cost-effective intelligence (e.g. Claude Sonnet, Gemini 2.5 Flash) | |\n| `Balanced` | Speed/cost trade-off (e.g. GPT-4o-mini, Groq Llama) | **yes** |\n| `Fast` | Cheapest, fastest for simple tasks | |\n| `Local` | Self-hosted (Ollama, vLLM, LM Studio) | |\n| `Custom` | User-defined at runtime | |\n\n### `AuthStatus`\n\nProvider authentication state, detected at runtime by the catalog loader's `detect_auth()` probe.\n\nThe `is_available()` method returns `true` for states where the provider is usable — `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Notably, `InvalidKey` returns `false` because the key exists but was rejected (HTTP 401/403).\n\nKey states that require careful handling:\n\n- **`LocalOffline`** — Set when a local provider's port is not listening. Unlike `Missing`, `detect_auth()` will not reset this; only a successful probe transitions back to `NotRequired`.\n- **`AutoDetected`** — Key found via a fallback environment variable. Usable but may not match the actual provider; the UI should prompt verification.\n\n### `ModelCatalogEntry`\n\nA single model's metadata. All boolean capability flags default to `false` via `#[serde(default)]`, so community catalog files only need to set capabilities they support.\n\nFields of note:\n- **`provider`** — When empty in a catalog TOML, the runtime loader infers it from the enclosing `[provider].id` section during merge.\n- **`aliases`** — Short names that resolve to this model (e.g. `[\"sonnet\", \"claude-sonnet\"]`).\n- **`input_cost_per_m` / `output_cost_per_m`** — Cost in USD per million tokens, consumed by the metering subsystem.\n\n### `ModelOverrides`\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` — `None` means \"use the agent's or system default.\" The override resolution order is:\n\n1. Agent-level `ModelConfig` (highest priority)\n2. `ModelOverrides` from this file\n3. System defaults\n\nUse `is_empty()` to check whether any overrides are set. The struct uses `#[serde(skip_serializing_if = \"Option::is_none\")]` to keep the persisted file clean.\n\n### `ProviderInfo` vs `ProviderCatalogToml`\n\nTwo structs represent the same provider at different stages:\n\n| | `ProviderCatalogToml` | `ProviderInfo` |\n|---|---|---|\n| **Source** | Parsed directly from `providers/*.toml` | Runtime state after catalog loading |\n| **Runtime fields** | None | `auth_status`, `model_count`, `available_models`, `is_custom`, `proxy_url` |\n| **Conversion** | `ProviderCatalogToml` → `ProviderInfo` via `From` impl | — |\n\nThe `From<ProviderCatalogToml>` conversion initializes runtime fields to safe defaults: `AuthStatus::Missing`, `model_count: 0`, empty `available_models`, `is_custom: false`.\n\nThe `is_custom` flag on `ProviderInfo` controls dashboard behavior — built-in providers (from the registry) can only be deconfigured, not deleted, because registry sync would recreate their TOML on next boot.\n\n### `RegionConfig` and Regional Endpoints\n\nProviders can define regional endpoint overrides in their TOML:\n\n```toml\n[provider.regions.us]\nbase_url = \"https://dashscope-us.aliyuncs.com/compatible-mode/v1\"\napi_key_env = \"DASHSCOPE_US_API_KEY\"  # optional override\n```\n\nEach `RegionConfig` has a `base_url` (required) and an optional `api_key_env` that overrides the provider-level key for that region. At runtime, region selection replaces the provider's `base_url` — if no region is selected, the provider-level URL is used.\n\n### File-Level Structs\n\n**`ModelCatalogFile`** — The top-level deserialization target for a single provider TOML. Contains an optional `[provider]` section and a `[[models]]` array. Community catalog files include the provider section; registry files may omit it.\n\n**`AliasesCatalogFile`** — A separate `aliases.toml` mapping short names to canonical model IDs. Used for global aliases that cross provider boundaries.\n\n## TOML Format Reference\n\nA complete provider catalog file:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\nsignup_url = \"https://console.anthropic.com/settings/keys\"\n\n[provider.regions.eu]\nbase_url = \"https://api-eu.anthropic.com\"\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\nsupports_thinking = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nAn aliases-only file:\n\n```toml\n[aliases]\nsonnet = \"claude-sonnet-4-20250514\"\nhaiku = \"claude-haiku-4-5-20251001\"\n```\n\n## Consumers\n\n- **`librefang-runtime::model_catalog`** — Calls `merge_discovered_models` which produces `ModelCatalogEntry` instances by merging catalog data with live API probe results.\n- **`librefang-kernel-metering`** — Reads `ModelCatalogFile` to look up per-model pricing (`input_cost_per_m`, `output_cost_per_m`) for cost estimation, with a legacy budget-rate fallback when pricing is zero.\n\n## Serde Conventions\n\n- `ModelTier` and `AuthStatus` use `#[serde(rename_all = \"lowercase\")]` and `#[serde(rename_all = \"snake_case\")]` respectively.\n- Boolean fields on `ModelCatalogEntry` use `#[serde(default)]` so they default to `false` when absent from TOML.\n- `ModelOverrides` skips serializing `None` fields to keep the JSON file minimal.\n- `ProviderInfo` skips serializing empty `available_models` vectors.","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types-tests: Agent Form Round-Trip Tests\n\n## Purpose\n\nThis test module verifies that the TOML emitted by the **dashboard's visual agent editor** (TypeScript) can be correctly deserialized by the **kernel's Rust parser** into an `AgentManifest`. Its primary job is to catch **schema drift** between the two implementations before it reaches production.\n\nThe dashboard lives at `crates/librefang-api/dashboard/src/lib/agentManifest.ts`. Any time that serializer's output format changes, one of these tests should fail — signaling that the Rust types in `librefang_types::agent` need to be updated to match, or vice versa.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[Dashboard TS Serializer] -->|emits TOML| B[agent_form_roundtrip tests]\n    B -->|toml::from_str| C[AgentManifest Rust struct]\n    B -.->|mirrors output of| A\n```\n\nThe tests do **not** import or call the TypeScript serializer directly. Instead, each test hard-codes the exact TOML string that the serializer would produce for a given form state. This keeps the test hermetic while still catching drift.\n\n## Test Coverage\n\n### `parses_form_minimum_viable_output`\n\nValidates the smallest valid manifest a user can create — the four required fields plus a model block. If this fails, something fundamental in `AgentManifest`'s required fields has changed.\n\nAsserts on:\n- `name` and `model.provider`, `model.model`\n\n### `parses_form_full_output_with_capabilities_and_resources`\n\nCovers the complete \"basic\" form with all non-advanced sections populated:\n- `tags`, `skills` arrays\n- `model.temperature`, `model.max_tokens`\n- `resources.max_tool_calls_per_minute`, `resources.max_cost_per_hour_usd`\n- `capabilities.network`, `capabilities.shell`, `capabilities.agent_spawn`\n\nThis is the most common real-world manifest shape.\n\n### `parses_form_with_advanced_sections`\n\nExercises every advanced section the form can emit. This is the broadest single test and the most likely to break on schema changes. Fields covered:\n\n| Section | Fields |\n|---|---|\n| Top-level | `priority`, `session_mode`, `web_search_augmentation`, `schedule`, `exec_policy` |\n| `thinking` | `budget_tokens`, `stream_thinking` |\n| `autonomous` | `max_iterations`, `heartbeat_channel` |\n| `routing` | `simple_model`, `medium_model`, `complex_model`, `simple_threshold`, `complex_threshold` |\n| `[[fallback_models]]` | `provider`, `model` (array-of-tables) |\n| `[[context_injection]]` | `name`, `content`, `position` (array-of-tables) |\n| `capabilities` | `memory_read`, `memory_write`, `agent_message`, `ofp_connect` |\n\nKey assertions:\n- Enum variants (`Priority::High`, `SessionMode::New`) resolve correctly from their string representations.\n- Optional sections (`thinking`, `autonomous`, `routing`) deserialize as `Some(...)`.\n- Array-of-tables (`fallback_models`, `context_injection`) parse with correct length and field values.\n\n### `parses_form_response_format_json_schema`\n\nValidates that the `response_format` inline table deserializes into `ResponseFormat::JsonSchema` with the `name` and `strict` fields intact. This is a common pain point because the schema itself is an arbitrary JSON object embedded in TOML.\n\n### `omitting_optional_sections_uses_defaults`\n\nEnsures that a minimal manifest (no `resources`, no `capabilities` blocks) falls back to sane defaults:\n- `capabilities.network` is empty\n- `capabilities.agent_spawn` is `false`\n- `resources.max_llm_tokens_per_hour` is `None` (inherits global default)\n\nIf optional fields stop defaulting correctly, this test catches it.\n\n## Key Types Referenced\n\nAll types come from `librefang_types`:\n\n- **`agent::AgentManifest`** — the top-level struct being deserialized in every test\n- **`agent::Priority`** — enum (`High`, etc.)\n- **`agent::SessionMode`** — enum (`New`, etc.)\n- **`config::ResponseFormat`** — enum with `JsonSchema` variant\n\n## When Tests Fail\n\nA failure here almost always means one of two things:\n\n1. **The Rust types changed** (e.g., a field was renamed or an enum variant was reworded) but the dashboard serializer was not updated. Fix the TypeScript serializer to match.\n2. **The dashboard serializer changed** (e.g., the form now emits a differently-named key) but the Rust types were not updated. Fix the `AgentManifest` struct or its `Deserialize` impl to match.\n\nIn either case, the fix is on one side or the other — the test itself rarely needs to change unless the form gains an entirely new section, in which case add a new test or extend the advanced-sections test.\n\n## Adding a New Test\n\nWhen the dashboard form gains a new field or section:\n\n1. Generate the TOML output from the dashboard for that form state.\n2. Paste it into a new `#[test]` function as a raw string literal.\n3. Parse with `toml::from_str::<AgentManifest>` and assert on the new fields.\n4. Confirm the test passes on the current code, then commit. Future drift will be caught automatically.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nCore type definitions and traits shared across the LibreFang Agent OS ecosystem.\n\n## Purpose\n\nThis crate serves as the foundational type layer for the entire LibreFang project. It defines the canonical data structures, error types, configuration schemas, and trait contracts that all other crates consume. By centralizing these definitions, it ensures type consistency across the agent runtime, communication protocols, and tooling.\n\nThis is a **pure definition crate** — it contains no business logic, no I/O, and no side effects. Other crates depend on it; it depends on nothing within the workspace.\n\n## Role in the Architecture\n\n```\n┌──────────────────────────────────────────────┐\n│           Application / Agent Crate           │\n├──────────────────────────────────────────────┤\n│         Other workspace crates                │\n├──────────────────────────────────────────────┤\n│              librefang-types                  │\n│   (types, traits, errors, config schemas)     │\n├──────────────────────────────────────────────┤\n│         External crate dependencies           │\n└──────────────────────────────────────────────┘\n```\n\nEvery other crate in the workspace imports from `librefang-types` to share a common vocabulary. This eliminates duplicate definitions and guarantees that, for example, an agent ID is always the same `uuid::Uuid`-backed type everywhere it appears.\n\n## Key Areas\n\nThe dependency set reveals several distinct domains this crate covers:\n\n### Identity and Cryptography\n\nBacked by `ed25519-dalek`, `sha2`, `hex`, and `rand`. This crate likely defines types for agent identity keys, message signing, signature verification, and hashing. Agents in the LibreFang system authenticate and verify each other using Ed25519 keypairs.\n\n### Serialization\n\nBacked by `serde` and `serde_json`. All core types derive `Serialize` and `Deserialize`, making them wire-ready for JSON transport, persistent storage, or inter-process communication.\n\n### Identifiers and Timestamps\n\nBacked by `uuid` and `chrono`. Agent IDs, session tokens, task identifiers, and timestamped events all rely on these types. Using `chrono` with `serde` integration ensures consistent datetime serialization across the system.\n\n### Error Handling\n\nBacked by `thiserror`. The crate defines the canonical error enums for the system — agent registration failures, validation errors, protocol mismatches, and so on. Other crates reference these error types rather than defining their own overlapping variants.\n\n### Configuration\n\nBacked by `toml` and `dirs`. The agent configuration file schema lives here, including agent settings, path resolution, and deployment profiles.\n\n### Localization\n\nBacked by `fluent` and `unic-langid`. User-facing messages and log output support multiple languages. The localization types and the fluent bundle loading contracts are defined here so that any crate can produce localized output consistently.\n\n### Validation\n\nBacked by `regex-lite`. Field validation rules — agent name patterns, allowed characters, format constraints — are expressed as types or validation functions that other crates call into.\n\n### Async Trait Contracts\n\nBacked by `async-trait`. Trait definitions for async-capable interfaces — message handlers, transport layers, storage backends — are declared here so that implementations across different crates remain interchangeable.\n\n## Usage\n\nAdd to your crate's `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-types = { path = \"../librefang-types\" }\n```\n\nThen import the types you need:\n\n```rust\nuse librefang_types::AgentId;\nuse librefang_types::error::AgentError;\nuse librefang_types::config::AgentConfig;\n```\n\n## Testing\n\nThe dev-dependency on `rmp-serde` indicates that some types are tested for MessagePack serialization round-trips, even though MessagePack is not a runtime dependency. This verifies that the type definitions remain compatible with binary serialization formats used elsewhere in the system.","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer for the LibreFang Protocol (OFP). Handles message framing, authenticated transport, and session management between LibreFang agents over the network.\n\n## Overview\n\n`librefang-wire` sits between the raw async I/O provided by `tokio` and the higher-level agent logic. It is responsible for:\n\n- **Message framing** — serializing outbound messages and deserializing inbound bytes into typed OFP messages using `serde_json`.\n- **HMAC-based authentication** — every message carries an HMAC-SHA256 signature; verification uses constant-time comparison (`subtle`) to prevent timing attacks.\n- **Session tracking** — concurrent session state is maintained in a `DashMap`, keyed by `Uuid`.\n- **Transport abstraction** — an async trait (via `async-trait`) defines the transport contract, allowing different I/O backends (TCP, TLS, WebSocket, etc.) to plug in without changing protocol logic.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[Agent Logic] -->|send / receive| B[librefang-wire]\n    B -->|serde_json| C[OFP Message Frames]\n    B -->|hmac + sha2| D[HMAC-SHA256 Sign/Verify]\n    B -->|dashmap| E[Session Registry]\n    B -->|async-trait Transport| F[I/O Backend]\n    F --> G[tokio TcpStream / TLS / …]\n```\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role in `librefang-wire` |\n|---|---|\n| `librefang-types` | Shared message enums, structs, and protocol constants that define the OFP wire format. |\n| `tokio` | Async runtime backing all I/O and timer operations. |\n| `serde` / `serde_json` | Serialization of OFP messages to JSON frames and deserialization of incoming frames. |\n| `uuid` | Unique session and message identifiers. |\n| `chrono` | Timestamps embedded in protocol messages for replay-protection and logging. |\n| `hmac` / `sha2` / `hex` | HMAC-SHA256 computation for message authentication; `hex` for encoding MACs in the wire format. |\n| `subtle` | Constant-time comparison during HMAC verification. |\n| `rand` | Generation of nonces, challenges, and random session tokens. |\n| `dashmap` | Lock-free concurrent map for tracking active sessions across tasks. |\n| `thiserror` | Ergonomic error types for protocol and transport failures. |\n| `tracing` | Structured logging of connection lifecycle and protocol events. |\n| `async-trait` | Trait definition for the pluggable transport layer. |\n\n## Core Concepts\n\n### Wire Format\n\nMessages are framed as length-prefixed JSON. Each frame consists of:\n\n1. A 4-byte big-endian length header.\n2. A JSON payload containing the OFP message body and an HMAC field.\n\nThe exact message types are defined in `librefang-types`. This crate consumes those types and handles the mechanics of getting them onto and off of the network.\n\n### Authentication\n\nEvery outbound message is signed with a pre-shared key using HMAC-SHA256. On the receiving side, the HMAC is recomputed and compared using `subtle::ConstantTimeEq`, ensuring that timing side-channels cannot be used to forge messages.\n\n**Shared secrets** are expected to be provided by the caller (typically loaded from agent configuration). This crate does not manage key storage or rotation.\n\n### Session Management\n\n`DashMap` provides a sharded, concurrent hashmap for storing session state. Each session is identified by a `Uuid` and tracks:\n\n- The remote agent identity.\n- The transport handle for sending replies.\n- Session-level metadata (creation time via `chrono`, negotiated parameters, etc.).\n\nBecause multiple `tokio` tasks may read and write session data simultaneously, `DashMap` avoids lock contention that a standard `Mutex<HashMap>` would introduce.\n\n### Transport Abstraction\n\nThe `Transport` trait (annotated with `#[async_trait]`) defines the I/O boundary:\n\n```rust\n#[async_trait]\npub trait Transport: Send + Sync {\n    async fn send(&self, data: &[u8]) -> Result<(), WireError>;\n    async fn recv(&self, buf: &mut [u8]) -> Result<usize, WireError>;\n    async fn close(&self) -> Result<(), WireError>;\n}\n```\n\nThis allows the protocol logic to remain transport-agnostic. Concrete implementations wrap `tokio::net::TcpStream`, TLS streams, or any other byte-oriented async source.\n\n## Error Handling\n\nErrors are consolidated into a `WireError` enum (derived via `thiserror`) covering:\n\n- **Framing errors** — malformed length headers, truncated frames.\n- **Serialization errors** — invalid JSON payloads.\n- **Authentication errors** — missing or invalid HMAC.\n- **Transport errors** — I/O failures from the underlying transport.\n- **Session errors** — unknown session IDs, expired sessions.\n\nAll errors implement `std::error::Error` and integrate with `tracing` for structured diagnostic output.\n\n## Testing\n\nTests use `tokio-test` for deterministic async test harnesses. When adding tests:\n\n- Use random keys from `rand` for HMAC test vectors—do not hard-code production secrets.\n- Verify both the happy path and authentication failure cases (tampered messages, wrong keys).\n- Test concurrent session insertions and lookups to exercise `DashMap` under contention.\n\n## Relationship to Other Crates\n\n```\nlibrefang-types  ← defines the message types this crate serializes\nlibrefang-wire   ← you are here\n(agent crates)   ← consume this crate to communicate over OFP\n```\n\n`librefang-wire` depends only on `librefang-types` from the workspace. Higher-level agent binaries depend on `librefang-wire` to obtain a ready-to-use networking stack without touching raw sockets or framing logic.","other":"# Other\n\n# Other — Supporting Crates & Infrastructure\n\nThis module group contains the crates that form the LibreFang Agent OS — a platform for running, managing, and communicating with autonomous AI agents. Everything from core type definitions to the desktop application lives here.\n\n## Architecture\n\nThe crates form a layered system with clear dependency flow:\n\n```mermaid\ngraph TD\n    subgraph \"User-Facing\"\n        CLI[librefang-cli]\n        DESK[librefang-desktop]\n        DASH[librefang-api-dashboard]\n    end\n\n    subgraph \"API Layer\"\n        API[librefang-api]\n        APILOGIN[librefang-api-src]\n        APILOCALE[librefang-api-static]\n        APITEST[librefang-api-tests]\n    end\n\n    subgraph \"Core\"\n        KERNEL[librefang-kernel]\n        KHANDLE[librefang-kernel-handle]\n        KROUTE[librefang-kernel-router]\n        KMETER[librefang-kernel-metering]\n    end\n\n    subgraph \"Runtime\"\n        RT[librefang-runtime]\n        RTWASM[librefang-runtime-wasm]\n        RTMCP[librefang-runtime-mcp]\n        RTOAUTH[librefang-runtime-oauth]\n    end\n\n    subgraph \"LLM\"\n        LLMD[librefang-llm-driver]\n        LLMDR[librefang-llm-drivers]\n    end\n\n    subgraph \"Channels & Networking\"\n        CH[librefang-channels]\n        WIRE[librefang-wire]\n    end\n\n    subgraph \"Storage & Extensions\"\n        MEM[librefang-memory]\n        EXT[librefang-extensions]\n        HANDS[librefang-hands]\n        MIG[librefang-migrate]\n    end\n\n    subgraph \"Foundation\"\n        TYPES[librefang-types]\n        HTTP[librefang-http]\n        TELE[librefang-telemetry]\n        TEST[librefang-testing]\n    end\n\n    CLI --> KERNEL\n    CLI --> API\n    DESK --> KERNEL\n    DESK --> API\n    DASH --> API\n\n    API --> KERNEL\n    API --> RT\n    API --> MEM\n    API --> CH\n\n    KERNEL --> KHANDLE\n    KERNEL --> KROUTE\n    KERNEL --> KMETER\n    KERNEL --> MEM\n    KERNEL --> RT\n\n    RT --> RTWASM\n    RT --> RTMCP\n    RT --> RTOAUTH\n    RT --> LLMD\n\n    LLMDR --> LLMD\n    LLMDR --> HTTP\n    CH --> HTTP\n    WIRE --> HTTP\n\n    EXT --> TYPES\n    HANDS --> TYPES\n    TEST --> TYPES\n\n    style TYPES fill:#e8f5e9,stroke:#388e3c\n    style KERNEL fill:#e3f2fd,stroke:#1976d2\n    style API fill:#fce4ec,stroke:#c62828\n```\n\n## Key Layers\n\n### Foundation — [librefang-types](librefang-types.md), [librefang-http](librefang-http.md), [librefang-telemetry](librefang-telemetry.md), [librefang-testing](librefang-testing.md)\n\n[librefang-types](librefang-types.md) is the bedrock: pure data definitions with no I/O or logic, consumed by every other crate. [librefang-http](librefang-http.md) centralizes TLS and proxy configuration so all outbound HTTP calls behave consistently. [librefang-telemetry](librefang-telemetry.md) provides shared metric names and labels. [librefang-testing](librefang-testing.md) supplies mock kernels and LLM drivers used across integration test suites.\n\n### Core — [librefang-kernel](librefang-kernel.md)\n\nThe central orchestrator. It wires together subsystems without implementing domain logic itself. The kernel depends on three specialized sub-crates: [librefang-kernel-handle](librefang-kernel-handle.md) defines the `KernelHandle` trait for in-process callers, [librefang-kernel-router](librefang-kernel-router.md) resolves which Hand and template apply to incoming input, and [librefang-kernel-metering](librefang-kernel-metering.md) enforces resource quotas during execution.\n\n### Runtime — [librefang-runtime](librefang-runtime.md)\n\nCoordinates the agent lifecycle: LLM invocation, skill execution, memory persistence, and channel communication. It re-exports three sibling crates — [librefang-runtime-wasm](librefang-runtime-wasm.md) for sandboxed WASM skill execution via wasmtime, [librefang-runtime-mcp](librefang-runtime-mcp.md) for MCP tool discovery and invocation, and [librefang-runtime-oauth](librefang-runtime-oauth.md) for OAuth 2.0 token flows with providers like OpenAI and GitHub Copilot.\n\n### LLM — [librefang-llm-driver](librefang-llm-driver.md) → [librefang-llm-drivers](librefang-llm-drivers.md)\n\nA trait/provider split. [librefang-llm-driver](librefang-llm-driver.md) defines the `LlmDriver` contract; [librefang-llm-drivers](librefang-llm-drivers.md) implements it for Anthropic, OpenAI, Gemini, and others, handling wire protocols and SSE streaming.\n\n### Channels & Networking — [librefang-channels](librefang-channels.md), [librefang-wire](librefang-wire.md)\n\n[librefang-channels](librefang-channels.md) provides a unified async interface over 40+ messaging platforms, each selectable as a compile-time feature. [librefang-wire](librefang-wire.md) handles agent-to-agent networking over the LibreFang Protocol (OFP) with HMAC authentication and session management.\n\n### API & Dashboard — [librefang-api](librefang-api.md), [librefang-api-dashboard](librefang-api-dashboard.md)\n\n[librefang-api](librefang-api.md) is an Axum-based HTTP/WebSocket server exposing the daemon's capabilities. It embeds [librefang-api-dashboard](librefang-api-dashboard.md), a React 19 SPA using TanStack Router and Query for agent management. Supporting pieces include the self-contained [login page](librefang-api-src.md) with TOTP support, and [static locale data](librefang-api-static.md) for i18n.\n\n### User Interfaces — [librefang-cli](librefang-cli.md), [librefang-desktop](librefang-desktop.md)\n\nTwo entry points for human users. [librefang-cli](librefang-cli.md) produces the `librefang` binary — the primary command-line tool, backed by [Fluent-based locale files](librefang-cli-locales.md) and [TOML config templates](librefang-cli-templates.md). [librefang-desktop](librefang-desktop.md) is a Tauri 2.0 native app bundling the API server with a system tray, auto-updater, and platform installers.\n\n### Storage & Capabilities — [librefang-memory](librefang-memory.md), [librefang-hands](librefang-hands.md), [librefang-extensions](librefang-extensions.md)\n\n[librefang-memory](librefang-memory.md) provides the persistence substrate for conversation history and state. [librefang-hands](librefang-hands.md) defines composable capability packages that can be assigned to agents. [librefang-extensions](librefang-extensions.md) adds MCP server setup, an encrypted credential vault, and OAuth2 PKCE flows.\n\n### Migration — [librefang-migrate](librefang-migrate.md)\n\nConverts agent definitions and configurations from other frameworks (JSON, YAML, TOML) into LibreFang-native types.\n\n## Key Cross-Module Workflows\n\n**Agent message cycle:** A message arrives via [librefang-channels](librefang-channels.md) → [librefang-kernel](librefang-kernel.md) routes it through [librefang-kernel-router](librefang-kernel-router.md) → [librefang-runtime](librefang-runtime.md) invokes an LLM via [librefang-llm-drivers](librefang-llm-drivers.md), possibly executing WASM skills through [librefang-runtime-wasm](librefang-runtime-wasm.md) or MCP tools through [librefang-runtime-mcp](librefang-runtime-mcp.md) → results are persisted to [librefang-memory](librefang-memory.md) and sent back through channels.\n\n**Dashboard control flow:** The React SPA in [librefang-api-dashboard](librefang-api-dashboard.md) calls [librefang-api](librefang-api.md) endpoints → the API delegates to [librefang-kernel](librefang-kernel.md) → the kernel orchestrates the appropriate subsystems → telemetry flows to [librefang-telemetry](librefang-telemetry.md).\n\n**Cross-session isolation:** [librefang-memory](librefang-memory.md) tags every `CanonicalEntry` with its originating `SessionId`, preventing data leaks between concurrent chats — a behavior guarded by dedicated [memory integration tests](librefang-memory-tests.md).\n\n**Type safety across language boundaries:** [librefang-types](librefang-types.md) defines the canonical schema; [round-trip tests](librefang-types-tests.md) verify that TOML emitted by the TypeScript dashboard deserializes correctly in Rust, catching schema drift before production.","overview":"# crates — Wiki\n\n# LibreFang Agent OS\n\nWelcome to **LibreFang** — an open-source platform for building, running, and managing autonomous AI agents. LibreFang connects your agents to 40+ messaging platforms (Telegram, Discord, Slack, WhatsApp, and more), gives them persistent memory, pluggable skills, Model Context Protocol integrations, and a full web dashboard for management and monitoring.\n\n## Architecture at a Glance\n\n```mermaid\ngraph TD\n    UI[\"User Interfaces<br/>CLI · Desktop · Dashboard\"]\n    CHANNELS[\"Channel Adapters<br/>Telegram · Discord · WhatsApp\"]\n    API[\"API Server\"]\n    KERNEL[\"Agent Kernel\"]\n    RUNTIME[\"Agent Runtime\"]\n    LLM[\"LLM Drivers\"]\n    MEMORY[\"Memory System\"]\n    SKILLS[\"Skills & Extensions\"]\n    PEER[\"P2P Networking\"]\n\n    UI --> API\n    CHANNELS --> API\n    CHANNELS --> KERNEL\n    API --> KERNEL\n    KERNEL --> RUNTIME\n    RUNTIME --> LLM\n    RUNTIME --> MEMORY\n    RUNTIME --> SKILLS\n    PEER --> KERNEL\n```\n\n## How It All Fits Together\n\n### User-Facing Interfaces\n\nUsers interact with LibreFang through several entry points, all converging on the same backend:\n\n- The **[Dashboard Frontend](librefang-api-dashboard-src.md)** — a React SPA for chatting with agents, managing workflows, and configuring the system through a browser\n- The **[CLI & TUI](librefang-cli-src.md)** — a feature-rich command-line tool with 40+ subcommands and an interactive terminal UI launcher\n- The **[Desktop Application](librefang-desktop-src.md)** — a native Tauri 2.0 app with system tray integration, auto-updates, and both local and remote server modes\n- **[Channel Adapters](librefang-channels-src.md)** — direct platform connections that route messages from Telegram, Discord, Slack, WhatsApp, Bluesky, webhooks, and many more into the system\n\n### The Core Engine\n\nThe **[Agent Kernel](librefang-kernel-src.md)** is the central orchestrator. It handles authentication, approval gating, workflow DAG execution, triggers, and message routing to the right specialist agent. Every request passes through the kernel before reaching an agent.\n\nThe kernel delegates the actual agent turn to the **[Agent Runtime](librefang-runtime-src.md)**, which manages the full lifecycle: receiving a user message, filtering PII, recalling relevant memories, calling the LLM, executing tool calls, persisting results, and extracting new memories. The runtime also implements the A2A (Agent-to-Agent) protocol for cross-framework interoperability.\n\nLLM communication flows through the **[LLM Drivers](librefang-llm-driver-src.md)** layer — a provider-agnostic trait interface with concrete backends for OpenAI, Anthropic, local models, and 15+ other providers, all with streaming support.\n\n### Agent Capabilities\n\nAgents are extended through two complementary systems:\n\n- The **[Skills Framework](librefang-skills-src.md)** manages the full lifecycle of skills — discovery from ClawHub, installation, configuration, and even agent-driven autonomous evolution. Skills are self-contained packages of prompts, tools, and configuration.\n- **[Extensions & MCP](librefang-extensions-src.md)** provides Model Context Protocol integration: catalog browsing, credential vaulting, OAuth PKCE flows, and a standardized client runtime for tool discovery and execution.\n\nFor autonomous background work, the **[Hands System](librefang-hands-src.md)** offers pre-built, domain-complete agent packages. Users activate a Hand and check in on progress rather than conversing directly — each Hand spawns and manages its own agents.\n\n### Persistence & Multi-Node Networking\n\nThe **[Memory System](librefang-memory-src.md)** gives agents persistent recall across three storage layers: structured key-value, semantic vector search, and a knowledge graph — all backed by SQLite with optional external vector databases.\n\nFor distributed deployments, the **[P2P Networking](librefang-wire-src.md)** module (OFP — the LibreFang Wire Protocol) enables TCP-based peer discovery, HMAC-SHA256 authenticated messaging, and cross-kernel agent routing so multiple machines can share an agent pool.\n\n### Foundation Layer\n\nEverything rests on shared infrastructure and type definitions. The **[Shared Types](librefang-types-src.md)** crate defines the canonical data structures used across every module — serialization-stable, dependency-light, and never pulling in async runtimes. Beneath that, **[Infrastructure & Utilities](librefang-testing-src.md)** provides HTTP client factories, OAuth 2.0 flows, WASM sandboxing, telemetry, workspace migration, and test tooling.\n\n## Key End-to-End Flow\n\nWhen a user sends a message through a channel like Telegram:\n\n1. The **Channel Adapter** receives and sanitizes the incoming message\n2. The adapter forwards it through the channel bridge to the **Agent Kernel**\n3. The kernel authenticates the user, checks permissions, and routes to the correct agent\n4. The **Agent Runtime** takes over: filters PII, recalls relevant **memories**, loads applicable **skills**\n5. The runtime calls the **LLM** through the driver layer, processing the streaming response\n6. Any tool calls are executed, results persisted, and new memories extracted\n7. The response flows back: runtime → kernel → channel bridge → adapter → user\n\nThe same flow works identically through the dashboard, CLI, or desktop app — they all communicate through the **API Server**, which orchestrates the kernel and runtime on behalf of the frontend.","p2p-networking":"# P2P Networking\n\n# P2P Networking (`librefang-wire`)\n\n## Overview\n\nThe wire protocol module implements **OFP** (LibreFang Wire Protocol) — the networking layer that allows multiple LibreFang kernels to discover, authenticate, and communicate with each other over TCP. Each kernel exposes its local agents to remote peers and can route messages to agents on other machines.\n\nAll communication uses JSON-framed messages with a 4-byte big-endian length prefix, protected by HMAC-SHA256 authentication at both the handshake and per-message levels.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Local Kernel\"\n        PH[PeerHandle trait]\n        LA[Local Agents]\n    end\n    subgraph \"PeerNode\"\n        AL[Accept Loop]\n        CL[Connection Loop]\n        NT[NonceTracker]\n    end\n    subgraph \"PeerRegistry\"\n        PE1[PeerEntry: node-1]\n        PE2[PeerEntry: node-2]\n    end\n    subgraph \"Remote Kernel\"\n        RP[Remote PeerNode]\n        RA[Remote Agents]\n    end\n\n    AL -->|handshake| CL\n    CL -->|route request| PH\n    PH -->|agent response| CL\n    CL -->|send response| RP\n    RP -->|incoming connection| AL\n    CL -->|update| PeerRegistry\n    PH --> LA\n    RP --> RA\n```\n\n## Wire Protocol\n\n### Framing\n\nEvery message on the wire uses the same frame format:\n\n```\n[4 bytes: big-endian length of JSON body][JSON body]\n```\n\nAfter the handshake completes, the frame format changes to include a per-message HMAC:\n\n```\n[4 bytes: big-endian length][JSON body][64 bytes: hex-encoded HMAC-SHA256]\n```\n\nThe maximum message size is 16 MB (`MAX_MESSAGE_SIZE`).\n\n### Encoding/Decoding\n\n| Function | Purpose |\n|----------|---------|\n| `encode_message` | Serializes a `WireMessage` to length-prefixed JSON bytes |\n| `decode_length` | Reads the 4-byte length header |\n| `decode_message` | Parses JSON bytes into a `WireMessage` |\n| `write_message` | Async write of a framed message to a TCP stream |\n| `read_message` | Async read of a framed message from a TCP stream |\n| `write_message_authenticated` | Writes a message with appended HMAC |\n| `read_message_authenticated` | Reads and verifies an HMAC-authenticated message |\n\n### Message Types\n\nAll messages are wrapped in a `WireMessage` envelope containing a unique `id` and a `WireMessageKind`:\n\n**Requests** (`WireRequest` — expect a response):\n\n| Variant | Method Tag | Purpose |\n|---------|-----------|---------|\n| `Handshake` | `\"handshake\"` | Exchange identity, agents, and HMAC authentication |\n| `Discover` | `\"discover\"` | Search for agents matching a query on the remote peer |\n| `AgentMessage` | `\"agent_message\"` | Send a message to a specific remote agent |\n| `Ping` | `\"ping\"` | Liveness check |\n\n**Responses** (`WireResponse`):\n\n| Variant | Method Tag | Purpose |\n|---------|-----------|---------|\n| `HandshakeAck` | `\"handshake_ack\"` | Acknowledges handshake, includes own identity and HMAC |\n| `DiscoverResult` | `\"discover_result\"` | Returns matching agents |\n| `AgentResponse` | `\"agent_response\"` | Returns the agent's reply text |\n| `Pong` | `\"pong\"` | Responds to ping with uptime |\n| `Error` | `\"error\"` | Error with code and message |\n\n**Notifications** (`WireNotification` — one-way, no response):\n\n| Variant | Event Tag | Purpose |\n|---------|----------|---------|\n| `AgentSpawned` | `\"agent_spawned\"` | A new agent is available on the peer |\n| `AgentTerminated` | `\"agent_terminated\"` | An agent was shut down |\n| `ShuttingDown` | `\"shutting_down\"` | Peer is going offline |\n\nThe current protocol version is `PROTOCOL_VERSION = 1`.\n\n## Authentication & Security\n\nOFP enforces authentication at two levels: **handshake** and **per-message**.\n\n### Handshake Authentication\n\nEvery connection must begin with a `Handshake` request. The handshake includes:\n\n- A random UUID **nonce** (single-use)\n- An **HMAC-SHA256** signature: `HMAC(shared_secret, nonce + node_id)`\n\nThe responder verifies the HMAC using constant-time comparison, checks the nonce against the `NonceTracker` to prevent replay attacks, and replies with a `HandshakeAck` containing its own nonce and HMAC.\n\n**Any message sent before completing the handshake is rejected with error code 401** — this includes `Ping`, `Discover`, and `AgentMessage`.\n\n### Nonce Replay Protection\n\n`NonceTracker` prevents replay attacks using:\n\n- A `DashMap` storing seen nonces with their insertion timestamps\n- A 5-minute garbage-collection window (expired nonces are pruned on each insertion)\n- Atomic `check_and_record` using `DashMap::entry` to avoid TOCTOU races — even under concurrent access, only one caller can claim a given nonce\n- A hard cap of 100,000 entries to prevent unbounded memory growth under flooding attacks (rejects new nonces at capacity rather than growing indefinitely)\n\n### Session Key Derivation\n\nAfter the handshake, both peers derive a per-session key:\n\n```\nsession_key = HMAC-SHA256(shared_secret, our_nonce + their_nonce)\n```\n\nThe order of nonces matters — caller uses `(our_nonce, their_nonce)`, responder uses `(their_nonce, our_nonce)`. This ensures each connection gets a unique key even when the shared secret is the same.\n\n### Per-Message HMAC\n\nAll post-handshake messages are signed with the session key. The HMAC is appended as 64 hex characters after the JSON body. On receive, the HMAC is verified before parsing — tampered or forged messages are rejected.\n\n## Key Components\n\n### `PeerNode`\n\nThe core networking actor. Created via `PeerNode::start`, which:\n\n1. Binds a `TcpListener` to the configured address\n2. Validates that `shared_secret` is non-empty (refuses to start without it)\n3. Spawns an accept loop task\n4. Returns `(Arc<PeerNode>, JoinHandle<()>)`\n\n**Key methods:**\n\n| Method | Description |\n|--------|-------------|\n| `start(config, registry, handle)` | Creates and starts the node listening for connections |\n| `local_addr()` | Returns the actual bound address (useful when binding to port 0) |\n| `node_id()` | Returns this node's unique ID |\n| `registry()` | Access the `PeerRegistry` |\n| `connect_to_peer(addr, handle)` | Initiates an outbound connection with full HMAC handshake |\n| `send_to_peer(node_id, agent, message, sender, handle)` | Opens a new authenticated connection to a known peer, sends an agent message, and returns the response |\n\n`send_to_peer` performs a full handshake on a fresh TCP connection for each call. This ensures authentication is never skipped.\n\n### `PeerConfig`\n\n| Field | Type | Default | Description |\n|-------|------|---------|-------------|\n| `listen_addr` | `SocketAddr` | `\"127.0.0.1:0\"` | Address to bind the listener |\n| `node_id` | `String` | Random UUID | Unique node identifier |\n| `node_name` | `String` | `\"librefang-node\"` | Human-readable name |\n| `shared_secret` | `String` | `\"\"` (must be set) | Pre-shared key for HMAC auth |\n\n### `PeerHandle` Trait\n\nThe kernel implements this trait to wire the networking layer into the agent system:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\n- `local_agents` — returns agents advertised during handshake and discovery\n- `handle_agent_message` — routes an incoming remote message to a local agent and returns its response\n- `discover_agents` — searches local agents by name, tags, or description\n- `uptime_secs` — provides uptime for pong responses\n\n### `PeerRegistry`\n\nThread-safe registry (internally `Arc<RwLock<HashMap<String, PeerEntry>>>`) tracking all known peers. Shared between the accept loop, connection loops, and the rest of the application.\n\n**Peer lifecycle methods:**\n\n| Method | Description |\n|--------|-------------|\n| `add_peer(entry)` | Register/update a peer after successful handshake |\n| `remove_peer(node_id)` | Remove a peer entirely |\n| `mark_disconnected(node_id)` | Mark as disconnected (kept for reconnect potential) |\n| `mark_connected(node_id)` | Restore a disconnected peer |\n\n**Agent tracking:**\n\n| Method | Description |\n|--------|-------------|\n| `update_agents(node_id, agents)` | Replace the full agent list for a peer |\n| `add_agent(node_id, agent)` | Add or update a single agent (by ID) |\n| `remove_agent(node_id, agent_id)` | Remove a specific agent |\n\n**Query methods:**\n\n| Method | Description |\n|--------|-------------|\n| `get_peer(node_id)` | Snapshot of a specific peer |\n| `connected_peers()` | All peers in `Connected` state |\n| `all_peers()` | All peers regardless of state |\n| `find_agents(query)` | Case-insensitive search across connected peers' agents (matches name, tags, description) |\n| `all_remote_agents()` | Every agent on every connected peer |\n| `connected_count()` / `total_count()` | Counts |\n\n`find_agents` skips disconnected peers — only agents on actively connected peers appear in results.\n\n### `PeerEntry`\n\nStores per-peer state:\n\n| Field | Description |\n|-------|-------------|\n| `node_id` | Unique node identifier |\n| `node_name` | Human-readable name |\n| `address` | Socket address |\n| `agents` | Advertised `Vec<RemoteAgentInfo>` |\n| `state` | `PeerState::Connected` or `PeerState::Disconnected` |\n| `connected_at` | Timestamp of first connection |\n| `protocol_version` | Negotiated during handshake |\n\n## Connection Lifecycle\n\n```mermaid\nsequenceDiagram\n    participant C as Client PeerNode\n    participant S as Server PeerNode\n\n    C->>S: TCP connect\n    C->>S: Handshake {node_id, nonce, auth_hmac, agents}\n    S->>S: verify HMAC, check nonce replay\n    S->>C: HandshakeAck {node_id, nonce, auth_hmac, agents}\n    C->>C: verify HMAC, check nonce replay\n    C->>C: derive session_key\n    S->>S: derive session_key\n\n    loop Message exchange (per-message HMAC)\n        C->>S: AgentMessage {agent, message} + HMAC\n        S->>S: verify HMAC\n        S->>S: route to local agent via PeerHandle\n        S->>C: AgentResponse {text} + HMAC\n        C->>C: verify HMAC\n    end\n\n    C->>S: ShuttingDown notification\n    S->>S: mark_disconnected\n```\n\n### Outbound Connection (`connect_to_peer`)\n\n1. Open TCP connection to the remote address\n2. Generate a UUID nonce, compute `HMAC(shared_secret, nonce + node_id)`\n3. Send `Handshake` request with identity, agents, nonce, and HMAC\n4. Read `HandshakeAck`, verify protocol version, check nonce replay, verify HMAC\n5. Derive session key, register peer in `PeerRegistry`\n6. Spawn a background task running `connection_loop` for ongoing message dispatch\n7. When the loop exits (connection closed or error), mark the peer as disconnected\n\n### Inbound Connection (`handle_inbound`)\n\n1. Read the first message — **must** be a `Handshake` request\n2. Verify protocol version, check nonce replay, verify HMAC\n3. Generate own nonce and HMAC, send `HandshakeAck`\n4. Derive session key, register peer in `PeerRegistry`\n5. Enter `connection_loop` for the authenticated session\n6. Any non-handshake first message receives a 401 error and the connection is dropped\n\n### Sending a One-Shot Message (`send_to_peer`)\n\nFor request-response patterns, `send_to_peer` handles the full lifecycle on a fresh connection:\n\n1. Look up the peer's address from `PeerRegistry`\n2. Connect, handshake, derive session key\n3. Send the `AgentMessage` with per-message HMAC\n4. Read and verify the response HMAC\n5. Return the agent's response text or an error\n\n### Broadcasting Notifications\n\n`broadcast_notification` sends a one-way notification to all connected peers. Each recipient gets a fresh connection with a per-message key derived from the shared secret and a unique nonce. Returns a list of `(node_id, WireError)` tuples for any peers that failed to receive the notification.\n\n## Error Handling\n\n`WireError` covers all failure modes:\n\n| Variant | When |\n|---------|------|\n| `Io` | TCP read/write failures |\n| `Json` | Message serialization/deserialization errors |\n| `HandshakeFailed` | HMAC verification failure, nonce replay, missing shared secret, unexpected message order |\n| `ConnectionClosed` | Remote end disconnected (EOF) |\n| `MessageTooLarge` | Message exceeds 16 MB limit |\n| `VersionMismatch` | Protocol version disagreement between peers |\n\n## Integration with the Kernel\n\nThe wire module connects to the rest of the application through two interfaces:\n\n**Input (from the kernel):**\n- The kernel creates a `PeerConfig` and calls `PeerNode::start`, passing a `PeerHandle` implementation\n- `PeerHandle.handle_agent_message` is called when a remote peer sends a message to a local agent\n\n**Output (from the wire module):**\n- `PeerNode::registry()` exposes the `PeerRegistry`, which other parts of the system query for peer status and agent discovery\n- Routes like `network_status` and `list_peers` read from `registry()` and `connected_count()`\n- WebSocket handlers call `all_peers()` to report network state to the frontend\n\n## Configuration\n\nIn `config.toml`, set the `[network]` section:\n\n```toml\n[network]\nshared_secret = \"your-secret-key-here\"   # Required — node will refuse to start without it\nlisten_addr = \"0.0.0.0:7070\"             # Optional, defaults to 127.0.0.1:0\n```","shared-types":"# Shared Types\n\n# Shared Types (`librefang-types`)\n\nThe `librefang-types` crate defines the canonical data structures shared across the LibreFang agent OS. Every other crate — the kernel, runtime, channels, API server, memory store, and skills engine — depends on these types. They are serialization-stable (TOML + JSON via Serde) and must never pull in async runtimes or heavy dependencies.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Identity Layer\"\n        AgentId[\"AgentId (UUID v4/v5)\"]\n        SessionId[\"SessionId (UUID v4/v5)\"]\n        UserId[\"UserId (UUID v4)\"]\n    end\n\n    subgraph \"Manifest Layer\"\n        AM[\"AgentManifest\"]\n        MC[\"ModelConfig\"]\n        SC[\"ScheduleMode\"]\n        RQ[\"ResourceQuota\"]\n        TP[\"ToolProfile\"]\n        Cap[\"ManifestCapabilities\"]\n    end\n\n    subgraph \"Runtime State\"\n        AE[\"AgentEntry\"]\n        AS[\"AgentState\"]\n        AM2[\"AgentMode\"]\n    end\n\n    subgraph \"Approval System\"\n        AP[\"ApprovalPolicy\"]\n        AR[\"ApprovalRequest\"]\n        AResp[\"ApprovalResponse\"]\n        CTR[\"ChannelToolRule\"]\n    end\n\n    AgentId --> AE\n    SessionId --> AE\n    AM --> AE\n    MC --> AM\n    SC --> AM\n    RQ --> AM\n    TP --> AM\n    Cap --> AM\n    AP --> AR\n    AR --> AResp\n    CTR --> AP\n```\n\n---\n\n## Identifiers\n\nAll identifiers are newtype wrappers around `uuid::Uuid`, providing type safety at compile time and consistent serialization.\n\n### `AgentId`\n\nThe primary identifier for an agent instance. Supports two generation modes:\n\n- **Random** (`AgentId::new()`) — UUID v4 for unique runtime instances.\n- **Deterministic** — UUID v5 (SHA-1) derived from a fixed namespace, guaranteeing the same input always produces the same ID across daemon restarts. This preserves session history associations and prevents orphaned cron jobs.\n\nThree deterministic constructors exist:\n\n| Method | Input Format | Use Case |\n|---|---|---|\n| `from_name(name)` | `\"agent:{name}\"` | Named agents with stable identity |\n| `from_hand_id(hand_id)` | Bare `hand_id` (backward compat) | Multi-agent hand instances |\n| `from_hand_agent(hand_id, role, instance_id)` | `\"{hand_id}:{role}\"` or `\"{hand_id}:{role}:{instance_id}\"` | Specific role within a hand |\n\n**Backward compatibility note:** `from_hand_agent` with `instance_id: None` uses the legacy format `\"{hand_id}:{role}\"` (no instance component). Only when `instance_id` is `Some(uuid)` does the three-part format activate. This ensures existing single-instance hands retain their original agent IDs.\n\n### `SessionId`\n\nIdentifies a conversation session. Like `AgentId`, supports both random and deterministic generation:\n\n- `SessionId::new()` — random UUID v4.\n- `SessionId::for_channel(agent_id, channel)` — deterministic UUID v5 derived from the agent ID and lowercase channel name. The same `(agent, channel)` pair always maps to the same session, even across restarts.\n\nThe channel session namespace UUID is a fixed, randomly-generated constant (not an RFC 4122 well-known namespace) to avoid collisions with other UUID v5 consumers.\n\n### `UserId`\n\nSimple random UUID v4 wrapper with no deterministic derivation. Used for tracking which human initiated a request.\n\n---\n\n## Agent Manifest (`AgentManifest`)\n\nThe manifest is the complete declarative definition of an agent — everything the kernel needs to spawn and run it. It is typically loaded from a TOML file on disk but can also be constructed programmatically.\n\n### Key Fields\n\n**Identity & Discovery:**\n- `name`, `version`, `description`, `author`, `tags` — human-readable metadata for catalog and dashboard display.\n- `enabled` — when `false`, the agent is not spawned on startup. Default: `true`.\n- `is_hand` — set by the kernel when the agent is spawned by a Hand. Persisted so it survives restarts without tag-based detection.\n\n**Execution Model:**\n- `module` — path to the agent module (`\"builtin:chat\"`, a `.wasm` file, or a Python file).\n- `schedule` — `ScheduleMode` controlling when the agent wakes up:\n  - `Reactive` (default) — on incoming messages/events.\n  - `Periodic { cron }` — on a cron schedule.\n  - `Proactive { conditions }` — when monitored conditions are met.\n  - `Continuous { check_interval_secs }` — persistent loop (default interval: 300s).\n- `session_mode` — `SessionMode` for automated (non-channel) invocations:\n  - `Persistent` (default) — reuse the agent's session across invocations.\n  - `New` — fresh session each time.\n- `priority` — `Priority` level (`Low`, `Normal`, `High`, `Critical`) for scheduler ordering.\n\n**Model Configuration:**\n- `model` — primary `ModelConfig` (provider, model name, temperature, system prompt, etc.).\n- `fallback_models` — ordered list of `FallbackModel` entries tried if the primary model fails.\n- `routing` — optional `ModelRoutingConfig` for complexity-based auto-selection between cheap/mid/expensive models.\n- `pinned_model` — model override used in Stable mode.\n- `response_format` — optional structured output format for the LLM.\n- `thinking` — per-agent extended thinking configuration (overrides global `[thinking]` config).\n- `web_search_augmentation` — `WebSearchAugmentationMode` for models without tool support:\n  - `Off` — disabled.\n  - `Auto` (default) — augment only when model reports `supports_tools == false`.\n  - `Always` — search before every LLM call.\n\n**ModelConfig specifics:**\n- `model` field accepts `#[serde(alias = \"name\")]` so TOML configs can use either `model = \"...\"` or `name = \"...\"`.\n- `extra_params` is a `HashMap<String, serde_json::Value>` with `#[serde(flatten)]`, merging provider-specific parameters (e.g., Qwen's `enable_memory`) directly into the API request body. Conflicting keys override standard fields.\n- `system_prompt` supports TOML multi-line basic strings (`\"\"\"`) for complex prompts with newlines, quotes, and code blocks.\n\n**Tool Configuration:**\n- `profile` — optional `ToolProfile` that expands to a tool list and derived capabilities:\n  - `Minimal` — `file_read`, `file_list`\n  - `Coding` — adds `file_write`, `shell_exec`, `web_fetch`\n  - `Research` — `web_fetch`, `web_search`, `file_read`, `file_write`\n  - `Messaging` — `agent_send`, `agent_list`, `channel_send`, memory tools\n  - `Automation` — full set of 12 tools\n  - `Full` / `Custom` — `\"*\"` (all tools)\n- `tool_allowlist` — only these tools are available (empty = all).\n- `tool_blocklist` — these tools are excluded (applied after allowlist).\n- `tools_disabled` — hard override that disables all tools regardless of other settings.\n- `tools` — `HashMap<String, ToolConfig>` for per-tool configuration parameters.\n\n**Capability Grants (`ManifestCapabilities`):**\n- `network` — allowed hosts (e.g., `[\"api.anthropic.com:443\"]`).\n- `shell` — allowed shell commands.\n- `memory_read` / `memory_write` — memory scopes.\n- `agent_spawn` — whether the agent can create sub-agents.\n- `agent_message` — agent messaging patterns.\n- `ofp_discover` / `ofp_connect` — Open Federation Protocol capabilities.\n\n**Resource Limits (`ResourceQuota`):**\n| Field | Default | Description |\n|---|---|---|\n| `max_memory_bytes` | 256 MB | WASM memory limit |\n| `max_cpu_time_ms` | 30,000 (30s) | CPU time per invocation |\n| `max_tool_calls_per_minute` | 60 | Tool call rate limit |\n| `max_llm_tokens_per_hour` | `None` (inherit global) | Token budget; `Some(0)` = unlimited |\n| `max_network_bytes_per_hour` | 100 MB | Network I/O limit |\n| `max_cost_per_hour_usd` | 0.0 (unlimited) | Hourly cost cap |\n| `max_cost_per_day_usd` | 0.0 (unlimited) | Daily cost cap |\n| `max_cost_per_month_usd` | 0.0 (unlimited) | Monthly cost cap |\n\nUse `effective_token_limit()` to resolve `max_llm_tokens_per_hour`: both `None` and `Some(0)` yield `0` (unlimited), `Some(n)` yields `n`. Enforcement code should skip when the result is `0`.\n\n**Autonomous Configuration (`AutonomousConfig`):**\nFor 24/7 agents that run without human supervision:\n- `quiet_hours` — cron expression for downtime periods.\n- `max_iterations` — per-invocation loop cap (default: 50).\n- `max_restarts` — crash recovery limit before permanent stop (default: 10).\n- `heartbeat_interval_secs` — health check interval (default: 30s).\n- `heartbeat_timeout_secs` — override for unresponsive detection (default: `heartbeat_interval_secs * 2`).\n- `heartbeat_keep_recent` — how many heartbeat `NO_REPLY` messages to keep during context pruning.\n- `heartbeat_channel` — where to send heartbeat status (e.g., `\"telegram\"`).\n\n**Behavioral Controls:**\n- `show_progress` — surface `🔧 tool_name` progress markers in channel replies (default: `true`). Set `false` for agents whose output feeds downstream parsers.\n- `auto_evolve` — run background skill evolution review after each turn (default: `true`). Set `false` for latency-sensitive A2A workers.\n- `auto_dream_enabled` — opt-in to background memory consolidation (costs tokens).\n- `auto_dream_min_hours` / `auto_dream_min_sessions` — per-agent overrides for consolidation time/session gates.\n- `inherit_parent_context` — whether subagents receive parent workflow context (default: `true`).\n\n---\n\n## Runtime State\n\n### `AgentEntry`\n\nThe kernel's registry record for a live agent. Wraps the manifest with runtime state:\n\n- `state` — `AgentState` lifecycle: `Created` → `Running` → (`Suspended` | `Crashed` | `Terminated`).\n- `mode` — `AgentMode` permission level:\n  - `Observe` — no tool calls allowed.\n  - `Assist` — read-only tools only (`file_read`, `file_list`, `memory_list`, `memory_recall`, `web_fetch`, `web_search`, `agent_list`).\n  - `Full` (default) — all granted tools.\n- `session_id` — active session.\n- `parent` / `children` — agent hierarchy for spawned sub-agents.\n- `identity` — `AgentIdentity` (emoji, avatar, color, archetype, vibe, greeting_style).\n- `onboarding_completed` / `onboarding_completed_at` — bootstrap state tracking.\n- `force_session_wipe` — when `true`, the next LLM execution clears message history but preserves the `session_id`. Takes priority over `resume_pending`.\n- `resume_pending` — agent was interrupted by restart/shutdown; recovery expected on same transcript.\n- `reset_reason` — why the most recent automatic session reset occurred.\n\n### `AgentMode::filter_tools`\n\nApplies permission filtering to a `Vec<ToolDefinition>`:\n- `Observe` returns an empty vector.\n- `Assist` filters to the hardcoded read-only set.\n- `Full` passes through unchanged.\n\n---\n\n## Approval System\n\nThe approval system gates dangerous agent operations behind human review. When an agent attempts a restricted tool, the kernel creates an `ApprovalRequest`, pauses the agent, and waits for an `ApprovalResponse`.\n\n### `ApprovalPolicy`\n\nConfigures which tools require approval and how the flow behaves:\n\n| Field | Default | Purpose |\n|---|---|---|\n| `require_approval` | `[\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\", \"skill_evolve_*\"]` | Tools requiring human approval. Supports glob patterns. |\n| `timeout_secs` | 60 | Auto-deny window (range: 10–300). |\n| `timeout_fallback` | `Deny` | Behavior on timeout: `Deny`, `Skip`, or `Escalate`. |\n| `auto_approve` | `false` | Shorthand: if `true`, clears the require list entirely. |\n| `auto_approve_autonomous` | `false` | Auto-approve for agents in autonomous mode. |\n| `trusted_senders` | `[]` | User IDs that bypass approval entirely. |\n| `channel_rules` | `[]` | Per-channel tool authorization rules. |\n| `routing` | `[]` | Route approval requests to specific notification targets. |\n| `second_factor` | `None` | TOTP verification: `None`, `Totp`, `Login`, or `Both`. |\n| `totp_tools` | `[]` | Tools requiring TOTP (empty = all in `require_approval`). |\n\n**Serialization quirk:** `require_approval` accepts either a list of strings or a boolean via custom deserialization. `false` → empty list, `true` → default mutation set. This supports the TOML shorthand `require_approval = false`.\n\n### `ApprovalDecision`\n\nCustom serde implementation handles backward compatibility:\n- Simple variants (`Approved`, `Denied`, `TimedOut`, `Skipped`) serialize as plain strings: `\"approved\"`, `\"denied\"`, etc.\n- `ModifyAndRetry { feedback }` serializes as an object: `{\"type\": \"modify_and_retry\", \"feedback\": \"...\"}`.\n\nBoth the string form and object form are accepted on deserialization.\n\n### `ChannelToolRule`\n\nPer-channel allow/deny lists with wildcard support:\n\n```\nChannelToolRule {\n    channel: \"telegram\",\n    allowed_tools: [\"file_read\", \"file_*\"],\n    denied_tools: [\"shell_exec\"],\n}\n```\n\nEvaluation order: **deny wins**. If a tool matches any denied pattern, it is always blocked regardless of the allow list. The `check_tool()` method uses `glob_matches` for pattern matching (single `*` wildcard supported).\n\n### `SecondFactor`\n\nControls TOTP enforcement scope:\n- `None` — no second factor (default).\n- `Totp` — TOTP required for tool approvals only.\n- `Login` — TOTP required for dashboard login only.\n- `Both` — TOTP required for approvals and login.\n\nHelper methods `requires_login_totp()` and `requires_approval_totp()` simplify conditional checks. A configurable grace period (`totp_grace_period_secs`, default 300s, max 3600s) allows subsequent approvals to skip TOTP re-verification within the window.\n\n### `ApprovalRequest` Validation\n\nRequests are validated before processing with strict bounds:\n\n| Field | Constraint |\n|---|---|\n| `tool_name` | 1–64 chars, alphanumeric + underscore only |\n| `description` | ≤ 1024 chars |\n| `action_summary` | ≤ 512 chars |\n| `timeout_secs` | 10–300 range |\n\nTool names in policy lists also accept `*` wildcards (at most one per name) for glob matching.\n\n---\n\n## A/B Experiment Types\n\nThe manifest module includes types for prompt experimentation:\n\n- `PromptVersion` — a stored system prompt version with content hash, tool list, and activation state.\n- `PromptExperiment` — an A/B test with traffic split percentages, success criteria, and variant list.\n- `ExperimentVariant` — a named variant pointing to a specific prompt version.\n- `SuccessCriteria` — pass/fail rules (`require_user_helpful`, `require_no_tool_errors`, `require_non_empty`, optional `custom_min_score`).\n- `ExperimentStatus` — lifecycle: `Draft` → `Running` → (`Paused` | `Completed`).\n- `ExperimentVariantMetrics` — aggregated results per variant (success rate, latency, cost).\n\n---\n\n## Session Labels (`SessionLabel`)\n\nValidated string wrapper for human-readable session names (e.g., \"support inbox\", \"research\"). Rules:\n- 1–128 characters after trimming.\n- Only alphanumeric, spaces, hyphens, and underscores.\n- Constructed via `SessionLabel::new(label)` which returns `Result<Self, LibreFangError>`.\n\n---\n\n## Hook Events (`HookEvent`)\n\nInterceptable lifecycle events for agent extensions:\n\n| Event | When it fires |\n|---|---|\n| `BeforeToolCall` | Before a tool executes; handler can block the call |\n| `AfterToolCall` | After a tool completes |\n| `BeforePromptBuild` | Before the system prompt is constructed |\n| `AgentLoopEnd` | After the agent loop finishes a turn |\n\n---\n\n## Constants\n\n- `STABLE_PREFIX_MODE_METADATA_KEY` — metadata key `\"stable_prefix_mode\"` used in the manifest's metadata map.\n- `VERSION` (from crate root) — default manifest version string.\n\n---\n\n## Integration Points\n\nThe types in this crate are consumed by:\n\n- **Kernel** — spawns agents from `AgentManifest`, tracks them as `AgentEntry` records, enforces `ResourceQuota` and `AgentMode` filtering.\n- **API server** — exposes CRUD endpoints for manifests, serves `AgentEntry` data to the dashboard, processes `ApprovalRequest`/`ApprovalResponse` flows.\n- **Runtime (WASM)** — uses `ManifestCapabilities` for capability checks via `check_capability`, serializes `ToolDefinition` for the WASM boundary.\n- **Channel adapters** — receive `AgentIdentity` for visual branding, use `SessionId::for_channel` for session isolation per channel.\n- **Memory store** — uses `SessionId` and `AgentId` as keys for session and memory operations.\n- **Skills engine** — reads `skills` and `skills_disabled` from manifests, calls `ToolProfile::implied_capabilities()` for permission derivation.\n- **MCP runtime** — uses `ApprovalPolicy` for gating tool calls, `ChannelToolRule` for per-channel restrictions.\n- **Dashboard** — renders `AgentIdentity` (emoji, color, avatar), displays `AgentState` lifecycle badges, manages `PromptExperiment` A/B tests.\n- **Taint checker** — uses capability types and tool definitions for security analysis at sinks.\n- **Migration tools** — deserialize manifests from OpenClaw/OpenFang formats into the standard `AgentManifest` structure.","skills-framework":"# Skills Framework\n\n# Skills Framework\n\nThe Skills Framework (`librefang-skills`) manages the full lifecycle of skills: discovery, installation, conversion, configuration, agent-driven evolution, and security scanning. Skills are self-contained units of capability—prompts, tools, and configuration—that agents can load, invoke, and autonomously refine.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph External\n        CH[ClawHub API]\n        FS[Filesystem]\n    end\n\n    subgraph \"Skills Framework\"\n        R[Registry]\n        CC[ClawHubClient]\n        EV[Evolution]\n        CI[Config Injection]\n        VF[Verifier]\n        OC[OpenClaw Compat]\n        LD[Loader]\n    end\n\n    CH -->|search/browse/download| CC\n    CC -->|install_from_bytes| OC\n    OC -->|convert + scan| VF\n    R -->|load_all / get| FS\n    R -->|reload_skill| FS\n    EV -->|create/patch/update/rollback| FS\n    EV -->|security scan| VF\n    CI -->|resolve vars| FS\n    LD -->|execute_tool| FS\n```\n\n---\n\n## Skill Formats and Manifest\n\nA skill is a directory containing a `skill.toml` manifest and associated files. The framework recognizes three source formats and converts all of them into a unified `SkillManifest`:\n\n| Format | Detection | Conversion |\n|---|---|---|\n| **SKILL.md** (prompt-only) | File starts with `---` (YAML frontmatter) | `openclaw_compat::convert_skillmd` |\n| **package.json** (OpenClaw/Node.js) | `openclaw_compat::detect_openclaw_skill` | `openclaw_compat::convert_openclaw_skill` |\n| **skill.toml** (native LibreFang) | Direct parse | No conversion needed |\n\n### Manifest Structure (`skill.toml`)\n\n```toml\n[skill]\nname = \"my-skill\"\nversion = \"0.1.0\"\ndescription = \"Does useful things\"\nauthor = \"agent-evolved\"\nlicense = \"MIT\"\ntags = [\"automation\"]\n\n[runtime]\nruntime_type = \"PromptOnly\"   # or \"Shell\", \"Python\"\nentry = \"\"                    # script path for non-PromptOnly\n\n[tools]\n\n[[config_vars]]\nkey = \"wiki.base_url\"\ndescription = \"Base URL of the internal wiki\"\ndefault = \"https://wiki.example.com\"\n\n[source]\ntype = \"Local\"                # \"Local\", \"Native\", \"ClawHub\", etc.\n```\n\nThe `source` field is written by every install path and is checked by `delete_skill` to prevent agents from deleting marketplace or bundled skills. Only `Local` and `Native` sources are deletable through the agent-facing API; `uninstall_skill` (user-facing) removes any source.\n\n---\n\n## ClawHub Marketplace Client (`clawhub`)\n\nThe `ClawHubClient` handles all interaction with the ClawHub skill marketplace at `https://clawhub.ai/api/v1`.\n\n### Client Construction\n\n```rust\nlet client = ClawHubClient::new(cache_dir);\n// or with a custom URL:\nlet client = ClawHubClient::with_url(\"http://localhost:8080/api/v1\", cache_dir);\n```\n\nTLS verification can be disabled for testing by setting `LIBREFANG_DANGEROUSLY_SKIP_TLS_VERIFICATION=true` or `1`.\n\n### API Methods\n\n| Method | Endpoint | Purpose |\n|---|---|---|\n| `search(query, limit)` | `GET /search?q=...&limit=N` | Semantic search; returns `ClawHubSearchResponse` with `results` key |\n| `browse(sort, limit, cursor)` | `GET /skills?sort=...&limit=N&cursor=...` | Paginated listing; returns `ClawHubBrowseResponse` with `items` key |\n| `get_skill(slug)` | `GET /skills/{slug}` | Full detail including owner, stats, moderation status |\n| `get_file(slug, path)` | `GET /skills/{slug}/file?path=...` | Fetch a single file (e.g., `SKILL.md`) |\n| `install(slug, target_dir)` | `GET /download?slug=...` | Download + extract + scan + write |\n| `is_installed(slug, skills_dir)` | — | Checks for `skill.toml` in `{skills_dir}/{slug}/` |\n\n### Rate Limit Handling\n\nAll HTTP requests go through `get_with_retry`, which implements:\n\n- Up to **5 attempts** (`MAX_RETRIES`)\n- Exponential backoff: `BASE_DELAY_MS * 2^attempt`, capped at `MAX_DELAY_MS` (30 s)\n- Jitter: 0–25% random addition using system-time nanosecond hashing\n- `Retry-After` header respect (capped at `MAX_DELAY_MS`)\n- 429 and 5xx trigger retries; other 4xx errors fail immediately\n\n### Installation Pipeline\n\n`install` and `install_from_bytes` share a seven-step pipeline:\n\n1. **SHA256 hash** of downloaded content (logged for audit)\n2. **Format detection** — SKILL.md (starts with `---`), zip archive (`PK` magic bytes), or raw package.json\n3. **Zip extraction** with path-traversal protection via `resolve_skill_child_path` (rejects absolute paths, `..` components)\n4. **Format conversion** to `SkillManifest` via `openclaw_compat`\n5. **Manifest security scan** via `SkillVerifier::security_scan`\n6. **Prompt injection scan** via `SkillVerifier::scan_prompt_content` — critical findings block installation and clean up the skill directory\n7. **Write `skill.toml`** with `verified: false`\n\nThe install result (`ClawHubInstallResult`) includes all security warnings, tool name translations (OpenClaw → LibreFang naming), and whether the skill is prompt-only.\n\n### Slug Validation\n\nSkill slugs must be non-empty ASCII alphanumeric + `-` + `_`. This is enforced by `validate_slug` at every API boundary.\n\n---\n\n## Config Injection (`config_injection`)\n\nSkills declare external configuration they need via `[[config_vars]]` in their manifest. The config injection pipeline resolves these at prompt-build time.\n\n### Resolution Flow\n\n1. **Collection**: `collect_config_vars(skills)` gathers declarations from enabled skills, deduplicating by key (first declaration wins)\n2. **Resolution**: `resolve_config_vars(vars, config_toml)` walks `skills.config.<logical.key>` in the user's `config.toml`, falling back to the declared default\n3. **Formatting**: `format_config_section(resolved)` produces a compact text block for the system prompt\n\n### Storage Convention\n\nA declared key `wiki.base_url` is stored in `~/.librefang/config.toml` as:\n\n```toml\n[skills.config.wiki]\nbase_url = \"https://wiki.corp.example.com\"\n```\n\nResolution walks the dotted path `skills` → `config` → `wiki` → `base_url` through the TOML tree. Empty strings are treated as absent, triggering fallback to the default. Variables with neither a config value nor a default are omitted entirely.\n\n### Output Format\n\n```text\n## Skill Config Variables\nwiki.base_url = https://wiki.corp.example.com\ndb.host = localhost\n```\n\n---\n\n## Skill Evolution (`evolution`)\n\nThe evolution module enables agents to create, modify, and manage skills autonomously. Every mutation goes through security scanning, version tracking, and atomic filesystem writes.\n\n### Core Operations\n\n| Function | Purpose | Mutation Counter |\n|---|---|---|\n| `create_skill` | Create a new PromptOnly skill | No (initial creation) |\n| `update_skill` | Full rewrite of `prompt_context.md` | Yes |\n| `patch_skill` | Fuzzy find-and-replace on prompt content | Yes |\n| `rollback_skill` | Restore previous content snapshot | Yes |\n| `delete_skill` | Remove agent-created skills (source-checked) | — |\n| `uninstall_skill` | Remove any installed skill (user-initiated) | — |\n| `write_supporting_file` | Add files under `references/`, `templates/`, `scripts/`, `assets/` | No |\n| `remove_supporting_file` | Remove supporting files, clean empty dirs | No |\n| `record_skill_usage` | Increment use counter after successful invocation | No |\n\n### Security Validation\n\nAll prompt content passes through `validate_prompt_content` which:\n- Enforces a **160,000 character** limit (~55k tokens)\n- Runs `SkillVerifier::scan_prompt_content` for injection detection\n- Blocks content with **Critical** severity findings, returning `SkillError::SecurityBlocked`\n\nName validation (`validate_name`) enforces lowercase alphanumeric + hyphens/underscores, max 64 characters, must start with alphanumeric.\n\n### Concurrency: File Locking\n\nEvery mutation acquires an **exclusive file lock** via `acquire_skill_lock` before touching the filesystem. Lock files live at `{skills_dir}/.evolution-locks/{name}.lock` — outside the skill directory so they survive `remove_dir_all` on Windows.\n\nThe lock ensures:\n- Concurrent `create_skill` calls for the same name serialize (the second finds the directory already exists)\n- `update_skill`/`patch_skill` re-read the current on-disk version **under the lock** to avoid duplicate version bumps from stale cached copies\n- `delete_skill` and `uninstall_skill` hold the lock across directory removal so mid-deletion reads are impossible\n\n### Atomic Writes\n\nAll file writes use `atomic_write`: content is written to a temp file (named with pid, thread id, monotonic counter, and nanosecond timestamp) then renamed. This prevents partial files on crash. A process-wide `AtomicU64` counter ensures unique temp-file names even when multiple threads target the same path.\n\n### Fuzzy Patching\n\n`patch_skill` uses `fuzzy_find_and_replace` which tries six strategies in order from strict to loose:\n\n1. **Exact** — literal substring match\n2. **LineTrimmed** — trim leading/trailing whitespace per line\n3. **WhitespaceNormalized** — collapse whitespace runs to single space\n4. **IndentFlexible** — strip all leading indentation\n5. **BlockAnchor** — match first + last lines, verify middle ≥60% similar (≥70% for subsequent matches)\n6. **WhitespaceStripped** — remove all whitespace from both sides; substring match. Requires ≥3 non-whitespace chars to prevent false positives on short English fragments. Designed for CJK content where inter-character spaces have no semantic meaning.\n\nWhen no strategy matches, the error includes up to 3 closest existing lines (Jaccard character-overlap similarity > 0.3) so the agent can self-correct on the next attempt.\n\nEmpty `old_str` is rejected before any strategy runs to prevent catastrophic insertion at every character boundary.\n\n### Version Management\n\nEach skill tracks evolution metadata in `.evolution.json` alongside `skill.toml`:\n\n```rust\nstruct SkillEvolutionMeta {\n    versions: Vec<SkillVersionEntry>,   // newest last, max 10\n    use_count: u64,                      // successful invocations\n    evolution_count: u64,                // total version entries written\n    mutation_count: u64,                 // post-create edits only\n}\n```\n\n- **Version bumping** uses `semver::Version` for robust patch increment (`0.1.0` → `0.1.1`), with a fallback split-parse for non-standard strings\n- **Rollback snapshots** are saved to `.rollback/prompt_context_{timestamp}_{nanos}_{pid}.md` before every mutation, capped at 10 entries\n- **Author tracking**: each `SkillVersionEntry` records who made the change (`\"agent:<uuid>\"`, `\"cli\"`, `\"dashboard\"`, `\"reviewer\"`)\n\n### Supporting Files\n\nSkills can store auxiliary files in four allowed subdirectories: `references/`, `templates/`, `scripts/`, `assets/`. Operations:\n\n- **`write_supporting_file`** validates the path, enforces a 1 MiB size limit, canonicalizes both paths to verify the resolved target stays within the skill directory (symlink defense), and security-scans the content before writing\n- **`remove_supporting_file`** removes the file and walks upward pruning empty ancestor directories\n- **`list_supporting_files`** recursively walks each allowed subdirectory (max depth 16, symlinks not followed) and returns paths relative to the subdirectory root\n\n---\n\n## Security Scanning (`verify`)\n\nReferenced throughout the codebase, `SkillVerifier` provides two scan entry points:\n\n- **`security_scan(&manifest)`** — examines the manifest structure for dangerous configurations\n- **`scan_prompt_content(content)`** — pattern-matches prompt text for injection attempts (e.g., reverse shells, instruction overrides)\n\nBoth return `Vec<SkillWarning>` with severity levels. **Critical** warnings block installation or mutation; lower severities are recorded but allow the operation to proceed.\n\n`SkillVerifier::sha256_hex` is also used for content hashing in version entries.\n\n---\n\n## OpenClaw Compatibility (`openclaw_compat`)\n\nThe compatibility layer converts two external formats into native `SkillManifest`:\n\n- **`detect_skillmd` / `convert_skillmd`** — SKILL.md with YAML frontmatter (prompt-only skills). Produces tool name translations (OpenClaw → LibreFang naming) and identifies required binaries.\n- **`detect_openclaw_skill` / `convert_openclaw_skill`** — package.json-based skills with Node.js runtime declarations.\n\nBoth paths write a `skill.toml` and (for prompt-only skills) `prompt_context.md`.\n\n---\n\n## Registry (`registry`)\n\nThe skill registry loads and indexes installed skills from the filesystem. Key operations referenced by the rest of the codebase:\n\n- **`load_all`** — scans the skills directory, loading each valid `skill.toml`\n- **`load_workspace_skills`** — loads skills from project-local directories, includes `scan_prompt_content` validation\n- **`get` / `find_tool_provider`** — lookup skills by name or tool name\n- **`reload_skill`** — hot-reload a single skill from disk\n- **`is_frozen`** — checked by `ensure_not_frozen` before agent evolution tools execute, preventing mutation during locked contexts\n\nThe registry supports progressive prompt-context loading to avoid reading all prompt files into memory at startup.\n\n---\n\n## Loader (`loader`)\n\nThe loader handles skill tool execution:\n\n- **`execute_skill_tool`** dispatches to the appropriate runtime (shell, Python)\n- **`execute_shell`** runs shell-based skill tools\n- **`execute_python`** locates the Python interpreter via `find_python` and executes\n\nAfter successful execution, `record_skill_usage` is called to bump the skill's use counter (serialized via the evolution lock).\n\n---\n\n## Integration Points\n\n### From the Runtime (`librefang-runtime`)\n\nThe tool runner (`tool_runner.rs`) bridges agent tool calls into the skills framework:\n\n- **Evolution tools**: `tool_skill_evolve_create`, `tool_skill_evolve_patch`, `tool_skill_evolve_update`, `tool_skill_evolve_rollback`, `tool_skill_evolve_delete`, `tool_skill_evolve_write_file`, `tool_skill_evolve_remove_file` — each acquires the skills directory and delegates to the corresponding `evolution` function\n- **Skill tool execution**: `execute_tool_raw` looks up the tool provider via the registry and dispatches th
