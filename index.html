------------|\n| Catch-up sweep | 5 min | Re-process messages stuck with `processed=0` (30s age threshold) |\n| DB cleanup | 24 hours | Delete processed/failed messages older than 7 days |\n| Conversation eviction | 15 min | Remove conversations inactive for `CONVERSATION_TTL_HOURS` |\n| Rate limit cleanup | 5 min | Remove expired rate limit entries |\n| Dedup cleanup | 2 min | Remove expired message IDs from dedup cache |\n| Escalation cleanup | 10 min | Remove stale escalation debounce entries |\n| Decrypt retry cleanup | 60s | Remove expired decryption retry entries |\n| Gap detection | 10 min | Warn if active conversation silent for 30+ minutes |\n\n## Decryption Retry Handling\n\nWhen Baileys reports a decryption failure (stub type 39 or status ERROR):\n\n1. Increment retry counter in `decryptRetryMap`\n2. After 3 retries, mark message as permanently failed\n3. Notify the owner with a system message\n4. After cleanup interval, remove from retry map\n\n## HTTP API\n\nAll endpoints accept CORS requests from `localhost`, `127.0.0.1`, `tauri://localhost`, and `app://localhost`.\n\n### POST /login/start\n\nInitiates Baileys connection and returns QR code.\n\n```json\n// Response\n{\n  "qr_data_url": "data:image/png;base64,...",\n  "session_id": "uuid",\n  "message": "Scan this QR code...",\n  "connected": false\n}\n```\n\n### GET /login/status\n\nPoll for connection status.\n\n```json\n{\n  "connected": true,\n  "message": "Connected to WhatsApp",\n  "expired": false\n}\n```\n\n### POST /message/send\n\nSend outbound message from LibreFang daemon.\n\n```json\n// Request\n{ "to": "+1234567890", "text": "Hello!" }\n\n// Response\n{ "success": true, "message": "Sent" }\n```\n\n### POST /message/send-image\n\nSend image by URL.\n\n```json\n// Request\n{ "to": "+1234567890", "image_url": "https://...", "caption": "Check this out" }\n```\n\n### GET /conversations\n\nList active stranger conversations.\n\n```json\n{\n  "conversations": [\n    {\n      "jid": "1234567890@s.whatsapp.net",\n      "pushName": "Alice",\n      "phone": "+1234567890",\n      "messageCount": 12,\n      "lastActivity": 1705312200000,\n      "escalated": false,\n      "lastMessage": { "text": "Hello", "direction": "inbound", "timestamp": 1705312200000 }\n    }\n  ]\n}\n```\n\n### GET /messages/:jid\n\nMessage history for a chat (newest first).\n\n```\nGET /messages/1234567890@s.whatsapp.net?limit=50&since=0\n```\n\n### GET /messages/unprocessed\n\nMessages that failed to forward (for debugging).\n\n### GET /health\n\nHealth check endpoint.\n\n```json\n{\n  "status": "ok",\n  "connected": true,\n  "session_id": "uuid",\n  "active_conversations": 3\n}\n```\n\n## Markdown Conversion\n\nLLM responses use standard Markdown, which the gateway converts to WhatsApp formatting:\n\n| Markdown | WhatsApp |\n|----------|----------|\n| `**bold**` | `*bold*` |\n| `*italic*` | `_italic_` |\n| `~~strike~~` | `~strike~` |\n| `` `code` `` | ` ```code``` ` |\n\nSpecial cases handled:\n- Bullet list items (`* item`) are not converted to italic\n- Inline code is protected before formatting runs\n- Backslash-escaped stars (`\\*`) become literal `*`\n- Python dunders (`__init__`) are not converted to bold\n\n## Termux/Android Support\n\nThe `postinstall.js` script handles native addon compilation on Termux, where `node-gyp` references undefined `android_ndk_path`. It patches `common.gypi` to remove the NDK reference, then rebuilds `better-sqlite3`.\n\n## Exports (for testing)\n\n```javascript\nmodule.exports = {\n  markdownToWhatsApp,\n  extractNotifyOwner,\n  extractRelayCommands,\n  buildConversationsContext,\n  isRateLimited,\n  buildCorsHeaders,\n  isAllowedOrigin,\n  parseBody,\n  MAX_BODY_SIZE,\n};\n```\n\n## Error Handling\n\n- **Connection loss**: Exponential backoff reconnection (max 10 attempts, 60s cap)\n- **Forward failure**: Message stays `processed=0`; catch-up sweep retries\n- **Media download failure**: Fall back to text descriptor (e.g., `[Photo from Alice]`)\n- **Agent UUID stale**: Auto-retry with fresh UUID resolution\n- **Rate limited**: Message dropped; logged but not stored as error\n- **Logged out**: Auth cleared; new QR required\n\n## Security Notes\n\n- SQLite database file permissions set to `0o600` (owner read/write only)\n- CORS restricted to local origins only\n- Relay commands validated against active conversations (no arbitrary outreach)\n- Escalation debounced to prevent notification spam\n- Message deduplication prevents processing the same message twice',
                "deployment-worker":
                    '# Deployment — worker\n\n# Deployment — Worker Module\n\nThe `deploy/worker` module is a Cloudflare Workers application that powers **deploy.librefang.ai** — a zero-infrastructure web interface for launching self-hosted LibreFang instances on Fly.io. It handles the complete provisioning workflow: token validation, app creation, network setup, persistent storage, and machine launch.\n\n## Overview\n\nThis module serves two purposes:\n\n1. **Web UI** — An interactive HTML page where users select a deployment platform and enter their Fly.io credentials\n2. **API Endpoint** — A `POST /api/deploy` handler that orchestrates Fly.io provisioning programmatically\n\nThe worker is deployed via GitHub Actions and routes all traffic to `deploy.librefang.ai/*` through the `librefang.ai` zone.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A["User Browser"] -->|HTTPS| B["deploy.librefang.ai"]\n    B -->|GET /| C["HTML UI"]\n    B -->|POST /api/deploy| D["handleDeploy"]\n    D -->|1. Verify| E["fly.io API"]\n    D -->|2. Create App| E\n    D -->|3. Allocate IPs| F["fly.io GraphQL"]\n    D -->|4. Create Volume| E\n    D -->|5. Launch Machine| E\n    E -->|appName, url| G["Success Response"]\n    F -->|IP allocation| G\n```\n\n## Request Flow\n\n### GET / (Default Route)\n\nReturns the full HTML interface. The page is a single-page application with two views:\n\n1. **Platform Selection** — Grid of deployment options (Fly.io, Render, Railway, GCP, Docker, local installs)\n2. **Fly.io Deploy Form** — Token input and deployment progress UI\n\n### POST /api/deploy\n\nExpects a JSON body with a `token` field containing the Fly.io personal access token.\n\n**Validation steps:**\n\n| Step | Action | Failure Handling |\n|------|--------|------------------|\n| 1 | Verify token via `GET /apps` | Returns 401 if token invalid |\n| 2 | Create app with random name `librefang-{6-hex-chars}` | Returns 500 if creation fails |\n| 3 | Allocate shared IPv4 and IPv6 via GraphQL | Non-fatal — failures logged |\n| 4 | Create 1GB volume named `librefang_data` in `nrt` region | Returns 500 if creation fails |\n| 5 | Launch machine with Docker image | Returns 500 if machine creation fails |\n\n**Success response:**\n\n```json\n{\n  "success": true,\n  "appName": "librefang-a1b2c3",\n  "url": "https://librefang-a1b2c3.fly.dev",\n  "dashboardUrl": "https://fly.io/apps/librefang-a1b2c3",\n  "machineId": "machine-id",\n  "region": "nrt"\n}\n```\n\n**Error response:**\n\n```json\n{\n  "error": "Human-readable error message"\n}\n```\n\n## Machine Configuration\n\nThe deployed Fly.io machine uses:\n\n```javascript\n{\n  region: \'nrt\',\n  image: \'ghcr.io/librefang/librefang:latest\',\n  guest: { cpu_kind: \'shared\', cpus: 1, memory_mb: 256 },\n  services: [\n    {\n      ports: [\n        { port: 443, handlers: [\'tls\', \'http\'] },\n        { port: 80, handlers: [\'http\'] }\n      ],\n      protocol: \'tcp\',\n      internal_port: 4545\n    }\n  ],\n  mounts: [{ volume: \'librefang_data\', path: \'/data\' }],\n  env: {\n    LIBREFANG_HOME: \'/data\',\n    OPENROUTER_API_KEY: \'<from env>\'\n  }\n}\n```\n\nKey details:\n- **Port 4545** is the internal service port\n- **HTTPS termination** is handled by Fly.io\'s edge (handlers: `tls, http`)\n- **Volume** is mounted at `/data` for persistent configuration and storage\n- **OpenRouter key** is pre-populated from the worker\'s `OPENROUTER_API_KEY` secret for the free Step 3.5 Flash model\n\n## Environment Configuration\n\nThe worker requires the following secret (set via `wrangler secret put` or Cloudflare dashboard):\n\n| Variable | Purpose |\n|----------|---------|\n| `OPENROUTER_API_KEY` | Pre-configured API key injected into new deployments for free LLM access |\n\n## Key Functions\n\n### `handleDeploy(request, env)`\n\nMain deployment orchestrator. Returns a `Response` object (not a thrown error) for all cases including failures.\n\n### `randomHex(len)`\n\nGenerates cryptographically random hex strings for app naming:\n\n```javascript\nfunction randomHex(len) {\n  const arr = new Uint8Array(len);\n  crypto.getRandomValues(arr);\n  return Array.from(arr, (b) => b.toString(16).padStart(2, \'0\')).join(\'\');\n}\n```\n\n### `json(data, status)`\n\nConvenience helper for building JSON responses with consistent headers:\n\n```javascript\nfunction json(data, status = 200) {\n  return new Response(JSON.stringify(data), {\n    status,\n    headers: { \'Content-Type\': \'application/json\' },\n  });\n}\n```\n\n## Frontend Integration\n\nThe HTML page includes a JavaScript client (`deploy()` function) that:\n\n1. Shows a multi-step progress indicator as deployment proceeds\n2. Advances the progress UI every 1.5 seconds regardless of actual progress (a UI convenience, not tied to real state)\n3. Displays the result with direct links to the deployed app and Fly.io dashboard\n4. Handles errors by resetting the form and showing the error message\n\n## Deployment\n\nThe worker is deployed via GitHub Actions using Wrangler. See `wrangler.toml`:\n\n```toml\nname = "librefang-deploy"\nmain = "src/index.js"\ncompatibility_date = "2024-12-01"\n\nroutes = [\n  { pattern = "deploy.librefang.ai/*", zone_name = "librefang.ai" }\n]\n```\n\n## Security Considerations\n\n- **Token handling**: The Fly.io API token is passed directly to Fly.io\'s API and never stored or logged by this worker\n- **Token validation**: The token is validated before any resources are created to fail fast on authentication errors\n- **App naming**: Random hex suffixes prevent naming collisions and add unpredictability\n- **Read-only env vars**: Users cannot inject arbitrary environment variables through this interface; only the pre-configured OpenRouter key is passed\n\n## Relationship to Other Modules\n\nThe call graph indicates this module\'s `json()` helper is referenced across the codebase as a standard response format. Other services (the Rust-based runtime, CLI, kernel) follow the same response structure convention established here for consistent API responses.',
                deployment:
                    '# Deployment\n\n# Deployment Module\n\nThe `deploy/` directory contains everything needed to package, ship, and operate LibreFang in production. It supports multiple deployment targets and includes the observability stack for monitoring running instances.\n\n## Deployment Targets\n\nLibreFang can be deployed to several platforms, each optimized for different use cases:\n\n| Platform | Best For | Configuration |\n|----------|----------|---------------|\n| [Fly.io](deploy-fly.md) | One-command self-hosted deployment | `fly/deploy.sh` |\n| [Google Cloud Platform](deploy-gcp.md) | Free-tier single VM | `gcp/` |\n| [Railway](deploy-railway.md) | Docker-based hosting | `railway.json` / `railway.toml` |\n| [Render](deploy-render-yaml.md) | Simple cloud deployment | `render.yaml` |\n\nAll platform-specific deployments use the same [Dockerfile](deploy.md), which produces a multi-stage image combining the Rust-compiled daemon with the Node.js runtime for the React dashboard.\n\n## Observability Stack\n\nMonitoring is implemented as a three-layer pipeline:\n\n```mermaid\nflowchart LR\n    subgraph Collect["Prometheus (deploy/prometheus.md)"]\n        P[Scrape Config]\n    end\n    \n    subgraph Store["Prometheus"]\n        T[(Time Series DB)]\n    end\n    \n    subgraph Visualize["Grafana (deploy/grafana.md)"]\n        D1[Tokens]\n        D2[HTTP Requests]\n        D3[Agents]\n        D4[Cost]\n    end\n    \n    L[LibreFang /api/metrics] --> P --> T --> D1 & D2 & D3 & D4\n```\n\nPrometheus scrapes metrics from `/api/metrics` every 15 seconds. Grafana dashboards are auto-provisioned from YAML, visualizing token usage, HTTP request latency, agent activity, and cost.\n\n## WhatsApp Integration\n\nThe [WhatsApp Gateway](deploy-whatsapp-gateway.md) bridges WhatsApp Web to the LibreFang agent runtime. It handles QR authentication, message routing, media processing, and streaming LLM responses. Messages are persisted to SQLite for history and retry recovery, then forwarded to the LibreFang daemon for agent processing.\n\n## Web-Based Deployment\n\n[deploy.librefang.ai](deploy-worker.md) provides a zero-infrastructure web UI for launching self-hosted instances on Fly.io. Built as a Cloudflare Worker, it handles the full provisioning workflow—token validation, app creation, persistent volume setup, and machine launch—without requiring server infrastructure.\n\n## Key Files\n\n| File | Purpose |\n|------|---------|\n| `Dockerfile` | Multi-stage production image (Rust + Node.js) |\n| `fly/deploy.sh` | One-command Fly.io deployment |\n| `prometheus/prometheus.yml` | Metrics scrape configuration |\n| `grafana/provisioning/dashboards/` | Pre-built monitoring dashboards |\n| `whatsapp-gateway/index.js` | WhatsApp bridge service |\n| `worker/src/index.js` | Cloudflare Worker for deploy.librefang.ai |',
                "desktop-application":
                    '# Desktop Application\n\n# LibreFang Desktop Application\n\nA native Tauri 2.0 desktop wrapper for the LibreFang Agent OS. The application boots an embedded LibreFang kernel and API server, presents a WebUI through a native window, and provides system-level integration including a system tray, global shortcuts, auto-start, and auto-updates.\n\n## Overview\n\nThe desktop app operates in two modes:\n\n- **Local mode**: Boots the full LibreFang kernel and API server internally on a random localhost port. The WebView navigates to `http://127.0.0.1:{port}`.\n- **Remote mode**: Connects to a running LibreFang server at a user-specified URL. No kernel is booted internally.\n\nConnection preference (mode and URL) is persisted in `~/.librefang/desktop.toml` and resolved at startup with priority: CLI argument → `LIBREFANG_SERVER_URL` env var → saved preference → connection screen.\n\n## Architecture\n\n```mermaid\nflowchart TB\n    subgraph App["Tauri Application"]\n        CLI["main.rs<br/>CLI Args"]\n        Lib["lib.rs<br/>run() entry point"]\n        Commands["commands.rs<br/>IPC Handlers"]\n        Tray["tray.rs<br/>System Tray"]\n        Shortcuts["shortcuts.rs<br/>Global Shortcuts"]\n        Updater["updater.rs<br/>Auto-Update"]\n    end\n\n    subgraph Connection["connection.rs"]\n        Screen["connection_html()<br/>Connection UI"]\n        Test["test_connection()<br/>Health Check"]\n        Remote["connect_remote()<br/>Remote Mode"]\n        Local["start_local()<br/>Local Mode"]\n    end\n\n    subgraph Server["server.rs"]\n        Handle["ServerHandle"]\n        Kernel["LibreFangKernel"]\n        Router["API Router"]\n    end\n\n    subgraph State["Managed State (lib.rs)"]\n        Port["PortState RwLock<Option<u16>>"]\n        KernelState["KernelState RwLock<Option<KernelInner>>"]\n        ServerUrl["ServerUrlState RwLock<String>"]\n        RemoteMode["RemoteMode RwLock<bool>"]\n        Holder["ServerHandleHolder Mutex<Option<ServerHandle>>"]\n    end\n\n    CLI --> Lib\n    Lib --> Screen\n    Lib --> Handle\n    Lib --> Port\n    Lib --> KernelState\n    Lib --> ServerUrl\n    Lib --> RemoteMode\n    Lib --> Holder\n    \n    Commands --> Port\n    Commands --> KernelState\n    \n    Local --> Handle\n    Local --> KernelState\n    \n    Handle --> Kernel\n    Handle --> Router\n    \n    Tray --> KernelState\n    Tray --> ServerUrl\n    Tray --> Updater\n    \n    Shortcuts --> Commands\n    \n    Updater --> Lib\n```\n\n## Startup Flow\n\nThe `run(server_url, force_local)` function in `lib.rs` orchestrates initialization:\n\n1. **Initialize tracing** — Sets up `tracing_subscriber` with env-filter.\n2. **Load environment** — Calls `dotenv::load_dotenv()` to inject `~/.librefang/.env`, `secrets.env`, and vault secrets into `std::env`.\n3. **Resolve startup mode** — Checks CLI args, env vars, and saved preferences to determine local, remote, or connection-screen mode.\n4. **Pre-boot for direct modes** — If remote or forced local, the kernel/server starts immediately so the WebView URL is known before the window is created.\n5. **Register managed state** — All state types (`PortState`, `KernelState`, `ServerUrlState`, `RemoteMode`, `ServerHandleHolder`) are registered with Tauri\'s state manager.\n6. **Configure plugins** — Registers notification, shell, dialog, single-instance, autostart, updater, and global-shortcut plugins.\n7. **Setup phase** — Creates the WebView window (navigating to the connection screen or direct URL), configures the system tray, starts event forwarding, and spawns the startup update check.\n8. **Event loop** — Runs until exit. Closing the window hides to tray instead of quitting.\n\n### Startup Mode Resolution\n\n```\nCLI --server-url → Remote\nCLI --local      → Local\nENV LIBREFANG_SERVER_URL → Remote\nsaved desktop.toml:\n  mode=remote + server_url → Remote\n  mode=local              → Local\nelse                      → Connection Screen\n```\n\n## Key Components\n\n### `lib.rs` — Application Entry Point\n\nThe central hub that wires together Tauri, the kernel, and system integration.\n\n**Managed State Types**\n\nAll state uses interior mutability via `RwLock` or `Mutex`, allowing updates after initial registration:\n\n```rust\npub struct PortState(pub std::sync::RwLock<Option<u16>>);         // Embedded server port\npub struct KernelState(pub std::sync::RwLock<Option<KernelInner>>); // Kernel + uptime\npub struct ServerUrlState(pub std::sync::RwLock<String>);          // Active server URL\npub struct RemoteMode(pub std::sync::RwLock<bool>);                // Local vs remote\npub struct ServerHandleHolder(pub std::sync::Mutex<Option<ServerHandle>>); // Shutdown handle\n```\n\n`KernelInner` holds the `Arc<LibreFangKernel>` and the `Instant` of startup, used for uptime display.\n\n**Kernel Event Forwarding**\n\nThe `forward_kernel_events()` async function subscribes to the kernel\'s event bus and emits native OS notifications for critical events:\n\n- `LifecycleEvent::Crashed` — Agent crash with error message\n- `SystemEvent::KernelStopping` — Kernel shutdown signal\n- `SystemEvent::QuotaEnforced` — Quota limit hit with spent/limit amounts\n\nNon-critical events are silently ignored to avoid notification spam.\n\n**Window Behavior**\n\n- **On close**: Hides to system tray instead of quitting (`api.prevent_close()`)\n- **On tray click**: Shows and focuses the window\n- **Single instance**: If another instance launches, the existing window is focused\n\n### `server.rs` — Embedded Kernel & Server\n\nManages the lifecycle of the local LibreFang kernel and its API server.\n\n**`ServerHandle`**\n\nReturned by `start_server()` and held in `ServerHandleHolder`. Contains:\n\n- `port: u16` — The bound port\n- `kernel: Arc<LibreFangKernel>` — Shared kernel reference\n- `shutdown_tx: watch::Sender<bool>` — Shutdown signal channel\n- `server_thread: JoinHandle` — Background thread handle\n- `shutdown_initiated: AtomicBool` — Guards against double shutdown\n\n**Shutdown Safety**\n\n`ServerHandle` implements `Drop`, which signals shutdown if not already initiated. The `shutdown()` method waits for the thread to join. This ensures the embedded server stops cleanly when the app exits or when switching from local to remote mode.\n\n**`start_server()` Process**\n\n1. Boots `LibreFangKernel::boot(None)` synchronously\n2. Binds `TcpListener` to `127.0.0.1:0` to get a free port on the main thread\n3. Spawns a dedicated thread (`"librefang-server"`) with a multi-threaded tokio runtime\n4. Inside that runtime: calls `kernel.start_background_agents()`, spawns the approval sweep task, and runs `run_embedded_server()`\n5. Returns `ServerHandle` with the port immediately available\n\n**`run_embedded_server()`**\n\n1. Calls `build_router(kernel, listen_addr)` to create the axum router\n2. Spawns a background task for `sync_dashboard()` (updates WebUI assets from release)\n3. Converts the `std::net::TcpListener` to `tokio::net::TcpListener` in non-blocking mode\n4. Runs the axum server with graceful shutdown (waits on the watch channel)\n5. On shutdown, stops the bridge manager\n\n### `connection.rs` — Connection Screen & Mode Switching\n\nProvides a self-contained HTML connection page and IPC commands for remote/local switching.\n\n**`connection_html()`**\n\nReturns a complete, dark-themed HTML/CSS/JS page injected into a blank WebView. The JavaScript calls Tauri IPC commands:\n\n- `test_connection(url)` — Validates server reachability via `/api/health`\n- `connect_remote(url, remember)` — Switches to remote mode\n- `start_local(remember)` — Boots local server and switches mode\n\n**`ConnectionPreference`**\n\nPersisted in `~/.librefang/desktop.toml`:\n\n```toml\n[connection]\nmode = "local"        # or "remote"\nserver_url = "..."   # only for remote mode\n```\n\n**Mode Switching**\n\nWhen switching modes via `start_local` or `connect_remote`:\n\n1. Validates the input (URL scheme check)\n2. Verifies server health (for remote) or boots kernel (for local)\n3. Updates all interior-mutable state: `PortState`, `KernelState`, `ServerUrlState`, `RemoteMode`\n4. Clears the other mode\'s state (e.g., clears `PortState` when going remote)\n5. For local mode, takes ownership of the `ServerHandle` into `ServerHandleHolder`\n6. Navigates the WebView to the new URL\n\n### `commands.rs` — Tauri IPC Commands\n\nAll commands are registered with `tauri::generate_handler!` and callable from the WebUI via `window.__TAURI__.core.invoke()`.\n\n**Status & Diagnostics**\n\n| Command | Returns | Description |\n|---------|---------|-------------|\n| `get_port` | `u16` | Embedded server port (errors if remote or not started) |\n| `get_status` | `JSON { status, port, agents, uptime_secs }` | Kernel status summary |\n| `get_agent_count` | `usize` | Number of registered agents |\n\n**Importing**\n\n| Command | Action |\n|---------|--------|\n| `import_agent_toml` | Opens native file picker → parses TOML → copies to `~/.librefang/workspaces/agents/{name}/` → spawns agent |\n| `import_skill_file` | Opens native file picker → copies to `~/.librefang/skills/` → hot-reloads skill registry |\n\n**System Integration**\n\n| Command | Action |\n|---------|--------|\n| `get_autostart` | Returns whether launch-at-login is enabled |\n| `set_autostart(enabled)` | Enables or disables launch-at-login |\n| `check_for_updates` | Returns `UpdateInfo { available, version, body }` |\n| `install_update` | Downloads and installs update, then restarts |\n| `open_config_dir` | Opens `~/.librefang/` in OS file manager |\n| `open_logs_dir` | Opens `~/.librefang/logs/` in OS file manager |\n\n### `dotenv.rs` — Environment Loading\n\nMirrors the CLI\'s dotenv behavior so the desktop app loads credentials consistently.\n\n**Load Priority** (lowest to highest)\n\n1. `~/.librefang/.env` file\n2. `~/.librefang/secrets.env` file\n3. Credential vault (`~/.librefang/vault.enc`)\n4. System environment variables\n\nThe vault has the highest priority among config sources (but yields to system env vars). Files that don\'t exist are silently skipped.\n\n**Vault Integration**\n\nIf `vault.enc` exists and can be unlocked, credentials are injected into `std::env`. The vault uses the machine fingerprint for key derivation, making credentials machine-specific.\n\n### `tray.rs` — System Tray\n\nSets up a system tray icon with an enhanced menu showing real-time status.\n\n**Tray Menu Structure**\n\n```\nShow Window\nOpen in Browser\nChange Server...\n─────────────\nAgents: N running        (display only)\nStatus: Running (2h 15m) (display only, or "Remote (http://...)")\n─────────────\nLaunch at Login    [✓]  (checkable)\nCheck for Updates...\nOpen Config Directory\n─────────────\nQuit LibreFang\n```\n\n**Key Behaviors**\n\n- **Show Window**: Brings the window to front\n- **Open in Browser**: Uses `ServerUrlState` (works for both modes)\n- **Change Server**: Stops the local server, clears state, navigates to connection screen\n- **Launch at Login**: Toggles autostart via `app.autolaunch()`\n- **Check for Updates**: Performs full update check and install with notifications\n- **Quit**: Calls `app.exit(0)` immediately\n\nThe status line and agent count are dynamically read from `KernelState` at tray setup time.\n\n### `shortcuts.rs` — Global Keyboard Shortcuts\n\nThree system-wide shortcuts registered with `tauri_plugin_global_shortcut`:\n\n| Shortcut | Action |\n|----------|--------|\n| `Ctrl+Shift+O` | Show/focus the LibreFang window |\n| `Ctrl+Shift+N` | Show window + emit `navigate` event with `"agents"` payload |\n| `Ctrl+Shift+C` | Show window + emit `navigate` event with `"chat"` payload |\n\nThe `navigate` events allow the WebUI to respond to shortcuts without being focused. Shortcut registration failure is non-fatal—the app continues without shortcuts.\n\n### `updater.rs` — Auto-Update\n\nIntegrates with `tauri_plugin_updater` for update checking and installation.\n\n**Startup Check**\n\n`spawn_startup_check()` waits 10 seconds after launch, then checks for updates. If available, shows a notification and installs silently, triggering an app restart.\n\n**On-Demand Updates**\n\nThe tray menu\'s "Check for Updates..." and the IPC command `check_for_updates` both use `check_for_update()`. The `install_update` command downloads and installs, then calls `app_handle.restart()` (which terminates the current process).\n\n**`UpdateInfo` Structure**\n\n```rust\npub struct UpdateInfo {\n    pub available: bool,\n    pub version: Option<String>,\n    pub body: Option<String>,\n}\n```\n\n## Environment Variables & Configuration\n\nThe desktop app respects several environment variables:\n\n| Variable | Effect |\n|----------|--------|\n| `LIBREFANG_HOME` | Overrides `~/.librefang` base directory |\n| `LIBREFANG_SERVER_URL` | Sets default remote server URL |\n\nConfiguration files in `~/.librefang/`:\n\n| File | Purpose |\n|------|---------|\n| `.env` | API keys, custom settings |\n| `secrets.env` | Written by the dashboard\'s "Set API Key" feature |\n| `vault.enc` | Encrypted credential storage |\n| `desktop.toml` | Persisted connection preference |\n\n## Integration with Other Modules\n\n```mermaid\nflowchart LR\n    subgraph Desktop["librefang-desktop"]\n        Kernel["LibreFangKernel"]\n        Router["API Router"]\n        Vault["CredentialVault"]\n    end\n\n    subgraph Kernel["librefang-kernel"]\n        AgentReg["Agent Registry"]\n        EventBus["Event Bus"]\n        SkillReg["Skill Registry"]\n    end\n\n    subgraph API["librefang-api"]\n        Server["build_router()"]\n        Dashboard["sync_dashboard()"]\n    end\n\n    subgraph Extensions["librefang-extensions"]\n        VaultExt["CredentialVault"]\n    end\n\n    Desktop -->|"kernel.clone()"| Router\n    Router --> Server\n    Server --> AgentReg\n    Server --> EventBus\n    Server --> SkillReg\n    Desktop --> VaultExt\n    Router --> Dashboard\n```\n\n| Dependency | Usage |\n|------------|-------|\n| `librefang-kernel` | Boots `LibreFangKernel`, accesses agent registry, event bus, skill registry |\n| `librefang-api` | Builds the API router, syncs dashboard assets |\n| `librefang-types` | Event types, agent manifest types |\n| `librefang-extensions` | Credential vault for secure storage |\n\nThe WebUI served by the embedded server provides the full dashboard experience (chat, agent management, settings). The desktop app\'s role is purely the native wrapper and system integration layer.',
                "documentation-articles":
                    '# Documentation — articles\n\n# Documentation — Articles Module\n\n## Overview\n\nThe `articles/` directory contains the written content for the LibreFang documentation website. These Markdown files serve as the primary source for blog posts, release announcements, announcements, and informational articles that appear on [docs.librefang.ai](https://docs.librefang.ai).\n\nArticles are static content files that complement the generated API documentation and guides. They cover release notes, project announcements, and feature introductions.\n\n## Article Types\n\nThe module contains three categories of articles:\n\n### 1. Introduction Articles\n\nGeneral-purpose articles that introduce the project to new users. These provide high-level overviews, quick start guides, and contribution information.\n\n**Example:** `hello-librefang.md`\n\n```\narticles/\n└── hello-librefang.md   # Main project introduction\n```\n\n### 2. Announcement Articles\n\nArticles covering significant project milestones such as website launches, new features, or community updates.\n\n**Example:** `new-website-launch.md`\n\n### 3. Release Notes\n\nSerialized articles documenting each version of LibreFang. These follow a consistent format across versions 0.5.6 through the current CalVer releases.\n\n**Pattern:** `release-{version}.md`\n\n```\narticles/\n├── release-0.5.6.md\n├── release-0.5.7.md\n├── release-0.6.0.md\n├── release-0.6.1.md\n├── release-0.6.2.md\n├── release-0.6.3.md\n├── release-0.6.4.md\n├── release-0.6.5.md\n├── release-0.6.6.md\n├── release-0.6.7.md\n├── release-0.6.8.md\n├── release-0.7.0.md\n├── release-2026.3.21.md\n└── release-2026.3.22.md\n```\n\n## Frontmatter Schema\n\nEvery article must include valid YAML frontmatter at the top of the file. This metadata powers the documentation site\'s routing, SEO, and listing features.\n\n```yaml\n---\ntitle: "Article Title"\npublished: true\ndescription: "Short description for SEO and previews"\ntags: [tag1, tag2, tag3]\ncanonical_url: https://github.com/librefang/librefang/releases/tag/vX.X.X\ncover_image: https://raw.githubusercontent.com/librefang/librefang/main/public/assets/logo.png\n---\n```\n\n### Required Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `title` | string | The article heading and page title |\n| `published` | boolean | Whether the article is publicly visible |\n| `description` | string | Meta description for SEO (150-160 characters recommended) |\n| `tags` | string[] | Categorization tags for filtering and discovery |\n\n### Optional Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `canonical_url` | string | Preferred URL for SEO (typically links to GitHub releases) |\n| `cover_image` | string | Hero image URL displayed in listings and social previews |\n\n### Publishing Status\n\nSet `published: false` to draft an article without removing it from the repository. The documentation site filters unpublished articles from public listings.\n\n## Article Structure\n\n### Release Notes Format\n\nRelease notes follow a standardized template for consistency across versions:\n\n```markdown\n---\n# ... frontmatter ...\n---\n\n# LibreFang {Version} Released\n\nOpening paragraph describing the release theme and significance.\n\n## What\'s New\n\n### Category Heading\nDescription of new features or changes.\n\n### Another Category\nAdditional changes.\n\n## Bug Fixes\n\n- Individual fix items\n- Listed as bullet points\n\n## Install / Upgrade\n\n```bash\n# Binary\ncurl -fsSL https://get.librefang.ai | sh\n\n# Rust SDK\ncargo add librefang\n\n# JavaScript SDK\nnpm install @librefang/sdk\n\n# Python SDK\npip install librefang-sdk\n```\n\n## Links\n\n- [Full Changelog](link)\n- [GitHub Release](link)\n- [GitHub](link)\n- [Discord](link)\n- [Contributing Guide](link)\n```\n\n### Introduction Articles Format\n\nIntroduction articles use a more narrative structure with feature highlights:\n\n```markdown\n---\n# ... frontmatter ...\n---\n\n# Article Title\n\nOpening paragraph introducing the topic.\n\n## Section Heading\n\nContent with code examples, tables, or lists.\n\n## Quick Start\n\n```bash\n# Terminal commands\n```\n\n## Contributing\n\nContribution guidelines with tables or lists.\n\n## Links\n\nExternal resources and related documentation.\n```\n\n## Common Patterns\n\n### Code Blocks\n\nInstall commands are consistently formatted across all release articles:\n\n```bash\n# Binary\ncurl -fsSL https://get.librefang.ai | sh\n\n# Rust SDK\ncargo add librefang\n\n# JavaScript SDK\nnpm install @librefang/sdk\n\n# Python SDK\npip install librefang-sdk\n```\n\n### Reference Links\n\nRelease notes reference GitHub issues and PRs using `#number` notation (e.g., `#441`, `#1170`). The documentation site transforms these into clickable links to the LibreFang repository.\n\n### Version Numbering\n\nThe project switched from semantic versioning (`0.x.x`) to calendar versioning (`YYYY.M.DDHH`) as of version `2026.3.21`:\n\n| Old Format | New Format | Example |\n|------------|------------|---------|\n| `0.5.6` | `YYYY.M.DDHH` | `2026.3.21` |\n\n### Feature Tables\n\nFeature comparison tables use pipe syntax:\n\n```markdown\n| Metric | Others | LibreFang |\n|--------|--------|-----------|\n| Cold Start | 2.5 ~ 4s | **180ms** |\n| Idle Memory | 180 ~ 250MB | **40MB** |\n```\n\n## Contributing New Articles\n\n### Writing Release Notes\n\n1. Create a new file named `articles/release-{version}.md`\n2. Copy the template from an existing release article\n3. Fill in the frontmatter with accurate version information\n4. Document changes under appropriate category headings\n5. Include the standard install/upgrade section\n6. Add links to the full changelog and GitHub release\n\n### Writing Introduction Articles\n\n1. Create a new file named `articles/{slug}.md`\n2. Include all required frontmatter fields\n3. Structure content with clear headings and examples\n4. Add a links section with relevant resources\n\n### Style Guidelines\n\n- **Headings**: Use sentence case for headings (e.g., "What\'s New" not "What\'s NEW")\n- **Code blocks**: Always specify the language for syntax highlighting\n- **Links**: Use descriptive link text, not "click here"\n- **Version references**: Use bold formatting for version numbers in prose\n- **Breaking changes**: Clearly mark breaking changes in release notes\n- **Description length**: Keep descriptions under 160 characters for SEO\n\n## Metadata Conventions\n\n### Tag Taxonomy\n\nCommon tags used across articles:\n\n| Tag | Usage |\n|-----|-------|\n| `rust` | Rust-related content |\n| `ai` | AI/ML features |\n| `opensource` | Open source announcements |\n| `release` | Version release notes |\n| `webdev` | Website-related content |\n\n### Cover Images\n\nAll articles reference the official LibreFang logo from the repository:\n\n```\nhttps://raw.githubusercontent.com/librefang/librefang/main/public/assets/logo.png\n```\n\n## Relationship to Documentation Site\n\nThe `articles/` directory integrates with the documentation site\'s content pipeline:\n\n1. **Frontmatter parsing**: The site reads YAML frontmatter to build article listings\n2. **Routing**: File names determine URL slugs (e.g., `release-0.6.0.md` → `/articles/release-0.6.0`)\n3. **Tag filtering**: Articles are filterable by tags on listing pages\n4. **SEO**: Canonical URLs and descriptions populate meta tags\n5. **Social preview**: Cover images appear in Open Graph and Twitter Card metadata\n\n## File Naming\n\nArticles use lowercase kebab-case for filenames:\n\n| Article Type | Naming Convention | Example |\n|--------------|-------------------|---------|\n| Release notes | `release-{version}.md` | `release-0.6.0.md` |\n| Announcements | `{topic}-{topic}.md` | `new-website-launch.md` |\n| Introductions | `{topic}.md` | `hello-librefang.md` |\n\nRelease note filenames match the GitHub release tag exactly (e.g., `release-2026.3.21.md` for tag `v2026.3.21`).',
                "documentation-docs":
                    '# Documentation — docs\n\n# LibreFang Documentation Site\n\nThe `docs/` directory contains the official LibreFang documentation website, a Next.js application that renders MDX content with syntax highlighting, search, and multi-language support.\n\n## Overview\n\nThis is a static documentation site that:\n\n- Renders MDX (Markdown + JSX) content from `src/app/`\n- Supports Chinese (default) and English locales\n- Provides full-text search via FlexSearch\n- Uses Shiki for syntax highlighting with custom themes\n- Exports as a fully static site for Cloudflare Pages deployment\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[MDX File] --> B[Remark Plugins]\n    B --> C[Rehype Plugins]\n    C --> D[Recma Plugins]\n    D --> E[HTML Output]\n    \n    F[Search Index] --> G[FlexSearch]\n    G --> H[Search UI]\n    H --> E\n    \n    I[Theme Provider] --> J[Light/Dark Mode]\n    J --> E\n```\n\n## Directory Structure\n\n```\ndocs/\n├── src/\n│   ├── app/              # Next.js App Router pages (MDX files)\n│   ├── components/       # Reusable React components\n│   ├── lib/              # Utility functions\n│   └── mdx/              # MDX processing plugins\n│       ├── remark.mjs    # Remark plugins (GFM, etc.)\n│       ├── rehype.mjs    # Rehype plugins (Shiki, etc.)\n│       └── recma.mjs     # Recma plugins\n├── next.config.mjs       # Next.js + MDX configuration\n├── postcss.config.js     # Tailwind CSS processing\n├── typography.ts         # Prose styling configuration\n└── package.json\n```\n\n## Key Components\n\n### MDX Processing Pipeline (`next.config.mjs`)\n\nThe MDX pipeline transforms Markdown files into React components through three stages:\n\n1. **Remark** — Markdown-aware transforms (GFM tables, footnotes)\n2. **Rehype** — HTML-aware transforms (Shiki syntax highlighting)\n3. **Recma** — AST transforms specific to MDX\n\n```javascript\nconst withMDX = nextMDX({\n  extension: /\\.mdx?$/,\n  options: {\n    remarkPlugins: remarkPlugins,\n    rehypePlugins: rehypePlugins,\n    recmaPlugins: recmaPlugins,\n  },\n});\n```\n\n### Custom MDX Components (`mdx-components.tsx`)\n\nProvides custom React components that override default MDX rendering. The `useMDXComponents` hook merges custom components with the defaults:\n\n```tsx\nimport * as mdxComponents from \'@/components/mdx\';\n\nexport function useMDXComponents(components: MDXComponents) {\n  return {\n    ...components,\n    ...mdxComponents,\n  };\n}\n```\n\nPlace custom components in `src/components/mdx/` to override elements like `pre`, `code`, `a`, etc.\n\n### Typography Configuration (`typography.ts`)\n\nDefines prose styling using Tailwind Typography with custom color tokens:\n\n- **Body text**: `zinc-700` (light) / `zinc-400` (dark)\n- **Headings**: `zinc-900` (light) / `white` (dark)\n- **Links**: `emerald-500` accent with hover state\n- **Code blocks**: `zinc-100` background with inset ring border\n\nThe configuration supports both light and dark modes through CSS variable inheritance.\n\n### Search Integration (`src/mdx/search.mjs`)\n\nAdds FlexSearch-based full-text search to the site. The plugin indexes MDX content at build time and provides search UI components.\n\n## Content Structure\n\n### Adding New Documentation\n\n1. Create a directory under `src/app/`, e.g., `src/app/new-feature/`\n2. Add `page.mdx` with your content\n3. Export a `sections` array for navigation:\n\n```mdx\n# New Feature\n\nDocumentation content here...\n\nexport const sections = [\n  { title: "Overview", id: "overview" },\n  { title: "Usage", id: "usage" },\n];\n```\n\n### Multi-Language Support\n\n| Route | Language |\n|-------|----------|\n| `/` | Chinese (default) |\n| `/en/` | English (synced from LibreFang repo) |\n\n## Build Configuration\n\n### Static Export\n\nThe site uses Next.js static export for Cloudflare Pages:\n\n```javascript\noutput: "export",\n```\n\nThis generates pure HTML/CSS/JS with no server-side rendering.\n\n### Shiki Integration\n\nShiki provides syntax highlighting with server-side processing (disabled `mdxRs`):\n\n```javascript\nserverExternalPackages: [\'shiki\'],\nexperimental: { mdxRs: false },\n```\n\nShiki runs at build time to transform code blocks into highlighted HTML.\n\n### Path Aliases\n\nTypeScript path aliases simplify imports across the monorepo:\n\n```json\n{\n  "paths": {\n    "@/*": ["./src/*"],\n    "@web/ui": ["../../packages/react/src/index.ts"],\n    "@web/config": ["../../packages/config/src/index.ts"]\n  }\n}\n```\n\n## Development Workflow\n\n```bash\n# Install dependencies\npnpm install\n\n# Start development server (port 3001)\npnpm dev\n\n# Build static site\npnpm build\n\n# Type checking\npnpm typecheck\n\n# Lint with Biome\npnpm lint\npnpm lint:fix\n\n# Format code\npnpm format\n```\n\n## Dependencies\n\n### Production\n\n| Package | Purpose |\n|---------|---------|\n| `next` 15.5.14 | Framework with App Router |\n| `@next/mdx` | MDX integration |\n| `shiki` 2.x | Syntax highlighting |\n| `flexsearch` | Full-text search |\n| `tailwindcss` 4.x | Styling |\n| `next-themes` | Dark/light mode |\n| `prism-react-renderer` | Code block components |\n| `motion` | Animations |\n\n### Development\n\n| Package | Purpose |\n|---------|---------|\n| `@tailwindcss/postcss` | Tailwind v4 processing |\n| `@tailwindcss/typography` | Prose styling |\n| `biome` | Linting and formatting |\n| `typescript` | Type checking |\n\n## Theme System\n\nThe site uses `next-themes` to manage light/dark mode. The typography configuration defines separate color sets for each mode:\n\n```javascript\ntypography: ({ theme }) => ({\n  DEFAULT: { /* light mode colors */ },\n  invert: { /* dark mode colors */ },\n})\n```\n\n## Deployment\n\nThe site auto-deploys to Cloudflare Pages via the static export. Cloudflare reads the `output: "export"` configuration and serves the generated `out/` directory.\n\n## CLI Profile Rotation Documentation\n\nThe `cli-profile-rotation.md` file demonstrates the site\'s documentation format with:\n\n- Conceptual explanation with ASCII diagrams\n- Step-by-step setup instructions\n- Reference tables for error handling\n- FAQ section for common questions\n\nThis pattern is used for all feature documentation within the site.',
                "documentation-src":
                    '# Documentation — src\n\n# LibreFang Documentation Site\n\nThe `docs/src/` directory contains the LibreFang documentation website built with Next.js and MDX. This is a comprehensive developer documentation portal that covers the entire LibreFang Agent Operating System, from core concepts to advanced configuration.\n\n## Overview\n\nThe documentation site serves as the primary reference for developers and users working with LibreFang. It covers:\n\n- **Agent System**: Templates, lifecycle, capabilities, and security\n- **Hands**: Pre-built autonomous agent packages\n- **Memory**: Persistent storage, vector search, and knowledge graphs\n- **Skills**: Pluggable tool bundles extending agent capabilities\n- **Plugins**: Context engine hooks for memory recall and context assembly\n- **Workflows**: Multi-step agent pipelines with branching and loops\n- **Architecture**: Internal system design and crate structure\n\n## Project Structure\n\n```\ndocs/\n├── src/\n│   ├── app/                    # Next.js App Router pages\n│   │   ├── agent/             # Agent documentation pages\n│   │   │   ├── hands/         # Autonomous hands guide\n│   │   │   ├── memory/        # Memory system docs\n│   │   │   ├── plugins/        # Context engine plugins\n│   │   │   ├── prompt-intelligence/  # A/B testing for prompts\n│   │   │   ├── skills/         # Skill development guide\n│   │   │   ├── templates/      # Agent template catalog\n│   │   │   └── workflows/     # Workflow engine guide\n│   │   ├── architecture/      # System architecture docs\n│   │   ├── layout.tsx         # Root layout with providers\n│   │   ├── page.tsx           # Home page\n│   │   └── providers.tsx      # Theme and section providers\n│   ├── components/             # React components\n│   │   ├── Layout.tsx         # Main layout wrapper\n│   │   ├── Navigation.tsx     # Sidebar navigation\n│   │   ├── MobileNavigation.tsx\n│   │   ├── Search.tsx         # Search interface\n│   │   ├── Header.tsx         # Page header\n│   │   ├── Code.tsx           # Code blocks with tabs\n│   │   ├── Heading.tsx        # Section headings\n│   │   ├── SectionProvider.tsx # Scroll tracking\n│   │   ├── NotificationCenter.tsx\n│   │   ├── ErrorBoundary.tsx\n│   │   └── ui/                # Reusable UI primitives\n│   ├── lib/                   # Utilities\n│   │   ├── utils.ts           # Helper functions\n│   │   ├── remToPx.ts         # CSS unit conversion\n│   │   └── useKeyboardShortcuts.ts\n│   ├── mdx/                   # MDX processing\n│   │   ├── search.mjs         # Search index generation\n│   │   └── rehype.mjs         # MDX transformation\n│   └── styles/                # Global styles\n├── public/                    # Static assets\n├── package.json\n└── next.config.js\n```\n\n## Core Components\n\n### Layout System\n\nThe layout system manages the overall page structure with persistent navigation:\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                    Header                               │\n│  [Logo]  [Search]                    [GitHub] [Theme]  │\n├─────────────┬───────────────────────────────────────────┤\n│             │                                           │\n│ Navigation  │           Content Area                     │\n│             │                                           │\n│ - Getting   │   # Page Title                            │\n│   Started   │                                           │\n│ - Agents    │   Documentation content rendered from      │\n│ - Hands     │   MDX files with custom components.        │\n│ - Memory    │                                           │\n│ - Skills    │                                           │\n│ - ...       │                                           │\n│             │                                           │\n└─────────────┴───────────────────────────────────────────┘\n```\n\n**Layout.tsx** wraps the application with theme providers and navigation. It integrates with the section tracking system to highlight the current page in the sidebar.\n\n### Navigation System\n\nThe navigation consists of three coordinated components:\n\n**Navigation.tsx** renders the sidebar with collapsible sections. It uses `useSectionStore` to track which sections are expanded and highlights the active page based on scroll position.\n\n**MobileNavigation.tsx** provides a drawer-style navigation for smaller screens. It shares state with the desktop navigation through `useIsInsideMobileNavigation`.\n\n**VisibleSectionHighlight** tracks which documentation section is currently visible in the viewport using scroll detection, updating the active navigation item accordingly.\n\n### Search System\n\nSearch provides full-text search across all documentation:\n\n```mermaid\ngraph LR\n    A[User Types] --> B[Search Component]\n    B --> C[Search Props Hook]\n    C --> D[Search Index]\n    D --> E[Results Display]\n    E --> F[onNavigate]\n    F --> G[Router Navigation]\n```\n\n**Search.tsx** implements the search interface with keyboard navigation. It uses `useSearchProps` to interface with the search index generated at build time.\n\n**Search index generation** (`mdx/search.mjs`):\n- Scans all MDX files\n- Extracts headings and content\n- Builds a searchable index\n- Excludes object expressions to reduce noise\n\n### Code Display\n\n**Code.tsx** handles syntax-highlighted code blocks with several features:\n\n- **Tab groups**: Multiple code samples in tabs (e.g., Bash, Python, JSON)\n- **Copy button**: One-click copy with visual feedback\n- **Panel titles**: Optional headers for code blocks\n- **Layout shift prevention**: Reserves space before content loads\n\nThe `useTabGroupProps` hook manages tab state, while `usePreventLayoutShift` ensures the UI doesn\'t jump when code loads.\n\n## Theming\n\nThe site supports light and dark themes through **providers.tsx**:\n\n```typescript\nThemeWatcher → onMediaChange → theme state → CSS variables\n```\n\n**ThemeWatcher** listens for system theme changes via `matchMedia` and updates the theme state accordingly. Theme classes are applied to the root element, and CSS variables define the color palette.\n\n## Section Tracking\n\n**SectionProvider.tsx** tracks which documentation sections are visible as users scroll:\n\n```typescript\nSectionProvider → useVisibleSections → Navigation highlight\n                         ↓\n              checkVisibleSections → scroll events\n```\n\nThis enables the sidebar to automatically expand the relevant section and highlight the current heading.\n\n## MDX Processing\n\nThe documentation uses MDX for rich content:\n\n**rehype.mjs** transforms MDX with:\n- Heading extraction for navigation\n- Code block processing\n- Custom component mapping\n\nCustom components available in MDX:\n- `<Note>` - Callout boxes for tips\n- `<Warning>` - Important warnings\n- Tables - Styled markdown tables\n- API endpoint tables - Specialized endpoint documentation\n\n## Key Execution Flows\n\n### Navigation Flow\n\n```\nUser clicks link → onNavigate → navigate function → router.push()\n                                       ↓\n                            Sidebar highlights section\n                            Content area updates\n```\n\n### Search Flow\n\n```\nUser opens search → type query → useSearchProps → search index\n                                                     ↓\n                              results displayed → select result\n                                                     ↓\n                                          onNavigate → navigate\n```\n\n### Page Load Flow\n\n```\nRequest → Layout → SectionProvider → Navigation\n                            ↓\n                    Page component → MDX render\n                            ↓\n                    Headings registered → Navigation updates\n```\n\n## Styling Approach\n\nThe documentation uses Tailwind CSS with CSS variables for theming. Custom styles in `src/styles/` handle:\n- Syntax highlighting theme\n- Custom scrollbar styling\n- Print styles\n- Responsive adjustments\n\n## Development Commands\n\n```bash\ncd docs\nnpm install\nnpm run dev      # Start development server\nnpm run build    # Production build\nnpm run lint     # ESLint checks\n```\n\n## Adding Documentation\n\n### New Page\n\n1. Create MDX file in appropriate `app/` subdirectory:\n\n```mdx\n# Page Title\n\nContent with **markdown** and custom components.\n```\n\n2. The page automatically appears in navigation based on file location.\n\n### Custom Components\n\nAdd reusable components to `src/components/`:\n\n```typescript\n// src/components/CustomComponent.tsx\nexport function CustomComponent({ children }) {\n  return <div className="custom-styling">{children}<\/div>;\n}\n```\n\nImport in MDX files:\n\n```mdx\nimport { CustomComponent } from \'@/components/CustomComponent\';\n\n<CustomComponent>\n  Content here\n<\/CustomComponent>\n```\n\n### Code Examples\n\nUse fenced code blocks with language identifiers:\n\n````mdx\n```typescript\nconst example = "with syntax highlighting";\n```\n````\n\nFor multi-language examples, use the tab syntax:\n\n````mdx\n```bash Tab="Bash"\necho "Hello"\n```\n\n```typescript Tab="TypeScript"\nconsole.log("Hello");\n```\n````\n\n## Configuration\n\nKey configuration files:\n\n- **next.config.js**: Next.js configuration, MDX support\n- **tailwind.config.js**: Theme colors, custom utilities\n- **tsconfig.json**: TypeScript path aliases (`@/` maps to `src/`)\n\n## Deployment\n\nThe documentation deploys to Vercel (or similar static hosting):\n\n```bash\nnpm run build  # Generates static output in .next/\n```\n\nThe site is fully static after build, suitable for CDN distribution.',
                documentation:
                    "# Documentation\n\n# Documentation\n\nThe Documentation module encompasses the complete tooling and content infrastructure for the LibreFang developer documentation portal at [docs.librefang.ai](https://docs.librefang.ai).\n\n## Structure\n\nThe module spans three interconnected areas:\n\n- **[src](documentation---src.md)** — Next.js application source code, including UI components, MDX processing pipeline, search integration, and internationalization\n- **[docs](documentation---docs.md)** — Static site export and configuration for Cloudflare Pages deployment\n- **[articles](documentation---articles.md)** — Markdown source files for blog posts, release notes, and announcements\n\n## How the Sub-modules Connect\n\nThe documentation system follows a straightforward content pipeline: articles are written as Markdown, processed through the MDX pipeline in `src/mdx/`, and rendered by Next.js components into a static site.\n\n```mermaid\nflowchart LR\n    A[Markdown Articles] --> B[Remark Plugins]\n    B --> C[Rehype Plugins]\n    C --> D[Recma Plugins]\n    D --> E[Next.js Components]\n    E --> F[Static HTML]\n    \n    G[Search Index] --> H[FlexSearch]\n    H --> I[Search UI]\n```\n\nThe `src` module owns the rendering and processing logic. `docs` contains the deployment configuration and static export. `articles` provides the raw content that flows through both.\n\n## Key Cross-Module Workflows\n\n### Search Indexing\n\nContent flows from MDX files through `extractSections` in `src/mdx/search.mjs` into FlexSearch. The `Search` component (`src/components/Search.tsx`) uses `useSearchProps` to provide the search interface, while `onKeyDown` handles keyboard navigation.\n\n### Navigation\n\n`SectionProvider` creates and manages section state via `createSectionStore`. `Navigation` components subscribe to this store through `useSectionStore`. The `NavigationGroup` component coordinates multiple navigation elements, using `lookupSections` to resolve section hierarchy and `toggleSections` for collapsible sections.\n\nActive page tracking flows from `ChatPage` and `OverviewPage` through the `navigate` function in Search component to `onNavigate`, updating the `ActivePageMarker` to reflect current location.\n\n### Internationalization\n\nThe site supports Chinese (default) and English locales. `withPrefix` in `src/lib/utils.ts` handles locale-aware path prefixing across `Layout`, `Navigation`, and related components.\n\n## Components with Cross-Module Dependencies\n\n| Component | Dependencies |\n|-----------|--------------|\n| `Search.tsx` | `useSearchProps`, `onKeyDown`, `navigate`, `onNavigate`, `MobileSearch` |\n| `Navigation.tsx` | `NavigationGroup`, `ActivePageMarker`, `VisibleSectionHighlight`, `withPrefix`, `remToPx` |\n| `SectionProvider.tsx` | `useVisibleSections`, `checkVisibleSections`, `createSectionStore` |\n| `Code.tsx` | `CodeGroup`, `useTabGroupProps`, `getPanelTitle`, `preventLayoutShift` |\n\nThese dependencies form the core UX layer that processes content and presents it to readers.",
                examples:
                    '# Examples\n\n# LibreFang Examples Module\n\nThis module provides reference implementations and templates for extending LibreFang. It covers three extension points: agents, channel adapters, and skills. Each subdirectory is self-contained and designed to be copied and modified.\n\n## Module Structure\n\n```\nexamples/\n├── custom-agent/              # Minimal agent template\n├── custom-channel/            # Guide for Rust channel adapters\n├── custom-skill-prompt/       # Prompt-only skill (TOML)\n├── custom-skill-python/       # Python skill with external runtime\n└── sidecar-channel-*/         # Language-agnostic adapters (Bash, Go, Node, Python)\n```\n\n## Agent Templates\n\n### `custom-agent/`\n\nA minimal agent configuration template in TOML format. Agents in LibreFang are configured declaratively—the TOML defines the model, system prompt, capabilities, and resource limits.\n\n**Key configuration sections:**\n\n```toml\n[model]\nprovider = "groq"\nmodel = "llama-3.3-70b-versatile"\nsystem_prompt = """..."""\n\n[capabilities]\ntools = ["web_fetch", "file_read", "file_list"]\nmemory_read = ["self.*"]\nmemory_write = ["self.*"]\n```\n\nTo spawn this agent:\n```bash\nlibrefang agent spawn examples/custom-agent/agent.toml\n```\n\nThe `module` field (`builtin:chat`) references a built-in skill that handles the actual message processing. Custom agent modules would point to a skill registered in the skill registry.\n\n## Channel Adapters (Rust)\n\n### `custom-channel/`\n\nA comprehensive guide to implementing a new channel adapter in Rust. This integrates directly into `crates/librefang-channels/src/` and is gated behind a Cargo feature flag.\n\n**Architecture overview:**\n\n```mermaid\nflowchart LR\n    A["External Platform\\n(Slack, Telegram, etc.)"] --> B["Channel Adapter\\n(Rust)"]\n    B --> C["ChannelMessage Stream"]\n    C --> D["LibreFang Kernel"]\n    D --> E["Response"]\n    E --> B\n    B --> A\n```\n\n**Required trait methods:**\n\n| Method | Purpose |\n|--------|---------|\n| `name()` | Identifier (e.g., `"slack"`) |\n| `channel_type()` | `ChannelType` enum variant |\n| `start()` | Returns `Stream<Item = ChannelMessage>` |\n| `send()` | Deliver response to platform |\n| `stop()` | Clean shutdown |\n\n**Security pattern for credentials:**\n\n```rust\nuse zeroize::Zeroizing;\n\npub struct MyPlatformAdapter {\n    // Zeroized so memory is wiped on drop\n    api_key: Zeroizing<String>,\n    shutdown_tx: Arc<watch::Sender<bool>>,\n    // ...\n}\n```\n\n**Shutdown coordination:**\n\n```rust\nlet (shutdown_tx, shutdown_rx) = watch::channel(false);\n\n// In start():\ntokio::select! {\n    _ = shutdown_rx.changed() => return,\n    // poll/platform logic\n}\n\n// In stop():\nlet _ = self.shutdown_tx.send(true);\n```\n\n**Feature gate registration** in `librefang-channels/Cargo.toml`:\n\n```toml\n[features]\nchannel-myplatform = []\nall-channels = ["channel-myplatform", "channel-slack", ...]\n```\n\n## Skills\n\nSkills are executable units that process messages. LibreFang supports two runtime types: `promptonly` (pure LLM) and `python` (external interpreter).\n\n### Prompt-Only Skill: `custom-skill-prompt/`\n\nUses only prompt engineering—no code. The template fills in user-provided variables:\n\n```toml\n[runtime]\ntype = "promptonly"\n\n[input]\ntopic = { type = "string", required = true }\nduration_minutes = { type = "string", required = true }\n\n[prompt]\ntemplate = """\nCreate a structured meeting agenda for:\nTopic: {{topic}}\nDuration: {{duration_minutes}} minutes\n..."""\n```\n\nTest with:\n```bash\nlibrefang skill test ./examples/custom-skill-prompt \\\n  --input \'{"topic": "Q1 planning", "duration_minutes": "30"}\'\n```\n\n### Python Skill: `custom-skill-python/`\n\nA skill with an external Python runtime. The skill loads `main.py` and calls `run(input: dict) -> str`:\n\n```python\ndef run(input: dict) -> str:\n    text = input.get("text", "")\n    words = len(text.split())\n    return f"Words: {words}\\n..."\n```\n\nConfiguration:\n```toml\n[runtime]\ntype = "python"\nentry = "main.py"\n\n[input]\ntext = { type = "string", description = "The text to analyze", required = true }\n```\n\n## Sidecar Channel Adapters\n\nSidecar adapters provide a **language-agnostic** way to bridge external platforms. Instead of writing Rust, you write a simple subprocess that communicates via JSON-RPC over stdin/stdout.\n\n### Protocol Overview\n\n```mermaid\nsequenceDiagram\n    participant LF as LibreFang\n    participant Adapter as Sidecar Process\n\n    Adapter->>LF: {"method": "ready"}\n    Note over LF: Spawns adapter subprocess\n    Note over LF: Consumes message stream\n\n    loop Message Loop\n        LF->>Adapter: {"method": "send", "params": {"channel_id": "...", "text": "..."}}\n        Adapter-->>LF: {"method": "message", "params": {"user_id": "...", "text": "...", ...}}\n    end\n\n    LF->>Adapter: {"method": "shutdown"}\n    Adapter->>LF: exit(0)\n```\n\n### Events (Adapter → LibreFang)\n\n```json\n{"method": "ready"}\n{"method": "message", "params": {"user_id": "...", "user_name": "...", "text": "...", "channel_id": "..."}}\n{"method": "error", "params": {"message": "..."}}\n```\n\n### Commands (LibreFang → Adapter)\n\n```json\n{"method": "send", "params": {"channel_id": "...", "text": "..."}}\n{"method": "shutdown"}\n```\n\n### Language Implementations\n\nAll four implementations follow the same pattern:\n\n1. Signal readiness via stdout\n2. Read JSON commands from stdin (one per line)\n3. Handle `send` by delivering to the platform\n4. Handle `shutdown` by exiting cleanly\n\n| Language | File | Notes |\n|----------|------|-------|\n| Python | `adapter.py` | Stdlib only, minimal echo adapter |\n| Python | `telegram_adapter.py` | Long-polling Telegram Bot API |\n| Python | `webhook_adapter.py` | HTTP server receiving webhooks |\n| Node.js | `adapter.js` | Echo adapter using `readline` |\n| Go | `adapter.go` | Echo adapter using `bufio.Scanner` |\n| Bash | `adapter.sh` | Minimal implementation using `jq` |\n\n### Configuration\n\nAdd to `config.toml`:\n\n```toml\n[[sidecar_channels]]\nname = "telegram"\ncommand = "python3"\nargs = ["examples/sidecar-channel-python/telegram_adapter.py"]\nenv = { TELEGRAM_BOT_TOKEN = "..." }\n```\n\n### Python: Telegram Adapter\n\nDemonstrates a real-world integration with long-polling:\n\n```python\ndef poll_updates(allowed_ids):\n    offset = 0\n    while True:\n        resp = requests.get(f"{API_BASE}/getUpdates", params={\n            "offset": offset,\n            "timeout": 30,\n        }, timeout=35)\n        for update in data.get("result", []):\n            offset = update["update_id"] + 1\n            send_event("message", {\n                "user_id": str(msg["from"]["id"]),\n                "user_name": user.get("first_name", "unknown"),\n                "text": msg["text"],\n                "channel_id": str(msg["chat"]["id"]),\n                "platform": "telegram",\n            })\n```\n\nWhitelist enforcement:\n```python\nif allowed_ids and user_id not in allowed_ids:\n    continue\n```\n\n### Python: Webhook Adapter\n\nDemonstrates receiving via HTTP server:\n\n```python\nclass WebhookHandler(BaseHTTPRequestHandler):\n    def do_POST(self):\n        body = self.rfile.read(content_length)\n        if WEBHOOK_SECRET:\n            sig = self.headers.get("X-Signature", "")\n            expected = hmac.new(WEBHOOK_SECRET.encode(), body, hashlib.sha256).hexdigest()\n            if not hmac.compare_digest(sig, expected):\n                self.send_response(401)\n                return\n        send_event("message", {...})\n```\n\n**Sending outbound** is a no-op for webhook-only integrations—acknowledge and log:\n\n```python\nelif method == "send":\n    sys.stderr.write(f"[webhook] outbound (no-op): {text}\\n")\n```\n\n## Connecting the Examples\n\nThe extension points connect through the LibreFang kernel:\n\n```mermaid\nflowchart TD\n    subgraph "Extension Types"\n        A["Agent TOML\\n(custom-agent/)"]\n        B["Rust Channel Adapter\\n(custom-channel/)"]\n        C["Skill TOML\\n(custom-skill-prompt/)"]\n        D["Python Skill\\n(custom-skill-python/)"]\n        E["Sidecar Adapter\\n(sidecar-channel-*/)"]\n    end\n\n    subgraph "Kernel Integration"\n        F["crates/librefang-core"]\n        G["crates/librefang-channels"]\n        H["crates/librefang-runtime"]\n    end\n\n    A --> F\n    B --> G\n    C --> H\n    D --> H\n    E --> G\n\n    F --> G\n    G --> H\n    H --> F\n```\n\n- **Agents** configure model selection, system prompts, and resource limits at the kernel level\n- **Channel adapters** (Rust or sidecar) feed messages into `ChannelBridge` in `librefang-channels`\n- **Skills** execute within `librefang-runtime`, which handles prompt rendering and response formatting\n\n## Testing Examples\n\n```bash\n# Build with a specific channel feature\ncargo build --workspace --features channel-myplatform\n\n# Test a Python skill\nlibrefang skill test ./examples/custom-skill-python \\\n  --input \'{"text": "Hello world"}\'\n\n# Lint the workspace\ncargo clippy --workspace --all-targets -- -D warnings\n```\n\n## Reference Adapters by Complexity\n\nWhen implementing a Rust channel adapter, study these in order:\n\n1. **ntfy** — SSE subscription + plain POST publishing\n2. **webhook** — HTTP server with HMAC-SHA256 verification\n3. **gotify** — WebSocket subscription + REST API publishing\n4. **slack** — WebSocket (Socket Mode) + Web API\n5. **telegram** — Long-polling + Bot API\n\nFor sidecar adapters, start with `adapter.py` (Python) or `adapter.sh` (Bash) for the minimal pattern, then extend to `telegram_adapter.py` or `webhook_adapter.py` for real-world platform integration.',
                "extensions-system":
                    '# Extensions System\n\n\n# LibreFang Extensions System\n\nThe Extensions System (`librefang-extensions`) provides one-click integration for MCP (Model Context Protocol) servers. It handles the complete lifecycle: discovering available integrations, authenticating with credentials, running OAuth flows, persisting install state, and monitoring server health with automatic reconnection.\n\n## Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph "Extensions Crate"\n        IR[Integration Registry]\n        CR[Credential Resolver]\n        HM[Health Monitor]\n        INST[Installer]\n        OAUTH[OAuth PKCE]\n        VAULT[Credential Vault]\n    end\n\n    IR --> INST\n    CR --> INST\n    VAULT --> CR\n    OAUTH --> VAULT\n    HM -.-> IR\n\n    subgraph "Storage"\n        TEMPLATES["~/.librefang/integrations/*.toml"]\n        INT_TOML["~/.librefang/integrations.toml"]\n        VAULT_ENC["~/.librefang/vault.enc"]\n        DOTENV["~/.librefang/.env"]\n    end\n\n    IR --> TEMPLATES\n    IR --> INT_TOML\n    VAULT --> VAULT_ENC\n    CR --> DOTENV\n\n    INT_TOML --> KERNEL[MCP Kernel Config]\n    VAULT --> MCP["MCP Server Process"]\n```\n\n## Core Types\n\n### IntegrationTemplate\n\nDescribes a bundled MCP server integration:\n\n```rust\npub struct IntegrationTemplate {\n    pub id: String,                    // "github", "slack", etc.\n    pub name: String,                  // Human-readable name\n    pub description: String,\n    pub category: IntegrationCategory,\n    pub transport: McpTransportTemplate,\n    pub required_env: Vec<RequiredEnvVar>,\n    pub oauth: Option<OAuthTemplate>,\n    pub health_check: HealthCheckConfig,\n}\n```\n\n**Transport templates** define how the MCP server is launched:\n\n```rust\npub enum McpTransportTemplate {\n    Stdio { command: String, args: Vec<String> },\n    Sse { url: String },\n    Http { url: String },\n}\n```\n\n### IntegrationStatus\n\nRepresents the current state of an integration:\n\n| Status | Meaning |\n|--------|---------|\n| `Ready` | Configured and MCP server running |\n| `Setup` | Installed but credentials missing |\n| `Available` | Not installed |\n| `Error(msg)` | MCP server errored |\n| `Disabled` | User disabled the integration |\n\n## Component Details\n\n### Integration Registry (`registry.rs`)\n\nManages integration templates and install state.\n\n**Key operations:**\n\n```rust\nimpl IntegrationRegistry {\n    // Load templates from ~/.librefang/integrations/*.toml\n    pub fn load_templates(&mut self, home_dir: &Path) -> usize;\n\n    // Load/save installed state from integrations.toml\n    pub fn load_installed(&mut self) -> ExtensionResult<usize>;\n    pub fn save_installed(&self) -> ExtensionResult<()>;\n\n    // Template lookups\n    pub fn get_template(&self, id: &str) -> Option<&IntegrationTemplate>;\n    pub fn search(&self, query: &str) -> Vec<&IntegrationTemplate>;\n    pub fn list_by_category(&self, category: &IntegrationCategory) -> Vec<&IntegrationTemplate>;\n\n    // Install management\n    pub fn install(&mut self, entry: InstalledIntegration) -> ExtensionResult<()>;\n    pub fn uninstall(&mut self, id: &str) -> ExtensionResult<()>;\n    pub fn set_enabled(&mut self, id: &str, enabled: bool) -> ExtensionResult<()>;\n\n    // Convert to kernel config for MCP server spawning\n    pub fn to_mcp_configs(&self) -> Vec<McpServerConfigEntry>;\n}\n```\n\n**Template loading:** Templates are TOML files in `~/.librefang/integrations/` with the integration ID as the filename (e.g., `github.toml`). Each file contains a complete `IntegrationTemplate` struct.\n\n**Persistence:** Install state lives in `~/.librefang/integrations.toml`:\n\n```toml\n[[installed]]\nid = "github"\ninstalled_at = "2026-02-23T10:00:00Z"\nenabled = true\noauth_provider = null\n\n[[installed]]\nid = "google-calendar"\ninstalled_at = "2026-02-23T10:05:00Z"\nenabled = true\noauth_provider = "google"\n```\n\n### Credential Vault (`vault.rs`)\n\nAES-256-GCM encrypted secret storage. Secrets persist in `~/.librefang/vault.enc`.\n\n**File format:**\n- Magic bytes: `OFV1` (Older Fang Vault v1)\n- JSON body with `version`, `salt`, `nonce`, `ciphertext` (all base64)\n\n**Key derivation:** Argon2id derives a 256-bit encryption key from the master key + random salt.\n\n**Master key resolution order:**\n\n```mermaid\nsequenceDiagram\n    participant Vault\n    participant Keyring as OS Keyring<br/>(Keychain/Credential Manager/Secret Service)\n    participant Env as LIBREFANG_VAULT_KEY\n\n    Vault->>Vault: Check cached_key\n    alt Cached key available\n        Vault-->>Vault: Return cached key\n    else No cache\n        Vault->>Keyring: load_keyring_key()\n        alt Keyring has key\n            Keyring-->>Vault: Return key\n        else Keyring unavailable\n            Vault->>Env: Read env var\n            alt Env var set\n                Env-->>Vault: Return key\n            else No env var\n                Vault-->>Vault: ExtensionError::VaultLocked\n            end\n        end\n    end\n```\n\n**Keyring storage:** When OS keyring access fails, the system falls back to a file-based keyring (`~/.local/share/librefang/.keyring`) that wraps the master key with AES-256-GCM using a machine-specific wrapping key derived from username, hostname, and Argon2id.\n\n**Vault operations:**\n\n```rust\nimpl CredentialVault {\n    // Initialize new vault (generates and stores master key)\n    pub fn init(&mut self) -> ExtensionResult<()>;\n\n    // Unlock existing vault\n    pub fn unlock(&mut self) -> ExtensionResult<()>;\n\n    // Secret management\n    pub fn get(&self, key: &str) -> Option<Zeroizing<String>>;\n    pub fn set(&mut self, key: String, value: Zeroizing<String>) -> ExtensionResult<()>;\n    pub fn remove(&mut self, key: &str) -> ExtensionResult<bool>;\n    pub fn list_keys(&self) -> Vec<&str>;\n\n    // State queries\n    pub fn is_unlocked(&self) -> bool;\n    pub fn exists(&self) -> bool;\n}\n```\n\n### Credential Resolver (`credentials.rs`)\n\nResolves credentials from multiple sources in priority order:\n\n```mermaid\nflowchart LR\n    A[Resolve key] --> B{Vault unlocked?}\n    B -->|Yes| C[Check vault]\n    B -->|No| D[Skip vault]\n    C --> E{Found?}\n    D --> F[Check .env]\n    E -->|Yes| Z[Return value]\n    E -->|No| F\n    F --> G{Found in .env?}\n    G -->|Yes| Z\n    G -->|No| H{Check env var}\n    H -->|Yes| Z\n    H -->|No| I{Interactive?}\n    I -->|Yes| J[Prompt user]\n    I -->|No| K[Return None]\n    J --> Z\n```\n\n```rust\nimpl CredentialResolver {\n    pub fn resolve(&self, key: &str) -> Option<Zeroizing<String>>;\n    pub fn has_credential(&self, key: &str) -> bool;\n    pub fn resolve_all(&self, keys: &[&str]) -> HashMap<String, Zeroizing<String>>;\n    pub fn missing_credentials(&self, keys: &[&str]) -> Vec<String>;\n    pub fn store_in_vault(&mut self, key: &str, value: Zeroizing<String>) -> ExtensionResult<()>;\n}\n```\n\n### OAuth2 PKCE (`oauth.rs`)\n\nHandles OAuth flows for Google, GitHub, Microsoft, and Slack.\n\n**Flow:**\n\n```mermaid\nsequenceDiagram\n    participant App\n    participant Browser\n    participant CallbackServer as localhost:port/callback\n    participant Provider as OAuth Provider\n\n    App->>App: Generate PKCE pair (verifier, challenge)\n    App->>App: Start callback server on random port\n    App->>Browser: Open auth URL with code_challenge\n    Browser->>Provider: Authorization request\n    Provider->>Browser: User consent page\n    Browser-->>Provider: User approves\n    Provider->>CallbackServer: Redirect with code + state\n    CallbackServer-->>App: Receive code\n    App->>Provider: Exchange code + verifier for tokens\n    Provider-->>App: access_token, refresh_token\n    App->>App: Store tokens in vault\n```\n\n```rust\npub async fn run_pkce_flow(\n    oauth: &OAuthTemplate,\n    client_id: &str,\n) -> ExtensionResult<OAuthTokens>\n```\n\n**Configuration:** Client IDs are resolved from `librefang_types::config::OAuthConfig` with fallback defaults. Users should configure their own client IDs in the config file for production use.\n\n### Health Monitor (`health.rs`)\n\nTracks MCP server health and manages reconnection with exponential backoff.\n\n```rust\nimpl HealthMonitor {\n    pub fn register(&self, id: &str);\n    pub fn unregister(&self, id: &str);\n\n    pub fn report_ok(&self, id: &str, tool_count: usize);\n    pub fn report_error(&self, id: &str, error: String);\n\n    pub fn get_health(&self, id: &str) -> Option<IntegrationHealth>;\n    pub fn all_health(&self) -> Vec<IntegrationHealth>;\n\n    pub fn should_reconnect(&self, id: &str) -> bool;\n    pub fn backoff_duration(&self, attempt: u32) -> Duration;\n}\n```\n\n**Backoff schedule:** `5s → 10s → 20s → 40s → ...` capped at 5 minutes, with a maximum of 10 reconnect attempts.\n\n**IntegrationHealth struct:**\n\n```rust\npub struct IntegrationHealth {\n    pub id: String,\n    pub status: IntegrationStatus,\n    pub tool_count: usize,\n    pub last_ok: Option<DateTime<Utc>>,\n    pub last_error: Option<String>,\n    pub consecutive_failures: u32,\n    pub reconnecting: bool,\n    pub reconnect_attempts: u32,\n    pub connected_since: Option<DateTime<Utc>>,\n}\n```\n\n### Installer (`installer.rs`)\n\nProvides the one-click installation experience:\n\n```rust\npub fn install_integration(\n    registry: &mut IntegrationRegistry,\n    resolver: &mut CredentialResolver,\n    id: &str,\n    provided_keys: &HashMap<String, String>,\n) -> ExtensionResult<InstallResult>\n\npub fn remove_integration(\n    registry: &mut IntegrationRegistry,\n    id: &str,\n) -> ExtensionResult<String>\n\npub fn list_integrations(\n    registry: &IntegrationRegistry,\n    resolver: &CredentialResolver,\n) -> Vec<IntegrationListEntry>\n\npub fn search_integrations(\n    registry: &IntegrationRegistry,\n    query: &str,\n) -> Vec<IntegrationListEntry>\n```\n\n**Install flow:**\n\n```mermaid\nflowchart TD\n    A[librefang add github] --> B[Lookup template in registry]\n    B --> C{Template found?}\n    C -->|No| D[Error: NotFound]\n    C -->|Yes| E{Already installed?}\n    E -->|Yes| F[Error: AlreadyInstalled]\n    E -->|No| G[Store provided keys in vault]\n    G --> H{Check all required credentials}\n    H --> I{All credentials present?}\n    I -->|Yes| J[Status: Ready]\n    I -->|No| K[Status: Setup]\n    J --> L[Write to integrations.toml]\n    K --> L\n    L --> M[Return InstallResult]\n```\n\n## Usage Example\n\n```rust\nuse librefang_extensions::{IntegrationRegistry, CredentialResolver, CredentialVault};\nuse std::path::Path;\n\n// Initialize components\nlet home = Path::new("~/.librefang");\nlet mut registry = IntegrationRegistry::new(home);\nregistry.load_templates(home)?;\nregistry.load_installed()?;\n\n// Set up credential resolution\nlet mut vault = CredentialVault::new(home.join("vault.enc"));\nvault.unlock().ok(); // May fail if vault not initialized\nlet resolver = CredentialResolver::new(Some(vault), Some(&home.join(".env")));\n\n// List available integrations\nlet integrations = installer::list_integrations(&registry, &resolver);\nfor entry in &integrations {\n    println!("{} {} [{}]", entry.icon, entry.name, entry.status);\n}\n\n// Search and install\nlet results = installer::search_integrations(&registry, "git");\nif !results.is_empty() {\n    let result = installer::install_integration(\n        &mut registry,\n        &mut resolver,\n        &results[0].id,\n        &HashMap::new(),\n    )?;\n    println!("{}", result.message);\n}\n\n// Convert to MCP kernel config\nlet mcp_configs = registry.to_mcp_configs();\n// mcp_configs can be merged into the kernel\'s server list\n```\n\n## Error Handling\n\n```rust\npub enum ExtensionError {\n    NotFound(String),              // Integration not in registry\n    AlreadyInstalled(String),     // Attempted duplicate install\n    NotInstalled(String),         // Uninstall target missing\n    CredentialNotFound(String),  // Secret resolution failed\n    Vault(String),                // Vault operation failed\n    VaultLocked,                  // Vault locked, needs unlock\n    OAuth(String),                // OAuth flow error\n    TomlParse(String),            // TOML parsing failed\n    Io(std::io::Error),\n    Http(String),\n    HealthCheck(String),\n}\n```\n\n## Key Design Decisions\n\n### 1. Vault-First Credential Storage\n\nCredentials default to the encrypted vault, with fallbacks for convenience. This balances security (credentials at rest are encrypted) with usability (env vars and dotenv work for development).\n\n### 2. Template-Based Integration Discovery\n\nTemplates live on disk as TOML files, making them:\n- Easy to browse without loading the crate\n- Simple to add custom integrations\n- Debuggable with standard tools\n\n### 3. PKCE-Only OAuth\n\nThe OAuth implementation uses PKCE (Proof Key for Code Exchange), which:\n- Doesn\'t require a client secret\n- Protects against authorization code interception\n- Works with public/client-side applications\n\n### 4. Non-Blocking Vault Unlock\n\nThe vault caches the master key after first unlock to avoid repeated OS keyring or env var lookups during credential resolution. The key is zeroized on drop.\n\n### 5. OFV1 Magic Bytes\n\nThe vault file format starts with `OFV1` magic bytes to distinguish it from plain JSON and provide forward compatibility for future format changes.',
                internationalization:
