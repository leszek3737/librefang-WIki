var PAGES = {"agent-kernel-librefang-kernel-handle-src":"# Agent Kernel — librefang-kernel-handle-src\n\n# librefang-kernel-handle\n\nTrait abstraction that decouples the agent runtime from the kernel, enabling inter-agent operations without circular dependencies.\n\n## Purpose\n\n`librefang-runtime` needs to invoke kernel-level operations—spawning agents, sending messages, managing tasks—but cannot depend directly on `librefang-kernel` without creating a circular crate graph. This module solves that by defining the `KernelHandle` trait. The kernel implements the trait concretely and injects it into the agent loop at startup. The runtime then calls through the trait object, knowing nothing about the kernel's internals.\n\n```mermaid\ngraph TD\n    K[librefang-kernel<br/>implements KernelHandle] -->|passes &dyn KernelHandle| R[librefang-runtime<br/>agent_loop / tool_runner]\n    H[librefang-kernel-handle<br/>defines trait] -.->|used by| R\n    H -.->|implemented by| K\n    R -->|spawn_agent, send_to_agent,<br/>memory_store, task_post, ...| H\n```\n\n## Key Components\n\n### `AgentInfo`\n\nData transfer object returned by discovery and listing operations:\n\n| Field | Type | Description |\n|---|---|---|\n| `id` | `String` | Agent UUID |\n| `name` | `String` | Human-readable name |\n| `state` | `String` | Current lifecycle state |\n| `model_provider` | `String` | LLM provider (e.g. `\"openai\"`) |\n| `model_name` | `String` | Model identifier |\n| `description` | `String` | Agent purpose description |\n| `tags` | `Vec<String>` | Classification labels |\n| `tools` | `Vec<String>` | Tool names the agent can use |\n\n### `KernelHandle` trait\n\nAn `#[async_trait]` with `Send + Sync` bounds. Every method provides a safe default—either a no-op or an error string like `\"Cron scheduler not available\"`—so implementors only need to override the subsystems they support.\n\n## Method Reference by Subsystem\n\n### Agent Lifecycle\n\n| Method | Sync/Async | Returns | Description |\n|---|---|---|---|\n| `spawn_agent(manifest_toml, parent_id)` | async | `(id, name)` | Spawn from TOML manifest. `parent_id` tracks lineage. |\n| `spawn_agent_checked(manifest_toml, parent_id, parent_caps)` | async | `(id, name)` | Same as `spawn_agent` but verifies child capabilities are a subset of `parent_caps`. Default delegates to `spawn_agent` with no enforcement. |\n| `send_to_agent(agent_id, message)` | async | `String` | Send a message to another agent and return its response. |\n| `list_agents()` | sync | `Vec<AgentInfo>` | All running agents. |\n| `find_agents(query)` | sync | `Vec<AgentInfo>` | Case-insensitive match on name substring, tag, or tool name. |\n| `kill_agent(agent_id)` | sync | `()` | Terminate an agent by ID. |\n\n### Shared Memory\n\nAll memory methods accept an optional `peer_id` for namespace isolation—when provided, keys are scoped to that peer so different users of the same agent get independent memory.\n\n| Method | Description |\n|---|---|\n| `memory_store(key, value, peer_id)` | Write a JSON value. |\n| `memory_recall(key, peer_id)` | Read a value; returns `None` if missing. |\n| `memory_list(peer_id)` | List all keys in the namespace. |\n\n### Task Queue\n\n| Method | Async | Description |\n|---|---|---|\n| `task_post(title, description, assigned_to, created_by)` | yes | Create a task; returns task ID. |\n| `task_claim(agent_id)` | yes | Claim the next available task; returns task JSON or `None`. |\n| `task_complete(task_id, result)` | yes | Mark done with result string. |\n| `task_list(status)` | yes | Filter by status (`Some(\"pending\")`) or list all. |\n| `task_delete(task_id)` | yes | Delete; returns whether it existed. |\n| `task_retry(task_id)` | yes | Reset to pending; returns whether it was reset. |\n\n### Knowledge Graph\n\n| Method | Description |\n|---|---|\n| `knowledge_add_entity(entity)` | Insert an `Entity` node. |\n| `knowledge_add_relation(relation)` | Insert a `Relation` edge. |\n| `knowledge_query(pattern)` | Match against a `GraphPattern`, returning `Vec<GraphMatch>`. |\n\nTypes come from `librefang_types::memory`.\n\n### Events\n\n`publish_event(event_type, payload)` — fires a custom event that can trigger proactive agents listening for that type.\n\n### Cron / Scheduling\n\nAll default to `\"Cron scheduler not available\"`.\n\n| Method | Description |\n|---|---|\n| `cron_create(agent_id, job_json)` | Create a scheduled job for the agent. |\n| `cron_list(agent_id)` | List the agent's jobs. |\n| `cron_cancel(job_id)` | Cancel a job. |\n\n### Approval System\n\nControls which tool executions require human approval before proceeding.\n\n| Method | Sync | Description |\n|---|---|---|\n| `requires_approval(tool_name)` | yes | Simple policy check. Default: `false`. |\n| `requires_approval_with_context(tool_name, sender_id, channel)` | yes | Context-aware check. Default falls back to `requires_approval`. |\n| `is_tool_denied_with_context(tool_name, sender_id, channel)` | yes | Hard denial—tool cannot run at all. Default: `false`. |\n| `request_approval(agent_id, tool_name, action_summary)` | no (async) | Blocks until approved/denied/timed out. Default: auto-approve. |\n| `submit_tool_approval(agent_id, tool_name, action_summary, deferred)` | no (async) | Non-blocking submission; returns `ToolApprovalSubmission` immediately. |\n| `resolve_tool_approval(request_id, decision, decided_by, totp_verified, user_id)` | no (async) | Approve/reject a pending request; returns the deferred payload for execution. |\n| `get_approval_status(request_id)` | yes | Poll current state of a request. Default: `None`. |\n\nThe approval flow involves three participants:\n1. **tool_runner** calls `request_approval` or `submit_tool_approval` during tool execution\n2. **HTTP routes** (`approve_request`, `reject_request`, `modify_request` in `src/routes/system.rs`) call `resolve_tool_approval` to enact a human decision\n3. The deferred tool execution is then either run or discarded\n\n### Hands (Autonomous Specialized Agents)\n\nAll default to `\"Hands system not available\"`.\n\n| Method | Description |\n|---|---|\n| `hand_list()` | List Hands and activation status. |\n| `hand_install(toml_content, skill_content)` | Install a Hand from TOML + skill definition. |\n| `hand_activate(hand_id, config)` | Spawn the Hand's specialized agent. |\n| `hand_status(hand_id)` | Dashboard metrics for an active Hand. |\n| `hand_deactivate(instance_id)` | Stop a running Hand. |\n\n### A2A (Agent-to-Agent Protocol)\n\n| Method | Description |\n|---|---|\n| `list_a2a_agents()` | Discovered external agents as `(name, url)` pairs. Default: empty. |\n| `get_a2a_agent_url(name)` | Look up a specific agent's URL. Default: `None`. |\n\n### Channel Messaging\n\nAll default to `\"Channel ... not available\"`. Used by `tool_channel_send` in the runtime.\n\n| Method | Description |\n|---|---|\n| `send_channel_message(channel, recipient, message, thread_id)` | Text message to a user via an adapter (e.g. `\"telegram\"`). |\n| `send_channel_media(channel, recipient, media_type, media_url, caption, filename, thread_id)` | Image or file by URL. |\n| `send_channel_file_data(channel, recipient, data, filename, mime_type, thread_id)` | Raw bytes from a local file. |\n| `send_channel_poll(channel, recipient, question, options, is_quiz, correct_option_id, explanation)` | Poll/quiz message. |\n\n### Heartbeat\n\n`touch_heartbeat(agent_id)` — resets the agent's `last_active` timestamp. Called during long-running LLM calls inside `run_agent_loop_streaming` and `run_agent_loop` to prevent the health monitor from marking the agent as stale.\n\n### Prompt Versioning & Experiments\n\nEnables A/B testing and version control of agent system prompts.\n\n**Prompt versions** — default to `\"Prompt store not available\"` for mutations, empty/`None` for reads:\n\n| Method | Description |\n|---|---|\n| `get_prompt_version(version_id)` | Retrieve a specific version. |\n| `list_prompt_versions(agent_id)` | All versions for an agent. |\n| `create_prompt_version(version)` | Store a new version. |\n| `delete_prompt_version(version_id)` | Remove a version. |\n| `set_active_prompt_version(version_id, agent_id)` | Mark a version as live. |\n| `auto_track_prompt_version(agent_id, system_prompt)` | Called from `build_prompt_setup` to auto-track changes. Default: no-op. |\n\n**Experiments** — A/B test framework for prompt variants:\n\n| Method | Description |\n|---|---|\n| `get_running_experiment(agent_id)` | Active experiment for the agent. |\n| `record_experiment_request(experiment_id, variant_id, latency_ms, cost_usd, success)` | Log per-request metrics. Default: no-op. |\n| `list_experiments(agent_id)` | All experiments for an agent. |\n| `create_experiment(experiment)` | Create a new experiment. |\n| `get_experiment(experiment_id)` | Retrieve by ID. |\n| `update_experiment_status(experiment_id, status)` | Transition status (e.g. running → completed). |\n| `get_experiment_metrics(experiment_id)` | Aggregated metrics per variant. |\n\n### Goals\n\n| Method | Description |\n|---|---|\n| `goal_list_active(agent_id)` | Pending/in-progress goals, optionally filtered. Default: empty. |\n| `goal_update(goal_id, status, progress)` | Update status and/or progress percentage. Default: error. |\n\n### Workflows\n\n`run_workflow(workflow_id, input)` — execute a workflow by UUID or name. Returns `(run_id, output)`. Default: `\"Workflow engine not available\"`.\n\n### Forked Agent Execution\n\n```rust\nasync fn run_forked_agent_oneshot(\n    &self,\n    agent_id: &str,\n    prompt: &str,\n    allowed_tools: Option<Vec<String>>,\n) -> Result<String, String>;\n```\n\nA specialized primitive used by the proactive memory extractor (`try_forked_extract` in `librefang-runtime/src/proactive_memory.rs`). It runs a forked agent turn that collapses to a single text response. Key properties:\n\n- The forked call shares the parent turn's `(system + tools + messages)` prefix, preserving Anthropic prompt cache alignment.\n- Messages from the fork do **not** persist into the agent's canonical session.\n- The turn-end hook fires with `is_fork: true` so auto-dream won't recurse.\n- Passing `allowed_tools = Some(vec![])` forces a single-turn text-only response.\n\nDefault: `\"run_forked_agent_oneshot not available\"`.\n\n### Configuration Accessors\n\n| Method | Default | Description |\n|---|---|---|\n| `tool_timeout_secs()` | `120` | Seconds before a tool execution is killed. Used by `execute_single_tool_call`. |\n| `max_agent_call_depth()` | `5` | Maximum nesting of inter-agent calls. Enforced by `tool_agent_send`. |\n\n## Internal Delegation\n\nTwo methods delegate to other trait methods by default:\n\n- **`requires_approval_with_context`** → falls back to `requires_approval(tool_name)`, ignoring sender/channel. Override when policy needs per-user or per-channel rules.\n- **`spawn_agent_checked`** → falls back to `spawn_agent(manifest_toml, parent_id)`, ignoring `parent_caps`. The real kernel **must** override this to enforce capability inheritance.\n\n## Implementation Notes\n\nWhen implementing `KernelHandle` for a real or test kernel:\n\n1. **Required methods** — `spawn_agent`, `send_to_agent`, `list_agents`, `kill_agent`, and the memory/task/knowledge methods have no default and **must** be implemented.\n2. **Optional subsystems** — cron, approvals, Hands, A2A, channels, prompts, experiments, goals, workflows, and forked execution all have safe defaults. Override only the subsystems your kernel supports.\n3. **Thread safety** — the trait requires `Send + Sync`. Implementations must be safe to call from async contexts across threads.\n4. **Testing** — for unit tests that don't need a full kernel, implement only the methods under test and let the remaining defaults return errors. The error strings (e.g. `\"Cron scheduler not available\"`) are stable enough to match against in test assertions.","agent-kernel-librefang-kernel-metering-src":"# Agent Kernel — librefang-kernel-metering-src\n\n# Agent Kernel — Metering Engine\n\n## Overview\n\n`librefang-kernel-metering` is the cost accounting and budget enforcement layer for LibreFang. Every LLM call passes through this module to have its cost estimated, recorded, and checked against spending limits before and after execution. The engine operates on three independent budget axes—per-agent, per-provider, and global—each with hourly, daily, and monthly windows.\n\nAll persistent state lives in a SQLite-backed `UsageStore` (from `librefang-memory`), wrapped here in an `Arc` so the engine can be freely cloned across tasks.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LLM Call Completes] --> B[check_all_and_record]\n    B --> C{SQLite Transaction}\n    C --> D[Per-Agent Quota Check]\n    C --> E[Per-Provider Budget Check]\n    C --> F[Global Budget Check]\n    D -- pass --> G[INSERT usage record]\n    E -- pass --> G\n    F -- pass --> G\n    D -- fail --> H[Rollback + QuotaExceeded]\n    E -- fail --> H\n    F -- fail --> H\n```\n\nThe preferred entry point for the runtime is `check_all_and_record`, which performs all quota/budget checks **and** the insert inside a single SQLite transaction. This eliminates the TOCTOU race that would exist if you called `check_quota` then `record` separately—concurrent requests could both pass the check before either writes its row.\n\n## Key Types\n\n### `MeteringEngine`\n\nThe main public struct. Construct it with `MeteringEngine::new(store)` where `store` is an `Arc<UsageStore>`.\n\n```rust\nlet substrate = MemorySubstrate::open(path)?;\nlet store = Arc::new(UsageStore::new(substrate.usage_conn()));\nlet engine = MeteringEngine::new(store);\n```\n\nThe engine is stateless beyond the store reference—all query and mutation logic delegates to `UsageStore`.\n\n### `BudgetStatus`\n\nA serializable snapshot of current spend versus limits across all time windows. Returned by `budget_status()` for dashboard/alerting use. Fields include `hourly_spend`, `hourly_limit`, `hourly_pct` (and daily/monthly equivalents), plus the configured `alert_threshold` and `default_max_llm_tokens_per_hour`.\n\n## Quota and Budget Enforcement\n\n### Three Enforcement Scopes\n\n| Scope | Config type | What it limits | Check method |\n|-------|------------|----------------|--------------|\n| Per-agent | `ResourceQuota` | Individual agent spending | `check_quota` |\n| Per-provider | `ProviderBudget` | Spending through a specific LLM provider (e.g. moonshot) | `check_provider_budget` |\n| Global | `BudgetConfig` | Total system-wide spending | `check_global_budget` |\n\nEach scope supports three time windows: hourly, daily, and monthly. A limit of `0.0` means **no enforcement** for that window—checks are skipped entirely.\n\n### Atomic vs. Non-Atomic Operations\n\n**Non-atomic (separate check + record):**\n- `check_quota` → `record` — two separate database operations. Fine for dashboards or pre-dispatch gating where exact enforcement isn't critical.\n- `check_global_budget` — standalone global check.\n- `check_provider_budget` — standalone provider check.\n\n**Atomic (single transaction):**\n- `check_quota_and_record` — per-agent check + insert in one transaction.\n- `check_global_budget_and_record` — global check + insert.\n- **`check_all_and_record`** — per-agent **and** global **and** per-provider, all in one transaction. This is the method the runtime should call after every LLM completion.\n\n### Per-Provider Budgets\n\nProvider-specific budgets are stored in `BudgetConfig.providers` as a `HashMap<String, ProviderBudget>`. When `check_all_and_record` processes a `UsageRecord`, it looks up the record's `provider` field in that map. If the provider has no configured budget, provider-level enforcement is skipped for that request.\n\n`ProviderBudget` also supports `max_tokens_per_hour` — a token-volume limit independent of cost, useful for rate-limited subscription plans.\n\nOn failure, the record is **not inserted**. The transaction rolls back entirely.\n\n## Cost Estimation\n\nCost estimation is separate from quota enforcement. The runtime estimates cost before recording, but the metering engine also provides helpers.\n\n### `estimate_cost` (static, no catalog)\n\nUses hardcoded default rates: **$1.00 per million input tokens, $3.00 per million output tokens**. Useful for unit tests or when no catalog is available.\n\n```rust\nlet cost = MeteringEngine::estimate_cost(\"any-model\", input_tokens, output_tokens, cache_read, cache_creation);\n```\n\n### `estimate_cost_with_catalog` (static, with catalog)\n\nLooks up the model in a `ModelCatalog` to get real pricing. Falls back to default rates if the model is unknown.\n\n```rust\nlet cost = MeteringEngine::estimate_cost_with_catalog(&catalog, \"claude-sonnet-4-20250514\", input, output, cache_read, cache_creation);\n```\n\n**Special case — ChatGPT session-auth models:** When a model's catalog entry has both `input_cost_per_m` and `output_cost_per_m` equal to zero **and** its provider is `\"chatgpt\"`, the engine applies the legacy default rates ($1/$3 per million) instead of returning $0. This gives conservative budget estimates for session-authenticated models whose actual billing is opaque. See `should_use_legacy_budget_estimate`.\n\n**Special case — Local models:** Zero-priced models from non-chatgpt providers (e.g., local-tier models) correctly return $0.00 cost.\n\n**Subscription-based providers** (e.g., `alibaba-coding-plan`): These have zero per-token costs in the catalog. Cost tracking shows $0.00; usage must be monitored via the provider's console.\n\n### Cache Token Pricing\n\nThe cost calculation distinguishes four token categories:\n\n| Token Type | Price Formula |\n|-----------|---------------|\n| Regular input | `tokens / 1M × input_rate` |\n| Cache-read input | `tokens / 1M × input_rate × 0.10` |\n| Cache-creation input | `tokens / 1M × input_rate × 1.25` |\n| Output | `tokens / 1M × output_rate` |\n\nRegular input tokens are derived as `total_input - cache_read - cache_creation`, using saturating subtraction. This matches Anthropic-style prompt caching economics where reading a cached prompt is cheap but first-time cache population is slightly more expensive.\n\n## Query Methods\n\n| Method | Returns | Description |\n|--------|---------|-------------|\n| `get_summary(agent_id)` | `UsageSummary` | Aggregate stats (call count, token totals) optionally filtered by agent |\n| `get_by_model()` | `Vec<ModelUsage>` | Usage broken down by model |\n| `budget_status(budget)` | `BudgetStatus` | Current spend vs. limits for all windows |\n| `cleanup(days)` | `usize` | Delete records older than N days, returns count of deleted rows |\n\n## Error Handling\n\nAll enforcement methods return `LibreFangResult<()>`. On quota violation, they produce `LibreFangError::QuotaExceeded` with a human-readable message including:\n\n- The scope (agent, provider, or global)\n- The time window (hourly, daily, monthly)\n- Current spend and limit (for cost budgets)\n- Current and limit token counts (for token budgets)\n\nExample error message:\n```\nAgent 0x1a2b... exceeded hourly cost quota: $1.0500 / $1.0000\n```\n\n## Integration Points\n\n- **`librefang-memory`** — `UsageStore` provides all SQLite operations (`record`, `query_hourly`, `query_daily`, `query_monthly`, `query_global_hourly`, `query_today_cost`, `query_global_monthly`, `query_provider_hourly`, `query_provider_daily`, `query_provider_monthly`, `query_provider_tokens_hourly`, `check_quota_and_record`, `check_global_budget_and_record`, `check_all_with_provider_and_record`, `cleanup_old`).\n- **`librefang-types`** — `AgentId`, `ResourceQuota`, `LibreFangError`, `ModelCatalogEntry`, `BudgetConfig`, `ProviderBudget`.\n- **`librefang-runtime`** — `ModelCatalog` for pricing lookups (used by `estimate_cost_with_catalog`).","agent-kernel-librefang-kernel-router-src":"# Agent Kernel — librefang-kernel-router-src\n\n# Agent Kernel — `librefang-kernel-router`\n\nRoutes incoming user messages to the most appropriate agent template or hand using layered keyword matching and optional semantic similarity scoring.\n\n## Purpose\n\nWhen a user sends a message like *\"debug this stack trace\"* or *\"帮我做深度调研\"*, the router determines which specialist should handle it — `debugger`, `researcher`, `orchestrator`, or a dynamically installed hand. This avoids requiring every message to go through a general-purpose assistant when a more targeted specialist exists.\n\nThe router supports three sources of routing signal, blended into a single numeric score:\n\n| Source | Weight per hit | Origin |\n|---|---|---|\n| Explicit aliases / strong patterns | 6 | `TEMPLATE_RULES`, `HAND.toml` `[routing].aliases`, `agent.toml` `[metadata.routing].aliases` |\n| Generated phrases / strong regex | 2 | Auto-derived from template name, tags, description |\n| Weak aliases / weak patterns | 1 | `TEMPLATE_RULES` weak entries, `[routing].weak_aliases`, ID-derived tokens |\n| Semantic bonus | 0–5 (scaled from cosine similarity) | Caller-provided embedding scores |\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[User message] --> HAND[auto_select_hand]\n    MSG --> TPL[auto_select_template]\n\n    TPL --> RULES[TEMPLATE_RULES regex matching]\n    TPL --> META[Manifest metadata matching]\n    TPL --> SEM[Semantic-only fallback]\n\n    RULES --> SCORE[Score & rank candidates]\n    META --> SCORE\n    SEM --> SCORE\n    SCORE --> MULTICHECK{Multiple high\\nscores + multi-domain\\ntokens?}\n\n    MULTICHECK -->|Yes| ORCH[Route to orchestrator]\n    MULTICHECK -->|No| BEST[Return best match]\n    ORCH --> SEL[TemplateSelection]\n    BEST --> SEL\n\n    HAND --> HCACHE[Hand route candidates cache]\n    HCACHE --> HANDTOML[HAND.toml files from registry/hands/]\n```\n\n## Core Types\n\n### `HandSelection`\n\nReturned by `auto_select_hand`. Indicates which hand (if any) matched and why.\n\n```rust\npub struct HandSelection {\n    pub hand_id: Option<String>,  // None when no hand meets MIN_HAND_SCORE\n    pub reason: String,           // e.g. \"matched researcher via deep research\"\n    pub score: usize,\n}\n```\n\n### `TemplateSelection`\n\nReturned by `auto_select_template`. Identifies the chosen agent template.\n\n```rust\npub struct TemplateSelection {\n    pub template: String,         // Template directory name (e.g. \"coder\")\n    pub reason: String,\n    pub score: usize,\n}\n```\n\n### `ManifestRouteCandidate` (internal)\n\nBuilt from each `agent.toml` manifest. Carries three tiers of phrases:\n\n- **`explicit_aliases`** — User-configured via `[metadata.routing].aliases` and `[metadata.routing].strong_aliases`. Highest confidence.\n- **`generated_phrases`** — Auto-extracted from the manifest's name, description, and tags. Medium confidence.\n- **`weak_phrases`** — Explicit `[metadata.routing].weak_aliases` plus tokens split from the template ID (filtered against `GENERIC_ENGLISH_WORDS`). Lowest confidence.\n\n## Public API\n\n### Routing Functions\n\n#### `auto_select_template(message, agents_dir, semantic_scores) -> TemplateSelection`\n\nMain entry point for template routing. Evaluates three layers in order:\n\n1. **Manifest metadata** — Scans `agents_dir` for agent manifests and matches against their routing config + generated phrases.\n2. **Hardcoded `TEMPLATE_RULES`** — Regex-based rules for ~28 built-in templates (coder, debugger, architect, etc.). These rules define bilingual strong/weak patterns (English + Chinese).\n3. **Semantic-only fallback** — When keyword matching yields nothing, candidates with cosine similarity ≥ `SEMANTIC_ONLY_THRESHOLD` (0.55) receive a bonus score.\n\n**Multi-domain detection:** If the top two candidates score above zero, target different templates, *and* the message contains multi-domain tokens (e.g. \"同时\", \"协作\", \"multi\"), the function routes to `orchestrator` instead.\n\n**Fallback:** If no candidate scores at all, returns `TemplateSelection { template: \"orchestrator\", ... }`.\n\n#### `auto_select_hand(message, semantic_scores) -> HandSelection`\n\nRoutes to a hand using phrases loaded from `HAND.toml` files under `$LIBREFANG_HOME/registry/hands/`. Each hand's `[routing]` section contributes strong and weak phrases. Requires a minimum score of `MIN_HAND_SCORE` (2) to return a match — a single weak hit is too noisy.\n\n#### `load_template_manifest(home_dir, template) -> Result<AgentManifest, String>`\n\nLoads and parses `workspaces/agents/<template>/agent.toml` relative to `home_dir`. Validates template names via `is_safe_template_name` (alphanumeric, `-`, `_` only).\n\n#### `all_template_descriptions(agents_dir) -> Vec<(String, String)>`\n\nReturns `(template_name, embed_text)` pairs for all non-excluded templates. Used by the kernel to build embedding vectors for semantic routing. The embed text combines name, description, and tags.\n\n### Cache Management\n\n#### `set_hand_route_home_dir(home_dir)`\n\nSets the base directory used to locate `registry/hands/`. Must be called before the first routing request. Typically set during application startup.\n\n#### `invalidate_hand_route_cache()`\n\nClears the cached hand route candidates. Must be called after hand install/uninstall operations. The skills route handlers (`install_hand`, `uninstall_hand`) call this automatically.\n\n#### `invalidate_manifest_cache()`\n\nClears the cached manifest route candidates. Call after config hot-reload or agent install/uninstall.\n\n## Scoring in Detail\n\n### Keyword Scoring\n\nFor each candidate, matches are counted and weighted:\n\n```\nscore = (strong_hits × 6) + (weak_hits × 1)\n```\n\nFor manifest-based candidates, generated phrases use `GENERATED_PHRASE_WEIGHT` (2):\n\n```\nscore = (explicit_hits × 6) + (generated_hits × 2) + (weak_hits × 1)\n```\n\n### Semantic Blending\n\nWhen the caller provides `semantic_scores` (a `HashMap<String, f32>` of cosine similarities), each candidate receives:\n\n```\nbonus = round(similarity × MAX_SEMANTIC_BONUS)  // MAX_SEMANTIC_BONUS = 5.0\n```\n\nThis means a perfect 1.0 similarity adds 5 points — enough to override a single weak hit (1 point) but not a strong hit (6 points). This preserves keyword authority while allowing embedding-based routing for non-English input.\n\n### Semantic-Only Fallback\n\nWhen keyword matching produces zero candidates, templates with similarity ≥ 0.55 receive a standalone score. This threshold prevents low-confidence semantic noise from triggering false routes.\n\n## Phrase Extraction\n\nThe router auto-generates routing phrases from manifest metadata via several internal functions:\n\n### `description_phrases(description) -> Vec<String>`\n\nSplits the description into chunks at punctuation and CJK delimiters, then:\n\n- **ASCII chunks:** Strips leading/trailing generic English words (from `GENERIC_ENGLISH_WORDS`), generates the full phrase plus individual content words (≥4 chars), and adjacent word bigrams.\n- **Unicode chunks:** Kept as-is if length is 2–32 characters.\n\n### `tag_phrases(tags) -> Vec<String>`\n\nTreats each tag as a mini-description. ASCII tags produce word-level candidates (≥3 chars); non-ASCII tags are preserved whole.\n\n### `english_variants(text) -> Vec<String>`\n\nGenerates the original form plus space-separated and split forms for hyphenated/underscored names (e.g. `\"code-review\"` → `[\"code-review\", \"code review\", \"code\", \"review\"]`).\n\n### `phrase_matches(message, phrase) -> bool`\n\nCase-insensitive matching. For ASCII phrases, uses regex with word-boundary enforcement (`(^|[^a-z0-9])phrase([^a-z0-9]|$)`). For non-ASCII phrases, uses simple `contains`.\n\n## Hardcoded Template Rules\n\n`TEMPLATE_RULES` defines 28 built-in route targets with bilingual (English + Chinese) regex patterns. Each rule has a `target` template name, `strong` patterns, and optional `weak` patterns:\n\n- **Strong examples:** `\\bdebug\\b|traceback|stack trace` (debugger), `架构设计|模块划分|技术方案` (architect)\n- **Weak examples:** `\\bbug\\b` (debugger), `分析|指标|趋势` (analyst)\n\nTemplates excluded from routing are listed in `ROUTING_EXCLUDED_TEMPLATES` (currently `[\"assistant\"]`).\n\n## Caching Strategy\n\nThree `OnceLock<Mutex<...>>` globals provide lazy, thread-safe caching:\n\n| Cache | Key | Invalidated by |\n|---|---|---|\n| `HAND_ROUTE_CACHE` | `home_dir` path string | `invalidate_hand_route_cache()` |\n| `MANIFEST_CACHE` | `agents_dir` path | `invalidate_manifest_cache()` |\n| `REGEX_CACHE` | Raw pattern string | Never (patterns are static) |\n\nCaches are automatically rebuilt on next access after invalidation. The hand route cache also invalidates if the resolved `home_dir` changes between calls.\n\n## Integration Points\n\n- **`librefang-types`** — `AgentManifest` type for parsed agent.toml.\n- **`librefang-hands`** — `parse_hand_toml` and `HandDefinition` for loading HAND.toml routing config.\n- **`librefang-runtime`** — `resolve_home_dir_for_tests` in test setup.\n- **Skills route handlers** — Call `invalidate_hand_route_cache()` after `install_hand`/`uninstall_hand`.\n- **Kernel embedding layer** — Calls `all_template_descriptions()` to build vectors, then passes resulting similarity scores into routing functions.\n\n## Configuration\n\n### HAND.toml routing section\n\n```toml\n[routing]\naliases = [\"deep research\", \"systematic review\"]    # strong phrases\nweak_aliases = [\"research\", \"study\"]                 # weak phrases\n```\n\n### agent.toml routing section\n\n```toml\n[metadata.routing]\naliases = [\"release notes\"]            # strong phrases\nstrong_aliases = [\"changelog entries\"]  # also strong\nweak_aliases = [\"changelog\"]            # weak phrases\nexclude_generated = false               # set true to skip auto-generated phrases\n```","agent-kernel-librefang-kernel-src":"# Agent Kernel — librefang-kernel-src\n\n# LibreFang Agent Kernel (`librefang-kernel`)\n\nThe kernel is the runtime core of the LibreFang Agent Operating System. It manages agent lifecycles, memory, permissions, scheduling, inter-agent communication, and all background infrastructure that keeps agents running autonomously.\n\nThe two primary re-exports are [`LibreFangKernel`](src/lib.rs) and [`DeliveryTracker`](src/lib.rs) from the `kernel` submodule — most consumers interact with the system through these types.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Kernel[\"LibreFangKernel\"]\n        Router[\"router\"]\n        Scheduler[\"scheduler\"]\n        Supervisor[\"supervisor\"]\n        Approval[\"approval\"]\n        Auth[\"auth (RBAC)\"]\n        EventBus[\"event_bus\"]\n        Registry[\"registry\"]\n    end\n\n    subgraph Background[\"Background Tasks\"]\n        AutoDream[\"auto_dream\"]\n        Cron[\"cron\"]\n        Triggers[\"triggers\"]\n        Heartbeat[\"heartbeat\"]\n    end\n\n    subgraph Orchestration[\"Agent Orchestration\"]\n        Orch[\"orchestration\"]\n        Workflow[\"workflow\"]\n        AutoReply[\"auto_reply\"]\n    end\n\n    subgraph IO[\"I/O & Channels\"]\n        Inbox[\"inbox\"]\n        WhatsApp[\"whatsapp_gateway\"]\n        Pairing[\"pairing\"]\n    end\n\n    subgraph Support[\"Support\"]\n        Config[\"config / config_reload\"]\n        Metering[\"metering\"]\n        Capabilities[\"capabilities\"]\n        BackgroundMod[\"background\"]\n        Wizard[\"wizard\"]\n    end\n\n    Router --> Approval\n    Router --> Auth\n    Router --> Scheduler\n    Orch --> Supervisor\n    Orch --> EventBus\n    AutoDream --> Supervisor\n    Cron --> Scheduler\n    Triggers --> EventBus\n    Workflow --> Registry\n```\n\n## Module Inventory\n\n| Module | Purpose |\n|--------|---------|\n| `kernel` | Top-level kernel struct, `DeliveryTracker`, initialization |\n| `approval` | Human-in-the-loop gating for dangerous tool calls |\n| `auth` | RBAC: maps channel identities to users with roles |\n| `auto_dream` | Periodic per-agent memory consolidation |\n| `background` | Generic background task spawning and lifecycle |\n| `capabilities` | Agent capability negotiation/advertisement |\n| `config` / `config_reload` | Kernel configuration and hot-reload |\n| `cron` | Cron-style scheduled tasks |\n| `error` | Kernel-specific error types |\n| `event_bus` | Pub/sub event bus for inter-agent and system events |\n| `heartbeat` | Agent liveness monitoring |\n| `inbox` | Message inbox management for agents |\n| `metering` | Token usage metering (re-exported from `librefang-kernel-metering`) |\n| `mcp_oauth_provider` | OAuth credential provider for MCP tool servers |\n| `orchestration` | Multi-agent orchestration and coordination |\n| `pairing` | Channel/device pairing flow |\n| `registry` | Agent manifest registry (install, lookup, list) |\n| `router` | Request routing (re-exported from `librefang-kernel-router`) |\n| `scheduler` | Resource quotas, rate limiting, usage tracking |\n| `supervisor` | Process supervision, panic counting, graceful shutdown |\n| `triggers` | Event-driven trigger evaluation (memory deltas, cross-agent) |\n| `whatsapp_gateway` | WhatsApp Business API gateway lifecycle |\n| `wizard` | First-run setup wizard (plan generation, manifest scaffolding) |\n| `workflow` | DAG-based multi-step workflow engine |\n\n---\n\n## Approval System (`approval`)\n\nThe [`ApprovalManager`](src/approval.rs) gates dangerous tool executions behind human approval. It supports two execution paths:\n\n- **Blocking** — `request_approval()` suspends the caller until a human resolves (approve/deny) or the request times out.\n- **Deferred (non-blocking)** — `submit_request()` returns immediately with a UUID. The deferred `DeferredToolExecution` payload is returned atomically on `resolve()`.\n\n### Policy Evaluation\n\nWhether a tool requires approval is determined by [`requires_approval_with_context()`](src/approval.rs), which checks in order:\n\n1. **Trusted sender bypass** — if `sender_id` is in `trusted_senders`, no approval needed.\n2. **Channel rules** — per-channel allow/deny lists override the default.\n3. **Default list** — `require_approval` patterns (supports glob wildcards like `file_*` or `*`).\n\n### Timeout and Escalation\n\nWhen a request times out, the `timeout_fallback` policy controls behavior:\n\n| Fallback | Behavior |\n|----------|----------|\n| `Deny` | Resolves as `Denied` (default) |\n| `Skip` | Resolves as `Skipped` |\n| `Escalate { extra_timeout_secs }` | Re-inserts with `escalation_count += 1`, granting additional time per round. After `MAX_ESCALATIONS` (3) rounds, falls back to `TimedOut`. |\n\nThe kernel's periodic sweep calls `expire_pending_requests()` to drive escalation/expiry for the deferred path.\n\n### Constraints\n\n- Maximum 5 pending requests per agent (`MAX_PENDING_PER_AGENT`).\n- Anti-duplicate guard on `tool_use_id` prevents the same tool call from being submitted twice.\n- Up to 100 recent resolved records retained in-memory (`MAX_RECENT_APPROVALS`).\n\n### TOTP Second Factor\n\nWhen `second_factor` is `Totp` in the approval policy, approving requires a TOTP code:\n\n- **Verification**: `verify_totp_code()` uses RFC 6238 (SHA-1, 6 digits, 30s step, ±1 window).\n- **Grace period**: After a successful TOTP verification, subsequent approvals from the same `user_id` within `totp_grace_period_secs` skip TOTP.\n- **Lockout**: After 5 consecutive failures (`TOTP_MAX_FAILURES`), the user is locked out for 300 seconds (`TOTP_LOCKOUT_SECS`). Lockout state is persisted in SQLite so it survives daemon restarts.\n- **Per-tool scoping**: `totp_tools` can restrict TOTP to specific tool names. An empty list means all tools require TOTP.\n- **Recovery codes**: `generate_recovery_codes()` produces 8 single-use `DDDD-DDDD` codes. `verify_recovery_code()` consumes a matching code and returns the updated list.\n\n### Risk Classification\n\n`classify_risk()` maps tool names to risk levels:\n\n| Tool | Risk |\n|------|------|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n### Persistent Audit\n\nWhen constructed with `new_with_db()`, every approval decision is written to an `approval_audit` SQLite table via `query_audit()` / `audit_count()`. Policy can be hot-reloaded with `update_policy()` without restarting the kernel.\n\n---\n\n## Authentication & Authorization (`auth`)\n\n[`AuthManager`](src/auth.rs) implements role-based access control for multi-user deployments.\n\n### Role Hierarchy\n\n```\nOwner (3) > Admin (2) > User (1) > Viewer (0)\n```\n\n### Action Permissions\n\n| Action | Minimum Role |\n|--------|-------------|\n| `ChatWithAgent`, `ViewConfig` | User |\n| `SpawnAgent`, `KillAgent`, `InstallSkill`, `ViewUsage` | Admin |\n| `ModifyConfig`, `ManageUsers` | Owner |\n\n### Identity Resolution\n\nUsers are defined in kernel config with channel bindings (e.g. `\"telegram\" → \"123456\"`). The manager builds an internal index:\n\n```\n\"telegram:123456\" → UserId\n```\n\n`identify(channel_type, platform_id)` resolves a platform identity to a LibreFang `UserId`. `authorize(user_id, action)` checks the user's role against the action's minimum requirement.\n\nWhen no users are configured (`is_enabled() == false`), authorization is effectively disabled.\n\n---\n\n## Auto-Dream (`auto_dream`)\n\nAuto-dream is the background memory consolidation system. It periodically asks each opted-in agent to reflect on its own memory and consolidate recent signal through a four-phase prompt (Orient / Gather / Consolidate / Prune).\n\n### Gating Pipeline\n\nEach agent is checked through five gates (cheapest first):\n\n1. **Global enabled** — `config.auto_dream.enabled` must be `true`.\n2. **Per-agent opt-in** — agent manifest must have `auto_dream_enabled = true`.\n3. **Time gate** — at least `min_hours` since the last consolidation (tracked via lock file mtime).\n4. **Session count gate** — at least `min_sessions` sessions touched since last consolidation. Set to `0` to disable.\n5. **Lock gate** — per-agent filesystem lock prevents concurrent consolidation across processes.\n\n### Consolidation Lock (`auto_dream::lock`)\n\n[`ConsolidationLock`](src/auto_dream/lock.rs) is a filesystem-based lock using mtime as the timestamp source and file body for PID tracking:\n\n- **`try_acquire()`** — Reads the lock file. If a live process holds it (PID check via `kill(0)`), returns `None`. Otherwise writes `<pid>:<uuid>` and verifies the write won the race. Returns the prior mtime for potential rollback.\n- **`release()`** — Clears the PID body and refreshes mtime to now, allowing immediate re-acquisition.\n- **`rollback(prior_mtime)`** — Rewinds mtime to its pre-acquire value (or unlinks the file if it didn't exist), reopening the time gate for the next tick.\n- **Stale detection** — Locks held longer than `HOLDER_STALE_MS` (1 hour) are reclaimed regardless of PID liveness, guarding against PID reuse.\n\nThe body format `<pid>:<uuid>` (rather than bare PID) ensures that two concurrent acquirers in the same process produce different tokens, so the verify step correctly identifies a single winner. A process-local `DashSet` (`IN_PROCESS_CLAIMS`) provides additional same-process serialization.\n\n### Dream Execution\n\nDreams run via `kernel.run_forked_agent_streaming` with tool scoping:\n\n```rust\npub const DREAM_ALLOWED_TOOLS: &[&str] = &[\"memory_store\", \"memory_recall\", \"memory_list\"];\n```\n\nAny tool_use for a non-allowed tool receives a synthetic error result. Progress is tracked in a `DashMap<AgentId, DreamProgress>` with a cap of 30 turns per entry.\n\n### Integration Points\n\n- The scheduler calls auto-dream's tick function periodically.\n- The event bus can trigger event-driven gate scans (rate-limited by `SESSION_SCAN_INTERVAL_MS`).\n- The abort endpoint reaches into the progress map to cancel a running dream.\n- Failed/aborted dreams roll back the lock mtime so the time gate reopens on the next tick.\n\n---\n\n## Workflow Engine (`workflow`)\n\nA DAG-based multi-step workflow engine that runs sequences of agent invocations with variable passing, conditional execution, and loop support.\n\nKey operations:\n- **`register()`** — Register a workflow definition.\n- **`create_run()`** — Instantiate a workflow run with parameter bindings.\n- **`build_plan()`** — Resolve the DAG and produce an execution plan.\n- **`build_context_prompt()`** — Build a context prompt using `SubagentContext` and `format_preamble` from `librefang-types`.\n- **`workflow_to_template()`** — Convert a workflow to a `WorkflowTemplate` for sharing/reuse.\n- **`load_templates_from_dir()` / `load_runs()`** — Persist and hydrate workflows from disk.\n\nWorkflows support `depends_on` edges for topological ordering, parallel step execution, and output variable capture between steps.\n\n---\n\n## Triggers (`triggers`)\n\nEvent-driven triggers that fire agent actions in response to system events (memory updates, cross-agent signals, etc.).\n\n- **`register()` / `register_with_target()`** — Register a trigger, optionally targeting a specific agent.\n- **`register_cross_agent_trigger()`** — Set up a trigger where one agent's event activates another agent.\n- **`evaluate()`** — Check a trigger against an incoming event.\n- **`list_agent_triggers()`** — Enumerate triggers for an agent (used by backup/restore).\n- Triggers support cooldown periods, per-event budgets, and enable/disable state.\n\nMemory delta triggers (`MemoryDelta` from `librefang-types::event`) fire when an agent's memory is modified, enabling reactive agent behaviors.\n\n---\n\n## Scheduler (`scheduler`)\n\nManages resource quotas and rate limiting for agent execution:\n\n- **`register()`** — Register an agent with its `ResourceQuota`.\n- **`record_usage()`** — Record token usage (`TokenUsage` from `librefang-types`).\n- **`check_quota()`** — Enforce limits using `effective_token_limit()` from `librefang-types`.\n- Supports burst limiting and per-tool call rate limits.\n- Zero limits mean unlimited (no enforcement).\n\n---\n\n## Supervisor (`supervisor`)\n\nProcess supervision with panic tracking and graceful shutdown:\n\n- **`new()`** — Create a supervisor instance.\n- **`health()`** — Returns health status including `panic_count()`.\n- **`shutdown()`** — Gracefully shut down supervised tasks.\n\n---\n\n## Wizard (`wizard`)\n\nFirst-run setup assistant that generates agent manifests and configuration:\n\n- **`build_plan()`** — Produces a `SetupPlan` containing `AgentManifest` and `ModelConfig` entries based on user intent (`AgentIntent`).\n\n---\n\n## Configuration Hot-Reload\n\nThe `config_reload` module enables live policy and configuration updates without restarting the kernel. The approval manager's `update_policy()` method is the primary consumer — it swaps the `RwLock<ApprovalPolicy>` in-place, immediately affecting all subsequent approval checks.\n\n---\n\n## Key Cross-Crate Dependencies\n\n| Crate | Used By | Purpose |\n|-------|---------|---------|\n| `librefang-types` | Nearly all modules | Shared types: `AgentId`, `SessionId`, `ApprovalPolicy`, `ResourceQuota`, `WorkflowTemplate`, `MemoryDelta`, etc. |\n| `librefang-llm-driver` | `auto_dream` | `StreamEvent` for streaming LLM output during dreams |\n| `librefang-extensions` | `mcp_oauth_provider`, `whatsapp_gateway`, `workflow` | Vault operations (`unlock`, `resolve_master_key`, `exists`) |\n| `librefang-kernel-metering` | Re-exported as `metering` | Token usage metering |\n| `librefang-kernel-router` | Re-exported as `router` | Request routing infrastructure |\n| `rusqlite` | `approval` | Persistent audit log and TOTP lockout storage |\n| `dashmap` | `approval`, `auth`, `auto_dream`, `triggers` | Concurrent maps for shared mutable state |\n| `totp-rs` | `approval` | RFC 6238 TOTP generation and verification |","agent-kernel":"# Agent Kernel\n\n# Agent Kernel\n\nThe Agent Kernel is the runtime core of the LibreFang Agent Operating System. It orchestrates agent lifecycles, enforces budgets, routes messages, manages workflows, and provides the trait boundary that lets the agent runtime call into kernel operations without creating circular dependencies.\n\n## Sub-modules\n\n| Module | Responsibility |\n|---|---|\n| [**Core**](librefang-kernel-src.md) | Top-level kernel re-exports (`LibreFangKernel`, `DeliveryTracker`), plus internal subsystems: scheduler, supervisor, approval, auth/RBAC, event bus, registry, workflow engine, triggers, and wizard |\n| [**Handle**](librefang-kernel-handle-src.md) | Defines the `KernelHandle` trait — the abstract interface the agent runtime uses to spawn agents, send messages, and manage tasks without depending on kernel internals |\n| [**Metering**](librefang-kernel-metering-src.md) | Cost accounting and budget enforcement for every LLM call, with per-agent, per-provider, and global limits across hourly/daily/monthly windows |\n| [**Router**](librefang-kernel-router-src.md) | Routes incoming user messages to the best-matching agent template or hand using layered keyword matching and optional semantic similarity |\n\n## How they connect\n\n```\nUser Message\n     │\n     ▼\n  Router ──▶ selects agent template\n     │\n     ▼\n LibreFangKernel (core)\n  ├── Supervisor spawns agent\n  ├── Scheduler queues work\n  ├── Auth/RBAC checks permissions\n  └── Approval gates sensitive actions\n     │\n     ▼\n Agent Runtime (librefang-runtime)\n  ├── calls through KernelHandle trait\n  ├── Metering intercepts every LLM call\n  │     ├── estimates cost\n  │     ├── checks budgets (agent / provider / global)\n  │     └── records usage to SQLite via UsageStore\n  └── EventBus carries inter-agent messages\n```\n\n**Key integration points:**\n\n1. **Decoupling boundary.** The kernel implements the `KernelHandle` trait from [Handle](librefang-kernel-handle-src.md) and injects it into the agent loop at startup. The runtime never sees concrete kernel types — it only calls through the trait object.\n\n2. **Message routing → lifecycle.** When a message arrives, the [Router](librefang-kernel-router-src.md) scores it against registered templates and hands. The core's `LibreFangKernel` then uses the scheduler and supervisor to spin up the chosen agent, subject to auth and approval checks.\n\n3. **LLM cost gating.** Every LLM invocation passes through the [Metering](librefang-kernel-metering-src.md) engine before execution. If any budget axis (per-agent, per-provider, or global) is exceeded for the current window, the call is rejected. This protects against runaway spend regardless of which agent or workflow triggered the call.\n\n4. **Workflow orchestration.** The core's workflow engine ([in workflow.rs](librefang-kernel-src.md)) manages DAG-based multi-step runs — instantiating plans, expanding variables, executing steps sequentially or in parallel, and persisting state. Workflows can fan out across multiple agents, each of which is metered and permission-checked independently.\n\n5. **Triggers and automation.** The core's trigger system ([in triggers.rs](librefang-kernel-src.md)) evaluates lifecycle and external events against registered patterns, firing actions automatically. Triggers are budgeted per-event to prevent cascading agent spawns from consuming unbounded resources.\n\nFor details on any individual subsystem, follow the links above.","agent-runtime-librefang-runtime-mcp-src":"# Agent Runtime — librefang-runtime-mcp-src\n\n# librefang-runtime-mcp — MCP Client Module\n\nConnects the agent runtime to external MCP (Model Context Protocol) servers, discovers their tools, and dispatches tool calls. Every MCP tool is exposed to the LLM under a namespaced name (`mcp_{server}_{tool}`) to prevent collisions with built-in tools.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    TR[tool_runner: execute_tool_raw] -->|resolve server| NS[resolve_mcp_server_from_known]\n    TR -->|dispatch call| CT[McpConnection::call_tool]\n    CT --> TS[scan_mcp_arguments_for_taint]\n    CT --> RMCP[McpInner::Rmcp - Stdio/HTTP]\n    CT --> SSE[McpInner::Sse - JSON-RPC POST]\n    CT --> HC[McpInner::HttpCompat - Plain HTTP]\n    RMCP -->|401 + OAuth| OA[mcp_oauth: discover_oauth_metadata]\n    OA --> T1[Tier 1: WWW-Authenticate]\n    OA --> T2[Tier 2: .well-known]\n    OA --> T3[Tier 3: Config fallback]\n```\n\n---\n\n## Transport Types\n\n`McpTransport` is a serde-tagged enum (`#[serde(tag = \"type\")]`) with four variants:\n\n| Variant | Protocol | Connection handling | Tool discovery |\n|---|---|---|---|\n| `Stdio` | MCP over stdin/stdout via rmcp SDK | `TokioChildProcess` with sandboxed env | Automatic via `list_all_tools()` |\n| `Sse` | JSON-RPC over HTTP POST | `reqwest::Client` | Manual `initialize` + `tools/list` |\n| `Http` | Streamable HTTP (MCP 2025-03-26+) | rmcp `StreamableHttpClientTransport` | Automatic via `list_all_tools()` |\n| `HttpCompat` | Plain HTTP/JSON adapter | `reqwest::Client` | Static from config `tools` array |\n\n---\n\n## Connection Lifecycle\n\n### `McpConnection::connect(config) -> Result<Self, String>`\n\nEntry point. Performs transport-specific connection, handshake, and tool discovery:\n\n1. **Stdio** — Spawns a subprocess with `connect_stdio`. Validates the command (blocks `..` paths and shell interpreters), builds a sandboxed environment, performs MCP handshake via rmcp, and discovers tools.\n\n2. **Sse** — Creates an HTTP client with `connect_sse`. Tools are discovered later via `sse_initialize()` + `sse_discover_tools()`.\n\n3. **Http (Streamable)** — Calls `connect_streamable_http`. If the server returns 401, it attempts OAuth discovery. If auth is needed but cannot be completed automatically, returns the sentinel error `\"OAUTH_NEEDS_AUTH\"` to signal the API layer.\n\n4. **HttpCompat** — Validates config with `validate_http_compat_config`, probes the base URL, and registers tools from the static config.\n\nAll discovered tools are registered via `register_tool`, which applies namespacing.\n\n### `McpConnection::call_tool(name, arguments) -> Result<String, String>`\n\nDispatches a tool call through the appropriate transport. Before dispatch, the arguments are passed through `scan_mcp_arguments_for_taint` (configurable per-server via `taint_scanning`).\n\nThe method resolves the namespaced tool name back to the original server-side name, determines the transport kind via a tag enum (avoids borrow-checker conflicts with `&mut self`), then dispatches:\n\n- **Rmcp**: Builds `CallToolRequestParams`, calls `client.call_tool()`, extracts text content from the response.\n- **Sse**: Sends a `tools/call` JSON-RPC request via `sse_send_request`.\n- **HttpCompat**: Resolves the tool config, renders path templates, applies headers, and executes the HTTP request via `call_http_compat_tool`.\n\n---\n\n## Tool Namespacing\n\nMCP tool names are normalized to prevent collisions and enable routing:\n\n- **`format_mcp_tool_name(server, tool)`** — Produces `mcp_{server}_{tool}` with lowercase normalization and hyphen-to-underscore conversion.\n- **`is_mcp_tool(name)`** — Quick prefix check (`mcp_`).\n- **`resolve_mcp_server_from_known(tool_name, server_names)`** — Longest-prefix match against known server names. This is the robust runtime dispatch used by `tool_runner::execute_tool_raw`. It correctly handles multi-segment server names (e.g. `\"my-server\"` → `mcp_my_server_...`).\n- **`extract_mcp_server(tool_name)`** — Heuristic that splits on the first `_` after `mcp_`. Only reliable for single-word server names. Use `resolve_mcp_server_from_known` when server names are available.\n\n---\n\n## Security Layers\n\n### Outbound Taint Scanning\n\n`scan_mcp_arguments_for_taint` walks every string leaf in the JSON argument tree before it leaves the process. It uses two detection mechanisms:\n\n1. **Content-based** (`check_outbound_text_violation`) — Pattern-matches string values against credential/PII heuristics via `TaintSink::mcp_tool_call`.\n2. **Key-name-based** — Object keys matching `MCP_SENSITIVE_KEY_NAMES` (e.g. `authorization`, `api_key`, `secret`) with non-empty string values are blocked unconditionally, even when `taint_scanning` is disabled.\n\nKey properties:\n- Recursion capped at `MCP_TAINT_SCAN_MAX_DEPTH` (64).\n- Error messages are redacted — they include the JSON path but never the offending payload value, since the error flows back to the LLM and into logs.\n- Non-string leaves (numbers, bools, null) are skipped.\n- Per-server toggle via `McpServerConfig::taint_scanning` (defaults to `true`). Disabling it turns off content-based scanning only; key-name blocking always remains active.\n\n### SSRF Protection\n\n`check_ssrf` blocks URLs targeting cloud metadata endpoints (`169.254.169.254`, `metadata.google`). Applied to all HTTP-based transports during connection.\n\n`is_ssrf_blocked_host` (in `mcp_oauth`) provides deeper checks for OAuth metadata URLs: loopback, private, link-local, and unique-local IP ranges.\n\n### Subprocess Sandboxing\n\nStdio MCP servers run with a minimal environment:\n\n- The parent environment is **not inherited** (`cmd.env_clear()`).\n- Only `SAFE_ENV_VARS` (PATH, HOME, language/locale, XDG dirs, Windows essentials, Node/Python/Rust/Ruby/Go runtime paths) are passed through.\n- Declared env vars from config (`env: Vec<String>`) support `\"KEY=VALUE\"` and legacy `\"KEY\"` (looked up from parent env) formats.\n- Shell interpreters (`bash`, `sh`, `cmd.exe`, `powershell`, etc.) are blocked as commands — servers must specify a concrete runtime (`npx`, `node`, `python`).\n- Path traversal (`..`) in the command path is rejected.\n- On Windows, npm/npx `.cmd` wrappers are auto-detected and used.\n\n### Environment Variable Expansion\n\n`expand_env_vars` handles `$VAR` and `${VAR}` references in Stdio transport arguments, allowing config templates like `\"$HOME/.config/mcp-server\"` without wrapping in a shell.\n\n---\n\n## OAuth Authentication (`mcp_oauth` module)\n\nSupports OAuth for Streamable HTTP MCP servers with PKCE (no client secret required).\n\n### Three-Tier Metadata Discovery\n\n`discover_oauth_metadata(server_url, www_authenticate, config)` resolves OAuth endpoints:\n\n1. **Tier 1**: Parse the `WWW-Authenticate` header → extract `resource_metadata` URL → fetch RFC 8414 metadata.\n2. **Tier 2**: Construct `{origin}/.well-known/oauth-authorization-server` → fetch metadata.\n3. **Tier 3**: Fall back to `McpOAuthConfig` from config (requires both `auth_url` and `token_url`).\n\nEach tier's results are merged with config via `merge_metadata_with_config`, where config values take precedence.\n\n### `extract_metadata_url` Validation\n\nThree-layer validation on the `resource_metadata` URL:\n1. HTTPS only (RFC 8414 requirement).\n2. Same-origin as the server URL (prevents cross-domain redirect).\n3. No loopback/private/link-local IPs via `is_ssrf_blocked_host`.\n\n### PKCE Flow\n\n- `generate_pkce()` — Produces a `(verifier, challenge)` pair (32 random bytes, SHA-256, base64url-no-pad).\n- `generate_state()` — 16 random bytes, base64url-no-pad.\n\nThe actual browser redirect and token exchange are driven by the API layer (`src/routes/mcp_auth`), not this module. The `McpOAuthProvider` trait handles token persistence (load/store/clear), implemented by the kernel's encrypted vault.\n\n### `McpAuthState`\n\nTracks per-server auth state: `NotRequired`, `Authorized`, `NeedsAuth`, `PendingAuth`, `Expired`, `Error`. Stored in a shared `McpAuthStates` (`Mutex<HashMap<String, McpAuthState>>`).\n\n### Connection-Time OAuth\n\n`connect_streamable_http` attempts to load a cached token from the OAuth provider and inject it as an `Authorization: Bearer` header. If the server rejects with 401, it calls `discover_oauth_metadata` and returns `\"OAUTH_NEEDS_AUTH\"` to let the API layer initiate the user-facing PKCE flow.\n\nThe `extract_auth_header_from_error` function performs a manual downcast chain through rmcp's error types to extract the `WWW-Authenticate` header from `StreamableHttpError::AuthRequired`, with a fallback substring check for Display-formatted error strings.\n\n---\n\n## HttpCompat Adapter\n\nA built-in transport for plain HTTP/JSON backends that don't speak MCP protocol. Configured with static tool definitions, each specifying a path template, HTTP method, request/response modes, and optional headers.\n\n### Path Template Rendering\n\n`render_http_compat_path` substitutes `{key}` placeholders in the path with argument values (URL-percent-encoded via `encode_http_compat_path_value`). Used arguments are removed from the remaining payload.\n\n### Request Modes\n\n- `JsonBody` — Remaining arguments sent as JSON body (skipped if empty).\n- `Query` — Remaining arguments rendered as query parameters via `json_value_to_query_pairs`.\n- `None` — No request body.\n\n### Headers\n\n`HttpCompatHeaderConfig` supports static `value` or environment-derived `value_env`. Applied to every request via `apply_http_compat_headers`.\n\n### Response Modes\n\n- `Text` — Raw body string.\n- `Json` — Pretty-printed JSON (falls back to raw text on parse failure).\n\n---\n\n## Integration Points\n\n| Caller | Function used | Purpose |\n|---|---|---|\n| `tool_runner::execute_tool_raw` | `is_mcp_tool`, `resolve_mcp_server_from_known`, `call_tool` | Route LLM tool calls to the correct MCP connection |\n| `routes::agents::get_agent_mcp_servers` | `resolve_mcp_server_from_known` | Map discovered tools back to server configs for the API |\n| `tui::event::spawn_fetch_agent_mcp_servers` | `resolve_mcp_server_from_known` | TUI server status display |\n| `routes::mcp_auth::auth_start` | `discover_oauth_metadata` | Initiate OAuth flow from API endpoint |\n| `kernel::mcp_oauth_provider::load_token` | `store_tokens` | Persist tokens after OAuth completion |","agent-runtime-librefang-runtime-oauth-src":"# Agent Runtime — librefang-runtime-oauth-src\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication runtime for LibreFang. Provides complete browser-based and device-flow authentication for **ChatGPT (OpenAI)** and **GitHub Copilot**, including token exchange, refresh, and model discovery.\n\n## Module Layout\n\n```\nlibrefang-runtime-oauth/\n├── src/\n│   ├── lib.rs              # Re-exports: chatgpt_oauth, copilot_oauth\n│   ├── chatgpt_oauth.rs    # OpenAI Codex OAuth (browser + device flow)\n│   └── copilot_oauth.rs    # GitHub Copilot device flow (RFC 8628)\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-cli\"\n        A[authenticate_chatgpt]\n    end\n    subgraph \"Server Routes\"\n        B[copilot_oauth_start]\n        C[copilot_oauth_poll]\n    end\n    subgraph \"Drivers\"\n        D[chatgpt driver refresh_token]\n    end\n    subgraph \"librefang-runtime-oauth\"\n        E[chatgpt_oauth]\n        F[copilot_oauth]\n    end\n    subgraph \"HTTP Layer\"\n        G[librefang_http proxied_client]\n    end\n\n    A -->|start_oauth_flow / start_device_auth_flow| E\n    A -->|run_oauth_callback_server / poll_device_auth_flow| E\n    A -->|exchange_code_for_tokens| E\n    A -->|fetch_best_codex_model| E\n    B -->|start_device_flow| F\n    C -->|poll_device_flow| F\n    D -->|refresh_access_token| E\n    E --> G\n    F --> G\n```\n\n---\n\n## ChatGPT OAuth (`chatgpt_oauth`)\n\nAuthenticates against OpenAI's Codex OAuth endpoints. The resulting tokens carry `api.connectors` scopes and work with the ChatGPT backend Responses API at `https://chatgpt.com/backend-api` — **not** the standard `/v1/chat/completions` endpoint.\n\n### Two Authentication Paths\n\n#### 1. Browser Flow (GUI environments)\n\nOpens the user's browser to OpenAI's authorization page, then listens for a callback on `127.0.0.1:1455`.\n\n```rust\n// 1. Start the flow — binds port, generates PKCE + state\nlet (auth_url, port, verifier, state) = chatgpt_oauth::start_oauth_flow().await?;\n\n// 2. Open auth_url in the user's browser (caller's responsibility)\nopen_browser(auth_url);\n\n// 3. Wait for the callback (up to 5 minutes)\nlet code = chatgpt_oauth::run_oauth_callback_server(port, &state).await?;\n\n// 4. Exchange code for tokens\nlet result = chatgpt_oauth::exchange_code_for_tokens(&code, &verifier, port).await?;\n```\n\nThe callback server (`run_oauth_callback_server`) handles:\n- Parsing `GET /auth/callback?code=...&state=...` from the raw TCP stream\n- CSRF protection via state parameter validation\n- Serving a success or error HTML page back to the browser\n- Returning the authorization code through a oneshot channel\n\n#### 2. Device Auth Flow (headless / remote environments)\n\nA two-step process: request a user code, then poll until the user enters it.\n\n```rust\n// 1. Request a device code — may return BrowserFallback if not enabled\nlet prompt = match chatgpt_oauth::start_device_auth_flow().await {\n    Ok(p) => p,\n    Err(DeviceAuthFlowError::BrowserFallback { message }) => {\n        // Fall back to browser flow\n        return fallback_to_browser().await;\n    }\n    Err(DeviceAuthFlowError::Fatal(msg)) => return Err(msg),\n};\n\n// 2. Show prompt.user_code and chatgpt_oauth::DEVICE_AUTH_URL to the user\n\n// 3. Poll until authorized (up to 15 minutes)\nlet result = chatgpt_oauth::poll_device_auth_flow(&prompt).await?;\n```\n\nThe `DeviceAuthFlowError` enum distinguishes between:\n- **`BrowserFallback`** — device auth isn't enabled for the account/workspace (HTTP 404); the caller should fall back to the browser flow\n- **`Fatal`** — any other failure that should not silently fall back\n\nPolling treats HTTP 403/404 as \"still pending\" and retries at the server-suggested interval (default 5 seconds).\n\n### Token Refresh\n\n```rust\nlet result = chatgpt_oauth::refresh_access_token(&old_refresh_token).await?;\n```\n\n### Model Discovery\n\nAfter authentication, call `fetch_best_codex_model` to determine the highest-priority Codex model available:\n\n```rust\nlet model = chatgpt_oauth::fetch_best_codex_model(&access_token).await;\n// Returns e.g. \"gpt-5.2-codex\" or falls back to \"gpt-5.1-codex-mini\"\n```\n\nThis queries `GET {CHATGPT_BASE_URL}/codex/models?client_version={VERSION}`, sorts the response by `priority` descending, and returns the top slug. Network or parse failures silently fall back to `gpt-5.1-codex-mini`.\n\n### Session Token Detection\n\n```rust\nif chatgpt_oauth::chatgpt_session_available() {\n    // CHATGPT_SESSION_TOKEN env var is set and non-empty\n}\n```\n\n### Key Data Structures\n\n| Type | Purpose |\n|---|---|\n| `ChatGptAuthResult` | Holds `access_token`, optional `refresh_token`, and `expires_in` — all tokens wrapped in `Zeroizing<String>` |\n| `PkceChallenge` | PKCE verifier + S256 challenge pair from `generate_pkce()` |\n| `DeviceAuthPrompt` | Server-issued `device_auth_id`, `user_code`, and `interval_secs` to display to the user |\n| `DeviceAuthFlowError` | Either `BrowserFallback { message }` or `Fatal(String)` |\n\n### Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `CHATGPT_BASE_URL` | `https://chatgpt.com/backend-api` | Backend API base for OAuth-token requests |\n| `DEVICE_AUTH_URL` | `https://auth.openai.com/codex/device` | Verification page URL to show users |\n| `DEVICE_AUTH_REDIRECT_URI` | `https://auth.openai.com/deviceauth/callback` | Redirect URI for device auth token exchange |\n| Callback bind | `127.0.0.1:1455` | Matches OpenAI's registered redirect URI |\n| Browser auth timeout | 300 seconds | Max wait for callback |\n| Device auth timeout | 15 minutes | Max poll duration |\n\n### PKCE Implementation\n\n`generate_pkce()` produces a 64-byte random verifier (base64url-encoded to 86 characters) and an S256 challenge (SHA-256 of the verifier, base64url-encoded). The `create_state()` function generates a 16-byte random hex string for CSRF protection.\n\n---\n\n## GitHub Copilot OAuth (`copilot_oauth`)\n\nImplements the OAuth 2.0 Device Authorization Grant ([RFC 8628](https://datatracker.ietf.org/doc/html/rfc8628)) using GitHub's device flow endpoint. Uses the same public client ID as the VS Code Copilot extension (`Iv1.b507a08c87ecfe98`).\n\n### Usage\n\n```rust\n// 1. Start the device flow\nlet device = copilot_oauth::start_device_flow().await?;\n// device.verification_uri — URL to visit\n// device.user_code — code to enter\n// device.interval — recommended poll interval in seconds\n\n// 2. Poll for completion\nloop {\n    match copilot_oauth::poll_device_flow(&device.device_code).await {\n        DeviceFlowStatus::Complete { access_token } => {\n            // Done — use access_token\n            break;\n        }\n        DeviceFlowStatus::Pending => {\n            tokio::time::sleep(Duration::from_secs(device.interval)).await;\n        }\n        DeviceFlowStatus::SlowDown { new_interval } => {\n            device.interval = new_interval;\n            tokio::time::sleep(Duration::from_secs(new_interval)).await;\n        }\n        DeviceFlowStatus::Expired => return Err(\"Device code expired\".into()),\n        DeviceFlowStatus::AccessDenied => return Err(\"User denied access\".into()),\n        DeviceFlowStatus::Error(msg) => return Err(msg),\n    }\n}\n```\n\n### Key Data Structures\n\n| Type | Purpose |\n|---|---|\n| `DeviceCodeResponse` | Parsed response from `start_device_flow()` — contains `device_code`, `user_code`, `verification_uri`, `expires_in`, `interval` |\n| `DeviceFlowStatus` | Enum representing poll result states: `Pending`, `Complete { access_token }`, `SlowDown { new_interval }`, `Expired`, `AccessDenied`, `Error(String)` |\n\n### Error Handling\n\nGitHub returns HTTP 200 during polling with an `error` field in the JSON body rather than HTTP error codes. The `poll_device_flow` function handles all standard RFC 8628 error codes:\n\n- `authorization_pending` → `Pending`\n- `slow_down` → `SlowDown` with updated interval\n- `expired_token` → `Expired`\n- `access_denied` → `AccessDenied`\n\n---\n\n## Security Considerations\n\n- **Zeroizing**: All token strings (`access_token`, `refresh_token`) are wrapped in `Zeroizing<String>` from the `zeroize` crate, ensuring they are zeroed in memory when dropped.\n- **PKCE**: The ChatGPT browser flow uses S256 PKCE to prevent authorization code interception.\n- **CSRF**: The state parameter is validated in the callback server to prevent cross-site request forgery.\n- **Timeout**: Both flows have bounded timeouts (5 minutes for browser, 15 minutes for device auth) to prevent indefinite hangs.\n\n## Dependencies on Other Crates\n\n| Crate | Usage |\n|---|---|\n| `librefang_http` | `proxied_client()` and `proxied_client_builder()` for all outbound HTTP requests |\n| `librefang_types` | `VERSION` constant for the Codex models API query parameter |\n| `zeroize` | `Zeroizing<String>` for secure token storage |\n| `sha2`, `base64` | PKCE S256 challenge generation |\n| `tokio` | Async runtime, TCP listener, oneshot channels, timeouts |","agent-runtime-librefang-runtime-src":"# Agent Runtime — librefang-runtime-src\n\n# LibreFang Runtime (`librefang-runtime`)\n\nThe execution environment for LibreFang agents. It owns the core agent loop, LLM driver orchestration, tool execution pipeline, and over thirty supporting subsystems that together turn a user message into an intelligent, tooled response.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    User[\"User Message\"] --> AL[\"agent_loop<br/>(run_agent_loop)\"]\n    AL --> RE[\"Memory Recall<br/>(embedding / text / proactive)\"]\n    RE --> PS[\"Prompt Assembly<br/>(prompt_builder + experiments)\"]\n    PS --> LLM[\"LLM Driver<br/>(llm_driver)\"]\n    LLM -->|\"tool_use\"| TR[\"Tool Execution<br/>(tool_runner)\"]\n    TR -->|\"result\"| AL\n    LLM -->|\"end_turn\"| FIN[\"Finalize<br/>(save + memorize + hooks)\"]\n    FIN --> Session[\"Session Persistence\"]\n    TR --> Sandbox[\"Workspace Sandbox\"]\n    TR --> MCP[\"MCP Connections\"]\n    TR --> Hooks[\"Hook Registry\"]\n    AL --> LG[\"Loop Guard<br/>(circuit breaker)\"]\n    AL --> CE[\"Context Engine<br/>(budget + overflow recovery)\"]\n\n    A2A[\"A2A Module\"] --> AC[\"AgentCard\"]\n    A2A --> TS[\"A2aTaskStore\"]\n    A2A --> CL[\"A2aClient\"]\n```\n\n## Module Inventory\n\nThe crate re-exports several sibling crates and declares ~50 internal modules. The most important:\n\n| Module | Purpose |\n|--------|---------|\n| `agent_loop` | Core execution loop — the heart of the runtime |\n| `a2a` | Agent-to-Agent protocol interoperability |\n| `tool_runner` | Dispatches tool calls to the appropriate handler |\n| `llm_driver` | Re-exported from `librefang-llm-driver` — unified LLM interface |\n| `context_engine` | Plugin-aware context window management |\n| `context_budget` | Token budget allocation and truncation strategies |\n| `context_overflow` | Recovery when the context window is exceeded |\n| `loop_guard` | Circuit breaker and rate limiting for tool calls |\n| `workspace_sandbox` | Path resolution and escape prevention for file tools |\n| `prompt_builder` | System prompt assembly and memory formatting |\n| `session_repair` | Message history validation and safe trimming |\n| `proactive_memory` | Background memory extraction and retrieval |\n| `pii_filter` | Personally identifiable information redaction |\n| `hooks` | Lifecycle hook registry (before/after tool call, loop end) |\n| `web_search` / `web_fetch` / `web_content` | Web access tools |\n| `mcp` | Model Context Protocol connections (re-exported) |\n| `sandbox` | WASM sandboxing (re-exported from `librefang-runtime-wasm`) |\n| `plugin_manager` / `plugin_runtime` | Plugin lifecycle |\n| `model_catalog` | Model metadata, aliases, and provider detection |\n| `retry` | Exponential backoff for rate-limited API calls |\n| `routing` | Request routing across providers |\n| `embedding` | Embedding driver trait for vector recall |\n\nRe-exported crates: `llm_driver`, `llm_errors`, `drivers`, `http_client`, `kernel_handle`, `mcp`, `mcp_oauth`, `sandbox`, `host_functions`, `chatgpt_oauth`, `copilot_oauth`.\n\n## Core Agent Loop\n\nThe entry points are `run_agent_loop` and `run_agent_loop_streaming`. They implement the same algorithm; the streaming variant yields `StreamEvent` tokens to the caller in real time.\n\n### Execution Phases\n\n1. **Experiment selection** — `select_running_experiment` checks the kernel for an active A/B test and picks a variant based on deterministic session-hash traffic splitting.\n\n2. **Memory recall** — `setup_recalled_memories` queries the `ContextEngine` (if present), falls back to embedding-based vector recall via `EmbeddingDriver`, or uses plain text search. Proactive memory (`auto_retrieve`) is merged in for non-fork, non-stable-prefix-mode turns.\n\n3. **Prompt assembly** — `build_prompt_setup` merges the manifest's system prompt, experiment variant (if active), recalled memories, and a language-matching instruction.\n\n4. **Message preparation** — `prepare_llm_messages` filters out system messages, injects canonical context, trims to `MAX_HISTORY_MESSAGES` (40) at safe turn boundaries, strips stale image data, and repairs any structural damage.\n\n5. **LLM loop** — The loop runs up to `MAX_ITERATIONS` (50) turns:\n   - Call the LLM driver.\n   - If the response is `end_turn`, break.\n   - If `max_tokens` was hit, auto-continue up to `MAX_CONTINUATIONS` (5).\n   - If `tool_use`, stage the turn via `StagedToolUseTurn`, execute each tool through `execute_single_tool_call`, and feed results back.\n   - Check mid-turn signals (injected messages, approval resolutions).\n   - Track consecutive hard failures; abort after `MAX_CONSECUTIVE_ALL_FAILED` (3).\n\n6. **Finalization** — `finalize_successful_end_turn` saves the assistant response, persists the session, writes episodic memory, fires the `AgentLoopEnd` hook, runs `auto_memorize` for proactive memory, and checks skill evolution eligibility.\n\n### Loop Guards and Safety\n\n- **`LoopGuard`** — Per-tool circuit breaker. Configurable thresholds emit `Warn`, `Block`, or `CircuitBreak` verdicts. A circuit break saves the session and exits the loop with an error.\n- **`MAX_ITERATIONS`** (50) — Absolute upper bound on LLM turns.\n- **`MAX_HISTORY_MESSAGES`** (40) — Message history auto-trimmed at conversation boundaries. Both the LLM working copy and the canonical session are trimmed so the persisted blob stays bounded.\n- **`TOOL_TIMEOUT_SECS`** (600) — Per-tool execution deadline.\n- **`MAX_CONSECUTIVE_ALL_FAILED`** (3) — Stops expensive wheel-spinning when every tool in a batch fails.\n\n### Staged Tool-Use Turns\n\n`StagedToolUseTurn` is the structural fix for issue #2381. Previously, the assistant's `tool_use` message was eagerly appended to `session.messages` before tools executed. Any mid-turn exit (error, signal) left an orphan `tool_use` block without a paired `tool_result`, causing the next API call to fail with \"tool_call_ids did not have response messages.\"\n\nThe staged approach buffers both the assistant message and all tool results locally. Only `commit()` touches the persisted vectors, and it does so atomically. If the staged turn is dropped without commit — which is what `?` propagation does — `session.messages` is untouched.\n\nKey methods:\n- `append_result(block)` — accumulate one tool result\n- `pad_missing_results()` — synthesize \"tool interrupted\" results for any `tool_use_id` that never got a real result\n- `commit(session, messages)` — atomically push assistant + user messages, return outcome summary\n\n### Fork Mode\n\n`LoopOptions { is_fork: true }` marks a derivative turn (auto-dream, memory extraction). Forks:\n- Do **not** persist session changes to disk\n- Do **not** trigger `auto_memorize` / `auto_retrieve` / context engine updates (preventing infinite recursion)\n- Fire `AgentLoopEnd` hooks with `is_fork: true` so subscribers like auto-dream can filter themselves out\n- Share the parent session's messages as a prompt prefix for Anthropic cache hit alignment\n\n### Runtime Tool Allowlist\n\n`LoopOptions::allowed_tools` enforces a secondary allowlist at execute time rather than stripping tools from the request schema. This keeps the request body byte-identical to the parent turn for prompt cache hits while preventing the model from invoking disallowed tools — it receives a synthetic error result instead.\n\n### Web Search Augmentation\n\nWhen an agent's model doesn't support tool use (e.g. small local models), `web_search_augment` can inject search results into the context. The `WebSearchAugmentationMode` setting (`Off`, `Auto`, `Always`) controls this. In `Auto` mode, augmentation activates when `model_supports_tools` is false. Search queries can be generated by a secondary LLM call (`generate_search_queries`) or fall back to the raw user message.\n\n### Retry and Backoff\n\nTransient LLM errors (rate limits, overloaded) are retried up to `MAX_RETRIES` (3) with exponential backoff starting at `BASE_RETRY_DELAY_MS` (1000ms). Auth cooldowns are tracked per-provider via `ProviderCooldown`.\n\n### Context Overflow Recovery\n\nWhen the context window is exceeded, `recover_from_overflow` applies a multi-stage recovery strategy (defined in `context_overflow`) — summarization, aggressive trimming, or fallback to a minimal context — to keep the loop running.\n\n### PII Filtering\n\nUser messages pass through `PiiFilter::filter_message` before entering the session. The `PrivacyConfig::mode` setting controls whether filtering is active. Group-chat sender prefixes are applied after filtering to prevent display names that look like emails from being redacted.\n\n### Group Chat Support\n\nIn group chats (`is_group: true` in manifest metadata), user messages are prefixed with `[sanitized_sender]:` via `build_group_sender_prefix`. The sender label is sanitized by `sanitize_sender_label` to prevent spoofing.\n\n## A2A Protocol Module\n\nImplements Google's Agent-to-Agent protocol for cross-framework agent interoperability.\n\n### Agent Cards\n\n`AgentCard` is a JSON capability manifest served at `/.well-known/agent.json`. It describes:\n- Agent identity (`name`, `description`, `url`)\n- Capabilities (`streaming`, `push_notifications`, `state_transition_history`)\n- Skills (converted from tool names via `build_agent_card`)\n- Supported I/O modes\n\n`build_agent_card(manifest, base_url)` constructs a card from a LibreFang `AgentManifest`, mapping each tool to an `AgentSkill`.\n\n### Tasks\n\n`A2aTask` is the unit of work exchanged between agents. Status progression:\n\n```\nSubmitted → Working → InputRequired → Completed\n                   ↘ Failed\n                   ↘ Cancelled\n```\n\n`A2aTaskStatusWrapper` handles the two serialization forms used by different A2A implementations:\n- **Object form**: `{\"state\": \"completed\", \"message\": null}`\n- **Bare enum form**: `\"completed\"`\n\nBoth deserialize correctly; `.state()` extracts the underlying `A2aTaskStatus`.\n\n### Task Store\n\n`A2aTaskStore` is an in-memory, bounded store for tracking task lifecycle. Default capacity is 1000 tasks with a 24-hour TTL.\n\nEviction policy (applied lazily on `insert`):\n1. **TTL sweep** — remove all tasks older than `task_ttl`, regardless of state. This prevents `Working`/`InputRequired` tasks from accumulating indefinitely.\n2. **Capacity eviction** — if still at capacity, evict the oldest terminal-state task first (`Completed`/`Failed`/`Cancelled`), then fall back to the oldest task overall.\n\nKey methods:\n- `insert(task)` — insert with eviction\n- `get(task_id)` — retrieve by ID\n- `complete(task_id, response, artifacts)` — mark completed with message\n- `fail(task_id, error_message)` — mark failed\n- `cancel(task_id)` — mark cancelled\n\n### A2A Client\n\n`A2aClient` discovers and interacts with external A2A agents:\n- `discover(url)` — fetches `/.well-known/agent.json` from a remote agent\n- `send_task(url, message, session_id)` — sends a `tasks/send` JSON-RPC request\n- `get_task(url, task_id)` — polls `tasks/get` for task status\n\n`discover_external_agents` is called during kernel boot to populate the list of known external agents from configuration.\n\n### Message and Artifact Types\n\n- `A2aMessage` — carries `role` (\"user\"/\"agent\") and `parts: Vec<A2aPart>`\n- `A2aPart` — tagged union: `Text { text }`, `File { name, mime_type, data }`, or `Data { mime_type, data }`\n- `A2aArtifact` — output with optional `name`, `description`, `metadata`, `index`, `last_chunk`, and `parts`\n\n## Key Types Reference\n\n### `AgentLoopResult`\n\nReturned by the agent loop. Fields of note:\n- `response` — final text (empty when `silent`)\n- `total_usage` — cumulative `TokenUsage` across all LLM calls\n- `iterations` — number of loop turns executed\n- `silent` — agent chose not to reply (`NO_REPLY` / `[[silent]]`)\n- `provider_not_configured` — no LLM provider available (distinct from `silent`)\n- `decision_traces` — per-tool-call trace with timing, rationale, and outcomes\n- `memories_saved` / `memories_used` / `memory_conflicts` — memory system telemetry\n- `experiment_context` — A/B test variant, if active\n- `new_messages_start` — index into `session.messages` where this turn's messages begin\n- `skill_evolution_suggested` — true when 5+ tool calls indicate a reusable skill pattern\n\n### `LoopPhase`\n\nLifecycle phases for UX indicators:\n- `Thinking` — LLM call in progress\n- `ToolUse { tool_name }` — tool executing\n- `Streaming` — tokens being yielded\n- `Done` — completed successfully\n- `Error` — encountered an error\n\n### `LoopOptions`\n\n- `is_fork` — derivative turn (no persistence, no memory writes)\n- `allowed_tools` — optional runtime allowlist enforced at execute time\n\n## Utility Constants\n\n| Constant | Value | Purpose |\n|----------|-------|---------|\n| `MAX_ITERATIONS` | 50 | Hard limit on LLM loop turns |\n| `MAX_RETRIES` | 3 | Retries for transient API errors |\n| `BASE_RETRY_DELAY_MS` | 1000 | Exponential backoff base |\n| `TOOL_TIMEOUT_SECS` | 600 | Per-tool execution deadline |\n| `MAX_CONTINUATIONS` | 5 | Consecutive `max_tokens` continuations |\n| `MAX_HISTORY_MESSAGES` | 40 | History trim th
