nnect\" buttons for remote mode\n- \"Start Local Server\" button for local mode\n- A \"Remember this choice\" checkbox\n- Status display area for feedback\n\nThe HTML calls Tauri IPC commands via `window.__TAURI__.core.invoke()`. On connection success, the server-side command navigates the WebView to the dashboard URL.\n\n### Persisted Preferences\n\nConnection preferences are stored in `~/.librefang/desktop.toml`:\n\n```toml\n[connection]\nmode = \"remote\"        # or \"local\"\nserver_url = \"http://...\"  # absent for local mode\n```\n\n`load_saved_preference()` and `save_preference()` handle reading/writing this file. The preference is only saved after a successful connection (health check passes).\n\n## System Tray\n\nThe `tray` module creates a rich context menu on the system tray icon. Menu items are built dynamically based on current state:\n\n**Actions:**\n- **Show Window** — Focuses and unhides the main window\n- **Open in Browser** — Opens the current dashboard URL in the default browser\n- **Change Server** — Shuts down any local server, clears state, navigates back to the connection screen\n\n**Status (read-only):**\n- Displays agent count and uptime (for local mode) or remote URL\n- Uptime is formatted via `format_uptime()` (e.g., `45s`, `12m 30s`, `2h 15m`)\n\n**Settings:**\n- **Launch at Login** — Toggle via `CheckMenuItem`, backed by `tauri-plugin-autostart`\n- **Check for Updates** — Triggers a manual update check and install flow with native notifications\n- **Open Config Directory** — Opens `~/.librefang/`\n\n**Quit** — Calls `app.exit(0)` for clean shutdown.\n\nLeft-click on the tray icon shows/focuses the window.\n\n## Global Shortcuts\n\nThree system-wide keyboard shortcuts registered via `tauri-plugin-global-shortcut`:\n\n| Shortcut | Action |\n|---|---|\n| `Ctrl+Shift+O` | Show/focus the LibreFang window |\n| `Ctrl+Shift+N` | Show window + emit `navigate` event with payload `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `navigate` event with payload `\"chat\"` |\n\nThe `navigate` event is emitted via `app.emit()` — the WebView frontend listens for it to change routes. Registration failure is non-fatal (logged as a warning).\n\n## Auto-Update System\n\nThe `updater` module wraps `tauri-plugin-updater`.\n\n### Startup Auto-Update\n\n`spawn_startup_check()` runs after a 10-second delay to avoid competing with startup I/O. If an update is found, it:\n\n1. Sends a native notification (\"Installing v{version}...\")\n2. Waits 3 seconds for the notification to be visible\n3. Downloads and installs the update\n4. Calls `app_handle.restart()` — the process exits and relaunches\n\nAll errors are logged; the app continues running normally if the update fails.\n\n### On-Demand Update\n\nThe `check_for_updates` IPC command returns an `UpdateInfo` struct:\n\n```rust\npub struct UpdateInfo {\n    pub available: bool,\n    pub version: Option<String>,\n    pub body: Option<String>,\n}\n```\n\nThe `install_update` IPC command downloads and installs — on success, `restart()` is called and the function never returns `Ok`.\n\n### Tray-Initiated Update\n\nThe \"Check for Updates\" tray menu item runs the same check/install flow with native notifications for each stage (downloading, success, failure).\n\n## Event Forwarding and Notifications\n\n`forward_kernel_events()` subscribes to the kernel's event bus and converts critical events into native OS notifications:\n\n| Event | Notification Title | Condition |\n|---|---|---|\n| `LifecycleEvent::Crashed` | \"Agent Crashed\" | Agent terminated unexpectedly |\n| `SystemEvent::KernelStopping` | \"Kernel Stopping\" | Kernel shutdown initiated |\n| `SystemEvent::QuotaEnforced` | \"Quota Enforced\" | Agent hit spending limit |\n\nAll other events are ignored. The listener handles broadcast channel lag gracefully (logs a warning) and exits cleanly when the channel closes.\n\nEvent forwarding is started:\n- In `run()` setup for direct local boot mode\n- In `start_local()` when the user chooses local from the connection screen\n\n## Window Behavior\n\n- **Close** — Intercepted via `on_window_event`. The window is hidden instead of destroyed, keeping the app running in the tray.\n- **Single instance** — `tauri-plugin-single-instance` focuses the existing window if a second instance is launched.\n- **Minimum size** — 800×600. Default size 1280×800, centered.\n\n## Feature Flags\n\n| Feature | Effect |\n|---|---|\n| `default` | Builds `librefang-api` with default features |\n| `all-channels` | Enables all channel backends in the API |\n| `mini` | Minimal API feature set |\n| `custom-protocol` | Uses Tauri's custom protocol scheme (production builds) |\n\n## Key File Locations\n\n| Path | Purpose |\n|---|---|\n| `~/.librefang/` | Root config directory |\n| `~/.librefang/desktop.toml` | Saved connection preference |\n| `~/.librefang/.env` | Environment variables loaded at startup |\n| `~/.librefang/skills/` | Imported skill files |\n| `~/.librefang/workspaces/agents/{name}/agent.toml` | Imported agent manifests |\n| `~/.librefang/logs/` | Log files |","documentation-articles":"# Documentation — articles\n\n# Documentation — Articles\n\nMarkdown articles published to external platforms (Dev.to, canonical blog) announcing releases, features, and project milestones.\n\n## Purpose\n\nThis module is the content source for all externally published articles about LibreFang. Articles are **not executed at runtime** — they are static Markdown files consumed by publishing pipelines and syndicated to platforms like Dev.to.\n\nThe module serves three distinct functions:\n\n1. **Release announcements** — Version-specific changelogs formatted as developer-facing articles\n2. **Project introductions** — Evergreen content explaining what LibreFang is and how to get started\n3. **Milestone posts** — Announcements for major events (website launches, architecture overhauls)\n\n## File Inventory\n\n| File | Type | Version / Scope |\n|------|------|-----------------|\n| `hello-librefang.md` | Introduction | Evergreen — project overview, quick start, contributing guide |\n| `new-website-launch.md` | Milestone | Website redesign announcement with architecture details |\n| `release-0.5.6.md` | Release | v0.5.6 — CLI i18n, Telegram reply-to, SDK publishing |\n| `release-0.5.7.md` | Release | v0.5.7 — Multi-token fallback, event webhooks, multi-agent foundations |\n| `release-0.6.0.md` | Release | v0.6.0 — Memory/context engine, NVIDIA NIM, Vertex AI, cron workflows |\n| `release-0.6.1.md` | Release | v0.6.1 — CLI name resolution, API response consistency, dashboard i18n |\n| `release-0.6.2.md` | Release | v0.6.2 — Provider config deduplication, CI build fix (17 compilation errors) |\n| `release-0.6.3.md` | Release | v0.6.3 — Vault auto-init, webhook decryption, POSIX installer |\n| `release-0.6.4.md` | Release | v0.6.4 — Qwen Code CLI provider, image pipeline, web deployment overhaul |\n| `release-0.6.5.md` | Release | v0.6.5 — Security hardening, multi-provider cost tracking, rustls TLS |\n| `release-0.6.6.md` | Release | v0.6.6 — Docker `build-push-action@v7` compatibility fix |\n| `release-0.6.7.md` | Release | v0.6.7 — HAND manifest routing, raw JSON context hooks, GitHub Discussions |\n| `release-0.6.8.md` | Release | v0.6.8 — CLI on npm/PyPI, external DM routing |\n| `release-0.7.0.md` | Release | v0.7.0 — LLM intent routing, OpenFang migration, CORS/rate-limit/audit config |\n| `release-2026.3.21.md` | Release | CalVer debut — Azure OpenAI, DeepInfra, dashboard redesign, 30+ fixes |\n| `release-2026.3.22.md` | Release | CalVer consolidation — 50+ improvements, pipeline runner agents, plugin scoping |\n\n## Front Matter Schema\n\nEvery article uses a consistent YAML front matter block:\n\n```yaml\n---\ntitle: \"LibreFang X.Y.Z Released\"          # Required — article headline\npublished: true                             # Required — controls visibility\ndescription: \"One-line summary for SEO\"     # Required — appears in link previews\ntags: rust, ai, opensource, release         # Required — comma-separated platform tags\ncanonical_url: https://github.com/...       # Required — original source URL\ncover_image: https://raw.githubusercontent.com/librefang/librefang/main/public/assets/logo.png\n---\n```\n\n### Tag Conventions\n\n| Article Type | Tags |\n|-------------|------|\n| Release notes | `rust, ai, opensource, release` |\n| Introduction | `rust, ai, opensource, agents` |\n| Web/milestone | `opensource, rust, ai, webdev` |\n\n## Article Structure Patterns\n\n### Release Notes\n\nAll release notes follow a predictable structure:\n\n```markdown\n# LibreFang X.Y.Z Released\n\n[2-3 sentence summary of the release theme]\n\n## [Category emojis + headings organized by impact]\n\n[Grouped changes with issue references in parentheses]\n\n## Install / Upgrade\n\n[Standard install block — binary, Rust SDK, JS SDK, Python SDK]\n\n## Links\n\n[Full Changelog, GitHub Release, GitHub, Discord, Contributing Guide]\n```\n\nRelease notes reference GitHub issues and PRs by number (e.g., `#441`, `#1088`) and credit contributors by username (e.g., `@SenZhangAI`).\n\n### Version Naming Transition\n\nThe project switched from SemVer to CalVer starting with `v2026.3.21`:\n\n- **Pre-CalVer**: `release-0.5.6.md`, `release-0.6.0.md`, … `release-0.7.0.md`\n- **CalVer**: `release-2026.3.21.md`, `release-2026.3.22.md`\n\nCalVer format is `YYYY.M.DDHH` (e.g., `2026.3.2201`).\n\nThe `canonical_url` field maps to the corresponding GitHub release tag:\n- SemVer: `.../releases/tag/v0.6.4-20260320`\n- CalVer: `.../releases/tag/v2026.3.2201`\n\n## Content Conventions\n\n### Install Block\n\nEvery release article includes the same install block:\n\n```bash\n# Binary\ncurl -fsSL https://get.librefang.ai | sh\n\n# Rust SDK\ncargo add librefang\n\n# JavaScript SDK\nnpm install @librefang/sdk\n\n# Python SDK\npip install librefang-sdk\n```\n\nThis block must be kept in sync with the actual distribution channels. The install URL `https://get.librefang.ai` and package names (`librefang`, `@librefang/sdk`, `librefang-sdk`) are referenced in the CI/CD release pipeline.\n\n### Links Block\n\nEvery release article ends with the same link set:\n\n```markdown\n- [Full Changelog](https://github.com/librefang/librefang/blob/main/CHANGELOG.md)\n- [GitHub Release](https://github.com/librefang/librefang/releases/tag/v...)\n- [GitHub](https://github.com/librefang/librefang)\n- [Discord](https://discord.gg/DzTYqAZZmc)\n- [Contributing Guide](https://github.com/librefang/librefang/blob/main/docs/CONTRIBUTING.md)\n```\n\nThe only variable is the GitHub Release URL, which changes per version.\n\n## Publishing Pipeline\n\nBased on release notes referencing \"automated release announcements\" (#0.5.6), articles are generated or published through a CI workflow:\n\n1. **Trigger** — A GitHub release is published\n2. **Generate** — Release notes are converted to article Markdown\n3. **Publish** — Articles are posted to Dev.to via API\n\nThe workflow was fixed in v0.5.6 (YAML syntax error in Bluesky notification) and v0.6.1 (Dev.to markdown fence wrapper removal in #1167).\n\n## Contributing a New Article\n\n### For a Release\n\n1. Create `articles/release-X.Y.Z.md` (or `release-YYYY.M.DD.md` for CalVer)\n2. Copy the front matter from an existing release article\n3. Update `title`, `description`, `canonical_url`, and `cover_image`\n4. Write the body following the release note structure\n5. Reference GitHub issues/PRs by number\n6. Include the standard Install and Links blocks\n7. Ensure the `canonical_url` matches the actual GitHub release tag\n\n### For a Non-Release Article\n\n1. Choose an appropriate filename (e.g., `new-website-launch.md`, `hello-librefang.md`)\n2. Use tags relevant to the content topic\n3. Write for an external developer audience — not internal documentation\n4. Include practical commands, code blocks, or comparison tables where applicable\n\n### Validation Checklist\n\n- [ ] Front matter is complete (`title`, `published`, `description`, `tags`, `canonical_url`, `cover_image`)\n- [ ] No raw HTML in Markdown\n- [ ] Code blocks specify their language for syntax highlighting\n- [ ] Issue references use `#NNN` format\n- [ ] Install block matches current distribution channels\n- [ ] Links block points to correct release tag","documentation-docs":"# Documentation — docs\n\n# Documentation Site (`docs/`)\n\nThe LibreFang documentation website — a statically exported Next.js application powered by MDX, Tailwind CSS, and a custom content pipeline. It serves as the official docs hub with full-text search, dark mode, and bilingual support (Chinese + English).\n\n## Architecture Overview\n\n```mermaid\ngraph LR\n    A[MDX Pages<br>src/app/**/page.mdx] --> B[Remark Plugins]\n    B --> C[Rehype Plugins]\n    C --> D[Recma Plugins]\n    D --> E[Static HTML Export]\n    F[Search Plugin] --> E\n    G[MDX Components<br>src/components/mdx] --> A\n    E --> H[Cloudflare Pages]\n```\n\nContent is authored as `.mdx` files under `src/app/`. Next.js processes them through a three-stage MDX pipeline (remark → rehype → recma), wraps them with shared UI components via `mdx-components.tsx`, and produces a static site deployed to Cloudflare Pages.\n\n## Key Configuration Files\n\n| File | Purpose |\n|------|---------|\n| `next.config.mjs` | Next.js config — MDX pipeline, static export, Shiki for syntax highlighting |\n| `tsconfig.json` | TypeScript paths — aliases `@/*`, `@web/ui`, `@web/shared`, `@web/config` |\n| `postcss.config.js` | PostCSS with `@tailwindcss/postcss` plugin |\n| `typography.ts` | Tailwind Typography theme — custom colors, spacing, dark mode variants |\n| `mdx-components.tsx` | MDX component provider — maps all `@/components/mdx` exports into every MDX page |\n| `package.json` | Dependencies, scripts, engine requirements |\n\n## Static Export Configuration\n\nThe site is configured for full static export in `next.config.mjs`:\n\n```js\noutput: \"export\",\nimages: { unoptimized: true },\n```\n\nThis means no server-side rendering or API routes — everything precompiles to flat HTML/CSS/JS at build time.\n\n## MDX Processing Pipeline\n\nThe content pipeline is assembled in `next.config.mjs` and applied in a specific order:\n\n```js\nconst finalConfig = withMDX(withSearch(nextConfig));\n```\n\n1. **`withSearch`** wraps the config to enhance search indexing (defined in `src/mdx/search.mjs`)\n2. **`withMDX`** applies `@next/mdx` with three plugin layers:\n   - **Remark plugins** (`src/mdx/remark.mjs`) — transform the Markdown AST\n   - **Rehype plugins** (`src/mdx/rehype.mjs`) — transform the HTML AST\n   - **Recma plugins** (`src/mdx/recma.mjs`) — transform the JavaScript AST output\n\nShiki is registered as a `serverExternalPackage` for server-side syntax highlighting during build.\n\n### Component Injection\n\n`mdx-components.tsx` exports `useMDXComponents`, which merges the shared component set from `@/components/mdx` into every MDX page. This provides consistent rendering for code blocks, callouts, tables, and other custom elements.\n\n## Typography Theme\n\n`typography.ts` defines a comprehensive prose theme for `@tailwindcss/typography`:\n\n- **Light mode**: zinc-based neutrals with emerald accent links\n- **Dark mode** (`invert` variant): inverted palette with adjusted opacity values\n- Covers body text, headings (h1–h3), lists, blockquotes, tables, inline code, horizontal rules, and media elements\n- Responsive horizontal rule margins at `sm` and `lg` breakpoints\n\nTo apply the theme, import and spread it into your Tailwind typography config:\n\n```js\nimport typographyConfig from './typography';\n```\n\n## Adding New Pages\n\n1. Create a directory under `src/app/`, e.g. `src/app/new-topic/`\n2. Add a `page.mdx` file inside it\n3. Export a `sections` array at the end of the file for sidebar navigation:\n\n```mdx\n# New Topic\n\nContent here...\n\nexport const sections = [\n  { title: \"Section Title\", id: \"section-id\" }\n];\n```\n\nThe `pageExtensions` config in `next.config.mjs` includes `mdx`, so Next.js automatically routes these files.\n\n## Multilingual Structure\n\n- `/` — Chinese (default locale)\n- `/en/` — English content synced from the LibreFang repository\n\nBoth locales live under `src/app/` using Next.js file-system routing conventions.\n\n## Development Commands\n\n| Command | Description |\n|---------|-------------|\n| `pnpm dev` | Start dev server on port 3001 |\n| `pnpm build` | Produce static export |\n| `pnpm start` | Serve the built site on port 3001 |\n| `pnpm lint` | Run Biome checks |\n| `pnpm lint:fix` | Run Biome with auto-fix |\n| `pnpm typecheck` | TypeScript type checking (no emit) |\n| `pnpm format` | Format `src/` with Biome |\n\n**Requirements**: Node ≥ 18, pnpm ≥ 9.\n\n## Monorepo Path Aliases\n\n`tsconfig.json` maps several monorepo package paths for cross-package imports:\n\n| Alias | Target |\n|-------|--------|\n| `@/*` | `./src/*` |\n| `@/components/*` | `./src/components/*` |\n| `@/lib/*` | `./src/lib/*` |\n| `@/app/*` | `./src/app/*` |\n| `@web/ui` | `../../packages/react/src/index.ts` |\n| `@web/shared` | `../../packages/shared/src/index.ts` |\n| `@web/config` | `../../packages/config/src/index.ts` |\n\nThis allows the docs site to import shared UI components and utilities from sibling packages in the monorepo.\n\n## Deployment\n\nThe site auto-deploys to **Cloudflare Pages**. The static export output from `next build` is served directly — no Node.js runtime required.","documentation-src":"# Documentation — src\n\n# Documentation Site (`docs/src`)\n\nThe documentation site is a Next.js application with MDX support that renders LibreFang's product documentation. It provides full-text search, scroll-tracked navigation, syntax-highlighted code blocks, and a responsive layout with mobile support.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    MDX[MDX Page Files] --> Build[Next.js Build Pipeline]\n    Build --> rehype[rehype.mjs - Section Extraction]\n    Build --> search[search.mjs - Search Index]\n    rehype --> Sections[Section Data]\n    search --> SearchIndex[Search Index JSON]\n    \n    Sections --> Nav[Navigation.tsx]\n    SearchIndex --> SearchComp[Search.tsx]\n    \n    Layout[Layout.tsx] --> Nav\n    Layout --> Content[Page Content]\n    Layout --> Footer[Footer]\n    \n    SectionProvider[SectionProvider.tsx] --> Nav\n    Heading[Heading.tsx] --> SectionProvider\n```\n\n## Component Hierarchy\n\nThe rendering pipeline flows through these layers:\n\n1. **`Layout`** (`src/components/Layout.tsx`) — wraps every documentation page. Uses `withPrefix` (`src/lib/utils.ts`) to resolve URL paths, accounting for configured base paths.\n\n2. **`Navigation`** (`src/components/Navigation.tsx`) — sidebar with collapsible section groups. Each `NavigationGroup` reads section metadata from `SectionProvider` and renders expandable link lists.\n\n3. **`SectionProvider`** (`src/components/SectionProvider.tsx`) — shared state for tracking which headings are visible in the viewport. Uses `createSectionStore` to produce a Zustand-like store, consumed via `useSectionStore`.\n\n4. **`Heading`** (`src/components/Heading.tsx`) — registers each `<h2>`/`<h3>` with the section store and provides the scroll anchor that `VisibleSectionHighlight` and `ActivePageMarker` use to track reading position.\n\n5. **`CodeGroup`** (`src/components/Code.tsx`) — tabbed code block renderer. `getPanelTitle` infers tab labels from filenames or language identifiers. `useTabGroupProps` calls `usePreventLayoutShift` to avoid visual jumps when switching tabs.\n\n6. **`Search`** (`src/components/Search.tsx`) — full-text search modal. `useSearchProps` manages query state, keyboard navigation through results, and calls `onNavigate` on selection. A separate `MobileSearch` variant shares the same hook.\n\n7. **`MobileNavigation`** (`src/components/MobileNavigation.tsx`) — slide-out drawer for small screens. Exposes `useIsInsideMobileNavigation` so nested components can suppress desktop-only behaviors (e.g., scroll tracking, hover states).\n\n8. **`ThemeWatcher`** (`src/app/providers.tsx`) — listens for `prefers-color-scheme` changes via `onMediaChange` and applies the user's theme preference.\n\n## Scroll Tracking System\n\nThe documentation site highlights the currently visible section in the sidebar. This involves three cooperating pieces:\n\n- **`useVisibleSections`** — a `useEffect` hook in `SectionProvider.tsx` that sets up an `IntersectionObserver` on all registered headings. On each intersection event it calls `checkVisibleSections` to update the store.\n\n- **`VisibleSectionHighlight`** — reads the visible section IDs from `useSectionStore` and renders a positioned highlight bar behind the active navigation item. Uses `remToPx` (`src/lib/remToPx.ts`) for unit conversion.\n\n- **`ActivePageMarker`** — marks the current page's link in the sidebar, using `remToPx` for positioning.\n\nThe `NavigationGroup` component uses `useInitialValue` to determine whether its section list should start expanded (if the current page is inside that group).\n\n## MDX Processing Pipeline\n\n### Section Extraction (`src/mdx/rehype.mjs`)\n\nA custom rehype plugin (`getSections`) walks the MDX AST at build time and extracts heading text, IDs, and nesting depth. This produces the structured data that populates the sidebar's collapsible section lists.\n\n### Search Index Generation (`src/mdx/search.mjs`)\n\nThe `extractSections` function walks MDX content and produces a searchable index. It calls `excludeObjectExpressions` to strip out JSX object expressions (like `<Note>` component props) that shouldn't appear in search results. The output is a JSON file consumed at runtime by the `Search` component.\n\n## Navigation Integration\n\nThe `navigate` function from `Search.tsx` is the central routing primitive. It calls `onNavigate` internally and is consumed throughout the dashboard and documentation pages:\n\n| Caller | Trigger |\n|--------|---------|\n| `ChatPage` | Cross-community navigation events |\n| `HandsPage`, `AgentsPage` | Card clicks and list interactions |\n| `WorkflowsPage` | `openWorkflow`, `handleNewWorkflow`, `handleUseTemplate` |\n| `CanvasPage` | Internal page transitions |\n| `NotificationCenter` | `goToAgent`, `handleAction` |\n| `CommandPalette` | Keyboard-driven navigation |\n| `useKeyboardShortcuts` | `handleKeyDown` for global shortcuts |\n\n## Utility Modules\n\n### `src/lib/remToPx.ts`\n\nConverts `rem` values to pixel values by reading the document root font size. Used by `ActivePageMarker`, `VisibleSectionHighlight`, and `Heading` for precise pixel-based positioning.\n\n### `src/lib/utils.ts`\n\nExports `withPrefix`, which prepends the configured base path to URLs. Called by `Layout`, `Navigation`, and other components that render links.\n\n### `src/lib/useKeyboardShortcuts.ts`\n\nRegisters global keyboard event listeners. `handleKeyDown` invokes `navigate` from Search to support keyboard-driven page transitions.\n\n## Key Design Decisions\n\n**Subprocess-per-hook for plugins** — the documentation for context engine plugins (`docs/src/app/agent/plugins/page.mdx`) explains that each hook invocation spawns a fresh subprocess. This is reflected in the docs site's own architecture: the MDX build pipeline isolates content processing from runtime rendering.\n\n**Scroll-based navigation state** — rather than tracking URL hash fragments, the section highlight system uses `IntersectionObserver`. This means the highlight updates continuously as the user scrolls, without requiring hash changes or history entries.\n\n**Search index at build time** — the search index is generated during the Next.js build by `search.mjs`, keeping the runtime bundle small. The `Search` component loads the index on demand when the search modal opens.\n\n## File Map\n\n```\ndocs/src/\n├── app/\n│   ├── providers.tsx              # ThemeWatcher, global providers\n│   ├── agent/\n│   │   ├── hands/page.mdx         # Autonomous Hands docs\n│   │   ├── memory/page.mdx        # Memory System docs\n│   │   ├── plugins/page.mdx       # Context Engine Plugins docs\n│   │   ├── prompt-intelligence/page.mdx  # Prompt A/B testing docs\n│   │   ├── skills/page.mdx        # Skill Development docs\n│   │   ├── templates/page.mdx     # Agent Templates Catalog\n│   │   └── workflows/page.mdx     # Workflow Engine Guide\n│   └── architecture/page.mdx      # Architecture overview\n├── components/\n│   ├── Code.tsx                   # CodeGroup, useTabGroupProps, getPanelTitle\n│   ├── Heading.tsx                # Section-aware heading with anchor\n│   ├── Layout.tsx                 # Page layout wrapper\n│   ├── MobileNavigation.tsx       # Mobile drawer + useIsInsideMobileNavigation\n│   ├── Navigation.tsx             # Sidebar: NavigationGroup, VisibleSectionHighlight, ActivePageMarker\n│   ├── NotificationCenter.tsx     # Toast/notification rendering\n│   ├── Search.tsx                 # Search modal + useSearchProps + navigate\n│   └── SectionProvider.tsx        # useVisibleSections, createSectionStore, useSectionStore\n├── lib/\n│   ├── remToPx.ts                 # rem → px conversion\n│   ├── useKeyboardShortcuts.ts    # Global keyboard handler\n│   └── utils.ts                   # withPrefix URL helper\n└── mdx/\n    ├── rehype.mjs                 # Section extraction plugin (getSections)\n    └── search.mjs                 # Search index builder (extractSections, excludeObjectExpressions)\n```\n\n## Adding New Documentation Pages\n\n1. Create a new `page.mdx` file under the appropriate route directory in `docs/src/app/`.\n2. Write MDX content using standard Markdown plus the available components (`Note`, `CodeGroup`, etc.).\n3. The build pipeline automatically runs `rehype.mjs` to extract sections and `search.mjs` to index the page content.\n4. Add a navigation entry in the documentation config (typically a navigation JSON or TOML file referenced by `Navigation.tsx`) so the page appears in the sidebar.\n\nNo changes to the component layer are required for new content pages — the section extraction, search indexing, and scroll tracking all work automatically based on the MDX heading structure.","documentation":"# Documentation\n\n# Documentation\n\nThe Documentation module encompasses LibreFang's documentation site and external publishing content. It includes the Next.js application that renders the docs site, its source components and build pipeline, and the standalone articles published to external platforms.\n\n## Sub-modules\n\n| Sub-module | Purpose |\n|---|---|\n| [src](src.md) | Component source, MDX build pipeline (rehype section extraction, search indexing), and UI layer |\n| [docs](docs.md) | Top-level site configuration, MDX plugin chain (remark → rehype → recma), Tailwind setup, and Cloudflare Pages deployment |\n| [articles](articles.md) | Static Markdown articles for external syndication (Dev.to, blog) — release notes, introductions, and milestones |\n\n## How They Fit Together\n\n```\narticles/                 docs/                  src/\n(external content)    (site config & deploy)   (components & pipeline)\n       │                      │                        │\n       │                      │    MDX pages served     │\n       │                      │◄───────────────────────┤\n       │                      │                        │\n       ▼                      ▼                        │\n   Dev.to / Blog      Cloudflare Pages                 │\n                            ▲                          │\n                            └──── static export ───────┘\n```\n\n**Content flow:** MDX files under `src/app/` are processed by the three-stage pipeline configured in [docs](docs.md). The rehype plugin (`src/mdx/rehype.mjs`) extracts heading sections for navigation, while the search plugin (`src/mdx/search.mjs`) builds a full-text search index. Components like `Navigation.tsx`, `Search.tsx`, `SectionProvider.tsx`, and `Heading.tsx` consume this data at runtime to provide scroll-tracked navigation and search.\n\n**Separation of concerns:** [src](src.md) owns the interactive layer and build processing; [docs](docs.md) owns configuration, theming, and deployment. The [articles](articles.md) module is entirely independent — it contains no executable code and feeds only external publishing pipelines.\n\n## Key Cross-Module Workflows\n\n1. **Section-aware navigation** — `rehype.mjs` extracts sections during build → `SectionProvider` tracks visible sections at runtime → `Navigation` and `VisibleSectionHighlight` render the sidebar with scroll tracking\n2. **Full-text search** — `search.mjs` indexes MDX content at build time → `Search.tsx` and `useSearchProps` query the generated index client-side\n3. **Code rendering** — `Code.tsx` and `CodeGroup` handle tabbed code blocks with layout-shift prevention (`usePreventLayoutShift`)","examples":"# Examples\n\n# Examples Module\n\nThis module provides ready-to-use templates and reference implementations for extending LibreFang. Each example is self-contained and can be copied as a starting point for custom agents, skills, and channel adapters.\n\n## What's Included\n\n| Example | Language | Purpose |\n|---------|----------|---------|\n| `custom-agent/` | TOML | Minimal agent configuration template |\n| `custom-skill-prompt/` | TOML | Pure prompt-engineering skill (no code) |\n| `custom-skill-python/` | Python + TOML | Code-based skill with Python runtime |\n| `custom-channel/` | Rust | Native channel adapter implementation guide |\n| `sidecar-channel-bash/` | Bash | Sidecar adapter using the JSON-RPC stdin/stdout protocol |\n| `sidecar-channel-go/` | Go | Sidecar adapter in Go |\n| `sidecar-channel-node/` | JavaScript | Sidecar adapter in Node.js |\n| `sidecar-channel-python/` | Python | Three sidecar adapters: echo, Telegram, and webhook |\n\n---\n\n## Custom Agent\n\n**Directory:** `custom-agent/`\n\nA minimal agent template defined in a single `agent.toml` file. Agents are the core conversational entities in LibreFang — each one configures a model, system prompt, resource limits, and capabilities.\n\n```bash\nlibrefang agent spawn examples/custom-agent/agent.toml\n```\n\n### Key Configuration Sections\n\n- **`[model]`** — Provider, model name, and system prompt. The example uses Groq's `llama-3.3-70b-versatile`.\n- **`[resources]`** — Rate limits such as `max_llm_tokens_per_hour`.\n- **`[capabilities]`** — Declares which tools the agent can use (`web_fetch`, `file_read`, `file_list`), memory scopes (`self.*`), and whether it can spawn sub-agents.\n\nCopy `agent.toml`, modify the fields, and spawn it. See `docs/agent-templates.md` for the full schema.\n\n---\n\n## Custom Skills\n\nSkills are reusable capabilities that agents can invoke. There are two runtime types: `promptonly` (pure prompt templates) and `python` (code-based).\n\n### Prompt-Only Skill\n\n**Directory:** `custom-skill-prompt/`\n\nNo code required — the skill is entirely defined in `skill.toml`. The example generates a meeting agenda from a topic and duration using Jinja-style `{{variable}}` interpolation in the prompt template.\n\n```bash\nlibrefang skill test ./examples/custom-skill-prompt \\\n  --input '{\"topic\": \"Q1 planning\", \"duration_minutes\": \"30\"}'\n```\n\nThe `[input]` section declares typed parameters. The `[prompt]` section contains the template with placeholders. Set `runtime.type = \"promptonly\"`.\n\n### Python Skill\n\n**Directory:** `custom-skill-python/`\n\nA code-based skill with a `main.py` entry point. The Python file must export a `run(input: dict) -> str` function. The example counts words, sentences, and characters in input text.\n\n```bash\nlibrefang skill test ./examples/custom-skill-python --input '{\"text\": \"Hello world\"}'\n```\n\nConfiguration in `skill.toml` sets `runtime.type = \"python\"` and `runtime.entry = \"main.py\"`.\n\n---\n\n## Native Channel Adapters\n\n**Directory:** `custom-channel/`\n\nA complete guide for implementing channel adapters in Rust as part of the `librefang-channels` crate. Channel adapters bridge external messaging platforms into LibreFang by converting platform-specific messages into unified `ChannelMessage` events.\n\n### The `ChannelAdapter` Trait\n\nAll native adapters implement `ChannelAdapter` from `crates/librefang-channels/src/types.rs`. Five methods are required; the rest have defaults:\n\n| Method | Required | Purpose |\n|--------|----------|---------|\n| `name()` | Yes | Human-readable adapter identifier |\n| `channel_type()` | Yes | Returns a `ChannelType` enum variant |\n| `start()` | Yes | Returns a `Stream<Item = ChannelMessage>` of incoming messages |\n| `send()` | Yes | Delivers a response to a user on the platform |\n| `stop()` | Yes | Graceful shutdown and cleanup |\n| `send_typing()` | No | Typing indicator |\n| `send_reaction()` | No | Emoji reaction to a message |\n| `send_in_thread()` | No | Threaded reply (falls back to `send()`) |\n| `status()` | No | Health status reporting |\n\n### Implementation Patterns\n\nThe `MyPlatformAdapter` example in the README demonstrates the standard patterns:\n\n- **Secret management** — Use `Zeroizing<String>` for API keys and tokens so they are wiped from memory on drop.\n- **Shutdown signaling** — Use `watch::channel(false)` to broadcast a shutdown signal to all spawned tasks.\n- **Message bridging** — Use `mpsc::channel` to feed incoming platform messages into the `Stream` that the kernel consumes via `ReceiverStream`.\n- **Long messages** — Use `split_message(text, MAX_LEN)` from `crate::types` to chunk replies that exceed platform limits.\n\n### Integration Steps\n\n1. Create the adapter source file in `crates/librefang-channels/src/`.\n2. Add a `#[cfg(feature = \"channel-myplatform\")] pub mod myplatform;` gate in `lib.rs`.\n3. Add the feature flag to `Cargo.toml` (and to `all-channels` / `default` if appropriate).\n4. Write unit tests covering creation, parsing, and serialization.\n5. Build and test: `cargo build --workspace --features channel-myplatform`.\n\n### Reference Adapters\n\nStudy existing adapters from simplest to most complex:\n\n- **ntfy** (`ntfy.rs`) — SSE subscription + plain POST\n- **webhook** (`webhook.rs`) — HTTP server with HMAC-SHA256 verification\n- **gotify** (`gotify.rs`) — WebSocket + REST\n- **slack** (`slack.rs`) — Socket Mode WebSocket + Web API\n- **telegram** (`telegram.rs`) — Long-polling + Bot API\n\n---\n\n## Sidecar Channel Adapters\n\nSidecar adapters let you write channel integrations in **any language** without modifying the Rust codebase. LibreFang spawns your adapter as a subprocess and communicates via newline-delimited JSON over stdin/stdout.\n\n### Architecture\n\n```mermaid\nflowchart LR\n    subgraph \"LibreFang Kernel\"\n        Router[Message Router]\n    end\n    subgraph \"Sidecar Process\"\n        STDIN[stdin]\n        STDOUT[stdout]\n        Adapter[Your Adapter]\n    end\n    Platform[External Platform]\n    Router -->|send/shutdown commands| STDIN\n    STDOUT -->|ready/message/error events| Router\n    Adapter <-->|API calls| Platform\n    STDIN --> Adapter\n    Adapter --> STDOUT\n```\n\n### Protocol\n\nCommunication is one JSON object per line.\n\n**Events** (adapter → LibreFang via stdout):\n\n| Method | Purpose |\n|--------|---------|\n| `{\"method\": \"ready\"}` | Signal initialization complete |\n| `{\"method\": \"message\", \"params\": {...}}` | Incoming message from the platform |\n| `{\"method\": \"error\", \"params\": {\"message\": \"...\"}}` | Report an error |\n\n**Commands** (LibreFang → adapter via stdin):\n\n| Method | Purpose |\n|--------|---------|\n| `{\"method\": \"send\", \"params\": {\"channel_id\": \"...\", \"text\": \"...\"}}` | Deliver a message to the platform |\n| `{\"method\": \"shutdown\"}` | Graceful termination request |\n\n`stderr` output is forwarded to LibreFang's logs for debugging.\n\n### Configuration\n\nAdd to `~/.librefang/config.toml`:\n\n```toml\n[[sidecar_channels]]\nname = \"my-adapter\"\ncommand = \"python3\"\nargs = [\"path/to/adapter.py\"]\nenv = { API_KEY = \"...\" }        # optional environment variables\n# channel_type = \"custom-name\"   # optional, defaults to name\n```\n\n### Provided Implementations\n\n#### Bash (`sidecar-channel-bash/adapter.sh`)\n\nThe simplest possible adapter — requires only `bash` and `jq`. Echoes messages back. Useful as a minimal reference for the protocol.\n\n#### Go (`sidecar-channel-go/adapter.go`)\n\nA compiled adapter with proper JSON marshaling. Build with `go build -o adapter adapter.go`. Demonstrates typed structs for events and commands.\n\n#### Node.js (`sidecar-channel-node/adapter.js`)\n\nUses Node's built-in `readline` module. Shows the same echo pattern with `process.stdout.write()` for explicit flushing.\n\n#### Python — Echo (`sidecar-channel-python/adapter.py`)\n\nThe canonical reference implementation. The core structure used by all Python sidecars:\n\n```python\ndef send_event(method, params=None):\n    event = {\"method\": method}\n    if params:\n        event[\"params\"] = params\n    print(json.dumps(event), flush=True)\n```\n\n- `send_event(\"ready\")` on startup\n- Read stdin line-by-line, parse JSON, dispatch to `handle_command()`\n- `handle_command()` processes `\"send\"` and `\"shutdown\"` methods\n- Always `flush=True` on stdout writes\n\n#### Python — Telegram (`sidecar-channel-python/telegram_adapter.py`)\n\nA real-world adapter bridging the Telegram Bot API. Uses long-polling in a background thread (`poll_updates()`) while the main thread reads commands from stdin. Features:\n\n- Configurable user whitelist via `ALLOWED_USERS` environment variable\n- Long-polling with 30-second timeout\n- Automatic error reporting back to LibreFang via `send_event(\"error\", ...)`\n\n#### Python — Webhook (`sidecar-channel-python/webhook_adapter.py`)\n\nAn HTTP server that receives POST requests and forwards them as messages. Useful for integrating GitHub, Stripe, or any webhook-capable service. Features:\n\n- Stdlib-only HTTP server (no dependencies)\n- Optional HMAC-SHA256 signature validation via `WEBHOOK_SECRET`\n- Receive-only (outbound `send` commands are logged to stderr as no-ops)\n\n### Writing Your Own Sidecar\n\nEvery adapter follows the same lifecycle:\n\n1. **Initialize** — Set up connections, parse environment variables.\n2. **Signal ready** — Write `{\"method\": \"ready\"}` to stdout.\n3. **Main loop** — Read commands from stdin, handle platform I/O, write events to stdout.\n4. **Shutdown** — On receiving `{\"method\": \"shutdown\"}`, clean up resources and exit.\n\nKey rules:\n- Write **one JSON object per line** to stdout, always flushing.\n- Never write non-JSON to stdout (use stderr for logs).\n- Exit cleanly on `shutdown` — the kernel may send SIGKILL after a timeout.","extensions-system":"# Extensions System\n\n# LibreFang Extensions System\n\nThe extensions crate provides a one-click integration system for MCP (Model Context Protocol) servers. It handles the complete lifecycle: discovering integrations, resolving credentials, running OAuth flows, installing, health monitoring, and generating the MCP server configs that the kernel consumes.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                        Installer                            │\n│              (install_integration / remove / list)           │\n├──────────┬──────────┬──────────────┬────────────────────────┤\n│ Registry │Credential│    OAuth     │   Health Monitor       │\n│ (templates│Resolver │  (PKCE flow) │ (DashMap + backoff)    │\n│  + state) │(4-source│              │                        │\n│           │ chain)  │              │                        │\n├──────────┴────┬─────┴──────────────┴────────────────────────┤\n│     Vault     │          Dotenv / Env Vars                  │\n│ (AES-256-GCM) │                                             │\n└───────────────┴─────────────────────────────────────────────┘\n```\n\nData flows downward: the installer orchestrates the registry, resolver, and OAuth modules. The resolver pulls secrets from the vault, dotenv files, environment variables, or interactive prompts. The registry outputs `McpServerConfigEntry` objects that the kernel merges into its MCP server list.\n\n## Key Types (lib.rs)\n\nAll shared types live in the crate root. The most important ones:\n\n| Type | Purpose |\n|------|---------|\n| `IntegrationTemplate` | A bundled integration definition loaded from a TOML file. Contains transport config, required env vars, OAuth config, health check settings, and metadata. |\n| `InstalledIntegration` | Persisted record of an installed integration (written to `integrations.toml`). |\n| `IntegrationStatus` | State enum: `Ready`, `Setup`, `Available`, `Error(String)`, `Disabled`. |\n| `IntegrationInfo` | Combined view merging a template with its install state and tool count. |\n| `McpTransportTemplate` | How to launch the MCP server: `Stdio { command, args }`, `Sse { url }`, or `Http { url }`. |\n| `RequiredEnvVar` | Describes a credential an integration needs — name, label, help text, whether it's secret, and a URL to create the key. |\n| `ExtensionError` | Error enum covering all failure modes (`NotFound`, `VaultLocked`, `OAuth`, etc.). |\n\n### File Layout on Disk\n\n```\n~/.librefang/\n├── integrations/          # Template TOML files (one per integration)\n│   ├── github.toml\n│   ├── slack.toml\n│   └── ...\n├── integrations.toml      # Installed integrations state\n├── vault.enc              # AES-256-GCM encrypted secrets (OFV1 magic header)\n└── .env                   # Optional dotenv fallback\n```\n\n---\n\n## Module Reference\n\n### Registry (`registry.rs`)\n\n`IntegrationRegistry` is the central store. It loads integration templates from `~/.librefang/integrations/*.toml` at startup, tracks which are installed via `integrations.toml`, and converts installed integrations to `McpServerConfigEntry` values for the kernel.\n\n```rust\nlet mut registry = IntegrationRegistry::new(home_dir);\nregistry.load_templates(home_dir);   // loads *.toml from integrations/\nregistry.load_installed()?;           // reads integrations.toml\n\n// Query\nregistry.get_template(\"github\");     // Option<&IntegrationTemplate>\nregistry.is_installed(\"github\");     // bool\nregistry.search(\"git\");              // Vec<&IntegrationTemplate>\nregistry.list_by_category(&IntegrationCategory::DevTools);\n\n// Mutate (persists to integrations.toml)\nregistry.install(entry)?;\nregistry.uninstall(\"github\")?;\nregistry.set_enabled(\"github\", false)?;\n\n// Output for kernel\nlet configs: Vec<McpServerConfigEntry> = registry.to_mcp_configs();\n```\n\nTemplates are TOML files matching the `IntegrationTemplate` struct. A minimal example:\n\n```toml\nid = \"github\"\nname = \"GitHub\"\ndescription = \"GitHub API via MCP\"\ncategory = \"devtools\"\nicon = \"🐙\"\n\n[transport]\ntype = \"stdio\"\ncommand = \"npx\"\nargs = [\"-y\", \"@modelcontextprotocol/server-github\"]\n\n[[required_env]]\nname = \"GITHUB_PERSONAL_ACCESS_TOKEN\"\nlabel = \"Personal Access Token\"\nhelp = \"Create at https://github.com/settings/tokens\"\nis_secret = true\nget_url = \"https://github.com/settings/tokens\"\n\n[health_check]\ninterval_secs = 60\nunhealthy_threshold = 3\n```\n\n### Credential Vault (`vault.rs`)\n\nAES-256-GCM encrypted storage for secrets, persisted at `~/.librefang/vault.enc`. The file format uses an `OFV1` magic header followed by a JSON payload containing the Argon2id salt, nonce, and ciphertext (all base64-encoded).\n\n**Master key resolution order:**\n1. Cached key in memory (avoids repeated keyring/env lookups)\n2. OS keyring (file-based fallback at `~/.local/share/librefang/.keyring`, AES-256-GCM wrapped with a machine fingerprint)\n3. `LIBREFANG_VAULT_KEY` environment variable (base64-encoded 32-byte key)\n\n**Encryption pipeline:** master key + random salt → Argon2id → derived key → AES-256-GCM encrypt the JSON-serialized secret map.\n\n```rust\nlet mut vault = CredentialVault::new(vault_path);\nvault.init_with_key(master_key)?;           // create vault file\nvault.set(\"API_KEY\".into(), Zeroizing::new(\"secret\".into()))?;\nlet val = vault.get(\"API_KEY\");             // Option<Zeroizing<String>>\nvault.remove(\"API_KEY\")?;\n```\n\nFor production use, call `vault.init()` which generates a random key and stores it in the OS keyring, or `vault.unlock()` which resolves the key from keyring/env.\n\nThe `Drop` implementation clears all in-memory entries and the cached key. All secret values use `Zeroizing<String>` to ensure memory is zeroed on deallocation.\n\n### Credential Resolver (`credentials.rs`)\n\nResolves secrets from four sources in priority order:\n\n1. **Vault** — `~/.librefang/vault.enc` (if unlocked)\n2. **Dotenv** — `~/.librefang/.env` (loaded at construction time)\n3. **Environment variable** — `std::env::var`\n4. **Interactive prompt** — stderr prompt + stdin read (only when `interactive` is enabled)\n\n```rust\nlet resolver = CredentialResolver::new(Some(vault), Some(dotenv_path))\n    .with_interactive(true);\n\n// Single credential\nlet token = resolver.resolve(\"GITHUB_TOKEN\");  // Option<Zeroizing<String>>\n\n// Batch\nlet creds = resolver.resolve_all(&[\"KEY_A\", \"KEY_B\", \"KEY_C\"]);\nlet missing = resolver.missing_credentials(&[\"KEY_A\", \"KEY_B\"]);\n```\n\nDotenv parsing handles `KEY=VALUE`, `KEY=\"quoted\"`, `KEY='single'`, comments (`#`), and blank lines. The dotenv cache is loaded once at construction; call `clear_dotenv_cache` if keys are deleted at runtime.\n\n### OAuth2 PKCE (`oauth.rs`)\n\nImplements the Authorization Code flow with PKCE (Proof Key for Code Exchange) for Google, GitHub, Microsoft, and Slack. No client secret is needed — safe for desktop/CLI apps.\n\n**Flow:**\n1. Generate random PKCE verifier → SHA-256 → base64url challenge\n2. Bind a localhost TCP listener on a random port\n3. Open the user's browser to the authorization URL (with `code_challenge`)\n4. Serve a one-shot callback at `/callback` via axum\n5. Exchange the authorization code for tokens (POST to `token_url` with `code_verifier`)\n6. Return `OAuthTokens` (access_token, refresh_token, expires_in, scope)\n\n```rust\nlet tokens = run_pkce_flow(&template.oauth.unwrap(), client_id).await?;\n// tokens.access_token_zeroizing() -> Zeroizing<String>\n```\n\nClient IDs default to placeholder values. Override them via `OAuthConfig` in the app config:\n\n```rust\nlet client_ids = resolve_client_ids(&config.oauth);\n// merges defaults with config.google_client_id, config.github_client_id, etc.\n```\n\nThe callback server has a 5-minute timeout. State parameter is validated for CSRF protection.\n\n### Health Monitor (`health.rs`)\n\nThread-safe health tracking for MCP server connections using `DashMap`. Each integration has an `IntegrationHealth` record tracking status, tool count, consecutive failures, reconnect attempts, and timestamps.\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig::default());\nmonitor.register(\"github\");\n\n// Background task reports\nmonitor.report_ok(\"github\", 12);              // 12 tools available\nmonitor.report_error(\"github\", \"timeout\".into());\n\n// Query\nlet health = monitor.get_health(\"github\");    // Option<IntegrationHealth>\nlet all = monitor.all_health();               // Vec<IntegrationHealth>\n\n// Reconnect logic\nif monitor.should_reconnect(\"github\") {\n    monitor.mark_reconnecting(\"github\");\n    let backoff = monitor.backoff_duration(attempt);  // exponential\n}\n```\n\n**Backoff:** 5s → 10s → 20s → 40s → 80s → ... → capped at 300s (5 min). Maximum 10 reconnect attempts (configurable). After recovery via `mark_ok`, failure counters and reconnect state reset.\n\nDefault health check interval is 60 seconds; an integration is marked unhealthy after 3 consecutive failures.\n\n### Installer (`installer.rs`)\n\nOrchestrates the complete install/remove flow:\n\n**`install_integration`** — looks up the template, stores any provided keys in the vault, checks for missing credentials, writes the install record to `integrations.toml`, and returns an `InstallResult` with status `Ready` (all credentials present) or `Setup` (credentials still needed).\n\n**`remove_integration`** — unregisters from the registry and persists the change.\n\n**`list_integrations`** — returns all templates with computed status based on install state and credential availability.\n\n**`search_integrations`** — fuzzy text search across template ID, name, description, and tags.\n\n**`scaffold_integration`** / **`scaffold_skill`** — generate starter TOML templates for custom integrations or skills.\n\n```rust\n// Install with a provided API key\nlet mut keys = HashMap::new();\nkeys.insert(\"NOTION_API_KEY\".into(), \"ntn_xxx\".into());\nlet result = install_integration(&mut registry, &mut resolver, \"notion\", &keys)?;\n// result.status is Ready if all required_env are satisfied\n```\n\n### HTTP Client (`http_client.rs`)\n\nShared `reqwest::Client` builder with TLS root certificates sourced from the native certificate store, falling back to `webpki-roots` if no native certs are found. Uses `rustls` with the `aws_lc_rs` crypto provider.\n\n```rust\nlet client = new_client();  // reqwest::Client with bundled CA roots\n```\n\n---\n\n## Integration with the Kernel\n\nDuring boot, the kernel calls `vault.unlock()` to decrypt secrets, then the registry converts installed integrations into `McpServerConfigEntry` values via `to_mcp_configs()`. These are merged into the kernel's MCP server list, and the health monitor tracks their status in the background.\n\nThe vault is used across the codebase — routes like `list_providers`, `auth_start`, and `wechat_qr_status` all flow through `boot_with_config` → `vault.unlock()` → `resolve_master_key()`, which checks the OS keyring and env var.","internationalization":"# Internationalization\n\n# Internationalization (i18n)\n\nThe `i18n/` directory manages all multi-language content for LibreFang. It contains two distinct systems that serve different purposes:\n\n1. **Document translations** — Full markdown translations of project documentation (README, getting-started guide, skill development guide) for human readers.\n2. **Runtime error catalogs** — TOML key-value files that catalog translatable error messages, used by the application at runtime via Fluent (`.ftl`) locale files.\n\nThere is no executable code in this module. It is static content consumed by GitHub rendering, the build system, and the runtime locale loader.\n\n## Directory Layout\n\n```\ni18n/\n├── README.md                 # Contributor guide for translations\n├── README.de.md              # German README translation\n├── README.es.md              # Spanish README translation\n├── README.ja.md              # Japanese README translation\n├── README.ko.md              # Korean README translation\n├── README.pl.md              # Polish README translation\n├── README.zh.md              # Chinese (Simplified) README translation\n├── en.toml                   # English error message catalog\n├── zh.toml                   # Chinese error message catalog\n├── getting-started.fr.md     # French getting-started guide\n└── skill-development.zh.md   # Chinese skill development guide\n\npackages/cli-npm/             # npm binary distribution wrapper\n├── README.md\n├── package.json\n└── bin/librefang.js\n```\n\n## Document Translations\n\n### README Translations\n\nEach `README.<lang>.md` is a complete translation of the root `README.md`. They follow identical section structure and preserve all HTML markup, badge URLs, image paths, and relative links.\n\n**Current languages:**\n\n| File | Language | Code |\n|------|----------|------|\n| `README.de.md` | Deutsch (German) | `de` |\n| `README.es.md` | Español (Spanish) | `es` |\n| `README.ja.md` | 日本語 (Japanese) | `ja` |\n| `README.ko.md` | 한국어 (Korean) | `ko` |\n| `README.pl.md` | Polski (Polish) | `pl` |\n| `README.zh.md` | 中文 (Chinese Simplified) | `zh` |\n\nAll translated READMEs contain a multi-language navigation bar near the top:\n\n```html\n<a href=\"../README.md\">English<\/a> | <a href=\"README.zh.md\">中文<\/a> | ...\n```\n\nThis bar must be updated in **every** translation file (including the root `README.md`) whenever a new language is added.\n\n### Additional Document Translations\n\nBeyond the README, some longer-form docs have been translated:\n\n- `getting-started.fr.md` — Full French translation of the getting-started guide\n- `skill-development.zh.md` — Full Chinese translation of the skill development guide\n\nThese follow the same conventions: preserve all relative links pointing to English originals, keep formatting identical, and leave brand names and technical terms untranslated.\n\n### Link Conventions\n\nAll document translations use `../` relative paths to reference files outside `i18n/`:\n\n- `../docs/CONTRIBUTING.md` — Contribution guide (English original)\n- `../docs/GOVERNANCE.md` — Governance docs (English original)\n- `../public/assets/logo.png` — Shared assets\n\nDocs files are **never duplicated** into `i18n/`. Translation files point to the single English original. This avoids drift and maintenance burden.\n\n## Runtime Error Message Catalogs\n\n### Purpose\n\nThe TOML files (`en.toml`, `zh.toml`) catalog all translatable error messages used by the LibreFang API and runtime. They are organized by subsystem into TOML tables:\n\n- `[agent]` — Agent lifecycle errors (spawn, not-found, invalid-id)\n- `[message]` — Message handling errors (too-large, delivery-failed)\n- `[template]` — Template parsing and lookup errors\n- `[manifest]` — Manifest validation and signature errors\n- `[auth]` — Authentication errors\n- `[session]` — Session management errors\n- `[workflow]` — Workflow execution errors\n- `[trigger]` — Event trigger errors\n- `[budget]` — Budget management errors\n- `[config]` — Configuration read/write errors\n- `[profile]` — Profile lookup errors\n- `[cron]` — Scheduled job errors\n- `[general]` — Catch-all errors (not-found, internal, bad-request, rate-limited)\n\n### Relationship to Fluent Files\n\nThe TOML files are **reference catalogs**, not the files loaded at runtime. The actual translation lookup uses Fluent (`.ftl`) files located at:\n\n```\ncrates/librefang-types/locales/\n```\n\nThe TOML catalogs exist for:\n- Human-readable reference of all error keys and their English source text\n- External tooling that may need to parse the message catalog\n- Future TOML-based i18n backends\n\n### Message Format\n\nMessages use ICU-style interpolation with curly braces:\n\n```toml\ndelivery-failed  = \"Message delivery failed: {reason}\"\nnot-found        = \"Template '{name}' not found\"\nparse-failed     = \"Failed to parse template: {error}\"\nbad-request      = \"Bad request: {reason}\"\n```\n\nPlaceholders like `{reason}`, `{name}`, `{error}` are filled at runtime by the calling code.\n\n### Adding a New Error Language\n\n1. Copy `en.toml` to `<lang-code>.toml` (e.g., `ja.toml`).\n2. Translate all message values. Keep all interpolation placeholders (`{reason}`, `{name}`, etc.) unchanged.\n3. Create corresponding Fluent files under `crates/librefang-types/locales/<lang-code>/`.\n4. Register the locale in the runtime's locale loader.\n\n## NPM CLI Package\n\nThe `packages/cli-npm/` directory wraps the pre-built LibreFang CLI binary for npm distribution. It is not related to translations but lives in the i18n/packages tree.\n\n### Platform Binaries\n\nThe package uses `optionalDependencies` to install the correct platform-specific binary:\n\n| Package | Platform |\n|---------|----------|\n| `@librefang/cli-darwin-arm64` | macOS Apple Silicon |\n| `@librefang/cli-darwin-x64` | macOS Intel |\n| `@librefang/cli-linux-x64` | Linux x64 (glibc) |\n| `@librefang/cli-linux-arm64` | Linux arm64 (glibc) |\n| `@librefang/cli-linux-x64-musl` | Linux x64 (musl/Alpine) |\n| `@librefang/cli-linux-arm64-musl` | Linux arm64 (musl/Alpine) |\n| `@librefang/cli-win32-x64` | Windows x64 |\n| `@librefang/cli-win32-arm64` | Windows arm64 |\n\nnpm automatically selects the correct optional dependency at install time based on the user's platform.\n\n## Contributing Translations\n\n### Adding a New README Language\n\n1. Copy the root `README.md` into `i18n/` as `README.<lang>.md`, where `<lang>` is an [ISO 639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) code.\n2. Translate all prose. Leave unchanged: HTML tags, badge URLs, image paths, code blocks, brand names (LibreFang, Hands, Hand, FangHub), and well-known technical terms (Rust, crate, CLI, API, WebAssembly).\n3. Add your language link to the navigation bar in **every** existing translation file and the root `README.md`.\n4. Verify all relative links resolve correctly from the `i18n/` directory.\n5. Open a PR.\n\n### Updating Translations After English Changes\n\nWhen the root `README.md` changes:\n\n1. Review the diff to identify new or modified sections.\n2. Add corresponding translated sections to each language file in the same position.\n3. If you cannot translate to all languages, update what you can and open issues for the rest.\n\n### Style Guidelines\n\n- Match the tone and length of the English original — avoid adding commentary.\n- Use idiomatic phrasing over literal word-for-word translation.\n- Use consistent terminology throughout (e.g., always translate \"agent\" the same way).\n- Keep well-known technical terms in English.\n- Brand names stay untranslated.","kernel-core":"# Kernel Core\n\n# LibreFang Kernel Core\n\nThe kernel is the central runtime of the LibreFang Agent Operating System. It manages agent lifecycles, enforces security policies, coordinates inter-agent communication, and provides the infrastructure for autonomous, scheduled, and reactive agent behavior.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Kernel\n        KH[LibreFangKernel]\n        REG[Registry]\n        AUTH[AuthManager]\n        APR[ApprovalManager]\n        BG[BackgroundExecutor]\n        SUP[Supervisor]\n        TRG[TriggerEngine]\n        WF[WorkflowEngine]\n        EV[EventBus]\n        SCH[Scheduler]\n        CFG[Config]\n    end\n\n    EXT[API / CLI / Desktop] --> KH\n    KH --> REG\n    KH --> AUTH\n    KH --> APR\n    KH --> BG\n    KH --> SUP\n    KH --> TRG\n    KH --> WF\n    KH --> EV\n    KH --> SCH\n    KH --> CFG\n```\n\n## Module Map\n\n| Module | Responsibility |\n|---|---|\n| `kernel` | Top-level `LibreFangKernel` struct — boot, spawn, message routing |\n| `registry` | Agent registration, lookup by ID/name/tag, model overrides |\n| `approval` | Gates dangerous tool calls behind human approval with TOTP 2FA |\n| `auth` | RBAC — maps channel identities to users with hierarchical roles |\n| `background` | Autonomous agent loops (continuous, periodic, proactive modes) |\n| `triggers` | Pattern-matched event subscriptions that wake proactive agents |\n| `workflow` | DAG-based multi-step workflows with conditions and variable passing |\n| `scheduler` | Per-agent rate limiting with quota tracking and periodic resets |\n| `supervisor` | Process supervision with health checks and restart tracking |\n| `event_bus` | Pub/sub event dispatch for inter-agent and system-wide communication |\n| `auto_reply` | Trigger-driven background replies with concurrency control |\n| `config` / `config_reload` | TOML config loading and hot-reload via file watching |\n| `cron` | Cron expression parsing and scheduled task management |\n| `capabilities` | Tool/skill capability declarations and enforcement |\n| `heartbeat` | Liveness tracking for running agents |\n| `inbox` | Message queueing per agent |\n| `orchestration` | Multi-agent coordination (hand-off, coordinator role) |\n| `pairing` | Device pairing for mobile/desktop companion apps |\n| `metering` | Usage metering (re-exported from `librefang-kernel-metering`) |\n| `router` | Message routing (re-exported from `librefang-kernel-router`) |\n| `whatsapp_gateway` | WhatsApp channel integration via Node.js bridge |\n| `wizard` | Interactive setup wizard that generates agent configs from intent |\n| `mcp_oauth_provider` | OAuth provider for MCP tool integrations |\n\n---\n\n## Key Components\n\n### ApprovalManager (`approval.rs`)\n\nGates dangerous operations behind human approval. Supports two execution paths:\n\n- **Blocking**: `request_approval()` — the calling agent awaits resolution.\n- **Deferred**: `submit_request()` — returns immediately; the `DeferredToolExecution` payload is returned atomically when `resolve()` is called.\n\n#### Approval Policy Resolution\n\nTool approval requirements are evaluated with context awareness via `requires_approval_with_context()`:\n\n1. **Trusted sender bypass** — senders in `trusted_senders` skip all approval checks.\n2. **Channel rules** — per-channel allow/deny lists override defaults.\n3. **Wildcard patterns** — `require_approval` entries support glob patterns (`file_*`, `*_exec`, `*`).\n\n#### Timeout and Escalation\n\nWhen a request times out, the `TimeoutFallback` policy determines behavior:\n\n- `Deny` (default) — resolves as `TimedOut`.\n- `Skip` — resolves as `Skipped`.\n- `Escalate { extra_timeout_secs }` — re-inserts the request with incremented `escalation_count`, granting additional time. After `MAX_ESCALATIONS` (3) rounds, falls back to `TimedOut`.\n\nThe kernel calls `expire_pending_requests()` periodically to sweep timed-out deferred requests.\n\n#### TOTP Second Factor\n\nWhen `second_factor` is `Totp` in the approval policy:\n\n- Approvals require a verified TOTP code (`totp_verified = true` on `resolve()`).\n- A configurable **grace period** (`totp_grace_period_secs`) allows subsequent approvals without re-entering TOTP for the same user.\n- **Rate limiting**: 5 consecutive TOTP failures trigger a 5-minute lockout, persisted to SQLite so it survives daemon restarts.\n- **Per-tool scoping**: `totp_tools` restricts TOTP to specific tools; if empty, all tools require TOTP.\n- **Recovery codes**: 8 single-use codes in `xxxx-xxxx` format, generated via `generate_recovery_codes()` and verified/consumed via `verify_recovery_code()`.\n\n#### Audit Logging\n\nWhen constructed with `new_with_db()`, all approval decisions are written to an `approval_audit` SQLite table. Queryable via `query_audit()` with pagination and optional agent/tool filters.\n\n#### Per-Agent Limits\n\nEach agent is limited to `MAX_PENDING_PER_AGENT` (5) concurrent approval requests. Excess submissions return `Denied` (blocking) or an error string (deferred).\n\n---\n\n### AuthManager (`auth.rs`)\n\nRole-Based Access Control for multi-user deployments.\n\n#### Roles (hierarchical)\n\n| Role | Level | Capabilities |\n|---|---|---|\n| `Viewer` | 0 | Read-only output viewing |\n| `User` | 1 | Chat with agents, view config |\n| `Admin` | 2 | Spawn/kill agents, install skills, view usage |\n| `Owner` | 3 | Full access including user management and config changes |\n\n#### Channel Identity Mapping\n\nUsers are identified by their platform bindings (e.g., Telegram ID, Discord ID). The `AuthManager` maintains a `channel_index` mapping `\"channel_type:platform_id\"` to internal `UserId` values. A single user can have bindings across multiple channels.\n\nWhen `is_enabled()` returns `false` (no users configured), the kernel typically operates in open mode.\n\n```rust\nlet user_id = auth.identify(\"telegram\", \"123456\");\nauth.authorize(user_id, &Action::SpawnAgent)?;\n```\n\n---\n\n### BackgroundExecutor (`background.rs`)\n\nRuns agents autonomously based on their `ScheduleMode`:\n\n| Mode | Behavior |\n|---|---|\n| `Reactive` | No background task — agent responds only to incoming messages. |\n| `Continuous { check_interval_secs }` | Self-prompts on a fixed interval with an `[AUTONOMOUS TICK]` prefix. |\n| `Periodic { cron }` | Self-prompts on a simplified cron schedule with a `[SCHEDULED TICK]` prefix. |\n| `Proactive { conditions }` | No dedicated loop — activated by matching triggers. |\n\n#### Concurrency Control\n\nA global `Semaphore` (`MAX_CONCURRENT_BG_LLM = 5`) limits concurrent background LLM calls across all agents. Each tick acquires a permit before sending to the agent, preventing resource exhaustion.\n\n#### Busy Flag and Pause\n\nEach agent has an `AtomicBool` busy flag — if the previous tick is still running, the next tick is skipped. A separate pause flag allows external pause/resume via `pause_agent()` / `resume_agent()`. Pause state can be set before the loop starts, so pre-paused agents begin paused.\n\n#### Startup Jitter\n\nBoth continuous and periodic loops apply a random initial delay (0 to interval) to stagger memory loading at boot.\n\n#### Cron Parsing\n\n`parse_cron_to_secs()` supports:\n- Human-readable: `\"every 30s\"`, `\"every 5m\"`, `\"every 1h\"`, `\"every 2d\"`\n- Standard 5-field cron: `\"*/15 * * * *\"` → 900s\n- Falls back to 300s for unparseable expressions.\n\n---\n\n### AutoReplyEngine (`auto_reply.rs`)\n\nTrigger-driven background replies with concurrency limits and suppression patterns.\n\n- Configurable `max_concurrent` semaphore (default 3).\n- `suppress_patterns` filter matching messages that should not trigger auto-reply.\n- `execute_reply()` spawns a tokio task with a timeout, calling the provided `send_fn` to deliver the response back to the channel.\n\n---\n\n### TriggerEngine (`triggers.rs`)\n\nPattern-matched event subscriptions that activate proactive agents.\n\n`TriggerPattern` variants:\n- `All` — matches everything.\n- `AgentSpawned { name_pattern }` — matches agent spawn events, with glob filtering on agent name.\n- `AgentTerminated` — matches agent termination events.\n- `Lifecycle` — matches lifecycle events (spawn + terminate).\n- `System` — matches system-level events.\n- `MemoryUpdate` — matches shared memory changes.\n- `MemoryKeyPattern { key_pattern }` — matches memory updates for specific key patterns.\n- `Content { pattern }` — matches events by content (supports JSON field extraction).\n\nTriggers are registered per-agent and can be targeted at a specific agent via `register_with_target()`.\n\n---\n\n### WorkflowEngine (`workflow.rs`)\n\nDAG-based multi-step workflows with:\n\n- **Dependencies**: Steps declare `depends_on` referencing other step IDs.\n- **Conditions**: Steps can have `when` conditions evaluated against workflow variables.\n- **Output variables**: Steps can extract and store results as variables for downstream steps.\n- **Error handling**: Steps produce `StepResult` values (success, failure, skipped).\n\nWorkflows are registered via `register_workflow()` and executed via `execute_run()`. The engine builds a topological execution plan from the dependency graph and runs steps in parallel where possible.\n\n---\n\n### Configuration and Hot-Reload\n\n- `config.rs`: Loads TOML configuration from disk.\n- `config_reload.rs`: Watches the config file for changes; `has_changes()` returns true when a reload is needed.\n\nConfig loading is called from `kernel::boot()` and `kernel::boot_with_config()`. External callers (CLI, API) also call `load_config()` directly for initial setup.\n\n---\n\n## Data Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant API\n    participant Kernel\n    participant ApprovalMgr\n    participant Registry\n    participant Agent\n\n    User->>API: Send message to agent\n    API->>Kernel: send_message_full()\n    Kernel->>Registry: resolve assistant target\n    Kernel->>ApprovalMgr: requires_approval_with_context()\n    alt Approval required\n        Kernel->>ApprovalMgr: request_approval() / submit_request()\n        ApprovalMgr-->>Kernel: Pending (wait for resolve)\n        API->>ApprovalMgr: resolve() with decision\n        ApprovalMgr-->>Kernel: DeferredToolExecution\n    end\n    Kernel->>Agent: Execute tool / route message\n    Agent-->>Kernel: Response\n    Kernel-->>API: Response\n    API-->>User: Delivered\n```\n\n## Integration Points\n\nThe kernel is consumed by:\n\n- **`librefang-api`** — HTTP/WebSocket server for dashboard, channel bridges (Telegram, Discord, WhatsApp), approval resolution, workflow management.\n- **`librefang-cli`** — Command-line tool for status, agent listing, daemon management.\n- **`librefang-desktop`** — Desktop application using event bus subscriptions for real-time updates.\n- **`librefang-runtime-wasm`** — WASM sandbox calls into `workflow.rs` for `instantiate()`.\n\nExternal call patterns observed:\n- API channel bridges call `verify_totp_code_with_issuer()` and `verify_recovery_code()` directly.\n- CLI commands call `registry::list()` and `registry::count()`.\n- Desktop subscribes to `event_bus::subscribe_all()`.\n- API server checks `config_reload::has_changes()` for hot-reload polling.\n- Scheduler quota checks flow through `reset_if_expired()` on each message send.","memory-management":"# Memory Management\n\n# Memory Management (`librefang-memory`)\n\n## Purpose\n\nThe memory substrate for the LibreFang Agent Operating System. It provides a unified memory API over three storage backends so agents can persist, search, and reason over structured state, semantic memories, and knowledge graph relationships through a single interface.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[ProactiveMemoryStore] --> B[MemorySubstrate]\n    B --> C[StructuredStore]\n    B --> D[SemanticStore]\n    B --> E[KnowledgeStore]\n    D --> F[SqliteVectorStore]\n    D --> G[HttpVectorStore]\n    A --> C\n    A --> D\n    A --> E\n    H[ConsolidationEngine] --> D\n    I[decay::run_decay] --> D\n```\n\nAgents interact primarily with `ProactiveMemoryStore` (the mem0-style API) or directly with `MemorySubstrate` for lower-level operations. Both delegate to three SQLite-backed stores:\n\n| Store | Purpose | Tables |\n|---|---|---|\n| **StructuredStore** | Key-value pairs, agent state, config | `kv_store` |\n| **SemanticStore** | Text memories with optional vector embeddings | `memories` |\n| **KnowledgeStore** | Named entities and typed relations | `entities`, `relations` |\n\n## Memory Levels\n\nEvery memory has a scope that controls its lifecycle:\n\n| Level | Scope String | Decay Behavior |\n|---|---|---|\n| `User` | `user_memory` | Never decays — permanent user knowledge |\n| `Session` | `session_memory` | Hard-deleted after `session_ttl_hours` of inactivity |\n| `Agent` | `agent_memory` | Hard-deleted after `agent_ttl_days` of inactivity |\n\nAccessing a memory (via search/recall) updates `accessed_at`, resetting the decay timer.\n\n## Proactive Memory System (`proactive.rs`)\n\nThe `ProactiveMemoryStore` implements a mem0-style API on top of `MemorySubstrate`. This is the recommended interface for agent memory operations.\n\n### Core Operations\n\n| Method | Description |\n|---|---|\n| `search(query, user_id, limit)` | Semantic search across all memory levels |\n| `add(messages, user_id)` | Store memories with automatic extraction from conversation messages |\n| `get(user_id)` | Retrieve all user-level memories |\n| `list(user_id, level, category)` | List memories filtered by level and category |\n| `export_all(agent_id)` | Export all memories as a flat JSON-serializable list |\n| `import_memories(agent_id, items)` | Import memories with deduplication |\n\n### Auto Hooks\n\n`ProactiveMemoryHooks` provides two hooks that wrap agent execution:\n\n- **`auto_memorize`** — Called after an agent response. Extracts memories from the conversation, decides whether to ADD, UPDATE, or skip (NOOP), and persists the result.\n- **`auto_retrieve`** — Called before an agent execution. Searches relevant memories and returns them as context.\n\n### Memory Decision Flow\n\nWhen `add()` is called, the store runs a dedup/merge decision:\n\n1. Compute an embedding for the candidate memory (if embedding driver is configured).\n2. Search for the top 5 most similar existing memories (vector cosine similarity or LIKE fallback).\n3. The `MemoryExtractor` (default: `DefaultMemoryExtractor`) decides the action:\n   - **ADD** — No similar memory exists; create a new one.\n   - **UPDATE** — A similar memory exists but content differs; update in-place with version history.\n   - **NOOP** — The memory already exists verbatim; skip.\n\nWhen an UPDATE targets a memory that appears contradictory (detected by `detect_memory_conflict`), a `MemoryConflict` is attached to the result and `conflict_detected` is set in metadata.\n\n### Confidence Decay\n\nEach call to `search()`, `auto_retrieve()`, or consolidation triggers `maybe_run_maintenance()`, which rate-limits two tasks to once per hour:\n\n- **Confidence decay**: For memories not accessed in >1 day, applies exponential decay: `confidence × e^(-rate × days)`, then a frequency boost: `× min(1.0 + log₂(access_count), 2.0)`.\n- **Session TTL cleanup**: Soft-deletes session-level memories older than the configured `session_ttl_hours`.\n\n### Per-Agent Memory Cap\n\n`ProactiveMemoryConfig.max_memories_per_agent` sets a hard cap. When adding memories would exceed the cap, `evict_if_over_cap()` removes the lowest-confidence memories (eviction is capped at the number of existing memories; if a single batch alone exceeds the cap, a warning is logged and the cap is temporarily exceeded).\n\n### Embedding Driver\n\nBy default, `ProactiveMemoryStore` falls back to `LIKE` text matching for search. Call `.with_embedding(driver)` to enable vector similarity search. The driver must implement:\n\n```rust\n#[async_trait]\npub trait EmbeddingFn: Send + Sync {\n    async fn embed_one(&self, text: &str) -> LibreFangResult<Vec<f32>>;\n}\n```\n\nWhen enabled, embeddings are stored alongside memories and cosine similarity is used for recall.\n\n### Knowledge Graph Integration\n\nWhen `auto_memorize` extracts `RelationTriple`s from conversation, `store_relations()` upserts entities and relations into `KnowledgeStore`. Deduplication skips triples where an identical (source, relation, target) edge already exists.\n\n## MemorySubstrate (`substrate.rs`)\n\nThe lower-level entry point that owns the SQLite connection and exposes the three stores.\n\n```rust\nlet substrate = MemorySubstrate::open_in_memory(0.1)?;\nlet substrate = Arc::new(substrate);\n```\n\nKey methods:\n\n| Method | Delegates To |\n|---|---|\n| `structured_get/set/delete` | `StructuredStore` |\n| `remember/recall/forget` | `SemanticStore` |\n| `store_with_chunking` | `SemanticStore` (via `chunker`) |\n| `consolidate` | `ConsolidationEngine` |\n| `get_session/create_session` | `SessionStore` |\n| `usage_conn()` | Shared connection for `UsageStore` |\n\n### Chunked Storage\n\n`store_with_chunking` splits long text using the chunker before storing. Each chunk gets its own row in `memories` with independent confidence and access tracking, but shares the same `agent_id` and `scope`.\n\n## Text Chunking (`chunker.rs`)\n\n`chunk_text(text, max_size, overlap)` splits documents into character-bounded chunks:\n\n1. Split on paragraph boundaries (`\\n\\n`).\n2. Within oversized paragraphs, split on sentence boundaries (`. `, `。`, `？`, `！`).\n3. Within oversized sentences, hard-split at the character limit.\n4. Greedily pack segments into chunks, prepending `overlap` characters from the previous chunk.\n\nAll splitting operates on Unicode character boundaries — multi-byte text (CJK, emoji) is handled correctly.\n\n## Memory Consolidation (`consolidation.rs`)\n\n`ConsolidationEngine::consolidate()` runs two phases:\n\n1. **Confidence decay**: Multiplies confidence by `(1 - decay_rate)` for memories not accessed in the last 7 days, floored at 0.1.\n2. **Duplicate merging**: Loads all active memories sorted by confidence DESC. For each pair with >90% Jaccard word similarity, soft-deletes the lower-confidence duplicate. If the absorbed memory had higher confidence, the keeper is lifted to that value. Capped at 100 merges per run to avoid O(n²) blowup.\n\nReturns a `ConsolidationReport` with `memories_decayed`, `memories_merged`, and `duration_ms`.\n\n## Time-Based Decay (`decay.rs`)\n\n`run_decay(conn, config)` performs hard deletion based on scope TTLs:\n\n- **USER scope**: Never touched.\n- **SESSION scope**: Deleted when `accessed_at` is older than `session_ttl_days`.\n- **AGENT scope**: Deleted when `accessed_at` is older than `agent_ttl_days`.\n\nControlled by `MemoryDecayConfig` (gated by `enabled` flag). This is distinct from consolidation's confidence decay — this removes stale data entirely.\n\n## Knowledge Graph (`knowledge.rs`)\n\n`KnowledgeStore` stores `Entity` and `Relation` records in SQLite with support for graph pattern queries.\n\n### Entities\n\n```rust\nstore.add_entity(\n    Entity {\n        id: String::new(),       // auto-generated UUID if empty\n        entity_type: EntityType::Person,\n        name: \"Alice\".to_string(),\n        properties: HashMap::new(),\n        created_at: Utc::now(),\n        updated_at: Utc::now(),\n    },\n    \"agent-id\",\n)?;\n```\n\nUpserts on conflict (updates name and properties).\n\n### Relations\n\n```rust\nstore.add_relation(\n    Relation {\n        source: \"alice-id\".to_string(),\n        relation: RelationType::WorksAt,\n        target: \"acme-id\".to_string(),\n        properties: HashMap::new(),\n        confidence: 0.95,\n        created_at: Utc::now(),\n    },\n    \"agent-id\",\n)?;\n```\n\nRelations can reference entities by either ID or name (the MCP tool uses names). The `query_graph` JOIN resolves both:\n\n```sql\nJOIN entities s ON (r.source_entity = s.id OR (r.source_entity = s.name AND s.agent_id = r.agent_id))\n```\n\n### Pattern Queries\n\n`query_graph(GraphPattern)` returns `Vec<GraphMatch>` with source entity, relation, and target entity. Filters are optional — you can query by source, relation type, target, or any combination. Results are limited to 100 rows.\n\n`delete_by_agent(agent_id)` removes all entities and relations owned by an agent.\n\n## Session Management (`session.rs`)\n\n`SessionStore` manages conversation history in the `sessions` table with:\n\n- **Per-agent session isolation** via `agent_id` and optional `peer_id` (for multi-user agents).\n- **FTS5 full-text search** across session content via the `sessions_fts` virtual table.\n- **Canonical sessions** (`canonical_sessions` table) for cross-channel persistent memory — a single conversation thread shared across WhatsApp, web, etc.\n- **Session labels** for human-readable identification.\n- **JSONL mirror** support for streaming session content to a log file.\n- **Cleanup**: `cleanup_excess_sessions(agent_id, max_count)` evicts the oldest sessions when an agent exceeds a limit.\n\n## Schema Migrations (`migration.rs`)\n\nSQLite schema is versioned via the `user_version` pragma. Current version: **19**.\n\nKey tables created across migrations:\n\n| Version | Addition |\n|---|---|\n| 1 | Core tables: `agents`, `sessions`, `events`, `kv_store`, `task_queue`, `memories`, `entities`, `relations` |\n| 3 | `embedding` column on `memories` |\n| 4 | `usage_events` for cost tracking |\n| 5 | `canonical_sessions` for cross-channel memory |\n| 8 | `audit_entries` for Merkle audit trail |\n| 9 | Performance indexes for proactive memory queries |\n| 10 | `agent_id` on entities/relations for per-agent cleanup |\n| 12 | FTS5 virtual table for session search |\n| 13 | Prompt versioning and A/B testing tables |\n| 15 | Multimodal memory columns (`image_url`, `image_embedding`, `modality`) |\n| 16 | `peer_id` on memories and sessions for per-user isolation |\n| 17 | `approval_audit` for persistent approval audit log |\n| 19 | `provider` column on `usage_events` for per-provider budgets |\n\nMigrations are idempotent — `run_migrations` can be called safely on every boot.\n\n## Usage Tracking (`usage.rs`)\n\n`UsageStore` records per-request cost metrics in `usage_events`:\n\n- `record(UsageRecord)` — L
