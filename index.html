t_a2a_agent_url` | Lookup by name. Default: `None`. |\n\n### Utility and Configuration\n\n| Method | Notes |\n|---|---|\n| `touch_heartbeat` | Refresh `last_active` during long LLM calls. Called by both `run_agent_loop` and `run_agent_loop_streaming`. Default: no-op. |\n| `tool_timeout_secs` | Global tool timeout. Default: `120`. |\n| `tool_timeout_secs_for` | Per-tool override with glob matching. Delegates to `tool_timeout_secs`. |\n| `max_agent_call_depth` | Recursion guard for inter-agent calls. Default: `5`. |\n| `skill_env_passthrough_policy` | Operator gate for skill environment access. Default: `None`. |\n| `readonly_workspace_prefixes` | Paths the agent can only read. Default: empty. |\n| `named_workspace_prefixes` | All declared workspaces with access modes. Default: empty. |\n| `fire_agent_step` | Hook fired at each loop iteration. Default: no-op. |\n\n### Forked Execution\n\n`run_forked_agent_oneshot` spawns a single-turn forked agent call that shares the parent's prompt cache prefix. The fork's messages do not persist into the canonical session, and the turn-end hook fires with `is_fork: true` to prevent recursive auto-dream cycles. Default: error ŌĆö only the live kernel implements this.\n\n## Internal Delegation Chains\n\nSeveral methods delegate to sibling methods within the trait. This lets implementors override a single method and get the enriched variant for free:\n\n```\nsend_to_agent_as          ŌåÆ send_to_agent\nspawn_agent_checked       ŌåÆ spawn_agent\nrequires_approval_with_context ŌåÆ requires_approval\ntool_timeout_secs_for     ŌåÆ tool_timeout_secs\n```\n\nWhen implementing the kernel, override the leaf method first. For example, if you implement `send_to_agent` but not `send_to_agent_as`, the default will log a trace warning about missing cancel-cascade support and call your `send_to_agent` implementation.\n\n## Implementing `KernelHandle`\n\nA minimal implementation overrides only the methods it needs. Every other method has a safe default:\n\n- **Simple queries** (`list_agents`, `find_agents`, `list_a2a_agents`) default to returning empty vectors.\n- **Mutations** (`cron_create`, `create_prompt_version`, `run_workflow`) default to returning `\"X not available\"` errors.\n- **Gates** (`requires_approval`, `is_tool_denied_with_context`) default to permissive (`false`).\n- **RBAC** (`memory_acl_for_sender`, `resolve_user_tool_decision`) default to unrestricted (`None` / `Allow`).\n\nThe production kernel (`librefang-kernel`) overrides nearly every method. Test suites typically override only the methods exercised by the test, letting everything else fall through to defaults.\n\n## Callers\n\nThe primary consumer is `librefang-runtime`:\n\n- **`agent_loop.rs`** calls `touch_heartbeat` (both streaming and non-streaming paths) and `memory_acl_for_sender` (during `setup_recalled_memories`).\n- **`tool_runner.rs`** is the heaviest caller, dispatching tool invocations to `send_to_agent_as`, `hand_*`, `cron_*`, `send_channel_*`, `list_a2a_agents`, `get_a2a_agent_url`, and others.\n- **`src/routes/system.rs`** calls `resolve_tool_approval` from `approve_request`, `reject_request`, `modify_request`, and the batch endpoints.\n\nContract tests live in `librefang-kernel/tests/kernel_handle_contract_*.rs` and verify that default implementations behave correctly (e.g., `test_list_a2a_agents_default_empty`, `test_memory_acl_for_sender_default_none_for_unconfigured_user`).","kernel-core-librefang-kernel-metering-src":"# Kernel Core ŌĆö librefang-kernel-metering-src\n\n# librefang-kernel-metering\n\nLLM cost tracking and spending-quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThe metering engine sits between the LLM dispatch layer and the persistent usage store. Every LLM call flows through it twice: once **before** the call (to reserve budget and check quotas) and once **after** (to record actual usage and settle the reservation). This two-phase approach prevents concurrent requests from collectively overspending a configured cap.\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant Caller\n    participant MeteringEngine\n    participant ReservationLedger\n    participant UsageStore\n\n    Caller->>MeteringEngine: reserve_global_budget(budget, estimate)\n    MeteringEngine->>UsageStore: query_global_hourly / daily / monthly\n    MeteringEngine->>ReservationLedger: current() ŌåÆ pending USD\n    MeteringEngine->>ReservationLedger: add(estimated_usd)\n    MeteringEngine-->>Caller: MeteringReservation\n\n    Note over Caller: LLM call in flight...\n\n    Caller->>MeteringEngine: check_all_and_record(record, quota, budget)\n    MeteringEngine->>UsageStore: check_all_with_provider_and_record (SQLite TX)\n    Caller->>MeteringReservation: settle()\n    MeteringReservation->>ReservationLedger: release(estimated_usd)\n```\n\n## Key Types\n\n### `MeteringEngine`\n\nThe primary entry point. Wraps a `UsageStore` (SQLite-backed) and an in-memory `CostReservationLedger`.\n\n**Construction:**\n\n```rust\nlet store = Arc::new(UsageStore::new(substrate.usage_conn()));\nlet engine = MeteringEngine::new(store);\n```\n\n### `MeteringReservation`\n\nA `#[must_use]` RAII guard returned by `reserve_global_budget`. It holds a pre-charged USD amount in the in-memory ledger and releases it automatically on drop if the caller forgets to settle explicitly.\n\n| Method | When to call |\n|--------|-------------|\n| `settle()` | After the LLM response has been recorded via `check_all_and_record` or `record`. |\n| `release()` | When the dispatch failed before any cost was incurred. |\n| (drop) | Safety net ŌĆö releases the reservation if neither `settle` nor `release` was called. |\n\n### `BudgetStatus`\n\nA serializable snapshot of current spend versus configured limits across hourly, daily, and monthly windows. Used by dashboards and alerting.\n\n## Budget Enforcement Layers\n\nThe engine enforces budgets at four independent levels, each with hourly/daily/monthly windows:\n\n| Layer | Method | Scope | Comparison |\n|-------|--------|-------|------------|\n| Per-agent quota | `check_quota` | Single agent | `>=` (reject at limit) |\n| Global budget | `check_global_budget` | All agents combined | `>=` (reject at limit) |\n| Per-provider budget | `check_provider_budget` | Single provider | `>=` (reject at limit) |\n| Per-user budget | `check_user_budget` | Single user (RBAC) | `>=` (reject at limit) |\n| Pre-call reservation | `reserve_global_budget` | All agents, pre-call | `>` (allow exact-fit) |\n\nThe pre-call reservation uses `>` (strictly greater than) so a single call that exactly reaches the cap is still allowed. Post-call checks use `>=` so once the limit is fully consumed, no further calls are dispatched. This asymmetry is intentional.\n\n**Zero limits are treated as unlimited** and are skipped entirely. This applies to all layers.\n\n## Cost Estimation\n\n### `estimate_cost` (catalog-free)\n\nFallback method that applies default rates of $1.00/M input and $3.00/M output. Use this when no model catalog is available (e.g., unit tests).\n\n### `estimate_cost_with_catalog` (preferred)\n\nLooks up per-model pricing from the `ModelCatalog`. Falls back to default rates if the model is not found. Special-cases ChatGPT session-auth models (`provider == \"chatgpt\"` with zero pricing) by applying the default legacy rates for budget estimation purposes.\n\n### Cache token pricing\n\nBoth estimation methods account for prompt caching:\n\n| Token type | Price multiplier |\n|-----------|-----------------|\n| Regular input | 1.0├Ś input rate |\n| Cache-read | 0.10├Ś input rate |\n| Cache-creation | 1.25├Ś input rate |\n| Output | 1.0├Ś output rate |\n\nRegular input tokens are computed as `input_tokens - cache_read_input_tokens - cache_creation_input_tokens`, clamped to zero via `saturating_sub`.\n\n## Atomic Check-and-Record\n\nThe non-atomic pattern of `check_quota` ŌåÆ `record` has a TOCTOU race: concurrent requests both pass the check before either writes. The engine provides three atomic variants that wrap check + insert in a single SQLite transaction:\n\n- **`check_quota_and_record`** ŌĆö per-agent quota only.\n- **`check_global_budget_and_record`** ŌĆö global budget only.\n- **`check_all_and_record`** ŌĆö per-agent quota + global budget + per-provider budget, all in one transaction. This is the **preferred** method for post-call recording.\n\nWhen `check_all_and_record` fails, the usage record is **not** inserted. The caller's `MeteringReservation` is still in flight and will be released via `settle` or drop.\n\n## Concurrency and the Reservation Ledger (#3616)\n\nThe in-memory `CostReservationLedger` solves a specific concurrency bug: when N triggers fire simultaneously, they all read the same pre-call total from SQLite, all pass the budget gate, and all commit ŌĆö producing multi-x overshoots.\n\nThe ledger holds the estimated cost of every in-flight call so that `reserve_global_budget` can include pending spend in its decision:\n\n```\nprojected = sqlite_spent + in_flight_reserved + this_call_estimate\n```\n\nThis synchronization is in-process only. Two processes (or a process plus an out-of-band SQL writer) can still race. The post-call `check_all_and_record` path provides the SQLite-level atomicity that catches any residual overrun.\n\n## Usage Patterns\n\n### Typical LLM dispatch flow\n\n```rust\n// 1. Reserve budget before the call\nlet reservation = engine.reserve_global_budget(&budget, estimated_usd)?;\n\n// 2. Make the LLM call\nlet response = llm_client.complete(prompt).await?;\n\n// 3. Atomically check all quotas and record usage\nlet record = UsageRecord { /* ... */ };\nengine.check_all_and_record(&record, &quota, &budget)?;\n\n// 4. Settle the reservation\nreservation.settle();\n```\n\n### On dispatch failure\n\n```rust\nlet reservation = engine.reserve_global_budget(&budget, estimated_usd)?;\nmatch llm_client.complete(prompt).await {\n    Ok(response) => { /* record and settle */ },\n    Err(_) => reservation.release(),\n}\n```\n\n### Diagnostic queries\n\n```rust\n// Current spend vs limits\nlet status: BudgetStatus = engine.budget_status(&budget);\n\n// Usage summary, optionally filtered by agent\nlet summary = engine.get_summary(Some(agent_id))?;\n\n// Usage grouped by model\nlet by_model = engine.get_by_model()?;\n\n// Pending in-flight USD (for debugging)\nlet pending = engine.pending_reserved_usd();\n\n// Clean up records older than N days\nlet removed = engine.cleanup(90)?;\n```\n\n## Dependencies\n\n- **`librefang_memory::usage`** ŌĆö `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage` (SQLite persistence layer)\n- **`librefang_types`** ŌĆö `AgentId`, `UserId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `UserBudgetConfig`, `ModelCatalogEntry`, error types\n- **`librefang_runtime::model_catalog`** ŌĆö `ModelCatalog` for pricing lookups in `estimate_cost_with_catalog`","kernel-core-librefang-kernel-router-src":"# Kernel Core ŌĆö librefang-kernel-router-src\n\n# Kernel Core ŌĆö `librefang-kernel-router`\n\nThe routing engine that maps incoming user messages to the best-matching **hand** (multi-agent workflow) or **template** (single agent specialist). It combines keyword matching, manifest metadata, and optional embedding-based semantic similarity to produce a scored routing decision on every inbound message.\n\n## Architecture Overview\n\n```mermaid\nflowchart TD\n    MSG[\"User message\"] --> HAND[\"auto_select_hand()\"]\n    MSG --> TPL[\"auto_select_template()\"]\n\n    HAND --> HRC[\"hand_route_candidates()\"]\n    HRC --> HANDS[\"HAND.toml files\\n(registry/hands/)\"]\n\n    TPL --> RULES[\"TEMPLATE_RULES\\n(hardcoded)\"]\n    TPL --> META[\"auto_select_template_from_metadata()\"]\n    META --> MRC[\"manifest_route_candidates()\"]\n    MRC --> TOML[\"agent.toml files\\n(workspaces/agents/)\"]\n\n    HAND --> SCORE[\"Weighted scoring\\n+ semantic blend\"]\n    TPL --> SCORE\n    SCORE --> DECISION{\"Multi-domain?\"}\n    DECISION -->|\"Yes\"| ORCH[\"orchestrator\"]\n    DECISION -->|\"No\"| BEST[\"Best single match\"]\n```\n\n## Public API\n\n### `auto_select_hand`\n\n```rust\npub fn auto_select_hand(\n    message: &str,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> HandSelection\n```\n\nSelects the best hand for a message using keyword matching against `HAND.toml` `[routing]` sections. Returns `HandSelection` with the hand ID (or `None`), a human-readable reason string, and a numeric score.\n\n### `auto_select_template`\n\n```rust\npub fn auto_select_template(\n    message: &str,\n    agents_dir: &Path,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> TemplateSelection\n```\n\nSelects the best agent template using two sources in parallel:\n\n1. **Hardcoded `TEMPLATE_RULES`** ŌĆö curated regex patterns for ~30 built-in templates covering coding, testing, architecture, writing, DevOps, research, and domain-specific tasks.\n2. **Manifest metadata** ŌĆö dynamic rules extracted from `agent.toml` files found in `agents_dir`, driven by `[metadata.routing]` configuration.\n\nFalls back to `\"orchestrator\"` when no specialist matches. Routes to `\"orchestrator\"` when multiple specialists match and the message contains coordination language (e.g., \"ÕÉīµŚČ\", \"ÕłåÕł½\", \"multi\", \"together\").\n\n### `load_template_manifest`\n\n```rust\npub fn load_template_manifest(\n    home_dir: &Path,\n    template: &str,\n) -> Result<AgentManifest, String>\n```\n\nLoads and parses an `agent.toml` from `<home_dir>/workspaces/agents/<template>/`. Template names are validated to contain only ASCII alphanumeric characters, hyphens, and underscores.\n\n### `all_template_descriptions`\n\n```rust\npub fn all_template_descriptions(agents_dir: &Path) -> Vec<(String, String)>\n```\n\nReturns `(template_name, embed_text)` pairs for all routable templates (excluding `\"assistant\"`). The `embed_text` field concatenates the manifest name, description, and tags for use by the kernel's embedding pipeline. Call this to build the similarity vectors that get passed back into `auto_select_hand` / `auto_select_template` as `semantic_scores`.\n\n### Cache Management\n\n```rust\npub fn set_hand_route_home_dir(home_dir: &Path)\npub fn invalidate_hand_route_cache()\npub fn invalidate_manifest_cache()\n```\n\nThe module maintains three global caches backed by `OnceLock<Mutex<...>>`:\n\n| Cache | Static | Invalidation |\n|---|---|---|\n| Compiled regex patterns | `REGEX_CACHE` | Never (patterns are immutable) |\n| Hand route candidates | `HAND_ROUTE_CACHE` | `invalidate_hand_route_cache()` |\n| Manifest route candidates | `MANIFEST_CACHE` | `invalidate_manifest_cache()` |\n\nCall `invalidate_hand_route_cache()` and `invalidate_manifest_cache()` after hand installs/uninstalls or config hot-reload. Both are invoked from the skills route handlers (`install_hand`, `uninstall_hand`) in the HTTP layer.\n\nThe hand route home directory defaults to `$LIBREFANG_HOME` or `~/.librefang`. Override it with `set_hand_route_home_dir` during application initialization.\n\n## Scoring System\n\nAll routing uses a weighted scoring model with optional semantic blending:\n\n| Signal | Weight | Source |\n|---|---|---|\n| Explicit alias / strong keyword | 6 | `HAND.toml` `aliases`, `TEMPLATE_RULES` strong patterns, manifest `[metadata.routing].aliases` |\n| Generated phrase | 2 | Auto-derived from template name, description, and tags |\n| Weak alias / weak keyword | 1 | `HAND.toml` `weak_aliases`, `TEMPLATE_RULES` weak patterns, manifest `[metadata.routing].weak_aliases` |\n| Semantic similarity bonus | 0ŌĆō5 | `f32` cosine similarity ├Ś `MAX_SEMANTIC_BONUS` (5.0), rounded to `usize` |\n\n### Hand threshold\n\n`MIN_HAND_SCORE = 2`. A single weak hit (score 1) is rejected as too noisy. At minimum one strong hit or two weak hits are required.\n\n### Semantic-only fallback\n\nWhen keyword matching produces zero candidates, the module falls back to semantic-only matching against templates/hands whose embedding similarity exceeds `SEMANTIC_ONLY_THRESHOLD` (0.55). This enables routing of non-English input (Chinese, Japanese, Korean) when embedding scores are provided.\n\n### Multi-domain detection\n\nWhen the top two scoring templates differ and the message contains coordination tokens (`\"ÕÉīµŚČ\"`, `\"ÕłåÕł½\"`, `\"ÕŹÅõĮ£\"`, `\"ÕżÜõĖ¬\"`, `\"multi\"`, `\"together\"`), the router selects `\"orchestrator\"` instead of either individual template.\n\n## Phrase Extraction Pipeline\n\nThe module extracts routing phrases from three sources within each agent manifest:\n\n```\ntemplate name ŌöĆŌöĆŌ¢║ english_variants() ŌöĆŌöĆŌ¢║ split on hyphens/underscores, filter generic words\ndescription   ŌöĆŌöĆŌ¢║ description_phrases() ŌöĆŌöĆŌ¢║ split on punctuation/CJK separators\ntags          ŌöĆŌöĆŌ¢║ tag_phrases() ŌöĆŌöĆŌ¢║ per-tag extraction\n```\n\n### Key extraction functions\n\n- **`english_variants(text)`** ŌĆö Produces the raw name, a space-joined variant, and individual hyphen-split tokens (length Ōēź 3, not in `GENERIC_ENGLISH_WORDS`).\n- **`description_phrases(description)`** ŌĆö Splits on phrase separators (ASCII punctuation, CJK punctuation `ŃĆüŃĆé’╝ī’╝ø’╝Ü`), strips leading/trailing non-alphanumeric characters, trims generic English words from boundaries, then generates word-level and bigram candidates.\n- **`tag_phrases(tags)`** ŌĆö Per-tag extraction: ASCII tags produce word variants and individual words; Unicode tags are kept verbatim if they pass `is_meaningful_unicode_phrase` (2ŌĆō32 characters).\n- **`manifest_routing_config(manifest)`** ŌĆö Reads `[metadata.routing]` from `agent.toml`, returning `(aliases, weak_aliases, exclude_generated)`. When `exclude_generated = true`, auto-generated phrases are suppressed for that template.\n\n### Phrase matching\n\n- **ASCII phrases**: Compiled as case-insensitive regex with word-boundary awareness (`(^|[^a-z0-9])phrase([^a-z0-9]|$)`), cached globally in `REGEX_CACHE`.\n- **Unicode phrases**: Simple `str::contains` on lowercased inputs.\n\nAll compiled patterns are deduplicated via `dedupe()` which preserves insertion order.\n\n## Hand Route Loading\n\nHands are discovered from `<home_dir>/registry/hands/*/HAND.toml`. The loading pipeline:\n\n1. `hand_route_candidates()` checks the global cache, keyed by home directory path.\n2. On cache miss, `build_hand_route_candidates()` delegates to `load_hand_route_candidates()`.\n3. Each `HAND.toml` is parsed via `librefang_hands::registry::parse_hand_toml_with_agents_dir()` with the agents registry directory passed in so `base = \"<template>\"` references resolve correctly.\n4. Parse failures emit a `tracing::warn` and the hand is excluded from routing (not silently dropped).\n5. `hand_route_candidate_from_definition()` extracts strong phrases (explicit `aliases` + description-derived) and weak phrases (explicit `weak_aliases` + id-derived tokens).\n\n## TEMPLATE_RULES\n\nThe hardcoded rule table contains ~30 entries. Each `RouteRule` specifies:\n\n- **`target`** ŌĆö template name (e.g., `\"coder\"`, `\"debugger\"`, `\"architect\"`)\n- **`strong`** ŌĆö labeled regex patterns with bilingual coverage (English + Chinese), scored at weight 6\n- **`weak`** ŌĆö lower-confidence patterns, scored at weight 1\n\nTemplates excluded from routing are listed in `ROUTING_EXCLUDED_TEMPLATES` (currently `[\"assistant\"]`).\n\n## Return Types\n\n```rust\npub struct HandSelection {\n    pub hand_id: Option<String>,  // None when no hand matches\n    pub reason: String,           // e.g. \"matched coder via implement, ÕåÖõ╗ŻńĀü\"\n    pub score: usize,\n}\n\npub struct TemplateSelection {\n    pub template: String,         // always set; defaults to \"orchestrator\"\n    pub reason: String,\n    pub score: usize,\n}\n```\n\n## Integration Points\n\n| Caller | What it calls | When |\n|---|---|---|\n| HTTP skills routes | `invalidate_hand_route_cache()` | On hand install/uninstall |\n| Kernel message dispatch | `auto_select_hand()`, `auto_select_template()` | Every inbound message |\n| Embedding pipeline | `all_template_descriptions()` | Building/rebuilding embedding index |\n| App initialization | `set_hand_route_home_dir()` | During startup |\n\nThe module depends on `librefang_types::agent::AgentManifest` for manifest deserialization, `librefang_hands` for `HandDefinition` and `parse_hand_toml_with_agents_dir`, and `regex_lite` for pattern matching.","kernel-core-librefang-kernel-src":"# Kernel Core ŌĆö librefang-kernel-src\n\n# Execution Approval Manager (`librefang-kernel/src/approval.rs`)\n\nThe approval subsystem gates dangerous tool invocations behind human decisions. Every tool call that matches the approval policy is intercepted, recorded, and held until an operator explicitly approves, denies, or skips it ŌĆö or it times out according to the configured fallback strategy.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[Agent tool call] --> B{requires_approval_with_context?}\n    B -- No --> C[Execute immediately]\n    B -- Yes --> D{Blocking or Deferred?}\n    D -- Blocking --> E[request_approval]\n    D -- Deferred --> F[submit_request]\n    E --> G[oneshot::Receiver waits]\n    F --> H[Returns UUID immediately]\n    G --> I{Timeout?}\n    I -- Escalate --> E\n    I -- Resolve --> J[push_recent + audit]\n    H --> K[API / Dashboard resolves]\n    K --> L[resolve]\n    L --> M{TOTP required?}\n    M -- Yes & unverified --> N[Reject: TOTP required]\n    M -- No or verified --> O[Return ApprovalResponse + DeferredToolExecution]\n```\n\n## Core Struct: `ApprovalManager`\n\nThe single entry point for all approval operations. Internally it holds:\n\n| Field | Type | Purpose |\n|---|---|---|\n| `pending` | `DashMap<Uuid, PendingRequest>` | Concurrent map of all outstanding requests |\n| `recent` | `Mutex<VecDeque<ApprovalRecord>>` | Last 100 resolved decisions for dashboard display |\n| `policy` | `RwLock<ApprovalPolicy>` | Hot-reloadable policy snapshot |\n| `audit_db` | `Option<Arc<Mutex<Connection>>>` | Persistent SQLite for audit log, pending state, TOTP tracking |\n| `totp_grace` | `Mutex<HashMap<String, Instant>>` | Per-user TOTP grace period timestamps |\n| `totp_failures` | `Mutex<HashMap<String, (u32, Option<Instant>)>>` | Per-user consecutive failure counters and lockout start times |\n| `failure_rw_mutex` | `Mutex<()>` | Global guard that serializes lockout-check + failure-record to prevent TOCTOU races |\n\n### Construction\n\n- **`new(policy)`** ŌĆö in-memory only, no persistence. Suitable for tests or ephemeral sessions.\n- **`new_with_db(policy, conn)`** ŌĆö persistent mode. Restores pending approvals and TOTP lockout state from SQLite on startup so nothing is lost across daemon restarts (#3611).\n\n## Two Execution Paths\n\n### Blocking: `request_approval(&self, req) -> ApprovalDecision`\n\nUsed by the agent loop when a tool call needs to block until resolved. Internally:\n\n1. Enforces the per-agent pending limit (`MAX_PENDING_PER_AGENT = 5`).\n2. Creates a `tokio::sync::oneshot` channel and inserts a `PendingRequest` into the map.\n3. Persists the request to `pending_approvals` before the in-memory insert (#3611 crash safety).\n4. Awaits on the receiver with a timeout computed by `effective_timeout_secs`.\n5. On timeout, the `TimeoutFallback` policy determines the outcome:\n   - **`Escalate { extra_timeout_secs }`** ŌĆö bumps `escalation_count`, re-inserts the request with a longer timeout, and loops. After `MAX_ESCALATIONS` (3) rounds, falls through to `TimedOut`.\n   - **`Skip`** ŌĆö resolves as `ApprovalDecision::Skipped`.\n   - **Default** ŌĆö resolves as `ApprovalDecision::TimedOut`.\n\n### Deferred (non-blocking): `submit_request(&self, req, deferred) -> Result<Uuid, String>`\n\nUsed when the caller cannot block (e.g., an async assistant response that queued multiple tool calls). Returns the request UUID immediately. The `DeferredToolExecution` payload ŌĆö containing the tool use ID, input, execution policy, workspace root, etc. ŌĆö is stored atomically and returned to the caller on `resolve()`.\n\nGuards:\n- Rejects duplicate `tool_use_id` values to prevent double-submission of the same tool call.\n- Enforces the same per-agent pending limit.\n\nPeriodic expiry is handled by `expire_pending_requests()`, called by the kernel's sweep loop. It returns escalated requests and terminal decisions with their deferred payloads.\n\n## Resolution: `resolve()`\n\n```rust\nfn resolve(\n    &self,\n    request_id: Uuid,\n    decision: ApprovalDecision,\n    decided_by: Option<String>,\n    totp_verified: bool,\n    user_id: Option<&str>,\n) -> Result<(ApprovalResponse, Option<DeferredToolExecution>), String>\n```\n\nCalled by the API/UI layer when an operator makes a decision. Key behaviors:\n\n- **TOTP gate**: If the policy requires TOTP for the tool and the decision is `Approved`, the caller must set `totp_verified = true`. If TOTP is required but not verified, the call returns `Err`.\n- **Grace period**: If `totp_verified = true` and the user recently verified, `record_totp_grace()` allows subsequent approvals from the same user without re-entering a code for `totp_grace_period_secs` seconds.\n- **Oneshot delivery**: For blocking-path requests, the decision is sent to the waiting `oneshot::Sender`, unblocking the agent loop.\n- **Deferred return**: For non-blocking requests, `Option<DeferredToolExecution>` is `Some` so the kernel can dispatch the tool.\n- **Idempotent error**: If the request was already resolved, the error message identifies who resolved it and with what decision.\n\n### Batch and Session Operations\n\n- **`resolve_batch(ids, decision, decided_by)`** ŌĆö resolves multiple requests. Does not support TOTP; individual resolution is required when second factor is enabled.\n- **`resolve_all_for_session(session_id, decision, decided_by)`** ŌĆö mirrors Hermes-Agent's `resolve_gateway_approval(..., resolve_all=True)`. Resolves every pending request matching a session ID. TOTP-required requests return `Err` individually and are not counted.\n- **`list_pending_for_session(session_id)`** / **`has_pending_for_session(session_id)`** ŌĆö dashboard-facing queries scoped to a single conversation.\n\n## Policy Evaluation\n\n### Tool Approval: `requires_approval_with_context(tool_name, sender_id, channel)`\n\nReturns `true` (approval needed) unless any of these bypasses apply:\n\n1. **Trusted sender** ŌĆö `sender_id` appears in `policy.trusted_senders`. Overrides everything, including channel deny rules.\n2. **Channel allow rule** ŌĆö a `channel_rules` entry for the given channel explicitly lists the tool in `allowed_tools`.\n3. **Not in require list** ŌĆö the tool name doesn't match any pattern in `require_approval`.\n\nReturns `true` if a channel rule explicitly denies the tool, or if none of the above bypasses apply and the tool matches the approval list.\n\n### Pattern Matching\n\nThe `require_approval` list supports glob-style wildcards via `glob_matches`:\n\n| Pattern | Matches |\n|---|---|\n| `shell_exec` | Exact match only |\n| `file_*` | `file_read`, `file_write`, `file_delete`, etc. |\n| `*_exec` | `shell_exec`, `remote_exec`, etc. |\n| `*` | Every tool |\n\n### Hard Deny: `is_tool_denied_with_context(tool_name, sender_id, channel)`\n\nReturns `true` when a channel rule explicitly lists the tool in its `denied_tools`. Trusted senders bypass this check entirely.\n\n### Risk Classification: `classify_risk(tool_name)`\n\nStatic heuristic mapping tool names to risk levels:\n\n| Tool(s) | Risk Level |\n|---|---|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n## TOTP Second Factor\n\n### Lifecycle\n\n1. **Setup** ŌĆö `generate_totp_secret(issuer, account)` returns `(base32_secret, otpauth_uri, qr_base64_png)`.\n2. **Verify** ŌĆö `verify_totp(secret, code, issuer)` checks the 6-digit code against RFC 6238 (SHA-1, 30-second step, ┬▒1 window).\n3. **Recovery codes** ŌĆö `generate_recovery_codes()` produces 8 codes in `XXXX-XXXX-XXXX-XXXX` format (64-bit cryptographic entropy each, replacing the old 8-digit format). `verify_recovery_code(stored_json, code)` consumes a matching code using constant-time comparison (#3591).\n\n### Per-Tool TOTP\n\nWhen `totp_tools` is non-empty, only listed tools require TOTP. When empty, all tools require it. Checked via `policy.tool_requires_totp(tool_name)`.\n\n### Grace Period\n\nAfter a successful TOTP verification, `record_totp_grace(user_id)` stores the timestamp. Subsequent approvals from the same `user_id` within `totp_grace_period_secs` skip TOTP re-entry. A grace period of `0` disables this feature entirely.\n\n### Rate Limiting and Lockout\n\n| Constant | Value |\n|---|---|\n| `TOTP_MAX_FAILURES` | 5 consecutive failures |\n| `TOTP_LOCKOUT_SECS` | 300 seconds (5 minutes) |\n\n- `record_totp_failure(sender_id)` increments the counter. At the threshold, the lockout timer starts.\n- `is_totp_locked_out(sender_id)` checks whether the sender is within the lockout window.\n- `check_and_record_totp_failure(sender_id)` performs both operations atomically under `failure_rw_mutex` to eliminate TOCTOU races (#3584).\n- Lockout state is persisted to `totp_lockout` in SQLite. On restart, expired lockouts are discarded so a restart doesn't extend the window beyond 5 minutes.\n\n### Replay Prevention (#3359)\n\n- `is_totp_code_used(code)` / `record_totp_code_used(code)` ŌĆö tracks SHA-256 hashes of used TOTP codes in `totp_used_codes` with a 60-second lookback window (two TOTP steps).\n- `record_totp_code_used_for(code, bound_to)` ŌĆö binds the code to an action key (e.g., `\"approval:<uuid>\"`) for audit trail. Replay detection remains global on `code_hash` ŌĆö the same code cannot authorize a different action. DB write failures surface as `Err(rusqlite::Error)` so callers can return HTTP 500 rather than silently allowing reuse.\n\n## OAuth Nonce Replay Prevention\n\n`is_oauth_nonce_used(nonce)` / `record_oauth_nonce_used(nonce)` prevent replay of OIDC callback URLs by tracking consumed state nonces (SHA-256 hashed, 1-hour window). Entries are pruned automatically.\n\n## Persistent Audit Log\n\nWhen constructed with `new_with_db`, every resolution is written to `approval_audit` via `push_recent()`:\n\n```\nApprovalRequest ŌåÆ ApprovalRecord (in-memory, capped at 100) + ApprovalAuditEntry (SQLite)\n```\n\n### Querying\n\n- **`query_audit(limit, offset, agent_id, tool_name)`** ŌĆö paginated query with optional filters. Returns `Vec<ApprovalAuditEntry>`.\n- **`audit_count(agent_id, tool_name)`** ŌĆö total count with the same filters.\n- **`prune_audit(older_than_days)`** ŌĆö hard-deletes entries older than N days. Uses `datetime()` comparison on the `decided_at` column to handle RFC 3339 variants correctly (#3468).\n\n### Pending Approval Persistence (#3611)\n\n- `db_insert_pending(req)` ŌĆö writes to `pending_approvals` table *and* a `pending` audit row before the in-memory insert.\n- `db_delete_pending(id)` ŌĆö removes the row on resolution or terminal timeout.\n- `restore_pending_approvals(conn, pending)` ŌĆö called at startup. Restored entries have no `oneshot::Sender` and no `DeferredToolExecution`; they appear in the API as needing manual operator action.\n\n## Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `MAX_PENDING_PER_AGENT` | 5 | Prevents a single agent from flooding the approval queue |\n| `MAX_RECENT_APPROVALS` | 100 | In-memory history window for dashboard |\n| `MAX_ESCALATIONS` | 3 | Escalation rounds before final timeout |\n| `TOTP_MAX_FAILURES` | 5 | Consecutive failures before lockout |\n| `TOTP_LOCKOUT_SECS` | 300 | Lockout duration in seconds |\n\n## Policy Hot-Reload\n\n`update_policy(policy)` replaces the internal `RwLock<ApprovalPolicy>` snapshot. All subsequent calls to `requires_approval_with_context`, `requires_totp`, and other policy-dependent methods use the new policy immediately. The caller holds a single `RwLock` read guard for the duration of each operation to prevent hot-reload races within a single resolution.","kernel-core":"# Kernel Core\n\n# Kernel Core\n\nThe central runtime that orchestrates agent execution, enforces policy, and wires together every subsystem the agents depend on. Nothing in the agent loop touches shared state without passing through the kernel first.\n\n## Sub-modules at a glance\n\n| Sub-module | Responsibility |\n|---|---|\n| [Kernel Core (main)](librefang-kernel-src.md) | Approval gates, workflow DAG engine, RBAC/auth, retry policies, config hot-reload, background agent spawning, trajectory tracking, MCP OAuth, setup wizard |\n| [Kernel Handle](librefang-kernel-handle-src.md) | `KernelHandle` async trait ŌĆö the dependency-inversion boundary that lets the agent runtime call into the kernel without circular imports |\n| [Router](librefang-kernel-router-src.md) | Maps inbound user messages to the best **hand** (multi-agent workflow) or **template** (single-agent specialist) via keyword, manifest metadata, and optional embedding similarity |\n| [Metering](librefang-kernel-metering-src.md) | Two-phase LLM cost tracking: reserve budget before a call, settle actual usage after ŌĆö prevents concurrent requests from overspending a quota |\n\n## How they fit together\n\n```\nUser message\n    Ōöé\n    Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé  Router                  Ōöé  selects hand or template\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n             Ōöé\n             Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé  KernelHandle            Ōöé  agent runtime calls through this trait\nŌöé  ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ  Ōöé\nŌöé  Ōöé  Workflow Engine   Ōöé  Ōöé  DAG steps, conditionals, pause/resume\nŌöé  Ōöé  Approval Manager  Ōöé  Ōöé  gates dangerous tool calls for human review\nŌöé  Ōöé  Metering Engine   Ōöé  Ōöé  budget reserve ŌåÆ LLM call ŌåÆ settle\nŌöé  Ōöé  Auth / RBAC       Ōöé  Ōöé  role resolution with caching\nŌöé  Ōöé  Background Spawn  Ōöé  Ōöé  agent task queue\nŌöé  Ōöé  Config Reload     Ōöé  Ōöé  hot-reload planner (log-level ŌåÆ full restart)\nŌöé  ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś  Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\nThe **Router** decides *what* runs. **KernelHandle** is the *only way* the agent runtime invokes kernel operations ŌĆö spawning agents, routing messages, managing memory, enforcing approvals, checking quotas, and scheduling crons all flow through this single interface. The kernel implements the trait and injects it at startup.\n\n## Key cross-cutting workflows\n\n**Inbound message lifecycle.** A user message arrives ŌåÆ [Router](librefang-kernel-router-src.md) scores it against registered hands and templates ŌåÆ the winning hand/template is dispatched via [KernelHandle](librefang-kernel-handle-src.md) ŌåÆ the agent loop runs, with every tool call passing through approval and metering checks.\n\n**Approval-gated tool call.** An agent invokes a tool ŌåÆ [Approval Manager](librefang-kernel-src.md) checks it against policy ŌåÆ if it matches, the call is held (blocking with oneshot receiver, or deferred returning a UUID) until an operator approves, denies, or skips it, or the timeout fallback triggers.\n\n**LLM call with cost enforcement.** Before an LLM dispatch ŌåÆ [Metering](librefang-kernel-metering-src.md) reserves estimated spend against the global quota ŌåÆ the call executes ŌåÆ actual token usage is recorded and the reservation settled. Concurrent requests cannot collectively exceed the cap.\n\n**Workflow DAG execution.** [Workflow Engine](librefang-kernel-src.md) loads step definitions, resolves dependencies into a DAG, and runs steps in parallel where possible ŌĆö with conditional branching, retry policies via `RetryPolicy`, error modes (skip/retry), output variable propagation, and pause/resume support for long-running human-in-the-loop flows.\n\n**Config hot-reload.** [Config Reload](librefang-kernel-src.md) evaluates what changed and produces a `ReloadPlan` scoped to the kernel's installed `ReloadCapabilities` ŌĆö e.g., log-level changes apply instantly, while deeper changes require a restart.\n\n**Vault-backed secrets.** TOTP setup and revocation flows route through the kernel's `mcp_oauth_provider` into the vault extension, resolving master keys from the OS keyring before checking or creating credentials.","llm-drivers-librefang-llm-driver-src":"# LLM Drivers ŌĆö librefang-llm-driver-src\n\n# LLM Driver (`librefang-llm-driver`)\n\nAbstraction layer that sits between LibreFang's agent loop and every LLM provider it supports. Every concrete driver ŌĆö Anthropic, OpenAI, Gemini, Ollama, Claude Code CLI, and the 15+ others ŌĆö implements the same `LlmDriver` trait, so callers never think about wire formats or authentication schemes.\n\nThe crate also owns **error classification** and **failover taxonomy**: raw provider errors are mapped to `FailoverReason` variants that drive the `FallbackChain`'s provider-switching decisions.\n\n## Architecture\n\n```mermaid\ngraph TD\n    AL[Agent Loop / Runtime] -->|CompletionRequest| LD[LlmDriver trait]\n    LD -->|complete / stream| D1[Anthropic Driver]\n    LD -->|complete / stream| D2[OpenAI Driver]\n    LD -->|complete / stream| D3[Gemini Driver]\n    LD -->|complete / stream| D4[CLI Drivers]\n    LD -->|LlmError| FC[FallbackChain]\n    FC -->|failover_reason| FR[FailoverReason]\n    FR -->|retry / skip / propagate| AL\n```\n\n## Core Trait ŌĆö `LlmDriver`\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: mpsc::Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError>;\n\n    fn is_configured(&self) -> bool { true }\n    fn family(&self) -> LlmFamily { LlmFamily::Other }\n}\n```\n\n| Method | Purpose |\n|---|---|\n| `complete` | Blocking (from the caller's perspective) request-response cycle. Every driver must implement this. |\n| `stream` | Sends incremental `StreamEvent`s to the provided channel. The default implementation wraps `complete` and emits `TextDelta` + `ContentComplete`. Drivers with native SSE support override this for real token-by-token streaming. |\n| `is_configured` | Returns `false` only for `StubDriver`. Used to skip unconfigured provider slots. |\n| `family` | Reports the high-level provider family. Defaults to `LlmFamily::Other` so out-of-tree drivers compile without changes. |\n\n**Cancellation (#3543):** The default `stream` propagates `tx.send` errors. If the receiver is dropped (client disconnect, abort), the call returns `LlmError::Http(\"stream receiver dropped\")` so the caller stops driving cancelled work.\n\n## Request and Response\n\n### `CompletionRequest`\n\nCarries everything a provider needs to generate a completion:\n\n| Field | Notes |\n|---|---|\n| `messages` | `Arc<Vec<Message>>` ŌĆö cheap to clone during retries and fallbacks (#3766). |\n| `tools` | `Arc<Vec<ToolDefinition>>` ŌĆö shared across agent-loop iterations without per-turn deep copies (#3586). |\n| `model` | Provider-specific model identifier (e.g. `\"claude-sonnet-4-20250514\"`). |\n| `max_tokens` / `temperature` | Standard sampling controls. |\n| `system` | Extracted system prompt (some APIs need it as a separate parameter). |\n| `thinking` | Extended thinking config for models that support it. |\n| `prompt_caching` | Enables Anthropic `cache_control` markers or OpenAI prefix caching. |\n| `cache_ttl` | Hint for cache duration (`None` = 5 min, `Some(\"1h\")` = 1 hour, Anthropic only). |\n| `response_format` | Structured output format (JSON schema, etc.). |\n| `timeout_secs` | Per-request override for long-running tool calls (e.g. browser automation). |\n| `extra_body` | Provider-specific parameters merged into the JSON body (last-wins). |\n| `agent_id` | Carries the owning agent's identity across MCP bridges for workspace/allowlist resolution. |\n\n### `CompletionResponse`\n\n```rust\npub struct CompletionResponse {\n    pub content: Vec<ContentBlock>,\n    pub stop_reason: StopReason,\n    pub tool_calls: Vec<ToolCall>,\n    pub usage: TokenUsage,\n}\n```\n\nUse `response.text()` to extract all text blocks concatenated, filtering out thinking blocks and other non-text content.\n\n## Error Handling\n\n### `LlmError`\n\nEvery driver returns errors through this enum:\n\n| Variant | Meaning | Retry? |\n|---|---|---|\n| `Http(String)` | Transport failure (connection refused, TLS) | No (failover) |\n| `Api { status, message, code }` | Provider returned an error response | Depends on classification |\n| `RateLimited { retry_after_ms, message }` | Explicit rate limit | Yes (back off) |\n| `Parse(String)` | Response body could not be deserialized | No (propagate) |\n| `MissingApiKey(String)` | No key configured for this provider slot | No (failover) |\n| `Overloaded { retry_after_ms }` | Provider at capacity (503-equivalent) | Yes (back off) |\n| `AuthenticationFailed(String)` | Invalid or expired credentials | No (failover) |\n| `ModelNotFound(String)` | Model doesn't exist on this provider | No (failover) |\n| `TimedOut { inactivity_secs, partial_text, ŌĆ” }` | CLI subprocess stalled | No (failover) |\n\nThe `Api` variant carries an optional `ProviderErrorCode` ŌĆö a typed enum parsed from the provider's structured JSON response (e.g. `error.code = \"rate_limit_exceeded\"`). When present, `failover_reason()` classifies via this typed value instead of substring-matching the human-readable `message` (#3745).\n\n### `LlmError::failover_reason()`\n\nMaps any `LlmError` to a `FailoverReason` that drives the `FallbackChain`:\n\n```\nLlmError::RateLimited       ŌåÆ FailoverReason::RateLimit(Some(ms))\nLlmError::Api 429           ŌåÆ FailoverReason::RateLimit(None)\nLlmError::Api 401           ŌåÆ FailoverReason::AuthError\nLlmError::Api 402           ŌåÆ FailoverReason::CreditExhausted\nLlmError::Api 413           ŌåÆ FailoverReason::ContextTooLong\nLlmError::Api 503           ŌåÆ FailoverReason::ModelUnavailable\nLlmError::Overloaded        ŌåÆ FailoverReason::RateLimit(Some(ms))\nLlmError::ModelNotFound     ŌåÆ FailoverReason::ModelUnavailable\nLlmError::TimedOut          ŌåÆ FailoverReason::Timeout\nLlmError::Http/Parse        ŌåÆ FailoverReason::HttpError / Unknown\n```\n\nClassification is purely structural (variant + status code + typed `code`) ŌĆö no allocations, no regex, no locale-dependent substring matching.\n\n## Error Classification (`llm_errors` module)\n\n### `classify_error(message, status) ŌåÆ ClassifiedError`\n\nFull classification pipeline for raw provider error messages. Uses case-insensitive substring matching against curated pattern tables covering all 19+ providers. Returns a `ClassifiedError` with:\n\n- **`category`**: One of `RateLimit`, `Overloaded`, `Timeout`, `Billing`, `Auth`, `ContextOverflow`, `Format`, `ModelNotFound`\n- **`is_retryable`**: `true` for `RateLimit`, `Overloaded`, `Timeout`\n- **`is_billing`**: `true` only for `Billing`\n- **`suggested_delay_ms`**: Parsed from \"retry after N\" / \"retry-after: N\" patterns\n- **`sanitized_message`**: User-safe message with API keys redacted, HTML stripped, and length capped\n\n**Priority order:** ContextOverflow ŌåÆ Billing ŌåÆ Auth ŌåÆ RateLimit ŌåÆ ModelNotFound ŌåÆ Format ŌåÆ Overloaded ŌåÆ Timeout ŌåÆ fallback.\n\n**Status-code fast paths:** 429 ŌåÆ RateLimit, 402 ŌåÆ Billing, 401 ŌåÆ Auth, 404 ŌåÆ ModelNotFound. Status 403 is handled with special nuance ŌĆö many providers (especially Chinese ones) return 403 for quota, region, or model-permission issues, not authentication. The classifier checks `FORBIDDEN_NON_AUTH_PATTERNS` before falling back to `Auth`.\n\n### `classify_error_with_context(message, status, provider, model)`\n\nPreferred entry point when provider and model information is available. Enriches the result with:\n\n- `provider` and `model` fields for diagnostics\n- `suggestion` ŌĆö actionable advice (e.g. \"Model 'claude-99' may not be available on anthropic\")\n- Enriched `sanitized_message` with provider/model tags\n\n### `is_transient(message) ŌåÆ bool`\n\nQuick heuristic check for retryable errors without full classification. Matches timeout, overloaded, rate-limit, and SSL transient patterns.\n\n### Sanitization\n\n`sanitize_for_user` produces user-facing messages that:\n1. Extract the `message` field from JSON error bodies (`{error.message}`, `{message}`, `{detail}`)\n2. Redact secrets (`sk-*`, `key-*`, `Bearer *`)\n3. Strip HTML error pages (Cloudflare 521-530, `<!DOCTYPE`, `<html`)\n4. Strip the `LLM driver error: API error (NNN): ` wrapper\n5. Cap at 300 characters with UTF-8-safe truncation (handles CJK, emoji)\n\n## Streaming ŌĆö `StreamEvent`\n\nEmitted incrementally during streaming completions:\n\n| Event | Source |\n|---|---|\n| `TextDelta { text }` | LLM driver |\n| `ThinkingDelta { text }` | LLM driver (extended thinking) |\n| `ToolUseStart { id, name }` | LLM driver |\n| `ToolInputDelta { text }` | LLM driver |\n| `ToolUseEnd { id, name, input }` | LLM driver |\n| `ContentComplete { stop_reason, usage }` | LLM driver |\n| `PhaseChange { phase, detail }` | Agent loop |\n| `ToolExecutionResult { name, result_preview, is_error }` | Agent loop |\n| `OwnerNotice { text }` | Agent loop |\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) is emitted as a `PhaseChange` to signal that the turn's text is fully streamed, allowing the UI to unblock user input before post-processing finishes.\n\n## Provider Families ŌĆö `LlmFamily`\n\nCoarse-grained grouping for cross-cutting policy:\n\n| Variant | Providers |\n|---|---|\n| `Anthropic` | Claude direct API, Anthropic-compatible proxies |\n| `OpenAi` | OpenAI, Azure OpenAI, Groq, OpenRouter, DeepInfra, Together, Cerebras |\n| `Google` | Gemini API, Vertex AI Gemini, Gemini CLI |\n| `Local` | Ollama, LM Studio, vLLM, sglang, llama.cpp (native protocol) |\n| `Other` | Cohere, Aider, custom CLIs, and the default for untagged drivers |\n\nSerialized as `snake_case` in JSON (`\"open_ai\"`, not `\"openai\"`). `Display` impl matches the serde representation.\n\n## Configuration\n\n### `DriverConfig`\n\nShared configuration for driver construction:\n\n| Field | Default | Purpose |\n|---|---|---|\n| `provider` | `\"\"` | Provider name (e.g. `\"anthropic\"`, `\"openai\"`) |\n| `api_key` | `None` | **Redacted in `Debug` output** |\n| `base_url` | `None` | Override the default API endpoint |\n| `vertex_ai` | default | Google Vertex AI project/region/credentials |\n| `azure_openai` | default | Azure endpoint/deployment/api-version |\n| `skip_permissions` | `true` | `--dangerously-skip-permissions` for Claude Code CLI |\n| `message_timeout_secs` | `300` | Inactivity timeout for CLI-based drivers (not wall-clock) |\n| `mcp_bridge` | `None` | Temp MCP config for bridging LibreFang tools into CLI drivers (#2314) |\n| `proxy_url` | `None` | Per-provider proxy (**redacted in `Debug`**) |\n| `request_timeout_secs` | `None` | HTTP client timeout for API drivers |\n\n### `McpBridgeConfig`\n\nWhen set, the driver writes a temp `mcp_config.json` and passes `--mcp-config` to the spawned CLI so it discovers LibreFang tools via the daemon's `/mcp` endpoint.\n\n## Failover Taxonomy ŌĆö `FailoverReason`\n\nEight variants that drive distinct recovery actions in `FallbackChain`:\n\n| Variant | Recovery |\n|---|---|\n| `RateLimit(Option<u64>)` | Sleep (with optional hint), retry same provider |\n| `CreditExhausted` | Skip to next provider |\n| `ModelUnavailable` | Skip to next provider |\n| `ContextTooLong` | Propagate ŌĆö caller must compress context |\n| `Timeout` | Skip to next provider |\n| `HttpError` | Skip to next provider |\n| `AuthError` | Skip to next provider (next slot may have valid key) |\n| `Unknown` | Propagate immediately |\n\n### `ProviderErrorCode`\n\nTyped enum carried on `LlmError::Api.code` for structured classification without substring matching:\n\n`RateLimit`, `CreditExhausted`, `ContextLengthExceeded`, `ModelNotFound`, `AuthError`, `ServerUnavailable`, `ServerError`, `BadRequest`\n\nDrivers populate this from the provider's JSON `error.code` / `error.type` field. When `None`, `failover_reason()` falls back to status-code-only classification.\n\n## Integration Points\n\nThe crate is consumed across the codebase:\n\n- **`librefang-runtime`** ŌĆö `agent_loop`, `compactor`, `embedding`, `image_gen`, `tool_runner`, `web_fetch`, `media_understanding`, `plugin_manager` all construct `CompletionRequest` and call through `LlmDriver`\n- **`librefang-llm-drivers`** ŌĆö Concrete driver implementations (Anthropic, OpenAI, ChatGPT, Claude Code, etc.) and the `FallbackChain` that calls `failover_reason()` to decide provider switching\n- **`librefang-memory`** ŌĆö `http_vector_store` uses `CompletionResponse::text()` for embedding operations\n- **`librefang-runtime`** (ChatGPT driver) ŌĆö `should_refresh_after_forbidden` calls `classify_error` to decide whether a 403 warrants a token refresh","llm-drivers-librefang-llm-drivers-src":"# LLM Drivers ŌĆö librefang-llm-drivers-src\n\n# librefang-llm-drivers-src\n\n## Purpose\n\nThis crate provides the LLM provider abstraction layer for LibreFang. It defines a common `LlmDriver` trait that normalises interactions with large-language-model APIs ŌĆö Anthropic, OpenAI, Gemini, Bedrock, Vertex AI, and CLI-based backends like Aider and Claude Code ŌĆö into uniform `complete()` and `stream()` methods. On top of the trait, it supplies shared infrastructure for retry logic, credential rotation, rate-limit awareness, and prompt caching.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Consumer Layer\"\n        Agent[Agent Runtime]\n        FC[Fallback Chain]\n        TR[Token Rotation Wrapper]\n    end\n\n    subgraph \"LlmDriver Trait\"\n        complete[\"complete() ŌåÆ CompletionResponse\"]\n        stream[\"stream() ŌåÆ mpsc Receiver\"]\n        family[\"family() ŌåÆ LlmFamily\"]\n    end\n\n    subgraph \"Provider Implementations\"\n        Anthropic[Anthropic Driver]\n        OpenAI[OpenAI Driver]\n        Gemini[Gemini Driver]\n        Bedrock[Bedrock Driver]\n        VertexAI[Vertex AI Driver]\n        ChatGPT[ChatGPT Driver]\n        Aider[Aider CLI Driver]\n        ClaudeCode[Claude Code CLI]\n        QwenCode[Qwen Code CLI]\n    end\n\n    subgraph \"Shared Infrastructure\"\n        BP[Backoff & Retry]\n        CP[Credential Pool]\n        RLT[Rate Limit Tracker]\n        SRG[Shared Rate Guard]\n        RA[Retry-After Parser]\n        U8S[UTF-8 Stream Decoder]\n    end\n\n    Agent --> FC\n    FC --> Anthropic\n    FC --> OpenAI\n    FC --> Gemini\n    TR --> Anthropic\n    TR --> OpenAI\n\n    Anthropic --> BP\n    Anthropic --> SRG\n    Anthropic --> RLT\n    Anthropic --> U8S\n    OpenAI --> BP\n    OpenAI --> RA\n\n    CP -.-> Anthropic\n    CP -.-> OpenAI\n```\n\nAll providers implement `LlmDriver` (via `async_trait`), which exposes three methods:\n\n| Method | Return | Purpose |\n|--------|--------|---------|\n| `complete(request)` | `Result<CompletionResponse, LlmError>` | Single-shot request/response |\n| `stream(request, tx)` | `Result<CompletionResponse, LlmError>` | Server-sent events ŌåÆ `mpsc::Sender<StreamEvent>` |\n| `family()` | `LlmFamily` | Enum tag: `Anthropic`, `OpenAi`, `Gemini`, `Bedrock`, `VertexAi` |\n\nThe `FallbackChain` and `TokenRotation` wrappers are themselves `LlmDriver` implementations that delegate to inner drivers, so they compose transparently.\n\n---\n\n## Backoff (`backoff.rs`)\n\nJittered exponential backoff for retry loops. The formula is:\n\n```\ndelay = max(base ├Ś 2^(attempt-1), floor) + jitter\n```\n\nwhere `jitter Ōłł [0, jitter_ratio ├Ś base_delay]`.\n\n### Key functions\n\n| Function | Use case |\n|----------|----------|\n| `jittered_backoff(attempt, base, max, ratio, floor)` | General-purpose, fully configurable |\n| `standard_retry_delay(attempt, floor)` | LLM API retries ŌĆö 2 s base, 60 s cap, 50% jitter |\n| `tool_use_retry_delay(attempt)` | Tool-use failures ŌĆö 1.5 s base, 60 s cap, 50% jitter |\n\n### Seed diversity\n\nThe PRNG seed combines wall-clock subsecond nanoseconds with a process-global Weyl-sequence counter (`JITTER_COUNTER`, Knuth's golden-ratio constant `0x9E37_79B9_7F4A_7C15`). This guarantees diverse seeds even when multiple concurrent retry loops fire within the same OS clock tick (e.g. 15 ms granularity on Windows).\n\n### Overflow safety\n\nAll exponential computation is done in `f64` space *before* constructing a `Duration`. This avoids the `Duration::mul_f64` panic that occurs when `base ├Ś 2^exp` overflows the internal `u64` nanosecond counter (which happens at attempt Ōēł 34 for a 2 s base).\n\n### Testing support\n\n`enable_test_zero_backoff()` returns a `ZeroBackoffGuard` that forces all backoff delays to zero. The guard re-enables normal delays on drop, making integration tests deterministic without polluting production code with feature flags.\n\n---\n\n## Credential Pool (`credential_pool.rs`)\n\nThread-safe pool of API keys for a single provider, designed for `Arc`-sharing across async tasks.\n\n### Selection strategies\n\n| Strategy | Behaviour | When to use |\n|----------|-----------|-------------|\n| `FillFirst` | Always pick the highest-priority available key | Premium keys you want to exhaust first |\n| `RoundRobin` (default) | Cycle through available keys in priority order | Even load distribution |\n| `Random` | Pick a random available key (LCG-based, no `rand` dependency) | Simple spreading |\n| `LeastUsed` | Pick the key with the lowest `request_count` | Long-running balanced workloads |\n\n### Lifecycle\n\n1. **`acquire()`** ŌĆö Returns a cloned API key string, or `None` if all keys are exhausted.\n2. **`mark_success(key)`** ŌĆö Increments `request_count` and clears any active exhaustion marker (early-recovery path).\n3. **`mark_exhausted(key)`** ŌĆö Places the key in cooldown for `exhausted_ttl` (default 1 hour). Used on 429/402 responses.\n\n```rust\nlet pool = CredentialPool::new(\n    vec![(\"sk-premium\".into(), 10), (\"sk-backup\".into(), 5)],\n    PoolStrategy::RoundRobin,\n);\nlet key = pool.acquire().expect(\"at least one key available\");\n// ... make request ...\npool.mark_success(&key);\n```\n\n### Thread safety\n\nAll mutable state lives behind a single `Mutex<CredentialPoolInner>` so that the `RoundRobin` index and the credential list are always read and written atomically ŌĆö no TOCTOU between reading the index and selecting a credential.\n\n### Diagnostics\n\n`snapshot()` returns `Vec<CredentialSnapshot>` with redacted key hints (`****abcd`), priority, request count, and exhaustion status. Safe for logs and dashboards.\n\n### Convenience type\n\n`ArcCredentialPool` is a type alias for `Arc<CredentialPool>`. Use `new_arc_pool()` to construct one.\n\n---\n\n## Anthropic Driver (`drivers/anthropic.rs`)\n\nFull implementation of the Anthropic Messages API (`/v1/messages`) with:\n\n- **Tool use** ŌĆö serialisation/deserialisation of `tool_use` and `tool_result` content blocks\n- **Extended thinking** ŌĆö `thinking` field with configurable `budget_tokens` (minimum 1024)\n- **Prompt caching** ŌĆö `cache_control` markers managed within Anthropic's 4-breakpoint-per-request cap\n- **Streaming** ŌĆö SSE parsing with `ContentBlockAccum` accumulation\n- **Retry** ŌĆö 429 (rate limit) and 529 (overloaded) retries with backoff and cross-process rate-guard integration\n- **1-hour cache TTL** ŌĆö gated by the `extended-cache-ttl-2025-04-11` beta header\n\n### Request construction (`build_anthropic_request`)\n\nThe shared function that builds `ApiRequest` from `CompletionRequest`, used by both `complete()` and `stream()`:\n\n1. Extract system prompt from `request.system` or the first `Role::System` message.\n2. Inject `response_format` instructions into the system prompt (Anthropic has no native field).\n3. Resolve `CacheTtl` from `prompt_caching` and `cache_ttl` fields.\n4. Build system field ŌĆö plain string when caching is off; single-element block array with `cache_control` marker when on.\n5. Build tool list ŌĆö last tool gets `cache_control` marker when caching is on, so the (system + tools) prefix is cached as one unit.\n6. Apply `system_and_3` rolling-window markers to trailing messages.\n7. Set `thinking` configuration (requires `budget_tokens Ōēź 1024`).\n8. Clamp `max_tokens` to at least `budget_tokens + 1024` when thinking is enabled.\n\n### Prompt caching: the 4-breakpoint budget\n\nAnthropic allows at most 4 `cache_control` markers per request, counted across system + tools + messages. The driver allocates them as:\n\n| Slot | Consumer | Condition |\n|------|----------|-----------|\n| 1 | System block | Always, when caching is on |\n| 2 | Last tool definition | When tools list is non-empty |\n| 3ŌĆō4 | Trailing messages (newest first) | Remaining slots |\n\nThe `apply_cache_markers_system_and_3()` function walks messages tailŌåÆhead, stamping markers on the last content block of each message until the budget is exhausted. It **skips** empty `Blocks` payloads (e.g. Thinking-only messages that were filtered by `convert_message`) without consuming a slot, preserving the full rolling window.\n\n### Tool input normalisation (`ensure_object`)\n\nAnthropic requires `tool_use.input` to be a JSON object. The `ensure_object()` function handles malformed model output:\n\n| Input | Output |\n|-------|--------|\n| `{...}` (object) | Passed through |\n| `null` | `{}` |\n| JSON-encoded string `\"\\\"{\\\"q\\\":\\\"rust\\\"}\\\"\"` | Parsed to `{\"q\":\"rust\"}` |\n| Any other type | Wrapped as `{\"raw_input\": <value>}` |\n\n### Error classification\n\n`anthropic_error_code()` maps Anthropic's `error.type` discriminator to `ProviderErrorCode`:\n\n- `rate_limit_error` ŌåÆ `RateLimit`\n- `overloaded_error` ŌåÆ `ServerUnavailable`\n- `authentication_error` / `permission_error` ŌåÆ `AuthError`\n- `billing_error` ŌåÆ `CreditExhausted`\n- `not_found_error` ŌåÆ `ModelNotFound`\n- `invalid_request_error` (with status 413) ŌåÆ `ContextLengthExceeded`\n- `api_error` ŌåÆ `ServerError`\n\n### Retry and rate-limit flow\n\n```mermaid\nsequenceDiagram\n    participant D as AnthropicDriver\n    participant G as Shared Rate Guard\n    participant A as Anthropic API\n\n    D->>G: pre_request_check()\n    alt key is locked out\n        G-->>D: Err(RateLimited)\n    else key is OK\n        D->>A: POST /v1/messages\n        alt 429\n            A-->>D: 429 + Retry-After header\n            D->>G: record_429_from_headers()\n            D->>D: standard_retry_delay(attempt, floor)\n            D->>A: retry (up to 3x)\n        else 529\n            A-->>D: 529 (overloaded)\n            Note over D: 529 is NOT persisted to shared guard\n            D->>A: retry (up to 3x)\n        else success\n            A-->>D: 200 + response\n        end\n    end\n```\n\nKey design decisions:\n- **429 is persisted** to the shared rate guard because it reflects an account-level rate limit that should prevent other processes from hitting the same key.\n- **529 is NOT persisted** because it reflects server-side capacity issues, not account state.\n- The `Retry-After` header value is passed as the `floor` parameter to `standard_retry_delay()`, ensuring the server's minimum wait is always honoured.\n\n### Streaming\n\nThe `stream()` method parses Anthropic's SSE protocol, emitting `StreamEvent` variants through an `mpsc::Sender`:\n\n| SSE event | StreamEvent emitted |\n|-----------|-------------------|\n| `content_block_start` (tool_use) | `ToolUseStart { id, name }` |\n| `content_block_delta` (text_delta) | `TextDelta { text }` |\n| `content_block_delta` (input_json_delta) | `ToolInputDelta { text }` |\n| `content_block_delta` (thinking_delta) | `ThinkingDelta { text }` |\n| `content_block_stop` (tool_use) | `ToolUseEnd { id, name, input }` |\n| *(end of stream)* | `ContentComplete { stop_reason, usage }` |\n\nA `Utf8StreamDecoder` buffers partial UTF-8 codepoints across chunk boundaries, preventing CJK characters from vanishing when a chunk splits a multi-byte sequence. The `receiver_dropped` flag aborts the upstream stream early if the consumer drops the `mpsc::Receiver`, avoiding wasted bandwidth.\n\n---\n\n## Aider Driver (`drivers/aider.rs`)\n\nSpawns the `aider` CLI as a subprocess in non-interactive mode. Authentication is delegated entirely to Aider's own environment-variable handling (`OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, etc.).\n\n### Usage\n\n```rust\nlet driver = AiderDriver::new(None, false); // uses \"aider\" on PATH\nlet response = driver.complete(request).await?;\n```\n\nThe driver:\n1. Builds a text prompt from the conversation messages via `build_prompt()`.\n2. Strips the `aider/` prefix from model IDs (e.g. `aider/sonnet` ŌåÆ `sonnet`).\n3. Spawns `aider --message <prompt> --yes-always --no-auto-commits --no-git --model <model>`.\n4. Returns stdout as a single `ContentBlock::Text`. Token usage is zeroed (Aider doesn't report it).\n\n### Detection\n\n`AiderDriver::detect()` runs `aider --version` and returns the version string if available, or `None`.\n\n---\n\n## Supporting Infrastructure\n\n### Rate Limit Tracker (`rate_limit_tracker.rs`)\n\nParses rate-limit HTTP headers (e.g. `x-ratelimit-limit-requests`, `x-ratelimit-remaining-tokens`) into a `RateLimitSnapshot`. Provides `has_warning()` to flag when usage exceeds a threshold, and `display()` for structured log output with ASCII utilisation bars.\n\n### Shared Rate Guard (`shared_rate_guard.rs`)\n\nCross-process rate-limit coordination. When a 429 is received, `record_429_from_headers()` persists the lockout (keyed by hashed API key) so that other processes sharing the same key don't hammer the provider. `pre_request_check()` short-circuits requests when the key is still in lockout.\n\n### Retry-After Parser (`retry_after.rs`)\n\nParses `Retry-After` headers in both delay-seconds and HTTP-date formats. Returns `Duration::ZERO` for past dates or invalid values, so callers always get a safe floor.\n\n### UTF-8 Stream Decoder (`utf8_stream.rs`)\n\nWraps a byte stream to handle partial UTF-8 sequences that span chunk boundaries. `decode(&chunk)` returns valid UTF-8 for completed codepoints; `finish()` drains any remaining partial byte as `U+FFFD`. Essential for SSE streams from providers that may split multi-byte characters.\n\n---\n\n## Error Model\n\n`LlmError` variants cover the full range of failure modes:\n\n| Variant | Meaning |\n|---------|---------|\n| `Http(String)` | Network / transport errors |\n| `Parse(String)` | JSON deserialisation failures |\n| `Api { status, message, code }` | Provider returned non-2xx; `code` is a typed `ProviderErrorCode` when available |\n| `RateLimited { retry_after_ms, message }` | 429 with server-supplied backoff |\n| `Overloaded { retry_after_ms }` | 529 ŌĆö server capacity, not account-level |\n| `ContentFiltered` | Provider refused the request |\n| `ContextLengthExceeded` | Input exceeds model's context window |\n\n`ProviderErrorCode` enables the fallback chain to make intelligent routing decisions (e.g. skip a key on `AuthError`, try a different model on `ContextLengthExceeded`) without string-matching error messages.\n\n---\n\n## Timeout Configuration\n\nEach driver supports three timeout layers, applied in priority order:\n\n1. **Per-request** ŌĆö `CompletionRequest::timeout_secs`\n2. **Per-provider** ŌĆö set via `with_proxy_and_timeout()` constructor\n3. **Default** ŌĆö 300 seconds\n\nThis ensures the daemon never waits indefinitely, even when a provider stops responding.\n\n---\n\n## Proxy Support\n\nDrivers accept an optional proxy URL at construction time. The `librefang_http` crate provides:\n\n- `proxied_client()` ŌĆö global proxy configuration\n- `proxied_client_with_override(url)` ŌĆö per-provider proxy override\n- `proxied_client_fallback()` ŌĆö bounded-timeout fallback when the override URL is invalid\n\n---\n\n## Testing Conventions\n\n- **Redacted keys**: `PooledCredential::fmt::Debug` redacts API keys to `****abcd`. `CredentialSnapshot` is the safe-for-logs view.\n- **Zero-backoff guard**: `enable_test_zero_backoff()` returns an RAII guard that eliminates retry delays in integration tests.\n- **Custom TTL**: `CredentialPool::with_exhausted_ttl(..., Duration::from_secs(0))` creates a pool where exhausted keys recover immediately, useful for tests that need deterministic credential cycling.","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nUnified abstraction over every LLM provider LibreFang supports ŌĆö from cloud APIs (Anthropic, OpenAI, Gemini, Bedrock, Vertex AI) to CLI-based backends (Claude Code, Qwen Code, Aider). Callers use a single `complete()` / `stream()` interface and never deal with provider-specific wire formats.\n\n## Sub-module breakdown\n\n| Sub-module | Role |\n|---|---|\n| [librefang-llm-driver](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait, `CompletionRequest` / `DriverConfig` types, and the `FailoverReason` taxonomy that drives provider failover decisions. |\n| [librefang-llm-drivers-src](librefang-llm-drivers-src.md) | Concrete driver implementations (Anthropic, OpenAI, Gemini, Vertex AI, Ollama, Qwen Code, Gemini CLI, etc.) plus shared infrastructure for retry logic, credential/token rotation, rate-limit tracking, and prompt caching. |\n\n## How they connect\n\n```mermaid\ngraph TB\n    subgraph Consumers\n        AL[Agent Runtime]\n        FC[Fallback Chain]\n    end\n\n    subgraph \"llm-driver ŌĆö trait & error layer\"\n        LDT[\"LlmDriver trait<br/>CompletionRequest<br/>FailoverReason\"]\n    end\n\n    subgraph \"llm-drivers-src ŌĆö implementations\"\n        impl[Anthropic ┬Ę OpenAI ┬Ę Gemini ┬Ę Vertex AI<br/>Bedrock ┬Ę Ollama ┬Ę Qwen Code ┬Ę Gemini CLI ┬Ę ŌĆ”]\n        infra[Token Rotation ┬Ę RateLimitTracker<br/>SharedRateGuard ┬Ę Retry Logic]\n    end\n\n    AL -->|\"CompletionRequest\"| LDT\n    FC -->|\"FailoverReason\"| LDT\n    LDT -->|\"complete() / stream()\"| impl\n    impl --> infra\n```\n\nThe **trait crate** owns the contract; every concrete driver in the **implementations crate** depends on `CompletionRequest` and `DriverConfig` from it. Raw provider errors are classified into `FailoverReason` variants (also defined in the trait crate), which the `FallbackChain` consumes to decide when to switch providers.\n\n## Key cross-cutting workflows\n\n1. **Request lifecycle** ŌĆö The agent runtime builds a `CompletionRequest` (trait crate) and calls a driver's `complete()` or `stream()`. The driver converts it into a provider-specific payload (e.g. `GeminiRequest`, `GeminiContent`, `GenerationConfig` in the Gemini driver) and handles response parsing.\n\n2. **Rate-limit awareness** ŌĆö `RateLimitTracker` and `SharedRateGuard` (implementations crate) maintain rolling-window snapshots of per-provider quota. These surface during the CLI startup flow (`main ŌåÆ load_dotenv ŌåÆ load_vault ŌåÆ display ŌåÆ has_data / ascii_bar / fmt_seconds`) so users see bucket status before the first request fires.\n\n3. **Credential rotation** ŌĆö The `TokenRotation` wrapper marks credentials as exhausted (`mark_exhausted` ŌåÆ `now_ms`) and cycles through alternatives without the caller's involvement.\n\n4. **Failover** ŌĆö When a driver invocation fails, the error is mapped to a `FailoverReason`. The `FallbackChain` uses that signal to select the next provider, retrying or switching transparently.\n\nSee the individual sub-module pages for driver-specific details and configuration options.","memory-system":"# Memory System\n\n# Memory System (`librefang-memory`)\n\n## Purpose\n\nThe memory substrate provides persistent, searchable memory for LibreFang agents. It unifies three storage paradigmsŌĆöstructured key-value, semantic text/vector search, and a knowledge graphŌĆöbehind a single API that agents interact with through the `Memory` trait defined in `librefang-types`.\n\nThe module handles the full memory lifecycle: ingestion (with optional text chunking), recall (via LIKE matching or vector similarity), access tracking, confidence decay, duplicate consolidation, scope-based expiration, and eventual hard deletion.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Agent[\"Agent / API Route\"] --> PS[\"ProactiveMemoryStore\"]\n    PS --> Sub[\"MemorySubstrate\"]\n    Sub --> Structured[\"StructuredStore (SQLite KV)\"]\n    Sub --> Semantic[\"SemanticStore (SQLite + vectors)\"]\n    Sub --> Knowledge[\"KnowledgeStore (SQLite graph)\"]\n    Sub --> Sessions[\"SessionStore\"]\n    Semantic --> VS[\"VectorStore trait\"]\n    VS --> SQLiteVS[\"SqliteVectorStore\"]\n    VS --> HttpVS[\"HttpVectorStore\"]\n    PS --> ACL[\"NamespaceGuard / redaction\"]\n    Consolidation[\"ConsolidationEngine\"] --> DB[\"SQLite (memories table)\"]\n    Decay[\"run_decay / prune_soft_deleted\"] --> DB\n```\n\n## Storage Backends\n\n### Structured Store (`structured.rs`)\n\nPer-agent key-value storage in the `kv_store` table. Supports namespaced keys with prefix-based access control via `MemoryNamespaceGuard`. Operations are `get`, `set`, `delete`, and `list_kv` (filtered by prefix).\n\n### Semantic Store (`semantic.rs`)\n\nStores free-text memories in the `memories` table with optional vector embeddings. Recall supports two modes:\n\n- **Phase 1 (text)**: `LIKE` matching against content when no embedding is available.\n- **Phase 2 (vector)**: Delegates to a `VectorStore` implementation for similarity search.\n\nEach recall updates `accessed_at` and increments `access_count`, which feeds into decay and consolidation decisions.\n\nThe `VectorStore` trait has two implementations:\n\n| Implementation | Location | Use case |\n|---|---|---|\n| `SqliteVectorStore` | `semantic.rs` | Single-process, embedding stored as BLOB in SQLite |\n| `HttpVectorStore` | `http_vector_store.rs` | External vector DB (Qdrant, Weaviate, etc.) over HTTP/JSON |\n\n`HttpVectorStore` expects a remote service exposing four endpoints: `POST /insert`, `POST /search`, `DELETE /delete`, and `POST /get_embeddings`.\n\n### Knowledge Graph (`knowledge.rs`)\n\nEntities and relations stored in `entities` and `relations` tables. Supports:\n\n- **Entity creation** with upsert semantics (`ON CONFLICT DO UPDATE`).\n- **Relation creation** between entities, with confidence scores.\n- **Pattern queries** via `query_graph(GraphPattern)` ŌĆö supports filtering by source entity, relation type, and target entity, matching by either ID or name.\n- **Agent-scoped cleanup** via `delete_by_agent`, wrapped in a transaction to prevent orphan entities.\n\nRelations can reference entities by name (as MCP tools do) or by ID; the JOIN logic handles both.\n\n## Memory Lifecycle\n\n### 1. Ingestion ŌĆö Text Chunking (`chunker.rs`)\n\nLong documents are split into overlapping chunks before embedding. The `chunk_text(text, max_size, overlap)` function applies a three-tier splitting strategy:\n\n1. **Paragraph boundaries** (`\\n\\n`) ŌĆö preferred, preserves coherence.\n2. **Sentence boundaries** (`. `, `.\\n`, `ŃĆé`, `’╝¤`, `’╝ü`) ŌĆö used when a single paragraph exceeds `max_size`.\n3. **Hard character split** ŌĆö fallback for individual sentences that still exceed the limit.\n\nOverlap is applied by prepending the last `overlap` characters of the previous chunk to the next chunk (separated by `\\n\\n`). If the overlap + new segment exceeds `max_size`, the overlap is dropped to stay within limits.\n\nCharacter operations use proper UTF-8 boundary iteration, so multi-byte characters (CJK, emoji) are never split mid-codepoint.\n\n### 2. Recall and Search\n\n`ProactiveMemoryStore` exposes two search paths:\n\n- **`search`** ŌĆö Queries memories for a specific agent, filtered by optional namespace guard. Results pass through PII redaction (`redact_all` in `namespace_acl.rs`).\n- **`search_all`** ŌĆö Cross-agent search, also guarded by ACL.\n\nBoth paths flow into `SemanticStore::recall_with_embedding`, which:\n1. Tries vector search first (if an embedding is available and a vector store is configured).\n2. Falls back to `LIKE`-based text matching.\n3. Updates `accessed_at` and `access_count` on matched memories.\n\n### 3. Decay (`decay.rs`)\n\nTime-based expiration governed by `MemoryDecayConfig`:\n\n| Scope | TTL Config Key | Behavior |\n|---|---|---|\n| `user_memory` | ŌĆö | Never decays. Permanent knowledge. |\n| `session_memory` | `session_ttl_days` | Soft-deleted after N days of no access. |\n| `agent_memory` | `agent_ttl_days` | Soft-deleted after N days of no access. |\n\n`run_decay(conn, config)` issues `UPDATE ... SET deleted = 1, deleted_at = <unix_timestamp>` for stale memories. Timestamps are compared using SQLite's `datetime()` function to avoid RFC3339 string-comparison pitfalls (timezone offsets, fractional seconds).\n\nAccessing a memory (via search/recall) resets the decay timer by updating `accessed_at`.\n\n### 4. Consolidation (`consolidation.rs`)\n\n`ConsolidationEngine::consolidate()` runs two phases:\n\n**Phase 1 ŌĆö Confidence Decay**: Reduces confidence of memories not accessed in the last 7 days by the configured `decay_rate` (floored at 0.1).\n\n**Phase 2 ŌĆö Duplicate Merge**: For each agent's active memories, computes pairwise text similarity. When similarity exceeds 90%:\n\n- The higher-confidence memory is the **keeper**; the lower is soft-deleted.\n- `access_count` is summed across both.\n- Metadata JSON objects are unioned (keeper wins on key conflict; non-object values are preserved verbatim rather than coerced to `{}`).\n- Embeddings are blended via a **running confidence-weighted average**: the keeper accumulates weight from every loser it absorbs, so a keeper that absorbs N losers produces an average over all N+1 original vectorsŌĆönot a chain of pairwise blends biased toward the last loser.\n\nThe merge loop is capped at `MAX_MERGES_PER_RUN = 100` to avoid O(n┬▓) blowup. All merges execute within a single outer transaction (one fsync), and consolidation is idempotentŌĆösubsequent runs pick up where the last left off.\n\nCross-tenant merges are prevented by processing each `agent_id` in isolation.\n\n### 5. Hard Deletion (`prune_soft_deleted_memories`)\n\nSoft-deleted rows retain their embedding BLOBs indefinitely. `prune_soft_deleted_memories(conn, older_than_days)` hard-deletes rows where `deleted = 1` and `deleted_at` is older than the threshold, reclaiming storage. Rows with `deleted_at = NULL` (pre-migration or manually soft-deleted) are left untouched.\n\n## Proactive Memory (`proactive.rs`)\n\n`ProactiveMemoryStore` implements the `ProactiveMemory` trait from `librefang-types`, providing a unified mem0-style API:\n\n- **`auto_memorize`** ŌĆö Extracts memory fragments from conversation text using configurable extractors (regex-based by default). Stores unique fragments, detects conflicts, and extracts knowledge-graph relations.\n- **`search` / `search_all`** ŌĆö Recall with optional namespace guards and PII redaction.\n- **`add` / `add_with_decision`** ŌĆö Direct memory insertion with optional conflict resolution.\n- **`update`** ŌĆö Edit an existing memory's content.\n- **`history`** ŌĆö Retrieve memory content by ID.\n- **`stats`** ŌĆö Return `MemoryStats` (total count, per-scope counts).\n- **`consolidate`** ŌĆö Delegate to `ConsolidationEngine`.\n- **`cleanup_expired_sessions`** ŌĆö Prune stale session memories.\n\n## Schema and Migrations (`migration.rs`)\n\nThe database schema is at version 31. `run_migrations(conn)` applies each missing step in order, each wrapped in its own transaction. Key tables:\n\n| Table | Purpose |\n|---|---|\n| `memories` | Semantic memories with embeddings, scope, confidence, metadata, multimodal fields |\n| `entities` | Knowledge graph entities (typed, with properties, agent-scoped) |\n| `relations` | Knowledge graph relations (typed, with confidence, agent-scoped) |\n| `kv_store` | Per-agent key-value pairs |\n| `sessions` | Session history with peer isolation |\n| `usage_events` | Token/cost metering per agent, model, provider |\n| `prompt_versions` | Prompt versioning and A/B testing |\n| `audit_entries` | Merkle-chain audit trail |\n| `migrations` | Applied migration audit log |\n\nThe migration system enforces forward-only upgradesŌĆöif the database schema version is newer than the binary supports, it refuses to run. Each migration records an audit row in the `migrations` table, and on boot the system verifies that `user_version` matches the audit row count, auto-healing any drift from prior bugs.\n\n## Access Control (`namespace_acl.rs`)\n\n`MemoryNamespaceGuard` wraps read/write operations with prefix-based filtering. On reads, results pass through `redact_all`, which applies PII redaction (SSN, phone numbers, etc.) via the `redact_pii_in_text` function from `librefang-types`.\n\nThe guard enforces that:\n- Agents can only read/write keys matching their allowed namespace prefixes.\n- Delete operations require an explicit `allow_delete` flag.\n\n## Usage Tracking (`usage.rs`)\n\nRecords token usage and costs in `usage_events` with per-agent, per-model, and per-provider granularity. Query functions support hourly, daily, and monthly rollups, as well as user-level and global budget checks. The kernel's metering module calls these to enforce spending caps.\n\n## Memory Provider Plugin System (`provider.rs`)\n\n`MemoryProvider` trait and `MemoryManager` allow plugging in alternative memory backends. `NullMemoryProvider` is a no-op implementation useful for testing or disabled-memory configurations.\n\n## Integration Points\n\nThe memory system connects to the rest of LibreFang through:\n\n- **API routes** (`src/routes/memory.rs`) ŌåÆ `ProactiveMemoryStore` for search, list, add operations.\n- **Kernel metering** (`librefang-kernel-metering`) ŌåÆ `usage` module for quota enforcement and budget status.\n- **Runtime compactor** (`librefang-runtime`) ŌåÆ `Session` for context compression and compaction.\n- **Budget routes** (`src/routes/budget.rs`) ŌåÆ `usage` queries for agent and user budget details.","migration":"# Migration\n\n# Migration Module (`librefang-migrate`)\n\n## Overview\n\nThe migration engine imports agents, memory, sessions, skills, and channel configurations from other agent frameworks into LibreFang's native format. It currently supports two source frameworksŌĆö**OpenClaw** (including legacy YAML installs) and **OpenFang** (a community fork sharing the same format)ŌĆöwith stubs for LangChain and AutoGPT.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"CLI<br/>cmd_migrate\"]\n    TUI[\"TUI Init Wizard\"]\n    API[\"HTTP API<br/>/config/migrate\"]\n    \n    CLI --> run_migration\n    TUI --> run_migration\n    API --> run_migration\n    \n    detect[\"detect_openclaw_home\"]\n    scan[\"scan_openclaw_workspace\"]\n    \n    CLI --> detect\n    CLI --> scan\n    TUI --> detect\n    TUI --> scan\n    API --> detect\n    API --> scan\n\n    run_migration -->|\"OpenClaw\"| oc_migrate[\"openclaw::migrate\"]\n    run_migration -->|\"OpenFang\"| of_migrate[\"openfang::migrate\"]\n    \n    oc_migrate --> staging[\"Staging dir\"]\n    staging -->|\"success\"| promote[\"promote_staging ŌåÆ target\"]\n    staging -->|\"failure\"| left[\"Left for inspection\"]\n```\n\n## Entry Points\n\n### `run_migration(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>`\n\nTop-level dispatch in `lib.rs`. Routes to the appropriate sub-module based on `MigrateOptions.source`. Returns a `MigrationReport` listing every imported item, skipped feature, and warning.\n\n### `openclaw::detect_openclaw_home() -> Option<PathBuf>`\n\nAuto-detects an existing OpenClaw installation by checking:
