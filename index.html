- `skill_evolve_rollback`\n- `skill_evolve_write_file`\n- `skill_evolve_remove_file`\n\nThis works because the kernel's tool-filtering Step 1 treats these names as `default_available`, bypassing the `capabilities.tools` allowlist check.\n\n## Test Execution Model\n\n```mermaid\ngraph TD\n    A[\"Unit tests<br/>(pure functions, no kernel)\"] --> B[\"cargo test\"]\n    C[\"Integration tests<br/>(kernel boot with tempdir)\"] --> B\n    D[\"Async tests<br/>(tokio multi_thread)\"] --> B\n    C --> E[\"tempfile::tempdir()\"]\n    E --> F[\"Isolated home_dir\"]\n    F --> G[\"KernelConfig::default()\"]\n    G --> H[\"LibreFangKernel::boot_with_config()\"]\n    H --> I[\"kernel.shutdown()\"]\n```\n\nMost integration tests follow a pattern:\n\n1. Create a temporary directory via `tempfile::tempdir()`.\n2. Construct a `KernelConfig` with isolated `home_dir` and `data_dir`.\n3. Boot the kernel with `LibreFangKernel::boot_with_config(config)`.\n4. Perform assertions against the kernel's registry, skill registry, or other subsystems.\n5. Call `kernel.shutdown()` to clean up background tasks.\n\nAsync tests use `#[tokio::test(flavor = \"multi_thread\")]` to support the kernel's internal tokio runtime.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and end-to-end tests for the `librefang-kernel` crate. These tests exercise the kernel's major subsystems — agent spawning, hand lifecycle, WASM execution, workflow pipelines, and LLM-backed conversations — through the public API surface.\n\n## Overview\n\nThe test suite is organized into five files, each targeting a distinct kernel capability:\n\n| File | Scope | Requires LLM? |\n|---|---|---|\n| `integration_test.rs` | Basic boot → spawn → message pipeline | Yes (Groq) |\n| `multi_agent_test.rs` | Hand lifecycle, agent registry, state persistence | Mostly no |\n| `wasm_agent_integration_test.rs` | WASM module loading, fuel limits, host calls | No |\n| `workflow_integration_test.rs` | Multi-step workflow registration and execution | Partial |\n| `purge_sentinels_test.rs` | `purge_sentinels` CLI binary | No |\n\nTests that require a live LLM (via Groq API) guard themselves with a `GROQ_API_KEY` environment variable check and gracefully skip when absent. All other tests run offline.\n\n## Running the Tests\n\n```bash\n# Offline tests only (no API key needed)\ncargo test -p librefang-kernel\n\n# Include live LLM integration tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel -- --nocapture\n\n# Run a specific test file\ncargo test -p librefang-kernel --test multi_agent_test\n\n# Run the WASM tests (uses multi_thread flavor)\ncargo test -p librefang-kernel --test wasm_agent_integration_test\n```\n\nThe `--nocapture` flag is recommended for integration tests so you can see agent responses and token usage printed to stdout.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Test Files\n        IT[integration_test.rs]\n        MA[multi_agent_test.rs]\n        WA[wasm_agent_integration_test.rs]\n        WF[workflow_integration_test.rs]\n        PS[purge_sentinels_test.rs]\n    end\n\n    subgraph Kernel API\n        KB[LibreFangKernel::boot_with_config]\n        SA[spawn_agent]\n        SM[send_message]\n        AH[activate_hand / deactivate_hand]\n        RW[register_workflow / run_workflow]\n        RT[register_trigger / list_triggers]\n    end\n\n    IT --> KB --> SA --> SM\n    MA --> KB --> AH\n    WA --> KB --> SA --> SM\n    WF --> KB --> SA\n    WF --> RW\n    WF --> RT\n    PS -->|subprocess| BIN[purge_sentinels binary]\n```\n\n## Common Patterns\n\n### Kernel Configuration\n\nEvery test creates an isolated `KernelConfig` pointing at a temporary directory. This prevents tests from interfering with each other or with real user data:\n\n```rust\nfn test_config(name: &str) -> KernelConfig {\n    let tmp = std::env::temp_dir().join(format!(\"librefang-hand-test-{name}\"));\n    let _ = std::fs::remove_dir_all(&tmp);\n    std::fs::create_dir_all(&tmp).unwrap();\n\n    KernelConfig {\n        home_dir: tmp.clone(),\n        data_dir: tmp.join(\"data\"),\n        default_model: DefaultModelConfig {\n            provider: \"groq\".to_string(),\n            model: \"llama-3.3-70b-versatile\".to_string(),\n            api_key_env: \"GROQ_API_KEY\".to_string(),\n            // ...\n        },\n        ..KernelConfig::default()\n    }\n}\n```\n\nKey points:\n- Each test uses a unique subdirectory name to avoid collisions when tests run in parallel.\n- The directory is wiped and recreated at the start of each test.\n- `DefaultModelConfig` is configured even for non-LLM tests because the kernel requires it at boot.\n\n### Agent Manifest via TOML\n\nTests define agents using inline TOML strings parsed into `AgentManifest`:\n\n```rust\nlet manifest: AgentManifest = toml::from_str(r#\"\n    name = \"test-agent\"\n    version = \"0.1.0\"\n    module = \"builtin:chat\"\n\n    [model]\n    provider = \"groq\"\n    model = \"llama-3.3-70b-versatile\"\n    system_prompt = \"You are a test agent.\"\n\n    [capabilities]\n    tools = [\"file_read\"]\n    memory_read = [\"*\"]\n    memory_write = [\"self.*\"]\n\"#).unwrap();\n```\n\nThe `module` field determines the agent backend:\n- `\"builtin:chat\"` — standard LLM chat agent\n- `\"wasm:<filename>\"` — WASM module agent (see `wasm_agent_integration_test.rs`)\n\n### Hand Installation\n\nHand-based tests install hand definitions from TOML content using a helper:\n\n```rust\nfn install_hand(kernel: &LibreFangKernel, toml_content: &str) {\n    kernel\n        .hands()\n        .install_from_content(toml_content, \"\")\n        .unwrap_or_else(|e| panic!(\"Failed to install hand: {e}\"));\n}\n```\n\nThree hand fixtures are defined as constants (`HAND_A`, `HAND_B`, `HAND_C`) covering single-agent hands, multi-agent hands with explicit coordinators, and varying tool configurations.\n\n### LLM Guard Pattern\n\nTests that call live LLMs follow a consistent skip pattern:\n\n```rust\nif std::env::var(\"GROQ_API_KEY\").is_err() {\n    eprintln!(\"GROQ_API_KEY not set, skipping integration test\");\n    return;\n}\n```\n\nThis prints a message and returns early rather than panicking, so `cargo test` succeeds even without API access.\n\n## Test Coverage by File\n\n### integration_test.rs\n\nTwo tests validating the core message pipeline:\n\n- **`test_full_pipeline_with_groq`** — Boots the kernel, spawns a single agent with a Groq model, sends a message, asserts the response is non-empty and token usage is recorded, then kills the agent and shuts down.\n- **`test_multiple_agents_different_models`** — Spawns two agents with different Groq models (llama-3.3-70b-versatile and llama-3.1-8b-instant), sends messages to both, verifies independent responses.\n\nThese tests confirm that the kernel can manage multiple concurrent LLM sessions through different model configurations.\n\n### multi_agent_test.rs\n\nThe largest test file, covering the hand subsystem comprehensively:\n\n**Lifecycle:**\n- `test_activate_hand_spawns_agent` — Activation creates agents in the registry.\n- `test_deactivate_kills_agent` — Deactivation removes agents from the registry.\n- `test_pause_and_resume_hand` — Pause keeps agents alive; status transitions correctly.\n- `test_hand_instance_status_active_on_creation` — New instances start as `Active`.\n\n**Deterministic IDs:**\n- `test_deterministic_agent_id` — Agent IDs derive from hand ID + role via `AgentId::from_hand_agent`.\n- `test_deterministic_id_stable_across_reactivation` — Single-instance reactivation preserves the same agent ID (legacy format).\n- `test_agent_id_from_hand_id_is_deterministic` — Pure unit test for `AgentId::from_hand_id`.\n\n**Coordinator routing:**\n- `test_explicit_coordinator_role_used_for_routes` — When a hand declares a non-`main` coordinator, `agent_id()` and `agent_name()` resolve to that role.\n\n**Metadata and tooling:**\n- `test_agent_tagged_with_hand_metadata` — Agents receive `hand:<id>` and `hand_instance:<uuid>` tags.\n- `test_hand_tools_applied_to_agent` — Hand-level `tools` list propagates to the agent manifest capabilities.\n- `test_system_prompt_preserved` — The hand's `system_prompt` appears in the spawned agent's manifest.\n- `test_default_provider_resolved_to_kernel_default` — `provider = \"default\"` is resolved to the actual provider from `KernelConfig`.\n\n**State persistence:**\n- `test_hand_state_persistence` — After activation, `hand_state.json` exists with v4 format, including typed fields (`instance_id`, `status`, `activated_at`, `updated_at`) and the `agent_ids` map.\n- `test_multi_agent_hand_state_persists_coordinator_role` — The `coordinator_role` field is persisted for multi-agent hands.\n\n**Coexistence and isolation:**\n- `test_multiple_hands_coexist` — Two hands activated simultaneously have distinct agent IDs.\n- `test_deactivate_one_hand_preserves_other` — Deactivating one hand doesn't affect the other's agents.\n- `test_find_instance_by_agent_id` — `hands().find_by_agent()` looks up instances from agent IDs.\n\n**Error cases:**\n- `test_activate_nonexistent_hand_fails`\n- `test_deactivate_nonexistent_instance_fails`\n- `test_pause_nonexistent_instance_fails`\n- `test_resume_nonexistent_instance_fails`\n\n**Trigger migration:**\n- `test_reactivation_restores_triggers_to_original_roles` — Verifies that triggers registered on a specific agent role stay attached to that role after deactivation/reactivation, rather than migrating to the coordinator.\n\n**Live LLM:**\n- `test_six_agent_fleet` — Spawns 6 agents (coder, researcher, writer, ops, analyst, hello-world) with different models and tool sets, sends each a message, and reports aggregate token usage.\n\n### wasm_agent_integration_test.rs\n\nTests WASM agent execution without any LLM dependency. Uses WAT (WebAssembly Text format) modules written inline as string constants:\n\n| Constant | Behavior |\n|---|---|\n| `ECHO_WAT` | Returns input JSON as-is (kernel extracts response) |\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` |\n| `INFINITE_LOOP_WAT` | Infinite `br` loop — tests fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\nAll WASM tests use `#[tokio::test(flavor = \"multi_thread\")]` because WASM execution requires a multi-threaded runtime.\n\n**Test cases:**\n- `test_wasm_agent_hello_response` — Fixed-response module returns expected string.\n- `test_wasm_agent_echo` — Echo module includes the input message in its output.\n- `test_wasm_agent_fuel_exhaustion` — Infinite loop module fails with a fuel-related error.\n- `test_wasm_agent_missing_module` — Referencing a nonexistent `.wasm` file produces a clear \"Failed to read\" error.\n- `test_wasm_agent_host_call_time` — Tests the host call import mechanism end-to-end.\n- `test_wasm_agent_streaming_fallback` — `send_message_streaming` on a WASM agent produces at least `TextDelta` + `ContentComplete` events, then resolves to the same response as non-streaming.\n- `test_multiple_wasm_agents` — Two WASM agents execute independently; registry count reflects both plus the default assistant.\n- `test_mixed_wasm_and_llm_agents` — WASM and LLM agents coexist in the same kernel. Killing the WASM agent leaves the LLM agent intact.\n\n### workflow_integration_test.rs\n\nTests the workflow engine at two levels:\n\n**Kernel wiring (no LLM):**\n- `test_workflow_register_and_resolve` — Creates a 2-step `Workflow` with agents referenced by name via `StepAgent::ByName`. Verifies the workflow is registered, agents are resolvable via `agent_registry().find_by_name()`, and a `WorkflowRun` can be created with input.\n- `test_workflow_agent_by_id` — Uses `StepAgent::ById` to reference an agent directly by its string ID.\n- `test_trigger_registration_with_kernel` — Registers `TriggerPattern::Lifecycle` and `TriggerPattern::SystemKeyword` triggers on an agent, verifies listing and removal.\n\n**Full E2E with Groq:**\n- `test_workflow_e2e_with_groq` — Spawns two agents (analyst, writer), creates a 2-step sequential pipeline, runs it with real LLM calls. Asserts:\n  - Workflow completes successfully.\n  - Both steps have non-zero token usage.\n  - `step_results` records each step's name in order.\n  - `WorkflowRunState::Completed` is set on the run.\n  - `list_runs()` returns the run.\n\nThe workflow uses `{{input}}` template variables in `prompt_template` fields. Output variable binding (`output_var`) is tested in the registration test but not in the live E2E test.\n\n### purge_sentinels_test.rs\n\nTests the `purge_sentinels` CLI binary as a subprocess. This is the only test file that drives an external binary rather than calling the kernel API directly.\n\nThe binary reference uses Cargo's built-in binary discovery:\n```rust\nconst BIN: &str = env!(\"CARGO_BIN_EXE_purge_sentinels\");\n```\n\n**Fixture setup** creates a temp directory with four test files:\n- `a.md` — Contains whole-line sentinels (`NO_REPLY`, `[no reply needed]`) plus real text.\n- `b.md` — Contains `NO_REPLY` embedded mid-sentence (should NOT be removed).\n- `c.md` — Clean file with no sentinels.\n- `nested/d.md` — Lowercase `no_reply` with surrounding whitespace.\n\n**Test cases:**\n- `dry_run_reports_counts_and_touches_nothing` — `--dry-run` reports `removed=3` but leaves all files unchanged and creates no `.bak` files.\n- `apply_creates_backup_and_rewrites` — `--apply` creates `.bak` files with original content, removes whole-line sentinels, preserves mid-sentence sentinels, leaves clean files untouched, and handles nested directories.\n- `apply_is_idempotent` — A second `--apply` run reports `removed=0` and leaves files/backups unchanged.\n- `apply_aborts_when_existing_bak_differs` — If a stale `.bak` exists with different content, the tool exits non-zero with a \"backup mismatch\" error and preserves the stale backup.\n- `nonexistent_path_exits_non_zero` — Invalid paths produce a clear error message.\n\n## Contributing New Tests\n\nWhen adding integration tests:\n\n1. **Isolate state** — Always create a unique temp directory via `test_config(\"descriptive-name\")`. Never share state between tests.\n2. **Guard LLM tests** — Wrap any test calling `send_message` against a real provider with the `GROQ_API_KEY` check and early return.\n3. **Use `multi_thread` for WASM** — Any test exercising WASM agents needs `#[tokio::test(flavor = \"multi_thread\")]`.\n4. **Clean up** — Call `kernel.shutdown()` at the end of every test to release resources. Kill spawned agents if the test doesn't deactivate hands.\n5. **Prefer TOML manifests** — Define agent configurations as inline TOML strings parsed with `toml::from_str` rather than constructing `AgentManifest` structs manually. This mirrors real usage and catches serialization issues.\n6. **Assert meaningfully** — Beyond \"is not empty,\" assert on specific field values, token counts, status strings, and error messages to catch regressions.","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nThe central orchestrator for the LibreFang Agent OS. This crate wires together all subsystems—routing, metering, memory, skills, hands, extensions, and LLM drivers—into a cohesive runtime that drives agent behavior.\n\n## Role in the System\n\nThe kernel sits at the top of the dependency graph. It does not implement low-level logic itself; instead it initializes, configures, and coordinates the crates that do:\n\n| Subsystem | Crate | Purpose |\n|---|---|---|\n| Types | `librefang-types` | Shared domain types used across all crates |\n| Memory | `librefang-memory` | Conversation history, working memory, state persistence |\n| Routing | `librefang-kernel-router` | Message/request routing between components |\n| Metering | `librefang-kernel-metering` | Usage tracking, rate limiting, quota enforcement |\n| Runtime | `librefang-runtime` | Async task execution and lifecycle management |\n| Skills | `librefang-skills` | Agent capability definitions and dispatch |\n| Hands | `librefang-hands` | Tool-use / action execution layer |\n| Extensions | `librefang-extensions` | Plugin/extension loading and management |\n| LLM Driver | `librefang-llm-driver` | LLM provider abstraction and inference calls |\n| Wire Protocol | `librefang-wire` | Serialization format for inter-service communication |\n| Channels | `librefang-channels` | Async message channels (feature-gated, no default features) |\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --> R[librefang-kernel-router]\n    K --> M[librefang-kernel-metering]\n    K --> MEM[librefang-memory]\n    K --> RT[librefang-runtime]\n    K --> SK[librefang-skills]\n    K --> H[librefang-hands]\n    K --> E[librefang-extensions]\n    K --> LLM[librefang-llm-driver]\n    K --> W[librefang-wire]\n    K --> C[librefang-channels]\n```\n\n## Key Capabilities\n\n### Concurrency Model\n\nThe kernel relies on Tokio for async execution and supplements it with:\n\n- **`dashmap`** — concurrent hash maps for shared mutable state without global locks\n- **`arc-swap`** — lock-free atomic swapping of shared configuration or state snapshots\n- **`crossbeam`** — multi-producer/multi-consumer channels for inter-task messaging\n\n### Persistence\n\nSQLite via `rusqlite` provides local durable storage. This backs metering data, conversation history, and agent state that must survive restarts.\n\n### Security\n\nSeveral dependencies indicate security-sensitive operations:\n\n- **`totp-rs`** — TOTP-based two-factor authentication\n- **`subtle`** — constant-time comparisons for secret verification\n- **`zeroize`** — secure clearing of sensitive data from memory\n- **`rand`** / **`hex`** — cryptographic random generation and hex encoding\n\n### Scheduling\n\nThe `cron` crate enables cron-expression-based task scheduling, used for periodic maintenance, metering rollups, or timed skill execution. Timezone-aware scheduling is supported through `chrono` and `chrono-tz`.\n\n### Configuration Loading\n\nThe kernel loads configuration from multiple formats—**TOML**, **YAML**, and **JSON**—via `toml`, `serde_yaml`, and `serde_json` respectively. The `dirs` crate resolves platform-specific configuration paths.\n\n### HTTP Communication\n\n`reqwest` provides outbound HTTP capability, used by the LLM driver for API calls and potentially by extensions for webhook integrations.\n\n## Binaries\n\n### `purge_sentinels`\n\nLocated at `bin/purge_sentinels.rs`. A maintenance utility that cleans up stale sentinel records. Sentinels are likely watchdog or lock markers used to coordinate running agents; this binary removes ones left behind by crashed or terminated processes.\n\nRun directly:\n\n```bash\ncargo run --bin purge_sentinels\n```\n\n## Platform Notes\n\nOn Unix targets, `libc` is linked directly (`cfg(unix)` conditional dependency). This is typically used for low-level process signals, file descriptor management, or daemonization behavior not exposed through higher-level Rust crates.\n\n## Adding a New Subsystem\n\nWhen integrating a new crate into the kernel:\n\n1. Add the dependency in `Cargo.toml`.\n2. Initialize the subsystem during kernel startup, receiving shared state (database handle, channel senders, configuration) as constructor arguments.\n3. Register any routes with `librefang-kernel-router` if the subsystem handles incoming messages.\n4. Register metering hooks with `librefang-kernel-metering` if the subsystem consumes billable resources.\n5. Ensure sensitive data uses `zeroize::Zeroize` on drop where appropriate.","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nTrait definitions and shared types for LLM (Large Language Model) integration within LibreFang.\n\n## Purpose\n\nThis crate provides the abstraction layer between LibreFang's core logic and any specific LLM backend. It defines a common driver trait that concrete implementations must satisfy, along with the request/response types and error definitions those implementations share.\n\nBy keeping the driver contract in its own crate, the rest of the codebase depends only on this abstraction—not on any particular LLM provider. Concrete drivers (e.g., OpenAI, local models) can then be swapped or added without modifying downstream consumers.\n\n## Architectural Role\n\n```\n┌─────────────────────┐       ┌──────────────────────┐       ┌─────────────────────┐\n│  LibreFang consumers │──────▶│ librefang-llm-driver │◀──────│  Concrete drivers   │\n│  (analysis, chat,    │  uses │  (trait + types)      │ impls │  (OpenAI, local, …) │\n│   moderation, etc.)  │  trait│                      │ trait │                     │\n└─────────────────────┘       └──────────────────────┘       └─────────────────────┘\n```\n\nThis is a pure interface module. It contains no business logic and no network calls—only the shapes that other crates agree on.\n\n## Dependencies\n\n| Crate | Reason |\n|---|---|\n| `librefang-types` | Domain types (game identifiers, player data, etc.) that appear in LLM prompts or responses |\n| `async-trait` | Enables async methods in the driver trait, since LLM calls are inherently I/O-bound |\n| `serde` / `serde_json` | Serialization of requests to and deserialization of responses from LLM backends |\n| `thiserror` | Derive `Error` for the crate's error enum |\n| `tokio` | Async runtime support |\n\n## Key Components\n\n### Driver Trait\n\nThe central export is an async trait that concrete LLM backends implement. Each method represents a distinct category of LLM interaction used by LibreFang. Because the trait is async, every consuming call site must be within a Tokio runtime context.\n\nImplementors handle all provider-specific concerns—authentication, HTTP clients, retries, rate limiting—internally. Callers see only the trait methods and the shared request/response types.\n\n### Shared Types\n\nRequest and response structs that are generic across all LLM providers. These are typically serde-serializable and may include:\n\n- Prompt or message containers\n- Configuration knobs (temperature, max tokens, model selection)\n- Structured response types that downstream code pattern-matches on\n\n### Error Type\n\nA unified error enum (derived via `thiserror`) representing failure modes common to any LLM backend—network errors, rate limiting, invalid responses, deserialization failures, and similar. Each concrete driver maps its provider-specific errors into this common type so that consumers handle a single error surface.\n\n## Usage from Other Crates\n\nConsumer crates depend on `librefang-llm-driver` and accept the driver trait as a parameter (typically via dependency injection). They never reference a concrete driver directly:\n\n```rust\n// In a consumer crate\nuse librefang_llm_driver::LlmDriver;\n\nasync fn analyze_submission(driver: &dyn LlmDriver, context: &GameContext) -> Result<Analysis, LlmError> {\n    let request = AnalysisRequest::new(context);\n    driver.analyze(request).await\n}\n```\n\nConcrete driver crates also depend on this module and provide an `impl LlmDriver for ProviderClient`.\n\n## Adding a New LLM Backend\n\n1. Create a new crate (e.g., `librefang-llm-openai`).\n2. Depend on `librefang-llm-driver`.\n3. Implement the driver trait for your provider's client struct.\n4. Map all provider-specific errors into the shared `LlmError` enum.\n5. Register the driver in the application's service wiring.\n\nBecause the trait and types live here, the new driver crate needs no knowledge of LibreFang's core domain—only of the driver contract defined in this module.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait for Anthropic, OpenAI, Google Gemini, and other LLM backends.\n\n## Purpose\n\nThis crate provides the actual HTTP integrations with large language model APIs. Each provider gets its own driver that knows how to format requests, handle authentication, parse responses, and manage streaming — all behind a unified interface defined in `librefang-llm-driver`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Consumer Code] --> B[librefang-llm-driver<br/>trait definition]\n    B --> C[librefang-llm-drivers<br/>concrete implementations]\n    C --> D[Anthropic Driver]\n    C --> E[OpenAI Driver]\n    C --> F[Gemini Driver]\n    C --> G[Other Providers]\n    C --> H[librefang-http<br/>HTTP client layer]\n    D --- I[librefang-runtime-oauth<br/>OAuth token management]\n    F --- I\n```\n\nThe crate follows a provider-plugin model: callers depend on the abstract trait from `librefang-llm-driver` and instantiate whichever concrete driver they need from this crate.\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-llm-driver` | Defines the trait interface (`LlmDriver` or similar) that each provider implements |\n| `librefang-types` | Shared domain types — messages, tool calls, completion responses, etc. |\n| `librefang-http` | HTTP client abstraction layer, shared across the project |\n| `librefang-runtime-oauth` | OAuth 2.0 token acquisition and refresh, used by providers that require it (Google, Azure) |\n| `reqwest` | Underlying HTTP client for making API calls to provider endpoints |\n| `tokio` / `tokio-stream` / `futures` | Async runtime and stream processing for SSE-based streaming completions |\n| `serde` / `serde_json` | Request serialization and response deserialization for each provider's JSON schema |\n| `sha2` / `hmac` / `hex` | HMAC-SHA256 request signing for providers that use sigv4-style auth (AWS Bedrock) |\n| `base64` | Encoding binary content in multimodal messages |\n| `dashmap` | Concurrent hashmap for thread-safe state such as active stream tracking or request deduplication |\n| `zeroize` | Secure clearing of secrets (API keys, tokens) from memory |\n| `regex-lite` | Lightweight regex for response post-processing or content extraction |\n| `url` | URL construction and validation for provider endpoints |\n| `chrono` / `uuid` | Timestamps and correlation IDs for request tracing |\n\n## Provider Driver Pattern\n\nEach driver is expected to follow the same general structure:\n\n1. **Configuration struct** — Holds provider-specific settings: base URL, API key or credential reference, model name, timeout values, etc.\n\n2. **Request building** — Translates the generic request types from `librefang-types` into the provider's wire format. This includes message formatting, tool/function definition serialization, and any provider-specific parameters.\n\n3. **Authentication** — Applies the appropriate auth method:\n   - **Bearer token** (Anthropic, OpenAI): Header injection via `x-api-key` or `Authorization`.\n   - **OAuth 2.0** (Gemini, Azure): Token acquisition and refresh through `librefang-runtime-oauth`.\n   - **HMAC signing** (AWS Bedrock): Request signing using `sha2`/`hmac` with the provider's signing algorithm.\n\n4. **Response parsing** — Deserializes the provider's JSON response into the shared `librefang-types` response types, normalizing differences between provider schemas.\n\n5. **Streaming** — For streaming completions, processes server-sent events (SSE) via `tokio-stream`, yielding partial results as they arrive.\n\n## Implementing a New Provider\n\nTo add support for a new LLM provider:\n\n1. Create a new module within this crate (e.g., `src/newprovider.rs`).\n2. Define a configuration struct holding the provider's required settings.\n3. Implement the trait from `librefang-llm-driver`, covering:\n   - Non-streaming completion requests\n   - Streaming completion requests (if supported)\n   - Tool/function call handling\n   - Error mapping from provider-specific errors to the shared error type\n4. Add serialization types matching the provider's request/response JSON schemas.\n5. Register the module in `src/lib.rs` (or the appropriate mod declaration).\n\n### Authentication Checklist\n\n- If the provider uses static API keys: inject them as headers in the request builder.\n- If the provider uses OAuth: integrate with `librefang-runtime-oauth` for token management.\n- If the provider uses request signing: implement the signing logic using `hmac` and `sha2`, and call `zeroize::Zeroize` on key material after use.\n\n## Connection to the Wider Codebase\n\n```\nlibrefang-types ← librefang-llm-driver ← librefang-llm-drivers\n                                            ↕\n                                     librefang-http\n                                     librefang-runtime-oauth\n```\n\n- **Upstream**: Consumer crates depend on `librefang-llm-driver` for the trait and inject a concrete driver from this crate at runtime.\n- **Side dependencies**: HTTP communication goes through `librefang-http`, and OAuth flows go through `librefang-runtime-oauth`.\n- **Shared types**: All message, completion, and error types come from `librefang-types`, keeping drivers decoupled from application logic.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory/tests — Canonical Chat-Scoped Integration Tests\n\n## Purpose\n\nThis directory contains an integration regression test that guards against a cross-session data-leak bug in canonical context storage. Before the fix in `session.rs`, every WhatsApp DM and group chat sharing the same `AgentId` could see each other's message history injected into the LLM prompt — a private DM could surface group messages and vice versa.\n\nThe test exercises the full **append → load → context** roundtrip through the crate's public API (`SessionStore`), mirroring the actual call path the kernel uses on every inbound message.\n\n## The Bug It Prevents\n\n`CanonicalEntry` rows were keyed only by `AgentId`. When the kernel loaded context for an LLM prompt, it pulled every canonical entry for that agent regardless of which chat session produced it. The fix added a `SessionId` tag to each entry and introduced filtering at read time in `canonical_context`.\n\n## Test Infrastructure\n\n### `setup()`\n\nCreates a fresh, isolated test environment:\n\n```\nin-memory SQLite → run_migrations → SessionStore(Arc<Mutex<Connection>>)\n```\n\nEach test gets its own database, so tests are independent and parallelizable.\n\n### `user_msg(text)`\n\nHelper that constructs a `Message` with `Role::User`, text content, and `pinned: false`. Keeps test assertions readable.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\nThe primary regression test. It verifies that two distinct chat sessions derived for the same agent produce isolated context windows.\n\n**Setup:**\n\n- One `AgentId`.\n- Two `SessionId`s derived via `SessionId::for_channel`:\n  - `session_dm` — from a WhatsApp DM address (`…@s.whatsapp.net`)\n  - `session_group` — from a WhatsApp group address (`…@g.us`)\n\n**Flow:**\n\n1. Assert the two sessions are not equal (different channels must produce different sessions).\n2. Append three messages in interleaved order: `dm-1`, `group-1`, `dm-2`.\n3. Load context filtered by `session_dm` → verify only `[\"dm-1\", \"dm-2\"]`.\n4. Load context filtered by `session_group` → verify only `[\"group-1\"]`.\n\nIf this test fails, the session-scoping filter in `canonical_context` is broken and cross-chat leakage is happening.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\nEnsures that callers passing `session_id = None` to `canonical_context` still receive all entries across every session. This preserves the original pre-fix semantics for code paths that haven't adopted per-session filtering.\n\n**Flow:**\n\n1. Append one message each to two different sessions (WhatsApp and Telegram channels).\n2. Call `canonical_context(agent, None, None)`.\n3. Assert both messages are returned.\n\n## Relationships to Production Code\n\n```mermaid\ngraph TD\n    T[canonical_chat_scoped_integration.rs] -->|setup| M[run_migrations]\n    T -->|append_canonical| S[SessionStore]\n    T -->|canonical_context| S\n    T -->|for_channel| SID[SessionId]\n    S -->|reads/writes| DB[(SQLite)]\n```\n\nThe test calls into three production modules:\n\n| Production module | Functions used | Role in test |\n|---|---|---|\n| `librefang_memory::migration` | `run_migrations` | Schema setup |\n| `librefang_memory::session` | `SessionStore::new`, `append_canonical`, `canonical_context` | Core API under test |\n| `librefang_types::agent` | `AgentId::new`, `SessionId::for_channel` | Identity derivation |\n\n## Running\n\n```sh\n# Run just these integration tests\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# Run with trace output to see SQL statements\nRUST_LOG=librefang_memory=trace cargo test -p librefang-memory --test canonical_chat_scoped_integration -- --nocapture\n```\n\n## When to Extend\n\nAdd a new test here when:\n\n- Changing how `SessionId` is derived from channel addresses (add a derivation-correctness test).\n- Modifying the `canonical_context` filtering logic or its `session_id` parameter semantics.\n- Introducing new backward-compatibility or migration paths for untagged canonical entries.\n- Adding support for a new channel type whose address format could collide with existing ones.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Purpose\n\nThis crate provides the persistence and state management layer for LibreFang agents. It abstracts how memories are stored, retrieved, and organized—serving as the \"brain\" that outlives any single request or session. Agents rely on this substrate to maintain context, recall past interactions, and make decisions based on accumulated knowledge.\n\n## Role in the System\n\n`librefang-memory` sits between the agent logic and raw storage. Higher-level modules (agents, skills, orchestration) depend on this crate to read and write state without needing to know whether data lives in SQLite, a remote service, or a combination of both.\n\n```mermaid\ngraph TD\n    A[Agent Logic] --> B[librefang-memory]\n    B --> C[SQLite - Local Store]\n    B --> D[Remote Services - reqwest]\n    E[librefang-types] --> B\n```\n\n## Key Dependencies and Their Roles\n\n| Dependency | Purpose |\n|---|---|\n| **rusqlite** | Primary embedded database for durable local storage of memories, state, and metadata. |\n| **serde** / **serde_json** / **rmp-serde** | Serialization framework. JSON for interoperability and debugging; MessagePack (`rmp-serde`) for compact binary representation of memory entries. |\n| **tokio** | Async runtime. All storage operations are non-blocking to avoid stalling the agent event loop. |\n| **sha2** | Content hashing. Used for integrity checks, deduplication, and content-addressed storage of memory entries. |\n| **reqwest** | HTTP client. Enables syncing memories with remote backends or fetching external data to hydrate local state. |\n| **uuid** | Unique identifiers for memory entries, sessions, and correlation tokens. |\n| **chrono** | Timestamps for memory creation, access, and expiration. |\n| **librefang-types** | Shared type definitions—memory entry structs, error types, and configuration models that this crate consumes. |\n| **tracing** | Structured logging for observability into storage operations, cache hits/misses, and sync events. |\n| **thiserror** | Ergonomic error type definitions for storage failures, serialization errors, and connectivity issues. |\n| **async-trait** | Trait definitions for async storage backends, allowing pluggable implementations (local, remote, composite). |\n\n## Architecture\n\n### Storage Backend Abstraction\n\nThe crate defines async traits for memory backends, enabling the system to swap or compose storage strategies:\n\n- **Local backend** — SQLite-backed storage for fast, durable, on-disk persistence.\n- **Remote backend** — HTTP-based synchronization with external memory services via `reqwest`.\n- **Composite backend** — Layered caching that keeps hot data local while delegating long-term storage remotely.\n\n### Memory Model\n\nMemories are content-addressed using SHA-256 hashes, which supports:\n\n- **Deduplication** — Identical entries are stored once.\n- **Integrity verification** — Corrupted or tampered entries are detected on read.\n- **Efficient lookups** — Hash-based retrieval without full scans.\n\n### Serialization Strategy\n\nTwo formats are supported depending on the context:\n\n- **MessagePack** (`rmp-serde`) — Used for on-disk storage and inter-process communication where compactness matters.\n- **JSON** (`serde_json`) — Used for debugging, human inspection, and API boundaries where readability is preferred.\n\nThe format is selected per-operation, not per-backend, allowing flexibility.\n\n## Error Handling\n\nAll errors are captured through types derived via `thiserror`, covering:\n\n- Database errors from `rusqlite` operations.\n- Serialization/deserialization failures.\n- Network errors from remote sync attempts.\n- Integrity validation failures (hash mismatches).\n\nCallers receive structured error types rather than raw exception strings, enabling meaningful retry logic and user-facing diagnostics.\n\n## Testing\n\nDev dependencies include:\n\n- **tokio-test** — For writing async tests that exercise storage operations under realistic runtime conditions.\n- **tempfile** — For creating isolated temporary databases during tests, ensuring no cross-test contamination and no leftover artifacts.\n\nTests typically spin up a fresh SQLite instance in a temp directory, perform memory operations, and assert on state—keeping tests deterministic and self-contained.\n\n## Integration Points\n\nThis crate is consumed by:\n\n- **Agent runtimes** — Reading context and writing new memories after each interaction.\n- **Skill modules** — Storing and retrieving skill-specific state.\n- **Orchestration layer** — Persisting workflow state across async boundaries.\n\nIt depends on `librefang-types` for shared data structures, ensuring consistency across all crates in the workspace.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations and agent definitions from other agent frameworks into LibreFang's internal format.\n\n## Purpose\n\nThis module provides tooling to convert projects authored in other agent frameworks (e.g., Mythic, Covenant, Havoc, or similar C2/agent platforms) into LibreFang-compatible agent and module definitions. It handles parsing of foreign configuration files in multiple formats, normalizes their structure against `librefang-types`, and writes out valid LibreFang configuration.\n\n## Supported Input Formats\n\nThe engine can ingest configurations stored in:\n\n| Format | Crate |\n|--------|-------|\n| JSON | `serde_json` |\n| YAML | `serde_yaml` |\n| JSON5 | `json5` |\n| TOML | `toml` |\n\nThis covers the majority of configuration conventions used by existing agent frameworks.\n\n## Key Dependencies\n\n- **`librefang-types`** — Canonical type definitions for agents, modules, commands, and configuration. All migration output is validated against these types.\n- **`walkdir`** — Recursive directory traversal for scanning imported project trees.\n- **`thiserror`** — Typed error definitions for migration failures.\n- **`tracing`** — Structured logging throughout the migration pipeline.\n- **`chrono` / `uuid`** — Timestamping and identity generation for migrated entities.\n- **`dirs`** — Resolution of standard platform directories for default output paths.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Foreign Config Files] -->|json/yaml/toml/json5| B[Parser Layer]\n    B --> C[Intermediate Representation]\n    C -->|Map to librefang-types| D[Type Normalizer]\n    D --> E[LibreFang Config Output]\n\n    subgraph librefang-migrate\n        B\n        C\n        D\n    end\n\n    subgraph librefang-types\n        E\n    end\n```\n\nThe pipeline operates in three stages:\n\n1. **Discovery & Parsing** — `walkdir` scans a source directory. Each file is dispatched to the appropriate parser based on extension or content sniffing, producing a raw `serde_json::Value`.\n2. **Intermediate Representation** — Raw values are deserialized into framework-specific intermediate structs that model the original schema. This isolates the rest of the pipeline from quirks of individual foreign formats.\n3. **Normalization** — Intermediate structs are mapped onto `librefang-types` definitions (agents, modules, commands, etc.). Fields that have no direct equivalent are logged as warnings via `tracing`.\n\n## Error Handling\n\nAll migration errors are captured through a single `thiserror`-derived enum. Expected error variants include:\n\n- **Parse errors** — Malformed or unreadable source files.\n- **Schema mismatch** — A foreign config doesn't match any known framework schema.\n- **Validation errors** — The normalized output fails constraints defined in `librefang-types`.\n- **I/O errors** — Filesystem failures during discovery or output.\n\nEach error carries context (file path, field name, etc.) and is emitted through `tracing` for observability.\n\n## Testing\n\nTests use `tempfile` to create isolated directory trees that simulate foreign project structures. This allows validation of discovery, parsing, and normalization without touching the real filesystem.\n\n## Relationship to the Workspace\n\n`librefang-migrate` is a utility crate within the LibreFang workspace. It depends on `librefang-types` for its output contract but is not depended upon by any other workspace crate. It is intended to be invoked as a standalone tool or through a CLI integration point, not as a runtime dependency of the agent itself.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This module provides the integration layer that allows the LibreFang runtime to communicate with MCP-compatible tool servers, enabling dynamic tool discovery, invocation, and resource management.\n\n## Purpose\n\nThe Model Context Protocol (MCP) standardizes how AI runtimes interact with external tools and data sources. This module implements the client side of that protocol, allowing the LibreFang runtime to:\n\n- Discover available tools exposed by MCP servers\n- Invoke tools with structured parameters\n- Manage tool lifecycle and connection state\n- Handle authentication and transport security\n\n## Dependencies & What They Indicate\n\nThe dependency profile reveals the module's operational character:\n\n| Dependency | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation — handles message framing, negotiation, and the protocol state machine |\n| `librefang-types` | Shared type definitions across the LibreFang ecosystem (tool schemas, error types, etc.) |\n| `librefang-http` | HTTP transport layer, used for streamable HTTP-based MCP server connections |\n| `reqwest` | Low-level HTTP client backing the transport |\n| `tokio` | Async runtime for concurrent tool invocations and connection management |\n| `serde` / `serde_json` | Serialization of MCP messages, tool parameters, and response payloads |\n| `http` | HTTP type primitives (headers, status codes, method types) |\n| `async-trait` | Async trait definitions for transport abstraction and handler interfaces |\n| `base64` / `sha2` | Likely used for authentication tokens, challenge-response flows, or payload integrity verification |\n| `url` | MCP server endpoint parsing and validation |\n| `rand` | Nonce generation, session identifiers, or other cryptographic randomness needs |\n| `tracing` | Structured logging and diagnostic spans for connection lifecycle events |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Runtime] -->|tool requests| B[librefang-runtime-mcp]\n    B -->|MCP protocol| C[rmcp]\n    C -->|HTTP transport| D[librefang-http / reqwest]\n    D -->|network| E[MCP Tool Servers]\n    B -->|shared types| F[librefang-types]\n```\n\nThe module sits between the core LibreFang runtime and external MCP servers. It translates internal tool invocation requests into MCP protocol messages, sends them over HTTP, and returns structured results back to the runtime.\n\n## Integration Points\n\n### Upstream\n\nThe runtime core calls into this module when it needs to interact with an MCP server — for example, to enumerate available tools or execute a specific tool call during fang execution.\n\n### Downstream\n\nThis module depends on:\n- **`librefang-types`** for domain types that cross module boundaries\n- **`librefang-http`** for HTTP transport infrastructure, avoiding duplication of connection pooling, TLS configuration, and error handling\n\n### External\n\nCommunication with MCP servers happens over HTTP, using the protocol defined by the MCP specification. The `rmcp` crate handles protocol-level concerns while `reqwest` (via `librefang-http`) handles the actual network I/O.\n\n## Key Design Decisions\n\n**Transport abstraction via `async-trait`**: The module defines async trait interfaces for transports, allowing the MCP protocol to potentially run over different transports in the future (stdio, WebSocket, etc.), though currently only HTTP is supported.\n\n**Cryptographic utilities (`sha2`, `base64`, `rand`)**: The presence of these dependencies suggests the module handles some form of authentication or message integrity, which is common when connecting to remote tool servers that require verified identities or signed requests.\n\n**Structured logging with `tracing`**: Connection events, tool invocations, and errors are instrumented with structured spans, making it possible to trace a single tool invocation from request through response in production logs.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth authentication flows for LibreFang runtime drivers. This crate implements the OAuth 2.0 flows required to authenticate with AI service providers—specifically ChatGPT (OpenAI) and GitHub Copilot—so that runtime drivers can obtain and refresh access tokens.\n\n## Purpose\n\nLibreFang drivers interact with third-party AI APIs that require user authentication. This crate encapsulates the full OAuth lifecycle so that individual driver implementations don't need to duplicate auth logic. It handles:\n\n- Generating PKCE code verifiers and challenges\n- Managing authorization state parameters\n- Token exchange after user consent\n- Secure storage and rotation of tokens in memory\n- Automatic token refresh before expiry\n\n## Dependencies\n\nThe crate relies on two sibling crates for core types and HTTP transport:\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared data types (credentials, token representations) |\n| `librefang-http` | HTTP client construction and request execution |\n\nExternal dependencies of note:\n\n- **sha2, base64, hex, rand** — PKCE challenge generation and random state tokens\n- **zeroize** — Secure clearing of sensitive values (secrets, tokens) from memory\n- **reqwest** — Underlying HTTP client used for token endpoint calls\n- **serde / serde_json** — Serialization of token responses and auth parameters\n- **tracing** — Structured logging of auth flow progress (no sensitive data logged)\n\n## OAuth Flow Architecture\n\n```mermaid\nflowchart TD\n    A[Driver requests auth] --> B[Generate PKCE verifier + state]\n    B --> C[Build authorization URL]\n    C --> D[User grants consent in browser]\n    D --> E[Callback with auth code]\n    E --> F[Exchange code for tokens]\n    F --> G{Token valid?}\n    G -- Yes --> H[Return access token]\n    G -- Expired --> I[Refresh token flow]\n    I --> H\n    H --> J[Driver makes API calls]\n```\n\n## Key Concepts\n\n### PKCE (Proof Key for Code Exchange)\n\nAll flows use PKCE to protect against authorization code interception attacks. The crate generates a cryptographically random code verifier, derives the SHA-256 challenge, and includes both in the appropriate steps. The `sha2` and `base64` dependencies handle this derivation.\n\n### Secure Memory Handling\n\nAccess tokens, refresh tokens, and intermediate secrets are held in types that implement `Zeroize`. When these values go out of scope, their memory is overwritten, reducing the window for credential extraction.\n\n### Token Refresh\n\nThe crate tracks token expiry and can transparently refresh access tokens using stored refresh credentials. Callers should attempt a request and, if the token is expired, invoke the refresh path rather than re-running the full authorization flow.\n\n## Integration with LibreFang\n\nThis crate is consumed by runtime drivers (e.g., a ChatGPT driver or a GitHub Copilot driver). The typical integration pattern:\n\n1. The driver calls into this crate to start an OAuth flow for a specific provider.\n2. This crate returns an authorization URL and opens or returns it for the user.\n3. After the user authenticates, the driver receives a callback with an authorization code.\n4. The driver passes the code back to this crate, which exchanges it for tokens.\n5. The driver stores the resulting credential and uses it for subsequent API requests via `librefang-http`.\n\nBecause the call graph shows no outgoing calls to other LibreFang crates at the module level, this crate is entirely self-contained in its logic—it produces tokens and credentials that callers then feed into other parts of the system.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover common OAuth failure modes:\n\n- Network failures during token exchange\n- Invalid or expired authorization codes\n- Malformed responses from the provider's token endpoint\n- Missing or invalid configuration (client ID, redirect URI)\n\nAll errors are structured so callers can distinguish between retryable conditions (network issues, temporary provider errors) and permanent failures (invalid credentials, user denial).\n\n## Logging\n\nThe crate uses `tracing` spans to log the progression of OAuth flows. Logs include:\n\n- Flow initiation and provider identification\n- PKCE challenge generation (the challenge itself, never the verifier)\n- Token exchange initiation and completion status\n- Refresh attempts and outcomes\n\nNo secrets, authorization codes, or tokens are ever written to logs.\n\n## Configuration\n\nCallers provide provider-specific configuration (client ID, redirect URI, token endpoint URLs, scopes) which this crate uses to construct the appropriate requests. Configuration is expected to come from `librefang-types` or the driver's own settings, not hardcoded within this crate.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests — MCP OAuth Integration Tests\n\n## Purpose\n\nThis test module validates the MCP (Model Context Protocol) OAuth subsystem end-to-end: metadata discovery, provider wiring into the connection layer, token lifecycle management, and auth-state serialization. Several tests are explicit regression guards against bugs that previously broke the OAuth flow silently.\n\n## Scope\n\nThe module lives in `librefang-runtime/tests/mcp_oauth_integration.rs` and exercises two public API surfaces:\n\n| Surface | Crate path | What's tested |\n|---|---|---|\n| OAuth discovery & types | `librefang_runtime::mcp_oauth::*` | `discover_oauth_metadata`, `McpAuthState`, `OAuthTokens` |\n| MCP connection wiring | `librefang_runtime::mcp::{McpConnection, McpServerConfig, McpTransport}` | Provider invocation on 401 |\n\nExternal config type `librefang_types::config::McpOAuthConfig` is consumed but not defined here.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Tests\n        A[Discovery Tests]\n        B[Wiring Regression Test]\n        C[Token Lifecycle Tests]\n        D[Auth State Tests]\n    end\n\n    subgraph Production APIs\n        E[discover_oauth_metadata]\n        F[McpConnection::connect]\n        G[McpOAuthProvider trait]\n        H[McpAuthState enum]\n    end\n\n    subgraph Test Doubles\n        I[TrackingOAuthProvider]\n        J[InMemoryOAuthProvider]\n    end\n\n    A --> E\n    B --> F\n    I -- implements --> G\n    J -- implements --> G\n    C --> J\n    D --> H\n```\n\n## Test Doubles\n\nThe module defines two mock `McpOAuthProvider` implementations to avoid vault/external dependencies.\n\n### `TrackingOAuthProvider`\n\nRecords whether `load_token` was invoked (via `AtomicBool`). Returns `None` for `load_token` so that the connection proceeds to fail — the test only cares that the provider was *called*, not that it produced a token. Used exclusively by the wiring regression test.\n\n### `InMemoryOAuthProvider`\n\nStores `OAuthTokens` in a `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`. Fully functional store/load/clear semantics scoped per server URL. Used by all token lifecycle tests.\n\n## Test Reference\n\n### OAuth Metadata Discovery\n\n#### `test_discover_fallback_to_config`\n\nWhen `discover_oauth_metadata` cannot reach the server's well-known endpoint (e.g. the host is nonexistent), it must fall back to values supplied in `McpOAuthConfig`. Verifies that the returned metadata's `authorization_endpoint`, `token_endpoint`, and `client_id` match the config.\n\n#### `test_discover_fails_without_any_source`\n\nWhen no server is reachable *and* no `McpOAuthConfig` is provided, `discover_oauth_metadata` must return an error containing `\"OAuth metadata\"`.\n\n### Provider Wiring\n\n#### `test_http_connect_calls_oauth_provider_load_token`  *(regression)*\n\n**Catches:** The bug where `oauth_provider: None` was passed in the kernel's `connect_mcp_servers`, silently disabling OAuth for all HTTP MCP servers.\n\nConnects to `http://127.0.0.1:1/nonexistent-mcp` (port 1 — guaranteed unreachable) with a `TrackingOAuthProvider` attached. The connection is expected to fail, but `load_token` **must** have been called. If it wasn't, the provider was dropped or never wired in.\n\n### Token Lifecycle\n\nAll use `InMemoryOAuthProvider`.\n\n| Test | Flow | Asserts |\n|---|---|---|\n| `test_provider_store_then_load` | store → load | Returns the stored access token; initially `None` |\n| `test_provider_clear_removes_token` | store → clear → load | Token absent after clear |\n| `test_provider_clear_is_isolated` | store A + store B → clear A → load B | Clearing A does not affect B |\n| `test_provider_reauthorize_after_clear` | store v1 → clear → store v2 → load | Returns v2, proving clear doesn't corrupt state |\n\n### Auth State Serialization\n\n#### `test_auth_state_lifecycle` *(regression)*\n\n**Catches:** The bug where revoking a token removed the `McpAuthState` entirely, causing the dashboard to lose the \"Authorize\" button.\n\nValidates the round-trip: `NeedsAuth` → `PendingAuth` (with `auth_url`) → `Authorized` → `NeedsAuth` (after revoke). Each intermediate state is serialized to JSON and checked for the correct `\"state\"` discriminator.\n\n#### `test_needs_auth_serializes_differently_from_pending_auth` *(regression)*\n\n**Catches:** The bug where the dashboard showed \"Authorizing…\" at boot before the user clicked Authorize.\n\nAsserts that `McpAuthState::NeedsAuth` serializes to `{\"state\": \"needs_auth\"}` and `McpAuthState::PendingAuth` serializes to `{\"state\": \"pending_auth\"}` — distinct values, so the frontend can render them differently.\n\n## Running\n\n```sh\n# All integration tests in this module\ncargo test -p librefang-runtime --test mcp_oauth_integration\n\n# A single test\ncargo test -p librefang-runtime --test mcp_oauth_integration test_auth_state_lifecycle\n```\n\nAll tests are `#[tokio::test]` async except the two serialization tests, which are synchronous `#[test]`. No external services or network access are required — discovery tests hit intentionally nonexistent hosts to trigger fallback/error paths, and the wiring test targets `127.0.0.1:1`.","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime.\n\n## Purpose\n\nThis crate provides a **sandboxed WebAssembly execution environment** for running LibreFang skills. By executing skills as compiled WASM modules inside a wasmtime sandbox, the runtime gains:\n\n- **Isolation** — skills cannot directly access the host filesystem, network, or memory outside their linear memory\n- **Determinism** — skill behavior is bounded by the capabilities explicitly granted through the host interface\n- **Portability** — skills can be authored in any language that compiles to WASM (Rust, C, AssemblyScript, etc.)\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[librefang-kernel] -->|\"dispatches skill\"| B[librefang-runtime-wasm]\n    B -->|\"loads & runs\"| C[WASM Skill Module]\n    C -->|\"host calls\"| B\n    B -->|\"kernel API\"| D[librefang-kernel-handle]\n    B -->|\"HTTP requests\"| E[librefang-http]\n    B -->|\"shared types\"| F[librefang-types]\n```\n\nThe runtime sits between the LibreFang kernel and individual skill modules. When the kernel needs to execute a skill, it delegates to this crate, which:\n\n1. Instantiates a wasmtime engine configured with appropriate limits\n2. Loads the skill's WASM module\n3. Injects host functions (via `librefang-kernel-handle`) that the skill can call to interact with the game world\n4. Executes the skill's entry point\n5. Returns results back to the kernel\n\n## Dependencies\n\n| Dependency | Role in this crate |\n|---|---|\n| `wasmtime` | Core WASM runtime — engine, store, module instantiation, and invocation |\n| `librefang-kernel-handle` | Provides the typed handle that WASM host functions use to communicate back to the kernel |\n| `librefang-http` | Enables HTTP fetch capabilities exposed to skills (if permitted by the sandbox policy) |\n| `librefang-types` | Shared domain types passed between host and guest (serialized via JSON) |\n| `serde` / `serde_json` | Serialization boundary between host Rust types and WASM linear memory |\n| `tokio` | Async runtime — WASM instantiation and host calls are async |\n| `tracing` | Structured logging for sandbox lifecycle events |\n| `thiserror` / `anyhow` | Error types for sandbox setup failures and runtime errors |\n| `reqwest` | HTTP client backing `librefang-http` |\n\n## Key Concepts\n\n### Serialization Boundary\n\nSkills run in WASM linear memory, which is fundamentally `&[u8]`. All structured data crossing the host/guest boundary is serialized to JSON using `serde_json`. Skills receive arguments as JSON byte buffers and return results the same way. This keeps the host interface simple and language-agnostic.\n\n### Async Execution\n\nSkill execution is fully async via `tokio` and wasmtime's async support. Host functions imported by the skill (e.g., querying game state, making HTTP requests) are async and yield back to the tokio runtime when awaiting I/O.\n\n### Capability-Based Security\n\nSkills can only perform actions that the host explicitly exposes. The host function surface defined in this crate determines what a skill can do. Skills that attempt to import functions not provided by the host will fail to instantiate.\n\n## Integration Points\n\nThis crate is consumed by the kernel at the **runtime layer**. The kernel selects this WASM runtime when it needs to run a skill that has been compiled to a `.wasm` binary. The crate is decoupled from the kernel through `librefang-kernel-handle`, which defines the interface the sandbox uses to talk back to the game engine.\n\n## Current Status\n\nThe module is in early stages — the dependency declarations and crate metadata are in place, but no execution flows or call graphs have been wired yet. The core sandbox infrastructure (engine configuration, module loading, host function registration, and invocation) is the expected next milestone.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate orchestrates the full lifecycle of an agent — from initialization through LLM interaction, tool/skill invocation, memory management, and secure sandboxing of untrusted code.\n\n## Architecture\n\nThe runtime sits at the center of the agent stack, pulling in specialized subsystems as dependencies and coordinating them into a coherent execution loop.\n\n```mermaid\ngraph TD\n    RT[librefang-runtime] --> LLM[LLM Drivers]\n    RT --> WASM[WASM Runtime]\n    RT --> MCP[MCP Protocol]\n    RT --> OAUTH[OAuth Handler]\n    RT --> MEM[Memory Store]\n    RT --> SKILLS[Skills Registry]\n    RT --> CH[Channels]\n    RT --> KH[Kernel Handle]\n    RT --> SANDBOX[Sandboxing]\n    SANDBOX -.->|optional| LL[Landlock]\n    SANDBOX -.->|optional| SC[seccomp]\n```\n\n## Key Responsibilities\n\n- **Agent lifecycle management** — initializing, running, and tearing down agent sessions\n- **LLM orchestration** — selecting and driving LLM backends via `librefang-llm-driver` / `librefang-llm-drivers`\n- **Tool and skill dispatch** — routing LLM tool calls to registered skills through `librefang-skills`\n- **Sandboxed code execution** — running untrusted WASM modules via `wasmtime` (through `librefang-runtime-wasm`)\n- **MCP integration** — exposing/connecting to Model Context Protocol servers via `rmcp` and `librefang-runtime-mcp`\n- **Secure storage** — persisting agent state and conversation history using `librefang-memory` (backed by SQLite via `rusqlite`)\n- **Channel-based communication** — message passing with the outside world through `librefang-channels`\n- **OAuth flows** — authenticating against external services via `librefang-runtime-oauth`\n\n## Optional Features\n\n| Feature | Dependency | Description |\n|---|---|---|\n| `landlock-sandbox` | `landlock` | Linux Landlock LSM sandboxing for filesystem and IPC access control |\n| `seccomp-sandbox` | `seccompiler` | seccomp-bpf syscall filtering to restrict the agent's kernel interface |\n| `wasm-hooks` | — | Enables WASM-based hook points in the agent execution cycle |\n\nBoth sandboxing features are Linux-only and can be combined for layered isolation.\n\n## Notable Dependencies\n\n### Cryptography and Identity\n- `ed25519-dalek` — Ed25519 signing/verification for agent identity and message authentication\n- `sha2`, `hmac` — HMAC-SHA256 and general hashing for integrity checks and token derivation\n- `zeroize` — secure clearing of sensitive key material from memory\n\n### Networking\n- `reqwest` — outbound HTTP with TLS (`rustls`)\n- `tokio-tungstenite` — WebSocket client for streaming LLM responses and MCP connections\n- `rustls`, `webpki-roots`, `rustls-native-certs` — TLS stack with both bundled and system certificate roots\n\n### Concurrency\n- `dashmap` — lock-free concurrent hashmap for shared runtime state\n- `tokio-stream`, `futures` — async stream processing for LLM token streams and event pipelines\n\n### Utilities\n- `ureq` — synchronous HTTP client (used for non-async contexts such as WASM fetch operations)\n- `flate2`, `tar` — archive extraction, likely for skill/package bundles\n- `shlex` — shell-style string parsing for command construction\n- `base64`, `hex` — encoding utilities\n\n## Relationship to Other Crates\n\nThis crate is a **composition root**. It does not define the core abstractions — those live in their respective crates. Instead, it wires them together:\n\n- `librefang-types` provides shared data structures passed between all layers\n- `librefang-http` handles low-level HTTP concerns\n- `librefang-kernel-handle` abstracts OS-level operations the agent may need\n- The `librefang-runtime-*` sub-crates isolate individual subsystems (MCP, OAuth, WASM) so they can be developed and tested independently","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer.\n\n## Purpose\n\nThis module manages the full lifecycle of **skills** in LibreFang: discovery on disk, loading into memory, version resolution, marketplace publishing/downloading, and compatibility with the OpenClaw skill format. It acts as the bridge between skill authors (who package `.zip` archives with manifests) and the runtime that executes them.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Local Loader]\n    A --> C[Marketplace Client]\n    D[OpenClaw Adapter] --> A\n    B --> E[Filesystem Storage]\n    C --> F[Remote Marketplace API]\n    B --> G[Skill Instances]\n    C --> G\n```\n\nThe four subsystems interact as follows:\n\n| Subsystem | Responsibility |\n|---|---|\n| **Registry** | Central index of all known skills, their versions, and metadata. Handles queries, deduplication, and conflict resolution. |\n| **Local Loader** | Scans configured directories, parses manifests (`toml`/`yaml`/`json`), extracts `.zip` packages, and validates integrity via SHA-256 hashes. |\n| **Marketplace Client** | Connects to a remote skill marketplace over HTTPS, handles search, download, and publishing. Manages TLS via `rustls` with both `webpki-roots` and `rustls-native-certs` for broad certificate trust. |\n| **OpenClaw Adapter** | Translates OpenClaw-format skill packages into LibreFang's internal representation, enabling use of the existing OpenClaw skill ecosystem. |\n\n## Key Dependencies and Their Roles\n\n### Filesystem and Discovery\n\n- **`walkdir`** — Recursively walks skill directories to discover installed packages.\n- **`dirs`** — Resolves platform-standard paths (`~/.local/share/librefang/skills`, etc.) for default skill storage locations.\n- **`zip`** — Extracts `.zip`-packaged skills into the local store.\n- **`fs2`** — File locking on the skill store directory to prevent corruption during concurrent installs or updates.\n\n### Parsing and Serialization\n\n- **`serde`**, **`serde_json`**, **`toml`**, **`serde_yaml`** — Skill manifests can be authored in TOML, YAML, or JSON. All three formats are parsed into a common `serde`-derived structure (defined in `librefang-types`).\n\n### Networking and Security\n\n- **`reqwest`** + **`rustls`** + **`webpki-roots`** + **`rustls-native-certs`** — HTTPS client for marketplace operations. Uses `rustls` (not native TLS) for a consistent, auditable TLS stack. Supports both bundled Mozilla roots and the system's native certificate store.\n- **`sha2`** + **`hex`** — SHA-256 digest computation for skill package integrity verification on download and install.\n\n### Versioning and Identity\n\n- **`semver`** — Semantic version parsing and comparison for skill version constraints and dependency resolution.\n- **`uuid`** — Unique skill identifiers, assigned on first registration or sourced from manifests.\n- **`chrono`** — Timestamps for install dates, last-updated checks, and marketplace metadata.\n\n### Lookup\n\n- **`aho-corasick`** — Fast multi-pattern string matching used for skill name/tag lookups against the registry index, allowing efficient batch queries.\n\n### Error Handling and Observability\n\n- **`thiserror`** — Derives structured error types for loader failures, registry conflicts, marketplace errors, and format-mismatch issues.\n- **`tracing`** — Instrumentation throughout all subsystems for diagnostic logging.\n\n## Integration with LibreFang\n\nThis module depends on **`librefang-types`** for shared data structures — primarily the `Skill` type, `SkillManifest`, and related enums. Other LibreFang modules consume this crate's public API to:\n\n1. **Query available skills** before launching a session.\n2. **Install or update skills** from the marketplace.\n3. **Load skill definitions** at runtime for execution or validation.\n\n## Testing\n\nThe crate uses `tempfile` and `tokio-test` in its dev-dependencies, indicating that tests create temporary directory trees to exercise the loader and registry in isolation, and use `tokio-test` for async runtime support in marketplace client tests.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis crate provides the observability layer for LibreFang. It wraps the `metrics` facade and exposes helpers for recording, labeling, and exporting application telemetry — primarily targeting Prometheus-compatible scraping.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `metrics` | The underlying metrics facade. Provides the `counter!`, `gauge!`, `histogram!`, and related macros used throughout the codebase. |\n| `librefang-types` | Shared domain types. Metrics labels and values are derived from these types (e.g., event variants, connection states) so instrumentation stays consistent with the rest of the codebase. |\n| `tokio-test` *(dev)* | Used only in tests for async runtime support. |\n\n## How It Fits In\n\n`librefang-telemetry` is a **leaf library crate** — it has no outgoing calls to other LibreFang crates and nothing in the workspace calls into it directly at compile time (modules use the `metrics` macros instead). Its role is:\n\n1. **Initializing** the metrics exporter/pipeline at application startup.\n2. **Defining helper functions or constants** for metric names, labels, and default dimensions so they aren't scattered across the codebase.\n3. **Optionally re-exporting** the `metrics` macros so downstream crates only need one dependency.\n\nOther crates in the workspace emit metrics via the `metrics` facade macros. At runtime, whatever exporter this crate configures receives those emissions.\n\n## Usage\n\nAdd to your crate's `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-telemetry = { path = \"../librefang-telemetry\" }\n```\n\nInitialize early in your application's `main` or `tokio::main`, before spawning any workers that would emit metrics:\n\n```rust\nlibrefang_telemetry::init();\n```\n\nFrom that point on, any `metrics::counter!()`, `metrics::histogram!()`, or `metrics::gauge!()` call anywhere in the process is captured by the configured exporter.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[librefang-telemetry] -->|configures exporter| B[metrics facade]\n    C[librefang-types] -->|provides domain types| A\n    D[other workspace crates] -->|emits via macros| B\n    B -->|scraped by| E[Prometheus]\n```\n\nThe crate sits between the shared type definitions and the runtime metrics pipeline. Other crates remain decoupled from the telemetry implementation — they only depend on the `metrics` macros, while this crate owns the plumbing.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure providing mock implementations and route-level test utilities for the Librefang system.\n\n## Overview\n\nThis crate centralizes all test-only code so that downstream crates (and integration tests) can share consistent fakes, mocks, and helpers instead of each rolling their own. It is never compiled into production binaries — it exists purely as a `dev-dependency` or test-time companion.\n\nThree broad categories of support are offered:\n\n| Category | What it provides |\n|---|---|\n| **Mock kernel** | A lightweight, in-process stand-in for the real kernel that mirrors its trait surface without touching hardware or real subsystems. |\n| **Mock LLM driver** | A deterministic fake for the LLM backend that returns canned (or programmable) responses, enabling repeatable tests of prompt pipelines and skill execution. |\n| **API route test utilities** | Helpers that construct an `axum` test server with the full middleware stack (including telemetry) and expose ergonomic request builders for endpoint tests. |\n\n## Relationship to other crates\n\n```mermaid\ngraph BT\n    T[librefang-testing] --> TYPES[librefang-types]\n    T --> KERNEL[librefang-kernel]\n    T --> RUNTIME[librefang-runtime]\n    T --> MEMORY[librefang-memory]\n    T --> API[librefang-api]\n    T --> WIRE[librefang-wire]\n    T --> CH[librefang-channels]\n    T --> SK[librefang-skills]\n    T --> H[librefang-hands]\n    T --> EXT[librefang-extensions]\n\n    style T fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nThe crate depends on nearly every sibling crate so it can:\n\n1. Implement the same traits defined in `librefang-kernel`, `librefang-runtime`, etc.\n2. Construct realistic API routers via `librefang-api` (with the `telemetry` feature enabled).\n3. Wire up channels, skills, hands, and extensions against the mocks to exercise integration paths end-to-end.\n\n## Key components\n\n### Mock Kernel\n\nA test-double implementing the kernel trait(s) from `librefang-kernel`. It holds state in plain `DashMap`/`HashMap` collections rather than real hardware registers or shared memory, making assertions on observed state straightforward.\n\nTypical uses:\n\n- Verifying that a skill or hand correctly invokes kernel operations.\n- Simulating error conditions by programming the mock to return specific errors.\n\n### Mock LLM Driver\n\nA deterministic replacement for the production LLM driver. Supports:\n\n- **Fixed responses** — always return a pre-configured `String` or structured output.\n- **Programmable responses** — callers can push a queue of responses that are consumed in order, enabling multi-turn test scenarios.\n- **Inspection** — records every prompt received so tests can assert on prompt content, order, and frequency.\n\nThis is built against the types in `librefang-types` and the driver trait expected by `librefang-runtime`.\n\n### API Route Test Utilities\n\nWraps `axum::Router` construction from `librefang-api` and layers on `tower` middleware to replicate the production request pipeline. Each test gets its own router backed by mock services, avoiding shared mutable state between test cases.\n\nConvenience functions handle:\n\n- Spinning up a test server with `tower::ServiceExt`.\n- Serializing request bodies with `serde_json`.\n- Reading and deserializing response bodies via `http_body_util`.\n- Managing temporary directories (`tempfile`) when tests need isolated filesystem state.\n\n## Usage patterns\n\n### Adding to your crate\n\n```toml\n# In your crate's Cargo.toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\n### Testing an API route\n\n```rust\nuse librefang_testing::api::TestRouter;\n\n#[tokio::test]\nasync fn create_session_returns_201() {\n    let router = TestRouter::new(/* mock kernel, mock llm */).await;\n    let response = router\n        .post(\"/api/sessions\")\n        .json(&serde_json::json!({ \"name\": \"test-session\" }))\n        .send()\n        .await;\n\n    assert_eq!(response.status(), 201);\n}\n```\n\n### Asserting on LLM interactions\n\n```rust\nuse librefang_testing::llm::MockLlmDriver;\n\n#[tokio::test]\nasync fn skill_sends_correct_prompt() {\n    let mut llm = MockLlmDriver::new();\n    llm.push_response(\"expected output\".to_string());\n\n    // ... exercise the skill with llm injected ...\n\n    let prompts = llm.drain_prompts();\n    assert_eq!(prompts.len(), 1);\n    assert!(prompts[0].contains(\"key phrase\"));\n}\n```\n\n## Design notes\n\n- **No production code path.** This crate should never appear in a non-`dev-dependency` slot. Its symbols are compiled away from release builds.\n- **Deterministic by default.** The mocks intentionally avoid `tokio::time::sleep`, random values, or network calls. When non-determinism is needed (e.g., UUID generation), prefer injecting a fixed seed or known value via the mock's configuration.\n- **Isolation via `tempfile`.** Tests that touch the filesystem use the `tempfile` crate to create scoped temporary directories that are cleaned up on drop, preventing test pollution.\n- **Telemetry-inclusive API tests.** The `librefang-api` dependency is pulled in with `features = [\"telemetry\"]` and `default-features = false`, ensuring route tests observe the same middleware ordering and header injection as production without pulling in unnecessary default features.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types-locales\n\nLocalized API error message strings for the LibreFang platform, using the [Fluent](https://projectfluent.org/) (`.ftl`) translation format.\n\n## Purpose\n\nThis module holds all user-facing error messages returned by the LibreFang API. Each language gets its own directory under `locales/`, containing an `errors.ftl` file with translated strings. The Fluent format supports positional variables (`{ $reason }`, `{ $error }`, etc.) so that dynamic context is preserved across translations.\n\nThe rest of the codebase references these message keys (e.g. `api-error-agent-not-found`) via a Fluent-compatible localization library. At runtime, the caller selects the active locale and resolves the key to produce a localized error string.\n\n## Directory Layout\n\n```\nlocales/\n├── de/errors.ftl       # German\n├── en/errors.ftl       # English  (canonical / most complete)\n├── es/errors.ftl       # Spanish\n├── fr/errors.ftl       # French\n├── ja/errors.ftl       # Japanese\n└── zh-CN/errors.ftl    # Simplified Chinese\n```\n\n## Locale Coverage\n\n| Locale  | Language         | Completeness |\n|---------|-----------------|--------------|\n| `en`    | English          | Full (all keys) |\n| `ja`    | Japanese         | Full (all keys) |\n| `de`    | German           | Partial (core keys only) |\n| `es`    | Spanish          | Partial (core keys only) |\n| `fr`    | French           | Partial (core keys only) |\n| `zh-CN` | Simplified Chinese | Partial (core keys only) |\n\nThe English file is the authoritative source of truth. All other locales should eventually mirror its full key set.\n\n## Key Naming Convention\n\nEvery key follows the pattern:\n\n```\napi-error-<domain>-<specific>\n```\n\n- **`api-error-`** — fixed prefix identifying these as API error messages.\n- **`<domain>`** — the subsystem or resource type (e.g. `agent`, `session`, `webhook`).\n- **`<specific>`** — a short description of the error condition.\n\n### Domains Covered\n\n| Domain | Examples |\n|--------|---------|\n| `agent` | `not-found`, `spawn-failed`, `already-exists`, `execution-failed` |\n| `message` | `too-large`, `delivery-failed`, `required` |\n| `template` | `invalid-name`, `not-found`, `parse-failed` |\n| `manifest` | `too-large`, `invalid-format`, `signature-mismatch` |\n| `auth` | `invalid-key`, `missing-header`, `missing` |\n| `session` | `load-failed`, `not-found`, `invalid-id` |\n| `workflow` | `missing-steps`, `execution-failed`, `not-found` |\n| `trigger` | `missing-agent-id`, `invalid-pattern`, `registration-failed` |\n| `budget` | `invalid-amount`, `update-failed` |\n| `config` | `parse-failed`, `write-failed`, `save-failed` |\n| `profile` | `not-found` |\n| `cron` | `invalid-id`, `not-found`, `create-failed`, `invalid-expression` |\n| `goal` | `not-found`, `missing-title`, `circular-parent`, `save-failed` |\n| `memory` | `not-enabled`, `not-found`, `operation-failed`, `export-failed` |\n| `network` | `not-enabled`, `peer-not-found`, `connection-failed`, `auth-failed` |\n| `plugin` | `missing-name`, `missing-path`, `invalid-source` |\n| `channel` | `unknown`, `missing-agent-id`, `invalid-from` |\n| `provider` | `missing-alias`, `alias-exists`, `model-not-found`, `key-not-configured` |\n| `skill` | `missing-name`, `invalid-name`, `install-failed` |\n| `hand` | `not-found`, `definition-not-found` |\n| `mcp` | `missing-name`, `missing-transport`, `invalid-config` |\n| `integration` / `extension` | `not-found`, `missing-id` |\n| `system` | `cli-not-found` |\n| `kv` | `missing-fields`, `missing-value`, `array-empty` |\n| `approval` | `invalid-id`, `not-found` |\n| `webhook` | `not-enabled`, `invalid-id`, `missing-url`, `url-unreachable` |\n| `backup` | `not-found`, `invalid-filename`, `missing-manifest` |\n| `schedule` | `not-found`, `invalid-cron`, `save-failed` |\n| `j
