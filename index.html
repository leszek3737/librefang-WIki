ob` | `invalid-id`, `not-found`, `not-retryable` |\n| `task` | `not-found`, `disappeared` |\n| `pairing` | `not-enabled`, `invalid-token` |\n| `binding` | `out-of-range` |\n| `command` | `not-found` |\n| `file` | `not-found`, `too-large`, `path-traversal`, `unsupported-type` |\n| `tool` | `provide-allowlist` |\n| `validation` | `content-empty`, `name-empty`, `title-required` |\n| *(general)* | `not-found`, `internal`, `bad-request`, `rate-limited` |\n\n## Fluent Variable Interpolation\n\nMany messages include runtime parameters using Fluent's `{ $variable }` syntax:\n\n```ftl\napi-error-message-delivery-failed = Message delivery failed: { $reason }\napi-error-template-not-found = Template '{ $name }' not found\napi-error-agent-not-found-with-id = Agent not found: { $id }\napi-error-network-auth-failed = Authentication failed (HTTP { $status })\napi-error-cron-create-failed = Failed to create cron job: { $error }\n```\n\nWhen adding a new key that accepts parameters, ensure the same parameter names are used across all locale files for that key.\n\n## Adding a New Error Key\n\n1. **Add the key to `en/errors.ftl`** under the appropriate domain section. If no section exists, create one with a `# <Domain> errors` comment header.\n\n2. **Copy the key to every other locale's `errors.ftl`**, translating the message text. Keep the same variable names.\n\n3. **For incomplete locales** (de, es, fr, zh-CN), you may add only the English message as a placeholder if no translator is available — the Fluent runtime will fall back gracefully depending on configuration, but ideally every locale should have a translation.\n\nExample — adding a new `snapshot` domain:\n\n```ftl\n# --- In en/errors.ftl ---\n\n# Snapshot errors\napi-error-snapshot-not-found = Snapshot not found\napi-error-snapshot-create-failed = Failed to create snapshot: { $error }\n```\n\n```ftl\n# --- In ja/errors.ftl ---\n\n# スナップショットエラー\napi-error-snapshot-not-found = スナップショットが見つかりません\napi-error-snapshot-create-failed = スナップショットの作成に失敗しました: { $error }\n```\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g. `pt-BR`, `ko`).\n\n2. Copy `en/errors.ftl` into the new directory as a starting point.\n\n3. Translate every message value, preserving keys and variable names exactly.\n\n4. Register the new locale in whatever Fluent runtime configuration the application uses (outside this module).\n\n## Integration Notes\n\nThis module is **data-only** — it contains no executable code. Other crates in the workspace depend on it by:\n\n- Bundling the `locales/` directory at compile time (e.g. via `include_str!` or a build script), or\n- Loading `.ftl` files at runtime from a known path relative to the binary.\n\nThe consuming code is responsible for locale selection, fallback chains, and passing variables when resolving messages.","other-librefang-types-src":"# Other — librefang-types-src\n\n# Model Catalog Types (`librefang-types/src/model_catalog.rs`)\n\nShared data structures that define how LLM providers, models, and their capabilities are represented throughout the codebase. Every other crate — the runtime catalog loader, the API layer, the metering kernel — consumes these types.\n\n## Purpose\n\nThe model catalog is a registry of every LLM provider and model Librefang knows about. This module provides the **schema**: enums for classification, structs for serialization (TOML and JSON), and a few utility methods. It deliberately contains no I/O or business logic — only data definitions and trivial queries like `AuthStatus::is_available()`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TOML[\"providers/*.toml<br/>(ModelCatalogFile)\"] -->|parse| Runtime[\"librefang-runtime<br/>catalog loader\"]\n    Runtime -->|produces| PI[ProviderInfo]\n    Runtime -->|produces| MCE[ModelCatalogEntry]\n    PI --> API[\"librefang-api<br/>routes & WS handlers\"]\n    MCE --> API\n    MCE --> Metering[\"librefang-kernel-metering<br/>cost estimation\"]\n    PCT[\"ProviderCatalogToml\"] -->|From trait| PI\n    OVR[\"ModelOverrides<br/>(model_overrides.json)\"] --> Agent[\"agent runtime<br/>parameter resolution\"]\n```\n\n## Key Types\n\n### `ModelTier`\n\nClassifies a model's capability level. Serialized as lowercase strings (`\"frontier\"`, `\"smart\"`, etc.). Default is `Balanced`.\n\n| Variant | Typical examples |\n|---|---|\n| `Frontier` | Claude Opus, GPT-4.1 |\n| `Smart` | Claude Sonnet, Gemini 2.5 Flash |\n| `Balanced` | GPT-4o-mini, Groq Llama |\n| `Fast` | Fastest/cheapest models |\n| `Local` | Ollama, vLLM, LM Studio |\n| `Custom` | User-defined runtime additions |\n\n### `AuthStatus`\n\nTracks whether a provider's authentication is usable. The important method is `is_available()` — called from API routes (`src/routes/providers.rs`, `src/routes/agents.rs`), the WebSocket handler (`librefang-api/src/ws.rs`), and the interactive channel bridge (`librefang-api/src/channel_bridge.rs`).\n\n```rust\n// Available states — provider can be used\nValidatedKey | Configured | AutoDetected | ConfiguredCli | NotRequired\n\n// Unavailable states — provider cannot be used\nInvalidKey | Missing | CliNotInstalled | LocalOffline\n```\n\nNotable edge cases:\n\n- **`AutoDetected`**: A key was found via a fallback environment variable. Usable, but may not match the intended provider — the UI should prompt verification.\n- **`InvalidKey`**: Key is present but was rejected (HTTP 401/403). Returns `false` from `is_available()` even though a key exists.\n- **`LocalOffline`**: A local provider was probed and found offline. Unlike `Missing`, `detect_auth()` does not reset this; the probe itself owns the transition back to `NotRequired` when the service comes back up.\n\nDefault is `Missing`. Serialized as `snake_case`.\n\n### `ModelCatalogEntry`\n\nThe core record for a single model. Fields cover identity (`id`, `display_name`, `provider`), capability flags (`supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`), cost (`input_cost_per_m`, `output_cost_per_m` in USD per million tokens), and `aliases` for short-name lookup.\n\nThe `provider` field defaults to an empty string — when omitted in community catalog TOML, the runtime loader infers it from the `[provider].id` section during merge.\n\n### `ModelOverrides`\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` — `None` means \"inherit from the agent or system default.\" The resolution order is:\n\n1. Agent-level `ModelConfig` (highest precedence)\n2. `ModelOverrides` from disk\n3. System defaults\n\nNotable fields beyond standard sampling parameters:\n\n- `use_max_completion_tokens` — some providers require `max_completion_tokens` instead of `max_tokens` in API requests.\n- `no_system_role` — models that cannot handle a `system` role message.\n- `force_max_tokens` — send `max_tokens` even when the provider doesn't require it.\n\nUse `is_empty()` to check whether any overrides are set. This method is called by `src/config/serde_helpers.rs` during serialization.\n\n### `ProviderInfo` vs `ProviderCatalogToml`\n\nTwo structs represent the same provider at different stages:\n\n| | `ProviderCatalogToml` | `ProviderInfo` |\n|---|---|---|\n| **Source** | Parsed from `providers/*.toml` | Produced at runtime |\n| **Runtime fields** | None | `auth_status`, `model_count`, `available_models`, `is_custom`, `proxy_url` |\n| **Use case** | 1:1 TOML mapping, safe to round-trip | API responses, internal lookups |\n\n`ProviderCatalogToml` converts to `ProviderInfo` via `From<ProviderCatalogToml> for ProviderInfo`. The conversion initializes all runtime fields to safe defaults (`auth_status: Missing`, `model_count: 0`, `available_models: []`, `is_custom: false`).\n\nThe `is_custom` field drives UI behavior: built-in providers (from the registry) can only be deconfigured, not deleted, because the registry sync would re-create their TOML on next boot. Custom providers added via the dashboard \"Add provider\" flow get a real \"Delete\" control.\n\n### `RegionConfig`\n\nPer-region endpoint overrides within a provider. A `RegionConfig` specifies a region-specific `base_url` and an optional `api_key_env` override. When `api_key_env` is absent, the provider-level key is used.\n\nRegion selection is resolved at runtime by looking up the chosen region name in `ProviderInfo::regions`, falling back to `ProviderInfo::base_url` if no region is selected.\n\n### `ModelCatalogFile`\n\nThe unified TOML format shared between the main repository (`catalog/providers/*.toml`) and the community model-catalog repository. Contains an optional `[provider]` section (`ProviderCatalogToml`) and a `[[models]]` array of `ModelCatalogEntry` values. The provider section is optional — some catalog files only contribute models and rely on the loader to match them to an existing provider.\n\n### `AliasesCatalogFile`\n\nA simple `[aliases]` TOML section mapping short names to canonical model IDs (e.g., `\"sonnet\" → \"claude-sonnet-4-20250514\"`).\n\n## TOML Format Reference\n\nA complete catalog file looks like:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\nsignup_url = \"https://console.anthropic.com/settings/keys\"\n\n[provider.regions.us]\nbase_url = \"https://dashscope-us.aliyuncs.com/compatible-mode/v1\"\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\n## Serde Behavior\n\nAll enums use `#[serde(rename_all = ...)]` for consistent serialization:\n- `ModelTier`: `lowercase` → `\"frontier\"`, `\"smart\"`, etc.\n- `AuthStatus`: `snake_case` → `\"validated_key\"`, `\"auto_detected\"`, etc.\n- `ModelType`: `lowercase` → `\"chat\"`, `\"speech\"`, `\"embedding\"`\n\n`ModelOverrides` uses `#[serde(skip_serializing_if = \"Option::is_none\")]` on every field to keep the persisted JSON minimal. `ProviderInfo` skips serializing empty `available_models` and `None` `proxy_url` values.\n\n## Consumers\n\n| Crate | What it uses |\n|---|---|\n| `librefang-runtime` | Loads TOML into `ModelCatalogFile`, merges discovered models into `ModelCatalogEntry`, populates `ProviderInfo` |\n| `librefang-api` | Reads `AuthStatus::is_available()` in routes (`/providers`, `/agents`) and WebSocket message handling |\n| `librefang-kernel-metering` | Reads `ModelCatalogFile` for cost estimation when per-token prices are available |","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types-tests: Agent Form Round-Trip Tests\n\n## Purpose\n\nThis test module validates that the TOML emitted by the dashboard's visual editor (`agentManifest.ts`) can be faithfully deserialized by the kernel's `AgentManifest` parser. It acts as a **contract test** — any drift between the TypeScript serializer on the frontend and the Rust deserializer in `librefang_types::agent` will cause a build failure here.\n\n## When to Update These Tests\n\nAdd or modify a test whenever:\n\n- The dashboard form gains a new field or section (e.g. a new advanced toggle).\n- A field is renamed, an enum variant changes, or a section is restructured in `AgentManifest`.\n- Default values for optional sections (`resources`, `capabilities`, `thinking`, etc.) change.\n\n## Test Coverage\n\nEach test constructs a raw TOML string that mirrors the exact output of the dashboard serializer and asserts that `toml::from_str` produces the expected `AgentManifest` struct.\n\n### `parses_form_minimum_viable_output`\n\nThe smallest valid manifest the form can emit: `name`, `version`, `module`, and the `[model]` table with `provider` and `model`. Verifies the critical path works before anything else.\n\n### `parses_form_full_output_with_capabilities_and_resources`\n\nCovers the form when the user fills in description, tags, skills, model tuning (`temperature`, `max_tokens`), resource quotas, and capabilities (`network`, `shell`, `agent_spawn`). This is the \"standard\" non-advanced manifest.\n\n### `parses_form_with_advanced_sections`\n\nThe most comprehensive test. Covers every advanced section the form exposes:\n\n| Section | Key fields asserted |\n|---|---|\n| Top-level | `priority`, `session_mode`, `web_search_augmentation`, `schedule`, `exec_policy` |\n| `[thinking]` | `budget_tokens`, `stream_thinking` |\n| `[autonomous]` | `max_iterations`, `heartbeat_channel` |\n| `[routing]` | `simple_model`, `medium_model`, `complex_model`, thresholds |\n| `[[fallback_models]]` | array of alternative model entries |\n| `[[context_injection]]` | name, content, position |\n| `[capabilities]` | `memory_read`, `memory_write`, `agent_message`, `ofp_connect` |\n\nThis test is the most sensitive to schema changes. If a field is renamed or an enum variant is reworded, this test will fail.\n\n### `parses_form_response_format_json_schema`\n\nValidates the `response_format` field when the form emits a `json_schema` variant. The dashboard serializes the JSON schema as an inline TOML table; this test confirms the kernel reconstructs it as `ResponseFormat::JsonSchema` with the correct `name` and `strict` flag.\n\n### `omitting_optional_sections_uses_defaults`\n\nEnsures that when the form leaves `[resources]` and `[capabilities]` entirely absent, the kernel falls back to struct defaults (empty vecs, `false` for booleans, `None` for optional scalars). This guards against accidental `#[serde(default)]` removal or required-field regressions.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Dashboard Form<br/>agentManifest.ts] -->|emits TOML| B[Test TOML strings]\n    B -->|toml::from_str| C[AgentManifest<br/>librefang_types::agent]\n    A -.->|must match| C\n```\n\nThe tests have no runtime dependencies beyond `librefang_types` and the `toml` crate. They are pure deserialization checks — no database, no network, no filesystem.\n\n## Running\n\n```sh\ncargo test -p librefang-types --test agent_form_roundtrip\n```\n\nAll five tests should pass. A failure here means the dashboard serializer and kernel deserializer have diverged — check recent changes to `AgentManifest` or `agentManifest.ts` to identify the mismatch.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nCore type definitions, traits, and shared data structures for the LibreFang Agent OS.\n\n## Purpose\n\nThis crate serves as the foundational type layer for the entire LibreFang system. It defines the canonical data structures, error types, configuration models, trait interfaces, and cryptographic primitives that all other crates in the workspace depend on. It contains no business logic or I/O — only definitions that establish contracts between modules.\n\n## Role in the Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[Agent Daemon]\n    A --> C[CLI Tools]\n    A --> D[Network Layer]\n    A --> E[Plugin System]\n    style A fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nEvery other crate in the workspace depends on `librefang-types`. It sits at the bottom of the dependency graph, which means changes here have broad impact. The crate intentionally avoids depending on anything with a runtime or external service connection.\n\n## Key Dependency Domains\n\nThe crate's `Cargo.toml` dependencies reveal the major areas it covers:\n\n### Serialization & Configuration\n- **serde**, **serde_json**, **toml** — All core types implement `Serialize` and `Deserialize`. Configuration files use TOML, while network payloads and persistent storage use JSON or other serde-compatible formats.\n\n### Identity & Identification\n- **uuid** — Unique identifiers for agents, tasks, sessions, and other entities throughout the system.\n- **ed25519-dalek**, **sha2**, **hex**, **rand** — Cryptographic signing and verification. Ed25519 keypairs identify agents, and SHA-256 hashing supports integrity checks. These are the building blocks for agent authentication and message authenticity.\n\n### Time Handling\n- **chrono** — Timestamps on events, log entries, task scheduling, and certificate validity periods.\n\n### Error Handling\n- **thiserror** — Derive-based error types that compose cleanly across crate boundaries. All domain-specific errors are defined here so that consuming crates can match on them without creating circular dependencies.\n\n### Async Traits\n- **async-trait** — Trait definitions for async operations (agent backends, transport layers, storage drivers). Consumers provide the implementations; this crate only defines the interfaces.\n\n### Localization\n- **fluent**, **unic-langid** — User-facing message strings and locale identifiers. The type system here supports loading and selecting localized messages at runtime.\n\n### Pattern Matching\n- **regex-lite** — Lightweight regex support, likely used in configuration validation or event filtering rule definitions.\n\n### Filesystem Paths\n- **dirs** — Resolution of standard OS directories (config home, data home, etc.) for default path construction in configuration types.\n\n## Design Conventions\n\n### No Runtime Behavior\n\nThis crate exports types, traits, constants, and pure functions only. It does not spawn tasks, open sockets, or perform I/O. This keeps compile times manageable for downstream crates that only need type information.\n\n### Owned Types Over Lifetimes\n\nStructures prefer owned data (`String`, `Vec<T>`, `DateTime<Utc>`) over borrowed references. This simplifies serialization, cross-task transmission, and async boundaries at the cost of occasional allocations.\n\n### Trait-Driven Abstraction\n\nMajor subsystem interactions are defined as traits with `async-trait`:\n\n```rust\n// Example pattern (actual trait names may differ)\n#[async_trait]\npub trait AgentBackend: Send + Sync {\n    async fn register(&self, keypair: &Keypair) -> Result<AgentId, AgentError>;\n    async fn heartbeat(&self, id: &AgentId) -> Result<(), AgentError>;\n}\n```\n\nImplementations live in their own crates. This crate owns the trait definition and the error type.\n\n### Error Hierarchy\n\nErrors use `thiserror` derives and are organized by domain:\n\n| Error Type | Purpose |\n|---|---|\n| `AgentError` | Agent lifecycle, registration, heartbeat failures |\n| `ConfigError` | Configuration parsing, validation, missing fields |\n| `CryptoError` | Key generation, signing, verification failures |\n| `NetworkError` | Connection, timeout, and protocol-level issues |\n\nEach error type wraps underlying causes (IO, serde, cryptographic) while presenting a domain-specific surface to callers.\n\n## Testing\n\nThe dev-dependency on `rmp-serde` (MessagePack) indicates that serialization round-trip tests verify types can cross format boundaries. This is particularly relevant for scenarios where types are serialized to JSON for the API layer but encoded as MessagePack for compact storage or wire transfer.\n\n## When to Modify This Crate\n\n- **Adding a new domain concept** — If a new entity (e.g., `Policy`, `Certificate`, `Deployment`) needs to be shared across multiple crates, define it here.\n- **Changing a trait signature** — Any change to a trait in this crate requires updating all implementations across the workspace.\n- **Adding a new error variant** — Error enums live here. Add variants with `#[from]` where a new underlying error type needs automatic conversion.\n\n## When Not to Modify This Crate\n\n- **Adding logic** — If you're writing functions that perform I/O, transform data, or make decisions, that code belongs in a higher crate.\n- **Adding a dependency with a runtime** — Avoid pulling in async runtimes, database drivers, or HTTP clients. This crate must remain lightweight to import.","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer for the LibreFang Protocol (OFP). Handles authenticated message framing, serialization, and transport over asynchronous connections.\n\n## Purpose\n\nThis crate implements the wire protocol that LibreFang agents use to communicate with each other. It is responsible for:\n\n- **Message framing** — delineating discrete protocol messages on a byte stream\n- **Authentication** — HMAC-SHA256 message authentication with constant-time verification\n- **Serialization** — encoding and decoding structured messages via JSON\n- **Connection management** — tracking active peer connections with concurrent state\n\nEvery agent-to-agent exchange in LibreFang flows through this module.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Application Logic] --> B[librefang-wire]\n    B --> C[librefang-types]\n    B --> D[Tokio Async Transport]\n    B --> E[HMAC-SHA256 Auth Layer]\n    E --> F[Serialized Frame]\n    F --> D\n```\n\nMessages originate from application logic, pass through serialization and HMAC signing, and are transmitted over a Tokio-backed transport. Incoming messages follow the reverse path: read from transport, verify HMAC, deserialize, and dispatch.\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions — message enums, error types, and protocol constants used across all LibreFang crates |\n| `tokio` | Async runtime for non-blocking I/O on TCP or similar transports |\n| `serde` / `serde_json` | Message serialization to JSON for wire encoding |\n| `hmac` / `sha2` / `subtle` | HMAC-SHA256 computation for message authentication; `subtle` provides constant-time comparison to prevent timing attacks during verification |\n| `hex` | Hex encoding/decoding of HMAC digests and keys |\n| `rand` | Cryptographically secure random number generation, used for nonces or session challenges |\n| `uuid` | Unique identifiers for messages and agent sessions |\n| `chrono` | Timestamp generation for message headers |\n| `dashmap` | Lock-free concurrent hashmap for tracking active peer connections and session state |\n| `async-trait` | Async trait definitions for transport abstraction |\n| `thiserror` | Ergonomic error type derivation |\n| `tracing` | Structured logging and diagnostic spans |\n\n## Security Model\n\nAuthentication uses **HMAC-SHA256**. Each message carries a keyed hash that the recipient verifies before processing. The `subtle` crate ensures that HMAC comparison runs in constant time, preventing timing side-channels that could leak information about valid digests.\n\nKey material and random values are generated via `rand`, which should be configured to use a secure RNG backend at the application level.\n\n## Relationship to Other Crates\n\n- **`librefang-types`** — this crate consumes the shared types but does not define protocol-level data structures itself. Any new message kind or error variant belongs in `librefang-types`.\n- **Application crates** — consume `librefang-wire` to open authenticated channels to peers. They register handlers for deserialized messages and provide the HMAC key material.\n\n## Testing\n\nTests use `tokio-test` (declared in `[dev-dependencies]`) for async test scaffolding. Run the test suite with:\n\n```bash\ncargo test -p librefang-wire\n```","other":"# Other\n\n# Other Module\n\nSupporting infrastructure, integrations, and tooling for the LibreFang Agent OS. This module group encompasses everything that isn't a core domain crate — from the HTTP API and dashboard UI to the CLI, desktop app, LLM drivers, messaging channels, and test infrastructure.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Clients\n        CLI[librefang-cli]\n        Desktop[librefang-desktop]\n        Dashboard[librefang-api-dashboard]\n        External[External Clients]\n    end\n\n    subgraph API Layer\n        API[librefang-api]\n        OpenAI[OpenAI Compat Layer]\n        Wire[librefang-wire]\n    end\n\n    subgraph Kernel\n        Kernel[librefang-kernel]\n        Router[kernel-router]\n        Metering[kernel-metering]\n        Handle[kernel-handle]\n    end\n\n    subgraph Runtime\n        Runtime[librefang-runtime]\n        WASM[runtime-wasm]\n        MCP[runtime-mcp]\n        OAuth[runtime-oauth]\n    end\n\n    subgraph Providers\n        LLMDriver[librefang-llm-driver]\n        LLMDrivers[librefang-llm-drivers]\n    end\n\n    subgraph Data & Capabilities\n        Memory[librefang-memory]\n        Skills[librefang-skills]\n        Hands[librefang-hands]\n        Channels[librefang-channels]\n        Extensions[librefang-extensions]\n    end\n\n    subgraph Foundation\n        Types[librefang-types]\n        HTTP[librefang-http]\n        Telemetry[librefang-telemetry]\n    end\n\n    CLI --> API\n    Desktop --> API\n    Dashboard --> API\n    External --> OpenAI\n    External --> API\n\n    API --> Kernel\n    API --> Runtime\n    API --> Channels\n    OpenAI --> API\n\n    Kernel --> Router\n    Kernel --> Metering\n    Kernel --> Handle\n    Kernel --> Runtime\n    Kernel --> Memory\n    Kernel --> Skills\n    Kernel --> Hands\n\n    Runtime --> WASM\n    Runtime --> MCP\n    Runtime --> OAuth\n    Runtime --> LLMDriver\n    Runtime --> Memory\n\n    LLMDriver --> LLMDrivers\n    LLMDrivers --> HTTP\n\n    Extensions --> HTTP\n    Wire --> Types\n    Channels --> Kernel\n\n    Types --> Foundation\n    HTTP --> Foundation\n    Telemetry --> Foundation\n```\n\n## Sub-module Groups\n\n### Core Types\n\n[librefang-types](librefang-types.md) is the foundational crate every other module depends on. It defines shared domain types, error types, configuration models, and trait interfaces. Supporting it are [librefang-types-src](librefang-types-src.md) (model catalog schemas), [librefang-types-locales](librefang-types-locales.md) (localized API error messages in Fluent format), and [librefang-types-tests](librefang-types-tests.md) (contract tests ensuring the dashboard's TOML serializer and kernel's deserializer stay in sync).\n\n### Kernel & Orchestration\n\n[librefang-kernel](librefang-kernel.md) is the central orchestrator that wires together routing, metering, memory, skills, hands, extensions, and LLM drivers. It delegates to:\n\n- [librefang-kernel-router](librefang-kernel-router.md) — matches incoming messages to registered hands via template patterns\n- [librefang-kernel-metering](librefang-kernel-metering.md) — tracks resource consumption and enforces quotas\n- [librefang-kernel-handle](librefang-kernel-handle.md) — trait-based abstraction for in-process kernel communication\n\nTesting is covered by [librefang-kernel-src](librefang-kernel-src.md) (unit tests) and [librefang-kernel-tests](librefang-kernel-tests.md) (integration tests including WASM execution and workflow pipelines).\n\n### Agent Runtime\n\n[librefang-runtime](librefang-runtime.md) orchestrates the full agent lifecycle — LLM interaction, tool invocation, memory management, and sandboxing. It pulls in specialized subsystems:\n\n- [librefang-runtime-wasm](librefang-runtime-wasm.md) — wasmtime-based sandbox for executing untrusted skills\n- [librefang-runtime-mcp](librefang-runtime-mcp.md) — Model Context Protocol client for dynamic tool discovery\n- [librefang-runtime-oauth](librefang-runtime-oauth.md) — OAuth 2.0 PKCE flows for ChatGPT and GitHub Copilot authentication\n- [librefang-runtime-tests](librefang-runtime-tests.md) — MCP OAuth integration tests\n\n### LLM Integration\n\n[librefang-llm-driver](librefang-llm-driver.md) defines the trait that all LLM backends implement. [librefang-llm-drivers](librefang-llm-drivers.md) provides concrete implementations for Anthropic, OpenAI, Google Gemini, and others, using the shared HTTP client from [librefang-http](librefang-http.md).\n\n### API & Dashboard\n\n[librefang-api](librefang-api.md) exposes the primary HTTP/WebSocket interface and embeds the dashboard UI. It integrates with nearly every other subsystem. The frontend is a React SPA ([librefang-api-dashboard](librefang-api-dashboard.md)) built with TanStack Router and Query. [librefang-api-src](librefang-api-src.md) adds an OpenAI-compatible API surface (`/v1/chat/completions`, `/v1/models`) and a zero-dependency login page. [librefang-api-static](librefang-api-static.md) provides i18n locale files (English, Japanese), and [librefang-api-tests](librefang-api-tests.md) contains integration and load tests.\n\n### Messaging Channels\n\n[librefang-channels](librefang-channels.md) provides pluggable messaging integrations for 43+ platforms (Telegram, Discord, Slack, etc.), each behind a Cargo feature flag. Performance-critical paths are benchmarked in [librefang-channels-benches](librefang-channels-benches.md), and the full dispatch pipeline is tested in [librefang-channels-tests](librefang-channels-tests.md).\n\n### CLI & Desktop\n\n[librefang-cli](librefang-cli.md) produces the `librefang` binary — the primary terminal entry point with an interactive TUI and shell completions. It uses [librefang-cli-locales](librefang-cli-locales.md) for i18n (English, Simplified Chinese) and [librefang-cli-templates](librefang-cli-templates.md) for `init` project scaffolding.\n\n[librefang-desktop](librefang-desktop.md) packages the runtime as a native desktop app via Tauri 2.0, with system tray integration and auto-updates. Security is managed through [librefang-desktop-capabilities](librefang-desktop-capabilities.md) and auto-generated [librefang-desktop-gen](librefang-desktop-gen.md) artifacts.\n\n### Capabilities & Data\n\n- [librefang-hands](librefang-hands.md) — curated capability packages assignable to agents\n- [librefang-skills](librefang-skills.md) — skill registry, filesystem loader, marketplace client, and OpenClaw compatibility\n- [librefang-memory](librefang-memory.md) — persistence layer for conversation history and agent state, tested via [librefang-memory-tests](librefang-memory-tests.md)\n- [librefang-extensions](librefang-extensions.md) — MCP server bootstrap, AES-256-GCM credential vault, and OAuth2 PKCE flow, with a shared HTTP client in [librefang-extensions-src](librefang-extensions-src.md)\n\n### Cross-cutting Concerns\n\n- [librefang-wire](librefang-wire.md) — agent-to-agent networking with HMAC-SHA256 authentication and JSON framing\n- [librefang-telemetry](librefang-telemetry.md) — OpenTelemetry and Prometheus metrics instrumentation\n- [librefang-migrate](librefang-migrate.md) — imports configurations from other agent frameworks (JSON, YAML, TOML, JSON5)\n- [librefang-testing](librefang-testing.md) — shared mock kernel, mock LLM driver, and route-level test utilities used across integration tests\n\n## Key Cross-Module Workflows\n\n**Dashboard → API → Kernel → Runtime → LLM:** A user interacts with the React dashboard ([librefang-api-dashboard](librefang-api-dashboard.md)), which calls the API via TanStack Query mutations. The API server ([librefang-api](librefang-api.md)) routes requests through the kernel ([librefang-kernel](librefang-kernel.md)), which dispatches to the runtime ([librefang-runtime](librefang-runtime.md)). The runtime invokes an LLM via a concrete driver from [librefang-llm-drivers](librefang-llm-drivers.md), using the trait from [librefang-llm-driver](librefang-llm-driver.md).\n\n**Channel Message → Agent Response:** An inbound message from Telegram or Discord arrives through [librefang-channels](librefang-channels.md). The `BridgeManager` dispatches it to the kernel, which uses [librefang-kernel-router](librefang-kernel-router.md) to match it to a hand ([librefang-hands](librefang-hands.md)). The runtime executes the agent loop, invoking skills ([librefang-skills](librefang-skills.md)) or WASM modules ([librefang-runtime-wasm](librefang-runtime-wasm.md)) as needed, and the response flows back through the channel adapter.\n\n**OpenAI-Compatible Access:** External tools hit the `/v1/chat/completions` endpoint in [librefang-api-src](librefang-api-src.md), which translates the OpenAI protocol into a LibreFang agent interaction — enabling any OpenAI client library to drive an agent session.","overview":"# crates — Wiki\n\n# LibreFang Agent OS — `crates` Workspace\n\nLibreFang Agent OS is a full-stack platform for deploying, managing, and orchestrating AI agents. It provides a kernel-based runtime where agents can be configured, scheduled, and supervised — with persistent memory, pluggable skills, 40+ messaging channel integrations, and support for 43+ LLM providers. Users interact through a CLI, a React dashboard, or a native desktop application.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[CLI & Desktop]\n    DASH[Dashboard SPA]\n    EXT[External Channels]\n    PEER[Peer Kernels]\n\n    API[API Server]\n    KERNEL[Agent Kernel]\n    RUNTIME[Runtime Engine]\n    MEMORY[Memory & Storage]\n\n    CLI --> API\n    DASH --> API\n    EXT --> API\n    PEER --> WIRE[Networking & P2P]\n\n    API --> KERNEL\n    API --> RUNTIME\n    RUNTIME --> KERNEL\n    RUNTIME --> MEMORY\n\n    KERNEL -.-> TYPES[Core Types]\n    RUNTIME -.-> TYPES\n    API -.-> TYPES\n```\n\n## How It Works\n\nAt the center of the system sits the [Agent Kernel](agent-kernel.md), which manages agent lifecycles, configuration, scheduling, inter-agent communication, and process supervision. The kernel runs in-process alongside the [API Server](api-server.md), which exposes JSON REST and WebSocket endpoints to all client surfaces: the [CLI & Terminal UI](cli-terminal-ui.md), the [Dashboard Frontend](dashboard-frontend.md), the [Desktop Application](desktop-application.md), and external integrations.\n\nWhen a user message arrives — whether from a chat channel, the dashboard, or the CLI — the [Runtime Engine](runtime-engine.md) takes over. It handles the full agent turn: recalling relevant memories, assembling prompts, calling the LLM, executing tool calls in a sandboxed environment, and persisting the updated session. The runtime is the highest-traffic module in the workspace and depends on nearly every other layer.\n\n### Memory & Skills\n\nThe [Memory & Storage](memory-storage.md) module provides a unified persistence substrate over SQLite: structured key-value storage, semantic vector search for recall, a knowledge graph, session history, and a shared task queue. Agents can be extended through the [Skills & Marketplace](skills-marketplace.md) system, where self-contained skill bundles provide executable tools (Python, Node.js, Shell, WASM) or inject instructional context into the LLM's system prompt.\n\n### LLM & Channel Integration\n\nThe [LLM Provider Drivers](llm-provider-drivers.md) module defines a trait-based abstraction (`LlmDriver`) with 43+ concrete implementations covering cloud APIs, local inference servers, and CLI subprocess tools. External messaging platforms connect through the [Channel Integrations](channel-integrations.md) module, which translates platform-specific messages (Telegram, Discord, Slack, WhatsApp, IRC, Matrix, and many more) into a unified `ChannelMessage` format before dispatching to the kernel.\n\n### Cross-Cutting Concerns\n\nEvery crate in the workspace depends on [Core Types & Configuration](core-types-configuration.md) — it defines all data structures that cross crate boundaries with no business logic. [Authentication & Security](authentication-security.md) handles JWT validation, API keys, encrypted secret storage, and OAuth flows. The [Networking & P2P](networking-p2p.md) module enables cross-machine agent discovery and communication using a JSON-framed wire protocol with HMAC-SHA256 authentication. Foundational plumbing lives in [Shared Infrastructure](shared-infrastructure.md) (HTTP transport, telemetry, cost enforcement, test mocking), while [Extensions & Hands](extensions-hands.md) provides the external integration layer for connecting to outside services and running autonomous agent capabilities.\n\n## Key End-to-End Flows\n\n**Agent chat from the dashboard:** The user opens the ChatPage in the [Dashboard Frontend](dashboard-frontend.md), which calls `createAgentSession` through the API client. The request hits the [API Server](api-server.md), which authenticates via [Authentication & Security](authentication-security.md), creates a session through the [Agent Kernel](agent-kernel.md), and returns it to the dashboard. Subsequent messages flow through the [Runtime Engine](runtime-engine.md), which recalls context from [Memory & Storage](memory-storage.md), calls an [LLM Provider Driver](llm-provider-drivers.md), executes any tool calls via [Skills & Marketplace](skills-marketplace.md), and streams the response back over WebSocket.\n\n**External message processing:** A message from Telegram, Discord, or another channel arrives at a [Channel Integrations](channel-integrations.md) adapter, which normalizes it into a `ChannelMessage`. The adapter dispatches to the kernel, which routes it through the runtime engine for processing. Any response is translated back through the channel adapter to the originating platform.\n\n**P2P agent coordination:** The [Networking & P2P](networking-p2p.md) module discovers peer kernels, authenticates via HMAC-SHA256 handshake, and establishes persistent TCP connections. Agents on different machines can communicate, delegate tasks, and share knowledge through this layer.\n\n## Getting Started\n\n1. **Build the workspace:** `cargo build` — this compiles all crates. Use `--features all-channels` to enable all 40+ channel adapters, or rely on the `default` feature set for popular channels.\n2. **Start the daemon:** `librefang start` boots the kernel and API server. The dashboard becomes available at `/dashboard`.\n3. **Use the CLI:** The [CLI & Terminal UI](cli-terminal-ui.md) operates in daemon mode (communicating over HTTP) or single-shot mode (booting an in-process kernel).\n4. **Desktop app:** The [Desktop Application](desktop-application.md) wraps the kernel and dashboard in a Tauri 2.0 native window with system tray integration. It supports local mode (embedded kernel) and remote mode (connects to an existing instance).","runtime-engine":"# Runtime Engine\n\n# Runtime Engine (`librefang-runtime`)\n\n## Purpose\n\nThe runtime engine is the execution heart of LibreFang. It manages the full lifecycle of an agent turn: receiving a user message, recalling relevant memories, calling the LLM, executing tool calls in a sandboxed environment, and persisting the updated session. Everything the agent *does* passes through this crate.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[User Message] --> B[run_agent_loop]\n    B --> C[Memory Recall]\n    C --> D[Prompt Assembly]\n    D --> E[LLM Completion]\n    E --> F{Stop Reason?}\n    F -->|EndTurn| G[Finalize Response]\n    F -->|ToolUse| H[StagedToolUseTurn]\n    F -->|MaxTokens| I[Continuation]\n    H --> J[execute_single_tool_call]\n    J --> K[LoopGuard Check]\n    K --> L[tool_runner::execute_tool]\n    L --> M[Sandbox / Skill / MCP]\n    M --> N[Commit Results]\n    N --> E\n    G --> O[Save Session + Memory]\n    O --> P[AgentLoopResult]\n```\n\n## Key Submodules\n\n| Submodule | Role |\n|---|---|\n| `agent_loop` | Core execution loop, `run_agent_loop` / `run_agent_loop_streaming` |\n| `tool_runner` | Dispatches individual tool calls to built-in tools, skills, or MCP servers |\n| `llm_driver` | Abstracted LLM completion interface (re-exported from `librefang-llm-driver`) |\n| `context_budget` | Token-aware truncation strategies for tool results and conversation history |\n| `context_engine` | Pluggable context-assembly pipeline (overflow recovery, summarization) |\n| `context_overflow` | Recovery heuristics when the prompt exceeds the model's context window |\n| `loop_guard` | Circuit breaker and rate limiter for tool calls within a single turn |\n| `session_repair` | Validates and repairs message sequences (orphan tool results, malformed blocks) |\n| `workspace_sandbox` | Path validation and symlink resolution for file-access tools |\n| `sandbox` | WASM sandboxing for untrusted plugin/skill code (re-exported from `librefang-runtime-wasm`) |\n| `subprocess_sandbox` | OS-level process isolation for tool execution |\n| `docker_sandbox` | Container-based sandboxing for tool execution |\n| `web_search` / `web_fetch` / `web_cache` / `web_content` | Web toolchain: search providers, HTTP fetching with SSRF protection, caching, HTML→Markdown |\n| `mcp` | Model Context Protocol client connections (re-exported from `librefang-runtime-mcp`) |\n| `mcp_server` | In-process MCP server exposing agent tools to external clients |\n| `hooks` | Lifecycle hooks (`BeforeToolCall`, `AfterToolCall`, `AgentLoopEnd`, etc.) |\n| `pii_filter` | Redacts PII patterns from user messages before they reach the LLM |\n| `proactive_memory` | Auto-memorize and auto-retrieve hooks that extract/ inject memories per turn |\n| `prompt_builder` | Constructs system prompts, memory sections, and context blocks |\n| `compactor` | Conversation compaction to reduce token usage |\n| `reply_directives` | Parses `[[reply_to:...]]` / `[[silent]]` directives from LLM responses |\n| `silent_response` | Detects `NO_REPLY` / `[no reply needed]` sentinels |\n| `routing` | Request routing across LLM providers |\n| `retry` | Exponential backoff for rate-limited or overloaded API calls |\n| `provider_health` | Tracks per-provider availability |\n| `embedding` | Embedding driver trait for vector-based memory recall |\n| `tts` | Text-to-speech synthesis (OpenAI, ElevenLabs, Google) |\n| `media` / `media_understanding` | Media driver cache and multimodal content analysis |\n| `browser` | Browser automation manager |\n| `image_gen` | Image generation tool |\n| `trace_store` | Persistent storage for decision traces |\n| `audit` | Audit logging for tool invocations |\n| `process_manager` | Manages long-running child processes |\n| `plugin_manager` / `plugin_runtime` | Plugin discovery, loading, and lifecycle |\n| `a2a` | Agent-to-agent communication protocol |\n| `model_catalog` | Model metadata, aliases, and pricing |\n| `graceful_shutdown` | Coordinated shutdown of in-flight work |\n| `auth_cooldown` | Provider-level cooldown after repeated auth failures |\n| `link_understanding` | Extracts and summarizes content from shared URLs |\n| `shell_bleed` | Detects and mitigates shell-injection leakage |\n| `str_utils` | String utilities shared across the runtime |\n| `python_runtime` | Python script execution for tools |\n| `kernel_handle` | Kernel RPC interface (re-exported from `librefang-kernel-handle`) |\n| `http_client` | Shared HTTP client with proxy support (re-exported from `librefang-http`) |\n| `catalog_sync` / `registry_sync` | Remote registry and model catalog synchronization |\n| `channel_registry` | Channel configuration registry |\n| `command_lane` | Command dispatch lane for agent messaging |\n\n## The Agent Loop\n\n### Entry Points\n\nTwo public functions drive agent execution:\n\n- **`run_agent_loop`** — non-streaming. Returns a complete `AgentLoopResult`.\n- **`run_agent_loop_streaming`** — streams `StreamEvent`s to an `mpsc` receiver and signals `PHASE_RESPONSE_COMPLETE` when text generation finishes, then continues post-processing asynchronously.\n\nBoth share identical tool-execution, context-management, and persistence logic.\n\n### Execution Phases\n\n1. **Pre-flight checks** — Verify the LLM driver is configured (`driver.is_configured()`). Return early with `provider_not_configured: true` if not.\n\n2. **Experiment selection** — If an A/B prompt experiment is running for this agent, deterministically select a variant based on `session.id` hash. The variant's system prompt replaces the manifest default for this turn.\n\n3. **Memory recall** — Uses `setup_recalled_memories` which:\n   - Delegates to `context_engine.ingest()` if a context engine is available, or\n   - Falls back to embedding-based vector recall (`recall_with_embedding_async`), or\n   - Falls back to plain text search (`recall`).\n   - Appends proactive memories from `auto_retrieve` when not in fork mode.\n   - All recall failures are non-fatal — the loop continues with empty memories and logs a warning.\n\n4. **Prompt assembly** — `build_prompt_setup` merges:\n   - The agent's base system prompt (possibly overridden by experiment variant).\n   - Recalled memories formatted as a context section.\n   - A language-matching instruction appended to the system prompt.\n\n5. **PII filtering** — The user message (and any content blocks) pass through `pii_filter::filter_message` based on the privacy config extracted from manifest metadata. Group-chat sender prefixes are applied after filtering.\n\n6. **Message preparation** — `prepare_llm_messages`:\n   - Extracts non-system messages from the session.\n   - Inserts `canonical_context_msg` and memory context at the front.\n   - Runs `safe_trim_messages` to enforce `MAX_HISTORY_MESSAGES` (40) at turn boundaries.\n   - Strips stale image data from prior turns (`strip_prior_image_data`).\n\n7. **Web search augmentation** — For models without tool support, `web_search_augment` optionally generates search queries via a small LLM call, executes web searches, and injects results as context.\n\n8. **Iterative loop** — For each iteration (up to `MAX_ITERATIONS` = 50, configurable via `manifest.autonomous.max_iterations`):\n   - **Context assembly** — Either via `context_engine.assemble()` or inline overflow recovery + context guard.\n   - **LLM completion** — `call_with_retry` with exponential backoff (up to 3 retries, base 1s delay).\n   - **Response handling** by stop reason (see below).\n\n### Stop Reason Handling\n\n#### `EndTurn` / `StopSequence`\n\nThe LLM finished its response. The loop:\n\n1. Parses reply directives (`[[reply_to:...]]`, `[[silent]]`).\n2. Checks for silent response (`NO_REPLY`, `[no reply needed]`). If silent, saves session and returns `silent: true`.\n3. Checks for retry conditions via `classify_end_turn_retry`:\n   - **Empty response** — Retries once with a nudge message.\n   - **Hallucinated action** — LLM described an action without calling tools. Retries with a correction.\n   - **Action intent** — User asked for action but LLM responded with text only. Retries with a nudge.\n4. Finalizes the response text and calls `finalize_successful_end_turn`.\n\n#### `ToolUse`\n\nThe LLM wants to execute tools. The loop:\n\n1. Creates a `StagedToolUseTurn` — buffers the assistant message and tool-result blocks locally without mutating `session.messages` yet.\n2. Executes each tool call via `execute_single_tool_call`.\n3. On hard errors, skips remaining tools in the batch and appends stub results (prevents \"tool_call_ids did not have response messages\" errors — issue #2381).\n4. Commits the staged turn atomically to both `session.messages` and the LLM working copy.\n5. Saves session interim (unless fork mode).\n6. Tracks consecutive all-failed iterations. After `MAX_CONSECUTIVE_ALL_FAILED` (3) consecutive iterations with only hard errors, exits with `RepeatedToolFailures`.\n\n#### `MaxTokens`\n\nThe LLM hit the token limit. If there are no tool calls (pure text overflow) or the continuation counter reaches `MAX_CONTINUATIONS` (5), returns the partial response. Otherwise, appends the partial text and continues the loop.\n\n### StagedToolUseTurn\n\nA critical data structure that solves the **orphan tool_use** problem (#2381). Previously, the assistant's `tool_use` message was eagerly pushed to `session.messages` before any tool executed. If execution was interrupted (error, signal, crash), the session would contain an assistant message with `ToolUse` blocks but no matching user message with `ToolResult` blocks — causing API 400 errors on the next turn.\n\n`StagedToolUseTurn` buffers everything locally:\n\n```\nstage_tool_use_turn()     // Creates the staged turn\n  → append_result()       // Per-tool: adds a ToolResult block\n  → pad_missing_results() // Fills in \"tool interrupted\" for unexecuted IDs\n  → commit()              // Atomically pushes assistant + user messages\n```\n\nIf the staged turn is dropped without committing (e.g., `?` propagation from an error), `session.messages` is untouched.\n\n### LoopGuard\n\n`LoopGuard` provides circuit-breaker semantics for tool calls within a turn:\n\n- **`Block`** — Tool is rate-limited; returns a synthetic error to the LLM.\n- **`Warn`** — Tool is approaching its limit; appends a warning to the tool result.\n- **`CircuitBreak`** — Global limit exceeded; breaks out of the loop entirely with a persistent session save.\n\nFor autonomous agents, the circuit breaker threshold scales with `max_iterations * 3`.\n\n### LoopOptions\n\n| Field | Purpose |\n|---|---|\n| `is_fork` | Marks derivative (ephemeral) turns. Forks skip session persistence, proactive memory, and context-engine updates. Prevents recursive auto-memorize loops. |\n| `allowed_tools` | Runtime tool allowlist enforced at execute time (not request-schema time) to preserve Anthropic prompt-cache alignment. |\n\n### AgentLoopResult\n\nReturned to the kernel after the loop completes:\n\n| Field | Description |\n|---|---|\n| `response` | Final text response (empty if silent) |\n| `total_usage` | Cumulative token usage across all LLM calls |\n| `iterations` | Number of loop iterations |\n| `silent` | Agent intentionally chose not to reply |\n| `directives` | Parsed reply directives |\n| `decision_traces` | Per-tool-call traces with timing, rationale, and outcomes |\n| `memories_saved` / `memories_used` | Memory activity summaries |\n| `provider_not_configured` | True when no LLM provider was available |\n| `new_messages_start` | Index into `session.messages` where this turn's messages begin |\n| `skill_evolution_suggested` | True when 5+ tool calls suggest a skill-creation opportunity |\n\n## Tool Execution\n\n`execute_single_tool_call` is the per-tool execution path:\n\n1. **LoopGuard check** — Block, warn, or circuit-break.\n2. **Fork allowlist check** — Reject tools outside `LoopOptions::allowed_tools`.\n3. **Hook** — Fire `BeforeToolCall`; block if the hook returns an error.\n4. **Timeout** — Execute via `tool_runner::execute_tool` with a configurable timeout (default 600s).\n5. **Trace** — Record a `DecisionTrace` with timing, rationale, and output summary.\n6. **Hook** — Fire `AfterToolCall` (best-effort).\n7. **Sanitize** — Strip injection markers and truncate the result content.\n\n`tool_runner::execute_tool` dispatches to:\n- Built-in tools (file I/O, process management, web search, agent spawn, etc.)\n- Skills from the `SkillRegistry`\n- MCP server tool calls via `McpConnection`\n- Sandbox-specific execution (WASM, subprocess, Docker)\n\n## Context Management\n\n### Context Budget\n\n`ContextBudget` defines allocation ratios for system prompt, conversation history, tool results, and response space within the model's context window. `apply_context_guard` enforces these budgets by trimming older messages.\n\n### Context Overflow Recovery\n\n`recover_from_overflow` applies a graduated recovery strategy:\n1. Strip tool-result details.\n2. Summarize old messages.\n3. Drop oldest messages.\n4. Final error — suggest `/reset` or `/compact`.\n\nEach stage is non-destructive: if the context still fits after stage 1, no further action is taken.\n\n### Context Engine\n\n`ContextEngine` is a trait for pluggable context-assembly strategies. When provided, it handles:\n- `ingest` — Recall memories for a user message.\n- `assemble` — Build the final message list within token budget.\n- `after_turn` — Post-turn state updates (summary chains, etc.).\n\nWhen no context engine is provided, the inline fallback (overflow recovery + context guard) is used.\n\n## Memory Integration\n\nThe runtime integrates with `librefang-memory` at several points:\n\n1. **Pre-turn recall** — Vector or text search for relevant memories, plus proactive `auto_retrieve`.\n2. **Post-turn memorize** — `remember_interaction_best_effort` stores a \"User asked: ... I responded: ...\" episodic memory with optional embedding.\n3. **Proactive auto_memorize** — After a successful turn, the proactive memory store extracts structured memories and relations from the conversation.\n4. **Session persistence** — `save_session_async` writes the full session (messages + metadata) to the memory substrate.\n\nAll memory operations are best-effort: failures log warnings but never fail the agent loop.\n\n## Web Toolchain\n\n### Web Search\n\nSupports multiple providers: DuckDuckGo (no API key), Brave, Tavily. The `search_auto` function selects the first configured provider. For models without tool support, `web_search_augment` optionally uses a small LLM call to generate focused search queries from the conversation, then injects results as context.\n\n### Web Fetch\n\nHTTP client with SSRF protection (`check_ssrf` blocks cloud metadata IPs), configurable TTL caching (`web_cache`), and HTML-to-Markdown conversion (`web_content`).\n\n## Provider Prefix Handling\n\n`strip_provider_prefix` normalizes model IDs for multi-provider setups. For example, `openrouter/google/gemini-2.5-flash` becomes `google/gemini-2.5-flash` when sent to the OpenRouter API. For providers requiring `org/model` format (OpenRouter, Together, Fireworks, etc.), bare model names are normalized using `normalize_bare_model_id` (e.g., `gemini-2.5-flash` → `google/gemini-2.5-flash`).\n\n## Group Chat Support\n\nIn group channels (detected via `manifest.metadata.is_group`), user messages are prefixed with a sanitized `[sender]:` label so the LLM can distinguish speakers. The prefix is applied after PII filtering to prevent display-name redaction.\n\n## PII Filtering\n\n`pii_filter::PiiFilter` redacts configured patterns (emails, phone numbers, etc.) from user messages based on the privacy mode (`Off`, `Redact`, `Replace`). The filter runs before the message enters the session.\n\n## A/B Experiments\n\nWhen a prompt experiment is active for an agent, `select_running_experiment` deterministically assigns a variant based on `session.id` hash modulo traffic-split weights. The variant's system prompt replaces the manifest default. `ExperimentContext` is returned in `AgentLoopResult` for metric tracking.\n\n## Key Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `MAX_ITERATIONS` | 50 | Loop iterations before giving up (overridable via `manifest.autonomous.max_iterations`) |\n| `MAX_RETRIES` | 3 | Retries for rate-limited API calls |\n| `BASE_RETRY_DELAY_MS` | 1000 | Exponential backoff base |\n| `TOOL_TIMEOUT_SECS` | 600 | Per-tool execution timeout |\n| `MAX_CONTINUATIONS` | 5 | Consecutive MaxTokens continuations |\n| `MAX_HISTORY_MESSAGES` | 40 | Message history cap (≈7–10 conversation turns) |\n| `MAX_CONSECUTIVE_ALL_FAILED` | 3 | Consecutive all-failed iterations before abort |\n| `DEFAULT_CONTEXT_WINDOW` | 200,000 | Token-based trimming fallback |\n\n## Error Handling Philosophy\n\nThe runtime prioritizes **forward progress** over strict correctness:\n\n- Memory recall failures → empty memories + warning log.\n- Embedding failures → fallback to text search.\n- Hook failures in best-effort paths → warning log, loop continues.\n- Tool execution timeouts → synthetic error result returned to LLM.\n- Context overflow → graduated recovery (strip details → summarize → drop → fail).\n\nOnly truly unrecoverable states (provider misconfiguration, repeated hard tool failures, circuit-breaker trips) terminate the loop with an error.\n\n## Thread Safety\n\n`run_agent_loop` is `async` and designed to run on a Tokio runtime. The session (`&mut Session`) is exclusively borrowed for the duration. MCP connections are shared via `tokio::sync::Mutex`. The `PhaseCallback` is `Arc<dyn Fn>` for fire-and-forget UX updates.","shared-infrastructure-librefang-http-src":"# Shared Infrastructure — librefang-http-src\n\n# librefang-http\n\nCentralized HTTP client construction with proxy support and portable TLS roots. Every outbound HTTP connection in the agent should go through this crate so that proxy settings and certificate trust are applied uniformly.\n\n## Why this crate exists\n\nTwo problems arise when using a bare `reqwest::Client` across the agent:\n\n1. **Missing system CA certificates.** On musl builds (Termux/Android), minimal Docker images, or corporate Linux with partial CA bundles, `reqwest`'s default TLS initialization panics because it cannot find a system trust store.\n2. **Inconsistent proxy settings.** Different crates building their own `reqwest::Client` might or might not read `HTTP_PROXY` / `HTTPS_PROXY` env vars, leading to inconsistent routing.\n\n`librefang-http` solves both by providing pre-configured client builders that bundle Mozilla CA roots as a fallback and apply proxy settings from a single global source of truth.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    subgraph Startup\n        A[init_proxy] -->|writes| G[GLOBAL_PROXY RwLock]\n        A -->|exports env vars| ENV[\"HTTP_PROXY / HTTPS_PROXY / NO_PROXY\"]\n    end\n\n    subgraph \"Client Construction\"\n        PCB[proxied_client_builder] --> AP[active_proxy]\n        AP --> G\n        PCB --> BHC[build_http_client]\n        BHC --> TC[tls_config]\n        TC -->|OnceLock cached| TLS[\"rustls: webpki-roots + native certs\"]\n    end\n\n    subgraph \"Per-Provider Override\"\n        PCO[proxied_client_with_override] --> TC\n        PCO -->|invalid URL fallback| PC[proxied_client]\n    end\n\n    PC --> PCB\n```\n\n## Initialization sequence\n\nAt daemon startup, call [`init_proxy`] exactly once with the `[proxy]` section from `config.toml`:\n\n```rust\nlet proxy_cfg: ProxyConfig = config.proxy;\nlibrefang_http::init_proxy(proxy_cfg);\n```\n\nThis does two things:\n\n1. **Exports proxy values as environment variables** (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY` and their lowercase variants). This happens only during the initial bootstrap call—before the Tokio runtime spawns worker threads—because `std::env::set_var` is racy in a multi-threaded process.\n2. **Stores the config in `GLOBAL_PROXY`.** Subsequent calls (e.g. hot-reload) update only the `RwLock`-guarded global, avoiding unsound `set_var` calls from a multi-threaded context.\n\n## TLS configuration\n\n[`tls_config()`] returns a `rustls::ClientConfig` that combines two certificate sources:\n\n1. **Bundled Mozilla CA roots** (`webpki_roots::TLS_SERVER_ROOTS`) — always loaded, ensuring common public CAs are trusted everywhere.\n2. **System CA certificates** (`rustls_native_certs::load_native_certs`) — supplements the bundled set with org-internal and self-signed CAs.\n\nThe result is computed once and cached in a `OnceLock`. All client builders call `tls_config()` to share the same TLS configuration.\n\nIf no system certificates are found, a debug-level log message is emitted and the bundled roots are used exclusively.\n\n## Client builder API\n\n### Primary entry points\n\n| Function | Returns | Use when |\n|---|---|---|\n| [`proxied_client_builder()`] | `reqwest::ClientBuilder` | You need to customize the client (add headers, override timeouts, etc.) |\n| [`proxied_client()`] | `reqwest::Client` | You just need a ready-to-use client |\n\nBoth read the global proxy config via `active_proxy()` and apply the shared TLS config. The builder is pre-configured with:\n\n- **User-Agent:** `librefang/<version>`\n- **Connect timeout:** 30 seconds\n- **Read timeout:** 300 seconds (per-read inactivity, not total request time—streaming LLM responses stay alive as long as tokens arrive)\n\n### Per-provider proxy override\n\n[`proxied_client_with_override(proxy_url)`] builds a client that routes **all** traffic through the given proxy URL, bypassing the global config entirely. If the URL is invalid, it logs a warning and falls back to the global proxy client.\n\nUsed by provider-specific code that needs to route through a different proxy than the global default.\n\n### Internal builder\n\n[`build_http_client(proxy: &ProxyConfig)`] is the core construction function. It:\n\n1. Calls `tls_config()` for the preconfigured TLS backend.\n2. Sets the user agent and default timeouts.\n3. Applies explicit `ProxyConfig` values as `reqwest::Proxy` objects with an optional `NoProxy` filter.\n4. When `ProxyConfig` fields are `None`, **does nothing**—reqwest's built-in env var detection handles the fallback automatically, avoiding double-application of proxy settings that `init_proxy` already exported.\n\n### Legacy aliases\n\n- [`client_builder()`] → `proxied_client_builder()`\n- [`new_client()`] → `proxied_client()`\n\nThese exist for backward compatibility. Prefer the newer names in new code.\n\n## Proxy resolution order\n\nWhen a request is made through a client built by this crate, proxy resolution follows this precedence:\n\n1. **Explicit config values** from `ProxyConfig` (set via `init_proxy` from `config.toml`).\n2. **Environment variables** (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`) when config values are `None`. Since `init_proxy` exports config values as env vars during bootstrap, this acts as a consistent fallback.\n3. **No proxy** if neither source provides a value.\n\n### Supported proxy schemes\n\nValidated by `is_valid_proxy_url()`:\n\n| Scheme | Supported |\n|---|---|\n| `http://` | ✅ |\n| `https://` | ✅ |\n| `socks5://` | ✅ |\n| `socks5h://` | ✅ |\n| Other | ❌ (warns and skips) |\n\n## Thread safety\n\n| Component | Mechanism | Notes |\n|---|---|---|\n| `TLS_CONFIG` | `OnceLock` | Write-once, lock-free reads after initialization |\n| `GLOBAL_PROXY` | `RwLock<Option<ProxyConfig>>` | Supports hot-reload via `init_proxy`; readers use `active_proxy()` |\n| `std::env::set_var` | Only during bootstrap | Called before worker threads exist; never during hot-reload |\n\n## Usage across the codebase\n\nThis crate is a shared infrastructure dependency. Downstream consumers include:\n\n- **librefang-runtime** — provider health probes, tool execution (web fetch/search), embedding clients, image generation, TTS, media transcription, catalog sync\n- **librefang-runtime-oauth** — OAuth device flows, token refresh for ChatGPT and Copilot\n- **librefang-runtime-mcp** — MCP SSE and HTTP connections\n- **librefang-runtime-wasm** — host network fetch from WASM guests\n- **librefang-kernel** — device pairing notifications\n- **librefang-cli** — CLI HTTP client construction","shared-infrastructure-librefang-kernel-handle-src":"# Shared Infrastructure — librefang-kernel-handle-src\n\n# librefang-kernel-handle\n\nKernel callback trait that lets the agent runtime interact with the kernel without creating a circular dependency.\n\n## Purpose\n\n`librefang-runtime` drives the agent loop — processing messages, executing tools, and managing turn state. Many of those tools need to call *back* into the kernel: spawning agents, reading shared memory, publishing events, posting tasks, requesting approval, and so on. But the runtime cannot depend on the kernel crate directly, because the kernel depends on the runtime.\n\nThis crate breaks the cycle by defining `KernelHandle` — an `async_trait` that the kernel implements and injects into the agent loop at startup. The runtime only knows about the trait; the kernel owns the concrete implementation.\n\n## Architecture\n\n```mermaid\ngraph LR\n    K[\"librefang-kernel<br/>(implements KernelHandle)\"]\n    H[\"librefang-kernel-handle<br/>(defines trait)\"]\n    R[\"librefang-runtime<br/>(consumes KernelHandle)\"]\n    H --> K\n    H --> R\n    K -->|passes &dyn KernelHandle| R\n```\n\nThe kernel constructs a concrete type implementing `KernelHandle`, then passes a reference (typically `Arc<dyn KernelHandle>`) into the agent loop entry points. Every tool that needs kernel access receives the handle and calls methods on it.\n\n## Key Components\n\n### `AgentInfo`\n\n```rust\npub struct AgentInfo {\n    pub id: String,\n    pub name: String,\n    pub state: String,\n    pub model_provider: String,\n    pub model_name: String,\n    pub description: String,\n    pub tags: Vec<String>,\n    pub tools: Vec<String>,\n}\n```\n\nLightweight snapshot returned by `list_agents` and `find_agents`. Contains enough information for an agent to decide whether (and how) to interact with a peer — identity, state, model, description, tags, and available tools.\n\n### `KernelHandle` trait\n\nThe trait is large by design — it is the single surface area through which the runtime touches kernel state. Methods fall into functional groups:\n\n#### Agent lifecycle\n\n| Method | Sync/Async | Description |\n|---|---|---|\n| `spawn_agent` | async | Spawn from a TOML manifest. Returns `(id, name)`. `parent_id` tracks lineage. |\n| `spawn_agent_checked` | async | Like `spawn_agent` but validates that every capability in the child manifest is covered by `parent_caps`. Default delegates to `spawn_agent` with no enforcement — the kernel **must** override this with real checks. |\n| `list_agents` | sync | Return all running agents. |\n| `find_agents` | sync | Case-insensitive substring search on name, tag, or tool name. |\n| `kill_agent` | sync | Terminate an agent by ID. |\n| `send_to_agent` | async | Send a message to a peer and receive its response. |\n\n#### Shared memory\n\n| Method | Scoping | Description |\n|---|---|---|\n| `memory_store` | `peer_id` namespaces per-user isolation | Write a `serde_json::Value` under a key. |\n| `memory_recall` | same | Read a value; returns `Ok(None)` when absent. |\n| `memory_list` | same | Enumerate keys in a namespace. |\n\nThe `peer_id` parameter enables multi-user isolation: when `Some`, only keys stored under that peer are visible. When `None`, the key lives in the global namespace accessible to all.\n\n#### Task queue\n\n| Method | Description |\n|---|---|\n| `task_post` | Create a task; returns task ID. |\n| `task_claim` | Atomically claim the next available task for an agent. |\n| `task_complete` | Mark a claimed task done with a result string. |\n| `task_list` | List tasks, optionally filtered by status. |\n| `task_delete` | Delete a task by ID. |\n| `task_retry` | Reset a task to pending for re-execution. |\n\n#### Knowledge graph\n\n| Method | Description |\n|---|---|\n| `knowledge_add_entity` | Add an `Entity` node. |\n| `knowledge_add_relation` | Add a `Relation` edge. |\n| `knowledge_query` | Match against a `GraphPattern`, return `GraphMatch` results. |\n\nTypes (`Entity`, `Relation`, `GraphPattern`, `GraphMatch`) are defined in `librefang_types::memory`.\n\n#### Approval system\n\nThe approval flow supports two patterns:\n\n1. **Blocking** — `request_approval` suspends until a human approves, denies, or the request times out.\n2. **Deferred** — `submit_tool_approval` returns immediately with a `ToolApprovalSubmission` containing the request UUID. The tool execution is paused. Later, `resolve_tool_approval` is called (typically from an HTTP route handler) to resume or reject it.\n\nContext-aware gating is layered:\n\n- `requires_approval(tool_name)` → basic policy check.\n- `requires_approval_with_context(tool_name, sender_id, channel)` → enriches the decision with sender and channel. Default delegates to `requires_approval`.\n- `is_tool_denied_with_context(tool_name, sender_id, channel)` → hard denial before approval is even offered.\n\n`get_approval_status` provides a non-blocking poll of a pending request's state.\n\n#### Cron / scheduling\n\n| Method | Default |\n|---|---|\n| `cron_create` | Error: \"not available\" |\n| `cron_list` | Error: \"not available\" |\n| `cron_cancel` | Error: \"not available\" |\n\nThese have stub defaults because the cron subsystem is optional. The kernel overrides them when the scheduler is enabled. Tools `tool_cron_create`, `tool_cron_list`, `tool_cron_cancel`, `tool_schedule_create`, `tool_schedule_list`, and `tool_schedule_delete` in the runtime all route through these methods.\n\n#### Channel messaging\n\n| Method | Description |\n|---|---|\n| `send_channel_message` | Text to a recipient on an adapter (e.g. \"telegram\", \"email\"). Optional `thread_id` for replies. |\n| `send_channel_media` | Image or file by URL with optional caption. |\n| `send_channel_file_data` | Raw bytes with MIME type — used when `file_path` is provided in the tool call. |\n| `send_channel_poll` | Poll/quiz with options and optional correct-answer metadata. |\n\nAll default to errors. The kernel overrides for each configured channel adapter.\n\n#### Hands\n\n`hand_list`, `hand_install`, `hand_activate`, `hand_status`, `hand_deactivate` — manage \"Hands\", which are specialized autonomous agents. All default to \"not available\" errors.\n\n#### A2A (agent-to-agent) discovery\n\n`list_a2a_agents` returns `(name, url)` pairs of discovered external agents. `get_a2a_agent_url` looks up a single agent by name. Defaults return empty / `None`.\n\n#### Prompt versioning & experiments\n\nA complete prompt lifecycle surface for A/B testing and version control:\n\n- **Versions**: `get_prompt_version`, `list_prompt_versions`, `create_prompt_version`, `delete_prompt_version`, `set_active_prompt_version`, `auto_track_prompt_version`.\n- **Experiments**: `create_experiment`, `get_experiment`, `list_experiments`, `update_experiment_status`, `get_running_experiment`, `get_experiment_metrics`, `record_experiment_request`.\n\nMost default to no-ops or \"not available\" errors. `auto_track_prompt_version` is called during `build_prompt_setup` in the agent loop to automatically snapshot prompt changes.\n\n#### Goals\n\n`goal_list_active` and `goal_update` manage long-lived objectives. Defaults return empty or error.\n\n#### Workflows\n\n`run_workflow` executes a workflow by ID or name, passing input to the first step. Returns `(run_id, output)`. The `tool_workflow_run` tool in the runtime calls this.\n\n#### Agent primitives\n\n| Method | Default | Called by |\n|---|---|---|\n| `touch_heartbeat` | no-op | `run_agent_loop_streaming` / `run_agent_loop` — keeps the agent alive during long LLM calls |\n| `tool_timeout_secs` | `120` | `execute_single_tool_call` — enforces per-tool execution limits |\n| `max_agent_call_depth` | `5` | `tool_agent_send` — prevents recursive agent-call stacks |\n\n#### Forked agent execution\n\n`run_forked_agent_oneshot` is the structured-output-via-fork primitive. It spawns a forked agent turn that shares the parent's `(system + tools + messages)` prefix for prompt cache alignment, runs to completion with no tool calls allowed, and returns the final assistant text. Fork semantics guarantee:\n\n- Messages do **not** persist into the agent's canonical session.\n- The turn-end hook receives `is_fork: true` so auto-dream won't recurse.\n\nDefault returns an error. The proactive memory extractor calls this through `try_forked_extract` when the kernel supports it; otherwise it falls back to a standalone driver call.\n\n## Internal delegation\n\nTwo methods delegate to sibling methods within the trait:\n\n- **`spawn_agent_checked`** → calls `spawn_agent` after (optionally) checking capabilities. The kernel overrides to add enforcement; the default skips it.\n- **`requires_approval_with_context`** → calls `requires_approval`. The kernel overrides to add sender/channel-aware logic.\n\n## Default method strategy\n\nMost methods have safe defaults:\n\n- **Query/read methods** return `Ok(None)`, `Ok(vec![])`, or `Ok(default_value)`.\n- **Write/mutation methods** for optional subsystems (cron, hands, channel, approvals, workflows, prompt store, goals) return `Err(\"... not available\")`.\n- **Configuration methods** return sensible constants (`120` seconds, `5` call depth).\n\nThis lets kernel implementations override only the subsystems they support. Test harnesses and stubs can use the trait directly without implementing every method.\n\n## Relationship to other crates\n\n| Crate | Relationship |\n|---|---|\n| `librefang-kernel` | Implements `KernelHandle` for its core `Kernel` struct. Passes `Arc<dyn KernelHandle>` into the runtime. |\n| `librefang-runtime` | Consumes `&dyn KernelHandle` (or `Arc`) inside the agent loop and tool runner. Never depends on the kernel crate directly. |\n| `librefang-types` | Provides shared types: `Entity`, `Relation`, `GraphPattern`, `ApprovalDecision`, `DeferredToolExecution`, `Capability`, `PromptVersion`, `PromptExperiment`, etc. |","shared-infrastructure-librefang-kernel-metering-src":"# Shared Infrastructure — librefang-kernel-metering-src\n\n# librefang-kernel-metering\n\nCost tracking and spending-quota enforcement for LLM usage.\n\n## Overview\n\nThe metering engine records every LLM call, calculates its cost, and enforces spending limits at three levels of granularity:\n\n| Level | Scope | Time windows |\n|-------|-------|--------------|\n| **Per-agent** | Individual agent (by `AgentId`) | Hourly, daily, monthly (USD) |\n| **Per-provider** | LLM provider (e.g. `\"moonshot\"`, `\"litellm\"`) | Hourly, daily, monthly (USD) + hourly tokens |\n| **Global** | All agents across all providers | Hourly, daily, monthly (USD) |\n\nA limit of `0.0` at any level means *unlimited* — that window is skipped during enforcement.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller[\"LLM dispatch layer\"] -->|after each call| ACR[\"check_all_and_record\"]\n    ACR --> TX[\"SQLite transaction\"]\n    TX --> AQ[\"Agent quota check\"]\n    TX --> GQ[\"Global budget check\"]\n    TX --> PQ[\"Provider budget check\"]\n    TX --> REC[\"INSERT usage record\"]\n    AQ -->|fail| ROLL[\"ROLLBACK → QuotaExceeded\"]\n    GQ -->|fail| ROLL\n    PQ -->|fail| ROLL\n    AQ -->|pass| REC\n    GQ -->|pass| REC\n    PQ -->|pass| REC\n    REC --> COMMIT[\"COMMIT\"]\n```\n\n## MeteringEngine\n\nThe primary struct. It wraps an `Arc<UsageStore>` (SQLite-backed via `librefang-memory`).\n\n```rust\nlet engine = MeteringEngine::new(store);\n```\n\n### Recording usage\n\n**`record(&self, record: &UsageRecord)`** — Persists a usage event. This is the low-level insert; prefer the atomic methods below for production use.\n\n### Atomic check-and-record methods\n\nThese run the quota check and the insert inside a single SQLite transaction, closing the TOCTOU race where concurrent requests both pass the check before either writes its row.\n\n| Method | Checks performed |\n|--------|-----------------|\n| `check_quota_and_record` | Per-agent quota only |\n| `check_global_budget_and_record` | Global budget only |\n| `check_all_and_record` | Per-agent + global + per-provider (**preferred**) |\n\n`check_all_and_record` resolves the per-provider budget from `BudgetConfig.providers` using the `record.provider` field. If the provider string is empty or has no configured budget, the provider-level check is skipped.\n\nAll atomic methods **do not** insert the record on failure — the transaction rolls back entirely.\n\n### Non-atomic quota checks\n\nFor dashboards, pre-dispatch gating, or other read-only scenarios:\n\n- **`check_quota(agent_id, quota)`** — Per-agent hourly/daily/monthly cost.\n- **`check_global_budget(budget)`** — Global hourly/daily/monthly cost.\n- **`check_provider_budget(provider, budget)`** — Per-provider cost + hourly token limit.\n\nThese are subject to TOCTOU races and should not be relied on for enforcement. Use the atomic variants instead.\n\n### Reporting\n\n| Method | Returns | Purpose |\n|--------|---------|---------|\n| `budget_status(budget)` | `BudgetStatus` | Current spend, limits, and percentages for all windows |\n| `get_summary(agent_id)` | `UsageSummary` | Aggregate usage, optionally filtered by agent |\n| `get_by_model()` | `Vec<ModelUsage>` | Usage grouped by model |\n\n`BudgetStatus` is serializable (`serde::Serialize`) and suitable for API responses.\n\n### Maintenance\n\n**`cleanup(&self, days: u32)`** — Deletes usage records older than `days` days. Returns the number of rows removed.\n\n## Cost estimation\n\nTwo methods estimate the cost of an LLM call from token counts:\n\n### `estimate_cost` (static, no catalog)\n\nUses hardcoded default rates: **$1.00/M input**, **$3.00/M output**. Use this only as a fallback (e.g. unit tests).\n\n### `estimate_cost_with_catalog` (static, catalog-aware)\n\nLooks up per-model pricing from `ModelCatalog`. Falls back to default rates if the model isn't found.\n\n#### Token pricing tiers\n\nThe cost formula distinguishes four categories of input tokens:\n\n| Category | Price multiplier (relative to base input rate) |\n|----------|-------------------------------------------------|\n| Regular input tokens | 1.0× |\n| Cache-read tokens | 0.1× (90% discount) |\n| Cache-creation tokens | 1.25× (25% surcharge) |\n| Output tokens | Base output rate |\n\nRegular input is computed as `input_tokens - cache_read_input_tokens - cache_creation_input_tokens`, using saturating subtraction.\n\n#### Special cases\n\n- **ChatGPT session-auth models** (`provider == \"chatgpt\"`) with zero catalog pricing: the engine applies legacy default rates ($1/$3 per million) as a conservative budget estimate, since these models don't expose billable pricing but still consume resources.\n- **Local-tier models** with zero pricing: cost is $0.00 — no fallback.\n- **Subscription-based providers** (e.g. `alibaba-coding-plan`): token usage is tracked for analytics but cost reads as $0.00. Monitor usage through the provider's console instead.\n\n### Cost calculation example\n\nWith default rates, 1M total input (400k cache-read, 100k cache-creation) and 1M output:\n\n```\nRegular input:  500k / 1M × $1.00 = $0.500\nCache read:     400k / 1M × $1.00 × 0.10 = $0.040\nCache creation: 100k / 1M × $1.00 × 1.25 = $0.125\nOutput:         1M   / 1M × $3.00 = $3.000\n                                  ─────────\nTotal:                               $3.665\n```\n\n## Error handling\n\nAll enforcement methods return `LibreFangError::QuotaExceeded` on failure. The error message includes the scope (agent/provider/global), the time window, current spend, and limit — for example:\n\n```\nAgent abc123 exceeded hourly cost quota: $0.0500 / $0.0100\nProvider 'moonshot' exceeded daily cost budget: $2.5000 / $2.0000\nGlobal monthly budget exceeded: $150.0000 / $100.0000\n```\n\n## Dependencies\n\n| Crate | What's used |\n|-------|-------------|\n| `librefang-memory` | `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage`, `MemorySubstrate` |\n| `librefang-types` | `AgentId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `LibreFangError`, `ModelCatalogEntry` |\n| `librefang-runtime` | `ModelCatalog` (pricing lookup) |\n","shared-infrastructure-librefang-kernel-router-src":"# Shared Infrastructure — librefang-kernel-router-src\n\n# librefang-kernel-router\n\nMessage-to-agent routing engine. Given a free-text user message, this module selects the most appropriate agent template or hand by blending keyword matching with optional embedding-based semantic similarity.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[\"User message\"] --> HAND[\"auto_select_hand()\"]\n    MSG --> TPL[\"auto_select_template()\"]\n\n    HAND --> HRC[\"hand_route_candidates()\"]\n    HRC --> HANDS[\"HAND.toml files<br/>(registry/hands/)\"]\n\n    TPL --> RULES[\"TEMPLATE_RULES<br/>(hard-coded regex)\"]\n    TPL --> META[\"auto_select_template_from_metadata()\"]\n    META --> MRC[\"manifest_route_candidates()\"]\n    MRC --> MANIFESTS[\"agent.toml files<br/>(workspaces/agents/)\"]\n\n    RULES --> SCORE[\"Score + sort\"]\n    META --> SCORE\n    SCORE --> FALLBACK{\"Multi-domain?\"}\n    FALLBACK -->|\"yes\"| ORCH[\"orchestrator\"]\n    FALLBACK -->|\"no\"| BEST[\"Best template\"]\n\n    style MSG fill:#f9f,stroke:#333\n    style ORCH fill:#ff9,stroke:#333\n```\n\n## Two Routing Layers\n\nThe module maintains two independent routing subsystems that share the same scoring philosophy:\n\n| Aspect | Template routing | Hand routing |\n|---|---|---|\n| Entry point |
