inated\n    Terminated --> [*]\n```\n\n### AgentMode (Permission Level)\n\n| Mode | Effect |\n|---|---|\n| `Observe` | No tools at all — agent can only reason |\n| `Assist` | Read-only tools only (`file_read`, `file_list`, `memory_list`, `memory_recall`, `web_fetch`, `web_search`, `agent_list`) |\n| `Full` | All granted tools (default) |\n\n`AgentMode::filter_tools()` enforces these restrictions on a `Vec<ToolDefinition>` at dispatch time.\n\n### Session Reset Flags\n\n`AgentEntry` carries two session-reset flags that are critical for crash recovery:\n\n- **`force_session_wipe`** — next LLM call clears message history but keeps the `session_id`. Set by operator action or stuck-loop recovery. Takes priority over `resume_pending`.\n- **`resume_pending`** — agent was interrupted by restart/shutdown; recovery is expected on the same transcript. Cleared after the next successful turn.\n\nThe **`has_processed_message`** flag distinguishes agents that have genuinely processed at least one message from agents that were spawned but never received work. The heartbeat monitor uses this to avoid pushing never-used agents into a crash-recover loop.\n\n---\n\n## Approval System\n\nWhen an agent attempts a dangerous operation, the kernel creates an `ApprovalRequest`, pauses the agent, and waits for a human operator to respond with an `ApprovalResponse`. The `ApprovalPolicy` controls which tools are gated, timeouts, TOTP requirements, and notification routing.\n\n### ApprovalPolicy\n\n```rust\npub struct ApprovalPolicy {\n    pub require_approval: Vec<String>,     // tool names / globs\n    pub timeout_secs: u64,                 // 10..=300\n    pub auto_approve_autonomous: bool,\n    pub auto_approve: bool,                // shorthand: clears require list\n    pub trusted_senders: Vec<String>,      // bypass approval gate\n    pub channel_rules: Vec<ChannelToolRule>,\n    pub timeout_fallback: TimeoutFallback,\n    pub routing: Vec<ApprovalRoutingRule>,\n    pub second_factor: SecondFactor,\n    pub totp_tools: Vec<String>,           // glob patterns\n    pub totp_grace_period_secs: u64,\n    // ...\n}\n```\n\n**Default gated tools**: `shell_exec`, `file_write`, `file_delete`, `apply_patch`, `skill_evolve_*`.\n\nThe `require_approval` field accepts either a list of tool names/globs or a boolean shorthand:\n- `require_approval = false` → no tools gated\n- `require_approval = true` → the default mutation set\n\n### ApprovalDecision\n\n```rust\npub enum ApprovalDecision {\n    Approved,\n    Denied,\n    TimedOut,\n    ModifyAndRetry { feedback: String },\n    Skipped,\n}\n```\n\nCustom serialization: simple variants become plain strings (`\"approved\"`), while `ModifyAndRetry` becomes `{\"type\": \"modify_and_retry\", \"feedback\": \"...\"}`. This allows operators to request the agent modify its approach and retry with human feedback.\n\n### TimeoutFallback\n\n| Variant | Behavior |\n|---|---|\n| `Deny` | Default — auto-deny on timeout |\n| `Skip` | Skip the tool, agent continues without it |\n| `Escalate { extra_timeout_secs }` | Re-notify with extended timeout |\n\n### Channel-Level Rules\n\n`ChannelToolRule` provides per-channel tool authorization. Rules are evaluated in order; deny always wins over allow:\n\n```toml\n[[approval.channel_rules]]\nchannel = \"telegram\"\nallowed_tools = [\"file_read\", \"web_search\"]\ndenied_tools = [\"shell_exec\"]\n```\n\nWildcard patterns are supported — `file_*` matches `file_read`, `file_write`, etc.\n\n### Second Factor (TOTP)\n\n`SecondFactor` controls where TOTP verification is enforced:\n\n| Variant | Login | Approvals |\n|---|---|---|\n| `None` | ✗ | ✗ |\n| `Totp` | ✗ | ✓ |\n| `Login` | ✓ | ✗ |\n| `Both` | ✓ | ✓ |\n\n`totp_tools` scopes TOTP to specific tool patterns. When empty, all tools in `require_approval` need TOTP. The `totp_grace_period_secs` (max 3600) lets operators skip re-verification for repeated approvals within a time window.\n\n### Notification Routing\n\n`ApprovalRoutingRule` maps tool patterns to notification targets:\n\n```rust\npub struct ApprovalRoutingRule {\n    pub tool_pattern: String,           // e.g. \"shell_*\"\n    pub route_to: Vec<NotificationTarget>,\n}\n```\n\n`NotificationTarget` specifies a channel type (telegram, slack, email), recipient, and optional thread/topic ID.\n\n### Validation\n\nBoth `ApprovalRequest` and `ApprovalPolicy` implement `validate()` methods that enforce length limits, character restrictions, and range checks. Tool names accept alphanumeric characters, underscores, and a single `*` wildcard. All validation is defensive — the kernel calls these before persisting or dispatching.\n\n---\n\n## Serialization Notes\n\n### Lenient Deserialization\n\nMany collection fields use custom deserializers from `crate::serde_compat` (e.g., `vec_lenient`, `map_lenient`) that coerce `null` and malformed values into empty collections rather than failing. This makes hot-reload robust to partial TOML updates.\n\n### Default Booleans\n\nFields like `generate_identity_files`, `enabled`, `show_progress`, `auto_evolve`, and `inherit_parent_context` use `default_true()` — they opt out via explicit `false` rather than opting in. This matches the principle of least surprise for new agents.\n\n### Stable Prefix Mode\n\nThe constant `STABLE_PREFIX_MODE_METADATA_KEY` (`\"stable_prefix_mode\"`) is a metadata key used to flag agents running in deterministic-prefix mode. Checked in the kernel's agent-loop routing logic.","skills-extensions-librefang-extensions-src":"# Skills & Extensions — librefang-extensions-src\n\n# librefang-extensions\n\nMCP server catalog, encrypted credential vault, OAuth2 PKCE flows, health monitoring, and installation logic for LibreFang.\n\nAll configured MCP servers live as `[[mcp_servers]]` entries in `~/.librefang/config.toml`. An optional `template_id` field on each entry points back to the catalog template it was installed from. There is no separate `integrations.toml`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"On Disk\"\n        CT[\"catalog/*.toml\"]\n        VE[\"vault.enc\"]\n        ENV[\".env / secrets.env\"]\n        CFG[\"config.toml\"]\n    end\n\n    subgraph \"librefang-extensions\"\n        MC[\"McpCatalog\"]\n        CV[\"CredentialVault\"]\n        CR[\"CredentialResolver\"]\n        HM[\"HealthMonitor\"]\n        INST[\"Installer\"]\n        OA[\"OAuth PKCE\"]\n        DL[\"dotenv loader\"]\n    end\n\n    CT -->|load| MC\n    VE -->|unlock| CV\n    ENV -->|read| CR\n    CV -->|1st priority| CR\n    MC -->|template lookup| INST\n    CR -->|credential check| INST\n    INST -->|produces McpServerConfigEntry| CFG\n    DL -->|injects into std::env| CR\n```\n\n## Core Types (`lib.rs`)\n\n`ExtensionError` enumerates all failure modes — `NotFound`, `AlreadyInstalled`, `Vault`, `VaultLocked`, `OAuth`, `TomlParse`, `Io`, `Http`, `HealthCheck`, and `CredentialNotFound`. All public functions return `ExtensionResult<T>`, an alias for `Result<T, ExtensionError>`.\n\nKey shared types:\n\n| Type | Purpose |\n|---|---|\n| `McpCategory` | Enum: `DevTools`, `Productivity`, `Communication`, `Data`, `Cloud`, `AI` |\n| `McpStatus` | Server lifecycle: `Ready`, `Setup`, `Available`, `Error(String)`, `Disabled` |\n| `McpCatalogEntry` | Full catalog template — id, name, transport, required env, OAuth config, health check config |\n| `McpCatalogTransport` | Template transport variants: `Stdio { command, args }`, `Sse { url }`, `Http { url }` |\n| `McpCatalogRequiredEnv` | Describes one required env var: name, label, help text, `is_secret`, optional `get_url` |\n| `OAuthTemplate` | OAuth provider config: provider name, scopes, auth_url, token_url |\n| `HealthCheckConfig` | `interval_secs` and `unhealthy_threshold` with sensible defaults (60s / 3 failures) |\n\n`McpCatalogTransport` maps to `librefang_types::config::McpTransportEntry` at install time. The `HttpCompat` variant is intentionally absent from the catalog — it's a power-user transport that doesn't ship as a template.\n\n---\n\n## MCP Catalog (`catalog`)\n\nRead-only in-memory index of all template TOML files under `~/.librefang/mcp/catalog/`. Templates are refreshed from the upstream registry by `librefang_runtime::registry_sync`.\n\n### File Layout\n\nTwo layouts are recognized:\n\n- **Flat**: `<id>.toml` — the id is the filename minus the extension.\n- **Directory**: `<id>/MCP.toml` — for multi-file MCP packages; the id is the directory name.\n\nThis mirrors `web/scripts/fetch-registry.ts` so catalog loading, the live API, and the UI all agree on identity.\n\n### McpCatalog API\n\n```rust\nlet mut catalog = McpCatalog::new(&home_dir);\nlet count = catalog.load(&home_dir); // full reload — clears stale entries first\n```\n\n- **`load(&mut self, home_dir: &Path) -> usize`** — Re-reads all template files. Accepts `home_dir` explicitly so tests can share a single home directory. Performs a full clear-and-reload so deleted/renamed files on disk don't linger.\n- **`get(id: &str) -> Option<&McpCatalogEntry>`** — Lookup by id.\n- **`list() -> Vec<&McpCatalogEntry>`** — All entries sorted by id.\n- **`list_by_category(category: &McpCategory) -> Vec<&McpCatalogEntry>`** — Filtered list.\n- **`search(query: &str) -> Vec<&McpCatalogEntry>`** — Case-insensitive substring match against id, name, description, and tags.\n\n---\n\n## Credential Vault (`vault`)\n\nAES-256-GCM encrypted secret storage at `~/.librefang/vault.enc`.\n\n### Encryption Scheme\n\n1. A 32-byte master key is generated on `init()`.\n2. Master key is stored in the OS keyring (macOS Keychain / Windows Credential Manager / Linux Secret Service via `libsecret`).\n3. If the OS keyring is unavailable, a file-based fallback at `$LOCAL_DATA/librefang/.keyring` wraps the master key with AES-256-GCM using an Argon2id-derived key from a machine fingerprint (username + hostname hash).\n4. Each `save()` generates a fresh random salt + nonce, derives an encryption key via Argon2id from the master key + salt, and encrypts the JSON-serialized entries with AES-256-GCM.\n5. On-disk format starts with the `OFV1` magic header followed by a JSON `VaultFile` struct (version, salt, nonce, ciphertext — all base64). Legacy JSON-only files (no magic header, starting with `{`) are still readable for backward compatibility.\n\n### Key Resolution Order\n\n`resolve_master_key()` tries, in order:\n1. Cached key (from a previous unlock/init on this instance)\n2. OS keyring\n3. `LIBREFANG_VAULT_KEY` environment variable\n\nIf none resolve, returns `ExtensionError::VaultLocked`.\n\n### CredentialVault API\n\n```rust\nlet mut vault = CredentialVault::new(path);\nvault.init()?;                        // first-time setup — generates key, stores in keyring\nvault.unlock()?;                      // decrypts and loads entries\n\nvault.set(\"API_KEY\".into(), Zeroizing::new(\"secret\".into()))?;\nlet val = vault.get(\"API_KEY\");       // Option<Zeroizing<String>>\nvault.remove(\"API_KEY\")?;             // returns bool — was it present?\nlet keys = vault.list_keys();         // Vec<&str> — no values exposed\n```\n\nFor testing or programmatic use without the OS keyring:\n\n```rust\nlet key = Zeroizing::new([0u8; 32]); // your own 32-byte key\nvault.init_with_key(key.clone())?;\nvault.unlock_with_key(key)?;\n```\n\nAll in-memory secrets use `Zeroizing<String>` or `Zeroizing<[u8; 32]>`. On `Drop`, the vault clears its entries map and cached key.\n\n### Keyring File Migration\n\nThe file-based keyring supports two versions:\n- **v1 (legacy)**: XOR-obfuscated with a SHA-256 mask derived from the machine fingerprint. Automatically detected and re-stored in v2 format on load.\n- **v2 (current)**: AES-256-GCM wrapped with Argon2id-derived key from the machine fingerprint.\n\n---\n\n## Credential Resolver (`credentials`)\n\nMulti-source credential resolution with a defined priority chain.\n\n### Resolution Order\n\n| Priority | Source | Notes |\n|---|---|---|\n| 1 | Encrypted vault (`vault.enc`) | Must be unlocked |\n| 2 | Dotenv file (`~/.librefang/.env`) | Loaded at construction time |\n| 3 | Process environment variable | `std::env::var` |\n| 4 | Interactive prompt (CLI only) | When `interactive` is enabled |\n\n### CredentialResolver API\n\n```rust\nlet resolver = CredentialResolver::new(Some(vault), Some(dotenv_path.as_ref()))\n    .with_interactive(true);\n\n// Single key\nlet secret = resolver.resolve(\"GITHUB_TOKEN\"); // Option<Zeroizing<String>>\n\n// Bulk\nlet creds = resolver.resolve_all(&[\"KEY_A\", \"KEY_B\", \"KEY_C\"]);\nlet missing = resolver.missing_credentials(&[\"KEY_A\", \"KEY_B\"]); // Vec<String>\n\n// Check without side effects\nif resolver.has_credential(\"KEY_A\") { ... }\n\n// Store to vault\nresolver.store_in_vault(\"NEW_KEY\", Zeroizing::new(\"value\".into()))?;\n\n// Invalidate dotenv cache entry after dashboard deletion\nresolver.clear_dotenv_cache(\"STALE_KEY\");\n```\n\n`has_credential` skips the interactive prompt — it only checks vault, dotenv, and env.\n\n### Dotenv File Format\n\nStandard `KEY=VALUE` lines. Comments (`#`), blank lines, and surrounding quotes (single or double) are handled. See `credentials::load_dotenv` for parsing details.\n\n---\n\n## Dotenv Loader (`dotenv`)\n\nShared startup routine that injects secrets into the process environment. Used by every entry point (CLI, desktop app, kernel) to ensure consistent credential loading.\n\n### Priority (highest first)\n\n1. System environment variables (already set) — **never overridden**\n2. Credential vault (`vault.enc`) secrets\n3. `~/.librefang/.env`\n4. `~/.librefang/secrets.env`\n\n### Usage\n\n```rust\n// Call once from synchronous main() BEFORE spawning any tokio runtime.\n// std::env::set_var is UB in Rust 1.80+ once other threads exist.\ndotenv::load_dotenv();\n```\n\nThe call is `Once`-guarded — repeated calls are no-ops.\n\n### File Management\n\n```rust\ndotenv::save_env_key(\"API_KEY\", \"value\")?;  // upserts into .env, sets 0600 on Unix\ndotenv::remove_env_key(\"API_KEY\")?;          // removes from .env and current process\ndotenv::list_env_keys();                      // Vec<String> of key names only\ndotenv::env_file_exists();                    // bool\n```\n\nFiles are written with a managed header comment and 0600 permissions on Unix. Values containing spaces, `#`, or `\"` are double-quoted with escaped inner quotes.\n\n---\n\n## Health Monitor (`health`)\n\nConcurrent-safe health tracking for configured MCP servers using `DashMap`.\n\n### McpHealth Record\n\nEach tracked server stores: id, status, tool count, last-ok timestamp, last error, consecutive failure count, reconnect state, and connected-since timestamp.\n\n### Auto-Reconnect\n\nExponential backoff: 5s → 10s → 20s → 40s → ... → capped at `max_backoff_secs` (default 300s). Maximum 10 attempts (configurable). Background tokio tasks call `report_ok` / `report_error` and check `should_reconnect`.\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig {\n    auto_reconnect: true,\n    max_reconnect_attempts: 10,\n    max_backoff_secs: 300,\n    check_interval_secs: 60,\n});\n\nmonitor.register(\"github\");\nmonitor.report_ok(\"github\", 12);           // marks Ready, resets failure count\nmonitor.report_error(\"github\", \"timeout\".into()); // increments consecutive_failures\n\nlet health = monitor.get_health(\"github\"); // Option<McpHealth>\nlet all = monitor.all_health();            // Vec<McpHealth>\n\nlet backoff = monitor.backoff_duration(3); // Duration — exponential, capped\nif monitor.should_reconnect(\"github\") {\n    monitor.mark_reconnecting(\"github\");\n}\n```\n\nThe `health_map()` method returns `Arc<DashMap<String, McpHealth>>` for background task integration.\n\n---\n\n## Installer (`installer`)\n\nPure transforms — no side effects. Converts a catalog template + provided credentials into a `McpServerConfigEntry` that the caller persists to `config.toml`.\n\n### install_integration\n\n```rust\nlet result = install_integration(\n    &catalog,\n    &mut resolver,\n    \"github\",                          // catalog entry id\n    &provided_keys,                    // HashMap<String, String> of user-supplied creds\n)?;\n```\n\nSteps:\n1. Look up the template in the catalog.\n2. Store provided credentials in the vault (best-effort — warns on failure).\n3. Check which required env vars are still missing after combining provided keys with resolved credentials.\n4. Map the template transport and required env into a `McpServerConfigEntry` via `catalog_entry_to_mcp_server`.\n5. Return an `InstallResult` with the server entry, status (`Ready` if all creds present, `Setup` if missing), and a human-readable message.\n\nThe returned `InstallResult.server` has `template_id` set so the dashboard can trace it back to the catalog entry.\n\n### Scaffold Commands\n\n- **`scaffold_integration(dir)`** — Creates a `mcp.toml` template file in the given directory for a new custom MCP server.\n- **`scaffold_skill(dir)`** — Creates `skill.toml` + `SKILL.md` for a new custom skill.\n\n---\n\n## OAuth (`oauth`)\n\nOAuth2 Authorization Code + PKCE (S256) flows for Google, GitHub, Microsoft, and Slack.\n\n### Flow\n\n```rust\nlet tokens = run_pkce_flow(&oauth_template, &client_id).await?;\n```\n\n1. Generate PKCE verifier + SHA-256 challenge, plus a random CSRF state parameter.\n2. Bind a temporary localhost TCP listener on a random port.\n3. Build the authorization URL with `code_challenge_method=S256`.\n4. Open the user's browser (platform-specific: `open` on macOS, `xdg-open` on Linux, `start` on Windows). Falls back to printing the URL to stderr.\n5. Serve a single `/callback` route via `axum` that validates the state, extracts the authorization code, and responds with a success/closed HTML page.\n6. Exchange the code for tokens via POST to `token_url` with the PKCE `code_verifier`.\n7. Return `OAuthTokens` (re-exported from `librefang_types::oauth::OAuthTokens`).\n\nThe flow has a 5-minute timeout. Client IDs default to placeholder values — configure real ones via `OAuthConfig` (which `resolve_client_ids` merges with defaults).\n\n---\n\n## HTTP Client (`http_client`)\n\nShared `reqwest::Client` builder that loads native CA roots first and falls back to Mozilla's `webpki_roots` bundle if none are found. Uses `aws_lc_rs` as the TLS crypto provider.\n\n```rust\nlet client = new_client(); // reqwest::Client — panics on build failure (should never happen)\nlet builder = client_builder(); // reqwest::ClientBuilder — for custom configuration\n```\n\n---\n\n## Cross-Module Integration Points\n\n**Vault → API authentication**: The kernel's `mcp_oauth_provider` calls `vault_get` → `vault.unlock()` → `resolve_master_key()` during TOTP setup/revoke flows and dashboard session token resolution.\n\n**Dotenv → Every binary**: `dotenv::load_dotenv()` must be called from the synchronous `main()` of every binary (CLI, desktop, kernel) before any async runtime starts. This ensures secrets are available in `std::env` for all downstream consumers.\n\n**Catalog → Installer → Config**: The CLI/API layer calls `install_integration` with the catalog and resolver, then persists the resulting `McpServerConfigEntry` to `config.toml` and triggers a kernel reload.\n\n**Health Monitor → Kernel**: The kernel registers MCP servers with the `HealthMonitor`, background tasks report health, and `should_reconnect` drives auto-reconnection logic with exponential backoff.","skills-extensions-librefang-skills-src":"# Skills & Extensions — librefang-skills-src\n\n# librefang-skills\n\nSkill lifecycle management for LibreFang — marketplace discovery, installation, configuration injection, agent-driven self-evolution, and version control.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"CLI commands\"]\n    API[\"HTTP API routes\"]\n    Runtime[\"Tool runner\"]\n\n    subgraph librefang-skills\n        Market[\"marketplace.rs\"]\n        Claw[\"clawhub.rs\"]\n        Registry[\"registry.rs\"]\n        Evolution[\"evolution.rs\"]\n        Config[\"config_injection.rs\"]\n        Compat[\"openclaw_compat.rs\"]\n        Verify[\"verify.rs\"]\n        Publish[\"publish.rs\"]\n        Loader[\"loader.rs\"]\n    end\n\n    CLI --> Market\n    CLI --> Evolution\n    CLI --> Registry\n    CLI --> Publish\n    API --> Evolution\n    Runtime --> Registry\n    Runtime --> Loader\n\n    Market --> Claw\n    Market --> Compat\n    Claw --> Verify\n    Claw --> Compat\n    Evolution --> Verify\n    Registry --> Compat\n    Publish --> Compat\n```\n\nThe crate is organized around four responsibilities:\n\n| Responsibility | Files | Purpose |\n|---|---|---|\n| **Discovery & Install** | `clawhub.rs`, `marketplace.rs` | Search/browse ClawHub, download, convert, security-scan, install |\n| **Runtime Registry** | `registry.rs`, `loader.rs` | Load skills from disk, freeze/unfreeze, find tool providers |\n| **Configuration** | `config_injection.rs` | Collect and resolve per-skill config vars into system prompts |\n| **Self-Evolution** | `evolution.rs` | Agent-driven skill creation, fuzzy patching, versioning, rollback |\n| **Shared Infrastructure** | `openclaw_compat.rs`, `verify.rs`, `publish.rs` | Format conversion, security scanning, packaging |\n\n---\n\n## ClawHub Marketplace Client — `clawhub.rs`\n\nHTTP client for the ClawHub skill marketplace at `clawhub.ai/api/v1`. Handles search, browse, detail queries, file fetching, and full skill installation with security scanning.\n\n### API Endpoints\n\n| Method | Endpoint | Returns |\n|---|---|---|\n| `search()` | `GET /api/v1/search?q=...&limit=N` | `ClawHubSearchResponse` (key: `results`) |\n| `browse()` | `GET /api/v1/skills?limit=N&sort=...` | `ClawHubBrowseResponse` (key: `items`, paginated via `next_cursor`) |\n| `get_skill()` | `GET /api/v1/skills/{slug}` | `ClawHubSkillDetail` |\n| `get_file()` | `GET /api/v1/skills/{slug}/file?path=SKILL.md` | Raw file content |\n| `install()` | `GET /api/v1/download?slug=...` | Downloads zip/SKILL.md → full install pipeline |\n\n### Client Construction\n\n```rust\nlet client = ClawHubClient::new(cache_dir);\n// Or with custom base URL:\nlet client = ClawHubClient::with_url(\"http://localhost:8080/api/v1\", cache_dir);\n```\n\nTLS verification can be disabled by setting `LIBREFANG_DANGEROUSLY_SKIP_TLS_VERIFICATION=true` or `1` — intended exclusively for development against servers with expired certificates.\n\n### Retry and Rate Limiting\n\nAll API calls go through `get_with_retry()`, which handles:\n\n- **429 Too Many Requests** — respects the `Retry-After` header when present; otherwise uses exponential backoff with jitter\n- **5xx server errors** — same retry strategy\n- **Network/timeout errors** — retryable up to `MAX_RETRIES` (5 attempts)\n\nConstants:\n\n| Constant | Value | Meaning |\n|---|---|---|\n| `MAX_RETRIES` | 5 | Total attempts including the first |\n| `BASE_DELAY_MS` | 1,500 | Base for exponential backoff |\n| `MAX_DELAY_MS` | 30,000 | Hard cap on any single delay |\n\nThe jitter is derived from system-clock nanos hashed with a Knuth multiplicative constant, adding 0–25% randomness to each delay.\n\n### Installation Pipeline\n\n`install()` and `install_from_bytes()` run a multi-stage security pipeline:\n\n```\n1. Download → compute SHA256\n2. Detect format (SKILL.md front-matter vs PK zip header vs package.json)\n3. Extract: zip entries get path-traversal checks; SKILL.md saved directly\n4. Convert to LibreFang manifest via openclaw_compat\n5. Security scan: manifest scan + prompt injection scan\n6. Binary dependency check (which_check for each required_bins entry)\n7. Write skill.toml\n```\n\n**Prompt-only skills** with critical prompt-injection warnings are blocked entirely — the skill directory is removed and `SkillError::SecurityBlocked` is returned.\n\n**Path safety**: `resolve_skill_child_path()` rejects absolute paths and any path component that isn't `Component::Normal`, preventing zip-slip attacks. `validate_slug()` ensures slugs contain only `[a-zA-Z0-9_-]`.\n\n### Response Types\n\nThe ClawHub API uses `camelCase` JSON. Key types and their relationships:\n\n- `ClawHubSearchResponse` → contains `results: Vec<ClawHubSearchEntry>` (flatter structure, includes `score`)\n- `ClawHubBrowseResponse` → contains `items: Vec<ClawHubBrowseEntry>` (richer structure, includes `stats`, `tags`, `latest_version`)\n- `ClawHubSkillDetail` → contains nested `skill: ClawHubSkillInfo`, `latest_version`, `owner`, `moderation`\n\n`ClawHubStats` includes `installsAllTime`, `installsCurrent`, `installs`, `downloads`, `stars`, `comments`, and `versions` — all defaulting to 0.\n\nBackward-compat type aliases exist: `ClawHubListResponse` = `ClawHubBrowseResponse`, `ClawHubSearchResults` = `ClawHubSearchResponse`, `ClawHubEntry` = `ClawHubBrowseEntry`.\n\n### Sort Orders\n\n`ClawHubSort` enum values: `Trending`, `Updated`, `Downloads`, `Stars`, `Rating` — passed as the `sort` query parameter in `browse()`.\n\n---\n\n## Skill Config Injection — `config_injection.rs`\n\nSkills declare configuration dependencies via `[[config_vars]]` in their `skill.toml`. This module collects those declarations, resolves them against the user's config file, and formats them for injection into the system prompt.\n\n### Storage Convention\n\nA declared key like `wiki.base_url` is looked up at path `skills.config.wiki.base_url` in `~/.librefang/config.toml`:\n\n```toml\n# In skill.toml:\n[[config_vars]]\nkey = \"wiki.base_url\"\ndescription = \"Base URL of the internal wiki\"\ndefault = \"https://wiki.example.com\"\n\n# In ~/.librefang/config.toml:\n[skills.config.wiki]\nbase_url = \"https://wiki.corp.example.com\"\n```\n\n### Resolution Flow\n\n```\ncollect_config_vars(skills) → Vec<SkillConfigVar>\n     ↓ deduplicates by key, first declaration wins\n     ↓ skips empty keys / missing descriptions\n     ↓ skips disabled skills\nresolve_config_vars(vars, config_toml) → Vec<(String, String)>\n     ↓ walks dotted path in TOML tree\n     ↓ empty-string values treated as absent\n     ↓ falls back to declared default\n     ↓ omits entries with neither value nor default\nformat_config_section(resolved) → String\n     → \"## Skill Config Variables\\nwiki.base_url = ...\"\n```\n\n### Key Functions\n\n- **`collect_config_vars(skills: &[InstalledSkill])`** — Gathers all `config_vars` from enabled skills, deduplicating by key.\n- **`resolve_config_vars(vars: &[SkillConfigVar], config_toml: &toml::Value)`** — Resolves each key against the config TOML tree, falling back to defaults.\n- **`format_config_section(resolved: &[(String, String)])`** — Formats as a markdown section for system prompt injection. Returns empty string when no vars are resolved.\n\nThe dotted-path resolver (`resolve_dotpath`) walks nested `toml::Value::Table` nodes. Scalar values (string, integer, float, boolean, datetime) are converted to strings; arrays and tables are serialized as compact TOML as a fallback.\n\n---\n\n## Skill Self-Evolution — `evolution.rs`\n\nAgent-driven skill lifecycle management. Agents can create new skills from successful task approaches, patch existing skills with fuzzy find-and-replace, manage supporting files, and roll back to previous versions.\n\n### Core Operations\n\n| Function | Purpose |\n|---|---|\n| `create_skill()` | Create a new PromptOnly skill from scratch |\n| `update_skill()` | Full prompt_context rewrite |\n| `patch_skill()` | Fuzzy find-and-replace within prompt_context |\n| `rollback_skill()` | Restore previous prompt_context from snapshot |\n| `delete_skill()` | Agent-initiated deletion (local skills only) |\n| `uninstall_skill()` | User-initiated deletion (any skill source) |\n| `write_supporting_file()` | Add files to references/, templates/, scripts/, assets/ |\n| `remove_supporting_file()` | Remove supporting files |\n| `list_supporting_files()` | Enumerate all supporting files |\n| `record_skill_usage()` | Increment use counter |\n| `get_evolution_info()` | Read `.evolution.json` metadata |\n\n### Concurrency Model\n\nAll mutations are serialized through per-skill exclusive file locks:\n\n- Lock files live at `{skills_dir}/.evolution-locks/{name}.lock` — **outside** the skill directory so they survive `remove_dir_all` (important on Windows where open handles block deletion)\n- Implemented via `fs2::FileExt::lock_exclusive()` (flock on Unix, LockFileEx on Windows)\n- Lock is acquired **before** any filesystem work, including directory existence checks\n\nEvery mutation function re-reads `skill.toml` from disk after acquiring the lock to get the current version number, preventing concurrent writers from producing duplicate version numbers.\n\n### Atomic Writes\n\nAll file writes use `atomic_write()`, which:\n\n1. Writes to a temp file named `.tmp.{filename}.{pid}.{tid}.{counter}.{nanos}`\n2. Calls `fs::rename` to swap it into place\n\nThe temp-file name incorporates a per-process monotonic counter (`ATOMIC_WRITE_COUNTER`), thread ID, process ID, and nanosecond timestamp, making collisions extremely unlikely even under concurrent access.\n\n### Fuzzy Find-and-Replace\n\n`fuzzy_find_and_replace()` tries six strategies in order from strict to loose:\n\n| # | Strategy | Description | Use Case |\n|---|---|---|---|\n| 1 | **Exact** | Literal substring match | Exact text available |\n| 2 | **LineTrimmed** | Trim leading/trailing whitespace per line | Indentation variance |\n| 3 | **WhitespaceNormalized** | Collapse whitespace runs to single space | Formatting differences |\n| 4 | **IndentFlexible** | Strip all leading whitespace per line | Deeply-indented blocks |\n| 5 | **BlockAnchor** | Match first+last lines, ≥60% middle similarity | Large blocks with minor changes |\n| 6 | **WhitespaceStripped** | Remove ALL whitespace, substring match | CJK content where inter-character spaces are meaningless |\n\nWhen multiple matches are found and `replace_all` is false, the function returns an error rather than guessing. When no strategy matches, it surfaces the closest lines in the content as \"did you mean\" hints (character-overlap Jaccard similarity, top 3, threshold > 0.3).\n\nThe **WhitespaceStripped** strategy enforces a minimum needle length of 3 characters to prevent English false positives (e.g., stripped `\"a\"` matching inside `\"banana\"`).\n\n### Version History\n\nEach skill stores `.evolution.json` alongside `skill.toml`:\n\n```rust\nstruct SkillEvolutionMeta {\n    versions: Vec<SkillVersionEntry>,  // newest last, capped at 10\n    use_count: u64,                     // successful invocations\n    evolution_count: u64,               // total version entries written\n    mutation_count: u64,                // post-create mutations only\n}\n```\n\nVersion snapshots include: semver string, ISO 8601 timestamp, changelog, SHA256 of prompt_content, and author identifier (`\"agent:<id>\"`, `\"cli\"`, `\"dashboard\"`, `\"reviewer\"`).\n\n`bump_patch_version()` uses the `semver` crate for robust parsing, correctly clearing pre-release tags and build metadata on bump.\n\nRollback snapshots are stored in `.rollback/` with nanosecond-precision filenames (`prompt_context_YYYYMMDD_HHMMSS_{nanos}_{pid}.md`). Old snapshots are pruned to `MAX_VERSION_HISTORY` (10).\n\n### Security\n\nAll prompt content passes through `validate_prompt_content()` which:\n\n- Enforces `MAX_PROMPT_CONTEXT_CHARS` (160,000 ≈ 55k tokens)\n- Runs `SkillVerifier::scan_prompt_content()` for injection detection\n- Blocks content with **Critical** severity warnings entirely\n\nSupporting file writes are scanned before being written (not after), so rejected content never reaches disk.\n\n### Path Safety\n\n- `validate_name()`: lowercase `[a-z0-9_-]`, max 64 chars, must start with alphanumeric\n- `validate_supporting_path()`: must be under `references/`, `templates/`, `scripts/`, or `assets/`; rejects `..`, absolute paths\n- `write_supporting_file()` and `remove_supporting_file()` canonicalize both the skill directory and target path to verify containment, catching symlink-based escape attempts\n- `ALLOWED_SUBDIRS` restricts where supporting files can live\n- `MAX_SUPPORTING_FILE_SIZE` is 1 MiB\n\n### Supporting File Traversal\n\n`list_supporting_files()` walks each allowed subdirectory recursively (max depth 16), skipping symlinks. Returns a `HashMap<String, Vec<String>>` mapping subdirectory name to relative file paths.\n\n`remove_supporting_file()` cleans up empty ancestor directories after removing a file, collapsing back up to (but not including) the skill root.\n\n### EvolutionResult\n\nAll operations return `EvolutionResult` with:\n\n- `success`, `message`, `skill_name`, `version`\n- `match_strategy` / `match_count` — populated by `patch_skill()`\n- `evolution_count`, `mutation_count`, `use_count` — post-operation counters read from `.evolution.json` so callers don't need a second query\n\n### delete_skill vs uninstall_skill\n\nTwo distinct deletion paths exist:\n\n- **`delete_skill()`** — Agent-facing. Validates the skill's `source` field; only allows deletion of `Local` or `Native` skills. Rejects marketplace/bundled skills and skills with missing `source` field.\n- **`uninstall_skill()`** — User-facing (CLI `librefang skill remove`, dashboard \"Uninstall\"). Removes any installed skill regardless of source. Less strict name validation (rejects `/`, `\\`, `..`) to handle names that might not pass `validate_name()`.\n\n---\n\n## Error Handling\n\nOperations return `Result<T, SkillError>` where `SkillError` variants include:\n\n| Variant | When |\n|---|---|\n| `Network(msg)` | HTTP failures, API parse errors |\n| `RateLimited(msg)` | 429 after exhausting retries |\n| `InvalidManifest(msg)` | Parse errors, validation failures |\n| `SecurityBlocked(msg)` | Critical prompt injection, unauthorized delete |\n| `AlreadyInstalled(name)` | Duplicate skill name on create |\n| `NotFound(name)` | Missing skill, missing rollback snapshots |\n| `Io(err)` | Filesystem errors |\n\n---\n\n## Integration Points\n\n### CLI (`librefang-cli`)\n\n- `cmd_skill_search` → `marketplace::search`\n- `cmd_skill_install` → `marketplace::install` + `openclaw_compat::convert_openclaw_skill`\n- `cmd_skill_list` → `registry::load_all` + `registry::list`\n- `cmd_skill_evolve` → all `evolution::*` functions\n- `cmd_skill_publish` → `publish::prepare_local_skill` + `publish::package_prepared_skill`\n- `cmd_doctor` → `registry::load_all` + `verify::scan_prompt_content`\n\n### HTTP API (`src/routes/skills.rs`)\n\nAPI routes for the dashboard call evolution functions directly (e.g., `evolve_update_skill` → `update_skill`, `evolve_rollback_skill` → `rollback_skill`).\n\n### Runtime (`librefang-runtime`)\n\nThe tool runner loads skills via `registry::load_all` and freezes the registry before tool dispatch to prevent mid-request skill mutations from affecting in-flight operations.","skills-extensions":"# Skills & Extensions\n\n# Skills & Extensions\n\nLibreFang's capability layer — everything that makes an agent *useful* beyond its base model. This module group manages the full lifecycle of **skills** (installable tool packages) and **extensions** (MCP server integrations with their credential plumbing).\n\n## How the sub-modules relate\n\n```mermaid\ngraph LR\n    subgraph librefang-skills\n        MP[\"Marketplace & Registry\"]\n        EV[\"Evolution Engine\"]\n        VF[\"Verification\"]\n        LD[\"Loader\"]\n    end\n\n    subgraph librefang-extensions\n        CT[\"MCP Catalog\"]\n        VL[\"Credential Vault\"]\n        CR[\"Credential Resolver\"]\n        HM[\"Health Monitor\"]\n    end\n\n    MP -->|\"install skill\"| VF\n    VF -->|\"verified\"| LD\n    LD -->|\"needs credentials\"| CR\n    CR --> VL\n    EV -->|\"triggers install\"| MP\n    LD -->|\"connects to MCP\"| CT\n    CT -->|\"health check\"| HM\n```\n\n[librefang-skills](librefang-skills-src.md) handles discovery and lifecycle — browsing the marketplace, clawhub integration, loading skills into the runtime, and the agent-driven self-evolution loop that lets agents propose and install new skills autonomously.\n\n[librefang-extensions](librefang-extensions-src.md) provides the infrastructure skills depend on — the encrypted credential vault, OAuth2 PKCE flows, MCP server catalog, and health monitoring for remote connections.\n\n## Key cross-module workflows\n\n**Skill installation with credential binding.** The marketplace discovers a skill → `verify` security-scans it → `loader` installs it → `CredentialResolver` supplies API keys from the vault or `.env` files. Credentials are never stored in skill config; they're injected at runtime.\n\n**Agent self-evolution.** The `evolution` engine in skills can trigger autonomous skill installation. When a new skill requires an MCP server, the extensions `Installer` provisions it, registers it in `config.toml`, and the `HealthMonitor` begins tracking connectivity.\n\n**TOTP and security-critical flows.** Operations like `totp_setup`, `totp_confirm`, and `totp_revoke` span both modules: a route handler calls into the kernel's OAuth provider, which unlocks the extensions vault (using keyring-backed master key derivation via `machine_fingerprint`), then surfaces results back to UI components like `AgentManifestForm` and `WizardPage`.\n\n**Credential resolution chain.** At runtime, `CredentialResolver` checks the vault first (`is_unlocked`), falls back to `.env`/`secrets.env` files, then system environment variables. This gives skills a unified interface regardless of where a credential originates.\n\n## Configuration surface\n\nAll MCP servers live as `[[mcp_servers]]` entries in `~/.librefang/config.toml`, with an optional `template_id` linking back to the catalog entry they were installed from. There is no separate integrations config — extensions and skills share one file."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();

</script>
