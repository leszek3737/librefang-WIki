nsions]\n    API --> WIRE[librefang-wire]\n    API --> TYPES[librefang-types]\n    API --> MIG[librefang-migrate]\n    API --> TELEM[librefang-telemetry]\n```\n\nThe API layer is responsible for request routing, authentication, rate limiting, request/response serialization, and WebSocket session management. All core logic lives in the downstream crates — the API translates HTTP concerns into library calls.\n\n## Feature Flags\n\nFeature flags control which channel backends and telemetry integrations are compiled in. This is the primary mechanism for producing smaller binaries when only specific channels are needed.\n\n### Channel Features\n\nEach channel is an individual feature that forwards directly to `librefang-channels`:\n\n| Feature | Platform |\n|---------|----------|\n| `channel-telegram` | Telegram |\n| `channel-discord` | Discord |\n| `channel-slack` | Slack |\n| `channel-matrix` | Matrix |\n| `channel-email` | Email (SMTP/IMAP) |\n| `channel-webhook` | Generic webhooks |\n| `channel-whatsapp` | WhatsApp |\n| `channel-signal` | Signal |\n| `channel-teams` | Microsoft Teams |\n| `channel-mattermost` | Mattermost |\n| `channel-irc` | IRC |\n| `channel-google-chat` | Google Chat |\n| `channel-voice` | Voice channel |\n| ... | (30+ additional platforms) |\n\n### Meta-Features\n\n- **`all-channels`** — Enables all channel backends. Included in `default`.\n- **`mini`** — Enables 12 core channels (Telegram, Discord, Slack, Matrix, Email, Webhook, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat). Use this for a lighter build with the most common platforms.\n- **`telemetry`** — Enables OpenTelemetry trace export and Prometheus metrics scraping. Included in `default`. Pulls in `opentelemetry`, `opentelemetry_sdk`, `opentelemetry-otlp`, `tracing-opentelemetry`, `metrics`, and `metrics-exporter-prometheus`.\n\n### Default Features\n\n```toml\ndefault = [\"all-channels\", \"telemetry\"]\n```\n\nTo build without any channels or telemetry:\n\n```toml\nlibrefang-api = { path = \"...\", default-features = false }\n```\n\nTo build the mini profile:\n\n```toml\nlibrefang-api = { path = \"...\", default-features = false, features = [\"mini\", \"telemetry\"] }\n```\n\n## Build Script\n\nThe `build.rs` script performs three tasks at compile time:\n\n### 1. Dashboard Static Directory\n\nCreates a placeholder `static/react/` directory inside the crate root so that `include_dir!` (which embeds the React dashboard at compile time) never fails on fresh clones. The directory is gitignored — in development, running `npm run build` in the dashboard subcrate populates it. When empty, nothing is embedded and the runtime falls back to serving assets from `~/.librefang/dashboard/`.\n\n### 2. Build Metadata\n\nCaptures three environment variables baked into the binary:\n\n| Variable | Source | Example |\n|----------|--------|---------|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a3f7c2d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nThese are accessed at runtime via `env!(\"GIT_SHA\")`, `env!(\"BUILD_DATE\")`, and `env!(\"RUSTC_VERSION\")` — typically exposed through a `/version` or `/health` endpoint. If any command fails (e.g., building from a tarball without git), the value falls back to `\"unknown\"`.\n\n## Key Dependencies and Their Roles\n\n### HTTP Stack\n\n- **`axum`** — Router, handlers, extractors, WebSocket upgrades. With `utoipa`'s `axum_extras` feature for OpenAPI spec generation.\n- **`tower`** / **`tower-http`** — Middleware layers: CORS, tracing, compression, timeout, auth.\n- **`governor`** — Token-bucket rate limiting per IP or per route.\n\n### Authentication\n\n- **`jsonwebtoken`** — JWT creation and validation for API tokens and sessions.\n- **`argon2`** — Password hashing for credential storage and verification.\n- **`hmac`** + **`sha2`** — HMAC-SHA256 for webhook signature verification and token signing.\n- **`subtle`** — Constant-time comparison for timing-attack-safe auth checks.\n\n### Concurrency\n\n- **`dashmap`** — Lock-free concurrent hash maps for connection/session registries.\n- **`tokio-stream`** + **`futures`** — Async stream composition for WebSocket message routing and event broadcasting.\n\n### Terminal\n\n- **`portable-pty`** — PTY allocation for interactive terminal sessions over WebSocket.\n\n### Archival and File Handling\n\n- **`flate2`** + **`tar`** — `.tar.gz` creation/extraction for backup and export endpoints.\n- **`zip`** — ZIP archive support.\n- **`walkdir`** — Recursive directory traversal for file management endpoints.\n\n### Static Asset Serving\n\n- **`include_dir`** — Embeds the compiled React dashboard into the binary for single-file deployment.\n\n## Relationship to Other Crates\n\n```\nlibrefang-api\n├── librefang-types      ← request/response DTOs, shared enums\n├── librefang-kernel     ← agent lifecycle, task orchestration\n├── librefang-runtime    ← sandboxed execution of agent logic\n├── librefang-memory     ← conversation/context memory stores\n├── librefang-channels   ← inbound/outbound message channel backends\n├── librefang-wire       ← wire protocol serialization\n├── librefang-skills     ← skill registry and invocation\n├── librefang-hands      ← tool/hand execution\n├── librefang-extensions ← vault, plugins, extension loading\n├── librefang-migrate    ← database schema migrations\n└── librefang-telemetry  ← tracing and metrics infrastructure\n```\n\nAPI handlers delegate to these crates rather than implementing business logic directly. For example, a channel configuration endpoint reads/writes through `librefang-channels`, while a skill execution endpoint dispatches through `librefang-skills` and `librefang-runtime`.\n\n## Building and Running\n\n```bash\n# Full build with all channels and telemetry\ncargo build -p librefang-api\n\n# Minimal build with 12 core channels\ncargo build -p librefang-api --no-default-features --features mini\n\n# No channels, no telemetry (API only — useful for testing/development)\ncargo build -p librefang-api --no-default-features\n```\n\n## Notes for Contributors\n\n- When adding a new route, annotate it with `utoipa` attributes (`#[utoipa::path(...)]`) so it appears in the generated OpenAPI spec.\n- Channel features are exclusively pass-through to `librefang-channels`. Do not add channel-specific logic in this crate — all channel behavior should live behind the channel trait in `librefang-channels`.\n- The `static/react/` directory is auto-created by the build script and is gitignored. Never manually commit dashboard build artifacts there.\n- On Unix targets, `rustix` (with `process` feature) is included for low-level process operations.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels — Dispatch Benchmarks\n\nBenchmarks for the channel message dispatch hot paths, covering serialization, routing, and formatting. Located at `librefang-channels/benches/dispatch.rs`.\n\n## Purpose\n\nThis module provides Criterion-based microbenchmarks for the performance-critical operations in `librefang-channels`. It measures throughput and latency of:\n\n- **JSON serialization/deserialization** of `ChannelMessage`\n- **Agent routing** resolution (direct, default fallback, binding match, context-aware)\n- **Message formatting** across output formats (Markdown, Telegram HTML, Slack mrkdwn, plain text)\n- **Message splitting** and phase emoji lookup\n\n## Running\n\n```bash\n# All benchmark groups\ncargo bench -p librefang-channels\n\n# Specific group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n```\n\nResults are saved under `target/criterion/` with HTML reports.\n\n## Benchmark Groups\n\n### Serialization Group\n\nBenchmarks `serde_json` operations on a realistic `ChannelMessage` fixture constructed by `make_sample_message()`. The fixture is a Telegram text message with a sender, metadata map, and timestamp.\n\n| Benchmark | What it measures |\n|---|---|\n| `message_serialize` | `serde_json::to_string` — struct → JSON |\n| `message_deserialize` | `serde_json::from_str` — JSON → struct |\n| `message_roundtrip` | Serialize then deserialize in one iteration |\n\nThe roundtrip benchmark catches regressions where serialization and deserialization share common overhead (e.g., trait object dispatch, string allocation).\n\n### Routing Group\n\nBenchmarks `AgentRouter::resolve` and `resolve_with_context` under four scenarios of increasing complexity:\n\n| Benchmark | Scenario | APIs exercised |\n|---|---|---|\n| `router_resolve_direct` | Exact match on a pre-registered direct route | `set_default`, `set_direct_route`, `resolve` |\n| `router_resolve_default_fallback` | No match — falls back to the default agent | `set_default`, `resolve` |\n| `router_resolve_binding_match` | Matches an `AgentBinding` rule on channel + peer_id | `register_agent`, `load_bindings`, `resolve` |\n| `router_resolve_with_context` | Context-aware match using guild_id and roles | `register_agent`, `load_bindings`, `resolve_with_context` |\n\nThe context-aware variant constructs a `BindingContext` with borrowed `Cow` strings and a `smallvec` of roles to simulate real Discord-style resolution with role-based matching.\n\n### Formatting Group\n\nBenchmarks `format_for_channel` across all `OutputFormat` variants, plus `split_message` and `default_phase_emoji`.\n\n| Benchmark | Input | Format |\n|---|---|---|\n| `format_markdown_passthrough` | Multi-paragraph markdown | `OutputFormat::Markdown` |\n| `format_telegram_html` | Multi-paragraph markdown | `OutputFormat::TelegramHtml` |\n| `format_slack_mrkdwn` | Multi-paragraph markdown | `OutputFormat::SlackMrkdwn` |\n| `format_plain_text` | Multi-paragraph markdown | `OutputFormat::PlainText` |\n| `format_telegram_html_short` | `\"Hello world!\"` | `OutputFormat::TelegramHtml` |\n| `split_message_short` | `\"Hello!\"` (≤4096 chars) | — |\n| `split_message_long` | 500-line repeated text | — |\n| `default_phase_emoji_all` | All `AgentPhase` variants | — |\n\nThe multi-paragraph sample (`SAMPLE_MARKDOWN`) exercises bold, italic, inline code, links, and list conversion — the most expensive formatting paths.\n\n## Test Fixture\n\n`make_sample_message()` builds a minimal but realistic `ChannelMessage`:\n\n```rust\nChannelMessage {\n    channel: ChannelType::Telegram,\n    platform_message_id: \"msg-12345\",\n    sender: ChannelUser {\n        platform_id: \"user-42\",\n        display_name: \"Alice\",\n        librefang_user: None,\n    },\n    content: ChannelContent::Text(\"Hello, how can you help me today?\"),\n    target_agent: None,\n    timestamp: Utc::now(),\n    is_group: false,\n    thread_id: None,\n    metadata: HashMap::new(),\n}\n```\n\nThis fixture is intentionally lightweight. If you add new fields to `ChannelMessage` that affect serialization size (e.g., vectors, nested structs), update this fixture to reflect realistic payloads so benchmarks remain representative.\n\n## Architecture\n\n```mermaid\ngraph TD\n    dispatch_rs[\"dispatch.rs<br/>(bench entry point)\"]\n    dispatch_rs --> serialization[\"serialization group\"]\n    dispatch_rs --> routing[\"routing group\"]\n    dispatch_rs --> formatting[\"formatting group\"]\n\n    serialization --> types[\"types.rs<br/>ChannelMessage\"]\n    routing --> router[\"router.rs<br/>AgentRouter\"]\n    formatting --> formatter[\"formatter.rs<br/>format_for_channel\"]\n    formatting --> types\n\n    types --> librefang_types[\"librefang-types\"]\n    router --> librefang_types\n```\n\n## Dependencies on Library Code\n\nThe benchmarks directly exercise these public APIs from `librefang-channels`:\n\n- **`types` module**: `ChannelMessage`, `ChannelContent`, `ChannelUser`, `ChannelType`, `AgentPhase`, `default_phase_emoji`, `split_message`\n- **`router` module**: `AgentRouter`, `BindingContext` — methods `new`, `set_default`, `set_direct_route`, `register_agent`, `load_bindings`, `resolve`, `resolve_with_context`\n- **`formatter` module**: `format_for_channel`\n\nExternal types from `librefang-types`: `AgentId`, `OutputFormat`, `AgentBinding`, `BindingMatchRule`.\n\n## Adding New Benchmarks\n\nWhen adding functionality to `librefang-channels`, add corresponding benchmarks following the existing pattern:\n\n1. Create a `bench_*` function accepting `&mut Criterion`\n2. Use `c.bench_function(name, |b| b.iter(|| ...))` with `black_box` on inputs\n3. Add the function to the appropriate `criterion_group!` macro, or create a new group and register it in `criterion_main!`\n\nKeep setup work **outside** the `b.iter()` closure — only the operation being measured should be inside. Use `black_box` on inputs to prevent the compiler from constant-folding or eliminating the work.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# Bridge Integration Tests\n\n## Overview\n\nThis module provides integration tests for the `BridgeManager` dispatch pipeline in `librefang-channels`. It exercises the **full message routing path** — from a channel adapter receiving a user message, through router resolution and kernel dispatch, back to the adapter sending a response — without contacting any external services.\n\nAll communication is in-process via real tokio channels and tasks.\n\n## Architecture\n\nEach test follows the same wiring pattern:\n\n```\nMockAdapter ──start()──▶ Stream<ChannelMessage>\n                              │\n                              ▼\n                      BridgeManager (dispatch loop)\n                              │\n                    ┌─────────┼─────────┐\n                    ▼                   ▼\n             Command handling     AgentRouter → resolve agent\n                                      │\n                                      ▼\n                             MockHandle / MockStreamingHandle\n                              (sends to \"agent\")\n                                      │\n                                      ▼\n                           response ──▶ adapter.send() / send_streaming()\n```\n\nThe components under test are the **real** `BridgeManager` and `AgentRouter`. Only the leaf interfaces are mocked: `ChannelAdapter` (the messaging platform) and `ChannelBridgeHandle` (the kernel/agent runtime).\n\n## Mock Components\n\n### MockAdapter\n\nImplements `ChannelAdapter` for non-streaming platforms.\n\n| Capability | Behavior |\n|---|---|\n| **Message injection** | `new()` returns an `mpsc::Sender<ChannelMessage>`. Send messages into it to simulate incoming platform events. |\n| **Response capture** | Every call to `send()` records `(platform_id, text)` in an internal `Vec`. Retrieve with `get_sent()`. |\n| **Interactive content** | Button labels are flattened into the response text for easy assertion (e.g., `\"Choose:\\nYes, No\"`). |\n| **Streaming** | Does **not** override `supports_streaming()` or `send_streaming()` — relies on the default `ChannelAdapter` implementation which collects all deltas and calls `send()`. |\n\n### MockStreamingAdapter\n\nImplements `ChannelAdapter` for streaming-capable platforms. Overrides `supports_streaming() → true` and `send_streaming()`.\n\n| Capability | Behavior |\n|---|---|\n| **Stream capture** | `send_streaming()` collects all deltas from the `mpsc::Receiver<String>` into a single string, stored per `(platform_id)`. Retrieve with `get_streamed()`. |\n| **Non-streaming capture** | The `send()` path still records to a separate `sent` vector, retrievable with `get_sent()`. Tests can assert which path was taken. |\n\n### MockHandle / MockStreamingHandle\n\nBoth implement `ChannelBridgeHandle`. They share the same agent lookup and listing behavior but differ in how they respond:\n\n| Implementation | `send_message()` | `send_message_streaming()` |\n|---|---|---|\n| **MockHandle** | Returns `Ok(\"Echo: {message}\")` | — (not implemented) |\n| **MockStreamingHandle** | Returns `Ok(\"Echo: {message}\")` | Returns an `mpsc::Receiver<String>` that emits the echo response as individual word-by-word deltas |\n\nBoth record all received messages in `received: Arc<Mutex<Vec<(AgentId, String)>>>` for assertion.\n\n`spawn_agent_by_name()` is intentionally unimplemented (`Err(\"mock: spawn not implemented\")`) — no test currently exercises agent spawning.\n\n## Helper Functions\n\n### `make_text_msg(channel, user_id, text) → ChannelMessage`\n\nConstructs a plain text `ChannelMessage` with sensible defaults (timestamp = now, `is_group = false`, empty metadata, no `target_agent` or `thread_id`).\n\n### `make_command_msg(channel, user_id, cmd, args) → ChannelMessage`\n\nConstructs a `ChannelMessage` with `ChannelContent::Command { name, args }`. Same defaults as `make_text_msg`.\n\n## Test Coverage\n\n### Message Dispatch\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_dispatch_text_message` | A text message from a user with a pre-routed default agent is forwarded to the correct agent, and the kernel's response is sent back to the adapter. |\n| `test_bridge_dispatch_no_agent_assigned` | A text message from an unrouted user produces a \"No agents available\" response instead of being forwarded. |\n\n### Slash Commands\n\nAll command tests send messages through the adapter's `mpsc::Sender`, simulating real platform input.\n\n| Test | Command | Verifies |\n|---|---|---|\n| `test_bridge_dispatch_agents_command` | `/agents` | Response lists all registered agent names (e.g., \"coder\", \"researcher\"). |\n| `test_bridge_dispatch_help_command` | `/help` | Response mentions `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` | Confirmation message says \"Now talking to agent: coder\", and `AgentRouter::resolve()` subsequently returns the correct `AgentId` for that user. |\n| `test_bridge_dispatch_status_command` | `/status` | Response contains \"{N} agent(s) running\". |\n| `test_bridge_dispatch_slash_command_in_text` | `/agents` sent as plain `ChannelContent::Text` | The bridge parses slash commands from text content and handles them as commands rather than forwarding to an agent. |\n\n### Lifecycle and Concurrency\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_manager_lifecycle` | Start adapter → send 5 sequential messages → all 5 responses are received in order → `manager.stop()` completes cleanly. |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run concurrently on the same `BridgeManager`. Each receives responses only for messages sent through its own channel. |\n\n### Streaming\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both the adapter (`MockStreamingAdapter`) and handle (`MockStreamingHandle`) support streaming, `send_streaming()` is called on the adapter and `send()` is **not** called. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter does **not** support streaming but the handle does, the bridge falls back to calling `send()` with the full assembled response. |\n| `test_default_send_streaming_collects_and_sends` | Directly calls the default `ChannelAdapter::send_streaming()` implementation on `MockAdapter`. Verifies it collects all string deltas from the channel and calls `send()` with the concatenated result (`\"Hello world!\"`). |\n\n## Running\n\n```bash\n# All bridge integration tests\ncargo test -p librefang-channels --test bridge_integration_test\n\n# A single test\ncargo test -p librefang-channels --test bridge_integration_test test_bridge_dispatch_text_message\n\n# Streaming tests only\ncargo test -p librefang-channels --test bridge_integration_test streaming\n```\n\nAll tests use `#[tokio::test]` and include small `tokio::time::sleep` pauses (100–200ms) to allow the async dispatch loop to process messages. No external services or network calls are involved.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\n## Overview\n\n`librefang-channels` is the **Channel Bridge Layer** for LibreFang. It provides a unified abstraction over 40+ messaging platforms, translating LibreFang's internal message format into protocol-specific payloads for each supported service. Every channel is feature-gated, so you compile only what you need.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                    LibreFang Core                        │\n└──────────────────────┬──────────────────────────────────┘\n                       │  unified message interface\n┌──────────────────────▼──────────────────────────────────┐\n│               librefang-channels                         │\n│  ┌─────────┐ ┌─────────┐ ┌─────────┐ ┌─────────┐       │\n│  │Telegram │ │ Discord │ │  Slack  │ │ Matrix  │  ...   │\n│  └─────────┘ └─────────┘ └─────────┘ └─────────┘       │\n└──────────────────────┬──────────────────────────────────┘\n                       │  platform-specific SDKs/protocols\n          ┌────────────┼────────────┐\n          ▼            ▼            ▼\n       Telegram      Discord      Email/SMTP\n        Bot API      Bot API      IMAP/etc.\n```\n\nEach channel implementation follows a common trait-based contract (defined in `librefang-types`), accepting a normalized message and handling serialization, authentication, and transport internally.\n\n## Feature Flags\n\nAll channels are opt-in via Cargo features. The `default` profile enables every channel except MQTT. The `all-channels` profile adds MQTT on top.\n\n### Channels with No Extra Dependencies\n\nMost channels rely solely on the shared dependencies (HTTP via `reqwest`, WebSocket via `tokio-tungstenite`, webhook handling via `axum`):\n\n`channel-telegram`, `channel-discord`, `channel-slack`, `channel-matrix`, `channel-webhook`, `channel-whatsapp`, `channel-signal`, `channel-teams`, `channel-mattermost`, `channel-irc`, `channel-twitch`, `channel-rocketchat`, `channel-zulip`, `channel-xmpp`, `channel-bluesky`, `channel-line`, `channel-mastodon`, `channel-messenger`, `channel-reddit`, `channel-revolt`, `channel-viber`, `channel-voice`, `channel-flock`, `channel-guilded`, `channel-keybase`, `channel-nextcloud`, `channel-pumble`, `channel-threema`, `channel-twist`, `channel-webex`, `channel-dingtalk`, `channel-discourse`, `channel-gitter`, `channel-gotify`, `channel-linkedin`, `channel-mumble`, `channel-ntfy`, `channel-qq`, `channel-wechat`\n\n### Channels with Optional Dependencies\n\n| Feature Flag | Dependencies | Purpose |\n|---|---|---|\n| `channel-email` | `lettre`, `imap`, `rustls-connector`, `mailparse` | SMTP sending, IMAP receiving, email parsing |\n| `channel-google-chat` | `rsa` | RSA signing for Google service account auth |\n| `channel-feishu` | `aes`, `cbc` | AES-CBC encryption for Lark/Feishu event verification |\n| `channel-wecom` | `aes`, `cbc`, `roxmltree` | AES-CBC decryption + XML parsing for WeCom callbacks |\n| `channel-nostr` | `k256` | Secp256k1 cryptographic operations for Nostr events |\n| `channel-mqtt` | `rumqttc` | MQTT v5 client for IoT/push messaging |\n\n### Selecting a Minimal Subset\n\nTo reduce compile time and binary size, disable default features and enable only what you need:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"...\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n] }\n```\n\n## Core Dependencies\n\n### Async Runtime & Concurrency\n\n- **`tokio`** — async runtime for all I/O operations\n- **`futures`** / **`async-trait`** — trait-based async channel interfaces\n- **`dashmap`** — concurrent hash maps for tracking channel state, rate-limit counters, and session caches\n- **`tokio-stream`** — stream utilities for long-polling and event-driven channels\n\n### HTTP & WebSocket Transport\n\n- **`reqwest`** — primary HTTP client for REST-based channel APIs\n- **`tokio-tungstenite`** — WebSocket client for real-time channels (Discord gateway, Slack socket mode, Matrix sync, etc.)\n- **`axum`** — HTTP server for webhook-receiving channels; handles inbound POST callbacks and signature verification\n- **`webpki-roots`** / **`rustls-native-certs`** / **`rustls`** — TLS certificate bundles for secure connections\n\n### Cryptography & Verification\n\n- **`hmac`**, **`sha2`**, **`sha1`** — HMAC-based webhook signature verification (used by Slack, Discord, WhatsApp Business, etc.)\n- **`base64`**, **`hex`** — encoding for signature headers and token payloads\n- **`zeroize`** — secure clearing of secrets (API keys, tokens) from memory\n\n### Data Handling\n\n- **`serde`** / **`serde_json`** — JSON serialization for API payloads\n- **`image`** — image processing (JPEG, PNG, WebP) for media attachments and avatar handling\n- **`regex`** / **`regex-lite`** — pattern matching for command parsing and mention extraction\n- **`html-escape`** — HTML entity handling for channels that use HTML markup (Matrix, Email, Discord embeds)\n- **`smallvec`** — stack-allocated small vectors to reduce allocations in hot paths\n\n## Integration with LibreFang\n\nThis crate sits between `librefang-types` and the external world:\n\n1. **`librefang-types`** provides the shared message traits, envelope types, and error definitions that every channel must conform to.\n2. **`librefang-channels`** implements those traits for each platform, handling the specifics of authentication, rate limiting, message formatting, and media upload.\n3. The core application dispatches messages through the channel layer without knowing the underlying transport details.\n\n```mermaid\ngraph LR\n    A[librefang-types<br/>traits & types] --> B[librefang-channels<br/>implementations]\n    B --> C[External APIs<br/>Telegram, Discord, ...]\n```\n\n## Benchmarking\n\nThe crate includes a dispatch benchmark at `benches/dispatch`. Run it with:\n\n```bash\ncargo bench --bench dispatch\n```\n\nThis measures the overhead of message routing through the channel abstraction layer, including trait dispatch, serialization, and any internal buffering.\n\n## Adding a New Channel\n\n1. Add a feature flag in `[features]`: `channel-<name> = [\"dep:optional-crate\"]` if extra dependencies are needed, otherwise `channel-<name> = []`.\n2. Add the flag to both the `default` and `all-channels` arrays.\n3. Declare any new optional dependencies in `[dependencies]` with `optional = true`.\n4. Implement the channel trait from `librefang-types` behind `#[cfg(feature = \"channel-<name>\")]`.\n5. Register the channel in the dispatch/factory layer so the runtime can instantiate it from configuration.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# librefang-cli-locales\n\nLocalization data for the LibreFang CLI, using [Project Fluent](https://projectfluent.org/) (`.ftl`) message files. This is a pure-data module — it contains no executable code, only translated strings consumed by the CLI's i18n layer at runtime.\n\n## Structure\n\n```\nlocales/\n├── en/\n│   └── main.ftl       # English (primary / fallback)\n└── zh-CN/\n    └── main.ftl       # Simplified Chinese\n```\n\nEach locale directory holds a single `main.ftl` file containing all translatable messages for that language. The CLI loads the appropriate file based on the user's system locale (or `LANG`/`LC_ALL` environment variable), falling back to `en` when no match is found.\n\n## Message Organization\n\nMessages in each `.ftl` file are grouped into logical sections by comment headers. The sections are consistent across all locales:\n\n| Section | Purpose | Typical consumers |\n|---|---|---|\n| **Daemon lifecycle** | Startup, shutdown, background launch, restart, health states | `start`, `stop`, `restart`, `status` subcommands |\n| **Labels** | One- or two-word field labels (API, PID, Model, etc.) | Table rendering, status display |\n| **Hints** | Contextual guidance shown after commands | Terminal output footers, post-action tips |\n| **Init** | First-run setup messages | `init` subcommand |\n| **Error messages** | Filesystem, config, communication, and boot errors | Error handlers across all subcommands |\n| **Provider detection** | LLM provider auto-discovery feedback | Provider detection logic |\n| **Desktop app** | LibreFang Desktop launch messages | `desktop` subcommand |\n| **Dashboard** | Dashboard URL display | `dashboard` subcommand |\n| **Agent commands** | Spawn, kill, model set, template listing | `agent` subcommands |\n| **Manifest errors** | Agent manifest read/parse failures | Agent loading |\n| **Status** | Section headers for status display | `status` subcommand |\n| **Doctor** | Diagnostic check results | `doctor` subcommand |\n| **Security** | Security feature labels and values | `status --security`, audit display |\n| **Health** | Simple health check responses | Health probes |\n| **Channel setup** | Messaging channel configuration (Telegram, Discord, etc.) | `channel` subcommand |\n| **Vault** | Credential vault operations | `vault` subcommand |\n| **Cron** | Scheduled job management | `cron` subcommand |\n| **Approvals** | Approval workflow responses | Approval handling |\n| **Memory** | Agent memory key-value operations | `memory` subcommand |\n| **Devices** | Mobile device pairing | `device` subcommand |\n| **Webhooks** | Webhook CRUD and testing | `webhook` subcommand |\n| **Models** | Model catalog selection | `model` subcommand |\n| **Config** | Configuration read/write/set-key operations | `config` subcommand |\n| **Hand commands** | Hand dependency install, pause, resume | `hand` subcommand |\n| **Daemon notify** | Post-config-change restart reminders | Various mutators |\n| **System info** | System information section header | `info` subcommand |\n| **Uninstall** | Full uninstall workflow messages | `uninstall` subcommand |\n| **Reset** | Data directory reset messages | `reset` subcommand |\n| **Logs** | Log tailing status | `logs` subcommand |\n\n## Fluent Message Patterns\n\n### Simple messages\n\nA message identifier mapped to a literal string:\n\n```fluent\ndaemon-starting = Starting daemon...\nhealth-ok = Daemon is healthy\n```\n\nReferenced in code as `fl!(\"daemon-starting\")` or equivalent.\n\n### Messages with variables\n\nCurly-brace placeholders for runtime values. These are **not** printf-style format strings — they are named parameters:\n\n```fluent\nkernel-booted = Kernel booted ({ $provider }/{ $model })\ndaemon-error = Daemon error: { $error }\nmodels-available = { $count } models available\n```\n\nThe caller must supply a map of variable names to values. A missing variable will render as a blank or raise a lookup error depending on the Fluent implementation.\n\n### Error–fix pairing convention\n\nMany error messages have a corresponding `-fix` message that provides actionable remediation steps. The convention is a shared name prefix:\n\n```fluent\nerror-boot-config = Failed to parse configuration\nerror-boot-config-fix = Check your config.toml syntax: librefang config show\n```\n\n```fluent\nerror-daemon-returned = Daemon returned error ({ $status })\nerror-daemon-returned-fix = Check daemon logs with: librefang logs --follow\n```\n\nWhen adding a new error message, always add a `-fix` variant. The CLI error handler typically prints both in sequence.\n\n### Pluralization-aware messages\n\nSome messages use Fluent's implicit plural awareness through variable interpolation:\n\n```fluent\nagents-loaded = { $count } agent(s) loaded\n```\n\nCurrently these use inline parentheticals rather than Fluent `CLDR` plural selectors. If stricter pluralization is needed, convert to:\n\n```fluent\nagents-loaded = { $count ->\n    [one] { $count } agent loaded\n   *[other] { $count } agents loaded\n}\n```\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using a [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g. `ja`, `pt-BR`, `fr`).\n\n2. Copy `locales/en/main.ftl` into the new directory as a starting point. The English file is the authoritative source for all message identifiers.\n\n3. Translate every message value. **Do not modify message identifiers** — they are the lookup keys. Keep all variable references (`{ $variable }`) intact.\n\n4. Ensure every message present in `en/main.ftl` has a corresponding entry. Missing messages will fall back to English at runtime, but a complete translation is expected.\n\n5. Register the new locale in the CLI's i18n initialization code so the loader knows to probe for it.\n\n### Translation checklist\n\nFor each message:\n\n- [ ] Identifier is **unchanged** from the English source\n- [ ] All `{ $variable }` references are preserved with the same names\n- [ ] Command names in hints (e.g., `` `librefang start` ``) are **not** translated — they are CLI keywords\n- [ ] URLs remain untranslated\n- [ ] Technical terms (Merkle, Ed25519, WASM, HMAC-SHA256, etc.) are kept as-is\n- [ ] The `-fix` paired message is also translated\n\n## Adding New Messages\n\nWhen introducing a new user-facing string to the CLI:\n\n1. Add the message to **`locales/en/main.ftl` first** under the appropriate section comment. Choose a descriptive, namespaced identifier (e.g. `agent-export-failed`, not `error-42`).\n\n2. If it's an error, add both the base message and a `-fix` variant.\n\n3. Copy the same identifier with the English value as a placeholder into every other locale file. Mark it with a comment if needed:\n\n   ```fluent\n   # TODO: translate\n   agent-export-failed = Failed to export agent: { $error }\n   agent-export-failed-fix = Check file permissions and disk space\n   ```\n\n4. Reference the message in code using the Fluent macro/function provided by the CLI's i18n module.\n\n## Architecture Diagram\n\n```mermaid\ngraph LR\n    CLI[\"CLI subcommands\"] --> I18N[\"i18n loader\"]\n    I18N --> EN[\"locales/en/main.ftl\"]\n    I18N --> ZH[\"locales/zh-CN/main.ftl\"]\n    I18N --> NEW[\"locales/...\"]\n    SYS[\"System locale / LANG\"] --> I18N\n    I18N -->|\"fallback\"| EN\n```\n\nAt startup the i18n loader reads the system locale, attempts to load the matching `.ftl` file, and falls back to English for any missing messages or unsupported locales. Subcommands request messages by identifier and receive the translated string with variables interpolated.","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration templates used during LibreFang Agent OS initialization. This module contains two TOML template files that are rendered with user-provided values and written to disk as the initial `config.toml`.\n\n## Templates\n\n### `init_default_config.toml`\n\nThe **full reference template** — every configuration section the platform supports, with sensible defaults for a local deployment. Most optional sections are commented out so the file doubles as self-documenting reference material.\n\nPopulated by `librefang init` (non-interactive mode) or when the user explicitly requests a full config.\n\n**Placeholders:**\n\n| Placeholder | Description | Example rendered value |\n|---|---|---|\n| `{{provider}}` | Default LLM provider identifier | `\"openai\"` |\n| `{{model}}` | Default model name | `\"gpt-4o\"` |\n| `{{api_key_env}}` | Environment variable holding the API key | `\"OPENAI_API_KEY\"` |\n\n### `init_wizard_config.toml`\n\nThe **minimal template** — only the sections strictly required to start the agent. Generated by `librefang init --wizard` (interactive setup) after the user answers a few prompts.\n\n**Placeholders:**\n\n| Placeholder | Description | Example rendered value |\n|---|---|---|\n| `{{provider}}` | Default LLM provider identifier | `\"openai\"` |\n| `{{model}}` | Default model name | `\"gpt-4o\"` |\n| `{{api_key_line}}` | Complete `api_key_env` line (or empty string) | `api_key_env = \"OPENAI_API_KEY\"` |\n| `{{routing_section}}` | Optional routing configuration block | Multi-line TOML or empty string |\n\nThe wizard template uses coarser placeholders (`{{api_key_line}}`, `{{routing_section}}`) because the interactive flow may produce multi-line blocks or omit sections entirely depending on user choices.\n\n## Configuration Sections\n\nThe full template organizes settings into these groups:\n\n### Core Server\n\n| Key | Default | Purpose |\n|---|---|---|\n| `api_listen` | `127.0.0.1:4545` | Bind address. Use `0.0.0.0:4545` for LAN access. |\n| `log_level` | `info` | Verbosity: `trace`, `debug`, `info`, `warn`, `error` |\n| `mode` | `default` | Runtime mode: `stable`, `default`, `dev` |\n| `update_channel` | `stable` | Release track: `stable`, `beta`, `rc` |\n\n### Authentication\n\n`dashboard_user` / `dashboard_pass` — credentials for the web dashboard. The template includes inline comments pointing to secure alternatives (Vault integration, environment variable `LIBREFANG_DASHBOARD_PASS`).\n\n### Default Model (`[default_model]`)\n\nMinimum required: `provider`, `model`, and `api_key_env`. An optional `base_url` override supports local proxies or self-hosted endpoints.\n\n### Memory System\n\n- **`[memory]`** — Base decay rate for confidence scoring.\n- **`[proactive_memory]`** — Auto-extraction and auto-retrieval of conversational facts. Enabled by default with tunable thresholds and limits.\n\n### Web Tools (`[web]`)\n\nSearch provider auto-detection cascades through Tavily → Brave → Jina → Perplexity → DuckDuckGo based on available API keys. The `[web.fetch]` sub-section controls page extraction limits, timeouts, and SSRF protection.\n\n### Task Queue (`[queue.concurrency]`)\n\nSeparate concurrency lanes for user messages (`main_lane`), scheduled jobs (`cron_lane`), and child agents (`subagent_lane`).\n\n### Shell Execution (`[exec_policy]`)\n\nThree modes control command execution:\n- **`deny`** — No shell access (default).\n- **`allowlist`** — Only pre-approved commands.\n- **`full`** — Unrestricted (use with caution).\n\n### Hot-Reload (`[reload]`)\n\n`mode` controls how config changes take effect:\n- **`off`** — Ignore changes until manual restart.\n- **`restart`** — Restart the process on change.\n- **`hot`** — Apply in-place without restart.\n- **`hybrid`** — Hot-apply safe changes, restart for structural ones.\n\nDebouncing prevents rapid re-application during bulk edits (`debounce_ms`).\n\n### Optional Sections (commented out)\n\nThese are present but disabled in the full template. Uncomment to activate:\n\n| Section | Purpose |\n|---|---|\n| `[terminal]` | Remote terminal access control and proxy header trust |\n| `[provider_regions]` | Regional endpoints for providers like Qwen, MiniMax |\n| `[provider_urls]` | Override provider API URLs (e.g., local Ollama, vLLM) |\n| `[[fallback_providers]]` | LLM failover chain when primary is unavailable |\n| `[rate_limit]` | GCRA-based API and WebSocket rate limiting |\n| `[registry]` | Agent registry cache TTL |\n| `[compaction]` | LLM-based session history summarization thresholds |\n| `[triggers]` | Event trigger cooldown, depth, and timeout limits |\n| `[budget]` | Hourly/daily/monthly cost caps with per-provider overrides |\n| `[thinking]` | Extended thinking budget for Claude models |\n| `[channels.*]` | Messaging integrations: Telegram, Discord, Slack, WeChat |\n| `[[mcp_servers]]` | Model Context Protocol external tool servers |\n| `[browser]` | Headless browser automation settings |\n| `[docker]` | Docker sandbox for isolated code execution |\n| `[inbox]` | File-based async message ingestion |\n| `[network]` | P2P federation between LibreFang nodes |\n\n## How Templates Are Rendered\n\n```mermaid\nflowchart LR\n    A[User runs<br>librefang init] --> B{Interactive?}\n    B -- --wizard --> C[init_wizard_config.toml]\n    B -- default --> D[init_default_config.toml]\n    C --> E[Replace placeholders]\n    D --> E\n    E --> F[Write config.toml]\n```\n\nThe CLI's init command selects a template, substitutes `{{placeholder}}` values collected from CLI flags or interactive prompts, and writes the result. Because the templates are pure TOML with Mustache-style placeholders, no template engine dependency is required — simple string replacement suffices.\n\n## Adding New Configuration\n\nWhen adding a new configuration section to the platform:\n\n1. Add it (commented out) to `init_default_config.toml` with a descriptive header comment and sensible defaults.\n2. If the section is commonly needed during first-time setup, add a minimal version to `init_wizard_config.toml` with any necessary placeholders.\n3. Include inline comments explaining each key — the full template is many users' primary reference for what's available.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nThe command-line interface for the LibreFang Agent OS. Produces the `librefang` binary that serves as the primary entry point for interacting with the system.\n\n## Overview\n\n`librefang-cli` is a thin but feature-rich shell around the LibreFang crate ecosystem. It pulls in nearly every library crate to expose a unified CLI that can configure, migrate, run, and debug agents. The binary is built as `librefang` (see the `[[bin]]` table in `Cargo.toml`).\n\n## Feature Flags\n\nFeature flags control which communication channels and observability capabilities are compiled in.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `default` | **on** | Enables `all-channels` and `telemetry` |\n| `all-channels` | via default | Passes through to `librefang-api/all-channels` — compiles every transport/protocol backend |\n| `mini` | off | Passes through to `librefang-api/mini` — compiles a minimal subset of channels for constrained builds |\n| `telemetry` | via default | Enables OpenTelemetry tracing via `opentelemetry_sdk` and `tracing-opentelemetry`, plus `librefang-api/telemetry` |\n\nTo build a minimal binary without telemetry:\n\n```sh\ncargo build -p librefang-cli --no-default-features --features mini\n```\n\n## Build Script (`build.rs`)\n\nThe build script runs three tasks automatically on every compilation:\n\n### 1. Git Hooks Configuration\n\n```sh\ngit config core.hooksPath scripts/hooks\n```\n\nEnsures every developer's local repository uses the shared hook scripts under `scripts/hooks/`. Failures are silently ignored (e.g., when building outside a git checkout).\n\n### 2. Embedding Build Metadata\n\nThree environment variables are captured and embedded into the binary at compile time:\n\n| Variable | Source | Example Value |\n|----------|--------|---------------|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a1b2c3d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0 (...)` |\n\nThese are accessible at runtime via `env!()` macros — for example, `env!(\"GIT_SHA\")` — and are typically displayed in `--version` output or startup banners. Each variable falls back to `\"unknown\"` when the source command fails.\n\n## Dependency Graph\n\n```mermaid\ngraph LR\n    CLI[\"librefang-cli<br/>(binary: librefang)\"]\n    CLI --> API[\"librefang-api\"]\n    CLI --> KERNEL[\"librefang-kernel\"]\n    CLI --> TYPES[\"librefang-types\"]\n    CLI --> MIGRATE[\"librefang-migrate\"]\n    CLI --> SKILLS[\"librefang-skills\"]\n    CLI --> EXT[\"librefang-extensions\"]\n    CLI --> RUNTIME[\"librefang-runtime\"]\n\n    API -.->|\"feature gate\"| CHANNELS[\"all-channels / mini\"]\n    API -.->|\"feature gate\"| TELE[\"telemetry\"]\n```\n\nThe CLI sits at the top of the dependency stack and is the only crate that produces an executable. It delegates all substantive logic to the library crates:\n\n- **`librefang-api`** — network/transport layer; feature-gated to control which channels are included\n- **`librefang-kernel`** — core agent runtime and scheduling\n- **`librefang-types`** — shared data structures and type definitions\n- **`librefang-migrate`** — database schema migrations\n- **`librefang-skills`** — agent skill definitions and execution\n- **`librefang-extensions`** — plugin/extension loading\n- **`librefang-runtime`** — runtime support (TUI via `ratatui`, async runtime via `tokio`)\n\n## Key External Dependencies\n\n| Crate | Purpose |\n|-------|---------|\n| `clap` / `clap_complete` | Argument parsing and shell completion generation |\n| `tokio` | Async runtime |\n| `tracing` / `tracing-subscriber` | Structured logging |\n| `ratatui` | Terminal UI rendering |\n| `colored` | Colored terminal output |\n| `reqwest` (blocking) | Synchronous HTTP client for select operations |\n| `toml` / `toml_edit` | Reading and modifying TOML configuration files |\n| `serde` / `serde_json` | Serialization |\n| `fluent` / `unic-langid` | Internationalization (i18n) support |\n| `open` | Open URLs/files in the user's default application |\n| `zeroize` | Secure memory clearing for sensitive data |\n| `rustls` | TLS without OpenSSL dependency |\n\n## Configuration and Paths\n\nThe CLI uses the `dirs` crate to resolve standard platform directories (config, data, cache). Configuration files are expected in TOML format.\n\n## Adding a New Subcommand\n\n1. Define the command variant in the `clap` argument parser (in `src/main.rs` or a dedicated `args.rs` module).\n2. Add a handler function or module that dispatches into the appropriate library crate.\n3. If the command requires a new feature-gated dependency, add a Cargo feature in `Cargo.toml` and gate the import with `#[cfg(feature = \"...\")]`.\n\n## Cross-Compilation Notes\n\nThe build script uses the system `date` command, which may produce different results or fail on some cross-compilation targets. The `GIT_SHA` variable also requires a git checkout. Both gracefully degrade to `\"unknown\"`, so cross-compilation will succeed but version metadata will be absent.","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# LibreFang Desktop — Capabilities Configuration\n\n## Overview\n\nThis module defines the **default capability set** for the LibreFang desktop application using Tauri's capability-based security model. It is a static JSON configuration — there is no executable code, no runtime logic, and no function call graph. Its sole purpose is to declare which Tauri core APIs and plugin features the `main` window is authorized to use.\n\nThe file lives at:\n\n```\nlibrefang-desktop/capabilities/default.json\n```\n\n## How Tauri Capabilities Work\n\nTauri enforces a least-privilege security architecture. Every window in a Tauri application must explicitly declare which APIs it can access. Capabilities are the bridge between the frontend (web view) and the backend (Rust side). Without a capability entry, the frontend cannot invoke a given command or plugin — even if the plugin is compiled into the binary.\n\nA capability JSON file specifies:\n\n| Field | Purpose |\n|-------|---------|\n| `$schema` | Links to the Tauri JSON Schema for IDE validation and autocompletion |\n| `identifier` | A unique name for this capability set |\n| `description` | Human-readable summary |\n| `windows` | Which windows this capability applies to (by label) |\n| `permissions` | An ordered list of granted permission tokens |\n\n## Granted Permissions\n\nThe `default` capability set grants the following permissions to the **main** window:\n\n### Core\n\n| Permission | Effect |\n|------------|--------|\n| `core:default` | Baseline Tauri core commands (event emit/listen, window creation basics, etc.) |\n\n### Shell\n\n| Permission | Effect |\n|------------|--------|\n| `shell:default` | Default shell plugin permissions, allowing the app to open URLs or execute permitted commands |\n\n### Dialog\n\n| Permission | Effect |\n|------------|--------|\n| `dialog:default` | Native OS dialog access — file pickers, message boxes, confirm prompts |\n\n### Notification\n\n| Permission | Effect |\n|------------|--------|\n| `notification:default` | Default set of notification permissions, enabling the app to post system notifications |\n\n### Global Shortcut\n\n| Permission | Effect |\n|------------|--------|\n| `global-shortcut:allow-register` | Register a system-wide keyboard shortcut |\n| `global-shortcut:allow-unregister` | Unregister a previously registered shortcut |\n| `global-shortcut:allow-is-registered` | Query whether a shortcut is currently registered |\n\n> **Note:** The global-shortcut permissions are granted individually rather than via `global-shortcut:default`. This is an intentional choice — only the three specific commands are exposed, keeping the attack surface minimal. If you need additional global-shortcut commands in the future, add them explicitly.\n\n### Autostart\n\n| Permission | Effect |\n|------------|--------|\n| `autostart:default` | Allows the app to register itself as a login item / auto-start entry |\n\n### Updater\n\n| Permission | Effect |\n|------------|--------|\n| `updater:default` | Enables the in-app update flow (check for updates, download, install) |\n\n## Relationship to the Rest of the Codebase\n\n```mermaid\ngraph LR\n    A[Tauri Plugins<br>compiled into binary] -->|checked against| B[default.json<br>capabilities]\n    B -->|authorizes| C[main window<br>frontend JS/TS]\n    C -->|invokes| A\n```\n\n1. **At build time**, Tauri reads all files under `capabilities/` and embeds them into the compiled binary.\n2. **At runtime**, when the frontend invokes a Tauri command (e.g., `invoke(\"plugin:notification|send_notification\")`), the runtime checks whether the calling window's capability set includes the relevant permission token.\n3. If the permission is missing, the call is silently rejected or returns a permission-denied error.\n\nThis file does not import from or call into any other LibreFang module. It is consumed entirely by the Tauri framework layer.\n\n## Modifying Capabilities\n\n### Adding a new permission\n\nIf you integrate a new Tauri plugin into the app (for example, `fs` for filesystem access), you must add the corresponding permission token here:\n\n```json\n\"permissions\": [\n  \"core:default\",\n  \"fs:default\",\n  ...\n]\n```\n\nOmitting the entry will cause all frontend calls to that plugin to fail at runtime with no obvious build-time error.\n\n### Adding a second window\n\nIf the app gains additional windows (e.g., an \"about\" or \"settings\" window), you have two options:\n\n- **Add the window label to `windows`:** `\"windows\": [\"main\", \"settings\"]` — grants the same permissions to both windows.\n- **Create a separate capability file:** e.g., `capabilities/settings.json` with its own `identifier` and a scoped-down permission set. This is the recommended approach for windows that need fewer privileges.\n\n### Schema validation\n\nThe `$schema` field points to the upstream Tauri schema. IDEs that support JSON Schema (VS Code, JetBrains) will provide autocompletion for valid permission tokens. If you upgrade Tauri versions, update the schema URL to match the new release to get accurate completions.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop-gen — Tauri Security Schema Layer\n\n## Overview\n\n`librefang-desktop-gen` contains the **auto-generated Tauri capability and permission schemas** that govern what the LibreFang desktop application's frontend (webview) is allowed to do. These files are produced by the Tauri build system and should not be manually edited — they reflect the permissions declared in the application's Tauri configuration and plugin registrations.\n\nThe module consists of three schema files in `gen/schemas/`:\n\n| File | Purpose |\n|------|---------|\n| `acl-manifests.json` | Exhaustive registry of every permission every plugin can grant or deny |\n| `capabilities.json` | The actual capability sets currently assigned to application windows |\n| `desktop-schema.json` | JSON Schema (Draft 7) for validating capability files |\n\n## Capability Model\n\nTauri uses a **capability-based access control** system. A *capability* binds a set of permissions to specific windows (or webviews). If a window doesn't match any capability, it has **zero access** to the IPC layer.\n\n```mermaid\ngraph LR\n    A[Window: main] --> B[Capability: default]\n    B --> C[Permission Set: core:default]\n    B --> D[Permission Set: notification:default]\n    B --> E[Permission Set: shell:default]\n    B --> F[Individual Permissions...]\n    C --> G[Commands allowed on frontend]\n```\n\n### How Permissions Work\n\nEach permission follows the pattern `plugin-name:permission-name` and either **allows** or **denies** a specific IPC command. Permissions are resolved as follows:\n\n- **`allow-*`** — explicitly permits a command\n- **`deny-*`** — explicitly blocks a command (takes priority over allow)\n- **`default`** — a bundled set of `allow-*` permissions that represent the plugin's recommended baseline\n\nPermissions can also carry a **scope** (seen in the shell plugin) that constrains not just *whether* a command runs, but *with what arguments*.\n\n## Default Capability\n\nDefined in `capabilities.json`, the `default` capability is assigned to the `\"main\"` window and is **local only** (not served to remote URLs):\n\n```json\n{\n  \"identifier\": \"default\",\n  \"local\": true,\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"shell:default\",\n    \"dialog:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ]\n}\n```\n\n### Granted Access Summary\n\n| Plugin / Permission | What the frontend can do |\n|---------------------|--------------------------|\n| `core:default` | Path operations, events, window/webview queries, app metadata, images, resources, menus, tray |\n| `notification:default` | Full notification lifecycle: request permissions, show, cancel, batch, manage channels |\n| `shell:default` | Open `http(s)://`, `tel:`, and `mailto:` links via the system handler |\n| `dialog:default` | Show ask, confirm, message, save, and open dialogs |\n| `global-shortcut:allow-*` | Register, unregister, and check global keyboard shortcuts (no wildcard registration) |\n| `autostart:default` | Enable, disable, and query auto-start on boot |\n| `updater:default` | Check, download, and install application updates |\n\n## Plugin Permission Breakdown\n\n### Core Plugins (via `core:default`)\n\n`core:default` is a meta-set that includes the defaults of nine sub-plugins:\n\n| Sub-plugin | Default Commands |\n|------------|-----------------|\n| `core:path` | `resolve`, `resolve_directory`, `normalize`, `join`, `dirname`, `extname`, `basename`, `is_absolute` |\n| `core:event` | `listen`, `unlisten`, `emit`, `emit_to` |\n| `core:window` | Read-only window queries: `get_all_windows`, `scale_factor`, `inner/outer_position`, `inner/outer_size`, `is_*` state checks, `current/primary/available_monitors`, `cursor_position`, `theme`, `internal_toggle_maximize` |\n| `core:webview` | `get_all_webviews`, `webview_position`, `webview_size`, `internal_toggle_devtools` |\n| `core:app` | `version`, `name`, `tauri_version`, `identifier`, `bundle_type`, `register_listener`, `remove_listener` |\n| `core:image` | `new`, `from_bytes`, `from_path`, `rgba`, `size` |\n| `core:resources` | `close` |\n| `core:menu` | Full menu CRUD: `new`, `append`, `prepend`, `insert`, `remove`, `remove_at`, `items`, `get`, `popup`, `create_default`, `set_as_app_menu`, `set_as_window_menu`, text/enabled/checked/accelerator/icon setters, macOS-specific NSApp helpers |\n| `core:tray` | Full tray management: `new`, `get_by_id`, `remove_by_id`, `set_icon`, `set_menu`, `set_tooltip`, `set_title`, `set_visible`, `set_temp_dir_path`, `set_icon_as_template`, `set_show_menu_on_left_click` |\n\n**Notable restrictions in the default set:**\n- `core:window:default` does **not** include mutating commands like `create`, `destroy`, `set_size`, `set_position`, `maximize`, `minimize`, `close`, or `set_fullscreen`. These must be individually added if needed.\n- `core:app:default` does **not** include `app_hide`, `app_show`, `set_app_theme`, `set_dock_visibility`, or data store operations.\n- `core:webview:default` does **not** include `create_webview`, `create_webview_window`, `webview_close`, navigation, or zoom commands.\n\n### Shell Plugin\n\nThe shell plugin is unique in that it supports a **global scope schema** (`ShellScopeEntry`). This allows fine-grained control over which system commands the webview can execute:\n\n```json\n{\n  \"identifier\": \"shell:allow-execute\",\n  \"allow\": [{\n    \"name\": \"my-cmd\",\n    \"cmd\": \"$HOME/my-script.sh\",\n    \"args\": [{ \"validator\": \"^\\\\w+$\" }]\n  }]\n}\n```\n\nThe scope supports:\n- **Regular commands** — requires `cmd` (may use `$HOME`, `$CONFIG`, etc. variables) and `name`\n- **Sidecar commands** — requires `name` and `\"sidecar\": true`\n- **Argument validation** — `true` (allow all), `false` (allow none), or an array of `{ validator: \"<regex>\" }` objects\n\nThe `shell:default` permission only grants `allow-open`, which opens URLs matching `http(s)://`, `tel:`, and `mailto:` schemes.\n\n### Global Shortcut Plugin\n\nThe default permission set for `global-shortcut` is intentionally **empty** — no shortcuts are registered by default because the security implications are application-specific. The `default` capability manually adds the three individual allow permissions:\n\n- `global-shortcut:allow-register` — register a single shortcut\n- `global-shortcut:allow-unregister` — unregister a single shortcut\n- `global-shortcut:allow-is-registered` — check if a shortcut is registered\n\nNotably absent from the default capability are `allow-register-all` and `allow-unregister-all`.\n\n## Desktop Schema (desktop-schema.json)\n\nThis file is a JSON Schema Draft 7 definition that validates the structure of Tauri capability files. Key definitions:\n\n| Definition | Purpose |\n|------------|---------|\n| `CapabilityFile` | Top-level — accepts a single `Capability`, an array, or `{ capabilities: [...] }` |\n| `Capability` | Binds `permissions` to `windows`/`webviews` with optional `platforms` filter and `remote` URL config |\n| `CapabilityRemote` | Lists URL patterns (URLPattern spec) allowed to use the capability |\n| `PermissionEntry` | Either a bare identifier string or `{ identifier, allow?, deny? }` with scope data |\n| `Identifier` | Enumerates every valid permission string across all plugins |\n\nThe schema includes conditional logic (`if`/`then`) that adds scope validation specifically for shell-related permissions, requiring `ShellScopeEntry` shapes for the `allow`/`deny` arrays.\n\n## Modifying Capabilities\n\nTo change what the frontend can access:\n\n1. **Edit the Tauri configuration** (typically `tauri.conf.json` or `capabilities/*.json` in the source directory — **not** the `gen/` files).\n2. **Rebuild** — Tauri regenerates `gen/schemas/` during the build process.\n3. **Verify** — Check `capabilities.json` in `gen/schemas/` to confirm the new permissions took effect.\n\n### Adding a new capability\n\nCreate a new capability file (e.g., `capabilities/admin.json`) with a structure like:\n\n```json\n{\n  \"identifier\": \"admin-ops\",\n  \"description\": \"Extended permissions for admin windows\",\n  \"windows\": [\"admin-*\"],\n  \"permissions\": [\n    \"core:default\",\n    \"core:window:allow-close\",\n    \"core:window:allow-set-fullscreen\"\n  ]\n}\n```\n\n## Security Considerations\n\n- **Principle of least privilege**: The `core:window:default` set is read-heavy by design. Mutating operations (resize, reposition, close, destroy) must be explicitly added.\n- **Remote access is disabled by default**: The `default` capability sets `\"local\": true` with no `\"remote\"` block. Never enable remote access without understanding the implications.\n- **Shell execute/spawn are not in the default capability**: Only `shell:allow-open` (URL opening) is granted. Arbitrary command execution requires explicit opt-in with scope constraints.\n- **Deny overrides allow**: If both an `allow-*` and `deny-*` permission exist for the same command, the deny always wins, regardless of ordering.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop application for LibreFang, built on Tauri 2.0. This crate wraps the LibreFang agent runtime into a platform-native desktop experience with system tray integration, auto-updates, global shortcuts, and notification support.\n\n## Architecture\n\nThe desktop app acts as a thin native shell around LibreFang's core crates. It does not implement agent logic itself — instead it bootstraps the kernel, serves the web UI via a local HTTP server, and provides desktop integration through Tauri plugins.\n\n```mermaid\ngraph TD\n    A[librefang-desktop<br/>Tauri 2.0 App] --> B[librefang-kernel]\n    A --> C[librefang-api<br/>Local HTTP Server]\n    A --> D[librefang-types]\n    A --> E[librefang-extensions]\n    C --> F[WebView<br/>Web UI]\n    A --> G[Tauri Plugins]\n    G --> H[Tray Icon]\n    G --> I[Notifications]\n    G --> J[Auto-start]\n    G --> K[Auto-updater]\n    G --> L[Global Shortcuts]\n    G --> M[Single Instance]\n```\n\nAt runtime, the app:\n\n1. Starts the `librefang-kernel` agent runtime\n2. Launches an `axum`-based HTTP/WebSocket server through `librefang-api`\n3. Opens a Tauri `WebView` window pointed at `http://127.0.0.1:<port>`\n4. Registers system tray icons, global shortcuts, and platform integrations\n\n## Key Dependencies\n\n### Internal crates\n\n| Crate | Purpose |\n|---|---|\n| `librefang-kernel` | Core agent execution runtime |\n| `librefang-api` | HTTP/WebSocket API server (runs locally) |\n| `librefang-types` | Shared type definitions |\n| `librefang-extensions` | Agent extension system |\n\n### Tauri plugins\n\n| Plugin | Purpose |\n|---|---|\n| `tauri-plugin-single-instance` | Prevents multiple app instances from running simultaneously |\n| `tauri-plugin-autostart` | Registers the app to launch on system startup |\n| `tauri-plugin-updater` | Checks for and applies updates from GitHub Releases |\n| `tauri-plugin-notification` | Native OS notifications |\n| `tauri-plugin-shell` | Shell command execution from the frontend |\n| `tauri-plugin-dialog` | Native file/message dialogs |\n| `tauri-plugin-global-shortcut` | System-wide keyboard shortcuts |\n\n### Notable external crates\n\n- **`axum`** — Serves the local HTTP/WebSocket API that the WebView connects to\n- **`open`** — Opens URLs in the system's default browser\n- **`dirs`** — Resolves platform-specific directories for config/data storage\n- **`toml`** — Parses configuration files\n\n## Configuration\n\n### tauri.conf.json\n\nThe Tauri configuration defines the app identity and behavior:\n\n- **Product name:** `LibreFang`\n- **Identifier:** `ai.librefang.desktop`\n- **Windows:** Empty array in config — created programmatically at runtime to target the local API server\n\n#### Content Security Policy\n\nThe CSP is permissive toward localhost connections, allowing the WebView to communicate with the local `librefang-api` server over HTTP and WebSocket (`http://127.0.0.1:*`, `ws://127.0.0.1:*`). External resources are limited to Google Fonts. Key directives:\n\n- `connect-src` — Allows XHR/fetch to the local API and WebSocket connections\n- `media-src` — Permits blob URLs for media streaming\n- `script-src` — Allows `unsafe-inline` and `unsafe-eval` for frontend framework compatibility\n- `object-src 'none'` — Blocks plugin content\n\n#### Auto-updater\n\nUpdates are distributed via GitHub Releases. The updater is configured with:\n\n- **Endpoint:** `https://github.com/librefang/librefang/releases/latest/download/latest.json`\n- **Public key:** Embedded in the config for signature verification\n- **Windows install mode:** `passive` — shows a progress UI but requires no user interaction\n\n## Feature Flags\n\nFeature flags control which communication channels the API server enables, passing through directly to `librefang-api`:\n\n| Flag | Effect |\n|---|---|\n| `default` | Standard channel set |\n| `all-channels` | Enables every available channel |\n| `mini` | Minimal channel subset |\n| `custom-protocol` | Required for production Tauri builds — switches from `dev-server` to `tauri://` protocol |\n\n## Building\n\nThe `build.rs` delegates entirely to `tauri_build::build()`, which generates the Rust bindings from `tauri.conf.json` and prepares platform-specific assets.\n\n### Development\n\n```bash\ncargo tauri dev\n```\n\nThis compiles the Rust backend and launches the Tauri dev server with hot-reload for the frontend.\n\n### Production\n\n```bash\ncargo tauri build\n```\n\nProduces platform-native installers:\n\n- **Linux:** `.deb` and `.AppImage`\n- **macOS:** `.dmg` / `.app` (minimum macOS 12.0)\n- **Windows:** `.msi` / `.exe` (SHA-256 digest, WebView2 bootstrapped if missing)\n\n## Entry Point\n\nThe binary is registered as:\n\n```toml\n[[bin]]\nname = \"librefang-desktop\"\npath = \"src/main.rs\"\n```\n\nThe `main.rs` is responsible for:\n\n1. Parsing CLI arguments via `clap`\n2. Initializing the `tracing` subscriber for structured logging\n3. Starting the `librefang-kernel` runtime\n4. Launching the `librefang-api` HTTP server on a localhost port\n5. Building and running the Tauri app with all plugins registered\n6. Creating the main window pointed at the local server","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang. Provides three capabilities that external integrations need: one-click MCP (Model Context Protocol) server setup, an encrypted credential vault, and OAuth2 PKCE authentication flows.\n\n## Purpose\n\nLibreFang connects to external services — language model providers, tool servers, data sources — each with its own authentication requirements and configuration conventions. This module encapsulates that integration complexity behind three focused subsystems:\n\n| Subsystem | Responsibility |\n|---|---|\n| **MCP Server Setup** | Discover, configure, and launch MCP-compatible tool servers |\n| **Credential Vault** | Encrypt, store, and retrieve secrets at rest using AES-256-GCM |\n| **OAuth2 PKCE** | Handle browser-based OAuth2 Authorization Code flows with PKCE for public clients |\n\nAll three are designed to compose. A typical flow: a user clicks to add an integration → the vault stores the resulting OAuth2 tokens → an MCP server is launched using those credentials.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-extensions] --> B[MCP Server Setup]\n    A --> C[Credential Vault]\n    A --> D[OAuth2 PKCE]\n    C -->|Argon2 key derivation| E[Master Password]\n    C -->|AES-256-GCM| F[Encrypted Store]\n    D -->|localhost callback| G[Axum HTTP Server]\n    D -->|code_verifier / code_challenge| H[SHA-256 + Base64url]\n    B -->|launch & communicate| I[MCP Child Processes]\n    A -->|shared types| J[librefang-types]\n```\n\n## Credential Vault\n\nThe vault encrypts secrets (API keys, OAuth2 tokens, passwords) to disk using authenticated encryption, ensuring confidentiality and integrity at rest.\n\n### Encryption Stack\n\n| Layer | Crate | Role |\n|---|---|---|\n| Key derivation | `argon2` | Derives a 256-bit encryption key from the user's master password plus a random salt |\n| Encryption | `aes-gcm` | AES-256-GCM authenticated encryption (provides both confidentiality and integrity) |\n| Memory hygiene | `zeroize` | Key material and plaintext secrets are zeroed from memory after use |\n\n### Storage Model\n\nThe vault is persisted to the local filesystem (path resolved via the `dirs` crate). On disk, the format includes:\n\n- **Salt** — random bytes used for Argon2 key derivation\n- **Nonce** — unique per encryption operation (required by AES-GCM)\n- **Ciphertext** — the encrypted blob containing all stored credentials\n\nOn load, the master password is re-derived through Argon2 to recover the AES key, the blob is decrypted, and credentials become accessible in memory. The `dashmap` dependency suggests credentials are held in a concurrent map for safe access from multiple async tasks.\n\n### Threat Model\n\n- **Protects against**: credential theft from the filesystem (disk encryption supplement), accidental exposure in logs or config files.\n- **Does not protect against**: a compromised process that already has the master password in memory, keylogger attacks, or root-level memory scraping.\n\n## OAuth2 PKCE\n\nImplements the Authorization Code Flow with PKCE (Proof Key for Code Exchange), the recommended flow for public clients (native apps, CLIs) that cannot securely store a client secret.\n\n### Flow\n\n```mermaid\nsequenceDiagram\n    participant App as LibreFang\n    participant Browser as User Browser\n    participant Callback as Local HTTP Server\n    participant Provider as OAuth2 Provider\n\n    App->>App: Generate code_verifier (random)\n    App->>App: Compute code_challenge = BASE64URL(SHA256(code_verifier))\n    App->>Browser: Open authorize URL with code_challenge\n    Browser->>Provider: User authenticates & consents\n    Provider-->>Browser: Redirect to localhost with auth code\n    Browser->>Callback: GET /callback?code=...\n    Callback->>Provider: POST /token (code + code_verifier)\n    Provider-->>Callback: access_token, refresh_token\n    Callback->>App: Return tokens\n    App->>App: Store tokens in Credential Vault\n```\n\n### Implementation Details\n\n- **`rand`** — generates the cryptographically random `code_verifier`\n- **`sha2`** — hashes the verifier to produce the `code_challenge`\n- **`base64`** — base64url-encodes the challenge (no padding, per RFC 7636)\n- **`axum`** — runs a temporary HTTP server on localhost to receive the OAuth2 redirect callback\n- **`reqwest`** with **`rustls`** — makes the token exchange request over TLS without depending on OpenSSL\n- **`url`** — constructs and parses OAuth2 URLs safely\n\nThe local callback server binds to `127.0.0.1` on an ephemeral port. The server shuts down after receiving the callback or after a timeout.\n\n## MCP Server Setup\n\nProvides one-click configuration and launch of MCP-compatible tool servers. This subsystem:\n\n1. **Discovers** available MCP server configurations (likely from TOML config files, given the `toml` dependency)\n2. **Validates** server definitions against expected schemas\n3. **Launches** server processes and establishes communication channels\n\nThe `tokio` runtime enables async process management for child processes. TLS support via `rustls` and `webpki-roots` / `rustls-native-certs` allows secure connections to remote MCP servers.\n\n## Dependencies and Their Roles\n\n### Cross-module dependency\n\n| Dependency | Usage |\n|---|---|\n| `librefang-types` | Shared type definitions (configuration structs, error types, credential representations) used across all LibreFang crates |\n\n### Serialization\n\n| Dependency | Usage |\n|---|---|\n| `serde` / `serde_json` | JSON serialization for OAuth2 token responses, credential interchange, and MCP protocol messages |\n| `toml` | Parsing MCP server configuration files from disk |\n\n### Cryptography and Security\n\n| Dependency | Usage |\n|---|---|\n| `aes-gcm` | AES-256-GCM authenticated encryption for the credential vault |\n| `argon2` | Password-based key derivation for vault master key |\n| `sha2` | SHA-256 hashing for OAuth2 PKCE code challenges |\n| `rand` | Secure random number generation for nonces, salts, and PKCE verifiers |\n| `zeroize` | Secure memory clearing for keys and plaintext credentials |\n\n### Networking\n\n| Dependency | Usage |\n|---|---|\n| `reqwest` | HTTP client for OAuth2 token exchange |\n| `rustls` / `webpki-roots` / `rustls-native-certs` | TLS backend — pure-Rust TLS with both bundled Mozilla roots and system certificate store |\n| `axum` | Lightweight HTTP server for OAuth2 redirect callbacks |\n| `url` | RFC-compliant URL construction and parsing |\n\n### Async and Concurrency\n\n| Dependency | Usage |\n|---|---|\n| `tokio` | Async runtime for process management, HTTP server, and network I/O |\n| `dashmap` | Lock-free concurrent HashMap for thread-safe credential access |\n\n## Error Handling\n\nErrors are consolidated through `thiserror`, providing typed error enums that callers can match on. Expected error categories include:\n\n- **Vault errors** — decryption failures, wrong master password, corrupted store\n- **OAuth2 errors** — provider rejection, expired codes, network failures during token exchange\n- **MCP launch errors** — binary not found, configuration validation failures, process spawn failures\n- **I/O errors** — file system operations for config and vault storage\n\nThe `tracing` crate is used for structured diagnostic logging throughout.\n\n## Integration Points\n\nThis crate is a **leaf dependency** in the LibreFang workspace — it depends on `librefang-types` but nothing else in the workspace depends on it. Other modules (the runtime, the UI layer) consume this crate's public API to:\n\n- Set up integrations on behalf of a user\n- Store and retrieve credentials when making authenticated requests\n- Manage the lifecycle of MCP tool servers\n\n## Development and Testing\n\nDev dependencies include `tokio-test` for async test helpers, `tempfile` for isolated filesystem tests (vault operations, config parsing), and `serial_test` to serialize tests that share filesystem or port resources. `librefang-runtime` is available in dev for integration testing.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nCurated autonomous capability packages for the LibreFang system.\n\n## Overview\n\nA **Hand** is a self-contained bundle of capabilities that defines what an autonomous agent can do. This crate provides the data structures, loading, validation, and lifecycle management for Hands — serving as the bridge between declarative capability definitions (authored in configuration files) and the runtime systems that execute them.\n\nThink of a Hand as a curated, versioned package: it declares what it provides, what it requires, and how those capabilities are organized. The `librefang-hands` crate is responsible for parsing these packages, maintaining a registry, and ensuring they are structurally sound before any runtime consumes them.\n\n## Concepts\n\n### What is a Hand?\n\nA Hand encapsulates a discrete set of autonomous capabilities. Each Hand is:\n\n- **Identifiable** — tracked by a unique ID and a human-readable name.\n- **Versioned** — carries version metadata for compatibility checks.\n- **Described** — includes structured metadata (author, description, timestamps).\n- **Validatable** — must pass structural checks before it can be registered or used.\n\n### Capability Packages\n\nRather than monolithic agent definitions, LibreFang decomposes autonomy into capability packages. A Hand groups related capabilities together, making it possible to:\n\n- Compose agents from multiple Hands.\n- Share and reuse capability sets across different agent configurations.\n- Enforce clear boundaries around what a set of capabilities can and cannot do.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TOML[TOML Hand Definitions] -->|parse| Loader[Hand Loader]\n    JSON[JSON Hand Definitions] -->|parse| Loader\n    Loader -->|validate| Validator[Hand Validator]\n    Validator -->|register| Registry[Hand Registry]\n    Registry -->|query| Consumers[Runtime / Other Crates]\n    subgraph librefang-hands\n        Loader\n        Validator\n        Registry\n    end\n```\n\nThe registry (`dashmap`) provides concurrent-safe access, meaning multiple runtime threads can query for available Hands without external synchronization.\n\n## Key Responsibilities\n\n| Responsibility | Detail |\n|---|---|\n| **Parsing** | Reads Hand definitions from TOML and JSON using `serde` + `toml` + `serde_json`. |\n| **Validation** | Checks structural integrity of a Hand before registration — missing fields, invalid references, or malformed capability declarations are caught early. |\n| **Registry** | Maintains an in-memory, thread-safe map of active Hands keyed by their identifiers. |\n| **Lifecycle** | Tracks creation and modification timestamps via `chrono`, and assigns stable identifiers via `uuid`. |\n| **Error Reporting** | Uses `thiserror` to produce typed, descriptive errors for parse failures, validation violations, and registry conflicts. |\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang crates — defines the base data models that Hands build on. |\n| `serde` / `serde_json` / `toml` | Serialization frameworks for loading hand definitions from configuration files. |\n| `thiserror` | Ergonomic error types for Hand parsing and validation failures. |\n| `tracing` | Structured logging for Hand lifecycle events (registration, validation errors, lookups). |\n| `uuid` | Unique identification for Hand instances. |\n| `chrono` | Timestamps for Hand metadata. |\n| `dashmap` | Concurrent hashmap powering the Hand registry. |\n\n## Relationship to Other Crates\n\n`librefang-hands` sits between the type layer and the runtime layer:\n\n- **Depends on** `librefang-types` — Hands are built on top of the shared type vocabulary. Any structure a Hand references (capability descriptors, metadata schemas) is defined in the types crate.\n- **Consumed by** `librefang-runtime` (listed as a dev-dependency) — the runtime queries the Hand registry to discover available capabilities when assembling and executing autonomous agents.\n\nThe crate is intentionally self-contained. It performs no execution itself; it is a data layer responsible for loading, validating, and serving Hand definitions to whichever system needs them.\n\n## Error Handling\n\nAll fallible operations return typed errors derived via `thiserror`. Expect error variants covering:\n\n- Malformed TOML or JSON input.\n- Missing required fields in a Hand definition.\n- Validation rule violations (e.g., circular dependencies, unrecognized capability types).\n- Registry conflicts (e.g., duplicate Hand registration with the same identifier).\n\nErrors are instrumented with `tracing` spans to provide context when debugging failed Hand loads.\n\n## Testing\n\nThe dev-dependencies indicate the testing approach:\n\n- `tokio-test` — async test utilities, suggesting the registry or loader may involve async operations.\n- `tempfile` — tests create temporary configuration files to exercise the parsing pipeline end-to-end.\n- `serial_test` — serializes tests that share global state (likely the registry), preventing race conditions in the test suite.\n- `librefang-runtime` — integration tests likely verify that the runtime can correctly consume Hands registered through this crate.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\n## Purpose\n\n`librefang-http` provides a shared HTTP client builder for the LibreFang project. It encapsulates the configuration of TLS backends and proxy settings so that every crate in the workspace that needs to make HTTP requests does so through a consistent, centrally-configured client.\n\n## Role in the Workspace\n\nThis crate sits between the low-level type definitions (`librefang-types`) and any crate that performs network I/O. Rather than each consumer configuring its own `reqwest::Client` — and each potentially handling TLS certificate loading and proxy detection differently — they call into this library to obtain a pre-configured client.\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[librefang-http]\n    B --> C[reqwest + rustls]\n    B --> D[Consumers across workspace]\n```\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `reqwest` | The HTTP client library being configured and exported. |\n| `rustls` | TLS backend. Chosen over native TLS for cross-platform consistency and control over certificate veri
