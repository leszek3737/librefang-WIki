es |\n| `agents` | Agent list / quick-start area |\n| `detail` | Agent detail panel (Info, Files, Config tabs) |\n| `mode` | Agent mode labels (Observe / Assist / Full) |\n| `profile` | Tool profile names and descriptions |\n| `template` | Agent template names and descriptions |\n| `time` | Relative time formatting |\n| `onboarding` | First-run onboarding banners |\n| `provider` | LLM provider setup UI |\n| `overview` | Main dashboard / overview page |\n| `security` | Security feature labels |\n| `agentChat` | Chat interface, commands, toasts, system messages |\n| `sessionsPage` | Session management and agent memory browser |\n| `agentsPage` | Agent creation wizard, TOML editor, controls |\n| `approvals` | Execution approval queue |\n| `logsPage` | Live log viewer and audit trail |\n| `runtimePage` | Runtime information display |\n| `settingsPage` | Full settings panel (providers, models, tools, security, network, budget, proactive memory, migration) |\n| `workflowsPage` | Workflow list and runner |\n| `workflowBuilder` | Visual workflow builder (drag-and-drop canvas) |\n| `schedulerPage` | Cron jobs, event triggers, run history |\n| `channelsPage` | Channel configuration (Telegram, Discord, Slack, WhatsApp, etc.) |\n| `skillsPage` | Skills browser, ClawHub integration, MCP servers |\n| `handsPage` | Hands — curated autonomous capability packages |\n| `pluginsPage` | Plugin management and registry |\n| `commsPage` | Inter-agent communication and topology |\n| `setupWizard` | Guided first-time setup wizard |\n| `goalsPage` | Goals and sub-goals tracking |\n| `analyticsPage` | Token usage, cost analytics, daily breakdowns |\n| `memoryPage` | Proactive memory browser and management |\n| `theme` | Theme selector labels |\n| `sidebar` | Sidebar shortcut hints |\n| `confirm` | Shared confirmation dialog buttons |\n\n## Interpolation Placeholders\n\nStrings use `{variableName}` placeholders. The frontend is responsible for substituting these with runtime values. Common placeholders:\n\n| Placeholder | Used For |\n|---|---|\n| `{count}` | Numeric counts (agents, tokens, entries, etc.) |\n| `{name}` | Agent, workflow, or channel names |\n| `{message}` | Error messages from the API |\n| `{provider}` | LLM provider name |\n| `{model}` | Model identifier |\n| `{time}` | Formatted timestamp |\n| `{old}`, `{new}` | Previous and updated memory values |\n| `{filtered}`, `{total}` | Search result counts |\n| `{configured}`, `{total}` | Configuration progress |\n| `{level}` | Thinking level |\n| `{tool}` | Tool name |\n| `{key}` | Memory key identifier |\n| `{file}` | File name |\n| `{url}` | URL |\n| `{env}` | Environment variable name |\n| `{cost}` | Formatted cost value |\n| `{date}` | Date string |\n| `{calls}` | API call count |\n| `{algorithm}` | Cryptographic algorithm name |\n| `{fuel}`, `{epoch}`, `{timeout}` | WASM sandbox parameters |\n| `{max}`, `{idle}`, `{size}` | WebSocket limit parameters |\n\n## Adding a New Locale\n\n1. Copy `locales/en.json` to `locales/<code>.json` (e.g. `locales/de.json`).\n2. Translate all values while preserving:\n   - The exact key structure (do not rename keys).\n   - All `{placeholder}` tokens with identical names.\n   - Markdown formatting where present (e.g. `**bold**`, bullet lists).\n3. Register the new locale in the frontend's i18n initialization code so it appears in the language selector.\n\n## Adding New Strings\n\nWhen adding new UI features:\n\n1. Choose the appropriate existing namespace, or create a new top-level key matching the page/component.\n2. Add the key to **all** locale files (`en.json` first, then `ja.json` and any others).\n3. Use descriptive, hierarchical keys: `settingsPage.coreFeatures.path_traversal.name`.\n4. For error messages, include a `{message}` placeholder so the API error text can flow through.\n5. For pluralizable counts, use the `{count}` pattern and let the translation handle plurality in a natural way for that language.\n\n## Architecture Notes\n\n```mermaid\ngraph LR\n    A[Frontend App] -->|loads| B[i18n Library]\n    B -->|reads| C[locales/en.json]\n    B -->|reads| D[locales/ja.json]\n    B -->|resolves| E[Active Locale]\n    E -->|provides strings| F[React Components]\n```\n\n- The locale files are **static assets** served alongside the frontend bundle.\n- They contain **no executable code**, no templates, and no conditional logic — all rendering decisions happen in the frontend.\n- The `*Page` namespaces (e.g. `settingsPage`, `agentsPage`) generally map 1:1 to top-level routes/views.\n- Shared/global strings live in root-level namespaces (`nav`, `btn`, `label`, `status`, `theme`).\n- Some namespaces have deeply nested sub-objects (e.g. `settingsPage.coreFeatures.path_traversal`) for large enumerated lists like security features or cron presets.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests\n\nIntegration, lifecycle, load, and spec-generation tests for the LibreFang HTTP API. These tests exercise the full stack—kernel boot, axum router, real HTTP requests via `reqwest`—with no mocks.\n\n## Test Files\n\n| File | Purpose | Runs LLM? |\n|---|---|---|\n| `api_integration_test.rs` | Full API surface: agents, workflows, triggers, tools, auth, MCP bridge, versioning, config hot-reload, migration, hands | Only `test_send_message_with_llm` (gated by `GROQ_API_KEY`) |\n| `daemon_lifecycle_test.rs` | PID file management, `DaemonInfo` serialization, server startup/shutdown sequence | No |\n| `load_test.rs` | Concurrent spawns, endpoint latency percentiles, session churn, workflow creation, Prometheus metrics under sustained load | No |\n| `openapi_spec_test.rs` | Generates and validates the OpenAPI spec, writes `openapi.json` to the repo root | No |\n\n## Running\n\n```sh\n# All API tests (fast, no LLM)\ncargo test -p librefang-api --test api_integration_test --test daemon_lifecycle_test --test load_test --test openapi_spec_test -- --nocapture\n\n# Include real LLM calls (requires GROQ_API_KEY)\nGROQ_API_KEY=... cargo test -p librefang-api --test api_integration_test -- --nocapture\n\n# Only load tests (verbose metrics on stderr)\ncargo test -p librefang-api --test load_test -- --nocapture\n```\n\nTwo load tests are marked `#[ignore]` due to known race conditions in concurrent agent lifecycle:\n- `load_concurrent_agent_spawns`\n- `load_spawn_kill_cycle`\n\nRun them explicitly with `-- --ignored` if needed.\n\n## Test Infrastructure\n\n### TestServer Harness\n\n`TestServer` boots a real kernel, builds a minimal axum `Router` with the routes under test, binds to `127.0.0.1:0` (OS-assigned port), and spawns the server in a background tokio task. On drop, it calls `kernel.shutdown()`.\n\nThree constructors provide different configurations:\n\n| Constructor | Provider | Auth | Use case |\n|---|---|---|---|\n| `start_test_server()` | ollama (no real calls) | none | Default for most tests |\n| `start_test_server_with_llm()` | groq | none | `GROQ_API_KEY`-gated LLM round-trip |\n| `start_test_server_with_auth(api_key)` | ollama | Bearer token | Auth middleware tests |\n\nEach creates a `tempfile::TempDir` for `home_dir` and `data_dir`, writes a `KernelConfig` to disk, and constructs `AppState` with all required fields (caches, session maps, shutdown notify, etc.). The `_tmp` field is stored so the temp directory lives until the struct is dropped.\n\n### FullRouterHarness\n\nUses `server::build_router()` instead of manually constructing routes. This gives the full production router—including versioned `/api/v1/` aliases, dashboard static assets, locale files, the `/api/versions` endpoint, and middleware chain. Tests use `app.clone().oneshot()` for in-process requests without a live TCP listener.\n\n### Test Manifests\n\nThree TOML manifests define test agents with varying capability sets:\n\n- **`TEST_MANIFEST`** — ollama provider, `tools = [\"file_read\"]`. No real LLM calls. Used for CRUD, pagination, search, and error-path tests.\n- **`LLM_MANIFEST`** — groq provider, `llama-3.3-70b-versatile`. Requires `GROQ_API_KEY`. Only used by `test_send_message_with_llm`.\n- **`MCP_TEST_MANIFEST`** — ollama provider, `tools = [\"cron_list\", \"cron_create\", \"cron_cancel\"]`. Used by `/mcp` bridge tests to exercise caller-context rehydration (issue #2699).\n\n```mermaid\ngraph TD\n    A[Test Function] --> B{Harness type?}\n    B -->|HTTP on random port| C[TestServer]\n    B -->|In-process oneshot| D[FullRouterHarness]\n    C --> E[start_test_server / start_test_server_with_auth]\n    E --> F[LibreFangKernel::boot_with_config]\n    F --> G[AppState + axum Router]\n    G --> H[TcpListener bind 0]\n    H --> I[tokio::spawn axum::serve]\n    D --> J[server::build_router]\n    J --> F\n    J --> K[app.clone().oneshot]\n    A --> L[reqwest::Client]\n    L --> I\n    A --> K\n```\n\n## Coverage by Domain\n\n### Agent Lifecycle\n\n`test_spawn_list_kill_agent`, `test_multiple_agents_lifecycle`, `test_kill_nonexistent_agent_returns_404`, `test_invalid_agent_id_returns_400`, `test_spawn_invalid_manifest_returns_400`, `test_agent_session_empty`, `test_agent_monitoring_endpoints`\n\nThese cover the full CRUD cycle: spawn from TOML manifest, list with pagination/sort/search, fetch session state, read metrics and filtered logs, and kill. Error paths validate 400 for malformed UUIDs, 404 for unknown agents, and 400 for invalid manifest TOML.\n\n### Agent List Filtering & Pagination\n\n`test_agent_list_paginated_response_format`, `test_agent_list_pagination`, `test_agent_list_text_search`, `test_agent_list_invalid_sort_returns_400`, `test_agent_list_valid_sort_fields`, `test_agent_list_limit_clamped_to_max`\n\nValidates the paginated envelope (`items`, `total`, `offset`, `limit`), `q=` text search across name and description, `sort=` by `name`/`created_at`/`last_active`/`state`, and limit clamping to 100.\n\n### Workflows and Triggers\n\n`test_workflow_crud`, `test_trigger_crud`\n\nWorkflow tests create a named workflow with steps referencing an agent, then list to verify. Trigger tests exercise the full lifecycle: create with a lifecycle pattern and `max_fires`, list unfiltered and filtered by `agent_id`, delete, then verify empty.\n\n### Tools\n\n`test_list_tools`, `test_get_tool_found`, `test_get_tool_not_found`\n\nLists all registered tools, fetches a specific tool by name (verifying `name`, `description`, `input_schema`), and returns 404 for unknown tools.\n\n### Authentication\n\n`test_auth_health_is_public`, `test_auth_rejects_no_token`, `test_auth_rejects_wrong_token`, `test_auth_accepts_correct_token`, `test_auth_disabled_when_no_key`\n\nUses `start_test_server_with_auth(\"secret-key-123\")` to enable Bearer-token auth via the `middleware::auth` layer. Validates that `/api/health` remains public, protected endpoints return 401 with descriptive error messages (\"Missing\" vs \"Invalid\"), correct tokens are accepted, and an empty API key disables auth entirely.\n\n### MCP Bridge (Issue #2699)\n\n`test_mcp_http_rehydrates_caller_context_from_agent_header`, `test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated`, `test_mcp_http_unrestricted_agent_can_call_any_tool`, `test_mcp_http_enforces_agent_tool_allowlist`\n\nRegression guards for the `/mcp` HTTP bridge. Tests verify:\n- `X-LibreFang-Agent-Id` header rehydrates caller context so tools like `cron_list` succeed\n- Missing or invalid headers degrade gracefully to the unauthenticated error path (no 500)\n- Agents with no `[capabilities].tools` (unrestricted) can call any tool through the bridge\n- Agents with a specific tool allowlist are denied tools not in their manifest (no privilege escalation)\n\n### API Versioning\n\n`test_build_router_exposes_versioned_api_aliases`, `test_build_router_path_version_beats_unknown_accept_header`, `test_build_router_unauthorized_responses_include_api_version_header`\n\nUses `FullRouterHarness` to verify `/api/v1/` aliases work identically to `/api/` routes, path-based versioning wins over conflicting `Accept` headers, the `x-api-version: v1` header is set on all responses (including 401s), and `/api/versions` returns the current and supported version list.\n\n### Dashboard & Providers\n\n`test_build_router_serves_dashboard_locales`, `test_build_router_providers_marks_local_providers`\n\nVerifies locale JSON files (`en.json`, `zh-CN.json`, `ja.json`) are served with correct content and content-type, and the `/api/providers` endpoint marks local providers (ollama) with `is_local: true`.\n\n### Config Hot-Reload\n\n`test_config_reload_hot_reloads_proxy_changes`\n\nWrites a modified `config.toml` with a proxy setting, hits `/api/config/reload`, and asserts `restart_required: false` with `ReloadProxy` in `hot_actions_applied`.\n\n### Migration\n\n`test_run_migrate_uses_daemon_home_when_target_dir_is_empty`\n\nCreates an OpenClaw-format source directory, posts to `/api/migrate` with an empty `target_dir` (should default to daemon home), and verifies the resulting `config.toml`, `agent.toml`, and `migration_report.md` are written to the kernel's home directory.\n\n### Hands (Active)\n\n`list_active_hands_includes_definition_metadata`\n\nInstalls a hand definition, activates it, assigns agent IDs to roles via `set_agents`, and hits `/api/hands/active` to verify the response includes `hand_name`, `hand_icon`, `coordinator_role`, and `agent_ids` alongside legacy fields.\n\n### Daemon Lifecycle\n\n`test_daemon_info_serde_roundtrip`, `test_read_daemon_info_from_file`, `test_read_daemon_info_missing_file`, `test_read_daemon_info_corrupt_json`, `test_full_daemon_lifecycle`, `test_stale_daemon_info_detection`, `test_server_immediate_responsiveness`\n\nTests `DaemonInfo` JSON serialization, `read_daemon_info()` for valid/missing/corrupt files, the full startup→health-check→shutdown lifecycle with PID file management, and that the health endpoint responds in under 1 second.\n\n### Load & Performance\n\n`load_endpoint_latency`, `load_concurrent_reads`, `load_session_management`, `load_workflow_operations`, `load_metrics_sustained` (plus two `#[ignore]` tests for concurrent spawns and spawn/kill cycles).\n\nLatency tests warm up each endpoint (10 requests) then measure p50/p95/p99 over 100 iterations, gating on p95 < 1 second. Concurrent read tests hammer 50 simultaneous requests across health/agents/status/metrics. Session tests create 10 sessions, list them, and rapidly switch between them. Workflow tests create 15 workflows concurrently. Metrics tests fire 200 sequential requests at `/api/metrics` and verify the `librefang_agents_active` metric is present.\n\nAll load tests print throughput and latency metrics to stderr via `eprintln!`.\n\n### OpenAPI Spec\n\n`generate_openapi_json`\n\nUses `utoipa::OpenApi::openapi()` on `ApiDoc` to generate the spec, validates it has 100+ paths, and writes it to `<repo_root>/openapi.json` for SDK codegen and CI consumption.\n\n## Conventions\n\n- **All tests use `#[tokio::test(flavor = \"multi_thread\")]`** because the kernel spawns background tasks that require a multi-threaded runtime.\n- **Temp directories** are held alive by the `_tmp` field on harness structs, ensuring config files and data directories persist for the test duration.\n- **Kernel shutdown** is deterministic: both `TestServer` and `FullRouterHarness` implement `Drop` to call `kernel.shutdown()`.\n- **No external dependencies** except optional `GROQ_API_KEY`. All non-LLM tests use ollama as a provider with no actual API calls.\n- **Request IDs**: `test_request_id_header_is_uuid` validates the `x-request-id` middleware header is a valid UUID on every response.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nThe HTTP/WebSocket API server for LibreFang Agent OS. This crate is the top-level aggregation point that wires together the kernel, runtime, memory, channels, skills, extensions, and telemetry subsystems into a unified network-facing service.\n\n## Role in the System\n\n`librefang-api` sits at the outermost layer of the LibreFang architecture. It does not implement domain logic itself — instead it composes the other crates into a deployable server that exposes REST endpoints, WebSocket streams, and a embedded web dashboard.\n\n```mermaid\ngraph TD\n    API[librefang-api] --> K[librefang-kernel]\n    API --> RT[librefang-runtime]\n    API --> MEM[librefang-memory]\n    API --> CH[librefang-channels]\n    API --> WIRE[librefang-wire]\n    API --> SK[librefang-skills]\n    API --> HANDS[librefang-hands]\n    API --> EXT[librefang-extensions]\n    API --> MIG[librefang-migrate]\n    API --> TEL[librefang-telemetry]\n    API --> TY[librefang-types]\n```\n\n### What each dependency provides\n\n| Crate | Role in the API server |\n|---|---|\n| `librefang-types` | Shared domain types, request/response structs |\n| `librefang-kernel` | Core agent lifecycle and orchestration |\n| `librefang-runtime` | Task execution runtime |\n| `librefang-memory` | Conversation and state persistence |\n| `librefang-channels` | Messaging channel integrations (Telegram, Discord, Slack, etc.) |\n| `librefang-wire` | Wire protocol definitions |\n| `librefang-skills` | Skill registration and execution |\n| `librefang-hands` | Tool/hand interfaces |\n| `librefang-extensions` | Extension loading, including vault access |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-telemetry` | Observability primitives |\n\n## Feature Flags\n\nFeatures control two orthogonal dimensions: **channel availability** and **telemetry**.\n\n### Build Variants\n\n| Feature set | Description |\n|---|---|\n| `default` (`all-channels` + `telemetry`) | Full production build with every channel and OpenTelemetry/Prometheus |\n| `mini` | 12 core channels only, no telemetry — smaller binary and faster compile |\n\n### Channels\n\nEvery channel is individually gateable. The `all-channels` feature activates all of them at once. To build a minimal server with only the channels you need:\n\n```toml\n[dependencies]\nlibrefang-api = { path = \"../librefang-api\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n    \"telemetry\",\n] }\n```\n\nAvailable channel features: `channel-telegram`, `channel-discord`, `channel-slack`, `channel-matrix`, `channel-email`, `channel-webhook`, `channel-whatsapp`, `channel-signal`, `channel-teams`, `channel-mattermost`, `channel-irc`, `channel-google-chat`, `channel-twitch`, `channel-rocketchat`, `channel-zulip`, `channel-xmpp`, `channel-bluesky`, `channel-feishu`, `channel-line`, `channel-mastodon`, `channel-messenger`, `channel-reddit`, `channel-revolt`, `channel-viber`, `channel-flock`, `channel-guilded`, `channel-keybase`, `channel-nextcloud`, `channel-nostr`, `channel-pumble`, `channel-threema`, `channel-twist`, `channel-webex`, `channel-dingtalk`, `channel-discourse`, `channel-gitter`, `channel-gotify`, `channel-linkedin`, `channel-mumble`, `channel-ntfy`, `channel-qq`, `channel-voice`, `channel-wechat`, `channel-wecom`.\n\nEach `channel-*` feature is forwarded directly to `librefang-channels` — the API crate does not re-implement any channel logic.\n\n### Telemetry\n\nThe `telemetry` feature pulls in OpenTelemetry tracing export and Prometheus metrics collection:\n\n- `opentelemetry` / `opentelemetry_sdk` / `opentelemetry-otlp` — OTLP trace export\n- `tracing-opentelemetry` — bridges `tracing` spans to OpenTelemetry\n- `metrics` / `metrics-exporter-prometheus` — Prometheus scrape endpoint\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks before compilation:\n\n### 1. Dashboard asset placeholder\n\nCreates `static/react/` if it doesn't exist. This directory is the target for the React dashboard build output. It's gitignored because the actual assets are either:\n\n- Built locally via `npm run build` in the dashboard subcrate, or\n- Downloaded from release assets at runtime into `~/.librefang/dashboard/`\n\nWhen the directory is empty, `include_dir!` (from the `include_dir` crate) embeds nothing, and the runtime fallback path serves assets instead.\n\n### 2. Build metadata injection\n\nThree environment variables are set at compile time via `cargo:rustc-env`:\n\n| Variable | Source | Example value |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a1b2c3d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nAll three fall back to `\"unknown\"` if the command fails (e.g., building from a tarball without git). These are accessible at runtime via `env!()` macros:\n\n```rust\nlet version = env!(\"GIT_SHA\");\nlet built = env!(\"BUILD_DATE\");\nlet compiler = env!(\"RUSTC_VERSION\");\n```\n\n### 3. Unix-specific dependency\n\nOn Unix targets, `rustix` (with `process` features) is included. This is likely used for process management capabilities such as signal handling, privilege manipulation, or process forking in the API server runtime.\n\n## Key External Dependencies\n\n### HTTP framework\n\n- **`axum`** + **`tower`** + **`tower-http`** — The HTTP server stack. `tower-http` provides middleware for CORS, compression, tracing, and static file serving.\n- **`utoipa`** (with `axum_extras`) — OpenAPI spec generation from handler signatures.\n\n### Authentication & security\n\n- **`jsonwebtoken`** — JWT token creation and validation.\n- **`argon2`** — Password hashing for local authentication.\n- **`hmac`** + **`sha2`** — HMAC-SHA256 for webhook signature verification and token signing.\n- **`subtle`** — Constant-time comparison for timing-safe auth checks.\n- **`governor`** — Rate limiting middleware.\n\n### Terminal emulation\n\n- **`portable-pty`** — PTY allocation for terminal/Shell WebSocket streams. Enables interactive shell sessions through the API.\n\n### Data handling\n\n- **`serde`** / **`serde_json`** / **`toml`** / **`toml_edit`** — Serialization and configuration file manipulation.\n- **`flate2`** + **`tar`** + **`zip`** — Archive handling for extension packaging and backup import/export.\n\n### Async runtime\n\n- **`tokio`** — The async runtime driving the entire server.\n- **`tokio-stream`** + **`futures`** — Stream utilities for WebSocket and event pipelines.\n- **`dashmap`** — Concurrent hashmap for in-memory state (e.g., active sessions, connection registries).\n\n## Development\n\n```bash\n# Full build (all channels + telemetry)\ncargo build -p librefang-api\n\n# Minimal build (12 core channels, no telemetry)\ncargo build -p librefang-api --no-default-features --features mini\n\n# Single channel\ncargo build -p librefang-api --no-default-features --features channel-telegram,telemetry\n```\n\nTests use `tokio-test`, `tempfile`, and `http-body-util` for async handler testing with temporary filesystem fixtures.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels Benchmarks — Dispatch Hot Paths\n\n## Purpose\n\nThis benchmark suite measures the performance of the hottest code paths in `librefang-channels`: message (de)serialization, agent routing resolution, and output formatting. These operations run on every inbound and outbound message, so regressions here directly impact end-to-end latency.\n\nThe file lives at `librefang-channels/benches/dispatch.rs` and uses [Criterion.rs](https://bheisler.github.io/criterion.rs/book/) for statistically rigorous micro-benchmarking.\n\n## Running\n\n```sh\n# All groups\ncargo bench -p librefang-channels\n\n# Single group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n```\n\n## Benchmark Groups\n\n### Serialization (`serialization`)\n\n| Benchmark | What it measures |\n|---|---|\n| `message_serialize` | `serde_json::to_string` on a `ChannelMessage` |\n| `message_deserialize` | `serde_json::from_str` back into `ChannelMessage` |\n| `message_roundtrip` | Serialize then deserialize in one iteration |\n\nAll three share a single fixture produced by `make_sample_message()` — a `ChannelMessage` with `ChannelType::Telegram`, a text body, a `ChannelUser` with `platform_id` and `display_name`, a UTC timestamp, and empty metadata.\n\n**What to watch for:** any change to `ChannelMessage`, `ChannelUser`, `ChannelContent`, or their `#[serde(...)]` attributes can shift these numbers. Adding optional fields with defaults is usually cheap; nested structs or `HashMap` growth is not.\n\n### Routing (`routing`)\n\nThese exercise `AgentRouter` in `librefang_channels::router`.\n\n| Benchmark | Code path |\n|---|---|\n| `router_resolve_direct` | `set_default` + `set_direct_route`, then `resolve` hits the direct route table |\n| `router_resolve_default_fallback` | Only a default agent is set; `resolve` falls through to it |\n| `router_resolve_binding_match` | `register_agent` + `load_bindings` with a channel+peer rule, then `resolve` matches it |\n| `router_resolve_with_context` | Uses `resolve_with_context` with a `BindingContext` carrying guild/role data — the richest resolution path |\n\nThe binding-match and context benchmarks use `librefang_types::config::AgentBinding` / `BindingMatchRule` exactly as they arrive from configuration, making them sensitive to changes in the matching logic.\n\n**What to watch for:** changes to `AgentRouter::resolve`, `AgentRouter::resolve_with_context`, or the binding rule evaluation order. Adding new match fields to `BindingMatchRule` will show up here.\n\n### Formatting (`formatting`)\n\nThese exercise `format_for_channel` from `librefang_channels::formatter` and `split_message` / `default_phase_emoji` from `librefang_channels::types`.\n\n| Benchmark | Input | `OutputFormat` |\n|---|---|---|\n| `format_markdown_passthrough` | Multi-paragraph markdown | `Markdown` |\n| `format_telegram_html` | Multi-paragraph markdown | `TelegramHtml` |\n| `format_slack_mrkdwn` | Multi-paragraph markdown | `SlackMrkdwn` |\n| `format_plain_text` | Multi-paragraph markdown | `PlainText` |\n| `format_telegram_html_short` | `\"Hello world!\"` | `TelegramHtml` |\n| `split_message_short` | `\"Hello!\"`, limit 4096 | — |\n| `split_message_long` | 500 lines, limit 4096 | — |\n| `default_phase_emoji_all` | All six `AgentPhase` variants | — |\n\nThe multi-paragraph sample (`SAMPLE_MARKDOWN`) contains bold, italic, inline code, links, and bullet lists — it is designed to exercise every markdown-to-target conversion branch.\n\n**What to watch for:** any change to the markdown parser or the conversion emitters in `formatter.rs`. The `split_message` benchmarks are sensitive to the splitting heuristic and the chosen limit constant.\n\n## Dependency Map\n\n```mermaid\ngraph LR\n    subgraph Benchmarks\n        S[serialization group]\n        R[routing group]\n        F[formatting group]\n    end\n    subgraph librefang_channels\n        types[types.rs]\n        router[router.rs]\n        formatter[formatter.rs]\n    end\n    subgraph librefang_types\n        agent[agent::AgentId]\n        config[config::OutputFormat, AgentBinding]\n    end\n\n    S --> types\n    R --> router\n    R --> agent\n    R --> config\n    F --> formatter\n    F --> types\n    F --> config\n    types --> agent\n```\n\n## Adding a New Benchmark\n\n1. Write a `fn bench_<name>(c: &mut Criterion)` function following the existing pattern.\n2. Use `black_box` on every input so the compiler cannot constant-fold the work away.\n3. Add the function to the appropriate `criterion_group!` macro, or create a new group and append it to `criterion_main!`.\n4. For routing benchmarks, construct the `AgentRouter` state inside the benchmark function (not in setup that runs once) unless the setup cost is genuinely irrelevant — Criterion's iter loop only times the closure body.\n5. Re-use `make_sample_message()` or `SAMPLE_MARKDOWN` when the fixture is representative. Create new fixtures only when you need to stress a different code shape.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# librefang-channels — Bridge Integration Tests\n\n## Overview\n\nThe `bridge_integration_test.rs` module provides end-to-end integration tests for the `BridgeManager` dispatch pipeline in `librefang-channels`. Every test runs entirely in-process using real `tokio` channels and tasks — no external services, no network calls. The strategy is to substitute production components with focused mocks that are wired through the **real** `BridgeManager`, `AgentRouter`, and message-dispatch logic.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Infrastructure\"\n        TX[\"mpsc::Sender<br/>(inject messages)\"]\n        MA[\"MockAdapter /<br/>MockStreamingAdapter\"]\n        MH[\"MockHandle /<br/>MockStreamingHandle\"]\n    end\n\n    subgraph \"Production Code Under Test\"\n        BM[\"BridgeManager\"]\n        AR[\"AgentRouter\"]\n    end\n\n    TX -->|\"ChannelMessage\"| MA\n    MA -->|\"Stream<Item=ChannelMessage>\"| BM\n    BM -->|\"resolve / set_user_default\"| AR\n    BM -->|\"send_message / send_message_streaming\"| MH\n    MH -->|\"Response / Delta stream\"| BM\n    BM -->|\"send / send_streaming\"| MA\n```\n\nEach test follows the same pattern:\n\n1. **Create mocks** — a `ChannelAdapter` implementation and a `ChannelBridgeHandle` implementation, each tailored to the scenario.\n2. **Wire the router** — optionally pre-route users to agents via `AgentRouter::set_user_default`.\n3. **Instantiate `BridgeManager`** with the mock handle and router, then call `start_adapter`.\n4. **Inject messages** through the `mpsc::Sender` returned by the mock adapter constructor.\n5. **Sleep briefly** to let the async dispatch loop process (typically 100–300ms).\n6. **Assert** on captured outputs (sent text, streamed text, delivery metrics).\n\n## Mock Components\n\n### Channel Adapters\n\nAll adapters implement `ChannelAdapter` and capture outbound responses for test inspection.\n\n| Mock | `supports_streaming` | `send_streaming` behavior | Purpose |\n|---|---|---|---|\n| `MockAdapter` | `false` (default) | Default impl (collects deltas → `send`) | Basic non-streaming channels (Discord, Slack, Matrix) |\n| `MockStreamingAdapter` | `true` | Collects deltas into `streamed` vec | Streaming-capable channels (Telegram) |\n| `MockFailingStreamingAdapter` | `true` | Drains deltas then returns `Err` | Tests fallback when transport fails mid-stream |\n\nEach adapter constructor returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`. The sender is the injection point for test messages.\n\n### Kernel Handles\n\nAll handles implement `ChannelBridgeHandle`.\n\n| Mock | Streaming support | Key behavior |\n|---|---|---|\n| `MockHandle` | `send_message` only | Echoes `\"Echo: {message}\"`, records received messages |\n| `MockStreamingHandle` | `send_message_streaming` | Emits echo response word-by-word as deltas |\n| `MockProgressHandle` | `send_message_streaming_with_sender_status` | Emits `🔧 tool_name` progress line + prose, returns success status |\n| `MockKernelErrorHandle` | `send_message_streaming_with_sender_status` | Emits progress deltas, then reports kernel error via status oneshot |\n| `MockKernelOkHandle` | `send_message_streaming_with_sender_status` + `record_delivery` | Emits clean text, reports success, logs all `record_delivery` calls as `(bool, Option<String>)` |\n\n## Test Helpers\n\n### `make_text_msg`\n\n```rust\nfn make_text_msg(channel: ChannelType, user_id: &str, text: &str) -> ChannelMessage\n```\n\nConstructs a `ChannelMessage` with `ChannelContent::Text`. Sets reasonable defaults for all other fields (`platform_message_id: \"msg1\"`, `display_name: \"TestUser\"`, `is_group: false`, empty metadata).\n\n### `make_command_msg`\n\n```rust\nfn make_command_msg(\n    channel: ChannelType,\n    user_id: &str,\n    cmd: &str,\n    args: Vec<&str>,\n) -> ChannelMessage\n```\n\nConstructs a `ChannelMessage` with `ChannelContent::Command { name, args }`. Used for testing slash-command dispatch (`/agents`, `/help`, `/agent`, `/status`).\n\n## Test Cases\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_dispatch_text_message` | A text message from a pre-routed user reaches the correct agent; the echo response is delivered back through the adapter to the correct `platform_id`. |\n| `test_bridge_dispatch_no_agent_assigned` | An unrouted user receives a `\"No agents available\"` error message instead of a silent drop. |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text starting with `/` (e.g., `\"/agents\"`) is detected and dispatched as a command, even when sent as `ChannelContent::Text`. |\n\n### Command Handling\n\n| Test | Command | Expected behavior |\n|---|---|---|\n| `test_bridge_dispatch_agents_command` | `/agents` | Response lists all registered agent names (e.g., `\"coder\"`, `\"researcher\"`). |\n| `test_bridge_dispatch_help_command` | `/help` | Response mentions `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` | Confirms selection (`\"Now talking to agent: coder\"`), updates the router so subsequent `resolve` calls return the chosen agent. |\n| `test_bridge_dispatch_status_command` | `/status` | Reports running agent count (e.g., `\"2 agent(s) running\"`). |\n\n### Lifecycle and Multi-Adapter\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_manager_lifecycle` | Start → send 5 messages → receive 5 echo responses → stop without hanging. Validates ordering and completeness of sequential dispatch. |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) registered on the same `BridgeManager`. Each receives messages only for its own channel, and responses route back correctly. |\n\n### Streaming Dispatch\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both the adapter and handle support streaming, `send_streaming` is called (not `send`). The streamed output contains the echo text. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter does not support streaming but the handle does, the bridge falls back to the non-streaming `send` path. |\n| `test_default_send_streaming_collects_and_sends` | The default `ChannelAdapter::send_streaming` implementation (which non-streaming adapters inherit) collects all deltas from the receiver and calls `send` with the assembled text. |\n\n### Progress Markers and Error Paths\n\nThese tests exercise the V2/V3 dispatch pipeline that routes streaming-with-status through non-streaming adapters and handles failure cascades.\n\n| Test | Scenario | Expected outcome |\n|---|---|---|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapter + handle that emits `🔧 tool_name` progress via `send_message_streaming_with_sender_status` | Progress markers and post-tool prose appear in the consolidated `send` response. |\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | Streaming adapter whose `send_streaming` always errors + handle that reports kernel error | Fallback `send` delivers buffered partial text including progress markers. |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | Failing streaming adapter + handle that reports kernel success | `record_delivery` is called with `(success=true, err=None)`. The transport-side stream error does not leak into the error field. |\n\n## Relationship to Production Code\n\n```\nbridge_integration_test.rs\n  ├── BridgeManager      ← librefang-channels/src/bridge.rs\n  ├── AgentRouter        ← librefang-channels/src/router.rs\n  ├── ChannelAdapter     ← librefang-channels/src/types.rs\n  ├── ChannelBridgeHandle ← librefang-channels/src/bridge.rs\n  ├── ChannelMessage     ← librefang-channels/src/types.rs\n  ├── ChannelContent     ← librefang-channels/src/types.rs\n  ├── ChannelUser        ← librefang-channels/src/types.rs\n  ├── ChannelType        ← librefang-channels/src/types.rs\n  ├── AgentId            ← librefang-types/src/agent.rs\n  └── SenderContext       ← librefang-channels/src/types.rs\n```\n\nThe tests exercise these production call paths:\n\n- `BridgeManager::new` → `start_adapter` → internal dispatch loop → `stop`\n- `AgentRouter::set_user_default` and `AgentRouter::resolve`\n- `ChannelBridgeHandle::send_message`, `send_message_streaming`, `send_message_streaming_with_sender_status`, `record_delivery`, `find_agent_by_name`, `list_agents`\n- `ChannelAdapter::start`, `send`, `send_streaming`, `supports_streaming`, `stop`\n\n## Adding New Tests\n\nTo add a new integration test:\n\n1. **Pick or create a mock**. For most cases, `MockAdapter` + `MockHandle` suffice. For streaming scenarios, use `MockStreamingAdapter` + `MockStreamingHandle`. For error/failure paths, use `MockFailingStreamingAdapter` or create a new handle that returns specific error conditions.\n\n2. **Set up routing**. If the test requires a user to be routed to an agent, call `router.set_user_default(user_id, agent_id)` before creating the `BridgeManager`.\n\n3. **Inject and assert**. Send messages via the `mpsc::Sender`, sleep for 100–300ms, then inspect the adapter's `get_sent()` / `get_streamed()` or the handle's `received` / `deliveries()`.\n\n4. **Clean up**. Always call `manager.stop().await` at the end of the test to tear down spawned tasks.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\nChannel Bridge Layer — pluggable messaging integrations for the LibreFang alerting platform.\n\n## Purpose\n\nThis crate provides a unified abstraction over 40+ messaging and notification platforms. It translates LibreFang's internal alert format into platform-specific API calls, WebSocket messages, or webhook payloads, allowing alerts to be dispatched to any supported channel through a single interface.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────┐\n│              librefang-channels                  │\n│                                                  │\n│  ┌──────────────────────────────────────────┐   │\n│  │         Channel Trait (core)              │   │\n│  │  dispatch() / validate() / health()       │   │\n│  └──────────────────────────────────────────┘   │\n│                                                  │\n│  ┌─────────┐ ┌─────────┐ ┌─────────┐           │\n│  │Telegram │ │ Discord │ │ Slack   │  ...       │\n│  └─────────┘ └─────────┘ └─────────┘           │\n│  ┌─────────┐ ┌─────────┐ ┌─────────┐           │\n│  │ Matrix  │ │  Email  │ │ Webhook │  ...       │\n│  └─────────┘ └─────────┘ └─────────┘           │\n│                                                  │\n│  Shared: HTTP / WebSocket / Crypto / Parsing     │\n└──────────────┬──────────────────────────────────┘\n               │ depends on\n        librefang-types\n```\n\nEach channel is compiled conditionally behind a Cargo feature flag. The `default` feature enables all 44 stable channels. Consumers that want a minimal build can disable default features and enable only the channels they need.\n\n## Core Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared types defining alerts, channel configurations, and result types |\n| `tokio` | Async runtime for concurrent dispatch |\n| `reqwest` | HTTP client for REST-based channel APIs |\n| `tokio-tungstenite` | WebSocket support for real-time channels (e.g., Discord, Slack, Matrix) |\n| `axum` | HTTP server for receiving inbound webhooks (delivery confirmations, callbacks) |\n| `dashmap` | Lock-free concurrent map for channel registry and state |\n| `async-trait` | Trait object support for async channel methods |\n| `hmac`, `sha2`, `sha1` | Signature verification for inbound webhook authentication |\n| `image` | Image processing for channels with media constraints |\n| `serde`, `serde_json` | Serialization for API payloads |\n| `tracing` | Structured logging across all channel implementations |\n| `uuid` | Correlation IDs for dispatch tracking |\n\n## Feature Flags\n\n### Meta-features\n\n- **`default`** — Enables all 44 stable channels.\n- **`all-channels`** — Enables all stable channels **plus** `channel-mqtt`. Use this when you want every available integration including experimental ones.\n\n### Enabling specific channels\n\nDisable default features and list only what you need:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-slack\",\n    \"channel-email\",\n] }\n```\n\n### Channel-specific optional dependencies\n\nMost channels are implemented using the shared `reqwest`/`tokio-tungstenite` infrastructure and require no additional crates. The following channels pull in specialized dependencies:\n\n| Feature | Additional dependencies | Reason |\n|---|---|---|\n| `channel-email` | `lettre`, `imap`, `rustls-connector`, `mailparse` | SMTP sending, IMAP receiving, TLS, MIME parsing |\n| `channel-google-chat` | `rsa` | RSA key-based authentication (service accounts) |\n| `channel-feishu` | `aes`, `cbc` | AES-CBC encryption for callback verification |\n| `channel-wecom` | `aes`, `cbc`, `roxmltree` | AES-CBC for message encryption, XML parsing for API responses |\n| `channel-nostr` | `k256` | secp256k1 key generation and event signing |\n| `channel-mqtt` | `rumqttc` | MQTT v5 client for IoT/push channels |\n\n## Channel List\n\n```\nchannel-telegram       channel-discord         channel-slack\nchannel-matrix         channel-email           channel-webhook\nchannel-whatsapp       channel-signal          channel-teams\nchannel-mattermost     channel-irc             channel-google-chat\nchannel-twitch         channel-rocketchat      channel-zulip\nchannel-xmpp           channel-bluesky         channel-feishu\nchannel-line           channel-mastodon        channel-messenger\nchannel-reddit         channel-revolt          channel-viber\nchannel-voice          channel-flock           channel-guilded\nchannel-keybase        channel-nextcloud       channel-nostr\nchannel-pumble         channel-threema         channel-twist\nchannel-webex          channel-dingtalk        channel-discourse\nchannel-gitter         channel-gotify          channel-linkedin\nchannel-mumble         channel-ntfy            channel-qq\nchannel-wechat         channel-wecom           channel-mqtt\n```\n\n## Benchmarks\n\nThe crate includes a Criterion benchmark suite targeting the dispatch path:\n\n```bash\ncargo bench --bench dispatch\n```\n\nUse this to measure throughput and latency impact when adding or modifying a channel implementation.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# LibreFang CLI Locales\n\n## Overview\n\nThe `librefang-cli-locales` module provides the internationalization (i18n) layer for the LibreFang CLI. It contains [Project Fluent](https://projectfluent.org/) (`.ftl`) message catalogs that supply all user-facing strings for the command-line interface. These files are pure data — no executable code, no imports, no runtime dependencies. They are consumed at build time or runtime by the CLI's localization machinery.\n\n### Supported Locales\n\n| Locale | File | Language |\n|--------|------|----------|\n| `en` | `locales/en/main.ftl` | English (default) |\n| `zh-CN` | `locales/zh-CN/main.ftl` | Simplified Chinese |\n\nEach locale file is a complete, standalone translation containing every message key used by the CLI. The two files are structurally identical — every key in `en/main.ftl` has a corresponding entry in `zh-CN/main.ftl`.\n\n---\n\n## File Format\n\nMessages use the [FTL syntax](https://projectfluent.org/fluent/guide/):\n\n```fluent\n# Simple string\ndaemon-starting = Starting daemon...\n\n# String with a variable\nkernel-booted = Kernel booted ({ $provider }/{ $model })\n\n# Section comment (for human organization, not parsed)\n# --- Daemon lifecycle ---\n```\n\nVariables are interpolated at runtime via `{ $name }`. The CLI code passes a map of variable values when resolving a message.\n\n---\n\n## Message Catalog Structure\n\nMessages are organized into functional domains by comment headers. The sections below describe each domain and the kinds of messages it contains.\n\n### Daemon Lifecycle\n\nCore messages for the daemon's start, stop, restart, and background operation flows. This is the largest single domain and covers:\n\n- Startup/shutdown confirmations (`daemon-starting`, `daemon-stopped-ok`, `daemon-stopped-forced`)\n- Background daemon status (`daemon-started-bg`, `daemon-still-starting`)\n- Error states (`daemon-bg-exited`, `daemon-bg-wait-fail`, `daemon-launch-fail`)\n- Already-running / not-running conditions (`daemon-already-running`, `daemon-not-running`)\n- Kernel boot confirmation with provider/model variables (`kernel-booted`)\n\n### Labels\n\nShort, reusable field labels for display in status tables, configuration output, and diagnostic panels. Examples: `label-api`, `label-pid`, `label-status`, `label-uptime`, `label-version`, `label-pairing-code`. These are typically combined with dynamic values in the CLI's output formatting layer.\n\n### Hints\n\nActionable user-facing guidance appended after primary output. Hints always suggest a concrete command or action:\n\n```fluent\nhint-stop-daemon = Use `librefang stop` to stop the daemon\nhint-doctor-repair = Run `librefang doctor --repair` to attempt auto-fix\n```\n\nHints often appear in pairs — a short diagnostic line followed by a hint with the `-fix` suffix pattern used throughout the catalog.\n\n### Error Messages\n\nErrors follow a consistent pattern: a primary message describing the failure, and a companion `-fix` message with remediation steps.\n\n| Primary Key | Fix Key | Example |\n|-------------|---------|---------|\n| `error-create-dir` | `error-create-dir-fix` | Failed to create path → check permissions |\n| `error-boot-config` | `error-boot-config-fix` | Config parse error → check syntax |\n| `error-connect-refused` | `error-connect-refused-fix` | Connection refused → start the daemon |\n\nError domains include:\n\n- **General filesystem errors** — home directory, directory creation, config writes\n- **Daemon communication** — timeouts, refused connections, generic comm errors\n- **Boot errors** — config parsing, database locks, auth failures, generic kernel boot\n- **Daemon requirement** — commands that need a running daemon (`error-require-daemon`)\n\n### Init / Setup Wizard\n\nMessages for the `librefang init` interactive setup flow and the quick-setup guide:\n\n- Setup completion confirmations (`init-quick-success`, `init-interactive-success`)\n- Provider selection guide (`guide-free-providers-title`, `guide-get-free-key`)\n- API key entry prompts (`guide-paste-key-placeholder`, `guide-paste-key-hint`)\n- Key verification feedback (`guide-key-verified`, `guide-test-key-unverified`)\n- Navigation help for interactive selectors (`guide-help-select`, `guide-help-paste`)\n\n### Agent Commands\n\nAll output for agent lifecycle operations:\n\n- Spawning (`agent-spawned`, `agent-spawned-inprocess`, `agent-spawn-failed`)\n- Template discovery (`agent-template-not-found`, `agent-no-templates`)\n- Lifecycle control (`agent-killed`, `agent-kill-failed`)\n- Configuration (`agent-model-set`, `agent-unknown-field`)\n- In-process vs. daemon mode distinction (`agent-note-lost`, `agent-note-persistent`)\n\n### Status Display\n\nSection headers and labels for the `librefang status` command output:\n\n```fluent\nsection-daemon-status = LibreFang Daemon Status\nsection-active-agents = Active Agents\nlabel-daemon-not-running = NOT RUNNING\n```\n\nIncludes status-locked indicators, authentication type labels, and verbose detail sections.\n\n### Doctor (Diagnostics)\n\nMessages for the `librefang doctor` health-check command:\n\n- Title and summary (`doctor-title`, `doctor-all-passed`, `doctor-some-failed`)\n- Repair feedback (`doctor-repairs-applied`)\n- API key guidance (`doctor-no-api-keys`, `section-getting-api-key`)\n\n### Security\n\nLabels and values for the security status display, describing LibreFang's security mechanisms:\n\n```fluent\nlabel-audit-trail = Audit trail\nvalue-audit-trail = Merkle hash chain (SHA-256)\nlabel-wasm-sandbox = WASM sandbox\nvalue-wasm-sandbox = Dual metering (fuel + epoch)\n```\n\nAudit verification results (`audit-verified`, `audit-failed`) are also here.\n\n### Channel Setup\n\nStrings for configuring messaging integrations (`telegram`, `discord`, `slack`, `whatsapp`, `email`, `signal`, `matrix`):\n\n- Per-channel setup section headers (`section-setup-telegram`, etc.)\n- Token/credential save confirmations (`channel-token-saved`, `channel-bot-token-saved`)\n- Test results (`channel-test-ok`, `channel-test-fail`)\n\n### Vault\n\nCredential vault operations — initialization, storage, retrieval, and removal:\n\n```fluent\nvault-stored = Stored '{ $key }' in vault.\nvault-key-not-found = Key '{ $key }' not found in vault.\n```\n\n### Cron, Approvals, Memory, Webhooks\n\nShort CRUD-style message sets for scheduled jobs, approval workflows, agent memory, and webhook management. Each follows the same pattern:\n\n```fluent\n<entity>-created = ... created: { $id }\n<entity>-create-failed = Failed to create ...: { $error }\n<entity>-deleted = ... { $id } deleted.\n<entity>-delete-failed = Failed to delete ...: { $error }\n```\n\n### Models and Config\n\n- **Models** — default model setting, catalog display, selection prompts\n- **Config** — get/set/unset operations, key management, env-file persistence, parse error reporting with specific guidance on dotted notation and scalar vs. table distinctions\n\n### Uninstall and Reset\n\nPlatform-specific cleanup messages for full uninstall (Windows registry, macOS launch agent, Linux autostart/systemd) and data reset operations.\n\n---\n\n## Variable Reference\n\nMessages use the following variable names across the catalog:\n\n| Variable | Used In | Description |\n|----------|---------|-------------|\n| `$provider` | `kernel-booted`, `detected-provider` | LLM provider name |\n| `$model` | `kernel-booted`, `model-set-success` | Model identifier |\n| `$count` | `models-available`, `agents-loaded`, `auth-user-keys` | Numeric count |\n| `$url` | `daemon-already-running`, `dashboard-opening` | Daemon/dashboard URL |\n| `$error` | Various error/failed messages | Error description string |\n| `$status` | `daemon-bg-exited`, `error-daemon-returned` | HTTP/process status code |\n| `$path` | `daemon-bg-exited-fix`, `error-create-dir`, `log-following` | Filesystem path |\n| `$name` | `agent-spawned`, `channel-configured`, `agent-template-not-found` | Entity name |\n| `$id` | `agent-killed`, `cron-created`, `webhook-deleted`, `device-removed` | Entity identifier |\n| `$value` | `agent-model-set`, `config-set-kv` | Setting value |\n| `$key` | `config-key-not-found`, `vault-stored`, `channel-key-saved` | Config/vault key |\n| `$command` | `error-require-daemon` | CLI subcommand name |\n| `$action` | `cron-toggled`, `approval-responded` | Past-tense action (e.g., \"pause\", \"approve\") |\n| `$field` | `agent-unknown-field` | Field name |\n| `$display` | `detected-provider` | Provider display name |\n| `$env_var` | `detected-provider`, `config-saved-key` | Environment variable name |\n| `$max` | `model-out-of-range` | Maximum selection number |\n| `$agent` | `memory-set`, `memory-deleted` | Agent identifier |\n\n---\n\n## Adding a New Locale\n\n1. Create a new directory under `librefang-cli/locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g., `ja/` for Japanese).\n2. Copy `en/main.ftl` into the new directory.\n3. Translate every message value while keeping all keys and variable interpolations (`{ $var }`) unchanged.\n4. Register the locale in the CLI's localization initialization code (outside this module).\n\n### Conventions\n\n- **Do not rename keys.** The CLI references keys by exact string match.\n- **Preserve all variables.** Missing a `{ $error }` interpolation will cause a runtime panic in Fluent.\n- **Keep section comments.** The `# --- Section ---` headers are for human maintainers; keep them consistent across locales for easier diffing.\n- **Maintain the `-fix` pairing.** Every error message with a `-fix` companion must have the companion translated as well.\n- **Backticks in hints.** Command suggestions are wrapped in backticks in English. Follow the target language's convention for inline code.\n\n---\n\n## Relationship to the CLI Codebase\n\nThis module is a leaf dependency. It produces no function calls and receives none. The CLI's localization layer reads these `.ftl` files at runtime, resolves the current locale, and looks up messages by key when rendering output. The call graph is entirely external to this module:\n\n```\nCLI command handlers\n  └─ Localization resolver (fluent-rs or equivalent)\n       └─ Reads locales/<lang>/main.ftl\n            └─ Returns resolved string with interpolated variables\n```\n\nBecause there are no code dependencies, changes to message wording (including across locales) are safe to make independently — as long as keys and variable signatures remain consistent with their call sites in the CLI.","other-librefang-cli-src":"# Other — librefang-cli-src\n\n# TUI Screens (`librefang-cli::tui::screens`)\n\n## Overview\n\nThis module is the **screen registry** for the librefang TUI (Terminal User Interface). It aggregates every screen module into a single namespace, establishing the navigable surface area of the application. The file itself contains no logic — it re-exports submodules, each of which implements an individual screen.\n\n## Architecture\n\nThe TUI follows a **one-module-per-screen** convention. Each submodule under `screens/` corresponds to a distinct view the user can navigate to. Application routing logic (outside this module) refers to screens by their module name.\n\n```mermaid\ngraph TD\n    Router[\"TUI Router / Navigation\"]\n    Router --> dashboard\n    Router --> welcome\n    Router --> init_wizard\n    Router --> wizard\n    Router --> chat\n    Router --> sessions\n    Router --> agents\n    Router --> comms\n    Router --> channels\n    Router --> peers\n    Router --> workflows\n    Router --> skills\n    Router --> triggers\n    Router --> templates\n    Router --> extensions\n    Router --> memory\n    Router --> hands\n    Router --> logs\n    Router --> audit\n    Router --> usage\n    Router --> settings\n    Router --> security\n    Router --> free_provider_guide\n```\n\n## Screen Modules\n\n### Core Navigation\n\n| Module | Purpose |\n|---|---|\n| `welcome` | Landing screen shown at startup |\n| `dashboard` | Primary overview / home screen |\n| `settings` | Application-wide configuration |\n\n### Onboarding & Setup\n\n| Module | Purpose |\n|---|---|\n| `init_wizard` | First-run initialization wizard |\n| `wizard` | General-purpose step-by-step wizard flow |\n| `free_provider_guide` | Guide for setting up free-tier LLM providers |\n\n### Conversational Interfaces\n\n| Module | Purpose |\n|---|---|\n| `chat` | Interactive chat with an agent |\n| `sessions` | Manage conversation sessions |\n| `comms` | Communication layer / messaging view |\n| `channels` | Channel configuration and management |\n\n### Agent & Peer Management\n\n| Module | Purpose |\n|---|---|\n| `agents` | View and manage registered agents |\n| `peers` | Peer-to-peer connection management |\n| `hands` | Active hand-off / delegation management |\n\n### Automation\n\n| Module | Purpose |\n|---|---|\n| `workflows` | Define and monitor workflows |\n| `skills` | Manage agent skill sets |\n| `triggers` | Configure event-based triggers |\n| `templates` | Reusable prompt and task templates |\n| `extensions` | Extension/plugin management |\n\n### Data & Monitoring\n\n| Module | Purpose |\n|---|---|\n| `memory` | Agent memory / context inspection |\n| `logs` | Raw application log viewer |\n| `audit` | Audit trail for security-relevant events |\n| `usage` | Token usage and consumption metrics |\n\n### Security\n\n| Module | Purpose |\n|---|---|\n| `security` | Security policies, keys, and access control |\n\n## Conventions\n\nWhen adding a new screen to the TUI:\n\n1. Create a new file under `librefang-cli/src/tui/screens/` (e.g., `my_screen.rs`).\n2. Implement the screen's view and event-handling logic inside that file.\n3. Add `pub mod my_screen;` to this `mod.rs` file.\n4. Wire the screen into the application's router (located outside this module).\n\nEach screen module is expected to expose whatever the application's UI framework requires (typically a render function and an event/update handler), but the exact interface contract is defined by the TUI framework layer, not by this registry.\n\n## Relationships to the Rest of the Codebase\n\nThis module sits **at the edge** of the TUI layer. It has no incoming or outgoing call dependencies within its own scope — it is a structural module. The actual wiring happens upstream in the TUI routing and state-management code, which imports individual screen modules from here and invokes their render and event handlers based on the current application state.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nThe command-line interface for LibreFang Agent OS. Produces the `librefang` binary that serves as the primary entry point for interacting with the agent system.\n\n## Role in the Workspace\n\n`librefang-cli` sits at the top of the dependency graph. It pulls in nearly every other workspace crate and orchestrates them behind a `clap`-based CLI surface. It does not contain business logic itself — it wires together the kernel, API, runtime, migrations, skills, and extensions, then delegates work to those layers.\n\n```mermaid\ngraph TD\n    CLI[librefang-cli] --> Kernel[librefang-kernel]\n    CLI --> API[librefang-api]\n    CLI --> Runtime[librefang-runtime]\n    CLI --> Migrate[librefang-migrate]\n    CLI --> Skills[librefang-skills]\n    CLI --> Extensions[librefang-extensions]\n    CLI --> Types[librefang-types]\n```\n\n## Binary\n\n| Binary name | Source |\n|---|---|\n| `librefang` | `src/main.rs` |\n\n## Feature Flags\n\nFeatures control which channel backends and telemetry are compiled in. They gate the corresponding features in `librefang-api`.\n\n| Feature | Default | Effect |\n|---|---|---|\n| `all-channels` | **on** | Enables every channel backend in `librefang-api` |\n| `mini` | off | Minimal channel subset (useful for smaller builds) |\n| `telemetry` | **on** | Enables OpenTelemetry tracing via `opentelemetry_sdk` and `tracing-opentelemetry` |\n\nThe default profile gives you a full-featured binary with all channels and telemetry. For constrained environments, build with `--no-default-features --features mini`.\n\n## Build Script (`build.rs`)\n\nThe build script runs three tasks at compile time:\n\n### 1. Git Hooks Configuration\n\nAutomatically sets the repository's hooks path to `scripts/hooks` so every developer gets consistent git hooks after their first build.\n\n### 2. Version Metadata Injection\n\nCaptures three pieces of build-time metadata and exposes them as environment variables, available to the binary via `env!()` or `option_env!()`:\n\n| Variable | Source | Example Value |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a1b2c3d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.75.0` |\n\nIf any command fails (e.g., building from a tarball without git), the value falls back to `\"unknown\"`.\n\nThese variables are intended for display in `--version` output or diagnostic logging.\n\n## Key Dependencies\n\n### Internal Workspace Crates\n\n- **librefang-types** — Shared type definitions\n- **librefang-kernel** — Core agent logic and state management\n- **librefang-api** — Channel backends and communication layer\n- **librefang-migrate** — Database schema migrations\n- **librefang-skills** — Skill/plugin definitions\n- **librefang-extensions** — Extension system\n- **librefang-runtime** — Agent runtime execution\n\n### Notable External Crates\n\n| Crate | Purpose |\n|---|---|\n| `clap` / `clap_complete` | CLI argument parsing and shell completion generation |\n| `ratatui` | Terminal UI rendering |\n| `colored` | Colored terminal output |\n| `fluent` / `unic-langid` | Internationalization (i18n) |\n| `rusqlite` | Embedded SQLite database |\n| `reqwest` (blocking) | HTTP client for operations that can't be async |\n| `rustls` | TLS without OpenSSL dependency |\n| `tokio` | Async runtime |\n| `tracing` / `tracing-subscriber` | Structured logging and diagnostics |\n| `toml` / `toml_edit` | Configuration file reading and modification |\n| `open` | Open URLs/files in the system default handler |\n| `walkdir` | Recursive directory traversal |\n| `zeroize` | Secure memory clearing for sensitive data |\n\n## Configuration and Data Paths\n\nThe `dirs` crate resolves standard platform directories (config, data, cache) for the agent's filesystem layout. Configuration files are typically TOML, read with `toml` and edited in-place with `toml_edit`.\n\n## Adding a New CLI Subcommand\n\n1. Define the subcommand variant in the `clap` derive structure (in `src/main.rs` or a sub-module).\n2. Add a match arm in the main dispatch logic.\n3. Delegate to the appropriate workspace crate — avoid implementing logic directly in the CLI layer.\n4. If the subcommand needs new functionality, add it to `librefang-kernel` or the relevant crate first, then call it from the CLI.\n\n## Building\n\n```bash\n# Full build (default features)\ncargo build -p librefang-cli\n\n# Minimal build without telemetry or all channels\ncargo build -p librefang-cli --no-default-features --features mini\n\n# Install to ~/.cargo/bin\ncargo install --path librefang-cli\n```","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# LibreFang Desktop — Capabilities Configuration\n\n## Overview\n\nThe `capabilities/default.json` file defines the **Tauri security capabilities** granted to the LibreFang desktop application. In Tauri's capability-based security model, every privileged operation (filesystem access, shell commands, notifications, etc.) must be explicitly declared before the frontend can invoke it. This file is the single source of truth for what the app's main window is allowed to do.\n\n## Purpose\n\n- **Lock down the attack surface** — the webview frontend cannot call any backend APIs that aren't listed here.\n- **Declare intent** — makes the app's privilege requirements auditable and version-controlled.\n- **Scope to windows** — permissions are bound to specific windows (here, only `\"main\"`).\n\n## File Location\n\n```\nlibrefang-desktop/capabilities/default.json\n```\n\n## Schema\n\nThe file validates against Tauri's published JSON schema:\n\n```json\n\"$schema\": \"https://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json\"\n```\n\nIDEs that support `$schema` (VS Code, JetBrains) will provide autocomplete and validation when editing this file.\n\n## Permission Reference\n\n### Bundle Permissions (Wildcard Sets)\n\nThese are predefined permission groups provided by each Tauri plugin. They expand into multiple granular permissions.\n\n| Permission | Plugin | Grants |\n|---|---|---|\n| `core:default` | `tauri` core | Standard core IPC, event system, window management basics |\n| `notification:default` | `tauri-plugin-notification` | Send desktop notifications |\n| `shell:default` | `tauri-plugin-shell` | Execute shell commands from the frontend |\n| `dialog:default` | `tauri-plugin-dialog` | Open native file/save/message dialogs |\n| `autostart:default` | `tauri-plugin-autostart` | Register/unregister the app to launch at login |\n| `updater:default` | `tauri-plugin-updater` | Check for and apply application updates |\n\n### Granular Permissions\n\nIndividual capabilities that aren't covered by the default sets:\n\n| Permission | Allows |\n|---|---|\n| `global-shortcut:allow-register` | Register a global keyboard shortcut (system-wide, even when app is unfocused) |\n| `global-shortcut:allow-unregister` | Remove a previously registered global shortcut |\n| `global-shortcut:allow-is-registered` | Query whether a shortcut is currently registered |\n\n## How It Connects to the Codebase\n\n```mermaid\nflowchart LR\n    A[\"Frontend (webview)\"] -->|IPC call| B[\"Tauri Core\"]\n    B -->|Permission check| C[\"capabilities/default.json\"]\n    C -->|Granted| D[\"Plugin / Backend\"]\n    C -->|Denied| E[\"Error returned to frontend\"]\n```\n\n1. The frontend (in the `main` window) calls a Tauri command or plugin API.\n2. Tauri core checks whether the originating window has the required permission in the matched capability set.\n3. If the permission exists in `default.json`, the call proceeds to the plugin or Rust backend handler.\n4. If not, the call is rejected with a permission error — no backend code runs.\n\nThis means adding a new plugin or privileged feature requires updating this file, or the feature will silently fail with a security denial.\n\n## Modifying This File\n\n**When to add a permission:**\n- You install a new Tauri plugin (e.g., `tauri-plugin-clipboard`).\n- You need a specific granular permission not included in a `:default` set.\n- You add a new window that needs different privileges.\n\n**Steps:**\n\n1. Add the permission identifier to the `permissions` array.\n2. If adding a new window, add its label to the `windows` array (or create a separate capability file scoped to that window).\n3. Rebuild the app — Tauri validates capabilities at build time and will error on unknown identifiers.\n\n**Example — adding clipboard access:**\n\n```json\n\"permissions\": [\n  \"core:default\",\n  \"notification:default\",\n  \"shell:default\",\n  \"dialog:default\",\n  \"global-shortcut:allow-register\",\n  \"global-shortcut:allow-unregister\",\n  \"global-shortcut:allow-is-registered\",\n  \"autostart:default\",\n  \"updater:default\",\n  \"clipboard-manager:default\"\n]\n```\n\n## Security Considerations\n\n- **`shell:default`** grants the frontend the ability to spawn processes. Ensure no user-controlled input is passed unsanitized to shell commands.\n- **`global-shortcut:allow-register`** registers shortcuts at the OS level. Conflicting shortcuts can interfere with other applications.\n- **`updater:default`** allows the frontend to trigger updates. The update endpoint and signing configuration are controlled in `tauri.conf.json`, not here — this permission only gates whether the frontend can *initiate* the check.\n- This capability file applies to **all instances of the `main` window**. If the app opens secondary windows with different trust levels, create a separate capability file scoped to those window labels.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop-gen\n\nAuto-generated Tauri build artifacts that define the security and permissions model for the LibreFang desktop application. The `gen/` directory is produced during the Tauri build process and is **not intended for manual editing**.\n\n## Purpose\n\nTauri uses a capability-based security system. Before any frontend (webview) code can invoke a Tauri command, that command must be explicitly allowed through the ACL (Access Control List) system. This module contains three generated files that together define what the LibreFang desktop app's frontend is permitted to do:\n\n| File | Role |\n|------|------|\n| `schemas/acl-manifests.json` | Registry of every permission available from every plugin used by the app |\n| `schemas/capabilities.json` | The resolved capability set assigned to app windows |\n| `schemas/desktop-schema.json` | JSON Schema for validating capability files at build time |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Tauri Plugins] --> B[acl-manifests.json]\n    C[Capability Config Files] --> D[capabilities.json]\n    B --> E[desktop-schema.json]\n    D --> F[Runtime Permission Check]\n    B --> F\n    F --> G[Frontend Webview]\n```\n\nAt build time, Tauri reads the plugin manifests and the developer-authored capability configuration files (typically in `src-tauri/capabilities/`), then generates these three schema files. At runtime, every IPC call from the webview is validated against the resolved capability set.\n\n## acl-manifests.json\n\nThe manifest declares every permission exposed by each plugin integrated into the app. Each plugin entry follows a consistent structure:\n\n- **`default_permission`** — The permission set granted when a capability references `plugin-name:default`.\n- **`permissions`** — Individual `allow-*` and `deny-*` entries that map to specific commands.\n- **`global_scope_schema`** — Optional JSON Schema for scoped permissions (used by the `shell` plugin).\n\n### Plugin Permission Summary\n\n| Plugin | Default Grants | Key Commands |\n|--------|---------------|--------------|\n| `autostart` | `allow-enable`, `allow-disable`, `allow-is-enabled` | Boot auto-start control |\n| `core` | Aggregates all `core:*:default` sets | Umbrella for core sub-plugins |\n| `core:app` | `allow-version`, `allow-name`, `allow-tauri-version`, `allow-identifier`, `allow-bundle-type`, `allow-register-listener`, `allow-remove-listener` | App metadata and lifecycle listeners |\n| `core:event` | `allow-listen`, `allow-unlisten`, `allow-emit`, `allow-emit-to` | Event bus |\n| `core:image` | `allow-new`, `allow-from-bytes`, `allow-from-path`, `allow-rgba`, `allow-size` | Image handling |\n| `core:menu` | All menu commands (`allow-new`, `allow-append`, `allow-popup`, `allow-set-as-app-menu`, etc.) | Application and window menus |\n| `core:path` | `allow-resolve-directory`, `allow-resolve`, `allow-normalize`, `allow-join`, `allow-dirname`, `allow-extname`, `allow-basename`, `allow-is-absolute` | Path operations |\n| `core:resources` | `allow-close` | Resource cleanup |\n| `core:tray` | `allow-new`, `allow-get-by-id`, `allow-remove-by-id`, `allow-set-icon`, `allow-set-menu`, `allow-set-tooltip`, `allow-set-title`, `allow-set-visible`, etc. | System tray |\n| `core:webview` | `allow-get-all-webviews`, `allow-webview-position`, `allow-webview-size`, `allow-internal-toggle-devtools` | Webview management |\n| `core:window` | Window state queries (`allow-is-fullscreen`, `allow-is-minimized`, `allow-is-maximized`, etc.) and `allow-internal-toggle-maximize` | Window management |\n| `dialog` | `allow-ask`, `allow-confirm`, `allow-message`, `allow-save`, `allow-open` | Native dialogs |\n| `global-shortcut` | Empty by default | Keyboard shortcut registration (`allow-register`, `allow-unregister`, `allow-is-registered`) |\n| `notification` | All notification commands including `allow-notify`, `allow-request-permission`, `allow-batch`, channel management | System notifications |\n| `shell` | `allow-open` (http/https, tel:, mailto:) | Shell execution, process spawning, URL opening |\n| `updater` | `allow-check`, `allow-download`, `allow-install`, `allow-download-and-install` | Self-update workflow |\n\n### Permission Identifier Format\n\nEvery permission follows the naming convention:\n\n```\n{plugin}:{scope}\n```\n\nWhere `scope` is one of:\n- **`default`** — The plugin's recommended default set.\n- **`allow-{command}`** — Grants access to a specific command.\n- **`deny-{command}`** — Explicitly blocks a specific command.\n\n## capabilities.json\n\nDefines the resolved capabilities for the application. LibreFang uses a single capability called `default`:\n\n```json\n{\n  \"identifier\": \"default\",\n  \"description\": \"Default permissions for the LibreFang desktop app\",\n  \"local\": true,\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"shell:default\",\n    \"dialog:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ]\n}\n```\n\n### What this means for the `main` window\n\nThe `main` window's webview can:\n\n- Use all core Tauri commands (path, event, window, webview, app, image, resources, menu, tray).\n- Send and manage system notifications.\n- Open `http(s)://`, `tel:`, and `mailto:` URLs via the shell.\n- Show native dialogs (ask, confirm, message, save, open).\n- Register, unregister, and check global keyboard shortcuts.\n- Control auto-start behavior on boot.\n- Check for, download, and install application updates.\n\nThe `local: true` setting means these permissions apply only to locally-served content (the bundled frontend), not to any remote URLs. No `remote` block is configured, and no additional windows or webviews are granted access.\n\n## desktop-schema.json\n\nA JSON Schema (Draft-07) document that validates capability files. It defines the structure of:\n\n- **`CapabilityFile`** — Top-level container (single capability, array, or object with `capabilities` key).\n- **`Capability`** — A single capability definition with `identifier`, `permissions`, optional `windows`, `webviews`, `platforms`, `remote`, and `local` fields.\n- **`CapabilityRemote`** — Remote URL patterns allowed to use the capability.\n- **`PermissionEntry`** — Either a raw identifier string or an object with `identifier` plus scoped `allow`/`deny` arrays.\n- **`Identifier`** — Enumerates every valid permission string across all plugins.\n\nThe schema includes conditional validation: when a `PermissionEntry` references a `shell:*` identifier, the `allow` and `deny` arrays must conform to the `ShellScopeEntry` schema, which validates command configurations including:\n- `name` — The command name used from the webview API.\n- `cmd` — The actual system command (supports `$HOME`, `$APPDATA`, and other Tauri directory variables).\n- `sidecar` — Whether the command references a bundled sidecar binary.\n- `args` — Argument rules (`true` for any, `false` for none, or an array of specific validators with regex patterns).\n\n## Relationship to the Codebase\n\nThese generated files sit between two layers:\n\n1. **Source of truth** — Developer-authored files in `src-tauri/capabilities/` and the plugin `tauri.conf.json` configuration.\n2. **Runtime consumer** — The Tauri runtime reads the generated capabilities to enforce permissions when the webview invokes commands.\n\nTo change permissions, edit the capability files in the source directory (not in `gen/`). The `gen/` contents are regenerated on every build. For example, to add filesystem write access, create or modify a capability file in `src-tauri/capabilities/` to include `fs:allow-write-text-file` with the appropriate scope, then rebuild.\n\n### Shell Scope Configuration\n\nThe `shell` plugin is the only plugin in this app with a `global_scope_schema`. When using `shell:allow-execute`, `shell:allow-spawn`, or `shell:allow-stdin-write` beyond the defaults, you must provide scoped entries in the permission configuration:\n\n```json\n{\n  \"identifier\": \"shell:allow-execute\",\n  \"allow\": [\n    {\n      \"name\": \"my-command\",\n      \"cmd\": \"$APPDATA/scripts/myscript.sh\",\n      \"args\": [\n        { \"validator\": \"\\\\w+\" }\n      ]\n    }\n  ]\n}\n```\n\nThis restricts which commands the frontend can execute and what arguments are accepted, validated by regex at runtime.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop application for LibreFang, built on Tauri 2.0. Wraps the agent OS core into a platform-native experience with system tray integration, auto-updates, and single-instance enforcement.\n\n## Architecture\n\nThe desktop app is a thin shell around the workspace's core libraries. It does not implement agent logic directly — instead it wires together the kernel, API server, extensions, and shared types into a deployable desktop package.\n\n```mermaid\ngraph TD\n    A[librefang-desktop<br/>Tauri 2.0 Shell] --> B[librefang-kernel]\n    A --> C[librefang-api]\n    A --> D[librefang-extensions]\n    A --> E[librefang-types]\n    C --> F[Local Axum Server<br/>127.0.0.1:*]\n    F --> G[WebView / Browser UI]\n    A --> H[System Tray]\n    A --> I[Auto-Updater<br/>GitHub Releases]\n```\n\nThe Tauri runtime hosts a local Axum HTTP/WebSocket server (`librefang-api`) and serves the agent UI through either an embedded WebView or the system browser (via the `open` crate). The kernel manages agent lifecycle, while extensions provide pluggable capabilities.\n\n## Key Responsibilities\n\n| Concern | Implementation |\n|---|---|\n| **Native packaging** | Tauri bundles for `.deb`, `.AppImage`, `.dmg`, and Windows installer |\n| **System tray** | `tray-icon` feature — runs in background, no mandatory window |\n| **Single instance** | `tauri-plugin-single-instance` prevents duplicate processes |\n| **Auto-start** | `tauri-plugin-autostart` optionally launches on login |\n| **Auto-update** | `tauri-plugin-updater` checks GitHub Releases using Ed25519-signed manifests |\n| **Shell integration** | `tauri-plugin-shell` for spawning system processes |\n| **Notifications** | `tauri-plugin-notification` for native OS notifications |\n| **Dialogs** | `tauri-plugin-dialog` for native file pickers and message boxes |\n| **Global shortcuts** | `tauri-plugin-global-shortcut` for hotkey bindings |\n\n## Configuration\n\n### Tauri Config (`tauri.conf.json`)\n\n| Field | Value |\n|---|---|\n| Product name | `LibreFang` |\n| Identifier | `ai.librefang.desktop` |\n| macOS minimum | 12.0 |\n| Windows digest | SHA-256 |\n| Update pubkey | Ed25519 (minisign format) |\n| Update endpoint | `https://github.com/librefang/librefang/releases/latest/download/latest.json` |\n\n#### Content Security Policy\n\nThe CSP is intentionally permissive toward `127.0.0.1:*` (HTTP and WebSocket) because the app communicates with its embedded local API server. External origins are restricted to Google Fonts. Key directives:\n\n- `connect-src` — allows WebSocket upgrades to the local server\n- `media-src` — allows audio/video blob URLs for voice/video channels\n- `frame-src` — supports embedded content via blob URLs\n- `object-src 'none'` — blocks plugin content\n- `script-src` — requires `'unsafe-inline'` and `'unsafe-eval'` for the WebView frontend\n\n> **Note:** If the frontend migrates to a strict CSP build tool, the `unsafe-*` directives should be removed and replaced with nonces or hashes.\n\n### Feature Flags\n\nFeatures are forwarded to `librefang-api` to control which communication channels are compiled in:\n\n| Flag | Effect |\n|---|---|\n| `default` | Standard channel set (via `librefang-api/default`) |\n| `all-channels` | Enables every available channel backend |\n| `mini` | Minimal build with reduced channel support |\n| `custom-protocol` | Production-only; switches Tauri from dev server to `tauri://` protocol |\n\nSet features in the workspace `Cargo.toml` or per-invocation:\n\n```bash\ncargo build --package librefang-desktop --features all-channels\n```\n\n## Dependencies on Workspace Crates\n\n- **`librefang-kernel`** — Core agent orchestration and lifecycle management.\n- **`librefang-api`** — Axum-based HTTP/WS API server. Built with `default-features = false` to allow feature control at the desktop level.\n- **`librefang-types`** — Shared data structures and serialization types.\n- **`librefang-extensions`** — Extension loading and management.\n\nAdditional runtime dependencies:\n\n- `clap` — CLI argument parsing (configuration overrides, debug flags).\n- `dirs` — Resolves platform-specific config/cache directories.\n- `axum` / `tokio` — Powers the embedded API server.\n- `toml` / `serde_json` — Configuration file parsing.\n- `tracing` / `tracing-subscriber` — Structured logging.\n\n## Build\n\nThe build script (`build.rs`) delegates entirely to `tauri_build::build()`, which:\n\n1. Compiles and bundles frontend assets.\n2. Generates Tauri capability files from
