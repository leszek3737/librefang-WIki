o not add HTTP fixture or integration tests here — those belong alongside the concrete provider implementation in `librefang-llm-drivers`.\n\n## Hard Boundaries\n\n| Forbidden | Reason |\n|---|---|\n| Importing `librefang-llm-drivers` | Circular dependency |\n| Importing `librefang-runtime` or `librefang-kernel` | Driver trait must stand alone |\n| Adding `reqwest`, TLS, or vendor SDKs | This crate is pure trait + types |\n| New `String`-typed error variants | Use structured enum fields |\n| `Box<dyn Error>` in trait signatures | Use `LlmError` |","other-librefang-llm-drivers-tests":"# Other — librefang-llm-drivers-tests\n\n# librefang-llm-drivers Tests\n\nIntegration test suite that locks in the wire contracts, error-handling semantics, and observability behaviour of every LLM driver in `librefang-llm-drivers`. Each test runs against a `wiremock` HTTP server so no real provider credentials or network access are needed.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Files\"\n        RS1[anthropic_request_shape]\n        RR1[anthropic_retry]\n        TH1[anthropic_trace_headers]\n        RS2[gemini_request_shape]\n        RR2[gemini_retry]\n        TH2[gemini_trace_headers]\n        RS3[openai_request_shape]\n        RR3[openai_retry_complete]\n        RS4[openai_retry_stream]\n        TH3[openai_trace_headers]\n        TH4[bedrock_trace_headers]\n        TH5[chatgpt_trace_headers]\n        TH6[copilot_trace_headers]\n        TH7[vertex_ai_trace_headers]\n        OLL[ollama_driver]\n    end\n\n    subgraph \"Shared Utilities\"\n        CM[common/mod.rs]\n    end\n\n    subgraph \"Under Test\"\n        DRV[librefang-llm-drivers]\n        DRV --> AD[AnthropicDriver]\n        DRV --> OD[OpenAIDriver]\n        DRV --> GD[GeminiDriver]\n        DRV --> BD[BedrockDriver]\n        DRV --> CD[ChatGptDriver]\n        DRV --> CPD[CopilotDriver]\n        DRV --> OLD[OllamaDriver]\n    end\n\n    RS1 --> CM\n    RR1 --> CM\n    TH1 --> CM\n    RS2 --> CM\n    RR2 --> CM\n    TH2 --> CM\n    RS3 --> CM\n    RR3 --> CM\n    RS4 --> CM\n    TH3 --> CM\n    TH4 --> CM\n    TH5 --> CM\n    TH6 --> CM\n    TH7 --> CM\n    OLL --> CM\n\n    CM -->|isolated_env| DRV\n    CM -->|mock_*_driver| DRV\n    CM -->|collect_stream| DRV\n    CM -->|lockout_file_exists| DRV\n```\n\n## Test Isolation\n\nEvery test follows the same setup pattern:\n\n1. **`isolated_env()`** — creates a temporary directory, sets `LIBREFANG_HOME` to it, configures `NO_PROXY` so no real traffic escapes, and enables `backoff::enable_test_zero_backoff()` to eliminate sleep delays during retries.\n2. **`MockServer::start().await`** — spins up an in-process wiremock HTTP server on a random port.\n3. **`mock_*_driver(&server)`** — constructs a driver pointed at the mock server with a synthetic API key and short timeout.\n4. **`#[serial_test::serial]`** — all tests are serialized because they mutate global process environment variables.\n\nThe `TestEnv` guard (returned by `isolated_env`) holds a `TempDir` and a `ZeroBackoffGuard`. Dropping it at test end restores the original state.\n\n## Test Categories\n\n### Request Shape Tests\n\nFiles: `anthropic_request_shape.rs`, `gemini_request_shape.rs`, `openai_request_shape.rs`\n\nThese lock in the provider-specific wire contract — the HTTP method, URL path, headers, and JSON body shape. They verify:\n\n| Concern | What's Asserted |\n|---|---|\n| **Endpoint** | Correct URL path (e.g. `/v1/messages`, `/chat/completions`, `/v1beta/models/<model>:generateContent`) |\n| **Auth headers** | `x-api-key` / `Authorization: Bearer` / query-string `key=` present |\n| **Provider headers** | `anthropic-version`, `content-type: application/json` |\n| **Body fields** | `model`, `messages`, `max_tokens`, `system`, `tools` with correct envelopes |\n| **Tool envelope** | Anthropic: `{name, input_schema}`; OpenAI: `{type:\"function\", function:{name,...}}`; Gemini: `tools[].functionDeclarations[]` |\n| **Tool-use response** | Provider-specific tool-call blocks parse into `CompletionResponse.tool_calls` with `StopReason::ToolUse` and correct `id`/`name`/`input` |\n| **Streaming** | SSE `TextDelta` events concatenate to match `CompletionResponse.text()`; `ContentComplete` terminates the stream |\n| **Usage** | Token counts propagate into `resp.usage` |\n\n### Retry Tests\n\nFiles: `anthropic_retry.rs`, `gemini_retry.rs`, `openai_retry_complete.rs`, `openai_retry_stream.rs`\n\nExercise the retry and rate-limit machinery:\n\n| Scenario | Behaviour Verified |\n|---|---|\n| **429 → retry → success** | Driver retries after `Retry-After` header, eventual success returns `Ok` |\n| **429 exhaustion** | After max retries, returns `Err(LlmError::RateLimited)` |\n| **529 / 503 overloaded** | Retries succeed; **no lockout file** created (overloaded ≠ account-level rate limit) |\n| **529 / 503 exhaustion** | Returns `Err(LlmError::Overloaded)` |\n| **Pre-existing lockout** | `create_lockout_file()` blocks the request entirely; zero HTTP calls reach the server |\n| **Stream 429 retry** | Streaming endpoint also retries on 429 and succeeds |\n| **403 auth failure** (Gemini) | Returns `Err(LlmError::AuthenticationFailed)`, no retry |\n| **OpenAI-specific adaptors** | `temperature` stripping, `max_tokens` → `max_completion_tokens` migration, `max_tokens` auto-capping, tool stripping on 500, `tool_use_failed` retry |\n\nLockout files live at `$LIBREFANG_HOME/rate_limits/{provider}__{key_id_hash}.json`. The helper `lockout_file_exists()` checks for them after 429 tests.\n\n### Trace Header Tests\n\nFiles: `anthropic_trace_headers.rs`, `gemini_trace_headers.rs`, `openai_trace_headers.rs`, `bedrock_trace_headers.rs`, `chatgpt_trace_headers.rs`, `copilot_trace_headers.rs`, `vertex_ai_trace_headers.rs`\n\nAll drivers share a unified trace-header contract for observability:\n\n| Header | Source Field |\n|---|---|\n| `x-librefang-agent-id` | `CompletionRequest.agent_id` |\n| `x-librefang-session-id` | `CompletionRequest.session_id` |\n| `x-librefang-step-id` | `CompletionRequest.step_id` |\n\nEach provider file tests four cases:\n\n1. **Headers present when IDs are set** — both `complete()` and `stream()` emit the headers.\n2. **Headers absent when IDs are `None`** — no `x-librefang-*` headers appear.\n3. **Operator opt-out via `with_emit_caller_trace_headers(false)`** — suppresses headers even when IDs are populated.\n4. **Partial / empty / malformed values** (OpenAI-specific) — empty strings are skipped, partial sets emit only what's populated.\n\n### Ollama Driver Tests\n\nFile: `ollama_driver.rs`\n\nThe most comprehensive single-driver test file, covering the native `/api/chat` contract (not the OpenAI-compatible shim):\n\n| Test | What It Verifies |\n|---|---|\n| `request_targets_native_api_chat_with_native_body_shape` | POSTs to `/api/chat`, body has `model`/`messages`/`options.{num_predict,temperature}`, no top-level `max_tokens` |\n| `auth_header_only_emitted_when_api_key_configured` | Empty key → no `Authorization`; explicit key → `Bearer` header |\n| `thinking_request_sets_native_think_true_field` | `request.thinking = Some(_)` sets native `\"think\": true` |\n| `non_streaming_tool_calls_parse_with_synthesised_ids` | `tool_calls` parse with `ollama-call-*` synthesised IDs, `StopReason::ToolUse` |\n| `non_streaming_first_class_thinking_routes_to_thinking_block` | Native `message.thinking` → `ContentBlock::Thinking` |\n| `streaming_ndjson_aggregates_text_and_reports_usage` | NDJSON chunks concatenate, `done: true` supplies usage |\n| `streaming_thinking_deltas_route_to_thinking_event` | `message.thinking` → `StreamEvent::ThinkingDelta`, never leaks to `TextDelta` |\n| `streaming_tool_calls_emit_start_end_pair` | `ToolUseStart`/`ToolUseEnd` events, parsed tool calls in final response |\n| `http_404_maps_to_model_not_found` | 404 → `LlmError::ModelNotFound` |\n| `http_401_maps_to_authentication_failed` | 401 → `LlmError::AuthenticationFailed` |\n| `http_502_passes_through_raw_body_in_api_error` | Non-JSON 502 → `LlmError::Api { status: 502, message: \"Bad Gateway\" }` |\n| `multimodal_image_block_serialises_as_native_images_array` | `ContentBlock::Image` → `images: [\"<base64>\"]`, not OpenAI `image_url` |\n| `tool_result_serialises_as_role_tool_with_tool_name` | `ContentBlock::ToolResult` → `role:\"tool\"` with `tool_name`, not `tool_call_id` |\n| `streaming_tool_call_with_stringified_arguments_is_coerced` | Double-encoded JSON string arguments coerced to real objects |\n| `streaming_unparseable_tool_calls_chunk_keeps_prior_snapshot` | Malformed chunk doesn't erase prior valid tool-call snapshot |\n| `streaming_truncated_response_returns_partial_with_zero_usage` | Missing `done: true` → partial text, zero usage (no hard error) |\n| `reverse_proxy_v1_path_is_not_stripped` | User-explicit `/v1` in custom mount preserved |\n| `legacy_v1_suffix_in_user_base_url_is_silently_stripped` | Bare `{host}/v1` migration to `{host}/api/chat` |\n\n## Shared Test Utilities (`common/mod.rs`)\n\n### Environment & Driver Factories\n\n| Function | Purpose |\n|---|---|\n| `isolated_env()` | Creates temp dir, sets env vars, enables zero-backoff mode |\n| `mock_openai_driver(server)` | `OpenAIDriver` pointed at mock with synthetic `sk-test-*` key |\n| `mock_anthropic_driver(server)` | `AnthropicDriver` pointed at mock with synthetic `sk-ant-test-*` key |\n| `mock_gemini_driver(server)` | `GeminiDriver` pointed at mock with synthetic `test-key-*` key |\n| `mock_ollama_driver(server)` | `OllamaDriver` with empty key (localhost default) |\n\n### Request Builders\n\nAll return a `CompletionRequest` pre-populated with sensible defaults:\n\n- **`simple_request(model)`** — minimal single-message request\n- **`request_with_tools(model)`** — includes a `get_weather` tool definition\n- **`request_with_temperature(model, temp)`** — sets explicit temperature\n- **`o_series_request()`** — `o3-mini` model with `temperature: 1.0` and `max_tokens: 1000`\n\n### Response Helpers\n\nPre-built JSON bodies matching each provider's wire format:\n\n| Function | Provider | Notes |\n|---|---|---|\n| `openai_200_body(text)` | OpenAI | `chat.completion` with usage |\n| `openai_sse_body(chunks)` | OpenAI | SSE with `delta.content` per chunk |\n| `openai_429_response(secs)` | OpenAI | Rate-limit with `retry-after` |\n| `openai_400_temperature_rejected()` | OpenAI | For temperature-strip retry |\n| `openai_400_max_tokens_unsupported()` | OpenAI | For `max_tokens` → `max_completion_tokens` migration |\n| `openai_400_max_tokens_cap(limit)` | OpenAI | For auto-cap retry |\n| `openai_400_tool_not_supported()` | OpenAI | For tool-strip retry |\n| `anthropic_200_body(text)` | Anthropic | `message` with `end_turn` |\n| `anthropic_sse_body(text)` | Anthropic | Full SSE event sequence (message_start → content_block_delta per char → message_stop) |\n| `anthropic_429_response()` | Anthropic | Rate-limit with `anthropic-ratelimit-*` headers |\n| `gemini_200_body(text)` | Gemini | `candidates` with `STOP` |\n| `gemini_sse_body(text)` | Gemini | Single-chunk SSE |\n| `gemini_429_response()` | Gemini | `RESOURCE_EXHAUSTED` |\n| `gemini_503_response()` | Gemini | `UNAVAILABLE` |\n\n### Stream Collection\n\n```rust\npub async fn collect_stream(\n    driver: &dyn LlmDriver,\n    request: CompletionRequest,\n) -> (Result<CompletionResponse, LlmError>, Vec<StreamEvent>)\n```\n\nSpawns a background task that drains the `mpsc::Receiver` into a `Vec<StreamEvent>`, calls `driver.stream()`, and returns both the final result and all emitted events.\n\n### Rate-Limit Helpers\n\n- **`lockout_file_exists(provider, api_key)`** — checks if a lockout file exists for the given provider/key pair using `shared_rate_guard::key_id_hash()`.\n- **`create_lockout_file(provider, api_key, until)`** — writes a lockout record via `shared_rate_guard::record()`.\n\n### Utility\n\n- **`request_json(request)`** — deserialises a wiremock `Request` body into `serde_json::Value` for field-level assertions.\n- **`provider_for_openai_mock()`** — returns `\"openai-compat\"`, the provider name used for lockout file lookups.\n\n## Running the Tests\n\n```bash\n# All driver tests (serialized, ~2–5s total with zero backoff)\ncargo test -p librefang-llm-drivers\n\n# Single provider\ncargo test -p librefang-llm-drivers anthropic_\ncargo test -p librefang-llm-drivers gemini_\ncargo test -p librefang-llm-drivers openai_\ncargo test -p librefang-llm-drivers ollama_\n\n# Single test\ncargo test -p librefang-llm-drivers request_shape_includes_model_system_tools\n```\n\nAll tests use `#[serial_test::serial]` because `isolated_env()` mutates `std::env` vars. Do not remove the serial annotation.\n\n## Conventions for Adding New Tests\n\n1. **Use `common/` helpers** — never construct a `CompletionRequest` by hand if a `simple_request()` or `request_with_tools()` variant exists. Add a new builder to `common/mod.rs` if the existing ones don't cover the shape you need.\n2. **Always call `isolated_env()`** as the first line and bind to `_env` (underscore-prefixed so the guard isn't dropped early).\n3. **Use `wiremock` matchers** (`method`, `path`, `path_regex`) and `.expect(n)` to assert the correct number of HTTP round-trips.\n4. **Name retry tests with ordered prefixes** (`aa1_`, `aa2_`, `oc1_`, `ag1_`) so they appear in logical order in test output.\n5. **Assert on wire shape, not just outcome** — use `server.received_requests()` to inspect headers and body, locking in the provider contract.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers for LibreFang. This crate ships ready-to-use implementations of the `LlmDriver` trait (defined in `librefang-llm-driver`) for Anthropic, OpenAI, Gemini, Groq, Ollama, and other providers, along with production-grade infrastructure for credential rotation, rate-limit tracking, failover, and stream handling.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Consumer code] --> B[FallbackChain]\n    B --> C1[Anthropic Driver]\n    B --> C2[OpenAI Driver]\n    B --> C3[Gemini Driver]\n    B --> C4[Ollama Driver]\n    C1 & C2 & C3 & C4 --> D[librefang-llm-driver trait]\n    C1 & C2 & C3 --> E[ArcCredentialPool]\n    C1 & C2 & C3 --> F[RateLimitBucket]\n    B --> G[retry / backoff]\n    C1 & C2 & C3 --> H[stream_backpressure / utf8_stream]\n```\n\nConsumer code typically constructs a `FallbackChain` containing one or more provider drivers. Each driver draws credentials from a shared `ArcCredentialPool` and reports rate-limit state to a `RateLimitBucket`. When a driver fails, the chain advances to the next entry with a `FailoverReason`.\n\n## Relationship to sibling crates\n\n| Crate | Role |\n|---|---|\n| `librefang-llm-driver` | Defines the `LlmDriver` trait, shared error types (`LlmError`), and the request/response types that every driver must accept. |\n| `librefang-types` | Domain-level types (messages, tool definitions, etc.) consumed by the trait and passed through drivers unchanged. |\n| `librefang-http` | Shared HTTP client construction and middleware; drivers use this to build `reqwest` clients with consistent telemetry injection. |\n\nThis crate re-exports `llm_driver`, `llm_errors`, and `FailoverReason` from its dependencies so that downstream code only needs to depend on `librefang-llm-drivers` directly.\n\n## Key components\n\n### Per-provider drivers — `drivers::*`\n\nEach provider lives in its own submodule under `drivers` (e.g. `drivers::anthropic`, `drivers::openai`, `drivers::gemini`). Every driver:\n\n- Implements the `LlmDriver` trait from `librefang-llm-driver`.\n- Translates the trait's generic request model into the provider's wire format (headers, JSON body, URL).\n- Parses provider-specific response fields (e.g. Anthropic `thinking` blocks, OpenAI `usage` stats) back into the common response type.\n- Delegates HTTP execution to `reqwest` clients built via `librefang-http`.\n\n### Fallback chain — `drivers::fallback_chain`\n\n```rust\nuse librefang_llm_drivers::drivers::fallback_chain::{FallbackChain, ChainEntry};\n```\n\n`FallbackChain` composes multiple `LlmDriver` instances into an ordered list. On each request it tries the first entry; if the call fails with a retriable error it records the `FailoverReason` and attempts the next entry. This gives multi-provider resilience without changing caller logic.\n\n`ChainEntry` wraps an individual driver with optional metadata (weight, priority, or tags) used by the chain's selection strategy.\n\n### Credential pool — `credential_pool`\n\n```rust\nuse librefang_llm_drivers::credential_pool::{\n    ArcCredentialPool, CredentialPool, PoolStrategy, PooledCredential, new_arc_pool,\n};\n```\n\nManages a set of API keys per provider and dispenses them according to a `PoolStrategy` (round-robin, random, etc.). Key features:\n\n- **`ArcCredentialPool`** — a thread-safe, `DashMap`-backed pool behind an `Arc`, safe to share across concurrent driver instances.\n- **`PooledCredential`** — a borrowed credential that is automatically returned to the pool on drop, enabling correct concurrency even when keys have per-minute rate caps.\n- **`new_arc_pool`** — convenience constructor that builds an `ArcCredentialPool` from a list of keys.\n\nDrivers accept an `ArcCredentialPool` at construction time and call into it on every request to obtain a fresh key.\n\n### Rate-limit tracking — `rate_limit_tracker`\n\n```rust\nuse librefang_llm_drivers::rate_limit_tracker::{RateLimitBucket, RateLimitSnapshot};\n```\n\n`RateLimitBucket` is a shared, atomic counter that drivers update after each response based on provider-returned headers (`x-ratelimit-remaining`, `Retry-After`, etc.). `RateLimitSnapshot` exposes a read-only view for observability dashboards and metrics.\n\nWhen a bucket reports exhaustion, drivers can preemptively fail fast (returning a `FailoverReason::RateLimited`) rather than wasting a request.\n\n### Retry and backoff utilities\n\n- **`backoff`** — exponential backoff with jitter. Used internally by drivers and the fallback chain.\n- **`retry_after`** — parses `Retry-After` headers (both delta-seconds and HTTP-date forms) and converts them to a `Duration`.\n- **`shared_rate_guard`** — a RAII guard that decrements a rate-limit counter when dropped, ensuring bookkeeping stays correct even on panic paths.\n\n### Stream handling\n\n- **`stream_backpressure`** — wraps a byte stream with bounded-buffer backpressure so a fast producer (the network) cannot overwhelm a slow consumer (downstream parsing).\n- **`utf8_stream`** — handles partial UTF-8 sequences that may arrive at chunk boundaries, reassembling them before yielding complete `String` frames. Essential for streaming completions where a multi-byte character can be split across TCP segments.\n- **`think_filter`** — strips provider-specific \"thinking\" blocks (e.g. Anthropic's `<thinking>` tags) from the streamed output when the caller opts out of receiving internal reasoning.\n\n## Dependency rationale\n\n| Dependency | Why it's here |\n|---|---|\n| `reqwest` | HTTP transport for all provider APIs. |\n| `tokio` | Async runtime; drivers are fully async. |\n| `serde` / `serde_json` | Serialising requests and deserialising provider-specific JSON responses. |\n| `async-trait` | The `LlmDriver` trait is async; this crate provides the concrete impls. |\n| `tracing` / `opentelemetry` / `tracing-opentelemetry` | Structured logging and distributed trace propagation on every HTTP call. |\n| `metrics` | Counters and histograms for request latency, token usage, and rate-limit events. |\n| `dashmap` | Lock-free concurrent map backing `ArcCredentialPool`. |\n| `sha2` | Hashing credential identifiers for logging without leaking raw API keys. |\n| `zeroize` | Securely zeroing credential memory on drop. |\n| `base64` | Encoding inline images in multi-modal requests. |\n| `uuid` / `rand` | Request IDs and jitter for backoff. |\n| `chrono` | Parsing `Retry-After` HTTP-date values. |\n\n## Testing\n\nDev-dependencies include `wiremock` for mocking provider HTTP endpoints, `serial_test` for tests that share global state, and `tempfile` for credential-store fixtures. Each driver has integration-style tests that spin up a mock server, feed it a canned response, and assert that the driver produces the correct typed output.\n\n## Usage sketch\n\n```rust\nuse librefang_llm_drivers::{\n    drivers::anthropic::AnthropicDriver,\n    drivers::fallback_chain::{FallbackChain, ChainEntry},\n    credential_pool::new_arc_pool,\n};\nuse librefang_llm_driver::LlmDriver;\n\n#[tokio::main]\nasync fn main() {\n    let pool = new_arc_pool(vec![\"sk-ant-key1\".into(), \"sk-ant-key2\".into()]);\n    let anthropic = AnthropicDriver::new(pool);\n\n    let chain = FallbackChain::new(vec![\n        ChainEntry::new(anthropic),\n        // …add more providers here\n    ]);\n\n    let response = chain.complete(request).await.expect(\"all providers failed\");\n    println!(\"{:?}\", response);\n}\n```\n\nThis keeps the consumer agnostic to which provider actually handled the request.","other-librefang-memory-src":"# Other — librefang-memory-src\n\n# RosterStore — SQLite-Backed Group Roster\n\n## Purpose\n\n`RosterStore` tracks which users have been seen in each group chat, persisting membership data across daemon restarts. Agents query this store through the `group_members` tool rather than having the full roster injected into the system prompt, which saves tokens on large groups.\n\nThe store lives in `librefang-memory/src/roster_store.rs` and operates on the same SQLite database managed by `MemorySubstrate`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    MS[\"MemorySubstrate::open\"] -->|\"runs migrations\"| MIG[\"migration::run_migrations\"]\n    MS -->|\"constructs\"| RS[\"RosterStore\"]\n    MIG -->|\"creates group_roster table\"| DB[(SQLite)]\n    RS -->|\"reads/writes via\"| DB\n    AGENT[\"Agent (group_members tool)\"] -->|\"queries\"| RS\n```\n\n## Key Design Decisions\n\n**No schema DDL in the constructor.** `RosterStore::new` only wraps an existing connection pool. The `group_roster` table is created by `migration::migrate_v28`, which `MemorySubstrate::open` runs before constructing the store. This ensures:\n\n1. Every memory table goes through the single migration ladder — no divergent schema paths.\n2. Constructing a `RosterStore` can never panic on a locked or read-only database. Schema failures surface from `MemorySubstrate::open` at boot instead.\n\n**Graceful degradation on pool exhaustion.** Every method that acquires a connection handles pool exhaustion by logging a warning, incrementing a failure metric, and returning a safe default (empty vec, zero count, or no-op). The store never panics due to contention.\n\n## Schema\n\nThe underlying `group_roster` table (created by migration v28):\n\n| Column | Type | Notes |\n|---|---|---|\n| `channel_type` | text | e.g. `\"telegram\"` |\n| `chat_id` | text | Group/chat identifier |\n| `user_id` | text | User identifier within the channel |\n| `display_name` | text | Current display name |\n| `username` | text | Nullable handle/username |\n| `first_seen` | integer | Unix timestamp of first insertion |\n| `last_seen` | integer | Unix timestamp, updated on every upsert |\n\nThe unique constraint is **(channel_type, chat_id, user_id)**.\n\n## API\n\n### `RosterStore::new(pool: Pool<SqliteConnectionManager>) -> Self`\n\nWraps an existing r2d2 connection pool. Call this only after migrations have been applied.\n\n### `upsert(channel, chat_id, user_id, display_name, username)`\n\nInserts a new member or updates an existing one. On conflict (same channel + chat + user), it:\n\n- Overwrites `display_name` with the new value.\n- Updates `username` only if a non-null value is provided (`COALESCE` preserves the existing username).\n- Refreshes `last_seen` to the current Unix timestamp.\n- Leaves `first_seen` unchanged.\n\nSilently returns if `chat_id` or `user_id` is empty — these are treated as invalid identifiers.\n\n### `members(channel, chat_id) -> Vec<(String, String, Option<String>)>`\n\nReturns all members for the given chat as `(user_id, display_name, username)` tuples, ordered alphabetically by `display_name`. Returns an empty `Vec` on pool exhaustion or if no members exist.\n\n### `remove_member(channel, chat_id, user_id)`\n\nDeletes a single member from the roster. No-op on pool exhaustion.\n\n### `member_count(channel, chat_id) -> usize`\n\nReturns the number of members in a chat. Returns `0` on pool exhaustion or if no members exist.\n\n## Error Handling & Observability\n\nAll pool acquisition failures emit:\n\n- A `tracing::warn` log identifying the store (`roster`), the operation, and the channel/chat identifiers.\n- A counter increment on `librefang_memory_pool_get_failed_total` with labels `store => \"roster\"` and `op => <operation>`.\n\nSQL execution errors from `execute` and `query_row` are silently consumed (`let _ = ...` / `.unwrap_or(...)`). This is intentional — the roster is best-effort metadata, and transient SQLite errors should not crash the agent loop.\n\n## Isolation Model\n\nEach `(channel_type, chat_id)` pair is fully isolated. There is no cross-chat leakage: members in `(\"telegram\", \"-100\")` are invisible to queries for `(\"telegram\", \"-200\")` or `(\"discord\", \"100\")`. This is enforced by the `WHERE` clause in every query.\n\n## Testing\n\nTests create an in-memory SQLite database via `in_memory_store()`, which:\n\n1. Builds a single-connection pool (`max_size(1)`).\n2. Runs `migration::run_migrations` to create the full schema.\n3. Constructs and returns a `RosterStore`.\n\nCovered scenarios:\n\n- **`upsert_and_list`** — basic insertion and alphabetical ordering.\n- **`idempotent_upsert_updates_display_name`** — repeated upserts update display_name but don't duplicate rows.\n- **`remove_member`** — deletion reduces count and the removed member is absent from listings.\n- **`empty_chat_returns_nothing`** — querying a nonexistent chat returns empty/zero.\n- **`different_chats_are_isolated`** — members in one chat don't appear in another.\n- **`empty_ids_are_ignored`** — upserts with empty `chat_id` or `user_id` are silently dropped.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests: Canonical Chat-Scoped Integration Tests\n\n## Purpose\n\nThis module contains **regression integration tests** that guard against cross-session data leakage in canonical memory. Specifically, it verifies that when a single agent serves multiple WhatsApp conversations (e.g., a private DM and a group chat), messages from one session never appear in another session's LLM context.\n\nThe tests exercise the full public API roundtrip — `append_canonical` → `canonical_context` — using an in-memory SQLite database, matching the real call path the kernel uses on every inbound message.\n\n## Background: The Bug Being Guarded\n\nBefore the fix in `session.rs`, every `CanonicalEntry` was stored without an originating `SessionId` tag. When `canonical_context` loaded recent messages to build the LLM prompt, it returned all entries for a given `AgentId` regardless of which chat they came from. This meant:\n\n- A WhatsApp DM could inject group messages into its prompt.\n- A group chat could surface private DM content to all participants.\n\nThe fix introduces per-entry `SessionId` tagging on write and session-scoped filtering on read. These tests ensure that fix stays in place.\n\n## Test Infrastructure\n\n### `setup() → SessionStore`\n\nCreates a fully initialized `SessionStore` backed by an in-memory SQLite database:\n\n1. Builds an `r2d2::Pool<SqliteConnectionManager>` with `max_size(1)`.\n2. Runs database migrations via `run_migrations`.\n3. Returns a `SessionStore` ready for use.\n\nThis mirrors production initialization without touching the filesystem.\n\n### `user_msg(text: &str) → Message`\n\nConvenience helper that constructs a `Message` with `Role::User` and `MessageContent::Text`. Sets `pinned: false` and `timestamp: None`, since these fields are irrelevant to the session-isolation logic under test.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it verifies:** Per-session filtering prevents cross-talk between chats sharing the same agent.\n\n**Scenario:**\n- One agent serves both a DM with Jessica and a group Jessica belongs to.\n- Three messages are appended in interleaved order: `dm-1`, `group-1`, `dm-2`.\n- Each append includes its derived `SessionId` via `SessionId::for_channel`.\n\n**Key assertion:** `SessionId::for_channel` produces different session IDs for different channel identifiers:\n\n```\nsession_dm   = for_channel(agent, \"whatsapp:393331111111@s.whatsapp.net\")\nsession_group = for_channel(agent, \"whatsapp:120363111111111111@g.us\")\nassert_ne!(session_dm, session_group)\n```\n\n**Assertions on reads:**\n- `canonical_context(agent, Some(session_dm), None)` returns only `[\"dm-1\", \"dm-2\"]` — never `\"group-1\"`.\n- `canonical_context(agent, Some(session_group), None)` returns only `[\"group-1\"]` — never `\"dm-1\"` or `\"dm-2\"`.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it verifies:** Passing `session_id = None` to `canonical_context` returns all messages across all sessions, preserving the original pre-fix semantics for callers that haven't adopted per-session filtering.\n\n**Scenario:**\n- Two messages are appended under two different sessions (`session_a` from WhatsApp, `session_b` from Telegram).\n- `canonical_context(agent, None, None)` is called.\n\n**Assertion:** Both `\"a-1\"` and `\"b-1\"` are returned in order, confirming the unfiltered path still works.\n\n## Architecture and Data Flow\n\n```mermaid\nsequenceDiagram\n    participant Test\n    participant SessionStore\n    participant SQLite\n\n    Test->>SessionStore: append_canonical(agent, msgs, None, Some(session_dm))\n    SessionStore->>SQLite: INSERT with session_id tag\n    Test->>SessionStore: append_canonical(agent, msgs, None, Some(session_group))\n    SessionStore->>SQLite: INSERT with session_id tag\n    Test->>SessionStore: canonical_context(agent, Some(session_dm), None)\n    SessionStore->>SQLite: SELECT ... WHERE session_id = session_dm\n    SQLite-->>SessionStore: DM rows only\n    SessionStore-->>Test: (summary, dm_messages)\n```\n\n## Relationships to Other Crates\n\n| Crate | Dependency | Usage |\n|---|---|---|\n| `librefang-memory` | Under test | Provides `SessionStore`, `run_migrations` |\n| `librefang-types` | Types | Provides `AgentId`, `SessionId`, `Message`, `Role`, `MessageContent` |\n| `r2d2` / `r2d2-sqlite` | Infrastructure | Connection pooling for in-memory SQLite |\n\n## Running\n\n```bash\n# Run just these integration tests\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# Run with output visible\ncargo test -p librefang-memory --test canonical_chat_scoped_integration -- --nocapture\n```\n\nNo external services or environment variables are required. The tests are self-contained and use only in-memory SQLite.","other-librefang-memory-wiki-tests":"# Other — librefang-memory-wiki-tests\n\n# librefang-memory-wiki Tests\n\nIntegration and contract tests for the memory wiki vault — a durable, file-backed knowledge store that agents read and write through `WikiVault`.\n\n## Purpose\n\nThese tests serve two distinct roles:\n\n1. **Acceptance tests** (`wiki_acceptance.rs`) validate the seven-bullet specification from issue #3329. They exercise `WikiVault` against a real on-disk filesystem (via `tempfile::TempDir`) and assert behaviour, file layout, frontmatter persistence, and link topology.\n\n2. **Contract tests** (`wiki_handle_contract.rs`) lock down the JSON wire shapes that any `WikiAccess` implementation must produce. They shadow the production kernel-side adaptor so that drift between trait definition and vault output is caught at PR time rather than at first production call.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    subgraph \"wiki_acceptance.rs\"\n        A1[default_config_is_disabled]\n        A2[isolated_mode_round_trip]\n        A3[provenance_is_populated]\n        A4[external_hand_edit_is_preserved]\n        A5o[obsidian_mode_emits_wiki_link]\n        A5n[native_mode_emits_markdown_links]\n        A7[five_pages_backlinks]\n        AR[reserved_modes_error]\n    end\n\n    subgraph \"wiki_handle_contract.rs\"\n        H0[disabled_handle_returns_unavailable]\n        HW[wiki_write_response_shape]\n        HG[wiki_get_returns_frontmatter]\n        HS[wiki_search_returns_array]\n        HP[rejects_malformed_provenance]\n    end\n\n    subgraph \"Under test\"\n        V[WikiVault]\n        W[WikiHandle - WikiAccess impl]\n    end\n\n    A1 & A2 & A3 & A4 & A5o & A5n & A7 & AR --> V\n    H0 & HW & HG & HS & HP --> W\n    W --> V\n```\n\n## Helpers\n\nBoth files provide thin helpers to reduce boilerplate:\n\n### `wiki_acceptance.rs`\n\n- **`provenance(agent, turn)`** — Constructs a `ProvenanceEntry` with a fixed session (`\"sess_acceptance\"`) and channel (`\"test-harness\"`), varying only the agent name and turn number.\n- **`vault_in(dir, render)`** — Creates a `WikiVault` via `WikiVault::with_root` pointed at the temp directory, using `MemoryWikiIngestFilter::Tagged`. Panics on construction failure.\n\n### `wiki_handle_contract.rs`\n\n- **`WikiHandle(Option<Arc<WikiVault>>)`** — A minimal struct that implements the `WikiAccess` trait from `librefang-kernel-handle`. `None` simulates a disabled vault; `Some(Arc<...>)` delegates to the real vault. This mirrors the production kernel adaptor verbatim.\n- **`vault_handle(dir)`** — Builds a `WikiVault` inside the temp directory and wraps it in `WikiHandle(Some(...))`.\n\n## Acceptance Tests — Behaviour Coverage\n\n### Default configuration is off\n\n**`default_config_is_disabled_and_construction_short_circuits`** asserts that `MemoryWikiConfig::default()` has `enabled = false` and that calling `WikiVault::new` with this config returns `WikiError::Disabled`. No vault is constructed; no files are touched.\n\n### Isolated round-trip\n\n**`isolated_mode_round_trip`** writes a page via `vault.write`, confirms the `.md` file exists on disk, reads it back with `vault.get`, and verifies `vault.search` finds it by content. The `WriteOutcome.merged_with_external_edit` flag must be `false`.\n\n### Provenance accumulation\n\n**`provenance_is_populated_on_every_write`** writes to the same topic three times with different agents and turns. It asserts:\n- `page.frontmatter.provenance` has length 3 with agents in order `[alpha, beta, alpha]`.\n- The on-disk YAML contains `provenance:`, agent names, and `content_sha256:`.\n\n### Hand-edit preservation\n\n**`external_hand_edit_is_preserved_under_force`** simulates a user editing a vault `.md` file outside the system:\n\n1. Write a page normally.\n2. Manually append text to the file.\n3. Attempt another write with `force = false` → must fail with `WikiError::HandEditConflict`.\n4. Retry with `force = true` → the hand-typed text survives; the passed body is intentionally ignored. Provenance is appended (total 2 entries), and `outcome.merged_with_external_edit` is `true`.\n\n### Render modes\n\nTwo counterpart tests exercise the link-rewriting behaviour:\n\n| Test | Render Mode | `[[topic]]` becomes | Assertion |\n|---|---|---|---|\n| `obsidian_mode_emits_wiki_link_syntax` | `RenderMode::Obsidian` | `[[topic]]` (unchanged) | No `[topic](topic.md)` in output |\n| `native_mode_emits_relative_markdown_links` | `RenderMode::Native` | `[topic](topic.md)` | No `[[topic]]` in output |\n\nThe `render_mode_conversion_round_trip` test confirms `MemoryWikiRenderMode::from` / `Into<RenderMode>` conversions are identity mappings.\n\n### Backlink topology\n\n**`five_pages_with_links_produce_five_files_and_correct_backlinks`** creates a chain of five pages:\n\n```\nalpha → [beta, gamma]\nbeta  → [gamma, delta]\ngamma → [delta]\ndelta → [epsilon]\nepsilon → (leaf)\n```\n\nIt asserts:\n- Six `.md` files on disk: the five topics plus `index.md`.\n- `vault.backlinks()` returns exactly the six expected `BacklinkEntry` pairs.\n- `index.md` mentions every topic and does not mention `_meta`.\n\n### Reserved mode rejection\n\n**`reserved_modes_return_specific_error`** constructs a `MemoryWikiConfig` with `mode: MemoryWikiMode::Bridge` and confirms `WikiVault::new` returns `WikiError::ModeNotImplemented(\"bridge\")`. This ensures misconfiguration is loud rather than silently accepted.\n\n## Contract Tests — JSON Shape Guarantees\n\nThese tests exist because `librefang-kernel-handle` defines the `WikiAccess` trait (the JSON interface) but cannot depend on a real vault, while `librefang-kernel` has the real implementation but lives behind heavy system dependencies. The tests here close that gap.\n\n### Disabled vault\n\n**`disabled_handle_returns_per_method_unavailable`** — When `WikiHandle(None)` calls `wiki_get`, `wiki_search`, or `wiki_write`, each must return `KernelOpError::Unavailable` with the method name as context.\n\n### Write response shape\n\n**`wiki_write_response_shape_is_stable`** — A successful `wiki_write` must return a JSON object with:\n\n| Field | Type | Constraint |\n|---|---|---|\n| `topic` | string | matches the input topic |\n| `path` | string | present and non-null |\n| `content_sha256` | string | exactly 64 hex characters |\n| `merged_with_external_edit` | boolean | `false` for a fresh write |\n\n### Get response shape\n\n**`wiki_get_returns_topic_frontmatter_body_object`** — A successful `wiki_get` must return a JSON object with:\n\n| Field | Type | Nested requirements |\n|---|---|---|\n| `topic` | string | — |\n| `body` | string | — |\n| `frontmatter` | object | contains `topic`, `created`, `updated`, `content_sha256`, and `provenance` (array of objects with `agent`) |\n\n### Search response shape\n\n**`wiki_search_returns_array_of_topic_snippet_score_objects`** — A successful `wiki_search` must return a JSON array where each element is an object containing `topic` (string), `snippet` (string), and `score` (number).\n\n### Input validation\n\n**`wiki_write_rejects_malformed_provenance_with_invalid_input`** — Passing provenance without the required `agent` field must return `KernelOpError::InvalidInput` (not `Internal`), with a message mentioning `\"provenance\"`.\n\n## Running\n\n```sh\n# All tests in this crate\ncargo test -p librefang-memory-wiki\n\n# Acceptance tests only\ncargo test -p librefang-memory-wiki --test wiki_acceptance\n\n# Contract tests only\ncargo test -p librefang-memory-wiki --test wiki_handle_contract\n```\n\nNo external services or system dependencies are required. Every test creates an isolated `TempDir` that is cleaned up on completion.","other-librefang-memory-wiki":"# Other — librefang-memory-wiki\n\n# librefang-memory-wiki\n\nA durable markdown knowledge vault for the LibreFang Agent OS. This module provides long-term, file-based storage of agent knowledge as Markdown documents enriched with provenance frontmatter and structured for Obsidian-compatible navigation.\n\n## Purpose\n\nAgents accumulate insight over time — tool outputs, reasoning chains, environmental observations, and synthesized conclusions. `librefang-memory-wiki` persists that knowledge to disk as a structured, human-readable Markdown vault. Each entry carries cryptographic provenance metadata in its YAML frontmatter, making the vault both auditable and portable.\n\nThe vault is designed to be:\n- **Obsidian-friendly** — bi-directional links, tag conventions, and folder structure compatible with Obsidian out of the box.\n- **Tamper-evident** — content hashes stored in frontmatter allow integrity checks across the vault.\n- **Agent-writable, human-readable** — the same files an agent produces can be browsed, searched, and edited by a human in any Markdown tool.\n\n## Dependencies and What They Enable\n\n| Dependency | Role in this module |\n|---|---|\n| `librefang-types` | Shared domain types (memory entries, agent identifiers, etc.) |\n| `serde` / `serde_json` / `serde_yaml` | Serialization of frontmatter (YAML) and optional structured payloads (JSON) |\n| `chrono` | Timestamps for provenance — creation, modification, and query windows |\n| `sha2` | SHA-256 content hashing for integrity verification of vault entries |\n| `thiserror` | Typed error enumeration for vault I/O, serialization, and integrity failures |\n| `tracing` | Instrumentation for vault operations (writes, reads, integrity checks) |\n\nThe dev-dependency on `librefang-kernel-handle` indicates that integration tests simulate vault operations through the kernel's handle abstraction, confirming that this module is typically invoked via the agent kernel rather than directly.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Kernel] -->|persists knowledge| W[Memory Wiki Vault]\n    W -->|reads/writes| D[(Markdown Files on Disk)]\n    W -->|embeds| F[YAML Frontmatter]\n    W -->|computes| H[SHA-256 Content Hash]\n    D -->|consumed by| O[Obsidian / Markdown Tools]\n    F -->|verified by| I[Integrity Check]\n```\n\n## Frontmatter Provenance\n\nEvery vault entry includes a YAML frontmatter block containing at minimum:\n\n- **Timestamps** — creation and last-modified times via `chrono`.\n- **Content hash** — SHA-256 digest of the document body, computed via `sha2`, enabling detection of corruption or unauthorized edits.\n- **Agent provenance** — identifiers tracing which agent or subsystem authored the entry.\n\nThis provenance model allows downstream consumers to verify that a vault entry has not been altered since it was written by the agent.\n\n## Error Handling\n\nAll fallible operations produce errors through `thiserror`-derived error types. Expected failure categories include:\n\n- **I/O errors** — file not found, permission denied, disk full.\n- **Serialization errors** — malformed frontmatter, invalid YAML/JSON.\n- **Integrity errors** — content hash mismatch during verification.\n\nThese errors are propagated with enough context for the calling kernel to decide whether to retry, log, or surface the issue.\n\n## Integration with LibreFang\n\nThis module sits in the `librefang-memory-wiki` crate and is positioned as a persistence backend for the agent's long-term memory subsystem. It does not initiate calls to other modules (as confirmed by the absence of outgoing edges in the call graph). Instead, it is called into by higher-level components — primarily `librefang-kernel-handle` — which manage the agent's lifecycle and decide when to persist or recall knowledge.\n\nThe zero outgoing-call footprint is intentional: the wiki module is a pure storage layer with no side effects beyond filesystem I/O, making it straightforward to test in isolation using the `tempfile` dev-dependency for ephemeral vault directories.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS. Provides a unified memory API that abstracts three distinct storage backends, giving agents a single interface for persisting state, retrieving context, and managing knowledge over time.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent] --> B[Memory Trait]\n    B --> C[Structured Store]\n    B --> D[Semantic Store]\n    B --> E[Knowledge Graph]\n    C --> F[(SQLite)]\n    D --> G[(SQLite LIKE / Qdrant)]\n    E --> H[(SQLite)]\n    I[ProactiveMemory] --> B\n    J[ProactiveMemoryHooks] --> I\n    K[ProactiveMemoryStore] --> I\n```\n\nAgents never interact with storage backends directly. The `Memory` trait is the sole entry point, delegating to whichever backend is appropriate for the operation. This lets the system swap or combine backends without changing agent code.\n\n## Storage Backends\n\n### Structured Store (`structured`)\n\nSQLite-backed storage for well-defined, tabular data:\n\n- **Key/value pairs** — arbitrary agent configuration and runtime state\n- **Sessions** — conversation or task-scoped context windows\n- **Agent state** — durable checkpoints for agent resumption\n- **Audit trail** — immutable log of actions for accountability\n\nThis is the default backend for anything that doesn't need semantic search or graph traversal.\n\n### Semantic Store (`semantic`, `http_vector_store`)\n\nText search over stored memories. Two modes of operation:\n\n1. **LIKE-based** (default) — uses SQLite `LIKE` queries. Works everywhere, no external services, but limited to substring matching.\n2. **Qdrant-backed** (vector path) — delegates to a Qdrant instance via the `http_vector_store` module for true embedding-based similarity search.\n\nThe semantic store is what agents query when they need to recall information by meaning rather than exact key.\n\n### Knowledge Graph (`knowledge`)\n\nSQLite-backed entity-relation store. Nodes are entities (agents, users, concepts, resources) and edges are typed relations between them. Useful for:\n\n- Tracking which agents know about which resources\n- Modeling relationships between users and their delegated authorities\n- Building context maps that span multiple sessions\n\n## Proactive Memory (mem0-style)\n\nThe `proactive` module implements an automatic memory management layer inspired by [mem0](https://github.com/mem0ai/mem0). Instead of agents explicitly deciding what to store and when to retrieve, proactive memory handles this automatically.\n\n### Core Types\n\n**`ProactiveMemory`** — the unified API surface exposing four operations:\n\n| Method | Purpose |\n|--------|---------|\n| `search` | Retrieve relevant memories given a query |\n| `add` | Ingest new information into memory |\n| `get` | Fetch a specific memory by ID |\n| `list` | Enumerate memories, optionally filtered |\n\n**`ProactiveMemoryHooks`** — interceptor-style hooks that wrap agent interactions:\n\n- **Auto-memorize**: extracts facts from agent outputs and stores them without explicit agent action.\n- **Auto-retrieve**: injects relevant memories into agent context before each inference step.\n\n**`ProactiveMemoryStore`** — concrete implementation that sits on top of `MemorySubstrate`, wiring the proactive API to the actual storage backends.\n\n### Supporting Modules\n\n| Module | Responsibility |\n|--------|---------------|\n| `chunker` | Splits raw text into memory-sized segments before ingestion |\n| `consolidation` | Merges duplicate or near-duplicate memories over time to prevent bloat |\n| `decay` | Implements time-based relevance decay so stale memories naturally fall out of results |\n| `migration` | Schema migrations for the underlying SQLite databases |\n| `namespace_acl` | Access control: determines which agents can read/write which memory namespaces |\n| `prompt` | Prompt templates used during automatic memorization and retrieval |\n| `provider` | Abstraction over different LLM providers used for memory extraction |\n| `roster_store` | Manages the roster of agents and their memory entitlements |\n| `session` | Session-scoped memory boundaries |\n\n## Key Dependencies\n\n| Crate | Role |\n|-------|------|\n| `rusqlite` + `r2d2` + `r2d2_sqlite` | SQLite with connection pooling; FTS5 enabled for full-text search |\n| `serde` + `serde_json` + `rmp-serde` | Serialization to JSON and MessagePack |\n| `librefang-types` | Shared type definitions across the LibreFang workspace |\n| `sha2` | Content hashing for deduplication and integrity checks |\n| `reqwest` | HTTP client for communicating with Qdrant in the vector backend |\n| `metrics` + `tracing` | Observability: counters, histograms, structured logging |\n| `tokio` | Async runtime |\n\n## Relationship to the Workspace\n\n`librefang-memory` is a leaf crate — it depends on `librefang-types` but nothing else in the workspace. Other crates (the agent runtime, the gateway, the CLI) depend on it. The module boundary is clean: it owns all storage concerns and exposes them through the `Memory` trait, making it replaceable or mockable in tests.\n\nThe call graph data shows no outgoing or incoming module-level calls, which reflects that this crate defines interfaces (`Memory`, `ProactiveMemory`) consumed via dependency injection rather than direct cross-module invocation.\n\n## Development Notes\n\n- **Temporary databases in tests**: The `tempfile` dev-dependency is used to create ephemeral SQLite databases for integration tests. Each test gets a fresh, isolated database.\n- **FTS5 requirement**: The structured and semantic stores rely on SQLite FTS5. Ensure the `rusqlite` build includes it (controlled via feature flags in the workspace `Cargo.toml`).\n- **Serialization format**: MessagePack (`rmp-serde`) is preferred for binary storage in SQLite BLOB columns; JSON is used for human-readable or cross-service boundaries.","other-librefang-migrate-tests":"# Other — librefang-migrate-tests\n\n# librefang-migrate/tests/idempotency.rs\n\nEnd-to-end idempotency and forward-compatibility tests for the `librefang-migrate` crate, introduced for issue #3407.\n\n## Purpose\n\nThe unit tests inside `src/openclaw.rs` already verify idempotency at the report level — asserting `report.imported.is_empty()` on a second migration run. This test module sits one layer above and validates the **filesystem-level contract** that callers actually depend on:\n\n1. A second migration run produces a byte-identical destination tree — no duplicate sessions, no clobbered configs, no rewritten timestamps.\n2. A partially-completed migration (simulating a process killed mid-write) can be re-driven to a correct state without corrupting surviving entries.\n3. The prior major version's `KernelConfig` shape still deserialises and round-trips through `run_migrations`.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    A[Test Helper: write_*_workspace] -->|creates source fixtures| B[TempDir src]\n    C[Test Helper: opts] -->|configures| D[MigrateOptions]\n    B --> E[migrate first run]\n    D --> E\n    E --> F[TempDir dst]\n    F --> G[snapshot_tree]\n    G --> H[BTreeMap of relative path to bytes]\n    H --> I[assert_eq! first vs second snapshot]\n    F -->|delete victim file| J[Crash simulation]\n    J --> K[migrate recovery run]\n    K --> L[assert victim recreated, others untouched]\n```\n\n## Helper Functions\n\n### `snapshot_tree(root: &Path) -> BTreeMap<PathBuf, Vec<u8>>`\n\nReads every regular file under `root` and returns a sorted map from path-relative-to-root to raw byte contents. Uses `BTreeMap` rather than `HashMap` so that iteration order is deterministic across runs — when an `assert_eq!` between two snapshots fails, the diff points at the first differing path alphabetically rather than depending on hash ordering.\n\nInternally delegates to `walkdir_iter` for directory traversal.\n\n### `walkdir_iter(root: &Path) -> Vec<PathBuf>`\n\nA minimal recursive directory walker built on `std::fs::read_dir`. Avoids pulling in the `walkdir` crate as a dev-dependency — the test crate compiles separately and keeps dependencies minimal. Symlinks are deliberately ignored since neither migrator produces them, and ignoring them keeps snapshots stable across platforms.\n\nReturns a sorted `Vec<PathBuf>` of all regular files found.\n\n### `write_openclaw_workspace(dir: &Path)`\n\nCreates a minimal but representative OpenClaw source workspace in `dir`, containing:\n\n| File | Purpose |\n|------|---------|\n| `openclaw.json` | JSON5 agent/channel/memory/session configuration with two agents (`coder`, `researcher`) and a Telegram channel |\n| `memory/coder/MEMORY.md` | Per-agent memory file |\n| `sessions/agent_coder_main.jsonl` | A single-line session file — idempotency must not duplicate it on re-run |\n\nMirrors the shape used by the in-crate `create_json5_workspace` helper in `src/openclaw.rs`, trimmed to exactly what the idempotency assertions need so that snapshot diffs remain readable when a regression breaks them.\n\n### `write_openfang_workspace(dir: &Path)`\n\nCreates a minimal OpenFang source workspace in `dir`, containing:\n\n| File | Purpose |\n|------|---------|\n| `config.toml` | Root config with `config_version = 2`, `api_listen`, `log_level`, and `[default_model]` |\n| `secrets.env` | A `.env` file — must be copied verbatim |\n| `agents/coder/agent.toml` | Agent manifest — exercises the TOML rewrite path |\n| `data/index.db` | Binary file — exercises passthrough copy |\n\nSince OpenFang migration is a recursive copy with `.toml`/`.env` rewriting, the fixture only needs a couple of files of each interesting kind.\n\n### `opts(source, src, dst) -> MigrateOptions`\n\nConvenience constructor that builds a `MigrateOptions` struct with `dry_run: false` and the given source type and directory paths.\n\n## Test Cases\n\n### Group A: OpenClaw Idempotency\n\n#### `openclaw_second_run_is_byte_identical`\n\nVerifies that after a successful OpenClaw migration, running it again leaves the destination tree byte-identical. The OpenClaw migrator uses a `.openclaw_migrated` marker file to short-circuit a second run before any writes happen, so the on-disk tree (including the marker body with its timestamp) must remain unchanged.\n\n**Assertions:**\n- First run produces non-empty output\n- Second run's `report.imported` is empty\n- `snapshot_tree` before and after the second run are identical\n\n### Group B: OpenFang Idempotency\n\n#### `openfang_second_run_is_byte_identical`\n\nOpenFang migration has no marker file — it relies on per-entry `dest_path.exists()` checks to skip already-migrated files. After a clean run, every source path is present at the destination, so a second run must be a complete no-op on disk.\n\n**Assertions:**\n- First run imports entries and skips nothing\n- Second run imports nothing and skips exactly the same number of entries as the first run imported\n- `snapshot_tree` before and after the second run are identical\n\n### Group C: Partial-Write Recovery\n\n#### `openclaw_partial_write_is_recoverable`\n\nSimulates a migration killed mid-write by deleting one produced file and the `.openclaw_migrated` marker (since OpenClaw refuses to re-run while the marker is present). The recovery run must recreate the deleted file with its original content and must not clobber any surviving file. This exercises the `promote_staging` never-clobber semantics (#3795).\n\n**Crash simulation steps:**\n1. Run migration → snapshot baseline\n2. Pick a deterministic \"victim\" file (prefers an `agent.toml` if present, otherwise any non-marker file)\n3. Delete the victim and the marker\n4. Run migration again\n\n**Assertions:**\n- Victim file is recreated with byte-identical content\n- Every other non-marker file is unchanged\n- Marker file exists after recovery\n\n#### `openfang_partial_write_is_recoverable`\n\nSame recovery pattern for OpenFang. Since OpenFang has no marker, only the victim file needs to be deleted. The victim is specifically `agents/coder/agent.toml` — a rewritten file — to also exercise the rewrite path during recovery.\n\n**Assertions:**\n- Victim file is recreated with byte-identical content\n- Every other file is unchanged\n\n### Group D: Forward Compatibility\n\n#### `legacy_v1_config_parses_into_current_kernel_config`\n\nLoads `tests/fixtures/legacy_config/config_v1.toml` and verifies it deserialises into the current `librefang_types::config::KernelConfig`. The fixture represents the v1 layout before the v1→v2 migration hoisted `[api].api_key/api_listen/log_level` to root level. Unknown fields like `[api]` are ignored under `#[serde(default)]` on `KernelConfig`.\n\n**Assertions:**\n- Deserialisation succeeds without error\n- `config_version == 1` (the fixture declares this verbatim)\n\n#### `legacy_v1_config_migrates_forward_to_current_version`\n\nVerifies that `run_migrations(&mut raw, 1)` correctly lifts the v1 fixture to `CONFIG_VERSION`. The `[api]` table must be removed and its fields hoisted to root level.\n\n**Assertions:**\n- `run_migrations` returns `CONFIG_VERSION`\n- `[api]` table is removed from the output\n- `api_key` is hoisted to root with value `\"legacy-secret-key\"`\n- `api_listen` is hoisted to root with value `\"127.0.0.1:4545\"`\n- `log_level` is hoisted to root with value `\"info\"`\n\n## Relationship to the Rest of the Codebase\n\n| Component | Relationship |\n|-----------|-------------|\n| `librefang_migrate::openclaw` | Tested module — provides `migrate(&MigrateOptions)` and `MigrateReport` |\n| `librefang_migrate::openfang` | Tested module — provides `migrate(&MigrateOptions)` and `MigrateReport` |\n| `librefang_migrate::MigrateOptions` | Configuration struct consumed by both migrators |\n| `librefang_migrate::MigrateSource` | Enum selecting OpenClaw vs OpenFang migration path |\n| `librefang_types::config::KernelConfig` | Current config type — must still accept v1 shapes |\n| `librefang_types::config::run_migrations` | Config version migration engine — tested from v1 to current |\n| `librefang_types::config::CONFIG_VERSION` | Current config schema version constant |\n| `src/openclaw.rs` in-crate tests | Lower-level idempotency tests that check report contents; this module complements them with filesystem-level checks |\n\n## Fixture Files\n\nThe forward-compat tests depend on a committed fixture:\n\n- **`tests/fixtures/legacy_config/config_v1.toml`** — A minimal v1 config containing only `config_version = 1` and an `[api]` table with `api_key`, `api_listen`, and `log_level`. Deliberately narrow to avoid re-constructing every legacy field-by-field default. Sufficient to assert \"the load path still works.\"\n\nThe OpenClaw and OpenFang workspaces are built programmatically at test time via `write_openclaw_workspace` and `write_openfang_workspace` into temporary directories — no committed fixtures needed.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing agent configurations and data from other agent frameworks into LibreFang's native format.\n\n## Purpose\n\nWhen adopting LibreFang, teams often have existing agent configurations, prompt libraries, and tool definitions spread across other frameworks. `librefang-migrate` provides the tooling to discover, parse, and convert those external assets into LibreFang-compatible types defined in `librefang-types`.\n\n## Supported Input Formats\n\nThe crate pulls in parsers for the most common configuration formats found in agent frameworks:\n\n| Format | Crate | Typical Use |\n|---|---|---|\n| JSON | `serde_json` | Standard structured data, API responses |\n| YAML | `serde_yaml` | Human-editable config files (common in LangChain, AutoGen) |\n| JSON5 | `json5` | Lenient JSON with comments and trailing commas |\n| TOML | `toml` | Rust-ecosystem configs, lightweight agent definitions |\n\n## Key Dependencies and Their Roles\n\n- **`librefang-types`** — Target type definitions. All migration output is expressed through these types, ensuring consistency with the rest of the LibreFang ecosystem.\n- **`walkdir`** — Recursive directory traversal for scanning existing agent project directories and locating migration-eligible files.\n- **`chrono`** — Timestamp handling for migration metadata, creation-date preservation, and audit logging.\n- **`dirs`** — Resolves standard platform directories (config home, data home) so migration can auto-discover agent installations in conventional locations.\n- **`thiserror`** — Derives structured error types for migration failures (parse errors, validation errors, I/O errors).\n- **`tracing`** — Structured logging throughout the migration pipeline for progress reporting and diagnostics.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Source Framework Files] --> B[Directory Scanner]\n    B --> C[Format Parser]\n    C --> D[Type Converter]\n    D --> E[librefang-types]\n    D --> F[Migration Report]\n```\n\nThe migration pipeline has four conceptual stages:\n\n1. **Discovery** — `walkdir` and `dirs` locate candidate files on disk.\n2. **Parsing** — The appropriate serde-based deserializer converts raw files into intermediate representations.\n3. **Conversion** — Intermediate data maps into `librefang-types` structs, applying any necessary schema transformations.\n4. **Reporting** — Migration results, warnings, and errors are collected and surfaced via `tracing` and structured migration reports.\n\n## Error Handling\n\nAll errors are derived through `thiserror`, producing a typed error enum that covers:\n\n- File I/O failures during discovery or reading\n- Parse failures across any supported format\n- Schema validation errors when source data doesn't map cleanly to LibreFang types\n- Path resolution failures from `dirs`\n\nCallers should expect `Result<T, MigrationError>` (or equivalent) from migration entry points and handle errors appropriate to their context—whether that's CLI output, log aggregation, or programmatic retry.\n\n## Testing\n\nThe crate uses `tempfile` in dev-dependencies for isolated filesystem-based tests. Migration tests typically:\n\n1. Create a temporary directory structure mimicking a source framework layout.\n2. Populate it with fixture files in various formats.\n3. Run migration against the temp directory.\n4. Assert the output matches expected `librefang-types` structures.\n\n## Integration with LibreFang\n\n`librefang-migrate` is a utility crate. It has no inbound or outbound runtime dependencies on other LibreFang crates beyond `librefang-types`, meaning it can be used standalone in one-off migration scripts or embedded in a larger LibreFang deployment tool.","other-librefang-rl-export":"# Other — librefang-rl-export\n\n# librefang-rl-export\n\nLong-horizon RL rollout trajectory exporter providing integration surfaces for W&B (Weights & Biases), Tinker, and Atropos.\n\n## Purpose\n\nThis module is responsible for serializing and transmitting reinforcement learning rollout trajectories to external observability and training platforms. It serves as the bridge between the game's RL agents and downstream systems that consume trajectory data for analysis, visualization, or further training.\n\n\"Long-horizon\" here refers to extended episode rollouts — complete trajectories spanning many steps — as opposed to single-step transitions. The export format and transport are designed around batched trajectory payloads.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[librefang-rl-export] -->|HTTP transport| B[librefang-http]\n    A -->|Trajectory payloads| C[W&B API]\n    A -->|Trajectory payloads| D[Tinker]\n    A -->|Trajectory payloads| E[Atropos]\n```\n\nThe module depends on `librefang-http` for outbound HTTP communication, keeping transport concerns (connection pooling, retries, auth) in a shared layer rather than reimplementing them here.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-http` | Shared HTTP client with retry/auth semantics |\n| `reqwest` | Underlying HTTP request execution |\n| `serde` / `serde_json` | Trajectory serialization to JSON |\n| `base64` | Encoding binary observation data in JSON payloads |\n| `urlencoding` | Encoding path/query parameters |\n| `url` | Constructing and validating endpoint URLs |\n| `regex` | Pattern matching on trajectory metadata |\n| `chrono` | Timestamping trajectory records |\n| `tracing` | Structured logging of export operations |\n| `thiserror` | Typed error definitions |\n\n## Integration Surfaces\n\n### W&B (Weights & Biases)\n\nTrajectories are logged as structured runs with step-level metrics. This enables visualizing reward curves, action distributions, and episode returns over training.\n\n### Tinker\n\nInternal tooling integration for trajectory replay and analysis.\n\n### Atropos\n\nRL training framework integration, supporting trajectory replay for off-policy methods or curriculum learning.\n\n## Error Handling\n\nErrors are defined via `thiserror` and should cover:\n\n- Serialization failures when encoding trajectory data\n- HTTP transport errors propagated from `librefang-http`\n- URL construction errors\n- Response validation errors (unexpected status codes, malformed responses)\n\n## Testing\n\nTests use `wiremock` to mock external HTTP endpoints, allowing validation of request shape, headers, authentication, and retry behavior without hitting real services. The test runtime is `tokio` with `macros` and `rt-multi-thread` features enabled.\n\n## Relationship to Other Modules\n\nThis module is a leaf dependency — it consumes `librefang-http` but nothing in the workspace depends on it. It is invoked by the RL training loop or game runner when trajectories need to be flushed to an external system. There are no incoming calls from other workspace crates, meaning integration is typically driven by application-level orchestration code that calls into this library directly.","other-librefang-runtime-audit-src":"# Other — librefang-runtime-audit-src\n\n# librefang-runtime-audit\n\nTamper-evident audit logging for the Librefang runtime. Every significant agent action — tool invocations, shell commands, agent spawns, RBAC events — is recorded into a hash-linked chain modeled after a simplified Merkle log. The chain makes after-the-fact tampering detectable, and an optional external anchor file catches the \"rewrite the entire database\" attack that a pure internal consistency check cannot.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[AuditLog] --> B[In-memory entries Vec]\n    A --> C[tip: current chain tip hash]\n    A --> D[chain_anchor: last dropped entry hash]\n    A --> E[SQLite DB via r2d2 Pool]\n    A --> F[Anchor File on disk]\n    \n    B -->|each entry| G[prev_hash → hash of predecessor]\n    E -->|INSERT in BEGIN IMMEDIATE| H[audit_entries table]\n    F -->|atomic rename| I[tip hash + seq persisted to disk]\n    \n    subgraph Verification\n        J[verify_integrity] -->|walks| B\n        J -->|checks against| F\n        J -->|uses| D\n    end\n```\n\n## Core Types\n\n### `AuditEntry`\n\nA single row in the audit log. Fields that go into the hash computation:\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `seq` | `u64` | Monotonic sequence number |\n| `timestamp` | `String` | RFC 3339 timestamp |\n| `agent_id` | `String` | ID of the agent that performed the action |\n| `action` | `AuditAction` | Categorization of the action |\n| `detail` | `String` | Human-readable description of what happened |\n| `outcome` | `String` | `\"ok\"` or `\"denied\"` |\n| `user_id` | `Option<UserId>` | RBAC: the user on whose behalf the action ran |\n| `channel` | `Option<String>` | RBAC: the API/channel that originated the request |\n| `prev_hash` | `String` | SHA-256 hash of the preceding entry |\n| `hash` | `String` | SHA-256 hash of this entry (computed over all fields above) |\n\nThe genesis entry (seq 0) uses a sentinel `prev_hash` of `\"0\" × 64`.\n\n### `AuditAction`\n\nEnum whose `Display` names are **locked** — renaming any variant invalidates every persisted hash that references it. Current variants:\n\n- `AgentSpawn`, `AgentKill`, `AgentMessage`\n- `ToolInvoke`, `ShellExec`, `NetworkAccess`, `MemoryAccess`\n- `ConfigChange`\n- `UserLogin`, `RoleChange`, `PermissionDenied`, `BudgetExceeded`\n- `RetentionTrim` (self-audit row written by the kernel after a trim)\n\n### `UserId`\n\nConstructed via `UserId::from_name(name)` — derives a stable UUID from the username so audit attribution survives daemon restarts without requiring a persistent user registry.\n\n## Construction\n\n```rust\n// In-memory only (testing, ephemeral runs)\nlet log = AuditLog::new();\n\n// SQLite-backed (production)\nlet log = AuditLog::with_db(pool);\n\n// SQLite-backed + external anchor file (full tamper protection)\nlet log = AuditLog::with_db_anchored(pool, PathBuf::from(\"/var/lib/librefang/audit.anchor\"));\n```\n\n`with_db` reads existing rows from the `audit_entries` table, reconstructs the in-memory chain, and recovers the `chain_anchor` from the first surviving entry's `prev_hash` if it doesn't match the genesis sentinel.\n\n`with_db_anchored` additionally reads the anchor file and compares its stored tip against the DB's actual tip. If the anchor file doesn't exist yet (upgrade path), it is seeded from the current tip.\n\n## Recording Events\n\n```rust\n// Legacy — no RBAC context\nlog.record(\"agent-1\", AuditAction::ShellExec, \"ls -la\", \"ok\");\n\n// With RBAC attribution\nlog.record_with_context(\n    \"agent-1\",\n    AuditAction::ToolInvoke,\n    \"read_file /etc/passwd\",\n    \"denied\",\n    Some(UserId::from_name(\"Alice\")),\n    Some(\"api\".to_string()),\n);\n```\n\nEvery `record` / `record_with_context` call:\n\n1. Takes a snapshot of the current `tip` hash.\n2. Builds an `AuditEntry` with `prev_hash = tip`.\n3. Computes the entry's `hash` via `compute_entry_hash` (all fields including optional `user_id` and `channel`).\n4. If a DB pool exists, INSERTs the row inside `BEGIN IMMEDIATE` so concurrent writers are serialized at the SQLite level — this prevents chain forks where two threads reuse the same `prev_hash`.\n5. On successful DB write, appends to the in-memory `entries` vector and advances `tip`. On DB failure, the in-memory state is **not** mutated (regression test for #4078 / #4050).\n6. If an anchor path is configured, writes the new tip to the anchor file via atomic rename (`write to .tmp`, then `rename .tmp → .anchor`).\n\n## Integrity Verification\n\n`log.verify_integrity()` walks the chain and checks:\n\n1. **Chain anchor**: If `chain_anchor` is set (from a prior trim/prune), the first surviving entry's `prev_hash` must equal it. Otherwise, the first entry's `prev_hash` must be the genesis sentinel.\n2. **Linked-list consistency**: Each entry's `prev_hash` equals its predecessor's `hash`.\n3. **Hash correctness**: Each entry's stored `hash` matches `compute_entry_hash` recomputed over its fields.\n4. **External anchor**: If an anchor file is configured, it must exist and its stored tip must equal the DB's actual tip.\n\nReturns `Ok(())` on success, or `Err(String)` describing the failure (e.g., `\"hash mismatch at seq N\"`, `\"audit anchor mismatch\"`, `\"missing\"`).\n\n### Threat model\n\n| Attack | Detection mechanism |\n|--------|-------------------|\n| Modify a single row's `detail` or `outcome` | Hash mismatch at that seq |\n| Reorder rows | prev_hash chain breaks |\n| Delete a middle row | Chain break (prev_hash points to missing predecessor) |\n| Wipe DB and fabricate entire history | External anchor file holds pre-wipe tip |\n| Delete anchor file | `verify_integrity` fails closed with \"missing\" |\n\n## Retention\n\n### Per-action trim — `log.trim(&policy, now)`\n\n`AuditRetentionConfig` holds:\n- `retention_days_by_action: HashMap<String, u64>` — per-action retention windows\n- `max_in_memory_entries: Option<usize>` — hard cap on in-memory entries\n\n`trim` operates as a **prefix-only** drop: it walks from the oldest entry forward, dropping entries whose action has a retention rule and whose age exceeds the configured days. It stops at the first entry that must be kept (no matching rule, or still within the window). This prefix-only approach is critical — it means the surviving chain's first entry always has a `prev_hash` pointing to a real (now-dropped) predecessor.\n\nThe `chain_anchor` field is set to the last dropped entry's hash. On restart, `with_db` recovers this anchor from the surviving first entry's `prev_hash`, so `verify_integrity` passes across the trim boundary.\n\n`trim` returns an `AuditTrimReport` with:\n- `total_dropped`\n- `dropped_by_action: HashMap<String, usize>`\n- `new_chain_anchor: Option<String>`\n\nThe caller (kernel periodic task) is responsible for writing a `RetentionTrim` self-audit row recording what was dropped.\n\n### Legacy prune — `log.prune(max_age_days)`\n\nDay-based prefix drop. Sets `chain_anchor` the same way as `trim`. Maintained for backward compatibility.\n\n### Drop-everything edge case\n\nWhen every entry in the log is older than its retention window, the entire in-memory vector and all DB rows are cleared. Both `trim` and `prune` handle this by ensuring no orphan tail row remains in SQLite. The next `record()` call starts fresh against the `chain_anchor`.\n\n## Cursor-Based Streaming — `since_seq`\n\n```rust\nlet new_entries = log.since_seq(last_seen_seq);\n```\n\nReturns all entries with `seq > cursor` — strictly greater, so the SSE poll loop can set `cursor = entries.last().seq` after delivering a batch without re-emitting the tail. This replaced an earlier `recent(200)` + skip approach that silently dropped bursts larger than 200 within a single poll interval.\n\n## Concurrency\n\nWhen backed by an r2d2 pool with `max_size > 1`, concurrent `record_with_context` calls are serialized at the SQLite layer via `BEGIN IMMEDIATE` transactions. This guarantees:\n\n- **No writes lost**: total persisted rows equals the number of `record` calls.\n- **Linear chain**: every row's `prev_hash` is the `hash` of the preceding row (by seq); no two rows share the same `prev_hash`.\n- **No chain forks**: the tip mutation and the INSERT that depends on it are atomic.\n\n## Database Schema\n\n```sql\nCREATE TABLE audit_entries (\n    seq        INTEGER PRIMARY KEY,\n    timestamp  TEXT NOT NULL,\n    agent_id   TEXT NOT NULL,\n    action     TEXT NOT NULL,\n    detail     TEXT NOT NULL,\n    outcome    TEXT NOT NULL,\n    user_id    TEXT,\n    channel    TEXT,\n    prev_hash  TEXT NOT NULL,\n    hash       TEXT NOT NULL\n);\n```\n\nProduction deployments should set `PRAGMA journal_mode=WAL` and `PRAGMA busy_timeout=5000` on the connection manager for concurrent-write resilience.","other-librefang-runtime-audit":"# Other — librefang-runtime-audit\n\n# librefang-runtime-audit\n\nTamper-evident audit log for the LibreFang runtime. Every auditable event is appended to a Merkle hash chain where each entry holds the SHA-256 of its own contents concatenated with the prior entry's hash, making any retroactive edit immediately detectable.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    E[Runtime Event] --> A[AuditLog::append]\n    A --> H[SHA-256: payload ++ prev_hash]\n    H --> M[In-memory Merkle Chain]\n    H -->|with_db| S[SQLite audit_entries]\n    S --> R[Survives Restart]\n```\n\nThe chain is constructed entry-by-entry. Each new entry's hash is computed over its own serialized payload plus the hash of the preceding entry. This creates a linked structure where modifying any historical entry invalidates every subsequent hash.\n\n## Key Design Decisions\n\n### Hash Chain Integrity\n\nThe core invariant is straightforward: `hash(n) = SHA-256(payload(n) || hash(n-1))`. The genesis entry uses a fixed sentinel value (typically an all-zero hash) as its predecessor. Verification walks the chain from head to tail, recomputing each hash and confirming it matches the stored value.\n\n### Dual Persistence\n\nWhen constructed via `with_db`, the audit log persists entries to the `audit_entries` table in SQLite (schema V8). This path uses `r2d2`/`r2d2_sqlite` for connection pooling. Without a database, the chain lives only in memory and is lost on restart — suitable for testing or ephemeral sessions.\n\n### Re-export Path\n\nThis crate was extracted from `librefang-runtime` as part of the #3710 god-crate split. The parent crate re-exports it at the historical path `runtime::audit`, so existing call sites require no import changes.\n\n## Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions for auditable events |\n| `sha2` | SHA-256 hashing for the Merkle chain |\n| `rusqlite` / `r2d2` / `r2d2_sqlite` | SQLite persistence with connection pooling |\n| `serde` / `serde_json` | Serialization of audit payloads |\n| `chrono` | Timestamps on audit entries |\n| `uuid` | Unique identifiers for entries |\n| `hex` | Hex encoding of hashes for storage/display |\n| `tracing` / `metrics` | Observability |\n\n## Database Schema\n\nWhen using `with_db`, entries are written to the `audit_entries` table (SQLite schema V8). Each row stores at minimum:\n\n- A unique entry identifier (`uuid`)\n- The entry timestamp (`chrono`)\n- The serialized payload (`serde_json`)\n- The computed SHA-256 hash for this entry\n- The hash of the previous entry (enabling chain verification)\n\n## Usage Patterns\n\n### With Database Persistence\n\nConstruct the audit log with a database connection pool. Entries are appended atomically — the hash is computed, the row is inserted, and the in-memory chain head is updated. On restart, the chain can be reconstructed from the persisted entries.\n\n### In-Memory Only\n\nConstruct without a database for testing or short-lived sessions. The chain operates identically but has no durability guarantees.\n\n### Chain Verification\n\nAt any point, the chain can be walked from the genesis entry to the current head, recomputing hashes along the way. A mismatch at any position indicates tampering or corruption.\n\n## Integration with LibreFang\n\nThis crate operates independently — it has no outgoing calls to other LibreFang crates beyond `librefang-types`. `librefang-runtime` consumes it by:\n\n1. Re-exporting the public API at `runtime::audit`\n2. Constructing the audit log during daemon initialization (optionally `with_db`)\n3. Calling `append` on auditable runtime events (state transitions, configuration changes, administrative actions)\n\nDownstream code should import from `librefang-runtime::audit` unless working with this crate directly.","other-librefang-runtime-mcp-tests":"# Other — librefang-runtime-mcp-tests\n\n# HttpCompat Integration Tests\n\nIntegration test suite for the `HttpCompat` MCP transport. These tests exercise the full connect → tool-discovery → call-tool lifecycle against a real `wiremock` HTTP server, with no MCP protocol handshake required.\n\n## Why HttpCompat\n\n`HttpCompat` is the simplest MCP transport: it maps declared tool calls directly onto plain HTTP/JSON requests to a user-supplied base URL. Unlike stdio or SSE transports, it does **not** perform an MCP `initialize` handshake. This makes it the ideal candidate for integration testing—no MCP-protocol-speaking peer is needed, just a conformant HTTP backend.\n\n## What the tests verify\n\n| Test | Scenario | Verified behavior |\n|------|----------|-------------------|\n| `http_compat_connect_registers_namespaced_tools` | `McpConnection::connect` with one declared tool | The tool appears in the connection's tool list under the namespaced name `mcp_<server>_<tool>`. The agent loop and dashboard key off this prefixed form, so a regression here breaks dispatch. |\n| `http_compat_call_tool_renders_path_and_returns_body` | `call_tool` with a path-template tool (`/weather/{city}`) | Path parameters are interpolated and consumed from the args; remaining args (`units`) arrive as query parameters. Custom headers from config are attached. The JSON response body is forwarded verbatim. |\n| `http_compat_call_tool_unknown_name_errors` | `call_tool` with a name not in the registered tool list | Returns an error mentioning \"not found\", \"unknown\", or \"does not exist\" rather than silently issuing a stray HTTP request. |\n\n## Test architecture\n\n```mermaid\nflowchart LR\n    T[Test function] -->|builds config| H[http_compat_config]\n    H --> C[McpServerConfig]\n    T -->|connect| MC[McpConnection]\n    MC -->|HTTP GET /| WS[wiremock MockServer]\n    T -->|call_tool| MC\n    MC -->|HTTP with path + query| WS\n    WS -->|JSON response| MC\n```\n\nEach test spins up an isolated `wiremock::MockServer`, configures expected request/response pairs, builds an `McpServerConfig` pointing at it, then exercises `McpConnection` through the public API.\n\n## Key helpers\n\n### `http_compat_config`\n\n```rust\nfn http_compat_config(base_url: String, tools: Vec<HttpCompatToolConfig>) -> McpServerConfig\n```\n\nConstructs a minimal `McpServerConfig` with the `Htt
