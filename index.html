var PAGES = {"agent-control-protocol-acp":"# Agent Control Protocol (ACP)\n\n# Agent Control Protocol (ACP) Module\n\n## Overview\n\n`librefang-acp` bridges LibreFang's agent runtime to the [Agent Client Protocol](https://agentclientprotocol.com/), a JSON-RPC 2.0 protocol over a duplex byte stream (typically stdio). Editors like Zed, VS Code, and JetBrains embed a LibreFang agent natively through this adapter — providing their own approval modals, file references, image attachments, and prompt streaming UI instead of the LibreFang dashboard.\n\nThe crate depends on the `agent-client-protocol` crate (published by Zed) for wire-format handling, and provides only the LibreFang-specific glue: event translation, session management, permission bridging, and reverse-RPC dispatch for filesystem and terminal operations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Editor[\"Editor (Zed, VS Code, etc.)\"]\n    Server[\"server.rs<br/>JSON-RPC handler chain\"]\n    Session[\"session.rs<br/>SessionStore (DashMap)\"]\n    Prompt[\"prompt.rs<br/>Prompt turn pump\"]\n    Events[\"events.rs<br/>EventTranslator\"]\n    Perm[\"permission.rs<br/>Approval bridge\"]\n    FS[\"fs.rs<br/>FsClientHandle\"]\n    Term[\"terminal.rs<br/>TerminalClientHandle\"]\n    Kernel[\"AcpKernel trait\"]\n    Adapter[\"kernel_adapter.rs<br/>KernelAdapter\"]\n\n    Editor <-->|JSON-RPC 2.0| Server\n    Server --> Session\n    Server --> Prompt\n    Server --> Perm\n    Prompt --> Events\n    Prompt --> Kernel\n    Perm --> Kernel\n    FS -->|reverse-RPC| Editor\n    Term -->|reverse-RPC| Editor\n    Kernel -.->|impl| Adapter\n    Adapter -->|Arc&lt;LibreFangKernel&gt;| Adapter\n```\n\nData flows in two directions:\n\n- **Client → Agent**: The editor sends `session/prompt`, `session/cancel`, and permission responses. The server translates these into kernel operations.\n- **Agent → Client**: The kernel emits `StreamEvent`s during a prompt turn. The `EventTranslator` converts these into `session/update` notifications streamed back to the editor. For reverse-RPCs (`fs/*`, `terminal/*`), the agent requests that the editor perform the operation using its own filesystem/PTY authority.\n\n## Entry Points\n\n### `run(kernel, agent_id)`\n\nRuns the ACP server on stdio. Used by `librefang acp` CLI subcommand for in-process execution:\n\n```rust\nlet kernel = Arc::new(LibreFangKernel::boot(config).await?);\nlet agent_id = kernel.resolve_agent(\"my-agent\").await?;\nrun(kernel, agent_id).await?;\n```\n\n### `run_with_transport(kernel, agent_id, transport)`\n\nSame as `run` but with an explicit transport. Used by `librefang-api`'s UDS listener and integration tests (which use `tokio::io::duplex` pipes).\n\n## Module Reference\n\n### `AcpKernel` Trait (`lib.rs`)\n\nThe core abstraction. Defines every kernel operation the ACP server needs:\n\n| Method | Purpose |\n|--------|---------|\n| `resolve_agent` | Map a name/UUID string to an `AgentId` |\n| `send_prompt` | Start a streaming agent turn; returns `mpsc::Receiver<StreamEvent>` |\n| `subscribe_approvals` | Get a broadcast receiver for `ApprovalEvent`s |\n| `resolve_approval` | Feed an editor decision back to the kernel's approval gate |\n| `remember_decision` | Persist an \"always\" choice for `(agent_id, tool_name)` |\n| `set_fs_client` / `set_terminal_client` | Hand the kernel reverse-RPC handles at `initialize` |\n| `register_session_fs` / `register_session_terminal` | Bind handles to a specific LibreFang session |\n| `fetch_session_history` | Pull persisted message history for `session/load` |\n\nThe trait is `#[async_trait]` + `Send + Sync + 'static`. Production uses `KernelAdapter`; integration tests use stub implementations that return canned `StreamEvent` sequences.\n\n### `KernelAdapter` (feature: `kernel-adapter`)\n\nConcrete `AcpKernel` over `Arc<LibreFangKernel>`. Holds:\n\n- The kernel as both the concrete type (for `send_message_streaming_with_routing_and_session_override`) and as a `KernelHandle` trait object (for `resolve_tool_approval`, which must route through the trait to fire the deferred-approval spawn).\n- `Arc<RwLock<Option<FsClientHandle>>>` and `Arc<RwLock<Option<TerminalClientHandle>>>` populated at `initialize` time.\n\n**Critical routing note for `resolve_approval`**: The adapter calls `kernel_handle.resolve_tool_approval()` (the trait method), not `kernel.approvals().resolve()` directly. The trait impl wraps both the resolution *and* the deferred tool execution spawn. Without this routing, an \"Allow once\" click from the editor would clear the approval record but the agent loop would hang forever waiting for a tool result that never arrives.\n\n### `SessionStore` (`session.rs`)\n\nConcurrent `DashMap<AcpSessionId, SessionState>`. Each `SessionState` contains:\n\n- `librefang_session_id: LfSessionId` — derived deterministically from the ACP session id via UUID v5 (`ACP_SESSION_NS` namespace). Same ACP id always maps to the same kernel-side session, so a reconnecting editor's `session/load` rejoins persisted history.\n- `cwd: PathBuf` — the editor's project root from `session/new`.\n- `cancel: CancellationToken` — triggered by `session/cancel` to interrupt the prompt pump.\n\nKey operations: `insert`, `get`, `remove`, `find_by_librefang_id` (reverse lookup for the permission bridge), `drain_active` (cleanup on disconnect).\n\n### `EventTranslator` (`events.rs`)\n\nStateful, one-per-session-per-prompt-turn translator from `StreamEvent` → `Vec<SessionUpdate>`.\n\n| StreamEvent | SessionUpdate | Notes |\n|-------------|---------------|-------|\n| `TextDelta` | `AgentMessageChunk` | Direct text streaming |\n| `ThinkingDelta` | `AgentThoughtChunk` | Agent reasoning |\n| `OwnerNotice` | `AgentMessageChunk` | Surfaces as regular message (Phase 2 may add dedicated variant) |\n| `ToolUseStart` | `ToolCall` | Status `Pending`; pushes id onto per-name FIFO |\n| `ToolInputDelta` | *(nothing)* | Suppressed to avoid hundreds of tiny notifications |\n| `ToolUseEnd` | `ToolCallUpdate` | Status `InProgress`; attaches `raw_input` |\n| `ToolExecutionResult` | `ToolCallUpdate` | Status `Completed`/`Failed`; pops from FIFO |\n| `ContentComplete` | *(nothing)* | Consumed by the pump for `StopReason` |\n\n**Parallel same-named tool calls**: The translator maintains a `HashMap<String, VecDeque<ToolCallId>>` (`in_flight_by_name`). When multiple calls to the same tool are in flight and the runtime can't correlate results back to a specific `tool_use_id`, the FIFO pop is a best-effort guess. When ≥2 calls are pending, the result payload is prepended with a disambiguation note so the editor user knows attribution may be incorrect. Drained entries are reaped from the map to prevent per-session leaks (#5144).\n\n**`infer_tool_kind`**: Best-effort mapping from LibreFang tool names to ACP `ToolKind` (Read, Edit, Delete, Move, Search, Execute, Think, Fetch, Other) based on naming patterns.\n\n### Permission Bridge (`permission.rs`)\n\nLong-running background task spawned by the server builder. Subscribes to the kernel's `ApprovalEvent` broadcast channel, filters by session, and translates each `ApprovalEvent::Created` into a `session/request_permission` reverse-RPC to the editor.\n\nFlow for a single approval:\n1. Kernel fires `ApprovalEvent::Created` with `session_id`, `tool_name`, `tool_use_id`\n2. `dispatch_pending` maps the LibreFang session id → ACP session id via `SessionStore::find_by_librefang_id`\n3. Builds `RequestPermissionRequest` with options: `Allow once`, `Allow always` (suppressed for high-risk tools), `Deny`, `Deny always`\n4. Races the editor response against a 60-second timeout\n5. Converts the outcome to `(ApprovalDecision, remember)` via `decision_from_outcome`\n6. If `remember`, persists via `AcpKernel::remember_decision` *before* resolving (so concurrent calls see the cached decision)\n7. Calls `AcpKernel::resolve_approval`\n\n**High-risk tool suppression**: `shell_exec`, `file_write`, `file_delete`, `apply_patch`, and `skill_evolve_*` suppress \"Allow always\" because the in-memory `remembered` cache keys only on `(agent_id, tool_name)` — one click would grant permanent blanket access regardless of arguments. Dashboard/config remains the path for intentional blanket permissions.\n\n### Prompt Handler (`prompt.rs`)\n\nDrives a single `session/prompt` request end-to-end:\n\n1. Looks up the ACP session in `SessionStore`\n2. Concatenates text content blocks via `concat_text_blocks` (non-text blocks — image, audio, resource links — degrade to bracketed placeholders with a warning notification)\n3. Calls `AcpKernel::send_prompt` to start a streaming turn\n4. Pumps events with `tokio::select!` racing the event channel against the session's `CancellationToken`\n5. Emits `session/update` notifications for each translated event\n6. Returns a `PromptResponse` with the appropriate `StopReason`\n\n`concat_text_blocks` intentionally omits base64 byte counts from image/audio placeholders to avoid leaking signal to prompt-injection probes.\n\n`map_stop_reason` translates LibreFang stop reasons to ACP: `ToolUse` and `StopSequence` become `EndTurn` (the agent is mid-turn in ACP's model), `ContentFiltered` becomes `Refusal`.\n\n### Filesystem Reverse-RPC (`fs.rs`)\n\n`FsClientHandle` wraps `ConnectionTo<Client>` to issue `fs/read_text_file` and `fs/write_text_file` requests to the editor. The editor — not the agent's local filesystem — is the file source, reading from current buffers, in-memory edits, or virtual filesystems.\n\n- `FsCapabilities`: flat bool struct (`read_text_file`, `write_text_file`) captured from `ClientCapabilities` at `initialize`\n- All requests have a 60-second timeout (`FS_RPC_TIMEOUT`)\n- Implements `AcpFsClient` trait from `librefang-kernel-handle` so the kernel can route runtime tool calls through the editor without depending on the ACP schema crate\n- Uses an empty `SessionId` placeholder when the caller's session id is already folded into the kernel registration key\n\n### Terminal Reverse-RPC (`terminal.rs`)\n\n`TerminalClientHandle` wraps the five-method ACP terminal state machine:\n\n1. `create` → returns `TerminalId`\n2. `wait_for_exit` → blocks until command finishes (600s timeout)\n3. `output` → snapshots captured stdout/stderr\n4. `kill` → kills process without releasing terminal\n5. `release` → drops terminal entirely\n\nThe `AcpTerminalClient` impl provides `run_command` which performs the full dance: create → wait_for_exit → output → release. Terminal is always released (even on intermediate failure) to prevent editor-side leaks.\n\n### Error Handling (`error.rs`)\n\n`AcpError` enum with variants:\n\n| Variant | Meaning | JSON-RPC mapping |\n|---------|---------|-------------------|\n| `UnknownSession` | Session id not from `session/new` | `invalid_params` with reason |\n| `AgentNotFound` | Agent name/id unresolvable | `invalid_params` with reason |\n| `Kernel` | Wrapped `LibreFangError` | `internal_error` |\n| `Transport` | ACP wire-level error | Pass-through |\n| `PromptInFlight` | Duplicate prompt on same session | `internal_error` |\n| `Internal` | Catch-all (channel closed, panic) | `internal_error` |\n\n`into_acp_error()` converts for use in request handler responses. The type alias `AcpResult<T>` is used throughout.\n\n### Server Assembly (`server.rs`)\n\nBuilds the handler chain on `agent_client_protocol::Agent::builder()`:\n\n- `initialize` — captures client capabilities, hands kernel the `FsClientHandle` and `TerminalClientHandle`, declares `PromptCapabilities` with multimodal disabled\n- `session/new` — mints UUID v4 id, derives stable LibreFang session, registers fs/terminal clients\n- `session/load` — same as new + replays up to `MAX_REPLAY_TURNS` (50) persisted history turns as `session/update` notifications\n- `session/resume` — same as load (distinction moot in Phase 1)\n- `session/list` — enumerates active sessions, optionally filtered by cwd\n- `session/close` — removes session, unregisters fs/terminal clients\n- `session/prompt` — delegates to `prompt::handle`\n- `session/cancel` — fires the session's `CancellationToken`\n- Catch-all dispatch — returns `method_not_found` for unimplemented methods (rather than `internal_error`, so editors silently skip optional features)\n\n**Drop-guard cleanup**: After the transport loop ends (clean exit, editor crash, network drop), the server drains all remaining sessions and unregisters their fs/terminal clients. Without this, a subsequent `register_session_fs` for the same deterministic `SessionId` would shadow a dead handle and tool calls would block for 60 seconds against a closed transport.\n\n## Connection to the Rest of the Codebase\n\n- **`librefang-cli`**: Calls `run()` from the `librefang acp` subcommand. Uses `KernelAdapter` to wrap the booted kernel.\n- **`librefang-api`**: Calls `run_with_transport()` from UDS and pipe listeners (`acp_uds.rs`, `acp_pipe.rs`) for daemon-attached mode.\n- **`librefang-kernel`**: Provides `KernelHandle` trait, `AcpFsClient`/`AcpTerminalClient` traits, and the `register_acp_fs_client`/`register_acp_terminal_client` registry that the adapter feeds.\n- **`librefang-runtime`**: Emits `StreamEvent`s consumed by the event translator. Subprocess sandbox and checkpoint manager call `terminal::kill` for cleanup.\n- **`librefang-llm-driver`**: Defines `StreamEvent` — the upstream event type that `EventTranslator` converts.\n- **`librefang-types`**: Defines `AgentId`, `SessionId`, `ApprovalDecision`, `ApprovalEvent`, `StopReason`, `TokenUsage` — shared domain types.\n- **`agent-client-protocol`** (external): Provides wire-format types, JSON-RPC framing, `Agent::builder()`, and transport abstractions.","api-server":"# API Server\n\n# librefang-api — API Server\n\nThe API server crate exposes the LibreFang kernel to external clients through multiple transport mechanisms: HTTP REST routes, WebSocket connections, OpenAI-compatible streaming endpoints, channel adapters (Telegram, Slack, Discord, etc.), and Agent Client Protocol (ACP) sockets for daemon-attached editor integration.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Transports\n        HTTP[HTTP REST / SSE]\n        WS[WebSocket]\n        ACP_UDS[ACP Unix Socket]\n        ACP_PIPE[ACP Named Pipe]\n        CHANNELS[Channel Adapters]\n    end\n\n    subgraph API Layer\n        MW[Middleware Stack]\n        CB[Channel Bridge]\n        OAI[OpenAI Compat]\n        ROUTES[Route Handlers]\n    end\n\n    subgraph Kernel\n        KAPI[KernelApi trait]\n    end\n\n    HTTP --> MW\n    WS --> MW\n    ACP_UDS --> KAPI\n    ACP_PIPE --> KAPI\n    CHANNELS --> CB\n    CB --> KAPI\n    MW --> ROUTES\n    ROUTES --> KAPI\n    OAI --> KAPI\n```\n\nThe crate does not own any business logic. Every route handler and bridge method delegates to `librefang_kernel` through the `KernelApi` trait, keeping the API layer a thin transport and serialization boundary.\n\n## Transport Layers\n\n### HTTP REST + SSE\n\nRoute handlers in `src/routes/` cover agent management, messaging (synchronous and streaming via SSE), configuration, skills, triggers, schedules, workflows, users, webhooks, backups, and network peers. Routes extract an `AppState` (containing an `Arc<dyn KernelApi>`) and an optional `AuthenticatedApiUser` from middleware, then call kernel methods and serialize responses.\n\n### WebSocket (`ws.rs`)\n\nBidirectional WebSocket connections support real-time chat with streaming responses. The handler classifies errors via `classify_streaming_error` and manages text message routing through the kernel's streaming API.\n\n### OpenAI-Compatible Endpoint (`openai_compat.rs`)\n\nProvides an `/v1/chat/completions`-style streaming endpoint that maps LibreFang's streaming events into OpenAI SSE chunks (`OaiToolCallFunction` structures), enabling third-party tooling to drive the kernel without bespoke integration.\n\n### ACP Listeners\n\nACP enables editor integrations (VS Code, Neovim, etc.) to connect to a long-running daemon process, sharing a single kernel across multiple editor tabs. The wire protocol is JSON-RPC over a byte-stream transport, handled by `librefang_acp::run_with_transport`.\n\nTwo platform-specific implementations exist, both sharing the same trust model: **same-user, same-host**.\n\n#### Unix Domain Sockets (`acp_uds.rs`, `cfg(unix)`)\n\nListens on `~/.librefang/acp.sock`. Each accepted connection gets an isolated `KernelAdapter` backed by the shared kernel.\n\n**Security layers:**\n\n1. **Atomic bind with mode `0o600`** — Binds to a randomized tempfile (`.acp.sock.<pid>.<nanos>`), `chmod`s to `0o600`, then `rename`s into place. This closes the TOCTOU window between `bind()` and `chmod()` where another local user could connect to a world-readable socket.\n\n2. **`SO_PEERCRED` peer-uid match** — Every accepted connection's `peer_cred().uid()` is compared against the daemon's `geteuid()`. Mismatches are dropped before any ACP bytes are read.\n\n**Stale socket cleanup** (`sweep_stale_orphans`):\n\nOn macOS Docker Desktop bind-mount volumes, `rename(2)` can leave orphan tempfiles visible in the container. The sweep runs after each successful bind and removes matching `.acp.sock.<pid>.<nanos>` files under three guards:\n\n| Guard | Purpose |\n|-------|---------|\n| UID equality | Never delete files owned by another user |\n| Recency window (10s) | Protect concurrent daemon's in-flight tempfile |\n| PID liveness (`kill(pid, 0)`) | Only remove files whose process is dead (`ESRCH`) |\n\n#### Windows Named Pipes (`acp_pipe.rs`, `cfg(windows)`)\n\nListens on `\\\\.\\pipe\\librefang-acp`. Windows named pipes require a different accept pattern: the server creates one pipe instance, awaits a connect, then immediately creates the next instance so subsequent connections aren't blocked.\n\n**Security:**\n\nAn explicit DACL built from SDDL `D:P(A;;GA;;;OW)` grants `GENERIC_ALL` only to the pipe's owner (the daemon's user SID). The `P` flag blocks DACL inheritance from the parent `\\\\.\\pipe\\` namespace. This is stricter than the default DACL, which grants `GENERIC_READ`/`GENERIC_WRITE` to any local user.\n\n`first_pipe_instance(true)` is set only on the very first instance after process start. This prevents a name-squatting race where a local attacker creates a pipe with the same name between the old daemon crashing and the new one starting. Subsequent rebinds pass `false` because the flag would reject an already-bound name.\n\n## Channel Bridge (`channel_bridge.rs`)\n\n`KernelBridgeAdapter` wraps `Arc<dyn KernelApi>` to implement the `ChannelBridgeHandle` trait from `librefang_channels`. This is the glue between channel adapters (Telegram, Slack, Discord, WhatsApp, and 30+ others) and the kernel.\n\n### Streaming Bridge\n\n`start_stream_text_bridge_with_status` bridges the kernel's `mpsc::Receiver<StreamEvent>` into a consumer-friendly `mpsc::Receiver<String>` suitable for channel delivery. It handles:\n\n- **Tool call leak suppression** — Some providers emit tool calls as plain text. The bridge buffers text per iteration and flushes at `ContentComplete` only if `looks_like_tool_call` returns false. Detection covers JSON arrays/objects, XML-style function tags (`<function=...>`), markdown code blocks containing tool calls, and backtick-wrapped invocations. Long responses (>2000 chars) only match start-of-text patterns to avoid false positives on natural language that references tools.\n\n- **Progress indicators** — When `show_progress` is enabled (per-agent manifest), tool invocations inject `🔧 Tool Name` lines and failures inject `⚠️ Tool Name failed` (localized). Tool names are deduplicated within a single iteration so batch agents making parallel calls to the same tool show one line, not twenty.\n\n- **Context warnings** — `PhaseChange` events with phase `\"context_warning\"` are surfaced inline so users know quality may degrade.\n\n- **Silent response handling** — `NO_REPLY` / `[[silent]]` markers from the kernel are suppressed entirely.\n\n- **Error sanitization** — `sanitize_channel_error` maps raw driver errors (timeouts, rate limits, auth failures, content filters) into user-friendly messages. In group contexts, all errors are suppressed to avoid leaking technical details.\n\n- **Status reporting** — Returns a `oneshot::Receiver<Result<(), String>>` so callers can drive lifecycle reactions and `record_delivery` metrics. Timeout-with-partial-output is treated as soft success to avoid flipping a useful streamed response to a failure state.\n\n### Tool Call Detection\n\nThe `looks_like_tool_call` family of functions provides multi-layer heuristic detection:\n\n| Pattern | Example |\n|---------|---------|\n| Start-of-text JSON array | `[{...` or `{\"type\":\"function\"...` |\n| Tag-based | `<function=...>`, `<tool>`, `[TOOL_CALL]`, `lette` (Unicode) |\n| Named JSON in markdown blocks | ````tool_name\\n{...}``` |\n| Named JSON in backticks | `` `tool_name {...}` ` |\n| Bare JSON objects with tool keys | `{\"name\": \"...\", \"arguments\": {...}}` |\n\n`looks_like_named_json_tool_call` validates that the prefix before `{` looks like a tool name (alphanumeric + `_-.:/`) and that the JSON body parses with recognizable keys (`name`, `function`, `arguments`, `parameters`, etc.).\n\n### Slash Command Surface\n\n`KernelBridgeAdapter` exposes a large text-based command surface for channel interactions:\n\n- **Agent management**: `find_agent_by_name`, `list_agents`, `spawn_agent_by_name`, `set_model`, `stop_run`\n- **Session management**: `reset_session`, `reboot_session`, `compact_session`, `session_usage` (with per-channel scoped variants)\n- **Automation**: `list_workflows_text`, `run_workflow_text`, `list_triggers_text`, `create_trigger_text`, `delete_trigger_text`, `list_schedules_text`, `manage_schedule_text`\n- **Approvals**: `list_approvals_text`, `resolve_approval_text` — with TOTP verification, recovery code redemption (atomic via `vault_redeem_recovery_code` to prevent concurrent double-spend), replay protection (`record_totp_code_used`), and lockout tracking\n- **System**: `uptime_info`, `list_models_text`, `list_providers_text`, `list_skills_text`, `list_hands_text`, `budget_text`, `peers_text`, `a2a_agents_text`\n\n### Reply Intent Classification\n\n`classify_reply_intent` uses a one-shot LLM call to determine whether a group message is directed at the bot. Inputs are truncated and sanitized (backticks, brackets, newlines stripped) to reduce injection surface. The classifier fails open — if the LLM call fails, the message is treated as directed at the bot.\n\n### Channel Overrides\n\n`channel_overrides` looks up per-channel configuration (message debounce, group trigger patterns, default agent) and merges routing aliases from the default agent's manifest into `group_trigger_patterns`. Aliases are regex-escaped with word boundaries for ASCII names and plain substring matching for CJK.\n\n## Supporting Modules\n\n| Module | Purpose |\n|--------|---------|\n| `middleware.rs` | `AuthenticatedApiUser` and `ApiUserAuth` extract and validate API key / session credentials |\n| `rate_limiter.rs` | `AuthRateLimitState` enforces per-user request throttling |\n| `oauth.rs` | `ResolvedProvider` handles OAuth provider resolution and token storage |\n| `validation.rs` | `check_identifier`, `check_json_depth` — input validation for route parameters |\n| `stream_chunker.rs` | `try_flush` handles SSE chunking with code-fence force-close at max length |\n| `stream_dedup.rs` | Deduplicates concurrent stream events |\n| `client_ip.rs` | `resolve_real_client_ip` parses `X-Forwarded-For` and `Forwarded` headers with configurable trusted hops |\n| `password_hash.rs` | `hash_password` / `verify_password` for user credential management |\n| `webhook_store.rs` | `CreateWebhookRequest` validation and storage |\n| `server.rs` | `DaemonInfo` — daemon lifecycle state (PID, socket path, startup time) for stale-daemon detection |\n| `terminal.rs` | Process lifecycle management for terminal sessions |\n| `webchat.rs` | Embedded dashboard asset resolution |\n| `approval.rs` | Re-exports `ApprovalManager` from the kernel so API routes don't depend on internal kernel module paths |\n\n## Feature Flags\n\nChannel adapters are compiled conditionally. The `channel_bridge` module imports each adapter behind its feature flag (`channel-telegram`, `channel-slack`, `channel-discord`, etc.), with wave-based expansion covering 35+ channel types across five waves. The bridge itself is feature-agnostic — it works against the `ChannelBridgeHandle` trait regardless of which adapters are compiled in.\n\n## Testing Patterns\n\nThe test suite uses integration tests in `librefang-api/tests/` that spin up full test servers (`start_test_server_with_full_user_configs`, `start_test_server_with_rbac_users`) seeded with hashed user credentials. ACP tests verify atomic bind semantics, stale-file overwrite, orphan sweep with dead/live PID discrimination, and recency-window protection.","channel-integrations":"# Channel Integrations\n\n# Channel Integrations Module\n\nThe `librefang-channels` crate is the messaging middleware that sits between external chat platforms (Telegram, Discord, Slack, WhatsApp, etc.) and the LibreFang agent kernel. It normalizes inbound messages from heterogeneous chat APIs into a unified `ChannelMessage` type, routes them to the correct agent, and delivers the agent's response back through the originating channel adapter.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"External Platforms\"\n        TG[Telegram]\n        DC[Discord]\n        SL[Slack]\n        WA[WhatsApp]\n        OTH[Other adapters]\n    end\n\n    subgraph \"librefang-channels\"\n        CA[ChannelAdapter implementations]\n        BM[BridgeManager]\n        MD[MessageDebouncer]\n        AR[AgentRouter]\n        IS[InputSanitizer]\n        AE[Attachment Enrichment]\n    end\n\n    subgraph \"librefang-api / kernel\"\n        CBH[ChannelBridgeHandle impl]\n        AG[Agent sessions]\n    end\n\n    TG --> CA\n    DC --> CA\n    SL --> CA\n    WA --> CA\n    OTH --> CA\n\n    CA -->|ChannelMessage stream| BM\n    BM --> MD\n    BM --> IS\n    BM --> AR\n    BM --> AE\n    BM -->|send_message_with_blocks_and_sender| CBH\n    CBH --> AG\n    AG -->|ReplyEnvelope / ContentBlock| BM\n    BM -->|adapter.send| CA\n    CA --> TG\n    CA --> DC\n    CA --> SL\n    CA --> WA\n```\n\n## Core Components\n\n### `ChannelBridgeHandle` Trait\n\nDefined in `bridge.rs`, this trait declares every kernel operation that channel adapters need. It breaks the circular dependency: `librefang-channels` defines the interface, and `librefang-api` implements it on the real kernel.\n\nKey method groups:\n\n| Method Group | Purpose | Key Methods |\n|---|---|---|\n| **Message sending** | Submit user text to an agent | `send_message`, `send_message_with_blocks`, `send_message_with_blocks_and_sender` |\n| **Streaming** | Progressive token delivery for adapters that support it | `send_message_streaming`, `send_message_streaming_with_sender`, `send_message_streaming_with_sender_status` |\n| **Ephemeral** | Side-questions without session history | `send_message_ephemeral` |\n| **Session management** | Per-channel session reset/reboot/compact | `reset_channel_session`, `reboot_channel_session`, `compact_channel_session` |\n| **Agent lifecycle** | Find, spawn, list, stop agents | `find_agent_by_name`, `spawn_agent_by_name`, `list_agents`, `stop_run` |\n| **Channel config** | Per-channel and per-agent overrides | `channel_overrides`, `agent_channel_overrides`, `get_agent_group_trigger_patterns` |\n| **Automation** | Workflows, triggers, schedules, approvals | `run_workflow_text`, `create_trigger_text`, `manage_schedule_text`, `resolve_approval_text` |\n| **Events** | Subscribe to kernel events (approval requests) | `subscribe_events`, `record_consumer_lag` |\n| **Media** | Audio transcription, file download paths | `transcribe_inbound_audio`, `effective_channels_download_dir` |\n| **RBAC** | Authorization checks | `authorize_channel_user` |\n\nMost methods have default implementations that return \"not available\" stubs, so test mocks only need to override the methods they exercise.\n\n### `BridgeManager`\n\nThe central orchestrator. It owns:\n\n- A `ChannelBridgeHandle` (the kernel connection)\n- An `AgentRouter` (resolves inbound messages to agent IDs)\n- An `InputSanitizer` (prompt-injection detection)\n- A `ChannelRateLimiter`\n- A `MessageJournal` (optional, for crash recovery)\n- A `ThreadOwnershipRegistry` (prevents duplicate replies in shared group threads)\n- All running adapter instances and their webhook routes\n\n**Lifecycle:**\n\n1. **Construction** — `BridgeManager::new(handle, router)` or `with_sanitizer(...)` for custom sanitize config.\n2. **Adapter registration** — `start_adapter(adapter)` subscribes to the adapter's message stream, spawns dispatch tasks, and optionally collects webhook routes.\n3. **Approval listener** — `start_approval_listener()` subscribes to kernel `ApprovalRequested` events and forwards them to notification recipients on bound adapters.\n4. **Operation** — Incoming messages flow from adapter streams through the dispatcher.\n5. **Shutdown** — `stop()` (graceful, `&mut self`) or `abort()` (hard, `&self`) tears down tasks.\n\nThe dual shutdown design exists because hot-reload swaps `BridgeManager` through an `ArcSwap<Option<BridgeManager>>`. The graceful `stop()` requires `&mut self`, but `Arc::try_unwrap` can fail when concurrent requests hold strong references. `abort()` works through `&self` by firing the shutdown watch signal and then calling `abort()` on every tracked `JoinHandle` via a separately maintained `AbortHandle` mirror.\n\n### `ReplyEnvelope`\n\nA two-channel response structure returned to adapters:\n\n```rust\npub struct ReplyEnvelope {\n    pub public: Option<String>,       // reply to the source chat\n    pub owner_notice: Option<String>, // private message to operator DM\n}\n```\n\nAdapters that don't support owner-side delivery ignore `owner_notice` and forward only `public`. Both fields are `Option` so silent turns (no public reply, no notice) are representable.\n\n## Message Flow\n\n### Inbound Dispatch\n\n1. An adapter (e.g., Telegram) parses platform-specific events into `ChannelMessage` structs and yields them through a `Stream`.\n2. `BridgeManager::start_adapter` consumes this stream in a `tokio::select!` loop.\n3. Each message is dispatched as a concurrent `tokio::spawn` task (capped by a 32-permit semaphore) so slow LLM calls don't block subsequent messages.\n4. Inside the dispatch task:\n   - **Input sanitization** runs prompt-injection detection on text content. Blocked messages receive an opaque rejection reply; warned messages are logged but passed through.\n   - **Group policy filtering** applies (`Ignore`, `CommandsOnly`, `MentionOnly`, `All`).\n   - **Agent routing** resolves the target agent via `AgentRouter::resolve`.\n   - **Channel overrides** are fetched for output format, threading, and command permissions.\n   - The message is sent to the kernel via `send_message_with_blocks_and_sender` (or the streaming variant).\n5. The agent's response is formatted according to channel output format (`Markdown`, `Html`, `Plain`) and delivered via `adapter.send()`.\n\n### Debounced Path\n\nWhen `message_debounce_ms` is configured (> 0), rapid messages from the same sender are buffered:\n\n- **Trigger**: First message from a sender starts a debounce timer.\n- **Accumulation**: Subsequent messages from the same `(channel, platform_id)` key are merged — same-type content concatenates, mixed content falls back to text rendering.\n- **Flush**: Fires on debounce timer expiry, max-timer expiry (`message_debounce_max_ms`), buffer full (`message_debounce_max_buffer`), or typing-stop event.\n- **Backpressure**: The flush channel is bounded at 1024 entries. When the dispatcher stalls, the `warn_flush_dropped` helper logs the dropped flush key instead of growing unbounded.\n\n### Streaming Path\n\nAdapters that support progressive display (e.g., Telegram) use `send_message_streaming_with_sender_status`. This returns both a text-delta `mpsc::Receiver` and a `oneshot::Receiver<Result<(), String>>` for terminal status. The adapter can display tokens as they arrive and then record delivery success/failure from the status channel.\n\n## Attachment Enrichment\n\nThe `attachment_enrich` module extracts content from non-image file attachments so the LLM receives meaningful text instead of just a file path.\n\n### `enrich_saved_file`\n\n```rust\npub fn enrich_saved_file(\n    saved_path: &Path,\n    media_type: &str,\n    filename: &str\n) -> Vec<ContentBlock>\n```\n\nRoutes based on media type and filename:\n\n| Input | Output |\n|---|---|\n| `application/pdf` or detected PDF | `[Attached PDF: name (N bytes)]\\n\\n<extracted text>` |\n| `text/*` or recognized code/data extension | `[Attached file: name (N bytes[, truncated])]\\n\\n<file text>` |\n| Images, audio, video, unknown binary | Empty vec (caller emits path block alone) |\n\n**PDF handling** includes panic isolation — `pdf_extract` can panic on malformed or encrypted documents, so extraction runs inside `catch_unwind(AssertUnwindSafe(...))`. Three failure modes produce distinct notes:\n\n- Empty extraction → \"scanned image-only PDF — OCR is not supported yet\"\n- Parse error → \"PDF parse failed\" with the error\n- Panic → \"PDF parser panicked (likely malformed or encrypted)\"\n\n**PDF detection** uses a three-tier heuristic when the MIME is ambiguous (`application/octet-stream`, empty, etc.):\n\n1. Filename ends in `.pdf`\n2. Magic bytes `%PDF-` at offset 0 (`has_pdf_magic_bytes`)\n3. Neither → not treated as PDF\n\nAn authoritative MIME (e.g., `image/png`) always wins over filename heuristics.\n\n**Text truncation** caps extracted content at `MAX_ENRICHED_TEXT_CHARS` (200,000 chars) with a human-readable truncation marker, mirroring the dashboard upload flow's limit.\n\n**The `is_text_like` function** checks both MIME types (`text/*`, `application/json`, etc.) and file extensions (`.py`, `.rs`, `.yaml`, etc.) for when channels don't supply proper MIME types — browsers and chat APIs frequently upload code files as `application/octet-stream`.\n\nEnrichment is **additive**: callers keep the existing `[File: name] saved to /path` block for tools that need raw bytes. The enriched blocks are inserted *before* the path block.\n\n## Group Message Processing\n\nGroup messages pass through `should_process_group_message` which enforces the configured `GroupPolicy`:\n\n- **`Ignore`** — all group messages dropped.\n- **`CommandsOnly`** — only slash commands and `/`-prefixed text pass through.\n- **`MentionOnly`** — messages pass when the bot was `@`-mentioned, is a command, or matches a `group_trigger_patterns` regex.\n- **`All`** — everything passes.\n\n### Vocative Trigger and Addressee Guard\n\nThe addressee guard (enabled via `LIBREFANG_GROUP_ADDRESSEE_GUARD=on`) prevents false triggers when the bot's trigger word appears mid-turn but the turn is addressed to someone else.\n\n**Example**: In a group with Caterina and the bot (alias \"Signore\"), the message \"Caterina, chiedi al Signore...\" should **not** trigger the bot because:\n\n1. `is_addressed_to_other_participant` detects the leading vocative \"Caterina,\" matches a roster member who isn't the bot.\n2. `is_vocative_trigger` confirms that while \"Signore\" appears, another capitalized vocative precedes it.\n\nThis two-layer check (OB-04/OB-05) prevents the substring-only false positive that existed before.\n\n### Trigger Pattern Compilation\n\n`group_trigger_patterns` are compiled into a `RegexSet` and cached in a process-wide `DashMap`. The cache key is the patterns joined by a Unicode separator, so identical pattern sets across agents share a single compilation.\n\n## Command Handling\n\nSlash commands are extracted from text or `ChannelContent::Command` variants and routed through `handle_command` which dispatches to the appropriate `ChannelBridgeHandle` method.\n\n**Command gating** (`is_command_allowed`) enforces a three-level precedence:\n\n1. `disable_commands = true` → block everything\n2. `allowed_commands` non-empty → whitelist only those\n3. `blocked_commands` non-empty → blacklist those\n4. No config → allow everything\n\nBlocked commands are forwarded to the agent as quoted text (`\"/agent admin\"`) so the agent can still interpret the intent, rather than silently dropping the message.\n\n## Approval Notifications\n\n`start_approval_listener` subscribes to kernel `ApprovalRequested` events and delivers them to channel adapters. The routing logic ensures approvals reach the correct operator:\n\n1. Parse the requesting agent's UUID from the event.\n2. For each adapter, determine the bound agent via `channel_default` (account-qualified key for multi-bot adapters).\n3. Recipient resolution:\n   - **Match**: Use the adapter's `notification_recipients()` (the operator inbox).\n   - **Different agent**: Fall back to `bound_recipients_for_agent` — deliver only to chats with explicit `AgentBinding` for the requesting agent.\n   - **No default agent**: Same binding-based fallback (the #5002 fix for adapters that route purely via bindings).\n4. Fan out to all resolved recipients.\n\nThe account-qualified key is critical: a multi-bot adapter with `account_id = \"bot_a\"` must only match `telegram:bot_a`, never fall back to bare `telegram` — that would leak approvals into a different bot's chat.\n\n## Lifecycle and Shutdown\n\n```rust\n// Graceful (requires &mut self — preferred when available)\nbridge.stop().await;\n\n// Hard (works through &self — used during hot-reload)\nbridge.abort();\n```\n\n`abort()` fires the shutdown watch signal (all adapter `select!` loops break on `shutdown.changed()`), then `abort()`s every tracked task handle. The `AbortHandle` mirror is maintained behind a `std::sync::Mutex` specifically to enable this `&self` call path.\n\n`stop()` additionally calls `adapter.stop()` on each adapter (releasing WebSocket connections, ports) and awaits all task `JoinHandle`s.\n\n### Hot-Reload Safety\n\n`track_task` registers externally-spawned tasks (e.g., journal retry tickers) so they don't leak across hot-reloads. Untracked tasks would race between old and new bridge instances on the same journal entries.\n\n## Webhook Route Collection\n\nAdapters that prefer shared-server webhook handling implement `create_webhook_routes()`, returning an `axum::Router` and a message stream. `BridgeManager` collects these via `take_webhook_router()` and nests them under `/{adapter_name}`. The caller mounts the combined router under `/channels` on the main API server.\n\n## File Download Management\n\n`ChannelBridgeHandle` exposes two accessors:\n\n- `channels_download_dir()` — explicitly configured directory, or `None`.\n- `effective_channels_download_dir()` — the configured value falling back to `<temp>/librefang_uploads`.\n\nOn startup, `start_adapter` sweeps files older than 24 hours from the download directory (once per process, via `std::sync::Once`).\n\n## Key Type Conventions\n\n- **`channel_type_str`** maps `ChannelType` enum variants to config string keys (`\"telegram\"`, `\"discord\"`, etc.). Custom channels use their string directly.\n- **`SenderContext`** carries full sender identity (channel, user ID, chat ID, display name, group status, mention status, thread ID, auto-route config) from the bridge to the agent's system prompt.\n- **`ContentBlock`** (from `librefang_types`) represents structured message content — `Text`, `Image`, `ImageFile`, etc. The bridge normalizes all adapter content into `ContentBlock` vectors for kernel submission.","cli-terminal-ui":"# CLI & Terminal UI\n\n# CLI & Terminal UI Module\n\nThe `librefang-cli` crate is the primary user-facing entry point for LibreFang. It provides the command-line binary, an interactive launcher menu, a full Terminal UI (TUI) dashboard, and several protocol servers that let external tools (editors, AI agents) communicate with LibreFang kernels.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    User[\"User / Editor / AI Tool\"]\n    CLI[\"librefang CLI binary\"]\n    \n    User -->|\"no subcommand\"| Launcher[\"Launcher (Ratatui menu)\"]\n    User -->|\"librefang chat\"| ChatTUI[\"Chat TUI\"]\n    User -->|\"librefang acp\"| ACP[\"ACP Server\"]\n    User -->|\"librefang mcp\"| MCP[\"MCP Server\"]\n    User -->|\"librefang doctor\"| Doctor[\"Doctor Audit\"]\n    User -->|\"librefang tui\"| Dashboard[\"TUI Dashboard\"]\n    \n    CLI --> Launcher\n    CLI --> ACP\n    CLI --> MCP\n    CLI --> Doctor\n    CLI --> Dashboard\n    \n    ACP -->|\"daemon up?\"| DaemonSocket[\"UDS / Named Pipe proxy\"]\n    ACP -->|\"no daemon\"| InProcessKernel[\"In-process kernel\"]\n    MCP -->|\"daemon up?\"| DaemonHTTP[\"Daemon HTTP API\"]\n    MCP -->|\"no daemon\"| InProcessKernel\n    \n    Launcher --> DesktopInstall[\"Desktop app install\"]\n    Doctor --> AuditRegistry[\"Audit check registry\"]\n    \n    subgraph \"Shared Infrastructure\"\n        HTTPClient[\"http_client (TLS + bundled CA)\"]\n        I18N[\"i18n (Fluent)\"]\n        LogFilter[\"Reloadable log filter\"]\n        Progress[\"Progress bars / spinners\"]\n    end\n```\n\n## Key Components\n\n### ACP Server — `acp.rs`\n\nThe Agent Client Protocol server lets editors (Zed, VS Code, JetBrains) embed LibreFang as a native agent over stdio. It operates in two mutually exclusive modes:\n\n1. **Daemon-attached (proxy mode)** — When the daemon is running, the CLI becomes a thin bidirectional pipe between stdin/stdout and the daemon's ACP listener. On Unix this connects via a Unix Domain Socket at `~/.librefang/acp.sock`; on Windows via the named pipe `\\\\.\\pipe\\librefang-acp`. Multiple editors share the same kernel state, agent history, and approval decisions.\n\n2. **In-process** — When no daemon is detected, the CLI boots a fresh `LibreFangKernel` in the current process and serves ACP on stdio until stdin EOF.\n\nThe mode is selected automatically at startup. The chosen mode is logged to stderr because approval caches (`allow_always`) are **not shared** between in-process and daemon-attached runs — a user who approved a tool in one mode will be re-prompted in the other.\n\n**Entry point:** `run_acp_server(config, agent)`  \n**Default agent:** `\"assistant\"` (mirrors dashboard/TUI default)\n\nKey internals:\n- `locate_acp_socket()` — checks daemon reachability *and* socket file existence; stale sockets from crashed daemons fall back to in-process mode (Unix only).\n- `run_uds_proxy()` / `run_pipe_proxy()` — bidirectional stdin↔socket/stdout pump using `tokio::select!`. Either direction closing ends the session.\n\n### MCP Server — `mcp.rs`\n\nExposes LibreFang agents as MCP (Model Context Protocol) tools over JSON-RPC 2.0 on stdio with Content-Length framing. Each registered agent appears as a callable tool named `librefang_agent_{name}`.\n\n**Backend selection** (same pattern as ACP):\n- Daemon mode: HTTP client hitting the daemon's REST API.\n- In-process mode: direct `LibreFangKernel` calls via a Tokio runtime.\n\n**Protocol methods handled:**\n\n| Method | Behavior |\n|---|---|\n| `initialize` | Returns server info and capabilities (`tools: {}`) |\n| `notifications/initialized` | No response (notification) |\n| `tools/list` | Enumerates agents as tool descriptors |\n| `tools/call` | Routes `message` argument to the resolved agent |\n| Unknown | Returns JSON-RPC error `-32601` |\n\n**Security:** Messages larger than 10 MB (`MAX_MCP_MESSAGE_SIZE`) are rejected and drained to prevent OOM.\n\n### Interactive Launcher — `launcher.rs`\n\nDisplayed when `librefang` is run with no subcommand in a TTY. A Ratatui-based one-shot menu with two variants:\n\n- **First-run menu** — \"Get started\" is the top entry; includes migration hints for OpenClaw/OpenFang users.\n- **Returning-user menu** — \"Chat with an agent\" is first; setup relegated to \"Settings\" at the bottom.\n\nThe launcher detects daemon status and provider API keys in a background thread, shows a spinner while detecting, and surfaces results as status indicators.\n\n```rust\npub enum LauncherChoice {\n    GetStarted, Chat, Dashboard, DesktopApp,\n    TerminalUI, ShowHelp, Quit,\n}\n```\n\n**Navigation:** ↑/k, ↓/j, digits 1–9 for direct selection, Enter to confirm, q/Esc to quit. The help screen is a scrollable view of the full `--help` output with PgUp/PgDn and g/G shortcuts.\n\n**Desktop app launch:** `launch_desktop_app()` searches for an existing binary, and if not found, offers to download and install it via `desktop_install`.\n\n### Desktop Install — `desktop_install.rs`\n\nHandles discovery, download, and installation of the LibreFang Desktop app from GitHub releases.\n\n**Binary discovery order:**\n1. Sibling of the current CLI executable\n2. `PATH` lookup (`which_lookup`)\n3. Platform-specific standard install location\n\n**Download flow:** Queries `https://api.github.com/repos/librefang/librefang/releases/latest`, selects the asset matching the current platform/arch suffix, streams it to a temp directory, then runs platform-specific installation:\n\n| Platform | Asset | Install method |\n|---|---|---|\n| macOS (aarch64/x86_64) | `.dmg` | `hdiutil attach`, copy to `/Applications`, clear quarantine |\n| Windows (x86_64/aarch64) | `-setup.exe` | Silent NSIS install (`/S`) |\n| Linux (x86_64) | `.AppImage` | Copy to `~/.local/bin/`, `chmod 755` |\n\nmacOS launch detects `.app` bundles via `find_parent_app_bundle` and uses `open -a` for proper bundle activation.\n\n### Doctor — `doctor.rs`\n\nA trait-based audit framework for `librefang doctor`. Each check is an independent struct implementing `AuditCheck`:\n\n```rust\npub trait AuditCheck {\n    fn run(&self, ctx: &AuditContext) -> AuditResult;\n}\n```\n\nResults carry a `Severity` (`Pass`, `Info`, `Warn`, `Error`), a machine-readable `name`, a human `summary`, and an optional remediation `hint`.\n\n**Registered checks (add new ones to `registered_checks()`):**\n\n| Check | What it validates |\n|---|---|\n| `VaultKeyCheck` | `LIBREFANG_VAULT_KEY` base64-decodes to exactly 32 bytes (catches the common \"32 ASCII chars ≠ 32 bytes\" mistake) |\n| `ApiListenAddrCheck` | `api_listen` in `config.toml` parses as `SocketAddr`; warns on privileged ports (<1024) and port 0 |\n| `ConfigTomlSchemaCheck` | `config.toml` exists and parses as valid TOML |\n\n**Adding a check:** Create a unit struct, implement `AuditCheck`, add it to `registered_checks()`. No other wiring needed.\n\n`AuditContext` holds pre-resolved paths (`librefang_home`) so checks don't repeat lookups.\n\n### HTTP Client — `http_client.rs`\n\nThin wrapper providing a `reqwest::blocking::Client` with bundled TLS CA roots (via `librefang_runtime::http_client::tls_config`). Used throughout the CLI for daemon communication and GitHub API calls.\n\n```rust\npub fn client_builder() -> reqwest::blocking::ClientBuilder\npub fn new_client() -> reqwest::blocking::Client\n```\n\n### i18n — `i18n.rs`\n\nInternationalization using [Fluent](https://projectfluent.org/). Supports `en` and `zh-CN`, with Fluent message files embedded at compile time via `include_str!`.\n\n**Thread-local storage:** The active `I18n` bundle is stored in a `thread_local!` `RefCell`. Initialize once with `init(language)`, then use the `t()` / `t_args()` helpers:\n\n```rust\ni18n::init(\"zh-CN\");\nlet label = i18n::t(\"label-dashboard\"); // \"控制台\"\nlet msg = i18n::t_args(\"models-available\", &[(\"count\", \"12\")]); // \"12 models available\"\n```\n\nFalls back to English for unsupported languages. Missing keys render as `[key_name]`.\n\n### Reloadable Log Filter — `log_filter.rs`\n\nA per-layer `tracing` filter that can be hot-reloaded at runtime (e.g., from the dashboard's log level control). Built on `ArcSwap<EnvFilter>` instead of `tracing_subscriber::reload` to avoid complex generic type signatures in the daemon's subscriber stack.\n\n**Key design points:**\n- `ReloadableEnvFilter` implements `Filter<S>` by forwarding every hook to the current inner `EnvFilter`.\n- `install_with_baseline(initial, baseline)` stores baseline directives (e.g., `librefang_kernel=warn`) that are reapplied on every reload. This prevents a dashboard \"debug\" toggle from unmasking kernel noise that was specifically silenced at boot.\n- `reload_log_level(directive)` swaps the inner filter and calls `tracing_core::callsite::rebuild_interest_cache()` to invalidate per-callsite interest caching.\n\n`CliLogLevelReloader` adapts this for the kernel's `LogLevelReloader` trait.\n\n### Progress — `progress.rs`\n\nANSI-based progress bars and spinners with no external dependency. Features:\n- Percentage bar with unicode block characters\n- Braille spinner animation\n- OSC 9;4 terminal progress protocol (Windows Terminal, iTerm2)\n- Delay suppression: operations completing under 200ms produce no output\n- `ProgressReporter` trait for TTY/non-TTY abstraction\n\nUse `auto(label, total)` to get an appropriate reporter for the current environment.\n\n### Bundled Agents — `bundled_agents.rs`\n\nBackwards-compatible wrapper that delegates to `librefang_runtime::registry_sync::sync_registry`. Syncs registry content to the local LibreFang home directory.\n\n## Connecting to the Rest of the Codebase\n\n**Kernel interaction:** Both ACP and MCP servers can operate against either a running daemon (via HTTP/UDS/named pipe) or an in-process `LibreFangKernel`. The in-process path calls `LibreFangKernel::boot()` and `spawn_approval_sweep_task()` to get a fully functional kernel.\n\n**TUI event system:** The TUI dashboard (`src/tui/`) uses a channel-based event loop. Background threads spawned by `spawn_fetch_*` functions in `src/tui/event.rs` communicate with the daemon API and send results back to the main event loop. The TUI screens consume these events to populate lists, status cards, and interactive forms.\n\n**Config and state:** The CLI reads `$LIBREFANG_HOME` (defaulting to `~/.librefang`) for all configuration. The doctor checks, first-run detection, and socket discovery all key off this path. The `config.toml` file at this location is the single source of truth for settings like `api_listen`.\n\n**Migration:** The launcher detects existing `~/.openclaw` or `~/.openfang` directories on first run and surfaces a migration hint pointing users to the \"Get started\" flow.\n\n## Testing Conventions\n\nTests across this module follow a consistent pattern:\n\n- **TempDir isolation:** All filesystem mutations use `tempfile::TempDir` so nothing escapes to the user's real home.\n- **Env var serialization:** Tests that mutate process-global env vars (`LIBREFANG_VAULT_KEY`, `LIBREFANG_HOME`, `PATH`) use a `Mutex` lock (`env_lock` / `ENV_LOCK`) and restore the original value in the same scope.\n- **Dependency injection:** Platform-specific install functions have `_in` / `_to` variants (e.g., `install_linux_appimage_to`, `linux_install_path_in`) that accept explicit paths for testability.\n- **Process-wide singletons:** `OnceLock`-based globals (`LIVE_FILTER`, `BASELINE_DIRECTIVES`) are exercised in a single sequential test function rather than parallel `#[test]` fns, since `OnceLock` semantics mean only the first `install()` call actually seeds the slot.","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\nThe LibreFang dashboard is a single-page React application that provides the operator control plane for the daemon. It covers agent management, real-time chat, workflow editing, provider/channel configuration, media generation, audit trails, and diagnostics — all through a single authenticated shell.\n\n## Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph Shell[\"App.tsx (Shell)\"]\n        Auth[\"AuthDialog\"]\n        Sidebar[\"Sidebar + NavGroups\"]\n        Topbar[\"Topbar + NotificationCenter\"]\n        Main[\"<Outlet/> (Route Pages)\"]\n        Mobile[\"MobileBottomTabs\"]\n    end\n\n    subgraph API[\"api.ts (HTTP Client)\"]\n        GET[\"get()\"]\n        POST[\"post()\"]\n        PUT[\"put()\"]\n        PATCH[\"patch()\"]\n        DEL[\"del()\"]\n        WS[\"buildAuthenticatedWebSocket()\"]\n    end\n\n    subgraph State\n        UIStore[\"useUIStore (Zustand)\"]\n        Router[\"TanStack Router\"]\n    end\n\n    Auth -->|\"verifyStoredAuth()\"| API\n    Sidebar -->|\"Link to\"| Router\n    Main -->|\"page components\"| API\n    API -->|\"401 → setOnUnauthorized()\"| Auth\n    API -->|\"Authorization header\"| UIStore\n```\n\n## Authentication\n\nThe dashboard supports four authentication modes negotiated with the daemon at startup:\n\n| Mode | Description |\n|------|-------------|\n| `none` | No auth required — dashboard renders immediately |\n| `api_key` | Single API key input, stored in session/localStorage |\n| `credentials` | Username + password, optional TOTP second factor |\n| `hybrid` | User chooses between credentials and API key tabs |\n\n### Startup Flow\n\n1. `App` calls `checkDashboardAuthMode()` to learn the daemon's auth mode\n2. If mode is `none`, the shell renders directly\n3. Otherwise, `verifyStoredAuth()` checks for a previously stored token\n4. If no valid token exists, `AuthDialog` renders as a fullscreen modal\n5. On successful login, the token is persisted and the shell mounts\n\n### Token Storage\n\nTokens are stored via `setApiKey(key)` which writes to **sessionStorage** (preferred, tab-scoped) with a **localStorage** fallback for backward compatibility. The function `getStoredApiKey()` checks both locations.\n\n### Global 401 Handler\n\nAny API response with status 401 triggers `_onUnauthorized`, which:\n- Clears the stored token\n- Re-probes `checkDashboardAuthMode()`\n- Re-renders the `AuthDialog`\n\nThis is wired in `App`'s `useEffect` via `setOnUnauthorized()`. The shell deliberately **does not mount** `<Outlet/>` until auth is confirmed, preventing authenticated endpoints like `useDashboardSnapshot` and `useApprovalCount` from polling with invalid credentials and spamming 401s.\n\n### No-Auth Routes\n\nRoutes in `NO_AUTH_ROUTES` (currently `/connect`) bypass the auth gate entirely. This prevents deadlocks on first-run pairing where no credentials exist yet.\n\n### Credential Change\n\n`ChangePasswordModal` allows authenticated users to update their username and/or password. It:\n- Fetches the current username via `getDashboardUsername()`\n- Validates password length (≥8), confirmation match, and username length (≥2)\n- Calls `changePassword()` with current password verification\n- On success, clears the API key and reloads the page after 1.5s\n\n## API Client (`api.ts`)\n\nThe API layer provides a fully typed HTTP client for all daemon endpoints.\n\n### HTTP Helpers\n\nFive generic functions handle all requests:\n\n| Function | Default Timeout | Notes |\n|----------|----------------|-------|\n| `get<T>` | 30s | JSON parse |\n| `post<T>` | 60s | Supports external `AbortSignal` for cancellation |\n| `put<T>` | 30s | — |\n| `patch<T>` | 30s | — |\n| `del<T>` | 30s | Returns `{}` on 204 No Content |\n\nAll helpers:\n- Merge `Authorization: Bearer <token>` and `Accept-Language` headers via `buildHeaders()`\n- Use `AbortSignal.timeout()` for deadlines\n- Route through `parseError()` which fires the global 401 handler on unauthorized responses\n\n### WebSocket Auth\n\n`buildAuthenticatedWebSocket(path)` returns `{ url, protocols }` for use with `new WebSocket()`. The bearer token is sent as a `bearer.<token>` sub-protocol in `Sec-WebSocket-Protocol` rather than a query parameter, keeping it out of server logs and browser history.\n\n### Timeout Constants\n\n| Constant | Value | Usage |\n|----------|-------|-------|\n| `DEFAULT_TIMEOUT_MS` | 30s | Reads, light writes |\n| `DEFAULT_POST_TIMEOUT_MS` | 60s | Standard mutations |\n| `LONG_RUNNING_TIMEOUT_MS` | 300s | Agent messages, file uploads, media generation |\n\n### Key Domain Types\n\nThe API module defines TypeScript interfaces for every daemon response shape. Notable patterns:\n\n- **Discriminated unions** for `ContentBlock` — tagged on `type: \"text\" | \"thinking\" | \"tool_use\" | \"tool_result\" | \"image\" | \"image_file\"`. Unknown server variants are handled at runtime without breaking narrowing.\n- **`PaginatedResponse<T>`** — the standard envelope with `items`, `total`, `offset`, `limit`.\n- **`CronDeliveryTarget`** — tagged union on `type: \"channel\" | \"webhook\" | \"local_file\" | \"email\"`.\n- **Tri-state string fields** — `api_key_env` and `base_url` in hand runtime config use absent/empty/value to mean leave-as-is/clear/set.\n- **`EvolutionResult`** — skill mutation responses include `match_strategy` and `match_count` for patch operations.\n\n### File Uploads\n\n`uploadAgentFile(agentId, file)` sends raw bytes with `Content-Type` set to the file's MIME type and `X-Filename` carrying the sanitized original name (non-ASCII bytes replaced with `_` per RFC 7230).\n\n## Navigation Shell\n\n### Sidebar\n\nThe sidebar (`<aside>`) is a 232px collapsible panel (64px when collapsed) containing:\n\n1. **Brand block** — sky-gradient logo mark, \"librefang\" wordmark, version + hostname\n2. **Search trigger** — opens the command palette (⌘K)\n3. **Nav groups** — four sections of `<Link>` items:\n\n| Group | Key | Routes |\n|-------|-----|--------|\n| Primary | `primary` | overview, agents, chat, sessions, skills, workflows, scheduler, approvals |\n| Runtime | `runtime` | mcp-servers, channels, providers, models, memory, network, a2a, hands, plugins, goals |\n| Observability | `observability` | analytics, telemetry, audit, logs, terminal (conditional), comms, media |\n| Admin | `admin` | runtime, config, users, settings |\n\nWhen `navLayout` is `\"collapsible\"`, labeled groups (Runtime, Observability, Admin) can be collapsed via `toggleNavGroup`. The primary group always renders uncollapsed.\n\nThe `/terminal` route appears only when `terminalEnabled` is true (fetched from `getStatus()` with fail-open).\n\n### Active State\n\nActive nav items receive `NAV_ACTIVE_CLASS`: brand-tinted background, brand-colored text, and a 2px left-edge glow bar using `before:` pseudo-elements. Tailwind v4 requires explicit `before:content-['']` for pseudo-element rendering.\n\n### User Menu\n\n`SidebarUserBlock` renders the user avatar row at the sidebar footer. Clicking it opens `UserMenuPanel` — a floating dropdown providing:\n\n- Theme toggle (light/dark)\n- Language switch (English / 简体中文)\n- Links to Settings, Shortcuts help, Change credentials\n- Sign out button (hidden when `authMode === \"none\"`)\n\nThe same `UserMenuPanel` is also accessible from the topbar avatar button, using `position: fixed` to escape the `overflow-hidden` ancestor.\n\n### Topbar\n\nA compact 48px header with:\n- Mobile hamburger menu + brand block (hidden on desktop)\n- Desktop breadcrumb: `prod → <currentPageLabel>`\n- Search button\n- `NotificationCenter` icon\n- Terminal quick-link button (when enabled)\n- User avatar dropdown\n\n### Mobile Navigation\n\nOn screens below `lg` breakpoint:\n- The sidebar becomes a fixed off-canvas drawer (slides from left)\n- `MobileBottomTabs` renders 5 tabs: Overview, Agents, Chat, Approvals, and a \"More\" button that opens the sidebar drawer\n- Safe area inset padding is applied for notched devices\n\n### Full-Height Routes\n\nRoutes in `FULL_HEIGHT_ROUTES` (`/terminal`) render with `flex-1 overflow-hidden` instead of the standard `overflow-y-auto` scrollable layout, allowing terminal emulators to fill the viewport.\n\n## Page Transitions\n\nRoute changes animate via Framer Motion's `AnimatePresence` with `mode=\"wait\"`. Full-height and standard pages use different animation keys (`full:<path>` vs `std:<path>`) to prevent layout jumps during transitions.\n\n## Global UI Components\n\n| Component | Purpose |\n|-----------|---------|\n| `CommandPalette` | Modal search (⌘K) — route navigation, actions |\n| `ShortcutsHelp` | Keyboard shortcuts reference modal |\n| `PushDrawer` | Side drawer for contextual panels |\n| `NotificationCenter` | Real-time notification bell + dropdown |\n| `OfflineBanner` | Shown when the daemon is unreachable |\n| `OfflineBanner` | Daemon reachability warning |\n\n## State Management\n\n`useUIStore` (Zustand) manages all client-side UI state:\n\n- `theme` / `toggleTheme` — dark/light mode, synced to `<html class=\"dark\">`\n- `language` / `setLanguage` — persisted to localStorage for i18next\n- `isSidebarCollapsed` / `toggleSidebar` — sidebar width\n- `navLayout` — `\"collapsible\"` vs flat nav sections\n- `collapsedNavGroups` — per-group collapse state\n- `isMobileMenuOpen` / `setMobileMenuOpen` — mobile drawer\n- `terminalEnabled` / `setTerminalEnabled` — feature flag from daemon status\n\n## Internationalization\n\nAll user-facing strings use `useTranslation()` with keys namespaced under `nav.`, `auth.`, `settings.`, and `common.`. Supported languages are English (`en`) and Simplified Chinese (`zh`). The current language is sent to the daemon via the `Accept-Language` header on every request.\n\n## Adding a New Page\n\n1. Define the route in `src/router.tsx` (TanStack Router)\n2. Add the route string to the `DashboardRoute` type union in `App.tsx`\n3. Add a `NavItem` entry to the appropriate `navGroups` section\n4. Create the page component and wire any API calls through the typed `api.ts` functions\n\nWhen adding nav items, respect the 30px row height and 13px font conventions. Collapsed sidebar items should center their icon and hide text labels.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop Application\n\nNative desktop and mobile wrapper for the LibreFang Agent OS, built on Tauri 2.0. Boots an embedded kernel + API server or connects to a remote instance, then hosts the WebUI dashboard in a native WebView window with system tray, notifications, global shortcuts, auto-start, and auto-updates.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[run / mobile_main] --> B{StartupMode?}\n    B -->|Remote URL| C[WebView → external server]\n    B -->|Local| D[start_server]\n    B -->|ConnectionScreen| E[lfconnect:// URI scheme]\n    D --> F[LibreFangKernel::boot]\n    D --> G[axum on random port]\n    G --> H[WebView → localhost]\n    E -->|connect_remote| I[connect_remote IPC]\n    E -->|start_local| J[start_local IPC]\n    I --> C\n    J --> D\n    D --> K[ServerHandle]\n    K --> L[forward_kernel_events → notifications]\n```\n\n## Startup Mode Resolution\n\nThe app resolves its connection mode at launch from four sources in priority order:\n\n| Priority | Source | Flag / Location |\n|----------|--------|-----------------|\n| 1 | CLI argument | `--server-url <URL>` → remote mode |\n| 2 | Environment variable | `LIBREFANG_SERVER_URL` → remote mode |\n| 3 | Saved preference | `~/.librefang/desktop.toml` → remote or local |\n| 4 | Connection screen | User picks at runtime | CLI `--local` forces local mode (desktop only) |\n\nIf none match, the app opens the connection screen — a self-contained HTML page served through the custom `lfconnect://` URI scheme protocol. This avoids the old `about:blank` + `document.write` approach that broke on WebKitGTK 2.50 (issue #3052).\n\nOn mobile (`cfg(mobile)`), local mode is always unavailable — the app is strictly a thin client connecting to a remote daemon.\n\n## Managed State\n\nTauri managed state is registered once during builder setup with interior-mutable `RwLock` wrappers. State updates (e.g. switching servers) mutate through the locks rather than re-registering.\n\n| Type | Field | Description |\n|------|-------|-------------|\n| `PortState` | `RwLock<Option<u16>>` | Listening port. `None` in remote mode or before boot. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel instance + `Instant` uptime. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | `true` when connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Handle for the embedded server thread (desktop only). |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and a `started_at: Instant` for uptime reporting.\n\n## Module Breakdown\n\n### `server.rs` — Embedded Server Lifecycle\n\nDesktop-only. Boots the kernel synchronously, binds a `TcpListener` to `127.0.0.1:0` on the calling thread (guaranteeing the port is known before any window is created), then runs the axum server on a dedicated thread with its own multi-thread tokio runtime.\n\n```\nstart_server()\n  → LibreFangKernel::boot(None)\n  → TcpListener::bind(\"127.0.0.1:0\")\n  → spawn thread → tokio runtime\n    → kernel.start_background_agents()\n    → kernel.spawn_approval_sweep_task()\n    → run_embedded_server()  (axum + graceful shutdown via watch channel)\n    → sync_dashboard()       (background, downloads latest WebUI assets)\n```\n\n`ServerHandle` owns the shutdown `watch::Sender` and server thread `JoinHandle`. Calling `shutdown()` signals the watch channel, joins the thread, and calls `kernel.shutdown()`. Drop does a best-effort signal without joining (avoids blocking in destructors). Double-shutdown is guarded by an `AtomicBool`.\n\n### `connection.rs` — Connection Screen and Mode Switching\n\nProvides both the connection UI and the IPC commands for runtime server switching.\n\n**IPC commands:**\n\n| Command | Parameters | Description |\n|---------|------------|-------------|\n| `test_connection` | `url: String` | GET `/api/health` on the target, returns JSON |\n| `connect_remote` | `url, remember, window` | Validates URL, health-checks, saves pref, updates state, navigates WebView |\n| `start_local` | `remember, app, window` | Boots local server via `crate::server::start_server()`, fills all managed state, starts event forwarding, navigates WebView (desktop only) |\n\n**Connection preference** is serialized as TOML to `~/.librefang/desktop.toml`:\n\n```toml\n[connection]\nmode = \"remote\"\nserver_url = \"https://my-server.example.com\"\n```\n\n**`navigation_target(daemon_url)`** handles the mobile release-build case. On iOS/Android release builds, the dashboard ships embedded in the app bundle. The function returns `tauri://localhost/index.html#api=<encoded-url>` so the bundled dashboard can proxy API/WebSocket requests to the daemon (CORS must allow `tauri://localhost`). On all other builds it returns the daemon URL directly for thin-client navigation.\n\n**`connection_html()`** returns a complete self-contained HTML/CSS/JS page. On mobile, the `btn-local` button, divider, and its JS reference are stripped at compile time via sentinel-based string replacement with `debug_assert!` guards to catch HTML reformatting that would break the extraction.\n\n### `commands.rs` — IPC Command Handlers\n\nAll commands are `#[tauri::command]` functions exposed to the frontend via `invoke`.\n\n**Kernel introspection:**\n\n| Command | Returns | Notes |\n|---------|---------|-------|\n| `get_port` | `u16` | Reads `PortState` |\n| `get_status` | JSON `{ status, port, agents, uptime_secs }` | Combines port + kernel state |\n| `get_agent_count` | `usize` | Agent registry length |\n\n**Agent/skill import:**\n\n`import_agent_toml` opens a native file picker (`.toml` filter), validates the content as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, then calls `kernel.spawn_agent(manifest)`.\n\n`import_skill_file` copies the selected file (`.md`, `.toml`, `.py`, `.js`, `.wasm`) to `~/.librefang/skills/` and calls `kernel.reload_skills()`.\n\n**Auto-start** (desktop only):\n\n`get_autostart` / `set_autostart(enabled)` wrap `tauri-plugin-autostart`.\n\n**Updates** (desktop only):\n\n`check_for_updates` returns `UpdateInfo { available, version, body }`. `install_update` downloads, installs, and restarts — does not return on success.\n\n**Credentials** (mobile only):\n\n`store_credentials`, `get_credentials`, `clear_credentials` use the OS keyring via the `keyring` crate. Credentials are stored as JSON `{\"base_url\": ..., \"api_key\": ...}` under service `\"librefang-mobile\"` / account `\"daemon-credentials\"`.\n\n**File system:**\n\n- `open_config_dir` — opens `~/.librefang/` in OS file manager\n- `open_logs_dir` — opens `~/.librefang/logs/` in OS file manager\n\n**Uninstall:**\n\n`uninstall_app` is platform-specific:\n- **Windows**: queries `HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall` for the NSIS `UninstallString`, runs it, exits.\n- **macOS**: walks up from the executable to find the `.app` bundle, moves to Trash via `osascript` + Finder.\n- **Linux/AppImage**: deletes the AppImage binary. System packages return a hint string (e.g. `sudo apt remove librefang`).\n- **Mobile**: returns an error directing the user to the platform app store.\n\n### `shortcuts.rs` — Global Keyboard Shortcuts\n\nDesktop-only. Registers three system-wide shortcuts:\n\n| Shortcut | Action |\n|----------|--------|\n| `Ctrl+Shift+O` | Show/focus the window |\n| `Ctrl+Shift+N` | Show window + emit `\"navigate\"` event with `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `\"navigate\"` event with `\"chat\"` |\n\nThe frontend listens for the `navigate` event to handle page transitions. Registration failure is non-fatal — the app logs a warning and continues.\n\n### `tray.rs` — System Tray\n\nDesktop-only. On Linux, additionally gated behind the `linux-tray` Cargo feature due to GTK3 unmaintained-crate advisories (issues RUSTSEC-2024-0411..0420, 0429).\n\nMenu items:\n\n- **Show Window** — focuses the main window\n- **Open in Browser** — opens the current server URL (local or remote) in the default browser\n- **Change Server...** — shuts down any local server, clears state, navigates back to the connection screen\n- **Status info** — displays uptime (local) or remote URL, plus agent count (display-only, disabled)\n- **Launch at Login** — `CheckMenuItem` toggling auto-start\n- **Check for Updates...** — triggers update check + notification + install if available\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — exits the app\n\nLeft-click on the tray icon shows/focuses the window. The close button hides to tray instead of quitting (handled in `on_window_event`).\n\n### `updater.rs` — Auto-Update\n\nDesktop-only. Uses `tauri-plugin-updater`.\n\n`spawn_startup_check` runs after a 10-second delay, probes the update manifest endpoint with a HEAD request (skips the check if the manifest 404s — avoids noisy log spam when no `latest.json` exists yet), then installs silently and restarts.\n\n`check_for_update` and `download_and_install_update` are the on-demand variants called from IPC commands and the tray menu.\n\n### `lib.rs` — Security: URL Validation\n\n`validate_server_url` enforces a critical security policy (issue #3673):\n\n- `https://` is always accepted\n- `http://` is **only** accepted for loopback addresses (`127.*`, `localhost`, `[::1]`)\n- `http://` to any non-loopback host is rejected to prevent MITM-injected IPC abuse\n- URLs with userinfo (`@`) are rejected to prevent loopback-bypass tricks like `http://[::1]@evil.com/`\n\nThis validation runs on every `connect_remote`, `test_connection`, and CLI/env URL at startup.\n\n### Event Forwarding\n\n`forward_kernel_events` subscribes to the kernel event bus and surfaces critical events as native OS notifications:\n\n- **Agent Crashed** — `LifecycleEvent::Crashed { agent_id, error }`\n- **Kernel Stopping** — `SystemEvent::KernelStopping`\n- **Quota Enforced** — `SystemEvent::QuotaEnforced { agent_id, spent, limit }`\n\nUses `recv_event_skipping_lag` so consumer-side drops are counted in the event bus's `dropped_count()` metric rather than silently swallowed (issue #3630).\n\n## Platform Differences\n\n| Feature | Desktop | Mobile |\n|---------|---------|--------|\n| Embedded server | ✅ | ❌ (thin client only) |\n| System tray | ✅ (Linux needs `linux-tray` feature) | ❌ |\n| Global shortcuts | ✅ | ❌ |\n| Auto-start | ✅ | ❌ |\n| Auto-updater | ✅ | ❌ (store-managed) |\n| Credential storage | N/A | OS keyring |\n| Single instance | ✅ | ❌ |\n| Shell plugin | ✅ | ❌ |\n| Connection screen local button | Shown | Stripped |\n\n## Adding a New IPC Command\n\n1. Define the function in `commands.rs` with `#[tauri::command]` (and any required `cfg` gates)\n2. Add it to the correct `tauri::generate_handler![]` block in `lib.rs` — one for desktop, one for mobile\n3. If the command needs managed state, accept `tauri::State<'_, YourState>` as a parameter\n4. The `generate_handler!` macro does not support `cfg` attributes internally, which is why two separate handler registrations exist","extensions-vault":"# Extensions & Vault\n\n# Extensions & Vault\n\nThe `librefang-extensions` crate manages the full lifecycle of external integrations: discovering MCP server templates, resolving their credentials from multiple secure sources, installing them into the user's config, monitoring their health, and handling OAuth2 authentication flows.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Boot-time (sync main)\"\n        DOTENV[\"dotenv::load_dotenv()\"]\n        DOTENV --> PRE[\"preseed vault key\"]\n        DOTENV --> VL[\"load_vault() → unlock + inject env\"]\n        DOTENV --> EF[\"load_env_file(.env, secrets.env)\"]\n    end\n\n    subgraph \"Runtime (kernel / API)\"\n        CATALOG[\"McpCatalog\"] --> INST[\"installer::install_integration()\"]\n        INST --> CR[\"CredentialResolver\"]\n        CR -->|1. vault| V[\"CredentialVault (AES-256-GCM)\"]\n        CR -->|2. dotenv cache| CR\n        CR -->|3. env var| CR\n        CR -->|4. prompt| CR\n        INST --> CONFIG[\"McpServerConfigEntry → config.toml\"]\n        HM[\"HealthMonitor (DashMap)\"] -->|report_ok / report_error| ROUTES[\"skills routes\"]\n    end\n\n    subgraph \"OAuth Flow\"\n        OAUTH[\"oauth::run_pkce_flow()\"]\n        OAUTH -->|tokens| V\n    end\n\n    V -->|keyring / file fallback| OSKR[\"OS Keyring / .keyring file\"]\n```\n\n**Credential priority** (highest wins, never overridden):\n\n| Priority | Source | Loaded at |\n|----------|--------|-----------|\n| 1 | System environment variables | Process start |\n| 2 | Credential vault (`vault.enc`) | `load_dotenv()` boot path |\n| 3 | `~/.librefang/.env` | `load_dotenv()` boot path |\n| 4 | `~/.librefang/secrets.env` | `load_dotenv()` boot path |\n\n---\n\n## Credential Vault (`vault.rs`)\n\nAES-256-GCM encrypted file store at `~/.librefang/vault.enc`. The master key is resolved from (in order):\n\n1. `LIBREFANG_VAULT_KEY` environment variable\n2. OS keyring (macOS Keychain, Windows Credential Manager, Linux Secret Service)\n3. File-based fallback at `<data_local_dir>/librefang/.keyring` (AES-256-GCM wrapped with an Argon2id-derived machine fingerprint key)\n\n### Key concepts\n\n**Sentinel validation (#3651).** Every vault contains a reserved `__sentinel__` key with known plaintext `\"librefang-vault-sentinel-v1\"`. On boot, after `unlock()`, the daemon calls `verify_or_install_sentinel()` to confirm the decrypting key matches the encrypting key. A mismatch returns `ExtensionError::VaultKeyMismatch` and halts boot — preventing silent data loss from a wrong `LIBREFANG_VAULT_KEY`.\n\n**Path-bound AAD.** Ciphertext includes the vault file path as Additional Authenticated Data. Moving or renaming `vault.enc` causes decryption to fail, preventing file-swap attacks.\n\n**Atomic writes.** Every `save()` writes to a `.tmp` file (mode 0600), calls `fsync`, then renames over the target. This prevents truncated files on crash and avoids a permissions TOCTOU window.\n\n### Core API\n\n```rust\nlet mut vault = CredentialVault::new(home.join(\"vault.enc\"));\n\n// First-time setup — generates key, stores in OS keyring\nvault.init()?;\n\n// Subsequent opens\nvault.unlock()?;\nlet secret = vault.get(\"GITHUB_TOKEN\");\nvault.set(\"SLACK_TOKEN\".into(), Zeroizing::new(\"xoxb-...\".into()))?;\nvault.remove(\"SLACK_TOKEN\")?;\n\n// Key rotation\nvault.rewrap_with_new_key(new_key)?;\n```\n\n**Lazy init on first `set()`.** If the vault file doesn't exist when `set()` is called, it automatically runs `init()` so the credential is persisted rather than silently dropped. This is the contract `kernel::vault_handle()` relies on.\n\n**Reserved key protection.** `set()` and `remove()` reject operations on `SENTINEL_KEY` to prevent external callers from corrupting the startup validation contract.\n\n### OS keyring behavior\n\n- **macOS**: OS keyring is **disabled by default** (macOS Keychain ACLs are per-binary-signature; every `cargo build` invalidates the ACL and triggers an allow prompt). The file fallback at `<data_local_dir>/librefang/.keyring` is used instead.\n- **Linux / Windows**: OS keyring is enabled by default.\n- Override: set `LIBREFANG_VAULT_NO_KEYRING=1` to force the file fallback on any platform.\n- Programmatic override: `CredentialVault::init_with_config(use_os_keyring)` called once from `LibreFangKernel::boot_with_config`.\n\n### Vault file format\n\n```\nOFV1<magic> <JSON VaultFile>\n```\n\n```rust\nstruct VaultFile {\n    version: u8,           // always 1\n    salt: String,          // base64, 16 bytes\n    nonce: String,         // base64, 12 bytes\n    ciphertext: String,    // base64, AES-256-GCM(JSON VaultEntries)\n    schema_version: u32,   // AAD schema version (0 = legacy path-only, 1 = current)\n}\n```\n\n---\n\n## Credential Resolver (`credentials.rs`)\n\n`CredentialResolver` provides a unified interface for looking up secrets at runtime. It chains through vault → dotenv cache → environment variable → interactive prompt (CLI only), returning the first hit.\n\n### Vault ownership models\n\nThe resolver supports two vault backing models via the `VaultSource` enum:\n\n- **`VaultSource::Owned`** — short-lived callers (CLI subcommands, tests) that construct their own `CredentialVault`. Created via `CredentialResolver::new()`.\n- **`VaultSource::Shared`** — long-lived callers (API request handlers) that route through the kernel's cached `Arc<RwLock<CredentialVault>>` handle, avoiding re-running the Argon2id KDF on every request. Created via `CredentialResolver::with_vault_handle()`.\n\n### Core API\n\n```rust\n// Short-lived (CLI, tests)\nlet mut resolver = CredentialResolver::new(Some(vault), Some(dotenv_path));\n\n// Long-lived (API handlers) — uses kernel's cached vault\nlet resolver = CredentialResolver::with_vault_handle(\n    kernel.vault_handle(),\n    Some(dotenv_path),\n);\n\n// Resolve a single credential\nlet token = resolver.resolve(\"GITHUB_TOKEN\"); // Option<Zeroizing<String>>\n\n// Batch resolution\nlet creds = resolver.resolve_all(&[\"GITHUB_TOKEN\", \"SLACK_TOKEN\"]);\n\n// Check what's missing\nlet missing = resolver.missing_credentials(&[\"API_KEY\", \"CLIENT_ID\"]);\n\n// Store into vault\nresolver.store_in_vault(\"API_KEY\", Zeroizing::new(\"sk-...\".into()))?;\n```\n\n---\n\n## Dotenv Boot Loader (`dotenv.rs`)\n\n**Must be called from synchronous `main()` before spawning the tokio runtime.** `std::env::set_var` is UB once other threads exist (Rust 1.80+).\n\n`load_dotenv()` is guarded by a `Once` gate — repeated calls are no-ops. The loading sequence:\n\n1. **Preseed `LIBREFANG_VAULT_KEY`** from `.env` / `secrets.env` if not already in the process environment. This is the only key extracted early — the vault's `resolve_master_key()` reads straight from `std::env`, so the key must be present before `load_vault()` runs (#5139).\n2. **Unlock vault** and inject all vault secrets into `std::env` (skipping keys already set by the system environment).\n3. **Load `.env`** into `std::env` (skipping already-set keys).\n4. **Load `secrets.env`** into `std::env` (skipping already-set keys).\n\n### File mutation API\n\n```rust\n// Upsert — atomic write (tmp file + rename, mode 0600 on Unix)\ndotenv::save_en
