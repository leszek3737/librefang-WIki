characters (`\\x00`, `\\x07`) while preserving `\\n` and `\\t`\n- Truncates by **character count** (not bytes) to avoid panicking on UTF-8 boundaries\n\n### Transient vs Permanent Error Classification\n\n`is_transient_review_error` determines whether a background skill review error is worth retrying:\n\n- **Transient** (retryable): timeouts, connection failures, 429 rate limits\n- **Permanent** (do not retry): parse failures, missing required fields, security blocks\n\n### Trace Summarization\n\n`summarize_traces_for_review` produces a bounded summary of tool decision traces:\n\n- Short traces (≤ ~20 entries): includes all entries verbatim\n- Long traces: keeps head and tail, inserts `\"omitted\"` marker for the middle — ensures the summary is always smaller than the raw trace log\n\n### Miscellaneous Utilities\n\n| Function | Test | Behavior |\n|----------|------|----------|\n| `should_reuse_cached_route` | `test_should_reuse_cached_route_for_brief_follow_up` | Short messages and CJK text reuse the cached route; long messages and acknowledgments like \"thanks\" do not |\n| `assistant_route_key` | `test_assistant_route_key_scopes_sender_and_thread` | Combines agent ID + channel + user ID + thread ID into a unique cache key |\n| `evaluate_condition` | `test_evaluate_condition_*` | Supports `agent.tags contains 'X'` syntax; unknown formats return `false` (strict deny) |\n| `peer_scoped_key` | `test_peer_scoped_key` | Prepends `peer:{id}:` when a peer ID is provided; leaves key unchanged otherwise |\n| `apply_thinking_override` | `test_apply_thinking_override_*` | `None` preserves manifest; `Some(false)` clears thinking; `Some(true)` inserts defaults or preserves existing budget |\n\n### Kernel Boot Defaults\n\nA fresh kernel boot with default config auto-spawns an `assistant` agent (verified in `test_boot_spawns_assistant_as_default_agent`). The approval sweep task is idempotent — calling `spawn_approval_sweep_task` twice does not launch a second task.\n\n### Ephemeral Messaging\n\n`send_message_ephemeral` sends a one-off message to an agent **without modifying its session history**. Tests confirm:\n\n- Unknown agent IDs return an error\n- The agent's session message count is unchanged after the call (even if the LLM call itself fails due to no provider)\n\n---\n\n## Patterns and Conventions\n\n**Filesystem isolation**: Every test that boots a kernel creates a unique temp directory via `tempfile::tempdir()`. No test relies on shared state or the user's real `~/.librefang`.\n\n**Graceful skipping**: Tests involving optional hands (e.g., `apitester`) catch `\"unsatisfied requirements\"` errors and return early rather than failing in CI environments lacking the hand's dependencies.\n\n**Shutdown discipline**: Every test that boots a kernel calls `kernel.shutdown()` before the test function returns. Tests using `Arc<Kernel>` also await a short sleep after shutdown to let async tasks drain.\n\n**Regression-focused naming**: Several tests are explicitly labeled as regression guards (e.g., `test_spawn_child_exceeding_parent_is_rejected`, `test_set_agent_model_clears_overrides_when_provider_changes`) with doc comments explaining the original bug they prevent.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel Tests\n\nIntegration and end-to-end tests for the `librefang-kernel` crate. These tests exercise the full kernel pipeline — booting, agent spawning, message dispatch, hand management, WASM execution, and workflow orchestration — against both mocked and live backends.\n\n## Overview\n\nThe test suite is organized into five files by subsystem:\n\n| File | Scope | LLM Required |\n|------|-------|-------------|\n| `integration_test.rs` | Basic boot → spawn → message cycle | Yes (Groq) |\n| `multi_agent_test.rs` | Hand lifecycle, agent registry, state persistence | No (most tests) |\n| `purge_sentinels_test.rs` | `purge_sentinels` binary CLI behavior | No |\n| `wasm_agent_integration_test.rs` | WASM module loading, fuel limits, host calls | No |\n| `workflow_integration_test.rs` | Multi-step workflow registration and execution | Yes (one test) |\n\nTests that require a live LLM guard on `GROQ_API_KEY` and silently return if unset, so the full suite can be run offline without failure.\n\n```mermaid\ngraph TD\n    subgraph \"Test Files\"\n        IT[integration_test.rs]\n        MA[multi_agent_test.rs]\n        PS[purge_sentinels_test.rs]\n        WA[wasm_agent_integration_test.rs]\n        WI[workflow_integration_test.rs]\n    end\n    subgraph \"Kernel Subsystems Under Test\"\n        K[LibreFangKernel]\n        AR[Agent Registry]\n        HR[Hand Registry]\n        WE[Workflow Engine]\n        TE[Trigger Engine]\n        WV[WASM Runtime]\n    end\n    IT --> K\n    IT --> AR\n    MA --> K\n    MA --> HR\n    MA --> AR\n    MA --> TE\n    WI --> K\n    WI --> WE\n    WI --> AR\n    WI --> TE\n    WA --> K\n    WA --> WV\n    WA --> AR\n    PS --> BIN[purge_sentinels binary]\n```\n\n## Running the Tests\n\n**Offline (no API key):**\n```bash\ncargo test -p librefang-kernel\n```\nAll non-LLM tests pass. LLM-guarded tests print a skip message and return successfully.\n\n**Full E2E (requires Groq):**\n```bash\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel -- --nocapture\n```\nThe `--nocapture` flag preserves printed agent responses and fleet summaries for debugging.\n\n---\n\n## Test Files\n\n### integration_test.rs\n\nValidates the core message pipeline against the Groq API.\n\n**`test_full_pipeline_with_groq`** — Boots a kernel, spawns a single `builtin:chat` agent configured for `llama-3.3-70b-versatile`, sends a constrained prompt (\"Say hello in exactly 5 words.\"), asserts the response is non-empty and that token usage is reported, then kills the agent and shuts down.\n\n**`test_multiple_agents_different_models`** — Spawns two agents with different models (70B and 8B instant), sends each a message, and verifies both respond. Proves the kernel can route concurrent multi-model sessions.\n\nBoth tests use a shared `test_config()` helper that creates an isolated temporary directory and configures the kernel with `GROQ_API_KEY` from the environment.\n\n---\n\n### multi_agent_test.rs\n\nThe largest test file, covering **hand** (preconfigured agent template) lifecycle and the relationship between hands and agents. Most tests are pure kernel-level with no LLM needed.\n\n#### Test Configuration\n\nEach test calls `test_config(name)` with a unique name to get an isolated `KernelConfig` pointing at a fresh temp directory. The default model is configured for Groq but is only used by the final fleet test.\n\nThree hand definitions are used as test fixtures:\n\n- **`HAND_A`** (`test-clip`) — Single-agent hand with tools `file_read`, `file_write`, `shell_exec`. Uses `provider = \"default\"` to test resolution.\n- **`HAND_B`** (`test-devops`) — Single-agent hand with only `shell_exec`. Used for coexistence tests.\n- **`HAND_C`** (`test-research`) — Multi-agent hand with an explicit `coordinator = true` on the `planner` role, plus a separate `analyst` role.\n\n#### Hand Lifecycle Tests\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_activate_hand_spawns_agent` | `activate_hand` returns an instance with a valid agent ID present in the registry |\n| `test_deactivate_kills_agent` | `deactivate_hand` removes the agent from the registry |\n| `test_pause_and_resume_hand` | Pausing sets status to `\"Paused\"` without killing the agent; resuming restores `\"Active\"` |\n| `test_activate_nonexistent_hand_fails` | Returns `Err` for unknown hand IDs |\n| `test_deactivate_nonexistent_instance_fails` | Returns `Err` for random UUIDs |\n| `test_pause_nonexistent_instance_fails` | Returns `Err` |\n| `test_resume_nonexistent_instance_fails` | Returns `Err` |\n\n#### Deterministic Agent IDs\n\n**`test_deterministic_agent_id`** — When `activate_hand` is called without an explicit instance ID, the agent ID follows the legacy format `AgentId::from_hand_agent(\"test-clip\", \"main\", None)`. This ensures routing tables and trigger lookups remain stable.\n\n**`test_deterministic_id_stable_across_reactivation`** — After deactivate → reactivate, the same hand+role combination produces the same agent ID (single-instance legacy format).\n\n#### Coordinator and Multi-Agent\n\n**`test_explicit_coordinator_role_used_for_routes`** — For `HAND_C` which defines `coordinator = true` on the `planner` role, the hand instance's `agent_id()` and default routing resolve to the planner, not the first-defined agent.\n\n**`test_multi_agent_hand_state_persists_coordinator_role`** — The persisted `hand_state.json` stores the `coordinator_role` field, surviving kernel restarts.\n\n#### Metadata and Tool Inheritance\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_agent_tagged_with_hand_metadata` | Agents receive `hand:{hand_id}` and `hand_instance:{uuid}` tags |\n| `test_hand_tools_applied_to_agent` | Tools declared in the hand definition appear in the agent's `capabilities.tools` |\n| `test_system_prompt_preserved` | The hand's `system_prompt` appears verbatim in the spawned agent's manifest |\n| `test_default_provider_resolved_to_kernel_default` | `provider = \"default\"` is replaced with the actual provider from `KernelConfig` |\n\n#### State Persistence\n\n**`test_hand_state_persistence`** — After activating a hand, verifies `hand_state.json` exists with version 4 format, string-typed fields (`instance_id`, `status`, `activated_at`, `updated_at`), and an `agent_ids` map containing the correct agent ID.\n\n#### Coexistence\n\n**`test_multiple_hands_coexist`** — Two different hands activated simultaneously have distinct agent IDs, both present in the registry.\n\n**`test_deactivate_one_hand_preserves_other`** — Deactivating one hand's instance does not affect another hand's agents.\n\n#### Trigger Reactivation\n\n**`test_reactivation_restores_triggers_to_original_roles`** — After registering a trigger on the `analyst` role, deactivating and reactivating the hand preserves the trigger on the analyst and does not leak it to the planner. This validates that trigger ownership is bound to role-specific agent IDs, not to the hand instance itself.\n\n#### Live Fleet Test\n\n**`test_six_agent_fleet`** *(requires `GROQ_API_KEY`)* — Spawns six named agents (coder, researcher, writer, ops, analyst, hello-world) with distinct system prompts and tool sets, sends each a tailored message, verifies all respond, and prints a fleet summary with aggregate token usage.\n\n---\n\n### purge_sentinels_test.rs\n\nTests the `purge_sentinels` CLI binary by driving it as a subprocess via `std::process::Command`. Uses `CARGO_BIN_EXE_purge_sentinels` for binary discovery.\n\n#### Fixture\n\n`fixture_dir()` creates a temp directory with four files:\n\n- `a.md` — Contains whole-line sentinels `NO_REPLY` and `[no reply needed]` mixed with real text\n- `b.md` — Contains `NO_REPLY` embedded mid-sentence (should NOT be removed)\n- `c.md` — Clean file with no sentinels\n- `nested/d.md` — Lowercase `no_reply` with whitespace padding\n\n#### Tests\n\n| Test | Behavior |\n|------|----------|\n| `dry_run_reports_counts_and_touches_nothing` | `--dry-run` prints removal counts but leaves files and `.bak` files untouched |\n| `apply_creates_backup_and_rewrites` | `--apply` creates `.bak` with original content, rewrites file with whole-line sentinels removed, preserves mid-sentence occurrences, skips clean files |\n| `apply_is_idempotent` | Second `--apply` reports `removed=0` and leaves both files and backups unchanged |\n| `apply_aborts_when_existing_bak_differs` | If a stale `.bak` exists that doesn't match the current file, the tool exits non-zero with a \"backup mismatch\" error and preserves the stale backup |\n| `nonexistent_path_exits_non_zero` | Invalid path argument produces a clear error |\n\nKey design property: only **whole-line** sentinel matches are removed. `NO_REPLY` appearing within a sentence is preserved.\n\n---\n\n### wasm_agent_integration_test.rs\n\nTests the WASM agent execution pipeline using hand-crafted `.wat` (WebAssembly Text) modules. All tests use `tokio::test(flavor = \"multi_thread\")` because the WASM runtime requires multi-threaded tokio.\n\n#### Test Modules\n\n| Constant | Behavior |\n|----------|----------|\n| `ECHO_WAT` | Returns the input JSON as-is (pointer+length passthrough) |\n| `HELLO_WAT` | Returns a fixed `{\"response\":\"hello from wasm\"}` string from a data section |\n| `INFINITE_LOOP_WAT` | Runs an infinite `br` loop to trigger fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\nAgents are spawned with `module = \"wasm:{filename}\"` in the manifest. The kernel resolves the `.wat` file relative to the kernel's home directory.\n\n#### Tests\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_wasm_agent_hello_response` | Fixed-response module executes and returns `\"hello from wasm\"` in a single iteration |\n| `test_wasm_agent_echo` | Echo module returns the input message within its response JSON |\n| `test_wasm_agent_fuel_exhaustion` | Infinite loop terminates with a fuel-exhaustion error (not a hang) |\n| `test_wasm_agent_missing_module` | Nonexistent `.wasm` file produces a \"Failed to read\" error |\n| `test_wasm_agent_host_call_time` | Host call import `librefang.host_call` is wired and callable end-to-end |\n| `test_wasm_agent_streaming_fallback` | `send_message_streaming` on a WASM agent falls back to a single `TextDelta` + `ContentComplete` event pair |\n| `test_multiple_wasm_agents` | Two WASM agents (hello + echo) run concurrently with distinct responses; registry count is correct |\n| `test_mixed_wasm_and_llm_agents` | WASM and `builtin:chat` agents coexist in the same kernel; killing one doesn't affect the other |\n\n---\n\n### workflow_integration_test.rs\n\nTests the workflow subsystem: registration, agent resolution (by name and by ID), trigger management, and full end-to-end workflow execution.\n\n#### Kernel-Level Tests (No LLM)\n\n**`test_workflow_register_and_resolve`** — Spawns two named agents (`agent-alpha`, `agent-beta`), creates a 2-step `Workflow` with `StepAgent::ByName` references, registers it via `kernel.register_workflow()`, verifies the workflow appears in `list_workflows()`, and that `agent_registry().find_by_name()` resolves to the correct IDs. Also creates a run and verifies input preservation.\n\n**`test_workflow_agent_by_id`** — Creates a workflow whose step references an agent by string ID (`StepAgent::ById`), verifying the run can be created (actual agent resolution happens at execute time).\n\n**`test_trigger_registration_with_kernel`** — Spawns an agent, registers two triggers (`Lifecycle` and `SystemKeyword`), verifies `list_triggers(None)` returns both, `list_triggers(Some(agent_id))` filters correctly, and `remove_trigger()` works.\n\n#### End-to-End with Live LLM\n\n**`test_workflow_e2e_with_groq`** *(requires `GROQ_API_KEY`)* — Full pipeline:\n\n1. Boots kernel with Groq config, sets `self_handle`\n2. Spawns `wf-analyst` and `wf-writer` with role-specific system prompts\n3. Creates a 2-step sequential workflow: `analyze` → `summarize`\n4. Calls `kernel.run_workflow()` with input text\n5. Asserts the workflow completes, both steps recorded token usage, `step_results` has length 2 with correct step names, and the run appears in `list_runs()`\n\n---\n\n## Test Helpers and Patterns\n\n### Isolation\n\nEvery test creates an isolated temp directory via `tempfile::tempdir()` or `std::env::temp_dir().join(...)`. The kernel's `home_dir` and `data_dir` are set to this directory, so state files (`hand_state.json`, agent data) never leak between tests.\n\n### LLM Guard Pattern\n\nTests that call live LLMs follow this pattern:\n\n```rust\nif std::env::var(\"GROQ_API_KEY\").is_err() {\n    eprintln!(\"GROQ_API_KEY not set, skipping integration test\");\n    return;\n}\n```\n\nThis makes the test pass (not skip-with-error) when the key is absent, keeping CI green on offline runners.\n\n### Hand Installation\n\nThe `install_hand()` helper in `multi_agent_test.rs` calls `kernel.hands().install_from_content()` to register hand definitions from inline TOML strings, avoiding filesystem fixtures.\n\n### Agent Manifests\n\nAll tests use inline TOML strings parsed via `toml::from_str::<AgentManifest>()`. This keeps manifests co-located with the tests that use them and makes it easy to vary configuration per test case.","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nThe central orchestrator crate for the LibreFang Agent OS. This module assembles and coordinates all subsystems into a coherent kernel, providing configuration loading, state management, database access, scheduling, and the glue that binds the agent's runtime together.\n\n## Role in the Architecture\n\n`librefang-kernel` sits at the top of the dependency tree as the integration layer. It does not implement domain logic itself—instead, it wires together the following subsystems:\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across all crates |\n| `librefang-memory` | Conversation and context memory management |\n| `librefang-kernel-router` | Request/message routing within the kernel |\n| `librefang-kernel-metering` | Usage metering and quota tracking |\n| `librefang-runtime` | Task and process runtime execution |\n| `librefang-skills` | Skill definitions and lifecycle |\n| `librefang-hands` | Tool/action invocation (\"hands\") |\n| `librefang-extensions` | Extension loading and management |\n| `librefang-llm-driver` | LLM provider abstraction and driver |\n| `librefang-wire` | Wire protocol for inter-component communication |\n| `librefang-channels` | Channel management (feature-gated, no default features) |\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --> RT[librefang-runtime]\n    K --> MEM[librefang-memory]\n    K --> RTR[librefang-kernel-router]\n    K --> MET[librefang-kernel-metering]\n    K --> SK[librefang-skills]\n    K --> H[librefang-hands]\n    K --> EXT[librefang-extensions]\n    K --> LLM[librefang-llm-driver]\n    K --> W[librefang-wire]\n    K --> CH[librefang-channels]\n    K --> T[librefang-types]\n```\n\n## Key Capabilities\n\n### Configuration Loading\n\nSupports three configuration formats via `serde`, `toml`, and `serde_yaml`:\n\n- **TOML** — primary configuration format for agent settings\n- **YAML** — alternative structured configuration\n- **JSON** — programmatic or generated configurations\n\n### Persistent Storage\n\nUses `rusqlite` (SQLite) for local persistent state—conversation history, agent configuration, metering data, and sentinel records.\n\n### Concurrent State\n\n- **`dashmap`** — lock-free concurrent hash maps for hot-path state\n- **`arc-swap`** — atomic swapping of shared references for live configuration reloads\n- **`crossbeam`** — multi-producer/multi-consumer channels and concurrent primitives\n\n### Scheduling\n\nThe `cron` crate enables time-based task scheduling. Agents can register cron expressions for periodic actions (health checks, cleanup, metering rollups, etc.).\n\n### Security\n\n- **`totp-rs`** — TOTP-based two-factor authentication for agent identity verification\n- **`zeroize`** — secure clearing of sensitive data from memory (keys, tokens)\n- **`subtle`** — constant-time comparisons to prevent timing attacks\n- **`rand`** — cryptographic random number generation for nonces and tokens\n\n### HTTP Communication\n\n`reqwest` provides the HTTP client used by the kernel for outbound requests—LLM API calls, webhook delivery, and extension fetches.\n\n### Async Runtime\n\nBuilt entirely on `tokio`. All I/O, scheduling, and inter-task communication is async. The kernel manages its own tokio runtime lifecycle.\n\n### Observability\n\n`tracing` and `tracing-subscriber` provide structured logging and diagnostic spans throughout the kernel.\n\n### Time Handling\n\n`chrono` and `chrono-tz` provide timezone-aware datetime handling, used for scheduling, metering windows, and audit timestamps.\n\n## Binaries\n\n### `purge_sentinels`\n\nLocated at `bin/purge_sentinels.rs`. A standalone utility that cleans up stale sentinel records from the kernel's SQLite database. Run via:\n\n```bash\ncargo run --bin purge_sentinels\n```\n\nThis is intended for scheduled or manual maintenance of the agent's local database.\n\n## Platform Notes\n\nOn Unix targets, the crate links against `libc` (version `0.2`) for low-level system interactions—file descriptor management, signal handling, or process control.\n\n## Development\n\nTests use `tokio-test` for async test utilities and `tempfile` for temporary directory/file fixtures when testing database or configuration loading code.\n\n## Dependency Checklist for Contributors\n\nWhen adding a new subsystem to the kernel:\n\n1. Add the crate dependency in `Cargo.toml`\n2. Ensure the subsystem's types are represented in `librefang-types` if shared\n3. Route messages through `librefang-kernel-router` if the subsystem produces/consumes kernel events\n4. Register any periodic tasks with the cron scheduler\n5. Add metering hooks via `librefang-kernel-metering` if the subsystem consumes billable resources","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nAbstraction layer for LLM (Large Language Model) integrations in LibreFang. This crate defines the core `LlmDriver` trait and shared types that concrete LLM implementations must satisfy.\n\n## Purpose\n\nLibreFang needs to interact with language models for various tasks. Rather than coupling the codebase to a single LLM provider, this module provides a trait-based abstraction. Any LLM backend—OpenAI, local models, custom endpoints—can be integrated by implementing the driver trait defined here.\n\nThis crate **does not** contain any LLM implementations itself. It solely defines the contract.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[librefang-llm-driver]\n    B --> C[Concrete LLM Driver A]\n    B --> D[Concrete LLM Driver B]\n    C --> E[Application Code]\n    D --> E\n```\n\nThe application depends on the trait from this crate and injects a concrete driver at runtime.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared domain types used across LibreFang crates |\n| `async-trait` | Enables async methods in trait definitions |\n| `serde` / `serde_json` | Serialization of request/response types |\n| `thiserror` | Ergonomic error type definitions |\n| `tokio` | Async runtime primitives |\n\n## Implementing a New LLM Driver\n\nTo add support for a new LLM provider:\n\n1. Create a new crate (or module) that depends on `librefang-llm-driver`.\n2. Implement the `LlmDriver` trait for a struct representing your provider's client.\n3. Ensure your implementation handles serialization, error mapping, and any provider-specific authentication or configuration.\n\nAll request and response types should derive `Serialize` and `Deserialize` where applicable, as this crate relies on `serde` for structured data interchange.\n\n## Error Handling\n\nError types in this crate use `thiserror`, providing structured, ergonomic error variants. Implementations should map provider-specific errors into the error types defined here to maintain a uniform interface for consumers.\n\n## Relationship to Other Crates\n\n- **Depends on** `librefang-types` — reuses shared domain types rather than redefining them.\n- **Consumed by** concrete LLM driver implementations and application-level code that needs a generic LLM interface.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait. Each driver encapsulates the wire protocol, authentication scheme, and response parsing for a specific LLM provider API.\n\n## Purpose\n\nThis crate is the bridge between LibreFang's provider-agnostic LLM abstraction and the real-world APIs offered by Anthropic, OpenAI, Google Gemini, and others. It contains no business logic of its own — each driver is a thin translation layer that:\n\n1. Converts `librefang-types` request models into provider-specific HTTP payloads.\n2. Handles provider-specific authentication (API keys, OAuth tokens, HMAC-signed requests).\n3. Sends requests via `librefang-http` and parses responses (including SSE streaming) back into `librefang-types` response models.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver<br>trait definition] --> B[librefang-llm-drivers<br>concrete implementations]\n    B --> C[Anthropic Driver]\n    B --> D[OpenAI Driver]\n    B --> E[Gemini Driver]\n    B --> F[Other Providers]\n    B --> G[librefang-http<br>HTTP client layer]\n    B --> H[librefang-types<br>shared request/response types]\n    E --> I[librefang-runtime-oauth<br>OAuth token management]\n```\n\nDownstream consumers depend only on `librefang-llm-driver` (the trait) and never on this crate directly — they receive a concrete driver via dependency injection or a factory function.\n\n## Dependency Rationale\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-llm-driver` | Provides the trait each driver implements (`LlmDriver` or similar). |\n| `librefang-types` | Shared request/response/message types that drivers translate to/from. |\n| `librefang-http` | HTTP client abstraction; drivers don't use `reqwest` directly for outbound calls. |\n| `librefang-runtime-oauth` | OAuth2 token acquisition and refresh for providers that require it (e.g., Gemini). |\n| `reqwest` | Low-level HTTP client, used indirectly through `librefang-http` or for raw streaming. |\n| `tokio` / `tokio-stream` | Async runtime and stream utilities for handling SSE/chunked responses. |\n| `serde` / `serde_json` | Serializing provider-specific request bodies and deserializing responses. |\n| `sha2` / `hmac` / `hex` | Cryptographic request signing for providers that use SigV4-style auth (e.g., AWS Bedrock). |\n| `base64` | Encoding binary content or auth headers. |\n| `dashmap` | Concurrent map for caching tokens, session state, or connection pools across async tasks. |\n| `zeroize` | Securely clearing API keys and secrets from memory after use. |\n| `regex-lite` | Pattern matching on streaming response chunks (e.g., extracting SSE data frames). |\n| `url` | Constructing and validating provider endpoint URLs. |\n| `tracing` | Structured logging of request/response lifecycle events. |\n| `thiserror` | Deriving provider-specific error types. |\n\n## Supported Providers\n\nBased on the crate description and dependency profile:\n\n- **Anthropic** — Messages API with `x-api-key` header authentication.\n- **OpenAI** — Chat Completions API with Bearer token authentication.\n- **Gemini** — Google's Generative AI API, likely using OAuth2 via `librefang-runtime-oauth`.\n- **AWS Bedrock** (or similar HMAC-signed provider) — Inferred from the `sha2`/`hmac` dependencies, indicating SigV4-style request signing.\n\n## Key Design Patterns\n\n### Trait Implementation\n\nEvery driver implements the trait defined in `librefang-llm-driver`, normalizing provider differences behind a uniform async interface. Consumers call the same methods regardless of which provider is active.\n\n### Streaming Support\n\nThe `tokio-stream` and `futures` dependencies indicate that drivers support streaming responses. Providers use SSE (Server-Sent Events) or chunked transfer encoding, and drivers parse these incremental chunks into `librefang-types` stream items using `regex-lite` for frame extraction.\n\n### Secure Credential Handling\n\nAPI keys and tokens are held in types that use `zeroize` to clear sensitive data from memory when dropped. This is a defense-in-depth measure against memory-scraping attacks.\n\n### Error Translation\n\nEach driver maps provider-specific error responses (rate limits, auth failures, context-length errors) into a common error type, typically defined in or re-exported from `librefang-llm-driver`. This uses `thiserror` for ergonomic error construction.\n\n## Relationship to Other Crates\n\n```\nlibrefang-types          ← shared data structures\nlibrefang-llm-driver     ← trait definition (no implementations)\nlibrefang-llm-drivers    ← you are here (concrete trait impls)\nlibrefang-http           ← HTTP client abstraction\nlibrefang-runtime-oauth  ← OAuth token lifecycle\n```\n\nThis crate sits in the middle of the stack: it depends on the trait, types, HTTP, and OAuth crates, and is itself depended on by higher-level orchestration code that selects and configures a driver at runtime.\n\n## Adding a New Provider\n\nTo add support for a new LLM provider:\n\n1. Create a new module within this crate (e.g., `src/new_provider.rs` or `src/new_provider/`).\n2. Define a struct holding configuration (API key, base URL, model defaults).\n3. Implement the `librefang-llm-driver` trait, translating requests to the provider's wire format and responses back to `librefang-types`.\n4. If the provider uses OAuth, integrate with `librefang-runtime-oauth`.\n5. If the provider requires request signing, use the `hmac`/`sha2` crates following the pattern established by existing signed-request drivers.\n6. Handle streaming if the provider supports it, using `tokio-stream` and SSE parsing.\n7. Register the driver in whatever factory/discovery mechanism this crate exposes.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests: Chat-Scoped Canonical Context Integration Tests\n\n## Purpose\n\nThis module contains **integration regression tests** that guard against a cross-session data leak in the canonical memory subsystem. The bug it prevents: when a single agent served both a WhatsApp DM and a WhatsApp group, messages from one chat could appear in the LLM prompt context of the other. The fix lives in `session.rs`, where every `CanonicalEntry` is tagged with the originating `SessionId` and filtered at read time.\n\nThese tests exercise the full **append → load → context roundtrip** through the crate's public API — the same path the kernel calls on every inbound message — so any regression in session tagging or filtering is caught immediately.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[setup] -->|in-memory SQLite| B[run_migrations]\n    A -->|wraps conn| C[SessionStore::new]\n\n    D[canonical_context_isolates_two_whatsapp_chats_for_same_agent] --> A\n    D -->|SessionId::for_channel| E[session_dm / session_group]\n    D -->|append_canonical| C\n    D -->|canonical_context| C\n\n    F[canonical_context_unfiltered_returns_all_for_backward_compat] --> A\n    F -->|append_canonical| C\n    F -->|canonical_context agent None| C\n```\n\n## Test Fixtures\n\n### `setup() → SessionStore`\n\nCreates a fully-initialized `SessionStore` backed by an in-memory SQLite database. This mirrors the production initialization path without touching the filesystem:\n\n1. Opens an in-memory `rusqlite::Connection`.\n2. Calls `run_migrations(&conn)` to establish the schema.\n3. Wraps the connection in `Arc<Mutex<Connection>>` and returns `SessionStore::new(...)`.\n\nEvery test calls `setup()` independently, so tests share no state and can run in parallel.\n\n### `user_msg(text: &str) → Message`\n\nConvenience helper that constructs a `Message` with `Role::User`, the given text as `MessageContent::Text`, and `pinned: false`. Used to quickly create test payloads without boilerplate.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it verifies:** Messages appended under one session never appear when loading context for a different session, even when both sessions belong to the same agent.\n\n**How it works:**\n\n1. Derives two distinct `SessionId` values via `SessionId::for_channel`:\n   - `session_dm` — from `\"whatsapp:393331111111@s.whatsapp.net\"` (a private DM)\n   - `session_group` — from `\"whatsapp:120363111111111111@g.us\"` (a group chat)\n2. Asserts the two IDs differ (`assert_ne!`).\n3. Appends three messages in interleaved order:\n   - `\"dm-1\"` → `session_dm`\n   - `\"group-1\"` → `session_group`\n   - `\"dm-2\"` → `session_dm`\n4. Calls `canonical_context(agent, Some(session_dm), None)` and asserts only `[\"dm-1\", \"dm-2\"]` are returned.\n5. Calls `canonical_context(agent, Some(session_group), None)` and asserts only `[\"group-1\"]` is returned.\n\nThis ordering is intentional: the group message arrives chronologically *between* the two DM messages, so a broken filter that ignored session scope would surface `group-1` in the DM context.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it verifies:** Passing `session_id = None` to `canonical_context` returns messages across all sessions, preserving the original cross-channel semantics for callers that haven't adopted per-session filtering.\n\n**How it works:**\n\n1. Creates two sessions on different platforms (WhatsApp and Telegram) under the same agent.\n2. Appends one message per session.\n3. Calls `canonical_context(agent, None, None)` and asserts both messages appear in order.\n\n## Dependencies on Other Crates\n\n| Crate | Usage |\n|---|---|\n| `librefang-memory` | `SessionStore`, `run_migrations` — the system under test |\n| `librefang-types` | `AgentId`, `SessionId`, `Message`, `Role`, `MessageContent` — shared domain types |\n| `rusqlite` | `Connection::open_in_memory` — lightweight database for test isolation |\n\n## Running the Tests\n\n```sh\n# From the workspace root\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# With output visible\ncargo test -p librefang-memory --test canonical_chat_scoped_integration -- --nocapture\n```\n\nBoth tests run against an in-memory database and require no external services.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Purpose\n\n`librefang-memory` provides the persistence and retrieval layer that underpins the agent's ability to store, query, and recall information across sessions. It abstracts the details of durable storage behind a substrate that the rest of the agent OS can rely on for any state that needs to outlive a single request or process lifecycle.\n\n## Role in the Architecture\n\nThis crate sits below the agent logic and above the raw storage engine. Other modules in LibreFang consume the memory substrate when they need to persist conversation history, task state, configuration snapshots, or any derived data that should survive restarts.\n\n```\n┌─────────────────────────┐\n│   Agent Logic / Core    │\n├─────────────────────────┤\n│   librefang-memory      │  ← this crate\n├─────────────────────────┤\n│   librefang-types       │\n├─────────────────────────┤\n│   SQLite (rusqlite)     │\n└─────────────────────────┘\n```\n\n## Key Dependencies and What They Enable\n\n| Dependency | Role in this crate |\n|---|---|\n| `rusqlite` | Primary storage backend. SQLite provides an embedded, transactional database without external service dependencies, making it suitable for single-node agent deployments. |\n| `serde` / `serde_json` / `rmp-serde` | Serialization of structured memory entries. JSON supports human-readable inspection and debugging; MessagePack (`rmp-serde`) provides compact binary encoding for larger or more performance-sensitive payloads. |\n| `sha2` | Content-addressable hashing. Likely used to fingerprint memory entries for deduplication or integrity verification. |\n| `uuid` | Unique identification of memory records, ensuring globally unique references even across distributed instances. |\n| `chrono` | Timestamping of memory entries for temporal queries and ordering. |\n| `tokio` / `async-trait` | Async runtime integration. The memory substrate exposes async interfaces so that I/O-bound storage operations do not block the agent's task scheduler. |\n| `reqwest` | HTTP client, likely used for remote memory backends or synchronization with external services. |\n| `tracing` | Structured logging and diagnostics for storage operations. |\n| `thiserror` | Ergonomic error type definitions for substrate-specific failures. |\n\n## Design Expectations\n\n### Storage Model\n\nThe substrate is built on SQLite via `rusqlite`, indicating a local, file-based persistence model. This choice avoids the operational overhead of running a separate database server while still providing ACID guarantees for memory records.\n\n### Serialization Strategy\n\nThe presence of both `serde_json` and `rmp-serde` suggests that the module supports multiple encoding formats. A typical pattern would be:\n\n- **JSON** for entries that benefit from human readability and tooling compatibility (configuration, metadata).\n- **MessagePack** for high-volume or binary-heavy data where storage size and serialization speed matter.\n\n### Content Addressing\n\nThe `sha2` dependency points to content-addressable storage patterns. Memory entries are likely hashed so that identical content maps to the same identifier, enabling deduplication and integrity checks on retrieval.\n\n### Async Interface\n\n`async-trait` combined with `tokio` indicates that the substrate defines async trait bounds for its storage operations. This allows consumers to `await` reads and writes without blocking, and makes it possible to swap backends (local SQLite vs. remote HTTP) behind a common interface.\n\n## Relationship to `librefang-types`\n\nThis crate depends on `librefang-types` for shared data structures. Memory entries, error types, and configuration shapes are defined in the types crate, keeping this module focused on storage mechanics rather than domain modeling.\n\n## Testing\n\nDev-dependencies include `tokio-test` for async test harnessing and `tempfile` for creating ephemeral SQLite databases during tests. This allows tests to spin up a full substrate backed by a temporary file, exercise it, and clean up without side effects.\n\n## Integration Points\n\nOther LibreFang modules import `librefang-memory` when they need to:\n\n- **Persist state** that must survive process restarts.\n- **Recall prior context** to maintain continuity across agent interactions.\n- **Query historical data** for reporting, debugging, or decision-making.\n\nThe substrate hides whether data lives locally in SQLite or is fetched over HTTP via `reqwest`, presenting a uniform async interface to consumers.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations and data from other agent frameworks into LibreFang.\n\n## Overview\n\n`librefang-migrate` provides tooling to convert projects, agent definitions, and configurations authored in other agent frameworks so they can be used within the LibreFang ecosystem. It handles format detection, parsing, schema translation, and output of LibreFang-native types.\n\n## Supported Input Formats\n\nThe crate pulls in parsers for four configuration formats, allowing it to ingest definitions from a wide range of existing tools:\n\n| Format | Dependency | Common Use |\n|---|---|---|\n| JSON | `serde_json` | Most agent frameworks |\n| YAML | `serde_yaml` | Common in declarative agent configs |\n| JSON5 | `json5` | Human-friendly JSON with comments |\n| TOML | `toml` | Rust-ecosystem configurations |\n\n## Key Dependencies and Their Roles\n\n- **`librefang-types`** — Target types. Migrated data is ultimately expressed using the shared type definitions from this crate.\n- **`walkdir`** — Recursive directory traversal for discovering configuration files in a source project.\n- **`uuid`** / **`chrono`** — Generating new identifiers and timestamps during migration, ensuring imported entities receive fresh, non-colliding metadata.\n- **`thiserror`** — Typed error definitions for migration failures (parse errors, schema mismatches, I/O errors).\n- **`tracing`** — Structured logging of migration progress and warnings.\n- **`dirs`** — Resolving standard system directories when locating default input or output paths.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Source Project Files] --> B[Directory Walker]\n    B --> C[Format Detection]\n    C --> D[Parser]\n    D --> E[Schema Translation]\n    E --> F[librefang-types Output]\n```\n\nThe migration pipeline discovers files via `walkdir`, detects the appropriate parser based on file extension or content, deserializes into intermediate representations, translates those into `librefang-types`, and emits the result.\n\n## Error Handling\n\nAll migration errors are defined using `thiserror` derive macros. Expect error variants covering:\n\n- File I/O failures during directory traversal\n- Parse failures across any of the four supported formats\n- Schema translation failures when source structures don't map cleanly to LibreFang types\n\nCallers should handle these via `Result<T, MigrationError>` (or the crate's concrete error type).\n\n## Testing\n\nThe `tempfile` dev-dependency indicates that tests create temporary directories to exercise the directory-walking and file-discovery logic in isolation. When contributing new importers, use `tempfile` to scaffold a fake source project structure rather than relying on fixture files in the repository.\n\n## Integration with LibreFang\n\nThis crate is a utility tool. Other LibreFang crates do not depend on it at runtime. Instead, it is invoked as a build-time or one-time CLI step to bootstrap a LibreFang project from an existing agent codebase. The only coupling is through `librefang-types`, which defines the output contract.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This crate provides the integration layer between the LibreFang system and MCP-compatible servers, enabling tool discovery, invocation, and resource management through the standardized MCP protocol.\n\n## Purpose\n\nThe Model Context Protocol defines a standard for how AI systems interact with external tools and data sources. This module acts as the client side of that protocol within LibreFang — it connects to MCP servers, discovers their capabilities, and facilitates communication between the LibreFang runtime and those servers.\n\n## Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation — handles message framing, handshake, and protocol-level logic |\n| `librefang-types` | Shared type definitions used across the LibreFang workspace |\n| `librefang-http` | HTTP transport layer, reused from the broader LibreFang HTTP infrastructure |\n| `reqwest` | Underlying HTTP client used to communicate with MCP server endpoints |\n| `http` | Low-level HTTP types (request/response headers, status codes) |\n| `serde` / `serde_json` | Serialization of MCP messages and server responses |\n| `tokio` | Async runtime for non-blocking I/O |\n| `tracing` | Structured logging and diagnostic spans for MCP operations |\n| `async-trait` | Async trait definitions for MCP client abstractions |\n| `sha2`, `base64` | Likely used for session token generation, payload verification, or authentication headers |\n| `url` | Parsing and constructing MCP server URLs |\n| `rand` | Random value generation for nonce or session identifiers |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Runtime] --> B[librefang-runtime-mcp]\n    B --> C[rmcp - Protocol Layer]\n    B --> D[librefang-http - Transport]\n    D --> E[reqwest]\n    B --> F[librefang-types]\n    C --> G[MCP Server]\n    E --> G\n```\n\nThe module sits between the LibreFang runtime and remote MCP servers. Protocol semantics (handshakes, capability negotiation, message schemas) are delegated to `rmcp`, while transport concerns flow through `librefang-http` down to `reqwest`.\n\n## Integration with the Workspace\n\nThis crate is one of potentially multiple runtime modules in the LibreFang workspace. It depends on:\n\n- **`librefang-types`** for any shared data structures passed between the MCP client and other parts of the system.\n- **`librefang-http`** to reuse existing HTTP client configuration (connection pooling, TLS settings, proxy support, etc.) rather than constructing its own.\n\nNo other workspace crates currently declare a dependency on `librefang-runtime-mcp`, which means it is either invoked directly by a top-level binary crate or dynamically loaded based on runtime configuration.\n\n## Key Concerns\n\n**Transport:** Communication with MCP servers happens over HTTP. The module relies on the workspace `reqwest` configuration, so any global TLS backend or proxy settings apply automatically.\n\n**Protocol Compliance:** The `rmcp` crate handles the bulk of MCP protocol mechanics. This module wraps that functionality in LibreFang-specific types and error handling.\n\n**Security:** The presence of `sha2` and `base64` suggests message integrity or authentication concerns — likely for verifying server responses or constructing signed requests. The `rand` crate supports generating unique identifiers for request correlation.\n\n## Building and Testing\n\nFrom the workspace root:\n\n```bash\n# Build this crate only\ncargo build -p librefang-runtime-mcp\n\n# Run tests\ncargo test -p librefang-runtime-mcp\n```\n\nEnsure that any MCP servers required for integration tests are available or mocked appropriately.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication flows for LibreFang runtime drivers, providing token acquisition and refresh for third-party AI services (ChatGPT, GitHub Copilot).\n\n## Overview\n\nThis crate implements the OAuth 2.0 flows required by runtime drivers that connect to external AI providers. Rather than each driver implementing its own authentication logic, `librefang-runtime-oauth` centralizes the OAuth lifecycle — authorization URL generation, PKCE challenge creation, token exchange, and refresh — into reusable components.\n\nThe module targets two primary providers:\n\n- **ChatGPT (OpenAI)** — OAuth flow for authenticating against OpenAI's API\n- **GitHub Copilot** — OAuth flow using GitHub's device authorization or web application flow\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests token| B[librefang-runtime-oauth]\n    B -->|HTTP calls| C[librefang-http]\n    B -->|types & error defs| D[librefang-types]\n    B -->|token exchange| E[OAuth Provider]\n    E -->|access + refresh tokens| B\n    B -->|token| A\n```\n\n## Key Capabilities\n\nThe dependency selection reveals the module's core responsibilities:\n\n### PKCE-Based Authorization\n\nThe inclusion of `sha2`, `base64`, `rand`, and `hex` indicates implementation of **Proof Key for Code Exchange (PKCE)**. PKCE protects against authorization code interception attacks by requiring the client to prove possession of the original authorization request when exchanging the code for a token.\n\nThe flow involves:\n\n1. Generating a cryptographically random code verifier (`rand`)\n2. Computing a SHA-256 hash of the verifier (`sha2`)\n3. Base64url-encoding the hash to produce the code challenge (`base64`)\n4. Sending the challenge during authorization, then the verifier during token exchange\n\n### Secure Token Storage\n\nThe `zeroize` dependency ensures that sensitive OAuth credentials — access tokens, refresh tokens, and code verifiers — are securely erased from memory when no longer needed. This prevents credentials from lingering in process memory after use.\n\n### Token Refresh Management\n\nOnce an initial token is obtained, the module handles refresh automatically. Drivers receive a valid token without needing to track expiration or initiate refresh themselves.\n\n## Dependencies Explained\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared types — token structures, OAuth configuration, error enums |\n| `librefang-http` | HTTP client abstraction for outbound requests to OAuth endpoints |\n| `reqwest` | Underlying HTTP client used for token exchange and refresh calls |\n| `tokio` | Async runtime for non-blocking OAuth operations |\n| `serde` / `serde_json` | Serialization of OAuth request/response bodies (JSON) |\n| `thiserror` | Typed error definitions for OAuth-specific failure modes |\n| `tracing` | Structured logging of OAuth flow progress for debugging |\n| `base64` / `sha2` / `rand` / `hex` | PKCE challenge generation and cryptographic operations |\n| `zeroize` | Secure memory cleanup for credentials |\n\n## Integration Points\n\n### Consumers\n\nRuntime drivers in the LibreFang workspace consume this crate to authenticate before making API calls to their respective providers. A driver typically:\n\n1. Calls into this module at startup or when a token expires\n2. Receives an access token (and optionally caches a refresh token)\n3. Attaches the token to outbound API requests\n\n### Providers\n\nThe module depends on:\n\n- **`librefang-types`** for configuration structs (client IDs, redirect URIs, scopes) and token representation types\n- **`librefang-http`** for outbound HTTP communication with OAuth token endpoints\n\n## Security Considerations\n\n- **No credential logging**: The `tracing` integration should log flow progress (e.g., \"starting OAuth flow\", \"token refreshed\") without ever logging actual token values.\n- **PKCE enforcement**: All authorization flows use PKCE to mitigate code interception attacks, even for confidential clients.\n- **Memory hygiene**: All intermediate secrets — code verifiers, tokens, client secrets — use `zeroize`-compatible types to ensure timely memory cleanup.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# MCP OAuth Integration Tests\n\nIntegration test suite validating OAuth discovery, token lifecycle management, and the `McpAuthState` state machine used by the MCP (Model Context Protocol) connection layer.\n\n## Purpose\n\nThis test module guards against regressions in three critical areas:\n\n1. **OAuth metadata discovery** — ensuring fallback behavior when a server doesn't support well-known discovery endpoints.\n2. **OAuth provider wiring** — catching bugs where an `oauth_provider: None` silently disables the entire OAuth flow during MCP connection attempts.\n3. **Token lifecycle** — verifying store, load, clear, isolation, and re-authorization behavior through in-memory mock implementations.\n4. **Auth state machine** — confirming that serialization of `McpAuthState` variants produces distinct values, preventing UI bugs in the dashboard.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[discover_oauth_metadata] -->|fallback| B[McpOAuthConfig]\n    C[McpConnection::connect] -->|401 response| D[McpOAuthProvider::load_token]\n    E[InMemoryOAuthProvider] -->|store_tokens| F[HashMap per server URL]\n    E -->|load_token| F\n    E -->|clear_tokens| F\n    G[McpAuthState] -->|serializes to JSON| H[state: needs_auth / pending_auth / authorized]\n```\n\n## Test Categories\n\n### OAuth Metadata Discovery\n\nTwo tests exercise `discover_oauth_metadata` from the `mcp_oauth` module:\n\n| Test | Behavior |\n|------|----------|\n| `test_discover_fallback_to_config` | When the well-known endpoint is unreachable, falls back to values from `McpOAuthConfig` (`auth_url`, `token_url`, `client_id`). |\n| `test_discover_fails_without_any_source` | Returns an error containing `\"OAuth metadata\"` when neither discovery nor config provides endpoint information. |\n\nThe fallback test targets a non-resolvable hostname (`nonexistent.example.com`) to guarantee the HTTP discovery attempt fails, forcing the config path.\n\n### OAuth Provider Wiring (Regression Test)\n\n`test_http_connect_calls_oauth_provider_load_token` — a regression test for a specific bug where `oauth_provider: None` was passed during `connect_mcp_servers` in the kernel, silently disabling OAuth. The test:\n\n1. Creates a `TrackingOAuthProvider` whose `load_token` sets an `AtomicBool` and returns `None` (no cached token).\n2. Constructs an `McpServerConfig` with `McpTransport::Http` pointing at `127.0.0.1:1` (guaranteed connection refused).\n3. Calls `McpConnection::connect(config)`.\n4. Asserts the connection fails (expected).\n5. **Critically**, asserts that `load_token_called` is `true` — proving the provider was invoked during the 401 error path.\n\nIf this test fails with *\"OAuth provider's load_token was never called\"*, the `oauth_provider` field is likely `None` somewhere in the connection wiring.\n\n### Token Lifecycle Tests\n\nThese use `InMemoryOAuthProvider`, a mock `McpOAuthProvider` backed by a `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`.\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_provider_store_then_load` | `store_tokens` followed by `load_token` returns the stored `access_token`. An empty provider returns `None`. |\n| `test_provider_clear_removes_token` | `clear_tokens` deletes the token; subsequent `load_token` returns `None`. |\n| `test_provider_clear_is_isolated` | Clearing tokens for one server URL does not affect tokens stored for a different URL. |\n| `test_provider_reauthorize_after_clear` | After clearing (revoking), a new token can be stored and loaded — validates the store → clear → store cycle. |\n\n### Auth State Machine\n\nSynchronous tests exercising `McpAuthState` serialization via `serde_json`:\n\n| Test | Purpose |\n|------|---------|\n| `test_auth_state_lifecycle` | Full cycle: `NeedsAuth` → `PendingAuth` → `Authorized` → `NeedsAuth` (after revoke). Ensures revoke produces `needs_auth`, not a missing state — the dashboard needs this to show the \"Authorize\" button. |\n| `test_needs_auth_serializes_differently_from_pending_auth` | Regression for a dashboard bug where \"Authorizing...\" appeared at boot. Confirms `needs_auth` and `pending_auth` produce distinct `\"state\"` values in JSON. |\n\n## Mock Providers\n\n### TrackingOAuthProvider\n\nRecords whether `load_token` was invoked. Returns `None` for `load_token` (forcing the connection to fail). Used only in the wiring regression test.\n\n### InMemoryOAuthProvider\n\nFull in-memory implementation of `McpOAuthProvider` using a `HashMap` keyed by server URL. Thread-safe via `tokio::sync::Mutex`. Used in all token lifecycle tests to avoid vault or filesystem dependencies.\n\nBoth implement the `McpOAuthProvider` trait from `librefang_runtime::mcp_oauth`:\n\n```rust\n#[async_trait]\nimpl McpOAuthProvider for TrackingOAuthProvider { ... }\n\n#[async_trait]\nimpl McpOAuthProvider for InMemoryOAuthProvider { ... }\n```\n\n## Dependencies on Production Code\n\n| Import | Module | Usage |\n|--------|--------|-------|\n| `discover_oauth_metadata` | `librefang_runtime::mcp_oauth` | Metadata discovery with config fallback |\n| `McpConnection::connect` | `librefang_runtime::mcp` | Connection attempt that triggers OAuth provider |\n| `McpServerConfig`, `McpTransport` | `librefang_runtime::mcp` | Configuration for test connections |\n| `McpAuthState`, `OAuthTokens`, `McpOAuthProvider` | `librefang_runtime::mcp_oauth` | Types under test |\n| `McpOAuthConfig` | `librefang_types::config` | Static OAuth configuration fallback |\n\n## Running\n\n```bash\n# All tests in this file\ncargo test -p librefang-runtime --test mcp_oauth_integration\n\n# Only async token tests\ncargo test -p librefang-runtime --test mcp_oauth_integration test_provider\n\n# Only auth state machine tests (synchronous)\ncargo test -p librefang-runtime --test mcp_oauth_integration test_auth_state\n```","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime. This module provides a secure, sandboxed execution environment for game skills compiled to WebAssembly, using [wasmtime](https://wasmtime.dev/) as the runtime engine.\n\n## Purpose\n\nLibreFang skills are user-defined behaviors that execute within the game world. Rather than running them as native code with full system access, this module compiles and instantiates them as WASM modules, providing:\n\n- **Memory isolation** — each skill operates within its own WASM linear memory\n- **Capability control** — skills can only call host functions explicitly exposed by the runtime\n- **Deterministic execution** — WASM provides a deterministic computation model suitable for game logic\n- **Language agnosticism** — skills can be authored in any language that compiles to WASM (Rust, C, AssemblyScript, etc.)\n\n## Architecture\n\nThe runtime bridges the game kernel and guest skill code. Skills are compiled to `.wasm` files and loaded by this module, which mediates all interaction between the guest and the host system.\n\n```mermaid\ngraph TD\n    A[.wasm Skill Module] -->|loaded by| B[librefang-runtime-wasm]\n    B -->|exposes host functions| A\n    B -->|delegates via| C[librefang-kernel-handle]\n    B -->|HTTP through| D[librefang-http]\n    C -->|uses types from| E[librefang-types]\n    B -->|uses types from| E\n```\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `wasmtime` | Compiles and executes WASM modules. Provides the store, linker, and instance machinery. |\n| `librefang-kernel-handle` | The host-side interface through which skills interact with the game kernel. Host functions exposed to WASM guests delegate to this handle. |\n| `librefang-http` | Enables skills to make outbound HTTP requests (e.g., calling external services or APIs). |\n| `librefang-types` | Shared type definitions for game state, skill payloads, and inter-module communication. |\n| `tokio` | All WASM instantiation and host function calls run on the Tokio async runtime. |\n| `serde` / `serde_json` | Serializes and deserializes data passed between host and guest across the WASM boundary. |\n\n## Host-Guest Communication Pattern\n\nData crosses the WASM boundary through a combination of host functions and shared memory:\n\n1. **Host functions** — The runtime registers callable functions with the wasmtime `Linker`. Guest code invokes these to request kernel operations or HTTP calls. Arguments and return values are serialized to JSON and passed as pointers into linear memory.\n\n2. **Linear memory** — For larger payloads, the host writes data into the guest's exported memory, and the guest reads it. This avoids copying overhead for substantial game state snapshots.\n\n## Error Handling\n\nThe module uses `anyhow` for general runtime errors (WASM compilation failures, instantiation errors) and `thiserror` for typed error variants when surfacing specific failure modes to callers. All errors are instrumented through `tracing` spans for observability.\n\n## Integration Points\n\nThis module sits between the kernel and the skill layer. Other parts of LibreFang should not instantiate skills directly — they route through the kernel, which delegates to this runtime module. The module has no direct incoming or outgoing module calls at the code level because it is consumed as a library by the kernel orchestration layer, not invoked through a shared call graph.\n\n## Future Considerations\n\n- **WASI support** — If skills need filesystem or clock access, WASI capabilities can be layered through wasmtime's existing WASI integration.\n- **Fuel metering** — wasmtime supports fuel-based execution limits to prevent runaway skill computation.\n- **Caching** — Compiled WASM modules can be cached to avoid recompilation on every skill load.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate is the orchestration layer that ties together LLM drivers, skill execution, memory, communication channels, and sandboxing into a coherent agent lifecycle.\n\n## Purpose\n\nLibreFang agents need a coordinated environment to: receive instructions, invoke LLMs, execute skills (including untrusted WASM code), persist conversation memory, communicate over channels, and do all of this safely under sandboxing. `librefang-runtime` is that coordination layer.\n\nIt does not implement most subsystems itself. Instead it re-exports and orchestrates the following sibling crates:\n\n| Dependency | Role |\n|---|---|\n| `librefang-runtime-wasm` | WASM-based skill execution engine |\n| `librefang-runtime-mcp` | Model Context Protocol client/server |\n| `librefang-runtime-oauth` | OAuth flow handling for external services |\n| `librefang-llm-driver` | LLM driver trait abstraction |\n| `librefang-llm-drivers` | Concrete LLM driver implementations |\n| `librefang-skills` | Skill definitions and registry |\n| `librefang-memory` | Conversation and agent memory persistence |\n| `librefang-channels` | Inter-agent and external communication |\n| `librefang-http` | HTTP request/response utilities |\n| `librefang-kernel-handle` | Low-level kernel interface |\n| `librefang-types` | Shared type definitions |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Entry Point] --> R[Runtime Orchestrator]\n    R --> LLM[LLM Drivers]\n    R --> SK[Skill Execution]\n    R --> MEM[Memory Store]\n    R --> CH[Channels]\n    SK --> WASM[WASM Sandbox]\n    SK --> MCP[MCP Protocol]\n    R --> OAUTH[OAuth Provider]\n    WASM --> LANDLOCK[\"Landlock / seccomp\"]\n```\n\n## Key Subsystems\n\n### LLM Integration\n\nUses `librefang-llm-driver` for the trait abstraction and `librefang-llm-drivers` for concrete implementations. The runtime manages driver selection, request construction, streaming response handling (`tokio-stream`, `futures`), and retry/error logic.\n\n### Skill Execution\n\nSkills from `librefang-skills` are dispatched through the runtime. Skills that require sandboxed execution are routed to `librefang-runtime-wasm`, which uses **Wasmtime** as the WASM engine.\n\n### Sandboxing\n\nTwo Linux-native sandboxing mechanisms are available behind feature flags:\n\n- **`landlock-sandbox`** — Enables [`landlock`](https://docs.rs/landlock) filesystem and capability restrictions. Requires Linux 5.13+.\n- **`seccomp-sandbox`** — Enables [`seccompiler`](https://docs.rs/seccompiler) BPF syscall filtering.\n\nBoth are optional and compile only when explicitly enabled. The WASM runtime (Wasmtime) provides its own isolation regardless of these flags.\n\n### Memory\n\nConversation history and agent state are persisted via `librefang-memory`, backed by **SQLite** (`rusqlite`) and cached in-memory with **DashMap** for concurrent access.\n\n### Communication\n\n`librefang-channels` handles message routing between agents and external systems. The runtime also depends on `tokio-tungstenite` and `rustls` for WebSocket-based communication with TLS.\n\n### Cryptography and Identity\n\nAgent identity and request signing use **Ed25519** (`ed25519-dalek`). HMAC-SHA256 (`hmac` + `sha2`) is available for token derivation and integrity checks. Secrets are zeroized on drop via the `zeroize` crate.\n\n### Package Management\n\nThe runtime can fetch and extract skill packages over HTTP, with `flate2` and `tar` for decompression and archive handling.\n\n## Feature Flags\n\n| Flag | Default | Description |\n|---|---|---|\n| `landlock-sandbox` | off | Linux Landlock filesystem sandboxing |\n| `seccomp-sandbox` | off | seccomp BPF syscall filtering |\n| `wasm-hooks` | off | Enable WASM hook callbacks during skill execution |\n\n## Platform Notes\n\n- On Unix targets, `libc` is linked for low-level system calls (process isolation, signal handling).\n- TLS roots are resolved via `webpki-roots` (bundled) and `rustls-native-certs` (system certificate store), ensuring broad compatibility in containerized and bare-metal deployments.\n- `landlock-sandbox` and `seccomp-sandbox` are Linux-only. They are no-ops (but still compile) on other platforms.\n\n## Adding the Dependency\n\n```toml\n[dependencies]\nlibrefang-runtime = { path = \"../librefang-runtime\" }\n\n# Optional sandboxing\n[features]\ndefault = []\nsandboxed = [\"librefang-runtime/landlock-sandbox\", \"librefang-runtime/seccomp-sandbox\"]\n```","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis crate provides the centralized metrics and telemetry layer for LibreFang. It wraps the `metrics` facade crate and exposes a consistent set of counters, gauges, and histograms that other LibreFang components use to report operational data. By consolidating metric definitions here, every service in the workspace references the same names and labels, preventing drift and typos across the codebase.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-telemetry] -->|depends on| B[metrics crate]\n    A -->|depends on| C[librefang-types]\n    D[Server crates] -->|import| A\n    E[Worker crates] -->|import| A\n    F[CLI tools] -->|import| A\n```\n\nThe crate sits between the `metrics` ecosystem and the rest of LibreFang. Downstream crates—servers, background workers, CLI tools—depend on `librefang-telemetry` rather than calling into `metrics` directly. This indirection means metric key naming, label conventions, and recorder initialization all live in one place.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `metrics` | Facade crate providing macros (`counter!`, `gauge!`, `histogram!`, etc.). Does not impose an exporter—callers choose the backend at runtime. |\n| `librefang-types` | Shared domain types. Used when metric labels or values reference domain concepts (e.g., queue names, job statuses). |\n\n**Dev dependency:** `tokio-test` supports async unit tests for any initialization or registration logic that depends on a Tokio runtime.\n\n## Design Decisions\n\n### Metrics Facade Pattern\n\nThe `metrics` crate acts as a front-end similar to `log`. Code calls macros to record data; a separate recorder (such as `metrics-exporter-prometheus`) is installed at application startup. This crate does **not** select or configure an exporter—that responsibility belongs to the final binary. `librefang-telemetry` defines *what* to measure; the binary decides *where* to send it.\n\n### No Outgoing or Incoming Calls\n\nThe call graph for this module is flat: it exports functions and macro wrappers but does not itself call into other LibreFang crates at runtime. This keeps the telemetry layer free of side effects and circular dependencies. It is purely a definition and utility module.\n\n## Integration Points\n\nTo use this crate in another LibreFang workspace member:\n\n1. Add `librefang-telemetry` as a dependency in `Cargo.toml`.\n2. Call the exported initialization or setup functions early in your application's `main` or `tokio::spawn` setup.\n3. Use the provided metric helpers (or the `metrics` macros directly) at the points in your code where you want to record data.\n4. In the final binary, install a recorder/exporter (e.g., `metrics-exporter-prometheus`) before calling into any metric-producing code.\n\n## Testing\n\nTests use `tokio-test` to provide a minimal async runtime. Because the `metrics` facade is a no-op when no recorder is installed, tests can call metric functions without setting up a full exporter—recorded values simply drop. If tests need to assert specific metric values, install a test recorder before the test body runs.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Test Infrastructure and Example Tests\n\n## Purpose\n\n`librefang-testing` is the integration testing crate for the librefang project. It provides reusable test primitives — mock kernels, mock LLM drivers, HTTP request helpers, and response assertions — and contains example tests that demonstrate how to exercise the API layer end-to-end without real external dependencies.\n\nThe `tests.rs` file in this module serves a dual role: it validates the API endpoints and documents the testing patterns available to contributors writing new tests.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TR[tests.rs] --> TAS[TestAppState]\n    TR --> MKB[MockKernelBuilder]\n    TR --> MLD[MockLlmDriver]\n    TR --> FLD[FailingLlmDriver]\n    TR --> test_request\n    TR --> assert_json_ok\n    TR --> assert_json_error\n    TAS -->|produces| Router[Axum Router]\n    MKB -->|feeds into| TAS\n    MLD -->|implements| LlmDriver\n    FLD -->|implements| LlmDriver\n```\n\n## Test Infrastructure Components\n\nAll helpers are re-exported from the crate root. The tests import them via `use crate::{...}`.\n\n### TestAppState\n\nThe central test harness. It constructs a fully wired Axum application with mock dependencies so you can send real HTTP requests through the entire middleware and handler stack.\n\n- **`TestAppState::new()`** — creates a default app with standard mock configuration.\n- **`TestAppState::with_builder(builder)`** — creates an app from a custom `MockKernelBuilder`, allowing fine-grained control over the kernel config (language, model defaults, etc.).\n- **`app.router()`** — returns an `axum::Router` ready to accept requests via `tower::ServiceExt::oneshot`.\n\n### MockKernelBuilder\n\nBuilder for constructing a mock kernel with customized configuration. The primary customization point is `with_config`, which receives a mutable closure over the config struct:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n);\n```\n\n### HTTP Helpers\n\n- **`test_request(method, path, body) -> Request`** — builds an `axum::http::Request`. `body` is `Option<&str>` containing a JSON string. Returns a `Request<B>` suitable for `oneshot`.\n- **`assert_json_ok(response) -> Value`** — asserts the response status is `200 OK`, deserializes the body into `serde_json::Value`, and returns it. Panics on non-200 status or invalid JSON.\n- **`assert_json_error(response, expected_status) -> Value`** — asserts the response has the expected error status code, deserializes the JSON body, and returns it.\n\n### Mock LLM Drivers\n\n#### MockLlmDriver\n\nA controllable LLM driver that returns preconfigured responses and records all calls for later inspection.\n\n**Construction patterns:**\n\n```rust\n// Returns responses in sequence\nlet driver = MockLlmDriver::new(vec![\"response1\".into(), \"response2\".into()]);\n\n// Single response with builder customization\nlet driver = MockLlmDriver::with_response(\"test\")\n    .with_tokens(200, 100)           // custom input/output token counts\n    .with_stop_reason(StopReason::MaxTokens);  // custom stop reason\n```\n\n**Recording:**\n\n- `driver.call_count() -> usize` — number of `complete` calls made.\n- `driver.recorded_calls() -> &[RecordedCall]` — access to each recorded request, including fields like `model` and `system`.\n\nResponses cycle through the provided vector in order. If there are fewer responses than calls, later calls panic.\n\n#### FailingLlmDriver\n\nA driver that always returns an error. Useful for testing error-handling paths.\n\n```rust\nlet driver = FailingLlmDriver::new(\"simulated API error\");\nlet result = driver.complete(request).await;\nassert!(result.is_err());\nassert!(!driver.is_configured());\n```\n\n## Test Categories\n\n### Health and Meta Endpoints\n\n| Test | Endpoint | Validates |\n|------|----------|-----------|\n| `test_health_endpoint` | `GET /api/health` | Returns 200 with `\"status\": \"ok\"` or `\"status\": \"degraded\"` |\n| `test_version_endpoint` | `GET /api/version` | Returns 200 with a `\"version\"` field |\n\n### Agent CRUD\n\n| Test | Endpoint | Validates |\n|------|----------|-----------|\n| `test_list_agents` | `GET /api/agents` | Returns `{\"items\": [...], \"total\": N}` with `items` as array and `total` as u64 |\n| `test_get_agent_invalid_id` | `GET /api/agents/{bad-id}` | Returns 400 with `\"error\"` field |\n| `test_get_agent_not_found` | `GET /api/agents/{valid-uuid}` | Returns 404 with `\"error\"` field for nonexistent agent |\n| `test_spawn_agent_post` | `POST /api/agents` | Accepts `manifest_toml` body, returns 200 or 201 |\n| `test_delete_agent_not_found` | `DELETE /api/agents/{uuid}` | Returns 404 for nonexistent agent |\n| `test_set_model_not_found` | `PUT /api/agents/{uuid}/model` | Returns 4xx/5xx for nonexistent agent |\n| `test_send_message_agent_not_found` | `POST /api/agents/{uuid}/message` | Returns 400 or 404 for nonexistent agent |\n| `test_patch_agent_not_found` | `PATCH /api/agents/{uuid}` | Returns 400 or 404 for nonexistent agent |\n\n### Mock Driver Behavior\n\n| Test | Validates |\n|------|-----------|\n| `test_mock_llm_driver_recording` | Sequential responses are returned in order, `call_count` and `recorded_calls` capture request details |\n| `test_mock_llm_driver_custom_tokens_and_stop_reason` | Builder methods `with_tokens` and `with_stop_reason` propagate into `CompletionResponse` |\n| `test_failing_llm_driver` | Always errors, error message contains custom text, `is_configured()` returns false |\n\n### Configuration\n\n| Test | Validates |\n|------|-----------|\n| `test_custom_config_kernel` | `MockKernelBuilder::with_config` propagates settings into the kernel; `app.state.kernel.config_ref()` reflects changes |\n\n## Writing a New Test\n\nFollow the established pattern:\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_my_new_endpoint() {\n    let app = TestAppState::new();\n    let router = app.router();\n\n    let body = serde_json::json!({ \"key\": \"value\" }).to_string();\n    let req = test_request(Method::POST, \"/api/something\", Some(&body));\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n\n    let json = assert_json_ok(resp).await;\n    assert!(json.get(\"expected_field\").is_some());\n}\n```\n\nFor error cases, use `assert_json_error` with the expected `StatusCode`:\n\n```rust\nlet json = assert_json_error(resp, StatusCode::UNPROCESSABLE_ENTITY).await;\nassert!(json.get(\"error\").is_some());\n```\n\nFor tests that need custom mock state (specific config, pre-seeded drivers), construct `TestAppState` with `MockKernelBuilder`:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"en\".into();\n    })\n);\n```\n\n## Async Runtime\n\nAll HTTP-layer tests use `#[tokio::test(flavor = \"multi_thread\")]` because the Axum router requires a multi-threaded runtime. Pure mock-driver unit tests (no router involvement) can use the default `#[tokio::test]` flavor.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure crate providing mock implementations and test utilities for the Librefang workspace. This module consolidates shared test fixtures so that integration and unit tests across crates can rely on consistent, reusable mocks rather than each crate rolling its own.\n\n## Purpose\n\nTesting higher-level crates (API routes, skills, hands, extensions) requires substituting real infrastructure—kernel instances, LLM backends, persistent storage—with controllable stand-ins. `librefang-testing` provides:\n\n- **Mock kernel** — a lightweight kernel implementation that satisfies the kernel trait without requiring real hardware or system resources.\n- **Mock LLM driver** — a deterministic stand-in for the LLM backend, allowing tests to assert on prompts and control responses.\n- **API route test utilities** — helpers for constructing Axum test applications, issuing requests, and inspecting responses without binding to a real network port.\n\n## Workspace Role\n\n```mermaid\ngraph TD\n    TT[librefang-testing]\n    TT --> LT[librefang-types]\n    TT --> LK[librefang-kernel]\n    TT --> LR[librefang-runtime]\n    TT --> LM[librefang-memory]\n    TT --> LA[librefang-api]\n    TT --> LW[librefang-wire]\n    TT --> LC[librefang-channels]\n    TT --> LS[librefang-skills]\n    TT --> LH[librefang-hands]\n    TT --> LE[librefang-extensions]\n    style TT fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nThis crate sits at the top of the dependency graph as a test-only consumer. It is not published or included in production builds. Other crates reference it from their `[dev-dependencies]` to access mock infrastructure during testing.\n\n## Key Dependencies and Their Role\n\n| Dependency | Reason for inclusion |\n|---|---|\n| `librefang-kernel` | Implements the mock kernel against the real kernel trait |\n| `librefang-runtime` | Provides runtime primitives the mock kernel needs to operate |\n| `librefang-memory` | Supplies memory subsystem mocks or in-memory backends |\n| `librefang-api` (feature `telemetry`) | Builds test Axum routers with telemetry wiring enabled |\n| `librefang-wire` | Constructs wire-format test payloads |\n| `librefang-channels` | Creates mock channel endpoints for skill/hand communication |\n| `librefang-skills` | Enables skill-layer integration tests |\n| `librefang-hands` | Enables hand-layer integration tests |\n| `librefang-extensions` | Enables extension integration tests |\n| `axum` + `tower` | Assembles test HTTP applications and service layers |\n| `http-body-util` | Reads and decodes response bodies in route tests |\n| `dashmap` | Tracks mock state (e.g., recorded calls, configured responses) across concurrent test tasks |\n| `tempfile` | Creates isolated temporary directories for tests that touch the filesystem |\n| `uuid` | Generates deterministic or random UUIDs for test entities |\n\n## Usage Pattern\n\nAdd to your crate's `[dev-dependencies]`:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\nThen use the mock types in tests:\n\n```rust\nuse librefang_testing::mock_kernel::MockKernel;\nuse librefang_testing::mock_llm::MockLlmDriver;\nuse librefang_testing::api_test_helpers::TestApp;\n```\n\n### API Route Testing\n\nThe `api_test_helpers` module typically provides a builder or constructor that wires up an Axum `Router` with mock service layers, returning a type that can handle requests via `tower::ServiceExt::oneshot` or `axum::test` helpers. This allows tests to exercise route handlers end-to-end without network I/O.\n\n### Mock Kernel\n\nThe mock kernel implements the same trait as `librefang-kernel`'s real type, but backed by in-memory state. This lets tests of skills, hands, and extensions run against a kernel that behaves predictably and records interactions for later assertion.\n\n### Mock LLM Driver\n\nThe mock LLM driver accepts configuration for what responses to return and optionally records the prompts it receives. Tests configure expected responses before running a scenario, then assert that the correct prompts were sent.\n\n## Design Notes\n\n- **No production dependency.** This crate must never appear in a non-test `[dependencies]` section. Its mocks are not optimized for performance or correctness in production scenarios.\n- **Deterministic by default.** Mocks return predictable values. Tests requiring randomness should explicitly configure it rather than relying on mock internals.\n- **Isolation via `tempfile`.** Any test that creates files or directories should use the provided temp-directory helpers to avoid polluting the build tree and to ensure cleanup on test completion regardless of outcome.\n- **Concurrency safety.** Because tokio tests run concurrently within a single process, mock state backed by `DashMap` avoids data races without requiring per-test mutex overhead.","other-librefang-types-src":"# Other — librefang-types-src\n\n# Model Catalog Types (`librefang-types::model_catalog`)\n\nShared data structures for the model registry — the single source of truth for how providers, models, authentication states, and inference overrides are represented across the codebase.\n\n## Purpose\n\nEvery subsystem that needs to know \"what models exist, who provide
