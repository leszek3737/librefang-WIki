\n\n### Default LLM Provider\n\n```toml\n[default_model]\nprovider = "anthropic"           # "anthropic", "openai", "gemini", "groq", "ollama", etc.\nmodel = "claude-sonnet-4-20250514"\napi_key_env = "ANTHROPIC_API_KEY"\n# base_url = ""                 # Optional: override the provider\'s default endpoint\n```\n\n### Performance Tuning\n\n```toml\nprompt_caching = true           # Enable Anthropic/OpenAI cache_control (reduces cost)\nstable_prefix_mode = true       # Improves cache hit rate by stabilizing prefix tokens\nusage_footer = "tokens"         # off | tokens | cost | full\n```\n\n### Memory Configuration\n\n```toml\n[memory]\ndecay_rate = 0.05               # Memory confidence decay per cycle\n# embedding_model = "all-MiniLM-L6-v2"\n\n# Time-based expiry\n[memory.decay]\nenabled = false\nsession_ttl_days = 7            # SESSION memories expire after N days\nagent_ttl_days = 30             # AGENT memories expire after N days\ndecay_interval_hours = 1\n```\n\n### Proactive Memory\n\n```toml\n[proactive_memory]\nenabled = true\nauto_memorize = true            # Extract facts from conversations\nauto_retrieve = true            # Auto-recall relevant memories at session start\nmax_retrieve = 10               # Max memories per retrieval\n# extraction_threshold = 0.7\n# duplicate_threshold = 0.5\n```\n\n### Web Tools\n\n```toml\n[web]\nsearch_provider = "auto"       # Tavily → Brave → Jina → Perplexity → DuckDuckGo\n# cache_ttl_minutes = 15\n# timeout_secs = 15\n\n[web.fetch]\nmax_chars = 50000              # Max chars extracted from pages\ntimeout_secs = 30\nreadability = true             # Clean HTML → readable text\n```\n\n### Session Management\n\n```toml\n[session]\nretention_days = 30            # Auto-cleanup idle sessions (0 = unlimited)\nmax_sessions_per_agent = 100   # Max sessions per agent (0 = unlimited)\ncleanup_interval_hours = 24\nreset_prompt = "You are a helpful assistant."\n# on_session_start_script = "/path/to/hook.sh"\n\n# Context injections — injected at specific positions\n[[session.context_injection]]\nname = "project-rules"\ncontent = "Follow the project coding standards."\nposition = "system"            # "system", "before_user", or "after_reset"\n\n[[session.context_injection]]\nname = "user-prefs"\ncontent = "The user prefers concise answers."\nposition = "after_reset"\ncondition = "agent.tags contains \'chat\'"  # Conditional injection\n\n# Session compaction (LLM-based context reduction)\n[compaction]\nthreshold = 80                 # Compact when message count exceeds this\nkeep_recent = 20               # Keep this many recent messages after compaction\nmax_summary_tokens = 1024\n```\n\n### Task Queue Concurrency\n\n```toml\n[queue.concurrency]\nmain_lane = 3                  # Concurrent user messages\ncron_lane = 2                  # Concurrent scheduled jobs\nsubagent_lane = 3              # Concurrent child agents\n```\n\n### Shell Execution Policy\n\n```toml\n[exec_policy]\nmode = "deny"                  # deny | allowlist | full\ntimeout_secs = 30\nmax_output_bytes = 102400      # 100 KB\n```\n\n### Config Hot-Reload\n\n```toml\n[reload]\nmode = "hybrid"                # off | restart | hot | hybrid\ndebounce_ms = 500\n```\n\n### Provider Configuration\n\n```toml\n# Region selection (overrides base_url per provider)\n[provider_regions]\nqwen = "intl"\nminimax = "china"\n\n# URL overrides\n[provider_urls]\nollama = "http://localhost:11434/v1"\nvllm = "http://localhost:8000/v1"\n\n# API key overrides (alternative to env vars)\n[provider_api_keys]\nopenai = "OPENAI_API_KEY"\nnvidia = "NVIDIA_API_KEY"\n\n# Fallback providers (LLM failover chain)\n[[fallback_providers]]\nprovider = "openai"\nmodel = "gpt-4o"\napi_key_env = "OPENAI_API_KEY"\n```\n\n### Budget & Cost Control\n\n```toml\n[budget]\nmax_hourly_usd = 0.0           # 0 = unlimited\nmax_daily_usd = 0.0\nmax_monthly_usd = 0.0\nalert_threshold = 0.8          # Alert at 80% of limit\n```\n\n### Extended Thinking\n\n```toml\n[thinking]\nbudget_tokens = 10000          # Max tokens for chain-of-thought\nstream_thinking = false        # Stream thinking tokens to client\n```\n\n### Audit Logging\n\n```toml\n[audit]\nretention_days = 90\n```\n\n### Messaging Channels\n\n```toml\n[channels.telegram]\nbot_token_env = "TELEGRAM_BOT_TOKEN"\ndefault_agent = "assistant"\nallowed_users = []              # Empty = allow all\n\n[channels.discord]\nbot_token_env =DISCORD_BOT_TOKEN"\ndefault_agent = "assistant"\n\n[channels.slack]\nbot_token_env = "SLACK_BOT_TOKEN"\napp_token_env = "SLACK_APP_TOKEN"\ndefault_agent = "assistant"\n\n[channels.whatsapp]\nphone_number_id_env = "WHATSAPP_PHONE_ID"\naccess_token_env = "WHATSAPP_ACCESS_TOKEN"\ndefault_agent = "assistant"\n```\n\n### MCP Server Connections\n\n```toml\n# STDIO transport\n[[mcp_servers]]\nname = "filesystem"\ntimeout_secs = 30\n[mcp_servers.transport]\ntype = "stdio"\ncommand = "npx"\nargs = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]\n\n# SSE transport\n[[mcp_servers]]\nname = "remote-tools"\ntimeout_secs = 60\n[mcp_servers.transport]\ntype = "sse"\nurl = "https://mcp.example.com/events"\n\n# HTTP-compatible transport\n[[mcp_servers]]\nname = "internal-http"\ntimeout_secs = 30\n[mcp_servers.transport]\ntype = "http_compat"\nbase_url = "http://127.0.0.1:8080"\n[[mcp_servers.transport.headers]]\nname = "Authorization"\nvalue_env = "INTERNAL_HTTP_TOKEN"\n[[mcp_servers.transport.tools]]\nname = "search"\npath = "/search"\nmethod = "get"\nrequest_mode = "query"\nresponse_mode = "json"\n```\n\n### Privacy Controls\n\n```toml\n[privacy]\nmode = "pseudonymize"          # off | redact | pseudonymize\nredact_patterns = ["\\\\bCUST-\\\\d{6}\\\\b"]\n```\n\n### Browser Automation\n\n```toml\n[browser]\nheadless = true\nviewport_width = 1280\nviewport_height = 720\nmax_sessions = 5\n```\n\n### Docker Sandbox\n\n```toml\n[docker]\nenabled = false\nimage = "python:3.12-slim"\nmemory_limit = "512m"\ntimeout_secs = 60\n```\n\n### Text-to-Speech\n\n```toml\n[tts]\nenabled = false\nprovider = "openai"            # or "elevenlabs" or "google_tts"\n```\n\n### P2P Federation\n\n```toml\nnetwork_enabled = false\n[network]\nshared_secret = ""\n```\n\n### External Auth (OAuth2/OIDC)\n\n```toml\n[external_auth]\nenabled = false\nissuer_url = "https://accounts.google.com"\nclient_id = ""\nclient_secret_env = "OAUTH_CLIENT_SECRET"\n```\n\n### File Inbox\n\n```toml\n[inbox]\nenabled = false\ndirectory = "~/.librefang/inbox/"\npoll_interval_secs = 5\ndefault_agent = "assistant"    # Used when no `agent:<name>` directive in file\n```\n\n### Vault (Encrypted Credential Storage)\n\n```toml\n[vault]\nenabled = true                # Auto-detected if vault.enc exists\n```\n\n### Execution Approval\n\n```toml\n[approval]\nrequire_approval = ["shell_exec"]\ntimeout_secs = 60             # Auto-deny after this many seconds\nauto_approve = false\ntrusted_senders = ["admin_123", "ops_456"]\n\n# Per-channel tool rules\n[[approval.channel_rules]]\nchannel = "telegram"\ndenied_tools = ["shell_exec"]\n\n[[approval.channel_rules]]\nchannel = "admin_cli"\nallowed_tools = ["shell_exec", "file_write", "file_delete"]\n\n# TOTP second-factor\nsecond_factor = "none"        # "none" or "totp"\ntotp_issuer = "LibreFang"\ntotp_grace_period_secs = 300\ntotp_tools = ["shell_exec"]\n```\n\n## Adding New Config Fields\n\nWhen adding a config option, three changes are required in `librefang-kernel`:\n\n```rust\n// 1. Add the field with #[serde(default)]\n#[serde(default)]\npub struct KernelConfig {\n    // ... existing fields ...\n    pub my_new_option: Option<MyType>,\n}\n\n// 2. Add to Default impl\nimpl Default for KernelConfig {\n    fn default() -> Self {\n        Self {\n            // ... existing defaults ...\n            my_new_option: None,\n        }\n    }\n}\n```\n\n## Hot-Reload Behavior\n\n| Mode | Behavior |\n|------|----------|\n| `off` | Config changes require restart |\n| `restart` | Full restart on any config change |\n| `hot` | Apply changes without restart where supported |\n| `hybrid` | Hot reload for supported fields, restart for structural changes |\n\nThe `debounce_ms` setting prevents rapid-flapping configs from causing excessive reloads.\n\n## Vault Integration\n\nThe vault stores sensitive credentials encrypted at rest using AES-256-GCM. Keys are derived from a master password via Argon2.\n\n```bash\n# Set a credential\nlibrefang vault set dashboard_password\n\n# Reference in config.toml\ndashboard_pass = "vault:dashboard_password"\n```\n\nVault is auto-enabled when `vault.enc` exists in the config directory.',
                dashboard:
                    '# Dashboard\n\n# Dashboard Module\n\nThe Dashboard is a React-based web interface for managing LibreFang infrastructure. It provides a comprehensive UI for configuring providers, spawning agents, designing workflows, managing channels, viewing analytics, and administering the entire system.\n\n---\n\n## Overview\n\nThe Dashboard is a single-page application (SPA) served by the same `librefang-api` binary that provides the REST API. It communicates exclusively through that API—no backend rendering, no separate frontend build pipeline beyond bundling.\n\n**Technology stack:**\n\n- **React 18** with TypeScript\n- **TanStack Router** — hash-based routing (`#/` paths)\n- **TanStack Query** — server state, caching, background refetch\n- **Zustand** — client-side UI state (theme, sidebar, language)\n- **Lucide React** — icon library\n- **react-i18next** — internationalization (English / Chinese)\n\nPages are lazy-loaded via `React.lazy()` and code-split into separate chunks. The entry point is `main.tsx`, which bootstraps the React tree, installs the QueryClient, and mounts the RouterProvider.\n\n---\n\n## Application Shell (`App.tsx`)\n\n`App` is the root component rendered by the router. It owns the sidebar, header, auth dialog, and global overlays.\n\n### Layout Structure\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│  Sidebar (220px / 280px)  │  Header (14-16 units tall)    │\n│  ───────────────────────  │  ────────────────────────────  │\n│  Logo + collapse button    │  Mobile menu button           │\n│  Search button (⌘K)         │  Notification bell            │\n│  ───────────────────────  │  Language toggle               │\n│  Nav groups (collapsible)  │  Theme toggle                  │\n│    Core                    │  User menu                     │\n│    Configure               │─────────────────────────────────│\n│    Automate                │  Main content area             │\n│    Observe                 │  (Outlet renders the page)    │\n│    Advanced                │                                │\n│  ───────────────────────  │                                │\n│  Status card               │                                │\n│  (daemon online badge)     │                                │\n└─────────────────────────────────────────────────────────────┘\n```\n\n### Authentication Flow\n\nOn startup, `App` checks `checkDashboardAuthMode()` to determine what auth scheme the daemon expects:\n\n| `AuthMode` | Behavior |\n|---|---|\n| `"none"` | No auth required; render immediately |\n| `"credentials"` | Show username/password form |\n| `"api_key"` | Show API key form |\n| `"hybrid"` | Show tabbed form (credentials or API key) |\n\n`setOnUnauthorized` registers a global 401 handler: any failed API response triggers the login dialog. This means agents, pages, and components never need to handle auth directly—`parseError` in `api.ts` handles it centrally.\n\n`verifyStoredAuth()` probes `/api/security` with the stored bearer token, retrying up to 3 times with 1-second delays. On 401 it clears the token and fires the global handler.\n\n### State Management\n\nAll UI state lives in `useUIStore` (Zustand):\n\n```typescript\n// Theme\ntheme: "light" | "dark" → toggles `dark` class on `<html>`\n\n// Sidebar\nisSidebarCollapsed: boolean  // persists across reloads\nisMobileMenuOpen: boolean\n\n// Navigation layout\nnavLayout: "collapsible" | "grouped"\ncollapsedNavGroups: Record<string, boolean>\n\n// Locale\nlanguage: "en" | "zh"\n```\n\n### Keyboard Shortcuts\n\n`useKeyboardShortcuts` listens globally. Currently it opens the shortcuts help overlay on `?`.\n\n---\n\n## API Client (`api.ts`)\n\nAll network requests go through this module. It wraps `fetch` with consistent auth headers, timeout handling, and error parsing.\n\n### Core HTTP Helpers\n\n| Function | Method | Timeout | Use |\n|---|---|---|---|\n| `get<T>(path)` | GET | — | Reads |\n| `post<T>(path, body, timeout?)` | POST | 60 s default | Writes, 300 s for LLM calls |\n| `put<T>(path, body)` | PUT | — | Updates |\n| `patch<T>(path, body)` | PATCH | — | Partial updates |\n| `del<T>(path)` | DELETE | — | Deletes |\n\n### Auth Header Injection\n\nEvery outbound request passes through `buildHeaders`, which merges:\n\n1. Caller-supplied headers\n2. `Accept-Language` from `localStorage` or `navigator.language`\n3. `Authorization: Bearer <token>` if `localStorage["librefang-api-key"]` is set\n\n### Error Handling\n\n`parseError` extracts the human-readable `detail` or `error` field from JSON error bodies. On 401, it clears the API key and invokes the global unauthorized handler (guarded by `_unauthorizedFired` to prevent infinite loops).\n\n### WebSocket URLs\n\n`buildAuthenticatedWebSocketUrl(path)` constructs a `ws://` or `wss://` URL with `?token=` appended. Used by chat and terminal pages for real-time streams.\n\n### API Surface\n\nThe module exposes ~150 named exports organized by domain:\n\n**Agents** — `listAgents`, `getAgentDetail`, `patchAgentConfig`, `spawnAgent`, `stopAgent`, `deleteAgent`, `cloneAgent`, `resetAgentSession`, `clearAgentHistory`, `loadAgentSession`, `sendAgentMessage`, `suspendAgent`, `resumeAgent`, session management (`listAgentSessions`, `switchAgentSession`, `createAgentSession`)\n\n**Providers / Models** — `listProviders`, `testProvider`, `setProviderKey`, `setProviderUrl`, `setDefaultProvider`, `listModels`, `addCustomModel`, `removeCustomModel`\n\n**Channels** — `listChannels`, `testChannel`, `configureChannel`, `reloadChannels`, WeChat/WhatsApp QR flows\n\n**Skills** — `listSkills`, `installSkill`, `uninstallSkill`, ClawHub (`clawhubBrowse`, `clawhubSearch`, `clawhubGetSkill`, `clawhubInstall`), Skillhub, FangHub registry\n\n**Workflows** — `listWorkflows`, `createWorkflow`, `getWorkflow`, `updateWorkflow`, `deleteWorkflow`, `runWorkflow`, `dryRunWorkflow`, `listWorkflowRuns`, `getWorkflowRunDetail`, `listWorkflowTemplates`, `instantiateTemplate`\n\n**Scheduling** — `listSchedules`, `createSchedule`, `updateSchedule`, `deleteSchedule`, `runSchedule`, triggers and cron jobs\n\n**Memory** — `listMemories`, `searchMemories`, `addMemoryFromText`, `updateMemory`, `deleteMemory`, `getMemoryStats`, `cleanupMemories`, `decayMemories`, memory config\n\n**Analytics / Usage** — `getUsageSummary`, `listUsageByAgent`, `listUsageByModel`, `getUsageByModelPerformance`, `getUsageDaily`, budget management\n\n**Approvals** — `listApprovals`, `listPendingApprovals`, `approveApproval`, `rejectApproval`, `resolveApproval`, `batchResolveApprovals`, TOTP setup/status/revoke, approval audit trail\n\n**Hands** — `listHands`, `listActiveHands`, `getHandDetail`, `activateHand`, `pauseHand`, `resumeHand`, `deactivateHand`, `uninstallHand`, hand settings, hand session messaging\n\n**Plugins** — `listPlugins`, `getPlugin`, `installPlugin`, `uninstallPlugin`, `scaffoldPlugin`, `installPluginDeps`, registry listing\n\n**Media** — `listMediaProviders`, `generateImage`, `synthesizeSpeech`, `submitVideo` / `pollVideo`, `generateMusic`\n\n**MCP Servers** — `listMcpServers`, `addMcpServer`, `updateMcpServer`, `deleteMcpServer`\n\n**Goals** — `listGoals`, `createGoal`, `updateGoal`, `deleteGoal`, goal templates\n\n**System** — `loadDashboardSnapshot`, `getVersionInfo`, `getHealthDetail`, `getQueueStatus`, `shutdownServer`, `reloadConfig`, `getSecurityStatus`, `getFullConfig`, backups, task queue, sessions, audit log, metrics\n\n---\n\n## Routing (`router.tsx`)\n\nTanStack Router with hash history. The root route renders `App`; child routes render lazy-loaded page components inside `<Outlet />`.\n\n### Route Map\n\n| Path | Page Component |\n|---|---|\n| `/` | Redirects → `/overview` |\n| `/overview` | OverviewPage |\n| `/canvas` | CanvasPage |\n| `/agents` | AgentsPage |\n| `/sessions` | SessionsPage |\n| `/chat?agentId=` | ChatPage |\n| `/providers` | ProvidersPage |\n| `/models` | ModelsPage |\n| `/channels` | ChannelsPage |\n| `/skills` | SkillsPage |\n| `/plugins` | PluginsPage |\n| `/mcp-servers` | McpServersPage |\n| `/media` | MediaPage |\n| `/workflows` | WorkflowsPage |\n| `/scheduler` | SchedulerPage |\n| `/goals` | GoalsPage |\n| `/analytics` | AnalyticsPage |\n| `/memory` | MemoryPage |\n| `/logs` | LogsPage |\n| `/runtime` | RuntimePage |\n| `/comms` | CommsPage |\n| `/hands` | HandsPage |\n| `/approvals` | ApprovalsPage |\n| `/network` | NetworkPage |\n| `/a2a` | A2APage |\n| `/telemetry` | TelemetryPage |\n| `/terminal` | TerminalPage |\n| `/wizard` | WizardPage |\n| `/settings` | SettingsPage |\n\nSearch params are validated on canvas (`t=`, `wf=`) and chat (`agentId=`).\n\n---\n\n## Navigation Structure\n\nThe sidebar organizes 30 routes into 5 groups:\n\n```mermaid\ngraph TD\n    subgraph Core\n        O[Overview] --> CH[Chat]\n        CH --> A[Agents]\n        A --> AP[Approvals]\n        AP --> H[Hands]\n    end\n\n    subgraph Configure\n        P[Providers] --> M[Models]\n        M --> MG[Media]\n        MG --> CN[Channels]\n        CN --> SK[Skills]\n        SK --> PL[Plugins]\n        PL --> MCP[MCP Servers]\n    end\n\n    subgraph Automate\n        WF[Workflows] --> SCH[Scheduler]\n        SCH --> G[Goals]\n    end\n\n    subgraph Observe\n        AN[Analytics] --> MEM[Memory]\n        MEM --> L[Logs]\n        L --> RT[Runtime]\n    end\n\n    subgraph Advanced\n        CM[Comms] --> TR[Terminal]\n        TR --> NW[Network]\n        NW --> A2A[A2A]\n        A2A --> T[Telemetry]\n    end\n```\n\n---\n\n## Authentication Architecture\n\n```mermaid\nsequenceDiagram\n    participant Browser\n    participant App\n    participant api\n    participant Daemon\n\n    Browser->>App: Mount App\n    App->>api: checkDashboardAuthMode()\n    api->>Daemon: GET /api/auth/dashboard-check\n    Daemon-->>api: AuthMode ("hybrid")\n\n    alt No stored token\n        App->>App: Show AuthDialog\n        User submits credentials\n        App->>api: dashboardLogin(username, password)\n        api->>Daemon: POST /api/auth/dashboard-login\n        Daemon-->>api: { ok: true, token: "..." }\n        api->>api: setApiKey(token)\n        api->>api: verifyStoredAuth()\n        api->>Daemon: GET /api/security (Bearer token)\n        Daemon-->>api: 200 OK\n        App->>App: Hide AuthDialog, render Outlet\n    else Token present\n        App->>api: verifyStoredAuth()\n        api->>Daemon: GET /api/security (Bearer token)\n        alt Token valid\n            Daemon-->>api: 200 OK\n            App->>App: Render immediately\n        else Token invalid (401)\n            api->>api: clearApiKey()\n            api->>App: invoke _onUnauthorized()\n            App->>App: Show AuthDialog\n        end\n    end\n\n    loop Any later request\n        api->>Daemon: Any API call\n        alt 401 response\n            Daemon-->>api: 401\n            api->>api: clearApiKey()\n            api->>App: invoke _onUnauthorized()\n            App->>App: Show AuthDialog\n        end\n    end\n```\n\n---\n\n## Key Components\n\n### `AuthDialog`\n\nModal presented when authentication is required. Adapts its form fields based on `AuthMode`. On hybrid mode, tabs let the user switch between credentials and API key submission.\n\n### `ChangePasswordModal`\n\nSub-dialog accessible from the user menu. Validates that the new password is at least 8 characters and that confirmation matches. On success, clears the API key and reloads the page to force re-authentication.\n\n### `NotificationCenter`\n\nBell icon in the header. Polls `fetchApprovalCount()` every 5 seconds when open. Clicking opens a dropdown listing pending approval requests with inline approve/reject buttons.\n\n### `CommandPalette`\n\nOpened via ⌘K. Provides fuzzy search across routes and recent items. Powered by `useCommandPalette` hook from `./components/ui/CommandPalette`.\n\n### `ShortcutsHelp`\n\nOverlay showing available keyboard shortcuts. Triggered by `?` or the help menu item.\n\n### `NodeEditor`\n\nUsed inside the Canvas page to edit properties of workflow canvas nodes. Renders label and type fields; type is read-only.\n\n---\n\n## Integration with Backend\n\nThe Dashboard is a pure client. It never imports backend Rust code directly. Instead, all data flows through the REST API defined in the `librefang-api` crate.\n\n**Entry point relationship:** The same binary that serves the API also serves `index.html` from `dashboard/dist/`. During development, Vite proxies `/api/*` to the running dev server.\n\n**WebSocket integration:** Real-time features (chat streaming, terminal I/O) use `buildAuthenticatedWebSocketUrl` to establish `ws://` connections with the bearer token as a query param.\n\n**Service Worker:** `public/sw.js` enables offline caching of static assets.\n\n---\n\n## Testing\n\n`api.test.ts` validates:\n\n- Bearer token appended to WebSocket URLs\n- Stale auth (401) clears `localStorage["librefang-api-key"]` and returns `false`\n- Protected helpers send `Authorization: Bearer` headers\n- `patchAgentConfig` serializes `temperature` and `max_tokens` correctly',
                "deployment-deploy":
                    '# Deployment — deploy\n\n# LibreFang Deployment Module\n\nThe `deploy/` directory contains all artifacts needed to package, ship, and run LibreFang in production environments. This includes Docker builds, systemd services, container orchestration, and observability infrastructure.\n\n## Architecture Overview\n\nLibreFang uses a multi-stage Docker build to produce a lean production image. The final image combines a Rust-compiled binary with a Node.js runtime, supporting both the core daemon and the embedded React dashboard.\n\n```mermaid\nflow LR\n    subgraph Build["Build Phase"]\n        D[Dashboard Source] --> NB[Node Builder]\n        RC[Rust Crates] --> RB[Rust Builder]\n        NB --> S1[Stage 1 Artifacts]\n        RB --> S2[Stage 2 Artifacts]\n    end\n    \n    subgraph Runtime["Runtime Image"]\n        S1 --> Final[librefang:latest]\n        S2 --> Final\n        Final --> DC[Docker Container]\n        DC --> V[Volumes]\n        DC --> E[Environment]\n    end\n```\n\n## Docker Build Process\n\n### Multi-Stage Build\n\nThe `Dockerfile` produces the final image through three stages:\n\n**Stage 1: Dashboard Builder**\n- Base: `node:20-alpine`\n- Builds the React dashboard from `crates/librefang-api/dashboard`\n- Runs `npm install && npm run build`\n- Output: compiled static assets in `./static/react`\n\n**Stage 2: Rust Builder**\n- Base: `rust:1-slim-bookworm`\n- Compiles the `librefang` binary with `cargo build --release --bin librefang`\n- Caches cargo registry, git deps, and target directory via Docker buildkit mounts\n- Output: `/usr/local/bin/librefang` binary\n\n**Stage 3: Runtime Image**\n- Base: `node:lts-bookworm-slim`\n- Installs: `ca-certificates`, `python3`, `libicu72`, `gosu`\n- Copies: compiled Rust binary, packages directory, dashboard static files\n- Default command: `librefang start --foreground`\n- Listens on port 4545\n\n### Image Details\n\n| Component | Version | Purpose |\n|-----------|---------|---------|\n| Base image | `node:lts-bookworm-slim` | Runtime environment |\n| Rust binary | Built from source | Core daemon |\n| `gosu` | Latest | Privilege dropping |\n| `libicu72` | Debian bookworm | Internationalization support |\n| `python3` | Debian package | Future extensibility |\n\n## Container Configuration\n\n### Environment Variables\n\nThe `docker-compose.yml` configures these environment variables:\n\n| Variable | Purpose | Required |\n|----------|---------|----------|\n| `LIBREFANG_LISTEN` | Bind address | No (default: internal) |\n| `ANTHROPIC_API_KEY` | Anthropic LLM | Yes |\n| `OPENAI_API_KEY` | OpenAI LLM | Yes |\n| `GROQ_API_KEY` | Groq LLM | Yes |\n| `TELEGRAM_BOT_TOKEN` | Telegram integration | No |\n| `DISCORD_BOT_TOKEN` | Discord integration | No |\n| `SLACK_BOT_TOKEN` | Slack bot token | No |\n| `SLACK_APP_TOKEN` | Slack app-level token | No |\n\n### Volumes\n\nThe `librefang-data` Docker volume mounts at `/data` and persists:\n- `config.toml` — Main configuration\n- Conversation history\n- Local database (if used)\n\n### Data Directory Initialization\n\nThe entrypoint script handles `/data` directory setup:\n\n1. Creates directory if missing\n2. Changes ownership to `node:node` on first run\n3. Runs `librefang init` only if `config.toml` doesn\'t exist\n4. Subsequent boots skip initialization (kernel re-syncs registry at startup)\n\n## Entrypoint Script Behavior\n\nThe `docker-entrypoint.sh` script executes in this order:\n\n```mermaid\nflowchart TD\n    A[Container Start] --> B{CONFIG exists?}\n    B -->|No| C[Run librefang init as node user]\n    B -->|Yes| D{ PORT env set?}\n    C --> D\n    D -->|Yes| E[Update api_listen in config.toml]\n    D -->|No| F{ LIBREFANG_MODEL set?}\n    E --> F\n    F -->|Yes| G[Update model in config.toml]\n    F -->|No| H[Exec librefang binary]\n    G --> H\n```\n\n### Platform-Specific Handling\n\nThe entrypoint supports cloud platforms that inject environment variables:\n\n| Platform | Injected Variable | Action |\n|----------|-------------------|--------|\n| Railway | `PORT` | Update `api_listen` in config |\n| Render | `PORT` | Update `api_listen` in config |\n| Fly | `PORT` | Update `api_listen` in config |\n\nThis ensures LibreFang binds to the port the platform allocates, even after container rescheduling.\n\n## Systemd Service\n\nThe `librefang.service` file provides systemd integration for Linux servers.\n\n### Installation\n\n```bash\nsudo cp deploy/librefang.service /etc/systemd/system/\nsudo systemctl daemon-reload\nsudo systemctl enable librefang\nsudo systemctl start librefang\n```\n\n### Security Hardening\n\nThe service file applies defense-in-depth measures:\n\n| Setting | Protection |\n|---------|------------|\n| `NoNewPrivileges=true` | Prevent privilege escalation |\n| `ProtectSystem=strict` | Read-only `/usr`, `/boot`, `/etc` |\n| `ProtectHome=true` | Hide user home directories |\n| `ReadWritePaths=/var/lib/librefang` | Only data dir is writable |\n| `PrivateTmp=true` | Isolated `/tmp` and `/var/tmp` |\n| `ProtectKernelTunables=true` | Block `/proc/sys` modification |\n| `ProtectKernelModules=true` | Block module loading |\n| `ProtectControlGroups=true` | Block cgroup manipulation |\n| `RestrictSUIDSGID=true` | Block setuid binaries |\n| `RestrictRealtime=true` | Block realtime scheduling |\n\n### Resource Limits\n\n```\nLimitNOFILE=65536   # Open file descriptors\nLimitNPROC=4096     # Process count\n```\n\n### Environment\n\nEnvironment variables load from `/etc/librefang/env` (optional). The service runs as the `librefang` user and group, requiring prior creation:\n\n```bash\nsudo useradd -r -s /usr/sbin/nologin librefang\nsudo mkdir /var/lib/librefang\nsudo chown librefang:librefang /var/lib/librefang\n```\n\n## Observability Stack\n\nThe `docker-compose.observability.yml` deploys Prometheus and Grafana for monitoring.\n\n### Quick Start\n\n```bash\n# Enable metrics in config.toml first\n[telemetry]\nprometheus_enabled = true\n\n# Start monitoring stack\ncd deploy\ndocker compose -f docker-compose.observability.yml up -d\n```\n\n### Metrics Endpoint\n\nPrometheus scrapes `/api/metrics` from the LibreFang daemon every 15 seconds via `host.docker.internal:4545`.\n\nFor remote deployments, update `prometheus/prometheus.yml` with the actual host address.\n\n### Grafana Access\n\n- URL: `http://localhost:3000`\n- Credentials: `admin` / `admin`\n- Dashboards and datasource are auto-provisioned\n\n### Available Dashboards\n\n| Dashboard | Focus |\n|-----------|-------|\n| `librefang.json` | System health, uptime, agent counts |\n| `librefang-llm.json` | Token usage, LLM calls by agent/provider |\n| `librefang-http.json` | Request rate, latency, error rates |\n| `librefang-cost.json` | Spending estimates, cost trends |\n\n## Cloud Platform Deployment\n\n### Render\n\nThe `render.yaml` configures Render.com deployment:\n\n- Runtime: Docker\n- Health check: `GET /api/health`\n- Compatible with free tier (no persistent disk)\n- For persistent storage, upgrade to paid plan and add a disk mounting at `/data`\n\n**Note:** On Render\'s free tier, data is lost on each deploy because persistent disks aren\'t supported.\n\n### Railway / Fly / Other\n\nUse the standard `docker-compose.yml` as a base, then configure:\n1. Set required `*_API_KEY` environment variables\n2. Configure the platform to expose port 4545\n3. Mount a persistent volume at `/data` for config and state\n\n## Building from Source\n\nTo build the Docker image locally:\n\n```bash\ncd deploy\ndocker build -t librefang:local -f Dockerfile ..\n```\n\nOr use the pre-configured docker-compose build:\n\n```bash\n# Uncomment the build section in docker-compose.yml first\ndocker compose build\ndocker compose up -d\n```\n\n## Dependencies Summary\n\n| File | Purpose |\n|------|---------|\n| `Dockerfile` | Container image definition |\n| `docker-compose.yml` | Container orchestration |\n| `docker-compose.observability.yml` | Monitoring stack |\n| `docker-entrypoint.sh` | Runtime initialization |\n| `librefang.service` | systemd unit file |\n| `render.yaml` | Render.com deployment |\n| `prometheus/prometheus.yml` | Prometheus scrape config |\n| `grafana/provisioning/*` | Grafana auto-provisioning |\n| `grafana/dashboards/*.json` | Pre-built dashboards |\n\n## Connecting to Core Codebase\n\nThe deploy module connects to the rest of LibreFang at these points:\n\n| Artifact | References |\n|----------|------------|\n| `Dockerfile` | `Cargo.toml`, `Cargo.lock`, `crates/` directory |\n| Dashboard build | `crates/librefang-api/dashboard/` |\n| Binary path | `--bin librefang` (defined in `Cargo.toml`) |\n| Entrypoint `init` command | `librefang kernel` subsystem |\n| Metrics endpoint | `crates/librefang-api/src/metrics.rs` |\n| Health endpoint | `crates/librefang-api/src/health.rs` |\n| Config location | `LIBREFANG_HOME` environment variable |',
                "deployment-fly":
                    '# Deployment — fly\n\n# Deployment — Fly.io\n\nThis module provides one-command deployment of LibreFang to [Fly.io](https://fly.io), a platform that runs applications close to users with automatic scaling and persistent storage.\n\n## Files\n\n| File | Purpose |\n|------|---------|\n| `deploy/fly/deploy.sh` | One-command deployment script |\n| `deploy/fly/fly.toml` | Fly.io application configuration |\n| `deploy/fly/uninstall.sh` | Cleanup script to remove deployments |\n\n## Quick Start\n\n```bash\ncurl -sL https://raw.githubusercontent.com/librefang/librefang/main/deploy/fly/deploy.sh | bash\n```\n\nThe script will:\n1. Install `flyctl` if needed\n2. Open a browser for Fly.io authentication\n3. Create a new app (custom or auto-generated name)\n4. Set up a 1GB persistent volume\n5. Configure LLM provider API keys\n6. Deploy LibreFang\n\n## Deploy Script (`deploy.sh`)\n\n### Execution Flow\n\n```mermaid\nflowchart TD\n    A[Install flyctl] --> B[Authenticate]\n    B --> C[Clone Repo]\n    C --> D[Create App]\n    D --> E[Create Volume]\n    E --> F[Select Providers]\n    F --> G[Set Secrets]\n    G --> H[Deploy]\n    H --> I[Show URLs]\n```\n\n### Prerequisites\n\n- `flyctl` CLI (installed automatically if missing)\n- Fly.io account (browser-based login via `flyctl auth login`)\n- For API keys: accounts with supported providers (OpenAI, Anthropic, etc.)\n\n### Interactive Prompts\n\n**App Name**\n- Leave empty for auto-generated name (format: `librefang-<hex>`)\n- Enter a custom name (auto-normalized to lowercase with dashes)\n\n**LLM Provider Selection**\n- TUI with arrow keys (`↑`/`↓`), space to toggle, Enter to confirm\n- Press `q` or `Esc` to skip without configuring any providers\n- Providers supported: OpenAI, Anthropic, Google Gemini, Groq, DeepSeek, OpenRouter, Mistral, xAI/Grok\n\n### Environment Variables Set\n\n| Variable | Description |\n|----------|-------------|\n| `LIBREFANG_HOME` | Data directory (`/data`) |\n| `LIBREFANG_LISTEN` | Listen address (`0.0.0.0:4545`) |\n\n### Secrets (Per-Provider)\n\nThe script prompts for API keys based on selected providers:\n\n| Provider | Secret Name |\n|----------|-------------|\n| OpenAI | `OPENAI_API_KEY` |\n| Anthropic | `ANTHROPIC_API_KEY` |\n| Google Gemini | `GEMINI_API_KEY` |\n| Groq | `GROQ_API_KEY` |\n| DeepSeek | `DEEPSEEK_API_KEY` |\n| OpenRouter | `OPENROUTER_API_KEY` |\n| Mistral | `MISTRAL_API_KEY` |\n| xAI / Grok | `XAI_API_KEY` |\n\n### Output\n\nOn success, the script displays:\n```\n✓ LibreFang is live!\n\n  Dashboard:  https://<app-name>.fly.dev\n  API:        https://<app-name>.fly.dev/api/health\n  Manage:     flyctl dashboard --app <app-name>\n```\n\n## Fly.toml Configuration\n\nThe `fly.toml` file defines how Fly.io runs LibreFang:\n\n```toml\napp = "librefang"\nprimary_region = "nrt"  # Tokyo\n```\n\n### Key Settings\n\n| Setting | Value | Purpose |\n|---------|-------|---------|\n| `primary_region` | `nrt` | Tokyo region for deployment |\n| `image` | `ghcr.io/librefang/librefang:latest` | Container image |\n| `internal_port` | `4545` | Port LibreFang listens on |\n| `memory` | `256mb` | VM memory allocation |\n| `cpus` | `1` | Shared CPU (1 core) |\n| `volume_size` | `1GB` | Persistent storage |\n\n### Auto-Scaling\n\n```toml\n[http_service]\n  auto_stop_machines = "suspend"\n  auto_start_machines = true\n  min_machines_running = 1\n```\n\nThis configuration:\n- Suspends VMs after 10 minutes of inactivity (saves costs)\n- Automatically starts VMs when requests arrive\n- Keeps at least 1 machine running (reduces cold start latency)\n\n### Persistent Storage\n\n```toml\n[mounts]\n  source = "librefang_data"\n  destination = "/data"\n```\n\nData persists across deployments and restarts via a named volume.\n\n## Uninstall Script (`uninstall.sh`)\n\nRemoves LibreFang deployments from your Fly.io account.\n\n```bash\ncurl -sL https://raw.githubusercontent.com/librefang/librefang/main/deploy/fly/uninstall.sh | bash\n```\n\n### Behavior\n\n1. Lists all Fly.io apps with names starting with `librefang`\n2. TUI to select which apps to remove (multi-select supported)\n3. Requires typing `yes` to confirm destruction\n4. Deletes apps, volumes, and secrets\n\n### Safety Checks\n\n- Only targets apps matching `librefang*` prefix\n- Requires explicit `yes` confirmation\n- Reports failures without stopping (continues to next app)\n\n## Managing Secrets After Deployment\n\nAdd or update API keys without redeploying:\n\n```bash\nflyctl secrets set OPENAI_API_KEY=sk-... --app <app-name>\nflyctl secrets set ANTHROPIC_API_KEY=sk-ant-... --app <app-name>\n```\n\nList current secrets (names only):\n\n```bash\nflyctl secrets list --app <app-name>\n```\n\nRemove a secret:\n\n```bash\nflyctl secrets unset PROXY_API_KEY --app <app-name>\n```\n\n## Connection to Main Codebase\n\n```\ndeploy/fly/\n├── deploy.sh      → Clones librefang repo, runs flyctl deploy\n├── fly.toml       → Read by flyctl during deployment\n└── uninstall.sh   → Lists/destroys apps created by deploy.sh\n```\n\nThe deployment script:\n- References `ghcr.io/librefang/librefang:latest` as the container image\n- Expects the app to listen on port `4545` (configured in `fly.toml`)\n- Stores persistent data in `/data` (configured as `LIBREFANG_HOME`)\n- Uses a pre-built OCI image rather than building from source during deploy\n\n## Troubleshooting\n\n**"App name is already taken"**\nChoose a different name or let the script auto-generate one.\n\n**Deployment fails with image pull error**\nEnsure the container image `ghcr.io/librefang/librefang:latest` exists and your Fly.io account has access to GitHub Packages.\n\n**Volume creation fails**\nFly.io quotas may limit volumes. Check your dashboard or run `flyctl volumes list`.\n\n**Machine suspended, slow response**\nFirst request after suspension triggers machine restart (~10-30 seconds). This is expected behavior with `auto_stop_machines = "suspend"`.',
                "deployment-gcp":
                    '# Deployment — gcp\n\n# Deploy — GCP Module\n\nProvisions a complete LibreFang deployment on Google Cloud Platform using the always-free tier. The module creates networking infrastructure, configures firewall rules, and uses cloud-init to provision a VM with LibreFang running as a systemd service.\n\n## Overview\n\nThis module deploys LibreFang on a single `e2-micro` VM with persistent storage, suitable for personal use, development, or light production workloads. All resources fall within GCP\'s free tier limits:\n\n| Resource | Free Allowance | Deployed |\n|----------|----------------|----------|\n| e2-micro instance | 1/month | 1 |\n| Standard PD storage | 30 GB/month | 30 GB |\n| Network egress | 1 GB/month | ~0 (minimal) |\n\nThe deployment completes in approximately 2 minutes and requires no ongoing management beyond configuration updates.\n\n## Architecture\n\n```mermaid\ngraph TB\n    subgraph GCP["GCP Project"]\n        subgraph Network["librefang-vpc / 10.0.1.0/24"]\n            subgraph Firewall["Firewall Rules"]\n                SSH["22 → librefang tag"]\n                HTTP["4545 → librefang tag"]\n            end\n            \n            VM["e2-micro VM<br/>Ubuntu 24.04<br/>30GB pd-standard"]\n            \n            VM --> Firewall\n        end\n    end\n    \n    User((("Developer"))) --> SSH\n    User --> HTTP\n    \n    HTTP -.->|":4545/api/health"| Health["Health Check"]\n    \n    VM -->|Systemd| Service["librefang.service"]\n    Service -->|Binary| LibreFang["LibreFang Process<br/>GROQ / OpenAI / Anthropic"]\n```\n\n## Component Details\n\n### Networking (`main.tf`)\n\nThe module creates a dedicated VPC with a private subnet to isolate the LibreFang instance:\n\n```hcl\nresource "google_compute_network" "librefang" {\n  name                    = "librefang-vpc"\n  auto_create_subnetworks = false  # Custom subnet only\n}\n\nresource "google_compute_subnetwork" "librefang" {\n  name          = "librefang-subnet"\n  ip_cidr_range = "10.0.1.0/24"\n}\n```\n\nUsing a custom subnet (rather than the default) provides:\n- Predictable IP ranges for future expansions\n- Explicit firewall control at the subnet level\n- No conflicts with other project resources\n\n### Firewall Rules\n\nTwo firewall rules control inbound access, both targeting instances with the `librefang` tag:\n\n| Rule | Port | Source | Purpose |\n|------|------|--------|---------|\n| `librefang-allow-ssh` | 22 | `0.0.0.0/0` | Administrative access |\n| `librefang-allow-http` | 4545 | `0.0.0.0/0` | LibreFang dashboard and API |\n\nSSH access is intentionally open to support initial setup and debugging. Consider restricting the source range for production deployments:\n\n```hcl\nsource_ranges = ["0.0.0.0/0"]  # Restrict for prod: ["${var.admin_ip}/32"]\n```\n\n### Compute Instance\n\n```hcl\nresource "google_compute_instance" "librefang" {\n  name         = "librefang"\n  machine_type = "e2-micro"\n  tags         = ["librefang"]  # Firewall target\n  \n  boot_disk {\n    initialize_params {\n      image = "ubuntu-os-cloud/ubuntu-2404-lts-amd64"\n      size  = 30\n      type  = "pd-standard"\n    }\n  }\n  \n  network_interface {\n    subnetwork = google_compute_subnetwork.librefang.id\n    access_config {}  # Ephemeral public IP\n  }\n}\n```\n\n**Key decisions:**\n- **e2-micro**: 0.25 vCPU, 1 GB RAM — sufficient for LibreFang\'s lightweight binary\n- **Ubuntu 24.04 LTS**: Current stable release with 10-year support\n- **pd-standard**: Included in free tier; pd-balanced or pd-ssd would improve performance at cost\n- **Ephemeral IP**: No static IP charge; IP changes on VM replacement\n\n### Cloud-Init Provisioning\n\nThe `cloud-init.yml.tpl` handles all VM configuration after boot. This is passed via the `user-data` metadata field.\n\n#### User Setup\n\nCreates a dedicated service account with sudo privileges:\n\n```yaml\nusers:\n  - name: librefang\n    shell: /bin/bash\n    sudo: ALL=(ALL) NOPASSWD:ALL\n```\n\nLibreFang runs as this user rather than root for security isolation.\n\n#### Package Installation\n\n```yaml\npackages:\n  - curl      # Downloads\n  - jq        # JSON parsing for release detection\n  - htop      # Resource monitoring\n  - fail2ban  # SSH brute-force protection\n```\n\n#### Systemd Service\n\nThe service unit file is written to `/etc/systemd/system/librefang.service`:\n\n```ini\n[Unit]\nDescription=LibreFang Agent OS\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=simple\nUser=librefang\nEnvironment=LIBREFANG_HOME=/data\nEnvironment=LIBREFANG_BIND=0.0.0.0:4545\nEnvironment=GROQ_API_KEY=${groq_api_key}\nEnvironment=OPENAI_API_KEY=${openai_api_key}\nEnvironment=ANTHROPIC_API_KEY=${anthropic_api_key}\nExecStart=/usr/local/bin/librefang start\nRestart=on-failure\nRestartSec=5\n\n# Security hardening\nProtectSystem=strict\nReadWritePaths=/data\nPrivateTmp=true\nNoNewPrivileges=true\n\n[Install]\nWantedBy=multi-user.target\n```\n\n**Hardening measures:**\n- `ProtectSystem=strict`: Mount `/usr`, `/boot`, `/etc` read-only\n- `ReadWritePaths=/data`: Explicitly allow writes to data directory only\n- `PrivateTmp=true`: Isolated /tmp and /var/tmp\n- `NoNewPrivileges=true`: Prevents privilege escalation\n\n#### Binary Installation\n\nThe runcmd section downloads the LibreFang release:\n\n```bash\nARCH=$(uname -m)\ncase "$ARCH" in\n  x86_64)  TARGET="x86_64-unknown-linux-gnu" ;;\n  aarch64) TARGET="aarch64-unknown-linux-gnu" ;;\nesac\n\n# Fetch download URL from GitHub API (latest) or construct directly (tag)\ncurl -fsSL "$DOWNLOAD_URL" -o /tmp/librefang.tar.gz\ntar xzf /tmp/librefang.tar.gz -C /usr/local/bin/\n```\n\nArchitecture detection handles both Intel/AMD (x86_64) and ARM (aarch64) VMs.\n\n## Provisioning Flow\n\n```\nterraform apply\n    │\n    ├─→ Create VPC "librefang-vpc"\n    │       └─→ Create subnet "librefang-subnet" (10.0.1.0/24)\n    │\n    ├─→ Create firewall rules\n    │       ├─→ Allow SSH (22) → librefang tag\n    │       └─→ Allow HTTP (4545) → librefang tag\n    │\n    └─→ Create VM "librefang"\n            │\n            └─→ Cloud-init executes (parallel):\n                    │\n                    ├─1. Create \'librefang\' user\n                    ├─2. Install packages (curl, jq, htop, fail2ban)\n                    ├─3. Create /data directory\n                    ├─4. Download LibreFang binary from GitHub\n                    ├─5. Install binary to /usr/local/bin/\n                    ├─6. Write systemd unit file\n                    └─7. Start librefang.service\n```\n\nCloud-init runs as root during provisioning. The `librefang` binary executes as the `librefang` user via systemd, with restricted permissions enforced by the service hardening.\n\n## Configuration\n\n### Required Variables\n\n```hcl\nproject_id = "my-gcp-project-123"  # GCP project identifier\n```\n\n### Optional Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `region` | `us-central1` | GCP region for resources |\n| `zone` | `us-central1-a` | Specific zone within region |\n| `ssh_pub_key_path` | `~/.ssh/id_rsa.pub` | Public key for `librefang` user |\n| `librefang_version` | `latest` | Release tag or `latest` |\n| `groq_api_key` | `""` | Groq API key (recommended for free tier) |\n| `openai_api_key` | `""` | OpenAI API key |\n| `anthropic_api_key` | `""` | Anthropic API key |\n\nAt least one LLM API key is required. Groq provides the best free tier experience with generous rate limits.\n\n### Generating terraform.tfvars\n\n```bash\ncd deploy/gcp\ncp terraform.tfvars.example terraform.tfvars\n```\n\nEdit the file:\n\n```hcl\nproject_id = "your-actual-project-id"\ngroq_api_key = "gsk_..."  # At least one key required\n```\n\n## Deployment\n\n### Initial Deployment\n\n```bash\n# Authenticate with GCP\ngcloud auth application-default login\n\n# Configure variables\ncp terraform.tfvars.example terraform.tfvars\nvim terraform.tfvars  # Add project_id and API keys\n\n# Deploy infrastructure\nterraform init\nterraform apply       # Type \'yes\' when prompted\n\n# Terraform outputs:\n# dashboard_url = "http://34.x.x.x:4545"\n# ssh_command   = "ssh librefang@34.x.x.x"\n```\n\n### Verifying Deployment\n\nWait approximately 60 seconds for cloud-init to complete, then:\n\n```bash\ncurl http://<external_ip>:4545/api/health\n```\n\nExpected response:\n\n```json\n{"status":"ok","version":"...","model":"groq/..."}\n```\n\n### SSH Access\n\n```bash\nssh librefang@<external_ip>\n```\n\nThe `librefang` user has passwordless sudo. To switch to root:\n\n```bash\nsudo -i\n```\n\n### Service Management\n\nOn the VM, control the LibreFang service:\n\n```bash\n# Check status\nsudo systemctl status librefang\n\n# View logs\nsudo journalctl -u librefang -f\n\n# Restart (after config changes)\nsudo systemctl restart librefang\n\n# Stop/start\nsudo systemctl stop librefang\nsudo systemctl start librefang\n```\n\n### Updating LibreFang\n\nTo upgrade the binary, redeploy with a specific version:\n\n```bash\n# Option 1: Use specific release tag\nterraform apply -var="librefang_version=v0.4.2-20260314"\n\n# Option 2: Update to latest\nterraform apply -var="librefang_version=latest"\n```\n\nCloud-init\'s idempotent runcmd will skip re-download if the binary already exists at the target path. To force reinstallation, either replace the VM or manually remove the binary first.\n\n### Tear Down\n\n```bash\nterraform destroy\n```\n\nThis removes all GCP resources created by the module. The `--auto-approve` flag can skip confirmation:\n\n```bash\nterraform destroy --auto-approve\n```\n\n## Cost Optimization\n\nThe current configuration stays within free tier limits. To reduce costs further:\n\n| Optimization | Impact |\n|--------------|--------|\n| Use Groq exclusively | Zero API cost up to rate limits |\n| Schedule downtime | Not applicable (always-on needed) |\n| Monitor egress | GCP free tier includes 1 GB/month; LibreFang uses minimal bandwidth |\n\nTo avoid unexpected charges:\n\n1. Set a billing budget alert in GCP Console\n2. Review [GCP free tier terms](https://cloud.google.com/free) — limits vary by region\n3. Monitor actual usage via `gcloud compute instances describe librefang`\n\n## Security Considerations\n\n### Current Configuration\n\n- **SSH open to internet**: Acceptable for development; restrict `source_ranges` for production\n- **No HTTPS**: Traffic to port 4545 is unencrypted; use a VPN or SSH tunnel for sensitive data\n- **API keys in metadata**: Visible in GCP Console; keys are injected into the VM\'s environment\n\n### Production Hardening\n\nFor internet-facing deployments:\n\n1. **Restrict SSH access**:\n   ```hcl\n   source_ranges = ["${var.admin_ip}/32"]  # Your IP only\n   ```\n\n2. **Add HTTPS termination**:\n   - Deploy nginx or Caddy as a reverse proxy\n   - Use Let\'s Encrypt for certificates\n   - Update firewall to route 443 → 4545\n\n3. **Store secrets in Secret Manager**:\n   ```hcl\n   data "google_secret_manager_secret_version" "groq_key" {\n     secret_id = "librefang-groq-key"\n   }\n   ```\n\n4. **Enable VPC Flow Logs** for network monitoring\n\n## Troubleshooting\n\n### Deployment Fails\n\n```bash\n# Check Terraform state\nterraform show\n\n# Validate configuration\nterraform validate\n\n# Review plan before applying\nterraform plan\n```\n\n### VM Won\'t Start\n\nCheck in GCP Console → Compute Engine → VM Instances → librefang → Logs\n\n### Cloud-Init Errors\n\nCloud-init logs are available in `/var/log/cloud-init-output.log`:\n\n```bash\nssh librefang@<ip>\nsudo cat /var/log/cloud-init-output.log\n```\n\n### LibreFang Not Responding\n\n```bash\n# Check service status\nsudo systemctl status librefang\n\n# View systemd journal\nsudo journalctl -u librefang --no-pager -n 50\n\n# Verify binary exists\nls -la /usr/local/bin/librefang\nfile /usr/local/bin/librefang\n\n# Test binary directly\nsudo -u librefang /usr/local/bin/librefang version\n```\n\n### Health Check Returns Error\n\n```bash\n# From your local machine\ncurl -v http://<ip>:4545/api/health\n\n# On the VM\ncurl -v http://localhost:4545/api/health\n\n# Check LibreFang logs for startup errors\nsudo journalctl -u librefang | grep -i error\n```\n\n## File Structure\n\n```\ndeploy/gcp/\n├── main.tf                 # GCP resource definitions\n├── variables.tf            # Input variable declarations\n├── outputs.tf             # Output value definitions\n├── terraform.tfvars.example # Configuration template\n├── cloud-init.yml.tpl      # VM provisioning template\n└── README.md               # This module\'s documentation\n```\n\n## Relationship to Codebase\n\nThis module is independent of the LibreFang core codebase. It consumes the pre-built binary distributed via GitHub Releases (`librefang-*.tar.gz`). The module does not interact with:\n\n- Source code in `src/`\n- Tests in `tests/`\n- Package definitions in `package.json` or similar\n\nThe only coupling is the release artifact URL pattern:\n\n```\nhttps://github.com/librefang/librefang/releases/download/{version}/librefang-{target}.tar.gz\n```\n\nWhen releasing a new version, ensure the release tag matches `librefang_version` variable or use `latest` to always pull the most recent release.',
                "deployment-grafana":
                    '# Deployment — grafana\n\n# LibreFang Grafana Monitoring Dashboards\n\nThis module provides pre-configured Grafana dashboards for monitoring a LibreFang deployment. Dashboards are automatically provisioned at startup via YAML configuration, pulling metrics from a Prometheus data source.\n\n## Architecture Overview\n\n```mermaid\ngraph LR\n    subgraph Grafana["Grafana Instance"]\n        D1[dashboards]\n        D2[datasources]\n    end\n    \n    subgraph Prometheus["Prometheus"]\n        M1[Metrics]\n    end\n    \n    subgraph LibreFang["LibreFang Application"]\n        A1[librefang tokens]\n        A2[librefang http requests]\n        A3[librefang agents]\n        A4[librefang cost]\n    end\n    \n    D2 -->|queries| M1\n    M1 -->|scrapes| A1\n    M1 -->|scrapes| A2\n    M1 -->|scrapes| A3\n    M1 -->|scrapes| A4\n    D1 -->|renders| M1\n```\n\n## Dashboard Inventory\n\n| Dashboard | UID | Purpose |\n|-----------|-----|---------|\n| Overview | `librefang-overview` | System health, version, uptime, agent/session counts, panics/restarts |\n| LLM & Token Usage | `librefang-llm` | Token consumption, LLM calls, input/output breakdown by agent/provider/model |\n| HTTP & API | `librefang-http` | Request rates, latency percentiles, error rates, slow endpoints |\n| Cost & Budget | `librefang-cost` | USD cost tracking, token-based cost attribution, model cost distribution |\n\n## Provisioning Configuration\n\n### Dashboard Provider (`deploy/grafana/provisioning/dashboards/dashboard.yml`)\n\n```yaml\napiVersion: 1\nproviders:\n  - name: "LibreFang"\n    orgId: 1\n    folder: ""\n    type: file\n    disableDeletion: false\n    editable: true\n    options:\n      path: /var/lib/grafana/dashboards\n```\n\nDashboards are loaded from `/var/lib/grafana/dashboards/` as JSON files. The `editable: true` setting allows in-browser modifications.\n\n### Prometheus Data Source (`deploy/grafana/provisioning/datasources/prometheus.yml`)\n\n```yaml\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    uid: librefang-prometheus\n    access: proxy\n    url: http://prometheus:9090\n    isDefault: true\n```\n\nThe data source uses proxy access mode to `http://prometheus:9090`. All dashboard panels reference this datasource via UID `librefang-prometheus`.\n\n## Dashboard Navigation\n\nEach dashboard includes links in the top navigation bar for cross-dashboard navigation:\n\n```json\n"links": [\n  { "title": "Overview", "url": "/d/librefang-overview" },\n  { "title": "LLM & Tokens", "url": "/d/librefang-llm" },\n  { "title": "HTTP & API", "url": "/d/librefang-http" },\n  { "title": "Cost & Budget", "url": "/d/librefang-cost" }\n]\n```\n\n## Overview Dashboard (`librefang.json`)\n\nDisplays system-wide health and operational metrics with a 1-hour default time range.\n\n### Key Panels\n\n| Panel | Metric | Description |\n|-------|--------|-------------|\n| Version | `librefang_info` | Current LibreFang version |\n| Uptime | `librefang_uptime_seconds` | System uptime in `dtdurations` format |\n| Active Agents | `librefang_agents_active` | Currently active agent count (thresholds: >10 yellow, >50 red) |\n| Total Agents | `librefang_agents_total` | Total registered agents |\n| Active Sessions | `librefang_active_sessions` | Concurrent user sessions (thresholds: >5 yellow, >20 red) |\n| Cost Today | `librefang_cost_usd_today` | Daily cost in USD (thresholds: >$1 yellow, >$10 red) |\n| Panics | `librefang_panics_total` | Total panic count (thresholds: >1 orange, >100 red) |\n| Restarts | `librefang_restarts_total` | Total restart count (threshold: >1 red) |\n\n### Time Series Panels\n\n- **Panics & Restarts Over Time** — Tracks the cumulative panic and restart counts to identify instability patterns\n- **Active vs Total Agents** — Compares active agent load against total registered agents\n\n## LLM & Token Usage Dashboard (`librefang-llm.json`)\n\nFocused on token consumption and LLM interaction metrics with filterable variables for `agent`, `provider`, and `model`.\n\n### Template Variables\n\n```yaml\n- name: agent\n  query: label_values(librefang_tokens, agent)\n- name: provider\n  query: label_values(librefang_tokens, provider)\n- name: model\n  query: label_values(librefang_tokens{provider=~"$provider"}, model)\n```\n\nThe `model` variable\'s query depends on the selected `provider`, enabling hierarchical filtering.\n\n### Key Panels\n\n| Panel | Metrics | Visualization |\n|-------|---------|---------------|\n| Total / Input / Output Tokens | `librefang_tokens`, `librefang_tokens_input`, `librefang_tokens_output` | Stat cards |\n| LLM Calls | `librefang_llm_calls` | Stat card |\n| Tokens Consumed by Agent | `librefang_tokens` grouped by agent | Stacked timeseries |\n| LLM Calls by Agent | `librefang_llm_calls` grouped by agent | Stacked bar chart |\n| Input vs Output Tokens | `librefang_tokens_input`, `librefang_tokens_output` | Stacked bar chart |\n| Tokens by Provider/Model | `librefang_tokens` grouped by `(provider, model)` | Stacked timeseries |\n| Agent Token Breakdown | `librefang_tokens` | Donut pie chart |\n| Token Input/Output Ratio | `librefang_tokens_input`, `librefang_tokens_output` | Donut pie chart |\n| Tool Calls by Agent | `librefang_tool_calls` | Stacked bar chart |\n\n### Key Metric Labels\n\n- `agent` — Name of the agent making the request\n- `provider` — LLM provider (e.g., openai, anthropic)\n- `model` — Model identifier (e.g., gpt-4, claude-3)\n\n## HTTP & API Dashboard (`librefang-http.json`)\n\nMonitors HTTP traffic patterns and API performance with a 1-hour default time range.\n\n### Key Panels\n\n| Panel | Metrics | Description |\n|-------|---------|-------------|\n| HTTP Request Rate | `rate(librefang_http_requests_total[5m])` | Requests per second, total and by method |\n| Request Latency (p50/p90/p99) | `histogram_quantile()` on duration histogram | Latency percentiles in seconds |\n| Request Rate by Status Code | `rate(librefang_http_requests_total[5m])` grouped by status | Stacked view of 2xx/4xx/5xx responses |\n| HTTP Error Rate | `rate(librefang_http_requests_total{status=~"4.."}[5m])` | 4xx and 5xx error rates |\n| Top Endpoints by Request Count | `topk(10, sum by (path) (increase(...)))` | Top 10 busiest endpoints |\n| Slowest Endpoints | `histogram_quantile(0.99, ...)` grouped by path | Top 10 highest p99 latency endpoints |\n\n### Latency Thresholds\n\nThe latency panel uses color-coded percentiles:\n- **p50** — green (typical response time)\n- **p90** — orange (slow requests)\n- **p99** — red (tail latency)\n\n## Cost & Budget Dashboard (`librefang-cost.json`)\n\nTracks LLM usage costs and token-driven cost attribution with filterable variables for `agent`, `provider`, and `model`.\n\n### Key Panels\n\n| Panel | Metrics | Visualization |\n|-------|---------|---------------|\n| Cost Today | `librefang_cost_usd_today` | Stat card with USD currency formatting (thresholds: >$1 yellow, >$5 orange, >$10 red) |\n| Total Tokens (1h) | `sum(librefang_tokens{...})` | Stat card |\n| LLM Calls (1h) | `sum(librefang_llm_calls{...})` | Stat card |\n| Cost Trend | `librefang_cost_usd_today` | Timeseries showing cost accumulation |\n| Tokens by Agent | `librefang_tokens{...}` grouped by agent | Stacked timeseries (token volume as cost proxy) |\n| Cost by Model | `librefang_tokens` grouped by `(provider, model)` | Donut pie chart |\n| Output Tokens by Agent | `topk(10, librefang_tokens_output{...})` | Bar gauge showing top 10 agents by output token count |\n| Input/Output Token Ratio | `sum(librefang_tokens_input)`, `sum(librefang_tokens_output)` | Donut pie chart |\n\n### Cost Insight\n\nOutput tokens are annotated as 3-5x more expensive than input tokens. The output token bar gauge helps identify which agents are generating the highest-cost completions.\n\n## Prometheus Metrics Reference\n\nThe dashboards query the following metrics exported by the LibreFang application:\n\n| Metric | Type | Labels | Description |\n|--------|------|--------|-------------|\n| `librefang_info` | Gauge | `version` | Build information |\n| `librefang_uptime_seconds` | Gauge | — | Seconds since process start |\n| `librefang_agents_active` | Gauge | — | Currently active agents |\n| `librefang_agents_total` | Gauge | — | Total registered agents |\n| `librefang_active_sessions` | Gauge | — | Active user sessions |\n| `librefang_cost_usd_today` | Gauge | — | Today\'s cumulative cost in USD |\n| `librefang_panics_total` | Counter | — | Total panic events |\n| `librefang_restarts_total` | Counter | — | Total restart events |\n| `librefang_tokens` | Counter | `agent`, `provider`, `model` | Total tokens consumed |\n| `librefang_tokens_input` | Counter | `agent`, `provider`, `model` | Input (prompt) tokens |\n| `librefang_tokens_output` | Counter | `agent`, `provider`, `model` | Output (completion) tokens |\n| `librefang_llm_calls` | Counter | `agent`, `provider`, `model` | LLM API call count |\n| `librefang_tool_calls` | Counter | `agent`, `provider`, `model` | Tool invocation count |\n| `librefang_http_requests_total` | Counter | `method`, `path`, `status` | Total HTTP requests |\n| `librefang_http_request_duration_seconds_bucket` | Histogram | `method`, `path`, `status` | Request duration buckets |\n\n## Deployment Requirements\n\nThe dashboards assume:\n\n1. **Prometheus** is running and accessible at `http://prometheus:9090`\n2. **LibreFang** is configured to expose Prometheus metrics at its `/metrics` endpoint\n3. Prometheus has a scrape target configured for the LibreFang application\n\n### Container Volume Mounts\n\nFor the provisioning to work in Docker/Kubernetes:\n\n| Host Path | Container Path | Purpose |\n|-----------|---------------|---------|\n| `deploy/grafana/dashboards/` | `/var/lib/grafana/dashboards/` | Dashboard JSON files |\n| `deploy/grafana/provisioning/dashboards/` | `/etc/grafana/provisioning/dashboards/` | Dashboard provider config |\n| `deploy/grafana/provisioning/datasources/` | `/etc/grafana/provisioning/datasources/` | Datasource config |\n\n## Customization\n\n### Adding New Metrics\n\nTo extend dashboards with new metrics:\n\n1. Ensure the metric is exported by LibreFang (check `/metrics` endpoint)\n2. Edit the dashboard JSON directly or via Grafana UI (`editable: true` is set)\n3. Add a new panel targeting the metric with appropriate visualization\n\n### Threshold Tuning\n\nEach panel\'s `thresholds` can be adjusted based on your deployment scale:\n\n```json\n"thresholds": {\n  "mode": "absolute",\n  "steps": [\n    { "color": "green", "value": null },\n    { "color": "yellow", "value": 100 },  // Adjust to match your baseline\n    { "color": "red", "value": 1000 }\n  ]\n}\n```\n\n### New Template Variables\n\nTo add filtering by additional dimensions (e.g., `region`, `environment`), add to the `templating.list` array:\n\n```json\n{\n  "name": "environment",\n  "label": "Environment",\n  "type": "query",\n  "datasource": { "type": "prometheus", "uid": "librefang-prometheus" },\n  "query": "label_values(librefang_tokens, environment)",\n  "refresh": 2,\n  "includeAll": true,\n  "allValue": ".*"\n}\n```',
                "deployment-prometheus":
                    '# Deployment — prometheus\n\n# Prometheus Deployment Module\n\n## Overview\n\nThis module provides the Prometheus configuration for monitoring the librefang service. It defines a scrape job that periodically collects metrics from librefang\'s `/api/metrics` endpoint.\n\n## Configuration Structure\n\n```yaml\nglobal:\n  scrape_interval: 15s      # How often to scrape targets\n  evaluation_interval: 15s   # How often to evaluate rules\n\nscrape_configs:\n  - job_name: "librefang"    # Unique identifier for this scrape job\n    metrics_path: /api/metrics\n    static_configs:\n      - targets: ["host.docker.internal:4545"]\n        labels:\n          instance: "librefang-local"\n```\n\n## Configuration Parameters\n\n| Parameter | Value | Description |\n|-----------|-------|-------------|\n| `scrape_interval` | 15s | Frequency at which Prometheus collects metrics from targets |\n| `evaluation_interval` | 15s | Frequency of rule/alert evaluation cycles |\n| `job_name` | "librefang" | Logical name for the scraped targets |\n| `metrics_path` | `/api/metrics` | HTTP endpoint on the target service exposing Prometheus-formatted metrics |\n| `targets` | `host.docker.internal:4545` | Target address for metrics collection |\n| `instance` label | "librefang-local" | Distinguishes this local deployment from other environments |\n\n## Target Resolution\n\nThe target `host.docker.internal:4545` uses Docker\'s special DNS name to reach the host machine from within a container. This allows the Prometheus container to scrape a service running directly on the host machine (librefang) rather than within Docker\'s network.\n\n**Prerequisites:**\n- Prometheus must run inside a Docker container\n- The host machine must have a service listening on port 4545\n- Docker must support `host.docker.internal` (available in Docker Desktop and Docker Engine 20.03+)\n\n## Integration with Librefang\n\nThe librefang service must expose a `/api/metrics` endpoint that returns metrics in Prometheus text format:\n\n```\n# HELP <metric_name> <description>\n# TYPE <metric_name> <type>\n<metric_name>{<labels>} <value>\n```\n\nTypical metrics collected include:\n- HTTP request counts and latencies\n- Database query statistics\n- Cache hit/miss ratios\n- Business logic counters\n\n## Usage\n\nThis configuration file is typically mounted into the Prometheus container:\n\n```bash\ndocker run -d \\\n  --name prometheus \\\n  -p 9090:9090 \\\n  -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml \\\n  prom/prometheus\n```\n\nAlternatively, include it in a Docker Compose `volumes` section:\n\n```yaml\nservices:\n  prometheus:\n    image: prom/prometheus\n    volumes:\n      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro\n    ports:\n      - "9090:9090"\n```\n\n## Extending the Configuration\n\nTo monitor additional services, add new entries under `scrape_configs`. For example:\n\n```yaml\nscrape_configs:\n  # ... existing librefang config ...\n\n  - job_name: "additional-service"\n    metrics_path: /metrics\n    static_configs:\n      - targets: ["additional-service:8080"]\n```',
                "deployment-railway":
                    '# Deployment — railway\n\n# Railway Deployment Module\n\n## Overview\n\nThis module provides Railway deployment configuration for the application. Railway is a modern deployment platform that supports Docker-based deployments with built-in health checks and restart policies.\n\nThe module contains two equivalent configuration files:\n- `railway.json` — JSON Schema format\n- `railway.toml` — TOML format\n\nBoth files express the same configuration; Railway accepts either format.\n\n## Configuration\n\n### Build Configuration\n\n```json\n"build": {\n  "dockerfilePath": "./deploy/Dockerfile"\n}\n```\n\n| Field | Value | Description |\n|-------|-------|-------------|\n| `dockerfilePath` | `./deploy/Dockerfile` | Relative path from project root to the Dockerfile used for building the container image |\n\n### Deploy Configuration\n\n```json\n"deploy": {\n  "healthcheckPath": "/api/health",\n  "restartPolicyType": "ON_FAILURE"\n}\n```\n\n| Field | Value | Description |\n|-------|-------|-------------|\n| `healthcheckPath` | `/api/health` | HTTP endpoint Railway uses to verify the container is healthy. The application must respond with a 2xx status code. |\n| `restartPolicyType` | `ON_FAILURE` | Container restarts only when the process exits with a non-zero status code. Does not restart on successful completion. |\n\n## Deployment Pipeline\n\nRailway reads this configuration and executes the following workflow:\n\n1. **Build Phase** — Railway invokes Docker to build the image using the specified Dockerfile\n2. **Health Check** — After container starts, Railway polls `/api/health` to confirm readiness\n3. **Runtime** — Container runs continuously, restarting automatically on failure per the restart policy\n\n```\n┌─────────────┐     ┌─────────────┐     ┌─────────────────────┐\n│   Build     │────▶│   Start     │────▶│  Health Check Loop   │\n│  (Docker)   │     │  Container  │     │  GET /api/health     │\n└─────────────┘     └─────────────┘     └─────────────────────┘\n                                                    │\n                    ┌───────────────────────────────┘\n                    │  Container exits with code ≠ 0\n                    ▼\n              ┌───────────┐\n              │  Restart  │\n              │  Container│\n              └───────────┘\n```\n\n## Prerequisites\n\nFor this deployment to succeed, the application must expose:\n\n- **`/api/health`** — A `GET` endpoint that returns HTTP 200 when the service is ready to accept traffic\n\nThe Dockerfile at `./deploy/Dockerfile` must exist and produce a working container image.\n\n## Relationship to Other Modules\n\nThis module does not call or depend on application code at runtime. It is purely a platform configuration consumed by Railway\'s deployment system. The Dockerfile it references will typically bundle the compiled application and define the startup command.\n\n## Usage\n\nConnect your GitHub repository to a Railway project. Railway automatically detects the `railway.json` or `railway.toml` file and applies the configuration during deployment.',
                "deployment-render-yaml":
                    "# Deployment — render.yaml\n\n# Deployment Configuration — render.yaml\n\nThis file defines the deployment configuration for Librefang on [Render.com](https://render.com), a cloud platform that hosts the application's Docker container.\n\n## Overview\n\nThe configuration deploys Librefang as a single Docker-based web service with the following characteristics:\n\n| Property | Value |\n|----------|-------|\n| Runtime | Docker |\n| Plan | Free tier |\n| Health Check | `GET /api/health` |\n| Dockerfile | `deploy/Dockerfile` |\n\n## Service Configuration\n\n```yaml\nservices:\n  - type: web\n    runtime: docker\n    name: librefang\n    dockerfilePath: deploy/Dockerfile\n    plan: free\n    healthCheckPath: /api/health\n```\n\n### Key Properties\n\n- **`type: web`** — Marks this as an HTTP web service, making it publicly accessible via HTTPS.\n- **`runtime: docker`** — Instructs Render to build and run a Docker container rather than using a platform-supported language runtime.\n- **`dockerfilePath`** — Points to `deploy/Dockerfile` which contains the instructions for building the application image.\n- **`healthCheckPath`** — Render periodically sends `GET /api/health` requests. The service must return a 2xx response to pass health checks. This endpoint is expected to be implemented in the application.\n- **`plan: free`** — Runs on Render's free tier with [ephemeral disk storage](#storage-considerations).\n\n## Environment Variables\n\n```yaml\nenvVars:\n  - key: GROQ_API_KEY\n    sync: false\n  - key: OPENAI_API_KEY\n    sync: false\n  - key: ANTHROPIC_API_KEY\n    sync: false\n```\n\nAll three API keys follow the same pattern:\n\n| Property | Purpose |\n|----------|---------|\n| `key` | The environment variable name consumed by the application |\n| `sync: false` | Prevents Render from syncing a value from the dashboard on each deploy. The actual key values are managed via the Render dashboard or `render-cli` and are not stored in this file. |\n\n### Required Keys\n\n| Variable | Purpose |\n|----------|---------|\n| `GROQ_API_KEY` | API key for Groq LLM inference |\n| `OPENAI_API_KEY` | API key for OpenAI LLM inference |\n| `ANTHROPIC_API_KEY` | API key for Anthropic LLM inference |\n\nThese keys must be set in the Render dashboard before the service will function correctly. The application expects these variables to be present at runtime.\n\n## Storage Considerations\n\nThe free tier uses **ephemeral disk storage**, meaning:\n\n- All files written to disk are lost when the container restarts or is redeployed\n- Any local database files, cached data, or configuration written to disk will be reset\n- The `/data` directory (if used) will not persist between deployments\n\n### Enabling Persistent Storage\n\nTo use persistent storage, upgrade to a paid Render plan and add a persistent disk:\n\n```yaml\nservices:\n  - type: web\n    # ... existing config ...\n    disk:\n      name: librefang-data\n      mountPath: /data\n      sizeGB: 1\n    envVars:\n      - key: LIBREFANG_HOME\n        value: /data\n```\n\nThis mounts a 1 GB persistent disk at `/data` and sets `LIBREFANG_HOME` so the application writes persistent data there instead of ephemeral storage.\n\n## Relationship to Codebase\n\n```\nlibrefang/\n├── deploy/\n│   └── Dockerfile      ← Referenced by dockerfilePath\n└── render.yaml         ← This file\n```\n\nThe `render.yaml` references `deploy/Dockerfile`, which builds the application container. The health check endpoint `/api/health` must be implemented in the application's API routes to pass Render's verification.\n\n## Deployment Process\n\n1. Render detects changes to `render.yaml` or receives a manual deploy trigger\n2. Render builds the Docker image using `deploy/Dockerfile`\n3. The container starts and reads required environment variables\n4. Render verifies the service responds to `GET /api/health`\n5. The service becomes available at `https://librefang.onrender.com`",
                "deployment-whatsapp-gateway":
                    '# Deployment — whatsapp-gateway\n\n# WhatsApp Gateway — LibreFang\n\nThe WhatsApp gateway bridges WhatsApp Web with the LibreFang agent runtime. It handles QR-code authentication, incoming message routing, media processing, streaming LLM responses, and outbound messaging. Messages are persisted to a local SQLite database for history, retry recovery, and gap detection.\n\n## Architecture Overview\n\n```mermaid\nflowchart LR\n    subgraph WhatsApp["WhatsApp (Baileys)"]\n        WA["WhatsApp\\nApp"]\n    end\n\n    subgraph Gateway["whatsapp-gateway"]\n        HTTP["HTTP Server\\n:3009"]\n        SQLite["SQLite DB\\nmessages.db"]\n        Socket["Baileys\\nSocket"]\n        Router["Message\\nRouter"]\n        Media["Media\\nProcessor"]\n        Stream["Streaming\\nHandler"]\n    end\n\n    subgraph LibreFang["LibreFang Daemon"]\n        API["/api/agents/{id}/message"]\n        StreamAPI["/api/agents/{id}/message/stream"]\n    end\n\n    WA <-->|Web Protocol| Socket\n    HTTP <-->|HTTP| Router\n    Router <-->|Context, Tags| Stream\n    Stream <-->|SSE, JSON| API\n    Stream <-->|SSE| StreamAPI\n    Router -->|Download/Upload| Media\n    Socket -->|Persist| SQLite\n    Media -->|HTTP| API\n```\n\n## Configuration\n\nThe gateway reads configuration from two sources, in priority order:\n\n1. **Environment variables** (override everything)\n2. **`~/.librefang/config.toml`** (primary source)\n\n### Environment Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `WHATSAPP_DB_PATH` | `messages.db` in gateway dir | SQLite database path |\n| `WHATSAPP_GATEWAY_PORT` | `3009` | HTTP server port |\n| `WHATSAPP_OWNER_JID` | — | Single owner number (alternative to config) |\n| `LIBREFANG_URL` | `http://127.0.0.1:4545` | LibreFang daemon URL |\n| `LIBREFANG_DEFAULT_AGENT` | `assistant` | Default agent name |\n| `LIBREFANG_CONFIG` | `~/.librefang/config.toml` | Config file path |\n| `CONVERSATION_TTL_HOURS` | `24` | Conversation expiration time |\n\n### config.toml Structure\n\n```toml\n[channels.whatsapp]\ndefault_agent = "assistant"\nowner_numbers = ["+1234567890", "+0987654321"]\nconversation_ttl_hours = 24\n```\n\n### Owner Routing\n\nOwner numbers from config are normalized to JIDs (`+1234567890` → `1234567890@s.whatsapp.net`). The **primary owner** (first in the list) receives escalation notifications. All owners can send relay commands.\n\n## Message Flow\n\n### Incoming Messages (WhatsApp → LibreFang → WhatsApp)\n\n```mermaid\nsequenceDiagram\n    participant WA as WhatsApp\n    participant GW as Gateway\n    participant DB as SQLite\n    participant LF as LibreFang\n\n    WA->>GW: Incoming message (Baileys event)\n    GW->>GW: Deduplicate (60s window)\n    GW->>GW: Rate limit check (3/min per JID)\n    GW->>DB: Save message (processed=0)\n    GW->>GW: Route by sender type\n    GW->>GW: Build context prefix\n    alt Media attached\n        GW->>GW: Download from WhatsApp\n        GW->>GW: Upload to LibreFang\n    end\n    GW->>LF: POST /api/agents/{id}/message\n    LF-->>GW: LLM response\n    alt Stranger sender\n        GW->>GW: Extract NOTIFY_OWNER tags\n        GW->>WA: Send reply to stranger\n        GW->>WA: Notify owner (if escalated)\n    else Owner sender\n        GW->>GW: Extract RELAY_TO_STRANGER tags\n        GW->>WA: Send relay(s)\n    end\n    GW->>DB: Mark message processed\n```\n\n### Sender Types\n\nThe gateway classifies each incoming message:\n\n| Type | Condition | Routing |\n|------|-----------|---------|\n| **Owner** | Sender JID in `OWNER_JIDS` | Reply directly; allow RELAY commands |\n| **Stranger** | Not in `OWNER_JIDS`, not group | Reply directly; allow NOTIFY_OWNER |\n| **Group** | JID ends with `@g.us` | Reply if mentioned |\n\n### Context Prefixes\n\nStranger messages receive a contextual prefix so the LLM understands the routing context:\n\n```\n[WHATSAPP_STRANGER_CONTEXT]\nIncoming WhatsApp message from: Alice (+1234567890)\nThis person is NOT the owner. They are an external contact.\nActive conversation: 5 messages, started 2024-01-15T10:30:00Z\n\nAvailable routing tags:\n- [NOTIFY_OWNER]{"reason": "...", "summary": "..."}[/NOTIFY_OWNER]\n[/WHATSAPP_STRANGER_CONTEXT]\n```\n\nOwner messages include active conversation summaries when strangers are being managed:\n\n```\n[ACTIVE_STRANGER_CONVERSATIONS]\n1. Alice (+1234567890) [JID: ...] — last: "Hello?" (5min ago)\n[/ACTIVE_STRANGER_CONVERSATIONS]\n\n[OWNER_MESSAGE]\nThe user wants to reply to the stranger\n```\n\n## Agent Commands\n\nThe gateway recognizes special tags in LLM responses:\n\n### NOTIFY_OWNER (Stranger Escalation)\n\n```json\n[NOTIFY_OWNER]{"reason": "urgent", "summary": "Customer needs help with billing"}[/NOTIFY_OWNER]\n```\n\nWhen the agent includes this tag, the gateway sends a notification to the primary owner. Escalations are debounced (5-minute cooldown per stranger) to prevent notification spam.\n\n### RELAY_TO_STRANGER (Owner-Initiated Outreach)\n\n```json\n[RELAY_TO_STRANGER]{"jid":"1234567890@s.whatsapp.net","message":"Your order has shipped!"}[/RELAY_TO_STRANGER]\n```\n\nWhen the owner sends a message that the agent interprets as a reply to a stranger, the gateway extracts this tag and sends the reformulated message. Relay commands are validated:\n\n- JID must correspond to an active conversation (prevents arbitrary outreach)\n- Socket must be connected\n- All relays are audit-logged\n\n## Streaming Responses\n\nThe gateway uses Server-Sent Events (SSE) for progressive LLM responses. As tokens arrive, the gateway edits the WhatsApp message in-place, giving users a "typing" effect:\n\n1. Agent sends first token → initial message sent to WhatsApp\n2. Subsequent tokens arrive → message edited in-place (`edit` parameter)\n3. Stream completes → final message confirmed\n\nThis works because Baileys supports editing sent messages. The streaming endpoint is `/api/agents/{id}/message/stream`. If SSE fails (wrong content-type, connection error), it falls back to non-streaming.\n\n**Minimum edit interval**: 2000ms to avoid WhatsApp rate limiting on edits.\n\n## Media Processing\n\n### Download Flow\n\n1. Detect downloadable media type (image, video, audio, sticker, document)\n2. Download from Baileys (30s timeout, one retry)\n3. Check size limit (50MB)\n4. Upload to LibreFang (`/api/agents/{id}/upload`)\n5. Return `{ file_id, transcription? }`\n\n### Supported Types\n\n| Type | Caption Handling | Transcription |\n|------|------------------|---------------|\n| Image | Caption becomes message text | No |\n| Video | Caption becomes message text | No |\n| Audio (voice note) | None | Yes (if available) |\n| Audio (file) | Caption becomes message text | Yes (if available) |\n| Sticker | Metadata descriptor | No |\n| Document | Caption becomes message text | No |\n\n### Location Messages\n\nLocation and live location messages are converted to a Google Maps link:\n\n```\n[Location: Central Park — 40.7829, -73.9654 — https://maps.google.com/?q=40.7829,-73.9654]\n```\n\n### Contact Messages\n\nShared contacts are parsed from vCard format:\n\n```\n[Shared contact: John Doe +1234567890]\n```\n\n## SQLite Schema\n\n```sql\nCREATE TABLE messages (\n    id TEXT PRIMARY KEY,\n    jid TEXT NOT NULL,\n    sender_jid TEXT,\n    push_name TEXT,\n    phone TEXT,\n    text TEXT,\n    direction TEXT NOT NULL,  -- \'inbound\' | \'outbound\'\n    timestamp INTEGER NOT NULL,\n    processed INTEGER DEFAULT 0,  -- 0=pending, 1=success, -1=failed\n    retry_count INTEGER DEFAULT 0,\n    raw_type TEXT,\n    created_at TEXT DEFAULT (datetime(\'now\'))\n);\n\nCREATE TABLE jid_last_seen (\n    jid TEXT PRIMARY KEY,\n    last_timestamp INTEGER NOT NULL,\n    updated_at TEXT DEFAULT (datetime(\'now\'))\n);\n```\n\n### Indexes\n\n- `idx_messages_jid_ts`: Query messages by JID and timestamp range\n- `idx_messages_processed`: Find unprocessed messages for catch-up\n\n## Background Tasks\n\n| Task | Interval | Description |\n|------|----------|-
