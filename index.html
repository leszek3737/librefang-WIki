─────┘  └─────────────┘  │\n│                                                  │\n│  Error types · Serialization helpers             │\n└──────────────────────┬──────────────────────────┘\n                       │ depends on\n              ┌────────┴─────────┐\n              │ librefang-types  │\n              └──────────────────┘\n```\n\n## Key Concepts\n\n### Hand Definition\n\nA hand is defined declaratively, typically authored in TOML for human readability and serialized to JSON for machine consumption. Each hand carries:\n\n- **Identity** — A unique identifier (UUID) and a human-readable name.\n- **Metadata** — Version, description, authorship, and timestamps (`chrono`).\n- **Capability specification** — What this hand provides to the autonomous system.\n- **Requirements** — Dependencies or conditions the hand expects to be satisfied.\n\n### Hand Registry\n\nThe registry is backed by `DashMap`, a concurrent hashmap, allowing multiple threads to query and update the set of available hands without external locking. This is important because LibreFang's runtime may load or reload hands while other components are reading from the registry.\n\n### Serialization Formats\n\n| Format | Purpose |\n|--------|---------|\n| TOML   | Authoring — hand definition files written by developers |\n| JSON   | Transport — machine-readable interchange between crates |\n\nBoth are supported via `serde` with derived `Serialize`/`Deserialize` implementations on hand data structures.\n\n## Dependencies\n\n| Dependency | Role in this crate |\n|------------|-------------------|\n| `librefang-types` | Shared type definitions used across all LibreFang crates |\n| `serde` / `serde_json` / `toml` | Declarative parsing and serialization of hand definitions |\n| `thiserror` | Typed error definitions for loading and validation failures |\n| `tracing` | Structured logging of hand lifecycle events |\n| `uuid` | Unique identification of hand instances |\n| `chrono` | Timestamps for creation and modification tracking |\n| `dashmap` | Lock-free concurrent registry storage |\n\n## Testing\n\nTests use `tempfile` for creating isolated hand definition files, `librefang-runtime` for integration scenarios, and `serial_test` to serialize tests that share global state. Tests validate parsing, validation rules, registry operations, and serialization round-trips.\n\n## Relationship to Other Crates\n\n- **`librefang-types`** — Foundational types that hands reference (enums, structs shared across the system).\n- **`librefang-runtime`** — Consumes hands from the registry and executes their declared capabilities. Listed as a dev-dependency here for integration testing only; at runtime, the dependency flows the other direction.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder with proxy support and TLS certificate fallback for the LibreFang workspace.\n\n## Purpose\n\nThis crate provides a centralized, reusable HTTP client construction layer consumed by other LibreFang crates that need to make outbound HTTP requests. It encapsulates two concerns that would otherwise be duplicated across the codebase:\n\n1. **TLS configuration** — Assembling a `rustls` certificate store that attempts to load the bundled Mozilla roots (`webpki-roots`) and augments them with the host system's native certificate store (`rustls-native-certs`). This \"both sources, fallback\" strategy maximizes compatibility across platforms and deployment environments.\n\n2. **Proxy and client assembly** — Building a `reqwest` client with the correct TLS backend, proxy settings, and any workspace-standard defaults.\n\nAll other LibreFang crates that need HTTP capabilities depend on this crate rather than configuring `reqwest` directly.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the workspace |\n| `reqwest` | HTTP client; configured with the `rustls-tls` backend |\n| `rustls` | TLS implementation used to build a custom certificate verifier |\n| `webpki-roots` | Bundled Mozilla CA certificates — works everywhere without system dependency |\n| `rustls-native-certs` | Loads certificates from the OS trust store — supplements `webpki-roots` for corporate/self-signed CAs |\n| `tracing` | Structured logging for certificate loading diagnostics |\n\n## TLS Certificate Strategy\n\n```mermaid\nflowchart TD\n    A[Build HTTP Client] --> B[Create rustls::RootCertStore]\n    B --> C[Add webpki-roots]\n    B --> D[Load native certs]\n    C --> E[RootCertStore]\n    D --> E\n    E --> F[Build reqwest TLS config]\n    F --> G[Return configured ClientBuilder / Client]\n    D -.->|tracing::warn on failure| H[Log warning, continue with webpki only]\n```\n\nThe certificate store is populated from both sources. If native certificate loading fails (for example, in a minimal container without ca-certificates), the bundled Mozilla roots remain available and the process continues. Failures are emitted via `tracing::warn` so operators can diagnose TLS issues from logs.\n\n## Relationship to the Workspace\n\n```\nlibrefang-types  ←──  librefang-http  ←──  (other LibreFang crates)\n```\n\n- **Imports from** `librefang-types` for any shared configuration or error types.\n- **Consumed by** any crate in the workspace that makes outbound HTTP calls, ensuring consistent TLS and proxy behavior without each crate reimplementing client setup.\n\n## Linting\n\nThis crate inherits workspace-level lints (`[lints] workspace = true`), so it follows the same style and correctness rules as the rest of the LibreFang project.","other-librefang-kernel-handle-tests":"# Other — librefang-kernel-handle-tests\n\n# librefang-kernel-handle — Integration Tests\n\n## Purpose\n\nThis test suite validates the **default trait method implementations** provided by `librefang-kernel-handle`. The crate exposes a collection of traits (`AgentControl`, `MemoryAccess`, `TaskQueue`, `EventBus`, `KnowledgeGraph`, `ApprovalGate`, `ToolPolicy`, `ChannelSender`, etc.) that define the kernel's capability surface. Most traits ship default method bodies so that implementors only need to override what they actually support. These tests ensure those defaults are correct, stable, and semantically meaningful.\n\n## Architecture\n\nEvery test file follows the same pattern: define a stub struct, implement only the **required** trait methods (often as no-ops or error-returning stubs), leave the default methods untouched, and then assert on the default behavior.\n\n```mermaid\ngraph TD\n    subgraph \"Test Stubs\"\n        A[NoopKernelHandle]\n        B[TrackingSendHandle]\n        C[TrackingSpawnHandle]\n        D[TrackingApprovalHandle]\n        E[CapturingFileKernel]\n    end\n\n    subgraph \"Traits Under Test\"\n        F[ApprovalGate]\n        G[ToolPolicy]\n        H[AgentControl]\n        I[ChannelSender]\n        J[CronControl]\n        K[WikiAccess]\n        L[MemoryAccess]\n    end\n\n    A -->|\"defaults_approval, defaults_returns\"| F\n    A -->|\"defaults_returns\"| G\n    A -->|\"defaults_returns\"| J\n    A -->|\"defaults_returns\"| K\n    B -->|\"delegates to send_to_agent\"| H\n    C -->|\"delegates to spawn_agent\"| H\n    D -->|\"delegates to requires_approval\"| F\n    E -->|\"zero-copy Bytes\"| I\n    A -->|\"defaults_returns\"| L\n```\n\n## Test Files\n\n### `defaults_approval.rs`\n\nVerifies default implementations in `ApprovalGate` and `ToolPolicy`.\n\n| Test | What it asserts |\n|---|---|\n| `test_request_approval_default_auto_approves` | `request_approval()` returns `ApprovalDecision::Approved` without asking anyone |\n| `test_is_tool_denied_with_context_default_false` | `is_tool_denied_with_context()` returns `false` regardless of sender/channel |\n| `test_requires_approval_default_false` | `requires_approval()` returns `false` for any tool name |\n\n**Key insight:** When a kernel doesn't override approval/tool-policy methods, the system operates in an **unrestricted** mode — all tools are allowed and no approval is required. This is the correct default for development and for kernels that don't need human-in-the-loop gating.\n\nThe stub (`NoopKernelHandle`) implements all required methods as errors. The defaults under test never call those required methods, so the errors are never triggered.\n\n### `defaults_delegation.rs`\n\nEnsures that **convenience methods with extra parameters** correctly delegate to the simpler base methods. Each test uses a tracking handle with an `AtomicBool` flag to prove the base method was actually called.\n\n| Test | Default method under test | Delegates to |\n|---|---|---|\n| `test_send_to_agent_as_delegates_to_send_to_agent` | `send_to_agent_as(agent_id, msg, parent_id)` | `send_to_agent(agent_id, msg)` |\n| `test_spawn_agent_checked_delegates_to_spawn_agent` | `spawn_agent_checked(toml, parent_id, &[])` | `spawn_agent(toml, parent_id)` |\n| `test_requires_approval_with_context_delegates_to_requires_approval` | `requires_approval_with_context(tool, sender, channel)` | `requires_approval(tool)` |\n\n**Key insight:** The `_with_context` and `_as` / `_checked` variants exist to give implementors richer call sites, but the default behavior is to **ignore the extra parameters** and forward to the base method. If you need context-aware approval logic, you must override `requires_approval_with_context` directly — overriding `requires_approval` alone won't be called.\n\n### `defaults_returns.rs`\n\nValidates the concrete return values of default implementations across multiple traits.\n\n| Test | Default method | Expected return |\n|---|---|---|\n| `test_resolve_user_tool_decision_default_allow` | `resolve_user_tool_decision(tool, sender, channel)` | `UserToolGate::Allow` |\n| `test_memory_acl_for_sender_default_none` | `memory_acl_for_sender(sender, channel)` | `None` |\n| `test_cron_defaults_return_errors` | `cron_create`, `cron_list`, `cron_cancel` | `KernelOpError::Unavailable(\"Cron scheduler\")` |\n| `test_tool_timeout_defaults` | `tool_timeout_secs()`, `tool_timeout_secs_for(tool)` | `120` |\n| `test_max_agent_call_depth_default` | `max_agent_call_depth()` | `5` |\n| `test_workspace_prefix_defaults_empty` | `readonly_workspace_prefixes(agent)`, `named_workspace_prefixes(agent)` | empty `Vec` |\n| `test_wiki_access_defaults_return_unavailable_with_method_name` | `wiki_get`, `wiki_search`, `wiki_write` | `KernelOpError::Unavailable(\"wiki_get\")` etc. |\n\n**Key design decisions captured by these tests:**\n\n- **`KernelOpError::Unavailable`** carries a capability name string (e.g. `\"Cron scheduler\"`, `\"wiki_get\"`), not a human-readable sentence. This makes programmatic matching reliable (#3541).\n- **Wiki defaults** are per-method (`\"wiki_get\"`, `\"wiki_search\"`, `\"wiki_write\"`) rather than a single `\"wiki\"` label. This lets callers and audit logs distinguish which wiki entry-point was hit (#3329).\n- **Tool timeouts** default to 120 seconds globally and per-tool. Override either method to customize.\n\n### `send_channel_file_data_zero_copy.rs`\n\nRegression test for issue **#3553**. Validates that `ChannelSender::send_channel_file_data` uses `bytes::Bytes` instead of `Vec<u8>`, enabling **zero-copy buffer sharing** across retry wrappers, metering layers, and fan-out adapters.\n\n| Test | What it asserts |\n|---|---|\n| `cloning_bytes_shares_underlying_allocation` | `Bytes::clone()` does not allocate a new buffer — the pointer address is identical across all clones |\n| `send_channel_file_data_does_not_copy_buffer` | When the caller clones `Bytes` before passing it, the kernel's `CapturingFileKernel` receives the same allocation address |\n| `vec_to_bytes_round_trip_is_zero_copy_for_unique_bytes` | `Vec<u8>` → `Bytes::from()` → `Vec::from()` preserves the original allocation address (O(1) when `Bytes` uniquely owns the data) |\n\nThe `CapturingFileKernel` stub records the `as_ptr()` address and length received by `send_channel_file_data`. The test compares these against the caller's original `Bytes` to confirm no intermediate copy occurred.\n\n**Why this matters:** Channel adapters that retry on failure or broadcast to multiple recipients can `.clone()` the `Bytes` handle freely. Each clone is a refcount bump (~24 bytes), not a multi-megabyte memcpy. The 10 MiB payload size in `cloning_bytes_shares_underlying_allocation` reflects the real-world scenario that motivated #3553.\n\n## Implementing a New Test Stub\n\nIf you add a new trait method with a default implementation, you need to update the existing stubs. Every stub must implement all **required** methods. The pattern is:\n\n1. Create a struct (or reuse an existing one if the method is on a trait already covered).\n2. Implement the trait's required methods — return errors, empty collections, or `Ok(default)`.\n3. Add the trait impl block with empty braces for marker-style traits (`CronControl`, `A2ARegistry`, etc.).\n4. Write the test calling the **default** method and asserting its return value.\n5. For delegation tests, add an `AtomicBool` field to the struct and flip it inside the base method, then assert it was set.\n\n### Required trait methods reference\n\nEvery stub in this suite implements the following required methods:\n\n| Trait | Required methods |\n|---|---|\n| `AgentControl` | `spawn_agent`, `send_to_agent`, `list_agents`, `kill_agent`, `find_agents` |\n| `MemoryAccess` | `memory_store`, `memory_recall`, `memory_list` |\n| `WikiAccess` | none (all default) |\n| `TaskQueue` | `task_post`, `task_claim`, `task_complete`, `task_list`, `task_delete`, `task_retry`, `task_get`, `task_update_status` |\n| `EventBus` | `publish_event` |\n| `KnowledgeGraph` | `knowledge_add_entity`, `knowledge_add_relation`, `knowledge_query` |\n| `ChannelSender` | `send_channel_file_data` (required; tested explicitly in the zero-copy file) |\n\nTraits with **no required methods** (marker-style, all defaults): `CronControl`, `ApprovalGate`, `HandsControl`, `A2ARegistry`, `PromptStore`, `WorkflowRunner`, `GoalControl`, `ToolPolicy`.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\nA thin abstraction layer that defines the `KernelHandle` trait — the primary interface through which in-process callers interact with the LibreFang kernel.\n\n## Purpose\n\nThis crate exists to decouple **\"what it means to talk to the kernel\"** from **\"how the kernel is actually implemented.\"** Any component that needs to invoke kernel operations — protocol handlers, session managers, integration tests — depends on this trait rather than on a concrete kernel implementation. This enables:\n\n- **Dependency injection** in production code (swap real kernel for a test double).\n- **Layer isolation** — higher-level crates never see kernel internals.\n- **Async-first design** — all kernel interactions are inherently asynchronous.\n\n## Role in the Architecture\n\n```mermaid\ngraph TD\n    A[Protocol / Session Layer] -->|depends on| B[KernelHandle trait]\n    B -->|implemented by| C[Real Kernel]\n    B -->|implemented by| D[Test Mock / Stub]\n    C -->|uses| E[librefang-types]\n    B -->|uses| E\n```\n\nConsumers depend on the *trait* defined here. The concrete kernel (likely in a separate crate) implements the trait. Tests can substitute their own implementation without touching production kernel code.\n\n## Dependencies and Why They Matter\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared domain types (request/response structs, error codes, etc.) that flow across the trait boundary. |\n| `async-trait` | Makes the trait object-safe for async methods, allowing `dyn KernelHandle` to be used with `Box::pin`. |\n| `bytes` | Efficient byte-buffer handling for raw packet/message payloads. |\n| `serde_json` | JSON (de)serialization for message bodies that cross the trait boundary. |\n| `thiserror` | Derives the `Error` enum returned by trait methods. |\n| `tracing` | Structured logging spans for observability of kernel calls. |\n| `uuid` | Correlation/trace IDs attached to kernel requests. |\n\n`tokio` appears only in `[dev-dependencies]` — it powers the async test runtime and is not a runtime requirement of the crate itself.\n\n## Implementing the Trait\n\nTo provide your own `KernelHandle`:\n\n1. Add `librefang-kernel-handle` and `librefang-types` as dependencies.\n2. Implement the `KernelHandle` trait for your type.\n3. Ensure every async method respects cancellation and returns the expected error type defined in this crate.\n\nFor testing, implement the trait with stubbed responses. Because the trait is defined with `async-trait`, it is object-safe and can be used as `Box<dyn KernelHandle>` or `Arc<dyn KernelHandle>`.\n\n## Linting\n\nThis crate inherits workspace-level lints, ensuring consistency with the broader LibreFang codebase.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis crate provides the accounting layer that tracks resource consumption and enforces quotas within the LibreFang kernel. It is responsible for ensuring that operations against the kernel stay within defined cost boundaries, preventing runaway resource usage or unbounded computation.\n\n## Purpose\n\nMetering serves as the bridge between kernel operations and resource governance. Every meaningful action—query execution, memory allocation, API call—carries an associated cost. This module:\n\n- **Tracks** cumulative resource consumption per context (tenant, session, request, etc.)\n- **Enforces** quotas by rejecting or throttling operations that would exceed limits\n- **Reports** usage data for observability and billing\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions for metering units, quota configurations, and cost descriptors |\n| `librefang-memory` | Memory accounting integration—tracking allocation-based costs |\n| `librefang-runtime` | Runtime context for binding metering state to execution scopes |\n| `serde` | Serialization support for persisting metering snapshots or transmitting usage data |\n\n## Architecture\n\n```\n┌─────────────────────────────────┐\n│       Caller (kernel ops)       │\n└──────────────┬──────────────────┘\n               │ check / record\n               ▼\n┌─────────────────────────────────┐\n│     librefang-kernel-metering   │\n│                                 │\n│  ┌───────────┐  ┌────────────┐  │\n│  │  Cost      │  │   Quota    │  │\n│  │  Tracking  │  │ Enforcement│  │\n│  └───────────┘  └────────────┘  │\n│                                 │\n└──────┬──────────┬───────────────┘\n       │          │\n       ▼          ▼\n  ┌─────────┐  ┌──────────┐\n  │ memory  │  │ runtime  │\n  └─────────┘  └──────────┘\n```\n\n## Relationship to the Kernel\n\nThis module sits as a cross-cutting concern within the LibreFang kernel. Other kernel subsystems are expected to call into this crate before performing expensive operations, allowing metering to approve or deny the action. The module is consumed by higher-level kernel orchestration code rather than exposing a public API to end users.\n\n## Key Concepts\n\n**Cost** — A numerical representation of resource consumption. Costs may be expressed in abstract units or tied to concrete resources (bytes allocated, rows scanned, CPU ticks).\n\n**Quota** — A ceiling on cumulative cost within a given scope. Quotas are defined externally and fed into this module through configuration types from `librefang-types`.\n\n**Metering Context** — The scope against which costs accumulate. Tied to the runtime via `librefang-runtime`, a context typically maps to a tenant, session, or request lifecycle.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand and template routing engine for the LibreFang kernel. This crate is responsible for resolving which hand definition or template should handle a given request, loading route configurations from disk, and performing pattern-based matching.\n\n## Purpose\n\nLibreFang's kernel delegates request handling to modular components called **hands**. The router sits between incoming requests and those hands, determining the correct dispatch target based on configurable routing rules. It also supports **template routing**, allowing static or dynamically rendered content to be served from named templates matched against request paths.\n\n## Role in the Kernel\n\n```\n┌─────────────┐     ┌───────────────────┐     ┌─────────────────┐\n│  Incoming    │────▶│  kernel-router    │────▶│  Target Hand /  │\n│  Request     │     │  (this crate)     │     │  Template       │\n└─────────────┘     └───────────────────┘     └─────────────────┘\n```\n\nThe router is a pure decision-making layer. It does not execute hands or render templates itself — it resolves a match and returns the result to the caller (typically the kernel's request loop).\n\n## Key Dependencies\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared type definitions (request representations, route entries, match results) |\n| `librefang-hands` | Hand registry and metadata used during resolution |\n| `serde_json` | Deserializing route configuration files in JSON format |\n| `toml` | Deserializing route configuration files in TOML format |\n| `regex-lite` | Pattern matching for path-based route rules |\n| `dirs` | Locating platform-appropriate configuration directories |\n| `tracing` | Structured logging of route resolution decisions |\n\n## Configuration\n\nRoute definitions are loaded from configuration files on disk. The router searches standard configuration directories (resolved via the `dirs` crate) and supports both TOML and JSON formats. This allows route tables to be managed externally without recompiling the kernel.\n\n## Pattern Matching\n\nRoutes may specify literal paths or regex patterns (using `regex-lite`). When a request arrives, the router evaluates registered patterns in priority order and returns the first matching hand or template. The use of `regex-lite` keeps the dependency footprint small while supporting the subset of regex syntax needed for path matching.\n\n## Testing\n\nThe dev-dependency on `librefang-runtime` and `tempfile` indicates that tests spin up temporary directory structures with mock configuration files, then verify that the router correctly resolves routes against those configurations. When writing tests for new route rules, create a temporary config directory using `tempfile`, write route definitions into it, and assert the router's resolution output.","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nCore orchestration layer for the LibreFang Agent Operating System. Manages agent lifecycles, scheduling, permissions, inter-agent communication, and the message-handling loop that dispatches requests to LLM drivers, tools, and the memory substrate.\n\n## Architecture Position\n\n```mermaid\ngraph TD\n    API[\"librefang-api<br/>(HTTP / WS surface)\"]\n    KERNEL[\"librefang-kernel<br/>(orchestration)\"]\n    RUNTIME[\"librefang-runtime<br/>(execution)\"]\n    MEMORY[\"librefang-memory<br/>(storage)\"]\n    EXT[\"librefang-extensions\"]\n    API --> KERNEL\n    KERNEL --> RUNTIME\n    KERNEL --> MEMORY\n    RUNTIME -.->|KernelHandle trait| KERNEL\n    EXT -.->|KernelHandle trait| KERNEL\n```\n\nThe kernel sits between the HTTP/WebSocket surface and the execution runtime. It does **not** depend on `librefang-api` or `librefang-extensions`. Those crates access kernel functionality through the `KernelHandle` trait defined in `librefang-runtime`, reversing the dependency.\n\n## Boot Sequence\n\nEntry point is `LibreFangKernel::boot_with_config(KernelConfig)`. This initializes the orchestrator, recovers stale running runs (using `KernelConfig.workflow_stale_timeout_minutes` as the cutoff), and prepares all subsystems.\n\n## Key Components\n\n### `kernel::LibreFangKernel`\n\nTop-level orchestrator. Currently a large struct (~18k LOC, 50+ fields — tracked in #3565). Coordinates all subsystems. Do not add fields without coordination.\n\n### `registry::AgentRegistry`\n\nConcurrent agent table. Provides spawn, lookup, and kill operations for agents.\n\n### Subsystem Modules\n\n| Module | Responsibility |\n|---|---|\n| `kernel::cron` | Cron scheduling. Resolves `session_mode` per-job → manifest → historical Persistent. |\n| `kernel::event_bus` | Broadcast event bus with ordered history. |\n| `kernel::session_lifecycle` | Session state machine. |\n| `kernel::approval` | Approval workflow. |\n| `kernel::auth` | Authentication and authorization. |\n| `kernel::auto_dream` | Automatic dream/consolidation cycle. |\n| `kernel::inbox` | Agent inbox management. |\n| `kernel::pairing` | Agent pairing logic. |\n| `kernel::scheduler` | Task scheduling. |\n\n### Re-exports\n\n- `metering` — from `librefang-kernel-metering`. Token and cost accounting. Uses kernel's `model_catalog`.\n- `router` — from `librefang-kernel-router`. Model routing and alias resolution.\n\n## Concurrency: Lock Strategies\n\nThe kernel uses different synchronization primitives depending on access patterns. Getting this wrong causes subtle bugs.\n\n### `model_catalog: arc_swap::ArcSwap<ModelCatalog>`\n\nHot read, rare write. Readers get a consistent snapshot via atomic load (#3384). Writers use `model_catalog_update(|cat| ...)` for RCU-style updates. Never replace with `RwLock<ModelCatalog>`.\n\n### `skill_registry: std::sync::RwLock<SkillRegistry>`\n\nHot-reload on skill install/uninstall. Keep reads brief — copy out the data you need, don't hold the lock across I/O.\n\n### `running_tasks: dashmap::DashMap<(AgentId, SessionId), RunningTask>`\n\nKeyed by `(agent, session)` tuple, **not** `AgentId` alone. Pre-#3172 it was keyed by `AgentId`, which silently overwrote concurrent agent loops. Do not regress this.\n\n### `event_bus` history: `parking_lot::Mutex<VecDeque<Arc<Event>>>`\n\nAppend-only history. Uses `parking_lot::Mutex` since #3385. Do not switch back to `RwLock<VecDeque<Event>>` — the previous design caused contention issues.\n\n### `mcp_oauth_provider: Arc<dyn McpOAuthProvider + Send + Sync>`\n\nPluggable OAuth provider. Implemented in `librefang-api` to keep the daemon free of HTTP concerns. All new OAuth flows must go through this trait, not direct kernel logic.\n\n## Determinism in LLM Prompts\n\nAnything that reaches an LLM prompt must be deterministically ordered before stringification. Use `BTreeMap` / `BTreeSet` everywhere in prompt construction paths. `HashMap` iteration order varies across processes and silently invalidates provider prompt caches.\n\nRegression tests guard this boundary — see `kernel::tests::mcp_summary_is_byte_identical_across_input_orders`.\n\n## Configuration Knobs\n\n| Setting | Default | Purpose |\n|---|---|---|\n| `KernelConfig.max_history_messages` | varies | Global history limit. Clamped up to `MIN_HISTORY_MESSAGES = 4` with a WARN log. Per-agent override available in `agent.toml`. |\n| `KernelConfig.queue.concurrency.trigger_lane` | 8 | Global semaphore on `Lane::Trigger`. |\n| `KernelConfig.queue.concurrency.default_per_agent` | 1 | Fallback when `agent.toml: max_concurrent_invocations` is unset. |\n| `KernelConfig.workflow_stale_timeout_minutes` | varies | Cutoff for `recover_stale_running_runs` at boot. |\n\n## Adding a New Field to `LibreFangKernel`\n\nFollow this checklist:\n\n1. **Visibility**: Field must be `pub(crate)` unless an external crate genuinely needs read access.\n2. **Config default**: If the field has a config-side counterpart, add it to the `Default` impl on `KernelConfig`. Omitting this silently breaks the build.\n3. **Trait objects**: If the field is `Option<Arc<dyn Trait>>`, mark it `#[serde(skip)]` and implement `Serialize`, `Deserialize`, `Clone`, and `Debug` manually.\n4. **Lock strategy**: Choose based on access pattern:\n   - Hot read, rare write → `arc_swap::ArcSwap`\n   - Hot read, hot write → `parking_lot::Mutex` or `dashmap::DashMap`\n   - Append-only history → `parking_lot::Mutex<VecDeque<Arc<T>>>`\n\n## Testing\n\nRun tests with:\n\n```sh\ncargo test -p librefang-kernel\n```\n\n**Do not** run workspace-wide `cargo test` — it causes target/ contention with the user's active session.\n\n**Do not** run `cargo build` — use `cargo check --workspace --lib` instead. Real builds run in CI.\n\nUnit tests live inside `crates/librefang-kernel/src/kernel/`. Integration tests that need a real router belong in `librefang-api/tests/` using `#[tokio::test]` against `TestServer` (refs #3721).\n\n## Hard Rules\n\n- **No daemon spawning.** The CLI binary owns the `start` command. The kernel just runs.\n- **No `tokio::block_on`.** The kernel executes inside an existing runtime. Nesting runtimes will panic or deadlock.\n- **No direct LLM HTTP calls.** All LLM communication goes through `librefang-runtime` drivers.\n- **No `Result<_, String>` returns from `KernelHandle` methods** (#3541). Use typed errors.\n- **No `HashMap<K, V>` in any field that ends up in an LLM prompt.** Use `BTreeMap` (#3298).\n\n## Dependencies\n\nInternal crates:\n\n- `librefang-types` — shared type definitions\n- `librefang-memory`, `librefang-memory-wiki` — storage layer\n- `librefang-kernel-router` — model routing (re-exported)\n- `librefang-kernel-metering` — token/cost accounting (re-exported)\n- `librefang-runtime` — execution layer (provides `KernelHandle` trait)\n- `librefang-skills` — skill management\n- `librefang-hands` — tool/hand abstractions\n- `librefang-extensions` — extension points\n- `librefang-llm-driver` — LLM driver traits\n- `librefang-wire` — wire protocol types\n- `librefang-channels` — channel adapters (default features disabled)\n\nKey external crates: `tokio`, `dashmap`, `arc-swap`, `parking_lot`, `serde`, `rusqlite` (via `r2d2`), `cron`, `reqwest`, `chrono`, `uuid`, `tracing`.","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nTrait definition and shared error types for LibreFang's LLM abstraction layer. This crate owns the `LlmDriver` trait and the `LlmError` enum — nothing else. All concrete provider implementations (Anthropic, OpenAI, Gemini, Groq, etc.) live in the sibling `librefang-llm-drivers` crate.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver] -->|depends on| B[librefang-types]\n    A -->|depends on| C[thiserror / serde]\n    D[librefang-llm-drivers] -->|implements trait from| A\n    E[librefang-testing] -->|mock drivers via MockKernelBuilder| A\n    F[consumer crates] -->|depend on trait only| A\n```\n\nThe split between this crate and `librefang-llm-drivers` is intentional and must be preserved. Consumer and test crates can depend on the trait without pulling in `reqwest`, TLS libraries, or vendored provider SDKs. This keeps unit test builds fast and dependency graphs narrow.\n\n## Key Components\n\n### `LlmDriver` Trait\n\nThe core async trait that every LLM provider must implement. Defined in `lib.rs` using `async-trait`. Any new provider is implemented against this trait in `librefang-llm-drivers` — no changes to this crate are required unless the trait's surface itself needs expanding.\n\nAdding a new method to the trait is a rare event. Open an issue for discussion first.\n\n### `LlmError` Enum\n\nDefined in `llm_errors.rs`. This is the single error type returned by `LlmDriver` methods. It is built with `thiserror` and provides structured error classification rather than collapsed string messages.\n\nKey design properties:\n\n- **No `String` catch-all variant.** Every variant is typed with structured fields. This is enforced by convention and review (see #3541, #3711).\n- **Error source chains are preserved** via `#[source]` annotations (#3745). Callers can walk the cause chain.\n- **Retry classification.** The enum exposes `is_retryable()` and similar query methods so callers can decide whether to re-attempt a request without matching on every variant.\n- **Partial response preservation.** A `Partial` variant exists to carry bytes received so far when a streaming error occurs (#3552). This allows callers to settle metering and accounting even on failed streams.\n\nCommon variant categories:\n\n| Category | Purpose | Example query method |\n|---|---|---|\n| Network / transport | Connection failures, timeouts | `is_retryable()` |\n| Auth / quota | API key invalid, rate limited | `is_retryable()` returns false for auth, true for quota |\n| Model output | Malformed or unexpected response | Structured fields describing what was expected vs. received |\n| Partial | Stream interrupted mid-response | Carries bytes-so-far |\n\n### Shared Driver-Side Types\n\nAny types that multiple providers need in common (request/response wrappers, capability descriptors, etc.) are defined here rather than duplicated across implementations. Keep this set minimal — provider-specific types belong in `librefang-llm-drivers`.\n\n## Dependencies\n\nThis crate is intentionally dep-light:\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared domain types (prompts, messages, tool definitions) |\n| `async-trait` | Trait definition |\n| `serde` / `serde_json` | Serialization of shared types |\n| `thiserror` | Error enum derivation |\n| `tokio` | Async runtime primitives |\n\nDependencies that must **never** be added: `reqwest`, any TLS crate, any vendored provider SDK, `librefang-runtime`, `librefang-kernel`, or `librefang-llm-drivers` (circular).\n\n## Implementing a New Provider\n\n1. Add the implementation in `librefang-llm-drivers`, not here.\n2. Implement the `LlmDriver` trait for your provider's client struct.\n3. If you need a new `LlmError` variant, add it to `llm_errors.rs` in this crate with a structured field and a `#[source]` annotation where applicable.\n4. If you need a new shared type, add it to this crate only if at least two providers will use it.\n5. Write HTTP fixture tests in `librefang-llm-drivers` next to the implementation.\n\n## Testing\n\nThis crate contains no HTTP tests. Trait conformance is verified by mock drivers built in `librefang-testing` using `MockKernelBuilder`. If you add logic to `LlmError` methods (e.g., `is_retryable()`), unit test those here. Integration and contract tests against real providers belong in `librefang-llm-drivers`.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers for LibreFang. This crate implements the `LlmDriver` trait (defined in `librefang-llm-driver`) for Anthropic, OpenAI, Gemini, Groq, Ollama, and other providers, along with the infrastructure needed to manage credentials, rate limits, retries, and failover across them.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Consumer Code] --> B[FallbackChain]\n    B --> C1[Anthropic Driver]\n    B --> C2[OpenAI Driver]\n    B --> C3[Gemini Driver]\n    B --> C4[Groq Driver]\n    B --> C5[Ollama Driver]\n    C1 & C2 & C3 & C4 & C5 --> D[ArcCredentialPool]\n    C1 & C2 & C3 & C4 & C5 --> E[RateLimitTracker]\n    C1 & C2 & C3 & C4 & C5 --> F[HTTP Layer]\n    F --> G[librefang-http]\n    D --> H[librefang-runtime-oauth]\n    C1 & C2 & C3 & C4 & C5 -.-> I[LlmDriver Trait]\n    I -.-> J[librefang-llm-driver]\n```\n\nAll drivers implement the same `LlmDriver` trait, making them interchangeable. `FallbackChain` composes multiple drivers behind a single interface, automatically trying the next provider when one fails.\n\n## Provider Drivers\n\nEach provider lives in its own submodule under `drivers`. They translate the generic `LlmDriver` interface into provider-specific HTTP requests, handling authentication headers, request body formatting, and response parsing.\n\n| Module | Provider | Auth Method |\n|--------|----------|-------------|\n| `drivers::anthropic` | Anthropic (Claude) | API key (`x-api-key`) |\n| `drivers::openai` | OpenAI (GPT) | Bearer token |\n| `drivers::gemini` | Google Gemini | API key |\n| `drivers::groq` | Groq | Bearer token |\n| `drivers::ollama` | Ollama (local) | None / optional |\n\nAll drivers depend on `librefang-http` for outbound HTTP calls and `librefang-types` for shared data structures like chat messages and model configurations.\n\n## Credential Pool\n\n**Module:** `credential_pool`\n\nManages a shared pool of API keys, allowing multiple concurrent requests to rotate through available credentials rather than hammering a single key.\n\n### Key Types\n\n- **`CredentialPool`** — Inner pool managing credential state and rotation.\n- **`ArcCredentialPool`** — Thread-safe `Arc` wrapper suitable for sharing across tasks.\n- **`PooledCredential`** — A credential borrowed from the pool, automatically returned on drop.\n- **`PoolStrategy`** — Enum controlling how credentials are selected (e.g., round-robin, random).\n- **`new_arc_pool`** — Constructor that takes a list of credentials and returns an `ArcCredentialPool`.\n\n### Usage Pattern\n\n```rust\nlet pool = new_arc_pool(vec![\"key-1\".into(), \"key-2\".into()], PoolStrategy::RoundRobin);\n\n// Each request borrows a credential; it's returned to the pool when dropped\nlet cred = pool.acquire().await?;\nmake_request(cred.secret()).await;\n// cred dropped here → key returns to pool\n```\n\nThe `zeroize` dependency ensures secrets are securely wiped from memory when no longer in use.\n\n## Fallback Chain\n\n**Module:** `drivers::fallback_chain`\n\nComposes multiple `LlmDriver` instances into a single driver that tries providers in order. If a request fails, the chain advances to the next provider.\n\n### Key Types\n\n- **`FallbackChain`** — The composite driver. Implements `LlmDriver` itself.\n- **`ChainEntry`** — A single entry in the chain, pairing a driver with its configuration.\n- **`FailoverReason`** — Enum describing why a failover occurred (rate limit, server error, timeout, etc.).\n\nThe chain respects rate-limit signals. When a provider returns a 429, the chain marks that provider as temporarily unavailable and moves to the next.\n\n## Rate Limit Tracking\n\n**Module:** `rate_limit_tracker`\n\nProvides observability into per-provider rate limit windows.\n\n- **`RateLimitBucket`** — Tracks remaining capacity and reset time for a single provider.\n- **`RateLimitSnapshot`** — A point-in-time read of bucket state, used for metrics and logging.\n\nDrivers update the tracker based on response headers (`x-ratelimit-remaining`, `x-ratelimit-reset`, etc.). The `shared_rate_guard` utility wraps access to these buckets with proper synchronization (`dashmap`).\n\n## Retry and Backoff\n\n**Module:** `backoff`, `retry_after`, `shared_rate_guard`\n\nHandles transient failures with configurable retry strategies:\n\n- **`backoff`** — Exponential backoff computation with jitter.\n- **`retry_after`** — Parses `Retry-After` headers (both delta-seconds and HTTP-date formats) and integrates them into the backoff calculation. When a provider sends `Retry-After`, it overrides the computed backoff.\n- **`shared_rate_guard`** — Coordinates retry state across concurrent tasks to avoid thundering-herd behavior.\n\n## Stream Handling\n\n**Module:** `stream_backpressure`, `utf8_stream`, `think_filter`\n\nUtilities for processing streaming LLM responses:\n\n- **`stream_backpressure`** — Applies backpressure when the consumer can't keep up with the stream, preventing unbounded memory growth.\n- **`utf8_stream`** — Handles partial UTF-8 sequences that can appear when SSE frames split multi-byte characters mid-stream. Reassembles them before yielding to the caller.\n- **`think_filter`** — Strips \"thinking\" tokens (internal reasoning blocks) from provider responses when the caller only wants the final output.\n\n## Re-exports\n\nThe crate re-exports key types from its dependency crates for convenience:\n\n- **`llm_driver`** — The `LlmDriver` trait and associated types from `librefang-llm-driver`.\n- **`llm_errors`** — Error types for LLM operations.\n- **`FailoverReason`** — Reason enum for fallback events.\n\n## Testing\n\nDev dependencies include `wiremock` for HTTP mocking, `serial_test` for test serialization, and `tempfile` for temporary file management. Each driver has integration tests that mock the provider's HTTP API to verify request formatting and response parsing without hitting real endpoints.\n\n## Integration with the Workspace\n\nThis crate sits between the abstract trait layer and the application layer:\n\n1. **`librefang-llm-driver`** defines the `LlmDriver` trait — this crate implements it.\n2. **`librefang-types`** provides shared types (messages, models, configs) — this crate consumes them.\n3. **`librefang-http`** handles the actual HTTP transport — this crate builds provider-specific requests on top of it.\n4. **`librefang-runtime-oauth`** provides OAuth token management — used by drivers that require OAuth flows (e.g., some Gemini configurations).\n5. Application code depends on this crate (or a facade that re-exports it) to get concrete, ready-to-use driver instances.","other-librefang-memory-src":"# Other — librefang-memory-src\n\n# Roster Store (`librefang-memory/src/roster_store.rs`)\n\n## Purpose\n\n`RosterStore` persists the membership of group chats in SQLite so that agents can look up who is present in a room without the full roster being injected into the system prompt. This saves tokens on every request while still letting the agent answer questions like \"who is in this chat?\" through the `group_members` tool.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[MemorySubstrate::open] -->|runs migrations| B[migration::migrate_v28]\n    A -->|passes Pool| C[RosterStore::new]\n    C -->|upsert / members / remove| D[(group_roster table)]\n    E[Agent group_members tool] -->|queries| C\n    F[Chat presence events] -->|calls upsert| C\n```\n\nThe store is intentionally a thin wrapper around an `r2d2` connection pool. It does **not** own its schema — `group_roster` is created by the shared migration ladder (`migration::migrate_v28`), which runs inside `MemorySubstrate::open` before the store is constructed. This design means:\n\n- All schema changes flow through a single migration path.\n- Constructing a `RosterStore` can never panic on a locked or read-only database; failures surface earlier, at boot.\n\n## Data Model\n\nThe underlying `group_roster` table is keyed on a composite of `(channel_type, chat_id, user_id)`:\n\n| Column | Type | Notes |\n|---|---|---|\n| `channel_type` | text | Protocol/network identifier (e.g. `\"telegram\"`) |\n| `chat_id` | text | Platform-specific group identifier |\n| `user_id` | text | Platform-specific user identifier |\n| `display_name` | text | Current display name — overwritten on every upsert |\n| `username` | text | Optional handle — preserved if a later upsert supplies `None` |\n| `first_seen` | integer | Unix timestamp set on `INSERT` |\n| `last_seen` | integer | Unix timestamp updated on every upsert |\n\n## API\n\n### `RosterStore::new(pool)`\n\nWraps an existing `r2d2::Pool<SqliteConnectionManager>`. No DDL is executed here.\n\n### `upsert(channel, chat_id, user_id, display_name, username)`\n\nInserts a new member or updates an existing one. On conflict:\n\n- `display_name` is **always** overwritten with the latest value.\n- `username` uses `COALESCE(excluded.username, group_roster.username)` — a `None` will not erase a previously known username.\n- `last_seen` is refreshed to the current Unix timestamp.\n- `first_seen` is set once on insert and never changed.\n\n**Guard:** If `chat_id` or `user_id` is empty, the call returns immediately without touching the database. This prevents garbage rows from malformed events.\n\n### `members(channel, chat_id) → Vec<(user_id, display_name, username)>`\n\nReturns all known members of a group, ordered alphabetically by `display_name`. Returns an empty `Vec` if the chat is unknown or the pool is exhausted.\n\n### `remove_member(channel, chat_id, user_id)`\n\nDeletes a single member row. Used when a leave/part/kick event is received.\n\n### `member_count(channel, chat_id) → usize`\n\nReturns `COUNT(*)` for the given group. Returns `0` on unknown chats or pool exhaustion.\n\n## Error Handling Strategy\n\nNone of the public methods return `Result`. Instead, they follow a **degrade gracefully** pattern:\n\n1. **Empty inputs** — `upsert` silently ignores rows with empty `chat_id` or `user_id`.\n2. **Pool exhaustion** — Every method catches a failed `pool.get()`, emits a `tracing::warn!`, increments the `librefang_memory_pool_get_failed_total` counter (labelled with `store => \"roster\"` and the `op` name), and returns a safe default (`None`, `0`, or `Vec::new()`).\n3. **SQL errors** — `let _ = c.execute(...)` discards insertion failures. Query methods use `.unwrap()` on the prepared statement under the assumption that the schema has been validated by migrations at boot.\n\nThis makes the store safe to call from hot paths (presence floods) without propagating transient DB pressure upward.\n\n## Metrics\n\nAll pool-get failures emit a counter:\n\n```\nlibrefang_memory_pool_get_failed_total{store=\"roster\",op=\"<operation>\"}\n```\n\nWhere `<operation>` is one of `upsert`, `members`, `remove_member`, or `member_count`. Monitoring this metric is the primary way to detect connection-pool saturation.\n\n## Testing\n\nTests use `SqliteConnectionManager::memory()` with a single-connection pool. The helper `in_memory_store()` runs `migration::run_migrations` against the in-memory database before constructing the store, ensuring the test schema matches production.\n\nKey test cases:\n\n| Test | Validates |\n|---|---|\n| `upsert_and_list` | Basic insert and retrieval; username `Option` handling |\n| `idempotent_upsert_updates_display_name` | Repeated upserts update display name without duplicating rows |\n| `remove_member` | Deletion removes the correct row; count decreases |\n| `empty_chat_returns_nothing` | Unknown chats yield empty results, not errors |\n| `different_chats_are_isolated` | Members in one chat don't leak into another |\n| `empty_ids_are_ignored` | Empty `chat_id` or `user_id` produces no rows |\n\n## Integration Notes\n\n- **Instantiation:** Call `RosterStore::new(pool)` with the same pool used by `MemorySubstrate`. The migrations must have already been applied.\n- **Write path:** Chat adapters should call `upsert` on every presence, join, or profile-update event.\n- **Read path:** The `group_members` agent tool calls `members` to satisfy queries about who is in the current chat.\n- **Thread safety:** `r2d2::Pool` is `Send + Sync`; `RosterStore` can be freely shared across threads (e.g. cloned into async tasks).","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests — Chat-Scoped Canonical Context Integration Tests\n\n## Purpose\n\nThis integration test module is a regression guard for a cross-chat message leakage bug in `SessionStore`. Before the fix, every WhatsApp DM and group sharing the same agent saw each other's canonical history injected into the LLM prompt. The tests verify that each `CanonicalEntry` is tagged with its originating `SessionId` and filtered correctly at read time.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[setup] --> B[in-memory SQLite]\n    B --> C[run_migrations]\n    C --> D[SessionStore]\n    D --> E[append_canonical]\n    D --> F[canonical_context]\n    F --> G{session_id filter?}\n    G -->|Some| H[scoped entries only]\n    G -->|None| I[all entries — backward compat]\n```\n\n## Test Infrastructure\n\n### `setup() → SessionStore`\n\nCreates a fully initialized `SessionStore` backed by an in-memory SQLite database with a single-connection pool. Runs schema migrations via `run_migrations` so the test environment mirrors production without touching the filesystem.\n\n### `user_msg(text: &str) → Message`\n\nConvenience constructor that builds a `Message` with `Role::User`, plain `MessageContent::Text`, no pin, and no timestamp. Keeps test assertions focused on content rather than message assembly.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it verifies:** Canonical entries written under different `SessionId`s for the same `AgentId` are strictly isolated when queried.\n\n**Scenario:**\n1. Derive two distinct session IDs from WhatsApp channel identifiers:\n   - `session_dm` — from `whatsapp:393331111111@s.whatsapp.net` (DM)\n   - `session_group` — from `whatsapp:120363111111111111@g.us` (group)\n2. Assert the two session IDs differ (validates the channel-derivation function).\n3. Append three messages interleaved across sessions: `dm-1`, then `group-1`, then `dm-2`.\n4. Call `canonical_context(agent, Some(session_dm), None)` and assert only `[\"dm-1\", \"dm-2\"]` are returned.\n5. Call `canonical_context(agent, Some(session_group), None)` and assert only `[\"group-1\"]` is returned.\n\n**Failure mode caught:** If `SessionStore::append_canonical` fails to persist the session tag, or `canonical_context` ignores the filter, DM messages appear in the group context and vice versa.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it verifies:** Passing `None` as the `session_id` argument to `canonical_context` returns canonical entries across all sessions for the agent.\n\n**Why this matters:** Callers that haven't adopted per-session filtering still rely on the original cross-channel behavior. This test ensures that the session-scoping feature is additive and doesn't break existing consumers.\n\n**Scenario:**\n1. Create two sessions on different channels (WhatsApp and Telegram) for the same agent.\n2. Append one message to each.\n3. Call `canonical_context(agent, None, None)`.\n4. Assert both messages are returned.\n\n## Dependencies and Cross-Module Interactions\n\n| Dependency | Usage |\n|---|---|\n| `librefang_memory::migration::run_migrations` | Brings the in-memory SQLite schema to the current version |\n| `librefang_memory::session::SessionStore` | The system under test — `new`, `append_canonical`, `canonical_context` |\n| `librefang_types::agent::{AgentId, SessionId}` | `AgentId::new()` generates test agents; `SessionId::for_channel()` derives session IDs from channel strings |\n| `librefang_types::message::{Message, Role, MessageContent}` | Constructs test messages |\n\n## Running\n\n```bash\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n```\n\nBoth tests are pure unit-level integration tests with no I/O, no network, and no persistent state. They run in milliseconds.","other-librefang-memory-wiki-tests":"# Other — librefang-memory-wiki-tests\n\n# librefang-memory-wiki Tests\n\n## Overview\n\nThis module contains the integration and contract tests for the **Memory Wiki** durable knowledge vault (`librefang-memory-wiki`), implementing acceptance criteria from issue #3329. The tests validate two layers:\n\n1. **Acceptance tests** (`wiki_acceptance.rs`) — end-to-end exercises of `WikiVault` against a real on-disk filesystem (tempdir), mirroring the seven acceptance bullets from the issue.\n2. **Handle contract tests** (`wiki_handle_contract.rs`) — JSON-shape stability tests for the `WikiAccess` trait defined in `librefang-kernel-handle`, ensuring the vault's serialized output matches what every caller (tool dispatcher, HTTP routes, dashboard) is allowed to depend on.\n\nBoth test files live under `librefang-memory-wiki/tests/` because the kernel crate itself cannot build inside the sandboxed CI image (requires `libdbus`/`gdk`). The contract test here mirrors the production kernel-side adaptor verbatim, catching drift at PR time rather than at first production call.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"wiki_acceptance.rs\"\n        A1[vault_in] --> V[WikiVault::with_root]\n        A2[provenance] --> PE[ProvenanceEntry]\n        T1[isolated_mode_round_trip] --> A1\n        T1 --> A2\n        T3[provenance_is_populated_on_every_write] --> A1\n        T4[external_hand_edit_is_preserved_under_force] --> A1\n        T5a[obsidian_mode_emits_wiki_link_syntax] --> A1\n        T5b[native_mode_emits_relative_markdown_links] --> A1\n        T7[five_pages_with_links_produce...] --> A1\n        T7 --> BL[vault.backlinks]\n    end\n    subgraph \"wiki_handle_contract.rs\"\n        H1[vault_handle] --> V\n        WH[WikiHandle] -.implements.-> WA[WikiAccess trait]\n        WH --> V\n        C1[wiki_write_response_shape_is_stable] --> H1\n        C2[wiki_get_returns_topic_frontmatter_body] --> H1\n        C3[wiki_search_returns_array_of_objects] --> H1\n        C4[disabled_handle_returns_unavailable] --> WH2[\"WikiHandle(None)\"]\n    end\n```\n\n## Test Fixtures\n\n### `provenance(agent, turn)` — `wiki_acceptance.rs`\n\nHelper that constructs a `ProvenanceEntry` with a fixed session (`\"sess_acceptance\"`) and channel (`\"test-harness\"`). Used by every acceptance test that writes to the vault.\n\n```rust\nfn provenance(agent: &str, turn: u64) -> ProvenanceEntry\n```\n\n### `vault_in(dir, render)` — `wiki_acceptance.rs`\n\nCreates a `WikiVault` rooted in the given tempdir with `MemoryWikiIngestFilter::Tagged`. Panics on construction failure.\n\n```rust\nfn vault_in(dir: &TempDir, render: RenderMode) -> WikiVault\n```\n\n### `vault_handle(dir)` — `wiki_handle_contract.rs`\n\nCreates a `WikiHandle(Some(Arc<WikiVault>))` for contract tests. The `WikiHandle` struct wraps `Option<Arc<WikiVault>>` and implements `WikiAccess`, mirroring the production kernel adaptor.\n\n```rust\nfn vault_handle(dir: &TempDir) -> WikiHandle\n```\n\n### `WikiHandle` — `wiki_handle_contract.rs`\n\nA thin adaptor that implements `librefang_kernel_handle::WikiAccess` over `Option<Arc<WikiVault>>`. When the inner option is `None`, all methods return `KernelOpError::Unavailable`. This struct is a faithful replica of the production kernel-side adaptor.\n\n## Acceptance Tests (`wiki_acceptance.rs`)\n\nEach test is annotated with the acceptance bullet it covers.\n\n| Test | Bullet | What it validates |\n|------|--------|-------------------|\n| `default_config_is_disabled_and_construction_short_circuits` | #1 | `MemoryWikiConfig::default()` has `enabled: false`; `WikiVault::new` returns `WikiError::Disabled` |\n| `isolated_mode_round_trip` | #2 | `write` → `get` → `search` round-trip; `.md` file appears on disk |\n| `provenance_is_populated_on_every_write` | #3 | Multiple writes append to provenance history; order preserved; YAML frontmatter contains `agent`, `provenance`, `content_sha256` |\n| `external_hand_edit_is_preserved_under_force` | #4 | External file edit detected; write without `force` returns `WikiError::HandEditConflict`; write with `force` preserves user's edit body and only appends provenance |\n| `obsidian_mode_emits_wiki_link_syntax` | #5 | `RenderMode::Obsidian` preserves `[[topic]]` syntax in the `.md` file |\n| `native_mode_emits_relative_markdown_links` | #5 | `RenderMode::Native` rewrites `[[topic]]` to `[topic](topic.md)` |\n| `five_pages_with_links_produce_five_files_and_correct_backlinks` | #7 | Five interlinked pages produce five `.md` files plus `index.md`; `vault.backlinks()` returns correct source→target pairs; `index.md` lists all topics |\n| `render_mode_conversion_round_trip` | — | `MemoryWikiRenderMode` ↔ `RenderMode` conversion is lossless |\n| `reserved_modes_return_specific_error` | — | `MemoryWikiMode::Bridge` surfaces `WikiError::ModeNotImplemented(\"bridge\")` rather than silently misbehaving |\n\n### Hand-edit detection flow\n\nThe hand-edit test simulates a critical safety property: the vault never silently drops a human's edit.\n\n1. Agent writes \"first version\" → file created on disk.\n2. Simulated user appends \"hand-typed important caveat\" to the `.md` file directly.\n3. Agent write without `force` → `WikiError::HandEditConflict`.\n4. Agent write with `force=true` → vault keeps the user-edited body, ignores the supplied body string, appends provenance. `outcome.merged_with_external_edit` is `true`.\n\n### Backlink topology test\n\nThe five-page test establishes a DAG:\n\n```\nalpha → beta, gamma\nbeta  → gamma, delta\ngamma → delta\ndelta → epsilon\nepsilon → (leaf)\n```\n\nThe test asserts six backlink edges (sorted by target, then source), verifying that `vault.backlinks()` correctly parses `[[topic]]` references from on-disk files and builds the reverse index.\n\n## Handle Contract Tests (`wiki_handle_contract.rs`)\n\nThese tests lock down the JSON wire shape that all consumers of `WikiAccess` depend on. They prevent accidental serialization changes.\n\n### Error category mapping\n\nThe `WikiHandle` implementation maps `WikiError` variants to `KernelOpError` categories:\n\n| `WikiError` | `KernelOpError` | Notes |\n|---|---|---|\n| *(vault absent)* | `Unavailable(method_name)` | `wiki_get`, `wiki_search`, or `wiki_write` |\n| `NotFound(topic)` | `Internal(\"wiki topic '{topic}' not found\")` | Caller should distinguish from vault-off |\n| `HandEditConflict { topic }` | `Internal(\"wiki page '{topic}' was edited externally...\")` | Message guides operator to re-read or force |\n| `InvalidTopic { topic, reason }` | `InvalidInput(...)` | Bad topic name |\n| `BodyTooLarge { topic, size, cap }` | `InvalidInput(...)` | Body exceeds cap |\n| Deserialization failure | `InvalidInput(...)` | Malformed provenance JSON |\n\n### Stable JSON shapes\n\n**`wiki_write` response** — a JSON object with:\n- `\"topic\"`: string\n- `\"path\"`: string (filesystem path)\n- `\"content_sha256\"`: 64-character hex string\n- `\"merged_with_external_edit\"`: boolean\n\n**`wiki_get` response** — a JSON object with:\n- `\"topic\"`: string\n- `\"body\"`: string\n- `\"frontmatter\"`: object containing `\"topic\"`, `\"created\"`, `\"updated\"`, `\"content_sha256\"`, `\"provenance\"` (array of objects with `\"agent\"`)\n\n**`wiki_search` response** — a JSON array of objects, each with:\n- `\"topic\"`: string\n- `\"snippet\"`: string\n- `\"score\"`: float\n\n### Disabled-vault behavior\n\n`WikiHandle(None)` returns `KernelOpError::Unavailable` with the method name (`\"wiki_get\"`, `\"wiki_search\"`, `\"wiki_write\"`) for every call. This mirrors the production behavior when `MemoryWikiConfig::enabled` is `false`.\n\n## Dependencies\n\n| Crate | Role |\n|-------|------|\n| `librefang-memory-wiki` | System under test — provides `WikiVault`, `WikiError`, config types |\n| `librefang-kernel-handle` | Defines `WikiAccess` trait and `KernelOpError` — contract target |\n| `tempfile` | Creates isolated tempdir per test for on-disk filesystem tests |\n| `chrono` | Constructs timestamps for `ProvenanceEntry` |\n| `serde_json` | Validates serialized JSON shapes in contract tests |\n\n## Running\n\n```sh\n# All tests in this module\ncargo test -p librefang-memory-wiki\n\n# Acceptance tests only\ncargo test -p librefang-memory-wiki --test wiki_acceptance\n\n# Handle contract tests only\ncargo test -p librefang-memory-wiki --test wiki_handle_contract\n```\n\nNo external services, databases, or environment variables are required. Each test creates its own isolated temporary directory.","other-librefang-memory-wiki":"# Other — librefang-memory-wiki\n\n# librefang-memory-wiki\n\nDurable markdown knowledge vault for the LibreFang Agent OS, providing provenance-tracked frontmatter and Obsidian-friendly export.\n\n## Purpose\n\nThis module implements a persistent knowledge store where LibreFang agents can read and write markdown documents with structured metadata. Every document carries provenance frontmatter — tracking who created it, when, and its content hash — so the system can detect tampering, resolve conflicts, and maintain an auditable record of agent knowledge.\n\nThe vault format is designed to be directly usable in [Obsidian](https://obsidian.md), meaning human operators can browse, search, and edit the same files agents interact with.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-memory-wiki] --> B[librefang-types]\n    A --> C[serde / serde_json / serde_yaml]\n    A --> D[sha2]\n    A --> E[chrono]\n    A --> F[thiserror]\n    A --> G[tracing]\n    H[librefang-kernel-handle] -.->|dev-dep| A\n```\n\n### Dependency Rationale\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the LibreFang ecosystem |\n| `serde` / `serde_json` / `serde_yaml` | Serialization of frontmatter (YAML) and structured data (JSON) |\n| `chrono` | Timestamp generation for provenance metadata |\n| `sha2` | Content hashing to detect changes and verify integrity |\n| `thiserror` | Ergonomic error type definitions |\n| `tracing` | Structured logging of vault operations |\n\n`librefang-kernel-handle` is a dev-only dependency, used in integration tests to verify wiki operations through the kernel's handle abstraction.\n\n## Core Concepts\n\n### Provenance Frontmatter\n\nEvery markdown document in the vault is prefixed with a YAML frontmatter block containing provenance information. This typically includes:\n\n- **Creator**: The agent or user that authored the document\n- **Timestamp**: When the document was created or last modified\n- **Content hash**: A SHA-256 digest of the document body, enabling integrity checks\n- **Version or revision**: Tracking information for conflict detection\n\nFrontmatter is serialized via `serde_yaml`, keeping it human-readable and compatible with Obsidian's built-in YAML parsing.\n\n### Obsidian-Compatible Export\n\nThe vault's file structure and frontmatter format follow Obsidian conventions so that the wiki directory can be opened directly as an Obsidian vault. This enables:\n\n- Operators to inspect agent knowledge without special tooling\n- Manual edits that agents can later read back\n- Graph view and backlink navigation in Obsidian for exploring relationships between documents\n\n### Durable Storage\n\n\"Memory\" in this context refers to durable, file-backed storage — not in-process memory. Documents persist across agent restarts and system reboots, forming a long-term knowledge base.\n\n## Integration with LibreFang\n\nThis module sits alongside other LibreFang components as a standalone library:\n\n- **`librefang-types`** provides the shared data structures that wiki documents reference or embed.\n- **`librefang-kernel-handle`** is used in tests to simulate the kernel environment; production consumers would access the wiki through their own kernel handle.\n- The module has no detected incoming or outgoing runtime call edges, indicating it is a pure library consumed by higher-level agent orchestration code rather than calling into other services itself.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover scenarios such as:\n\n- File I/O failures (missing files, permission errors)\n- Frontmatter parsing errors (malformed YAML, missing required fields)\n- Content integrity failures (hash mismatches)\n- Serialization or deserialization errors\n\nAll operations instrument themselves with `tracing` spans for observability.\n\n## Testing\n\nTests use `tempfile` to create isolated temporary directories, ensuring wiki operations are verified against a clean filesystem each time. The dev-dependency on `librefang-kernel-handle` allows integration tests that exercise wiki behavior through the same handle interface production code uses.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS. Provides durable, queryable memory across three storage paradigms—structured key/value, semantic text search, and knowledge graph—behind a single `Memory` trait that agents call without knowing the underlying backend.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Agent[Agent Code] --> MT[Memory Trait]\n    MT --> SS[Structured Store<br/>SQLite]\n    MT --> SEM[Semantic Store<br/>LIKE / Qdrant]\n    MT --> KG[Knowledge Graph<br/>SQLite]\n\n    PM[ProactiveMemory API] --> PMS[ProactiveMemoryStore]\n    PMS --> SUB[MemorySubstrate]\n    SUB --> SS\n    SUB --> SEM\n    SUB --> KG\n\n    PM --> HOOKS[ProactiveMemoryHooks]\n    PM --> CHUNK[chunker / consolidation / decay]\n```\n\nAgents call the unified `Memory` trait. The `ProactiveMemory` layer sits on top of `MemorySubstrate`, adding mem0-style auto-memorization and retrieval with chunking, consolidation, and decay.\n\n## Three Storage Backends\n\n### Structured Store (`structured`)\n\nSQLite-backed storage for:\n\n- **Key/value pairs** — arbitrary agent state serialized as JSON or MessagePack (`rmp-serde`)\n- **Sessions** — conversation and interaction state scoped to a session ID\n- **Agent state** — persistent agent configuration and runtime state\n- **Audit trail** — append-only log of agent actions and decisions\n\nThis is the primary store for anything that needs exact retrieval by key or range queries over time-ordered records. Uses `r2d2` / `r2d2_sqlite` for connection pooling.\n\n### Semantic Store (`semantic`, `http_vector_store`)\n\nText search over stored content:\n\n- **Current path** — LIKE-based pattern matching in SQLite, suitable for development and small deployments\n- **Vector path** — designed for Qdrant-backed similarity search via the `http_vector_store` module (uses `reqwest` for HTTP transport)\n\nAgents store natural-language fragments and retrieve them by similarity or keyword match. The semantic store is what powers contextual recall during conversations.\n\n### Knowledge Graph (`knowledge`)\n\nSQLite-backed entity-relation store:\n\n- **Entities** — nodes representing concepts, agents, users, or any addressable thing\n- **Relations** — typed, directed edges between entities\n\nEnables agents to build and query an understanding of how concepts relate to each other across sessions and interactions.\n\n## Proactive Memory (mem0-style)\n\nThe `proactive` module implements a mem0-inspired memory layer that automatically decides what to memorize, when to consolidate, and what to forget.\n\n### Core Types\n\n| Type | Purpose |\n|---|---|\n| `ProactiveMemory` | Unified API exposing `search`, `add`, `get`, `list` |\n| `ProactiveMemoryHooks` | Auto-memorize and auto-retrieve hooks that intercept agent I/O |\n| `ProactiveMemoryStore` | Concrete implementation backed by `MemorySubstrate` |\n\n### Supporting Modules\n\n| Module | Responsibility |\n|---|---|\n| `chunker` | Splits incoming text into memorizable segments |\n| `consolidation` | Merges redundant or overlapping memories over time |\n| `decay` | Applies time-based relevance decay to stored memories |\n| `migration` | Schema migrations for the proactive memory tables |\n| `namespace_acl` | Access control scoped to memory namespaces |\n| `prompt` | Prompt templates for memory-related LLM calls |\n| `provider` | Abstraction over LLM providers used for memory extraction |\n| `roster_store` | Tracks which agents have access to which memory scopes |\n| `session` | Session-scoped memory context |\n\n### Typical Flow\n\n1. Agent receives user input.\n2. `ProactiveMemoryHooks` intercept the input, calling `ProactiveMemory::search` to retrieve relevant context.\n3. Injected context is included in the agent's prompt.\n4. After the agent responds, the hooks call `ProactiveMemory::add` to store new facts extracted from the exchange.\n5. Background processes run `consolidation` and `decay` to keep the store healthy.\n\n## Key Dependencies\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared domain types (memory keys, entity IDs, relation types) |\n| `rusqlite` + `r2d2` / `r2d2_sqlite` | SQLite storage with connection pooling; FTS5 enabled for full-text search |\n| `serde` / `serde_json` / `rmp-serde` | Serialization of stored values (JSON for inspection, MessagePack for compactness) |\n| `tokio` + `async-trait` | Async `Memory` trait definition |\n| `reqwest` | HTTP client for `http_vector_store` (Qdrant communication) |\n| `sha2` | Content hashing for deduplication and integrity |\n| `chrono` / `uuid` | Timestamps and unique identifiers |\n| `tracing` / `metrics` | Observability |\n| `thiserror` | Error type definitions |\n\n## Integration with LibreFang\n\n`librefang-memory` sits below the agent runtime and above the persistence layer:\n\n- **Upstream consumers** — agent implementations import the `Memory` trait and `ProactiveMemory` API. They never interact with SQLite or Qdrant directly.\n- **Downstream dependencies** — only `librefang-types` (shared type definitions). The crate is otherwise self-contained, managing its own schema and connections.\n- **Schema ownership** — the `migration` module owns all database schema changes. No other crate should write to the same SQLite files.\n\nWhen adding a new storage backend or modifying an existing one, ensure the `Memory` trait remains the single entry point for agent code. The trait abstraction is what allows swapping LIKE-based search for Qdrant without changing any agent logic.","other-librefang-migrate-tests":"# Other — librefang-migrate-tests\n\n# `librefang-migrate` — Idempotency & Forward-Compatibility Tests\n\n## Overview\n\n`tests/idempotency.rs` is an integration-level test suite that validates the **filesystem-level contracts** of the `librefang-migrate` crate. Where the in-crate unit tests in `src/openclaw.rs` verify idempotency by inspecting the returned `MigrateReport` (asserting `report.imported.is_empty()` on a second run), this module goes further: it snapshots the **actual bytes on disk** before and after re-runs to guarantee that callers never observe duplicate sessions, clobbered configs, or rewritten timestamps.\n\nThe tests exercise three distinct guarantees:\n\n1. **Second-run idempotency** — running a migration twice produces a byte-identical destination tree.\n2. **Partial-write recovery** — after simulating a killed process (deleting files mid-migration), a re-run reconstructs the missing files without corrupting survivors.\n3. **Forward compatibility** — configs authored against the prior major version's schema still deserialize and migrate to the current version.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Helpers\"\n        WO[write_openclaw_workspace]\n        WF[write_openfang_workspace]\n        SN[snapshot_tree]\n        WA[walkdir_iter]\n        OP[opts]\n    end\n\n    subgraph \"Idempotency Tests\"\n        T1[openclaw_second_run_is_byte_identical]\n        T2[openfang_second_run_is_byte_identical]\n    end\n\n    subgraph \"Recovery Tests\"\n        T3[openclaw_partial_write_is_recoverable]\n        T4[openfang_partial_write_is_recoverable]\n    end\n\n    subgraph \"Forward-Compat Tests\"\n        T5[legacy_v1_config_parses_into_current_kernel_config]\n        T6[legacy_v1_config_migrates_forward_to_current_version]\n    end\n\n    SN --> WA\n    T1 --> WO\n    T1 --> OP\n    T1 --> SN\n    T2 --> WF\n    T2 --> OP\n    T2 --> SN\n    T3 --> WO\n    T3 --> OP\n    T3 --> SN\n    T4 --> WF\n    T4 --> OP\n    T4 --> SN\n```\n\n## Helper Functions\n\n### `snapshot_tree(root: &Path) -> BTreeMap<PathBuf, Vec<u8>>`\n\nRecursively reads every regular file under `root` and returns a sorted map of relative paths to byte contents. The `BTreeMap` ordering is critical: when an `assert_eq!` fails, the diff points at the first differing path alphabetically, rather than depending on nondeterministic `HashMap` iteration order.\n\n### `walkdir_iter(root: &Path) -> Vec<PathBuf>`\n\nA minimal recursive directory walker built on `std::fs::read_dir`, intentionally avoiding a `walkdir` dev-dependency. Symlinks are skipped deliberately — neither migrator produces them, and including them would make snapshots unstable across platforms.\n\n### `write_openclaw_workspace(dir: &Path)`\n\nCreates a minimal but representative OpenClaw source workspace containing:\n\n| File | Purpose |\n|------|---------|\n| `openclaw.json` | JSON5 agent/channel/memory/session config |\n| `memory/coder/MEMORY.md` | Per-agent memory file |\n| `sessions/agent_coder_main.jsonl` | Session history (must not be duplicated on re-run) |\n\n### `write_openfang_workspace(dir: &Path)`\n\nCreates a minimal OpenFang source workspace containing:\n\n| File | Purpose |\n|------|---------|\n| `config.toml` | Top-level config (v2 format with root-level fields) |\n| `secrets.env` | Environment file (must be copied verbatim) |\n| `agents/coder/agent.toml` | Agent manifest (exercises TOML rewrite path) |\n| `data/index.db` | Binary file (exercises raw copy path) |\n\n### `opts(source, src, dst) -> MigrateOptions`\n\nConstructs a `MigrateOptions` with `dry_run: false` and the specified source type and directory paths.\n\n## Idempotency Tests\n\n### `openclaw_second_run_is_byte_identical`\n\nVerifies that the OpenClaw migrator's marker file (`.openclaw_migrated`) short-circuits before any writes. After a successful first run, the test:\n\n1. Snapshots the entire destination tree.\n2. Calls `openclaw::migrate` a second time.\n3. Asserts `report.imported.is_empty()`.\n4. Asserts the second snapshot is byte-identical to the first.\n\nThis is strictly stronger than the in-crate unit test, which only checks the report — here the timestamp embedded in the marker body must also be unchanged.\n\n### `openfang_second_run_is_byte_identical`\n\nOpenFang has no marker file; it relies on per-entry `dest_path.exists()` guards. After a clean first run, every source path already exists at the destination. This test asserts:\n\n- The second run's `report.imported` is empty.\n- `report.skipped.len()` equals the first run's `report.imported.len()` (every previously-imported file is now \"already exists\").\n- The on-disk tree is byte-identical across both runs.\n\n## Recovery Tests\n\nThese simulate a migration process that was killed mid-write. The pattern is:\n\n1. Run migration to completion → snapshot the baseline.\n2. Delete a \"victim\" file (and for OpenClaw, the marker file).\n3. Re-run migration.\n4. Assert the victim is recreated with its original bytes.\n5. Assert every surviving file is unchanged.\n\n### `openclaw_partial_write_is_recoverable`\n\nSelects a deterministic victim file from the baseline (preferring an agent manifest like `coder/agent.toml`, falling back to any non-marker file). After deleting the victim and `.openclaw_migrated`, the recovery run must:\n\n- Recreate the victim with byte-identical content.\n- Leave all other files untouched (the `promote_staging` never-clobber semantics from #3795).\n- Recreate the marker.\n\n### `openfang_partial_write_is_recoverable`\n\nTargets `agents/coder/agent.toml` specifically — a rewritten file that exercises both the copy and rewrite paths. After deletion and re-run:\n\n- The agent manifest is recreated with identical content.\n- All other files (config, secrets, binary data) remain byte-identical.\n\n## Forward-Compatibility Tests\n\nThese tests reference the fixture at `tests/fixtures/legacy_config/config_v1.toml`, which represents the v1 config schema where `api_key`, `api_listen`, and `log_level` lived under an `[api]` table. The v1→v2 migration hoists these to root level and removes the `[api]` table.\n\n### `legacy_v1_config_parses_into_current_kernel_config`\n\nAsserts that the v1 fixture deserializes directly into `librefang_types::config::KernelConfig`. This works because:\n\n- `KernelConfig` has `#[serde(default)]` annotations — missing root fields fall back to defaults.\n- Unknown top-level fields (like the `[api]` table) are silently ignored by serde.\n\nThis test acts as an early-warning system: if a required field is added to `KernelConfig` without a `#[serde(default)]` annotation, the v1 fixture will stop deserializing.\n\n### `legacy_v1_config_migrates_forward_to_current_version`\n\nCalls `run_migrations(&mut raw, 1)` on the v1 fixture loaded as raw `toml::Value`, then asserts:\n\n- The returned version number equals `CONFIG_VERSION`.\n- The `[api]` table has been removed.\n- `api_key`, `api_listen`, and `log_level` are hoisted to the root table with their original values (`legacy-secret-key`, `127.0.0.1:4545`, `info`).\n\n## Relationship to the Rest of the Codebase\n\n```\nlibrefang-migrate\n├── src/\n│   ├── lib.rs          — MigrateOptions, MigrateSource (used by opts())\n│   ├── openclaw.rs     — openclaw::migrate(), marker file logic, unit-level idempotency\n│   └── openfang.rs     — openfang::migrate(), per-entry exists() skip logic\n├── tests/\n│   ├── idempotency.rs  — THIS FILE\n│   └── fixtures/\n│       └── legacy_config/\n│           └── config_v1.toml\n│\nlibrefang-types\n└── src/config/\n    ├── version.rs      — run_migrations(), CONFIG_VERSION\n    └── (KernelConfig)\n```\n\nThe fixture `config_v1.toml` is intentionally minimal — only `config_version` plus the `[api]` table. This avoids the fragility of trying to reconstruct a complete v1 config with every legacy field-by-field default, while still exercising the critical load + migrate path.\n\n## Running the Tests\n\n```sh\n# From the workspace root\ncargo test -p librefang-migrate --test idempotency\n\n# Individual tests\ncargo test -p librefang-migrate --test idempotency -- openclaw_second_run_is_byte_identical\ncargo test -p librefang-migrate --test idempotency -- legacy_v1_config_migrates_forward_to_current_version\n```\n\nAll tests use `tempfile::TempDir` for source and destination directories and clean up automatically on completion.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations and data from other agent frameworks into LibreFang.\n\n## Purpose\n\n`librefang-migrate` provides tooling to bring existing agent framework configurations into the LibreFang ecosystem. Rather than requiring users to rebuild their agent setups from scratch, this module reads foreign configuration formats, translates them into LibreFang-native types (`librefang-types`), and writes them out in the expected structure.\n\n## Supported Input Formats\n\nThe module handles a range of common configuration serialization formats, covering most agent frameworks in the wild:\n\n| Format | Crate | Typical Use |\n|---|---|---|\n| JSON | `serde_json` | Default for many frameworks |\n| YAML | `serde_yaml` | Common in Kubernetes-oriented agents |\n| JSON5 | `json5` | Human-friendly JSON with comments |\n| TOML | `toml` | Popular in Rust-based tooling |\n\n## Key Dependencies\n\n- **`librefang-types`** — Defines the target data structures. All migrated output conforms to these types.\n- **`walkdir`** — Recursively traverses directories to locate configuration files from source frameworks.\n- **`dirs`** — Resolves standard platform directories (e.g., locating a source framework's default config path on Linux, macOS, or Windows).\n- **`chrono`** — Handles timestamp conversion and migration metadata.\n- **`thiserror`** — Derives typed errors for migration failures.\n- **`tracing`** — Emits structured logs during the migration process, useful for diagnosing conversion issues in large imports.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Source Framework Configs] -->|walkdir discovers files| B[Parse]\n    B -->|json/yaml/json5/toml| C[Intermediate Representation]\n    C -->|validate + transform| D[librefang-types]\n    D --> E[LibreFang Config Output]\n```\n\nThe migration pipeline follows three phases:\n\n1. **Discovery** — `walkdir` scans a source directory for configuration files. The `dirs` crate can auto-locate well-known framework config paths if the user doesn't supply one explicitly.\n\n2. **Parse & Translate** — Each file is deserialized from its native format into an intermediate representation, then transformed into `librefang-types` structures. Validation occurs at this boundary; incompatible or unrecognized fields produce typed errors via `thiserror`.\n\n3. **Emit** — The resulting LibreFang-native structures are written to the target locat
