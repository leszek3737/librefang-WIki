rts and sessions.\n\nThe crate acts as a foundational library — higher-level agent logic depends on it, but it does not itself depend on other LibreFang crates beyond `librefang-types`.\n\n## Role in the System\n\n```\n┌──────────────────────────┐\n│    Agent Logic Layer      │\n├──────────────────────────┤\n│  librefang-memory (this)  │\n├──────────────────────────┤\n│    librefang-types        │\n├──────────────────────────┤\n│   SQLite / Filesystem     │\n└──────────────────────────┘\n```\n\nThis module sits between the agent logic and the underlying storage. It is responsible for durable state, working memory, and any structured data the agent needs to persist or recall.\n\n## Key Dependencies and What They Suggest\n\n| Dependency | Purpose in This Module |\n|---|---|\n| `rusqlite` | SQLite-backed persistent storage. Likely used for structured queries, indexes, and transactional state management. |\n| `serde` / `serde_json` / `rmp-serde` | Serialization in both JSON and MessagePack formats. Suggests the module handles serialization of arbitrary agent state, possibly with different format choices for different storage contexts. |\n| `sha2` | Cryptographic hashing. Used for content-addressed storage, integrity checks, or deduplication of stored entries. |\n| `uuid` | Unique identifier generation for memory entries, sessions, or transactions. |\n| `chrono` | Timestamps on memory entries, enabling time-based queries and expiration. |\n| `tokio` / `async-trait` | Async runtime support. Storage operations are non-blocking to integrate with the agent's async event loop. |\n| `reqwest` | HTTP client capability. May be used for remote memory backends, syncing state to a server, or fetching external data to cache locally. |\n| `tracing` | Instrumented logging for storage operations, useful for debugging agent behavior. |\n| `thiserror` | Typed error definitions for storage failures, corruption, or query errors. |\n\n## Architecture\n\nThe module likely exposes one or more async traits or structs that represent a memory store. Consumers interact with these abstractions rather than raw SQL or file I/O.\n\n### Expected Capabilities\n\nBased on the dependency profile:\n\n- **Key-value or document storage** backed by SQLite, with serialization handled transparently.\n- **Content-addressed entries** using SHA-2 hashing for deduplication or integrity verification.\n- **Time-indexed records** via `chrono` timestamps, supporting queries like \"most recent\" or \"all entries since X.\"\n- **UUID-tagged entries** for unique identification across distributed or multi-agent scenarios.\n- **Error handling** with structured error types rather than panics or raw `Result<T, Box<dyn Error>>`.\n\n## Integration Points\n\nThis crate depends on `librefang-types` for shared type definitions — likely the shapes of memory entries, agent identifiers, or configuration structs that flow between modules.\n\nNo other LibreFang crates depend on this module at the code level based on available call graph data, but at runtime, any module that needs durable state would bring it in as a dependency.\n\n## Development\n\nRun tests with:\n\n```bash\ncargo test -p librefang-memory\n```\n\nThe `tempfile` dev-dependency is used in tests to create isolated temporary databases, ensuring tests don't pollute the filesystem or interfere with each other.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations and data from other agent frameworks into LibreFang.\n\n## Overview\n\n`librefang-migrate` provides tooling to convert projects, configurations, and agent definitions created in other agent frameworks (such as AutoGen, CrewAI, LangGraph, etc.) into the native LibreFang format. It handles format detection, file discovery, schema mapping, and validation of the resulting output.\n\n## Role in the Workspace\n\nThis crate sits at the edge of the LibreFang workspace as a utility module. It depends on `librefang-types` for the target schema definitions used during conversion, but does not expose APIs consumed by other workspace crates. It is typically invoked directly by users or by a CLI frontend during adoption or onboarding of existing agent projects.\n\n## Architecture\n\nThe module is structured around a pipeline approach: discover source files, detect the originating framework, parse the configuration in its native format, map fields to LibreFang types, validate, and emit the result.\n\n```mermaid\nflowchart LR\n    A[Source Directory] --> B[File Discovery]\n    B --> C[Format Detection]\n    C --> D[Parse Config]\n    D --> E[Schema Mapping]\n    E --> F[librefang-types]\n    F --> G[Validate & Write]\n```\n\n## Key Dependencies and Their Purpose\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Provides the target type definitions that migrated data is mapped into |\n| `serde`, `serde_json`, `serde_yaml`, `json5`, `toml` | Deserialization support for the various configuration formats used by different agent frameworks |\n| `walkdir` | Recursive directory traversal to locate configuration files within a source project |\n| `chrono` | Timestamp handling for migration metadata and date field conversion |\n| `dirs` | Resolution of standard platform directories (e.g., locating default config paths for supported frameworks) |\n| `thiserror` | Typed error definitions for migration failures |\n| `tracing` | Structured logging of migration progress and diagnostics |\n\n## Supported Configuration Formats\n\nThe breadth of serialization libraries reflects the variety of formats used across the agent framework ecosystem:\n\n- **JSON** / **JSON5** — Common in JavaScript-based frameworks and some Python frameworks that tolerate comments or trailing commas.\n- **YAML** — Used by frameworks that prefer human-editable configuration.\n- **TOML** — Common in Rust-based tooling and some Python frameworks.\n\n## Migration Workflow\n\n1. **Point at a source directory.** The user provides a path to a project built with another agent framework.\n2. **Discover files.** `walkdir` recursively scans the directory for recognizable configuration files.\n3. **Detect framework and format.** The file names, structure, and extensions are inspected to determine the source framework.\n4. **Parse.** The appropriate deserializer reads the configuration into an intermediate representation.\n5. **Map to LibreFang types.** Fields are mapped from the source schema into `librefang-types` definitions.\n6. **Validate and emit.** The resulting structure is validated and written out in the LibreFang-native format.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover cases such as:\n\n- Unsupported or unrecognized source frameworks\n- Malformed configuration files that fail deserialization\n- Missing required fields that have no equivalent mapping\n- Filesystem errors during discovery or output\n\nAll errors are instrumented with `tracing` spans to provide diagnostic context during long migrations.\n\n## Testing\n\nThe `tempfile` dev-dependency is used to construct isolated directory trees in tests. This allows unit and integration tests to:\n\n- Create synthetic source project directories with known configurations\n- Run the full migration pipeline against them\n- Assert on the correctness of the emitted LibreFang output\n- Clean up without side effects\n\n## Adding Support for a New Framework\n\nTo add a new source framework:\n\n1. Add a detection function that identifies the framework's configuration files by name, path convention, or structural markers.\n2. Define an intermediate struct that mirrors the source framework's configuration schema, with appropriate `serde` attributes.\n3. Implement a mapper from that intermediate struct into the relevant `librefang-types`.\n4. Register the new framework in the discovery/detection pipeline.\n5. Add test fixtures under a `tempfile`-based test covering the new format.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This crate provides the bridge between the LibreFang system and external MCP-compatible tool servers, enabling the runtime to discover and invoke tools exposed via the Model Context Protocol.\n\n## Purpose\n\nThe Model Context Protocol is a standardized protocol that allows AI systems and tool consumers to interact with tool providers. This crate implements the client side — it connects to MCP servers, discovers their available tools, and facilitates invoking those tools from within the LibreFang runtime.\n\n## Dependencies & What They Reveal\n\nThe crate's dependency graph reveals its core responsibilities:\n\n| Dependency | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation — handles the wire protocol, tool discovery, and invocation semantics |\n| `reqwest` | HTTP transport for communicating with MCP servers |\n| `librefang-types` | Shared type definitions across the LibreFang workspace (tool schemas, responses, etc.) |\n| `librefang-http` | Shared HTTP client configuration and middleware, ensuring consistent connection behavior across the workspace |\n| `base64`, `sha2` | Likely used for authentication handshakes or payload integrity verification with MCP servers |\n| `url` | Parsing and constructing MCP server endpoints |\n| `rand` | Generating nonces, session identifiers, or other random values for the protocol |\n| `arc-swap` | Atomic swapping of shared state — enables live reconfiguration of MCP server connections without disrupting in-flight requests |\n| `tokio` | Async runtime |\n| `async-trait` | Async trait definitions for MCP client abstractions |\n| `tracing` | Structured logging and diagnostics |\n| `serde`, `serde_json` | Serialization of MCP protocol messages |\n\n## Position in the Workspace\n\n```mermaid\ngraph LR\n    A[librefang-runtime] --> B[librefang-runtime-mcp]\n    B --> C[rmcp]\n    B --> D[librefang-http]\n    B --> E[librefang-types]\n    D --> F[reqwest]\n    C --> F\n```\n\nThis crate sits between the higher-level runtime orchestration and the low-level MCP protocol. Other runtime components depend on it when they need to interact with external tools. It depends on `librefang-types` for shared schemas and `librefang-http` for consistent HTTP client behavior.\n\n## Key Design Patterns\n\n**Connection management via `arc-swap`:** The use of `arc-swap` indicates that MCP server connections can be reconfigured at runtime — for example, when the set of available MCP servers changes. The atomic swap allows hot-reloading of connection state without locking or blocking concurrent tool invocations.\n\n**Shared HTTP infrastructure:** By routing through `librefang-http` rather than creating a standalone `reqwest` client, this crate inherits workspace-wide HTTP settings (timeouts, TLS configuration, retry policies, tracing middleware).\n\n**Async trait abstraction:** The `async-trait` dependency suggests the MCP client functionality is exposed through trait(s), allowing consumers to program against an interface rather than a concrete implementation. This supports testability — consumers can be injected with mock MCP clients.\n\n## When to Use This Crate\n\n- You need to connect to an MCP server from within the LibreFang runtime\n- You need to discover tools exposed by an MCP-compatible server\n- You need to invoke remote tools and process their responses using LibreFang's type system\n\n## Building & Testing\n\n```bash\n# Build the crate\ncargo build -p librefang-runtime-mcp\n\n# Run tests\ncargo test -p librefang-runtime-mcp\n```\n\n## Notes\n\n- The `http` crate (v1) is used directly rather than re-exported through `librefang-http`, suggesting this crate constructs or inspects HTTP primitives at the protocol level that go beyond what the shared HTTP layer provides.\n- The combination of `base64` and `sha2` may indicate support for MCP server authentication schemes that involve challenge-response or HMAC-based verification.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication flows for LibreFang runtime drivers, providing token acquisition and refresh for ChatGPT and GitHub Copilot backends.\n\n## Purpose\n\nThis crate encapsulates the full OAuth lifecycle required by LibreFang's runtime drivers. It handles authorization code grants, token exchange, PKCE challenge generation, and secure credential management so that downstream drivers can authenticate against provider endpoints without reimplementing OAuth plumbing.\n\n## When to Use This Crate\n\n- **Runtime driver authors** who need to authenticate with ChatGPT or GitHub Copilot OAuth providers.\n- **Integration tests** that require valid tokens to exercise driver endpoints.\n- **Token management tooling** that refreshes or revokes credentials on behalf of a user.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests token| B[librefang-runtime-oauth]\n    B -->|HTTP calls| C[librefang-http]\n    B -->|shared types| D[librefang-types]\n    B -->|token exchange| E[OAuth Provider]\n    C -->|underlying requests| E\n```\n\nThe crate sits between a runtime driver and the OAuth provider. Drivers call into this crate to initiate a flow, and this crate uses `librefang-http` (backed by `reqwest`) for all network I/O. Shared data structures such as error types and credential shapes come from `librefang-types`.\n\n## Key Responsibilities\n\n### PKCE (Proof Key for Code Exchange)\n\nThe `sha2` and `base64` dependencies drive PKCE code verifier and challenge generation. Every authorization request includes a cryptographically random verifier (sourced from `rand`) and a SHA-256-derived challenge, preventing authorization code interception attacks.\n\n### Secure Credential Handling\n\n`zeroize` ensures that sensitive in-memory values — code verifiers, access tokens, and refresh tokens — are overwritten when dropped. This limits the window during which a memory dump or debugger could extract credentials.\n\n### Token Lifecycle\n\n1. **Authorization request** — constructs the provider's authorization URL with required query parameters (client ID, redirect URI, scope, state, PKCE challenge).\n2. **Code exchange** — receives the authorization code from the redirect callback and posts it to the provider's token endpoint alongside the PKCE verifier.\n3. **Token refresh** — when an access token expires, uses the stored refresh token to obtain a new pair without user interaction.\n4. **Revocation** — optionally invalidates tokens at the provider's revocation endpoint.\n\n### Error Handling\n\n`thiserror` defines a focused error enum covering common OAuth failure modes: network errors, invalid grant responses, expired tokens, PKCE mismatches, and provider-specific error codes. All errors are traced through `tracing` spans for observability.\n\n## Dependency Rationale\n\n| Dependency | Role in This Crate |\n|---|---|\n| `librefang-types` | Shared credential and error types consumed by drivers |\n| `librefang-http` | HTTP client abstraction used for token endpoint calls |\n| `reqwest` | Underlying async HTTP client (via workspace) |\n| `serde` / `serde_json` | Serialization of token responses and provider JSON bodies |\n| `sha2` | SHA-256 hashing for PKCE code challenge derivation |\n| `base64` | URL-safe Base64 encoding of the PKCE challenge |\n| `rand` | Cryptographic RNG for state parameter and code verifier generation |\n| `hex` | Hex encoding utilities for hash representation |\n| `zeroize` | Secure zeroing of secret material on drop |\n| `tokio` | Async runtime for all I/O-bound operations |\n| `tracing` | Structured logging of flow progression and errors |\n| `thiserror` | Ergonomic error type definitions |\n\n## Integration Points\n\n**Upstream consumers** are the runtime driver crates (`librefang-runtime-chatgpt`, `librefang-runtime-copilot`, etc.). They call into this crate at startup to obtain a valid access token, then periodically to refresh it.\n\n**Downstream dependencies** are `librefang-types` (for shared structs) and `librefang-http` (for network calls). This crate does not depend on any LibreFang runtime driver, keeping the dependency graph acyclic.\n\n## Security Considerations\n\n- **State parameter**: Every authorization URL includes a random, unguessable `state` value to prevent CSRF attacks during the redirect callback.\n- **PKCE**: All flows use `S256` code challenge method — the `plain` method is not supported.\n- **No credential logging**: Tokens and verifiers are never logged at any trace level. Only flow events (start, success, failure reason) are emitted.\n- **Zeroization**: All structs holding secret material derive or implement `Zeroize`, ensuring secrets don't linger on the heap after use.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests — MCP OAuth Integration Tests\n\nIntegration tests that verify the MCP (Model Context Protocol) OAuth discovery, token lifecycle, provider wiring, and auth-state serialization in `librefang-runtime`.\n\n## Purpose\n\nThis module guards against several classes of bugs that are difficult to catch with unit tests alone:\n\n- **Silent miswiring** — an `oauth_provider: None` passed through a call chain can silently disable the entire OAuth flow without any error.\n- **Serialization regressions** — auth state enums that serialize identically can cause incorrect dashboard UI (e.g., showing \"Authorizing…\" before the user clicks Authorize).\n- **Token isolation** — clearing tokens for one server must not affect tokens for another.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[discover_oauth_metadata] -->|fallback| B[McpOAuthConfig]\n    C[McpConnection::connect] -->|401 triggers| D[McpOAuthProvider]\n    D -->|trait methods| E[load_token / store_tokens / clear_tokens]\n    F[McpAuthState] -->|serializes to JSON| G[\"needs_auth / pending_auth / authorized\"]\n```\n\n## Test Groups\n\n### 1. OAuth Metadata Discovery\n\n| Test | What it verifies |\n|---|---|\n| `test_discover_fallback_to_config` | When the remote well-known endpoint is unreachable, `discover_oauth_metadata` falls back to values supplied in `McpOAuthConfig` (auth_url, token_url, client_id). |\n| `test_discover_fails_without_any_source` | When neither remote discovery nor a local config is available, the function returns an error containing `\"OAuth metadata\"`. |\n\nThese call into `discover_oauth_metadata` exported by `librefang_runtime::mcp_oauth`, which is defined in `librefang-runtime-mcp/src/mcp_oauth.rs`.\n\n### 2. OAuth Provider Wiring (Regression)\n\n**`test_http_connect_calls_oauth_provider_load_token`**\n\nThis is a regression test for a bug where `connect_mcp_servers` in the kernel passed `oauth_provider: None`, silently disabling OAuth. It:\n\n1. Creates a `TrackingOAuthProvider` (see mock providers below) that records whether `load_token` was invoked.\n2. Configures an `McpServerConfig` with `McpTransport::Http` pointing at `127.0.0.1:1` (guaranteed connection refused).\n3. Asserts the connection fails (expected).\n4. Asserts `load_token` **was called**, proving the provider object is wired into `McpConnection::connect`.\n\nDependencies from `librefang-runtime-mcp`:\n- `McpConnection` — the connection struct under test.\n- `McpServerConfig` — configuration including `oauth_provider` field.\n- `McpTransport::Http` — the HTTP transport variant.\n- `empty_taint_rule_sets_handle` — provides a no-op taint rule set handle required by the config.\n\n### 3. Token Lifecycle via `InMemoryOAuthProvider`\n\nFour tests exercise the `McpOAuthProvider` trait contract using `InMemoryOAuthProvider`, an in-memory mock backed by `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`.\n\n| Test | Flow |\n|---|---|\n| `test_provider_store_then_load` | `store_tokens` → `load_token` returns the same access token. Verifies initial state returns `None`. |\n| `test_provider_clear_removes_token` | `store_tokens` → `clear_tokens` → `load_token` returns `None`. |\n| `test_provider_clear_is_isolated` | Stores tokens for two servers (A and B), clears A, confirms B is unaffected. |\n| `test_provider_reauthorize_after_clear` | Full lifecycle: store v1 → clear → store v2 → load returns v2. Ensures re-authorization after revocation works. |\n\nThe `OAuthTokens` struct (from `librefang-types/src/oauth.rs`) has fields: `access_token`, `refresh_token` (optional), `token_type`, `expires_in`, `scope`.\n\n### 4. Auth State Serialization\n\nTwo synchronous tests verify that `McpAuthState` (from `librefang_runtime::mcp_oauth`) serializes correctly via `serde_json`:\n\n| Test | What it verifies |\n|---|---|\n| `test_auth_state_lifecycle` | The state machine round-trips: `NeedsAuth` → `PendingAuth` → `Authorized` → `NeedsAuth` (after revoke). Each state serializes with the expected `\"state\"` discriminator. |\n| `test_needs_auth_serializes_differently_from_pending_auth` | Regression test: `NeedsAuth` and `PendingAuth` must produce distinct `\"state\"` values (`\"needs_auth\"` vs `\"pending_auth\"`), ensuring the dashboard shows the correct UI at boot. |\n\n## Mock Providers\n\n### `TrackingOAuthProvider`\n\nMinimal stub that sets an `AtomicBool` when `load_token` is called. Returns `None` for every method. Used solely to detect whether the provider is wired into the connection path.\n\n### `InMemoryOAuthProvider`\n\nFull in-memory implementation of `McpOAuthProvider` using a `HashMap` guarded by `tokio::sync::Mutex`. Suitable for testing any token store/load/clear scenario without a vault dependency.\n\nBoth implement the `McpOAuthProvider` trait (requires `async_trait`):\n\n```rust\n#[async_trait]\nimpl McpOAuthProvider for InMemoryOAuthProvider {\n    async fn load_token(&self, server_url: &str) -> Option<String>;\n    async fn store_tokens(&self, server_url: &str, tokens: OAuthTokens) -> Result<(), String>;\n    async fn clear_tokens(&self, server_url: &str) -> Result<(), String>;\n}\n```\n\n## External Dependencies\n\n| Crate / Module | What's used |\n|---|---|\n| `librefang_runtime::mcp_oauth` | `discover_oauth_metadata`, `McpAuthState`, `OAuthTokens`, `McpOAuthProvider` |\n| `librefang_runtime::mcp` | `McpConnection`, `McpServerConfig`, `McpTransport`, `empty_taint_rule_sets_handle` |\n| `librefang_types::config` | `McpOAuthConfig` |\n| `tokio` | `#[tokio::test]` async test runtime |\n| `async_trait` | Trait implementation for mock providers |\n| `serde_json` | Auth state serialization assertions |","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime.\n\n## Purpose\n\nThis module provides a WebAssembly-based sandbox environment for executing LibreFang skills. By isolating skill logic inside WASM modules, the runtime gains:\n\n- **Security** — skills run in a sandboxed context with controlled access to system resources\n- **Portability** — skills can be authored in any language that compiles to WASM\n- **Isolation** — a faulty or malicious skill cannot crash the host runtime\n\n## Architecture\n\n```\n┌─────────────────────────────────────┐\n│         Host Runtime                │\n│                                     │\n│  ┌───────────────────────────────┐  │\n│  │   librefang-runtime-wasm     │  │\n│  │                               │  │\n│  │  ┌─────────┐    ┌─────────┐  │  │\n│  │  │ Wasmtime│───▶│  Skill   │  │  │\n│  │  │ Engine  │    │ (WASM)  │  │  │\n│  │  └─────────┘    └─────────┘  │  │\n│  │         │                     │  │\n│  │         ▼                     │  │\n│  │  kernel-handle / http         │  │\n│  └───────────────────────────────┘  │\n└─────────────────────────────────────┘\n```\n\nThe WASM runtime acts as a bridge between the host system and guest skill code. Skills execute inside wasmtime instances and communicate outward through host-provided APIs.\n\n## Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `wasmtime` | WebAssembly runtime engine — compiles and executes WASM modules |\n| `librefang-kernel-handle` | Communication channel back to the LibreFang kernel |\n| `librefang-http` | HTTP client/server capabilities exposed to sandboxed skills |\n| `librefang-types` | Shared type definitions used across the LibreFang workspace |\n| `tokio` | Async runtime for non-blocking WASM instantiation and execution |\n| `serde_json` | JSON serialization for structured data exchange with WASM guests |\n| `tracing` | Instrumentation for debugging and monitoring skill execution |\n| `thiserror` / `anyhow` | Error types for sandbox and runtime failures |\n\n## Key Concepts\n\n### Skill Loading\n\nWASM modules representing skills are loaded into wasmtime `Engine` instances. Each skill gets its own isolated `Store` to prevent cross-skill interference.\n\n### Host-Guest Communication\n\nSkills interact with the outside world exclusively through host functions imported into the WASM module. These imports are backed by `librefang-kernel-handle` and `librefang-http`, giving the runtime fine-grained control over what each skill can access.\n\nData flows across the boundary as serialized JSON (`serde_json`), keeping the interface language-agnostic for guest modules.\n\n### Sandboxing\n\nThe wasmtime runtime provides capability-safe isolation. Skills have no direct access to the filesystem, network, or kernel — all access is mediated through explicitly imported host functions.\n\n## Integration with LibreFang\n\nThis module sits between the kernel and skill authors:\n\n- **Inbound**: The kernel (or a higher-level runtime orchestrator) instructs this module to load and execute a specific skill WASM module.\n- **Outbound**: This module calls into `librefang-kernel-handle` to relay results or request services, and into `librefang-http` when skills need network access.\n\nThe shared `librefang-types` crate ensures type consistency across all layers.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate is the central orchestration layer that coordinates LLM inference, tool/skill execution, memory management, communication channels, and sandboxed code execution into a coherent agent lifecycle.\n\n## Architecture\n\nThe runtime sits at the top of the dependency tree, composing specialized sub-crates into a unified execution environment:\n\n```mermaid\ngraph TD\n    RT[librefang-runtime] --> LLM[LLM Drivers]\n    RT --> SKILLS[Skills Registry]\n    RT --> MEM[Memory Store]\n    RT --> CH[Channels]\n    RT --> WASM[WASM Sandbox]\n    RT --> MCP[MCP Protocol]\n    RT --> OAUTH[OAuth Flows]\n    RT --> KH[Kernel Handle]\n    RT --> HTTP[HTTP Layer]\n```\n\n## Key Responsibilities\n\n- **Agent lifecycle management** — bootstrapping agents, managing their execution context, and coordinating their shutdown\n- **LLM orchestration** — dispatching prompts through `librefang-llm-drivers` and `librefang-llm-driver` to various model providers\n- **Tool and skill execution** — invoking registered skills via `librefang-skills`, including sandboxed execution of untrusted code\n- **Conversation memory** — reading and writing per-session and per-agent memory through `librefang-memory`\n- **Channel multiplexing** — routing messages across communication backends via `librefang-channels`\n- **MCP integration** — exposing tools and resources through the Model Context Protocol (`librefang-runtime-mcp`)\n- **OAuth credential flows** — managing authenticated connections to external services (`librefang-runtime-oauth`)\n- **WASM execution** — running user-provided or third-party code in a WebAssembly sandbox (`librefang-runtime-wasm`)\n\n## Sandboxing\n\nThe runtime provides two optional Linux sandboxing mechanisms, selectable via Cargo features:\n\n| Feature | Backend | Description |\n|---|---|---|\n| `landlock-sandbox` | `landlock` | Filesystem access control using Linux Landlock |\n| `seccomp-sandbox` | `seccompiler` | System call filtering via seccomp-bpf |\n\nEnable one or both in `Cargo.toml` depending on the target platform and threat model. On non-Linux platforms, these features compile but have no effect. The `wasm-hooks` feature extends the WASM runtime with additional hook callbacks.\n\n## Cryptographic Operations\n\nThe runtime includes direct cryptographic dependencies for:\n\n- **Request signing** — `ed25519-dalek` for Ed25519 signature generation and verification\n- **HMAC authentication** — `hmac` + `sha2` for keyed-hash message authentication\n- **Secure memory handling** — `zeroize` to ensure sensitive material (keys, tokens) is cleared from memory on drop\n\nThese are used for verifying agent identities, signing outbound requests, and validating webhook payloads.\n\n## Document Processing\n\nPDF text extraction is supported via `pdf-extract`, enabling agents to ingest and reason over PDF documents as part of their tool execution pipeline.\n\n## Dependency Rationale\n\n| Dependency | Purpose |\n|---|---|\n| `tokio`, `futures` | Async runtime and combinators |\n| `dashmap`, `parking_lot` | High-concurrency maps and mutexes for agent state |\n| `rusqlite` | Local SQLite storage for session persistence |\n| `tokio-tungstenite` | WebSocket transport for channels and MCP |\n| `ureq` | Synchronous HTTP fallback (e.g., for blocking sandboxed operations) |\n| `flate2`, `tar` | Archive extraction for artifact downloads |\n| `shlex` | Shell-style argument parsing for tool invocation |\n| `regex-lite` | Pattern matching in message routing and skill matching |\n| `toml`, `dirs` | Configuration file loading from standard OS paths |\n| `tempfile` | Ephemeral working directories for isolated execution |\n\n## Connecting to the Rest of the Codebase\n\n`librefang-runtime` is a consumer crate — it depends on nearly every other `librefang-*` crate but is not depended on by any of them. It represents the deployment boundary: the entry point that wires up types, drivers, and infrastructure into a running agent system.\n\nTypical integration pattern:\n\n```\nlibrefang-types        ← shared data structures\nlibrefang-http         ← HTTP client/server primitives\nlibrefang-kernel-handle ← low-level OS abstractions\n        │\n        ▼\nlibrefang-runtime      ← orchestration and lifecycle\n        │\n        ▼\napplication binary / service entrypoint\n```\n\nOther runtime sub-crates (`librefang-runtime-mcp`, `librefang-runtime-oauth`, `librefang-runtime-wasm`) encapsulate domain-specific runtime logic, keeping this crate focused on composition and coordination.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer.\n\n## Purpose\n\nThis crate manages the full lifecycle of **skills** in LibreFang: discovery on disk, loading and parsing, version resolution, marketplace downloads, and cross-compatibility with the OpenClaw skill format. It serves as the single source of truth for what skills are available, their metadata, and their installed state.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-skills] --> B[Skill Registry]\n    A --> C[Loader]\n    A --> D[Marketplace Client]\n    A --> E[OpenClaw Adapter]\n    C -->|scans| F[Filesystem]\n    D -->|fetches| G[Remote Marketplace]\n    B -->|stores| H[Skill Definitions]\n    E -->|translates| I[OpenClaw Format]\n```\n\nThe crate breaks down into four cooperating subsystems:\n\n| Subsystem | Role |\n|-----------|------|\n| **Registry** | In-memory index of all known skills, their versions, dependencies, and load status |\n| **Loader** | Walks configured skill directories, parses TOML/YAML manifests, validates integrity via SHA-256 hashes |\n| **Marketplace Client** | Async HTTPS client that queries a remote skill marketplace, downloads packages, and verifies them |\n| **OpenClaw Adapter** | Translates OpenClaw-format skill definitions into LibreFang's native representation |\n\n## Key Dependencies and Why They Matter\n\n| Dependency | Purpose in this crate |\n|------------|----------------------|\n| `librefang-types` | Shared domain types (`SkillId`, `SkillManifest`, `SkillVersion`, etc.) |\n| `serde` / `serde_json` / `toml` / `serde_yaml` | Deserialization of skill manifests, which may be authored in TOML or YAML |\n| `walkdir` | Recursive directory traversal to discover skill packages on disk |\n| `reqwest` + `rustls` + `webpki-roots` / `rustls-native-certs` | Async HTTPS for marketplace communication, using Rustls as the TLS backend with both bundled and system certificate stores |\n| `sha2` / `hex` | SHA-256 integrity verification of downloaded or installed skill packages |\n| `zip` | Extraction of `.zip`-packaged skill archives |\n| `semver` | Semantic version parsing and constraint resolution for skill dependencies |\n| `aho-corasick` | Fast multi-pattern matching — used for bulk lookups across skill names, tags, and keywords |\n| `fs2` | File locking to prevent concurrent write corruption when installing or updating skills |\n| `chrono` | Timestamps for install date, last-updated, and cache TTL |\n\n## Skill Manifest Format\n\nSkills are expected to ship with a manifest file (`skill.toml` or `skill.yaml`) at their root. The manifest is deserialized into types provided by `librefang-types`. A typical manifest includes:\n\n- **Skill ID** — unique identifier\n- **Version** — semver-compliant version string\n- **Dependencies** — other skill IDs with optional version constraints\n- **Entry point** — path to the skill's main logic\n- **Hash** — expected SHA-256 of the package archive (for integrity checks)\n\nThe loader supports both TOML and YAML so skill authors can choose their preferred format.\n\n## Loading Flow\n\n1. **Directory scan** — `walkdir` recursively walks each configured skill directory.\n2. **Manifest discovery** — For each subdirectory, the loader looks for `skill.toml` or `skill.yaml`.\n3. **Parsing** — The manifest is deserialized and validated (required fields, semver compliance).\n4. **Integrity check** — If a hash is recorded, the package contents are hashed with SHA-256 and compared.\n5. **Registration** — The parsed skill is inserted into the registry, keyed by skill ID and version.\n\n## Marketplace Flow\n\n1. **Query** — An async request via `reqwest` fetches available skill listings from the marketplace API.\n2. **Download** — Selected skill packages (`.zip` archives) are streamed to a temporary staging area.\n3. **Verify** — The downloaded archive's SHA-256 hash is compared to the advertised hash.\n4. **Extract** — `zip` extracts the archive into the target skill directory.\n5. **Register** — The newly extracted skill is passed through the standard loading flow.\n6. **Lock** — `fs2` file locks prevent concurrent installs from corrupting the skill store.\n\nAll network calls are TLS-secured via Rustls, which respects both the bundled Mozilla certificate store (`webpki-roots`) and the host system's native certificate store (`rustls-native-certs`).\n\n## OpenClaw Compatibility\n\nThe OpenClaw adapter translates OpenClaw-format skill definitions into LibreFang's native `SkillManifest` type. This allows LibreFang to consume skills originally authored for the OpenClaw ecosystem without modification. The adapter handles:\n\n- Format conversion (OpenClaw metadata fields → LibreFang fields)\n- Dependency name remapping where conventions differ\n- Version normalization if OpenClaw uses a non-semver scheme\n\n## Error Handling\n\nAll fallible operations return `Result<T, SkillError>` where `SkillError` is derived via `thiserror`. Common error variants include:\n\n- Manifest not found or unreadable\n- Manifest parse failure (invalid TOML/YAML, missing required fields)\n- Semver constraint violation\n- SHA-256 hash mismatch (tampered or corrupted package)\n- Network or TLS failure during marketplace operations\n- Filesystem errors during extraction (disk full, permissions)\n\n## Integration with the Rest of LibreFang\n\nThis crate depends on `librefang-types` for all shared domain types but does not itself call into other LibreFang crates. It is consumed by higher-level crates that need to:\n\n- Enumerate available skills before starting a session\n- Resolve skill dependencies at load time\n- Install or update skills from the marketplace\n- Load OpenClaw-format skill packs for backward compatibility\n\n## Development\n\nWhen running tests, the `tempfile` dev-dependency provides isolated temporary directories for testing the loader and extraction logic without touching the real skill store.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry and Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis crate provides a centralized metrics layer for the LibreFang system. It depends on the `metrics` facade crate, which offers a vendor-neutral API for recording counters, gauges, and histograms. Downstream crates consume this module to emit telemetry without coupling directly to a specific metrics backend.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `metrics` | Facade for recording metrics. Actual exporters (Prometheus, OpenTelemetry) are configured at the binary level, not here. |\n| `librefang-types` | Shared domain types used in metric labels and dimensions. |\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────┐\n│              Binary / entry point               │\n│  (installs a metrics exporter: Prometheus, OTel) │\n└──────────────┬──────────────────────────────────┘\n               │ registers exporter with metrics::recorder\n               │\n┌──────────────▼──────────────────────────────────┐\n│           librefang-telemetry                    │\n│  Re-exports metrics macros, defines label        │\n│  conventions and helper wrappers                 │\n└──────────────┬──────────────────────────────────┘\n               │ used by\n       ┌───────┴────────┐\n       ▼                ▼\n  other LibreFang   other LibreFang\n  library crates    library crates\n```\n\nThis module sits between the application's metrics exporter (configured at the binary level) and the library crates that emit measurements. It does not start a metrics server or configure an exporter itself.\n\n## Usage\n\nLibrary crates should depend on `librefang-telemetry` rather than `metrics` directly. This keeps label naming, dimension conventions, and any helper wrappers consistent across the codebase.\n\nAt the binary level, the application installs a concrete `metrics::Recorder` — for example, a Prometheus exporter that scrapes `/metrics` on a designated port. Once installed, all macro calls (`counter!`, `gauge!`, `histogram!`, etc.) flow through that recorder.\n\n## Integration Notes\n\n- **No execution flows or call graph edges** were detected for this module. It is a utility/facade crate consumed statically by other modules rather than participating in runtime call chains.\n- The crate is intentionally thin. It exists to own the metrics dependency and any LibreFang-specific telemetry conventions, keeping them out of individual library crates.\n- If you need to add new metric names or label dimensions, add them here so all consumers share a single source of truth.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# `librefang-testing` — Example Tests (`tests.rs`)\n\n## Purpose\n\nThis file contains example integration tests that exercise the librefang API endpoints and mock infrastructure. It serves two roles:\n\n1. **Validation** — verifies that core HTTP endpoints behave correctly under both success and error conditions.\n2. **Reference** — demonstrates the testing patterns and utilities that the `librefang-testing` crate provides, so contributors can follow the same approach when writing new tests.\n\n## Testing Patterns\n\nAll tests follow a consistent three-step structure:\n\n```\nbuild app → construct request → assert response\n```\n\n```rust\nlet app = TestAppState::new();\nlet router = app.router();\n\nlet req = test_request(Method::GET, \"/api/health\", None);\nlet resp = router.oneshot(req).await.expect(\"request failed\");\nlet json = assert_json_ok(resp).await;\n```\n\n### Key utilities used\n\n| Utility | Source | Purpose |\n|---|---|---|\n| `TestAppState::new()` | `test_app.rs` | Creates a fully-wired app with default mock dependencies |\n| `TestAppState::with_builder(...)` | `test_app.rs` | Creates an app with a custom `MockKernelBuilder` |\n| `app.router()` | `test_app.rs` | Returns an Axum `Router` ready for `oneshot` calls |\n| `test_request(method, path, body)` | `helpers.rs` | Builds an `axum::http::Request` with optional JSON body |\n| `assert_json_ok(resp)` | `helpers.rs` | Asserts HTTP 200, deserialises body into `serde_json::Value` |\n| `assert_json_error(resp, status)` | `helpers.rs` | Asserts a specific error status code, returns JSON body |\n| `MockLlmDriver` | `mock_driver.rs` | Returns preconfigured completions, records all calls |\n| `FailingLlmDriver` | `mock_driver.rs` | Always errors — for testing failure paths |\n| `MockKernelBuilder` | `mock_kernel.rs` | Builds a kernel with custom configuration overrides |\n\nRequests are dispatched via `tower::ServiceExt::oneshot`, which sends a single request through the full middleware/handler stack without binding to a network port.\n\n## Test Coverage\n\n### API Endpoint Tests\n\nTests are grouped by HTTP method, covering both happy paths and error cases.\n\n```mermaid\ngraph LR\n    subgraph Success Paths\n        GET_health[\"GET /api/health\"]\n        GET_agents[\"GET /api/agents\"]\n        GET_version[\"GET /api/version\"]\n        POST_spawn[\"POST /api/agents\"]\n    end\n    subgraph Error Paths\n        GET_invalid[\"GET /api/agents/not-a-uuid\"]\n        GET_404[\"GET /api/agents/{fake-uuid}\"]\n        DELETE_404[\"DELETE /api/agents/{fake-uuid}\"]\n        PUT_model[\"PUT /api/agents/{fake-uuid}/model\"]\n        POST_msg[\"POST /api/agents/{fake-uuid}/message\"]\n        PATCH_agent[\"PATCH /api/agents/{fake-uuid}\"]\n    end\n    GET_health -->|200 + status field| assert_json_ok\n    GET_agents -->|200 + items/total| assert_json_ok\n    POST_spawn -->|200 or 201| check_status\n    GET_invalid -->|400| assert_json_error\n    GET_404 -->|404| assert_json_error\n    DELETE_404 -->|404| assert_json_error\n```\n\n| Test | Method & Path | Expected Outcome |\n|---|---|---|\n| `test_health_endpoint` | `GET /api/health` | 200 with `{\"status\": \"ok\" \\| \"degraded\"}` |\n| `test_list_agents` | `GET /api/agents` | 200 with `{\"items\": [...], \"total\": N}` |\n| `test_version_endpoint` | `GET /api/version` | 200 with `{\"version\": ...}` |\n| `test_spawn_agent_post` | `POST /api/agents` | 200 or 201 (manifest_toml body) |\n| `test_get_agent_invalid_id` | `GET /api/agents/not-a-valid-uuid` | 400 with error field |\n| `test_get_agent_not_found` | `GET /api/agents/{uuid}` | 404 with error field |\n| `test_delete_agent_not_found` | `DELETE /api/agents/{uuid}` | 404 with error field |\n| `test_set_model_not_found` | `PUT /api/agents/{uuid}/model` | 4xx/5xx status |\n| `test_send_message_agent_not_found` | `POST /api/agents/{uuid}/message` | 400 or 404 |\n| `test_patch_agent_not_found` | `PATCH /api/agents/{uuid}` | 400 or 404 |\n\nFor the \"not found\" error tests, a fresh `uuid::Uuid::new_v4()` is generated each time to guarantee the ID doesn't collide with any real agent.\n\n### Mock Infrastructure Tests\n\nThese tests validate the mock drivers themselves rather than HTTP endpoints.\n\n#### `test_mock_llm_driver_recording`\n\nDemonstrates the core `MockLlmDriver` lifecycle:\n\n1. **Construction** — `MockLlmDriver::new(vec![\"回复1\", \"回复2\"])` preloads sequential responses.\n2. **Invocation** — each `complete()` call consumes the next response.\n3. **Assertion** — `driver.call_count()` and `driver.recorded_calls()` verify that calls were recorded with the correct parameters (model, system prompt, etc.).\n\n```rust\nlet driver = MockLlmDriver::new(vec![\"回复1\".into(), \"回复2\".into()]);\nlet resp1 = driver.complete(request.clone()).await.unwrap();\nassert_eq!(resp1.text(), \"回复1\");\n\nassert_eq!(driver.call_count(), 2);\nassert_eq!(driver.recorded_calls()[0].model, \"test-model\");\n```\n\n#### `test_mock_llm_driver_custom_tokens_and_stop_reason`\n\nShows the builder pattern for customising response metadata:\n\n```rust\nlet driver = MockLlmDriver::with_response(\"test\")\n    .with_tokens(200, 100)\n    .with_stop_reason(StopReason::MaxTokens);\n```\n\nThis lets tests assert on `resp.usage.input_tokens`, `resp.usage.output_tokens`, and `resp.stop_reason` without relying on defaults.\n\n#### `test_failing_llm_driver`\n\nValidates that `FailingLlmDriver` always returns an error with the configured message and reports `is_configured() == false`:\n\n```rust\nlet driver = FailingLlmDriver::new(\"模拟的 API 错误\");\nlet result = driver.complete(request).await;\nassert!(result.is_err());\nassert!(!driver.is_configured());\n```\n\n### Custom Configuration Tests\n\n#### `test_custom_config_kernel`\n\nDemonstrates how to override kernel configuration via `MockKernelBuilder::with_config`:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n);\nassert_eq!(app.state.kernel.config_ref().language, \"zh\");\n```\n\nThis pattern allows tests to validate behaviour under non-default settings without modifying global state.\n\n## Thread Configuration\n\nMost endpoint tests use `#[tokio::test(flavor = \"multi_thread\")]` because the Axum router and kernel may spawn background tasks. The mock driver tests (`test_mock_llm_driver_recording`, `test_mock_llm_driver_custom_tokens_and_stop_reason`, `test_failing_llm_driver`) use the default single-threaded runtime since they don't exercise the router.\n\n## Adding New Tests\n\nTo add a new endpoint test, follow the established pattern:\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_my_new_endpoint() {\n    let app = TestAppState::new();\n    let router = app.router();\n\n    let req = test_request(Method::GET, \"/api/my-endpoint\", None);\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n    let json = assert_json_ok(resp).await;\n\n    // Your assertions here\n    assert!(json.get(\"expected_field\").is_some());\n}\n```\n\nFor error-path tests, use `assert_json_error(resp, StatusCode::EXPECTED_CODE)` and assert on the `error` field in the returned JSON.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure crate providing mock implementations and route-level test utilities for the librefang ecosystem.\n\n## Purpose\n\nThis crate centralizes reusable test support code so that integration and unit tests across the workspace can share consistent mock implementations rather than each crate building its own. It ships three categories of test helpers:\n\n1. **Mock kernel** — a stand-in for `librefang-kernel` that exercises the same trait boundaries without touching real kernel resources.\n2. **Mock LLM driver** — simulates LLM responses for testing reasoning and generation paths without network calls or API keys.\n3. **API route test utilities** — helpers for constructing `axum` test requests, wiring up router instances with mock state, and asserting on responses.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TT[librefang-testing] --> LT[librefang-types]\n    TT --> LK[librefang-kernel]\n    TT --> LR[librefang-runtime]\n    TT --> LA[librefang-api]\n    TT --> TOK[tokio]\n    TT --> AXUM[axum / tower]\n    \n    LK -.->|trait impl| MK[Mock Kernel]\n    LA -.->|route helpers| RT[Route Test Utils]\n    LR -.->|driver trait| MD[Mock LLM Driver]\n```\n\nThe crate sits downstream of the core libraries it mocks. It depends on:\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared domain types used in test assertions and fixture construction. |\n| `librefang-kernel` | Provides the traits that the mock kernel implements. |\n| `librefang-runtime` | Provides the LLM driver trait that the mock driver implements. |\n| `librefang-api` | Router builder and route handlers being tested; imported with only the `telemetry` feature to keep the dependency graph light. |\n| `tokio` | Async test runtime (`#[tokio::test]` support). |\n| `axum` + `tower` | Building test router instances and invoking them via `tower::ServiceExt`. |\n| `serde_json` | Constructing and inspecting JSON request/response bodies. |\n| `dashmap` | Concurrent map used internally by mock state to track calls. |\n| `tempfile` | Creating ephemeral directories for tests that touch the filesystem. |\n| `uuid` | Generating deterministic or random IDs for test fixtures. |\n| `http-body-util` | Reading response bodies in route tests. |\n\n## Key Components\n\n### Mock Kernel\n\nA test double implementing the kernel trait(s) from `librefang-kernel`. This allows tests for the API layer and runtime to execute without a real kernel backend. Typical capabilities include:\n\n- Recording method invocations for later assertion (e.g., \"was `create_session` called with these arguments?\").\n- Returning pre-configured responses or errors to exercise success and failure paths.\n\n### Mock LLM Driver\n\nAn implementation of the LLM driver trait from `librefang-runtime` that returns canned completions. Use it to test:\n\n- Prompt construction and template rendering without hitting an external API.\n- Error handling when the driver returns a failure.\n- Token counting and cost-related logic against deterministic outputs.\n\n### API Route Test Utilities\n\nHelpers that reduce boilerplate when testing `axum` routes in isolation:\n\n- **Router construction** — build an `axum::Router` with mock state injected so routes resolve normally.\n- **Request helpers** — convenience functions for common HTTP methods with JSON bodies already serialized.\n- **Response assertions** — utilities for reading and parsing response bodies via `http-body-util`.\n\nA typical route test follows this pattern:\n\n```\n1. Set up mock kernel / mock driver with desired behavior.\n2. Build a router, injecting the mock state.\n3. Send a request through tower's ServiceExt.\n4. Assert on status code and deserialize the response body.\n```\n\n## Usage in the Workspace\n\nOther crates depend on `librefang-testing` as a dev-dependency. Because it is a dedicated test-support crate, it should never appear as a runtime dependency. In a consuming crate's `Cargo.toml`:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\nTests then import the mock implementations and helpers they need, construct the desired state, and exercise the system under test.\n\n## Design Notes\n\n- **No production code.** This crate compiles only for test targets. It must not be published or referenced from non-test code.\n- **Minimal features on `librefang-api`.** The dependency on `librefang-api` uses `default-features = false` with only `telemetry` enabled, avoiding pulling in unnecessary backend dependencies during test compilation.\n- **State isolation.** Mock implementations use `dashmap` internally so that tests running concurrently under tokio do not race on shared mutable state within a single mock instance.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types-locales\n\nFluent (FTL) localization resources for LibreFang API error messages. This module provides translated user-facing error strings consumed by the `fluent` / `fluent-bundle` localization runtime at the API layer.\n\n## Purpose\n\nWhen the API returns an error, the message identifier (e.g. `api-error-agent-not-found`) is resolved against the active locale to produce a human-readable string in the caller's preferred language. This module is the **single source of truth** for those translations — no error text is hardcoded elsewhere.\n\n## Directory Layout\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl       # German\n├── en/errors.ftl       # English  (canonical / most complete)\n├── es/errors.ftl       # Spanish\n├── fr/errors.ftl       # French\n├── ja/errors.ftl       # Japanese\n└── zh-CN/errors.ftl    # Simplified Chinese\n```\n\nEach file follows the same naming convention: `<language-tag>/errors.ftl`.\n\n## FTL Format Quick Reference\n\nEvery entry is a key-value pair in [Fluent syntax](https://projectfluent.org/):\n\n```ftl\n# Simple message\napi-error-agent-not-found = Agent not found\n\n# Message with interpolation variables\napi-error-message-delivery-failed = Message delivery failed: { $reason }\n\n# Variables are referenced as { $name }\napi-error-template-not-found = Template '{ $name }' not found\n```\n\n### Supported Variables\n\n| Variable | Typical Source | Example Key |\n|---|---|---|\n| `$reason` | API request validation | `api-error-bad-request` |\n| `$error` | Internal error detail | `api-error-template-parse-failed` |\n| `$name` | Resource identifier | `api-error-template-not-found` |\n| `$id` | Entity ID | `api-error-agent-not-found-with-id` |\n| `$step` | Workflow step label | `api-error-workflow-step-needs-agent` |\n| `$alias` | Provider alias | `api-error-provider-alias-exists` |\n| `$provider` | Provider name | `api-error-provider-model-exists` |\n| `$url` | Endpoint URL | `api-error-network-a2a-not-found` |\n| `$status` | HTTP status code | `api-error-network-auth-failed` |\n| `$max` | Size limit value | `api-error-skill-description-too-long` |\n| `$field` | Field name | `api-error-agent-invalid-sort` |\n| `$valid` | List of valid values | `api-error-agent-invalid-sort` |\n| `$event` | Event type string | `api-error-webhook-unknown-event` |\n\n## Error Categories\n\nMessages are grouped by domain within each FTL file. The English (`en`) locale defines the full canonical set; other locales may contain a subset. The categories and their key prefixes are:\n\n| Prefix | Domain | Example |\n|---|---|---|\n| `api-error-agent-*` | Agent lifecycle | `api-error-agent-spawn-failed` |\n| `api-error-message-*` | Messaging | `api-error-message-too-large` |\n| `api-error-template-*` | Template management | `api-error-template-parse-failed` |\n| `api-error-manifest-*` | Manifest parsing / signing | `api-error-manifest-signature-mismatch` |\n| `api-error-auth-*` | Authentication / API keys | `api-error-auth-invalid-key` |\n| `api-error-session-*` | Session management | `api-error-session-load-failed` |\n| `api-error-workflow-*` | Workflow orchestration | `api-error-workflow-missing-steps` |\n| `api-error-trigger-*` | Trigger registration | `api-error-trigger-missing-pattern` |\n| `api-error-budget-*` | Budget enforcement | `api-error-budget-update-failed` |\n| `api-error-config-*` | Configuration I/O | `api-error-config-write-failed` |\n| `api-error-profile-*` | Profiles | `api-error-profile-not-found` |\n| `api-error-cron-*` | Cron / scheduled tasks | `api-error-cron-invalid-expression` |\n| `api-error-goal-*` | Goal tracking | `api-error-goal-circular-parent` |\n| `api-error-memory-*` | Proactive memory / KV store | `api-error-memory-not-enabled` |\n| `api-error-network-*` | Peer network / A2A | `api-error-network-connection-failed` |\n| `api-error-plugin-*` | Plugin installation | `api-error-plugin-invalid-source` |\n| `api-error-channel-*` | Inter-agent channels | `api-error-channel-invalid-from` |\n| `api-error-provider-*` | LLM provider config | `api-error-provider-alias-exists` |\n| `api-error-skill-*` | Skill management | `api-error-skill-install-failed` |\n| `api-error-hand-*` | Hand instances | `api-error-hand-not-found` |\n| `api-error-mcp-*` | MCP server config | `api-error-mcp-missing-transport` |\n| `api-error-integration-*` / `api-error-extension-*` | Integrations & extensions | `api-error-integration-not-found` |\n| `api-error-system-*` | System-level checks | `api-error-system-cli-not-found` |\n| `api-error-kv-*` | Structured KV memory | `api-error-kv-missing-fields` |\n| `api-error-approval-*` | Approval workflow | `api-error-approval-not-found` |\n| `api-error-webhook-*` | Webhook triggers | `api-error-webhook-url-unreachable` |\n| `api-error-backup-*` | Backup create / restore | `api-error-backup-missing-manifest` |\n| `api-error-schedule-*` | Scheduled jobs | `api-error-schedule-invalid-cron` |\n| `api-error-job-*` | Background jobs | `api-error-job-not-retryable` |\n| `api-error-task-*` | Task tracking | `api-error-task-disappeared` |\n| `api-error-pairing-*` | Device pairing | `api-error-pairing-not-enabled` |\n| `api-error-binding-*` | Binding indices | `api-error-binding-out-of-range` |\n| `api-error-command-*` | CLI commands | `api-error-command-not-found` |\n| `api-error-file-*` | File upload / workspace | `api-error-file-path-traversal` |\n| `api-error-tool-*` | Tool invocation | `api-error-tool-invoke-disabled` |\n| `api-error-validation-*` | Input validation | `api-error-validation-color-invalid` |\n| `api-error-*` (unprefixed) | General fallbacks | `api-error-not-found`, `api-error-internal` |\n\n## Locale Completeness\n\nThe English locale is the canonical reference. Other locales vary in coverage:\n\n| Locale | Approximate Coverage | Notes |\n|---|---|---|\n| `en` | Full (200+ keys) | Canonical; all domains covered |\n| `ja` | Near-full | Missing only a few keys like `api-error-webhook-invalid-url`, `api-error-agent-invalid-sort` |\n| `de` / `es` / `fr` / `zh-CN` | Core subset (~40–50 keys) | Covers agents, auth, sessions, triggers, workflows, cron, config; newer domains (goals, memory, webhooks, backup, schedule, etc.) are untranslated |\n\nWhen a key is missing from a non-English locale, the Fluent runtime falls back according to its configured fallback chain (typically to `en`).\n\n## Adding a New Error Message\n\n1. **Add the key to `en/errors.ftl` first** — this is the source of truth.\n2. Provide translations in all other locale files that cover the relevant domain. If you don't have a translation, omit the key; the English fallback will be used.\n3. Follow the naming convention: `api-error-<domain>-<short-description>`.\n4. Use Fluent variables (`{ $variable }`) for any dynamic content — never concatenate strings in application code.\n\nExample — adding a new agent error:\n\n```ftl\n# en/errors.ftl\napi-error-agent-paused = Agent is paused and cannot accept messages\n\n# ja/errors.ftl\napi-error-agent-paused = エージェントは一時停止中でメッセージを受信できません\n```\n\n## Adding a New Locale\n\n1. Create the directory `librefang-types/locales/<language-tag>/`.\n2. Add an `errors.ftl` file with translations for all keys in `en/errors.ftl`.\n3. Register the new locale in the Fluent bundle initialization code so the runtime knows to load it.\n\n## Integration Points\n\nThis module is purely a static resource. At runtime:\n\n- The API server loads the FTL files into a `fluent-bundle` per locale.\n- Error handling code references messages by identifier (e.g. `api-error-agent-not-found`), passing any required variables as a hash/map.\n- The Fluent runtime interpolates variables and returns the localized string.\n- Locale selection is typically based on the `Accept-Language` header or an explicit `lang` query parameter.\n\nBecause there are no executable calls in or out of this module, it introduces no runtime dependencies beyond the Fluent library itself.","other-librefang-types-src":"# Other — librefang-types-src\n\n# librefang-types: Model Catalog Types\n\nShared data structures for the model registry. This is a pure type-definition module — no I/O, no network calls, no global state. Every other crate that needs to reason about models, providers, or catalog files depends on these types.\n\n## Architecture\n\n```mermaid\nclassDiagram\n    class ModelCatalogFile {\n        +provider: Option~ProviderCatalogToml~\n        +models: Vec~ModelCatalogEntry~\n    }\n    class ProviderCatalogToml {\n        +id: String\n        +display_name: String\n        +api_key_env: String\n        +base_url: String\n        +key_required: bool\n        +regions: HashMap~String, RegionConfig~\n        +media_capabilities: Vec~String~\n    }\n    class ProviderInfo {\n        +auth_status: AuthStatus\n        +model_count: usize\n        +available_models: Vec~String~\n        +is_custom: bool\n        +proxy_url: Option~String~\n    }\n    class ModelCatalogEntry {\n        +id: String\n        +tier: ModelTier\n        +modality: Modality\n        +context_window: u64\n        +max_output_tokens: u64\n        +validate() Result\n    }\n    class ModelOverrides {\n        +temperature: Option~f32~\n        +max_tokens: Option~u32~\n        +is_empty() bool\n    }\n    class AliasesCatalogFile {\n        +aliases: HashMap~String, String~\n    }\n    ModelCatalogFile --> ProviderCatalogToml\n    ModelCatalogFile --> ModelCatalogEntry\n    ProviderCatalogToml --> ProviderInfo : From<T> conversion\n    ProviderInfo --> RegionConfig\n    ProviderCatalogToml --> RegionConfig\n```\n\n`ModelCatalogFile` is the top-level deserialization target for catalog TOML files. `ProviderCatalogToml` captures only what lives on disk; `ProviderInfo` extends it with runtime state (auth detection results, model counts, live probe data). The `From<ProviderCatalogToml>` conversion initializes all runtime fields to their defaults.\n\n## Catalog File Format\n\nCatalog TOML files live in `catalog/providers/*.toml` (main repo) and `providers/*.toml` (community catalog). Each file has an optional `[provider]` section and a `[[models]]` array:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\n\n# Optional regional endpoints\n[provider.regions.us]\nbase_url = \"https://dashscope-us.aliyuncs.com/compatible-mode/v1\"\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\nmodality = \"text\"                 # optional, defaults to \"text\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\nsupports_thinking = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nFor image and audio models, `context_window` and `max_output_tokens` are omitted entirely:\n\n```toml\n[[models]]\nid = \"gpt-image-2\"\ndisplay_name = \"GPT Image 2\"\ntier = \"frontier\"\nmodality = \"image\"\ninput_cost_per_m = 5.00\noutput_cost_per_m = 10.00\nimage_input_cost_per_m = 8.00\nimage_output_cost_per_m = 30.00\nsupports_vision = true\naliases = [\"gpt-image-2-2026-04-21\"]\n```\n\nSeparate alias files (`AliasesCatalogFile`) map short names to canonical model IDs:\n\n```toml\n[aliases]\nsonnet = \"claude-sonnet-4-20250514\"\nhaiku = \"claude-haiku-4-5-20251001\"\n```\n\n## Key Types\n\n### Enums\n\n**`ModelTier`** — Capability classification. Default is `Balanced`. Serializes as lowercase strings (`\"frontier\"`, `\"smart\"`, `\"balanced\"`, `\"fast\"`, `\"local\"`, `\"custom\"`).\n\n**`AuthStatus`** — Provider authentication state. The important method is `is_available()`, which returns `true` for states where the provider is usable (`ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, `NotRequired`). `InvalidKey` deliberately returns `false` — the key exists but was rejected (HTTP 401/403). Default is `Missing`.\n\n`LocalOffline` is probe-owned: only the probe logic transitions it back to `NotRequired` when the service comes back up. `detect_auth()` does not reset it.\n\n**`Modality`** — Output type (`Text`, `Image`, `Audio`). Controls whether `context_window` and `max_output_tokens` are required during validation. Default is `Text`.\n\n**`ModelType`** — Classification for inference routing (`Chat`, `Speech`, `Embedding`). Used in `ModelOverrides`. Default is `Chat`.\n\n### ModelCatalogEntry\n\nThe core model descriptor. All cost fields use USD per million tokens:\n\n| Field | Notes |\n|---|---|\n| `context_window` | `0` means unknown/N/A. **Must not** be fed into compaction thresholds or budget math. |\n| `max_output_tokens` | Same `0`-means-unknown rule. |\n| `image_input_cost_per_m` | Optional — only for multimodal models with separate image pricing. |\n| `image_output_cost_per_m` | Optional — only for image-generation models. |\n\n**`validate()`** enforces modality-aware rules:\n- `Modality::Text` entries **must** have non-zero `context_window` and `max_output_tokens`.\n- `Modality::Image` and `Modality::Audio` entries skip this check.\n\nCatalog loaders in `librefang-runtime` (`from_sources`) and the providers route (`add_custom_model`) both call `validate()` and reject entries that fail. This prevents malformed entries from silently propagating `0` into downstream calculations.\n\n**`is_image_generation()`** is a convenience check for `modality == Modality::Image`.\n\n### ModelOverrides\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` — `None` means \"use the agent's or system default.\"\n\nResolution order: agent-level `ModelConfig` → `ModelOverrides` → system defaults.\n\n`is_empty()` returns `true` when all fields are `None`.\n\nNotable fields:\n- `use_max_completion_tokens` — switches the API parameter from `max_tokens` to `max_completion_tokens` (OpenAI reasoning models).\n- `no_system_role` — suppresses the system role message for models that don't support it.\n- `force_max_tokens` — sends `max_tokens` even when the provider doesn't require it.\n\n### ProviderInfo vs ProviderCatalogToml\n\n`ProviderCatalogToml` is the on-disk shape — it maps 1:1 to the `[provider]` TOML section with no runtime fields.\n\n`ProviderInfo` adds:\n- `auth_status` — populated by the auth detection system.\n- `model_count` — computed by the catalog loader.\n- `available_models` — filled by live API probes.\n- `is_custom` — `true` for user-added providers (via dashboard \"Add provider\"), `false` for registry-shipped providers. Built-in providers cannot be deleted because registry sync would re-create them.\n- `proxy_url` — per-provider proxy override.\n\n### RegionConfig\n\nPer-region endpoint overrides within a provider. Each region can override `base_url` and optionally `api_key_env`. When no region is selected, the provider-level `base_url` is used.\n\n## Serde Behavior\n\nAll enums use `#[serde(rename_all = \"lowercase\")]` (for `ModelTier`, `Modality`, `ModelType`) or `snake_case` (for `AuthStatus`), so TOML/JSON values are plain strings like `\"frontier\"` or `\"configured_cli\"`.\n\n`ModelCatalogEntry` uses `#[serde(default)]` on most fields, allowing partial TOML entries. Optional cost fields (`image_input_cost_per_m`, `image_output_cost_per_m`) use `skip_serializing_if = \"Option::is_none\"` to keep serialized output clean.\n\n`ProviderCatalogToml.key_required` defaults to `true` via a custom `default_key_required()` function — TOML files that omit it get the correct behavior for cloud providers.\n\n## Integration Points\n\nThis module is consumed by:\n\n- **`librefang-runtime/src/model_catalog.rs`** — `from_sources()` loads and validates catalog entries; `merge_discovered_models()` builds entries from live API probes.\n- **`librefang-runtime/src/model_metadata.rs`** — `synthesize_entry()` and the `entry()` helper construct `ModelCatalogEntry` instances for models discovered at runtime.\n- **`src/routes/providers.rs`** — `add_custom_model()` validates user-submitted model entries before persisting them.\n- **`librefang-kernel-metering`** — uses `ModelCatalogFile` data for cost estimation during token metering.","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types-tests\n\nIntegration tests for the `librefang-types` crate. Two concerns live here: **round-trip contract tests** that lock the dashboard's TOML serializer to the kernel's deserializer, and **schema-dump diagnostics** for eyeballing `schemars`-generated JSON Schema output.\n\n## Why these tests exist\n\nThe dashboard (TypeScript) produces TOML via a visual agent-editor form. The kernel (Rust) reads that TOML into `AgentManifest`. If either side renames a field, changes an enum variant, or alters defaulting behavior, agents silently break at runtime. These tests catch that drift at build time by parsing the *exact* TOML the dashboard's serializer would emit and asserting the resulting Rust structs.\n\nThe schema-dump tests serve a different purpose: they're a low-friction way to inspect what `schemars` produces for key config types (`BudgetConfig`, `VaultConfig`, `KernelConfig`, `ResponseFormat`) without wiring up a full HTTP endpoint.\n\n---\n\n## Test Files\n\n### `agent_form_roundtrip.rs`\n\nMirror of the serializer rules in `crates/librefang-api/dashboard/src/lib/agentManifest.ts`. Each test constructs a TOML string matching what the dashboard form emits, deserializes it into `AgentManifest`, and asserts field values.\n\n| Test | What it covers |\n|---|---|\n| `parses_form_minimum_viable_output` | Bare-minimum manifest: name, version, module, and a model block with provider + model name. |\n| `parses_form_full_output_with_capabilities_and_resources` | All basic sections populated: description, tags, skills, model options (temperature, max_tokens, system_prompt), resource quotas, and capabilities (network, shell, agent_spawn). |\n| `parses_form_with_advanced_sections` | Every advanced section filled: priority, session_mode, web_search_augmentation, schedule, exec_policy, thinking budget, autonomous config, routing tiers, fallback_models (array-of-tables), context_injection, and extended capability globs (memory_read, memory_write, agent_message, ofp_connect). |\n| `parses_form_response_format_json_schema` | Inline `ResponseFormat::JsonSchema` variant with name, schema, and strict flag. Validates that the tagged-enum TOML representation round-trips correctly. |\n| `omitting_optional_sections_uses_defaults` | Manifest with no resources or capabilities sections. Asserts that `ResourceQuota` and `ManifestCapabilities` fields fall back to their defaults (empty vecs, `None` for optional limits, `false` for booleans). |\n\n**Key types validated across these tests:**\n\n- `AgentManifest` — top-level config struct\n- `Priority` — enum (e.g. `High`)\n- `SessionMode` — enum (e.g. `New`)\n- `ResponseFormat::JsonSchema` — tagged enum variant carrying `serde_json::Value`\n- Optional advanced sections: `thinking`, `autonomous`, `routing` — each deserializes as `Option<T>`, so their absence must produce `None`\n\n### `schemars_poc.rs`\n\nRun with `--nocapture` to see output:\n\n```bash\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```\n\n| Test | What it dumps |\n|---|---|\n| `dump_budget_config_schema` | `BudgetConfig` — straightforward struct, baseline for size comparison. |\n| `dump_vault_config_schema` | `VaultConfig` — contains `Option<PathBuf>`, useful for checking how filesystem paths render in JSON Schema. |\n| `full_kernel_config_schema_generates` | `KernelConfig` — end-to-end sanity check. Asserts >50 top-level properties and >50 nested definitions, confirming the full config surface is representable. |\n| `dump_response_format_schema` | `ResponseFormat` — tagged enum with a variant carrying `serde_json::Value`. This is a high-risk point for schema fidelity. |\n\nThese are not strict pass/fail contract tests (except `full_kernel_config_schema_generates`, which asserts minimum field counts). They exist for developer inspection during schema evolution.\n\n---\n\n## Relationship to the codebase\n\n```\nDashboard (TS)                 Kernel (Rust)\n┌──────────────────┐           ┌─────────────────────┐\n│ agentManifest.ts  │──TOML──▶│ AgentManifest        │\n│ (serializer)      │          │ (serde deserializer) │\n└──────────────────┘           └─────────────────────┘\n        │                              │\n        └──── contract tested by ──────┘\n             agent_form_roundtrip.rs\n```\n\n- **Upstream dependency**: `librefang-types` provides the `AgentManifest`, `Priority`, `SessionMode`, `ResponseFormat`, and all supporting structs.\n- **Cross-repo contract**: The TOML strings in these tests must be kept in sync with `agentManifest.ts`. If the dashboard serializer changes, the corresponding test here should be updated (or should fail, signaling the break).\n- **No outbound calls**: These tests are pure deserialization + assertion. No network, no filesystem, no database.\n\n## Adding a new round-trip test\n\nWhen the dashboard form gains a new field or section:\n\n1. Add a test case (or extend an existing one) with the exact TOML the dashboard will emit.\n2. Assert the deserialized field values and any defaulting behavior.\n3. If the field uses a new enum variant or struct, verify it appears correctly in the parsed output.\n\nFor schema work, add a `dump_*` test to `schemars_poc.rs` and inspect the output. If the type is already covered by `KernelConfig`, the `full_kernel_config_schema_generates` test will pick up new definitions automatically.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nCore type definitions, traits, and shared data structures for the LibreFang Agent OS.\n\n## Purpose\n\n`librefang-types` is the foundational crate that every other LibreFang module depends on. It defines the canonical data types, error enums, configuration shapes, cryptographic primitives, and trait interfaces that make up the domain model of the agent operating system. No business logic or I/O lives here — only type definitions and lightweight helper methods.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[Crypto & Identity]\n    A --> C[Configuration]\n    A --> D[Error Types]\n    A --> E[Serialization]\n    A --> F[Localization]\n    A --> G[Schema Generation]\n```\n\nEvery other crate in the workspace imports `librefang-types` to share a common vocabulary. This keeps serialization formats, wire protocols, and validation rules consistent across the system.\n\n## Key Areas\n\n### Crypto and Identity\n\nDependencies: `ed25519-dalek`, `sha2`, `hex`, `zeroize`\n\nDefines the agent identity model built on Ed25519 key pairs. Types in this area likely include:\n\n- **Agent key material** — public/private key wrappers with `Zeroize` derives so secrets are cleared from memory on drop.\n- **Signature types** — for verifying message authenticity between agents and the control plane.\n- **Fingerprint/digest types** — SHA-256 hashes used for content-addressing and integrity checks.\n\nThe `zeroize` dependency signals that secret keys implement `Zeroize` to reduce the window of exposure in memory.\n\n### Configuration\n\nDependencies: `toml`, `dirs`\n\nDefines the structure of agent configuration files loaded at startup. Types here are typically `Deserialize` + `Serialize` structs with field-level defaults, pointing to paths resolved via the `dirs` crate (config dir, data dir, cache dir).\n\n### Error Types\n\nDependency: `thiserror`\n\nAll crate-local error enums derive from `thiserror::Error`. This gives ergonomic `From` conversions and human-readable error messages without depending on a specific error framework. Other crates re-export these error types or wrap them in their own.\n\n### Serialization and Schema\n\nDependencies: `serde`, `serde_json`, `schemars`\n\nAll public data types derive `Serialize` and `Deserialize`. The `schemars` dependency (with `chrono` and `uuid1` features enabled) means JSON Schemas can be auto-generated for every type — useful for API documentation, validation on the control plane, and interop with external tooling.\n\nDev-dependencies include `rmp-serde`, confirming that types are also tested against MessagePack serialization for binary wire formats.\n\n### Localization\n\nDependencies: `fluent`, `unic-langid`, `regex-lite`\n\nProvides the i18n infrastructure for agent-facing messages, logs, and error descriptions. `unic-langid` parses and compares language tags, while `fluent` loads and resolves translation strings at runtime. `regex-lite` supports message interpolation or validation patterns within localized strings.\n\n## Integration Points\n\n### Depending on This Crate\n\nAdd to your `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-types = { path = \"../librefang-types\" }\n```\n\nThen import the types you need:\n\n```rust\nuse librefang_types::{AgentId, AgentConfig, Signature, AgentError};\n```\n\n### Re-exports\n\nOther workspace crates should re-export types from this crate when they appear in their own public API, rather than duplicating definitions. This keeps the type identity stable across the dependency graph.\n\n## Testing\n\nThe dev-dependencies (`rmp-serde`, `tempfile`) indicate that unit tests cover:\n\n- **Round-trip serialization** — types are serialized to JSON, TOML, and MessagePack, then deserialized back and compared.\n- **File-based config loading** — temporary TOML files are written and parsed to validate configuration structs.\n\nRun tests with:\n\n```bash\ncargo test -p librefang-types\n```\n\n## Design Conventions\n\n| Convention | Rationale |\n|---|---|\n| All public types derive `Serialize` / `Deserialize` | Ensures any type can cross a process or network boundary |\n| `schemars` annotations on non-obvious fields | Auto-generated schemas stay accurate for downstream consumers |\n| `zeroize::Zeroize` on secret-holding types | Secrets are wiped from memory when dropped |\n| `thiserror` for error enums | Consistent error formatting with minimal boilerplate |\n| `async_trait` for trait definitions | Traits that require async methods use `#[async_trait]` for compatibility |\n| No I/O or side effects in this crate | Types remain testable and portable across runtimes |","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer implementing the **LibreFang Protocol (OFP)** — responsible for authenticating, serializing, transporting, and dispatching messages between LibreFang agents.\n\n## Purpose\n\n`librefang-wire` is the networking backbone of the LibreFang distributed system. Every agent communicates exclusively through this crate. It provides:\n\n- **Authenticated message framing** — every message is HMAC-signed and verified, preventing tampering and impersonation on the wire.\n- **Async transport** — built on Tokio, the crate exposes non-blocking read/write interfaces suitable for high-concurrency agent deployments.\n- **Concurrent connection management** — uses `DashMap` for lock-free tracking of peer connections and session state across Tokio tasks.\n- **Structured serialization** — all payloads are JSON-encoded via `serde_json`, enabling interoperability and human-readable debugging.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Application] -->|send/recv| B[librefang-wire]\n    B --> C[HMAC-SHA256 Authenticator]\n    B --> D[JSON Serializer / Deserializer]\n    B --> E[Connection Manager - DashMap]\n    B --> F[Tokio Async Transport]\n    D --> G[librefang-types]\n```\n\nThe crate sits between the agent application logic and the raw async I/O layer. Messages flow downward through authentication and serialization before hitting the network, and arrive upward through deserialization and verification before being dispatched to the application.\n\n## Key Dependency Roles\n\n| Dependency | Role in `librefang-wire` |\n|---|---|\n| `librefang-types` | Shared domain types (messages, commands, responses) serialized on the wire |\n| `tokio` | Async runtime — TCP streams, I/O drivers, task spawning for concurrent peer handling |\n| `serde` / `serde_json` | Derive-based ser
