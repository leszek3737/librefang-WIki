fication. |\n| `webpki-roots` | Bundles Mozilla's root certificates. Used as a fallback when the system certificate store is unavailable or incomplete. |\n| `rustls-native-certs` | Loads certificates from the operating system's native store. Preferred source for trust anchors. |\n| `tracing` | Structured logging for certificate loading failures, proxy detection events, and other diagnostics. |\n| `librefang-types` | Shared types used across the workspace; this crate may reference configuration or error types defined there. |\n\n## TLS Certificate Strategy\n\nThe crate implements a two-tier certificate loading approach:\n\n1. **System certificates first.** `rustls-native-certs` loads the host OS trust store. This is the preferred path because it respects any custom CAs the user or administrator has installed (corporate proxies, development CAs, etc.).\n\n2. **WebPKI roots as fallback.** If the system store fails to load or is empty, `webpki-roots` provides Mozilla's curated set of root certificates so the client can still verify servers.\n\n`tracing` is used to emit warnings when the system store fails to load, making it easy to diagnose TLS issues in production.\n\n## Proxy Support\n\nThe crate configures the `reqwest` client to respect standard proxy environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`, and their lowercase equivalents). This is typically handled through reqwest's built-in proxy detection, ensuring behavior consistent with other HTTP tooling on the host system.\n\n## Usage Pattern\n\nConsumers depend on this crate and call its builder or constructor function to obtain a `reqwest::Client` (or `reqwest::ClientBuilder`) that is already configured with the correct TLS backend and proxy settings. They then use that client as they would any standard reqwest client — no special handling is required at the call site.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\n## Purpose\n\nThis crate defines the `KernelHandle` trait — the primary in-process interface for interacting with the LibreFang kernel. It exists as a standalone crate to break circular dependencies: consumers that need to call into the kernel depend on this lightweight trait crate rather than the full kernel implementation.\n\nThe trait follows the classic Rust \"interface crate\" pattern, providing a stable contract between the kernel and its in-process callers.\n\n## Role in the Architecture\n\n```\n┌─────────────────────┐\n│  In-process callers │   (plugins, services, tests)\n└────────┬────────────┘\n         │ depends on\n         ▼\n┌─────────────────────────┐\n│ librefang-kernel-handle │   ← this crate (trait only)\n└────────┬────────────────┘\n         │ depends on\n         ▼\n┌─────────────────────┐\n│  librefang-types    │\n└─────────────────────┘\n```\n\nThe concrete kernel implementation depends on this crate and provides a type that satisfies `KernelHandle`. Callers depend only on this crate and `librefang-types`, remaining decoupled from kernel internals.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared domain types used in trait method signatures |\n| `async-trait` | Enables async methods in the trait definition |\n| `serde` / `serde_json` | Serialization of request/response payloads |\n| `tokio` | Async runtime primitives |\n| `tracing` | Instrumentation for trait method implementations |\n| `uuid` | Identifier generation within handle operations |\n\n## Key Component: `KernelHandle` Trait\n\nThe central export of this crate is the `KernelHandle` trait, annotated with `#[async_trait]` to support async method calls. It defines the operations available to in-process callers — typically mirroring the operations the kernel exposes over its external transport, but without serialization overhead.\n\n### Implementing the Trait\n\nA concrete implementation lives in the kernel crate itself. The implementor wraps internal kernel state (channels, state machines, etc.) and translates each trait method call into the appropriate internal operation.\n\n### Consuming the Trait\n\nCallers receive a `dyn KernelHandle` (or a generic `H: KernelHandle`) and invoke methods without knowing whether they are talking to the real kernel, a test mock, or a shim.\n\n## Usage in Tests\n\nBecause this crate contains no logic — only a trait definition and shared types — it is ideal for mock-based testing. Test suites depend on `librefang-kernel-handle`, define a stub implementation, and exercise caller code in isolation.\n\n## Extension Guidelines\n\n- **Adding methods:** Add new async methods to the trait with default implementations where possible to avoid breaking existing implementors. If a default body isn't feasible, all implementors (kernel, mocks, shims) must be updated in the same change.\n- **Changing signatures:** Treat the trait as a public API. Deprecate old signatures before removing them.\n- **New dependencies:** Keep this crate minimal. Only add dependencies that are required by the trait signatures themselves. Implementation-heavy dependencies belong in the kernel crate.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Purpose\n\nThis module is responsible for tracking resource consumption and enforcing quota limits within the LibreFang kernel. It provides the mechanisms to measure the \"cost\" of operations — whether in terms of memory allocations, computation, or other kernel-managed resources — and ensures that consumers stay within their allocated budgets.\n\n## Role in the Kernel\n\nMetering sits between the raw resource providers (such as `librefang-memory`) and the execution layer (`librefang-runtime`). Every resource-consuming operation can be accounted for through this module, enabling the kernel to:\n\n- **Meter** — Record resource usage per context, session, or tenant.\n- **Enforce** — Reject or throttle operations that would exceed a defined quota.\n- **Report** — Expose usage data for observability and billing (serialized via `serde`).\n\n## Dependencies\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared domain types — metering identifiers, quota definitions, cost units. |\n| `librefang-memory` | Hooks into the memory subsystem to track allocation-based costs. |\n| `librefang-runtime` | Integrates with the execution runtime so that operations can be metered as they run. |\n| `serde` | Serialization of metering records and quota state for persistence or transmission. |\n\n## Architecture\n\n```\n┌─────────────────────┐\n│  librefang-runtime   │  (executes metered operations)\n└─────────┬───────────┘\n          │ queries / checks\n          ▼\n┌──────────────────────────┐\n│ librefang-kernel-metering │  (this crate)\n│                           │\n│  • Track consumption      │\n│  • Check quota limits     │\n│  • Produce metering data  │\n└─────────┬────────────────┘\n          │ reads allocation info\n          ▼\n┌─────────────────────┐\n│  librefang-memory    │  (provides allocation data)\n└─────────────────────┘\n\n         Shared types via librefang-types\n```\n\nThe metering module is a cross-cutting concern: the runtime consults it before and after resource-intensive operations, while it pulls raw allocation data from the memory subsystem to derive actual costs.\n\n## Integration Points\n\n### For runtime authors\n\nThe runtime should call into this module at operation boundaries — before starting work to check remaining quota, and after completion to record actual consumption.\n\n### For memory subsystem integration\n\nMemory allocation events feed into the metering system so that byte-level costs are accurately reflected in quota calculations.\n\n### For external consumers\n\nMetering records and quota snapshots are `serde`-serializable, making them available to external systems for reporting, persistence, or billing pipelines.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand and template routing engine for the LibreFang kernel. This module is responsible for resolving incoming input to the correct hand definition and template, serving as the primary dispatch layer between raw input and kernel execution.\n\n## Purpose\n\nWhen the LibreFang kernel receives input (typically from a character or stroke recognition pipeline), it needs to determine which *hand* — a defined gesture or character shape — the input matches, and which *template* governs that match. The router owns this resolution logic, including:\n\n- Loading and caching hand/template definitions from configuration files.\n- Pattern matching incoming stroke data against registered hands.\n- Scoring and ranking candidate matches.\n- Returning routing decisions to the kernel for downstream processing.\n\n## Architecture\n\nThe router sits between the type system (`librefang-types`) and the hand definitions (`librefang-hands`), consuming structured input and producing routing outcomes.\n\n```mermaid\ngraph LR\n    A[Input Data] --> B[Router]\n    B --> C[librefang-hands]\n    C --> B\n    B --> D[Routing Decision]\n    D --> E[Kernel / Runtime]\n    B --> F[TOML Config Files]\n    F --> B\n```\n\n## Dependencies\n\n| Crate | Purpose |\n|-------|---------|\n| `librefang-types` | Core type definitions used across all LibreFang crates — stroke data, match results, routing tables. |\n| `librefang-hands` | Hand and template definitions that the router loads, indexes, and matches against. |\n| `serde` / `serde_json` | Deserialization of configuration files and serialization of routing state. |\n| `regex-lite` | Lightweight regex support for pattern-based template matching rules. |\n| `toml` | Parsing of TOML-based hand and template configuration files. |\n| `dirs` | Resolving platform-specific configuration directories where hand/template definitions are stored. |\n| `tracing` | Structured logging of routing decisions, match scores, and diagnostic information. |\n\n## Configuration Loading\n\nThe router uses `dirs` to locate platform-appropriate configuration directories and `toml` to parse hand/template definition files. Configuration is typically loaded at startup and cached for the lifetime of the kernel process.\n\nExpected configuration locations follow the standard `dirs` conventions:\n\n- **Linux:** `~/.config/librefang/` or `$XDG_CONFIG_HOME/librefang/`\n- **macOS:** `~/Library/Application Support/librefang/`\n- **Windows:** `%APPDATA%\\librefang\\`\n\n## Pattern Matching\n\nThe `regex-lite` dependency indicates that template routing supports regex-based pattern rules. This allows hands to define flexible matching criteria rather than relying solely on exact structural comparison.\n\n## Development\n\n### Running Tests\n\nThe crate uses `tempfile` (dev dependency) for tests that involve file I/O — configuration loading, caching behavior, and directory resolution. The `librefang-runtime` dev dependency allows integration-level tests that exercise the router within a minimal runtime context.\n\n```sh\ncargo test -p librefang-kernel-router\n```\n\n### Adding New Routing Rules\n\nWhen extending the router with new matching strategies:\n\n1. Define the matching logic using the primitives from `librefang-types`.\n2. Register any new configuration keys in the TOML schema.\n3. Add unit tests with `tempfile`-based fixtures for config loading.\n4. Add integration tests under `dev-dependencies` using `librefang-runtime` to validate end-to-end routing behavior.\n\n## Integration with the Kernel\n\nThe router is consumed by the kernel layer, which calls into it after preprocessing raw input. The router produces a routing decision that the kernel then passes to the execution layer. It has no direct dependency on the runtime — that relationship is inverted, with the runtime consuming the router during kernel initialization.\n\n## Logging and Diagnostics\n\nAll routing decisions are instrumented with `tracing` spans. Enable `debug` or `trace` level logging for this crate to inspect:\n\n- Configuration file discovery and loading.\n- Candidate hand evaluation and scoring.\n- Final routing decisions and match confidence.","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# librefang-kernel-src — Kernel Test Suite\n\n## Purpose\n\nThis module is the integration and behavioral test suite for `LibreFangKernel`. It validates the kernel's core invariants—agent lifecycle, privilege delegation, tool resolution, skill registry management, notification routing, and LLM response parsing—under realistic conditions. Every test boots a temporary kernel instance against an isolated `tempdir` home, so no shared state leaks between runs.\n\nThe test file lives at `kernel/tests.rs` and is compiled as part of the kernel crate's `#[cfg(test)]` module (`use super::*` pulls in the parent `kernel` mod).\n\n## Test Helpers\n\n### `RecordingChannelAdapter`\n\nA `ChannelAdapter` implementation that records every sent text message into an `Arc<Mutex<Vec<String>>>` shared with the test harness. Its `start` stream is permanently empty, and `send` captures `\"user_id:text\"` pairs. Used by async tests that need to assert notification routing without a real chat backend.\n\n### `EnvVarGuard` / `set_test_env`\n\nSets an environment variable and returns a guard that removes it on drop. Prevents environment pollution across tests that exercise `api_key_env` resolution.\n\n```rust\nlet _guard = set_test_env(\"LIBREFANG_TEST_ROTATION_PRIMARY_KEY_A\", \"key-1\");\n// variable is unset when _guard drops at end of scope\n```\n\n### `install_test_skill`\n\nWrites a minimal valid `skill.toml` (plus a stub `prompt_context.md`) into a directory so the skill registry's loader accepts it. Accepts a name and tags:\n\n```rust\ninstall_test_skill(&skills_parent, \"kept-skill\", &[\"coding\", \"rust\"]);\n```\n\n### `test_manifest` / `make_trace`\n\nConvenience constructors for `AgentManifest` and `DecisionTrace` that reduce boilerplate in registry and trace-summarization tests.\n\n---\n\n## Behavioral Contracts Verified\n\n### 1. API Key Rotation Deduplication\n\n**Tests:** `test_collect_rotation_key_specs_dedupes_primary_profile_key`, `test_collect_rotation_key_specs_prepends_distinct_primary_and_skips_missing_profiles`\n\n`collect_rotation_key_specs(profiles, primary_key)` builds a list of `RotationKeySpec` entries for LLM provider key rotation. The invariants are:\n\n- If an `AuthProfile` references the same env var as the primary driver key, it gets `use_primary_driver: true` and appears exactly once (no duplicates).\n- If the primary key differs from all profiles, a synthetic `\"primary\"` entry is prepended.\n- Profiles whose `api_key_env` points to an unset variable are silently skipped.\n\n### 2. Escalated Approval Notification Routing\n\n**Test:** `test_notify_escalated_approval_prefers_request_route_to`\n\nWhen an `ApprovalRequest` is escalated (`escalation_count > 0`), `notify_escalated_approval` must route notifications to the request's `route_to` field **in preference to** all other targets—routing rules, agent notification rules, and global approval channels. This prevents escalation spam from broadcasting to irrelevant recipients.\n\n### 3. Manifest → Capabilities Expansion\n\n**Tests:** `test_manifest_to_capabilities`, `test_manifest_to_capabilities_with_profile`, `test_manifest_to_capabilities_profile_overridden_by_explicit_tools`\n\n`manifest_to_capabilities` converts an `AgentManifest` into a `Vec<Capability>`:\n\n- Explicit `capabilities.tools` entries map to `Capability::ToolInvoke(name)`.\n- `capabilities.agent_spawn = true` maps to `Capability::AgentSpawn`.\n- A `ToolProfile` (e.g. `Coding`) expands into its full tool set (`file_read`, `file_write`, `file_list`, `shell_exec`, `web_fetch`) **only when** `capabilities.tools` is empty. Explicit tools always take precedence over the profile.\n- Profiles also imply `Capability::ShellExec(_)` and `Capability::NetConnect(_)`.\n\n### 4. Agent Registry Lookup\n\n**Tests:** `test_send_to_agent_by_name_resolution`, `test_find_agents_by_tag`\n\n`AgentRegistry` supports three lookup strategies:\n\n| Method | Key | Returns |\n|---|---|---|\n| `register(entry)` | `AgentId` | Inserts by ID + name index |\n| `get(id)` | `AgentId` | Exact `Option<AgentEntry>` |\n| `find_by_name(\"coder\")` | Name string | Exact match `Option<AgentEntry>` |\n| Tag-based filtering | `entry.tags` | Manual `.iter().filter()` on `list()` |\n\n### 5. Agent Spawning & Privilege Delegation\n\n**Tests:** `test_spawn_agent_applies_local_default_model_override`, `test_spawn_child_exceeding_parent_is_rejected`, `test_spawn_child_with_subset_capabilities_is_allowed`, `test_spawn_with_unknown_parent_fails_closed`\n\n```mermaid\ngraph TD\n    A[spawn_agent_inner] --> B{Parent ID?}\n    B -- None --> C[Top-level spawn]\n    B -- Some(id) --> D{Parent in registry?}\n    D -- No --> E[FAIL: \"not registered\"]\n    D -- Yes --> F{Child caps ⊆ Parent caps?}\n    F -- No --> G[FAIL: \"Privilege escalation denied\"]\n    F -- Yes --> H[Register child]\n    C --> I[Store \"default\"/\"default\" model]\n    I --> H\n```\n\nKey invariants:\n\n- **Capability subset rule:** A child's declared capabilities (tools, shell, network) must be a subset of its parent's. The check runs in `spawn_agent_inner` itself, not just in the higher-level `spawn_agent_checked`. This closes a bypass where direct callers (channel handlers, workflow engines) could silently escalate.\n- **Unknown parent fails closed:** Passing a stale `AgentId` as `parent` results in an error, not silent top-level promotion.\n- **Deferred model resolution:** The spawn stores `\"default\"` for both `provider` and `model` on the manifest. Concrete provider resolution happens at `execute_llm_agent` time, so the runtime picks up `default_model_override` changes without re-spawning.\n\n### 6. Provider Switching & Override Cleanup\n\n**Test:** `test_set_agent_model_clears_overrides_when_provider_changes`\n\n`set_agent_model(agent_id, model, provider)` handles two cases:\n\n- **Different provider** (e.g. `cloudverse` → `openrouter`): Clears `api_key_env` and `base_url` on the agent's `ModelConfig` so `resolve_driver` falls back to the new provider's global credentials and URL. Prevents issue #2380 where stale keys produced 401 errors.\n- **Same provider, different model**: Preserves any per-agent `api_key_env`/`base_url` overrides since they remain valid.\n\n### 7. Hand Activation\n\n**Tests:** `test_hand_activation_does_not_seed_runtime_tool_filters`, `test_hand_reactivation_rebuilds_same_runtime_profile`\n\n`activate_hand` / `deactivate_hand` manage persistent agent instances tied to external integrations (\"hands\"):\n\n- Activation must **not** set `tool_allowlist` or `tool_blocklist` on the manifest—skill and MCP tools must remain visible.\n- Re-activating the same hand after deactivation must rebuild an identical runtime profile (capabilities, profile, allowlist, blocklist, MCP servers).\n\n### 8. Tool Availability Resolution\n\n**Tests:** `test_available_tools_returns_empty_when_tools_disabled`, `test_available_tools_glob_pattern_matches_mcp_tools`, `test_shell_exec_available_when_declared_in_tools_without_explicit_exec_policy`, `test_skill_evolve_tools_default_available_to_restricted_agent`\n\n`available_tools(agent_id)` applies these rules in order:\n\n1. If `manifest.tools_disabled == true`, return empty regardless of all other config.\n2. Filter the global `builtin_tool_definitions()` against the agent's declared `capabilities.tools` using **glob matching** (`file_*` matches `file_read`, `file_write`, `file_list`).\n3. `shell_exec` is auto-promoted: if it appears in `capabilities.tools` and `capabilities.shell` is non-empty, the agent's `exec_policy` is promoted to `Full` even if the global default is `Deny`.\n4. Skill-evolution tools (`skill_evolve_create`, `skill_evolve_update`, etc.) are always available regardless of `capabilities.tools`—every agent can self-evolve.\n\n### 9. Route Caching Heuristics\n\n**Tests:** `test_should_reuse_cached_route_for_brief_follow_up`, `test_assistant_route_key_scopes_sender_and_thread`\n\n- `should_reuse_cached_route(text)` returns `true` for short follow-ups (\"fix that\", \"继续\") and `false` for gratitude (\"thanks\") or substantive new requests. This determines whether the assistant reuses its last active agent or re-routes.\n- `assistant_route_key(agent_id, sender)` produces a cache key that includes the channel, user ID, and thread ID from the `SenderContext`, ensuring per-conversation isolation.\n\n### 10. Ephemeral Messaging\n\n**Tests:** `test_send_message_ephemeral_unknown_agent_returns_not_found`, `test_send_message_ephemeral_does_not_modify_session`\n\n`send_message_ephemeral(agent_id, text)` is a side-effect-free query path:\n\n- Returns an error for unknown agent IDs.\n- Does **not** append to the agent's session history, even if the LLM call fails. The session message count is identical before and after.\n\n### 11. Approval Sweep Idempotency\n\n**Test:** `test_spawn_approval_sweep_task_is_idempotent`\n\n`spawn_approval_sweep_task()` sets `approval_sweep_started` (an `AtomicBool`) to guard against duplicate background tasks. Calling it twice is a no-op. After `shutdown()`, the flag resets to `false`.\n\n### 12. Condition Evaluation\n\n**Tests:** `test_evaluate_condition_none`, `test_evaluate_condition_empty`, `test_evaluate_condition_tag_match`, `test_evaluate_condition_tag_no_match`, `test_evaluate_condition_unknown_format`\n\n`evaluate_condition(condition, tags)` implements a simple DSL:\n\n| Condition | Result |\n|---|---|\n| `None` | `true` (no filter) |\n| `Some(\"\")` | `true` (empty filter) |\n| `Some(\"agent.tags contains 'chat'\")` | `true` if `\"chat\"` is in `tags` |\n| Unknown format | `false` (strict deny) |\n\n### 13. Peer-Scoped Memory Keys\n\n**Test:** `test_peer_scoped_key`\n\n`peer_scoped_key(key, peer_id)` namespaces memory keys per-user when a peer is present:\n\n- `peer_scoped_key(\"car\", Some(\"user-123\"))` → `\"peer:user-123:car\"`\n- `peer_scoped_key(\"car\", None)` → `\"car\"`\n\n### 14. Thinking Override\n\n**Tests:** `test_apply_thinking_override_none_leaves_manifest_untouched`, `test_apply_thinking_override_force_off_clears_thinking`, `test_apply_thinking_override_force_on_inserts_default`, `test_apply_thinking_override_force_on_keeps_existing_budget`\n\n`apply_thinking_override(manifest, override)` controls the agent's extended-thinking budget:\n\n- `None`: no change.\n- `Some(false)`: clears `manifest.thinking` entirely (forces thinking off).\n- `Some(true)`: inserts default `ThinkingConfig` if absent, preserves existing `budget_tokens` if present.\n\n### 15. JSON Extraction from LLM Responses\n\n**Tests:** `test_extract_json_from_code_block` through `test_extract_json_multiple_code_blocks`\n\n`extract_json_from_llm_response(text)` handles the full spectrum of LLM output formats:\n\n- JSON inside `` ```json `` code fences (extracts the first valid block).\n- Bare JSON objects in free text.\n- JSON surrounded by prose.\n- Nested braces inside string values (handled correctly, not by naive `find/rfind`).\n- Returns `None` for text with no JSON or malformed JSON.\n\n### 16. Transient Error Classification\n\n**Tests:** `test_is_transient_review_error_timeouts`, `test_is_transient_review_error_rate_limits`, `test_is_transient_review_error_permanent`\n\n`is_transient_review_error(msg)` determines whether a background skill review error is worth retrying:\n\n- **Transient** (retry): timeouts, connection closures, network failures, 429 rate limits.\n- **Permanent** (no retry): parse failures, missing fields, security blocks, validation errors.\n\n### 17. Trace Summarization\n\n**Tests:** `test_summarize_traces_head_and_tail`, `test_summarize_traces_short_no_elision`\n\n`summarize_traces_for_review(traces)` produces a bounded summary of tool execution traces:\n\n- For ≤5 traces: includes all.\n- For >5 traces: includes the first, last, and marks the middle as `\"omitted\"`.\n- Guarantees the output is shorter than the raw trace count.\n\n### 18. Reviewer Block Sanitization\n\n**Tests:** `sanitize_reviewer_block_strips_code_fences_and_data_markers`, `sanitize_reviewer_block_preserves_structure_but_drops_controls`, `sanitize_reviewer_block_truncates_by_chars_not_bytes`, `sanitize_reviewer_line_strips_newlines_and_brackets`\n\nTwo functions harden the background skill review pipeline against prompt injection from compromised prior LLM output:\n\n- `sanitize_reviewer_block(input, max_chars)`: Strips triple backticks (prevents code-fence injection), removes `<data>`/`<\/data>` envelope markers (prevents escape from the prompt envelope), drops control characters (`\\x00`, `\\x07`), preserves structural whitespace (`\\n`, `\\t`), and truncates by **character count** (not bytes) with a `…[truncated]` marker.\n- `sanitize_reviewer_line(input, max_chars)`: Collapses whitespace to spaces, replaces `[`/`]` with `(`/`)` to prevent `[EXTERNAL SKILL CONTEXT]` injection.\n\n### 19. Skills Configuration\n\n**Tests:** `test_skills_config_disabled_list_filters_at_boot`, `test_skills_config_extra_dirs_loaded_as_overlay`, `test_reload_skills_preserves_disabled_and_extra_dirs`, `test_stable_mode_freezes_registry_and_skips_review_gate`\n\nThe kernel's skill loading pipeline respects `SkillsConfig`:\n\n```mermaid\ngraph LR\n    A[Primary skills dir] --> D[SkillRegistry]\n    B[extra_dirs overlay] --> D\n    C[disabled list] -->|filters out| D\n    D --> E{KernelMode::Stable?}\n    E -- Yes --> F[Freeze registry]\n    E -- No --> G[Mutable registry]\n    G --> H[reload_skills re-applies B + C]\n```\n\n- **`skills.disabled`**: Skill names in this list are excluded from the registry at boot, even though their directories exist on disk.\n- **`skills.extra_dirs`**: External skill directories loaded as an overlay. On name collisions, the **local** install wins over the external overlay.\n- **Hot reload**: `reload_skills()` re-applies both the disabled list and extra_dirs overlay. A regression ensured these were preserved across reloads.\n- **Stable mode**: `KernelMode::Stable` freezes the registry at boot (`is_frozen() == true`). Background review gates refuse to spawn new reviews when frozen, preventing wasted LLM budget.\n\n---\n\n## Relationship to Other Modules\n\n| Dependency | Usage |\n|---|---|\n| `librefang_types::approval` | `ApprovalRequest`, `NotificationConfig`, `RiskLevel`, routing types |\n| `librefang_types::config` | `KernelConfig`, `DefaultModelConfig`, `KernelMode`, `ThinkingConfig`, `ExecSecurityMode` |\n| `librefang_types::agent` | `AgentManifest`, `ManifestCapabilities`, `ToolProfile`, `ModelConfig` |\n| `librefang_types::tool` | `DecisionTrace` |\n| `librefang_channels::types` | `ChannelAdapter`, `ChannelContent`, `ChannelType`, `ChannelUser` |\n| `librefang_runtime::tool_runner` | `builtin_tool_definitions()` for tool availability assertions |\n| `kernel::manifest_helpers` | `manifest_to_capabilities()` |\n| `kernel::registry` | `AgentRegistry` with `register`, `get`, `find_by_name`, `list` |","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and end-to-end tests for the `librefang-kernel` crate. These tests exercise the full kernel lifecycle — booting, agent spawning, hand management, WASM execution, workflow orchestration, and LLM communication — against real infrastructure rather than mocks.\n\n## Test Files\n\n| File | Scope | Requires LLM? |\n|---|---|---|\n| `integration_test.rs` | Kernel boot, single/multi-agent messaging via Groq | Yes (`GROQ_API_KEY`) |\n| `multi_agent_test.rs` | Hand lifecycle, state persistence, agent metadata, triggers | Mostly no; `test_six_agent_fleet` requires `GROQ_API_KEY` |\n| `wasm_agent_integration_test.rs` | WASM module loading, execution, fuel limits, streaming, host calls | No |\n| `workflow_integration_test.rs` | Workflow registration, agent resolution, trigger management, E2E Groq pipeline | `test_workflow_e2e_with_groq` requires `GROQ_API_KEY` |\n\n## Running Tests\n\n```bash\n# All tests that don't need an API key\ncargo test -p librefang-kernel\n\n# Include live LLM integration tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel -- --nocapture\n\n# Run a specific test by name\ncargo test -p librefang-kernel --test wasm_agent_integration_test\n```\n\nTests that require `GROQ_API_KEY` print a skip message and return early when the variable is unset — they never fail due to a missing key.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Infrastructure\"\n        TC[test_config helpers]\n        IH[install_hand]\n        WM[wasm_manifest]\n        STA[spawn_test_agent]\n    end\n\n    subgraph \"Kernel Under Test\"\n        KB[LibreFangKernel::boot_with_config]\n        AR[agent_registry]\n        HR[hands registry]\n        WE[workflow_engine]\n        WA[WASM runtime]\n    end\n\n    TC --> KB\n    KB --> AR\n    KB --> HR\n    KB --> WE\n    KB --> WA\n    IH --> HR\n    WM --> AR\n    STA --> AR\n```\n\nEach test creates an isolated `LibreFangKernel` instance with a unique temporary directory. The kernel is booted via `boot_with_config`, exercised, then shut down. No state leaks between tests.\n\n## Test Categories\n\n### 1. Core Agent Pipeline (`integration_test.rs`)\n\nValidates the fundamental message flow: boot kernel → spawn agent → send message → receive response → kill agent.\n\n- **`test_full_pipeline_with_groq`** — Single agent round-trip through the Groq API. Asserts non-empty response and positive token usage.\n- **`test_multiple_agents_different_models`** — Two agents (llama-70b and llama-8b) coexist, each receiving independent messages. Validates agent isolation.\n\n### 2. Hand Lifecycle (`multi_agent_test.rs`)\n\nHands are reusable agent templates. These tests verify the full hand state machine and its interaction with the agent registry.\n\n#### Activation and Identity\n\n| Test | What it validates |\n|---|---|\n| `test_activate_hand_spawns_agent` | `activate_hand` creates an agent and registers it in `agent_registry` |\n| `test_deterministic_agent_id` | Agent IDs are derived from `hand_id + role` via `AgentId::from_hand_agent` — no randomness |\n| `test_explicit_coordinator_role_used_for_routes` | Multi-agent hands with a `coordinator = true` agent route messages to that role, not the first agent |\n| `test_deterministic_id_stable_across_reactivation` | Deactivating and reactivating the same hand produces the same agent ID (legacy format) |\n\n#### State Transitions\n\n| Test | What it validates |\n|---|---|\n| `test_deactivate_kills_agent` | `deactivate_hand` removes the agent from the registry |\n| `test_pause_and_resume_hand` | Pause sets status to `\"Paused\"` (agent survives); resume sets `\"Active\"` |\n| `test_hand_instance_status_active_on_creation` | Fresh instances start as `\"Active\"` |\n\n#### Agent Metadata\n\n| Test | What it validates |\n|---|---|\n| `test_agent_tagged_with_hand_metadata` | Agents receive `hand:<hand_id>` and `hand_instance:<uuid>` tags |\n| `test_hand_tools_applied_to_agent` | Tools declared in the hand definition propagate to the agent's `capabilities.tools` |\n| `test_system_prompt_preserved` | The hand's `system_prompt` appears verbatim in the spawned agent's manifest |\n| `test_default_provider_resolved_to_kernel_default` | `provider = \"default\"` in a hand definition is resolved to the kernel's actual provider at spawn time |\n\n#### Persistence\n\n| Test | What it validates |\n|---|---|\n| `test_hand_state_persistence` | State is written to `hand_state.json` as v4 format with typed fields (`instance_id`, `status`, `activated_at`, `updated_at`, `agent_ids` map) |\n| `test_multi_agent_hand_state_persists_coordinator_role` | The `coordinator_role` field is persisted and restored correctly |\n\n#### Coexistence and Isolation\n\n| Test | What it validates |\n|---|---|\n| `test_multiple_hands_coexist` | Two hands activated simultaneously have distinct agent IDs |\n| `test_deactivate_one_hand_preserves_other` | Killing one hand's agent doesn't affect the other |\n| `test_find_instance_by_agent_id` | `hands().find_by_agent()` reverse-maps from agent ID to hand instance |\n\n#### Trigger Reassignment\n\n- **`test_reactivation_restores_triggers_to_original_roles`** — When a hand is deactivated and reactivated, triggers registered against specific roles (e.g., `\"analyst\"`) stay attached to that role's agent and do not leak to other roles (e.g., `\"planner\"`).\n\n#### Error Cases\n\n| Test | What it validates |\n|---|---|\n| `test_activate_nonexistent_hand_fails` | Returns `Err` for unknown hand IDs |\n| `test_deactivate_nonexistent_instance_fails` | Returns `Err` for random UUIDs |\n| `test_pause_nonexistent_instance_fails` | Returns `Err` for non-existent instances |\n| `test_resume_nonexistent_instance_fails` | Returns `Err` for non-existent instances |\n\n#### Live Fleet Test\n\n- **`test_six_agent_fleet`** — Spawns six agents (coder, researcher, writer, ops, analyst, hello-world) using different models, sends each a tailored prompt, and asserts all respond with non-empty output. Prints a token usage summary.\n\n### 3. WASM Agent Execution (`wasm_agent_integration_test.rs`)\n\nTests real WASM module execution through the kernel's WASM runtime. Uses inline WAT (WebAssembly Text) modules — no external WASM binaries needed.\n\n#### Test Modules\n\n| Module | Behavior |\n|---|---|\n| `ECHO_WAT` | Returns input JSON as-is via pointer arithmetic in `execute` |\n| `HELLO_WAT` | Returns a fixed `{\"response\":\"hello from wasm\"}` from static data |\n| `INFINITE_LOOP_WAT` | Runs `br $inf` forever — tests fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\nAll WASM modules export `memory`, `alloc(size) -> ptr`, and `execute(ptr, len) -> i64` (packed pointer+length).\n\n#### Test Cases\n\n| Test | What it validates |\n|---|---|\n| `test_wasm_agent_hello_response` | Fixed-response module returns `\"hello from wasm\"` |\n| `test_wasm_agent_echo` | Echo module returns input containing the original message text |\n| `test_wasm_agent_fuel_exhaustion` | Infinite loop is caught; error message contains `\"fuel\"` or `\"WASM\"` |\n| `test_wasm_agent_missing_module` | Missing `.wasm`/`.wat` file produces an error mentioning the file name |\n| `test_wasm_agent_host_call_time` | Host-call proxy module executes end-to-end through the kernel's host function interface |\n| `test_wasm_agent_streaming_fallback` | `send_message_streaming` on a WASM agent emits at least 2 events (TextDelta + ContentComplete) and produces the same final response |\n| `test_multiple_wasm_agents` | Two WASM agents (hello + echo) run concurrently in the same kernel instance |\n| `test_mixed_wasm_and_llm_agents` | WASM and `builtin:chat` agents coexist in the same registry; WASM agent executes while LLM agent is spawned but not messaged |\n\nWASM tests use `#[tokio::test(flavor = \"multi_thread\")]` because the WASM runtime requires multi-threaded Tokio.\n\n### 4. Workflows and Triggers (`workflow_integration_test.rs`)\n\nTests the workflow engine's registration, agent resolution, and trigger system at the kernel level, plus one full E2E test with live LLM inference.\n\n#### Kernel-Level Wiring (no LLM)\n\n| Test | What it validates |\n|---|---|\n| `test_workflow_register_and_resolve` | `register_workflow` stores the workflow; `workflow_engine().list_workflows()` returns it; agents are found by name via `agent_registry().find_by_name()`; `create_run` initializes a run with the input |\n| `test_workflow_agent_by_id` | Workflows referencing agents by string ID (not name) can be registered and have runs created |\n| `test_trigger_registration_with_kernel` | `register_trigger` stores triggers; `list_triggers` filters by agent or returns all; `remove_trigger` deletes by ID |\n\n#### Full E2E with Groq\n\n- **`test_workflow_e2e_with_groq`** — Creates a 2-step pipeline (`wf-analyst` → `wf-writer`), runs it with real Groq inference, and asserts:\n  - Workflow completes successfully (state is `Completed`)\n  - Both steps have positive token counts\n  - `step_results` records the correct step names in order\n  - The output is non-empty\n  - `list_runs` returns exactly 1 run\n\n## Test Infrastructure Helpers\n\n### `test_config()` / `test_config(name)`\n\nEach test file has its own config factory that creates an isolated `KernelConfig`:\n\n- **`integration_test.rs`**: `test_config()` — uses a fixed temp dir path under `std::env::temp_dir()`.\n- **`multi_agent_test.rs`**: `test_config(name: &str)` — uses a per-test subdirectory keyed by name.\n- **`wasm_agent_integration_test.rs`**: `test_config(tmp: &tempfile::TempDir)` — takes a `TempDir` reference for WASM file placement.\n- **`workflow_integration_test.rs`**: `test_config(provider, model, api_key_env)` — parameterized for switching between mock (`ollama`) and real (`groq`) providers.\n\nAll factories set `provider = \"groq\"` and `model = \"llama-3.3-70b-versatile\"` by default, with `api_key_env = \"GROQ_API_KEY\"`.\n\n### `install_hand(kernel, toml_content)`\n\nParses a TOML hand definition and installs it via `kernel.hands().install_from_content()`. Panics on parse failure. Used in `multi_agent_test.rs` with the constant hand definitions `HAND_A`, `HAND_B`, and `HAND_C`.\n\n### `wasm_manifest(name, module)`\n\nGenerates an `AgentManifest` with `module = \"wasm:{module}\"` pointing to a `.wat` file. Used in `wasm_agent_integration_test.rs`.\n\n### `spawn_test_agent(kernel, name, system_prompt)`\n\nCreates an `AgentManifest` from a template and spawns it, returning the `AgentId`. Used in `workflow_integration_test.rs` for E2E tests.\n\n## Hand Test Fixtures\n\nThree hand TOML definitions are used throughout `multi_agent_test.rs`:\n\n- **HAND_A** (`test-clip`) — Single-agent hand with `tools = [\"file_read\", \"file_write\", \"shell_exec\"]`, explicit `provider = \"default\"`.\n- **HAND_B** (`test-devops`) — Single-agent hand with `tools = [\"shell_exec\"]`, no explicit provider/model (inherits kernel defaults).\n- **HAND_C** (`test-research`) — Multi-agent hand with two agents (`analyst` and `planner` where `planner` is `coordinator = true`). Used to test role-based routing and trigger isolation.\n\n## Relationships to Other Crates\n\n```\nlibrefang-kernel-tests\n  ├── depends on librefang-kernel     (kernel under test)\n  ├── depends on librefang-types      (AgentManifest, AgentId, KernelConfig, etc.)\n  └── depends on tempfile             (isolated temp directories for WASM tests)\n```\n\nThe tests call into the kernel's public API exclusively:\n\n- `LibreFangKernel::boot_with_config` / `shutdown`\n- `spawn_agent` / `kill_agent`\n- `send_message` / `send_message_streaming`\n- `activate_hand` / `deactivate_hand` / `pause_hand` / `resume_hand`\n- `register_workflow` / `run_workflow`\n- `register_trigger` / `list_triggers` / `remove_trigger`\n- `agent_registry()` / `hands()` / `workflow_engine()`\n\nNo internal kernel modules are imported directly (except `triggers::TriggerPattern` and `workflow` types needed to construct test data).","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nThe central orchestration crate for the LibreFang Agent OS. This module serves as the top-level integration point that wires together all subsystems—routing, metering, runtime execution, LLM interaction, skill dispatch, and I/O channels—into a cohesive agent kernel.\n\n## Purpose\n\nWhile each `librefang-kernel-*` sub-crate encapsulates a specific subsystem, `librefang-kernel` itself is the **composition layer**. It owns the agent lifecycle: loading configuration, initializing subsystems, coordinating message flow between them, and managing persistent state through SQLite.\n\n## Architectural Role\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --- R[librefang-kernel-router]\n    K --- M[librefang-kernel-metering]\n    K --- RT[librefang-runtime]\n    K --- LLM[librefang-llm-driver]\n    K --- SK[librefang-skills]\n    K --- H[librefang-hands]\n    K --- EX[librefang-extensions]\n    K --- W[librefang-wire]\n    K --- CH[librefang-channels]\n    K --- TY[librefang-types]\n    K --- MM[librefang-memory]\n```\n\nThe kernel sits above all other crates. Nothing depends on it; it depends on everything else. This inverted dependency structure keeps subsystems independently testable while allowing the kernel to impose the initialization order and interaction patterns it needs.\n\n## Key Dependency Groups\n\n### Core Kernel Subsystems\n\n| Crate | Role |\n|---|---|\n| `librefang-kernel-router` | Message/request routing between handlers |\n| `librefang-kernel-metering` | Usage tracking, rate limiting, and quota enforcement |\n\nThese are the only other crates carrying the `kernel-` prefix. They implement concerns that are meaningless outside a running agent context.\n\n### Agent Capabilities\n\n| Crate | Role |\n|---|---|\n| `librefang-runtime` | Task execution runtime (async task spawning, cancellation) |\n| `librefang-skills` | Skill definitions, registration, and dispatch |\n| `librefang-hands` | Tool/actuator abstraction for taking actions |\n| `librefang-extensions` | Plugin/extension loading and lifecycle |\n| `librefang-llm-driver` | LLM provider abstraction and API interaction |\n\n### I/O and Communication\n\n| Crate | Role |\n|---|---|\n| `librefang-wire` | Serialization format and protocol definitions |\n| `librefang-channels` | Async channel infrastructure (no default features—only what the kernel needs) |\n\n### Shared Infrastructure\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across all crates |\n| `librefang-memory` | Conversation/context memory management |\n\n## Notable External Dependencies\n\nThe external dependency selection reveals specific capabilities:\n\n- **Persistence**: `rusqlite` — SQLite for local state, conversation history, or configuration storage. The kernel is likely responsible for schema initialization and connection management.\n- **Configuration**: `toml`, `serde_yaml`, `serde_json` — Multi-format config loading. The kernel likely reads agent configuration files in TOML or YAML.\n- **Concurrency primitives**: `dashmap` (concurrent hash maps), `arc-swap` (atomic pointer swaps for hot-reloadable state), `crossbeam` (multi-producer/multi-consumer channels). These suggest the kernel manages shared mutable state that subsystems read concurrently.\n- **Scheduling**: `cron` — Cron expression parsing indicates scheduled/recurring task support within the agent.\n- **Security**: `totp-rs` (TOTP generation), `subtle` (constant-time comparisons), `zeroize` (secure memory clearing). The kernel handles authentication secrets or API key management.\n- **HTTP**: `reqwest` — Outbound HTTP for LLM API calls or extension communication.\n- **Platform**: `libc` (Unix only) — Low-level system calls, likely for signal handling or process management.\n\n## Conventions for Contributors\n\n### Adding a New Subsystem\n\nThe kernel's dependency list is intentionally flat. If you introduce a new `librefang-*` crate that the kernel needs to orchestrate:\n\n1. Add it as a path dependency in `Cargo.toml`.\n2. Initialize it within the kernel's startup sequence, respecting the dependency order (types → memory → I/O → capabilities → kernel subsystems).\n3. Do **not** create circular dependencies back into the kernel. Subsystems should communicate through types defined in `librefang-types` or `librefang-wire`.\n\n### Configuration\n\nThe kernel is the configuration authority. It reads agent config (TOML/YAML) and passes constructed subsystem configs down. Subsystem crates should accept structured config types, not file paths.\n\n### Testing\n\n`tokio-test` and `tempfile` are dev-dependencies, indicating tests spin up temporary directories (likely for SQLite databases or config files) within async test contexts. Follow this pattern for integration tests.\n\n### Feature Flags on Dependencies\n\n`librefang-channels` is imported with `default-features = false`. If you add channel functionality, check which features are actually enabled rather than assuming the full channel API is available.","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\n## Purpose\n\n`librefang-llm-driver` defines the abstraction layer for LLM (Large Language Model) integration within the LibreFang project. It provides a shared trait interface and common types that concrete LLM provider implementations must satisfy, decoupling the rest of the codebase from any specific LLM vendor or API.\n\n## Role in the Architecture\n\nThis crate sits between the application logic and concrete LLM implementations. Other LibreFang crates depend on `librefang-llm-driver` to interact with LLMs without knowing which provider (OpenAI, Anthropic, local models, etc.) is actually in use.\n\n```mermaid\ngraph TD\n    A[Application Logic] -->|depends on| B[librefang-llm-driver]\n    B -->|trait bound| C[OpenAI Driver]\n    B -->|trait bound| D[Anthropic Driver]\n    B -->|trait bound| E[Local Model Driver]\n    B -->|uses types from| F[librefang-types]\n```\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types used across LibreFang crates |\n| `async-trait` | Enables async methods in trait definitions |\n| `serde` / `serde_json` | Serialization of LLM request/response payloads |\n| `thiserror` | Derived error types for driver-level failures |\n| `tokio` | Async runtime support |\n\n## Key Concepts\n\n### Driver Trait\n\nThe core of this module is an async trait that concrete LLM drivers implement. Any provider-specific crate must implement this trait to be usable by the rest of the system. The trait abstracts over request construction, response parsing, and error handling so that swapping LLM providers requires no changes to consuming code.\n\n### Shared Error Types\n\nDriver-level errors are defined here using `thiserror`. These cover common failure modes—network errors, rate limiting, malformed responses, authentication failures—that all LLM providers share. Concrete drivers map their provider-specific errors into these common types.\n\n### Request and Response Types\n\nCommon structures for LLM interactions (prompts, completions, token counts, etc.) are defined here or re-exported from `librefang-types`, ensuring all drivers and consumers speak the same data language.\n\n## Implementing a New Driver\n\nTo add support for a new LLM provider:\n\n1. Create a new crate (e.g., `librefang-llm-openai`)\n2. Depend on `librefang-llm-driver`\n3. Implement the driver trait for a struct representing your provider's client\n4. Map all provider-specific errors into the shared error types\n5. Register the driver in the application's driver registry or configuration\n\n## Integration Points\n\n- **Downstream consumers** import `librefang-llm-driver` to accept a trait object or generic parameter bounded by the driver trait.\n- **Concrete driver crates** implement the trait and re-export the shared types as needed.\n- **Configuration layers** select which driver to instantiate at runtime based on user settings.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait for Anthropic, OpenAI, Google Gemini, and other providers.\n\n## Overview\n\nThis crate contains the actual HTTP+API integrations for each supported LLM provider. It is the \"plug-in\" layer: every driver in this crate implements the trait defined in `librefang-llm-driver`, translating a generic request into provider-specific HTTP payloads and converting provider-specific responses back into the shared types from `librefang-types`.\n\n```\n┌──────────────────┐      trait bound      ┌──────────────────────────────┐\n│ librefang-llm-   │◄──────────────────────│  librefang-llm-drivers       │\n│ driver (trait)   │                       │  ┌─────────┐ ┌───────────┐  │\n└──────────────────┘                       │  │Anthropic│ │  OpenAI   │  │\n                                           │  └─────────┘ └───────────┘  │\n┌──────────────────┐      shared types     │  ┌─────────┐ ┌───────────┐  │\n│ librefang-types  │◄──────────────────────│  │ Gemini  │ │  …more    │  │\n└──────────────────┘                       │  └─────────┘ └───────────┘  │\n                                           └──────────────────────────────┘\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver trait] -->|implemented by| B[Anthropic Driver]\n    A -->|implemented by| C[OpenAI Driver]\n    A -->|implemented by| D[Gemini Driver]\n    A -->|implemented by| E[Other Providers]\n    B --> F[librefang-http]\n    C --> F\n    D --> F\n    B --> G[librefang-runtime-oauth]\n    D --> G\n    B --> H[librefang-types]\n    C --> H\n    D --> H\n```\n\nEach driver follows the same pattern:\n\n1. **Serialize** a `librefang-types` request into the provider's JSON schema.\n2. **Authenticate** using API keys, HMAC signatures, or OAuth tokens (via `librefang-runtime-oauth`).\n3. **Send** the request through `librefang-http` / `reqwest`.\n4. **Parse** the provider-specific response JSON into shared `librefang-types`.\n5. **Stream** partial responses token-by-token when the caller requests streaming mode (`tokio-stream` / `futures`).\n\n## Dependencies and Why They Exist\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-llm-driver` | Provides the `LlmDriver` trait each provider must implement. |\n| `librefang-types` | Shared request/response types, message roles, tool-call definitions. |\n| `librefang-http` | Centralised HTTP client configuration, retries, rate-limit awareness. |\n| `librefang-runtime-oauth` | OAuth2 token acquisition and refresh for providers that require it (e.g. Gemini via service accounts). |\n| `reqwest` | Underlying HTTP client. |\n| `serde` / `serde_json` | Serialisation of provider-specific payloads. |\n| `async-trait` | Async-compatible trait definitions. |\n| `tokio` / `futures` / `tokio-stream` | Async runtime and stream combinators for SSE/token streaming. |\n| `sha2` / `hmac` / `hex` / `base64` | Cryptographic signing used by providers that require HMAC-signed payloads. |\n| `zeroize` | Securely zero API keys and secrets from memory after use. |\n| `dashmap` | Concurrent map for caching tokens, session state, or rate-limit counters. |\n| `chrono` / `uuid` | Timestamps and correlation IDs for request tracing. |\n| `regex-lite` | Lightweight regex for parsing provider-specific error messages or extracting structured output. |\n| `url` | URL construction and validation for provider endpoints. |\n| `rand` | Randomised back-off jitter on retries. |\n| `thiserror` | Ergonomic error types per driver. |\n| `tracing` | Structured logging of requests, responses, and errors. |\n\n## Adding a New Provider\n\n1. Create a new module file (e.g. `src/cohere.rs`).\n2. Define a struct that holds configuration (API key, base URL, model overrides).\n3. Implement `LlmDriver` from `librefang-llm-driver`.\n4. Map the generic request type to the provider's API format and vice-versa.\n5. Register the driver in the crate's public API so consumers can instantiate it by name.\n\nKey points when implementing:\n\n- **Never log secrets.** Use `zeroize::Zeroize` on any structure that temporarily holds API keys.\n- **Respect rate limits.** Return structured errors that the retry layer in `librefang-http` can act on.\n- **Support streaming.** Even if the provider uses a non-standard SSE format, convert it to the stream type expected by the trait so callers see a uniform interface.\n\n## Relationship to the Rest of the Codebase\n\n- **Consumed by** the orchestration/application layer, which selects a driver at runtime based on user configuration and passes it around as a `dyn LlmDriver`.\n- **Depends on** `librefang-types` for all cross-crate data shapes; provider-specific JSON is an internal detail never leaked outside this crate.\n- **Uses** `librefang-http` rather than calling `reqwest` directly, ensuring all outbound HTTP traffic goes through the project's shared client configuration (TLS settings, proxies, timeouts, observability hooks).\n\n## Security Considerations\n\n- API keys are held in structs that implement `Zeroize`; keys are cleared on `Drop`.\n- `hmac`/`sha2` are used for providers that sign request bodies rather than sending bearer tokens.\n- OAuth tokens obtained via `librefang-runtime-oauth` are cached in a `DashMap` with automatic refresh, avoiding unnecessary credential exposure.\n- All outbound traffic should go through `librefang-http` to ensure consistent TLS enforcement.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests — Chat-Scoped Canonical Context Integration Tests\n\n## Purpose\n\nThis module contains integration regression tests that guard a critical privacy fix in `librefang-memory`. The bug allowed **cross-session context leakage**: when a single agent served multiple WhatsApp conversations (e.g., a DM and a group chat), canonical memory entries from one session could appear in the LLM prompt built for another. The fix tags every `CanonicalEntry` with its originating `SessionId` and enforces filtering at read time in `canonical_context`.\n\nThese tests exercise the full append → load → context roundtrip through the same public API the kernel calls, ensuring the isolation contract holds end-to-end against a real SQLite database.\n\n## The Bug Being Guarded\n\n```\nBefore fix:\n  Agent serves DM (Jessica) + Group (contains Jessica)\n  canonical_context(agent, session_dm)  →  [dm-1, group-1, dm-2]  ← LEAK\n  canonical_context(agent, session_group) →  [dm-1, group-1, dm-2]  ← LEAK\n\nAfter fix:\n  canonical_context(agent, session_dm)   →  [dm-1, dm-2]\n  canonical_context(agent, session_group) →  [group-1]\n```\n\n## Architecture & Data Flow\n\n```mermaid\nflowchart LR\n    A[SessionId::for_channel] --> B[SessionStore]\n    B -->|append_canonical| C[(SQLite)]\n    C -->|canonical_context| D[Filtered messages]\n    D -->|session_id = None| E[All messages]\n    D -->|session_id = Some| F[Session-scoped only]\n```\n\n## Test Infrastructure\n\n### `setup()`\n\nCreates a fresh, isolated `SessionStore` backed by an in-memory SQLite database with all migrations applied. Every test gets a clean slate — no shared state between tests.\n\n**Dependencies called:**\n- `Connection::open_in_memory()` — ephemeral SQLite\n- `run_migrations(&conn)` — schema setup from `librefang_memory::migration`\n- `SessionStore::new(Arc<Mutex<conn>>)` — production store constructor\n\n### `user_msg(text)`\n\nHelper that constructs a `Message` with `Role::User` and `MessageContent::Text`. Pinned is set to `false`. Keeps test assertions focused on content rather than message assembly.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it proves:** Two WhatsApp channels served by the same agent maintain completely isolated canonical contexts.\n\n**Scenario:**\n1. One agent handles both a WhatsApp DM (`…@s.whatsapp.net`) and a WhatsApp group (`…@g.us`).\n2. Messages arrive interleaved: `dm-1`, then `group-1`, then `dm-2`.\n3. Querying context for the DM session returns only `[\"dm-1\", \"dm-2\"]`.\n4. Querying context for the group session returns only `[\"group-1\"]`.\n\n**Key assertion:** `session_dm ≠ session_group` — the `SessionId::for_channel` derivation must produce distinct IDs for distinct channel identifiers, even when sharing the same `AgentId`.\n\n**APIs exercised:**\n- `SessionId::for_channel(agent, channel_id)` — session derivation\n- `store.append_canonical(agent, messages, None, Some(session_id))` — tagged writes\n- `store.canonical_context(agent, Some(session_id), None)` — filtered reads\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it proves:** Callers that haven't adopted per-session filtering still get all messages across every session, preserving the original `canonical_context` semantics.\n\n**Scenario:**\n1. Two sessions (WhatsApp and Telegram) each write one message under the same agent.\n2. Calling `canonical_context(agent, None, None)` returns both messages regardless of session tag.\n\n**Why this matters:** The `session_id` parameter on `canonical_context` is optional. Passing `None` must continue to behave as it did before session-scoping was introduced, so existing consumers don't break.\n\n## Relationship to Production Code\n\n| Test helper / assertion | Production counterpart |\n|---|---|\n| `setup()` | Kernel's database initialization path |\n| `SessionId::for_channel(agent, channel)` | Kernel's session derivation on every inbound message |\n| `append_canonical(…, Some(session))` | Kernel tagging entries during message processing |\n| `canonical_context(agent, Some(session), None)` | Kernel building scoped LLM prompt context |\n| `canonical_context(agent, None, None)` | Legacy callers / cross-session summarization |\n\n## Running\n\n```sh\n# From the workspace root\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# With output\ncargo test -p librefang-memory --test canonical_chat_scoped_integration -- --nocapture\n```\n\nNo external services are required — all tests use in-memory SQLite and are deterministic.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\n**Memory substrate for the LibreFang Agent OS**\n\n## Purpose\n\n`librefang-memory` provides the persistence and retrieval layer for agent state within the LibreFang Agent OS. It serves as the memory backbone—responsible for storing, querying, and managing the data that agents produce and consume during their lifecycle. This includes conversation history, task state, configuration snapshots, and any other structured data that must survive across sessions or be shared between agents.\n\nThe crate is designed as a **substrate**, meaning it offers low-level storage primitives that higher-level agent logic builds upon, rather than prescribing a specific memory model.\n\n## Architecture\n\nThe module draws on several key dependencies to fulfill its role:\n\n| Dependency | Role in this crate |\n|---|---|\n| `rusqlite` | Primary on-disk storage engine via embedded SQLite |\n| `tokio` + `async-trait` | Async I/O interface for non-blocking storage operations |\n| `serde` / `serde_json` / `rmp-serde` | Serialization of memory entries (JSON and MessagePack formats) |\n| `sha2` | Content-addressable hashing for deduplication or integrity verification |\n| `chrono` | Timestamping memory entries |\n| `uuid` | Unique identification of memory records |\n| `reqwest` | Remote memory synchronization or retrieval over HTTP |\n| `thiserror` | Typed error definitions |\n| `tracing` | Instrumentation and diagnostic logging |\n\n### Storage Model\n\nThe embedded SQLite database provides the core storage mechanism. This choice gives the substrate:\n\n- **Zero-configuration persistence** — no external database service required.\n- **Transactional safety** — writes are atomic, supporting crash recovery.\n- **Query flexibility** — complex lookups via SQL without writing custom index logic.\n\nSerialization support for both JSON and MessagePack (`rmp-serde`) suggests the substrate can store entries in either a human-readable form (useful for debugging and interoperability) or a compact binary form (useful for performance-sensitive paths).\n\n### Content Addressing\n\nThe inclusion of `sha2` indicates that memory entries may be content-addressed—identified by their cryptographic hash rather than solely by UUID. This enables:\n\n- Deduplication of identical entries.\n- Integrity checks on retrieval.\n- Stable references to immutable data.\n\n### Remote Capabilities\n\nThe `reqwest` dependency implies the memory substrate is not purely local. Possible use cases include:\n\n- Syncing agent memory to a remote store.\n- Fetching shared memory or configuration from a central service.\n- Retrieving pre-seeded memory snapshots for agent initialization.\n\n## Integration with the Codebase\n\n```\nlibrefang-types  ←  librefang-memory\n                        ↑\n                   Higher-level crates\n                   (agent runtime, etc.)\n```\n\n`librefang-memory` depends on `librefang-types` for shared type definitions (error types, domain models, configuration structs). It exposes storage APIs that higher-level crates in the workspace consume to persist and retrieve agent data.\n\nBecause no incoming or outgoing internal calls were detected, this module operates as a **leaf dependency** within the workspace—other crates call into it, but it does not call out to sibling LibreFang crates beyond `librefang-types`.\n\n## Development\n\n### Building\n\n```sh\ncargo build -p librefang-memory\n```\n\n### Testing\n\nTests use `tempfile` (listed in dev-dependencies) for isolated, ephemeral SQLite databases:\n\n```sh\ncargo test -p librefang-memory\n```\n\nEach test should create a temporary directory, initialize a fresh database instance, run assertions, and let the temporary resource clean up on drop. This avoids test pollution and eliminates the need for manual cleanup logic.\n\n### Adding New Storage Operations\n\nWhen extending the substrate:\n\n1. **Define the schema** — add any new tables or indexes as migrations run at database initialization.\n2. **Use async wrappers** — expose operations through `async-trait` implementations so callers remain non-blocking.\n3. **Serialize with serde** — any complex Rust type stored in the database should derive `Serialize` / `Deserialize`.\n4. **Trace operations** — annotate significant storage calls with `tracing` spans for observability in production.\n5. **Return typed errors** — use `thiserror`-derived error enums rather than generic `Box<dyn Error>`.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing agent configurations and data from other agent frameworks into LibreFang.\n\n## Purpose\n\nWhen adopting LibreFang from an existing agent framework, users need a way to carry over their existing configurations, agent definitions, credentials, and operational data. `librefang-migrate` provides the tooling to discover, parse, transform, and validate data from foreign frameworks and produce native LibreFang structures.\n\nThis crate is designed as a standalone utility — it does not hook into the LibreFang runtime or depend on any server-side components. It reads from disk, transforms in memory, and writes the result.\n\n## Supported Input Formats\n\nThe crate depends on multiple deserialization libraries to handle the variety of configuration formats used by common agent frameworks:\n\n| Format | Dependency | Typical use |\n|--------|-----------|-------------|\n| JSON | `serde_json` | Standard structured configs |\n| YAML | `serde_yaml` | Human-editable configs (e.g., Ansible-based agents) |\n| JSON5 | `json5` |Configs with comments, trailing commas |\n| TOML | `toml` | Common in Rust-based tooling |\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[Source Directory] -->|walkdir| B[Discovery]\n    B -->|serde_*| C[Parse Foreign Format]\n    C --> D[Transform to librefang-types]\n    D --> E[Validate]\n    E -->|serde_json| F[Output LibreFang Config]\n```\n\nThe pipeline is linear: discover source files on disk, parse them into intermediate representations using the appropriate serde backend, transform them into types defined in `librefang-types`, validate the results, and serialize to LibreFang's native format.\n\n## Key Dependencies and Their Roles\n\n### `librefang-types`\nThe target type system. All migration output is expressed through the types defined here — agent configurations, credential stores, task definitions, and so on. This is the crate's primary connection to the rest of the LibreFang ecosystem.\n\n### `walkdir`\nHandles recursive directory traversal to locate configuration files within a source framework's directory structure. Agent frameworks often scatter configs across nested directories with mixed file types.\n\n### `uuid` and `chrono`\nUsed during transformation to generate fresh identifiers and timestamps for the imported data. Migrated entities receive new UUIDs to avoid collisions with existing LibreFang data, and import timestamps record when the migration occurred.\n\n### `dirs`\nResolves standard system directories. Used to locate both the default output path for migrated configurations and, in some cases, the default installation paths of source frameworks.\n\n### `thiserror`\nDefines a custom error type for migration failures. Errors are structured to identify which phase failed (discovery, parsing, transformation, validation) and which source file or entity was involved.\n\n### `tracing`\nStructured logging throughout the pipeline. Migration can involve processing hundreds of files, so trace-level logging for individual files and info-level summaries are both supported.\n\n## Error Handling\n\nThe crate uses `thiserror` to produce a typed error enum rather than stringly-typed errors. Errors typically include:\n\n- **Discovery errors** — permission denied, inaccessible directories\n- **Parse errors** — malformed JSON/YAML/TOML, schema mismatch with expected foreign format\n- **Transformation errors** — data that cannot be meaningfully mapped to LibreFang types\n- **Validation errors** — output that parses but violates LibreFang constraints\n- **I/O errors** — failure to write output files\n\nAll errors propagate with context about the source file and migration phase, making batch migration failures debuggable.\n\n## Testing\n\nThe dev-dependency on `tempfile` indicates that tests create temporary directory structures to exercise discovery and parsing against realistic file layouts without touching the real filesystem.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This crate provides the infrastructure needed to communicate with MCP-compatible tool servers, enabling the LibreFang runtime to discover and invoke external tools during execution.\n\n## Overview\n\nThe Model Context Protocol standardizes how AI runtimes interact with external tools and data sources. This module implements the client side of that protocol within the LibreFang ecosystem, handling server discovery, tool invocation, and response processing.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation — provides the client primitives for the Model Context Protocol |\n| `librefang-types` | Shared type definitions used across LibreFang crates |\n| `librefang-http` | HTTP transport layer, reused for MCP server communication |\n| `reqwest` | Underlying HTTP client used for requests to MCP servers |\n| `tokio` | Async runtime for concurrent MCP operations |\n| `serde` / `serde_json` | Serialization of MCP protocol messages |\n| `tracing` | Structured logging and diagnostic spans |\n| `http` | Low-level HTTP types for request/response construction |\n| `async-trait` | Async trait definitions for MCP client abstractions |\n| `base64` / `sha2` | Encoding and hashing utilities, likely for authentication or payload verification with MCP servers |\n| `url` | URL parsing and construction for MCP server endpoints |\n| `rand` | Random number generation, likely for nonce or session identifier creation |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Runtime] -->|tool requests| B[librefang-runtime-mcp]\n    B -->|MCP protocol| C[librefang-http]\n    C -->|HTTP/transport| D[MCP Tool Servers]\n    B -->|uses| E[rmcp]\n    B -->|uses| F[librefang-types]\n```\n\nThe crate sits between the LibreFang runtime core and external MCP-compatible tool servers. It translates runtime tool invocation requests into MCP protocol messages, sends them over HTTP via `librefang-http`, and returns results back to the runtime.\n\n## Integration Points\n\nThis module connects to the broader LibreFang codebase through:\n\n- **`librefang-types`** — consumes shared type definitions for consistency across the project.\n- **`librefang-http`** — delegates HTTP-level communication rather than managing its own transport, keeping network logic centralized.\n\nThe runtime core imports this crate when MCP tool access is needed during execution.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 flow implementations for LibreFang runtime drivers. This crate provides authentication mechanisms for third-party LLM providers that require OAuth-based access, specifically ChatGPT (OpenAI) and GitHub Copilot.\n\n## Overview\n\nRuntime drivers in LibreFang sometimes need to authenticate against external services that use OAuth 2.0. This crate encapsulates those flows so that individual drivers don't need to implement OAuth logic themselves. It handles the full lifecycle: generating cryptographic parameters, driving the browser-based authorization flow, exchanging authorization codes for tokens, and managing token secrets in memory.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests OAuth flow| B[librefang-runtime-oauth]\n    B -->|HTTP requests| C[librefang-http]\n    B -->|uses types| D[librefang-types]\n    B -->|external calls| E[OAuth Provider]\n    E -->|ChatGPT / OpenAI| F[Token Response]\n    E -->|GitHub Copilot| G[Token Response]\n    B -->|returns tokens| A\n```\n\n## Dependencies and Their Roles\n\nThe crate's dependencies reveal its security-conscious design:\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions for tokens, credentials, and OAuth-related structs |\n| `librefang-http` | HTTP client abstraction used for token exchange and provider communication |\n| `reqwest` | Underlying HTTP client for outbound requests to OAuth endpoints |\n| `tokio` | Async runtime support for non-blocking OAuth operations |\n| `serde` / `serde_json` | Serialization of OAuth request/response payloads |\n| `thiserror` | Typed error definitions for OAuth-specific failure modes |\n| `tracing` | Structured logging of OAuth flow progress and failures |\n| `base64` | URL-safe Base64 encoding for PKCE code verifiers and challenges |\n| `sha2` | SHA-256 hashing to derive PKCE code challenges from verifiers |\n| `rand` | Cryptographically secure random generation for state parameters and PKCE verifiers |\n| `hex` | Hex encoding utilities |\n| `zeroize` | Secure memory clearing for token strings and client secrets |\n\n## PKCE Support\n\nThe presence of `sha2`, `base64`, and `rand` together strongly indicates this crate implements OAuth 2.0 with PKCE (Proof Key for Code Exchange). PKCE is critical for public clients (like desktop applications) that cannot securely store a client secret. The flow works as follows:\n\n1. **Generate a code verifier**: A cryptographically random string created via `rand`.\n2. **Derive the code challenge**: Hash the verifier with SHA-256 (`sha2`), then Base64URL-encode it (`base64`).\n3. **Authorization request**: Send the challenge to the provider's authorization endpoint.\n4. **Token exchange**: Send the original verifier (not the challenge) to prove the calling application initiated the request.\n\n## Token Security\n\nThe `zeroize` dependency ensures that sensitive values — access tokens, refresh tokens, and client secrets — are overwritten in memory when dropped. This prevents credentials from lingering in process memory longer than necessary.\n\n## Integration Points\n\nThis crate is consumed by runtime drivers that need to authenticate with OAuth-protected services. Drivers call into this crate to initiate a flow, handle user interaction (typically a browser redirect), and receive back the credentials needed for subsequent API calls.\n\nThe crate depends on `librefang-http` for outbound network requests rather than using `reqwest` directly in most cases, maintaining consistency with the rest of the LibreFang HTTP stack. `librefang-types` provides the shared data structures returned to callers.\n\n## Error Handling\n\nOAuth flows can fail at multiple stages: network errors, user denial, expired codes, invalid responses, and rate limiting. Errors are defined using `thiserror` to provide structured, typed error variants that callers can match on and handle appropriately. All errors are instrumented with `tracing` spans for observability.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests — MCP OAuth Integration\n\n## Purpose\n\nThis test module validates the OAuth integration layer for MCP (Model Context Protocol) server connections. It covers three distinct areas:\n\n1. **OAuth metadata discovery** — ensuring fallback behavior when remote discovery fails\n2. **Provider wiring regression** — proving the `oauth_provider` is actually invoked during HTTP MCP connections, not silently `None`\n3. **Token lifecycle** — store, load, clear, isolation, and re-authorization flows\n4. **Auth state machine** — correct serialization of `McpAuthState` variants across the lifecycle\n\nSeveral tests are explicitly marked as regression tests for specific bugs (e.g., `oauth_provider: None` passed in kernel's `connect_mcp_servers`, revoking removing auth state entirely).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[mcp_oauth_integration.rs] -->|calls| B[discover_oauth_metadata]\n    A -->|calls| C[McpConnection::connect]\n    A -->|implements| D[McpOAuthProvider]\n    D -->|mock: TrackingOAuthProvider| E[records load_token call]\n    D -->|mock: InMemoryOAuthProvider| F[HashMap-backed store]\n    A -->|serializes| G[McpAuthState]\n```\n\n## Mock Providers\n\nThe tests define two mock implementations of `McpOAuthProvider`:\n\n### `TrackingOAuthProvider`\n\nA minimal stub that records whether `load_token` was invoked (via an `AtomicBool`). It returns `None` from `load_token` to force a 401 failure, and no-ops for `store_tokens`/`clear_tokens`.\n\n**Used by:** `test_http_connect_calls_oauth_provider_load_token`\n\n### `InMemoryOAuthProvider`\n\nA fully functional in-memory provider backed by a `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`. Supports the complete token lifecycle: store, load, and clear with per-server isolation.\n\n**Used by:** `test_provider_store_then_load`, `test_provider_clear_removes_token`, `test_provider_clear_is_isolated`, `test_provider_reauthorize_after_clear`\n\n## Test Catalog\n\n### OAuth Metadata Discovery\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_discover_fallback_to_config` | When remote discovery fails (nonexistent host), `discover_oauth_metadata` falls back to the provided `McpOAuthConfig` and returns correct `authorization_endpoint`, `token_endpoint`, and `client_id`. |\n| `test_discover_fails_without_any_source` | When remote discovery fails **and** no config is provided, the function returns an error containing `\"OAuth metadata\"`. |\n\n### Provider Wiring Regression\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_http_connect_calls_oauth_provider_load_token` | When `McpConnection::connect` is called with an HTTP transport pointing to a nonexistent server, the `oauth_provider`'s `load_token` method **must** be called. This catches the regression where `oauth_provider: None` was passed in `connect_mcp_servers`, silently disabling OAuth. |\n\n### Token Lifecycle\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_provider_store_then_load` | `store_tokens` followed by `load_token` returns the stored access token. Initially, no token exists. |\n| `test_provider_clear_removes_token` | `clear_tokens` removes the token for a given server URL. |\n| `test_provider_clear_is_isolated` | Clearing tokens for one server does not affect another server's tokens. |\n| `test_provider_reauthorize_after_clear` | The full cycle `store → clear → store` works. After revocation, re-authorization with a new token succeeds. |\n\n### Auth State Serialization\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_auth_state_lifecycle` | The state transitions `NeedsAuth → PendingAuth → Authorized → NeedsAuth` all serialize correctly. After revocation, state returns to `needs_auth` (not removed), ensuring the dashboard shows an \"Authorize\" button. |\n| `test_needs_auth_serializes_differently_from_pending_auth` | `NeedsAuth` serializes to `\"needs_auth\"` and `PendingAuth` to `\"pending_auth\"`. These must differ to prevent the dashboard from showing \"Authorizing...\" before the user clicks Authorize. |\n\n## Dependencies on Other Modules\n\n- **`librefang_runtime::mcp_oauth`** — provides `discover_oauth_metadata`, `McpOAuthProvider` trait, `OAuthTokens`, and `McpAuthState`\n- **`librefang_runtime::mcp`** — provides `McpConnection`, `McpServerConfig`, `McpTransport`\n- **`librefang_types::config`** — provides `McpOAuthConfig`\n\n## Running\n\n```bash\ncargo test -p librefang-runtime --test mcp_oauth_integration\n```\n\nNote: `test_http_connect_calls_oauth_provider_load_token` attempts a real TCP connection to `127.0.0.1:1`. It will fail at the transport level, which is the intended behavior — the test only checks that `load_token` was called before that failure propagated.","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime. This module provides a sandboxed WebAssembly execution environment where game skills and abilities are loaded, instantiated, and run in isolation from the core engine.\n\n## Purpose\n\nLibreFang skills are authored as WebAssembly modules. This runtime component is responsible for:\n\n- Loading compiled WASM skill modules\n- Sandboxing execution so skill code cannot access host resources directly\n- Providing a controlled API surface (host functions) that skills can call into\n- Bridging skill invocations with the kernel and HTTP subsystems\n\nBy running skills in WASM via [wasmtime](https://wasmtime.dev/), the engine gets memory-safe, deterministic execution with fine-grained control over what each skill is permitted to do.\n\n## Dependencies & Relationships\n\n```mermaid\ngraph TD\n    A[librefang-runtime-wasm] -->|uses types from| B[librefang-types]\n    A -->|communicates with kernel via| C[librefang-kernel-handle]\n    A -->|makes outbound HTTP| D[librefang-http]\n    A -->|embeds| E[wasmtime]\n    A -->|async runtime| F[tokio]\n```\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared data types exchanged between the sandbox and the rest of the engine |\n| `librefang-kernel-handle` | Handle used to send commands and queries back to the LibreFang kernel |\n| `librefang-http` | HTTP client capabilities exposed to skills that are allowed network access |\n| `wasmtime` | The underlying WebAssembly runtime — compiles, instantiates, and runs WASM modules |\n| `tokio` | Async runtime backing all WASM invocation and I/O |\n| `serde` / `serde_json` | Serialization of arguments and return values across the WASM/host boundary |\n| `reqwest` | Underlying HTTP client used by `librefang-http` |\n| `tracing` | Structured logging of sandbox lifecycle events |\n| `thiserror` / `anyhow` | Error types for sandbox setup and invocation failures |\n\n## Architecture\n\n### Sandbox Lifecycle\n\n1. **Module loading** — A compiled `.wasm` binary is read and validated by wasmtime.\n2. **Linker configuration** — Host functions are registered with a `wasmtime::Linker`. These are the only entry points a skill can call to interact wi
