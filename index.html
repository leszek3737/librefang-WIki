compatibility for callers that have not adopted per-session filtering. When `canonical_context` is called with `session_id = None`, it must return all canonical entries for the agent across every session.\n\n**Sequence**:\n\n1. Append `\"a-1\"` under one session (`whatsapp` channel).\n2. Append `\"b-1\"` under a different session (`telegram` channel).\n\n**Assertion**:\n\n- `canonical_context(agent, None, None)` returns `[\"a-1\", \"b-1\"]` — all entries, unfiltered.\n\nThis guarantees that existing kernel code paths that don't pass a `SessionId` continue to work unchanged after the migration.\n\n## Execution Flow\n\n```mermaid\nsequenceDiagram\n    participant Test\n    participant SessionStore\n    participant SQLite\n\n    Test->>SQLite: open_in_memory + run_migrations\n    Test->>SessionStore: new(conn)\n    Test->>SessionStore: append_canonical(agent, msgs, None, Some(session_dm))\n    Test->>SessionStore: append_canonical(agent, msgs, None, Some(session_group))\n    Test->>SessionStore: append_canonical(agent, msgs, None, Some(session_dm))\n    Test->>SessionStore: canonical_context(agent, Some(session_dm), None)\n    SessionStore-->>Test: [dm-1, dm-2] only\n    Test->>SessionStore: canonical_context(agent, Some(session_group), None)\n    SessionStore-->>Test: [group-1] only\n```\n\n## Dependencies and Integration Points\n\n| Dependency | Usage |\n|---|---|\n| `librefang_memory::session::SessionStore` | Core unit-under-test. Provides `append_canonical` and `canonical_context`. |\n| `librefang_memory::migration::run_migrations` | Prepares the in-memory SQLite schema before each test. |\n| `librefang_types::agent::{AgentId, SessionId}` | Identity types. `SessionId::for_channel` derives a deterministic session ID from an agent + channel address. |\n| `librefang_types::message::{Message, Role, MessageContent}` | Message types used to construct canonical entries. |\n| `rusqlite::Connection` | In-memory SQLite backend for test isolation. |\n\n## Running\n\n```sh\n# Run just this integration test file\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# Run with output visible\ncargo test -p librefang-memory --test canonical_chat_scoped_integration -- --nocapture\n```\n\nNo external services or databases are required — everything runs in-memory.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Overview\n\n`librefang-memory` provides persistent storage and state management for the LibreFang agent system. It acts as the substrate layer that other LibreFang components build upon to read, write, query, and manage durable agent state across sessions.\n\nThe module is positioned as a foundational crate — higher-level agent logic depends on it, not the other way around.\n\n## Role in the System\n\nThe crate's description as a \"memory substrate\" means it is responsible for the mechanisms by which agents remember and recall information. This includes persistent data storage, serialization of agent state, and retrieval interfaces that other LibreFang modules consume.\n\n```\n┌─────────────────────────────────────┐\n│        LibreFang Agent OS           │\n│                                     │\n│  ┌───────────┐    ┌──────────────┐  │\n│  │ Agent     │───▶│  librefang-  │  │\n│  │ Logic     │    │  memory      │  │\n│  └───────────┘    └──────┬───────┘  │\n│                          │          │\n│                   ┌──────▼───────┐  │\n│                   │  librefang-  │  │\n│                   │  types       │  │\n│                   └──────────────┘  │\n└─────────────────────────────────────┘\n```\n\n## Dependency Analysis\n\nThe crate's dependencies reveal its architectural responsibilities:\n\n### Storage\n\n| Dependency | Purpose |\n|---|---|\n| `rusqlite` | Embedded SQLite database for structured, queryable persistent storage |\n\n### Serialization\n\n| Dependency | Purpose |\n|---|---|\n| `serde` | Serialization framework (core trait derivations) |\n| `serde_json` | JSON serialization for human-readable or interoperable state |\n| `rmp-serde` | MessagePack serialization for compact binary storage |\n\nThe dual serialization support (JSON and MessagePack) suggests the module supports both human-inspectable storage formats and space-efficient binary formats, likely selectable per context.\n\n### Async Runtime\n\n| Dependency | Purpose |\n|---|---|\n| `tokio` | Async runtime for non-blocking storage operations |\n| `async-trait` | Async trait definitions for storage backend abstractions |\n\n### Identity and Integrity\n\n| Dependency | Purpose |\n|---|---|\n| `uuid` | Unique identifiers for memory entries, sessions, or records |\n| `sha2` | Cryptographic hashing for data integrity verification or content-addressed storage |\n| `chrono` | Timestamp management for temporal queries and record ordering |\n\n### Networking\n\n| Dependency | Purpose |\n|---|---|\n| `reqwest` | HTTP client — likely for remote memory backends or synchronization with external services |\n\n### Observability and Error Handling\n\n| Dependency | Purpose |\n|---|---|\n| `tracing` | Structured logging and instrumentation of storage operations |\n| `thiserror` | Derived error types for idiomatic error propagation |\n\n### Internal Dependency\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across the LibreFang workspace |\n\n## Build Configuration\n\nThe module is part of the LibreFang workspace and inherits its root-level settings for version, edition, and license.\n\n```toml\nversion.workspace = true\nedition.workspace = true\nlicense.workspace = true\n```\n\n### Test Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `tokio-test` | Async test utilities |\n| `tempfile` | Temporary directories and files for isolated database tests |\n\nThe presence of `tempfile` as a test dependency confirms that tests create isolated SQLite databases in temporary locations rather than touching the filesystem.\n\n## Development Notes\n\n- **Backend abstraction**: The combination of `async-trait` and `rusqlite` suggests the module likely defines async storage traits with a SQLite-backed implementation. The `reqwest` dependency hints at potential remote backend support or synchronization.\n\n- **Content-addressing**: The `sha2` dependency, combined with `uuid` and `serde`, suggests some memory entries may be content-addressed — keyed by hash rather than just sequential or random identifiers.\n\n- **Testing strategy**: Use `tempfile` to create ephemeral database paths when writing tests. Initialize a fresh database for each test case to ensure isolation.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing agent configurations and data from other agent frameworks into LibreFang format.\n\n## Overview\n\n`librefang-migrate` provides tooling to convert projects, configurations, and agent definitions authored in other frameworks into LibreFang-compatible structures. It handles format detection, parsing, schema mapping, and output generation.\n\n## Purpose\n\nAdopting LibreFang from an existing agent framework requires translating configurations, prompts, tool definitions, and potentially conversation history. This module encapsulates that translation logic so migrations are repeatable and auditable rather than manual one-off efforts.\n\n## Key Dependencies and Their Roles\n\nThe dependency selection reveals the module's design:\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Target data structures — all migrated output conforms to LibreFang's type definitions |\n| `serde_json`, `serde_yaml`, `json5`, `toml` | Multi-format input parsing — agent frameworks use diverse configuration formats |\n| `walkdir` | Recursive directory traversal for scanning source projects |\n| `thiserror` | Typed error definitions for migration failures |\n| `tracing` | Structured logging of migration progress and warnings |\n| `chrono`, `uuid` | Timestamping and identity assignment for migrated entities |\n| `dirs` | Resolving standard platform directories for default output paths |\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Source Framework Files] --> B[Directory Scanner]\n    B --> C[Format Detection & Parsing]\n    C --> D[Schema Mapping]\n    D --> E[librefang-types Conversion]\n    E --> F[Output Writer]\n    \n    subgraph Input Formats\n        JSON\n        YAML\n        JSON5\n        TOML\n    end\n    \n    subgraph Target\n        librefang-types\n    end\n    \n    C -.-> Input Formats\n    E -.-> Target\n```\n\nThe migration pipeline follows a linear flow: discover source files, parse them in their native format, map the source schema to LibreFang's data model, and write normalized output.\n\n## Integration with LibreFang\n\nThis module depends on `librefang-types` as its sole internal dependency. All migrated data is expressed through the types defined there, ensuring downstream consumers (the runtime, validators, etc.) can work with imported configurations without any special handling.\n\nThe module has no incoming calls from other LibreFang crates, indicating it is a standalone tool or CLI-invoked utility rather than a library consumed at runtime.\n\n## Supported Input Formats\n\nThe inclusion of four distinct parsers (`serde_json`, `serde_yaml`, `json5`, `toml`) indicates the module handles source configurations in any of these formats. This breadth accommodates the wide variety of configuration formats used across the agent framework ecosystem.\n\n## Error Handling\n\nMigration errors are defined using `thiserror`, providing structured, typed errors for conditions such as:\n\n- Unreadable or missing source files\n- Unparseable configuration in any supported format\n- Schema mismatches where source concepts lack LibreFang equivalents\n- I/O failures during output writing\n\n## Testing\n\nThe `tempfile` dev-dependency indicates tests create temporary directories to exercise file discovery, parsing, and output writing in isolation without touching the real filesystem.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client integration for the LibreFang runtime. This module provides a bridge between LibreFang's runtime environment and MCP-compatible tool servers, enabling dynamic tool discovery and invocation.\n\n## Purpose\n\nModel Context Protocol (MCP) is a standard for exposing tools and resources to LLM-powered applications. This module acts as a client that connects to MCP servers, discovers available tools, and makes them accessible within the LibreFang execution environment.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[LibreFang Runtime] --> B[librefang-runtime-mcp]\n    B --> C[rmcp MCP Client]\n    B --> D[librefang-http]\n    B --> E[librefang-types]\n    C --> F[MCP Tool Servers]\n```\n\nThe module sits between the LibreFang runtime core and external MCP tool servers, translating between LibreFang's internal type system and the MCP protocol.\n\n## Dependencies\n\n### Internal Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang crates |\n| `librefang-http` | HTTP client infrastructure for communicating with remote MCP servers |\n\n### External Dependencies\n\n| Crate | Role |\n|---|---|\n| `rmcp` | Rust MCP client implementation — handles protocol negotiation, tool discovery, and JSON-RPC transport |\n| `reqwest` | Underlying HTTP client used for MCP server communication |\n| `tokio` | Async runtime |\n| `serde` / `serde_json` | Serialization for MCP protocol messages |\n| `base64` / `sha2` | Likely used for authentication handshakes or payload integrity verification with MCP servers |\n| `url` | URL parsing and construction for MCP server endpoints |\n| `rand` | Random generation, likely for nonce or session identifier creation |\n| `tracing` | Structured logging and diagnostics |\n| `async-trait` | Async trait definitions |\n| `http` | HTTP primitive types (status codes, headers, method types) |\n\n## Key Concepts\n\n### MCP Client Lifecycle\n\nThe module manages the lifecycle of connections to MCP servers:\n\n1. **Connection Setup** — Establishes a connection to an MCP server endpoint (typically over HTTP/SSE or stdio transport)\n2. **Capability Negotiation** — Exchanges supported capabilities with the server\n3. **Tool Discovery** — Retrieves the catalog of available tools, including their schemas and descriptions\n4. **Tool Invocation** — Calls tools by name with structured arguments and returns results\n\n### Integration with LibreFang Types\n\nTools discovered via MCP are mapped into LibreFang's internal type representations from `librefang-types`, allowing the runtime to treat MCP tools uniformly alongside other tool providers.\n\n### HTTP Transport\n\nMCP servers that expose HTTP endpoints are reached through `librefang-http`, which provides configured HTTP clients with connection pooling, timeouts, and TLS settings consistent with the rest of the LibreFang stack.\n\n## Usage Patterns\n\nThis crate is consumed by the LibreFang runtime to:\n\n- **Extend available tools** at runtime by connecting to MCP servers specified in configuration\n- **Proxy tool calls** from the execution environment out to MCP-compatible services\n- **Aggregate multiple MCP servers** into a unified tool catalog\n\n## Configuration\n\nMCP server connections are typically configured with:\n\n- **Endpoint URL** — The HTTP URL of the MCP server\n- **Authentication credentials** — Optional API keys or tokens, handled via the `base64`/`sha2` utilities\n- **Transport type** — HTTP-based (SSE stream) or stdio, determined by the `rmcp` client configuration\n\n## Logging and Diagnostics\n\nAll MCP operations are instrumented with `tracing` spans, providing visibility into:\n\n- Connection establishment and teardown\n- Tool discovery results\n- Individual tool call durations and outcomes\n\nThis integrates with the broader LibreFang observability stack.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 flow implementations for LibreFang runtime drivers, providing authentication integrations for ChatGPT and GitHub Copilot.\n\n## Overview\n\nThis crate encapsulates all OAuth-specific logic required by LibreFang's runtime drivers. It isolates the complexity of multi-provider authentication—authorization code exchange, token refresh, PKCE generation, and secure credential handling—behind a clean boundary so that individual driver implementations remain focused on their core concerns.\n\n## Supported Providers\n\n| Provider | Flow | Notes |\n|----------|------|-------|\n| ChatGPT (OpenAI) | Device authorization / Authorization code + PKCE | Uses OpenAI's OAuth endpoints |\n| GitHub Copilot | Device authorization flow | GitHub's device flow for CLI/tool integrations |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests auth| B[librefang-runtime-oauth]\n    B -->|HTTP calls| C[librefang-http]\n    C -->|reqwest| D[Provider OAuth Endpoints]\n    B -->|uses types| E[librefang-types]\n    B -->|returns| F[Tokens / Credentials]\n    F -->|consumed by| A\n```\n\nThe module sits between runtime drivers and `librefang-http`. Drivers delegate authentication to this crate rather than implementing OAuth flows themselves.\n\n## Key Dependencies and Their Roles\n\n### Internal Crates\n\n- **`librefang-types`** — Shared type definitions. OAuth token structures, credential types, and provider-specific configuration are expected to be defined or re-exported here.\n- **`librefang-http`** — HTTP client abstraction. All outbound requests to OAuth endpoints are routed through this crate rather than calling `reqwest` directly, maintaining consistency with the rest of the codebase.\n\n### Cryptographic Operations\n\nThe dependency selection reveals the security model:\n\n| Crate | Purpose |\n|-------|---------|\n| `sha2` | SHA-256 hashing for PKCE code verifier challenges |\n| `base64` | URL-safe Base64 encoding of PKCE verifiers and challenges |\n| `rand` | Cryptographically secure random generation for `state` parameters and PKCE verifiers |\n| `hex` | Hex encoding for digest representations |\n\n### Token Security\n\n| Crate | Purpose |\n|-------|---------|\n| `zeroize` | Secure memory wiping for tokens, secrets, and code verifiers after use |\n\nThis is critical for OAuth credentials—any struct holding sensitive data (access tokens, refresh tokens, client secrets) should implement `Zeroize` or use `Zeroize`-backed wrappers to ensure credentials don't linger in memory longer than necessary.\n\n### Error Handling and Observability\n\n- **`thiserror`** — Derive-based error types for OAuth-specific failures (token expiry, invalid grant, network errors during exchange, PKCE mismatches).\n- **`tracing`** — Structured logging for auth lifecycle events (flow initiation, token acquisition, refresh attempts, errors).\n\n## OAuth Flow Implementations\n\n### PKCE (Proof Key for Code Exchange)\n\nThe presence of `sha2`, `base64`, and `rand` together strongly indicates PKCE support. The expected pattern:\n\n1. Generate a cryptographically random code verifier using `rand`\n2. Compute SHA-256 hash of the verifier using `sha2`\n3. Base64url-encode the hash to produce the code challenge\n4. Include the challenge in the authorization request\n5. Present the original verifier during token exchange\n\nPKCE prevents authorization code interception attacks, which is especially important for desktop applications like LibreFang.\n\n### Device Authorization Flow\n\nThe GitHub Copilot integration likely uses the device authorization grant (`POST /login/device/code`), which is designed for environments that cannot open a browser or embed a web view. The flow involves:\n\n1. Request a device code and user code from the provider\n2. Present the user code (and verification URL) to the user\n3. Poll the token endpoint at the provider-suggested interval using `tokio::time::sleep`\n4. Continue polling until the user completes browser-based authorization or the code expires\n\n### Token Lifecycle\n\nTokens returned by providers require ongoing management:\n\n- **Storage** — Access tokens and refresh tokens held in memory with `zeroize` protection\n- **Refresh** — Automatic or on-demand refresh using the refresh token grant\n- **Expiry** — Tracking token expiration to proactively refresh before failure\n\n## Integration with Runtime Drivers\n\nRuntime drivers consume this crate to authenticate before making API calls to their respective providers. The typical integration pattern:\n\n1. Driver initializes with a provider-specific OAuth configuration\n2. Driver calls into this crate to start an auth flow\n3. User completes authentication (browser redirect or device code entry)\n4. This crate returns tokens to the driver\n5. Driver attaches tokens to subsequent API requests\n6. On 401 responses or token expiry, driver delegates refresh to this crate\n\n## Error Scenarios\n\nThe `thiserror`-based error types are expected to cover:\n\n| Scenario | Typical Cause |\n|----------|---------------|\n| Authorization denied | User declined consent in browser |\n| Invalid grant | Authorization code expired or already used |\n| Token refresh failure | Refresh token revoked or expired |\n| Network error | OAuth endpoint unreachable |\n| PKCE verification failed | Verifier/challenge mismatch |\n| Device code expired | User didn't complete auth in time |\n| Rate limited | Too many token requests |\n\n## Building and Testing\n\n```bash\n# Build the crate\ncargo build -p librefang-runtime-oauth\n\n# Run tests\ncargo test -p librefang-runtime-oauth\n\n# Check for warnings and clippy issues\ncargo clippy -p librefang-runtime-oauth\n```\n\n### Integration Testing\n\nOAuth flows require live provider endpoints. Integration tests typically need:\n\n- Valid OAuth application credentials (client ID, client secret)\n- A test harness capable of intercepting browser redirects\n- Or mocked HTTP responses via `librefang-http` test utilities\n\n## Security Considerations\n\n- **Never log tokens.** The `tracing` integration should carefully avoid emitting access tokens, refresh tokens, or code verifiers at any log level.\n- **Zeroize secrets.** All intermediate values (code verifiers, client secrets, tokens) must be zeroed after use.\n- **State parameter validation.** CSRF protection via `state` is essential for authorization code flows. Generate a random state, store it, and verify it matches on callback.\n- **Token storage.** This crate handles in-memory token management. Persistent storage (keychain, encrypted files) is outside its scope and should be handled by consumers.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests — MCP OAuth Integration\n\n## Purpose\n\nThis module contains integration tests that validate the OAuth authentication flow for MCP (Model Context Protocol) server connections. It guards against regressions in three critical areas:\n\n1. **OAuth metadata discovery** — ensuring fallback behavior when remote discovery fails\n2. **Provider wiring** — confirming the OAuth provider is actually invoked during connection attempts (not silently `None`)\n3. **Token lifecycle** — verifying store/load/clear semantics and server-level isolation\n4. **Auth state machine** — asserting correct serialization of `McpAuthState` transitions, which drives the dashboard UI\n\nSeveral tests were written specifically to prevent regressions from past bugs (documented inline).\n\n---\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Discovery Tests\"\n        A[test_discover_fallback_to_config]\n        B[test_discover_fails_without_any_source]\n    end\n    subgraph \"Provider Wiring\"\n        C[test_http_connect_calls_oauth_provider_load_token]\n    end\n    subgraph \"Token Lifecycle\"\n        D[test_provider_store_then_load]\n        E[test_provider_clear_removes_token]\n        F[test_provider_clear_is_isolated]\n        G[test_provider_reauthorize_after_clear]\n    end\n    subgraph \"Auth State Machine\"\n        H[test_auth_state_lifecycle]\n        I[test_needs_auth_serializes_differently_from_pending_auth]\n    end\n\n    A -->|calls| discover_oauth_metadata\n    B -->|calls| discover_oauth_metadata\n    C -->|calls| McpConnection::connect\n    D -->|uses| InMemoryOAuthProvider\n    E -->|uses| InMemoryOAuthProvider\n    F -->|uses| InMemoryOAuthProvider\n    G -->|uses| InMemoryOAuthProvider\n```\n\n---\n\n## Mock Implementations\n\nThe tests define two mock implementations of `McpOAuthProvider`:\n\n### `TrackingOAuthProvider`\n\nRecords whether `load_token` was called via an `AtomicBool`. Returns `None` from `load_token` to force a 401 failure. Used exclusively by `test_http_connect_calls_oauth_provider_load_token` to prove the provider is wired into the connection path.\n\n### `InMemoryOAuthProvider`\n\nStores tokens in a `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`. Implements the full `McpOAuthProvider` trait with real read/write/delete semantics. Used by all token lifecycle tests.\n\n---\n\n## Test Descriptions\n\n### OAuth Metadata Discovery\n\n| Test | What it verifies |\n|---|---|\n| `test_discover_fallback_to_config` | When the server at the given URL is unreachable, `discover_oauth_metadata` falls back to values from `McpOAuthConfig` (auth_url, token_url, client_id). |\n| `test_discover_fails_without_any_source` | When no server is reachable and no config is provided, the function returns an error containing `\"OAuth metadata\"`. |\n\n### Provider Wiring (Regression Guard)\n\n**`test_http_connect_calls_oauth_provider_load_token`**\n\nThis is a regression test for a bug where `oauth_provider: None` was passed in the kernel's `connect_mcp_servers`, silently disabling the entire OAuth flow. The test:\n\n1. Creates a `McpServerConfig` with an `Http` transport pointing at `127.0.0.1:1` (guaranteed unreachable)\n2. Attaches a `TrackingOAuthProvider`\n3. Calls `McpConnection::connect`\n4. Asserts the connection fails (expected)\n5. **Asserts `load_token_called` is `true`** — proving the provider was consulted, not silently skipped\n\n### Token Lifecycle\n\nAll tests in this group use `InMemoryOAuthProvider`.\n\n| Test | What it verifies |\n|---|---|\n| `test_provider_store_then_load` | `load_token` returns `None` initially, then returns the stored access token after `store_tokens` is called. |\n| `test_provider_clear_removes_token` | After `clear_tokens`, `load_token` returns `None` for that server URL. |\n| `test_provider_clear_is_isolated` | Clearing tokens for server A does not affect tokens stored for server B. Token storage is keyed by server URL. |\n| `test_provider_reauthorize_after_clear` | The full sequence store → clear → store works, and the second store returns the new token. Validates re-authorization after revocation. |\n\n### Auth State Machine\n\nThese are synchronous tests (no `#[tokio::test]`) that verify `McpAuthState` serialization.\n\n**`test_auth_state_lifecycle`**\n\nValidates the full state machine:\n\n```\nNeedsAuth → PendingAuth → Authorized → NeedsAuth (after revoke)\n```\n\nEach transition is verified by serializing to JSON and checking the `\"state\"` discriminator field. The final assertion confirms that after revocation, the state is `NeedsAuth` (not missing), ensuring the \"Authorize\" button appears in the dashboard.\n\n**`test_needs_auth_serializes_differently_from_pending_auth`**\n\nRegression test for a bug where the dashboard showed \"Authorizing...\" at boot before the user clicked Authorize. Verifies that `NeedsAuth` serializes to `\"needs_auth\"` and `PendingAuth` serializes to `\"pending_auth\"` — two distinct values.\n\n---\n\n## Key Types Referenced\n\n| Type | Location | Role |\n|---|---|---|\n| `McpOAuthConfig` | `librefang_types::config` | Static OAuth configuration (auth_url, token_url, client_id, scopes) |\n| `McpAuthState` | `librefang_runtime::mcp_oauth` | State machine enum: `NeedsAuth`, `PendingAuth { auth_url }`, `Authorized { expires_at, tokens }` |\n| `OAuthTokens` | `librefang_runtime::mcp_oauth` | Token data: `access_token`, `refresh_token`, `token_type`, `expires_in`, `scope` |\n| `McpOAuthProvider` | `librefang_runtime::mcp_oauth` | Async trait: `load_token`, `store_tokens`, `clear_tokens` |\n| `McpServerConfig` | `librefang_runtime::mcp` | Full server config including transport, headers, OAuth provider and config |\n| `McpConnection` | `librefang_runtime::mcp` | Connection handler that invokes the OAuth provider on 401 |\n\n---\n\n## Running\n\n```bash\n# All tests in this file\ncargo test -p librefang-runtime --test mcp_oauth_integration\n\n# Only auth state tests (synchronous, no network)\ncargo test -p librefang-runtime --test mcp_oauth_integration -- test_auth_state\n\n# Only token lifecycle tests\ncargo test -p librefang-runtime --test mcp_oauth_integration -- test_provider\n```\n\nThe provider wiring test (`test_http_connect_calls_oauth_provider_load_token`) attempts a TCP connection to `127.0.0.1:1` which will fail immediately — no external network dependency is required.","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime.\n\n## Overview\n\n`librefang-runtime-wasm` provides a WebAssembly-based sandboxed execution environment for **skills** within the LibreFang system. By compiling skill logic to WASM and executing it inside a `wasmtime` runtime, this module ensures that user-defined or third-party skill code runs in an isolated, memory-safe sandbox with controlled access to host capabilities.\n\n## Purpose\n\nUntrusted or user-authored skill code cannot be safely executed directly in the host process. This module addresses that by:\n\n- **Sandboxing** skill execution inside a WASM instance, preventing unrestricted access to the host filesystem, network, or memory.\n- **Providing a controlled API surface** through host functions that the WASM guest can import and call, mediated by `librefang-kernel-handle`.\n- **Enabling async skill execution** via `tokio`, allowing skills to perform asynchronous operations (HTTP requests, timers, etc.) without blocking the runtime.\n\n## Dependencies and Their Roles\n\n| Dependency | Role in this module |\n|---|---|\n| `wasmtime` | Core WASM runtime — compiles and instantiates WASM modules, manages WASM memory, and exposes host-to-guest function bindings. |\n| `librefang-types` | Shared type definitions (skill descriptors, messages, etc.) used across the crate boundary. |\n| `librefang-kernel-handle` | Provides the host-side kernel interface that WASM guest code calls into. Acts as the bridge between sandboxed skills and the LibreFang kernel. |\n| `librefang-http` | HTTP capabilities exposed to skills, enabling sandboxed code to make outbound requests via `reqwest`. |\n| `tokio` | Async runtime backing skill execution and any asynchronous host functions. |\n| `serde` / `serde_json` | Serialization of data passed between host and guest (e.g., skill arguments, return values, configuration). |\n| `reqwest` | Underlying HTTP client used by the HTTP capability layer. |\n| `tracing` | Structured logging and diagnostics for skill lifecycle events, instantiation, and errors. |\n| `thiserror` / `anyhow` | Error types for sandbox-specific failures (instantiation errors, trap handling, import resolution). |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Kernel] -->|spawns skill| B[WASM Runtime Layer]\n    B -->|instantiates| C[wasmtime Engine]\n    C -->|loads| D[Skill WASM Module]\n    D -->|calls imported host functions| E[Kernel Handle]\n    D -->|calls imported HTTP functions| F[HTTP Capability]\n    E -->|mediated access| A\n    F -->|reqwest| G[External Services]\n```\n\nThe kernel requests skill execution through the WASM runtime layer. The `wasmtime` engine compiles and instantiates the skill's WASM module. The module imports host-provided functions (via `librefang-kernel-handle` and `librefang-http`), which serve as the only channels through which sandboxed code can interact with the outside world.\n\n## Key Concepts\n\n### Skill\n\nA unit of executable logic compiled to a `.wasm` binary. Skills are loaded, instantiated, and invoked within a sandboxed WASM instance.\n\n### Host Functions\n\nFunctions defined on the host side and exported to the WASM guest via `wasmtime` linkers. These form the capability-based API that skills can call. Examples likely include:\n\n- Kernel operations (state queries, event emission) via `librefang-kernel-handle`\n- HTTP requests via `librefang-http`\n\n### Sandbox Isolation\n\nEach skill executes in its own WASM instance with its own linear memory. There is no shared state between skill instances unless explicitly mediated through the kernel handle.\n\n## Integration with LibreFang\n\nThis module sits between the LibreFang kernel and untrusted skill code:\n\n1. The **kernel** decides when to invoke a skill and provides the skill's WASM binary.\n2. This module **instantiates** the WASM module in a `wasmtime` sandbox.\n3. The skill **executes**, calling host-imported functions as needed.\n4. Results or errors are **returned** to the kernel.\n\nThe module depends on `librefang-kernel-handle` to define what the guest is allowed to do, and on `librefang-http` for network access. All types flowing across the boundary are defined in `librefang-types`.\n\n## Error Handling\n\nErrors originating from WASM execution (traps, instantiation failures, import resolution errors) are captured using `thiserror`-based error types and reported via `tracing`. The host never panics on guest misbehavior — all faults are surfaced as `Result` values to the caller.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate is the central orchestration layer that brings together LLM drivers, tool/skill execution, memory, communication channels, WASM sandboxing, and MCP (Model Context Protocol) integration into a coherent agent lifecycle.\n\n## Architecture\n\n```mermaid\ngraph TB\n    subgraph Runtime [\"librefang-runtime\"]\n        RT[Agent Runtime Core]\n        RT --> LLM[LLM Driver Layer]\n        RT --> SK[Skill Execution]\n        RT --> MEM[Memory Store]\n        RT --> CH[Channel Adapters]\n        RT --> WASM[WASM Sandbox]\n        RT --> MCP[MCP Integration]\n        RT --> OAUTH[OAuth Flows]\n        RT --> KH[Kernel Handle]\n    end\n\n    subgraph Sandboxing [\"Sandboxing (feature-gated)\"]\n        LL[Landlock LSM]\n        SC[seccomp BPF]\n    end\n\n    WASM --> Sandboxing\n```\n\n## Purpose\n\nThe runtime is responsible for:\n\n- **Agent lifecycle management** — spawning, running, and tearing down agent instances\n- **LLM interaction** — routing prompts through the appropriate LLM driver and handling streaming responses\n- **Tool and skill dispatch** — invoking registered skills, shell commands, and WASM modules in response to LLM tool calls\n- **Memory persistence** — storing and retrieving conversation history and agent state via `librefang-memory` (backed by `rusqlite`)\n- **Channel communication** — receiving messages from and sending replies to external channels (e.g., WebSocket, HTTP) through `librefang-channels`\n- **MCP integration** — exposing and consuming Model Context Protocol tools via `rmcp` and `librefang-runtime-mcp`\n- **Secure execution** — optionally sandboxing untrusted code paths using Landlock or seccomp\n\n## Dependency Breakdown\n\n### Core Infrastructure\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions (agent IDs, messages, configs) |\n| `librefang-http` | HTTP client/server utilities |\n| `librefang-kernel-handle` | Low-level kernel interface for agent isolation |\n| `librefang-channels` | Input/output channel abstractions (WebSocket, stdio, etc.) |\n\n### LLM Integration\n\n| Crate | Role |\n|---|---|\n| `librefang-llm-driver` | Trait definitions for LLM backends |\n| `librefang-llm-drivers` | Concrete driver implementations (OpenAI, Anthropic, local models, etc.) |\n\nThe runtime uses `librefang-llm-driver` traits for dependency injection and loads specific implementations from `librefang-llm-drivers` based on agent configuration.\n\n### Runtime Subsystems\n\n| Crate | Role |\n|---|---|\n| `librefang-runtime-wasm` | WASM module loading, compilation via `wasmtime`, and execution |\n| `librefang-runtime-mcp` | MCP server/client integration for tool discovery and invocation |\n| `librefang-runtime-oauth` | OAuth2 authentication flows for third-party service access |\n\n### Agent Capabilities\n\n| Crate | Role |\n|---|---|\n| `librefang-memory` | Conversation and state persistence (`rusqlite`-backed) |\n| `librefang-skills` | Skill registry, definition, and dispatch |\n\n### Cryptography & Identity\n\n`ed25519-dalek`, `sha2`, `hmac`, `rand`, and `zeroize` provide:\n\n- Agent identity signing and verification (Ed25519)\n- HMAC-based message authentication\n- Secure key material handling with zeroization\n\n### Networking\n\n- **Async HTTP**: `reqwest` for outbound requests\n- **Sync HTTP**: `ureq` for blocking operations (e.g., during startup before tokio runtime is available)\n- **TLS**: `rustls` with both `webpki-roots` and `rustls-native-certs` for certificate verification\n- **WebSocket**: `tokio-tungstenite` for persistent bidirectional connections\n\n### Packaging & Distribution\n\n`flate2` and `tar` handle `.tar.gz` archive extraction, used for downloading and installing skill packages or WASM modules at runtime.\n\n## Feature Flags\n\n### `landlock-sandbox`\n\nEnables Linux Landlock LSM sandboxing via the `landlock` crate. When active, WASM modules and shell tool executions can be restricted to specific filesystem paths and denied network access.\n\n**Linux kernel 5.13+ required.** No-op on non-Linux platforms.\n\n### `seccomp-sandbox`\n\nEnables seccomp BPF syscall filtering via `seccompiler`. Provides coarse-grained syscall whitelisting for sandboxed execution contexts.\n\nThese two features are independent — you can enable either, both, or neither depending on the target platform's security requirements.\n\n### `wasm-hooks`\n\nEnables WASM-based hook points in the agent lifecycle (e.g., pre/post message processing hooks compiled to WASM).\n\n## Configuration\n\nThe runtime loads agent configuration from TOML files (via `toml` and `dirs` for standard config path resolution). The `url`, `shlex`, and `regex-lite` crates support URL parsing, shell-style argument tokenization, and pattern matching within configuration and tool definitions.\n\n## Concurrency Model\n\nThe runtime is fully async, built on `tokio`. Concurrency primitives:\n\n- `dashmap` for lock-free concurrent hash maps (agent registries, connection pools)\n- `parking_lot` for lower-overhead mutexes and read-write locks where `DashMap` isn't suitable\n- `tokio-stream` and `futures` for composing async stream pipelines (particularly for LLM response streaming)\n\n## Testing\n\n`tokio-test` is included in dev-dependencies for writing async unit tests that exercise the runtime's agent loops, skill dispatch, and channel handling.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer.\n\n## Purpose\n\nLibreFang's skill system defines how game abilities, actions, and behaviors are packaged, discovered, loaded, and distributed. This module owns that entire lifecycle:\n\n- **Registry** — canonical in-memory index of all known skills, keyed by unique identifier\n- **Loader** — filesystem walker that discovers skill definitions (TOML, JSON, YAML) and validates them before registration\n- **Marketplace** — HTTP client for browsing, downloading, and installing skills from a remote marketplace; includes integrity verification and file locking for concurrent safety\n- **OpenClaw compatibility** — adapter layer that translates OpenClaw-format skill packs into LibreFang's native representation\n\n## Architecture\n\n```mermaid\ngraph TD\n    FS[Filesystem Loader] -->|parse & validate| REG[Skill Registry]\n    MKT[Marketplace Client] -->|download & install| FS\n    MKT -->|verify hash| HASH[SHA-256 Integrity]\n    OCC[OpenClaw Adapter] -->|translate| REG\n    REG -->|query| CONSUMERS[Other LibreFang Modules]\n```\n\nThe registry sits at the center. All skill data, regardless of origin, flows through validation and into the registry, where other modules query it at runtime.\n\n## Key Responsibilities\n\n### Skill Registry\n\nMaintains the authoritative collection of loaded skills. Each skill carries metadata including a unique identifier, semantic version, and human-readable description. The registry supports lookup by ID and enumeration of available skills.\n\n### Filesystem Loader\n\nScans configured skill directories using `walkdir`, parsing skill manifests in TOML, JSON, or YAML format via `serde`. Parsed skills are validated against `librefang-types` definitions before insertion into the registry. File locking (`fs2`) prevents corruption when multiple processes load or install skills concurrently.\n\n### Marketplace Client\n\nUses `reqwest` with `rustls` TLS to communicate with a remote skill marketplace. The client handles:\n\n- Searching and browsing available skills\n- Downloading skill archives (`.zip` packages extracted via the `zip` crate)\n- Verifying downloads with SHA-256 digests (`sha2` + `hex`) against published checksums\n- Installing skills into the local filesystem for the loader to discover\n\nUser-level directories are resolved via the `dirs` crate to pick the correct platform-specific data path.\n\n### OpenClaw Compatibility\n\nTranslates skill definitions authored for OpenClaw into LibreFang's native format. This adapter reads OpenClaw skill packs, maps their fields onto `librefang-types` structures, and registers them as if they were native skills.\n\n### Version Resolution\n\nSkill versions are parsed and compared using `semver`, enabling version constraints in dependency declarations and marketplace queries.\n\n### Fast Pattern Matching\n\nThe `aho-corasick` crate is used for efficient multi-pattern string matching during skill name lookups and command alias resolution.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions for skill structs, metadata, and validation |\n| `serde`, `serde_json`, `toml`, `serde_yaml` | De/serialization of skill manifests in multiple formats |\n| `walkdir` | Recursive directory traversal for skill discovery |\n| `reqwest` + `rustls` + `webpki-roots` + `rustls-native-certs` | HTTPS client for marketplace communication with native TLS roots |\n| `sha2` + `hex` | SHA-256 integrity verification of downloaded archives |\n| `zip` | Extraction of skill distribution packages |\n| `semver` | Semantic version parsing and comparison |\n| `aho-corasick` | Fast multi-pattern matching for skill aliases and names |\n| `fs2` | File locking for concurrent-safe skill installation |\n| `uuid` | Unique skill identifiers |\n| `chrono` | Timestamps for installation and cache metadata |\n| `dirs` | Platform-standard paths for skill storage directories |\n\n## Integration Points\n\nThis module depends on `librefang-types` for all shared data structures — skill definitions, metadata schemas, and error types flow through that crate. Downstream modules consume the registry to resolve which skills are available and look up skill data at runtime.\n\nBecause no incoming or outgoing internal calls were detected in the call graph, this module operates as a self-contained library: other crates call into it directly rather than it calling into the broader system. Integration is pull-based — consumers query the registry when they need skill data.\n\n## Testing\n\nTests use `tempfile` for isolated filesystem fixtures and `tokio-test` for async marketplace client tests. Run with:\n\n```sh\ncargo test -p librefang-skills\n```","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis crate serves as the central observability layer for the LibreFang system. It provides metrics definitions, labeling conventions, and instrumentation helpers so that other crates in the workspace can emit structured telemetry without directly depending on a specific metrics backend.\n\nThe crate abstracts the choice of metrics backend behind the [`metrics`](https://docs.rs/metrics) facade, meaning all recording goes through the `metrics` crate's macros and functions. The actual exporter (e.g., Prometheus via `metrics-exporter-prometheus`) is wired up at the application boundary, not in this library.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `metrics` | Facade crate providing counters, gauges, histograms, and the `increment_counter!` / `histogram!` / `gauge!` macros used throughout the workspace. |\n| `librefang-types` | Shared domain types (game identifiers, player states, etc.) used as metric label values. |\n\n## How It Fits in the Architecture\n\n```\n┌──────────────────────────────────────────────────┐\n│                Application Binary                 │\n│  (wires up metrics-exporter-prometheus, etc.)     │\n└──────────────┬───────────────────────────────────┘\n               │ uses\n┌──────────────▼───────────────────────────────────┐\n│           librefang-telemetry                     │\n│  - Metric name constants                         │\n│  - Label helpers built from librefang-types      │\n│  - Convenience wrappers around metrics facade     │\n└──────────────┬───────────────────────────────────┘\n               │ depends on\n┌──────────────▼───────────────────────────────────┐\n│           librefang-types                         │\n└──────────────────────────────────────────────────┘\n```\n\nOther crates in the workspace (game server, lobby service, etc.) depend on `librefang-telemetry` and call into it to record events. Because this crate has no incoming or outgoing call edges in the static analysis, its functions are called directly by application code rather than being part of a callback or plugin chain.\n\n## Integration Guide\n\n### Recording metrics from another crate\n\nAdd the dependency:\n\n```toml\n[dependencies]\nlibrefang-telemetry = { path = \"../librefang-telemetry\" }\n```\n\nCall the provided metric helpers from game logic, connection handlers, or wherever instrumentation is needed. All calls ultimately delegate to the `metrics` facade, so no async runtime or exporter configuration is required at this layer.\n\n### Exporting metrics at the application level\n\nThe binary crate that assembles the final server executable is responsible for installing a metrics recorder/exporter. This is not handled inside `librefang-telemetry` itself, keeping the library agnostic to the export destination.\n\n## Testing\n\nThe `tokio-test` dev-dependency supports async unit tests. Because this crate primarily defines metric helpers and constants, tests verify label formatting, metric name correctness, and that recording calls don't panic—without requiring a live metrics sink.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure crate providing mock implementations and test harness utilities for the librefang workspace. This crate centralizes reusable test fixtures so that integration and unit tests across the codebase share consistent, maintainable mocks rather than each crate rolling its own.\n\n## Purpose\n\nTesting across the librefang system involves several recurring challenges:\n\n- **Kernel-dependent code** needs a kernel-like object that doesn't require real system resources.\n- **LLM driver consumers** need deterministic responses without hitting a real language model.\n- **API route handlers** need an isolated Axum application with controlled state for HTTP-level testing.\n\nThis crate addresses all three by shipping mock implementations and Axum test-harness builders that downstream crates (`librefang-api`, `librefang-skills`, `librefang-hands`, etc.) depend on in their `[dev-dependencies]`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    T[librefang-testing]\n    T -->|provides mocks to| API[librefang-api tests]\n    T -->|provides mocks to| SK[librefang-skills tests]\n    T -->|provides mocks to| HD[librefang-hands tests]\n    T -->|provides mocks to| RT[librefang-runtime tests]\n    T -->|depends on| KT[librefang-kernel]\n    T -->|depends on| TY[librefang-types]\n    T -->|depends on| MEM[librefang-memory]\n    T -->|depends on| CH[librefang-channels]\n    T -->|depends on| WR[librefang-wire]\n    T -->|depends on| EX[librefang-extensions]\n```\n\nThe crate depends on nearly every other workspace member because its mocks must implement the real traits and produce the real types that production code expects.\n\n## Key Capabilities\n\n### Mock Kernel\n\nProvides a controllable stand-in for the kernel, used anywhere kernel behavior needs to be simulated without real I/O or system calls. This is consumed by tests in crates that interact with the kernel trait but should run deterministically and quickly.\n\n### Mock LLM Driver\n\nProvides a deterministic fake LLM driver that returns canned or programmable responses. This allows skill and agent logic to be tested end-to-end without network calls, rate limits, or non-deterministic model output. Tests can configure expected responses, error conditions, and multi-turn conversation sequences.\n\n### API Route Test Utilities\n\nBuilds a fully-wired Axum application suitable for `tower::ServiceExt` or direct HTTP testing. This typically involves:\n\n- Constructing an `axum::Router` with the same route definitions used in production.\n- Injecting mock state (mock kernel, mock LLM driver) in place of real service instances.\n- Exposing helpers that issue requests and parse JSON responses via `http-body-util` and `serde_json`.\n\nThe `tempfile` dependency supports tests that need temporary directories or files (e.g., simulating file uploads or on-disk state) that are automatically cleaned up on drop.\n\n### Shared Test Fixtures\n\nThe `dashmap` dependency suggests that some test utilities manage concurrent shared state (for example, tracking which mock endpoints were called, in what order, and with what payloads). The `uuid` dependency supports generating deterministic or random test identifiers.\n\n## Dependencies — Why Each One Exists\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Mocks produce and consume shared domain types. |\n| `librefang-kernel` | The mock kernel must implement the kernel's public trait. |\n| `librefang-runtime` | Test harnesses may need to spin up a controlled runtime context. |\n| `librefang-memory` | Tests involving memory/channel state need access to memory types. |\n| `librefang-api` | Route test utilities reuse the API's route definitions and state types. The `telemetry` feature is enabled; `default-features = false` avoids pulling in real server startup logic. |\n| `librefang-wire` | Wire-format types used in API request/response bodies. |\n| `librefang-channels` | Mock channel infrastructure for communication tests. |\n| `librefang-skills` | Skill-related types needed by higher-level test fixtures. |\n| `librefang-hands` | Hand/tool-related types needed by higher-level test fixtures. |\n| `librefang-extensions` | Extension types for tests that cover the extension system. |\n| `tokio` | Async test runtime (`#[tokio::test]`). |\n| `axum` + `tower` | Building and invoking test HTTP applications via `ServiceExt`. |\n| `http-body-util` | Reading response bodies in route tests. |\n| `serde` / `serde_json` | Serializing request payloads and deserializing response bodies. |\n| `dashmap` | Thread-safe shared state for tracking mock call histories. |\n| `tempfile` | Temporary directories/files with automatic cleanup. |\n| `uuid` | Generating test identifiers. |\n| `async-trait` | Implementing async traits for mock objects. |\n\n## Usage Patterns\n\n### Adding to dev-dependencies\n\nIn any workspace crate that needs test utilities:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\n### Typical route test pattern\n\nTests generally follow this shape:\n\n1. Build mock state (mock kernel, mock LLM driver) with desired behavior configured.\n2. Construct a test `Router` via the harness utility, injecting the mock state.\n3. Use `tower::ServiceExt::oneshot` to send a constructed HTTP request.\n4. Assert on the response status and parsed body.\n\n### Typical mock LLM test pattern\n\n1. Create the mock LLM driver.\n2. Program expected responses for specific prompt patterns.\n3. Pass the mock to the system under test.\n4. Verify the system handled the responses correctly.\n5. Optionally inspect the mock's call history to assert on what was sent.\n\n## Conventions\n\n- This crate is **test-only**. It must never appear in a non-`dev-dependency` section. Production code should have zero dependency on it.\n- Mock implementations should be **deterministic by default**. Any randomness must be explicitly opted into by the test author.\n- Keep mocks minimal. Implement only the surface area actually needed by tests — do not mirror the full production API unless required.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types/locales\n\nLocalization files for LibreFang API error messages using the [Fluent](https://projectfluent.org/) (`.ftl`) translation format.\n\n## Purpose\n\nThis directory contains all user-facing API error message translations, organized by locale. Every error returned by the LibreFang API has a stable message identifier (e.g. `api-error-agent-not-found`) with localized string values in each supported language. The application resolves the correct message at runtime based on the client's language preference.\n\n## Supported Locales\n\n| Directory | Language | Coverage |\n|-----------|----------|----------|\n| `en/` | English | **Complete** — canonical source of truth |\n| `de/` | German | Partial (core domains) |\n| `es/` | Spanish | Partial (core domains) |\n| `fr/` | French | Partial (core domains) |\n| `ja/` | Japanese | Full (mirrors English) |\n| `zh-CN/` | Simplified Chinese | Partial (core + select extended domains) |\n\n## File Structure\n\n```\nlocales/\n├── de/errors.ftl\n├── en/errors.ftl\n├── es/errors.ftl\n├── fr/errors.ftl\n├── ja/errors.ftl\n└── zh-CN/errors.ftl\n```\n\nEach locale contains a single `errors.ftl` file with all API error messages for that language.\n\n## Fluent Message Format\n\nMessages use [Fluent syntax](https://projectfluent.org/fluent/guide/):\n\n```fluent\n# Simple message (no variables)\napi-error-agent-not-found = Agent not found\n\n# Message with interpolation variables\napi-error-message-delivery-failed = Message delivery failed: { $reason }\n\n# Multiple variables\napi-error-cron-invalid-expression-detail = Invalid cron expression: requires 5 fields (minute hour day month weekday)\n```\n\n### Variable Patterns\n\nThe following interpolation variables appear across the error set:\n\n| Variable | Example Usage |\n|----------|--------------|\n| `$reason` | Bad request reasons, delivery failure reasons |\n| `$error` | Parse failures, I/O errors, operation failures |\n| `$name` | Template names, profile names, provider names, command names |\n| `$id` | Agent IDs, goal IDs, integration IDs |\n| `$step` | Workflow step identifiers |\n| `$alias` | Provider alias names |\n| `$url` | A2A agent URLs, webhook URLs |\n| `$status` | HTTP status codes |\n| `$field` | Sort field names |\n| `$valid` | Lists of valid values |\n| `$max` | Maximum length limits |\n| `$provider` | Provider identifiers |\n| `$event` | Event type names |\n\n## Error Domain Organization\n\nMessages are grouped by domain within each `.ftl` file. The canonical English locale defines the complete set:\n\n| Domain | Prefix | Example |\n|--------|--------|---------|\n| Agent | `api-error-agent-*` | `api-error-agent-not-found` |\n| Message | `api-error-message-*` | `api-error-message-too-large` |\n| Template | `api-error-template-*` | `api-error-template-not-found` |\n| Manifest | `api-error-manifest-*` | `api-error-manifest-signature-failed` |\n| Auth | `api-error-auth-*` | `api-error-auth-invalid-key` |\n| Session | `api-error-session-*` | `api-error-session-not-found` |\n| Workflow | `api-error-workflow-*` | `api-error-workflow-missing-steps` |\n| Trigger | `api-error-trigger-*` | `api-error-trigger-missing-pattern` |\n| Budget | `api-error-budget-*` | `api-error-budget-update-failed` |\n| Config | `api-error-config-*` | `api-error-config-parse-failed` |\n| Profile | `api-error-profile-*` | `api-error-profile-not-found` |\n| Cron | `api-error-cron-*` | `api-error-cron-create-failed` |\n| Goal | `api-error-goal-*` | `api-error-goal-circular-parent` |\n| Memory | `api-error-memory-*` | `api-error-memory-not-enabled` |\n| Network/A2A | `api-error-network-*` | `api-error-network-a2a-not-found` |\n| Plugin | `api-error-plugin-*` | `api-error-plugin-invalid-source` |\n| Channel | `api-error-channel-*` | `api-error-channel-unknown` |\n| Provider | `api-error-provider-*` | `api-error-provider-model-not-found` |\n| Skill | `api-error-skill-*` | `api-error-skill-install-failed` |\n| Hand | `api-error-hand-*` | `api-error-hand-not-found` |\n| MCP | `api-error-mcp-*` | `api-error-mcp-not-found` |\n| Integration | `api-error-integration-*` | `api-error-integration-not-found` |\n| Extension | `api-error-extension-*` | `api-error-extension-not-found` |\n| System | `api-error-system-*` | `api-error-system-cli-not-found` |\n| KV/Memory | `api-error-kv-*` | `api-error-kv-missing-fields` |\n| Approval | `api-error-approval-*` | `api-error-approval-not-found` |\n| Webhook | `api-error-webhook-*` | `api-error-webhook-url-unreachable` |\n| Backup | `api-error-backup-*` | `api-error-backup-missing-manifest` |\n| Schedule | `api-error-schedule-*` | `api-error-schedule-save-failed` |\n| Job | `api-error-job-*` | `api-error-job-not-retryable` |\n| Task | `api-error-task-*` | `api-error-task-disappeared` |\n| Pairing | `api-error-pairing-*` | `api-error-pairing-invalid-token` |\n| Binding | `api-error-binding-*` | `api-error-binding-out-of-range` |\n| Command | `api-error-command-*` | `api-error-command-not-found` |\n| File/Upload | `api-error-file-*` | `api-error-file-path-traversal` |\n| Tool | `api-error-tool-*` | `api-error-tool-invoke-denied` |\n| Validation | `api-error-validation-*` | `api-error-validation-color-invalid` |\n| General | `api-error-*` (unprefixed) | `api-error-rate-limited` |\n\n## Adding a New Error Message\n\n1. **Add the message to `en/errors.ftl`** first — this is the canonical locale. Choose the correct domain section and follow the naming convention `api-error-{domain}-{description}`.\n\n2. **Add translations to all other locales** in their respective `errors.ftl` files. For locales that don't yet have full coverage, add the translation anyway to prevent fallback gaps.\n\n3. **Preserve variable names exactly** — `$error`, `$name`, `$id`, etc. must match across all locales since they are resolved by the calling code.\n\nExample addition:\n\n```fluent\n# In en/errors.ftl\napi-error-agent-quota-exceeded = Agent quota exceeded (max { $limit })\n\n# In ja/errors.ftl\napi-error-agent-quota-exceeded = エージェントのクォータを超えています（最大 { $limit }）\n```\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g. `pt-BR/`, `ko/`).\n\n2. Copy `en/errors.ftl` into the new directory as a starting template.\n\n3. Translate all message values. **Do not** translate the message identifiers (left side of `=`). **Do not** alter variable names inside `{ }` braces.\n\n4. Register the locale in the application's Fluent bundle initialization code.\n\n## Coverage Expectations\n\nThe English (`en`) and Japanese (`ja`) locales maintain **full coverage** of all defined error keys. The German (`de`), Spanish (`es`), French (`fr`), and Simplified Chinese (`zh-CN`) locales currently cover the core API domains (agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, and general errors). \n\nWhen the application encounters a missing key in the requested locale, Fluent falls back through the locale chain and ultimately to the `en` messages. To check for missing keys, compare the identifier set of a partial locale against `en/errors.ftl`.\n\n## Relationship to the Codebase\n\nThese `.ftl` files are consumed by the Fluent localization system at runtime. API handler code references error identifiers (as string constants or enum variants) without embedding human-readable text directly. The translation layer resolves the identifier to the localized string based on the active locale context.\n\n```\nAPI Handler → error identifier (e.g. \"api-error-agent-not-found\")\n                    ↓\n         Fluent Bundle (loaded from locales/)\n                    ↓\n         Resolved string → HTTP response body\n```\n\nThis module has no Rust code, build logic, or dependencies on other modules — it is a pure data/resource module consumed through the Fluent localization framework.","other-librefang-types-src":"# Other — librefang-types-src\n\n# Model Catalog Types (`model_catalog`)\n\nShared data structures for librefang's model registry — the system that tracks available LLM providers, their models, authentication state, and inference parameters.\n\nThis module is purely data definitions with serde support. It contains no I/O, no network calls, and no mutation logic. Downstream crates (`librefang-runtime`, `librefang-kernel-metering`) consume these types to load catalog TOML files, merge discovered models, and estimate costs.\n\n## Data Flow\n\n```mermaid\ngraph LR\n    TOML[\"providers/*.toml\"] -->|parse| MCF[ModelCatalogFile]\n    MCF -->|provider field| PCT[ProviderCatalogToml]\n    MCF -->|models array| MCE[ModelCatalogEntry]\n    PCT -->|From trait| PI[ProviderInfo]\n    PI -->|runtime adds| AuthStatus\n    MCE -->|referenced by| Runtime[\"librefang-runtime\"]\n    MCF -->|referenced by| Metering[\"librefang-kernel-metering\"]\n```\n\n## Core Types\n\n### ModelTier\n\nClassification of a model's capability level. Serialized as lowercase strings (`\"frontier\"`, `\"smart\"`, etc.).\n\n| Variant | Meaning | Examples |\n|---------|---------|---------|\n| `Frontier` | Most capable, highest cost | Claude Opus, GPT-4.1 |\n| `Smart` | Capable but cost-effective | Claude Sonnet, Gemini 2.5 Flash |\n| `Balanced` | Speed/cost tradeoff (default) | GPT-4o-mini, Groq Llama |\n| `Fast` | Cheapest, simplest tasks | — |\n| `Local` | Self-hosted models | Ollama, vLLM, LM Studio |\n| `Custom` | User-defined at runtime | — |\n\nThe default is `Balanced`. Tier is used by the model router to select models based on task complexity and budget constraints.\n\n### AuthStatus\n\nProvider authentication state, detected at runtime. This enum is **not** stored in TOML — it's populated by the runtime's `detect_auth()` probe and lives only in `ProviderInfo`.\n\n```\nValidatedKey   ─ key present, confirmed valid via live API call\nConfigured     ─ key present, not yet validated\nAutoDetected   ─ key found via fallback env var\nConfiguredCli  ─ no key, but CLI tool available (e.g. claude-code)\nNotRequired    ─ local provider, no key needed\nInvalidKey     ─ key rejected (HTTP 401/403)\nMissing        ─ no key found (default)\nCliNotInstalled─ CLI-based provider, CLI missing\nLocalOffline   ─ local provider probed and offline\n```\n\nUse `is_available()` to check if a provider can be used. It returns `true` for `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Notably, `InvalidKey` returns `false` — the key exists but the provider will reject requests.\n\n`LocalOffline` is special: unlike `Missing`, the probe owns the transition back to `NotRequired` when the service comes back up. The auth detection system will not reset it.\n\n### ModelType\n\nDistinguishes model categories: `Chat` (default), `Speech` (TTS/STT), `Embedding` (vector models).\n\n### ModelCatalogEntry\n\nA single model's metadata — the primary unit of the catalog:\n\n- **Identity**: `id` (canonical), `display_name`, `provider`, `aliases`\n- **Capabilities**: `tier`, `context_window`, `max_output_tokens`\n- **Cost**: `input_cost_per_m`, `output_cost_per_m` (USD per million tokens)\n- **Feature flags**: `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`\n\nAll boolean feature flags default to `false` via `#[serde(default)]`.\n\n### ModelOverrides\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` — `None` means \"use the layer above.\"\n\n**Override resolution order** (highest priority first):\n1. Agent-level `ModelConfig`\n2. `ModelOverrides` (this type)\n3. System defaults\n\nKey fields:\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `temperature` | `Option<f32>` | Sampling temperature (0.0–2.0) |\n| `top_p` | `Option<f32>` | Nucleus sampling threshold |\n| `max_tokens` | `Option<u32>` | Completion token limit |\n| `reasoning_effort` | `Option<String>` | `\"low\"`, `\"medium\"`, `\"high\"` |\n| `use_max_completion_tokens` | `Option<bool>` | Use OpenAI-style `max_completion_tokens` |\n| `no_system_role` | `Option<bool>` | Model doesn't support system messages |\n| `force_max_tokens` | `Option<bool>` | Send `max_tokens` even when provider doesn't require it |\n\nCall `is_empty()` to check if no overrides are set (all fields `None`).\n\n## Provider Types\n\nThree types represent providers at different stages:\n\n### ProviderCatalogToml — Static (TOML-level)\n\nMaps 1:1 to the `[provider]` section in catalog files. No runtime state. Fields: `id`, `display_name`, `api_key_env`, `base_url`, `key_required`, `signup_url`, `regions`, `media_capabilities`.\n\n`key_required` defaults to `true` via a helper function (`default_key_required`) rather than `#[serde(default)]` because serde's `Default` for `bool` is `false`, but most providers do require keys.\n\n### ProviderInfo — Runtime\n\nEnriched version with runtime-only fields added during catalog loading:\n\n- `auth_status: AuthStatus` — populated by the auth probe\n- `model_count: usize` — number of catalog models for this provider\n- `available_models: Vec<String>` — model IDs confirmed via live API probe\n- `is_custom: bool` — `true` for user-added providers; drives dashboard UI (built-in providers show \"Remove key\", custom ones show \"Delete\")\n- `proxy_url: Option<String>` — per-provider proxy override\n\nConversion from `ProviderCatalogToml` uses the `From` trait — runtime fields get safe defaults (`AuthStatus::Missing`, empty vectors, `is_custom: false`).\n\n### RegionConfig\n\nPer-region endpoint overrides within a provider. Used for providers with geographic endpoints (e.g., DashScope with separate US and international URLs).\n\n```toml\n[provider.regions.us]\nbase_url = \"https://dashscope-us.aliyuncs.com/compatible-mode/v1\"\napi_key_env = \"DASHSCOPE_US_API_KEY\"  # optional; falls back to provider-level\n```\n\nAt runtime, if a region is selected, its `base_url` replaces the provider's default. If the region also specifies `api_key_env`, that overrides the provider-level key source.\n\n## File Formats\n\n### ModelCatalogFile\n\nThe unified TOML format for both the main repository and community model catalogs:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nThe `[provider]` section is optional — community catalog files may omit it if the provider is already known. When present, it's parsed into `ProviderCatalogToml`.\n\n### AliasesCatalogFile\n\nA separate file mapping short names to canonical model IDs:\n\n```toml\n[aliases]\nsonnet = \"claude-sonnet-4-20250514\"\nhaiku = \"claude-haiku-4-5-20251001\"\n```\n\n## Serde Behavior\n\nAll types use `#[serde(rename_all = \"snake_case\")]` for enum variants and `#[serde(rename_all = \"lowercase\")]` for `ModelTier`, `ModelType`. Booleans in `ModelCatalogEntry` and optional fields in `ModelOverrides` use `#[serde(default)]` to allow partial TOML files. `ModelOverrides` additionally uses `#[serde(skip_serializing_if = \"Option::is_none\")]` to keep serialized output clean. `ProviderInfo.available_models` skips serialization when empty.\n\n## Cross-Module Integration\n\n- **`librefang-runtime`**: Calls `merge_discovered_models()` which operates on `ModelCatalogEntry` instances to merge API-probed model lists into the catalog. Uses `ProviderInfo` for auth detection and region resolution.\n- **`librefang-kernel-metering`**: References `ModelCatalogFile` for cost estimation — reads `input_cost_per_m` / `output_cost_per_m` from catalog entries to calculate token costs. Falls back to legacy budget rates when catalog prices are zero.","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types-tests — Agent Form Round-Trip Tests\n\n## Purpose\n\nThis module validates that the TOML emitted by the **dashboard's visual agent editor** can be faithfully parsed by the **kernel's Rust deserializer**. It acts as a contract test between two independently maintained code paths:\n\n- **Producer:** `crates/librefang-api/dashboard/src/lib/agentManifest.ts` — a TypeScript serializer that converts form state into TOML.\n- **Consumer:** `librefang_types::agent::AgentManifest` — the Rust struct that deserializes that TOML via the `toml` crate.\n\nIf either side renames a field, changes an enum variant, or restructures a section, these tests fail at build time, catching the drift before it reaches production.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Dashboard Form<br/>TypeScript] -->|emits TOML| B[agent_form_roundtrip<br/>Rust tests]\n    B -->|toml::from_str| C[AgentManifest<br/>Rust struct]\n    B -.->|mirrors serializer logic| A\n```\n\nThe tests contain **hardcoded TOML strings** that replicate what the dashboard serializer would produce for various form states. Each string is fed through `toml::from_str::<AgentManifest>()` and then the resulting struct is asserted against field by field.\n\n## Test Cases\n\n### `parses_form_minimum_viable_output`\n\nValidates the smallest valid manifest the form can emit — only the required fields (`name`, `version`, `module`, and the `[model]` section). This ensures backward compatibility: old agents saved with minimal forms continue to parse.\n\n### `parses_form_full_output_with_capabilities_and_resources`\n\nCovers a fully populated form with all standard sections:\n\n| Section | Fields Verified |\n|---|---|\n| Top-level | `tags`, `skills`, `description` |\n| `[model]` | `temperature`, `max_tokens`, `system_prompt` |\n| `[resources]` | `max_tool_calls_per_minute`, `max_cost_per_hour_usd` |\n| `[capabilities]` | `network`, `shell`, `agent_spawn` |\n\nThis test catches field-level drift such as a renamed capability or a changed default type.\n\n### `parses_form_with_advanced_sections`\n\nExercises every advanced section the form can expose. This is the most comprehensive drift-detection test and covers:\n\n- **Enum variants:** `priority = \"High\"` → `Priority::High`, `session_mode = \"new\"` → `SessionMode::New`\n- **Inline tables:** `schedule = { periodic = { cron = \"0 9 * * *\" } }`\n- **Optional sections:** `[thinking]`, `[autonomous]`, `[routing]` — each wrapped in `Option<T>` on the Rust side, verified with `.is_some()` and `.as_ref().unwrap()`\n- **Array-of-tables:** `[[fallback_models]]` and `[[context_injection]]` — these use TOML's double-bracket syntax and map to `Vec<FallbackModel>` and `Vec<ContextInjection>` respectively\n- **Capability ACLs:** `memory_read`, `memory_write`, `agent_message`, `ofp_connect` — glob-style permission strings\n\n### `parses_form_response_format_json_schema`\n\nValidates that the dashboard's inline JSON-schema serializer output deserializes into `ResponseFormat::JsonSchema`. The form emits the schema as an inline TOML table (`{ type = \"json_schema\", name = \"user\", schema = { type = \"object\" }, strict = true }`), and this test confirms the kernel correctly picks the `JsonSchema` variant and extracts the `name` and `strict` fields.\n\n### `omitting_optional_sections_uses_defaults`\n\nVerifies that when the form leaves `[resources]` and `[capabilities]` entirely absent, the kernel falls back to struct defaults. Assertions check that `capabilities.network` is empty, `capabilities.agent_spawn` is `false`, and `resources.max_llm_tokens_per_hour` is `None` (meaning \"inherit global default\").\n\n## When These Tests Fail\n\nA failure in this module almost always means one of two things:\n\n1. **The Rust `AgentManifest` struct changed** (field renamed, type changed, section removed) without updating the dashboard serializer. Fix the serializer in `agentManifest.ts`, or update the test TOML to match the new schema.\n2. **The dashboard serializer changed** (new field, renamed key, different TOML structure) without updating the Rust struct. Add or update the corresponding field in `AgentManifest` and its `Deserialize` implementation.\n\nIn both cases, the fix requires coordinating both sides of the contract — these tests exist to flag exactly this kind of cross-crate divergence.\n\n## Running\n\n```bash\n# From the workspace root\ncargo test -p librefang-types --test agent_form_roundtrip\n\n# Run a specific case\ncargo test -p librefang-types --test agent_form_roundtrip parses_form_with_advanced_sections\n```","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nCore type definitions and shared traits for the LibreFang Agent OS.\n\n## Purpose\n\nThis crate serves as the foundational type library that all other LibreFang components depend on. It defines the common data structures, error types, configuration schemas, cryptographic primitives, and async traits that flow through the system. By isolating types into their own crate, the broader workspace avoids circular dependency issues and gains a single source of truth for shared contracts.\n\nThis is a **leaf crate** — it has no internal dependencies on other LibreFang crates and makes no outbound calls. Every other crate in the workspace that needs to speak a common language imports from here.\n\n## Dependency Rationale\n\nThe external dependencies reveal the categories of types this crate provides:\n\n| Dependency | Role in the crate |\n|---|---|\n| `serde`, `serde_json` | Derive `Serialize`/`Deserialize` on all wire-format types |\n| `chrono` | Timestamps on events, logs, and signed payloads |\n| `uuid` | Unique identifiers for agents, sessions, tasks |\n| `thiserror` | Ergonomic error enum definitions |\n| `ed25519-dalek` | Ed25519 keypairs, signatures, and verification types |\n| `sha2` | SHA-256 hashing for integrity checks |\n| `hex` | Encoding/decoding of byte data in hex representation |\n| `rand` | Cryptographically secure random number generation for key material |\n| `dirs` | Platform-aware path resolution for config and data directories |\n| `toml` | Deserialization of TOML-based configuration files |\n| `async-trait` | Async trait definitions for agent behavior and transport abstractions |\n| `fluent`, `unic-langid` | Internationalization (i18n) message types and locale identifiers |\n| `regex-lite` | Lightweight regex pattern definitions for validation rules |\n\nThe dev-dependency on `rmp-serde` (MessagePack) indicates that serialization round-trip tests cover multiple formats beyond JSON.\n\n## How It Fits the Architecture\n\n```\n┌─────────────────────────────────────────────┐\n│           LibreFang Agent OS                 │\n│                                             │\n│  ┌──────────┐ ┌──────────┐ ┌──────────┐    │\n│  │  Agent    │ │ Transport│ │  Task     │   │\n│  │  Runtime  │ │  Layer   │ │  Runner   │   │\n│  └────┬─────┘ └────┬─────┘ └────┬─────┘    │\n│       │             │            │          │\n│       └─────────────┼────────────┘          │\n│                     ▼                       │\n│            ┌─────────────────┐              │\n│            │ librefang-types │              │\n│            └─────────────────┘              │\n└─────────────────────────────────────────────┘\n```\n\nEvery crate that produces, consumes, or routes messages depends on `librefang-types` for the shared vocabulary. This includes agent identifiers, signed envelopes, task definitions, configuration structs, and error types.\n\n## Likely Type Categories\n\nBased on the dependency set, the crate organizes into these conceptual groups:\n\n### Identity and Cryptography\n\nTypes wrapping `ed25519-dalek` and `sha2` for agent keypairs, payload signing, signature verification, and hash-based integrity checks. These types are serialized with `serde` for transmission over the wire and use `hex` for human-readable representations of byte data.\n\n### Configuration\n\nStructs deserialized from TOML that define agent behavior — connection endpoints, polling intervals, feature flags. The `dirs` crate resolves platform-specific configuration paths.\n\n### Task and Message Envelopes\n\nMessage types that carry task payloads, results, and control signals between agents and the control plane. Each carries a `uuid` identifier and `chrono` timestamp.\n\n### Error Types\n\nError enums derived with `thiserror` that provide structured, typed errors across the system rather than raw string propagation.\n\n### Async Traits\n\nTrait definitions annotated with `async-trait` that define contracts for transport backends, agent lifecycle hooks, and task execution — without coupling consumers to a specific implementation.\n\n### Internationalization\n\nTypes leveraging `fluent` and `unic-langid` to support localized log messages and user-facing strings, keyed by locale identifiers.\n\n### Validation\n\nRegex patterns built with `regex-lite` for input validation rules on identifiers, network addresses, or configuration values.\n\n## Testing\n\nThe dev-dependency on `rmp-serde` confirms that type definitions are tested for serialization round-trips across multiple formats (at minimum JSON and MessagePack). This ensures that any type annotated with `Serialize` and `Deserialize` maintains fidelity when encoded and decoded.\n\n## Contributing Guidelines\n\nWhen adding types to this crate:\n\n- **Every public struct or enum must derive `Serialize` and `Deserialize`** unless there is a compelling reason not to. These types cross process and network boundaries.\n- **Avoid pulling in logic dependencies.** This crate should remain free of side effects, I/O, and runtime behavior. If a type needs to *do* something, the logic belongs in a higher crate; only the shape of the data belongs here.\n- **Prefer `thiserror` for error types** to maintain consistency with existing error definitions.\n- **Write serialization round-trip tests** for any new type, covering at least JSON. Use the existing `rmp-serde` dev-dependency if MessagePack is a relevant wire format for the new type.\n- **Keep the dependency list lean.** Any new dependency here affects every crate in the workspace. Evaluate whether the type truly belongs in this shared crate or in a more specialized one.","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer for the LibreFang Protocol (OFP).\n\n## Purpose\n\n`librefang-wire` implements the network transport and message-framing layer that allows LibreFang agents to communicate with each other. It owns the wire format — how messages are serialized, framed, authenticated, and delivered over async TCP connections. Every packet that crosses the network between two agents passes through this crate.\n\n## Position in the Codebase\n\n```\n┌──────────────────┐      ┌──────────────────┐\n│  librefang-types │      │   higher-level   │\n│  (shared types)  │◄─────┤  agent crates    │\n└────────┬─────────┘      └────────▲─────────┘\n         │                         │\n         ▼                         │\n┌──────────────────┐               │\n│ librefang-wire   │◄──────────────┘\n│ (this crate)     │\n└──────────────────┘\n```\n\n`librefang-types` supplies shared data structures (message enums, error types, configuration structs). `librefang-wire` consumes those types and adds the transport mechanics — connection lifecycle, framing, HMAC authentication, and message I/O. Higher-level agent crates depend on `librefang-wire` to open connections, send typed messages, and receive inbound traffic without dealing with raw byte streams.\n\n## Key Dependency Choices\n\n| Dependency | Role in this crate |\n|---|---|\n| **tokio** | Async runtime for non-blocking TCP I/O and task spawning |\n| **serde / serde_json** | Message serialization to/from the JSON-based wire format |\n| **hmac / sha2 / subtle** | HMAC-SHA256 message authentication with constant-time signature comparison to prevent timing attacks |\n| **uuid
