n- `librefang_types` — shared types (AgentId, AgentManifest, config types)","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\nThe dashboard is a single-page React application that provides the web management interface for the LibreFang agent infrastructure. It covers agent configuration, chat, workflow editing, skill management, monitoring, security settings, and all administrative operations.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Entry\"\n        A[main.tsx] --> B[QueryClientProvider]\n        B --> C[RouterProvider]\n    end\n\n    subgraph \"Routing Layer\"\n        C --> D[router.tsx]\n        D -->|lazy import| E[Page Components]\n        D -->|renders| F[App.tsx shell]\n    end\n\n    subgraph \"App Shell\"\n        F --> G[Sidebar Navigation]\n        F --> H[Header Bar]\n        F --> I[Outlet - current page]\n        F --> J[AuthDialog]\n        F --> K[CommandPalette]\n        F --> L[NotificationCenter]\n    end\n\n    subgraph \"API Layer\"\n        E -->|TanStack Query| M[lib/queries/*]\n        M --> N[api.ts]\n        N --> O[fetch / REST]\n    end\n\n    subgraph \"State\"\n        F --> P[useUIStore - Zustand]\n        N --> Q[localStorage - API key]\n    end\n```\n\n## Entry Point — `main.tsx`\n\nBoots the React tree with three providers:\n\n- **`QueryClientProvider`** — configures TanStack Query with `retry: 1`, `staleTime: 30s`, and `refetchOnWindowFocus: false`. These defaults are intentionally conservative to avoid hammering the backend.\n- **`RouterProvider`** — mounts the TanStack Router instance exported from `router.tsx`.\n- **`ToastContainer`** — global toast notification surface rendered at the root level.\n- **i18n** is initialized as a side-effect import from `./lib/i18n`.\n\n## Routing — `router.tsx`\n\nAll routes live under the base path `/dashboard`. The root route (`/`) redirects to `/overview`.\n\n### Lazy Loading\n\nEvery page component is loaded via `lazyWithReload()`, which wraps React's `lazy()` with automatic chunk-error recovery:\n\n1. A dynamic import failure (stale chunk hash after deployment or HMR) is detected by matching against `CHUNK_ERROR_RE`.\n2. A React dispatcher-null error (transient HMR state) is detected by `REACT_DISPATCHER_RE`.\n3. If either matches and no reload has occurred in the last 10 seconds (tracked in `sessionStorage.__chunk_reload`), the page auto-reloads once.\n4. If a reload is already in flight, the import returns a never-resolving promise to prevent the error boundary from flashing.\n\nThis eliminates the \"white screen after deploy\" problem without requiring service workers.\n\n### Error Boundary\n\n`ChunkErrorBoundary` is registered as `defaultErrorComponent` on the router. It renders a diagnostic UI with Reload / Force Reload / Show Stack controls. For chunk or dispatcher errors, it also attempts `tryAutoReload()` on mount.\n\n### Route Definitions\n\nThere are 35+ routes. Each is a flat child of the root route—there is no nested route tree beyond the `/config/*` sub-routes. Key routes include:\n\n| Path | Page | Notes |\n|---|---|---|\n| `/overview` | `OverviewPage` | Dashboard landing |\n| `/chat` | `ChatPage` | Accepts `?agentId=` search param |\n| `/canvas` | `CanvasPage` | Accepts `?t=` and `?wf=` for workflow editing |\n| `/agents` | `AgentsPage` | Agent management |\n| `/workflows` | `WorkflowsPage` | Workflow list |\n| `/terminal` | `TerminalPage` | Full-height route (no scrolling wrapper) |\n| `/config/*` | `ConfigPage` | Sub-routes: general, memory, tools, channels, security, network, infra |\n| `/settings` | `SettingsPage` | Application settings |\n\nThe `FULL_HEIGHT_ROUTES` set in `App.tsx` controls whether a page receives `flex-1 overflow-hidden` (terminal-style) or `overflow-y-auto` with padding.\n\n## Application Shell — `App.tsx`\n\n`App` is the root route component. It renders the persistent UI chrome (sidebar, header) and an `<Outlet />` for the current page.\n\n### Authentication Flow\n\nThe app supports three auth modes, determined at startup by `checkDashboardAuthMode()`:\n\n- **`\"none\"`** — No authentication required. Dashboard loads immediately.\n- **`\"api_key\"`** — API key stored in `localStorage(\"librefang-api-key\")`.\n- **`\"credentials\"`** — Username/password login with optional TOTP second factor.\n- **`\"hybrid\"`** — User chooses between credentials and API key tabs.\n\nOn mount, `App` calls `setOnUnauthorized()` to register a global 401 handler. Any API response with status 401 triggers `clearApiKey()` and re-shows the `AuthDialog`.\n\n`AuthDialog` handles:\n- API key submission via `verifyStoredAuth()`\n- Credential login via `dashboardLogin()` with TOTP step-up\n- Error display with i18n-translated messages\n\n`ChangePasswordModal` allows credential-mode users to update their username and/or password. On success it calls `clearApiKey()` and reloads.\n\n### Sidebar Navigation\n\nNavigation items are organized into six groups (core, configure, config, automate, observe, advanced). The sidebar supports two layout modes controlled by `useUIStore.navLayout`:\n\n- **Default layout** — Groups are labeled sections, all items visible.\n- **`\"collapsible\"` layout** — Each group header is collapsible via `toggleNavGroup()`.\n\nThe sidebar collapses to a 24px icon-only strip on desktop via `isSidebarCollapsed`. On mobile it slides in as an overlay controlled by `isMobileMenuOpen`.\n\nThe `/terminal` route is conditionally shown based on `terminalEnabled`, which is fetched from `getStatus()` at startup (fail-open to `true`).\n\n### Header\n\nContains mobile menu toggle, notification center, language toggle (en/zh), theme toggle (dark/light), and a user dropdown with links to settings, change password, and logout.\n\n### Keyboard Shortcuts\n\n`useKeyboardShortcuts` is invoked at the shell level. `⌘K` opens the command palette. The shortcuts help overlay is toggled via `setShowShortcuts`.\n\n### Theme\n\nTheme is stored in `useUIStore.theme`. A `useEffect` toggles the `dark` class on `<html>`, which drives Tailwind's `dark:` variant selectors.\n\n## API Client — `api.ts`\n\nA fully typed REST client covering every backend endpoint the dashboard uses.\n\n### HTTP Primitives\n\nFour private functions handle all requests:\n\n| Function | Method | Timeout |\n|---|---|---|\n| `get<T>` | GET | Browser default |\n| `post<T>` | POST | 60s (5min for long-running ops) |\n| `put<T>` | PUT | Browser default |\n| `patch<T>` | PATCH | Browser default |\n| `del<T>` | DELETE | Browser default |\n\nAll go through `buildHeaders()`, which merges caller-provided headers with auth headers from `authHeader()` (reads `localStorage(\"librefang-api-key\")` and `Accept-Language`).\n\n### Error Handling\n\n`parseError()` converts non-OK responses into `ApiError` instances. For 401 responses specifically:\n1. `_unauthorizedFired` gate prevents loops.\n2. `clearApiKey()` removes the stored token.\n3. `_onUnauthorized()` callback triggers `App`'s re-authentication flow.\n\n### Timeout Strategy\n\n- `DEFAULT_POST_TIMEOUT_MS = 60_000` — standard mutations.\n- `LONG_RUNNING_TIMEOUT_MS = 300_000` — agent messages, workflow runs, skill installs, skill hub operations.\n- Timeouts use `AbortController` and throw a human-readable message on expiry.\n\n### API Domains\n\nThe client exports functions organized by domain:\n\n- **Agents** — CRUD, session management, messaging (`sendAgentMessage`), cloning, tool configuration.\n- **Providers** — Listing, key management, URL configuration, default selection.\n- **Models** — Listing with filters, custom model management, per-model overrides.\n- **Channels** — Listing, configuration, testing, QR flows for WeChat/WhatsApp.\n- **Skills** — CRUD, evolution (update/patch/rollback), file management, registry install.\n- **Skill Hubs** — ClawHub (global + CN mirror), SkillHub, FangHub browse/search/install.\n- **Workflows** — CRUD, run, dry-run, template management, run history.\n- **Schedules & Triggers** — Full CRUD for cron schedules and event triggers.\n- **Memory** — List, search, stats, add, update, delete, cleanup, decay.\n- **Approvals** — List, approve/reject, batch resolve, TOTP setup/confirm/revoke, audit trail.\n- **Hands** — List definitions, activate/deactivate, settings, stats, messaging.\n- **Monitoring** — Health, status, version, queue status, audit trail, usage analytics, budget.\n- **Config** — Full config read, schema discovery, per-path set, reload, backup/restore, TOML export.\n- **Media** — Image generation, TTS, transcription, video submit/poll, music generation.\n- **Comms** — Topology, events, inter-agent messaging, task posting.\n- **Auth** — Login, logout, password change, auth mode check, credential verification.\n\n### WebSocket Support\n\n`buildAuthenticatedWebSocketUrl()` constructs a WebSocket URL with the API token as a query parameter, used by terminal and chat features.\n\n### Type Exports\n\n`api.ts` is the canonical source for all response/request TypeScript interfaces used across the dashboard (e.g., `AgentItem`, `ProviderItem`, `WorkflowStep`, `MemoryItem`, etc.). Page components and query hooks import types directly from this module.\n\n## State Management\n\nUI state lives in a Zustand store (`useUIStore` in `lib/store`):\n\n- `theme` / `toggleTheme`\n- `language` / `setLanguage`\n- `isSidebarCollapsed` / `toggleSidebar`\n- `isMobileMenuOpen` / `setMobileMenuOpen`\n- `navLayout` — `\"default\"` or `\"collapsible\"`\n- `collapsedNavGroups` — record of group key → collapsed state\n- `terminalEnabled` / `setTerminalEnabled`\n\nServer state is managed by TanStack Query through query/mutation hooks in `lib/queries/*` and `lib/mutations/*`, which call into `api.ts` functions.\n\n## Adding a New Page\n\n1. Create `src/pages/MyPage.tsx` exporting the component.\n2. Add a `lazyWithReload()` entry in `router.tsx`.\n3. Define a route with `createRoute({ getParentRoute: () => rootRoute, path: \"/my-page\", component: ... })`.\n4. Add it to the `routeTree` array.\n5. Optionally add a navigation entry to the appropriate `navGroups` item in `App.tsx`.\n6. Add API functions to `api.ts` if new endpoints are needed, then create corresponding query/mutation hooks in `lib/queries/` and `lib/mutations/`.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop\n\nNative desktop application built on Tauri 2.0 that wraps the LibreFang Agent OS. The app boots the kernel and embedded API server, opens a native WebView window pointing at the WebUI dashboard, and provides system tray integration, single-instance enforcement, native notifications, global shortcuts, auto-start, and automatic updates.\n\nSupports both **local mode** (embedded kernel + server) and **remote mode** (connect to a running LibreFang instance elsewhere on the network).\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"main.rs (CLI)\"] --> Run[\"lib.rs::run()\"]\n    Run --> ModeRes[\"Resolve StartupMode\"]\n    ModeRes -->|Remote URL| Remote[\"Connect to remote server\"]\n    ModeRes -->|--local flag| LocalBoot[\"server::start_server()\"]\n    ModeRes -->|No preference| ConnScreen[\"connection_html() Connection Screen\"]\n\n    LocalBoot --> Kernel[\"LibreFangKernel::boot()\"]\n    LocalBoot --> Axum[\"Embedded axum server (background thread)\"]\n\n    Run --> TauriApp[\"Tauri App Builder\"]\n    TauriApp --> WebView[\"WebView Window → WebUI\"]\n    TauriApp --> Tray[\"System Tray (tray.rs)\"]\n    TauriApp --> Shortcuts[\"Global Shortcuts (shortcuts.rs)\"]\n    TauriApp --> Notifs[\"forward_kernel_events() → OS Notifications\"]\n    TauriApp --> Updater[\"spawn_startup_check() (updater.rs)\"]\n\n    ConnScreen -->|IPC: connect_remote| Remote\n    ConnScreen -->|IPC: start_local| LocalBoot\n```\n\n## Startup Flow and Connection Modes\n\n### Mode Resolution Priority\n\nThe app determines how to start based on a priority chain:\n\n1. **CLI `--server-url <URL>`** → `StartupMode::Remote` — connect directly to the given URL\n2. **CLI `--local`** → `StartupMode::Local` — boot an embedded kernel and server immediately\n3. **Environment variable `LIBREFANG_SERVER_URL`** → `StartupMode::Remote`\n4. **Saved preference** from `~/.librefang/desktop.toml` → restores previous choice (remote or local)\n5. **Fallback** → `StartupMode::ConnectionScreen` — show a self-contained HTML page where the user chooses\n\nThe `StartupMode` enum is private to `lib.rs` and consumed entirely during app setup.\n\n### Startup Sequence in `run()`\n\n1. Initialize `tracing_subscriber` with `RUST_LOG` env filter (defaults to `librefang=info,tauri=info`)\n2. Load `~/.librefang/.env` into the process environment via `dotenv::load_dotenv()` (system env takes priority)\n3. Resolve `StartupMode` from the priority chain\n4. For direct modes, resolve the initial URL and optional `ServerHandle` immediately:\n   - **Remote**: validate the URL scheme, store `None` handle\n   - **Local**: call `server::start_server()`, which boots the kernel synchronously and spawns the axum server on a background thread\n5. Register all managed state with Tauri (`PortState`, `KernelState`, `ServerUrlState`, `RemoteMode`, `ServerHandleHolder`)\n6. Build the Tauri app with plugins (notification, shell, dialog, single-instance, autostart, updater, global shortcuts)\n7. In the `.setup()` closure:\n   - Create the WebView window (either pointing at the resolved URL or at the connection screen via `about:blank` + `document.write()`)\n   - Set up the system tray (desktop only)\n   - Start kernel event forwarding for native notifications (local mode only)\n   - Spawn the startup update check (desktop only)\n8. Register `on_window_event` to hide-to-tray on close (desktop) instead of quitting\n\n## Managed State\n\nAll state is registered once at app build time using interior mutability (`RwLock`/`Mutex`). Updates happen through the locks — Tauri's `manage()` is a no-op for duplicate types.\n\n| State Type | Inner Type | Purpose |\n|---|---|---|\n| `PortState` | `RwLock<Option<u16>>` | Port the embedded server listens on. `None` in remote mode. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel instance + `Instant` for uptime. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | Current URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | Whether connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Handle for local server shutdown. Filled after boot. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the kernel started.\n\n## Module Breakdown\n\n### `main.rs` — Entry Point\n\nParses CLI arguments via `clap`:\n\n```\nlibrefang-desktop [OPTIONS]\n\nOptions:\n  --server-url <URL>   Connect to a remote LibreFang server\n  --local              Start local server without connection screen\n```\n\nLoads `~/.librefang/.env` synchronously before calling `run()` — environment mutation must happen before any threads are spawned (`std::env::set_var` is UB with concurrent threads).\n\n### `server.rs` — Embedded Kernel & API Server\n\nResponsible for booting the kernel and running the axum HTTP server.\n\n#### `start_server() -> Result<ServerHandle, Box<dyn Error>>`\n\n1. Calls `LibreFangKernel::boot(None)` synchronously\n2. Wraps the kernel in `Arc`, calls `kernel.set_self_handle()`\n3. Binds a `TcpListener` to `127.0.0.1:0` on the calling thread (guarantees port is known before any window is created)\n4. Creates a `watch::channel<bool>` for shutdown signaling\n5. Spawns a named thread (`\"librefang-server\"`) that:\n   - Creates its own multi-threaded tokio runtime\n   - Calls `kernel.start_background_agents().await`\n   - Calls `kernel.spawn_approval_sweep_task()`\n   - Runs `run_embedded_server()` which builds the axum router, syncs dashboard assets, and serves with graceful shutdown\n\n#### `ServerHandle`\n\nOwns the kernel `Arc`, the shutdown sender, and the server thread `JoinHandle`. Provides:\n\n- **`shutdown(self)`** — sends the shutdown signal, joins the thread, calls `kernel.shutdown()`\n- **`Drop` impl** — sends the shutdown signal without blocking (thread exits on its own)\n\nUses an `AtomicBool` guard to prevent double-shutdown (both explicit `shutdown()` and `Drop` can fire).\n\n### `connection.rs` — Connection Screen & Mode Switching\n\nProvides the self-contained HTML/CSS/JS connection page and IPC commands for switching modes at runtime.\n\n#### Persistence\n\n`ConnectionPreference` is serialized to `~/.librefang/desktop.toml`:\n\n```toml\n[connection]\nmode = \"remote\"\nserver_url = \"http://192.168.1.100:4545\"\n```\n\n- `load_saved_preference()` — reads and parses the file\n- `save_preference()` — writes it (non-fatal on failure)\n\n#### IPC Commands\n\n**`test_connection(url: String) -> Result<serde_json::Value, String>`**\n\nValidates the URL scheme, hits `{url}/api/health` with a 10-second timeout, returns the JSON response body. Used by the connection screen's \"Test Connection\" button.\n\n**`connect_remote(url: String, remember: bool, window: WebviewWindow) -> Result<(), String>`**\n\n1. Validates URL scheme\n2. Hits `/api/health` to verify reachability\n3. Optionally saves the preference\n4. Updates all managed state (`ServerUrlState`, `RemoteMode`, clears `PortState` and `KernelState`)\n5. Navigates the WebView to the remote URL via `window.eval()`\n\n**`start_local(remember: bool, app: AppHandle, window: WebviewWindow) -> Result<(), String>`**\n\n1. Calls `server::start_server()` on a blocking thread via `tokio::task::spawn_blocking`\n2. Updates all managed state with the new server details\n3. Stores the `ServerHandle` in `ServerHandleHolder`\n4. Subscribes to the kernel event bus and spawns `forward_kernel_events()`\n5. Optionally saves the preference\n6. Navigates the WebView to `http://127.0.0.1:{port}`\n\n#### Connection Screen HTML\n\n`connection_html()` returns a complete `<!DOCTYPE html>` page with:\n- URL input field with \"Test Connection\" and \"Connect\" buttons\n- \"Start Local Server\" button below a divider\n- \"Remember this choice\" checkbox (checked by default)\n- Status message area with color-coded feedback\n\nAll interaction goes through `window.__TAURI__.core.invoke()` calls to the IPC commands above.\n\n### `commands.rs` — Tauri IPC Command Handlers\n\nExposes operations to the WebView frontend:\n\n| Command | Signature | Description |\n|---|---|---|\n| `get_port` | `() → Result<u16, String>` | Returns the embedded server port |\n| `get_status` | `() → Result<JsonValue, String>` | Returns `{ status, port, agents, uptime_secs }` |\n| `get_agent_count` | `() → Result<usize, String>` | Returns number of registered agents |\n| `import_agent_toml` | `() → Result<String, String>` | Native file picker for `.toml`, validates as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, spawns the agent |\n| `import_skill_file` | `() → Result<String, String>` | Native file picker for `.md/.toml/.py/.js/.wasm`, copies to `~/.librefang/skills/`, triggers `kernel.reload_skills()` |\n| `get_autostart` | `() → Result<bool, String>` | Check auto-start status |\n| `set_autostart` | `(enabled: bool) → Result<bool, String>` | Enable/disable auto-start |\n| `check_for_updates` | `() → Result<UpdateInfo, String>` | On-demand update check |\n| `install_update` | `() → Result<(), String>` | Download, install, restart |\n| `open_config_dir` | `() → Result<(), String>` | Open `~/.librefang/` in OS file manager |\n| `open_logs_dir` | `() → Result<(), String>` | Open `~/.librefang/logs/` in OS file manager |\n\nAll commands that access the kernel return `\"No local server running\"` if `KernelState` is `None` (remote mode).\n\n### `tray.rs` — System Tray\n\n`setup_tray(app: &tauri::App)` builds a tray icon from the embedded `32x32.png` with a context menu:\n\n- **Show Window** — focuses the main window\n- **Open in Browser** — opens `ServerUrlState` URL in the default browser\n- **Change Server...** — shuts down any local server, clears local state, navigates back to the connection screen\n- **Agents: N running** (disabled, informational)\n- **Status: Running (Xm Ys)** or **Status: Remote (url)** (disabled, informational)\n- **Launch at Login** — checkbox toggling `tauri_plugin_autostart`\n- **Check for Updates...** — checks, downloads, installs, and notifies (or notifies if already up to date)\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — calls `app.exit(0)`\n\nLeft-clicking the tray icon also shows/focuses the window.\n\nThe \"Change Server...\" action is the only way to switch from local to remote (or vice versa) at runtime. It takes the `ServerHandle` out of the holder and shuts it down on a separate thread to avoid blocking the UI.\n\n### `shortcuts.rs` — Global Keyboard Shortcuts\n\n`build_shortcut_plugin()` registers three system-wide shortcuts:\n\n| Shortcut | Action |\n|---|---|\n| `Ctrl+Shift+O` | Show and focus the LibreFang window |\n| `Ctrl+Shift+N` | Show window and emit `navigate` event with `\"agents\"` |\n| `Ctrl+Shift+C` | Show window and emit `navigate` event with `\"chat\"` |\n\nThe `navigate` event is emitted via `app.emit()` for the WebView frontend to handle. Registration failure is non-fatal — the app logs a warning and continues without shortcuts.\n\n### `updater.rs` — Automatic Updates\n\n#### `UpdateInfo`\n\n```rust\npub struct UpdateInfo {\n    pub available: bool,\n    pub version: Option<String>,\n    pub body: Option<String>,\n}\n```\n\n#### `spawn_startup_check(app_handle)`\n\nSpawns a background task that waits 10 seconds (to avoid slowing startup), then checks for updates. If available:\n1. Sends a native notification (\"Installing v{version}...\")\n2. Waits 3 seconds for the notification to be visible\n3. Calls `download_and_install_update()` — on success the app restarts (function never returns)\n\n#### `download_and_install_update(app_handle)`\n\nUses `tauri_plugin_updater`. Downloads and installs the update, then calls `app_handle.restart()` which terminates the process. Errors are returned as `String` for display to the user.\n\n### `forward_kernel_events()` — Native Notifications\n\nSubscribes to the kernel event bus and forwards only critical events as OS notifications:\n\n- **`LifecycleEvent::Crashed`** — \"Agent Crashed: Agent {id} crashed: {error}\"\n- **`SystemEvent::KernelStopping`** — \"Kernel Stopping: LibreFang kernel is shutting down\"\n- **`SystemEvent::QuotaEnforced`** — \"Quota Enforced: Agent {id} quota hit: ${spent} / ${limit}\"\n\nBroadcast lag is logged but doesn't stop the listener. Channel closure terminates the loop cleanly.\n\n## Desktop-Only Features\n\nSeveral plugins and behaviors are gated behind `#[cfg(desktop)]`:\n\n- **Single instance** — `tauri_plugin_single_instance` focuses the existing window when a second instance is launched\n- **Auto-start** — `tauri_plugin_autostart` with `--minimized` flag\n- **System tray** — full tray menu with status, controls, and quit\n- **Hide-to-tray on close** — `on_window_event` intercepts `CloseRequested` and hides the window instead\n- **Global shortcuts** — system-wide hotkeys\n- **Update checker** — `tauri_plugin_updater` with startup and manual checks\n\nOn mobile targets (`#[cfg_attr(mobile, tauri::mobile_entry_point)]`), these features are omitted and `run()` serves as the entry point.\n\n## Shutdown\n\nWhen the Tauri event loop ends:\n\n1. Tauri's managed state is dropped in arbitrary order\n2. `ServerHandle`'s `Drop` impl sends the shutdown signal to the background server thread\n3. The axum server's graceful shutdown fires, stops accepting connections, and cleans up channel bridges\n4. The kernel's `shutdown()` is called (in explicit `shutdown()`) or left for its own `Drop`\n\nThe background thread exits on its own after receiving the signal — `Drop` doesn't block on the `JoinHandle`.\n\n## Adding New IPC Commands\n\n1. Write the handler in `commands.rs` with `#[tauri::command]`\n2. Add it to the `tauri::generate_handler![]` macro in `run()`\n3. Access managed state via `tauri::State<'_, T>` parameters\n4. For commands that need the app handle or window, add `app: tauri::AppHandle` or `window: tauri::WebviewWindow` parameters\n\nState is always read through the `RwLock`/`Mutex` — never call `manage()` a second time.","extensions-system":"# Extensions System\n\n# Extensions System (`librefang-extensions`)\n\n## Overview\n\n`librefang-extensions` provides the infrastructure for discovering, installing, and managing MCP (Model Context Protocol) server integrations. It handles everything from browsing a template catalog to securely storing credentials and monitoring server health.\n\nThe crate is organized around five concerns:\n\n| Concern | Module | Purpose |\n|---|---|---|\n| Template discovery | `catalog` | Read-only catalog of MCP server templates cached at `~/.librefang/mcp/catalog/*.toml` |\n| Secret storage | `vault`, `dotenv` | AES-256-GCM encrypted vault (`vault.enc`) plus `.env` file loading |\n| Credential resolution | `credentials` | Unified resolution chain across vault, dotenv, env vars, and interactive prompts |\n| Installation | `installer` | Pure transforms from catalog templates into `[[mcp_servers]]` config entries |\n| OAuth & health | `oauth`, `health` | PKCE browser flows and background health monitoring with auto-reconnect |\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Disk\"\n        CT[\"catalog/*.toml\"]\n        CFG[\"config.toml (mcp_servers)\"]\n        ENV[\".env / secrets.env\"]\n        VE[\"vault.enc\"]\n    end\n\n    subgraph \"Extensions\"\n        MC[\"McpCatalog\"]\n        CR[\"CredentialResolver\"]\n        CV[\"CredentialVault\"]\n        HM[\"HealthMonitor\"]\n        INST[\"Installer\"]\n    end\n\n    CT -->|load| MC\n    MC -->|template lookup| INST\n    INST -->|produces| CFG\n    CR -->|1. vault| CV\n    CR -->|2. dotenv| ENV\n    CR -->|3. env var| ENV\n    CV -->|read/write| VE\n    HM -->|reports status| MC\n```\n\n## Core Types\n\nAll shared types live in the crate root (`src/lib.rs`).\n\n### `McpCatalogEntry`\n\nThe central data model. Each catalog template describes one MCP server:\n\n```rust\npub struct McpCatalogEntry {\n    pub id: String,                          // e.g. \"github\"\n    pub name: String,                        // e.g. \"GitHub\"\n    pub description: String,\n    pub category: McpCategory,               // DevTools, Productivity, Communication, etc.\n    pub transport: McpCatalogTransport,       // Stdio, Sse, or Http\n    pub required_env: Vec<McpCatalogRequiredEnv>,  // Credentials needed\n    pub oauth: Option<OAuthTemplate>,         // OAuth config (None = API key only)\n    pub health_check: HealthCheckConfig,      // Check interval & thresholds\n    // ...\n}\n```\n\nTransport templates use `McpCatalogTransport` — a subset of the kernel's `McpTransportEntry` that excludes `HttpCompat` (a power-user-only transport that never ships as a catalog template). The installer converts between the two during installation.\n\n### `McpStatus`\n\nRepresents the lifecycle state of an MCP server:\n\n- **Available** — Catalog entry exists, not yet installed\n- **Setup** — Installed but credentials are missing\n- **Ready** — Installed, credentials present, server running\n- **Error(String)** — Server failed\n- **Disabled** — User-disabled\n\n### Error Handling\n\nAll operations return `ExtensionResult<T>` via the `ExtensionError` enum, covering catalog misses, vault errors, OAuth failures, IO, and HTTP errors.\n\n---\n\n## Module Reference\n\n### `catalog` — MCP Template Catalog\n\n`McpCatalog` holds an in-memory view of all template TOML files under `~/.librefang/mcp/catalog/`. It supports two directory layouts:\n\n- **Flat**: `<id>.toml` — ID derived from filename\n- **Directory**: `<id>/MCP.toml` — ID derived from directory name\n\n```rust\nlet mut catalog = McpCatalog::new(&home_dir);\nlet count = catalog.load(&home_dir);  // Full reload — clears stale entries\n\n// Lookup\nlet entry = catalog.get(\"github\");          // Option<&McpCatalogEntry>\n\n// Browsing\nlet all = catalog.list();                   // Vec<&McpCatalogEntry>, sorted by id\nlet tools = catalog.list_by_category(&McpCategory::DevTools);\n\n// Search (matches id, name, description, tags, case-insensitive)\nlet results = catalog.search(\"slack\");\n```\n\nCatalog entries are **read-only**. The user's installed servers live in `config.toml` under `[[mcp_servers]]` with an optional `template_id` field pointing back to the catalog entry. The catalog is refreshed from the upstream registry by `librefang_runtime::registry_sync`.\n\n### `vault` — Encrypted Credential Storage\n\nAES-256-GCM encrypted storage at `~/.librefang/vault.enc`. The vault file uses a custom format with an `OFV1` magic header followed by a JSON payload containing base64-encoded salt, nonce, and ciphertext.\n\n**Key derivation chain:**\n\n1. Master key is either stored in the OS keyring (Windows Credential Manager, macOS Keychain, Linux Secret Service) or read from `LIBREFANG_VAULT_KEY` env var\n2. Master key + random salt → Argon2id → derived encryption key\n3. Derived key encrypts the JSON-serialized secrets with AES-256-GCM\n\nWhen the OS keyring is unavailable, a **file-based fallback** wraps the master key with AES-256-GCM using an Argon2id-derived key from a machine fingerprint (username + hostname). Legacy v1 XOR-obfuscated keyring files are automatically migrated to v2 on first load.\n\n```rust\nlet mut vault = CredentialVault::new(home_dir.join(\"vault.enc\"));\n\n// Initialize (generates key, stores in OS keyring)\nvault.init()?;\n\n// Or use an explicit key (testing / programmatic)\nvault.init_with_key(master_key)?;\n\n// Unlock for read/write\nvault.unlock()?;\n\n// CRUD\nvault.set(\"GITHUB_TOKEN\".to_string(), Zeroizing::new(\"ghp_...\".into()))?;\nlet token = vault.get(\"GITHUB_TOKEN\");  // Option<Zeroizing<String>>\nvault.remove(\"GITHUB_TOKEN\")?;\nlet keys = vault.list_keys();  // Vec<&str>\n```\n\nAll secret values are wrapped in `Zeroizing<String>` — memory is zeroed on drop. The `CredentialVault`'s `Drop` implementation clears all entries and the cached master key.\n\n### `dotenv` — Environment Loading\n\nLoads secrets into the process environment from multiple sources. Must be called from synchronous `main()` **before** spawning any Tokio runtime — `std::env::set_var` is undefined behavior once other threads exist in Rust 1.80+.\n\n**Priority order** (highest first — earlier sources win):\n\n1. System environment variables (already present — never overridden)\n2. Credential vault (`vault.enc`) — loaded and decrypted first\n3. `~/.librefang/.env`\n4. `~/.librefang/secrets.env`\n\n```rust\n// Call once from main() before tokio\nlibrefang_extensions::dotenv::load_dotenv();\n\n// Key management\nlibrefang_extensions::dotenv::save_env_key(\"MY_API_KEY\", \"sk-...\")?;  // Upserts into .env + process env\nlibrefang_extensions::dotenv::remove_env_key(\"MY_API_KEY\")?;\nlibrefang_extensions::dotenv::list_env_keys();\n```\n\n`.env` files are written with `0600` permissions on Unix. Values containing spaces, `#`, or `\"` are automatically double-quoted on write.\n\n### `credentials` — Credential Resolution Chain\n\n`CredentialResolver` provides a unified interface for looking up secrets across all sources:\n\n```rust\nlet vault = CredentialVault::new(home_dir.join(\"vault.enc\"));\nlet mut resolver = CredentialResolver::new(\n    Some(vault),\n    Some(&home_dir.join(\".env\")),\n).with_interactive(true);  // Enable stdin prompt as last resort\n\n// Resolve a single credential\nlet token = resolver.resolve(\"GITHUB_PERSONAL_ACCESS_TOKEN\");  // Option<Zeroizing<String>>\n\n// Bulk resolution\nlet creds = resolver.resolve_all(&[\"KEY_A\", \"KEY_B\", \"KEY_C\"]);\n\n// Check what's missing (without prompting)\nlet missing = resolver.missing_credentials(&[\"KEY_A\", \"KEY_B\"]);\n// e.g. [\"KEY_B\"]\n\n// Store a new credential\nresolver.store_in_vault(\"KEY_B\", Zeroizing::new(\"value\".into()))?;\n\n// Invalidate dotenv cache after external modification\nresolver.clear_dotenv_cache(\"STALE_KEY\");\n```\n\nResolution order: vault → dotenv → `std::env` → interactive prompt (if enabled).\n\n### `installer` — Catalog-to-Config Transform\n\nThe installer is a set of **pure functions** — no side effects. Callers (API handlers, CLI commands) decide when to persist results.\n\n`install_integration` takes a catalog, credential resolver, template ID, and any user-provided key-value pairs. It:\n\n1. Looks up the catalog template\n2. Stores provided credentials in the vault (best-effort)\n3. Checks which required env vars are still missing\n4. Converts the template into an `McpServerConfigEntry`\n5. Returns an `InstallResult` with the entry, status, and user message\n\n```rust\nlet result = install_integration(\n    &catalog,\n    &mut resolver,\n    \"github\",\n    &provided_keys,  // HashMap<String, String>\n)?;\n\n// result.id = \"github\"\n// result.server = McpServerConfigEntry { name: \"github\", template_id: Some(\"github\"), ... }\n// result.status = Ready or Setup (depending on missing credentials)\n// result.missing_credentials = vec![] or vec![\"GITHUB_PERSONAL_ACCESS_TOKEN\"]\n// result.message = human-readable status\n\n// Caller persists:\nconfig.mcp_servers.push(result.server);\nsave_config(&config)?;\n```\n\nThe `template_id` field on `McpServerConfigEntry` records which catalog entry was installed, allowing the kernel and dashboard to link back to the catalog.\n\n**Scaffolding helpers** are also provided:\n\n- `scaffold_integration(dir)` — Creates a template `mcp.toml` for a new custom MCP server\n- `scaffold_skill(dir)` — Creates `skill.toml` + `SKILL.md` for a new prompt-only skill\n\n### `oauth` — OAuth2 PKCE Flows\n\nImplements browser-based OAuth2 authorization with PKCE (Proof Key for Code Exchange) for Google, GitHub, Microsoft, and Slack. PKCE doesn't require a client secret, so public client IDs are safe to embed.\n\n`run_pkce_flow` performs the complete flow:\n\n1. Generates PKCE verifier + S256 challenge\n2. Binds a temporary localhost TCP listener on a random port\n3. Opens the browser to the authorization URL (falls back to printing the URL)\n4. Serves a one-shot callback handler via Axum with CSRF state validation\n5. Exchanges the authorization code for tokens (5-minute timeout)\n6. Returns `OAuthTokens` with `Zeroizing`-wrapped access/refresh tokens\n\n```rust\nlet oauth = OAuthTemplate {\n    provider: \"github\".into(),\n    scopes: vec![\"repo\".into(), \"read:org\".into()],\n    auth_url: \"https://github.com/login/oauth/authorize\".into(),\n    token_url: \"https://github.com/login/oauth/access_token\".into(),\n};\n\nlet tokens = run_pkce_flow(&oauth, client_id).await?;\nlet access = tokens.access_token_zeroizing();\nlet refresh = tokens.refresh_token_zeroizing();\n```\n\nClient IDs are resolved from `OAuthConfig` with defaults overridden by user-configured values.\n\n### `health` — Server Health Monitoring\n\n`HealthMonitor` tracks the health of configured MCP servers using a `DashMap<String, McpHealth>` for concurrent access from background tasks.\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig {\n    auto_reconnect: true,\n    max_reconnect_attempts: 10,\n    max_backoff_secs: 300,\n    check_interval_secs: 60,\n});\n\nmonitor.register(\"github\");\n\n// Background task reports status\nmonitor.report_ok(\"github\", 12);  // 12 tools available\nmonitor.report_error(\"slack\", \"Connection refused\".into());\n\n// Query\nlet health = monitor.get_health(\"github\");  // Option<McpHealth>\nlet all = monitor.all_health();             // Vec<McpHealth>\n\n// Reconnect logic\nif monitor.should_reconnect(\"slack\") {\n    monitor.mark_reconnecting(\"slack\");\n    let backoff = monitor.backoff_duration(attempt);  // Exponential: 5s → 10s → 20s → ... → 5min max\n    // ... attempt reconnect ...\n}\n```\n\n`McpHealth` tracks consecutive failures, reconnect attempts, last success/error timestamps, tool count, and uptime.\n\n### `http_client` — Shared HTTP Client\n\nProvides a preconfigured `reqwest::Client` with CA certificate fallback:\n\n```rust\nlet client = librefang_extensions::http_client::new_client();\n```\n\nTries native system certificates first (`rustls_native_certs`). If none are found, falls back to Mozilla's `webpki_roots` bundle. Uses `aws_lc_rs` as the TLS crypto provider.\n\n---\n\n## File Layout\n\n```\n~/.librefang/\n├── config.toml              # [[mcp_servers]] entries live here\n├── vault.enc                # AES-256-GCM encrypted credentials (OFV1 format)\n├── .env                     # User-managed environment keys\n├── secrets.env              # Additional secrets (lower priority than .env)\n└── mcp/\n    └── catalog/\n        ├── github.toml      # Flat template\n        ├── slack/\n        │   └── MCP.toml     # Directory-backed template\n        └── ...\n\n<system-local-dir>/librefang/.keyring   # File-based keyring fallback (if OS keyring unavailable)\n```\n\n## Thread Safety Notes\n\n- `HealthMonitor` uses `DashMap` — safe to call `register`, `report_ok`, `report_error`, `get_health` from multiple Tokio tasks concurrently.\n- `CredentialVault` and `CredentialResolver` are **not** `Sync` — create per-task or protect with a `Mutex`.\n- `dotenv::load_dotenv` uses a `Once` gate and must be called from single-threaded `main()` before spawning async tasks.\n- `CredentialResolver::clear_dotenv_cache` is for post-boot invalidation from a single task (e.g., after a dashboard deletes a key).","hands-multi-agent":"# Hands & Multi-Agent\n\n# Hands & Multi-Agent Module\n\n## Overview\n\nA **Hand** is a pre-built, domain-complete autonomous agent package that users activate from a marketplace. The key distinction: regular agents are conversational (you chat with them), while Hands are autonomous workers (you activate them and check in on their progress). A Hand bundles everything an agent needs — model configuration, system prompts, tool access, skill content, requirements, user-configurable settings, and dashboard metrics — into a single `HAND.toml` definition.\n\nThis module provides the type definitions for hand manifests (`HandDefinition`, `HandInstance`), the TOML parsing pipeline that supports both single-agent and multi-agent configurations, and the `HandRegistry` that manages the lifecycle of definitions and active instances at runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Disk\"\n        HT[HAND.toml]\n        SK[SKILL.md]\n        AS[SKILL-role.md]\n        AT[agents/template/agent.toml]\n        PS[hand_state.json]\n    end\n\n    subgraph \"Parsing Pipeline\"\n        PHT[parse_hand_toml_with_agents_dir]\n        PHD[parse_hand_definition]\n        PMA[parse_multi_agent_entry]\n        DM[deep_merge_toml]\n    end\n\n    subgraph \"HandRegistry\"\n        DEF[definitions: DashMap]\n        INST[instances: DashMap]\n        AIDX[agent_index: DashMap]\n        AIDX2[active_index: DashMap]\n    end\n\n    HT --> PHT\n    SK --> PHT\n    AS --> PHT\n    AT -->|base template| PMA\n    PHT --> PHD\n    PHD --> PMA\n    PMA --> DM\n    DM -->|HandDefinition| DEF\n    DEF -->|activate| INST\n    INST --> AIDX\n    INST --> AIDX2\n    INST -->|persist_state| PS\n    PS -->|load_state| INST\n```\n\n## Core Types\n\n### HandDefinition\n\nThe central data structure, parsed from `HAND.toml`. Represents everything about a hand: its identity, category, requirements, settings, agent manifests, dashboard schema, routing keywords, and optional internationalization.\n\nKey fields:\n- **`agents`**: A `BTreeMap<String, HandAgentManifest>` mapping role names to agent configurations. Single-agent hands store their agent under the key `\"main\"` with `coordinator = true`.\n- **`skill_content`** / **`agent_skill_content`**: Bundled skill instructions loaded from `SKILL.md` (shared) and `SKILL-{role}.md` (per-agent) files at load time. Not serialized in TOML — populated by the registry loader.\n- **`i18n`**: Localized strings keyed by language code (e.g. `\"zh\"`, `\"ja\"`), supporting translated names, descriptions, setting labels, and agent names.\n\nThe `coordinator()` method returns the agent that receives user messages — either the one explicitly marked `coordinator = true`, or the first agent by role name as fallback.\n\n### HandInstance\n\nA runtime record of an activated hand. Links a `HandDefinition` to its spawned agents:\n\n- **`agent_ids`**: Maps role names to `AgentId` values. Populated by the kernel after agent spawning via `set_agents()`.\n- **`coordinator_role`**: Explicitly persisted so message routing doesn't depend on inference.\n- **`config`**: User-provided setting overrides from the activation request.\n- **`status`**: One of `Active`, `Paused`, `Error(String)`, or `Inactive`.\n\nThe `coordinator_agent_id()` method resolves the routing target through `normalize_coordinator_role()`, which checks: explicit coordinator_role → single-agent fallback → \"main\" key fallback → first agent by sort order.\n\n### HandAgentManifest\n\nWraps an `AgentManifest` with multi-agent metadata:\n\n| Field | Purpose |\n|-------|---------|\n| `coordinator` | Marks the agent that receives user messages |\n| `invoke_hint` | Instruction injected into the coordinator's system prompt for dispatching to this agent |\n| `base` | Optional reference to an agent template from the `agents/` registry |\n| `manifest` | The resolved `AgentManifest` (fields from base template + hand overrides) |\n\n## TOML Formats\n\n### Single-Agent vs Multi-Agent\n\nA hand defines its agents in one of two formats:\n\n**Single-agent** — a single `[agent]` section, auto-converted to `{\"main\": ...}`:\n\n```toml\n[agent]\nname = \"clip-agent\"\ndescription = \"Video clipping agent\"\nsystem_prompt = \"You clip videos.\"\n\n[agent.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nmax_tokens = 4096\n```\n\n**Multi-agent** — an `[agents.*]` map with one section per role:\n\n```toml\n[agents.planner]\ncoordinator = true\ninvoke_hint = \"Use planner for task decomposition\"\nname = \"planner-agent\"\nsystem_prompt = \"You plan research.\"\n\n[agents.planner.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\n\n[agents.analyst]\nname = \"analyst-agent\"\nsystem_prompt = \"You analyze data.\"\n\n[agents.analyst.model]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\n```\n\n### Legacy Flat Format\n\nOlder `HAND.toml` files may place model fields (`provider`, `model`, `system_prompt`, `max_tokens`, `temperature`, `api_key_env`, `base_url`) as top-level scalars inside `[agent]` or `[agents.*]` instead of nesting them under `[agent.model]`. The parser detects this heuristically (absence of a `model` sub-table) and deserializes via `LegacyHandAgentConfig`, which converts to the standard `AgentManifest`.\n\nWhen base template resolution is active, `normalize_flat_to_nested()` restructures the base template's flat fields into a `[model]` sub-table *before* merging, preventing orphaned fields.\n\n### Base Template Resolution\n\nAgents can reference a shared template via `base = \"template-name\"`, which loads `{agents_dir}/{template-name}/agent.toml` and deep-merges the hand's inline overrides on top:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"my-writer\"        # loads agents/my-writer/agent.toml\n\n[agents.writer.model]\nsystem_prompt = \"Override: you are a blog writer.\"  # overrides base prompt\n```\n\nThe merge is recursive through `deep_merge_toml()`: tables merge recursively, scalars and arrays in the overlay replace the base. Template names are validated to prevent path traversal (no `..`, `/`, or `\\`).\n\nThis requires filesystem access, so it only works through `parse_hand_definition()` (which takes an `agents_dir` parameter), not through the serde `Deserialize` impl.\n\n### Wrapped Format\n\nSome `HAND.toml` files wrap all fields under a `[hand]` section. The parser tries the flat format first, then falls back to extracting and re-serializing the `[hand]` sub-table.\n\n## Settings System\n\nHands declare configurable settings that appear in the activation UI:\n\n```toml\n[[settings]]\nkey = \"stt_provider\"\nlabel = \"STT Provider\"\nsetting_type = \"select\"\ndefault = \"auto\"\n\n[[settings.options]]\nvalue = \"groq\"\nlabel = \"Groq Whisper\"\nprovider_env = \"GROQ_API_KEY\"   # checked for \"Ready\" badge\n\n[[settings.options]]\nvalue = \"local\"\nlabel = \"Local Whisper\"\nbinary = \"whisper\"              # checked on PATH for \"Ready\" badge\n```\n\nThree setting types are supported:\n\n| Type | Behavior |\n|------|----------|\n| `Select` | User picks one option. The matched option's `provider_env` is collected into the resolved env vars list. |\n| `Toggle` | Boolean switch (`\"true\"`/`\"false\"`). Displays as \"Enabled\"/\"Disabled\". |\n| `Text` | Free-form input. If the setting declares an `env_var`, it's collected when non-empty. |\n\n### resolve_settings()\n\nTakes the hand's settings schema and a user config map, produces:\n\n- **`prompt_block`**: A Markdown summary (`## User Configuration\\n- Key: Value`) appended to the system prompt.\n- **`env_vars`**: A list of environment variable names that should be available to the agent's subprocess.\n\nUnset values fall back to `setting.default`. Only the selected option's `provider_env` is collected (not all options').\n\n## Requirements Checking\n\nHands declare prerequisites that gate activation:\n\n```toml\n[[requires]]\nkey = \"ffmpeg\"\nlabel = \"FFmpeg must be installed\"\nrequirement_type = \"binary\"\ncheck_value = \"ffmpeg\"\n\n[requires.install]\nmacos = \"brew install ffmpeg\"\nlinux_apt = \"sudo apt install ffmpeg\"\nestimated_time = \"2-5 min\"\n```\n\nFour requirement types:\n\n| Type | Check performed |\n|------|----------------|\n| `Binary` | Binary exists on PATH and is executable. Special handling for `python3` (runs `--version` and checks output for \"Python 3\") and `chromium` (tries multiple binary names and `CHROME_PATH` env). |\n| `EnvVar` / `ApiKey` | Environment variable is set and non-empty. |\n| `AnyEnvVar` | Comma-separated list in `check_value`; any one being set passes. |\n\nOptional requirements (`optional = true`) do not block activation. When an active hand has unmet optional requirements, `readiness()` reports it as `degraded`.\n\n## HandRegistry\n\nThe registry is the runtime manager for all hand definitions and instances. It is `Send + Sync`, using `DashMap` for concurrent access and `Mutex` for serializing activation/deactivation sequences.\n\n### Data Structures\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `definitions` | `DashMap<String, HandDefinition>` | All known hand definitions, keyed by hand id |\n| `instances` | `DashMap<Uuid, HandInstance>` | Active/paused instances, keyed by instance UUID |\n| `agent_index` | `DashMap<String, Uuid>` | Reverse lookup: agent ID string → instance UUID |\n| `active_index` | `DashMap<String, Uuid>` | Reverse lookup: hand id → active instance UUID |\n| `activate_lock` | `Mutex<()>` | Serializes check-then-insert in `activate()` |\n| `persist_lock` | `Mutex<()>` | Serializes writes to `hand_state.json` |\n\n### Key Operations\n\n**Loading definitions from disk** — `reload_from_disk(home_dir)`:\nScans two directories:\n1. `{home_dir}/registry/hands/` — read-only registry (from synced tarball)\n2. `{home_dir}/workspaces/` — user-installed hands (survives restarts)\n\nRegistry entries take precedence on id collisions. Each subdirectory containing a `HAND.toml` is parsed. Per-agent skill files (`SKILL-{role}.md`) are scanned alongside the shared `SKILL.md`.\n\n**Activation** — `activate(hand_id, config)`:\nValidates the definition exists, checks no instance is already active (single-instance mode), creates a `HandInstance`, and inserts it plus reverse index entries. Agent spawning is performed by the kernel after this call succeeds; the registry is updated via `set_agents()`.\n\n**Deactivation** — `deactivate(instance_id)`:\nRemoves the instance and cleans up both reverse indexes. If another active instance of the same hand exists (multi-instance edge case), it takes over the `active_index` slot.\n\n**Uninstallation** — `uninstall_hand(home_dir, hand_id)`:\nRefuses if: definition not found (`NotFound`), definition is built-in / from registry (`BuiltinHand`), or a live instance exists (`AlreadyActive`). Otherwise removes the in-memory definition and deletes `{home_dir}/workspaces/{id}/` from disk.\n\n### State Persistence\n\n`persist_state()` writes all non-Inactive instances to `hand_state.json` (version 4 format). On daemon restart, `load_state()` reads this file and returns `HandStateEntry` structs containing the preserved instance UUIDs, agent IDs, configs, coordinator roles, and timestamps. The kernel uses these to re-spawn agents with deterministic IDs.\n\nLegacy formats (v1 bare array, v2 single agent_id, v3 typed array) are handled through fallback parsing paths.\n\n## Error Handling\n\nAll operations return `HandResult<T>` which is `Result<T, HandError>`. Error variants:\n\n| Variant | When |\n|---------|------|\n| `NotFound(id)` | Definition or instance not found |\n| `AlreadyActive(id)` | Attempt to activate an already-active hand |\n| `AlreadyRegistered(id)` | Duplicate definition registration |\n| `BuiltinHand(id)` | Attempt to uninstall a registry hand |\n| `InstanceNotFound(uuid)` | Instance UUID not in registry |\n| `ActivationFailed(msg)` | Generic activation failure |\n| `TomlParse(msg)` | HAND.toml parse error |\n| `Io(err)` | Filesystem I/O error |\n| `Config(msg)` | Configuration error |\n\n## Default Provider Sentinel\n\nThe default values for `provider` and `model` in hand configurations are the string `\"default\"`, not a concrete provider name. This is a sentinel that the kernel resolves to the user's configured `default_model.provider` and `default_model.model` at agent-build time. This design ensures that hands omitting these fields automatically follow the user's global default rather than being pinned to whatever the hand author specified.\n\n## Internationalization\n\nHands support optional `[i18n.{lang}]` sections for localized strings:\n\n```toml\n[i18n.zh]\nname = \"线索生成 Hand\"\ndescription = \"自主线索生成\"\n\n[i18n.zh.agents.main]\nname = \"主协调器\"\n\n[i18n.zh.settings.target_industry]\nlabel = \"目标行业\"\n```\n\nAll fields within `HandI18n` are optional — missing translations fall back to English defaults. The `check_settings_availability()` method accepts a `lang` parameter and returns translated labels/descriptions when available.\n\n## Integration Points\n\nThe kernel consumes this module through several paths:\n\n- **Activation**: Kernel calls `activate()`, spawns agents per the `HandDefinition.agents` manifests, then calls `set_agents()` with the resulting agent IDs.\n- **Message routing**: Incoming messages are routed to the coordinator agent via `HandInstance::coordinator_agent_id()`, resolved through `normalize_coordinator_role()`.\n- **Agent lookup**: The kernel uses `find_by_agent()` to map an agent ID back to its hand instance (e.g., for triggering cron jobs or handling tool results).\n- **Requirement checking**: The HTTP layer calls `check_requirements()` and `readiness()` to populate API responses about hand availability.\n- **State recovery**: On startup, the kernel calls `load_state()` to discover previously-active hands that need re-spawning.\n- **Router candidates**: The kernel router loads hand definitions via `parse_hand_toml()` to build routing keyword indexes from `HandRouting::aliases` and `weak_aliases`.","http-infrastructure":"# HTTP Infrastructure\n\n# HTTP Infrastructure (`librefang-http`)\n\nCentralized HTTP client construction with proxy support and resilient TLS configuration. Every outbound HTTP connection in the application should flow through this module so that proxy settings, CA trust anchors, timeouts, and user-agent headers are applied uniformly.\n\n## Why This Module Exists\n\nTwo problems arise when using `reqwest` with its defaults:\n\n1. **Missing system CA certificates.** On musl builds (Termux/Android), minimal Docker images, or corporate Linux with partial CA bundles, `reqwest`'s default TLS initialization panics because there are no system roots to trust. This module seeds the trust store with bundled Mozilla CA roots (`webpki-roots`) first, then supplements with whatever system certs exist.\n\n2. **Scattered proxy configuration.** Without a central builder, each crate would need to independently read proxy settings from config or environment variables, leading to inconsistencies. This module owns proxy configuration globally and bakes it into every client it produces.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[init_proxy] -->|writes env vars once| B[GLOBAL_PROXY RwLock]\n    A -->|stores ProxyConfig| B\n    C[proxied_client_builder] --> D[active_proxy]\n    D --> B\n    C --> E[build_http_client]\n    E --> F[tls_config]\n    F --> G[OnceLock: rustls::ClientConfig]\n    G --> H[webpki-roots + system certs]\n    E --> I[reqwest::ClientBuilder]\n    C --> I\n    J[proxied_client] --> C\n    K[proxied_client_with_override] --> F\n```\n\n## Initialization Sequence\n\nAt daemon startup, call `init_proxy` once with the `[proxy]` section from `config.toml`. This must happen **before** the Tokio runtime spawns worker threads.\n\n```rust\nlet proxy_config: ProxyConfig = config.proxy;\nlibrefang_http::init_proxy(proxy_config);\n```\n\n`init_proxy` does two things:\n\n1. **Exports environment variables** (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY` and their lowercase variants) during the initial call only — when `GLOBAL_PROXY` is still `None`. This ensures that crates building their own `reqwest::Client` without using this module still pick up proxy settings via reqwest's built-in env-var detection.\n\n2. **Stores the `ProxyConfig`** in a global `RwLock<Option<ProxyConfig>>` for subsequent reads by `proxied_client_builder`. This value can be updated on hot-reload without touching environment variables (since `std::env::set_var` is unsound in a multi-threaded context).\n\n### Thread Safety Constraint\n\nEnvironment variables are set only during the initial bootstrap call, which occurs while the process is still single-threaded. Hot-reload calls update `GLOBAL_PROXY` only, avoiding the race condition inherent in `std::env::set_var` from a multi-threaded Tokio runtime.\n\n## TLS Configuration\n\nThe TLS stack uses `rustls` with the `aws_lc_rs` cryptographic provider. The root certificate store is assembled in two layers:\n\n| Layer | Source | Purpose |\n|-------|--------|---------|\n| 1 | `webpki_roots::TLS_SERVER_ROOTS` (bundled Mozilla CA roots) | Always present — guarantees common public CAs are trusted |\n| 2 | `rustls_native_certs::load_native_certs()` (system cert store) | Adds org-internal/self-signed CAs and keeps trust anchors current |\n\nLayer 2 is best-effort. If no system certificates are found, a debug log is emitted and the bundled roots are used exclusively.\n\nThe resulting `rustls::ClientConfig` is computed once, cached in a `OnceLock`, and cloned for every client. This avoids repeated certificate parsing on each request.\n\nAccess it directly via `tls_config()` if you need a preconfigured TLS config for a custom client outside the standard builders.\n\n## Public API\n\n### Startup / Configuration\n\n| Function | Description |\n|----------|-------------|\n| `init_proxy(cfg: ProxyConfig)` | Set the global proxy configuration. Call once at startup; may be called again for hot-reload. |\n| `tls_config() -> rustls::ClientConfig` | Return the cached TLS config (bundled + system CA roots). |\n\n### Client Builders\n\n| Function | Returns | Description |\n|----------|---------|-------------|\n| `proxied_client_builder()` | `reqwest::ClientBuilder` | Builder with global proxy settings and resilient TLS applied. Caller can add `.timeout()`, custom headers, etc., then call `.build()`. |\n| `proxied_client()` | `reqwest::Client` | Ready-to-use client. Panics if construction fails (it shouldn't). |\n| `proxied_client_with_override(proxy_url)` | `reqwest::Client` | Routes all traffic through the given proxy URL, ignoring the global config. Falls back to `proxied_client()` if the URL is invalid. Used for per-provider proxy overrides. |\n| `build_http_client(proxy: &ProxyConfig)` | `reqwest::ClientBuilder` | Lower-level builder that accepts an explicit `ProxyConfig` instead of reading global state. |\n\n### Backward-Compatible Aliases\n\n| Alias | Delegates to |\n|-------|-------------|\n| `client_builder()` | `proxied_client_builder()` |\n| `new_client()` | `proxied_client()` |\n\nPrefer the `proxied_*` names in new code.\n\n## Proxy Resolution Order\n\nWhen a client is built via `proxied_client_builder()`, proxy settings are resolved as follows:\n\n1. **Explicit `ProxyConfig` fields** (from `config.toml`'s `[proxy]` section) are applied directly to the builder as `Proxy::http()` and `Proxy::https()` entries with the configured `NoProxy` filter.\n2. **When a `ProxyConfig` field is `None`**, no proxy is explicitly set on the builder, so reqwest falls back to reading `HTTP_PROXY` / `HTTPS_PROXY` / `NO_PROXY` environment variables — which `init_proxy` already populated during bootstrap.\n3. **URL validation** rejects proxy URLs that don't use `http://`, `https://`, `socks5://`, or `socks5h://` schemes, logging a warning with the redacted URL.\n\nThis avoids double-applying proxy settings while ensuring consistency across all consumers.\n\n## Default Timeouts\n\n`build_http_client` applies per-request defaults:\n\n- **Connect timeout:** 30 seconds — caps TCP/TLS handshake, generous for slow international links to LLM providers.\n- **Read timeout:** 300 seconds — per-read inactivity timeout, **not** total request time. Streaming LLM responses keep this alive as long as tokens arrive; a true upstream stall triggers it.\n\nCallers can override both by calling `.timeout()` or `.connect_timeout()` on the returned `ClientBuilder`.\n\n## Usage Across the Codebase\n\nThis module is the sole HTTP client factory for the application. Callers span nearly every subsystem:\n\n- **LLM provider communication:** `probe_model`, `probe_provider`, `probe_api_key` in the runtime\n- **OAuth flows:** `start_device_auth_flow`, `poll_device_auth_flow`, `exchange_code_for_tokens_with_redirect_uri`, `refresh_access_token`\n- **MCP servers:** `connect_http_compat`, `connect_sse`\n- **Media processing:** `generate_image`, `whisper_transcribe`, `gemini_transcribe`, `elevenlabs_transcribe`\n- **TTS:** `synthesize_openai`, `synthesize_elevenlabs`\n- **Web tools:** `tool_web_fetch_legacy`, `tool_web_search_legacy`, `tool_location_get`, `host_net_fetch`\n- **Device pairing:** `notify_devices`\n- **CLI:** `client_builder` in `librefang-cli`\n\nMost consumers call `proxied_client()` for a ready-to-use client. Consumers that need to customize timeouts, headers, or other settings use `proxied_client_builder()` instead.\n\n## ProxyConfig Fields\n\nThe `ProxyConfig` struct (from `librefang-types`) contains:\n\n```rust\nstruct ProxyConfig {\n    http_proxy: Option<String>,   // e.g. \"http://proxy.corp:8080\"\n    https_proxy: Option<String>,  // e.g. \"socks5h://proxy.corp:1080\"\n    no_proxy: Option<String>,     // e.g. \"localhost,127.0.0.1,.corp.internal\"\n}\n```\n\nAll fields are optional. When every field is `None` (the default), no proxy is configured and connections are made directly. URLs are validated at initialization time; invalid schemes produce a warning and are ignored.","kernel-core-librefang-kernel-handle-src":"# Kernel Core — librefang-kernel-handle-src\n\n# Kernel Handle (`librefang-kernel-handle`)\n\n## Purpose\n\nThis crate defines the `KernelHandle` trait — the callback interface that allows agents to interact with the kernel and with each other at runtime. It exists specifically to **break a circular dependency**: `librefang-kernel` depends on `librefang-runtime` to drive agent loops, but those agent loops need to call back into the kernel for operations like spawning agents, sending messages, managing memory, and posting tasks.\n\nThe solution: the kernel implements `KernelHandle` and injects it into the agent loop. The runtime never imports the kernel directly — it only depends on this trait crate.\n\n## Architecture\n\n```mermaid\ngraph LR\n    KH[\"librefang-kernel-handle<br/>(KernelHandle trait)\"]\n    K[\"librefang-kernel<br/>(implements KernelHandle)\"]\n    RT[\"librefang-runtime<br/>(consumes KernelHandle)\"]\n\n    K -->|depends on| RT\n    K -->|depends on| KH\n    RT -->|depends on| KH\n    K -.->|implements trait| KH\n    RT -.->|calls through trait| KH\n```\n\nThe kernel creates a concrete implementor of `KernelHandle`, passes it into `run_agent_loop_streaming` / `run_agent_loop`, and the runtime's tool runner and agent loop invoke trait methods to perform inter-agent operations.\n\n## `AgentInfo`\n\nA simple data struct returned by discovery methods (`list_agents`, `find_agents`):\n\n| Field | Type | Description |\n|---|---|---|\n| `id` | `String` | Agent UUID |\n| `name` | `String` | Human-readable name |\n| `state` | `String` | Current lifecycle state |\n| `model_provider` | `String` | LLM provider (e.g. `\"openai\"`) |\n| `model_name` | `String` | Model identifier |\n| `description` | `String` | Agent purpose description |\n| `tags` | `Vec<String>` | Classification tags |\n| `tools` | `Vec<String>` | Tool names available to the agent |\n\n## `KernelHandle` Trait\n\nThe trait is `async_trait`-based, requiring `Send + Sync`. Methods fall into several functional groups. Many have **default implementations** that return errors or no-ops — this allows partial implementations in tests and stubs while the full kernel overrides everything.\n\n### Agent Lifecycle\n\n| Method | Sync/Async | Default | Description |\n|---|---|---|---|\n| `spawn_agent(manifest_toml, parent_id)` | async | — | Spawn a new agent from a TOML manifest. `parent_id` tracks lineage. Returns `(agent_id, agent_name)`. |\n| `spawn_agent_checked(manifest_toml, parent_id, parent_caps)` | async | delegates to `spawn_agent` | Like `spawn_agent` but the kernel **must verify** that every capability in the child manifest is covered by `parent_caps`. |\n| `list_agents()` | sync | — | Return all running agents. |\n| `find_agents(query)` | sync | — | Case-insensitive search on name substring, tag, or tool name. |\n| `kill_agent(agent_id)` | sync | — | Terminate an agent by ID. |\n| `send_to_agent(agent_id, message)` | async | — | Send a message to another agent and return its response. |\n| `touch_heartbeat(agent_id)` | sync | no-op | Refresh `last_active` to prevent heartbeat false-positives during long LLM calls. Called by the agent loop at each iteration. |\n| `fire_agent_step(agent_id, step)` | sync | no-op | Fire an `agent:step` external hook event at the start of each loop iteration. |\n\n### Inter-Agent Messaging\n\n`send_to_agent` is the core primitive. The runtime's `tool_agent_send` reads `max_agent_call_depth()` to enforce a recursion guard before invoking it.\n\n### Shared Memory\n\nAll memory methods accept an optional `peer_id` for namespace isolation — when provided, keys are scoped to that peer so different users of the same agent get independent memory.\n\n| Method | Description |\n|---|---|\n| `memory_store(key, value, peer_id)` | Store a JSON value. |\n| `memory_recall(key, peer_id)` | Retrieve a value, returns `None` if missing. |\n| `memory_list(peer_id)` | List all keys in the namespace. |\n\n### Task Queue\n\nA cooperative task board for agents:\n\n| Method | Async | Description |\n|---|---|---|\n| `task_post(title, description, assigned_to, created_by)` | yes | Create a task, returns task ID. |\n| `task_claim(agent_id)` | yes | Claim the next available task. |\n| `task_complete(agent_id, task_id, result)` | yes | Mark a task done. |\n| `task_list(status)` | yes | List tasks, optionally filtered by status. |\n| `task_delete(task_id)` | yes | Delete a task. |\n| `task_retry(task_id)` | yes | Reset a task to pending for retry. |\n\n### Knowledge Graph\n\n| Method | Description |\n|---|---|\n| `knowledge_add_entity(entity)` | Add an `Entity` node. |\n| `knowledge_add_relation(relation)` | Add a `Relation` edge. |\n| `knowledge_query(pattern)` | Query with a `GraphPattern`, returns `GraphMatch` results. |\n\nUses types from `librefang_types::memory`.\n\n### Event Publishing\n\n- **`publish_event(event_type, payload)`** — Publish a custom event that can trigger proactive agents.\n\n### Approval System\n\nThe approval flow is a two-phase design: agents submit tool executions for approval, and external users/admins resolve them.\n\n| Method | Default | Description |\n|---|---|---|\n| `requires_approval(tool_name)` | `false` | Simple policy check. |\n| `requires_approval_with_context(tool_name, sender_id, channel)` | delegates to `requires_approval` | Context-aware policy check. |\n| `is_tool_denied_with_context(tool_name, sender_id, channel)` | `false` | Hard-deny check before approval flow. |\n| `request_approval(agent_id, tool_name, action_summary, session_id)` | returns `Approved` | **Blocking** approval request. |\n| `submit_tool_approval(agent_id, tool_name, action_summary, deferred, session_id)` | error | **Non-blocking** submit, returns `ToolApprovalSubmission` immediately. |\n| `resolve_tool_approval(request_id, decision, decided_by, totp_verified, user_id)` | error | Resolve a pending request, returns the `DeferredToolExecution` payload if approved. |\n| `get_approval_status(request_id)` | `None` | Poll current decision state. |\n\nThe API routes (`approve_request`, `reject_request`, `modify_request` in `src/routes/system.rs`) call `resolve_tool_approval` to finalize decisions.\n\n### Hands System\n\nHands are specialized autonomous agents managed through this interface:\n\n| Method | Description |\n|---|---|\n| `hand_list()` | List available Hands and activation status. |\n| `hand_install(toml_content, skill_content)` | Install a new Hand. |\n| `hand_activate(hand_id, config)` | Spawn a Hand's agent. |\n| `hand_status(hand_id)` | Get dashboard metrics. |\n| `hand_deactivate(instance_id)` | Stop a running Hand. |\n\nAll default to errors — only kernels with the Hands subsystem override these.\n\n### Cron / Scheduling\n\n| Method | Description |\n|---|---|\n| `cron_create(agent_id, job_json)` | Schedule a recurring job. |\n| `cron_list(agent_id)` | List jobs for an agent. |\n| `cron_cancel(job_id)` | Cancel a job. |\n\nThese are used by both the tool runner (`tool_schedule_create`, `tool_cron_list`, etc.) and the workflow routes.\n\n### Channel Messaging\n\nAgents can send messages, media, files, and polls through channel adapters (Telegram, Email, etc.):\n\n- **`send_channel_message(channel, recipient, message, thread_id, account_id)`** — Text messages.\n- **`send_channel_media(channel, recipient, media_type, media_url, caption, filename, thread_id, account_id)`** — Images or files by URL.\n- **`send_channel_file_data(channel, recipient, data, filename, mime_type, thread_id, account_id)`** — Raw bytes (used when `file_path` is provided to the `channel_send` tool).\n- **`send_channel_poll(channel, recipient, question, options, is_quiz, correct_option_id, explanation, account_id)`** — Interactive polls/quizzes.\n\nAll accept optional `thread_id` for reply threading and `account_id` for routing through a specific bot configuration.\n\n### A2A (Agent-to-Agent External)\n\n| Method | Default |\n|---|---|\n| `list_a2a_agents()` | empty vec |\n| `get_a2a_agent_url(name)` | `None` |\n\nUsed by `tool_a2a_send` in the runtime to discover and message external agents.\n\n### Prompt Versioning & Experiments\n\nA suite of methods for tracking prompt changes and running A/B experiments:\n\n**Prompt versions:** `get_prompt_version`, `list_prompt_versions`, `create_prompt_version`, `delete_prompt_version`, `set_active_prompt_version`, `auto_track_prompt_version`.\n\n**Experiments:** `get_running_experiment`, `create_experiment`, `get_experiment`, `list_experiments`, `update_experiment_status`, `get_experiment_metrics`, `record_experiment_request`.\n\nThe agent loop calls `auto_track_prompt_version` during `build_prompt_setup` to detect system prompt changes, and `get_prompt_version` to load versioned prompts. Most experiment defaults are no-ops or empty results, with `create_*` / `delete_*` methods defaulting to errors.\n\n### Goals\n\n| Method | Description |\n|---|---|\n| `goal_list_active(agent_id)` | List pending/in-progress goals, optionally filtered by agent. |\n| `goal_update(goal_id, status, progress)` | Update a goal's status and/or progress percentage. |\n\n### Workflows\n\n- **`run_workflow(workflow_id, input)`** — Execute a workflow by UUID or name. Returns `(run_id, output)`. Used by `tool_workflow_run` and workflow integration tests.\n\n### Forked Agent Execution\n\n- **`run_forked_agent_oneshot(agent_id, prompt, allowed_tools)`** — A primitive for \"structured-output via forked call.\" The fork shares the parent turn's `(system + tools + messages)` prefix for prompt cache alignment with Anthropic. Key properties:\n  - Fork messages do **not** persist into the agent's canonical session.\n  - The turn-end hook fires with `is_fork: true` to prevent recursive auto-dream.\n  - `allowed_tools = Some(vec![])` forces a single-turn text response (no tool calls).\n  - Defaults to error — only kernels implementing full streaming override this.\n\n### Configuration Accessors\n\n| Method | Default | Description |\n|---|---|---|\n| `tool_timeout_secs()` | `120` | Maximum seconds a tool execution may run. Consumed by `execute_single_tool_call`. |\n| `max_agent_call_depth()` | `5` | Maximum inter-agent call nesting. Checked by `tool_agent_send` before `send_to_agent`. |\n\n## Design Patterns\n\n### Default Method Strategy\n\nMost methods have conservative defaults: sync methods return empty data or `false`, async methods return descriptive errors like `\"Cron scheduler not available\"`, and configuration accessors return safe constants. This serves two purposes:\n\n1. **Test stubs** can implement only the methods they need.\n2. **Feature-gated kernels** can omit entire subsystems without compilation errors.\n\nThe kernel implementation overrides every method it actually supports.\n\n### Internal Delegation\n\nTwo methods delegate internally within the trait:\n\n- `spawn_agent_checked` → `spawn_agent` (no-op enforcement by default; the real kernel overrides with capability checking)\n- `requires_approval_with_context` → `requires_approval` (adds sender/channel context by default)\n\n### Dependency Direction\n\n`librefang-kernel-handle` has **no outgoing crate dependencies** beyond `async_trait`, `serde_json`, `uuid`, and `librefang_types`. It never imports the kernel or runtime. This keeps the interface crate lightweight and ensures the dependency graph stays acyclic.\n\n## Adding New Methods\n\nWhen adding a new kernel capability that agents need to access:\n\n1. Add the method to the `KernelHandle` trait with a conservative default implementation.\n2. Override it in the kernel's concrete implementation.\n3. Add a corresponding tool in `librefang-runtime/src/tool_runner.rs` that calls through the trait.\n4. Ensure the method signature uses borrowed arguments (`&str`, `Option<&str>`) where possible to avoid unnecessary allocations on the hot path.","kernel-core-librefang-kernel-metering-src":"# Kernel Core — librefang-kernel-metering-src\n\n# Kernel Core — librefang-kernel-metering-src\n\n## Purpose\n\nThe metering engine tracks LLM usage costs in real time and enforces spending quotas at three levels: **per-agent**, **per-provider**, and **global**. Every LLM call flows through this module before and after execution — it gates requests that would exceed budget limits and persists a `UsageRecord` for analytics and billing.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LLM Dispatcher] -->|pre-call| B[MeteringEngine]\n    B -->|check quota + budget| C[UsageStore SQLite]\n    B -->|post-call: record usage| C\n    B -->|price lookup| D[ModelCatalog]\n    C -->|query_hourly / daily / monthly| E[UsageAggregates]\n    B -->|enforce| F[Agent Quota]\n    B -->|enforce| G[Global Budget]\n    B -->|enforce| H[Provider Budget]\n```\n\n`MeteringEngine` is a thin coordination layer. It holds an `Arc<UsageStore>` (the SQLite persistence layer from `librefang-memory`) and delegates all SQL to it. Cost estimation optionally consults `ModelCatalog` (from `librefang-runtime`) for provider-specific pricing, falling back to hardcoded defaults when the catalog is unavailable.\n\n## `MeteringEngine`\n\nThe sole public struct. Construct it with a shared `UsageStore`:\n\n```rust\nlet store = Arc::new(UsageStore::new(substrate.usage_conn()));\nlet engine = MeteringEngine::new(store);\n```\n\nAll methods are `&self` — the engine is freely shareable across threads via `Arc`.\n\n### Recording Usage\n\n| Method | Scope |\n|--------|-------|\n| `record(&self, record: &UsageRecord)` | Persist a single usage event. No quota check. |\n| `check_quota_and_record(&self, record, quota)` | Atomic: check per-agent quota, then record. Single SQLite transaction. |\n| `check_global_budget_and_record(&self, record, budget)` | Atomic: check global budget, then record. Single SQLite transaction. |\n| `check_all_and_record(&self, record, quota, budget)` | Atomic: check per-agent quota **and** global budget **and** per-provider budget, then record. Preferred method. |\n\nThe atomic variants close the TOCTOU race between checking and recording — concurrent requests cannot both pass the quota check before either writes its usage. On failure the record is **not** inserted.\n\n### Quota Enforcement\n\nThree independent enforcement axes, all following the same pattern:\n\n1. **Per-agent** (`check_quota`) — checks hourly, daily, and monthly cost against `ResourceQuota` fields (`max_cost_per_hour_usd`, `max_cost_per_day_usd`, `max_cost_per_month_usd`), scoped to a single `AgentId`.\n\n2. **Global** (`check_global_budget`) — checks the same three time windows across *all* agents, using `BudgetConfig` fields (`max_hourly_usd`, `max_daily_usd`, `max_monthly_usd`).\n\n3. **Per-provider** (`check_provider_budget`) — checks cost per time window *and* an hourly token cap (`max_tokens_per_hour`), scoped to a provider string (e.g. `\"moonshot\"`, `\"litellm\"`). Provider budgets are defined in `BudgetConfig.providers` as a `HashMap<String, ProviderBudget>`.\n\n**Zero limits mean unlimited.** Any limit set to `0.0` (cost) or `0` (tokens) is skipped entirely. This is intentional — it allows partial enforcement (e.g., cap daily spend but leave hourly unlimited).\n\nOn violation, all methods return `LibreFangError::QuotaExceeded` with a message identifying the axis, agent/provider, current spend, and limit.\n\n### Querying Usage\n\n| Method | Returns |\n|--------|---------|\n| `get_summary(agent_id: Option<AgentId>)` | `UsageSummary` — aggregate call count, token totals, cost. Pass `None` for global. |\n| `get_by_model()` | `Vec<ModelUsage>` — usage grouped by model name. |\n| `budget_status(budget: &BudgetConfig)` | `BudgetStatus` — current spend vs. limits for all windows, with percentage utilization. |\n\n### Cleanup\n\n`cleanup(&self, days: u32)` deletes records older than `days` days. Returns the number of rows removed.\n\n## Cost Estimation\n\nTwo static methods estimate cost without touching the database:\n\n### `MeteringEngine::estimate_cost` (fallback)\n\nUses hardcoded default rates of **$1.00/M input** and **$3.00/M output**. Takes token counts including cache breakdown. Use this when no catalog is available (unit tests, offline scenarios).\n\n### `MeteringEngine::estimate_cost_with_catalog` (preferred)\n\nLooks up the model in `ModelCatalog` for exact per-provider pricing. Falls back to defaults if the model is unknown.\n\nBoth methods delegate to the private `estimate_cost_from_rates`, which applies the token pricing formula:\n\n```\nregular_input      = total_input − cache_read − cache_creation\nregular_input_cost = regular_input      × input_rate  / 1M\ncache_read_cost    = cache_read_tokens  × input_rate  × 0.10 / 1M\ncache_creation_cost= cache_creation     × input_rate  × 1.25 / 1M\noutput_cost        = output_tokens      × output_rate / 1M\n\ntotal = regular_input_cost + cache_read_cost + cache_creation_cost + output_cost\n```\n\nCache-read tokens are discounted to **10%** of the input rate. Cache-creation tokens carry a **25% surcharge** (125% of input rate). This mirrors Anthropic's prompt caching pricing and is applied universally across all providers.\n\n### Special Cases\n\n- **ChatGPT session-auth models** (`provider == \"chatgpt\"` with zero catalog prices): `should_use_legacy_budget_estimate` detects these and applies the default $1/$3 rates so budgets still function. These models don't expose billable pricing through the API.\n- **Local-tier models** (zero catalog prices, non-ChatGPT provider): cost correctly computes as $0.\n- **Subscription-based providers** (e.g. `alibaba-coding-plan`): registered with zero cost-per-token. Cost tracking shows $0; users should monitor via the provider console.\n\n## `BudgetStatus`\n\nA serializable snapshot returned by `budget_status`:\n\n| Field | Description |\n|-------|-------------|\n| `hourly_spend` / `hourly_limit` / `hourly_pct` | Current hour spend, limit, and ratio |\n| `daily_spend` / `daily_limit` / `daily_pct` | Current day spend, limit, and ratio |\n| `monthly_spend` / `monthly_limit` / `monthly_pct` | Current month spend, limit, and ratio |\n| `alert_threshold` | Configured threshold for budget alerts |\n| `default_max_llm_tokens_per_hour` | Global default token cap per agent per hour |\n\nUse this for dashboard rendering and alerting. Percentage fields are `0.0` when the corresponding limit is zero (unlimited).\n\n## Dependencies\n\n| Crate | Role |\n|-------|------|\n| `librefang-memory` | `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage`, `MemorySubstrate` — SQLite persistence and aggregation queries |\n| `librefang-types` | `AgentId`, `ResourceQuota`, `LibreFangError`, `BudgetConfig`, `ProviderBudget`, `ModelCatalogEntry` — shared domain types |\n| `librefang-runtime` | `ModelCatalog` — runtime pricing data loaded from the model registry |\n\n## Integration Pattern\n\nThe typical call flow from an LLM dispatcher:\n\n```rust\n// 1. Pre-dispatch: estimate cost (optional, for preview/logging)\nlet estimated = MeteringEngine::estimate_cost_with_catalog(\n    &catalog, model, input_tokens, output_tokens, cache_read, cache_creation,\n);\n\n// 2. Post-response: atomically check all budgets and record\nlet record = UsageRecord {\n    agent_id,\n    provider: provider_name.to_string(),\n    model: model.to_string(),\n    input_tokens,\n    output_tokens,\n    cost_usd: estimated,\n    tool_calls,\n    latency_ms,\n};\n\nengine.check_all_and_record(&record, &agent_quota, &global_budget)?;\n```\n\nIf `check_all_and_record` returns `QuotaExceeded`, the dispatcher should abort the agent's next iteration or fall back to a cheaper model.","kernel-core-librefang-kernel-router-src":"# Kernel Core — librefang-kernel-router-src\n\n# librefang-kernel-router\n\nMessage-to-specialist routing engine. Given a user message, this module determines which agent template or hand is best suited to handle it, using a layered scoring system that blends keyword matching with optional embedding-based semantic similarity.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[\"User message\"] --> AUTO_TPL[\"auto_select_template()\"]\n    MSG --> AUTO_HAND[\"auto_select_hand()\"]\n\n    AUTO_TPL
