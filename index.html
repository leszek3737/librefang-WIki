producing a truncated key that silently weakens encryption.\n\n- **Rejects** a base64-encoded 24-byte key with an error containing `\"Invalid key length\"`.\n- **Accepts** a base64-encoded 32-byte key and confirms the decoded bytes match.\n\n### `vault_roundtrip_encrypt_then_decrypt_with_same_key`\n\nThe core lifecycle test, executed in two phases to simulate process restart:\n\n```\nPhase 1                          Phase 2\n┌────────────────────┐           ┌────────────────────┐\n│ CredentialVault    │  drop →   │ CredentialVault    │\n│   init_with_key(K) │           │   unlock_with_key(K)│\n│   set(\"OPENAI…\")   │           │   get(\"OPENAI…\")    │\n│   set(\"ANTHROPIC…\")│           │   get(\"ANTHROPIC…\") │\n│   (vault dropped)  │           │   list_keys()       │\n└────────────────────┘           └────────────────────┘\n```\n\n- Phase 1: Creates a vault at a temp path, writes two credential entries, then drops the vault. The in-memory `Zeroizing` wrappers ensure plaintext is wiped on drop; only the encrypted file survives on disk.\n- Phase 2: Reconstructs a `CredentialVault` pointing to the same file, unlocks with the same key, and asserts that `get` returns the original values.\n- Also verifies that `list_keys` returns user-visible keys (`OPENAI_API_KEY`, `ANTHROPIC_API_KEY`) but **excludes** `SENTINEL_KEY`.\n\n### `vault_unlock_with_wrong_key_fails`\n\nInitialises a vault under key *A*, writes a credential, then attempts to unlock the same file under key *B*. Asserts:\n\n- The unlock call returns an error matching either `ExtensionError::Vault(_)` or `ExtensionError::VaultKeyMismatch { .. }`. The test does not pin a specific variant because the AES-GCM failure path has been routed through both depending on vault format version.\n- `is_unlocked()` remains `false` after the failed attempt — the vault must not enter an inconsistent unlocked state.\n\nThis contract is critical for the boot path (#3651): a wrong-key failure must be detectable so the daemon can prompt for re-authentication rather than proceed with garbage.\n\n### `vault_rejects_writes_to_reserved_sentinel_key`\n\nAttempts both `set` and `remove` on `SENTINEL_KEY`. Both must return `ExtensionError::Vault(_)`. If external code could overwrite or delete the sentinel, the boot-path verify branch would silently break.\n\n## Test Helpers\n\n| Function | Purpose |\n|---|---|\n| `fixture_key_b64()` | Returns a deterministic base64-encoded 32-byte key (all zeros). Not cryptographically strong — only used for reproducibility. |\n| `fixture_vault_path(tmp)` | Returns `tmp.path().join(\"vault.enc\")` — a consistent file name inside the provided `TempDir`. |\n\nAll tests use `tempfile::TempDir` to ensure vault files are cleaned up after each test run, with no cross-test state leakage.\n\n## Dependencies on Production Code\n\n```mermaid\ngraph TD\n    A[vault_roundtrip.rs] -->|tests| B[CredentialVault]\n    A -->|tests| C[decode_master_key]\n    A -->|references| D[SENTINEL_KEY]\n    A -->|matches against| E[ExtensionError]\n    B -->|methods exercised| F[new / init_with_key / unlock_with_key]\n    B -->|methods exercised| G[set / get / remove / list_keys / is_unlocked]\n```\n\n### Imports\n\n- `librefang_extensions::vault` — `decode_master_key`, `CredentialVault`, `SENTINEL_KEY`\n- `librefang_extensions::ExtensionError` — error variants `Vault(_)` and `VaultKeyMismatch { .. }`\n- `tempfile::TempDir` — isolated filesystem per test\n- `zeroize::Zeroizing` — ensures test key material and credential values follow the same zero-on-drop discipline as production code\n- `base64::Engine` — encodes/decodes test fixture keys\n\n## Running These Tests\n\nThese are standard `#[test]` functions. Because they rely only on filesystem temp directories and explicit keys (no OS keyring, no network), they run fully offline and are safe for CI:\n\n```sh\ncargo test -p librefang-extensions --test vault_roundtrip\n```\n\n## Design Notes for Contributors\n\n- **Do not relax the 32-byte requirement** in `decode_master_key_rejects_wrong_byte_length` without also updating the production `decode_master_key` function and CLAUDE.md. The 32-byte length is a security property (AES-256).\n- **Do not pin a specific `ExtensionError` variant** for the wrong-key test. The error routing depends on vault format internals that may change across versions; the contract is \"non-Ok,\" not a specific discriminant.\n- **The sentinel key tests exist because** the sentinel is part of the boot-path verification flow (#3651). If the vault implementation changes how internal keys are stored, these tests ensure the public API still prevents external mutation.\n- **`Zeroizing` wrappers in tests mirror production usage.** Tests should always wrap key material and credential values in `Zeroizing::new(...)` to validate that the API compiles and behaves correctly with that wrapper.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nAgent-side infrastructure that doesn't belong in `runtime` or `kernel`. MCP server catalog, credential vault, OAuth2 PKCE flows, provider health probes, plugin installer, and a shared HTTP client.\n\nThis crate sits **above** `librefang-types` and `librefang-runtime`, and **below** `librefang-api`, `librefang-cli`, and `librefang-desktop`. Kernel never depends on it.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api\"] --> EXT\n    CLI[\"librefang-cli\"] --> EXT\n    DESK[\"librefang-desktop\"] --> EXT\n    EXT[\"librefang-extensions\"]\n    EXT --> RT[\"librefang-runtime\"]\n    EXT --> TY[\"librefang-types\"]\n    subgraph EXT\n        V[vault]\n        C[catalog]\n        O[oauth]\n        HC[http_client]\n        I[installer]\n        CR[credentials]\n        DT[dotenv]\n        H[health]\n    end\n```\n\n## Module Map\n\n| Module | Purpose |\n|---|---|\n| `catalog` | MCP server catalog at `~/.librefang/mcp/catalog/`. Templates and available servers. |\n| `credentials` | Auth-source unification across env vars, vault, CLI login, and file sources. |\n| `dotenv` | `.env` parsing for agent workspaces. |\n| `health` | Provider liveness probes. Delegates to `provider_health` in runtime. |\n| `http_client` | Shared `reqwest::Client` builder. Used everywhere — no bespoke clients. |\n| `installer` | MCP server install, update, and uninstall flows. |\n| `oauth` | OAuth2 PKCE client with Dynamic Client Registration (RFC 7591) for MCP. |\n| `vault` | AES-256-GCM credential vault backed by OS keyring or encrypted file. |\n\n## Credential Vault\n\nThe vault stores sensitive credentials (API keys, tokens) encrypted at rest using AES-256-GCM.\n\n### Master Key Resolution\n\nThe 32-byte master key is loaded from the first available source:\n\n1. **Environment variable** — `LIBREFANG_VAULT_KEY`, base64-encoded. Must decode to exactly 32 bytes. Generate with `openssl rand -base64 32` (produces 44 characters).\n2. **OS keyring** — Linux (libsecret), Windows (Credential Manager), macOS (Keychain, **disabled by default**).\n3. **File fallback** — Encrypted file at `~/Library/Application Support/librefang/.keyring` (macOS), mode `0600`.\n\n### macOS Keychain Behavior\n\nmacOS skips Keychain by default due to reliability issues (#2766). The migration path: on first boot, the vault performs one final read from Keychain, mirrors the key to the file fallback, then never touches Keychain again. Re-enable with config:\n\n```toml\n[vault]\nuse_os_keyring = true\n```\n\n### Per-Agent Caching\n\nVault instances are cached per agent behind a `RwLock<HashMap<AgentId, Arc<Vault>>>`. The cache invalidates automatically on credential changes. Always use the `Vault` API — never read the `.keyring` file directly.\n\n### Target Gating\n\nThe `keyring` dependency is only compiled on targets with a working OS backend: Linux (glibc, not musl), macOS, and Windows. On musl-static and Android builds, the vault transparently falls back to the file-based store. This avoids pulling `libdbus-sys` into builds where it has no usable backend.\n\n## Shared HTTP Client\n\n`http_client::shared_client()` returns a pre-configured `reqwest::Client`:\n\n- `User-Agent: librefang/<version>` (matches `librefang_runtime::USER_AGENT`)\n- Connection pooling\n- Sensible timeout, redirect, and TLS defaults\n- Native and webpki root certificates via `rustls`\n\n**All HTTP traffic must use this client.** Spinning up bespoke `reqwest::Client::new()` instances will be flagged in review.\n\n## OAuth2 / MCP Flow\n\nThe daemon detects a `401` from an MCP server and sets a `NeedsAuth` state on the connection. The API layer (specifically `routes/mcp_auth.rs` in the api crate) then drives the full flow:\n\n1. **PKCE generation** — code verifier and challenge\n2. **Dynamic Client Registration** (RFC 7591) — when the server exposes `registration_endpoint` but no `client_id`\n3. **Authorization redirect** — user authenticates in browser\n4. **Callback handling** — receives the authorization code\n5. **Token exchange and refresh**\n\nThis crate provides the building blocks (`oauth` module). The API crate owns the user-facing HTTP routing and callback endpoints.\n\n### Docker Considerations\n\nDo not bind ephemeral localhost ports for OAuth callbacks in daemon code. Inside Docker, those ports are unreachable from the host. Route all callbacks through the API server's existing port — the api crate handles this.\n\n## Credential Resolution\n\n`credentials::resolve()` provides a unified lookup across all auth sources with a fixed precedence:\n\n```\nenvironment variables > vault > CLI login > file\n```\n\nAny new credential source must integrate into this precedence chain rather than bypassing it.\n\n## Dependency Boundary\n\n**This crate depends on:**\n- `librefang-types`\n- `librefang-runtime`\n\n**This crate must NOT import:**\n- `librefang-api`\n- `librefang-cli`\n- `librefang-desktop`\n\nExtensions sit below those layers. Upward imports create circular dependency chains.\n\n**This crate does NOT own:**\n- The `McpOAuthProvider` trait (lives in runtime)\n- The trait implementation (lives in api)\n- HTTP routing\n- Channel adapters\n\n## Rules for Contributors\n\n- Use `http_client::shared_client()` for all HTTP. No `reqwest::Client::new()`.\n- Use `installer` for all plugin install/update/uninstall operations. No raw `tokio::process`.\n- Use the `Vault` API for all credential access. No direct `.keyring` file reads.\n- Route OAuth callbacks through the API server port in Docker environments.\n- Any new credential provider must fit into the `credentials::resolve()` precedence order.","other-librefang-hands-tests":"# Other — librefang-hands-tests\n\n# Registry Smoke Tests (`librefang-hands/tests/registry_smoke.rs`)\n\n## Purpose\n\nIntegration smoke tests that exercise the `HandRegistry` public API end-to-end, catching cross-method invariant violations that unit tests on individual methods can miss. Every historical bug in this area was a composition failure — definitions present without a workspace, instances surviving uninstall, etc. — so these tests drive the full lifecycle on a fresh temporary home directory.\n\nNo LLM, no kernel. Pure tool-dispatch and persistence behaviour.\n\n## Test Coverage\n\n### `install_activate_deactivate_uninstall_lifecycle`\n\nValidates the complete state machine of a hand from installation through teardown:\n\n```mermaid\nstateDiagram-v2\n    [*] --> Empty : new registry\n    Empty --> Installed : install_from_content_persisted\n    Installed --> Active : activate (empty config)\n    Active --> Active : uninstall refused (live instance)\n    Active --> Installed : deactivate\n    Installed --> Empty : uninstall_hand\n```\n\n**Invariants verified at each transition:**\n\n| Step | Method called | Assertions |\n|------|--------------|------------|\n| Fresh state | — | `list_definitions()` and `list_instances()` are empty |\n| Install | `install_from_content_persisted` | Returns correct definition; `HAND.toml` and `SKILL.md` exist on disk at `home/workspaces/<id>/`; definition visible via `list_definitions()` and `get_definition()` |\n| Activate | `activate` with empty config map | Returns instance with `HandStatus::Active`; exactly one instance in `list_instances()`; retrievable via `get_instance()` |\n| Refused uninstall | `uninstall_hand` | Returns `Err`; definition and instance unchanged in memory |\n| Deactivate | `deactivate` | Returns the same instance; `list_instances()` becomes empty |\n| Uninstall | `uninstall_hand` | Returns `Ok`; `get_definition()` returns `None`; workspace directory physically removed from disk |\n\nThe \"refused uninstall while active\" check enforces the contract that `DELETE /api/hands/{id}` depends on — the test deliberately avoids pinning a specific error variant (that's covered by unit tests in `registry.rs`) and instead asserts that the failed call leaves all in-memory state untouched.\n\n### `definitions_round_trip_through_a_disk_reload`\n\nLocks in the contract that `home/workspaces/<id>/HAND.toml` is the source of truth for persistence:\n\n1. A fresh `HandRegistry` installs a hand via `install_from_content_persisted`.\n2. A second, independent `HandRegistry` is created (simulating a daemon restart).\n3. Before reload, the second registry sees nothing — `list_definitions()` is empty.\n4. After `reload_from_disk(home)`, the hand is fully discoverable via `get_definition(\"smoke-hand\")`.\n\nThis ensures that no in-memory log or external state is required to reconstruct the registry — the filesystem layout alone is sufficient.\n\n## Test Fixtures\n\nTwo inline constants define the minimal valid hand content:\n\n- **`SMOKE_HAND_TOML`** — A complete `HAND.toml` with id `smoke-hand`, routing alias `smoke`, and a minimal agent definition. No required settings, so `activate` with an empty `HashMap` is valid.\n- **`SMOKE_SKILL_MD`** — A trivial Markdown skill body written alongside the TOML.\n\n## Relationship to `HandRegistry`\n\nBoth tests target `librefang_hands::registry::HandRegistry` exclusively. The methods exercised are:\n\n| Method | Used in |\n|--------|---------|\n| `HandRegistry::new()` | Both tests |\n| `install_from_content_persisted(home, toml, md)` | Both tests |\n| `activate(hand_id, config_map)` | Lifecycle test |\n| `deactivate(instance_id)` | Lifecycle test |\n| `uninstall_hand(home, hand_id)` | Lifecycle test |\n| `list_definitions()` | Both tests |\n| `list_instances()` | Lifecycle test |\n| `get_definition(id)` | Both tests |\n| `get_instance(instance_id)` | Lifecycle test |\n| `reload_from_disk(home)` | Reload test |\n\n## Running\n\nThese are regular `#[test]` functions — run with:\n\n```bash\ncargo test -p librefang-hands --test registry_smoke\n```\n\nEach test creates its own `tempfile::tempdir()` for full isolation. No shared state, no ordering dependencies.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nHands are LibreFang's unit of **autonomous capability** — self-contained, curated packages that define what an agent can *do*. Each hand encapsulates a discrete skill or toolset along with the metadata needed to discover, validate, and invoke it.\n\n## Concept\n\nIn LibreFang, an agent's abilities aren't monolithic. Instead, they're composed from individual \"hands\" — capability packages that can be loaded, inspected, and managed independently. A hand might represent anything from file system operations to network scanning to payload generation. The hands system provides the registry, serialization, and lifecycle infrastructure to make these capabilities pluggable and composable.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────┐\n│                 Hand                         │\n│  ┌───────────────┐  ┌─────────────────────┐ │\n│  │   Metadata     │  │  Capability Config  │ │\n│  │  - id (UUID)   │  │  (TOML definition)  │ │\n│  │  - timestamps  │  │                     │ │\n│  │  - name/desc   │  └─────────────────────┘ │\n│  └───────────────┘                           │\n└─────────────────────────────────────────────┘\n        │\n        ▼\n┌─────────────────────┐\n│    HandRegistry     │\n│    (DashMap-backed) │\n│                     │\n│  Concurrent access  │\n│  to loaded hands    │\n└─────────────────────┘\n```\n\nThe registry uses `dashmap` for lock-free concurrent access, allowing multiple runtime tasks to query and interact with hands simultaneously without contention.\n\n## Key Design Decisions\n\n**TOML-based definitions.** Hands are defined via TOML configuration, making them human-readable, version-control friendly, and easy to audit. The `toml` and `serde` dependencies handle parsing and deserialization into strongly-typed Rust structures.\n\n**UUID identification.** Every hand is identified by a unique UUID (`uuid` crate), ensuring unambiguous references even when hands share names or are updated across versions.\n\n**Timestamped lifecycle.** The `chrono` dependency supports creation and modification timestamps on hand metadata, enabling cache invalidation, staleness checks, and audit trails.\n\n**Structured errors.** `thiserror` provides the error type hierarchy for hand loading, parsing, and validation failures, giving callers precise diagnostics.\n\n## Integration Points\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared types that hands produce or consume — ensures type compatibility across the system |\n| `librefang-runtime` *(dev)* | Used in tests to verify hands integrate correctly with the runtime environment |\n| `tempfile` *(dev)* | Test fixtures for hand loading from temporary filesystem paths |\n\n### How Hands Connect to the Wider System\n\n```mermaid\ngraph LR\n    A[librefang-types] --> B[librefang-hands]\n    B --> C[librefang-runtime]\n    C --> D[Agent Execution]\n    B -- registers hands --> C\n```\n\nThe hands module sits between the type layer and the runtime. It depends on `librefang-types` for shared data structures and is consumed by `librefang-runtime`, which orchestrates hand invocation during agent execution.\n\n## Serialization Format\n\nHands are serialized in two contexts:\n\n- **Definition**: TOML files read at load time, deserialized into hand structures via `serde`.\n- **Interchange**: JSON (`serde_json`) for runtime hand state snapshots, cross-process communication, or persistence.\n\nBoth formats derive from the same `serde`-annotated structures, so the schema stays consistent regardless of transport.\n\n## Testing\n\nTests use `serial_test` to serialize test cases that share global state (such as the hand registry), preventing race conditions in concurrent scenarios. `tempfile` creates isolated filesystem environments for testing hand discovery and loading without polluting the host system.\n\nTo run the test suite:\n\n```bash\ncargo test -p librefang-hands\n```\n\n## Error Handling\n\nAll fallible operations return `Result<T, E>` where `E` is a hand-specific error type derived via `thiserror`. Error variants cover:\n\n- Malformed or missing TOML configuration\n- Invalid or duplicate hand identifiers\n- Schema validation failures during loading\n\nThe `tracing` crate provides structured diagnostics throughout — every hand load, parse, and registration event is instrumented so operators can trace capability resolution in production logs.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing consistent TLS configuration and proxy support across the LibreFang project.\n\n## Purpose\n\nRather than each LibreFang component independently constructing its own `reqwest::Client` with ad-hoc TLS and proxy settings, this crate centralizes that logic. Every HTTP call made by the application—whether fetching remote configs, communicating with game services, or downloading resources—goes through a client built by this module.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Consumer module] -->|calls build function| B[librefang-http]\n    B -->|configures TLS| C[rustls]\n    B -->|loads CA roots| D[webpki-roots]\n    B -->|fallback CA roots| E[rustls-native-certs]\n    B -->|returns| F[reqwest::Client]\n    F -->|used by| A\n```\n\nThe module exposes a builder/factory function that returns a fully configured `reqwest::Client`. Consumers never deal with TLS internals directly.\n\n## TLS Strategy\n\nTLS configuration follows a two-tier certificate root loading strategy:\n\n1. **Primary — `webpki-roots`**: Bundles Mozilla's curated set of root certificates. This works everywhere regardless of the host OS but only trusts certificates from well-known CAs.\n\n2. **Fallback — `rustls-native-certs`**: Loads the host operating system's native certificate store. This is necessary for environments with custom/private CAs (corporate proxies, self-signed infrastructure) whose roots aren't in Mozilla's set.\n\nThe fallback ensures that LibreFang works out of the box on standard setups while remaining flexible in restricted network environments. All TLS is handled by `rustls`—there is no dependency on OpenSSL.\n\n## Proxy Support\n\nRelies on `reqwest`'s built-in proxy detection, which respects standard environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`). This keeps proxy configuration consistent with the rest of the system without requiring custom logic.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `reqwest` | HTTP client; the constructed output type |\n| `rustls` | TLS backend (no OpenSSL linkage) |\n| `webpki-roots` | Bundled Mozilla CA certificates |\n| `rustls-native-certs` | OS-native CA certificate loading |\n| `librefang-types` | Shared types used across LibreFang |\n| `tracing` | Structured logging for certificate loading and errors |\n\n## Integration\n\nOther LibreFang crates depend on `librefang-http` and call its build function to obtain a `reqwest::Client`. The types exchanged over HTTP (request/response shapes) come from `librefang-types`, keeping serialization concerns separate from transport concerns.\n\nBecause no incoming or outgoing calls were detected in static analysis, the module is purely a utility: it builds a client and returns it, with no callbacks, trait objects, or runtime hooks into the rest of the application.","other-librefang-kernel-handle-tests":"# Other — librefang-kernel-handle-tests\n\n# librefang-kernel-handle Tests\n\nIntegration tests that verify the **default method implementations** provided by the kernel handle trait system. Every trait in `librefang-kernel-handle` ships with sensible defaults so implementors only need to fill in the methods they care about. These tests ensure those defaults remain correct, predictable, and well-documented by the type system.\n\n## Purpose\n\nWhen a new `KernelHandle` implementation is created, it must satisfy a large surface of traits (`AgentControl`, `MemoryAccess`, `TaskQueue`, `EventBus`, `KnowledgeGraph`, `ApprovalGate`, `ToolPolicy`, etc.). Most of these traits define optional or convenience methods with default implementations. This test suite locks down three categories of behavior:\n\n1. **Default return values** — what a no-op implementation returns for every method.\n2. **Delegation chains** — that convenience methods (e.g. `send_to_agent_as`) correctly forward to their underlying required method.\n3. **Zero-copy guarantees** — that `Bytes`-based APIs share allocations rather than copying buffers.\n\n## Test Files\n\n### `defaults_approval.rs`\n\nTests the default behavior of `ApprovalGate` and `ToolPolicy`:\n\n| Test | Trait Method | Expected Default |\n|------|-------------|-----------------|\n| `test_request_approval_default_auto_approves` | `request_approval` | Returns `ApprovalDecision::Approved` |\n| `test_is_tool_denied_with_context_default_false` | `is_tool_denied_with_context` | Returns `false` |\n| `test_requires_approval_default_false` | `requires_approval` | Returns `false` |\n\nUses a single `NoopKernelHandle` struct where every required trait method returns `\"not implemented\"` errors. The default implementations are the system under test — they must return permissive results even though no real logic backs them.\n\n### `defaults_delegation.rs`\n\nVerifies that higher-level convenience methods delegate to the correct lower-level trait method. Each test uses a tracking struct with an `AtomicBool` flag to confirm the underlying method was actually invoked.\n\n**Delegation pairs tested:**\n\n```\nsend_to_agent_as(agent_id, msg, parent_id)\n  └── delegates to ──► send_to_agent(agent_id, msg)\n\nspawn_agent_checked(toml, parent_id, allowed_agents)\n  └── delegates to ──► spawn_agent(toml, parent_id)\n\nrequires_approval_with_context(tool, sender, channel)\n  └── delegates to ──► requires_approval(tool)\n```\n\nEach tracking struct (`TrackingSendHandle`, `TrackingSpawnHandle`, `TrackingApprovalHandle`) implements only the **required** method with observable side effects, then relies on the default implementation for the convenience method being tested.\n\n### `defaults_returns.rs`\n\nValidates the default return values for traits whose defaults provide constant or empty values:\n\n| Test | Trait | Method | Expected Default |\n|------|-------|--------|-----------------|\n| `test_resolve_user_tool_decision_default_allow` | `ToolPolicy` | `resolve_user_tool_decision` | `UserToolGate::Allow` |\n| `test_memory_acl_for_sender_default_none` | `ToolPolicy` | `memory_acl_for_sender` | `None` |\n| `test_cron_defaults_return_errors` | `CronControl` | `cron_create`, `cron_list`, `cron_cancel` | `KernelOpError::Unavailable(\"Cron scheduler\")` |\n| `test_tool_timeout_defaults` | `ToolPolicy` | `tool_timeout_secs`, `tool_timeout_secs_for` | `120` seconds |\n| `test_max_agent_call_depth_default` | `ToolPolicy` | `max_agent_call_depth` | `5` |\n| `test_workspace_prefix_defaults_empty` | `ToolPolicy` | `readonly_workspace_prefixes`, `named_workspace_prefixes` | Empty vec |\n| `test_wiki_access_defaults_return_unavailable_with_method_name` | `WikiAccess` | `wiki_get`, `wiki_search`, `wiki_write` | `KernelOpError::Unavailable(\"wiki_<verb>\")` |\n\nThe wiki test (#3329) is notable: each wiki method returns a **method-specific** `Unavailable` variant (e.g. `\"wiki_get\"`, `\"wiki_search\"`, `\"wiki_write\"`), allowing callers and audit logs to distinguish which entry point was hit when the wiki vault is disabled.\n\n### `send_channel_file_data_zero_copy.rs`\n\nRegression test for issue #3553. The `ChannelSender::send_channel_file_data` method takes `bytes::Bytes` instead of `Vec<u8>`, enabling zero-cost cloning across wrapping layers (retry logic, metering, fan-out).\n\nThree properties are verified:\n\n1. **`cloning_bytes_shares_underlying_allocation`** — Cloning a `Bytes` produced from `Vec<u8>` increments a reference count; all clones share the same pointer address.\n\n2. **`send_channel_file_data_does_not_copy_buffer`** — A `CapturingFileKernel` records the pointer address and length of the `Bytes` it receives. The test clones `Bytes` at the call site (simulating a metering wrapper) and asserts the kernel observed the same allocation.\n\n3. **`vec_to_bytes_round_trip_is_zero_copy_for_unique_bytes`** — `Vec::from(Bytes)` is O(1) when the `Bytes` uniquely owns its allocation. This pins the `bytes` 1.x vtable behavior.\n\n## Test Architecture Pattern\n\nEvery test file follows the same structure:\n\n```mermaid\ngraph TD\n    A[\"Define stub struct<br>(e.g. NoopKernelHandle)\"] --> B[\"Implement all required trait methods<br>with tracking or no-op behavior\"]\n    B --> C[\"Leave default methods unimplemented<br>(inherit from trait)\"]\n    C --> D[\"Call default method<br>on the stub\"]\n    D --> E{\"Assert expected behavior\"}\n    E -->|Return value| F[\"Correct constant/empty/result\"]\n    E -->|Delegation| G[\"Underlying method was called\"]\n    E -->|Zero-copy| H[\"Pointer address unchanged\"]\n```\n\nThe stub structs implement every trait in the kernel handle prelude (`AgentControl`, `MemoryAccess`, `WikiAccess`, `TaskQueue`, `EventBus`, `KnowledgeGraph`, `CronControl`, `ApprovalGate`, `HandsControl`, `A2ARegistry`, `ChannelSender`, `PromptStore`, `WorkflowRunner`, `GoalControl`, `ToolPolicy`) because the test framework constructs them as concrete types. Only the methods relevant to each test have meaningful implementations.\n\n## Relationship to `librefang-kernel-handle`\n\nThis test module lives in the `tests/` directory of `librefang-kernel-handle` and imports everything through `librefang_kernel_handle::prelude::*`. It imports types from `librefang_types` (`ApprovalDecision`, `Entity`, `GraphMatch`, `GraphPattern`, `Relation`, `UserToolGate`) for assertions on default return values.\n\nThe tests act as a **contract specification** for anyone implementing the kernel handle traits: if you only override the required methods, these are the behaviors you get for free. Changing any default implementation in the trait definitions must be reflected here, making these tests a safety net for API evolution.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\nA trait abstraction that defines the interface for in-process callers into the LibreFang kernel.\n\n## Purpose\n\nThis crate provides the `KernelHandle` trait — a boundary contract between the LibreFang kernel and any in-process component that needs to interact with it. By defining this as a trait rather than a concrete type, the kernel interface can be mocked, decorated, or replaced in tests and alternative configurations without touching caller logic.\n\n## Role in the Architecture\n\n```\n┌─────────────────────────┐\n│   In-process caller     │\n│  (plugin, service, etc) │\n└────────────┬────────────┘\n             │ depends on\n             ▼\n┌─────────────────────────┐\n│ librefang-kernel-handle │   ← this crate\n│   KernelHandle trait    │\n└────────────┬────────────┘\n             │ implemented by\n             ▼\n┌─────────────────────────┐\n│   LibreFang Kernel      │\n│   (concrete impl)       │\n└─────────────────────────┘\n```\n\nThe trait lives in its own crate to avoid circular dependencies. Callers depend only on this lightweight interface crate, while the kernel provides the concrete implementation. Neither side needs to depend on the other's full crate.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared domain types exchanged across kernel calls (messages, errors, identifiers) |\n| `async-trait` | Enables `async` methods in the trait definition |\n| `bytes` | Efficient byte buffer handling for payload data |\n| `serde_json` | JSON serialization for structured kernel messages |\n| `thiserror` | Derive macro for error types surfaced from kernel operations |\n| `uuid` | Unique identifiers for sessions, requests, or correlation tokens |\n| `tracing` | Structured logging and diagnostics within trait implementations |\n\n## Testing\n\nThe dev-dependency on `tokio` (with `macros` and `rt` features) indicates that tests in this crate use the Tokio runtime, consistent with the async nature of the trait. Test authors should annotate test functions with `#[tokio::test]`.\n\n## Relationship to Other Crates\n\n- **Consumers**: Any crate that needs to call into the kernel (plugins, adapters, middleware) depends on this crate and accepts a `dyn KernelHandle` or generic `H: KernelHandle`.\n- **Implementors**: The kernel crate itself implements this trait on its concrete handle type, satisfying the contract defined here.\n- **Shared types**: All types passed across the trait boundary are defined in `librefang-types`, keeping this crate free of domain logic.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Purpose\n\nThis module tracks resource consumption and enforces spending limits across LLM operations. It acts as the kernel's financial control layer — every token processed through the system is accounted for, and quotas are checked before operations are dispatched.\n\n## Role in the Architecture\n\nMetering sits between the runtime and the LLM driver layer. When the runtime prepares to execute an LLM call, metering checks whether the operation is within budget. After the call completes, metering records the actual cost against the relevant account or session.\n\n```\n┌──────────────┐\n│   Runtime    │\n└──────┬───────┘\n       │ pre-check / post-record\n┌──────▼───────┐\n│   Metering   │\n└──────┬───────┘\n       │\n┌──────▼───────┐\n│  LLM Driver  │\n└──────────────┘\n```\n\n## Dependencies\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared cost and quota types (price tables, usage counters, budget descriptors) |\n| `librefang-memory` | Persistent storage for usage records and quota state |\n| `librefang-runtime` | Hooks into the kernel execution loop for pre/post operation checks |\n| `librefang-llm-driver` | Model pricing metadata and token count reporting from LLM responses |\n| `serde` | Serialization of metering records for persistence and auditing |\n| `tracing` | Observability — logs quota breaches, spending milestones, and enforcement decisions |\n\n## Key Concepts\n\n### Cost Metering\n\nEach LLM response carries token usage data. Metering extracts the input and output token counts, applies the model's per-token price, and accumulates the cost. This produces a running total tied to whatever granularity the kernel requires — per-session, per-user, per-agent, or global.\n\n### Quota Enforcement\n\nQuotas are checked before an LLM call is issued. If the remaining budget cannot cover the estimated cost of the operation, the call is rejected before any tokens are sent to the provider. This prevents overshoot and ensures hard spending caps are respected.\n\nEnforcement is optimistic for variable-cost operations — output tokens cannot be known in advance, so the check is made against a worst-case estimate or a configured max-output-tokens parameter.\n\n### State Persistence\n\nMetering state must survive kernel restarts. Usage counters and quota balances are persisted through `librefang-memory`, which provides the storage backend. Serialized metering snapshots are written on every update or at configured intervals.\n\n## Integration Points\n\n**Upstream consumers** — the runtime calls into metering before and after each LLM invocation.\n\n**Downstream data** — metering reads pricing information from `librefang-llm-driver` (model-specific cost per token) and reads/writes quota state through `librefang-memory`.\n\n**Observability** — all enforcement decisions and cost accumulations are emitted as `tracing` events, allowing external systems to monitor spending in real time.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nRouting engine that resolves incoming messages to the correct **Hand** and **Template** handlers within the LibreFang kernel.\n\n## Purpose\n\nIn the LibreFang architecture, incoming messages must be dispatched to the appropriate handler based on their content, type, or metadata. This module owns that dispatch logic. It maintains a registry of routing rules—pairing match conditions with target Hands and Templates—and evaluates incoming payloads against those rules to determine where execution should land.\n\n## Core Concepts\n\n### Hands\n\nHands are the executable handler units provided by `librefang-hands`. A Hand encapsulates the logic for processing a specific category of input. The router's job is to select the correct Hand for any given message.\n\n### Templates\n\nTemplates define structural patterns that messages are expected to conform to. The router matches incoming messages against template patterns to identify which processing path to take.\n\n### Routing Rules\n\nA routing rule consists of:\n\n- A **match condition** — the predicate that determines whether a rule applies to a given message. Conditions may involve pattern matching (via `regex-lite`), structural checks (via `serde_json`), or configuration-driven criteria (via `toml`).\n- A **target** — the Hand or Template that should handle the message when the condition is satisfied.\n\n## Dependencies and Their Roles\n\n| Dependency | Role in This Module |\n|---|---|\n| `librefang-types` | Shared type definitions for messages, route descriptors, and cross-module data structures |\n| `librefang-hands` | Provides the Hand abstractions that routes resolve to |\n| `serde_json` | Inspects and deserializes JSON message payloads during route evaluation |\n| `regex-lite` | Pattern-based matching within routing conditions |\n| `toml` | Parses routing configuration from TOML files |\n| `dirs` | Resolves platform-specific config directories where routing tables are stored |\n| `tracing` | Emits structured log events for route resolution, misses, and errors |\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Incoming Message] --> B[Router]\n    B --> C{Evaluate Rules}\n    C -->|Match| D[Resolved Hand / Template]\n    C -->|No Match| E[Fallback / Error]\n    F[Config Files TOML] --> B\n```\n\nThe router loads its rule set from configuration (TOML files located via `dirs`). At dispatch time, it evaluates the message against each rule's match condition, returning the first matching target. The resolved target is then handed off to the kernel's execution layer.\n\n## Configuration\n\nRouting rules are defined in TOML. The module uses `dirs` to locate the appropriate configuration directory for the platform, then parses routing tables with `toml`. This allows route definitions to be managed externally without recompilation.\n\n## Testing\n\nTests use `tempfile` to create isolated temporary directories for config files, ensuring routing logic can be verified without touching the user's actual configuration. The `librefang-runtime` dev-dependency provides a minimal runtime context for integration-level test scenarios.\n\n## Integration Points\n\nThis module sits between message ingestion and handler execution in the LibreFang kernel:\n\n- **Upstream consumers** pass raw or parsed messages into the router.\n- **Downstream** it produces resolved route targets (Hand/Template references) that the kernel's executor acts on.\n- It depends on `librefang-types` for shared vocabulary with the rest of the codebase, and on `librefang-hands` for the concrete handler types it resolves to.","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# librefang-kernel Test Suite\n\nThe `kernel::tests` module is the primary integration test surface for the LibreFang kernel. It exercises the full `LibreFangKernel` lifecycle — boot, agent spawning, hand activation/deactivation, background task sweeps, skill management, session interrupt cascades, and clean shutdown — against ephemeral tempdir-backed instances with no external network dependencies.\n\n## Architecture\n\nEvery test follows the same contract:\n\n1. Create a `tempfile::TempDir` for `home_dir`.\n2. Build a `KernelConfig` pointing at it.\n3. Call `LibreFangKernel::boot_with_config` (or a helper that wraps it).\n4. Assert invariants against in-memory registries, substrate queries, or file system state.\n5. Call `kernel.shutdown()`.\n\nA small set of reusable helpers reduce boilerplate:\n\n| Helper | Purpose |\n|---|---|\n| `set_test_env` / `EnvVarGuard` | Sets an env var for the test's lifetime; removes on drop. Uses unique prefixed keys per test to avoid cross-test collisions under the default serial test runner. |\n| `test_manifest` | Produces a minimal `AgentManifest` with configurable name, description, and tags. |\n| `install_test_skill` | Writes a valid `skill.toml` + `prompt_context.md` under a given parent directory so the registry's `load_skill` accepts it. |\n| `RecordingChannelAdapter` | A `ChannelAdapter` impl that captures sent text into an `Arc<Mutex<Vec<String>>>` for assertion, with an empty inbound stream. |\n| `cascade_test_kernel` | Boots a kernel with a leaked tempdir (process-lifetime) for session-interrupt cascade tests that need `Arc<LibreFangKernel>`. |\n\n## Test Coverage by Subsystem\n\n### API Key Rotation\n\n`collect_rotation_key_specs` is tested for:\n\n- **Deduplication** — when the primary key matches a profile's `api_key_env` value, that profile is marked `use_primary_driver: true` and the primary is not double-listed.\n- **Missing profile skip** — profiles whose env var is unset are silently excluded.\n- **Prepending** — a distinct primary key gets its own `RotationKeySpec` entry at position zero.\n\n### Approval Escalation Routing\n\n`test_notify_escalated_approval_prefers_request_route_to` validates the priority chain: a per-request `route_to` on an `ApprovalRequest` with `escalation_count > 0` wins over routing rules, agent notification rules, and the global `approval_channels` config. Uses `RecordingChannelAdapter` to confirm only the explicit recipient receives the message.\n\n### Agent Manifest → Capabilities\n\n`manifest_to_capabilities` is exercised across several scenarios:\n\n- **Explicit tools** — `capabilities.tools` maps to `Capability::ToolInvoke` entries.\n- **ToolProfile expansion** — a profile like `ToolProfile::Coding` expands to file tools + shell_exec + web_fetch + derived `ShellExec` / `NetConnect` capabilities.\n- **Explicit tools override profile** — when both are set, only the explicit list is used; the profile is ignored.\n\n### Agent Registry\n\nThe `AgentRegistry` is tested for:\n\n- **Name lookup** via `find_by_name`.\n- **UUID lookup** via `get`.\n- **Tag filtering** — client-side iteration filtering on `tags` and `name` substrings.\n\n### Agent Spawning & Lineage Enforcement\n\n`spawn_agent_inner` is the low-level spawn path. Tests enforce:\n\n| Test | Invariant |\n|---|---|\n| `test_spawn_child_exceeding_parent_is_rejected` | A child whose declared capabilities (tools, shell, network) exceed its parent's is rejected with `\"Privilege escalation denied\"`. The child is never registered. |\n| `test_spawn_child_with_subset_capabilities_is_allowed` | A child requesting a strict subset of the parent's tools spawns successfully and records the parent link. |\n| `test_spawn_with_unknown_parent_fails_closed` | Passing a stale `AgentId` as parent (not in the registry) fails with `\"not registered\"` — prevents silent privilege bypass via ghost parents. |\n| `test_spawn_agent_applies_local_default_model_override` | An agent with `provider: \"default\"` / `model: \"default\"` resolves the concrete provider at execution time, not spawn time. The manifest stores the placeholder values. |\n\n### Provider Switching & Stale Override Cleanup\n\n`test_set_agent_model_clears_overrides_when_provider_changes` (regression for issue #2380) verifies that switching an agent's provider via `set_agent_model` clears `api_key_env` and `base_url` overrides from the previous provider, but a same-provider model-only swap preserves existing per-agent overrides.\n\n### Hand Lifecycle\n\nHand activation and deactivation is one of the most heavily tested areas:\n\n**Activation**\n\n- `test_hand_activation_does_not_seed_runtime_tool_filters` — the `tool_allowlist` and `tool_blocklist` on the derived agent manifest remain empty so skill/MCP tools stay visible.\n- `test_hand_skills_propagate_to_derived_agent_manifest` (issue #3135) — a hand-level `skills = [...]` allowlist propagates into each derived per-role agent's `AgentManifest.skills`.\n- `test_hand_skills_intersect_per_role_overrides` — when both the hand and the per-role agent declare skills lists, the effective list is their intersection.\n\n**Reactivation**\n\n- `test_hand_reactivation_rebuilds_same_runtime_profile` — deactivating and reactivating a hand rebuilds the same tool set, profile, allowlist, blocklist, and MCP server assignments.\n- `reactivate_builds_from_hand_toml_not_override` — runtime overrides (model, provider, max_tokens, temperature, web_search_augmentation) applied via `update_hand_agent_runtime_override` do NOT survive a deactivate/reactivate cycle. The fresh activation resolves from the HAND.tomL definition.\n\n**Persistence across restarts**\n\n- `hand_runtime_override_survives_restart_via_activate_hand_with_id` — after persisting hand state and rebooting a fresh kernel, replaying the `activate_hand_with_id` restore path re-applies the persisted `HandAgentRuntimeOverride` to the derived agent manifest.\n- `boot_drift_preserves_hand_settings_tail` — `[[settings]]` from HAND.toml are rendered into the `## User Configuration` section of the system prompt after a simulated restart.\n- `boot_drift_preserves_skill_and_team_tails` — `## Reference Knowledge` (from SKILL.md) and `## Your Team` (peer roster) tails survive restart via `activate_hand_with_id`.\n\n**Deactivation cleanup**\n\n- `deactivate_hand_removes_hand_agent_rows_from_sqlite` — even when hand agents are not in the in-memory registry (the post-restart scenario), `deactivate_hand` still scrubs their SQLite rows.\n\n### Tool Availability\n\n| Test | Invariant |\n|---|---|\n| `test_available_tools_returns_empty_when_tools_disabled` | `tools_disabled: true` on the manifest suppresses all builtin, skill, and MCP tools. |\n| `test_available_tools_glob_pattern_matches_mcp_tools` | Declared tools like `\"file_*\"` use glob matching, not exact equality — regression for MCP tools being silently dropped. |\n| `test_shell_exec_available_when_declared_in_tools_without_explicit_exec_policy` | When `shell_exec` is in `capabilities.tools` and `shell: [\"*\"]` is set but no `exec_policy` is provided, the kernel auto-promotes `exec_policy.mode` to `Full`. |\n| `test_skill_evolve_tools_default_available_to_restricted_agent` | The `skill_evolve_*` surface is always visible to agents regardless of their declared `capabilities.tools` — enabling self-evolving skills for all agents. |\n\n### Skill Registry Configuration\n\n- `test_skills_config_disabled_list_filters_at_boot` — `config.skills.disabled` excludes named skills from loading even when their directories exist on disk.\n- `test_skills_config_extra_dirs_loaded_as_overlay` — skills from `extra_dirs` are loaded on top of the primary directory; local installations with the same name win over external overlays.\n- `test_reload_skills_preserves_disabled_and_extra_dirs` — hot-reload via `reload_skills()` re-applies the disabled list and extra_dirs overlay (regression for silent policy loss).\n- `test_stable_mode_freezes_registry_and_skips_review_gate` — `KernelMode::Stable` freezes the registry, blocking new mutations and preventing the background-review gate from spawning reviews.\n\n### Session Interrupt Cascade (Issue #3044)\n\nParent `/stop` propagates to in-flight child turns via `SessionInterrupt::new_with_upstream`:\n\n```\ncascade_primitives_via_session_interrupts_dashmap:\n  parent_interrupt.cancel()  →  child_interrupt.is_cancelled() == true\n\n  sibling_child.cancel()     →  sibling_parent.is_cancelled() == false  (reverse does NOT hold)\n```\n\nAdditional tests verify:\n- `no_upstream_when_parent_has_no_active_turn` — lookup returns `None` for idle parents; the call proceeds without cascade.\n- `send_to_agent_as_tolerates_unregistered_parent_uuid` — the parent-id resolver falls back to UUID parsing when the registry lookup misses, preventing `\"Agent not found\"` from masking the real child-not-found error.\n- `send_to_agent_as_rejects_unparseable_parent_id` — garbage parent IDs produce a clear error rather than a panic.\n\n### Background Task Sweeps\n\n- `test_spawn_approval_sweep_task_is_idempotent` / `test_spawn_task_board_sweep_task_is_idempotent` — atomic guards prevent double-spawning the sweep loops. After `shutdown()`, the flag resets.\n- `test_task_board_sweep_resets_stuck_in_progress_task` — a claimed task whose `claimed_at` exceeds the TTL is reset to `pending` with `assigned_to: \"\"` via `task_reset_stuck`.\n\n### Peer-Scoped Keys\n\n`peer_scoped_key` is validated for security (issues #5119, #5120):\n\n| Input | Expected |\n|---|---|\n| `(\"car\", Some(\"user-123\"))` | `\"peer:user-123:car\"` |\n| `(\"car\", None)` | `\"car\"` |\n| `(\"car\", Some(\"u:456\"))` | `Err(InvalidInput)` — colon in peer_id |\n| `(\"car\", Some(\"\"))` | `Err(InvalidInput)` — empty peer_id |\n| `(\"peer:victim:user_name\", None)` | `Err(InvalidInput)` — reserved prefix collision |\n\n### JSON Extraction from LLM Responses\n\n`extract_json_from_llm_response` handles:\n\n- ` ```json ... ``` ` code blocks (first valid block wins)\n- Bare `{...}` objects surrounded by prose\n- Nested braces inside string values (the naive find/rfind approach was replaced)\n- Malformed JSON → `None`\n- No JSON present → `None`\n\n### Background Skill Review Sanitization\n\n`sanitize_reviewer_block` and `sanitize_reviewer_line` prevent a compromised prior LLM response from injecting fake instructions into the reviewer:\n\n- Triple backticks are neutralized (prevents forged code blocks).\n- `<\/data>` / `<data>` envelope tags are stripped (prevents escape from the prompt envelope).\n- Control characters (`\\x00`, `\\x07`) are removed; whitespace and tabs preserved.\n- Truncation is char-based, not byte-based, with a `…[truncated]` marker.\n\n`is_transient_review_error` classifies errors so only timeouts, 429s, and network issues trigger retries — parse errors and security blocks are permanent.\n\n### Cron Job Peer Context\n\n`test_cron_create_preserves_peer_id` (regression for OFP-triggered cron jobs losing peer context): `cron_create` reads `peer_id` from `job_json` and persists it. Jobs created without `peer_id` store `null`.\n\n### Atomic TOML Writes\n\n`atomic_write_toml` stages content in a sibling `.tmp` file and atomically renames it into place:\n\n- Replaces existing content cleanly.\n- Leaves no `.tmp` artifacts on success.\n- Under concurrent writes from two threads (50 iterations each), every intermediate read sees either the seed value or one of the two complete payloads — never a truncated mix.\n\n### Thinking Override\n\n`apply_thinking_override` toggles the `thinking` field on an agent manifest:\n\n| Override | Existing `thinking` | Result |\n|---|---|---|\n| `None` | Any | Unchanged |\n| `Some(false)` | Any | `thinking = None` |\n| `Some(true)` | `None` | Default `ThinkingConfig` inserted |\n| `Some(true)` | `Some(existing)` | Preserved with original `budget_tokens` |\n\n### Message Routing\n\n- `should_reuse_cached_route` — short follow-ups (\"fix that\", \"继续\") return `true`; acknowledgements (\"thanks\") and substantive requests return `false`.\n- `assistant_route_key` — incorporates channel, user_id, and thread_id into a scoped key; `None` sender produces a different key.\n- `test_boot_spawns_assistant_as_default_agent` — a fresh kernel boot auto-spawns an agent named `\"assistant\"`.\n- `send_message_ephemeral` — errors on unknown agents and does not modify the real session's message history.\n\n### Condition Evaluation\n\n`evaluate_condition` supports `agent.tags contains 'value'` syntax. Empty/`None` conditions evaluate to `true`. Unknown formats evaluate to `false` (strict default).\n\n## Running the Tests\n\n```bash\n# Full suite (no network required)\ncargo test -p librefang-kernel\n\n# Only the hand lifecycle tests\ncargo test -p librefang-kernel -- hand\n\n# The ignored end-to-end hand restart test (requires longer timeout)\ncargo test -p librefang-kernel -- --ignored hand_runtime_override_survives_restart_via_start_background_agents\n```\n\nAll tests create isolated tempdir homes and clean up on completion. The `EnvVarGuard` pattern ensures environment variable mutations never leak across test boundaries.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration test suite for the LibreFang kernel. Covers the full lifecycle — boot, agent spawning, messaging, task tracking, memory isolation, RBAC policy evaluation, hand (multi-agent) management, audit retention, session compaction, and CLI tooling.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Infrastructure\"\n        COMMON[common/mod.rs<br/>boot_kernel helpers]\n        MOCK[MockKernelBuilder<br/>librefang-testing]\n    end\n\n    subgraph \"Kernel Contract Tests\"\n        BROADER[kernel_handle_contract_broader<br/>roster · goals · A2A · events]\n        CRON[kernel_handle_contract_cron_spawn<br/>cron CRUD · agent spawn]\n        MEM[kernel_handle_contract_memory<br/>store/recall/list · security]\n        RBAC[kernel_handle_contract_rbac<br/>user policy resolution]\n        SPAWN[kernel_handle_contract_spawn_checked<br/>capability escalation guard]\n        TASK[kernel_handle_contract_task<br/>post · claim · complete]\n    end\n\n    subgraph \"Subsystem Integration\"\n        ASYNC[async_task_tracker_test<br/>register · complete · dedupe · recovery]\n        AUDIT[audit_retention_test<br/>periodic trim · self-audit]\n        COMPACT[cron_compaction_test<br/>LLM summarization · fallback · tool pairs]\n        MULTI[multi_agent_test<br/>hand lifecycle · settings · triggers]\n    end\n\n    subgraph \"End-to-End\"\n        INTEG[integration_test<br/>Groq pipeline · multi-model fleet]\n        RBAC_M3[rbac_m3_evaluate_tool_call<br/>deny/allow/approval matrix]\n        PURGE[purge_sentinels_test<br/>CLI binary · dry-run · idempotency]\n    end\n\n    COMMON --> BROADER\n    COMMON --> CRON\n    COMMON --> MEM\n    COMMON --> RBAC\n    COMMON --> SPAWN\n    COMMON --> TASK\n    MOCK --> AUDIT\n```\n\n## Shared Infrastructure\n\n### `common/mod.rs`\n\nTwo boot helpers used across contract tests:\n\n- **`boot_kernel()`** — Boots a `LibreFangKernel` with a temp directory, SQLite memory store, networking disabled, no users. Returns `(LibreFangKernel, TempDir)`.\n- **`boot_kernel_with_users(users)`** — Same but seeds `KernelConfig.users` for RBAC tests.\n\nBoth create the required directory skeleton (`data/`, `skills/`, `workspaces/agents/`, `workspaces/hands/`) and call `LibreFangKernel::boot_with_config`.\n\n### `MockKernelBuilder` (from `librefang-testing`)\n\nUsed by `audit_retention_test.rs` to build a kernel with custom config closures (e.g., `trim_interval_secs`, `max_in_memory_entries`). Returns `(LibreFangKernel, TempDir)`.\n\n## Kernel Handle Contract Tests\n\nAll contract tests operate through the `KernelHandle` trait object (`&dyn KernelHandle`), validating the public API surface that `librefang-runtime` and external consumers rely on.\n\n### Broader (`kernel_handle_contract_broader.rs`)\n\nCovers miscellaneous `KernelHandle` methods:\n\n| Test | Method | Validates |\n|------|--------|-----------|\n| `test_roster_roundtrip` | `roster_upsert`, `roster_members`, `roster_remove_member` | Insert, enumerate, remove |\n| `test_goal_list_active_default_empty` | `goal_list_active` | Empty kernel returns no goals |\n| `test_list_a2a_agents_default_empty` | `list_a2a_agents` | No agents → empty list |\n| `test_get_a2a_agent_url_default_none` | `get_a2a_agent_url` | Unknown agent → `None` |\n| `test_kill_agent_unknown_returns_error` | `kill_agent` | Nonexistent agent → `Err` |\n| `test_publish_event_succeeds` | `publish_event` | Publishing an arbitrary event succeeds |\n\n### Cron and Spawn (`kernel_handle_contract_cron_spawn.rs`)\n\nTests cron job creation and agent spawning metadata:\n\n- **`test_cron_create_preserves_peer_id`** — `cron_create` round-trips the `peer_id` field.\n- **`test_cron_create_without_peer_id`** — Omitting `peer_id` results in `null`, not an error.\n- **`test_spawn_agent_returns_valid_identity`** — `spawn_agent` returns `(id, name)` and the agent appears in `list_agents`.\n- **`test_list_agents_returns_manifest_metadata`** — `list_agents` and `find_agents` return manifest fields (name, description).\n\n### Memory (`kernel_handle_contract_memory.rs`)\n\nValidates the memory subsystem's isolation model and security boundary.\n\n**Namespace isolation:**\n\n- `memory_store` / `memory_recall` / `memory_list` isolate global (`None` peer_id) from peer-scoped namespaces. Storing `\"key1\"` globally and as `\"peer-a\"` / `\"peer-b\"` returns the correct value per scope.\n- `memory_list` returns only keys in the requested scope.\n\n**Security boundary (#5119, #5120):**\n\nThe following inputs are rejected at the `KernelHandle` boundary with `KernelOpError::InvalidInput`, and tests assert the **side effect** (no data leakage), not just the error variant:\n\n| Attack vector | Rejection | Side-effect assertion |\n|---------------|-----------|----------------------|\n| Key prefixed `peer:` | Rejected on store and recall | Victim namespace stays empty |\n| `peer_id` containing `:` | Rejected on store, recall, list | No cross-namespace leakage |\n| Empty `peer_id` | Rejected on store, recall, list | Global namespace unmodified |\n| Pre-fix planted rows (`peer:victim:peer:other:secret`) | Not enumerable via `memory_list(Some(\"victim\"))` | Round-trip guard drops structurally-impossible keys |\n\n**Substrate validation (#5138):**\n\n- Empty key rejected — no nameless row lands in the substrate.\n- Oversized value (>256 KiB) rejected — the key is never created.\n- `test_concurrent_goal_update_loses_no_writes_5138` — Two threads concurrently update different goals. Uses `std::thread::scope` with 20 iterations each. Asserts both goals reach their final status (no lost updates from the pre-fix get→mutate→set pattern).\n\n### RBAC (`kernel_handle_contract_rbac.rs`)\n\nTests user-policy resolution through `resolve_user_tool_decision` and `memory_acl_for_sender`:\n\n- **Unconfigured kernel** — No registered users: `resolve_user_tool_decision` returns `Allow` (guest mode).\n- **Configured user, matching channel** — Bound Telegram sender receives the configured deny.\n- **Unknown sender** — Falls back to guest gate (`NeedsApproval`), not a registered user's policy.\n- **Wrong channel** — Same sender ID on a different channel does not match.\n- **Memory ACL** — `memory_acl_for_sender` returns `None` for unconfigured or mis-routed users.\n- **Delegation** — `requires_approval_with_context` and `is_tool_denied_with_context` delegate to their context-free counterparts in default config.\n\n### Spawn Checked (`kernel_handle_contract_spawn_checked.rs`)\n\nTests `spawn_agent_checked`, which enforces capability non-escalation:\n\n- Succeeds with empty parent caps, with a parent ID, and with specific capabilities.\n- **Rejects capability escalation** — A child manifest requesting `shell_exec` when the parent only has `FileRead(\"/data/*\")` returns an error mentioning \"escalation\" or \"capability\".\n\n### Task (`kernel_handle_contract_task.rs`)\n\nFull task lifecycle through `KernelHandle`:\n\n1. `task_post` — Creates a task with optional `assigned_to` and `created_by`. Both fields are preserved in `task_list` output.\n2. `task_claim` — Returns the assigned task for an agent.\n3. `task_complete` — Updates status to `\"completed\"` with a result string.\n4. Unassigned task — `task_post` with `None` assignment results in null/empty `assigned_to`.\n\n## Async Task Tracker (`async_task_tracker_test.rs`)\n\nTests the `register_async_task` / `complete_async_task` pair — the kernel-side registry for tracking async work (workflows, delegations) across agent loop turns.\n\n### Core lifecycle\n\n| Test | Validates |\n|------|-----------|\n| `register_inserts_into_registry_and_returns_handle` | Registration increments `pending_async_task_count`, handle is lookable up by ID |\n| `complete_workflow_task_injects_signal_into_originating_session` | Completion injects `AgentLoopSignal::TaskCompleted` on the injection channel, removes registry entry |\n| `complete_delegation_task_injects_signal_with_delegation_kind` | Delegation completions preserve `(agent_id, prompt_hash)` in the signal |\n| `complete_unknown_task_id_returns_ok_false` | Unknown ID returns `Ok(false)`, no panic |\n\n### Delivery paths\n\n- **Mid-turn delivery** — When an injection receiver is attached, `complete_async_task` returns `Ok(true)` and the signal arrives on the channel.\n- **Idle delivery** — When no receiver is attached and `self_handle` is unset, returns `Ok(false)`. The entry is still removed (delete-on-delivery contract).\n- **Wake-idle path** — When `self_handle` is set (via `set_self_handle`), the kernel spawns a `tokio::task` to drive a turn, returning `Ok(true)`.\n- **Backpressure fallthrough** — When the injection channel is full (`TrySendError::Full`), the kernel falls through to the wake-idle path instead of propagating the error. Test uses a capacity-1 channel pre-saturated with a stray signal.\n\n### Deduplication (#5033)\n\n| Test | Behavior |\n|------|----------|\n| `register_dedupes_workflow_kind_against_existing_run_id` | Same `TaskKind::Workflow { run_id }` returns the existing handle, count stays 1 |\n| `register_dedupes_delegation_kind_against_existing_target_and_hash` | Same `(agent_id, prompt_hash)` returns the existing handle |\n| `register_does_not_dedupe_distinct_delegations_to_same_target` | Different `prompt_hash` → distinct handles |\n| `register_dedupe_is_cross_session_for_delegation_kind` | **Intentional**: same `(target, prompt_hash)` from different `(agent, session)` callers returns the same handle. Completion routes to the first caller's session only. Callers needing per-session isolation must salt their `prompt_hash`. |\n\n### Idempotency and recovery\n\n- **`double_completion_is_a_noop_on_second_call`** — Second call returns `Ok(false)`, only one signal lands.\n- **`recovery_synthesizes_failed_event_for_matching_pending_workflow`** — `synthesize_task_failures_for_recovered_runs` drains matching entries and injects a `Failed(\"workflow run interrupted by daemon restart\")` signal.\n- **`recovery_noop_when_no_pending_task_matches_recovered_run`** — Non-matching run ID is a no-op.\n\n### Type contract\n\n- **`workflow_run_id_canonical_definition_lives_in_types_crate`** — `librefang_kernel::workflow::WorkflowRunId` is a re-export of `librefang_types::task::WorkflowRunId`, not a parallel newtype.\n\n## Audit Retention (`audit_retention_test.rs`)\n\nTests the periodic audit log trim task:\n\n1. Seeds 50 audit entries (well over the configured `max_in_memory_entries = 10`).\n2. Calls `start_background_agents()` to spawn the periodic trim task.\n3. Waits ~2.5 seconds for the 1-second trim interval to fire.\n4. Asserts the log length drops to near the cap (≤20, accounting for boot-time writes).\n5. Asserts a `RetentionTrim` self-audit row appears.\n6. Asserts chain integrity (`verify_integrity`) is maintained.\n\nRequires `#![recursion_limit = \"256\"]` due to deeply nested async closures from `start_background_agents()`.\n\n## Cron Compaction (`cron_compaction_test.rs`)\n\nTests session compaction via `librefang_runtime::compactor`:\n\n### H2 gap 1 — Successful summarization\n\n`compact_session` with a `FakeDriver` returns a non-empty summary with `used_fallback = false`. The output is `[summary_msg] + kept_tail` (1 summary + `keep_recent` messages).\n\n### H2 gap 2 / M4 — LLM failure fallback\n\n`compact_session` with a `FailingDriver` returns `Ok(result)` with `used_fallback = true`. The M4 guard (`!result.summary.is_empty() && !result.used_fallback`) correctly rejects the fallback placeholder.\n\n### H1 — Tool pair integrity\n\n`adjust_split_for_tool_pair` shifts the split point so an `Assistant{ToolUse}` / `User{ToolResult}` pair is never separated across the summary/tail boundary. Test constructs a 10-message sequence with a pair at indices 6-7 and verifies the raw split (7) is adjusted past the ToolResult.\n\n## Multi-Agent / Hand Lifecycle (`multi_agent_test.rs`)\n\nComprehensive hand lifecycle tests covering activation, deactivation, settings, triggers, and persistence.\n\n### Hand definitions used\n\n| Constant | ID | Agents | Notes |\n|----------|----|--------|-------|\n| `HAND_A` | `test-clip` | Single (`main`) | Tools: file_read, file_write, shell_exec |\n| `HAND_B` | `test-devops` | Single (`main`) | Tools: shell_exec |\n| `HAND_C` | `test-research` | `analyst` + `planner` (coordinator) | Explicit non-main coordinator |\n| `HAND_WITH_SETTINGS` | `test-settings` | Single | Has `[[settings]]` with defaults |\n\n### Key behaviors tested\n\n- **Deterministic agent IDs** — `AgentId::from_hand_agent(hand_id, role, None)` produces stable IDs. Single-instance reactivation preserves the same agent ID.\n- **Explicit coordinator** — `HAND_C` uses `coordinator = true` on the planner role; routes resolve to the planner, not the first-defined agent.\n- **Deactivation kills agents** — `deactivate_hand` removes agents from the registry.\n- **Pause/resume** — Agents remain alive while paused; status transitions correctly.\n- **Tags** — Agents are tagged with `hand:{hand_id}` and `hand_instance:{instance_id}`.\n- **Tool inheritance** — Hand-level `tools` are applied to the agent manifest capabilities.\n- **Provider resolution** — `\"default\"` provider sentinel is resolved to the kernel's actual provider at activation time.\n\n### Settings schema\n\n- **`test_activation_seeds_schema_defaults_into_config`** — Activating with no user overrides fills all settings from their `[[settings]]` defaults.\n- **`test_activation_preserves_user_overrides_over_defaults`** — User-provided values take precedence.\n- **`test_reactivation_backfills_missing_schema_keys`** — When persisted config is missing a key added by schema evolution, reactivation fills it from the default while preserving existing values.\n\n### State persistence\n\n- State file at `data/hand_state.json`, version 5.\n- Persists `instance_id`, `status`, `activated_at`, `updated_at`, `agent_ids` map, `coordinator_role`, and `config`.\n- Multi-agent hands persist the `coordinator_role` field.\n\n### Trigger reactivation\n\n- **`test_reactivation_restores_triggers_to_original_roles`** — Triggers registered on an agent role survive deactivation and reactivation. A reactivated analyst retains its triggers; the planner does not inherit them.\n\n### Live LLM test\n\n`test_six_agent_fleet` — Spawns 6 agents (coder, researcher, writer, ops, analyst, hello-world) with different models and sends a message to each. Skips if `GROQ_API_KEY` is unset.\n\n## Integration Test (`integration_test.rs`)\n\nLive Groq API tests, both marked `#[ignore]`:\n\n- **`test_full_pipeline_with_groq`** — Boot → spawn agent from TOML manifest → `send_message` → assert non-empty response and positive token usage → kill agent.\n- **`test_multiple_agents_different_models`** — Spawns a llama-70b agent and a llama-8b agent concurrently, sends messages to both.\n\nRequires `#![recursion_limit = \"256\"]`.\n\n## RBAC M3 (`rbac_m3_evaluate_tool_call.rs`)\n\nEnd-to-end RBAC policy evaluation with real `LibreFangKernel` (no stubs):\n\n- Boots with `[[users]]` having per-user `tool_policy` and `[tool_policy.groups]`.\n- Tests the deny/allow/approval matrix:\n  - (a) User denies but agent allows → `Deny` (user deny short-circuits).\n  - (c) Both allow → `Allow`.\n  - (d) User policy says `NeedsApproval` → `NeedsApproval`.\n- Tests hot-reload: `reload()` picks up new policy without reboot.\n\n## Purge Sentinels (`purge_sentinels_test.rs`)\n\nTests the `purge_sentinels` CLI binary via `std::process::Command`:\n\n| Test | Behavior |\n|------|----------|\n| `dry_run_reports_counts_and_touches_nothing` | Reports removed line count, files unmodified, no `.bak` created |\n| `apply_creates_backup_and_rewrites` | Creates `.bak` with original content; removes whole-line sentinels (`NO_REPLY`, `[no reply needed]`, `  no_reply  `); preserves sentence-embedded sentinels |\n| `apply_is_idempotent` | Second run reports 0 removals; files and backups unchanged |\n| `apply_aborts_when_existing_bak_differs` | Pre-seeded stale `.bak` causes non-zero exit with \"backup mismatch\" error |\n| `nonexistent_path_exits_non_zero` | Invalid path → error containing \"does not exist\" |\n\n## Running the Tests\n\nMost tests run offline. Some require environment variables:\n\n```bash\n# Full suite (offline tests only)\ncargo test -p librefang-kernel\n\n# Live LLM tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test integration_test -- --nocapture --ignored\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test multi_agent_test test_six_agent_fleet -- --nocapture --ignored\n```\n\nSeveral test files require `#![recursion_limit = \"256\"]` due to deeply monomorphized futures from `send_message_full` / `start_background_agents` (specifically `audit_retention_test.rs`, `integration_test.rs`, `multi_agent_test.rs`).","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nCore orchestration layer for the LibreFang Agent Operating System. Manages agent lifecycles, scheduling, permissions, inter-agent communication, and the message-handling loop that dispatches requests to LLM drivers, tools, and the memory substrate.\n\n## Architecture Positioning\n\n```mermaid\ngraph TD\n    API[\"librefang-api<br/>(HTTP/WS surface)\"]\n    KERN[\"librefang-kernel<br/>(orchestration)\"]\n    RT[\"librefang-runtime<br/>(execution / agent loop)\"]\n    MEM[\"librefang-memory<br/>(storage)\"]\n    DRV[\"librefang-llm-drivers<br/>(LLM HTTP calls)\"]\n    API --> KERN\n    RT --> KERN\n    KERN --> MEM\n    KERN --> RT\n    RT --> DRV\n```\n\nThe kernel sits below the HTTP surface (`librefang-api`) and above both the execution layer (`librefang-runtime`) and storage layer (`librefang-memory`). It never makes direct LLM HTTP calls — all model interaction goes through `librefang-runtime` drivers.\n\n## Dependency Boundaries\n\n**The kernel does NOT depend on** `librefang-api` or `librefang-extensions`. When runtime or extensions need a kernel callback, the dependency is inverted through the `KernelHandle` trait (defined in `librefang-runtime`).\n\n**The kernel owns:** registry, scheduling, approval, auth, auto_dream, cron, event_bus, inbox, pairing, scheduler, session_lifecycle, plus re-exported `metering` (from `librefang-kernel-metering`) and `router` (from `librefang-kernel-router`).\n\n**The kernel does NOT own:** the agent loop body, tool dispatch, channel adapters, HTTP routing, or the dashboard SPA. Those live in `librefang-runtime`, `librefang-channels`, and `librefang-api` respectively.\n\n## Key Components\n\n### `kernel::LibreFangKernel`\n\nThe top-level orchestrator struct. Boot via:\n\n```rust\nlet kernel = LibreFangKernel::boot_with_config(KernelConfig { ... });\n```\n\nThis is currently a large struct (~18k LOC, 50+ fields — tracked in #3565). Adding new fields requires coordination per the guidelines below.\n\n### `registry::AgentRegistry`\n\nConcurrent agent table providing spawn, lookup, and kill operations for agents.\n\n### `kernel::cron`\n\nCron-based job scheduling. Session mode resolution follows a priority cascade: per-job override → manifest value → historical `Persistent` setting.\n\n### `kernel::event_bus`\n\nBroadcast event bus. Event history is stored as `parking_lot::Mutex<VecDeque<Arc<Event>>>` (changed in #3385). Do not switch back to `RwLock<VecDeque<Event>>` — the previous design caused contention issues.\n\n### `kernel::session_lifecycle`\n\nSession state machine managing the lifecycle of agent sessions.\n\n### `metering` (re-exported from `librefang-kernel-metering`)\n\nToken and cost accounting. Reads from the kernel's `model_catalog` for pricing data.\n\n### `router` (re-exported from `librefang-kernel-router`)\n\nModel router with alias resolution. Selects the appropriate LLM provider and model based on configuration and request context.\n\n## Hot Fields and Lock Strategies\n\n`LibreFangKernel` uses different concurrency primitives depending on access patterns. Choose the right one when adding fields:\n\n| Field | Type | Strategy | Rationale |\n| --- | --- | --- | --- |\n| `model_catalog` | `arc_swap::ArcSwap<ModelCatalog>` | Atomic-load reads, RCU writes via `model_catalog_update(\\|cat\\| ...)` | Hot read, rare write (#3384). Never use `RwLock<ModelCatalog>`. |\n| `skill_registry` | `std::sync::RwLock<SkillRegistry>` | Brief reads; copy out what you need | Hot-reload on skill install/uninstall. |\n| `running_tasks` | `dashmap::DashMap<(AgentId, SessionId), RunningTask>` | Concurrent map | Keyed by `(agent, session)` tuple, not `AgentId` alone. Pre-#3172 used `AgentId` which silently overwrote concurrent loops. |\n| `mcp_oauth_provider` | `Arc<dyn McpOAuthProvider + Send + Sync>` | Pluggable trait object | Implemented in `librefang-api` to keep the daemon free of HTTP. All new OAuth flows go through this trait. |\n\n### Decision framework for lock strategy\n\n- **Hot read, rare write** → `arc_swap::ArcSwap<T>`\n- **Hot read, hot write** → `parking_lot::Mutex<T>` or `dashmap::DashMap<K, V>`\n- **Append-only history** → `parking_lot::Mutex<VecDeque<Arc<T>>>`\n\n## Determinism Requirements\n\nAnything that reaches an LLM prompt **must** be deterministically ordered before stringifying. Use `BTreeMap` / `BTreeSet` exclusively. `HashMap` iteration order varies across processes and silently invalidates provider prompt caches.\n\nRegression tests guard these boundaries — see `kernel::tests::mcp_summary_is_byte_identical_across_input_orders`.\n\nReference: #3298.\n\n## Configuration Knobs\n\nKernel-side configuration is managed through `KernelConfig`:\n\n| Knob | Default | Description |\n| --- | --- | --- |\n| `max_history_messages` | varies | Global default for conversation history length. Clamped up to `MIN_HISTORY_MESSAGES = 4` with a WARN log if set lower. Per-agent override available in `agent.toml`. |\n| `queue.concurrency.trigger_lane` | 8 | Global semaphore size for `Lane::Trigger`. |\n| `queue.concurrency.default_per_agent` | 1 | Fallback concurrency when `agent.toml: max_concurrent_invocations` is unset. |\n| `workflow_stale_timeout_minutes` | varies | Cutoff threshold used by `recover_stale_running_runs` at boot time. |\n\n## Adding a New Field to `LibreFangKernel`\n\nFollow this checklist:\n\n1. **Visibility:** Field must be `pub(crate)` unless an external crate genuinely needs read access.\n2. **Config default:** If the field has a config-side counterpart, add it to the `Default` impl on `KernelConfig`. Missing this silently breaks the build.\n3. **Trait objects:** If the field is `Option<Arc<dyn Trait>>`, mark it `#[serde(skip)]` and implement `Serialize`, `Deserialize`, `Clone`, and `Debug` manually.\n4. **Lock strategy:** Choose from the decision framework above based on read/write frequency.\n\n## Testing\n\n### Unit tests\n\nMost kernel unit tests live inside `crates/librefang-kernel/src/kernel/`. Run them with:\n\n```sh\ncargo test -p librefang-kernel\n```\n\n### Integration tests\n\nTests requiring a real router live in `librefang-api/tests/` using `#[tokio::test]` against `TestServer` (refs #3721).\n\n### Forbidden commands\n\n- **`cargo test`** (workspace-wide) — causes `target/` contention with the user's active session.\n- **`cargo build`** — use `cargo check --workspace --lib` instead. Real builds run in CI.\n\n## Hard Rules (Taboos)\n\n| Rule | Reason |\n| --- | --- |\n| No daemon spawning | The CLI binary owns the `start` command. Kernel just runs. |\n| No `tokio::block_on` | We are already inside a runtime. Nesting causes panics or deadlocks. |\n| No direct LLM HTTP calls | Go through `librefang-runtime` drivers. |\n| No `Result<_, String>` returns on `KernelHandle` methods | Use typed errors (#3541). |\n| No `HashMap<K, V>` in fields that end up in LLM prompts | Use `BTreeMap` for determinism (#3298). |\n\n## Key Crate Dependencies\n\n| Dependency | Purpose |\n| --- | --- |\n| `librefang-types` | Shared type definitions |\n| `librefang-memory` | Storage substrate |\n| `librefang-memory-wiki` | Wiki-style memory |\n| `librefang-kernel-router` | Model routing and alias resolution (re-exported) |\n| `librefang-kernel-metering` | Token and cost accounting (re-exported) |\n| `librefang-runtime` | Agent loop execution, tool dispatch |\n| `librefang-skills` | Skill system |\n| `librefang-hands` | Tool/hand management |\n| `librefang-llm-driver` / `librefang-llm-drivers` | LLM provider abstractions |\n| `librefang-wire` | Wire protocol types |\n| `librefang-channels` | Channel adapters (default features disabled) |\n| `dashmap` | Concurrent hash maps |\n| `arc-swap` | Atomic RCU-style swaps |\n| `parking_lot` | Efficient sync primitives |\n| `tera` | Jinja2-style templating for workflow `Transform` operations — sandboxed, no I/O or shell escape |","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nTrait definition and shared error types for LLM driver interactions. This crate contains **no concrete provider implementations** — only the interface that providers implement and the error types they return.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver] -->|defines trait| B[LlmDriver]\n    A -->|defines enum| C[LlmError]\n    D[librefang-llm-drivers] -->|implements| B\n    D -->|returns| C\n    E[librefang-testing] -->|mock impl| B\n    F[librefang-types] -->|shared domain types| A\n```\n\nThe sibling crate `librefang-llm-drivers` (note the trailing **s**) holds all concrete provider implementations: Anthropic, OpenAI, Gemini, Groq, and any future additions. Test crates depend on this crate alone for mock driver setup, avoiding transitive `reqwest` and TLS dependencies.\n\n## Why Two Crates\n\nSplitting trait from implementations is intentional and must be preserved. Merging them would force every test crate that needs a mock `LlmDriver` to pull in the full HTTP stack of every provider. This is not worth trading for \"simplicity.\"\n\n## Key Components\n\n### `LlmDriver` Trait\n\nThe async trait that every LLM provider must implement. Defined in `lib.rs`. All provider implementations live in `librefang-llm-drivers` and satisfy this interface.\n\n### `LlmError` Enum\n\nDefined in `llm_errors.rs`. The single error type returned by `LlmDriver` methods.\n\nDesign rules for `LlmError`:\n\n- **Structured variants only.** Each variant is a typed enum field — no `String` catch-all, no `Box<dyn Error>` in trait return types.\n- **Composable semantics.** Every variant can answer: *Is this retryable? Is this a quota or auth issue? Did the model produce invalid output?* Methods like `is_retryable()` live on the enum.\n- **Partial response preservation.** The `Partial` variant carries bytes received so far when a streaming error occurs. Callers use this to settle metering and billing.\n- **Source chain intact.** Variants that wrap underlying errors preserve the `source()` chain (per #3745). Use `#[source]` attribute from `thiserror`.\n\n### Shared Driver-Side Types\n\nCommon types used across multiple provider implementations. These live here so they can be shared without creating circular dependencies.\n\n## Dependencies\n\nIntentionally minimal:\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types |\n| `async-trait` | Trait definition |\n| `dashmap` | Concurrent maps for driver-side caching/state |\n| `serde` / `serde_json` | Serialization of request/response types |\n| `thiserror` | Error derive macros |\n| `tokio` | Async runtime primitives |\n| `tracing` | Instrumentation |\n\n**Not present and must never be added:** `reqwest`, any TLS crate, any vendored provider SDK.\n\n## Adding a New LLM Provider\n\nDo **not** modify this crate. The new driver belongs in `librefang-llm-drivers`.\n\nYou only need to touch this crate if one of these is true:\n\n- **A new trait method is needed.** Extremely rare. Open an issue to discuss before implementing.\n- **A new `LlmError` variant is needed.** Add a structured variant with typed fields. Preserve the `source()` chain.\n- **A new shared type is needed** across multiple providers.\n\n## Testing\n\nTrait conformance is verified through mock drivers in `librefang-testing`, specifically via `MockKernelBuilder`. D
