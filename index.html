` | Local providers flagged with `is_local` |\n| Agent CRUD | `POST/GET/DELETE /api/agents` | Spawn, list (paginated), kill, idempotent delete |\n| Sessions | `GET /api/agents/{id}/session` | Cross-agent session isolation (404 guard), trajectory export |\n| Workflows | `POST/GET /api/workflows` | CRUD, run aggregation fields |\n| Triggers | `POST/GET/DELETE /api/triggers` | CRUD, agent-scoped filtering |\n| Config reload | `POST /api/config/reload` | Hot-reload of proxy settings |\n| Migration | `POST /api/migrate` | OpenClaw import with loopback ConnectInfo |\n| Monitoring | `GET /api/agents/{id}/metrics`, `/logs` | Audit log filtering, token usage |\n\nLLM-backed tests gated behind `GROQ_API_KEY` env var (`test_send_message_with_llm`).\n\n### `agents_routes_integration.rs`\n\nFocused on the `/api/agents` family using `tower::oneshot` against the full router:\n\n- **List**: empty filter, populated list, invalid sort field rejection (`?sort=not_a_field` → 400)\n- **Get**: happy path, invalid UUID → 400 (`invalid_agent_id`), unknown UUID → 404 (`agent_not_found`)\n- **PATCH**: update name/description with read-after-write verification, invalid `mcp_servers` payload, auth gate (401 without Bearer when `api_key` is set)\n- **DELETE**: idempotent double-delete (both return 200, second has `status: \"already-deleted\"`), invalid UUID still 400, `?confirm=true` gate (#4614)\n- **Session thinking blocks**: `ContentBlock::Thinking` surfaced in session endpoint (multi-block join with `\\n\\n`), thinking-only turns not dropped, omission when no thinking present\n- **Incognito mode**: `incognito: true` accepted without 422, defaults to false when omitted\n\n### `a2a_routes_integration.rs`\n\nCovers Agent-to-Agent federation routes. Mutating endpoints (`/discover`, `/send`, `/tasks/{id}/status`) are tested only on validation/error paths — happy-path discovery requires a live external A2A server.\n\n- `GET /a2a/agents` — public federation listing, always accessible even with `api_key` set. Asserts canonical `PaginatedResponse` envelope (no legacy `agents` field)\n- `GET /api/a2a/agents` — dashboard listing, reachable without auth in dev mode\n- `GET /api/a2a/agents/{id}` — 404 for unknown, 401 without auth\n- `POST /api/a2a/discover` — 400 for missing URL, invalid URL, localhost (SSRF guard via `is_url_safe_for_ssrf`)\n- `POST /api/a2a/send` — 400 for missing `url`/`message`, trust gate blocks unapproved targets (regression guard for #3786)\n- `GET /api/a2a/tasks/{id}/status` — 400 for missing `?url=`, trust gate, auth required\n- `POST /api/a2a/agents/{id}/approve` — 404 for unknown pending, auth required\n\n### `access_log_agent_id_test.rs`\n\nVerifies that `AgentIdField` is attached to response extensions when a handler resolves an agent ID from the path. The access-log middleware reads this marker to emit a structured `agent_id` tracing field.\n\n- **404 with marker**: unknown agent ID on `PUT /api/auto-dream/agents/{id}/enabled` and `GET /api/budget/agents/{id}` — handler still tags the response because the path was well-formed\n- **Malformed path no marker**: `not-a-uuid` rejected by `AgentIdField` extractor at 400 before handler runs, so no marker is set\n\n### `access_log_session_id_test.rs`\n\nSame pattern as the agent ID test, but for `SessionIdField`.\n\n- **Session found**: `GET /api/agents/{id}/session` with a registered agent — marker present\n- **Agent not found**: unknown agent ID — marker absent (no session resolved)\n- **Stream 404**: `GET /api/agents/{id}/sessions/{session_id}/stream` — error before tagging site, marker absent\n\n### `agent_identity_registry_test.rs`\n\nEnd-to-end tests for the canonical agent UUID registry (#4614). Uses a real TCP server.\n\n- **Spawn registers**: `spawn_agent` records the canonical UUID in `kernel.agent_identities()`\n- **Delete gates**: bare `DELETE` → 409 (`delete_confirmation_required`), `?confirm=true` → 200 with `identity_purged: true`\n- **Respawn recovers UUID**: after confirmed delete, re-spawning the same agent name yields the same deterministic UUID via `AgentId::from_name`\n- **List identities**: `GET /api/agents/identities` returns registered entries with `canonical_uuid` and `created_at`\n- **Reset identity**: `POST /api/agents/identities/{name}/reset` gates on `?confirm=true` (409 without), 200 with `previous_canonical_uuid`, 404 on missing name\n\n### `agent_kv_authz_integration.rs`\n\nOwner-scoping on the per-agent KV store (#3749). Injects `AuthenticatedApiUser` extensions directly to model different roles.\n\nFor `GET/PUT/DELETE /api/memory/agents/{id}/kv*` and `GET/POST /api/agents/{id}/memory/{export,import}`:\n\n- **Admin** (`UserRole::Admin`): can read/write any agent's KV\n- **Owner** (`UserRole::Viewer` matching agent's author): allowed\n- **Non-owner viewer**: 404 (not 403 — prevents agent existence enumeration)\n- **Anonymous** (no extension): proceeds (global auth middleware handles the gate elsewhere)\n\n## Harness Patterns\n\n### Booting the Full Router\n\n```rust\nasync fn boot(api_key: &str) -> Harness {\n    let tmp = tempfile::tempdir().expect(\"tempdir\");\n    librefang_kernel::registry_sync::sync_registry(tmp.path(), /* ... */);\n\n    let config = KernelConfig {\n        home_dir: tmp.path().to_path_buf(),\n        api_key: api_key.to_string(),\n        default_model: DefaultModelConfig { provider: \"ollama\", /* ... */ },\n        ..KernelConfig::default()\n    };\n\n    let kernel = Arc::new(LibreFangKernel::boot_with_config(config).expect(\"kernel boot\"));\n    kernel.set_self_handle();\n\n    let (app, state) = server::build_router(kernel, \"127.0.0.1:0\".parse().unwrap()).await;\n    Harness { app, state, _tmp: tmp }\n}\n```\n\nThe `_tmp` field keeps the temp directory alive for the test's duration. `Harness::Drop` calls `state.kernel.shutdown()`.\n\n### Sending Requests\n\nMost tests use `tower::ServiceExt::oneshot` directly:\n\n```rust\nlet resp = harness.app.clone().oneshot(request).await.unwrap();\nlet status = resp.status();\nlet body: serde_json::Value = /* parse response body */;\n```\n\nTests requiring real TCP (WebSocket, connection-level headers) use `reqwest::Client` against a spawned server.\n\n### Auth Simulation\n\nTwo approaches:\n\n1. **Bearer token in header** — full router processes it through the production auth middleware. Used when testing the auth gate itself.\n2. **Extension injection** — `request.extensions_mut().insert(AuthenticatedApiUser { ... })`. Used in sub-router tests to bypass the middleware and test handler-level authorization logic directly.\n\n## Key Contracts Verified\n\n| Contract | Test file | Description |\n|----------|-----------|-------------|\n| Idempotent DELETE | `agents_routes_integration.rs` | Double-delete returns 200 both times; malformed UUID still 400 |\n| Delete confirmation gate | `agent_identity_registry_test.rs` | Bare DELETE → 409; `?confirm=true` → 200 with purge |\n| Cross-agent session isolation | `api_integration_test.rs` | Agent A cannot read Agent B's session by guessing UUID |\n| Trust gate on A2A send | `a2a_routes_integration.rs` | Unapproved target rejected before any outbound HTTP |\n| SSRF guard on A2A discover | `a2a_routes_integration.rs` | localhost URLs blocked with 400 |\n| KV owner-scoping | `agent_kv_authz_integration.rs` | Non-owner viewer gets 404 on get/set/delete/export/import |\n| Thinking block persistence | `agents_routes_integration.rs` | `ContentBlock::Thinking` survives session serialization |\n| Access log markers | `access_log_*.rs` | `AgentIdField`/`SessionIdField` set on responses even for 404s |\n| Canonical envelope shape | `a2a_routes_integration.rs` | `PaginatedResponse` with `items`/`total`/`offset`/`limit`, no legacy fields |\n| API versioning | `api_integration_test.rs` | Path version beats unknown Accept header; `x-api-version` always present |\n\n## Running\n\n```bash\n# All tests in this directory\ncargo test -p librefang-api\n\n# Specific test file\ncargo test -p librefang-api --test agents_routes_integration\n\n# LLM-backed test (requires GROQ_API_KEY)\nGROQ_API_KEY=... cargo test -p librefang-api --test api_integration_test -- test_send_message_with_llm\n```","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nHTTP and WebSocket API server for the LibreFang Agent OS daemon. This crate is the primary network-facing surface through which CLI clients, desktop applications, mobile apps, and web browsers interact with the in-process agent kernel.\n\n## Role in the System\n\n`librefang-api` sits between external consumers and the core `librefang-kernel`. It translates JSON REST requests and WebSocket frames into kernel operations, and streams results back. The kernel runs in the same process — there is no IPC boundary between the API layer and the agent runtime.\n\n```mermaid\ngraph LR\n    subgraph Clients\n        CLI[CLI / Desktop]\n        WEB[Browser SPA]\n        MOBILE[Mobile App]\n        PEER[Peer / A2A]\n    end\n    API[librefang-api<br/>axum + WebSocket]\n    K[kernel]\n    subgraph Kernel Services\n        CH[channels]\n        MEM[memory]\n        LLM[llm-drivers]\n        SK[skills / hands]\n    end\n    CLI -->|HTTP/WS| API\n    WEB -->|HTTP/WS| API\n    MOBILE -->|HTTP/WS| API\n    PEER -->|HTTP/WS| API\n    API --> K\n    K --> CH\n    K --> MEM\n    K --> LLM\n    K --> SK\n```\n\n## Public Entry Points\n\n| Symbol | Purpose |\n|---|---|\n| `server::build_router(kernel, addr)` | Assembles the complete axum `Router` with all routes, middleware, and shared `AppState`. This is the single function callers invoke to get a runnable server. |\n| `routes::*` | Endpoint handlers organized by domain (sessions, channels, approvals, MCP, peers/A2A, etc.). |\n| `middleware` | Authentication gates, rate limiting, and telemetry injection. Defines `PUBLIC_ROUTES_ALWAYS`, `PUBLIC_ROUTES_GET_ONLY`, and `PUBLIC_ROUTES_DASHBOARD_READS` for unauthenticated access control. |\n| `ws` | WebSocket authentication and streaming handlers for real-time event delivery. |\n\n## Architecture\n\n### Router Construction\n\n`build_router` wires together:\n\n1. **Route definitions** from `routes::*` — REST endpoints grouped by domain\n2. **Middleware stack** — authentication, rate limiting (via `governor`), request tracing\n3. **Static file serving** — the embedded React dashboard SPA\n4. **WebSocket upgrade paths** — for live session and event streams\n5. **OpenAPI spec generation** — via `utoipa` with `axum_extras` support\n\n### Shared State (`AppState`)\n\nThe router carries an `AppState` containing the kernel handle and any shared configuration. All route handlers receive this state through axum's state extraction.\n\n### Authentication\n\nThe middleware layer categorizes routes into three access tiers:\n\n- **`PUBLIC_ROUTES_ALWAYS`** — accessible without credentials (e.g., login, health checks)\n- **`PUBLIC_ROUTES_GET_ONLY`** — readable without auth, writes require auth\n- **`PUBLIC_ROUTES_DASHBOARD_READS`** — dashboard read-only endpoints accessible without full auth\n\nAll other routes require a valid authentication token (JWT via `jsonwebtoken`, verified with HMAC-SHA256 via `hmac`/`sha2`, passwords hashed with `argon2`).\n\n### Rate Limiting\n\nRequest throttling uses the `governor` crate, applied at the middleware layer before route matching.\n\n## Feature Flags\n\nThe crate has an extensive feature flag system controlling which channel adapters are compiled in. This avoids paying compile-time costs for adapters you don't use.\n\n### Channel Features\n\nEach `channel-<name>` flag forwards to the corresponding feature in `librefang-channels`. Available channels include: telegram, discord, slack, matrix, email, webhook, whatsapp, signal, teams, mattermost, irc, google-chat, twitch, rocketchat, zulip, xmpp, bluesky, feishu, line, mastodon, messenger, reddit, revolt, viber, flock, guilded, keybase, nextcloud, nostr, pumble, threema, twist, webex, dingtalk, discourse, gitter, gotify, linkedin, mumble, ntfy, qq, voice, wechat, wecom.\n\n### Feature Groups\n\n| Feature | Description |\n|---|---|\n| `default` | Enables `core-channels` + `telemetry` |\n| `core-channels` | Telegram, Discord, Slack, Webhook, ntfy — lightweight adapters using only `reqwest` + `rustls` |\n| `mini` | 12 channels covering the most common integration points |\n| `all-channels` | Every channel adapter |\n| `all-channels-no-email` | All channels except email (for Android targets where `rustls-platform-verifier` lacks `new_with_extra_roots` support) |\n| `telemetry` | OpenTelemetry tracing export + Prometheus metrics endpoint |\n\nWhen adding a channel to `core-channels`, verify its dependency tree stays light — each member should only use the workspace HTTP stack.\n\n### Platform-Specific Dependencies\n\n- **Unix**: `rustix` (process features) and `libc` for system-level operations\n- **Windows**: `windows-sys` with `Win32_Security` features for ACP named-pipe listener — restricts the pipe DACL to the daemon's owner SID so other local users cannot connect\n\n## Dashboard SPA\n\nThe React dashboard lives in `dashboard/` (TypeScript / React / TanStack Query). It is:\n\n1. Built by `cargo xtask build-web`\n2. Embedded into the binary via `include_dir!` from the `static/react/` directory\n3. Served as static files by the API server\n\nWhen the embedded directory is empty (fresh clones before a web build), the server falls back to serving assets from `~/.librefang/dashboard/` at runtime.\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks:\n\n1. **Ensures the `static/react/` directory exists** — creates it if absent so `include_dir!` doesn't fail on fresh clones. This directory is gitignored since it contains build artifacts.\n\n2. **Captures build metadata** as environment variables available at runtime via `env!()`:\n   - `GIT_SHA` — short commit hash (e.g., `a1b2c3d`)\n   - `BUILD_DATE` — UTC date in `YYYY-MM-DD` format\n   - `RUSTC_VERSION` — full `rustc --version` output\n\nThese are exposed through the API's version/info endpoint.\n\n## OpenAPI Specification\n\nThe crate uses `utoipa` with the `axum_extras` feature for derive-based OpenAPI generation. The committed `openapi.json` at the workspace root is regenerated by:\n\n```\ncargo xtask codegen --openapi\n```\n\nDrift is detected in CI by comparing against hash baselines in `xtask/baselines/`.\n\n## Key Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-kernel` | Core agent runtime — sessions, channels, approvals |\n| `librefang-kernel-handle` | Typed handle to the kernel for ergonomic access |\n| `librefang-types` | Shared type definitions across the workspace |\n| `librefang-acp` | Agent Communication Protocol support (with `kernel-adapter` feature) |\n| `librefang-channels` | Channel adapter implementations (feature-gated) |\n| `librefang-llm-drivers` | LLM provider integrations |\n| `librefang-memory` | Conversation and context memory |\n| `librefang-skills` / `librefang-hands` | Skill execution and tool use |\n| `librefang-extensions` | Extension loading and management |\n| `librefang-wire` | Wire protocol types for WebSocket communication |\n| `librefang-migrate` | Database migration orchestration |\n| `librefang-http` | Shared HTTP client configuration |\n| `librefang-telemetry` | Tracing and metrics infrastructure |\n| `axum` + `tower-http` | HTTP framework and middleware |\n| `tokio` | Async runtime |\n| `serde` / `serde_json` / `schemars` | Serialization and JSON Schema generation |\n| `governor` | Rate limiting |\n| `jsonwebtoken` / `argon2` / `hmac` / `sha2` | Authentication and password hashing |\n\n## Testing\n\nDev-dependencies include `librefang-testing` for test utilities, `librefang-runtime` for integration tests (particularly the tool-exec backend), `totp-rs` for two-factor authentication testing, and `tempfile` for filesystem-based test fixtures.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels-benches\n\nCriterion microbenchmark suite for the channel dispatch hot paths in `librefang-channels`. Measures serialization overhead, routing resolution latency, and formatter throughput — the three operations that sit on every inbound/outbound message path.\n\n## Benchmarked Surfaces\n\n```mermaid\nflowchart LR\n    A[Inbound Message] --> B[serde JSON]\n    B --> C[AgentRouter]\n    C --> D[Formatter]\n    D --> E[Outbound Message]\n    \n    subgraph serialization\n        B\n    end\n    subgraph routing\n        C\n    end\n    subgraph formatting\n        D\n    end\n```\n\nEvery message flows through some combination of these stages. The benchmarks isolate each so regressions can be attributed precisely.\n\n---\n\n## Criterion Groups\n\nThe benchmarks are organized into three independent criterion groups, each runnable in isolation:\n\n```\ncriterion_main!(serialization, routing, formatting);\n```\n\n| Group | Bench functions | Target surface |\n|---|---|---|\n| `serialization` | `bench_message_serialize`, `bench_message_deserialize`, `bench_message_roundtrip` | `ChannelMessage` ↔ JSON via `serde_json` |\n| `routing` | `bench_router_resolve_direct`, `bench_router_resolve_default`, `bench_router_resolve_with_bindings`, `bench_router_resolve_with_context` | `AgentRouter::resolve*` |\n| `formatting` | `bench_format_markdown_passthrough`, `bench_format_telegram_html`, `bench_format_slack_mrkdwn`, `bench_format_plain_text`, `bench_format_short_text`, `bench_split_message_short`, `bench_split_message_long`, `bench_default_phase_emoji` | `format_for_channel`, `split_message`, `default_phase_emoji` |\n\n---\n\n## Serialization Benchmarks\n\nAll three use `make_sample_message()` to construct a representative `ChannelMessage` with a Telegram channel, a text content payload, and a `ChannelUser` sender.\n\n### `bench_message_serialize`\n\nMeasures `serde_json::to_string` on a pre-built `ChannelMessage`. Isolates serialization cost without any allocation from message construction by hoisting message creation out of the iteration loop.\n\n### `bench_message_deserialize`\n\nSerializes once at setup, then benchmarks `serde_json::from_str::<ChannelMessage>` on the resulting JSON string. This tests the parser + struct-materialization path.\n\n### `bench_message_roundtrip`\n\nCombines both operations inside the hot loop — serialize then deserialize. Useful as a proxy for the full per-message serde tax when comparing across branches.\n\n---\n\n## Routing Benchmarks\n\nThese exercise `AgentRouter` under four increasingly complex resolution strategies. Each benchmark sets up its own router instance with the minimal configuration needed for that scenario.\n\n### `bench_router_resolve_direct`\n\nPre-registers a direct route via `router.set_direct_route(\"Telegram\", \"user-42\", agent)`, then benchmarks `router.resolve(ChannelType::Telegram, \"user-42\", None)`. This is the fastest path — a hashmap lookup on the composite `(channel, peer_id)` key.\n\n### `bench_router_resolve_default_fallback`\n\nSets only a default agent (`router.set_default(agent)`) and resolves against an unknown channel/user pair (`Discord`, `\"unknown-user\"`). Measures the fallback-to-default code path.\n\n### `bench_router_resolve_binding_match`\n\nUses the declarative binding system:\n\n```rust\nrouter.register_agent(\"support\", agent);\nrouter.load_bindings(&[AgentBinding {\n    agent: \"support\".to_string(),\n    match_rule: BindingMatchRule {\n        channel: Some(\"telegram\".to_string()),\n        peer_id: Some(\"vip-user\".to_string()),\n        ..Default::default()\n    },\n}]);\n```\n\nThen resolves with a matching query. This exercises the binding-evaluation logic (pattern matching on channel + peer_id) beyond the simple direct-route hashmap.\n\n### `bench_router_resolve_with_context`\n\nThe most complex routing benchmark. Constructs a `BindingContext` with guild and role information:\n\n```rust\nlet ctx = BindingContext {\n    channel: Cow::Borrowed(\"discord\"),\n    peer_id: Cow::Borrowed(\"user-1\"),\n    guild_id: Some(Cow::Borrowed(\"guild-1\")),\n    roles: smallvec::smallvec![Cow::Borrowed(\"admin\"), Cow::Borrowed(\"moderator\")],\n    ..Default::default()\n};\n```\n\nThen calls `router.resolve_with_context(ChannelType::Discord, \"user-1\", None, &ctx)`. This exercises the full matching engine including guild-scoped and role-based rules — the path taken for Discord interactions with role-aware routing.\n\n---\n\n## Formatting Benchmarks\n\nThese test `format_for_channel` across all `OutputFormat` variants, plus auxiliary helpers `split_message` and `default_phase_emoji`.\n\n### Input data\n\n- **`SAMPLE_MARKDOWN`**: A multi-paragraph markdown string containing bold, italic, inline code, links, and bullet lists. Used for all `format_for_channel` benchmarks to ensure consistent comparison across output formats.\n- **`SHORT_TEXT`**: The string `\"Hello world!\"`, used to measure formatter overhead on trivially small payloads.\n\n### `format_for_channel` variants\n\n| Benchmark | `OutputFormat` | What it tests |\n|---|---|---|\n| `bench_format_markdown_passthrough` | `Markdown` | No-op / identity path — measures baseline overhead |\n| `bench_format_telegram_html` | `TelegramHtml` | Markdown → Telegram HTML conversion |\n| `bench_format_slack_mrkdwn` | `SlackMrkdwn` | Markdown → Slack mrkdwn conversion |\n| `bench_format_plain_text` | `PlainText` | Markdown stripping to plain text |\n| `bench_format_short_text` | `TelegramHtml` | Telegram HTML on a minimal input |\n\nComparing `bench_format_markdown_passthrough` against the others reveals the actual conversion cost minus framework overhead. Comparing `bench_format_telegram_html` against `bench_format_short_text` shows how input size scales with conversion time.\n\n### `split_message` variants\n\n- **`bench_split_message_short`**: Splits `\"Hello!\"` with a 4096-byte limit. Measures the no-split fast path.\n- **`bench_split_message_long`**: Splits 500 lines of `\"Line of text here.\\n\"` with a 4096-byte limit. Exercises the actual splitting algorithm.\n\n### `bench_default_phase_emoji_all`\n\nIterates over all `AgentPhase` variants (Queued, Thinking, `tool_use(\"web_fetch\")`, Streaming, Done, Error) and calls `default_phase_emoji` on each. This function is called on every agent status update that reaches a channel, so it needs to stay fast.\n\n---\n\n## Running\n\n```bash\n# All benchmarks\ncargo bench -p librefang-channels\n\n# Single group\ncargo bench -p librefang-changes -- serialization\ncargo bench -p librefang-changes -- routing\ncargo bench -p librefang-changes -- formatting\n\n# Individual benchmark (substring match)\ncargo bench -p librefang-changes -- router_resolve_direct\n```\n\nResults are saved to `target/criterion/` with HTML reports. Use `critcmp` for comparing across branches.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# Bridge Integration Tests\n\n## Purpose\n\nThis module provides end-to-end integration tests for the `BridgeManager` dispatch pipeline in `librefang_channels::bridge`. Every test wires real production components (`BridgeManager`, `AgentRouter`) against mock implementations of `ChannelAdapter` and `ChannelBridgeHandle`, then injects messages through `mpsc` channels and asserts on the outcomes.\n\nNo external services are contacted — all communication is in-process via tokio channels and tasks.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TX[\"mpsc::Sender<br/>(inject test messages)\"] --> Adapter[\"MockAdapter /<br/>MockStreamingAdapter\"]\n    Adapter -->|\"start() → Stream\"| BM[\"BridgeManager<br/>(production code)\"]\n    BM -->|\"dispatch\"| Handle[\"MockHandle /<br/>MockStreamingHandle\"]\n    Handle -->|\"response\"| BM\n    BM -->|\"send() / send_streaming()\"| Adapter\n    Adapter -->|\"captured in<br/>sent / streamed\"| Assert[\"Test Assertions\"]\n    BM --- Router[\"AgentRouter<br/>(production code)\"]\n```\n\nEach test follows the same pattern:\n\n1. Create a mock handle with known agents.\n2. Create an `AgentRouter`, optionally pre-routing users to agents via `set_user_default`.\n3. Create a mock adapter (returns an `mpsc::Sender` for injecting messages).\n4. Construct `BridgeManager::new(handle, router)` and call `start_adapter(adapter)`.\n5. Send `ChannelMessage` values through the sender.\n6. Poll via `wait_until` until the expected side effects appear.\n7. Assert on captured responses, router state, and/or delivery metrics.\n8. Call `manager.stop()`.\n\n## Test Infrastructure\n\n### `wait_until`\n\n```rust\nasync fn wait_until<F>(label: &str, mut cond: F)\nwhere\n    F: FnMut() -> bool,\n```\n\nReplaces fixed `sleep()` calls with a deadline-bounded poll (2-second timeout, 5ms tick). The generous deadline accommodates CI slowdowns while failing fast on stuck dispatch loops. On timeout, panics with the provided `label` for easy diagnosis.\n\n### Message Factories\n\n- **`make_text_msg(channel, user_id, text)`** — Builds a `ChannelMessage` with `ChannelContent::Text`. Sets `is_group: false`, empty metadata, no `target_agent`, no `thread_id`.\n- **`make_command_msg(channel, user_id, cmd, args)`** — Builds a `ChannelMessage` with `ChannelContent::Command { name, args }`. Same defaults as `make_text_msg`.\n\nBoth use `\"msg1\"` as `platform_message_id` and `\"TestUser\"` as `display_name`.\n\n## Mock Implementations\n\n### `MockAdapter`\n\nBasic `ChannelAdapter` that does **not** support streaming (`supports_streaming()` returns false by default).\n\n| Behavior | Detail |\n|---|---|\n| **`start()`** | Consumes the `mpsc::Receiver` provided at construction, wraps it in `ReceiverStream`. Can only be called once. |\n| **`send(user, content)`** | Extracts text from `ChannelContent::Text` or `ChannelContent::Interactive` (flattens button labels). Appends `(user.platform_id, text)` to `sent`. |\n| **`stop()`** | Sends `true` on the internal `watch` channel. |\n| **`get_sent()`** | Returns a clone of all captured `(platform_id, text)` pairs. |\n\nCreated via `MockAdapter::new(name, channel_type)` which returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`.\n\n### `MockStreamingAdapter`\n\n`ChannelAdapter` that **does** support streaming.\n\n| Method | Behavior |\n|---|---|\n| `supports_streaming()` | Returns `true`. |\n| `send_streaming(user, delta_rx, _thread_id)` | Collects all deltas from `delta_rx`, then stores `(user.platform_id, full_text)` in `streamed`. |\n| `send(user, content)` | Stores text-only content in `sent` (separate from `streamed`). |\n| `get_streamed()` / `get_sent()` | Independent accessors for each capture buffer. |\n\nTests can assert that `send_streaming` was called (by checking `get_streamed()`) and that `send` was **not** called (by asserting `get_sent()` is empty), or vice versa.\n\n### `MockFailingStreamingAdapter`\n\nStreaming-capable adapter whose `send_streaming` always returns `Err(\"simulated transport failure\")`. It drains `delta_rx` completely before failing, so the bridge's tee task can populate `buffered_text` for the fallback path. Used to exercise error-recovery branches.\n\n### `MockHandle`\n\nBasic `ChannelBridgeHandle` implementation.\n\n| Method | Behavior |\n|---|---|\n| `send_message(agent_id, message)` | Records `(agent_id, message)` in `received`, returns `Ok(\"Echo: {message}\")`. |\n| `find_agent_by_name(name)` | Searches the agent list provided at construction. |\n| `list_agents()` | Returns the full agent list. |\n| `spawn_agent_by_name(_)` | Always returns `Err(\"mock: spawn not implemented\")`. |\n| `record_consumer_lag(_, _)` | No-op. |\n\n### `MockStreamingHandle`\n\nExtends the handle contract with streaming support.\n\n| Method | Behavior |\n|---|---|\n| `send_message_streaming(agent_id, message)` | Records the message, spawns a task that splits `\"Echo: {message}\"` into word-by-word deltas on an `mpsc::channel(16)`, returns the receiver. |\n| `send_message(agent_id, message)` | Falls back to non-streaming echo (same as `MockHandle`). |\n\n### `MockProgressHandle`\n\nProduces synthetic progress markers and prose via `send_message_streaming_with_sender_status`, simulating what `start_stream_text_bridge_with_status` emits in production:\n\n```\n\"\\n\\n🔧 `web_search`\\n\"   →   \"Found 3 results.\"\n```\n\nThe status oneshot reports `Ok(())`. Used to verify that non-streaming adapters receive progress markers in the consolidated response.\n\n### `MockKernelErrorHandle`\n\nSimilar to `MockProgressHandle` but the status oneshot reports `Err(\"rate limit hit\")` after emitting partial deltas. Exercises the path where both the kernel and transport fail.\n\n### `MockKernelOkHandle`\n\nEmits clean text with kernel success on the status oneshot. Records all `record_delivery` calls in a `DeliveryLog` (capturing `(success, Option<String>)` pairs). Used to verify Bug 1 fix: when the kernel succeeds and `send_streaming` fails, `record_delivery` must be called with `success=true, err=None`.\n\n## Test Cases\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_dispatch_text_message` | A text message from a pre-routed user reaches the correct agent; the echo response is delivered back through the adapter. |\n| `test_bridge_dispatch_agents_command` | The `/agents` command returns a listing containing all registered agent names. |\n| `test_bridge_dispatch_help_command` | The `/help` command returns text mentioning `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | The `/agent coder` command updates the router so `resolve()` returns the selected agent; the adapter receives a confirmation message containing `\"Now talking to agent: coder\"`. |\n| `test_bridge_dispatch_status_command` | The `/status` command returns text containing `\"{N} agent(s) running\"`. |\n| `test_bridge_dispatch_no_agent_assigned` | An unrouted user receives a `\"No agents available\"` message. |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text `\"/agents\"` (not wrapped in `ChannelContent::Command`) is still recognized as a command by the bridge. |\n\n### Lifecycle & Multi-Adapter\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_manager_lifecycle` | Sends 5 sequential messages, verifies 5 echo responses with correct ordering, then stops cleanly without hanging. |\n| `test_bridge_multiple_adapters` | Runs a Telegram and Discord adapter simultaneously in the same `BridgeManager`; each receives the correct echo for its own user. |\n\n### Streaming\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both the adapter and handle support streaming, `send_streaming` is called and `send` is not. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter doesn't support streaming (even if the handle does), the bridge falls back to `send()`. |\n| `test_default_send_streaming_collects_and_sends` | The default `ChannelAdapter::send_streaming` implementation collects all deltas and passes the assembled text to `send()`. |\n\n### Error Handling & Progress Markers (V2/V3)\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapters (Discord/Slack/Matrix) receive 🔧 progress markers in the consolidated response via the `send_message_streaming_with_sender_status` path. |\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | When `send_streaming` returns `Err` and the kernel status is also `Err`, the buffered fallback delivers the partial text including progress markers. |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | Bug 1 regression: when the kernel succeeds but `send_streaming` fails, `record_delivery` must be called with `success=true, err=None` — the transport-side error must not leak into the metric. |\n\n## Adding New Tests\n\nTo add a new integration test:\n\n1. **Pick or create a mock handle** — Use `MockHandle` for simple echo behavior. Create a specialized mock if you need to test streaming, progress markers, or error injection.\n2. **Pick or create a mock adapter** — Use `MockAdapter` for non-streaming channels, `MockStreamingAdapter` for streaming, or `MockFailingStreamingAdapter` for transport errors.\n3. **Wire the pipeline**:\n   ```rust\n   let handle = Arc::new(MockHandle::new(agents));\n   let router = Arc::new(AgentRouter::new());\n   router.set_user_default(\"user1\".to_string(), agent_id);\n   let (adapter, tx) = MockAdapter::new(\"name\", ChannelType::Telegram);\n   let adapter_ref = adapter.clone();\n   let mut manager = BridgeManager::new(handle, router);\n   manager.start_adapter(adapter).await.unwrap();\n   ```\n4. **Inject and wait**:\n   ```rust\n   tx.send(make_text_msg(ChannelType::Telegram, \"user1\", \"hello\")).await.unwrap();\n   wait_until(\"description\", || !adapter_ref.get_sent().is_empty()).await;\n   ```\n5. **Assert and clean up**:\n   ```rust\n   assert_eq!(adapter_ref.get_sent()[0].1, \"Echo: hello\");\n   manager.stop().await;\n   ```\n\n## Dependencies on Production Code\n\nThis test module imports from:\n\n- `librefang_channels::bridge` — `BridgeManager`, `ChannelBridgeHandle`\n- `librefang_channels::router` — `AgentRouter`\n- `librefang_channels::types` — `ChannelAdapter`, `ChannelContent`, `ChannelMessage`, `ChannelType`, `ChannelUser`, `SenderContext`\n- `librefang_types::agent` — `AgentId`","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\nPluggable messaging bridge layer for LibreFang. Converts inbound platform messages into unified `ChannelMessage` events consumed by the kernel, and routes agent replies back out through the originating channel.\n\n## Architecture\n\nEach messaging platform is implemented as an adapter behind the `ChannelAdapter` trait. The trait and all dispatch infrastructure compile unconditionally — only individual adapters are gated by cargo features.\n\n```mermaid\ngraph LR\n    subgraph Platforms\n        T[Telegram]\n        D[Discord]\n        S[Slack]\n        W[Webhook]\n        E[email / IMAP]\n        O[\"40+ more\"]\n    end\n    subgraph librefang-channels\n        A[\"ChannelAdapter trait\"]\n        R[\"router / dispatch\"]\n    end\n    K[\"librefang-kernel\"]\n    T -->|inbound| A\n    D -->|inbound| A\n    S -->|inbound| A\n    W -->|inbound| A\n    E -->|inbound| A\n    O -->|inbound| A\n    A -->|ChannelMessage| R\n    R -->|events| K\n    K -->|agent reply| R\n    R -->|send()| A\n    A -->|outbound| T\n    A -->|outbound| D\n    A -->|outbound| S\n    A -->|outbound| W\n    A -->|outbound| E\n```\n\nSessions are derived deterministically via `SessionId::for_channel(agent, \"channel:chat\")`. The kernel owns the per-`(agent, session)` lock; channels never touch it directly.\n\n## Cargo Features\n\n`default = []`. Every workspace consumer sets `default-features = false` and forwards an explicit feature subset.\n\n| Feature | Description |\n|---|---|\n| `all-channels` | Aggregates every adapter. Used by release CI and packaging. |\n| `channel-telegram` | Telegram Bot API |\n| `channel-discord` | Discord via gateway |\n| `channel-slack` | Slack Events API |\n| `channel-matrix` | Matrix (heavy; pulls in `matrix-sdk`) |\n| `channel-email` | SMTP send + IMAP receive (adds `lettre`, `imap`, `rustls-connector`, `mailparse`) |\n| `channel-webhook` | Generic outbound webhooks with SSRF guard |\n| `channel-mqtt` | MQTT pub/sub (adds `rumqttc`) |\n| `channel-bluesky` | Bluesky/AT Protocol |\n| `channel-nostr` | Nostr relays (adds `k256`) |\n| `channel-ntfy` | ntfy.sh push notifications |\n| `channel-feishu` / `channel-wecom` | Adds `aes` + `cbc` for payload decryption |\n| `channel-google-chat` | Adds `rsa` for signature verification |\n\nSee `Cargo.toml` for the full 45-feature matrix. Adding a new adapter requires a matching entry in the `all-channels` list.\n\n## Always-Compiled Core\n\nThese modules are available regardless of which channel features are enabled:\n\n- **`types`** — `ChannelMessage`, session identifiers, shared enums\n- **`router`** — dispatch routing from adapter → kernel event bus\n- **`bridge`** — top-level adapter registry and lifecycle\n- **`formatter`** — message formatting across platform constraints\n- **`sanitizer`** — input sanitization for inbound payloads\n- **`commands`** — channel command parsing\n- **`roster`** — contact/participant tracking\n- **`rate_limiter`** — per-channel rate limiting\n- **`message_journal`** — inbound/outbound message logging\n- **`message_truncator`** — platform-aware message splitting\n- **`attachment_enrich`** — attachment metadata extraction (uses `image`, `pdf-extract`)\n- **`thread_ownership`** — conversation threading semantics\n- **`sidecar`** — auxiliary channel-side processing\n\n**Re-exports:** `split_to_utf16_chunks`, `truncate_to_utf16_limit`, `utf16_len`, `DISCORD_MESSAGE_LIMIT` (2000), `TELEGRAM_CAPTION_LIMIT` (1024), `TELEGRAM_MESSAGE_LIMIT` (4096).\n\n## Adding a New Channel Adapter\n\n1. **Create `src/<channel>/mod.rs`** implementing the `ChannelAdapter` trait.\n2. **Add a cargo feature** `channel-<name>` in `Cargo.toml`. If it needs extra crate dependencies, add them as optional deps and wire `dep:xxx` in the feature.\n3. **Add the feature to `all-channels`** in the same `Cargo.toml`.\n4. **Wire HTTP webhook route** (if the platform uses webhooks) in `librefang-api/src/routes/channels.rs`.\n5. **Write `tests/<channel>_wiremock.rs`** covering at least the `send()` happy path and one error response (e.g., 429 rate limit, 500 server error).\n6. **Document required environment variables** in the adapter module's doc comment.\n\n### ChannelAdapter Trait Contract\n\nEvery adapter implements:\n\n- **Inbound parsing** — transform platform-specific webhook payloads or streaming events into `ChannelMessage`.\n- **`send()`** — transmit an agent reply back to the platform. Must be testable via wiremock.\n- **Lifecycle hooks** — startup validation (credential checks, SSRF guard), graceful shutdown.\n\n## Webhook Security\n\nHMAC/signature verification is **mandatory** for platforms that provide it. There is no bypass.\n\n| Platform | Verification | Config key |\n|---|---|---|\n| Messenger | HMAC-SHA1 with App Secret | `app_secret_env` in `[channels.messenger]` |\n| Teams | Base64 outgoing-webhook token | `security_token_env` in `[channels.teams]` |\n| LINE | Platform signature header | Auto-detected |\n| Viber | Platform signature header | Auto-detected |\n| DingTalk | Platform signature header | Auto-detected |\n\nMissing signature → **400**. Mismatched signature → **401**. Health-check probes (curl, monitoring) without the header will receive 4xx — this is intentional.\n\nIf you cannot implement verification for a platform, the adapter must refuse to start.\n\n## Outbound Webhook SSRF Guard\n\n`[channels.webhook] callback_url` must resolve to a publicly routable IP. The guard rejects:\n\n- Private ranges: 10/8, 172.16/12, 192.168/16\n- CGN: 100.64/10\n- Loopback: 127/8, ::1\n- Link-local, multicast, cloud metadata (169.254/16)\n- IPv6 short forms (`[::]`), IPv4-mapped (`[::ffff:127.0.0.1]`), NAT64, trailing-dot FQDNs\n\nAdapters refuse to start if the callback URL violates these rules. For local development, use a public tunnel (ngrok, cloudflared) or omit `callback_url` entirely.\n\n## Testing Requirements\n\nInbound parsing has extensive coverage (795 tests). Outbound `send()` has historically been undertested.\n\n**All new adapters and `send()` changes must include a wiremock test** in `tests/<channel>_wiremock.rs`. Minimum coverage:\n\n- Happy-path `send()` with expected request shape\n- At least one error response (HTTP 4xx/5xx) verifying the adapter handles it gracefully\n\nPRs without `send()` tests will be rejected.\n\n## Dependency Boundaries\n\n### Allowed dependencies\n- `librefang-types`\n- `librefang-extensions` (vault for secrets, `http_client::shared_client()` for HTTP)\n- `librefang-http`\n- Channel-specific SDKs (gated per feature)\n\n### Forbidden dependencies\n- **`librefang-kernel`** — channels sit below the kernel. The kernel calls into channels through dispatch; never the reverse.\n- **`librefang-runtime`** — same boundary reason.\n\n### Shared HTTP client\n\nDo not construct a bespoke `reqwest::Client`. Always use `librefang-extensions::http_client::shared_client()` to reuse connection pools and respect workspace-wide TLS/proxy configuration.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# librefang-cli-locales\n\nLocalization resource module for the LibreFang CLI. Contains all user-facing translatable strings in [Fluent](https://projectfluent.org/) (`.ftl`) format, currently shipping with **English** (`en`) and **Simplified Chinese** (`zh-CN`) translations.\n\n## Purpose\n\nThis module holds no executable code. It is a pure resource bundle that the CLI binary loads at runtime via the `fluent` / `fluent-bundle` ecosystem to render locale-aware output. Every `println`, `eprintln`, or formatted status line in `librefang-cli` should resolve its text through these files rather than embedding string literals.\n\n```\nlibrefang-cli/locales/\n├── en/main.ftl       # Primary locale (source of truth)\n└── zh-CN/main.ftl    # Simplified Chinese translation\n```\n\n## How It Works\n\n### Fluent message format\n\nEach entry is a Fluent message with an identifier and a value. Placeholders use `{$name}` syntax:\n\n```fluent\ndaemon-error = Daemon error: { $error }\nmodels-available = { $count } models available\n```\n\nThe CLI code looks up a message by its identifier and passes a map of variables. If a variable is missing or a message ID doesn't exist in the active locale, Fluent falls back to the parent locale (`en`), then to the raw identifier.\n\n### Message ID conventions\n\nIDs are lowercase, hyphen-separated, and follow a `domain-suffix` naming pattern. This makes it straightforward to locate the source string and the CLI subcommand that emits it:\n\n| Prefix | CLI area |\n|---|---|\n| `daemon-*` | `start`, `stop`, `restart` lifecycle commands |\n| `label-*` | Table/field labels in `status`, `info` |\n| `hint-*` | Contextual user guidance appended after operations |\n| `error-*` | Error conditions (with `-fix` companion for remediation) |\n| `agent-*` | `agent spawn`, `agent kill`, `agent set` subcommands |\n| `vault-*` | `vault init`, `vault store`, `vault rotate` |\n| `config-*` | `config set`, `config edit`, `config set-key` |\n| `channel-*` | Channel setup wizards (telegram, discord, slack, …) |\n| `cron-*`, `approval-*`, `memory-*`, `webhook-*`, `device-*` | Their respective subcommands |\n| `section-*` | Section headers for rich terminal output |\n| `doctor-*` | `doctor` diagnostic checks |\n| `uninstall-*` | `uninstall` cleanup |\n| `reset-*` | `reset` operations |\n| `log-*` | `logs` / log tailing |\n\n### Error + fix pairs\n\nMany error messages come in pairs — the diagnostic string and a remediation hint:\n\n```fluent\nerror-connect-refused = Cannot connect to daemon\nerror-connect-refused-fix = Is the daemon running? Start it with: librefang start\n```\n\nThe CLI typically prints the error line, then the `-fix` line on the next line or as a dimmed hint. When adding a new error, always add a corresponding `-fix` companion so the user has an actionable next step.\n\n### Section headers\n\n`section-*` messages are headings used by the `cli-table` / `comfy-table` rendering logic. They are not sentences — they serve as locale-aware column titles or group dividers:\n\n```fluent\nsection-active-agents = Active Agents\nsection-security-status = Security Status\nsection-recent-errors = Recent errors (daemon.log)\n```\n\n## Locale Coverage\n\nBoth `en/main.ftl` and `zh-CN/main.ftl` must expose **every** message ID used by the CLI. The English file is the source of truth; the Chinese file mirrors its structure exactly. A mismatch (missing ID, extra ID, or different placeholder name) will surface at runtime as a Fluent resolution error or fallback string.\n\n### Adding a new string\n\n1. Add the message to `en/main.ftl` under the appropriate section comment.\n2. Copy the same message ID to `zh-CN/main.ftl` with the translated value, preserving all `{$variable}` placeholders verbatim.\n3. In the Rust code, call the message by its ID with the required variables.\n\n### Adding a new locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g. `ja/`, `fr/`, `pt-BR/`).\n2. Copy `en/main.ftl` as the starting template and translate every value.\n3. Register the new locale in the CLI's locale negotiation / fallback chain (in the crate that initializes `fluent-bundle`).\n\n## Content Areas\n\n### Daemon lifecycle\n\nMessages for `start`, `stop`, `restart`, and background daemon health. Includes the special `shutdown-401-*` series (Issue #4693) that handles the case where an in-place binary upgrade leaves a running daemon with a mismatched API key, automatically falling back to PID-based shutdown.\n\n### Setup and initialization\n\nThe `init-*` and `guide-*` messages support the first-run wizard (`librefang init`) including provider selection, API key paste, and key verification.\n\n### Status and diagnostics\n\n`section-daemon-status`, `section-status-inprocess`, and `doctor-*` cover the rich status table output and the diagnostic doctor command. The `label-*` entries provide localized column headers.\n\n### Security\n\n`section-security-status` and related labels describe audit trail, taint tracking, WASM sandboxing, wire protocol, key management, and manifest signing in user-facing terms.\n\n### Channel integration\n\nSetup wizards for messaging platforms (Telegram, Discord, Slack, WhatsApp, Email, Signal, Matrix). Each channel has a `section-setup-<channel>` header and `channel-*` flow messages.\n\n### Vault\n\nCredential vault operations including initialization, storage, retrieval, and the master key rotation flow (`vault-rotate-*`). Rotation messages are notably verbose because the process has several failure modes that require precise user guidance.\n\n### Config\n\nConfiguration read/write errors and success confirmations, including the `config set-key` flow for persisting provider API keys to `~/.librefang/.env`.\n\n## Integration with the CLI\n\nThis module is a passive resource. The consuming crate (typically `librefang-cli`) initializes a `fluent::FluentBundle` at startup, loads the appropriate `.ftl` file based on the user's locale preference (environment variable, config setting, or OS locale), and then calls `bundle.get_message()` + `bundle.format_pattern()` to resolve strings at display time.\n\n```mermaid\ngraph LR\n    A[CLI subcommand] -->|\"lookup message ID\"| B[FluentBundle]\n    B -->|\"load\"| C[\"locales/en/main.ftl\"]\n    B -->|\"fallback\"| C\n    B -->|\"load\"| D[\"locales/zh-CN/main.ftl\"]\n    B -->|\"format pattern + args\"| E[Localized output]\n```\n\nNo Rust code lives in this module. All logic for locale negotiation, bundle construction, and message formatting resides in the CLI crate itself.","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration templates shipped with the LibreFang CLI. These TOML files serve as the source material for two initialization paths: a fully-commented reference config (`init_default_config.toml`) and a wizard-generated minimal config (`init_wizard_config.toml`). Both contain Mustache-style placeholders that are rendered at runtime by the CLI's init machinery.\n\n## Templates\n\n### `init_default_config.toml`\n\nA comprehensive, heavily annotated configuration file. Every section the daemon recognizes is present — most commented out — so a user can uncomment and edit rather than write from scratch. The inline comments include security warnings, valid value enumerations, and cross-references to documentation.\n\n**Placeholders:**\n\n| Placeholder | Replaced with |\n|---|---|\n| `{{provider}}` | LLM provider name (e.g. `openai`, `anthropic`, `ollama`) |\n| `{{model}}` | Default model identifier (e.g. `gpt-4o`, `claude-sonnet-4-20250514`) |\n| `{{api_key_env}}` | Environment variable name holding the API key |\n\n### `init_wizard_config.toml`\n\nA minimal configuration emitted by the interactive `librefang init` wizard. Only the sections the user actually configured during the Q&A are included, keeping the file short and uncluttered.\n\n**Placeholders:**\n\n| Placeholder | Replaced with |\n|---|---|\n| `{{provider}}` | LLM provider name |\n| `{{model}}` | Default model identifier |\n| `{{api_key_line}}` | A rendered `api_key_env = \"...\"` line (or empty string if not applicable) |\n| `{{routing_section}}` | Optional agent routing block the wizard generated |\n\n## Configuration Sections Reference\n\nBelow is a summary of every section defined across the templates, grouped by domain.\n\n### Server Core\n\n| Key | Default | Values |\n|---|---|---|\n| `api_listen` | `127.0.0.1:4545` | `host:port` — loopback-only until auth is configured |\n| `log_level` | `info` | `trace`, `debug`, `info`, `warn`, `error` |\n| `mode` | `default` | `stable`, `default`, `dev` |\n| `update_channel` | `stable` | `stable`, `beta`, `rc` |\n\n**Security guard:** The daemon refuses to bind a non-loopback address unless authentication is configured (`api_key`, dashboard credentials, or `[[users]]`). Override with `LIBREFANG_ALLOW_NO_AUTH=1` at your own risk.\n\n### Dashboard & Authentication\n\n```toml\ndashboard_user = \"librefang\"\ndashboard_pass = \"librefang\"   # change immediately after first login\n```\n\nPasswords can reference a vault (`\"vault:dashboard_password\"`) or the `LIBREFANG_DASHBOARD_PASS` environment variable.\n\nTerminal access is controlled by two separate gates under `[terminal]`:\n\n- `allow_remote` — permits remote terminal connections when auth is present\n- `allow_unauthenticated_remote` — must be explicitly `true` to expose an unauthenticated shell (foot-gun guard)\n\n### Default LLM (`[default_model]`)\n\n```toml\n[default_model]\nprovider = \"openai\"\nmodel = \"gpt-4o\"\napi_key_env = \"OPENAI_API_KEY\"\n# base_url = \"\"   # optional proxy override\n```\n\nFailover chains are defined via `[[fallback_providers]]` array-of-tables entries.\n\n### Memory & Proactive Memory\n\n```toml\n[memory]\ndecay_rate = 0.05           # confidence decay per cycle\n\n[proactive_memory]\nenabled = true\nauto_memorize = true        # extract facts from conversations\nauto_retrieve = true        # recall relevant memories\nmax_retrieve = 10\n```\n\nAdditional tunables (`extraction_threshold`, `session_ttl_hours`, `duplicate_threshold`, `max_memories_per_agent`) are commented out in the default template.\n\n### Task Queue (`[queue.concurrency]`)\n\nControls parallelism across four lanes:\n\n| Lane | Default | Purpose |\n|---|---|---|\n| `main_lane` | 3 | Concurrent user messages |\n| `cron_lane` | 2 | Scheduled jobs |\n| `subagent_lane` | 3 | Child agent invocations |\n| `trigger_lane` | 8 | Global in-flight trigger dispatches |\n| `default_per_agent` | 1 | Per-agent fallback (serial behavior) |\n\n### Shell Execution Policy (`[exec_policy]`)\n\n```toml\n[exec_policy]\nmode = \"deny\"             # deny | allowlist | full\ntimeout_secs = 30\nmax_output_bytes = 102400  # 100 KB\n```\n\n### Hot-Reload (`[reload]`)\n\n```toml\n[reload]\nmode = \"hybrid\"    # off | restart | hot | hybrid\ndebounce_ms = 500\n```\n\n- **`hot`** — picks up changes without restarting.\n- **`restart`** — schedules a graceful restart.\n- **`hybrid`** — applies what it can hot, restarts for the rest.\n\n### Optional Integrations\n\nEach of these is fully commented out in the default template, ready to uncomment:\n\n| Section | Purpose |\n|---|---|\n| `[web]` / `[web.fetch]` | Web search (auto-detects among Tavily, Brave, Jina, Perplexity, DuckDuckGo) and page fetching with SSRF protection |\n| `[compaction]` | LLM-based session history summarization |\n| `[triggers]` | Event-driven trigger system with cooldown and recursion limits |\n| `[budget]` | Cost caps (hourly/daily/monthly) with per-provider overrides |\n| `[thinking]` | Extended thinking budget for Claude models |\n| `[channels.telegram]` / `[channels.discord]` / `[channels.slack]` / `[channels.wechat]` | Messaging channel adapters |\n| `[[mcp_servers]]` | Model Context Protocol external tool servers |\n| `[browser]` | Headless browser automation |\n| `[docker]` | Docker sandbox for code execution |\n| `[inbox]` | File-based async command intake |\n| `[network]` | P2P federation between LibreFang nodes |\n| `[rate_limit]` | GCRA-based API and WebSocket rate limiting |\n| `[registry]` | Agent registry cache TTL |\n\n### Editor Integration (ACP)\n\nNo configuration keys are required. The daemon exposes an Agent Client Protocol (ACP) server at `~/.librefang/acp.sock` (Unix). Editors spawn `librefang acp` as a child process; the command auto-selects in-process mode or daemon-attached mode based on whether `librefang start` is running.\n\n## Adding or Modifying Sections\n\nWhen adding a new configuration section to the daemon:\n\n1. **Add it to `init_default_config.toml`** — commented out, with inline documentation covering purpose, valid values, and security implications.\n2. **Optionally wire it into the wizard** — if the wizard should prompt for it, add the corresponding placeholder to `init_wizard_config.toml` and update the wizard rendering logic.\n3. **Keep comments factual** — these files are the first thing users read. Note deprecations (e.g., `require_proxy_headers` supersedes `trust_proxy_headers`).\n4. **Preserve the section ordering convention** — server → auth → LLM → memory → tools → integrations → advanced.","other-librefang-cli-tests":"# Other — librefang-cli-tests\n\n# librefang-cli Tests\n\nIntegration and regression tests for the `librefang-cli` crate. This module guards against two categories of bugs: **build-script side effects** (issue #3641) and **vault key-rotation correctness** (issue #3651).\n\n## Test Files\n\n### `build_rs_no_git_mutation.rs`\n\n**Purpose:** Prevents `build.rs` from silently mutating the user's git configuration. Issue #3641 documented a regression where the build script modified `core.hooksPath`, which is unacceptable behavior from a build dependency.\n\n**How it works:** The tests read `build.rs` as raw source text, strip `//` line comments (so doc comments mentioning the old bug don't trigger false positives), and assert that forbidden tokens are absent.\n\nTwo tests enforce this:\n\n| Test | What it bans |\n|------|-------------|\n| `build_rs_does_not_mutate_git_config` | The string `\"config\"` (bare `git config` invocation) and `\"hooksPath\"` specifically. If a read-only `git config --get` is ever needed, this test must be updated with an explicit allowance. |\n| `build_rs_uses_only_read_only_git_subcommands` | A blocklist of side-effecting subcommands: `\"init\"`, `\"clone\"`, `\"commit\"`, `\"push\"`, `\"pull\"`, `\"fetch\"`, `\"checkout\"`, `\"reset\"`, `\"add\"`, `\"rm\"`. Any new build-script use of git must be read-only. |\n\n**Helper functions:**\n\n- **`read_build_rs()`** — Reads `build.rs` relative to `CARGO_MANIFEST_DIR`. Panics if the file is missing.\n- **`strip_comments(src)`** — Removes `//`-style comments line-by-line so documentation mentioning forbidden tokens doesn't cause false failures.\n\n### `vault_rotate_key.rs`\n\n**Purpose:** Integration tests for the `librefang vault rotate-key` CLI workflow. These tests drive the `librefang_extensions::vault::CredentialVault` API directly rather than spawning the CLI binary, because `cmd_vault_rotate_key` calls `std::process::exit` on errors and reads `LIBREFANG_VAULT_KEY_OLD` / `LIBREFANG_VAULT_KEY_NEW` from the process environment — both of which make parallel `cargo test` execution flaky.\n\n**Why library-level testing is sufficient:** The CLI thin-wraps `CredentialVault::unlock_with_key`, `verify_or_install_sentinel`, and `rewrap_with_new_key`. By exercising these calls in the same order the CLI does, the tests cover the actual rotation invariants without the binary-spawning fragility.\n\n**Helper function:**\n\n- **`key_filled(b: u8) -> Zeroizing<[u8; 32]>`** — Produces a deterministic 32-byte key with every byte set to `b`. Avoids `OsRng` so failures are reproducible. Uses `Zeroizing` to match production key hygiene.\n\n#### Test cases\n\n**`rotate_key_end_to_end_replaces_master_key_and_preserves_entries`**\n\nThe primary rotation correctness test, organized in four phases:\n\n1. **Create** — Initialize a vault under key A, store `API_KEY` and `REFRESH_TOKEN`, verify the sentinel is present.\n2. **Rotate** — Unlock with key A, verify sentinel, confirm user-visible keys match expectations, then call `rewrap_with_new_key` with key B.\n3. **Verify new key** — Unlock with key B, confirm both entries decrypt to their original plaintext, confirm sentinel survives, confirm `list_keys` hides the sentinel.\n4. **Reject old key** — Attempt to unlock with key A and assert failure. This is the core security invariant: after rotation, the old key must be unusable.\n\n**`rewrap_with_identical_key_still_decrypts`**\n\nVerifies that rewrapping with the same key is technically valid at the library level (it re-encrypts with a fresh AES-GCM nonce/salt). The CLI layer separately blocks this case as an operator footgun — the test documents that the blocking is a CLI-level decision, not a library limitation.\n\n**`sentinel_round_trips_through_rotation`**\n\nEnsures the internal sentinel entry (`SENTINEL_KEY` / `SENTINEL_VALUE`) survives rotation intact. Uses `iter_all_entries` (which includes reserved keys invisible to `list_keys`) to inspect the sentinel directly after rotation. Without sentinel-aware rewrap, the post-rotation vault would be missing the sentinel and the boot path would refuse to start.\n\n## Relationship to the rest of the codebase\n\n```mermaid\ngraph TD\n    A[build_rs_no_git_mutation tests] -->|reads source of| B[build.rs]\n    C[vault_rotate_key tests] -->|calls| D[librefang-extensions vault.rs]\n    E[cmd_vault_rotate_key CLI handler] -->|calls| D\n    E -->|reads env| F[LIBREFANG_VAULT_KEY_OLD/NEW]\n    C -.->|mirrors same call sequence| E\n```\n\nThe vault tests mirror the call sequence in `cmd_vault_rotate_key` (the CLI handler) but bypass the `std::process::exit` and global-env-read issues. Any regression in `CredentialVault`, `verify_or_install_sentinel`, or `rewrap_with_new_key` will trip these tests before reaching users.\n\n## Running\n\n```sh\n# All tests in this module\ncargo test -p librefang-cli\n\n# Only build.rs regression guard\ncargo test -p librefang-cli -- build_rs\n\n# Only vault rotation tests\ncargo test -p librefang-cli -- rotate\n```\n\n## Contributing guidelines\n\n- **Adding a new forbidden git subcommand:** Add it to the `forbidden` array in `build_rs_uses_only_read_only_git_subcommands`.\n- **Allowing read-only `git config --get`:** Update `build_rs_does_not_mutate_git_config` with an explicit allowance rather than weakening the blanket `\"config\"` ban.\n- **Adding vault rotation scenarios:** Follow the existing pattern — use `key_filled` for deterministic keys, `tempfile::tempdir` for vault storage, and assert both the happy path (new key works, entries recover) and the security property (old key rejected).","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nCommand-line interface for the LibreFang Agent OS. Ships the `librefang` binary and serves as the primary entry point for interacting with the system.\n\n## Overview\n\n`librefang-cli` is a thin but feature-rich binary crate. It delegates almost all logic to library crates in the workspace, acting as the glue between user input (via `clap`), the kernel, and the HTTP API. The binary operates in one of two modes depending on whether a daemon is already running:\n\n- **Daemon mode** — When `librefang start` has been called, the CLI sends commands to the running daemon over HTTP at `http://127.0.0.1:4545` (default). This is the typical production flow.\n- **Single-shot mode** — When no daemon is running, commands boot an in-process kernel, execute, and shut down. Useful for scripting and one-off operations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[librefang binary] -->|parses args| CLAP[clap CLI definitions]\n    CLI -->|daemon running| HTTP[HTTP API<br/>127.0.0.1:4545]\n    CLI -->|no daemon| KERNEL[librefang-kernel<br/>in-process]\n    KERNEL --> API[librefang-api]\n    API --> CHANNELS[librefang-channels]\n    API --> SKILLS[librefang-skills]\n    API --> MEMORY[librefang-memory]\n    API --> EXT[librefang-extensions]\n```\n\nThe CLI depends on nearly every library crate in the workspace but does not contain business logic itself. It wires together configuration loading, signal handling, TUI rendering, and the HTTP client/server boundary.\n\n## Feature Flags\n\nFeature flags control which channel adapters are compiled and whether OpenTelemetry tracing is active. This is critical for build times — the full channel set pulls in heavy dependencies like `matrix-sdk-crypto`, `lettre`, `imap`, `rsa`, `rumqttc`, and `nostr-sdk`.\n\n| Feature | Default | Description |\n|---|---|---|\n| `default` | ✅ | `core-channels` (telegram, discord, slack, webhook, ntfy) + `telemetry` |\n| `all-channels` | ❌ | All ~25 channel adapters. **Does not imply `telemetry`.** |\n| `mini` | ❌ | Minimal channel set for resource-constrained environments |\n| `android` | ❌ | All channels except email (rustls incompatibility on Android) |\n| `telemetry` | ✅ | OpenTelemetry + tracing-opentelemetry integration |\n\n### Typical build commands\n\n```bash\n# Fast developer build (core channels only)\ncargo build -p librefang-cli\n\n# Release binary with full channel set + telemetry\ncargo build -p librefang-cli --release --features all-channels\n\n# Minimal build, no telemetry\ncargo build -p librefang-cli --no-default-features --features mini\n```\n\n## Build-time Metadata\n\nThe `build.rs` script embeds three environment variables at compile time for use in `--version` output and diagnostics:\n\n| Variable | Source | Example |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a3f7c2d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nAll three gracefully fall back to `\"unknown\"` if the external command fails (e.g., building from a tarball without git).\n\n## Common Commands\n\n```\nlibrefang start              # Start the daemon (HTTP API + dashboard)\nlibrefang init               # Write starter ~/.librefang/config.toml\nlibrefang agent spawn        # Create a new agent\nlibrefang agent list         # List running agents\nlibrefang agent message      # Send a message to an agent\nlibrefang doctor             # Diagnose the local environment\nlibrefang help               # Full command catalog\n```\n\nEvery subcommand accepts `--help` for detailed usage.\n\n## Key Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-kernel` | Core runtime and lifecycle management |\n| `librefang-api` | HTTP API layer; re-exports channel feature flags |\n| `librefang-channels` | Channel adapter implementations |\n| `librefang-types` | Shared type definitions |\n| `librefang-migrate` | Database migrations |\n| `librefang-skills` | Agent skill system |\n| `librefang-extensions` | Extension loading and management |\n| `librefang-memory` | Agent memory and context storage |\n| `librefang-runtime` | Async runtime configuration |\n| `librefang-acp` | Access control policy (with `kernel-adapter` feature) |\n| `clap` / `clap_complete` | Argument parsing and shell completion generation |\n| `ratatui` | Terminal UI for dashboard rendering |\n| `tikv-jemallocator` | Global allocator on non-MSVC targets (performance) |\n\n## Global Allocator\n\nOn non-MSVC targets (Linux, macOS, BSD), `tikv-jemallocator` is used as the global allocator with `disable_initial_exec_tls` to avoid issues in certain linking contexts. This is configured in `main.rs` and excluded automatically on Windows MSVC via the `cfg` target predicate in `Cargo.toml`.\n\n## Development Notes\n\n- **Cold builds are fast by default.** The `default` feature set avoids pulling in heavy channel dependencies. Use `all-channels` only when testing specific adapters.\n- **Release CI passes `--features all-channels`** without `--no-default-features`, so published binaries include both the full channel set and telemetry.\n- **Shell completions** can be generated at runtime via `clap_complete` — check `librefang completions --help`.\n- **Configuration** lives at `~/.librefang/config.toml` by default; `librefang init` creates a starter file.\n- The `rusqlite` dependency indicates direct SQLite usage for local data storage outside the kernel's own storage layer.","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# LibreFang Desktop Capabilities\n\n## Overview\n\nThe `librefang-desktop/capabilities` module defines **Tauri security capability files** that control which system APIs and plugins the LibreFang application is permitted to access at runtime. These JSON files follow the [Tauri capability schema](https://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json) and are consumed by the Tauri build system to generate the permission grants enforced by the application's IPC layer.\n\nTauri's capability system is a deny-by-default security model. No plugin or core API is accessible unless explicitly listed in a capability file. This module is the single source of truth for those grants.\n\n## Capability Files\n\n### `default.json` — Desktop Platforms\n\n**Platforms:** macOS, Windows, Linux  \n**Window scope:** `main`\n\nGrants the following permissions:\n\n| Permission | Purpose |\n|---|---|\n| `core:default` | Standard Tauri core APIs (window management, event system, etc.) |\n| `notification:default` | Native OS notification delivery |\n| `shell:default` | Spawning external processes and opening URLs in the system browser |\n| `dialog:default` | Native file pickers, message boxes, and input dialogs |\n| `global-shortcut:allow-register` | Registering system-wide keyboard shortcuts |\n| `global-shortcut:allow-unregister` | Removing previously registered shortcuts |\n| `global-shortcut:allow-is-registered` | Querying whether a shortcut is currently registered |\n| `autostart:default` | Launching LibreFang automatically on user login |\n| `updater:default` | Checking for and applying application updates |\n\nThe global-shortcut permissions are broken out individually rather than using `global-shortcut:default` to adhere to the principle of least privilege — the app only needs to register, unregister, and query shortcuts, and should not acquire any other shortcut-related APIs unless explicitly added.\n\n### `mobile.json` — iOS / Android\n\n**Platforms:** iOS, Android  \n**Window scope:** `main`\n\nGrants a **strict subset** of the desktop permissions:\n\n| Permission | Purpose |\n|---|---|\n| `core:default` | Standard Tauri core APIs |\n| `notification:default` | Push / local notification delivery |\n| `dialog:default` | Native dialog sheets and alerts |\n\nPlugins such as `shell`, `global-shortcut`, `autostart`, and `updater` are **not bundled** on mobile targets, so they must not appear in the mobile capability file. Including permissions for absent plugins would cause a build failure.\n\n## How Capabilities Are Applied\n\n```mermaid\nflowchart LR\n    A[Build starts] --> B{Tauri detects target platform}\n    B -->|macOS / Windows / Linux| C[Load default.json]\n    B -->|iOS / Android| D[Load mobile.json]\n    C --> E[Inject permitted APIs into IPC bridge]\n    D --> E\n    E --> F[Runtime enforcement in main window]\n```\n\nTauri matches capability files to the current build target using the `platforms` and `windows` fields:\n\n1. **Platform filter** — Only capability files whose `platforms` array includes the current compile target are considered.\n2. **Window filter** — Among those, only capabilities scoped to the window being created are applied. Both files target `\"main\"`, the primary application window.\n3. **Permission injection** — The listed permission identifiers are resolved against the plugin manifests bundled into the app. Valid permissions are injected into the IPC bridge available to the webview runtime.\n4. **Runtime enforcement** — Any IPC call from the frontend that is not backed by a granted permission is rejected with a security error.\n\n## Adding a New Permission\n\nWhen a new Tauri plugin or core API is introduced:\n\n1. Add the plugin dependency in `Cargo.toml` (Rust side) and register it in the Tauri builder.\n2. Add the corresponding permission identifier to the appropriate capability file(s). Use the narrowest permission set that satisfies the use case — prefer `allow-<specific-action>` over `<plugin>:default` when possible.\n3. If the plugin only makes sense on desktop, add it **only** to `default.json`. Do **not** add it to `mobile.json`.\n4. Verify the build succeeds on both desktop and mobile targets, as including a permission for a plugin that isn't compiled in will fail.\n\n## Key Conventions\n\n- **One capability file per platform group.** Rather than a single file with complex conditional logic, the module uses separate files (`default.json` for desktop, `mobile.json` for mobile) to keep the permission sets clear and avoid accidental cross-platform leakage.\n- **`identifier` field** — Used by Tauri for logging and diagnostics. Each file has a unique identifier (`\"default\"` and `\"mobile\"`).\n- **`$schema` field** — Points to the Tauri capability JSON Schema, enabling IDE autocomplete and validation during editing.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop/gen\n\nAuto-generated Tauri scaffolding directory containing platform project stubs and the security permission model that gates all IPC between the webview frontend and native backend.\n\n## Purpose\n\nWhen `cargo tauri build` (or `init`/`dev`) runs, it populates the `gen/` directory with:\n\n1. **Platform project templates** — native Xcode and Android Studio projects needed to build for iOS and Android.\n2. **Schema files** — machine-readable descriptions of every permission, capability, and ACL rule the app declares. These are consumed by Tauri's build system to enforce least-privilege at compile time and by IDE tooling for autocomplete/validation.\n\nThis directory should **not be hand-edited** in normal workflows. Changes to permissions are made in the Tauri configuration files (e.g. `tauri.conf.json`, `capabilities/*.json`) under `librefang-desktop/`; the build step regenerates `gen/schemas/` accordingly.\n\n## Directory Layout\n\n```\ngen/\n├── android/          # Android Studio project (populated by cargo tauri android init)\n│   └── README.md\n├── apple/            # Xcode project (populated by cargo tauri ios init, macOS host only)\n│   └── README.md\n└── schemas/\n    ├── acl-manifests.json    # Every plugin's full permission tree\n    ├── capabilities.json     # Resolved capabilities per platform\n    └── desktop-schema.json   # JSON Schema for capability files\n```\n\n## Platform Initialization\n\n| Platform | Command | Working Directory |\n|----------|---------|-------------------|\n| Android | `cargo tauri android init` | `crates/librefang-desktop/` |\n| iOS / macOS | `cargo tauri ios init` | `crates/librefang-desktop/` |\n\nEach command populates the corresponding subdirectory with a full native project. Until the init command is run, only the placeholder `README.md` exists. The generated projects are designed to be committed to version control after initialisation.\n\n## Security Model\n\nTauri uses a **capability-based permission system**. The webview frontend can only invoke commands that are explicitly allowed. The schema files in `gen/schemas/` are the compiled representation of that policy.\n\n### Capabilities\n\nDefined in `capabilities.json`, two capability sets exist:\n\n#### `default` — Desktop (macOS, Windows, Linux)\n\n```json\n{\n  \"identifier\": \"default\",\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"shell:default\",\n    \"dialog:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ],\n  \"platforms\": [\"macOS\", \"windows\", \"linux\"]\n}\n```\n\n#### `mobile` — iOS and Android\n\n```json\n{\n  \"identifier\": \"mobile\",\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"dialog:default\"\n  ],\n  \"platforms\": [\"iOS\", \"android\"]\n}\n```\n\nThe mobile capability is intentionally narrower — `shell`, `global-shortcut`, `autostart`, and `updater` are desktop-only plugins and are omitted to avoid bundling dead code and to reduce the attack surface on mobile.\n\n### Permission Plugins\n\nEach plugin exposes a set of allow/deny permissions. The full catalogue is in `acl-manifests.json`. Here is a summary of the plugins currently available:\n\n| Plugin | Default Permissions | Key Commands |\n|--------|--------------------|--------------|\n| `core` | `core:default` (bundles path, event, window, webview, app, image, resources, menu, tray) | Window management, event emit/listen, path resolution |\n| `core:app` | version, name, tauri-version, identifier, bundle-type, listeners, supports-multiple-windows | Read-only app metadata |\n| `core:event` | listen, unlisten, emit, emit-to | All event bus commands |\n| `core:image` | new, from-bytes, from-path, rgba, size | Image creation and inspection |\n| `core:menu` | new, append, prepend, insert, remove, items, get, popup, create-default, set-as-app-menu, etc. | Full menu lifecycle |\n| `core:path` | resolve-directory, resolve, normalize, join, dirname, extname, basename, is-absolute | Path utilities |\n| `core:resources` | close | Resource handle cleanup |\n| `core:tray` | new, get-by-id, remove-by-id, set-icon, set-menu, set-tooltip, set-title, set-visible, etc. | System tray lifecycle |\n| `core:webview` | get-all-webviews, webview-position, webview-size, internal-toggle-devtools | Webview inspection |\n| `core:window` | get-all-windows, scale-factor, positions, sizes, state queries, internal-toggle-maximize | Window state queries (default is read-heavy) |\n| `dialog` | message, save, open | Native file/message dialogs |\n| `global-shortcut` | *(none by default)* | register, unregister, is-registered |\n| `notification` | is-permission-granted, request-permission, notify, register-action-types, register-listener, cancel, get-pending, get-active, check-permissions, show, batch, list-channels, delete-channel, create-channel, permission-state | Full notification API |\n| `shell` | open (http/https, tel:, mailto:) | open, execute, spawn, kill, stdin-write |\n| `autostart` | enable, disable, is-enabled | Boot auto-start control |\n| `updater` | check, download, install, download-and-install | Self-update lifecycle |\n\n### Permission Naming Convention\n\nEvery permission follows `plugin:allow-command` or `plugin:deny-command`. For example:\n\n- `shell:allow-open` — webview may call `shell.open()`\n- `shell:deny-execute` — webview may **not** call `shell.execute()`\n- `global-shortcut:allow-register` — webview may register global keyboard shortcuts\n\nDefault permission sets (e.g. `core:default`, `shell:default`) bundle commonly-needed allows and can be referenced as a unit.\n\n### Shell Scope\n\nThe `shell` plugin supports an additional `global_scope_schema` that constrains **which** commands and arguments the webview may invoke. The scope is defined as an array of `ShellScopeEntry` objects:\n\n```json\n{\n  \"name\": \"my-script\",\n  \"cmd\": \"$HOME/scripts/my-script.sh\",\n  \"args\": [\n    { \"validator\": \"\\\\w+\" }\n  ]\n}\n```\n\nOr for sidecars:\n\n```json\n{\n  \"name\": \"my-sidecar\",\n  \"sidecar\": true,\n  \"args\": true\n}\n```\n\nArguments can be `true` (allow all), `false` (deny all), or an array of validators (regex patterns). This prevents arbitrary command injection from a compromised frontend.\n\n## How It Connects to the Rest of the Codebase\n\n```mermaid\nflowchart LR\n    A[\"tauri.conf.json<br/>capabilities/*.json\"] -->|cargo tauri build| B[\"gen/schemas/<br/>acl-manifests.json<br/>capabilities.json<br/>desktop-schema.json\"]\n    B -->|compile-time check| C[\"Rust backend<br/>(librefang-desktop)\"]\n    B -->|type generation| D[\"Frontend JS/TS<br/>@tauri-apps/api\"]\n    A -->|cargo tauri android init| E[\"gen/android/\"]\n    A -->|cargo tauri ios init| F[\"gen/apple/\"]\n```\n\n- The **developer** edits Tauri config files in the crate root.\n- The **Tauri CLI** reads those configs and regenerates `gen/`.\n- At **build time**, the Rust macro framework reads `gen/schemas/` to wire up IPC handlers and enforce that only permitted commands are reachable.\n- The **frontend** uses `@tauri-apps/api` bindings which are typed according to the same schema.\n\n## When to Regenerate\n\nThe `gen/` directory becomes stale when:\n\n- Plugins are added or removed from `Cargo.toml`\n- Permissions are modified in capability files\n- The Tauri version is bumped\n\nRun `cargo tauri build`, `cargo tauri dev`, or the relevant platform init command to regenerate. Commit the updated files afterward.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative application shell for LibreFang, built on Tauri 2.0. Compiles to a desktop binary (macOS, Windows, Linux) and mobile apps (iOS, Android) from a single crate.\n\n## Purpose\n\nThis crate is the **packaging and native integration layer**. It does not contain business logic — instead it wires together the core crates and exposes them through a native OS window with platform-specific capabilities like system trays, autostart, auto-update, and push notifications.\n\nThe underlying `librefang-api` crate serves the React frontend (from `librefang-api/static/react`) inside the Tauri webview, while `librefang-kernel` provides the agent runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    UI[\"React Frontend<br/>(librefang-api/static/react)\"]\n    API[\"librefang-api<br/>(HTTP/WS server)\"]\n    KERNEL[\"librefang-kernel<br/>(agent runtime)\"]\n    EXT[\"librefang-extensions\"]\n    DESKTOP[\"librefang-desktop<br/>(Tauri shell)\"]\n    PLUGINS[\"Tauri Plugins<br/>(tray, autostart, updater…)\"]\n\n    DESKTOP --> API\n    DESKTOP --> KERNEL\n    DESKTOP --> EXT\n    DESKTOP --> PLUGINS\n    API --> UI\n    API --> KERNEL\n    KERNEL --> EXT\n```\n\nOn **desktop**, everything runs locally: the Tauri webview loads the frontend from the embedded API server.\n\nOn **mobile**, the app is a **thin client**. The webview opens a `lfconnect://localhost/` URL that connects to a remote LibreFang daemon on your home server, VPS, or NAS. This is by design — LibreFang needs 24/7 uptime for cron jobs, channel adapters, and triggers, which iOS and Android cannot guarantee in the background. See [`MOBILE.md`](./MOBILE.md) for the full mobile architecture.\n\n## Build Entry Points\n\n| File | Role |\n|---|---|\n| `build.rs` | Calls `tauri_build::build()` — standard Tauri build script that compiles the frontend assets and generates bindings. |\n| `src/main.rs` | Desktop binary entry point. Initializes the Tauri app with all registered plugins and launches the kernel. |\n\nThe `[lib]` section declares three crate types: `\"staticlib\"`, `\"cdylib\"`, and `\"lib\"`. The staticlib and cdylib outputs are required by `cargo tauri ios build` and `cargo tauri android build` so the native shell (Xcode/Gradle) can
