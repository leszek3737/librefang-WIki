vault-initialized`, `vault-stored`\n- **Cron** — scheduled jobs: `cron-created`, `cron-toggled`\n- **Webhooks** — outbound integrations: `webhook-created`, `webhook-test-ok`\n- **Memory** — per-agent key/value store: `memory-set`, `memory-deleted`\n- **Devices** — mobile pairing: `device-scan-qr`, `device-removed`\n- **Approvals** — human-in-the-loop gating: `approval-responded`\n\n### Security & Diagnostics\n- **Security status** — audit trail, taint tracking, WASM sandbox, wire protocol: `section-security-status`, `audit-verified`\n- **Doctor** — health checks and auto-repair: `doctor-title`, `doctor-all-passed`\n- **Uninstall** — platform-aware cleanup (macOS launch agent, Windows registry, Linux systemd): `uninstall-goodbye`, `uninstall-removed-systemd`\n\n## Adding a New Locale\n\n1. Create `locales/<tag>/main.ftl` (e.g., `locales/ja/main.ftl`).\n2. Copy `locales/en/main.ftl` as the starting template.\n3. Translate every message value. **Do not** change message identifiers or variable names (`$provider`, `$error`, etc.).\n4. Keep `*-fix` messages paired with their parent errors and preserve the suggested commands (CLI flags and subcommands are not translated).\n\nExample — translating a single entry:\n\n```fluent\n# English (source)\ndaemon-started = Daemon started\n\n# Japanese (new locale)\ndaemon-started = デーモンが起動しました\n```\n\n## Adding New Messages\n\nWhen adding CLI features that produce user-facing output:\n\n1. Add the message to `locales/en/main.ftl` under the appropriate section comment.\n2. Immediately add the same identifier to all other locale files (untranslated is acceptable short-term; untranslated keys fall back to English at runtime).\n3. Follow the naming patterns: `error-*-fix` for error remediation, `section-*` for headings, `hint-*` for guidance.\n4. Use Fluent variables (`{ $name }`) for any dynamic content — never hard-code interpolated values into the string.\n\n## Relationship to the CLI\n\nThis module is a resource consumed by `librefang-cli` via a Fluent localization bundle. The CLI initializes the bundle with the user's locale (defaulting to `en`) and looks up messages by their Fluent identifier. Because the `.ftl` files contain no logic, the module has no call graph — it is read at runtime through the Fluent API and rendered into terminal output, status tables, and error reports.","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration template files used by the LibreFang CLI during project initialization. These TOML templates contain placeholder variables that are rendered with user-provided values and written to disk as the agent's runtime configuration.\n\n## Overview\n\nThe module contains two template files that serve different initialization paths:\n\n| File | Purpose |\n|---|---|\n| `init_default_config.toml` | Full reference configuration with every available section and inline documentation |\n| `init_wizard_config.toml` | Minimal configuration produced by the interactive setup wizard |\n\nBoth files use `{{mustache}}` placeholder syntax that the CLI replaces at init time.\n\n## Template Variables\n\nVariables shared across both templates:\n\n| Variable | Description | Example Rendered Value |\n|---|---|---|\n| `{{provider}}` | LLM provider identifier | `\"openai\"` |\n| `{{model}}` | Default model name | `\"gpt-4o\"` |\n| `{{api_key_env}}` | Environment variable holding the API key | `\"OPENAI_API_KEY\"` |\n\nVariables specific to the wizard template:\n\n| Variable | Description |\n|---|---|\n| `{{api_key_line}}` | Pre-formatted `api_key_env = \"...\"` line (or empty if using a provider that doesn't need a key) |\n| `{{routing_section}}` | Optional agent routing block generated based on wizard answers |\n\n## Template Details\n\n### init_default_config.toml\n\nA complete, heavily commented reference configuration. Every configurable section of LibreFang Agent OS is present, with most advanced features commented out. This template serves as both:\n\n- **A working default** — the uncommented values form a valid local-only configuration out of the box.\n- **Inline documentation** — each section explains its purpose, valid values, and caveats directly in the comments.\n\nKey sections included (in order):\n\n1. **Server** — bind address, log level, mode, update channel\n2. **Dashboard Login** — default credentials with vault/env-var alternatives noted\n3. **Terminal Access Control** — remote shell access and proxy header trust\n4. **Performance** — prompt caching, stable prefix mode, usage display\n5. **Default LLM** (`[default_model]`) — provider, model, API key source\n6. **Memory** (`[memory]`) — decay rate, optional embedding model\n7. **Proactive Memory** (`[proactive_memory]`) — auto-memorize, auto-retrieve, thresholds\n8. **Web Tools** (`[web]`, `[web.fetch]`) — search provider auto-detection, fetch limits, SSRF protection\n9. **Task Queue** (`[queue.concurrency]`) — lane concurrency limits\n10. **Shell Execution Policy** (`[exec_policy]`) — deny/allowlist/full mode, timeout, output cap\n11. **Config Hot-Reload** (`[reload]`) — off/restart/hot/hybrid reload strategies\n12. **Provider Regions / URLs** — endpoint overrides for multi-region or local providers\n13. **Fallback Providers** (`[[fallback_providers]]`) — LLM failover chain\n14. **Rate Limiting** (`[rate_limit]`) — GCRA API limits, WebSocket throttling\n15. **Registry Sync** (`[registry]`) — agent registry cache TTL\n16. **Session Compaction** (`[compaction]`) — LLM-based history summarization\n17. **Event Triggers** (`[triggers]`) — cooldown, recursion depth, workflow timeout\n18. **Budget & Cost Control** (`[budget]`) — global and per-provider spending caps\n19. **Extended Thinking** (`[thinking]`) — Claude extended thinking budget\n20. **Channels** (`[channels.telegram/discord/slack/wechat]`) — messaging platform integrations\n21. **MCP Servers** (`[[mcp_servers]]`) — external tool protocol servers\n22. **Browser Automation** (`[browser]`) — headless browser settings\n23. **Docker Sandbox** (`[docker]`) — containerized code execution\n24. **File Inbox** (`[inbox]`) — async file-based agent commands\n25. **Network** — P2P federation settings\n\n### init_wizard_config.toml\n\nA minimal skeleton produced after the user completes the interactive `librefang init` wizard. It contains only the essential fields needed to start the agent:\n\n- Server bind address\n- Default model configuration (rendered from wizard answers)\n- Memory configuration with decay rate\n- Any routing section the wizard generated\n\nAll other sections are omitted entirely — the runtime falls back to compiled-in defaults for anything not present in the file. Users who need advanced features can add sections manually or re-run init with the full template.\n\n## How Templates Are Used\n\n```mermaid\nflowchart LR\n    A[librefang init] --> B{Wizard mode?}\n    B -- Yes --> C[init_wizard_config.toml]\n    B -- No --> D[init_default_config.toml]\n    C --> E[Replace placeholders]\n    D --> E\n    E --> F[\"Write ~/.librefang/config.toml\"]\n```\n\nThe CLI's init command selects a template, substitutes the `{{variables}}` with values collected from the user (or from CLI flags), and writes the result to the project configuration directory.\n\n## Connecting to the Codebase\n\nThis module is a pure resource bundle — it contains no executable code, no imports, and no runtime dependencies. Other modules consume it by reading the template files at init time:\n\n- **librefang-cli** — the init command reads these files and performs placeholder substitution before writing the final config.\n- **Agent runtime** — reads the *rendered* `config.toml` (not the templates) at startup. All TOML section names, field names, and value formats must stay in sync with the runtime's configuration parser.\n\nWhen adding a new configuration section to the agent runtime, update `init_default_config.toml` to include it (commented out with documentation) so that users discover it in their generated config. If the wizard should configure it interactively, also add the rendered output to `init_wizard_config.toml`.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nThe primary command-line interface for LibreFang Agent OS. This crate produces the `librefang` binary and acts as the top-level aggregator, pulling in nearly every workspace crate to deliver a unified CLI experience.\n\n## Role in the Workspace\n\n`librefang-cli` sits at the apex of the dependency graph. It does not implement business logic itself — instead it wires together the kernel, API, skills, extensions, migration, and runtime layers behind a `clap`-driven command interface and an optional `ratatui`-based TUI.\n\n```mermaid\ngraph TD\n    CLI[librefang-cli] --> Kernel[librefang-kernel]\n    CLI --> API[librefang-api]\n    CLI --> Skills[librefang-skills]\n    CLI --> Extensions[librefang-extensions]\n    CLI --> Migrate[librefang-migrate]\n    CLI --> Runtime[librefang-runtime]\n    CLI --> Types[librefang-types]\n    API --> Types\n    Kernel --> Types\n```\n\n## Feature Flags\n\nFeatures control the binary's size and capability set:\n\n| Feature | Default | Effect |\n|---------|---------|--------|\n| `all-channels` | **on** | Enables all communication channels via `librefang-api/all-channels` |\n| `mini` | off | Builds a stripped-down variant via `librefang-api/mini` — excludes heavyweight channels |\n| `telemetry` | **on** | Enables OpenTelemetry tracing export (`opentelemetry_sdk`, `tracing-opentelemetry`) |\n\nTo build the minimal binary:\n\n```bash\ncargo build --package librefang-cli --no-default-features --features mini\n```\n\n## Build Script (`build.rs`)\n\nThe build script runs three tasks at compile time:\n\n### 1. Git Hooks Configuration\n\nAutomatically sets the repository's hooks path to `scripts/hooks` on every build. This ensures all developers share the same commit checks without manual setup. The command failure is silently ignored (e.g., when building outside a git checkout).\n\n### 2. Embedding Build Metadata\n\nThree environment variables are emitted and available at runtime via `env!()` or `option_env!()`:\n\n| Variable | Source | Example Value |\n|----------|--------|---------------|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a3f7c2d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nThese are used in `--version` output and diagnostic logs. All three gracefully fall back to `\"unknown\"` when the source command is unavailable (e.g., building from a tarball without git).\n\n### 3. Platform Note\n\nOn non-MSVC targets (Linux, macOS, BSD), the build links against **tikv-jemallocator** with `disable_initial_exec_tls` for improved allocation performance. MSVC builds use the system allocator.\n\n## Key Dependencies and Their Roles\n\n| Crate | Purpose in the CLI |\n|-------|--------------------|\n| `librefang-kernel` | Core agent lifecycle and state management |\n| `librefang-api` | Communication channel adapters (gRPC, HTTP, etc.) |\n| `librefang-skills` | Skill loading and execution |\n| `librefang-extensions` | Extension system |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-runtime` | Process registry and runtime utilities |\n| `librefang-types` | Shared domain types |\n| `clap` / `clap_complete` | Argument parsing and shell completion generation |\n| `ratatui` | Terminal UI rendering |\n| `tokio` | Async runtime |\n| `tracing` / `tracing-subscriber` | Structured logging |\n| `rusqlite` | Local SQLite storage |\n| `reqwest` | HTTP client (blocking feature enabled for synchronous operations) |\n| `rustls` | TLS without OpenSSL dependency |\n| `toml` / `toml_edit` | Configuration file reading and modification |\n| `fluent` / `unic-langid` | Internationalization (i18n) |\n| `zeroize` | Secure memory clearing for sensitive data |\n| `colored` | Terminal color output |\n\n## Building\n\n```bash\n# Full build (default features)\ncargo build --package librefang-cli\n\n# Release binary\ncargo build --package librefang-cli --release\n\n# Minimal binary without telemetry or full channels\ncargo build --package librefang-cli --no-default-features --features mini\n```\n\nThe resulting binary is located at `target/debug/librefang` or `target/release/librefang`.\n\n## Extending\n\nTo add a new workspace crate into the CLI:\n\n1. Add the dependency to `librefang-cli/Cargo.toml`.\n2. Import and wire the crate into the relevant `clap` subcommand in `src/main.rs`.\n3. If the crate introduces optional heavyweight dependencies, consider gating it behind a new feature flag that mirrors the `mini`/`all-channels` pattern.","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# LibreFang Desktop — Capabilities (`librefang-desktop/capabilities/`)\n\n## Overview\n\nThis directory contains the **Tauri capabilities configuration** for the LibreFang desktop application. Tauri's capability system is a permission model that controls which system APIs the application's frontend windows are allowed to invoke. Capabilities are defined in static JSON files, consumed by the Tauri build tooling at compile time, and enforced at runtime by the Tauri core.\n\nThe single file here — `default.json` — is the primary and currently only capability set. It grants the **main window** a curated set of permissions covering notifications, native dialogs, global keyboard shortcuts, auto-start registration, and in-app updates.\n\n## File: `default.json`\n\n```json\n{\n  \"$schema\": \"https://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json\",\n  \"identifier\": \"default\",\n  \"description\": \"Default permissions for the LibreFang desktop app\",\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"dialog:default\",\n    \"shell:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ]\n}\n```\n\n### Structure\n\n| Field | Value | Purpose |\n|---|---|---|\n| `$schema` | Tauri JSON Schema URL | Enables IDE autocomplete and validation for the capability file |\n| `identifier` | `\"default\"` | Unique name for this capability set; referenced by the Tauri runtime |\n| `description` | Human-readable string | Documents intent for developers |\n| `windows` | `[\"main\"]` | Restricts all listed permissions to only the `main` window — no other windows receive these grants |\n| `permissions` | Array of permission identifiers | Each entry maps to a Tauri plugin or core API permission |\n\n## Granted Permissions\n\n### Core\n\n| Permission | Effect |\n|---|---|\n| `core:default` | Baseline Tauri permissions — IPC bridge, window management, and essential app operations |\n\n### Notifications\n\n| Permission | Effect |\n|---|---|\n| `notification:default` | Send native desktop notifications via the OS notification center |\n\n### Native Dialogs\n\n| Permission | Effect |\n|---|---|\n| `dialog:default` | Open native file pickers, message boxes, and confirm/cancel dialogs |\n\n### Shell\n\n| Permission | Effect |\n|---|---|\n| `shell:default` | Open URLs or files in the user's default external applications (browser, etc.) |\n\n### Global Shortcuts\n\n| Permission | Effect |\n|---|---|\n| `global-shortcut:allow-register` | Register a system-wide keyboard shortcut that works even when the app is not focused |\n| `global-shortcut:allow-unregister` | Remove a previously registered global shortcut |\n| `global-shortcut:allow-is-registered` | Query whether a specific shortcut is currently registered |\n\nThese are specified individually (rather than using `global-shortcut:default`) to follow the principle of least privilege — only the three required operations are exposed.\n\n### Auto-Start\n\n| Permission | Effect |\n|---|---|\n| `autostart:default` | Register or unregister the app to launch automatically at system login |\n\n### Updater\n\n| Permission | Effect |\n|---|---|\n| `updater:default` | Check for, download, and install application updates |\n\n## How It Connects to the Codebase\n\n```mermaid\nflowchart LR\n    A[\"default.json<br/>(capabilities)\"] --> B[\"Tauri Build<br/>Tooling\"]\n    B --> C[\"Compiled<br/>Application\"]\n    D[\"Frontend<br/>(main window)\"] -->|\"IPC calls\"| E[\"Tauri Runtime<br/>(permission check)\"]\n    E -->|\"references\"| A\n    E -->|\"allows / denies\"| D\n```\n\nAt **build time**, Tauri reads all JSON files in the `capabilities/` directory, resolves the referenced plugin permissions, and embeds an access control list into the compiled binary.\n\nAt **runtime**, every IPC call from the `main` window to a Tauri API is checked against this embedded ACL. If a permission is not listed here, the call is rejected — even if the corresponding plugin is installed and initialized on the Rust side.\n\n## Adding New Permissions\n\nWhen integrating a new Tauri plugin or a new API from an existing plugin:\n\n1. **Install the plugin** on the Rust side (add to `Cargo.toml`, register in the builder).\n2. **Add the required permission identifier(s)** to the `permissions` array in `default.json`. Refer to the plugin's documentation for available permission strings — they follow the pattern `<plugin-name>:<permission-scope>`.\n3. **Use `:default`** for broad access during development, then narrow to specific `:allow-*` scopes for production.\n4. **Rebuild** the application. The new capability is picked up automatically.\n\n## Security Considerations\n\n- The `windows` field explicitly scopes permissions to the `main` window. Any dynamically opened windows or webviews will have **no permissions** unless a separate capability file targets them.\n- `shell:default` allows opening external URLs. If the app ever renders user-controlled content, ensure URLs are validated before passing them to the shell API.\n- Global shortcuts are registered system-wide. Avoid overriding common OS shortcuts to prevent conflicts.\n\n## Schema Validation\n\nThe `$schema` field points to the Tauri JSON Schema. Most editors (VS Code, JetBrains) will use this to provide autocomplete and flag invalid permission identifiers in real time. If working offline or against a different Tauri version, the schema URL can be updated accordingly.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop-gen\n\nAuto-generated Tauri v2 security schemas that define the IPC permission boundary between the LibreFang desktop frontend and the native backend. This directory is produced by Tauri's build process and should not be edited directly.\n\n## Directory Structure\n\n```\ngen/\n└── schemas/\n    ├── acl-manifests.json    # Plugin permission manifests\n    ├── capabilities.json     # Resolved capability grants\n    └── desktop-schema.json   # JSON Schema for capability files\n```\n\n## How It Works\n\nTauri v2 uses a capability-based security model. The webview frontend has zero access to native APIs unless a capability explicitly grants it. At build time, Tauri:\n\n1. Reads each plugin's permission definitions from `acl-manifests.json`\n2. Resolves the capabilities declared in the project's `capabilities/` directory\n3. Writes the resolved result to `capabilities.json`\n4. Generates `desktop-schema.json` for IDE validation of capability files\n\nThe frontend JavaScript bindings (`@tauri-apps/api`, `@tauri-apps/plugin-*`) check these permissions at runtime. Calling a command without its matching permission grant results in a runtime error.\n\n## Default Capability\n\nThe application defines a single capability (`capabilities.json`) applied to the `\"main\"` window:\n\n```json\n{\n  \"identifier\": \"default\",\n  \"local\": true,\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"shell:default\",\n    \"dialog:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ]\n}\n```\n\n### Granted Permission Summary\n\n| Permission Set | What It Allows |\n|---|---|\n| `core:default` | Path, event, window, webview, app, image, resources, menu, and tray operations (read-heavy defaults) |\n| `notification:default` | Full notification lifecycle: permission requests, sending, channels, batching, cancellation |\n| `shell:default` | Opening `http(s)://`, `tel:`, and `mailto:` links via the system handler |\n| `dialog:default` | All native dialog types: `ask`, `confirm`, `message`, `save`, `open` |\n| `global-shortcut:allow-*` | Registering, unregistering, and checking global keyboard shortcuts (no `register-all` or `unregister-all`) |\n| `autostart:default` | Enabling, disabling, and querying OS login boot state |\n| `updater:default` | Full update lifecycle: `check`, `download`, `install`, `download_and_install` |\n\n## Plugin Permission Reference\n\nEach plugin in `acl-manifests.json` follows the same structure:\n\n```json\n{\n  \"plugin-name\": {\n    \"default_permission\": { \"identifier\": \"default\", \"permissions\": [\"...\"] },\n    \"permissions\": {\n      \"allow-command\": { \"commands\": { \"allow\": [\"command\"], \"deny\": [] } },\n      \"deny-command\":  { \"commands\": { \"allow\": [], \"deny\": [\"command\"] } }\n    },\n    \"permission_sets\": {},\n    \"global_scope_schema\": null\n  }\n}\n```\n\n### Permission Naming Convention\n\n- `allow-{command}` — whitelists a specific IPC command\n- `deny-{command}` — explicitly blocks a command (takes priority over allow)\n- `{plugin}:default` — bundles a curated set of `allow-*` permissions\n\n### Plugins Included\n\n| Plugin | Default Commands (selected) |\n|---|---|\n| **autostart** | `enable`, `disable`, `is_enabled` |\n| **core:app** | `version`, `name`, `tauri_version`, `identifier`, `bundle_type`, `register_listener`, `remove_listener` |\n| **core:event** | `listen`, `unlisten`, `emit`, `emit_to` |\n| **core:image** | `new`, `from_bytes`, `from_path`, `rgba`, `size` |\n| **core:menu** | `new`, `append`, `prepend`, `insert`, `remove`, `popup`, `set_as_app_menu`, `set_text`, `set_accelerator`, etc. |\n| **core:path** | `resolve`, `resolve_directory`, `join`, `dirname`, `basename`, `extname`, `normalize`, `is_absolute` |\n| **core:resources** | `close` |\n| **core:tray** | `new`, `get_by_id`, `remove_by_id`, `set_icon`, `set_menu`, `set_tooltip`, `set_title`, `set_visible` |\n| **core:webview** | `get_all_webviews`, `webview_position`, `webview_size`, `internal_toggle_devtools` (default only) |\n| **core:window** | Position/size/state queries (default); mutation commands like `maximize`, `minimize`, `close`, `set_size`, `set_position` available but not in default |\n| **dialog** | `ask`, `confirm`, `message`, `save`, `open` |\n| **global-shortcut** | No default (empty); individual `register`/`unregister`/`is_registered` granted in the capability |\n| **notification** | Full lifecycle: `notify`, `request_permission`, `is_permission_granted`, `register_action_types`, `cancel`, `get_pending`, `get_active`, `show`, `batch`, channel management |\n| **shell** | `open` only by default; `execute`, `spawn`, `kill`, `stdin_write` available but not granted |\n| **updater** | `check`, `download`, `install`, `download_and_install` |\n\n## Shell Scope Schema\n\nThe `shell` plugin is the only plugin with a `global_scope_schema`, which validates shell command configurations. Scope entries support two forms:\n\n**System command:**\n```json\n{ \"name\": \"my-cmd\", \"cmd\": \"$HOME/script.sh\", \"args\": true }\n```\n\n**Sidecar:**\n```json\n{ \"name\": \"my-sidecar\", \"sidecar\": true, \"args\": [{ \"validator\": \"\\\\w+\" }] }\n```\n\nArguments can be:\n- `true` — allow any arguments\n- `false` — deny all arguments\n- An array of strings (fixed args) or objects with a `validator` regex\n\nPath variables available in `cmd`: `$AUDIO`, `$CACHE`, `$CONFIG`, `$DATA`, `$LOCALDATA`, `$DESKTOP`, `$DOCUMENT`, `$DOWNLOAD`, `$EXE`, `$FONT`, `$HOME`, `$PICTURE`, `$PUBLIC`, `$RUNTIME`, `$TEMPLATE`, `$VIDEO`, `$RESOURCE`, `$LOG`, `$TEMP`, `$APPCONFIG`, `$APPDATA`, `$APPLOCALDATA`, `$APPCACHE`, `$APPLOG`.\n\n## Capability File Format\n\n`desktop-schema.json` defines the valid structure for capability files used in the project's `src-tauri/capabilities/` directory. A capability file can be:\n\n- A single `Capability` object\n- An array of `Capability` objects\n- An object with a `capabilities` array property\n\nEach `Capability` has:\n\n| Field | Required | Description |\n|---|---|---|\n| `identifier` | Yes | Unique name for the capability |\n| `permissions` | Yes | Array of permission identifiers or scoped permission objects |\n| `description` | No | Human-readable purpose |\n| `windows` | No | Window labels this applies to (supports glob patterns) |\n| `webviews` | No | Webview labels this applies to (finer-grained than windows) |\n| `local` | No | Enable for local app URLs (default: `true`) |\n| `remote` | No | Remote URL patterns allowed to use these permissions |\n| `platforms` | No | Restrict to specific OS targets |\n\n## Modifying Permissions\n\nTo change the app's permission grants:\n\n1. Edit files in `src-tauri/capabilities/` (not this `gen/` directory)\n2. Rebuild the project — Tauri regenerates `gen/schemas/` automatically\n3. The regenerated files reflect the updated capability configuration\n\nNever edit files in `gen/schemas/` directly. They are overwritten on every build.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop application for LibreFang Agent OS, built on Tauri 2.0. Provides a system-tray–resident agent host with a local web UI, auto-update support, and deep integration with the LibreFang core libraries.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-desktop (Tauri 2.0)\"\n        A[main.rs] --> B[Tauri Runtime]\n        B --> C[System Tray]\n        B --> D[WebView Windows]\n        B --> E[Tauri Plugins]\n    end\n\n    subgraph \"Core Libraries\"\n        F[librefang-kernel]\n        G[librefang-api]\n        H[librefang-types]\n        I[librefang-extensions]\n    end\n\n    A --> F\n    A --> G\n    A --> H\n    A --> I\n    G -->|axum server| J[Local HTTP/WS]\n    D -->|loads| J\n```\n\nThe application starts a Tauri runtime with **no initial windows** (see `app.windows: []` in `tauri.conf.json`). Windows are created programmatically—typically pointing to a local axum HTTP server provided by `librefang-api`. This lets the desktop shell share the same frontend served to remote clients.\n\n## Key Components\n\n### Tauri Plugins\n\n| Plugin | Purpose |\n|--------|---------|\n| `tauri-plugin-notification` | Native OS notifications for agent events |\n| `tauri-plugin-shell` | Execute shell commands from the frontend |\n| `tauri-plugin-single-instance` | Prevent multiple app instances from running simultaneously |\n| `tauri-plugin-dialog` | Native file open/save dialogs |\n| `tauri-plugin-global-shortcut` | System-wide keyboard shortcuts |\n| `tauri-plugin-autostart` | Launch on system startup |\n| `tauri-plugin-updater` | Signed auto-updates from GitHub Releases |\n\n### Core Library Integration\n\n- **`librefang-kernel`** — Agent orchestration engine, loaded as the primary runtime dependency.\n- **`librefang-api`** — Provides the axum-based HTTP/WebSocket server. The desktop app runs this locally so the Tauri WebView can connect to `http://127.0.0.1:*` or `ws://127.0.0.1:*`.\n- **`librefang-types`** — Shared data structures used across all crates.\n- **`librefang-extensions`** — Plugin/extension system for agents.\n\nAdditional runtime dependencies include `clap` for CLI argument parsing, `dirs` for platform-specific paths, `reqwest` for outbound HTTP, `tokio` for async runtime, and `open` to launch external URLs in the default browser.\n\n## Feature Flags\n\nFeatures are defined in `Cargo.toml` and control which channel backends are compiled:\n\n| Feature | Effect |\n|---------|--------|\n| `default` | Standard channel set via `librefang-api/default` |\n| `all-channels` | Enables every available messaging channel |\n| `mini` | Minimal build with reduced channel support |\n| `custom-protocol` | Production-only; tells Tauri to use `tauri://` protocol instead of `dev://` |\n\nFor production builds, always enable `custom-protocol`:\n\n```bash\ncargo build --features custom-protocol\n```\n\n## Configuration (`tauri.conf.json`)\n\n### Application Identity\n\n- **Product name:** `LibreFang`\n- **Identifier:** `ai.librefang.desktop`\n- **Version:** `26.4.32222`\n\n### Content Security Policy\n\nThe CSP is permissive toward `127.0.0.1` on any port, allowing the WebView to communicate with the local axum server over HTTP and WebSocket. External connections are restricted to Google Fonts. Key directives:\n\n- `default-src 'self' http://127.0.0.1:* ws://127.0.0.1:*`\n- `connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:*`\n- `object-src 'none'` — blocks plugin content entirely\n- `script-src` allows `'unsafe-inline' 'unsafe-eval'` for framework compatibility\n\n### Auto-Updater\n\nUpdates are fetched from GitHub Releases using a public key for signature verification:\n\n```\nendpoint: https://github.com/librefang/librefang/releases/latest/download/latest.json\n```\n\nOn Windows, the install mode is `passive` (shows a progress bar but requires no user interaction).\n\n### Bundle Targets\n\nThe bundler is configured to produce **all target formats**:\n\n| Platform | Format | Notes |\n|----------|--------|-------|\n| Linux | `.deb`, `.AppImage` | No media framework bundled |\n| macOS | `.dmg` / `.app` | Minimum macOS 12.0 |\n| Windows | `.msi` / `.exe` | SHA-256 digest; WebView2 bootstrapped on install |\n\n## Building\n\nThe build script (`build.rs`) delegates entirely to `tauri_build::build()`, which generates Tauri's runtime artifacts from `tauri.conf.json`.\n\n```bash\n# Development\ncargo build -p librefang-desktop\n\n# Production (release with custom protocol)\ncargo build -p librefang-desktop --release --features custom-protocol\n\n# Tauri CLI (recommended for full dev experience)\ncargo tauri dev\ncargo tauri build\n```\n\n## System Tray Behavior\n\nThe `tray-icon` feature flag is enabled, meaning the application registers a system tray icon on launch. Since no windows are declared in the config, the app starts as a background process and surfaces its UI on demand—either through the tray menu or a global shortcut. Combined with `tauri-plugin-autostart`, the agent host can run silently from login.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nExtension and integration layer for LibreFang. Provides three tightly-coupled subsystems that allow LibreFang to talk to external services securely:\n\n- **MCP server provisioning** — one-click setup for Model Context Protocol servers\n- **Credential vault** — encrypted-at-rest storage for API keys, tokens, and secrets\n- **OAuth2 PKCE flow** — browser-based authorization with automatic token refresh\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-extensions] --> B[MCP Server Setup]\n    A --> C[Credential Vault]\n    A --> D[OAuth2 PKCE]\n    C --> E[Argon2 KDF]\n    C --> F[AES-256-GCM Encryption]\n    D --> G[Axum Callback Server]\n    D --> H[reqwest HTTP Client]\n    B --> C\n    D --> C\n```\n\nMCP server setup and OAuth2 PKCE both depend on the credential vault to persist the secrets they obtain. The vault encrypts all values with AES-256-GCM using a key derived through Argon2, and clears intermediate buffers with `zeroize`.\n\n## Key Dependencies and Why They Exist\n\n| Dependency | Purpose |\n|---|---|\n| `aes-gcm` | Authenticated encryption for the credential vault |\n| `argon2` | Key derivation from a master password or system key |\n| `zeroize` | Securely overwrite secret material in memory after use |\n| `axum` | Lightweight HTTP server to receive OAuth2 redirect callbacks |\n| `reqwest` + `rustls` | TLS-capable HTTP client for token exchange; uses `rustls` with both `webpki-roots` and `rustls-native-certs` for maximum certificate compatibility |\n| `dashmap` | Lock-free concurrent map for in-memory credential and extension state |\n| `sha2` + `rand` | PKCE code verifier/challenge generation and general cryptographic randomness |\n| `base64` | Encoding PKCE challenges and vault payloads |\n| `toml` | Persisting extension configuration to disk |\n\n## Credential Vault\n\nThe vault is the security foundation. Every secret that flows through this module — MCP server tokens, OAuth2 access/refresh pairs — lands here.\n\n**Encryption scheme:**\n\n1. A master secret (password or OS keyring-backed) is fed through Argon2 to produce a 256-bit key.\n2. Each stored value gets a random 96-bit nonce.\n3. Values are encrypted with AES-256-GCM, which provides both confidentiality and integrity.\n4. The serialized vault is written to the filesystem via `toml` (metadata) and binary blobs.\n\n**In-memory model:** `DashMap` provides concurrent read/write access without a global lock. Individual entries are sharded, so reading one credential doesn't block writes to another. Values are wrapped in types that implement `Zeroize` so that when an entry is dropped, the underlying bytes are overwritten.\n\n## OAuth2 PKCE\n\nImplements the Authorization Code flow with PKCE (Proof Key for Code Exchange), suitable for public clients that cannot hold a client secret.\n\n**Flow:**\n\n1. Generate a cryptographically random `code_verifier` (via `rand`).\n2. Derive the `code_challenge` as `BASE64URL(SHA256(code_verifier))` using `sha2` and `base64`.\n3. Spin up a temporary `axum` server on a localhost port to serve the redirect URI.\n4. Open the user's browser to the authorization endpoint with the challenge.\n5. On callback, exchange the authorization code + verifier for tokens via `reqwest`.\n6. Store the resulting access token and refresh token in the credential vault.\n\nThe `rustls` stack ensures that token exchange happens over TLS with a reasonable set of trusted roots, combining Mozilla's `webpki-roots` with the system's native certificate store.\n\n## MCP Server Setup\n\nProvides streamlined provisioning of MCP-compatible servers. This subsystem:\n\n- Reads server descriptors (connection parameters, capabilities) from `toml` configuration files.\n- Manages the lifecycle of server registrations.\n- Retrieves any required authentication credentials from the credential vault, or triggers OAuth2 PKCE if a new token is needed.\n- Persists server state so that a previously configured server can be reconnected on launch without user intervention.\n\n## Error Handling\n\nAll public APIs return `Result<T, E>` where `E` is a module-level error enum derived via `thiserror`. Error variants cover:\n\n- Vault decryption failures (wrong master key, corrupted data)\n- I/O errors reading or writing config/vault files\n- HTTP failures during OAuth2 token exchange\n- PKCE state mismatches (possible CSRF or stale sessions)\n- TLS handshake errors\n\nErrors are instrumented with `tracing` spans so they appear in structured logs with context.\n\n## Testing\n\nThe dev-dependencies indicate the test strategy:\n\n- `tokio-test` — async test harness for the OAuth2 callback server and concurrent vault operations.\n- `tempfile` — isolated filesystem roots for vault and config files, no side effects on the developer's machine.\n- `serial_test` — serializes tests that share global state (such as the system keyring or a bound port).\n- `librefang-runtime` — the full runtime is available in tests for integration scenarios that exercise extension loading end-to-end.\n\n## Relationship to Other Crates\n\n```\nlibrefang-types\n     │\n     ▼\nlibrefang-extensions\n     │\n     ▼\nlibrefang-runtime   (dev-dependency only; integration tests)\n```\n\nThe module consumes shared types from `librefang-types` (extension descriptors, credential shapes, error codes) and is itself consumed by higher layers in the LibreFang stack. It has no downward dependency on `librefang-runtime` outside of tests, keeping the extension system independently testable and portable.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nCurated autonomous capability packages for the LibreFang system.\n\n## Overview\n\n**Hands** are self-contained, declaratively-defined capability units that encapsulate specific autonomous behaviors. Each Hand represents a discrete skill or set of skills that can be loaded, inspected, and executed by the LibreFang runtime. The term draws from the metaphor of different \"hands\" an agent can use to interact with the world — each one purpose-built for a class of tasks.\n\nThis crate provides the infrastructure for defining, loading, validating, storing, and managing Hand packages. It does **not** execute Hands directly — that responsibility belongs to `librefang-runtime`. Instead, this module acts as the registry and lifecycle manager for Hand definitions.\n\n## Conceptual Model\n\n```\n┌─────────────────────────────────────────────────┐\n│                  Hand Package                    │\n│                                                  │\n│  ┌──────────────┐  ┌──────────────────────────┐ │\n│  │  Manifest    │  │  Capability Definitions   │ │\n│  │  (TOML)      │  │  (Serialized Structs)     │ │\n│  └──────────────┘  └──────────────────────────┘ │\n│                                                  │\n│  Identity (UUID) · Metadata · Timestamps        │\n└─────────────────────────────────────────────────┘\n```\n\nA Hand is characterized by:\n\n- **Identity** — A UUID uniquely identifying the Hand package.\n- **Manifest** — A TOML-based configuration file declaring the Hand's metadata, dependencies, and capabilities.\n- **Capabilities** — The serialized definitions of what the Hand can do, structured as typed data.\n- **Timestamps** — Creation and modification records via `chrono` for lifecycle tracking.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Hand Definition Files] -->|TOML parse| B[Hand Registry]\n    C[Serialized Hand Data] -->|JSON deserialize| B\n    B -->|Store| D[DashMap Concurrent Store]\n    B -->|Validate| E[Validation Layer]\n    E -->|Report| F[tracing Logs]\n    D -->|Hand Reference| G[librefang-runtime]\n```\n\nThe module is structured around a **registry pattern** backed by `DashMap`, providing lock-free concurrent access to loaded Hand definitions. This allows multiple runtime components to query available Hands without blocking.\n\n## Key Dependency Roles\n\n| Dependency | Role in this Module |\n|---|---|\n| `librefang-types` | Shared type definitions for Hand structures, capability descriptors, and cross-crate contracts |\n| `serde` / `serde_json` / `toml` | Serialization framework: TOML for human-authored manifests, JSON for machine interchange |\n| `thiserror` | Typed error definitions for Hand loading, validation, and registry operations |\n| `tracing` | Structured logging of Hand lifecycle events — registration, validation failures, lookups |\n| `uuid` | Stable unique identifiers for each Hand package |\n| `chrono` | Timestamping Hand registration and modification events |\n| `dashmap` | Concurrent hashmap for the Hand registry, enabling lock-free reads from multiple threads |\n\n## Hand Lifecycle\n\n1. **Definition** — A Hand is authored as a TOML manifest accompanied by capability descriptors.\n2. **Loading** — The manifest is parsed and deserialized into typed structures using `serde` + `toml`.\n3. **Validation** — The parsed Hand is checked for completeness, structural correctness, and compatibility.\n4. **Registration** — A valid Hand is assigned a UUID (if not already present), timestamped, and inserted into the concurrent registry.\n5. **Lookup** — Runtime and other consumers query the registry by UUID or capability type.\n6. **Deregistration** — Hands can be removed from the registry, with appropriate logging.\n\n## Error Handling\n\nAll errors in this module are defined using `thiserror` derivations. Expected error categories include:\n\n- **Parse errors** — Malformed TOML manifests or invalid JSON capability data.\n- **Validation errors** — Missing required fields, incompatible versions, or duplicate registrations.\n- **Registry errors** — Hands not found, or conflicts during insertion.\n\nErrors are propagated with context via `tracing` spans, making it possible to trace a failure back to a specific Hand package and loading step.\n\n## Relationship to Other Crates\n\n```\nlibrefang-types  ←── librefang-hands  ──→  librefang-runtime\n     (shared types)    (registry/management)    (execution)\n```\n\n- **Depends on `librefang-types`** for the structural definitions that Hands conform to.\n- **Used by `librefang-runtime`** which is listed as a dev-dependency, confirming that the runtime consumes Hand references from this module's registry during integration tests.\n- The module has **no incoming or outgoing runtime calls** in its static call graph, reflecting its role as a data management layer rather than an orchestration layer.\n\n## Testing\n\nThe test suite uses:\n\n- **`tokio-test`** — For async test helpers, confirming that registry operations are designed for async contexts.\n- **`tempfile`** — Creates temporary directories and files for testing Hand loading from disk without polluting the filesystem.\n- **`serial_test`** — Ensures certain tests run sequentially, likely to prevent race conditions on shared registry state during test parallelism.\n- **`librefang-runtime`** (dev-only) — Integration tests that verify the runtime can correctly consume registered Hands.\n\nTests are expected to cover manifest parsing, validation acceptance/rejection, concurrent registry access, and Hand lifecycle transitions.\n\n## Design Principles\n\n- **Curated, not crowdsourced** — Hands are expected to pass validation before entering the registry. This is a deliberate quality gate.\n- **Immutable once registered** — A Hand's definition does not change after registration. If an update is needed, a new UUID/version is registered.\n- **Thread-safe by default** — The `DashMap`-backed registry eliminates the need for external locking in consumers.\n- **Declarative over imperative** — Hands are defined by what they *are* (their capabilities, metadata, constraints) rather than by executable code. Execution logic lives in the runtime.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing proxy awareness and TLS certificate fallback for the LibreFang ecosystem.\n\n## Purpose\n\nThis crate centralizes the construction of `reqwest::Client` instances so that every component in LibreFang makes outbound HTTP requests with a consistent TLS and proxy configuration. Rather than each crate independently wiring up its own client, they delegate to the builder exposed here.\n\n## Key Responsibilities\n\n### TLS Configuration\n\nThe crate uses **rustls** rather than the native TLS stack, configured with a two-tier certificate loading strategy:\n\n1. **System certificates** — Loaded via `rustls-native-certs`, which reads the OS certificate store.\n2. **Mozilla roots fallback** — If the system store is empty or unavailable, `webpki-roots` provides Mozilla's curated root set.\n\nThis ensures the client works across minimal containers (where no system CA bundle exists) as well as standard OS environments (where corporate or custom CAs may be installed).\n\n### Proxy Support\n\nThe builder forwards proxy configuration through to reqwest, respecting standard environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`) by default.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang crates |\n| `reqwest` | Underlying HTTP client that this crate configures |\n| `rustls` | Pure-Rust TLS implementation |\n| `webpki-roots` | Bundled Mozilla CA certificates (fallback) |\n| `rustls-native-certs` | Loader for OS-native CA certificates (primary) |\n| `tracing` | Structured logging for TLS load successes and failures |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Calling crate] -->|requests client| B[librefang-http builder]\n    B --> C[reqwest::Client]\n    B --> D[rustls::ClientConfig]\n    D --> E[rustls-native-certs]\n    D -->|fallback| F[webpki-roots]\n    E -->|load system CAs| D\n    F -->|load Mozilla CAs| D\n    C --> G[Outbound requests]\n```\n\n## Integration\n\nOther LibreFang crates depend on `librefang-http` and call into it to obtain a preconfigured `reqwest::Client`. The `librefang-types` dependency keeps any shared configuration or option types consistent across the boundary.\n\nTracing spans are emitted when certificate loading succeeds or fails, making it straightforward to diagnose TLS handshake issues in production logs without enabling verbose reqwest debugging.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\n## Purpose\n\nThis crate defines the **`KernelHandle`** trait — the primary interface that in-process callers use to interact with the LibreFang kernel. It serves as the contract between consumer code (plugins, services, or internal subsystems) and the kernel's core operations.\n\nRather than exposing kernel internals directly, the `KernelHandle` trait provides an abstracted, async-capable boundary. Any in-process component that needs to invoke kernel functionality does so through this trait, keeping the coupling loose and testable.\n\n## Role in the Architecture\n\n```\n┌──────────────────────────────┐\n│   In-process callers         │\n│   (plugins, services, etc.)  │\n│                              │\n│         KernelHandle trait   │\n│              ▲               │\n│              │               │\n│   ┌──────────┴──────────┐    │\n│   │  Concrete kernel     │    │\n│   │  implementation      │    │\n│   └─────────────────────┘    │\n└──────────────────────────────┘\n```\n\nThe trait lives in its own crate so that consumers depend only on this lightweight interface — not on the full kernel implementation. This separation means:\n\n- **Consumers** add `librefang-kernel-handle` as a dependency and program against the trait.\n- **The kernel** provides a concrete implementation of `KernelHandle`.\n- **Tests** can substitute a mock or stub implementation without pulling in kernel internals.\n\n## Dependencies and What They Indicate\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared domain types used in trait method signatures and return values. |\n| `async-trait` | The `KernelHandle` trait is async — methods return futures that callers `.await`. |\n| `serde` / `serde_json` | Some trait methods accept or return serialized data, likely for message-passing or persistence boundaries. |\n| `tokio` | Async runtime primitives (channels, spawning) used within the trait's support code or default method bodies. |\n| `tracing` | Instrumentation spans for observability across kernel calls. |\n| `uuid` | Operations are identified or keyed by UUID — sessions, requests, or entity references. |\n\n## Usage Pattern\n\nA typical consumer receives a `KernelHandle` implementation (often via dependency injection or construction at startup) and calls trait methods:\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\n\nasync fn do_work(kernel: &dyn KernelHandle) {\n    // Call methods defined on the trait — the concrete kernel\n    // handles dispatch, validation, and side effects.\n}\n```\n\nBecause the trait is defined with `async-trait`, every method returns a `Pin<Box<dyn Future>>` that the caller simply awaits. Implementors provide the concrete async logic.\n\n## Connection to the Rest of the Codebase\n\n- **`librefang-types`**: The shared vocabulary. Every struct, enum, or newtype that crosses the `KernelHandle` boundary is defined there, ensuring both the kernel and its consumers agree on the data shapes.\n- **Kernel implementation crate**: Provides the concrete struct that `impl KernelHandle`. That crate depends on `librefang-kernel-handle` (for the trait) plus all the subsystem crates needed to actually fulfill requests.\n- **Consumer crates**: Any in-process component that needs kernel access depends on `librefang-kernel-handle` and accepts `dyn KernelHandle` (or a generic parameter constrained by it).\n\n## Implementing `KernelHandle`\n\nWhen adding a new method to the trait:\n\n1. **Define it in this crate** with an async signature via `async-trait`.\n2. **Update the kernel implementation** to provide the concrete logic.\n3. **Update tests and mocks** to cover the new method.\n4. **Keep `librefang-types` in sync** — any new parameter or return type belongs there, not here.\n\nThis crate should never contain business logic. Its sole responsibility is the trait definition and any supporting types that are *specific* to the handle abstraction itself (e.g., error types wrapping kernel-level errors for consumption by callers).","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Purpose\n\nThis module is responsible for tracking resource consumption during kernel operations and enforcing quota limits. It provides the accounting layer that ensures callers cannot exceed their allocated resource budgets—whether those resources are CPU time, memory allocations, or other finite kernel resources.\n\nMetering sits between the execution of an operation and its completion: every significant resource-consuming action is recorded, and quotas are checked before expensive operations proceed.\n\n## Dependencies\n\n| Dependency | Role in This Module |\n|---|---|\n| `librefang-types` | Shared types for representing costs, quotas, and metering identifiers |\n| `librefang-memory` | Memory allocation tracking and accounting |\n| `librefang-runtime` | Access to runtime context for correlating metering data with executing tasks |\n| `serde` | Serialization of metering records for persistence, logging, or network transmission |\n\n## Architectural Role\n\n```\n┌─────────────────────┐\n│   Calling Module    │\n└─────────┬───────────┘\n          │ check quota / record cost\n          ▼\n┌─────────────────────────────┐\n│  librefang-kernel-metering  │\n│                             │\n│  • Quota enforcement        │\n│  • Cost accumulation        │\n│  • Usage reporting          │\n└─────────┬───────────────────┘\n          │ reads / writes\n          ▼\n┌─────────────────────────────┐\n│  librefang-memory           │\n│  (allocation accounting)    │\n└─────────────────────────────┘\n```\n\nThe metering module is a cross-cutting concern. Other kernel components query it before performing expensive operations, and report costs back to it after operations complete. It does not drive execution itself—it is consulted by callers.\n\n## Key Concepts\n\n### Cost\n\nA quantified measure of resource consumption. Costs are associated with specific operations or task contexts and accumulate over the lifetime of a task or session.\n\n### Quota\n\nA predefined upper bound on allowed resource consumption. Quotas are checked before operations proceed. When a quota would be exceeded, the operation is rejected rather than allowed to fail partway through.\n\n### Metering Context\n\nThe runtime context against which costs are accumulated. Typically tied to a task, session, or tenant identity so that enforcement is scoped correctly.\n\n## Integration Notes\n\nWhen adding a new resource-consuming operation to the kernel:\n\n1. **Before the operation**: Query the metering module to check whether the projected cost fits within the active quota. Abort early if it does not.\n2. **After the operation**: Report the actual cost incurred. This keeps the metering ledger accurate even when actual costs differ from projections.\n3. **On task/session teardown**: Metering data is available for final reporting or serialization via `serde`.\n\nWhen defining a new resource type, extend the cost types in `librefang-types` so that metering can represent and track the new dimension.\n\n## Caution\n\nBecause metering is invoked on hot paths, operations within this module should remain lightweight. Avoid allocations within metering logic itself—use pre-sized buffers or borrow from the caller where possible. Quota checks in particular must be fast, as they gate every metered operation.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand/Template routing engine for the LibreFang kernel.\n\n## Overview\n\n`librefang-kernel-router` provides the routing logic that maps incoming requests or events to the appropriate **Hand** definitions and **Templates** within the LibreFang kernel. It acts as the central dispatch layer, determining which hand should handle a given input based on configurable routing rules.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Input Event] --> B[Router]\n    B --> C{Match Route}\n    C -->|Pattern Match| D[Hand A]\n    C -->|Pattern Match| E[Hand B]\n    C -->|Default| F[Fallback Hand]\n    D --> G[Resolved Template]\n    E --> H[Resolved Template]\n```\n\nThe router evaluates routing rules—defined via pattern matching—against incoming data and resolves the target hand. Each hand may further resolve to a template for response generation or processing.\n\n## Key Concepts\n\n### Hands\n\nHands are the primary processing units that the router dispatches to. The router depends on `librefang-hands` for hand definitions and lifecycle management. A hand encapsulates the logic for handling a specific category of input.\n\n### Templates\n\nTemplates define the structure or format of outputs associated with a hand. The router resolves which template to use as part of the routing decision.\n\n### Routing Rules\n\nRouting rules are the core configuration that drives dispatch behavior. Rules are defined in TOML format and use pattern matching (via `regex-lite`) to match against incoming data characteristics. The router evaluates rules in priority order and selects the first matching hand.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across the kernel |\n| `librefang-hands` | Hand definitions and management |\n| `serde` / `serde_json` | Serialization of routing configuration and match results |\n| `regex-lite` | Lightweight pattern matching for route evaluation |\n| `toml` | Parsing TOML-based routing configuration files |\n| `dirs` | Resolving platform-specific configuration directories |\n| `tracing` | Structured logging and diagnostics |\n\n### Development Dependencies\n\n- **`tempfile`** — Used in tests for temporary configuration files.\n- **`librefang-runtime`** — Provides the runtime context for integration tests that exercise the full routing pipeline.\n\n## Configuration\n\nRouting rules are loaded from TOML configuration files. The `dirs` crate is used to locate platform-appropriate configuration directories, allowing user-level and system-level routing overrides.\n\n## Integration Points\n\nThis module sits between the input layer and the hand execution layer within the LibreFang kernel:\n\n- **Upstream consumers** pass raw input to the router for dispatch.\n- **Downstream**, the router resolves a `librefang-hands` hand instance and its associated template.\n- **`librefang-types`** provides the shared types that both the router and its consumers rely on for type-safe communication.\n\n## Testing\n\nTests use `tempfile` to create isolated configuration environments and `librefang-runtime` to bootstrap a minimal runtime context. This allows integration tests to exercise the full routing pipeline—from loading configuration through to hand resolution—without affecting system state.","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# librefang-kernel-src\n\nThe core security and governance layer of LibreFang. This module contains two primary subsystems — **approval management** (gating dangerous tool executions behind human decisions) and **RBAC authentication** (mapping platform identities to roles and enforcing permissions) — along with kernel-level integration tests.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"External callers\"\n        API[\"API routes<br/>(system.rs, terminal.rs)\"]\n        CB[\"Channel bridge<br/>(channel_bridge.rs)\"]\n        DASH[\"Dashboard API<br/>(librefang-api/server.rs)\"]\n    end\n\n    subgraph \"librefang-kernel-src\"\n        AM[\"ApprovalManager<br/>(approval.rs)\"]\n        AU[\"AuthManager<br/>(auth.rs)\"]\n    end\n\n    subgraph \"Storage\"\n        DASHDB[(\"SQLite audit DB\")]\n        INMEM[(\"In-memory<br/>DashMap + VecDeque\")]\n    end\n\n    AM --> DASHDB : \"audit_log_write<br/>persist_totp_lockout_*\"\n    AM --> INMEM : \"pending / recent\"\n    API --> AM : \"resolve, submit_request,<br/>list_pending, query_audit\"\n    CB --> AM : \"verify_totp_code,<br/>verify_recovery_code\"\n    DASH --> AU : \"from_str_role\"\n    DASH --> AM : \"verify_totp_code_with_issuer\"\n    API --> AU : \"authorize\"\n```\n\n---\n\n## ApprovalManager (`approval.rs`)\n\nGates dangerous tool invocations (shell execution, file writes, etc.) behind human-in-the-loop approval decisions. Supports both blocking and non-blocking (deferred) execution paths, TOTP second-factor authentication, escalation chains, and persistent audit logging.\n\n### Construction\n\n```rust\n// In-memory only (no audit DB)\nlet mgr = ApprovalManager::new(policy);\n\n// With SQLite audit logging and TOTP lockout persistence\nlet mgr = ApprovalManager::new_with_db(policy, conn);\n```\n\n`new_with_db` loads persisted TOTP lockout state from the `totp_lockout` table, discarding entries whose lockout window has already expired so a daemon restart does not extend the original 5-minute window.\n\n### Two Execution Paths\n\n**Blocking path** — `request_approval(req)` — the calling agent coroutine suspends until a human resolves the request, it times out, or the per-agent pending limit is hit. Internally uses a `tokio::sync::oneshot` channel to deliver the decision back to the waiting future.\n\n**Deferred (non-blocking) path** — `submit_request(req, deferred)` — returns the request UUID immediately. The `DeferredToolExecution` payload is stored alongside the pending request and returned atomically on `resolve()`. The kernel's periodic sweep (`expire_pending_requests`) handles timeouts for deferred requests.\n\nBoth paths enforce a per-agent limit of `MAX_PENDING_PER_AGENT` (5) and reject overflow immediately.\n\n### Policy Resolution: `requires_approval` vs `requires_approval_with_context`\n\n`requires_approval(tool_name)` checks only the static `require_approval` list, supporting glob patterns (`file_*`, `*_exec`, `*`).\n\n`requires_approval_with_context(tool_name, sender_id, channel)` applies a layered override chain:\n\n1. **Trusted sender bypass** — if `sender_id` appears in `policy.trusted_senders`, returns `false` (no approval needed) regardless of tool or channel.\n2. **Channel-specific rules** — if a `channel_rules` entry matches the channel, its `allowed_tools` / `denied_tools` list takes precedence. An explicit allow bypasses approval; an explicit deny forces it.\n3. **Default list** — falls back to glob-matching against `require_approval`.\n\n`is_tool_denied_with_context` performs the same checks but returns a boolean for the deny-only case (trusted senders bypass channel deny rules).\n\n### Escalation and Timeout\n\nThe timeout behavior depends on `policy.timeout_fallback`:\n\n| `TimeoutFallback` variant | Behavior on timeout |\n|---|---|\n| `TimedOut` (default) | Resolves as `ApprovalDecision::TimedOut` |\n| `Skip` | Resolves as `ApprovalDecision::Skipped` |\n| `Escalate { extra_timeout_secs }` | Bumps `escalation_count`, re-inserts with extended timeout. After `MAX_ESCALATIONS` (3) rounds, falls through to `TimedOut`. |\n\nThe effective timeout for escalation is `request.timeout_secs + (extra_timeout_secs × escalation_count)`, giving each round more time for the human to respond.\n\n`expire_pending_requests` is called periodically by the kernel. It returns escalated requests (still pending) and expired requests (with their deferred payloads) separately so the kernel can re-notify for escalations and execute fallback decisions for expirations.\n\n### Resolution: `resolve` and Batch Operations\n\n`resolve(request_id, decision, decided_by, totp_verified, user_id)` is the core resolution method:\n\n- Returns `(ApprovalResponse, Option<DeferredToolExecution>)` — the deferred payload is `Some` for the non-blocking path.\n- If the request was already resolved, returns an error containing who resolved it (e.g., `\"Already denied by admin\"`).\n- On success, records to the in-memory `recent` deque (capped at `MAX_RECENT_APPROVALS` = 100) and writes to the SQLite `approval_audit` table if configured.\n\nBatch operations:\n\n- **`resolve_batch`** — resolves multiple IDs with the same decision. Does not support TOTP.\n- **`resolve_all_for_session`** — resolves every pending request matching a `session_id`. Mirrors Hermes-Agent's `resolve_gateway_approval(session_key, choice, resolve_all=True)`. TOTP-required requests are silently skipped (returned count excludes them).\n\n### Session-Scoped Queries\n\n| Method | Purpose |\n|---|---|\n| `list_pending_for_session(session_id)` | All pending `ApprovalRequest`s for a session |\n| `has_pending_for_session(session_id)` | Quick boolean check for blocking state |\n| `resolve_all_for_session(session_id, decision, decided_by)` | Atomically resolve all pending for a session |\n\nThese enable dashboard and channel UIs to scope approval views and actions to a single conversation.\n\n### TOTP Second-Factor Authentication\n\nWhen `policy.second_factor` is `SecondFactor::Totp`, approval of TOTP-gated tools requires a verified code.\n\n**Per-tool gating** — `policy.totp_tools` optionally scopes TOTP to specific tools. When empty, all tools require TOTP. `policy.tool_requires_totp(tool_name)` encodes this logic.\n\n**Grace period** — after a successful TOTP verification, the user enters a grace window (`totp_grace_period_secs`). Subsequent approvals by the same `user_id` skip TOTP until the window expires. Set to 0 to always require TOTP.\n\n**Lockout** — after `TOTP_MAX_FAILURES` (5) consecutive failures, the user is locked out for `TOTP_LOCKOUT_SECS` (300 seconds). Lockout state is persisted to SQLite (`totp_lockout` table) so it survives daemon restarts.\n\n**Resolution gate** — `resolve()` checks `totp_verified` when the decision is `Approved` and the tool requires TOTP. If the user is not within grace and `totp_verified` is false, resolution is rejected with a TOTP-required error. Denial never requires TOTP.\n\n**Static TOTP utilities** (no state, can be called without an `ApprovalManager` instance):\n\n| Method | Description |\n|---|---|\n| `verify_totp_code(secret, code)` | Verify a 6-digit code against a base32 secret (SHA-1, 30s step, ±1 window) |\n| `verify_totp_code_with_issuer(secret, code, issuer)` | Same, with custom issuer label |\n| `generate_totp_secret(issuer, account)` | Returns `(base32_secret, otpauth_uri, qr_base64_png)` |\n| `generate_recovery_codes()` | 8 codes in `DDDD-DDDD` format |\n| `verify_recovery_code(stored_json, code)` | Consumes a matching code, returns updated JSON |\n| `is_recovery_code_format(code)` | Validates `DDDD-DDDD` format |\n\n### Audit Logging\n\nWhen constructed with `new_with_db`, every resolution is written to the `approval_audit` table via `push_recent → audit_log_write`. The `query_audit` and `audit_count` methods support paginated queries with optional `agent_id` and `tool_name` filters.\n\n### Risk Classification\n\n`classify_risk(tool_name)` is a static mapping:\n\n| Tool | Risk Level |\n|---|---|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n### Policy Hot-Reload\n\n`update_policy(policy)` replaces the active policy behind an `RwLock`. The new policy takes effect immediately for subsequent checks. `policy()` returns a clone of the current policy.\n\n### Key Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `MAX_PENDING_PER_AGENT` | 5 | Back-pressure limit per agent |\n| `MAX_RECENT_APPROVALS` | 100 | In-memory history ring buffer |\n| `MAX_ESCALATIONS` | 3 | Escalation rounds before forced timeout |\n| `TOTP_MAX_FAILURES` | 5 | Consecutive failures before lockout |\n| `TOTP_LOCKOUT_SECS` | 300 | Lockout duration in seconds |\n\n---\n\n## AuthManager (`auth.rs`)\n\nMaps platform user identities (Telegram ID, Discord ID, etc.) to LibreFang users with hierarchical roles, then enforces RBAC permission checks.\n\n### Role Hierarchy\n\n```\nOwner (3) > Admin (2) > User (1) > Viewer (0)\n```\n\nRoles implement `Ord` — any role at or above the required level is authorized.\n\n### Channel Binding\n\nUsers are registered with `channel_bindings`: a map of `channel_type → platform_id`. During construction, `AuthManager` builds a reverse index (`\"telegram:123456\" → UserId`) so that incoming channel messages can be mapped to LibreFang identities via `identify(channel_type, platform_id)`.\n\nA single user can bind to multiple channels (e.g., Telegram and Discord), and `identify` returns the same `UserId` for all of them.\n\n### Authorization Model\n\nEach `Action` declares a minimum `UserRole`:\n\n| Action | Minimum Role |\n|---|---|\n| `ChatWithAgent` | User |\n| `ViewConfig` | User |\n| `SpawnAgent` | Admin |\n| `KillAgent` | Admin |\n| `InstallSkill` | Admin |\n| `ViewUsage` | Admin |\n| `ModifyConfig` | Owner |\n| `ManageUsers` | Owner |\n\n`authorize(user_id, action)` looks up the user's role and compares it against the action's requirement. Returns `Ok(())` on success or `LibreFangError::AuthDenied` with a descriptive message on failure.\n\n### Integration Points\n\n- **Terminal routes** (`src/routes/terminal.rs`) — `authorize_terminal_request` calls `AuthManager::authorize` before allowing WebSocket connections, window creation, and deletes.\n- **Dashboard API** (`librefang-api/src/server.rs`) — `configured_user_api_keys` uses `UserRole::from_str_role` to map API key configurations to roles.\n- **System routes** (`src/routes/system.rs`) — the approval router reads `policy()` from `ApprovalManager` before processing approval requests.\n\n---\n\n## Kernel Integration Tests (`kernel/tests.rs`)\n\nIntegration tests exercising the full kernel boot sequence with temporary directories. Key test scenarios:\n\n- **API key rotation** — `collect_rotation_key_specs` deduplicates profiles sharing the primary key, skips profiles with missing environment variables, and prepends the distinct primary driver key.\n- **Escalation notification routing** — `notify_escalated_approval` prefers per-request `route_to` targets over policy-level routing rules, agent notification rules, and global approval channels.\n- **Agent registry** — name resolution, tag-based filtering, and manifest-to-capability mapping including profile-based tool expansion.\n- **Default model override** — verifies that `spawn_agent_inner` applies local default model configuration to newly spawned agents.\n\nThe `RecordingChannelAdapter` test double captures sent messages for assertion without requiring a live channel connection.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel Integration Tests\n\nIntegration and end-to-end tests for the `librefang-kernel` crate. These tests exercise the full kernel lifecycle — boot, agent spawning, messaging, hand activation, workflow execution, and WASM module execution — against real infrastructure (Groq LLM API, WASM runtimes) and in isolated unit-like configurations.\n\n## Test Files\n\n| File | Scope | LLM Required |\n|------|-------|-------------|\n| `integration_test.rs` | Basic single-agent and multi-model messaging pipeline | Yes (`GROQ_API_KEY`) |\n| `multi_agent_test.rs` | Hand lifecycle: activation, deactivation, pause/resume, state persistence, trigger reactivation, fleet test | Mixed — most are local; `test_six_agent_fleet` requires `GROQ_API_KEY` |\n| `wasm_agent_integration_test.rs` | WASM module loading, execution, fuel exhaustion, streaming, host calls | No |\n| `workflow_integration_test.rs` | Workflow registration, agent resolution (by name/ID), trigger management, E2E pipeline | Only `test_workflow_e2e_with_groq` requires `GROQ_API_KEY` |\n| `purge_sentinels_test.rs` | CLI binary for removing sentinel lines from markdown files | No |\n\n## Running\n\n```bash\n# All local tests (no API key needed for most)\ncargo test -p librefang-kernel --test multi_agent_test\ncargo test -p librefang-kernel --test wasm_agent_integration_test\ncargo test -p librefang-kernel --test workflow_integration_test\ncargo test -p librefang-kernel --test purge_sentinels_test\n\n# Live LLM integration tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test integration_test -- --nocapture\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test multi_agent_test test_six_agent_fleet -- --nocapture\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test workflow_integration_test test_workflow_e2e_with_groq -- --nocapture\n```\n\nTests that require `GROQ_API_KEY` detect its absence at runtime and return early with a skip message rather than failing.\n\n## Common Patterns\n\n### Kernel Boot with Isolation\n\nEvery test boots a fresh kernel with a unique temporary directory to avoid state collisions:\n\n```rust\nfn test_config(name: &str) -> KernelConfig {\n    let tmp = std::env::temp_dir().join(format!(\"librefang-hand-test-{name}\"));\n    let _ = std::fs::remove_dir_all(&tmp);\n    std::fs::create_dir_all(&tmp).unwrap();\n    KernelConfig {\n        home_dir: tmp.clone(),\n        data_dir: tmp.join(\"data\"),\n        default_model: DefaultModelConfig {\n            provider: \"groq\".to_string(),\n            model: \"llama-3.3-70b-versatile\".to_string(),\n            api_key_env: \"GROQ_API_KEY\".to_string(),\n            // ...\n        },\n        ..KernelConfig::default()\n    }\n}\n```\n\nThe `name` parameter ensures each test gets its own directory. Tests that don't call LLMs configure `provider: \"ollama\"` with dummy values.\n\n### Agent Manifests from TOML\n\nAgents are defined as inline TOML strings parsed into `AgentManifest`:\n\n```rust\nlet manifest: AgentManifest = toml::from_str(r#\"\n    name = \"test-agent\"\n    module = \"builtin:chat\"\n    [model]\n    provider = \"groq\"\n    model = \"llama-3.3-70b-versatile\"\n    system_prompt = \"You are a test agent.\"\n    [capabilities]\n    tools = [\"file_read\"]\n\"#).unwrap();\n```\n\nFor WASM agents, the `module` field uses the `wasm:` prefix:\n\n```rust\nmodule = \"wasm:hello.wat\"\n```\n\n### Kernel Lifecycle\n\nTests follow a consistent boot → operate → shutdown pattern:\n\n```rust\nlet kernel = LibreFangKernel::boot_with_config(config).unwrap();\n// ... operations ...\nkernel.shutdown();\n```\n\n---\n\n## Test Coverage by Area\n\n### Agent Spawning and Messaging (`integration_test.rs`)\n\n**`test_full_pipeline_with_groq`** — Boots kernel, spawns a single `builtin:chat` agent, sends a message through Groq's LLM, validates the response is non-empty and that token usage is reported.\n\n**`test_multiple_agents_different_models`** — Spawns two agents with different models (`llama-3.3-70b-versatile` and `llama-3.1-8b-instant`), sends messages to both, confirms they coexist and respond independently.\n\n### Hand Lifecycle (`multi_agent_test.rs`)\n\nHands are pre-configured agent blueprints. Three test hand definitions are used:\n\n- **HAND_A** (`test-clip`) — Single-agent hand with tools: `file_read`, `file_write`, `shell_exec`\n- **HAND_B** (`test-devops`) — Single-agent hand with tools: `shell_exec`\n- **HAND_C** (`test-research`) — Multi-agent hand with `analyst` and `planner` roles; `planner` is the explicit coordinator\n\n```mermaid\nstateDiagram-v2\n    [*] --> Active : activate_hand()\n    Active --> Paused : pause_hand()\n    Paused --> Active : resume_hand()\n    Active --> [*] : deactivate_hand()\n    Paused --> [*] : deactivate_hand()\n```\n\n#### Activation and Agent Spawning\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_activate_hand_spawns_agent` | Activating a hand creates an agent in the registry |\n| `test_deterministic_agent_id` | Agent ID is deterministic via `AgentId::from_hand_agent(\"test-clip\", \"main\", None)` |\n| `test_explicit_coordinator_role_used_for_routes` | When a hand defines a `coordinator = true` agent, routing resolves to that role |\n| `test_hand_instance_status_active_on_creation` | Instance status is `\"Active\"` immediately after activation |\n\n#### Deactivation and Cleanup\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_deactivate_kills_agent` | Agent is removed from registry after deactivation |\n| `test_activate_nonexistent_hand_fails` | Error on unknown hand ID |\n| `test_deactivate_nonexistent_instance_fails` | Error on unknown instance UUID |\n| `test_pause_nonexistent_instance_fails` | Error on unknown instance UUID |\n| `test_resume_nonexistent_instance_fails` | Error on unknown instance UUID |\n\n#### Pause and Resume\n\n**`test_pause_and_resume_hand`** — Pausing sets status to `\"Paused\"` while keeping the agent alive. Resuming sets status back to `\"Active\"`.\n\n#### Metadata and Inheritance\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_agent_tagged_with_hand_metadata` | Agent gets `hand:test-clip` and `hand_instance:{uuid}` tags |\n| `test_hand_tools_applied_to_agent` | Hand-level `tools` list propagates to the agent manifest's `capabilities.tools` |\n| `test_system_prompt_preserved` | Hand's `system_prompt` appears in the agent's manifest |\n| `test_default_provider_resolved_to_kernel_default` | `provider = \"default\"` is resolved to the actual kernel-configured provider (not left as the string `\"default\"`) |\n\n#### State Persistence\n\n**`test_hand_state_persistence`** — After activation, `hand_state.json` is written to the data directory. The file uses schema version 4 with typed fields: `instance_id`, `status`, `activated_at`, `updated_at`, and an `agent_ids` map.\n\n**`test_multi_agent_hand_state_persists_coordinator_role`** — Multi-agent hands persist the `coordinator_role` field.\n\n#### Coexistence and Isolation\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_multiple_hands_coexist` | Two hands activated simultaneously have distinct agent IDs |\n| `test_deactivate_one_hand_preserves_other` | Deactivating one hand's instance doesn't affect another |\n| `test_find_instance_by_agent_id` | `kernel.hands().find_by_agent(agent_id)` resolves back to the correct instance |\n\n#### Reactivation and Triggers\n\n**`test_deterministic_id_stable_across_reactivation`** — Single-instance reactivation with legacy format produces the same agent ID: `AgentId::from_hand_agent(\"test-clip\", \"main\", None)`.\n\n**`test_reactivation_restores_triggers_to_original_roles`** — After registering a trigger on the `analyst` role, deactivating and reactivating the hand preserves the trigger on the correct role. The `planner` role does not inherit the `analyst`'s triggers.\n\n#### Live Fleet Test\n\n**`test_six_agent_fleet`** — Spawns six named agents (coder, researcher, writer, ops, analyst, hello-world) across two models, sends each a tailored message via Groq, prints a summary table with token usage.\n\n### WASM Agent Execution (`wasm_agent_integration_test.rs`)\n\nTests use hand-written WAT (WebAssembly Text format) modules stored as inline string constants:\n\n| WAT Module | Behavior |\n|------------|----------|\n| `ECHO_WAT` | Returns input JSON as-is (pointer+length packed into i64) |\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` |\n| `INFINITE_LOOP_WAT` | Infinite `br` loop — triggers fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to `librefang.host_call` import |\n\nAll WASM tests use `#[tokio::test(flavor = \"multi_thread\")]` because WASM execution requires a multi-threaded runtime.\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_wasm_agent_hello_response` | Fixed-response WASM module returns `\"hello from wasm\"`, iterations = 1 |\n| `test_wasm_agent_echo` | Echo module's response contains the input message text |\n| `test_wasm_agent_fuel_exhaustion` | Infinite loop module produces an error containing \"Fuel exhausted\" or \"fuel\" |\n| `test_wasm_agent_missing_module` | Nonexistent `.wasm` file produces an error mentioning the missing file |\n| `test_wasm_agent_host_call_time` | Host-call proxy module executes end-to-end through the kernel's host function import |\n| `test_wasm_agent_streaming_fallback` | `send_message_streaming` on a WASM agent produces at least 2 events (`TextDelta` + `ContentComplete`) |\n| `test_multiple_wasm_agents` | Two WASM agents coexist; registry contains 3 agents (hello + echo + default assistant) |\n| `test_mixed_wasm_and_llm_agents` | WASM and `builtin:chat` agents coexist in the same kernel; killing one doesn't affect the other |\n\n### Workflow Engine (`workflow_integration_test.rs`)\n\nTests exercise the workflow engine's `Workflow` and `WorkflowStep` types. Steps reference agents via `StepAgent::ByName` or `StepAgent::ById` and use `StepMode::Sequential` execution.\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_workflow_register_and_resolve` | Register a 2-step workflow, verify it appears in `list_workflows()`, verify agent name resolution via `find_by_name()`, create a run |\n| `test_workflow_agent_by_id` | Register a workflow with `StepAgent::ById`, create a run successfully |\n| `test_trigger_registration_with_kernel` | Register `Lifecycle` and `SystemKeyword` triggers, list by agent, remove by ID |\n| `test_workflow_e2e_with_groq` | Full pipeline: spawn analyst + writer agents, create a 2-step `analyst → writer` workflow, execute through Groq, verify both steps recorded `input_tokens > 0` and `output_tokens > 0`, verify `WorkflowRunState::Completed` |\n\n### Purge Sentinels CLI (`purge_sentinels_test.rs`)\n\nTests the `purge_sentinels` binary that removes sentinel lines (`NO_REPLY`, `[no reply needed]`, `no_reply`) from markdown files. The binary is invoked via `std::process::Command` using Cargo's `CARGO_BIN_EXE_purge_sentinels` environment variable.\n\nFixture setup creates four files:\n- `a.md` — Contains whole-line sentinels: `NO_REPLY`, `[no reply needed]`\n- `b.md` — Contains `NO_REPLY` embedded mid-sentence (should be preserved)\n- `c.md` — Clean file, no sentinels\n- `nested/d.md` — Lowercase `no_reply` with surrounding whitespace\n\n| Test | What it verifies |\n|------|-----------------|\n| `dry_run_reports_counts_and_touches_nothing` | `--dry-run` prints `removed=3` but doesn't modify files or create `.bak` |\n| `apply_creates_backup_and_rewrites` | `--apply` creates `.bak` with original content, removes whole-line sentinels, preserves mid-sentence sentinels, recurses into subdirectories |\n| `apply_is_idempotent` | Second `--apply` run reports `removed=0` and doesn't change files or backups |\n| `apply_aborts_when_existing_bak_differs` | Pre-existing `.bak` with different content causes a \"backup mismatch\" error and non-zero exit |\n| `nonexistent_path_exits_non_zero` | Invalid path produces \"does not exist\" error |\n\n---\n\n## Key APIs Exercised\n\nThe tests exercise the fo
