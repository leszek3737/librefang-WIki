ialization of `librefang-types` to/from JSON frames |\n| `uuid` | Correlation IDs for request/response matching and session identifiers |\n| `chrono` | Timestamps for message headers, replay-protection windows, and logging |\n| `hmac` / `sha2` / `subtle` | HMAC-SHA256 message authentication with constant-time comparison to prevent timing attacks |\n| `hex` | Encoding/decoding of HMAC digests for header transport |\n| `thiserror` | Typed error enums for wire-level failures (authentication, framing, I/O) |\n| `tracing` | Structured diagnostic spans for connection lifecycle and message processing |\n| `async-trait` | Trait definitions for transport abstraction and handler interfaces |\n| `dashmap` | Lock-free concurrent map for tracking active peer connections and routing tables |\n\n## Security Model\n\nMessage authentication is the core security guarantee. The `hmac`, `sha2`, and `subtle` crates work together:\n\n1. **Signing** — An HMAC-SHA256 digest is computed over the serialized message body using a pre-shared key.\n2. **Transport** — The digest is attached (via `hex` encoding) as a header or wrapper around the payload.\n3. **Verification** — The receiver recomputes the digest and compares it in **constant time** using `subtle`, preventing timing side-channel attacks.\n4. **Rejection** — Mismatched digests result in an immediate authentication error (defined via `thiserror`) and connection termination.\n\nThis ensures that only agents possessing the correct shared secret can inject or modify messages on the wire.\n\n## Relationship to the Wider Codebase\n\n`librefang-wire` is a **leaf library** in the dependency graph — it depends on `librefang-types` but is consumed by higher-level agent and server binaries. No other crate calls into it; instead, the runtime agent executable wires it into its event loop.\n\nThe contract is:\n\n- **Input**: `librefang-types` message structs.\n- **Output**: Authenticated, serialized byte frames over async TCP (or equivalent Tokio transport).\n- **Inbound**: Raw bytes from peers, deserialized and verified into typed `librefang-types` messages delivered to the application.\n\n## Error Handling\n\nAll fallible operations produce typed errors via `thiserror` derive macros. Expected error categories include:\n\n- **Authentication failures** — invalid or missing HMAC digests.\n- **Framing errors** — malformed message boundaries or incomplete reads.\n- **Serialization errors** — JSON decode failures from malformed payloads.\n- **I/O errors** — wrapped `tokio` / `std::io` errors from the transport layer.\n\nConsumers should match on these variants to decide between retry, reconnect, or shutdown behavior.\n\n## Logging and Observability\n\nThe crate uses `tracing` spans and events throughout the connection lifecycle. Key instrumentation points include:\n\n- Peer connection established / dropped.\n- Message sent / received with correlation IDs (`uuid`).\n- Authentication successes and failures.\n- Serialization errors with malformed data summaries.\n\nIntegrate with the agent's `tracing` subscriber to capture wire-level diagnostics.","other":"# Other\n\n# Other — LibreFang Agent OS Supporting Crates\n\nThis module group contains the bulk of the LibreFang Agent OS workspace — every crate that isn't a core agent or system-level primitive. Together they form the complete stack from shared types through to user-facing interfaces.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"User Interfaces\"\n        CLI[librefang-cli]\n        DESK[librefang-desktop]\n        API[librefang-api]\n        DASH[librefang-api-dashboard]\n    end\n\n    subgraph \"Kernel & Orchestration\"\n        K[librefang-kernel]\n        KH[kernel-handle]\n        KR[kernel-router]\n        KM[kernel-metering]\n    end\n\n    subgraph \"Runtime & Execution\"\n        RT[librefang-runtime]\n        WASM[runtime-wasm]\n        MCP[runtime-mcp]\n        OAUTH[runtime-oauth]\n    end\n\n    subgraph \"LLM Integration\"\n        LDR[librefang-llm-driver]\n        LDS[librefang-llm-drivers]\n    end\n\n    subgraph \"Agent Capabilities\"\n        SK[librefang-skills]\n        HD[librefang-hands]\n        CH[librefang-channels]\n        MEM[librefang-memory]\n        EX[librefang-extensions]\n    end\n\n    subgraph \"Infrastructure\"\n        TY[librefang-types]\n        HTTP[librefang-http]\n        WIRE[librefang-wire]\n        MIG[librefang-migrate]\n        TEL[librefang-telemetry]\n        TEST[librefang-testing]\n    end\n\n    CLI --> K\n    DESK --> K\n    API --> K\n    DASH --> API\n\n    K --> KR & KM & RT & SK & HD & CH & MEM & EX\n    RT --> WASM & MCP & OAUTH & LDR & KH\n    LDR --> LDS\n\n    KR --> HD\n    CH --> TY\n    SK --> TY\n    MEM --> TY\n    EX --> TY\n    WIRE --> TY\n    HTTP --> TY\n    TEL --> TY\n```\n\n## Layer Breakdown\n\n### Foundation — Types & Infrastructure\n\n[librefang-types](librefang-types.md) is the leaf dependency that every other crate imports. It defines canonical domain types, error enums, configuration shapes, and crypto primitives. No I/O or business logic lives here.\n\nSupporting infrastructure crates build on top:\n\n- [librefang-http](librefang-http.md) — shared `reqwest::Client` builder with proxy and TLS certificate fallback, ensuring consistent outbound HTTP across the workspace.\n- [librefang-telemetry](librefang-telemetry.md) — `metrics`-facade instrumentation layer; actual exporters (Prometheus, OpenTelemetry) are wired at the binary level.\n- [librefang-testing](librefang-testing.md) — mock kernel, mock LLM driver, and axum route test utilities shared across integration suites.\n\n### Kernel — Central Orchestration\n\n[librefang-kernel](librefang-kernel.md) is the process supervisor and message bus. It wires together every subsystem into a coherent agent runtime. The kernel delegates to several focused sub-crates:\n\n- [librefang-kernel-handle](librefang-kernel-handle.md) — the `KernelHandle` trait, decoupling in-process callers from the kernel's concrete implementation.\n- [librefang-kernel-router](librefang-kernel-router.md) — resolves which hand definition and template should handle a given request.\n- [librefang-kernel-metering](librefang-kernel-metering.md) — cost tracking and quota enforcement.\n\n### Runtime — Execution Environment\n\n[librefang-runtime](librefang-runtime.md) composes the kernel's orchestration with concrete execution capabilities:\n\n- [librefang-runtime-wasm](librefang-runtime-wasm.md) — WASM sandbox for isolated skill execution.\n- [librefang-runtime-mcp](librefang-runtime-mcp.md) — Model Context Protocol client for discovering and invoking external tool servers.\n- [librefang-runtime-oauth](librefang-runtime-oauth.md) — OAuth 2.0 PKCE flows for ChatGPT and GitHub Copilot backends.\n\n### LLM Integration\n\nThe LLM layer is split into abstraction and implementation:\n\n- [librefang-llm-driver](librefang-llm-driver.md) — the trait and shared request/response types.\n- [librefang-llm-drivers](librefang-llm-drivers.md) — concrete integrations with Anthropic, OpenAI, Gemini, and other providers.\n\n### Agent Capabilities\n\nThese crates define what agents can do:\n\n- [librefang-skills](librefang-skills.md) — skill registry, filesystem loader, marketplace client, and OpenClaw compatibility.\n- [librefang-hands](librefang-hands.md) — curated capability packages that scope agent actions under the principle of least privilege.\n- [librefang-channels](librefang-channels.md) — feature-flagged bridge layer to 45+ messaging platforms (Telegram, Discord, Slack, IRC, etc.).\n- [librefang-memory](librefang-memory.md) — persistence substrate for agent state, chat history, and session context.\n- [librefang-extensions](librefang-extensions.md) — MCP server setup, credential vault (OS keyring-backed), and OAuth2 PKCE flows.\n- [librefang-wire](librefang-wire.md) — agent-to-agent networking with HMAC-authenticated message framing and async transport.\n\n### User Interfaces\n\nThree entry points into the system:\n\n- [librefang-cli](librefang-cli.md) — the `librefang` binary for running agents, managing configs, migrations, and skills from the terminal. Includes [locale files](librefang-cli-locales.md) (English, Chinese) and [config templates](librefang-cli-templates.md).\n- [librefang-api](librefang-api.md) — Axum-based HTTP/WebSocket API server that exposes the full system over REST and WebSocket. Includes the [embedded login page](librefang-api-src.md), [dashboard locale files](librefang-api-static.md) (English, Japanese), and an [integration test suite](librefang-api-tests.md).\n- [librefang-desktop](librefang-desktop.md) — Tauri 2.0 native desktop app wrapping the kernel, API, and extension system with system tray integration and auto-updates. Includes [capability permissions](librefang-desktop-capabilities.md) and [auto-generated security schemas](librefang-desktop-gen.md).\n\nThe [dashboard](librefang-api-dashboard.md) is a React 19 SPA consuming the API through TanStack Router and Query, covering agent management, session inspection, approvals, channel configuration, skill installation, memory, analytics, and runtime control.\n\n### Migration & Compatibility\n\n[librefang-migrate](librefang-migrate.md) converts projects from AutoGen, CrewAI, LangGraph, and other frameworks into native LibreFang format.\n\n## Key Cross-Module Workflows\n\n**Inbound message flow:** A message arrives via a [channel](librefang-channels.md) adapter → [kernel](librefang-kernel.md) resolves the target agent through [kernel-router](librefang-kernel-router.md) → loads context from [memory](librefang-memory.md) → calls an [LLM driver](librefang-llm-drivers.md) → executes skills through [runtime-wasm](librefang-runtime-wasm.md) or tools via [runtime-mcp](librefang-runtime-mcp.md) → routes the response back through the channel.\n\n**Dashboard operation:** The [React dashboard](librefang-api-dashboard.md) authenticates via the [login page](librefang-api-src.md) → calls [API](librefang-api.md) endpoints using localized strings from [api-static](librefang-api-static.md) → API delegates to [kernel](librefang-kernel.md) → kernel orchestrates the appropriate subsystems.\n\n**Agent-to-agent communication:** [librefang-wire](librefang-wire.md) handles HMAC-signed message framing and transport between distributed agents, with connection state tracked via concurrent data structures.\n\n## Test Coverage\n\nThe workspace emphasizes real-integration testing. Each major crate ships dedicated test modules — [kernel tests](librefang-kernel-tests.md), [kernel source-level tests](librefang-kernel-src.md), [API tests](librefang-api-tests.md), [channel bridge tests](librefang-channels-tests.md), [channel benchmarks](librefang-channels-benches.md), [memory tests](librefang-memory-tests.md), [runtime tests](librefang-runtime-tests.md), and [types contract tests](librefang-types-tests.md) — all backed by the shared [testing infrastructure](librefang-testing.md). Tests boot real kernels and servers on random ports rather than using mocks, ensuring the full stack is validated.","overview":"# crates — Wiki\n\n# LibreFang Agent OS\n\nWelcome to **LibreFang** — an open-source agent operating system that runs autonomous AI agents across messaging platforms, with built-in safety controls, persistent memory, and a full management UI.\n\nLibreFang agents chat with users on Telegram, Discord, Slack, Bluesky, WhatsApp, and more. They can use tools (via [Skills & Extensions](skills-and-extensions.md)), remember past interactions (via the [Memory System](memory-system.md)), and enforce per-user permissions (via [Kernel Core](kernel-core.md) RBAC and approval gating). Multiple LibreFang instances can discover and coordinate with each other over the [P2P Networking](p2p-networking.md) layer.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"User Interfaces\"\n        DASH[\"Dashboard\"]\n        CLI[\"CLI\"]\n        DESK[\"Desktop App\"]\n    end\n\n    subgraph \"Platform Layer\"\n        API[\"API Server\"]\n        CH[\"Channel Adapters\"]\n    end\n\n    subgraph \"Core\"\n        KC[\"Kernel Core<br/>(RBAC + Approval)\"]\n        AR[\"Agent Runtime\"]\n    end\n\n    subgraph \"Capabilities\"\n        LLM[\"LLM Provider Drivers\"]\n        MEM[\"Memory System\"]\n        SKILL[\"Skills & Extensions\"]\n    end\n\n    TYPES[\"Shared Types\"]\n\n    DASH --> API\n    CLI --> API\n    DESK --> API\n    CH --> AR\n    API --> KC\n    KC --> AR\n    AR --> LLM\n    AR --> MEM\n    AR --> SKILL\n    TYPES -.- API\n    TYPES -.- AR\n    TYPES -.- KC\n```\n\n## How the System Fits Together\n\n### Incoming messages\n\nA user sends a message on a platform like Telegram. The appropriate [Channel Adapter](channel-adapters.md) picks it up, routes it through the [Kernel Core](kernel-core.md) for RBAC checks, and hands it to the [Agent Runtime](agent-runtime.md). The runtime loads context from the [Memory System](memory-system.md), invokes an [LLM Provider Driver](llm-provider-drivers.md) to generate a response, executes any tools the model requests (gated by the kernel's approval system), and streams the reply back through the channel adapter.\n\n### Management and configuration\n\nOperators use the [Dashboard Application](dashboard-application.md) (or the [CLI](command-line-interface.md), or the [Desktop Application](desktop-application.md)) to configure agents, install skills, manage channels, inspect memory, and monitor budgets. These frontends talk to the [API Server](api-server.md), which exposes the kernel's full capabilities over REST. The API server is the primary integration point — it translates HTTP requests into kernel operations and streams results back.\n\n### Autonomous agents (Hands)\n\n[Hands](hands-framework.md) are pre-built, domain-specific autonomous agents that users activate from a marketplace. Unlike interactive agents, Hands run in the background and users check in on their progress. The Hands framework manages definitions, tracks active instances, and persists state across daemon restarts.\n\n### Cross-instance coordination\n\nThe [P2P Networking](p2p-networking.md) module (LibreFang Wire Protocol) enables separate LibreFang kernels to discover each other's agents, exchange messages, and distribute work across machines over TCP.\n\n### External integrations\n\n[Runtime Protocol Integrations](runtime-protocol-integrations.md) connect agents to the outside world: MCP tool servers, OAuth 2.0 identity providers, and sandboxed WASM plugins. The MCP client handles the full lifecycle from handshake through tool invocation with integrated taint scanning.\n\n### Foundation layer\n\n[Shared Types](shared-types.md) defines the canonical data structures used across every crate — agent manifests, approval types, message formats — so serialized data passes between processes and over the network without translation. [Infrastructure & Utilities](infrastructure-and-utilities.md) provides the horizontal concerns: HTTP transport, kernel abstractions, cost metering, routing, observability, database migration, and test infrastructure.\n\n## Key End-to-End Flows\n\n**A user starts a chat from the Dashboard:**\nThe ChatPage component calls a React mutation hook, which posts to the API server. The API server authenticates the request, delegates to the kernel, which spawns an agent session through the runtime. The runtime loads context from memory, calls the configured LLM provider, and streams the response back through the API to the Dashboard in real time.\n\n**A message arrives on Discord:**\nThe Discord channel adapter receives the platform event, the BridgeManager looks up the configured agent for that channel, the kernel checks RBAC policies for the Discord user, and the agent runtime begins a turn — potentially invoking skills, hitting the memory store, and streaming a reply back through Discord's API.\n\n**An operator installs a skill from the CLI:**\nThe CLI parses the subcommand, calls the API server's skill endpoint, which delegates to the Skills & Extensions loader. The skill is verified, registered in the kernel, and becomes available for agents to invoke on their next turn.\n\n## Where to Go Next\n\n- Start with **[Kernel Core](kernel-core.md)** to understand the safety and permission model\n- Read **[Agent Runtime](agent-runtime.md)** for the execution loop and how agents actually run\n- Explore **[API Server](api-server.md)** if you're working on the backend or adding endpoints\n- Check **[Dashboard Application](dashboard-application.md)** if you're working on the frontend\n- Browse **[Shared Types](shared-types.md)** when you need to understand the data model","p2p-networking":"# P2P Networking\n\n# P2P Networking (`librefang-wire`)\n\nThe LibreFang Wire Protocol (OFP) module provides cross-machine agent discovery, authentication, and communication over TCP. It enables separate LibreFang kernels to find each other's agents, exchange messages, and coordinate work across the network.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    K1[Kernel A] --> PH1[PeerHandle impl]\n    K2[Kernel B] --> PH2[PeerHandle impl]\n    PN1[PeerNode A] -->|TCP + OFP| PN2[PeerNode B]\n    PN1 --> PR1[PeerRegistry]\n    PN2 --> PR2[PeerRegistry]\n    PH1 --> PN1\n    PH2 --> PN2\n```\n\nEach kernel runs a `PeerNode` that listens for inbound connections and can connect outward to other peers. The kernel implements the `PeerHandle` trait so the networking layer can route incoming agent messages to local agents. Each `PeerNode` maintains a `PeerRegistry` tracking all known remote peers and their advertised agents.\n\n## Wire Protocol\n\nAll communication uses JSON-framed messages over TCP. Every frame is a 4-byte big-endian length prefix followed by a JSON body. After the initial handshake, frames also include a trailing 64-character hex HMAC-SHA256 signature.\n\n**Unauthenticated frame:** `[4-byte length][JSON body]`\n\n**Authenticated frame:** `[4-byte length][JSON body][64-byte hex HMAC]`\n\nThe maximum message size is 16 MB (`MAX_MESSAGE_SIZE`).\n\n### Message Envelope\n\nEvery message is a `WireMessage` containing a unique `id` and a `kind` discriminated by a `\"type\"` tag:\n\n```rust\npub struct WireMessage {\n    pub id: String,\n    pub kind: WireMessageKind, // Request | Response | Notification\n}\n```\n\n### Request Types\n\n| Method | Tag | Purpose |\n|--------|-----|---------|\n| `Handshake` | `\"handshake\"` | Exchange identity, agents, and HMAC authentication |\n| `Discover` | `\"discover\"` | Query agents on a remote peer by name/tag/description |\n| `AgentMessage` | `\"agent_message\"` | Send a message to a specific remote agent |\n| `Ping` | `\"ping\"` | Liveness check |\n\n### Response Types\n\n| Method | Tag | Purpose |\n|--------|-----|---------|\n| `HandshakeAck` | `\"handshake_ack\"` | Acknowledge handshake with identity + HMAC |\n| `DiscoverResult` | `\"discover_result\"` | Return matching agents |\n| `AgentResponse` | `\"agent_response\"` | Return agent's reply text |\n| `Pong` | `\"pong\"` | Acknowledge ping with uptime |\n| `Error` | `\"error\"` | Error with numeric code and message |\n\n### Notification Types\n\nNotifications are one-way and elicit no response:\n\n| Event | Tag | Purpose |\n|-------|-----|---------|\n| `AgentSpawned` | `\"agent_spawned\"` | A new agent is available on the peer |\n| `AgentTerminated` | `\"agent_terminated\"` | An agent was shut down |\n| `ShuttingDown` | `\"shutting_down\"` | Peer is going offline |\n\n## Authentication and Security\n\nThe wire protocol mandates HMAC-SHA256 authentication. A `PeerNode` will not start if `shared_secret` is empty, and all incoming connections that skip the handshake are rejected with a `401` error.\n\n### Handshake Flow\n\n```mermaid\nsequenceDiagram\n    participant C as Client (initiator)\n    participant S as Server (listener)\n    C->>S: Handshake(node_id, nonce_c, HMAC(secret, nonce_c + node_id_c))\n    S->>S: verify HMAC, check nonce_c for replay\n    S->>C: HandshakeAck(node_id, nonce_s, HMAC(secret, nonce_s + node_id_s))\n    C->>C: verify HMAC, check nonce_s for replay\n    Note over C,S: Both derive session_key = HMAC(secret, nonce_c + nonce_s)\n    C->>S: AgentMessage + per-message HMAC(session_key)\n    S->>C: AgentResponse + per-message HMAC(session_key)\n```\n\nEach side generates a random nonce, computes `HMAC-SHA256(shared_secret, nonce + node_id)`, and sends it in the handshake. The receiver verifies the HMAC and checks the nonce against a replay tracker. After mutual authentication, both sides derive a session key via `derive_session_key(shared_secret, our_nonce, their_nonce)`. All subsequent messages on that connection carry a per-message HMAC computed over the JSON body using the session key.\n\n### Replay Protection\n\n`NonceTracker` stores seen nonces in a `DashMap` with their insertion timestamps. Nonces older than 5 minutes are garbage-collected on each insertion. The tracker has a hard cap of 100,000 entries — under a flooding attack, new nonces are rejected rather than allowing unbounded memory growth. The `check_and_record` method uses `DashMap::entry` to atomically check and insert in a single call, preventing a TOCTOU race where two concurrent handshakes with the same replayed nonce could both pass.\n\n### Session Key Derivation\n\n```rust\npub fn derive_session_key(shared_secret: &str, our_nonce: &str, their_nonce: &str) -> String\n```\n\nComputes `HMAC-SHA256(shared_secret, our_nonce + their_nonce)`. The nonce order differs between client and server, so each side must pass its own nonce first. This guarantees unique keys per connection even when the same shared secret is used across many connections.\n\n### Per-Message HMAC\n\nAfter handshake, `write_message_authenticated` and `read_message_authenticated` append and verify a 64-character hex HMAC on every frame. The HMAC covers the JSON body only (not the length prefix). Verification uses constant-time comparison via `subtle::ConstantTimeEq` to prevent timing attacks.\n\n## Key Components\n\n### `PeerNode`\n\nThe main networking actor. Created via `PeerNode::start`, which binds a TCP listener and spawns an accept loop. Each `PeerNode` owns:\n\n- A `PeerConfig` with identity and shared secret\n- A `PeerRegistry` for tracking remote peers\n- A `NonceTracker` for replay defense\n- The bound `local_addr` (useful when binding to port `0`)\n\n**Inbound connections:** The accept loop spawns a task per connection. Each task calls `handle_inbound`, which enforces the handshake requirement — any message other than `Handshake` as the first frame receives a `401` error and the connection is dropped.\n\n**Outbound connections:** `connect_to_peer` dials a remote address, performs the full handshake, and spawns a `connection_loop` task for ongoing message dispatch. `send_to_peer` opens a fresh connection, handshakes, sends a single `AgentMessage`, reads the response, and closes — it does not reuse connections.\n\n### `PeerHandle` Trait\n\nThe kernel implements this trait to allow the networking layer to interact with local agents:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\nThe trait is queried during handshake (to advertise local agents), when processing `Discover` requests, and when routing `AgentMessage` requests to local agents.\n\n### `PeerRegistry`\n\nA thread-safe store (`Arc<RwLock<HashMap<String, PeerEntry>>>`) tracking all known peers. Each `PeerEntry` records the peer's node ID, name, address, advertised agents, connection state, connection timestamp, and protocol version.\n\nKey operations:\n\n- **`add_peer` / `remove_peer`** — register or remove a peer entirely\n- **`mark_disconnected` / `mark_connected`** — toggle state without removing the entry (supports reconnection scenarios)\n- **`add_agent` / `remove_agent`** — update a peer's agent list in response to `AgentSpawned` / `AgentTerminated` notifications\n- **`find_agents(query)`** — search across all connected peers' agents by name, tags, or description (case-insensitive). Returns `Vec<RemoteAgent>` which pairs each agent info with its owning peer's node ID.\n- **`connected_peers` / `all_peers`** — list peers filtered by state\n\n### Connection Lifecycle\n\nThe `connection_loop` function runs after a successful handshake. It reads messages in a loop and dispatches based on kind:\n\n- **Requests** (`Ping`, `Discover`, `AgentMessage`) → routed to `PeerHandle`, response written back\n- **Notifications** (`AgentSpawned`, `AgentTerminated`, `ShuttingDown`) → applied to the local `PeerRegistry`\n- **Responses** → logged as unexpected (the connection loop never sends requests that would produce responses)\n\nWhen the loop exits (connection closed or error), the peer is marked `Disconnected` in the registry.\n\n### Broadcast\n\n`broadcast_notification` sends a one-way notification to all connected peers. It opens a separate TCP connection per peer, derives a fresh per-message key, and writes a single authenticated frame. Errors are collected and returned rather than propagated — the caller can decide how to handle partial failures.\n\n## Encoding Helpers\n\nDefined in `message.rs`:\n\n- **`encode_message(msg)`** — serializes a `WireMessage` to a `Vec<u8>` with the 4-byte length prefix\n- **`decode_length(header)`** — reads the big-endian length from a 4-byte header\n- **`decode_message(body)`** — parses JSON bytes into a `WireMessage`\n\n## Configuration\n\n```rust\npub struct PeerConfig {\n    pub listen_addr: SocketAddr,   // e.g. \"0.0.0.0:7000\" or \"127.0.0.1:0\" for ephemeral\n    pub node_id: String,           // unique UUID\n    pub node_name: String,         // human-readable\n    pub shared_secret: String,     // required — must match across all peers\n}\n```\n\nThe shared secret must be identical on all peers that should communicate. Set it via `[network] shared_secret` in `config.toml`. An empty secret causes `PeerNode::start` to return an error immediately.\n\n## Error Handling\n\n`WireError` covers all failure modes:\n\n| Variant | Meaning |\n|---------|---------|\n| `Io` | TCP read/write failure |\n| `Json` | Malformed message body |\n| `HandshakeFailed` | HMAC mismatch, replay, or unexpected message during handshake |\n| `ConnectionClosed` | Remote end disconnected cleanly |\n| `MessageTooLarge` | Frame exceeds 16 MB limit |\n| `VersionMismatch` | Incompatible protocol versions |\n\nThe current protocol version is `PROTOCOL_VERSION = 1`. A version mismatch during handshake returns a `VersionMismatch` error locally and sends an `Error` response to the remote peer before closing.\n\n## Integration Points\n\nThe rest of the codebase interacts with this module through:\n\n- **`PeerHandle` implementation** — the kernel provides its agent routing logic\n- **`PeerRegistry` queries** — the web UI and API routes call `all_peers`, `connected_count`, `find_agents` to display network status\n- **`local_addr()`** — used by test infrastructure and the desktop/server startup to discover the bound port when using ephemeral addressing\n- **`broadcast_notification`** — called when local agents are spawned or terminated to notify all connected peers","runtime-protocol-integrations-librefang-runtime-mcp-src":"# Runtime Protocol Integrations — librefang-runtime-mcp-src\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client module that connects librefang to external MCP servers. Handles the full lifecycle — connection, handshake, tool discovery, invocation, and security scanning — across four transport types.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TR[tool_runner<br/>execute_tool_raw] -->|call_tool| MC[McpConnection]\n    MC -->|rmcp SDK| STDIO[Stdio<br/>subprocess]\n    MC -->|JSON-RPC POST| SSE[SSE<br/>HTTP]\n    MC -->|rmcp SDK| HTTP[Streamable HTTP<br/>MCP 2025+]\n    MC -->|plain HTTP| HC[HttpCompat<br/>JSON backend]\n    MC -->|before dispatch| TA[Taint Scanner]\n    TA -->|walk_taint| DT[detect_outbound_text<br/>_violation_rules_with_skip]\n    AUTH[mcp_auth route] -->|discover_oauth_metadata| OA[mcp_oauth]\n    OA -->|PKCE flow| MC\n```\n\n## Transport Types\n\nThe module supports four transports, selected by the `McpTransport` enum:\n\n### Stdio\n\nSpawns a subprocess and communicates over stdin/stdout using the `rmcp` SDK for proper MCP protocol handling. This is the primary transport for local MCP servers (e.g. `npx @modelcontextprotocol/server-github`).\n\n- Full MCP `initialize` handshake with capability negotiation\n- Tool discovery via `tools/list`\n- Optional `roots` capability declaration for filesystem-aware servers\n- Environment variable sandboxing (only safe system vars + explicitly declared vars)\n- Shell interpreter blocking (`bash`, `sh`, `powershell`, etc. are rejected)\n\n### SSE (Server-Sent Events)\n\nLegacy HTTP transport using JSON-RPC 2.0 over HTTP POST. Implemented directly via `reqwest` without the rmcp SDK.\n\n- Unidirectional — client-initiated requests only; `roots` capability is never declared\n- Handshake via `sse_initialize` → `notifications/initialized`\n- Tool discovery via `sse_discover_tools` (calls `tools/list`)\n\n### Streamable HTTP\n\nMCP 2025-03-26+ transport using the rmcp SDK's `StreamableHttpClientTransport`. Single endpoint with `Accept: application/json, text/event-stream` and `Mcp-Session-Id` tracking.\n\n- Full rmcp SDK handshake and tool discovery\n- OAuth-aware: on 401, extracts the `WWW-Authenticate` header and delegates to `mcp_oauth::discover_oauth_metadata` for three-tier OAuth resolution. Returns `\"OAUTH_NEEDS_AUTH\"` error to signal the API layer to drive PKCE via the UI\n- Local filesystem roots are only advertised when the URL resolves to `localhost`/`127.0.0.1`/`::1` (checked by `is_local_url`)\n\n### HttpCompat\n\nBuilt-in adapter for plain HTTP/JSON backends that don't speak MCP at all. Tools are declared statically in config, and calls are translated to HTTP requests with path template rendering.\n\n- No MCP handshake — tools are registered from config at connect time\n- Supports path templates with `{param}` placeholders (percent-encoded), multiple HTTP methods, query/body request modes\n- Static or environment-variable-backed headers (`value` or `value_env`)\n\n## Connection Lifecycle\n\nAll transports follow the same lifecycle via `McpConnection::connect`:\n\n1. **Transport-specific connect** — spawn subprocess, create HTTP client, or build rmcp transport\n2. **MCP handshake** — `initialize` + `notifications/initialized` (Stdio and Streamable HTTP handled by rmcp; SSE sends manually)\n3. **Tool discovery** — `tools/list` response parsed into `ToolDefinition` structs, namespaced as `mcp_{server}_{tool}`\n4. **Annotation injection** — MCP `readOnlyHint`/`destructiveHint` annotations translated into `metadata.tool_class` on the JSON Schema (`readonly_search` or `mutating`)\n\nThe resulting `McpConnection` holds:\n- `config: McpServerConfig` — full server configuration\n- `tools: Vec<ToolDefinition>` — discovered, namespaced tools\n- `original_names: HashMap<String, String>` — namespaced name → server's original name\n- `inner: McpInner` — transport-specific handle (`DynRmcpClient`, `reqwest::Client`, etc.)\n- `auth_state: McpAuthState` — current OAuth state\n\n## Taint Scanning\n\nEvery `call_tool` invocation passes arguments through the outbound taint scanner before sending them to the MCP server. This prevents an LLM that has been pushed into smuggling credentials from exfiltrating them through tool-call arguments.\n\n### Scanning Flow\n\n```mermaid\ngraph LR\n    ARGS[tool arguments] -->|taint_scanning=true| SCAN[scan_mcp_arguments_for_taint_with_policy]\n    SCAN -->|tool default=skip| BYPASS[bypass]\n    SCAN -->|walk JSON tree| WALK[walk_taint]\n    WALK -->|string leaf| CHECK[detect_outbound_text<br/>_violation_rules_with_skip]\n    WALK -->|object key| SKEY[is_sensitive_key_name]\n    WALK -->|array| RECURSE[recurse with depth+1]\n    CHECK -->|skip_rules| POLICY[resolve_skip_rules]\n    CHECK -->|rule fires| RULESET[apply_rule_set_action]\n    RULESET -->|Block| REJECT[return violation]\n    RULESET -->|Warn/Log| ALLOW[emit trace + allow]\n```\n\n### What Gets Scanned\n\n- **String leaves** — checked against `TaintSink::mcp_tool_call()` denylist patterns (credential-shaped strings, PII like emails/phones, `api_key=...` key-value patterns)\n- **Object keys** — keys matching `MCP_SENSITIVE_KEY_NAMES` (`authorization`, `api_key`, `secret`, `password`, etc.) with non-empty string values are blocked unconditionally\n- **Non-string leaves** (numbers, bools, null) — skipped\n\n### Depth Cap\n\nRecursion is hard-capped at `MCP_TAINT_SCAN_MAX_DEPTH` (64). Deeper trees are rejected outright to prevent pathological payloads from blowing the stack.\n\n### Policy Controls\n\nThree levels of exemption, configured per-server via `McpTaintPolicy`:\n\n| Level | Config | Effect |\n|-------|--------|--------|\n| **Server-wide disable** | `taint_scanning = false` | Skips content-based heuristic entirely; key-name blocking remains active |\n| **Tool-level kill switch** | `taint_policy.tools.<name>.default = \"skip\"` | Bypasses all scanning for that tool, including key-name checks |\n| **Per-path rule skip** | `taint_policy.tools.<name>.paths.<pattern>.skip_rules` | Skip specific `TaintRuleId`s for matching JSON paths |\n\n### JSONPath Matching\n\nPath patterns in `McpTaintPathPolicy` use a minimal JSONPath subset:\n\n- `$.a.b` — exact nested property\n- `$.a.*` — any direct child of `$.a` (single segment, non-array)\n- `$.a[*]` — any array element of `$.a`\n- `$.*` — any top-level property\n\n**Known limitation**: Object keys containing `.` or `[` cannot be addressed precisely. The matcher splits on `.` and treats `[` as array notation. Use broader patterns (`$.*`, `$.headers.*`) as a workaround.\n\n### Named Rule Sets\n\nTools can reference named `[[taint_rules]]` sets from config to downgrade `Block` to `Warn` or `Log`:\n\n- `lookup_rule_set_action` finds the most permissive action across all sets referenced by the tool that cover the fired rule\n- Priority: `Log` > `Warn` > `Block`\n- All fired rules are iterated — a downgrade for rule A does **not** mask an unauthorized rule B firing on the same payload\n- Unknown rule-set names trigger a one-shot `WARN` per name per process (deduped via `UNKNOWN_RULE_SET_WARNED`)\n\n### Hot-Reload Contract\n\nThe `TaintRuleSetsHandle` (`Arc<ArcSwap<Vec<NamedTaintRuleSet>>>`) is shared across all servers. The kernel calls `.store(Arc::new(new_rules))` on config reload; the next `call_tool` picks up the new rules. A `.load()` snapshot taken at scan start stays stable for the entire argument-tree walk.\n\n### Error Sanitization\n\nViolation messages are deliberately redacted — they contain only the JSON path and rule name, never the offending payload value. These messages flow back to the LLM as errors and into logs; echoing the blocked secret would defeat the filter.\n\n## Tool Namespacing\n\nAll MCP tools are namespaced as `mcp_{server}_{tool}` to prevent collisions between servers with identical tool names:\n\n- `format_mcp_tool_name(\"github\", \"create_issue\")` → `\"mcp_github_create_issue\"`\n- Server names are normalized (lowercased, hyphens → underscores): `\"my-server\"` → `\"mcp_my_server_do_thing\"`\n- `resolve_mcp_server_from_known` reverses the mapping using the known server list (longest-prefix match handles names containing underscores)\n- `is_mcp_tool` checks the `mcp_` prefix for routing in `tool_runner`\n\n**Caution**: `extract_mcp_server` splits on the first `_` after `mcp_` and only works for single-word server names. Use `resolve_mcp_server_from_known` when the server list is available.\n\n## Security Hardening\n\n### SSRF Protection\n\n`check_ssrf` blocks URLs targeting cloud metadata endpoints (`169.254.169.254`, `metadata.google`). `is_local_url` uses proper `url::Url` host parsing to prevent bypasses like `127.0.0.1@attacker.com` or `localhost.evil.com`.\n\n### Subprocess Sandboxing\n\nStdio transport enforces:\n\n- No path traversal (`..` in command rejected)\n- No shell interpreters (must use specific runtimes: `npx`, `node`, `python`, etc.)\n- Environment is fully cleared; only `SAFE_ENV_VARS` (PATH, HOME, language/locale, runtime-specific vars like `NODE_PATH`, `CARGO_HOME`) plus explicitly declared `env` entries are passed through\n- `$VAR` and `${VAR}` expansion in args avoids needing `sh -c` wrappers\n- Windows `.cmd` detection for npm/npx\n\n### Credential-Shaped Key Blocking\n\n`MCP_SENSITIVE_KEY_NAMES` catches common credential container keys (`authorization`, `api_key`, `secret`, `password`, `private_key`, etc.) that the value-only text heuristic might miss (e.g. `\"Authorization\": \"Bearer …\"` has whitespace + scheme word that evades pattern matching).\n\n## Roots Capability\n\n`RootsClientHandler` implements `rmcp::ClientHandler` to advertise filesystem root directories during the MCP `initialize` handshake. Paths are converted to well-formed `file://` URIs with proper percent-encoding. Only local servers receive roots; remote HTTP servers do not.\n\n## Integration Points\n\n| Caller | Entry Point | Purpose |\n|--------|-------------|---------|\n| `tool_runner::execute_tool_raw` | `is_mcp_tool`, `resolve_mcp_server_from_known`, `call_tool` | Route tool calls to the correct MCP server |\n| `routes::agents::get_agent_mcp_servers` | `resolve_mcp_server_from_known` | Map namespaced tools back to servers for API responses |\n| `routes::mcp_auth::auth_start` | `mcp_oauth::discover_oauth_metadata` | OAuth discovery for servers requiring authentication |\n| `kernel::mcp_oauth_provider::load_token` | `mcp_oauth::store_tokens` | Persist OAuth tokens after PKCE completion |\n| `tui::event::spawn_fetch_agent_mcp_servers` | `resolve_mcp_server_from_known` | Resolve servers in the TUI layer |","runtime-protocol-integrations-librefang-runtime-oauth-src":"# Runtime Protocol Integrations — librefang-runtime-oauth-src\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication integrations for ChatGPT (OpenAI) and GitHub Copilot. This module provides ready-to-use flows that handle PKCE generation, browser callbacks, device authorization polling, token exchange, and token refresh — without requiring any external OAuth libraries beyond standard HTTP.\n\n## Module Layout\n\n```\nlibrefang-runtime-oauth/src/\n├── lib.rs                # Re-exports chatgpt_oauth and copilot_oauth\n├── chatgpt_oauth.rs      # OpenAI/ChatGPT OAuth — browser & device flows\n└── copilot_oauth.rs      # GitHub Copilot OAuth — device flow (RFC 8628)\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"librefang-cli<br/>(authenticate_chatgpt)\"]\n    RP[\"routes/providers<br/>(copilot_oauth_start/poll)\"]\n    DRV[\"drivers/chatgpt<br/>(refresh_token)\"]\n\n    CLI --> SBA[\"start_device_auth_flow\"]\n    CLI --> PDA[\"poll_device_auth_flow\"]\n    CLI --> SOF[\"start_oauth_flow\"]\n    CLI --> ROC[\"run_oauth_callback_server\"]\n    CLI --> ECF[\"exchange_code_for_tokens\"]\n    CLI --> FBC[\"fetch_best_codex_model\"]\n\n    RP --> SDF[\"start_device_flow\"]\n    RP --> PDF_copilot[\"poll_device_flow\"]\n\n    DRV --> RAT[\"refresh_access_token\"]\n\n    subgraph \"chatgpt_oauth.rs\"\n        SBA\n        PDA\n        SOF\n        ROC\n        ECF\n        FBC\n        RAT\n    end\n\n    subgraph \"copilot_oauth.rs\"\n        SDF\n        PDF_copilot\n    end\n```\n\n---\n\n## ChatGPT OAuth (`chatgpt_oauth`)\n\nAuthenticates users against OpenAI's Codex OAuth endpoints. Supports two flows:\n\n1. **Browser flow** — opens the user's browser, waits for a localhost callback on port 1455.\n2. **Device auth flow** — for headless environments; the user visits a URL and enters a one-time code.\n\nBoth flows produce a `ChatGptAuthResult` containing an access token, optional refresh token, and expiry.\n\n### Constants\n\n| Constant | Purpose |\n|---|---|\n| `CHATGPT_BASE_URL` | ChatGPT backend API base (`https://chatgpt.com/backend-api`). OAuth tokens with `api.connectors` scopes work with the Responses API here, not `/v1/chat/completions`. |\n| `CLIENT_ID` | OpenAI Codex CLI OAuth client ID (`app_EMoamEEZ73f0CkXaXp7hrann`). |\n| `AUTHORIZE_URL` | Authorization endpoint (`https://auth.openai.com/oauth/authorize`). |\n| `TOKEN_URL` | Token exchange endpoint (`https://auth.openai.com/oauth/token`). |\n| `DEVICE_AUTH_URL` | Device verification page shown to users (`https://auth.openai.com/codex/device`). |\n| `DEVICE_AUTH_REDIRECT_URI` | Redirect URI used for device flow token exchange. |\n| `CALLBACK_BIND` | Browser flow binds `127.0.0.1:1455` (matches OpenAI's registered redirect URI). |\n\nOAuth scopes requested: `openid profile email offline_access api.connectors.read api.connectors.invoke`.\n\n### Key Types\n\n#### `ChatGptAuthResult`\n\nResult of a successful OAuth flow. All sensitive fields use `Zeroizing<String>` to minimize credential lifetime in memory:\n\n```rust\npub struct ChatGptAuthResult {\n    pub access_token: Zeroizing<String>,\n    pub refresh_token: Option<Zeroizing<String>>,\n    pub expires_in: Option<u64>,\n}\n```\n\n#### `DeviceAuthPrompt`\n\nDetails returned by `start_device_auth_flow()` that must be displayed to the user:\n\n```rust\npub struct DeviceAuthPrompt {\n    pub device_auth_id: String,   // Server-issued identifier for polling\n    pub user_code: String,        // One-time code to enter at DEVICE_AUTH_URL\n    pub interval_secs: u64,       // Recommended poll interval\n}\n```\n\n#### `DeviceAuthFlowError`\n\nDistinguishes recoverable fallback from fatal errors:\n\n- **`BrowserFallback`** — device auth isn't enabled for the account/workspace. Callers should fall back to the browser flow.\n- **`Fatal`** — unrecoverable failure; do not silently retry or fall back.\n\n#### `PkceChallenge`\n\nPKCE verifier/challenge pair generated by `generate_pkce()`:\n\n```rust\npub struct PkceChallenge {\n    pub verifier: String,    // 64 random bytes, base64url-encoded (86 chars)\n    pub challenge: String,   // SHA-256 of verifier, base64url-encoded\n}\n```\n\n### Browser Flow\n\nThe browser flow binds a localhost TCP server, builds an authorization URL, and waits for the OAuth redirect.\n\n```mermaid\nsequenceDiagram\n    participant App\n    participant Browser\n    participant Localhost as localhost:1455\n    participant OpenAI as auth.openai.com\n\n    App->>App: start_oauth_flow()\n    Note right of App: Binds port 1455, generates PKCE + state\n    App->>Browser: Open auth URL\n    Browser->>OpenAI: User logs in\n    OpenAI->>Localhost: Redirect /auth/callback?code=...&state=...\n    Localhost->>App: run_oauth_callback_server() returns code\n    App->>OpenAI: exchange_code_for_tokens(code, verifier, port)\n    OpenAI-->>App: ChatGptAuthResult\n```\n\n**Step-by-step:**\n\n1. **`start_oauth_flow()`** — Binds `CALLBACK_BIND` (verifies the port is available), generates a PKCE challenge and random state, and returns `(auth_url, port, pkce_verifier, state)`. The caller opens `auth_url` in the user's browser.\n\n2. **`run_oauth_callback_server(port, expected_state)`** — Starts an async HTTP server on the given port. Handles `GET /auth/callback?code=...&state=...`. Validates the `state` parameter against `expected_state` to prevent CSRF. On success, serves a styled HTML confirmation page. Times out after 5 minutes (`AUTH_TIMEOUT_SECS`).\n\n3. **`exchange_code_for_tokens(code, code_verifier, port)`** — POSTs to `TOKEN_URL` with the authorization code, PKCE verifier, and the browser redirect URI. Returns `ChatGptAuthResult`.\n\n### Device Auth Flow\n\nFor headless environments where opening a browser isn't practical.\n\n**Step-by-step:**\n\n1. **`start_device_auth_flow()`** — POSTs to `DEVICE_AUTH_USERCODE_URL` with the client ID. Returns `DeviceAuthPrompt` containing the `user_code` and `device_auth_id`. Returns `DeviceAuthFlowError::BrowserFallback` if the feature isn't enabled (HTTP 404).\n\n2. **`poll_device_auth_flow(prompt)`** — Polls `DEVICE_AUTH_TOKEN_URL` at `prompt.interval_secs` intervals. HTTP 403/404 are treated as \"still pending\" (user hasn't completed verification). On success, the response contains an `authorization_code` and `code_verifier`, which are passed to `exchange_code_for_tokens_with_redirect_uri()` with `DEVICE_AUTH_REDIRECT_URI`. Times out after 15 minutes (`DEVICE_AUTH_TIMEOUT_SECS`).\n\n### Token Refresh\n\n**`refresh_access_token(refresh_token)`** — POSTs to `TOKEN_URL` with `grant_type=refresh_token`. Returns a new `ChatGptAuthResult`. Called from `src/drivers/chatgpt.rs` when the current access token expires.\n\n### Model Discovery\n\n**`fetch_best_codex_model(access_token)`** — Queries `GET {CHATGPT_BASE_URL}/codex/models` with the bearer token. Parses the model list, sorts by `priority` (descending), and returns the highest-priority model slug. Falls back to `\"gpt-5.1-codex-mini\"` on any failure. Called from `librefang-cli` after authentication to determine which model to use.\n\n### Session Token Check\n\n**`chatgpt_session_available()`** — Returns `true` if the `CHATGPT_SESSION_TOKEN` environment variable is set and non-empty. Useful for callers to decide whether to attempt session-based auth before launching an OAuth flow.\n\n### Utility Functions\n\n| Function | Description |\n|---|---|\n| `generate_pkce()` | Creates a `PkceChallenge` with 64 random bytes for the verifier and SHA-256 S256 challenge. |\n| `create_state()` | Generates a 16-byte hex-encoded random state parameter. |\n| `build_authorization_url(port, code_challenge, state)` | Constructs the full authorization URL with all OAuth query parameters. |\n\n---\n\n## Copilot OAuth (`copilot_oauth`)\n\nImplements GitHub's OAuth 2.0 Device Authorization Grant (RFC 8628) using the VSCode Copilot extension's public client ID. This is a pure device flow — there is no browser callback path.\n\n### Key Types\n\n#### `DeviceCodeResponse`\n\nParsed response from `start_device_flow()`:\n\n```rust\npub struct DeviceCodeResponse {\n    pub device_code: String,\n    pub user_code: String,\n    pub verification_uri: String,\n    pub expires_in: u64,\n    pub interval: u64,\n}\n```\n\n#### `DeviceFlowStatus`\n\nResult of each `poll_device_flow()` call. Models all possible states from RFC 8628:\n\n| Variant | Meaning |\n|---|---|\n| `Pending` | User hasn't completed authorization yet |\n| `Complete { access_token }` | Authorization succeeded |\n| `SlowDown { new_interval }` | Server requested longer poll interval |\n| `Expired` | Device code expired; restart the flow |\n| `AccessDenied` | User explicitly denied access |\n| `Error(String)` | Unexpected error |\n\n### Flow\n\n```mermaid\nsequenceDiagram\n    participant App\n    participant GitHub\n\n    App->>GitHub: start_device_flow() — POST /login/device/code\n    GitHub-->>App: DeviceCodeResponse (user_code, device_code, verification_uri)\n    App->>App: Display user_code + verification_uri to user\n    loop Poll until resolution\n        App->>GitHub: poll_device_flow(device_code) — POST /login/oauth/access_token\n        GitHub-->>App: DeviceFlowStatus\n    end\n    Note right of App: Complete contains Zeroizing<String> access_token\n```\n\n1. **`start_device_flow()`** — POSTs to `GITHUB_DEVICE_CODE_URL` with the Copilot client ID and `read:user` scope. Returns `DeviceCodeResponse` with the `user_code` and `verification_uri` to display to the user.\n\n2. **`poll_device_flow(device_code)`** — POSTs to `GITHUB_TOKEN_URL` with the device code. GitHub returns HTTP 200 with an `error` field during polling (as per RFC 8628). The function maps these to the appropriate `DeviceFlowStatus` variant. On success, returns `Complete` with the access token wrapped in `Zeroizing<String>`.\n\n### Constants\n\n| Constant | Value |\n|---|---|\n| `GITHUB_DEVICE_CODE_URL` | `https://github.com/login/device/code` |\n| `GITHUB_TOKEN_URL` | `https://github.com/login/oauth/access_token` |\n| `COPILOT_CLIENT_ID` | `Iv1.b507a08c87ecfe98` (VSCode Copilot extension client ID) |\n\n---\n\n## Integration Points\n\n### Incoming Calls (who uses this module)\n\n| Caller | Functions Used |\n|---|---|\n| `librefang-cli/src/main.rs` (`authenticate_chatgpt`) | `start_oauth_flow`, `start_device_auth_flow`, `poll_device_auth_flow`, `run_oauth_callback_server`, `exchange_code_for_tokens`, `fetch_best_codex_model` |\n| `src/routes/providers.rs` (`copilot_oauth_start`) | `start_device_flow` |\n| `src/routes/providers.rs` (`copilot_oauth_poll`) | `poll_device_flow` |\n| `src/drivers/chatgpt.rs` | `refresh_access_token` |\n\n### Outgoing Dependencies\n\n| Dependency | Usage |\n|---|---|\n| `librefang_http` | `proxied_client()` and `proxied_client_builder()` for all HTTP requests — respects system proxy settings |\n| `librefang_types` | `VERSION` constant for the Codex models API `client_version` parameter |\n| `zeroize` | `Zeroizing<String>` wrapper for all credential fields |\n| `reqwest`, `tokio`, `serde`, `sha2`, `base64`, `rand` | Standard async HTTP, serialization, crypto, and randomness |\n\n## Security Considerations\n\n- **PKCE** is mandatory for the browser flow — `generate_pkce()` creates a 64-byte random verifier with S256 challenge.\n- **State parameter** validation prevents CSRF in the callback server — `run_oauth_callback_server` rejects mismatches with HTTP 400.\n- **Zeroizing** — `ChatGptAuthResult.access_token`, `refresh_token`, and Copilot's `access_token` are all `Zeroizing<String>`, which zeroes memory on drop.\n- **Device auth fallback** — `DeviceAuthFlowError::BrowserFallback` is a distinct error variant so callers can fall back to the browser flow only when appropriate, never silently on fatal errors.\n- **Timeouts** — browser callback times out after 5 minutes; device auth polling times out after 15 minutes.","runtime-protocol-integrations-librefang-runtime-wasm-src":"# Runtime Protocol Integrations — librefang-runtime-wasm-src\n\n# Runtime Protocol Integrations — `librefang-runtime-wasm-src`\n\nWASM sandbox for executing untrusted skills and plugins inside LibreFang. Built on Wasmtime with deny-by-default capability enforcement, deterministic fuel metering, wall-clock epoch timeouts, and layered defenses against SSRF, path traversal, and environment exfiltration.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Caller (kernel / workflow)\"\n        A[WasmSandbox::execute]\n    end\n\n    subgraph \"Sandbox Layer\"\n        A -->|spawn_blocking| B[execute_sync]\n        B --> C[Compile + Instantiate Module]\n        C --> D[Write input into guest memory]\n        D --> E[Call guest execute]\n        E --> F[Read output from guest memory]\n    end\n\n    subgraph \"Guest Module\"\n        E <-.-> G[alloc / memory exports]\n    end\n\n    subgraph \"Host Imports\"\n        E -.->|librefang::host_call| H[dispatch]\n        E -.->|librefang::host_log| I[host_log]\n        H --> J[check_capability]\n        J -->|granted| K[host_fs_read / host_net_fetch / ...]\n        J -->|denied| L[\"error: Capability denied\"]\n    end\n\n    subgraph \"Guards\"\n        M[Fuel metering]\n        N[Epoch watchdog thread]\n    end\n\n    B --- M\n    B --- N\n```\n\n## Module Structure\n\n| File | Responsibility |\n|---|---|\n| `lib.rs` | Crate root — re-exports `host_functions` and `sandbox`. |\n| `sandbox.rs` | `WasmSandbox` engine, `SandboxConfig`, `GuestState`, guest ABI marshalling, fuel/epoch enforcement. |\n| `host_functions.rs` | `dispatch` function and all individual host handlers (`host_fs_read`, `host_net_fetch`, etc.), capability checks, SSRF and path-traversal protections. |\n\n---\n\n## Sandbox Engine — `sandbox.rs`\n\n### `WasmSandbox`\n\nThe top-level type. Create **once per kernel** and reuse across invocations — the Wasmtime `Engine` is expensive to construct but compiles and instantiates many modules cheaply.\n\n```rust\nlet sandbox = WasmSandbox::new()?;\n```\n\nConstruction enables two Wasmtime features:\n- **Fuel consumption** — deterministic instruction counting.\n- **Epoch interruption** — wall-clock timeout via a cooperative interrupt flag.\n\n#### `execute` → `execute_sync` flow\n\n`execute` is `async` but immediately offloads to `spawn_blocking` because WASM execution is CPU-bound and must not starve the Tokio runtime. The inner `execute_sync` performs these steps in order:\n\n1. **Compile** the WASM/WAT bytes into a `Module`.\n2. **Create a `Store<GuestState>`** carrying capabilities, an optional `KernelHandle`, the agent ID, and a Tokio handle.\n3. **Set fuel budget** from `SandboxConfig::fuel_limit` (0 = unlimited).\n4. **Start epoch watchdog thread** — see below.\n5. **Register host function imports** into a `Linker` under the `\"librefang\"` module name.\n6. **Instantiate** the module (no WASI — the guest has no ambient filesystem or network).\n7. **Validate guest exports**: `memory`, `alloc(i32) → i32`, `execute(i32, i32) → i64`.\n8. **Marshal input**: serialize the input `serde_json::Value` to bytes, call `alloc` inside the guest, copy bytes into guest memory with `checked_add` overflow protection.\n9. **Call guest `execute`**, trap on `OutOfFuel` or `Interrupt` (epoch timeout).\n10. **Marshal output**: unpack the packed `i64` result `(ptr << 32 | len)`, read JSON bytes back out with overflow-checked bounds, deserialize.\n11. **Report fuel consumed**.\n\n#### Epoch watchdog\n\nThe watchdog prevents a runaway guest from blocking forever. It spawns an OS thread that:\n\n- Computes a deadline (`now + timeout_secs`, default 30 s).\n- Loops on `park_timeout(remaining)` — cheap sleep, no polling.\n- On deadline expiry: calls `engine.increment_epoch()`, which traps the guest on its next epoch check.\n- On early wake (via `Thread::unpark`): re-reads an `AtomicBool` done flag. If set, exits cleanly without touching the epoch counter, so concurrent sandboxes sharing the same engine are not falsely interrupted.\n\nAn RAII `WatchdogGuard` sets the done flag, unparks, and joins the thread on every exit path (`?`, panic, normal return). This eliminates the previous bug where fire-and-forget watchdog threads accumulated and eventually exhausted the OS thread limit.\n\n### `SandboxConfig`\n\n```rust\npub struct SandboxConfig {\n    pub fuel_limit: u64,           // Default: 1_000_000\n    pub max_memory_bytes: usize,   // Default: 16 MiB (reserved for future enforcement)\n    pub capabilities: Vec<Capability>,\n    pub timeout_secs: Option<u64>, // Default: 30 s when None\n}\n```\n\n### `GuestState`\n\nCarried inside the Wasmtime `Store` and accessible to host functions via `Caller<GuestState>`:\n\n| Field | Purpose |\n|---|---|\n| `capabilities` | Checked by every host handler before performing any privileged operation. |\n| `kernel` | `Option<Arc<dyn KernelHandle>>` — required for `kv_get`, `kv_set`, `agent_send`, `agent_spawn`. |\n| `agent_id` | The calling agent's identifier, used for logging and capability inheritance checks. |\n| `tokio_handle` | Allows synchronous host functions to `.block_on` async kernel operations. |\n\n### `ExecutionResult`\n\n```rust\npub struct ExecutionResult {\n    pub output: serde_json::Value,\n    pub fuel_consumed: u64,\n}\n```\n\n### `SandboxError`\n\n| Variant | Trigger |\n|---|---|\n| `Compilation` | Wasmtime module compilation failure. |\n| `Instantiation` | Linker/instantiation failure (missing imports, type mismatches). |\n| `Execution` | Generic runtime error, epoch timeout. |\n| `FuelExhausted` | Guest consumed its entire fuel budget. |\n| `AbiError` | Missing exports, pointer overflow, out-of-bounds memory access, invalid JSON. |\n\n---\n\n## Guest ABI\n\nWASM modules must export three symbols:\n\n| Export | Signature | Description |\n|---|---|---|\n| `memory` | `(memory 1)` | Linear memory, at least 1 page. |\n| `alloc` | `(func (param i32) (result i32))` | Bump allocator: given a byte count, returns a pointer to that many bytes. |\n| `execute` | `(func (param i32 i32) (result i64))` | Main entry point. Receives `(input_ptr, input_len)` pointing to JSON bytes. Returns a packed `i64`: high 32 bits = result pointer, low 32 bits = result length. Result must also be valid JSON. |\n\n## Host ABI\n\nThe host provides two imports in the `\"librefang\"` module:\n\n### `host_call(request_ptr: i32, request_len: i32) -> i64`\n\nSingle RPC entry point. The guest writes a JSON request into its own memory:\n\n```json\n{\"method\": \"fs_read\", \"params\": {\"path\": \"/data/config.toml\"}}\n```\n\nThe host reads it, dispatches to the appropriate handler, and writes a JSON response back into guest memory using the guest's `alloc` export. The return value is the same packed `(ptr << 32 | len)` format.\n\nResponses are always one of:\n\n```json\n{\"ok\": <value>}\n{\"error\": \"human-readable message\"}\n```\n\n### `host_log(level: i32, msg_ptr: i32, msg_len: i32)`\n\nLightweight logging — no capability check. Levels: 0 = trace, 1 = debug, 2 = info, 3 = warn, ≥4 = error. Messages are prefixed with `[wasm]` and include the agent ID in the tracing span.\n\n---\n\n## Host Functions — `host_functions.rs`\n\n### `dispatch`\n\n```rust\npub fn dispatch(state: &GuestState, method: &str, params: &serde_json::Value) -> serde_json::Value\n```\n\nCentral switchboard. Routes the method string to the appropriate handler. Unknown methods return `{\"error\": \"Unknown host method: ...\"}`. Called from `WasmSandbox::host_call`, which is the `\"librefang\" \"host_call\"` import.\n\n#### Method routing\n\n| Method | Handler | Required Capability | Notes |\n|---|---|---|---|\n| `time_now` | `host_time_now` | None (always allowed) | Returns Unix epoch seconds. |\n| `fs_read` | `host_fs_read` | `FileRead` | Reads file contents as string. |\n| `fs_write` | `host_fs_write` | `FileWrite` | Writes string to file. |\n| `fs_list` | `host_fs_list` | `FileRead` | Lists directory entries. |\n| `net_fetch` | `host_net_fetch` | `NetConnect` | HTTP GET/POST/PUT/DELETE with SSRF protection. |\n| `shell_exec` | `host_shell_exec` | `ShellExec` | Runs a process with stripped environment. |\n| `env_read` | `host_env_read` | `EnvRead` | Reads a single environment variable. |\n| `kv_get` | `host_kv_get` | `MemoryRead` | Reads from kernel key-value store. |\n| `kv_set` | `host_kv_set` | `MemoryWrite` | Writes to kernel key-value store. |\n| `agent_send` | `host_agent_send` | `AgentMessage` | Sends a message to another agent. |\n| `agent_spawn` | `host_agent_spawn` | `AgentSpawn` | Spawns a child agent (capabilities ≤ parent). |\n\n### Capability checking\n\n```rust\nfn check_capability(capabilities: &[Capability], required: &Capability) -> Result<(), serde_json::Value>\n```\n\nIterates the guest's granted capabilities and calls `capability_matches` (from `librefang_types`). Returns `Ok(())` on first match, or an error JSON if nothing matches. Every handler (except `time_now`) calls this **before** performing any side effect.\n\n### Security layers\n\nHandlers apply multiple security layers in sequence. The order matters — cheap checks (capability gating) run before expensive ones (filesystem operations, network requests).\n\n#### Path traversal protection\n\n`safe_resolve_path` and `safe_resolve_parent` enforce:\n\n1. **No `..` components** — any path containing a `Component::ParentDir` is rejected immediately, even if it would resolve safely. This is a strict policy that eliminates class of symlink-based traversal attacks.\n2. **Canonicalization** — `std::fs::canonicalize` resolves symlinks and normalizes the path for reads. For writes where the target may not exist yet, `safe_resolve_parent` canonicalizes only the parent directory and re-attaches the filename after validating it contains no `..`.\n\n#### SSRF protection\n\n`is_ssrf_target` runs before every `net_fetch`. It:\n\n1. **Scheme allowlist**: Only `http://` and `https://` — blocks `file://`, `gopher://`, `ftp://`, etc.\n2. **Hostname blocklist**: Rejects `localhost`, cloud metadata endpoints (`metadata.google.internal`, `metadata.aws.internal`, `169.254.169.254`), and `instance-data`.\n3. **DNS resolution and IP validation**: Resolves the hostname to socket addresses, canonicalizes IPv4-mapped IPv6 (`::ffff:X.X.X.X`) to their IPv4 form via `canonical_ip`, then rejects any address that is loopback, unspecified, link-local (`169.254.x.x`), or in a private range (`10.x`, `172.16–31.x`, `192.168.x`, `fc00::/7`, `fe80::/10`).\n4. **DNS pinning**: Returns `SsrfResolved { hostname, resolved }` so the caller can build an HTTP client pinned to the already-validated IPs, preventing DNS rebinding / TOCTOU attacks.\n\n```rust\nlet mut builder = librefang_http::proxied_client_builder();\nfor addr in &ssrf_result.resolved {\n    builder = builder.resolve(&ssrf_result.hostname, *addr);\n}\n```\n\n#### Shell environment sanitization\n\n`host_shell_exec` calls `sanitize_shell_env` which:\n\n- Calls `env_clear()` on the child `Command` to remove every inherited variable.\n- Re-adds only a hard-coded allowlist: `PATH`, `HOME`, `TMPDIR`, `TMP`, `TEMP`, `LANG`, `LC_ALL`, `TERM`.\n- On Windows, additionally restores `USERPROFILE`, `SYSTEMROOT`, `APPDATA`, `LOCALAPPDATA`, `COMSPEC`, `WINDIR`, `PATHEXT`.\n\nThis closes the exfiltration vector where a WASM guest with `ShellExec` capability could read the daemon's full environment (LLM API keys, vault tokens, cloud metadata) from the child process.\n\nThe command is executed via `Command::new` directly — not through a shell — so argument injection is not possible. Each argument is passed individually to the spawned process.\n\n#### Capability inheritance for agent spawning\n\n`host_agent_spawn` calls `kernel.spawn_agent_checked` with the parent's capability list. The kernel enforces that the child's capabilities are a subset of the parent's — a guest cannot escalate its own privileges by spawning a new agent.\n\n### Handler parameter details\n\n#### `fs_read`\n\n| Param | Type | Description |\n|---|---|---|\n| `path` | string (required) | File path to read. |\n\nReturns `{\"ok\": \"<file contents as string>\"}`.\n\n#### `fs_write`\n\n| Param | Type | Description |\n|---|---|---|\n| `path` | string (required) | File path to write. |\n| `content` | string (required) | Content to write. |\n\nReturns `{\"ok\": true}`.\n\n#### `fs_list`\n\n| Param | Type | Description |\n|---|---|---|\n| `path` | string (required) | Directory to list. |\n\nReturns `{\"ok\": [\"entry1\", \"entry2\", ...]}`.\n\n#### `net_fetch`\n\n| Param | Type | Description |\n|---|---|---|\n| `url` | string (required) | HTTP(S) URL. |\n| `method` | string (optional) | `\"GET\"`, `\"POST\"`, `\"PUT\"`, or `\"DELETE\"`. Default: `\"GET\"`. |\n| `body` | string (optional) | Request body for POST/PUT. Default: `\"\"`. |\n\nReturns `{\"ok\": {\"status\": 200, \"body\": \"...\"}}`.\n\n#### `shell_exec`\n\n| Param | Type | Description |\n|---|---|---|\n| `command` | string (required) | Binary to execute (not a shell command). |\n| `args` | array of strings (optional) | Arguments passed directly to the binary. |\n\nReturns `{\"ok\": {\"exit_code\": 0, \"stdout\": \"...\", \"stderr\": \"...\"}}`.\n\n#### `env_read`\n\n| Param | Type | Description |\n|---|---|---|\n| `name` | string (required) | Environment variable name. |\n\nReturns `{\"ok\": \"<value>\"}` or `{\"ok\": null}` if not set.\n\n#### `kv_get`\n\n| Param | Type | Description |\n|---|---|---|\n| `key` | string (required) | Key to look up. |\n\nReturns `{\"ok\": <value>}`, `{\"ok\": null}`, or `{\"error\": \"No kernel handle available\"}`.\n\n#### `kv_set`\n\n| Param | Type | Description |\n|---|---|---|\n| `key` | string (required) | Key to store. |\n| `value` | any JSON (required) | Value to store. |\n\nReturns `{\"ok\": true}` or error.\n\n#### `agent_send`\n\n| Param | Type | Description |\n|---|---|---|\n| `target` | string (required) | Target agent identifier. |\n| `message` | string (required) | Message content. |\n\nReturns `{\"ok\": <response>}` from the target agent.\n\n#### `agent_spawn`\n\n| Param | Type | Description |\n|---|---|---|\n| `manifest` | string (required) | TOML manifest for the new agent. |\n\nReturns `{\"ok\": {\"id\": \"...\", \"name\": \"...\"}}`. The child's capabilities are validated to be ≤ the parent's.\n\n---\n\n## Integration with the Rest of LibreFang\n\n- **`librefang_types::capability`** — provides `Capability` enum and `capability_matches`. Every host handler depends on this for authorization decisions.\n- **`librefang_kernel_handle::KernelHandle`** — async trait for kernel operations. `GuestState` holds an `Option<Arc<dyn KernelHandle>>`; `kv_get`, `kv_set`, `agent_send`, and `agent_spawn` all dispatch through it.\n- **`librefang_http`** — provides `proxied_client_builder()` which creates an HTTP client that respects proxy configuration. Used in `host_net_fetch` for DNS-pinned requests.\n- **No dependency on `librefang-runtime`** — the safe environment variable allowlist is duplicated inline to avoid a crate dependency cycle. The list mirrors the one in `librefang-runtime/src/subprocess_sandbox.rs`.\n\n## Testing\n\nThe test suite in `sandbox.rs` includes WAT modules that exercise the full round-trip:\n\n- `ECHO_WAT` — returns input unchanged, validates marshalling and fuel counting.\n- `INFINITE_LOOP_WAT` — verifies `FuelExhausted` trap with a low fuel budget.\n- `HOST_CALL_PROXY_WAT` — forwards input to `host_call`, enabling integration tests for capability denial, `time_now`, and unknown methods.\n\nThe test suite in `host_functions.rs` tests each handler directly by constructing a `GuestState` with specific capabilities and validating JSON error messages for denied operations, missing parameters, and security violations (path traversal, SSRF, env exfiltration).","runtime-protocol-integrations":"# Runtime Protocol Integrations\n\n# Runtime Protocol Integrations\n\nConnects LibreFang to the outside world — external tool servers, identity providers, and untrusted plugin code — through three specialised sub-modules that share authentication, security, and execution infrastructure.\n\n## Sub-modules\n\n| Module | Purpose |\n|---|---|\n| [MCP Client](librefang-runtime-mcp-src.md) | Connects to external MCP tool servers over stdio, SSE, Streamable HTTP, and plain HTTP. Manages the full lifecycle from handshake through invocation, with integrated taint scanning on every tool call. |\n| [OAuth 2.0](librefang-runtime-oauth-src.md) | Provides ready-to-use OAuth flows for ChatGPT (browser + device) and GitHub Copilot (RFC 8628 device flow). Handles PKCE, token exchange, refresh, and browser callbacks with no external OAuth dependencies. |\n| [WASM Sandbox](librefang-runtime-wasm-src.md) | Executes untrusted skills and plugins inside a Wasmtime sandbox with deny-by-default capabilities, fuel metering, epoch timeouts, and defences against SSRF, path traversal, and environment exfiltration. |\n\n## How they work together\n\n```mermaid\ngraph LR\n    subgraph \"Runtime Protocol Integrations\"\n        OAUTH[OAuth 2.0<br/>ChatGPT / Copilot]\n        MCP[MCP Client<br/>Tool Servers]\n        WASM[WASM Sandbox<br/>Untrusted Plugins]\n    end\n\n    KERNEL[LibreFang Kernel] -->|auth routes| OAUTH\n    KERNEL -->|execute_tool_raw| MCP\n    KERNEL -->|WasmSandbox::execute| WASM\n\n    MCP -->|mcp_oauth| OAUTH\n    WASM -->|host functions| MCP\n\n    MCP -->|taint scanner| SEC[Security Layer]\n    MCP -->|SSRF checks| SEC\n    WASM -->|capability gates| SEC\n```\n\n### Authentication spanning modules\n\nWhen a user or an MCP server requires OAuth, the flow crosses module boundaries:\n\n1. The kernel's `mcp_auth` route calls into **MCP Client**'s `discover_oauth_metadata`.\n2. MCP Client resolves the metadata URL via `extract_metadata_url`, with SSRF host validation applied at each step.\n3. For ChatGPT or Copilot specifically, the **OAuth 2.0** module takes over — running PKCE-based browser flows or RFC 8628 device-authorisation polling, then persisting the resulting tokens.\n\n### Plugin-to-tool execution\n\nA WASM plugin can invoke MCP tools through host functions exposed by the sandbox:\n\n1. **WASM Sandbox** receives `WasmSandbox::execute` from the kernel.\n2. Inside the sandbox, a guest calls a host function (e.g. `kv_get`, `host_call`).\n3. If the capability is denied by the `SandboxConfig`, the call is blocked; otherwise it is dispatched — potentially routing through **MCP Client**'s `execute_tool_raw` → `McpConnection` → transport layer.\n4. Before the MCP response reaches the guest, the taint scanner walks outbound text for policy violations.\n\n### Shared security posture\n\nAll three modules enforce consistent hardening:\n\n- **SSRF protection** — both MCP Client (`is_ssrf_blocked_host`) and WASM Sandbox validate outbound destinations.\n- **Capability gating** — WASM denies by default; MCP applies taint rules with configurable skip paths (`resolve_skip_rules` → `jsonpath_matches`).\n- **No external auth dependencies** — OAuth flows use standard HTTP only, keeping the trust surface small.","shared-types":"# Shared Types\n\n# Shared Types (`librefang-types`)\n\nThe `librefang-types` crate defines the canonical data structures shared across every layer of LibreFang — the kernel, the runtime, LLM drivers, channel adapters, the dashboard, and the CLI. Because every component agrees on these types, serialized data (JSON, TOML, MessagePack) passes between processes and over the network without ad-hoc translation.\n\nThe crate has two primary concerns exposed in the files covered here:\n\n- **Agent types** (`agent.rs`) — identity, manifests, lifecycle, scheduling, and per-agent configuration.\n- **Approval types** (`approval.rs`) — the human-in-the-loop gate for dangerous tool calls.\n\n---\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Identity (Deterministic UUIDs)\"\n        UID[UserId]\n        AID[AgentId]\n        SID[SessionId]\n    end\n\n    subgraph \"Agent Definition\"\n        AM[AgentManifest]\n        MC[ModelConfig]\n        TP[ToolProfile]\n        AC[AutonomousConfig]\n        RQ[ResourceQuota]\n        MCAPS[ManifestCapabilities]\n    end\n\n    subgraph \"Runtime State\"\n        AE[AgentEntry]\n        AS[AgentState]\n        AMode[AgentMode]\n        SM[ScheduleMode]\n    end\n\n    subgraph \"Approval Gate\"\n        AP[ApprovalPolicy]\n        AR[ApprovalRequest]\n        AResp[ApprovalResponse]\n        AD[ApprovalDecision]\n        CTR[ChannelToolRule]\n    end\n\n    AM --> MC\n    AM --> TP\n    AM --> AC\n    AM --> RQ\n    AM --> MCAPS\n    AM --> SM\n    AE --> AID\n    AE --> AM\n    AE --> AS\n    AE --> AMode\n    AR --> AD\n    AP --> CTR\n    AResp --> AD\n```\n\n---\n\n## Deterministic Identity\n\nSeveral ID types use **UUID v5** (SHA-1 + namespace) so the same logical inputs always produce the same UUID. This is critical for:\n\n- **Audit log continuity** across daemon restarts — a user named \"Alice\" always maps to the same `UserId`.\n- **Session history preservation** — re-deploying an agent with the same name re-attaches to its existing sessions.\n- **Debugging** — you can re-derive an ID from log entries without looking up a database.\n\n### `UserId`\n\n```rust\npub struct UserId(pub Uuid);\n```\n\n| Constructor | Behavior |\n|---|---|\n| `UserId::new()` | Random UUID v4. Changes every restart — avoid for config-sourced users. |\n| `UserId::from_name(name)` | UUID v5 from `LIBREFANG_USER_NAMESPACE`. Deterministic, case-sensitive. |\n\nThe namespace constant `LIBREFANG_USER_NAMESPACE` is frozen and must never change — doing so would rotate every `UserId` in the fleet and break cross-restart audit correlation.\n\n### `AgentId`\n\n```rust\npub struct AgentId(pub Uuid);\n```\n\nAll deterministic derivation shares a single namespace (`AgentId::NAMESPACE`) with typed string prefixes to avoid collisions:\n\n| Constructor | Input format | Use case |\n|---|---|---|\n| `AgentId::new()` | Random v4 | Ephemeral agents |\n| `AgentId::from_name(name)` | `\"agent:{name}\"` | TOML-defined single agents |\n| `AgentId::from_hand_id(hand_id)` | `\"{hand_id}\"` (bare, backward compat) | Hand-level ID |\n| `AgentId::from_hand_agent(hand_id, role, instance_id)` | `\"{hand_id}:{role}\"` or `\"{hand_id}:{role}:{instance_id}\"` | Per-role agent in multi-agent hands |\n\n**Backward compatibility note**: `from_hand_agent` with `instance_id: None` uses the legacy format (no instance suffix) so existing single-instance hands keep their original IDs — orphaned cron jobs and memory keys are avoided.\n\n### `SessionId`\n\n```rust\npub struct SessionId(pub Uuid);\n```\n\nSessions are scoped to (agent, route). Three derivation methods serve different routing needs:\n\n| Method | Scope | Namespace |\n|---|---|---|\n| `SessionId::new()` | Random, one-shot | — |\n| `SessionId::for_channel(agent_id, channel)` | Persistent per (agent, channel) | `CHANNEL_SESSION_NAMESPACE` |\n| `SessionId::for_cron_run(agent_id, run_key)` | Isolated per cron fire | `CRON_RUN_SESSION_NAMESPACE` (disjoint from channel) |\n| `SessionId::from_route_key(agent_id, channel, account, conversation)` | Multi-tenant routing | Legacy-compat or `v2:` prefix |\n\n**Backward compatibility in `from_route_key`**: When `account` is empty, the result is identical to `for_channel` — existing sessions without an account dimension are preserved. When `account` is non-empty, a `v2:` byte prefix ensures no collision with legacy keys.\n\nAll inputs are lowercased before hashing for case-insensitive stability.\n\n---\n\n## Agent Manifest\n\n`AgentManifest` is the central configuration type — the complete declaration of what an agent is, how it runs, and what it's allowed to do. It's typically loaded from `agent.toml` files or constructed programmatically by the Hand system.\n\n### Key Field Groups\n\n**Identity & scheduling:**\n\n| Field | Type | Default | Purpose |\n|---|---|---|---|\n| `name` | `String` | `\"unnamed\"` | Human-readable name, used for ID derivation |\n| `schedule` | `ScheduleMode` | `Reactive` | How the agent wakes up |\n| `session_mode` | `SessionMode` | `Persistent` | Whether automated invocations reuse sessions |\n| `enabled` | `bool` | `true` | Disabled agents are not spawned on startup |\n\n**LLM configuration:**\n\n| Field | Type | Purpose |\n|---|---|---|\n| `model` | `ModelConfig` | Primary LLM provider/model/temperature/prompt |\n| `fallback_models` | `Vec<FallbackModel>` | Chain tried in order on primary failure |\n| `routing` | `Option<ModelRoutingConfig>` | Auto-select cheap/mid/expensive by complexity |\n| `pinned_model` | `Option<String>` | Override for Stable mode |\n| `thinking` | `Option<ThinkingConfig>` | Per-agent extended thinking (overrides global) |\n| `response_format` | `Option<ResponseFormat>` | Structured output mode |\n\n**Tooling & capabilities:**\n\n| Field | Type | Purpose |\n|---|---|---|---|\n| `profile` | `Option<ToolProfile>` | Named preset expanding to tool list + capabilities |\n| `capabilities` | `ManifestCapabilities` | Fine-grained grants (network, shell, memory scopes) |\n| `tool_allowlist` | `Vec<String>` | Only these tools available (empty = all) |\n| `tool_blocklist` | `Vec<String>` | Excluded tools (applied after allowlist) |\n| `tools_disabled` | `bool` | Nuclear option — disable all tools |\n| `exec_policy` | `Option<ExecPolicy>` | Per-agent shell execution policy override |\n| `allowed_plugins` | `Vec<String>` | Plugin allowlist (empty = all) |\n\n**Autonomous & heartbeat:**\n\n| Field | Type | Purpose |\n|---|---|---|\n| `autonomous` | `Option<AutonomousConfig>` | Guardrails for 24/7 agents |\n| `max_concurrent_invocations` | `Option<u32>` | Trigger-dispatch concurrency cap |\n| `max_history_messages` | `Option<usize>` | Per-agent history trim override |\n\n**Workspaces:**\n\n| Field | Type | Purpose |\n|---|---|---|\n| `workspace` | `Option<PathBuf>` | Private workspace, auto-created on spawn |\n| `workspaces` | `HashMap<String, WorkspaceDecl>` | Named shared workspaces |\n| `generate_identity_files` | `bool` | Whether to create `SOUL.md`, `USER.md`, etc. |\n\n**Behavior flags:**\n\n| Field | Default | Purpose |\n|---|---|---|\n| `inherit_parent_context` | `true` | Subagents receive parent workflow context |\n| `show_progress` | `true` | Surface `🔧 tool_name` progress in channel replies |\n| `auto_evolve` | `true` | Run skill evolution review after each turn |\n| `auto_dream_enabled` | `false` | Participate in background memory consolidation |\n| `cache_context` | `false` | Read `context.md` once vs. before every turn |\n| `web_search_augmentation` | `Auto` | Inject web search results for non-tool models |\n\n### ModelConfig\n\n```rust\npub struct ModelConfig {\n    pub provider: String,\n    pub model: String,          // aliases: \"name\" in TOML\n    pub max_tokens: u32,\n    pub temperature: f32,\n    pub system_prompt: String,\n    pub api_key_env: Option<String>,\n    pub base_url: Option<String>,\n    pub context_window: Option<u64>,\n    pub max_output_tokens: Option<u64>,\n    pub extra_params: HashMap<String, serde_json::Value>,  // flattened into API body\n}\n```\n\nThe `extra_params` field uses `#[serde(flatten)]` to merge provider-specific keys directly into the API request body. For example, Qwen's `enable_memory` parameter. Conflicting keys in `extra_params` take precedence over standard fields.\n\n### ScheduleMode\n\n| Variant | Behavior |\n|---|---|\n| `Reactive` | Wakes on incoming messages/events (default) |\n| `Periodic { cron }` | Wakes on a cron schedule |\n| `Proactive { conditions }` | Wakes when monitored conditions are met |\n| `Continuous { check_interval_secs }` | Persistent loop, default 300s |\n\n### ToolProfile\n\nNamed presets that expand to tool lists and derive `ManifestCapabilities`:\n\n| Profile | Tools included |\n|---|---|\n| `Minimal` | `file_read`, `file_list` |\n| `Coding` | `file_read`, `file_write`, `file_list`, `shell_exec`, `web_fetch` |\n| `Research` | `web_fetch`, `web_search`, `file_read`, `file_write` |\n| `Messaging` | `agent_send`, `agent_list`, `channel_send`, `memory_store`, `memory_list`, `memory_recall` |\n| `Automation` | All of the above combined |\n| `Full` / `Custom` | `[\"*\"]` (all tools) |\n\nThe `implied_capabilities()` method derives network, shell, agent, and memory permissions from the tool list.\n\n### WorkspaceDecl\n\nShared workspace declarations support two mutually exclusive modes:\n\n- **`path`** — relative to `workspaces_dir`, auto-created by the kernel.\n- **`mount`** — absolute host path (e.g. an Obsidian vault), must be whitelisted in `config.toml: allowed_mount_roots`.\n\nBoth support `ReadWrite` or `ReadOnly` modes. Multiple agents sharing the same path don't collide on identity files because those live in the agent's private `.identity/` directory.\n\n---\n\n## Agent Entry (Runtime State)\n\n`AgentEntry` is the kernel's runtime representation of a live agent — everything the system needs to track beyond the static manifest:\n\n```rust\npub struct AgentEntry {\n    pub id: AgentId,\n    pub name: String,\n    pub manifest: AgentManifest,\n    pub state: AgentState,\n    pub mode: AgentMode,\n    pub session_id: SessionId,\n    pub parent: Option<AgentId>,\n    pub children: Vec<AgentId>,\n    pub identity: AgentIdentity,\n    pub force_session_wipe: bool,\n    pub resume_pending: bool,\n    pub has_processed_message: bool,\n    // ... timestamps, tags, flags\n}\n```\n\n### AgentState (Lifecycle)\n\n```mermaid\nstateDiagram-v2\n    [*] --> Created\n    Created --> Running\n    Running --> Suspended\n    Suspended --> Running\n    Running --> Terminated\n    Running --> Crashed\n    Crashed --> Running: recovery\n    Crashed --> Term
