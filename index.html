`[agent]`. These are auto-converted to the nested `AgentManifest` format via `LegacyHandAgentConfig`. The parser uses a heuristic: if `[agent]` contains a `model` sub-table, parse as full `AgentManifest`; otherwise parse as legacy.\n\n### Base Template Resolution\n\nAgents in multi-agent hands can reference a shared template via `base`:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"my-writer\"\n\n[agents.writer.model]\nsystem_prompt = \"You are a blog post writer.\"\n```\n\nThis loads `{agents_dir}/my-writer/agent.toml`, normalizes any flat-format fields to nested format, then deep-merges the hand's overrides on top. Only available via `parse_hand_definition()` or `parse_hand_toml_with_agents_dir()` — the standard `Deserialize` path has no filesystem access and cannot resolve templates.\n\nPath traversal is prevented: template names containing `..`, `/`, or `\\` are rejected.\n\n### Deep Merge\n\n`deep_merge_toml(base, overlay)` recursively merges TOML tables. Overlay scalars and arrays replace base values; tables are merged recursively. This preserves base fields not overridden by the hand.\n\n## Settings\n\n### Schema\n\nSettings are declared as `[[settings]]` arrays in `HAND.toml`:\n\n```toml\n[[settings]]\nkey = \"stt_provider\"\nlabel = \"STT Provider\"\nsetting_type = \"select\"\ndefault = \"auto\"\n\n[[settings.options]]\nvalue = \"groq\"\nlabel = \"Groq Whisper\"\nprovider_env = \"GROQ_API_KEY\"\n```\n\nThree setting types: `Select`, `Text`, `Toggle`.\n\n### Resolution\n\n`resolve_settings(settings, config)` produces a `ResolvedSettings`:\n\n- **`prompt_block`** — Markdown appended to the system prompt summarizing user choices\n- **`env_vars`** — Env var names the agent's subprocess needs access to\n\nFor Select settings, only the matched option's `provider_env` is collected. For Text settings with `env_var`, that env var is collected when the value is non-empty.\n\n## Requirements\n\n### Types\n\n| `RequirementType` | `check_value` | Check |\n|---|---|---|\n| `Binary` | Binary name | `which` on PATH (special handling for `python3` and `chromium`) |\n| `EnvVar` | Env var name | Non-empty check |\n| `ApiKey` | Env var name | Non-empty check |\n| `AnyEnvVar` | Comma-separated names | Any one non-empty |\n\nOptional requirements (`optional = true`) do not block activation. When an active hand has unmet optional requirements, it reports as **degraded**.\n\n### Platform-Specific Install Info\n\nEach requirement can carry `HandInstallInfo` with install commands for macOS, Windows (winget), Linux (apt/dnf/pacman), pip, signup URLs, docs, and step-by-step guides.\n\n### Special Cases\n\n- **`python3`**: Cached via `OnceLock`. Runs `python3 --version` / `python --version` and checks for \"Python 3\" in output to avoid false positives from Windows Store shims.\n- **`chromium`**: Falls back to `chromium-browser`, `google-chrome`, `google-chrome-stable`, `chrome`, and `CHROME_PATH` env var.\n\n## HandRegistry\n\nThread-safe registry using `DashMap` for lock-free concurrent access, with `Mutex` guards for serialized activate/deactivate operations.\n\n### Concurrent Indexes\n\n| Index | Key | Value | Purpose |\n|-------|-----|-------|---------|\n| `definitions` | `hand_id` | `HandDefinition` | All known hands |\n| `instances` | `instance_id` (UUID) | `HandInstance` | Active/paused instances |\n| `agent_index` | `agent_id` string | `instance_id` | O(1) agent → instance lookup |\n| `active_index` | `hand_id` | `instance_id` | O(1) \"is hand active?\" check |\n\n### Install Flows\n\n| Method | Source | Persists to Disk? | Base Templates? |\n|--------|--------|-------------------|-----------------|\n| `install_from_path` | Directory with `HAND.tomL` | No | Yes |\n| `install_from_content` | Raw TOML + skill strings | No | No (rejected) |\n| `install_from_content_persisted` | Raw TOML + skill strings | `workspaces/{id}/` | Yes |\n| `reload_from_disk` | Scans `registry/hands/` + `workspaces/` | No | Yes |\n\n`install_from_content` **rejects** hands with `base` references since it has no access to the agents registry directory. Use the other two methods when base resolution is needed.\n\n### Uninstall\n\n`uninstall_hand(home_dir, hand_id)` has four outcomes:\n\n1. **NotFound** — hand_id not in registry\n2. **BuiltinHand** — hand lives under `registry/hands/` (no `workspaces/{id}/HAND.toml`); would be recreated on next sync\n3. **AlreadyActive** — live instance exists; deactivate first\n4. **Ok** — removes in-memory definition and `workspaces/{id}/` directory\n\n### State Persistence\n\n`persist_state(path)` writes all non-Inactive instances to `hand_state.json` (version 4 format). `load_state(path)` reads it back, handling v1 (bare array), v2 (single `agent_id`), and v3/v4 (multi-agent) formats with backward-compatible migration.\n\nPaused instances are persisted. Error-state instances are skipped during restore (the user sees what went wrong but the instance is not re-activated).\n\n### Readiness\n\n`readiness(hand_id)` returns `HandReadiness`:\n\n- `requirements_met` — all **non-optional** requirements satisfied\n- `active` — at least one instance is Active\n- `degraded` — active but any requirement (including optional) is unmet\n\n## Localization (i18n)\n\n`HandI18n` provides optional translations keyed by language code:\n\n```toml\n[i18n.zh]\nname = \"线索生成\"\ndescription = \"自主线索生成\"\n\n[i18n.zh.agents.main]\nname = \"主协调器\"\n\n[i18n.zh.settings.target_industry]\nlabel = \"目标行业\"\n```\n\nAll fields are optional — untranslated items fall back to English. `check_settings_availability()` accepts an optional `lang` parameter and returns localized labels/descriptions.\n\n## Dashboard Metrics\n\n`HandDashboard` declares metrics read from agent structured memory:\n\n```toml\n[[dashboard.metrics]]\nlabel = \"Items processed\"\nmemory_key = \"items_count\"\nformat = \"number\"\n```\n\nFormats: `Number` (default), `Duration`, `Bytes`, `Percentage`, `Text`, `Date`.\n\n## Metadata and Routing\n\n`HandMetadata` carries token consumption hints and activation warnings:\n\n```toml\n[metadata]\nfrequency = \"periodic\"\ntoken_consumption = \"medium\"\ndefault_active = true\nactivation_warning = \"This hand uses paid API calls\"\n```\n\n`HandRouting` provides deterministic keyword matching:\n\n```toml\n[routing]\naliases = [\"video editor\", \"clip maker\"]\nweak_aliases = [\"cut video\", \"trim\"]\n```\n\nStrong aliases score ×3, weak aliases score ×1. Cross-lingual matching is handled by semantic embedding fallback, not translated keywords.\n\n## Error Handling\n\n`HandError` variants:\n\n| Variant | When |\n|---------|------|\n| `NotFound(id)` | Hand definition not in registry |\n| `AlreadyActive(id)` | Hand already has an active instance |\n| `AlreadyRegistered(id)` | Duplicate definition on install |\n| `BuiltinHand(id)` | Cannot uninstall a registry hand |\n| `InstanceNotFound(uuid)` | Instance ID doesn't exist |\n| `ActivationFailed(msg)` | Instance UUID collision, etc. |\n| `TomlParse(msg)` | Invalid HAND.toml |\n| `Io(err)` | Filesystem errors |\n| `Config(msg)` | Validation errors |\n\n## File Layout on Disk\n\n```\n{home_dir}/\n├── registry/\n│   ├── hands/\n│   │   ├── clip/\n│   │   │   ├── HAND.toml\n│   │   │   ├── SKILL.md\n│   │   │   └── SKILL-analyst.md    # Per-agent skill content\n│   │   └── lead/\n│   │       └── HAND.toml\n│   └── agents/\n│       └── my-writer/\n│           └── agent.toml           # Base template\n├── workspaces/\n│   ├── uptime-watcher/              # User-installed hand\n│   │   ├── HAND.toml\n│   │   └── SKILL.md\n│   └── {agent-workspace-dirs}/     # Filtered out by HAND.toml check\n└── hand_state.json                  # Persisted instances\n```\n\n## Integration Points\n\nThe registry is consumed by:\n- **Kernel** — activates hands, spawns agents, calls `set_agents()` after spawning\n- **Router** — loads hand definitions for keyword-based routing via `load_hand_route_candidates()`\n- **TUI** — lists definitions, checks requirements, displays active instances\n- **HTTP routes** — `find_by_agent()` for agent→hand lookup, `readiness()` for status APIs, `check_settings_availability()` for activation modals","skills-extensions-librefang-skills-src":"# Skills & Extensions — librefang-skills-src\n\n# Skills & Extensions — `librefang-skills`\n\n## Overview\n\n`librefang-skills` is the skill system for LibreFang. Skills are pluggable tool bundles that extend agent capabilities at runtime. They can be:\n\n- **TOML + Python scripts** — subprocess execution\n- **TOML + WASM modules** — sandboxed execution\n- **TOML + Node.js modules** — OpenClaw compatibility layer\n- **TOML + Shell scripts** — subprocess execution\n- **Prompt-only** — Markdown injected into the LLM system prompt with no executable code\n- **Remote skills** — downloaded from ClawHub or Skillhub marketplaces\n\nThe crate handles the full lifecycle: discovery, download, format conversion, security scanning, installation, version management, agent-driven evolution, and tool execution.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Marketplace Clients\"\n        CH[ClawHubClient]\n        SH[SkillhubClient]\n    end\n\n    subgraph \"Install Pipeline\"\n        OC[openclaw_compat<br/>SKILL.md / package.json]\n        VF[verify::SkillVerifier]\n        FS[Filesystem<br/>skill.toml + prompt_context.md]\n    end\n\n    subgraph \"Runtime\"\n        RG[SkillRegistry]\n        EV[evolution<br/>create / patch / rollback]\n        LD[loader<br/>execute_skill_tool]\n    end\n\n    CH -->|download + convert| OC\n    SH -->|download + convert| OC\n    OC -->|security scan| VF\n    VF -->|write| FS\n\n    RG -->|load from disk| FS\n    RG -->|tool lookup| LD\n    EV -->|mutate| FS\n    LD -->|Python / Shell / WASM| EXT[External Runtimes]\n```\n\n## Core Types\n\nAll core types live in [`lib.rs`](src/lib.rs) and are re-exported from the crate root.\n\n### `SkillManifest`\n\nThe central data structure, parsed from `skill.toml` files:\n\n```rust\npub struct SkillManifest {\n    pub skill: SkillMeta,\n    pub runtime: SkillRuntimeConfig,\n    pub tools: SkillTools,\n    pub requirements: SkillRequirements,\n    pub prompt_context: Option<String>,\n    pub source: Option<SkillSource>,\n    pub config: HashMap<String, serde_json::Value>,\n}\n```\n\nEach manifest contains metadata (`SkillMeta`), runtime configuration, provided tool definitions (with JSON Schema inputs), host requirements, and optional user-defined config under `[config]`.\n\n### `SkillRuntime`\n\nThe execution backend for a skill:\n\n| Variant | Behavior |\n|---------|----------|\n| `PromptOnly` | Default. Markdown body injected into the LLM system prompt — no code execution |\n| `Python` | Runs a Python script in a subprocess |\n| `Wasm` | Runs a WASM module in a sandbox |\n| `Node` | Node.js module (OpenClaw compatibility) |\n| `Shell` | Shell/Bash script in a subprocess |\n| `Builtin` | Compiled into the LibreFang binary |\n\n### `SkillSource`\n\nProvenance tracking — where a skill came from:\n\n- `Native` — built into LibreFang\n- `Local` — user-created workspace skill\n- `OpenClaw` — converted from OpenClaw format\n- `ClawHub { slug, version }` — downloaded from ClawHub marketplace\n- `Skillhub { slug, version }` — downloaded from Skillhub marketplace\n\n### `SkillError`\n\nUnified error type covering all failure modes: `NotFound`, `InvalidManifest`, `AlreadyInstalled`, `RuntimeNotAvailable`, `ExecutionFailed`, `Io`, `Network`, `RateLimited`, `TomlParse`, `YamlParse`, `SecurityBlocked`.\n\n## Skill Manifest Format\n\nSkills are defined by a `skill.toml` file in their own directory. A minimal manifest:\n\n```toml\n[skill]\nname = \"web-summarizer\"\nversion = \"0.1.0\"\ndescription = \"Summarizes any web page into bullet points\"\nauthor = \"librefang-community\"\nlicense = \"MIT\"\ntags = [\"web\", \"summarizer\"]\n\n[runtime]\ntype = \"python\"\nentry = \"src/main.py\"\n\n[[tools.provided]]\nname = \"summarize_url\"\ndescription = \"Fetch a URL and return a concise summary\"\ninput_schema = { type = \"object\", properties = { url = { type = \"string\" } }, required = [\"url\"] }\n\n[requirements]\ntools = [\"web_fetch\"]\ncapabilities = [\"NetConnect(*)\"]\n```\n\nCustom user-defined config goes under `[config]`:\n\n```toml\n[config]\napiKey = \"sk-...\"\ncustom_endpoint = \"https://api.example.com\"\nmax_retries = 3\n```\n\nThese are accessible via `manifest.config` as a `HashMap<String, serde_json::Value>`.\n\n## Installation Pipeline\n\n### ClawHub (`clawhub.rs`)\n\n`ClawHubClient` communicates with the ClawHub API at `https://clawhub.ai/api/v1`. Key endpoints:\n\n| Method | Endpoint | Returns |\n|--------|----------|---------|\n| `search` | `GET /api/v1/search?q=...&limit=N` | `ClawHubSearchResponse` (key: `results`) |\n| `browse` | `GET /api/v1/skills?limit=N&sort=trending` | `ClawHubBrowseResponse` (key: `items`) |\n| `get_skill` | `GET /api/v1/skills/{slug}` | `ClawHubSkillDetail` |\n| `get_file` | `GET /api/v1/skills/{slug}/file?path=SKILL.md` | Raw file text |\n| `install` | `GET /api/v1/download?slug=...` | Downloads and installs |\n\n**Retry behavior**: All HTTP requests use `get_with_retry` which automatically retries on 429 (rate limit) and 5xx (server error) responses up to `MAX_RETRIES` (5) attempts with exponential backoff (base 1.5s, max 30s) and jitter. The `Retry-After` header is respected when present.\n\n**TLS verification**: Disabled only when the environment variable `LIBREFANG_DANGEROUSLY_SKIP_TLS_VERIFICATION` is set to `\"true\"` or `\"1\"` — uses `crate::http_client::dangerous_client_builder()` in that case.\n\nThe `install` method runs a full security pipeline:\n\n1. Download content and compute SHA256\n2. Detect format: SKILL.md (frontmatter `---`), ZIP archive (magic bytes `PK`), or package.json\n3. Convert to LibreFang manifest via `openclaw_compat`\n4. Run manifest security scan via `SkillVerifier::security_scan`\n5. If prompt-only: run prompt injection scan via `SkillVerifier::scan_prompt_content`\n6. Check binary dependencies (e.g., Python, Node) are on PATH\n7. Write `skill.toml`\n\n**Path safety**: `resolve_skill_dir` and `resolve_skill_child_path` validate against directory traversal — slugs must be alphanumeric + `-_`, extracted paths must contain only `Normal` components, no absolute paths.\n\n### Skillhub (`skillhub.rs`)\n\nAn alternative marketplace client. Delegates to `ClawHubClient::install_from_bytes` for the shared extraction and scanning logic after downloading from Skillhub's COS storage.\n\n### OpenClaw Compatibility (`openclaw_compat.rs`)\n\nHandles conversion from two OpenClaw skill formats:\n\n- **SKILL.md format**: YAML frontmatter + Markdown body → `PromptOnly` skill with `prompt_context`\n- **package.json format**: Node.js skill definition → LibreFang manifest with `SkillRuntime::Node`\n\nKey functions: `detect_skillmd`, `detect_openclaw_skill`, `convert_skillmd`, `convert_openclaw_skill`, `write_librefang_manifest`, `write_prompt_context`.\n\n## Evolution System (`evolution.rs`)\n\nAgent-driven skill creation, mutation, and version management. Agents can autonomously create and refine skills based on execution experience.\n\n### Core Operations\n\n| Function | Purpose |\n|----------|---------|\n| `create_skill` | Create a new `PromptOnly` skill from an agent's learned approach |\n| `update_skill` | Full rewrite of a skill's `prompt_context.md` |\n| `patch_skill` | Fuzzy find-and-replace on `prompt_context.md` |\n| `rollback_skill` | Restore the previous version from a `.rollback/` snapshot |\n| `delete_skill` | Agent-facing delete (only removes `Local`/`Native` source skills) |\n| `uninstall_skill` | User-facing delete (removes any skill regardless of source) |\n| `write_supporting_file` | Add files to `references/`, `templates/`, `scripts/`, `assets/` subdirectories |\n| `remove_supporting_file` | Remove supporting files and clean up empty parent dirs |\n| `record_skill_usage` | Increment use count on successful tool invocation |\n\n### Fuzzy Patching\n\n`patch_skill` uses `fuzzy_find_and_replace` which tries six strategies in order from strict to loose:\n\n1. **Exact** — literal substring match\n2. **LineTrimmed** — trim each line's leading/trailing whitespace\n3. **WhitespaceNormalized** — collapse whitespace runs to single space\n4. **IndentFlexible** — strip all leading whitespace\n5. **BlockAnchor** — match first + last lines, verify middle ≥60% similar (50% for first candidate)\n6. **WhitespaceStripped** — remove ALL whitespace, substring match (CJK-friendly last resort)\n\nEach strategy returns the `MatchStrategy` used and match count. When all strategies fail, the error includes the closest matching lines from the content to help the agent self-correct.\n\nEmpty `old_str` is rejected before any strategy runs — `\"\".contains(\"\") == true` would cause catastrophic corruption with `replace_all=true`.\n\n### Version Management\n\nVersion history is stored in `.evolution.json` alongside `skill.toml`:\n\n```rust\npub struct SkillEvolutionMeta {\n    pub versions: Vec<SkillVersionEntry>,   // newest last, max 10\n    pub use_count: u64,                      // successful invocations\n    pub evolution_count: u64,                // total version entries written\n    pub mutation_count: u64,                 // post-creation edits only\n}\n```\n\n`bump_patch_version` uses the `semver` crate for robust version parsing, correctly handling pre-release tags and build metadata. Falls back to simple string splitting for non-standard versions.\n\n### Concurrency & File Safety\n\nAll mutations are serialized through **per-skill file locks** (`acquire_skill_lock`). Lock files live in `{parent}/.evolution-locks/{name}.lock` — outside the skill directory so they don't interfere with `remove_dir_all` on Windows. Uses `fs2::FileExt::lock_exclusive()` (flock on Unix, LockFileEx on Windows).\n\n**Lock-first, read-after-lock pattern**: Every mutation operation acquires the lock, then re-reads `skill.toml` from disk to get the current version. Without this, concurrent writers operating on stale snapshots would produce duplicate version numbers.\n\nAll file writes go through `atomic_write`: write to a temp file named `.tmp.{name}.{pid}.{tid}.{counter}.{nanos}`, then `fs::rename`. The monotonic `ATOMIC_WRITE_COUNTER` prevents temp-file collisions even when two threads in the same process target the same path.\n\n**Rollback snapshots** are saved to `.rollback/prompt_context_{timestamp}_{nanos}_{pid}.md` before every mutation. Snapshots are pruned to the last 10. The rollback operation itself saves a snapshot of the current content first, making rollback reversible.\n\n### Security Validation\n\n- `validate_name`: lowercase alphanumeric + `-_`, max 64 chars, must start with alphanumeric\n- `validate_prompt_content`: max 160,000 chars (~55k tokens), runs `SkillVerifier::scan_prompt_content` and blocks on critical warnings\n- `delete_skill`: refuses to delete non-Local/Non-Native skills; skills with no `source` field are rejected as unclassified\n- Supporting file paths are validated against traversal, must be under `references/`, `templates/`, `scripts/`, or `assets/`, max 1 MiB per file\n- Containment checks use `canonicalize` on both skill dir and target to catch symlink escapes\n\n### Disk-First Loading\n\n`load_installed_skill_from_disk` reads `skill.toml` + `prompt_context.md` directly from the filesystem, bypassing the in-memory registry. This is needed because the registry hot-reloads after an agent turn completes, but within a single turn an agent might create then immediately update a skill — the registry won't know about it yet.\n\nThe runtime calls this function from `tool_runner.rs` for every evolution tool invocation.\n\n## Registry (`registry.rs`)\n\n`SkillRegistry` manages all installed skills. Key operations:\n\n- `load_all` / `load_skill` / `reload_skill` — scan skill directories and parse manifests\n- `get` — look up an installed skill by name\n- `find_tool_provider` — find which skill provides a given tool name\n- `list` — enumerate all installed skills\n- `remove` — uninstall a skill\n- `skills_dir` — access the configured skills directory path\n- `freeze` / `is_frozen` — prevent further mutations (used in tests to verify guard behavior)\n\nThe registry supports **progressive prompt context loading**: if `manifest.prompt_context` is empty, it lazily reads `prompt_context.md` from disk on access, avoiding loading large prompt content for skills that aren't being used.\n\n## Loader (`loader.rs`)\n\nExecutes skill tools at runtime:\n\n- `execute_skill_tool` — dispatches to the appropriate runtime\n- `execute_python` — runs Python scripts via `find_python` (locates the interpreter)\n- `execute_shell` — runs shell scripts via `find_shell`\n- Returns `SkillToolResult` with JSON output and error status\n\n## Verification (`verify.rs`)\n\nSecurity scanning pipeline:\n\n- `SkillVerifier::scan_prompt_content` — detects prompt injection patterns in skill content\n- `SkillVerifier::security_scan` — inspects manifest for dangerous configurations\n- `SkillVerifier::sha256_hex` — content hashing for version tracking\n- `build_threat_patterns` — builds the pattern database used by the scanner\n- `WarningSeverity::Critical` — blocks installation; lower severities produce warnings\n\nThe `cmd_doctor` CLI command also calls `scan_prompt_content` to audit installed skills.\n\n## Publish (`publish.rs`)\n\nSkill packaging and publishing workflow:\n\n- `validate_manifest` — pre-publish validation\n- `load_manifest_from_dir` — read manifest for publishing\n- `package_prepared_skill` — bundle a skill for distribution\n\n## Config Discovery\n\nSkills can declare config variables in their `[config]` table. The evolution module provides:\n\n- `extract_skill_config_vars` — get config vars for a single skill\n- `discover_all_config_vars` — flat list across all skills (first declaration wins)\n- `discover_config` — returns `ConfigDiscovery` with both deduplicated vars and explicit `SkillConfigConflict` entries for keys claimed by multiple skills\n\n## Integration Points\n\nThe runtime (`librefang-runtime`) calls into this crate from `tool_runner.rs`:\n\n- `tool_skill_evolve_create` → `evolution::create_skill`\n- `tool_skill_evolve_update` → `evolution::update_skill`\n- `tool_skill_evolve_patch` → `evolution::patch_skill`\n- `tool_skill_evolve_rollback` → `evolution::rollback_skill`\n- `tool_skill_evolve_delete` → `evolution::delete_skill`\n- `tool_skill_evolve_write_file` → `evolution::write_supporting_file`\n- `tool_skill_evolve_remove_file` → `evolution::remove_supporting_file`\n- `tool_skill_read_file` → `evolution::record_skill_usage`\n- `execute_tool_raw` → `loader::execute_skill_tool` + `registry::find_tool_provider`\n\nThe CLI (`librefang-cli`) calls:\n\n- `cmd_doctor` → `registry::load_all`, `registry::list`, `verify::scan_prompt_content`\n- `cmd_skill_install` → `marketplace::install`\n\nThe API layer (`src/routes/skills.rs`) calls evolution functions and `acquire_skill_lock` for web-initiated mutations.","skills-extensions":"# Skills & Extensions\n\n# Skills & Extensions\n\nThe Skills & Extensions module group provides LibreFang's pluggable capability layer — everything from individual tool scripts to full autonomous agent packages, plus the credential and server infrastructure they depend on.\n\n## Sub-modules\n\n| Sub-module | Role |\n|---|---|\n| [librefang-skills](librefang-skills.md) | Pluggable tool bundles — discovery, security scanning, installation, marketplace download, format conversion (OpenClaw/SkillMD), agent-driven evolution, and execution |\n| [librefang-extensions](librefang-extensions.md) | Infrastructure services — MCP server catalog, AES-256-GCM credential vault, OAuth2 PKCE flows, health monitoring, and dotenv loading |\n| [librefang-hands](librefang-hands.md) | Curated autonomous capability packages — pre-built, domain-complete agent configurations parsed from `HAND.toml` and managed through a thread-safe registry |\n\n## How they fit together\n\n```mermaid\ngraph LR\n    HAND[\"librefang-hands<br/>Hand definitions & registry\"] -->|\"bundles skills, configures agents\"| SKILLS[\"librefang-skills<br/>Skill lifecycle & execution\"]\n    SKILLS -->|\"checks vault existence on load\"| EXT[\"librefang-extensions<br/>Credentials, MCP, OAuth\"]\n    SKILLS -->|\"stores webhook URLs\"| API[\"librefang-api\"]\n    EXT -->|\"supplies credentials to kernel\"| KERNEL[\"librefang-kernel\"]\n```\n\n**Hands** sit at the top — they compose one or more skills into a self-contained agent configuration that users activate from a marketplace and let run autonomously. A Hand definition references skills, which the registry resolves at activation time.\n\n**Skills** are the unit of executable capability. The skills crate handles the full lifecycle: discovering local skills, downloading from ClawHub or Skillhub marketplaces, converting OpenClaw/SkillMD formats, running security scans (prompt exfiltration, shell redirection bypasses), and managing agent-driven evolution (install, update, delete). On startup, `load_all` checks the extensions vault to gate features that require credentials.\n\n**Extensions** provide shared infrastructure. The `CredentialResolver` feeds secrets (from the encrypted vault, dotenv, config, or environment) to both the kernel's MCP OAuth provider and to skills that need external service access. The MCP catalog and health monitor support long-running Hands that depend on external tool servers.\n\n## Key cross-module workflows\n\n- **Skill installation with credentials** — A skill downloaded from a marketplace may declare a dependency on a vault secret. The registry (`load_all`) calls into the extensions vault to check availability before marking the skill as ready.\n- **Hand activation** — `HandRegistry::activate` resolves a `HandDefinition` into a `HandInstance`, which wires skill references and settings into the kernel for agent spawning.\n- **Agent-driven evolution** — An agent can invoke `evolve_delete_skill`, which acquires a skill lock, validates a webhook URL through the API layer (including private-IP checks), and finalizes removal.\n- **OAuth-protected MCP tools** — A Hand's agents call MCP servers whose tokens are obtained via extensions' OAuth PKCE flow, with secrets stored in the credential vault and refreshed under health-monitor backoff."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();

</script>
