h write: `agent`, optional `session`/`channel`/`turn`, and a timestamp `at`. Provenance is **monotonic** — the vault only ever appends, never removes entries.\n\n### `RenderMode`\n\nControls how cross-page references are rendered on disk:\n\n| Mode | Link syntax | Example |\n|------|------------|---------|\n| `Native` | `[topic](topic.md)` | `[widgets](widgets.md)` |\n| `Obsidian` | `[[topic]]` | `[[widgets]]` |\n\nThe canonical authoring form is always `[[topic]]` (the Obsidian form). Callers pass `[[topic]]` placeholders in the body, and `RenderMode::rewrite_links` rewrites them to the active flavor at flush time. This means a body authored once is portable across render modes without re-authoring.\n\n`RenderMode::extract_links` recognises both forms, so backlink indexing works against pages on disk regardless of which mode wrote them.\n\n### `WikiPage`\n\nA read result: `topic`, `frontmatter`, and `body` (the markdown after the closing `---`).\n\n### `WikiWriteOutcome`\n\nReturned by `write`: includes `topic`, `path`, `content_sha256`, and `merged_with_external_edit` (true when the caller forced an overwrite of a page that had drifted from the compiler state).\n\n### `SearchHit`\n\nA search result with `topic`, `snippet` (context window around the match), and `score`.\n\n### `BacklinkEntry`\n\nA directed edge: `source` page contains a link to `target` page.\n\n## Write Flow in Detail\n\n1. **Topic validation** (`validate_topic`): rejects empty strings, lengths over 100, `index`, `_`-prefixed names, and characters outside `[a-zA-Z0-9_-]`.\n2. **Body size check**: rejects bodies over 1 MiB after link rewriting (prevents runaway LLM output from filling disk page-by-page).\n3. **Acquire write lock**: serialises concurrent writes.\n4. **Read existing page** (`read_page_if_present`): if the file exists, parse its frontmatter and body. CRLF line endings are normalised to LF on read so the `---` delimiter matcher works regardless of platform.\n5. **Detect drift**: compare on-disk mtime (nanoseconds) and body SHA-256 against `compile-state.json`. If either differs, the page was hand-edited.\n6. **Enforce hand-edit policy**: if drifted and `force = false`, return `WikiError::HandEditConflict`. If drifted and `force = true`, preserve the external body verbatim — only append the new provenance entry.\n7. **Rewrite links**: `RenderMode::rewrite_links` converts `[[topic]]` placeholders to the active flavor.\n8. **Render page**: `frontmatter::render` serialises the frontmatter to YAML and concatenates the body.\n9. **Atomic write** (`atomic_write`): write to a `.tmp.write` file, then `fs::rename` to the final path. Prevents partial writes on crash.\n10. **Update compile state**: record the new mtime and SHA-256.\n11. **Rebuild index and backlinks**: regenerate `index.md` (alphabetical topic list with links and timestamps) and `_meta/backlinks.json` (target → sorted source list).\n\n## Hand-Edit Safety\n\nThis is a core design contract. The vault tracks two signals per page in `compile-state.json`:\n\n- **mtime** (nanoseconds since UNIX epoch): catches any file touch.\n- **sha256** of the body: catches content changes even on filesystems with coarse mtime precision (e.g. HFS+ with 1-second resolution).\n\nIf both match the last compiler output, the write proceeds normally. If either drifts, the vault knows a human (or external tool) edited the page and refuses the write unless the caller explicitly passes `force = true`.\n\nThe forced path is **preservative**: the externally-edited body is kept intact, and only the provenance list is augmented. The next successful compile re-normalises the compile state.\n\n## Search\n\nv1 uses naive case-insensitive substring search. Scoring:\n\n- **Topic match**: +10.0 (an exact substring in the topic name is a strong signal).\n- **Body matches**: `ln(1 + count)` — sub-linear weighting so a single long page can't bury short topic-only matches.\n\nResults are sorted by score descending, then topic ascending for deterministic ordering. A snippet (up to ~120 characters centred on the first match) is included with each hit.\n\nVector search and FTS5 integration are planned follow-ups.\n\n## Error Handling\n\n`WikiError` covers every failure mode:\n\n| Variant | When |\n|---------|------|\n| `Disabled` | `enabled = true` not set in config |\n| `ModeNotImplemented` | `bridge` or `unsafe_local` mode requested (v1 stubs) |\n| `InvalidTopic` | Topic fails validation |\n| `BodyTooLarge` | Body exceeds 1 MiB |\n| `NotFound` | No `.md` file for the topic |\n| `HandEditConflict` | External edit detected, `force = false` |\n| `Frontmatter` | YAML parse error in a page header |\n| `Io` | Filesystem error at a given path |\n\nThe `Io` variant wraps `std::io::Error` with the path that failed, making diagnostics actionable. `Frontmatter` wraps `serde_yaml::Error` with the topic name.\n\n## Frontmatter Parsing Details\n\nThe `frontmatter::split` function extracts the optional YAML block and body from raw page content. It tolerates:\n\n- **Missing frontmatter**: pages hand-authored without any `---` block return `(None, raw)` — the full content becomes the body.\n- **Trailing newline variance**: `Frontmatter::hash_body` strips the trailing newline before hashing, so an editor adding or removing a final newline doesn't flip the hash.\n- **CRLF line endings**: `read_page_if_present` normalises `\\r\\n` to `\\n` before calling `split`. Without this, a `\\r\\n` in the opening `---\\r\\n` would cause the LF-only delimiter matcher to treat the entire YAML header as body content.\n- **Malformed YAML**: if `serde_yaml` fails to parse the frontmatter block, the vault falls back to `Frontmatter::default_for(topic)` rather than failing the read — the body remains accessible, and a subsequent `wiki_write` repairs the header.\n\nThe `render` → `split` round-trip is guaranteed: `split(render(fm, body))` yields the same `body` (modulo trailing newline normalisation).\n\n## CRLF and Cross-Platform Compatibility\n\nThe vault's own `frontmatter::render` always emits `\\n` line endings. However, external editors on Windows (or git checkouts with `core.autocrlf = true`) may re-save files with `\\r\\n`. The read path normalises these on the fly, so:\n\n- Frontmatter parsing works regardless of line ending style.\n- Body content is returned with `\\n` endings.\n- Subsequent writes re-emit `\\n` endings.\n\n## Concurrency\n\n`WikiVault` uses an internal `Mutex<()>` to serialise writes. Concurrent `write` calls to the same topic from different threads will proceed one at a time. Each serialised write updates the compile state, so the later write sees the earlier one's state and can detect drift correctly.\n\nReads (`get`, `search`, `backlinks`) are not locked — they read from the filesystem directly, which is safe because `atomic_write` uses `fs::rename` (atomic on POSIX) and the content is immutable once renamed.\n\n## Integration Points\n\nThe crate re-exports configuration types from `librefang-types`:\n\n- `MemoryWikiConfig` — the `[memory_wiki]` section of the kernel config.\n- `MemoryWikiMode` — `Isolated`, `Bridge`, `UnsafeLocal`.\n- `MemoryWikiRenderMode` — `Native`, `Obsidian`.\n- `MemoryWikiIngestFilter` — `Tagged`, `All`.\n\nThe vault is consumed by the runtime through three builtin tools (`wiki_get`, `wiki_search`, `wiki_write`) which map directly to `WikiVault::get`, `WikiVault::search`, and `WikiVault::write`.\n\n## v1 Scope Boundaries\n\n**In scope:**\n- `isolated` mode with its own vault directory.\n- Explicit write-through via `wiki_write` tool calls.\n- `native` and `obsidian` render modes.\n- Hand-edit detection and preservative merging.\n\n**Out of scope (tracked as #3329 follow-ups):**\n- `bridge` mode — reading shared artifacts from the memory substrate.\n- `unsafe_local` mode — same-machine escape hatch for an existing Obsidian vault.\n- Memory-event subscription — v1 ingests only via explicit `wiki_write` calls, not via `memory_store` hooks.\n- LLM-assisted topic extraction — topics must be provided explicitly.\n- `memory_search` cross-corpus parameter — extending the runtime tool is a separate change.","memory-system":"# Memory System\n\n# Memory System\n\nThe Memory System provides LibreFang agents with persistent, queryable storage through two complementary sub-modules: a programmatic storage substrate for structured data and semantic search, and a file-backed markdown wiki for navigable, long-form knowledge.\n\n## Sub-Modules\n\n| Sub-Module | Role |\n|---|---|\n| [Memory Substrate (`librefang-memory`)](librefang-memory-src.md) | Unified API over structured key-value, semantic vector search, knowledge graph, sessions, tasks, and usage quotas — all backed by SQLite via a shared `r2d2` connection pool |\n| [Memory Wiki (`librefang-memory-wiki`)](librefang-memory-wiki-src.md) | Opt-in, file-backed markdown vault with provenance frontmatter, editable in Obsidian or any Markdown editor |\n\n## How They Fit Together\n\n```mermaid\ngraph LR\n    Agents --> Substrate[\"Memory Substrate<br/>(SQLite-backed)\"]\n    Agents --> Wiki[\"Memory Wiki<br/>(Markdown files)\"]\n    API[\"HTTP API\"] --> Substrate\n    Kernel --> Substrate\n\n    Substrate --> KV[\"StructuredStore (KV)\"]\n    Substrate --> VEC[\"SqliteVectorStore\"]\n    Substrate --> KG[\"KnowledgeStore\"]\n    Substrate --> SES[\"Session Store\"]\n    Substrate --> TASK[\"Task Queue\"]\n\n    Wiki --> Pages[\"Markdown pages<br/>w/ provenance frontmatter\"]\n```\n\nThe **Memory Substrate** is the primary storage layer — always active, handling every recall, session log, task claim, and usage quota check. Agents, the kernel cron system, and HTTP routes all interact through a single `MemorySubstrate` rather than individual stores.\n\nThe **Memory Wiki** sits alongside it as an opt-in knowledge vault. Where the substrate excels at vector similarity search over snippets, the wiki provides durable, human-navigable pages. Both track provenance — the substrate via session and agent metadata in SQLite, the wiki via structured YAML frontmatter recording which agent, session, and turn produced each page.\n\n## Key Cross-Module Workflows\n\n**Recall and document.** An agent queries `MemorySubstrate::recall` for vector-similar context from past sessions, then writes a synthesized finding to the wiki vault — producing a page that both humans and other agents can browse.\n\n**Session-audited edits.** Wiki pages carry provenance frontmatter generated from the same session context the substrate uses to track `CanonicalEntry` records. This means every claim in the wiki traces back to a specific agent turn that is also recorded in the session store.\n\n**Configuration-gated activation.** The wiki is disabled by default and enabled via `config.toml`. The substrate is always available. Operators who need long-form institutional knowledge turn on the wiki; those who only need programmatic recall rely on the substrate alone.","messaging-channels":"# Messaging Channels\n\n# Messaging Channels (`librefang-channels`)\n\nThe channel bridge connects external chat platforms to the LibreFang kernel. Each platform (Telegram, Discord, Slack, Bluesky, Feishu, etc.) is represented by a `ChannelAdapter` that normalizes inbound messages into a common `ChannelMessage` type and delivers outbound responses through the platform's API.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"External Platforms\"\n        TG[Telegram]\n        DC[Discord]\n        BS[Bluesky]\n        FS[Feishu]\n        EM[Email]\n        OTH[Slack / WhatsApp / Signal / ...]\n    end\n\n    subgraph \"librefang-channels\"\n        CA[ChannelAdapter trait] --> BM[BridgeManager]\n        BM --> MD[MessageDebouncer]\n        BM --> RL[RateLimiter]\n        BM --> SA[InputSanitizer]\n        BM --> AR[AgentRouter]\n        BM --> AE[AttachmentEnrichment]\n        BM --> MJ[MessageJournal]\n    end\n\n    subgraph \"Kernel\"\n        CBH[ChannelBridgeHandle]\n    end\n\n    TG --> CA\n    DC --> CA\n    BS --> CA\n    FS --> CA\n    EM --> CA\n    OTH --> CA\n    BM --> CBH\n```\n\n---\n\n## Core Abstractions\n\n### `ChannelAdapter` trait\n\nDefined in `types.rs`. Every platform implements this trait:\n\n| Method | Purpose |\n|---|---|\n| `name()` | Static adapter identifier (e.g. `\"telegram\"`) |\n| `channel_type()` | Enum variant for routing |\n| `start()` | Returns a `Stream<Item = ChannelMessage>` of inbound messages |\n| `send()` | Delivers a `ChannelContent` to a `ChannelUser` |\n| `send_typing()` | Best-effort typing indicator |\n| `stop()` | Graceful shutdown |\n| `typing_events()` | Optional typing indicator stream (for debouncing) |\n| `create_webhook_routes()` | Optional axum routes for webhook-based adapters |\n\n### `ChannelMessage`\n\nThe normalized message that flows from adapter through dispatch:\n\n- `channel` — `ChannelType` enum (Telegram, Discord, Custom, etc.)\n- `sender` — `ChannelUser { platform_id, display_name, librefang_user }`\n- `content` — `ChannelContent` (see below)\n- `metadata` — `HashMap<String, serde_json::Value>` for platform-specific data (URIs, reply refs, account IDs)\n- `is_group` — Whether the message came from a group chat\n- `thread_id` — Platform-specific thread/topic identifier\n\n### `ChannelContent` enum\n\nCovers all inbound content types the bridge can handle:\n\n- **Text** — Plain text messages\n- **Command { name, args }** — Slash commands (e.g. `/agent admin`)\n- **Image / File / FileData / Voice / Video / Audio / Animation / Sticker** — Media with URLs or inline data\n- **Location** — `{ lat, lon }`\n- **Interactive / ButtonCallback / EditInteractive / DeleteMessage** — Rich UI interactions\n- **MediaGroup / Poll / PollAnswer** — Composite content types\n\nThe `content_to_text()` helper in `bridge.rs` normalizes any variant into a plain-text representation for logging and fallback dispatch.\n\n---\n\n## Bridge and Dispatch Flow\n\n`BridgeManager` is the central coordinator. It owns all running adapters and dispatches inbound messages to agents.\n\n### Startup\n\n```\nBridgeManager::start_adapter(adapter)\n  ├── Download-dir cleanup (once, sweeps files >24h)\n  ├── Check for webhook routes → mount on shared server, OR\n  │   fall back to adapter.start() polling/stream\n  ├── Read channel_overrides for debounce config\n  └── Spawn dispatch loop (debounced or direct)\n```\n\n### Direct dispatch (debounce disabled)\n\nWhen `channel_overrides.message_debounce_ms` is 0 (default), each inbound message spawns a concurrent task:\n\n```\nChannelMessage arrives\n  → semaphore.acquire() (max 32 concurrent)\n  → dispatch_message()\n    → download media attachments (if any)\n    → input sanitization check\n    → resolve agent via AgentRouter\n    → apply group message policy\n    → handle slash commands OR send to kernel\n    → format and deliver response via adapter.send()\n```\n\n### Debounced dispatch\n\nWhen debouncing is configured, messages from the same sender are buffered and merged:\n\n```\nChannelMessage arrives\n  → MessageDebouncer::push(sender_key, message)\n  → wait for: debounce timer, max timer, typing stop, or buffer full\n  → flush_debounced() → drain() merges buffered messages\n  → merged message enters dispatch pipeline\n```\n\nMerging rules:\n- **Multiple commands with the same name** → merge args into one command\n- **Same content type** → join text with newlines\n- **Mixed types** → convert all to text, join with newlines\n\nThe debounce flush channel is bounded to 1024 entries to prevent OOM when the dispatcher stalls.\n\n---\n\n## Agent Routing\n\n`AgentRouter` (in `router.rs`) resolves inbound messages to an `AgentId`:\n\n1. **Direct route** — `set_direct_route(user, agent)` for DM conversations\n2. **Binding** — `load_bindings()` maps `(channel, chat_id) → agent`\n3. **Context-aware** — `resolve_with_context()` considers channel metadata\n4. **Default** — `set_default(agent)` as catch-all\n\nSlash commands like `/agent <name>` explicitly switch the routing.\n\n---\n\n## Group Message Processing\n\nGroup messages go through several gates before dispatch:\n\n### Group policy (`ChannelOverrides.group_policy`)\n\n| Policy | Behavior |\n|---|---|\n| `Ignore` | Drop all group messages |\n| `CommandsOnly` | Process only slash commands |\n| `MentionOnly` | Process only mentions + commands |\n| `All` (default) | Process everything |\n\n### Trigger matching (`MentionOnly` mode)\n\nA message is processed when any of:\n- `was_mentioned` metadata is `true` (platform-level @mention)\n- Text matches a `group_trigger_patterns` regex (cached via `RegexSet`)\n- Agent name appears as a positional vocative trigger (Phase 2 §C)\n- Text starts with `/` (command)\n\n### Addressee guard (opt-in via `LIBREFANG_GROUP_ADDRESSEE_GUARD=on`)\n\nPrevents false-positive triggers when the agent's name appears in a sentence addressed to someone else:\n\n- `is_addressed_to_other_participant()` detects leading vocatives like `\"Caterina, chiedi al Signore...\"`\n- `is_vocative_trigger()` checks that the pattern appears at turn-start or after punctuation boundaries, not mid-sentence addressed to another participant\n\n---\n\n## Attachment Enrichment\n\n`attachment_enrich.rs` extracts content from downloaded files so the LLM sees inline text instead of just a file path. This runs after the bridge streams a download to disk.\n\n### Entry point\n\n```rust\npub fn enrich_saved_file(saved_path: &Path, media_type: &str, filename: &str) -> Vec<ContentBlock>\n```\n\n### Content-type handling\n\n| Input | Output |\n|---|---|\n| `application/pdf` | `[Attached PDF: name (N bytes)]\\n\\n<extracted text>` |\n| PDF with ambiguous MIME (`octet-stream`, empty) | Detected via `.pdf` extension or `%PDF-` magic bytes |\n| `text/*`, code extensions (`.rs`, `.py`, `.json`, etc.) | `[Attached file: name (N bytes[, truncated])]\\n\\n<text>` |\n| Images, audio, video, unknown binary | Empty vec — caller emits path block only |\n\n### Key constraints\n\n- **Hard cap**: `MAX_ENRICHED_TEXT_CHARS = 200,000` — mirrors the kernel's PDF text and API attachment limits\n- **Additive**: enrichment blocks are inserted *before* the existing `[File: ...] saved to /path` block so file-reader tools still work\n- **Panic-safe**: PDF extraction is wrapped in `catch_unwind` to isolate malformed-document panics\n- **Audio/voice excluded**: these go through `media_transcribe` out of band\n\n### PDF detection fallback\n\nMany platforms (especially Telegram) upload PDFs as `application/octet-stream`. Detection order:\n1. Explicit `application/pdf` MIME → enrich immediately\n2. Ambiguous MIME + `.pdf` extension → enrich\n3. Ambiguous MIME + `%PDF-` magic bytes → enrich\n4. Authoritative MIME (e.g. `image/png`) is never overridden by filename\n\n---\n\n## Channel Adapters\n\n### Bluesky (`bluesky.rs`)\n\nUses the AT Protocol XRPC API:\n- **Auth**: `com.atproto.server.createSession` with identifier + app password, auto-refresh via `refreshSession`\n- **Inbound**: Polls `app.bsky.notification.listNotifications` every 5 seconds, processes `mention` and `reply` reasons\n- **Outbound**: `com.atproto.repo.createRecord` with `app.bsky.feed.post` record type\n- **Session management**: Tokens cached in `RwLock`, refreshed 5 minutes before expiry\n- **App password**: Zeroized on drop via `Zeroizing<String>`\n- **Multi-bot**: Optional `account_id` for routing to different agent instances\n\n### Other adapters (referenced in call graph)\n\n| Adapter | Transport | Notes |\n|---|---|---|\n| Telegram | Webhook + long-poll | Forum topics, inline keyboards |\n| Discord | WebSocket gateway | Slash commands, reactions |\n| Feishu | Webhook (encrypted) | Card actions for approvals |\n| Email | IMAP + SMTP | UID-based seen tracking |\n| DingTalk | Stream + callback | Session webhook pattern |\n| Flock | Webhook | Chat message API |\n| Discourse | REST API | Topic reply posting |\n| Revolt | WebSocket | Configurable URLs |\n| Slack / WhatsApp / Signal / Matrix / Teams / Mattermost / WeChat / WebChat / CLI | Various | See individual adapter files |\n\n---\n\n## Security\n\n### Input sanitization\n\n`InputSanitizer` (in `sanitizer.rs`) checks inbound messages for prompt injection patterns:\n\n- **Clean** — pass through\n- **Warned** — log but allow (suspicious but not definitive)\n- **Blocked** — reject with generic error message to the user\n\nConfigured via `SanitizeConfig`. Applied to text, command args, and media captions before dispatch.\n\n### Rate limiting\n\n`ChannelRateLimiter` applies per-user and per-channel rate limits to prevent abuse.\n\n### Command access control\n\n`ChannelOverrides` fields:\n- `disable_commands` — block all slash commands\n- `allowed_commands` — whitelist (if non-empty, only listed commands work)\n- `blocked_commands` — blacklist\n- Command names are normalized (both `\"agent\"` and `\"/agent\"` match)\n\n---\n\n## Message Journaling\n\nOptional crash recovery via `MessageJournal`:\n\n1. Messages are journalled before dispatch\n2. On restart, `recover_pending()` returns in-flight messages for re-processing\n3. `compact()` flushes completed entries on shutdown\n\n---\n\n## Output Formatting\n\n`formatter.rs` (`format_for_channel`) adapts LLM responses for each platform's markup:\n\n- Telegram → HTML\n- Discord → Markdown with mention syntax\n- Slack → mrkdwn\n- Others → plain text passthrough\n\nThe output format is selected by `ChannelOverrides.output_format` with per-channel defaults from `default_output_format_for_channel()`.\n\n---\n\n## Reply Envelope\n\n`ReplyEnvelope` structures outbound responses:\n\n```rust\npub struct ReplyEnvelope {\n    pub public: Option<String>,       // Message for the source chat\n    pub owner_notice: Option<String>, // Private message for operator DM\n}\n```\n\nAdapters that don't support owner-side delivery ignore `owner_notice` and forward only `public`. The `silent()` variant carries neither (used for suppressed turns).\n\n---\n\n## Configuration (`ChannelOverrides`)\n\nPer-channel overrides that can be set at the channel level or per-agent (agent-level takes priority):\n\n| Field | Purpose |\n|---|---|\n| `group_policy` | How group messages are filtered |\n| `output_format` | Response markup format |\n| `threading` | Enable thread/topic replies |\n| `message_debounce_ms` | Debounce window for merging rapid messages |\n| `message_debounce_max_ms` | Hard cap on debounce window |\n| `message_debounce_max_buffer` | Max messages per sender before forced flush |\n| `group_trigger_patterns` | Regex patterns for mention-less group triggers |\n| `disable_commands` / `allowed_commands` / `blocked_commands` | Command access control |\n| `prefix_style` | Agent name prefix on responses |\n| `dm_policy` | DM handling policy |\n\n---\n\n## Adding a New Channel Adapter\n\n1. Create `src/<platform>.rs` implementing `ChannelAdapter`\n2. Parse platform-specific events into `ChannelMessage` with appropriate `ChannelContent`\n3. For webhook platforms, implement `create_webhook_routes()` returning axum routes\n4. For polling platforms, implement `start()` returning a `Stream`\n5. Register the adapter in `BridgeManager::start_adapter()`\n6. Add the `ChannelType` variant to the enum in `types.rs`\n7. Update `channel_type_str()` in `bridge.rs`\n8. Add format handling in `formatter.rs` if the platform uses non-standard markup","migration-tools":"# Migration Tools\n\n# Migration Tools (`librefang-migrate`)\n\n## Overview\n\nThe migration engine imports agents, memory, sessions, skills, and channel configurations from other agent frameworks into LibreFang's native format. It currently supports **OpenClaw** (both modern JSON5 and legacy YAML layouts) and **OpenFang** (same-format community fork), with stubs for LangChain and AutoGPT.\n\nThe module is designed around three priorities:\n\n1. **Crash safety** — all writes go through an atomic staging directory; a partial failure never corrupts the target.\n2. **Idempotency** — a marker file prevents accidental re-imports that would overwrite manual edits.\n3. **Security** — agent IDs are validated for path traversal, secrets are written with restricted permissions, and schema versions are checked before processing.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[run_migration] --> B{MigrateSource}\n    B -->|OpenClaw| C[openclaw::migrate]\n    B -->|OpenFang| D[openfang::migrate]\n    B -->|LangChain / AutoGPT| E[UnsupportedSource error]\n    C --> F[staging dir]\n    F -->|success| G[promote_staging → target]\n    F -->|failure| H[staging left for inspection]\n    C --> I[migrate_from_json5]\n    C --> J[migrate_from_legacy_yaml]\n    I --> K[config]\n    I --> L[agents]\n    I --> M[memory]\n    I --> N[channels]\n    I --> O[sessions]\n```\n\n## Public API\n\n### `run_migration`\n\n```rust\npub fn run_migration(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>\n```\n\nTop-level entry point. Dispatches to `openclaw::migrate` or `openfang::migrate` based on `options.source`. Returns a `MigrationReport` listing every imported item, skipped item, and warning.\n\n### `MigrateOptions`\n\n| Field | Type | Purpose |\n|---|---|---|\n| `source` | `MigrateSource` | Framework to import from |\n| `source_dir` | `PathBuf` | Path to the source workspace |\n| `target_dir` | `PathBuf` | Path to the LibreFang home directory |\n| `dry_run` | `bool` | Report what would happen without writing to disk |\n\n### `MigrateSource`\n\n```rust\npub enum MigrateSource {\n    OpenClaw,   // fully supported\n    OpenFang,   // fully supported\n    LangChain,  // returns UnsupportedSource error\n    AutoGpt,    // returns UnsupportedSource error\n}\n```\n\n### `MigrateError`\n\nAll errors use `thiserror` for ergonomic formatting. Key variants:\n\n| Variant | When |\n|---|---|\n| `SourceNotFound(PathBuf)` | Source directory doesn't exist |\n| `ConfigParse(String)` | Config file can't be parsed |\n| `AgentParse(String)` | Agent definition is malformed |\n| `UnsupportedVersion(u32)` | `openclaw.json` declares schema version other than 1 or 2 (#3797) |\n| `InvalidId(String)` | Agent ID contains `..`, absolute path, or NUL bytes (#3794) |\n| `StagingExists(PathBuf)` | Stale staging directory from a previous failed run (#3798) |\n| `Io`, `Yaml`, `TomlSerialize`, `Json5Parse` | Wrapped I/O and serialization errors |\n\n---\n\n## OpenClaw Migration (`openclaw` module)\n\n### Supported Workspace Layouts\n\n**Modern (JSON5):**\n\n```\n~/.openclaw/\n├── openclaw.json          # JSON5 — single config (agents, channels, models, tools, etc.)\n├── auth-profiles.json\n├── sessions/*.jsonl\n├── memory/<agent>/MEMORY.md\n├── skills/\n└── workspaces/<agent>/\n```\n\nAlso recognizes legacy directory names: `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`.\n\n**Legacy (YAML):**\n\n```\n~/.openclaw/\n├── config.yaml\n├── agents/<agent>/agent.yaml\n├── messaging/<channel>.yaml\n├── skills/community/*, skills/custom/*\n```\n\n### Workspace Detection\n\n`detect_openclaw_home()` searches these locations in order:\n\n1. `OPENCLAW_STATE_DIR` environment variable\n2. `~/.openclaw`, `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`\n3. `~/openclaw`, `~/.config/openclaw`\n4. `%APPDATA%\\openclaw`, `%LOCALAPPDATA%\\openclaw` (Windows)\n\nReturns `None` if no directory contains a recognizable config file or `sessions/`/`memory/` subdirectory.\n\n### Workspace Scanning\n\n`scan_openclaw_workspace(path)` returns a `ScanResult` describing what's available:\n\n```rust\npub struct ScanResult {\n    pub path: String,\n    pub has_config: bool,\n    pub agents: Vec<ScannedAgent>,\n    pub channels: Vec<String>,\n    pub skills: Vec<String>,\n    pub has_memory: bool,\n}\n```\n\nUsed by the CLI init wizard and `config.rs` routes to preview migrations before committing.\n\n### Migration Flow\n\n1. **Schema validation** — `openclaw.json` must declare version 1 or 2. Unknown versions produce `UnsupportedVersion`. Missing version is allowed with a warning.\n2. **Config migration** — Global settings are converted to LibreFang's `config.toml`. The default model is extracted from `agents.defaults.model` and split into `(provider, model)` via `split_model_ref`.\n3. **Agent migration** — Each agent entry is validated (#3794), converted to a TOML manifest under `agents/<id>/agent.toml`. Tool names are mapped via `librefang_types::tool_compat::map_tool_name`. Unrecognized tools produce warnings but don't fail the migration.\n4. **Channel migration** — 13 channel types are handled (Telegram, Discord, Slack, WhatsApp, Signal, Matrix, Google Chat, Teams, IRC, Mattermost, Feishu, iMessage, BlueBubbles). Secrets are extracted into `secrets.env` with `0o600` permissions on Unix. DM and group policies are mapped to LibreFang equivalents.\n5. **Memory migration** — `memory/<agent>/MEMORY.md` files are copied to `agents/<agent>/imported_memory.md`.\n6. **Workspace migration** — `workspaces/<agent>/` directories are recursively copied.\n7. **Session migration** — `.jsonl` session files are copied to `imported_sessions/`.\n8. **Skipped features** — Cron jobs, hooks, auth profiles, skill entries, vector indexes, and memory backend config are reported as skipped items with explanatory reasons.\n\n### Atomic Staging (#3798)\n\nAll file writes go to a sibling staging directory (e.g., `~/.librefang.migrate-staging/`). Only after every migration step succeeds does `promote_staging()` move files into the real target. Key properties:\n\n- **No overwrites** — existing files in the target are never clobbered (#3795). Staged copies that would overwrite are dropped and reported as warnings.\n- **Per-entry atomicity** — each file is renamed into place (same-filesystem) or copied through a `.migrate-tmp` file then renamed.\n- **Failure recovery** — if promotion fails partway, the staging directory remains for manual inspection.\n\n### Idempotency\n\nAfter a successful migration, a marker file `.openclaw_migrated` is written to the target. Subsequent `migrate()` calls detect this marker and return early with a warning rather than re-importing. Delete the marker to force a re-run.\n\n### File Safety Helpers\n\n| Function | Purpose |\n|---|---|\n| `atomic_write(path, content)` | Writes to a `.tmp` sibling then renames — prevents torn writes |\n| `backup_existing(path)` | Renames to `.bak.<timestamp>` before overwriting |\n| `write_with_backup(dest, content, report)` | Combines backup + atomic write; logs the backup path as a warning |\n| `validate_migration_id(id)` | Rejects empty strings, NUL bytes, `..`, absolute paths |\n\n### Channel Policy Mapping\n\nOpenClaw policies are translated to LibreFang equivalents:\n\n| OpenClaw DM Policy | LibreFang |\n|---|---|\n| `open` | `respond` |\n| `allowlist` / `allow_list` | `allowed_only` |\n| `pairing` / `disabled` | `ignore` |\n\n| OpenClaw Group Policy | LibreFang |\n|---|---|\n| `open` / `all` | `all` |\n| `mention` / `mention_only` | `mention_only` |\n| `commands` / `slash_only` | `commands_only` |\n| `disabled` / `ignore` | `ignore` |\n\n### Provider Mapping\n\n`map_provider()` normalizes provider names:\n\n| OpenClaw | LibreFang |\n|---|---|\n| `anthropic`, `claude` | `anthropic` |\n| `openai`, `gpt` | `openai` |\n| `google`, `gemini` | `google` |\n| `xai`, `grok` | `xai` |\n\nUnrecognized provider names pass through unchanged.\n\n### Secrets Handling\n\n`write_secret_env()` manages a `secrets.env` file with `KEY=value` lines:\n\n- Existing keys are updated in place; new keys are appended.\n- Keys and values containing newlines are rejected.\n- On Unix, file permissions are set to `0o600`.\n\n### Agent Tool Resolution\n\nTools are resolved in this order per agent:\n\n1. `tools.allow` list → each name checked via `is_known_librefang_tool` or mapped via `map_tool_name`\n2. `tools.also_allow` list → appended to the above\n3. `tools.profile` → expanded via `ToolProfile::tools()` (e.g., `\"coding\"` → `ToolProfile::Coding.tools()`)\n4. Agent defaults from `agents.defaults.tools`\n5. Fallback: `[\"file_read\", \"file_list\", \"web_fetch\"]`\n\n`tools.deny` lists are preserved as `tool_blocklist` in the agent manifest. Agent `skills` lists are preserved as the `skills` field. Custom `workspace` paths are preserved.\n\nCapabilities (`shell`, `network`, `agent_message`, `agent_spawn`) are derived from the resolved tool list via `derive_capabilities()`.\n\n### Identity / System Prompt Extraction\n\nOpenClaw's `identity` field can be a raw string or an arbitrarily-nested JSON object. `extract_identity_prompt()` recursively searches for prompt content in these keys (in order): `systemPrompt`, `system_prompt`, `prompt`, `instructions`, `instruction`, `content`, `text`, `value`, `persona`, `identity`, `description`. Falls back to nested objects and arrays. If nothing is found, a default prompt is generated using the agent's display name.\n\n---\n\n## OpenFang Migration (`openfang` module)\n\nHandles migration from OpenFang, which uses the same TOML + `.env` format as LibreFang. The module:\n\n- Copies config and agent files to the target\n- Rewrites environment variable references via `rewrite_env_content()`\n- Detects schema drift between source and current LibreFang schema via `warn_on_schema_drift()`, which delegates to `librefang_types::config::validation::detect_unknown_fields`\n\n---\n\n## Reporting (`report` module)\n\n`MigrationReport` captures the full outcome of a migration:\n\n```rust\npub struct MigrationReport {\n    pub source: String,\n    pub dry_run: bool,\n    pub imported: Vec<MigrateItem>,\n    pub skipped: Vec<SkippedItem>,\n    pub warnings: Vec<String>,\n}\n```\n\n- `MigrateItem` — each successfully migrated resource with its `ItemKind` (Config, Agent, Channel, Memory, Secret, Session, Skill), name, and destination path.\n- `SkippedItem` — resources that couldn't be migrated, with a human-readable reason.\n- `warnings` — non-fatal issues (unmapped tools, backed-up files, channels with unmappable allowlists).\n\n`MigrationReport::to_markdown()` generates a readable summary written to `migration_report.md` in the target.\n\n---\n\n## Integration Points\n\n| Consumer | Usage |\n|---|---|\n| `src/routes/config.rs` | `run_migration()` via `run_migrate()`, `scan_openclaw_workspace()` via `migrate_scan()`, `detect_openclaw_home()` via `migrate_detect()` |\n| `tui/screens/init_wizard.rs` | `detect_openclaw_home()` to check for existing installs, `scan_openclaw_workspace()` for preview, `run_migration()` via `handle_migration_key()` |\n| `librefang-types` | `tool_compat` for tool name mapping, `config::validation` for schema drift detection, `config::CONFIG_VERSION` and `agent::ToolProfile` |\n","other-librefang-acp-tests":"# Other — librefang-acp-tests\n\n# librefang-acp Integration Tests\n\n## Overview\n\n`acp_integration.rs` contains end-to-end integration tests for the ACP (Agent Client Protocol) adapter. Each test wires `librefang_acp::run_with_transport` to one end of a `tokio::io::duplex` pipe and drives the matching `agent_client_protocol::Client` on the other end against a stub `AcpKernel` implementation. This validates on-the-wire JSON-RPC behavior — request/response correctness, notification ordering, permission round-trips, and reverse-RPC paths — without booting a real LibreFang kernel or LLM provider.\n\nAll tests run on `tokio::test(flavor = \"current_thread\")` inside a `LocalSet` to support `spawn_local` for the server task.\n\n## Test Architecture\n\n```mermaid\ngraph LR\n    subgraph Client Side\n        CB[Client.builder]\n        CX[ConnectionTo]\n    end\n    subgraph Server Side\n        RWT[run_with_transport]\n        MK[MockKernel]\n    end\n    subgraph Transport\n        DP[duplex_pair]\n    end\n\n    CB -->|client_reader/writer| DP\n    DP -->|server_reader/writer| RWT\n    RWT --> MK\n    MK -.->|FsClientHandle / TerminalClientHandle| CX\n```\n\nThe `duplex_pair()` function creates two cross-wired `tokio::io::duplex` streams wrapped with `tokio_util::compat` to produce four futures-compatible I/O halves. The server reads from `a` and writes to `d`; the client reads from `c` and writes to `b`. This simulates a full bidirectional JSON-RPC connection in-process.\n\n## MockKernel\n\n`MockKernel` implements the `AcpKernel` trait with canned, controllable behavior:\n\n| Field | Purpose |\n|---|---|\n| `canned_events` | Pre-loaded `StreamEvent` sequence returned by `send_prompt` (consumed on first call via `std::mem::take`) |\n| `approval_tx` | Broadcast channel for injecting synthetic `ApprovalEvent::Created` messages via `fire_approval()` |\n| `resolves` | Records `(Uuid, ApprovalDecision)` pairs from `resolve_approval` calls for test assertions |\n| `last_session_id` | Captures the `LfSessionId` passed to `send_prompt` so tests can correlate ACP sessions with kernel sessions |\n| `fs_client` | Stores the `FsClientHandle` injected by `set_fs_client` (called at `initialize` time) for reverse-RPC testing |\n| `terminal_client` | Same pattern for `TerminalClientHandle` |\n| `canned_history` | Pre-loaded `(Role, String)` pairs returned by `fetch_session_history` for session-load replay tests |\n\nKey trait method behaviors:\n\n- **`resolve_agent`** — returns `AgentId(Uuid::nil())` unconditionally.\n- **`send_prompt`** — drains `canned_events` into an `mpsc::channel`, spawning a task that forwards each event. Records `last_session_id`.\n- **`subscribe_approvals`** — returns a new broadcast receiver from `approval_tx`.\n- **`resolve_approval`** — pushes `(request_id, decision)` into `resolves`.\n- **`fetch_session_history`** — returns a clone of `canned_history`.\n\n### fire_approval()\n\nInjects a synthetic `ApprovalEvent::Created` into the broadcast channel with a deterministic shape:\n\n```rust\nfn fire_approval(&self, lf_session_id: LfSessionId) -> Uuid\n```\n\nThe generated `ApprovalRequest` has `tool_name: \"bash\"`, `risk_level: Medium`, and `tool_use_id: Some(\"toolu_acp_integration_test\")` to exercise the primary path where the bridge uses the LLM-assigned ID as the `ToolCallId` rather than the `approval-{req_id}` fallback. Returns the `Uuid` of the created request for later assertion in `wait_for_resolve`.\n\n## Test Utilities\n\n### recv\\<T\\>()\n\n```rust\nasync fn recv<T: JsonRpcResponse + Send + 'static>(sent: SentRequest<T>) -> Result<T, Error>\n```\n\nBridges the ACP `SentRequest::on_receiving_result` callback-based API into a simple `await`-able future using a oneshot channel. Every request-response interaction in the tests goes through this.\n\n### poll_for()\n\n```rust\nasync fn poll_for<T, F: FnMut() -> Option<T>>(f: F) -> T\n```\n\nPolls a closure up to 40 times (25ms sleep between attempts ≈ 1s total) until it returns `Some`. Used to wait for handles that the server sets asynchronously during `initialize`.\n\n### wait_for_session_id()\n\nPolls `kernel.last_session_id` until the server has processed a `send_prompt` call and recorded the kernel-side session ID. Returns the `LfSessionId`.\n\n### wait_for_resolve()\n\nPolls `kernel.resolves` for a specific `Uuid`, returning the associated `ApprovalDecision`. Used in the permission round-trip test to confirm the bridge forwarded the client's decision back to the kernel.\n\n### duplex_pair()\n\nCreates four I/O halves suitable for `agent_client_protocol::ByteStreams`:\n\n```rust\nfn duplex_pair() -> (\n    impl AsyncRead,        // server_reader\n    impl AsyncWrite,       // server_writer\n    impl AsyncRead,        // client_reader\n    impl AsyncWrite,       // client_writer\n)\n```\n\nInternally creates two `tokio::io::duplex(8192)` pipes cross-wired so server↔client communication flows through in-memory buffers.\n\n## Integration Tests\n\n### initialize_and_prompt_emits_text_chunks_and_end_turn\n\n**What it verifies:** The basic prompt flow — initialize → new session → prompt — produces correctly ordered `AgentMessageChunk` notifications and a final `StopReason::EndTurn`.\n\nThe `MockKernel` is pre-loaded with two `TextDelta` events followed by a `ContentComplete`. The test:\n\n1. Connects the client with an `on_receive_notification` handler that captures `SessionNotification`s.\n2. Sends `InitializeRequest`, asserts `agent_info.name == \"librefang\"`.\n3. Sends `NewSessionRequest` with `/tmp/proj`.\n4. Sends `PromptRequest` with text \"hi\".\n5. Asserts `stop_reason == EndTurn` on the `PromptResponse`.\n6. After a 50ms flush delay, inspects captured notifications for the two text chunks `\"Hello\"` and `\" world\"`.\n\n### permission_round_trip_resolves_kernel_approval\n\n**What it verifies:** When the kernel broadcasts an `ApprovalEvent::Created`, the bridge dispatches a `session/request_permission` reverse-RPC to the client, and the client's response (e.g., `allow_once`) propagates back as a `resolve_approval` call on the kernel.\n\nTest flow:\n\n1. Connects the client with an `on_receive_request` handler for `RequestPermissionRequest` that always responds with `allow_once` and asserts 4 permission options.\n2. Sends initialize + new session + prompt (the prompt keeps the bridge pump alive).\n3. Waits for `last_session_id` to appear on the kernel.\n4. Calls `kernel.fire_approval(lf_id)` to inject a synthetic approval.\n5. Polls `wait_for_resolve` to confirm the kernel received `ApprovalDecision::Approved` with the matching `Uuid`.\n\n### unknown_session_id_returns_invalid_params\n\n**What it verifies:** Sending a `PromptRequest` with a nonexistent `SessionId` produces an error response from the server.\n\nMinimal test: initialize, then send a prompt with session ID `\"does-not-exist\"` and assert the result is `Err`.\n\n### fs_read_text_file_round_trip\n\n**What it verifies:** The reverse-RPC path for filesystem operations. The server-side `FsClientHandle` (captured at `initialize` time) issues a `fs/read_text_file` request to the connected client, which responds with canned content.\n\nTest flow:\n\n1. Client builder registers an `on_receive_request` handler for `ReadTextFileRequest` that asserts the path is `/tmp/hello.txt` and responds with `\"canned editor content\"`.\n2. Sends `InitializeRequest` with `client_capabilities.fs.read_text_file = true`.\n3. Polls `kernel.fs_client_handle()` to get the handle injected by the server at init time.\n4. Calls `handle.read_text_file(session_id, path, None, None)` — this issues a real JSON-RPC request through the transport.\n5. Asserts the returned content matches the canned response.\n\n### terminal_run_command_round_trip\n\n**What it verifies:** The full terminal lifecycle — create → wait_for_exit → output → release — works as a sequence of reverse-RPCs, and the `AcpTerminalClient::run_command` helper produces the correct `AcpTerminalRunResult`.\n\nClient builder registers four `on_receive_request` handlers:\n\n| Request | Response |\n|---|---|\n| `CreateTerminalRequest` | `TerminalId(\"term-1\")` |\n| `WaitForTerminalExitRequest` | `exit_code: Some(0)` |\n| `TerminalOutputRequest` | `\"hello world\\n\"`, not truncated |\n| `ReleaseTerminalRequest` | default |\n\nTest flow:\n\n1. Sends `InitializeRequest` with `client_capabilities.terminal = true`.\n2. Polls `kernel.terminal_client_handle()`.\n3. Calls `handle.run_command(\"echo\", [\"hello\"], [], None, None)` via the `AcpTerminalClient` trait.\n4. Asserts `output == \"hello world\\n\"`, `exit_code == Some(0)`, not truncated, no signal.\n\n### session_load_replays_history_to_client\n\n**What it verifies:** When a client reconnects via `LoadSessionRequest`, the kernel's stored message history is emitted as `SessionNotification` updates (issue #3313).\n\nTest flow:\n\n1. Pre-loads `canned_history` with two turns: `(User, \"previous question\")` and `(Assistant, \"previous answer\")`.\n2. Connects the client with a notification capture handler.\n3. Sends `LoadSessionRequest` with session ID `\"reconnecting-session\"`.\n4. Polls until at least 2 notifications arrive.\n5. Asserts the first is a `UserMessageChunk` with `\"previous question\"` and the second is an `AgentMessageChunk` with `\"previous answer\"`.\n\n## Relationship to the Codebase\n\nThis module depends on:\n\n- **`librefang_acp`** — the ACP adapter under test, specifically `run_with_transport`, `AcpKernel`, `FsClientHandle`, and `TerminalClientHandle`.\n- **`agent_client_protocol`** — the ACP protocol crate providing `Client`, `ByteStreams`, all request/response schema types, `ConnectionTo`, `SentRequest`, and `Responder`.\n- **`librefang_llm_driver`** — `StreamEvent` variants used as canned kernel output.\n- **`librefang_types`** — domain types (`AgentId`, `SessionId`, `ApprovalEvent`, `ApprovalRequest`, `RiskLevel`, `TokenUsage`, `StopReason`).\n- **`librefang_kernel_handle`** — the `AcpTerminalClient` trait, exercised by `terminal_run_command_round_trip` to test the same code path the runtime's `shell_exec` arm uses.\n\n## Adding New Tests\n\nFollow the established pattern:\n\n1. Create a `MockKernel::new(...)` with appropriate canned events.\n2. Call `duplex_pair()` and build `ByteStreams` for both sides.\n3. `spawn_local` the server: `librefang_acp::run_with_transport(kernel, agent_id, server_transport)`.\n4. Build a `Client.builder()` registering handlers for any notifications or reverse-RPC requests your test needs.\n5. Call `client.connect_with(client_transport, async |cx| { ... })` and use `recv(cx.send_request(...))` for each request.\n6. Assert on responses, captured notifications, or kernel-side state (`resolves`, `last_session_id`, etc.).","other-librefang-acp":"# Other — librefang-acp\n\n# librefang-acp\n\nAgent Client Protocol (ACP) adapter for LibreFang. This crate bridges LibreFang's internal agent/LLM stack and the **Agent Client Protocol**, enabling LibreFang agents to be embedded in editors like Zed, VS Code, and JetBrains over a stdio JSON-RPC transport.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph External\n        Zed[\"Zed / VS Code / JetBrains\"]\n    end\n\n    subgraph \"librefang-acp\"\n        ACP[\"ACP Protocol Layer<br/>(agent-client-protocol)\"]\n        ADAPTER[\"KernelAdapter\"]\n        TRAIT[\"AcpKernel (trait)\"]\n    end\n\n    subgraph \"LibreFang Core\"\n        KERNEL[\"librefang-kernel<br/>(LibreFangKernel)\"]\n        DRIVER[\"librefang-llm-driver\"]\n        HANDLE[\"librefang-kernel-handle\"]\n    end\n\n    Zed -->|stdio JSON-RPC| ACP\n    ACP --> ADAPTER\n    ADAPTER -->|impl| TRAIT\n    ADAPTER -->|\"Arc<LibreFangKernel>\"| KERNEL\n    KERNEL --> DRIVER\n    KERNEL --> HANDLE\n```\n\n## Purpose\n\nEditor integrations don't talk LibreFang's internal APIs — they speak the Agent Client Protocol, a JSON-RPC protocol transported over stdio. This crate owns the translation layer between those two worlds:\n\n- **Inbound**: ACP requests (session creation, message turns, approval responses) arrive over stdio and are dispatched to the appropriate kernel operations.\n- **Outbound**: Kernel events (streaming LLM tokens, approval requests, tool calls) are translated back into ACP notifications and written to stdout.\n\nBy keeping this translation isolated in its own crate, `librefang-cli` and `librefang-api` can both host an ACP server — one in-process, one daemon-attached — without duplicating the binding logic.\n\n## Key Abstractions\n\n### `AcpKernel` trait\n\nThe core integration point. `AcpKernel` defines the operations the ACP protocol layer needs from a kernel backend — things like initiating a session, sending a user message, responding to an approval prompt, and tearing down a session. Any type implementing this trait can serve as the backend for the ACP server.\n\nThe trait is defined in this crate (it is *not* re-exported from `agent-client-protocol`), which means alternative kernel implementations can implement `AcpKernel` directly without pulling in the full `librefang-kernel` dependency tree.\n\n### `KernelAdapter`\n\nA struct gated behind the `kernel-adapter` feature. It wraps an `Arc<LibreFangKernel>` and implements `AcpKernel` by delegating to the real kernel. This is the production adapter used by `librefang-cli` and `librefang-api`.\n\n## Feature Flags\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `kernel-adapter` | off | Pulls in `librefang-kernel` and provides `KernelAdapter`. Enables production use by CLI and API crates. |\n\nWhen the feature is off, the crate still compiles — it exports the protocol types, the `AcpKernel` trait, and the stdio transport machinery. This is useful for integration tests and any consumer that wants to provide a mock or alternative kernel.\n\n## Dependencies\n\n**Internal (always linked):**\n\n- `librefang-types` — shared type definitions (session IDs, message types, etc.)\n- `librefang-llm-driver` — LLM provider abstractions, needed for translating between ACP message formats and internal LLM request/response types\n- `librefang-kernel-handle` — kernel handle abstraction for managing active sessions\n\n**Internal (optional):**\n\n- `librefang-kernel` — the full kernel implementation, only pulled in via the `kernel-adapter` feature\n\n**External:**\n\n- `agent-client-protocol` / `agent-client-protocol-tokio` — workspace crates providing ACP type definitions and tokio-based transport primitives\n- `tokio` / `tokio-util` — async runtime and I/O utilities (the transport layer is built on tokio's `AsyncRead`/`AsyncWrite`)\n- `dashmap` — concurrent hashmap used for tracking active ACP sessions across async tasks\n- `serde` / `serde_json` — JSON serialization for the JSON-RPC message wire format\n- `tracing` — structured logging throughout the protocol and transport layers\n- `thiserror` / `uuid` — error derivation and unique ID generation\n\n## How Other Crates Use This\n\n**`librefang-cli`** — Enables the `kernel-adapter` feature, constructs a `LibreFangKernel`, wraps it in `KernelAdapter`, and runs the ACP server in-process over stdio. This is the path used when an editor launches LibreFang as a subprocess.\n\n**`librefang-api`** — Similarly enables `kernel-adapter`. Hosts the ACP server in daemon mode, allowing multiple editor instances to connect through a persistent process.\n\n**Integration tests** (in this crate's `tests/` directory) — Leave `kernel-adapter` off, implement `AcpKernel` directly with lightweight stubs, and exercise the protocol/transport layer in isolation. Test fixtures use `futures` for duplex transport simulation and `chrono` for timestamping `ApprovalRequest` fixtures.\n\n## Transport\n\nThe crate uses stdio as the transport boundary. `agent-client-protocol-tokio` provides the framing layer (length-delimited JSON-RPC messages over `AsyncRead`/`AsyncWrite`), and this crate wires stdin/stdout into that layer. This is the standard transport for editor-hosted agents — the editor spawns LibreFang as a child process and communicates over the child's stdin/stdout.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang Dashboard\n\n## Overview\n\nThe LibreFang Dashboard is a single-page application built with **React 19**, **TanStack Router v1**, and **TanStack Query v5**. It provides a management interface for the LibreFang autonomous agent operating system — covering agents, sessions, approvals, channels, workflows, scheduling, analytics, memory, and runtime configuration.\n\n- **Entry point**: `src/main.tsx`\n- **Pages**: `src/pages/`\n- **Package manager**: pnpm 10.33.0\n- **Build tool**: Vite 8\n\n## Architecture\n\n```mermaid\ngraph TD\n    Pages[\"Pages (src/pages/)\"] --> QueryHooks[\"Query Hooks (src/lib/queries/)\"]\n    Pages --> MutationHooks[\"Mutation Hooks (src/lib/mutations/)\"]\n    QueryHooks --> KeyFactories[\"Key Factories (keys.ts)\"]\n    QueryHooks --> HttpClient[\"HTTP Client (src/lib/http/client.ts)\"]\n    MutationHooks --> HttpClient\n    HttpClient --> ApiLayer[\"Raw API (src/api.ts)\"]\n    ApiLayer --> Backend[\"LibreFang API Server\"]\n    Pages --> Components[\"Shared Components (src/components/)\"]\n    Components --> DrawerStore[\"Drawer Store (Zustand)\"]\n```\n\n## Data Layer\n\nAll data access from pages and components goes through the shared hooks layer. **Never call `fetch()` or `api.*` directly** inside a page or component file (except for documented exceptions).\n\n### Directory Layout\n\n```\nsrc/lib/\n  http/\n    client.ts       # Thin wrapper over src/api.ts + typed re-exports\n    errors.ts       # ApiError class used by the wrapper\n  queries/\n    keys.ts         # All query-key factories\n    keys.test.ts    # Smoke tests for key factories\n    <domain>.ts     # queryOptions + useXxx hooks per domain\n  mutations/\n    <domain>.ts     # useXxx mutation hooks with cache invalidation\n```\n\n### Current Domains\n\n`agents`, `analytics`, `approvals`, `channels`, `config`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `workflows`.\n\n### Query Key Factories\n\nEvery domain defines a hierarchical key factory in `src/lib/queries/keys.ts`. Sub-keys are always anchored to `[...fooKeys.all]` so broad invalidation works correctly:\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\n### Query Hooks\n\nEach domain file exports a `queryOptions` factory and a `useXxx` hook:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  const { enabled, staleTime, refetchInterval } = options;\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled,\n    staleTime,\n    refetchInterval,\n  });\n}\n```\n\nHooks accept an optional `options` argument (`enabled`, `staleTime`, `refetchInterval`) so call sites can override per-page needs. Every override should have a short inline comment explaining why.\n\n### Mutation Hooks\n\nEvery write operation **must invalidate** the relevant cache keys. Invalidation **must live inside the hook**, never at the call site.\n\nUse the narrowest key set that covers what actually changed:\n\n| Scenario | Keys to invalidate |\n|---|---|\n| Per-id update where list projection changes (patch, rename) | `fooKeys.lists()` + `fooKeys.detail(id)` |\n| List-shape change, no existing detail (create, delete) | `fooKeys.lists()` |\n| Scoped to one detail or nested sub-key, list unaffected | `fooKeys.detail(id)` or nested key |\n| Bulk import / cache reset | `fooKeys.all` |\n\nCall sites may attach per-call `onSuccess`/`onError` for UI feedback (toasts, modal dismissal) — that is orthogonal to invalidation.\n\n### Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts` (or re-export via `src/lib/http/client.ts`).\n2. Add a key factory in `src/lib/queries/keys.ts` following the hierarchical pattern.\n3. Add query hooks in `src/lib/queries/<domain>.ts`.\n4. Add mutation hooks in `src/lib/mutations/<domain>.ts` with appropriate invalidation.\n5. Update `src/lib/queries/keys.test.ts` — add the factory to the \"all factories exist\" list, plus anchoring tests for non-trivial factories.\n\n### Consuming in Pages\n\n```tsx\nimport { useFoo } from \"../lib/queries/foo\";\nimport { useCreateFoo } from \"../lib/mutations/foo\";\n\nfunction FooPage() {\n  const { data, isLoading } = useFoo({ active: true });\n  const createFoo = useCreateFoo();\n}\n```\n\nNever build a `queryKey` inline — always call the factory. Never subscribe to the same endpoint with a different key just to get a subset; use `select` on the shared `queryOptions`.\n\n### Exceptions (Uncached Data)\n\nStreaming/SSE, imperative fire-and-forget control channels (e.g., terminal window lifecycle in `TerminalTabs.tsx`), and one-shot probes that must not be cached may call `fetch` directly. Keep these narrow and comment why.\n\n## Authentication\n\nAuthentication tokens are stored in `sessionStorage` under the key `librefang-api-key` (never `localStorage`). The API layer sends tokens as:\n\n- **HTTP requests**: `Authorization: Bearer <token>` header\n- **WebSocket connections**: `Sec-WebSocket-Protocol: bearer.<token>` sub-protocol\n\nThe `verifyStoredAuth` function probes a protected endpoint and clears stale tokens on 401. The sign-in dialog is shown when the dashboard auth mode is `credentials` (detected via `/api/auth/dashboard-check`).\n\nKey functions in `src/api.ts`: `setApiKey`, `verifyStoredAuth`, `buildAuthenticatedWebSocket`.\n\n## Key Components\n\n### DrawerPanel\n\n`src/components/ui/DrawerPanel.tsx` — A global drawer slot backed by a Zustand store (`src/lib/drawerStore.ts`). Only one drawer can be open at a time. Ownership tracking prevents sibling drawers from collateral-closing each other when one transitions from open to closed in the same React commit (e.g., picker → config flow on ProvidersPage/ChannelsPage).\n\n### MultiSelectCmdk\n\n`src/components/ui/MultiSelectCmdk.tsx` — A combobox-style multi-select built on `cmdk`. Supports chip removal, backspace-to-remove, search filtering, and hides already-selected options from the dropdown.\n\n### ToolCallsPanel\n\n`src/components/ui/ToolCallsPanel.tsx` — Displays tool call history for an agent chat session. Shows a summary bar with count, running/error badges, and expands into a modal with per-call detail cards.\n\n### PromptsExperimentsModal\n\n`src/components/PromptsExperimentsModal.tsx` — Tabbed dialog for managing prompt versions and A/B experiments per agent. Uses mutation hooks from `src/lib/mutations/agents.ts` (`useCreatePromptVersion`, `useCreateExperiment`, `useActivatePromptVersion`, `useStartExperiment`, etc.).\n\n### DeliveryTargetsEditor\n\n`src/components/ui/DeliveryTargetsEditor.tsx` — Form editor for scheduler delivery targets (channel, webhook, local_file, email). Includes SSRF validation for webhook URLs (blocks localhost, loopback, link-local, metadata endpoints), path traversal checks for local_file, and strips empty optional fields.\n\n## Utility Libraries\n\n### `src/lib/agentManifest.ts`\n\nTOML-based agent manifest parser and serializer using `smol-toml`. Handles:\n\n- **Parsing**: `parseManifestToml(toml)` → structured form + extras (preserves unknown fields)\n- **Serialization**: `serializeManifestForm(form, extras)` → valid TOML\n- **Validation**: `validateManifestForm(form)` → error array\n- **Round-trip safety**: Handles edge cases like exec_policy alias normalization, response_format mutual exclusion with preserved extras, nested-table section scoping, negative/out-of-range integer rejection, and per-fallback-model extra_params preservation.\n\n### `src/lib/agentManifestMarkdown.ts`\n\nGenerates human-readable Markdown documentation from a manifest form. Used for agent detail views.\n\n### `src/lib/chat.ts`\n\nChat message utilities:\n\n- `normalizeRole` — normalizes API role strings to lowercase\n- `asText` — converts unknown content to string\n- `formatMeta` — formats token/cost/iteration metadata\n- `normalizeToolOutput` — normalizes tool output events for display\n- `extractAssistantHistoryParts` — separates text and thinking blocks from content block arrays, joining each with double newlines for paragraph breaks\n\n### `src/lib/chatPicker.ts`\n\n`groupedPicker(agents, hands, showHandAgents)` — Groups agents into standalone vs. hand-instance groups for the chat agent picker. Handles loading states (keeps `is_hand` agents visible while hand instances are loading), sorts groups alphabetically, orders roles with coordinator first.\n\n### `src/lib/csvParser.ts`\n\nRFC-4180-compliant CSV parser. Handles quoted fields with embedded newlines/commas, escaped double-quotes, BOM, CRLF/CR line endings. `parseUsersCsv` validates required columns (`name`, `role`) and maps unknown columns to channel bindings.\n\n### `src/lib/trafficSplit.ts`\n\n`buildEvenTrafficSplit(n)` — Distributes 100 traffic buckets as evenly as possible across `n` variants.\n\n## Service Worker and PWA\n\nThe dashboard is an installable PWA:\n\n- **Manifest**: `public/manifest.json` — standalone display mode, start URL `/dashboard/#/overview`\n- **Service Worker**: `public/sw.js` — precaches `/dashboard/`, uses stale-while-revalidate for static assets, network-only for API requests\n- **Icons**: `icon-192.png`, `icon-512.png`\n\n## Internationalization\n\nUses `i18next` with `react-i18next`. Locale files live in `src/locales/` with `en.json` as the reference. Parity is enforced by:\n\n- **Vitest**: `src/lib/__tests__/locale-parity.test.ts` (runs as part of `pnpm test`)\n- **CLI script**: `scripts/i18n-parity.mjs` — standalone check for quick pre-commit verification\n\nBoth flatten each locale's keys and report missing/extra keys relative to `en.json`.\n\n## Testing\n\n### Unit Tests\n\n- **Runner**: Vitest with jsdom\n- **Libraries**: `@testing-library/react`, `@testing-library/user-event`\n- **Location**: Co-located `*.test.ts(x)` files\n\n### Test Utilities\n\n`src/lib/test/query-client.tsx` exports `createQueryClientWrapper` — a React wrapper that provides a fresh `QueryClient` for hook tests and exposes it for spying on `invalidateQueries`.\n\n### E2E Tests\n\n- **Runner**: Playwright\n- **Config**: `playwright.config.ts` — targets `http://127.0.0.1:4173`, starts dev server automatically\n- **Location**: `e2e/`\n- **Coverage**: Shell navigation (sidebar links, page headings), auth dialog appearance\n\n### Key Test Patterns\n\n- **Mutation invalidation**: Each mutation hook test verifies exact `invalidateQueries` calls with specific key factories (e.g., `agentKeys.detail(id)`, `sessionKeys.lists()`)\n- **Component isolation**: Heavy mocks for `react-i18next` (returns key as text), `motion/react` (renders plain elements), and data hooks\n- **Edge case coverage**: CSV parsing (BOM, embedded newlines), manifest round-trips (section scoping, alias normalization, mutual exclusion), drawer ownership races\n\n## Build & Verify\n\n```bash\npnpm typecheck          # tsc --noEmit — must be green\npnpm test --run         # vitest — all tests pass\npnpm build              # vite build — must succeed\n```\n\nRun all three after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`. A passing typecheck alone is insufficient — key-factory tests catch anchoring regressions that the compiler does not.\n\n### Additional Scripts\n\n```bash\npnpm dev                          # Vite dev server\npnpm preview                      # Preview production build\npnpm openapi:types                # Generate types from OpenAPI spec\npnpm test:watch                   # Vitest in watch mode\npnpm test:i18n-parity             # Check locale key parity\npnpm e2e                          # Playwright end-to-end tests\n```\n\n## Conventions\n\n- **TypeScript strict mode** — no `any` in new hooks; use types from `src/api.ts` or `openapi/generated.ts`\n- **Hooks set sensible defaults** — shared `staleTime`/`refetchInterval` inherited by consumers; override per call site with inline comment\n- **Mutation invalidation in the hook** — callers never need to know which keys a mutation touches\n- **Commit convention**: `feat(dashboard/<area>):`, `refactor(dashboard/<area>):`, `fix(dashboard/<area>):` — never include `Co-Authored-By` footer\n\n## Navigation Structure\n\nThe sidebar exposes these sections (verified by E2E):\n\nOverview · Agents · Sessions · Approvals · Comms · Providers · Channels · Skills · Hands · Workflows · Scheduler · Goals · Analytics · Memory · Runtime · Logs","other-librefang-api-src":"# Other — librefang-api-src\n\n# Login Page (`librefang-api/src/login_page.html`)\n\n## Overview\n\nA self-contained, single-file HTML login page served by the LibreFang API server. It handles username/password authentication with optional TOTP two-factor support, stores the resulting session token client-side, and redirects the user to the dashboard.\n\nThe page is intentionally standalone — no external CSS frameworks, no build step, no JavaScript dependencies. Everything is inlined for zero-latency serving.\n\n## Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant LoginPage\n    participant API as /api/auth/dashboard-login\n\n    User->>LoginPage: Submit username + password\n    LoginPage->>API: POST credentials\n    API-->>LoginPage: Response\n\n    alt Success (token returned)\n        LoginPage->>LoginPage: Store token in localStorage\n        LoginPage->>User: Redirect to /dashboard/\n    else TOTP required\n        LoginPage->>User: Show TOTP input field\n        User->>LoginPage: Submit username + password + totp_code\n        LoginPage->>API: POST with TOTP\n        API-->>LoginPage: Response (success or error)\n    else Invalid credentials\n        LoginPage->>User: Display error message\n    end\n```\n\n## Key Components\n\n### HTML Structure\n\nThe page is organized into a single centered card (`<main class=\"card\">`) containing:\n\n| Element | ID | Purpose |\n|---------|----|---------|\n| Username input | `#u` | Captures the username with `autocomplete=\"username\"` |\n| Password input | `#p` | Password field with `autocomplete=\"current-password\"` |\n| TOTP input | `#t` | Hidden by default; revealed when the backend signals `requires_totp` |\n| Submit button | `#btn` | Triggers the form submission handler; disabled during in-flight requests |\n| Error display | `#err` | Live region (`aria-live=\"polite\"`) for error messages |\n\n### CSS Styling\n\nThe styling is dark-mode by default with a **light-mode fallback** via `@media (prefers-color-scheme: light)`. Key design decisions:\n\n- **Dark palette**: `#0b0d12` background, `#12151c` card, `#e6e8ee` text\n- **Light palette**: `#f6f7fb` background, `#fff` card, `#1a1c22` text\n- The `:root { color-scheme: light dark; }` declaration ensures native form controls respect the user's preference\n- Layout uses `display: grid; place-items: center` for dead-center card placement\n- The card caps at `min(92vw, 380px)` for mobile responsiveness\n- Focus states use the brand accent color `#7c8cff` with a matching box-shadow ring\n\n### JavaScript Logic\n\nAll behavior lives in an IIFE at the bottom of the page. There are no imports or dependencies.\n\n#### State\n\n- **`requiresTotp`** — A boolean flag, initially `false`. Once the server indicates TOTP is required for the account, this is set to `true` so subsequent submission attempts include the `totp_code` field.\n\n#### Form Submission Handler\n\nThe `submit` event listener on `#f`:\n\n1. **Prevents default** form submission (no page reload).\n2. **Disables the button** to prevent double-submission.\n3. **Constructs the payload**:\n   - Always includes `username` (trimmed) and `password` (raw).\n   - Includes `totp_code` only if `requiresTotp` is `true`.\n4. **Sends** `POST /api/auth/dashboard-login` with `Content-Type: application/json` and `credentials: 'same-origin'`.\n5. **Handles the response**:\n   - **`d.ok && d.token`** — Stores the token in `localStorage` under the key `librefang-api-key`, then redirects. The redirect target is the current `location.pathname + location.search + location.hash`, defaulting to `/dashboard/` if the user was at the root. This preserves any original destination the user was trying to reach before being intercepted by the login page.\n   - **`d.requires_totp`** — Reveals the TOTP input row, sets `requiresTotp = true`, focuses the TOTP field, and prompts the user.\n   - **All other cases** — Displays `d.error` or a generic fallback message.\n6. **Network errors** display a `\"Network error.\"` message.\n7. **`finally`** re-enables the button regardless of outcome.\n\n#### Error Display\n\nThe `setError(msg)` function writes to `#err`. The element has `aria-live=\"polite\"` so screen readers announce changes automatically. The container has a `min-height: 1.2em` to prevent layout shift when an error appears.\n\n## API Contract\n\nThe page expects the backend endpoint to behave as follows:\n\n**`POST /api/auth/dashboard-login`**\n\nRequest body:\n```json\n{\n  \"username\": \"string\",\n  \"password\": \"string\",\n  \"totp_code\": \"123456\"  // optional, 6 digits\n}\n```\n\nSuccess response:\n```json\n{ \"ok\": true, \"token\": \"jwt-or-api-key-string\" }\n```\n\nTOTP required response:\n```json\n{ \"requires_totp\": true }\n```\n\nError response:\n```json\n{ \"ok\": false, \"error\": \"Human-readable error message\" }\n```\n\n## Token Storage\n\nOn successful login, the token is written to:\n\n```\nlocalStorage['librefang-api-key']\n```\n\nOther parts of the application (the dashboard, API client code) must read from this same key to authenticate subsequent requests. The `try/catch` around `localStorage.setItem` gracefully handles cases where storage is disabled or full.\n\n## Redirect Behavior\n\nAfter storing the token, the page uses `location.replace()` to navigate to the originally requested URL. This is important because:\n\n- `replace()` does not create a browser history entry, so the user can't accidentally navigate back to the login page.\n- The page uses the full `pathname + search + hash`, so deep links and query parameters are preserved through the authentication redirect.\n- If the user was already at `/` (the login page itself), the fallback is `/dashboard/`.\n\n## Integration Points\n\nThis file is served directly by the LibreFang API server for unauthenticated requests to dashboard routes. The server should:\n\n1. Detect that the user lacks a valid session/token.\n2. Return this HTML page (likely as a fallback or via a specific route like `/login`).\n3. After login, the stored token is sent with future requests (presumably via an `Authorization` header or similar mechanism handled by the dashboard's JavaScript).\n\nThe footer text references `config.toml`, indicating that authentication requirements are configurable by the server administrator.","other-librefang-api-static":"# Other — librefang-api-static\n\n# Static Locale Files (`librefang-api/static/locales/`)\n\n## Purpose\n\nThis directory contains the internationalization (i18n) translation catalogs for the LibreFang web dashboard. The JSON files provide every user-facing string rendered by the React frontend, organized into nested key namespaces that mirror the dashboard's page and component hierarchy.\n\nThe catalog is consumed by the dashboard's i18n library (likely `react-i18next` or equivalent) at build time and runtime. Locale files are served as static assets under `/static/locales/`.\n\n## Supported Languages\n\n| File | Language | Code |\n|------|----------|------|\n| `en.json` | English (default) | `en` |\n| `ja.json` | Japanese | `ja` |\n\n## String Interpolation\n\nTranslation values use `{variableName}` placeholders for dynamic content. For example:\n\n```json\n\"stepsCompleted\": \"{count} of 5 steps completed\"\n```\n\nThe frontend passes a `count` value at render time. The Japanese equivalent:\n\n```json\n\"stepsCompleted\": \"5 ステップ中 {count} ステップ完了\"\n```\n\nAll interpolation placeholders must have identical names across every locale file.\n\n## Key Namespace Structure\n\nThe root keys group translations by feature area. Each namespace corresponds to a dashboard page, a shared UI concern, or a reusable component:\n\n```\n├── nav              Sidebar navigation labels\n├── status           Connection status indicators\n├── btn              Universal button labels (Refresh, Save, Delete, etc.)\n├── label            Generic field labels (Status, Version, Provider, etc.)\n├── auth             API key authentication prompt\n├── page             Page-level titles\n├── health           Health check labels\n├── stat             Dashboard stat card labels\n├── card             Dashboard card titles\n├── agents           Agent list page (sidebar labels)\n├── detail           Agent detail panel (Info, Files, Config tabs)\n├── mode             Agent operation modes\n├── category         Agent categories\n├── profile          Tool profile definitions (minimal, coding, full, etc.)\n├── template         10 built-in agent templates\n├── time             Relative time formatting\n├── onboarding       First-run onboarding banner\n├── provider         LLM provider configuration UI\n├── overview         Overview dashboard page\n├── security         Security feature display names\n├── agentChat        Chat interface, slash commands, toast messages\n├── sessionsPage     Sessions list and agent memory store\n├── agentsPage       Agent creation wizard, spawning, config editing\n├── approvals        Execution approval workflow\n├── logsPage         Live logs and audit trail\n├── runtimePage      Runtime information display\n├── settingsPage     Settings tabs (providers, models, tools, security, network, budget, proactive memory, migration)\n├── workflowsPage    Workflow list and execution\n├── workflowBuilder  Visual drag-and-drop workflow builder\n├── schedulerPage    Cron jobs, event triggers, run history\n├── channelsPage     Messaging channel configuration\n├── skillsPage       Skills browser, ClawHub integration, MCP servers\n├── handsPage        Hands capability packages\n├── pluginsPage      Plugin registry and management\n├── commsPage        Inter-agent communication\n├── setupWizard      Guided setup wizard (5 steps)\n├── goalsPage        Goals and sub-goals\n├── analyticsPage    Usage analytics and cost breakdown\n├── memoryPage       Proactive memory browser\n├── theme            Theme selector labels\n├── sidebar          Sidebar shortcut hints\n├── confirm          Generic confirm dialog\n├── *Page2           Supplementary keys for v2 UI variants\n└── setupWizard2     Supplementary wizard keys\n```\n\n### Deeply Nested Sections\n\nSome namespaces contain multiple nesting levels. Notable examples:\n\n**`settingsPage.coreFeatures`** — Descriptions of the 8 core security protections that cannot be disabled:\n- `path_traversal`, `ssrf_protection`, `capability_system`, `privilege_escalation_prevention`, `subprocess_isolation`, `security_headers`, `wire_hmac_auth`, `request_id_tracking`\n- Each has `name`, `description`, and `threat` sub-keys.\n\n**`settingsPage.configurableFeatures`** — Tunable security controls:\n- `rate_limiter`, `websocket_limits`, `wasm_sandbox`, `auth`\n- Each has `name`, `description`, and `hint`.\n\n**`agentChat.cmd`** — Slash command descriptions exposed to users:\n- `help`, `agents`, `new`, `reboot`, `compact`, `model`, `stop`, `usage`, `think`, `context`, `verbose`, `queue`, `status`, `clear`, `exit`, `budget`, `peers`, `a2a`\n\n**`template`** — 10 agent template definitions with `name` and `desc`:\n- `GeneralAssistant`, `CodeHelper`, `Researcher`, `Writer`, `DataAnalyst`, `DevOpsEngineer`, `CustomerSupport`, `Tutor`, `APIDesigner`, `MeetingNotes`\n\n**`schedulerPage.cron`** — Human-readable cron preset labels (22 presets).\n\n## Parity Validation\n\nThe build includes a parity-check script at `dashboard/scripts/i18n-parity.mjs` that validates locale files share identical key structures. This prevents:\n\n- Missing keys in a non-English locale causing fallback-to-English rendering bugs\n- Stale keys left over after removing a UI feature\n- Placeholder name mismatches between locales\n\nTo run the check:\n\n```bash\nnode dashboard/scripts/i18n-parity.mjs\n```\n\n## Adding a New Locale\n\n1. Copy `en.json` to a new file named with the target language code (e.g., `fr.json`).\n2. Translate all string values while preserving:\n   - The exact JSON key hierarchy\n   - All `{placeholder}` names unchanged\n   - Markdown formatting (`**bold**`, backtick code, etc.)\n3. Register the new locale in the dashboard's i18n configuration.\n4. Run the parity script to verify key alignment.\n\n## Adding New Translation Keys\n\nWhen adding a UI feature that needs new strings:\n\n1. Add keys under the appropriate namespace in `en.json` first.\n2. Add matching keys (translated or copied) in every other locale file.\n3. Run the parity script before committing.\n4. Use the namespace pattern `{pageName}.{subSection}.{field}` to keep keys organized.\n\nKeys with a `2` suffix (e.g., `agentsPage2`, `settingsPage2`) are supplementary additions for updated UI variants — they extend rather than replace the base namespace keys.\n\n## Architecture Diagram\n\n```mermaid\nflowchart LR\n    subgraph Build\n        EN[en.json] --> PARITY[i18n-parity.mjs]\n        JA[ja.json] --> PARITY\n        NEW[new-locale.json] --> PARITY\n    end\n    subgraph Runtime\n        BUNDLE[Bundled locales] --> I18N[i18next instance]\n        I18N --> UI[React components]\n    end\n    PARITY -->|validates| BUNDLE\n    BUNDLE -->|served as static assets| STATIC[/static/locales/]\n```\n\n## Key Count Reference\n\nThe English catalog contains approximately **1,100+ translation keys** across all namespaces. The largest namespaces by key count are:\n\n| Namespace | Purpose |\n|-----------|---------|\n| `settingsPage` | ~350 keys — providers, models, tools, security, budget, migration |\n| `agentChat` | ~140 keys — chat UI, commands, toasts, system messages |\n| `skillsPage` | ~80 keys — ClawHub browser, MCP, quick-start skills |\n| `channelsPage` | ~60 keys — channel setup flows, WhatsApp QR, status |\n| `agentsPage` | ~60 keys — agent creation, config, spawning |\n| `schedulerPage` | ~80 keys — cron jobs, triggers, presets, history |\n| `setupWizard` | ~80 keys — guided 5-step wizard |","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api Tests\n\nIntegration test suite for the LibreFang HTTP API layer. Tests exercise the production router, middleware, and handler wiring end-to-end using `tower::oneshot` or real TCP listeners with `reqwest` — no handler-level unit mocks.\n\n## Architecture\n\nEvery test boots a kernel (real or mock), constructs an `axum::Router` matching production wiring, and fires HTTP requests through it. Two harness strategies are used depending on what's being tested:\n\n```mermaid\ngraph TD\n    A[Test Function] --> B{Harness Type}\n    B -->|Full Router| C[server::build_router]\n    B -->|Sub-router| D[MockKernelBuilder + TestAppState]\n    C --> E[tower::oneshot]\n    D --> E\n    C --> F[TcpListener + reqwest]\n    D --> F\n    E --> G[Assert status + body]\n    F --> G\n```\n\n**Full router** (`server::build_router`) — boots `LibreFangKernel` with a temp directory and a fake `ollama` provider. Used when tests need the complete middleware stack (auth, request logging, CORS, API versioning). Found in `a2a_routes_integration.rs`, `agents_routes_integration.rs`, `api_integration_test.rs`.\n\n**Sub-router** (`MockKernelBuilder` + `TestAppState`) — builds only the route module under test, nested under `/api`. Skips the full middleware chain; tests that need auth inject `AuthenticatedApiUser` extensions directly. Found in `access_log_agent_id_test.rs`, `access_log_session_id_test.rs`, `agent_kv_authz_integration.rs`.\n\n**Real TCP server** — binds to `127.0.0.1:0`, spawns `axum::serve` in a tokio task, hits it with `reqwest::Client`. Required for tests that exercise connection-level behavior (WebSocket upgrade, `x-request-id` header injection). Found in `api_integration_test.rs`, `agent_identity_registry_test.rs`.\n\n## Test Files\n\n### `api_integration_test.rs`\n\nBroadest coverage file. Boots a real TCP server via `start_test_server()` and exercises:\n\n| Area | Routes | Key tests |\n|------|--------|-----------|\n| Health & status | `GET /api/health`, `GET /api/status` | Response shape, `x-request-id` is UUID, agent count |\n| API versioning | `/api/v1/*`, `/api/versions` | Path-based versioning, `x-api-version` header |\n| Locales | `/locales/*.json` | Dashboard i18n files served correctly |\n| Providers | `GET /api/providers
