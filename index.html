sync fires per consolidation cycle. If the run aborts mid-batch, the next cycle picks up where it left off — consolidation is idempotent.\n\n### Time-Based Decay (`decay.rs`)\n\nScope-driven TTL soft-deletion:\n\n| Scope | TTL Config | Behaviour |\n|-------|-----------|-----------|\n| `user_memory` | Never | Permanent |\n| `session_memory` | `session_ttl_days` | Soft-delete after TTL |\n| `agent_memory` | `agent_ttl_days` | Soft-delete after TTL |\n\nAccessing a memory (via search/recall) updates `accessed_at`, resetting the timer. Soft-deleted rows keep their `deleted_at` timestamp for later hard-deletion.\n\n**`prune_soft_deleted_memories`** — hard-deletes rows where `deleted_at` is older than a configurable threshold. Reclaims embedding BLOBs that would otherwise persist indefinitely in soft-deleted rows.\n\n### Session Store (`session.rs`, `session_store.rs`)\n\nPersists conversation history as MessagePack blobs in the `sessions` table. Features:\n\n- Full-text search via `sessions_fts` (unicode61 tokenizer, rebuilt in migration v33)\n- `message_count` denormalized column (migration v32) so `list_sessions` avoids deserializing blobs\n- Canonical sessions for cross-channel persistent memory\n- Expired session cleanup\n- 24-hour usage stats aggregation per agent\n\n### Namespace ACL (`namespace_acl.rs`)\n\nGates memory operations on namespace-prefixed keys. `NamespaceGate` checks read and write permissions before any KV or memory access. Supports per-namespace allowlists so an agent's memory namespace can be selectively shared or restricted.\n\n### Idempotency Store (`idempotency.rs`)\n\nSQLite-backed cache for HTTP `Idempotency-Key` semantics. Persists full HTTP responses (status + body) with a 24-hour TTL (`TTL_SECONDS`). First-writer-wins via `INSERT OR IGNORE`. Expired rows are pruned opportunistically on lookup.\n\nSchema created by migration v34. Shares the substrate connection pool so no separate database file is needed.\n\n### Schema Migrations (`migration.rs`)\n\n40-version migration ladder. Each version is a transactional step that applies DDL and records itself in the `migrations` audit table. Key design properties:\n\n- **No downgrade:** If `user_version > SCHEMA_VERSION`, the binary refuses to start (prevents silent data loss from missing columns).\n- **Column-exists guards:** Every `ALTER TABLE ADD COLUMN` checks `column_exists` first so a retry after a partial failure doesn't error.\n- **Audit trail self-heal:** After running all steps, verifies `migrations` row count matches `user_version` and backfills missing rows.\n- **Performance indexes:** Migration v9 adds composite indexes for confidence-ordering, decay queries, and eviction scans.\n\n### Supporting Stores\n\n| Module | Purpose |\n|--------|---------|\n| `structured.rs` | Per-agent key-value store with version tracking and namespace ACL enforcement |\n| `prompt.rs` | Prompt template versioning with active-version selection |\n| `usage.rs` | LLM cost metering — records input/output tokens and cost per agent/model |\n| `workflow_store.rs` | Workflow run state persistence (replaces JSON file, survives restarts) |\n| `roster_store.rs` | Agent registry persistence |\n| `provider.rs` | `MemoryProvider` trait — pluggable memory backend with `NullMemoryProvider` default |\n\n## Data Flow\n\n### Memory Add (Proactive)\n\n```\nAgent calls add()\n  → chunker::chunk_text (if content > max_size)\n  → Embed each chunk via embedding provider\n  → NamespaceGate::check_write\n  → INSERT into memories (content, embedding, confidence, scope)\n```\n\n### Memory Recall\n\n```\nAgent calls search(query)\n  → Embed query\n  → VectorStore::search (cosine similarity, filtered by agent_id)\n  → Update accessed_at + increment access_count on hits\n  → Return ranked results\n```\n\n### Consolidation Cycle\n\n```\nKernel timer fires\n  → ConsolidationEngine::consolidate()\n    → Phase 1: decay confidence on 7+ day stale memories\n    → Phase 2: per-agent O(N²) similarity scan (capped at 100 merges)\n      → text_similarity > 0.9 → merge metadata, sum access_count,\n        weighted-average embeddings, soft-delete loser\n    → Single transaction commit (1 fsync)\n```\n\n### Decay Sweep\n\n```\nKernel timer fires\n  → run_decay(pool, config)\n    → Soft-delete SESSION scope memories older than session_ttl_days\n    → Soft-delete AGENT scope memories older than agent_ttl_days\n    → USER scope untouched\n  → prune_soft_deleted_memories(pool, retention_days)\n    → Hard-delete rows soft-deleted > retention_days ago\n```\n\n## Design Decisions\n\n**Soft-delete everywhere.** Hard `DELETE` only happens in `prune_soft_deleted_memories`, giving operators a recovery window. Other modules (consolidation, history queries) rely on the `deleted` flag to filter.\n\n**Tenant isolation by `agent_id`.** Consolidation, knowledge graph queries, and vector search all scope by `agent_id`. Cross-tenant comparison never occurs, even when the database is shared.\n\n**Char-based sizing.** The chunker counts Unicode characters, not bytes. `char_boundaries` produces byte offsets that never split a multi-byte character, so UTF-8 text (Japanese, emoji) chunks correctly.\n\n**Single-transaction consolidation.** All merges in a consolidation cycle share one outer transaction. Per-pair atomicity (loser soft-delete + keeper update) is preserved because both writes land in the same transaction. A mid-batch crash rolls back the whole cycle; the next run is idempotent.\n\n**Running weighted average for embeddings.** When a keeper absorbs multiple losers, its accumulated weight grows by each loser's confidence. This prevents the pairwise-blend bias where the last-absorbed loser disproportionately shifts the embedding. The accumulated weight is tracked per keeper in `accum_weights`.\n\n**Embedding format.** Embeddings are stored as SQLite BLOBs containing little-endian `f32` values. `decode_embedding` / `encode_embedding` handle the conversion. Dimension mismatches between keeper and loser fall back to preserving the keeper's bytes verbatim.","memory-system-librefang-memory-wiki-src":"# Memory System — librefang-memory-wiki-src\n\n# librefang-memory-wiki\n\nDurable markdown knowledge vault for the LibreFang Agent OS. Complements `librefang-memory` (the SQLite + vector substrate) by providing a navigable, human-editable knowledge base that can be opened directly in Obsidian. Every page carries provenance frontmatter — which agent, session, channel, and turn produced the claim — so the origin of any fact is always auditable.\n\nThe vault is **off by default**. Operators opt in via configuration.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller[\"wiki_write / wiki_get / wiki_search caller\"] --> Vault[\"WikiVault\"]\n    Vault -->|atomic write| Disk[\"Disk (*.md, _meta/)\"]\n    Vault -->|CRLF normalize + split| FM[\"frontmatter module\"]\n    Vault -->|\"rewrite [[links]]\"| Render[\"RenderMode\"]\n    Vault -->|sha256 + mtime check| CS[\"compile-state.json\"]\n    CS -->|drift detected| Conflict[\"HandEditConflict error\"]\n    Vault -->|rebuild after write| BL[\"backlinks.json + index.md\"]\n```\n\n## Configuration\n\nEnable the vault in `config.toml`:\n\n```toml\n[memory_wiki]\nenabled = true\nmode = \"isolated\"                           # isolated | bridge | unsafe_local\nvault_path = \"~/.librefang/wiki/main\"\nrender_mode = \"native\"                      # native | obsidian\ningest_filter = \"tagged\"                    # tagged | all\n```\n\n| Field | Default | v1 Behavior |\n|---|---|---|\n| `enabled` | `false` | Must be `true` or `WikiVault::new` returns `WikiError::Disabled` |\n| `mode` | `isolated` | Only `isolated` is wired; `bridge` and `unsafe_local` return `ModeNotImplemented` |\n| `vault_path` | `<home_dir>/wiki/main` | When unset, falls back to the kernel-supplied `home_dir` — not the env-derived `LIBREFANG_HOME` — so embedded profiles don't mix data |\n| `render_mode` | `native` | Controls how `[[topic]]` placeholders are rendered on disk |\n| `ingest_filter` | `tagged` | `all` is accepted but has no behavioral effect in v1; a warning is logged |\n\n## File Layout\n\n```\n<vault_path>/\n├── <topic>.md              # one page per topic\n├── index.md                # auto-generated alphabetical index\n└── _meta/\n    ├── compile-state.json  # mtime + sha256 per page from last compile\n    └── backlinks.json      # { target -> [source, ...] } from every [[link]]\n```\n\nReserved names: `index` (the auto-generated index) and any topic starting with `_` (metadata). Both are rejected by topic validation.\n\n## Page Format\n\nEach `.md` file is a YAML frontmatter block followed by a markdown body:\n\n```markdown\n---\ntopic: project-conventions\ncreated: 2026-05-06T10:30:00Z\nupdated: 2026-05-06T11:00:00Z\ncontent_sha256: 6a4f...\nprovenance:\n  - agent: agent_xyz\n    session: sess_abc\n    channel: cli\n    turn: 4\n    at: 2026-05-06T10:30:00Z\n---\n\nbody markdown ...\n```\n\n**`content_sha256`** is `Frontmatter::hash_body(body)` — a SHA-256 of the body after stripping one trailing newline. This normalization ensures an editor adding or removing a final `\\n` doesn't flip the hash.\n\n**Provenance is monotonic.** Every call to `WikiVault::write` appends a `ProvenanceEntry` to the existing list. The vault never drops provenance history.\n\n### Frontmatter tolerance\n\nPages hand-authored in Obsidian without frontmatter still load: `frontmatter::split` returns `(None, raw)`, and the vault synthesizes a default header with `created = updated = now` and an empty provenance list. A subsequent `wiki_write` re-renders the page with a clean header.\n\nMalformed YAML (e.g., an invalid hand-edit) triggers a warning log and falls back to `Frontmatter::default_for(topic)` — the read succeeds and the body remains accessible. The next successful `wiki_write` repairs the header.\n\n### CRLF handling\n\nEditors on Windows (or git checkouts with `core.autocrlf=true`) may save files with `\\r\\n`. The vault normalizes CRLF to LF on read in `read_page_if_present`, so the LF-only delimiter matcher in `frontmatter::split` works correctly regardless of how the file was saved. The vault's own `render()` always emits `\\n`.\n\n## Core Operations\n\n### Writing Pages — `WikiVault::write`\n\n```rust\npub fn write(\n    &self,\n    topic: &str,\n    body_with_placeholders: &str,\n    provenance: ProvenanceEntry,\n    force: bool,\n) -> WikiResult<WikiWriteOutcome>\n```\n\n**Callers always pass body markdown using `[[topic]]` placeholders** for cross-references. The vault rewrites those into the active render flavor at flush time, so the same body is portable across modes.\n\nWrite flow:\n\n1. **Validate** the topic name (see [Topic Validation](#topic-validation)).\n2. **Check body size** against the 1 MiB cap (`MAX_BODY_BYTES`). The size is measured after link rewriting.\n3. **Acquire the write lock** (a `Mutex` that serializes concurrent writes to the same vault).\n4. **Load compile state** from `_meta/compile-state.json`.\n5. **Detect external drift** — compare on-disk mtime and body sha256 against the last compiler run. If either diverges, the page was hand-edited externally.\n6. **Reject or merge** — if drifted and `force` is false, return `WikiError::HandEditConflict`. If `force` is true, preserve the external body verbatim (only provenance is appended).\n7. **Rewrite links** — unless the external body was preserved, substitute all `[[topic]]` placeholders via `RenderMode::rewrite_links`.\n8. **Update frontmatter** — set `updated`, append the new `ProvenanceEntry`, recompute `content_sha256`.\n9. **Atomic write** — write to a `.tmp.write` file, then `fs::rename` to the final path.\n10. **Update compile state** and rebuild `index.md` + `_meta/backlinks.json`.\n\nReturns a `WikiWriteOutcome` with the topic, file path, content hash, and a `merged_with_external_edit` flag indicating whether a human edit was preserved.\n\n### Reading Pages — `WikiVault::get`\n\n```rust\npub fn get(&self, topic: &str) -> WikiResult<WikiPage>\n```\n\nReads the `.md` file, normalizes CRLF, splits frontmatter from body, and parses the YAML. Returns `WikiError::NotFound` if the file doesn't exist. Malformed frontmatter falls back to a synthetic default — the read never fails due to bad YAML alone.\n\nThe returned `WikiPage` contains:\n\n| Field | Type | Description |\n|---|---|---|\n| `topic` | `String` | Page topic identifier |\n| `frontmatter` | `Frontmatter` | Parsed YAML header (or synthetic default) |\n| `body` | `String` | Markdown body as it exists on disk (already link-rewritten) |\n\n### Search — `WikiVault::search`\n\n```rust\npub fn search(&self, query: &str, limit: usize) -> WikiResult<Vec<SearchHit>>\n```\n\nNaive case-insensitive substring search across all page bodies and topics. Scoring:\n\n- Topic name contains the query: **+10.0**\n- Body matches: **ln(1 + count)** — sub-linear weighting so a single long page can't bury shorter topic-only matches\n\nResults are sorted by score descending, then topic name ascending. Each `SearchHit` includes a `snippet` — up to ~120 characters of context around the first body match, with `…` ellipsis at boundaries.\n\nThis is intentionally simple for v1. Vector / FTS5 ranking is a follow-up.\n\n### Backlinks — `WikiVault::backlinks`\n\n```rust\npub fn backlinks(&self) -> WikiResult<Vec<BacklinkEntry>>\n```\n\nReturns every `(source, target)` pair where `source` contains a link to `target`. Extracted from `_meta/backlinks.json`, which is rebuilt after every write. Deterministic order: target ascending, then source ascending.\n\n## Hand-Edit Safety\n\nThis is a core v1 acceptance criterion. The vault detects when a page has been modified outside the compiler (e.g., a human editing in Obsidian) and refuses to silently overwrite.\n\n**Detection mechanism:** `compile-state.json` stores `{ mtime_ns, sha256 }` for every page after each compiler run. On the next write, the vault reads the on-disk file and compares:\n\n- **mtime** — file modification timestamp (nanoseconds since epoch)\n- **sha256** — `Frontmatter::hash_body(body)` of the actual body on disk\n\nIf either value has changed, the page was edited externally. The mtime alone isn't reliable on filesystems with 1-second precision (HFS+), so the sha256 provides a content-level guarantee.\n\n**Conflict resolution:**\n\n| `force` | Drift detected | Behavior |\n|---|---|---|\n| `false` | No | Normal write — caller's body replaces on-disk content |\n| `false` | Yes | `WikiError::HandEditConflict` returned |\n| `true` | No | Normal write |\n| `true` | Yes | External body preserved verbatim; only provenance is appended; `merged_with_external_edit = true` |\n\n## Render Modes\n\nControlled by `RenderMode` and the `render_mode` config field. Affects only how cross-references are emitted on disk — frontmatter and prose body are identical.\n\n| Mode | Link format | Example |\n|---|---|---|\n| `Native` (default) | `[topic](topic.md)` | `[widgets](widgets.md)` |\n| `Obsidian` | `[[topic]]` | `[[widgets]]` |\n\n**Authoring contract:** Callers always pass `[[topic]]` placeholders. The vault rewrites at flush time via `RenderMode::rewrite_links`, which scans for `[[...]]` and replaces each with the active flavor. This makes body text portable across modes — switching from `native` to `obsidian` doesn't require re-authoring.\n\n**Backlink extraction** (`RenderMode::extract_links`) recognizes both forms so the backlinks index is invariant under render-mode flips. It also recognizes native-form links `[text](target.md)` — but only when `text == target`, which is what the vault always emits. This avoids false positives from generic markdown links like `[see this](docs/intro.md)`.\n\n## Topic Validation\n\n`validate_topic` enforces:\n\n- Non-empty\n- Max 100 characters\n- Not the reserved word `index`\n- Must not start with `_`\n- Only `[a-zA-Z0-9_-]` characters\n\nValidated on every `write` and `get` call. Violations return `WikiError::InvalidTopic` with the topic and reason.\n\n## Error Handling\n\nAll errors flow through `WikiError` with a `WikiResult<T>` type alias:\n\n| Variant | When |\n|---|---|\n| `Disabled` | `WikiVault::new` called with `enabled = false` |\n| `ModeNotImplemented` | `bridge` or `unsafe_local` mode requested |\n| `InvalidTopic` | Topic fails validation |\n| `BodyTooLarge` | Body exceeds 1 MiB cap |\n| `NotFound` | No `.md` file for the requested topic |\n| `HandEditConflict` | External edit detected and `force = false` |\n| `Frontmatter` | YAML parse error (carries `serde_yaml::Error` source) |\n| `Io` | Filesystem error (carries `std::io::Error` source) |\n\n`WikiError::io(path, source)` is a convenience constructor that wraps any `std::io::Error` with the file path for diagnostics.\n\n## Thread Safety\n\n`WikiVault` uses an internal `Mutex` (`write_lock`) to serialize all write operations. Concurrent writes to the same topic from multiple threads are safe — they'll either serialize cleanly or one will detect the mtime/sha256 drift from another thread's write and return `HandEditConflict` (unless `force = true`).\n\nRead operations (`get`, `search`, `backlinks`) do not acquire the lock — they read directly from disk.\n\n## Re-exports\n\nThe crate's public API (`lib.rs`):\n\n```rust\npub use error::{WikiError, WikiResult};\npub use frontmatter::{Frontmatter, ProvenanceEntry};\npub use render::RenderMode;\npub use vault::{\n    BacklinkEntry, MemoryWikiConfig, MemoryWikiMode,\n    SearchHit, WikiPage, WikiVault, WikiWriteOutcome,\n};\n// From librefang-types:\npub use librefang_types::config::{MemoryWikiIngestFilter, MemoryWikiRenderMode};\n```\n\n## v1 Scope and Limitations\n\n**In scope:**\n- `isolated` mode only — the vault owns its directory, its writes, its index.\n- Three tools: `wiki_get`, `wiki_search`, `wiki_write` (defined in `librefang-runtime`, not this crate).\n- `native` and `obsidian` render modes.\n- Hand-edit safety with compile-state tracking.\n- Atomic writes, CRLF tolerance, malformed frontmatter fallback.\n\n**Out of scope (tracked as #3329 follow-ups):**\n- `bridge` mode — reading shared artifacts from the memory substrate. The enum variant exists; the read path is stubbed.\n- `unsafe_local` mode — same-machine escape hatch for an existing Obsidian vault. Same stub.\n- Memory-event subscription (`memory_store` durable filter). v1 ingests only via explicit `wiki_write` calls.\n- LLM-assisted topic extraction. v1 requires explicit topic tags.\n- `memory_search` cross-corpus parameter (`corpus = all|kv|wiki`). Extending that touches the runtime tool surface.","memory-system":"# Memory System\n\n# Memory System\n\nThe Memory System provides LibreFang agents with durable, queryable state through two complementary storage layers: a structured persistence substrate and a human-editable knowledge vault.\n\n## Sub-modules\n\n| Sub-module | Role |\n|---|---|\n| [librefang-memory](librefang-memory-src.md) | Core persistence — SQLite-backed key/value and vector storage, plus decay, consolidation, idempotency, and usage metering services. |\n| [librefang-memory-wiki](librefang-memory-wiki-src.md) | Markdown knowledge vault — durable, Obsidian-compatible pages with auditable provenance frontmatter. Off by default; operators opt in via configuration. |\n\n## How the layers fit together\n\n```mermaid\ngraph LR\n  Agent[\"Agent\"] --> MS[\"MemorySubstrate<br/>(librefang-memory)\"]\n  Agent --> WV[\"WikiVault<br/>(librefang-memory-wiki)\"]\n  MS --> SQLite[\"SQLite + VectorStore\"]\n  WV --> Disk[\"Markdown files (*.md)\"]\n  MS -.->|\"chunker reuses<br/>frontmatter::split\"| WV\n```\n\n**librefang-memory** is the primary store. All structured agent state flows through the `MemorySubstrate` entry point into SQLite (WAL mode via `r2d2` + `rusqlite`) and a pluggable `VectorStore` backend (`SqliteVectorStore` for single-file deployment or `HttpVectorStore` for remote vector search).\n\n**librefang-memory-wiki** sits alongside it as an optional, human-readable layer. Pages are plain Markdown with YAML frontmatter recording which agent, session, channel, and turn produced each claim — making every fact auditable without querying the database.\n\nThe two layers share a thin code-level dependency: the chunker in `librefang-memory` reuses the `frontmatter::split` function from `librefang-memory-wiki` when segmenting text. Otherwise they are independent — an agent can use either or both without coupling.\n\n## Key cross-module workflows\n\n- **Write path** — Agents persist structured memories through `MemorySubstrate` and, when the wiki is enabled, publish curated knowledge to `WikiVault` via `wiki_write`.\n- **Read path** — Agents recall facts from the SQLite/vector substrate; operators and agents browse the wiki vault through `wiki_get` and `wiki_search`.\n- **Consolidation & decay** — `librefang-memory` automatically merges similar memories, decays old ones, and enforces idempotency and usage quotas — all invisible to the wiki layer.","other-librefang-acp-tests":"# Other — librefang-acp-tests\n\n# librefang-acp Integration Tests\n\nEnd-to-end test suite that validates the ACP adapter's on-the-wire JSON-RPC behaviour without requiring a real LibreFang kernel or LLM provider.\n\n## Purpose\n\nThese tests wire `librefang_acp::run_with_transport` to one end of an in-memory duplex pipe and drive a matching `agent_client_protocol::Client` on the other end. A stub `AcpKernel` implementation (`MockKernel`) provides canned responses, allowing the tests to assert:\n\n- Request/response shape and ordering\n- Notification delivery (streaming text chunks, history replay)\n- Permission round-trip (kernel approval → client → resolution)\n- Reverse-RPC paths (server issuing requests *to* the client for FS and terminal operations)\n- Error handling for invalid session IDs\n\n## Architecture\n\n```mermaid\ngraph LR\n    Client[\"ACP Client<br/>(agent_client_protocol)\"] -- \"JSON-RPC<br/>framed bytes\" --> Server[\"ACP Server<br/>(run_with_transport)\"]\n    Server --> Kernel[\"MockKernel<br/>(AcpKernel impl)\"]\n    Server -. \"reverse-RPC<br/>(fs/terminal)\" .-> Client\n    subgraph \"In-memory duplex\"\n        Client\n        Server\n    end\n```\n\nEach test follows the same topology: `duplex_pair()` creates two cross-wired `tokio::io::duplex` streams. The server reads from one pair and writes to the other; the client does the inverse. Both sides use `tokio_util::compat` to adapt tokio I/O to the `futures` traits that `agent_client_protocol::ByteStreams` expects.\n\n## Key Components\n\n### `MockKernel`\n\nA thread-safe, `Arc`-shared stub implementing the `AcpKernel` trait. Internal state is guarded by `AsyncMutex` (tokio) for async fields and `std::sync::Mutex` for sync fields that the test driver reads after initialization.\n\n| Field | Purpose |\n|---|---|\n| `canned_events` | `Vec<StreamEvent>` drained by `send_prompt`. Each prompt invocation takes ownership of the current contents. |\n| `approval_tx` | Broadcast channel for injecting `ApprovalEvent::Created` messages via `fire_approval`. |\n| `resolves` | Records `(Uuid, ApprovalDecision)` pairs from `resolve_approval` calls, so tests can assert the kernel received the correct decision. |\n| `last_session_id` | Captured from `send_prompt` arguments; used to correlate approval events with the right LibreFang session. |\n| `fs_client` / `terminal_client` | Stashed by `set_fs_client` / `set_terminal_client` (called during `initialize`), exposing `FsClientHandle` and `TerminalClientHandle` for reverse-RPC tests. |\n| `canned_history` | Returned by `fetch_session_history`; populated via `set_history` for the session-load replay test. |\n\n#### `fire_approval`\n\nInjects a synthetic `ApprovalEvent::Created` into the broadcast channel. The approval request always includes a non-`None` `tool_use_id` to exercise the primary tool-call-id mapping path rather than the fallback. Returns the `Uuid` of the created request so tests can wait for its resolution.\n\n### `duplex_pair()`\n\nCreates four I/O halves suitable for `agent_client_protocol::ByteStreams`:\n\n```\nServer reads from `a`  →  writes to `d`\nClient reads from `c`  →  writes to `b`\n```\n\nEach half is wrapped in `.compat()` / `.compat_write()` to bridge `tokio::io` ↔ `futures::io`.\n\n### `recv<T>(SentRequest<T>)`\n\nAwaits a typed JSON-RPC response from a `SentRequest`. Internally bridges the `on_receiving_result` callback to a `oneshot` channel. Used in every test to turn the ACP client's async callback pattern into a linear `.await?`.\n\n### `poll_for<T>(FnMut() -> Option<T>)`\n\nRetries a closure up to 40 times with 25ms sleeps (≈1s total) until it returns `Some`. Used to wait for handles that the server-side populates asynchronously during `initialize`.\n\n### `wait_for_session_id` / `wait_for_resolve`\n\nSpecialized polling helpers that spin on `last_session_id` and `resolves` respectively, with the same 40×25ms budget.\n\n## Test Scenarios\n\n### `initialize_and_prompt_emits_text_chunks_and_end_turn`\n\nValidates the core prompt flow:\n\n1. Client sends `initialize` → server responds with `agent_info.name == \"librefang\"`\n2. Client sends `new_session` → receives a `session_id`\n3. Client sends `prompt` with a text message\n4. `MockKernel.send_prompt` streams `TextDelta(\"Hello\")`, `TextDelta(\" world\")`, `ContentComplete(EndTurn)`\n5. Asserts `PromptResponse.stop_reason == EndTurn`\n6. Asserts the client received two `AgentMessageChunk` notifications containing the concatenated text\n\n### `permission_round_trip_resolves_kernel_approval`\n\nTests the full approval lifecycle:\n\n1. Initialize + new session + kick off a prompt (keeps the bridge alive)\n2. Wait for the kernel to record the LibreFang session ID\n3. Call `fire_approval` to inject an `ApprovalEvent::Created` into the broadcast\n4. Client's `on_receive_request` handler receives `RequestPermissionRequest`, responds with `allow_once`\n5. Asserts the bridge called `resolve_approval` with `ApprovalDecision::Approved`\n6. Prompt completes with `EndTurn`\n\n### `unknown_session_id_returns_invalid_params`\n\nNegative test: sending a `PromptRequest` with a fabricated session ID that was never created via `new_session` results in an error response from the server.\n\n### `fs_read_text_file_round_trip`\n\nValidates the reverse-RPC path for filesystem operations:\n\n1. Client declares `fs.read_text_file` capability during `initialize`\n2. Test driver retrieves the `FsClientHandle` stashed on the mock kernel\n3. Calls `handle.read_text_file(\"/tmp/hello.txt\")` — this issues a server-to-client JSON-RPC request\n4. Client's `on_receive_request` handler asserts the path and returns `\"canned editor content\"`\n5. Asserts the round-trip result matches\n\n### `terminal_run_command_round_trip`\n\nExercises the full terminal lifecycle via reverse-RPC:\n\n1. Client declares `terminal` capability during `initialize`\n2. Test driver retrieves `TerminalClientHandle` and calls `run_command(\"echo\", [\"hello\"], ...)`\n3. The server issues four sequential requests to the client:\n   - `create_terminal` → returns `TerminalId(\"term-1\")`\n   - `wait_for_terminal_exit` → returns exit code `0`\n   - `terminal_output` → returns `\"hello world\\n\"`, not truncated\n   - `release_terminal` → acknowledged\n4. Asserts `AcpTerminalRunResult` carries expected `output`, `exit_code`, and `truncated` flag\n\n### `session_load_replays_history_to_client`\n\nTests session reconnection and history replay:\n\n1. `MockKernel` is pre-loaded with two history entries (user + assistant turn)\n2. Client sends `load_session` with a stable session ID\n3. Server calls `fetch_session_history` and emits each entry as a `session/update` notification\n4. Asserts the client received exactly two notifications in order: `UserMessageChunk(\"previous question\")` then `AgentMessageChunk(\"previous answer\")`\n\n## Runtime Constraints\n\nAll tests use `#[tokio::test(flavor = \"current_thread\")]` with a `LocalSet`. This is required because `run_with_transport` and the ACP client's callback system rely on `!Send` futures spawned via `spawn_local`. Tests must not use `#[tokio::test]` with the multi-thread flavor.\n\n## Adding New Tests\n\nTo add a new integration test:\n\n1. Create a `MockKernel` with appropriate canned events (or empty if the test doesn't invoke `send_prompt`)\n2. Call `duplex_pair()` to get the four I/O halves\n3. Spawn `run_with_transport(kernel, agent_id, server_transport)` in a `spawn_local` task\n4. Build a `Client` with the necessary `on_receive_request` / `on_receive_notification` handlers\n5. Call `client.connect_with(transport, async |cx| { ... })` to drive the protocol\n6. Use `recv()` to await responses and `poll_for()` to wait for server-side side effects\n\nFor reverse-RPC tests (server calls client), remember to:\n- Set the relevant capability flag on `InitializeRequest.client_capabilities`\n- Retrieve the stashed handle (`fs_client_handle()` / `terminal_client_handle()`) via `poll_for` after `initialize` completes\n- Handle the corresponding request type in the client builder","other-librefang-acp":"# Other — librefang-acp\n\n# librefang-acp\n\nAgent Client Protocol (ACP) adapter for LibreFang. Bridges LibreFang agents into editor environments (Zed, VS Code, JetBrains) over stdio JSON-RPC.\n\n## Overview\n\nThis crate translates between the [Agent Client Protocol](https://github.com/Agenct-Client-Protocol/spec) — the standard wire format spoken by editor extensions — and LibreFang's internal kernel APIs. Editors launch a LibreFang process that communicates over stdin/stdout using JSON-RPC; this crate owns the server-side of that interaction.\n\nThe design separates **protocol handling** (always compiled in) from **kernel binding** (optional via feature flag), so alternative kernel backends or integration tests can implement the core trait directly without pulling in the full kernel dependency tree.\n\n## Architecture\n\n```mermaid\ngraph LR\n    Editor[\"Editor Extension<br/>(Zed / VS Code / JetBrains)\"]\n    ACP[\"librefang-acp<br/>(this crate)\"]\n    Kernel[\"librefang-kernel\"]\n    Types[\"librefang-types\"]\n    LLM[\"librefang-llm-driver\"]\n    Handle[\"librefang-kernel-handle\"]\n\n    Editor -->|\"stdio JSON-RPC<br/>(ACP)\"| ACP\n    ACP -->|\"AcpKernel trait\"| Kernel\n    ACP --> Types\n    ACP --> LLM\n    ACP --> Handle\n```\n\nThe crate has two layers:\n\n- **Protocol layer** — depends on `agent-client-protocol` and `agent-client-protocol-tokio` for JSON-RPC message framing and transport. Depends on `librefang-types`, `librefang-llm-driver`, and `librefang-kernel-handle` for LibreFang domain types. Always compiled.\n- **Kernel adapter** — gated behind the `kernel-adapter` feature. Provides `KernelAdapter`, which wraps `Arc<LibreFangKernel>` and implements the `AcpKernel` trait. This is the concrete binding used by `librefang-cli` (in-process hosting) and `librefang-api` (daemon-attached hosting).\n\n## Feature Flags\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `kernel-adapter` | off | Pulls in `librefang-kernel` and provides `KernelAdapter` — a concrete `AcpKernel` implementation backed by `Arc<LibreFangKernel>`. Enable this when the binary hosting the ACP server links against the full kernel. |\n\n### When to enable `kernel-adapter`\n\n- **Enable it** in `librefang-cli` and `librefang-api` — these binaries host the ACP server and need the real kernel.\n- **Leave it off** for integration tests, protocol fuzzer consumers, or alternative kernel backends. Implement `AcpKernel` directly instead.\n\n## Key Abstractions\n\n### `AcpKernel` trait\n\nThe central trait that protocol handlers call into. It abstracts the kernel operations the ACP wire protocol needs — session management, tool invocation, approval workflows, and conversation state. Anything implementing this trait can serve ACP requests.\n\n### `KernelAdapter`\n\nConcrete `AcpKernel` implementation (requires `kernel-adapter` feature). Wraps `Arc<LibreFangKernel>` and delegates trait methods to the underlying kernel. Downstream crates get a working ACP server by constructing this adapter and handing it to the server entry point.\n\n## Dependencies\n\n**Always required:**\n\n| Crate | Role |\n|-------|------|\n| `agent-client-protocol` | ACP type definitions and specification types |\n| `agent-client-protocol-tokio` | Tokio-based transport for ACP JSON-RPC |\n| `librefang-types` | LibreFang shared domain types |\n| `librefang-llm-driver` | LLM provider abstraction |\n| `librefang-kernel-handle` | Kernel handle types |\n| `dashmap` | Concurrent maps for session/request tracking |\n| `tokio` / `tokio-util` | Async runtime and codec utilities |\n| `serde` / `serde_json` | JSON serialization |\n| `tracing` | Structured logging |\n| `thiserror` | Error type derivation |\n| `uuid` | Session and request identifiers |\n\n**Optional:**\n\n| Crate | Flag | Role |\n|-------|------|------|\n| `librefang-kernel` | `kernel-adapter` | Full kernel for `KernelAdapter` |\n\n**Dev-only** (`futures`, `chrono`): Used by integration tests for duplex transport (`AsyncRead`/`AsyncWrite` bounds) and `ApprovalRequest` fixtures. Kept out of the release dependency tree.\n\n## Integration with Downstream Crates\n\n`librefang-cli` and `librefang-api` both depend on this crate with `kernel-adapter` enabled. They differ in how they host the server:\n\n- **`librefang-cli`** — runs the ACP server in-process. The editor launches the CLI binary directly; it creates a `KernelAdapter`, starts the stdio transport, and serves requests until the pipe closes.\n- **`librefang-api`** — attaches to an already-running daemon. The ACP server runs inside the long-lived API process, routing editor requests through to the shared kernel instance.\n\n## Testing\n\nIntegration tests live in `tests/acp_integration.rs`. They validate the protocol layer without requiring `kernel-adapter`, using a test `AcpKernel` implementation that stubs kernel behavior. This keeps test compilation fast and isolates protocol correctness from kernel internals.\n\nThe test suite uses `tokio::test` with the `rt-multi-thread` and `test-util` features, and exercises the duplex transport directly through `futures`' `AsyncRead`/`AsyncWrite` combinators.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\n## Overview\n\nThe dashboard is a single-page application for managing and monitoring LibreFang agents. Built on **React 19**, **TanStack Router v1**, and **TanStack Query v5**, it provides a real-time interface to the LibreFang kernel's REST API for agent lifecycle management, session control, channel configuration, memory inspection, analytics, and more.\n\n**Entry point:** `src/main.tsx`  \n**Page components:** `src/pages/`  \n**HTML shell:** `index.html` (mounts `<div id=\"root\">`, registers service worker)\n\n---\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[\"Pages<br/>src/pages/\"] --> B[\"Hooks Layer\"]\n    B --> C[\"Queries<br/>src/lib/queries/\"]\n    B --> D[\"Mutations<br/>src/lib/mutations/\"]\n    C --> E[\"Query Keys<br/>src/lib/queries/keys.ts\"]\n    D --> E\n    C --> F[\"HTTP Client<br/>src/lib/http/client.ts\"]\n    D --> F\n    F --> G[\"Raw API Calls<br/>src/api.ts\"]\n    G --> H[\"LibreFang Kernel<br/>REST API\"]\n    I[\"Components<br/>src/components/\"] --> B\n```\n\nAll data flows one direction: pages and components consume hooks from the shared queries/mutations layer, which calls through the HTTP client to `src/api.ts`, which communicates with the backend.\n\n---\n\n## Data Layer\n\n### Core Rule\n\n**Pages and components never call `fetch()` or `api.*` directly.** All data access goes through the hooks layer. The only exceptions are streaming/SSE endpoints, imperative fire-and-forget control channels (e.g., `src/components/TerminalTabs.tsx` terminal lifecycle), and one-shot probes that must not be cached. These exceptions must be narrow and commented.\n\n### Directory Layout\n\n```\nsrc/lib/\n  http/\n    client.ts      # Thin wrapper over src/api.ts + typed re-exports\n    errors.ts      # ApiError class used by the wrapper\n  queries/\n    keys.ts        # All query-key factories — edit when adding a domain\n    keys.test.ts   # Smoke tests — add cases when adding a factory\n    <domain>.ts    # queryOptions + useXxx hooks per domain\n  mutations/\n    <domain>.ts    # useXxx mutation hooks with cache invalidation\n```\n\n### Active Domains\n\n`agents` · `analytics` · `approvals` · `channels` · `config` · `goals` · `hands` · `mcp` · `media` · `memory` · `models` · `network` · `overview` · `plugins` · `providers` · `runtime` · `schedules` · `sessions` · `skills` · `workflows`\n\n---\n\n## Adding a New Endpoint\n\n### Step 1: Raw API Call\n\nAdd the raw call in `src/api.ts`. If needed, re-export via `src/lib/http/client.ts`.\n\n### Step 2: Query Key Factory\n\nIf this is a new domain, add a factory in `src/lib/queries/keys.ts`. Every sub-key **must** be anchored with `...fooKeys.all` so broad invalidation works correctly:\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\n### Step 3: Query Hook\n\nAdd the query in `src/lib/queries/<domain>.ts`:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters) {\n  return useQuery(fooQueryOptions(filters));\n}\n```\n\nAccept an optional `options` argument for per-call overrides (see [Query Options Override Pattern](#query-options-override-pattern)):\n\n```ts\ntype UseFooOptions = {\n  enabled?: boolean;\n  staleTime?: number;\n  refetchInterval?: number | false;\n};\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  const { enabled, staleTime, refetchInterval } = options;\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled,\n    staleTime,\n    refetchInterval,\n  });\n}\n```\n\n### Step 4: Mutation Hook\n\nAdd mutations in `src/lib/mutations/<domain>.ts`. **Every write must invalidate**, and invalidation must live inside the hook. Call sites may attach per-call `onSuccess`/`onError` for UI feedback — that is orthogonal to invalidation.\n\n**Prefer the narrowest matching keys.** Use `fooKeys.all` only when the mutation truly dirties every sub-key in the domain.\n\n**Invalidation strategy guide:**\n\n| Scenario | Keys to Invalidate | Example |\n|---|---|---|\n| Per-id update where list projection changes (default) | `fooKeys.lists()` + `fooKeys.detail(id)` | `usePatchAgentConfig`, experiment mutations |\n| List-shape change, no existing detail stale | `fooKeys.lists()` | Create, delete, reorder |\n| Change scoped to one detail or nested collection | `fooKeys.detail(id)` or nested sub-key | Detail-only update |\n| Bulk import / cache reset / cross-cutting migration | `fooKeys.all` | Bulk import |\n\n**Fan-out warning:** Invalidating `fooKeys.all` when N items are cached causes N+1 refetches (the list plus every cached sub-key for each item). Reserve this for genuinely cross-cutting changes.\n\n```ts\n// Default template: per-id patch where list projection also changes\nexport function useUpdateFoo() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: updateFoo,\n    onSuccess: (_data, variables) => {\n      qc.invalidateQueries({ queryKey: fooKeys.lists() });\n      qc.invalidateQueries({ queryKey: fooKeys.detail(variables.id) });\n    },\n  });\n}\n\n// Lists-only: membership changed\nexport function useCreateFoo() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: createFoo,\n    onSuccess: () => qc.invalidateQueries({ queryKey: fooKeys.lists() }),\n  });\n}\n\n// Bulk — NOT the default\nexport function useImportFoos() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: importFoos,\n    onSuccess: () => qc.invalidateQueries({ queryKey: fooKeys.all }),\n  });\n}\n```\n\n### Step 5: Key Factory Tests\n\nUpdate `src/lib/queries/keys.test.ts`. At minimum, add the new factory to the \"all factories exist\" list. Add anchoring/hierarchy tests for non-trivial factories.\n\n---\n\n## Consuming Hooks in Pages\n\n```tsx\nimport { useFoo } from \"../lib/queries/foo\";\nimport { useCreateFoo } from \"../lib/mutations/foo\";\n\nfunction FooPage() {\n  const { data, isLoading } = useFoo({ active: true });\n  const createFoo = useCreateFoo();\n  // ...\n}\n```\n\n**Rules:**\n- Never build a `queryKey` inline — always call the factory.\n- Never subscribe to the same endpoint with a different key for a subset; use `select` on the shared `queryOptions`.\n\n---\n\n## Query Options Override Pattern\n\nHooks set sensible defaults via `queryOptions` (shared `staleTime` / `refetchInterval`). Call sites can override per-page needs through the `options` argument. Common patterns:\n\n| Override | Use Case | Example |\n|---|---|---|\n| `enabled` | Gate query by tab visibility or modal state | `useApprovals({ enabled: open })` |\n| `refetchInterval` | Fast polling for live data | `useCommsEvents(50, { refetchInterval: 5_000 })` |\n| `enabled` (conditional) | Skip query until prerequisite resolved | `useModels({}, { enabled: isModelArg })` |\n| `enabled` (gate) | Pause background fetch when inactive | `useAgentTemplates({ enabled })` |\n\nEvery call-site override must carry a short inline comment explaining why.\n\n---\n\n## Mutation Invalidation vs. UI Feedback\n\nMutation invalidation is encapsulated in the hook — callers never need to know which keys a mutation touches. Call sites may attach per-call `onSuccess`/`onError` handlers for UI feedback (toasts, modal dismissal, local state updates). See `MemoryPage` delete/cleanup and `ChannelsPage` configure/test for reference patterns.\n\n---\n\n## Navigation & Pages\n\nThe dashboard shell provides navigation links to these top-level pages:\n\n| Link | Page Component | Purpose |\n|---|---|---|\n| Overview | OverviewPage | System health and KPI summary |\n| Agents | AgentsPage | Agent lifecycle management |\n| Sessions | SessionsPage | Session listing and control |\n| Approvals | ApprovalsPage | Pending approval queue |\n| Comms | CommsPage | Inter-agent communication |\n| Providers | ProvidersPage | LLM provider configuration |\n| Channels | ChannelsPage | Channel adapter setup |\n| Skills | SkillsPage | Skill management |\n| Hands | HandsPage | Hand (browser automation) instances |\n| Workflows | WorkflowsPage | Workflow orchestration |\n| Scheduler | SchedulesPage | Cron job management |\n| Goals | GoalsPage | Goal tracking |\n| Analytics | AnalyticsPage | Usage analytics and cost |\n| Memory | MemoryPage | Proactive memory inspection |\n| Runtime | RuntimePage | Runtime diagnostics |\n| Logs | LogsPage | Audit log viewer |\n\n---\n\n## Authentication\n\nThe dashboard checks authentication mode via `/api/auth/dashboard-check`. When the response returns `{ mode: \"credentials\" }`, the app presents a sign-in dialog with username/password fields. Other modes (e.g., OAuth providers) are handled via provider-specific flows.\n\n---\n\n## Type System\n\n- **TypeScript strict mode** — no `any` in new hooks.\n- **Canonical types** live in `src/api.ts` — the hand-maintained type source consumed by the SPA.\n- `openapi/generated.ts` is a **regenerable cross-reference only**. It is not imported anywhere in `src/`. Refresh it with `pnpm openapi:types` (requires a running daemon on port 4545) to get a typed diff against the live OpenAPI schema.\n\n---\n\n## Testing\n\nThe test infrastructure uses `vitest` with MSW for API mocking. A shared test utility at `src/lib/test/query-client.tsx` exports `createQueryClientWrapper` for hook tests.\n\n### Test Categories\n\n- **Key factory tests** (`src/lib/queries/keys.test.ts`) — validate anchoring and hierarchy for all query-key factories.\n- **Hook tests** (`src/lib/queries/*.test.tsx`, `src/lib/mutations/*.test.tsx`) — verify query options, enabled guards, and mutation invalidation.\n- **Page tests** (`src/pages/*.test.tsx`) — component rendering and user interaction.\n- **E2E tests** (`e2e/dashboard.spec.ts`) — Playwright tests for shell loading, navigation, and auth dialog.\n\n### Test Helpers\n\nPages commonly define `renderPage`, `makeQuery`, and `setMutationDefaults` helper functions within their test files to configure MSW handlers and mount components with the correct router/query context.\n\n---\n\n## Build & Verification\n\nRun all three commands after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`:\n\n```bash\npnpm typecheck    # tsc --noEmit — must pass\npnpm test --run   # vitest — all tests must pass\npnpm build        # vite build — must succeed\n```\n\nA passing typecheck alone is insufficient — the key-factory tests catch anchoring regressions that the compiler does not detect.\n\n---\n\n## Commit Convention\n\nFollows the root repo format scoped to dashboard areas:\n\n```\nfeat(dashboard/<area>): ...\nrefactor(dashboard/queries): ...\nfix(dashboard/<area>): ...\n```\n\nNever include a `Co-Authored-By` footer.","other-librefang-api-src":"# Other — librefang-api-src\n\n# Login Page (`librefang-api/src/login_page.html`)\n\n## Overview\n\nThis is a self-contained, single-file HTML login page served by the LibreFang API server. It handles dashboard authentication for users, including optional TOTP-based two-factor authentication. The page requires no build step, no external dependencies, and no JavaScript framework — it ships as-is from the API source.\n\n## Purpose\n\nWhen the API server requires authentication before serving the dashboard SPA, it renders this page inline at `/dashboard` or `/dashboard/`. The user authenticates, receives a JWT token, and is redirected to the SPA root at `/`.\n\n## Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant LoginPage\n    participant API as /api/auth/dashboard-login\n\n    User->>LoginPage: Submits username + password\n    LoginPage->>API: POST {username, password}\n    API-->>LoginPage: {ok, token}\n    LoginPage->>LoginPage: Store token in localStorage\n    LoginPage->>User: Redirect to original path or /\n\n    Note over LoginPage,API: If TOTP required\n    API-->>LoginPage: {requires_totp: true}\n    LoginPage->>User: Show TOTP input field\n    User->>LoginPage: Submits TOTP code\n    LoginPage->>API: POST {username, password, totp_code}\n    API-->>LoginPage: {ok, token}\n```\n\nThe flow is a two-step process orchestrated entirely client-side:\n\n1. **Initial submission** — The user provides username and password. The page POSTs these as JSON to `/api/auth/dashboard-login`.\n2. **TOTP challenge** (conditional) — If the server responds with `{requires_totp: true}`, the TOTP input row is revealed and focused. The user enters a 6-digit code.\n3. **Re-submission** — On the next form submit, the payload includes `totp_code` alongside the credentials.\n4. **Success** — The server returns `{ok: true, token: \"...\"}`. The token is persisted to `localStorage` under the key `librefang-api-key`, and the browser redirects.\n\n## Token Storage\n\nThe JWT is stored in:\n\n```\nlocalStorage['librefang-api-key']\n```\n\nAny downstream SPA or API client must read the token from this same key. The `try/catch` around `localStorage.setItem` guards against environments where storage is disabled or full.\n\n## Redirect Logic\n\nAfter successful authentication, the page preserves the user's original destination when possible:\n\n```javascript\nvar path = location.pathname;\nvar target = path + location.search + location.hash;\nif (path === '/' || path === '/dashboard' || path === '/dashboard/') {\n  target = '/';\n}\nlocation.replace(target);\n```\n\n- **Paths like `/some/deep/page`** — search and hash are preserved; the user returns to where they were.\n- **Paths `/`, `/dashboard`, `/dashboard/`** — these are collapsed to `/` because the SPA shell is served only at the root. The `/dashboard` path exists solely to host this login page and SPA build assets. Redirecting back to `/dashboard` would hit a 404. Search and hash are intentionally dropped here (see issue #4860).\n\n## UI Behavior\n\n### Dark/Light Mode\n\nThe page respects the user's system preference via `prefers-color-scheme`. A CSS custom property `color-scheme: light dark` on `:root` enables native form element theming, while a `@media (prefers-color-scheme: light)` block overrides the dark-mode defaults.\n\n### Accessibility\n\n- Error messages use `aria-live=\"polite\"` so screen readers announce validation and server errors.\n- All inputs have associated `<label>` elements.\n- `autocomplete` attributes are set to `username`, `current-password`, and `one-time-code` for proper browser autofill and password manager support.\n- The username input has `autofocus`.\n\n### Responsive Layout\n\nThe card is constrained to `min(92vw, 380px)`, centered via CSS grid `place-items: center`. This ensures usability on both narrow mobile screens and desktop viewports.\n\n## API Contract\n\nThe page communicates with a single endpoint:\n\n### `POST /api/auth/dashboard-login`\n\n**Request body:**\n\n```json\n{\n  \"username\": \"string\",\n  \"password\": \"string\",\n  \"totp_code\": \"string (optional, 6 digits)\"\n}\n```\n\n**Response — success:**\n\n```json\n{\n  \"ok\": true,\n  \"token\": \"jwt-token-string\"\n}\n```\n\n**Response — TOTP required:**\n\n```json\n{\n  \"requires_totp\": true\n}\n```\n\n**Response — failure:**\n\n```json\n{\n  \"ok\": false,\n  \"error\": \"Human-readable error message\"\n}\n```\n\nThe page reads `d.error` for the displayed error text. If the field is missing, it falls back to `\"Sign in failed.\"`. Network-level failures display `\"Network error.\"`.\n\n## Integration Notes\n\n- **No build step required.** This file is served directly by the API server as a static string or template.\n- **No external dependencies.** All CSS and JS is inline. There are no CDN links, no frameworks, and no fetch polyfills (assumes modern browsers).\n- **The `credentials: 'same-origin'` option** on the fetch call ensures cookies (e.g., session cookies) are included with the request, which may be relevant depending on server-side session handling.\n- **The `<meta name=\"robots\" content=\"noindex, nofollow\">` tag** prevents search engines from indexing the login page.","other-librefang-api-static":"# Other — librefang-api-static\n\n# LibreFang Dashboard Internationalization (i18n) — Static Locale Files\n\n## Purpose\n\nThe `librefang-api/static/locales/` directory contains the translation catalogs for the LibreFang web dashboard. These JSON files provide every user-facing string used across all dashboard pages, components, dialogs, and toast notifications. The frontend's i18n runtime loads the appropriate file based on the user's language preference and resolves translation keys at render time.\n\nCurrently supported languages:\n\n| File | Language | Code |\n|------|----------|------|\n| `en.json` | English | `en` |\n| `ja.json` | Japanese | `ja` |\n\n## How It Works\n\nThe dashboard uses an i18n library (bundled as `i18n-4qyNqnlA.js`) that:\n\n1. **Loads locale files** from `/static/locales/{lang}.json` at application boot\n2. **Resolves keys** via `t(\"key.path\")` or the `getFixedT` function for scoped translations\n3. **Interpolates parameters** using `{variableName}` placeholders (e.g., `\"agentsStopped\": \"{count} agent(s) stopped\"`)\n\n### Interpolation Syntax\n\nPlaceholders in strings use curly braces. The frontend substitutes them at runtime:\n\n```json\n\"entriesCount\": \"{filtered} of {total} entries\"\n```\n\nGiven `{ filtered: 3, total: 50 }`, this renders as: `3 of 50 entries`.\n\n## File Structure\n\nEach locale file is a flat JSON object with **top-level namespace keys** that map to dashboard sections. The structure is identical across all language files — every key present in `en.json` must also exist in `ja.json`.\n\n### Namespace Map\n\n```\nlocales/\n├── en.json\n└── ja.json\n```\n\n```mermaid\ngraph TD\n    A[Locale File] --> B[Navigation & Shell]\n    A --> C[Feature Pages]\n    A --> D[Setup & Onboarding]\n    A --> E[Shared Components]\n    \n    B --> B1[nav]\n    B --> B2[status]\n    B --> B3[btn]\n    B --> B4[label]\n    B --> B5[theme]\n    B --> B6[sidebar]\n    B --> B7[auth]\n    \n    C --> C1[overview]\n    C --> C2[agentChat]\n    C --> C3[agentsPage]\n    C --> C4[sessionsPage]\n    C --> C5[settingsPage]\n    C --> C6[channelsPage]\n    C --> C7[skillsPage]\n    C --> C8[handsPage]\n    C --> C9[pluginsPage]\n    C --> C10[logsPage]\n    C --> C11[runtimePage]\n    C --> C12[approvals]\n    C --> C13[commsPage]\n    C --> C14[workflowsPage]\n    C --> C15[schedulerPage]\n    C --> C16[goalsPage]\n    C --> C17[analyticsPage]\n    C --> C18[memoryPage]\n    \n    D --> D1[onboarding]\n    D --> D2[setupWizard]\n    D --> D3[provider]\n    \n    E --> E1[time]\n    E --> E2[mode]\n    E --> E3[profile]\n    E --> E4[template]\n    E --> E5[category]\n    E --> E6[security]\n    E --> E7[confirm]\n```\n\n### Key Namespaces Reference\n\n#### Shell & Navigation (`nav`, `status`, `btn`, `label`, `auth`, `theme`, `sidebar`)\n\nReusable strings for the application chrome — sidebar items, connection status indicators, standard button labels, form field labels, the API key authentication screen, theme selector, and sidebar keyboard shortcut hints.\n\n```json\n{\n  \"nav\": { \"chat\": \"Chat\", \"agents\": \"Agents\", ... },\n  \"btn\": { \"refresh\": \"Refresh\", \"save\": \"Save\", ... },\n  \"status\": { \"connecting\": \"Connecting...\", \"ready\": \"ready\", ... }\n}\n```\n\n#### Agent Chat (`agentChat`)\n\nThe largest namespace (~150 keys). Covers the entire chat interface including:\n\n- **Chat states**: `\"ready\"`, `\"generating\"`, `\"thinking\"`, `\"thinkingWithLevel\"`, `\"usingTool\"`, `\"working\"`\n- **Sessions**: `\"sessions\"`, `\"newSession\"`, `\"sessionDefault\"`, `\"switchSessionFailed\"`\n- **Slash commands** (`agentChat.cmd.*`): 18 commands from `/help` to `/a2a`\n- **Toast notifications** (`agentChat.toast.*`): success/failure messages for model switches, session resets, compaction\n- **System messages** (`agentChat.sys.*`): responses to commands like `/status`, `/budget`, `/peers`\n- **File handling**: drag-and-drop, upload errors, size limits\n- **Voice recording**: `\"recordingRelease\"`, `\"transcribingAudio\"`, `\"microphoneDenied\"`\n- **Welcome tips**: Markdown-formatted help text shown to new users\n\n#### Agent Management (`agentsPage`, `detail`, `profile`, `template`, `mode`, `category`)\n\nStrings for creating, configuring, and managing agents:\n\n- **Creation**: wizard mode, raw TOML mode, spawn confirmation\n- **Detail view**: info/files/config tabs, tool filters (allowlist/blocklist), fallback chains\n- **Profiles** (`profile.*`): 9 tool profiles from `minimal` to `full`, each with a label and description\n- **Templates** (`template.*`): 10 pre-built agent templates (GeneralAssistant, CodeHelper, Researcher, etc.)\n- **Archetypes** (`agentsPage.archetype.*`): assistant, researcher, coder, writer, devops, support, analyst, custom\n- **Vibes** (`agentsPage.vibe.*`): professional, friendly, technical, creative, concise, mentor\n\n#### Settings (`settingsPage`)\n\nThe second-largest namespace, organized into sub-sections:\n\n| Sub-namespace | Content |\n|---------------|---------|\n| LLM providers | API key forms, connection testing, custom provider setup |\n| Model catalog | Search, filtering, custom models, catalog sync |\n| Tools | Tool listing and search |\n| Security (`coreFeatures`, `configurableFeatures`, `monitoringFeatures`) | 8 core protections, 4 configurable controls, 3 monitoring systems |\n| Network (`peerNetworkingTitle`, `a2aExternalAgents`) | OFP mesh, peer discovery, A2A agents |\n| Budget | Hourly/daily/monthly limits, alert thresholds, top spenders |\n| Proactive Memory | Auto-memorize, auto-retrieve, extraction config, decay rates |\n| Migration | OpenClaw/OpenFang import workflow |\n| System | Runtime configuration, raw JSON editor |\n\nThe security features sub-namespaces (`coreFeatures.*`, `configurableFeatures.*`, `monitoringFeatures.*`) are particularly detailed — each feature includes a `name`, `description`, and either a `threat` (for core features) or a `hint` (for configurable/monitoring features).\n\n#### Workflow System (`workflowsPage`, `workflowBuilder`)\n\nStrings for the workflow list view and the visual drag-and-drop builder:\n\n- **Builder** (`workflowBuilder.nodeType.*`): 7 node types (agentStep, parallelFanOut, condition, loop, collect, start, end)\n- **Node configuration**: agent selection, prompt templates, fan-out count, strategy (all/first/majority)\n- **TOML export**: generated TOML display and copy\n\n#### Scheduler (`schedulerPage`)\n\nCovers three tabs:\n\n- **Scheduled Jobs**: cron expressions, quick presets (`schedulerPage.cron.*` — 20+ presets from \"every minute\" to \"Mondays at midnight\"), run history\n- **Event Triggers** (`schedulerPage.triggerType.*`): lifecycle, system, memory events\n- **Run History**: execution log with time, type, and status\n\n#### Channels (`channelsPage`)\n\nMessaging channel configuration with a 3-step wizard (configure → verify → ready):\n\n- **Categories**: messaging, social, enterprise, developer, notifications\n- **Channel statuses**: notConfigured, missingToken, ready, configured\n- **WhatsApp-specific**: QR code flow, Business API alternative\n- **Connection testing** and credential management\n\n#### Skills (`skillsPage`)\n\nFour tabs with distinct content:\n\n- **Installed**: local and ClawHub skills\n- **ClawHub**: search, browse by category (`skillsPage.category.*` — 18 categories), sort (trending/downloads/stars/updated)\n- **MCP Servers**: connected/configured server lists, tool counts\n- **Quick Start** (`skillsPage.quickStartSkill.*`): 4 one-click prompt-only skills\n- **Security**: scan results, install warnings, blocked notifications\n\n#### Hands (`handsPage`)\n\nAutonomous capability packages with a 3-step setup (dependencies → configure → launch):\n\n- Dependency detection and installation\n- Agent configuration and activation\n- Browser session viewing (for browser-capable hands)\n- Status: active, paused, inactive, error\n\n#### Other Pages\n\n| Namespace | Content |\n|-----------|---------|\n| `sessionsPage` | Conversation history and per-agent key-value memory store |\n| `approvals` | Execution approval queue with pending/approved/rejected/expired states |\n| `logsPage` | Live log stream and tamper-evident audit trail with chain verification |\n| `runtimePage` | System info, platform details, provider status, model list |\n| `commsPage` | Inter-agent messaging, task posting, topology view, live event feed |\n| `goalsPage` | Goal tracking with sub-goals, status (pending/inProgress/completed/cancelled) |\n| `analyticsPage` | Token usage, cost breakdown, daily cost charts, per-model/per-agent stats |\n| `memoryPage` | Proactive memory system browser with search, CRUD, version history |\n| `pluginsPage` | Plugin management with registry, local path, and Git URL install sources |\n\n## Adding a New Language\n\nTo add a new language (e.g., French):\n\n1. Copy `en.json` to `fr.json`\n2. Translate all string values (not keys) to French\n3. Keep the JSON structure and key names **identical** to `en.json`\n4. Register the new language in the frontend's i18n configuration\n\n### Translation Checklist\n\nWhen translating, pay attention to:\n\n- **Interpolation tokens** (`{count}`, `{name}`, `{message}`) must be preserved exactly\n- **Markdown formatting** in strings like `agentChat.welcomeTips` must be preserved\n- **Keyboard shortcuts** (`Ctrl+Shift+F`, `Ctrl+/`) are typically not translated\n- **Technical terms** (TOML, MCP, WASM, Ed25519, GCRA) are generally kept as-is\n\n## Adding New Translation Keys\n\nWhen adding a new UI feature:\n\n1. Add the key to **both** `en.json` and `ja.json` (and any other language files)\n2. Use dot-separated namespaces that match the page/component: e.g., a new analytics feature goes under `analyticsPage.*`\n3. Use `{variableName}` for dynamic values — avoid positional placeholders\n4. For pluralization-sensitive strings, use a form that works for both singular and plural (e.g., `\"{count} agent(s) stopped\"`)\n\n## Relationship to the Rest of the Codebase\n\n```\n┌──────────────────────┐         ┌─────────────────────┐\n│  librefang-api       │         │  React Dashboard    │\n│  (Rust backend)      │         │  (SPA frontend)     │\n│                      │  serves │                     │\n│  static/locales/  ───┼────────►│  i18n runtime       │\n│    en.json           │  HTTP   │    ↓                │\n│    ja.json           │         │  t(\"key.path\")      │\n└──────────────────────┘         └─────────────────────┘\n```\n\n- The **Rust API server** (`librefang-api`) serves these files as static assets under `/static/locales/`\n- The **React dashboard** fetches them during initialization and uses the i18n library's `getFixedT` for scoped translation resolution\n- Route handlers in the API (e.g., `src/routes/*.rs`) do not consume these files directly — they are purely frontend resources\n- Test harnesses call `nest` on the router, which mounts the static file serving; this is why integration tests reference the same static asset path\n\n### Key Interactions\n\n| Consumer | Usage |\n|----------|-------|\n| `ChatPage` component | `agentChat.*` keys for the entire chat interface |\n| `AgentsPage` component | `agentsPage.*`, `detail.*`, `profile.*` keys |\n| `SettingsPage` component | `settingsPage.*` with its ~200+ keys across 10 tabs |\n| `LogsPage` component | `logsPage.*` for live stream and audit trail |\n| `SetupWizard` component | `setupWizard.*` for the 5-step guided setup |\n| All pages | `btn.*`, `status.*`, `confirm.*` for shared UI elements |\n\n## Key Count Summary\n\nThe English locale file contains approximately **1,200+ translation keys** across **30+ top-level namespaces**, covering every user-facing string in the LibreFang dashboard. The Japanese file mirrors this structure with full translations for all keys.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests\n\nIntegration test suite for the LibreFang HTTP API layer. Tests exercise real route registration, middleware wiring, and handler logic — no mocks at the HTTP boundary. Each test file targets a specific route family or cross-cutting concern.\n\n## Running\n\n```sh\n# All integration tests\ncargo test -p librefang-api\n\n# Single test file\ncargo test -p librefang-api --test agents_routes_integration\n\n# Tests requiring real LLM credentials (GROQ_API_KEY)\ncargo test -p librefang-api --test api_integration_test -- --nocapture\n```\n\nAll tests use `#[tokio::test(flavor = \"multi_thread\")]` because kernel boot spawns background tasks that require a multi-threaded runtime.\n\n## Architecture\n\nTests use two complementary harness patterns depending on what's being exercised:\n\n```mermaid\ngraph TD\n    A[Test File] --> B{Scope?}\n    B -->|Full router + auth middleware| C[server::build_router]\n    B -->|Single route module| D[MockKernelBuilder + Router::nest]\n    C --> E[tower::oneshot or reqwest::Client]\n    D --> E\n    E --> F[Assert status + JSON body]\n```\n\n### Full-router harness (`server::build_router`)\n\nUsed by `a2a_routes_integration`, `agents_routes_integration`, `api_deny_unknown_fields_test`, and parts of `api_integration_test`. Boots a real `LibreFangKernel` with a temp directory and constructs the production router via `server::build_router(kernel, addr)`. This exercises the complete middleware stack (auth, logging, CORS).\n\nRequests are sent via `tower::ServiceExt::oneshot` — no TCP listener is bound. The kernel's registry cache is pre-populated via `registry_sync::sync_registry` to avoid network access during boot.\n\n### Partial-router harness (`MockKernelBuilder`)\n\nUsed by `access_log_agent_id_test`, `access_log_session_id_test`, `agent_kv_authz_integration`, and other focused tests. Constructs a `MockKernelBuilder` → `TestAppState` → `Arc<AppState>`, then nests only the route module under test into a minimal `Router`. This avoids booting subsystems unrelated to the test surface.\n\n```rust\nlet test = TestAppState::with_builder(MockKernelBuilder::new().with_config(|cfg| {\n    cfg.default_model.provider = \"ollama\".to_string();\n    // ...\n}));\nlet state: Arc<AppState> = test.state.clone();\nlet app = Router::new()\n    .nest(\"/api\", routes::agents::router())\n    .with_state(state);\n```\n\n### TCP-listener harness\n\nUsed by `agent_identity_registry_test` and the spawn/kill flow in `api_integration_test`. Binds a real `TcpListener` on `127.0.0.1:0`, spawns `axum::serve` in a background task, and hits endpoints with `reqwest::Client`. Necessary when the test surface depends on real HTTP connection metadata (e.g., `ConnectInfo` for loopback detection).\n\n## Test harness conventions\n\nEvery harness struct holds:\n\n| Field | Purpose |\n|-------|---------|\n| `app: Router` | The axum router to send requests through |\n| `state: Arc<AppState>` | Shared state for direct kernel assertions |\n| `_tmp: TempDir` | Keeps the temp dir alive for the test's duration |\n\nThe `Drop` impl on harness structs calls `state.kernel.shutdown()` to clean up background tasks.\n\n### The `send` helper\n\nMost files define a `send(harness, method, path, body, authed)` function that:\n\n1. Builds an `axum::http::Request<Body>`\n2. Optionally attaches `Authorization: Bearer <api_key>`\n3. Calls `app.clone().oneshot(req).await`\n4. Returns `(StatusCode, serde_json::Value)`\n\n## Test files and their coverage\n\n### `agents_routes_integration.rs`\n\nRoute family: `GET/PATCH/DELETE /api/agents`, `GET /api/agents/{id}`, `POST /api/agents/{id}/message`.\n\nKey scenarios:\n- **List agents** — empty filter, populated list, invalid sort field rejection\n- **Get agent** — happy path, invalid UUID → 400, unknown UUID → 404\n- **PATCH agent** — name/description update with read-after-write, invalid `mcp_servers` payload → 400, auth gate → 401\n- **Schedule field** (`ScheduleMode`) — reactive/continuous/periodic update, malformed schedule rejection, unrelated PATCH preserving schedule, background loop start/stop\n- **DELETE idempotency** — double-delete returns 200 with `already-deleted`, unknown UUID is also 200\n- **Workspace path security** — absolute path inside root accepted, outside root rejected, `..` traversal rejected\n- **Thinking blocks** — `ContentBlock::Thinking` surfaced in session endpoint, omitted when absent, thinking-only turns preserved\n- **Incognito mode** — `incognito: true` deserializes without 422, defaults to false when omitted\n\n### `a2a_routes_integration.rs`\n\nRoute family: `/a2a/agents` (public federation), `/api/a2a/agents`, `/api/a2a/agents/{id}`, `/api/a2a/discover`, `/api/a2a/send`, `/api/a2a/tasks/{id}/status`, `/api/a2a/agents/{id}/approve`.\n\nOutbound HTTP is **not** exercised — tests cover only validation, trust-gate, and error paths:\n\n- SSRF guard rejects `localhost` URLs before any network call\n- Trust gate blocks `/send` and `/tasks/{id}/status` against unapproved targets\n- Federation endpoint returns `PaginatedResponse` envelope without legacy `agents` field\n- Auth gates verified per route\n\n### `access_log_agent_id_test.rs`\n\nCross-cutting: `AgentIdField` extension marker on `Response::extensions`.\n\nTests assert the marker is present even on error responses (404 for unknown agent) so the access-log middleware can emit a non-empty `agent_id` field. Malformed UUIDs that fail extraction produce no marker — that's the documented contract.\n\n### `access_log_session_id_test.rs`\n\nCross-cutting: `SessionIdField` extension marker.\n\n- Successful session lookup → marker present\n- Unknown agent → marker absent (no session was resolved)\n- SSE stream endpoint 404 → marker absent\n\n### `agent_identity_registry_test.rs`\n\nAgent UUID identity lifecycle:\n\n- Spawn registers canonical UUID via `AgentId::from_name`\n- DELETE without `?confirm=true` → 409 `delete_confirmation_required` (registry preserved)\n- DELETE with `?confirm=true` → 200, identity purged, respawn recovers the same deterministic UUID\n- `GET /api/agents/identities` lists registered entries\n- `POST /api/agents/identities/{name}/reset` gated on `?confirm=true`\n\n### `agent_kv_authz_integration.rs`\n\nOwner-scoping on per-agent KV store (`/api/memory/agents/{id}/kv*`, `/api/agents/{id}/memory/export|import`).\n\nUses `AuthenticatedApiUser` extensions to simulate different caller roles:\n\n| Caller | Own agent | Other agent |\n|--------|-----------|-------------|\n| Admin | 200 | 200 (passes owner check, may 404 on missing key) |\n| Owner (viewer role) | 200 | 404 |\n| Non-owner (viewer role) | 200 | 404 |\n| Anonymous (no extension) | 200 | 200 (fails open; global middleware enforces auth) |\n\nTests cover list, single-key get/set/delete, and bulk export/import.\n\n### `api_deny_unknown_fields_test.rs`\n\nRegression for typo'd JSON fields being silently dropped. After `#[serde(deny_unknown_fields)]` on `CreateWebhookRequest`:\n\n- `{\"evnts\": [\"message_received\"]}` → 400 (typo rejected)\n- Correctly spelled request → 201, webhook persisted\n\n### `api_integration_test.rs`\n\nBroad end-to-end coverage:\n\n- **Health/Status** — `/api/health` returns redacted info; `/api/status` returns detailed state\n- **API versioning** — `/api/v1/*` aliases, `x-api-version` header on all responses including 401\n- **Locale serving** — `/locales/{lang}.json` files for i18n\n- **Providers** — `/api/providers` marks local providers with `is_local: true`\n- **Config reload** — proxy changes hot-reloaded without restart\n- **Migration** — OpenClaw import writes to daemon home\n- **Session isolation** — cross-agent session read rejected (agent A cannot read agent B's session)\n- **Web search** — `WebSearchAugmentationMode` configuration on agent spawn\n\n## Kernel configuration for tests\n\nAll tests configure the default model as `ollama` / `test-model` to avoid requiring real LLM credentials:\n\n```rust\nDefaultModelConfig {\n    provider: \"ollama\".to_string(),\n    model: \"test-model\".to_string(),\n    api_key_env: \"OLLAMA_API_KEY\".to_string(),\n    base_url: None,\n    message_timeout_secs: 300,\n    extra_params: HashMap::new(),\n    cli_profile_dirs: Vec::new(),\n}\n```\n\nThe registry cache is synced into the temp directory before boot so the kernel doesn't need network access to enumerate available models.\n\n## Auth patterns in tests\n\nWhen `api_key` is set to `\"\"` (empty string), the auth middleware enters \"dev mode\" — all dashboard-read routes are accessible without a token. When a non-empty key is configured, tests attach `Authorization: Bearer <key>` headers.\n\nThe `tower::oneshot` path has no `ConnectInfo`, so the loopback fast-path for auth does **not** apply. Requests are treated as remote, which is the stricter and more useful test configuration.\n\n## Key types used across tests\n\n| Type | Source crate | Role |\n|------|-------------|------|\n| `AppState` | `librefang-api::routes` | Shared router state wrapping the kernel |\n| `AgentId` | `librefang-types::agent` | UUID identifying an agent |\n| `AgentManifest` | `librefang-types::agent` | TOML-deserialized agent definition |\n| `AuthenticatedApiUser` | `librefang-api::middleware` | Simulated caller identity for authz tests |\n| `UserRole` | `librefang-kernel::auth` | Admin / Viewer role discrimination |\n| `MockKernelBuilder` | `librefang-testing` | Kernel builder that skips network-bound subsystems |\n| `TestAppState` | `librefang-testing` | Harness producing `Arc<AppState>` from a mock kernel |\n| `AgentIdField` / `SessionIdField` | `librefang-api::extensions` | Response extension markers for access logging |\n\n## Contributing new tests\n\n1. Pick the harness pattern:\n   - **Full router** if the test involves auth middleware, multiple route families, or the production middleware stack\n   - **Partial router** if testing a single route module in isolation\n   - **TCP listener** if `ConnectInfo` or real HTTP connection metadata matters\n\n2. Use `tempfile::TempDir` for the kernel home directory. Never write to the real filesystem.\n\n3. Assert on `(StatusCode, serde_json::Value)` tuples. Use `body` in assertion messages for diagnosability:\n   ```rust\n   assert_eq!(status, StatusCode::OK, \"body: {body}\");\n   ```\n\n4. For mutating endpoints that trigger real outbound HTTP (A2A discover/send), only test validation and trust-gate paths — never require a live external server.\n\n5. Gate tests requiring real LLM credentials behind an env-var check. The majority of tests must pass without any external credentials.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nHTTP and WebSocket API server for the LibreFang Agent OS daemon. This crate is the primary network entry point for all external clients — CLI tools, desktop applications, mobile apps, and the bundled React dashboard — communicating with the in-process agent kernel.\n\n## Architecture\n\nThe API server hosts the `librefang-kernel` inside the same process. All client interactions flow through this surface:\n\n```mermaid\ngraph LR\n    CLI[CLI Client]\n    DESK[Desktop App]\n    MOB[Mobile App]\n    DASH[React Dashboard]\n\n    API[librefang-api<br/>axum HTTP/WS]\n\n    CLI --> API\n    DESK --> API\n    MOB --> API\n    DASH --> API\n\n    API --> K[librefang-kernel]\n    API --> CH[librefang-channels]\n    API --> MEM[librefang-memory]\n    API --> LLM[librefang-llm-drivers]\n```\n\nThe kernel is not a remote service — it is instantiated directly and accessed through in-process calls. The API layer translates between HTTP/WS protocols and kernel operations.\n\n## Entry Point\n\n`server::build_router(kernel, addr)` assembles the complete axum `Router` along with the shared `AppState`. This is the single public function that consumers (such as `librefang-cli`) call to obtain a runnable server.\n\n## Key Components\n\n### Routes (`routes::*`)\n\nEndpoint handlers organized by domain — agent management, sessions, channels, approvals, MCP (Model Context Protocol), peer/A2A networking, and administrative operations. All routes return JSON and follow REST conventions.\n\n### Middleware (`middleware`)\n\n- **Authentication** — JWT-based with three route visibility tiers:\n  - `PUBLIC_ROUTES_ALWAYS` — accessible without credentials (e.g., login)\n  - `PUBLIC_ROUTES_GET_ONLY` — read-only public access\n  - `PUBLIC_ROUTES_DASHBOARD_READS` — unauthenticated dashboard read paths\n- **Rate limiting** — powered by the `governor` crate\n- **Telemetry** — request tracing and metrics (gated behind the `telemetry` feature)\n\n### WebSocket (`ws`)\n\nWebSocket authentication handshake and streaming handlers. Used for real-time session streaming, agent event subscriptions, and terminal/pty interactions.\n\n### Dashboard SPA\n\nThe TypeScript/React/TanStack Query dashboard lives under `dashboard/`. It is built externally via `cargo xtask build-web` and embedded into the binary at compile time using `include_dir!`. The embedded assets are served as static files. At runtime, the directory `~/.librefang/dashboard/` can override the embedded assets, allowing updates without recompilation.\n\nThe build script (`build.rs`) ensures the `static/react` placeholder directory exists so `include_dir!` compiles cleanly on fresh clones where no dashboard build has occurred yet.\n\n### OpenAPI\n\nAn `openapi.json` is committed at the workspace root, generated by `cargo xtask codegen --openapi` using `utoipa` with `schemars` schema derivation. CI verifies this file for drift against hash baselines in `xtask/baselines/`.\n\n## Feature Flags\n\nFeatures control which channel adapters and telemetry capabilities are compiled in. Channel features are forwarded directly to `librefang-channels`.\n\n| Feature | Description |\n|---|---|\n| `default` | `core-channels` + `telemetry` |\n| `telemetry` | OpenTelemetry tracing export + Prometheus metrics endpoint |\n| `core-channels` | Telegram, Discord, Slack, Webhook, ntfy — lightweight, `reqwest`-only adapters |\n| `all-channels` | Every channel adapter |\n| `all-channels-no-email` | All channels except email (for Android targets where `rustls-platform-verifier` lacks `new_with_extra_roots` support) |\n| `mini` | 12 commonly-used channels (core 5 + Matrix, Email, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat) |\n| `channel-*` | Individual channel toggle (e.g., `channel-telegram`) |\n\n**Why the granularity:** A plain `cargo build` compiles only the five core channels to keep build times fast for library consumers and development. Release and packaging pipelines opt into `all-channels` explicitly. Adding a new channel to `core-channels` requires verifying its dependency tree stays lightweight.\n\n## Build-Time Metadata\n\nThe build script captures three environment variables available at runtime:\n\n| Variable | Source | Example |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a1b2c3d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nThese are embedded in the binary and exposed through the version/health endpoint.\n\n## Platform-Specific Dependencies\n\n**Unix:** `rustix` (with `process` feature) and `libc` for POSIX process operations.\n\n**Windows:** `windows-sys` with `Win32_Security` and `Win32_Security_Authorization` features. Used exclusively for the ACP named-pipe listener — `ConvertStringSecurityDescriptorToSecurityDescriptorW` restricts the pipe DACL to the daemon's owner SID so other local users cannot connect. Since `windows-sys` is already in the transitive dependency tree via tokio, this adds no additional compile-time cost.\n\n## Authentication Stack\n\nThe cryptographic dependencies indicate the auth layer uses:\n\n- **JWT** (`jsonwebtoken`, `hmac`, `sha2`) — token issuance and validation, with JWKS support for OIDC integration\n- **Password hashing** (`argon2`) — credential storage\n- **Constant-time comparison** (`subtle`) — timing-safe token/secret checks\n- **TOTP** (`totp-rs` in dev-dependencies) — two-factor authentication, tested via `librefang-testing`\n\n## Relationship to Other Crates\n\nThis crate is the integration hub — it depends on nearly every other LibreFang crate but nothing depends on it (except the CLI binary which calls `build_router`). It does not publish types or utilities for reuse; its role is to bind the kernel, channels, memory, LLM drivers, skills, hands, and extensions together behind a unified HTTP/WS interface.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels-benches\n\nCriterion benchmarks for channel message dispatch hot paths in `librefang-channels`.\n\n## Purpose\n\nThis module provides continuous performance tracking for the three most latency-sensitive operations in the channel subsystem: turning raw platform messages into domain types (`ChannelMessage`), routing them to the correct agent (`AgentRouter`), and formatting agent responses back into platform-native markup. These are the operations that sit on the critical path for every inbound and outbound message, so regressions here directly impact end-user perceived latency.\n\n## Running\n\n```bash\n# Al
