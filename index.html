var PAGES = {"agent-runtime":"# Agent Runtime\n\n# Agent Runtime\n\nThe Agent Runtime is the execution engine at the heart of LibreFang. It governs how agents receive messages, interact with LLMs, execute tools, manage conversation state, and interoperate with external agents. The runtime lives in `librefang-runtime` and is structured around three primary concerns: the **agent execution loop**, **A2A protocol interoperability**, and **per-turn context loading**.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Entry\n        A[Kernel] -->|user message| B[run_agent_loop]\n    end\n\n    subgraph Agent Loop\n        B --> C[Prepare Messages]\n        C --> D[LLM Completion]\n        D -->|text response| E[Finalize Turn]\n        D -->|tool_use| F[StagedToolUseTurn]\n        F --> G[execute_single_tool_call]\n        G -->|result| F\n        F -->|commit| C\n        E --> H[Proactive Memory]\n        H --> I[AgentLoopResult]\n    end\n\n    subgraph A2A\n        J[A2aClient] -->|discover| K[AgentCard]\n        L[A2aTaskStore] -->|lifecycle| M[A2aTask]\n        N[build_agent_card] --> K\n    end\n\n    subgraph Context\n        O[load_context_md] -->|per-turn| P[context.md]\n    end\n\n    B -.->|uses| O\n    G -.->|dispatches to| tool_runner\n    J -.->|called during| A\n```\n\n## The Agent Execution Loop (`agent_loop.rs`)\n\nThe agent loop is the central state machine that drives every agent turn. It handles the full lifecycle: receiving a user message, recalling memories, calling the LLM, executing tool calls in sequence, persisting state, and returning a result.\n\n### Entry Points\n\n- **`run_agent_loop`** — Non-streaming execution. Blocks until the agent produces a final response.\n- **`run_agent_loop_streaming`** — Streaming variant. Emits `StreamEvent` values over an `mpsc` channel as the LLM generates tokens and tools execute.\n\nBoth share the same internal logic, differing only in how the LLM response is consumed and how results are delivered back to the caller.\n\n### Loop Lifecycle\n\nEach iteration of the agent loop follows this sequence:\n\n1. **Prepare messages** — The conversation history is trimmed, repaired, and assembled into the format expected by the LLM provider. Images from prior turns are stripped to save tokens. The system prompt is built, incorporating recalled memories, workspace metadata, and any active A/B experiment variants.\n\n2. **Call the LLM** — A `CompletionRequest` is sent via the `LlmDriver`. A process-global semaphore (`LLM_CONCURRENCY`, cap of 5) gates concurrent API calls to prevent memory spikes on constrained deployments.\n\n3. **Handle the response**:\n   - **`stop_reason: EndTurn`** — The agent's text response is finalized. Silent responses (NO_REPLY tokens) and progress-text leaks (dangling `\"...\"` preambles) are detected and handled.\n   - **`stop_reason: ToolUse`** — Tool calls are staged, executed, and their results are committed back into the conversation. The loop then returns to step 1 with the updated history.\n   - **`stop_reason: MaxTokens`** — The response is continued by sending the partial output back to the LLM (up to `MAX_CONTINUATIONS = 5`).\n\n4. **Finalize the turn** — Proactive memory extraction runs, session state is persisted, hooks fire, and an `AgentLoopResult` is returned.\n\n### Staged Tool Execution (`StagedToolUseTurn`)\n\nTool execution uses a staging pattern to prevent a critical bug (upstream #2381) where orphaned `ToolUse` blocks without paired `ToolResult` blocks could brick an agent session.\n\nThe `StagedToolUseTurn` struct accumulates:\n- The assistant message containing `ToolUse` blocks\n- Tool result blocks as each `execute_single_tool_call` completes\n- Metadata for padding any unexecuted calls\n\nThe turn is only committed to `session.messages` and the LLM working copy via `commit()`, which atomically pushes both the assistant message and the paired user `{tool_result}` message. If the staged turn is dropped without committing (e.g., due to error propagation with `?`), `session.messages` remains untouched — no orphan blocks can leak.\n\n### Tool Execution (`execute_single_tool_call`)\n\nEach tool call passes through several gates before execution:\n\n| Gate | Purpose |\n|------|---------|\n| `LoopGuard` | Circuit breaker / rate limiter for repetitive tool calls |\n| Fork allowlist | Restricts tools in derivative (fork) turns |\n| Hook registry (`BeforeToolCall`) | Plugins can block tool calls |\n| `tool_runner::execute_tool` | Actual dispatch to the tool implementation |\n| Hook registry (`AfterToolCall`, `TransformToolResult`) | Plugins can observe or rewrite results |\n\nTool execution is bounded by a configurable timeout (default 600s). Results are sanitized (injection markers stripped, content truncated to fit the context budget) before being appended to the staged turn.\n\n### Message History Management\n\nConversation history grows unbounded without intervention, so the runtime trims it at safe boundaries:\n\n- **`safe_trim_messages`** — Trims at conversation-turn boundaries so `ToolUse`/`ToolResult` pairs are never split. Applied to both the LLM working copy and the persistent session store.\n- **`resolve_max_history`** — Determines the trim cap from manifest overrides → kernel config → compiled default (40 messages). Values below 4 are clamped up.\n- **`strip_prior_image_data`** — Removes base64 image data from all messages except the last user message, preventing token bloat from stale images.\n\n### Memory Integration\n\nThe loop integrates with the memory subsystem at several points:\n\n- **Recall** (`setup_recalled_memories`) — Before each turn, relevant memories are retrieved via the context engine (semantic search over embeddings) and injected into the system prompt.\n- **Proactive memory** — The `ProactiveMemoryHooks` system can extract facts, decisions, and preferences from the conversation automatically.\n- **Episodic memory** — Interaction summaries are persisted asynchronously via `remember_interaction_best_effort`.\n- **Conflict detection** — New memories are checked against existing ones for contradictions.\n\n### Loop Options (`LoopOptions`)\n\n`LoopOptions` controls non-standard invocation modes:\n\n| Field | Purpose |\n|-------|---------|\n| `is_fork` | Marks derivative turns (e.g., auto-dream). Session state is not persisted. |\n| `allowed_tools` | Runtime tool allowlist enforced at execute time (not schema time) to preserve Anthropic prompt cache alignment. |\n| `interrupt` | Per-session interrupt handle for long-running tools to observe `/stop` signals. |\n| `max_iterations` | Operator-level override for the iteration cap. |\n| `max_history_messages` | Operator-level override for the history trim cap. |\n\n### Result (`AgentLoopResult`)\n\nThe loop returns a structured result containing:\n\n- `response` — Final text output\n- `total_usage` — Aggregate token counts across all LLM calls\n- `iterations` — How many loop iterations ran\n- `decision_traces` — Structured records of every tool call (input, rationale, timing, outcome)\n- `memories_saved` / `memories_used` / `memory_conflicts` — Memory system activity\n- `directives` — Reply routing directives (reply-to, thread, silent)\n- `owner_notice` — Private messages to the operator via `notify_owner`\n- `silent` — Whether the agent chose not to reply\n- `new_messages_start` — Index into `session.messages` where this turn's messages begin\n\n### Key Constants\n\n| Constant | Value | Purpose |\n|----------|-------|---------|\n| `MAX_ITERATIONS` | 100 | Loop iteration cap |\n| `MAX_CONCURRENT_LLM_CALLS` | 5 | Process-global LLM call semaphore |\n| `DEFAULT_MAX_HISTORY_MESSAGES` | 40 | Message history trim cap |\n| `MIN_HISTORY_MESSAGES` | 4 | Floor for history cap |\n| `TOOL_TIMEOUT_SECS` | 600 | Per-tool execution timeout |\n| `MAX_CONTINUATIONS` | 5 | MaxTokens continuation limit |\n| `MAX_CONSECUTIVE_ALL_FAILED` | 3 | Consecutive hard-failure abort threshold |\n| `LAZY_TOOLS_THRESHOLD` | 30 | Tool count that triggers lazy loading |\n| `ACCUMULATED_TEXT_MAX_BYTES` | 64 KB | Cap on intermediate text buffer |\n\n### Lazy Tool Loading\n\nWhen an agent's granted tool set exceeds `LAZY_TOOLS_THRESHOLD` (30 tools), the runtime switches to lazy mode. Instead of shipping all tool definitions in every request, only the always-native subset plus any tools the LLM has explicitly loaded via `tool_load` are included. This keeps the request payload small for agents with large tool catalogs while giving the LLM an escape hatch to discover and pull in additional tools on demand.\n\n`resolve_request_tools` handles the logic: if `tool_load` is not in the agent's allowlist, lazy mode is disabled entirely — the LLM would have no way to recover stripped tools.\n\n### Provider Prefix Handling (`strip_provider_prefix`)\n\nModel IDs are often stored as `provider/org/model` but APIs expect just `org/model`. The `strip_provider_prefix` function handles this stripping and also normalizes bare model names (e.g., `gemini-2.5-flash` → `google/gemini-2.5-flash`) for providers that require qualified `org/model` format (OpenRouter, Together, Fireworks, Replicate, HuggingFace).\n\n### Group Chat Support\n\nFor group-chat agents (identified by `is_group: true` in manifest metadata), the runtime prepends a sanitized `[sender]: ` prefix to user messages. The `sanitize_sender_label` function strips characters that could spoof other senders (brackets, colons, newlines, control characters) and truncates to 64 characters.\n\n---\n\n## A2A Protocol (`a2a.rs`)\n\nImplements Google's Agent-to-Agent protocol for cross-framework agent interoperability. A2A enables LibreFang agents to discover and interact with external agents, and exposes LibreFang agents to external systems via Agent Cards.\n\n### Agent Cards (`AgentCard`)\n\nAn `AgentCard` is a JSON capability manifest served at `/.well-known/agent.json`. It describes:\n\n- **Identity** — name, description, URL, version\n- **Capabilities** — streaming, push notifications, state transition history\n- **Skills** — `AgentSkill` descriptors mapping LibreFang tools to A2A skill entries\n- **Content modes** — supported input/output MIME types\n\n`build_agent_card` constructs an `AgentCard` from a LibreFang `AgentManifest`, converting each tool into an A2A skill descriptor and setting the endpoint to `{base_url}/a2a`.\n\n### Tasks (`A2aTask`)\n\nTasks are the unit of work exchanged between agents. Each task has:\n\n- An ID and optional session ID for conversation continuity\n- A status (`A2aTaskStatus`): `Submitted`, `Working`, `InputRequired`, `Completed`, `Cancelled`, `Failed`\n- Messages (`A2aMessage`) with content parts (`A2aPart` — text, file, or structured data)\n- Artifacts (`A2aArtifact`) produced by the task\n\nThe `A2aTaskStatusWrapper` handles a serialization quirk: some A2A implementations encode status as a bare string (`\"completed\"`), others as an object (`{\"state\": \"completed\", \"message\": null}`). The `#[serde(untagged)]` enum transparently accepts both forms.\n\n### Task Store (`A2aTaskStore`)\n\nAn in-memory, bounded store for tracking A2A task lifecycle. Tasks are created by `tasks/send`, polled by `tasks/get`, and cancelled by `tasks/cancel`.\n\n**Eviction policy** (applied lazily on each `insert`):\n\n1. **TTL sweep** — Any task older than the configured TTL (default 24 hours) is removed regardless of state. This prevents `Working`/`InputRequired` tasks from accumulating indefinitely.\n2. **Capacity eviction** — If still at capacity after the TTL sweep, the oldest terminal-state task (Completed/Failed/Cancelled) is evicted first. If no terminal tasks exist, the oldest task overall is evicted.\n\nThe store is thread-safe via an internal `Mutex`. The poisoned-mutex recovery pattern (`unwrap_or_else(|e| e.into_inner())`) ensures a panic in one thread doesn't permanently deadlock the store.\n\n### A2A Client (`A2aClient`)\n\nHTTP client for discovering and interacting with external A2A agents:\n\n- **`discover(url)`** — Fetches the Agent Card from `{url}/.well-known/agent.json`\n- **`send_task(url, message, session_id)`** — Sends a JSON-RPC `tasks/send` request to an external agent\n- **`get_task(url, task_id)`** — Polls task status via `tasks/get`\n\nThe client uses a proxied HTTP client builder with a 30-second timeout and a custom `User-Agent` header identifying the LibreFang version.\n\n### Discovery\n\n`discover_external_agents` is called during kernel boot. It iterates over configured `ExternalAgent` entries, fetches each one's Agent Card, and returns successfully discovered agents. Failures are logged but do not block boot.\n\n---\n\n## Agent Context (`agent_context.rs`)\n\nHandles per-turn loading of `context.md` files — Markdown files that external tools (cron jobs, scripts) update with live data that the agent should see in its prompt.\n\n### Resolution Order\n\n`resolve_context_path` looks for context files in this order:\n\n1. `{workspace}/.identity/context.md` (new layout)\n2. `{workspace}/context.md` (legacy / unmigrated workspaces)\n\nThe first candidate that exists on disk wins.\n\n### Caching Behavior\n\nThe `cache_context` flag on `AgentManifest` controls behavior:\n\n- **`cache_context = false`** (default) — The file is re-read from disk every turn, so external updates reach the LLM immediately.\n- **`cache_context = true`** — The first successful read is cached and returned verbatim on every subsequent call.\n\n### Failure Handling\n\nWhen a re-read fails (e.g., an external writer is mid-rewrite and the file contains invalid UTF-8), the system falls back to the last successfully cached content with a warning. This prevents context from disappearing mid-conversation. If no cache exists, `None` is returned.\n\n### Security\n\n- **Symlink rejection** — Uses `symlink_metadata` (not `metadata`) to detect and refuse symlinks. This prevents a prompt-injection vector where an attacker could point `context.md` at sensitive system files (e.g., `/etc/passwd`) and have their contents injected into the LLM prompt.\n- **Size cap** — Files are capped at 32 KB (`MAX_CONTEXT_BYTES`). Reads are bounded at the I/O level so multi-GB files are never fully loaded into memory. Truncation preserves valid UTF-8 boundaries.\n- **Binary rejection** — Files with zero valid UTF-8 prefix bytes are treated as errors, triggering the cache fallback path.\n\n---\n\n## Integration Points\n\n### Kernel\n\nThe kernel (`librefang-kernel`) is the primary consumer of the runtime. It:\n- Calls `run_agent_loop` / `run_agent_loop_streaming` when a user message arrives\n- Populates `LoopOptions` from `KernelConfig` (max iterations, history cap, interrupt handles)\n- Calls `discover_external_agents` during boot\n- Serves Agent Cards via the HTTP API\n\n### Tool Runner (`tool_runner.rs`)\n\n`execute_single_tool_call` delegates to `tool_runner::execute_tool` for actual tool dispatch. The tool runner handles:\n- Capability enforcement (agents can only use tools in their manifest)\n- MCP connection management\n- Skill registry lookups\n- Sandbox enforcement (workspace isolation, command allowlists)\n- Approval workflows (human-in-the-loop gating)\n\n### Memory Subsystem (`librefang-memory`)\n\nThe loop depends on `MemorySubstrate` and `ProactiveMemoryStore` for:\n- Semantic memory recall (embedding-based search)\n- Episodic memory persistence\n- Proactive fact extraction\n- Memory conflict detection\n\n### Context Engine (`context_engine.rs`)\n\nAn optional plugin interface that customizes:\n- Tool result truncation strategy\n- Memory recall and ingestion\n- Context window budget management\n\nWhen no context engine is registered, built-in head+tail truncation and default recall behavior apply.\n\n### Hooks (`hooks.rs`)\n\nThe hook registry provides extension points at:\n- `BeforeToolCall` / `AfterToolCall` — Observe or block tool execution\n- `TransformToolResult` — Rewrite tool results before they enter the conversation\n- `AgentLoopEnd` — React to turn completion (used by auto-dream triggers)","api-server":"# API Server\n\n# Channel Bridge (`channel_bridge.rs`)\n\nThe channel bridge is the wiring layer that connects the LibreFang kernel to external messaging platforms. It implements the `ChannelBridgeHandle` trait on `KernelBridgeAdapter`, provides the streaming text pipeline that converts kernel `StreamEvent`s into channel-deliverable strings, and exposes `start_channel_bridge()` — the entry point called by the daemon at startup to spin up every configured adapter.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Daemon[\"Daemon / API Server\"] -->|calls| SCB[\"start_channel_bridge()\"]\n    SCB -->|reads config| CFG[\"ChannelsConfig\"]\n    SCB -->|creates| KBA[\"KernelBridgeAdapter\"]\n    SCB -->|instantiates| ADAPTERS[\"Channel Adapters\"]\n    ADAPTERS -->|registered in| BM[\"BridgeManager\"]\n    KBA -->|delegates to| KERNEL[\"LibreFangKernel\"]\n    ADAPTERS -->|calls| CBH[\"ChannelBridgeHandle trait\"]\n    CBH -->|implemented by| KBA\n    KBA -->|uses| STB[\"start_stream_text_bridge()\"]\n    STB -->|reads| SE[\"mpsc::Receiver&lt;StreamEvent&gt;\"]\n    STB -->|writes| TX[\"mpsc::Sender&lt;String&gt;\"]\n```\n\nThe daemon calls `start_channel_bridge()`, which reads the `ChannelsConfig`, instantiates feature-gated adapters (Telegram, Discord, Slack, etc.), wraps the kernel in a `KernelBridgeAdapter`, and hands everything to `BridgeManager`. From that point on, inbound messages from any adapter flow through `ChannelBridgeHandle` → `KernelBridgeAdapter` → `LibreFangKernel`, and outbound responses flow back through the streaming bridge pipeline.\n\n---\n\n## Key Components\n\n### `KernelBridgeAdapter`\n\nWraps an `Arc<LibreFangKernel>` and an `Instant` (for uptime reporting). Implements `ChannelBridgeHandle`, which is the trait that channel adapters call into. Every method on this struct is a thin delegation to the kernel with two additions:\n\n- **Silent response handling** — when `result.silent` is true (the agent returned `NO_REPLY` or `[[silent]]`), the adapter returns an empty string so the bridge skips the channel send.\n- **Error stringification** — kernel `KernelResult` errors are converted to `String` via `map_err(|e| format!(\"{e}\"))` to match the trait's `Result<_, String>` signature.\n\nThe trait methods fall into several categories:\n\n| Category | Methods | Purpose |\n|---|---|---|\n| **Messaging** | `send_message`, `send_message_with_blocks`, `send_message_streaming`, `send_message_with_sender`, `send_message_ephemeral`, etc. | Route messages to the kernel with optional sender context |\n| **Agent management** | `find_agent_by_name`, `list_agents`, `spawn_agent_by_name` | Lookup and create agents |\n| **Session control** | `reset_session`, `reboot_session`, `compact_session`, `set_model`, `stop_run`, `session_usage`, `set_thinking` | Manage conversation state |\n| **Introspection** | `uptime_info`, `list_models_text`, `list_providers_text`, `list_skills_text`, `list_hands_text`, `budget_text`, `peers_text`, `a2a_agents_text` | Human-readable status reports for `/commands` |\n| **Automation** | `list_workflows_text`, `run_workflow_text`, `list_triggers_text`, `create_trigger_text`, `delete_trigger_text`, `list_schedules_text`, `manage_schedule_text` | Workflows, triggers, cron |\n| **Approvals** | `list_approvals_text`, `resolve_approval_text` | Human-in-the-loop tool gating |\n| **Security** | `authorize_channel_user`, `channel_overrides`, `agent_channel_overrides` | RBAC and per-channel config |\n| **Delivery tracking** | `record_delivery`, `check_auto_reply`, `send_channel_push` | Metrics, auto-reply, outbound push |\n| **Reply classification** | `classify_reply_intent` | LLM-based group-chat reply detection |\n| **Events** | `subscribe_events` | Broadcast event bus subscription |\n\n### Streaming Text Bridge\n\n`start_stream_text_bridge_with_status()` is the core streaming pipeline. It consumes a `mpsc::Receiver<StreamEvent>` from the kernel and produces a `mpsc::Receiver<String>` that channel adapters read from.\n\n**Event handling rules:**\n\n| Event | Behavior |\n|---|---|\n| `TextDelta` | Buffer text in `iter_buf` |\n| `ContentComplete` | Flush `iter_buf` unless suppressed (see below), reset iteration state |\n| `ToolUseStart` | Set `saw_tool_use` flag; emit `🔧 Pretty Tool Name` progress line if `show_progress` is true |\n| `ToolExecutionResult` (error) | Emit `⚠️ Pretty Tool Name failed` if `show_progress` is true |\n| `PhaseChange` (`context_warning`) | Emit `⚠️ detail` warning |\n\n**Suppression logic at flush time:**\n\n1. If `saw_tool_use` is true — the buffered text is a tool call echoed as content; suppress it.\n2. If `looks_like_tool_call()` matches — the text is a leaked raw tool call; suppress it.\n3. If `is_silent_response()` matches — the agent chose silence (`NO_REPLY`); suppress it.\n\nA second spawned task monitors the kernel's `JoinHandle`. On error, it sanitizes the error (see below) and sends it through the text channel before the bridge task drains. On success, it logs token usage. The `oneshot::Receiver<Result<(), String>>` returned by `_with_status` lets callers (e.g., public-feed adapters) distinguish successful delivery from failure for lifecycle reactions.\n\n### Error Sanitization\n\n`sanitize_channel_error()` maps raw driver/LLM errors into user-friendly messages:\n\n| Pattern | User Message |\n|---|---|\n| `timed out` / `inactivity` | \"The task timed out due to inactivity...\" |\n| `rate limit` / `429` / `quota` / `resource exhausted` | \"I've hit my usage limit and need to rest...\" |\n| `auth` / `401` / `not logged in` | \"I'm having trouble with my credentials...\" |\n| `exited with code` / `llm driver` | \"Sorry, something went wrong...\" |\n| Default | \"Something went wrong...\" with truncated reference |\n\nIn group chats, all errors are suppressed entirely. In DMs, rate-limit messages that contain useful timing information (`hit your limit`, `resets`) are passed through with the original provider text.\n\nTimeouts that produced partial output are treated as soft success — the `oneshot` status resolves `Ok(())` so the lifecycle reaction doesn't show a failure indicator for content the user already saw.\n\n### Tool Call Leak Detection\n\nSome LLM providers emit tool calls as plain text instead of using the proper tool_use API. The `looks_like_tool_call()` function checks for:\n\n- **JSON-style**: starts with `[{`, `{\"type\":\"function\"}`, or arrays containing `'type': 'text'`\n- **Tag-based**: contains `<function=>`, `<function>`, `<tool>`, `[TOOL_CALL]`, or `pecta` (Unicode tool marker)\n- **Markdown-wrapped**: code blocks containing named JSON tool calls (via `contains_markdown_tool_call`)\n- **Backtick-wrapped**: inline code containing tool calls (via `contains_backtick_tool_call`)\n- **Bare JSON**: any embedded JSON object with `name`/`function`/`tool` + `arguments`/`parameters`/`args`/`input` keys (via `contains_bare_json_tool_call`)\n\nThe `looks_like_tool_name()` helper validates that potential tool names contain only ASCII alphanumerics and `_-.:/` characters, preventing false positives on natural language.\n\n### Progress Line Formatting\n\n- `prettify_tool_name(\"web_search\")` → `\"Web Search\"` — splits on `_`, `-`, `.`, capitalizes first char of each word, preserves existing casing after (so `MCP_call` → `\"MCP Call\"`).\n- `tr_progress_failed(language)` — localized \"failed\" suffix for tool-failure lines. Supports `zh-CN`, `es`, `ja`, `de`, `fr`; falls back to English.\n- All progress lines use `\\n\\n…\\n\\n` spacing so adjacent markers render with blank lines on markdown-aware renderers.\n\n### Reply Intent Classification\n\n`classify_reply_intent()` uses a one-shot LLM call to decide whether a group-chat message is directed at the bot. It:\n\n1. Sanitizes inputs (truncates to 500/64 chars, strips backticks, brackets, newlines).\n2. Builds a prompt that includes bot identity (name + aliases) and classification rules.\n3. Uses `kernel.one_shot_llm_call()` with the configured default model (or override).\n4. Returns `false` only when the response contains `NO_REPLY`; anything else is treated as a reply (fail-open).\n\nBot aliases from the agent manifest's `routing.aliases` and `routing.weak_aliases` are automatically merged into `group_trigger_patterns` via `channel_overrides()`.\n\n### Channel Adapter Startup\n\n`start_channel_bridge_with_config()` is the main startup function:\n\n1. Checks which channels have configuration entries using the `check_channel!` macro.\n2. Emits warnings for configured-but-not-feature-enabled channels.\n3. Returns `(None, [], empty router)` if no channels are configured.\n4. Creates a `KernelBridgeAdapter` wrapping the kernel.\n5. Iterates through all channel configs, reads tokens from env vars via `read_token()`, and constructs adapters. Each adapter is pushed to a `Vec<(Arc<dyn ChannelAdapter>, Option<String>, Option<String>)>` (adapter, default_agent_name, account_id).\n6. Constructs sidecar adapters from `sidecar_channels` config.\n7. Passes all adapters to `BridgeManager`.\n8. Returns the `BridgeManager`, a list of started channel names, and an `axum::Router` containing webhook routes for webhook-based channels.\n\nEach adapter construction block is feature-gated with `#[cfg(feature = \"channel-<name>\")]`. Multi-account support is handled by iterating `config.<channel>` (which is a `Vec`).\n\n### Approval Resolution with TOTP\n\n`resolve_approval_text()` handles the approval workflow:\n\n1. Matches pending approvals by ID prefix.\n2. If approving and the tool requires TOTP (`policy.tool_requires_totp`):\n   - Checks TOTP lockout (`is_totp_locked_out`).\n   - Accepts either a 6-digit TOTP code (verified via `verify_totp_code_with_issuer`) or a recovery code (verified via `verify_recovery_code`).\n   - Records failures with `record_totp_failure`.\n3. Calls `kernel.approvals().resolve()` with the decision and TOTP verification status.\n4. Returns human-readable confirmation or error.\n\n---\n\n## Channel Feature Flags\n\nAll channel adapters are behind Cargo feature flags. The five waves are:\n\n| Wave | Channels |\n|---|---|\n| **1** | `channel-telegram`, `channel-discord`, `channel-slack`, `channel-whatsapp`, `channel-signal`, `channel-matrix`, `channel-email`, `channel-teams`, `channel-mattermost`, `channel-irc`, `channel-google-chat`, `channel-twitch`, `channel-rocketchat`, `channel-zulip`, `channel-xmpp`, `channel-webhook`, `channel-voice` |\n| **2** | `channel-bluesky`, `channel-feishu`, `channel-line`, `channel-mastodon`, `channel-messenger`, `channel-reddit`, `channel-revolt`, `channel-viber` |\n| **3** | `channel-flock`, `channel-guilded`, `channel-keybase`, `channel-nextcloud`, `channel-nostr`, `channel-pumble`, `channel-threema`, `channel-twist`, `channel-webex` |\n| **4** | `channel-dingtalk`, `channel-discourse`, `channel-gitter`, `channel-gotify`, `channel-linkedin`, `channel-mumble`, `channel-ntfy`, `channel-qq`, `channel-wechat`, `channel-wecom` |\n\nSidecar channels (`SidecarAdapter`) are always available and not feature-gated.\n\n---\n\n## Adding a New Channel Adapter\n\n1. Create the adapter in `librefang-channels` implementing `ChannelAdapter`.\n2. Add a `channel-<name>` feature flag to the `Cargo.toml`.\n3. Add the config struct to `ChannelsConfig` in `librefang-types`.\n4. In this file, add:\n   - A `#[cfg(feature = \"channel-<name>\")] use` import.\n   - A `check_channel!` macro call.\n   - An adapter construction block following the existing pattern (iterate configs, read tokens, construct adapter, push to `adapters`).\n5. Add the channel type string to `channel_overrides()` match arm.\n\n---\n\n## Important Behavioral Details\n\n- **Tool progress deduplication**: Within a single iteration, repeated calls to the same tool collapse into one `🔧 ToolName` line. The `iter_tools_seen` set is cleared at each `ContentComplete`, so retries in subsequent iterations still get their own line.\n- **Timeout partial output**: When the kernel returns an error containing `TIMEOUT_PARTIAL_OUTPUT_MARKER`, the bridge treats it as success for the status channel (the user already saw streamed content).\n- **WeChat token requirement**: The WeChat adapter only starts when a bot token is available. Without one, it skips startup (users obtain tokens via the dashboard QR flow).\n- **DingTalk dual mode**: Supports both `Stream` mode (app_key + app_secret) and `Webhook` mode (access_token + secret), selected by `receive_mode` in config.\n- **Feishu regions**: The adapter handles both CN (Feishu) and international (Lark) regions, with `FeishuRegion::Cn` / `FeishuRegion::Intl`.\n- **Group error suppression**: In group chats (`sender.is_group`), all kernel errors are suppressed to avoid leaking technical details to public channels.","channel-adapters":"# Channel Adapters\n\n# Channel Adapters\n\n## Overview\n\nThe `librefang-channels` crate provides the bridge between external messaging platforms (Telegram, Discord, Bluesky, WhatsApp, Slack, etc.) and the LibreFang agent kernel. Every platform-specific adapter implements the `ChannelAdapter` trait, and the `BridgeManager` orchestrates adapter lifecycles, message dispatch, policy enforcement, and agent routing.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Platforms\n        TG[Telegram]\n        DC[Discord]\n        BS[Bluesky]\n        WA[WhatsApp]\n        WH[Webhook]\n        OT[Other adapters...]\n    end\n\n    subgraph librefang-channels\n        CA[ChannelAdapter trait]\n        BM[BridgeManager]\n        AR[AgentRouter]\n        MD[MessageDebouncer]\n        IS[InputSanitizer]\n        RL[ChannelRateLimiter]\n        FMT[Formatter]\n    end\n\n    subgraph librefang-api / kernel\n        CBH[ChannelBridgeHandle]\n        AG[Agent sessions]\n    end\n\n    TG -->|implements| CA\n    DC -->|implements| CA\n    BS -->|implements| CA\n    WA -->|implements| CA\n    WH -->|implements| CA\n    OT -->|implements| CA\n\n    CA -->|message stream| BM\n    BM -->|resolve agent| AR\n    BM -->|sanitize| IS\n    BM -->|rate check| RL\n    BM -->|batch rapid msgs| MD\n    BM -->|send_message / streaming| CBH\n    CBH -->|dispatch| AG\n    AG -->|response| BM\n    BM -->|format + send| CA\n```\n\n## Core Abstractions\n\n### `ChannelAdapter` trait\n\nDefined in `types.rs`, this is the interface every platform adapter must implement:\n\n| Method | Purpose |\n|--------|---------|\n| `name()` | Returns the adapter identifier string (e.g., `\"telegram\"`, `\"bluesky\"`) |\n| `channel_type()` | Returns the `ChannelType` variant for this adapter |\n| `start()` | Starts the adapter, returns a `Stream<Item = ChannelMessage>` of inbound messages |\n| `send()` | Sends a message to a user |\n| `send_in_thread()` | Sends within a specific thread/topic (optional) |\n| `send_reaction()` | Adds a lifecycle reaction emoji (optional) |\n| `send_typing()` | Shows a typing indicator (optional) |\n| `stop()` | Gracefully shuts down the adapter |\n| `create_webhook_routes()` | Returns axum routes for webhook-based adapters (optional) |\n| `typing_events()` | Returns typing indicator events for debounce control (optional) |\n| `suppress_error_responses()` | Whether to suppress error messages to users |\n\n### `ChannelMessage`\n\nThe unified message envelope that flows through the bridge. Key fields:\n\n- **`channel`** — `ChannelType` enum (Telegram, Discord, Slack, Custom, etc.)\n- **`sender`** — `ChannelUser` with `platform_id`, `display_name`, and optional `librefang_user`\n- **`content`** — `ChannelContent` enum: `Text`, `Command`, `Image`, `Voice`, `Video`, `FileData`, `Interactive`, `ButtonCallback`, and more\n- **`metadata`** — `HashMap<String, serde_json::Value>` carrying platform-specific data (URIs, thread IDs, guild IDs, account IDs)\n- **`is_group`** — Whether the message came from a group context\n- **`thread_id`** — Optional thread/topic identifier for reply threading\n\n### `ChannelBridgeHandle` trait\n\nDefined in `bridge.rs` to break the circular dependency between `librefang-channels` and `librefang-kernel`. Implemented in `librefang-api` on the actual kernel. This trait exposes all kernel operations that adapters and the bridge need:\n\n**Core messaging:**\n- `send_message`, `send_message_with_sender`, `send_message_with_blocks_and_sender` — send text or multimodal content to an agent\n- `send_message_streaming_with_sender_status` — streaming variant returning `(Receiver<String>, oneshot::Receiver<Result<(), String>>)`\n\n**Agent management:**\n- `find_agent_by_name`, `list_agents`, `spawn_agent_by_name`\n- `reset_session`, `reboot_session`, `compact_session`\n- `set_model`, `stop_run`, `session_usage`\n\n**Policy & routing:**\n- `channel_overrides`, `agent_channel_overrides` — per-channel and per-agent configuration overrides\n- `authorize_channel_user` — RBAC check\n- `classify_reply_intent` — lightweight LLM classification for group message relevance\n\n**Automation:**\n- `list_workflows_text`, `run_workflow_text`\n- `list_triggers_text`, `create_trigger_text`, `delete_trigger_text`\n- `list_schedules_text`, `manage_schedule_text`\n- `list_approvals_text`, `resolve_approval_text`\n\n**Infrastructure:**\n- `subscribe_events` — broadcast receiver for kernel events (e.g., `ApprovalRequested`)\n- `send_channel_push` — proactive outbound messages\n- `channels_download_dir`, `channels_download_max_bytes` — file download configuration\n\nDefault implementations are provided for every method so that new kernel implementations can incrementally override only what they need.\n\n## Message Flow\n\n### Inbound (Platform → Agent)\n\n1. **Adapter receives** a platform event (WebSocket message, webhook POST, polling response)\n2. **Adapter parses** it into a `ChannelMessage` and yields it via the stream returned by `start()`\n3. **BridgeManager** consumes the stream in a `tokio::select!` loop, optionally debouncing rapid messages\n4. **Input sanitization** runs — `InputSanitizer` checks for prompt injection patterns. Results: `Clean`, `Warned` (logged, passed through), or `Blocked` (rejected with a generic error message)\n5. **Agent resolution** via `AgentRouter`: thread routing → binding context (account_id, guild_id, peer_id) → user default → channel default → \"assistant\" fallback → first available agent\n6. **Policy checks**: DM policy (`Respond`/`AllowedOnly`/`Ignore`), group policy (`All`/`MentionOnly`/`CommandsOnly`/`Ignore`), rate limiting, command filtering\n7. **Dispatch** to agent via `ChannelBridgeHandle`, with optional streaming and lifecycle reactions\n8. **Response** formatted via `formatter::format_for_channel` and sent back through the adapter\n\n### Outbound (Agent → Platform)\n\nResponses take one of two paths:\n\n- **Non-streaming**: `send_message()` returns the full text, which is formatted and sent via `adapter.send()`\n- **Streaming**: `send_message_streaming_with_sender_status()` returns incremental text chunks; adapters that support progressive display consume the receiver\n\nBoth paths go through `send_response()`, which applies `OutputFormat` formatting and optional thread targeting.\n\n### ReplyEnvelope\n\nThe `ReplyEnvelope` struct separates responses into two channels:\n\n```rust\npub struct ReplyEnvelope {\n    pub public: Option<String>,       // Message for the source chat\n    pub owner_notice: Option<String>, // Private notice to the operator's DM\n}\n```\n\nThis supports the `notify_owner` LLM tool — agents can send private operator notifications alongside (or instead of) public replies. Adapters that don't support owner-side delivery ignore `owner_notice`.\n\n## BridgeManager\n\nThe `BridgeManager` is the top-level orchestrator:\n\n```rust\nlet mut bridge = BridgeManager::new(kernel_handle, agent_router);\nbridge.start_adapter(telegram_adapter).await?;\nbridge.start_adapter(discord_adapter).await?;\nbridge.start_approval_listener(all_adapters).await;\n\n// Mount webhook routes on the API server\nlet webhook_router = bridge.take_webhook_router();\n\n// On shutdown\nbridge.stop().await;\n```\n\n### Key responsibilities:\n\n- **Adapter lifecycle** — starts streams, collects webhook routes, stops adapters cleanly\n- **Concurrent dispatch** — each message spawns its own task so slow LLM calls don't block subsequent messages. A semaphore (default: 32 concurrent) prevents unbounded memory growth under burst traffic\n- **Debouncing** — when `message_debounce_ms > 0`, rapid messages from the same sender are batched. Typing events reset the debounce timer. A hard maximum (`debounce_max_ms`) ensures messages flush even if the user keeps typing\n- **Journal integration** — optional `MessageJournal` for crash recovery of in-flight messages\n\n## Message Debouncing\n\nWhen enabled via channel overrides, the `MessageDebouncer` batches rapid-fire messages from the same sender key (`{channel}:{platform_id}`):\n\n- **First message** starts a debounce timer and a hard-max timer\n- **Subsequent messages** extend the debounce window (up to the hard max)\n- **Typing events** — `is_typing = true` cancels the timer (user is still composing); `is_typing = false` restarts it\n- **Flush triggers**: debounce timer expires, hard-max timer expires, buffer reaches `max_buffer` size, or stream ends\n- **Merged output**: multiple `Text` messages are joined with newlines; multiple `Command` messages with the same name have their args concatenated; mixed types fall back to text join\n\nThis is critical for voice/media messages that arrive as separate platform events but should be processed as a single turn.\n\n## Policies and Filtering\n\n### Group Policy (`GroupPolicy`)\n\n| Variant | Behavior |\n|---------|----------|\n| `All` | Process all group messages (subject to `reply_precheck` LLM filter if enabled) |\n| `MentionOnly` | Only when bot is directly mentioned, @-ed, or text matches `group_trigger_patterns` regex |\n| `CommandsOnly` | Only slash commands |\n| `Ignore` | Drop all group messages |\n\n**Addressee guard** (OB-04/OB-05): When `LIBREFANG_GROUP_ADDRESSEE_GUARD=on`, the system uses positional vocative detection to avoid false triggers. A message like \"Caterina, chiedi al Signore...\" won't trigger the bot even if \"Signore\" is a trigger pattern, because the vocative is addressed to \"Caterina\" (another participant), not the bot.\n\n### DM Policy (`DmPolicy`)\n\n| Variant | Behavior |\n|---------|----------|\n| `Respond` | Process DMs normally |\n| `AllowedOnly` | Process only if RBAC `authorize_channel_user` passes |\n| `Ignore` | Drop all DMs |\n\n### Rate Limiting\n\nTwo levels via `ChannelOverrides`:\n\n- `rate_limit_per_minute` — global per-channel limit (all users combined)\n- `rate_limit_per_user` — per-user limit\n\nBoth use `ChannelRateLimiter` with sliding-window counting. Exceeded limits produce an immediate response to the user.\n\n### Command Filtering\n\nThree-tier precedence in `ChannelOverrides`:\n\n1. `disable_commands = true` — block all commands\n2. `allowed_commands` — whitelist (only these commands pass)\n3. `blocked_commands` — blacklist\n\nBlocked commands are reconstructed as raw text and forwarded to the agent as normal input, so the agent can still respond contextually.\n\n## Agent Routing\n\nThe `AgentRouter` resolves inbound messages to agent IDs through a multi-layer strategy:\n\n1. **Thread routing** — if the adapter tagged the message with `thread_route_agent` metadata, resolve by that agent name\n2. **Binding context** — match on `channel + account_id + guild_id + peer_id`\n3. **User default** — previously auto-set default for this sender\n4. **Channel default** — configured default agent for this channel\n5. **Fallback** — agent named `\"assistant\"`, then first available agent\n\nWhen a cached agent ID becomes stale (agent was restarted), `try_reresolution` detects \"Agent not found\" errors and re-resolves by name, then retries once.\n\n### Auto-Routing\n\nPer-channel `AutoRouteStrategy` (in `ChannelOverrides`) configures automatic agent selection based on sender identity. The router tracks TTLs, confidence thresholds, sticky bonuses, and divergence counts to manage agent stickiness vs. switching.\n\n## Adapter Implementation Guide\n\nUsing `BlueskyAdapter` as the reference pattern:\n\n### Structure\n\n```rust\npub struct BlueskyAdapter {\n    identifier: String,\n    app_password: Zeroizing<String>,    // Zeroized on drop\n    service_url: String,\n    client: reqwest::Client,\n    account_id: Option<String>,\n    shutdown_tx: Arc<watch::Sender<bool>>,\n    shutdown_rx: watch::Receiver<bool>,\n    session: Arc<RwLock<Option<BlueskySession>>>,\n}\n```\n\n### Authentication\n\n- `create_session()` — calls `com.atproto.server.createSession`, stores `(access_jwt, refresh_jwt, did, created_at)`\n- `get_token()` — returns a valid access JWT, creating or refreshing the session as needed (sessions last ~2 hours, refresh at 90 minutes minus a 5-minute buffer)\n- App passwords are wrapped in `Zeroizing<String>` for secure memory handling\n\n### Inbound (Polling Pattern)\n\nAdapters that use polling (vs. webhooks) run a `tokio::spawn` loop inside `start()`:\n\n```\nloop {\n    tokio::select! {\n        _ = shutdown_rx.changed() => break,\n        _ = tokio::time::sleep(interval) => {}\n    }\n    // Fetch notifications → parse → send to mpsc channel\n}\n```\n\nThe returned stream is `Box::pin(ReceiverStream::new(rx))`.\n\n### Outbound\n\n`api_create_post()` handles chunking via `split_message(text, MAX_MESSAGE_LEN)` — messages exceeding platform limits are automatically split into multiple posts.\n\n### Message Parsing\n\n`parse_bluesky_notification()` demonstrates the pattern:\n\n1. Filter by notification reason (`mention`, `reply`)\n2. Skip own messages (by DID comparison)\n3. Extract text and detect command syntax (leading `/`)\n4. Build `ChannelContent::Command` or `ChannelContent::Text`\n5. Populate `metadata` with platform-specific fields (uri, cid, handle, reply_ref)\n\n### Webhook-Based Adapters\n\nInstead of `start()`, webhook adapters implement `create_webhook_routes()`:\n\n```rust\nasync fn create_webhook_routes(&self)\n    -> Option<(axum::Router, Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>)>\n```\n\nThe returned axum `Router` is mounted at `/channels/{adapter_name}/webhook` on the main API server. This avoids running a separate HTTP server per adapter.\n\n## Output Formatting\n\n`formatter::format_for_channel()` transforms agent responses based on `OutputFormat` (Markdown, HTML, plain text). The default format varies by channel — for example, Telegram supports Markdown, while Bluesky uses plain text.\n\n### Agent Name Prefixing\n\nWhen `prefix_agent_name` is set to `Bracket` or `BoldBracket` in overrides, responses are prefixed with the agent's display name:\n\n- `Bracket`: `[agent-name] response text`\n- `BoldBracket`: `**[agent-name]** response text`\n\nThis is idempotent — if the response already starts with the prefix, it's not doubled. For streaming responses, the prefix is sent as the first delta chunk.\n\n## Configuration\n\nChannel behavior is configured through `ChannelOverrides` (from `librefang-types::config`), which can be set at two levels:\n\n1. **Channel-level** — via `channel_overrides()` on the bridge handle\n2. **Agent-level** — via `agent_channel_overrides()`, sourced from `[channel_overrides]` in `agent.toml`\n\nAgent-level overrides take priority when both exist.\n\nKey override fields: `dm_policy`, `group_policy`, `output_format`, `threading`, `prefix_agent_name`, `rate_limit_per_minute`, `rate_limit_per_user`, `message_debounce_ms`, `reply_precheck`, `disable_commands`, `allowed_commands`, `blocked_commands`, `group_trigger_patterns`, `auto_route`.\n\n## Crash Recovery\n\nWhen a `MessageJournal` is attached via `BridgeManager::with_journal()`, in-flight messages are journaled before dispatch. On restart, `recover_pending()` returns interrupted entries for re-processing, and `compact_journal()` cleans up the journal on shutdown.","command-line-interface":"# Command Line Interface\n\n# LibreFang CLI (`librefang-cli`)\n\nThe command-line interface for the LibreFang Agent OS. When invoked with a subcommand, it dispatches to the appropriate handler — either talking to a running daemon over HTTP or booting an in-process kernel for single-shot operations. When invoked with no subcommand in a TTY, it presents an interactive launcher menu.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Entry[\"main()\"] -->|i18n init| I18N[\"i18n module\"]\n    Entry -->|load .env| Dotenv[\"librefang-extensions::dotenv\"]\n    Entry -->|no subcommand + TTY| Launcher[\"launcher.rs\"]\n    Entry -->|subcommand| Dispatch[\"Command dispatch\"]\n\n    Dispatch -->|\"start / restart\"| Daemon[\"Daemon lifecycle\"]\n    Dispatch -->|\"init / doctor\"| Local[\"Local operations\"]\n    Dispatch -->|\"chat / agents / status\"| DaemonClient[\"Daemon HTTP client\"]\n\n    Daemon -->|\"foreground\"| InProcess[\"In-process kernel\"]\n    Daemon -->|\"background\"| Detached[\"Detached child process\"]\n\n    DaemonClient -->|\"daemon running\"| HTTP[\"http_client.rs → daemon API\"]\n    DaemonClient -->|\"no daemon\"| Fallback[\"Single-shot kernel boot\"]\n\n    Launcher -->|user picks \"Desktop App\"| DesktopInstall[\"desktop_install.rs\"]\n    Launcher -->|user picks \"Doctor\"| Doctor[\"doctor.rs\"]\n    Launcher -->|background thread| FindDaemon[\"find_daemon()\"]\n```\n\n## Startup Sequence\n\n`main()` performs the following in order:\n\n1. **Ctrl+C handler** — On Windows/MINGW, installs a native `SetConsoleCtrlHandler` that force-exits on interrupt (the default handler doesn't reliably interrupt blocking `read_line`). On Unix, the default SIGINT handler is sufficient.\n\n2. **Environment loading** — Calls `librefang_extensions::dotenv::load_dotenv()`, which reads `.env` files and populates the vault via `librefang_extensions::vault`.\n\n3. **i18n initialization** — `i18n::init()` loads the Fluent bundle for the user's configured language (falls back to English). All subsequent `t()` / `t_args()` calls are thread-local lookups.\n\n4. **CLI parsing** — Clap parses arguments into the `Cli` struct. If no subcommand is given and stdout is a TTY, the interactive launcher runs.\n\n5. **Command dispatch** — The matched `Commands` variant maps to a `cmd_*` function. Commands that need the daemon call `find_daemon()` first; others operate locally.\n\n## Key Submodules\n\n### `launcher.rs` — Interactive Menu\n\nA Ratatui one-shot menu shown when `librefang` is run without arguments in a terminal. It detects whether the user is first-time (no `~/.librefang/config.toml`) and adapts the menu order accordingly.\n\n**State machine:**\n\n- **Menu screen** — List of `MenuItem` entries navigable with arrow keys, `j`/`k`, or number keys `1-9`. Returns a `LauncherChoice` enum variant.\n- **Help screen** — Renders the full `--help` output with scrolling (PageUp/PageDown, `g`/`G` for top/bottom).\n\n**Background daemon detection:** On launch, a background thread calls `find_daemon()` and queries `/api/agents` for the agent count. The result updates the status area (spinner → daemon URL + agent count, or \"No daemon running\").\n\n**Provider detection:** Checks `PROVIDER_ENV_VARS` (ANTHROPIC_API_KEY, OPENAI_API_KEY, DEEPSEEK_API_KEY, etc.) and displays the first match. If none are found, shows a hint to configure one.\n\n**Migration detection:** First-run users who have `~/.openclaw` or `~/.openfang` directories see a migration hint in the launcher.\n\n```mermaid\nstateDiagram-v2\n    [*] --> Menu: run()\n    Menu --> Menu: j/k/arrow navigate\n    Menu --> Menu: 1-9 quick select\n    Menu --> Help: ShowHelp selected\n    Menu --> [*]: other choice / q / Esc\n    Help --> Menu: q / Esc / Backspace\n    Help --> Help: scroll\n```\n\n### `doctor.rs` — Diagnostic Audit Framework\n\nA trait-based registry of health checks that runs alongside the legacy inline checks in `cmd_doctor`. Each check is an independent struct implementing `AuditCheck`.\n\n**Adding a new check:**\n\n1. Define a unit struct implementing `AuditCheck`.\n2. Add it to `registered_checks()`.\n\nEach check receives an `AuditContext` (currently just `librefang_home: PathBuf`) and returns an `AuditResult` with a stable machine-readable `name`, a `Severity` (Pass / Info / Warn / Error), a human-readable `summary`, and an optional remediation `hint`.\n\n**Registered checks:**\n\n| Check | Name | What it validates |\n|---|---|---|\n| `VaultKeyCheck` | `vault_key_length` | `LIBREFANG_VAULT_KEY` must base64-decode to exactly 32 bytes. Catches the common mistake of using 32 ASCII characters (which decode to 24 bytes). |\n| `ApiListenAddrCheck` | `api_listen_addr` | `api_listen` in config.toml must parse as `SocketAddr`. Warns on privileged ports (<1024) and port 0. |\n| `ConfigTomlSchemaCheck` | `config_toml_schema` | config.toml exists and parses as valid TOML. |\n\n**Testing:** Tests use `tempfile::TempDir` for isolation and a process-wide `Mutex` (`env_lock`) for tests that mutate `LIBREFANG_VAULT_KEY`, preventing races under `cargo test` parallel execution.\n\n### `desktop_install.rs` — Desktop App Lifecycle\n\nHandles discovering, downloading, and launching the LibreFang desktop application.\n\n**Discovery** (`find_desktop_binary`):\n1. Sibling of the current CLI executable\n2. PATH lookup (via `which_lookup`)\n3. Platform-specific install locations:\n   - macOS: `/Applications/LibreFang.app/Contents/MacOS/LibreFang`\n   - Windows: `%LOCALAPPDATA%\\LibreFang\\LibreFang.exe`\n   - Linux: `~/.local/bin/librefang-desktop` or `~/Applications/LibreFang.AppImage`\n\n**Installation** (`prompt_and_install` → `download_and_install`):\n- Queries GitHub Releases API for the latest release\n- Selects the matching platform asset (DMG for macOS, setup.exe for Windows, AppImage for Linux)\n- Streams the download to a temp directory\n- Platform-specific install:\n  - **macOS:** Mounts DMG via `hdiutil`, copies `.app` to `/Applications`, clears quarantine xattr\n  - **Windows:** Runs NSIS installer silently (`/S` flag)\n  - **Linux:** Copies AppImage to `~/.local/bin/`, sets executable permission\n\n**Launching** (`launch`):\n- On macOS, if the binary is inside a `.app` bundle, uses `open -a` on the bundle\n- Otherwise, spawns the process detached (null stdin/stdout/stderr)\n\n### `i18n.rs` — Internationalization\n\nUses [Fluent](https://projectfluent.org/) for string localization. FTL resources are embedded at compile time via `include_str!` from `locales/en/main.ftl` and `locales/zh-CN/main.ftl`.\n\n**Public API:**\n\n- `init(language)` — Creates a `FluentBundle` for the given language and stores it in a thread-local `RefCell`. Falls back to English if the language is unsupported or the resource fails to parse.\n- `t(key)` — Simple lookup. Returns `[key]` if i18n is uninitialized or the key is missing.\n- `t_args(key, &[(\"name\", \"value\"), ...])` — Lookup with interpolation.\n\nSupported languages: `\"en\"` (default), `\"zh-CN\"`.\n\n### `log_filter.rs` — Reloadable Tracing Filter\n\nA hand-rolled reloadable `EnvFilter` that wraps `ArcSwap<EnvFilter>` instead of using `tracing_subscriber::reload::Layer` (which would bake the full subscriber type into a `OnceLock` signature).\n\n**Why it exists:** The daemon installs `EnvFilter` as a per-layer filter so the OpenTelemetry exporter sees the full span tree while stderr stays terse. The subscriber stack is complex enough that the generic `reload::Handle` type becomes unwieldy.\n\n**How it works:**\n\n- `ReloadableEnvFilter::install(initial)` stores the filter in a process-global `OnceLock<Arc<ArcSwap<EnvFilter>>>`.\n- `ReloadableEnvFilter::install_with_baseline(initial, baseline)` additionally stores baseline directives (e.g. `\"librefang_kernel=warn\"`) that are reapplied on every reload.\n- `reload_log_level(directive)` parses the directive, reapplies baseline directives, swaps the inner filter, and calls `tracing_core::callsite::rebuild_interest_cache()` to invalidate per-callsite `Interest` caches.\n- `CliLogLevelReloader` implements the kernel's `LogLevelReloader` trait, bridging this module to the dashboard's hot-reload actions.\n\n### `http_client.rs` — HTTP Client\n\nThin wrapper around `reqwest::blocking::Client` that uses bundled CA roots from `librefang_runtime::http_client::tls_config()`. This ensures the CLI works in environments where the system certificate store is incomplete or unavailable.\n\n### `bundled_agents.rs` — Registry Sync\n\nBackwards-compatible wrapper that delegates to `librefang_runtime::registry_sync::sync_registry()`. Called during `init` and `init --upgrade` to populate the local agent registry.\n\n## Command Structure\n\nThe CLI uses Clap with a deeply nested subcommand tree. Top-level commands include:\n\n| Command | Mode | Description |\n|---|---|---|\n| `init` | Local | Create `~/.librefang/` and default config |\n| `start` | Daemon | Start the kernel daemon (background or foreground) |\n| `stop` / `restart` | Daemon | Lifecycle management |\n| `chat` | Daemon or single-shot | Interactive chat with an agent |\n| `agent` | Daemon or single-shot | Agent management (spawn, list, kill, set) |\n| `models` | Local | Browse models, aliases, providers |\n| `doctor` | Local | Run diagnostic health checks |\n| `tui` | Daemon | Full interactive terminal dashboard |\n| `update` | Local | Self-update from GitHub releases |\n| `config` | Local | Show, edit, get, set configuration |\n| `mcp` | Local + daemon | MCP server management |\n| `skill` | Local + daemon | Skill lifecycle (install, list, search, evolve) |\n| `channel` | Daemon | Messaging channel integrations |\n| `vault` | Local | Encrypted credential vault |\n| `security` | Daemon | Security status, audit trail, Merkle verification |\n| `migrate` | Local | Import from OpenClaw, LangChain, AutoGPT, OpenFang |\n\nCommands marked \"Daemon\" require a running daemon; if none is found, they either error or fall back to single-shot kernel boot. Commands marked \"Local\" operate entirely on the filesystem.\n\n## Daemon Communication\n\nCommands that need the daemon follow this pattern:\n\n```\nfind_daemon()  →  read_daemon_info()  →  HTTP client to daemon_url\n```\n\n`find_daemon()` looks for daemon info in `~/.librefang/` (or `$LIBREFANG_HOME`). If the daemon is running, commands make HTTP requests to its API (default `http://127.0.0.1:4545`). If not, many commands boot an in-process `LibreFangKernel` instance, run the operation, and shut down.\n\n## Memory Allocator\n\nOn non-MSVC targets, the CLI uses `tikv-jemallocator` as the global allocator for improved performance with the many small allocations typical of agent orchestration workloads.\n\n## Tracing Initialization\n\nTwo tracing modes depending on context:\n\n- **`init_tracing_stderr`** — Used by the daemon. Sets up a per-layer `ReloadableEnvFilter`, stderr formatting, and an optional OpenTelemetry exporter with a reload slot.\n- **`init_tracing_file`** — Used for detached daemon processes. Writes structured logs to a file with rotation (7-day retention).","dashboard-application":"# Dashboard Application\n\n# Dashboard Application\n\nThe dashboard is a React-based web frontend for the LibreFang agent platform. It provides a management UI for agents, sessions, skills, channels, workflows, memory, budgets, MCP servers, and all other kernel subsystems. The frontend communicates with the LibreFang kernel daemon through a RESTful API.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Pages[\"Pages (src/pages/)\"] --> Mutations[\"Mutation Hooks (lib/mutations/)\"]\n    Pages --> Queries[\"Query Hooks (lib/queries/)\"]\n    Mutations --> APIClient[\"API Client (dashboard/src/api.ts)\"]\n    Queries --> APIClient\n    APIClient --> GeneratedTypes[\"OpenAPI Types (openapi/generated.ts)\"]\n    APIClient -->|\"HTTP + SSE\"| Kernel[\"LibreFang Kernel Daemon\"]\n\n    subgraph \"Auth Flow\"\n        APIClient --> buildHeaders\n        buildHeaders --> authHeader\n        authHeader -->|\"localStorage.getItem\"| getStoredApiKey\n    end\n```\n\n## API Client (`dashboard/src/api.ts`)\n\nThe central HTTP client wraps `fetch` and handles authentication, error parsing, and response typing. Every data-fetching and mutation path in the dashboard flows through this module.\n\n### Core HTTP Primitives\n\n| Function | Purpose |\n|----------|---------|\n| `get(path)` | JSON GET request |\n| `getText(path)` | Plain-text GET (used for metrics, raw file content) |\n| `post(path, body)` | JSON POST request |\n| `put(path, body)` | JSON PUT request |\n| `patch(path, body)` | JSON PATCH request |\n| `del(path)` | DELETE request |\n\nAll primitives call `buildHeaders()` to attach authentication, then call `parseError()` on non-2xx responses to produce structured error objects.\n\n### Authentication\n\nAuthentication is API-key-based, stored in `localStorage`:\n\n- **`authHeader()`** — reads the stored key via `getStoredApiKey()` (wraps `localStorage.getItem`) and returns `{ Authorization: \"Bearer <key>\" }`\n- **`setApiKey(key)`** — persists the key to `localStorage` and updates the in-memory singleton\n- **`clearApiKey()`** — removes the key from `localStorage`, used when a 401 is encountered\n- **`dashboardLogin(provider)`** — initiates OAuth2 login flow with a specific provider\n- **`verifyStoredAuth()`** — validates the stored key against `/api/auth/introspect`\n\nWhen any request returns a 401, the client calls `clearApiKey()` and the router redirects to the login page. This flow is visible in the execution traces: for example, `ChatPage` → `useCreateAgentSession` → `createAgentSession` → `post` → `buildHeaders` → `authHeader` → `getItem` → … → on 401 → `clearApiKey`.\n\n### Error Handling\n\n`parseError(response)` consumes the response body and throws an `ApiError` (from `lib/http/errors.ts`) containing the status code and a human-readable message. All mutation and query hooks catch this error type for toast notifications and error boundaries.\n\n## OpenAPI Type Definitions (`openapi/generated.ts`)\n\nAuto-generated by `openapi-typescript` from the kernel's OpenAPI spec. **Do not edit manually** — regenerate after any backend route changes.\n\n### Structure\n\nThe file exports three main namespaces:\n\n- **`paths`** — maps every URL path to its HTTP methods, parameter shapes, and operation IDs\n- **`components[\"schemas\"]`** — request/response body types (`SpawnRequest`, `MessageRequest`, `BulkCreateRequest`, etc.)\n- **`operations`** — per-operation type unions used for request/response typing\n\n### Key Request Schemas\n\n| Schema | Used By | Purpose |\n|--------|---------|---------|\n| `SpawnRequest` | `spawn_agent`, `bulk_create_agents` | Create an agent from TOML manifest or template name |\n| `MessageRequest` | `send_message`, `send_message_stream` | Send a chat message with optional attachments, channel metadata, thinking overrides |\n| `PatchAgentConfigRequest` | `patch_agent_config` | Hot-update agent name, prompt, model, temperature, web search mode |\n| `BulkAgentIdsRequest` | `bulk_start_agents`, `bulk_stop_agents`, `bulk_delete_agents` | Operate on multiple agents by ID list |\n| `CloneAgentRequest` | `clone_agent` | Clone an agent with optional skill/tool inclusion |\n| `CallbackBody` | `auth_callback_post` | OAuth2 authorization code + state parameter |\n\n### API Domain Map\n\nThe API surface covers these functional domains:\n\n**Agents** (`/api/agents/*`)\n- CRUD, clone, bulk operations, mode switching, model selection\n- Messaging (synchronous and SSE streaming)\n- Session management (list, create, switch, export/import, reset, reboot, compact)\n- File workspace, skills, tools, MCP server assignments\n- Memory export/import, traces, deliveries, upload attachments\n\n**Agent-to-Agent (A2A)** (`/a2a/*`, `/api/a2a/*`)\n- Internal agent card listing and task management\n- External agent discovery, task dispatch, status polling\n\n**Authentication** (`/api/auth/*`)\n- Multi-provider OAuth2 login, callback handling, token introspection, user info\n\n**Channels** (`/api/channels/*`)\n- Listing 40+ channel adapters with status\n- Per-channel configuration, testing, hot-reload\n- WhatsApp/WeChat QR login flows\n\n**Communications** (`/api/comms/*`)\n- Inter-agent messaging, task queue, topology graph, event streaming (SSE)\n\n**MCP Servers** (`/api/mcp/*`)\n- Server CRUD, catalog browsing, health checks, reconnection, HTTP JSON-RPC bridge\n\n**Memory** (`/api/memory/*`)\n- Proactive memory CRUD, search, consolidation, deduplication, per-agent scoping, KV store, import/export, cleanup\n\n**Budget & Usage** (`/api/budget/*`, `/api/usage/*`)\n- Global and per-agent budget limits, cost ranking, usage stats by model, daily breakdowns\n\n**Workflows** (`/api/workflows/*`)\n- Workflow CRUD, execution, run history, save-as-template\n\n**Scheduling** (`/api/cron/*`, `/api/schedules/*`)\n- Cron job CRUD, enable/disable toggle, manual trigger, status\n\n**Hands** (`/api/hands/*`)\n- Hand marketplace browsing, activation (spawns agent), deactivation, pause/resume, settings, dependency management, browser state\n\n**Skills & Extensions** (`/api/skills/*`, `/api/extensions/*`, `/api/clawhub/*`)\n- Install/uninstall, ClawHub marketplace browse/search/install with security pipeline\n\n**Configuration & System** (`/api/config/*`, `/api/health`, `/api/metrics`, etc.)\n- Config get/set/reload/schema, health probes, Prometheus metrics, backup/restore, shutdown\n\n## Query and Mutation Hooks\n\n### Query Hooks (`lib/queries/`)\n\nEach file exports React Query hooks that wrap the API client functions:\n\n| Module | Example Hooks | API Functions Called |\n|--------|---------------|---------------------|\n| `workflows.ts` | `useWorkflow`, `useWorkflowTemplates` | `getWorkflow`, `listWorkflowTemplates` |\n| `channels.ts` | `useCommsEvents` | `listCommsEvents` |\n| `mcp.ts` | `useMcpHealth` | MCP health check → kernel supervisor |\n| `hands.ts` | `useHandStats` | Hand stats → proactive memory subsystem |\n| `terminal.ts` | `useTerminalHealth` | Terminal health → kernel supervisor |\n| `memory.ts` | `useMemoryStats` | Memory stats → proactive memory subsystem |\n| `sessions.ts` | Session streaming hooks | SSE event handling |\n\n### Mutation Hooks (`lib/mutations/`)\n\nEach file exports React Query mutation hooks:\n\n| Module | Example Hooks |\n|--------|---------------|\n| `agents.ts` | `useCreateAgentSession` |\n| `approvals.ts` | `useApproveApproval` |\n| `schedules.ts` | `useDeleteSchedule` |\n| `workflows.ts` | `useUpdateWorkflow` |\n| `goals.ts` | `useUpdateGoal` |\n| `providers.ts` | `useSetProviderKey` |\n\nMutations follow the same pattern: page component → mutation hook → API client function → `buildHeaders` → `authHeader` → `localStorage` lookup → HTTP request → `parseError` on failure.\n\n## Page Components\n\nEach page corresponds to a major dashboard view and consumes the query/mutation hooks:\n\n| Page | Route | Key Interactions |\n|------|-------|-----------------|\n| `ChatPage` | Agent chat | Message sending (sync + SSE stream), session management, keyboard shortcuts |\n| `TerminalPage` | Terminal emulator | WebSocket terminal sessions, window management |\n| `CanvasPage` / `WorkflowsPage` | Workflow editor | Visual workflow building, execution, template management |\n| `ModelsPage` | Model catalog | Browse providers, set default models, manage aliases/custom models |\n| `ApprovalsPage` | Approval queue | Review, approve, reject pending requests |\n| `GoalsPage` | Agent goals | CRUD goal tracking |\n| `ConfigPage` | System config | View/edit config.toml values, reload |\n| `WizardPage` | Initial setup | Provider key setup, first-run experience |\n| `McpServersPage` | MCP management | Server CRUD, health monitoring |\n\n## Real-Time Streaming\n\nThe dashboard uses Server-Sent Events (SSE) for real-time data in two contexts:\n\n1. **Log streaming** (`/api/logs/stream`) — audit log tail with level/filter parameters, 15-second heartbeat\n2. **Communication events** (`/api/comms/events/stream`) — inter-agent event stream, polled every 500ms\n3. **Chat streaming** (`/api/agents/{id}/message/stream`) — token-by-token LLM response streaming\n\nQuery hooks for streams attach `addEventListener` / `removeEventListener` for message and error events, with cleanup in `useEffect` return functions. This is visible in the execution traces where pages like `ChatPage`, `ConfigPage`, `ModelsPage`, and `TerminalPage` all register and deregister event listeners.\n\n## Data Flow Example: Sending a Chat Message\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant ChatPage\n    participant useChatMessages\n    participant API as api.ts\n    participant Kernel\n\n    User->>ChatPage: Types message, hits Send\n    ChatPage->>useChatMessages: invoke send()\n    useChatMessages->>API: post(\"/api/agents/{id}/message\", body)\n    API->>API: buildHeaders() → authHeader()\n    API->>Kernel: HTTP POST with Bearer token\n    Kernel-->>API: MessageResponse JSON\n    API-->>useChatMessages: Parsed response\n    useChatMessages-->>ChatPage: Update message list state\n    ChatPage-->>User: Render response + token count + cost\n```\n\nFor streaming messages, the same flow uses `post()` to `/api/agents/{id}/message/stream` and processes SSE `data:` events incrementally.\n\n## Adding a New API Integration\n\n1. **Add or update the kernel route** — the OpenAPI spec is auto-generated from Rust handler annotations\n2. **Regenerate types** — run `openapi-typescript` against the updated spec to update `generated.ts`\n3. **Add an API client function** in `dashboard/src/api.ts` using the appropriate primitive (`get`, `post`, `put`, `patch`, `del`)\n4. **Create query/mutation hooks** in the appropriate `lib/queries/` or `lib/mutations/` file\n5. **Consume the hook** from the target page or component\n\n## Testing Patterns\n\n- **API client tests** (`api.test.ts`) verify `setApiKey`, `getAgentTools`, `patchHandAgentRuntimeConfig`, `getMetricsText`, `verifyStoredAuth`, and `getItem`/`get` interactions\n- **Mutation tests** (`workflows.test.tsx`, `schedules.test.tsx`) use `createQueryClientWrapper` from `lib/test/query-client.tsx` to provide a React Query context\n- **Component tests** (`DeliveryTargetsEditor.test.tsx`) test builder functions like `buildTarget`\n- **Utility tests** (`chat.test.ts`, `chatPicker.test.ts`, `csvParser.test.ts`) cover pure functions independently","desktop-application":"# Desktop Application\n\n# LibreFang Desktop Application\n\nNative desktop wrapper for the LibreFang Agent OS, built on **Tauri 2.0**. Boots the kernel and embedded API server in the background, opens a native WebView pointing at the WebUI dashboard, and provides system tray integration, global shortcuts, auto-start, auto-update, and native OS notifications.\n\nSupports two operating modes — **local** (embedded server on a random localhost port) and **remote** (WebView connects to an existing LibreFang instance over the network).\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"main.rs<br/>CLI parsing\"] --> RUN[\"lib.rs run()\"]\n    RUN --> MODE{\"Resolve mode\"}\n    MODE -->|\"--server-url or env\"| REMOTE[\"Remote mode<br/>WebView → external URL\"]\n    MODE -->|\"--local or saved pref\"| LOCAL[\"start_server()<br/>kernel + axum on localhost\"]\n    MODE -->|\"no preference\"| CONN[\"Connection screen<br/>lfconnect:// URI scheme\"]\n\n    CONN -->|\"start_local IPC\"| LOCAL\n    CONN -->|\"connect_remote IPC\"| REMOTE\n\n    LOCAL --> SH[\"ServerHandle\"]\n    SH --> KERNEL[\"LibreFangKernel\"]\n    SH --> AXUM[\"axum server<br/>random port\"]\n    KERNEL --> BUS[\"Event Bus\"]\n    BUS --> NOTIFY[\"Native notifications\"]\n\n    RUN --> TRAY[\"System tray\"]\n    RUN --> SHORTCUTS[\"Global shortcuts\"]\n    RUN --> UPDATER[\"Auto-updater\"]\n```\n\n## Module Layout\n\n| File | Responsibility |\n|---|---|\n| `main.rs` | CLI argument parsing, dotenv loading, delegates to `lib::run()` |\n| `lib.rs` | Application builder, state registration, window creation, mode resolution, event forwarding |\n| `commands.rs` | Tauri IPC command handlers exposed to the frontend |\n| `connection.rs` | Connection screen HTML, remote/local IPC commands, preference persistence |\n| `server.rs` | Kernel boot, embedded axum server lifecycle on a background thread |\n| `tray.rs` | System tray icon and context menu |\n| `shortcuts.rs` | System-wide keyboard shortcut registration |\n| `updater.rs` | Background update checking, download, install, and restart |\n\n## Startup and Mode Resolution\n\n`main()` synchronously loads environment variables from `~/.librefang/.env` (must happen before any threads are spawned), parses CLI flags via `clap`, then calls `lib::run()`.\n\n`run()` resolves the connection mode with this priority:\n\n1. **`--server-url <URL>`** CLI flag → remote mode\n2. **`--local`** CLI flag → local mode\n3. **`LIBREFANG_SERVER_URL`** environment variable → remote mode\n4. **Saved preference** in `~/.librefang/desktop.toml` → remote or local\n5. **Fallback** → show the connection screen\n\n```toml\n# ~/.librefang/desktop.toml structure\n[connection]\nmode = \"remote\"            # or \"local\"\nserver_url = \"http://...\"   # omitted for local mode\n```\n\nFor local mode, `start_server()` is called immediately to boot the kernel and bind a random port before any Tauri window is created. For the connection screen, the app registers a custom `lfconnect://` URI scheme protocol that serves the connection HTML (avoids the WebKitGTK blank-page issue with `about:blank`).\n\n## Managed State\n\nTauri managed state uses interior mutability (`RwLock`/`Mutex`) so values can be updated when switching between local and remote modes at runtime. All state types are registered once during `run()`:\n\n| State Type | Inner Type | Purpose |\n|---|---|---|\n| `PortState` | `RwLock<Option<u16>>` | Local server port. `None` in remote mode. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel reference + startup instant. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | Whether connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Handle for shutting down the local server. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the server started (used for uptime display).\n\n## Embedded Server (`server.rs`)\n\n`start_server()` performs three things synchronously on the calling thread:\n\n1. Boots `LibreFangKernel` (no tokio required)\n2. Binds `TcpListener` to `127.0.0.1:0` to grab a random free port\n3. Spawns a named background thread (`librefang-server`) with its own multi-threaded tokio runtime\n\nThe background thread calls `run_embedded_server()`, which:\n- Calls `kernel.start_background_agents()` inside the tokio context\n- Spawns the approval expiry sweep task\n- Spawns dashboard asset sync via `librefang_api::webchat::sync_dashboard()`\n- Runs the axum server with graceful shutdown via a `watch` channel\n\n`ServerHandle` owns the shutdown sender and the thread join handle. Calling `shutdown()` sends the signal, waits for the thread, then calls `kernel.shutdown()`. Drop sends the signal without joining (best-effort to avoid blocking in drop). An `AtomicBool` guards against double-shutdown.\n\n## IPC Commands (`commands.rs`)\n\nAll commands return `Result<T, String>` for Tauri serialization. Key commands:\n\n| Command | Description |\n|---|---|\n| `get_port` | Returns the local server port from `PortState` |\n| `get_status` | Returns JSON with `status`, `port`, `agents`, `uptime_secs` |\n| `get_agent_count` | Returns the number of registered agents |\n| `import_agent_toml` | Opens native file picker, validates TOML as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, spawns the agent |\n| `import_skill_file` | Opens native file picker, copies to `~/.librefang/skills/`, triggers skill registry hot-reload |\n| `get_autostart` / `set_autostart` | Read/write login auto-start via `tauri-plugin-autostart` |\n| `check_for_updates` | Proxies to `updater::check_for_update()` |\n| `install_update` | Downloads, installs, and restarts (does not return on success) |\n| `open_config_dir` / `open_logs_dir` | Opens `~/.librefang/` or `~/.librefang/logs/` in the OS file manager |\n| `uninstall_app` | Platform-specific uninstall (see below) |\n\n### Platform-specific Uninstall\n\n`uninstall_app` is `async` and conditionally compiled:\n\n- **Windows**: Queries `HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall` for the NSIS `UninstallString` registry value, then spawns the uninstaller and exits.\n- **macOS**: Walks up from the executable to find the enclosing `.app` bundle, uses `osascript` to tell Finder to move it to Trash, then exits.\n- **Linux/AppImage**: Detects AppImage via file extension or `APPIMAGE` env var, deletes the file, and exits. For system packages, returns a hint string like `\"sudo apt remove librefang\"`.\n\n## Connection Screen (`connection.rs`)\n\nProvides `connection_html()` — a self-contained HTML/CSS/JS page with dark-themed UI for:\n\n- Entering a remote server URL and testing connectivity\n- Connecting to a remote server\n- Starting a local embedded server\n- Persisting the choice via `save_preference()`\n- Triggering uninstall\n\nThe JavaScript uses a polling `waitForTauri()` function (up to 8 seconds) to wait for the Tauri v2 IPC bridge to become available on the custom protocol page.\n\n### IPC Commands\n\n| Command | Description |\n|---|---|\n| `test_connection` | HTTP GET to `{url}/api/health` with a 10-second timeout, validates scheme |\n| `connect_remote` | Validates URL, hits health endpoint, updates all managed state for remote mode, navigates WebView |\n| `start_local` | Calls `start_server()` via `spawn_blocking`, updates all managed state for local mode, starts event forwarding, navigates WebView |\n\nWhen switching modes, the previous mode's state is cleared (local kernel set to `None`, port set to `None`, etc.).\n\n## Native Notifications (`lib.rs`)\n\n`forward_kernel_events()` subscribes to the kernel event bus and surfaces critical events as native OS notifications:\n\n- **Agent crashed** — `LifecycleEvent::Crashed`\n- **Kernel stopping** — `SystemEvent::KernelStopping`\n- **Quota enforced** — `SystemEvent::QuotaEnforced`\n\nBroadcast lag is logged but not fatal. Channel closure terminates the loop.\n\n## System Tray (`tray.rs`)\n\n`setup_tray()` builds a context menu with:\n\n- **Show Window** — focuses the main WebView window\n- **Open in Browser** — opens the current server URL in the default browser\n- **Change Server** — shuts down local server if running, clears state, navigates back to the connection screen via `document.write()`\n- **Status display** — shows running/not connected and agent count (disabled items)\n- **Launch at Login** — toggleable `CheckMenuItem` for auto-start\n- **Check for Updates** — triggers update check, shows notification with result, auto-installs if available\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — exits the app\n\nLeft-clicking the tray icon shows and focuses the window. The window close button is intercepted to hide to tray instead of quitting (desktop only).\n\n## Global Shortcuts (`shortcuts.rs`)\n\n`build_shortcut_plugin()` registers three system-wide shortcuts:\n\n| Shortcut | Action |\n|---|---|\n| `Ctrl+Shift+O` | Show/focus window |\n| `Ctrl+Shift+N` | Show window, emit `navigate` event with `\"agents\"` |\n| `Ctrl+Shift+C` | Show window, emit `navigate` event with `\"chat\"` |\n\nRegistration failure is non-fatal — the app logs a warning and continues.\n\n## Auto-Updater (`updater.rs`)\n\nTwo entry points:\n\n- `spawn_startup_check()` — delays 10 seconds after launch, probes the update manifest endpoint via HEAD request (skips if 404 to avoid log noise when no manifest exists), then checks and silently installs any available update with a notification.\n- `check_for_update()` / `download_and_install_update()` — on-demand versions called from IPC commands or tray menu.\n\n`UpdateInfo` is returned as a structured JSON object with `available`, `version`, and `body` fields. On successful install, `app_handle.restart()` is called — the function does not return.\n\n## Window Behavior (Desktop)\n\n- **Single instance** — second launch attempts to focus the existing window via `tauri-plugin-single-instance`\n- **Hide to tray on close** — `CloseRequested` event is intercepted; window is hidden instead of destroyed\n- **Minimized launch** — auto-start passes `--minimized` so the app starts in the tray\n- **Window size** — 1280×800 default, 800×600 minimum\n\n## Data Paths\n\n| Path | Purpose |\n|---|---|\n| `~/.librefang/` | Root config directory |\n| `~/.librefang/desktop.toml` | Saved connection preference |\n| `~/.librefang/workspaces/agents/{name}/agent.toml` | Imported agent manifests |\n| `~/.librefang/skills/` | Imported skill files |\n| `~/.librefang/logs/` | Application logs |\n| `~/.librefang/.env` | Environment variables loaded at startup |","hands-framework":"# Hands Framework\n\n# LibreFang Hands Framework\n\n## Overview\n\nA **Hand** is a pre-built, domain-complete autonomous agent configuration that users activate from a marketplace. Unlike regular agents — which users chat with interactively — Hands work autonomously in the background. Users check in on them rather than drive them.\n\nThis crate provides:\n\n- The type system for defining, configuring, and instantiating Hands (`lib.rs`)\n- A thread-safe registry that manages definitions, tracks active instances, and persists state across daemon restarts (`registry.rs`)\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Disk\n        HT[HAND.toml]\n        SK[SKILL.md]\n        AS[SKILL-role.md]\n        AT[agents/template/agent.toml]\n        PS[hand_state.json]\n    end\n\n    subgraph Registry\n        DM[definitions DashMap]\n        IM[instances DashMap]\n        AI[agent_index DashMap]\n        ACI[active_index DashMap]\n    end\n\n    HT -->|parse| DM\n    SK -->|attach skill_content| DM\n    AS -->|attach agent_skill_content| DM\n    AT -->|base template resolve| DM\n    DM -->|activate| IM\n    IM -->|reverse lookup| AI\n    IM -->|O(1) active check| ACI\n    IM -->|persist_state| PS\n    PS -->|load_state| IM\n```\n\n## Core Concepts\n\n### Hand vs Agent\n\n| Aspect | Agent | Hand |\n|--------|-------|------|\n| Interaction | User chats with it | Works for user autonomously |\n| Source | User-created | Pre-built marketplace package |\n| Configuration | Ad-hoc | Declarative `HAND.toml` + settings schema |\n| Agents | Single entity | One or more coordinated agents |\n| Lifecycle | Managed directly | Activated / paused / deactivated |\n\n### Categories\n\nHands are classified into `HandCategory` variants: `Content`, `Security`, `Productivity`, `Development`, `Communication`, `Data`, `Finance`, `Other`. These drive marketplace browsing and filtering.\n\n### Single-Agent vs Multi-Agent\n\nA Hand can contain one agent or many:\n\n- **Single-agent**: defined via `[agent]` in TOML, internally stored as `{\"main\": ...}` with `coordinator = true`\n- **Multi-agent**: defined via `[agents.planner]`, `[agents.analyst]`, etc., each with an explicit `coordinator` flag\n\nThe coordinator agent receives user messages. If no agent is marked coordinator, the first agent (sorted by role name in the `BTreeMap`) is used.\n\n## HAND.toml Format\n\nHands are defined in `HAND.toml` files. Two wrapper formats are accepted:\n\n```toml\n# Flat format — fields at top level\nid = \"clip\"\nname = \"Video Clipper\"\ndescription = \"Autonomous video clipping\"\ncategory = \"content\"\nicon = \"🎬\"\nve
