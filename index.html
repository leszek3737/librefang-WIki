link the Rust code. A side effect is that desktop builds also produce these artifacts, adding roughly 10–20% to clean build times. Cargo cannot condition gate crate types, so this cost is accepted.\n\n## Tauri Configuration Files\n\nTauri 2.0 uses layered configuration. The base `tauri.conf.json` is merged with a platform-specific overlay:\n\n| File | Scope |\n|---|---|\n| `tauri.conf.json` | Base config: product name, identifier, CSP, bundle settings, icon paths |\n| `tauri.desktop.conf.json` | Desktop overlay: auto-updater public key, endpoint URLs, Windows install mode |\n| `tauri.android.conf.json` | Android overlay: `lfconnect://` scheme, minSdkVersion 26, bundled frontend |\n| `tauri.ios.conf.json` | iOS overlay: `lfconnect://` scheme, minimum iOS 16.0, bundled frontend |\n\nKey details from the base config:\n\n- **CSP** allows connections to `http://127.0.0.1:*` and `ws://127.0.0.1:*` (local API server), plus Google Fonts. `object-src` is set to `'none'`.\n- **Bundle targets** are set to `\"all\"` — Tauri produces .dmg/.app (macOS), .msi/.exe (Windows), .deb/.AppImage (Linux).\n- **withGlobalTauri** is `true`, exposing the Tauri API globally in the webview for the React frontend to call.\n\n## Platform-Specific Dependencies\n\nCargo features and `cfg` predicates gate native capabilities by platform.\n\n### macOS and Windows\n\nAlways includes:\n\n- `tauri/tray-icon` — native system tray (NSStatusItem / Shell_NotifyIconW)\n- `tauri-plugin-single-instance` — prevents multiple app instances\n- `tauri-plugin-autostart` — launch at login\n- `tauri-plugin-global-shortcut` — global hotkeys\n- `tauri-plugin-updater` — in-app updates from GitHub Releases\n- `tauri-plugin-shell` — CLI process spawning\n\n### Linux\n\nSame plugin set as macOS/Windows, but **`tray-icon` is opt-in** via the `linux-tray` feature. The reason: Tauri 2.10's `tray-icon` on Linux pulls `libappindicator-rs 0.9`, which transitively depends on 8 unmaintained GTK3 crates (RUSTSEC-2024-0411 through 0420) plus a glib unsoundness (RUSTSEC-2024-0429). Headless server and CI builds don't need a tray, so it's off by default. See issue #3667.\n\n### Mobile (iOS / Android)\n\n- `tauri-plugin-barcode-scanner` — QR code scanning for connection setup\n- `keyring` — secure credential storage\n\nDesktop-only plugins (single-instance, autostart, global shortcuts, updater, shell) are compiled out via `cfg(not(any(target_os = \"ios\", target_os = \"android\")))`.\n\n## Cargo Features\n\n| Feature | Default | Purpose |\n|---|---|---|\n| `default` | ✅ | Inherits `librefang-api/default` — full feature set |\n| `all-channels` | ❌ | Inherits `librefang-api/all-channels` — enables all channel adapters |\n| `mini` | ❌ | Inherits `librefang-api/mini` — minimal build for constrained environments |\n| `custom-protocol` | ❌ | Enables `tauri/custom-protocol` for production builds (uses `tauri://` instead of dev server) |\n| `mobile` | ❌ | No-op flag documenting the mobile build path; mobile targets are cfg-gated |\n| `linux-tray` | ❌ | Re-enables `tauri/tray-icon` on Linux; no-op on macOS/Windows. Accepts the GTK3 advisory cost. |\n| `mobile-no-email` | ❌ | Excludes the email channel adapter on mobile because `rustls-platform-verifier 0.7.0`'s `Verifier::new_with_extra_roots` is not implemented for Android. Uses `librefang-api/all-channels-no-email`. |\n\n### Example build commands\n\n```bash\n# Standard desktop development\ncargo build -p librefang-desktop\n\n# Desktop with Linux tray enabled\ncargo build -p librefang-desktop --features linux-tray\n\n# Production desktop (uses custom protocol, no dev server)\ncargo build -p librefang-desktop --features custom-protocol --release\n\n# Mobile (Android) without email channel\ncargo build -p librefang-desktop --target aarch64-linux-android \\\n  --no-default-features --features mobile-no-email\n\n# Mobile (iOS)\ncargo build -p librefang-desktop --target aarch64-apple-ios \\\n  --no-default-features --features mobile\n```\n\n## Dependency Graph\n\n```\nlibrefang-desktop\n├── librefang-kernel       # Agent runtime (tasks, cron, triggers)\n├── librefang-api          # HTTP/WebSocket server + React frontend\n├── librefang-types        # Shared type definitions\n├── librefang-extensions   # Extension loading and management\n├── tauri 2                # Native shell framework\n├── clap                   # CLI argument parsing\n├── tokio                  # Async runtime\n├── axum                   # HTTP framework (used by api internally)\n├── reqwest                # HTTP client\n├── tracing                # Structured logging\n├── serde / serde_json     # Serialization\n├── toml                   # Config file parsing\n└── open                   # Open URLs in default browser\n```\n\n## Mobile Development\n\nThe full mobile guide is in [`MOBILE.md`](./MOBILE.md). Summary:\n\n1. Run `cargo tauri android init` and/or `cargo tauri ios init` from `crates/librefang-desktop/` to generate the native scaffolds (`gen/android/`, `gen/apple/`).\n2. Use `cargo tauri android dev` or `cargo tauri ios dev` for local development with hot reload.\n3. CI builds signed `.aab`, `.apk`, and `.ipa` artifacts via `.github/workflows/release.yml`.\n\nMinimum OS versions: iOS 16.0, Android API 26 (Android 8.0).\n\n## Distribution\n\n- **Desktop**: Auto-updater checks `https://github.com/librefang/librefang/releases/latest/download/latest.json` using the embedded public key (dW50cnVzdGVk...). Windows uses passive install mode.\n- **Mobile**: Uploaded to TestFlight (iOS) and Play Internal Testing (Android) by CI. See `docs/src/app/operations/mobile-release/page.mdx` for the full release runbook and `.github/SECRETS.md` for required secrets.","other-librefang-extensions-tests":"# Other — librefang-extensions-tests\n\n# librefang-extensions/tests/vault_roundtrip.rs\n\nIntegration tests for the `CredentialVault` implementation, validating the encrypt → persist → reload → decrypt lifecycle and several security invariants the daemon depends on.\n\n## Purpose\n\nThese tests exist because the vault is on the critical path for credential management (issues #3651, #3696). A silent corruption or authentication bypass would compromise the entire system. The suite is deliberately self-contained—no OS keyring, no environment variables—so it runs reliably in CI without host-specific setup.\n\n## Tested Invariants\n\n### 1. Key length enforcement (`decode_master_key_rejects_wrong_byte_length`)\n\n`decode_master_key` accepts only a base64 string that decodes to exactly 32 bytes. This pins a common footgun: 32 ASCII characters encode to 24 bytes after base64 decode, not 32. The test asserts both the rejection path (24-byte key) and the happy path (32-byte key).\n\n### 2. Round-trip consistency (`vault_roundtrip_encrypt_then_decrypt_with_same_key`)\n\nThe core lifecycle:\n\n```\ninit_with_key → set (×N) → drop → new → unlock_with_key → get\n```\n\nAfter vault initialization, entries are written, the vault is dropped (simulating process restart with only the encrypted file surviving), then reopened and unlocked with the same key. All stored values must be recoverable byte-for-byte.\n\nThis test also verifies that `list_keys` returns user-facing keys but **excludes** the `SENTINEL_KEY` internal sentinel (see invariant 4).\n\n### 3. Wrong-key rejection (`vault_unlock_with_wrong_key_fails`)\n\nA vault initialized under key A must fail to unlock under key B. AES-GCM authenticated encryption guarantees this—the decryption fails loudly rather than yielding corrupt plaintext. The test accepts either `ExtensionError::Vault` or `ExtensionError::VaultKeyMismatch` since the exact variant depends on the vault format version. After failure, `is_unlocked()` must return `false`.\n\n### 4. Sentinel key protection (`vault_rejects_writes_to_reserved_sentinel_key`)\n\nThe `SENTINEL_KEY` constant (the #3651 sentinel) is owned by the vault implementation. External callers must not overwrite or remove it via the public `set` / `remove` APIs. Both operations must surface `ExtensionError::Vault`.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    A[fixture_key_b64] -->|base64 encode 32 zero bytes| B[decode_master_key]\n    C[fixture_vault_path] -->|tempdir/vault.enc| D[CredentialVault::new]\n    D --> E[init_with_key]\n    E --> F[set / get / remove / list_keys]\n    D --> G[unlock_with_key]\n    B --> H[Zeroizing key wrapper]\n    H --> E\n    H --> G\n```\n\n### Helper Functions\n\n| Function | Purpose |\n|---|---|\n| `fixture_key_b64()` | Returns a deterministic base64-encoded 32-byte key (all zeros). Not cryptographically strong—only for reproducibility. |\n| `fixture_vault_path(tmp)` | Returns `tmp.path().join(\"vault.enc\")`, isolating each test's file on disk. |\n\n### Production APIs Under Test\n\n| API | Tested by |\n|---|---|\n| `decode_master_key` | `decode_master_key_rejects_wrong_byte_length`, plus every test that calls `fixture_key_b64` |\n| `CredentialVault::new` | All vault tests |\n| `init_with_key` | All vault tests (creates a fresh vault on disk) |\n| `unlock_with_key` | `vault_roundtrip_encrypt_then_decrypt_with_same_key`, `vault_unlock_with_wrong_key_fails` |\n| `set` | Round-trip test, sentinel test, wrong-key test |\n| `get` | Round-trip test |\n| `remove` | Sentinel test |\n| `list_keys` | Round-trip test |\n| `is_unlocked` | Round-trip test, wrong-key test |\n\n## Design Decisions\n\n**No OS keyring dependency.** All tests use explicit master keys via `init_with_key` / `unlock_with_key`. This avoids `KeyringError` or missing keychain entries in headless CI.\n\n**Zeroizing everywhere.** Keys and values are wrapped in `Zeroizing` to match production usage patterns and ensure the test code doesn't accidentally depend on non-zeroing behavior.\n\n**tempfile for isolation.** Each test creates its own `TempDir`, so tests can run in parallel without file contention. The encrypted file is the only artifact; everything else lives in memory and is zeroed on drop.\n\n**Relaxed error variant matching.** The wrong-key test accepts both `ExtensionError::Vault(_)` and `ExtensionError::VaultKeyMismatch { .. }` because the underlying AES-GCM failure routing has changed between format versions. The contract being tested is \"non-Ok result,\" not a specific enum variant.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nAgent-side infrastructure that doesn't belong in `runtime` or `kernel`. MCP server catalog, credential vault, OAuth2 PKCE flows, provider health probes, plugin installer, and a shared HTTP client.\n\nThis crate sits **above** `kernel` in the dependency graph. Higher-level crates (`librefang-api`, `librefang-cli`, `librefang-desktop`) consume it, but it never imports them.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api\"] --> EXT[\"librefang-extensions\"]\n    CLI[\"librefang-cli\"] --> EXT\n    DESKTOP[\"librefang-desktop\"] --> EXT\n    EXT --> TYPES[\"librefang-types\"]\n    EXT --> RUNTIME[\"librefang-runtime\"]\n    KERNEL[\"librefang-kernel\"]\n    KERNEL -.->|\"not depended on\"| EXT\n```\n\nExtensions provides the building blocks. The API crate owns the user-facing HTTP routes and flow orchestration.\n\n## Module Map\n\n### `vault` — AES-256-GCM Credential Vault\n\nEncrypted credential storage with per-agent isolation.\n\n**Master key resolution order:**\n1. `LIBREFANG_VAULT_KEY` environment variable (base64, must decode to exactly 32 bytes — `openssl rand -base64 32` produces 44 characters)\n2. OS keyring (Linux `libsecret`, Windows Credential Manager)\n3. File fallback\n\n**Platform specifics:**\n- **macOS** skips Keychain by default (see #2766). Enable with `[vault] use_os_keyring = true` in config. On first boot with file fallback, the vault performs one final Keychain read, mirrors the key to the file store, and never touches Keychain again.\n- **File fallback path** on macOS: `~/Library/Application Support/librefang/.keyring` (mode `0600`).\n- **musl-static / Android** targets do not compile the OS keyring backend. The vault transparently uses the file-based AES-256-GCM store instead.\n\n**Internal caching:** Per-agent vault instances are cached behind a `RwLock<HashMap<AgentId, Arc<Vault>>>`. The cache invalidates on credential changes.\n\n**Invariants:**\n- Always interact with the vault through the `Vault` API. Never read the `.keyring` file directly.\n- The `keyring` crate dependency is target-gated to avoid pulling `libdbus-sys` on musl and Android builds.\n\n### `catalog` — MCP Server Catalog\n\nManages MCP server templates and available servers at `~/.librefang/mcp/catalog/`.\n\n### `credentials` — Auth Source Unification\n\nSingle entry point for credential resolution. The `credentials::resolve()` function enforces a fixed precedence:\n\n1. **Environment variables**\n2. **Vault** (encrypted store)\n3. **CLI login** session\n4. **File**\n\nDo not add new credential providers without accounting for this precedence chain.\n\n### `http_client` — Shared HTTP Client\n\n`http_client::shared_client()` returns a pre-configured `reqwest::Client`:\n\n- `User-Agent: librefang/<version>` (matches `librefang_runtime::USER_AGENT`)\n- Connection pooling\n- Sensible timeout, redirect, and TLS defaults (backed by `rustls` with `webpki-roots` and `rustls-native-certs`)\n\n**Do not create bespoke `reqwest::Client` instances.** Always use `shared_client()`. This will be flagged in review.\n\n### `oauth` — OAuth2 PKCE Client\n\nImplements OAuth2 with PKCE and Dynamic Client Registration (RFC 7591) for MCP servers.\n\nThe daemon detects a `401` response and sets `NeedsAuth` state on the connection. The API layer (`routes/mcp_auth.rs` in `librefang-api`) then drives the full flow: PKCE generation, callback handling, token exchange, and refresh.\n\nWhen an MCP server exposes a `registration_endpoint` but no `client_id`, this module handles Dynamic Client Registration automatically.\n\nThis crate exposes the building blocks. The API crate owns the user-facing flow.\n\n### `installer` — MCP Server Lifecycle\n\nInstall, update, and uninstall flows for MCP server plugins.\n\n**Do not use raw `tokio::process` for plugin installs.** Always route through the `installer` module.\n\n### `health` — Provider Liveness Probes\n\nProvider health checking. Backed by `provider_health` in `librefang-runtime`.\n\n### `dotenv` — Environment Parsing\n\n`.env` file parsing for agent workspaces.\n\n## Dependency Boundaries\n\n### What this crate owns\n- Vault and encryption\n- MCP catalog\n- OAuth client primitives\n- Shared HTTP client\n- Dotenv parsing\n- Plugin installer\n\n### What this crate does NOT own\n- Kernel callback wiring — `McpOAuthProvider` trait lives in `runtime`; the implementation lives in `api`\n- HTTP routing\n- Channel adapters\n\n### Allowed imports\n- `librefang-types`\n- `librefang-runtime`\n- Standard library and third-party crates\n\n### Forbidden imports\n- `librefang-api`\n- `librefang-cli`\n- `librefang-desktop`\n\nExtensions sits below all of those layers. Importing them creates circular dependencies.\n\n## Docker Considerations\n\nDo not bind ephemeral localhost ports for OAuth callbacks in daemon code. The port is unreachable from outside a Docker container. Route all OAuth callbacks through the API server's existing port — the `api` crate handles this.\n\n## Key Dependencies\n\n| Crate | Purpose |\n|-------|---------|\n| `aes-gcm` | AES-256-GCM encryption for the vault |\n| `argon2` | Key derivation |\n| `keyring` | OS keyring access (target-gated) |\n| `reqwest` / `rustls` | HTTP client with Rust TLS |\n| `dashmap` | Concurrent maps for caching |\n| `zeroize` | Secure memory clearing for key material |\n| `sha2` / `hmac` / `subtle` | Cryptographic primitives for OAuth PKCE |","other-librefang-hands-tests":"# Other — librefang-hands-tests\n\n# librefang-hands/tests — Registry Smoke Tests\n\n## Purpose\n\nIntegration smoke tests that exercise the `HandRegistry` public API end-to-end, catching cross-method invariant violations that unit tests alone often miss. Every historical regression in this area was a compositional bug — definitions present without a workspace, instances lingering after uninstall, etc. — so these tests treat the registry as a black box and verify that the full lifecycle composes correctly.\n\nNo LLM, no kernel — these tests validate purely tool-dispatch and persistence behaviour.\n\n## Test Fixtures\n\nTwo inline constants define the minimal hand content needed for installation:\n\n| Constant | Format | Purpose |\n|---|---|---|\n| `SMOKE_HAND_TOML` | TOML (id, name, description, category, routing, agent) | A complete `HAND.toml` for a hand named `\"smoke-hand\"` |\n| `SMOKE_SKILL_MD` | Markdown | A minimal `SKILL.md` body |\n\nThe hand declares no required settings, which is significant — it means activation can succeed with an empty `HashMap::new()` config, testing the explicit-default code path.\n\n## Test Functions\n\n### `install_activate_deactivate_uninstall_lifecycle`\n\nWalks the complete state machine of a hand from installation through cleanup. Each step asserts not just its own outcome but the observable side effects visible through read-side APIs.\n\n```\n┌─────────┐    ┌─────────┐    ┌──────────┐    ┌────────────┐    ┌───────────┐\n│ install  │───▶│ activate │───▶│ uninstall │───▶│ deactivate │───▶│ uninstall  │\n│          │    │          │    │ (refused) │    │            │    │ (succeeds) │\n└─────────┘    └─────────┘    └──────────┘    └────────────┘    └───────────┘\n```\n\n**Steps and invariants verified:**\n\n1. **Fresh registry is empty** — `list_definitions()` and `list_instances()` both return empty collections.\n2. **`install_from_content_persisted(home, toml, md)`** — Writes `HAND.toml` and `SKILL.md` to `home/workspaces/smoke-hand/`, returns the definition with correct `id` and `name`. Both files are asserted to exist on disk. The definition becomes visible via `list_definitions()` and `get_definition(\"smoke-hand\")`.\n3. **`activate(\"smoke-hand\", HashMap::new())`** — Creates an active instance (`HandStatus::Active`). The instance is visible in `list_instances()` (exactly one) and retrievable via `get_instance(id)`.\n4. **`uninstall_hand(home, \"smoke-hand\")` while active** — Must fail. The test asserts the error without pinning a specific error variant (unit tests cover that). Critically, it also asserts that the refused uninstall does **not** corrupt in-memory state: the definition and instance both survive untouched.\n5. **`deactivate(instance_id)`** — Returns the deactivated instance. `list_instances()` must now be empty.\n6. **`uninstall_hand(home, \"smoke-hand\")` with no live instances** — Must succeed. Removes the in-memory definition (confirmed via `get_definition` returning `None`) and physically deletes the workspace directory from disk.\n\n### `definitions_round_trip_through_a_disk_reload`\n\nValidates that the `home/workspaces/<id>/HAND.toml` layout is the authoritative source of truth. After one registry instance writes a hand to disk, a completely independent `HandRegistry` can discover it via `reload_from_disk`.\n\n**Steps:**\n\n1. `installer` registry calls `install_from_content_persisted` into a temp home.\n2. `fresh` — a new, empty `HandRegistry` — starts with zero definitions.\n3. `fresh.reload_from_disk(home)` returns `(loaded, _failed)` where `loaded >= 1`.\n4. `fresh.get_definition(\"smoke-hand\")` returns the definition with `name == \"Smoke Hand\"`.\n\nThis test locks in the contract that a daemon restart can fully rehydrate state from disk without replaying any in-memory log.\n\n## Dependencies on `HandRegistry` API\n\nThe tests exercise every primary method on the public registry surface:\n\n| Method | Called by |\n|---|---|\n| `HandRegistry::new()` | Both tests |\n| `install_from_content_persisted(home, toml, md)` | Both tests |\n| `list_definitions()` | Lifecycle test |\n| `get_definition(id)` | Both tests |\n| `activate(hand_id, config)` | Lifecycle test |\n| `list_instances()` | Lifecycle test |\n| `get_instance(instance_id)` | Lifecycle test |\n| `deactivate(instance_id)` | Lifecycle test |\n| `uninstall_hand(home, hand_id)` | Lifecycle test |\n| `reload_from_disk(home)` | Reload test |\n\n## Running\n\n```sh\n# Run just these smoke tests\ncargo test -p librefang-hands --test registry_smoke\n\n# Run with output for debugging\ncargo test -p librefang-hands --test registry_smoke -- --nocapture\n```\n\nNo external services, network, or environment variables are required. The tests create isolated temp directories via `tempfile::tempdir()` that are cleaned up automatically on drop.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nHands system for LibreFang — curated autonomous capability packages.\n\n## Overview\n\nIn LibreFang, a **Hand** is a self-contained, declaratively-defined capability package. Each hand encapsulates a discrete unit of autonomous behavior — a set of actions, constraints, and metadata that can be discovered, validated, and dispatched by the runtime. The `librefang-hands` crate provides the types, loading, and management infrastructure for these capability packages.\n\nThink of hands as pluggable skill modules: they define *what* an agent can do and *how* to invoke it, while the runtime decides *when* and *whether* to do so.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Hand Definition<br/>TOML/JSON on disk] -->|load & parse| B[librefang-hands]\n    B -->|Hand type instances| C[librefang-runtime]\n    B -->|depends on| D[librefang-types]\n    C -->|dev-dep for tests| B\n```\n\nHands are defined as static files (typically TOML) that are parsed into structured types at load time. The crate validates each hand against schema requirements and makes them available to the runtime through a concurrent registry.\n\n## Key Concepts\n\n### Hand\n\nA hand represents a single autonomous capability. It carries:\n\n- **Identity** — A unique identifier (`uuid`) and a human-readable name.\n- **Metadata** — Description, version, authorship, and timestamps (`chrono`) for creation and modification.\n- **Definition** — The serialized specification of what the hand does, stored as structured data (`serde_json::Value` or typed structs from `librefang-types`).\n\n### Hand Registry\n\nThe crate uses `dashmap` to provide a lock-free concurrent map for storing and retrieving loaded hands. This allows multiple runtime threads to query available capabilities without contention.\n\n### Loading and Parsing\n\nHands are loaded from disk (hence `toml` and `serde_json` dependencies). The loading pipeline:\n\n1. Reads hand definition files from a configured directory.\n2. Deserializes TOML into intermediate types.\n3. Validates required fields and schema compliance.\n4. Inserts valid hands into the registry.\n5. Reports errors via `thiserror`-derived error types and `tracing` spans.\n\n### Error Handling\n\nErrors are modeled with `thiserror` and cover common failure modes:\n\n- File I/O failures (missing or unreadable hand files).\n- Deserialization errors (malformed TOML or JSON).\n- Validation errors (missing required fields, invalid schema).\n- Registry conflicts (duplicate hand identifiers).\n\n## Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang crates |\n| `serde` / `serde_json` / `toml` | Serialization and deserialization of hand definitions |\n| `thiserror` | Derived error types for the loading and validation pipeline |\n| `tracing` | Structured logging throughout the hand lifecycle |\n| `uuid` | Unique identification of hand instances |\n| `chrono` | Timestamp handling for hand metadata |\n| `dashmap` | Concurrent hash map for the hand registry |\n\n### Dev Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `tempfile` | Creating temporary directories for hand-loading tests |\n| `librefang-runtime` | Integration tests verifying hand registration with the runtime |\n| `serial_test` | Ensuring test isolation when tests share filesystem or global state |\n\n## Integration with LibreFang\n\nThis crate sits between the type layer and the runtime layer:\n\n- **Downstream of `librefang-types`**: Consumes shared types for hand definitions, ensuring consistency across the system.\n- **Upstream of `librefang-runtime`**: The runtime queries `librefang-hands` to discover available capabilities and to instantiate hand behaviors during execution.\n\nThe `serial_test` dev-dependency on `librefang-runtime` confirms that integration tests exercise the full path from hand loading through runtime dispatch, but under serialized execution to avoid state leakage between tests.\n\n## Writing a Hand Definition\n\nHands are authored as TOML files. A minimal hand definition includes the required identity and metadata fields. When adding a new hand:\n\n1. Create a `.toml` file in the hands directory.\n2. Define the required fields (id, name, description, version).\n3. Specify the capability definition appropriate to the hand's purpose.\n4. Run the test suite — the crate's tests use `tempfile` to create isolated hand directories, ensuring your definition parses and validates correctly.\n\nInvalid or incomplete hand definitions will be rejected during loading with a descriptive error emitted via `tracing`.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing consistent proxy support and TLS certificate fallback for the LibreFang project.\n\n## Overview\n\nThis crate centralizes HTTP client construction so that every component in LibreFang — crawlers, updaters, API clients — uses the same TLS configuration, proxy behavior, and connection settings. Rather than each module independently configuring `reqwest::Client`, consumers call into this library to obtain a preconfigured client builder or ready-to-use client.\n\n## Purpose in the Stack\n\nNetwork code in LibreFang must work across diverse environments: container images without system certificate stores, developer machines with corporate proxies, and hardened servers with restrictive TLS policies. `librefang-http` absorbs that complexity once, ensuring the rest of the codebase can make HTTP requests without worrying about certificate chain loading or proxy environment variables.\n\n## TLS Certificate Strategy\n\nThe crate uses **rustls** exclusively (no OpenSSL binding) and applies a two-tier certificate loading strategy:\n\n1. **`webpki-roots`** — Ships Mozilla's curated root certificate bundle directly into the binary. This guarantees connectivity even when the host OS has no certificate store (e.g., minimal Docker images like `scratch` or `distroless`).\n\n2. **`rustls-native-certs`** — Loads certificates from the operating system's native store. This picks up custom/private CAs that an organization may have installed, which `webpki-roots` would not know about.\n\nThe builder merges both sets into a single `rustls::RootCertStore`, so valid chains anchored in either set are accepted. This dual approach eliminates the common failure modes where one source alone is insufficient.\n\n## Proxy Support\n\nProxy configuration is delegated to `reqwest`'s built-in proxy handling, which respects standard environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`, and their lowercase equivalents). The builder does not override this behavior, giving operators control through environment configuration without code changes.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `reqwest` | HTTP client with optional rustls TLS backend |\n| `rustls` | Pure-Rust TLS implementation |\n| `webpki-roots` | Bundled Mozilla root certificates |\n| `rustls-native-certs` | OS-native certificate store loader |\n| `librefang-types` | Shared types used across LibreFang crates |\n| `tracing` | Structured logging for connection and TLS diagnostics |\n\n## Usage\n\nOther LibreFang crates depend on `librefang-http` and call its builder to obtain a `reqwest::Client` or `reqwest::ClientBuilder`:\n\n```rust\n// Obtain a fully configured client ready for requests\nlet client = librefang_http::build_client()?;\n\n// Or get a builder for further customization before building\nlet client = librefang_http::client_builder()\n    .timeout(Duration::from_secs(30))\n    .build()?;\n```\n\nExact function signatures are defined in the crate's public API. The returned client is a standard `reqwest::Client`, so all reqwest methods (`.get()`, `.post()`, etc.) work without adapter code.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[librefang-http]\n    C[webpki-roots] --> B\n    D[rustls-native-certs] --> B\n    E[rustls] --> B\n    F[reqwest] --> B\n    B --> G[Crawler Module]\n    B --> H[Updater Module]\n    B --> I[Other Consumers]\n```\n\n## Logging and Diagnostics\n\nThe crate uses `tracing` to emit diagnostic events when:\n\n- The TLS root certificate store is being populated\n- Native certificate loading succeeds or fails\n- The number of loaded certificates from each source is known\n\nThis helps operators debug TLS handshake failures in production without guessing which certificate source is missing roots.","other-librefang-kernel-handle-tests":"# Other — librefang-kernel-handle-tests\n\n# librefang-kernel-handle/tests\n\nIntegration tests for the `librefang-kernel-handle` crate's default trait implementations and delegation contracts.\n\n## Purpose\n\nThe `librefang-kernel-handle` crate defines a set of traits that abstract kernel operations (agent lifecycle, memory, task queues, events, knowledge graph, cron, wiki, channel I/O, etc.). Many of these traits provide **default method implementations** so that concrete kernel adapters only need to override the methods they actually support.\n\nThis test module locks down those defaults with three goals:\n\n1. **Pin return values** — default methods must return documented sentinel values (`Allow`, `false`, `120`, empty collections, `Unavailable` errors).\n2. **Verify delegation** — composite methods like `send_to_agent_as` must delegate to their simpler counterpart (`send_to_agent`), not bypass it.\n3. **Assert zero-copy contracts** — the `Bytes`-based `send_channel_file_data` path must never silently clone the underlying buffer.\n\n## File Overview\n\n```\ntests/\n├── defaults_approval.rs              # ApprovalGate & ToolPolicy default returns\n├── defaults_delegation.rs            # Delegation: _as → base, _checked → base, _with_context → base\n├── defaults_returns.rs               # Scalar & collection defaults, Unavailable error variants\n└── send_channel_file_data_zero_copy.rs  # Regression: Bytes zero-copy contract (#3553)\n```\n\n## Test Architecture\n\nEvery test file follows the same pattern: define a stub struct, implement all kernel traits (required methods return stub values or errors), then call the **default** method under test. This is only possible because the traits are object-safe and the default methods are callable on any implementor.\n\n```mermaid\ngraph TD\n    A[Test File] --> B[Stub Struct]\n    B --> C[Implement Required Trait Methods]\n    C --> D[Leave Default Methods Unoverridden]\n    D --> E[Call Default Method from Test]\n    E --> F[Assert Return Value / Side Effect]\n    \n    style A fill:#f9f,stroke:#333\n    style E fill:#bbf,stroke:#333\n```\n\n### Required Trait Implementations\n\nEach stub must implement every trait in the kernel surface area, even if the test only targets one. The traits and their required methods are:\n\n| Trait | Required Methods | Default Methods Tested |\n|---|---|---|\n| `AgentControl` | `spawn_agent`, `send_to_agent`, `list_agents`, `kill_agent`, `find_agents` | `send_to_agent_as`, `spawn_agent_checked` |\n| `MemoryAccess` | `memory_store`, `memory_recall`, `memory_list` | `memory_acl_for_sender` |\n| `WikiAccess` | *(none required)* | `wiki_get`, `wiki_search`, `wiki_write` |\n| `TaskQueue` | `task_post`, `task_claim`, `task_complete`, `task_list`, `task_delete`, `task_retry`, `task_get`, `task_update_status` | *(none)* |\n| `EventBus` | `publish_event` | *(none)* |\n| `KnowledgeGraph` | `knowledge_add_entity`, `knowledge_add_relation`, `knowledge_query` | *(none)* |\n| `CronControl` | *(none required)* | `cron_create`, `cron_list`, `cron_cancel` |\n| `ApprovalGate` | *(none required)* | `request_approval`, `requires_approval`, `requires_approval_with_context` |\n| `ToolPolicy` | *(none required)* | `is_tool_denied_with_context`, `resolve_user_tool_decision`, `tool_timeout_secs`, `tool_timeout_secs_for`, `max_agent_call_depth`, `readonly_workspace_prefixes`, `named_workspace_prefixes` |\n| `ChannelSender` | *(none required — but tested via override)* | `send_channel_file_data` |\n| `HandsControl`, `A2ARegistry`, `PromptStore`, `WorkflowRunner`, `GoalControl` | *(none required)* | *(none — marker-like)* |\n\n## Test Details\n\n### defaults_approval.rs\n\nTests that the default `ApprovalGate` and `ToolPolicy` implementations provide permissive, pass-through behavior:\n\n- **`test_request_approval_default_auto_approves`** — `request_approval` returns `ApprovalDecision::Approved` unconditionally, regardless of the agent ID, tool name, summary, or context.\n- **`test_is_tool_denied_with_context_default_false`** — `is_tool_denied_with_context` returns `false` for any tool/sender/channel combination.\n- **`test_requires_approval_default_false`** — `requires_approval` returns `false` for any tool name.\n\nUses a fully no-op `NoopKernelHandle` where every required method returns `\"not implemented\"` errors (unreachable in these tests).\n\n### defaults_delegation.rs\n\nVerifies that default composite methods delegate to their simpler counterparts using `AtomicBool` flags. Three separate stub structs isolate each delegation:\n\n#### `TrackingSendHandle` → `send_to_agent_as`\n\n```\nsend_to_agent_as(\"agent1\", \"msg\", \"parent1\")\n  → calls send_to_agent(\"agent1\", \"<prefixed msg>\")\n```\n\nThe test confirms `send_to_agent` was invoked (`send_called` flag) and the result propagates unchanged.\n\n#### `TrackingSpawnHandle` → `spawn_agent_checked`\n\n```\nspawn_agent_checked(\"toml\", None, &[])\n  → calls spawn_agent(\"toml\", None)\n```\n\nThe empty `&[]` forbidden-tools list means no filtering occurs; the raw `(id, name)` tuple passes through.\n\n#### `TrackingApprovalHandle` → `requires_approval_with_context`\n\n```\nrequires_approval_with_context(\"tool\", Some(\"sender\"), Some(\"channel\"))\n  → calls requires_approval(\"tool\")\n```\n\nOnly the `ApprovalGate` trait has a custom `requires_approval` override (sets `approval_checked`, returns `true`). All other traits remain no-op.\n\n### defaults_returns.rs\n\nPins the scalar and collection defaults, plus the `Unavailable` error variant pattern:\n\n| Test | Method | Expected Default |\n|---|---|---|\n| `test_resolve_user_tool_decision_default_allow` | `resolve_user_tool_decision` | `UserToolGate::Allow` |\n| `test_memory_acl_for_sender_default_none` | `memory_acl_for_sender` | `None` |\n| `test_cron_defaults_return_errors` | `cron_create`, `cron_list`, `cron_cancel` | `Err(KernelOpError::Unavailable(\"Cron scheduler\"))` |\n| `test_tool_timeout_defaults` | `tool_timeout_secs`, `tool_timeout_secs_for` | `120` |\n| `test_max_agent_call_depth_default` | `max_agent_call_depth` | `5` |\n| `test_workspace_prefix_defaults_empty` | `readonly_workspace_prefixes`, `named_workspace_prefixes` | empty `Vec` |\n| `test_wiki_access_defaults_return_unavailable_with_method_name` | `wiki_get`, `wiki_search`, `wiki_write` | `Err(KernelOpError::Unavailable(\"wiki_get\"))` etc. |\n\nThe `Unavailable` variant tests (#3541, #3329) are notable: they match on the **variant and capability string** rather than substring-matching the error message. This lets callers discriminate programmatically in `match` arms while the `Display` impl still produces human-readable logs.\n\n### send_channel_file_data_zero_copy.rs\n\nRegression test for **issue #3553**. When `send_channel_file_data` was changed from `Vec<u8>` to `bytes::Bytes`, the motivation was zero-cost cloning for wrapping layers (retry, metering, fan-out). This test locks that property down.\n\nUses `CapturingFileKernel` which implements `ChannelSender` by recording the pointer address and length of the received `Bytes`:\n\n- **`cloning_bytes_shares_underlying_allocation`** — pure `bytes` crate test: three successive clones of a 10 MiB `Bytes` all share the same pointer address. No allocation occurs on clone.\n- **`send_channel_file_data_does_not_copy_buffer`** — calls the trait method with `original.clone()`, then asserts the kernel observed the same pointer. Simulates the real-world pattern where a wrapper clones before forwarding.\n- **`vec_to_bytes_round_trip_is_zero_copy_for_unique_bytes`** — verifies `Vec::from(Bytes)` is O(1) when the `Bytes` uniquely owns its allocation (the `into_vec` vtable path in bytes 1.x).\n\n## Adding New Tests\n\nWhen adding a default method to any kernel trait:\n\n1. **Add a return-value test** in `defaults_returns.rs` (or the appropriate file) using `NoopKernelHandle`.\n2. **If the method delegates**, add a delegation test with a tracking struct using `AtomicBool` flags, following the pattern in `defaults_delegation.rs`.\n3. **If the method involves data-transfer semantics** (buffers, slices), consider a zero-copy assertion in a dedicated file, similar to `send_channel_file_data_zero_copy.rs`.\n4. **Update the stub** in every test file to satisfy the new required method (if any), keeping the stub implementations consistent across files.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\nProvides the `KernelHandle` trait — the primary in-process interface for interacting with the LibreFang kernel.\n\n## Purpose\n\nThis module defines the contract that in-process callers use to communicate with the LibreFang kernel. Rather than coupling callers directly to a concrete kernel implementation, `KernelHandle` abstracts the interface behind an async trait. Any component that needs to send requests, query state, or invoke kernel operations depends on this trait, while the kernel itself provides the implementation.\n\n## Role in the Architecture\n\n```mermaid\ngraph LR\n    A[In-Process Caller] -->|depends on trait| B[KernelHandle]\n    B -->|implemented by| C[LibreFang Kernel]\n    D[Other Callers] -->|depends on trait| B\n```\n\nConsumers depend on the trait defined here; they never reference the kernel's concrete types directly. This separation keeps the kernel's internals encapsulated while allowing test doubles, mocks, or alternative implementations during development and testing.\n\n## Dependencies and Their Purpose\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared domain types exchanged between caller and kernel |\n| `async-trait` | Enables `#[async_trait]` on the `KernelHandle` trait, since Rust natively does not support async methods in traits in all edition contexts |\n| `bytes` | Efficient byte-buffer handling for raw data payloads |\n| `serde_json` | JSON serialization for structured kernel messages |\n| `thiserror` | Derives ergonomic error types for handle operations |\n| `tracing` | Structured logging and span instrumentation |\n| `uuid` | Unique identifiers for sessions, requests, or kernel-managed entities |\n\n## Error Handling\n\nThe module uses `thiserror` to define error types specific to handle operations. Callers should expect these errors from trait methods and handle them appropriately — common cases include kernel unavailability, invalid request payloads, and internal kernel failures.\n\n## Usage Example\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\nuse librefang_types::SomeRequest;\n\nasync fn do_work(handle: &dyn KernelHandle) -> Result<(), Box<dyn std::error::Error>> {\n    let response = handle.some_operation(SomeRequest::new()).await?;\n    // process response\n    Ok(())\n}\n```\n\nThe key pattern: accept `&dyn KernelHandle` (or a generic `H: KernelHandle`) as a parameter rather than a concrete type. This keeps functions testable and decoupled from the kernel's implementation details.\n\n## Testing\n\nTests in downstream crates can provide a mock or stub implementation of `KernelHandle` without needing a live kernel. The `tokio` dev-dependency (with `macros` and `rt` features) supports writing async test functions that exercise the trait contract.\n\n## Integration Points\n\n- **librefang-types**: All shared types flow through this dependency. Changes to the type definitions in `librefang-types` may affect the trait's method signatures here.\n- **LibreFang Kernel**: The concrete crate implements the `KernelHandle` trait, bridging the abstract interface to actual kernel logic.\n- **In-process callers**: Any crate that needs kernel access adds a dependency on `librefang-kernel-handle` and works against the trait.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis module is responsible for tracking resource consumption and enforcing quota limits within the LibreFang kernel. It provides the accounting layer that ensures operations stay within defined budgetary constraints, enabling fair resource allocation and preventing runaway costs.\n\n## Purpose\n\nLibreFang requires a mechanism to measure the computational cost of operations and enforce quotas on resource usage. This module serves that role by:\n\n- **Metering**: Tracking resource consumption as operations execute.\n- **Quota enforcement**: Blocking or throttling operations that exceed their allocated budget.\n\n## Dependencies\n\nThe module's dependencies reveal its integration points within the LibreFang ecosystem:\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the kernel for consistent metering data structures |\n| `librefang-memory` | Memory tracking and allocation — likely the primary resource being metered |\n| `librefang-runtime` | Runtime infrastructure for hooking into execution lifecycle events |\n| `serde` | Serialization support, enabling metering data to be persisted, transmitted, or inspected |\n\n## Architecture\n\nBased on the dependency graph, the metering module sits between the runtime execution layer and the resource layers (memory, types):\n\n```\n┌─────────────────────┐\n│   librefang-runtime │\n└────────┬────────────┘\n         │ execution hooks / lifecycle\n         ▼\n┌─────────────────────────────┐\n│ librefang-kernel-metering   │\n│                             │\n│  • cost tracking            │\n│  • quota enforcement        │\n└────┬───────────────┬────────┘\n     │               │\n     ▼               ▼\n┌──────────┐  ┌──────────────┐\n│  types   │  │   memory     │\n└──────────┘  └──────────────┘\n```\n\nThe runtime provides the execution context where metering needs to occur. The types crate defines the shared structures for representing costs and quotas. The memory crate supplies the resource primitives being measured.\n\n## Integration Notes\n\nWhen consuming or contributing to this module:\n\n- **Adding new metered resources**: Import the relevant types from `librefang-types` and wire measurement through the runtime's execution hooks.\n- **Persisting metering data**: The `serde` dependency means metering structures are expected to be serializable. Any new metering data structures should derive `Serialize` and `Deserialize`.\n- **Quota policies**: Quota thresholds and enforcement behavior should be configurable rather than hardcoded, allowing different deployment contexts to set appropriate limits.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand/Template routing engine for the LibreFang kernel.\n\n## Overview\n\nThis module implements the routing logic that maps incoming requests to the appropriate **Hand** implementations based on template-matching rules. It serves as the dispatch layer between raw input and the hand execution pipeline, determining which hand should handle a given input by evaluating routing templates against the request data.\n\n## Purpose\n\nIn the LibreFang kernel, a \"Hand\" is a named handler unit. The router's job is to:\n\n1. **Load routing configuration** from TOML-based config files found in standard platform directories.\n2. **Match incoming data** against registered templates using pattern-matching (regex-based).\n3. **Dispatch** to the correct hand, passing along any captured parameters.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the kernel |\n| `librefang-hands` | Hand definitions and hand registry/access |\n| `serde_json` | Deserialization of JSON-formatted request data |\n| `regex-lite` | Lightweight regex engine for template pattern matching |\n| `toml` | Parsing of routing configuration files |\n| `dirs` | Resolving platform-specific config directories |\n| `tracing` | Structured logging and diagnostics |\n\n### Dev Dependencies\n\n- **`tempfile`** — Used in tests for creating temporary config files.\n- **`librefang-runtime`** — Integration-level test support via the runtime environment.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Incoming Data] --> B[Router]\n    B --> C{Match Templates}\n    C -->|Match| D[Resolve Hand]\n    C -->|No Match| E[Fallback / Error]\n    D --> F[librefang-hands]\n    B --> G[(TOML Config)]\n```\n\nThe router sits between raw input and the hands layer. It loads its routing table from TOML configuration at startup, then evaluates incoming data against the registered templates in order, selecting the first matching hand.\n\n## Configuration\n\nRouting rules are defined in TOML files. The module uses the `dirs` crate to locate configuration in standard platform directories (e.g., `~/.config/librefang/` on Linux). Configuration is parsed at initialization time to build the routing table.\n\n## Relationship to Other Modules\n\n- **`librefang-types`** — The router consumes types that represent incoming data and routing results.\n- **`librefang-hands`** — After routing resolves a match, the target hand is looked up and invoked through this module.\n- **`librefang-runtime`** — The runtime orchestrates the full pipeline, calling into the router as part of request processing. This dependency is test-only, used for integration validation.\n\n## Testing\n\nTests use `tempfile` to create isolated temporary directories with controlled TOML configuration files, allowing routing behavior to be verified without touching the user's actual config. The `librefang-runtime` dev-dependency supports end-to-end integration tests that exercise routing through the full kernel pipeline.","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# librefang-kernel Test Suite\n\n## Purpose\n\nThis is the integration and unit test suite for `librefang-kernel`, the central runtime kernel of LibreFang. The tests validate the kernel's core invariants: agent lifecycle management, capability security, hand activation/restoration, approval routing, skill evolution, and persistence correctness. Rather than testing individual functions in isolation, most tests boot a full `LibreFangKernel` against a temporary directory and exercise end-to-end flows.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Tests[tests.rs] --> Boot[KernelConfig + boot_with_config]\n    Tests --> Spawn[spawn_agent_inner]\n    Tests --> Hands[Hand Activation / Deactivation]\n    Tests --> Registry[AgentRegistry]\n    Tests --> Persistence[SQLite / TOML / hand_state.json]\n    Hands -->|activate_hand| HandDef[HAND.toml definitions]\n    Hands -->|deactivate_hand| Persistence\n    Hands -->|restore| ActivateWithId[activate_hand_with_id]\n    Boot -->|loads| Persistence\n```\n\n## Test Infrastructure\n\n### Kernel Boot Helper\n\nEvery test that needs a live kernel follows the same pattern:\n\n1. Create a `tempfile::tempdir()` for isolation.\n2. Build a `KernelConfig` pointing `home_dir` and `data_dir` into the temp directory.\n3. Call `LibreFangKernel::boot_with_config(config)`.\n4. Assert invariants, then call `kernel.shutdown()`.\n\nNo shared state exists between tests — each gets its own filesystem and SQLite database.\n\n### Environment Variable Guards\n\n`set_test_env` / `EnvVarGuard` manage environment variables safely for tests that need them (e.g., API key rotation tests). The guard removes the variable on drop so it never leaks across tests:\n\n```rust\nfn set_test_env(key: &'static str, value: &str) -> EnvVarGuard\n```\n\n**Safety**: Tests use unique env-var names and are serialized by the single-threaded default test runner.\n\n### Recording Channel Adapter\n\n`RecordingChannelAdapter` is a test double implementing `ChannelAdapter`. It captures all sent messages in a shared `Arc<Mutex<Vec<String>>>` so tests can assert notification routing without a real messaging backend:\n\n```rust\nstruct RecordingChannelAdapter {\n    name: String,\n    channel_type: ChannelType,\n    sent: Arc<Mutex<Vec<String>>>,\n}\n```\n\n### Test Skill Installer\n\n`install_test_skill` writes a minimal valid `skill.toml` + `prompt_context.md` under a given parent directory, used by skills-configuration tests:\n\n```rust\nfn install_test_skill(skills_parent: &Path, name: &str, tags: &[&str])\n```\n\n## Test Categories\n\n### Agent Spawning and Lineage Security\n\n| Test | Invariant |\n|------|-----------|\n| `test_spawn_agent_applies_local_default_model_override` | Agents with `provider: \"default\"` store the literal string; concrete resolution happens at execute time. |\n| `test_spawn_child_exceeding_parent_is_rejected` | A child whose capabilities exceed its parent's is denied with \"Privilege escalation denied\". The check runs **before** `register()`. |\n| `test_spawn_child_with_subset_capabilities_is_allowed` | A child whose capabilities are a strict subset of the parent's spawns successfully. |\n| `test_spawn_with_unknown_parent_fails_closed` | A stale or fabricated `AgentId` as parent fails with \"not registered\" — never silently falls through to the non-parent path. |\n\n### Provider and Model Switching\n\n| Test | Invariant |\n|------|-----------|\n| `test_set_agent_model_clears_overrides_when_provider_changes` | Switching providers via `set_agent_model` clears stale `api_key_env` and `base_url` overrides. Same-provider model swaps preserve existing overrides. |\n\n### Hand Lifecycle\n\nThe hand system (named pre-configured multi-agent deployments) has extensive coverage:\n\n**Activation and Tool Filters:**\n- `test_hand_activation_does_not_seed_runtime_tool_filters` — Hand activation leaves `tool_allowlist` / `tool_blocklist` empty so skill/MCP tools remain visible.\n- `test_available_tools_returns_empty_when_tools_disabled` — The `tools_disabled` flag suppresses all tools.\n\n**Reactivation:**\n- `test_hand_reactivation_rebuilds_same_runtime_profile` — Deactivate then reactivate rebuilds from the hand definition, not from runtime overrides.\n- `reactivate_builds_from_hand_toml_not_override` — A comprehensive check that every override field (model, provider, api_key_env, base_url, max_tokens, temperature, web_search_augmentation) is cleared on fresh activation.\n\n**Skills Propagation (issue #3135):**\n- `test_hand_skills_propagate_to_derived_agent_manifest` — Hand-level `skills = [...]` allowlist propagates into each per-role agent's `AgentManifest.skills`.\n- `test_hand_skills_intersect_per_role_overrides` — When the per-role agent also declares its own `skills`, the result is the intersection of both lists.\n\n**Persistence Across Restarts:**\n- `hand_runtime_override_survives_restart_via_activate_hand_with_id` — Runtime overrides applied via `update_hand_agent_runtime_override` round-trip through `hand_state.json` and are re-applied by `activate_hand_with_id` on the next boot.\n- `boot_drift_preserves_hand_settings_tail` — `## User Configuration` block rendered from `[[settings]]` survives restart.\n- `boot_drift_preserves_skill_and_team_tails` — `## Reference Knowledge` and `## Your Team` blocks survive restart.\n\n**Deactivation Cleanup:**\n- `deactivate_hand_removes_hand_agent_rows_from_sqlite` — After deactivation, SQLite rows for all instance agents are removed, even when those agents are absent from the in-memory registry (the post-restart scenario introduced by commit #a023519d).\n\n### Tool Availability and Capability Resolution\n\n| Test | Invariant |\n|------|-----------|\n| `test_available_tools_glob_pattern_matches_mcp_tools` | Glob patterns like `file_*` correctly match concrete tool names (regression for exact-match bug). |\n| `test_shell_exec_available_when_declared_in_tools_without_explicit_exec_policy` | Agents declaring `shell_exec` in `capabilities.tools` with `shell: [\"*\"]` get auto-promoted to `ExecSecurityMode::Full`. |\n| `test_manifest_to_capabilities` / `_with_profile` / `_profile_overridden_by_explicit_tools` | Tool profiles expand to their constituent tools; explicit `tools` overrides suppress profile expansion. |\n| `test_skill_evolve_tools_default_available_to_restricted_agent` | Skill evolution tools are always available regardless of the agent's declared `capabilities.tools`. |\n\n### Agent Registry\n\n| Test | Invariant |\n|------|-----------|\n| `test_send_to_agent_by_name_resolution` | `find_by_name` and `get` (by UUID) both resolve registered agents. |\n| `test_find_agents_by_tag` | Tag-based and name-substring filtering work correctly against `registry.list()`. |\n\n### Approval and Notification Routing\n\n| Test | Invariant |\n|------|-----------|\n| `test_notify_escalated_approval_prefers_request_route_to` | Escalated approvals route to the explicit `route_to` targets on the request, ignoring policy rules, agent rules, and global channels. |\n| `test_spawn_approval_sweep_task_is_idempotent` | The approval sweep background task can only be spawned once (atomic guard). |\n\n### Task Board Sweeper\n\n| Test | Invariant |\n|------|-----------|\n| `test_spawn_task_board_sweep_task_is_idempotent` | The sweeper loop is spawn-once (issue #2923). |\n| `test_task_board_sweep_resets_stuck_in_progress_task` | A claimed task whose TTL has expired is reset to `pending` with `assigned_to` cleared. |\n\n### Skills Configuration\n\n| Test | Invariant |\n|------|-----------|\n| `test_skills_config_disabled_list_filters_at_boot` | `skills.disabled` in config prevents loading of named skills. |\n| `test_skills_config_extra_dirs_loaded_as_overlay` | `skills.extra_dirs` loads external skills; local installations win name collisions. |\n| `test_reload_skills_preserves_disabled_and_extra_dirs` | Hot-reload re-applies both `disabled` and `extra_dirs` policy (regression for silent policy drop). |\n| `test_stable_mode_freezes_registry_and_skips_review_gate` | `KernelMode::Stable` freezes the registry, blocking mutations and review-driven skill creation. |\n\n### Session Interrupt Cascade (issue #3044)\n\nTests for the parent `/stop` → child cancellation chain:\n\n- `cascade_primitives_via_session_interrupts_dashmap` — `SessionInterrupt::new_with_upstream` propagates parent cancel to children; child cancel does not propagate upward.\n- `no_upstream_when_parent_has_no_active_turn` — A parent with no registered interrupt yields `None`, and the call proceeds without cascade.\n- `send_to_agent_as_tolerates_unregistered_parent_uuid` — An unregistered parent UUID falls through gracefully (parse-fallback).\n- `send_to_agent_as_rejects_unparseable_parent_id` — Garbage parent IDs produce a clear error rather than a panic.\n\n### Atomic Persistence\n\n| Test | Invariant |\n|------|-----------|\n| `atomic_write_replaces_existing_content` | Content is fully replaced. |\n| `atomic_write_leaves_no_tmp_file_on_success` | No staging artifacts remain. |\n| `atomic_write_no_partial_state_under_concurrency` | Two threads racing to write the same file never produce a corrupt partial mix; readers always see a complete payload. |\n\n### Ephemeral Messaging\n\n| Test | Invariant |\n|------|-----------|\n| `test_send_message_ephemeral_unknown_agent_returns_not_found` | Unknown agent IDs produce an error. |\n| `test_send_message_ephemeral_does_not_modify_session` | Ephemeral `/btw` messages leave the real session's message count unchanged. |\n\n### Condition Evaluation and Peer Scoping\n\n- `test_evaluate_condition_*` — The `agent.tags contains 'X'` condition parser works for matches, non-matches, empty/None conditions, and rejects unknown formats.\n- `test_peer_scoped_key` — Keys are namespaced as `peer:<id>:<key>` when a peer_id is present; otherwise left unchanged.\n\n### Thinking Override\n\n- `apply_thinking_override` with `None` preserves existing config, `Some(false)` clears it, `Some(true)` inserts defaults while preserving existing budgets.\n\n### JSON Extraction from LLM Responses\n\n`LibreFangKernel::extract_json_from_llm_response` handles: code-fenced JSON blocks, bare objects, surrounding text, nested braces in string values, multiple code blocks (returns first), malformed JSON (returns `None`), and plain text without JSON.\n\n### Reviewer Block Sanitization\n\n`sanitize_reviewer_block` and `sanitize_reviewer_line` neutralize potential prompt-injection vectors from compromised prior responses: triple backticks, `<\/data>` / `<data>` envelope tags, control characters, and newlines in single-line contexts. Truncation is char-aware (not byte-aware) and appends `…[truncated]`.\n\n### Background Review Error Classification\n\n`is_transient_review_error` distinguishes retryable errors (timeouts, network failures, rate limits) from permanent errors (parse failures, validation errors, security blocks). Permanent errors are never retried.\n\n### Trace Summarization\n\n`summarize_traces_for_review` emits head and tail entries with an \"omitted\" marker for long traces, bounding the summary size.\n\n### Cron Job Peer Context\n\n`test_cron_create_preserves_peer_id` — The `peer_id` field in a cron job's JSON payload is persisted and recovered on list (regression for OFP-triggered cron jobs losing peer context).\n\n### Route Caching and Assistant Boot\n\n- `test_should_reuse_cached_route_for_brief_follow_up` — Short messages reuse cached routes; acknowledgments and long requests do not.\n- `test_assistant_route_key_scopes_sender_and_thread` — Route keys include channel, user_id, and thread_id for isolation.\n- `test_boot_spawns_assistant_as_default_agent` — A fresh kernel boot auto-spawns an `assistant` agent.\n\n## Key APIs Exercised\n\n| API | Location |\n|-----|----------|\n| `LibreFangKernel::boot_with_config` | `kernel/boot.rs` |\n| `spawn_agent_inner` | `kernel/spawn.rs` |\n| `set_agent_model` | `kernel/mod.rs` |\n| `activate_hand` / `deactivate_hand` / `activate_hand_with_id` | `kernel/mod.rs` |\n| `update_hand_agent_runtime_override` | `kernel/mod.rs` |\n| `available_tools` | `kernel/mod.rs` |\n| `manifest_to_capabilities` | `kernel/manifest_helpers.rs` |\n| `collect_rotation_key_specs` | `kernel/mod.rs` |\n| `notify_escalated_approval` | `kernel/mod.rs` |\n| `AgentRegistry::register` / `find_by_name` / `get` / `list` | `registry.rs` |\n| `apply_settings_block_to_manifest` / `apply_skill_reference_block_to_manifest` / `apply_team_block_to_manifest` | `kernel/mod.rs` |\n| `atomic_write_toml` | `kernel/mod.rs` |\n| `SessionInterrupt::new_with_upstream` | `runtime/interrupt.rs` |\n| `AgentControl::send_to_agent_as` | `kernel_handle` |\n| `cron_create` / `cron_list` | `kernel/mod.rs` |\n\n## Contribution Guidelines\n\n- **Isolation**: Every test must create its own `tempfile::tempdir()`. Never share filesystem state.\n- **Cleanup**: Always call `kernel.shutdown()` at the end of each test, even on early-return paths.\n- **Skip semantics**: Tests that depend on optional features (e.g., the `apitester` hand) use `Err(e) if e.to_string().contains(\"unsatisfied requirements\")` to gracefully skip rather than fail.\n- **Naming**: Regressions are annotated with their issue number (e.g., `issue #3135`, `issue #2923`) in doc comments.\n- **Async tests**: Use `#[tokio::test(flavor = \"multi_thread\")]` for tests that need the tokio runtime. Kernel boot itself is synchronous.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and contract tests for the `librefang-kernel` crate. This module validates the kernel's subsystems end-to-end: agent spawning, hand lifecycle, RBAC policy evaluation, audit retention, cron compaction, WASM execution, workflow orchestration, and memory isolation.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Shared Helpers\"\n        COMMON[common/mod.rs]\n        MOCK[MockKernelBuilder]\n    end\n\n    subgraph \"Contract Tests — KernelHandle trait\"\n        BROADER[kernel_handle_contract_broader]\n        CRON[kernel_handle_contract_cron_spawn]\n        MEM[kernel_handle_contract_memory]\n        RBAC[kernel_handle_contract_rbac]\n        SPAWN[kernel_handle_contract_spawn_checked]\n        TASK[kernel_handle_contract_task]\n    end\n\n    subgraph \"Subsystem Integration\"\n        AUDIT[audit_retention_test]\n        COMPACT[cron_compaction_test]\n        MULTI[multi_agent_test]\n        WASM[wasm_agent_integration_test]\n        WORKFLOW[workflow_integration_test]\n        RBAC_M3[rbac_m3_evaluate_tool_call]\n    end\n\n    subgraph \"External\"\n        INTEGRATION[integration_test]\n        PURGE[purge_sentinels_test]\n    end\n\n    COMMON --> BROADER\n    COMMON --> CRON\n    COMMON --> MEM\n    COMMON --> RBAC\n    COMMON --> SPAWN\n    COMMON --> TASK\n    MOCK --> AUDIT\n    MOCK --> WASM\n    MOCK --> WORKFLOW\n```\n\n## Test Categories\n\n### Contract Tests (`kernel_handle_contract_*.rs`)\n\nThese tests exercise the `KernelHandle` trait object (`&dyn KernelHandle`) against a real `LibreFangKernel` booted via the shared `common/mod.rs` helpers. They validate that the public API surface behaves as documented without making network calls.\n\n| File | Coverage |\n|---|---|\n| `kernel_handle_contract_broader.rs` | Roster CRUD, goal listing, A2A agent queries, event publishing, kill-agent error on unknown ID |\n| `kernel_handle_contract_cron_spawn.rs` | `cron_create` preserves `peer_id`, spawn returns valid identity, `list_agents`/`find_agents` return manifest metadata |\n| `kernel_handle_contract_memory.rs` | Global vs. peer-scoped namespace isolation for `memory_store`, `memory_recall`, `memory_list` |\n| `kernel_handle_contract_rbac.rs` | Per-user tool policy resolution, memory ACL binding by sender+channel, `requires_approval_with_context` delegation |\n| `kernel_handle_contract_spawn_checked.rs` | Capability-checked spawning: accepts valid parent caps, rejects escalation when child requests tools not in parent set |\n| `kernel_handle_contract_task.rs` | Task lifecycle: `task_post` → `task_claim` → `task_complete` with field preservation |\n\nAll contract tests use the shared boot helpers from `common/mod.rs`:\n\n```rust\n// Minimal kernel (no users)\nlet (kernel, _tmp) = boot_kernel();\n\n// Kernel with pre-configured users (for RBAC tests)\nlet (kernel, _tmp) = boot_kernel_with_users(vec![user_config]);\n```\n\nThe `tempfile::TempDir` guard (`_tmp`) must remain in scope for the duration of the test — dropping it removes the temporary home directory.\n\n### Subsystem Integration Tests\n\n#### Audit Retention (`audit_retention_test.rs`)\n\nValidates M7 milestone: the kernel's periodic trim task and self-audit `RetentionTrim` row.\n\n- Boots via `MockKernelBuilder` with `trim_interval_secs = 1` and `max_in_memory_entries = 10`\n- Seeds 50 audit entries, calls `start_background_agents()`, waits for the 1s trim interval to fire\n- Asserts the log collapses to near the cap and that a `RetentionTrim` self-audit row appears\n- Verifies `verify_integrity()` still passes after trimming\n\nRequires `#![recursion_limit = \"256\"]` because `start_background_agents()` spawns 17 closures whose combined async-block layouts exceed the default 128-limit after `TriggerId` gained `PartialOrd`/`Ord`.\n\n#### Cron Compaction (`cron_compaction_test.rs`)\n\nTests for `librefang_runtime::compactor` (SummarizeTrim mode, #3693):\n\n| Test | What it verifies |\n|---|---|\n| `summarize_trim_successful_llm_produces_summary_not_fallback` | H2 gap 1: `FakeDriver` produces `used_fallback = false`, output is `[summary_msg] + tail` |\n| `summarize_trim_llm_failure_sets_used_fallback_true` | H2 gap 2 / M4: `FailingDriver` sets `used_fallback = true`; the M4 guard `!result.used_fallback` correctly rejects the non-empty fallback string |\n| `adjust_split_does_not_cut_tool_use_tool_result_pair` | H1: `adjust_split_for_tool_pair` shifts the split point to keep `Assistant{ToolUse}` + `User{ToolResult}` together |\n\nUses two stub drivers: `FakeDriver` (returns canned summary) and `FailingDriver` (always errors).\n\n#### Hand Lifecycle (`multi_agent_test.rs`)\n\nComprehensive hand (multi-agent) lifecycle tests:\n\n- **Activation/Deactivation**: `activate_hand` spawns agents, `deactivate_hand` kills them\n- **Deterministic IDs**: `AgentId::from_hand_agent` produces stable IDs; reactivation preserves them under legacy format\n- **Pause/Resume**: paused agents remain alive; status transitions correctly\n- **Tool Inheritance**: hand-defined `tools` propagate to the agent manifest's `capabilities.tools`\n- **State Persistence**: `hand_state.json` (v5 format) persisted to disk with `agent_ids` map, `instance_id`, `coordinator_role`\n- **Settings Seeding**: `[[settings]]` with defaults are backfilled on activation; user overrides take precedence; missing keys are filled on reactivation (schema evolution)\n- **Coexistence**: multiple hands can be active simultaneously; deactivating one doesn't affect the other\n- **Explicit Coordinator**: `coordinator = true` in hand TOML determines which agent receives routed messages\n- **Trigger Migration**: reactivation restores triggers to their original roles, doesn't leak across agents\n\nIncludes `test_six_agent_fleet` — a live LLM integration test requiring `GROQ_API_KEY`.\n\n#### WASM Agents (`wasm_agent_integration_test.rs`)\n\nTests the full WASM agent pipeline: spawn → execute → verify response.\n\n- Uses inline WAT (WebAssembly Text) modules: `ECHO_WAT`, `HELLO_WAT`, `INFINITE_LOOP_WAT`, `HOST_CALL_PROXY_WAT`\n- Tests: hello response, echo passthrough, fuel exhaustion detection, missing module error, streaming fallback, concurrent agents, mixed WASM+LLM fleet\n- WASM manifests use `module = \"wasm:<path>\"` format\n\n#### Workflows (`workflow_integration_test.rs`)\n\nWorkflow registration, agent resolution, and execution:\n\n- **Agent resolution by name**: `StepAgent::ByName` resolved via `agent_registry_ref().find_by_name()`\n- **Agent resolution by ID**: `StepAgent::ById` deferred to execution time\n- **Trigger registration**: `register_trigger` / `list_triggers` / `remove_trigger` with `TriggerPattern` variants\n- **E2E with Groq**: 2-step analyst→writer pipeline (requires `GROQ_API_KEY`)\n\nRequires `#![recursion_limit = \"256\"]` due to deeply-nested futures in the kernel→runtime→agent_loop call chain.\n\n#### RBAC M3 (`rbac_m3_evaluate_tool_call.rs`)\n\nEnd-to-end RBAC (#3054 Phase 2) integration tests:\n\n- Boots a real kernel with `[[users]]` + `tool_policy` + `[tool_policy.groups]`\n- Validates the deny-short-circuit → allow → needs-approval → category-resolution cascade\n- **H7 regression**: unrecognised senders no longer fail-open (guest gate applies)\n- **Trait-layer regression**: `(None, None)` sender/channel fails closed; only `Some(\"cron\")` retains the system-call carve-out\n- **Reload**: `auth_ref().reload()` invalidates the AuthManager so policy changes take effect immediately\n- **B3 force_human**: `DeferredToolExecution.force_human = true` prevents hand-agent auto-approve\n\n### External Integration Tests\n\n#### Full Pipeline (`integration_test.rs`)\n\nBoots kernel, spawns agents with Groq LLM, sends messages, verifies responses and token usage. All tests marked `#[ignore]` — run with:\n\n```bash\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test integration_test -- --nocapture\n```\n\n#### Purge Sentinels (`purge_sentinels_test.rs`)\n\nCLI binary integration tests for the `purge_sentinels` tool. Drives the compiled binary via `std::process::Command`:\n\n- **Dry-run**: reports removal counts, writes nothing\n- **Apply**: creates `.bak` backups, rewrites files, skips mid-sentence sentinels\n- **Idempotency**: second apply reports `removed=0`\n- **Safety**: aborts when existing `.bak` differs from current file (prevents data loss)\n\n## Conventions\n\n### Runtime Flavor\n\nMost async tests use `#[tokio::test(flavor = \"multi_thread\")]` because `start_background_agents()` and other kernel paths call `tokio::task::block_in_place`, which panics on the default current-thread runtime.\n\n### Recursion Limit\n\nTwo test files require `#![recursion_limit = \"256\"]`:\n- `audit_retention_test.rs` — 17 spawned closures + trait-bound additions on `TriggerId`\n- `workflow_integration_test.rs` — deeply-nested future from kernel→runtime→agent_loop chain\n\n### Temporary Directories\n\nTests use `tempfile::TempDir` for kernel home directories. The guard must stay in scope:\n\n```rust\nlet (kernel, _tmp) = boot_kernel();  // _tmp must live for the whole test\n```\n\nSome tests intentionally leak the `TempDir` (`Box::leak`) when the kernel's lifetime exceeds the test function's scope (e.g., `rbac_m3_evaluate_tool_call.rs` wrapping the kernel in `Arc`).\n\n### MockKernelBuilder vs. boot_kernel\n\n| Helper | Use case |\n|---|---|\n| `MockKernelBuilder::new().with_config(...).build()` | Tests needing custom audit/cron config, or WASM/workflow subsystems |\n| `boot_kernel()` / `boot_kernel_with_users()` | Contract tests exercising the `KernelHandle` trait with default or user-configured kernels |","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nCore orchestration crate for the LibreFang Agent Operating System. Manages agent lifecycles, scheduling, permissions, inter-agent communication, and the message-handling loop that dispatches requests to LLM drivers, tools, and the memory substrate.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api<br/>(HTTP/WS surface)\"]\n    K[\"librefang-kernel<br/>(orchestration)\"]\n    RT[\"librefang-runtime<br/>(execution / agent loop)\"]\n    MEM[\"librefang-memory<br/>(storage)\"]\n    ROUTER[\"librefang-kernel-router<br/>(model routing)\"]\n    METER[\"librefang-kernel-metering<br/>(token/cost accounting)\"]\n\n    API -->|\"KernelHandle trait\"| K\n    K -->|re-exports| ROUTER\n    K -->|re-exports| METER\n    K -->|dispatches via| RT\n    K -->|reads/writes| MEM\n```\n\nThe kernel sits between the HTTP surface layer (`librefang-api`) and the execution layer (`librefang-runtime`). It does **not** depend on `librefang-api` or `librefang-extensions`. When those crates need a kernel callback, they go through the `KernelHandle` trait defined in `librefang-runtime`, reversing the dependency arrow.\n\n### What the kernel owns\n\n- Agent registry (spawn / lookup / kill)\n- Scheduling and cron\n- Approval and auth\n- Auto-dream, inbox, pairing\n- Event bus (broadcast)\n- Session lifecycle state machine\n- Metering and model routing (re-exported from `librefang-kernel-metering` and `librefang-kernel-router`)\n\n### What the kernel does NOT own\n\n| Concern | Lives in |\n|---|---|\n| Agent loop body, tool dispatch | `librefang-runtime` |\n| Channel adapters (Slack, Discord, etc.) | `librefang-channels` |\n| HTTP routing, dashboard SPA | `librefang-api` |\n\n## Boot sequence\n\nEntry point is `LibreFangKernel::boot_with_config(KernelConfig)`. This initializes all subsystems and returns the ready orchestrator. `KernelConfig` carries every tuneable knob; see [Configuration](#configuration) below.\n\n`LibreFangKernel` is currently a large struct (~18k LOC, 50+ fields). Adding fields requires coordination (tracking issue #3565).\n\n## Key subsystems\n\n### `registry::AgentRegistry`\n\nConcurrent agent table. Operations: spawn, lookup, kill. Thread-safe via internal synchronization.\n\n### `kernel::cron`\n\nCron-based job scheduling. Resolves `session_mode` per-job with the following precedence:\n\n1. Per-job override (highest)\n2. Agent manifest (`agent.toml`)\n3. Historical persistent session (lowest)\n\n### `kernel::event_bus`\n\nBroadcast event bus with bounded history. Internal storage is `parking_lot::Mutex<VecDeque<Arc<Event>>>` (since #3385). The `Arc<Event>` avoids cloning large events; the `Mutex<VecDeque>` gives deterministic iteration order. **Do not** switch back to `RwLock<VecDeque<Event>>` — it caused contention issues.\n\n### `kernel::session_lifecycle`\n\nSession state machine. Manages transitions between session states (active, paused, terminated, etc.).\n\n### `kernel::scheduler`\n\nGeneral-purpose task scheduling with concurrency controls (see [Concurrency tuning](#concurrency-tuning)).\n\n### `metering` (re-exported from `librefang-kernel-metering`)\n\nToken and cost accounting. Reads from the kernel's `model_catalog` for pricing data.\n\n### `router` (re-exported from `librefang-kernel-router`)\n\nModel routing and alias resolution. Selects the appropriate LLM provider/model for a given request.\n\n## Concurrency and lock strategies\n\nEach hot field has a specific lock strategy chosen for its access pattern. Do not change these without profiling.\n\n| Field | Strategy | Rationale |\n|---|---|---|\n| `model_catalog` | `arc_swap::ArcSwap<ModelCatalog>` | Hot read, rare write. Readers get an `Arc` clone via atomic load (#3384). Writers use RCU through `model_catalog_update(\\|cat\\| ...)`. Never use `RwLock<ModelCatalog>`. |\n| `skill_registry` | `std::sync::RwLock<SkillRegistry>` | Hot-reload on skill install/uninstall. Keep reads brief — copy out what you need, don't hold the lock across I/O. |\n| `running_tasks` | `dashmap::DashMap<(AgentId, SessionId), RunningTask>` | High read/write throughput. Keyed by `(agent, session)`, **not** by `AgentId` alone. Pre-#3172 it used `AgentId` only, which silently overwrote concurrent loops. Do not regress. |\n| `mcp_oauth_provider` | `Arc<dyn McpOAuthProvider + Send + Sync>` | Pluggable trait object. Implemented in `librefang-api` to keep the daemon free of HTTP concerns. All new OAuth flows must go through this trait, not direct kernel logic. |\n\n## Determinism\n\nAnything that reaches an LLM prompt **must** be deterministically ordered before stringifying (ref #3298). Use `BTreeMap` / `BTreeSet` for all data that ends up in prompts. `HashMap` iteration order varies across processes and silently invalidates provider prompt caches, increasing cost and reducing correctness.\n\nRegression tests guard these boundaries. See `kernel::tests::mcp_summary_is_byte_identical_across_input_orders` for the canonical example.\n\n## Configuration\n\n### `KernelConfig` fields\n\n| Field | Default | Description |\n|---|---|---|\n| `max_history_messages` | (varies) | Global default for conversation history length. Clamped up to `MIN_HISTORY_MESSAGES = 4` with a WARN log if set lower. Per-agent override available in `agent.toml`. |\n| `queue.concurrency.trigger_lane` | `8` | Global semaphore size for `Lane::Trigger`. Controls how many trigger-type jobs run concurrently across all agents. |\n| `queue.concurrency.default_per_agent` | `1` | Fallback per-agent concurrency when `agent.toml: max_concurrent_invocations` is unset. |\n| `workflow_stale_timeout_minutes` | (varies) | Cutoff used by `recover_stale_running_runs` at boot to identify and clean up stale workflows. |\n\n### Adding a new field to `LibreFangKernel`\n\n1. **Visibility**: `pub(crate)` unless an external crate genuinely needs access.\n2. **`KernelConfig` default**: If the field has a config-side counterpart, add it to the `Default` impl on `KernelConfig`. Missing this silently breaks the build.\n3. **Trait objects**: If the field is `Option<Arc<dyn Trait>>`, mark it `#[serde(skip)]` and manually implement `Serialize`, `Deserialize`, `Clone`, and `Debug`.\n4. **Lock strategy** — pick based on access pattern:\n   - Hot read, rare write → `arc_swap::ArcSwap`\n   - Hot read, hot write → `parking_lot::Mutex` or `dashmap::DashMap`\n   - Append-only history → `parking_lot::Mutex<VecDeque<Arc<T>>>`\n\n## Dependencies\n\n### Internal crate dependencies\n\n```\nlibrefang-types\nlibrefang-memory\nlibrefang-memory-wiki\nlibrefang-kernel-router      (re-exported as `router`)\nlibrefang-kernel-metering    (re-exported as `metering`)\nlibrefang-runtime\nlibrefang-skills\nlibrefang-hands\nlibrefang-extensions\nlibrefang-llm-driver\nlibrefang-wire\nlibrefang-channels           (default-features = false)\n```\n\n### Notable external dependencies\n\n- `tokio` — async runtime (we are already inside one; never call `block_on`)\n- `dashmap` — concurrent hash maps for `running_tasks`\n- `arc-swap` — RCU-style atomic swaps for `model_catalog`\n- `parking_lot` — `Mutex` and `RwLock` for event bus and skill registry\n- `cron` (0.16) — cron expression parsing for job scheduling\n\n### Binary target\n\n`purge_sentinels` (`bin/purge_sentinels.rs`) — utility for cleaning up sentinel files.\n\n## Testing\n\n### Unit tests\n\nMost kernel unit tests live inside `crates/librefang-kernel/src/kernel/`, colocated with the code they test. Run with:\n\n```sh\ncargo test -p librefang-kernel\n```\n\n### Integration tests\n\nIntegration tests that need a real router or HTTP surface live in `librefang-api/tests/`. That is where `#[tokio::test]` against `TestServer` belongs (ref #3721).\n\n### Forbidden commands\n\n- **`cargo test`** (workspace-wide) — causes `target/` contention with running user sessions.\n- **`cargo build`** — use `cargo check --workspace --lib` instead. Real builds run in CI.\n\n### Test dependencies\n\n`tokio-test`, `tempfile`, `serial_test` (3), `proptest` (1), `tracing-subscriber`, `librefang-testing`, `librefang-kernel-handle`.\n\n## Taboos\n\nThese are hard rules, not suggestions:\n\n- **No daemon spawning.** The CLI binary owns `start`. The kernel just runs within the provided runtime.\n- **No `tokio::runtime::Handle::block_on`.** The kernel executes inside an existing runtime. Nesting runtimes causes panics or deadlocks.\n- **No direct LLM HTTP calls.** All LLM interaction goes through `librefang-runtime` drivers.\n- **No `Result<_, String>` from `KernelHandle` methods.** Use typed errors (ref #3541).\n- **No `HashMap` in LLM prompt data.** Use `BTreeMap` / `BTreeSet` everywhere a field ends up serialized into a prompt (ref #3298).\n- **No `RwLock<VecDeque<Event>>` in the event bus.** Use `parking_lot::Mutex<VecDeque<Arc<Event>>>` (ref #3385).\n- **No `RwLock<ModelCatalog>`.** Use `arc_swap::ArcSwap` (ref #3384).\n- **No `AgentId`-only keying in `running_tasks`.** Use `(AgentId, SessionId)` (ref #3172).","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nTrait definitions, error types, and shared driver-side types for the LibreFang LLM subsystem. This crate is intentionally abstract — it contains **no concrete provider implementations**. All provider-specific wiring (Anthropic, OpenAI, Gemini, Groq, etc.) lives in the sibling crate `librefang-llm-drivers` (note the trailing `s`).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver] -->|depends on| B[librefang-types]\n    A -->|depends on| C[thiserror / serde / async-trait / tokio]\n    D[librefang-llm-drivers] -->|implements trait from| A\n    E[librefang-testing] -->|mock drivers via| A\n    F[consumer crates] -->|depend on| A\n    F -->|depend on| D\n```\n\nThe trait crate is split from the implementations
