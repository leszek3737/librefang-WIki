emory and the low 32 bits are the byte length of the JSON result.\n\n## Host ABI\n\nThe host injects two functions into the `\"librefang\"` import module:\n\n### `host_call(request_ptr: i32, request_len: i32) -> i64`\n\nSingle RPC dispatch point for all capability-checked operations. The request is JSON:\n\n```json\n{\"method\": \"fs_read\", \"params\": {\"path\": \"/data/config.toml\"}}\n```\n\nThe response is a packed pointer to JSON — either `{\"ok\": ...}` or `{\"error\": \"...\"}`.\n\n### `host_log(level: i32, msg_ptr: i32, msg_len: i32)`\n\nLightweight logging with no capability check. Levels: 0=trace, 1=debug, 2=info, 3=warn, 4+=error.\n\n## Sandbox Lifecycle\n\n`WasmSandbox::execute` is `async` but offloads all CPU-bound work to `spawn_blocking`:\n\n1. **Compile** — Wasmtime compiles the `.wasm` or `.wat` bytes into a `Module`\n2. **Create store** — a Wasmtime `Store<GuestState>` is created with the guest's capabilities, kernel handle, agent ID, and tokio handle\n3. **Set budgets** — fuel is set for instruction-level metering; epoch deadline is set to 1 for wall-clock timeout\n4. **Start watchdog** — a dedicated OS thread sleeps until the timeout, then calls `Engine::increment_epoch`. An RAII `WatchdogGuard` signals completion and joins the thread on every exit path (success, error, panic)\n5. **Instantiate** — the module is linked against host function imports (no WASI)\n6. **Validate exports** — `memory`, `alloc`, and `execute` must all be present\n7. **Write input** — input JSON is serialized, `alloc` is called in the guest, bytes are copied into guest memory with overflow-checked bounds\n8. **Execute** — the guest's `execute` function runs. Fuel exhaustion → `SandboxError::FuelExhausted`. Epoch interrupt → timeout error\n9. **Read output** — the packed return value is unpacked, output JSON is read from guest memory with overflow-checked bounds\n10. **Report** — returns `ExecutionResult { output, fuel_consumed }`\n\n### Watchdog thread design\n\nThe watchdog thread is not fire-and-forget. It uses `park_timeout` to sleep until the deadline, and the `WatchdogGuard::drop` implementation:\n\n1. Stores `done = true` with `Release` ordering\n2. Calls `thread::unpark()` to wake the watchdog early\n3. Joins the thread to reclaim the OS resource\n\nThis avoids thread leaks on the happy path (a 5 ms call doesn't burn a sleeping thread for 30 seconds) and prevents cross-store false interrupts that occurred when the old design called `increment_epoch` globally after every timeout regardless of which store was actually running.\n\n## Host Functions Reference\n\nAll functions are dispatched through `dispatch(state, method, params)` in `host_functions.rs`.\n\n### Always allowed (no capability check)\n\n| Method | Parameters | Returns |\n|--------|-----------|---------|\n| `time_now` | — | `{\"ok\": <unix_timestamp_secs>}` |\n\n### Filesystem — requires `FileRead` / `FileWrite`\n\n| Method | Parameters | Capability | Notes |\n|--------|-----------|------------|-------|\n| `fs_read` | `path` | `FileRead(path)` | Path traversal checked after capability gate |\n| `fs_write` | `path`, `content` | `FileWrite(path)` | Uses `safe_resolve_parent` for new files |\n| `fs_list` | `path` | `FileRead(path)` | Returns array of filenames |\n\n### Network — requires `NetConnect`\n\n| Method | Parameters | Capability | Notes |\n|--------|-----------|------------|-------|\n| `net_fetch` | `url`, `method?`, `body?` | `NetConnect(host:port)` | SSRF-validated, DNS-pinned HTTP client |\n\n### Shell — requires `ShellExec`\n\n| Method | Parameters | Capability | Notes |\n|--------|-----------|------------|-------|\n| `shell_exec` | `command`, `args?` | `ShellExec(command)` | No shell invocation; args passed directly. Env is stripped to safe allowlist. |\n\n### Environment — requires `EnvRead`\n\n| Method | Parameters | Capability | Notes |\n|--------|-----------|------------|-------|\n| `env_read` | `name` | `EnvRead(name)` | Returns `null` if variable is unset |\n\n### Memory KV — requires `MemoryRead` / `MemoryWrite`\n\n| Method | Parameters | Capability | Kernel Required | Notes |\n|--------|-----------|------------|-----------------|-------|\n| `kv_get` | `key` | `MemoryRead(key)` | Yes | Delegates to `kernel.memory_recall` |\n| `kv_set` | `key`, `value` | `MemoryWrite(key)` | Yes | Delegates to `kernel.memory_store` |\n\n### Agent interaction — requires `AgentMessage` / `AgentSpawn`\n\n| Method | Parameters | Capability | Kernel Required | Notes |\n|--------|-----------|------------|-----------------|-------|\n| `agent_send` | `target`, `message` | `AgentMessage(target)` | Yes | Async via `kernel.send_to_agent` |\n| `agent_spawn` | `manifest` | `AgentSpawn` | Yes | Capability inheritance enforced: child ≤ parent |\n\n## Security Deep Dives\n\n### Capability checking\n\nEvery host function (except `time_now`) calls `check_capability` before executing. The function iterates the guest's granted capabilities and uses `capability_matches` from `librefang_types` to support wildcards (e.g., `FileRead(\"*\")` grants read access to any path).\n\nIf no match is found, the operation is rejected immediately with `{\"error\": \"Capability denied: ...\"}`.\n\n### Path traversal protection\n\nTwo functions protect filesystem operations:\n\n- **`safe_resolve_path`** — for reads where the file must exist. Rejects any `..` component, then `canonicalize`s to resolve symlinks\n- **`safe_resolve_parent`** — for writes where the file may not yet exist. Canonicalizes the parent directory and validates the filename. Double-checks that the filename itself doesn't contain `..`\n\nBoth use `checked_add` on pointer arithmetic to prevent overflow on 32-bit hosts.\n\n### SSRF protection\n\n`is_ssrf_target` performs three-layer validation before any HTTP request:\n\n1. **Scheme allowlist** — only `http://` and `https://` are permitted\n2. **Hostname blocklist** — blocks `localhost`, `metadata.google.internal`, `metadata.aws.internal`, `instance-data`, `169.254.169.254`\n3. **IP validation** — DNS is resolved, every returned address is checked against loopback, unspecified, and private ranges\n\nIPv4-mapped IPv6 addresses (`::ffff:X.X.X.X`) are unwrapped via `canonical_ip` before the private-range checks, closing the bypass where mapped addresses appeared \"public\" to the V6 check branch.\n\nThe resolved addresses are pinned into the HTTP client via `resolve()` to prevent DNS-rebinding TOCTOU attacks — the actual HTTP connection goes to the same IPs that were validated.\n\n### Shell environment sanitization\n\n`sanitize_shell_env` clears the child process environment and re-adds only:\n\n```\nPATH, HOME, TMPDIR, TMP, TEMP, LANG, LC_ALL, TERM\n```\n\nOn Windows, additional safe variables are preserved: `USERPROFILE`, `SYSTEMROOT`, `APPDATA`, `LOCALAPPDATA`, `COMSPEC`, `WINDIR`, `PATHEXT`.\n\nThis prevents a WASM guest with `ShellExec` capability from exfiltrating daemon secrets (LLM provider keys, vault tokens, cloud metadata) through the child process environment.\n\n## Configuration\n\n`SandboxConfig` controls each execution:\n\n| Field | Default | Description |\n|-------|---------|-------------|\n| `fuel_limit` | `1_000_000` | Max WASM instructions. 0 = unlimited |\n| `max_memory_bytes` | `16 MiB` | Reserved for future memory limit enforcement |\n| `capabilities` | `[]` | Granted capabilities — deny-by-default |\n| `timeout_secs` | `30` | Wall-clock timeout via epoch interruption |\n\n## Error Handling\n\n`SandboxError` covers the full lifecycle:\n\n| Variant | When |\n|---------|------|\n| `Compilation` | Wasmtime fails to compile the module |\n| `Instantiation` | Linker can't resolve imports or instantiate |\n| `Execution` | Generic runtime error, epoch timeout, or spawn_blocking failure |\n| `FuelExhausted` | Guest consumed all fuel before returning |\n| `AbiError` | Missing exports, invalid JSON output, pointer overflow, or bounds violation |\n\nHost functions always return JSON — either `{\"ok\": ...}` on success or `{\"error\": \"...\"}` on any failure. The `host_call` trapper in `sandbox.rs` catches panics/errors from the dispatch path and returns a JSON error to the guest rather than crashing the sandbox.\n\n## External Dependencies\n\n| Crate | Usage |\n|-------|-------|\n| `wasmtime` | WASM compilation, instantiation, fuel metering, epoch interruption |\n| `librefang_types` | `Capability` enum and `capability_matches` |\n| `librefang_kernel_handle` | `KernelHandle` trait for inter-agent and KV operations |\n| `librefang_http` | `proxied_client_builder` for DNS-pinned HTTP client |\n| `serde_json` | All input/output serialization |\n| `tokio` | Async runtime; `block_on` used in sync host functions for kernel calls |","agent-runtime":"# Agent Runtime\n\n# Agent Runtime\n\nThe Agent Runtime is the execution layer of LibreFang. It drives the core agent loop and provides the infrastructure for tool invocation, authentication, external protocol support, and secure plugin execution.\n\n## Sub-modules\n\n| Module | Purpose |\n|--------|---------|\n| [Runtime Core](librefang-runtime-src.md) | The main agent loop (`run_agent_loop`), orchestrating LLM completions, tool execution, memory recall, and session persistence. Also includes workspace context detection, web search/fetch, plugin management, and the A2A inter-agent protocol. |\n| [MCP Client](librefang-runtime-mcp-src.md) | Model Context Protocol client that discovers and invokes tools on external MCP servers. Tools are surfaced as namespaced (`mcp_{server}_{tool}`) to prevent collisions. Supports Stdio, SSE, and Streamable HTTP transports with built-in taint scanning. |\n| [OAuth](librefang-runtime-oauth-src.md) | OAuth 2.0 token acquisition and refresh for **ChatGPT** (browser + device flow) and **GitHub Copilot** (device flow). Designed for both interactive desktop and headless environments. |\n| [WASM Sandbox](librefang-runtime-wasm-src.md) | Wasmtime-based sandbox for running untrusted agent skills and plugins under deny-by-default capability-based access control. Gates filesystem, network, shell, and messaging operations behind explicit capability grants. |\n\n## How they work together\n\n```mermaid\ngraph LR\n  subgraph Core[\"Runtime Core\"]\n    Loop[\"Agent Loop\"]\n    Tools[\"Tool Runner\"]\n    Plugin[\"Plugin Manager\"]\n  end\n\n  subgraph MCP[\"MCP Client\"]\n    MCPC[\"McpConnection\"]\n    Scan[\"Taint Scanner\"]\n    OAuthMCP[\"MCP OAuth\"]\n  end\n\n  subgraph Auth[\"OAuth\"]\n    CG[\"ChatGPT OAuth\"]\n    CO[\"Copilot OAuth\"]\n  end\n\n  subgraph Sandbox[\"WASM Sandbox\"]\n    Exec[\"Skill Execution\"]\n    Cap[\"Capability Checks\"]\n  end\n\n  Loop -->|\"tool call\"| Tools\n  Tools -->|\"MCP tool\"| MCPC\n  MCPC --> Scan\n  MCPC -->|\"401 / protected\"| OAuthMCP\n  OAuthMCP -.->|\"PKCE / token exchange\"| CG\n  Plugin -->|\"load & run skill\"| Exec\n  Exec --> Cap\n```\n\n### Key workflows spanning sub-modules\n\n1. **Agent loop → MCP tool execution**: The core agent loop dispatches tool calls through the tool runner. MCP tools are identified by the `is_mcp_tool` check and routed to `McpConnection`, which handles transport negotiation (Stdio / SSE / HTTP) and taint scanning of arguments before invocation.\n\n2. **MCP → OAuth**: When an MCP server requires authentication (e.g., a 401 response triggers `discover_oauth_metadata`), the MCP module initiates its own OAuth flow with PKCE support, sharing the OAuth infrastructure provided by the OAuth sub-module.\n\n3. **Provider authentication**: The OAuth module's ChatGPT and Copilot flows are triggered at the CLI and server layers to obtain tokens that feed into LLM provider configuration used by the core runtime.\n\n4. **Plugin/skill sandboxing**: The plugin manager in the core runtime loads skills and delegates their execution to the WASM sandbox. Every host function call from a guest module passes through `check_capability`, ensuring untrusted code cannot access filesystem, network, or other sensitive resources without explicit grants.","api-server":"# API Server\n\n# Channel Bridge (`channel_bridge.rs`)\n\n## Purpose\n\nThe channel bridge connects the LibreFang kernel to external messaging platforms. It translates kernel operations—agent message handling, session management, automation, authorization—into a unified interface that channel adapters consume, and it transforms raw kernel/LLM output into user-safe text suitable for delivery over WhatsApp, Telegram, Slack, and dozens of other channels.\n\nThe daemon calls `start_channel_bridge()` during startup (from `build_router` in `server.rs`). That function reads the configuration, instantiates the appropriate adapters behind feature gates, wires them into a `BridgeManager`, and returns an `axum::Router` for webhook-based channels.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Daemon[\"run_daemon / build_router\"] --> SCB[\"start_channel_bridge()\"]\n    SCB --> KBA[\"KernelBridgeAdapter\"]\n    SCB --> Adapters[\"Channel Adapters (feature-gated)\"]\n    SCB --> BM[\"BridgeManager\"]\n    SCB --> WR[\"axum::Router (webhooks)\"]\n\n    KBA -->|implements| CBH[\"ChannelBridgeHandle trait\"]\n    KBA -->|delegates to| Kernel[\"LibreFangKernel\"]\n\n    Adapters -->|call| KBA\n    KBA -->|streaming via| STB[\"start_stream_text_bridge\"]\n\n    STB -->|filters| LTC[\"looks_like_tool_call()\"]\n    STB -->|sanitizes| SCE[\"sanitize_channel_error()\"]\n```\n\n## Key Components\n\n### `KernelBridgeAdapter`\n\nWraps an `Arc<LibreFangKernel>` and implements the `ChannelBridgeHandle` trait from `librefang_channels::bridge`. Every method delegates to the kernel and formats the result for channel delivery:\n\n- **Message sending** — `send_message`, `send_message_with_blocks`, `send_message_with_sender`, and their streaming counterparts all route through the kernel's agent loop. Silent responses (`result.silent == true`) return an empty string so the bridge skips delivery.\n- **Streaming** — `send_message_streaming` and `send_message_streaming_with_sender` open a kernel streaming session and pipe `StreamEvent`s through `start_stream_text_bridge`, which filters leaked tool calls and injects progress markers.\n- **Agent management** — `find_agent_by_name`, `list_agents`, `spawn_agent_by_name` (loads `agent.toml` from `~/.librefang/workspaces/agents/{name}/`).\n- **Session control** — `reset_session`, `reboot_session`, `compact_session`, `set_model`, `stop_run`, `session_usage`.\n- **Automation** — workflow listing/execution, trigger CRUD, schedule CRUD, approval resolution with TOTP support.\n- **Introspection** — `list_models_text`, `list_providers_text`, `list_skills_text`, `list_hands_text`, `budget_text`, `peers_text`, `a2a_agents_text`.\n- **Authorization** — `authorize_channel_user` checks RBAC via `kernel.auth_manager()`.\n- **Delivery tracking** — `record_delivery` persists success/failure and stores the last channel for cron's `CronDelivery::LastChannel`.\n\n### Streaming Text Bridge\n\n`start_stream_text_bridge` and `start_stream_text_bridge_with_status` create an async pipeline that consumes `StreamEvent`s from the kernel and produces a `mpsc::Receiver<String>` of user-facing text chunks.\n\n**Event handling logic:**\n\n| Event | Behavior |\n|---|---|\n| `TextDelta` | Accumulates into `iter_buf` |\n| `ContentComplete` | Flushes `iter_buf` unless it's a leaked tool call, silent sentinel, or tool-use-adjacent text |\n| `ToolUseStart` | Marks `saw_tool_use`, optionally emits `🔧 Tool Name` progress line (controlled by `show_progress`) |\n| `ToolExecutionResult` (error) | Emits `⚠️ Tool Name failed` with localized \"failed\" suffix |\n| `PhaseChange` (`context_warning`) | Emits `⚠️ <detail>` to warn about context trimming |\n\n**Error handling after stream drain:**\n\nThe spawned monitor task awaits the kernel's `JoinHandle` and:\n- For **timeouts with partial output**: appends an incomplete-output notice and reports `Ok(())` status (soft success).\n- For **group chats**: suppresses all error messages entirely.\n- For **DMs**: shows rate-limit messages verbatim when possible, otherwise passes through `sanitize_channel_error`.\n- For **panics**: sends a generic error message.\n\n### Tool Call Detection\n\n`looks_like_tool_call(text)` detects text that leaked from providers that emit tool calls as plain content rather than using proper tool_use APIs. Detection covers:\n\n- JSON-style calls: `[{…}]`, `{\"type\":\"function\"…}`\n- Tag-based: `<function=…>`, `<tool>`, `[TOOL_CALL]`, Antrophic-style `TbuD` tags\n- Backtick-wrapped: `` `tool_name {args}` ``\n- Markdown code blocks containing tool JSON\n\nHelper functions `contains_bare_json_tool_call`, `contains_markdown_tool_call`, `contains_backtick_tool_call`, `looks_like_tool_call_object`, and `looks_like_named_json_tool_call` handle the recursive scanning and JSON validation.\n\n### Error Sanitization\n\n`sanitize_channel_error(err)` maps raw technical errors to user-friendly messages:\n\n- Timeout/inactivity → \"The task timed out due to inactivity. Try breaking it into smaller steps.\"\n- Rate limits (429, quota, \"too many requests\") → \"I've hit my usage limit and need to rest.\"\n- Auth failures (401) → \"I'm having trouble with my credentials.\"\n- Driver crashes (\"exited with code\", \"llm driver\") → \"Sorry, something went wrong.\"\n- Unknown → \"Something went wrong\" with first 80 chars as a reference ID.\n\n### Reply Intent Classification\n\n`classify_reply_intent` uses a one-shot LLM call to determine whether a group message is directed at the bot. It sanitizes inputs (truncates, strips backticks/newlines/brackets) to reduce injection surface and fails open (returns `true` on any error). Supports bot name, aliases, and @mentions.\n\n### Channel Override Resolution\n\n`channel_overrides` looks up per-channel configuration (from `ChannelsConfig`) and merges the default agent's routing aliases into `group_trigger_patterns` so aliases trigger the bot in group chats without a formal @mention. Uses `\\b` word boundaries for ASCII aliases and plain substring matching for CJK/non-ASCII.\n\n### Localization\n\n`tr_progress_failed(language)` returns the localized word for \"failed\" in tool-failure progress lines, with support for Chinese, Spanish, Japanese, German, and French. Falls back to English.\n\n`prettify_tool_name(name)` converts `snake_case`, `kebab-case`, and `dotted.tool.ids` into human-readable display names (\"Web Search\" instead of \"web_search\"), preserving acronyms.\n\n## Entry Point: `start_channel_bridge`\n\n```rust\npub async fn start_channel_bridge(\n    kernel: Arc<LibreFangKernel>,\n) -> (Option<BridgeManager>, axum::Router)\n```\n\nCalled by `build_router` in `server.rs`. Delegates to `start_channel_bridge_with_config` using the kernel's configured `ChannelsConfig`.\n\n`start_channel_bridge_with_config`:\n\n1. Checks which channels have configuration entries and whether the corresponding Cargo feature is enabled. Emits warnings for configured-but-disabled channels.\n2. Creates a `KernelBridgeAdapter` wrapping the kernel.\n3. For each configured channel with valid credentials (read from env vars via `read_token`), instantiates the feature-gated adapter and pushes it onto the adapter list.\n4. Passes all adapters to `BridgeManager` and returns `(Some(BridgeManager), Vec<started_channel_names>, webhook_router)`.\n\nReturns `(None, Vec::new(), empty_router)` when no channels are configured.\n\n## Feature-Gated Adapters\n\nAll channel adapters are behind Cargo feature flags. The full set across five waves:\n\n| Wave | Channels |\n|---|---|\n| 1 | Telegram, Discord, Slack, WhatsApp, Signal, Matrix, Email, Teams, Mattermost, IRC, Google Chat, Twitch, Rocket.Chat, Zulip, XMPP, Voice, Webhook |\n| 2 | Bluesky, Feishu/Lark, LINE, Mastodon, Messenger, Reddit, Revolt, Viber |\n| 3 | Flock, Guilded, Keybase, Nextcloud, Nostr, Pumble, Threema, Twist, Webex |\n| 4 | DingTalk, Discourse, Gitter, Gotify, LinkedIn, Mumble, ntfy, QQ, WeChat, WeCom |\n\nEach adapter follows the same pattern: read token from env var, construct with config parameters, attach `account_id` and `default_agent`, push to adapter list. Sidecar channels are not feature-gated and are always available.\n\n## Trigger Pattern Parsing\n\n`parse_trigger_pattern(s)` converts user-entered pattern strings into `TriggerPattern` variants:\n\n| Input | Pattern |\n|---|---|\n| `lifecycle` | `TriggerPattern::Lifecycle` |\n| `terminated` | `TriggerPattern::AgentTerminated` |\n| `spawned:<name>` | `TriggerPattern::AgentSpawned { name_pattern }` |\n| `system` | `TriggerPattern::System` |\n| `system:<keyword>` | `TriggerPattern::SystemKeyword { keyword }` |\n| `memory` | `TriggerPattern::MemoryUpdate` |\n| `memory:<key>` | `TriggerPattern::MemoryKeyPattern { key_pattern }` |\n| `match:<text>` | `TriggerPattern::ContentMatch { substring }` |\n| `all` | `TriggerPattern::All` |\n\n## Approval Resolution with TOTP\n\n`resolve_approval_text` handles the full approval/denial flow:\n\n1. Matches the ID prefix against pending approvals (ambiguous matches are rejected).\n2. If the tool requires TOTP (per `policy().tool_requires_totp()`):\n   - Checks lockout from too many failed attempts.\n   - Accepts either a 6-digit TOTP code (verified against `totp_secret` in vault) or a recovery code (format-detected, verified against `totp_recovery_codes` in vault, single-use invalidation).\n3. Calls `kernel.approvals().resolve()` with the decision and TOTP verification state.\n\n## Schedule Management\n\n`manage_schedule_text` handles three sub-actions:\n\n- **`add`** — Expects `<agent> <min> <hour> <dom> <month> <dow> <message...>`, creates a `CronJob` with `CronSchedule::Cron`.\n- **`del`** — Removes by ID prefix match.\n- **`run`** — Immediately executes the job's action (`AgentTurn`, `SystemEvent`, or `Workflow`), resolving workflow IDs by UUID or name.\n\n## Contributing\n\nWhen adding a new channel adapter:\n\n1. Add the adapter implementation in `librefang-channels`.\n2. Add a feature flag (`channel-<name>`) and conditional import block in this file.\n3. Add the config struct field to `ChannelsConfig` in `librefang-types`.\n4. Add a `check_channel!` macro invocation and an adapter construction block in `start_channel_bridge_with_config`.\n5. Add the channel type string to the `channel_overrides` match block.\n6. Ensure the adapter implements `ChannelAdapter` from `librefang_channels::types`.","channel-integrations":"# Channel Integrations\n\n# Channel Integrations Module\n\n## Overview\n\nThe `librefang-channels` crate provides the messaging infrastructure that bridges external chat platforms (Telegram, Discord, Bluesky, WhatsApp, etc.) to the LibreFang agent kernel. It defines a uniform adapter interface, manages adapter lifecycles, handles inbound message processing (sanitization, rate limiting, debouncing, routing), and dispatches outbound responses with platform-appropriate formatting.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"External Platforms\"\n        BLUESKY[\"Bluesky (AT Protocol)\"]\n        TELEGRAM[\"Telegram\"]\n        DISCORD[\"Discord\"]\n        OTHER[\"WhatsApp / Slack / ...\"]\n    end\n\n    subgraph \"librefang-channels\"\n        ADAPTER[\"ChannelAdapter trait\"]\n        BM[\"BridgeManager\"]\n        DEB[\"MessageDebouncer\"]\n        ROUTER[\"AgentRouter\"]\n        SAN[\"InputSanitizer\"]\n        RL[\"ChannelRateLimiter\"]\n        DISPATCH[\"dispatch_message / dispatch_with_blocks\"]\n    end\n\n    subgraph \"Kernel (librefang-api)\"\n        HANDLE[\"ChannelBridgeHandle impl\"]\n    end\n\n    BLUESKY --> ADAPTER\n    TELEGRAM --> ADAPTER\n    DISCORD --> ADAPTER\n    OTHER --> ADAPTER\n    ADAPTER --> BM\n    BM --> DEB\n    BM --> DISPATCH\n    DISPATCH --> ROUTER\n    DISPATCH --> SAN\n    DISPATCH --> RL\n    DISPATCH -->|send_message / send_message_streaming_with_sender_status| HANDLE\n    HANDLE -->|response| DISPATCH\n    DISPATCH -->|send / send_in_thread| ADAPTER\n```\n\n## Core Types\n\n### `ChannelAdapter` Trait\n\nDefined in `types.rs` and implemented by every platform adapter. The trait provides:\n\n| Method | Purpose |\n|---|---|\n| `name()` | Returns the adapter identifier string (e.g. `\"bluesky\"`) |\n| `channel_type()` | Returns the `ChannelType` enum variant |\n| `start()` | Initiates the connection/polling loop, returns a `Stream<Item = ChannelMessage>` |\n| `send()` | Sends a message to a user on the platform |\n| `send_in_thread()` | Sends within a specific thread/topic (falls back to `send` by default) |\n| `send_typing()` | Fires a typing indicator (no-op on platforms that don't support it) |\n| `stop()` | Gracefully shuts down the adapter |\n| `create_webhook_routes()` | Optional Axum routes for webhook-based platforms |\n| `typing_events()` | Optional stream of typing indicator events for debouncing |\n\n### `ChannelMessage`\n\nThe canonical inbound message envelope:\n\n- `channel` — `ChannelType` identifying the source platform\n- `platform_message_id` — Platform-specific message ID (AT URI for Bluesky, message ID for Telegram, etc.)\n- `sender` — `ChannelUser` with `platform_id`, `display_name`, and optional `librefang_user`\n- `content` — `ChannelContent` enum: `Text`, `Command`, `Image`, `File`, `Voice`, `Video`, `ButtonCallback`, etc.\n- `is_group` — Whether the message came from a group context\n- `thread_id` — Optional thread/topic identifier for forum-style channels\n- `metadata` — `HashMap<String, serde_json::Value>` carrying platform-specific fields (e.g. `uri`, `cid`, `reply_ref`, `was_mentioned`, `account_id`, `guild_id`)\n\n### `ChannelContent` Enum\n\nCaptures all inbound content types the system handles:\n\n- **Text** — Plain text messages\n- **Command** — Slash commands with `name` and `args`\n- **Image / File / Voice / Video / Audio / Animation** — Media with URLs, captions, MIME types\n- **Location** — Latitude/longitude\n- **Interactive / ButtonCallback / EditInteractive** — Inline keyboard interactions\n- **MediaGroup / Poll / PollAnswer / Sticker** — Platform-specific content\n\n### `SenderContext`\n\nBuilt from an inbound `ChannelMessage` and channel overrides. Propagated to the kernel so agents know who is talking and from where:\n\n```rust\nSenderContext {\n    channel: \"telegram\",\n    user_id: \"12345\",\n    chat_id: Some(\"12345\"),\n    display_name: \"Alice\",\n    is_group: false,\n    was_mentioned: false,\n    thread_id: None,\n    account_id: None,\n    auto_route: AutoRouteStrategy::Off,\n    group_participants: vec![],\n    use_canonical_session: false,\n    is_internal_cron: false,\n}\n```\n\n## BridgeManager\n\n`BridgeManager` is the central orchestrator. It owns all running adapters and their dispatch tasks.\n\n### Construction\n\n```rust\nlet manager = BridgeManager::new(kernel_handle, agent_router)\n    .with_journal(message_journal);\n```\n\n- `kernel_handle` — An `Arc<dyn ChannelBridgeHandle>` implemented by `librefang-api` on the real kernel\n- `agent_router` — An `Arc<AgentRouter>` that resolves `(channel, user)` pairs to agent IDs\n- Optional `.with_journal()` attaches a `MessageJournal` for crash recovery\n\n### Starting an Adapter\n\n```rust\nmanager.start_adapter(adapter).await?;\n```\n\n`start_adapter` performs:\n\n1. **Stale file cleanup** — Sweeps upload files older than 24 hours from the download directory (runs once across all adapters)\n2. **Webhook route collection** — If the adapter provides Axum routes via `create_webhook_routes()`, they're collected for later mounting under `/channels/{name}/webhook`; otherwise `start()` is called to get a polling/WebSocket stream\n3. **Dispatch loop spawn** — A tokio task consuming the adapter's message stream, dispatching each message concurrently under a 32-permit semaphore\n\n### Message Debouncing\n\nWhen `message_debounce_ms > 0` in channel overrides, `BridgeManager` activates a `MessageDebouncer`. This buffers rapid-fire messages from the same sender (keyed by `{channel}:{platform_id}`) and merges them before dispatch:\n\n- **Timed flush** — First message starts a debounce timer; the buffer flushes when it expires\n- **Max timer** — A hard upper bound (`debounce_max_ms`, default 30s) forces a flush regardless\n- **Buffer cap** — When `max_buffer` messages accumulate, the buffer flushes immediately\n- **Typing integration** — A `stop_typing` event resets the debounce timer; ongoing typing extends the wait\n\nOn flush, multiple messages are merged: commands with the same name have their args concatenated, text messages are joined with newlines, and all image blocks are aggregated.\n\n### Webhook Router\n\nAfter all adapters are started, call `take_webhook_router()` to extract the merged Axum router and mount it on the main API server:\n\n```rust\nlet webhook_router = manager.take_webhook_router();\n// Mount under /channels on the API server (no auth middleware)\n```\n\n### Shutdown\n\n```rust\nmanager.stop().await;\n```\n\nSignals all dispatch loops via a shared `watch` channel, then stops each adapter (releasing connections/ports), and awaits all spawned tasks.\n\n## ChannelBridgeHandle Trait\n\nThis trait defines the kernel operations that channel adapters need. It lives in `librefang-channels` to avoid circular dependencies — the real implementation is in `librefang-api`.\n\nKey method groups:\n\n**Agent messaging:**\n- `send_message` / `send_message_with_sender` — Synchronous send-and-wait\n- `send_message_with_blocks` — Multimodal content (text + images)\n- `send_message_streaming_with_sender_status` — Returns a text chunk receiver *and* a oneshot status receiver for accurate delivery tracking\n\n**Agent management:**\n- `find_agent_by_name`, `list_agents`, `spawn_agent_by_name`\n- `reset_session`, `reboot_session`, `compact_session`\n- `set_model`, `stop_run`, `session_usage`, `set_thinking`\n\n**Authorization and configuration:**\n- `authorize_channel_user` — RBAC check\n- `channel_overrides` / `agent_channel_overrides` — Per-channel and per-agent configuration\n- `classify_reply_intent` — Lightweight LLM call to decide whether to reply in group chats\n\n**Automation:**\n- `list_workflows_text`, `run_workflow_text`\n- `list_triggers_text`, `create_trigger_text`, `delete_trigger_text`\n- `list_schedules_text`, `manage_schedule_text`\n- `list_approvals_text`, `resolve_approval_text`\n\n**Infrastructure:**\n- `subscribe_events` — Broadcast receiver for kernel events (approval requests, etc.)\n- `send_channel_push` — Proactive outbound message delivery\n- `channels_download_dir` / `channels_download_max_bytes` — File download configuration\n\n## Message Dispatch Pipeline\n\nWhen an inbound message arrives from any adapter, it flows through:\n\n### 1. Webhook Direct Delivery Check\n\nMessages tagged with `__deliver_only__` metadata bypass the entire pipeline — they're forwarded straight to the configured delivery target via `send_channel_push`.\n\n### 2. Input Sanitization\n\nIf the sanitizer is active (not `\"off\"`), text content is checked for prompt injection patterns:\n\n- `Clean` — Proceed\n- `Warned(reason)` — Logged but allowed through\n- `Blocked(reason)` — User receives \"Your message could not be processed.\" and dispatch stops\n\n### 3. Agent Resolution and Overrides\n\n`resolve_or_fallback` attempts to find the target agent in this order:\n\n1. `thread_route_agent` from message metadata (for thread-pinned agents)\n2. `AgentRouter::resolve_with_context` using channel, account_id, peer_id, guild_id\n3. Fallback: agent named `\"assistant\"`, then first available agent (auto-set as user default)\n\nAgent-level overrides (from `agent.toml`) take priority over channel-level overrides.\n\n### 4. DM/Group Policy Enforcement\n\n**DM policy** (`dm_policy`):\n- `Ignore` — Silently drop\n- `AllowedOnly` — Rely on RBAC\n- `Respond` — Process normally\n\n**Group policy** (`group_policy`):\n- `Ignore` — Silently drop all group messages\n- `CommandsOnly` — Only process slash commands\n- `MentionOnly` — Process only mentions, commands, and messages matching `group_trigger_patterns`\n- `All` — Process everything (optionally filtered by `reply_precheck` LLM classification)\n\n### 5. Rate Limiting\n\nTwo tiers (when configured):\n- `rate_limit_per_minute` — Global per-channel limit\n- `rate_limit_per_user` — Per-user limit\n\nKeyed by `sender_user_id`, which prefers the `sender_user_id` metadata field over `platform_id`.\n\n### 6. Command Handling\n\nSlash commands are intercepted before agent dispatch. The command policy (`disable_commands`, `allowed_commands`, `blocked_commands`) determines whether a command is handled by the bridge or forwarded as plain text to the agent.\n\nSpecial interactive commands:\n- `/agents` — Sends an inline keyboard with one button per running agent\n- `/models` — Sends a provider selection keyboard\n- `/agent <name>` — Switches the user's default agent\n- `/help`, `/status`, `/reset`, `/reboot`, `/compact`, `/usage`, `/models`, `/providers`, `/skills`, `/hands`, `/budget`, `/peers`, `/a2a`, `/workflows`, `/triggers`, `/schedules`, `/approve`, `/reject`, `/stop`, `/thinking`, `/model`, `/btw`\n\n### 7. Media Processing\n\n- **Images** — Downloaded, base64-encoded, sent as `ContentBlock::Image` for vision-capable models\n- **Files** — Downloaded to disk, sent as `ContentBlock::ImageFile` or `ContentBlock::Text`\n- **Voice** — Transcribed via Whisper (if configured), then dispatched as text\n\n### 8. Agent Dispatch\n\nText messages call `send_message_with_sender` (or streaming variant). Structured blocks call `send_message_with_blocks_and_sender`.\n\n### 9. Response Delivery\n\nOutbound responses are formatted via `formatter::format_for_channel` according to the channel's `OutputFormat` (Plain, Markdown, Html), then sent via `adapter.send()` or `adapter.send_in_thread()` if threading is enabled.\n\nLifecycle reactions (emoji indicators for Thinking/Done/Error phases) are sent as fire-and-forget on supported adapters.\n\n### 10. Error Recovery\n\nOn \"Agent not found\" errors, the bridge re-resolves the channel default agent by name and retries once. This handles cases where an agent was respawned with a new ID.\n\n## Group Message Filtering\n\nThe addressee guard prevents the bot from responding to messages addressed to other participants in group chats.\n\n### Vocative Detection\n\n`leading_vocative_name(text)` detects patterns like `\"Caterina, dimmi...\"` — a capitalized name at the start of the turn followed by punctuation.\n\n`is_vocative_trigger(text, pattern)` performs positional matching: the trigger pattern must appear at the start of the turn or after a sentence boundary, and no other vocative may precede it.\n\n`is_addressed_to_other_participant(text, participants, agent_name)` checks whether the leading vocative matches a known participant who isn't the bot.\n\n### Guard Activation\n\nThe guard is controlled by `LIBREFANG_GROUP_ADDRESSEE_GUARD=on` and is shipped default-off for an observation period. When active, two additional checks run in `MentionOnly` mode:\n\n- **OB-04**: If the turn is vocatively addressed to another participant, skip\n- **OB-05**: Substring trigger matches are rejected unless the pattern also passes positional vocative validation\n\n## Bluesky Adapter\n\nA concrete `ChannelAdapter` implementation for the AT Protocol (Bluesky).\n\n### Authentication\n\nUses `com.atproto.server.createSession` with an identifier (handle or DID) and app password. Sessions are cached in an `RwLock<Option<BlueskySession>>` containing `access_jwt`, `refresh_jwt`, `did`, and `created_at`.\n\nSession lifecycle:\n- Sessions last ~2 hours; tokens refresh after 90 minutes (5400s - 300s buffer)\n- `refresh_session` attempts `com.atproto.server.refreshSession`; falls back to `create_session` on failure\n- On 401 responses during polling, the cached session is cleared and re-created\n\n### Inbound Messages\n\nPolls `app.bsky.notification.listNotifications` every 5 seconds. Only `mention` and `reply` reasons are processed; likes, reposts, and follows are ignored. Notifications from the bot's own DID are filtered out.\n\nThe `seenAt` cursor is tracked and updated via `app.bsky.notification.updateSeen` after each poll.\n\nNotification parsing (`parse_bluesky_notification`) extracts:\n- Author DID, handle, display name\n- Post text (parsed as `Text` or `Command` if it starts with `/`)\n- Reply reference metadata (for threading)\n- URI and CID for platform message identification\n\n### Outbound Messages\n\nPosts via `com.atproto.repo.createRecord` with `app.bsky.feed.post` records. Long messages are split at 300 grapheme clusters using `split_message`. Reply references are forwarded when present in the original notification metadata.\n\n### Multi-Bot Support\n\nThe `account_id` field is injected into message metadata, enabling the bridge to route to different agents based on which Bluesky account received the mention.\n\n## ReplyEnvelope\n\nThe bridge returns responses as a `ReplyEnvelope`:\n\n```rust\npub struct ReplyEnvelope {\n    pub public: Option<String>,        // Reply to the source chat\n    pub owner_notice: Option<String>,  // Private notice to the operator's DM\n}\n```\n\n- `ReplyEnvelope::from_public(s)` — Public reply only\n- `ReplyEnvelope::silent()` — No output at all\n- `public_or_empty()` — Convenience for adapters that don't route owner notices separately\n\n## Message Journal\n\nOptional crash recovery via `MessageJournal`. When attached:\n\n- `recover_pending()` returns journal entries that were in-flight during a crash\n- `compact_journal()` flushes and compacts the journal on shutdown\n\n## Adding a New Channel Adapter\n\n1. Implement `ChannelAdapter` in a new module (e.g. `src/mattermost.rs`)\n2. For webhook platforms, implement `create_webhook_routes()` returning `(Router, Stream)`\n3. For polling platforms, implement `start()` returning a `Stream<Item = ChannelMessage>`\n4. Construct the adapter and pass to `BridgeManager::start_adapter()`\n5. The dispatch pipeline handles sanitization, routing, formatting, and delivery automatically","cli-terminal-ui":"# CLI & Terminal UI\n\n# CLI & Terminal UI Module\n\n## Overview\n\nThe `librefang-cli` crate is the primary user interface for LibreFang. It provides a rich command-line interface built on `clap`, an interactive terminal launcher powered by `ratatui`, and platform-aware desktop app management. When invoked with a subcommand, it operates as a traditional CLI. When run bare in a TTY, it presents a full-screen interactive menu.\n\n## Architecture\n\n```mermaid\ngraph TD\n    User -->|subcommand| Clap[clap Parser]\n    User -->|no subcommand + TTY| Launcher[Interactive Launcher]\n    \n    Clap --> DaemonMode[Daemon Client Mode]\n    Clap --> SingleShot[Single-shot Kernel Mode]\n    \n    Launcher --> MenuScreen[Menu Screen]\n    Launcher --> HelpScreen[Help Screen]\n    Launcher --> DesktopApp[Desktop App Launch]\n    \n    DaemonMode --> HTTPClient[http_client]\n    SingleShot --> Kernel[librefang_kernel]\n    \n    DesktopApp --> Find[find_desktop_binary]\n    DesktopApp --> Download[GitHub Releases API]\n    Download --> PlatformInstall[Platform-specific install]\n    \n    HTTPClient --> TLSConfig[librefang_runtime TLS]\n    \n    subgraph Cross-cutting\n        I18N[i18n / Fluent]\n        UI[ui helpers]\n        Progress[progress bars]\n    end\n```\n\n## Key Components\n\n### Entry Point — `main.rs`\n\nThe binary entry point handles:\n\n1. **Global allocator** — Uses `tikv_jemallocator` on non-MSVC targets for better performance.\n2. **Ctrl+C handling** — Platform-specific: on Windows, installs a custom `SetConsoleCtrlHandler` that force-exits on double-press; on Unix, relies on default SIGINT behavior.\n3. **Tracing setup** — Two paths:\n   - `init_tracing_stderr` for short-lived CLI commands (filters out noisy kernel config logs)\n   - `init_tracing_file` for daemon/foreground mode (writes to the LibreFang home directory)\n4. **Command dispatch** — The `Cli` struct derives `Parser` with ~30 top-level subcommands, each with extensive `long_about` help text.\n\n**Execution modes:**\n\n- **Daemon client mode**: Most commands (`status`, `chat`, `agent list`, etc.) detect a running daemon via `find_daemon()` and communicate over HTTP.\n- **Single-shot mode**: If no daemon is running, commands like `chat` boot an in-process `LibreFangKernel` instance.\n- **Daemon spawn mode**: `start` launches the kernel as a detached background process; `start --spawned` is the internal flag the child process receives.\n\n**Key dispatch functions** called from `main`:\n\n| Function | Command |\n|---|---|\n| `cmd_start` / `cmd_stop` | `start`, `stop`, `restart`, `gateway *` |\n| `cmd_init` / `cmd_init_upgrade` | `init`, `setup`, `onboard` |\n| `cmd_status` | `status` (with `--watch`, `--json`, `--verbose`, `--quiet`) |\n| `cmd_migrate` | `migrate --from <source>` |\n| `cmd_config_get` / `cmd_config_set` | `config get/set/unset/set-key/test-key` |\n| `cmd_trigger_list` | `trigger list` |\n| `cmd_workflow_run` | `workflow run` |\n| `cmd_devices_pair` | `devices pair` |\n| `cmd_vault_set` | `vault set` |\n| `cmd_service_status` | `service status` |\n| `cmd_system_version` | `system version` |\n| `cmd_hand_check_deps` / `cmd_hand_status` | `hand check-deps/status` |\n\nThe `daemon_client` / `daemon_client_with_api_key` helpers construct an authenticated HTTP client pointing at the running daemon's base URL, using `read_daemon_info` to discover the daemon's port and auth token.\n\n### Interactive Launcher — `launcher.rs`\n\nWhen `librefang` is run with no subcommand inside a TTY, `launcher::run()` takes over. It renders a Ratatui-based fullscreen menu that adapts its layout and options based on the user's state.\n\n**Screen states:**\n\n- `Screen::Menu` — The main selection menu\n- `Screen::Help` — Full `--help` output rendered as a scrollable view with scrollbar\n\n**First-run vs returning user detection:**\n\n- `is_first_run()` checks whether `~/.librefang/config.toml` exists\n- First-run users see \"Get started\" as the primary (highlighted) option\n- Returning users see \"Chat\" first, with settings demoted to the bottom\n\n**Background daemon detection:**\n\nOn launch, a background thread calls `find_daemon()` and queries `/api/agents` for a running count. The main loop polls for this result on each 50ms tick, updating the status indicator from a spinner to a live status line showing daemon URL and agent count.\n\n**Provider detection:**\n\n`detect_provider()` scans a prioritized list of environment variables (`ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, `DEEPSEEK_API_KEY`, `GEMINI_API_KEY`, `GROQ_API_KEY`, etc.) and displays the first match in the status area.\n\n**Migration hints:**\n\nIf `~/.openclaw` or `~/.openfang` directories are detected during first run, the launcher shows a hint suggesting \"Get started\" includes automatic migration.\n\n**Key bindings:**\n\n| Key | Action |\n|---|---|\n| `↑`/`k` | Move selection up |\n| `↓`/`j` | Move selection down |\n| `1`–`9` | Quick-select menu item (also confirms) |\n| `Enter` | Confirm selection |\n| `q`/`Esc` | Quit (or back from help) |\n\n**Help screen navigation:** `j`/`k`, `PgUp`/`PgDn`, `g`/`G` for top/bottom, with scroll-bound clamping that prevents over-scrolling past the last line.\n\n**Rendering:**\n\n- Content is constrained to a max width of 80 columns with a 3-character left margin (`MARGIN_LEFT`)\n- Vertical centering places content in the upper third of the terminal\n- The `theme` module (from `crate::tui::theme`) provides consistent colors: `BG_PRIMARY`, `ACCENT`, `TEXT_PRIMARY`, `TEXT_TERTIARY`, `GREEN`, `YELLOW`, `BLUE`, `BG_HOVER`, `BORDER`\n- A panic hook is installed after `ratatui::init()` to ensure `ratatui::try_restore()` is called on panic\n\n**`LauncherChoice` variants:**\n\n`GetStarted`, `Chat`, `Dashboard`, `DesktopApp`, `TerminalUI`, `ShowHelp`, `Quit` — returned to `main()` for dispatch.\n\n### Desktop App Management — `desktop_install.rs`\n\nHandles discovery, download, and installation of the LibreFang desktop application.\n\n**Binary discovery (`find_desktop_binary`):**\n\nSearch order:\n1. Sibling of the current CLI executable\n2. PATH lookup via `which_lookup()`\n3. Platform-specific standard locations:\n   - macOS: `/Applications/LibreFang.app/Contents/MacOS/LibreFang`\n   - Windows: `%LOCALAPPDATA%\\LibreFang\\LibreFang.exe`\n   - Linux: `~/.local/bin/librefang-desktop` or `~/Applications/LibreFang.AppImage`\n\n**Download and install flow (`prompt_and_install` → `download_and_install`):**\n\n1. Check if platform is supported (`platform_asset_suffix`)\n2. Query `https://api.github.com/repos/librefang/librefang/releases/latest`\n3. Find the asset matching the platform suffix\n4. Stream-download to a temp directory via `download_file`\n5. Delegate to platform-specific installer\n\n**Platform-specific installers:**\n\n| Platform | Asset | Install method |\n|---|---|---|\n| macOS (aarch64) | `*_aarch64.dmg` | Mount with `hdiutil`, copy `.app` to `/Applications`, clear quarantine with `xattr -rd com.apple.quarantine` |\n| macOS (x86_64) | `*_x64.dmg` | Same as above |\n| Windows (x86_64) | `*_x64-setup.exe` | Run NSIS installer with `/S` (silent), installs to `%LOCALAPPDATA%\\LibreFang\\` |\n| Windows (aarch64) | `*_aarch64-setup.exe` | Same as above |\n| Linux (x86_64) | `*_amd64.AppImage` | Copy to `~/.local/bin/librefang-desktop`, `chmod 755` |\n\n**Launching (`launch`):**\n\nOn macOS, if the binary path is inside a `.app` bundle (detected via `find_parent_app_bundle`), it uses `open -a` to launch the bundle. Otherwise, it spawns the binary with stdin/stdout/stderr set to `null` (detached).\n\n### Internationalization — `i18n.rs`\n\nThread-local Fluent-based i18n with two supported languages: `en` (default) and `zh-CN`.\n\n**API:**\n\n- `init(language)` — Initialize the thread-local bundle. Falls back to English if the requested language is unsupported or fails to load.\n- `t(key)` — Translate a key with no arguments. Returns `[key]` if not initialized or key is missing.\n- `t_args(key, &[(\"name\", \"value\"), ...])` — Translate with interpolation parameters.\n\n**FTL files** are compiled in via `include_str!` from `locales/en/main.ftl` and `locales/zh-CN/main.ftl`.\n\n**Usage pattern:** `init()` is called once during startup (from both CLI and desktop), then `t()` / `t_args()` are called freely throughout the codebase.\n\n### HTTP Client — `http_client.rs`\n\nWraps `reqwest::blocking::Client` with TLS configured from `librefang_runtime::http_client::tls_config()`, which bundles CA roots for environments where system roots are unavailable.\n\nTwo functions:\n- `client_builder()` — Returns a `ClientBuilder` with preconfigured TLS\n- `new_client()` — Builds and returns a `Client`, panicking on failure (should never fail with bundled roots)\n\n### Registry Sync — `bundled_agents.rs`\n\nA thin backwards-compatibility wrapper around `librefang_runtime::registry_sync::sync_registry`. Called during `init` to sync agent templates from the registry to the local LibreFang home directory.\n\n### Supporting Modules (referenced but implementation in crate)\n\n| Module | Purpose |\n|---|---|\n| `ui` | Console output helpers (`success`, `error`, `hint`, `step`, `kv`) used by `desktop_install` and other modules |\n| `progress` | Terminal progress bars with OSC 52 progress sequence support |\n| `table` | Columnar table formatting for agent lists, models, etc. |\n| `templates` | Agent template discovery and loading |\n| `tui` | Full-screen TUI dashboard (separate from the launcher — provides tab-based agent management, logs, dashboard) |\n| `mcp` | MCP stdio server and catalog management |\n\n## Command Structure\n\nThe CLI defines a deeply nested command tree. The top-level commands with their subcommand groups:\n\n```\nlibrefang\n├── init / setup / onboard / configure    # Setup commands\n├── start / stop / restart                # Daemon lifecycle\n├── chat / message                        # Agent interaction\n├── spawn / agents / kill                 # Agent management shortcuts\n├── agent *                               # Full agent management\n│   ├── new / spawn / list / chat / kill / set\n├── models *                              # LLM model management\n│   ├── list / aliases / providers / set\n├── config *                              # Configuration management\n│   ├── show / edit / get / set / unset / set-key / delete-key / test-key\n├── skill *                               # Skill management\n│   ├── install / list / remove / search / test / publish / create / evolve *\n├── channel *                             # Channel integrations\n│   ├── list / setup / test / enable / disable\n├── hand *                                # Hand management\n│   ├── list / active / status / install / activate / deactivate / info\n│   ├── check-deps / install-deps / pause / resume / settings / set / reload / chat\n├── workflow * / trigger * / cron *        # Automation\n├── mcp *                                 # MCP server management\n│   ├── list / catalog / add / remove\n├── security *                            # Security & audit\n│   ├── status / audit / verify / audit-reset\n├── memory *                              # Agent KV store\n├── devices * / qr                        # Device pairing\n├── webhooks *                            # Webhook management\n├── vault * / auth *                      # Credentials & auth\n├── service *                             # Boot service management\n├── status / health / doctor / logs       # Diagnostics\n├── dashboard / tui / desktop             # UI launchers\n├── update / migrate / reset / uninstall  # Lifecycle\n├── gateway * / system * / new / completion / hash-password  # Utilities\n```\n\n## Adding a New Command\n\n1. Add a variant to the appropriate `Commands` enum (or create a new subcommand enum).\n2. Add `#[command(long_about = \"...\")]` with examples.\n3. Add a `cmd_*` function in `main.rs` (or a dedicated module for complex commands).\n4. Add a match arm in the `main()` dispatch block.\n5. If the command talks to the daemon, use `daemon_client()` / `daemon_client_with_api_key()`.\n6. If it needs in-process execution, use `LibreFangKernel::new()` with `load_config()`.\n\n## Testing Conventions\n\n- `i18n` module includes inline `#[cfg(test)]` verifying fallback behavior, Chinese rendering, and parameterized strings.\n- The `mcp` module tests JSON-RPC message parsing and response construction.\n- Integration tests across the workspace call `spawn_agent` from the TUI module to create test agents.\n- The `table` module is reused by `librefang-migrate`, `librefang-hands`, and config resolution code.","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\n## Overview\n\nThe dashboard frontend is a React single-page application that provides a web-based management console for the LibreFang agent platform. It consumes the kernel's REST API to manage agents, sessions, skills, channels, memory, schedules, workflows, and more. The stack uses React Query for server state management and auto-generated TypeScript types from the OpenAPI schema for type-safe API communication.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Generated\"\n        OAPI[openapi/generated.ts]\n    end\n    subgraph \"API Layer\"\n        API[api.ts<br/>get / post / put / del]\n        AUTH[authHeader / buildHeaders]\n    end\n    subgraph \"Data Layer\"\n        Q[lib/queries/*<br/>useQuery hooks]\n        M[lib/mutations/*<br/>useMutation hooks]\n    end\n    subgraph \"UI Layer\"\n        PAGES[src/pages/*]\n        COMP[src/components/*]\n        LIB[src/lib/*]\n    end\n\n    OAPI --> API\n    API --> AUTH\n    Q --> API\n    M --> API\n    PAGES --> Q\n    PAGES --> M\n    COMP --> PAGES\n    LIB --> PAGES\n```\n\n## API Client (`dashboard/src/api.ts`)\n\nThe core HTTP client wraps `fetch` with consistent authentication, error handling, and JSON parsing. Every backend call flows through one of four primitives:\n\n| Function | Method | Purpose |\n|----------|--------|---------|\n| `get` | GET | Fetch JSON from a path |\n| `getText` | GET | Fetch raw text (e.g., TOML manifests) |\n| `post` | POST | Create or action-oriented requests |\n| `put` | PUT | Update resources |\n| `del` | DELETE | Remove resources |\n\n### Authentication\n\nAll requests pass through `buildHeaders` → `authHeader` → `getItem` (localStorage). The stored API key is attached as an `Authorization` header. On any 401 response, `parseError` calls `clearApiKey` to force re-authentication.\n\nThe `verifyStoredAuth` function validates an existing key by calling the server and clears it if invalid — used on app startup to detect expired sessions.\n\n### Error Handling\n\n`parseError` normalizes API errors into a consistent structure. When a 401 is detected, it automatically clears the stored credentials, which triggers the router's auth guard to redirect to the login flow.\n\n### Key API Functions\n\nThe file exports dozens of domain-specific functions. A representative sample:\n\n- **Agents**: `getAgentDetail`, `listAgentSessions`, `cloneAgent`, `suspendAgent`, `getExperimentMetrics`\n- **Hands**: `listActiveHands`, `deactivateHand`, `uninstallHand`, `getHandStats`, `getHandSession`, `getHandManifestToml`\n- **Skills/ClawHub**: `clawhubCnSearch`, `skillhubSearch`, `skillhubGetSkill`\n- **Runtime**: `getHealthDetail`, `getQueueStatus`, `testChannel`, `reloadChannels`, `pollVideo`, `deleteTaskFromQueue`\n- **Usage**: `listUsageByAgent`\n- **Schedules**: `runSchedule`, `setSessionLabel`\n\nEach function composes the appropriate HTTP primitive with a path and optional body:\n\n```typescript\n// Pattern: function → primitive\nexport const cloneAgent = (id: string, body: CloneAgentRequest) =>\n  post(`/api/agents/${id}/clone`, body);\n```\n\n## Query Hooks (`lib/queries/`)\n\nReact Query hooks wrap API functions to provide caching, refetching, and loading states. They follow a consistent naming pattern: `use` prefix + domain noun.\n\n### Domain Modules\n\n| Module | Key Hooks | Purpose |\n|--------|-----------|---------|\n| `agents.ts` | `useAgentDetail`, `useAgentSessions`, `useExperimentMetrics` | Agent CRUD and session listing |\n| `hands.ts` | `useActiveHands`, `useHandStats`, `useHandSession` | Hand marketplace and instances |\n| `skills.ts` | `useClawHubSearch`, `useSupportingFile` | Skill discovery and file loading |\n| `memory.ts` | `useMemoryStats` | Proactive memory statistics |\n| `mcp.ts` | `useMcpHealth` | MCP server health checks |\n| `terminal.ts` | `useTerminalHealth` | Terminal connectivity status |\n\nQuery hooks call through to the API layer, which in turn hits the kernel endpoints. For example:\n\n```\nuseAgentSessions → listAgentSessions → get(`/api/agents/${id}/sessions`)\n```\n\n## Mutation Hooks (`lib/mutations/`)\n\nMutations handle data modification and map 1:1 to POST/PUT/DELETE API calls. Each hook uses `useMutation` with appropriate cache invalidation on success.\n\n| Module | Key Hooks | API Operation |\n|--------|-----------|---------------|\n| `agents.ts` | `useCreatePromptVersion` | Create prompt versions for experiments |\n| `approvals.ts` | `useApproveApproval` | Approve pending requests |\n| `goals.ts` | `useUpdateGoal` | Update goal definitions |\n| `providers.ts` | `useSetProviderKey` | Set provider API keys |\n| `schedules.ts` | `useCreateSchedule`, `useDeleteSchedule`, `useRunSchedule` | Schedule CRUD and manual trigger |\n| `workflows.ts` | `useUpdateWorkflow` | Workflow definition updates |\n| `runtime.ts` | `useCreateBackup`, `useCleanupSessions` | System maintenance |\n| `config.ts` | `useSetConfigValue` | Hot-reload config changes |\n| `hands.ts` | `useSendHandMessage` | Send messages through hand instances |\n\n## Auto-Generated OpenAPI Types (`openapi/generated.ts`)\n\n**Do not edit this file directly.** It is generated by `openapi-typescript` from the kernel's OpenAPI schema.\n\nThe file exports:\n\n- **`paths`** — Maps every API route to its HTTP methods, parameters, request bodies, and response types\n- **`components[\"schemas\"]`** — Request/response shapes like `MessageRequest`, `SpawnRequest`, `PatchAgentConfigRequest`, `BulkAgentIdsRequest`, etc.\n\nThese types ensure the API client and all consumers are compile-time verified against the actual backend contract.\n\n### Key Schema Types\n\n- **`SpawnRequest`** — Spawning agents from TOML manifests or templates, with optional signed manifests\n- **`MessageRequest`** — Sending messages with support for attachments, ephemeral mode, group chat context, thinking controls, and channel metadata\n- **`MessageResponse`** — Response with token counts, cost, decision traces, and memory recall info\n- **`PatchAgentConfigRequest`** — Hot-updating agent identity (name, emoji, color, model, temperature, system prompt, web search augmentation)\n- **`CloneAgentRequest`** — Cloning with optional skill/tool inclusion\n- **`BulkAgentIdsRequest` / `BulkCreateRequest`** — Bulk operations across multiple agents\n\n## Page Components (`src/pages/`)\n\nEach page composes query and mutation hooks with UI to form a complete feature:\n\n| Page | Hooks Used | Function |\n|------|-----------|----------|\n| `ChatPage` | `useChatMessages`, WebSocket | Real-time agent conversation |\n| `AgentsPage` | `useCreatePromptVersion` (via `PromptsExperimentsModal`) | Agent management and prompt experimentation |\n| `ApprovalsPage` | `useApproveApproval` | Review and act on approval requests |\n| `GoalsPage` | `useUpdateGoal` | Goal CRUD |\n| `WizardPage` | `useSetProviderKey` | First-run provider setup |\n| `CanvasPage` | `useUpdateWorkflow` | Visual workflow editor |\n| `WorkflowsPage` | Workflow queries, `navigateToCanvas` | Workflow listing and navigation |\n| `TerminalPage` | Terminal hooks, localStorage | Interactive terminal sessions |\n| `McpServersPage` | `useMcpHealth` (via `AuthBadge`) | MCP server management |\n\n## Routing (`dashboard/src/router.tsx`)\n\nThe router handles authentication guards and automatic reload detection:\n\n- **`tryAutoReload`** — Checks `shouldAutoReload` (localStorage flag) and triggers a full page reload when needed (e.g., after a version update)\n- Auth-protected routes redirect unauthenticated users to the login flow\n- The router uses `localStorage.setItem`/`getItem` (referenced via test mocks) for persistence\n\n## Shared Libraries (`src/lib/`)\n\n- **`chat.ts`** — `normalizeRole`, `asText` utilities for normalizing chat message roles and extracting plain text from structured messages\n- **`chatPicker.ts`** — `groupedPicker` for organizing agents/models into grouped selections\n- **`i18n.ts`** — Internationalization initialization\n\n## Common Execution Flows\n\n### Canvas Page → Workflow Save\n\n```\nCanvasPageInner → useUpdateWorkflow → updateWorkflow → put → buildHeaders → authHeader → getItem\n                                                                                           ↓\n                                                                             parseError → clearApiKey (on 401)\n```\n\n### Wizard Page → Provider Key Setup\n\n```\nWizardPage → useSetProviderKey → setProviderKey → post → buildHeaders → authHeader → getItem\n                                                                                      ↓\n                                                                        parseError → clearApiKey (on 401)\n```\n\n### Approval Action\n\n```\nApprovalsPage → useApproveApproval → approveApproval → post → buildHeaders → authHeader → getItem\n                                                                                           ↓\n                                                                             parseError → clearApiKey (on 401)\n```\n\nAll mutation flows follow the same pattern: page component → mutation hook → API function → HTTP primitive → auth headers. Errors propagate back through React Query's `onError` callbacks.\n\n## Contributing\n\n### Adding a New API Endpoint\n\n1. **Do not edit `openapi/generated.ts`**. Regenerate it from the kernel's OpenAPI schema.\n2. Add a function in `dashboard/src/api.ts` using the appropriate primitive (`get`, `post`, `put`, `del`).\n3. Create a query hook in `lib/queries/` or a mutation hook in `lib/mutations/`.\n4. Consume the hook from the relevant page component.\n\n### Running Tests\n\nThe test files (`dashboard/src/api.test.ts`, `src/lib/chat.test.ts`, `src/lib/chatPicker.test.ts`, `lib/mutations/*.test.tsx`) mock `localStorage` and `fetch` to verify API functions, hook behavior, and utility logic in isolation.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop\n\nNative desktop application wrapping the LibreFang Agent OS using Tauri 2.0. Provides a system tray, global shortcuts, auto-update, auto-start, and both local and remote server modes.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[main.rs — CLI args] --> RUN[lib.rs — run]\n    RUN --> MODE{StartupMode?}\n    MODE -->|Remote URL| NAV1[WebView → remote dashboard]\n    MODE -->|Local| SRV[server.rs — boot kernel + axum]\n    MODE -->|ConnectionScreen| CONN[connection.rs — HTML connection page]\n    SRV --> NAV2[WebView → local dashboard]\n    CONN -->|connect_remote| NAV1\n    CONN -->|start_local| SRV\n    RUN --> TRAY[tray.rs — system tray]\n    RUN --> SHORT[shortcuts.rs — global hotkeys]\n    RUN --> UPD[updater.rs — background updates]\n    SRV --> API[librefang-api — axum router]\n    SRV --> KERNEL[librefang-kernel]\n```\n\n## Startup Flow\n\n`main.rs` is a thin CLI wrapper. It loads environment variables from `~/.librefang/.env` synchronously (before any threads exist), parses `--server-url` and `--local` flags via clap, then calls `lib::run()`.\n\n`run()` resolves the connection mode with this priority:\n\n1. **CLI `--server-url`** → Remote mode, connect directly\n2. **CLI `--local`** → Local mode, boot embedded server\n3. **`LIBREFANG_SERVER_URL` env var** → Remote mode\n4. **Saved preference** from `~/.librefang/desktop.toml` → Remote or Local per saved choice\n5. **Fallback** → Show the connection screen\n\nFor direct modes (remote or local), the URL and server handle are resolved before the Tauri builder runs. For the connection screen, a blank page is injected with HTML from `connection::connection_html()`, and the user's choice triggers IPC commands that resolve everything at runtime.\n\n## Managed State\n\nTauri managed state uses interior mutability (`RwLock`/`Mutex`) so state can be updated from IPC commands without re-registering. All five types are registered once at startup with initial values; updates go through the locks.\n\n| State Type | Inner Type | Purpose |\n|---|---|---|\n| `PortState` | `RwLock<Option<u16>>` | Local server port. `None` in remote mode. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel instance + `Instant` start time. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | URL the WebView navigates to (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | `true` when connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Server handle for shutdown. Filled by `start_local` or direct boot. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the server started, used for uptime reporting.\n\n## Module Breakdown\n\n### `server.rs` — Embedded Server Lifecycle\n\n`start_server()` performs three steps:\n\n1. Boots `LibreFangKernel` synchronously on the calling thread (no tokio needed).\n2. Binds a `TcpListener` to `127.0.0.1:0` on the calling thread — this guarantees the port is known before any Tauri window is created.\n3. Spawns a dedicated OS thread named `\"librefang-server\"` with its own multi-threaded tokio runtime. Inside that runtime:\n   - `start_background_agents()` runs (requires tokio context).\n   - `spawn_approval_sweep_task()` starts.\n   - `run_embedded_server()` converts the std `TcpListener` to tokio, builds the axum router via `librefang_api::server::build_router`, and serves with graceful shutdown via a `watch` channel.\n\n`ServerHandle` owns the shutdown sender, kernel, and server thread join handle. Calling `shutdown()` sends the signal, joins the thread, and calls `kernel.shutdown()`. `Drop` sends the signal without blocking — the thread exits on its own.\n\nA double-shutdown guard (`AtomicBool`) prevents sending the signal twice (both explicit `shutdown()` and `Drop` may run).\n\n### `connection.rs` — Remote/Local Mode Switching\n\nHandles the connection screen and runtime server switching.\n\n**Persistence.** `ConnectionPreference` (mode + optional server_url) is saved to `~/.librefang/desktop.toml` via `save_preference()`. Loaded at startup by `load_saved_preference()`.\n\n**IPC commands:**\n\n- `test_connection(url)` — GETs `{url}/api/health` with a 10-second timeout. Returns the JSON response or an error string.\n- `connect_remote(url, remember)` — Validates the URL, confirms the server is healthy, updates all managed state (clears local state, sets remote mode), optionally saves preference, then navigates the WebView via `window.eval`.\n- `start_local(remember)` — Spawns `server::start_server()` on a blocking thread, updates all managed state, stores the `ServerHandle`, starts event forwarding for notifications, optionally saves preference, then navigates the WebView.\n\n`connection_html()` returns a self-contained HTML/CSS/JS string that renders the connection UI. The JavaScript polls for `window.__TAURI__` availability (WebView2 on `about:blank` loads IPC asynchronously) before calling `invoke`.\n\n### `commands.rs` — IPC Command Handlers\n\nAll commands are `#[tauri::command]` functions exposed to the WebView.\n\n**Status queries:**\n- `get_port()` — Returns the local server port.\n- `get_status()` — Returns JSON with `status`, `port`, `agents` count, `uptime_secs`.\n- `get_agent_count()` — Returns registered agent count.\n\n**File imports:**\n- `import_agent_toml()` — Opens a native file picker filtered to `.toml`, parses as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, spawns the agent via kernel.\n- `import_skill_file()` — Opens a file picker for `.md/.toml/.py/.js/.wasm`, copies to `~/.librefang/skills/`, triggers `kernel.reload_skills()`.\n\n**Settings:**\n- `get_autostart()` / `set_autostart(enabled)` — Read/write OS auto-start via `tauri-plugin-autostart`.\n- `check_for_updates()` — Delegates to `updater::check_for_update()`.\n- `install_update()` — Delegates to `updater::download_and_install_update()`. On success the app restarts (never returns `Ok`).\n\n**Utilities:**\n- `open_config_dir()` / `open_logs_dir()` — Opens `~/.librefang/` or `~/.librefang/logs/` in the OS file manager.\n- `uninstall_app()` — Platform-specific uninstall logic (see below).\n\n**`uninstall_app()` platform behavior:**\n\n| Platform | Method |\n|---|---|\n| Windows | Queries `HKCU\\...\\Uninstall` registry for `UninstallString`, runs the NSIS uninstaller, exits. |\n| macOS | Locates the enclosing `.app` bundle from the executable path, moves it to Trash via `osascript` + Finder, exits. |\n| Linux/AppImage | Deletes the `.AppImage` file (or `$APPIMAGE` path), exits. |\n| Linux/system | Returns an error with the appropriate `apt`/`dnf`/`pacman` removal command. |\n\n### `tray.rs` — System Tray\n\n`setup_tray()` builds a tray icon from embedded `icons/32x32.png` with a menu containing:\n\n- **Show Window** / **Open in Browser** / **Change Server...** — actions\n- **Agents: N running** / **Status: Running/Remote** — display-only (disabled)\n- **Launch at Login** — toggle via `CheckMenuItem`, talks to `tauri-plugin-autostart`\n- **Check for Updates...** — spawns async check, shows notification, installs if available\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — calls `app.exit(0)`\n\n**Change Server** shuts down any running local server (takes the `ServerHandle` from the holder, spawns a thread for `shutdown()`), clears local-mode state, and re-injects the connection screen HTML.\n\nLeft-click on the tray icon shows and focuses the main window.\n\nStatus text adapts to mode: remote shows the URL, local shows uptime (formatted by `format_uptime`).\n\n### `shortcuts.rs` — Global Keyboard Shortcuts\n\n`build_shortcut_plugin()` registers three system-wide shortcuts:\n\n| Shortcut | Action |\n|---|---|\n| `Ctrl+Shift+O` | Show/focus window |\n| `Ctrl+Shift+N` | Show window + emit `\"navigate\"` event with `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `\"navigate\"` event with `\"chat\"` |\n\nThe WebUI listens for the `\"navigate\"` event to switch pages. Registration failure is non-fatal — the app logs a warning and continues.\n\n### `updater.rs` — Auto-Update\n\n`UpdateInfo` is the structured result: `available`, `version`, `body`.\n\n**Startup check.** `spawn_startup_check()` waits 10 seconds after launch, then checks for updates. If found, shows a notification, waits 3 seconds, then installs silently. Success triggers `app_handle.restart()` which terminates the process.\n\n**On-demand.** `check_for_update()` returns `UpdateInfo`. `download_and_install_update()` calls `tauri-plugin-updater`'s download-and-install, then restarts.\n\nBoth the tray \"Check for Updates\" and the IPC `check_for_updates`/`install_update` commands use these functions.\n\n## Event Forwarding\n\n`forward_kernel_events()` subscribes to the kernel event bus and sends native OS notifications for critical events only:\n\n- **Agent crashed** — `{agent_id} crashed: {error}`\n- **Kernel stopping** — shutdown notification\n- **Quota enforced** — agent hit spending limit\n\nBroadcast lag is handled gracefully (logs and continues). Channel closure exits the loop.\n\nEvent forwarding is started in two places: `run()` for direct local boot, and `start_local` for connection-screen-initiated local boot.\n\n## Window Behavior\n\nOn desktop, closing the window hides to tray instead of quitting (`CloseRequested` → `window.hide()` + `api.prevent_close()`). Single-instance enforcement focuses the existing window if a second instance is launched.\n\n## Adding a New IPC Command\n\n1. Write the function in `commands.rs` (or `connection.rs` for connection-related), annotated with `#[tauri::command]`.\n2. Add it to the `generate_handler![]` macro in `lib.rs`.\n3. Call it from the WebView via `window.__TAURI__.core.invoke('command_name', { args })`.\n\nState access uses `tauri::State<'_, YourType>` as a parameter — Tauri injects the managed state automatically.","extensions-system":"# Extensions System\n\n# Extensions System (`librefang-extensions`)\n\nMCP server catalog, encrypted credential vault, OAuth2 PKCE flows, health monitoring, and installation transforms. This crate provides the infrastructure for discovering, configuring, authenticating, and monitoring MCP (Model Context Protocol) server integrations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"On Disk\"\n        CT[\"~/.librefang/mcp/catalog/*.toml<br/>(MCP Templates)\"]\n        CFG[\"~/.librefang/config.toml<br/>[[mcp_servers]]\"]\n        ENV[\"~/.librefang/.env\"]\n        VAULT_FILE[\"~/.librefang/vault.enc\"]\n    end\n\n    subgraph \"In-Memory\"\n        Catalog[\"McpCatalog\"]\n        Resolver[\"CredentialResolver\"]\n        Vault[\"CredentialVault\"]\n        Monitor[\"HealthMonitor\"]\n    end\n\n    CT -->|load| Catalog\n    Catalog -->|install_integration| Installer\n    Installer -->|produces McpServerConfigEntry| CFG\n    Vault --> VAULT_FILE\n    ENV --> Resolver\n    Vault --> Resolver\n    Resolver -->|provides secrets| Installer\n    Monitor -->|tracks status| CFG\n```\n\n## Core Types (`lib.rs`)\n\nThe root module defines the shared types used across all submodules.\n\n**`McpCatalogEntry`** — A bundled MCP server template (e.g., \"github\", \"slack\"). Deserialized from TOML files in the catalog directory. Fields include:\n\n- `id` — Unique identifier matching the filename or directory name\n- `name`, `description`, `icon`, `tags` — Display metadata\n- `category` — One of `DevTools`, `Productivity`, `Communication`, `Data`, `Cloud`, `AI`\n- `transport` — How to launch the server (`McpCatalogTransport::Stdio`, `Sse`, or `Http`)\n- `required_env` — List of `McpCatalogRequiredEnv` describing each credential the server needs\n- `oauth` — Optional `OAuthTemplate` for servers requiring OAuth2\n- `health_check` — `HealthCheckConfig` with interval and failure threshold\n\n**`McpStatus`** — Lifecycle state of an MCP server:\n\n| Variant | Meaning |\n|---------|---------|\n| `Available` | Catalog entry exists, not yet installed |\n| `Setup` | Installed but credentials are missing |\n| `Ready` | Configured and running |\n| `Error(String)` | Server errored |\n| `Disabled` | User-disabled |\n\n**`ExtensionError`** — Unified error type covering `NotFound`, `AlreadyInstalled`, `VaultLocked`, `OAuth`, `Io`, and others. All fallible operations return `ExtensionResult<T>`.\n\n---\n\n## MCP Catalog (`catalog`)\n\nRead-only in-memory index of MCP server templates cached at `~/.librefang/mcp/catalog/`. Templates are refreshed from the upstream registry by `librefang_runtime::registry_sync`.\n\n### File Layout\n\nTwo layouts are valid:\n\n```\ncatalog/\n  github.toml          # Flat file — id = \"github\"\n  slack/\n    MCP.toml           # Directory-backed — id = \"slack\"\n```\n\n### API\n\n**`McpCatalog::new(home_dir)`** — Creates an empty catalog rooted at `home_dir/mcp/catalog/`.\n\n**`catalog.load(home_dir)`** — Full reload: clears existing entries, scans the catalog directory, parses all TOML files. Returns the count loaded. Malformed files emit a `warn!` and are skipped.\n\n**`catalog.get(id)`** — Look up a single entry by ID.\n\n**`catalog.list()`** — All entries sorted by ID.\n\n**`catalog.list_by_category(category)`** — Filter by `McpCategory`.\n\n**`catalog.search(query)`** — Case-insensitive substring match against `id`, `name`, `description`, and `tags`.\n\nReload semantics are full (not incremental): `load()` clears the map first so deleted files don't linger.\n\n---\n\n## Credential Management\n\nCredentials are resolved from multiple sources through a priority chain. The three modules (`vault`, `credentials`, `dotenv`) work together but serve distinct roles.\n\n### Credential Vault (`vault`)\n\nAES-256-GCM encrypted file storage at `~/.librefang/vault.enc`.\n\n**Key management:**\n\n1. **OS keyring** (preferred) — Windows Credential Manager, macOS Keychain, or Linux Secret Service. When the OS keyring is unavailable, falls back to a file at `$LOCAL_DATA_DIR/librefang/.keyring` encrypted with AES-256-GCM using a key derived from a machine fingerprint (username + hostname via Argon2id).\n2. **Environment variable** — `LIBREFANG_VAULT_KEY` (base64-encoded 32-byte key) for headless/CI environments.\n\n**File format:** `OFV1` magic header + JSON containing base64-encoded salt, nonce, and ciphertext. Legacy JSON-only files (without the magic header) are still accepted for backward compatibility.\n\n**Encryption chain:**\n- Master key + random salt → Argon2id → derived key\n- Derived key + random nonce → AES-256-GCM → ciphertext\n- The vault is re-encrypted on every `set()` or `remove()` call with fresh salt and nonce\n\n**Key API:**\n\n```rust\nlet mut vault = CredentialVault::new(path);\nvault.init()?;                    // Generate key, store in keyring, create empty vault\nvault.unlock()?;                  // Load and decrypt from disk\nvault.set(key, value)?;           // Insert + re-encrypt\nvault.get(key)                    // Returns Zeroizing<String>\nvault.remove(key)?;               // Delete + re-encrypt\nvault.list_keys()                 // Key names only (no values)\n```\n\nFor programmatic/test use, `init_with_key` and `unlock_with_key` accept an explicit `Zeroizing<[u8; 32]>`.\n\nAll secret values use `Zeroizing<String>` to ensure memory is zeroed on drop. The `Drop` implementation for `CredentialVault` clears the entries map and cached key.\n\n### Credential Resolver (`credentials`)\n\nTries multiple sources in priority order:\n\n```\n1. Encrypted vault (~/.librefang/vault.enc)\n2. Dotenv file (~/.librefang/.env) — boot-time snapshot\n3. Process environment variable\n4. Interactive prompt (CLI only, opt-in)\n```\n\n**Usage:**\n\n```rust\nlet resolver = CredentialResolver::new(vault, Some(dotenv_path))\n    .with_interactive(true);\n\n// Single credential\nif let Some(val) = resolver.resolve(\"GITHUB_TOKEN\") { ... }\n\n// Batch resolution\nlet creds = resolver.resolve_all(&[\"KEY_A\", \"KEY_B\"]);\n\n// Check what's missing\nlet missing = resolver.missing_credentials(&[\"KEY_A\", \"KEY_B\"]);\n```\n\n`store_in_vault` persists a credential through the vault. `clear_dotenv_cache` evicts a stale entry from the in-memory dotenv snapshot (e.g., after a dashboard deletion).\n\n### Dotenv Loader (`dotenv`)\n\nLoads secrets into `std::env` so every entry point (CLI, desktop, kernel) behaves identically.\n\n**Priority (highest first):**\n\n```\n1. System environment variables (never overridden)\n2. Credential vault (vault.enc)\n3. ~/.librefang/.env\n4. ~/.librefang/secrets.env\n```\n\n**Critical timing constraint:** `load_dotenv()` must be called from synchronous `main()` before spawning any tokio runtime. `std::env::set_var` is undefined behavior in Rust 1.80+ once other threads exist. A `Once` guard prevents double-loading.\n\n**File management functions:**\n\n- `save_env_key(key, value)` — Upsert into `.env`, set in process env, creates file with 0600 permissions on Unix\n- `remove_env_key(key)` — Remove from `.env` and process env\n- `list_env_keys()` — Key names only\n- `env_file_exists()` — Check if `.env` is present\n\n---\n\n## Health Monitor (`health`)\n\nThread-safe health tracking for configured MCP servers using `DashMap` for concurrent access from background tasks.\n\n**`McpHealth`** tracks per-server state: status, tool count, last successful check timestamp, consecutive failures, reconnect state, and connected-since timestamp.\n\n**`HealthMonitor`** API:\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig::default());\nmonitor.register(\"github\");\nmonitor.report_ok(\"github\", 12);          // Mark healthy, record tool count\nmonitor.report_error(\"github\", err_msg);   // Increment failure count\nmonitor.should_reconnect(\"github\");        // true if errored and attempts remain\nmonitor.mark_reconnecting(\"github\");       // Increment attempt counter\nmonitor.get_health(\"github\");              // Clone of current state\nmonitor.all_health();                      // All servers\n```\n\n**Auto-reconnect with exponential backoff:**\n\n| Attempt | Delay |\n|---------|-------|\n| 0 | 5s |\n| 1 | 10s |\n| 2 | 20s |\n| 3 | 40s |\n| ... | Capped at 5 minutes |\n\nDefault config: `max_reconnect_attempts: 10`, `max_backoff_secs: 300`, `check_interval_secs: 60`. Set `auto_reconnect: false` to disable.\n\n`mark_ok` resets the failure counter and reconnect state. `report_error` increments `consecutive_failures` and clears `connected_since`.\n\n---\n\n## Installer (`installer`)\n\nPure transforms — no I/O side effects. Converts a catalog template into a `McpServerConfigEntry` suitable for writing into `config.toml`.\n\n**`install_integration(catalog, resolver, id, provided_keys)`**:\n\n1. Looks up the template by `id` in the catalog\n2. Stores any `provided_keys` in the vault (best-effort, warns on failure)\n3. Checks which `required_env` keys are still unresolved\n4. Returns `InstallResult` with the constructed `McpServerConfigEntry`, status (`Ready` or `Setup`), missing credential names, and a user-facing message\n\nThe caller (API handler or CLI command) is responsible for persisting the entry to `config.toml` and triggering a kernel reload.\n\n**`catalog_entry_to_mcp_server(entry)`** —
