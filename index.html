var PAGES = {"agent-kernel-librefang-kernel-handle-src":"# Agent Kernel ŌĆö librefang-kernel-handle-src\n\n# Agent Kernel ŌĆö `librefang-kernel-handle`\n\n## Purpose\n\nThis crate defines the `KernelHandle` trait ŌĆö the **dependency inversion boundary** between `librefang-runtime` (the agent loop) and `librefang-kernel` (the process manager). By expressing kernel operations as a trait, the runtime can invoke inter-agent actions (spawn, send, kill, memory access, task queues, etc.) without importing the kernel crate directly, breaking what would otherwise be a circular dependency.\n\nThe real kernel implements this trait and injects it into each agent's loop at startup. Test suites and embedded callers use lightweight stubs that rely on the trait's pervasive default implementations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"runtime crate\"\n        AL[agent_loop.rs]\n        TR[tool_runner.rs]\n    end\n    subgraph \"this crate\"\n        KH[\"trait KernelHandle\"]\n    end\n    subgraph \"kernel crate\"\n        KI[\"impl KernelHandle for Kernel\"]\n    end\n\n    AL -->|\"calls methods\"| KH\n    TR -->|\"calls methods\"| KH\n    KI -.->|\"implements\"| KH\n    KI -->|\"passes &self into\"| AL\n```\n\nThe kernel owns the concrete state (agent registry, memory store, task queue, channel adapters, etc.) and exposes it through the trait. The runtime only sees the trait interface.\n\n## `AgentInfo`\n\nA serializable snapshot of a running agent, returned by discovery methods:\n\n| Field | Type | Description |\n|---|---|---|\n| `id` | `String` | UUID of the agent |\n| `name` | `String` | Human-readable name from manifest |\n| `state` | `String` | Current lifecycle state |\n| `model_provider` | `String` | LLM backend (e.g. `\"openai\"`, `\"anthropic\"`) |\n| `model_name` | `String` | Model identifier |\n| `description` | `String` | Agent description from manifest |\n| `tags` | `Vec<String>` | Categorisation tags |\n| `tools` | `Vec<String>` | Names of tools available to this agent |\n\n## `KernelHandle` trait\n\nAll methods are documented in source; this section groups them by domain and explains the design decisions behind each group.\n\n### Agent lifecycle\n\n| Method | Sync/Async | Description |\n|---|---|---|\n| `spawn_agent` | async | Create an agent from a TOML manifest. `parent_id` tracks lineage. Returns `(agent_id, agent_name)`. |\n| `spawn_agent_checked` | async | Like `spawn_agent` but enforces capability inheritance ŌĆö every capability in the child manifest must be covered by `parent_caps`. Default delegates to `spawn_agent` (no enforcement). |\n| `list_agents` | sync | Return `AgentInfo` for all running agents. |\n| `find_agents` | sync | Case-insensitive search on name substring, tags, or tool names. |\n| `kill_agent` | sync | Terminate an agent by ID. |\n\n### Inter-agent messaging\n\n| Method | Notes |\n|---|---|\n| `send_to_agent` | Send a message to another agent, await its response. |\n| `send_to_agent_as` | Variant that records `parent_agent_id` so a `/stop` issued to the parent cascades into the callee (issue #3044). **Default falls back to `send_to_agent`** and emits a `trace`-level log so operators can identify non-cascading handles. |\n\nThe runtime's `tool_agent_send` in `tool_runner.rs` calls `send_to_agent_as` and also checks `max_agent_call_depth` before dispatching.\n\n### Memory\n\nAll memory methods accept an optional `peer_id` for namespace isolation ŌĆö when `Some`, keys are scoped to that peer so different users of the same agent get independent memory views.\n\n| Method | Description |\n|---|---|\n| `memory_store` | Write a JSON value under a key. |\n| `memory_recall` | Read a value; returns `None` if missing. |\n| `memory_list` | List all keys in a namespace. |\n| `memory_acl_for_sender` | RBAC M3 gate (#3054 Phase 2). Returns `UserMemoryAccess` for a sender+channel pair so the runtime can build a `MemoryNamespaceGuard`. `None` means no per-user restriction (preserves single-user behaviour). |\n\n### Task queue\n\nA cooperative task system for agents to post, claim, and complete work items:\n\n| Method | Async | Description |\n|---|---|---|\n| `task_post` | Ō£ō | Create a task with optional assignee and creator. Returns task ID. |\n| `task_claim` | Ō£ō | Claim the next available task for an agent. |\n| `task_complete` | Ō£ō | Mark a task done with a result string. |\n| `task_list` | Ō£ō | List tasks, optionally filtered by status. |\n| `task_delete` | Ō£ō | Delete a task. |\n| `task_retry` | Ō£ō | Reset a task to pending for re-execution. |\n| `task_get` | Ō£ō | Get a single task with result and retry count. |\n| `task_update_status` | Ō£ō | Set status to `pending` or `cancelled`. |\n\n### Knowledge graph\n\n| Method | Description |\n|---|---|\n| `knowledge_add_entity` | Add an `Entity` node. |\n| `knowledge_add_relation` | Add a `Relation` edge. |\n| `knowledge_query` | Query with a `GraphPattern`, returns `GraphMatch` results. |\n\n### Approval system\n\nTools that require human approval go through this flow:\n\n1. `requires_approval` / `requires_approval_with_context` ŌĆö synchronous gate checks.\n2. `is_tool_denied_with_context` ŌĆö hard deny before prompting.\n3. `resolve_user_tool_decision` ŌĆö RBAC-aware verdict returning `Allow`, `Deny`, or `NeedsApproval`.\n4. `request_approval` ŌĆö blocking call that waits for an `ApprovalDecision`.\n5. `submit_tool_approval` ŌĆö non-blocking; returns a `ToolApprovalSubmission` with a request UUID.\n6. `resolve_tool_approval` ŌĆö approve/deny a pending request and retrieve the deferred payload.\n7. `get_approval_status` ŌĆö poll the current status of a request.\n\n`requires_approval_with_context` defaults to calling `requires_approval`. `resolve_user_tool_decision` defaults to `Allow` ŌĆö the real kernel always overrides this; changing the default was considered during PR #3205 but rejected because it broke unrelated test stubs.\n\n### Channel adapters\n\nOutbound messaging to users through configured adapters (Telegram, Email, etc.):\n\n- `send_channel_message` ŌĆö text, with optional `thread_id` and `account_id` routing.\n- `send_channel_media` ŌĆö image or file by URL.\n- `send_channel_file_data` ŌĆö raw bytes with MIME type.\n- `send_channel_poll` ŌĆö quiz or poll with options.\n\nAll default to `\"not available\"` errors since they require adapter infrastructure.\n\n### Hands system\n\nAutonomous skill agents:\n\n- `hand_list` ŌĆö list installed Hands.\n- `hand_install` ŌĆö install from TOML + skill content.\n- `hand_activate` ŌĆö spawn a Hand's agent with config.\n- `hand_status` ŌĆö dashboard metrics.\n- `hand_deactivate` ŌĆö stop a running Hand.\n\n### Cron scheduler\n\n- `cron_create`, `cron_list`, `cron_cancel` ŌĆö all default to `\"Cron scheduler not available\"`.\n\n### Prompt experiments & versioning\n\nA complete prompt management surface for A/B testing:\n\n- **Versions**: `get_prompt_version`, `list_prompt_versions`, `create_prompt_version`, `delete_prompt_version`, `set_active_prompt_version`.\n- **Experiments**: `create_experiment`, `get_experiment`, `list_experiments`, `update_experiment_status`, `get_running_experiment`, `get_experiment_metrics`.\n- **Auto-tracking**: `auto_track_prompt_version` ŌĆö called from `build_prompt_setup` to detect system prompt drift.\n- **Metrics**: `record_experiment_request` ŌĆö logs latency, cost, and success per variant.\n\nDefaults return empty results or errors; the kernel overrides with real storage.\n\n### Goals & workflows\n\n- `goal_list_active` ŌĆö list pending/in-progress goals.\n- `goal_update` ŌĆö change goal status and progress.\n- `run_workflow` ŌĆö execute a workflow by ID or name, returns `(run_id, output)`.\n\n### Advanced primitives\n\n| Method | Description |\n|---|---|\n| `run_forked_agent_oneshot` | Forked-turn primitive for structured extraction. Spawns a streaming run, drains it, returns final text. The fork's messages do **not** persist into the canonical session, and the turn-end hook fires with `is_fork: true`. Uses the parent's prompt cache prefix instead of starting cold. |\n| `touch_heartbeat` | Reset `last_active` during long LLM calls to prevent heartbeat false-positives. Called from both `run_agent_loop` and `run_agent_loop_streaming`. |\n| `fire_agent_step` | Emit an `agent:step` hook at each loop iteration. |\n| `readonly_workspace_prefixes` | Paths that file-write tools must reject. |\n| `named_workspace_prefixes` | All declared workspaces with their `WorkspaceMode` ŌĆö used by file-read, file-list, file-write, and apply-patch tools for sandbox allow-listing. |\n\n### Configuration queries\n\n| Method | Default | Description |\n|---|---|---|\n| `tool_timeout_secs` | `120` | Global tool execution timeout. |\n| `tool_timeout_secs_for` | delegates to `tool_timeout_secs` | Per-tool override with glob matching. Resolution: exact match ŌåÆ longest glob ŌåÆ global. |\n| `max_agent_call_depth` | `5` | Maximum recursive inter-agent calls. |\n| `skill_env_passthrough_policy` | `None` | Operator gate for skill environment variable access. `None` = only built-in hard blocks apply. |\n\n### A2A (Agent-to-Agent)\n\n- `list_a2a_agents` ŌĆö discovered external agents as `(name, url)` pairs.\n- `get_a2a_agent_url` ŌĆö look up a specific agent's URL by name.\n\n## Default implementation strategy\n\nNearly every method has a sensible default: no-ops, empty collections, or errors like `\"not available\"`. This is intentional ŌĆö it allows:\n\n- **Test stubs** to implement only the methods under test.\n- **Embedded callers** to get a working system without wiring every subsystem.\n- **Incremental feature rollout** ŌĆö new methods land with safe defaults rather than breaking every implementor.\n\nThe kernel crate overrides every method with real implementations backed by its internal state. If a default is used in production (e.g., `spawn_agent_checked` falling through to `spawn_agent` without capability checks), that's a misconfiguration ŌĆö the kernel always overrides these.\n\n## Key internal delegation chains\n\n```\nrequires_approval_with_context ŌåÆ requires_approval\ntool_timeout_secs_for         ŌåÆ tool_timeout_secs\nsend_to_agent_as              ŌåÆ send_to_agent          (with trace log on fallback)\nspawn_agent_checked           ŌåÆ spawn_agent            (no capability enforcement)\n```\n\n## Thread safety\n\nThe trait is bounded by `Send + Sync` via `#[async_trait]`. Implementations must be safe to call from multiple tokio tasks concurrently ŌĆö the kernel achieves this through `Arc<Mutex<...>>` or `Arc<RwLock<...>>` guards on its internal registries.","agent-kernel-librefang-kernel-metering-src":"# Agent Kernel ŌĆö librefang-kernel-metering-src\n\n# Agent Kernel ŌĆö Metering Engine (`librefang-kernel-metering`)\n\n## Purpose\n\nThe metering engine is the cost-control layer for the LibreFang agent kernel. Every LLM call that flows through the system is measured, priced, and checked against spending limits before and after execution. The engine enforces budgets at four independent levels ŌĆö per-agent, per-provider, per-user, and global ŌĆö and persists every usage event to SQLite for audit and analytics.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller -->|\"pre-dispatch\"| ME[MeteringEngine]\n    Caller -->|\"post-call\"| ME\n    ME --> US[UsageStore]\n    US --> DB[(SQLite)]\n    ME -->|pricing lookup| MC[ModelCatalog]\n    MC -->|fallback| DEF[\"Default rates $1/$3 per M\"]\n    ME -->|enforce| AQ[Agent Quota]\n    ME -->|enforce| GB[Global Budget]\n    ME -->|enforce| PB[Provider Budget]\n    ME -->|enforce| UB[User Budget]\n```\n\nThe `MeteringEngine` is a thin orchestration layer over `librefang_memory::usage::UsageStore`. All persistence goes through the store; the engine adds quota semantics, cost estimation, and snapshot reporting on top.\n\n## Key Struct\n\n### `MeteringEngine`\n\n```rust\npub struct MeteringEngine {\n    store: Arc<UsageStore>,\n}\n```\n\nConstructed with `MeteringEngine::new(store)`. The engine holds no mutable state of its own ŌĆö it borrows concurrency safety from the `Arc<UsageStore>` and the SQLite transactions beneath it.\n\n## Quota Enforcement Hierarchy\n\nBudgets are checked at four levels. All four use the same pattern: query the relevant time-window aggregate from the store, compare against a configurable limit, return `LibreFangError::QuotaExceeded` on breach. A limit of `0.0` means **unlimited** and is skipped entirely.\n\n| Level | Method | Time Windows | Scope |\n|---|---|---|---|\n| Agent | `check_quota` | hourly, daily, monthly | Per `AgentId` |\n| Global | `check_global_budget` | hourly, daily, monthly | All agents combined |\n| Provider | `check_provider_budget` | hourly, daily, monthly + tokens/hour | Per provider string (e.g. `\"anthropic\"`) |\n| User | `check_user_budget` | hourly, daily, monthly | Per `UserId` (RBAC) |\n\n### Atomic Check-and-Record\n\nThe non-atomic path (check ŌåÆ LLM call ŌåÆ record) has a TOCTOU race: two concurrent requests can both pass the quota check before either writes its usage. The engine provides three atomic methods that wrap the check and insert into a single SQLite transaction:\n\n| Method | Checks Performed |\n|---|---|\n| `check_quota_and_record` | Per-agent quota only |\n| `check_global_budget_and_record` | Global budget only |\n| `check_all_and_record` | Per-agent + global + per-provider (the preferred post-call path) |\n\n`check_all_and_record` also resolves a per-provider budget from `BudgetConfig.providers` using the record's `provider` field. If the provider has no configured budget, that layer is skipped.\n\n### User Budget Semantics\n\n`check_user_budget` is a **post-call** check. The cost of the just-completed call is already committed to the store (via `check_all_and_record`). If the check fails, it means the *next* call from this user must be denied ŌĆö the current call is not rolled back. This mirrors the global and per-agent post-call semantics.\n\n## Cost Estimation\n\n### `estimate_cost` (static, catalog-free)\n\n```rust\nMeteringEngine::estimate_cost(model, input_tokens, output_tokens,\n                              cache_read_input_tokens, cache_creation_input_tokens) -> f64\n```\n\nUses fixed default rates of **$1.00/M input** and **$3.00/M output**. The `model` parameter is accepted for API consistency but is not consulted. Use this only when no model catalog is available (e.g., unit tests).\n\n### `estimate_cost_with_catalog` (preferred)\n\n```rust\nMeteringEngine::estimate_cost_with_catalog(&catalog, model, input_tokens, output_tokens,\n                                           cache_read_input_tokens, cache_creation_input_tokens) -> f64\n```\n\nLooks up pricing from the `ModelCatalog`. Falls back to default rates when the model is not found.\n\n#### Special case: zero-priced ChatGPT models\n\nChatGPT session-auth models (`provider == \"chatgpt\"`) register with `$0.00/$0.00` in the catalog because billing is handled externally. To avoid budget blind spots, these models are automatically re-priced at the default `$1/$3` rates by the `should_use_legacy_budget_estimate` helper. This ensures budget enforcement still works with a conservative estimate.\n\nLocal-tier models with zero pricing are **not** re-priced ŌĆö they genuinely cost nothing.\n\n### Token Pricing Formula\n\nThe `estimate_cost_from_rates` helper breaks input tokens into three categories:\n\n| Token Type | Price Multiplier | Rationale |\n|---|---|---|\n| Regular input | 1.0├Ś input rate | Standard prompt tokens |\n| Cache-read | 0.10├Ś input rate | Prompt-cache hit (90% discount) |\n| Cache-creation | 1.25├Ś input rate | Upfront cost to seed the cache |\n| Output | 1.0├Ś output rate | Completion tokens |\n\nRegular input = `total_input - cache_read - cache_creation`. Token counts are saturating-subtracted to avoid underflow.\n\n## Querying and Reporting\n\n| Method | Returns | Use Case |\n|---|---|---|\n| `get_summary(agent_id: Option<AgentId>)` | `UsageSummary` | Total calls, tokens, cost ŌĆö optionally filtered to one agent |\n| `get_by_model()` | `Vec<ModelUsage>` | Usage broken down by model name |\n| `budget_status(&BudgetConfig)` | `BudgetStatus` | Snapshot of current spend vs limits for all windows |\n\n`BudgetStatus` includes spend, limit, and percentage for hourly/daily/monthly windows, plus the configured `alert_threshold` and `default_max_llm_tokens_per_hour`. It is serializable (`#[derive(serde::Serialize])`) for API responses.\n\n## Record Cleanup\n\n`cleanup(days: u32)` deletes usage records older than the given number of days. Returns the number of deleted rows. Delegates to `UsageStore::cleanup_old`.\n\n## Dependencies\n\n| Crate | What's Used |\n|---|---|\n| `librefang_memory` | `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage`, `MemorySubstrate` |\n| `librefang_types` | `AgentId`, `UserId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `UserBudgetConfig`, `LibreFangError` |\n| `librefang_runtime` | `ModelCatalog` for pricing lookups |\n\n## Integration Pattern\n\nThe typical call flow from the agent kernel after an LLM response:\n\n1. **Build a `UsageRecord`** with token counts and the computed `cost_usd` (from `estimate_cost_with_catalog`).\n2. **Call `check_all_and_record(&record, &quota, &budget)`** ŌĆö this atomically verifies per-agent, global, and per-provider limits, then inserts the record. If any limit is breached, the insert is rolled back and `QuotaExceeded` is returned.\n3. **Call `check_user_budget(user_id, &user_budget)`** ŌĆö post-call gate for the next request from this user.\n4. **Optionally query** `budget_status` or `get_summary` for dashboards and alerting.","agent-kernel-librefang-kernel-router-src":"# Agent Kernel ŌĆö librefang-kernel-router-src\n\n# Agent Kernel ŌĆö `librefang-kernel-router`\n\n## Overview\n\nThe router module is the dispatch brain of LibreFang. Given an incoming user message, it determines which **agent template** or **hand** should handle it. Routing combines three signal sourcesŌĆöhardcoded keyword rules, manifest metadata, and optional embedding-based semantic similarityŌĆöinto a single scored selection.\n\nThe module is stateless between calls (modulo caches) and never spawns agents itself; it simply returns a selection result that the kernel acts on.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[\"User message\"] --> HS[\"auto_select_hand()\"]\n    MSG --> TS[\"auto_select_template()\"]\n\n    subgraph \"Hand Routing\"\n        HS --> HRC[\"hand_route_candidates()\"]\n        HRC --> HANDS[\"HAND.toml files<br/>(registry/hands/)\"]\n        HRC -->|\"keyword match\"| PM[\"phrase_matches()\"]\n        HS -->|\"+ semantic bonus\"| SEM[\"semantic_scores\"]\n    end\n\n    subgraph \"Template Routing\"\n        TS --> RULES[\"TEMPLATE_RULES<br/>(hardcoded regex)\"]\n        TS --> META[\"auto_select_template_from_metadata()\"]\n        META --> MRC[\"manifest_route_candidates()\"]\n        MRC --> MANIFESTS[\"agent.toml files<br/>(workspaces/agents/)\"]\n        TS -->|\"+ semantic bonus\"| SEM2[\"semantic_scores\"]\n        TS -->|\"multi-domain?\"| ORCH[\"ŌåÆ orchestrator\"]\n    end\n\n    HS --> HAND_SEL[\"HandSelection\"]\n    TS --> TPL_SEL[\"TemplateSelection\"]\n```\n\n## Public API\n\n### `auto_select_template(message, agents_dir, semantic_scores) ŌåÆ TemplateSelection`\n\nThe primary entry point for template routing. Returns a `TemplateSelection` containing the template name, a human-readable reason string, and a numeric score.\n\n**Scoring sources, evaluated in order of priority:**\n\n| Source | Weight | Description |\n|---|---|---|\n| Hardcoded `TEMPLATE_RULES` regex matches | 6 (strong) / 1 (weak) | Curated bilingual regex patterns for ~28 built-in templates |\n| Manifest `explicit_aliases` / `strong_aliases` | 6 | User-configured in `agent.toml` under `[metadata.routing]` |\n| Manifest `generated_phrases` | 2 | Auto-derived from template name, description, and tags |\n| Manifest `weak_aliases` | 1 | User-configured weak aliases + id-derived tokens |\n| Semantic similarity bonus | 0ŌĆō5 | Scaled from cosine similarity against template descriptions |\n\n**Special behaviors:**\n\n- If two different templates score highly and the message contains multi-domain indicators (`ÕÉīµŚČ`, `ÕłåÕł½`, `ÕŹÅõĮ£`, `ÕżÜõĖ¬`, `multi`, `together`), the function routes to `\"orchestrator\"` instead.\n- If no keyword match is found but `semantic_scores` is provided, templates with similarity Ōēź 0.55 are considered as semantic-only candidates.\n- The final fallback is `\"orchestrator\"` with a descriptive reason.\n\n### `auto_select_hand(message, semantic_scores) ŌåÆ HandSelection`\n\nRoutes a message to the best-matching hand. Works identically to template routing but reads keywords from `HAND.toml` `[routing]` sections rather than hardcoded rules.\n\nReturns `HandSelection { hand_id: None, .. }` when no hand meets the minimum score threshold (`MIN_HAND_SCORE = 2`).\n\n### `load_template_manifest(home_dir, template) ŌåÆ Result<AgentManifest, String>`\n\nReads and parses an `agent.toml` file from `<home_dir>/workspaces/agents/<template>/agent.toml`. Validates that the template name is safe (alphanumeric, hyphens, underscores only).\n\n### `all_template_descriptions(agents_dir) ŌåÆ Vec<(String, String)>`\n\nReturns `(template_name, embed_text)` pairs for every routable template. Used by the kernel to compute embedding vectors for semantic routing. Excludes templates listed in `ROUTING_EXCLUDED_TEMPLATES` (currently `[\"assistant\"]`). The embed text combines name, description, and tags.\n\n### Cache Management\n\n```rust\npub fn set_hand_route_home_dir(home_dir: &Path)\npub fn invalidate_hand_route_cache()\npub fn invalidate_manifest_cache()\n```\n\nThe router caches parsed routing candidates in global `OnceLock<Mutex<ŌĆ”>>` slots. Call `invalidate_hand_route_cache()` and `invalidate_manifest_cache()` after config hot-reload or agent/hand install/uninstall. `set_hand_route_home_dir` configures the filesystem root for hand discovery; the incoming call graph shows it is also triggered from `skills.rs` during hand install/uninstall.\n\n## Scoring Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `EXPLICIT_ALIAS_WEIGHT` | 6 | Strong aliases and hardcoded regex rules |\n| `GENERATED_PHRASE_WEIGHT` | 2 | Auto-derived phrases from name/description/tags |\n| `WEAK_PHRASE_WEIGHT` | 1 | Weak aliases and id-derived tokens |\n| `MAX_SEMANTIC_BONUS` | 5.0 | Upper bound on embedding similarity bonus |\n| `SEMANTIC_ONLY_THRESHOLD` | 0.55 | Minimum cosine similarity for semantic-only fallback |\n| `MIN_HAND_SCORE` | 2 | Floor for hand routing ŌĆö prevents single weak-keyword false positives |\n\n## Hand Routing Data Flow\n\nHands are discovered from `<home_dir>/registry/hands/*/HAND.toml`. Each `HandDefinition` is parsed via `librefang_hands::registry::parse_hand_toml_with_agents_dir` (the agents registry directory is passed to resolve `base = \"<template>\"` references without emitting spurious warnings).\n\nFrom each definition, the router extracts:\n\n- **Strong phrases**: `[routing].aliases` + phrases derived from the hand description\n- **Weak phrases**: `[routing].weak_aliases` + tokens from the hand ID (filtered against `GENERIC_ENGLISH_WORDS`, minimum 3 characters)\n\nThe home directory resolution order is:\n\n1. Explicitly set via `set_hand_route_home_dir()`\n2. `LIBREFANG_HOME` environment variable\n3. `~/.librefang` (falling back to system temp dir)\n\n## Template Routing Data Flow\n\nTemplate routing has two parallel sources that are scored independently:\n\n### 1. Hardcoded Rules (`TEMPLATE_RULES`)\n\nA static array of `RouteRule` entries. Each rule defines a `target` template name plus `strong` and `weak` pattern groups. Patterns are `(label, regex)` pairs compiled once and cached in `REGEX_CACHE`. Rules cover ~28 templates with bilingual (English + Chinese) patterns covering domains like coding, debugging, testing, architecture, security, DevOps, research, writing, and more.\n\n### 2. Manifest Metadata (`auto_select_template_from_metadata`)\n\nScans all `agent.toml` files in `agents_dir`. For each manifest:\n\n1. Reads `[metadata.routing]` configuration:\n   - `aliases` / `strong_aliases` ŌåÆ explicit aliases (weight 6)\n   - `weak_aliases` ŌåÆ weak aliases (weight 1)\n   - `exclude_generated` ŌåÆ optionally disables auto-generated phrases\n2. Auto-generates phrases from:\n   - Template name via `english_variants()` (splits on hyphens/underscores)\n   - Tags via `tag_phrases()`\n   - Description via `description_phrases()`\n\nThe results are cached in `MANIFEST_CACHE`, keyed by `agents_dir` path.\n\n## Phrase Generation\n\nThe router extracts routing phrases from free-text descriptions and tags in a language-agnostic way:\n\n- **`description_phrases(text)`**: Splits text on punctuation (including CJK punctuation like `ŃĆüŃĆé’╝ī’╝ł’╝ē`). For ASCII chunks, strips leading/trailing generic English words and generates word-level and bigram candidates. For Unicode chunks (CJK, etc.), keeps the raw chunk if it's 2ŌĆō32 characters.\n- **`english_variants(text)`**: Produces the original form, a space-joined form (replacing hyphens/underscores), and individual hyphen-split components.\n- **`tag_phrases(tags)`**: Applies `english_variants` to ASCII tags and preserves Unicode tags as-is.\n- **`ascii_phrase_candidates(text, min_len)`**: Filters out generic words, generates the full phrase plus individual content words plus adjacent-word bigrams.\n\nAll phrase lists pass through `dedupe()`, which preserves insertion order while removing duplicates.\n\n## Phrase Matching\n\n`phrase_matches(message, phrase)` handles two cases:\n\n- **ASCII phrases**: Builds a regex with word-boundary-aware matching (`(^|[^a-z0-9])phrase([^a-z0-9]|$)`) after escaping the phrase and normalizing internal spaces to `[\\s_-]+`.\n- **Unicode phrases**: Simple case-insensitive `contains` check.\n\nRegex patterns are compiled once and stored in `REGEX_CACHE` (a global `HashMap<String, Regex>`).\n\n## Return Types\n\n```rust\npub struct HandSelection {\n    pub hand_id: Option<String>,  // None when no hand meets the threshold\n    pub reason: String,           // Human-readable explanation\n    pub score: usize,             // Aggregate score\n}\n\npub struct TemplateSelection {\n    pub template: String,         // Always populated (defaults to \"orchestrator\")\n    pub reason: String,\n    pub score: usize,\n}\n```\n\n## Integration Points\n\n- **`librefang_types::agent::AgentManifest`** ŌĆö the manifest type loaded from `agent.toml`\n- **`librefang_hands::registry::parse_hand_toml_with_agents_dir`** ŌĆö parses `HAND.toml` files during hand candidate loading\n- **`librefang_runtime::registry_sync::resolve_home_dir_for_tests`** ŌĆö used in test setup to find the test home directory\n- **Skills route handlers** (`src/routes/skills.rs`) call `invalidate_hand_route_cache()` after hand install/uninstall operations\n\n## Configuration Reference\n\n### `agent.toml` routing section\n\n```toml\n[metadata.routing]\naliases = [\"release notes\", \"changelog generator\"]\nstrong_aliases = [\"release notes\"]       # merged with aliases\nweak_aliases = [\"changelog\"]\nexclude_generated = false                # set true to disable auto-phrase generation\n```\n\n### `HAND.toml` routing section\n\n```toml\n[routing]\naliases = [\"uptime pulse monitor\"]       # strong phrases\nweak_aliases = [\"uptime pulse\"]          # weak phrases\n```","agent-kernel-librefang-kernel-src":"# Agent Kernel ŌĆö librefang-kernel-src\n\n# Agent Kernel ŌĆö `librefang-kernel`\n\nThe kernel module implements two foundational safety layers for the LibreFang agent platform:\n\n1. **Execution approval gating** ŌĆö dangerous tool invocations (shell commands, file writes, etc.) are held until a human explicitly approves, denies, or a configurable timeout policy decides.\n2. **RBAC authentication and authorization** ŌĆö platform user identities (Telegram, Discord, Slack) are mapped to LibreFang users with hierarchical roles, and every privileged action is checked against the user's role and per-user tool policies.\n\n---\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Kernel\n        AM[ApprovalManager]\n        AU[AuthManager]\n    end\n\n    subgraph \"Approval Paths\"\n        BL[Blocking Path<br/>request_approval]\n        NB[Deferred Path<br/>submit_request]\n        EXP[Expiry Sweep<br/>expire_pending_requests]\n    end\n\n    subgraph \"Auth Paths\"\n        ID[identify<br/>channel ŌåÆ UserId]\n        AZ[authorize<br/>UserId + Action]\n        RR[resolve_role_for_sender<br/>platform role ŌåÆ LibreFang role]\n        TD[resolve_user_tool_decision<br/>per-user tool gate]\n    end\n\n    subgraph Storage\n        DM[DashMap<br/>pending requests]\n        RC[Role Cache]\n        DB[(SQLite<br/>audit + TOTP lockout)]\n    end\n\n    AM --> BL\n    AM --> NB\n    AM --> EXP\n    AM --> DM\n    AM --> DB\n    AU --> ID\n    AU --> AZ\n    AU --> RR\n    AU --> TD\n    AU --> RC\n```\n\n---\n\n## `ApprovalManager` ŌĆö Execution Approval Gating\n\n### Purpose\n\nWhen an agent wants to run a dangerous tool, the kernel intercepts the call and creates an approval request. A human operator (via API, dashboard, or chat channel) must resolve the request before execution proceeds. This module manages the full lifecycle: submission, escalation, timeout, TOTP verification, and audit logging.\n\n### Construction\n\n```rust\n// In-memory only (no audit DB):\nlet mgr = ApprovalManager::new(policy);\n\n// With persistent audit log and TOTP lockout recovery:\nlet mgr = ApprovalManager::new_with_db(policy, sqlite_connection);\n```\n\n`new_with_db` restores TOTP lockout counters from the `totp_lockout` table on startup. Expired lockouts are discarded so a daemon restart does not extend a 5-minute lockout beyond its original window.\n\n### Policy Evaluation\n\nThree methods control whether a tool requires approval:\n\n| Method | When to use |\n|--------|------------|\n| `requires_approval(tool_name)` | Simple check against the `require_approval` list only |\n| `requires_approval_with_context(tool_name, sender_id, channel)` | Full check including trusted senders and channel rules |\n| `is_tool_denied_with_context(tool_name, sender_id, channel)` | Check if a channel rule hard-denies the tool |\n\nThe evaluation precedence in `requires_approval_with_context`:\n\n1. **Trusted sender bypass** ŌĆö if `sender_id` is in `trusted_senders`, returns `false` immediately.\n2. **Channel rule** ŌĆö if a `ChannelToolRule` explicitly allows or denies the tool for the given channel, that wins.\n3. **Default list** ŌĆö falls back to matching `tool_name` against `require_approval` patterns.\n\nWildcard patterns are supported in the `require_approval` list. `\"file_*\"` matches `\"file_read\"`, `\"file_write\"`, etc. `\"*\"` matches everything.\n\n### Two Execution Paths\n\n#### Blocking Path ŌĆö `request_approval`\n\nThe agent's async task awaits resolution:\n\n```rust\nlet decision = mgr.request_approval(req).await;\n```\n\nInternally:\n- A `tokio::sync::oneshot` channel is created and stored with the pending request.\n- The caller awaits with a timeout computed by `effective_timeout_secs`.\n- On timeout, the `TimeoutFallback` policy determines what happens next (see below).\n- On resolution via `resolve()`, the oneshot sender delivers the decision and the awaiting task unblocks.\n\n#### Deferred (Non-Blocking) Path ŌĆö `submit_request`\n\nUsed when the agent should continue processing other tool calls while waiting:\n\n```rust\nlet id = mgr.submit_request(req, deferred_execution)?;\n```\n\n- Returns the request UUID immediately.\n- Stores the `DeferredToolExecution` payload alongside the pending request.\n- On resolution, `resolve()` returns the deferred payload atomically with the `ApprovalResponse`.\n- A duplicate `tool_use_id` guard prevents the same tool call from being submitted twice.\n\n### Timeout and Escalation\n\nThe `TimeoutFallback` policy controls what happens when no human responds in time:\n\n| Policy | Behavior |\n|--------|----------|\n| `TimeoutFallback::Deny` | Resolves as `Denied` |\n| `TimeoutFallback::Skip` | Resolves as `Skipped` |\n| `TimeoutFallback::Escalate { extra_timeout_secs }` | Re-inserts with `escalation_count += 1` and a longer timeout. After `MAX_ESCALATIONS` (3), falls through to `TimedOut`. |\n\nThe effective timeout is `request.timeout_secs + (extra_timeout_secs ├Ś escalation_count)`, giving approvers progressively more time at each escalation level.\n\nThe kernel calls `expire_pending_requests()` periodically to sweep timed-out deferred requests. It returns escalated requests (still pending) and expired requests (with their `DeferredToolExecution` payloads) separately.\n\n### TOTP Second-Factor Authentication\n\nWhen `ApprovalPolicy.second_factor` is `Totp`, approved decisions require a verified TOTP code:\n\n1. `requires_totp()` checks the global policy.\n2. Per-tool opt-in via `totp_tools` ŌĆö if non-empty, only listed tools require TOTP; if empty, all tools do.\n3. `resolve()` enforces the gate: if TOTP is required and `totp_verified` is `false`, resolution is rejected with an error.\n4. `verify_totp_code(secret_base32, code)` validates against RFC 6238 (SHA-1, 6 digits, 30-second step, ┬▒1 window).\n\n**Grace period** ŌĆö after a successful TOTP verification, subsequent approvals from the same `user_id` within `totp_grace_period_secs` bypass the TOTP check. Controlled by `is_within_totp_grace` / `record_totp_grace`. A grace period of 0 means every approval requires TOTP.\n\n**Lockout** ŌĆö 5 consecutive TOTP failures (`TOTP_MAX_FAILURES`) trigger a 5-minute lockout (`TOTP_LOCKOUT_SECS`). During lockout, `is_totp_locked_out()` returns `true`. Lockout state is persisted to SQLite so it survives daemon restarts.\n\n**Recovery codes** ŌĆö `generate_recovery_codes()` produces 8 single-use codes in `DDDD-DDDD` format. `verify_recovery_code()` checks and consumes a code from a JSON-encoded list.\n\n### Session-Scoped Operations\n\nFor multi-request conversations (e.g., a chat session where several tools need approval):\n\n| Method | Purpose |\n|--------|---------|\n| `list_pending_for_session(session_id)` | All pending requests for a session |\n| `has_pending_for_session(session_id)` | Boolean check for blocking UI state |\n| `resolve_all_for_session(session_id, decision, decided_by)` | Resolve every pending request in a session atomically. TOTP-gated requests are skipped (not counted). |\n\nThese mirror the Hermes-Agent `resolve_gateway_approval(session_key, choice, resolve_all=True)` pattern.\n\n### Audit Logging\n\nEvery resolved request is recorded via `push_recent()`:\n\n1. An `ApprovalAuditEntry` is written to the `approval_audit` SQLite table (if `audit_db` is configured).\n2. An `ApprovalRecord` is pushed to an in-memory ring buffer (capped at `MAX_RECENT_APPROVALS = 100`).\n\nQuery methods:\n- `query_audit(limit, offset, agent_id, tool_name)` ŌĆö paginated SQL queries.\n- `audit_count(agent_id, tool_name)` ŌĆö total count with filters.\n- `list_recent(limit)` ŌĆö in-memory ring buffer, newest first.\n\n### Constants and Limits\n\n| Constant | Value | Purpose |\n|----------|-------|---------|\n| `MAX_PENDING_PER_AGENT` | 5 | Prevents a single agent from flooding the approval queue |\n| `MAX_RECENT_APPROVALS` | 100 | In-memory history ring buffer size |\n| `MAX_ESCALATIONS` | 3 | Maximum escalation rounds before `TimedOut` |\n| `TOTP_MAX_FAILURES` | 5 | Consecutive TOTP failures before lockout |\n| `TOTP_LOCKOUT_SECS` | 300 (5 min) | Lockout duration |\n\n### Policy Hot-Reload\n\n`update_policy(policy)` replaces the active `ApprovalPolicy` behind an `RwLock`. The policy is read once per operation and held as a snapshot to avoid races between the gate check and grace-period recording.\n\n### Risk Classification\n\n`classify_risk(tool_name)` is a static helper that maps tool names to `RiskLevel`:\n\n| Tool | Level |\n|------|-------|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n---\n\n## `AuthManager` ŌĆö RBAC Authentication and Authorization\n\n### Purpose\n\nMaps platform-specific identities (Telegram user ID, Discord user ID, etc.) to LibreFang `UserId` entities with hierarchical roles, then enforces permission checks on kernel actions.\n\n### User Roles\n\n```rust\npub enum UserRole {\n    Viewer = 0,  // Read-only\n    User   = 1,  // Can chat with agents\n    Admin  = 2,  // Can spawn/kill agents, install skills\n    Owner  = 3,  // Full access: user management, config changes\n}\n```\n\nRoles are ordered (`Ord`), so a simple `user_role >= required_role` check suffices for authorization.\n\nRole parsing:\n- `from_str_role(s)` ŌĆö lenient; unknown strings fall through to `User`. Used for `UserConfig.role` in `config.toml`.\n- `try_from_str_role(s)` ŌĆö strict; returns `None` for unknown strings. Used by channel-role-mapping translators so typos fail closed (ŌåÆ `Viewer`).\n\nThe string `\"guest\"` maps to `Viewer` (not `User`), which is a deliberate M4 behavior change.\n\n### Construction and Population\n\n```rust\nlet auth = AuthManager::new(&user_configs);\n// or with tool group awareness:\nlet auth = AuthManager::with_tool_groups(&user_configs, &tool_groups);\n```\n\n`populate()` iterates `UserConfig` entries and:\n1. Creates a `UserIdentity` with resolved `ResolvedUserPolicy` (per-user tool policy, channel tool rules, tool categories, memory access).\n2. Preserves raw `Option<...>` fields (`raw_tool_policy`, `raw_tool_categories`, `raw_memory_access`) for diagnostic snapshots.\n3. Builds a channel binding index: `\"channel_type:platform_id\"` ŌåÆ `UserId`.\n\nChannel bindings are strictly tuple-keyed (`\"telegram:12345\"`) ŌĆö there is no bare `platform_id` fallback. This prevents cross-channel attribution leaks where two users sharing the same platform ID on different channels would alias incorrectly.\n\n### Identification and Authorization\n\n```rust\n// Look up a user by channel identity:\nlet user_id: Option<UserId> = auth.identify(\"telegram\", \"12345678\");\n\n// Check if a user can perform an action:\nauth.authorize(user_id, &Action::SpawnAgent)?;\n```\n\n`Action` enum and their minimum required roles:\n\n| Action | Min Role |\n|--------|----------|\n| `ChatWithAgent`, `ViewConfig` | User |\n| `ViewUsage`, `SpawnAgent`, `KillAgent`, `InstallSkill` | Admin |\n| `ModifyConfig`, `ManageUsers` | Owner |\n\n### Channel-Derived Role Resolution\n\n`resolve_role_for_sender(sender, mapping, role_query).await` resolves a LibreFang role for a sender who may not have an explicit user binding:\n\n1. **Explicit `UserConfig.role`** ŌĆö if the sender matches a channel binding, that user's configured role wins. No platform API call is made.\n2. **Cached result** ŌĆö a `DashMap` keyed by `(channel, account_id, chat_id, user_id)` avoids redundant lookups.\n3. **Platform query** ŌĆö calls `ChannelRoleQuery::lookup_role()` on the platform adapter, then translates via `ChannelRoleMapping`.\n4. **Default-deny** ŌĆö `Viewer` if nothing matches.\n\nTransient platform errors (5xx, timeout) are **not cached** so the next call retries. Only definitive outcomes populate the cache.\n\n### Per-User Tool Policy\n\n`resolve_user_tool_decision(user_id, tool_name, channel, sender_role)` evaluates the four-layer intersection:\n\n1. Per-agent `ToolPolicy`\n2. Per-user `tool_policy` (allow/deny lists)\n3. Per-user `tool_categories` (group-based rules resolved against `ToolGroup` definitions)\n4. Per-channel `ChannelToolPolicy`\n\nReturns `UserToolDecision` indicating whether the tool is allowed, denied, or needs approval escalation.\n\n### Config Hot-Reload\n\n`reload(user_configs, tool_groups)` replaces the in-memory user and channel indexes atomically:\n\n1. Clears `users`, `channel_index`, and `role_cache`.\n2. Swaps the `tool_groups` snapshot.\n3. Re-populates from the new config.\n\nThis is called inside the `config_reload_lock` write guard to prevent torn reads. A poisoned `RwLock` panics intentionally ŌĆö silently keeping a stale snapshot would be worse than a visible restart.\n\n### Diagnostic Snapshot\n\n`effective_permissions(user_id)` returns an `EffectivePermissions` struct containing every raw RBAC input for a user (tool policy, categories, memory access, budget, channel rules, bindings). This powers the permission simulator UI without duplicating the gate-path logic.\n\n### Role Cache Invalidation\n\n`invalidate_role_cache()` drops all cached channel-derived roles. Called on session restart so stale platform roles don't persist across sessions.\n\n---\n\n## Integration Points\n\n| Kernel Component | Calls Into | Purpose |\n|-----------------|------------|---------|\n| `tool_runner` (librefang-runtime) | `ApprovalManager::requires_approval_with_context` | Gate tool execution before running |\n| `tool_runner` | `ApprovalManager::submit_request` | Submit deferred approval for async resolution |\n| API routes (`/api/approval/*`) | `ApprovalManager::resolve`, `list_pending`, `list_recent` | Human operator resolution |\n| API routes (`/api/system/totp_*`) | `ApprovalManager::verify_totp_code`, `generate_totp_secret`, `generate_recovery_codes` | TOTP enrollment and verification |\n| Config hot-reload | `AuthManager::reload`, `ApprovalManager::update_policy` | Live policy changes without restart |\n| Channel adapters | `AuthManager::resolve_role_for_sender` | Map platform users to LibreFang roles |\n| Agent loop | `AuthManager::resolve_user_tool_decision` | Per-user tool gating at inference time |\n| `mcp_oauth_provider` | Vault (via `vault_get`) | TOTP secret storage for second-factor flows |\n\n## SQLite Schema Requirements\n\nWhen using `new_with_db`, the connection must have these tables:\n\n```sql\n-- Approval audit log\nCREATE TABLE IF NOT EXISTS approval_audit (\n    id TEXT PRIMARY KEY,\n    request_id TEXT,\n    agent_id TEXT,\n    tool_name TEXT,\n    description TEXT,\n    action_summary TEXT,\n    risk_level TEXT,\n    decision TEXT,\n    decided_by TEXT,\n    decided_at TEXT,\n    requested_at TEXT,\n    feedback TEXT,\n    second_factor_used INTEGER DEFAULT 0\n);\n\n-- TOTP lockout persistence\nCREATE TABLE IF NOT EXISTS totp_lockout (\n    sender_id TEXT PRIMARY KEY,\n    failures INTEGER,\n    locked_at INTEGER\n);\n```","agent-kernel":"# Agent Kernel\n\n# Agent Kernel ŌĆö Module Overview\n\n## Purpose\n\nThe **Agent Kernel** is the core orchestration and safety layer of the LibreFang agent platform. It governs how user messages reach agents, how agent actions are authorized and approved, and how resource consumption is tracked and bounded.\n\n## Sub-modules\n\n| Sub-module | Responsibility |\n|---|---|\n| [Kernel Core](librefang-kernel-src.md) | Execution approval gating and RBAC authentication/authorization |\n| [Kernel Handle](librefang-kernel-handle-src.md) | Dependency inversion boundary ŌĆö the `KernelHandle` trait that breaks circular dependencies between runtime and kernel |\n| [Metering Engine](librefang-kernel-metering-src.md) | Per-call cost estimation, four-level budget enforcement (agent/provider/user/global), and usage persistence to SQLite |\n| [Router](librefang-kernel-router-src.md) | Message-to-agent dispatch ŌĆö selects the appropriate agent template or hand using keyword rules, manifest metadata, and optional semantic embeddings |\n\n## How They Fit Together\n\n```mermaid\nflowchart LR\n    MSG[\"User message\"] --> R[\"Router\"]\n    R --> AUTH[\"Kernel Core<br/>(Auth & Approval)\"]\n    AUTH --> KH[\"KernelHandle\"]\n    KH --> AGENT[\"Agent Loop\"]\n    AGENT -->|\"LLM call\"| M[\"Metering Engine\"]\n    AGENT -->|\"dangerous tool\"| AM[\"ApprovalManager\"]\n    M --> DB[(SQLite)]\n\n    subgraph \"Kernel Core\"\n        AUTH\n        AM\n    end\n```\n\nEvery user interaction and agent action flows through a layered pipeline:\n\n1. **Incoming message** ŌåÆ The [Router](librefang-kernel-router-src.md) evaluates the message against keyword rules, manifest metadata, and (when available) embedding similarity to select the best agent template or hand. It returns a selection result but does not spawn agents itself.\n\n2. **Authentication & authorization** ŌåÆ The [Kernel Core](librefang-kernel-src.md) maps the platform identity (Telegram, Discord, Slack) to a LibreFang user, resolves their hierarchical role, and checks per-user tool policies before any privileged action proceeds.\n\n3. **Cost gating** ŌåÆ Before an LLM call is dispatched, the [Metering Engine](librefang-kernel-metering-src.md) estimates cost and checks it against budgets at four independent levels. After the call, actual usage is recorded to SQLite for audit and analytics.\n\n4. **Execution approval** ŌåÆ Dangerous tool invocations (shell commands, file writes, etc.) are intercepted by the [Kernel Core's](librefang-kernel-src.md) `ApprovalManager`, which holds them until a human explicitly approves, denies, or a timeout policy decides.\n\n5. **Inter-agent operations** ŌåÆ Agent loops interact with the kernel exclusively through the [`KernelHandle`](librefang-kernel-handle-src.md) trait ŌĆö enabling spawn, send, kill, memory access, and task queue operations without importing the kernel crate directly. Test suites use lightweight stubs based on the trait's default implementations.\n\n## Key Cross-Module Workflows\n\n**Message handling**: Router selects agent ŌåÆ Core authenticates user ŌåÆ Metering pre-checks budget ŌåÆ Agent loop runs via `KernelHandle` ŌåÆ Dangerous tools hit `ApprovalManager` ŌåÆ Metering records final usage.\n\n**TOTP credential management** (spanning kernel and extensions): Routes like `totp_setup` and `totp_revoke` flow through the kernel's vault/OAuth provider into the extensions vault module for keyring resolution and machine fingerprinting, ultimately surfacing results in the UI wizard.\n\n## Design Principles\n\n- **Dependency inversion**: The `KernelHandle` trait ensures the runtime never depends directly on the kernel crate, eliminating circular imports.\n- **Layered safety**: RBAC, approval gating, and budget enforcement operate independently ŌĆö a failure in one layer does not bypass the others.\n- **Stateless routing**: The router maintains no inter-call state (only caches), keeping dispatch decisions pure and auditable.\n- **Observable costs**: Every LLM call is measured and persisted, with pricing sourced from a model catalog that falls back to sensible defaults.","agent-runtime":"# Agent Runtime\n\n# Agent Runtime\n\nThe agent runtime is the execution engine at the heart of LibreFang. It orchestrates the full lifecycle of an agent turn: receiving a user message, recalling memories, calling the LLM, executing tool calls, persisting state, and returning a response. Three subsystems compose the runtime:\n\n| Subsystem | File | Purpose |\n|---|---|---|\n| **Agent Loop** | `agent_loop.rs` | Core iterative LLM Ōåö tool execution cycle |\n| **Agent Context** | `agent_context.rs` | Per-turn loading of external `context.md` files |\n| **A2A Protocol** | `a2a.rs` | Cross-framework agent interoperability via Google's A2A spec |\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    User[\"User message\"] --> AL[\"Agent Loop\"]\n    AL -->|\"recall\"| MEM[\"Memory Substrate\"]\n    AL -->|\"completion request\"| LLM[\"LLM Driver\"]\n    LLM -->|\"tool_use\"| STAGED[\"StagedToolUseTurn\"]\n    STAGED -->|\"execute\"| TR[\"tool_runner\"]\n    TR -->|\"result\"| STAGED\n    STAGED -->|\"commit\"| SESSION[\"Session\"]\n    AL -->|\"save\"| MEM\n    AL -->|\"response\"| OUT[\"AgentLoopResult\"]\n\n    subgraph \"Per-turn context\"\n        AC[\"agent_context\"] -->|\"context.md\"| AL\n    end\n\n    subgraph \"A2A interoperability\"\n        A2A_CLIENT[\"A2aClient\"] -->|\"discover\"| EXT[\"External agents\"]\n        A2A_STORE[\"A2aTaskStore\"] -->|\"task tracking\"| A2A_CLIENT\n    end\n```\n\n---\n\n## Agent Loop\n\n### Core Loop Flow\n\nThe agent loop (`run_agent_loop` / `run_agent_loop_streaming`) is an iterative cycle bounded by `MAX_ITERATIONS` (default 100, configurable via manifest or operator override):\n\n1. **Prepare messages** ŌĆö load session history, inject system prompt with memory context, apply PII filtering and group-chat sender prefixes\n2. **Trim history** ŌĆö enforce `max_history_messages` cap at safe turn boundaries (never splitting ToolUse/ToolResult pairs)\n3. **Call LLM** ŌĆö acquire a global concurrency semaphore (cap: 5 simultaneous calls), send `CompletionRequest`\n4. **Handle response** based on stop reason:\n   - **`EndTurn`** ŌĆö return text to caller (unless it's a silent reply or progress-text leak)\n   - ****`ToolUse`** ŌĆö stage a `StagedToolUseTurn`, execute each tool, commit results atomically\n   - **`MaxTokens`** ŌĆö continue generation (up to `MAX_CONTINUATIONS = 5`)\n5. **Finalize** ŌĆö auto-memorize, save session, fire hooks, extract reply directives\n\n### Key Types\n\n#### `LoopOptions`\n\nNon-default invocations (forks, auto-dream, sub-agent calls) pass `LoopOptions` to modify behavior:\n\n| Field | Type | Effect |\n|---|---|---|\n| `is_fork` | `bool` | Derivative turn: skip session persistence, mark hooks `is_fork: true` |\n| `allowed_tools` | `Option<Vec<String>>` | Runtime tool allowlist enforced at execute time (not request schema) |\n| `interrupt` | `Option<SessionInterrupt>` | Per-session cancellation handle for long-running tools |\n| `max_iterations` | `Option<u32>` | Operator override for iteration cap |\n| `max_history_messages` | `Option<usize>` | Operator override for history trim cap (floored at 4) |\n| `aux_client` | `Option<Arc<AuxClient>>` | Cheap-tier LLM for side tasks (compression, title gen) |\n\nFork turns share the parent session prefix for Anthropic prompt cache alignment. Setting `is_fork` does not change the request body ŌĆö only post-response persistence.\n\n#### `AgentLoopResult`\n\nReturned from every loop invocation:\n\n```\nAgentLoopResult {\n    response: String,           // Final text response\n    total_usage: TokenUsage,    // Accumulated token counts\n    iterations: u32,            // Loop iterations consumed\n    silent: bool,               // Agent chose not to reply\n    directives: ReplyDirectives, // Reply-to, thread routing\n    decision_traces: Vec<DecisionTrace>,  // Tool call audit trail\n    memories_saved: Vec<String>,\n    memories_used: Vec<String>,\n    memory_conflicts: Vec<MemoryConflict>,\n    owner_notice: Option<String>,  // From notify_owner tool\n    new_messages_start: usize,     // Index for slicing turn messages\n    skill_evolution_suggested: bool,\n    experiment_context: Option<ExperimentContext>,\n    ...\n}\n```\n\n### StagedToolUseTurn ŌĆö Atomic Tool-Use Commits\n\nThe `StagedToolUseTurn` struct is the structural fix for issue #2381. Previously, the assistant's `tool_use` message was eagerly pushed to `session.messages` before tools executed. Any control-flow exit between push and finalization left orphan `tool_use_id`s that caused provider 400 errors.\n\n**Staged commits fix this**: the assistant message and all tool-result blocks are buffered locally. Only `commit()` writes to `session.messages` and the LLM working copy, atomically pushing both the assistant message and the user `{tool_results}` message together.\n\n```\nstage_tool_use_turn()     // creates buffer, no mutation\n  ŌåÆ append_result()       // per-tool, accumulates ContentBlock::ToolResult\n  ŌåÆ pad_missing_results() // fills stubs for interrupted tools\n  ŌåÆ commit()              // atomic push to session + working copy\n```\n\nIf a staged turn is dropped without commit (e.g., `?` propagation), `session.messages` is untouched.\n\n### Tool Execution\n\nEach tool call passes through these guards in `execute_single_tool_call`:\n\n1. **Loop guard** ŌĆö circuit breaker, block, or warn based on repetition detection\n2. **Fork allowlist** ŌĆö synthetic error for tools outside `LoopOptions::allowed_tools`\n3. **Before hook** ŌĆö `HookEvent::BeforeToolCall` can block execution\n4. **Timeout** ŌĆö per-tool timeout (default 600s), producing `ToolExecutionStatus::Expired`\n5. **Execution** ŌĆö dispatched via `tool_runner::execute_tool`\n6. **Transform hook** ŌĆö `HookEvent::TransformToolResult` can rewrite result content\n7. **Sanitization** ŌĆö strip injection markers, truncate to context budget\n\nAfter all tools in a turn execute, `finalize_tool_use_results` applies:\n- **Tool budget enforcement** ŌĆö aggregate per-turn output budget\n- **Guidance blocks** ŌĆö system messages appended for denied tools, parameter errors, and execution errors to steer LLM self-correction\n\n### Consecutive Failure Tracking\n\n`MAX_CONSECUTIVE_ALL_FAILED = 3` ŌĆö if every tool in a turn fails with hard errors (not soft errors like sandbox rejections or parameter mistakes) for 3 consecutive iterations, the loop aborts with `RepeatedToolFailures`. Soft errors are excluded so the LLM can self-correct.\n\n### History Management\n\n**Resolution order** for `max_history`:\n1. `manifest.max_history_messages`\n2. `opts.max_history_messages`\n3. `DEFAULT_MAX_HISTORY_MESSAGES` (40)\n\nValues are clamped up to `MIN_HISTORY_MESSAGES` (4) ŌĆö below this the safe-trim heuristic can't guarantee at least one full tool round-trip survives.\n\n`safe_trim_messages` trims both the LLM working copy and the persistent session store at turn boundaries. After trimming, `validate_and_repair` and `ensure_starts_with_user` guarantee structural validity. If fewer than 2 messages survive, a minimal user message is synthesized.\n\n### Context Window Protection\n\n- **Image stripping** ŌĆö `strip_processed_image_data` replaces base64 image blocks with text placeholders after the LLM processes them. `strip_prior_image_data` preserves only the last user message's images.\n- **Tool result truncation** ŌĆö `sanitize_tool_result_content` delegates to the context engine (plugin-customizable) or falls back to built-in head+tail truncation.\n- **Accumulated text buffer** ŌĆö capped at 64 KiB (`ACCUMULATED_TEXT_MAX_BYTES`) to prevent unbounded growth from intermediate text across many iterations.\n\n### A/B Experiments\n\nWhen a prompt experiment is active for an agent, `select_running_experiment` deterministically assigns a variant based on `session.id % 100` against cumulative traffic split weights. The selected variant's system prompt additions are injected, and `ExperimentContext` is returned in `AgentLoopResult` for tracking.\n\n### Lazy Tool Loading\n\nAgents with > 30 granted tools and `tool_load` available enter lazy mode: only native tools + session-loaded tools are shipped in the request schema. The LLM can discover and load additional tools on demand via `tool_load(name)`. This reduces prompt size for agents with the full ~75 builtin catalog.\n\n### Provider Prefix Stripping\n\n`strip_provider_prefix` normalizes model IDs for multi-provider routing:\n- Strips `provider/` or `provider:` prefixes\n- For providers requiring `org/model` format (OpenRouter, Together, Fireworks, Replicate, HuggingFace), bare names like `gemini-2.5-flash` are auto-qualified to `google/gemini-2.5-flash`\n\n---\n\n## Agent Context\n\nThe agent context loader provides per-turn refreshable context from `context.md` files updated by external tools (cron jobs, scripts).\n\n### File Resolution\n\n```\nresolve_context_path(workspace)\n  ŌåÆ workspace/.identity/context.md   (preferred, new layout)\n  ŌåÆ workspace/context.md              (legacy fallback)\n```\n\nThe first candidate that exists wins, even if empty ŌĆö so failures are attributed to the canonical location.\n\n### Loading Behavior\n\n`load_context_md(workspace, cache_context)`:\n\n- **`cache_context = false`** (default): re-reads from disk every turn. If the read fails after a previous success, falls back to cached content with a warning. If the file is deleted, returns `None`.\n- **`cache_context = true`**: returns the first successful read for the lifetime of the process, freezing the agent's view of the file.\n\n### Security\n\n- **Symlink rejection** ŌĆö `symlink_metadata` is used instead of `metadata`; symlinks are explicitly refused to prevent an attacker from pointing `.identity/context.md` at sensitive files and having their contents injected into the LLM prompt.\n- **Size cap** ŌĆö reads are capped at 32 KiB (`MAX_CONTEXT_BYTES`) to prevent prompt size blowup.\n- **UTF-8 validation** ŌĆö reads are capped at `MAX_CONTEXT_BYTES + 4` bytes, then trimmed to the last valid UTF-8 boundary. Files with zero valid UTF-8 prefix are treated as I/O errors to trigger cache fallback rather than serving empty content.\n\n---\n\n## A2A Protocol\n\nImplements Google's Agent-to-Agent protocol for cross-framework interoperability via Agent Cards and Task-based coordination.\n\n### Agent Card\n\n`AgentCard` is the JSON capability manifest served at `/.well-known/agent.json`:\n\n```\nAgentCard {\n    name, description, url, version,\n    capabilities: AgentCapabilities { streaming, push_notifications, state_transition_history },\n    skills: Vec<AgentSkill>,\n    default_input_modes, default_output_modes,\n}\n```\n\n`build_agent_card(manifest, base_url)` converts a LibreFang `AgentManifest` into an `AgentCard`, mapping tool names to A2A skill descriptors.\n\n### Task Model\n\n`A2aTask` represents a unit of work:\n\n```\nA2aTask {\n    id: String,\n    session_id: Option<String>,\n    status: A2aTaskStatusWrapper,\n    messages: Vec<A2aMessage>,\n    artifacts: Vec<A2aArtifact>,\n}\n```\n\nTask statuses: `Submitted ŌåÆ Working ŌåÆ Completed | Failed | Cancelled | InputRequired`\n\n`A2aTaskStatusWrapper` handles both encoding forms in the wild ŌĆö bare string (`\"completed\"`) and object (`{\"state\": \"completed\", \"message\": ...}`) ŌĆö via `#[serde(untagged)]`.\n\nMessages use `A2aPart` content parts (tagged enum): `Text`, `File` (base64), or `Data` (structured JSON).\n\n### Task Store\n\n`A2aTaskStore` is an in-memory bounded store tracking task lifecycle:\n\n- **Capacity**: configurable `max_tasks` (default 1000)\n- **TTL**: default 24 hours; expired tasks are swept lazily on every insert\n- **Eviction policy** (applied when at capacity after TTL sweep):\n  1. Oldest terminal-state task (Completed/Failed/Cancelled)\n  2. Fallback: oldest task overall\n\nKey operations:\n- `insert(task)` ŌĆö sweep + evict + store\n- `get(task_id)` ŌåÆ `Option<A2aTask>`\n- `update_status(task_id, status)` ŌĆö returns `false` if not found\n- `complete(task_id, response, artifacts)` ŌĆö append message, set Completed\n- `fail(task_id, error_message)` ŌĆö append message, set Failed\n- `cancel(task_id)` ŌĆö delegate to `update_status(Cancelled)`\n\n### A2A Client\n\n`A2aClient` discovers and interacts with external A2A agents:\n\n| Method | Protocol | Description |\n|---|---|---|\n| `discover(url)` | `GET /.well-known/agent.json` | Fetch and parse an Agent Card |\n| `send_task(url, message, session_id)` | JSON-RPC `tasks/send` | Create a new task with a user message |\n| `get_task(url, task_id)` | JSON-RPC `tasks/get` | Poll task status |\n\n`discover_external_agents` is called during kernel boot to populate the list of known external agents from configuration. Failed discoveries log warnings but don't prevent boot.\n\n### Configuration\n\nA2A is configured via `A2aConfig` in the kernel config:\n\n```\nA2aConfig {\n    enabled: bool,\n    name: String,\n    description: String,\n    listen_path: String,         // e.g. \"/a2a\"\n    external_agents: Vec<ExternalAgent { name, url }>,\n}\n```\n\n---\n\n## Error Handling Patterns\n\nThe runtime uses several layered defenses:\n\n- **Loop guard** ŌĆö circuit breaker after repeated identical tool calls; block for dangerous patterns; warn for borderline cases\n- **Context overflow recovery** ŌĆö `recover_from_overflow` applies staged message pruning when the LLM returns a context-length error\n- **Retry with backoff** ŌĆö rate-limited and overloaded API calls retry up to `MAX_RETRIES = 3` with exponential backoff (base 1s)\n- **Provider cooldown** ŌĆö `ProviderCooldown` tracks per-provider failure rates and temporarily blacklists degraded providers\n- **Safe error classification** ŌĆö `is_soft_error_content` distinguishes recoverable errors (sandbox rejections, parameter mistakes) from hard failures, preventing premature loop abort\n\n## Hooks Integration\n\nThe agent loop fires hooks at these points via `HookRegistry`:\n\n| Hook Event | Timing | Can Block? |\n|---|---|---|\n| `BeforeToolCall` | Before tool execution | Yes ŌĆö returns error reason |\n| `AfterToolCall` | After tool execution | No (best-effort) |\n| `TransformToolResult` | After tool, before LLM sees result | Transforms content |\n| `AgentLoopEnd` | After loop completes | No (best-effort) |\n\nHook failures in critical paths (tool execution) produce warn logs but don't abort the loop. Hook failures in best-effort paths (post-loop save) are silently absorbed.","api-server":"# API Server\n\n# Channel Bridge (`channel_bridge.rs`)\n\nThe channel bridge is the wiring layer that connects the LibreFang kernel to messaging platform adapters. It implements the `ChannelBridgeHandle` trait on `LibreFangKernel`, translates kernel streaming events into plain-text channel output, sanitizes errors for end users, and provides the `start_channel_bridge()` entry point that the daemon calls at startup.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Daemon[\"Daemon startup\"] --> SCB[\"start_channel_bridge()\"]\n    SCB --> KBA[\"KernelBridgeAdapter\"]\n    KBA -->|implements| CBH[\"ChannelBridgeHandle trait\"]\n    SCB -->|creates| BM[\"BridgeManager\"]\n    SCB -->|returns| WR[\"axum::Router (webhook routes)\"]\n    BM -->|drives| Adapters[\"Channel Adapters<br/>(Telegram, Discord, Slack, ŌĆ”)\"]\n    Adapters -->|via CBH| KBA\n    KBA -->|delegates to| Kernel[\"LibreFangKernel\"]\n    Kernel -->|returns| Events[\"mpsc::Receiver&lt;StreamEvent&gt;\"]\n    Events --> STB[\"start_stream_text_bridge_with_status()\"]\n    STB --> TextRx[\"mpsc::Receiver&lt;String&gt;\"]\n```\n\n## Key Components\n\n### `KernelBridgeAdapter`\n\nA struct wrapping `Arc<LibreFangKernel>` that implements the `ChannelBridgeHandle` trait from `librefang_channels::bridge`. Every channel adapter calls methods on this handle to send messages, list agents, manage sessions, and execute administrative commands.\n\nIt records `started_at: Instant` for uptime reporting and delegates all real work to the kernel.\n\n### `start_channel_bridge()`\n\n```rust\npub async fn start_channel_bridge(\n    kernel: Arc<LibreFangKernel>,\n) -> (Option<BridgeManager>, axum::Router)\n```\n\nCalled by the daemon at startup. Reads `ChannelsConfig` from the kernel, instantiates feature-gated adapters (see [Feature-gated adapters](#feature-gated-adapters)), collects them with their `default_agent` and `account_id`, and passes them to `BridgeManager`.\n\nReturns a tuple of:\n- `Option<BridgeManager>` ŌĆö `None` if no channels are configured\n- `axum::Router` ŌĆö webhook routes for adapters that receive messages via HTTP callbacks (Feishu, Teams, DingTalk, etc.)\n\nThe companion `start_channel_bridge_with_config()` accepts an explicit `ChannelsConfig` and is used for hot-reload scenarios.\n\n### Streaming Text Bridge\n\nTwo functions convert kernel `StreamEvent` streams into plain `mpsc::Receiver<String>`:\n\n| Function | Returns | Use case |\n|---|---|---|\n| `start_stream_text_bridge` | `Receiver<String>` only | Simple streaming |\n| `start_stream_text_bridge_with_status` | `Receiver<String>` + `oneshot::Receiver<Result<(), String>>` | Lifecycle-aware adapters that need to know the kernel's terminal status |\n\n#### Event processing logic\n\nThe bridge spawns two tasks:\n\n1. **Bridge task** ŌĆö consumes `StreamEvent` values from the kernel and emits text:\n   - `TextDelta` ŌåÆ buffers text per iteration\n   - `ContentComplete` ŌåÆ flushes buffered text, clearing iteration state\n   - `ToolUseStart` ŌåÆ emits a `­¤ö¦ Pretty Tool Name` progress line (if `show_progress` is enabled)\n   - `ToolExecutionResult` (errors only) ŌåÆ emits `ŌÜĀ’ĖÅ Pretty Tool Name failed`\n   - `PhaseChange` with `context_warning` ŌåÆ emits `ŌÜĀ’ĖÅ <detail>`\n\n2. **Status task** ŌĆö awaits the kernel `JoinHandle`, then:\n   - On panic or error: sends a sanitized error message through the text channel, then reports `Err` on the status oneshot\n   - On timeout with partial output: appends an incomplete-output marker but reports `Ok` (soft success to preserve pre-V2 UX)\n   - On success: reports `Ok`\n\n#### Content filtering\n\nThree kinds of content are suppressed before reaching the channel:\n\n| Filter | What it catches | Mechanism |\n|---|---|---|\n| Tool-use-adjacent text | Text emitted alongside `ToolUseStart` | `saw_tool_use` flag set on `ToolUseStart`, checked at `ContentComplete` |\n| Leaked tool calls | Raw JSON/XML tool syntax providers emit as text | `looks_like_tool_call()` checks multiple patterns |\n| Silent responses | `NO_REPLY` / `[[silent]]` markers | `is_silent_response()` check |\n\nThe `looks_like_tool_call()` function detects tool calls in several formats: JSON arrays, `functions.` prefixes, `<function=ŌĆ”>` tags, `[TOOL_CALL]` markers, ═Ę/ÕüćĶŻģ symbols, markdown code blocks containing tool JSON, and backtick-wrapped tool calls.\n\n#### Deduplication\n\nWithin a single iteration, repeated calls to the same tool collapse into one `­¤ö¦` progress line. The `iter_tools_seen` `HashSet` is cleared at each `ContentComplete` so tools retried across iteration boundaries still get visible progress lines.\n\n### Error Sanitization\n\n`sanitize_channel_error()` maps raw error strings to user-friendly messages before they reach messaging platforms:\n\n| Error pattern | User message |\n|---|---|\n| Timeout / inactivity | \"The task timed out due to inactivity. Try breaking it into smaller steps.\" |\n| Rate limit / 429 / quota | \"I've hit my usage limit and need to rest. I'll be back soon!\" |\n| Auth / 401 | \"I'm having trouble with my credentials. Please let the admin know.\" |\n| Driver crash / exit code | \"Sorry, something went wrong on my end. Please try again in a moment.\" |\n| Other | \"Something went wrong: please try again. (ref: ŌĆ”)\" |\n\nIn group chats, all errors are suppressed entirely (no message sent). In DMs, rate-limit messages with reset times are passed through with minimal cleanup.\n\n### Reply Intent Classification\n\n`classify_reply_intent()` uses a one-shot LLM call to decide whether a group-chat message is directed at the bot. It constructs a classifier prompt with the sender name, message text, bot name, and aliases, then asks the model to output `REPLY` or `NO_REPLY`. It fails open (returns `true`) on any error.\n\nInputs are truncated and sanitized to reduce injection surface: backticks become quotes, brackets become parentheses, newlines become spaces.\n\n### Channel Overrides\n\n`channel_overrides()` looks up per-channel configuration from `ChannelsConfig`, matching by `channel_type` and optional `account_id`. It merges routing aliases from the default agent's manifest into `group_trigger_patterns` so aliases trigger the bot in group chats without formal @mentions.\n\n`agent_channel_overrides()` reads overrides directly from an agent manifest's `channel_overrides` field.\n\n### Feature-gated Adapters\n\nEach channel adapter is behind a Cargo feature flag. When a channel is configured in `ChannelsConfig` but the corresponding feature is disabled, a warning is logged at startup and the adapter is skipped.\n\n| Wave | Channels |\n|---|---|\n| Core | Telegram, Discord, Slack, WhatsApp, Signal, Matrix, Email, Teams, Mattermost, IRC, Google Chat, Twitch, Rocket.Chat, Zulip, XMPP |\n| Wave 3 | LINE, Viber, Messenger, Reddit, Mastodon, Bluesky, Feishu, Revolt |\n| Wave 4 | Nextcloud, Guilded, Keybase, Threema, Nostr, Webex, Pumble, Flock, Twist |\n| Wave 5 | DingTalk, QQ, Discourse, Gitter, ntfy, Gotify, Webhook, Voice, LinkedIn, WeChat, WeCom, Mumble |\n\nMultiple accounts per channel are supported (each config entry in the vec gets its own adapter instance with a distinct `account_id`).\n\n## Administrative Commands\n\n`KernelBridgeAdapter` implements text-based administrative commands that channel adapters expose as `/` commands:\n\n### Agent Management\n\n- **`send_message` / `send_message_with_sender`** ŌĆö synchronous message to an agent, returns response text or empty string for silent replies\n- **`send_message_streaming` / `send_message_streaming_with_sender`** ŌĆö streaming variant, returns `Receiver<String>`\n- **`send_message_streaming_with_sender_status`** ŌĆö streaming with terminal status for lifecycle-aware adapters\n- **`send_message_with_blocks` / `send_message_with_blocks_and_sender`** ŌĆö handles multimodal content blocks (images, etc.); extracts text for memory/logging, falls back to `\"[Image]\"` when no text is present\n- **`send_message_ephemeral`** ŌĆö sends without persisting to conversation history\n- **`find_agent_by_name`** / **`list_agents`** ŌĆö agent discovery (excludes hand agents)\n- **`spawn_agent_by_name`** ŌĆö reads `agent.toml` from `~/.librefang/workspaces/agents/{name}/`, parses the manifest, and spawns a new agent\n- **`reset_session` / `reboot_session` / `compact_session`** ŌĆö session lifecycle management\n- **`set_model`** ŌĆö switch an agent's model at runtime\n- **`stop_run`** ŌĆö cancel an in-progress agent run\n- **`session_usage`** ŌĆö report token usage and estimated cost for the current session\n- **`set_thinking`** ŌĆö toggle extended thinking (future-ready, stores preference)\n\n### Automation\n\n- **`list_workflows_text` / `run_workflow_text`** ŌĆö list and execute named workflows\n- **`list_triggers_text` / `create_trigger_text` / `delete_trigger_text`** ŌĆö manage event triggers (lifecycle, system, memory, content match patterns)\n- **`list_schedules_text` / `manage_schedule_text`** ŌĆö manage cron jobs (add, delete, manual run); supports `Cron`, `Every`, and `At` schedule types\n- **`list_approvals_text` / `resolve_approval_text`** ŌĆö manage pending tool approval requests, with TOTP verification for high-risk tools\n\n### System Information\n\n- **`uptime_info`** ŌĆö human-readable uptime and agent count\n- **`list_models_text` / `list_providers_text` / `list_models_by_provider`** ŌĆö model catalog queries grouped by provider with cost info\n- **`list_skills_text`** ŌĆö installed skills with runtime type and tool count\n- **`list_hands_text`** ŌĆö available hands with requirement status\n- **`budget_text`** ŌĆö hourly/daily/monthly spend vs limits\n- **`peers_text`** ŌĆö OFP peer network status\n- **`a2a_agents_text`** ŌĆö discovered external A2A agents\n\n### Security & Delivery\n\n- **`authorize_channel_user`** ŌĆö RBAC check against `AuthManager` (no-op when RBAC is disabled)\n- **`record_delivery`** ŌĆö tracks delivery success/failure in the `DeliveryTracker` and persists `last_channel` for cron delivery\n- **`check_auto_reply`** ŌĆö checks if an auto-reply rule fires for a message\n- **`subscribe_events`** ŌĆö subscribes to the kernel event bus for real-time event streaming\n- **`send_channel_push`** ŌĆö outbound push to a specific channel recipient (used by cron delivery)\n- **`channels_download_dir` / `channels_download_max_bytes`** ŌĆö file download configuration for channel media\n\n## Utility Functions\n\n### `prettify_tool_name(name: &str) -> String`\n\nConverts `snake_case`, `kebab-case`, or `dotted` tool IDs into display names. Words with existing uppercase after the first character preserve their casing (e.g., `MCP_call` ŌåÆ \"MCP Call\").\n\n### `tr_progress_failed(language: &str) -> &'static str`\n\nReturns a localized \"failed\" suffix for tool-failure progress lines. Supported: zh-CN, es, ja, de, fr. Falls back to English.\n\n### `parse_trigger_pattern(s: &str) -> Option<TriggerPattern>`\n\nParses user-facing pattern strings like `\"spawned:my_agent\"`, `\"system:keyword\"`, `\"memory:key_pattern\"`, `\"match:substring\"`, or bare keywords (`lifecycle`, `terminated`, `system`, `memory`, `all`).\n\n### `read_token(env_var: &str, adapter_name: &str) -> Option<String>`\n\nReads a bot token from an environment variable. Returns `None` with a warning log if the variable is missing or empty.\n\n## Adding a New Channel Adapter\n\n1. Implement `ChannelAdapter` in `librefang-channels`\n2. Add a `channel-<name>` feature flag to `Cargo.toml`\n3. Add the config struct to `ChannelsConfig` in `librefang-types`\n4. Add a `check_channel!` macro call and an adapter instantiation block in `start_channel_bridge_with_config()`\n5. Add the channel type string to the `channel_overrides()` match block\n6. Add any webhook routes to the returned `axum::Router`","channel-integrations":"# Channel Integrations\n\n# Channel Integrations (`librefang-channels`)\n\n## Purpose\n\nThe Channel Integrations module connects external messaging platforms to LibreFang's agent system. It provides a uniform adapter abstraction over heterogeneous chat protocols (Telegram, Discord, Slack, WhatsApp, Bluesky, XMPP, WeChat, and more), handles message routing, debouncing, rate limiting, input sanitization, group-message gating, and lifecycle reactions ŌĆö all mediated through a bridge layer that decouples channel logic from the kernel.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"External Platforms\"\n        T[Telegram]\n        D[Discord]\n        W[WhatsApp]\n        BS[Bluesky]\n        WH[Webhook]\n        O[\"... 15+ more\"]\n    end\n\n    subgraph \"librefang-channels\"\n        CA[\"ChannelAdapter trait\"]\n        BM[BridgeManager]\n        AR[AgentRouter]\n        DB[MessageDebouncer]\n        RL[ChannelRateLimiter]\n        IS[InputSanitizer]\n        JRN[MessageJournal]\n    end\n\n    subgraph \"Kernel (librefang-api)\"\n        CBH[\"ChannelBridgeHandle impl\"]\n        AG[Agent Runtime]\n    end\n\n    T & D & W & BS & WH & O -->|implement| CA\n    CA -->|message streams| BM\n    BM -->|route via| AR\n    BM -->|sanitize via| IS\n    BM -->|throttle via| RL\n    BM -->|debounce via| DB\n    BM -->|persist via| JRN\n    BM <-->|dispatch & reply| CBH\n    CBH --> AG\n```\n\n## Core Types\n\nAll adapters exchange data through shared types defined in `types.rs`:\n\n| Type | Role |\n|---|---|\n| `ChannelType` | Enum of supported platforms (`Telegram`, `Discord`, `Custom(String)`, etc.) |\n| `ChannelMessage` | Unified inbound envelope ŌĆö sender, content, metadata, timestamps |\n| `ChannelContent` | Discriminated union: `Text`, `Command`, `Image`, `Voice`, `Video`, `FileData`, `Interactive`, `ButtonCallback`, `MediaGroup`, and more |\n| `ChannelUser` | Sender identity: `platform_id`, `display_name`, optional `librefang_user` |\n| `SenderContext` | Full routing context sent to the kernel: channel, user/chat IDs, group flag, mention status, auto-route config, participant roster |\n| `ChannelAdapter` | The trait every adapter implements (see below) |\n| `InteractiveButton` | Inline button with `label`, `action`, optional `url` and `style` |\n| `LifecycleReaction` | Emoji reaction tied to an `AgentPhase` (Thinking, Done, Error) |\n\n`split_message(text, max_len)` is used by adapters whose platforms impose character limits (e.g., Bluesky's 300-grapheme cap). It splits on grapheme boundaries to avoid breaking Unicode.\n\n## The `ChannelAdapter` Trait\n\nEvery platform adapter implements `ChannelAdapter` (from `types.rs`, uses `async_trait`):\n\n```rust\n#[async_trait]\npub trait ChannelAdapter: Send + Sync {\n    fn name(&self) -> &str;\n    fn channel_type(&self) -> ChannelType;\n    async fn start(&self) -> Result<Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>, Error>;\n    async fn send(&self, user: &ChannelUser, content: ChannelContent) -> Result<(), Error>;\n    async fn send_typing(&self, user: &ChannelUser) -> Result<(), Error>;\n    async fn stop(&self) -> Result<(), Error>;\n    // Optional defaults provided:\n    // send_in_thread, send_reaction, suppress_error_responses,\n    // typing_events, create_webhook_routes\n}\n```\n\n**Inbound flow**: `start()` returns a `Stream<Item = ChannelMessage>`. The bridge polls this stream and dispatches each message to an agent.\n\n**Outbound flow**: `send()` delivers a `ChannelContent` to a specific user. For platforms without threading support, `send_in_thread` falls back to `send` by default.\n\n**Webhook adapters**: `create_webhook_routes()` optionally returns `(axum::Router, Stream)` ŌĆö the router is mounted at `/channels/{name}/webhook` on the main API server, and the stream provides parsed messages.\n\n## `BridgeManager`\n\nThe `BridgeManager` owns all running adapters and orchestrates the dispatch pipeline.\n\n### Construction\n\n```rust\nlet manager = BridgeManager::new(kernel_handle, agent_router)\n    .with_sanitizer(&sanitize_config)\n    .with_journal(journal);\n```\n\n### Starting an Adapter\n\n`start_adapter()` performs these steps:\n\n1. **Webhook route collection** ŌĆö if the adapter provides routes via `create_webhook_routes()`, they're collected for later mounting; otherwise `start()` is called to initiate polling/WebSocket.\n2. **Channel overrides lookup** ŌĆö fetches `ChannelOverrides` from the kernel to determine debounce settings, rate limits, and group policy.\n3. **Stream consumption** ŌĆö spawns a tokio task that reads from the adapter's message stream in a `select!` loop alongside a shutdown signal.\n4. **Dispatch** ŌĆö each message is spawned as a concurrent task (bounded by a semaphore of 32 permits) so that slow LLM calls don't block subsequent messages.\n\n### Debounce Path\n\nWhen `message_debounce_ms > 0` in channel overrides, messages from the same sender are buffered and coalesced. The `MessageDebouncer`:\n\n- Buffers messages keyed by `{channel_type}:{sender_platform_id}`.\n- Flushes on: debounce timer expiry, max-wait timer (`debounce_max_ms`), buffer-full (`debounce_max_buffer`), or typing-stop events.\n- Merges multiple `Text` messages by joining with newlines; merges same-name `Command` messages by concatenating args.\n\n### Shutdown\n\n`stop()` signals shutdown via a `watch` channel, calls `adapter.stop()` on each adapter (to release ports/connections), and joins all tasks.\n\n## `ChannelBridgeHandle` ŌĆö Kernel Interface\n\nDefined in `bridge.rs`, implemented on the actual kernel in `librefang-api`. This trait inverts the dependency so `librefang-channels` never imports the kernel:\n\n| Method Group | Key Methods | Purpose |\n|---|---|---|\n| **Core messaging** | `send_message`, `send_message_with_sender`, `send_message_with_blocks_and_sender` | Route text/blocks + sender context to an agent |\n| **Streaming** | `send_message_streaming_with_sender_status` | Returns `(Receiver<String>, OneShotReceiver<Result>)` for progressive display |\n| **Agent management** | `find_agent_by_name`, `list_agents`, `spawn_agent_by_name` | Lookup and create agents |\n| **Session control** | `reset_session`, `reboot_session`, `compact_session`, `set_model`, `stop_run` | Per-agent lifecycle |\n| **Authorization** | `authorize_channel_user` | RBAC check (default: allow all) |\n| **Overrides** | `channel_overrides`, `agent_channel_overrides` | Fetch per-channel and per-agent config |\n| **Group intelligence** | `classify_reply_intent` | Lightweight LLM check: should the bot reply to this group message? |\n| **Automation** | `run_workflow_text`, `create_trigger_text`, `manage_schedule_text`, `resolve_approval_text` | Workflow/trigger/cron/approval operations |\n| **Push** | `send_channel_push` | Proactive outbound delivery (REST API ŌåÆ channel) |\n| **Events** | `subscribe_events` | Broadcast receiver for kernel events (approval requests, etc.) |\n\nAll methods hav
