ion.\n\n## Error Handling\n\nAll errors are derived through `thiserror`, providing:\n\n- **Parse errors** — Malformed source files (invalid JSON, bad YAML indentation, etc.)\n- **Conversion errors** — Semantically valid source configs that don't map cleanly to LibreFang concepts.\n- **I/O errors** — Filesystem issues during discovery or output.\n\nCallers should expect `Result<T, MigrationError>` (or similar) as the standard return type from migration entry points. Inspect the error variants to determine whether a failure is recoverable (skip and continue) or fatal.\n\n## Logging\n\nThe module uses `tracing` spans and events rather than `println` or `log`. To capture migration output, initialize a `tracing` subscriber in the calling binary or test. Key events include:\n\n- Files discovered and skipped\n- Per-file parse success or failure\n- Field-level conversion warnings (e.g., dropped unsupported fields)\n\n## Testing\n\nTests use `tempfile` to create isolated directory trees that mimic source framework layouts. This avoids depending on real agent installations and keeps tests hermetic across platforms.\n\n## Relationship to the Rest of LibreFang\n\n`librefang-migrate` is a standalone utility crate. It depends on `librefang-types` for its output shapes but does not depend on the runtime agent, server, or protocol crates. Other modules do not call into it; it is invoked directly (likely from a CLI binary or a one-shot migration script) and produces static configuration that the rest of the system consumes.","other-librefang-runtime-mcp-tests":"# Other — librefang-runtime-mcp-tests\n\n# HttpCompat Integration Tests (`librefang-runtime-mcp-tests`)\n\n## Purpose\n\nThis module contains integration tests for the `HttpCompat` MCP transport layer. `HttpCompat` is the simplest transport in the MCP stack—it maps declared tool calls directly onto plain HTTP/JSON requests against a user-supplied base URL, with no MCP `initialize` handshake. This makes it the ideal candidate for end-to-end testing without requiring a full MCP-protocol-speaking peer.\n\nThe tests spin up a real `wiremock` HTTP server to validate the full lifecycle: connection setup, tool registration, path-template rendering, argument forwarding, and error handling.\n\n## What Is Being Tested\n\nThe tests exercise the following contract guarantees that the rest of the system (agent loop, dashboard, tool dispatch) depends on:\n\n1. **Namespaced tool registration** — tools declared in `HttpCompatToolConfig` are registered under the `mcp_<server>_<tool>` naming convention during `connect`.\n2. **Path-template interpolation and argument consumption** — path parameters like `{city}` are interpolated into the URL and removed from the remaining arguments, which are then forwarded as query parameters (or JSON body, depending on `request_mode`).\n3. **Unknown tool rejection** — calling a tool name that was never registered returns a descriptive error rather than silently issuing a malformed request.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    TC[Test Code] -->|builds config| MCC[McpConnection::connect]\n    MCC -->|HTTP GET /| WS[wiremock Server]\n    MCC -->|registers tool| TL[conn.tools]\n    CT[conn.call_tool] -->|HTTP GET /weather/Paris?units=metric| WS\n    CT -->|returns body| RESP[JSON Response]\n    WS -->|x-test-token header| H[Header Validation]\n```\n\n## Helper Functions\n\n### `http_compat_config`\n\n```rust\nfn http_compat_config(base_url: String, tools: Vec<HttpCompatToolConfig>) -> McpServerConfig\n```\n\nConstructs a complete `McpServerConfig` wired to the `HttpCompat` transport. Every test uses this to ensure consistent configuration. Key defaults:\n\n- **Server name**: `\"test-server\"` (used to produce the `mcp_test-server_<tool>` namespace prefix).\n- **Headers**: injects `x-test-token: integration-fixture` on every request, allowing wiremock matchers to verify header propagation.\n- **Timeout**: 5 seconds.\n- **Taint scanning**: disabled via `empty_taint_rule_sets_handle()`.\n- **OAuth**: none.\n\n### `weather_tool`\n\n```rust\nfn weather_tool() -> HttpCompatToolConfig\n```\n\nReturns a sample tool configuration for a weather lookup endpoint. This is the fixture used across all tests.\n\n| Field | Value |\n|---|---|\n| `name` | `\"get_weather\"` |\n| `path` | `\"/weather/{city}\"` |\n| `method` | `HttpCompatMethod::Get` |\n| `request_mode` | `HttpCompatRequestMode::Query` |\n| `response_mode` | `HttpCompatResponseMode::Json` |\n\nThe `{city}` placeholder in `path` is the key detail: the HttpCompat driver must interpolate it from call arguments and consume that key before forwarding remaining args as query parameters.\n\n## Test Cases\n\n### `http_compat_connect_registers_namespaced_tools`\n\n**Verifies**: `McpConnection::connect` succeeds and the declared tools appear under their namespaced names.\n\nThe test expects exactly one tool named `mcp_test-server_get_weather` (produced by `format_mcp_tool_name(\"test-server\", \"get_weather\")`) in the connection's tool list. It also confirms `conn.name()` returns `\"test-server\"`.\n\n> A regression here would break tool dispatch end-to-end because downstream consumers key off the prefixed form.\n\n### `http_compat_call_tool_renders_path_and_returns_body`\n\n**Verifies**: `call_tool` performs a real HTTP request with correct path interpolation, argument forwarding, and header injection.\n\nThe wiremock mock expects:\n\n- **Method**: `GET`\n- **Path**: `/weather/Paris` (the `{city}` placeholder resolved from the call arguments)\n- **Query param**: `units=metric` (remaining argument after `city` was consumed by the path)\n- **Header**: `x-test-token: integration-fixture`\n\nThe mock responds with `{\"city\": \"Paris\", \"tempC\": 18}`. The test asserts the response string round-trips the city and temperature values.\n\n### `http_compat_call_tool_unknown_name_errors`\n\n**Verifies**: Calling a tool that was never registered fails with a descriptive error.\n\nThe test calls `\"mcp_test-server_does_not_exist\"` and expects the error message to contain `\"not found\"`, `\"unknown\"`, or `\"does not exist\"`. This ensures the transport layer does not silently issue requests for undeclared tools.\n\n## Relationship to the Codebase\n\nThese tests sit at the boundary between configuration types and the runtime MCP connection layer:\n\n- **`librefang_types::config`** — provides `HttpCompatToolConfig`, `HttpCompatMethod`, `HttpCompatRequestMode`, `HttpCompatResponseMode`, and `HttpCompatHeaderConfig`.\n- **`librefang_runtime_mcp`** — provides `McpConnection`, `McpServerConfig`, `McpTransport`, `format_mcp_tool_name`, and `empty_taint_rule_sets_handle`.\n- **`wiremock`** — external HTTP mock server, used as the stand-in backend.\n\n## Running the Tests\n\n```bash\n# From the workspace root\ncargo test -p librefang-runtime-mcp --test http_compat_integration\n\n# Or run all integration tests in the crate\ncargo test -p librefang-runtime-mcp\n```\n\nAll three tests are async (`#[tokio::test]`) and require no external services—they are fully self-contained via `wiremock::MockServer::start().await`.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This module provides the client-side implementation for connecting to external MCP servers, enabling tool discovery and invocation through the standardized MCP protocol.\n\n## Overview\n\nThe Model Context Protocol allows an application to interact with external tool servers that expose capabilities such as function calling, resource access, and prompt templates. This crate acts as the client half — it establishes connections to MCP servers, negotiates capabilities, discovers available tools, and dispatches tool calls on behalf of the LibreFang runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Runtime] -->|tool requests| B[librefang-runtime-mcp]\n    B -->|SSE / HTTP transport| C[MCP Server 1]\n    B -->|SSE / HTTP transport| D[MCP Server 2]\n    B --> E[librefang-types]\n    B --> F[librefang-http]\n    B --> G[rmcp crate]\n```\n\nThe module wraps the `rmcp` crate (Rust MCP client) and layers LibreFang-specific concerns on top: type integration via `librefang-types`, HTTP transport via `librefang-http`, and security validations.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `rmcp` | Core MCP protocol client implementation — handles protocol negotiation, message framing, and tool invocation semantics |\n| `librefang-types` | Shared type definitions used across LibreFang; ensures MCP tool inputs/outputs map to the same types the rest of the runtime uses |\n| `librefang-http` | HTTP client utilities, providing the transport layer for MCP's HTTP-based communication (including SSE streams) |\n| `reqwest` | Underlying HTTP client, used for outbound requests to MCP servers |\n| `http` | Low-level HTTP types (request/response) |\n| `sha2` / `base64` | Cryptographic hashing and encoding — used for verifying server identity and securing the handshake |\n| `psl` | Public Suffix List — validates domain names of MCP server endpoints to prevent connections to ambiguous or unsafe hosts |\n| `url` | URL parsing and validation for MCP server addresses |\n| `arc-swap` | Atomic swapping of shared state — enables live reconfiguration of MCP server connections without dropping active sessions |\n| `rand` | Random number generation — used for session nonces and challenge tokens |\n| `async-trait` | Async trait support for trait objects used in the transport abstraction |\n| `thiserror` | Ergonomic error type derivation |\n\n## Transport\n\nMCP communication typically flows over HTTP with Server-Sent Events (SSE) for server-to-client messages. This module relies on `librefang-http` and `reqwest` to handle the HTTP transport, while `rmcp` handles protocol-level message serialization and deserialization.\n\n## Integration with LibreFang\n\nThis crate sits between the runtime core and external tool servers:\n\n1. The runtime core decides a tool call is needed and identifies that the tool is hosted on an MCP server.\n2. It delegates to this module, which looks up or establishes a connection to the appropriate MCP server.\n3. The module sends the tool invocation request, awaits the response, and converts the result back into `librefang-types` structures that the runtime can process.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover:\n\n- Connection failures (unreachable server, TLS errors)\n- Protocol errors (handshake failure, unsupported MCP version)\n- Transport errors (HTTP-level failures, SSE stream interruptions)\n- Validation errors (invalid server URL, disallowed domain)\n- Tool execution errors (server returned an error for the tool call)\n\nAll errors are tracked via `tracing` spans for observability.\n\n## Testing\n\nThe test suite uses `wiremock` to mock HTTP endpoints, allowing verification of MCP protocol interactions without requiring a live MCP server. Tests are run with `tokio`'s multi-threaded runtime:\n\n```toml\n[dev-dependencies]\nwiremock = \"0.6\"\ntokio = { features = [\"macros\", \"rt-multi-thread\"] }\n```\n\n## Security Considerations\n\n- **Domain validation**: The `psl` crate is used to check that MCP server URLs point to well-defined domains, rejecting ambiguous TLDs or IP-based addresses where appropriate.\n- **Handshake verification**: `sha2` and `base64` are used during the initial connection to verify server identity.\n- **URL parsing**: All server endpoints are validated through the `url` crate before any connection is attempted.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth authentication flows for LibreFang runtime drivers, providing token acquisition and refresh logic for third-party AI services (ChatGPT, GitHub Copilot).\n\n## Purpose\n\nThis crate encapsulates the full OAuth 2.0 lifecycle required when LibreFang acts as a client to external AI providers. Rather than scattering authentication logic throughout individual runtime drivers, this module provides a centralized, self-contained implementation that drivers can delegate to.\n\n## Scope\n\nThe crate handles two distinct OAuth integrations:\n\n- **ChatGPT (OpenAI)** — device-code or authorization-code flow for obtaining access tokens against OpenAI's API.\n- **GitHub Copilot** — the Copilot-specific OAuth dance, which routes through GitHub's identity provider and returns tokens scoped for Copilot's API endpoint.\n\nBoth flows produce the same end result: a bearer token that the calling runtime driver attaches to outbound HTTP requests via `librefang-http`.\n\n## Architecture\n\n```\n┌─────────────────────┐\n│  Runtime Driver      │\n│  (ChatGPT / Copilot) │\n└────────┬────────────┘\n         │  calls\n         ▼\n┌─────────────────────────┐     ┌──────────────────┐\n│ librefang-runtime-oauth │────▶│ librefang-http   │\n│                         │     └──────────────────┘\n│  • PKCE generation      │\n│  • State + nonce        │     ┌──────────────────┐\n│  • Token exchange       │────▶│ librefang-types  │\n│  • Token refresh        │     └──────────────────┘\n│  • Secure zeroing       │\n└─────────────────────────┘\n```\n\n```mermaid\nflowchart LR\n    A[Runtime Driver] -->|request auth| B[OAuth Module]\n    B -->|PKCE + state| C[Identity Provider]\n    C -->|authorization code| B\n    B -->|code + verifier| C\n    C -->|access token| B\n    B -->|token| A\n    A -->|bearer request| D[AI Service API]\n```\n\n## Key Dependencies and Why They Matter\n\n| Dependency | Role in This Crate |\n|---|---|\n| `base64`, `sha2`, `hex` | PKCE (Proof Key for Code Exchange) — generates a SHA-256 code challenge from a random code verifier, encoded as base64url or hex for the authorization request. |\n| `rand` | Cryptographically-secure random generation for OAuth `state` parameters and PKCE code verifiers. |\n| `zeroize` | Securely zeroes sensitive values (code verifiers, client secrets, tokens) from memory after use, preventing credential leakage in core dumps. |\n| `reqwest` | Makes HTTP calls to the identity provider's token endpoints (exchanged indirectly through `librefang-http`). |\n| `serde` / `serde_json` | Deserializes token responses from the provider; serializes outbound request bodies. |\n| `thiserror` | Defines the crate's error types as ergonomic Rust enums. |\n| `tracing` | Emits structured log events for each stage of the OAuth flow — useful for debugging failed authorizations without logging secrets. |\n\n## OAuth Flow Walkthrough\n\n### 1. Initialization\n\nThe calling driver invokes the OAuth module to begin a new authorization session. The module generates:\n\n- A **code verifier** — a high-entropy random string (typically 43–128 characters).\n- A **code challenge** — `BASE64URL(SHA256(code_verifier))`, sent to the provider.\n- A **state** parameter — another random string, returned unchanged by the provider to prevent CSRF.\n\n### 2. User Authorization\n\nThe module returns an authorization URL (or device-code URL, depending on the provider's flow). The driver presents this URL to the user — either by opening a browser or displaying it for manual navigation. The user authenticates with the provider and grants consent.\n\n### 3. Token Exchange\n\nOnce the provider redirects back with an authorization code (or the device code is polled), the module exchanges it for tokens:\n\n- Sends the code plus the original code verifier to the provider's token endpoint.\n- Receives an **access token**, an optional **refresh token**, and an **expires-in** value.\n- The code verifier is zeroed from memory immediately after this request.\n\n### 4. Token Storage and Use\n\nThe resulting token is returned to the driver, which stores it (via whatever persistence mechanism the runtime uses) and attaches it as a `Bearer` header on subsequent API calls through `librefang-http`.\n\n### 5. Token Refresh\n\nWhen an access token expires, the driver calls back into this module with the stored refresh token. The module posts to the provider's token endpoint to obtain a new access token, again zeroing the old refresh token if the provider rotates it.\n\n## Security Considerations\n\n- **PKCE is mandatory** for these flows. The code verifier never leaves the client; only the SHA-256 challenge is transmitted during authorization. This prevents authorization code interception attacks.\n- **State validation** ensures the callback originated from the same session, blocking CSRF-based token theft.\n- **Zeroization** — every intermediate secret (code verifier, client secret, refresh tokens) is held in types that implement `Zeroize`, so memory is scrubbed as soon as the value is no longer needed.\n- **No secret logging** — the `tracing` spans instrument each phase of the flow but intentionally omit token values and code verifiers from log output.\n\n## Error Handling\n\nAll errors from this crate are consolidated into enums derived via `thiserror`. Expected error categories include:\n\n- **Network errors** — the token endpoint is unreachable or returned a non-200 status.\n- **Provider errors** — the provider rejected the authorization code, returned an invalid grant, or the user denied consent.\n- **Deserialization errors** — the provider returned an unexpected JSON structure.\n- **State mismatch** — the `state` parameter in the callback doesn't match the one generated locally.\n\nCallers should pattern-match on these variants to decide whether to retry, re-prompt the user, or fail permanently.\n\n## Relationship to Other Crates\n\n```\nlibrefang-types  ←  librefang-runtime-oauth  →  librefang-http\n```\n\n- **`librefang-types`** — Provides shared types such as credential structs, error enums, or configuration models that this crate consumes.\n- **`librefang-http`** — The HTTP client layer this crate uses to make outbound requests to identity providers. By routing through `librefang-http` rather than using `reqwest` directly, all OAuth HTTP traffic inherits the workspace's proxy, TLS, and retry configuration.\n\nRuntime drivers (e.g., a ChatGPT driver or Copilot driver) depend on this crate as a build dependency and call into it during their authentication phase. They do not need to understand the underlying OAuth mechanics — only that calling the module yields a valid bearer token or an error they must handle.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests\n\nIntegration tests for the `librefang-runtime` crate. These tests exercise runtime subsystems that require real trait dispatch, configuration resolution, or tracing subscriber setup — things that unit tests within the library crates cannot easily validate in isolation.\n\n## Test Files and Coverage Areas\n\n### `instrument_span_fields.rs`\n\nVerifies tracing span field propagation from `run_agent_loop`'s `#[instrument]` annotation to child events.\n\nThe production daemon sets a baseline `EnvFilter` of `librefang_runtime=warn`. This creates a subtle interaction: an `INFO`-level span created by `#[instrument]` (the default level) is **dropped** by the filter, meaning `agent.id` and `session.id` fields silently vanish from all log events emitted inside the agent loop. The fix is `#[instrument(level = \"warn\", ...)]`.\n\nThree tests pin this behavior:\n\n| Test | Purpose |\n|------|---------|\n| `warn_inside_agent_span_includes_agent_and_session_ids` | Confirms fields propagate when the subscriber has no filter |\n| `info_span_is_dropped_under_warn_target_filter` | Reproduces the bug: INFO spans lose their fields under a `warn` filter |\n| `warn_span_survives_warn_target_filter_and_carries_fields` | Confirms the production fix: WARN-level spans survive |\n\nEach test constructs a `CaptureWriter` that buffers formatted output into an `Arc<Mutex<Vec<u8>>>`, installs a temporary `tracing_subscriber::registry`, and asserts on the captured string.\n\n### `mcp_oauth_integration.rs`\n\nTests OAuth discovery, token lifecycle, and auth-state serialization for MCP (Model Context Protocol) server connections.\n\n**Discovery tests:**\n\n- `test_discover_fallback_to_config` — When remote `.well-known` discovery fails (unreachable URL), `discover_oauth_metadata` falls back to `McpOAuthConfig` values.\n- `test_discover_fails_without_any_source` — With no remote endpoint and no config, discovery returns an error.\n\n**Provider wiring regression test:**\n\n- `test_http_connect_calls_oauth_provider_load_token` — Catches the bug where `oauth_provider: None` was passed in `connect_mcp_servers`. A `TrackingOAuthProvider` records whether `load_token` is called during `McpConnection::connect` against a nonexistent HTTP endpoint.\n\n**Token lifecycle tests** (using `InMemoryOAuthProvider`):\n\n- `test_provider_store_then_load` — Store then load round-trips the access token.\n- `test_provider_clear_removes_token` — `clear_tokens` deletes the stored token.\n- `test_provider_clear_is_isolated` — Clearing one server's tokens does not affect another.\n- `test_provider_reauthorize_after_clear` — The sequence store → clear → store with a new token works.\n\n**Auth state serialization tests:**\n\n- `test_auth_state_lifecycle` — Validates `NeedsAuth → PendingAuth → Authorized → NeedsAuth` round-trips through serde, ensuring the dashboard always has a valid state to render.\n- `test_needs_auth_serializes_differently_from_pending_auth` — Regression test for a UI bug where the dashboard showed \"Authorizing...\" before the user clicked Authorize.\n\n### `tool_exec_backend_selection.rs`\n\nTests the configuration → resolution → backend construction pipeline described in issue #3332.\n\n```\nconfig.toml [tool_exec].kind  ──┐\n                                 ├─→ resolve_backend_kind ─→ build_backend ─→ trait object\nagent.toml tool_exec_backend  ──┘\n```\n\n**Resolution tests:**\n\n- `default_kernel_config_resolves_to_local` — Default `KernelConfig` produces `BackendKind::Local`.\n- `config_toml_kind_local_loads` / `config_toml_kind_docker_loads` — TOML parsing produces the correct `BackendKind`.\n- `agent_manifest_override_wins_over_global` — Per-agent `tool_exec_backend` overrides the global config.\n- `agent_manifest_no_field_falls_back_to_global` — `None` in the manifest falls back to the config value.\n\n**Backend construction tests:**\n\n- `build_backend_local_dispatches_to_local_impl` / `build_backend_docker_dispatches_to_docker_impl` — `build_backend` returns a trait object whose `kind()` matches the requested backend.\n- `build_backend_ssh_without_subtable_or_feature_errors` / `build_backend_daytona_without_subtable_or_feature_errors` — SSH and Daytona backends error when their required configuration subtables are missing.\n\n**End-to-end test:**\n\n- `end_to_end_local_dispatch_runs_command` (Unix only) — Full pipeline from empty config through `resolve_backend_kind`, `build_backend`, and `run_command`, asserting `echo end-to-end-3332` produces the expected stdout.\n\n### `tool_runner_agent_event.rs`\n\nTests `agent_send`, `agent_list`, and `event_publish` tool dispatch through `execute_tool_raw`.\n\nUses a `CapturingKernel` mock that implements all `KernelHandle` role traits, recording calls on `AgentControl` and `EventBus` while stubbing everything else with `\"not implemented\"` errors.\n\n**Key tests:**\n\n- `agent_send_forwards_target_agent_id_and_message` — Validates that `agent_id` and `message` from the tool input reach `AgentControl::send_to_agent`.\n- `agent_send_self_is_refused_to_avoid_deadlock` — Self-sends are rejected at the dispatcher level before reaching the kernel, preventing deadlock on the per-agent message lock.\n- `agent_list_renders_kernel_provided_agents` / `agent_list_when_no_agents_running_returns_friendly_string` — The output string contains agent IDs and names; an empty list produces a user-friendly message.\n- `event_publish_forwards_event_type_and_payload` — Event type and payload reach `EventBus::publish_event`.\n- `event_publish_missing_event_type_errors_without_invoking_kernel` — Validation short-circuits before the kernel call.\n\n### `tool_runner_forwarding.rs`\n\nTests that `memory_store`, `memory_recall`, and `memory_list` correctly forward the calling user's `sender_id` as the `peer_id` parameter to `MemoryAccess` trait methods.\n\nThe `CapturingKernel` mock records the `peer_id: Option<&str>` argument on each memory call. Tests cover both the `Some(sender_id)` and `None` cases, plus a cross-call isolation test (`test_sender_id_not_leaked_between_calls`) that makes three sequential calls with different contexts and asserts the recorded peer IDs match each call's context.\n\n### `tool_runner_forwarding_task_cron.rs`\n\nTests `task_post`, `task_status`, and `cron_create` tool dispatch.\n\n**Task tests:**\n\n- `test_task_post_forwards_caller_as_created_by` — The `caller_agent_id` from `ToolExecContext` is forwarded as `created_by` to `TaskQueue::task_post`.\n- `test_task_post_forwards_none_created_by` — When no caller is set, `None` is forwarded.\n\n**Cron tests:**\n\n- `test_cron_create_injects_sender_peer_id` — The `sender_id` from context is injected as `peer_id` in the cron job JSON.\n- `test_cron_create_preserves_existing_peer_id` — An explicit `peer_id` in the tool input is not overwritten.\n- `test_cron_create_forwards_caller_as_agent_id` — The `caller_agent_id` is forwarded as the `agent_id` parameter to `CronControl::cron_create`.\n\n**Task status test:**\n\n- `test_task_status_projects_six_canonical_fields` — `task_status` calls `TaskQueue::task_get` and projects the full task row down to exactly six fields: `status`, `result`, `title`, `assigned_to`, `created_at`, `completed_at`.\n- `test_task_status_not_found_returns_message` — When `task_get` returns `None`, the tool returns a non-error \"not found\" message.\n- `test_task_status_missing_task_id_errors` — Missing `task_id` parameter produces an error before reaching the kernel.\n\n## Mock Kernel Pattern\n\nThree test files (`tool_runner_agent_event.rs`, `tool_runner_forwarding.rs`, `tool_runner_forwarding_task_cron.rs`) share a common mock pattern:\n\n```mermaid\ngraph TD\n    A[execute_tool_raw] -->|dispatches by tool name| B[tool_runner internals]\n    B -->|calls trait method| C{dyn KernelHandle}\n    C -->|delegates to| D[CapturingKernel mock]\n    D -->|records args in| E[Arc Mutex Vec]\n    E -->|test asserts on| F[recorded values]\n```\n\nEach file defines its own `CapturingKernel` struct that implements all role traits in the `KernelHandle` composition. Traits relevant to the test record their arguments into `Arc<Mutex<Vec<_>>>` buffers; all other trait methods return `\"not implemented\"` errors. The `make_ctx` helper constructs a `ToolExecContext` with the mock kernel and the desired `caller_agent_id` / `sender_id`.\n\n## Running\n\n```bash\n# All runtime integration tests\ncargo test -p librefang-runtime --test '*'\n\n# Specific test file\ncargo test -p librefang-runtime --test tool_runner_forwarding\n\n# Single test\ncargo test -p librefang-runtime --test tool_exec_backend_selection -- end_to_end_local_dispatch_runs_command\n```\n\nThe `end_to_end_local_dispatch_runs_command` test is gated behind `#[cfg(unix)]` and `#[tokio::test]`.","other-librefang-runtime-wasm-tests":"# Other — librefang-runtime-wasm-tests\n\n# librefang-runtime-wasm-tests\n\nIntegration test suite for `librefang-runtime-wasm`'s public `WasmSandbox` API. Validates the full sandbox lifecycle — module loading, instantiation, invocation, capability enforcement, fuel metering, memory limits, and ABI validation — using self-contained WAT (WebAssembly Text Format) guest fixtures.\n\n## Purpose\n\nThese tests exercise the sandbox boundary invariants that cannot be meaningfully unit-tested inside the runtime crate itself. Every test calls the public async `WasmSandbox::execute()` entry point, which means the `spawn_blocking` + watchdog plumbing is also covered.\n\nThe suite has **zero external fixture dependencies** — all guest modules are inlined as `const` WAT strings. Wasmtime's `Module::new` accepts both binary `.wasm` and text `.wat`, so the tests compile and validate modules directly from the inline source.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    TC[Test Functions] -->|call| SB[WasmSandbox::execute]\n    SB -->|loads| WAT[WAT Guest Modules]\n    SB -->|enforces| CFG[SandboxConfig]\n    SB -->|returns| RES[ExecutionResult / SandboxError]\n    \n    WAT --> ECHO[ECHO_WAT]\n    WAT --> HCP[HOST_CALL_PROXY_WAT]\n    WAT --> ILOOP[INFINITE_LOOP_WAT]\n    WAT --> MEXEC[MISSING_EXECUTE_WAT]\n    WAT --> MGROW[MEMORY_GROW_WAT]\n    \n    CFG --> CAP[capabilities]\n    CFG --> FUEL[fuel_limit]\n    CFG --> MEM[max_memory_bytes]\n```\n\n## Guest Fixtures\n\nEach WAT constant defines a minimal guest module targeting a specific boundary condition. All conform to the sandbox ABI (exports: `memory`, `alloc`, `execute`) except where intentionally violating it.\n\n### `ECHO_WAT`\n\nReturns input bytes verbatim by packing `(ptr, len)` into an `i64` return value. Smoke-tests the JSON serialization round-trip and the core `alloc` + `memory` + `execute` ABI contract.\n\nABI contract: `execute(ptr: i32, len: i32) -> i64` where the upper 32 bits are the pointer and lower 32 bits are the length of the result.\n\n### `HOST_CALL_PROXY_WAT`\n\nImports `librefang::host_call` and forwards input bytes directly to it. Used for all capability-check tests — the guest delegates to the host, and the host's capability gate determines the response.\n\n### `INFINITE_LOOP_WAT`\n\nContains a tight `(loop $inf (br $inf))` — an unconditional branch that never exits. Used to verify that the fuel meter traps execution before host CPU is consumed indefinitely.\n\n### `MISSING_EXECUTE_WAT`\n\nExports only `memory` and `alloc`, intentionally omitting `execute`. Triggers the ABI validation gate in `WasmSandbox::execute_sync` when it attempts to retrieve guest exports.\n\n### `MEMORY_GROW_WAT`\n\nCalls `memory.grow(200)` (≈12.5 MiB) on each invocation. When the host's `MemoryLimiter` denies the request, `memory.grow` returns `-1`, which the guest surfaces as the packed result length. The host's bounds check then catches the oversized value (since `-1` cast through `u32` exceeds any reasonable result cap).\n\n## Test Cases\n\n### Happy Path\n\n| Test | What it proves |\n|------|---------------|\n| `sandbox_loads_and_invokes_echo_module` | Full load → instantiate → invoke path. JSON input is serialized, passed to the guest, echoed back, and deserialized unchanged. Asserts `fuel_consumed > 0`. |\n| `sandbox_accepts_module_loaded_from_disk` | The `execute` API works identically with bytes read from disk via `std::fs::read`. Defends against regressions where the API might require ownership or fail on borrowed data. |\n\n### Capability Boundary\n\n| Test | What it proves |\n|------|---------------|\n| `sandbox_denies_fs_read_without_capability` | With `capabilities: []`, an `fs_read` host_call returns a JSON error containing `\"denied\"`. Includes a CWD guard that asserts `Cargo.toml` exists, preventing false passes if the test runner changes the working directory. |\n| `sandbox_allows_capless_host_call` | `time_now` succeeds without any explicit capability grant. Proves the boundary isn't a blanket deny-all. |\n| `sandbox_capability_grant_toggles_env_read` | Positive→negative pair: `EnvRead(\"PATH\")` granted → `env_read` succeeds; no capabilities → same call is denied. Confirms the capability check is actually dispatched rather than degenerate always-allow or always-deny behavior. |\n\n### Resource Limits\n\n| Test | What it proves |\n|------|---------------|\n| `sandbox_fuel_cap_traps_runaway_guest` | A guest with an infinite loop traps with `SandboxError::FuelExhausted` when `fuel_limit: 10_000` is set. Validates the `Trap::OutOfFuel` → `SandboxError::FuelExhausted` mapping. |\n| `sandbox_memory_cap_blocks_oversized_growth` | With `max_memory_bytes: 1 MiB`, a guest attempting a 200-page growth is blocked. Accepts `SandboxError::AbiError` (failed grow surfaced as oversized result) or any other error variant — the invariant is that the host didn't OOM. An `Ok` result triggers a panic, as it would indicate the cap was bypassed. |\n\n### ABI Validation\n\n| Test | What it proves |\n|------|---------------|\n| `sandbox_rejects_module_missing_required_exports` | A module without the `execute` export is rejected with `SandboxError::AbiError(msg)` where `msg` contains `\"execute\"`. Not a panic, not a generic error — a typed, catchable rejection. |\n\n## Dependencies\n\n- **`librefang_runtime_wasm`** — provides `WasmSandbox`, `SandboxConfig`, `SandboxError`\n- **`librefang_types`** — provides `Capability` enum (e.g., `Capability::EnvRead(...)`)\n- **`serde_json`** — test input construction and result assertions\n- **`tempfile`** — `NamedTempFile` for the disk-load test only\n- **`tokio`** — `#[tokio::test]` async runtime for all tests\n\n## Running\n\n```sh\n# From the workspace root\ncargo test -p librefang-runtime-wasm --test sandbox_integration\n\n# Or via nextest\ncargo nextest run -p librefang-runtime-wasm --test sandbox_integration\n```\n\nAll tests are async and run under the tokio runtime. No environment setup, external services, or fixture files are required.\n\n## Adding New Tests\n\nWhen adding a new boundary test:\n\n1. **Define a WAT fixture** as a `const &str` in the guest fixtures section. Keep it minimal — only export what the test needs. If testing the happy ABI, include `memory`, `alloc`, and `execute`. If testing a violation, omit or break the relevant export.\n\n2. **Use `HOST_CALL_PROXY_WAT`** for capability tests rather than writing a new module. Construct the `input` JSON with `\"method\"` and `\"params\"` to target the specific host call.\n\n3. **Assert on `SandboxError` variants** for failure cases — `FuelExhausted`, `AbiError(...)`, etc. — rather than string-matching on `Display` output, to keep assertions resilient to error message formatting changes.\n\n4. **Include a CWD guard** (like the `Cargo.toml` existence check) if the test depends on filesystem paths, so failures are attributed correctly rather than silently passing.","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime.\n\n## Purpose\n\nThis crate provides a sandboxed WebAssembly execution environment for LibreFang skills. It uses [wasmtime](https://wasmtime.dev/) to compile and run WASM modules in a controlled, isolated runtime, allowing user-defined or third-party skill logic to execute without compromising the host process.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────┐\n│           librefang-runtime-wasm            │\n│                                             │\n│  ┌─────────────┐    ┌───────────────────┐   │\n│  │ WASM Module  │◄───│ Sandbox Runtime   │   │\n│  │ (skill.wasm) │    │ (wasmtime Engine) │   │\n│  └──────┬───────┘    └────────┬──────────┘   │\n│         │                     │              │\n│         │   ┌─────────────────┘              │\n│         │   │ Host Functions                 │\n│         ▼   ▼                                │\n│  ┌──────────────────────────────────────┐    │\n│  │        Kernel Handle Bridge          │    │\n│  └──────────────────────────────────────┘    │\n└───────────┬─────────────────────────┬────────┘\n            │                         │\n            ▼                         ▼\n┌───────────────────────┐  ┌──────────────────┐\n│  librefang-kernel-    │  │ librefang-http   │\n│  handle               │  │                  │\n└───────────────────────┘  └──────────────────┘\n```\n\n## Key Design Decisions\n\n### Sandboxed Execution\n\nSkills run inside a wasmtime instance, which provides:\n\n- **Memory isolation** — WASM linear memory is bounded and cannot access host memory directly\n- **Capability control** — host functions are explicitly imported, giving the runtime fine-grained control over what a skill can do\n- **Resource limits** — wasmtime supports fuel-based execution, enabling CPU time caps on untrusted code\n\n### Host-Side Integration\n\nThe crate bridges WASM guest code to LibreFang kernel services through the `librefang-kernel-handle` dependency. This allows sandboxed skills to interact with game state, events, and other runtime facilities via controlled host function imports.\n\n## Dependencies\n\n| Crate | Role in this module |\n|---|---|\n| `wasmtime` | WebAssembly runtime — compiles and executes WASM modules |\n| `librefang-kernel-handle` | Exposes kernel operations as host functions callable from WASM |\n| `librefang-http` | HTTP client capability for skills that need network access |\n| `librefang-types` | Shared type definitions exchanged across crate boundaries |\n| `tokio` | Async runtime backing WASM instantiation and host calls |\n| `serde_json` | Serialization of structured data between host and guest |\n| `tracing` | Instrumentation for sandbox lifecycle and execution events |\n| `thiserror` / `anyhow` | Error types for sandbox setup and execution failures |\n\n## Integration Points\n\nThis crate sits between the game engine and user-supplied skill code. The broader flow is:\n\n1. The engine loads a skill's `.wasm` binary (compiled from Rust, C, or any WASM-targeting language)\n2. This crate creates a wasmtime `Engine` and `Store`, configures allowed imports, and instantiates the module\n3. The skill's entry point is invoked, with host functions available for kernel interaction and HTTP requests\n4. Results are returned to the engine via the kernel handle layer\n\nNo other crates in the workspace currently call into this module at compile time — it is expected to be consumed through runtime dependency injection or feature-gated initialization.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. Hosts the turn-by-turn agent loop, tool dispatch, context management, audit trail, A2A peer protocol, channel registry, sandboxed execution backends, and re-exports OAuth subsystems.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api\"] -->|calls| RT[\"librefang-runtime\"]\n    K[\"librefang-kernel\"] -->|spawns agents via| RT\n    RT -.->|KernelHandle trait| KKH[\"librefang-kernel-handle\"]\n    RT --> TYPES[\"librefang-types\"]\n    RT --> HTTP[\"librefang-http\"]\n    RT --> MCP[\"librefang-runtime-mcp\"]\n    RT --> OAUTH[\"librefang-runtime-oauth\"]\n    RT --> WASM[\"librefang-runtime-wasm\"]\n    RT --> LLM_D[\"librefang-llm-drivers\"]\n    RT --> LLM[\"librefang-llm-driver\"]\n    RT --> CH[\"librefang-channels\"]\n    RT --> MEM[\"librefang-memory\"]\n    RT --> SK[\"librefang-skills\"]\n```\n\nThe runtime is called by `librefang-kernel` when an agent receives a message. It never depends on `librefang-kernel` directly — all kernel communication goes through the `KernelHandle` trait defined in `librefang-kernel-handle`. This avoids a circular dependency since kernel depends on runtime, not the reverse.\n\n## Module Map\n\n### Core Execution\n\n| Module | Role |\n|---|---|\n| `agent_loop` | Turn-by-turn agent execution. ~10k LOC. God module — do not grow it without coordination (see #3710). |\n| `tool_runner` | Tool execution path. ~9.7k LOC. Also targeted for extraction by #3710. |\n| `apply_patch` | Tool-level patch application. |\n| `prompt_builder` | Assembles the prompt sent to the LLM. |\n\n### Context Management\n\n| Module | Role |\n|---|---|\n| `compactor` | Compacts conversation history when context grows. |\n| `context_budget` | Allocates and tracks token budget across context windows. |\n| `context_compressor` | Compresses context segments. |\n| `context_overflow` | Handles overflow when context exceeds limits. |\n\n### Model & Catalog\n\n| Module | Role |\n|---|---|\n| `model_catalog::ModelCatalog` | Registry of 130+ models across 28 providers. Kernel wraps it in `arc_swap::ArcSwap` (see #3384). Updates go through `kernel.model_catalog_update(\\|cat\\| ...)`. |\n| `catalog_sync` | Synchronizes model catalog state. |\n\n### MCP & A2A\n\n| Module | Role |\n|---|---|\n| `mcp` | MCP client. OAuth state lives in `mcp_auth_states`. The `McpOAuthProvider` trait is implemented on the kernel side. |\n| `a2a` | Agent-to-Agent peer protocol. |\n\n### Sandboxes & Execution Backends\n\n| Module | Role |\n|---|---|\n| `browser` | Browser sandbox. |\n| `docker_sandbox` | Docker container sandbox. |\n| `dangerous_command` | Validation and policy for dangerous shell commands. |\n\nOptional backends enabled by Cargo features:\n\n| Feature flag | Backend |\n|---|---|\n| `ssh-backend` | Remote SSH tool-execution (`russh` / `russh-keys`). #3332. |\n| `daytona-backend` | Daytona managed-sandbox execution. Uses existing reqwest stack — no new deps. #3332. |\n| `landlock-sandbox` | Linux Landlock-based sandboxing. |\n| `seccomp-sandbox` | seccomp-bpf syscall filtering. |\n\n### Other Subsystems\n\n| Module | Role |\n|---|---|\n| `audit` | Audit trail for agent actions. |\n| `auth_cooldown` | Rate-limiting for authentication attempts. |\n| `aux_client` | Auxiliary HTTP client for internal service calls. |\n| `channel_registry` | Registry of available channel types. |\n| `checkpoint_manager` | Agent state checkpointing. |\n| `media` | Media handling and processing. |\n\n### Re-exports\n\nOAuth subsystems from `librefang-runtime-oauth` are re-exported:\n- `chatgpt_oauth`\n- `copilot_oauth`\n\n### Public Constant\n\n`USER_AGENT` — mandatory on every outbound HTTP call. The audit hook flags requests missing this header.\n\n## Dependency Boundary\n\n**Owned by this crate:**\n`agent_loop`, `tool_runner`, `compactor`, `context_budget`, `context_compressor`, `context_overflow`, `audit`, `auth_cooldown`, `aux_client`, `browser`, `catalog_sync`, `channel_registry`, `checkpoint_manager`, `dangerous_command`, `docker_sandbox`, `media`, `model_catalog` (the type), `mcp` (client), `prompt_builder`.\n\n**NOT owned — belongs elsewhere:**\n- Agent registry, scheduler, cron, orchestration → `librefang-kernel`\n- HTTP routing → `librefang-api`\n- Channel transport adapters → `librefang-channels`\n- Skill loader → `librefang-skills`\n\n**Dependencies:**\n- `librefang-types`, `librefang-http`, `librefang-kernel-handle` (NOT `librefang-kernel`)\n\n## KernelHandle\n\nThe `KernelHandle` trait lives in `librefang-kernel-handle`, not here. Kernel implements it; runtime and API consume it. Use `KernelHandle` whenever you need a kernel callback from runtime code. Never depend on `librefang-kernel` directly — that creates a circular dependency.\n\nFor testing, use `librefang-testing::MockKernelBuilder`. Do not fake `KernelHandle` inline.\n\n## Cross-Cutting Invariants\n\n### Deterministic Prompt Ordering (#3298)\n\nTool definitions, MCP server summaries, and capability lists must be sorted before stringifying. Use `BTreeMap` / `BTreeSet`, not `HashMap`. This ensures deterministic prompts across runs.\n\n### Identity Files\n\nIdentity files live at `{workspace}/.identity/`, not the workspace root. `read_identity_file()` falls back to root for pre-migration workspaces. `migrate_identity_files()` runs on every agent spawn.\n\n### USER_AGENT\n\nEvery outbound HTTP request must include:\n\n```rust\nreq.header(\"User-Agent\", librefang_runtime::USER_AGENT);\n```\n\nThe audit hook flags missing `User-Agent` headers.\n\n## Async Constraints\n\n### ErrorTranslator is `!Send`\n\n`ErrorTranslator` (from `RequestLanguage`) is `!Send`. Any `.await` must happen **after** `drop(t)`, otherwise you get a cryptic axum `Handler<_, _>` trait-bound error.\n\n```rust\n// WRONG — ErrorTranslator alive across await\nlet t = ErrorTranslator::new(lang);\nlet result = some_async_call().await; // compile error\ndrop(t);\n\n// RIGHT — drop before await\nlet t = ErrorTranslator::new(lang);\nlet msg = t.translate(error);\ndrop(t);\nlet result = some_async_call().await;\n```\n\n### No blocking in async context\n\n- No `std::fs` or `std::sync::RwLock` inside async handlers. Use `tokio::fs`, `arc_swap`, or `parking_lot` (#3579).\n- No `tokio::task::block_on`. Ever.\n\n## Testing\n\nThis crate has historically had **zero** integration tests (#3696). All new runtime work **should** include at least one `#[tokio::test]` exercising the new code path.\n\nRun tests:\n\n```sh\ncargo test -p librefang-runtime\n```\n\nDo not use raw `cargo build` — use `cargo check --workspace --lib`. Real builds run in CI.\n\n## Taboos\n\n| Prohibited | Reason |\n|---|---|\n| `use librefang_kernel::*` | Circular dependency. Use `KernelHandle`. |\n| `use librefang_api::*` | API consumes runtime, not the reverse. |\n| Adding files to `agent_loop.rs` / `tool_runner.rs` | Both are slated to shrink (#3710). |\n| `unwrap()` / `panic!()` on wire values | These are untrusted inputs. |\n| Inlining a fake `KernelHandle` | Use `librefang-testing::MockKernelBuilder`. |\n| `cargo build` | Use `cargo check --workspace --lib`. |","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides registry, loader, marketplace integration, and OpenClaw compatibility.\n\n## Overview\n\nThis module manages the full lifecycle of **skills** in LibreFang: discovering them on disk, loading and validating their definitions, resolving dependencies, downloading from a marketplace, and maintaining compatibility with the OpenClaw skill format.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Skill Loader]\n    B --> C[Local Filesystem]\n    B --> D[Skill Package .zip]\n    E[Marketplace Client] --> F[Remote Registry HTTPS]\n    E --> A\n    G[OpenClaw Adapter] --> A\n    B --> H[Resolved Skill Instances]\n```\n\nThe four main concerns map to the dependency profile:\n\n| Concern | Purpose | Key Dependencies |\n|---|---|---|\n| **Registry** | In-memory index of known skills with version tracking | `serde`, `semver` |\n| **Loader** | Reads skill definitions from disk, validates, and instantiates | `walkdir`, `serde_json`, `toml`, `serde_yaml`, `sha2`, `hex`, `zip` |\n| **Marketplace** | Fetches and installs skills from remote sources | `reqwest`, `rustls`, `chrono` |\n| **OpenClaw compatibility** | Translates OpenClaw-format skills into LibreFang skill objects | `aho-corasick` |\n\n## Skill Package Format\n\nSkills are distributed as `.zip` archives containing:\n\n- A manifest file (TOML, JSON, or YAML) describing metadata, version, and entry points\n- Skill logic files\n- An optional checksum for integrity verification (SHA-256, handled via `sha2` + `hex`)\n\nThe loader supports all three manifest formats, detected by file extension.\n\n## Registry\n\nThe registry maintains a collection of available skills keyed by identifier and version (`semver`). It supports:\n\n- Registering skills loaded from disk or downloaded from the marketplace\n- Querying by name, version range, or capability\n- Concurrent access with file locking (`fs2`) to prevent corruption when multiple processes share a skill directory\n\n## Loader\n\nThe loader scans configured skill directories using `walkdir`, reads manifests, verifies checksums, and produces resolved skill instances. File locking via `fs2` ensures safe concurrent reads during load.\n\nKey behaviors:\n\n- Recursively walks the skill directory tree\n- Parses manifests in TOML, JSON, or YAML format\n- Validates semantic versions (`semver`)\n- Verifies package integrity via SHA-256 checksums\n\n## Marketplace Client\n\nProvides HTTPS-based access to a remote skill marketplace:\n\n- Uses `reqwest` with `rustls` for TLS (accepts both `webpki-roots` and `rustls-native-certs` for certificate validation)\n- Downloads skill packages and registers them in the local registry\n- Tracks download timestamps with `chrono`\n\n## OpenClaw Compatibility\n\nThe OpenClaw adapter layer translates skills authored for the OpenClaw system into LibreFang's internal representation. It uses `aho-corasick` for efficient multi-pattern matching during format conversion — likely to identify and rewrite OpenClaw-specific syntax patterns in skill definitions.\n\n## Error Handling\n\nAll fallible operations return errors defined through `thiserror`, providing structured error types for:\n\n- Manifest parsing failures\n- Checksum/integrity violations\n- Network and TLS errors from marketplace requests\n- File I/O and lock contention\n\n## Logging\n\nStructured logging throughout uses the `tracing` crate, covering skill discovery, load progress, marketplace operations, and compatibility translation steps.\n\n## Relationship to Other Crates\n\n- **`librefang-types`** — provides the shared `Skill` type and related data structures that this crate populates and returns\n- This crate has no downstream dependents in the workspace; it is consumed by higher-level application crates that need skill resolution\n\n## Testing\n\nTests use `tempfile` for isolated filesystem operations and `serial_test` to serialize tests that share on-disk state (due to file locking with `fs2`).","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis module serves as the central metrics definition and instrumentation layer for the LibreFang system. It provides a dedicated home for metric definitions, labels, and telemetry helpers that other crates consume to report operational data.\n\nBy isolating telemetry concerns into their own crate, metric names, label keys, and instrumentation patterns stay consistent across the entire codebase without creating circular dependencies.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `metrics` | Facade crate for recording counters, gauges, and histograms. Provides the `metrics::counter!`, `metrics::gauge!`, and `metrics::histogram!` macros used throughout the codebase. |\n| `librefang-types` | Shared domain types (game events, player states, room identifiers, etc.) used as metric label values. |\n\nThe `metrics` crate is a facade — it defines the API for recording metrics but delegates actual export to a backend (such as `metrics-exporter-prometheus`) configured at the binary level. This means `librefang-telemetry` remains backend-agnostic.\n\n## How It Fits Into The Architecture\n\n```mermaid\ngraph TD\n    A[librefang-telemetry] -->|depends on| B[metrics facade]\n    A -->|depends on| C[librefang-types]\n    D[Game Server Binary] -->|imports| A\n    D -->|configures exporter| E[metrics-exporter-prometheus]\n    F[librefang-game] -.->|uses macros from| A\n    G[librefang-net] -.->|uses macros from| A\n```\n\nOther library crates in the workspace reference `librefang-telemetry` to call into the metrics macros with standardized metric names and labels. The final binary crate wires up an exporter (Prometheus, OpenTelemetry, etc.) that collects everything recorded through the facade.\n\n## Usage Patterns\n\n### Recording Metrics From Other Crates\n\nModules throughout the workspace use the `metrics` facade macros directly. `librefang-telemetry`'s role is to own shared metric name constants, label definitions, and any helper functions that encapsulate recurring instrumentation patterns.\n\n```rust\nuse metrics::counter;\n\ncounter!(\"connections.total\", \"protocol\" => \"tcp\").increment(1);\ncounter!(\"messages.received\", \"type\" => \"chat\").increment(1);\n```\n\n### Exporter Configuration (Binary Level)\n\nThe binary crate that assembles the final server executable is responsible for installing a metrics exporter. This is intentionally not part of `librefang-telemetry` so that different deployment targets can choose different backends.\n\n## Current Status\n\nThis module is in an early state. The dependency declarations are in place and the architectural boundary is established, but the call graph shows no internal execution flows yet. As the codebase grows, expect this crate to accumulate:\n\n- **Metric name constants** — static strings for every metric exposed by the system.\n- **Label key constants** — consistent label names (`\"room_id\"`, `\"player_id\"`, `\"event_type\"`) so there are no typos or naming drift.\n- **Helper functions** — wrappers around common instrumentation patterns (e.g., timing a future and recording a histogram, or counting a classified error).\n\n## Contributing\n\nWhen adding new instrumentation:\n\n1. **Define the metric name here** if it will be used from more than one crate.\n2. **Use the `metrics` facade macros** (`counter!`, `gauge!`, `histogram!`) rather than reaching for any exporter-specific API.\n3. **Keep labels low-cardinality** — avoid putting unique identifiers (session IDs, raw message content) into label values, as this explodes series cardinality in Prometheus.\n4. **Document the metric** in this crate so that operators know what to expect in dashboards and alerts.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Tests Module\n\n## Overview\n\n`tests.rs` is the **example and integration test suite** for the `librefang-testing` crate. It serves a dual purpose:\n\n1. **Validates** that the crate's test infrastructure (`TestAppState`, `MockKernelBuilder`, `MockLlmDriver`, `FailingLlmDriver`, request helpers) works correctly.\n2. **Documents by example** how to write tests against the application's API layer and LLM driver abstractions.\n\nDevelopers adding new endpoints or driver implementations should use these tests as templates.\n\n## Architecture\n\n```mermaid\ngraph TD\n    tests_rs[tests.rs] --> TestAppState\n    tests_rs --> MockKernelBuilder\n    tests_rs --> MockLlmDriver\n    tests_rs --> FailingLlmDriver\n    tests_rs --> helpers[test_request / assert_json_ok / assert_json_error]\n    TestAppState -->|produces| Router[Axum Router]\n    TestAppState -->|wraps| Kernel[MockKernel]\n    MockKernelBuilder -->|builds| Kernel\n```\n\n## Test Categories\n\n### 1. HTTP Endpoint Tests\n\nThese tests spin up an in-memory Axum router via `TestAppState`, fire requests through `test_request`, and validate responses with `assert_json_ok` or `assert_json_error`. They use `tower::ServiceExt::oneshot` — no real HTTP server or network I/O.\n\n| Test | Method & Path | Verifies |\n|------|--------------|----------|\n| `test_health_endpoint` | `GET /api/health` | Returns 200 with `\"status\": \"ok\"` or `\"degraded\"` |\n| `test_version_endpoint` | `GET /api/version` | Returns 200 with a `\"version\"` field |\n| `test_list_agents` | `GET /api/agents` | Returns 200 with `\"items\"` array and `\"total\"` u64 |\n| `test_get_agent_invalid_id` | `GET /api/agents/not-a-valid-uuid` | Returns 400 with `\"error\"` field |\n| `test_get_agent_not_found` | `GET /api/agents/{random-uuid}` | Returns 404 with `\"error\"` field |\n| `test_spawn_agent_post` | `POST /api/agents` | Returns 200 or 201 when given `manifest_toml` |\n| `test_delete_nonexistent_agent_is_idempotent` | `DELETE /api/agents/{random-uuid}` | Returns 200 with `\"status\": \"already-deleted\"` (not 404) |\n| `test_set_model_not_found` | `PUT /api/agents/{random-uuid}/model` | Returns 4xx/5xx for nonexistent agent |\n| `test_send_message_agent_not_found` | `POST /api/agents/{random-uuid}/message` | Returns 404 or 400 for nonexistent agent |\n| `test_patch_agent_not_found` | `PATCH /api/agents/{random-uuid}` | Returns 404 or 400 for nonexistent agent |\n\n#### Standard Endpoint Test Pattern\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn my_endpoint_test() {\n    let app = TestAppState::new();              // default mock kernel\n    let router = app.router();                  // Axum router with mock state\n\n    let req = test_request(Method::GET, \"/api/some-endpoint\", None);\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n\n    // For success:\n    let json = assert_json_ok(resp).await;\n    assert!(json.get(\"expected_field\").is_some());\n\n    // — or for errors:\n    // let json = assert_json_error(resp, StatusCode::BAD_REQUEST).await;\n}\n```\n\nKey details:\n- Most endpoint tests use `multi_thread` flavor because the kernel may spawn background tasks.\n- `test_request` builds an `axum::http::Request<String>` with the given method, path, and optional JSON body.\n- `assert_json_ok` asserts status 200 and parses the body into `serde_json::Value`.\n- `assert_json_error` takes an expected `StatusCode` and asserts the response matches it.\n\n### 2. Mock Driver Tests\n\nThese test the mock LLM driver abstractions directly, without routing through Axum.\n\n#### `MockLlmDriver`\n\nA configurable stub that returns canned responses in sequence and records every call.\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_mock_llm_driver_recording` | Responses cycle in order; `call_count()` and `recorded_calls()` capture model, system prompt, etc. |\n| `test_mock_llm_driver_custom_tokens_and_stop_reason` | Builder methods `with_tokens(input, output)` and `with_stop_reason(...)` propagate into `CompletionResponse.usage` and `.stop_reason`. |\n\n**Usage patterns demonstrated:**\n\n```rust\n// Pre-loaded response queue\nlet driver = MockLlmDriver::new(vec![\"first\".into(), \"second\".into()]);\n\n// Single-response builder with custom usage\nlet driver = MockLlmDriver::with_response(\"text\")\n    .with_tokens(200, 100)\n    .with_stop_reason(StopReason::MaxTokens);\n```\n\nBoth constructors produce an `LlmDriver` trait object. Each call to `complete()` pops the next response. Recorded calls are accessible via `recorded_calls()` and include the full `CompletionRequest` metadata (model, system prompt, messages, etc.).\n\n#### `FailingLlmDriver`\n\nA driver that always errors. Used to exercise error-handling paths.\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_failing_llm_driver` | `complete()` returns `Err` containing the configured message; `is_configured()` returns `false`. |\n\n```rust\nlet driver = FailingLlmDriver::new(\"simulated API error\");\nlet result = driver.complete(request).await;\nassert!(result.is_err());\nassert!(!driver.is_configured());\n```\n\n### 3. Kernel Configuration Test\n\n`test_custom_config_kernel` demonstrates how to create a `TestAppState` with a non-default configuration via `MockKernelBuilder`:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n);\n// The kernel inside the app now reflects the custom config\nassert_eq!(app.state.kernel.config_ref().language, \"zh\");\n```\n\nThis pattern is essential for testing locale-dependent behavior, feature flags, or any kernel-level configuration without modifying global state.\n\n## API Contracts Demonstrated\n\nSeveral tests encode important API design decisions:\n\n- **DELETE idempotency**: Deleting a nonexistent-but-valid UUID returns `200 OK` with `{\"status\": \"already-deleted\"}`, not `404`. The 404 status is reserved for malformed UUIDs only. This avoids spurious errors from retried requests (network blips, dashboard double-clicks).\n- **Agent list shape**: `GET /api/agents` returns `{\"items\": [...], \"total\": N}` where `total` is always a `u64`.\n- **Health status values**: Only `\"ok\"` or `\"degraded\"` are valid.\n\n## Relationship to Other Modules\n\n```\nlibrefang-testing/\n├── src/lib.rs           — re-exports the public test API\n├── src/test_app.rs      — TestAppState, router() construction\n├── src/mock_kernel.rs   — MockKernelBuilder, with_config()\n├── src/mock_driver.rs   — MockLlmDriver, FailingLlmDriver\n├── src/helpers.rs       — test_request(), assert_json_ok(), assert_json_error()\n└── src/tests.rs         — this file (consumes all of the above)\n```\n\nThe tests have **no outgoing dependencies** beyond the crate's own test infrastructure and the `librefang_runtime::llm_driver` trait definitions. They do not touch real databases, network services, or external LLM APIs.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure crate providing mock implementations and route-level test utilities for the Librefang system.\n\n## Purpose\n\nIntegration and unit tests across the workspace need deterministic, fast, and hermetic replacements for heavyweight subsystems—the kernel, the LLM driver, and live HTTP infrastructure. This crate centralises those test doubles so every other crate can depend on them without duplicating harness code.\n\n## What's Inside\n\nBased on its dependency surface, the crate is organised around three concerns:\n\n| Concern | Replaces | Key dependencies that hint at the implementation |\n|---|---|---|\n| **Mock kernel** | `librefang-kernel` | `librefang-kernel`, `librefang-runtime`, `librefang-memory`, `dashmap`, `arc-swap` |\n| **Mock LLM driver** | A real language-model backend | `librefang-types`, `async-trait` |\n| **API route test utilities** | A live HTTP listener / reverse proxy | `librefang-api`, `axum`, `tower`, `http-body-util`, `serde_json` |\n\n### Mock Kernel\n\nA lightweight kernel stand-in that satisfies the same trait(s) the real kernel exposes. The dependency on `dashmap` and `arc-swap` indicates it keeps shared mutable state (process tables, memory maps, registers) behind lock-free concurrent containers, letting tests inspect and manipulate kernel-visible state from multiple `tokio` tasks without deadlocking.\n\n`librefang-runtime` and `librefang-memory` are pulled in so the mock can construct realistic runtime handles and address-space objects, giving tests confidence that the code under test is interacting with the *shape* of real data structures.\n\n### Mock LLM Driver\n\nProvides a deterministic stand-in for the LLM backend. Tests can preset responses, assert on prompts that were submitted, and avoid network latency or API rate-limits. The `async-trait` dependency suggests it implements a shared async trait defined in `librefang-types`, allowing it to be injected wherever the real driver would go.\n\n### API Route Test Utilities\n\nA thin layer over `axum` + `tower` that spins up an in-process router (no TCP socket) and lets tests send requests and assert on responses. By using `tower::ServiceExt` and `http-body-util`, the helper code can call the router as a plain `Service<Request>`, collect the full response body, and deserialise JSON payloads with `serde_json`.\n\nThe `librefang-api` dependency is imported with `default-features = false` and only the `telemetry` feature, meaning the test harness deliberately avoids pulling in full server machinery—just enough to construct a router and optionally emit trace spans during tests.\n\n`tempfile` and `toml` are included for tests that need to write out ephemeral configuration files on disk.\n\n## Relationship to Other Crates\n\n```mermaid\ngraph BT\n    testing[\"librefang-testing\"]\n    types[\"librefang-types\"]\n    kernel[\"librefang-kernel\"]\n    runtime[\"librefang-runtime\"]\n    memory[\"librefang-memory\"]\n    api[\"librefang-api\"]\n\n    testing --> types\n    testing --> kernel\n    testing --> runtime\n    testing --> memory\n    testing --> api\n\n    style testing fill:#f9f,stroke:#333\n```\n\nAll arrows represent `path` dependencies in `Cargo.toml`. Every other crate in the workspace that needs to run integration tests adds `librefang-testing` as a **dev-dependency**—it is never part of a production build.\n\n## Usage Patterns\n\n### Bringing the Mock Kernel into a Test\n\nIn a crate that depends on the kernel at runtime:\n\n```toml\n# Cargo.toml (of the crate being tested)\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\nThe test then constructs the mock kernel, injects it wherever a kernel handle is expected, and proceeds to exercise the system under test.\n\n### Exercising API Routes\n\n```rust\nuse axum::body::Body;\nuse http_body_util::BodyExt;\nuse tower::ServiceExt;\n\n// router is assembled via librefang-api, using the mock kernel\nlet app = librefang_testing::test_router(/* … */);\n\nlet response = app\n    .oneshot(request)\n    .await\n    .unwrap();\n\nlet body = response.into_body()\n    .collect()\n    .await\n    .unwrap()\n    .to_bytes();\n\nlet parsed: serde_json::Value = serde_json::from_slice(&body).unwrap();\n```\n\n(Exact constructor signatures live in the crate's public API; the pattern above illustrates the `tower`-based in-process call that avoids binding a port.)\n\n## Design Notes\n\n- **No network I/O.** Every test double is in-process. The mock LLM driver returns immediately; the API test helper calls the router through `tower`'s `Service` trait.\n- **Shared mutable state is lock-free.** `dashmap` and `arc-swap` let tests running under `tokio::spawn` read and write mock kernel state without blocking the runtime.\n- **Feature gating.** `librefang-api` is consumed with `default-features = false` to keep compile times down and avoid optional heavy dependencies that tests don't need.\n- **Ephemeral config.** `tempfile` + `toml` support writing throwaway configuration files that are cleaned up when the temp directory is dropped at test end.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types-locales\n\nFluent (FTL) localization resources for LibreFang API error messages. This module provides translated error strings consumed at runtime by the Fluent localization system, with English (`en`) as the canonical/complete source and additional locales shipping partial or full translations.\n\n## Directory Layout\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl       # German\n├── en/errors.ftl       # English (canonical — most complete)\n├── es/errors.ftl       # Spanish\n├── fr/errors.ftl       # French\n├── ja/errors.ftl       # Japanese\n└── zh-CN/errors.ftl    # Simplified Chinese\n```\n\nEach file contains a single Fluent message group: `errors.ftl`. Additional FTL files can be added alongside `errors.ftl` within a locale directory as the application grows.\n\n## Fluent Message Format\n\nMessages use [Project Fluent](https://projectfluent.org/) syntax:\n\n```ftl\n# Simple message\napi-error-agent-not-found = Agent not found\n\n# Message with interpolation variable\napi-error-message-delivery-failed = Message delivery failed: { $reason }\n\n# Comments denote domain sections\n# Agent errors\n# Message errors\n# ...\n```\n\nVariables in curly braces (`{ $reason }`, `{ $name }`, `{ $error }`, `{ $id }`, `{ $step }`, etc.) are passed in at the call site when the error is raised.\n\n## Error Message Namespacing\n\nAll message identifiers follow the pattern `api-error-<domain>-<detail>`:\n\n| Prefix | Domain |\n|---|---|\n| `api-error-agent-*` | Agent lifecycle and execution |\n| `api-error-message-*` | Inter-agent messaging |\n| `api-error-template-*` | Template management |\n| `api-error-manifest-*` | Manifest parsing and verification |\n| `api-error-auth-*` | Authentication / API keys |\n| `api-error-session-*` | Session management |\n| `api-error-workflow-*` | Workflow orchestration |\n| `api-error-trigger-*` | Event triggers |\n| `api-error-budget-*` | Cost/token budgets |\n| `api-error-config-*` | Configuration read/write |\n| `api-error-profile-*` | Agent profiles |\n| `api-error-cron-*` | Scheduled (cron) jobs |\n| `api-error-goal-*` | Goal tracking |\n| `api-error-memory-*` | Proactive memory / KV store |\n| `api-error-network-*` | Peer networking / A2A |\n| `api-error-plugin-*` | Plugin installation |\n| `api-error-channel-*` | Inter-agent channels |\n| `api-error-provider-*` | LLM provider management |\n| `api-error-skill-*` | Skill creation and installation |\n| `api-error-hand-*` | Hand (capability) system |\n| `api-error-mcp-*` | MCP server configuration |\n| `api-error-integration-*` / `api-error-extension-*` | Integrations and extensions |\n| `api-error-system-*` | System-level errors |\n| `api-error-kv-*` | Structured key-value memory |\n| `api-error-approval-*` | Approval workflow |\n| `api-error-webhook-*` | Webhook triggers |\n| `api-error-backup-*` | Backup creation and restore |\n| `api-error-schedule-*` | Scheduled tasks |\n| `api-error-job-*` / `api-error-task-*` | Async job/task tracking |\n| `api-error-pairing-*` | Device pairing |\n| `api-error-binding-*` | Binding index |\n| `api-error-command-*` | Command dispatch |\n| `api-error-file-*` | File upload and workspace access |\n| `api-error-tool-*` | Tool invocation and allowlisting |\n| `api-error-validation-*` | Input validation |\n| `api-error-*` (unprefixed) | General catch-alls |\n\n## Locale Completeness\n\nEnglish (`en`) is the authoritative locale with the full set of messages. Other locales vary in coverage:\n\n| Locale | Coverage | Notes |\n|---|---|---|\n| `en` | Full | All domains including goal, memory, network, provider, skill, webhook, backup, schedule, file, tool, etc. |\n| `ja` | Full | Parity with English |\n| `de`, `es`, `fr`, `zh-CN` | Partial | Core domains (agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, general). Missing newer domains. |\n\nWhen a key is missing from a non-English locale, the Fluent system falls back to the English message. This means partial translations are safe to ship — untranslated errors will render in English rather than crashing.\n\n## Interpolation Variables\n\nThese are the variables referenced across messages. Call sites must supply them:\n\n| Variable | Used in | Example |\n|---|---|---|\n| `$reason` | `message-delivery-failed`, `bad-request`, `network-connection-failed`, `network-task-post-failed`, `webhook-url-unreachable` | Human-readable failure reason |\n| `$error` | `template-parse-failed`, `manifest-invalid`, `config-parse-failed`, `config-write-failed`, `agent-execution-failed`, `agent-clone-spawn-failed`, `cron-create-failed`, `schedule-save-failed`, `backup-dir-create-failed`, `skill-dir-create-failed`, etc. | Error detail or inner message |\n| `$name` | `template-not-found`, `profile-not-found`, `provider-alias-not-found`, `skill-missing-name`, `tool-not-found`, `command-not-found`, `webhook-unknown-event` | Resource identifier |\n| `$id` | `agent-not-found-with-id`, `goal-not-found-with-id`, `hand-not-found`, `provider-model-not-found`, `integration-not-found`, `extension-not-found` | Resource ID |\n| `$step` | `workflow-step-needs-agent` | Workflow step name |\n| `$alias` | `provider-alias-exists`, `provider-alias-not-found` | Provider alias |\n| `$url` | `network-a2a-not-found`, `network-missing-url` | URL parameter |\n| `$status` | `network-auth-failed` | HTTP status code |\n| `$field` | `agent-invalid-sort`, `cron-invalid-expression-detail` | Field name |\n| `$valid` | `agent-invalid-sort`, `webhook-unknown-event` | List of valid values |\n| `$max` | `skill-description-too-long`, `file-too-large` | Maximum allowed value |\n| `$provider` | `provider-model-exists` | Provider name |\n| `$event` | `webhook-unknown-event` | Event type string |\n\n## Adding a New Error Message\n\n1. **Add to `en/errors.ftl` first** — this is the source of truth. Follow the naming convention and include a section comment:\n\n   ```ftl\n   # NewDomain errors\n   api-error-newdomain-example-failed = Example operation failed: { $detail }\n   ```\n\n2. **Add to other locale files** as translations become available. Until then, the English fallback is used automatically.\n\n3. **Use kebab-case** for the identifier suffix and keep it descriptive. Avoid abbreviations that are unclear outside the API layer.\n\n## Adding a New Locale\n\nCreate a new directory under `locales/` using the appropriate language tag:\n\n```\nlocales/pt-BR/errors.ftl\n```\n\nStart by translating the general errors and the most common domain messages (agent, message, auth, session). The Fluent system handles missing-key fallback, so a partial translation is functional immediately.\n\n## Architecture Context\n\n```mermaid\ngraph LR\n    A[API Handler] -->|raises error with key + args| B[Error Layer]\n    B -->|looks up key| C[Fluent Runtime]\n    C -->|reads| D[\"locales/en/errors.ftl\"]\n    C -->|reads| E[\"locales/ja/errors.ftl\"]\n    C -->|reads| F[\"locales/.../errors.ftl\"]\n    C -->|returns localized string| B\n    B -->|responds to client| G[HTTP Response]\n```\n\nThis module is purely declarative — it contains no executable code. It is consumed by the Fluent localization runtime at the API error-handling layer. The runtime resolves a message identifier (e.g., `api-error-agent-not-found`) plus any interpolation arguments to a translated string for the current request locale.","other-librefang-types-src":"# Other — librefang-types-src\n\n# librefang-types-src — Model Catalog Types\n\nShared data structures for the model registry, used across the runtime, API layer, and metering kernel. This crate has no dependencies on application logic — it defines the **schema** that other crates agree on.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Catalog File (TOML)\"\n        MCF[ModelCatalogFile]\n        ACF[AliasesCatalogFile]\n    end\n\n    subgraph \"Provider Types\"\n        PCT[ProviderCatalogToml]\n        PI[ProviderInfo]\n        RC[RegionConfig]\n    end\n\n    subgraph \"Model Types\"\n        MCE[ModelCatalogEntry]\n        MO[ModelOverrides]\n        EC[EffectiveCapabilities]\n    end\n\n    MCF -->|optional provider| PCT\n    MCF -->|models array| MCE\n    ACF -->|aliases map| Aliases[\"HashMap&lt;String, String&gt;\"]\n    PCT -->|From impl| PI\n    PI -->|regions| RC\n    MCE -->|validate| ValErr[\"Result&lt;(), String&gt;\"]\n    MO -->|applied over| MCE\n    MO -->|resolves to| EC\n```\n\n## Model Classification Enums\n\n### `ModelTier`\n\nCapability tier for pricing and selection heuristics. Serialized as lowercase strings (`\"frontier\"`, `\"smart\"`, etc.). Default is `Balanced`.\n\n| Variant | Typical models |\n|---|---|\n| `Frontier` | Claude Opus, GPT-4.1 |\n| `Smart` | Claude Sonnet, Gemini 2.5 Flash |\n| `Balanced` | GPT-4o-mini, Groq Llama |\n| `Fast` | Cheapest models for simple tasks |\n| `Local` | Ollama, vLLM, LM Studio |\n| `Custom` | User-defined models added at runtime |\n\n### `Modality`\n\nWhat kind of output a model produces. Governs whether `context_window` / `max_output_tokens` are required — non-text modalities may legitimately omit them.\n\n- `Text` (default) — chat/completion/reasoning models\n- `Image`, `Audio`, `Video`, `Music` — generative models priced per-call\n\n### `ModelType`\n\nBroader model classification: `Chat` (default), `Speech` (TTS/STT), or `Embedding`.\n\n## `AuthStatus` — Provider Authentication State\n\nTracks the lifecycle of provider credentials, from detection through validation:\n\n```\nMissing ──► Configured ──► ValidatedKey\n  │              │\n  │              ▼\n  │         InvalidKey\n  │\n  ├─► AutoDetected (fallback env var)\n  ├─► ConfiguredCli ──► (or CliNotInstalled)\n  └─► NotRequired (local) ──► LocalOffline\n```\n\n**`is_available()`** returns `true` for states where the provider is usable: `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Returns `false` for `InvalidKey` — the key exists but was rejected.\n\n`LocalOffline` is a special state set by the probe subsystem. Unlike `Missing`, the `detect_auth()` function does **not** reset it; only the probe itself transitions back to `NotRequired` when the service comes back up.\n\n## `ModelCatalogEntry` — Core Model Record\n\nThe central type representing a model in the registry. Key fields:\n\n| Field | Notes |\n|---|---|\n| `id` | Canonical identifier (e.g. `\"claude-sonnet-4-20250514\"`) |\n| `display_name` | Human-readable name |\n| `provider` | Provider identifier (e.g. `\"anthropic\"`) |\n| `tier` | `ModelTier` classification |\n| `modality` | `Modality` — defaults to `Text` when absent in TOML |\n| `context_window` | Tokens; `0` means unknown/N/A |\n| `max_output_tokens` | Tokens; `0` means unknown/N/A |\n| `input_cost_per_m` / `output_cost_per_m` | USD per million tokens |\n| `image_input_cost_per_m` / `image_output_cost_per_m` | Optional; only for multimodal/image-gen models |\n| `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking` | Boolean capability flags |\n| `reasoning_echo_policy` | `ReasoningEchoPolicy` for OpenAI-compat drivers |\n| `aliases` | Short names for lookup (e.g. `[\"sonnet\", \"claude-sonnet\"]`) |\n\n### Validation\n\n**`validate()`** enforces modality-aware rules after TOML deserialization:\n\n- **Text models**: `context_window` and `max_output_tokens` must be non-zero. A zero value from a missing TOML field would silently propagate into compaction thresholds and budget math — this check prevents that.\n- **Non-text models** (Image, Audio, Video, Music): these fields are optional and may remain zero.\n\nCatalog loaders **must** call `validate()` and reject entries that fail. The API route for adding custom models (`add_custom_model` in `routes/providers.rs`) does this.\n\n### Helper\n\n- `is_image_generation()` — shorthand for `self.modality == Modality::Image`.\n\n## `ReasoningEchoPolicy` — Multi-Turn Reasoning Wire Format\n\nThe OpenAI-compatible ecosystem has incompatible conventions for the `reasoning_content` field on historical assistant turns. This enum encodes the correct behavior per model, avoiding fragile substring-matching on model names:\n\n| Variant | Behavior | Provider example |\n|---|---|---|\n| `None` (default) | Omit `reasoning_content` on history | Most providers |\n| `Strip` | Strip historical `reasoning_content`; force non-null `content` on empty assistant turns | DeepSeek R1 / `deepseek-reasoner` |\n| `Echo` | Echo original thinking text on `tool_calls` turns | DeepSeek V4 Flash (thinking mode on) |\n| `EmptyString` | Send empty-string `reasoning_content` on `tool_calls` turns, disable thinking wire-side | Moonshot / Kimi K2 |\n\nDrivers that don't use the OpenAI chat-completions format (Anthropic, Gemini) ignore this entirely. The `#[non_exhaustive]` attribute allows adding new variants if a future provider needs only one of the co-occurring behaviors currently bundled under `Strip`.\n\n## `ModelOverrides` — Per-Model User Overrides\n\nPersisted to `~/.librefang/model_overrides.json` keyed by `provider:model_id`. Every field is `Option` — `None` means \"defer to agent or system default.\" The resolution order is:\n\n```\nagent-level ModelConfig → ModelOverrides → system defaults\n```\n\nCapability fields (`supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`) can force a capability on or off regardless of what the catalog declares. This lets users correct provider metadata that is wrong, missing, or non-standard (ref #4745).\n\nOther notable fields:\n\n- `use_max_completion_tokens` — use `max_completion_tokens` instead of `max_tokens` in API requests\n- `no_system_role` — model does not support a system role message\n- `force_max_tokens` — send `max_tokens` even when the provider doesn't require it\n- `reasoning_effort` — string level: `\"low\"`, `\"medium\"`, `\"high\"`\n\n**`is_empty()`** returns `true` only when every field is `None`.\n\n## `EffectiveCapabilities`\n\nResolved capabilities after applying `ModelOverrides` on top of a `ModelCatalogEntry`. Produced by `ModelCatalog::effective_capabilities` in `librefang-runtime` and consumed by code that gates runtime behavior (tool gating, vision input validation):\n\n```rust\npub struct EffectiveCapabilities {\n    pub supports_tools: bool,\n    pub supports_vision: bool,\n    pub supports_streaming: bool,\n    pub supports_thinking: bool,\n}\n```\n\n## Provider Types\n\n### `ProviderCatalogToml` → `ProviderInfo`\n\nTwo structs represent providers at different stages:\n\n- **`ProviderCatalogToml
