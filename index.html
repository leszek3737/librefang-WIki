  U->>S: Retry original route with token\n```\n\n## Key Components\n\n### HTML Form (`<form id=\"f\">`)\n\n| Field | ID | Name | Notes |\n|---|---|---|---|\n| Username | `#u` | `username` | `required`, auto-focused |\n| Password | `#p` | `password` | `type=\"password\"`, `required` |\n| TOTP code | `#t` | `totp_code` | Hidden by default; shown only when the server responds with `requires_totp`. Accepts 6 numeric digits. |\n\nThe form has `autocomplete=\"on\"`, allowing browsers to populate saved credentials. Each field uses standard `autocomplete` attributes (`username`, `current-password`, `one-time-code`) for correct browser autofill behavior.\n\n### TOTP Challenge Handling\n\nThe TOTP row (`#totp-row`) starts hidden. After the first login attempt, if the server response contains `requires_totp: true`, the JavaScript:\n\n1. Sets the internal `requiresTotp` flag to `true`.\n2. Unhides the TOTP input field.\n3. Focuses the TOTP input.\n4. Displays a prompt: *\"Enter your 6-digit TOTP code.\"*\n\nAll subsequent submissions include `totp_code` in the payload alongside `username` and `password`.\n\n### JavaScript Submission Logic\n\nThe inline `<script>` block handles form submission via `fetch`:\n\n- **Endpoint:** `POST /api/auth/dashboard-login`\n- **Content type:** `application/json`\n- **Credentials:** `same-origin` (sends cookies for CSRF/session purposes)\n- **Payload shape:**\n  ```json\n  {\n    \"username\": \"...\",\n    \"password\": \"...\",\n    \"totp_code\": \"123456\"   // only if required\n  }\n  ```\n\n#### Server Response Handling\n\n| Response condition | Client behavior |\n|---|---|\n| `d.ok === true` and `d.token` is present | Stores `d.token` under `localStorage` key `librefang-api-key`, then calls `location.replace()` to navigate to the originally requested URL (or `/dashboard/` as fallback). |\n| `d.requires_totp === true` | Reveals the TOTP field and prompts the user. |\n| Any other failure | Displays `d.error` or a generic *\"Sign in failed.\"* message in the `#err` element. |\n| Network error | Displays *\"Network error.\"* |\n\nThe submit button (`#btn`) is disabled during the in-flight request and re-enabled in the `finally` block to prevent double-submission.\n\n### Redirect Behavior\n\nAfter successful authentication, the script preserves the user's original destination:\n\n```javascript\nvar target = location.pathname + location.search + location.hash;\nif (!target || target === '/') target = '/dashboard/';\nlocation.replace(target);\n```\n\nThis means if the login page was served at `/dashboard/settings?tab=alerts`, the user lands back on `/dashboard/settings?tab=alerts` after logging in. When the login page is the root (`/`), it redirects to `/dashboard/` by default.\n\n### Theming and Styling\n\nThe page supports both dark and light color schemes via `prefers-color-scheme`:\n\n- **Dark mode (default):** Dark background (`#0b0d12`), dark card (`#12151c`), light text (`#e6e8ee`).\n- **Light mode:** White card on light gray (`#f6f7fb`), dark text (`#1a1c22`). Overridden via a `@media (prefers-color-scheme: light)` block.\n\nThe layout uses CSS Grid (`place-items: center`) to center the card both horizontally and vertically. The card is capped at `380px` width and scales down via `min(92vw, 380px)` on small screens.\n\n## Integration with the Rest of the Codebase\n\n### Token Storage Contract\n\nOn success, the token is written to `localStorage` under the key **`librefang-api-key`**. Any dashboard client code or middleware that needs to authenticate API requests should read the token from this same key and include it in request headers (typically `Authorization: Bearer <token>` or a custom header).\n\n### Backend Endpoint Dependency\n\nThis page depends on the backend exposing:\n\n- **`POST /api/auth/dashboard-login`** — Accepts `{username, password[, totp_code]}`, returns `{ok: true, token: \"...\"}` on success or `{requires_totp: true}` / `{error: \"...\"}` on failure.\n\n### Configuration Reference\n\nThe footer line — *\"Auth required — configured in `config.toml`.\"* — is a static hint to administrators. The actual authentication configuration (credentials, TOTP settings) lives in the server-side `config.toml`, not in this file.\n\n## Accessibility Notes\n\n- The error region uses `aria-live=\"polite\"` so screen readers announce login failures without interrupting.\n- The `<main>` element has `role=\"main\"`.\n- The `robots` meta tag is set to `noindex, nofollow` to prevent search engine indexing of the login page.","other-librefang-api-static":"# Other — librefang-api-static\n\n# librefang-api-static — UI Locale Files\n\n## Purpose\n\nThis module holds the **static internationalization (i18n) locale files** for the LibreFang web dashboard. Every user-facing string rendered in the browser — button labels, status messages, toast notifications, page headings, error text, and onboarding copy — is defined here rather than hard-coded in components.\n\nTwo locales are currently provided:\n\n| File | Language | Role |\n|---|---|---|\n| `locales/en.json` | English (`en`) | Primary / fallback locale |\n| `locales/ja.json` | Japanese (`ja`) | Secondary locale |\n\nThe frontend i18n library loads the matching JSON at runtime based on the user's language preference and falls back to `en.json` when a key is missing from the active locale.\n\n## Structure of a Locale File\n\nEach JSON file is a single flat-to-nested object. Keys are grouped by **logical feature area** (page, component, or domain concept). The top-level namespaces are:\n\n```\nnav          – sidebar / top-bar navigation labels\nstatus       – connection / readiness status strings\nbtn          – reusable button labels\nlabel        – generic field labels\nauth         – API-key gate screen\npage         – page-level titles\nhealth       – health-check badges\nstat         – dashboard stat card headers\ncard         – dashboard card titles\nagents       – agent list header actions\ndetail       – agent detail pane (Info / Files / Config tabs)\nmode         – observe / assist / full mode labels\ncategory     – agent template categories\nprofile      – tool profile names & descriptions\ntemplate     – 10 built-in agent templates (name + desc)\ntime         – relative-time formatting\nonboarding   – first-launch banner\nprovider     – LLM provider setup banner\noverview     – Overview dashboard page\nsecurity     – security system short names\nagentChat    – chat view (messages, commands, toasts, sys messages)\nsessionsPage – Sessions & Memory management page\nagentsPage   – Agents page (create, spawn, stop, config)\napprovals    – execution approval queue\nlogsPage     – live logs + audit trail\nruntimePage  – runtime info display\nsettingsPage – Settings (providers, models, tools, security, network,\n               budget, proactive memory, system, migration)\nworkflowsPage – workflow list & execution\nworkflowBuilder – visual workflow builder (node palette, canvas)\nschedulerPage – cron jobs, event triggers, run history\nchannelsPage – messaging channel setup (Telegram, Discord, Slack, etc.)\nskillsPage   – skills browser, ClawHub, MCP servers\nhandsPage    – curated autonomous capability packages\npluginsPage  – plugin management\ncommsPage    – inter-agent communication / topology\nsetupWizard  – guided first-run wizard (5 steps)\ngoalsPage    – hierarchical goals with sub-goals\nanalyticsPage – token/cost analytics (summary, by model, by agent, costs)\nmemoryPage   – proactive memory browser\ntheme        – light / dark / system toggle\nsidebar      – keyboard shortcut hints\nconfirm      – generic confirm dialog buttons\n```\n\nSupplementary namespaces (`agentChat2`, `settingsPage2`, `agentsPage2`, etc.) hold additional keys that are appended or overridden for specific UI variants.\n\n## Interpolation\n\nStrings use `{placeholder}` syntax for dynamic values. The frontend i18n layer replaces these at render time.\n\nExamples from `en.json`:\n\n```json\n\"stepsCompleted\": \"{count} of 5 steps completed\",\n\"agentsStopped\": \"{count} agent(s) stopped\",\n\"providerConnected\": \"{provider} connected ({latency}ms)\",\n\"keySaved\": \"Key \\\"{key}\\\" saved\"\n```\n\nAll placeholders must be preserved exactly when translating. A missing placeholder in a translated string will surface as the literal text `{placeholderName}` in the UI.\n\n## Adding a New String\n\n1. **Identify the correct namespace.** If the string belongs to an existing page, add it under that page's object (e.g. `settingsPage.budgetTitle`). For cross-cutting UI elements, use `btn`, `label`, or `status`.\n\n2. **Add the key to `en.json` first.** This is the canonical source of truth.\n\n3. **Add the translated key to every other locale file** (`ja.json`, and any future locales). If the translation is not yet available, copy the English value — the i18n fallback mechanism will handle it, but explicit entries make it obvious what still needs translation.\n\n4. **Use the key in the component** via whatever i18n function the frontend provides (e.g. `t('settingsPage.budgetTitle')`).\n\n## Adding a New Locale\n\n1. Create `locales/<code>.json` (e.g. `locales/fr.json`).\n2. Copy the full structure from `en.json` — every key must exist.\n3. Translate all values, keeping `{placeholder}` tokens intact.\n4. Register the new locale in the frontend i18n configuration so it is loaded and selectable in the theme/language picker.\n\n## Key Conventions\n\n| Convention | Example | Purpose |\n|---|---|---|\n| **Page-scoped keys** | `logsPage.title`, `runtimePage.agents` | Groups strings with the page that renders them |\n| **Nested sub-groups** | `logsPage.filter.pending`, `agentChat.cmd.help` | Avoids long flat key names; mirrors component hierarchy |\n| **Toast messages** | `agentsPage.agentStopped` | User-visible success/error notifications |\n| **Error messages** | `agentsPage.spawnFailed` | Always include `{message}` placeholder for backend error detail |\n| **Confirm dialogs** | `agentsPage.stopAgentTitle`, `agentsPage.stopAgentConfirm` | Paired title + body text for destructive action modals |\n| **Status enums** | `approvals.status.pending`, `commsPage.state.running` | Finite-state display labels |\n\n## Relationship to the Rest of the Codebase\n\n```mermaid\ngraph LR\n    A[Frontend Components] -->|t('key')| B[i18n Library]\n    B -->|loads| C[locales/en.json]\n    B -->|loads| D[locales/ja.json]\n    A -->|renders strings| E[Browser DOM]\n    F[Backend API] -->|error messages| A\n```\n\n- **Frontend components** call `t('namespace.key')` to resolve a localized string.\n- The **i18n library** loads the active locale JSON at app init and falls back to `en` for missing keys.\n- **Backend API responses** return raw error text; the frontend wraps it via `{message}` placeholders (e.g. `spawnFailed: \"Spawn failed: {message}\"`).\n- No backend code reads these files — they are served purely as static assets to the browser.\n\n## Coverage Notes\n\nThe English locale (`en.json`) contains approximately **1 100+ keys** covering 25+ page/feature areas. The Japanese locale (`ja.json`) provides full parallel coverage. The `ja.json` file is truncated in the source snapshot but follows the identical structure; any missing tail keys fall back to English automatically.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests — HTTP Integration Test Suite\n\n## Purpose\n\nThis module contains real-HTTP integration tests for the LibreFang API. Every test boots a live `LibreFangKernel`, binds an axum HTTP server to a random port on `127.0.0.1`, and exercises endpoints through `reqwest` (or axum `oneshot`) with no mocks or stubs. The goal is to verify the full request-to-response path — middleware, routing, handler logic, kernel integration — under realistic conditions.\n\nTests that make actual LLM calls are gated behind the `GROQ_API_KEY` environment variable and are silently skipped when the key is absent.\n\n**Run command:**\n```bash\ncargo test -p librefang-api --test api_integration_test -- --nocapture\n```\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Test Harnesses\"\n        TS[TestServer<br/>binds random TCP port<br/>uses reqwest Client]\n        FR[FullRouterHarness<br/>in-process oneshot<br/>uses axum::Router directly]\n    end\n\n    subgraph \"Server Construction\"\n        STS[start_test_server]\n        STL[start_test_server_with_llm]\n        SFR[start_full_router]\n        SAR[start_test_server_with_rbac_users]\n        SFP[start_test_server_with_full_user_configs]\n    end\n\n    TS --> STS\n    TS --> STL\n    TS --> SAR\n    TS --> SFP\n    FR --> SFR\n\n    subgraph \"Shared Infrastructure\"\n        K[LibreFangKernel::boot_with_config]\n        AS[AppState construction]\n        TMP[tempfile::TempDir]\n    end\n\n    STS --> K\n    STL --> K\n    SFR --> K\n    SAR --> K\n    SFP --> K\n    K --> AS\n    K --> TMP\n```\n\n## Test Harnesses\n\n### `TestServer` — Live HTTP Server\n\nBoots a kernel, constructs an `AppState`, builds a minimal or full axum `Router`, binds to `127.0.0.1:0` (OS-assigned port), and returns the base URL. Tests use a `reqwest::Client` to send real HTTP requests.\n\n- **Cleanup:** The `Drop` implementation calls `state.kernel.shutdown()`.\n- **Tempdir:** Held alive via `_tmp: tempfile::TempDir` so the kernel's data directory persists for the test lifetime.\n\n**Construction functions:**\n\n| Function | Purpose |\n|---|---|\n| `start_test_server()` | Uses ollama provider (no API key needed). Suitable for all non-LLM tests. |\n| `start_test_server_with_llm()` | Uses Groq provider. Requires `GROQ_API_KEY`. |\n| `start_test_server_with_provider(provider, model, api_key_env)` | Generic provider configuration. |\n| `start_test_server_with_auth(api_key)` | Enables Bearer-token auth middleware with `middleware::AuthState`. |\n| `start_test_server_with_rbac_users(api_key, users)` | Seeds `UserConfig` rows with hashed API keys, wires audit/budget/authz/user routers, enables RBAC middleware. |\n| `start_test_server_with_full_user_configs(api_key, users)` | Same as above but accepts pre-built `UserConfig` structs so per-user policy fields (`tool_policy`, `memory_access`, `budget`, `channel_tool_rules`) can be precisely seeded. |\n\n### `FullRouterHarness` — In-Process Router\n\nCalls `server::build_router()` (the production router builder) and exercises it via `axum::Router::oneshot()`. This avoids a TCP round-trip and allows testing routes that aren't manually wired into the `TestServer` harness (versioned API, dashboard locales, providers, migration, hands, etc.).\n\n- **Cleanup:** `Drop` calls `state.kernel.shutdown()`.\n- **Registry sync:** Calls `registry_sync::sync_registry` to populate the model catalog before kernel boot.\n\n### `start_full_router_with_proactive(enabled)` — Memory Config Variant\n\nA specialized `FullRouterHarness` builder that sets `proactive_memory.enabled` to a specific boolean. Used for the issue #3070 regression tests.\n\n## Test Manifests\n\nFour TOML manifests are defined as constants, each exercising different agent configurations:\n\n| Constant | Provider | Capabilities | Purpose |\n|---|---|---|---|\n| `TEST_MANIFEST` | ollama | `tools=[\"file_read\"]` | General agent CRUD tests |\n| `TEST_MANIFEST_B` | ollama | `tools=[\"file_read\"]` | Distinct agent for cross-session guard tests |\n| `LLM_MANIFEST` | groq | `tools=[\"file_read\"]` | Real LLM round-trip (requires `GROQ_API_KEY`) |\n| `MCP_TEST_MANIFEST` | ollama | `tools=[\"cron_list\",\"cron_create\",\"cron_cancel\"]` | `/mcp` bridge caller-context tests |\n\n## Test Categories\n\n### Health & Status\n\n| Test | Endpoint | Asserts |\n|---|---|---|\n| `test_health_endpoint` | `GET /api/health` | Status `ok`, version present, `x-request-id` header, no sensitive fields leaked |\n| `test_status_endpoint` | `GET /api/status` | `running`, agent count, uptime, default provider, agent list |\n| `test_request_id_header_is_uuid` | `GET /api/health` | `x-request-id` is a valid UUID |\n\n### API Versioning (FullRouterHarness)\n\n| Test | Asserts |\n|---|---|\n| `test_build_router_exposes_versioned_api_aliases` | Both `/api/health` and `/api/v1/health` return 200 with `x-api-version: v1`. `/api/versions` returns supported versions. |\n| `test_build_router_path_version_beats_unknown_accept_header` | Path-based versioning wins over `Accept: application/vnd.librefang.v99+json` |\n| `test_build_router_unauthorized_responses_include_api_version_header` | 401 responses still carry `x-api-version: v1` |\n\n### Dashboard & Static Assets (FullRouterHarness)\n\n| Test | Asserts |\n|---|---|\n| `test_build_router_serves_dashboard_locales` | `/locales/{en,zh-CN,ja}.json` returns correct translation keys |\n\n### Providers (FullRouterHarness)\n\n| Test | Asserts |\n|---|---|\n| `test_build_router_providers_marks_local_providers` | `/api/providers` lists ollama with `is_local: true` |\n\n### Migration (FullRouterHarness)\n\n| Test | Asserts |\n|---|---|\n| `test_run_migrate_uses_daemon_home_when_target_dir_is_empty` | `POST /api/migrate` with empty `target_dir` writes config, agent, and migration report to the daemon's home directory. Injects `ConnectInfo` for loopback auth. |\n\n### Agent CRUD\n\n| Test | Flow |\n|---|---|\n| `test_spawn_list_kill_agent` | Spawn → verify 201 + `agent_id` → list shows 2 agents → kill → list shows 1 |\n| `test_multiple_agents_lifecycle` | Spawn 3 → list shows 4 (incl. default assistant) → kill one → kill rest → only default remains |\n| `test_invalid_agent_id_returns_400` | Bad UUID paths return 400 with \"Invalid\" error |\n| `test_kill_nonexistent_agent_returns_404` | Valid but unknown UUID returns 404 |\n| `test_spawn_invalid_manifest_returns_400` | Malformed TOML returns 400 with \"Invalid manifest\" |\n\n### Agent Sessions\n\n| Test | Endpoint | Asserts |\n|---|---|---|\n| `test_agent_session_empty` | `GET /api/agents/{id}/session` | Fresh agent has 0 messages |\n| `test_get_agent_session_rejects_cross_agent_session_id` | `GET /api/agents/{A}/session?session_id={B's}` | Cross-agent read → 404, malformed UUID → 400, same-agent round-trip → 200 |\n| `test_agent_session_trajectory_export_empty` | `GET /api/agents/{id}/sessions/{sid}/trajectory` | JSON bundle with schema/metadata/messages. JSONL format returns NDJSON with metadata header line. Correct `content-type` and `content-disposition`. |\n| `test_agent_session_trajectory_404_on_unknown_session` | Random session UUID → 404 |\n\n### Agent Monitoring\n\n| Test | Asserts |\n|---|---|\n| `test_agent_monitoring_endpoints` | `/metrics` returns `token_usage`, `tool_calls`, `avg_response_time_ms`. `/logs?level=custom_error&n=10` filters correctly. |\n\n### Agent List Pagination, Sorting, Search\n\n| Test | Query Params | Asserts |\n|---|---|---|\n| `test_agent_list_paginated_response_format` | (none) | Response has `items`, `total`, `offset`, `limit` |\n| `test_agent_list_invalid_sort_returns_400` | `sort=invalid_field` | 400 with \"Invalid sort field\" |\n| `test_agent_list_valid_sort_fields` | `sort=name\\|created_at\\|last_active\\|state` | All return 200 |\n| `test_agent_list_limit_clamped_to_max` | `limit=9999` | Response `limit` clamped to 100 |\n| `test_agent_list_pagination` | `limit=1&offset=0` then `offset=1` | Each page returns 1 item, total ≥ 3 |\n| `test_agent_list_text_search` | `q=unique-searchable` / `q=nonexistent` | Matches by name; empty result for no match |\n\n### Config Reload\n\n| Test | Asserts |\n|---|---|\n| `test_config_reload_hot_reloads_proxy_changes` | `POST /api/config/reload` after writing proxy config → `restart_required: false`, `hot_actions_applied` contains `\"ReloadProxy\"` |\n\n### Tools\n\n| Test | Endpoint | Asserts |\n|---|---|---|\n| `test_list_tools` | `GET /api/tools` | `tools` array, `total > 0` |\n| `test_get_tool_found` | `GET /api/tools/{name}` | Name, description, `input_schema` |\n| `test_get_tool_not_found` | `GET /api/tools/nonexistent` | 404 |\n\n### Workflows\n\n| Test | Flow |\n|---|---|\n| `test_workflow_crud` | Create workflow with one step → list shows 1 workflow with correct shape |\n\n### Triggers\n\n| Test | Flow |\n|---|---|\n| `test_trigger_crud` | Create lifecycle trigger → list (unfiltered + filtered) → delete → list empty |\n\n### Auth\n\n| Test | Server Config | Asserts |\n|---|---|---|\n| `test_auth_health_is_public` | api_key set | `/api/health` returns 200 without token |\n| `test_auth_rejects_no_token` | api_key set | Protected endpoint → 401 \"Missing\" |\n| `test_auth_rejects_wrong_token` | api_key set | Wrong Bearer → 401 \"Invalid\" |\n| `test_auth_accepts_correct_token` | api_key set | Correct Bearer → 200 |\n| `test_auth_disabled_when_no_key` | no api_key | Protected endpoint → 200 without token |\n\n### LLM Integration (requires `GROQ_API_KEY`)\n\n| Test | Asserts |\n|---|---|\n| `test_send_message_with_llm` | Full round-trip: spawn Groq agent → send message → receive non-empty response with `input_tokens > 0`, `output_tokens > 0` → session has messages |\n\n### MCP Bridge (`/mcp`)\n\nTests for issue #2699 — the `/mcp` endpoint must rehydrate caller context from the `X-LibreFang-Agent-Id` header.\n\n| Test | Scenario | Expected |\n|---|---|---|\n| `test_mcp_http_rehydrates_caller_context_from_agent_header` | No header vs. valid header | No header → error \"Agent ID required\". With header → success (empty cron list). |\n| `test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated` | Garbage / unknown UUID | Degrades gracefully to unauthenticated error path (not 500) |\n| `test_mcp_http_unrestricted_agent_can_call_any_tool` | Manifest with no `[capabilities]` | `cron_list` succeeds (empty capabilities = unrestricted) |\n| `test_mcp_http_enforces_agent_tool_allowlist` | Manifest with only `file_read` | `cron_list` → \"Permission denied\" |\n\n### Hands\n\n| Test | Asserts |\n|---|---|\n| `list_active_hands_includes_definition_metadata` | `/api/hands/active` returns `hand_name`, `hand_icon`, `coordinator_role`, `agent_ids` map — not just legacy `agent_id` |\n| `hand_runtime_config_patch_supports_tristate_and_404` | `PATCH /api/agents/{id}/hand-runtime-config` with set/preserve/clear semantics. Nullable fields (`api_key_env`, `base_url`) use tri-state: absent = preserve, `null` = preserve, empty/whitespace = clear. Unknown agent → 404. |\n\n### Multi-Client Session Streaming\n\n| Test | Asserts |\n|---|---|\n| `test_attach_session_stream_404_for_unknown_agent` | Unknown agent/session → 404 |\n| `test_attach_session_stream_fans_out_to_multiple_clients` | Two concurrent SSE clients attach to the same session stream. After confirming `receiver_count ≥ 2`, a `StreamEvent::TextDelta` is published via the kernel's session stream hub. Both clients receive it. |\n\n### Memory (Issue #3070)\n\nRegression tests ensuring disabled proactive memory returns 200, not 500.\n\n| Test | Proactive | Asserts |\n|---|---|---|\n| `test_memory_list_returns_200_when_proactive_disabled` | `false` | `proactive_enabled: false`, `total: 0`, empty `memories` array |\n| `test_memory_stats_returns_200_when_proactive_disabled` | `false` | `proactive_enabled: false`, `stats: null` |\n| `test_memory_list_includes_proactive_enabled_when_enabled` | `true` | `proactive_enabled: true`, `memories` array, `total` number |\n| `test_memory_stats_includes_proactive_enabled_when_enabled` | `true` | `proactive_enabled: true`, numeric fields |\n\n### RBAC — Audit & Budget Endpoints\n\nTests for admin-only endpoints: `/api/audit/query`, `/api/audit/export`, `/api/budget/users`, `/api/budget/users/{id}`.\n\n| Test | Caller | Asserts |\n|---|---|---|\n| `test_audit_query_rejects_anonymous` | No Bearer | 401 — middleware rejects before handler |\n| `test_audit_query_rejects_viewer_admin_returns_200` | Viewer vs Admin | Viewer → 403 (in-handler `require_admin` gate). Admin → 200 with `entries`, `count`, `limit`. |\n| `test_audit_export_csv_emits_documented_headers` | Admin | `Content-Type: text/csv`, `Content-Disposition: attachment; ...audit.csv`, CSV header row includes `prev_hash` as last column |\n| `test_user_budget_detail_includes_enforced_true` | Admin | `enforced: true`, hourly/daily/monthly spend numerics, `alert_breach` boolean |\n\n### RBAC — Effective Permissions (`/api/authz/effective/{user_id}`)\n\n| Test | Caller | Asserts |\n|---|---|---|\n| `test_effective_permissions_admin_returns_200_with_full_payload` | Admin | All seeded policy fields round-trip: `tool_policy`, `tool_categories`, `memory_access` (incl. `pii_access`), `budget`, `channel_tool_rules`, `channel_bindings` |\n| `test_effective_permissions_viewer_rejected_403` | Viewer | 403 — in-handler gate |\n| `test_effective_permissions_unknown_user_404` | Admin | Unknown user → 404, not a synthesised guest payload |\n| `test_effective_permissions_rejects_anonymous` | No Bearer | 401 |\n| `test_effective_permissions_distinguishes_none_from_empty` | Admin | `tool_policy: null` (omitted) vs `tool_policy: {allowed_tools: [], denied_tools: []}` (explicit empty). Same for `tool_categories` and `memory_access`. |\n\n### RBAC — Authz Check\n\n| Test | Asserts |\n|---|---|\n| `test_authz_check_returns_allow_for_permitted_tool` | Permitted tool → `decision: \"allow\"` |\n\n## Helper Functions\n\n### `loopback_get(uri)`\n\nConstructs a `Request<Body>` with an injected `ConnectInfo` extension set to `127.0.0.1:0`. Required for `oneshot` tests because production axum populates `ConnectInfo` from the connection layer, but `oneshot` bypasses it. Without this, the auth middleware's fail-closed branch would reject requests from what it sees as a non-loopback origin.\n\n### `call_mcp_cron_list(server, agent_header)`\n\nSends a JSON-RPC `tools/call` for `cron_list` to the `/mcp` endpoint, optionally setting `X-LibreFang-Agent-Id`. Returns `(StatusCode, serde_json::Value)`.\n\n## Key Design Decisions\n\n1. **Real kernel, real HTTP.** No mocks. Every test boots `LibreFangKernel::boot_with_config` with a temp directory, ensuring the API layer is tested against actual kernel behavior.\n\n2. **Temp directory lifecycle.** The `tempfile::TempDir` is stored in the harness struct. When the test completes and the harness drops, the temp directory is cleaned up. The kernel's `shutdown()` is called explicitly in `Drop` before the tempdir vanishes.\n\n3. **Default assistant auto-spawned.** The kernel spawns a default \"assistant\" agent on boot. Tests account for this — agent counts include this default agent.\n\n4. **Ollama as default test provider.** `start_test_server()` uses ollama with a fake model name, which lets the kernel boot and routes function without any real LLM credentials. Only `test_send_message_with_llm` requires a real API key.\n\n5. **Auth middleware `allow_no_auth: true`.** The test harnesses set this flag so that requests without a Bearer token are allowed through to the handler layer. This lets the in-handler `require_admin` gates be tested directly (returning 403) rather than being short-circuited by middleware 401s. Production sets this based on the server's open/closed configuration.\n\n6. **Two-layer auth testing.** Some endpoints (audit, authz) have both middleware-level and handler-level access control. Tests verify both: middleware rejection for anonymous callers, and in-handler `require_admin` rejection for authenticated but under-privileged callers.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nThe HTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate exposes a RESTful API and WebSocket endpoints for managing agents, channels, skills, sessions, extensions, and all other LibreFang subsystems. It also serves the embedded React-based dashboard UI.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Client[Browser / API Client]\n    API[librefang-api<br/>Axum + Tower]\n    Client -->|HTTP / WebSocket| API\n    API --> KT[librefang-kernel]\n    API --> RT[librefang-runtime]\n    API --> CH[librefang-channels]\n    API --> SK[librefang-skills]\n    API --> HD[librefang-hands]\n    API --> EX[librefang-extensions]\n    API --> MEM[librefang-memory]\n    API --> WR[librefang-wire]\n    API --> MG[librefang-migrate]\n    API --> TY[librefang-types]\n    API --> TM[librefang-telemetry]\n```\n\nThe API layer is a thin coordination surface. Nearly all business logic lives in the kernel and domain crates; the API handlers translate HTTP requests into calls against those crates and serialize responses.\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `axum` + `tower` + `tower-http` | HTTP framework, middleware stack, CORS, compression, tracing layers |\n| `utoipa` | OpenAPI 3.x spec generation from handler signatures and types |\n| `schemars` | JSON Schema generation for types (used by utoipa) |\n| `librefang-kernel` | Core domain logic, state management, agent lifecycle |\n| `librefang-runtime` | Process registry, execution runtime |\n| `librefang-channels` | Messaging channel integrations (Telegram, Discord, Slack, etc.) |\n| `librefang-skills` | Skill definitions and execution |\n| `librefang-hands` | Tool/hand system for agent actions |\n| `librefang-extensions` | Extension loading, vault for secrets |\n| `librefang-memory` | Conversation and long-term memory storage |\n| `librefang-wire` | Wire protocol types for inter-service communication |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-telemetry` | Observability infrastructure |\n\n## Authentication and Security\n\nThe crate pulls in several cryptography-adjacent crates:\n\n- **`jsonwebtoken`** — JWT token issuance and validation for API authentication.\n- **`argon2`** — Password hashing for user credentials.\n- **`hmac`** + **`sha2`** — HMAC-based request signing or token verification.\n- **`subtle`** — Constant-time comparisons to prevent timing attacks during auth checks.\n- **`governor`** — Rate limiting middleware to protect endpoints from abuse.\n\n## Feature Flags\n\nFeatures control which channel backends and telemetry capabilities are compiled in.\n\n### Channel Features\n\nEach `channel-*` feature forwards directly to the corresponding feature in `librefang-channels`. Available channels include:\n\n`telegram`, `discord`, `slack`, `matrix`, `email`, `voice`, `webhook`, `whatsapp`, `signal`, `teams`, `mattermost`, `irc`, `google-chat`, `twitch`, `rocketchat`, `zulip`, `xmpp`, `bluesky`, `feishu`, `line`, `mastodon`, `messenger`, `reddit`, `revolt`, `viber`, `flock`, `guilded`, `keybase`, `nextcloud`, `nostr`, `pumble`, `threema`, `twist`, `webex`, `dingtalk`, `discourse`, `gitter`, `gotify`, `linkedin`, `mumble`, `ntfy`, `qq`, `wechat`, `wecom`\n\n### Feature Groups\n\n| Feature | Description |\n|---|---|\n| `all-channels` | Enables all 44 channel backends. Included in `default`. |\n| `mini` | Enables 12 core channels (Telegram, Discord, Slack, Matrix, Email, Webhook, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat). |\n| `telemetry` | Enables OpenTelemetry tracing export and Prometheus metrics. Included in `default`. |\n| `default` | `all-channels` + `telemetry` |\n\nTo build a minimal binary with only the channels you need:\n\n```toml\n# In a workspace override or direct dependency\n[dependencies]\nlibrefang-api = { path = \"...\", default-features = false, features = [\"channel-telegram\", \"channel-discord\"] }\n```\n\n### Telemetry Feature\n\nWhen enabled, pulls in `opentelemetry`, `opentelemetry-otlp`, `tracing-opentelemetry`, `metrics`, and `metrics-exporter-prometheus`. This adds an OTLP trace exporter and a Prometheus metrics endpoint to the running server.\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks:\n\n1. **Dashboard static directory scaffolding** — Ensures `static/react/` exists so the `include_dir!` macro (which embeds the React dashboard at compile time) never fails on fresh clones. The directory is gitignored because actual assets are either built from the dashboard subcrate via `npm run build` or downloaded at runtime to `~/.librefang/dashboard/`. When empty at compile time, the embedded bundle is a no-op and the runtime path is used instead.\n\n2. **Build metadata injection** — Captures three values and sets them as compile-time environment variables:\n\n   | Variable | Source | Example |\n   |---|---|---|\n   | `GIT_SHA` | `git rev-parse --short HEAD` | `a3f7c2d` |\n   | `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n   | `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\n   These are available in code via `env!(\"GIT_SHA\")`, `env!(\"BUILD_DATE\")`, and `env!(\"RUSTC_VERSION\")`, typically exposed through a `/api/version` or `/api/health` endpoint.\n\n3. **Platform-specific dependency** — On Unix targets, `rustix` (with `process` feature) is included, likely for privileged process operations like UID/GID management or daemonization.\n\n## Dashboard Serving Strategy\n\nThe React dashboard follows a two-tier serving model:\n\n1. **Compile-time embed** — `include_dir = \"0.7\"` embeds the contents of `static/react/` into the binary. If the dashboard was built before the Rust crate, the assets are served directly from memory with zero filesystem dependencies.\n\n2. **Runtime fallback** — If the embedded directory is empty (the default for fresh clones), the server falls back to serving from `~/.librefang/dashboard/`. This allows dashboard updates without recompiling the API binary.\n\n## Integration Points\n\nThe API is the primary entry point for external consumers:\n\n- **Dashboard UI** — Served as static files at the root path.\n- **REST API** — JSON endpoints under `/api/` for CRUD operations on agents, channels, skills, sessions, extensions, and configuration.\n- **WebSocket** — Real-time event streaming for agent output, session updates, and telemetry.\n- **OpenAPI spec** — Auto-generated via `utoipa`, likely served at `/api/docs/openapi.json` with a Swagger UI.\n- **Prometheus metrics** — When the `telemetry` feature is enabled, a `/metrics` endpoint exports runtime metrics.\n- **Terminal/PTY** — `portable-pty` is included, suggesting WebSocket-based terminal sessions for interactive agent debugging.\n\n## Configuration\n\nThe crate depends on both `toml` and `toml_edit`, indicating it reads structured TOML configuration files and also provides API endpoints to modify configuration persistently (using `toml_edit` to preserve comments and formatting when writing back).","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels — Dispatch Benchmarks\n\nBenchmarks for the channel message dispatch hot paths in `librefang-channels`, built with [Criterion](https://bheisler.github.io/criterion.rs/). The suite measures serialization overhead, router resolution latency, and message formatting throughput—three operations that execute on every inbound/outbound message and must remain fast.\n\n## Running\n\n```sh\ncargo bench -p librefang-channels\n```\n\nReports are written to `target/criterion/`. Criterion groups produce three sub-reports:\n\n| Group | Criterion ID |\n|---|---|\n| `serialization` | `message_serialize`, `message_deserialize`, `message_roundtrip` |\n| `routing` | `router_resolve_direct`, `router_resolve_default_fallback`, `router_resolve_binding_match`, `router_resolve_with_context` |\n| `formatting` | `format_*`, `split_message_*`, `default_phase_emoji_all` |\n\n## Benchmark Coverage\n\n### Serialization (`serialization` group)\n\nExercises `serde_json` on a realistic `ChannelMessage` struct containing a Telegram text payload, sender metadata, and an empty `HashMap` for metadata.\n\n| Benchmark | What it measures |\n|---|---|\n| `bench_message_serialize` | `ChannelMessage` → JSON string via `serde_json::to_string` |\n| `bench_message_deserialize` | JSON string → `ChannelMessage` via `serde_json::from_str` |\n| `bench_message_roundtrip` | Serialize then deserialize in a single iteration |\n\nThe sample message is built once by `make_sample_message()` and reused across iterations (inside `Bencher::iter` only the serialization work repeats). This isolates the cost of serde itself, not struct construction.\n\n### Routing (`routing` group)\n\nBenchmarks the `AgentRouter` resolution path under four scenarios of increasing complexity:\n\n| Benchmark | Scenario | Key APIs |\n|---|---|---|\n| `bench_router_resolve_direct` | Exact user-to-agent mapping | `set_default`, `set_direct_route`, `resolve` |\n| `bench_router_resolve_default` | No match — falls back to default agent | `set_default`, `resolve` |\n| `bench_router_resolve_with_bindings` | Rule-based binding match (channel + peer_id) | `register_agent`, `load_bindings`, `resolve` |\n| `bench_router_resolve_with_context` | Binding match with guild and role predicates | `register_agent`, `load_bindings`, `resolve_with_context` |\n\nThe direct-route and default-fallback benchmarks measure the common-case lookup path. The binding benchmarks measure the rule-matching engine, including `BindingMatchRule` evaluation against `BindingContext` fields (channel, peer_id, guild_id, roles).\n\nSetup (router construction, route registration) happens outside the timed loop; only `resolve` / `resolve_with_context` is measured.\n\n### Formatting (`formatting` group)\n\nBenchmarks `format_for_channel` across all `OutputFormat` variants, plus supporting utilities:\n\n| Benchmark | Input | Output variant |\n|---|---|---|\n| `bench_format_markdown_passthrough` | Multi-paragraph markdown | `OutputFormat::Markdown` |\n| `bench_format_telegram_html` | Multi-paragraph markdown | `OutputFormat::TelegramHtml` |\n| `bench_format_slack_mrkdwn` | Multi-paragraph markdown | `OutputFormat::SlackMrkdwn` |\n| `bench_format_plain_text` | Multi-paragraph markdown | `OutputFormat::PlainText` |\n| `bench_format_short_text` | `\"Hello world!\"` | `OutputFormat::TelegramHtml` |\n| `bench_split_message_short` | `\"Hello!\"` (well under 4096 chars) | `split_message(..., 4096)` |\n| `bench_split_message_long` | 500-line synthetic text | `split_message(..., 4096)` |\n| `bench_default_phase_emoji` | All six `AgentPhase` variants | `default_phase_emoji` |\n\nThe long-format input (`SAMPLE_MARKDOWN`) contains bold, italic, inline code, links, and bullet lists to exercise the full markdown parser. The short-text benchmark (`bench_format_short_text`) provides a contrast to identify per-call overhead vs. per-token parsing cost.\n\n`bench_default_phase_emoji` iterates over `AgentPhase::Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, and `Error` in a single iteration to measure the cumulative cost of emoji lookup.\n\n## Dependencies on Library APIs\n\n```mermaid\ngraph LR\n    subgraph benches\n        A[dispatch.rs]\n    end\n    subgraph librefang-channels\n        B[types.rs<br/>ChannelMessage, split_message,<br/>default_phase_emoji, AgentPhase]\n        C[router.rs<br/>AgentRouter, BindingContext]\n        D[formatter.rs<br/>format_for_channel]\n    end\n    A --> B\n    A --> C\n    A --> D\n```\n\nThe benchmark does not import from any channel adapter crates (Telegram, Discord, Slack). It works entirely through the shared types and the platform-agnostic formatting/router layer.\n\n## Adding New Benchmarks\n\n1. **Identify the group.** Serialization, routing, and formatting are the existing Criterion groups. Add to the matching group, or define a new one via `criterion_group!` and register it in `criterion_main!`.\n\n2. **Keep setup outside the loop.** Construct structs, register routes, and allocate buffers before the `b.iter(|| ...)` closure so only the hot path is measured.\n\n3. **Use `black_box` on inputs.** Wrap reference arguments in `std::hint::black_box` to prevent the compiler from constant-folding or eliding work. Do not `black_box` the return value inside `iter`—Criterion already consumes it.\n\n4. **Use realistic payloads.** `make_sample_message()` produces a representative `ChannelMessage`. Extend it (or create variants) when benchmarking new fields, but avoid trivially small inputs that hide real allocation/serialization costs.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# librefang-channels — Bridge Integration Tests\n\n## Overview\n\n`bridge_integration_test.rs` provides end-to-end integration tests for the `BridgeManager` dispatch pipeline. Tests exercise the full message flow—**inbound message → router resolution → kernel dispatch → response delivery**—using in-process tokio channels and mock implementations of `ChannelAdapter` and `ChannelBridgeHandle`. No external services are contacted.\n\n## Architecture\n\n```mermaid\ngraph LR\n    TX[Test injects message] --> Adapter[MockAdapter]\n    Adapter -->|start() stream| BM[BridgeManager]\n    BM -->|resolve agent| Router[AgentRouter]\n    BM -->|send_message / streaming| Handle[MockHandle]\n    Handle -->|response| BM\n    BM -->|send / send_streaming| Adapter\n    Adapter -->|captured in sent vec| Assert[Test assertions]\n```\n\nEvery test follows the same skeleton:\n\n1. Create a mock handle with known agents.\n2. Create an `AgentRouter` (optionally pre-routing users).\n3. Create a mock adapter wired to an `mpsc::Sender` for message injection.\n4. Build a `BridgeManager`, call `start_adapter()`.\n5. Inject messages via the sender.\n6. Sleep briefly to let async dispatch settle.\n7. Assert on captured responses in the adapter's `sent`/`streamed` vectors.\n8. Call `manager.stop()`.\n\n## Mock Implementations\n\n### MockAdapter\n\nA basic `ChannelAdapter` that does **not** support streaming.\n\n| Method | Behavior |\n|---|---|\n| `start()` | Returns a `ReceiverStream` from an injectable `mpsc::Receiver` |\n| `send()` | Captures `(platform_id, text)` pairs in a `Mutex<Vec>`; flattens `Interactive` button labels into text |\n| `stop()` | Signals shutdown via `watch` channel |\n| `supports_streaming()` | Returns `false` (default) |\n\nCreated via `MockAdapter::new(name, channel_type)` which returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`. Inject messages through the sender; inspect output via `get_sent()`.\n\n### MockStreamingAdapter\n\nExtends `MockAdapter` with `supports_streaming() → true` and a `send_streaming()` implementation that assembles all deltas into a single string, captured separately in `streamed`. Provides both `get_streamed()` and `get_sent()` for assertions.\n\n### MockFailingStreamingAdapter\n\nReports `supports_streaming() → true` but `send_streaming()` **always returns `Err`**. Used to exercise fallback paths where the transport layer fails but the kernel may or may not have succeeded. Drains the delta channel so the bridge's tee task can populate `buffered_text`.\n\n### MockHandle / MockStreamingHandle / MockProgressHandle / MockKernelErrorHandle / MockKernelOkHandle\n\nAll implement `ChannelBridgeHandle` with different response strategies:\n\n| Handle | `send_message` | `send_message_streaming` | `send_message_streaming_with_sender_status` | Special |\n|---|---|---|---|---|\n| `MockHandle` | Returns `\"Echo: {msg}\"` | — | — | Records received messages |\n| `MockStreamingHandle` | Returns `\"Echo: {msg}\"` | Emits word-by-word deltas | — | Records received messages |\n| `MockProgressHandle` | Returns echo | — | Emits `🔧 tool_name` progress + prose | Mirrors real tool-use flow |\n| `MockKernelErrorHandle` | Returns echo | — | Emits progress + partial text, then `Err(\"rate limit hit\")` via status oneshot | Exercises dual-failure path |\n| `MockKernelOkHandle` | Returns echo | — | Emits clean text, then `Ok(())` via status oneshot | Implements `record_delivery`; captures `(success, err)` tuples for metric assertions |\n\n## Message Constructors\n\nTwo helper functions reduce boilerplate:\n\n- **`make_text_msg(channel, user_id, text)`** — builds a `ChannelMessage` with `ChannelContent::Text`.\n- **`make_command_msg(channel, user_id, cmd, args)`** — builds a `ChannelMessage` with `ChannelContent::Command`.\n\nBoth set `is_group: false`, empty metadata, no `thread_id`, and a fixed `platform_message_id` of `\"msg1\"`.\n\n## Test Catalog\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_dispatch_text_message` | A text message from a pre-routed user reaches the correct agent; the echo response is delivered back through the adapter. |\n| `test_bridge_dispatch_no_agent_assigned` | An unrouted user receives a \"No agents available\" error message instead of a silent drop. |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text starting with `/` (e.g. `\"/agents\"`) is recognized and handled as a command even when sent as `ChannelContent::Text`. |\n\n### Command Handling\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_dispatch_agents_command` | `/agents` lists all running agents by name in the response. |\n| `test_bridge_dispatch_help_command` | `/help` returns text mentioning `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` selects that agent for the user; the router is updated and subsequent `resolve()` returns the correct `AgentId`. |\n| `test_bridge_dispatch_status_command` | `/status` reports the number of running agents (e.g. `\"2 agent(s) running\"`). |\n\n### Lifecycle and Multi-Adapter\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_manager_lifecycle` | Start → send 5 messages → verify 5 echo responses in order → `stop()` completes without hanging. |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run simultaneously in the same `BridgeManager`; each receives only responses for its own channel. |\n\n### Streaming\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both the adapter and handle support streaming, `send_streaming` is called (not `send`); streamed text contains the echo. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter doesn't support streaming (even though the handle does), the bridge falls back to `send()` with the full assembled response. |\n| `test_default_send_streaming_collects_and_sends` | The default `send_streaming` implementation on `ChannelAdapter` collects all deltas and calls `self.send()` with the concatenated result. |\n\n### Progress Markers (V2 Contract)\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | A non-streaming adapter (Discord) receives progress markers (`🔧 web_search`) in the consolidated response via the `send_message_streaming_with_sender_status` pipeline. Progress is not Telegram-only. |\n\n### Error Paths and Regression Guards\n\n| Test | What it verifies |\n|---|---|\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | When both `send_streaming` (transport) and the kernel status report errors, the fallback `send()` delivers the partial buffered text including progress markers. |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression guard.** When the kernel succeeds but `send_streaming` fails, the fallback delivers buffered text and `record_delivery` is called with `(success=true, err=None)`. Previously the transport error leaked into the `err` field, producing contradictory metrics (`success=true` + `err=Some(...)`). |\n\n## Key Interactions with Production Code\n\n- **`BridgeManager::new(handle, router)`** — production constructor; tests pass mock trait objects.\n- **`BridgeManager::start_adapter(adapter)`** — spawns the dispatch loop for one adapter.\n- **`BridgeManager::stop()`** — graceful shutdown of all adapter tasks.\n- **`AgentRouter::set_user_default(user, agent_id)`** — pre-routes a user to an agent before message dispatch.\n- **`AgentRouter::resolve(channel, user, target)`** — looked up internally by the bridge to determine which agent receives a message.\n- **`ChannelBridgeHandle::send_message_streaming_with_sender_status`** — the V2 streaming-with-progress path; returns both a delta channel and a status oneshot.\n\n## Timing Considerations\n\nAll tests use `tokio::time::sleep(100–300ms)` to allow the async dispatch pipeline to settle. This is a deliberate tradeoff: deterministic synchronization (e.g. oneshot channels per message) would require modifying production code, so the tests accept brief non-determinism in exchange for testing unmodified production paths. If tests flake, increasing sleep durations or adding retry loops is the recommended fix.\n\n## Adding New Tests\n\nTo add a new integration test:\n\n1. Create the appropriate mock handle (or reuse an existing one) with the agents you need.\n2. Create an `AgentRouter` and optionally pre-route users.\n3. Choose or create a mock adapter. For streaming scenarios, use `MockStreamingAdapter`; for transport failure scenarios, use `MockFailingStreamingAdapter`.\n4. Instantiate `BridgeManager`, call `start_adapter()`, inject messages, sleep, assert, and call `stop()`.\n5. If testing a new `ChannelBridgeHandle` method, create a new mock handle struct implementing the trait with the desired behavior.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\n## Overview\n\n**Channel Bridge Layer** — a feature-flag-driven collection of pluggable messaging integrations for LibreFang. This module provides the adapter layer between LibreFang's internal dispatch system and 45+ external messaging platforms, from major chat networks (Telegram, Discord, Slack) to niche protocols (Nostr, XMPP, IRC).\n\nEvery channel is gated behind an individual Cargo feature, allowing downstream consumers to compile only the integrations they need.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[librefang-channels]\n    B --> C[Feature-gated Channel Adapters]\n    C --> D[HTTP-based channels]\n    C --> E[WebSocket channels]\n    C --> F[Protocol-specific channels]\n    B --> G[Dispatch & Routing]\n```\n\nEach channel adapter translates between LibreFang's canonical message types (from `librefang-types`) and the target platform's API or protocol. The module ships with its own dispatch benchmark (`benches/dispatch`) to measure routing overhead.\n\n## Feature Flag System\n\n### Default Features\n\nThe `default` feature enables every channel adapter except `channel-mqtt`. This is the \"batteries-included\" configuration suitable for development and monolithic deployments.\n\n### `all-channels`\n\nThe `all-channels` feature enables every adapter **including** `channel-mqtt`. Use this when you explicitly need MQTT and want a single feature flag to rule them all.\n\n### Selective Compilation\n\nEnable only the channels you need by disabling default features and cherry-picking:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"...\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n] }\n```\n\nThis keeps compile times and binary size proportional to your actual integrations.\n\n## Channel Catalog\n\n### HTTP / Webhook-Based Channels\n\nThese channels communicate primarily via REST APIs. They rely on the shared `reqwest` and `axum` dependencies for outbound HTTP and inbound webhook handling.\n\n| Feature Flag | Platform | Notes |\n|---|---|---|\n| `channel-telegram` | Telegram Bot API | |\n| `channel-discord` | Discord | |\n| `channel-slack` | Slack | |\n| `channel-teams` | Microsoft Teams | |\n| `channel-mattermost` | Mattermost | |\n| `channel-twitch` | Twitch | |\n| `channel-rocketchat` | Rocket.Chat | |\n| `channel-zulip` | Zulip | |\n| `channel-bluesky` | Bluesky (AT Protocol) | |\n| `channel-line` | LINE | |\n| `channel-mastodon` | Mastodon | |\n| `channel-messenger` | Facebook Messenger | |\n| `channel-reddit` | Reddit | |\n| `channel-revolt` | Revolt | |\n| `channel-viber` | Viber | |\n| `channel-flock` | Flock | |\n| `channel-guilded` | Guilded | |\n| `channel-pumble` | Pumble | |\n| `channel-threema` | Threema | |\n| `channel-twist` | Twist | |\n| `channel-webex` | Cisco Webex | |\n| `channel-dingtalk` | DingTalk | |\n| `channel-discourse` | Discourse | |\n| `channel-gitter` | Gitter | |\n| `channel-gotify` | Gotify | |\n| `channel-linkedin` | LinkedIn | |\n| `channel-ntfy` | ntfy.sh | |\n| `channel-webhook` | Generic Webhook | Catch-all HTTP endpoint |\n| `channel-voice` | Voice/TTS | Voice-specific delivery |\n\n### Channels with Cryptographic Dependencies\n\n| Feature Flag | Platform | Extra Dependencies | Purpose |\n|---|---|---|---|\n| `channel-email` | Email (SMTP/IMAP) | `lettre`, `imap`, `rustls-connector`, `mailparse` | Full email send/receive pipeline |\n| `channel-google-chat` | Google Chat | `rsa` | Google service account authentication (JWT signing) |\n| `channel-feishu` | Feishu / Lark | `aes`, `cbc` | AES-CBC encryption for event verification |\n| `channel-wecom` | WeCom (企业微信) | `aes`, `cbc` | AES-CBC decryption for callback payloads |\n| `channel-nostr` | Nostr | `k256` | secp256k1 key generation and event signing |\n| `channel-mqtt` | MQTT | `rumqttc` | MQTT v5 pub/sub transport |\n\n### Protocol-Based Channels\n\n| Feature Flag | Platform | Transport |\n|---|---|---|\n| `channel-matrix` | Matrix | HTTP (Sync) / WebSocket |\n| `channel-xmpp` | XMPP | XML stream |\n| `channel-irc` | IRC | Plain/TLS TCP |\n| `channel-mumble` | Mumble | Protobuf over TLS |\n| `channel-whatsapp` | WhatsApp Business | HTTP API |\n| `channel-signal` | Signal | HTTP API |\n| `channel-nextcloud` | Nextcloud Talk | HTTP API |\n| `channel-keybase` | Keybase | HTTP API |\n| `channel-qq` | QQ | HTTP API |\n| `channel-wechat` | WeChat | HTTP API |\n\n## Key Dependencies\n\n### Shared Across All Channels\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Canonical message types shared across the LibreFang workspace |\n| `tokio` | Async runtime |\n| `reqwest` | HTTP client for outbound API calls |\n| `axum` | HTTP server for inbound webhook endpoints |\n| `tokio-tungstenite` | WebSocket transport (used by several real-time channels) |\n| `serde` / `serde_json` | Serialization of API payloads |\n| `hmac` / `sha2` / `sha1` | Webhook signature verification |\n| `dashmap` | Concurrent channel state management |\n| `tracing` | Structured logging |\n| `url` | URL parsing and construction |\n\n### Cryptographic / Verification\n\n| Crate | Role |\n|---|---|\n| `base64` / `hex` | Encoding for signature payloads |\n| `zeroize` | Secure memory clearing for key material |\n| `rustls` + `webpki-roots` / `rustls-native-certs` | TLS without OpenSSL |\n\n### Utility\n\n| Crate | Role |\n|---|---|\n| `image` | Image processing (JPEG, PNG, WebP) for media attachments |\n| `regex` / `regex-lite` | Pattern matching for command parsing |\n| `html-escape` | HTML sanitization for cross-platform rendering |\n| `smallvec` | Stack-allocated small collections to reduce allocations |\n| `bytes` | Zero-copy byte buffer handling |\n| `uuid` | Correlation ID generation |\n| `chrono` | Timestamp handling |\n| `futures` / `tokio-stream` / `async-trait` | Async trait definitions and stream combinators |\n\n## Benchmarking\n\nThe module includes a dispatch benchmark at `benches/dispatch`, runnable via:\n\n```sh\ncargo bench -p librefang-channels --bench dispatch\n```\n\nThis measures the overhead of message routing through the channel layer, which is critical for deployments bridging many platforms simultaneously.\n\n## Relationship to Other Modules\n\nThis module sits between `librefang-types` and the application layer:\n\n- **Depends on** `librefang-types` for all shared message, event, and configuration types. Channel adapters consume these types as input and produce them from incoming platform events.\n- **Consumed by** the core application or bot framework, which instantiates channel adapters based on runtime configuration and feeds messages through the dispatch pipeline.\n\nThe channel adapters are designed to be interchangeable — the rest of the system should not need to know which specific platform is handling a given message.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# librefang-cli-locales\n\nInternationalization (i18n) resource files for the LibreFang CLI. Contains all user-facing strings in [Fluent](https://projectfluent.org/) (`.ftl`) format, enabling multilingual terminal output without code changes.\n\n## Supported Locales\n\n| Locale | File | Description |\n|--------|------|-------------|\n| `en` | `locales/en/main.ftl` | English — default / fallback |\n| `zh-CN` | `locales/zh-CN/main.ftl` | Simplified Chinese |\n\n## How It Works\n\nThe Fluent system is declarative. Each file maps a **message identifier** to a localized string value. Application code references message IDs; the runtime selects the correct file based on the user's locale setting.\n\n### Variable Interpolation\n\nStrings can include placeholders wrapped in curly braces:\n\n```fluent\ndaemon-error = Daemon error: { $error }\nkernel-booted = Kernel booted ({ $provider }/{ $model })\n```\n\nThe calling code supplies the variables at runtime — for example, passing `error = \"port in use\"` produces `Daemon error: port in use`.\n\n### Message ID Conventions\n\nMessage IDs use a consistent naming scheme:\n\n| Pattern | Purpose | Example |\n|---------|---------|---------|\n| `section-*` | Section headings in terminal output | `section-daemon-status`, `section-security-status` |\n| `label-*` | Field labels in status/config output | `label-uptime`, `label-provider` |\n| `hint-*` | Contextual suggestions shown to the user | `hint-stop-daemon`, `hint-check-status` |\n| `error-*` | Error messages | `error-boot-config`, `error-connect-refused` |\n| `*-fix` | Remediation hint paired with an error | `error-boot-auth-fix`, `error-connect-refused-fix` |\n| `warn-*` | Warning labels | `warn-public-bind`, `warn-key-missing` |\n| `value-*` | Static descriptive values | `value-audit-trail`, `value-wasm-sandbox` |\n| `*-success`, `*-failed` | Operation outcomes | `model-set-success`, `cron-create-failed` |\n\n## String Categories\n\nThe locale files cover every user-visible string the CLI emits. Major sections include:\n\n- **Daemon lifecycle** — start, stop, restart, background mode, health checks\n- **Error diagnostics** — boot failures, communication errors, config parse errors; each with a paired `*-fix` suggestion\n- **Hints** — contextual guidance after commands or errors\n- **Interactive setup** — first-run wizard prompts and key verification\n- **Agent commands** — spawn, kill, model selection, template management\n- **Status display** — daemon status, security status, system info sections\n- **Channel setup** — Telegram, Discord, Slack, WhatsApp, Email, Signal, Matrix\n- **Config management** — get/set/unset operations, key storage\n- **Vault operations** — credential store init, unlock, get, set, remove\n- **Cron scheduling** — create, delete, toggle cron jobs\n- **Uninstall** — platform-specific cleanup (macOS launch agent, Linux systemd, Windows registry)\n- **Doctor** — diagnostic check results and repair guidance\n\n## Adding a New Locale\n\n1. Create the directory: `librefang-cli/locales/<locale-code>/main.ftl`\n2. Copy `locales/en/main.ftl` as the starting template.\n3. Translate every string value, preserving the message IDs and variable names exactly.\n4. Missing messages automatically fall back to the English equivalent.\n\n**Critical rules when translating:**\n\n- **Never rename a message ID.** Code references these IDs directly.\n- **Preserve all `{ $variable }` placeholders** with identical variable names. Removing or renaming one will cause a runtime error.\n- **Keep paired `*-fix` messages adjacent** to their parent error for maintainability (the comments act as section markers).\n- **Test with the CLI** — Fluent's plural rules, selector syntax, and whitespace handling can produce subtle differences across locales.\n\n## Relationship to the Codebase\n\nThis module is a leaf dependency. It contains no executable Rust code, no function calls, and no imports. The CLI binary loads these files at startup via a Fluent localization crate and looks up message IDs wherever user-facing text is needed.\n\nWhen adding a new CLI command or error path, the workflow is:\n\n1. Add the message ID and English string to `locales/en/main.ftl`.\n2. Add the translated equivalent to every other locale file (or leave it to fall back to English temporarily).\n3. Reference the new message ID from the Rust code via the localization handle.","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration templates shipped with the LibreFang CLI. These TOML files are processed during `librefang init` and written to disk as the agent's runtime configuration.\n\n## Templates\n\n### `init_default_config.toml`\n\nThe full reference configuration. Every supported option is present—most commented out with inline explanations. This template is used when the user selects the \"default\" or \"advanced\" init path and wants to see all knobs.\n\n**Template variables** (Mustache-style `{{…}}` delimiters):\n\n| Variable | Replaced with |\n|---|---|\n| `{{provider}}` | LLM provider name chosen during init (e.g. `openai`, `anthropic`) |\n| `{{model}}` | Default model identifier (e.g. `gpt-4o`, `claude-sonnet-4-20250514`) |\n| `{{api_key_env}}` | Environment variable name holding the API key (e.g. `OPENAI_API_KEY`) |\n\n### `init_wizard_config.toml`\n\nA minimal skeleton generated by the interactive setup wizard. Only the sections the user actually configured are written.\n\n**Template variables:**\n\n| Variable | Replaced with |\n|---|---|\n| `{{provider}}` | LLM provider name |\n| `{{model}}` | Default model identifier |\n| `{{api_key_line}}` | A pre-formatted `api_key_env = \"…\"` line, or empty string if using a provider that doesn't require a key (e.g. Ollama) |\n| `{{routing_section}}` | Optional agent routing TOML block injected by the wizard, or an empty string |\n\n## How Templates Are Consumed\n\n```mermaid\nflowchart LR\n    A[librefang init] --> B{Wizard mode?}\n    B -- Yes --> C[init_wizard_config.toml]\n    B -- No --> D[init_default_config.toml]\n    C --> E[Replace placeholders]\n    D --> E\n    E --> F[\"Write config.toml to disk\"]\n```\n\nThe CLI reads the appropriate template at init time, substitutes the `{{…}}` variables with user-supplied values, and writes the result to the project's configuration file.\n\n## Configuration Sections Reference\n\nThe full template exposes these sections. In the wizard template, only `api_listen`, `default_model`, and `memory` are emitted by default.\n\n### Server\n\n| Key | Default | Description |\n|---|---|---|\n| `api_listen` | `127.0.0.1:4545` | Bind address. Use `0.0.0.0:4545` for LAN access. |\n| `log_level` | `info` | One of `trace`, `debug`, `info`, `warn`, `error`. |\n| `mode` | `default` | `stable`, `default`, or `dev`. |\n| `update_channel` | `stable` | Release track: `stable`, `beta`, `rc`. |\n\n### Dashboard Login\n\n`dashboard_user` and `dashboard_pass` provide initial credentials. **Change after first login.** For production, store the password via `librefang vault set dashboard_password` and reference it as `dashboard_pass = \"vault:dashboard_password\"`, or use the `LIBREFANG_DASHBOARD_PASS` environment variable.\n\n### Terminal Access Control\n\nCommented out by default. Key guards:\n\n- `allow_remote` — requires authentication when enabled.\n- `allow_unauthenticated_remote` — intentional foot-gun guard; must be explicitly set to `true`.\n- `require_proxy_headers` — enable only behind a reverse proxy that sets `X-Forwarded-For` / `X-Real-IP`.\n\n### Default LLM (`[default_model]`)\n\nThe primary model configuration. Supports a `base_url` override for local proxies or self-hosted endpoints.\n\n### Memory (`[memory]`)\n\nControls the agent's long-term memory confidence decay. `decay_rate = 0.05` means 5% confidence loss per cycle.\n\n### Proactive Memory (`[proactive_memory]`)\n\nAuto-extraction and auto-retrieval of facts from conversations. `max_retrieve` caps how many memories are injected per retrieval. Tunable thresholds (`extraction_threshold`, `duplicate_threshold`) are commented out with sensible defaults.\n\n### Web Tools (`[web]`)\n\n`search_provider = \"auto\"` probes providers in order: Tavily → Brave → Jina → Perplexity → DuckDuckGo, using whichever has credentials configured.\n\n`[web.fetch]` controls page extraction with a `max_chars` cap, timeout, and readability mode. SSRF protection blocks cloud metadata IPs (`169.254.x.x`, `100.64.x.x`) by default; `ssrf_allowed_hosts` is for self-hosted/K8s environments only.\n\n### Task Queue (`[queue.concurrency]`)\n\nLane-based concurrency limits:\n\n| Lane | Default | Purpose |\n|---|---|---|\n| `main_lane` | 3 | Concurrent user messages |\n| `cron_lane` | 2 | Scheduled jobs |\n| `subagent_lane` | 3 | Child agents |\n| `trigger_lane` | 8 | In-flight trigger dispatches |\n| `default_per_agent` | 1 | Per-agent fallback (serial behavior) |\n\n### Shell Execution (`[exec_policy]`)\n\n- `mode = \"deny\"` blocks all shell access by default. Change to `\"allowlist\"` or `\"full\"` to open up.\n- `timeout_secs` and `max_output_bytes` prevent runaway commands.\n\n### Hot-Reload (`[reload]`)\n\n- `mode = \"hybrid\"` — watches the config file; some changes apply immediately, others trigger a restart.\n- `debounce_ms = 500` — coalesces rapid file saves.\n\n### Fallback Providers (`[[fallback_providers]]`)\n\nAn array of TOML tables defining the LLM failover chain. If the default model fails, each entry is tried in order.\n\n### Rate Limiting (`[rate_limit]`)\n\nGCRA-based per-IP rate limiting for the HTTP API and WebSocket connections. Controls request budgets, concurrent connections, idle timeouts, and text delta debouncing.\n\n### Session Compaction (`[compaction]`)\n\nLLM-based history summarization. Compacts when message count exceeds `threshold_messages`, preserving the most recent `keep_recent` messages verbatim.\n\n### Event Triggers (`[triggers]`)\n\nGlobal guards for the trigger system: cooldown between firings, max triggers per event, recursion depth limit, and maximum workflow execution time.\n\n### Budget & Cost Control (`[budget]`)\n\nGlobal and per-provider spending caps with alert thresholds. Supports hourly, daily, and monthly limits in USD. Per-provider sections allow throttling paid providers while leaving local ones uncapped.\n\n### Extended Thinking (`[thinking]`)\n\nFor Claude models that support extended thinking. `budget_tokens` controls the thinking allowance; `stream_thinking` forwards thinking tokens to the client.\n\n### Channels\n\nPre-configured but commented-out integrations for Telegram, Discord, Slack, and WeChat (via iLink protocol). Each requires a bot token environment variable and a default agent assignment.\n\n### MCP Servers (`[[mcp_servers]]`)\n\nExternal tool integration via the Model Context Protocol. Each server entry specifies a transport (currently `stdio`) with command and arguments.\n\n### Browser Automation (`[browser]`)\n\nHeadless browser settings for web automation tasks.\n\n### Docker Sandbox (`[docker]`)\n\nIsolated code execution within a Docker container with memory limits and timeouts.\n\n### File Inbox (`[inbox]`)\n\nAsync external command interface. Drop text files into a directory; the agent polls and processes them. Supports `agent:<name>` directives for targeting specific agents.\n\n### Network / P2P Federation\n\n`network_enabled = false` by default. Requires a `shared_secret` for peer-to-peer authentication when enabled.\n\n## Adding a New Configuration Option\n\n1. Add the option to `init_default_config.toml` with inline comments explaining the default and valid values. Keep it commented out if it's opt-in.\n2. If the wizard should offer the option, add the corresponding placeholder and section to `init_wizard_config.toml`.\n3. Ensure the CLI's init command substitutes any new `{{…}}` variables.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nThe command-line interface for LibreFang Agent OS. Produces the `librefang` binary, which serves as the primary entry point for running agents, managing configurations, performing migrations, and interacting with the system's skill and memory subsystems.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[librefang binary] --> Kernel[librefang-kernel]\n    CLI --> API[librefang-api]\n    CLI --> Channels[librefang-channels]\n    CLI --> Runtime[librefang-runtime]\n    CLI --> Skills[librefang-skills]\n    CLI --> Memory[librefang-memory]\n    CLI --> Extensions[librefang-extensions]\n    CLI --> Migrate[librefang-migrate]\n    CLI --> Types[librefang-types]\n    CLI --> TUI[ratatui TUI]\n    CLI --> Telemetry[OpenTelemetry]\n```\n\nThe CLI aggregates nearly every library crate in the workspace. It is a thick frontend: argument parsing, configuration loading, telemetry setup, and orchestration all happen here before delegating to the underlying libraries.\n\n## Feature Flags\n\n| Feature | Default | Effect |\n|---------|---------|--------|\n| `default` | ✓ | Enables `all-channels` and `telemetry` |\n| `all-channels` | ✓ (via default) | Activates all channel backends in `librefang-api` |\n| `mini` | ✗ | Minimal build using `librefang-api/mini` — only essential channel support |\n| `telemetry` | ✓ (via default) | Enables OpenTelemetry tracing exports via `opentelemetry`, `opentelemetry_sdk`, and `tracing-opentelemetry` |\n\nTo build a slim binary with no telemetry and minimal channel support:\n\n```bash\ncargo build -p librefang-cli --no-default-features --features mini\n```\n\n## Build Script (`build.rs`)\n\nThe build script performs four tasks at compile time:\n\n1. **Git hooks configuration** — Runs `git config core.hooksPath scripts/hooks` so that all developers share the same hook scripts from the repository on their first build. Failures are silently ignored (e.g., outside a git checkout).\n\n2. **Git commit hash** — Captures the short SHA via `git rev-parse --short HEAD` and exposes it as the `GIT_SHA` environment variable, embedded into the binary for `--version` output.\n\n3. **Build date** — Captures the UTC date via `date -u +%Y-%m-%d` and embeds it as `BUILD_DATE`.\n\n4. **Rustc version** — Captures `rustc --version` output and embeds it as `RUSTC_VERSION`.\n\nAll three embedded values fall back to `\"unknown\"` when the commands fail (e.g., building from a tarball without git installed).\n\nThese values are accessed in source via `env!(\"GIT_SHA\")`, `env!(\"BUILD_DATE\")`, and `env!(\"RUSTC_VERSION\")`.\n\n## Key Dependencies and Their Roles\n\n### CLI Framework\n- **clap** / **clap_complete** — Argument parsing and shell completion generation. The CLI uses the derive pattern; subcommands map to the major functional areas (agent lifecycle, migrations, configuration, etc.).\n\n### Terminal Output\n- **ratatui** — Full terminal UI rendering for interactive modes (e.g., agent monitoring dashboards, conversation views).\n- **colored** — Colored stdout/stderr output for status messages and logs.\n\n### Async Runtime\n- **tokio** — The async runtime driving the agent loop, channel listeners, and API server.\n\n### Observability\n- **tracing** / **tracing-subscriber** — Structured logging throughout the application.\n- **opentelemetry** / **opentelemetry_sdk** / **tracing-opentelemetry** *(optional, via `telemetry` feature)* — Export traces to an OpenTelemetry-compatible backend.\n\n### Internationalization\n- **fluent** / **unic-langid** — Localization framework for user-facing CLI messages. Translation files are loaded at runtime based on the system locale.\n\n### Storage\n- **rusqlite** — Direct SQLite access for local databases (agent state, memory stores).\n- **toml** / **toml_edit** — Reading and programmatically editing TOML configuration files while preserving formatting and comments.\n\n### Networking\n- **reqwest** *(blocking feature)* — Synchronous HTTP client for operations like registration, update checks, or downloading skill packages where async isn't necessary.\n- **rustls** — TLS backend for secure connections.\n\n### System\n- **libc** — Low-level system calls (signal handling, process management).\n- **tikv-jemallocator** *(non-MSVC targets only)* — Replaces the system allocator for improved performance on Linux/macOS.\n- **open** — Opens URLs or files in the user's default application (e.g., opening a dashboard in the browser).\n- **zeroize** — Secure memory zeroing for sensitive data (API keys, tokens).\n\n## Memory Allocator\n\nOn non-Windows targets, the binary uses tikv-jemallocator with `disable_initial_exec_tls` to avoid issues with `dlopen`. This is configured in the binary's entry point, not in the library crates.\n\n## Configuration Loading\n\nThe CLI reads configuration from the standard XDG config directory (via the **dirs** crate), typically `~/.config/librefang/`. Configuration is TOML-based, loaded and validated through `librefang-types`, and hot-reloadable in long-running processes via **arc-swap**.\n\n## Relationship to Other Crates\n\n| Crate | How the CLI Uses It |\n|-------|-------------------|\n| `librefang-kernel` | Core agent lifecycle management and orchestration |\n| `librefang-api` | HTTP/WebSocket API server for external control |\n| `librefang-channels` | Channel backends for communicating with LLM providers and external services |\n| `librefang-runtime` | Process registry and runtime execution environment |\n| `librefang-skills` | Skill discovery, loading, and execution |\n| `librefang-extensions` | Extension system for plugins and addons |\n| `librefang-memory` | Agent memory storage and retrieval (short-term, long-term, episodic) |\n| `librefang-migrate` | Database schema migrations on startup |\n| `librefang-types` | Shared types, configuration structs, error types |\n\n## Development Notes\n\n- The binary entry point is `src/main.rs`. It initializes the tokio runtime, sets up tracing subscribers, loads configuration, runs pending migrations via `librefang-migrate`, and then dispatches to the appropriate subcommand handler.\n- When adding a new subcommand, define it in the clap App derive structure and implement the handler in the appropriate module within `src/`.\n- Shell completions can be generated at runtime via the `clap_complete` integration — users can source completions for their shell without installing extra tooling.","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# LibreFang Desktop Capabilities\n\n## Overview\n\nThe `librefang-desktop-capabilities` module defines the **default permission set** for the LibreFang desktop application. It is a declarative Tauri configuration that controls which system-level APIs the app is authorized to use. Tauri's capability system acts as a security boundary — no plugin or core command can be invoked at runtime unless it has been explicitly granted permission in a capability file like this one.\n\nThis module lives under `librefang-desktop/capabilities/` and is consumed by the Tauri runtime at application startup.\n\n## File Reference\n\n### `default.json`\n\nThe sole file in this module. It declares a single capability scope:\n\n| Field | Value | Purpose |\n|---|---|---|\n| `$schema` | References the Tauri JSON schema | Enables IDE validation and autocomplete |\n| `identifier` | `\"default\"` | Unique name for this capability set |\n| `description` | Human-readable summary | Documents intent for developers |\n| `windows` | `[\"main\"]` | Restricts these permissions to the `main` window only |\n| `permissions` | Array of permission tokens (see below) | Grants access to specific Tauri commands |\n\n## Granted Permissions\n\n### Core and Plugin Defaults\n\nThese tokens each unlock a bundle of commands provided by their respective Tauri plugins or core modules:\n\n| Permission | Source | What it enables |\n|---|---|---|\n| `core:default` | `tauri` core | Window management, event system, basic IPC |\n| `notification:default` | `tauri-plugin-notification` | Sending native OS notifications |\n| `shell:default` | `tauri-plugin-shell` | Executing shell commands and opening external programs/URLs |\n| `dialog:default` | `tauri-plugin-dialog` | Native file pickers, message dialogs, confirmations |\n| `autostart:default` | `tauri-plugin-autostart` | Registering the app to launch on system boot |\n| `updater:default` | `tauri-plugin-updater` | Checking for and applying application updates |\n\n### Global Shortcut (Granular Permissions)\n\nUnlike the bundled defaults above, global shortcut permissions are specified individually. This follows the principle of least privilege — only the exact commands needed are exposed:\n\n| Permission | Command it authorizes |\n|---|---|\n| `global-shortcut:allow-register` | Register a new system-wide keyboard shortcut |\n| `global-shortcut:allow-unregister` | Remove a previously registered shortcut |\n| `global-shortcut:allow-is-registered` | Query whether a shortcut is currently registered |\n\nNotably absent is `global-shortcut:allow-unregister-all`, meaning the app cannot bulk-clear all shortcuts.\n\n## Architecture and Security Model\n\nTauri's capability system is **deny-by-default**. The `default.json` file acts as an allowlist that bridges the frontend (web view) to privileged backend operations. Without an entry here, any `invoke()` call from the JavaScript layer to a protected command will be rejected at the IPC boundary.\n\n```mermaid\nflowchart LR\n    subgraph Frontend\n        A[Web view / Renderer]\n    end\n    subgraph Capability Layer\n        B[default.json]\n    end\n    subgraph Backend\n        C[Core APIs]\n        D[Plugins]\n    end\n    A -->|invoke| B\n    B -->|allow| C\n    B -->|allow| D\n    B -.->|deny| E[Unlisted commands]\n```\n\nThe capability is scoped to the `\"main\"` window. If the application opens additional windows (e.g., an about dialog or a secondary panel), those windows will **not** inherit these permissions unless they are explicitly added to the `windows` array or a separate capability file targets them.\n\n## How to Modify\n\n### Adding a new permission\n\n1. Identify the permission token from the plugin's documentation (e.g., `fs:allow-read-text-file` for `tauri-plugin-fs`).\n2. Add the token string to the `permissions` array in `default.json`.\n3. The change takes effect on the next application rebuild — no Rust code changes are required.\n\n### Restricting to specific windows\n\nIf a permission should only apply to certain windows, create a **new capability file** alongside `default.json` with a different `identifier` and a targeted `windows` list, rather than broadening the existing one.\n\n### Schema validation\n\nThe `$schema` field points to a remote JSON schema hosted on GitHub. IDEs like VS Code will automatically validate the file against this schema, catching invalid permission tokens or structural errors before runtime.\n\n## Relationship to the Broader Codebase\n\nThis module has **no direct code dependencies** — it is pure configuration consumed by the Tauri build tooling. However, any frontend code that calls `invoke()` to use notifications, dialogs, shortcuts, autostart, or the updater depends implicitly on the permissions declared here. Removing a permission token will cause those frontend calls to fail silently or throw a runtime error, depending on the plugin's error handling.\n\nWhen adding a new Tauri plugin to the project, corresponding permission entries must be added to this file (or a new capability file) for the plugin's commands to be callable from the renderer.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop-gen\n\nAuto-generated Tauri security configuration and JSON schemas for the LibreFang desktop application. This directory is produced by the Tauri build pipeline and should not be hand-edited.\n\n## What This Module Contains\n\
