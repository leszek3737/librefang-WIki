 Lower-level transform that maps `McpCatalogTransport` → `McpTransportEntry`, sets `template_id`, and populates env var names from `required_env`. Used internally by `install_integration`.\n\n**Scaffolding:**\n\n- `scaffold_integration(dir)` — Creates a `mcp.toml` template for a custom MCP server\n- `scaffold_skill(dir)` — Creates `skill.toml` + `SKILL.md` for a new skill\n\n---\n\n## OAuth (`oauth`)\n\nOAuth2 Authorization Code flow with PKCE (Proof Key for Code Exchange) for providers that support it (Google, GitHub, Microsoft, Slack). PKCE eliminates the need for a client secret.\n\n**`run_pkce_flow(oauth_template, client_id)`** — Async function that:\n\n1. Generates a PKCE verifier/challenge pair (S256)\n2. Binds a temporary localhost HTTP server on a random port\n3. Opens the browser to the authorization URL\n4. Waits up to 5 minutes for the callback with the authorization code\n5. Exchanges the code for tokens via POST to the token endpoint\n6. Returns `OAuthTokens` (access token, optional refresh token, expiry, scopes)\n\nThe callback server uses `axum` with a single `/callback` route. CSRF protection is handled via a random `state` parameter. Tokens are available as `Zeroizing<String>` via `access_token_zeroizing()` and `refresh_token_zeroizing()`.\n\n**Client ID resolution:** `resolve_client_ids(config)` merges defaults with overrides from `OAuthConfig` (per-provider `*_client_id` fields). Defaults are placeholders — production deployments should configure real client IDs.\n\n---\n\n## HTTP Client (`http_client`)\n\nShared `reqwest::Client` builder that handles TLS certificate verification in environments where the system cert store may be incomplete or missing.\n\n**Strategy:**\n\n1. Load native certificates via `rustls_native_certs`\n2. If zero certs were loaded, fall back to `webpki_roots` (Mozilla's bundled CA set)\n3. Build a `reqwest::Client` with the resulting `rustls::ClientConfig`\n\n**API:**\n\n- `client_builder()` — Returns a `ClientBuilder` for further customization\n- `new_client()` — Returns a fully built `Client` (panics on failure, which should never happen with bundled roots)\n\n---\n\n## Integration Points\n\nThe extensions crate is consumed by:\n\n- **`librefang-kernel`** — Uses `CredentialVault` for OAuth token storage, `HealthMonitor` for MCP server lifecycle, `CredentialResolver` for credential injection\n- **`librefang-api`** — Calls `install_integration` from MCP management endpoints, uses `McpCatalog` for browsing/searching templates\n- **CLI** — Calls `dotenv::load_dotenv()` at startup, uses `CredentialResolver::with_interactive(true)` for prompts, calls `install_integration` from `mcp add` commands\n- **`librefang-skills`** — Calls `vault::exists()` as a general-purpose filesystem existence check at various skill loading/validation points\n\n### Key convention\n\nAll installed MCP servers are stored as `[[mcp_servers]]` entries in `~/.librefang/config.toml`. An optional `template_id` field links back to the catalog entry. There is no separate `integrations.toml` — that file format has been removed.","hands-system":"# Hands System\n\n# LibreFang Hands — Autonomous Capability Packages\n\n## Overview\n\nA **Hand** is a curated, domain-complete agent configuration that users activate from a marketplace. Unlike regular agents (which users chat with interactively), Hands work autonomously — users check in on them rather than driving the conversation.\n\nThe Hands module provides:\n\n- **Type definitions** for hand definitions, instances, requirements, settings, and localization (`lib.rs`)\n- **A concurrent-safe registry** for managing definitions and tracking active instances (`registry.rs`)\n- **TOML parsing** with support for both legacy flat format and modern nested format\n- **Agent template resolution** so hands can inherit and override reusable agent configurations\n- **Persistence** so active/paused hands survive daemon restarts\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Disk\"\n        HT[HAND.toml]\n        SK[SKILL.md]\n        SKR[SKILL-role.md]\n        AT[registry/agents/name/agent.toml]\n        PS[hand_state.json]\n    end\n\n    subgraph \"HandRegistry\"\n        DEF[definitions<br/>DashMap&lt;id, HandDefinition&gt;]\n        INST[instances<br/>DashMap&lt;uuid, HandInstance&gt;]\n        AIDX[agent_index<br/>agent_id → instance_id]\n        RIDX[active_index<br/>hand_id → instance_id]\n    end\n\n    HT -->|parse| DEF\n    SK -->|attach| DEF\n    SKR -->|per-role attach| DEF\n    AT -->|base template merge| DEF\n    INST -->|persist| PS\n    PS -->|load_state| INST\n    DEF -->|activate| INST\n```\n\n## Core Types\n\n### HandDefinition\n\nThe parsed representation of a `HAND.toml` file. Contains everything needed to describe a hand to the marketplace and spawn its agents:\n\n| Field | Purpose |\n|---|---|\n| `id` | Unique identifier (e.g. `\"clip\"`) |\n| `version` | Semantic version, defaults to `\"0.0.0\"` |\n| `name`, `description` | Human-readable metadata |\n| `category` | Marketplace category (`Content`, `Security`, `Data`, etc.) |\n| `agents` | `BTreeMap<String, HandAgentManifest>` — one or more agent configurations keyed by role name |\n| `requires` | Prerequisites that must be met before activation |\n| `settings` | Configurable options shown in the activation UI |\n| `dashboard` | Metrics schema for the hand's dashboard |\n| `routing` | Keywords for deterministic hand selection |\n| `i18n` | Localized strings keyed by language code |\n| `skill_content` | Bundled skill markdown (loaded at runtime, not from TOML) |\n\n### HandInstance\n\nA runtime record linking a `HandDefinition` to its spawned agents. Tracks:\n\n- `instance_id` (`Uuid`) — unique per activation\n- `hand_id` — which definition this is an instance of\n- `status` — `Active`, `Paused`, `Error(String)`, or `Inactive`\n- `agent_ids` — `BTreeMap<String, AgentId>` mapping role names to spawned agent IDs\n- `coordinator_role` — which agent receives user messages\n- `config` — user-provided setting overrides\n- `activated_at`, `updated_at` — timestamps\n\n### HandAgentManifest\n\nWraps an `AgentManifest` with hand-specific fields:\n\n- `coordinator: bool` — whether this agent receives user messages\n- `invoke_hint: Option<String>` — routing hint injected into the coordinator's system prompt\n- `base: Option<String>` — optional template reference for inheritance\n- `manifest: AgentManifest` — the flattened agent configuration (`#[serde(flatten)]`)\n\n## HAND.toml Format\n\nHands are defined in `HAND.toml` files. Two agent declaration formats are supported:\n\n### Single-Agent (Legacy)\n\n```toml\nid = \"clip\"\nname = \"Clip Hand\"\ndescription = \"Autonomous video clipping\"\ncategory = \"content\"\nicon = \"🎬\"\ntools = [\"shell_exec\"]\n\n[agent]\nname = \"clip-agent\"\ndescription = \"Clips videos\"\nsystem_prompt = \"You are a video clipping assistant.\"\n\n[dashboard]\nmetrics = []\n```\n\nThe `[agent]` section is automatically converted to `agents: { \"main\": {...} }` with `coordinator = true`.\n\n### Multi-Agent\n\n```toml\nid = \"research\"\nname = \"Research Hand\"\ndescription = \"Multi-agent research pipeline\"\ncategory = \"content\"\n\n[agents.planner]\ncoordinator = true\ninvoke_hint = \"Use planner for task decomposition\"\nname = \"planner-agent\"\ndescription = \"Plans research tasks\"\n\n[agents.planner.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nsystem_prompt = \"You plan research.\"\n\n[agents.analyst]\nname = \"analyst-agent\"\ndescription = \"Analyzes data\"\n\n[agents.analyst.model]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\nsystem_prompt = \"You analyze data.\"\n```\n\n### Agent Model Formats\n\nAgent sections accept two formats:\n\n**Nested** (preferred) — model fields under `[agents.role.model]`:\n```toml\n[agents.writer.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nmax_tokens = 8192\ntemperature = 0.5\nsystem_prompt = \"...\"\n```\n\n**Flat** (legacy) — model fields inline:\n```toml\n[agents.writer]\nname = \"writer\"\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\nsystem_prompt = \"...\"\n```\n\nFlat format is auto-detected and converted via `LegacyHandAgentConfig`. The heuristic checks whether the section contains a `model` sub-table.\n\n### Default Provider Sentinel\n\nWhen `provider` or `model` is omitted, the value defaults to `\"default\"` — a sentinel resolved at kernel driver-build time to the user's configured global default. This prevents hands from pinning users to a specific provider.\n\n## Agent Template Inheritance\n\nHands can reference reusable agent templates from the agents registry via the `base` field:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"my-writer\"              # loads registry/agents/my-writer/agent.toml\n\n[agents.writer.model]\nsystem_prompt = \"Custom prompt\" # overrides just this field\n```\n\n### Resolution Flow\n\n1. `parse_multi_agent_entry` extracts `base`, `coordinator`, `invoke_hint` from the TOML entry\n2. The base template is loaded from `{agents_dir}/{template_name}/agent.toml`\n3. `normalize_flat_to_nested` ensures the base template is in nested format\n4. `deep_merge_toml` recursively merges the hand's overlay onto the base (overlay wins)\n5. The merged result is parsed into `AgentManifest`\n\nTemplate names are validated to prevent path traversal — they must not contain `..`, `/`, or `\\`.\n\n**Only `[agents.*]` format supports `base`**. Using `base` in a single `[agent]` section returns an error.\n\n## HandRegistry\n\nThe central store for definitions and instances. Thread-safe via `DashMap` for concurrent reads and `Mutex` for serialized activation/deactivation.\n\n### Construction\n\n```rust\nlet registry = HandRegistry::new();\n```\n\n### Loading Definitions\n\nThree install paths exist, each with different capabilities:\n\n| Method | Disk Persistence | Base Templates | Use Case |\n|---|---|---|---|\n| `reload_from_disk` | Scans `registry/hands/` + `workspaces/` | ✅ | Daemon startup |\n| `install_from_path` | No (in-memory only) | ✅ | Development/testing |\n| `install_from_content` | No (in-memory only) | ❌ | API install without agents_dir |\n| `install_from_content_persisted` | Writes to `workspaces/{id}/` | ✅ | Dashboard \"install from content\" |\n\n`reload_from_disk` scans both `registry/hands/` (read-only, reset on sync) and `workspaces/` (user-writable, survives sync). Registry entries take precedence on id collision.\n\n### Activation Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Active: activate()\n    Active --> Paused: pause()\n    Paused --> Active: resume()\n    Active --> Error: set_error()\n    Error --> Active: resume()  (via set_status)\n    Active --> Inactive: deactivate()\n    Paused --> Inactive: deactivate()\n    Inactive --> [*]\n```\n\n**Activation** (`activate` / `activate_with_id`):\n- Validates the definition exists\n- Checks not already active (via `active_index`, serialized by `activate_lock` mutex)\n- Creates `HandInstance` with `Active` status\n- Agent spawning is done by the kernel after activation\n\n**Deactivation** (`deactivate`):\n- Removes the instance from `instances` map\n- Cleans up `agent_index` and `active_index`\n- If multiple instances of the same hand exist (restart recovery), re-inserts another active instance into `active_index`\n\n### Reverse Indexes\n\nTwo `DashMap` indexes enable O(1) lookups:\n\n- `agent_index`: `agent_id (String)` → `instance_id (Uuid)` — used by `find_by_agent` when routing messages\n- `active_index`: `hand_id (String)` → `instance_id (Uuid)` — used to check if a hand is currently active\n\n### Coordinator Resolution\n\n`HandInstance::coordinator_role()` resolves which agent receives user messages:\n\n1. If `coordinator_role` is set and the role exists in `agent_ids` → use it\n2. If only one agent → use it\n3. If `agent_ids` contains `\"main\"` → use it\n4. Fallback: first entry by `BTreeMap` sort order\n\n## Settings System\n\nHands declare configurable settings in `[[settings]]` arrays. Three setting types are supported:\n\n### Select\n\n```toml\n[[settings]]\nkey = \"stt_provider\"\nlabel = \"STT Provider\"\nsetting_type = \"select\"\ndefault = \"auto\"\n\n[[settings.options]]\nvalue = \"groq\"\nlabel = \"Groq Whisper\"\nprovider_env = \"GROQ_API_KEY\"    # env var checked for \"Ready\" badge\n```\n\n### Toggle\n\n```toml\n[[settings]]\nkey = \"tts_enabled\"\nlabel = \"TTS\"\nsetting_type = \"toggle\"\ndefault = \"false\"\n```\n\n### Text\n\n```toml\n[[settings]]\nkey = \"api_key\"\nlabel = \"API Key\"\nsetting_type = \"text\"\nenv_var = \"CUSTOM_API_KEY\"       # exposed to agent subprocess\n```\n\n### Resolution\n\n`resolve_settings` maps user config against the schema:\n\n1. For each setting, looks up the user's choice (falls back to `default`)\n2. `Select` — finds the matching option, collects its `provider_env`, builds a label line\n3. `Toggle` — renders \"Enabled\" / \"Disabled\"\n4. `Text` — includes value if non-empty, collects `env_var` if set\n\nReturns `ResolvedSettings` with:\n- `prompt_block: String` — markdown appended to the system prompt\n- `env_vars: Vec<String>` — env var names the agent subprocess needs\n\n### Availability Checking\n\n`check_settings_availability` cross-references each option's `provider_env` and `binary` against the runtime environment. Supports aliases (e.g., `GEMINI_API_KEY` also accepts `GOOGLE_API_KEY` via `env_aliases`).\n\n## Requirement Checking\n\nHands declare prerequisites in `[[requires]]` arrays:\n\n```toml\n[[requires]]\nkey = \"ffmpeg\"\nlabel = \"FFmpeg must be installed\"\nrequirement_type = \"binary\"\ncheck_value = \"ffmpeg\"\ndescription = \"Core video processing engine.\"\noptional = false\n\n[requires.install]\nmacos = \"brew install ffmpeg\"\nwindows = \"winget install Gyan.FFmpeg\"\nlinux_apt = \"sudo apt install ffmpeg\"\nestimated_time = \"2-5 min\"\n```\n\n### Requirement Types\n\n| Type | Check |\n|---|---|\n| `Binary` | Binary exists on PATH and is executable |\n| `EnvVar` | Environment variable is set and non-empty |\n| `ApiKey` | Same as EnvVar (semantic distinction) |\n| `AnyEnvVar` | Any one of comma-separated env vars is set |\n\n### Special Cases\n\n- **`python3`**: Runs `{cmd} --version` and checks for \"Python 3\" in output. Caches result via `OnceLock`. Tries `python3`, `python`, and well-known absolute paths. Avoids false positives from Windows Store shims.\n- **`chromium`**: Falls back to `chromium-browser`, `google-chrome`, `google-chrome-stable`, `chrome`, `CHROME_PATH` env var, and macOS app paths.\n\n### Readiness\n\n`HandRegistry::readiness` combines requirement checks with activation state:\n\n- `requirements_met` — all **non-optional** requirements are satisfied\n- `active` — at least one instance is `Active`\n- `degraded` — active but some requirement (including optional) is unmet\n\n## Persistence\n\nActive and paused instances are persisted to `hand_state.json` so they survive daemon restarts.\n\n### Format\n\nCurrent format version is **4**. Structure:\n\n```json\n{\n  \"version\": 4,\n  \"instances\": [\n    {\n      \"hand_id\": \"clip\",\n      \"instance_id\": \"uuid...\",\n      \"config\": {},\n      \"agent_ids\": { \"main\": \"agent-uuid...\" },\n      \"coordinator_role\": \"main\",\n      \"status\": \"Active\",\n      \"activated_at\": \"2025-01-01T00:00:00Z\",\n      \"updated_at\": \"2025-01-01T00:00:00Z\"\n    }\n  ]\n}\n```\n\n### Backward Compatibility\n\n`load_state` handles legacy formats:\n\n- **v1**: Bare JSON array of instance objects with single `agent_id`\n- **v2**: Wrapped object with `version` field and `instances` array, single `agent_id`\n- **v3/v4**: Typed `PersistedState` with multi-agent `agent_ids` map\n\nLegacy single `agent_id` values are converted to `{ \"main\": agent_id }`.\n\nError and Inactive instances from persisted state are skipped during restoration (logged but not re-activated).\n\n### Instance ID Stability\n\nWhen restoring from persisted state, `activate_with_id` is called with the original UUID so that deterministic agent IDs remain stable across restarts.\n\n## Internationalization\n\nHands can include localized strings under `[i18n.{lang}]`:\n\n```toml\n[i18n.zh]\nname = \"线索生成 Hand\"\ndescription = \"自主线索生成\"\n\n[i18n.zh.agents.main]\nname = \"主协调器\"\n\n[i18n.zh.settings.target_industry]\nlabel = \"目标行业\"\n```\n\nAll i18n fields are optional — omitting them falls back to English defaults. The `check_settings_availability` method accepts a `lang` parameter and returns translated labels when available.\n\n## Skill Content\n\nHands bundle skill instructions in markdown files:\n\n- `SKILL.md` — shared across all agents in the hand\n- `SKILL-{role}.md` — per-agent override (e.g. `SKILL-pm.md`, `SKILL-qa.md`)\n\nPer-role files take precedence over the shared file. Content is loaded at scan time by `scan_agent_skill_files` and attached to `HandDefinition::agent_skill_content`.\n\n## Uninstall Semantics\n\n`uninstall_hand` enforces three rules:\n\n1. **Unknown hand** → `HandError::NotFound`\n2. **Built-in hand** (lives under `registry/hands/`, not `workspaces/`) → `HandError::BuiltinHand` — the next registry sync would recreate it\n3. **Active hand** → `HandError::AlreadyActive` — deactivate first\n4. **Custom, inactive hand** → Removes from memory, deletes `workspaces/{id}/` directory\n\n## Error Types\n\n| Error | Meaning |\n|---|---|\n| `NotFound(String)` | Hand definition not in registry |\n| `AlreadyActive(String)` | Hand already has an active instance |\n| `AlreadyRegistered(String)` | Duplicate hand id during install |\n| `BuiltinHand(String)` | Cannot uninstall a registry hand |\n| `InstanceNotFound(Uuid)` | No instance with that UUID |\n| `ActivationFailed(String)` | Instance collision or other activation error |\n| `TomlParse(String)` | Invalid HAND.toml |\n| `Io(Error)` | Filesystem error |\n| `Config(String)` | Invalid configuration |\n\n## Integration Points\n\nThe Hands module connects to the rest of LibreFang through these call paths:\n\n- **Kernel** calls `activate` / `deactivate`, then `set_agents` after spawning. Uses `find_by_agent` for message routing and `agent_id` / `coordinator_agent_id` for the coordinator.\n- **HTTP routes** call `readiness`, `check_requirements`, `check_settings_availability`, `list_definitions`, `list_instances`, and `install_from_content_persisted`.\n- **TUI** calls `list_definitions`, `check_requirements`, and `list_instances` for display.\n- **Router** calls `parse_hand_toml` to load hand routing candidates for intent matching.\n- **Config defaults**: `default_provider` and `default_model` return `\"default\"` as sentinels, resolved by the kernel to the user's global model configuration at driver-build time.","http-infrastructure":"# HTTP Infrastructure\n\n# `librefang-http` — Centralized HTTP Client with Proxy & TLS Fallback\n\n## Purpose\n\nEvery outbound HTTP connection in the application passes through this module. It guarantees two things that vanilla `reqwest` clients don't provide out of the box:\n\n1. **TLS works everywhere** — even on systems without system CA certificates (musl builds, Termux, minimal Docker images) by bundling Mozilla CA roots as a fallback.\n2. **Proxy settings are uniform** — a single `init_proxy()` call at daemon startup configures proxy routing for the entire process, and hot-reload updates it without restarting.\n\nAll downstream crates (`librefang-runtime`, `librefang-runtime-mcp`, `librefang-runtime-oauth`, `librefang-cli`, `librefang-kernel`, etc.) call `proxied_client()` or `proxied_client_builder()` instead of constructing their own `reqwest::Client`.\n\n---\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[\"init_proxy(cfg)\"] -->|writes| B[\"GLOBAL_PROXY<br/>(RwLock)\"]\n    A -->|bootstrap only| C[\"HTTP_PROXY / HTTPS_PROXY<br/>NO_PROXY env vars\"]\n\n    D[\"tls_config()\"] -->|reads once| E[\"TLS_CONFIG<br/>(OnceLock)\"]\n    E --> F[\"webpki-roots<br/>(bundled Mozilla CAs)\"]\n    E --> G[\"rustls-native-certs<br/>(system CAs)\"]\n\n    H[\"proxied_client_builder()\"] --> I[\"build_http_client()\"]\n    I --> D\n    I --> J[\"active_proxy()\"]\n    J --> B\n\n    K[\"proxied_client()\"] --> H\n    L[\"proxied_client_with_override(url)\"] --> D\n    L -->|fallback on bad URL| K\n```\n\n---\n\n## Initialization Sequence\n\nAt daemon startup, call `init_proxy` with the `[proxy]` section from `config.toml`:\n\n```rust\nlet proxy_cfg: ProxyConfig = config.proxy.clone();\nlibrefang_http::init_proxy(proxy_cfg);\n```\n\nThis does two things:\n\n1. **Sets environment variables** (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY` and their lowercase equivalents) — but **only on the first call**, when `GLOBAL_PROXY` is still `None`. This happens before the Tokio runtime spawns worker threads, so `std::env::set_var` is safe.\n\n2. **Stores the config** in `GLOBAL_PROXY` (a `RwLock<Option<ProxyConfig>>`). Subsequent calls (hot-reload) update only this in-memory value, avoiding the racy `set_var` in a multi-threaded context.\n\nThe TLS config (`tls_config()`) initializes itself lazily on first use — no explicit setup required.\n\n---\n\n## TLS Configuration\n\n`tls_config()` returns a `rustls::ClientConfig` that combines two certificate sources:\n\n| Source | Purpose |\n|---|---|\n| `webpki_roots::TLS_SERVER_ROOTS` | Bundled Mozilla CA roots. Always present, ensures public CAs are trusted everywhere. |\n| `rustls_native_certs::load_native_certs()` | System CA certificates. Adds org-internal/self-signed CAs and keeps trust anchors current. |\n\nLoading happens once via a `OnceLock`. All client builders clone the cached config, so there's no repeated certificate parsing.\n\n---\n\n## Public API\n\n### Proxy Setup\n\n| Function | Description |\n|---|---|\n| `init_proxy(cfg: ProxyConfig)` | Set or update the global proxy configuration. Idempotent; safe for hot-reload. |\n| `active_proxy() -> ProxyConfig` | Returns the current global config (private). Falls back to `ProxyConfig::default()` if uninitialized. |\n\n### Client Construction\n\n| Function | Returns | When to use |\n|---|---|---|\n| `proxied_client()` | `reqwest::Client` | Most common. Ready-to-use client with global proxy + TLS. |\n| `proxied_client_builder()` | `reqwest::ClientBuilder` | When you need to customize timeouts, headers, or other options before building. |\n| `proxied_client_with_override(proxy_url: &str)` | `reqwest::Client` | When a specific provider needs its own proxy. Falls back to the global client if the URL is invalid. |\n| `build_http_client(proxy: &ProxyConfig)` | `reqwest::ClientBuilder` | Lower-level. Applies an explicit `ProxyConfig` rather than reading global state. |\n| `client_builder()` / `new_client()` | — | Backward-compatible aliases for `proxied_client_builder()` / `proxied_client()`. |\n\n### TLS\n\n| Function | Description |\n|---|---|\n| `tls_config() -> rustls::ClientConfig` | Returns the cached TLS config. Called internally by all builders; also available for crates that need it directly (e.g. `librefang-cli`). |\n\n---\n\n## Default Timeouts\n\n`build_http_client` applies sensible per-request defaults to prevent the agent loop from hanging indefinitely:\n\n- **Connect timeout**: 30 seconds — caps TCP + TLS handshake, generous for slow international links.\n- **Read timeout**: 300 seconds — per-read inactivity timeout (not total request time). Streaming LLM responses stay alive as long as tokens arrive; a true upstream stall triggers it.\n\nCallers can override both on the returned `ClientBuilder` via `.timeout()` and `.connect_timeout()`.\n\n---\n\n## Proxy Resolution Logic\n\nThe proxy applied to any given request is determined in this order:\n\n1. **Explicit `ProxyConfig` values** from `config.toml` — set directly on the `reqwest::ClientBuilder` as `Proxy::http()` / `Proxy::https()` with a `NoProxy` filter.\n2. **Environment variables** — when `ProxyConfig` fields are `None`, `reqwest` reads `HTTP_PROXY` / `HTTPS_PROXY` / `NO_PROXY` automatically. Since `init_proxy` exports config values as env vars during bootstrap, this keeps third-party crates that build their own clients consistent.\n3. **No proxy** — if nothing is configured, requests go direct.\n\nSupported proxy URL schemes: `http://`, `https://`, `socks5://`, `socks5h://`. Invalid schemes are logged (with the URL redacted) and ignored.\n\n---\n\n## Usage Patterns\n\n### Basic — get a client and make a request\n\n```rust\nlet client = librefang_http::proxied_client();\nlet resp = client.get(\"https://api.example.com/v1/models\").send().await?;\n```\n\n### Custom timeout for a slow endpoint\n\n```rust\nlet client = librefang_http::proxied_client_builder()\n    .timeout(std::time::Duration::from_secs(600))\n    .build()?;\n```\n\n### Per-provider proxy override\n\n```rust\n// Used by e.g. librefang-channels OpenAI driver when a provider\n// specifies its own proxy in the config.\nlet client = librefang_http::proxied_client_with_override(\"socks5://corp-proxy:1080\");\n```\n\n### During daemon startup\n\n```rust\n// Called once, before spawning the Tokio runtime\nlibrefang_http::init_proxy(config.proxy);\n\n// Later, during hot-reload (multi-threaded context is safe)\nlibrefang_http::init_proxy(new_proxy_config);\n```\n\n---\n\n## Thread Safety\n\n| State | Guard | Notes |\n|---|---|---|\n| `TLS_CONFIG` | `OnceLock` | Write-once, lock-free reads afterward. |\n| `GLOBAL_PROXY` | `RwLock` | Reads on every client construction; writes during `init_proxy` (startup + hot-reload). |\n| Environment variables | N/A | Only written during initial bootstrap (single-threaded). Never mutated after the Tokio runtime starts. |\n\n---\n\n## Downstream Consumers\n\nThe call graph shows this module is used pervasively across the codebase:\n\n- **`librefang-runtime`** — LLM provider drivers, web search/fetch, embedding, image generation, TTS, media transcription, model probing, health checks.\n- **`librefang-runtime-mcp`** — MCP server connections (HTTP compat, SSE).\n- **`librefang-runtime-oauth`** — OAuth device flows (ChatGPT, Copilot), token refresh.\n- **`librefang-runtime-wasm`** — Host network fetch from WASM plugins.\n- **`librefang-cli`** — CLI HTTP client with TLS config.\n- **`librefang-kernel`** — Device pairing notifications.\n\nAll of these go through `proxied_client()` or `proxied_client_builder()`, ensuring consistent proxy routing and TLS behavior.","llm-drivers-librefang-llm-driver-src":"# LLM Drivers — librefang-llm-driver-src\n\n# librefang-llm-driver-src\n\nProvider-agnostic LLM driver interface, error classification, and failover taxonomy.\n\nThis crate defines the contract that all LLM provider implementations (Anthropic, OpenAI, Ollama, Gemini, etc.) satisfy, along with a classification engine that maps raw provider errors into actionable categories for the `FallbackChain` provider-switching logic.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Caller] -->|CompletionRequest| B[LlmDriver trait]\n    B -->|complete| C[Provider-specific impl]\n    B -->|stream| C\n    C -->|LlmError| D[failover_reason]\n    D --> E[FailoverReason]\n    E --> F[FallbackChain]\n    F -->|retry/skip/propagate| B\n\n    subgraph \"Error Classification\"\n        G[classify_error] --> H[ClassifiedError]\n        G --> I[sanitize_for_user]\n        G --> J[extract_retry_delay]\n    end\n```\n\n## Core Types\n\n### `LlmDriver` Trait\n\nThe central abstraction. Every provider implements two methods:\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest) -> Result<CompletionResponse, LlmError>;\n    async fn stream(&self, request: CompletionRequest, tx: Sender<StreamEvent>) -> Result<CompletionResponse, LlmError>;\n    fn is_configured(&self) -> bool { true }\n}\n```\n\n- **`complete`** — blocking (non-streaming) request. Must be implemented by each provider.\n- **`stream`** — has a default implementation that calls `complete` then emits a single `TextDelta` followed by `ContentComplete`. Providers with native SSE/streaming support override this for incremental delivery.\n- **`is_configured`** — returns `true` for real drivers. Only `StubDriver` returns `false`, allowing the kernel to skip unconfigured provider slots.\n\n### `CompletionRequest`\n\nAll parameters needed for an LLM call:\n\n| Field | Purpose |\n|---|---|\n| `model` | Provider-specific model identifier |\n| `messages` | Conversation history (`Vec<Message>`) |\n| `tools` | Available tool definitions the model may invoke |\n| `max_tokens` | Generation cap |\n| `temperature` | Sampling temperature |\n| `system` | Extracted system prompt (some APIs need it separately from messages) |\n| `thinking` | Extended thinking/reasoning config (provider-specific) |\n| `prompt_caching` | Enable cache-control markers for supported providers |\n| `response_format` | Structured output (`ResponseFormat`) |\n| `timeout_secs` | Per-request inactivity timeout override |\n| `extra_body` | Provider-specific JSON merged into the request body (last-wins) |\n| `agent_id` | Owning agent identity for MCP bridge header propagation |\n\n### `CompletionResponse`\n\nThe response contains `content` blocks, a `stop_reason`, extracted `tool_calls`, and `usage` stats. The helper `text()` concatenates all `ContentBlock::Text` variants, filtering out thinking blocks:\n\n```rust\nlet reply: String = response.text();\n```\n\n### `StreamEvent`\n\nEmitted over a `tokio::sync::mpsc` channel during streaming:\n\n- **`TextDelta`** — incremental text chunk\n- **`ThinkingDelta`** — reasoning chain text (extended thinking models)\n- **`ToolUseStart` / `ToolInputDelta` / `ToolUseEnd`** — tool call lifecycle\n- **`ContentComplete`** — final event carrying `StopReason` and `TokenUsage`\n- **`PhaseChange`** — agent lifecycle signal (e.g., `\"response_complete\"`)\n- **`ToolExecutionResult`** — tool output (emitted by agent loop, not driver)\n- **`OwnerNotice`** — private owner-side notification (emitted by agent loop)\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) signals that LLM text is fully streamed and post-processing is about to begin. Consumers use this to unblock user input before the full response payload is finalized.\n\n## Error Handling\n\n### `LlmError`\n\nStructured error variants covering all failure modes:\n\n| Variant | Meaning |\n|---|---|\n| `Http(String)` | Transport-level failure (connection refused, TLS) |\n| `Api { status, message }` | HTTP response with non-2xx status |\n| `RateLimited { retry_after_ms, message }` | Explicit rate limit with optional backoff hint |\n| `Parse(String)` | Response body could not be deserialized |\n| `MissingApiKey(String)` | No API key configured |\n| `Overloaded { retry_after_ms }` | Provider capacity error |\n| `AuthenticationFailed(String)` | Invalid credentials |\n| `ModelNotFound(String)` | Model identifier not recognized by provider |\n| `TimedOut { inactivity_secs, partial_text, … }` | Subprocess stalled; partial output captured |\n\nThe `failover_reason()` method maps any `LlmError` into a `FailoverReason` for provider-switching decisions. This is a structural, allocation-free classification:\n\n```rust\nlet reason: FailoverReason = error.failover_reason();\n```\n\nStatus-code disambiguation rules for `Api` errors:\n\n- **401** → `AuthError`\n- **402** → `CreditExhausted`\n- **403** → inspect message body — rate limit keywords, billing keywords, and model keywords are checked before falling back to `AuthError`\n- **404** → `ModelUnavailable` only when message explicitly references a model; otherwise `HttpError` (generic endpoint 404)\n- **413** → `ContextTooLong`\n- **429** → `RateLimit`\n- **503** → `ModelUnavailable`\n- **400** → `ContextTooLong` if message contains context-related keywords; otherwise `HttpError`\n\n`Overloaded` maps to `RateLimit` (retry same provider with backoff). `Parse` maps to `Unknown` (propagate immediately — not recoverable by switching providers).\n\n## Error Classification Engine (`llm_errors`)\n\nThe `llm_errors` submodule provides a deeper classification system with two parallel taxonomies:\n\n### `LlmErrorCategory` (8 categories)\n\n```\nRateLimit · Overloaded · Timeout · Billing · Auth · ContextOverflow · Format · ModelNotFound\n```\n\nUsed for logging, metrics, and user-facing messages. Each `ClassifiedError` carries:\n\n- `category` and flags (`is_retryable`, `is_billing`)\n- `suggested_delay_ms` — parsed from `\"retry after N\"` patterns\n- `sanitized_message` — user-safe, with API keys and HTML stripped\n- `raw_message` — original text for logging\n- `provider` / `model` — optional context\n- `suggestion` — actionable guidance (e.g., \"Check your openai account balance\")\n\n### `FailoverReason` (8 variants)\n\n```\nRateLimit(Option<u64>) · CreditExhausted · ContextTooLong · ModelUnavailable · Timeout · HttpError · AuthError · Unknown\n```\n\nDrives `FallbackChain` recovery strategy:\n\n| Reason | Action |\n|---|---|\n| `RateLimit(ms)` | Sleep (if hint present), retry same provider |\n| `CreditExhausted` | Skip to next provider |\n| `AuthError` | Skip to next provider (different key may work) |\n| `ModelUnavailable` | Skip to next provider |\n| `Timeout` | Skip to next provider |\n| `HttpError` | Skip to next provider |\n| `ContextTooLong` | Propagate to caller (must compress conversation) |\n| `Unknown` | Propagate immediately |\n\n### Classification Flow\n\n`classify_error(message, status)` applies rules in priority order:\n\n1. **Status-code fast paths** — 429, 402, 401 are unambiguous\n2. **403 special handling** — checks `FORBIDDEN_NON_AUTH_PATTERNS` to avoid misclassifying Chinese provider quota/region errors as auth failures\n3. **Pattern matching** (case-insensitive substring, no regex) in order: `ContextOverflow` → `Billing` → `Auth` → `RateLimit` → `ModelNotFound` → `Format` → `Overloaded` → `Timeout`\n4. **HTML error page detection** — Cloudflare 521–530, `<!DOCTYPE`, `cf-error-code`\n5. **Fallback** — 5xx → `Overloaded`, 4xx → `Format`, network-sounding → `Timeout`, else → `Format`\n\nUse `classify_error_with_context(message, status, provider, model)` when caller context is available — it enriches the result with `provider`, `model`, `suggestion`, and an enriched `sanitized_message`.\n\n### Sanitization Pipeline\n\n`sanitize_for_user(category, raw)` produces user-safe messages:\n\n1. `extract_json_message` — pulls `.error.message`, `.message`, or `.detail` from JSON bodies\n2. `redact_secrets` — strips `sk-*`, `key-*`, `Bearer *` token fragments\n3. `strip_llm_wrapper` — removes `\"LLM driver error: API error (NNN): \"` prefix\n4. `is_html_error_page` — replaces HTML with `\"provider returned an error page\"`\n5. `cap_message` — truncates to 300 chars with `...` suffix\n\n### Transient Detection\n\n`is_transient(message)` is a lightweight check (no full classification) that returns `true` for rate-limit, overloaded, timeout, and transient SSL patterns (`bad_record_mac`, `ssl alert`, etc. — but not handshake failures, which are configuration errors).\n\n## Driver Configuration\n\n### `DriverConfig`\n\nSerializable configuration for constructing a driver:\n\n```rust\nlet config = DriverConfig {\n    provider: \"openai\".into(),\n    api_key: Some(\"sk-...\".into()),\n    base_url: None,                    // uses provider default\n    vertex_ai: VertexAiConfig::default(),\n    azure_openai: AzureOpenAiConfig::default(),\n    skip_permissions: true,            // default — daemon has no TTY\n    message_timeout_secs: 300,         // inactivity-based, not wall-clock\n    mcp_bridge: None,\n    proxy_url: None,\n    request_timeout_secs: None,\n};\n```\n\n**Security**: `DriverConfig` implements a custom `Debug` that redacts `api_key`, `vertex_ai.credentials_path`, and `proxy_url`. The `#[serde(skip)]` attribute on `mcp_bridge` prevents it from being persisted — it is set only at runtime by the kernel.\n\n### `McpBridgeConfig`\n\nConfiguration for exposing LibreFang tools to CLI-based drivers (e.g., Claude Code) through the daemon's `/mcp` endpoint:\n\n```rust\nMcpBridgeConfig {\n    base_url: \"http://127.0.0.1:4545\".into(),\n    api_key: Some(\"daemon-key\".into()),\n}\n```\n\nWhen present, the driver writes a temporary `mcp_config.json` and passes `--mcp-config` to the spawned CLI subprocess.\n\n## Integration Points\n\n### Consumers\n\n- **`make_request`** in `librefang-runtime/routing` constructs `CompletionRequest` and calls `complete`/`stream`\n- **`librefang-testing/mock_driver`** implements `LlmDriver` for deterministic test doubles\n- **`FallbackChain`** in `librefang-llm-drivers` uses `failover_reason()` to decide retry vs. skip\n- Various runtime modules (`probe_model`, `extract_memories`, `sse_send_request`) call `text()` on responses\n\n### Type Dependencies\n\n- `librefang_types::config` — `AzureOpenAiConfig`, `VertexAiConfig`, `ResponseFormat`, `ThinkingConfig`\n- `librefang_types::message` — `ContentBlock`, `Message`, `StopReason`, `TokenUsage`\n- `librefang_types::tool` — `ToolCall`, `ToolDefinition`","llm-drivers-librefang-llm-drivers-src":"# LLM Drivers — librefang-llm-drivers-src\n\n# librefang-llm-drivers\n\nMulti-provider LLM driver layer that abstracts completion and streaming requests behind a unified trait, with built-in credential pooling, jittered retry, rate-limit observability, and streaming content filtering.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Consumer Layer\"\n        RT[librefang-runtime]\n        AG[librefang-types / agent.rs]\n    end\n\n    subgraph \"Core Trait\"\n        LD[LlmDriver trait<br>complete() / stream()]\n    end\n\n    subgraph \"Drivers\"\n        AN[AnthropicDriver]\n        OAI[OpenAIDriver]\n        CGPT[ChatGptDriver]\n        AID[AiderDriver]\n        QC[QwenCodeDriver]\n        CC[ClaudeCodeDriver]\n        VA[VertexAIDriver]\n        TR[TokenRotationDriver]\n    end\n\n    subgraph \"Infrastructure\"\n        BO[backoff::jittered_backoff]\n        CP[CredentialPool]\n        RLT[RateLimitTracker]\n        TF[ThinkFilter]\n    end\n\n    RT --> LD\n    AG --> LD\n    LD --> AN\n    LD --> OAI\n    LD --> CGPT\n    LD --> AID\n    LD --> QC\n    LD --> CC\n    LD --> VA\n    LD --> TR\n    AN --> BO\n    AN --> RLT\n    OAI --> BO\n    OAI --> RLT\n    TR --> CP\n    RT --> TF\n```\n\n## Core Abstraction: `LlmDriver`\n\nAll providers implement the `LlmDriver` async trait defined in `llm_driver.rs`. The trait exposes two methods:\n\n- **`complete(request: CompletionRequest) → Result<CompletionResponse, LlmError>`** — single-shot request/response.\n- **`stream(request: CompletionRequest, tx: Sender<StreamEvent>) → Result<CompletionResponse, LlmError>`** — server-sent events streamed incrementally over `tx`, with a final `CompletionResponse` returned when the stream ends.\n\n`CompletionRequest` carries the model ID, message history, system prompt, tools, temperature, max tokens, thinking configuration, prompt caching flag, response format, and an optional timeout override. `CompletionResponse` normalises content blocks (text, tool use, thinking), stop reason, parsed tool calls, and token usage across all providers.\n\n`LlmError` distinguishes `Http`, `Api { status, message }`, `RateLimited`, `Overloaded`, `Parse`, `MissingApiKey`, and `AuthenticationFailed` — callers can pattern-match to decide whether to retry, rotate credentials, or surface an error to the user.\n\n---\n\n## Drivers\n\n### AnthropicDriver (`drivers/anthropic.rs`)\n\nCalls the Anthropic Messages API (`/v1/messages`). Key features:\n\n- **Prompt caching** — when `request.prompt_caching` is true, `cache_control: {\"type\": \"ephemeral\"}` markers are stamped on the system prompt, the last tool definition, and the last content block of the last user message. This causes Anthropic to cache the full prefix (system + tools + conversation history), yielding cost savings on multi-turn conversations.\n- **Extended thinking** — when `request.thinking` has a `budget_tokens ≥ 1024`, the driver enables Anthropic's thinking mode and automatically raises `max_tokens` to exceed the budget.\n- **Tool use** — full round-trip support. Tool inputs are normalised to JSON objects via `ensure_object()`, which wraps non-object values in `{\"raw_input\": ...}` so malformed model outputs are preserved rather than silently dropped.\n- **Streaming** — SSE events (`content_block_start`, `content_block_delta`, `content_block_stop`, `message_delta`) are parsed incrementally. Tool call arguments are accumulated across deltas and parsed at `content_block_stop`.\n- **Retry** — 429 (rate-limited) and 529 (overloaded) responses trigger up to 3 retries with `standard_retry_delay()`, honouring any `Retry-After` header as a floor.\n- **Response format** — Anthropic has no native `response_format` field; the driver appends JSON/schema instructions to the system prompt instead.\n- **Rate-limit headers** — parsed via `RateLimitSnapshot::from_headers()` and logged at warn/debug level.\n\n`build_anthropic_request()` is the shared function that constructs the `ApiRequest` for both `complete()` and `stream()`, ensuring identical wire format.\n\n### ChatGptDriver (`drivers/chatgpt.rs`)\n\nCalls the ChatGPT Responses API (`/codex/responses`) using OAuth session tokens rather than API keys. This is distinct from the OpenAI `/v1/chat/completions` endpoint — OAuth tokens with `api.connectors` scopes only work with the Responses API.\n\n**Token lifecycle:**\n1. Session token is provided at construction (from `librefang auth chatgpt`).\n2. The token is cached in `ChatGptTokenCache` with a 7-day TTL and 1-hour refresh buffer.\n3. If the API responds with 401/403, `refresh_token()` uses the `CHATGPT_REFRESH_TOKEN` env var to obtain a new access token via `librefang_runtime_oauth`.\n4. Post-refresh 401/403 is raised as `AuthenticationFailed` with a re-authentication hint.\n\n**Streaming:** The driver always sends `stream: true`. `stream_sse()` handles Responses API events including `response.output_text.delta`, `response.reasoning.delta`, `response.output_item.added` (function calls), `response.function_call_arguments.delta/done`, and `response.completed`. If streaming deltas were missed, `backfill_from_completed_output()` extracts content from the final `response.completed` payload.\n\n### AiderDriver (`drivers/aider.rs`)\n\nSpawns the `aider` CLI as a non-interactive subprocess. Aider handles its own LLM provider authentication via standard environment variables (`OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, etc.).\n\n- `detect()` checks whether `aider --version` succeeds.\n- `build_args()` constructs CLI flags: `--message`, `--yes-always`, `--no-auto-commits`, `--no-git`, and optionally `--model` (the `aider/` prefix is stripped from model IDs).\n- The multi-turn message history is flattened into a single `[System]\\n…\\n[User]\\n…` text prompt.\n- Token usage is reported as zero (Aider doesn't expose it).\n\n### Other Drivers (referenced in call graph)\n\n| Driver | Transport | Auth |\n|--------|-----------|------|\n| `OpenAIDriver` | HTTP `/v1/chat/completions` | API key |\n| `VertexAIDriver` | HTTP Vertex AI endpoint | Google service account JWT (self-signed RSA-SHA256, no external JWT library) |\n| `GeminiDriver` | Used by Vertex AI for tool conversion | — |\n| `QwenCodeDriver` | CLI subprocess (`qwen-code`) | Credentials file from `~/.qwen/` |\n| `ClaudeCodeDriver` | CLI subprocess (`claude`) | Credentials file check |\n| `TokenRotationDriver` | Wraps another driver | Delegates credential selection to `CredentialPool` |\n\n---\n\n## Infrastructure Modules\n\n### Backoff (`backoff.rs`)\n\nJittered exponential backoff for retry loops.\n\n**Formula:** `delay = max(exp_delay, floor) + jitter`\n\nWhere `exp_delay = min(base × 2^(attempt−1), max_delay)` and `jitter ∈ [0, jitter_ratio × base_for_jitter]`.\n\nThe random seed combines `SystemTime::now().subsec_nanos()` XOR'd with a process-global monotonic Weyl-sequence counter (`JITTER_COUNTER`), ensuring seed diversity even when the OS clock has coarse granularity or multiple threads retry simultaneously.\n\nAll exponential computation is done in `f64` space to avoid `Duration::mul_f64` panicking on overflow at high attempt numbers. The result is clamped to `max_delay` before constructing a `Duration`.\n\n| Function | Base | Cap | Jitter | Floor |\n|----------|------|-----|--------|-------|\n| `standard_retry_delay(attempt, floor)` | 2 s | 60 s | 50% | Caller-supplied (e.g. `Retry-After`), capped at 300 s |\n| `tool_use_retry_delay(attempt)` | 1.5 s | 60 s | 50% | None |\n\n### Credential Pool (`credential_pool.rs`)\n\nThread-safe pool of API keys for a single provider, designed for failover when one key hits rate limits or quota exhaustion.\n\n**Strategies:**\n\n| Strategy | Behaviour |\n|----------|-----------|\n| `FillFirst` | Always pick the highest-priority available key; fall back only when exhausted. |\n| `RoundRobin` (default) | Cycle through available keys in priority order, distributing load. |\n| `Random` | Pick a random available key using a time-seeded LCG (avoids `rand` dependency). |\n| `LeastUsed` | Pick the key with the lowest `request_count`. |\n\n**Lifecycle:**\n1. `acquire()` — returns a cloned API key string, or `None` if all keys are exhausted.\n2. `mark_exhausted(key)` — places the key in cooldown for `exhausted_ttl` (default 1 hour).\n3. `mark_success(key)` — increments `request_count` and clears any exhaustion marker (early recovery).\n\nThe inner state (`credentials` + `round_robin_idx`) is protected by a single `Mutex`, so the index read and credential selection are atomic — no TOCTOU between concurrent `acquire()` calls.\n\n`CredentialSnapshot` provides a redacted view (`****abcd`) for diagnostics and dashboards. `ArcCredentialPool` is the standard shared handle type.\n\n### Rate Limit Tracker (`rate_limit_tracker.rs`)\n\nParses HTTP rate-limit headers into a structured `RateLimitSnapshot`. Supports:\n- Token-bucket headers (`x-ratelimit-limit-*`, `x-ratelimit-remaining-*`)\n- Reset timestamps (ISO 8601, HTTP-date, or seconds-from-now)\n- `has_warning()` / `display()` for log output\n\nThe `display()` formatter produces ASCII progress bars and usage ratios, consumed throughout the codebase (migrations, tool runners, plugin runtime, etc.).\n\n### Think Filter (`think_filter.rs`)\n\nStateful streaming filter that strips `<think …>…<\/think)` blocks from LLM output. Designed for models that emit reasoning traces in custom XML-like tags. The filter operates on partial text deltas and correctly handles tags split across multiple `process()` calls. Its `flush()` method is called from the wire layer and process manager when output ends.\n\n---\n\n## Error Handling and Retry Pattern\n\nAll HTTP-based drivers follow the same retry pattern:\n\n1. Attempt the request (up to `max_retries + 1` total attempts).\n2. On 429 or provider-specific overload (e.g. Anthropic 529), extract `Retry-After` header if present.\n3. Sleep for `standard_retry_delay(attempt, retry_after_floor)`.\n4. On final failure, return `LlmError::RateLimited` or `LlmError::Overloaded`.\n5. Non-retryable errors (4xx except 429) return immediately as `LlmError::Api`.\n\nFor credential exhaustion (402, 429 with quota depletion), `TokenRotationDriver` uses `CredentialPool::mark_exhausted()` to rotate to the next key.\n\n---\n\n## Integration Points\n\n- **`librefang-runtime`** — consumes `LlmDriver` implementations to execute agent turns. Uses `ThinkFilter` to clean streaming output and `RateLimitTracker` for observability.\n- **`librefang-types`** — defines `CompletionRequest`, `CompletionResponse`, `Message`, `ContentBlock`, `TokenUsage`, `ToolDefinition`, `ToolCall`, and `ResponseFormat` shared across all drivers.\n- **`librefang-http`** — provides `proxied_client()` and `proxied_client_with_override()` for HTTP clients that respect system proxy settings.\n- **`librefang-runtime-oauth`** — provides `chatgpt_oauth::refresh_access_token()` for ChatGPT token renewal.\n- **`librefang-extensions/vault`** — credential file existence checks for CLI-based drivers (`claude_credentials_exist`, `qwen_credentials_exist`).","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nUnified abstraction layer for interacting with multiple LLM providers through a single trait-based interface, with built-in credential management, rate-limit observability, and intelligent error-driven failover.\n\n## Sub-module Breakdown\n\n| Sub-module | Role |\n|---|---|\n| [librefang-llm-driver-src](librefang-llm-driver-src.md) | **Interface & taxonomy.** Defines the `LlmDriver` trait, `CompletionRequest`/response types, and the error classification engine (`classify_error` → `ClassifiedError` → `FailoverReason`) that drives failover decisions. |\n| [librefang-llm-drivers-src](librefang-llm-drivers-src.md) | **Concrete implementations.** Ships provider-specific drivers (Anthropic, OpenAI, ChatGPT, Claude Code, Aider, Qwen Code, Vertex AI/Gemini) plus cross-cutting infrastructure: `TokenRotationDriver`, `CredentialPool`, `RateLimitTracker`, and streaming `ThinkFilter`. |\n\n## How They Connect\n\n```mermaid\ngraph LR\n    subgraph \"librefang-llm-driver (interface)\"\n        LT[LlmDriver trait]\n        ERR[classify_error → FailoverReason]\n    end\n\n    subgraph \"librefang-llm-drivers (implementations)\"\n        DRV[Anthropic / OpenAI / Vertex AI / …]\n        INF[CredentialPool · RateLimitTracker · ThinkFilter]\n    end\n\n    CALLER[Runtime / Agent] -->|CompletionRequest| LT\n    LT -->|delegates| DRV\n    DRV -->|uses| INF\n    DRV -->|LlmError| ERR\n    ERR -->|retry / skip / propagate| CALLER\n```\n\n1. **Request flow** — The runtime or agent layer calls `LlmDriver::complete()` or `LlmDriver::stream()` defined in the interface crate.\n2. **Provider dispatch** — A concrete driver in the implementations crate executes the request against its specific API, pulling credentials from `CredentialPool` and tracking rate-limit headers via `RateLimitTracker`.\n3. **Error classification** — Any provider error is fed through `classify_error`, producing a `FailoverReason` that the `FallbackChain` uses to decide whether to retry, switch provider, or surface the error.\n4. **Streaming post-processing** — Streaming responses pass through `ThinkFilter` to strip or transform `<think…>` blocks before reaching the consumer.\n\n## Key Design Decisions\n\n- **Trait-first**: Adding a new provider means implementing `LlmDriver` in the implementations crate; the interface crate and all consumers remain unchanged.\n- **Failover-aware errors**: Error classification is provider-agnostic, so the `FallbackChain` can reason uniformly across heterogeneous backends.\n- **Credential pooling**: Multiple API keys per provider are rotated transparently, reducing per-key rate-limit pressure.","memory-system":"# Memory System\n\n# Memory System (`librefang-memory`)\n\n## Overview\n\nThe memory system provides persistent, multi-modal storage for LibreFang agents. It unifies three distinct storage paradigms behind a single `MemorySubstrate` facade:\n\n- **Structured store** — per-agent key-value pairs for configuration, state, and indexed memory items\n- **Semantic store** — free-text memories with optional vector embeddings for similarity search\n- **Knowledge graph** — entities and relations supporting pattern-based graph queries\n\nOn top of these, a **proactive memory** layer (mem0-style) adds automatic extraction, deduplication, conflict detection, confidence decay, and eviction.\n\nAll data lives in SQLite. Vector operations are delegated to an injectable `VectorStore` backend — either the built-in `SqliteVectorStore` (cosine similarity over stored blobs) or `HttpVectorStore` (remote service).\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Proactive Layer\"\n        PM[ProactiveMemoryStore]\n        PM -->|auto_memorize| EXT[MemoryExtractor]\n        PM -->|decide_action| DEC[ADD / UPDATE / NOOP]\n    end\n\n    subgraph \"MemorySubstrate\"\n        SS[StructuredStore]\n        SEM[SemanticStore]\n        KS[KnowledgeStore]\n        SES[SessionStore]\n    end\n\n    subgraph \"Storage Backends\"\n        DB[(SQLite)]\n        VS[VectorStore]\n    end\n\n    PM --> SS\n    PM --> SEM\n    PM --> KS\n    SEM --> VS\n    SS --> DB\n    SEM --> DB\n    KS --> DB\n    SES --> DB\n\n    VS -->|local| SQLITE_VEC[SqliteVectorStore]\n    VS -->|remote| HTTP_VEC[HttpVectorStore]\n```\n\n## Key Components\n\n### `MemorySubstrate` (`substrate.rs`)\n\nThe top-level entry point. Owns a single SQLite connection (wrapped in `Arc<Mutex<Connection>>`) and exposes all operations across every store. Created via:\n\n- `MemorySubstrate::open(path, embedding_dim)` — opens/creates a database file\n- `MemorySubstrate::open_in_memory(embedding_dim)` — in-memory database for tests\n- `MemorySubstrate::open_with_chunking(path, embedding_dim, chunk_config)` — enables automatic text chunking for long documents\n\nThe substrate runs migrations on creation and provides methods like `remember`, `recall`, `recall_with_embedding`, `query_graph`, `save_session`, `task_post`, and `import`.\n\n### Structured Store (`structured.rs`)\n\nPer-agent key-value storage. Each key is scoped to an `AgentId`. Values are arbitrary `serde_json::Value`. Used for:\n\n- Agent state persistence\n- Memory item metadata (`memory:<id>` keys)\n- Task queue entries\n- Agent registration\n\nKey methods: `set`, `get`, `delete`, `list_kv`, `remove_agent`.\n\n### Semantic Store (`semantic.rs`)\n\nFree-text memories with confidence scores, access tracking, scope classification, and optional vector embeddings. Each memory is a row in the `memories` table with:\n\n| Column | Purpose |\n|--------|---------|\n| `content` | The memory text |\n| `embedding` | Serialized `Vec<f32>` blob |\n| `scope` | `user_memory`, `session_memory`, `agent_memory`, or `episodic` |\n| `confidence` | 0.0–1.0 score, decayed over time |\n| `accessed_at` / `access_count` | Tracks recency and frequency |\n| `peer_id` | Per-user isolation within an agent |\n| `modality` | `text` or future multimodal types |\n\n**Search behavior** depends on whether embeddings are available:\n\n- **With embeddings**: `recall_with_embedding` computes cosine similarity between the query embedding and stored embeddings, falling back to LIKE matching when no embedding exists for a memory.\n- **Without embeddings**: `recall` uses SQL `LIKE` matching against content.\n\nKey methods: `remember`, `remember_with_embedding`, `recall`, `recall_with_embedding`, `forget`, `update_content`, `get_by_id`, `lowest_confidence`, `count`.\n\n### Knowledge Graph (`knowledge.rs`)\n\nStores entities (`EntityType::Person`, `Organization`, `Concept`, `Custom`, etc.) and typed relations (`WorksAt`, `Knows`, `RelatedTo`, etc.) in SQLite tables.\n\nImportant design detail: relations can reference entities **by ID or by name**. The MCP tool layer typically uses names, so the SQL JOINs in `query_graph` match on both `r.source_entity = s.id` and `r.source_entity = s.name`. This is covered by a regression test (`test_query_graph_relation_references_by_name`).\n\nKey methods: `add_entity`, `add_relation`, `query_graph(GraphPattern)`, `has_relation`, `delete_by_agent`.\n\n### Session Store (`session.rs`)\n\nManages conversation history per session and agent. Supports:\n\n- **Standard sessions**: Per-session message lists with FTS5 full-text search\n- **Canonical sessions**: Cross-channel persistent memory that merges messages from multiple channels (e.g., WhatsApp, API) for the same agent\n- **JSONL mirrors**: Append-only log files for external consumption\n- **Compaction**: Summarizes old messages to manage context window size\n\n`canonical_context(agent_id, channel)` returns recent messages for a specific channel, enabling chat-scoped isolation while maintaining a shared agent memory.\n\n### Text Chunker (`chunker.rs`)\n\nSplits long documents into overlapping chunks for embedding-based storage. Splitting strategy (in priority order):\n\n1. **Paragraph boundaries** (`\\n\\n`)\n2. **Sentence boundaries** (`. `, `.\\n`, `。`, `？`, `！`)\n3. **Hard character limit** (Unicode-safe, respects char boundaries)\n\n```rust\npub fn chunk_text(text: &str, max_size: usize, overlap: usize) -> Vec<String>\n```\n\nOverlap is applied by prepending the last `overlap` characters of the previous chunk to the next. When chunking is enabled on the substrate, `remember` automatically chunks text exceeding the configured limit and stores each chunk as a separate memory. Each chunk gets its own embedding (not shared).\n\n### Proactive Memory (`proactive.rs`)\n\nThe mem0-style API layer. Implements the `ProactiveMemory` and `ProactiveMemoryHooks` traits.\n\n**Core flow for `add()`**:\n\n```\nmessages → MemoryExtractor::extract() → MemoryItem[]\n    for each item:\n        embed content (if driver available)\n        search for similar existing memories (top 5)\n        decide_action(item, existing) → ADD | UPDATE | NOOP\n        execute action:\n            ADD → semantic.remember + structured.set\n            UPDATE → semantic.update_content (in-place) + conflict detection\n            NOOP → skip (duplicate)\n```\n\n**Conflict detection**: When updating, the system compares old and new content for contradictory signals. If a conflict is detected, it's logged and flagged in metadata with a `version_history` chain.\n\n**Auto-consolidation**: Runs every 10 `auto_memorize` calls per agent. Merges highly similar memories (>90% text similarity via Jaccard).\n\n**Confidence decay**: Rate-limited to once per hour. Applies exponential decay:\n```\nnew_confidence = confidence * e^(-decay_rate * days_since_access)\n```\nFrequently accessed memories get a boost: `* min(1.0 + log2(access_count), 2.0)`.\n\n**Session TTL cleanup**: Also rate-limited to once per hour. Soft-deletes `session_memory` scope entries older than the configured TTL.\n\n**Memory cap enforcement**: When `max_memories_per_agent` is set, adding memories that exceed the cap triggers eviction of the lowest-confidence memories.\n\n**Export/Import**: `export_all` returns all memories as `Vec<MemoryExportItem>`. `import_memories` deduplicates against existing content (>90% similarity) before storing.\n\n### Consolidation Engine (`consolidation.rs`)\n\nTwo-phase consolidation cycle:\n\n1. **Decay**: Reduces confidence of memories not accessed in 7+ days by a configurable `decay_rate` factor (minimum floor: 0.1).\n2. **Merge**: Compares all active memories pairwise (sorted by confidence descending). Pairs with >90% text similarity are merged — the lower-confidence memory is soft-deleted, and if it had higher confidence somehow, the keeper is lifted to that value. Capped at 100 merges per run to avoid O(n²) blowout.\n\nReturns a `ConsolidationReport` with counts and duration.\n\n### Decay (`decay.rs`)\n\nScope-based TTL deletion (hard delete, not soft):\n\n| Scope | Behavior |\n|-------|----------|\n| `user_memory` | Never decays — permanent |\n| `session_memory` | Deleted after `session_ttl_days` of no access |\n| `agent_memory` | Deleted after `agent_ttl_days` of no access |\n\nAccessing a memory (via `recall_with_embedding`) updates `accessed_at`, resetting the timer. Configured via `MemoryDecayConfig` with an `enabled` flag.\n\n### HTTP Vector Store (`http_vector_store.rs`)\n\nA `VectorStore` implementation that delegates to a remote HTTP service. Useful for plugging in Qdrant, Weaviate, or custom microservices.\n\nExpected API contract:\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| POST | `/insert` | Store embedding + payload |\n| POST | `/search` | Nearest-neighbor search |\n| DELETE | `/delete` | Remove by ID |\n| POST | `/get_embeddings` | Batch fetch embeddings |\n\n### Migrations (`migration.rs`)\n\nVersioned schema migrations using SQLite's `user_version` pragma. Currently at schema version 21. Each migration is idempotent (checks for existing columns/tables before altering). Key schema additions across versions:\n\n- **v1**: Core tables (agents, sessions, memories, entities, relations, kv_store, task_queue)\n- **v3**: Embedding column on memories\n- **v5**: Canonical sessions for cross-channel memory\n- **v9**: Performance indexes for proactive memory queries\n- **v10**: `agent_id` on entities/relations for per-agent cleanup\n- **v12**: FTS5 virtual table for session search\n- **v13**: Prompt versioning and A/B testing tables\n- **v15**: Multimodal memory columns (image_url, image_embedding, modality)\n- **v16**: `peer_id` on memories/sessions for per-user isolation\n- **v20–v21**: Task queue `claimed_at` and `retry_count` for stuck-task detection\n\n### Memory Provider (`provider.rs`)\n\nA plugin system with a `MemoryProvider` trait and `MemoryManager` that supports hot-swappable backends. Includes `NullMemoryProvider` for agents that don't need persistence.\n\n## Usage Patterns\n\n### Basic remember/recall\n\n```rust\nlet substrate = MemorySubstrate::open_in_memory(1536)?;\nlet agent_id = AgentId(Uuid::new_v4());\n\n// Store a memory\nsubstrate.remember(agent_id, \"User prefers dark mode\", MemorySource::Conversation, \"user_memory\", HashMap::new())?;\n\n// Recall memories\nlet results = substrate.recall(\"preferences\", 10, Some(MemoryFilter::agent(agent_id)))?;\n```\n\n### With vector embeddings\n\n```rust\n// During substrate creation or later:\nsubstrate.set_vector_store(Arc::new(SqliteVectorStore::new(conn, 1536)));\n\n// Recall with embedding similarity\nlet query_embedding: Vec<f32> = embed(\"dark mode settings\");\nlet results = substrate.recall_with_embedding(\"dark mode\", 10, filter, Some(&query_embedding))?;\n```\n\n### Proactive memory (mem0-style)\n\n```rust\nlet store = ProactiveMemoryStore::with_default_config(Arc::new(substrate))\n    .with_embedding(embedding_driver);\n\n// Auto-memorize from conversation\nstore.add(&messages, \"user-123\").await?;\n\n// Search\nlet results = store.search(\"dark mode preferences\", \"user-123\", 10).await?;\n\n// Auto-retrieve context before agent execution\nlet context = store.auto_retrieve(\"user-123\", \"What are my settings?\").await?;\n```\n\n### Knowledge graph queries\n\n```rust\nlet knowledge = substrate.knowledge();\nknowledge.add_entity(Entity { name: \"Alice\".into(), entity_type: EntityType::Person, ... }, \"agent-1\")?;\nknowledge.add_relation(Relation { source: \"Alice\", relation: RelationType::WorksAt, target: \"Acme\", ... }, \"agent-1\")?;\n\nlet matches = knowledge.query_graph(GraphPattern {\n    source: Some(\"Alice\".into()),\n    relation: Some(RelationType::WorksAt),\n    target: None,\n    max_depth: 1,\n})?;\n```\n\n## Integration Points\n\nThe memory system is consumed by:\n\n- **Agent loop** (`librefang-runtime/src/agent_loop.rs`): Calls `recall_with_embedding_async` to inject relevant memories into the LLM context, and `remember` to persist interaction facts after each turn.\n- **Context engine** (`librefang-runtime/src/context_engine.rs`): Uses `MemorySubstrate` as the backing store for context assembly.\n- **Session compactor** (`librefang-runtime/src/compactor.rs`): Reads session history for summarization.\n- **Proactive memory init** (`librefang-runtime/src/proactive_memory.rs`): Constructs `ProactiveMemoryStore` with the appropriate extractor and embedding driver.\n- **API routes** (`src/routes/memory.rs`): HTTP endpoints for memory CRUD call into `ProactiveMemoryStore` and `SemanticStore`.\n- **Frontend queries** (`lib/queries/memory.ts`, `lib/queries/hands.ts`): Read memory stats via the `stats()` method.","migration-tools":"# Migration Tools\n\n# Migration Tools (`librefang-migrate`)\n\nImports agents, configuration, memory, sessions, and channel setup from other agent frameworks into LibreFang's native format.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"CLI / TUI / API\"] --> run_migration[\"run_migration()\"]\n    run_migration --> |OpenClaw| OC[\"openclaw::migrate()\"]\n    run_migration --> |OpenFang| OF[\"openfang::migrate()\"]\n    run_migration --> |LangChain / AutoGPT| ERR[\"UnsupportedSource error\"]\n\n    OC -->|JSON5 config| J5[\"migrate_from_json5()\"]\n    OC -->|YAML config| YML[\"migrate_from_legacy_yaml()\"]\n\n    J5 --> CFG[\"config.toml\"]\n    J5 --> AGENTS[\"agents/*/agent.toml\"]\n    J5 --> MEM[\"agents/*/imported_memory.md\"]\n    J5 --> SESS[\"imported_sessions/*.jsonl\"]\n    J5 --> WS[\"agents/*/workspace/\"]\n    J5 --> SEC[\"secrets.env\"]\n\n    OC --> SCAN[\"scan_openclaw_workspace()\"]\n    OF --> REPORT[\"MigrationReport\"]\n    J5 --> REPORT\n    YML --> REPORT\n```\n\n## Public API\n\n### `MigrateSource`\n\nSource framework selector:\n\n| Variant | Status |\n|---|---|\n| `OpenClaw` | Fully supported |\n| `OpenFang` | Supported (same-format fork) |\n| `LangChain` | Planned — returns `UnsupportedSource` |\n| `AutoGpt` | Planned — returns `UnsupportedSource` |\n\n### `MigrateOptions`\n\n```rust\npub struct MigrateOptions {\n    pub source: MigrateSource,\n    pub source_dir: PathBuf,   // Source workspace root\n    pub target_dir: PathBuf,   // LibreFang home directory\n    pub dry_run: bool,         // Report only, no filesystem changes\n}\n```\n\n### `run_migration`\n\n```rust\npub fn run_migration(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>\n```\n\nEntry point. Dispatches to the appropriate source migrator. On success, returns a `MigrationReport` listing every imported item, skipped feature, and warning. If `dry_run` is `false`, a `migration_report.md` is also written into the target directory.\n\n### `MigrateError`\n\nAll errors that can occur during migration:\n\n| Variant | Meaning |\n|---|---|\n| `SourceNotFound(PathBuf)` | Source directory does not exist |\n| `ConfigParse(String)` | Malformed config file |\n| `AgentParse(String)` | Malformed agent definition |\n| `Io(std::io::Error)` | Filesystem I/O failure |\n| `Yaml(serde_yaml::Error)` | Legacy YAML parse failure |\n| `Json5Parse(String)` | Modern JSON5 parse failure |\n| `TomlSerialize(toml::ser::Error)` | Output TOML serialization failure |\n| `UnsupportedSource(String)` | Framework not yet supported |\n\n## OpenClaw Migration\n\nThe OpenClaw migrator handles both the modern single-file JSON5 format and the legacy multi-file YAML layout. It auto-detects which format is present.\n\n### Supported Config Formats\n\n**Modern (JSON5)** — a single `openclaw.json` at the workspace root containing everything. The file discovery checks these names in order: `openclaw.json`, `clawdbot.json`, `moldbot.json`, `moltbot.json`.\n\n**Legacy (YAML)** — separate files: `config.yaml` for global config, `agents/<id>/agent.yaml` per agent, `messaging/<channel>.yaml` per channel.\n\n### Workspace Auto-Detection\n\n`detect_openclaw_home()` searches standard locations:\n\n- `$OPENCLAW_STATE_DIR` environment override\n- `~/.openclaw`, `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`\n- `~/openclaw`, `~/.config/openclaw`\n- `%APPDATA%/openclaw`, `%LOCALAPPDATA%/openclaw` (Windows)\n\nA candidate directory is validated by checking for a config file, a `sessions/` subdirectory, or a `memory/` subdirectory.\n\n### Workspace Scanning\n\n`scan_openclaw_workspace(path)` inspects an OpenClaw workspace without migrating and returns a `ScanResult` listing discovered agents (with provider, model, tool count, memory/workspace presence), active channels, installed skills, and whether memory data exists.\n\n### What Gets Migrated\n\n| Component | Source | Destination |\n|---|---|---|\n| Global config | `openclaw.json` or `config.yaml` | `config.toml` |\n| Agent definitions | `agents.list[]` or `agents/*/agent.yaml` | `agents/<id>/agent.toml` |\n| Memory files | `memory/<id>/MEMORY.md` or `agents/<id>/MEMORY.md` | `agents/<id>/imported_memory.md` |\n| Workspace dirs | `workspaces/<id>/` or `agents/<id>/workspace/` | `agents/<id>/workspace/` |\n| Session logs | `sessions/*.jsonl` | `imported_sessions/*.jsonl` |\n| Channel configs | `channels.*` or `messaging/*.yaml` | `[channels.*]` in `config.toml` |\n| Secrets (tokens) | Inline in JSON5 config | `secrets.env` (with `0o600` permissions on Unix) |\n\n### What Gets Skipped (Reported)\n\nThese OpenClaw features have no LibreFang equivalent and are reported as skipped items:\n\n- **Cron jobs** — LibreFang uses `ScheduleMode::Periodic` instead\n- **Webhook hooks** — LibreFang uses its event system\n- **Auth profiles** (`auth-profiles.json`, inline `auth.profiles`) — must be set as environment variables manually\n- **Skills entries** — must be reinstalled via `librefang skill install`\n- **Vector search index** (`memory-search/index.db`) — LibreFang rebuilds embeddings from scratch\n- **Session/memory backend config** — LibreFang uses its own SQLite + vector store\n- **iMessage channel** — macOS-only, requires manual setup\n- **BlueBubbles channel** — no LibreFang adapter exists\n\n### Channel Support\n\n13 channel types are recognized from JSON5 config. The migrator maps each to its LibreFang `[channels.<name>]` TOML section:\n\n| Channel | Secrets Extracted | Notes |\n|---|---|---|\n| `telegram` | `TELEGRAM_BOT_TOKEN` | `allow_from` → `allowed_users` |\n| `discord` | `DISCORD_BOT_TOKEN` | `allow_from` → `allowed_users` |\n| `slack` | `SLACK_BOT_TOKEN`, `SLACK_APP_TOKEN` | `allow_from` cannot map (no per-user field) |\n| `whatsapp` | Credentials dir copied | May require re-authentication |\n| `signal` | None (URL-based) | `httpHost` + `httpPort` → `api_url` |\n| `matrix` | `MATRIX_ACCESS_TOKEN` | `rooms` → `allowed_rooms`; `allow_from` cannot map |\n| `google_chat` | Service account file copied | |\n| `teams` | `TEAMS_APP_PASSWORD` | `tenantId` → `allowed_tenants`; `allow_from` cannot map |\n| `irc` | `IRC_PASSWORD` | `channels` as TOML array |\n| `mattermost` | `MATTERMOST_TOKEN` | `allow_from` cannot map |\n| `feishu` | `FEISHU_APP_SECRET` | `domain` maps to `region` (\"cn\" or \"intl\") |\n| `imessage` | — | Skipped (macOS-only) |\n| `bluebubbles` | — | Skipped (no adapter) |\n\nWhen `allow_from` cannot be auto-mapped to a LibreFang field, a warning is added to the report.\n\n### Policy Mapping\n\nOpenClaw DM and group policies are mapped to LibreFang equivalents:\n\n**DM Policy:**\n\n| OpenClaw | LibreFang |\n|---|---|\n| `open` | `respond` |\n| `allowlist` / `allow_list` | `allowed_only` |\n| `pairing` / `disabled` | `ignore` |\n\n**Group Policy:**\n\n| OpenClaw | LibreFang |\n|---|---|\n| `open` / `all` | `all` |\n| `mention` / `mention_only` | `mention_only` |\n| `commands` / `commands_only` / `slash_only` | `commands_only` |\n| `disabled` / `ignore` | `ignore` |\n\n### Provider Mapping\n\n`map_provider()` normalizes OpenClaw provider names to LibreFang conventions:\n\n| OpenClaw | LibreFang |\n|---|---|\n| `anthropic`, `claude` | `anthropic` |\n| `openai`, `gpt` | `openai` |\n| `groq` | `groq` |\n| `ollama` | `ollama` |\n| `openrouter` | `openrouter` |\n| `deepseek` | `deepseek` |\n| `together` | `together` |\n| `mistral` | `mistral` |\n| `fireworks` | `fireworks` |\n| `google`, `gemini` | `google` |\n| `xai`, `grok` | `xai` |\n| `cerebras` | `cerebras` |\n| `sambanova` | `sambanova` |\n| Any other value | Passed through unchanged |\n\n`default_api_key_env()` returns the standard environment variable name for each provider (e.g., `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`). Ollama returns an empty string since it needs no key.\n\n### Tool and Capability Mapping\n\nTool names are resolved through `librefang_types::tool_compat::{is_known_librefang_tool, map_tool_name}`. Unrecognized tools are reported as warnings per agent.\n\nTool profiles are mapped via `tools_for_profile()`, which delegates to `librefang_types::agent::ToolProfile`:\n\n| Profile | Tools Included |\n|---|---|\n| `minimal` | Minimal set |\n| `coding` / `coder` / `developer` | Development tools |\n| `research` / `researcher` | Research tools |\n| `messaging` / `chat` | Messaging tools |\n| `automation` / `automator` | Automation tools |\n| `full` (default) | All tools |\n\nCapabilities are derived from the resolved tool list by `derive_capabilities()`:\n\n| Tool | Capability Granted |\n|---|---|\n| `*` (wildcard) | `shell: [\"*\"]`, `network: [\"*\"]`, `agent_message: [\"*\"]`, `agent_spawn: true` |\n| `shell_exec` | `shell: [\"*\"]` |\n| `web_fetch` / `web_search` / `browser_navigate` | `network: [\"*\"]` |\n| `agent_send` / `agent_list` | `agent_message: [\"*\"]`, `agent_spawn: true` |\n\n### Agent Identity (System Prompt) Extraction\n\nOpenClaw stores agent identity/system prompts in varied formats. `extract_identity_prompt()` handles:\n\n- **Raw string** — used directly\n- **Structured object** — searches a priority-ordered list of keys: `systemPrompt`, `system_prompt`, `prompt`, `instructions`, `instruction`, `content`, `text`, `value`, `persona`, `identity`, `description`. Falls back to recursing into nested objects and arrays.\n\n### Agent TOML Output\n\nEach agent produces an `agent.toml` with this structure:\n\n```toml\nname = \"Coder\"\nversion = \"0.1.0\"\ndescription = \"Migrated from OpenClaw agent 'coder'\"\nauthor = \"librefang\"\nmodule = \"builtin:chat\"\nprofile = \"coding\"\nskills = [\"web-scraper\"]\ntool_blocklist = [\"dangerous_tool\"]\nworkspace = \"/path/to/workspace\"\n\n[model]\nprovider = \"deepseek\"\nmodel = \"deepseek-chat\"\nsystem_prompt = \"\"\"\nYou are an expert software engineer.\n\"\"\"\napi_key_env = \"DEEPSEEK_API_KEY\"\n\n[[fallback_models]]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\n\n[capabilities]\ntools = [\"file_read\", \"file_write\", \"shell_exec\"]\nmemory_read = [\"*\"]\nmemory_write = [\"self.*\"]\nshell = [\"*\"]\nagent_spawn = true\n```\n\nFields like `skills`, `tool_blocklist`, and `workspace` are preserved from the OpenClaw source even though they were historically dropped during migration.\n\n### Secrets Handling\n\nInline secrets (bot tokens, API keys) are extracted from the JSON5 config and written to `secrets.env` as `KEY=value` lines. The file is:\n\n- Created with `0o600` permissions on Unix\n- Updated in-place (existing keys are overwritten, new keys appended)\n- Never populated during a dry run\n\n## OpenFang Migration\n\nOpenFang is a same-format community fork, so migration is primarily a file copy with schema drift validation. `openfang::migrate()` copies files from the source directory to the target and calls `warn_on_schema_drift()` to detect unknown or changed fields that may not load correctly in LibreFang.\n\n## Migration Report\n\nThe `report` module defines:\n\n- **`MigrationReport`** — contains `imported` items, `skipped` items, and `warnings`\n- **`MigrateItem`** — a successfully migrated artifact with its `kind`, `name`, and `destination` path\n- **`SkippedItem`** — a feature that could not be migrated, with a human-readable `reason`\n- **`ItemKind`** — enum: `Config`, `Agent`, `Channel`, `Memory`, `Session`, `Skill`, `Secret`\n- **`to_markdown()`** — renders the full report as a markdown document\n\n## Integration Points\n\nThe migration module is called from three entry points:\n\n1. **CLI** — `librefang-cli::cmd_migrate` parses arguments, constructs `MigrateOptions`, calls `run_migration`, and prints the report summary\n2. **TUI init wizard** — `tui::screens::init_wizard` auto-detects OpenClaw via `detect_openclaw_home()`, scans via `scan_openclaw_workspace()`, and runs migration\n3. **HTTP API** — `routes::config::{migrate_detect, migrate_scan, run_migrate}` expose migration as REST endpoints\n\nBoth the TUI and API paths use `detect_openclaw_home()` and `scan_openclaw_workspace()` to present available migration options before committing.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang Dashboard (`librefang-api/dashboard/`)\n\n## Overview\n\nThe LibreFang Dashboard is a single-page application for managing and monitoring autonomous AI agents. It provides a real-time interface for agent configuration, session management, approval workflows, channel bridging, skill/plugin installation, workflow editing, scheduling, analytics, and memory management.\n\nBuilt on **React 19** with **TanStack Router v1** (file-based routing) and **TanStack Query v5** (server-state caching), it compiles to a static bundle served by the LibreFang API server and works offline as a PWA.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Browser\n        Pages[\"Pages (src/pages/)\"]\n        Components[\"Components\"]\n        QueryHooks[\"Query Hooks (lib/queries/)\"]\n        MutationHooks[\"Mutation Hooks (lib/mutations/)\"]\n        QueryKeys[\"Query Keys (lib/queries/keys.ts)\"]\n        HTTPClient[\"HTTP Client (lib/http/client.ts)\"]\n        API[\"Raw API (src/api.ts)\"]\n    end\n\n    subgraph Server\n        APIBackend[\"LibreFang API Server\"]\n    end\n\n    Pages --> Components\n    Pages --> QueryHooks\n    Pages --> MutationHooks\n    QueryHooks --> QueryKeys\n    QueryHooks --> HTTPClient\n    MutationHooks --> QueryKeys\n    MutationHooks --> HTTPClient\n    HTTPClient --> API\n    API -->|fetch / WebSocket| APIBackend\n```\n\n**Data flows one way:** Pages call typed hooks, hooks call the HTTP client, the HTTP client delegates to `src/api.ts` for raw fetch/WebSocket calls. Pages never import `api.ts` or call `fetch` directly (with narrow exceptions for SSE/terminal streams).\n\n## Tech Stack\n\n| Layer | Technology |\n|---|---|\n| UI Framework | React 19 |\n| Routing | TanStack Router v1 |\n| Server-state | TanStack Query v5 |\n| Local state | Zustand |\n| HTTP | Native `fetch` (thin wrapper in `src/api.ts`) |\n| Styling | Tailwind CSS v4 with CSS-first config |\n| i18n | i18next + react-i18next |\n| Charts | Recharts 3 |\n| Workflow editor | @xyflow/react (React Flow) |\n| Terminal | @xterm/xterm 6 |\n| TOML | smol-toml |\n| Markdown | react-markdown + remark-gfm + remark-math + rehype-katex |\n| Command palette | cmdk |\n| Build | Vite 7 |\n| Types | TypeScript 5 (strict) |\n| Unit tests | Vitest + Testing Library |\n| E2E tests | Playwright |\n| API types | openapi-typescript (`pnpm openapi:types`) |\n| Package manager | pnpm 10 |\n\n## Project Structure\n\n```\ndashboard/\n├── public/\n│   ├── manifest.json          # PWA manifest\n│   ├── sw.js                  # Service worker (stale-while-revalidate)\n│   ├── icon-192.png\n│   └── icon-512.png\n├── e2e/\n│   └── dashboard.spec.ts      # Playwright smoke tests\n├── openapi/\n│   └── generated.ts           # Auto-generated API types\n├── src/\n│   ├── main.tsx               # App entry point\n│   ├── api.ts                 # Raw fetch helpers, auth, WebSocket builders\n│   ├── index.css              # Tailwind + theme + animation system\n│   ├── pages/                 # TanStack Router page components\n│   ├── components/            # Shared UI components\n│   │   └── ui/                # Design-system primitives (MultiSelectCmdk, etc.)\n│   └── lib/\n│       ├── http/\n│       │   ├── client.ts      # Typed re-exports over src/api.ts\n│       │   └── errors.ts      # ApiError class\n│       ├── queries/\n│       │   ├── keys.ts        # Hierarchical query-key factories\n│       │   ├── keys.test.ts   # Anchoring / existence smoke tests\n│       │   ├── <domain>.ts    # useXxx query hooks per domain\n│       │   └── ...            # agents, sessions, channels, etc.\n│       ├── mutations/\n│       │   └── <domain>.ts    # useXxx mutation hooks with invalidation\n│       ├── agentManifest.ts   # TOML manifest parse/serialize/validate\n│       ├── agentManifestMarkdown.ts  # Manifest → Markdown rendering\n│       ├── chat.ts            # Chat message normalization utilities\n│       ├── chatPicker.ts      # Agent/hand grouping for chat picker\n│       └── test/\n│           └── query-client.tsx  # Test helper: QueryClient wrapper\n├── package.json\n├── vite.config.ts\n├── playwright.config.ts\n├── tailwind
