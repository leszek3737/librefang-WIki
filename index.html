var PAGES = {"agent-kernel-librefang-kernel-handle-src":"# Agent Kernel — librefang-kernel-handle-src\n\n# librefang-kernel-handle\n\nDependency inversion layer between the agent runtime and the kernel.\n\n## Purpose\n\nThe agent runtime (`librefang-runtime`) needs to perform kernel-level operations — spawning agents, reading shared memory, posting tasks, sending channel messages, and more. However, the runtime cannot depend directly on the kernel crate without creating a circular dependency: the kernel owns agents, and agents run via the runtime.\n\nThis crate solves that by defining the `KernelHandle` trait. The kernel implements the trait and injects a reference into the agent loop at startup. The runtime calls trait methods without knowing anything about the kernel's internals.\n\n```mermaid\ngraph TD\n    K[librefang-kernel<br/>implements KernelHandle] -->|injects &dyn KernelHandle| R[librefang-runtime<br/>agent loop + tool_runner]\n    H[librefang-kernel-handle<br/>defines KernelHandle trait] -.->|trait definition| K\n    H -.->|trait definition| R\n    R -->|callback via trait methods| K\n```\n\n## Key Types\n\n### `AgentInfo`\n\n```rust\npub struct AgentInfo {\n    pub id: String,\n    pub name: String,\n    pub state: String,\n    pub model_provider: String,\n    pub model_name: String,\n    pub description: String,\n    pub tags: Vec<String>,\n    pub tools: Vec<String>,\n}\n```\n\nRead-only snapshot of an agent's identity and capabilities. Returned by `list_agents` and `find_agents`. The `tools` field lists tool names the agent has access to; `tags` are free-form labels from the agent's manifest.\n\n### `KernelHandle` trait\n\nAn `#[async_trait]` trait bound by `Send + Sync`. Every method has a default implementation so that partial implementations (test stubs, feature-gated kernels) compile without boilerplate.\n\n## Method Groups\n\n### Agent Lifecycle\n\n| Method | Sync/Async | Description |\n|---|---|---|\n| `spawn_agent` | async | Create an agent from a TOML manifest. `parent_id` tracks lineage. Returns `(id, name)`. |\n| `spawn_agent_checked` | async | Like `spawn_agent`, but the kernel verifies every capability in the child manifest is covered by `parent_caps`. Defaults to delegating to `spawn_agent` without enforcement — real kernels **must** override. |\n| `list_agents` | sync | All running agents. |\n| `find_agents` | sync | Case-insensitive substring match on name, tag, or tool name. |\n| `kill_agent` | sync | Terminate an agent by ID. |\n| `send_to_agent` | async | Send a message to another agent and await its response. |\n| `touch_heartbeat` | sync | Reset `last_active` during long LLM calls to prevent heartbeat timeout false-positives. |\n| `fire_agent_step` | sync | Emit an `agent:step` hook event each loop iteration. |\n\n### Shared Memory\n\nAll methods accept `peer_id: Option<&str>` for namespace isolation. When `Some`, keys are scoped to that peer so different users of the same agent get independent memory.\n\n- **`memory_store`** — write a `serde_json::Value` under a key.\n- **`memory_recall`** — read a key; returns `Ok(None)` if absent.\n- **`memory_list`** — enumerate keys in a namespace.\n\n### Task Queue\n\nA cooperative work system agents use to hand off and claim units of work.\n\n| Method | Returns |\n|---|---|\n| `task_post` | Created task ID |\n| `task_claim` | `Option<serde_json::Value>` — next available task for `agent_id` |\n| `task_complete` | Unit |\n| `task_list` | Tasks filtered by optional status |\n| `task_delete` | `bool` — whether deletion succeeded |\n| `task_retry` | `bool` — resets task to pending |\n\n### Knowledge Graph\n\nAgents store and query structured knowledge about entities and their relationships.\n\n- **`knowledge_add_entity`** / **`knowledge_add_relation`** — insert nodes and edges using `librefang_types::memory::{Entity, Relation}`.\n- **`knowledge_query`** — pattern-matched lookup returning `Vec<GraphMatch>`.\n\n### Cron Scheduling\n\nAll default to `\"Cron scheduler not available\"`. The kernel overrides when the scheduler is enabled.\n\n- `cron_create` — register a job for an agent.\n- `cron_list` — enumerate jobs for an agent.\n- `cron_cancel` — remove a job.\n\nThese are called from tool implementations (`tool_schedule_create`, `tool_schedule_list`, `tool_schedule_delete`, `tool_cron_create`, `tool_cron_list`, `tool_cron_cancel`) and the workflow route handler.\n\n### Approval System\n\nControls whether tool executions require human approval.\n\n| Method | Purpose |\n|---|---|\n| `requires_approval` | Simple policy check by tool name. Defaults to `false`. |\n| `requires_approval_with_context` | Policy check considering `sender_id` and `channel`. Falls back to `requires_approval`. |\n| `is_tool_denied_with_context` | Hard deny check — tool cannot run at all under this context. Defaults to `false`. |\n| `request_approval` | Blocking approval request. Returns `ApprovalDecision`. Defaults to auto-approve. |\n| `submit_tool_approval` | Non-blocking submission with `DeferredToolExecution` payload. Returns `ToolApprovalSubmission`. |\n| `resolve_tool_approval` | Accept/reject a pending request. Returns the deferred payload so execution can resume or be discarded. Called by the `approve_request`, `reject_request`, and `modify_request` HTTP routes in `src/routes/system.rs`. |\n| `get_approval_status` | Poll whether a request has been decided. Defaults to `Ok(None)`. |\n\n### Channel Messaging\n\nSend text, media, files, and polls to users via adapters like Telegram or Email.\n\n- **`send_channel_message`** — text. Optional `thread_id` for replies, `account_id` for multi-bot routing.\n- **`send_channel_media`** — image or file by URL.\n- **`send_channel_file_data`** — raw bytes with MIME type. Used by `tool_channel_send` when `file_path` is provided.\n- **`send_channel_poll`** — poll or quiz with configurable correct answer and explanation.\n\nAll default to `\"Channel [type] send not available\"`.\n\n### Hands\n\nSpecialized autonomous agents installed and managed at runtime.\n\n- `hand_list` — discover available Hands.\n- `hand_install` — register a Hand from TOML + skill content.\n- `hand_activate` — spawn a Hand's agent with configuration.\n- `hand_status` — dashboard metrics for an active Hand.\n- `hand_deactivate` — stop a Hand's agent.\n\n### A2A (Agent-to-Agent) Discovery\n\n- `list_a2a_agents` — external agents as `(name, url)` pairs. Defaults to empty.\n- `get_a2a_agent_url` — lookup by name. Defaults to `None`.\n\nUsed by `tool_a2a_send` in the runtime to route messages to federated agents.\n\n### Prompt Versioning and Experiments\n\nA version control system for agent system prompts with A/B experiment support.\n\n**Versioning:**\n\n| Method | Default |\n|---|---|\n| `get_prompt_version` | `Ok(None)` |\n| `list_prompt_versions` | `Ok(Vec::new())` |\n| `create_prompt_version` | Error |\n| `delete_prompt_version` | Error |\n| `set_active_prompt_version` | Error |\n| `auto_track_prompt_version` | No-op |\n\n`auto_track_prompt_version` is called from `build_prompt_setup` in the agent loop to detect system prompt drift and auto-create versions.\n\n**Experiments:**\n\n| Method | Default |\n|---|---|\n| `get_running_experiment` | `Ok(None)` |\n| `list_experiments` | `Ok(Vec::new())` |\n| `create_experiment` | Error |\n| `get_experiment` | `Ok(None)` |\n| `update_experiment_status` | Error |\n| `get_experiment_metrics` | `Ok(Vec::new())` |\n| `record_experiment_request` | No-op |\n\n### Goals and Workflows\n\n- **`goal_list_active`** — pending or in-progress goals, optionally filtered by agent.\n- **`goal_update`** — change status/progress. Called from `tool_goal_update`.\n- **`run_workflow`** — execute a workflow by ID or name, returning `(run_id, output)`. Called from `tool_workflow_run` and the workflow integration tests.\n\n### Utility Methods\n\n- **`tool_timeout_secs`** — per-execution timeout. Default: `120`.\n- **`max_agent_call_depth`** — prevents infinite inter-agent recursion. Default: `5`. Checked by `tool_agent_send`.\n- **`run_forked_agent_oneshot`** — advanced primitive for running a forked LLM call that shares the parent's prompt cache prefix. The fork's messages do not persist in the canonical session, and the turn-end hook fires with `is_fork: true` to prevent recursive auto-dream cycles. Default: error. Used by the proactive memory extractor.\n\n## Design Principles\n\n**Default-to-stub.** Every method has a sensible default — either a no-op, an empty collection, or an error string. This means a test harness or minimal kernel only needs to implement the methods it cares about. Methods that the kernel overrides completely (cron, approvals, channels, knowledge graph, Hands, workflows) all default to `\"…not available\"` errors rather than panicking.\n\n**Sync vs. async split.** Read-only and fast operations (`list_agents`, `find_agents`, `kill_agent`, memory reads, approval checks) are synchronous. Operations involving I/O, network, or blocking waits (`spawn_agent`, `send_to_agent`, `task_post`, channel sends) are async. This avoids requiring a runtime handle for simple queries.\n\n**Capability-aware spawning.** `spawn_agent_checked` enforces that a parent agent cannot grant a child capabilities it doesn't itself possess. The default implementation bypasses enforcement, so kernels with capability security enabled must override this method.\n\n## Implementing the Trait\n\nThe kernel (`librefang-kernel`) provides the concrete implementation, wrapping its internal state (agent registry, memory store, task queue, channel adapters, etc.) behind `Arc` and exposing them through the trait methods.\n\nFor testing, you can implement only the methods under test:\n\n```rust\nstruct TestHandle;\n\n#[async_trait]\nimpl KernelHandle for TestHandle {\n    fn list_agents(&self) -> Vec<AgentInfo> {\n        vec![AgentInfo {\n            id: \"test-agent\".into(),\n            name: \"Test\".into(),\n            state: \"running\".into(),\n            model_provider: \"test\".into(),\n            model_name: \"test-model\".into(),\n            description: String::new(),\n            tags: vec![],\n            tools: vec![\"echo\".into()],\n        }]\n    }\n    // all other methods use defaults\n}\n```","agent-kernel-librefang-kernel-metering-src":"# Agent Kernel — librefang-kernel-metering-src\n\n# Agent Kernel — Metering Engine (`librefang-kernel-metering`)\n\n## Purpose\n\nThe metering engine is the cost-control layer for LLM invocations. It records every usage event, estimates call costs using model-specific pricing, and enforces spending quotas at three levels of granularity — per-agent, per-provider, and global — to prevent runaway spending across the system.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller[\"Runtime / Agent Loop\"] --> ME[\"MeteringEngine\"]\n    ME --> US[\"UsageStore (SQLite)\"]\n    ME --> MC[\"ModelCatalog (pricing)\"]\n\n    ME -->|\"check_all_and_record\"| TX[\"Single SQLite TX\"]\n    TX --> Q1[\"Per-agent quota\"]\n    TX --> Q2[\"Global budget\"]\n    TX --> Q3[\"Per-provider budget\"]\n    TX --> REC[\"INSERT usage row\"]\n```\n\nAll quota checks and usage persistence flow through `UsageStore` (from `librefang-memory`), which is backed by SQLite. The preferred entry point `check_all_and_record` wraps the check-and-insert cycle in a single transaction, closing the TOCTOU race that would exist if you called `check_quota` then `record` separately.\n\n## Key Types\n\n### `MeteringEngine`\n\nThe core struct. Constructed with `MeteringEngine::new(store)` where `store` is an `Arc<UsageStore>`. It has no internal mutable state — all state lives in the SQLite database.\n\n### `BudgetStatus`\n\nA serializable snapshot of current spend versus configured limits across hourly, daily, and monthly windows. Produced by `budget_status()`. Each window includes `*_spend`, `*_limit`, and `*_pct` (spend/limit ratio for dashboard progress bars).\n\n## Usage Recording & Quota Enforcement\n\n### The Preferred Path: `check_all_and_record`\n\nAfter every LLM call, call `check_all_and_record(record, quota, budget)`. This atomically:\n\n1. Checks the agent's per-agent quota (`ResourceQuota`: hourly, daily, monthly USD limits)\n2. Checks the global budget (`BudgetConfig`: hourly, daily, monthly across all agents)\n3. Resolves the record's provider and checks the per-provider budget (`ProviderBudget` in `budget.providers`)\n4. On all checks passing, inserts the usage row\n\nIf any check fails, the transaction rolls back — the usage row is **not** inserted. This guarantees that a failed quota check cannot be silently bypassed by concurrent requests.\n\n### Non-Atomic Alternatives\n\n| Method | Scope | Use Case |\n|---|---|---|\n| `check_quota` | Per-agent only | Pre-dispatch gating, dashboards |\n| `check_global_budget` | Global only | Pre-dispatch gating, dashboards |\n| `check_provider_budget` | Single provider | Pre-dispatch gating, dashboards |\n| `check_quota_and_record` | Per-agent + record | Single-level atomic operation |\n| `check_global_budget_and_record` | Global + record | Single-level atomic operation |\n| `check_all_and_record` | All three + record | **Post-LLM-call recording** |\n\nThe non-atomic methods exist for scenarios where you need a read-only budget probe (e.g., UI dashboards) or want to fail fast before making an LLM call.\n\n### Zero-Limit Semantics\n\nAll quota/budget fields use `0.0` (or `0` for tokens) to mean **unlimited** — a zero-valued limit is skipped entirely during enforcement. This means a freshly initialized `ResourceQuota::default()` never blocks anything.\n\n## Cost Estimation\n\nTwo static methods estimate the cost of a call before or after it happens.\n\n### `estimate_cost` (Fallback)\n\n```\nMeteringEngine::estimate_cost(model, input_tokens, output_tokens, cache_read, cache_creation)\n```\n\nUses hardcoded default rates: **$1.00 per million input tokens, $3.00 per million output tokens**. The `model` parameter is accepted for API symmetry but currently ignored. Use this in unit tests or when no catalog is available.\n\n### `estimate_cost_with_catalog` (Production)\n\n```\nMeteringEngine::estimate_cost_with_catalog(&catalog, model, input_tokens, output_tokens, cache_read, cache_creation)\n```\n\nLooks up the model in the `ModelCatalog` to get real per-model pricing. Falls back to the default $1/$3 rates when:\n\n- The model ID is not found in the catalog\n- The model is a `chatgpt` provider model with zero pricing (session-auth models that don't expose billable rates — these get a conservative estimate using default rates)\n\n**Local-tier models** with zero pricing are an intentional exception: they return $0.00 cost, since they run on local hardware.\n\n### Cache Token Pricing\n\nThe internal `estimate_cost_from_rates` function applies differentiated pricing for prompt-caching tokens:\n\n| Token Type | Multiplier vs Base Input Price |\n|---|---|\n| Regular input | 1.0× |\n| Cache-read | 0.1× (90% discount) |\n| Cache-creation | 1.25× (25% surcharge) |\n| Output | Uses output rate (no multiplier) |\n\nRegular input tokens are computed as `total_input - cache_read - cache_creation` (saturating subtraction). This mirrors Anthropic-style prompt caching economics where reading cached prompts is cheap but populating the cache costs extra.\n\n## Query Methods\n\n| Method | Returns | Description |\n|---|---|---|\n| `get_summary(agent_id: Option<AgentId>)` | `UsageSummary` | Aggregate stats (call count, token totals) optionally filtered to one agent |\n| `get_by_model()` | `Vec<ModelUsage>` | Usage broken down by model |\n| `budget_status(&budget)` | `BudgetStatus` | Current spend vs limits across all time windows |\n| `cleanup(days)` | `usize` | Deletes records older than N days, returns count of deleted rows |\n\n## Dependencies\n\n- **`librefang-memory`**: Provides `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage`, and `MemorySubstrate`. All persistence goes through `UsageStore`'s SQLite connection.\n- **`librefang-types`**: Provides `AgentId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `ModelCatalogEntry`, and error types (`LibreFangError::QuotaExceeded`).\n- **`librefang-runtime`**: Provides `ModelCatalog` for production cost estimation.\n\n## Error Behavior\n\nAll quota enforcement methods return `LibreFangError::QuotaExceeded` with a descriptive message including the agent/provider ID, the exceeded limit type, current spend, and the limit. For example:\n\n```\nAgent <uuid> exceeded hourly cost quota: $1.0500 / $1.0000\nProvider 'moonshot' exceeded daily cost budget: $2.5000 / $2.0000\nGlobal hourly budget exceeded: $5.2500 / $5.0000\n```\n\nThe error is returned *before* the usage row is inserted (in the atomic methods), so the failing request does not inflate the recorded spend.","agent-kernel-librefang-kernel-router-src":"# Agent Kernel — librefang-kernel-router-src\n\n# Agent Kernel — `librefang-kernel-router`\n\n## Purpose\n\nThis module is the **routing engine** for LibreFang. Given a user message, it decides which specialist agent template or hand should handle it. Routing uses a layered scoring system that blends keyword matching (with bilingual regex rules) and optional embedding-based semantic similarity.\n\nThe router makes two independent decisions:\n\n1. **Template selection** — which agent persona (coder, researcher, architect, etc.) to invoke.\n2. **Hand selection** — which tool-bearing hand (browser, collector, trader, etc.) to activate.\n\nBoth follow the same scoring philosophy but draw their candidate pools from different sources.\n\n---\n\n## Architecture Overview\n\n```mermaid\nflowchart TD\n    MSG[\"User Message\"] --> AST[\"auto_select_template()\"]\n    MSG --> ASH[\"auto_select_hand()\"]\n\n    AST --> RULES[\"TEMPLATE_RULES<br/>(hardcoded regex)\"]\n    AST --> META[\"auto_select_template_from_metadata()<br/>(agent.toml on disk)\"]\n    AST --> SEM[\"semantic_scores<br/>(optional embeddings)\"]\n\n    ASH --> HANDS[\"hand_route_candidates()<br/>(HAND.toml on disk)\"]\n    ASH --> SEM\n\n    RULES --> SCORE[\"Score & Rank\"]\n    META --> SCORE\n    HANDS --> SCORE2[\"Score & Rank\"]\n    SEM --> SCORE\n    SEM --> SCORE2\n\n    SCORE --> RESULT_T[\"TemplateSelection\"]\n    SCORE2 --> RESULT_H[\"HandSelection\"]\n```\n\n---\n\n## Public API\n\n### `auto_select_template`\n\n```rust\npub fn auto_select_template(\n    message: &str,\n    agents_dir: &Path,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> TemplateSelection\n```\n\nSelects the best agent template for a user message. Returns a `TemplateSelection` containing the template name, a human-readable reason string, and the numeric score.\n\n**Selection logic, in order:**\n\n1. **Built-in rules** — The `TEMPLATE_RULES` table provides curated regex patterns for ~30 templates, each with strong and weak tiers. Scored at `EXPLICIT_ALIAS_WEIGHT` (6) per strong hit and `WEAK_PHRASE_WEIGHT` (1) per weak hit.\n2. **Manifest metadata** — Scans `agents_dir/*/agent.toml` for `[metadata.routing]` aliases and auto-generated phrases from name/description/tags. Explicit aliases score 6, generated phrases score 2, weak aliases score 1.\n3. **Semantic fallback** — When keyword matching produces nothing and `semantic_scores` is provided, any template with similarity ≥ `SEMANTIC_ONLY_THRESHOLD` (0.55) receives a bonus up to `MAX_SEMANTIC_BONUS` (5 points).\n4. **Multi-domain detection** — If the message matches multiple distinct specialties and contains multi-domain tokens (e.g. \"同时\", \"分别\", \"multi\", \"together\"), the router selects `orchestrator`.\n5. **Default** — Falls back to `orchestrator` with score 0.\n\nWhen both built-in rules and manifest metadata produce matches, the manifest wins only if its score exceeds the rule-based score by at least 2 points (preventing metadata noise from overriding curated rules).\n\n### `auto_select_hand`\n\n```rust\npub fn auto_select_hand(\n    message: &str,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> HandSelection\n```\n\nSelects the best hand for a user message. Returns a `HandSelection` with an optional `hand_id` (None if no hand clears the threshold), a reason string, and the score.\n\nCandidate phrases come from `HAND.toml` files:\n\n| Phrase tier | Source | Weight |\n|---|---|---|\n| Strong | `[routing].aliases` + description-derived phrases | 6 per hit |\n| Weak | `[routing].weak_aliases` + id-derived tokens (≥3 chars, non-generic) | 1 per hit |\n\nSemantic scores are blended the same way as template routing. A minimum score of `MIN_HAND_SCORE` (2) is required — a single weak hit is too noisy to trigger routing.\n\n### Template Manifest Loading\n\n```rust\npub fn load_template_manifest(home_dir: &Path, template: &str) -> Result<AgentManifest, String>\n```\n\nReads and parses `workspaces/agents/{template}/agent.toml`. Template names are validated by `is_safe_template_name` — only ASCII alphanumeric characters plus `-` and `_` are allowed.\n\n### Description Export\n\n```rust\npub fn all_template_descriptions(agents_dir: &Path) -> Vec<(String, String)>\n```\n\nReturns `(template_name, embed_text)` pairs for all routable templates (excludes `\"assistant\"`). Used by the kernel to build embeddings for semantic routing. The embed text combines name, description, and tags.\n\n### Cache Control\n\n```rust\npub fn set_hand_route_home_dir(home_dir: &Path)\npub fn invalidate_hand_route_cache()\npub fn invalidate_manifest_cache()\n```\n\nThe router maintains three global caches (via `OnceLock<Mutex<...>>`):\n\n| Cache | Contents | Invalidated by |\n|---|---|---|\n| `REGEX_CACHE` | Compiled `Regex` objects keyed by pattern string | Never (safe to keep) |\n| `MANIFEST_CACHE` | `ManifestRouteCandidate` list keyed by `agents_dir` path | `invalidate_manifest_cache()` |\n| `HAND_ROUTE_CACHE` | `HandRouteCandidate` list keyed by home directory | `invalidate_hand_route_cache()` |\n\nCall the invalidation functions after config hot-reload or agent/hand install/uninstall. The skills route handler (`install_hand`, `uninstall_hand` in `src/routes/skills.rs`) calls `invalidate_hand_route_cache` automatically.\n\n---\n\n## Scoring System\n\nAll routing uses the same weighted scoring model:\n\n```\nscore = Σ(strong_hits) × 6\n      + Σ(generated_hits) × 2   // manifest metadata only\n      + Σ(weak_hits) × 1\n      + round(semantic_similarity × 5.0)\n```\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `EXPLICIT_ALIAS_WEIGHT` | 6 | Curated aliases and strong regex hits |\n| `GENERATED_PHRASE_WEIGHT` | 2 | Auto-extracted phrases from name/description/tags |\n| `WEAK_PHRASE_WEIGHT` | 1 | Weak aliases and id-derived tokens |\n| `MAX_SEMANTIC_BONUS` | 5.0 | Cap on embedding similarity bonus |\n| `SEMANTIC_ONLY_THRESHOLD` | 0.55 | Minimum similarity for semantic-only fallback |\n| `MIN_HAND_SCORE` | 2 | Minimum score to select a hand |\n\nTies are broken by number of matched phrases (more specific wins), then by candidate ID lexicographic order.\n\n---\n\n## Keyword Matching Pipeline\n\nThe router extracts routing phrases from several sources and matches them against the user message at query time.\n\n### Source Extraction\n\n**From HAND.toml** (`hand_route_candidate_from_definition`):\n- Strong: `[routing].aliases` + `description_phrases(def.description)`\n- Weak: `[routing].weak_aliases` + tokens from the hand ID (split on `-`/`_`, filtered by length ≥ 3 and not in `GENERIC_ENGLISH_WORDS`)\n\n**From agent.toml** (`build_manifest_route_candidates`):\n- Explicit aliases: `[metadata.routing].aliases` + `strong_aliases`\n- Generated phrases: `english_variants(template_name)` + `tag_phrases(tags)` + `description_phrases(description)`\n  - Skipped when `[metadata.routing].exclude_generated = true`\n- Weak: `[metadata.routing].weak_aliases` + template name tokens\n\n**Phrase extraction from free text** (`description_phrases`, `tag_phrases`):\n1. Text is split into chunks via `split_phrase_chunks` on punctuation and CJK delimiter characters (、。；：（）etc.)\n2. Each chunk is normalized: leading/trailing non-alphanumeric characters are stripped, generic English stop words are trimmed from both ends\n3. ASCII chunks produce word-level candidates via `ascii_phrase_candidates` — individual content words (≥ `min_len` chars, non-generic) and adjacent bigrams\n4. Non-ASCII chunks (CJK, etc.) pass through if 2–32 characters\n\n### Phrase Matching\n\n`phrase_matches(message, phrase)` handles two cases:\n- **ASCII phrases**: Builds a case-insensitive regex with word-boundary assertions, treating spaces in the phrase as flexible separators (`[\\s_-]+`)\n- **Non-ASCII phrases**: Case-folded substring containment check\n\nFor built-in rules (`TEMPLATE_RULES`), `regex_matches(message, pattern)` uses pre-compiled regex patterns cached globally in `REGEX_CACHE`.\n\n---\n\n## TEMPLATE_RULES Reference\n\nThe hardcoded rules cover ~30 specialist templates. Each rule has a target template name, strong patterns (high-confidence), and weak patterns (supporting evidence). Patterns support bilingual matching (English and Chinese). Key categories:\n\n| Category | Templates |\n|---|---|\n| Software engineering | `coder`, `debugger`, `test-engineer`, `code-reviewer`, `architect` |\n| Security & ops | `security-auditor`, `devops-lead`, `ops` |\n| Research & analysis | `researcher`, `analyst`, `data-scientist` |\n| Content | `writer`, `doc-writer`, `translator`, `tutor` |\n| Business | `email-assistant`, `meeting-assistant`, `sales-assistant`, `customer-support`, `recruiter`, `legal-assistant` |\n| Personal | `personal-finance`, `recipe-assistant`, `travel-planner`, `health-tracker`, `home-automation` |\n| Social & marketing | `social-media`, `planner` |\n| Meta | `orchestrator` (multi-domain), `hello-world` (greetings) |\n\nTemplates listed in `ROUTING_EXCLUDED_TEMPLATES` (currently `[\"assistant\"]`) are excluded from metadata-based routing.\n\n---\n\n## Filesystem Layout\n\nThe router reads from two directory trees under the LibreFANG home directory:\n\n```\n~/.librefang/\n├── registry/\n│   └── hands/\n│       ├── browser/\n│       │   └── HAND.toml       ← hand routing candidates\n│       ├── collector/\n│       │   └── HAND.toml\n│       └── ...\n└── workspaces/\n    └── agents/\n        ├── coder/\n        │   └── agent.toml      ← template manifest + routing metadata\n        ├── researcher/\n        │   └── agent.toml\n        └── ...\n```\n\nThe home directory is resolved in this order:\n1. Explicitly set via `set_hand_route_home_dir()`\n2. `LIBREFANG_HOME` environment variable\n3. `~/.librefang` (falls back to system temp if home is unavailable)\n\n---\n\n## Semantic Score Integration\n\nThe router does not compute embeddings itself. The caller provides pre-computed similarity scores as a `HashMap<String, f32>` mapping template or hand IDs to cosine similarity values (0.0–1.0).\n\nThe blending strategy is additive: semantic bonus is added to the keyword score. This means strong keyword matches are never overridden by semantic signals alone, since a single strong keyword hit (6 points) exceeds the maximum semantic bonus (5 points).\n\nWhen keyword matching produces zero hits, the semantic-only fallback activates for any candidate with similarity ≥ 0.55.\n\n**Cross-lingual support**: Semantic scores enable routing for languages without keyword coverage (Japanese, Korean, etc.). The caller computes embeddings against hand/template descriptions exported by `all_template_descriptions`.\n\n---\n\n## Return Types\n\n```rust\npub struct HandSelection {\n    pub hand_id: Option<String>,  // None if no hand cleared MIN_HAND_SCORE\n    pub reason: String,           // e.g. \"matched collector via monitor, change detection\"\n    pub score: usize,\n}\n\npub struct TemplateSelection {\n    pub template: String,         // always set; defaults to \"orchestrator\"\n    pub reason: String,\n    pub score: usize,\n}\n```","agent-kernel-librefang-kernel-src":"# Agent Kernel — librefang-kernel-src\n\n# LibreFang Kernel (`librefang-kernel`)\n\nThe kernel is the central runtime that governs agent behavior, enforces security boundaries, and coordinates all subsystems. It sits between the transport layer (Telegram, Discord, WhatsApp, API) and the agent runtime, ensuring every dangerous operation is gated, every user is authorized, and every background process is coordinated safely.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Transport[Transport Layer] --> Auth[AuthManager]\n    Transport --> Approval[ApprovalManager]\n    Auth -->|authorize| Actions[Agent Actions]\n    Approval -->|gates| ToolExec[Tool Execution]\n    Approval -->|persist| AuditDB[(SQLite Audit)]\n    Approval -->|TOTP| Vault[librefang-extensions Vault]\n    Supervisor[Supervisor] --> Approval\n    Scheduler[Scheduler] --> Supervisor\n    Triggers[TriggerEngine] --> Supervisor\n    AutoDream[Auto-Dream] --> Lock[ConsolidationLock]\n    Lock -->|filesystem| LockFile[(Lock File)]\n    Workflow[Workflow Engine] --> Supervisor\n```\n\n---\n\n## Subsystem: Approval Manager (`approval.rs`)\n\nThe approval manager gates dangerous tool invocations behind human decisions. Every call to `shell_exec`, `file_write`, `file_delete`, `apply_patch`, or `skill_evolve_*` must be explicitly approved, denied, or it will time out.\n\n### Two Execution Paths\n\nAgents can request approval through two distinct paths depending on their execution model:\n\n**Blocking path** — `request_approval()` creates a `tokio::sync::oneshot` channel, inserts the request into the pending map, and awaits resolution with a timeout. The calling agent coroutine blocks until a human resolves the request or it expires. This is used by synchronous/chat-driven agents.\n\n**Deferred path** — `submit_request()` accepts a `DeferredToolExecution` payload, stores it alongside the pending request, and returns immediately with the request UUID. The kernel later retrieves the deferred payload atomically via `resolve()`. This is used by autonomous agents that cannot block.\n\n### Policy Evaluation\n\nPolicy checks are layered with explicit precedence:\n\n1. **Trusted sender bypass** — If `sender_id` appears in `trusted_senders`, all approval and deny checks return `false` (no gate). This is checked first.\n2. **Channel rules** — Per-channel allow/deny lists in `channel_rules` override the default list. A channel can explicitly allow a normally-gated tool or deny an otherwise-open one.\n3. **Default list** — Falls back to the `require_approval` list, which supports glob patterns via `glob_matches()` (e.g., `\"file_*\"` matches `\"file_read\"`, `\"file_write\"`, etc.).\n\nThe methods `requires_approval()`, `requires_approval_with_context()`, and `is_tool_denied_with_context()` encode these three layers. Always use the `_with_context` variants when sender or channel information is available.\n\n### Escalation and Timeout\n\nWhen a request times out, the behavior depends on `timeout_fallback` in the policy:\n\n| Fallback | Behavior |\n|---|---|\n| `TimedOut` (default) | Resolves as `ApprovalDecision::TimedOut` |\n| `Skipped` | Resolves as `ApprovalDecision::Skipped` |\n| `Escalate { extra_timeout_secs }` | Increments `escalation_count`, re-inserts with a longer timeout. After `MAX_ESCALATIONS` (3) rounds, falls through to `TimedOut`. |\n\nThe effective timeout grows with each escalation round:\n\n```\neffective_timeout = request.timeout_secs + (extra_timeout_secs × escalation_count)\n```\n\n### Session-Scoped Operations\n\nFor multi-turn conversations where multiple approval requests may be in-flight for a single session, use:\n\n- `list_pending_for_session(session_id)` — all pending requests for a session.\n- `has_pending_for_session(session_id)` — quick boolean check.\n- `resolve_all_for_session(session_id, decision)` — atomically resolves every pending request matching the session. This mirrors the Hermes-Agent pattern where a user's \"approve all\" button resolves all blocking approvals for their conversation.\n\n### Per-Agent Limits\n\nEach agent is limited to `MAX_PENDING_PER_AGENT` (5) concurrent pending requests. Exceeding this returns an immediate `Denied` (blocking path) or `Err` (deferred path). This prevents a runaway agent from flooding the approval queue.\n\n### Duplicate Request Guard\n\n`submit_request()` rejects duplicate `tool_use_id` values. This prevents a single tool call from being submitted twice while still allowing identical tool inputs from distinct tool calls in the same assistant response (different `tool_use_id`, same `input`).\n\n### TOTP Second Factor\n\nWhen `second_factor` is `Totp` in the policy, approvals require a one-time code. The flow:\n\n1. `generate_totp_secret(issuer, account)` returns `(base32_secret, otpauth_uri, qr_base64_png)`.\n2. The user enrolls via an authenticator app.\n3. On approval, `resolve()` checks `totp_verified`. If `false` and the tool requires TOTP, resolution is rejected with an error.\n4. Callers verify codes via `verify_totp_code(secret_base32, code)` before calling `resolve()` with `totp_verified = true`.\n\n**Grace period** — After a successful TOTP-verified approval, subsequent approvals from the same `user_id` within `totp_grace_period_secs` bypass the TOTP requirement. This avoids requiring the user to pull out their phone for every rapid-fire approval. Set `totp_grace_period_secs: 0` to always require TOTP.\n\n**Per-tool scoping** — When `totp_tools` is non-empty, only the listed tools require TOTP. An empty `totp_tools` means all tools require TOTP when the second factor is enabled.\n\n**Rate limiting and lockout** — After `TOTP_MAX_FAILURES` (5) consecutive failures, the user is locked out for `TOTP_LOCKOUT_SECS` (300 seconds). Lockout state is persisted to SQLite via `persist_totp_lockout_save()` so it survives daemon restarts. On load, `load_totp_lockout()` discards entries whose lockout window has already expired.\n\n**Recovery codes** — `generate_recovery_codes()` produces 8 codes in `xxxx-xxxx` format. `verify_recovery_code(stored_json, code)` checks and atomically consumes a code, returning the updated JSON list.\n\n### Audit Trail\n\nEvery resolved request is recorded to:\n\n- **In-memory ring buffer** — `recent` holds the last `MAX_RECENT_APPROVALS` (100) records for quick dashboard display via `list_recent(limit)`.\n- **SQLite database** (optional) — When constructed with `new_with_db()`, `audit_log_write()` persists every `ApprovalAuditEntry` to the `approval_audit` table. Query via `query_audit(limit, offset, agent_id, tool_name)` and `audit_count()`.\n\n### Policy Hot-Reload\n\n`update_policy(policy)` replaces the active policy under a write lock. All subsequent checks use the new policy immediately. Existing pending requests are not re-evaluated — they were submitted under the old policy.\n\n### Risk Classification\n\n`classify_risk(tool_name)` is a static mapping:\n\n| Tool | Risk |\n|---|---|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n### Key Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `MAX_PENDING_PER_AGENT` | 5 | Concurrent pending requests per agent |\n| `MAX_RECENT_APPROVALS` | 100 | In-memory history buffer size |\n| `MAX_ESCALATIONS` | 3 | Escalation rounds before final timeout |\n| `TOTP_MAX_FAILURES` | 5 | Consecutive failures before lockout |\n| `TOTP_LOCKOUT_SECS` | 300 | Lockout duration in seconds |\n\n---\n\n## Subsystem: Auth Manager (`auth.rs`)\n\nRole-based access control for multi-user deployments. Maps platform identities to LibreFang users with hierarchical roles, then enforces permission checks on kernel actions.\n\n### Role Hierarchy\n\n```\nOwner (3) > Admin (2) > User (1) > Viewer (0)\n```\n\nRoles are ordered — any role at or above the required level can perform an action.\n\n### Action Permission Matrix\n\n| Action | Minimum Role |\n|---|---|\n| `ChatWithAgent` | User |\n| `ViewConfig` | User |\n| `ViewUsage` | Admin |\n| `SpawnAgent` | Admin |\n| `KillAgent` | Admin |\n| `InstallSkill` | Admin |\n| `ModifyConfig` | Owner |\n| `ManageUsers` | Owner |\n\n### Channel Identity Binding\n\nUsers are identified by their platform identity (e.g., Telegram user ID, Discord user ID). During initialization, `AuthManager::new(user_configs)` indexes all `channel_bindings` from the configuration into a `channel_index` map keyed by `\"channel_type:platform_id\"`. The `identify()` method resolves a platform identity to a `UserId`.\n\nA single user can have multiple channel bindings (e.g., Alice is bound to both `telegram:123456` and `discord:987654`), and all resolve to the same `UserId`.\n\n### Usage Pattern\n\n```rust\nlet user_id = auth.identify(\"telegram\", &msg.from.id.to_string());\nmatch user_id {\n    Some(id) => auth.authorize(id, &Action::ChatWithAgent)?,\n    None => return Err(\"Unrecognized user\"),\n}\n```\n\nWhen `is_enabled()` returns `false` (no users configured), the kernel typically operates in single-user mode and skips authorization.\n\n---\n\n## Subsystem: Auto-Dream Consolidation Lock (`auto_dream/lock.rs`)\n\nCoordinates dream consolidation runs across processes and threads. The lock file on disk serves two purposes:\n\n1. **mtime = `last_consolidated_at`** — The file's modification time is the sole source of truth for when consolidation last ran. No separate timestamp store exists.\n2. **body = holder identity** — The file contents are `\"<pid>:<uuid>\"`, used to detect live holders and resolve same-process races.\n\n### Lock Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Unlocked: No file / stale holder\n    Unlocked --> Acquired: try_acquire() succeeds\n    Acquired --> Released: release()\n    Acquired --> RolledBack: rollback(prior_mtime)\n    Released --> Unlocked: Next tick\n    RolledBack --> Unlocked: Time gate reopens\n```\n\n**`try_acquire()`** — Probes the existing holder. If a live process holds the lock within the stale window (`HOLDER_STALE_MS` = 1 hour), returns `Ok(None)`. Otherwise, writes a `<pid>:<uuid>` token, re-reads to verify the write won the race (the UUID makes this check meaningful even for same-process racers), and returns `Ok(Some(prior_mtime))`.\n\n**`release()`** — Clears the body to an empty string and refreshes the mtime to now. This is critical: without clearing the body, the still-running process would appear as a live holder on the next tick.\n\n**`rollback(prior_mtime)`** — After a failed consolidation, rewinds the mtime to its pre-acquire value so the time gate reopens. If `prior_mtime` was `0` (no lock existed before), the file is unlinked entirely.\n\n### Race Protection\n\nTwo layers prevent concurrent consolidation:\n\n- **In-process** — A `DashSet<PathBuf>` (`IN_PROCESS_CLAIMS`) serializes concurrent acquirers within the same daemon.\n- **Cross-process** — The `<pid>:<uuid>` token and verify-on-write pattern ensure only one process wins. The UUID disambiguates same-PID writers (which would otherwise both see \"their\" PID in the file).\n\n### Stale Holder Reclamation\n\nA holder is considered stale if either:\n\n- The PID is no longer running (checked via `kill(pid, 0)` on Unix — `ESRCH` means dead, `EPERM` means alive under another user).\n- The holder has exceeded `HOLDER_STALE_MS` (1 hour), regardless of PID liveness. This guards against PID reuse where a new process adopts the old PID.\n\n### Platform Notes\n\n- **Unix** — mtime manipulation uses `libc::utimes()`. PID liveness uses `libc::kill(pid, 0)`.\n- **Non-Unix** — mtime rewind is a no-op (failed consolidations wait for `min_hours`). PID liveness always returns `true`, relying solely on the stale window.\n\n---\n\n## Cross-Cutting Concerns\n\n### Concurrency Model\n\n- `ApprovalManager` uses `DashMap` for the pending map (lock-free concurrent reads and writes) and `std::sync::Mutex`/`RwLock` for policy, recent history, and TOTP state.\n- `AuthManager` uses `DashMap` for both the user map and channel index — read-heavy workloads benefit from the sharded design.\n- `ConsolidationLock` is stateless per operation; every method re-reads from disk for cross-process coherence.\n\n### Connection to the Vault\n\nThe TOTP setup and confirmation flows route through `librefang-extensions::Vault` for secret storage. The execution flow for TOTP enrollment:\n\n1. API route calls `totp_setup` / `totp_confirm` in the system routes.\n2. Secrets are stored/retrieved via `vault_get` → `unlock` → `resolve_master_key` → `load_keyring_key` → `machine_fingerprint`.\n3. The UI finalizes via `WizardPage` or `AgentManifestForm`.\n\n### Connection to Supervisor and Scheduler\n\n- The **Supervisor** owns the `ApprovalManager` and routes tool approval requests from agent runtimes.\n- The **Scheduler** enforces per-agent token budgets and rate limits before requests reach the approval layer.\n- The **TriggerEngine** evaluates memory deltas and scheduled events, potentially spawning agents that create approval requests.","agent-kernel":"# Agent Kernel\n\n# Agent Kernel\n\nThe Agent Kernel is the central nervous system of LibreFang. It sits between the transport layer (Telegram, Discord, WhatsApp, API) and the agent runtime, governing agent behavior, enforcing security boundaries, controlling costs, and routing messages to the right specialist.\n\n## Sub-modules at a glance\n\n| Sub-module | Role |\n|---|---|\n| [Kernel Core](librefang-kernel-src.md) | Orchestrator — auth, approval gating, workflow DAG execution, triggers, wizard-based agent planning, transport gateways |\n| [Kernel Handle](librefang-kernel-handle-src.md) | Dependency inversion — defines the `KernelHandle` trait so the agent runtime can call into the kernel without circular dependencies |\n| [Metering Engine](librefang-kernel-metering-src.md) | Cost control — records every LLM usage event and enforces spending quotas at per-agent, per-provider, and global levels |\n| [Router](librefang-kernel-router-src.md) | Message routing — scores incoming messages against agent templates and tool-bearing hands using keyword rules and semantic similarity |\n\n## How they fit together\n\n```\nTransport ──► Router ──► Kernel Core ──► Agent Runtime\n                │            │                │\n                │            │    ◄───────────┤\n                │            │   KernelHandle │\n                │            │   (trait impl) │\n                │            │                │\n                │       AuthManager      MeteringEngine\n                │       ApprovalManager   (records every LLM call)\n                │       Workflow DAG\n                │       Triggers\n```\n\n1. A message arrives from a transport. The **Router** scores it and selects the best agent template and hand.\n2. The **Kernel Core** authorizes the user (`AuthManager`), gates dangerous operations through approval (`ApprovalManager`), and runs the agent loop.\n3. The agent runtime communicates back to the kernel through the **Kernel Handle** — spawning sub-agents, reading shared memory, posting tasks — without knowing kernel internals.\n4. Every LLM invocation passes through the **Metering Engine**, which records usage and checks quotas in a single SQLite transaction before the call proceeds.\n\n## Key cross-cutting workflows\n\n**Message handling** — Router selects the agent/hand → core enforces auth and approval → metering tracks cost → results flow back through the handle.\n\n**Workflow DAGs** — The core's workflow engine supports conditional steps, loops, parallel branches, and error-mode policies (skip or retry). Steps can inject context from previous steps, and output variables carry forward through the DAG.\n\n**Triggers and cooldowns** — Event-driven triggers can seize and restore agent assignments with cooldown suppression to prevent rapid re-firing.\n\n**Agent creation wizard** — Parses `AgentIntent` into a tiered plan, auto-adding browser or web tools based on the detected intent.\n\n**Secret management** — TOTP setup and revocation flows cross from the kernel's `McpOAuthProvider` into `librefang-extensions`' vault, which resolves master keys via machine fingerprints and OS keyring integration.","agent-runtime":"# Agent Runtime\n\n# Agent Runtime\n\nThe agent runtime is LibreFang's execution core — it orchestrates the full lifecycle of an agent turn: receiving a user message, recalling memories, calling the LLM, executing tool calls, persisting results, and extracting new memories. It also implements the A2A (Agent-to-Agent) protocol for cross-framework interoperability.\n\n## Architecture Overview\n\n```mermaid\nflowchart TD\n    subgraph Entry\n        U[User Message] --> P[Preparation]\n    end\n\n    subgraph Preparation\n        P --> PII[PII Filter]\n        PII --> RCL[Memory Recall]\n        RCL --> WSA[Web Search Augment]\n        WSA --> SP[System Prompt Build]\n        SP --> MSG[Message Trim & Repair]\n    end\n\n    subgraph AgentLoop[\"Agent Loop (up to 50 iterations)\"]\n        MSG --> LLM[LLM Completion]\n        LLM --> |text only| END[End Turn]\n        LLM --> |tool_use| STAGE[StagedToolUseTurn]\n        STAGE --> EXEC[Execute Tools]\n        EXEC --> |results + guidance| MSG\n    end\n\n    subgraph Finalize\n        END --> MEM[Auto-Memorize]\n        MEM --> SAVE[Session Persist]\n        SAVE --> HOOKS[Hooks: AgentLoopEnd]\n    end\n```\n\n## A2A Protocol (`a2a.rs`)\n\nImplements Google's A2A protocol for cross-framework agent interoperability. Agents discover each other via JSON capability manifests (Agent Cards) and coordinate through task-based messaging.\n\n### Agent Card\n\n`AgentCard` is a JSON capability manifest served at `/.well-known/agent.json` per the A2A specification. It describes:\n\n- **Identity** — `name`, `description`, `url`, `version`\n- **Capabilities** — `AgentCapabilities` (streaming, push notifications, state transition history)\n- **Skills** — `Vec<AgentSkill>` descriptors with IDs, tags, and example prompts for discovery\n- **Content modes** — `default_input_modes` / `default_output_modes` (e.g., `[\"text\"]`)\n\nUse `build_agent_card(manifest, base_url)` to convert a LibreFang `AgentManifest` into an A2A card. Tool names from the manifest become A2A skill descriptors:\n\n```rust\nlet card = build_agent_card(&manifest, \"https://example.com\");\n// card.url == \"https://example.com/a2a\"\n// card.skills derived from manifest.capabilities.tools\n```\n\n### A2A Task Lifecycle\n\nTasks are the unit of work exchanged between agents. Each `A2aTask` carries:\n\n| Field | Purpose |\n|-------|---------|\n| `id` | Unique task identifier |\n| `session_id` | Optional conversation continuity |\n| `status` | `A2aTaskStatus` — `Submitted`, `Working`, `InputRequired`, `Completed`, `Cancelled`, `Failed` |\n| `messages` | Conversation between agents (`Vec<A2aMessage>`) |\n| `artifacts` | Outputs produced by the task (`Vec<A2aArtifact>`) |\n\n**Status encoding** — `A2aTaskStatusWrapper` accepts two wire formats:\n- Bare string: `\"completed\"`\n- Object form: `{\"state\": \"completed\", \"message\": null}`\n\nUse `.state()` to extract the `A2aTaskStatus` enum regardless of encoding.\n\n### A2aTaskStore\n\nIn-memory bounded store for task lifecycle tracking. Thread-safe via interior mutability (`Mutex<HashMap>`).\n\n**Eviction policy** (applied lazily on `insert`):\n\n1. **TTL sweep** — any task older than `task_ttl` (default 24h) is removed regardless of state, including `Working`/`InputRequired` tasks that would otherwise accumulate.\n2. **Capacity eviction** — if still at capacity after TTL sweep, evict the oldest terminal-state task (`Completed`/`Failed`/`Cancelled`). If no terminal tasks exist, evict the oldest task overall.\n\n```rust\nlet store = A2aTaskStore::new(1000);          // capacity 1000, default 24h TTL\nlet store = A2aTaskStore::with_ttl(500, Duration::from_secs(3600)); // custom TTL\n\nstore.insert(task);\nstore.complete(\"task-id\", response_msg, artifacts);\nstore.fail(\"task-id\", error_msg);\nstore.cancel(\"task-id\");\n```\n\n### A2aClient\n\nHTTP client for discovering and interacting with external A2A agents. Uses the shared proxied HTTP client builder with a 30-second timeout.\n\n```rust\nlet client = A2aClient::new();\n\n// Discover an agent's capabilities\nlet card: AgentCard = client.discover(\"https://other-agent.example.com\").await?;\n\n// Send a task\nlet task: A2aTask = client.send_task(\"https://other-agent.example.com/a2a\", \"Hello\", None).await?;\n\n// Poll task status\nlet task: A2aTask = client.get_task(\"https://other-agent.example.com/a2a\", &task.id).await?;\n```\n\n`discover_external_agents` is called during kernel boot to populate the list of known external agents from configuration. Failures log warnings but don't prevent startup.\n\n---\n\n## Agent Execution Loop (`agent_loop.rs`)\n\nThe core loop handles a single agent turn. It runs up to `MAX_ITERATIONS` (50) cycles of LLM completion → tool execution → response.\n\n### Entry Points\n\nTwo entry points exist (non-streaming and streaming), both sharing the same internal logic. They accept:\n\n- `AgentManifest` — agent configuration, model, tools, system prompt\n- `Session` — conversation state with message history\n- `MemorySubstrate` — memory recall/persistence backend\n- `LlmDriver` — provider-specific completion interface\n- `LoopOptions` — modifiers for fork turns, tool allowlists, interrupts\n\n### LoopOptions\n\nControls non-standard loop behavior:\n\n| Field | Default | Purpose |\n|-------|---------|---------|\n| `is_fork` | `false` | Derivative turn — skip session persistence, memory writes, and context engine updates |\n| `allowed_tools` | `None` | Runtime tool allowlist enforced at execute time (not schema time) |\n| `interrupt` | `None` | `SessionInterrupt` handle for cancelling long-running tools |\n\nFork turns are ephemeral — used by auto-dream, memory extraction, and other derivative tasks. They share the parent session's message prefix for prompt cache alignment but must not pollute the canonical conversation history.\n\n### Execution Flow\n\n#### 1. Preparation Phase\n\n1. **PII filtering** — `push_filtered_user_message` applies the configured `PrivacyMode` to user text and content blocks before they enter the session.\n2. **Experiment selection** — `select_running_experiment` checks for active A/B experiments and selects a variant deterministically from the session ID hash.\n3. **Memory recall** — `setup_recalled_memories` retrieves relevant memories through:\n   - `ContextEngine.ingest()` if a context engine is configured\n   - Vector recall (`embed_one` → `recall_with_embedding_async`) when an embedding driver is available\n   - Text search fallback\n   - Proactive memory `auto_retrieve` (skipped for forks)\n4. **Web search augmentation** — `web_search_augment` optionally generates search queries via LLM and injects results for models without tool support.\n5. **System prompt construction** — `build_prompt_setup` applies experiment variant prompts and appends memory context. Language-matching instruction is appended unconditionally.\n6. **Message preparation** — `prepare_llm_messages` filters system messages, applies `safe_trim_messages`, and strips stale image data.\n\n#### 2. Agent Loop Iteration\n\nEach iteration:\n\n1. **LLM completion** — gated by `LLM_CONCURRENCY` semaphore (max 5 concurrent calls globally). Uses exponential backoff (up to 3 retries) for rate-limited/overloaded responses.\n2. **Response classification**:\n   - **End turn** (`stop_reason == EndTurn`) — proceed to finalization\n   - **Tool use** (`stop_reason == ToolUse`) — stage and execute tools\n   - **MaxTokens** — attempt continuation (up to `MAX_CONTINUATIONS = 5`)\n\n#### 3. Tool Execution via StagedToolUseTurn\n\nThe `StagedToolUseTurn` struct is the fix for issue #2381. It buffers the assistant's `tool_use` message and all tool-result blocks in memory, committing them atomically to `session.messages` and the LLM working copy only when `commit()` is called.\n\n**Why staging matters**: The previous approach eagerly pushed the assistant message to `session.messages` before any tool executed. Any control-flow exit between the push and result finalization (error `break`, mid-turn signal, `?` propagation) left orphan `ToolUse` blocks without paired `ToolResult` blocks — causing HTTP 400 from providers on the next request.\n\n```\nStagedToolUseTurn lifecycle:\n  stage_tool_use_turn()    ← buffer assistant message + tool_call_ids\n  append_result()          ← add each tool result as it completes\n  pad_missing_results()    ← fill any gaps with \"[tool interrupted]\" stubs\n  commit()                 ← atomic push to session + messages\n```\n\nEach tool call goes through `execute_single_tool_call` which applies, in order:\n\n1. **LoopGuard** check — circuit breaker, block, or warn\n2. **Fork allowlist** check — reject tools not in `allowed_tools`\n3. **BeforeToolCall hook** — hooks can block execution\n4. **Tool execution** via `tool_runner::execute_tool` with timeout (`TOOL_TIMEOUT_SECS = 600`)\n5. **AfterToolCall hook** — post-execution notification\n6. **Result sanitization** — strip injection markers, truncate via context budget\n\nAfter all tools execute, `append_tool_result_guidance_blocks` injects system messages for:\n- Denied tools (instructs LLM not to retry)\n- Modify-and-retry feedback\n- Parameter errors (LLM should self-correct)\n- Non-parameter execution errors (LLM should report honestly)\n\n#### 4. End-Turn Finalization\n\n`finalize_successful_end_turn` handles post-response processing:\n\n1. Append assistant response to session\n2. Prune heartbeat turns if configured\n3. **Session persistence** — `save_session_async` (skipped for forks)\n4. **Episodic memory** — `remember_interaction_best_effort` stores the user–agent exchange\n5. **Context engine** — `after_turn` update (skipped for forks)\n6. **Proactive memory** — `auto_memorize` extracts new memories from the turn's messages (skipped for forks)\n7. **AgentLoopEnd hook** — fires with iteration count, response length, and fork flag\n\n### Safety Mechanisms\n\n#### LoopGuard\n\n`LoopGuard` with `LoopGuardConfig` provides three verdicts for each tool call:\n\n- **CircuitBreak** — hard stop, returns error to caller\n- **Block** — tool rejected, returns error to LLM for adaptation\n- **Warn** — tool executes but warning is appended to the result\n\n#### Consecutive Failure Detection\n\nTracks consecutive iterations where every executed tool produced a hard error. After `MAX_CONSECUTIVE_ALL_FAILED` (3) such iterations, the loop exits with `RepeatedToolFailures` to prevent expensive wheel-spinning.\n\nSoft errors (sandbox rejections, parameter errors, approval denials) don't count toward this threshold — the LLM is expected to recover from these cheaply.\n\n#### Message History Trimming\n\n`safe_trim_messages` enforces `MAX_HISTORY_MESSAGES` (40). Trimming cuts at conversation-turn boundaries so `ToolUse`/`ToolResult` pairs are never split. After trimming, `validate_and_repair` ensures structural integrity, and a minimal user message is synthesized if too few messages survive.\n\n#### Image Data Stripping\n\nTwo stripping passes prevent token bloat from base64 image data:\n- `strip_prior_image_data` — called before the LLM, strips all images except the last user message\n- `strip_processed_image_data` — strips images from messages the LLM has already processed\n\n#### Global LLM Concurrency\n\n`LLM_CONCURRENCY` semaphore caps simultaneous LLM HTTP calls at 5 (`MAX_CONCURRENT_LLM_CALLS`). Calls queue rather than fail; per-call timeouts still fire independently.\n\n### Context Budget\n\nTool results are truncated through a two-layer system:\n\n1. **`sanitize_tool_result_content`** — strips injection markers, then truncates. When a `ContextEngine` is configured, truncation is delegated to the engine. Otherwise falls back to `truncate_tool_result_dynamic`.\n2. **`ToolBudgetEnforcer`** — per-turn aggregate budget applied in `finalize_tool_use_results` across all tool results.\n\n### Provider Prefix Handling\n\n`strip_provider_prefix` normalizes model IDs before API calls:\n- Strips `provider/` or `provider:` prefixes\n- For providers requiring `org/model` format (OpenRouter, Together, Fireworks, Replicate, Chutes, Huggingface), bare model names like `gemini-2.5-flash` are auto-normalized to `google/gemini-2.5-flash`\n- `normalize_bare_model_id` recognizes common model families (Gemini, Claude, GPT, Llama, DeepSeek, Mistral, Qwen, Cohere)\n\n### AgentLoopResult\n\nThe loop returns an `AgentLoopResult` with:\n\n| Field | Description |\n|-------|-------------|\n| `response` | Final text response |\n| `total_usage` | Accumulated `TokenUsage` across all LLM calls |\n| `iterations` | Number of loop iterations |\n| `silent` | True when agent chose not to reply (`NO_REPLY` / `[silent]`) |\n| `decision_traces` | `Vec<DecisionTrace>` — reasoning, timing, and outcomes for each tool call |\n| `memories_saved` / `memories_used` | Memory activity summaries |\n| `memory_conflicts` | Detected contradictions between new and existing memories |\n| `provider_not_configured` | True when no LLM provider is available |\n| `experiment_context` | Active A/B experiment variant |\n| `new_messages_start` | Index in `session.messages` where this turn's messages begin |\n| `skill_evolution_suggested` | True when 5+ tool calls suggest skill creation opportunity |\n\n### Web Search Augmentation\n\nWhen enabled (`web_search_augmentation` in manifest), the loop can inject web search results as context before the first LLM call. This is primarily for models without tool support.\n\nThe augmentation pipeline:\n1. `generate_search_queries` uses a small LLM call to produce 1–3 focused search queries from conversation context\n2. `web_search_augment` executes searches and injects formatted results\n3. Mode `Auto` activates only when the model doesn't support tools; `Always` forces augmentation; `Off` disables it\n\n### Group Chat Support\n\nFor group-chat agents (metadata key `is_group: true`), `build_group_sender_prefix` prepends sanitized sender labels to user messages. Sender display names are cleaned of bracket/colon/newline characters to prevent prefix-format spoofing.\n\n---\n\n## Integration Points\n\n| Component | Role |\n|-----------|------|\n| `tool_runner::execute_tool` | Executes individual tool calls within the loop |\n| `session_repair` | Validates and repairs message structure after trimming |\n| `loop_guard` | Rate-limits and blocks problematic tool call patterns |\n| `context_engine` | Pluggable context management (recall, truncation, after-turn updates) |\n| `hooks::HookRegistry` | BeforeToolCall / AfterToolCall / AgentLoopEnd events |\n| `checkpoint_manager` | Workspace snapshots for file-modifying tools |\n| `interrupt::SessionInterrupt` | Cooperative cancellation for long-running tools |\n| `silent_response` | Detects `NO_REPLY` / `[no reply needed]` tokens |\n| `reply_directives` | Parses `[[reply_to:...]]` / `[[thread:...]]` / `[[silent]]` directives |\n| `prompt_builder` | Formats memory sections and personal context |\n| `pii_filter` | Strips PII from user messages before they reach the LLM |\n| `proactive_memory` | Auto-extract and auto-retrieve memories around turns |","api-server":"# API Server\n\n# Channel Bridge (`channel_bridge.rs`)\n\n## Purpose\n\nThe channel bridge is the glue layer between the **LibreFang kernel** (the AI agent runtime) and the **channel adapters** (Telegram, Discord, Slack, WhatsApp, and 40+ other platforms). It:\n\n- Implements the `ChannelBridgeHandle` trait, exposing kernel operations to every channel adapter through a uniform interface.\n- Starts all configured channel adapters at daemon boot, reading credentials from environment variables and wiring each adapter into a `BridgeManager`.\n- Translates streaming `StreamEvent`s from the kernel into plain-text strings suitable for delivery over chat channels.\n- Sanitizes errors and filters leaked tool-call syntax before it reaches end users.\n- Provides text-based management commands (`/models`, `/workflows`, `/schedule`, `/approvals`, etc.) that channel adapters invoke via slash-command handlers.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Channel Adapters\"\n        A[Telegram]\n        B[Discord]\n        C[Slack]\n        D[WhatsApp]\n        E[\"40+ more\"]\n    end\n\n    subgraph \"channel_bridge.rs\"\n        BM[BridgeManager]\n        KBA[KernelBridgeAdapter]\n        SB[Streaming Bridge]\n        ES[Error Sanitizer]\n        TF[Tool-Call Filter]\n    end\n\n    subgraph \"Kernel\"\n        K[LibreFangKernel]\n        AR[AgentRouter]\n        SA[SidecarAdapter]\n    end\n\n    A & B & C & D & E --> BM\n    BM --> KBA\n    KBA --> K\n    KBA --> SB\n    SB --> ES\n    SB --> TF\n    K --> AR --> SA\n```\n\n## Key Components\n\n### `KernelBridgeAdapter`\n\nWraps an `Arc<LibreFangKernel>` and implements `ChannelBridgeHandle`. Every channel adapter calls methods on this single handle to send messages, list agents, manage sessions, and execute management commands.\n\nThe adapter is constructed inside `start_channel_bridge_with_config()` with a `started_at: Instant` for uptime reporting, then passed to the `BridgeManager`.\n\n### Streaming Bridge\n\nTwo entry points convert kernel streaming events into a channel-friendly `mpsc::Receiver<String>`:\n\n- **`start_stream_text_bridge()`** — returns only the text receiver. Used by simpler adapters that don't need to know the kernel's terminal status.\n- **`start_stream_text_bridge_with_status()`** — additionally returns a `oneshot::Receiver<Result<(), String>>` that resolves after the stream has fully drained. Adapters use this for accurate delivery tracking and lifecycle decisions (e.g., whether to show ✅ or ❌).\n\n#### Event processing flow\n\nTwo concurrent tokio tasks are spawned:\n\n1. **Bridge task** — reads `StreamEvent`s from the kernel and writes text to the output channel:\n   - `TextDelta` → buffers text\n   - `ContentComplete` → flushes buffered text (after filtering)\n   - `ToolUseStart` → emits a `🔧 Tool Name` progress line (when `show_progress` is enabled)\n   - `ToolExecutionResult` (errors only) → emits `⚠️ Tool Name failed` (localized via `tr_progress_failed`)\n   - `PhaseChange` with `context_warning` → emits a warning about context window trimming\n\n2. **Status task** — awaits the kernel's `JoinHandle`, then:\n   - Sends any error message through the text channel before the bridge task finishes\n   - Reports terminal status through the oneshot channel\n   - Timeout-with-partial-output is treated as soft success (`Ok(())`) so the upstream lifecycle shows ✅ rather than ❌\n\n#### Iteration semantics\n\nTool progress tracking uses per-iteration deduplication. A `HashSet` tracks tool names seen within one iteration (cleared at each `ContentComplete`). This means the same tool invoked multiple times in one model turn shows only one `🔧` line, but if retried across iterations, it gets a fresh line each time.\n\n### Content Sanitization\n\n#### `sanitize_channel_error()`\n\nMaps raw LLM/driver error strings into user-friendly messages before delivery to channels. Recognized patterns:\n\n| Pattern | User Message |\n|---|---|\n| Timeout / inactivity | \"The task timed out due to inactivity. Try breaking it into smaller steps.\" |\n| Rate limit / 429 / quota | \"I've hit my usage limit and need to rest.\" |\n| Auth / 401 | \"I'm having trouble with my credentials. Please let the admin know.\" |\n| Exit code / LLM driver crash | \"Sorry, something went wrong on my end.\" |\n| Anything else | \"Something went wrong: please try again. (ref: …)\" with truncated detail |\n\nGroup chats suppress all error messages entirely to avoid leaking any technical detail.\n\n#### `looks_like_tool_call()`\n\nSome LLM providers emit tool calls as plain text instead of using the proper tool_use API. This function detects leaked tool-call syntax across multiple formats:\n\n- JSON arrays/objects starting with `[{` or `{\"type\":\"function\"`\n- Tag-based patterns: `<function=…>`, `<tool>`, `[TOOL_CALL]`, ` Tigers` (Unicode tags)\n- Markdown code blocks and backtick-wrapped tool calls containing `name { … }` JSON structures\n- Bare JSON objects with `name`/`function`/`tool` + `arguments`/`parameters`/`args`/`input` keys\n\nText matching any of these patterns is silently dropped at `ContentComplete` and during the final flush.\n\n### Channel Adapter Wiring\n\n`start_channel_bridge_with_config()` is the main entry point. It:\n\n1. Scans `ChannelsConfig` for configured channels, emitting warnings for any channel whose Cargo feature is disabled.\n2. For each configured channel, reads credentials from environment variables via `read_token()`.\n3. Constructs the appropriate adapter (e.g., `TelegramAdapter`, `DiscordAdapter`) with config-driven options like allowed users, backoff settings, and account IDs.\n4. Collects all adapters into a `Vec<(Arc<dyn ChannelAdapter>, Option<String>, Option<String>)>` alongside the default agent name and account ID.\n5. Creates a `KernelBridgeAdapter` wrapping the kernel.\n6. Passes adapters and handle to `BridgeManager::start()` and `AgentRouter::start()`.\n7. Also starts `SidecarAdapter` instances for any configured sidecar channels.\n8. Returns the `BridgeManager`, a list of started channel names, and an `axum::Router` of webhook routes for webhook-based channels.\n\nAll channel adapters are feature-gated via `#[cfg(feature = \"channel-<name>\")]`. The full list of supported features across five waves:\n\n- **Wave 1**: telegram, discord, slack, whatsapp, signal, matrix, email, teams, mattermost, irc, google-chat, twitch, rocketchat, zulip, xmpp\n- **Wave 2**: (voice, webhook)\n- **Wave 3**: line, viber, messenger, reddit, mastodon, bluesky, feishu, revolt\n- **Wave 4**: nextcloud, guilded, keybase, threema, nostr, webex, pumble, flock, twist\n- **Wave 5**: mumble, dingtalk, qq, discourse, gitter, ntfy, gotify, webhook, voice, linkedin, wechat, wecom\n\n### Management Commands\n\n`KernelBridgeAdapter` exposes numerous text-returning methods that channel adapters call in response to slash commands. Key groups:\n\n| Domain | Methods | Description |\n|---|---|---|\n| **Agent management** | `list_agents`, `find_agent_by_name`, `spawn_agent_by_name` | List, locate, and dynamically spawn agents from manifest files |\n| **Session control** | `reset_session`, `reboot_session`, `compact_session`, `set_model`, `stop_run`, `session_usage` | Per-agent session lifecycle |\n| **Models & providers** | `list_models_text`, `list_providers_text`, `list_providers_interactive`, `list_models_by_provider` | Catalog introspection |\n| **Skills** | `list_skills_text` | Installed skill registry |\n| **Hands** | `list_hands_text` | Physical/manipulation hands and their readiness |\n| **Workflows** | `list_workflows_text`, `run_workflow_text` | Multi-step agent workflows |\n| **Triggers** | `list_triggers_text`, `create_trigger_text`, `delete_trigger_text` | Event-driven trigger rules |\n| **Schedules** | `list_schedules_text`, `manage_schedule_text` (add/del/run) | Cron-based scheduled jobs |\n| **Approvals** | `list_approvals_text`, `resolve_approval_text` | Human-in-the-loop tool approval with TOTP support |\n| **Budget** | `budget_text` | Hourly/daily/monthly spend tracking |\n| **Network** | `peers_text`, `a2a_agents_text` | OFP peer network and A2A agent discovery |\n| **Auth** | `authorize_channel_user` | RBAC gating per channel user |\n| **Delivery** | `record_delivery` | Track message delivery success/failure for metrics and cron `LastChannel` persistence |\n\n### Reply Intent Classification\n\n`classify_reply_intent()` is used by group-chat adapters to decide whether an incoming message is directed at the bot. It:\n\n1. Sanitizes and truncates the message text (max 500 chars) and sender name (max 64 chars), stripping dangerous characters.\n2. Sends a one-shot LLM call with a strict classification prompt.\n3. Returns `false` only if the response contains `NO_REPLY`; otherwise returns `true` (fail-open).\n\n### TOTP-Protected Approvals\n\n`resolve_approval_text()` handles tool-approval requests that may require TOTP verification:\n\n- Checks if the specific tool requires TOTP via `policy().tool_requires_totp()`.\n- Supports both 6-digit TOTP codes and single-use recovery codes.\n- Enforces lockout after too many failed TOTP attempts via `record_totp_failure()`.\n- When TOTP is required but not provided, the kernel's `resolve()` may still allow it during a grace period.\n\n### Channel Overrides & Alias Routing\n\n`channel_overrides()` looks up per-channel configuration (from `ChannelsConfig`) and merges the default agent's routing aliases into `group_trigger_patterns`. This means aliases configured in an agent's manifest routing metadata automatically work as group-chat triggers without explicit @mentions. The method:\n\n1. Reads the agent manifest's `routing.aliases` and `routing.weak_aliases`.\n2. Escapes regex metacharacters in each alias.\n3. Uses `\\b` word boundaries for ASCII aliases and plain substring matching for CJK/non-ASCII.\n4. Deduplicates against existing patterns.\n\n## Adding a New Channel Adapter\n\nTo add support for a new messaging platform:\n\n1. **Create the adapter** in `librefang-channels/src/<platform>.rs` implementing `ChannelAdapter`.\n2. **Add a Cargo feature** `channel-<platform>` to `librefang-channels` and `librefang-api`.\n3. **Add config fields** to `ChannelsConfig` in `librefang-types`.\n4. **Wire it in `start_channel_bridge_with_config()`**:\n   - Add a `check_channel!()` macro call for feature-disabled warnings.\n   - Add a `#[cfg(feature = \"channel-<platform>\")]` block that reads config, calls `read_token()`, constructs the adapter, and pushes it to `adapters`.\n   - Add the channel type string to `channel_overrides()` match block.\n5. **Import the adapter type** at the top of the file with `#[cfg(feature = \"channel-<platform>\")]`.\n\n## Key Design Decisions\n\n- **Fail-open classification**: `classify_reply_intent()` defaults to replying when the LLM call fails, ensuring the bot never silently ignores users due to a transient error.\n- **Soft timeout handling**: Streaming timeouts that produced partial output report `Ok(())` status, preserving the pre-V2 UX where partial responses were shown as successful.\n- **Group chat error suppression**: All errors are suppressed in group contexts to prevent technical detail leakage in public/shared channels.\n- **Per-iteration tool dedup**: Prevents UI noise from agents that fan out parallel tool calls to the same tool within a single model turn.\n- **Feature-gated compilation**: Channels not needed at compile time add zero binary size and zero runtime overhead.","channel-adapters":"# Channel Adapters\n\n# Channel Adapters Module\n\nThe `librefang-channels` crate provides the messaging infrastructure that connects external chat platforms (Telegram, Discord, Slack, Bluesky, WhatsApp, and many more) to LibreFang's agent kernel. Every platform is abstracted behind a uniform `ChannelAdapter` trait, while the `BridgeManager` orchestrates message routing, sanitization, rate limiting, and lifecycle management.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"External Platforms\"\n        TG[Telegram]\n        DC[Discord]\n        BS[Bluesky]\n        WA[WhatsApp]\n        WH[Webhook]\n        OT[Others...]\n    end\n\n    subgraph \"librefang-channels\"\n        CA[ChannelAdapter Trait]\n        BM[BridgeManager]\n        AR[AgentRouter]\n        RL[RateLimiter]\n        SA[InputSanitizer]\n        FMT[Formatter]\n        MJ[MessageJournal]\n        DB[MessageDebouncer]\n    end\n\n    subgraph \"librefang-kernel\"\n        CBH[ChannelBridgeHandle]\n        AG[Agent Loop]\n    end\n\n    TG & DC & BS & WA & WH & OT -->|ChannelMessage stream| CA\n    CA -->|start_adapter| BM\n    BM -->|dispatch_message| AR\n    AR -->|resolve agent| CBH\n    CBH -->|send_message / streaming| AG\n    AG -->|response text| CBH\n    CBH -->|send_response| CA\n    BM -->|check| RL\n    BM -->|check| SA\n    BM -->|format_output| FMT\n    BM -->|crash recovery| MJ\n    BM -->|buffer rapid messages| DB\n```\n\n## Core Types\n\n### `ChannelMessage`\n\nThe universal inbound message envelope. Every adapter produces these regardless of platform:\n\n```rust\npub struct ChannelMessage {\n    pub channel: ChannelType,\n    pub platform_message_id: String,\n    pub sender: ChannelUser,\n    pub content: ChannelContent,\n    pub target_agent: Option<String>,\n    pub timestamp: DateTime<Utc>,\n    pub is_group: bool,\n    pub thread_id: Option<String>,\n    pub metadata: HashMap<String, serde_json::Value>,\n}\n```\n\nThe `metadata` map carries platform-specific data (URIs, guild IDs, reply references, `account_id` for multi-bot routing, etc.) without polluting the typed fields.\n\n### `ChannelContent`\n\nAn enum representing all supported inbound content types:\n\n| Variant | Description |\n|---|---|\n| `Text(String)` | Plain text message |\n| `Command { name, args }` | Slash command (e.g. `/status check`) |\n| `Image { url, caption, mime_type }` | Photo with optional caption |\n| `Voice { url, duration_seconds, caption }` | Voice message |\n| `Video { url, caption, duration_seconds, mime_type }` | Video clip |\n| `File { url, filename }` | File attachment |\n| `Interactive { text, buttons }` | Message with inline buttons |\n| `ButtonCallback { action, data }` | Callback from a button press |\n| `Location { lat, lon }` | Geolocation |\n| `MediaGroup { items }` | Album of media |\n| `Poll { question, options }` | Poll creation |\n| ... | Additional variants for stickers, animations, audio, edits, etc. |\n\n### `ChannelType`\n\nIdentifies the platform. Uses an enum for well-known platforms and `Custom(String)` for anything else:\n\n```rust\npub enum ChannelType {\n    Telegram, Discord, Slack, WhatsApp, Signal, Matrix,\n    Email, Teams, Mattermost, WeChat, WebChat, CLI,\n    Custom(String),\n}\n```\n\n### `SenderContext`\n\nCarries full sender identity context to the kernel so agents know who is talking and from which channel:\n\n```rust\npub struct SenderContext {\n    pub channel: String,\n    pub user_id: String,\n    pub chat_id: Option<String>,\n    pub display_name: String,\n    pub is_group: bool,\n    pub was_mentioned: bool,\n    pub thread_id: Option<String>,\n    pub account_id: Option<String>,\n    pub auto_route: AutoRouteStrategy,\n    pub group_participants: Vec<ParticipantRef>,\n    // ...\n}\n```\n\nBuilt from an incoming `ChannelMessage` by `build_sender_context()` in the bridge, incorporating per-channel overrides for auto-routing parameters.\n\n## The `ChannelAdapter` Trait\n\nEvery platform adapter implements this async trait:\n\n```rust\n#[async_trait]\npub trait ChannelAdapter: Send + Sync {\n    fn name(&self) -> &str;\n    fn channel_type(&self) -> ChannelType;\n\n    async fn start(&self) -> Result<Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>, Error>;\n    async fn send(&self, user: &ChannelUser, content: ChannelContent) -> Result<(), Error>;\n    async fn send_typing(&self, user: &ChannelUser) -> Result<(), Error>;\n    async fn stop(&self) -> Result<(), Error>;\n\n    // Optional methods with default implementations:\n    async fn send_in_thread(&self, user: &ChannelUser, content: ChannelContent, thread_id: &str) -> Result<(), Error>;\n    async fn send_reaction(&self, user: &ChannelUser, message_id: &str, reaction: &LifecycleReaction) -> Result<(), Error>;\n    fn suppress_error_responses(&self) -> bool { false }\n    fn typing_events(&self) -> Option<mpsc::Receiver<TypingEvent>> { None }\n    async fn create_webhook_routes(&self) -> Option<(axum::Router, MessageStream)>;\n}\n```\n\n**Key methods:**\n\n- **`start()`** — Returns a `Stream<Item = ChannelMessage>`. Polling adapters (Bluesky, WeChat) produce items on a timer; webhook adapters (Telegram, Slack) produce items when HTTP requests arrive.\n- **`send()`** — Delivers a response back to the user. The adapter handles platform-specific formatting and API calls.\n- **`create_webhook_routes()`** — Optionally returns an `axum::Router` to be mounted on the shared API server. This avoids each adapter running its own HTTP server. The bridge calls this first and falls back to `start()` only when no webhook routes are provided.\n\n## Bridge System\n\n### `ChannelBridgeHandle` (Trait)\n\nDefined in `librefang-channels` but implemented in `librefang-api` on the real kernel. This inversion avoids circular dependencies — the channels crate never imports the kernel. The trait exposes over 40 methods covering:\n\n| Category | Methods |\n|---|---|\n| **Core messaging** | `send_message`, `send_message_with_sender`, `send_message_with_blocks_and_sender`, `send_message_streaming_with_sender_status` |\n| **Agent management** | `find_agent_by_name`, `list_agents`, `spawn_agent_by_name` |\n| **Session control** | `reset_session`, `reboot_session`, `compact_session`, `set_model`, `stop_run` |\n| **Authorization** | `authorize_channel_user` |\n| **Channel config** | `channel_overrides` |\n| **Reply intent** | `classify_reply_intent` |\n| **Automation** | `list_workflows_text`, `run_workflow_text`, `list_triggers_text`, `create_trigger_text`, `list_schedules_text`, `manage_schedule_text` |\n| **Approvals** | `list_approvals_text`, `resolve_approval_text`, `subscribe_events` |\n| **Delivery tracking** | `record_delivery` |\n| **Proactive push** | `send_channel_push` |\n\nMost methods have sensible default implementations so the trait can be implemented incrementally.\n\n### `BridgeManager`\n\nOwns all running adapters and dispatches inbound messages to agents. Created via:\n\n```rust\nlet manager = BridgeManager::new(kernel_handle, router)\n    .with_sanitizer(kernel_handle, router, &sanitize_config)\n    .with_journal(journal);\n```\n\n**Lifecycle:**\n\n1. **`start_adapter(adapter)`** — Subscribes to the adapter's message stream. Each inbound message spawns a concurrent task (bounded by a semaphore of 32) so slow LLM calls don't block subsequent messages.\n2. **`take_webhook_router()`** — After all adapters are started, call this to collect webhook routes and mount them under `/channels/{name}/webhook` on the API server.\n3. **`push_message()`** — Entry point for the REST API push endpoint to send outbound messages proactively.\n4. **`stop()`** — Signals shutdown to all dispatch loops, stops each adapter, and awaits all tasks.\n\n### Message Dispatch Flow\n\nWhen a `ChannelMessage` arrives from an adapter stream:\n\n```\n1. Input Sanitization\n   ├── Check for prompt injection patterns\n   ├── Warn mode: log + allow\n   └── Block mode: send rejection + return\n\n2. Fetch Channel Overrides\n   └── output_format, threading, dm_policy, group_policy, rate limits, debounce config\n\n3. DM/Group Policy Check\n   ├── DM: apply dm_policy (Ignore / AllowedOnly / Respond)\n   └── Group: apply group_policy (Ignore / CommandsOnly / MentionOnly / All)\n       ├── Check was_mentioned flag\n       ├── Check regex trigger patterns (with vocative guard)\n       └── Optional: LLM reply-intent precheck\n\n4. Rate Limiting\n   ├── Global per-channel limit\n   └── Per-user limit\n\n5. Command Handling (if ChannelContent::Command)\n   ├── Check is_command_allowed against channel overrides\n   ├── Special UI commands (/agents, /models) → interactive keyboards\n   ├── Bot commands (/help, /agent, /reset, etc.)\n   └── Blocked commands → fall through to agent as text\n\n6. Multimodal Handling\n   ├── Image → download + base64 encode → ContentBlock::Image\n   └── Voice/Video/File → text description fallback\n\n7. Agent Resolution\n   ├── Thread-route agent (from metadata)\n   ├── BindingContext routing (account_id, guild_id, peer_id)\n   ├── User default\n   └── F
