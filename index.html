e sensible no-op defaults so that mock/test implementations only need to override what they use.\n\n## Message Dispatch Flow\n\nWhen a `ChannelMessage` arrives from an adapter stream, `dispatch_message` executes this pipeline:\n\n```\n1. Webhook direct delivery check ŌåÆ (early return if deliver_only mode)\n2. Input sanitization          ŌåÆ (block/reject if prompt injection detected)\n3. Agent resolution            ŌåÆ (thread route ŌåÆ binding context ŌåÆ fallback)\n4. Override resolution         ŌåÆ (agent-level overrides win over channel-level)\n5. DM/Group policy check       ŌåÆ (ignore/commands_only/mention_only/all)\n6. Rate limiting               ŌåÆ (global per-channel + per-user)\n7. Command dispatch            ŌåÆ (/agents, /help, /status, etc.)\n8. Agent send                  ŌåÆ (with sender context, streaming if supported)\n9. Response formatting         ŌåÆ (agent prefix + output format)\n10. Delivery recording         ŌåÆ (success/failure tracking)\n```\n\n### Agent Resolution (`resolve_or_fallback`)\n\n1. **Thread routing** ŌĆö if `metadata[\"thread_route_agent\"]` is set, resolve that agent by name.\n2. **Binding context** ŌĆö `AgentRouter.resolve_with_context()` considers `account_id`, `guild_id`, user defaults.\n3. **Fallback chain** ŌĆö tries agent named `\"assistant\"`, then the first running agent, auto-setting the user default.\n\n### Group Message Gating (`should_process_group_message`)\n\nControlled by `GroupPolicy` in `ChannelOverrides`:\n\n| Policy | Behavior |\n|---|---|\n| `Ignore` | All group messages dropped |\n| `CommandsOnly` | Only `/command` messages processed |\n| `MentionOnly` | Requires explicit mention, `/command`, **or** regex trigger pattern match |\n| `All` | Everything processed (optionally filtered by `reply_precheck` LLM call) |\n\nThe **addressee guard** (`LIBREFANG_GROUP_ADDRESSEE_GUARD=on`, off by default) adds positional vocative detection: if a group message opens with a vocative directed at another participant (e.g., `\"Caterina, chiedi...\"`), the bot stays silent even if a trigger pattern matches mid-sentence.\n\n### Command Policy\n\nThree layers of command access control:\n\n1. `disable_commands: true` ŌåÆ all blocked\n2. `allowed_commands` (whitelist) ŌåÆ only listed commands pass\n3. `blocked_commands` (blacklist) ŌåÆ listed commands blocked, rest pass\n\nBlocked commands are reconstructed as raw text (e.g., `\"/agent admin\"`) and forwarded to the agent as normal input instead.\n\n### Stale Agent Re-resolution\n\nWhen an agent send fails with \"Agent not found\" and the failed ID is the channel default, `try_reresolution` re-resolves the agent by name and retries once. This handles hot-reload scenarios where agents are respawned with new IDs.\n\n## Input Sanitization\n\n`InputSanitizer` (configured via `SanitizeConfig`) checks text content from `Text`, `Image.caption`, `Voice.caption`, and `Video.caption` for prompt injection patterns before any command parsing or agent dispatch:\n\n- **Clean** ŌåÆ proceed\n- **Warned** ŌåÆ log + proceed (suspicious but not definitive)\n- **Blocked** ŌåÆ log + send generic rejection + return early\n\n## Rate Limiting\n\n`ChannelRateLimiter` applies two configurable limits from `ChannelOverrides`:\n\n- `rate_limit_per_minute` ŌĆö global across all users on a channel\n- `rate_limit_per_user` ŌĆö per-user (keyed by `sender_user_id`, which prefers `metadata[\"sender_user_id\"]` over `platform_id` for DM scenarios)\n\nWhen exceeded, a rate-limit message is sent to the user and dispatch stops.\n\n## ReplyEnvelope\n\nOutbound replies use a two-channel envelope:\n\n```rust\npub struct ReplyEnvelope {\n    pub public: Option<String>,        // ŌåÆ source chat (DM or group)\n    pub owner_notice: Option<String>,  // ŌåÆ operator's DM only\n}\n```\n\nThis supports the `notify_owner` LLM tool: agents can produce both a public response and a private operator notification in a single turn. Adapters that don't support owner-side delivery ignore `owner_notice` and forward only `public`.\n\n## Output Formatting & Agent Prefixing\n\n`formatter::format_for_channel(text, output_format)` adapts LLM output for the target platform (Markdown, HTML, plain text).\n\n`apply_agent_prefix(style, agent_name, text)` prepends the agent's name in the configured style:\n\n| `PrefixStyle` | Output |\n|---|---|\n| `Off` | *(no prefix)* |\n| `Bracket` | `[coder] response text` |\n| `BoldBracket` | `**[coder]** response text` |\n\nIdempotent ŌĆö if the text already starts with the prefix, it's not doubled.\n\n## Adapter Example: Bluesky\n\nThe Bluesky adapter (`bluesky.rs`) demonstrates the polling pattern:\n\n- **Authentication**: `com.atproto.server.createSession` with identifier + app password. Session tokens cached in `Arc<RwLock<Option<BlueskySession>>>` with automatic refresh (refreshes at ~90 minutes; sessions last ~2 hours).\n- **Inbound**: Polls `app.bsky.notification.listNotifications` every 5 seconds. Parses `mention` and `reply` reasons into `ChannelMessage` ŌĆö text starting with `/` becomes `ChannelContent::Command`.\n- **Outbound**: Posts via `com.atproto.repo.createRecord` with `app.bsky.feed.post` record type. Long messages are split at 300-grapheme boundaries using `split_message`.\n- **Security**: App password is stored in `Zeroizing<String>` for automatic secure zeroization on drop.\n- **Multi-bot**: Supports `account_id` for routing to different agents based on which Bluesky account received the message.\n\nKey constants:\n- `DEFAULT_SERVICE_URL`: `\"https://bsky.social\"`\n- `MAX_MESSAGE_LEN`: `300` (grapheme clusters)\n- `POLL_INTERVAL_SECS`: `5`\n\n## Message Journal\n\nWhen configured, `MessageJournal` provides crash recovery:\n\n- `recover_pending()` returns journal entries that were in-flight at crash time.\n- `compact_journal()` flushes and compacts on shutdown.\n- Entries are recorded before agent dispatch and cleared after successful delivery.\n\n## Webhook Router Collection\n\nAdapters that receive messages via HTTP webhooks (e.g., WeCom, WhatsApp Business, Slack Events API) return `axum::Router` instances from `create_webhook_routes()`. `BridgeManager` collects these and nests them under `/{adapter_name}`. The combined router is extracted via `take_webhook_router()` and mounted at `/channels` on the main API server ŌĆö without auth middleware, since webhook adapters handle their own signature verification.\n\n## Adding a New Adapter\n\n1. Create a new module (e.g., `src/matrix.rs`) implementing `ChannelAdapter`.\n2. `start()` returns a `Stream<Item = ChannelMessage>` ŌĆö use `mpsc::channel` + `ReceiverStream`.\n3. `send()` delivers outbound content to the platform's API.\n4. Optionally implement `create_webhook_routes()` for push-based platforms.\n5. Register the adapter with `BridgeManager::start_adapter()` at startup.","cli-terminal-ui":"# CLI & Terminal UI\n\n# CLI & Terminal UI (`librefang-cli`)\n\nThe command-line interface for LibreFang. When invoked with a subcommand it dispatches to the appropriate handler; when run with no subcommand in a TTY, it presents an interactive launcher menu. Commands either talk to a running daemon over HTTP or boot an in-process kernel for single-shot execution.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Entry[\"main()\"] -->|no subcommand + TTY| Launcher[\"launcher::run()\"]\n    Entry -->|subcommand| Dispatch[\"Command dispatch\"]\n    Dispatch --> Daemon[\"Daemon HTTP client\"]\n    Dispatch --> InProcess[\"In-process kernel\"]\n    Launcher --> Menu[\"Ratatui menu loop\"]\n    Launcher --> DesktopApp[\"desktop_install\"]\n    Dispatch --> Doctor[\"doctor::run_all()\"]\n    Dispatch --> CmdInit[\"cmd_init / cmd_init_upgrade\"]\n    CmdInit --> BundledAgents[\"bundled_agents::sync_registry_agents\"]\n    Dispatch --> Tracing[\"init_tracing_stderr / init_tracing_file\"]\n    Tracing --> LogFilter[\"log_filter::ReloadableEnvFilter\"]\n    Daemon --> HttpClient[\"http_client::new_client()\"]\n```\n\n## Startup Sequence\n\n`main()` performs the following in order:\n\n1. **Allocator setup** ŌĆö Jemalloc on non-MSVC targets via `tikv_jemallocator`.\n2. **Ctrl+C handler** ŌĆö `install_ctrlc_handler()` uses `SetConsoleCtrlHandler` on Windows to ensure clean interruption of blocking reads; on Unix the default SIGINT handler suffices.\n3. **Dotenv & vault loading** ŌĆö `librefang_extensions::dotenv::load_dotenv()` reads `.env` files and loads encrypted credentials from the vault.\n4. **CLI parsing** ŌĆö `clap::Parser` parses `Cli` which has an optional `Commands` subcommand.\n5. **i18n init** ŌĆö `i18n::init()` sets up a thread-local `FluentBundle` for the configured language (`en` or `zh-CN`).\n6. **Subcommand dispatch** ŌĆö the giant `match self.command` block routes to `cmd_*` functions. If no subcommand is provided, `launcher::run()` starts the interactive menu.\n\n## Key Components\n\n### Command Definitions (`main.rs`)\n\nAll CLI commands are defined via `clap` derive macros. The `Commands` enum contains top-level subcommands, many of which have their own nested subcommand enums (marked with `[*]` in help text):\n\n- **Lifecycle**: `init`, `start`, `stop`, `restart`, `status`, `doctor`, `update`\n- **Agent management**: `agent` (new, list, chat, kill, spawn, set), `spawn`, `agents`, `kill`, `chat`, `message`\n- **Orchestration**: `workflow`, `trigger`, `cron`, `webhooks`\n- **Configuration**: `config` (show, edit, get, set, set-key, delete-key, test-key), `vault`\n- **Integrations**: `channel`, `mcp`, `skill`, `hand`, `devices`\n- **UI**: `tui`, `dashboard`, `qr`\n- **System**: `service`, `system`, `security`, `memory`, `sessions`, `logs`, `health`\n- **Setup wizards**: `onboard`, `configure`, `setup`\n- **Other**: `models`, `auth`, `new`, `completion`, `hash-password`, `reset`, `uninstall`, `migrate`\n\nThe `Cli` struct accepts a global `--config` flag for specifying a config file path.\n\n### Interactive Launcher (`launcher.rs`)\n\nDisplayed when `librefang` is run with no subcommand in a TTY. Built with Ratatui as a one-shot menu.\n\n**Menu behavior adapts to user state:**\n\n- **First-run users** (no `~/.librefang/config.toml`): \"Get started\" is the top item, highlighted with accent color. Migration hints appear if `~/.openclaw` or `~/.openfang` directories are detected.\n- **Returning users**: \"Chat with an agent\" leads, \"Settings\" is at the bottom.\n\n**Background daemon detection** runs on a spawned thread ŌĆö checks for a running daemon via `find_daemon()` and queries `/api/agents` for the agent count. The result feeds into the status block shown above the menu.\n\n**Provider detection** checks environment variables (`ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, etc.) and displays whether API keys are configured.\n\n**Key bindings**: `Ōåæ/Ōåō` or `j/k` navigate, `1-9` quick-select, `Enter` confirms, `q` quits. The help screen (from \"Show all commands\") renders the full `--help` output with scrolling.\n\n`LauncherChoice` enum variants map to the corresponding command handlers back in `main.rs`.\n\n### Diagnostic Framework (`doctor.rs`)\n\nA trait-based audit check registry for `librefang doctor`.\n\n**Core types:**\n\n| Type | Purpose |\n|---|---|\n| `AuditCheck` trait | Single method: `fn run(&self, ctx: &AuditContext) -> AuditResult` |\n| `AuditContext` | Carries `librefang_home: PathBuf` ŌĆö cheap to construct, extend as needed |\n| `AuditResult` | `name`, `severity`, `summary`, optional `hint` |\n| `Severity` | `Pass`, `Info`, `Warn`, `Error` |\n\n**Registered checks** (via `registered_checks()`):\n\n1. **`VaultKeyCheck`** ŌĆö verifies `LIBREFANG_VAULT_KEY` base64-decodes to exactly 32 bytes. This is a common gotcha: 32 ASCII characters ŌēĀ 32 bytes after base64 decode. Matches production behavior in `librefang-extensions/src/vault.rs` (no trimming).\n2. **`ApiListenAddrCheck`** ŌĆö parses `api_listen` from `config.toml` as a `SocketAddr`. Warns on privileged ports (<1024) and port 0 (ephemeral, undiscoverable by clients).\n3. **`ConfigTomlSchemaCheck`** ŌĆö verifies `config.toml` exists and parses as valid TOML.\n\n**Adding a new check:**\n\n1. Create a unit struct implementing `AuditCheck`.\n2. Add `Box::new(YourCheck)` to the `registered_checks()` vector.\n\nThe module runs *alongside* legacy inline checks in `cmd_doctor` ŌĆö migration is incremental.\n\n### Desktop App Installation (`desktop_install.rs`)\n\nHandles discovery, download, and installation of the LibreFang Desktop app from GitHub releases.\n\n**Binary discovery** (`find_desktop_binary`) searches in order:\n1. Sibling of the current CLI executable\n2. System `PATH` lookup\n3. Platform-specific install location (`/Applications/LibreFang.app` on macOS, `%LOCALAPPDATA%\\LibreFang\\` on Windows, `~/.local/bin/` on Linux)\n\n**Download flow** (`prompt_and_install` ŌåÆ `download_and_install`):\n1. Prompts the user for confirmation\n2. Queries `https://api.github.com/repos/librefang/librefang/releases/latest`\n3. Finds the asset matching the current platform/arch suffix\n4. Streams the download to a temp directory\n5. Delegates to platform-specific installation\n\n**Platform installations:**\n\n| Platform | Asset | Install method |\n|---|---|---|\n| macOS (aarch64) | `_aarch64.dmg` | `hdiutil attach`, copy to `/Applications`, clear quarantine |\n| macOS (x86_64) | `_x64.dmg` | Same as aarch64 |\n| Windows (x86_64) | `_x64-setup.exe` | Silent NSIS install (`/S`) |\n| Linux (x86_64) | `_amd64.AppImage` | Copy to `~/.local/bin/`, `chmod 755` |\n\n**Launching** (`launch`) handles macOS `.app` bundles specially ŌĆö walks up to find the parent `.app` bundle and uses `open -a` instead of executing the binary directly.\n\n### Internationalization (`i18n.rs`)\n\nThread-local Fluent-based i18n with bundled FTL resources.\n\n- `init(language)` creates a `FluentBundle` from embedded FTL files (`locales/en/main.ftl`, `locales/zh-CN/main.ftl`)\n- `t(key)` ŌĆö simple lookup, returns `[key]` if not found\n- `t_args(key, &[(\"name\", \"value\")])` ŌĆö lookup with interpolation\n- Falls back to `DEFAULT_LANGUAGE` (\"en\") for unsupported languages\n\nThe `I18N` thread-local is lazily initialized and reused across calls.\n\n### HTTP Client (`http_client.rs`)\n\nThin wrapper around `reqwest::blocking::Client` with bundled CA roots from `librefang_runtime::http_client::tls_config()`. Two functions:\n\n- `client_builder()` ŌĆö returns a `ClientBuilder` with preconfigured TLS\n- `new_client()` ŌĆö builds the client, panics on failure (should never fail with bundled roots)\n\n### Reloadable Log Filter (`log_filter.rs`)\n\nHot-reloadable `EnvFilter` for the daemon's tracing stack. Designed as a per-layer filter so the OpenTelemetry exporter sees the full span tree while stderr stays filtered.\n\n**Problem it solves:** `tracing_subscriber::reload::Layer` has a `Handle` typed to the full subscriber stack, making the signature unwieldy in a `OnceLock`. This module uses `ArcSwap<EnvFilter>` instead.\n\n**Key design decisions:**\n\n- **`ReloadableEnvFilter`** wraps `Arc<ArcSwap<EnvFilter>>` and implements `tracing_subscriber::layer::Filter` by forwarding every method to the current inner filter.\n- **Baseline directives** (`install_with_baseline`) preserve per-target overrides (e.g., `librefang_kernel=warn`) across reloads. Without this, a dashboard \"set debug\" would wipe boot-time masks.\n- **`reload_log_level(directive)`** parses a new directive, reapplies baseline, swaps the filter via `ArcSwap::store`, and calls `tracing_core::callsite::rebuild_interest_cache()` to invalidate per-callsite `Interest` caching.\n- **`CliLogLevelReloader`** adapts this to the kernel's `LogLevelReloader` trait.\n\nProcess-wide state lives in `OnceLock` slots (`LIVE_FILTER`, `BASELINE_DIRECTIVES`) ŌĆö idempotent for re-init scenarios.\n\n### Registry Sync (`bundled_agents.rs`)\n\nMinimal backwards-compatibility wrapper around `librefang_runtime::registry_sync::sync_registry`. Called during `cmd_init` and `cmd_init_upgrade` to sync bundled agent content to the local `~/.librefang/` directory.\n\n### Tracing Initialization\n\nTwo tracing modes set up in `main.rs`:\n\n- **`init_tracing_stderr`** ŌĆö Used by the daemon. Layers a `ReloadableEnvFilter` (with baseline directives) onto a `fmt::Layer` writing to stderr, plus an optional OpenTelemetry reload layer from `librefang_api::telemetry`.\n- **`init_tracing_file`** ŌĆö Used by detached/background daemon processes. Writes to a log file in the LibreFang home directory.\n\nBoth respect `RUST_LOG` environment variable for initial filter configuration.\n\n## Daemon Communication Pattern\n\nCommands that need a running daemon follow this pattern:\n\n1. `find_daemon()` or `find_daemon_in_home()` locates the daemon URL from `~/.librefang/daemon.json`\n2. `daemon_client_with_api_key()` builds an HTTP client with the configured API key\n3. Requests hit the daemon's REST API (default `http://127.0.0.1:4545`)\n\nWhen no daemon is running, many commands fall back to in-process kernel execution via `LibreFangKernel`.\n\n## Utility Modules\n\n| Module | Purpose |\n|---|---|\n| `ui` | Terminal output helpers: `success`, `error`, `hint`, `step`, `kv`, `banner`, `next_steps` |\n| `table` | Formatted table rendering with right-alignment support |\n| `progress` | Progress bars with OSC 52 integration, delay suppression, and zero-total safety |\n| `templates` | Agent template loading from the registry |\n| `tui/` | Full-screen terminal dashboard (agents, logs, audit, etc.) |\n| `mcp` | MCP server backend construction |","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\n## Overview\n\nThe Dashboard Frontend is a single-page application that provides a browser-based management interface for the LibreFang platform. It covers agent lifecycle management, real-time chat, workflow editing, channel configuration, memory inspection, MCP server management, and administrative functions. The frontend communicates exclusively with the LibreFang backend API over HTTP and Server-Sent Events (SSE).\n\n## Architecture\n\n```mermaid\ngraph TD\n    Pages[\"Pages<br/>(ChatPage, AgentsPage, ŌĆ”)\"]\n    Queries[\"Query Hooks<br/>(lib/queries/*.ts)\"]\n    Mutations[\"Mutation Hooks<br/>(lib/mutations/*.ts)\"]\n    APIClient[\"API Client<br/>(dashboard/src/api.ts)\"]\n    HTTP[\"HTTP Primitives<br/>(get, post, put, del, patch)\"]\n    Auth[\"Auth Layer<br/>(authHeader, setApiKey, clearApiKey)\"]\n    Generated[\"Type Definitions<br/>(generated.ts)\"]\n    Backend[\"LibreFang Backend API\"]\n\n    Pages --> Queries\n    Pages --> Mutations\n    Queries --> APIClient\n    Mutations --> APIClient\n    APIClient --> HTTP\n    APIClient --> Auth\n    HTTP --> Auth\n    HTTP --> Backend\n    APIClient -.-> Generated\n```\n\nThe application follows a strict layered pattern: **Pages** consume **React Query hooks** (queries for reads, mutations for writes), which call into the **API client**, which delegates to generic HTTP primitives with shared authentication headers.\n\n## Key Files and Directories\n\n### `dashboard/openapi/generated.ts`\n\nAuto-generated by `openapi-typescript` from the backend's OpenAPI spec. Exports the `paths` and `components` TypeScript types that describe every API endpoint, request body, and response shape. **Do not edit manually** ŌĆö regenerate with the build tooling whenever the backend spec changes.\n\nThe `paths` object is keyed by route pattern (e.g. `\"/api/agents/{id}/message\"`) and maps each HTTP method to an operation ID. The `components.schemas` object contains shared request/response types like `SpawnRequest`, `MessageRequest`, `MessageResponse`, `PatchAgentConfigRequest`, and `BulkAgentIdsRequest`.\n\n### `dashboard/src/api.ts`\n\nThe central API client module. It exports named functions for every backend operation, grouped by domain. Each function calls one of the internal HTTP primitives and returns a typed response.\n\n#### HTTP Primitives\n\nSix internal functions handle all network communication:\n\n| Function | Purpose |\n|----------|---------|\n| `get(path)` | GET request, parses JSON response |\n| `getText(path)` | GET request, returns raw text (used for metrics, file content) |\n| `post(path, body)` | POST with JSON body |\n| `put(path, body)` | PUT with JSON body |\n| `patch(path, body)` | PATCH with JSON body |\n| `del(path)` | DELETE request |\n\nAll primitives call `buildHeaders()` to attach authentication. Error responses are routed through `parseError()`, which wraps them in `ApiError` (from `lib/http/errors.ts`) with the status code and response body.\n\n#### Authentication Flow\n\n```\nauthHeader() ŌåÆ getStoredApiKey() ŌåÆ localStorage.getItem(\"api_key\")\n                                    localStorage.getItem(\"auth_token\")\n```\n\n- `setApiKey(key)` ŌĆö persists credentials and configures the header globally\n- `clearApiKey()` ŌĆö removes stored credentials\n- `verifyStoredAuth()` ŌĆö validates existing credentials against the backend\n- `dashboardLogin(credentials)` ŌĆö authenticates and stores the resulting key\n\nThe API key or token is attached as an `Authorization: Bearer ...` header on every request.\n\n#### Error Handling\n\n`parseError(response)` reads the response body, extracts an error message, and throws `ApiError`. This class carries `status` and `body` so callers can inspect the HTTP status code and structured error details.\n\n### `lib/queries/` ŌĆö Data Fetching Hooks\n\nReact Query-based hooks for read operations. Each file corresponds to a domain:\n\n| File | Covers |\n|------|--------|\n| `workflows.ts` | Workflow templates, listing, and canvas data |\n| `channels.ts` | Channel adapters, comms events |\n| `mcp.ts` | MCP server health and status |\n| `hands.ts` | Hand definitions, instances, stats |\n| `memory.ts` | Proactive memory stats and listing |\n| `terminal.ts` | Terminal health checks |\n| `sessions-stream.ts` | SSE-based session streaming |\n\nThese hooks handle caching, refetching, and stale- data management through React Query's `useQuery` and `useInfiniteQuery`.\n\n### `lib/mutations/` ŌĆö Write Operation Hooks\n\nReact Query mutation hooks for create/update/delete operations:\n\n| File | Example Hooks |\n|------|---------------|\n| `agents.ts` | `useCreateAgentSession`, `useSpawnAgent`, `useKillAgent` |\n| `approvals.ts` | `useApproveApproval`, `useRejectApproval` |\n| `workflows.ts` | `useCreateWorkflow`, `useUpdateWorkflow`, `useRunWorkflow` |\n| `goals.ts` | `useCreateGoal`, `useUpdateGoal` |\n| `users.ts` | `useCreateUser` |\n\nMutations call API client functions and typically invalidate related queries on success to keep the UI consistent.\n\n### `src/pages/` ŌĆö Page Components\n\nFull-page views mounted by the router. Each page component orchestrates queries, mutations, and UI components:\n\n| Page | Purpose |\n|------|---------|\n| `ChatPage` | Agent chat interface with SSE streaming |\n| `AgentsPage` | Agent listing, spawning, bulk operations |\n| `WorkflowsPage` | Workflow list and navigation to canvas |\n| `CanvasPage` | Visual workflow editor |\n| `ApprovalsPage` | Pending approval queue |\n| `GoalsPage` | Goal management |\n| `UsersPage` | User administration |\n| `ConfigPage` | Kernel configuration editor |\n| `McpServersPage` | MCP server management |\n| `TerminalPage` | Interactive terminal sessions |\n\n### `src/lib/` ŌĆö Shared Utilities\n\n| Module | Purpose |\n|--------|---------|\n| `chat.ts` | Chat message normalization (`normalizeRole`, `asText`) |\n| `chatPicker.ts` | Agent/session picker grouping logic (`groupedPicker`) |\n| `csvParser.ts` | CSV user import parsing (`parseUsersCsv`) |\n| `i18n.ts` | Internationalization setup |\n| `drawerStore.ts` | Zustand store for drawer/sidebar state |\n\n## Data Flow: Typical Page Interaction\n\nThis example traces a user approving a request on the ApprovalsPage through the full stack:\n\n```mermaid\nsequenceDiagram\n    participant Page as ApprovalsPage\n    participant Mut as useApproveApproval\n    participant API as approveApproval()\n    participant HTTP as post()\n    participant Auth as authHeader()\n    participant LS as localStorage\n    participant BE as Backend API\n\n    Page->>Mut: mutate(approvalId)\n    Mut->>API: approveApproval(id)\n    API->>HTTP: post(\"/api/approvals/{id}/approve\")\n    HTTP->>Auth: authHeader()\n    Auth->>LS: getItem(\"api_key\")\n    LS-->>Auth: stored key\n    Auth-->>HTTP: Authorization header\n    HTTP->>BE: POST /api/approvals/{id}/approve\n    BE-->>HTTP: 200 OK\n    HTTP-->>API: parsed JSON\n    API-->>Mut: success\n    Mut->>Page: invalidate approvals query\n```\n\n## API Domain Coverage\n\nThe API client exposes functions organized across these domains:\n\n- **Agents** ŌĆö CRUD, spawning, cloning, mode changes, messaging (sync and SSE streaming), session management, file/workspace management, memory import/export, tool and skill assignments, decision traces\n- **Approvals** ŌĆö listing, approving, rejecting pending human-in-the-loop requests\n- **A2A (Agent-to-Agent)** ŌĆö internal agent listing, external agent discovery, task send/cancel/status\n- **Auth** ŌĆö OAuth2 login/callback, provider listing, token introspection, user info\n- **Budget** ŌĆö global and per-agent spend tracking and limits\n- **Channels** ŌĆö adapter listing, configuration, testing, WeChat/WhatsApp QR flows, hot-reload\n- **ClawHub / SkillHub** ŌĆö browsing, searching, skill detail, installation with security pipeline\n- **Comms** ŌĆö inter-agent messaging, task queueing, topology graph, event streaming\n- **Config** ŌĆö read/write/reload kernel config, schema introspection\n- **Cron / Schedules** ŌĆö job CRUD, enable/disable, manual trigger\n- **Extensions** ŌĆö install/uninstall catalog entries\n- **Hands** ŌĆö definition listing, activation/deactivation, dependency management, settings, browser state, pausing/resuming\n- **Health** ŌĆö liveness probe and detailed diagnostics\n- **Memory (Proactive)** ŌĆö semantic search, CRUD, consolidation, deduplication, per-agent stats, versioned history, import/export\n- **MCP Servers** ŌĆö CRUD, health, catalog, reconnect\n- **Models** ŌĆö listing, custom models, aliases, per-agent overrides\n- **Providers** ŌĆö listing with probe status, key management, URL config, testing, default selection\n- **Sessions** ŌĆö listing, cleanup, labeling, import/export, switching\n- **Workflows** ŌĆö CRUD, execution, run history, save-as-template\n\n## Real-Time Streaming\n\nThe frontend uses Server-Sent Events for live data in several areas:\n\n1. **Chat streaming** (`/api/agents/{id}/message/stream`) ŌĆö token-by-token response delivery\n2. **Log streaming** (`/api/logs/stream`) ŌĆö real-time audit log entries with level/text filtering, 15-second heartbeats, and backfill on connect\n3. **Comms events** (`/api/comms/events/stream`) ŌĆö inter-agent communication events polled every 500ms\n4. **Session streaming** (`lib/queries/sessions-stream.ts`) ŌĆö session lifecycle events with `addEventListener`/`removeEventListener` cleanup patterns\n\nAll SSE consumers follow the same lifecycle: connect on mount, process events via callbacks, clean up listeners on unmount.\n\n## Authentication and Authorization\n\nThe auth system supports multiple providers (listed via `/api/auth/providers`). Login redirects to an external identity provider (OAuth2). The callback exchanges an authorization code for credentials, which are stored in localStorage as either `api_key` or `auth_token`.\n\n`tryAutoReload` in the router checks for stored credentials on app load and attempts silent re-authentication. When credentials expire or are invalid, the error path calls `clearApiKey()` and redirects to login.\n\nFor providers like GitHub Copilot, a device-flow OAuth is available: `copilot_oauth_start` initiates the flow, returning a user code and verification URI, and `copilot_oauth_poll` checks for completion.\n\n## Contributing\n\n### Adding a New API Call\n\n1. Add or update the endpoint in the backend OpenAPI spec\n2. Regenerate `generated.ts` using the openapi-typescript tooling\n3. Add a named export function in `dashboard/src/api.ts` that calls the appropriate HTTP primitive\n4. Create a query hook in `lib/queries/` (for reads) or a mutation hook in `lib/mutations/` (for writes)\n5. Consume the hook from the relevant page component\n\n### Adding a New Page\n\n1. Create the component in `src/pages/`\n2. Add the route in `dashboard/src/router.tsx`\n3. Wire up queries and mutations from the hooks layer\n4. Follow the established cleanup pattern for any SSE connections (add listener on effect, remove on cleanup)\n\n### Testing Patterns\n\n- API client tests (`dashboard/src/api.test.ts`) mock `localStorage.getItem`/`setItem` and verify header construction, error parsing, and credential management\n- Query hook tests mock the API client functions and verify React Query behavior\n- Page component tests mock mutation hooks and verify user interaction flows","desktop-application":"# Desktop Application\n\n# LibreFang Desktop\n\nNative desktop application built on **Tauri 2.0** that wraps the LibreFang Agent OS. The app operates in one of two modes ŌĆö **local** (boots an embedded kernel and API server) or **remote** (thin client connecting to an external LibreFang instance). On mobile platforms (iOS/Android), only remote mode is available.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[main.rs<br/>CLI args] --> RUN[lib.rs run]\n    RUN --> MODE{StartupMode?}\n    MODE -->|Remote URL| REMOTE[WebView ŌåÆ remote server]\n    MODE -->|Local| BOOT[server.rs<br/>boot kernel + axum]\n    MODE -->|Connection Screen| CONN[connection.rs<br/>HTML connection UI]\n\n    BOOT --> STATE[Tauri managed state]\n    CONN -->|start_local IPC| BOOT\n    CONN -->|connect_remote IPC| REMOTE\n\n    STATE --> TRAY[tray.rs<br/>system tray]\n    STATE --> CMDS[commands.rs<br/>IPC handlers]\n    STATE --> UPDATER[updater.rs<br/>auto-update]\n    STATE --> SHORTCUTS[shortcuts.rs<br/>global hotkeys]\n    STATE --> EVENTS[forward_kernel_events<br/>native notifications]\n```\n\n## Startup Flow\n\nThe application resolves its connection mode from multiple sources, in priority order:\n\n1. **CLI `--server-url <URL>`** ŌåÆ immediately connect to remote server\n2. **CLI `--local`** ŌåÆ skip connection screen, boot local kernel (desktop only)\n3. **`LIBREFANG_SERVER_URL` env var** ŌåÆ connect to remote server\n4. **Saved preference** in `~/.librefang/desktop.toml` ŌåÆ replay last choice\n5. **Connection screen** ŌåÆ present UI for user to choose\n\nThe connection preference is serialized as:\n\n```toml\n# ~/.librefang/desktop.toml\n[connection]\nmode = \"remote\"          # or \"local\"\nserver_url = \"http://...\" # absent for local mode\n```\n\n## Managed State\n\nTauri managed state uses **interior mutability** (`RwLock`) so the runtime mode can change when the user switches servers via the connection screen or tray menu. All state types are registered once during app setup with initial values derived from the resolved startup mode.\n\n| Type | Contents | Desktop | Mobile |\n|------|----------|---------|--------|\n| `PortState` | `RwLock<Option<u16>>` ŌĆö local server port | Ō£ģ | Ō£ģ (always `None`) |\n| `KernelState` | `RwLock<Option<KernelInner>>` ŌĆö kernel instance + start time | Ō£ģ | Ō£ģ (always `None`) |\n| `ServerUrlState` | `RwLock<String>` ŌĆö URL the WebView points at | Ō£ģ | Ō£ģ |\n| `RemoteMode` | `RwLock<bool>` ŌĆö true when connected to remote | Ō£ģ | Ō£ģ |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` ŌĆö for shutdown | Ō£ģ | ŌØī |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the server started, enabling uptime reporting.\n\n## Embedded Server (`server.rs`)\n\nDesktop-only. Boots on the main thread (to guarantee port availability before window creation), then runs the axum server on a dedicated background thread with its own multi-threaded tokio runtime.\n\n**Lifecycle:**\n\n1. `LibreFangKernel::boot(None)` ŌĆö synchronously initializes the kernel\n2. `TcpListener::bind(\"127.0.0.1:0\")` ŌĆö claims a random free port on the main thread\n3. Background thread: creates tokio runtime ŌåÆ `kernel.start_background_agents()` ŌåÆ `spawn_approval_sweep_task()` ŌåÆ `axum::serve()` with graceful shutdown via `watch` channel\n4. Dashboard asset sync spawns in background during server startup\n\n**Shutdown** is triggered via `ServerHandle::shutdown()` (blocking) or `Drop` (fire-and-forget signal). An `AtomicBool` prevents double-shutdown. The kernel's `shutdown()` method is called during explicit shutdown.\n\n## Connection Screen (`connection.rs`)\n\nA self-contained HTML/CSS/JS page served through a **custom URI scheme** (`lfconnect://localhost/`) rather than `about:blank` + `document.write` ŌĆö the latter broke on WebKitGTK 2.50 (#3052). The page uses polling to wait for Tauri IPC availability (`window.__TAURI__.core.invoke`).\n\n**IPC commands exposed:**\n\n- **`test_connection(url)`** ŌĆö HTTP GET to `{url}/api/health` with 10-second timeout. Returns the JSON response or an error.\n- **`connect_remote(url, remember)`** ŌĆö Validates URL, health-checks the server, updates all managed state (clears `PortState`/`KernelState`, sets `ServerUrlState`/`RemoteMode`), optionally saves preference, navigates the WebView.\n- **`start_local(remember)`** (desktop only) ŌĆö Calls `start_server()` on a blocking thread, populates all managed state, stores the `ServerHandle`, starts event forwarding, optionally saves preference, navigates to `http://127.0.0.1:{port}`.\n\n## IPC Commands (`commands.rs`)\n\nAll commands return `Result<T, String>` for Tauri serialization. Desktop-only commands are gated with `#[cfg(not(any(target_os = \"ios\", target_os = \"android\")))]`.\n\n### Status & Introspection\n\n| Command | Returns |\n|---------|---------|\n| `get_port` | The local server port (`u16`) |\n| `get_status` | JSON: `{ status, port, agents, uptime_secs }` |\n| `get_agent_count` | Number of registered agents (`usize`) |\n\n### Agent & Skill Import\n\n- **`import_agent_toml`** ŌĆö Opens a native file picker filtered to `.toml`, parses the file as `AgentManifest`, copies it to `~/.librefang/workspaces/agents/{name}/agent.toml`, and calls `kernel.spawn_agent()`.\n- **`import_skill_file`** ŌĆö Opens a file picker for `.md/.toml/.py/.js/.wasm`, copies to `~/.librefang/skills/`, and calls `kernel.reload_skills()`.\n\n### System Operations\n\n- **`open_config_dir`** / **`open_logs_dir`** ŌĆö Creates the directory if needed and opens it in the OS file manager via the `open` crate.\n- **`get_autostart`** / **`set_autostart(enabled)`** ŌĆö Read/write login auto-start (desktop only).\n- **`uninstall_app`** ŌĆö Platform-specific uninstaller launch. Returns a hint string on Linux/system-package installs where elevation is needed.\n\n### Updates (desktop only)\n\n- **`check_for_updates`** ŌåÆ `UpdateInfo { available, version, body }`\n- **`install_update`** ŌĆö Downloads, installs, and restarts. Does not return `Ok` on success (the process exits).\n\n## Auto-Updater (`updater.rs`)\n\nDesktop-only. Two code paths:\n\n1. **Startup check** (`spawn_startup_check`): 10-second delay after launch, pre-flights the update manifest endpoint via HEAD request (avoids noisy 404 errors when `latest.json` isn't published), then silently installs if available. Shows a notification before restarting.\n\n2. **On-demand** (tray menu or IPC): Returns structured `UpdateInfo` so the UI can prompt the user, then `download_and_install_update` performs the actual install + restart.\n\nThe `manifest_reachable()` pre-flight reads the updater endpoint URL from `tauri.conf.json` plugins config and issues a 5-second HEAD request. This prevents log spam when the release pipeline hasn't published a manifest yet.\n\n## System Tray (`tray.rs`)\n\nDesktop-only. Provides:\n\n- **Show Window** / **Open in Browser** / **Change Server...**\n- **Status display** ŌĆö shows \"Remote (url)\" or \"Running (uptime)\" plus agent count\n- **Launch at Login** toggle ŌĆö checkbox bound to `tauri-plugin-autostart`\n- **Check for Updates** ŌĆö triggers update check + notification\n- **Open Config Directory**\n- **Quit**\n\nThe \"Change Server\" action shuts down any running local server, clears kernel state, and re-renders the connection screen HTML into the existing WebView.\n\n## Global Shortcuts (`shortcuts.rs`)\n\nDesktop-only. Three system-wide hotkeys registered via `tauri-plugin-global-shortcut`:\n\n| Shortcut | Action |\n|----------|--------|\n| `Ctrl+Shift+O` | Show/focus window |\n| `Ctrl+Shift+N` | Show window + emit `navigate(\"agents\")` |\n| `Ctrl+Shift+C` | Show window + emit `navigate(\"chat\")` |\n\nRegistration failure is non-fatal ŌĆö the app continues without shortcuts.\n\n## Native Notifications\n\n`forward_kernel_events` subscribes to the kernel event bus and surfaces critical events as OS notifications:\n\n- **Agent crashed** ŌĆö agent ID + error message\n- **Kernel stopping** ŌĆö shutdown notification\n- **Quota enforced** ŌĆö agent spending hit its limit\n\nUses `tauri-plugin-notification`. Lagged broadcast messages are logged but don't crash the listener.\n\n## Window Behavior\n\nOn desktop, closing the window **hides to tray** instead of quitting (`CloseRequested` ŌåÆ `hide()` + `api.prevent_close()`). The app fully exits only through the tray \"Quit\" item or `app.exit(0)`.\n\nSingle-instance enforcement (desktop) focuses the existing window when a second launch is attempted.\n\n## Platform Differences\n\n| Feature | Desktop (Win/macOS/Linux) | Mobile (iOS/Android) |\n|---------|--------------------------|----------------------|\n| Embedded server | Ō£ģ | ŌØī |\n| System tray | Ō£ģ | ŌØī |\n| Global shortcuts | Ō£ģ | ŌØī |\n| Auto-updater | Ō£ģ | ŌØī (stores handle updates) |\n| Shell plugin | Ō£ģ | ŌØī |\n| Single instance | Ō£ģ | ŌØī |\n| Autostart | Ō£ģ | ŌØī |\n| Connection screen | Remote + local | Remote only |\n| Uninstall | Platform-specific | Hint to use app store |\n\n## CLI Arguments\n\n```\nlibrefang-desktop [OPTIONS]\n\nOptions:\n  --server-url <URL>   Connect to a remote LibreFang server\n  --local              Start local server, skip connection screen\n  -h, --help           Print help\n```\n\nEnvironment loading (`~/.librefang/.env`) happens in `main()` before any async runtime is spawned, because `std::env::set_var` is undefined safe once other threads exist.","extensions-mcp-librefang-extensions-src":"# Extensions & MCP ŌĆö librefang-extensions-src\n\n# librefang-extensions\n\nMCP server lifecycle management: catalog templates, encrypted credential storage, OAuth2 PKCE flows, health monitoring, and installation transforms.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Disk\"\n        CT[\"~/.librefang/mcp/catalog/*.toml\"]\n        VE[\"~/.librefang/vault.enc\"]\n        EF[\"~/.librefang/.env\"]\n        CF[\"~/.librefang/config.toml\"]\n    end\n\n    subgraph \"librefang-extensions\"\n        MC[\"McpCatalog<br/>(read-only templates)\"]\n        CV[\"CredentialVault<br/>(AES-256-GCM)\"]\n        CR[\"CredentialResolver<br/>(priority chain)\"]\n        HM[\"HealthMonitor<br/>(DashMap + backoff)\"]\n        INS[\"installer<br/>(pure transform)\"]\n        OA[\"oauth<br/>(PKCE flow)\"]\n        DE[\"dotenv<br/>(process env loader)\"]\n    end\n\n    CT -->|load| MC\n    VE -->|unlock| CV\n    CV --> CR\n    EF --> CR\n    MC --> INS\n    CR --> INS\n    INS -->|McpServerConfigEntry| CF\n    OA -->|tokens| CV\n```\n\n## Module Overview\n\n| Module | Purpose |\n|---|---|\n| [`lib.rs`](#core-types) | Shared types: `McpCatalogEntry`, `McpStatus`, `McpCategory`, error enums |\n| [`catalog`](#catalog) | In-memory index of MCP server templates from `~/.librefang/mcp/catalog/` |\n| [`vault`](#credential-vault) | AES-256-GCM encrypted secret storage at `~/.librefang/vault.enc` |\n| [`credentials`](#credential-resolution) | Priority-chain resolver: vault ŌåÆ dotenv ŌåÆ env ŌåÆ interactive prompt |\n| [`dotenv`](#dotenv-loader) | Boot-time injection of vault secrets + `.env` files into `std::env` |\n| [`health`](#health-monitor) | Per-server health tracking with exponential-backoff auto-reconnect |\n| [`installer`](#installer) | Pure function: catalog entry + credentials ŌåÆ `McpServerConfigEntry` |\n| [`oauth`](#oauth2-pkce) | Browser-based OAuth2 PKCE flows with localhost callback |\n| [`http_client`](#http-client) | Shared `reqwest::Client` with native + bundled CA roots |\n\n---\n\n## Core Types\n\nDefined in `lib.rs`. These are the data structures shared across the crate and consumed by `librefang-kernel`, `librefang-api`, and the CLI.\n\n### `McpCatalogEntry`\n\nA bundled MCP server template. Lives on disk as TOML under `~/.librefang/mcp/catalog/`.\n\nKey fields:\n- **`id`** ŌĆö unique identifier (e.g. `\"github\"`)\n- **`transport`** ŌĆö `McpCatalogTransport` enum (`Stdio`, `Sse`, `Http`)\n- **`required_env`** ŌĆö list of `McpCatalogRequiredEnv` describing needed credentials\n- **`oauth`** ŌĆö optional `OAuthTemplate` for browser-based auth flows\n- **`i18n`** ŌĆö `HashMap<String, McpCatalogI18n>` keyed by BCP-47 tag, with optional overrides for `name`, `description`, and `setup_instructions`\n\nTwo valid on-disk layouts:\n1. `<id>.toml` ŌĆö flat file, id derived from filename\n2. `<id>/MCP.toml` ŌĆö directory-backed for multi-file MCP packages\n\n### `McpStatus`\n\n```rust\npub enum McpStatus {\n    Ready,           // Configured and running\n    Setup,           // Configured but credentials missing\n    Available,       // Catalog entry only, not configured\n    Error(String),   // MCP server errored\n    Disabled,        // User-disabled\n}\n```\n\n### `ExtensionError`\n\nUnified error type covering vault, OAuth, IO, catalog lookup, and health check failures. All fallible operations in this crate return `ExtensionResult<T> = Result<T, ExtensionError>`.\n\n---\n\n## Catalog\n\n`McpCatalog` is an in-memory, read-only view of all MCP server templates cached at `~/.librefang/mcp/catalog/`. Templates are refreshed from the upstream `librefang-registry` by `librefang_runtime::registry_sync`.\n\n### Loading\n\n```rust\nlet mut catalog = McpCatalog::new(&home_dir);\nlet count = catalog.load(&home_dir);\n```\n\n`load` performs a full reload ŌĆö it clears the internal `HashMap` before scanning the directory, so deleted/renamed files don't linger. Two disk layouts are supported:\n\n- **Flat:** `<id>.toml` ŌåÆ id from filename minus extension\n- **Directory:** `<id>/MCP.toml` ŌåÆ id from directory name\n\nMalformed TOML files are warned and skipped (never panic).\n\n### Querying\n\n| Method | Returns |\n|---|---|\n| `get(id)` | `Option<&McpCatalogEntry>` |\n| `list()` | All entries sorted by id |\n| `list_by_category(&McpCategory)` | Filtered entries |\n| `search(query)` | Matches against id, name, description, tags (case-insensitive) |\n\nThe catalog is purely read-only. User-installed MCP servers live in `config.toml` under `[[mcp_servers]]` with an optional `template_id` pointing back into the catalog.\n\n---\n\n## Credential Vault\n\nAES-256-GCM encrypted file at `~/.librefang/vault.enc`. Master key is sourced from (in order):\n\n1. **OS keyring** ŌĆö Windows Credential Manager, macOS Keychain, or Linux Secret Service (libsecret). Only available on glibc Linux, macOS, and Windows targets.\n2. **File-based fallback** ŌĆö AES-256-GCM wrapped key at `$LOCAL_DATA/librefang/.keyring`, derived from machine fingerprint via Argon2id. Used when OS keyring is unavailable (headless Linux, musl targets).\n3. **Environment variable** ŌĆö `LIBREFANG_VAULT_KEY` (base64-encoded 32-byte key), for CI/headless.\n\n### File Format\n\nOn disk, the vault starts with a 4-byte magic header `OFV1`, followed by a JSON `VaultFile`:\n\n```json\n{\n  \"version\": 1,\n  \"salt\": \"<base64>\",\n  \"nonce\": \"<base64>\",\n  \"ciphertext\": \"<base64>\"\n}\n```\n\nEncryption pipeline: `master_key` + `salt` ŌåÆ Argon2id ŌåÆ derived key ŌåÆ AES-256-GCM encrypt the serialized `VaultEntries` JSON.\n\nLegacy vault files without the `OFV1` header (raw JSON starting with `{`) are still loadable for backwards compatibility.\n\n### Key Operations\n\n```rust\nlet mut vault = CredentialVault::new(path);\n\n// Initialize new vault\nvault.init()?;              // generates random key, stores in keyring\nvault.init_with_key(key)?;  // explicit key (for testing)\n\n// Unlock before use\nvault.unlock()?;            // resolves key from keyring ŌåÆ env\nvault.unlock_with_key(key)?; // explicit key\n\n// Read/write\nvault.set(\"API_KEY\".into(), Zeroizing::new(\"secret\".into()))?;\nlet val = vault.get(\"API_KEY\");  // Option<Zeroizing<String>>\nvault.remove(\"API_KEY\")?;\nlet keys = vault.list_keys();    // Vec<&str>\n```\n\n### Keyring Migration\n\n`load_keyring_key` detects legacy v1 XOR-obfuscated keyring files and automatically migrates them to v2 AES-256-GCM wrapped format on first successful load.\n\n### Memory Safety\n\nAll secret values use `Zeroizing<String>` or `Zeroizing<[u8; 32]>` from the `zeroize` crate. `CredentialVault::drop` explicitly clears the entries map and cached key.\n\n---\n\n## Credential Resolution\n\n`CredentialResolver` tries multiple sources in priority order:\n\n```\n1. CredentialVault (if unlocked)\n2. ~/.librefang/.env file\n3. Process environment variable\n4. Interactive prompt (CLI only, when enabled)\n```\n\n### Usage\n\n```rust\nlet resolver = CredentialResolver::new(\n    Some(vault),\n    Some(Path::new(\"~/.librefang/.env\")),\n).with_interactive(true);\n\n// Resolve a single key\nlet api_key = resolver.resolve(\"GITHUB_TOKEN\");\n\n// Check availability without prompting\nif resolver.has_credential(\"GITHUB_TOKEN\") { ... }\n\n// Batch resolve\nlet creds = resolver.resolve_all(&[\"KEY_A\", \"KEY_B\", \"KEY_C\"]);\n\n// Find what's missing\nlet missing = resolver.missing_credentials(&[\"KEY_A\", \"KEY_B\"]);\n```\n\n`store_in_vault` persists a new credential through the vault. `clear_dotenv_cache` removes a key from the in-memory dotenv snapshot ŌĆö call this when the dashboard deletes a key so the resolver doesn't return stale values.\n\nThe `.env` loader strips comments, handles `KEY=VALUE` with optional single or double quotes, and skips blank lines.\n\n---\n\n## Dotenv Loader\n\n`dotenv::load_dotenv()` is the single entry point called from the synchronous `main()` of every binary (CLI, desktop, kernel) **before** spawning any tokio runtime. This is critical because `std::env::set_var` is undefined behavior in Rust 1.80+ once other threads exist.\n\nIt uses a `Once` guard so repeated calls are no-ops.\n\n### Priority (highest first)\n\n1. System environment variables (already present) ŌĆö **never overridden**\n2. Credential vault (`vault.enc`) ŌĆö loaded and injected if unlockable\n3. `~/.librefang/.env`\n4. `~/.librefang/secrets.env`\n\nThe never-override invariant is enforced: `load_env_file` only calls `std::env::set_var` when `std::env::var(&key).is_err()`.\n\n### Programmatic Key Management\n\n| Function | Description |\n|---|---|\n| `save_env_key(key, value)` | Upsert into `.env`, sets in process env, creates file with 0600 perms on Unix |\n| `remove_env_key(key)` | Remove from `.env` and process env |\n| `list_env_keys()` | Key names only (no values) |\n| `env_file_exists()` | Check if `.env` is present |\n\n---\n\n## Health Monitor\n\n`HealthMonitor` tracks the status of configured MCP servers using a `DashMap<String, McpHealth>` for lock-free concurrent access from background health-check tasks.\n\n### `McpHealth` Record\n\n| Field | Purpose |\n|---|---|\n| `status` | Current `McpStatus` |\n| `tool_count` | Number of tools the server exposes |\n| `last_ok` | Timestamp of last successful check |\n| `last_error` | Most recent error message |\n| `consecutive_failures` | Running count, reset on success |\n| `reconnect_attempts` | Incremented by `mark_reconnecting` |\n| `connected_since` | Set on first `mark_ok`, cleared on error |\n\n### Reporting\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig::default());\nmonitor.register(\"github\");\n\n// From health-check task:\nmonitor.report_ok(\"github\", 12);           // 12 tools available\nmonitor.report_error(\"github\", \"refused\");  // connection failed\n\n// Check reconnect eligibility\nif monitor.should_reconnect(\"github\") {\n    monitor.mark_reconnecting(\"github\");\n    // attempt reconnect...\n}\n```\n\n### Auto-Reconnect Backoff\n\nExponential backoff: 5s ŌåÆ 10s ŌåÆ 20s ŌåÆ 40s ŌåÆ ... ŌåÆ capped at `max_backoff_secs` (default 300s). Maximum attempts configurable via `max_reconnect_attempts` (default 10).\n\n```rust\nlet duration = monitor.backoff_duration(attempt_number);\n```\n\n`should_reconnect` returns `true` only when: auto-reconnect is enabled, status is `Error`, and attempt count hasn't been exhausted.\n\n---\n\n## Installer\n\nPure functions that transform a catalog entry into a `McpServerConfigEntry` suitable for persisting into `config.toml`. No side effects ŌĆö callers (API routes, CLI commands) decide when to write the result.\n\n### `install_integration`\n\n```rust\nlet result = install_integration(\n    &catalog,\n    &mut resolver,\n    \"github\",\n    &provided_keys,   // HashMap<String, String> from user input\n)?;\n```\n\nSteps:\n1. Look up the catalog template by id (returns `ExtensionError::NotFound` if missing)\n2. Store provided credentials in the vault (best effort ŌĆö warns on failure)\n3. Check which required env vars are still missing\n4. Build `McpServerConfigEntry` via `catalog_entry_to_mcp_server`\n5. Return `InstallResult` with status, missing credentials, and user-facing message\n\nStatus is `Ready` if all required credentials are present, `Setup` otherwise.\n\n### `catalog_entry_to_mcp_server`\n\nMaps `McpCatalogTransport` ŌåÆ `McpTransportEntry`, copies required env var names, and sets `template_id` so the kernel/dashboard can trace back to the catalog entry. OAuth templates are also converted if present.\n\n### Scaffolding\n\n- `scaffold_integration(dir)` ŌĆö generates a template `mcp.toml` for a custom MCP server\n- `scaffold_skill(dir)` ŌĆö generates `skill.toml` + `SKILL.md` for a custom skill\n\n---\n\n## OAuth2 PKCE\n\nBrowser-based OAuth2 Authorization Code flow with PKCE (Proof Key for Code Exchange) for Google, GitHub, Microsoft, and Slack. No client secret required.\n\n### `run_pkce_flow`\n\n```rust\nlet tokens: OAuthTokens = run_pkce_flow(&oauth_template, &client_id).await?;\n```\n\nFlow:\n1. Generate PKCE verifier + S256 challenge, random state parameter\n2. Bind a temporary localhost TCP listener on a random port\n3. Open the user's browser to the authorization URL (falls back to printing the URL)\n4. Serve an axum callback handler at `/callback` that validates `state` and extracts the `code`\n5. Exchange the authorization code for tokens via POST to the token endpoint\n6. Return `OAuthTokens` (includes `access_token`, `refresh_token`, `expires_in`, `scope`)\n\nThe callback server has a 5-minute timeout. Success and error pages are served as HTML to the browser.\n\n### Client ID Resolution\n\n`resolve_client_ids(config)` merges defaults with per-provider overrides from `OAuthConfig`. Default IDs are placeholders ŌĆö production deployments should configure real IDs.\n\n---\n\n## HTTP Client\n\nShared `reqwest::Client` builder that handles environments with non-standard CA certificates:\n\n```rust\nlet client = new_client();  // reqwest::Client with native + bundled roots\n```\n\nBuilds a `rustls` client config with:\n1. Native system certificates via `rustls_native_certs`\n2. Falls back to Mozilla's `webpki_roots` bundled certificates if native loading returns nothing\n\n---\n\n## Integration with the Rest of the Codebase\n\n**Called by `librefang-runtime`:** `registry_sync` refreshes the catalog files on disk that `McpCatalog::load` reads. The plugin manager, model catalog, and Python runtime all use `vault::exists` for path checks.\n\n**Called by `librefang-kernel`:** The kernel's `mcp_oauth_provider` calls `vault_get` ŌåÆ `CredentialVault::unlock` ŌåÆ `resolve_master_key` ŌåÆ `load_keyring_key` ŌåÆ `machine_fingerprint` during TOTP setup/confirm/revoke flows and dashboard session validation.\n\n**Called by `librefang-api`:** The API server calls `resolve_dashboard_credential` which chains through vault unlock for session token validation.\n\n**Called by CLI/desktop main():** `dotenv::load_dotenv()` must be called from synchronous `main()` before any async runtime starts, to safely inject secrets into the process environment.","extensions-mcp-librefang-runtime-mcp-src":"# Extensions & MCP ŌĆö librefang-runtime-mcp-src\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for connecting librefang agents to external tool servers. Handles connection establishment, tool discovery, outbound argument taint scanning, and tool invocation across four transport strategies.\n\nAll MCP tools surfaced to the agent are namespaced as `mcp_{server}_{tool}` to prevent collisions between servers and built-in tools.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TR[tool_runner] -->|is_mcp_tool / call_tool| MC[McpConnection]\n    TR -->|resolve_mcp_server_from_known| NS[Tool Namespacing]\n    MC -->|taint scan| TS[Taint Scanner]\n    MC --> STIO[Stdio transport]\n    MC --> SSE[SSE transport]\n    MC --> HTTP[Streamable HTTP transport]\n    MC --> HCOMP[HttpCompat transport]\n    STIO -->|rmcp SDK| PROC[Subprocess]\n    SSE -->|JSON-RPC POST| REMOTE[Remote SSE Server]\n    HTTP -->|rmcp SDK| REMOTE2[Streamable HTTP Server]\n    HCOMP -->|plain HTTP| API[HTTP/JSON Backend]\n    TS -->|detect_outbound_text_violation| TAINT[librefang-types::taint]\n    HTTP -->|401 ŌåÆ OAUTH| OA[mcp_oauth module]\n```\n\n## Connection Lifecycle\n\n`McpConnection::connect(config)` orchestrates the full handshake:\n\n1. **Transport selection** ŌĆö dispatches on `McpTransport` variant\n2. **SSRF check** ŌĆö `check_ssrf()` rejects URLs targeting cloud metadata endpoints (`169.254.169.254`, `metadata.google`)\n3. **Handshake** ŌĆö Stdio/HTTP transports use the rmcp SDK's MCP `initialize` exchange; SSE sends a manual JSON-RPC `initialize` + `notifications/initialized`\n4. **Tool discovery** ŌĆö `tools/list` via rmcp or manual JSON-RPC; HttpCompat uses static declarations from config\n5. **Registration** ŌĆö each discovered tool is registered with a namespaced name (`mcp_{server}_{tool}`) and prefixed description (`[MCP:{server}] ŌĆ”`)\n6. **Annotation translation** ŌĆö MCP `readOnlyHint`/`destructiveHint` annotations are injected as `metadata.tool_class` in the schema for the runtime tool classifier\n\n## Transport Types\n\n### Stdio\n\nSpawns a subprocess communicating MCP over stdin/stdout via the rmcp SDK. Security controls:\n\n- **Shell blocking** ŌĆö `bash`, `sh`, `powershell`, etc. are rejected; operators must specify a concrete runtime (`npx`, `node`, `python`)\n- **Path traversal rejection** ŌĆö commands containing `..` are rejected\n- **Environment sandboxing** ŌĆö the subprocess does **not** inherit the parent environment. Only `SAFE_ENV_VARS` (PATH, HOME, language/locale vars, runtime-specific paths for Node/Python/Rust/Ruby/Go, Windows essentials) plus explicitly declared `env` entries are passed through\n- **Windows adaptation** ŌĆö `.cmd` variants are auto-detected for npm/npx\n- **Variable expansion** ŌĆö `$VAR`/`${VAR}` references in args are expanded from the process environment so templates can reference `$HOME` without `sh -c`\n- **Roots capability** ŌĆö when `roots` directories are configured, a `RootsClientHandler` advertises them during the MCP handshake (file:// URIs, percent-encoded)\n\n### SSE (Server-Sent Events)\n\nLegacy HTTP POST with JSON-RPC 2.0 for backward compatibility. Bidirectional communication is not possible, so:\n\n- Roots capability is never declared (server cannot send `roots/list` back)\n- `sse_send_request` / `sse_send_notification` manage an incrementing JSON-RPC `id` counter\n- Custom headers from `config.headers` are sent with every request\n\n### Streamable HTTP\n\nMCP 2025-03-26+ transport using rmcp's `StreamableHttpClientTransport`. Handles:\n\n- Accept header negotiation (`application/json`, `text/event-stream`)\n- `Mcp-Session-Id` tracking\n- SSE stream parsing and content-type negotiation\n\nWhen a server returns 401, the connection attempts OAuth discovery:\n\n1. `extract_auth_header_from_error` pulls `WWW-Authenticate` from rmcp's `StreamableHttpError::AuthRequired`\n2. Falls back to substring matching on the error Display string if structured extraction fails\n3. Calls `mcp_oauth::discover_oauth_metadata` for three-tier resolution\n4. Returns `\"OAUTH_NEEDS_AUTH\"` error string to signal the API layer to drive PKCE via the UI\n\nRoots are only advertised for local URLs (determined by `is_local_url`, which uses proper `url::Url` host parsing to avoid false positives on attacker-controlled domains like `127.0.0.1.evil.com`).\n\n### HttpCompat\n\nBuilt-in adapter for plain HTTP/JSON backends that don't speak MCP. Tools are statically declared in config with:\n\n- `path` ŌĆö URL path template with `{param}` placeholders (percent-encoded on render)\n- `method` ŌĆö GET, POST, PUT, PATCH, DELETE\n- `request_mode` ŌĆö `JsonBody`, `Query`, or `None`\n- `response_mode` ŌĆö `Text` or `Json` (pretty-printed)\n- `headers` ŌĆö static values or `value_env` (resolved from process environment at call time)\n\n`validate_http_compat_config` enforces non-empty `base_url`, at least one tool, and that every header defines either `value` or `value_env`.\n\n## Tool Invocation\n\n`McpConnection::call_tool(name, arguments)` is the primary entry point called from `tool_runner::execute_tool_raw`:\n\n1. **Name resolution** ŌĆö the namespaced tool name is mapped back to the raw server-side name via `original_names` or `strip_mcp_prefix`\n2. **Taint scanning** ŌĆö if `config.taint_scanning` is enabled, the full argument tree is walked before sending\n3. **Dispatch** ŌĆö routes to the appropriate transport handler\n4. **Timeout** ŌĆö enforced via `tokio::time::timeout` using `config.timeout_secs`\n\nFor rmcp transports, the response is extracted from `CallToolResult.content` text nodes. The `is_error` flag on the result is checked ŌĆö if `true`, the output text is returned as `Err`.\n\n## Taint Scanning\n\nThe outbound taint scanner prevents credential and PII exfiltration through MCP tool calls. When an LLM is manipulated into smuggling secrets into arguments, this best-effort filter catches the payload before it reaches the out-of-process server.\n\n### How It Works\n\n`scan_mcp_arguments_for_taint_with_policy` walks every string leaf in the JSON argument tree against `TaintSink::mcp_tool_call()`:\n\n- **String values** ŌĆö checked via `detect_outbound_text_violation_rules_with_skip`\n- **Sensitive key names** ŌĆö object keys matching `MCP_SENSITIVE_KEY_NAMES` (authorization, api_key, password, secret, etc.) with non-empty string values are blocked regardless of value shape (catches `{\"Authorization\": \"Bearer sk-ŌĆ”\"}` which the text heuristic alone misses due to whitespace and scheme prefix)\n- **Non-string leaves** ŌĆö numbers, bools, null are skipped\n- **Depth cap** ŌĆö recursion stops at `MCP_TAINT_SCAN_MAX_DEPTH` (64) to prevent pathological payloads from blowing the stack\n\n### Policy Layers\n\nThree configuration layers control scanning behavior, from coarsest to finest:\n\n**1. Server-level kill switch** (`taint_scanning = false`)\n\nDisables the content-based heuristic entirely for a server. Sensitive key-name blocking remains active. Escape hatch for trusted local servers (browser automation, database adapters) whose results contain opaque session handles.\n\n**2. Tool-level kill switch** (`taint_policy.tools.{tool}.default = \"skip\"`)\n\nBypasses all scanning ŌĆö including sensitive key-name blocking ŌĆö for a specific tool. Used as a single-line override for noisy tools.\n\n**3. Per-path skip rules** (`taint_policy.tools.{tool}.paths`)\n\nIndividual taint rules can be disabled for specific JSON paths using a minimal JSONPath matcher:\n\n| Pattern | Matches |\n|---|---|\n| `$.a.b` | Exact nested property |\n| `$.a.*` | Any direct child of `$.a` |\n| `$.a[*]` | Any array element of `$.a` |\n| `$.*` | Any top-level property |\n\nKnown limitation: object keys containing `.` or `[` cannot be addressed precisely. The matcher fails closed (errs toward blocking) when this limitation is hit.\n\n**4. Named rule sets** (`taint_policy.tools.{tool}.rule_sets` + `[[taint_rules]]`)\n\nRules can be downgraded from `Block` to `Warn` or `Log` via named rule sets in the global `[[taint_rules]]` config. When multiple sets cover the same rule, the most permissive action wins: `Log > Warn > Block`.\n\nThe rule set registry is accessed via `TaintRuleSetsHandle` (`Arc<ArcSwap<Vec<NamedTaintRuleSet>>>`), enabling hot-reload: the kernel owns a single swap and clones it into every connected server. A `.load()` snapshot at scan start ensures stability for the entire argument-tree walk.\n\n### Multi-Rule Firing\n\nA single string value can trip multiple rules simultaneously (e.g., both `KeyValueSecret` and `PiiEmail` for `\"api_key=alice@example.com\"`). The scanner iterates **every** fired rule, not just the first ŌĆö a rule set that downgrades rule A must not silently mask an unauthorized rule B. The call is blocked as soon as any fired rule is not downgraded.\n\n### Error Safety\n\nViolation messages are carefully redacted ŌĆö they contain only the JSON path of the offending leaf, never the payload value. These messages flow back to the LLM as tool-call errors and to logs; echoing the secret would defeat the filter.\n\nUnknown rule set names trigger a one-shot `WARN` via `warn_unknown_rule_set_once` (per-process dedup) so operator typos don't sit silent in production.\n\n## Tool Namespacing\n\nAll MCP tools are prefixed to prevent collisions:\n\n- `format_mcp_tool_name(\"github\", \"create_issue\")` ŌåÆ `\"mcp_github_create_issue\"`\n- Server names are normalized: lowercase, hyphens ŌåÆ underscores (`\"my-server\"` ŌåÆ `\"mcp_my_server_...\"`)\n- Hyphens in tool names are preserved as underscores after normalization\n\nResolution functions:\n\n- `is_mcp_tool(name)` ŌĆö checks `mcp_` prefix\n- `extract_mcp_server(tool_name)` ŌĆö heuristic, first segment after `mcp_`; only reliable for single-word server names\n- `resolve_mcp_server_from_known(tool_name, server_names)` ŌĆö robust runtime dispatch; matches the longest prefix against known server names to handle multi-segment names like `\"another-mcp-server\"` ŌåÆ `\"mcp_another_mcp_server_...\"`\n\n## Configuration\n\n### McpServerConfig\n\n| Field | Type | Default | Description |\n|---|---|---|---|\n| `name` | `String` | required | Display name, used in namespacing |\n| `transport` | `McpTransport` | required | Stdio, Sse, Http, or HttpCompat |\n| `timeout_secs` | `u64` | 60 | Per-request timeout |\n| `env` | `Vec<String>` | `[]` | `\"KEY=VALUE\"` or legacy `\"KEY\"` (looked up from parent env) |\n| `headers` | `Vec<String>` | `[]` | `\"Header-Name: value\"` for SSE/HTTP |\n| `oauth_provider` | `Option<Arc<dyn McpOAuthProvider>>` | `None` | Runtime-only, `#[serde(skip)]` |\n| `oauth_config` | `Option<McpOAuthConfig>` | `None` | Discovery fallback from config.toml |\n| `taint_scanning` | `bool` | `true` | Server-level toggle |\n| `taint_policy` | `Option<McpTaintPolicy>` | `None` | Per-tool, per-path exemptions |\n| `taint_rule_sets` | `TaintRuleSetsHandle` | empty | Runtime-only, hot-reloadable |\n| `roots` | `Vec<String>` | `[]` | Runtime-only, filesystem roots for MCP Roots capability |\n\n### McpTransport Variants\n\n```rust\n// Subprocess via rmcp SDK\nStdio { command: String, args: Vec<String> }\n\n// Legacy HTTP POST / JSON-RPC\nSse { url: String }\n\n// MCP 2025-03-26+ Streamable HTTP\nHttp { url: String }\n\n// Plain HTTP/JSON adapter\nHttpCompat {\n    base_url: String,\n    headers: Vec<HttpCompatHeaderConfig>,\n    tools: Vec<HttpCompatToolConfig>,\n}\n```\n\n## Integration Points\n\n**Inbound callers:**\n\n- `tool_runner::execute_tool_raw` ŌĆö calls `is_mcp_tool()`, `resolve_mcp_server_from_known()`, and `McpConnection::call_tool()`\n- `routes::agents::get_agent_mcp_servers` and `tui::event::spawn_fetch_agent_mcp_servers` ŌĆö use `resolve_mcp_server_from_known()` to map tool names to servers\n- `routes::mcp_auth::auth_start` ŌĆö calls `mcp_oauth::discover_oauth_metadata()` for OAuth discovery\n- `kernel::mcp_oauth_provider::load_token` ŌĆö calls `mcp_oauth::store_tokens()` for token persistence\n\n**Outbound dependencies:**\n\n- `librefang-types` ŌĆö `ToolDefinition`, taint types (`TaintSink`, `TaintRuleId`), config types (`McpTaintPolicy`, `McpServerConfig` shapes)\n- `librefang-http` ŌĆö `proxied_client_builder()` for HTTP client construction\n- `rmcp` ŌĆö MCP protocol handling for Stdio and Streamable HTTP transports\n- `reqwest` ŌĆö raw HTTP for SSE and HttpCompat transports\n- `arc-swap` ŌĆö lock-free hot-reload of taint rule set registry","extensions-mcp-librefang-runtime-oauth-src":"# Extensions & MCP ŌĆö librefang-runtime-oauth-src\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication runtime for LibreFang. Provides browser-based and device-flow authentication for **ChatGPT (OpenAI)** and **GitHub Copilot**, producing bearer tokens consumed by LLM drivers and the CLI.\n\n## Module Layout\n\n```\nlibrefang-runtime-oauth/\nŌö£ŌöĆŌöĆ lib.rs                # Re-exports: chatgpt_oauth, copilot_oauth\nŌö£ŌöĆŌöĆ chatgpt_oauth.rs      # OpenAI Codex OAuth ŌĆö browser callback + device flow\nŌööŌöĆŌöĆ copilot_oauth.rs      # GitHub Copilot OAuth ŌĆö RFC 8628 device flow only\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"librefang-cli<br/>authenticate_chatgpt\"]\n    DRV[\"chatgpt driver<br/>refresh_token\"]\n    WEB[\"providers routes<br/>copilot_oauth_start/poll\"]\n\n    subgraph \"librefang-runtime-oauth\"\n        CG[\"chatgpt_oauth\"]\n        CO[\"copilot_oauth\"]\n    end\n\n    CLI --> CG\n    DRV --> CG\n    WEB --> CO\n\n    subgraph \"External\"\n        OPENAI[\"OpenAI Auth<br/>auth.openai.com\"]\n        GH[\"GitHub OAuth<br/>github.com\"]\n    end\n\n    CG --> OPENAI\n    CO --> GH\n```\n\n## Integration Points\n\n| Caller | Function Called | Purpose |\n|--------|----------------|---------|\n| `librefang-cli` ŌåÆ `authenticate_chatgpt` | `start_oauth_flow`, `run_oauth_callback_server`, `exchange_code_for_tokens`, `start_device_auth_flow`, `poll_device_auth_flow` | Full ChatGPT login flow (browser or device) |\n| `librefang-cli` ŌåÆ `persist_chatgpt_auth` | `fetch_best_codex_model` | Resolve the highest-priority Codex model after auth |\n| `chatgpt driver` ŌåÆ `refresh_token` | `refresh_access_token` | Silent token refresh during sessions |\n| `providers routes` ŌåÆ `copilot_oauth_start` | `start_device_flow` | Begin GitHub device authorization |\n| `providers routes` ŌåÆ `copilot_oauth_poll` | `poll_device_flow` | Poll GitHub for device auth completion |\n\nAll HTTP calls go through `librefang_http::proxied_client()` (or `proxied_client_builder()`) to respect system proxy settings.\n\n---\n\n## chatgpt_oauth ŌĆö OpenAI Codex OAuth\n\nProvides two mutually exclusive authentication paths:\n\n1. **Browser callback flow** ŌĆö Opens the user's browser to `auth.openai.com`, waits for a redirect to `localhost:1455/auth/callback`, and exchanges the authorization code for tokens.\n2. **Device auth flow** ŌĆö Headless-friendly alternative. Requests a one-time code, the user visits `auth.openai.com/codex/device` and enters it, and the app polls until completion. Falls back to browser flow if device auth is not enabled for the account.\n\nBoth flows use **PKCE (S256)** to protect the authorization code exchange.\n\n### Constants\n\n| Constant | Value | Notes |\n|----------|-------|-------|\n| `CHATGPT_BASE_URL` | `https://chatgpt.com/backend-api` | API base for OAuth-scoped requests (Responses API, not `/v1/chat/completions`) |\n| `CLIENT_ID` | `app_EMoamEEZ73f0CkXaXp7hrann` | OpenAI Codex CLI registered client |\n| `CALLBACK_BIND` | `127.0.0.1:1455` | Matches the registered redirect URI |\n| `AUTH_TIMEOUT_SECS` | 300 | Browser callback timeout (5 min) |\n| `DEVICE_AUTH_TIMEOUT_SECS` | 900 | Device flow polling timeout (15 min) |\n| `DEVICE_AUTH_URL` | `https://auth.openai.com/codex/device` | Verification page shown to users |\n| `DEVICE_AUTH_REDIRECT_URI` | `https://auth.openai.com/deviceauth/callback` | Redirect used in device flow token exchange |\n\n### Key Types\n\n#### `ChatGptAuthResult`\n\nResult of a completed OAuth flow. All sensitive fields use `Zeroizing<String>` for memory safety:\n\n```rust\npub struct ChatGptAuthResult {\n    pub access_token: Zeroizing<String>,\n    pub refresh_token: Option<Zeroizing<String>>,\n    pub expires_in: Option<u64>,\n}\n```\n\n#### `DeviceAuthPrompt`\n\nDetails returned by `start_device_auth_flow()` that must be displayed to the user:\n\n```rust\npub struct DeviceAuthPrompt {\n    pub device_auth_id: String,   // Server-issued identifier for polling\n    pub user_code: String,        // One-time code the user types at DEVICE_AUTH_URL\n    pub interval_secs: u64,       // Recommended poll interval (defaults to 5s)\n}\n```\n\n#### `DeviceAuthFlowError`\n\nDistinguishes between recoverable and fatal device auth failures:\n\n- **`BrowserFallback { message }`** ŌĆö Device auth is not enabled for the account (HTTP 404 from the usercode endpoint). The caller should fall back to the browser flow.\n- **`Fatal(String)`** ŌĆö Any other failure that should be surfaced to the user without silent retry.\n\n#### `PkceChallenge`\n\nPKCE verifier/challenge pair:\n\n```rust\npub struct PkceChallenge {\n    pub verifier: String,    // 64 random bytes, base64url-encoded (86 chars)\n    pub challenge: String,   // SHA-256 of verifier, base64url-encoded\n}\n```\n\n### Public Functions\n\n#### PKCE and URL helpers\n\n| Function | Returns | Description |\n|----------|---------|-------------|\n| `generate_pkce()` | `PkceChallenge` | Generates a random PKCE S256 pair |\n| `create_state()` | `String` | 16 random bytes hex-encoded (32 chars), CSRF protection |\n| `build_authorization_url(port, code_challenge, state)` | `String` | Full authorization URL with all query parameters |\n| `chatgpt_session_available()` | `bool` | Checks if `CHATGPT_SESSION_TOKEN` env var is set and non-empty |\n\n#### Browser callback flow\n\n```\nstart_oauth_flow()          ŌåÆ (auth_url, port, pkce_verifier, state)\n     Ōåō  open browser\nrun_oauth_callback_server() ŌåÆ authorization_code\n     Ōåō\nexchange_code_for_tokens()  ŌåÆ ChatGptAuthResult\n```\n\n**`start_oauth_flow()`** ŌĆö Binds port 1455 temporarily to confirm availability, generates PKCE and state, and returns the authorization URL along with the PKCE verifier and state for later validation. The listener is dropped immediately so the async callback server can re-bind.\n\n**`run_oauth_callback_server(port, expected_state)`** ŌĆö Spawns a tokio TCP server that:\n1. Accepts connections on `127.0.0.1:{port}`\n2. Parses `GET /auth/callback?code=...&state=...`\n3. Validates the `state` parameter against `expected_state` (CSRF check)\n4. Sends the authorization code through a oneshot channel\n5. Serves a success or error HTML page to the browser\n6. Times out after 5 minutes\n\n**`exchange_code_for_tokens(code, code_verifier, port)`** ŌĆö Posts to the OpenAI token endpoint with the authorization code, PKCE verifier, and the browser redirect URI (`http://localhost:{port}/auth/callback`). Returns `ChatGptAuthResult`.\n\n#### Device auth flow\n\n```\nstart_device_auth_flow()    ŌåÆ DeviceAuthPrompt  (or DeviceAuthFlowError::BrowserFallback)\n     Ōåō  user visits DEVICE_AUTH_URL, enters user_code\npoll_device_auth_flow()     ŌåÆ ChatGptAuthResult\n```\n\n**`start_device_auth_flow()`** ŌĆö POSTs to `auth.openai.com/api/accounts/deviceauth/usercode`. On HTTP 404, returns `DeviceAuthFlowError::BrowserFallback` (device auth not enabled). On success, parses the response into a `DeviceAuthPrompt`. The response supports both `user_code` and `usercode` field names via serde aliasing.\n\n**`poll_device_auth_flow(prompt)`** ŌĆö Polls `auth.openai.com/api/accounts/deviceauth/token` with the `device_auth_id` and `user_code`. Treats HTTP 403/404 as \"still pending\". On success, receives an `authorization_code` and `code_verifier` from the server, then calls `exchange_code_for_tokens_with_redirect_uri()` with `DEVICE_AUTH_REDIRECT_URI` to complete the exchange. Times out after 15 minutes.\n\n#### Token refresh\n\n**`refresh_access_token(refresh_token)`** ŌĆö Posts a `refresh_token` grant to the OpenAI token endpoint. Returns a fresh `ChatGptAuthResult` with new access and refresh tokens.\n\n#### Model resolution\n\n**`fetch_best_codex_model(access_token)`** ŌĆö Calls `GET {CHATGPT_BASE_URL}/codex/models?client_version={VERSION}` with the bearer token. Parses the response's `models` array, sorts by `priority` descending, and returns the highest-priority model slug. Falls back to `\"gpt-5.1-codex-mini\"` on any failure. This is not authentication per se but is called immediately after auth to determine which model to use.\n\n---\n\n## copilot_oauth ŌĆö GitHub Copilot Device Flow\n\nImplements OAuth 2.0 Device Authorization Grant (RFC 8628) using GitHub's endpoints. Uses the same public client ID as the VSCode Copilot extension (`Iv1.b507a08c87ecfe98`).\n\n### Key Types\n\n#### `DeviceCodeResponse`\n\nParsed response from the device code initiation:\n\n```rust\npub struct DeviceCodeResponse {\n    pub device_code: String,\n    pub user_code: String,\n    pub verification_uri: String,\n    pub expires_in: u64,\n    pub interval: u64,\n}\n```\n\n#### `DeviceFlowStatus`\n\nEnum representing the result of each polling attempt:\n\n| Variant | Meaning |\n|---------|---------|\n| `Pending` | User hasn't completed authorization yet |\n| `Complete { access_token }` | Success ŌĆö `Zeroizing<String>` bearer token |\n| `SlowDown { new_interval }` | Server requested longer poll interval |\n| `Expired` | Device code expired, must restart |\n| `AccessDenied` | User explicitly denied |\n| `Error(String)` | Unexpected error |\n\n### Public Functions\n\n**`start_device_flow()`** ŌĆö POSTs to `https://github.com/login/device/code` with the Copilot client ID and `read:user` scope. Returns a `DeviceCodeResponse` with the user code and verification URI.\n\n**`poll_device_flow(device_code)`** ŌĆö POSTs to `https://github.com/login/oauth/access_token`. GitHub returns 200 with an `error` field during pending states, so error handling checks the JSON body rather than HTTP status. Maps `authorization_pending`, `slow_down`, `expired_token`, and `access_denied` to their respective `DeviceFlowStatus` variants. On success, extracts and returns the access token wrapped in `Zeroizing<String>`.\n\n---\n\n## Security Considerations\n\n- **Zeroizing** ŌĆö All tokens (`access_token`, `refresh_token`) are wrapped in `Zeroizing<String>` so they are overwritten in memory when dropped.\n- **PKCE** ŌĆö The browser flow uses S256 code challenges, preventing authorization code interception.\n- **State parameter** ŌĆö The callback server validates the `state` query parameter to prevent CSRF attacks.\n- **No secrets in client** ŌĆö Both flows use public clients (no client secret). The Copilot client ID is the same one shipped in VSCode.\n\n## Error Handling Patterns\n\nBoth submodules use `Result<T, String>` for most public functions, with the exception of `DeviceAuthFlowError` in the ChatGPT device flow (which distinguishes `BrowserFallback` from `Fatal` errors) and `DeviceFlowStatus` in the Copilot flow (which encodes all possible states including errors as enum variants).\n\nThe caller in `librefang-cli::authenticate_chatgpt` handles `DeviceAuthFlowError::BrowserFallback` by transparently switching to the browser callback flow.","extensions-mcp-librefang-runtime-wasm-src":"# Extensions & MCP ŌĆö librefang-runtime-wasm-src\n\n# librefang-runtime-wasm\n\nWASM sandbox for secure execution of untrusted skills and plugins. Built on Wasmtime with deny-by-default capability gating, deterministic fuel metering, and wall-clock epoch interruption.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Caller (kernel / agent runtime)\"\n        K[kernel.spawn_agent]\n    end\n\n    K --> E[WasmSandbox.execute]\n    E --> SYNC[execute_sync - blocking thread]\n    SYNC --> COMPILE[Module::new]\n    COMPILE --> LINK[Linker + host functions]\n    LINK --> INST[Instantiate]\n    INST --> GUEST[\"guest execute()\"]\n\n    GUEST -->|\"import librefang.host_call\"| HC[host_call dispatch]\n    HC --> DISP[\"host_functions::dispatch\"]\n    DISP --> |\"capability check\"| CAP{granted?}\n    CAP -->|yes| HANDLER[handler fn]\n    CAP -->|no| ERR[\"{error: denied}\"]\n    HANDLER --> JSON[\"{ok: ...}\"]\n    ERR --> PACK[pack ptr+len ŌåÆ i64]\n    JSON --> PACK\n    PACK --> GUEST\n\n    GUEST -->|\"import librefang.host_log\"| LOG[host_log]\n```\n\n## Sandbox Engine ŌĆö `WasmSandbox`\n\n`WasmSandbox` wraps a Wasmtime `Engine` configured with fuel consumption and epoch interruption. Create **one** per kernel lifetime ŌĆö the engine is expensive to build but compiles and instantiates many modules.\n\n### Execution flow\n\n```\nexecute(wasm_bytes, input_json, config, kernel, agent_id)\n  ŌåÆ spawn_blocking\n    ŌåÆ execute_sync\n      1. Compile module (accepts .wasm binary or .wat text)\n      2. Create Store<GuestState> with capabilities and fuel budget\n      3. Start watchdog thread (epoch-based wall-clock timeout)\n      4. Register host function imports via Linker\n      5. Instantiate ŌĆö links imports, no WASI\n      6. Write input JSON into guest memory via guest's alloc export\n      7. Call guest's execute export\n      8. Read output JSON from guest memory\n      9. Join watchdog, report fuel consumed\n```\n\n### Resource limits\n\n| Mechanism | Controls | Default | Config field |\n|---|---|---|---|\n| **Fuel** | Total WASM instructions executed | 1,000,000 | `SandboxConfig::fuel_limit` |\n| **Epoch interruption** | Wall-clock seconds | 30 | `SandboxConfig::timeout_secs` |\n| **Memory** | Linear memory cap (reserved) | 16 MiB | `SandboxConfig::max_memory_bytes` |\n\nThe watchdog thread uses `park_timeout` + an `AtomicBool` done flag rather than a sleeping loop. It wakes immediately when the main thread finishes (via `Thread::unpark`) rather than waiting for a poll interval. An RAII guard (`WatchdogGuard`) signals the flag and joins the thread on every exit path ŌĆö normal return, trap, or panic ŌĆö so no OS threads leak.\n\n## Guest ABI\n\nWASM modules **must** export three items:\n\n| Export | Signature | Purpose |\n|---|---|---|\n| `memory` | `(memory ...)` | Linear memory for data exchange |\n| `alloc` | `(func (param i32) (result i32))` | Allocate N bytes, return pointer |\n| `execute` | `(func (param i32 i32) (result i64))` | Entry point: receives `(input_ptr, input_len)` |\n\nThe `execute` function returns a packed `i64`: `(result_ptr << 32) | result_len`. Both input and result are UTF-8 JSON bytes.\n\n### Minimal guest (WAT)\n\n```wat\n(module\n    (memory (export \"memory\") 1)\n    (global $bump (mut i32) (i32.const 1024))\n\n    (func (export \"alloc\") (param $size i32) (result i32)\n        (local $ptr i32)\n        (local.set $ptr (global.get $bump))\n        (global.set $bump (i32.add (global.get $bump) (local.get $size)))\n        (local.get $ptr)\n    )\n\n    (func (export \"execute\") (param $ptr i32) (param $len i32) (result i64)\n        (i64.or\n            (i64.shl (i64.extend_i32_u (local.get $ptr)) (i64.const 32))\n            (i64.extend_i32_u (local.get $len))))\n    )\n)\n```\n\n## Host ABI\n\nThe sandbox provides two imports under the `\"librefang\"` module:\n\n### `host_call(request_ptr: i32, reque
