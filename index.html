\n\n1. `OPENCLAW_STATE_DIR` environment variable\n2. Standard directories: `~/.openclaw`, `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`, `~/openclaw`, `~/.config/openclaw`\n3. Windows-specific paths: `%APPDATA%\\openclaw`, `%LOCALAPPDATA%\\openclaw`\n\nReturns `Some(path)` only if the directory exists and contains a recognizable config file or `sessions`/`memory` subdirectories.\n\n### `openclaw::scan_openclaw_workspace(path: &Path) -> ScanResult`\n\nRead-only scan that returns a `ScanResult` listing discovered agents, channels, skills, and whether memory data exists. Used by the CLI and TUI to preview what will be migrated before committing.\n\n## Configuration: `MigrateOptions`\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `source` | `MigrateSource` | Which framework to migrate from |\n| `source_dir` | `PathBuf` | Path to the source workspace root |\n| `target_dir` | `PathBuf` | Path to the LibreFang home directory |\n| `dry_run` | `bool` | If `true`, report what would happen without writing anything |\n\n`MigrateSource` variants: `OpenClaw`, `OpenFang`, `LangChain` (unsupported), `AutoGpt` (unsupported).\n\n## OpenClaw Migration\n\nOpenClaw has two configuration formats, both handled by `openclaw::migrate`:\n\n### Modern JSON5 format\n\nA single `openclaw.json` (or `clawdbot.json`, `moldbot.json`, `moltbot.json`) in the workspace root containing everything: global config, agents, channels, models, tools, cron, hooks, and skills.\n\n```\n~/.openclaw/\nŌö£ŌöĆŌöĆ openclaw.json          # JSON5 ŌĆö single unified config\nŌö£ŌöĆŌöĆ auth-profiles.json     # Credentials (not migrated)\nŌö£ŌöĆŌöĆ sessions/              # JSONL conversation logs\nŌö£ŌöĆŌöĆ memory/                # Per-agent MEMORY.md files\nŌö£ŌöĆŌöĆ skills/                # Installed skills\nŌööŌöĆŌöĆ workspaces/            # Per-agent working directories\n```\n\nSchema versions 1 and 2 are supported. A config declaring an unsupported version produces `MigrateError::UnsupportedVersion`.\n\n### Legacy YAML format\n\nVery old installs use separate YAML files:\n\n```\n~/.openclaw/\nŌö£ŌöĆŌöĆ config.yaml            # Global provider/model config\nŌö£ŌöĆŌöĆ agents/\nŌöé   ŌööŌöĆŌöĆ <name>/\nŌöé       Ōö£ŌöĆŌöĆ agent.yaml     # Agent definition\nŌöé       ŌööŌöĆŌöĆ MEMORY.md      # Agent memory\nŌö£ŌöĆŌöĆ messaging/\nŌöé   Ōö£ŌöĆŌöĆ telegram.yaml      # Per-channel config\nŌöé   ŌööŌöĆŌöĆ discord.yaml\nŌööŌöĆŌöĆ skills/\n    Ōö£ŌöĆŌöĆ community/\n    ŌööŌöĆŌöĆ custom/\n```\n\n### Migration Pipeline\n\n`openclaw::migrate` executes these steps in order:\n\n1. **Validate source** ŌĆö confirm `source_dir` exists\n2. **Check marker** ŌĆö if `.openclaw_migrated` exists in the target, skip to prevent overwriting user edits\n3. **Detect format** ŌĆö call `find_config_file` to locate JSON5 or YAML config\n4. **Dry-run path** ŌĆö if `dry_run` is `true`, run the full pipeline without touching disk\n5. **Create staging directory** ŌĆö sibling `<leaf>.migrate-staging` for atomic writes\n6. **Execute migration steps** (all writes go to staging):\n   - Migrate global config ŌåÆ `config.toml`\n   - Migrate agents ŌåÆ `agents/<id>/agent.toml`\n   - Migrate memory files ŌåÆ `agents/<id>/imported_memory.md`\n   - Migrate workspace directories ŌåÆ `agents/<id>/workspace/`\n   - Migrate sessions ŌåÆ `imported_sessions/*.jsonl`\n   - Report skipped features\n7. **Write marker and report** into staging\n8. **Promote staging ŌåÆ target** ŌĆö move entries into the real target, never overwriting existing files\n9. **Clean up** staging directory\n\n### What Gets Migrated\n\n| Source | Destination | Notes |\n|--------|-------------|-------|\n| `openclaw.json` / `config.yaml` | `config.toml` | Provider, model, memory decay, channels |\n| Agent entries | `agents/<id>/agent.toml` | Model, tools, capabilities, system prompt |\n| `memory/<id>/MEMORY.md` | `agents/<id>/imported_memory.md` | Checked in both `memory/` and `agents/` layouts |\n| `workspaces/<id>/` | `agents/<id>/workspace/` | Recursive copy |\n| `sessions/*.jsonl` | `imported_sessions/` | Raw copy |\n| Channel tokens/keys | `secrets.env` | Restricted to mode 0o600 on Unix |\n| WhatsApp credentials dir | `credentials/whatsapp/` | Baileys auth files |\n| Google Chat SA file | `credentials/google_chat_sa.json` | Service account JSON |\n\n### What Gets Skipped (Reported)\n\nThese features have no automatic migration path and are logged as `SkippedItem` entries:\n\n- **Cron jobs** ŌĆö use LibreFang's `ScheduleMode::Periodic` instead\n- **Hooks** ŌĆö use LibreFang's event system\n- **Auth profiles** (`auth-profiles.json`) ŌĆö set API keys as environment variables manually\n- **Skills** ŌĆö reinstall via `librefang skill install`\n- **Vector search index** (`memory-search/index.db`) ŌĆö LibreFang rebuilds embeddings\n- **iMessage** ŌĆö macOS-only, requires manual setup\n- **BlueBubbles** ŌĆö no LibreFang adapter\n- **Session/memory config sections** ŌĆö structural differences\n\n## Channel Migration\n\nThe migrator handles 13 channel types. For each channel, it:\n\n1. Extracts tokens/credentials into `secrets.env` (key-value format, existing keys are updated)\n2. Builds a TOML table with env-var references (never raw secrets in config.toml)\n3. Maps DM and group policies to LibreFang equivalents\n\n### Policy Mapping\n\n**DM policy** (`map_dm_policy`):\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `open` | `respond` |\n| `allowlist` / `allow_list` | `allowed_only` |\n| `pairing` / `disabled` | `ignore` |\n\n**Group policy** (`map_group_policy`):\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `open` / `all` | `all` |\n| `mention` / `mention_only` | `mention_only` |\n| `commands` / `commands_only` / `slash_only` | `commands_only` |\n| `disabled` / `ignore` | `ignore` |\n\n### Allow-List Caveats\n\nSome channel configs in OpenClaw support `allow_from` (per-user allowlists) that have no direct equivalent in LibreFang. For Slack, Matrix, Teams, IRC, and Mattermost, a warning is emitted. Where LibreFang does support user allowlists (Telegram, Discord, WhatsApp, Signal), the list is mapped to the appropriate TOML field.\n\n## Agent Migration\n\nEach agent produces a complete `agent.toml` manifest with:\n\n- **Model resolution** ŌĆö agent-level model overrides defaults; `\"provider/model\"` strings are split via `split_model_ref`. Fallback models produce `[[fallback_models]]` entries.\n- **Tool mapping** ŌĆö delegates to `librefang_types::tool_compat::{is_known_librefang_tool, map_tool_name}` for compatibility. Unrecognized tools are reported as warnings.\n- **Tool profiles** ŌĆö mapped via `tools_for_profile` which uses `librefang_types::agent::ToolProfile`. Profile names: `minimal`, `coding`, `research`, `messaging`, `automation`, `full`.\n- **Capabilities derivation** ŌĆö `derive_capabilities` infers `shell`, `network`, `agent_message`, and `agent_spawn` grants from the resolved tool list.\n- **System prompt extraction** ŌĆö `extract_identity_prompt` handles both raw strings and structured objects, searching common keys (`systemPrompt`, `instructions`, `persona`, etc.) recursively.\n- **Tool blocklist** ŌĆö OpenClaw's `tools.deny` list is preserved as `tool_blocklist` in the output.\n- **Skill allowlist** ŌĆö agent-level `skills` entries are preserved.\n- **Custom workspace path** ŌĆö preserved if non-empty.\n\n## Provider Mapping\n\n`map_provider` normalizes OpenClaw provider names:\n\n| OpenClaw aliases | LibreFang provider |\n|------------------|--------------------|\n| `anthropic`, `claude` | `anthropic` |\n| `openai`, `gpt` | `openai` |\n| `google`, `gemini` | `google` |\n| `xai`, `grok` | `xai` |\n| Others | Passed through as-is |\n\n`default_api_key_env` maps each provider to its conventional environment variable name (e.g., `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`). Ollama returns an empty string (no key needed).\n\n## Atomicity and Safety\n\n### Path Traversal Protection (#3794)\n\n`validate_migration_id` rejects agent IDs containing `..`, absolute paths, NUL bytes, or any non-`Normal` path component. All agent names from both JSON5 entries and filesystem-derived directory names are validated.\n\n### Atomic File Writes\n\n`atomic_write` writes content to a `.tmp` sibling first, then renames into place. This prevents torn writes if the process is interrupted mid-write.\n\n### Staging Directory (#3798)\n\nAll migration writes go to a sibling staging directory (`<target>.migrate-staging`). Only after the entire pipeline succeeds does `promote_staging` move entries into the real target. This ensures:\n\n- A failed migration never leaves the real `~/.librefang` in a partially-written state\n- Existing files in the target are never clobbered (they are silently skipped during promotion, with a warning logged)\n- The staging directory remains after a failure for manual inspection\n- A stale staging directory from a previous failed run causes `MigrateError::StagingExists` rather than silent data loss\n\n### Migration Marker\n\nAfter a successful migration, `.openclaw_migrated` is written to the target. Subsequent migration attempts detect this marker and skip, preventing overwrites of user edits made since the import.\n\n### Backup Before Overwrite\n\n`write_with_backup` renames any existing destination file to `<name>.bak.<timestamp>` before writing new content. Timestamp collision is handled by falling back to nanosecond precision.\n\n### Secret File Permissions\n\n`write_secret_env` restricts `secrets.env` to mode `0o600` on Unix systems.\n\n## Error Handling\n\n`MigrateError` covers all failure modes:\n\n| Variant | Meaning |\n|---------|---------|\n| `SourceNotFound` | Source directory does not exist |\n| `ConfigParse` | Config file could not be parsed |\n| `AgentParse` | Agent definition could not be parsed |\n| `Io` | Filesystem I/O error |\n| `Yaml` | YAML deserialization error |\n| `Json5Parse` | JSON5 parsing error |\n| `TomlSerialize` | TOML serialization error |\n| `UnsupportedSource` | Framework not yet supported |\n| `InvalidId` | Agent ID contains path traversal (#3794) |\n| `UnsupportedVersion` | Schema version not in `[1, 2]` (#3797) |\n| `StagingExists` | Stale staging directory from prior failure (#3798) |\n\n## Migration Report\n\n`report::MigrationReport` is returned on success (and partially populated even during dry runs). It contains:\n\n- **`imported`** ŌĆö list of `MigrateItem` (kind, name, destination path)\n- **`skipped`** ŌĆö list of `SkippedItem` (kind, name, reason)\n- **`warnings`** ŌĆö arbitrary warning strings (unmapped tools, allow-list caveats, backup notifications)\n- **`dry_run`** ŌĆö whether this was a dry run\n- **`source`** ŌĆö human-readable source framework name\n\nCallers use `report.to_markdown()` (CLI) and `report.print_summary()` (TUI) to present results.\n\n## Integration Points\n\n- **`librefang_types::config`** ŌĆö `CONFIG_VERSION`, `DEFAULT_API_LISTEN` used in generated config\n- **`librefang_types::tool_compat`** ŌĆö `is_known_librefang_tool`, `map_tool_name` for tool migration\n- **`librefang_types::agent::ToolProfile`** ŌĆö tool profile enumeration\n- **`librefang_types::VERSION`** ŌĆö written into agent manifests\n- **CLI** (`librefang-cli/src/main.rs`) ŌĆö `cmd_migrate` calls `run_migration`, prints report\n- **TUI** (`tui/screens/init_wizard.rs`) ŌĆö `handle_migration_key` and `run` call detect/scan/migrate\n- **HTTP API** (`src/routes/config.rs`) ŌĆö `migrate_detect`, `migrate_scan`, `run_migrate` endpoints","other-librefang-api-dashboard":"# Other ŌĆö librefang-api-dashboard\n\n# LibreFang API Dashboard\n\n## Overview\n\nThe dashboard is a single-page application for managing and monitoring the LibreFang autonomous agent operating system. It provides real-time visibility into agents, sessions, approvals, channels, hands, workflows, schedules, and analytics through a React 19 frontend built on TanStack Router and TanStack Query.\n\n**Entry point:** `src/main.tsx`  \n**Pages:** `src/pages/`  \n**Build tooling:** Vite 8 + TypeScript strict + Tailwind CSS 4\n\n## Architecture\n\n```mermaid\ngraph TD\n    Pages[\"Pages (src/pages/)\"]\n    Queries[\"Query Hooks (src/lib/queries/)\"]\n    Mutations[\"Mutation Hooks (src/lib/mutations/)\"]\n    Keys[\"Query Keys (src/lib/queries/keys.ts)\"]\n    Client[\"HTTP Client (src/lib/http/client.ts)\"]\n    ApiRaw[\"Raw API (src/api.ts)\"]\n    UI[\"UI Components (src/components/ui/)\"]\n    Lib[\"Utilities (src/lib/)\"]\n\n    Pages --> Queries\n    Pages --> Mutations\n    Pages --> UI\n    Queries --> Keys\n    Queries --> Client\n    Mutations --> Keys\n    Mutations --> Client\n    Client --> ApiRaw\n    Pages --> Lib\n```\n\nPages never call `fetch()` or `src/api.ts` directly ŌĆö all data access flows through the hooks layer in `src/lib/queries/` and `src/lib/mutations/`.\n\n## Data Layer\n\n### Directory Layout\n\n```\nsrc/lib/\n  http/\n    client.ts          # Thin wrapper over src/api.ts + typed re-exports\n    errors.ts          # ApiError class\n  queries/\n    keys.ts            # All query-key factories\n    keys.test.ts       # Smoke tests for factories\n    <domain>.ts        # queryOptions + useXxx hooks per domain\n  mutations/\n    <domain>.ts        # useXxx mutation hooks with cache invalidation\n```\n\n### Query Key Factories\n\nEvery domain defines a hierarchical key factory in `src/lib/queries/keys.ts`. Each sub-key is anchored to `all` so broad invalidation works:\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nCurrent domains: `agents`, `analytics`, `approvals`, `channels`, `config`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `workflows`.\n\n### Query Hooks\n\nEach domain file exports a `queryOptions` factory and a `useXxx` wrapper:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled: options.enabled,\n    staleTime: options.staleTime,\n    refetchInterval: options.refetchInterval,\n  });\n}\n```\n\nThe optional `UseFooOptions` argument lets call sites override `enabled`, `staleTime`, and `refetchInterval` per-page. Every override carries an inline comment explaining why. Examples from the codebase:\n\n- `useApprovals({ enabled: open })` ŌĆö gates polling to when the panel is open\n- `useCommsEvents(50, { refetchInterval: 5_000 })` ŌĆö fast poll for live comms\n- `useModels({}, { enabled: isModelArg })` ŌĆö skips fetch when irrelevant\n- `useApprovalCount({ refetchInterval: 5_000 })` ŌĆö bell-icon badge refresh\n\n### Mutation Hooks\n\nMutations live in `src/lib/mutations/<domain>.ts`. Cache invalidation is always inside the hook ŌĆö callers never need to know which keys are touched.\n\nInvalidation must target the narrowest key set that covers what changed:\n\n| Scenario | Keys to invalidate | Example |\n|----------|-------------------|---------|\n| Per-id update where list projection changes | `fooKeys.lists()` + `fooKeys.detail(id)` | `usePatchAgentConfig`, `usePatchAgent` |\n| List-shape change, no existing detail | `fooKeys.lists()` | `useCreateAgentSession`, `useDeleteAgentSession` |\n| Scoped to one detail, list unaffected | `fooKeys.detail(id)` or nested sub-key | `useSetHandSecret` |\n| Bulk import / cross-cutting reset | `fooKeys.all` | `useActivateHand` |\n\nFan-out trade-off: invalidating `fooKeys.all` while N items are cached refetches the list plus every cached sub-key for each of the N items. Reserve `all` for genuinely cross-cutting mutations.\n\nCallers may attach per-call `onSuccess`/`onError` for UI feedback (toasts, modal dismissal). This is orthogonal to invalidation. See `MemoryPage` delete/cleanup and `ChannelsPage` configure/test for the pattern.\n\n### Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts` (or re-export via `src/lib/http/client.ts`).\n2. If new domain, add a factory in `src/lib/queries/keys.ts` following the hierarchical pattern.\n3. Add `queryOptions` + `useXxx` in `src/lib/queries/<domain>.ts`.\n4. Add mutations in `src/lib/mutations/<domain>.ts` with proper invalidation.\n5. Update `src/lib/queries/keys.test.ts` ŌĆö add factory to the existence list, add anchoring/hierarchy tests.\n\n### Exceptions\n\nStreaming/SSE, imperative fire-and-forget control channels (e.g. `TerminalTabs.tsx` terminal lifecycle), and one-shot probes that must not be cached may call `fetch` directly. Keep these narrow and comment why.\n\n## Authentication\n\nThe dashboard uses bearer-token authentication stored in `sessionStorage` under the key `librefang-api-key`.\n\n- **`setApiKey(token)`** ŌĆö stores in `sessionStorage` only (not `localStorage`)\n- **`getStoredApiKey()`** ŌĆö reads from `sessionStorage`\n- **`verifyStoredAuth()`** ŌĆö probes a protected endpoint; returns `false` and clears the token on 401\n- **`buildAuthenticatedWebSocket(path)`** ŌĆö constructs a `ws://` URL and passes the token as a `Sec-WebSocket-Protocol` sub-protocol (`bearer.<token>`)\n\nAll API calls go through `buildHeaders()` ŌåÆ `authHeader()` ŌåÆ `getStoredApiKey()`. When a request returns 401, `parseError()` calls `clearApiKey()` to strip the stale token.\n\nThe sign-in dialog renders when `/api/auth/dashboard-check` returns `mode: \"credentials\"`.\n\n## API Layer (`src/api.ts`)\n\nThin wrappers over `fetch()` that handle:\n\n- **Bearer token injection** via `buildHeaders()`\n- **Error parsing** via `parseError()` ŌĆö returns typed `ApiError` instances\n- **Request methods**: `get()`, `post()`, `put()`, `patch()`, `del()` with JSON serialization\n- **WebSocket URL construction** via `buildAuthenticatedWebSocket()`\n\nNotable functions:\n- `patchAgentConfig(agentId, config)` ŌĆö PATCH `/api/agents/{id}/config`\n- `patchHandAgentRuntimeConfig(agentId, config)` ŌĆö PATCH `/api/agents/{id}/hand-runtime-config` (trims whitespace-only tri-state fields before sending)\n- `getAgentTools(agentId)` / `updateAgentTools(agentId, body)` ŌĆö GET/PUT agent tool allowlists\n- `listTools()` ŌĆö handles both wrapped `{tools: [...]}` and direct array responses\n\n## UI Components\n\n### Modal (`src/components/ui/Modal.tsx`)\n\nShared modal shell supporting three variants:\n\n| Variant | Layout | Backdrop | Dismissal |\n|---------|--------|----------|-----------|\n| `modal` (default) | Centered, max-h 90vh | Dim + blur | Backdrop click, Esc |\n| `drawer-right` | Right-docked, full height | None | Esc, explicit close button |\n| `panel-right` | Right-docked, full height | Dim + blur | Backdrop click, Esc |\n\nAll variants include focus trapping (except drawer, which leaves Tab free for list navigation), `aria-modal`/`role=\"dialog\"`, focus restoration on close, and enter/exit animations via Framer Motion's `AnimatePresence`.\n\nThe drawer variant uses `pointer-events-none` on the container so the underlying page remains interactive ŌĆö users can click another row in a list to switch the drawer content without dismissing first.\n\n**Nesting:** Backdrop clicks call `stopPropagation()` to prevent closing an ancestor modal when a nested modal is dismissed.\n\n### ConfirmDialog (`src/components/ui/ConfirmDialog.tsx`)\n\nStyled replacement for `window.confirm()`. Supports a `tone` prop ŌĆö `destructive` renders the confirm button in error colors and disables Enter-to-confirm to prevent accidental data loss. Non-destructive dialogs confirm on Enter (except when focus is in a textarea/input/contenteditable).\n\n### MultiSelectCmdk (`src/components/ui/MultiSelectCmdk.tsx`)\n\nCommand-menu-based multi-select built on `cmdk`. Features:\n\n- Chip display of selected values with remove buttons\n- Backspace removes last selected item\n- Type-ahead search filters the dropdown\n- Already-selected items are hidden from the list\n- Controlled via `value`/`onChange` props\n\n## Agent Manifest System\n\nThe dashboard includes a full TOML-based agent manifest parser/serializer for the agent configuration editor.\n\n### Parser (`parseManifestToml`)\n\nParses TOML into a structured `form` + `extras` split:\n\n- **Form fields** are first-class properties the editor UI manages directly (name, model provider, temperature, capabilities, etc.)\n- **Extras** are everything the form doesn't explicitly handle ŌĆö preserved for round-trip fidelity\n\nHandles: `response_format` (including nested JSON schemas), `exec_policy` aliases (normalizes `none`/`disabled` ŌåÆ `deny`, `restricted` ŌåÆ `allowlist`, `all`/`unrestricted` ŌåÆ `full`), `fallback_models` with per-model `extras` (provider-specific fields like Qwen's `enable_memory`), `schedule` variants (periodic/continuous), `thinking`, `autonomous`, `routing`, `context_injection`.\n\n### Serializer (`serializeManifestForm`)\n\nProduces deterministic TOML with a hand-tuned field order. Handles:\n\n- Mutual exclusion between shorthand form fields and preserved extras tables (e.g. if user picks `exec_policy = \"deny\"` in the form, the preserved `[exec_policy]` table is suppressed to avoid TOML key/table redefinition conflicts)\n- Negative and out-of-range integer validation (silently omits invalid values)\n- Escaping special characters in strings\n- Empty numeric fields are omitted entirely\n- Nested-table extras never break section scoping\n\n### Markdown Generator (`generateManifestMarkdown`)\n\nProduces a human-readable markdown summary of an agent manifest for documentation/preview purposes. Sections (resources, capabilities, lifecycle overrides, advanced configuration) are only emitted when populated.\n\n## Utility Modules\n\n### Chat Utilities (`src/lib/chat.ts`)\n\n- `normalizeRole()` ŌĆö normalizes API message roles (`User` ŌåÆ `user`)\n- `asText()` ŌĆö converts unknown content blocks to text\n- `formatMeta()` ŌĆö formats token usage metadata\n- `normalizeToolOutput()` ŌĆö normalizes tool output events for persistent display, filtering malformed entries\n\n### Chat Picker (`src/lib/chatPicker.ts`)\n\n`groupedPicker(agents, hands, showHandAgents)` partitions agents into:\n\n- **Standalone** ŌĆö non-hand agents, always shown\n- **Hand groups** ŌĆö hand instances with their member agents, shown when `showHandAgents` is true\n\nHand groups are sorted alphabetically by name. Agents within a group are ordered: coordinator first, then alphabetical by role. Inactive hands and hands with empty `agent_ids` are hidden entirely.\n\n### CSV Parser (`src/lib/csvParser.ts`)\n\nRFC-4180 compliant CSV parser handling:\n\n- UTF-8 BOM stripping\n- Embedded newlines and commas in quoted fields\n- Escaped double-quotes (`\"\"`)\n- CRLF and CR line endings\n- No phantom records from trailing newlines\n\n`parseUsersCsv()` validates name/role columns, flags invalid roles while still surfacing rows for preview, and maps unknown columns to `channel_bindings`.\n\n### Agent Tools Editor\n\n`DeliveryTargetsEditor` validates delivery targets with SSRF protection ŌĆö rejects `localhost`, `127.0.0.1`, `::1`, `169.254.169.254`, `metadata.google.internal`, and non-http(s) schemes. Local file targets reject absolute paths and `..` traversal.\n\n## Theming and Styling\n\n### CSS Architecture (`src/index.css`)\n\nTailwind CSS 4 with custom semantic palette driven by CSS custom properties:\n\n```\n--color-brand          --color-success       --color-warning\n--color-error          --color-accent        --color-surface\n--color-surface-hover  --color-border-subtle --color-text-dim\n```\n\nLight and dark mode palettes are defined on `:root` and `:root.dark` respectively. Dark mode uses translucent surfaces (`rgba`) with a radial gradient background.\n\nCustom breakpoints `3xl` (1920px) and `4xl` (2560px) support wide displays ŌĆö card grids can go 5-wide on QHD and 6-wide on 4K.\n\n### Animation System\n\nApple-style animations with CSS custom properties for easing curves (`--apple-spring`, `--apple-ease`, `--apple-bounce`). Animated components use Framer Motion (`motion/react`) with shared variants from `src/lib/motion.ts`.\n\nUtility classes: `card-glow` (hover depth + brand glow), `animate-pulse-soft`, `animate-shimmer`, `animate-rise`, `animate-glow-ring`, `bg-grid`.\n\n### Safe Area Insets\n\nUtilities for iOS/Android safe areas: `pb-safe`, `pb-safe-2`, `pb-safe-4`, `pt-safe`, `pl-safe`, `pr-safe` ŌĆö use `env(safe-area-inset-*)` with sensible fallbacks.\n\n## Service Worker (`public/sw.js`)\n\nPrecaches `/dashboard/` on install. API requests (`/api/*`) are network-only. Static assets use stale-while-revalidate strategy. Only caches GET requests.\n\n## PWA Support\n\n`public/manifest.json` configures the dashboard as a standalone PWA with `start_url: /dashboard/#/overview`, theme color `#020617`, and icons at 192px and 512px.\n\n## Testing\n\n### Unit Tests\n\nRun with `pnpm test` (Vitest). Key test files:\n\n| Area | Files |\n|------|-------|\n| Query key factories | `src/lib/queries/keys.test.ts` |\n| Mutation invalidation | `src/lib/mutations/agents.test.tsx`, `agents-experiments.test.tsx`, `hands.test.tsx` |\n| API helpers | `src/api.test.ts` |\n| Agent manifest | `src/lib/agentManifest.test.ts`, `agentManifestMarkdown.test.ts` |\n| Chat utilities | `src/lib/chat.test.ts`, `chatPicker.test.ts` |\n| CSV parsing | `src/lib/csvParser.test.ts` |\n| UI components | `src/components/ui/*.test.tsx` |\n\nMutation tests use `createQueryClientWrapper` from `src/lib/test/query-client.tsx` to spy on `queryClient.invalidateQueries` and verify the exact keys each mutation touches.\n\n### E2E Tests\n\nRun with `pnpm e2e` (Playwright). Tests in `e2e/dashboard.spec.ts` verify:\n\n- Dashboard shell loads with all navigation links\n- Navigation between pages works\n- Sign-in dialog appears when credentials are required\n\nPlaywright config (`playwright.config.ts`) starts the dev server on `127.0.0.1:4173` with 30s timeout and trace-on-first-retry.\n\n## Build and Verification\n\nRun all three after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`:\n\n```bash\npnpm typecheck          # tsc --noEmit\npnpm test --run         # vitest\npnpm build              # vite build\n```\n\nA passing typecheck alone is insufficient ŌĆö the key-factory tests catch anchoring regressions that the compiler does not.\n\n## OpenAPI Types\n\nGenerate TypeScript types from the backend's OpenAPI schema:\n\n```bash\npnpm openapi:types      # openapi-typescript ŌåÆ openapi/generated.ts\n```\n\nNew hooks should lean on these generated types rather than introducing `any`.\n\n## Commit Convention\n\nFollows the root repo pattern scoped to `dashboard`:\n\n```\nfeat(dashboard/<area>): ...\nrefactor(dashboard/queries): ...\nfix(dashboard/<area>): ...\n```\n\nNever include a `Co-Authored-By` footer.","other-librefang-api-src":"# Other ŌĆö librefang-api-src\n\n# LibreFang API ŌĆö Login Page\n\n## Overview\n\n`login_page.html` is a self-contained, single-file login interface for the LibreFang dashboard. It bundles its own markup, styles, and client-side logic with zero external dependencies ŌĆö no CSS framework, no JS library, no build step.\n\nThe page handles username/password authentication and optional TOTP-based two-factor authentication against the backend endpoint `/api/auth/dashboard-login`.\n\n---\n\n## Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant Page as login_page.html\n    participant API as /api/auth/dashboard-login\n\n    User->>Page: Submit username + password\n    Page->>API: POST {username, password}\n    API-->>Page: {requires_totp: true}\n    Page->>User: Show TOTP input field\n    User->>Page: Submit with TOTP code\n    Page->>API: POST {username, password, totp_code}\n    API-->>Page: {ok: true, token: \"...\"}\n    Page->>Page: Store token in localStorage\n    Page->>Page: Redirect to destination\n```\n\n### Step-by-step\n\n1. The user enters their **username** and **password** and clicks **Sign in**.\n2. The page `POST`s a JSON payload to `/api/auth/dashboard-login`.\n3. **If the server requires TOTP** (`{requires_totp: true}`), the TOTP input row is revealed, the field is auto-focused, and an inline prompt appears.\n4. On the next submission, the `totp_code` field is included in the payload alongside credentials.\n5. **On success** (`{ok: true, token: \"...\"}`), the JWT is persisted to `localStorage` under the key `librefang-api-key`, and the browser is redirected to the original destination (or `/dashboard/` as a fallback).\n6. **On failure**, the `error` message from the response is displayed in the `.err` element.\n\n---\n\n## Form Fields\n\n| Field | HTML `name` | Type | Behavior |\n|---|---|---|---|\n| Username | `username` | text | Required, auto-trimmed, autofocus on page load |\n| Password | `password` | password | Required |\n| TOTP code | `totp_code` | numeric (`inputmode=\"numeric\"`) | Hidden by default; revealed only when the backend responds with `requires_totp`. Accepts exactly 6 digits. |\n\n---\n\n## API Contract\n\nThe page expects `POST /api/auth/dashboard-login` with `Content-Type: application/json` and `credentials: 'same-origin'` (cookies are sent for session affinity if needed).\n\n**Request body (password-only):**\n\n```json\n{\n  \"username\": \"admin\",\n  \"password\": \"s3cret\"\n}\n```\n\n**Request body (with TOTP):**\n\n```json\n{\n  \"username\": \"admin\",\n  \"password\": \"s3cret\",\n  \"totp_code\": \"123456\"\n}\n```\n\n**Expected response shapes:**\n\n| Scenario | Response |\n|---|---|\n| Success | `{\"ok\": true, \"token\": \"<jwt>\"}` |\n| TOTP required | `{\"requires_totp\": true}` |\n| Failure | `{\"error\": \"<message>\"}` |\n\nThe page does not inspect HTTP status codes beyond reading the response body; it defers to the `ok`, `requires_totp`, and `error` fields.\n\n---\n\n## Token Storage\n\nOn successful authentication the token is written to:\n\n```\nlocalStorage key: librefang-api-key\n```\n\nOther dashboard pages or API client code should read from this same key when attaching the token to subsequent requests (typically as an `Authorization: Bearer <token>` header).\n\n---\n\n## Redirect Behavior\n\nAfter storing the token, the page calls:\n\n```js\nlocation.replace(target)\n```\n\nwhere `target` is derived from:\n\n```\nlocation.pathname + location.search + location.hash\n```\n\nThis means if a user navigates to a protected route (e.g., `/dashboard/settings?tab=general`) and gets intercepted by the login page, the original full URL is preserved and restored after login. If the path is bare (`/`) or empty, the redirect falls back to `/dashboard/`.\n\n`location.replace` is used instead of `location.href` so the login page is not retained in browser history ŌĆö the user cannot press Back to return to the login form.\n\n---\n\n## Theming\n\nThe page supports both dark and light modes via `prefers-color-scheme`:\n\n- **Dark** (default): Dark background (`#0b0d12`), card (`#12151c`), light text (`#e6e8ee`).\n- **Light**: Overridden via `@media (prefers-color-scheme: light)` ŌĆö white card, light background (`#f6f7fb`), dark text (`#1a1c22`).\n\nThe `:root` declaration `{ color-scheme: light dark; }` tells the browser to adapt native form controls (scrollbars, focus rings) to the active scheme.\n\nNo user toggle is provided ŌĆö the page follows the OS preference.\n\n---\n\n## Layout and Responsiveness\n\n- The card is centered using `display: grid; place-items: center` on the body.\n- Maximum width is capped at `380px` via `width: min(92vw, 380px)`, ensuring it remains usable on narrow mobile viewports.\n- The viewport meta tag sets `width=device-width, initial-scale=1`.\n\n---\n\n## Security Considerations\n\n- **`autocomplete` attributes** are set appropriately (`username`, `current-password`, `one-time-code`) so password managers and browser autofill work correctly.\n- **`robots` meta tag** is set to `noindex, nofollow` to prevent search engine indexing.\n- The form uses `aria-live=\"polite\"` on the error container so screen readers announce validation/login errors.\n- The TOTP input constrains input to numeric characters only (`inputmode=\"numeric\"`, `pattern=\"[0-9]{6}\"`, `maxlength=\"6\"`).\n- The `localStorage.setItem` call is wrapped in a `try/catch` to silently handle cases where storage is disabled (e.g., Safari private browsing).\n\n---\n\n## Relationship to the Rest of the Codebase\n\nThis page is served by the LibreFang API server as the gateway to the dashboard. It is the only client-side file in the `librefang-api` module ŌĆö the rest of the codebase is server-side. The page's sole integration point is the `/api/auth/dashboard-login` endpoint. Beyond that endpoint, it is fully decoupled.\n\nConfiguration note shown at the bottom of the card:\n\n> Auth required ŌĆö configured in `config.toml`.\n\nThis refers to the server-side TOML config that enables/disables dashboard authentication.","other-librefang-api-static":"# Other ŌĆö librefang-api-static\n\n# librefang-api-static ŌĆö Static Locale Assets\n\n## Overview\n\nThis module provides the internationalization (i18n) translation files for the LibreFang web dashboard. It contains static JSON locale files that map hierarchical translation keys to human-readable strings in each supported language.\n\nThe frontend loads these files at runtime based on the user's language preference, and all UI labels, messages, error strings, button text, and toast notifications resolve through this keyŌåÆvalue lookup system.\n\n## Supported Languages\n\n| File | Language | Code |\n|------|----------|------|\n| `locales/en.json` | English | `en` |\n| `locales/ja.json` | Japanese | `ja` |\n\n## Key Structure\n\nAll locale files share an identical key hierarchy. Every top-level key corresponds to a UI feature area, page, or shared component. The structure uses dot-notation access in the frontend (e.g., `agentChat.cmd.help` ŌåÆ `\"Show available commands\"`).\n\n### Top-Level Sections\n\n| Key | Scope | Purpose |\n|-----|-------|---------|\n| `nav` | Sidebar navigation | Labels for all dashboard pages (Overview, Agents, Sessions, Logs, etc.) |\n| `status` | Shared status indicators | Connection states: connecting, reconnecting, disconnected, ready, error |\n| `btn` | Shared buttons | Common action labels: Refresh, Save, Delete, Cancel, Copy, etc. |\n| `label` | Shared field labels | Generic form labels: Status, Version, Provider, Model, Name, Key, Value |\n| `auth` | API key gate | Title, description, placeholder, and hint for the authentication screen |\n| `page` | Page titles | Short page identifiers used in breadcrumbs and headers |\n| `health` | Health indicators | Healthy / Unreachable system states |\n| `stat` | Overview statistics | Dashboard stat card labels (Agents Running, Tokens Used, Total Cost, etc.) |\n| `card` | Overview cards | Card titles on the dashboard (Getting Started, LLM Providers, System Health) |\n| `agents` | Agent list panel | Sidebar and list labels (New Agent, Stop All, Your Agents) |\n| `detail` | Agent detail panel | Info/Files/Config tabs, tool filters, fallbacks, clone, and clear history |\n| `mode` | Agent modes | Observe / Assist / Full |\n| `category` | Agent categories | All, General, Development, Research, Writing, Business |\n| `profile` | Tool profiles | Nine profiles (Minimal through Full) each with `label` and `desc` |\n| `template` | Agent templates | Ten built-in agent templates (GeneralAssistant, CodeHelper, Researcher, etc.) |\n| `time` | Relative timestamps | `now`, `{count}s ago`, `{count}m ago`, `{count}h ago`, `{count}d ago` |\n| `onboarding` | First-run banner | Welcome message, Launch Setup Wizard, Configure Manually, Dismiss |\n| `provider` | Provider setup | Banner text, tier labels, Ollama detection, activation messages |\n| `overview` | Dashboard page | All overview cards, quick actions, recent activity, provider states, setup steps |\n| `security` | Security subsystems | Named security features (Merkle Audit, Taint Tracking, WASM Sandbox, etc.) |\n| `agentChat` | Chat interface | Full chat UX including sessions, commands, toasts, system messages, tool states |\n| `sessionsPage` | Sessions page | Session list, agent memory store, CRUD operations |\n| `agentsPage` | Agents page | Agent creation (wizard + raw TOML), spawning, stopping, archetype/vibe selectors |\n| `approvals` | Approvals page | Pending/approved/rejected filters, approve/reject actions |\n| `logsPage` | Logs page | Live log stream, audit trail, chain verification, pause/resume/clear/export |\n| `runtimePage` | Runtime page | System info, providers, models, latency display, time formatting |\n| `settingsPage` | Settings page | Providers, Models, Tools, Security, Network, Budget, Proactive Memory, Migration |\n| `workflowsPage` | Workflows page | Workflow CRUD, step types (sequential, fan-out, conditional, loop), execution |\n| `workflowBuilder` | Visual workflow editor | Node palette, canvas interactions, TOML export, node types (agent step, condition, loop, etc.) |\n| `schedulerPage` | Scheduler page | Cron jobs, event triggers, run history, cron presets and formatting |\n| `channelsPage` | Channels page | Channel setup wizard steps, WhatsApp QR flow, status tracking, categories |\n| `skillsPage` | Skills page | Installed skills, ClawHub browsing, MCP servers, quick-start skills, security scanning |\n| `handsPage` | Hands page | Hand activation/deactivation, dependency installation, setup wizard, browser state |\n| `pluginsPage` | Plugins page | Plugin registry, install from registry/local/git, scaffold new plugin |\n| `commsPage` | Agent comms page | Inter-agent messaging, task posting, topology, live event feed |\n| `setupWizard` | Setup wizard | 6-step wizard (Welcome ŌåÆ Provider ŌåÆ Agent ŌåÆ Try It ŌåÆ Channel ŌåÆ Done) |\n| `goalsPage` | Goals page | Goal CRUD, sub-goals, status tracking (Pending, In Progress, Completed, Cancelled) |\n| `analyticsPage` | Analytics page | Token/cost summary, breakdown by model and agent, daily cost chart |\n| `memoryPage` | Memory page | Proactive memory viewer, search, CRUD, version history |\n| `theme` | Theme selector | Light / Dark / System |\n| `sidebar` | Sidebar footer | Keyboard shortcut hints |\n| `agentChat2` | Chat toolbar | Focus mode, model switcher, vision/tools toggles |\n| `settingsPage2` | Settings extras | Proactive memory master toggle |\n| `agentsPage2` | Agent form extras | Model placeholder text |\n| `schedulerPage2` | Scheduler extras | Trigger delete label |\n| `analyticsPage2` | Analytics extras | Total label |\n| `memoryPage2` | Memory extras | Bulk delete label |\n| `confirm` | Confirmation dialog | Confirm / Cancel buttons |\n| `setupWizard2` | Wizard extras | Provider configure heading |\n\n## Interpolation\n\nMany strings contain `{variable}` placeholders that the frontend substitutes at render time. The interpolation syntax follows a simple `{key}` pattern:\n\n```json\n\"secondsAgo\": \"{count}s ago\"\n\"providerModels\": \"{count} model(s) available\"\n\"agentStopped\": \"Agent \\\"{name}\\\" stopped\"\n```\n\nThe number and names of variables per key are consistent across all locale files.\n\n## Adding a New Language\n\n1. Copy `locales/en.json` to `locales/<code>.json` (e.g., `locales/fr.json`)\n2. Translate all values ŌĆö do **not** modify any keys\n3. Preserve all `{variable}` placeholders exactly as they appear\n4. Register the new locale in the frontend's i18n configuration\n\n## Adding New Translation Keys\n\n1. Add the key to **every** locale file under the same path\n2. Group new keys under the appropriate top-level section ŌĆö create a new section if the feature is distinct enough\n3. Use the `*2` naming convention (e.g., `newPage2`) for supplementary keys added to an existing page, following the pattern already in use\n4. For feature subsections with repeated structure, use nested objects (see `profile`, `template`, `agentsPage.archetype`, `agentsPage.vibe`)\n\n## Conventions\n\n- **Button labels** go under `btn.*` if reused globally, or under the page section if page-specific\n- **Toast/notification messages** are nested under `<section>.toast.*` or inline with a descriptive key\n- **Error messages** follow the pattern `\"failedAction\": \"Failed to do X: {message}\"` or `\"loadError\": \"Could not load X.\"`\n- **Confirmation dialogs** include `<action>Title` and `<action>Confirm` pairs\n- **Enum/status labels** are grouped under `<section>.status.*`, `<section>.filter.*`, or `<section>.state.*`\n- **Descriptions** use keys ending in `Desc` (e.g., `proactiveMemoryDesc`, `noWorkflowsDesc`)\n\n## Relationship to the Codebase\n\n```mermaid\ngraph LR\n    A[Frontend Components] -->|import| B[i18n Library]\n    B -->|load| C[locales/en.json]\n    B -->|load| D[locales/ja.json]\n    A -->|t&thinsp;key| B\n    B -->|resolved string| A\n```\n\nThe frontend framework (typically Svelte in the LibreFang stack) imports an i18n library that loads these JSON files. Components call a translation function (commonly `t(\"agentChat.cmd.help\")`) which resolves to the correct string based on the active locale. The static module has no runtime code ŌĆö it is pure data consumed by the frontend build.","other-librefang-api-tests":"# Other ŌĆö librefang-api-tests\n\n# librefang-api-tests\n\nIntegration test suite for the LibreFang HTTP API. Tests exercise the production router, middleware stack, and kernel against real axum request handling ŌĆö no mocks on the HTTP layer.\n\n## Purpose\n\nThese tests close the gap between unit-tested handlers and a running production server. They verify that route registration, auth middleware, handler wiring, and response serialization all compose correctly end-to-end. They guard against regressions in auth policy, cross-agent isolation, input validation, and API contract shape.\n\n## Test Strategies\n\nThe suite uses two complementary approaches:\n\n| Strategy | Mechanism | When used |\n|----------|-----------|-----------|\n| **In-process** | `tower::ServiceExt::oneshot` against the production `Router` | Route-family tests (agents, A2A, authz, workflows, users, budgets, channels) |\n| **Real HTTP** | `tokio::net::TcpListener` on port 0 + `reqwest::Client` | Broad integration tests, SSE streaming, multi-client fan-out, cookie-based sessions |\n\nIn-process tests are faster and avoid port allocation. Real-HTTP tests are necessary when the behavior depends on HTTP-level concerns (SSE framing, `Content-Disposition` headers, streaming chunk boundaries).\n\n## Harness Architecture\n\nEvery test file follows the same harness pattern:\n\n```mermaid\ngraph TD\n    A[\"tempfile::TempDir\"] --> B[\"KernelConfig<br/>(ollama, no real LLM)\"]\n    B --> C[\"LibreFangKernel::boot_with_config\"]\n    C --> D[\"Arc&lt;Kernel&gt;\"]\n    D --> E[\"server::build_router(kernel, addr)\"]\n    E --> F[\"(Router, AppState)\"]\n    F --> G[\"Harness struct\"]\n    G -->|Drop| H[\"kernel.shutdown()\"]\n```\n\n### Key harness responsibilities\n\n1. **Isolated filesystem** ŌĆö `tempfile::TempDir` provides a fresh home directory per test. The `TempDir` is stored in the harness (as `_tmp`) so it lives for the test duration and cleans up on drop.\n\n2. **Registry sync** ŌĆö `librefang_runtime::registry_sync::sync_registry` populates the model catalog cache into the temp directory so the kernel boots without network access.\n\n3. **Fake LLM provider** ŌĆö All harnesses configure `provider: \"ollama\"` with `model: \"test-model\"`. No real API keys are needed. Tests requiring actual LLM responses gate behind `GROQ_API_KEY` and use `start_test_server_with_llm()`.\n\n4. **Self-handle** ŌĆö `kernel.set_self_handle()` is called after boot, matching production initialization order.\n\n5. **Cleanup** ŌĆö The `Drop` impl calls `kernel.shutdown()`, ensuring background tasks (audit writers, stream hubs) terminate between tests.\n\n### Common harness helpers\n\n| Helper | Purpose |\n|--------|---------|\n| `send(harness, method, path, body, authed)` | In-process oneshot with optional Bearer header; returns `(StatusCode, Value)` |\n| `get(path)` / `get_with(path, bearer)` | Builder for GET requests |\n| `patch_json(path, body, bearer)` | Builder for PATCH with JSON content-type |\n| `spawn_named(state, name)` | Kernel-level agent spawn for test setup |\n| `auth_header(harness)` | Extracts `(key, value)` for Bearer auth |\n| `loopback_get(uri)` | GET with injected `ConnectInfo` (loopback addr) for auth middleware bypass |\n\n## Test Files and Coverage\n\n### Route-family tests (in-process, `tower::oneshot`)\n\n| File | Route prefix | Key behaviors tested |\n|------|-------------|---------------------|\n| `agents_routes_integration.rs` | `/api/agents` | List (filter, pagination, sort), GET by ID (valid/invalid/unknown), PATCH (name/description update, validation, read-after-write), auth gate |\n| `a2a_routes_integration.rs` | `/api/a2a/*` | Agent list (empty envelope, public-read policy), GET by ID (404, auth), discover (missing URL, invalid URL, SSRF guard), send (validation, trust gate), task status (validation, trust gate, auth), approve (unknownŌåÆ404, auth) |\n| `workflows_routes_integration.rs` | `/api/workflows/*`, `/api/cron/*`, `/api/schedules/*` | CRUD, template instantiate/save, cron job list/delete, schedule GET, invalid ID handling |\n| `authz_routes_integration.rs` | `/api/authz/*` | Effective permissions, channel-scoped queries, explicit deny |\n| `users_test.rs` | `/api/users/*` | Create (duplicate rejection, invalid role), list (summary flags, no policy leak), update, import, policy PUT/GET round-trip, key rotation (persists hash, invalidates sessions, snapshot consistency), RBAC policy field preservation |\n| `budget_routes_test.rs` | `/api/budget/*` | Agent budget status (percentages, limits, resource quotas) |\n| `network_routes_integration.rs` | `/api/network/*` | Peer registration and lookup |\n| `channels_routes_test.rs` | `/api/channels/*` | Channel CRUD with various configs |\n| `channel_webhooks_test.rs` | Webhook routes | Webhook delivery and verification |\n| `approvals_routes_integration.rs` | Approval routes | Approval workflow |\n| `system_tools_sessions_test.rs` | Session tools | Session listing with pagination, agent-scoped isolation |\n| `totp_flow_test.rs` | TOTP enrollment | Setup, confirm, revoke flows |\n| `pairing_test.rs` | Pairing routes | Device pairing lifecycle |\n| `daemon_lifecycle_test.rs` | `/api/shutdown`, startup | Full daemon boot ŌåÆ serve ŌåÆ shutdown cycle, immediate responsiveness |\n\n### Broad integration tests (real HTTP, `reqwest`)\n\n`api_integration_test.rs` covers cross-cutting concerns that require a real HTTP server:\n\n| Test area | What's verified |\n|-----------|----------------|\n| **Health/Status** | `/api/health` returns `{\"status\":\"ok\"}` with version, no sensitive fields; `/api/status` returns agent count, uptime, provider |\n| **API versioning** | `/api/v1/*` aliases work; `x-api-version: v1` header on all responses including 401; `/api/versions` endpoint; path version beats `Accept` header |\n| **Locales** | Dashboard locale files (`/locales/{lang}.json`) serve correct translations |\n| **Providers** | `/api/providers` marks local providers (`is_local: true`) |\n| **Agent lifecycle** | Spawn ŌåÆ list ŌåÆ kill ŌåÆ verify removal; multiple agents; auto-spawned default assistant |\n| **Sessions** | Empty session, cross-agent session isolation (agent A cannot read agent B's session via `?session_id=`), malformed UUID ŌåÆ 400 |\n| **Trajectory export** | JSON and JSONL formats; `Content-Disposition` header; metadata fields (schema_version, system_prompt_sha256); 404 on unknown session |\n| **Monitoring** | `/api/agents/{id}/metrics` (token usage, tool calls, response time), `/api/agents/{id}/logs` with level filtering |\n| **Triggers/Workflows** | Full CRUD lifecycle; workflow list includes `run_count`, `last_run`, `success_rate` (null before first run) |\n| **Tools** | List tools, get tool by name (with `input_schema`), 404 on unknown |\n| **Config reload** | Hot-reload proxy changes without restart (`ReloadProxy` in `hot_actions_applied`) |\n| **Migration** | OpenClaw import writes config + agent + report to daemon home |\n| **Pagination** | `limit`/`offset` parameters; limit clamped to max (500); text search (`q=` parameter) |\n| **Auth** | Public routes (health, status) vs protected; Bearer token validation; auth disabled when no key configured |\n| **Hands** | `/api/hands/active` enriched response (hand_name, hand_icon, coordinator_role, agent_ids); hand runtime config PATCH (tri-state: set/preserve/clear nullable fields) |\n| **MCP bridge** | `/mcp` rehydrates caller context from `X-LibreFang-Agent-Id` header; unrestricted agents can call any tool; tool allowlist enforced; invalid/unknown agent IDs degrade gracefully |\n| **SSE streaming** | Multi-client fan-out via `/api/agents/{id}/sessions/{sid}/stream`; broadcast to N subscribers; 404 for unknown agent |\n| **Memory** | `/api/memory` and `/api/memory/stats` return 200 with `proactive_enabled: false` when disabled (not 500) |\n| **RBAC** | Audit query/export rejects anonymous and non-admin; CSV export headers; budget user detail includes `enforced` flag |\n\n## Auth Middleware Interaction\n\nTests exercise three distinct auth configurations:\n\n1. **No api_key** (`boot(\"\")`) ŌĆö Open dev mode. Public routes (`PUBLIC_ROUTES_DASHBOARD_READS`) are accessible without credentials. Non-public routes are also accessible when `require_auth_for_reads` is false.\n\n2. **api_key set** (`boot(\"test-secret\")`) ŌĆö Production mode. Requests without `Bearer` header get 401 on non-public routes. The `ConnectInfo` extension determines loopback fast-path (in-process oneshot has no `ConnectInfo`, so requests are treated as remote).\n\n3. **RBAC users** (`start_test_server_with_rbac_users`) ŌĆö User-level auth with role-based access. Tests pin the two-layer defense: middleware checks Bearer validity, then in-handler `require_admin` gates sensitive endpoints against viewer/limited roles.\n\n### Injecting loopback context\n\nFor in-process tests that need to match production localhost behavior:\n\n```rust\nfn loopback_get(uri: &str) -> Request<Body> {\n    let mut request = Request::builder().uri(uri).body(Body::empty()).unwrap();\n    request.extensions_mut().insert(axum::extract::ConnectInfo(\n        std::net::SocketAddr::from(([127, 0, 0, 1], 0)),\n    ));\n    request\n}\n```\n\nWithout this, `tower::oneshot` requests have no `ConnectInfo` extension and the auth middleware treats them as non-loopback.\n\n## Security Regression Guards\n\nSeveral tests exist specifically to prevent security regressions:\n\n- **`send_to_untrusted_url_blocked_by_trust_gate`** ŌĆö Guards against regression from #3786 where A2A `/send` bypassed the trust check.\n- **`test_get_agent_session_rejects_cross_agent_session_id`** ŌĆö Prevents one agent from reading another's conversation by guessing a session UUID (PR #3071).\n- **`discover_localhost_url_blocked_by_ssrf_guard`** ŌĆö Ensures SSRF protection blocks localhost URLs before any outbound socket.\n- **`test_mcp_http_enforces_agent_tool_allowlist`** ŌĆö Prevents privilege escalation through the MCP bridge.\n- **`test_audit_query_rejects_viewer_admin_returns_200`** ŌĆö Pins the in-handler `require_admin` gate so a middleware refactor can't silently expose the audit chain to viewers.\n\n## Running\n\n```bash\n# All API integration tests\ncargo test -p librefang-api\n\n# Specific test file\ncargo test -p librefang-api --test a2a_routes_integration\ncargo test -p librefang-api --test agents_routes_integration\ncargo test -p librefang-api --test api_integration_test\n\n# LLM-requiring test (needs GROQ_API_KEY)\nGROQ_API_KEY=... cargo test -p librefang-api --test api_integration_test -- test_send_message_with_llm\n```\n\nAll tests use `#[tokio::test(flavor = \"multi_thread\")]` because the kernel spawns background tasks that require a multi-threaded runtime.\n\n## Dependencies on Other Crates\n\n| Crate | Role in tests |\n|-------|--------------|\n| `librefang-api` | Production router (`server::build_router`), route handlers, middleware, `AppState` |\n| `librefang-kernel` | `LibreFangKernel::boot_with_config`, agent registry, audit, session stream hub, hands subsystem, auth roles |\n| `librefang-types` | `AgentId`, `AgentManifest`, `KernelConfig`, `DefaultModelConfig`, `UserConfig`, `WebSearchAugmentationMode`, `ProactiveMemoryConfig` |\n| `librefang-runtime` | Registry sync (offline boot), audit actions, LLM stream events |\n| `librefang-testing` | `MockKernelBuilder`, `TestAppState` (for real-HTTP server setup) |\n| `tempfile` | Isolated temporary directories |\n| `tower` | `ServiceExt::oneshot` for in-process requests |\n| `reqwest` | HTTP client for real-server tests |","other-librefang-api":"# Other ŌĆö librefang-api\n\n# librefang-api\n\nHTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate exposes the agent's runtime capabilities ŌĆö conversations, skills, memory, channel management, extensions, and terminal sessions ŌĆö over a RESTful HTTP API and WebSocket endpoints, backed by Axum.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Client[HTTP/WebSocket Clients]\n    API[librefang-api<br>Axum Router]\n    \n    Client -->|REST / WS| API\n    \n    API --> Kernel[librefang-kernel]\n    API --> Runtime[librefang-runtime]\n    API --> Types[librefang-types]\n    API --> LLM[librefang-llm-drivers]\n    API --> Memory[librefang-memory]\n    API --> Channels[librefang-channels]\n    API --> Skills[librefang-skills]\n    API --> Hands[librefang-hands]\n    API --> Extensions[librefang-extensions]\n    API --> Wire[librefang-wire]\n    API --> Migrate[librefang-migrate]\n    API --> HTTP[librefang-http]\n```\n\nThe API crate is the top-level integration point. It wires together the kernel, runtime, LLM drivers, channel adapters, and extension subsystem into a unified server that serves both the agent API and the embedded React dashboard.\n\n## Feature Flags\n\nFeature flags control which channel adapters are compiled in and whether telemetry is enabled. This keeps default build times fast ŌĆö only five lightweight adapters ship by default.\n\n### Channel Features\n\n| Feature Group | Description |\n|---|---|\n| `default` | Enables `core-channels` + `telemetry` |\n| `core-channels` | Telegram, Discord, Slack, Webhook, Ntfy ŌĆö five lightweight adapters using only the workspace HTTP stack (`reqwest` + `rustls`) |\n| `mini` | 12 core channels (Telegram, Discord, Slack, Matrix, Email, Webhook, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat) |\n| `all-channels` | Every available channel adapter |\n| `all-channels-no-email` | All channels except Email ŌĆö used for Android targets where `rustls-platform-verifier` lacks `new_with_extra_roots` support |\n| `channel-<name>` | Individual channel feature ŌĆö forwarded directly to `librefang-channels` |\n\nTo build with all channels:\n\n```bash\ncargo build -p librefang-api --features all-channels\n```\n\nFor release packaging, opt in explicitly via `--features all-channels`. Plain `cargo build` compiles only the core set.\n\n### Telemetry Feature\n\nThe `telemetry` feature (enabled by default) pulls in:\n\n- **OpenTelemetry** tracing export (`opentelemetry`, `opentelemetry-otlp`)\n- **Prometheus** metrics export (`metrics`, `metrics-exporter-prometheus`)\n- `tracing-opentelemetry` bridge\n\nDisable for lighter builds:\n\n```bash\ncargo build -p librefang-api --no-default-features --features core-channels\n```\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks:\n\n1. **Dashboard static directory** ŌĆö Ensures `static/react/` exists so the `include_dir!` macro (which embeds dashboard assets at compile time) never fails on fresh clones. The directory is gitignored because it's populated either by `npm run build` in the dashboard subcrate or by downloading release assets at runtime. When empty, nothing is embedded and the runtime falls back to `~/.librefang/dashboard/`.\n\n2. **Build metadata** ŌĆö Injects the following as compile-time environment variables, accessible via `env!()`:\n   - `GIT_SHA` ŌĆö Short git commit hash (e.g. `a1b2c3d`), or `\"unknown\"`\n   - `BUILD_DATE` ŌĆö UTC date in `YYYY-MM-DD` format\n   - `RUSTC_VERSION` ŌĆö Full `rustc --version` output\n\n3. **No outgoing calls** ŌĆö The build script is self-contained; it does not call into other crates at build time.\n\n## Key Dependencies and Their Roles\n\n### Web Framework Stack\n\n- **`axum`** + **`tower`** + **`tower-http`** ŌĆö HTTP server, middleware, and utility layers (CORS, compression, tracing, etc.)\n- **`utoipa`** (with `axum_extras`) ŌĆö OpenAPI 3.0 schema generation; the API is self-documenting\n- **`governor`** ŌĆö Rate limiting middleware\n\n### Authentication & Security\n\n- **`jsonwebtoken`** ŌĆö JWT token creation and validation\n- **`argon2`** ŌĆö Password hashing for credential storage\n- **`hmac`** + **`sha2`** ŌĆö HMAC-SHA256 for API key signing and webhook verification\n- **`subtle`** ŌĆö Constant-time comparisons to prevent timing attacks\n- **`base64`** ŌĆö Encoding for tokens and keys\n\n### Core Integration Crates\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions (request/response schemas, domain types) |\n| `librefang-kernel` | Agent kernel ŌĆö orchestration, conversation management |\n| `librefang-runtime` | Process registry, runtime state management |\n| `librefang-llm-drivers` | LLM provider integrations (OpenAI, Anthropic, local models, etc.) |\n| `librefang-memory` | Conversation history, long-term memory storage |\n| `librefang-channels` | Messaging channel adapters (Telegram, Discord, etc.) |\n| `librefang-wire` | Wire protocol definitions for inter-service communication |\n| `librefang-skills` | Skill/plugin execution framework |\n| `librefang-hands` | Tool-use / action execution capabilities |\n| `librefang-extensions` | Extension system, including vault for secrets |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-http` | Shared HTTP client configuration |\n| `librefang-telemetry` | Tracing and metrics infrastructure |\n\n### Utility Dependencies\n\n- **`dashmap`** ŌĆö Concurrent hash maps for in-memory state\n- **`portable-pty`** ŌĆö Pseudo-terminal management for interactive shell sessions\n- **`tokio-stream`** ŌĆö Async stream utilities for WebSocket/SSE endpoints\n- **`tokio`** ŌĆö Async runtime\n- **`flate2`** + **`tar`** + **`zip`** ŌĆö Archive handling (likely for extension packaging, backup/restore)\n- **`walkdir`** ŌĆö Directory traversal for file operations\n- **`url`** ŌĆö URL parsing and manipulation\n- **`serde`** + **`serde_json`** + **`toml`** + **`toml_edit`** ŌĆö Serialization and configuration\n- **`schemars`** ŌĆö JSON Schema generation from Rust types (works with `utoipa` for OpenAPI docs)\n- **`include_dir`** ŌĆö Embeds the React dashboard at compile time\n\n### Platform-Specific (Unix only)\n\n- **`rustix`** (with `process` feature) ŌĆö Low-level Unix process operations\n- **`libc`** ŌĆö FFI bindings for system calls\n\n## Adding a New Channel Adapter\n\n1. Implement the channel in `librefang-channels` behind a new feature flag (e.g. `channel-mychannel`).\n2. Add a corresponding feature in `librefang-api/Cargo.toml`:\n   ```toml\n   channel-mychannel = [\"librefang-channels/channel-mychannel\"]\n   ```\n3. If it should be in `core-channels`, add it there ŌĆö but verify its dependency tree is lightweight (only `reqwest` + `rustls`). If it pulls in heavy or unmaintained transitive dependencies, leave it out of `core-channels` and document it as opt-in.\n4. Add it to `all-channels` (and `all-channels-no-email` if it isn't `channel-email`).\n5. Update `librefang-cli`'s feature forwarding if applicable.\n\n## Development Dependencies\n\n- **`tempfile`** ŌĆö Temporary directories for test fixtures\n- **`librefang-testing`** ŌĆö Test utilities and mock infrastructure\n- **`http-body-util`** ŌĆö HTTP body inspection in tests\n- **`totp-rs`** ŌĆö TOTP generation/verification for 2FA testing","other-librefang-channels-benches":"# Other ŌĆö librefang-channels-benches\n\n# librefang-channels-benches ŌĆö Dispatch Hot-Path Benchmarks\n\n## Overview\n\nThis module contains Criterion-based microbenchmarks that profile the performance-critical paths in `librefang-channels`. It targets three subsystems that execute on every inbound or outbound message: JSON serialization, agent routing resolution, and output format conversion.\n\nThe benchmarks live in a single file ŌĆö `benches/dispatch.rs` ŌĆö and are organized into three Criterion groups: `serialization`, `routing`, and `formatting`. Each group can be run independently or together via `cargo bench`.\n\n## Benchmark Groups\n\n### Serialization\n\n| Benchmark | What it measures |\n|---|---|\n| `message_serialize` | `serde_json::to_string` on a typical `ChannelMessage` |\n| `message_deserialize` | `serde_json::from_str` parsing the same JSON back |\n| `message_roundtrip` | Serialize then deserialize in one iteration |\n\nAll three share a single fixture ŌĆö `make_sample_message()` ŌĆö which constructs a representative `ChannelMessage` with a Telegram channel, a text content body, a sender with no linked user, and a current UTC timestamp. This fixture exercises the full struct layout including the `metadata` HashMap (empty) and optional fields (`target_agent`, `thread_id`, `librefang_user`) set to `None`.\n\n**What to watch for:** regressions here indicate either `serde_json` version drift or changes to the `ChannelMessage` / `ChannelContent` / `ChannelUser` type definitions that add expensive fields or custom serializers.\n\n### Routing\n\n| Benchmark | Router state | Resolution path |\n|---|---|---|\n| `router_resolve_direct` | One direct route for Telegram/user-42 + default agent | Hits the direct-route lookup (fastest path) |\n| `router_resolve_default_fallback` | Default agent only, querying Discord/unknown-user | Falls through all lookups to the default |\n| `router_resolve_binding_match` | One named agent (\"support\") with a channel+peer binding | Matches binding by channel and peer_id |\n| `router_resolve_with_context` | One named agent (\"admin-bot\") with a guild+role binding | Uses `resolve_with_context` with `BindingContext` including roles |\n\nThe routing benchmarks progressively exercise more of `AgentRouter`'s resolution logic:\n\n```mermaid\nflowchart LR\n    A[resolve / resolve_with_context] --> B{Direct route?}\n    B -- yes --> Z[Return agent]\n    B -- no --> C{Binding match?}\n    C -- yes --> Z\n    C -- no --> D{Default agent?}\n    D -- yes --> Z\n    D -- no --> E[None]\n```\n\n- **`router_resolve_direct`** exercises only the first hop ŌĆö a pre-registered direct route map lookup via `set_direct_route`.\n- **`router_resolve_default_fallback`** skips direct routes and bindings, landing on the default agent.\n- **`router_resolve_binding_match`** loads an `AgentBinding` with a `BindingMatchRule` that constrains on `channel` and `peer_id`, then resolves against a matching query.\n- **`router_resolve_with_context`** is the most complete: it registers an agent, loads a binding with `guild_id` and `roles` constraints, constructs a full `BindingContext` with borrowed `Cow` strings and a `smallvec` of roles, then calls `resolve_with_context`.\n\n**What to watch for:** regressions in `router_resolve_with_context` are the most concerning since that path runs on every inbound Discord message with role information. The binding match involves iterating loaded bindings and comparing multiple fields.\n\n### Formatting\n\n| Benchmark | Input | Output format |\n|---|---|---|\n| `format_markdown_passthrough` | Multi-paragraph markdown | `OutputFormat::Markdown` |\n| `format_telegram_html` | Multi-paragraph markdown | `OutputFormat::TelegramHtml` |\n| `format_slack_mrkdwn` | Multi-paragraph markdown | `OutputFormat::SlackMrkdwn` |\n| `format_plain_text` | Multi-paragraph markdown | `OutputFormat::PlainText` |\n| `format_telegram_html_short` | `\"Hello world!\"` | `OutputFormat::TelegramHtml` |\n| `split_message_short` | `\"Hello!\"` | Chunk threshold 4096 |\n| `split_message_long` | 500 repeated lines (~10 KB) | Chunk threshold 4096 |\n| `default_phase_emoji_all` | All six `AgentPhase` variants | Emoji lookup |\n\nThe `SAMPLE_MARKDOWN` constant is a realistic multi-paragraph string containing bold, italic, inline code, links, and bullet lists ŌĆö exercising the full markdown parser in `format_for_channel`. The short-text variant (`SHORT_TEXT = \"Hello world!\"`) measures baseline overhead when there's nothing to convert.\n\n`split_message` is benchmarked at two extremes: a string well under the 4096-character Telegram limit (single-chunk fast path) and a ~10 KB string that forces multiple splits.\n\n`default_phase_emoji_all` iterates through all `AgentPhase` variants ŌĆö `Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, `Error` ŌĆö to cover both static and dynamic (tool-use) phase emoji resolution.\n\n## Dependencies on Library Code\n\nThe benchmarks import from three library modules:\n\n| Library module | Symbols used |\n|---|---|\n| `librefang_channels::types` | `ChannelMessage`, `ChannelContent`, `ChannelUser`, `ChannelType`, `AgentPhase`, `default_phase_emoji`, `split_message` |\n| `librefang_channels::router` | `AgentRouter`, `BindingContext` |\n| `librefang_channels::formatter` | `format_for_channel` |\n| `librefang_types::agent` | `AgentId` |\n| `librefang_types::config` | `OutputFormat`, `AgentBinding`, `BindingMatchRule` |\n\n## Running the Benchmarks\n\n```bash\n# All groups\ncargo bench -p librefang-channels\n\n# Single group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n\n# Single benchmark\ncargo bench -p librefang-channels -- router_resolve_with_context\n```\n\nCriterion saves baseline results under `target/criterion/`. To compare against a previous run:\n\n```bash\ncargo bench -p librefang-channels -- --save-baseline main\n# ... make changes ...\ncargo bench -p librefang-channels -- --baseline main\n```\n\n## Adding New Benchmarks\n\n1. Write the benchmark function following the existing pattern ŌĆö create state outside the closure, use `black_box` on inputs, call the library function inside `b.iter(...)`.\n2. Add the function to the appropriate `criterion_group!` macro, or create a new group and append it to `criterion_main!`.\n3. For routing benchmarks, prefer constructing the `AgentRouter` state inside the benchmark function (not in a `lazy_static` or `once_cell`) so the setup cost is excluded from the measured iterations. The router setup happens before `b.iter()` begins.\n\n## Design Notes\n\n- **`black_box` usage:** Every input to the closure is wrapped in `black_box` to prevent the optimizer from constant-folding or eliding the work. Return values are consumed via `black_box` or type-annotated bindings.\n- **Realistic fixtures:** `make_sample_message` uses real field values and `Utc::now()` rather than minimal stubs, so serialization benchmarks reflect actual production payloads.\n- **Owned vs. borrowed:** The formatting benchmarks pass `&str` literals directly, while routing benchmarks construct `Cow::Borrowed` context values. Both patterns mirror how the library is called in production.","other-librefang-channels-tests":"# Other ŌĆö librefang-channels-tests\n\n# librefang-channels Integration Tests\n\n## Overview\n\nThe `bridge_integration_test.rs` module provides end-to-end validation of the `BridgeManager` dispatch pipeline. Tests wire real production components (`BridgeManager`, `AgentRouter`) to mock adapters and kernel handles, verifying the full message lifecycle ŌĆö from injection through routing, dispatch, and response delivery ŌĆö entirely in-process via tokio channels. No external services are contacted.\n\n## Architecture\n\n```mermaid\ngraph LR\n    TX[\"mpsc::Sender<br/>(inject messages)\"] --> MA[\"MockAdapter<br/>(implements ChannelAdapter)\"]\n    MA -->|\"start() ŌåÆ Stream\"| BM[\"BridgeManager<br/>(production code)\"]\n    BM --> AR[\"AgentRouter<br/>(resolve user ŌåÆ agent)\"]\n    BM --> MH[\"MockHandle<br/>(implements ChannelBridgeHandle)\"]\n    MH -->|\"response\"| BM\n    BM -->|\"send() / send_streaming()\"| MA\n```\n\nEvery test follows this pattern:\n1. Create a `MockHandle` (or variant) with known agents.\n2. Create an `AgentRouter`, optionally pre-routing users to agents.\n3. Create a `MockAdapter` (or variant), obtaining an `mpsc::Sender` for message injection.\n4. Construct a `BridgeManager` and call `start_adapter()`.\n5. Inject messages via the sender.\n6. Poll with `wait_until` until the adapter captures the expected response.\n7. Assert on response content and side effects.\n8. Call `manager.stop()`.\n\n## Test Infrastructure\n\n### `wait_until` ŌĆö Condition-Based Polling\n\n```rust\nasync fn wait_until<F>(label: &str, mut cond: F) where F: FnMut() -> bool\n```\n\nReplaces fixed `sleep()` waits with a 2-second deadline-bounded poll loop (5ms interval). Tests fail fast on regression rather than flaking on slow CI runners. The `label` parameter appears in the timeout panic message for quick diagnosis.\n\n**When to use**: Every async assertion in this suite. Never use raw `tokio::time::sleep`.\n\n### Message Constructors\n\n- **`make_text_msg(channel, user_id, text)` ŌåÆ `ChannelMessage`** ŌĆö Builds a text content message with sensible defaults (single sender, no group, no thread, no metadata).\n- **`make_command_msg(channel, user_id, cmd, args)` ŌåÆ `ChannelMessage`** ŌĆö Builds a `ChannelContent::Command` variant. Used for `/agents`, `/help`, `/agent`, `/status`.\n\n## Mock Adapters\n\n### `MockAdapter`\n\nBasic adapter that captures `send()` calls as `(platform_id, text)` pairs in `self.sent`. The `send()` implementation flattens `Interactive` content button labels into the text for test inspection.\n\n| Method | Behavior |\n|--------|----------|\n| `new(name, channel_type)` | Returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`. Use the sender to inject messages. |\n| `get_sent()` | Returns a clone of all captured `(platform_id, text)` pairs. |\n| `start()` | Converts the `mpsc::Receiver` into a `ReceiverStream`. Can only be called once. |\n| `supports_streaming()` | Returns `false`. |\n\n### `MockStreamingAdapter`\n\nStreaming-capable variant that overrides `supports_streaming() ŌåÆ true` and `send_streaming()`. Accumulates streamed deltas into `self.streamed` as `(platform_id, full_text)` pairs. Non-streaming `send()` writes to a separate `self.sent` vector, allowing tests to verify which path was taken.\n\n| Method | Behavior |\n|--------|----------|\n| `get_streamed()` | Captured streaming deliveries. |\n| `get_sent()` | Captured non-streaming deliveries. |\n| `send_streaming(user, delta_rx, _thread_id)` | Reads all deltas from `delta_rx`, concatenates, and stores in `streamed`. |\n\n### `MockFailingStreamingAdapter`\n\nReports `supports_streaming() ŌåÆ true` but `send_streaming()` always returns `Err(\"simulated transport failure\")`. Drains `delta_rx` before failing so the bridge's internal tee task can populate `buffered_text` for the fallback path. Used to exercise error recovery branches.\n\n## Mock Kernel Handles\n\nAll implement `ChannelBridgeHandle`. Each variant targets a specific dispatch scenario.\n\n### `MockHandle`\n\nBasic handle. `send_message` records the `(agent_id, message)` in `self.received` and returns `\"Echo: {message}\"`. Supports `find_agent_by_name`, `list_agents`. `spawn_agent_by_name` returns `Err`.\n\n### `MockStreamingHandle`\n\nAdds `send_message_streaming` which emits the echo response as individual word deltas over an `mpsc::Receiver<String>`. Used to verify that streaming-capable adapters receive deltas token-by-token.\n\n### `MockProgressHandle`\n\nImplements `send_message_streaming_with_sender_status`. Synthesizes a progress marker line (`­¤ö¦ tool_name`) followed by prose text ŌĆö mirroring what `start_stream_text_bridge_with_status` produces in production. Returns a status oneshot reporting `Ok(())`.\n\n### `MockKernelErrorHandle`\n\nLike `MockProgressHandle` but the status oneshot reports `Err(\"rate limit hit\")`. Exercises the path where the kernel fails after streaming partial content.\n\n### `MockKernelOkHandle`\n\nStreaming-with-status handle that emits clean text and reports kernel success (`Ok(())`). Also implements `record_delivery`, logging each call as `(success, Option<error_string>)` into a `DeliveryLog`. Used to verify the Bug 1 fix ŌĆö that `success=true` is never paired with a non-empty error string.\n\n## Test Suite\n\n### Basic Dispatch\n\n| Test | What it validates |\n|------|-------------------|\n| `test_bridge_dispatch_text_message` | Text messages route through the pre-configured userŌåÆagent mapping, the kernel receives the message, and the echo response is delivered back via `send()`. |\n| `test_bridge_dispatch_no_agent_assigned` | Unrouted users receive a \"No agents available\" message instead of silent failure. |\n\n### Command Dispatch\n\n| Test | What it validates |\n|------|-------------------|\n| `test_bridge_dispatch_agents_command` | `/agents` lists all running agents by name. |\n| `test_bridge_dispatch_help_command` | `/help` returns text mentioning `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` updates the router so subsequent messages from that user route to the selected agent. Verifies both the confirmation message and `router.resolve()` state. |\n| `test_bridge_dispatch_status_command` | `/status` returns a message containing the agent count. |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text `/agents` (not `ChannelContent::Command`) is still parsed and handled as a command. |\n\n### Lifecycle and Multi-Adapter\n\n| Test | What it validates |\n|------|-------------------|\n| `test_bridge_manager_lifecycle` | Start, send 5 sequential messages, verify all 5 echo responses arrive in order, then `stop()` completes without hanging. |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run simultaneously on the same `BridgeManager`. Messages injected into each adapter produce responses on the correct adapter only. |\n\n### Streaming\n\n| Test | What it validates |\n|------|-------------------|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both the adapter and handle support streaming, `send_streaming` is called (not `send()`). The streamed text contains the echo. `sent` remains empty. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter doesn't support streaming, `send()` is used even with a streaming-capable handle. |\n| `test_default_send_streaming_collects_and_sends` | The default `send_streaming` implementation on `ChannelAdapter` collects all deltas and calls `self.send()` with the assembled text. Tested by directly invoking the method on a `MockAdapter`. |\n\n### Progress Markers (V2 Contract)\n\n| Test | What it validates |\n|------|-------------------|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapters (Discord, Slack, etc.) receive progress markers (­¤ö¦) as part of the consolidated response text. Verifies the V2 pipeline: `send_message_streaming_with_sender_status` ŌåÆ default `send_streaming` fallback ŌåÆ `send()`. |\n\n### Error Paths\n\n| Test | What it validates |\n|------|-------------------|\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | When `send_streaming` returns `Err` and the kernel status is also `Err`, the fallback path delivers buffered partial content via `send()`. Progress markers and partial text are preserved. |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression test.** When the kernel succeeds but `send_streaming` fails, the fallback delivers buffered text and `record_delivery` is called with `(success=true, err=None)`. The transport-side stream error must not leak into the err field. |\n\n## Adding New Tests\n\n1. **Choose your mock**: Pick or create a mock adapter/handle combination that produces the behavior you need.\n2. **Set up routing**: Call `router.set_user_default(user_id, agent_id)` if the test requires a resolved agent.\n3. **Inject messages**: Use `tx.send(make_text_msg(...))` or `make_command_msg(...)`.\n4. **Poll for results**: Always use `wait_until` with a descriptive label.\n5. **Assert on side effects**: Check `adapter.get_sent()`, `adapter.get_streamed()`, `handle.received`, or `handle.deliveries()` as appropriate.\n6. **Clean up**: Call `manager.stop().await`.\n\n## Dependencies on Production Code\n\n| Production type | Usage |\n|----------------|-------|\n| `BridgeManager` | The system under test. Tests construct it with mocks and call `start_adapter` / `stop`. |\n| `AgentRouter` | Real router instance. Tests call `set_user_default` and `resolve` directly. |\n| `ChannelAdapter` trait | Implemented by all mock adapters. Tests may call `send_streaming` directly for unit-level verification. |\n| `ChannelBridgeHandle` trait | Implemented by all mock handles. Defines the kernel-side contract. |\n| `ChannelMessage`, `ChannelUser`, `ChannelContent`, `ChannelType` | Message types from `librefang_channels::types`. |\n| `AgentId` | Agent identifier from `librefang_types::agent`. |","other-librefang-channels":"# Other ŌĆö librefang-channels\n\n# librefang-channels\n\nPluggable channel bridge layer for LibreFang ŌĆö provides messaging adapter integrations for 40+ platforms and protocols.\n\n## Overview\n\n`librefang-channels` is a feature-gated crate that isolates every third-party messaging integration behind individual Cargo feature flags. Downstream workspace members (`librefang-api`, `librefang-cli`, `librefang-desktop`) depend on this crate with `default-features = false` and enable only the channel adapters they need.\n\nThis design keeps compile times and binary size minimal for any given deployment ŌĆö you only pay for the integrations you actually use.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api\"] --> CH[\"librefang-channels\"]\n    CLI[\"librefang-cli\"] --> CH\n    DESK[\"librefang-desktop\"] --> CH\n    CH --> TYPES[\"librefang-types\"]\n    CH --> ADAPTERS[\"Channel Adapters\"]\n    ADAPTERS --> A1[\"channel-telegram\"]\n    ADAPTERS --> A2[\"channel-discord\"]\n    ADAPTERS --> A3[\"channel-slack\"]\n    ADAPTERS --> A44[\"... (44 total)\"]\n```\n\nAll adapters share a common interface defined against types from `librefang-types`, allowing the rest of the codebase to dispatch messages uniformly regardless of the target platform.\n\n## Feature Flags\n\n### No default features\n\nThe `default` feature set is intentionally **empty**. Every consumer must explicitly declare which channels it requires. This avoids the pitfalls of a previous design where ~25 channels were enabled by default and often drifted out of sync with `all-channels` (see issue #3655).\n\n### Enabling a single channel\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", default-features = false, features = [\"channel-telegram\", \"channel-discord\"] }\n```\n\n### Enabling all channels\n\nThe `all-channels` feature is a meta-feature that activates every adapter the crate ships:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", features = [\"all-channels\"]
