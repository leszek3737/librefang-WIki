lt caches the resolved master key after first unlock to avoid repeated keyring/env lookups.\n\n### File Format Compatibility\n\nThe `load()` method handles both current format (`OFV1` + JSON) and legacy format (bare JSON starting with `{`). Unrecognized binary data produces an \"Unrecognized vault file format\" error.\n\n---\n\n## Credential Resolution (`credentials.rs`)\n\n`CredentialResolver` tries multiple sources in priority order:\n\n```\n1. Vault (if unlocked)     ← highest priority\n2. Dotenv file (~/.librefang/.env)\n3. Process environment (std::env)\n4. Interactive prompt       ← CLI only, when enabled\n```\n\n### Usage\n\n```rust\nlet vault = CredentialVault::new(vault_path);\nlet resolver = CredentialResolver::new(\n    Some(vault),\n    Some(Path::new(\"~/.librefang/.env\")),\n).with_interactive(true);\n\n// Resolve single credential\nlet token = resolver.resolve(\"GITHUB_TOKEN\"); // Option<Zeroizing<String>>\n\n// Check availability (no prompt)\nif resolver.has_credential(\"GITHUB_TOKEN\") { ... }\n\n// Batch resolve\nlet creds = resolver.resolve_all(&[\"KEY_A\", \"KEY_B\", \"KEY_C\"]);\n\n// Find missing\nlet missing = resolver.missing_credentials(&[\"KEY_A\", \"KEY_B\"]);\n```\n\n### Storing Credentials\n\n```rust\n// Store in vault via resolver\nresolver.store_in_vault(\"GITHUB_TOKEN\", Zeroizing::new(\"ghp_xxx\".to_string()))?;\n```\n\n### Cache Invalidation\n\nIf a key is deleted externally (e.g., via the dashboard), call `clear_dotenv_cache(&mut resolver, \"KEY\")` to prevent stale values from the boot-time snapshot.\n\n---\n\n## Dotenv Loader (`dotenv.rs`)\n\nInjects secrets into `std::env` so every entry point (CLI, desktop, kernel) loads them identically. **Must be called from synchronous `main()` before spawning any tokio runtime** — `std::env::set_var` is UB in Rust 1.80+ once other threads exist.\n\n### Priority (highest first)\n\n1. System environment variables (never overridden)\n2. Credential vault (`vault.enc`)\n3. `.env` file\n4. `secrets.env` file\n\n```rust\n// Call once at startup\nlibrefang_extensions::dotenv::load_dotenv();\n```\n\nProtected by `Once` — repeated calls are no-ops.\n\n### Key Management\n\n```rust\ndotenv::save_env_key(\"MY_KEY\", \"my_value\")?;  // upserts in .env + sets in process\ndotenv::remove_env_key(\"MY_KEY\")?;             // removes from .env + unsets in process\ndotenv::list_env_keys();                        // key names only (no values)\n```\n\nFiles are created with `0600` permissions on Unix. Values containing spaces, `#`, or `\"` are automatically quoted on write.\n\n---\n\n## Installer (`installer.rs`)\n\nPure transforms — no side effects. The caller (API/CLI handler) decides when to persist the returned `McpServerConfigEntry` to `config.toml`.\n\n### `install_integration`\n\n```rust\nlet result: InstallResult = install_integration(\n    &catalog,\n    &mut resolver,\n    \"github\",                           // catalog entry ID\n    &provided_keys,                      // HashMap<String, String>\n)?;\n```\n\nSteps:\n1. Look up `McpCatalogEntry` by ID\n2. Store provided credentials in vault (best effort — warns on failure)\n3. Check which `required_env` keys still have no credential\n4. Build `McpServerConfigEntry` with `template_id` set\n5. Return `InstallResult` with status (`Ready` if all creds present, `Setup` if missing)\n\n### `catalog_entry_to_mcp_server`\n\nConverts any `McpCatalogEntry` into a `McpServerConfigEntry`. Sets `template_id`, maps transport types, copies env var names, and converts OAuth templates.\n\n### Scaffolding\n\n```rust\n// Create a template TOML for a new custom MCP server\nscaffold_integration(&dir)?;\n\n// Create a skill scaffold (skill.toml + SKILL.md)\nscaffold_skill(&dir)?;\n```\n\n---\n\n## OAuth (`oauth.rs`)\n\nOAuth2 PKCE flows for Google, GitHub, Microsoft, and Slack. Launches a temporary localhost HTTP server, opens the browser, receives the callback, and exchanges the authorization code for tokens.\n\n### PKCE Flow\n\n```rust\nlet tokens: OAuthTokens = run_pkce_flow(&oauth_template, &client_id).await?;\n```\n\nFlow:\n1. Generate PKCE verifier + SHA-256 challenge\n2. Bind to `127.0.0.1:0` (random port)\n3. Build authorization URL with `code_challenge_method=S256`\n4. Open browser (or print URL to stderr)\n5. Serve `/callback` via axum with 5-minute timeout\n6. Validate `state` parameter (CSRF protection)\n7. Exchange code + verifier for tokens at the token endpoint\n8. Shut down callback server, return `OAuthTokens`\n\nAll tokens are accessible as `Zeroizing<String>` via `access_token_zeroizing()` and `refresh_token_zeroizing()`.\n\n### Client ID Resolution\n\n```rust\nlet ids = resolve_client_ids(&oauth_config);\n```\n\nDefault placeholder IDs are overridden by values from `librefang_types::config::OAuthConfig` fields (`google_client_id`, `github_client_id`, etc.). PKCE doesn't require a client secret, so embedded public IDs are safe.\n\n---\n\n## Health Monitor (`health.rs`)\n\nTracks MCP server status with auto-reconnect using exponential backoff.\n\n### Configuration\n\n```rust\nlet config = HealthMonitorConfig {\n    auto_reconnect: true,\n    max_reconnect_attempts: 10,\n    max_backoff_secs: 300,\n    check_interval_secs: 60,\n};\nlet monitor = HealthMonitor::new(config);\n```\n\n### Tracking Health\n\n```rust\nmonitor.register(\"github\");\nmonitor.report_ok(\"github\", 12);        // 12 tools available\nmonitor.report_error(\"github\", \"timeout\".to_string());\nmonitor.mark_reconnecting(\"github\");\n```\n\n### `McpHealth` Fields\n\n| Field | Description |\n|-------|-------------|\n| `status` | Current `McpStatus` |\n| `tool_count` | Number of tools from last successful check |\n| `last_ok` | Timestamp of last successful check |\n| `last_error` | Most recent error message |\n| `consecutive_failures` | Unbroken failure streak |\n| `reconnecting` | Whether a reconnect attempt is in progress |\n| `reconnect_attempts` | Total reconnect attempts since last success |\n| `connected_since` | Uptime since last successful connect |\n\n### Backoff Calculation\n\n```\nattempt 0 → 5s\nattempt 1 → 10s\nattempt 2 → 20s\nattempt 3 → 40s\n...\ncapped at max_backoff_secs (default: 300s)\n```\n\n`should_reconnect(id)` returns `true` only when the server is in `Error` status and attempts haven't been exhausted.\n\n### Thread Safety\n\n`HealthMonitor` uses `Arc<DashMap<String, McpHealth>>` internally — safe to share across the health-check background task and API handlers. Access the raw map via `health_map()` for custom background loops.\n\n---\n\n## HTTP Client (`http_client.rs`)\n\nInternal utility that builds a `reqwest::Client` with proper TLS roots. Tries native CA certificates first; falls back to `webpki-roots` if none are found. Use `new_client()` for a ready-built client or `client_builder()` to customize before building.\n\n---\n\n## Integration Points\n\n### From the Kernel\n\nThe kernel's `mcp_oauth_provider` calls `vault.unlock()` → `resolve_master_key()` → `load_keyring_key()` → `machine_fingerprint()` when accessing OAuth tokens. This happens during TOTP setup/confirm/revoke and MCP auth callbacks.\n\n### From the API Server\n\n`librefang-api` calls `dotenv::load_dotenv()` at startup, then uses `vault.unlock()` during dashboard session token resolution for request authorization.\n\n### From the Runtime\n\n`librefang_runtime::registry_sync` populates the catalog files on disk. This crate reads them via `McpCatalog::load()`.","hands":"# Hands\n\n# Hands Module\n\n## Overview\n\nA **Hand** is a pre-built, domain-complete autonomous agent configuration that users activate from a marketplace. The distinction from regular agents is intentional: you chat with agents, but Hands work *for* you — you check in on them rather than drive them interactively.\n\nEach Hand is defined by a `HAND.toml` file (optionally with a `SKILL.md` and per-agent `SKILL-{role}.md` files) and managed at runtime by the `HandRegistry`. The kernel spawns the underlying agents, but all definition parsing, instance tracking, state persistence, and requirement checking live here.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[HAND.toml + SKILL.md] -->|parsed by| B[HandDefinition]\n    B -->|registered in| C[HandRegistry]\n    C -->|activate| D[HandInstance]\n    C -->|persist_state| E[hand_state.json]\n    E -->|load_state| C\n    D -->|agent_ids set by kernel| F[agent_index]\n    F -->|find_by_agent| G[reverse lookup O(1)]\n    H[agents_dir / base templates] -->|deep merged| B\n```\n\n## Core Types\n\n### `HandDefinition`\n\nThe parsed representation of a `HAND.toml`. Holds everything the registry and kernel need:\n\n- **Identity**: `id`, `version`, `name`, `description`, `category`, `icon`\n- **Agent manifests**: `agents` — a `BTreeMap<String, HandAgentManifest>` keyed by role name\n- **Capabilities**: `tools`, `skills`, `mcp_servers`, `allowed_plugins`\n- **User-facing config**: `settings` (shown in activation modal), `requires` (prerequisites)\n- **Dashboard**: `dashboard.metrics` — declares what structured-memory keys to surface\n- **Routing**: `routing.aliases` and `routing.weak_aliases` for deterministic hand selection\n- **Metadata**: `metadata.frequency`, `metadata.token_consumption`, `metadata.activation_warning`\n- **Localization**: `i18n` — a map of language codes to translated strings\n\nSupports two agent formats that are normalized to the same internal representation:\n\n| Format | TOML structure | Internal storage |\n|--------|---------------|-----------------|\n| **Single-agent** | `[agent]` | `{\"main\": HandAgentManifest { coordinator: true, ... }}` |\n| **Multi-agent** | `[agents.planner]`, `[agents.analyst]`, ... | One entry per role |\n\nThe `coordinator()` method returns whichever agent has `coordinator = true`, falling back to the first entry by role name. The backward-compatible `agent()` accessor returns the coordinator's underlying `AgentManifest`.\n\n### `HandAgentManifest`\n\nWraps an `AgentManifest` with hand-specific fields:\n\n- `coordinator: bool` — marks the agent that receives user messages\n- `invoke_hint: Option<String>` — injected into the coordinator's system prompt as a dispatch guide for multi-agent setups\n- `base: Option<String>` — references a shared agent template for DRY configuration\n\n### `HandInstance`\n\nA runtime record linking a `HandDefinition` to its spawned agents. Created by `HandRegistry::activate`, populated with agent IDs by the kernel via `set_agents`.\n\nKey fields:\n- `instance_id: Uuid` — unique per activation\n- `hand_id: String` — which definition this is an instance of\n- `status: HandStatus` — `Active`, `Paused`, `Error(String)`, or `Inactive`\n- `agent_ids: BTreeMap<String, AgentId>` — role name → spawned agent ID\n- `coordinator_role: Option<String>` — explicitly tracked so routing doesn't have to guess\n- `config: HashMap<String, serde_json::Value>` — user's setting choices at activation time\n\nThe `coordinator_agent_id()` method resolves the coordinator role and returns its `AgentId`, used by the kernel and HTTP routes to direct user messages.\n\n### `HandStatus`\n\n```rust\npub enum HandStatus {\n    Active,\n    Paused,\n    Error(String),\n    Inactive,\n}\n```\n\nActive and Paused instances are persisted across daemon restarts. Error and Inactive instances are skipped during state recovery.\n\n## HAND.toml Format\n\nHands support both a flat format (all fields at the top level) and a wrapped format (fields under a `[hand]` section). The parser tries flat first, then falls back to wrapped.\n\n### Single-agent example\n\n```toml\nid = \"clip\"\nversion = \"1.2.0\"\nname = \"Clip Hand\"\ndescription = \"Autonomous video clipping\"\ncategory = \"content\"\nicon = \"🎬\"\ntools = [\"shell_exec\"]\nskills = []\nmcp_servers = []\n\n[[requires]]\nkey = \"ffmpeg\"\nlabel = \"FFmpeg must be installed\"\nrequirement_type = \"binary\"\ncheck_value = \"ffmpeg\"\ndescription = \"Core video processing engine.\"\n\n[requires.install]\nmacos = \"brew install ffmpeg\"\nlinux_apt = \"sudo apt install ffmpeg\"\nmanual_url = \"https://ffmpeg.org/download.html\"\nestimated_time = \"2-5 min\"\n\n[[settings]]\nkey = \"stt_provider\"\nlabel = \"STT Provider\"\nsetting_type = \"select\"\ndefault = \"auto\"\n\n[[settings.options]]\nvalue = \"groq\"\nlabel = \"Groq Whisper\"\nprovider_env = \"GROQ_API_KEY\"\n\n[agent]\nname = \"clip-agent\"\ndescription = \"Clips videos\"\nsystem_prompt = \"You are a video clipping assistant.\"\n\n[dashboard]\nmetrics = []\n\n[routing]\naliases = [\"video editor\", \"clip maker\"]\nweak_aliases = [\"cut video\"]\n\n[metadata]\nfrequency = \"on-demand\"\ntoken_consumption = \"medium\"\n```\n\n### Multi-agent example\n\n```toml\nid = \"research\"\nname = \"Research Hand\"\ncategory = \"content\"\ntools = []\n\n[agents.planner]\ncoordinator = true\ninvoke_hint = \"Use planner for task decomposition\"\nname = \"planner-agent\"\n\n[agents.planner.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nsystem_prompt = \"You plan research tasks.\"\n\n[agents.analyst]\nname = \"analyst-agent\"\n\n[agents.analyst.model]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\nsystem_prompt = \"You analyze data.\"\n```\n\n## Hand Registry (`HandRegistry`)\n\nThe central runtime store, built on `DashMap` for lock-free concurrent reads. Thread-safe (`Send + Sync`).\n\n### Internal structure\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `definitions` | `DashMap<String, HandDefinition>` | All known hand definitions by ID |\n| `instances` | `DashMap<Uuid, HandInstance>` | Active instances by instance UUID |\n| `agent_index` | `DashMap<String, Uuid>` | Agent ID string → instance UUID (O(1) reverse lookup) |\n| `active_index` | `DashMap<String, Uuid>` | Hand ID → active instance UUID |\n| `activate_lock` | `Mutex<()>` | Serializes check-then-insert to prevent duplicate activations |\n| `persist_lock` | `Mutex<()>` | Guards concurrent writes to `hand_state.json` |\n\n### Definition management\n\n**`reload_from_disk(home_dir)`** — Scans two directories:\n1. `{home_dir}/registry/hands/` — read-only, reset on every registry sync\n2. `{home_dir}/workspaces/` — user-writable, survives syncs\n\nSubdirectories containing `HAND.toml` are parsed. Registry entries take precedence on ID collision. Returns `(added, updated)` counts.\n\n**`install_from_path(path, home_dir)`** — Install from a local directory. Reads `HAND.toml`, `SKILL.md`, and any `SKILL-{role}.md` files. Resolves `base` templates from `{home_dir}/registry/agents/`.\n\n**`install_from_content(toml_content, skill_content)`** — API-based install from raw strings. Rejects hands that use `base` template references (no filesystem access). Does not persist to disk.\n\n**`install_from_content_persisted(home_dir, toml_content, skill_content)`** — Same as above but writes to `{home_dir}/workspaces/{id}/` so the hand survives restarts.\n\n**`uninstall_hand(home_dir, hand_id)`** — Three guard clauses:\n1. `NotFound` — hand ID not in registry\n2. `BuiltinHand` — no `workspaces/{id}/HAND.toml` exists (lives in registry, would be recreated on next sync)\n3. `AlreadyActive` — a live instance exists; caller must deactivate first\n\nOn success, removes the definition from memory and deletes the workspace directory.\n\n### Instance lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Active: activate()\n    Active --> Paused: pause()\n    Paused --> Active: resume()\n    Active --> Error: set_error()\n    Error --> Active: resume()\n    Active --> [*]: deactivate()\n    Paused --> [*]: deactivate()\n```\n\n**`activate(hand_id, config)`** — Creates a `HandInstance` with a fresh UUID. The mutex-locked check prevents two concurrent requests from both passing the \"already active\" guard. Agent spawning is done by the kernel after this returns.\n\n**`activate_with_id(...)`** — Variant that accepts an explicit `instance_id` and optional timestamps, used during daemon restart recovery to keep deterministic agent IDs stable.\n\n**`set_agents(instance_id, agent_ids, coordinator_role)`** — Called by the kernel after spawning agents. Updates the instance's `agent_ids` map and rebuilds the `agent_index` reverse mapping. The coordinator role is normalized: explicit declaration → single-agent fallback → \"main\" key fallback → first key.\n\n**`deactivate(instance_id)`** — Removes the instance and cleans up both reverse indexes. If another active instance of the same hand exists, it takes over the `active_index` entry.\n\n### State persistence\n\n**`persist_state(path)`** — Serializes all non-Inactive instances to `hand_state.json` (format version 4). Each entry includes `hand_id`, `instance_id`, `config`, `agent_ids`, `coordinator_role`, `status`, and timestamps.\n\n**`load_state(path)`** — Static method. Handles four format versions:\n- **v4**: Typed `PersistedState` with explicit `version` field\n- **v3**: Same structure, `instances` array\n- **v2/v1**: `agent_id` as a single value (converted to `{\"main\": id}`)\n\nSkips `Error` and `Inactive` instances during recovery. Returns `Vec<HandStateEntry>` for the kernel to re-activate.\n\n### Readiness and requirements\n\n**`readiness(hand_id)`** — Returns a `HandReadiness` snapshot combining requirement checks with activation state:\n\n```rust\npub struct HandReadiness {\n    pub requirements_met: bool,  // all mandatory requirements satisfied\n    pub active: bool,            // at least one Active instance\n    pub degraded: bool,          // active but some requirement (optional or not) unmet\n}\n```\n\nOptional requirements (`req.optional = true`) don't block activation but contribute to the `degraded` flag.\n\n**`check_requirements(hand_id)`** — Evaluates each `HandRequirement`:\n\n| `RequirementType` | Check |\n|---|---|\n| `Binary` | `which_binary()` — scans PATH for the executable; special handling for `python3` (runs `--version` and checks output) and `chromium` (tries multiple binary names + `CHROME_PATH` env) |\n| `EnvVar` / `ApiKey` | `std::env::var` is set and non-empty |\n| `AnyEnvVar` | Comma-separated list in `check_value`; any one being set passes |\n\n**`check_settings_availability(hand_id, lang)`** — For each setting option, checks whether its `provider_env` is set and/or its `binary` is on PATH. Returns `SettingStatus` with per-option `available` flags. Applies i18n label/description overrides when a language is requested.\n\n## Settings Resolution\n\nThe `resolve_settings()` function takes a hand's settings schema and a user's config choices, producing:\n\n1. **`prompt_block`** — Markdown appended to the system prompt (e.g. `## User Configuration\\n- STT Provider: Groq Whisper (groq)`)\n2. **`env_vars`** — Environment variable names the agent subprocess should have access to\n\nFor `Select` settings, only the chosen option's `provider_env` is collected. For `Text` settings with an `env_var` field, that env var is included when the value is non-empty. `Toggle` settings render as \"Enabled\"/\"Disabled\".\n\n## Base Template System\n\nAgents in multi-agent hands can reference a shared template via `base = \"template-name\"`:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"my-writer\"\n\n[agents.writer.model]\nsystem_prompt = \"You are a blog post writer.\"\n```\n\nThe resolution flow in `parse_multi_agent_entry()`:\n\n1. Validates the template name (no path separators or `..` to prevent traversal)\n2. Loads `{agents_dir}/{template}/agent.toml`\n3. Normalizes flat-format templates to nested format via `normalize_flat_to_nested()`\n4. Deep-merges hand overrides on top via `deep_merge_toml()` — tables merge recursively, scalars and arrays in the overlay replace base values\n5. Parses the merged result into an `AgentManifest`\n\nThis is only available through `parse_hand_definition()` (which receives `agents_dir`), not through the `Deserialize` impl (which has no filesystem access). The `install_from_content()` path explicitly rejects `base` references.\n\n## Internationalization\n\nThe `i18n` field on `HandDefinition` maps language codes to `HandI18n` structs:\n\n```toml\n[i18n.zh]\nname = \"线索生成\"\ndescription = \"自主线索生成\"\n\n[i18n.zh.agents.main]\nname = \"主协调器\"\n\n[i18n.zh.settings.target_industry]\nlabel = \"目标行业\"\ndescription = \"聚焦的行业领域\"\n```\n\nAll fields are optional — missing translations fall back to English. Applied at API response time by `check_settings_availability()` and similar methods, not baked into the definition.\n\n## Skill Content\n\nHands can bundle skill instructions in markdown files:\n\n- **`SKILL.md`** — Shared skill content applied to all agents (`def.skill_content`)\n- **`SKILL-{role}.md`** — Per-agent overrides (`def.agent_skill_content[\"{role}\"]`)\n\nPer-agent content takes precedence over shared content. Both are populated at load time by `scan_agent_skill_files()` and `parse_hand_toml_with_agents_dir()`.\n\n## Error Handling\n\n```rust\npub enum HandError {\n    NotFound(String),           // hand ID not in registry\n    AlreadyActive(String),      // hand already has an active instance\n    AlreadyRegistered(String),  // duplicate hand ID on install\n    BuiltinHand(String),        // cannot uninstall registry hands\n    InstanceNotFound(Uuid),     // instance UUID not found\n    ActivationFailed(String),   // e.g. instance UUID collision\n    TomlParse(String),          // HAND.toml parse errors\n    Io(std::io::Error),         // filesystem errors\n    Config(String),             // invalid configuration\n}\n```\n\n## Legacy Compatibility\n\nThe parser handles two legacy agent formats automatically:\n\n**Flat model fields** — Older `agent.toml` files put `provider`, `model`, `system_prompt`, etc. as top-level scalars. `LegacyHandAgentConfig` deserializes these and converts to a nested `AgentManifest` with a `ModelConfig` sub-struct. The heuristic in `parse_single_agent_section()` checks for a `[model]` sub-table: if present, parse as modern format; otherwise try legacy first.\n\n**Single `agent_id`** — v1/v2 state files store a single `agent_id` instead of a role-keyed map. `load_state()` converts these to `{\"main\": agent_id}` during recovery.\n\nThe `provider` and `model` fields default to `\"default\"` — a sentinel the kernel resolves to the user's configured default model at agent spawn time, rather than pinning every hand to whatever the author hardcoded.","llm-drivers-librefang-llm-driver-src":"# LLM Drivers — librefang-llm-driver-src\n\n# librefang-llm-driver\n\nAbstract LLM driver interface, request/response types, streaming events, and provider-agnostic error classification.\n\nThis crate defines the `LlmDriver` trait that all concrete provider implementations (Anthropic, OpenAI, Gemini, Ollama, vLLM, etc.) satisfy, along with the shared `CompletionRequest`, `CompletionResponse`, `StreamEvent`, `DriverConfig`, and `LlmError` types that flow through the rest of LibreFang. A secondary module, `llm_errors`, classifies raw provider errors into a small set of actionable categories for retry logic and user-facing diagnostics.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-llm-driver (this crate)\"\n        A[LlmDriver trait]\n        B[CompletionRequest]\n        C[CompletionResponse]\n        D[StreamEvent]\n        E[DriverConfig]\n        F[LlmError]\n        G[classify_error]\n        H[ClassifiedError]\n    end\n\n    subgraph \"Consumers\"\n        I[librefang-llm-drivers<br/>concrete providers]\n        J[librefang-runtime<br/>agent loop / routing]\n        K[librefang-testing<br/>mock drivers]\n    end\n\n    I -.->|implements| A\n    J -->|builds| B\n    A -->|returns| C\n    A -->|emits| D\n    J -->|constructs with| E\n    J -->|uses| G\n    K -.->|implements| A\n```\n\n## Core Types\n\n### `LlmDriver` Trait\n\nThe central abstraction. Every provider (HTTP-based, CLI-based, or mock) implements `LlmDriver`:\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(&self, request: CompletionRequest, tx: Sender<StreamEvent>)\n        -> Result<CompletionResponse, LlmError>;\n\n    fn is_configured(&self) -> bool { true }\n}\n```\n\n- **`complete`** — required. Sends a full request and awaits the response.\n- **`stream`** — has a default implementation that wraps `complete` by emitting a single `TextDelta` followed by `ContentComplete`. Concrete drivers override this to provide true token-by-token streaming.\n- **`is_configured`** — returns `true` for all real drivers. Only `StubDriver` (used when no provider is set up) returns `false`.\n\n### `CompletionRequest`\n\nFields of note beyond the obvious `model`, `messages`, `max_tokens`, `temperature`:\n\n| Field | Purpose |\n|---|---|\n| `tools` | `Vec<ToolDefinition>` — available tools the model may call. |\n| `system` | Extracted system prompt; some APIs (Anthropic) require it as a separate parameter. |\n| `thinking` | Extended thinking configuration for models that support it. |\n| `prompt_caching` | Enables cache-control markers for Anthropic; OpenAI uses automatic prefix caching. |\n| `response_format` | `ResponseFormat` for structured output (JSON schema, etc.). |\n| `timeout_secs` | Per-request override of the global message timeout. Used for long-running browser-tool requests. |\n| `extra_body` | Provider-specific JSON merged into the API body. Values here override standard fields (last-wins). |\n| `agent_id` | Carries the owning agent's identity so CLI-based drivers (e.g., Claude Code) can propagate it to the MCP bridge for workspace/allowlist resolution. `None` for out-of-band callers (compaction, probes, tests). |\n\n### `CompletionResponse`\n\nHolds `content: Vec<ContentBlock>`, `stop_reason`, `tool_calls`, and `usage`. The `text()` helper concatenates all `ContentBlock::Text` variants, skipping thinking blocks and tool-use blocks.\n\n### `StreamEvent`\n\nEvents emitted during streaming, consumed by the agent loop and UI:\n\n- **`TextDelta`** — incremental text.\n- **`ThinkingDelta`** — reasoning tokens (for extended-thinking models).\n- **`ToolUseStart` / `ToolInputDelta` / `ToolUseEnd`** — tool call lifecycle. `ToolUseEnd` carries the fully parsed JSON input.\n- **`ContentComplete`** — final event with `stop_reason` and `usage`.\n- **`PhaseChange`** — agent lifecycle signal (e.g., `\"response_complete\"` via the `PHASE_RESPONSE_COMPLETE` constant). Consumers use this to unblock user input before full post-processing finishes.\n- **`ToolExecutionResult`** — emitted by the agent loop (not the driver) after a tool runs.\n\n### `DriverConfig`\n\nSerializable configuration for constructing a driver. Key details:\n\n- **Security**: The `Debug` implementation redacts `api_key`, `vertex_ai.credentials_path`, and `proxy_url`.\n- **`skip_permissions`** — defaults to `true`. Adds `--dangerously-skip-permissions` to spawned Claude CLI processes. Safe because LibreFang's own RBAC layer restricts agent capabilities.\n- **`message_timeout_secs`** — defaults to 300 seconds. Inactivity-based (silence on stdout), not wall-clock.\n- **`mcp_bridge`** — `#[serde(skip)]` so it's never persisted. Set at runtime by the kernel. Contains `base_url` and optional `api_key` for the daemon's `/mcp` endpoint, enabling CLI-based drivers to discover LibreFang tools.\n- **`proxy_url`** — per-provider proxy override.\n\n### `LlmError`\n\nProvider-agnostic error enum covering:\n\n| Variant | When |\n|---|---|\n| `Http(String)` | Low-level HTTP failure. |\n| `Api { status, message }` | Provider returned a non-2xx response. |\n| `RateLimited { retry_after_ms, message }` | 429 or equivalent. |\n| `Overloaded { retry_after_ms }` | 503 / overloaded. |\n| `Parse(String)` | Could not deserialize the response body. |\n| `MissingApiKey(String)` | No key configured. |\n| `AuthenticationFailed(String)` | Invalid key. |\n| `ModelNotFound(String)` | Unknown model identifier. |\n| `TimedOut { inactivity_secs, partial_text, last_activity }` | CLI subprocess stalled; partial output preserved. |\n\n## Error Classification (`llm_errors`)\n\n### `LlmErrorCategory`\n\nEight categories with distinct retry behavior:\n\n| Category | Retryable | Billing | Typical Status |\n|---|---|---|---|\n| `RateLimit` | ✅ | | 429 |\n| `Overloaded` | ✅ | | 503, 500 |\n| `Timeout` | ✅ | | — |\n| `Billing` | | ✅ | 402 |\n| `Auth` | | | 401, 403 |\n| `ContextOverflow` | | | 400 |\n| `ModelNotFound` | | | 404 |\n| `Format` | | | 400 |\n\n### Classification Pipeline\n\n`classify_error(message, status)` applies a priority-ordered pipeline:\n\n1. **Status-code fast paths** — unambiguous codes (429→RateLimit, 402→Billing, 401→Auth, 404→ModelNotFound). Status 403 is special-cased: it checks for quota/region/model patterns before defaulting to Auth, because many providers (especially Chinese ones) return 403 for non-auth reasons.\n2. **Pattern matching** — case-insensitive substring checks against pattern tables, in order: ContextOverflow → Billing → Auth → RateLimit → ModelNotFound → Format → Overloaded → Timeout.\n3. **HTML detection** — Cloudflare error pages (521–530, `cf-error-code`) are classified as Overloaded.\n4. **Fallback** — 5xx → Overloaded, 4xx → Format, network-sounding words → Timeout, else → Format.\n\nAll pattern matching uses `matches_any()` which does `haystack.contains(pattern)` with no regex dependency.\n\n### `ClassifiedError`\n\nThe result of classification, carrying:\n\n- `category` — one of the eight categories.\n- `is_retryable` / `is_billing` — convenience flags.\n- `suggested_delay_ms` — parsed from `retry after N` / `try again in N` / `retry-after: N` patterns (seconds→ms conversion, or raw ms if `ms` suffix present).\n- `sanitized_message` — user-safe text with secrets redacted, HTML stripped, JSON `.error.message` extracted, and the `LLM driver error: API error (NNN): ` wrapper removed. Capped at 300 characters.\n- `raw_message` — original error for logging.\n- `provider` / `model` — optional context.\n- `suggestion` — actionable guidance generated per category and context.\n\n### Context-Enriched Classification\n\n`classify_error_with_context(message, status, provider, model)` is the preferred entry point when provider/model information is available. It calls `classify_error`, then:\n\n- Attaches `provider` and `model`.\n- Generates a `suggestion` string (e.g., `\"Model 'claude-99' may not be available on anthropic. Check available models with librefang models list.\"`).\n- Enriches `sanitized_message` with `[provider=X, model=Y]` suffix.\n\n### Helper Functions\n\n| Function | Purpose |\n|---|---|\n| `is_transient(message)` | Quick heuristic: true for Timeout, Overloaded, or RateLimit patterns. No full classification overhead. |\n| `extract_retry_delay(message)` | Parses `retry after N`, `retry-after: N`, `try again in N` — returns ms. |\n| `sanitize_for_user(category, raw)` | Produces user-safe message; extracts JSON `.error.message`, redacts `sk-`/`key-`/`Bearer` secrets, strips HTML, caps at 300 chars. |\n| `is_html_error_page(body)` | Detects `<!DOCTYPE`, `<html`, `cf-error-code`, Cloudflare 521–530. |\n\n### Secret Redaction\n\n`redact_secrets()` scans for `sk-`, `key-`, `Bearer `, `bearer ` prefixes and replaces the following alphanumeric runs with `<redacted>`. Short matches (< 4 chars after prefix) are left intact to avoid infinite loops on partial words.\n\n## Integration Points\n\n**Upstream** — `librefang-llm-drivers` (the concrete implementations crate) depends on this crate and implements `LlmDriver` for each provider.\n\n**Downstream consumers** — the trait and types are used extensively:\n\n- **`librefang-runtime`** — routing (`make_request` builds `CompletionRequest`), provider health checks (`probe_model`), proactive memory, tool execution, TTS synthesis, web fetch/search, plugin management.\n- **`librefang-runtime-mcp`** — MCP OAuth discovery, HTTP compat tool calls.\n- **`librefang-runtime-oauth`** — ChatGPT and Copilot OAuth flows.\n- **`librefang-testing`** — `MockLlmDriver` implements `LlmDriver` for deterministic test scenarios.\n- **`librefang-skills`** — ClawHub file fetching.\n\n## Adding a New Provider\n\n1. Implement `LlmDriver` in `librefang-llm-drivers`, providing `complete` and (optionally) `stream`.\n2. Construct a `DriverConfig` with the provider name and credentials.\n3. Use `classify_error_with_context` in error-handling paths to produce actionable `ClassifiedError` values for the agent loop's retry logic.","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nThe LLM Drivers module group provides LibreFang's abstraction layer for communicating with large language model providers. It separates the *what* (the interface) from the *how* (the implementations).\n\n## Sub-modules\n\n| Sub-module | Role |\n|---|---|\n| [librefang-llm-driver](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait, shared request/response types (`CompletionRequest`, `CompletionResponse`, `StreamEvent`), configuration (`DriverConfig`), and provider-agnostic error classification via `classify_error` |\n| [librefang-llm-drivers](librefang-llm-drivers-src.md) | Concrete driver implementations for providers (Vertex AI, Claude Code, Qwen Code, etc.), plus cross-cutting utilities like `ThinkFilter`, token rotation, and CLI provider detection |\n\n## How they fit together\n\n```mermaid\ngraph LR\n    subgraph \"librefang-llm-driver (interface)\"\n        T[\"LlmDriver trait\"]\n        REQ[\"CompletionRequest\"]\n        RESP[\"CompletionResponse / StreamEvent\"]\n        ERR[\"classify_error → LlmError\"]\n    end\n\n    subgraph \"librefang-llm-drivers (implementations)\"\n        V[\"Vertex AI driver\"]\n        C[\"Claude Code driver\"]\n        Q[\"Qwen Code driver\"]\n        ROT[\"Token rotation wrapper\"]\n        TF[\"ThinkFilter\"]\n    end\n\n    REQ --> T\n    T --> RESP\n    T -->|raw error| ERR\n    V -.->|implements| T\n    C -.->|implements| T\n    Q -.->|implements| T\n    ROT -->|wraps drivers,| ERR\n    RESP --> TF\n```\n\nAll concrete drivers in `librefang-llm-drivers` implement the `LlmDriver` trait from `librefang-llm-driver`. Callers build a `CompletionRequest`, submit it through the trait, and receive either a `CompletionResponse` or a stream of `StreamEvent`s. When a provider returns an error, `classify_error` maps it to an actionable `LlmError` category that drives retry and rotation logic.\n\n## Key cross-cutting workflows\n\n- **Error classification → retry**: Raw provider errors are classified by `llm_errors` into categories (timeout, auth failure, rate limit, etc.). The token rotation layer in `librefang-llm-drivers` consumes these via `cooldown_from_error` to decide whether to rotate keys or back off.\n\n- **Streaming through ThinkFilter**: Providers that emit `<think…>` blocks (e.g., reasoning models) have their `StreamEvent` streams passed through `ThinkFilter`, which strips or surfaces those blocks depending on configuration.\n\n- **Provider discovery**: The CLI provider detection chain (`is_cli_provider` → `claude_code_available` → credential checks) allows LibreFang to auto-detect locally installed tools and register them in the model catalog at startup.","memory-sessions":"# Memory & Sessions\n\n# Memory & Sessions\n\nThe unified memory substrate for LibreFang agents. It provides three persistent storage backends—structured key-value, semantic search, and a knowledge graph—all accessed through a single `MemorySubstrate` entry point, plus a mem0-style proactive memory layer that automatically extracts, deduplicates, and retrieves memories during agent conversations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    AgentLoop[\"Agent Loop\"] --> PM[\"ProactiveMemoryStore\"]\n    PM --> MS[\"MemorySubstrate\"]\n    MS --> SS[\"StructuredStore<br/>(SQLite KV)\"]\n    MS --> SEM[\"SemanticStore<br/>(SQLite + vectors)\"]\n    MS --> KS[\"KnowledgeStore<br/>(SQLite graph)\"]\n    MS --> SES[\"SessionStore\"]\n    MS --> US[\"UsageStore\"]\n\n    PM -->|\"embedding (optional)\"| VS[\"VectorStore\"]\n    VS -->|\"local\"| SQV[\"SqliteVectorStore\"]\n    VS -->|\"remote\"| HIV[\"HttpVectorStore\"]\n\n    SEM -->|\"recall / remember\"| MEM[\"memories table\"]\n    KS -->|\"entities + relations\"| ENT[\"entities / relations tables\"]\n    SS -->|\"per-agent KV\"| KV[\"kv_store table\"]\n```\n\n## Storage Backends\n\n### Structured Store (`structured.rs`)\n\nPer-agent key-value storage backed by SQLite's `kv_store` table. Used for agent state, configuration, and memory metadata entries (keyed as `memory:<id>`).\n\nKey operations: `get`, `set`, `delete`, `list_kv`, `list_keys`, `remove_agent`.\n\n### Semantic Store (`semantic.rs`)\n\nStores and searches free-text memories in the `memories` table. Each memory has a scope (`user_memory`, `session_memory`, `agent_memory`), confidence score, access tracking, and optional embedding vector.\n\nTwo search modes:\n- **Keyword fallback**: `LIKE` matching when no embedding driver is configured\n- **Vector search**: cosine similarity via `VectorStore` trait when embeddings are available\n\nCore operations: `remember`, `recall`, `recall_with_embedding`, `update_content`, `forget`, `get_by_id`, `lowest_confidence`, `count`.\n\n### Knowledge Store (`knowledge.rs`)\n\nA lightweight knowledge graph stored in `entities` and `relations` tables. Supports:\n- Entity upsert with type (`Person`, `Organization`, `Concept`, etc.)\n- Typed relations between entities (`WorksAt`, `RelatedTo`, etc.)\n- Pattern-based graph queries (`query_graph`) that match on source, relation type, and target\n\nEntities can be referenced by either ID or name in relations (the JOIN handles both).\n\n## Proactive Memory System (`proactive.rs`)\n\nThe `ProactiveMemoryStore` wraps the three backends into a mem0-style API. It implements both `ProactiveMemory` (unified search/add/get/list) and `ProactiveMemoryHooks` (auto-memorize, auto-retrieve) traits from `librefang-types`.\n\n### Memory Levels\n\n| Level | Scope String | Persistence | Decay |\n|-------|-------------|-------------|-------|\n| User | `user_memory` | Permanent | Never |\n| Session | `session_memory` | TTL-based | After `session_ttl_hours` |\n| Agent | `agent_memory` | Long-lived | After `agent_ttl_days` |\n\n### Decision Flow: `add()`\n\nWhen memories are added (either explicitly or via `auto_memorize`), the store runs a deduplication flow:\n\n1. **Generate embedding** for the new content (if embedding driver is configured)\n2. **Search** for the top 5 similar existing memories for this agent\n3. **Decide action** via `MemoryExtractor::decide_action()`:\n   - `NOOP` — skip, duplicate exists\n   - `ADD` — store as new memory\n   - `UPDATE` — replace existing memory in-place, preserving ID and access stats\n4. **Conflict detection** — if an UPDATE changes semantic meaning (e.g., \"I like X\" → \"I hate X\"), a `MemoryConflict` is flagged and version history is preserved\n\n### Auto-Retrieve: `auto_retrieve()`\n\nCalled before each agent turn to inject relevant context:\n\n1. Runs periodic maintenance (confidence decay, session cleanup) — rate-limited to once per hour\n2. Searches for memories relevant to the input query\n3. Returns formatted context string for injection into the agent's system prompt\n\n### Maintenance Tasks\n\n- **Confidence decay**: `decay_confidence()` applies exponential decay (`e^(-rate × days)`) plus an access-count boost, rate-limited to once per hour\n- **Session TTL cleanup**: `cleanup_expired()` soft-deletes session-level memories older than the configured TTL\n- **Per-agent cap enforcement**: `evict_if_over_cap()` removes the lowest-confidence memories when an agent exceeds `max_memories_per_agent`\n- **Consolidation**: After every 10th `auto_memorize` call per agent, `consolidate()` merges duplicate memories (>90% text similarity)\n\n### Export / Import\n\n`export_all()` serializes all memories for an agent as `Vec<MemoryExportItem>`. `import_memories()` restores them with deduplication (skips memories >90% similar to existing ones).\n\n## Session Management (`session.rs`)\n\nEach conversation channel gets its own `Session` stored in the `sessions` table. Key features:\n\n- **Per-session storage** with `peer_id` isolation (same agent, different users)\n- **Canonical sessions** (`canonical_sessions` table): cross-channel persistent memory that compacts older messages into summaries\n- **LLM summarization**: `store_llm_summary()` compacts session history when token count exceeds the context window\n- **FTS5 full-text search** across session content (`sessions_fts` virtual table)\n- **JSONL mirror**: `write_jsonl_mirror()` appends session events to a JSONL file for external observability\n\n### Compaction Flow\n\nWhen `needs_compaction()` returns true (message count exceeds threshold), the compactor summarizes older messages into a compacted summary and advances the `compaction_cursor`. This keeps the working window small while preserving long-term context.\n\n## Knowledge Graph Integration\n\n`store_relations()` persists extracted `RelationTriple` objects into the knowledge graph:\n\n1. Upsert source and target entities (with ID normalization)\n2. Deduplicate: skip if an identical `(source, relation, target)` already exists\n3. Add the relation edge\n\n`query_graph()` performs pattern matching with `GraphPattern { source, relation, target, max_depth }`, joining entities by both ID and name.\n\n## Vector Stores\n\nThe `VectorStore` trait abstracts vector operations (`insert`, `search`, `delete`, `get_embeddings`):\n\n- **`SqliteVectorStore`** (`semantic.rs`): Stores embeddings as BLOBs in the `memories` table; uses cosine similarity computed in Rust\n- **`HttpVectorStore`** (`http_vector_store.rs`): Delegates to a remote HTTP service (Qdrant, Weaviate, etc.) via a JSON API (`/insert`, `/search`, `/delete`, `/get_embeddings`)\n\nThe embedding driver is injected via `ProactiveMemoryStore::with_embedding()`. When absent, all search falls back to keyword matching.\n\n## Text Chunking (`chunker.rs`)\n\nLong documents are split into overlapping chunks before embedding:\n\n1. Split on paragraph boundaries (`\\n\\n`)\n2. If a paragraph exceeds `max_size`, split on sentence boundaries (`. `, `。`, `？`, `！`)\n3. If a sentence still exceeds `max_size`, hard-split at the character limit\n4. Apply `overlap` characters from the end of each chunk to the start of the next\n\nAll operations use char-based indexing for correct Unicode handling.\n\n## Consolidation (`consolidation.rs`)\n\n`ConsolidationEngine` runs periodic maintenance:\n\n- **Confidence decay**: Reduces confidence of memories not accessed in 7+ days by a configurable decay factor (floor at 0.1)\n- **Merge**: Finds pairs of memories with >90% Jaccard similarity and merges them (keeps the higher-confidence one, soft-deletes the other), capped at 100 merges per run to avoid O(n²) blowup\n\n## Time-Based Decay (`decay.rs`)\n\n`run_decay()` hard-deletes stale memories based on scope TTL:\n\n| Scope | Default TTL | Behavior |\n|-------|-----------|----------|\n| `user_memory` | Never | Not touched |\n| `session_memory` | `session_ttl_days` (default 7) | Hard-deleted after TTL |\n| `agent_memory` | `agent_ttl_days` (default 30) | Hard-deleted after TTL |\n\nAccessing a memory (via search/recall) resets `accessed_at`, which resets the decay timer.\n\n## Usage Tracking (`usage.rs`)\n\n`UsageStore` records per-call LLM usage in `usage_events` (model, input/output tokens, cost, latency, provider). Supports:\n\n- Budget enforcement: `check_quota_and_record()` and `check_global_budget_and_record()` reject calls that would exceed hourly/daily/global caps\n- Per-provider budgets via `check_all_with_provider_and_record()`\n- Aggregated queries: `query_hourly()`, `query_daily()`, `query_by_model()`\n\n## Prompt Versioning (`prompt.rs`)\n\n`PromptStore` manages agent prompt versions with A/B testing support:\n\n- `prompt_versions` table: versioned system prompts with content hashes\n- `prompt_experiments` / `experiment_variants`: traffic-split experiment definitions\n- `experiment_metrics`: aggregated success/latency/cost metrics per variant\n\n## Schema Migrations (`migration.rs`)\n\nSQLite schema is at version 19. Migrations run automatically via `run_migrations()`, using `PRAGMA user_version` for tracking. The migration chain creates:\n\n- Core tables: `agents`, `sessions`, `events`, `kv_store`, `task_queue`, `memories`, `entities`, `relations`\n- Indexes for performance (v9: composite indexes for proactive memory queries)\n- FTS5 virtual table for session search (v12)\n- Prompt versioning tables (v13)\n- Per-agent isolation via `agent_id` on entities/relations (v10)\n- `peer_id` columns for per-user memory isolation (v16)\n- Audit, approval, TOTP lockout tables (v8, v17, v18)\n- Provider column on usage events (v19)\n\nAll migrations are idempotent — safe to run repeatedly.\n\n## Integration Points\n\n| Caller | What it uses |\n|--------|-------------|\n| **Agent Loop** (`librefang-runtime`) | `save_session_async`, `remember`, `recall_with_embedding_async` via `MemorySubstrate` |\n| **Context Engine** | `remember`, `recall` for injecting memories into agent context |\n| **Compactor** | `Session` type for compaction decisions |\n| **Proactive Memory Init** | `ProactiveMemoryStore::with_embedding()` to wire up embedding driver |\n| **API Routes** | `ProactiveMemoryStore` for memory CRUD, `find_agent_id_for_memory` for auth checks |\n| **Skills/Hands** | `save_session` to persist conversation turns |\n\n## Quick Start\n\n```rust,ignore\nuse librefang_memory::{MemorySubstrate, ProactiveMemoryStore, ProactiveMemory, ProactiveMemoryHooks};\nuse std::sync::Arc;\n\n// Create in-memory substrate (use ::open(path) for disk-backed)\nlet substrate = Arc::new(MemorySubstrate::open_in_memory(0.1)?);\n\n// Create proactive memory store with embedding driver\nlet store = ProactiveMemoryStore::with_default_config(substrate.clone());\nlet store = store.with_embedding(my_embedding_driver);\nlet store = Arc::new(store);\n\n// Auto-memorize from conversation\nlet messages = vec![serde_json::json!({\n    \"role\": \"user\",\n    \"content\": \"I prefer dark mode and use Python daily\"\n})];\nstore.auto_memorize(&messages, \"agent-id\", \"user-123\").await?;\n\n// Auto-retrieve relevant context before agent turn\nlet context = store.auto_retrieve(\"agent-id\", \"What are my preferences?\").await?;\n\n// Search memories directly\nlet results = store.search(\"dark mode\", \"agent-id\", 10).await?;\n```","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\n## Overview\n\nThe LibreFang Dashboard is a React 19 single-page application that provides the management interface for the LibreFang autonomous agent operating system. It exposes controls for agent lifecycle, session management, workflow orchestration, scheduling, analytics, memory, hands (multi-agent coordination), skills, channels, and runtime configuration.\n\n**Tech stack:** React 19 · TanStack Router v1 · TanStack Query v5 · Tailwind CSS v4 · Vite 7 · TypeScript (strict) · Vitest + Playwright\n\n## Architecture\n\n```mermaid\ngraph TD\n    Pages[\"Pages (src/pages/)\"] --> QueryHooks[\"Query Hooks (src/lib/queries/)\"]\n    Pages --> MutationHooks[\"Mutation Hooks (src/lib/mutations/)\"]\n    QueryHooks --> KeyFactory[\"Key Factory (keys.ts)\"]\n    QueryHooks --> HttpClient[\"HTTP Client (src/lib/http/client.ts)\"]\n    MutationHooks --> HttpClient\n    HttpClient --> ApiLayer[\"API Layer (src/api.ts)\"]\n    ApiLayer --> Backend[\"LibreFang Backend API\"]\n    KeyFactory --> Cache[\"TanStack Query Cache\"]\n    MutationHooks -->|\"invalidates\"| Cache\n    Cache -->|\"populates\"| QueryHooks\n```\n\nAll data access from pages and components flows through the shared hooks layer. Pages never call `fetch()` or `api.*` directly (streaming/SSE being the documented exception).\n\n## Directory Layout\n\n```\ndashboard/\n├── index.html                     # SPA shell with service worker registration\n├── package.json                   # Dependencies and scripts\n├── vite.config.ts                 # Build configuration\n├── playwright.config.ts           # E2E test configuration\n├── public/\n│   ├── manifest.json              # PWA manifest\n│   ├── sw.js                      # Service worker (stale-while-revalidate)\n│   ├── icon-192.png\n│   └── icon-512.png\n├── e2e/\n│   └── dashboard.spec.ts          # Playwright smoke tests\n├── openapi/\n│   └── generated.ts               # Auto-generated API types\n├── src/\n│   ├── main.tsx                   # Application entry point\n│   ├── api.ts                     # Raw API calls + auth helpers\n│   ├── index.css                  # Tailwind theme + animation system\n│   ├── router.tsx                 # TanStack Router route tree\n│   ├── pages/                     # Route page components\n│   ├── components/                # Shared UI components\n│   └── lib/\n│       ├── http/\n│       │   ├── client.ts          # Typed wrapper over api.ts\n│       │   └── errors.ts          # ApiError class\n│       ├── queries/\n│       │   ├── keys.ts            # Hierarchical query-key factories\n│       │   ├── keys.test.ts       # Factory smoke/anchoring tests\n│       │   └── <domain>.ts        # Domain-specific queryOptions + useXxx hooks\n│       ├── mutations/\n│       │   └── <domain>.ts        # Domain-specific mutation hooks\n│       ├── test/\n│       │   └── query-client.tsx   # createQueryClientWrapper test utility\n│       ├── agentManifest.ts       # TOML manifest serializer/parser/validator\n│       ├── agentManifestMarkdown.ts # Manifest → Markdown renderer\n│       ├── chat.ts                # Chat message normalization utilities\n│       └── chatPicker.ts          # Agent/hand picker grouping logic\n```\n\n## Data Layer\n\n### Query Key Factories\n\nAll query keys live in `src/lib/queries/keys.ts` as hierarchical factories. Every sub-key is anchored to the domain's `.all` key so that broad invalidation works correctly.\n\n```ts\nexport const agentKeys = {\n  all: [\"agents\"] as const,\n  lists: () => [...agentKeys.all, \"list\"] as const,\n  list: (filters: AgentFilters) => [...agentKeys.lists(), filters] as const,\n  details: () => [...agentKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...agentKeys.details(), id] as const,\n  sessions: (id: string) => [...agentKeys.detail(id), \"sessions\"] as const,\n  promptVersions: (id: string) => [...agentKeys.detail(id), \"promptVersions\"] as const,\n  experiments: (id: string) => [...agentKeys.detail(id), \"experiments\"] as const,\n  experimentMetrics: (expId: string) => [...agentKeys.all, \"experimentMetrics\", expId] as const,\n};\n```\n\nExisting domain factories: `agents`, `analytics`, `approvals`, `channels`, `config`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `workflows`.\n\n### Query Hooks\n\nEach domain file in `src/lib/queries/` exports `queryOptions` and `useXxx` hooks:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters, options?: UseFooOptions) {\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled: options?.enabled,\n    staleTime: options?.staleTime,\n    refetchInterval: options?.refetchInterval,\n  });\n}\n```\n\nHooks accept an optional `options` parameter for call-site overrides (`enabled`, `staleTime`, `refetchInterval`). Every override must carry an inline comment explaining the reason — e.g., bell-icon polls fast, bulk-management pages poll slowly, tabs gate by active tab.\n\n### Mutation Hooks\n\nMutations live in `src/lib/mutations/<domain>.ts`. Cache invalidation is encapsulated inside the hook; callers never need to know which keys are touched.\n\nInvalidation follows a specificity-first principle:\n\n| Scenario | Keys invalidated | Example |\n|---|---|---|\n| Per-id update that changes list projection | `detail(id)` + `lists()` | `usePatchAgentConfig` |\n| List-shape change (create, delete, reorder) | `lists()` only | `useCreateSchedule` |\n| Scoped change, list projection unaffected | `detail(id)` or nested sub-key | `useActivatePromptVersion` → `promptVersions(id)` + `detail(id)` |\n| Bulk import / cache reset | `.all` | `useSpawnAgent` |\n\nCross-domain invalidation occurs when mutations affect shared projections. For example, `useSpawnAgent` invalidates both `agentKeys.all` and `overviewKeys.snapshot()` because the overview dashboard shows agent counts.\n\nCall sites may attach their own `onSuccess`/`onError` handlers for UI feedback (toasts, modal dismissal) — this is orthogonal to cache invalidation and stays at the call site.\n\n### Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts`\n2. Add (or extend) a factory in `src/lib/queries/keys.ts`\n3. Add the query hook in `src/lib/queries/<domain>.ts`\n4. Add mutation hooks in `src/lib/mutations/<domain>.ts`\n5. Update `src/lib/queries/keys.test.ts` — add the factory to the existence list and anchoring tests\n\nRun all three verification commands after any change to the data layer:\n```bash\npnpm typecheck    # tsc --noEmit\npnpm test --run   # vitest\npnpm build        # vite build\n```\n\nA passing typecheck alone is insufficient — the key-factory tests catch anchoring regressions the compiler cannot.\n\n## Authentication\n\nThe dashboard authenticates via bearer tokens stored in `localStorage` under the key `librefang-api-key`.\n\nKey functions in `src/api.ts`:\n- **`setApiKey(token)`** / **`clearApiKey()`** — manage the stored token\n- **`getStoredApiKey()`** — retrieves the token (or `null`)\n- **`authHeader()`** — returns a `Headers` object with `Authorization: Bearer <token>`\n- **`verifyStoredAuth()`** — probes a protected endpoint; on 401, clears the stale token and returns `false`\n- **`buildAuthenticatedWebSocketUrl(path)`** — appends `?token=...` to WebSocket URLs\n\nThe backend can operate in two modes: open (no credentials) or credentials-based. The E2E test verifies that when `GET /api/auth/dashboard-check` returns `{ mode: \"credentials\" }`, the dashboard presents a sign-in dialog.\n\n## Agent Manifest System\n\n`src/lib/agentManifest.ts` provides a full TOML round-trip for agent configuration files:\n\n- **`parseManifestToml(toml)`** — parses TOML into a structured `ManifestForm` + `ManifestExtras` (preserves unknown fields)\n- **`serializeManifestForm(form, extras?)`** — serializes back to deterministic TOML, with hand-tuned field ordering\n- **`validateManifestForm(form)`** — returns an array of error field paths (empty = valid)\n- **`emptyManifestForm()`** / **`emptyManifestExtras()`** — factory functions for blank state\n\nThe form captures first-class fields: `name`, `description`, `tags`, `model.*`, `resources.*`, `capabilities.*`, `skills`, `priority`, `session_mode`, `schedule`, `thinking`, `autonomous`, `routing`, `fallback_models`, `context_injection`, `response_format`, `exec_policy_shorthand`. Genuinely unknown keys ride along in `extras` and survive round-trips.\n\n`src/lib/agentManifestMarkdown.ts` renders a form + extras into human-readable Markdown for documentation/export.\n\n### Key design decisions\n\n- **Alias normalization**: `exec_policy` accepts kernel aliases (`none`, `disabled`, `restricted`, `all`, `unrestricted`) and normalizes them to the 4 canonical forms (`deny`, `allowlist`, `full`).\n- **Mutual exclusion**: When a form field covers a previously-preserved extras table (e.g., user picks a shorthand `exec_policy`), the old extras table is dropped to avoid TOML key/table redefinition conflicts.\n- **Numeric validation**: Negative values and values exceeding `MAX_SAFE_INTEGER` are silently omitted rather than emitted as invalid TOML.\n- **Fallback model extras**: Per-model `#[serde(flatten)]` extra params (e.g., Qwen's `enable_memory`) survive round-trips.\n\n## Chat Utilities\n\n`src/lib/chat.ts` provides normalization helpers used across the chat interface:\n\n- **`normalizeRole(role)`** — lowercases API role strings (`\"User\"` → `\"user\"`)\n- **`asText(content)`** — converts string or JSON content to display text\n- **`formatMeta(meta)`** — formats token usage, iterations, and cost into a compact string\n- **`normalizeToolOutput(event)`** — extracts persistent display data from tool output events; returns `null` for malformed events\n\n`src/lib/chatPicker.ts` provides `groupedPicker(agents, hands, showHandAgents)` which groups agents into standalone agents and hand groups for the chat target picker. Hand groups sort alphabetically by name, with the coordinator role first.\n\n## UI Components\n\n### MultiSelectCmdk\n\nA composable multi-select component built on `cmdk`:\n- Chip-based display of selected values\n- Type-to-filter dropdown with `listbox` role\n- Backspace removes last chip\n- Already-selected items are hidden from the dropdown\n- Controlled via `value`/`onChange` props\n\n### Animation System\n\n`src/index.css` defines an Apple-inspired animation system with:\n- **Spring curves**: `--apple-spring`, `--apple-ease`, `--apple-bounce`\n- **Page entrance**: `animate-fade-in-up` (fade + rise + deblur)\n- **Modal entrance**: `animate-fade-in-scale` (scale spring + deblur)\n- **Chat messages**: `animate-message-in` (lighter — 220ms, no blur)\n- **Staggered children**: `.stagger-children > *` with 40ms cascade delays\n- **Card hover**: `.card-glow` with depth shadow and brand-color glow\n- All animations respect `prefers-reduced-motion`\n\n### Theming\n\nThe dashboard supports light and dark modes via CSS custom properties. The `:root.dark` class toggles between palettes. Semantic tokens (`--color-brand`, `--color-surface`, etc.) are mapped to Tailwind's theme system. Custom breakpoints (`3xl: 1920px`, `4xl: 2560px`) handle QHD and 4K displays.\n\n## Service Worker\n\n`public/sw.js` implements a stale-while-revalidate caching strategy:\n- **API requests** (`/api/*`): network only, never cached\n- **Static assets** (GET): serve from cache immediately, update cache in background\n- Precaches `/dashboard/` on install\n\n## Testing\n\n### Unit Tests (Vitest)\n\nTests are co-located with source files using the `.test.ts`/`.test.tsx` convention. The shared test utility `src/lib/test/query-client.tsx` exports `createQueryClientWrapper()` which provides a TanStack Query client for hook testing.\n\nTest categories:\n- **Query key factories** (`keys.test.ts`) — verify factory existence and anchoring\n- **Query hooks** (`queries/*.test.tsx`) — verify enabled guards, data fetching, and correct key usage\n- **Mutation hooks** (`mutations/*.test.tsx`) — verify invalidation targets via spy on `queryClient.invalidateQueries`\n- **API helpers** (`api.test.ts`) — verify auth headers, token management, request payloads\n- **Serializers** (`agentManifest.test.ts`) — verify TOML round-trips, edge cases, and regression guards\n- **UI components** (`MultiSelectCmdk.test.tsx`) — verify selection, search, and keyboard behavior\n\n### E2E Tests (Playwright)\n\n`e2e/dashboard.spec.ts` verifies:\n- Dashboard shell loads with all navigation links visible\n- Navigation to Comms, Hands, and Goals pages works\n- Sign-in dialog appears when the backend requires credentials\n\nPlaywright runs against the Vite dev server on `127.0.0.1:4173`.\n\n## Scripts\n\n| Script | Command | Purpose |\n|---|---|---|\n| `dev` | `vite` | Start dev server |\n| `build` | `vite build` | Production build |\n| `preview` | `vite preview` | Preview production build |\n| `typecheck` | `tsc --noEmit` | Type checking |\n| `test` | `vitest run` | Run unit tests once |\n| `test:watch` | `vitest` | Run unit tests in watch mode |\n| `e2e` | `playwright test` | Run E2E tests |\n| `openapi:types` | `openapi-typescript ...` | Regenerate API types from backend OpenAPI spec |\n\n## Conventions\n\n- **TypeScript strict mode** — no `any` in new hooks; use types from `src/api.ts` or `openapi/generated.ts`\n- **No inline query keys** — always call the factory from `keys.ts`\n- **No duplicate subscriptions** — use `select` on shared `queryOptions` for data subsets\n- **Commit format**: `feat(dashboard/<area>):`, `fix(dashboard/<area>):`, `refactor(dashboard/<area>):`\n- **Streaming exceptions**: SSE, imperative fire-and-forget channels, and one-shot probes may call `fetch` directly — keep these narrow and document why","other-librefang-api-static":"# Other — librefang-api-static\n\n# librefang-api-static — Locale / i18n Translations\n\n## Purpose\n\nThis directory holds the **static internationalization (i18n) translation files** for the LibreFang dashboard UI. Every piece of user-facing text in the web frontend — button labels, page titles, error messages, toast notifications, section descriptions, and contextual help — is defined here rather than hardcoded in components. This allows the UI to be rendered in multiple languages by swapping locale files at runtime.\n\n## Files\n\n| File | Language | Status |\n|---|---|---|\n| `locales/en.json` | English | Complete — authoritative source |\n| `locales/ja.json` | Japanese | Complete (parallel structure to `en.json`) |\n\nAdditional locales can be added by creating a new `{lang_code}.json` file that mirrors the same key structure.\n\n## Structure and Key Organization\n\nTranslation keys are organized by **UI section or feature page**, using dot-notation paths that correspond to the logical grouping of components. The top-level namespaces are:\n\n```\nnav            – Sidebar / top navigation labels\nstatus         – Connection and system status strings\nbtn            – Shared button labels (save, delete, cancel, etc.)\nlabel          – Common field labels\nauth           – API key authentication prompt\npage           – Page-level headings\nhealth         – Health check status\nstat           – Dashboard stat card labels\ncard           – Dashboard card titles\nagents         – Agent list page\ndetail         – Agent detail panel (info, files, config tabs)\nmode           – Agent mode labels (observe, assist, full)\ncategory       – Template category filters\nprofile        – Tool profile labels and descriptions\ntemplate       – Agent template names and descriptions\ntime           – Relative time formatting\nonboarding     – First-run onboarding banner\nprovider       – LLM provider setup strings\noverview       – Overview / dashboard page\nsecurity       – Security feature short names\nagentChat      – Chat interface (messages, commands, toasts)\nsessionsPage   – Sessions management page\nagentsPage     – Agent creation and management page\napprovals      – Execution approval queue\nlogsPage       – Live logs and audit trail\nruntimePage    – Runtime information page\nsettingsPage   – Settings (providers, models, tools, security, network, budget, memory, migration)\nworkflowsPage  – Workflow creation and execution\nworkflowBuilder – Visual workflow builder (node palette, canvas controls)\nschedulerPage  – Cron jobs, event triggers, run history\nchannelsPage   – Messaging channel configuration\nskillsPage     – Skills marketplace, MCP servers, quick-start skills\nhandsPage      – Curated autonomous capability packages\npluginsPage    – Plugin management\ncommsPage      – Inter-agent communication\nsetupWizard    – Guided setup wizard (5 steps)\ngoalsPage      – Goal tracking\nanalyticsPage  – Usage analytics, costs, breakdowns\nmemoryPage     – Proactive memory browser\ntheme          – Theme selector labels\nsidebar        – Sidebar shortcut hints\nconfirm        – Shared confirmation dialog buttons\n```\n\nAdditional supplemental namespaces (`agentChat2`, `settingsPage2`, `agentsPage2`, etc.) hold secondary/extended keys that are added incrementally without modifying the primary namespace.\n\n## Interpolation Syntax\n\nStrings use **brace-delimited placeholders** for dynamic values:\n\n```json\n\"secondsAgo\": \"{count}s ago\",\n\"providersConfigured\": \"{configured}/{total} configured\",\n\"errorPrefix\": \"Error: {message}\"\n```\n\nThe frontend rendering layer substitutes these at runtime with actual values. There is no pluralization library in the JSON itself — plural handling is done either by the consuming component or by having separate keys for singular/plural forms.\n\n## Adding a New Locale\n\n1. Copy `locales/en.json` to `locales/{lang_code}.json`.\n2. Translate all string values while **preserving the exact key paths**. Do not rename, remove, or reorder keys.\n3. Placeholders like `{count}`, `{name}`, `{message}` must remain untranslated — they are substitution tokens.\n4. Register the new locale in the frontend's i18n initialization code (typically wherever the locale loader/importer is configured).\n\n**Checklist for completeness:**\n\n- Every top-level namespace present in `en.json` exists in the new file.\n- All nested keys within each namespace match.\n- All interpolation placeholders are preserved verbatim.\n- No keys are missing — missing keys will fall back to English or render the raw key path.\n\n## Adding New UI Strings\n\nWhen new UI features are added:\n\n1. Determine the appropriate top-level namespace. If the feature is a new page, create a new namespace (e.g., `newFeaturePage`). If it extends an existing page, add keys under the existing namespace.\n2. Add the key to **`en.json` first** — it is the canonical source.\n3. Add the same key (translated) to all other locale files.\n4. Use the key in the frontend component via the i18n library's lookup function (e.g., `t('newFeaturePage.title')`).\n\n## Conventions\n\n| Convention | Example |\n|---|---|\n| Toast notifications use past tense or result state | `\"agentStopped\": \"Agent \\\"{name}\\\" stopped\"` |\n| Error messages include the dynamic `{message}` placeholder | `\"loadFailed\": \"Failed: {message}\"` |\n| Confirmation dialogs have paired `Title`/`Confirm` keys | `\"stopAgentTitle\"` / `\"stopAgentConfirm\"` |\n| Status enums use lowercase or capitalized single words | `\"pending\"`, `\"Approved\"` |\n| Button labels are imperative verbs | `\"save\"`, `\"delete\"`, `\"cancel\"` |\n| Section descriptions end with periods | `\"...to enrich context.\"` |\n| Nested enums go under a sub-object | `\"filter\"`, `\"status\"`, `\"cmd\"`, `\"toast\"`, `\"sys\"` |\n\n## Relationship to the Rest of the Codebase\n\n```\n┌─────────────────────┐\n│  Frontend Components │  ← Reference keys via t('namespace.key')\n│  (Svelte / React)   │\n└────────┬────────────┘\n         │ imports\n┌────────▼────────────┐\n│  i18n Runtime Layer  │  ← Loads active locale, resolves keys\n└────────┬────────────┘\n         │ reads\n┌────────▼────────────┐\n│  locales/*.json      │  ← This module\n└─────────────────────┘\n```\n\nThe locale files are **pure data** — no code, no imports, no side effects. They are consumed at build time or runtime by the frontend's i18n system. The backend API serves them as static assets under the `/static/locales/` path.\n\nBecause the files contain no executable logic, there are no call graph edges or execution flows associated with this module.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests\n\nIntegration, lifecycle, load, and spec-validation tests for the LibreFang HTTP API. These tests boot a real `LibreFangKernel`, bind an axum server to a random port, and exercise endpoints over actual HTTP using `reqwest`. No mocks.\n\n## Running\n\n```bash\n# All tests (no LLM key needed for most)\ncargo test -p librefang-api --test api_integration_test -- --nocapture\ncargo test -p librefang-api --test daemon_lifecycle_test -- --nocapture\ncargo test -p librefang-api --test load_test -- --nocapture\ncargo test -p librefang-api --test openapi_spec_test -- --nocapture\n\n# LLM-gated tests only (requires a real provider)\nGROQ_API_KEY=... cargo test -p librefang-api --test api_integration_test -- --nocapture\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Harnesses\"\n        TS[\"TestServer<br/>(real TCP + reqwest)\"]\n        FR[\"FullRouterHarness<br/>(in-process oneshot)\"]\n    end\n\n    subgraph \"Harness Factories\"\n        STS[\"start_test_server()<br/>ollama / no key\"]\n        STSLLM[\"start_test_server_with_llm()<br/>groq / GROQ_API_KEY\"]\n        STSProv[\"start_test_server_with_provider()<br/>configurable\"]\n        STSAuth[\"start_test_server_with_auth()<br/>Bearer token\"]\n        SFR[\"start_full_router()<br/>server::build_router\"]\n    end\n\n    KC[\"KernelConfig<br/>(tempdir-isolated)\"]\n    LFK[\"LibreFangKernel::boot_with_config()\"]\n    AS[\"AppState<br/>(Arc-shared)\"]\n    AX[\"axum::serve<br/>127.0.0.1:0\"]\n\n    STS --> STSProv\n    STSLLM --> STSProv\n    STSProv --> KC\n    STSAuth --> KC\n    SFR --> KC\n    KC --> LFK\n    LFK --> AS\n    STSProv --> AX\n    STSAuth --> AX\n    AX --> TS\n    SFR --> FR\n```\n\n## Test Harness Types\n\n### `TestServer` — real TCP server\n\nBoots a kernel, constructs an `AppState`, builds a minimal axum `Router` with the subset of routes under test, binds to `127.0.0.1:0` (OS-assigned port), and spawns the server in a background tokio task. Tests use `reqwest::Client` to hit `http://{addr}/...`.\n\nThe `Drop` impl calls `state.kernel.shutdown()` to clean up.\n\n**Factory functions:**\n\n| Function | LLM Provider | Auth | Use case |\n|---|---|---|---|\n| `start_test_server()` | ollama (no key) | none | Most integration tests |\n| `start_test_server_with_llm()` | groq | none | Real LLM call tests (gated on `GROQ_API_KEY`) |\n| `start_test_server_with_provider(provider, model, env)` | configurable | none | Custom provider setups |\n| `start_test_server_with_auth(api_key)` | ollama | Bearer token | Auth middleware tests |\n\nAll factories create an isolated `tempfile::TempDir` for `home_dir`/`data_dir` so tests never collide with a real daemon's state.\n\n### `FullRouterHarness` — in-process router\n\nCalls `server::build_router()` to get the full production router (versioned paths, dashboard static files, locale serving, middleware stack). Tests use `app.clone().oneshot(Request<Body>)` instead of TCP — faster for tests that don't need real HTTP.\n\n## Test Files\n\n### `api_integration_test.rs`\n\nThe primary integration test suite. Covers:\n\n**Health and status**\n- `test_health_endpoint` — public health returns `{ status: \"ok\", version }` with no sensitive fields; `x-request-id` header injected\n- `test_status_endpoint` — detailed status with `agent_count`, `uptime_seconds`, `default_provider`, agent list\n- `test_request_id_header_is_uuid` — every response gets a valid UUID in `x-request-id`\n\n**API versioning**\n- `test_build_router_exposes_versioned_api_aliases` — both `/api/health` and `/api/v1/health` return `x-api-version: v1`; `/api/versions` lists supported versions\n- `test_build_router_path_version_beats_unknown_accept_header` — path-based version wins over malformed `Accept` header\n\n**Dashboard and providers**\n- `test_build_router_serves_dashboard_locales` — `/locales/en.json`, `/locales/zh-CN.json`, `/locales/ja.json` return correct i18n keys\n- `test_build_router_providers_marks_local_providers` — `/api/providers` marks ollama with `is_local: true`\n- `test_build_router_unauthorized_responses_include_api_version_header` — 401 responses still include `x-api-version`\n\n**Agent lifecycle**\n- `test_spawn_list_kill_agent` — full CRUD cycle: POST to spawn, GET to list (paginated `{ items, total, offset, limit }`), DELETE to kill\n- `test_multiple_agents_lifecycle` — spawn 3 agents, verify count, kill individually, verify cleanup\n- `test_agent_session_empty` — newly spawned agent has 0 messages\n- `test_agent_monitoring_endpoints` — `/api/agents/{id}/metrics` returns token usage/tool call stats; `/api/agents/{id}/logs` supports level filtering\n- `test_invalid_agent_id_returns_400` — non-UUID path params rejected with 400\n- `test_kill_nonexistent_agent_returns_404` — valid UUID that doesn't exist returns 404\n- `test_spawn_invalid_manifest_returns_400` — broken TOML returns 400 with error message\n\n**Pagination, sorting, search**\n- `test_agent_list_paginated_response_format` — verifies `{ items, total, offset, limit }` envelope\n- `test_agent_list_invalid_sort_returns_400` — unknown sort field rejected\n- `test_agent_list_valid_sort_fields` — `name`, `created_at`, `last_active`, `state` accepted\n- `test_agent_list_limit_clamped_to_max` — limit > 100 clamped to 100\n- `test_agent_list_pagination` — offset/limit paging across multiple pages\n- `test_agent_list_text_search` — `?q=` filters by name/description\n\n**Authentication** (uses `start_test_server_with_auth`)\n- `test_auth_health_is_public` — `/api/health` accessible without token\n- `test_auth_rejects_no_token` — protected endpoints return 401 \"Missing\" with no header\n- `test_auth_rejects_wrong_token` — wrong Bearer token returns 401 \"Invalid\"\n- `test_auth_accepts_correct_token` — correct token returns 200\n- `test_auth_disabled_when_no_key` — empty API key in config disables auth entirely\n\n**Workflows and triggers**\n- `test_workflow_crud` — create workflow with steps, list, verify structure\n- `test_trigger_crud` — create lifecycle trigger, list (unfiltered and by `agent_id`), delete, verify empty\n\n**Tools**\n- `test_list_tools` — returns array with `total > 0`\n- `test_get_tool_found` — fetch individual tool by name, verify `input_schema`\n- `test_get_tool_not_found` — unknown tool returns 404\n\n**Hot config reload**\n- `test_config_reload_hot_reloads_proxy_changes` — POST `/api/config/reload` picks up proxy changes without restart; response includes `hot_actions_applied: [\"ReloadProxy\"]`\n\n**Migration**\n- `test_run_migrate_uses_daemon_home_when_target_dir_is_empty` — POST `/api/migrate` with `target_dir: \"\"` writes to kernel's home directory; verifies `config.toml`, `agent.toml`, and `migration_report.md`\n\n**Hands / chat-picker grouping**\n- `list_active_hands_includes_definition_metadata` — installs a hand definition, activates it, sets agents, then verifies `/api/hands/active` returns enriched fields: `hand_name`, `hand_icon`, `coordinator_role`, `agent_ids` role map\n\n**MCP bridge** (`/mcp` endpoint)\n- `test_mcp_http_rehydrates_caller_context_from_agent_header` — regression test for issue #2699: `X-LibreFang-Agent-Id` header rehydrates caller context so CLI drivers can call workspace tools\n- `test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated` — garbage/unknown UUID degrades gracefully to unauthenticated path (same error, not a 500)\n- `test_mcp_http_unrestricted_agent_can_call_any_tool` — agent with no `[capabilities]` section (unrestricted) can call any tool through the bridge\n- `test_mcp_http_enforces_agent_tool_allowlist` — agent whose manifest omits `cron_list` gets \"Permission denied\" through the bridge\n\n**Real LLM** (gated on `GROQ_API_KEY`)\n- `test_send_message_with_llm` — spawns a Groq-backed agent, sends \"Say hello in exactly 3 words\", verifies non-empty response with `input_tokens > 0` and `output_tokens > 0`, then checks session has messages\n\n### `daemon_lifecycle_test.rs`\n\nTests the daemon startup/shutdown lifecycle and PID file management.\n\n**Unit tests:**\n- `test_daemon_info_serde_roundtrip` — `DaemonInfo` serializes to/from JSON correctly\n- `test_read_daemon_info_from_file` — reads a valid `daemon.json` from disk\n- `test_read_daemon_info_missing_file` — returns `None` when file absent\n- `test_read_daemon_info_corrupt_json` — returns `None` for invalid JSON\n- `test_stale_daemon_info_detection` — reads file even with impossible PID (liveness check is upstream's job)\n\n**Integration tests:**\n- `test_full_daemon_lifecycle` — boot kernel → start server → write `daemon.json` → verify health/status endpoints → POST `/api/shutdown` → verify cleanup\n- `test_server_immediate_responsiveness` — health endpoint responds in <1s from first bind\n\n### `load_test.rs`\n\nPerformance and throughput smoke tests. All use `start_test_server()` with ollama (no real LLM calls).\n\n| Test | What it measures | Threshold |\n|---|---|---|\n| `load_endpoint_latency` | p50/p95/p99 for 8 GET endpoints (100 samples each after warmup) | p95 < 1s |\n| `load_concurrent_reads` | 50 simultaneous GETs across health/agents/status/metrics | all succeed |\n| `load_concurrent_agent_spawns` | 20 parallel POST `/api/agents` | ≥18 succeed (`#[ignore]` — race condition) |\n| `load_session_management` | Create 10 sessions, list, switch between them | at least some created |\n| `load_workflow_operations` | 15 concurrent workflow creates, then list | all accounted for |\n| `load_spawn_kill_cycle` | Sequential spawn → kill 10 agents | only default assistant remains (`#[ignore]`) |\n| `load_metrics_sustained` | 200 sequential GET `/api/metrics`, verify `librefang_agents_active` present | all 200 |\n\nTests marked `#[ignore]` have known race conditions in concurrent agent lifecycle — run them explicitly with `--ignored` when needed.\n\n### `openapi_spec_test.rs`\n\n- `generate_openapi_json` — calls `ApiDoc::openapi()` via utoipa, serializes to JSON, asserts 100+ paths present, writes to `../../openapi.json` at repo root for SDK codegen and CI.\n\n## Test Manifests\n\n| Constant | Provider | Capabilities | Purpose |\n|---|---|---|---|\n| `TEST_MANIFEST` | ollama | `file_read`, full memory | Default agent for non-LLM tests |\n| `LLM_MANIFEST` | groq | `file_read`, full memory | Real LLM integration tests |\n| `MCP_TEST_MANIFEST` | ollama | `cron_list`, `cron_create`, `cron_cancel`, full memory | MCP bridge tests needing cron tools |\n| `UNRESTRICTED_MANIFEST` | ollama | none (no `[capabilities]`) | MCP unrestricted agent test |\n\n## Key Dependencies\n\n- `LibreFangKernel::boot_with_config()` — boots the runtime kernel with an isolated config\n- `AppState` — shared application state (`Arc`-wrapped), constructed per test\n- `server::build_router()` — production router builder (used by `FullRouterHarness`)\n- `middleware::request_logging` / `middleware::auth` — injected via `axum::middleware::from_fn`\n- `routes::*` — individual route handlers mounted on test routers\n- `ws::agent_ws` — WebSocket route (mounted but not exercised over WS in these tests)\n- `tempfile::TempDir` — auto-cleaned isolation directories; held alive by the harness struct\n\n## Conventions\n\n- All async tests use `#[tokio::test(flavor = \"multi_thread\")]` because kernel operations spawn background tasks.\n- Temp directories are owned by the harness struct (`_tmp` field) and cleaned up on `Drop`.\n- Kernel shutdown is explicit via `Drop` on the harness — not relying on process exit.\n- The default assistant agent is auto-spawned by the kernel, so agent counts always include it (+1 to test-spawned agents).\n- LLM-dependent tests check `std::env::var(\"GROQ_API_KEY\")` and print a skip message rather than failing when the key is absent.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nThe HTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate exposes the agent's runtime, channels, skills, extensions, and management capabilities through a RESTful JSON API and WebSocket endpoints.\n\n## Architecture\n\n`librefang-api` sits at the top of the crate dependency graph, integrating nearly every other librefang crate into a unified network-facing service:\n\n```mermaid\ngraph TD\n    API[librefang-api]\n    API --> AXM[axum / tower / tower-http]\n    API --> KERN[librefang-kernel]\n    API --> RUNTIME[librefang-runtime]\n    API --> MEM[librefang-memory]\n    API --> CH[librefang-channels]\n    API --> SKILLS[librefang-skills]\n    API --> HANDS[librefang-hands]\n    API --> EXT[librefang-exte
