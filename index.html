rvices. The tests live under `librefang-runtime/tests/` and are compiled as separate crates by Cargo's integration test harness.\n\n## Test Files and Coverage\n\n| File | Concern | Key APIs under test |\n|------|---------|-------------------|\n| `instrument_span_fields.rs` | Tracing span field propagation | `tracing::span`, `EnvFilter` |\n| `mcp_oauth_integration.rs` | MCP OAuth discovery & token lifecycle | `McpOAuthProvider`, `McpAuthState`, `discover_oauth_metadata` |\n| `tool_exec_backend_selection.rs` | Tool-exec backend dispatch | `resolve_backend_kind`, `build_backend`, `BackendKind` |\n| `tool_runner_agent_event.rs` | Agent & event tool dispatch | `execute_tool_raw` via `agent_send`, `agent_list`, `event_publish` |\n| `tool_runner_forwarding.rs` | Memory tool forwarding | `execute_tool_raw` via `memory_store`, `memory_recall`, `memory_list` |\n| `tool_runner_forwarding_task_cron.rs` | Task & cron tool dispatch | `execute_tool_raw` via `task_post`, `task_status`, `cron_create` |\n\n## Architecture\n\nThe tool-runner tests share a common mock-kernel pattern. A `CapturingKernel` struct implements the full `KernelHandle` role-trait composition from `librefang-kernel-handle`. Each test file specializes the mock: traits relevant to the test record invocations into `Arc<Mutex<Vec<...>>>` capture logs, while all other traits return stub errors.\n\n```mermaid\ngraph TD\n    TC[\"Test case\"] -->|\"constructs\"| CTX[\"ToolExecContext\"]\n    TC -->|\"calls\"| ETR[\"execute_tool_raw(tool_name, input, ctx)\"]\n    ETR -->|\"dispatches to\"| CK[\"CapturingKernel (mock)\"]\n    CK -->|\"implements\"| KH[\"dyn KernelHandle\"]\n    KH -.->|\"AgentControl\"| AC[\"send_to_agent / list_agents\"]\n    KH -.->|\"MemoryAccess\"| MA[\"memory_store / recall / list\"]\n    KH -.->|\"TaskQueue\"| TQ[\"task_post / task_get\"]\n    KH -.->|\"EventBus\"| EB[\"publish_event\"]\n    KH -.->|\"CronControl\"| CC[\"cron_create\"]\n    AC & MA & TQ & EB & CC -->|\"records into\"| CAP[\"Arc<Mutex<Vec<CapturedCall>>>\"]\n    TC -->|\"asserts on\"| CAP\n```\n\n### ToolExecContext Construction\n\nEvery tool-runner test builds a `ToolExecContext` with a helper function (`make_ctx`) that wires an `Arc<dyn KernelHandle>` and relevant IDs:\n\n```rust\nfn make_ctx<'a>(\n    kernel: &'a Arc<dyn KernelHandle>,\n    sender_id: Option<&'a str>,\n    caller_agent_id: Option<&'a str>,\n) -> ToolExecContext<'a>\n```\n\nFields like `mcp_connections`, `web_ctx`, `browser_ctx`, `media_engine`, etc. are set to `None` because the tests under test here don't exercise those code paths.\n\n## Test Details by File\n\n### instrument_span_fields.rs\n\nValidates that `agent.id` and `session.id` set as `#[instrument]` fields on `run_agent_loop` propagate to child events. Rather than spinning up a real agent loop, tests construct equivalent spans by hand and use a `CaptureWriter` to intercept formatted output.\n\nThree scenarios:\n\n- **`warn_inside_agent_span_includes_agent_and_session_ids`** — Verifies both fields appear in a non-compact formatted event inside the span.\n- **`info_span_is_dropped_under_warn_target_filter`** — Confirms that `INFO`-level spans are filtered out when the subscriber uses `EnvFilter::new(\"warn\")`, justifying the `level = \"warn\"` override on `run_agent_loop`'s `#[instrument]`.\n- **`warn_span_survives_warn_target_filter_and_carries_fields`** — Confirms that `WARN`-level spans survive the warn filter and fields propagate to events.\n\n### mcp_oauth_integration.rs\n\nTests MCP OAuth discovery, provider wiring, token lifecycle, and auth-state serialization.\n\n**Discovery tests:**\n- `test_discover_fallback_to_config` — When the server is unreachable, `discover_oauth_metadata` falls back to `McpOAuthConfig` values.\n- `test_discover_fails_without_any_source` — With no server and no config, discovery returns an error.\n\n**OAuth provider wiring (regression):**\n- `test_http_connect_calls_oauth_provider_load_token` — Catches the bug where `oauth_provider: None` was silently passed in `connect_mcp_servers`. Uses `TrackingOAuthProvider` which records whether `load_token` was invoked during a failed HTTP MCP connection.\n\n**Token lifecycle via `InMemoryOAuthProvider`:**\n- `test_provider_store_then_load` — Store then load returns the token.\n- `test_provider_clear_removes_token` — Clear removes the stored token.\n- `test_provider_clear_is_isolated` — Clearing one server doesn't affect another.\n- `test_provider_reauthorize_after_clear` — Store → clear → store works (re-authorization).\n\n**Auth state serialization:**\n- `test_auth_state_lifecycle` — Validates the full lifecycle: `NeedsAuth` → `PendingAuth` → `Authorized` → `NeedsAuth` (after revoke). Regression test ensuring revoke produces `NeedsAuth` (showing the Authorize button), not a removed/null state.\n- `test_needs_auth_serializes_differently_from_pending_auth` — Ensures `NeedsAuth` and `PendingAuth` serialize to distinct `\"state\"` values, preventing the dashboard from showing \"Authorizing...\" before the user clicks Authorize.\n\n### tool_exec_backend_selection.rs\n\nTests the dispatch path from `config.toml` + `agent.toml` → `resolve_backend_kind` → `build_backend` → trait-object dispatch (issue #3332).\n\n**Resolution precedence:**\n- `default_kernel_config_resolves_to_local` — Default `KernelConfig` gives `BackendKind::Local`.\n- `agent_manifest_override_wins_over_global` — Per-agent `tool_exec_backend` overrides global config.\n- `agent_manifest_no_field_falls_back_to_global` — When `tool_exec_backend` is `None`, global config wins.\n\n**TOML parsing:**\n- `config_toml_kind_local_loads` / `config_toml_kind_docker_loads` — Verifies `[tool_exec] kind = \"...\"` parses correctly.\n\n**Backend construction:**\n- `build_backend_local_dispatches_to_local_impl` — Local always succeeds.\n- `build_backend_docker_dispatches_to_docker_impl` — Docker builds even without a running daemon.\n- `build_backend_ssh_without_subtable_or_feature_errors` / `build_backend_daytona_without_subtable_or_feature_errors` — Missing config returns an error.\n\n**End-to-end (Unix only):**\n- `end_to_end_local_dispatch_runs_command` — Full pipeline from TOML parse through `build_backend` to `run_command(\"echo end-to-end-3332\")`, verifying stdout.\n\n### tool_runner_agent_event.rs\n\nTests `agent_send`, `agent_list`, and `event_publish` dispatch through `execute_tool_raw` (issue #3696). Uses a `CapturingKernel` that records sends and events.\n\n**agent_send:**\n- `agent_send_forwards_target_agent_id_and_message` — Verifies `AgentControl::send_to_agent` receives the correct `agent_id` and `message`.\n- `agent_send_self_is_refused_to_avoid_deadlock` — Self-send is rejected before reaching the kernel (prevents deadlock on the per-agent message lock).\n\n**agent_list:**\n- `agent_list_renders_kernel_provided_agents` — Output contains both IDs and names from `list_agents`.\n- `agent_list_when_no_agents_running_returns_friendly_string` — Empty list returns a user-friendly \"no agents\" message, not an error.\n\n**event_publish:**\n- `event_publish_forwards_event_type_and_payload` — Verifies `EventBus::publish_event` receives the correct `event_type` and `payload`.\n- `event_publish_missing_event_type_errors_without_invoking_kernel` — Validation short-circuits before calling `publish_event`.\n\n### tool_runner_forwarding.rs\n\nTests that `memory_store`, `memory_recall`, and `memory_list` forward the `sender_id` from `ToolExecContext` as the `peer_id` argument to `MemoryAccess` trait methods.\n\nKey behaviors verified:\n- `sender_id: Some(\"user-42\")` → `peer_id: Some(\"user-42\")` for all three tools.\n- `sender_id: None` → `peer_id: None` for all three tools.\n- `sender_id_not_leaked_between_calls` — Sequential calls with different `sender_id` values maintain isolation; each call records only its own sender.\n\n### tool_runner_forwarding_task_cron.rs\n\nTests `task_post`, `task_status`, and `cron_create` dispatch through `execute_tool_raw`.\n\n**task_post:**\n- `test_task_post_forwards_caller_as_created_by` — `caller_agent_id` is forwarded as `created_by`.\n- `test_task_post_forwards_none_created_by` — When `caller_agent_id` is `None`, `created_by` is `None`.\n\n**cron_create:**\n- `test_cron_create_injects_sender_peer_id` — `sender_id` from context is injected as `peer_id` in the cron job JSON if not already present.\n- `test_cron_create_preserves_existing_peer_id` — If the input already has a `peer_id`, it is preserved (not overwritten).\n- `test_cron_create_forwards_caller_as_agent_id` — `caller_agent_id` is forwarded as the `agent_id` parameter to `CronControl::cron_create`.\n\n**task_status:**\n- `test_task_status_projects_six_canonical_fields` — Returns exactly `status`, `result`, `title`, `assigned_to`, `created_at`, `completed_at` from the full task row.\n- `test_task_status_not_found_returns_message` — Missing task returns a \"not found\" message (not an error result).\n- `test_task_status_missing_task_id_errors` — Missing `task_id` parameter returns an error.\n\n## Running\n\n```bash\n# All integration tests for this crate\ncargo test -p librefang-runtime\n\n# Single file\ncargo test -p librefang-runtime --test instrument_span_fields\ncargo test -p librefang-runtime --test mcp_oauth_integration\ncargo test -p librefang-runtime --test tool_exec_backend_selection\ncargo test -p librefang-runtime --test tool_runner_agent_event\ncargo test -p librefang-runtime --test tool_runner_forwarding\ncargo test -p librefang-runtime --test tool_runner_forwarding_task_cron\n\n# Single test case\ncargo test -p librefang-runtime --test tool_runner_agent_event -- agent_send_self_is_refused\n```\n\n## Adding New Tool Dispatch Tests\n\nTo test a new tool through `execute_tool_raw`:\n\n1. Add the trait method to the existing `CapturingKernel` in the relevant file (or create a new test file if it's a distinct tool family).\n2. Record calls into an `Arc<Mutex<Vec<...>>>` inside the trait implementation.\n3. Build a `ToolExecContext` via `make_ctx`, populating only the fields the tool reads.\n4. Call `execute_tool_raw(tool_id, \"tool_name\", &json_input, &ctx).await`.\n5. Assert on both the return value (`result.is_error`, `result.content`) and the captured calls.\n\nFor the mock kernel, only implement the traits the tool under test actually calls. All other `KernelHandle` traits should return stub errors (`Err(\"not implemented\".into())`) so that accidental calls surface as test failures rather than silent no-ops.","other-librefang-runtime-wasm-tests":"# Other — librefang-runtime-wasm-tests\n\n# librefang-runtime-wasm-tests — Integration Test Suite\n\n## Purpose\n\nEnd-to-end integration tests for the `WasmSandbox` public API in `librefang-runtime-wasm`. The suite exercises the full lifecycle — load, instantiate, invoke — and validates every sandbox boundary enforcement mechanism: capabilities, fuel caps, ABI validation, and memory limits.\n\nTests use inline WAT (WebAssembly Text format) guest modules so there are **no external fixture dependencies**. Wasmtime's `Module::new` accepts both binary `.wasm` and text `.wat`, so each test embeds its guest program as a `const &str`.\n\nAll tests target the async `execute()` entry point, which means the `spawn_blocking` + watchdog plumbing in the production code path is also covered.\n\n## Test Coverage Matrix\n\n| Test | Boundary | Validates |\n|------|----------|-----------|\n| `sandbox_loads_and_invokes_echo_module` | Happy path | JSON round-trip through guest, fuel metering reports > 0 |\n| `sandbox_accepts_module_loaded_from_disk` | Happy path | Bytes loaded from disk work identically to inline bytes |\n| `sandbox_denies_fs_read_without_capability` | Capability | `fs_read` returns a denied error when no capabilities are granted |\n| `sandbox_allows_capless_host_call` | Capability | `time_now` (no capability required) succeeds unconditionally |\n| `sandbox_capability_grant_toggles_env_read` | Capability | `env_read(\"PATH\")` succeeds with `EnvRead(\"PATH\")` grant, denied without it |\n| `sandbox_fuel_cap_traps_runaway_guest` | Fuel | Infinite loop traps with `SandboxError::FuelExhausted` at the configured limit |\n| `sandbox_rejects_module_missing_required_exports` | ABI | Module missing `execute` export is rejected with `SandboxError::AbiError` |\n| `sandbox_memory_cap_blocks_oversized_growth` | Memory | Guest requesting 200 pages (≈13 MiB) against a 1 MiB cap is denied |\n\n## Guest Module Fixtures\n\nEach fixture is a self-contained WAT module. All well-behaved modules export the same minimum ABI that the sandbox expects:\n\n- **`memory`** — exported linear memory\n- **`alloc(size) → ptr`** — bump allocator for the host to write into guest memory\n- **`execute(ptr, len) → u64`** — entry point; returns `(ptr: u32, len: u32)` packed into the low and high 32 bits of an `i64`\n\n### `ECHO_WAT`\n\n```\nmemory(1 page)  ·  alloc  ·  execute → returns input ptr/len unchanged\n```\n\nThe simplest conforming guest. The host writes JSON into allocated memory, calls `execute`, and the guest returns the same pointer and length — the host then reads back identical bytes. Validates JSON serialization round-trip and the core ABI.\n\n### `HOST_CALL_PROXY_WAT`\n\n```\nmemory(2 pages)  ·  alloc  ·  execute → forwards to host_call import\n```\n\nImports `librefang::host_call` from the host. `execute` passes its input directly to `host_call` and returns whatever the host sends back. This is the vehicle for testing capability checks — the test sends JSON like `{\"method\": \"fs_read\", \"params\": {\"path\": \"Cargo.toml\"}}` and inspects the response for denied/allowed signals.\n\n### `INFINITE_LOOP_WAT`\n\n```\nmemory(1 page)  ·  alloc  ·  execute → (loop (br 0)) — never returns\n```\n\nA tight infinite loop (`loop $inf (br $inf)`). With a low `fuel_limit` (10,000), wasmtime traps with `Trap::OutOfFuel`, which the sandbox maps to `SandboxError::FuelExhausted`. Guards against unbounded CPU consumption by runaway guests.\n\n### `MISSING_EXECUTE_WAT`\n\n```\nmemory(1 page)  ·  alloc  — no execute export\n```\n\nDeliberately omits the required `execute` export. The sandbox's ABI validation detects this during export resolution and returns `SandboxError::AbiError` mentioning the missing symbol. Prevents unclear failures later in the pipeline.\n\n### `MEMORY_GROW_WAT`\n\n```\nmemory(1 page)  ·  alloc  ·  execute → memory.grow(200), returns grow result as len\n```\n\nCalls `memory.grow(200)` (requesting ~12.5 MiB). When the `MemoryLimiter` denies the request, `memory.grow` returns `-1`, which the guest surfaces as the packed result length. The host's bounds check then rejects the oversized (or `-1`-cast) length, surfacing as `SandboxError::AbiError`. This proves the linear-memory cap is enforced at the wasmtime level before host memory is consumed.\n\n## Architecture and Execution Flow\n\nEach test follows the same pattern:\n\n```mermaid\nflowchart LR\n    A[Test function] -->|\"WAT bytes + JSON input + SandboxConfig\"| B[WasmSandbox::execute]\n    B --> C[Module::new]\n    C --> D[Instantiate + configure limits]\n    D --> E[\"Guest execute()\"]\n    E -->|Success| F[\"SandboxResult { output, fuel_consumed }\"]\n    E -->|Trap| G[\"SandboxError::*\"]\n```\n\n1. **Create sandbox** — `WasmSandbox::new()` initializes the wasmtime `Engine`.\n2. **Prepare input** — A `serde_json::Value` and a `SandboxConfig` (fuel limit, capabilities, memory cap).\n3. **Call `execute()`** — The async entry point spawns work on a blocking thread, compiles the WAT, validates exports, instantiates with configured limiters, and invokes the guest's `execute`.\n4. **Assert outcome** — Either the result JSON matches expectations (happy path) or the error variant matches the expected `SandboxError` variant (boundary tests).\n\n## Dependencies\n\n- **`librefang-runtime-wasm`** — the crate under test; provides `WasmSandbox`, `SandboxConfig`, `SandboxError`.\n- **`librefang-types`** — provides `Capability` enum for capability grant configuration.\n- **`tokio`** — test runtime (`#[tokio::test]`).\n- **`serde_json`** — constructing and asserting on JSON payloads.\n- **`tempfile`** — `NamedTempFile` for the disk-load test only.\n\n## Running the Tests\n\n```sh\n# From the workspace root\ncargo test -p librefang-runtime-wasm --test sandbox_integration\n\n# Single test\ncargo test -p librefang-runtime-wasm --test sandbox_integration sandbox_fuel_cap_traps_runaway_guest\n```\n\n### CWD Assumption\n\n`sandbox_denies_fs_read_without_capability` asserts that `Cargo.toml` exists in the current working directory. Cargo sets CWD to the crate root by default, but alternative test runners (e.g., nextest with a custom workdir) could break this assumption. The test fails loudly with a diagnostic if `Cargo.toml` is missing rather than silently passing for the wrong reason.\n\n## Adding New Tests\n\nTo add a test for a new sandbox boundary:\n\n1. **Define a WAT fixture** as a module-level `const &str` if no existing fixture exercises the behavior. Follow the minimum ABI (`memory`, `alloc`, `execute`).\n2. **Write the test** as an `async fn` with `#[tokio::test]`, calling `sandbox.execute()` with the appropriate `SandboxConfig`.\n3. **Assert on the specific `SandboxError` variant** for negative tests, or on the `SandboxResult::output` JSON for positive tests. Avoid asserting on exact error messages — prefer matching the error variant and checking for keyword presence.","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime.\n\n## Purpose\n\nThis module provides a sandboxed WebAssembly execution environment for LibreFang skills. It uses [Wasmtime](https://wasmtime.dev/) to compile and run WASM modules in an isolated, secure runtime, allowing untrusted or third-party skill code to execute without compromising the host system.\n\n## Role in the Architecture\n\n```mermaid\ngraph TD\n    A[librefang-kernel] -->|dispatches skill execution| B[librefang-runtime-wasm]\n    B -->|loads & runs| C[WASM Skill Module]\n    B -->|uses types from| D[librefang-types]\n    B -->|communicates via| E[librefang-kernel-handle]\n    B -->|HTTP support| F[librefang-http]\n```\n\nThe WASM runtime sits between the LibreFang kernel and skill modules. The kernel delegates skill execution to this module, which isolates each skill inside a Wasmtime instance. Skills communicate back to the host through the kernel handle interface.\n\n## Key Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `wasmtime` | WebAssembly compilation and execution engine |\n| `librefang-types` | Shared type definitions used across all LibreFang crates |\n| `librefang-kernel-handle` | Interface for sandboxed communication between the WASM guest and the host kernel |\n| `librefang-http` | HTTP client/server capabilities available to the sandbox |\n| `tokio` | Async runtime for non-blocking WASM instantiation and invocation |\n| `serde_json` | JSON serialization for interop between host and guest |\n| `tracing` | Structured logging and diagnostics |\n\n## Sandbox Model\n\nSkills are loaded as `.wasm` binaries and executed within Wasmtime's sandbox. This provides:\n\n- **Memory isolation** — each skill operates in its own linear memory space with no access to host memory.\n- **Capability control** — host functions exposed to the guest are explicitly defined, limiting what a skill can do.\n- **Resource limits** — Wasmtime supports configurable limits on memory, CPU, and table sizes.\n\nCommunication between the guest skill and the host flows through `librefang-kernel-handle`, which defines the typed interface the WASM module can call into.\n\n## Async Execution\n\nThe module depends on `tokio`, indicating that WASM instantiation and function invocation are async. This prevents skill execution from blocking the kernel's event loop, allowing many skills to run concurrently.\n\n## Error Handling\n\nTwo error strategies are in use:\n\n- `thiserror` for typed, predictable error variants (e.g., instantiation failure, trap during execution, invalid module format).\n- `anyhow` for internal operations where error variety is unbounded (e.g., Wasmtime engine configuration, I/O during module loading).\n\n## Testing\n\nDev-dependencies include `tempfile` and `async-trait`, suggesting tests create temporary WASM modules on disk and validate async loading and execution paths end-to-end.\n\n## Connection Points\n\n- **Inbound**: The kernel (or a higher-level orchestrator) calls into this module to instantiate and execute a skill.\n- **Outbound**: The module calls into `librefang-kernel-handle` to provide host functions to the WASM guest, and may use `librefang-http` to fulfill network requests originating from skill code.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent execution engine for LibreFang. Runs the turn-by-turn agent loop, dispatches tools, manages conversation context, and provides sandboxed execution environments.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api\"]\n    K[\"librefang-kernel\"]\n    KH[\"librefang-kernel-handle<br/>(KernelHandle trait)\"]\n    R[\"librefang-runtime\"]\n    T[\"librefang-types\"]\n    H[\"librefang-http\"]\n    M[\"librefang-runtime-mcp\"]\n    O[\"librefang-runtime-oauth\"]\n    W[\"librefang-runtime-wasm\"]\n    S[\"librefang-skills\"]\n    C[\"librefang-channels\"]\n\n    API --> R\n    K --> R\n    R --> KH\n    R --> T\n    R --> H\n    R --> M\n    R --> O\n    R --> W\n    R --> S\n    R --> C\n\n    style R fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nThe kernel invokes the runtime when an agent receives a message. The runtime never depends on the kernel directly — all communication flows through the `KernelHandle` trait (defined in the sibling `librefang-kernel-handle` crate). The kernel implements `KernelHandle`; the runtime consumes it. This breaks what would otherwise be a circular dependency.\n\n## Owned Modules\n\n| Module | Responsibility |\n|---|---|\n| `agent_loop` | Turn-by-turn agent execution. ~10k LOC. Slated for extraction (#3710). |\n| `tool_runner` | Tool execution path. ~9.7k LOC. Also targeted by #3710. |\n| `compactor` | Conversation history compaction. |\n| `context_budget` | Token budget tracking for context windows. |\n| `context_compressor` | Context compression strategies. |\n| `context_overflow` | Overflow handling when context exceeds limits. |\n| `audit` | Audit trail for agent actions. |\n| `auth_cooldown` | Rate-limiting for authentication attempts. |\n| `aux_client` | Auxiliary HTTP client for internal calls. |\n| `browser` | Browser sandbox execution. |\n| `catalog_sync` | Model catalog synchronization. |\n| `channel_registry` | Registry of available channels. |\n| `checkpoint_manager` | Agent state checkpointing. |\n| `dangerous_command` | Detection and handling of dangerous shell commands. |\n| `docker_sandbox` | Docker container sandboxing for tool execution. |\n| `media` | Media processing (PDF extraction, images). |\n| `model_catalog` | `ModelCatalog` type — registry of 130+ models across 28 providers. |\n| `mcp` | MCP (Model Context Protocol) client. |\n| `prompt_builder` | Prompt assembly from context, tools, and capabilities. |\n| `a2a` | Agent-to-Agent peer protocol. |\n| `apply_patch` | Tool-level patch application. |\n\n### What is NOT owned here\n\n- Agent registry, scheduler, cron, orchestration → `librefang-kernel`\n- HTTP routing → `librefang-api`\n- Channel transport adapters → `librefang-channels`\n- Skill loading → `librefang-skills`\n\n## KernelHandle\n\nThe `KernelHandle` trait lives in `librefang-kernel-handle`, not in this crate. Whenever runtime code needs a kernel callback (persisting state, emitting events, accessing shared services), it goes through `KernelHandle`.\n\n```rust\n// Correct: accept KernelHandle as a parameter\npub async fn run_agent<H: KernelHandle>(handle: &H, ...) { ... }\n```\n\nNever depend on `librefang-kernel` directly. Never mock `KernelHandle` by hand — use `librefang-testing::MockKernelBuilder`.\n\n## ModelCatalog\n\n`model_catalog::ModelCatalog` is the type definition for the model registry. It tracks 130+ models across 28 providers.\n\nThe kernel wraps `ModelCatalog` in `arc_swap::ArcSwap` (#3384) for lock-free reads. All mutations must go through the kernel's `model_catalog_update(|cat| ...)` callback on `KernelHandle`. The runtime does not mutate the catalog directly.\n\n## MCP Client and OAuth\n\nThe `mcp` module provides the MCP client. OAuth state for MCP servers is stored in `mcp_auth_states`. The `McpOAuthProvider` trait is implemented on the kernel side; the runtime calls it through `KernelHandle`.\n\nOAuth subsystems (`chatgpt_oauth`, `copilot_oauth`) are re-exported from `librefang-runtime-oauth`.\n\n## Feature Flags\n\n| Feature | Enables |\n|---|---|\n| `landlock-sandbox` | Linux Landlock-based sandboxing via the `landlock` crate. |\n| `seccomp-sandbox` | Seccomp-based sandboxing via `seccompiler`. |\n| `ssh-backend` | Remote SSH tool-execution backend via `russh` / `russh-keys` (#3332). |\n| `daytona-backend` | Daytona managed-sandbox backend (#3332). No additional deps — uses existing `reqwest`. |\n\n## Cross-Cutting Invariants\n\n### Deterministic prompt ordering (#3298)\n\nTool definitions, MCP server summaries, and capability lists must be sorted before stringification. Use `BTreeMap` / `BTreeSet`, never `HashMap`. Non-deterministic ordering causes flaky tests and reproducibility failures.\n\n### Identity files\n\nWorkspace identity files live at `{workspace}/.identity/`, not the workspace root. `read_identity_file()` falls back to the root for pre-migration workspaces. `migrate_identity_files()` runs on every agent spawn to handle legacy locations.\n\n### USER_AGENT constant\n\nEvery outbound HTTP request must include the `USER_AGENT` constant:\n\n```rust\nuse librefang_runtime::USER_AGENT;\nreq.header(\"User-Agent\", USER_AGENT)\n```\n\nThe audit hook flags any request missing this header.\n\n## Async Pitfalls\n\n### ErrorTranslator is !Send\n\n`ErrorTranslator` (from `RequestLanguage`) is `!Send`. Any `.await` that follows construction of an `ErrorTranslator` must happen after `drop(t)`, or you will hit a cryptic axum `Handler<_, _>` trait-bound error:\n\n```rust\n// Wrong — compiler error\nlet t = ErrorTranslator::new(lang);\nlet result = some_async_call().await;\nt.translate(result)\n\n// Right — drop before await\nlet result = some_async_call().await;\nlet t = ErrorTranslator::new(lang);\nt.translate(result)\n```\n\n### No blocking primitives in async context\n\n- Use `tokio::fs`, not `std::fs`.\n- Use `arc_swap` or `parking_lot`, not `std::sync::RwLock`.\n- Never call `tokio::block_on` from within this crate.\n\n## Testing\n\nThis crate historically had zero integration tests (#3696). Any new runtime work **must** include at least one `#[tokio::test]` exercising the new code path.\n\nRun the test suite:\n\n```bash\ncargo test -p librefang-runtime\n```\n\nFor type-checking without a full build:\n\n```bash\ncargo check --workspace --lib\n```\n\nDo not run `cargo build` locally — real builds run in CI.\n\n## Restrictions\n\n- **No `librefang-kernel` import.** Use `KernelHandle`.\n- **No `librefang-api` import.** The API layer consumes runtime; never the reverse.\n- **No additions to `agent_loop.rs` or `tool_runner.rs`.** Both are slated to shrink via #3710. Extract new functionality into separate modules.\n- **No `unwrap()` / `panic!()` on wire values.** Everything from external input must be handled with proper error propagation.\n- **No inline `KernelHandle` mocks.** Use `librefang-testing::MockKernelBuilder`.\n- **No `cargo build`.** Use `cargo check --workspace --lib`.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides skill registration, loading from disk, marketplace interaction, and OpenClaw compatibility.\n\n## Overview\n\nThis crate manages the full lifecycle of skills in LibreFang:\n\n- **Discovery and loading** of skill definitions from the local filesystem\n- **Registry** of available skills with metadata and versioning\n- **Marketplace** integration for downloading and publishing skills\n- **OpenClaw compatibility** to load skills authored for the OpenClaw ecosystem\n\nSkills are self-contained units of functionality (behaviors, actions, or response patterns) that can be loaded dynamically at runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Local Loader]\n    A --> C[Marketplace Client]\n    A --> D[OpenClaw Adapter]\n    B --> E[Filesystem Scan<br/>walkdir + fs2]\n    C --> F[HTTP/REST<br/>reqwest + rustls]\n    D --> G[Format Translation<br/>serde + aho-corasick]\n    E --> H[(Skills Directory)]\n    F --> I[(Remote Marketplace)]\n```\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang crates |\n| `serde` / `serde_json` / `serde_yaml` / `toml` | Deserialization of skill manifests and configuration in multiple formats |\n| `walkdir` | Recursive directory traversal to discover installed skills |\n| `zip` | Extraction of skill packages (`.zip` archives) downloaded from the marketplace |\n| `sha2` / `hex` | Integrity hashing of skill packages before installation |\n| `semver` | Semantic version parsing and comparison for skill versions and dependency constraints |\n| `reqwest` / `rustls` / `webpki-roots` | HTTPS client for marketplace communication with TLS verification |\n| `aho-corasick` | Efficient multi-pattern string matching — used for fast keyword or pattern detection within skill definitions |\n| `fs2` | File locking to prevent concurrent writes to the skill directory |\n| `thiserror` | Typed error definitions |\n| `tracing` | Structured logging throughout skill operations |\n\n## Core Responsibilities\n\n### Skill Loading\n\nSkills are stored on disk as directories or archive files containing a manifest (TOML, YAML, or JSON) plus any required assets. The loader:\n\n1. Scans configured skill directories using `walkdir`\n2. Parses each skill manifest using the appropriate serde format\n3. Validates version constraints via `semver`\n4. Computes integrity hashes with `sha2` for tamper detection\n5. Acquires a file lock via `fs2` during writes to prevent corruption from concurrent processes\n\n### Skill Registry\n\nThe registry holds all loaded skills and provides lookup by name and version. It supports:\n\n- Multiple versions of the same skill coexisting\n- Semantic version queries (e.g., \"find latest compatible with `^1.2.0`\")\n- Skill metadata: name, version, author, description, dependencies, compatibility tags\n\n### Marketplace Integration\n\nThe marketplace client communicates with a remote skill repository over HTTPS:\n\n- **Search and browse** available skills\n- **Download** skill packages as `.zip` archives\n- **Verify** package integrity via SHA-256 hashes before extraction\n- **Publish** local skills to the marketplace\n\nTLS uses `rustls` with `webpki-roots` for trusted CA certificates and `rustls-native-certs` for platform-native certificate stores.\n\n### OpenClaw Compatibility\n\nThe OpenClaw adapter translates skill definitions authored for the OpenClaw format into LibreFang's internal representation. This involves:\n\n- Parsing OpenClaw-specific manifest schemas\n- Mapping OpenClaw skill properties to LibreFang equivalents\n- Using `aho-corasick` for batch pattern/keyword replacement during format translation\n\n## Error Handling\n\nAll fallible operations return typed errors via `thiserror`. Error variants cover:\n\n- Manifest parsing failures (invalid TOML/YAML/JSON)\n- Version constraint violations\n- Filesystem I/O errors during skill installation or loading\n- Network errors from marketplace requests\n- Integrity check failures (hash mismatch)\n- Lock contention errors\n\n## Logging\n\nOperations are instrumented with `tracing` spans. Key events logged include:\n\n- Skill discovery and loading progress\n- Marketplace request/response cycles\n- Version resolution decisions\n- Compatibility translation steps\n\n## Testing\n\nThe crate uses `tempfile` for isolated filesystem-based tests and `serial_test` to serialize tests that involve file locking, preventing race conditions in concurrent test runs.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry and Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis crate centralizes all metrics definitions and telemetry helpers used across the LibreFang project. By isolating telemetry into its own crate, metric names, labels, and instrumentation patterns stay consistent and discoverable — any crate that needs to emit or observe metrics depends on `librefang-telemetry` rather than importing the raw `metrics` crate directly.\n\n## Dependencies\n\n| Crate | Why |\n|---|---|\n| `metrics` (workspace) | Core metrics façade — provides macros like `counter!`, `gauge!`, `histogram!`. This crate wraps or re-exports them with LibreFang-specific conventions. |\n| `librefang-types` | Shared domain types. Metrics often need to derive label values from types like player IDs, game states, or room identifiers. |\n\n## Architectural Role\n\n`librefang-telemetry` is a **leaf dependency** — it does not call into any other LibreFang crates at runtime. Other crates throughout the workspace import it to emit metrics. This keeps the telemetry surface area small and prevents circular dependencies.\n\n```\n┌──────────────────┐\n│ librefang-server │ ──┐\n├──────────────────┤   │\n│ librefang-game   │ ──┤    depends on\n├──────────────────┤   ├───────────────────►  librefang-telemetry\n│ librefang-irc    │ ──┤                         │\n├──────────────────┤   │                         │ uses\n│      ...        │ ──┘                         ▼\n└──────────────────┘                      metrics (facade)\n```\n\n## Usage Patterns\n\nOther crates interact with this module by calling into its definitions at instrumentation points — typically around network events, game actions, or resource lifecycle changes. The actual metric exporters (Prometheus scrape endpoint, OpenTelemetry push) are configured at the application boundary, not in this library.\n\n### Registering metrics\n\nMetrics are expected to be described or initialized through this crate so that label namespaces and naming conventions (e.g., `librefang_players_connected_total`) remain uniform. This avoids ad-hoc `counter!(\"my_counter\")` calls scattered across the codebase.\n\n### Consuming types for labels\n\nBecause `librefang-types` is a dependency, metric helpers can accept domain types directly and extract the relevant label values internally, keeping call sites clean.\n\n## Workspace Integration\n\nThis crate is part of the LibreFang workspace. It shares workspace-level lint configuration and version numbering via `workspace = true` inheritance in `Cargo.toml`. To add it as a dependency in another workspace crate:\n\n```toml\n[dependencies]\nlibrefang-telemetry = { path = \"../librefang-telemetry\" }\n```\n\n## Adding New Metrics\n\nWhen adding a new metric:\n\n1. **Define it here** — add the metric name constant and any label helpers to this crate.\n2. **Use domain types** — accept `librefang-types` values where possible so label extraction stays centralized.\n3. **Follow naming conventions** — use the `librefang_` prefix and snake_case to keep Prometheus output consistent.\n4. **Document units** — note whether a metric is a count, a gauge in bytes/milliseconds, etc., so downstream dashboard authors know what to expect.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Test Suite (`tests.rs`)\n\n## Purpose\n\nThis file contains **example integration tests** that demonstrate how to use the `librefang-testing` test infrastructure. It validates API endpoints and mock driver behavior, and serves as a reference for writing additional tests against the application.\n\n## Test Infrastructure Overview\n\nEvery test in this file follows the same general pattern:\n\n```\nTestAppState  →  router()  →  test_request()  →  oneshot()  →  assert_json_ok / assert_json_error\n```\n\n```mermaid\ngraph LR\n    A[TestAppState] -->|router| B[Axum Router]\n    B -->|oneshot req| C[HTTP Response]\n    C --> D[assert_json_ok]\n    C --> E[assert_json_error]\n    F[MockKernelBuilder] -->|with_builder| A\n    G[MockLlmDriver] --> H[complete / recorded_calls]\n    I[FailingLlmDriver] --> J[always errors]\n```\n\n### Key Helpers\n\n| Import | Source | Purpose |\n|--------|--------|---------|\n| `TestAppState` | `test_app.rs` | Creates a fully wired app with a mock kernel |\n| `MockKernelBuilder` | `mock_kernel.rs` | Builds a kernel with custom configuration |\n| `test_request` | `helpers.rs` | Constructs an `axum::http::Request` with method, path, and optional body |\n| `assert_json_ok` | `helpers.rs` | Asserts status 200 and deserializes the body into `serde_json::Value` |\n| `assert_json_error` | `helpers.rs` | Asserts a specific error status code and deserializes the error body |\n| `MockLlmDriver` | `mock_driver.rs` | Returns canned responses and records all calls |\n| `FailingLlmDriver` | `mock_driver.rs` | Always returns an error; used for error-handling tests |\n\n## Test Categories\n\n### 1. Health & Version Endpoints\n\n| Test | Endpoint | Assertion |\n|------|----------|-----------|\n| `test_health_endpoint` | `GET /api/health` | Returns `\"status\": \"ok\"` or `\"status\": \"degraded\"` |\n| `test_version_endpoint` | `GET /api/version` | Returns a `\"version\"` field |\n\n### 2. Agent CRUD Operations\n\nTests exercising the agent registry through HTTP:\n\n| Test | Method & Endpoint | Expected Status | Notes |\n|------|-------------------|-----------------|-------|\n| `test_list_agents` | `GET /api/agents` | 200 | Response contains `items` (array) and `total` (u64) |\n| `test_get_agent_invalid_id` | `GET /api/agents/not-a-valid-uuid` | 400 | Invalid UUID format |\n| `test_get_agent_not_found` | `GET /api/agents/{fake_uuid}` | 404 | Valid UUID, nonexistent agent |\n| `test_spawn_agent_post` | `POST /api/agents` | 200 or 201 | Body contains `manifest_toml` |\n| `test_delete_nonexistent_agent_is_idempotent` | `DELETE /api/agents/{fake_uuid}` | 200 | Returns `{\"status\": \"already-deleted\"}` — idempotent by design |\n| `test_patch_agent_not_found` | `PATCH /api/agents/{fake_uuid}` | 404/400 | Nonexistent agent update |\n| `test_set_model_not_found` | `PUT /api/agents/{fake_uuid}/model` | 4xx/5xx | Setting model for missing agent |\n| `test_send_message_agent_not_found` | `POST /api/agents/{fake_uuid}/message` | 404/400 | Messaging a missing agent |\n\n**Design note on DELETE idempotency**: Deleting a valid but nonexistent agent returns `200 OK` with `{\"status\": \"already-deleted\"}` rather than `404`. The `404` status is reserved for malformed UUIDs. This ensures retries from network blips or dashboard double-clicks don't surface phantom errors.\n\n### 3. MockLlmDriver\n\nTwo tests validate the mock LLM driver used across the test suite:\n\n**`test_mock_llm_driver_recording`** — Verifies that:\n- `MockLlmDriver::new(vec![...])` returns responses in order\n- `call_count()` increments with each `complete()` call\n- `recorded_calls()` captures request fields (`model`, `system`)\n\n**`test_mock_llm_driver_custom_tokens_and_stop_reason`** — Verifies builder chain:\n- `MockLlmDriver::with_response(\"text\")` creates a driver with a default response\n- `.with_tokens(200, 100)` sets custom `input_tokens` and `output_tokens`\n- `.with_stop_reason(StopReason::MaxTokens)` overrides the stop reason\n\n### 4. FailingLlmDriver\n\n**`test_failing_llm_driver`** — Confirms that:\n- `FailingLlmDriver::new(\"message\")` always returns `Err` from `complete()`\n- The error message contains the configured string\n- `is_configured()` returns `false`\n\n### 5. Custom Kernel Configuration\n\n**`test_custom_config_kernel`** — Demonstrates using `MockKernelBuilder` to override defaults:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n);\nassert_eq!(app.state.kernel.config_ref().language, \"zh\");\n```\n\n## Common Patterns for Writing New Tests\n\n### Testing a GET endpoint\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_my_endpoint() {\n    let app = TestAppState::new();\n    let router = app.router();\n\n    let req = test_request(Method::GET, \"/api/something\", None);\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n    let json = assert_json_ok(resp).await;\n\n    assert!(json.get(\"expected_field\").is_some());\n}\n```\n\n### Testing an error response\n\n```rust\nlet resp = router.oneshot(req).await.expect(\"request failed\");\nlet json = assert_json_error(resp, StatusCode::BAD_REQUEST).await;\nassert!(json.get(\"error\").is_some());\n```\n\n### Testing with request body\n\n```rust\nlet body = serde_json::json!({ \"key\": \"value\" }).to_string();\nlet req = test_request(Method::POST, \"/api/resource\", Some(&body));\n```\n\n### Runtime requirement\n\nTests that go through the full axum router stack require `multi_thread` flavor because the underlying runtime services need multi-threaded tokio support:\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]  // Required for router tests\n```\n\nTests that only exercise mock drivers (no router) can use the default single-thread flavor:\n\n```rust\n#[tokio::test]  // Sufficient for isolated driver tests\n```","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure crate providing mock implementations and HTTP test utilities for the librefang ecosystem. This crate is **not** published or distributed — it exists solely as a workspace-local dev dependency consumed by integration tests and other crates' test suites.\n\n## Purpose\n\nTesting across the librefang workspace requires deterministic, hermetic substitutes for components that are otherwise non-deterministic (LLM responses), stateful (the kernel), or network-bound (the API layer). This crate consolidates those substitutes in one place so every other crate can depend on a consistent set of fakes without duplicating setup code.\n\nThe three major offerings are:\n\n| Component | What it replaces | Why a mock is needed |\n|---|---|---|\n| **Mock kernel** | `librefang-kernel` | Removes real kernel side-effects; lets tests assert which operations were dispatched |\n| **Mock LLM driver** | Real LLM backend | Eliminates network calls, latency, and cost; returns canned responses |\n| **API route test helpers** | Live `axum` server | Provides an in-process `Router` with tower `ServiceExt` wrappers for request/response assertions |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-testing] --> B[Mock Kernel]\n    A --> C[Mock LLM Driver]\n    A --> D[API Test Helpers]\n    B --> E[librefang-kernel traits]\n    C --> F[librefang-runtime traits]\n    D --> G[librefang-api Router]\n    A --> H[librefang-types]\n    A --> I[librefang-memory]\n```\n\n## Key Components\n\n### Mock Kernel\n\nWraps `librefang-kernel` trait implementations with an in-memory backend. Operations that would normally interact with system-level resources are recorded into a `DashMap`-backed log, allowing tests to assert:\n\n- Which kernel operations were invoked and in what order.\n- The arguments passed to each operation.\n- That no unexpected operations occurred.\n\nThe mock kernel is cheap to construct and can be created per-test without shared global state.\n\n### Mock LLM Driver\n\nImplements the same trait/interface that `librefang-runtime` expects from an LLM driver, but returns pre-configured responses instead of making network calls. Tests configure expected responses before exercising the system under test, keeping behavior deterministic and repeatable.\n\nThis is particularly important for validating prompt construction and response parsing logic without depending on an external LLM service.\n\n### API Route Test Helpers\n\nProvides utilities for constructing an `axum` `Router` suitable for testing without binding to a real TCP port. This leverages `tower::ServiceExt` and `http-body-util` to drive requests through the full middleware stack (including telemetry, added via the `librefang-api` `telemetry` feature) in-process.\n\nTypical usage pattern:\n\n1. Build a `Router` through the provided helpers, injecting mock kernel and LLM instances.\n2. Construct an `axum::body::Body` with the desired request payload.\n3. Call the router via `tower::ServiceExt::oneshot` or similar.\n4. Assert on the response status, headers, and body using the provided assertion helpers or standard `serde_json` deserialization.\n\nThe `tempfile` dependency is used here to create isolated temporary directories for any file-system state the API layer might touch during a test.\n\n## Dependencies\n\n### Workspace crates\n\n- **`librefang-types`** — shared type definitions used in request/response bodies and kernel operations.\n- **`librefang-kernel`** — provides the traits the mock kernel must implement.\n- **`librefang-runtime`** — provides the LLM driver trait the mock driver implements.\n- **`librefang-memory`** — in-memory storage backends used by the mock kernel.\n- **`librefang-api`** — the `Router` and route definitions being tested; imported with `default-features = false` and only the `telemetry` feature enabled, keeping the test router close to production configuration without pulling in unnecessary features.\n\n### Notable external crates\n\n| Crate | Role in this crate |\n|---|---|\n| `dashmap` | Concurrent map backing the operation log in the mock kernel |\n| `arc-swap` | Lock-free swapping of shared state (e.g., swapping mock configurations mid-test) |\n| `tower` / `axum` / `http-body-util` | In-process HTTP request execution without a live server |\n| `tempfile` | Isolated temporary directories for per-test file-system state |\n| `toml` | Parsing test fixture configuration files |\n| `uuid` | Generating deterministic or random IDs in test contexts |\n| `serde_json` | Serializing/deserializing request and response bodies |\n| `async-trait` | Implementing async trait interfaces for mocks |\n\n## Usage from other crates\n\nThis crate should only appear in `[dev-dependencies]`:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\nIt is intentionally not given a `lib` crate-type beyond the default `rlib` — it is not meant to be linked into production artifacts.\n\n## Conventions\n\n- **No `#[test]` functions live here.** This crate provides *infrastructure*; actual tests belong in the crates that exercise their own behavior.\n- **Mocks are unconstrained by default.** If a test needs to enforce stricter behavior (e.g., \"this method must not be called\"), the mock should be configured explicitly for that case rather than failing by surprise.\n- **All mocks are `Send + Sync`.** They are safe to use across Tokio tasks and with `axum`'s thread pool.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types-locales\n\nLocalized API error message definitions for the LibreFang platform, using [Project Fluent](https://projectfluent.org/) (`.ftl`) format. This module is a static resource bundle consumed at runtime by the Fluent localization system to render human-readable error messages in the user's preferred language.\n\n## Directory Layout\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl      # German\n├── en/errors.ftl      # English  (canonical / most complete)\n├── es/errors.ftl      # Spanish\n├── fr/errors.ftl      # French\n├── ja/errors.ftl      # Japanese\n└── zh-CN/errors.ftl   # Simplified Chinese\n```\n\nEach file contains the same set of message identifiers. The **English** locale (`en`) is the authoritative source — other locales may contain a subset of keys and will fall back to English for any missing entry.\n\n## Message Identifiers\n\nAll identifiers follow the naming convention:\n\n```\napi-error-{domain}-{specific-error}\n```\n\nDomains and their associated identifiers:\n\n| Domain | Example Identifiers | Purpose |\n|---|---|---|\n| Agent | `api-error-agent-not-found`, `api-error-agent-spawn-failed` | Agent lifecycle, lookup, execution |\n| Message | `api-error-message-too-large`, `api-error-message-delivery-failed` | Inter-agent messaging |\n| Template | `api-error-template-not-found`, `api-error-template-parse-failed` | Agent template management |\n| Manifest | `api-error-manifest-too-large`, `api-error-manifest-signature-mismatch` | Template manifest validation |\n| Auth | `api-error-auth-invalid-key`, `api-error-auth-missing-header` | API key authentication |\n| Session | `api-error-session-not-found`, `api-error-session-load-failed` | Session management |\n| Workflow | `api-error-workflow-missing-steps`, `api-error-workflow-execution-failed` | Workflow orchestration |\n| Trigger | `api-error-trigger-missing-pattern`, `api-error-trigger-not-found` | Event trigger registration |\n| Budget | `api-error-budget-invalid-amount`, `api-error-budget-update-failed` | Cost budget enforcement |\n| Config | `api-error-config-parse-failed`, `api-error-config-write-failed` | Runtime configuration |\n| Profile | `api-error-profile-not-found` | Provider profiles |\n| Cron | `api-error-cron-create-failed`, `api-error-cron-invalid-expression` | Scheduled tasks |\n| Goal | `api-error-goal-not-found`, `api-error-goal-circular-parent` | Goal tracking with hierarchy |\n| Memory | `api-error-memory-not-found`, `api-error-memory-missing-kv` | Agent persistent memory |\n| Network | `api-error-network-connection-failed`, `api-error-network-a2a-not-found` | Peer networking / A2A protocol |\n| Plugin | `api-error-plugin-missing-name`, `api-error-plugin-invalid-source` | Plugin installation |\n| Channel | `api-error-channel-unknown`, `api-error-channel-invalid-from` | Agent communication channels |\n| Provider | `api-error-provider-alias-exists`, `api-error-provider-model-not-found` | LLM provider configuration |\n| Skill | `api-error-skill-missing-name`, `api-error-skill-install-failed` | Custom skill management |\n| Hand | `api-error-hand-not-found`, `api-error-hand-instance-not-found` | Hand/tool definitions |\n| MCP | `api-error-mcp-missing-name`, `api-error-mcp-invalid-config` | Model Context Protocol servers |\n| Integration | `api-error-integration-not-found` | Third-party integrations |\n| Extension | `api-error-extension-not-found` | Platform extensions |\n| System | `api-error-system-cli-not-found` | System-level operations |\n| KV | `api-error-kv-missing-fields`, `api-error-kv-missing-path` | Key-value / structured memory |\n| Approval | `api-error-approval-not-found` | Human-approval workflows |\n| Webhook | `api-error-webhook-not-enabled`, `api-error-webhook-url-unreachable` | Outbound webhook triggers |\n| Backup | `api-error-backup-not-found`, `api-error-backup-missing-manifest` | System backup/restore |\n| Schedule | `api-error-schedule-invalid-cron`, `api-error-schedule-save-failed` | Recurring schedules |\n| Job | `api-error-job-not-found`, `api-error-job-not-retryable` | Background job processing |\n| Task | `api-error-task-not-found`, `api-error-task-disappeared` | Task lifecycle |\n| Pairing | `api-error-pairing-not-enabled` | Device/token pairing |\n| Binding | `api-error-binding-out-of-range` | Input binding indices |\n| Command | `api-error-command-not-found` | CLI-style commands |\n| File | `api-error-file-path-traversal`, `api-error-file-unsupported-type` | File upload/download |\n| Tool | `api-error-tool-not-found`, `api-error-tool-invoke-disabled` | Direct tool invocation |\n| Validation | `api-error-validation-title-required`, `api-error-validation-color-invalid` | Input field validation |\n| General | `api-error-not-found`, `api-error-internal`, `api-error-rate-limited` | Catch-all HTTP errors |\n\n## Fluent Variable Interpolation\n\nMany messages accept parameters using Fluent's `{$variable}` syntax. The runtime caller is responsible for passing these values when resolving a message.\n\nCommon variables:\n\n| Variable | Used By | Meaning |\n|---|---|---|\n| `$reason` | `bad-request`, `message-delivery-failed` | Human-readable reason string |\n| `$error` | `*-parse-failed`, `*-create-failed`, many others | Underlying error detail |\n| `$name` | `template-not-found`, `profile-not-found`, `command-not-found` | Resource name |\n| `$id` | `agent-not-found-with-id`, `goal-not-found-with-id` | Resource identifier |\n| `$step` | `workflow-step-needs-agent` | Workflow step label |\n| `$alias` | `provider-alias-exists`, `provider-alias-not-found` | Provider alias |\n| `$url` | `network-a2a-not-found`, `network-missing-url` | Endpoint URL |\n| `$status` | `network-auth-failed` | HTTP status code |\n| `$max` | `skill-description-too-long`, `file-too-large` | Size limit |\n| `$field` | `agent-invalid-sort` | Field name |\n| `$valid` | `agent-invalid-sort`, `webhook-unknown-event` | Valid options list |\n| `$provider` | `provider-model-exists` | Provider name |\n| `$event` | `webhook-unknown-event` | Event type name |\n\n## Locale Completeness\n\nNot all locales have full coverage. The matrix below summarizes which domains are translated beyond the core set (agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, general):\n\n| Domain | `en` | `ja` | `de` | `es` | `fr` | `zh-CN` |\n|---|:---:|:---:|:---:|:---:|:---:|:---:|\n| Goal | ✅ | ✅ | — | — | — | — |\n| Memory | ✅ | ✅ | — | — | — | — |\n| Network / A2A | ✅ | ✅ | — | — | — | — |\n| Plugin | ✅ | ✅ | — | — | — | — |\n| Channel | ✅ | ✅ | — | — | — | — |\n| Provider | ✅ | ✅ | — | — | — | — |\n| Skill | ✅ | ✅ | — | — | — | — |\n| Hand | ✅ | ✅ | — | — | — | — |\n| MCP | ✅ | ✅ | — | — | — | — |\n| Integration / Extension | ✅ | ✅ | — | — | — | — |\n| System | ✅ | ✅ | — | — | — | — |\n| KV | ✅ | ✅ | — | — | — | — |\n| Approval | ✅ | ✅ | — | — | — | — |\n| Webhook | ✅ | ✅ | — | — | — | — |\n| Backup | ✅ | ✅ | — | — | — | — |\n| Schedule | ✅ | ✅ | — | — | — | — |\n| Job / Task | ✅ | ✅ | — | — | — | — |\n| Pairing | ✅ | ✅ | — | — | — | — |\n| Binding | ✅ | ✅ | — | — | — | — |\n| Command | ✅ | ✅ | — | — | — | — |\n| File / Upload | ✅ | ✅ | — | — | — | — |\n| Tool | ✅ | ✅ | — | — | — | ✅ |\n| Validation | ✅ | ✅ | — | — | — | — |\n\n## Adding a New Error Message\n\n1. **Add the identifier to `en/errors.ftl` first.** This is the canonical locale. Follow the `api-error-{domain}-{description}` naming convention. Place it in the appropriate domain section.\n\n2. **Add translations to all other locale files.** If a locale is not yet translated, the Fluent runtime will fall back to English, but adding a stub entry is preferred for discoverability.\n\n3. **Use variables for dynamic content.** Never hardcode dynamic values into the message string:\n   ```\n   # Good\n   api-error-template-not-found = Template '{ $name }' not found\n\n   # Bad — do not do this\n   api-error-template-not-found = Template not found\n   ```\n\n4. **Pass the variables at the call site.** The code that resolves this message must supply all referenced variables (`$name`, `$error`, etc.).\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g., `pt-BR/`).\n2. Copy `en/errors.ftl` into the new directory as a starting point.\n3. Translate all message values. Do **not** translate the identifiers (the left-hand side of `=`).\n4. Register the locale in the application's Fluent bundle configuration so the runtime knows to load it.","other-librefang-types-src":"# Other — librefang-types-src\n\n# librefang-types — Model Catalog Types\n\nShared data structures for the model registry. This crate is the single source of truth for how providers, models, and their metadata are represented across the entire codebase. It contains no runtime logic — only type definitions, serde bindings, display implementations, and validation rules.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TOML[\"TOML catalog files<br/>(providers/*.toml)\"]\n    MCF[\"ModelCatalogFile\"]\n    PCT[\"ProviderCatalogToml\"]\n    MCE[\"ModelCatalogEntry\"]\n    PI[\"ProviderInfo\"]\n    MO[\"ModelOverrides\"]\n    EC[\"EffectiveCapabilities\"]\n    RT[\"librefang-runtime<br/>(model_catalog.rs)\"]\n    MT[\"librefang-kernel-metering<br/>(lib.rs)\"]\n    RS[\"routes/providers.rs\"]\n\n    TOML --> MCF\n    MCF --> PCT\n    MCF --> MCE\n    PCT -->|From<T>| PI\n    RT --> MO\n    RT --> EC\n    MT --> MCF\n    RS --> MCE\n```\n\nTOML files on disk parse into `ModelCatalogFile`. The catalog loader in `librefang-runtime` converts `ProviderCatalogToml` into `ProviderInfo` (populating runtime-only fields like `auth_status`), loads `ModelCatalogEntry` records, and merges user overrides into `EffectiveCapabilities`. The metering kernel consumes `ModelCatalogFile` for cost estimation. Route handlers call `ModelCatalogEntry::validate` when adding custom models.\n\n## Enums\n\n### ModelTier\n\nCapability tier for a model. Serialized as lowercase strings (`\"frontier\"`, `\"smart\"`, etc.). Default is `Balanced`.\n\n| Variant | Typical examples |\n|---|---|\n| `Frontier` | Claude Opus, GPT-4.1 |\n| `Smart` | Claude Sonnet, Gemini 2.5 Flash |\n| `Balanced` | GPT-4o-mini, Groq Llama |\n| `Fast` | Fastest, cheapest models for simple tasks |\n| `Local` | Ollama, vLLM, LM Studio |\n| `Custom` | User-defined models added at runtime |\n\nThe enum is `#[non_exhaustive]` — new tiers may be added without a semver break.\n\n### AuthStatus\n\nProvider authentication state, detected at runtime. Default is `Missing`.\n\n| Variant | Meaning |\n|---|---|\n| `ValidatedKey` | API key present, confirmed valid via live probe |\n| `Configured` | API key present but not yet validated |\n| `ConfiguredCli` | No key, but a CLI tool (e.g. `claude-code`) is available |\n| `AutoDetected` | Key found via fallback env var — may not match the actual provider |\n| `InvalidKey` | Key present but rejected (HTTP 401/403) |\n| `Missing` | No API key |\n| `NotRequired` | Local providers that don't need a key |\n| `CliNotInstalled` | CLI-based provider whose CLI is missing |\n| `LocalOffline` | Local provider probed and found offline |\n\n`is_available()` returns `true` for `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Notably, `InvalidKey` returns `false` — the key exists but won't work.\n\n`LocalOffline` is a special state: unlike `Missing`, the `detect_auth()` function will not reset it. Only the probe that detected the offline state can transition back to `NotRequired` when the service comes back up.\n\n### Modality\n\nWhat kind of output a model produces. Controls whether `context_window` and `max_output_tokens` are required during validation.\n\n| Variant | Token context required? |\n|---|---|\n| `Text` (default) | Yes — both fields must be non-zero |\n| `Image` | No |\n| `Audio` | No |\n| `Video` | No |\n| `Music` | No |\n\nNon-text models may omit `context_window` and `max_output_tokens` entirely because they are priced per-call/per-asset rather than per-token.\n\n### ModelType\n\nClassification of a model's function: `Chat` (default), `Speech`, or `Embedding`. Used in `ModelOverrides` to override type detection.\n\n## Core Structs\n\n### ModelCatalogEntry\n\nA single model in the registry. Key fields:\n\n- **`id`** — Canonical identifier (e.g. `\"claude-sonnet-4-20250514\"`)\n- **`provider`** — Provider identifier (e.g. `\"anthropic\"`). Inferred from the `[provider]` section during catalog merge when omitted in community files.\n- **`tier`** / **`modality`** — Capability tier and output modality\n- **`context_window`** / **`max_output_tokens`** — Token limits. Zero means \"unknown/not applicable\". **Never feed zero into compaction thresholds or budget math.**\n- **`input_cost_per_m`** / **`output_cost_per_m`** — Cost per million tokens (USD). Always present.\n- **`image_input_cost_per_m`** / **`image_output_cost_per_m`** — Optional, only set for multimodal/image models where pixel tokens are priced separately.\n- **Capability flags**: `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`\n- **`aliases`** — Short names for lookup (e.g. `[\"sonnet\", \"claude-sonnet\"]`)\n\nAll fields use `#[serde(default)]` so partial TOML entries parse cleanly.\n\n#### Validation\n\n`validate()` enforces modality-aware rules after deserialization:\n\n```rust\nentry.validate()?;\n```\n\n- `Modality::Text` entries **must** have non-zero `context_window` and `max_output_tokens`.\n- Non-text entries skip the token check.\n- Catalog loaders **must** call this and reject entries that fail. The guard exists because `#[serde(default)]` would silently fill `0` for missing fields, and downstream code (compaction, budget) must never see zero for text models.\n\n`is_image_generation()` is a convenience that checks `self.modality == Modality::Image`.\n\n### ModelOverrides\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` — `None` means \"use the agent's or system default\".\n\nFields include sampling parameters (`temperature`, `top_p`, `frequency_penalty`, `presence_penalty`), token limits (`max_tokens`), and capability overrides (`supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`).\n\nCapability override fields (`supports_tools` etc.) allow forcing a capability on or off regardless of what the catalog declares. This is useful when a provider's metadata is incorrect or non-standard (see issue #4745).\n\n`is_empty()` returns `true` when all fields are `None`.\n\n### EffectiveCapabilities\n\nResolved capability flags after applying user overrides on top of the catalog entry. Produced by `ModelCatalog::effective_capabilities` in `librefang-runtime` and consumed by code that gates runtime behavior (tool gating, vision validation, etc.).\n\n```rust\npub struct EffectiveCapabilities {\n    pub supports_tools: bool,\n    pub supports_vision: bool,\n    pub supports_streaming: bool,\n    pub supports_thinking: bool,\n}\n```\n\n### ProviderInfo\n\nFull provider metadata including runtime state. Unlike `ProviderCatalogToml`, this struct carries fields that are only knowable at runtime:\n\n- **`auth_status`** — Detected authentication state, defaults to `Missing`\n- **`model_count`** — Number of models from this provider in the catalog\n- **`available_models`** — Model IDs confirmed via live API probe. Empty until background validation completes.\n- **`is_custom`** — `true` for user-added providers. Built-in providers cannot be deleted because registry sync would re-create them.\n- **`proxy_url`** — Per-provider proxy override\n- **`regions`** — `HashMap<String, RegionConfig>` for regional endpoint overrides\n\n### RegionConfig\n\nPer-region endpoint configuration:\n\n```rust\npub struct RegionConfig {\n    pub base_url: String,\n    pub api_key_env: Option<String>,  // overrides provider-level key\n}\n```\n\nWhen selecting a region, callers look up the region name in `provider.regions` and use the region's `base_url`. If no region is selected, fall back to `provider.base_url`.\n\n### ProviderCatalogToml\n\n1:1 mapping to the `[provider]` section in catalog TOML files. Omits runtime-only fields (`auth_status`, `model_count`, `available_models`, `is_custom`, `proxy_url`). Converts to `ProviderInfo` via `From<ProviderCatalogToml>`:\n\n```rust\nlet info: ProviderInfo = toml_provider.into();\n// auth_status = Missing, model_count = 0, available_models = [], is_custom = false\n```\n\n## TOML File Formats\n\n### ModelCatalogFile\n\nA catalog file with an optional `[provider]` section and a `[[models]]` array:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\n\n[provider.regions.us]\nbase_url = \"https://us.api.anthropic.com\"\napi_key_env = \"ANTHROPIC_US_API_KEY\"  # optional override\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nThe `provider` section is optional — files can contain only `[[models]]` entries. This is the unified format shared between the main repository and the community model-catalog repository.\n\n### AliasesCatalogFile\n\nA separate aliases file mapping short names to canonical IDs:\n\n```toml\n[aliases]\nsonnet = \"claude-sonnet-4-20250514\"\nhaiku = \"claude-haiku-4-5-20251001\"\n```\n\n## Serde Behavior\n\n- All enums use `#[serde(rename_all = \"lowercase\")]` or `snake_case` — variants serialize as lowercase strings.\n- Optional fields use `#[serde(skip_serializing_if = \"Option::is_none\")]` to keep output clean.\n- `Vec` fields that default to empty use `#[serde(default)]`.\n- `ModelCatalogEntry` fields default generously so partial TOML parses cleanly — this is why `validate()` is critical for text models.\n\n## Integration Points\n\n| Consumer | What it uses |\n|---|---|\n| `librefang-runtime::model_catalog` | `ModelOverrides`, `ModelCatalogEntry`, `EffectiveCapabilities` — catalog loading, capability resolution, override merging |\n| `librefang-runtime::model_metadata` | `ModelCatalogEntry` — constructing model metadata from catalog entries |\n| `librefang-kernel-metering` | `ModelCatalogFile` — cost estimation from pricing fields |\n| `routes::providers` | `ModelCatalogEntry::validate` — validating custom models on upload |\n\n## Common Patterns\n\n### Loading and validating a catalog entry\n\n```rust\nlet entry: ModelCatalogEntry = toml::from_str(&toml_str)?;\nentry.validate()?;  // rejects text models with zero token limits\n```\n\n### Converting a TOML provider to runtime form\n\n```rust\nlet catalog: ModelCatalogFile = toml::from_str(&toml_str)?;\nlet provider: ProviderInfo = catalog.provider.unwrap().into();\n// auth_status defaults to Missing, model_count to 0\n```\n\n### Resolving a regional endpoint\n\n```rust\nlet url = region_name\n    .and_then(|r| provider.regions.get(r))\n    .map(|r| r.base_url.as_str())\n    .unwrap_or(&provider.base_url);\n```\n\n### Checking if a provider is usable\n\n```rust\nif provider.auth_status.is_available() {\n    // proceed with API call\n}\n```","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types Tests\n\nIntegration tests that guard the contract between serialized TOML configs and their Rust type definitions. The suite catches three categories of silent regressions that are easy to introduce but hard to notice in production: dashboard↔kernel serialization drift, `Default`/`serde(default)` divergence, and schema generation failures.\n\n## Test Files\n\n### `agent_form_roundtrip.rs` — Dashboard Serializer ↔ Kernel Deserializer\n\nThe dashboard's TypeScript visual editor (`crates/librefang-api/dashboard/src/lib/agentManifest.ts`) serializes agent configuration to TOML. The kernel deserializes the same TOML using `librefang_types::agent::AgentManifest`. These tests mirror the exact serializer output at various levels of complexity and assert the kernel reads every field back correctly.\n\n**When to update these tests:** Any change to the dashboard's TOML serializer or to `AgentManifest`'s serde attributes (field renames, type changes, new required fields) must be accompanied by a corresponding test update. CI failure here means the dashboard will produce TOML the kernel cannot read.\n\n| Test | What it covers |\n|------|----------------|\n| `parses_form_minimum_viable_output` | Bare-minimum manifest with `name`, `version`, `module`, and `[model]` |\n| `parses_form_full_output_with_capabilities_and_resources` | All standard sections: tags, skills, temperature, resource quotas, network/shell capabilities |\n| `parses_form_with_advanced_sections` | Every advanced section filled: priority, session mode, thinking budget, autonomous config, routing, fallback models, context injection, schedule, exec policy |\n| `parses_form_response_format_json_schema` | Inline `ResponseFormat::JsonSchema` variant — tagged enum with nested `schema` table |\n| `omitting_optional_sections_uses_defaults` | Missing `resources`/`capabilities` sections fall back to struct defaults (empty vecs, `None` options) |\n\n### `config_default_roundtrip.rs` — Default↔Serde Consistency (Issue #3404)\n\nThis is the largest test file and addresses a specific bug class: when a struct field is annotated with `#[serde(default)]` but the manual `impl Default` is not updated to match, the two sources of truth diverge silently. Empty TOML round-trips successfully, but programmatic `T::default()` produces different values.\n\n#### Bug class mechanism\n\n```\n┌─────────────────────────┐       ┌──────────────────────────────┐\n│  impl Default for T     │       │  #[serde(default)] on fields  │\n│  (manual code)          │       │  (attribute-driven)           │\n│                         │       │                                │\n│  field_x: 0             │  vs   │  field_x: FieldX::default()   │\n│  // forgot new_field!   │       │  new_field: NewField::default()│\n└─────────────────────────┘       └──────────────────────────────┘\n         │                                     │\n         ▼                                     ▼\n   T::default()                        toml::from_str(\"\")\n         │                                     │\n         └──────── both succeed ───────────────┘\n                   but produce different values\n```\n\n#### Test helpers\n\n**`assert_default_roundtrip::<T>(label)`** — For most config types. Asserts two properties:\n\n1. `T::default()` serializes to the same TOML as deserializing an empty string and re-serializing the result.\n2. `T::default()` round-trips losslessly through TOML serialization.\n\nComparison is done by comparing TOML string representations rather than requiring `PartialEq` on every type — this avoids cascading derive requirements through the entire nested config tree.\n\n**`assert_default_roundtrip_with::<T>(label, normalize)`** — For types with a known legitimate divergence. The `normalize` closure adjusts a single field before comparison. Every *other* field is still required to match exactly.\n\n#### The `KernelConfig` exception\n\n`KernelConfig` has one field where `Default` and serde-empty legitimately differ: `config_version`.\n\n- `KernelConfig::default()` sets `config_version` to `CONFIG_VERSION` (currently `2`) — fresh in-memory configs need no migration.\n- The serde helper `default_config_version()` returns `1` — a legacy TOML that omits `config_version` is by definition pre-versioning, and `run_migrations` lifts it forward.\n\nThe test normalizes `config_version` to the `Default` value before comparison, so every other field is still checked for consistency.\n\n#### Covered types\n\nOver 45 config structs are tested. The full list (as of this writing):\n\n`KernelConfig`, `QueueConfig`, `QueueConcurrencyConfig`, `BudgetConfig`, `SessionConfig`, `CompactionTomlConfig`, `TaskBoardConfig`, `TriggersConfig`, `WebhookTriggerConfig`, `WebConfig`, `WebFetchConfig`, `BrowserConfig`, `BraveSearchConfig`, `TavilySearchConfig`, `PerplexitySearchConfig`, `JinaSearchConfig`, `ReloadConfig`, `RateLimitConfig`, `SkillsConfig`, `ExtensionsConfig`, `VaultConfig`, `AutoReplyConfig`, `InboxConfig`, `TelemetryConfig`, `PromptIntelligenceConfig`, `CanvasConfig`, `ThinkingConfig`, `ContextEngineTomlConfig`, `ExternalAuthConfig`, `AuditConfig`, `PrivacyConfig`, `HealthCheckConfig`, `HeartbeatTomlConfig`, `AutoDreamConfig`, `RegistryConfig`, `MemoryConfig`, `MemoryDecayConfig`, `ChunkConfig`, `NetworkConfig`, `TtsConfig`, `DockerSandboxConfig`, `PairingConfig`, `SanitizeConfig`, `ParallelToolsConfig`, `TerminalConfig`, `VoiceConfig`, `LinkedInConfig`, `AgentManifest`, `ChannelsConfig`, `BroadcastConfig`\n\n#### Adding a new config type\n\nFor any new config struct `FooConfig` that has both `#[serde(default)]` fields and a manual `Default` impl (or reaches one transitively), add:\n\n```rust\n#[test]\nfn foo_config_default_roundtrips_through_toml() {\n    assert_default_roundtrip::<FooConfig>(\"FooConfig\");\n}\n```\n\nIf `FooConfig` has a known legitimate divergence on a field, use `assert_default_roundtrip_with` and pass a normalizer closure that sets only that field.\n\n#### Pinned-value regression tests\n\nSome types have additional tests that pin a specific default value, independent of the roundtrip property. These catch the case where both `Default` and the serde helper are updated simultaneously to the same wrong value (keeping them consistent but wrong):\n\n- **`channels_config_default_has_50mb_max`** — `ChannelsConfig::default().file_download_max_bytes` must be 50 MiB (issue #4436). A previous `#[derive(Default)]` zeroed this field via `u64::default()`, causing the channel bridge to reject all attachments when the config was built programmatically.\n\n### `schemars_poc.rs` — Schema Generation Smoke Tests\n\nDevelopment/debugging tests that invoke `schemars::schema_for!` on representative types and dump the resulting JSON Schema (draft-07) to stdout. Not part of the normal CI gate — run with `--nocapture` to inspect output.\n\n```bash\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```\n\n| Test | Type | Why it's representative |\n|------|------|------------------------|\n| `dump_budget_config_schema` | `BudgetConfig` | Simple struct, baseline |\n| `dump_vault_config_schema` | `VaultConfig` | Contains `Option<PathBuf>` — tests filesystem path rendering |\n| `full_kernel_config_schema_generates` | `KernelConfig` | End-to-end sanity: asserts >50 top-level properties and >50 nested definitions, validates well-formed JSON |\n| `dump_response_format_schema` | `ResponseFormat` | Tagged enum with a variant carrying `serde_json::Value` — major risk point for schema correctness |\n\n## Running the Tests\n\n```bash\n# Full suite\ncargo test -p librefang-types\n\n# Only dashboard roundtrip tests\ncargo test -p librefang-types --test agent_form_roundtrip\n\n# Only default-consistency tests\ncargo test -p librefang-types --test config_default_roundtrip\n\n# Schema dumps (requires --nocapture for visible output)\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```\n\n## Relationship to the Codebase\n\n```\nlibrefang-types (crate)\n├── src/agent.rs          ← AgentManifest definition\n├── src/config/types.rs   ← KernelConfig + all nested config structs\n├── src/config/version.rs ← default_config_version() helper\n└── tests/\n    ├── agent_form_roundtrip.rs      ← validates AgentManifest TOML contract\n    ├── config_default_roundtrip.rs  ← validates Default↔serde consistency\n    └── schemars_poc.rs              ← schema generation smoke tests\n\ncrates/librefang-api/dashboard/\n└── src/lib/agentManifest.ts         ← TypeScript serializer (mirrored by agent_form_roundtrip tests)\n```\n\nThe tests in this module are the primary safety net for two cross-language contracts: the TypeScript↔Rust TOML serialization boundary, and the Rust `Default` trait↔`serde(default)` attribute boundary. Failures here indicate that either the kernel will reject valid dashboard output, or programmatic config construction will produce subtly wrong defaults.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nShared data structures for the LibreFang Agent OS. This crate sits at the bottom of the dependency graph — every other workspace crate depends on it, and it depends on no workspace crate. It contains **no business logic**. Only type definitions, serde derives, and small helper functions that are purely derivable or trivial.\n\n## Architecture\n\n```mermaid\ngraph TD\n    KT[\"librefang-types\"]\n    API[\"librefang-api\"]\n    Kernel[\"librefang-kernel\"]\n    Runtime[\"librefang-runtime\"]\n    Memory[\"librefang-memory\"]\n    Other[\"other consumers\"]\n\n    API --> KT\n    Kernel --> KT\n    Runtime --> KT\n    Memory --> KT\n    Other --> KT\n\n    style KT fill:#f9f,stroke:#333,stroke-width:2px\n```\n\nEvery type that crosses a crate boundary is defined here. Consumer crates import and use these types; they do not define their own cross-crate structs or enums.\n\n## Public Modules\n\n| Module | Domain |\n|---|---|\n| `agent` | Agent identity and descriptor types |\n| `approval` | Human-in-the-loop approval workflows |\n| `capability` | Capability tokens and permissions |\n| `comms` | Inter-agent communication envelopes |\n| `config` | Kernel and runtime configuration structs |\n| `error` | `LibreFangError` and domain-specific error enums |\n| `event` | Event types emitted by the kernel and runtime |\n| `goal` | Goal and objective tracking |\n| `i18n` | Internationalization types (backed by `fluent`) |\n| `manifest_signing` | Ed25519 manifest signing and verification types |\n| `media` | Media attachment and content types |\n| `memory` | Memory substrate records and indexes |\n| `message` | Chat message and conversation types |\n| `model_catalog` | LLM model registry entries |\n| `oauth` | OAuth2 token and flow types |\n| `registry_schema` | Agent/tool registry schema definitions |\n| `scheduler` | Task scheduling and cron types |\n| `serde_compat` | Serde helpers for backward-compatible deserialization |\n| `subagent` | Sub-agent spawning and lifecycle types |\n| `taint` | Taint tracking for untrusted data |\n| `tool` | Tool invocation request/response types |\n| `tool_class` | Tool classification and metadata |\n\n## Constants\n\n- **`VERSION: &str`** — Workspace version injected at compile time from `CARGO_PKG_VERSION`.\n\n## Key Dependencies\n\n`serde`, `serde_json`, `chrono`, `uuid`, `thiserror`, `dirs`, `toml`, `schemars`, `utoipa`, `ed25519-dalek`, `sha2`, `fluent`, `url`.\n\nNo `tokio`. No `reqwest`. No workspace crate. Everything is synchronous and data-only.\n\n## Adding a New Type\n\n1. **Pick the right module.** Place the type under an existing submodule that matches its domain. If no submodule fits, create a new one — but first confirm the type is genuinely cross-crate. If only one crate uses it, define it there instead.\n2. **Derive the standard quartet:** `Debug`, `Clone`, `Serialize`, `Deserialize`. Add `PartialEq`, `Eq`, or `Hash` only when a consumer needs them.\n3. **For OpenAPI surface types:** also derive `utoipa::ToSchema`.\n4. **For configuration types:** also derive `schemars::JsonSchema`. This feeds the kernel-config golden fixture (see below).\n5. **For prompt-bound fields:** use `BTreeMap` / `BTreeSet`, never `HashMap` / `HashSet`. Deterministic serialization matters for LLM prompts.\n\nExample minimal struct:\n\n```rust\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentDescriptor {\n    pub name: String,\n    pub version: String,\n}\n```\n\n## Configuration Field Ritual\n\nWhen adding a field to a config struct (anything under `config::`):\n\n1. **Annotate with `#[serde(default)]`** — old TOML files must still parse.\n2. **Update the `Default` impl** — the build breaks otherwise.\n3. **Add a doc comment** — `schemars` surfaces it as the field's `description` in the generated JSON Schema.\n4. **Regenerate the golden fixture** in `librefang-api` tests. CI will fail until you do.\n\n```rust\n#[derive(Debug, Clone, Serialize, Deserialize, JsonSchema)]\npub struct KernelConfig
