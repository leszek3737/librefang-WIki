pCompat` transport. The config includes:\n\n- **Server name**: `\"test-server\"` — used for tool name namespacing via `format_mcp_tool_name`.\n- **Headers**: A single `x-test-token: integration-fixture` header attached to every outbound request. Tests assert on this to verify header propagation.\n- **Taint scanning**: Disabled (`taint_scanning: false`) with an empty rule-set handle from `empty_taint_rule_sets_handle`.\n- **Timeout**: 5 seconds.\n\n### `weather_tool`\n\n```rust\nfn weather_tool() -> HttpCompatToolConfig\n```\n\nReturns a sample tool declaration used across all three tests:\n\n| Field | Value |\n|-------|-------|\n| `name` | `get_weather` |\n| `path` | `/weather/{city}` |\n| `method` | `GET` |\n| `request_mode` | `Query` |\n| `response_mode` | `Json` |\n| `input_schema` | `{ city: string (required), units: string }` |\n\nThe `{city}` path parameter is the key test case: `McpConnection::call_tool` must interpolate it into the URL, consume it from the arguments map, then send remaining arguments (`units`) as a query string.\n\n## Behavioral contracts verified\n\n### Path-template interpolation\n\nWhen a tool declares `path: \"/weather/{city}\"` and `call_tool` receives `{\"city\": \"Paris\", \"units\": \"metric\"}`:\n\n1. `\"city\"` is extracted and interpolated → `GET /weather/Paris`\n2. `\"city\"` is removed from the args map\n3. Remaining `\"units\"` is sent as `?units=metric` (because `request_mode` is `Query`)\n4. The response JSON body is returned as a string\n\n### Tool namespacing\n\n`McpConnection::connect` registers each declared tool under the prefixed name `mcp_<server_name>_<tool_name>`. The test asserts the presence of `mcp_test-server_get_weather` in the tool list. Consumers (agent loop, dashboard) rely on this naming convention for routing—changing it is a breaking change.\n\n### Unknown tool rejection\n\nCalling `call_tool` with a name not present in the registered tool list must return an error. The test checks for substrings \"not found\", \"unknown\", or \"does not exist\" in the error message.\n\n## Running\n\n```bash\n# From the workspace root\ncargo test -p librefang-runtime-mcp --test http_compat_integration\n```\n\nTests are async and use `#[tokio::test]`. Each test is self-contained with its own `wiremock` server, so they can run in parallel without interference.\n\n## Dependencies\n\n- **`wiremock`** — Provides the mock HTTP server and request matchers (`method`, `path`, `query_param`, `header`).\n- **`librefang_runtime_mcp`** — The library under test. Imports: `McpConnection`, `McpServerConfig`, `McpTransport`, `format_mcp_tool_name`, `empty_taint_rule_sets_handle`.\n- **`librefang_types::config`** — Configuration types: `HttpCompatToolConfig`, `HttpCompatHeaderConfig`, `HttpCompatMethod`, `HttpCompatRequestMode`, `HttpCompatResponseMode`.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This module provides the integration layer that allows the LibreFang runtime to communicate with MCP-compatible servers, enabling tool discovery, invocation, and context management through the standardized MCP protocol.\n\n## Purpose\n\nThe Model Context Protocol (MCP) is an open protocol that standardizes how applications provide context and tools to AI models. This crate implements an MCP client that the LibreFang runtime uses to:\n\n- Connect to MCP servers over HTTP-based transports\n- Discover available tools and capabilities exposed by those servers\n- Invoke tools and retrieve results\n- Manage server connections and lifecycle\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-runtime] --> B[librefang-runtime-mcp]\n    B --> C[rmcp]\n    B --> D[librefang-http]\n    B --> E[librefang-types]\n    C --> F[MCP Protocol Handling]\n    D --> G[HTTP Transport]\n    E --> H[Shared Type Definitions]\n```\n\nThe module sits between the LibreFang runtime and external MCP servers. It delegates MCP protocol-level handling to the `rmcp` crate and relies on `librefang-http` for the underlying HTTP transport, while translating between LibreFang's internal types and MCP wire formats.\n\n## Key Dependencies\n\n### Internal Crates\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang — error types, configuration structs, and domain models |\n| `librefang-http` | HTTP client abstraction layer, providing consistent request/response handling |\n\n### External Crates\n\n| Crate | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation for Rust — handles JSON-RPC message formatting, capability negotiation, and protocol state |\n| `reqwest` | HTTP client used for transport-level requests to MCP servers |\n| `tokio` | Async runtime for non-blocking I/O operations |\n| `serde` / `serde_json` | Serialization of MCP messages to/from JSON |\n| `tracing` | Structured logging and diagnostics |\n| `http` | Low-level HTTP type definitions (status codes, headers, methods) |\n\n### Utility Dependencies\n\n- **`sha2`** / **`base64`** — Cryptographic hashing and encoding, likely used for session identifiers, authentication tokens, or message integrity verification\n- **`url`** / **`psl`** — URL parsing and Public Suffix List validation for safe server endpoint handling\n- **`rand`** — Random number generation for nonce generation or session tokens\n- **`arc-swap`** — Atomic swapping of shared state, used for thread-safe updates to server connection state or configuration without locks\n- **`async-trait`** — Async trait definitions for transport abstractions\n- **`thiserror`** — Derived error types\n\n## Connection Lifecycle\n\nThe typical flow for interacting with an MCP server follows this sequence:\n\n1. **Configuration** — Server endpoints, authentication credentials, and transport settings are assembled from the runtime configuration\n2. **Initialization** — An MCP session is established with the target server, including capability negotiation (protocol version, supported features)\n3. **Discovery** — Available tools and their schemas are queried from the server\n4. **Invocation** — Tools are called with structured input parameters, and results are received and decoded\n5. **Teardown** — Sessions are gracefully closed when the runtime shuts down or the connection is no longer needed\n\n## Error Handling\n\nErrors are defined using `thiserror` and integrate with `librefang-types`. Expected error categories include:\n\n- **Transport errors** — Connection failures, timeouts, HTTP-level errors from `reqwest`\n- **Protocol errors** — MCP-level error responses, capability mismatches, invalid messages\n- **Serialization errors** — Malformed JSON in server responses or schema violations\n\n## Testing\n\nThe crate uses `wiremock` for mocking HTTP servers in tests, allowing verification of MCP message exchanges without requiring a live server:\n\n```toml\n[dev-dependencies]\nwiremock = \"0.6\"\ntokio = { workspace = true, features = [\"macros\", \"rt-multi-thread\"] }\n```\n\nTests construct mock MCP servers that respond with controlled payloads, validating that the client correctly handles both success and error scenarios.\n\n## Integration with the Runtime\n\nThis module is consumed by `librefang-runtime` as its interface to MCP tool servers. The runtime orchestrates when and how MCP connections are created — for example, initializing connections at startup based on configuration, routing tool calls through this client during execution, and managing reconnection or failover.","other-librefang-runtime-media":"# Other — librefang-runtime-media\n\n# librefang-runtime-media\n\nMedia generation drivers for [LibreFang](https://github.com/librefang/librefang). Provides provider-agnostic abstractions and concrete implementations for text-to-speech, image generation, video generation, and music generation.\n\n## Overview\n\nThis crate was extracted from `librefang-runtime` during the #3710 god-crate split. It mirrors the architectural pattern established by `librefang-llm-drivers`, applying it to media generation rather than LLM inference. The parent crate `librefang-runtime` re-exports everything at its historical paths (`runtime::media`, `runtime::media_understanding`), so downstream code does not need to change imports. The re-export is gated behind the default-on `media` feature flag.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[MediaDriver Trait] --> B[elevenlabs]\n    A --> C[gemini]\n    A --> D[google_tts]\n    A --> E[minimax]\n    A --> F[openai]\n    G[MediaDriverCache] --> A\n    H[media_understanding] --> A\n    style A fill:#2d6,stroke:#333\n    style G fill:#26d,stroke:#333\n    style H fill:#d62,stroke:#333\n```\n\n## Core Abstractions\n\n### `MediaDriver` Trait\n\nThe central trait. Each method corresponds to a media modality. Providers that do not support a given modality do not need to implement the method — the trait provides a default implementation that returns a typed `NotSupported` error.\n\nSupported modalities:\n\n- **TTS** — text-to-speech audio generation\n- **Image** — image generation from a prompt\n- **Video** — video generation from a prompt\n- **Music** — music generation from a prompt\n\nThis design lets callers work against a single trait without worrying about which provider supports which modality. Call the method you need; if the provider doesn't support it, you get a clear error rather than a panic or a runtime mystery.\n\n### `MediaDriverCache`\n\nLazy-initializing, thread-safe driver cache with per-provider URL overrides. Built on `dashmap` for concurrent access without global locking.\n\nKey behaviors:\n\n- Drivers are constructed on first access, not at cache creation time.\n- Each provider entry can have its base URL overridden (useful for proxies, self-hosted endpoints, or testing).\n- Thread-safe: safe to share across async tasks and threads.\n\n## Provider Implementations\n\n| Provider    | TTS | Image | Video | Music | Notes |\n|-------------|-----|-------|-------|-------|-------|\n| `elevenlabs` | ✓ | — | — | — | Primary TTS provider. Requires `ELEVENLABS_API_KEY` env var. |\n| `gemini` | — | ✓ | — | — | Google Gemini image generation. |\n| `google_tts` | ✓ | — | — | — | Google Cloud TTS (distinct from Gemini). |\n| `minimax` | — | — | — | ✓ | Music generation. |\n| `openai` | — | ✓ | — | — | DALL·E / GPT-image generation. |\n\nCheck mark (✓) means the provider implements that modality's method. Dash (—) means it falls back to the `NotSupported` default.\n\n## `media_understanding`\n\nA submodule handling the inverse direction: analyzing media rather than generating it. Routes speech-to-text (transcription) and image/audio analysis requests to the appropriate provider. This lives alongside the generation drivers because the same provider accounts and HTTP plumbing are shared.\n\n## Dependencies\n\nThe crate depends on several sibling crates and workspace-shared libraries:\n\n| Dependency | Purpose |\n|------------|---------|\n| `librefang-types` | Shared domain types used across the workspace |\n| `librefang-http` | HTTP client construction and shared request utilities |\n| `tokio` | Async runtime |\n| `reqwest` | HTTP client for provider API calls |\n| `serde` / `serde_json` | Request/response serialization |\n| `async-trait` | Async trait support for `MediaDriver` |\n| `dashmap` | Concurrent hashmap for `MediaDriverCache` |\n| `tracing` | Structured logging |\n| `base64` | Encoding media payloads in API requests |\n| `chrono` | Timestamp handling |\n| `uuid` | Request/correlation IDs |\n| `sha2` / `hex` | Content hashing (e.g., cache keys) |\n| `url` | URL parsing and construction for provider endpoints |\n\n## Testing\n\nTests that validate the ElevenLabs `voice_id` lookup mutate the `ELEVENLABS_API_KEY` environment variable. These tests use `serial_test` (pinned to version 3, matching the workspace) to prevent concurrent test runners from racing over that env var. If you add new provider integration tests that read or write environment variables, apply the same serialization.","other-librefang-runtime-sandbox-docker":"# Other — librefang-runtime-sandbox-docker\n\n# librefang-runtime-sandbox-docker\n\nDocker container sandbox for LibreFang tool execution. Provides OS-level isolation for agent code execution by spawning commands inside Docker containers with strict resource limits, network isolation, and capability dropping.\n\n## Purpose\n\nThis crate was extracted from `librefang-runtime` as part of the [#3710 god-crate split](https://github.com/librefang/librefang/issues/3710). It encapsulates all Docker-based sandboxing logic, keeping it independent from the main runtime crate while maintaining backward compatibility through re-exports.\n\nWhen an agent needs to execute tool code, this module ensures that execution happens within a tightly controlled Docker container rather than on the host system.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-runtime] -->|re-exports at runtime::docker_sandbox| B[librefang-runtime-sandbox-docker]\n    B --> C[Docker API]\n    B --> D[librefang-types]\n    C --> E[Isolated Container]\n    E --> F[Resource Limits]\n    E --> G[Network Isolation]\n    E --> H[Dropped Capabilities]\n```\n\n## Security Model\n\nThe sandbox enforces several layers of isolation:\n\n- **Resource limits** — Containers run with strict CPU, memory, and I/O constraints to prevent runaway or malicious code from impacting the host.\n- **Network isolation** — Containers have no network access by default, preventing exfiltration or lateral movement.\n- **Capability dropping** — Linux capabilities are dropped to the minimum required set, reducing the container's privilege surface.\n- **Shell metacharacter inspection** — User-supplied commands are inspected via the helpers module for dangerous shell metacharacters. This denylist is parity-tested against the parent crate's denylist (see `crates/librefang-runtime/tests/docker_sandbox_helpers_parity.rs`).\n\n## Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions across the LibreFang workspace |\n| `tokio` | Async runtime for container lifecycle management |\n| `tracing` | Structured logging and diagnostics |\n| `dashmap` | Concurrent map for tracking active containers |\n| `serde_json` | JSON serialization for container configuration and results |\n| `chrono` | Timestamp handling for container metadata |\n\n## Integration with the Workspace\n\n`librefang-runtime` re-exports this crate at its historical path (`runtime::docker_sandbox`), so downstream call sites do not need to switch imports. The re-export is gated behind the parent crate's default-on `docker-sandbox` feature flag.\n\nTo use the sandbox directly:\n\n```rust\nuse librefang_runtime_sandbox_docker::DockerSandbox;\n```\n\nOr through the parent crate (recommended for existing code):\n\n```rust\nuse librefang_runtime::docker_sandbox::DockerSandbox;\n```\n\n## Prerequisites\n\n- Docker must be installed and running on the host.\n- The user executing the LibreFang process needs permission to interact with the Docker daemon (typically membership in the `docker` group or equivalent).\n\n## Related Crates\n\n- **`librefang-runtime`** — Parent crate that re-exports this module. See `crates/librefang-runtime/README.md`.\n- **`librefang-types`** — Shared type definitions consumed by this crate.\n\n## References\n\n- [Workspace README](../../README.md)\n- Issue #3710 — God-crate split tracking issue","other-librefang-runtime-src":"# Other — librefang-runtime-src\n\n# librefang-runtime — Agent Loop Test Suite\n\nThe `agent_loop::tests` module validates the core agent loop's iteration semantics, response handling, tool execution, and safety guards. The tests are organized into four submodules, each exercising a distinct concern through mock LLM drivers and in-memory sessions.\n\n## Module Layout\n\n```\nagent_loop/tests/\n├── mod.rs           # Unit tests for helpers, constants, sanitizers, guards\n├── integration.rs   # End-to-end async tests with mock LLM drivers\n├── recovery.rs      # Text-to-tool-call pattern recovery edge cases\n├── sender.rs        # Sender prefix injection, PII filter ordering\n└── utilities.rs     # Session trimming, history resolution, tool-call metrics\n```\n\n## Architecture Overview\n\nThe agent loop (`run_agent_loop` / `run_agent_loop_streaming`) is the central orchestration point. It:\n\n1. Sends a user message through an `LlmDriver`\n2. Inspects the response for `StopReason` (EndTurn, ToolUse, MaxTokens)\n3. Executes tool calls and feeds results back to the driver\n4. Repeats until EndTurn or an iteration cap is hit\n\n```mermaid\nflowchart TD\n    A[run_agent_loop] --> B{LLM complete}\n    B -->|EndTurn| C[finalize response]\n    B -->|ToolUse| D[execute tools]\n    B -->|MaxTokens| E{iterations < cap?}\n    D --> F[fold stale history?]\n    F --> B\n    E -->|yes| B\n    E -->|no| C\n    C --> G[cascade-leak check]\n    G --> H[return AgentLoopResult]\n```\n\nThe test suite pins the behavior of every branching point in this flow.\n\n## Mock Driver Infrastructure\n\nIntegration tests rely on mock `LlmDriver` implementations that simulate specific LLM response patterns without network calls. Each driver uses an `AtomicU32` call counter to vary responses across iterations.\n\n| Driver | Behavior | Purpose |\n|--------|----------|---------|\n| `NormalDriver` | Single `EndTurn` with text | Baseline sanity check |\n| `EmptyAfterToolUseDriver` | Iter 0: `ToolUse`, iter 1: empty `EndTurn` | Reproduces empty-after-tool bug |\n| `FailThenTextDriver` | Iter 0: `ToolUse`, iter 1: text `EndTurn` | Recovery after tool failure |\n| `AlwaysFailingToolDriver` | Every iter: `ToolUse` for nonexistent tool | Triggers `RepeatedToolFailures` cap |\n| `EmptyMaxTokensDriver` | Every iter: empty `MaxTokens` | Triggers max continuations fallback |\n| `EmptyThenNormalDriver` | Iter 0: empty `EndTurn`, iter 1: text | Tests one-shot retry on empty first response |\n| `AlwaysEmptyDriver` | Every iter: empty `EndTurn` | Verifies fallback when retry also fails |\n| `DirectiveDriver` | Configurable text + stop reason | Reply-directive preservation tests |\n| `MultiToolCycleDriver` | N tool-use rounds then `EndTurn` | History-fold integration |\n| `FoldSummaryDriver` | Fixed summary text | Deterministic aux-LLM fold summarization |\n| `TextToolCallDriver` | Text with `<function=...>` tags, no `tool_calls` | Text-to-tool-call recovery E2E |\n\nAll integration tests construct sessions via `MemorySubstrate::open_in_memory` and call `run_agent_loop` or `run_agent_loop_streaming` with these drivers and a `test_manifest()` agent configuration.\n\n## Key Test Categories\n\n### Empty Response Guards (`integration.rs`, `mod.rs`)\n\nWhen the LLM returns no text content, the loop must not surface empty strings to users. The `finalize_end_turn_text` function implements a three-tier fallback:\n\n1. **Final text present** → use it directly\n2. **Final text empty + accumulated buffer non-empty** → use accumulated buffer from prior iterations\n3. **Both empty** → emit a canned guard message (\"Task completed\" if tools ran, \"empty response\" if not)\n\nTests verify this for both `run_agent_loop` and `run_agent_loop_streaming`, including after tool-use cycles and under `MaxTokens` overflow.\n\n### Text-to-Tool-Call Recovery (`recovery.rs`)\n\nSome providers (notably Groq/Llama) output tool calls as inline text instead of structured `ToolUse` content blocks. The `recover_text_tool_calls` function scans LLM output for nine recognized patterns:\n\n| # | Pattern | Example |\n|---|---------|---------|\n| 1 | `<function=NAME>{JSON}<\/function>` | `<function=web_search>{\"query\":\"rust\"}<\/function>` |\n| 2 | `<function>NAME{JSON}<\/function>` | `<function>web_search{\"query\":\"rust\"}<\/function>` |\n| 3 | `<tool>NAME{JSON}<\/tool>` | `<tool>exec{\"command\":\"ls\"}<\/tool>` |\n| 4 | `` `NAME {JSON}` `` (backtick-wrapped) | `` `exec {\"command\":\"pwd\"}` `` |\n| 5 | Markdown code block with `NAME {JSON}` | `` ```\\nexec {\"command\":\"ls\"}\\n``` `` |\n| 6 | `[TOOL_CALL]...[/TOOL_CALL]` with JSON or arrow syntax | Issue #354 format |\n| 7 | `◁...▸` XML-style delimiters (Qwen3) | `◁{\"name\":\"exec\",...}▸` |\n| 8 | Bare JSON tool call object | `{\"name\":\"exec\", \"arguments\":{...}}` |\n| 9 | `<function name=\"...\" parameters=\"...\"/>` (XML attributes) | Self-closing variant |\n\nRecovered calls are matched against the registered `ToolDefinition` list — unknown tools and invalid JSON are silently rejected. Duplicate detection across patterns prevents the same call from being promoted twice.\n\nHelper functions under test include:\n- `parse_dash_dash_args` — parses `{--key \"value\", --flag}` arrow syntax from pattern 6\n- `parse_json_tool_call_object` — extracts name/arguments from `{\"name\":..., \"arguments\":...}` objects, supporting `\"function\"` and `\"parameters\"` field aliases\n\n### Cascade Leak Detection (`integration.rs`, `mod.rs`)\n\nThe cascade-leak guard prevents the LLM from echoing back conversation metadata (envelope headers, turn frames like \"User asked: ... I responded: ...\") as if it were a real reply. The `is_cascade_leak` function counts structural markers:\n\n- **Structural markers**: `[Group message from X]`, `[In risposta a: \"Y\"]`, `[Forwarded]`, `[Stranger]`, `[User]`\n- **Turn frames**: `User asked:`, `I responded:`\n- **Thematic headers**: `## Calendar`, `## Tasks`\n\nTwo or more structural markers, or one structural + one turn frame, triggers the leak guard. The response is silently dropped (`result.silent = true`, `result.response = \"\"`). Crucially, thematic headers alone are **not** flagged — a response like \"## Calendar\\n...\\n## Tasks\\n...\" is legitimate content.\n\nThe `sanitize_for_memory` function strips known envelope prefixes from inbound user messages before they are persisted, preventing legacy memory rows from continuously re-triggering the guard.\n\nThe test suite verifies cascade-leak handling across four paths:\n- Non-streaming `EndTurn`\n- Streaming `EndTurn`\n- Streaming `ToolUse` (the leak guard must prevent tool execution even when stop reason is `ToolUse`)\n- Streaming `MaxTokens`\n\n### Sender Prefix Logic (`sender.rs`)\n\nFor group conversations and DM channels, the agent loop prepends a sender identity prefix (`[Alice]: `) to the user message before sending it to the LLM. This gives the model context about who is speaking.\n\nKey functions:\n- **`sanitize_sender_label`** — strips injection characters (`]`, `:`, `[`, newlines) from display names, truncates to 64 characters, falls back to `\"user\"` on empty/all-invalid input\n- **`build_sender_prefix`** — constructs `[display_name]: ` or `[user_id]: `, with channel-specific carve-outs for `webui`, `cron`, and `autonomous` (system channels where identity is a placeholder)\n- **`build_automation_marker_prefix`** — adds `[Scheduled trigger]` or `[Autonomous trigger]` markers for non-human invocation channels\n\nThe prefix is applied **after** PII redaction, so display names survive the filter while message body content is redacted normally.\n\n### History Folding (`integration.rs`)\n\nThe `maybe_fold_stale_tool_results` function replaces old tool-result messages with compact `[history-fold]` stubs to keep the context window manageable. The test exercises the full pipeline:\n\n- **`MultiToolCycleDriver`** generates 10 tool-use rounds, driving the message history past the `fold_after_turns` threshold\n- **`FoldSummaryDriver`** provides deterministic aux-LLM summaries\n- The test asserts that at least one `ToolResult` block in the primary driver's received messages starts with `[history-fold]`\n\nA dedicated persistence test verifies that fold rewrites are:\n1. Applied to the working message clone\n2. Replayed onto `session.messages` (the durable store)\n3. Accompanied by `mark_messages_mutated()` advancing `messages_generation`\n4. Idempotent — a second fold pass on already-folded messages does not rewrite again\n\n### Silent Response Contract (`mod.rs`)\n\nThe `build_silent_agent_loop_result` constructor enforces that `silent == true` implies `response == \"\"`. No sentinel string (not even `NO_REPLY`) ever escapes the runtime as visible text. A grep-guard test (`silent_response_single_source_of_truth`) ensures the `NO_REPLY` literal appears only in an allow-listed set of source files, preventing ad-hoc checks from diverging from the canonical `silent_response::is_silent_response` detector.\n\n### Tool Resolution and Caching (`mod.rs`)\n\n`resolve_request_tools` implements lazy tool loading: when the available tool pool exceeds `LAZY_TOOLS_THRESHOLD` and `tool_load` is present, only a subset is sent to the LLM. If `tool_load` is absent, the function falls back to the full eager list — otherwise non-native tools would be silently stripped with no recovery path.\n\n`ResolvedToolsCache` (`Arc<Vec<ToolDefinition>>`) avoids re-cloning the resolved list on every iteration. The cache invalidates when `session_loaded_tools` grows (a new tool was loaded mid-turn) but stays stable when the input hasn't changed, verified via `Arc::ptr_eq`.\n\n### Hallucinated Action Detection (`mod.rs`)\n\n`looks_like_hallucinated_action` catches LLM claims of completing domain operations that it did not actually perform. Detection covers:\n\n- **English**: \"I've created the file...\", \"I've sent the message...\", \"Order has been placed.\"\n- **Italian present perfect** (`ho` + past participle): \"Ho registrato la spesa...\", \"Ho inviato il messaggio...\"\n- **Italian impersonal passive**: \"Il messaggio è stato inviato.\", \"Operazione completata.\"\n\nNeutral phrasing (\"Vuoi che registri questa spesa?\") and common-but-ambiguous words (\"fatto\") are intentionally excluded to avoid false positives that would burn an in-loop iteration.\n\n### Progress Text Leak Detection (`mod.rs`)\n\n`is_progress_text_leak` identifies short LLM outputs that are progress indicators leaked through the text channel — e.g., \"Let me check that...\" or \"Processing...\" with an ellipsis terminator. The guard only fires for text under 120 characters ending in `...` or `…`. Longer responses with ellipsis endings are treated as legitimate content.\n\n### Accumulated Text Buffer (`mod.rs`)\n\n`push_accumulated_text` manages a bounded buffer that accumulates text across iterations. The buffer:\n- Joins entries with `\\n\\n`\n- Caps at `ACCUMULATED_TEXT_MAX_BYTES`\n- Preserves the existing prefix when truncating (the initial content stays intact)\n- Short-circuits additional pushes once sealed at the cap\n\n## Test Helpers\n\n- **`test_manifest()`** — returns a minimal `AgentManifest` with name `\"test-agent\"` and a basic system prompt\n- **`fake_tool(name)`** — creates a `ToolDefinition` with a trivial JSON schema\n- **`cascade_leak_fixture()`** — provides a pre-configured `(MemorySubstrate, Session, AgentManifest, Arc<dyn LlmDriver>)` tuple for cascade-leak tests\n- **`resolve_max_iterations(manifest_cap, opts_cap)`** — mirrors the loop's iteration cap resolution: manifest > options > `MAX_ITERATIONS` default\n\n## Constants Under Test\n\n| Constant | Value | Location |\n|----------|-------|----------|\n| `MAX_ITERATIONS` | `AutonomousConfig::DEFAULT_MAX_ITERATIONS` | `agent_loop/types.rs` |\n| `DEFAULT_MAX_HISTORY_MESSAGES` | 60 | history module |\n| `ACCUMULATED_TEXT_MAX_BYTES` | defined in `message.rs` | bounded buffer cap |\n| `MAX_RETRIES` | 3 | retry module |\n| `BASE_RETRY_DELAY_MS` | 1000 | retry module |\n| `LAZY_TOOLS_THRESHOLD` | defined in `tool_resolution` | lazy mode trigger |\n| `MIN_HISTORY_MESSAGES` | defined in `history` | minimum messages to preserve |\n\n## Integration with the Wider Codebase\n\nThe test module depends on:\n\n- **`librefang-memory`** — `MemorySubstrate::open_in_memory` for session storage without disk I/O\n- **`librefang-types`** — `AgentManifest`, `Session`, `ToolDefinition`, `ContentBlock`, `StopReason`, `TokenUsage`, `CompletionRequest`/`CompletionResponse`, privacy and tool-results config types\n- **`crate::aux_client::AuxClient`** — secondary LLM client for history-fold summarization\n- **`crate::pii_filter::PiiFilter`** — redaction engine applied before sender prefix injection\n- **`crate::history_fold`** — `FoldConfig`, `maybe_fold_stale_tool_results`\n- **`crate::silent_response`** — `ENVELOPE_LINE_PREFIXES`, `ENVELOPE_STANDALONE_MARKERS`, cascade-leak detection constants\n- **`crate::reply_directives`** — `DirectiveSet` for `[[reply:...]]` and `[[@current]]` parsing","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests\n\nIntegration and regression tests for the `librefang-runtime` crate. These tests exercise real dispatch paths, security boundaries, and behavioural contracts that unit tests inside the library crates cannot reach in isolation.\n\n## Architecture\n\nEvery test file targets a specific seam in the runtime. The dominant pattern is a **mock-kernel harness**: a hand-written struct implementing the full `dyn KernelHandle` composition (all role traits from `librefang-kernel-handle::prelude`), where the traits under test record their arguments into `Arc<Mutex<Vec<_>>>` probes and everything else returns `\"not implemented\"` errors. This lets `execute_tool_raw` run against a real `ToolExecContext` with a real trait object, exercising the actual dispatch and validation logic end-to-end.\n\n```mermaid\ngraph TD\n    subgraph \"Test harness pattern\"\n        TK[\"CapturingKernel<br/>(implements all role traits)\"]\n        TC[\"ToolExecContext\"]\n        ETR[\"execute_tool_raw()\"]\n        TK -->|Arc&lt;dyn KernelHandle&gt;| TC\n        TC --> ETR\n    end\n    subgraph \"Probes\"\n        S[\"store_calls\"]\n        R[\"recall_calls\"]\n        E[\"events\"]\n        TK --- S\n        TK --- R\n        TK --- E\n    end\n```\n\n## Test files\n\n### `docker_sandbox_helpers_parity.rs`\n\n**Purpose:** Prevent silent security drift between the canonical `contains_shell_metacharacters` denylist and its duplicate-by-design copy in `librefang-runtime-sandbox-docker`.\n\nThe docker-sandbox crate carries an inlined copy of `helpers` to avoid a circular dependency on `librefang-runtime`. If a CVE fix extends the canonical denylist, the docker `exec` path must not silently accept payloads that the local subprocess sandbox now rejects.\n\n- **`contains_shell_metacharacters_parity`** — enumerates every metacharacter class (command substitution, chaining, pipes, redirection, brace expansion, background, process substitution, null/newline) plus quoting edge cases and clean commands. Asserts both implementations return identical `Option<&str>` results and reason strings.\n- **`safe_truncate_str_parity`** — length-class coverage across UTF-8 byte-width boundaries (ASCII, 2-byte é, 3-byte 中, 4-byte 𝄞) at and around truncation boundaries.\n\nGated on `#![cfg(feature = \"docker-sandbox\")]`.\n\n### `instrument_span_fields.rs`\n\n**Purpose:** Pin the tracing behaviour that `run_agent_loop`'s `#[instrument(level = \"warn\", ...)]` must satisfy under the production daemon's `librefang_runtime=warn` env-filter directive.\n\nUses a `CaptureWriter` that buffers formatted output into an `Arc<Mutex<Vec<u8>>>` so assertions can inspect the actual rendered text.\n\nThree tests form a chain:\n\n1. **`warn_inside_agent_span_includes_agent_and_session_ids`** — a `warn!` event inside an `info_span!` with `agent.id` and `session.id` fields must surface both fields in the captured output.\n2. **`info_span_is_dropped_under_warn_target_filter`** — reproduces the production `EnvFilter::new(\"warn\")` and proves that an INFO-level span gets dropped, confirming *why* the workaround exists.\n3. **`warn_span_survives_warn_target_filter_and_carries_fields`** — proves the WARN-level span workaround actually propagates fields to downstream events.\n\n### `mcp_oauth_integration.rs`\n\n**Purpose:** Integration tests for MCP OAuth discovery, provider wiring, and the auth-state lifecycle.\n\n**Discovery tests:**\n- `test_discover_fallback_to_config` — when the remote server is unreachable, discovery falls back to `McpOAuthConfig` values.\n- `test_discover_fails_without_any_source` — no remote and no config must error.\n\n**Provider wiring (regression):**\n- `test_http_connect_calls_oauth_provider_load_token` — a `TrackingOAuthProvider` mock proves that `McpConnection::connect` actually calls `load_token` when an HTTP MCP server returns 401. This catches the regression where `oauth_provider: None` was passed in `connect_mcp_servers`.\n\n**Token lifecycle (via `InMemoryOAuthProvider`):**\n- `test_provider_store_then_load` — round-trip store → load.\n- `test_provider_clear_removes_token` — clear removes the stored token.\n- `test_provider_clear_is_isolated` — clearing one server does not affect another.\n- `test_provider_reauthorize_after_clear` — store → clear → store works (re-authorization after revocation).\n\n**Auth state machine:**\n- `test_auth_state_lifecycle` — `NeedsAuth → PendingAuth → Authorized → NeedsAuth` serialises correctly at each step. Regression lock for the bug where revoke left no state, hiding the \"Authorize\" button.\n- `test_needs_auth_serializes_differently_from_pending_auth` — prevents the dashboard from showing \"Authorizing...\" at boot before user action.\n\n### `streaming_cascade_leak.rs`\n\n**Purpose:** Regression lock on the incremental cascade-leak detection guard inside `stream_with_retry`'s `forward_task`.\n\nBecause `forward_task` is a private `tokio::spawn` closure, these tests replicate the exact accumulation + channel-forwarding pattern using the public `is_cascade_leak` and `StreamEvent` types.\n\n**Note:** The replicated `run_forward_task` omits the 128 KB rolling-window cap and UTF-8 boundary walk from production. If those change, the facsimile must be updated and new tests added for the rolling-window path.\n\nKey tests:\n- `text_delta_tokens_are_suppressed_after_leak_detection` — after `is_cascade_leak` fires, the triggering delta and all subsequent `TextDelta` events are swallowed.\n- `non_text_events_forwarded_after_leak` — `ContentComplete`, `ToolUseStart`, etc. continue to be forwarded; only text is suppressed.\n- `tool_use_stop_reason_still_sets_cascade_leak_aborted` — even when the final `ContentComplete` carries `StopReason::ToolUse`, `cascade_leak_aborted` remains `true`. The caller must treat the entire turn as a silent drop.\n- `leak_fires_when_markers_split_across_deltas` — structural markers split across streaming chunks still trigger detection.\n- `clean_stream_does_not_abort` — no false positives on clean streams.\n\n### `tool_exec_backend_selection.rs`\n\n**Purpose:** End-to-end tests for the tool-exec backend resolution path: `config.toml → KernelConfig → AgentManifest → resolve_backend_kind → build_backend → trait dispatch`.\n\n- Config parsing (`kind = \"local\"`, `kind = \"docker\"` from TOML).\n- Resolution precedence: agent manifest override wins over global config; no override falls back to global.\n- `build_backend` dispatch: Local and Docker always build; SSH and Daytona error without subtable/feature.\n- `end_to_end_local_dispatch_runs_command` (Unix only): full round-trip from TOML parse through to `backend.run_command(\"echo ...\")` with exit code and stdout assertion.\n\n### `tool_runner_agent_event.rs`\n\n**Purpose:** Tests for `agent_send`, `agent_list`, and `event_publish` tool dispatch through `execute_tool_raw`.\n\nUses a `CapturingKernel` that records `SentMessage` and `PublishedEvent` structs.\n\n- `agent_send_forwards_target_agent_id_and_message` — both fields reach `AgentControl::send_to_agent`.\n- `agent_send_self_is_refused_to_avoid_deadlock` — self-send errors before reaching the kernel (prevents per-agent lock deadlock).\n- `agent_list_renders_kernel_provided_agents` — output includes agent IDs and names.\n- `agent_list_when_no_agents_running_returns_friendly_string` — empty list is not an error.\n- `event_publish_forwards_event_type_and_payload` — both fields reach `EventBus::publish_event`.\n- `event_publish_missing_event_type_errors_without_invoking_kernel` — validation short-circuits before the kernel call.\n\n### `tool_runner_forwarding.rs`\n\n**Purpose:** Verifies that `sender_id` (the attributed user/peer) is correctly forwarded as `peer_id` to the memory substrate through `memory_store`, `memory_recall`, and `memory_list`.\n\nTests each tool with and without a `sender_id`, plus a cross-call isolation check (`test_sender_id_not_leaked_between_calls`) that proves three sequential calls with different identities each record the correct peer.\n\n### `tool_runner_forwarding_task_cron.rs`\n\n**Purpose:** Tests for `task_post`, `cron_create`, and `task_status` tool dispatch.\n\n- `task_post` forwards `caller_agent_id` as `created_by`.\n- `cron_create` injects `sender_id` as `peer_id` in the job JSON (but preserves an existing `peer_id` if the caller provides one), and forwards `caller_agent_id` as the first argument to `CronControl::cron_create`.\n- `task_status` projects exactly six canonical fields (`status`, `result`, `title`, `assigned_to`, `created_at`, `completed_at`) from the full task row. Missing task returns a not-found message rather than an error. Missing `task_id` input errors.\n\n### `tool_runner_memory_acl.rs`\n\n**Purpose:** Regression coverage for the per-user `UserMemoryAccess` ACL enforcement at the tool dispatch boundary (#5139). Before the fix, a restricted user could drive `memory_store`/`wiki_write` through the agent and reach cross-user shared state.\n\nUses an `AclKernel` with a configurable `acl: Option<UserMemoryAccess>` returned from `memory_acl_for_sender`.\n\nACL fixtures:\n- `viewer_acl()` — read proactive + wiki, no writes.\n- `user_acl()` — read/write kv:* + wiki.\n\nTests assert **side effects**, not just tool return values: denied writes must leave the substrate call log empty.\n\nKey tests:\n- Restricted user: `memory_store` denied and does not land, `memory_recall` denied and does not read, `memory_list` denied and does not enumerate, `wiki_write` denied, `wiki_get`/`wiki_search` denied when wiki not in ACL.\n- Allowed user: store/recall/list/wiki round-trips succeed.\n- No ACL (`None`): preserves pre-RBAC behaviour (all calls land).\n- `wiki_write_provenance_separates_channel_and_sender` (#5179 P1): provenance frontmatter must carry `channel` (transport) and `sender` (user) as distinct fields, plus `agent` and `at` timestamp.\n\n### `tool_runner_workflow_readonly.rs`\n\n**Purpose:** Tests for `workflow_list` and `workflow_status` tool dispatch.\n\nUses a `WorkflowStubKernel` returning controlled `WorkflowSummary` and `WorkflowRunSummary` data.\n\n- Schema tests verify both tools appear in `builtin_tool_definitions` with correct `input_schema` shapes.\n- `workflow_list` returns entries sorted by name, includes all fields (`id`, `name`, `description`, `step_count`), handles empty lists, and produces byte-identical output across repeated calls.\n- `workflow_status` maps all fields correctly (`run_id`, `workflow_id`, `workflow_name`, `state`, `started_at`, `completed_at`, `output`, `error`, `step_count`, `last_step_name`). Unknown run returns a not-found error. Invalid UUID returns an error. Missing `run_id` returns an error.\n\n### `tool_runner_workflow_write.rs`\n\n**Purpose:** Tests for `workflow_start` and `workflow_cancel` tool dispatch.\n\nUses a `WorkflowWriteStubKernel` with configurable `start_run_id` and `cancel_result` (Ok / NotFound / AlreadyTerminal).\n\n- Schema tests for both tool definitions.\n- `workflow_start` returns the run ID, does not block on completion, handles missing `workflow_id`, and produces deterministic output.\n- `workflow_cancel` validates UUID format before calling the kernel (invalid UUID errors immediately), handles not-found and already-terminal states, and succeeds for cancellable runs.\n\n## Common patterns\n\n### Constructing `ToolExecContext`\n\nEvery tool-runner test builds a `ToolExecContext` via a `make_ctx` helper. The context carries:\n\n| Field | Typical test value |\n|---|---|\n| `kernel` | `Some(Arc<dyn KernelHandle>)` wrapping the mock |\n| `caller_agent_id` | `Some(\"test-agent\")` or test-specific agent ID |\n| `sender_id` | `Some(\"user-42\")` or `None` |\n| `channel` | `Some(\"telegram\")` or `None` |\n| All others | `None` / `0` / defaults |\n\n### Mock kernel trait coverage\n\nEvery mock kernel must implement **all** role traits from `librefang-kernel-handle::prelude` to satisfy `dyn KernelHandle`. Traits not under test return errors or no-ops:\n\n- `AgentControl`, `MemoryAccess`, `WikiAccess`, `TaskQueue`, `EventBus`, `KnowledgeGraph`, `CronControl`, `ApprovalGate`, `HandsControl`, `A2ARegistry`, `ChannelSender`, `PromptStore`, `WorkflowRunner`, `GoalControl`, `ToolPolicy`, `CatalogQuery`, `ApiAuth`, `SessionWriter`, `AcpFsBridge`, `AcpTerminalBridge`\n\nWhen adding a new role trait, all existing mock kernels must be updated to implement it (even as a no-op) or the tests will fail to compile.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent execution engine and runtime environment for LibreFang. This crate owns the turn-by-turn agent loop, tool dispatch, context management, sandbox execution, OAuth flows, audit trail, and the Agent-to-Agent peer protocol. It is the largest and most central crate in the runtime layer.\n\n## Position in the Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api<br/>(HTTP routing)\"]\n    KH[\"librefang-kernel-handle<br/>(KernelHandle trait)\"]\n    K[\"librefang-kernel<br/>(scheduler, registry, cron)\"]\n    RT[\"librefang-runtime<br/>(THIS CRATE)\"]\n    CH[\"librefang-channels<br/>(transport adapters)\"]\n    T[\"librefang-types\"]\n    DRV[\"librefang-llm-drivers\"]\n\n    K -->|spawns agents| RT\n    RT -->|calls back via| KH\n    K -.->|implements| KH\n    API -->|consumes| RT\n    RT -->|uses| T\n    RT -->|uses| DRV\n    RT -->|re-exports| CH\n```\n\nThe kernel calls into the runtime when an agent receives a message. The runtime never depends on `librefang-kernel` directly—all communication flows through the `KernelHandle` trait defined in `librefang-kernel-handle`, breaking what would otherwise be a circular dependency. The API layer consumes the runtime but the runtime never imports the API.\n\n## Key Dependencies\n\n| Dependency | Relationship |\n|---|---|\n| `librefang-types` | Shared domain types |\n| `librefang-http` | HTTP client utilities |\n| `librefang-kernel-handle` | `KernelHandle` trait (runtime's only kernel interface) |\n| `librefang-runtime-audit` | Audit trail (re-exported as `audit`) |\n| `librefang-runtime-mcp` | MCP client and OAuth (re-exported as `mcp`, `mcp_oauth`) |\n| `librefang-runtime-media` | Media processing (feature-gated, re-exported as `media`) |\n| `librefang-runtime-sandbox-docker` | Docker sandbox (feature-gated, re-exported as `docker_sandbox`) |\n| `librefang-llm-drivers` | LLM provider drivers |\n| `librefang-channels` | Channel transport types |\n| `librefang-memory` | Memory/context storage |\n| `librefang-skills` | Skill loading |\n\n## Module Map\n\n### Core Execution\n\n| Module | Size | Description |\n|---|---|---|\n| `agent_loop` | ~10k LOC | Turn-by-turn agent execution. This is a god module slated for extraction (#3710). Do not grow it without coordination. |\n| `tool_runner` | ~9.7k LOC | Tool execution dispatch. Also targeted by #3710. New tool kinds go in their own sibling file under `tool_runner/`, not into `mod.rs`. |\n| `apply_patch` | — | Tool-level patch application. |\n\n### Context and Memory\n\n| Module | Description |\n|---|---|\n| `compactor` | Context compaction strategies |\n| `context_budget` | Token budget allocation for prompts |\n| `context_compressor` | Context compression before sending to LLM |\n| `context_overflow` | Overflow handling when context exceeds limits |\n| `prompt_builder` | Assembles the final prompt sent to the LLM |\n\n### Model Management\n\n| Module | Description |\n|---|---|\n| `model_catalog` | Contains the `ModelCatalog` type—registry of 130+ models across 28 providers. The kernel wraps this in `arc_swap::ArcSwap` (#3384). All mutations go through the kernel's `model_catalog_update(\\|cat\\| ...)` callback. |\n| `catalog_sync` | Synchronizes model catalog updates. |\n\n### Authentication and OAuth\n\n| Module | Description |\n|---|---|\n| `chatgpt_oauth` | ChatGPT OAuth flow implementation |\n| `copilot_oauth` | Copilot OAuth flow implementation |\n| `auth_cooldown` | Rate limiting for authentication attempts |\n| `mcp` / `mcp_oauth` | MCP client. OAuth state lives in `mcp_auth_states`. The `McpOAuthProvider` trait is implemented on the kernel side. |\n\n### Sandboxes\n\n| Module | Description |\n|---|---|\n| `sandbox` | Sandbox trait and in-tree WASM host functions |\n| `subprocess_sandbox` | Local subprocess-based sandboxing |\n| `docker_sandbox` | Docker-based sandboxing (feature `docker-sandbox`, re-exported from `librefang-runtime-sandbox-docker`) |\n| `host_functions` | WASM host functions exposed to sandboxed code |\n| `browser` | Browser automation sandbox (feature `browser`) |\n\n### Other Subsystems\n\n| Module | Description |\n|---|---|\n| `a2a` | Agent-to-Agent peer protocol |\n| `audit` | Audit trail (re-exported from `librefang-runtime-audit`) |\n| `aux_client` | Auxiliary HTTP client for outbound calls |\n| `channel_registry` | Registry of available channel adapters |\n| `checkpoint_manager` | Agent state checkpointing |\n| `dangerous_command` | Detection and handling of dangerous shell commands |\n| `media` / `media_understanding` | Media processing (feature `media`, re-exported from `librefang-runtime-media`) |\n\n## Feature Gates\n\nDefault features: `media`, `browser`, `docker-sandbox`.\n\n```toml\n# Build everything (default)\ncargo check -p librefang-runtime\n\n# Minimal build, no optional subsystems\ncargo check -p librefang-runtime --no-default-features\n\n# Selective features\ncargo check -p librefang-runtime --no-default-features --features media,browser\n```\n\n| Feature | Effect |\n|---|---|\n| `media` | Pulls in `librefang-runtime-media`. Without it, media modules stub out with no-ops. |\n| `browser` | Enables browser automation sandbox. |\n| `docker-sandbox` | Pulls in `librefang-runtime-sandbox-docker`. |\n| `landlock-sandbox` | Linux Landlock-based sandboxing (optional dep on `landlock`). |\n| `seccomp-sandbox` | Seccomp-based sandboxing (optional dep on `seccompiler`). |\n| `ssh-backend` | Remote SSH tool-execution backend, pulls in `russh`/`russh-keys` 0.45 (#3332). |\n| `daytona-backend` | Daytona managed-sandbox backend. Uses existing reqwest stack, no new deps. |\n\nWhen a feature is disabled, the corresponding module compiles to a minimal stub that returns \"feature disabled\" or no-ops, allowing build-time configuration to omit entire subsystems for size or security constraints.\n\n## The KernelHandle Pattern\n\n`KernelHandle` is the runtime's sole interface back to the kernel. The trait lives in `librefang-kernel-handle`—not in this crate. The kernel implements it; the runtime and API consume it.\n\n**Rule:** Any time runtime code needs a kernel callback (persisting state, updating the model catalog, emitting events), use `KernelHandle`. Never depend on `librefang-kernel` directly.\n\nFor testing, use `librefang-testing::MockKernelBuilder` rather than hand-rolling a fake.\n\n## Cross-Cutting Invariants\n\n### Deterministic Prompt Ordering (#3298)\n\nTool definitions, MCP server summaries, and capability lists **must** be sorted before stringifying. Use `BTreeMap` / `BTreeSet`, never `HashMap`. Non-deterministic ordering causes flaky prompt comparisons and test failures.\n\n### Identity Files\n\nIdentity files live at `{workspace}/.identity/`, not at the workspace root. Two functions handle this:\n\n- `read_identity_file()` — reads from `.identity/`, falls back to root for pre-migration workspaces.\n- `migrate_identity_files()` — runs on every agent spawn to ensure migration.\n\n### USER_AGENT Constant\n\nThe `USER_AGENT` constant is mandatory on every outbound HTTP call:\n\n```rust\nreq.header(\"User-Agent\", librefang_runtime::USER_AGENT)\n```\n\nAn audit hook flags any request missing this header.\n\n## Async Boundary Rules\n\n### ErrorTranslator is `!Send`\n\n`ErrorTranslator` (from `RequestLanguage`) is `!Send`. If you hold an `ErrorTranslator` across an `.await` point, you get a cryptic axum `Handler<_, _>` trait-bound error at compile time. The fix:\n\n```rust\n// WRONG — t alive across .await\nlet t = ErrorTranslator::new(lang);\nlet result = some_async_fn().await;\nt.translate(result)\n\n// RIGHT — drop before awaiting\nlet msg = {\n    let t = ErrorTranslator::new(lang);\n    t.translate(input)\n};\nlet result = some_async_fn(msg).await;\n```\n\n### No Blocking Primitives in Async Context\n\nInside async handlers, never use:\n\n- `std::fs` — use `tokio::fs` instead.\n- `std::sync::RwLock` — use `arc_swap`, `parking_lot`, or `tokio::sync` instead.\n- `tokio::task::block_on` — this crate runs inside a tokio runtime already.\n\nSee #3579 for context.\n\n## Testing\n\nThis crate historically had zero integration tests (#3696). New runtime work **should** include at least one `#[tokio::test]` exercising the new code path.\n\nRun tests scoped to this crate:\n\n```bash\ncargo test -p librefang-runtime\n```\n\nDev-dependencies available: `serial_test`, `proptest`, `wiremock` (for HTTP mocking), `metrics-util` (with debugging feature), `tracing-subscriber`.\n\n## Hard Rules (Taboos)\n\n1. **No `librefang-kernel` import.** Use `KernelHandle`. This is a circular dependency boundary.\n2. **No `librefang-api` import.** The API layer consumes the runtime, never the reverse.\n3. **Do not grow `agent_loop/` or `tool_runner/`.** Issue #3710 keeps them at their current size. New tool kinds get their own file under `tool_runner/`.\n4. **No `unwrap()` / `panic!()` on wire values.** Anything from HTTP, WebSocket, or user input must be handled with proper error propagation.\n5. **No inline `KernelHandle` mocks.** Use `librefang-testing::MockKernelBuilder`.\n6. **No raw `cargo build`.** Use `cargo check --workspace --lib`. Full builds run in CI.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer. Other modules consume this crate to discover, load, and manage skills at runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    FS[Filesystem Skills] --> Loader[Skill Loader]\n    MP[Remote Marketplace] --> Marketplace[Marketplace Client]\n    OC[OpenClaw Skills] --> Compat[OpenClaw Compat Layer]\n    Loader --> Registry[Skill Registry]\n    Marketplace --> Registry\n    Compat --> Registry\n    Registry --> Consumers[Consuming Modules]\n```\n\nThe crate is organized around four concerns:\n\n| Concern | Purpose |\n|---|---|\n| **Registry** | In-memory index of loaded skills, supporting lookup by name, version, and tags |\n| **Loader** | Walks local directories, parses skill manifests (TOML, YAML, JSON), and registers valid skills |\n| **Marketplace** | Communicates with a remote skill repository over HTTPS, downloads and verifies skill packages |\n| **OpenClaw Compatibility** | Translates OpenClaw-format skill definitions into LibreFang's internal representation |\n\n## Key Dependencies and Why They Matter\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared domain types (skill metadata, identifiers, error categories) used across all LibreFang crates |\n| `serde`, `serde_json`, `toml`, `serde_yaml` | Deserialization of skill manifests in multiple formats |\n| `walkdir` | Recursive directory traversal when scanning for locally installed skills |\n| `reqwest`, `rustls`, `webpki-roots`, `rustls-native-certs` | TLS-secured HTTP requests to the marketplace; supports both system CA certs and bundled Mozilla roots |\n| `sha2`, `hex` | SHA-256 digest computation for verifying skill package integrity after download |\n| `zip` | Extraction of downloaded skill archives |\n| `aho-corasick` | Fast multi-pattern matching, used for efficient skill-name resolution across large registries |\n| `semver` | Parsing and comparing semantic version requirements in skill dependency declarations |\n| `fs2` | File locking to prevent concurrent writes during skill installation or updates |\n| `chrono` | Timestamps for cache entries and marketplace metadata |\n\n## Skill Lifecycle\n\n1. **Discovery.** The loader scans configured directories using `walkdir`. Each skill is expected to have a manifest file at its root (e.g., `skill.toml` or `skill.yaml`).\n\n2. **Parsing and validation.** The manifest is deserialized via `serde`. The loader validates required fields—name, version (`semver`), description—and checks that the declared version satisfies any constraints.\n\n3. **Registration.** Valid skills are inserted into the registry. The registry indexes skills for fast lookup by exact name and by tag sets, using `aho-corasick` for efficient multi-pattern queries.\n\n4. **Marketplace sync.** The marketplace client fetches a remote index over HTTPS (`reqwest` with `rustls`), compares available versions against locally installed ones, and downloads updated archives. Each downloaded archive is verified against its expected SHA-256 digest before extraction.\n\n5. **OpenClaw import.** OpenClaw-format skills go through the compatibility layer, which maps OpenClaw metadata fields to LibreFang equivalents before registration.\n\n## Thread Safety and Concurrency\n\nSkill installation and updates touch the filesystem. The crate uses `fs2` file locks to serialize writes, allowing multiple reader processes while preventing corruption from concurrent installs. The in-memory registry is designed for concurrent read access after initial loading.\n\n## Error Handling\n\nErrors are consolidated through `thiserror`-based error enums covering:\n\n- Manifest parse failures (invalid TOML/YAML/JSON, missing required fields)\n- Version constraint violations (`semver` errors)\n- Filesystem errors during loading or extraction\n- Network and TLS errors during marketplace communication\n- Integrity check failures (SHA-256 mismatch)\n\nAll errors propagate `tracing` diagnostic spans so callers can correlate failures with specific skill names, file paths, or remote URLs.\n\n## Integration Points\n\nThis crate depends on `librefang-types` for shared domain types and is itself consumed by higher-level modules that need skill data. The typical integration pattern is:\n\n1. Call the loader to populate the registry at startup.\n2. Query the registry by skill name or tag throughout the application's lifetime.\n3. Optionally invoke the marketplace client for user-initiated installs or updates.\n\n## Testing\n\nThe dev-dependencies include `tempfile` for isolated filesystem tests and `serial_test` to serialize tests that involve file locking, ensuring deterministic behavior when testing concurrent install scenarios.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry and Prometheus metrics instrumentation for LibreFang.\n\n## Overview\n\n`librefang-telemetry` provides the centralized metrics infrastructure for the LibreFang project. It wraps the [`metrics`](https://docs.rs/metrics) facade crate and exposes a consistent instrumentation layer that other crates in the workspace consume to record operational telemetry — request counts, response latencies, error rates, and any custom counters or histograms relevant to the gateway's behavior.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `metrics` (workspace) | Vendor-agnostic metrics facade. Provides macros like `counter!`, `histogram!`, `gauge!` that this crate builds upon. |\n| `librefang-types` | Shared type definitions used across the LibreFang workspace. Allows telemetry helpers to accept domain types directly rather than raw primitives. |\n\n## Role in the Architecture\n\nThis crate is a **leaf dependency** — it does not call into other LibreFang crates at runtime, nor is it called by them through a traditional function call graph. Instead, other crates reference it at compile time to gain access to metrics definitions, labels, and helper functions. The actual metrics sink (Prometheus exporter, OpenTelemetry OTLP endpoint, etc.) is configured at the application boundary, not inside this library.\n\n```\n┌──────────────────────┐\n│  Application Binary  │  ← sets up metrics recorder/exporter\n└──────────┬───────────┘\n           │ depends on\n           ▼\n┌──────────────────────┐\n│ librefang-telemetry  │  ← defines metrics helpers & labels\n└──────────┬───────────┘\n           │ depends on\n           ▼\n┌──────────────────────┐\n│  librefang-types     │  ← shared domain types\n└──────────────────────┘\n```\n\n## What This Crate Likely Provides\n\nBased on its dependency footprint and stated purpose, `librefang-telemetry` is responsible for:\n\n- **Metric name constants** — centralized strings or identifiers for counters, histograms, and gauges so that consumers don't duplicate or misspell them.\n- **Label helpers** — functions or constructors that turn `librefang-types` values into `metrics` label key-value pairs (e.g., converting a `Method` enum into a `\"method\"` label).\n- **Recording wrappers** — optional convenience functions that combine a metric recording with domain logic, reducing boilerplate in hot paths.\n\n## Usage Pattern\n\nOther crates instrument their code by depending on `librefang-telemetry` and calling into the `metrics` facade:\n\n```rust\nuse metrics::counter;\n\n// Increment a request counter with labels defined by this crate\ncounter!(\"librefang_requests_total\", \"method\" => \"GET\", \"status\" => \"200\").increment(1);\n```\n\nThe actual exporter (Prometheus, OTLP, etc.) is initialized in the final binary, not in this library. This separation keeps instrumentation independent of the observability backend.\n\n## Adding New Metrics\n\nWhen adding telemetry for a new feature:\n\n1. Define the metric name as a constant in this crate to avoid duplication.\n2. If the metric requires labels derived from domain types, add a helper function here that accepts the relevant `librefang-types` and returns the appropriate label set.\n3. Use the `metrics` facade macros in the consuming crate to record values.\n4. Document the new metric's name, type (counter / histogram / gauge), labels, and unit in this crate's module-level docs or a dedicated `METRICS.md` if the list grows large.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Example Tests (`tests.rs`)\n\n## Purpose\n\nThis file contains example integration tests that demonstrate how to use the `librefang-testing` test infrastructure. It serves a dual role:\n\n1. **Functional coverage** — validates core API endpoints (health, agents CRUD, version) and mock driver behavior.\n2. **Living documentation** — shows developers the patterns for writing new tests against the test harness.\n\n## Architecture\n\nEvery test follows the same three-step pattern:\n\n```\nTestAppState → router() → oneshot(request) → assert_json_ok / assert_json_error\n```\n\n```mermaid\ngraph LR\n    A[test_request] --> B[Router oneshot]\n    B --> C{assert_json_ok}\n    B --> D{assert_json_error}\n    C --> E[JSON body assertions]\n    D --> F[status + error field checks]\n```\n\nThe tests depend on three layers of the testing crate:\n\n| Dependency | Source file | Role |\n|---|---|---|\n| `TestAppState` | `test_app.rs` | Assembles the Axum router with a mock kernel |\n| `test_request`, `assert_json_ok`, `assert_json_error` | `helpers.rs` | Build HTTP requests and assert on JSON responses |\n| `MockLlmDriver`, `FailingLlmDriver` | `mock_driver.rs` | Stand-in LLM backends with call recording |\n| `MockKernelBuilder` | `mock_kernel.rs` | Builds a kernel with customizable config |\n\n## Test Categories\n\n### Health & Version Endpoints\n\n| Test | Method | Path | Asserts |\n|---|---|---|---|\n| `test_health_endpoint` | GET | `/api/health` | Returns `status` field equal to `\"ok\"` or `\"degraded\"` |\n| `test_version_endpoint` | GET | `/api/version` | Returns a `version` field |\n\nThese are the simplest tests and the best starting point for understanding the pattern.\n\n### Agent Listing & Retrieval\n\n| Test | Method | Path | Asserts |\n|---|---|---|---|\n| `test_list_agents` | GET | `/api/agents` | Returns `items` (array) and `total` (u64) |\n| `test_get_agent_invalid_id` | GET | `/api/agents/not-a-valid-uuid` | Returns 400 with `error` field |\n| `test_get_agent_not_found` | GET | `/api/agents/{uuid}` | Returns 404 with `error` field |\n\n### Agent Mutation Endpoints\n\n| Test | Method | Path | Asserts |\n|---|---|---|---|\n| `test_spawn_agent_post` | POST | `/api/agents` | Returns 200 or 201 (accepts `manifest_toml` body) |\n| `test_delete_nonexistent_agent_is_idempotent` | DELETE | `/api/agents/{uuid}` | Returns 200 with `status: \"already-deleted\"` |\n| `test_set_model_not_found` | PUT | `/api/agents/{uuid}/model` | Returns a client/server error for missing agent |\n| `test_send_message_agent_not_found` | POST | `/api/agents/{uuid}/message` | Returns 404 or 400 for missing agent |\n| `test_patch_agent_not_found` | PATCH | `/api/agents/{uuid}` | Returns 404 or 400 for missing agent |\n\n#### Design note — DELETE idempotency\n\n`test_delete_nonexistent_agent_is_idempotent` deliberately asserts 200 (not 404) when deleting a valid UUID that doesn't map to any agent. This matches the API contract where retried deletes (network blips, dashboard double-clicks) must not surface a phantom error. The 404 status is reserved exclusively for malformed UUIDs (see `test_get_agent_invalid_id`).\n\n### Mock Driver Tests\n\nThese tests exercise the mock LLM drivers directly, without routing through Axum:\n\n**`test_mock_llm_driver_recording`** — Verifies that `MockLlmDriver`:\n- Returns responses in the order provided at construction (`new(vec![...])`)\n- Records every call (model, system prompt) accessible via `recorded_calls()`\n- Tracks call count via `call_count()`\n\n**`test_mock_llm_driver_custom_tokens_and_stop_reason`** — Verifies the builder API:\n- `MockLlmDriver::with_response(\"test\")` creates a single-response driver\n- `.with_tokens(200, 100)` overrides input/output token counts\n- `.with_stop_reason(StopReason::MaxTokens)` overrides the stop reason\n\n**`test_failing_llm_driver`** — Verifies that `FailingLlmDriver`:\n- Always returns `Err` containing the configured message\n- Reports `is_configured() == false`\n\n### Configuration Tests\n\n**`test_custom_config_kernel`** — Demonstrates `TestAppState::with_builder`:\n\n```rust\nTestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n)\n```\n\nThis allows tests to override kernel config before the router is built. The test then asserts directly on `app.state.kernel.config_ref()`.\n\n## How to Add a New Test\n\nFollow the established pattern:\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_my_new_endpoint() {\n    // 1. Create the app (with custom config if needed)\n    let app = TestAppState::new();\n    let router = app.router();\n\n    // 2. Build the request\n    let req = test_request(Method::POST, \"/api/thing\", Some(&body));\n\n    // 3. Execute and assert\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n    let json = assert_json_ok(resp).await;       // for 2xx responses\n    // or\n    let json = assert_json_error(resp, StatusCode::CONFLICT).await;  // for errors\n\n    // 4. Inspect the JSON\n    assert!(json.get(\"field\").is_some());\n}\n```\n\nKey points:\n- Use `flavor = \"multi_thread\"` for tests that involve the full router (database, async runtime).\n- Plain `#[tokio::test]` is fine for unit-testing mock drivers in isolation.\n- `test_request` accepts `Option<&str>` for the body — pass `None` for bodyless requests.\n- Always use `assert_json_ok` / `assert_json_error` rather than manually deserializing — they provide better failure messages.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure providing mock implementations of kernel and LLM subsystems, plus utilities for exercising API routes in isolation.\n\n## Purpose\n\nThis crate centralises all test-facing abstractions so that integration tests across the workspace share a consistent, deterministic environment instead of hitting real hardware or external services. Every other crate in the workspace can depend on `librefang-testing` without pulling in production-only side effects.\n\n## What It Provides\n\nBased on its declared scope and dependency footprint, the module delivers three categories of test support:\n\n### Mock Kernel\n\nA lightweight stand-in for `librefang-kernel` that satisfies the same trait or interface contracts without requiring actual kernel-level operations. It depends on `librefang-kernel` directly, so the mock can implement the real kernel trait and be swapped in wherever the production kernel is expected.\n\n### Mock LLM Driver\n\nA deterministic replacement for the LLM backend. Tests that exercise prompt construction, response parsing, or conversation flow can use this mock to return pre-canned responses or programmable behaviour without network calls or model inference latency.\n\n### API Route Test Utilities\n\nHelpers that wire up an `axum` router (from `librefang-api`) in a test context, allowing direct in-process request/response testing. These utilities typically handle:\n\n- Building a test application state with mock dependencies injected\n- Constructing an `axum::Router` with the same route definitions used in production\n- Providing convenience functions for sending requests and asserting on responses\n\nThe dependency on `tower` and `http-body-util` supports the HTTP-layer plumbing needed to invoke handlers without a live listener.\n\n## Dependency Rationale\n\n| Dependency | Role in Testing |\n|---|---|\n| `librefang-types` | Access to shared domain types used in assertions and test data construction |\n| `librefang-kernel` | The trait/interface definitions that the mock kernel implements |\n| `librefang-runtime` | Runtime primitives the test harness needs to stand up |\n| `librefang-memory` | Memory subsystem types the mocks may need to simulate |\n| `librefang-api` | Route definitions and application state types reused in route tests |\n| `axum` / `tower` | HTTP test infrastructure for route-level testing |\n| `tokio` | Async runtime for tests |\n| `serde_json` | Building and asserting on JSON request/response bodies |\n| `dashmap` | Concurrent state tracking inside mocks (thread-safe test fixtures) |\n| `arc-swap` | Atomic swapping of mock state, mirroring production patterns |\n| `tempfile` | Temporary directories for tests that touch the filesystem |\n| `toml` | Loading or constructing test configuration |\n| `uuid` | Generating deterministic or random identifiers in test data |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Test Suite] -->|uses| B[librefang-testing]\n    B -->|mocks| C[librefang-kernel]\n    B -->|mocks| D[LLM Driver Interface]\n    B -->|wires up| E[librefang-api Router]\n    B -->|builds state| F[librefang-runtime]\n    E -->|depends on| G[librefang-types]\n    B -->|simulates| H[librefang-memory]\n```\n\nThe testing crate sits between the test suites and the production crates, providing fake implementations that satisfy real interfaces.\n\n## Usage Patterns\n\n### Injecting the Mock Kernel\n\nTests construct the mock kernel, configure it as needed, and pass it into whatever function or system expects a kernel instance. Because the mock implements the same trait as the production kernel, no code changes are required in the system under test.\n\n### Testing API Routes\n\nThe route test utilities typically follow this pattern:\n\n1. Build mock instances of all required dependencies (kernel, LLM driver, etc.)\n2. Assemble them into an application state matching what `librefang-api` expects\n3. Construct the router from that state\n4. Use `tower::ServiceExt` or similar to send requests directly to the router\n5. Assert on response status, headers, and body content\n\nThis avoids binding to a port and keeps tests fast and deterministic.\n\n### Filesystem Isolation\n\nWhen a test needs to exercise configuration loading or file-based behaviour, `tempfile` provides scoped temporary directories that are cleaned up automatically on test completion.\n\n## Conventions\n\n- All public items in this crate are intended exclusively for `#[cfg(test)]` or test-binary contexts. Do not use them in production code paths.\n- Mocks should default to the simplest possible behaviour (e.g., returning `Ok(())` or empty data) and expose configuration methods for tests that need specific responses.\n- Prefer deterministic test data. When randomness is needed (e.g., UUIDs), use fixed seeds or explicit values to keep tests reproducible.\n\n## Adding New Mocks\n\nWhen a new subsystem is extracted into its own crate with a trait-based interface:\n\n1. Add the new crate as a dependency of `librefang-testing`\n2. Implement the mock in this crate, following the same pattern as existing mocks\n3. Export the mock type and any helper constructors from the crate root\n4. Update the API route test utilities to accept the new mock as part of application state construction","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types/locales — API Error Message Localizations\n\n## Overview\n\nThis module contains localized API error messages for the LibreFang platform, stored as [Fluent](https://projectfluent.org/) (`.ftl`) resource files. Every user-facing error returned by the API is defined here, keyed by a stable message identifier, with translations provided across six locales. Consuming code resolves these keys at runtime via a Fluent localization framework to return error text in the caller's preferred language.\n\n## Directory Structure\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl       # German\n├── en/errors.ftl       # English (canonical — most complete)\n├── es/errors.ftl       # Spanish\n├── fr/errors.ftl       # French\n├── ja/errors.ftl       # Japanese\n└── zh-CN/errors.ftl    # Simplified Chinese\n```\n\nEach locale directory follows the standard `<language-tag>/errors.ftl` layout expected by Fluent's locale resolver. Only one resource file (`errors.ftl`) exists per locale currently, covering all API error messages.\n\n## Fluent Message Format\n\nMessages use standard Fluent syntax. Simple messages are plain key-value pairs:\n\n```fluent\napi-error-agent-not-found = Agent not found\n```\n\nParameterized messages use Fluent placeables to inject dynamic values:\n\n```fluent\napi-error-message-delivery-failed = Message delivery failed: { $reason }\napi-error-template-not-found = Template '{ $name }' not found\napi-error-cron-create-failed = Failed to create cron job: { $error }\n```\n\nParameters used across messages include `$reason`, `$error`, `$name`, `$id`, `$step`, `$field`, `$valid`, `$url`, `$status`, `$alias`, `$provider`, `$max`, and `$event`. When adding or updating messages, ensure all locales that translate a message include the same set of parameters.\n\n## Message Naming Convention\n\nAll message identifiers follow the pattern:\n\n```\napi-error-<domain>-<detail>\n```\n\nWhere `<domain>` is a hyphen-separated subsystem name and `<detail>` describes the specific condition. For example:\n\n| Identifier | Domain | Detail |\n|---|---|---|\n| `api-error-agent-not-found` | agent | not-found |\n| `api-error-workflow-missing-steps` | workflow | missing-steps |\n| `api-error-provider-alias-exists` | provider | alias-exists |\n| `api-error-webhook-url-unreachable` | webhook | url-unreachable |\n\n## Error Domains\n\nThe English locale (`en/errors.ftl`) is the canonical source and defines the full set of error domains. The domains are:\n\n| Domain | Description |\n|---|---|\n| `agent` | Agent lifecycle — spawn, lookup, workspace, cloning, sorting |\n| `message` | Inter-agent messaging — size limits, delivery, streaming |\n| `template` | Agent templates — parsing, lookup, manifest requirements |\n| `manifest` | Template manifests — size, format, signature verification |\n| `auth` | API key authentication — missing/invalid keys and headers |\n| `session` | Conversational sessions — load, lookup, cleanup |\n| `workflow` | Multi-step workflows — step validation, execution |\n| `trigger` | Event triggers — pattern validation, registration |\n| `budget` | Cost budgets — amount validation, updates |\n| `config` | Runtime configuration — parse, write, save, remove |\n| `profile` | Named profiles — lookup |\n| `cron` | Scheduled tasks (cron) — expression validation, CRUD |\n| `goal` | Goal tracking — titles, hierarchy, status, CRUD |\n| `memory` | Agent memory — export/import, KV store operations |\n| `network` | Peer networking / A2A — connections, auth, task posting |\n| `plugin` | Plugin installation — source validation, required fields |\n| `channel` | Inter-agent channels — agent ID validation |\n| `provider` | LLM providers — aliases, models, API keys, URLs, secrets |\n| `skill` | Agent skills — naming, creation, installation |\n| `hand` | Hand management — definitions and instances |\n| `mcp` | MCP server configuration — transport, validation |\n| `integration` / `extension` | Integrations and extensions — lookup |\n| `system` | System-level — CLI availability |\n| `kv` | Structured KV memory — fields, values, paths |\n| `approval` | Human-approval workflow — ID validation, lookup |\n| `webhook` | Webhook triggers — URL validation, event types, publishing |\n| `backup` | Backup/restore — archive validation, file operations |\n| `schedule` | Named schedules — cron validation, CRUD |\n| `job` | Background jobs — retryability, disappearance |\n| `task` | Tasks — lookup, disappearance |\n| `pairing` | Device/token pairing — enablement, validation |\n| `binding` | Bindings — index range |\n| `command` | Commands — lookup |\n| `file` | File uploads — size, type, path traversal, workspace |\n| `tool` | Tool invocation — allowlist, approval requirements |\n| `validation` | General field validation — content, name, title, avatar, color |\n| *(unprefixed)* | General — not-found, internal, bad-request, rate-limited |\n\n## Locale Coverage\n\nLocales have different levels of coverage. The English locale is the authoritative source with the complete message set. Other locales may contain a subset:\n\n| Locale | Status |\n|---|---|\n| `en` | **Canonical** — full coverage across all domains |\n| `ja` | Near-complete — covers most domains including goals, memory, webhooks, schedules, jobs, tools |\n| `zh-CN` | Partial — core domains plus tool-specific messages |\n| `de`, `es`, `fr` | **Minimal** — covers only the original core domains (agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, general) |\n\nWhen a message key is missing from a non-English locale, the Fluent framework typically falls back to the English message. However, this fallback behavior depends on the consuming application's localization configuration.\n\n## Adding a New Error Message\n\n1. **Add to `en/errors.ftl` first** — this is the canonical source. Place the message under the correct domain section, or create a new section comment if it's a new domain.\n\n2. **Copy to other locales** — add the translated message to each locale's `errors.ftl`. If a translation is not yet available, you may omit it (the framework will fall back to English), but do not leave a placeholder with English text in a non-English file.\n\n3. **Preserve parameter names** — if the English message uses `{ $error }`, the translated message must also reference `{ $error }` exactly. Fluent will raise errors at runtime if a referenced variable is not provided.\n\nExample addition to `en/errors.ftl`:\n\n```fluent\n# Widget errors\napi-error-widget-not-found = Widget '{ $id }' not found\napi-error-widget-create-failed = Failed to create widget: { $error }\n```\n\nCorresponding addition to `ja/errors.ftl`:\n\n```fluent\n# ウィジェットエラー\napi-error-widget-not-found = ウィジェット '{ $id }' が見つかりません\napi-error-widget-create-failed = ウィジェットの作成に失敗しました: { $error }\n```\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using a valid [BCP 47](https://tools.ietf.org/html/bcp47) language tag (e.g., `pt-BR/`, `ko/`).\n2. Create `errors.ftl` inside it.\n3. Translate messages from `en/errors.ftl`. Maintain the same message identifiers and section comments. Only translate the right-hand side (the message value), never the identifier.\n4. Register the new locale with the consuming application's Fluent bundle configuration (outside this module).\n\n## Integration with the Codebase\n\nThis module is a pure data module — it contains no executable code. The `.ftl` files are loaded at application startup by the Fluent localization runtime bundled into the API server. The typical integration flow is:\n\n```mermaid\nflowchart LR\n    A[API handler<br/>returns error key] --> B[Localization<br/>layer]\n    B --> C[Fluent bundle<br/>loads .ftl files]\n    C --> D[Resolved<br/>error message]\n    D --> E[HTTP response<br/>to client]\n```\n\nAPI route handlers return error identifiers (e.g., `\"api-error-agent-not-found\"`) rather than hardcoded strings. The localization layer resolves the identifier against the user's `Accept-Language` header (or an explicit locale parameter) and returns the translated string. This ensures consistent error messaging and simplifies internationalization across all API endpoints.","other-librefang-types-src":"# Other — librefang-types-src\n\n# `model_catalog` — Shared Types for the Model Registry\n\n## Purpose\n\nThis module defines the data structures that flow between the TOML-based model catalog files on disk, the runtime catalog loader, the metering kernel, the API layer, and the OpenAI-compatible driver. Everything is serializable (`serde` + `Deserialize`) and lives in `librefang-types` so it can be imported without pulling in heavy runtime dependencies.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    TOML[\"TOML Catalog Files<br/>(providers/*.toml)\"]\n    MCF[\"ModelCatalogFile\"]\n    PCT[\"ProviderCatalogToml\"]\n    MCE[\"ModelCatalogEntry\"]\n    PI[\"ProviderInfo\"]\n    MO[\"ModelOverrides\"]\n    EC[\"EffectiveCapabilities\"]\n\n    TOML --> MCF\n    MCF -->|\"provider field\"| PCT\n    MCF -->|\"models array\"| MCE\n    PCT -->|\"From impl\"| PI\n    MO -->|\"applied on top of\"| MCE\n    MCE -->|\"resolved to\"| EC\n```\n\nConsumers include `librefang-runtime` (catalog loading, model metadata synthesis), `librefang-api` (provider routes, custom model endpoints), `librefang-kernel-metering` (cost estimation from catalog pricing), and the OpenAI-compatible driver (reasoning echo policy dispatch).\n\n---\n\n## Key Types\n\n### Enums\n\n| Type | Purpose | Serde format |\n|---|---|---|\n| `ModelTier` | Capability classification (frontier → fast, local, custom) | `lowercase` |\n| `AuthStatus` | Provider authentication state | `snake_case` |\n| `Modality` | Output kind (text, image, audio, video, music) | `lowercase` |\n| `ModelType` | Inference type (chat, speech, embedding) | `lowercase` |\n| `ReasoningEchoPolicy` | How the OpenAI-compat driver handles `reasoning_content` on history turns | `snake_case` |\n\nAll enums are `#[non_exhaustive]` — new variants may be adde
