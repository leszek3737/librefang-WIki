d without a semver break. Consumers must handle unknown variants gracefully (or wildcard-match with `_`).\n\n#### `AuthStatus` availability check\n\n`AuthStatus::is_available()` returns `true` for states where the provider is functionally usable:\n\n- `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, `NotRequired`\n\nIt returns `false` for `InvalidKey`, `Missing`, `CliNotInstalled`, and `LocalOffline`. Note that `InvalidKey` is explicitly excluded — a key exists but the provider rejected it.\n\n#### `ReasoningEchoPolicy` and provider quirks\n\nThe OpenAI-compatible ecosystem has incompatible conventions for `reasoning_content` on multi-turn history. The catalog encodes the correct behavior per model so the driver doesn't need to substring-match model names:\n\n| Variant | Behavior | Canonical provider |\n|---|---|---|\n| `None` | Omit field on history turns (default) | Most providers |\n| `Strip` | Strip `reasoning_content` from history; force non-null `content` on empty assistant turns | DeepSeek R1 / reasoner |\n| `Echo` | Echo original thinking text on `tool_calls` turns | DeepSeek V4 Flash (thinking mode on) |\n| `EmptyString` | Send empty-string `reasoning_content` on `tool_calls` turns, disable thinking wire-side | Moonshot / Kimi K2 |\n\nDrivers for non-OpenAI-compat providers (Anthropic, Gemini) ignore this field entirely.\n\n---\n\n### Core Structs\n\n#### `ModelCatalogEntry`\n\nA single model in the catalog. Key design decisions:\n\n- **`context_window` and `max_output_tokens`** use `#[serde(default)]` so image/audio/video/music models (which have no token context) can omit these fields in TOML. The value `0` means \"unknown or not applicable.\"\n- **`validate()` must be called after deserialization** for `Modality::Text` entries — it rejects text models missing either field, preventing `0` from leaking into compaction thresholds or budget math. Catalog loaders call this at load time and reject malformed entries.\n- **`image_input_cost_per_m` / `image_output_cost_per_m`** are `Option<f64>` and only present for multimodal/image-generation models where pixel tokens are priced separately from text.\n\n#### `ProviderCatalogToml` vs `ProviderInfo`\n\nTwo structs represent providers at different stages:\n\n- **`ProviderCatalogToml`** — maps 1:1 to the `[provider]` TOML section. No runtime fields.\n- **`ProviderInfo`** — the runtime representation, adding `auth_status`, `model_count`, `available_models`, `is_custom`, and `proxy_url`.\n\n`ProviderCatalogToml` converts to `ProviderInfo` via `From` impl, which initializes runtime fields to their defaults (`AuthStatus::Missing`, zero models, empty available list).\n\n#### `ModelCatalogFile`\n\nThe top-level TOML structure containing an optional `[provider]` section and a `[[models]]` array. This is the unified format used by both the main registry and community catalog repositories.\n\n#### `AliasesCatalogFile`\n\nA separate alias file mapping short names to canonical model IDs. Loaded alongside the main catalog to support shorthand references like `sonnet` → `claude-sonnet-4-20250514`.\n\n#### `RegionConfig`\n\nPer-region endpoint overrides within a provider. When a region is selected at runtime, its `base_url` replaces the provider-level default. Optionally overrides `api_key_env` per region (e.g., a different key for an international endpoint).\n\n#### `ModelOverrides`\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`. Every field is `Option` — `None` means \"use the agent or system default.\" The override layering order is:\n\n1. Agent-level `ModelConfig` (highest precedence)\n2. `ModelOverrides` (this struct)\n3. System defaults\n\nThe capability overrides (`supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`) exist so users can force a capability on/off when the provider's catalog declaration is wrong or missing. Use `is_empty()` to check whether any overrides are set.\n\n#### `EffectiveCapabilities`\n\nThe resolved capability set after applying user overrides on top of the catalog entry's declared capabilities. Produced by `ModelCatalog::effective_capabilities` and consumed by callers that gate runtime behavior (tool gating, vision input validation).\n\n---\n\n## TOML Catalog Format\n\nA typical catalog file at `providers/<name>.toml`:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nThe `[provider]` section is optional — models-only files are valid and the provider is inferred during merge.\n\nRegional endpoints are expressed as:\n\n```toml\n[provider.regions.us]\nbase_url = \"https://dashscope-us.aliyuncs.com/compatible-mode/v1\"\n\n[provider.regions.intl]\nbase_url = \"https://dashscope-intl.aliyuncs.com/compatible-mode/v1\"\napi_key_env = \"DASHSCOPE_INTL_API_KEY\"\n```\n\nImage-generation models omit `context_window` and `max_output_tokens`:\n\n```toml\n[[models]]\nid = \"gpt-image-2\"\ndisplay_name = \"GPT Image 2\"\ntier = \"frontier\"\nmodality = \"image\"\ninput_cost_per_m = 5.00\noutput_cost_per_m = 10.00\nimage_input_cost_per_m = 8.00\nimage_output_cost_per_m = 30.00\nsupports_tools = false\nsupports_vision = true\n```\n\n---\n\n## Integration Points\n\n### Where the types are consumed\n\n- **`librefang-runtime`** (`model_metadata.rs`) — constructs `ModelCatalogEntry` instances from catalog data and synthesizes entries for unknown models.\n- **`librefang-api`** (`routes/providers.rs`) — calls `ModelCatalogEntry::validate()` when adding custom models via the dashboard.\n- **`librefang-api`** (`model_catalog/tests.rs`) — exercises `ModelOverrides` for capability override resolution and alias-based lookups.\n- **`librefang-kernel-metering`** (`lib.rs`) — uses `ModelCatalogFile` for cost estimation, falling back to legacy budget rates when catalog pricing is zero.\n\n### Adding a new provider\n\n1. Create a `providers/<name>.toml` with a `[provider]` section and `[[models]]` entries.\n2. Ensure all `Modality::Text` models have non-zero `context_window` and `max_output_tokens`.\n3. If the provider uses the OpenAI-compat wire format with non-standard `reasoning_content` handling, set `reasoning_echo_policy` on affected models.\n4. If the provider has regional endpoints, add `[provider.regions.<name>]` subsections.","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types Tests\n\nIntegration tests that guard the TOML serialization contract between the dashboard frontend and the kernel, and ensure config struct defaults remain consistent across `Default` impls and serde deserialization.\n\n## Overview\n\nThe `librefang-types` crate defines the canonical Rust representations for every configuration and manifest type in the system. These types are serialized to/from TOML on disk and consumed by both the kernel and the dashboard's visual editor (TypeScript). The three test files in this module serve distinct but complementary purposes:\n\n| Test file | Purpose |\n|---|---|\n| `agent_form_roundtrip.rs` | Catches drift between the dashboard's TOML serializer and the kernel's deserializer |\n| `config_default_roundtrip.rs` | Catches divergence between manual `Default` impls and `#[serde(default)]` attributes |\n| `schemars_poc.rs` | Ad-hoc JSON Schema generation for manual inspection |\n\n---\n\n## agent_form_roundtrip.rs\n\n### Problem it solves\n\nThe dashboard (`crates/librefang-api/dashboard/src/lib/agentManifest.ts`) emits TOML from a visual form. The kernel's Rust deserializer must parse that exact TOML. If either side renames a field, changes an enum variant, or alters a nested structure, the mismatch only appears at runtime. These tests catch it at build time by parsing representative TOML strings that mirror what the form serializer actually produces.\n\n### Test cases\n\n**`parses_form_minimum_viable_output`** — The smallest valid manifest the form can emit: `name`, `version`, `module`, and a `[model]` section with `provider` and `model`. Verifies the core fields parse correctly.\n\n**`parses_form_full_output_with_capabilities_and_resources`** — A fully-populated standard form including `tags`, `skills`, `model.temperature`, `model.max_tokens`, `[resources]`, and `[capabilities]`. Validates collections, floats, and boolean fields.\n\n**`parses_form_with_advanced_sections`** — Exercises every advanced section the form offers: `priority`, `session_mode`, `web_search_augmentation`, `schedule`, `exec_policy`, `[thinking]`, `[autonomous]`, `[routing]`, `[[fallback_models]]`, and `[[context_injection]]`. This is the primary drift-detection test—if a field is renamed in either the TypeScript serializer or the Rust struct, this test fails.\n\n**`parses_form_response_format_json_schema`** — Tests the `ResponseFormat::JsonSchema` variant, which carries an inline JSON schema as a TOML table. This is a high-risk area because the `schema` field maps to `serde_json::Value`.\n\n**`omitting_optional_sections_uses_defaults`** — Confirms that when the form leaves `resources` and `capabilities` empty, the kernel falls back to `ResourceQuota` and `ManifestCapabilities` defaults rather than erroring.\n\n### When updating\n\nIf you add a new field to `AgentManifest` or any nested struct, add a corresponding assertion in `parses_form_with_advanced_sections` (or a new test if it's a new section). If you change the TypeScript serializer in `agentManifest.ts`, run these tests to confirm the kernel still accepts the output.\n\n---\n\n## config_default_roundtrip.rs\n\n### The bug class (issue #3404)\n\nMany config structs have both a manual `impl Default` and fields annotated with `#[serde(default)]` or `#[serde(default = \"path::to::fn\")]`. A common mistake is:\n\n1. A developer adds a new field with `#[serde(default)]` and a custom default function.\n2. They forget to update the manual `Default` impl.\n3. Serde deserialization fills the field with `Field::default()` or the custom function, while `T::default()` produces a different value.\n4. Empty TOML round-trips appear to work, but in-memory defaults diverge silently.\n\nThe schemars golden schema test doesn't catch this because schemars reads the `#[serde(default)]` attribute, not the `Default` impl body.\n\n### How the tests work\n\nEach test calls one of two helper functions:\n\n- **`assert_default_roundtrip::<T>(label)`** — For types where `Default` and serde-empty should agree on every field.\n- **`assert_default_roundtrip_with::<T>(label, normalize)`** — For types with a known legitimate divergence (e.g., `KernelConfig::config_version`).\n\nEach helper performs two assertions:\n\n1. **Empty-TOML equivalence**: `T::default()` must serialize to the same TOML string as what you get by deserializing an empty TOML document and re-serializing. If a `#[serde(default)]` field disagrees with the manual `Default` impl, the serialized strings will differ.\n2. **Round-trip idempotency**: `T::default()` → serialize → deserialize → serialize must produce the same string both times.\n\nComparison is done via TOML string equality rather than `PartialEq` to avoid requiring `#[derive(PartialEq)]` across the entire nested config tree (see issue #3404 caveat 1).\n\n### The KernelConfig normalization\n\n`KernelConfig` has one field where divergence is intentional: `config_version`.\n\n- `KernelConfig::default()` sets `config_version` to `CONFIG_VERSION` (currently `2`) — fresh in-memory configs need no migration.\n- The serde default function `default_config_version()` returns `1` — a legacy on-disk TOML that omits `config_version` is pre-versioning, and `run_migrations` lifts it forward.\n\nThe test normalizes both sides to `KernelConfig::default().config_version` before comparison, so the deliberate v1 sentinel doesn't mask mismatches on every other field.\n\n### The ChannelsConfig regression (issue #4436)\n\n`ChannelsConfig` previously derived `Default`, causing `file_download_max_bytes` to default to `0`. The `#[serde(default = \"default_file_download_max_bytes\")]` attribute set it to 50 MiB. This meant any programmatically-constructed config (e.g., `KernelConfig::default()`) silently rejected all file attachments as oversized. The fix was a manual `Default` impl. Two tests guard this:\n\n- `channels_config_default_roundtrips_through_toml` — the standard round-trip check.\n- `channels_config_default_has_50mb_max` — a pinned-value assertion that trips CI even if someone zero-bins both the `Default` impl and the serde helper simultaneously.\n\n### Adding a new type\n\nFor most config structs, add a single test:\n\n```rust\n#[test]\nfn my_config_default_roundtrips_through_toml() {\n    assert_default_roundtrip::<MyConfig>(\"MyConfig\");\n}\n```\n\nIf the type has a known legitimate divergence, use `assert_default_roundtrip_with` and pass a closure that normalizes the divergent field.\n\n### Covered types\n\nThe test suite covers 40+ config types including: `QueueConfig`, `BudgetConfig`, `SessionConfig`, `CompactionTomlConfig`, `TaskBoardConfig`, `TriggersConfig`, `WebhookTriggerConfig`, `WebConfig`, `WebFetchConfig`, `BrowserConfig`, `BraveSearchConfig`, `TavilySearchConfig`, `PerplexitySearchConfig`, `JinaSearchConfig`, `ReloadConfig`, `RateLimitConfig`, `SkillsConfig`, `ExtensionsConfig`, `VaultConfig`, `AutoReplyConfig`, `InboxConfig`, `TelemetryConfig`, `PromptIntelligenceConfig`, `CanvasConfig`, `ThinkingConfig`, `ContextEngineTomlConfig`, `ExternalAuthConfig`, `AuditConfig`, `PrivacyConfig`, `HealthCheckConfig`, `HeartbeatTomlConfig`, `AutoDreamConfig`, `RegistryConfig`, `MemoryConfig`, `MemoryDecayConfig`, `ChunkConfig`, `NetworkConfig`, `TtsConfig`, `DockerSandboxConfig`, `PairingConfig`, `SanitizeConfig`, `ParallelToolsConfig`, `TerminalConfig`, `VoiceConfig`, `LinkedInConfig`, `AgentManifest`, `ChannelsConfig`, `BroadcastConfig`, and `KernelConfig`.\n\n---\n\n## schemars_poc.rs\n\nDevelopment-time utility tests that generate and print JSON Schema (draft-07) for representative types. Not a correctness gate—these are for manual inspection during schema evolution.\n\nRun with stdout visible:\n\n```\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```\n\n### Test cases\n\n- **`dump_budget_config_schema`** — Representative simple config struct.\n- **`dump_vault_config_schema`** — Contains `Option<PathBuf>`, useful for checking how schemars renders filesystem paths.\n- **`full_kernel_config_schema_generates`** — End-to-end sanity check that the full `KernelConfig` schema generates valid JSON. Asserts >50 top-level properties and >50 nested definitions, giving a rough measure of the schema surface area.\n- **`dump_response_format_schema`** — Tagged enum with a variant carrying `serde_json::Value`; a major risk point for schema correctness.\n\n---\n\n## Relationship to the rest of the codebase\n\n```mermaid\ngraph LR\n    A[Dashboard TS<br>agentManifest.ts] -->|emits TOML| B[agent_form_roundtrip.rs]\n    C[librefang-types<br>config/ structs] -->|Default impl| D[config_default_roundtrip.rs]\n    C -->|serde attributes| D\n    C -->|schemars derive| E[schemars_poc.rs]\n    B -->|parses with| C\n```\n\n- **`librefang-types/src/config/`** — Defines every config struct with `#[serde(default)]` attributes and manual `Default` impls. The round-trip tests are the primary guard against drift between these two mechanisms.\n- **`librefang-api/dashboard/src/lib/agentManifest.ts`** — The TypeScript serializer. The agent form round-trip tests mirror its output; if you change it, run the Rust tests.\n- **`librefang-types/src/config/version.rs`** — Defines `default_config_version()` (returns `1`) and `CONFIG_VERSION` (currently `2`). The `KernelConfig` test normalizes around this.\n- **`librefang-types/src/agent.rs`** — Defines `AgentManifest`, `Priority`, `SessionMode`, and related types exercised by the form round-trip tests.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nShared data structures for the LibreFang Agent OS. Pure types, zero business logic. Every other workspace crate depends on this one; it depends on nothing in the workspace.\n\n## Position in the workspace\n\n```mermaid\ngraph TD\n    T[librefang-types] --> K[librefang-kernel]\n    T --> A[librefang-api]\n    T --> R[librefang-runtime]\n    T --> M[librefang-memory]\n    T --> O[other crates...]\n```\n\n`librefang-types` sits at the bottom of the dependency DAG. It imports **no** other `librefang-*` crate. If you need a type shared across two or more crates, it belongs here or you reverse the dependency.\n\n## What goes here\n\nCross-crate data structures only: structs, enums, type aliases, and small derive-only helpers. If a function body exceeds five lines, it belongs in a consumer crate.\n\n### Public modules\n\n| Module | Domain |\n|---|---|\n| `agent` | Agent identity and descriptor types |\n| `approval` | Approval / human-in-the-gate flow types |\n| `capability` | Permission and capability tokens |\n| `comms` | Inter-agent communication primitives |\n| `config` | `KernelConfig` and related configuration structs |\n| `error` | `LibreFangError` and error enums (see below) |\n| `event` | Event types emitted by the kernel |\n| `goal` | Goal and objective types |\n| `i18n` | Internationalization types (backed by `fluent`) |\n| `manifest_signing` | Ed25519 manifest signing types |\n| `media` | Media content types |\n| `memory` | Memory substrate types |\n| `message` | Message envelope types |\n| `model_catalog` | Model registry / catalog types |\n| `oauth` | OAuth flow types |\n| `registry_schema` | Registry schema types |\n| `scheduler` | Scheduling types |\n| `serde_compat` | Serde helpers and compat shims |\n| `subagent` | Sub-agent spawn / management types |\n| `taint` | Taint tracking types |\n| `tool` | Tool descriptor types |\n| `tool_class` | Tool classification types |\n\n### Public constants\n\n- **`VERSION: &str`** — workspace version, compiled from `CARGO_PKG_VERSION`.\n\n## Dependencies\n\nExternal only. No workspace crate imports.\n\n`serde`, `serde_json`, `chrono`, `uuid`, `thiserror`, `dirs`, `toml`, `schemars`, `async-trait`, `ed25519-dalek`, `sha2`, `hex`, `zeroize`, `fluent`, `unic-langid`, `regex-lite`, `tracing`, `url`.\n\n## Adding a new type\n\n1. **Choose the module.** Place the type in the matching submodule above. If no module fits, create a new one — but first verify the type is truly cross-crate and doesn't belong in the single crate that consumes it.\n2. **Derive the standard quartet:** `Debug`, `Clone`, `Serialize`, `Deserialize`.\n3. **Add `PartialEq` / `Eq` / `Hash`** only when a downstream consumer needs them.\n4. **OpenAPI surface types:** also derive `utoipa::ToSchema`.\n5. **Configuration types:** also derive `schemars::JsonSchema` (required for the kernel-config golden fixture — see below).\n\n## Adding a field to a config struct\n\nEvery config field must follow this ritual:\n\n1. Add the field with `#[serde(default)]` for forward-compatibility with existing TOML files.\n2. Add the corresponding entry in the manual `Default` impl. The build will fail otherwise.\n3. Write a doc comment. `schemars` surfaces doc comments as the field's `description` in the generated JSON Schema.\n4. Regenerate the golden fixture in `librefang-api` tests. CI enforces this.\n\n### Schema-mirror invariant\n\n`librefang-types` defines the schema. The golden-file guard (`kernel_config_schema_matches_golden_fixture`) lives in `librefang-api`'s test suite. The canonical OpenAPI and TOML baselines are tracked under `xtask/baselines/`.\n\nCI uses a changed-lanes rule: any PR touching `librefang-types` automatically pulls `librefang-api` into the affected test set. A schema change without a regenerated golden will fail CI.\n\n## Error types\n\nThis crate exports `LibreFangError` and related error enums. The workspace is migrating away from `Result<_, String>` and `anyhow::Error` in trait boundaries (#3541, #3711). New error variants belong here.\n\nWhen adding a variant:\n\n- Preserve the `source()` chain (#3745).\n- Use `#[from]` on a wrapped enum — this is the standard idiom for automatic `From` conversion while keeping the error chain intact.\n\n```rust\n#[derive(Debug, thiserror::Error)]\npub enum LibreFangError {\n    #[error(\"configuration error\")]\n    Config(#[from] ConfigError),\n    // ...\n}\n```\n\n## Hard rules (taboos)\n\n| Rule | Reason |\n|---|---|\n| No `tokio` | Sync types only. Async runtime belongs in consumers. |\n| No `reqwest` | HTTP code lives in consumer crates. Wire types are data-only. |\n| No `librefang-*` imports | This crate is the bottom of the DAG. Reverse the dependency instead. |\n| No functions > 5 lines | Business logic belongs in the crate that uses the type. |\n| No `HashMap` in prompt-bound types | Use `BTreeMap` / `BTreeSet` for deterministic serialization (#3298). |\n| No silently dropped serde fields | Use `#[serde(default)]` explicitly, or let it fail at compile time. |","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer for the LibreFang Protocol (OFP). This crate handles authenticated, encrypted communication between LibreFang agents over the wire.\n\n## Purpose\n\n`librefang-wire` is the transport security and message framing layer of the LibreFang system. It provides:\n\n- **Authenticated key exchange** between agents using X25519 (Elliptic Curve Diffie-Hellman)\n- **Identity verification** via Ed25519 digital signatures\n- **Session key derivation** through HKDF\n- **Message authentication** using HMAC-SHA256\n- **Constant-time comparison** (via `subtle`) to prevent timing attacks\n\nEvery message that crosses the network between agents passes through this crate's serialization, signing, and verification pipeline.\n\n## Cryptographic Protocol\n\nThe dependency chain reveals a clear cryptographic handshake and messaging pattern:\n\n```mermaid\nsequenceDiagram\n    participant A as Agent A\n    participant B as Agent B\n    A->>B: X25519 Public Key (ephemeral)\n    B->>A: X25519 Public Key (ephemeral)\n    Note over A,B: Both derive shared secret via X25519 DH\n    Note over A,B: HKDF expands shared secret into session keys\n    A->>B: Ed25519-signed identity proof\n    B->>A: Ed25519-signed identity proof\n    Note over A,B: Subsequent messages: HMAC-SHA256 authenticated\n```\n\n### Handshake Phase\n\n1. **Key Exchange** — Each agent generates an ephemeral X25519 keypair (`x25519-dalek`). Public keys are exchanged to compute a shared secret on both sides.\n2. **Key Derivation** — The raw shared secret is fed through HKDF (`hkdf` + `sha2`) to produce symmetric session keys for encryption and MAC operations.\n3. **Identity Binding** — Each agent signs the handshake transcript with its long-lived Ed25519 identity key (`ed25519-dalek`), proving ownership of the static identity claimed during the exchange.\n4. **Timing-Safe Verification** — All signature and MAC comparisons use `subtle` for constant-time evaluation, preventing timing side-channels.\n\n### Message Phase\n\nAfter handshake completion, all messages are authenticated with HMAC-SHA256 (`hmac` + `sha2`). Message integrity is verified before any application-level processing occurs.\n\n## Serialization and Framing\n\nMessages are serialized with `serde` and `serde_json` before transmission. The crate defines the wire format for all OFP message types, relying on `librefang-types` for shared data structures.\n\n- **`uuid`** — Correlation IDs for request/response matching across agents\n- **`chrono`** — Timestamps for message ordering, expiry, and replay protection\n- **`base64`** / **`hex`** — Encoding helpers for binary payloads in JSON-safe representations\n\n## Runtime Model\n\nBuilt entirely on `tokio` with `async-trait` for trait-based async interfaces. Connection state, session tracking, and key material are held in concurrent data structures provided by `dashmap`, supporting multiple simultaneous agent connections without global locks.\n\n```mermaid\ngraph LR\n    subgraph \"librefang-wire\"\n        H[Handshake Handler]\n        S[Session Manager]\n        F[Frame Codec]\n    end\n    T[librefang-types] --> H\n    T --> F\n    H --> S\n    S --> F\n```\n\n## Error Handling\n\nUses `thiserror` to define a structured error type hierarchy covering:\n\n- Handshake failures (key exchange errors, signature verification failures)\n- Framing errors (malformed messages, deserialization failures)\n- Session errors (expired sessions, unknown peers)\n- Cryptographic errors (HMAC mismatch, invalid key material)\n\nAll errors implement `std::error::Error` and carry enough context for callers to distinguish transient from fatal failures.\n\n## Observability\n\nInstrumented with `tracing` spans and events at key points:\n\n- Connection establishment and teardown\n- Handshake progress and completion\n- Message send/receive with size and timing metadata\n- Error conditions with diagnostic context\n\nConsumers should initialize a `tracing` subscriber to capture this output.\n\n## Relationship to Other Crates\n\n| Crate | Relationship |\n|---|---|\n| `librefang-types` | Consumes shared types (message enums, agent IDs, configuration structs). This is the only direct dependency within the workspace. |\n| Downstream consumers | Higher-level crates (e.g., agent runtimes, orchestrators) depend on `librefang-wire` for secure channels without handling crypto primitives directly. |\n\n## Security Considerations\n\n- **Ephemeral keys** — X25519 keypairs are generated per-session via `rand_core`/`getrandom`, providing forward secrecy.\n- **No custom crypto** — All cryptographic operations delegate to well-audited crates (`ed25519-dalek`, `x25519-dalek`, `hmac`, `sha2`, `hkdf`).\n- **Constant-time operations** — The `subtle` crate ensures secret comparisons do not leak information through timing.\n- **Session key isolation** — HKDF domain-separates derived keys so session keys cannot be confused across different handshake instances.","other":"# Other\n\n# Other Modules\n\nSupplementary crates that complete the LibreFang Agent OS — client interfaces, kernel internals, runtime subsystems, memory, LLM drivers, channel adapters, testing infrastructure, and cross-cutting utilities.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Client Interfaces\"\n        CLI[librefang-cli]\n        DESK[librefang-desktop]\n        ACP[librefang-acp]\n        DASH[librefang-api-dashboard]\n    end\n\n    subgraph \"API Surface\"\n        API[librefang-api]\n    end\n\n    subgraph \"Orchestration\"\n        KERN[librefang-kernel]\n        KH[librefang-kernel-handle]\n        KM[librefang-kernel-metering]\n        KR[librefang-kernel-router]\n    end\n\n    subgraph \"Runtime\"\n        RT[librefang-runtime]\n        AUDIT[librefang-runtime-audit]\n        MCP[librefang-runtime-mcp]\n        MEDIA[librefang-runtime-media]\n        SANDBOX[librefang-runtime-sandbox-docker]\n    end\n\n    subgraph \"Intelligence\"\n        DRV[librefang-llm-drivers]\n        HANDS[librefang-hands]\n        SKILLS[librefang-skills]\n    end\n\n    subgraph \"Memory\"\n        MEM[librefang-memory]\n        WIKI[librefang-memory-wiki]\n    end\n\n    subgraph \"Channels\"\n        CH[librefang-channels]\n    end\n\n    subgraph \"Infrastructure\"\n        TYPES[librefang-types]\n        EXT[librefang-extensions]\n        HTTP[librefang-http]\n        TELE[librefang-telemetry]\n        WIRE[librefang-wire]\n        TEST[librefang-testing]\n        MIGRATE[librefang-migrate]\n        RL[librefang-rl-export]\n    end\n\n    CLI & DESK & ACP --> API\n    DASH --> API\n    API --> KERN\n    KERN --> RT\n    KERN --> MEM\n    KERN --> CH\n    RT --> DRV\n    RT --> HANDS\n    RT --> SKILLS\n    KERN --> KH\n    KERN --> KM\n    KERN --> KR\n    RT --> AUDIT\n    RT --> MCP\n    RT --> MEDIA\n    RT --> SANDBOX\n    MEM --> WIKI\n    EXT --> HTTP\n    all --> TYPES\n```\n\n## Layer Summary\n\n### Foundation — [librefang-types](librefang-types.md)\n\nEvery crate depends on this. Pure shared data structures — no business logic, no workspace dependencies. Localized error messages live in [librefang-types-locales](librefang-types-locales.md); model catalog types in [librefang-types-src](librefang-types-src.md). The [test suite](librefang-types-tests.md) guards TOML serialization contracts with the dashboard.\n\n### Kernel — [librefang-kernel](librefang-kernel.md)\n\nCore orchestration: agent lifecycles, scheduling, permissions, inter-agent communication. The [kernel handle trait](librefang-kernel-handle.md) defines the in-process interface so callers can mock or decorate it. [Metering](librefang-kernel-metering.md) enforces spending quotas on LLM calls. The [router](librefang-kernel-router.md) resolves incoming messages to the correct Hand or Template handler. Verified by [kernel tests](librefang-kernel-tests.md) and [kernel-src tests](librefang-kernel-src.md).\n\n### Runtime — [librefang-runtime](librefang-runtime.md)\n\nAgent execution engine: the turn-by-turn loop, tool dispatch, context management, and the Agent-to-Agent protocol. Subsystem crates extracted during the god-crate split:\n\n- [audit](librefang-runtime-audit.md) — tamper-evident Merkle hash chain for all agent actions\n- [MCP client](librefang-runtime-mcp.md) — Model Context Protocol tool discovery and invocation\n- [media](librefang-runtime-media.md) — text-to-speech, image, video, and music generation\n- [sandbox-docker](librefang-runtime-sandbox-docker.md) — OS-level isolation for tool execution\n\nCovered by [runtime tests](librefang-runtime-tests.md) and [runtime-src tests](librefang-runtime-src.md).\n\n### LLM Drivers — [librefang-llm-drivers](librefang-llm-drivers.md)\n\nConcrete provider implementations (Anthropic, OpenAI, Gemini, Groq, Ollama) of the [LlmDriver trait](librefang-llm-driver.md). Includes credential rotation, rate limiting, failover chains, and stream backpressure. [Driver tests](librefang-llm-drivers-tests.md) validate wire contracts against mock HTTP servers.\n\n### Memory — [librefang-memory](librefang-memory.md)\n\nUnified memory API over structured storage, semantic search, and a knowledge graph — all backed by SQLite. The [wiki vault](librefang-memory-wiki.md) persists agent knowledge as Obsidian-compatible Markdown with cryptographic provenance. [RosterStore](librefang-memory-src.md) tracks group chat membership. Guarded by [memory tests](librefang-memory-tests.md) and [wiki tests](librefang-memory-wiki-tests.md).\n\n### Channels — [librefang-channels](librefang-channels.md)\n\nBridges 40+ messaging platforms into unified `ChannelMessage` events and routes agent replies back out. Includes a router, message journal, rate limiter, sanitizer, and sidecar infrastructure. Benchmarked in [channels-benches](librefang-channels-benches.md); tested end-to-end in [channels-tests](librefang-channels-tests.md).\n\n### Hands & Skills — [librefang-hands](librefang-hands.md) · [librefang-skills](librefang-skills.md)\n\nHands are self-contained capability packages defining what an agent can *do*. Skills provide the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer. [Hands tests](librefang-hands-tests.md) validate the full install → activate → deactivate → uninstall lifecycle.\n\n### API — [librefang-api](librefang-api.md)\n\nHTTP and WebSocket server — the primary network entry point for all external clients. Hosts the kernel in-process. The [React dashboard](librefang-api-dashboard.md) provides a real-time management UI. Authentication flows through a [self-contained login page](librefang-api-src.md). Static assets include [i18n locale files](librefang-api-static.md). Verified by [API integration tests](librefang-api-tests.md).\n\n### Client Interfaces\n\n| Crate | Purpose |\n|---|---|\n| [librefang-cli](librefang-cli.md) | Terminal interface; operates in daemon mode or single-shot mode |\n| [librefang-desktop](librefang-desktop.md) | Tauri 2.0 app for desktop and mobile; desktop runs the full stack locally, mobile is a thin client |\n| [librefang-acp](librefang-acp.md) | Agent Client Protocol adapter bridging agents into editor environments (Zed, VS Code, JetBrains) over stdio JSON-RPC |\n\nSupporting resources: [CLI locales](librefang-cli-locales.md), [CLI templates](librefang-cli-templates.md) and [template discovery](librefang-cli-src.md), [desktop capabilities](librefang-desktop-capabilities.md), [desktop generated scaffolding](librefang-desktop-gen.md), [desktop entry point](librefang-desktop-src.md), [ACP tests](librefang-acp-tests.md), [CLI tests](librefang-cli-tests.md).\n\n### Infrastructure\n\n| Crate | Purpose |\n|---|---|\n| [librefang-extensions](librefang-extensions.md) | Agent-side infrastructure: vault, MCP catalog, OAuth2 PKCE, health probes, plugin installer |\n| [librefang-http](librefang-http.md) | Shared HTTP client builder with consistent TLS and proxy configuration |\n| [librefang-telemetry](librefang-telemetry.md) | OpenTelemetry and Prometheus metrics facade |\n| [librefang-wire](librefang-wire.md) | Authenticated, encrypted agent-to-agent networking (X25519 + Ed25519 + HKDF) |\n| [librefang-testing](librefang-testing.md) | Mock kernel, mock LLM drivers, and API test harness utilities |\n| [librefang-migrate](librefang-migrate.md) | Imports agent configs from other frameworks into LibreFang format |\n| [librefang-rl-export](librefang-rl-export.md) | RL rollout trajectory exporter for W&B, Tinker, and Atropos |\n\nSupporting test modules: [extensions tests](librefang-extensions-tests.md), [testing examples](librefang-testing-src.md), [migrate tests](librefang-migrate-tests.md), [audit-src tests](librefang-runtime-audit-src.md), [MCP tests](librefang-runtime-mcp-tests.md), [kernel-handle tests](librefang-kernel-handle-tests.md).\n\n## Key Cross-Module Workflows\n\n**Inbound message**: A platform message arrives via [channels](librefang-channels.md) → is normalized to a `ChannelMessage` → kernel [router](librefang-kernel-router.md) dispatches it to the correct agent → [runtime](librefang-runtime.md) executes the agent loop → calls [LLM drivers](librefang-llm-drivers.md) for inference → persists context to [memory](librefang-memory.md) → reply routes back through channels.\n\n**Metered LLM call**: Runtime prepares an inference request → [kernel-metering](librefang-kernel-metering.md) checks quota → driver executes → metering records actual token cost → [audit log](librefang-runtime-audit.md) appends a tamper-evident entry.\n\n**Editor integration**: An editor extension launches a LibreFang process → [ACP adapter](librefang-acp.md) translates JSON-RPC over stdio into kernel API calls → kernel routes to runtime → streaming responses flow back as ACP notifications.\n\n**Dashboard management**: User authenticates via the [login page](librefang-api-src.md) → [React dashboard](librefang-api-dashboard.md) issues REST calls to [librefang-api](librefang-api.md) → API delegates to kernel for agent CRUD, skill management, analytics → real-time updates pushed over WebSocket.","overview":"# crates — Wiki\n\n# LibreFang Agent OS — `crates`\n\nWelcome to the **LibreFang Agent OS** monorepo. LibreFang is a self-hosted platform for running, managing, and evolving autonomous AI agents. It provides a complete operating system for agents — from LLM completion and tool execution to durable memory, multi-channel messaging, skills marketplace integration, and a polished operator dashboard.\n\nThis workspace contains every Rust crate, backend service, and frontend application that makes up the platform.\n\n---\n\n## Architecture at a Glance\n\n```mermaid\ngraph TD\n    CLI[\"CLI & Terminal UI\"]\n    DESK[\"Desktop App\"]\n    DASH[\"Dashboard Frontend\"]\n\n    API[\"API Server\"]\n\n    KERN[\"Kernel Core\"]\n    RT[\"Agent Runtime\"]\n\n    LLM[\"LLM Drivers\"]\n    MEM[\"Memory System\"]\n    CH[\"Channel Integrations\"]\n\n    CLI --> API\n    DESK --> API\n    DASH --> API\n    API --> KERN\n    API --> RT\n    API --> CH\n    KERN --> RT\n    RT --> LLM\n    RT --> MEM\n    CH --> RT\n```\n\n---\n\n## How the System Fits Together\n\nUsers interact with LibreFang through one of three entry points:\n\n- **[CLI & Terminal UI](cli-terminal-ui.md)** — the `librefang` command-line binary, which also hosts an interactive TUI dashboard and launcher menu.\n- **[Desktop Application](desktop-application.md)** — a native Tauri 2.0 shell that boots an embedded kernel or connects to a remote instance.\n- **[Dashboard Frontend](dashboard-frontend.md)** — a React SPA served by the API, providing the full operator control plane for agent management, chat, workflows, and diagnostics.\n\nAll three talk to the **[API Server](api-server.md)**, the central HTTP/WebSocket/ACP gateway. The API routes requests into the engine room:\n\n- **[Kernel Core](kernel-core.md)** is the authority on agent identity, lifecycle, and approval gating. It ensures that respawned agents keep their IDs, that sessions and memories aren't orphaned, and that dangerous operations require explicit approval.\n- **[Agent Runtime](agent-runtime.md)** is the execution engine — the agent loop, tool runner, and orchestration layer that drives each conversation turn from prompt through LLM completion to tool invocation and response.\n- **[LLM Drivers](llm-drivers.md)** provide a vendor-neutral trait abstraction over LLM providers, with concrete implementations, retry/backoff logic, and rate limiting.\n- **[Memory System](memory-system.md)** gives agents durable, queryable state through SQLite-backed key/value and vector storage, plus a human-editable Markdown knowledge wiki with auditable provenance.\n- **[Channel Integrations](channel-integrations.md)** normalize messages from Telegram, Discord, Slack, WhatsApp, and other platforms into a unified `ChannelMessage` type, route them through the agent runtime, and deliver responses back.\n\nSurrounding these core modules are several specialized layers:\n\n- **[Shared Types & Configuration](shared-types-configuration.md)** — the canonical type definitions (`AgentId`, `AgentManifest`, `SessionId`, resource quotas, etc.) used across every crate in the workspace.\n- **[Runtime Subsystems](runtime-subsystems.md)** — MCP client for external tool connectivity, media engine for generation, Docker sandbox for secure code execution, and tamper-evident audit trail.\n- **[Skills System](skills-system.md)** — marketplace discovery, installation, and agent-driven self-evolution (create, patch, rollback) of capabilities through a multi-layer security pipeline.\n- **[Hands Framework](hands-framework.md)** — curated, domain-complete autonomous agent packages that run in the background; users discover and activate them from a marketplace.\n- **[Extensions & Vault](extensions-vault.md)** — MCP server templates, credential resolution from multiple secure sources, OAuth2 flows, and secrets management.\n- **[Agent Control Protocol (ACP)](agent-control-protocol-acp.md)** — JSON-RPC 2.0 adapter over duplex byte streams, letting editors like Zed, VS Code, and JetBrains embed a LibreFang agent natively.\n- **[Wire Protocol & Networking](wire-protocol-networking.md)** — OFP, the TCP-based protocol for cross-kernel agent discovery, authentication, and communication.\n- **[Infrastructure Libraries](infrastructure-libraries.md)** — cross-cutting foundations including HTTP transport, kernel trait boundaries, cost tracking, routing, telemetry, testing utilities, RL data export, and migration tooling.\n\n---\n\n## Key End-to-End Flows\n\n### Streaming Agent Loop\n\nA chat request enters through the API, hits the agent runtime's streaming loop, applies gateway compression (context window management via token estimation), calls out to an LLM driver for completion, writes to memory, and streams tokens back to the client.\n\n`[API Server](api-server.md)` → `[Agent Runtime](agent-runtime.md)` → `[LLM Drivers](llm-drivers.md)` → `[Memory System](memory-system.md)`\n\n### Channel Message Round-Trip\n\nAn inbound message from Telegram or Discord is normalized by the channel integrations layer, routed to the correct agent through the kernel, processed by the runtime, and the response is delivered back through the originating channel adapter.\n\n`[Channel Integrations](channel-integrations.md)` → `[Kernel Core](kernel-core.md)` → `[Agent Runtime](agent-runtime.md)` → `[Channel Integrations](channel-integrations.md)`\n\n### Provider Health Check → TLS Handshake\n\nWhen listing LLM providers, the API calls through the runtime's provider health probe, which builds an HTTP client via the infrastructure HTTP library, ultimately configuring TLS for the connection.\n\n`[API Server](api-server.md)` → `[Agent Runtime](agent-runtime.md)` → `[Infrastructure Libraries](infrastructure-libraries.md)`\n\n### Skill Evolution\n\nAgents can create, patch, or remove their own skills at runtime. The request flows from the runtime through the skills system's evolution module and security pipeline, with validation and rollback support.\n\n`[Agent Runtime](agent-runtime.md)` → `[Skills System](skills-system.md)`\n\n---\n\n## Getting Started\n\n1. **Build the workspace:**\n   ```bash\n   cargo build --workspace\n   ```\n\n2. **Run the CLI:**\n   ```bash\n   cargo run -p librefang-cli\n   ```\n   This opens the interactive launcher where you can start a local kernel, open the TUI dashboard, or connect to a remote instance.\n\n3. **Initial configuration:** LibreFang uses `.env` files and a secrets vault. The CLI's init wizard (`librefang init`) walks you through setting up provider API keys, channel bot tokens, and sandbox configuration.\n\n---\n\n## Where to Go Next\n\nIf you want to understand the internals, start with **[Kernel Core](kernel-core.md)** and **[Agent Runtime](agent-runtime.md)** — they're the heart of the system. If you're working on the client side, **[API Server](api-server.md)** covers everything exposed externally. For extending agent capabilities, see **[Skills System](skills-system.md)** and **[Runtime Subsystems](runtime-subsystems.md)**.","runtime-subsystems-librefang-runtime-audit-src":"# Runtime Subsystems — librefang-runtime-audit-src\n\n# Runtime Audit Trail — `librefang-runtime-audit`\n\n## Overview\n\nThis module provides an append-only, tamper-evident audit log for security-critical actions in the LibreFang agent runtime. Every auditable event is appended to a Merkle hash chain where each entry contains a SHA-256 hash of its own contents concatenated with the hash of the previous entry. Any modification or deletion of a historical entry breaks the chain and is detected by `verify_integrity`.\n\nWhen a SQLite connection pool is provided, entries are persisted to the `audit_entries` table (schema V8+) so the trail survives daemon restarts. An optional **anchor file** stores the chain tip outside the database, closing the gap where an attacker with write access to SQLite could rewrite the entire table.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[AuditLog] --> B[In-Memory Vec<br/>Mutex&lt;Vec&lt;AuditEntry&gt;&gt;]\n    A --> C[Tip Hash<br/>Mutex&lt;String&gt;]\n    A --> D[Chain Anchor<br/>Mutex&lt;Option&lt;String&gt;&gt;]\n    A --> E[SQLite Pool<br/>Optional]\n    A --> F[Anchor File<br/>Optional]\n\n    subgraph \"Per Entry\"\n        G[record_with_context] --> H[compute_entry_hash]\n        H --> I[SHA-256 of fields + prev_hash]\n        G --> J[Persist to SQLite<br/>BEGIN IMMEDIATE]\n        J -->|success| K[Push to in-memory vec]\n        J -->|failure| L[Drop entry, do NOT advance tip]\n        K --> M[Write anchor file]\n    end\n```\n\n## Core Types\n\n### `AuditAction`\n\nAn enum of all auditable action categories. Each variant is folded into the per-entry SHA-256 hash via its `Debug` representation (e.g. `\"ToolInvoke\"`, `\"UserLogin\"`).\n\n**Stability contract — treat this enum as append-only.** Adding new variants is safe because old entries keep their original action string. Renaming or removing a variant is a breaking change that invalidates every persisted hash from that point forward.\n\nNotable variants:\n\n| Variant | Purpose |\n|---|---|\n| `ToolInvoke`, `ShellExec`, `FileAccess`, `NetworkAccess` | Agent capability usage |\n| `AgentSpawn`, `AgentKill`, `AgentMessage` | Agent lifecycle |\n| `UserLogin`, `RoleChange`, `PermissionDenied`, `BudgetExceeded` | RBAC events (M5) |\n| `DreamConsolidation` | Auto-dream memory consolidation lifecycle |\n| `RetentionTrim` | Self-auditing trim job execution |\n| `A2aDiscovered`, `A2aTrusted` | A2A agent onboarding (Bug #3786) |\n\n### `AuditEntry`\n\nA single entry in the chain. Key fields:\n\n- **`seq`** — Monotonically increasing 0-indexed sequence number. Derived from the last entry's seq + 1, **not** from `Vec::len()` (because retention trims may have dropped a prefix).\n- **`timestamp`** — ISO-8601 (RFC 3339) timestamp from `Utc::now()`.\n- **`prev_hash`** — SHA-256 of the previous entry (64 zeros for genesis or chain anchor after a trim).\n- **`hash`** — SHA-256 of this entry's content concatenated with `prev_hash`.\n- **`user_id`** — Optional `UserId` for the user that triggered the action. `None` for kernel-internal events and pre-migration entries.\n- **`channel`** — Optional origin channel (e.g. `\"telegram\"`, `\"dashboard\"`). `None` for kernel-internal events.\n\n### `TrimReport`\n\nReturned by `trim()`. Contains per-action drop counts (`dropped_by_action`), total dropped (`total_dropped`), and the hash of the last dropped entry (`new_chain_anchor`).\n\n## Construction\n\n### `AuditLog::new()`\n\nCreates a pure in-memory log with no persistence. The initial tip is 64 zero characters (the genesis sentinel). Suitable for tests and short-lived processes.\n\n### `AuditLog::with_db(pool)`\n\nCreates a log backed by a SQLite connection pool. On construction:\n\n1. Loads all rows from `audit_entries` ordered by `seq ASC`.\n2. Recovers the chain anchor if the first surviving entry's `prev_hash` is non-genesis (meaning a predecessor was previously trimmed).\n3. Runs `verify_integrity()` and logs the result.\n\n### `AuditLog::with_db_anchored(pool, anchor_path)`\n\nSame as `with_db`, plus an external tip-anchor file. On construction:\n\n1. Loads and verifies the chain as above.\n2. Compares the anchor file against the in-DB tip:\n   - **Agree** → normal startup.\n   - **Disagree** → logs a loud error. The daemon still starts, but `verify_integrity()` will return `Err` until resolved.\n   - **Anchor missing** → seeds the anchor from the current tip (first-run upgrade path).\n   - **Anchor corrupt** → logs an error and refuses to overwrite; verification fails until an operator inspects.\n\nThe anchor file format is a single line: `<seq> <hex-hash>\\n`. It is written atomically via a `.tmp` file + `rename`.\n\n## Recording Events\n\n### `record(agent_id, action, detail, outcome) -> String`\n\nConvenience wrapper that omits user/channel attribution. Used by pre-M1 call sites. Returns the SHA-256 hash of the new entry.\n\n### `record_with_context(agent_id, action, detail, outcome, user_id, channel) -> String`\n\nFull recording path. The flow:\n\n1. Acquires locks on `entries` and `tip`.\n2. Derives `seq` from `entries.last().seq + 1` (or 0 if empty).\n3. Computes the entry hash via `compute_entry_hash`.\n4. **If DB is present**: opens a `BEGIN IMMEDIATE` transaction, inserts the row, commits. If the insert fails, the entry is **dropped** — the in-memory chain is NOT advanced. This prevents chain corruption where a later restart would find an entry whose `prev_hash` points at a never-persisted predecessor.\n5. Pushes the entry to the in-memory buffer and advances the tip.\n6. If the buffer exceeds `MAX_AUDIT_ENTRIES` (10,000), drains the oldest prefix and updates `chain_anchor` to the hash of the last dropped entry.\n7. Rewrites the external anchor file if configured.\n\n### `compute_entry_hash` — Hash Inputs\n\nThe SHA-256 hash is computed over these fields concatenated in order:\n\n```\nseq | timestamp | agent_id | action | detail | outcome | [user_id] | [channel] | prev_hash\n```\n\n`user_id` and `channel` are conditionally included (`\\x1fuser_id=<uid>` and `\\x1fchannel=<ch>`) only when present. This means pre-M1 entries (recorded before user attribution existed) verify with their original hashes. Once a field is present, it is committed to the chain — stripping it later breaks the Merkle link.\n\n## Integrity Verification\n\n### `verify_integrity() -> Result<(), String>`\n\nWalks the entire chain and recomputes every hash:\n\n1. Seeds `expected_prev` from `chain_anchor` (or genesis if no anchor).\n2. For each entry, checks that `prev_hash` matches `expected_prev`.\n3. Recomputes the hash from the entry's fields and compares against the stored `hash`.\n4. If an external anchor is configured, reads the anchor file and confirms both `seq` and `hash` agree with the in-memory tip.\n\nReturns `Err` on the first inconsistency found, describing the seq number and expected vs. found values.\n\n**Anchor disagreement** is the key detection mechanism for a full table rewrite. Without it, an attacker could delete all rows, fabricate a new history, and recompute every hash from genesis — `verify_integrity` would return `Ok` because the linked list is internally consistent. The anchor file forces agreement with an external witness.\n\n## Retention & Pruning\n\nBoth `trim` and `prune` remove a **contiguous prefix** from the front of the chain. This is a structural requirement: you cannot punch holes in a Merkle list because each entry's hash depends on its predecessor.\n\n### `trim(policy, now) -> TrimReport`\n\nApplies a `AuditRetentionConfig` with two passes:\n\n1. **Hard cap** (`max_in_memory_entries`): if set and non-zero, drops oldest entries until the survivor count is within the cap.\n2. **Per-action retention** (`retention_days_by_action`): extends the prefix as long as each next entry's action has a configured retention window AND the entry is older than that window. Stops at the first entry that should be kept.\n\nThe per-action map uses `AuditAction`'s `Display` string as keys. Actions without a configured entry are kept indefinitely (default = preserve).\n\nAfter computing the drop prefix:\n- Deletes the same rows from SQLite (`DELETE FROM audit_entries WHERE seq < ?`).\n- Updates `chain_anchor` to the hash of the last dropped entry.\n- Refreshes the external anchor file's `seq` column (the tip hash itself does not change — only the prefix is removed).\n\n### `prune(retention_days) -> usize`\n\nSimpler age-based pruning. Walks forward from the oldest entry and drops a contiguous prefix of entries whose timestamps fall before `now - retention_days`. Stops at the first entry inside the window. Same persistence and anchor logic as `trim`.\n\nBoth methods update `chain_anchor` **before** draining from the in-memory buffer so that a concurrent `verify_integrity` blocked on the entries lock will see a consistent (anchor, first-survivor) pair when it acquires.\n\n## Cursor-Based Streaming\n\n### `recent(n) -> Vec<AuditEntry>`\n\nReturns the last `n` entries (cloned). O(1) slice.\n\n### `since_seq(cursor) -> Vec<AuditEntry>`\n\nReturns all entries with `seq > cursor`. Uses `partition_point` for O(log n) seek followed by O(k) clone where `k` is the result count.\n\nThe **strictly-greater-than** semantics mean `since_seq(0)` skips an entry with `seq=0`. The SSE handler at `/api/logs/stream` handles this by calling `recent()` for the initial backfill before entering the cursor loop.\n\n## Thread Safety\n\nAll shared state is protected by `Mutex`:\n\n- `entries: Mutex<Vec<AuditEntry>>`\n- `tip: Mutex<String>`\n- `chain_anchor: Mutex<Option<String>>`\n\nLock poisoning is handled with `unwrap_or_else(|e| e.into_inner())` — a panic in one thread does not deadlock the rest. The `record_with_context` path acquires `entries` and `tip` locks in a consistent order to prevent deadlocks.\n\nSQLite writes use `BEGIN IMMEDIATE` transactions, which acquire a RESERVED lock at the SQLite level. This prevents concurrent processes (or background jobs with their own pooled connections) from interleaving appends against the same `prev_hash`.\n\n## Failure Modes\n\n| Scenario | Behavior |\n|---|---|\n| SQLite INSERT fails | Entry is dropped. In-memory chain is NOT advanced. Next `record()` reuses the same `seq` with a fresh timestamp. |\n| Anchor file write fails | Logged as a warning. Entry is already persisted to SQLite; the anchor simply trails by one tick. |\n| Anchor file missing on verify | Returns `Err` — fail closed. A silent disappearance is indistinguishable from tampering. |\n| Anchor file corrupt on boot | Logs error, refuses to overwrite. `verify_integrity()` will fail until an operator inspects. |\n| Chain break detected on boot | Logs error. Daemon still starts so `/api/audit/verify` can surface the failure. Operator can run `librefang security audit-reset` in dev (DO NOT use in production). |\n\n## Migration Notes\n\nSchema V22 added `user_id` and `channel` columns. Rows persisted before that migration return `NULL` for both, which deserializes to `None`. Because `compute_entry_hash` omits absent fields, old entries verify with their original hashes without any migration step.","runtime-subsystems-librefang-runtime-mcp-src":"# Runtime Subsystems — librefang-runtime-mcp-src\n\n# librefang-runtime-mcp — MCP Client Runtime\n\n## Overview\n\nThis module implements the Model Context Protocol (MCP) client that connects the daemon to external MCP servers and exposes their tools to the agent runtime. It handles the full lifecycle: transport negotiation, tool discovery, argument taint scanning, tool invocation, and connection teardown.\n\nAll MCP tools are namespaced as `mcp_{server}_{tool}` to prevent naming collisions between servers.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Kernel[\"Kernel / Tool Runner\"] -->|\"connect(config)\"| Conn[\"McpConnection\"]\n    Conn --> Inner[\"McpInner\"]\n    Inner -->|Stdio| Rmcp[\"rmcp SDK (subprocess)\"]\n    Inner -->|SSE| Sse[\"HTTP POST (JSON-RPC)\"]\n    Inner -->|HTTP| StreamHTTP[\"Streamable HTTP (rmcp)\"]\n    Inner -->|HttpCompat| Compat[\"Plain HTTP/JSON\"]\n\n    Kernel -->|\"call_tool(name, args)\"| Conn\n    Conn --> Taint[\"Taint Scanner\"]\n    Taint -->|\"clean\"| Inner\n    Taint -->|\"blocked\"| Err[\"Error (redacted)\"]\n\n    subgraph \"Taint Policy\"\n        Policy[\"McpTaintPolicy\"] --> SkipRules[\"per-path skip_rules\"]\n        Policy --> RuleSets[\"named rule_sets (warn/log/block)\"]\n        Policy --> ToolDefault[\"per-tool default=skip\"]\n    end\n```\n\n## Transport Types\n\nThe module supports four transports, selected via the `McpTransport` enum in `McpServerConfig`:\n\n### Stdio (`McpTransport::Stdio`)\n\nSpawns a subprocess and communicates over stdin/stdout using the `rmcp` SDK for full MCP protocol handling. This is the primary transport for local MCP servers (npx, python, uvx).\n\nKey behaviors:\n- **Shell blocking**: `bash`, `sh`, `powershell`, and similar interpreters are rejected. The command must point to a specific runtime.\n- **Environment sandboxing**: The subprocess does NOT inherit the parent environment. Only variables in `SAFE_ENV_VARS` (PATH, HOME, NODE_PATH, etc.) plus operator-declared `env` entries are passed through.\n- **Env expansion**: `$VAR` / `${VAR}` in args are expanded only for allowlisted variable names (safe system vars + declared env), preventing accidental reads of daemon secrets like `ANTHROPIC_API_KEY`.\n- **Tilde expansion**: Leading `~` in args is expanded to `$HOME` / `$USERPROFILE`.\n- **Windows adaptation**: Automatically appends `.cmd` when the bare command resolves to a batch wrapper.\n- **Stderr draining**: Child stderr is read line-by-line in a background task, logged at DEBUG, capped at 100 lines (draining continues past the cap to prevent pipe stalls).\n- **Roots capability**: When `roots` are configured, a `RootsClientHandler` is used that responds to `roots/list` requests from the server.\n- **Process lifecycle**: `kill_on_drop(true)` ensures the subprocess is terminated. Explicit `close()` awaits cleanup with a 10s timeout; the `Drop` impl fires a best-effort async cancel.\n\n### SSE (`McpTransport::Sse`)\n\nLegacy HTTP Server-Sent Events transport using JSON-RPC over HTTP POST. Performs its own `initialize` handshake and `tools/list` discovery. Does **not** declare the `roots` capability (SSE is unidirectional — the server cannot send requests back).\n\n### HTTP (`McpTransport::Http`)\n\nStreamable HTTP transport (MCP spec 2025-03-26+). Uses the `rmcp` SDK's `StreamableHttpClientTransport`. Supports `Mcp-Session-Id` tracking and content-type negotiation. Local filesystem roots are advertised only when the URL resolves to `localhost` / `127.0.0.1` / `[::1]`.\n\nWhen the server returns a 401, the module attempts OAuth metadata discovery (see below). If auth is required, it returns the sentinel error `\"OAUTH_NEEDS_AUTH\"` so the API layer can drive the PKCE flow.\n\n### HttpCompat (`McpTransport::HttpCompat`)\n\nA built-in adapter for plain HTTP/JSON backends that don't implement MCP. Tools are statically declared in config rather than discovered at runtime. Supports path templates (`{param}`), multiple HTTP methods, JSON body or query string request modes, and configurable headers (static values or environment variable lookups).\n\n## Connection Lifecycle\n\n### `McpConnection::connect(config)`\n\n1. Dispatches to the transport-specific connect method.\n2. Performs the MCP handshake (`initialize` + `notifications/initialized` for SSE; automatic for rmcp transports).\n3. Discovers tools via `tools/list`.\n4. Translates MCP `annotations` (readOnlyHint, destructiveHint) into `metadata.tool_class` entries on each tool's JSON Schema.\n5. Registers namespaced tools (`mcp_{server}_{tool}`) into the internal tool list.\n\n### `McpConnection::call_tool(name, arguments)`\n\n1. **Resolve raw name**: Strips the `mcp_{server}_` prefix to recover the tool name the server expects.\n2. **Taint scan**: Walks every string leaf in `arguments` (see Taint Scanning below). Rejects the call if any violation is found.\n3. **Dispatch**: Routes to the appropriate transport handler.\n4. **Return**: Extracts text content from the MCP response. If `is_error` is true, returns `Err`.\n\n### `McpConnection::close()`\n\nExplicit teardown that cancels the rmcp service, awaits subprocess cleanup (10s timeout), and relies on `kill_on_drop` as a fallback. The `Drop` impl provides a best-effort async cancel for cases where `close()` is not called explicitly.\n\n## Tool Namespacing\n\nFunctions in the `format_mcp_tool_name` / `resolve_mcp_server_from_known` family handle the bidirectional mapping:\n\n| Direction | Function | Purpose |\n|-----------|----------|---------|\n| Register | `format_mcp_tool_name(server, tool)` | Produces `mcp_{server}_{tool}` |\n| Detect | `is_mcp_tool(name)` | Checks `mcp_` prefix |\n| Resolve | `resolve_mcp_server_from_known(name, servers)` | Longest-prefix match against known server names |\n| Extract | `extract_mcp_server(name)` | Heuristic first-segment split (use only when server list unavailable) |\n\nServer and tool names are normalized (lowercased, hyphens → underscores) so `\"my-server\"` and `\"My_Server\"` produce the same namespace.\n\n## Taint Scanning\n\nThe taint scanner prevents credential and PII exfiltration through MCP tool-call arguments. It walks every string leaf in the JSON argument tree before it leaves the daemon.\n\n### Scan Entry Point\n\n`scan_mcp_arguments_for_taint_with_policy(value, taint_policy, rule_set_registry, tool_name)` returns `Some(redacted_description)` on violation, `None` if clean.\n\n### How It Works\n\n1. **Tool-level bypass**: If the tool's policy has `default = Skip`, scanning is skipped entirely.\n2. **Tree walk** (`walk_taint`): Recursively traverses objects, arrays, and string leaves. Depth is capped at `MCP_TAINT_SCAN_MAX_DEPTH` (64).\n3. **Sensitive key detection**: Object keys matching entries in `MCP_SENSITIVE_KEY_NAMES` (e.g. `authorization`, `api_key`, `password`) with non-empty string values are blocked regardless of the value's content — this catches patterns like `{\"Authorization\": \"Bearer sk-...\"}` that the text heuristic misses.\n4. **Content scanning**: Each string leaf is checked against `TaintSink::mcp_tool_call()` via `detect_outbound_text_violation_rules_with_skip`.\n5. **Rule set downgrade**: If named rule sets are configured, violations can be downgraded from `Block` to `Warn` (log + allow) or `Log` (audit + allow). Multiple rule sets covering the same rule merge to the most permissive action.\n6. **Redaction**: The returned error string contains only the JSON path and rule name — never the offending payload value — since this error flows back to the LLM and into logs.\n\n### Policy Configuration Layers\n\n| Layer | Field | Effect |\n|-------|-------|--------|\n| Server-wide | `taint_scanning: bool` | Disables content-based scanning (key-name blocking stays active) |\n| Tool default | `McpTaintToolPolicy.default = Skip` | Bypasses all scanning for that tool |\n| Per-path skip | `McpTaintToolPolicy.paths[pattern].skip_rules` | Exempts specific rules at specific JSON paths |\n| Named rule sets | `McpTaintToolPolicy.rule_sets` | Downgrades block → warn/log for rules in referenced sets |\n\n### JSONPath Matching\n\nThe scanner uses a minimal JSONPath matcher (`jsonpath_matches`) supporting:\n\n- `$.a.b` — exact nested property\n- `$.a.*` — any direct child\n- `$.a[*]` — any array element\n- `$.*` — any top-level property\n\n**Limitation**: Keys containing `.` or `[` cannot be addressed precisely. Use broader wildcards as a workaround.\n\n### Hot-Reload Contract\n\n`TaintRuleSetsHandle` is an `Arc<ArcSwap<Vec<NamedTaintRuleSet>>>` — the kernel owns one instance and clones it into every `McpServerConfig`. On config reload, the kernel calls `.store(Arc::new(new_rules))`. Each scan takes a `.load()` snapshot that stays stable for the duration of that argument-tree walk.\n\n## Security Measures\n\n### SSRF Protection\n\n`check_ssrf(url, label)` is called for every HTTP-based transport before connecting. Delegated to `mcp_oauth::is_ssrf_blocked_url_for_connect`, which:\n\n- Parses URLs with the `url` crate (no substring matching)\n- Rejects non-HTTP schemes, userinfo in URLs\n- Blocks cloud-metadata pivots: `0.0.0.0`, `169.254/16`, CGNAT `100.64.0.0/10`, Azure IMDS, Google/AWS metadata hostnames\n- Unwraps IPv4-mapped IPv6 and NAT64 prefixes\n\n`is_local_url(url)` uses proper host parsing to avoid false positives on attacker-controlled domains like `127.0.0.1.evil.com`.\n\n### Response Size Capping\n\n`read_response_bytes_capped` streams HTTP responses with a 16 MiB cap (`MAX_RESPONSE_BYTES`). Rejects oversized `Content-Length` immediately; streams chunk-by-chunk for chunked transfers to avoid buffering unbounded bodies.\n\n### JSON-RPC ID Verification\n\nSSE responses are checked for matching JSON-RPC `id`. Mismatched responses are dropped to prevent cross-request data corruption.\n\n### Content-Type Validation\n\nSSE responses must have `application/json` or `text/event-stream` Content-Type. Anything else is rejected as likely a proxy error page.\n\n## OAuth Integration\n\nThe `mcp_oauth` submodule handles OAuth 2.0 + PKCE for MCP servers requiring authentication:\n\n- `discover_oauth_metadata(url, www_authenticate, oauth_config)` — three-tier resolution: WWW-Authenticate header → `.well-known/oauth-authorization-server` → config fallback\n- `McpOAuthProvider` trait — load/store tokens via platform keychain\n- `McpAuthState` — tracks per-connection auth state (NotRequired, Authorized, etc.)\n\nWhen an HTTP transport gets a 401, the module extracts the `WWW-Authenticate` header via `extract_auth_header_from_error` (downcasting through rmcp's type-erased error chain), discovers OAuth metadata, and returns `\"OAUTH_NEEDS_AUTH\"` to signal the API layer to start the browser-based PKCE flow.\n\n## Spawn Error Diagnostics\n\n`format_spawn_error` converts `io::Error` from subprocess spawning into actionable messages. `NotFound` errors include runtime-specific install hints (Node.js, Python, uv, Deno, Bun, etc.) and a note about systemd/Docker PATH limitations.\n\n## MCP Protocol Versioning\n\n`SUPPORTED_MCP_VERSIONS` lists `[\"2024-11-05\", \"2025-03-26\"]`. The first entry is advertised in `initialize`; unknown versions from the server trigger a warning but don't abort the connection.\n\n## Integration Points\n\n| Consumer | Usage |\n|----------|-------|\n| `tool_runner/dispatch.rs` | `is_mcp_tool()` to detect MCP tools, `resolve_mcp_server_from_known()` for dispatch, `call_tool()` for execution |\n| `routes/agents.rs`, `tui/event.rs` | `resolve_mcp_server_from_known()` to list MCP servers for agents |\n| `routes/mcp_auth.rs` | `discover_oauth_metadata()`, `generate_state()`, `is_ssrf_blocked_url()` for OAuth flows |\n| `kernel/mcp_summary.rs` | `normalize_name()`, `resolve_mcp_server_from_known()` for status rendering |","runtime-subsystems-librefang-runtime-media-src":"# Runtime Subsystems — librefang-runtime-media-src\n\n# librefang-runtime-media\n\nProvider-agnostic media generation and understanding subsystem. Exposes a uniform `MediaDriver` trait across five backends (OpenAI, Gemini, ElevenLabs, MiniMax, Google Cloud TTS) and a `MediaEngine` for consuming media (image description, audio transcription, video analysis).\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \" callers \"\n        TR[tool_runner/media.rs]\n        RT[routes/media.rs]\n    end\n\n    subgraph \" librefang-runtime-media \"\n        DC[MediaDriverCache]\n        MD[MediaDriver trait]\n        ME[MediaEngine]\n        MU[media_understanding]\n    end\n\n    subgraph \" driver implementations \"\n        OA[openai]\n        GM[gemini]\n        EL[elevenlabs]\n        MM[minimax]\n        GT[google_tts]\n    end\n\n    TR -->|get_or_create / detect_for_capability| DC\n    RT -->|get_or_create / detect_for_capability| DC\n    DC --> MD\n    MD -.-> OA\n    MD -.-> GM\n    MD -.-> EL\n    MD -.-> MM\n    MD -.-> GT\n    TR --> ME\n    ME --> MU\n```\n\nCallers in `tool_runner` and the HTTP API layer never touch driver internals directly — they go through `MediaDriverCache` for generation and `MediaEngine` for understanding.\n\n---\n\n## Core Trait — `MediaDriver`\n\nDefined in `lib.rs`. Every provider implements `MediaDriver` with default stubs that return `MediaError::NotSupported`. Drivers only override the methods for modalities they actually support.\n\n| Method | Modality | Returns |\n|---|---|---|\n| `generate_image` | Image (synchronous) | `MediaImageResult` |\n| `synthesize_speech` | TTS (synchronous) | `MediaTtsResult` |\n| `submit_video` / `poll_video` / `get_video_result` | Video (async submit → poll) | `MediaVideoSubmitResult`, `MediaTaskStatus`, `MediaVideoResult` |\n| `generate_music` | Music (synchronous, slow) | `MediaMusicResult` |\n\nRequired trait methods:\n\n- **`capabilities()`** — returns a `Vec<MediaCapability>` advertising which modalities the driver handles.\n- **`is_configured()`** — returns `true` when the relevant API key env var is present. Used by `detect_for_capability` to skip unconfigured providers.\n- **`provider_name()`** — stable string identifier (e.g. `\"openai\"`, `\"minimax\"`).\n\n---\n\n## `MediaDriverCache`\n\nThread-safe, lazy-initializing cache backed by `DashMap`. Key responsibilities:\n\n### Driver instantiation\n\n`get_or_create(provider, base_url)` returns an `Arc<dyn MediaDriver>`. The cache key is `\"{provider}|{url}\"`, so the same provider with different base URLs produces separate driver instances.\n\n**Base URL resolution order** (first wins):\n1. Explicit `base_url` argument\n2. `provider_urls` map entry for the provider (from `[provider_urls]` in config)\n3. Alias lookup (`\"google\"` → `\"gemini\"`)\n4. Driver's hardcoded default\n\n### Auto-detection\n\n`detect_for_capability(capability)` walks the `media_providers` preference list and returns the first driver that is both configured (API key present) and declares the requested capability. Used by tool runners when the caller doesn't specify a provider.\n\n### Hot-reload\n\n- `update_provider_urls(urls)` — replaces the URL map and clears cached drivers so the next access creates fresh instances.\n- `clear()` — drops all cached drivers.\n- `load_providers_from_registry(providers)` — rebuilds the provider preference list from `ProviderInfo` structs that declare `media_capabilities`. Built-in providers are always appended as fallback.\n\n### Provider registry — `create_media_driver`\n\nMaps provider name strings to concrete driver constructors:\n\n| Name | Implementation |\n|---|---|\n| `\"elevenlabs\"` | `ElevenLabsMediaDriver` |\n| `\"gemini\"` / `\"google\"` | `GeminiMediaDriver` |\n| `\"minimax\"` | `MiniMaxMediaDriver` |\n| `\"openai\"` | `OpenAIMediaDriver` |\n| `\"google_tts\"` | `GoogleTtsMediaDriver` |\n| Any other name with a `base_url` | `GenericOpenAICompatMediaDriver` (OpenAI-compatible driver) |\n| Unknown, no base URL | `MediaError::InvalidRequest` |\n\n---\n\n## Error Handling — `MediaError`\n\n```rust\npub enum MediaError {\n    NotSupported(String),\n    MissingKey(String),\n    Http(String),\n    Api { status: u16, message: String },\n    RateLimit(String),\n    ContentFiltered(String),\n    InvalidRequest(String),\n    TaskNotFound(String),\n    Other(String),\n}\n```\n\nAll error variants carry human-readable strings. `Api` captures HTTP status codes for upstream failures. `ContentFiltered` distinguishes safety-filter rejections (important for MiniMax codes 1026/1027). Error responses from providers are truncated to 500 bytes via `safe_truncate_str` before being embedded in error variants.\n\n---\n\n## Provider Implementations\n\n### OpenAI (`openai.rs`)\n\n**Capabilities:** Image generation, Text-to-Speech\n\n- **Image:** `POST {base_url}/images/generations` — DALL-E 3, DALL-E 2, gpt-image-1. Returns base64-encoded images. Capped at 10 MB per image.\n- **TTS:** `POST {base_url}/audio/speech` — tts-1, tts-1-hd. Streams audio bytes. Capped at 10 MB response.\n- **Auth:** `OPENAI_API_KEY` env var, bearer token.\n- **Also provides** `GenericOpenAICompatMediaDriver` for user-defined providers with a configured `base_url`. Reads `{PROVIDER_UPPER}_API_KEY`.\n\n### Gemini (`gemini.rs`)\n\n**Capabilities:** Image generation\n\n- **Image:** `POST {base_url}/v1beta/models/{model}:predict?key={api_key}` — Imagen 3 (`imagen-3.0-generate-002`). Returns base64 in `predictions[].bytesBase64Encoded`. Capped at 10 MB per image.\n- Detects content filtering via `raiFilteredReason` and returns `MediaError::ContentFiltered`.\n- **Auth:** `GEMINI_API_KEY` or `GOOGLE_API_KEY`, passed as query parameter.\n\n### ElevenLabs (`elevenlabs.rs`)\n\n**Capabilities:** Text-to-Speech\n\n- **TTS:** `POST {base_url}/text-to-speech/{voice_id}?output_format={format}` — multilingual_v2, turbo_v2_5. Audio response capped at 25 MB.\n- **Voice ID validation:** Enforces exactly 20 ASCII-alphanumeric characters (matching the ElevenLabs OpenAPI spec shape). This closes URL-path-injection vectors. The `VOICE_ID_ERROR_ECHO_MAX_BYTES` constant (64) caps how much of a malformed voice ID is echoed in error messages, preventing a multi-kilobyte malicious input from bloating the error chain.\n- **Auth:** `ELEVENLABS_API_KEY`, passed as `xi-api-key` header.\n\n### Google Cloud TTS (`google_tts.rs`)\n\n**Capabilities:** Text-to-Speech\n\n- **TTS:** `POST {base_url}/text:synthesize?key={api_key}` — Standard, WaveNet, Neural2, Studio voices. Audio returned as base64 in `audioContent`. Capped at 25 MB decoded.\n- **SSML auto-detection:** `build_input` detects SSML markup and wraps fragments in `<speak>...<\/speak>` automatically. Uses `is_ssml` to check for unambiguous SSML-only tags (`<prosody>`, `<emphasis>`, `<say-as>`, etc.) while avoiding false positives on HTML tags like `<mark>` or `<sub>`.\n- **Audio encoding:** `map_audio_encoding` maps format strings (`\"mp3\"`, `\"opus\"`, `\"wav\"`) to Google Cloud TTS `audioEncoding` values.\n- **Auth:** `GOOGLE_API_KEY` or `GOOGLE_CLOUD_API_KEY`.\n\n### MiniMax (`minimax.rs`)\n\n**Capabilities:** All four — Image, TTS, Video, Music\n\n- **Image:** `POST {base_url}/image_generation` — model `image-01`. Supports URL and base64 response formats.\n- **TTS:** `POST {base_url}/t2a_v2` — speech-2.8-hd, speech-2.8-turbo. Audio returned as hex-encoded bytes.\n- **Video (async):** `POST {base_url}/video_generation` → poll via `GET {base_url}/query/video_generation?task_id=...` → retrieve via `GET {base_url}/files/retrieve?file_id=...`. Hailuo models.\n- **Music:** `POST {base_url}/music_generation` — music-2.5, music-2.5+. Audio returned as hex.\n- **Error mapping:** `check_base_resp` translates MiniMax status codes to typed errors (1002 → `RateLimit`, 1026/1027 → `ContentFiltered`, 2013 → `InvalidRequest`).\n- **Region awareness:** Detects China endpoint (`api.minimaxi.com` with extra \"i\") and prefers `MINIMAX_CN_API_KEY` accordingly.\n- **Auth:** `MINIMAX_API_KEY` or `MINIMAX_CN_API_KEY`, bearer token.\n\n---\n\n## Media Understanding — `media_understanding.rs`\n\n`MediaEngine` handles media *consumption* (as opposed to generation). It is separate from the driver system and dispatches to LLM / STT providers.\n\n### Concurrency\n\nBounded by `max_concurrency` (clamped 1–8) via a tokio `Semaphore`. `process_attachments` spawns one task per attachment and collects results.\n\n### Image description — `describe_image`\n\nPicks a single vision provider: explicit `image_provider` config → first detected from env vars (Anthropic > OpenAI > Gemini). Returns a placeholder `MediaUnderstanding` — the actual API call integration is stubbed.\n\n### Audio transcription — `transcribe_audio`\n\nThis is the most complete path. Flow:\n\n1. **Source reading** — `FilePath` (tokio::fs::read) or `Base64` (decode). URL sources are rejected.\n2. **Format detection** — `mime_to_ext` maps MIME types to file extensions. Falls back to the source file extension.\n3. **`.oga` transcoding** — Telegram voice notes arrive as `.oga`/`audio/oga` which Whisper rejects. `transcode_oga_to_ogg_opus` pipes through ffmpeg (`-c:a copy`, stdin→stdout, no scratch files). 30-second timeout with explicit child kill and reap. Requires `ffmpeg` on `PATH`.\n4. **Provider dispatch** — based on config or auto-detection from env vars:\n\n| Provider | Protocol | Default Model |\n|---|---|---|\n| `groq` | Whisper multipart | `whisper-large-v3-turbo` |\n| `openai` | Whisper multipart | `whisper-1` |\n| `minimax` | Whisper multipart | `speech-01-turbo` |\n| `fireworks` | Whisper multipart | `whisper-v3-turbo` |\n| `together` | Whisper multipart | `whisper-large-v3-turbo` |\n| `siliconflow` | Whisper multipart | `FunAudioLLM/SenseVoiceSmall` |\n| `gemini` | Multimodal `generateContent` with inline audio | `gemini-2.0-flash` |\n| `elevenlabs` | `/v1/speech-to-text` with `xi-api-key` header | `scribe_v1` |\n\n5. **Security** — error messages returned to the agent are sanitized to avoid leaking API keys embedded in URLs (especially Gemini's `?key=` parameter). Full errors go to `tracing::warn` for operator diagnosis only.\n\n### Video description — `describe_video`\n\nRequires `GEMINI_API_KEY` or `GOOGLE_API_KEY`. Currently stubbed — returns a placeholder. Gated by `video_description` config flag.\n\n---\n\n## Utility — `safe_truncate_str`\n\n```rust\npub(crate) fn safe_truncate_str(s: &str, max_bytes: usize) -> &str\n```\n\nUTF-8-safe byte truncation. Walks back from `max_bytes` to the nearest char boundary. Used throughout the module to cap error message sizes from upstream API responses (typically 500 bytes) and malicious input echo (64 bytes for voice IDs).\n\n---\n\n## Environment Variables Summary\n\n| Variable | Used By |\n|---|---|\n| `OPENAI_API_KEY` | OpenAI image + TTS; also vision and audio transcription provider |\n| `GEMINI_API_KEY` / `GOOGLE_API_KEY` | Gemini image generation; also vision, audio transcription, video description |\n| `ELEVENLABS_API_KEY` | ElevenLabs TTS; also audio transcription provider |\n| `GOOGLE_CLOUD_API_KEY` | Google Cloud TTS (fallback for `GOOGLE_API_KEY`) |\n| `MINIMAX_API_KEY` | MiniMax (international endpoint) |\n| `MINIMAX_CN_API_KEY` | MiniMax (China endpoint, `api.minimaxi.com`) |\n| `GROQ_API_KEY` | Audio transcription provider |\n| `FIREWORKS_API_KEY` | Audio transcription provider |\n| `TOGETHER_API_KEY` | Audio transcription provider |\n| `SILICONFLOW_API_KEY` | Audio transcription provider |\n| `{PROVIDER_UPPER}_API_KEY` | Generic OpenAI-compatible drivers for user-defined providers |\n\n---\n\n## Capability Matrix\n\n| Provider | Image | TTS | Video | Music |\n|---|---|---|---|---|\n| OpenAI | ✅ DALL-E | ✅ tts-1/tts-1-hd | — | — |\n| Gemini | ✅ Imagen 3 | — | — | — |\n| ElevenLabs | — | ✅ multilingual_v2 | — | — |\n| Google Cloud TTS | — | ✅ WaveNet/Neural2 | — | — |\n| MiniMax | ✅ image-01 | ✅ speech-2.8 | ✅ Hailuo | ✅ music-2.5 |\n\n---\n\n## Adding a New Provider\n\n1. Create a new submodule (e.g. `src/newprovider.rs`) with a struct implementing `MediaDriver`.\n2. Override only the modality methods the provider supports; the trait's default impls return `NotSupported`.\n3. Register the provider in `create_media_driver` (`lib.rs`) with its name string.\n4. Add the name to the `media_providers` default list in `MediaDriverCache::new` and `new_with_urls`.\n5. Ensure `is_configured()` checks for the relevant API key env var — this is what `detect_for_capability` uses to decide whether the provider is eligible.","runtime-subsystems-librefang-runtime-sandbox-docker-src":"# Runtime Subsystems — librefang-runtime-sandbox-docker-src\n\n# librefang-runtime-sandbox-docker\n\nOS-level isolation for agent code execution via Docker containers. This crate provides secure sandbox creation, command execution, container pooling, and path validation — all built around defense-in-depth against container escape and command injection.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[create_sandbox] --> B[validate_image_name]\n    A --> C[sanitize_container_name]\n    A --> D[\"docker run -d ...\"]\n    E[exec_in_sandbox] --> F[validate_command]\n    F --> G[contains_shell_metacharacters]\n    E --> H[\"docker exec ...\"]\n    E --> I[safe_truncate_str]\n    J[ContainerPool] --> A\n    J --> K[destroy_sandbox]\n    L[validate_bind_mount] --> M[symlink canonicalize]\n```\n\n## Core Types\n\n### `SandboxContainer`\n\nRepresents a running Docker container tied to an agent. Fields:\n\n- `container_id` — full Docker container ID (from `docker run` stdout)\n- `agent_id` — the agent this sandbox belongs to\n- `created_at` — UTC timestamp of creation\n\n### `ExecResult`\n\nReturned from every `exec_in_sandbox` call:\n\n- `stdout` / `stderr` — captured output, truncated at 50,000 characters if exceeded\n- `exit_code` — process exit code, or `-1` if unavailable\n\n## Sandbox Lifecycle\n\n### `create_sandbox(config, agent_id, workspace) -> Result<SandboxContainer, String>`\n\nCreates and starts a detached container with hardening applied:\n\n1. Validates the image name against a safe-character allowlist\n2. Sanitizes the container name to `{prefix}-{truncated_agent_id}` (alphanumeric + dash, max 63 chars)\n3. Invokes `docker run` with the fo
