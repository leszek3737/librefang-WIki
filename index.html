s is deliberately a \"medium-complexity\" message ŌĆö not minimal, but not worst-case either. If you add new optional fields to `ChannelMessage` that are commonly populated, update this fixture to reflect realistic payloads.\n\n## Benchmark Details\n\n### Serialization Group\n\n| Benchmark | Operation | Notes |\n|---|---|---|\n| `message_serialize` | `serde_json::to_string(&msg)` | Isolates struct ŌåÆ JSON conversion |\n| `message_deserialize` | `serde_json::from_str::<ChannelMessage>(&json)` | Pre-serialized JSON; isolates parsing |\n| `message_roundtrip` | serialize then deserialize | End-to-end cost; dominated by the slower half |\n\n**What to watch for:** Any regression here directly impacts message throughput. New fields on `ChannelMessage` (especially nested structs or large `HashMap`s) will shift these numbers.\n\n### Routing Group\n\nFour scenarios cover the routing hierarchy from fastest to most complex:\n\n| Benchmark | Routing path | Setup |\n|---|---|---|\n| `router_resolve_direct` | Direct channel+peer ŌåÆ agent | `set_direct_route(\"Telegram\", \"user-42\", agent)` |\n| `router_resolve_default_fallback` | No match ŌåÆ default agent | Only `set_default(agent)`; queries Discord |\n| `router_resolve_binding_match` | Binding rule match | `load_bindings` with channel + peer_id rule |\n| `router_resolve_with_context` | Context-aware binding (roles, guild) | `resolve_with_context` with `BindingContext` carrying roles and guild_id |\n\n**Router setup cost** (registration, binding loading) happens once *outside* the benchmark closure and is not measured. Only the `resolve` / `resolve_with_context` call is timed.\n\nKey routing APIs exercised:\n\n- `AgentRouter::new()`\n- `set_default`, `set_direct_route`, `register_agent`, `load_bindings`\n- `resolve(&ChannelType, &str peer_id, Option<...>)`\n- `resolve_with_context(..., &BindingContext)`\n\nThe `BindingContext` in `router_resolve_with_context` uses `Cow::Borrowed` strings and a `smallvec` for roles, matching production usage patterns.\n\n### Formatting Group\n\nThe `SAMPLE_MARKDOWN` constant provides a multi-paragraph markdown string with bold, italic, inline code, and links ŌĆö representative of agent output that needs platform-specific rendering.\n\n| Benchmark | Input | Output format | Underlying function |\n|---|---|---|---|\n| `format_markdown_passthrough` | Full markdown | `OutputFormat::Markdown` | `format_for_channel` |\n| `format_telegram_html` | Full markdown | `OutputFormat::TelegramHtml` | `format_for_channel` |\n| `format_slack_mrkdwn` | Full markdown | `OutputFormat::SlackMrkdwn` | `format_for_channel` |\n| `format_plain_text` | Full markdown | `OutputFormat::PlainText` | `format_for_channel` |\n| `format_telegram_html_short` | `\"Hello world!\"` | `OutputFormat::TelegramHtml` | `format_for_channel` |\n| `split_message_short` | `\"Hello!\"` | N/A (chunk limit 4096) | `split_message` |\n| `split_message_long` | 500 lines (~10KB) | N/A (chunk limit 4096) | `split_message` |\n| `default_phase_emoji_all` | All 6 `AgentPhase` variants | N/A | `default_phase_emoji` |\n\nThe `default_phase_emoji_all` benchmark iterates over all `AgentPhase` variants ŌĆö `Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, `Error` ŌĆö in a single batch to amortize Criterion overhead and measure the total lookup cost.\n\n`split_message_long` generates a 500-line string at bench initialization time (outside the timed loop), then splits it against the 4096-character Telegram limit inside the closure.\n\n## Adding New Benchmarks\n\n1. **Identify the group.** Serialization, routing, and formatting are the current categories. Add a new `criterion_group!` if the concern is orthogonal.\n\n2. **Use `black_box` on inputs and outputs.** This prevents the compiler from optimizing away the code under test. Wrap all function arguments with `black_box(...)` and consume the return value the same way.\n\n3. **Keep setup outside the closure.** Anything that happens once (construction, serialization, data generation) goes *before* `b.iter(|| ...)`. Only the operation you want to measure goes inside.\n\n4. **Register in the group macro.** Add the function name to the appropriate `criterion_group!` list and ensure it's included in `criterion_main!`.\n\n5. **Match production patterns.** Use realistic message sizes, binding counts, and `Cow`/`smallvec` patterns that mirror how the library is actually called.\n\n## Dependencies on Library Crates\n\n```\nlibrefang-channels (bench target)\nŌö£ŌöĆŌöĆ librefang_channels::formatter    ŌåÆ format_for_channel\nŌö£ŌöĆŌöĆ librefang_channels::router       ŌåÆ AgentRouter, BindingContext\nŌö£ŌöĆŌöĆ librefang_channels::types        ŌåÆ ChannelMessage, ChannelType, ChannelContent,\nŌöé                                      ChannelUser, AgentPhase, split_message,\nŌöé                                      default_phase_emoji\nŌööŌöĆŌöĆ librefang_types::config          ŌåÆ OutputFormat, AgentBinding, BindingMatchRule\n    ŌööŌöĆŌöĆ librefang_types::agent        ŌåÆ AgentId\n```\n\nA regression in these benchmarks signals a performance change in one of the above modules. Use Criterion's HTML reports to pinpoint whether serialization, routing logic, or the markdown parser is responsible.","other-librefang-channels-tests":"# Other ŌĆö librefang-channels-tests\n\n# librefang-channels Tests ŌĆö Bridge Integration Tests\n\nIntegration tests for the `BridgeManager` dispatch pipeline in `librefang-channels`. These tests exercise the full message routing path ŌĆö from adapter ingestion through kernel dispatch back to adapter delivery ŌĆö using in-process mocks instead of external services.\n\n## Architecture\n\nEvery test follows the same wiring pattern: a mock adapter (injectable messages, observable output), a mock kernel handle, and a real `BridgeManager` + `AgentRouter` glued together via tokio channels.\n\n```mermaid\ngraph LR\n    A[Test injects message] --> B[mpsc::Sender]\n    B --> C[MockAdapter::start stream]\n    C --> D[BridgeManager dispatch loop]\n    D --> E[AgentRouter resolve]\n    E --> F[MockHandle::send_message*]\n    F --> D\n    D --> G[MockAdapter::send / send_streaming]\n    G --> H[Test asserts on captured output]\n```\n\n## Mock Infrastructure\n\n### MockAdapter\n\nA non-streaming `ChannelAdapter` implementation used in most basic tests.\n\n- **Message injection**: Constructed with an `mpsc::Sender<ChannelMessage>`. Test code sends messages through this sender; the adapter's `start()` method wraps the corresponding receiver as a `ReceiverStream`.\n- **Response capture**: All calls to `send()` record `(platform_id, text)` pairs in a shared `Arc<Mutex<Vec<...>>>`. Access via `get_sent()`.\n- **Content handling**: `Text` is stored verbatim. `Interactive` content flattens button labels into the text (appended on newlines). Other content variants are silently accepted.\n\nCreated via `MockAdapter::new(name, channel_type)`, which returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`.\n\n### MockHandle\n\nImplements `ChannelBridgeHandle` with minimal behavior:\n\n- **`send_message`**: Records `(agent_id, message)` and returns `Ok(\"Echo: {message}\")`.\n- **`find_agent_by_name`**: Looks up from the `agents` vector passed at construction.\n- **`list_agents`**: Returns the full agent list.\n- **`spawn_agent_by_name`**: Always returns `Err(\"mock: spawn not implemented\")`.\n\n### MockStreamingAdapter\n\nExtends the mock pattern for streaming-capable adapters (`supports_streaming() -> true`).\n\n- Maintains separate capture buffers: `streamed` for `send_streaming` output, `sent` for `send` output.\n- `send_streaming` accumulates all deltas from the `mpsc::Receiver<String>` into a single string, then stores it in `streamed`.\n- Access via `get_streamed()` and `get_sent()`.\n\n### MockStreamingHandle\n\nA `ChannelBridgeHandle` that supports `send_message_streaming`.\n\n- `send_message_streaming` splits the echo response into word-by-word deltas emitted via a spawned tokio task.\n- Also provides the basic `send_message` echo path.\n\n### MockProgressHandle\n\nSimulates the kernel's streaming-with-status path that produces progress markers (e.g., `­¤ö¦ tool_name`).\n\n- `send_message_streaming_with_sender_status` emits a synthetic progress line followed by prose text, then reports `Ok(())` via the status oneshot.\n- Does **not** implement `record_delivery` (not needed for progress-marker tests).\n\n### MockFailingStreamingAdapter\n\nA streaming adapter whose `send_streaming` **always** returns `Err`. Used to exercise the buffered-text fallback branch: it drains the delta receiver (so the bridge's tee task can populate `buffered_text`), then fails.\n\n### MockKernelErrorHandle / MockKernelOkHandle\n\nSpecialized handles for error-path testing via `send_message_streaming_with_sender_status`:\n\n| Handle | Delta stream | Status oneshot | Purpose |\n|--------|-------------|----------------|---------|\n| `MockKernelErrorHandle` | Progress + partial text | `Err(\"rate limit hit\")` | Tests outcome: transport fail + kernel fail |\n| `MockKernelOkHandle` | Clean reply text | `Ok(())` | Tests outcome: transport fail + kernel OK (Bug 1 fix) |\n\n`MockKernelOkHandle` additionally captures `record_delivery` calls in a `DeliveryLog` (`Arc<Mutex<Vec<(bool, Option<String>)>>>`) so tests can assert on the `(success, error)` metric contract.\n\n## Helper Functions\n\n### `make_text_msg(channel, user_id, text) -> ChannelMessage`\n\nConstructs a `ChannelMessage` with `ChannelContent::Text`. Sets fixed values for `platform_message_id`, `display_name`, `timestamp`, and `metadata`.\n\n### `make_command_msg(channel, user_id, cmd, args) -> ChannelMessage`\n\nConstructs a `ChannelMessage` with `ChannelContent::Command { name, args }`. Same fixed defaults as `make_text_msg`.\n\n## Test Coverage\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_dispatch_text_message` | Text message routes through `AgentRouter` ŌåÆ kernel `send_message` ŌåÆ adapter `send` with echo response |\n| `test_bridge_dispatch_no_agent_assigned` | Unrouted user receives a \"No agents available\" error message |\n| `test_bridge_manager_lifecycle` | Start ŌåÆ send 5 messages ŌåÆ stop completes cleanly; all 5 echo responses delivered in order |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run simultaneously; messages on each adapter route independently |\n\n### Command Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_dispatch_agents_command` | `/agents` command returns a listing of all running agents |\n| `test_bridge_dispatch_help_command` | `/help` returns help text mentioning `/agents` and `/agent` |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` selects an agent and updates the router; subsequent `router.resolve()` returns the correct agent ID |\n| `test_bridge_dispatch_status_command` | `/status` returns uptime info including agent count |\n| `test_bridge_dispatch_slash_command_in_text` | `/agents` sent as plain text (not `ChannelContent::Command`) is still parsed and handled as a command |\n\n### Streaming Path\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_streaming_adapter_uses_send_streaming` | Streaming-capable adapter + streaming handle ŌåÆ `send_streaming` called, `send` **not** called |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | Non-streaming adapter + streaming handle ŌåÆ falls back to `send()` with the full echo |\n| `test_default_send_streaming_collects_and_sends` | Default `send_streaming` on `ChannelAdapter` collects all deltas and calls `self.send()` with assembled text |\n\n### Error and Progress Paths\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapter receives progress markers (­¤ö¦) in the consolidated response via the V2 streaming-with-status pipeline |\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | Streaming adapter `send_streaming` fails + kernel reports error ŌåÆ fallback `send()` delivers buffered partial text with progress markers preserved |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression test**: streaming adapter fails + kernel succeeds ŌåÆ `record_delivery` records `(success=true, err=None)`, not `(success=true, err=Some(stream_error))` |\n\n### Bug 1 Fix Detail\n\nThe `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` test guards against a metric contradiction that was introduced and fixed during review:\n\n- **Before fix**: When the kernel succeeded but `send_streaming` returned `Err`, the delivery record was `(success=true, err=Some(transport_error))` ŌĆö a nonsensical combination.\n- **After fix**: `err` is `None` whenever `success` is `true`, because the transport-level stream error is irrelevant when the kernel completed successfully and the fallback `send_response` delivered the buffered text.\n\n## Interaction with Production Code\n\nAll tests depend on three production types from `librefang-channels`:\n\n- **`BridgeManager`** ŌĆö created per test, receives the mock handle and router, orchestrates adapter lifecycle and message dispatch.\n- **`AgentRouter`** ŌĆö real router used directly (calls to `set_user_default` / `resolve`).\n- **`ChannelBridgeHandle`** ŌĆö the trait mocked by all handle implementations; the bridge dispatches agent communication through this interface.\n- **`ChannelAdapter`** ŌĆö the trait mocked by all adapter implementations; the bridge consumes message streams from and sends responses through this interface.\n\nNo external services, databases, or network calls are involved. All communication uses tokio channels within a single process. Tests include short `tokio::time::sleep` pauses (100ŌĆō300ms) to allow the async dispatch loop to process messages before asserting.","other-librefang-channels":"# Other ŌĆö librefang-channels\n\n# librefang-channels\n\nChannel Bridge Layer ŌĆö pluggable messaging integrations for LibreFang.\n\n## Purpose\n\n`librefang-channels` is the messaging abstraction layer that connects LibreFang's core bot logic to the outside world. It provides a uniform interface for sending and receiving messages across 40+ messaging platforms, handling the idiosyncrasies of each platform's API, authentication model, payload format, and event streaming mechanism behind a single consistent contract.\n\nRather than scattering platform-specific HTTP calls, webhook handlers, and WebSocket listeners throughout the codebase, this crate isolates every channel integration behind feature-gated modules. Consumers depend only on the channels they need.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-channels\"\n        DM[\"Dispatch / Router\"]\n        R[\"Shared Runtime<br/>reqwest ┬Ę axum ┬Ę tungstenite\"]\n        E[\"Crypto Utilities<br/>hmac ┬Ę aes ┬Ę rsa ┬Ę k256\"]\n        \n        DM --> T[\"telegram\"]\n        DM --> D[\"discord\"]\n        DM --> S[\"slack\"]\n        DM --> M[\"matrix\"]\n        DM --> ML[\"email\"]\n        DM --> WH[\"webhook\"]\n        DM --> O[\"...30+ more channels\"]\n    end\n\n    Core[\"librefang-types\"] --> DM\n    Core --> R\n```\n\nEvery channel module follows the same lifecycle pattern:\n\n1. **Configuration** ŌĆö Channel-specific credentials (API keys, tokens, webhook secrets) are loaded from the shared config, typed through `librefang-types`.\n2. **Inbound** ŌĆö Messages arrive via webhook (handled by the built-in `axum` server), WebSocket stream (`tokio-tungstenite`), long-polling (`reqwest`), or protocol-specific listeners (IMAP for email, MQTT for IoT).\n3. **Dispatch** ŌĆö The router normalizes inbound payloads into a platform-agnostic message representation.\n4. **Outbound** ŌĆö Responses and proactive messages are dispatched back through the appropriate channel client.\n\n## Feature Flags\n\nEach channel is an independent Cargo feature. This allows minimal-compilation builds ŌĆö only compile what you ship.\n\n### Default Features\n\nThe `default` feature activates every channel except `channel-mqtt`:\n\n```\nchannel-telegram      channel-discord       channel-slack\nchannel-matrix        channel-email         channel-webhook\nchannel-whatsapp      channel-signal        channel-teams\nchannel-mattermost    channel-irc           channel-google-chat\nchannel-twitch        channel-rocketchat    channel-zulip\nchannel-xmpp          channel-bluesky       channel-feishu\nchannel-line          channel-mastodon      channel-messenger\nchannel-reddit        channel-revolt        channel-viber\nchannel-voice         channel-flock         channel-guilded\nchannel-keybase       channel-nextcloud     channel-nostr\nchannel-pumble        channel-threema       channel-twist\nchannel-webex         channel-dingtalk      channel-discourse\nchannel-gitter        channel-gotify        channel-linkedin\nchannel-mumble        channel-ntfy          channel-qq\nchannel-wechat        channel-wecom\n```\n\n### Opt-in Channels\n\n| Feature | Extra Dependencies | Notes |\n|---|---|---|\n| `channel-mqtt` | `rumqttc` | IoT/MQTT broker connectivity ŌĆö not in `default`, included in `all-channels` |\n\n### Channels Requiring Additional Crates\n\nSeveral channels pull in cryptography or protocol-specific dependencies only when enabled:\n\n| Feature | Dependencies | Reason |\n|---|---|---|\n| `channel-email` | `lettre`, `imap`, `rustls-connector`, `mailparse` | SMTP sending, IMAP receiving, TLS, MIME parsing |\n| `channel-google-chat` | `rsa` | Service account JWT signing |\n| `channel-feishu` | `aes`, `cbc` | AES-CBC encryption for event payload verification |\n| `channel-wecom` | `aes`, `cbc` | AES-CBC decryption for WeCom callback data |\n| `channel-nostr` | `k256` | Secp256k1 key pairs for Nostr identity |\n| `channel-mqtt` | `rumqttc` | MQTT v5 client |\n\n### Selecting a Subset\n\nTo build with only the channels you deploy, disable default features and list what you need:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n    \"channel-webhook\",\n] }\n```\n\n## Core Dependencies\n\nThe crate reuses workspace-level dependencies to stay consistent with the rest of LibreFang:\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared domain types ŌĆö message structs, channel config, error enums |\n| `tokio` | Async runtime for all I/O |\n| `reqwest` | HTTP client for REST-based channel APIs |\n| `axum` | HTTP server for inbound webhook endpoints |\n| `tokio-tungstenite` | WebSocket client for real-time streaming channels (Discord, Slack, Twitch, etc.) |\n| `serde` / `serde_json` | Serialization of API payloads and config |\n| `dashmap` | Concurrent map for tracking active connections/sessions |\n| `hmac` / `sha2` / `sha1` | Webhook signature verification |\n| `base64` / `hex` | Encoding for cryptographic operations |\n| `image` | Image thumbnailing and format conversion (JPEG, PNG, WebP only ŌĆö no default features to keep compile times down) |\n| `tracing` | Structured logging across all channel operations |\n\n## Relationship to `librefang-types`\n\nThis crate is a pure consumer of `librefang-types`. It does **not** define its own public message or error types. All structs for channel configuration, normalized messages, and error variants live in the types crate. This ensures the rest of the codebase can reason about messages without depending on the channel implementations.\n\n## Benchmarks\n\nThe `dispatch` benchmark (`benches/dispatch/`) measures message routing throughput ŌĆö how quickly the dispatch layer can accept an inbound payload, match it to the correct channel handler, and produce an outbound response. Run with:\n\n```bash\ncargo bench -p librefang-channels\n```\n\n## Adding a New Channel\n\n1. Add a new feature flag in `[features]` with an empty `[]` or list its extra dependencies using `dep:` syntax.\n2. If the channel needs crypto or protocol crates not already present, add them as optional dependencies under `[dependencies]`.\n3. Create the channel module following the same interface pattern used by existing channels (configuration struct, inbound handler, outbound client).\n4. Add the feature to both the `default` list and the `all-channels` list.\n5. Add a benchmark variant if the channel has non-trivial dispatch overhead.","other-librefang-cli-locales":"# Other ŌĆö librefang-cli-locales\n\n# librefang-cli-locales\n\n## Purpose\n\nThis module provides the internationalization (i18n) layer for the LibreFang CLI. It contains all user-facing strings ŌĆö status messages, error reports, hints, labels, and section headers ŌĆö as [Project Fluent](https://projectfluent.org/) (`.ftl`) translation files. Every piece of text the CLI prints is defined here, decoupled from application logic, so the CLI can be localized into any language without touching Rust code.\n\n## Locale Structure\n\n```\nlocales/\nŌö£ŌöĆŌöĆ en/           # English (primary/default)\nŌöé   ŌööŌöĆŌöĆ main.ftl\nŌööŌöĆŌöĆ zh-CN/        # Simplified Chinese\n    ŌööŌöĆŌöĆ main.ftl\n```\n\n`en/main.ftl` is the canonical source of truth. All other locales must define the same set of message IDs. Missing IDs in a non-English locale fall back to English at runtime.\n\n## Fluent Format Conventions\n\nEach message follows the Fluent syntax:\n\n```fluent\n# Simple message\ndaemon-starting = Starting daemon...\n\n# Message with a variable\ndaemon-error = Daemon error: { $error }\n\n# Message with multiple variables\nkernel-booted = Kernel booted ({ $provider }/{ $model })\n```\n\n- **Message IDs** use `kebab-case` and are grouped under comment headers (e.g., `# --- Daemon lifecycle ---`).\n- **Variables** are interpolated with `{ $name }` syntax. The calling Rust code passes these as key-value pairs to the Fluent bundle.\n- Many messages come in pairs: the error/status message itself, and a companion `-fix` message suggesting remediation (e.g., `daemon-start-fail` + `daemon-start-fail-fix`).\n\n## Message Categories\n\nThe locale files are organized into these topical sections:\n\n| Section | Prefixes | Content |\n|---|---|---|\n| **Daemon lifecycle** | `daemon-*`, `kernel-*` | Startup, shutdown, background launch, health checks |\n| **Labels** | `label-*` | Table/field headers for status output |\n| **Hints** | `hint-*`, `guide-*` | Contextual guidance, setup wizard prompts |\n| **Init** | `init-*` | First-run setup messages |\n| **Error messages** | `error-*` | General errors, daemon communication errors, boot errors |\n| **Provider detection** | `detected-*` | Auto-detected LLM provider announcements |\n| **Desktop app** | `desktop-*` | Desktop application launch messages |\n| **Dashboard** | `dashboard-*` | Web dashboard open messages |\n| **Agent commands** | `agent-*`, `section-agent-*` | Agent spawn, kill, template listing |\n| **Manifest errors** | `manifest-*`, `error-reading-manifest`, `error-parsing-manifest` | Template manifest issues |\n| **Status** | `section-*`, `warn-*`, `auth-*`, `value-*` | Status display sections, security status values |\n| **Doctor** | `doctor-*` | Diagnostic command output |\n| **Channel setup** | `channel-*`, `section-setup-*` | Telegram, Discord, Slack, WhatsApp, Email, Signal, Matrix |\n| **Vault** | `vault-*` | Credential vault operations |\n| **Cron** | `cron-*` | Scheduled job management |\n| **Approvals** | `approval-*` | Approval workflow messages |\n| **Memory** | `memory-*` | Agent memory key-value operations |\n| **Devices** | `device-*` | Mobile device pairing |\n| **Webhooks** | `webhook-*` | Webhook CRUD and testing |\n| **Models** | `model-*` | Model catalog and selection |\n| **Config** | `config-*` | Configuration file operations |\n| **Hand commands** | `hand-*` | Hand dependency and lifecycle messages |\n| **Uninstall** | `uninstall-*` | Full uninstall flow (daemon stop, autostart removal, PATH cleanup) |\n| **Reset** | `reset-*` | Data directory reset |\n| **Logs** | `log-*` | Log file tailing |\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g., `ja/` for Japanese, `fr/` for French).\n2. Copy `en/main.ftl` into the new directory as `main.ftl`.\n3. Translate every message value to the target language. **Do not modify message IDs or variable names.**\n4. Register the locale in the CLI's Fluent bundle initialization (typically in the Rust localization loader).\n\nExample for French (`fr/main.ftl`):\n\n```fluent\ndaemon-starting = D├®marrage du d├®mon...\ndaemon-stopped = Le d├®mon LibreFang s'est arr├¬t├®.\ndaemon-error = Erreur du d├®mon : { $error }\n```\n\n## Adding New Messages\n\nWhen adding new CLI features that produce user-facing output:\n\n1. Add the message ID and English text to `en/main.ftl` under the appropriate section comment.\n2. Follow the naming convention: `{domain}-{brief-description}` for simple messages, or `{domain}-{brief-description}-{suffix}` for paired messages.\n3. If the message has a suggested fix, add a companion `*-fix` message.\n4. Update all other locale files with the new message ID and a translated value. If a translation isn't ready, the English fallback will be used.\n\n### Naming Conventions\n\n- **Errors:** `error-{context}` (e.g., `error-boot-auth`)\n- **Error fixes:** `error-{context}-fix`\n- **Status labels:** `label-{name}`\n- **Hints:** `hint-{description}`\n- **Section headers:** `section-{name}`\n- **Warnings:** `warn-{description}`\n- **Command success:** `{domain}-{verb}-success` or `{domain}-{verb}ed`\n\n## Variable Reference\n\nThese are the commonly used variables across messages:\n\n| Variable | Type | Used in |\n|---|---|---|\n| `$error` | string | Error messages throughout |\n| `$path` | string | File paths in errors, logs, uninstall |\n| `$url` | string | Dashboard URLs, daemon addresses |\n| `$status` | string/number | HTTP or exit status codes |\n| `$count` | number | Agent counts, model counts, key counts |\n| `$name` | string | Agent names, channel names, template names |\n| `$id` | string | Agent/CRON/webhook/device identifiers |\n| `$provider` | string | LLM provider name |\n| `$model` | string | Model identifier |\n| `$command` | string | CLI subcommand name |\n| `$key` | string | Config key, vault key, env var name |\n| `$value` | string | Config value being set |\n| `$action` | string | Past-tense verb for toggle/respond actions |\n| `$field` | string | Agent field name |\n| `$display` | string | Provider display name |\n| `$env_var` | string | Environment variable name |\n| `$max` | number | Upper bound for selection ranges |\n\n## Design Patterns\n\n### Error + Fix Pairs\n\nMost error messages come with a companion fix suggestion. The CLI displays both, giving users an actionable next step:\n\n```fluent\nerror-boot-auth = LLM provider authentication failed\nerror-boot-auth-fix = Run `librefang doctor` to check your API key configuration\n```\n\n### Section Headers\n\nMessages prefixed with `section-` are used as display headers in formatted output (e.g., status tables). They are standalone labels, not sentences:\n\n```fluent\nsection-daemon-status = LibreFang Daemon Status\nsection-active-agents = Active Agents\n```\n\n### Detection Messages\n\nProvider detection messages inform users which LLM backend was auto-discovered. They reference specific environment variables so users know what triggered the detection:\n\n```fluent\ndetected-provider = Detected { $display } ({ $env_var })\ndetected-ollama = Detected Ollama running locally (no API key needed)\n```","other-librefang-cli-templates":"# Other ŌĆö librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration templates used by the `librefang-cli init` command to bootstrap a new LibreFang Agent OS installation.\n\n## Overview\n\nThis module contains two TOML template files that serve as the source for generated configuration files. They are static resources ŌĆö no executable code, no imports, no runtime logic. The CLI reads these templates during `librefang init` and substitutes Mustache-style placeholders with user-provided or auto-detected values before writing the final `config.toml` to disk.\n\n## Files\n\n| File | Purpose |\n|---|---|\n| `init_default_config.toml` | Full reference config with every section and inline documentation |\n| `init_wizard_config.toml` | Minimal config produced by the interactive setup wizard |\n\n## Template Variables\n\nBoth files use `{{variable}}` syntax that the CLI replaces at generation time:\n\n| Placeholder | Used In | Description |\n|---|---|---|\n| `{{provider}}` | Both | LLM provider name (e.g. `openai`, `anthropic`, `ollama`) |\n| `{{model}}` | Both | Default model identifier (e.g. `gpt-4o`, `claude-sonnet-4-20250514`) |\n| `{{api_key_env}}` | `init_default_config.toml` | Environment variable name holding the API key |\n| `{{api_key_line}}` | `init_wizard_config.toml` | Pre-formatted `api_key_env = \"...\"` line (may be empty for providers like Ollama) |\n| `{{routing_section}}` | `init_wizard_config.toml` | Optional agent routing block inserted when the wizard configures multiple agents |\n\n## When Each Template Is Used\n\n```mermaid\nflowchart TD\n    A[\"librefang init\"] --> B{Interactive wizard?}\n    B -- Yes --> C[\"init_wizard_config.toml\"]\n    B -- No / --full --> D[\"init_default_config.toml\"]\n    C --> E[\"Replace placeholders\"]\n    D --> E\n    E --> F[\"Write config.toml\"]\n```\n\n- **`init_wizard_config.toml`** ŌĆö Selected when the user runs through the interactive setup wizard. Produces a lean config with only the sections the user explicitly configured (server, default model, memory, optional routing).\n- **`init_default_config.toml`** ŌĆö Selected with `librefang init --full` or equivalent non-interactive flag. Produces the complete reference config with every available section present and commented out, serving as both a working config and on-device documentation.\n\n## Configuration Sections\n\nThe full template covers these top-level sections. Sections marked with `*` are active by default; all others are commented out and must be manually enabled.\n\n### Core Server\n\n| Key | Default | Notes |\n|---|---|---|\n| `api_listen` | `127.0.0.1:4545` | Local-only. Use `0.0.0.0:4545` for LAN/remote access |\n| `log_level` | `info` | trace, debug, info, warn, error |\n| `mode` | `default` | stable, default, dev |\n| `update_channel` | `stable` | stable, beta, rc |\n\n### Authentication\n\n`dashboard_user` / `dashboard_pass` ŌĆö Default credentials for the web dashboard. The template includes inline guidance for upgrading to Vault-backed or environment variable storage:\n\n```toml\n# Vault:   dashboard_pass = \"vault:dashboard_password\"\n# Env var: LIBREFANG_DASHBOARD_PASS=your-secret\n```\n\n### Terminal Access Control (commented out)\n\nThree keys controlling remote shell access: `allow_remote`, `allow_unauthenticated_remote`, and `require_proxy_headers`. All default to safe values (disabled). The `allow_unauthenticated_remote` flag is explicitly called out as a foot-gun guard.\n\n### Performance\n\n`prompt_caching` and `stable_prefix_mode` reduce LLM costs by improving cache hit rates. `usage_footer` controls what token/cost information is displayed.\n\n### Default Model (`[default_model]`*)\n\nThe primary LLM configuration. Template variables fill in `provider`, `model`, and `api_key_env`. An optional `base_url` override is available for local proxies.\n\n### Memory (`[memory]`*)\n\n`decay_rate` controls how quickly memory confidence degrades over cycles. `embedding_model` defaults to `all-MiniLM-L6-v2` when uncommented.\n\n### Proactive Memory (`[proactive_memory]`*)\n\nEnables automatic fact extraction from conversations and context-aware retrieval. Key tuning parameters:\n\n- `max_retrieve` ŌĆö Maximum memories pulled per retrieval cycle (default 10)\n- `extraction_threshold` ŌĆö Minimum confidence to persist a memory (default 0.7)\n- `duplicate_threshold` ŌĆö Similarity cutoff for deduplication (default 0.5)\n\n### Web Tools (`[web]`*)\n\nSearch provider auto-detection cascades through Tavily ŌåÆ Brave ŌåÆ Jina ŌåÆ Perplexity ŌåÆ DuckDuckGo based on available API keys. The `[web.fetch]` subsection controls page extraction limits and SSRF protection. Cloud metadata IPs (169.254.x.x, 100.64.x.x) are always blocked regardless of `ssrf_allowed_hosts`.\n\n### Task Queue (`[queue.concurrency]`*)\n\nFour concurrency lanes with independent limits:\n\n| Lane | Default | Purpose |\n|---|---|---|\n| `main_lane` | 3 | User messages |\n| `cron_lane` | 2 | Scheduled jobs |\n| `subagent_lane` | 3 | Child agents |\n| `trigger_lane` | 8 | In-flight trigger dispatches |\n| `default_per_agent` | 1 | Per-agent fallback (legacy serial) |\n\n### Shell Execution (`[exec_policy]`*)\n\nSecurity-critical section. Default `mode = \"deny\"` blocks all shell commands. Promote to `allowlist` or `full` as needed.\n\n### Hot-Reload (`[reload]`*)\n\n`mode = \"hybrid\"` combines hot-reload for compatible settings with restart for structural changes. `debounce_ms` prevents rapid successive reloads during file saves.\n\n### Optional Sections (all commented out)\n\n| Section | Purpose |\n|---|---|\n| `[provider_regions]` | Multi-region endpoint selection (Qwen intl, MiniMax China) |\n| `[provider_urls]` | Override API endpoints (Ollama, vLLM local servers) |\n| `[[fallback_providers]]` | LLM failover chain |\n| `[rate_limit]` | GCRA-based API rate limiting, WebSocket throttling |\n| `[registry]` | Agent registry cache TTL |\n| `[compaction]` | LLM-based session history summarization |\n| `[triggers]` | Event trigger cooldown, recursion depth, workflow timeout |\n| `[budget]` | Hourly/daily/monthly cost caps with per-provider overrides |\n| `[thinking]` | Extended thinking budget for Claude models |\n| `[channels.*]` | Telegram, Discord, Slack, WeChat bot integrations |\n| `[[mcp_servers]]` | External MCP tool servers (stdio transport) |\n| `[browser]` | Headless browser automation settings |\n| `[docker]` | Docker sandbox for code execution |\n| `[inbox]` | File-based async message ingestion |\n| `[network]` | P2P federation with shared secret auth |\n\n## Relationship to the Rest of the Codebase\n\nThese templates are consumed exclusively by the CLI initialization flow:\n\n1. **`librefang-cli`** reads the appropriate template file at `librefang init` time, performs placeholder substitution, and writes the result to the user's config directory.\n2. The generated `config.toml` is then read by the **LibreFang Agent OS server** at startup. Every section in these templates maps to a corresponding config struct in the server's configuration parser.\n3. The inline comments in `init_default_config.toml` serve as the primary on-disk reference documentation ŌĆö they should be kept in sync with the actual server behavior when config keys change.\n\n## Contributing\n\nWhen adding a new configuration section to the server:\n\n1. Add the section to `init_default_config.toml` as a commented-out block with descriptive comments following the established style (`# ŌöĆŌöĆ Section Name ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ`).\n2. If the section is commonly configured during initial setup, consider adding it to `init_wizard_config.toml` with appropriate template variables.\n3. Keep comments factual and concise ŌĆö they are the first thing users read when editing their config.","other-librefang-cli":"# Other ŌĆö librefang-cli\n\n# librefang-cli\n\nThe command-line interface for LibreFang Agent OS. This crate produces the `librefang` binary ŌĆö the primary way operators interact with the agent system. It acts as the composition root, pulling together the kernel, API, channels, skills, memory, extensions, and runtime into a single executable.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[librefang binary] --> Kernel[librefang-kernel]\n    CLI --> API[librefang-api]\n    CLI --> Channels[librefang-channels]\n    CLI --> Runtime[librefang-runtime]\n    CLI --> Memory[librefang-memory]\n    CLI --> Skills[librefang-skills]\n    CLI --> Extensions[librefang-extensions]\n    CLI --> Migrate[librefang-migrate]\n    CLI --> Types[librefang-types]\n    API --> Types\n    Channels --> Types\n    Kernel --> Types\n```\n\nThe CLI itself contains minimal business logic. Its job is wiring: parsing command-line arguments, loading configuration, initializing subsystems, and delegating to the appropriate library crate.\n\n## Feature Flags\n\nFeatures control which communication channels and optional subsystems are compiled in. They map directly to features in `librefang-api` and `librefang-channels`.\n\n| Flag | Default | Purpose |\n|------|---------|---------|\n| `default` | Ō£ō | Enables all channels plus telemetry |\n| `all-channels` | ŌĆö | All communication channels |\n| `mini` | ŌĆö | Minimal channel subset for constrained environments |\n| `android` | ŌĆö | All channels except email (avoids a rustls-platform-verifier incompatibility on Android) |\n| `telemetry` | via default | OpenTelemetry tracing export via `tracing-opentelemetry` |\n\nThe Android exclusion exists because `rustls-connector` 0.23.0 combined with `rustls-platform-verifier` 0.7.0 does not implement `Verifier::new_with_extra_roots` on Android targets.\n\nTo build a minimal binary:\n\n```bash\ncargo build --package librefang-cli --no-default-features --features mini\n```\n\n## Build Script (`build.rs`)\n\nThe build script runs three tasks at compile time:\n\n1. **Git hooks configuration** ŌĆö Sets `core.hooksPath` to `scripts/hooks` so all developers share the same hooks automatically on first build.\n\n2. **Version metadata** ŌĆö Injects three environment variables available at runtime via `env!()`:\n   - `GIT_SHA` ŌĆö Short commit hash (e.g., `a3f7c21`), or `\"unknown\"` outside a git tree.\n   - `BUILD_DATE` ŌĆö UTC date in `YYYY-MM-DD` format.\n   - `RUSTC_VERSION` ŌĆö Full rustc version string.\n\nThese are typically displayed in `--version` output or diagnostic logs.\n\n## Key Dependencies\n\n### CLI Framework\n- **clap** / **clap_complete** ŌĆö Argument parsing and shell completion generation.\n\n### TUI\n- **ratatui** ŌĆö Terminal user interface rendering. Used for interactive dashboards or real-time agent monitoring.\n\n### Async Runtime\n- **tokio** ŌĆö Async runtime. The binary uses the multi-threaded runtime.\n- **tikv-jemallocator** (non-MSVC only) ŌĆö Replaces the system allocator for improved performance on Linux/macOS. Disabled with `disable_initial_exec_tls` to avoid issues in certain linking contexts.\n\n### Storage & Data\n- **rusqlite** ŌĆö Embedded SQLite for local state persistence.\n- **librefang-memory** ŌĆö Agent memory subsystem.\n- **librefang-migrate** ŌĆö Database migration management.\n\n### Networking\n- **reqwest** (blocking feature) ŌĆö Used for synchronous HTTP calls during setup or bootstrap operations.\n- **rustls** ŌĆö TLS backend for secure channel communication.\n\n### Observability\n- **tracing** / **tracing-subscriber** ŌĆö Structured logging.\n- **opentelemetry** / **tracing-opentelemetry** (optional) ŌĆö Distributed trace export when the `telemetry` feature is enabled.\n\n### Localization\n- **fluent** / **unic-langid** ŌĆö Internationalization framework for user-facing messages.\n\n### Configuration\n- **toml** / **toml_edit** ŌĆö Reading and programmatically modifying TOML config files. `toml_edit` preserves formatting and comments when writing back.\n- **dirs** ŌĆö Standard OS directories for config/cache/data paths.\n\n## Crate Relationships\n\nThe CLI sits at the top of the dependency tree. It depends on every other LibreFang crate but nothing depends on it. This is intentional ŌĆö all reusable logic lives in library crates, keeping the binary thin and testable.\n\n| Crate | Role in CLI |\n|-------|-------------|\n| `librefang-kernel` | Core agent lifecycle and orchestration |\n| `librefang-api` | HTTP/WebSocket API surface |\n| `librefang-channels` | Communication channel implementations |\n| `librefang-runtime` | Process registry and runtime management |\n| `librefang-skills` | Agent capability definitions |\n| `librefang-extensions` | Extension loading and management |\n| `librefang-memory` | Persistent memory and context |\n| `librefang-migrate` | Database schema migrations at startup |\n| `librefang-types` | Shared type definitions |\n\n## Building\n\nStandard Cargo build. The binary name is `librefang`:\n\n```bash\n# Full build with all features\ncargo build --package librefang-cli\n\n# Release build\ncargo build --release --package librefang-cli\n\n# Cross-compile for Android (NDK required)\ncargo build --target aarch64-linux-android --no-default-features --features android\n```\n\nThe resulting binary is at `target/debug/librefang` or `target/release/librefang`.\n\n## Testing\n\nDev-dependencies include `tempfile` for tests that need isolated filesystem operations. Tests run via `cargo test --package librefang-cli`.","other-librefang-desktop-capabilities":"# Other ŌĆö librefang-desktop-capabilities\n\n# LibreFang Desktop ŌĆö Capabilities (`default.json`)\n\n## Purpose\n\nThis module defines the **Tauri capability set** for the LibreFang desktop application. Tauri uses a capability-based security model: every privileged operation (file dialogs, notifications, global shortcuts, etc.) must be explicitly declared before the frontend can invoke it. `default.json` is the single capability manifest applied to the main application window at runtime.\n\n## Location\n\n```\nlibrefang-desktop/capabilities/default.json\n```\n\n## How Tauri Capabilities Work\n\nWhen the app starts, the Tauri runtime reads every JSON file under `capabilities/` and builds an allow-list of IPC commands the webview is permitted to call. Each entry in the `permissions` array maps to one or more plugin commands exposed by the backend (Rust) side. If a permission is missing, any frontend call to that command will be rejected at the IPC boundary.\n\n## Permission Reference\n\n| Permission | Plugin | What It Enables |\n|---|---|---|\n| `core:default` | `tauri` | Core Tauri IPC, window management, event system, and other baseline operations. |\n| `notification:default` | `tauri-plugin-notification` | Sending native desktop notifications. |\n| `shell:default` | `tauri-plugin-shell` | Spawning child processes and executing shell commands from the frontend. |\n| `dialog:default` | `tauri-plugin-dialog` | Native file open/save pickers, message boxes, and input dialogs. |\n| `global-shortcut:allow-register` | `tauri-plugin-global-shortcut` | Registering a system-wide keyboard shortcut. |\n| `global-shortcut:allow-unregister` | `tauri-plugin-global-shortcut` | Removing a previously registered shortcut. |\n| `global-shortcut:allow-is-registered` | `tauri-plugin-global-shortcut` | Querying whether a shortcut is currently registered. |\n| `autostart:default` | `tauri-plugin-autostart` | Launching the app automatically when the user logs in. |\n| `updater:default` | `tauri-plugin-updater` | Checking for, downloading, and applying application updates. |\n\n### Granular vs Default Permissions\n\nMost plugins offer a `default` shorthand that bundles common commands. The `global-shortcut` plugin is the exception here ŌĆö instead of `global-shortcut:default`, the config explicitly lists the three individual commands (`allow-register`, `allow-unregister`, `allow-is-registered`). This follows the **principle of least privilege**: only the specific shortcut operations the app needs are exposed, rather than enabling every command the plugin provides.\n\n## Schema Validation\n\nThe file references the official Tauri JSON schema:\n\n```\n\"$schema\": \"https://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json\"\n```\n\nIDEs that support JSON Schema (VS Code, JetBrains, etc.) will use this for autocomplete and validation while editing.\n\n## Scope\n\n```json\n\"windows\": [\"main\"]\n```\n\nAll permissions are scoped exclusively to the `main` window. If additional windows are created at runtime, they will not inherit these capabilities unless explicitly added to this array or defined in a separate capability file.\n\n## Adding a New Permission\n\nWhen introducing a new Tauri plugin to the project:\n\n1. Add the plugin crate to `Cargo.toml` and register it on the Tauri builder in the Rust entry point.\n2. Add the corresponding permission identifier to the `permissions` array in `default.json`.\n3. If the plugin provides fine-grained commands, prefer listing only the specific `allow-*` entries you need rather than using the `default` blanket.\n\n## Relationship to the Rest of the Codebase\n\nThis file has no import/export graph ŌĆö it is consumed directly by the Tauri runtime during app initialization. It does, however, serve as the **single gatekeeper** that determines which Tauri IPC commands the frontend JavaScript/TypeScript code can successfully invoke. Any feature in the UI layer that calls `invoke(\"plugin:command\")` depends on a matching entry here.","other-librefang-desktop-gen":"# Other ŌĆö librefang-desktop-gen\n\n# librefang-desktop-gen\n\nAuto-generated Tauri v2 build artifacts and security configuration for the LibreFang desktop application. This directory is populated and consumed by the Tauri CLI and build toolchain ŌĆö it is **not** hand-authored application code.\n\n## Directory Layout\n\n```\ngen/\nŌö£ŌöĆŌöĆ android/              # Android project scaffold (populated by `cargo tauri android init`)\nŌöé   ŌööŌöĆŌöĆ README.md\nŌö£ŌöĆŌöĆ apple/                # iOS/macOS project scaffold (populated by `cargo tauri ios init`)\nŌöé   ŌööŌöĆŌöĆ README.md\nŌööŌöĆŌöĆ schemas/\n    Ōö£ŌöĆŌöĆ acl-manifests.json      # All available plugin permissions (full catalogue)\n    Ōö£ŌöĆŌöĆ capabilities.json       # Permissions actually granted to this app\n    ŌööŌöĆŌöĆ desktop-schema.json     # JSON Schema for capability file validation\n```\n\n## Platform Scaffolds\n\nThe `android/` and `apple/` directories are placeholders until the corresponding Tauri mobile init commands are run from `crates/librefang-desktop/`:\n\n| Platform | Command | Requirement |\n|----------|---------|-------------|\n| Android | `cargo tauri android init` | Android SDK/NDK |\n| Apple | `cargo tauri ios init` | macOS with Xcode |\n\nThese directories will be populated with full native project structures (Gradle builds, Xcode projects, etc.) upon initialization. They are excluded from version control by default.\n\n## Security Configuration\n\nThe `schemas/` directory defines the Tauri IPC security model ŌĆö what the frontend webview is allowed to call on the native backend.\n\n### Capabilities (`capabilities.json`)\n\nThe app declares a single capability set named `default`, scoped to the `main` window with local access only:\n\n```json\n{\n  \"identifier\": \"default\",\n  \"local\": true,\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"shell:default\",\n    \"dialog:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ]\n}\n```\n\n### Granted Permission Breakdown\n\n| Permission Set | What It Enables | Scope |\n|---|---|---|\n| `core:default` | Path resolution, events, window management, webview control, app metadata, images, resources, menus, system tray | Read-only queries + standard window/webview manipulation |\n| `notification:default` | Full notification lifecycle: permission checks, sending, channels, listeners, batch, cancel | All notification commands |\n| `shell:default` | `open` for `http(s)://`, `tel:`, `mailto:` URLs | No arbitrary command execution |\n| `dialog:default` | Message, save, and open file dialogs | All dialog types |\n| `global-shortcut:allow-*` | Register, unregister, and query global keyboard shortcuts | Individual allow-listed commands only ŌĆö no `register-all` or `unregister-all` |\n| `autostart:default` | Enable, disable, and query OS login-startup state | All autostart commands |\n| `updater:default` | Check for updates, download, install, and combined download-and-install | Full update workflow |\n\n### Notable Restrictions\n\n- **No `shell:allow-execute` or `shell:allow-spawn`** ŌĆö the frontend cannot run arbitrary processes. Only URL opening via the system handler is permitted.\n- **No filesystem permissions** ŌĆö no `fs:*` entries are present, so the webview cannot directly read or write files through Tauri's FS plugin. File access is mediated through `dialog:default` (user-driven file picker) and any custom Tauri commands exposed by the Rust backend.\n- **Single-window scope** ŌĆö the capability targets only the `\"main\"` window label. Any additional windows created at runtime will have no IPC access unless new capabilities are added.\n- **No remote access** ŌĆö `local: true` with no `remote` block means only locally-served app content can invoke these permissions.\n\n### ACL Manifests (`acl-manifests.json`)\n\nThis file is the exhaustive catalogue of every permission available from every Tauri plugin bundled into the app. It is generated by the Tauri build system and used for:\n\n1. **Build-time validation** ŌĆö ensuring capability files reference valid permission identifiers.\n2. **IDE autocompletion** ŌĆö feeding the schema for developer tooling.\n3. **Security auditing** ŌĆö comparing what is *available* against what is *granted*.\n\nThe manifest covers these plugin domains:\n\n- `autostart` ŌĆö 6 permissions\n- `core` (umbrella) ŌĆö 9 sub-plugin defaults\n- `core:app` ŌĆö 28 permissions\n- `core:event` ŌĆö 8 permissions\n- `core:image` ŌĆö 10 permissions\n- `core:menu` ŌĆö 44 permissions\n- `core:path` ŌĆö 16 permissions\n- `core:resources` ŌĆö 2 permissions\n- `core:tray` ŌĆö 22 permissions\n- `core:webview` ŌĆö 38 permissions\n- `core:window` ŌĆö 106 permissions\n- `dialog` ŌĆö 10 permissions\n- `global-shortcut` ŌĆö 10 permissions\n- `notification` ŌĆö 34 permissions\n- `shell` ŌĆö 10 permissions + global scope schema\n- `updater` ŌĆö 8 permissions\n\nThe `shell` plugin is the only one with a `global_scope_schema`, defining the `ShellScopeEntry` structure that controls which commands and sidecars can be invoked, with argument validation via regex.\n\n### Desktop Schema (`desktop-schema.json`)\n\nA JSON Schema (Draft-07) document describing the valid structure of Tauri capability files. It validates:\n\n- **`Capability`** objects with `identifier`, `permissions`, optional `windows`/`webviews`/`platforms`/`remote` fields\n- **`PermissionEntry`** ŌĆö either a plain identifier string or an object with `identifier` + scoped `allow`/`deny` arrays\n- **`CapabilityRemote`** ŌĆö URL pattern allowlists for remote web content\n\nThe schema embeds conditional logic: when a permission identifier is a `shell:*` permission, the `allow`/`deny` arrays are validated against the `ShellScopeEntry` structure.\n\n## Modifying Capabilities\n\nTo change what the frontend can access:\n\n1. Edit the capability source file in `src-tauri/capabilities/` (the Tauri source, not this generated output).\n2. Run `cargo tauri build` or `cargo tauri dev` ŌĆö the CLI regenerates `gen/schemas/` from the source capabilities and plugin manifests.\n3. Never edit files in `gen/` directly ŌĆö they are overwritten on every build.\n\n## Relationship to the Rest of the Codebase\n\n```mermaid\ngraph LR\n    A[src-tauri/capabilities/] -->|Tauri CLI reads| B[gen/schemas/]\n    C[Plugin manifests<br/>from Cargo deps] -->|merged into| B\n    B -->|validates| D[Frontend IPC calls]\n    E[gen/android/ gen/apple/] -->|native build inputs| F[Mobile builds]\n```\n\n- The Rust backend in `librefang-desktop` defines Tauri commands that are exempt from this ACL system (they use their own command-level permissions or are unrestricted).\n- The frontend (webview) is constrained entirely by the capability set defined here.\n- Platform scaffolds in `android/` and `apple/` feed into CI/CD mobile builds but are irrelevant for desktop (Windows/macOS/Linux) targets.","other-librefang-desktop":"# Other ŌĆö librefang-desktop\n\n# librefang-desktop\n\nNative desktop and mobile application for the LibreFang Agent OS, built on Tauri 2.0. The desktop build runs a full local daemon with a webview UI; the mobile build acts as a thin client connecting to a remote daemon.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph Desktop\n        UI[Webview UI] --> TK[Tauri Runtime]\n        TK --> Kernel[librefang-kernel]\n        TK --> API[librefang-api]\n        TK --> Ext[librefang-extensions]\n        Kernel --> Types[librefang-types]\n        API --> Types\n    end\n    subgraph Mobile\n        MUI[Webview UI] --> MTK[Tauri Runtime]\n        MTK -->|HTTP/WS| Remote[Remote Daemon]\n    end\n```\n\nOn **desktop**, the Tauri runtime hosts the LibreFang kernel and API in-process. On **mobile**, the app is a dashboard that connects over HTTP/WebSocket to a daemon running elsewhere (home server, VPS, NAS, or another desktop). This split is intentional ŌĆö LibreFang needs 24├Ś7 uptime for cron, autodream, channel adapters, and triggers, which iOS and Android cannot guarantee due to background execution limits.\n\n## Platform Targets\n\n| Platform | Identifier | Config | Min Version |\n|----------|-----------|--------|-------------|\n| Windows / macOS / Linux | `ai.librefang.desktop` | `tauri.desktop.conf.json` | macOS 12.0 |\n| Android | `ai.librefang.app` | `tauri.android.conf.json` | API 26 (Android 8.0) |\n| iOS | `ai.librefang.app` | `tauri.ios.conf.json` | iOS 14.0 |\n\nThe base `tauri.conf.json` defines shared settings: product name, CSP policy, bundle metadata, and icon set. Platform-specific files (`tauri.desktop.conf.json`, `tauri.android.conf.json`, `tauri.ios.conf.json`) override or extend these per target.\n\n## Cargo Features\n\n| Feature | Effect |\n|---------|--------|\n| `default` | Enables `librefang-api/default` |\n| `all-channels` | Enables `librefang-api/all-channels` ŌĆö all channel adapters |\n| `mini` | Enables `librefang-api/mini` ŌĆö minimal channel set |\n| `custom-protocol` | Enables `tauri/custom-protocol` ŌĆö required for production builds |\n| `mobile` | No-op flag; documents the mobile build path (mobile targets are cfg-gated) |\n\n## Desktop-Only Features\n\nThe following are compiled out on iOS/Android via `cfg(not(any(target_os = \"ios\", target_os = \"android\")))`:\n\n| Plugin / Feature | Purpose |\n|-----------------|---------|\n| `tauri` features `tray-icon`, `image-png` | System tray icon with PNG support |\n| `tauri-plugin-single-instance` | Prevents multiple app instances |\n| `tauri-plugin-autostart` | Launch at login |\n| `tauri-plugin-global-shortcut` | Global keyboard shortcuts |\n| `tauri-plugin-updater` | Auto-update from GitHub releases |\n| `tauri-plugin-shell` | CLI process spawning |\n\nThe updater is configured in `tauri.desktop.conf.json` with a public key for signature verification and pulls from `https://github.com/librefang/librefang/releases/latest/download/latest.json`. On Windows, the install mode is `passive`.\n\n## Mobile-Only Features\n\nMobile targets (`cfg(any(target_os = \"ios\", target_os = \"android\"))`) include:\n\n| Plugin | Purpose |\n|--------|---------|\n| `tauri-plugin-barcode-scanner` | QR code scanning for connection wizard |\n\nThe barcode scanner is used for the connection wizard (issue #3344) ŌĆö scan a QR code from the desktop app to configure the remote daemon URL.\n\n## Shared Plugins (All Platforms)\n\n| Plugin | Purpose |\n|--------|---------|\n| `tauri-plugin-notification` | OS-level push notifications |\n| `tauri-plugin-dialog` | Native file/message dialogs |\n\n## Dependencies on Internal Crates\n\n| Crate | Relationship |\n|-------|-------------|\n| `librefang-kernel` | Core agent runtime ŌĆö loaded in-process on desktop |\n| `librefang-api` | HTTP/WS API server ŌĆö `default-features = false` at the base level; features are forwarded from this crate's feature flags |\n| `librefang-types` | Shared data types |\n| `librefang-extensions` | Extension system |\n\n## Content Security Policy\n\nThe CSP in `tauri.conf.json` is permissive for local development, allowing:\n\n- `http://127.0.0.1:*` and `ws://127.0.0.1:*` ŌĆö communication with the local API server\n- Google Fonts for styling\n- `unsafe-inline` and `unsafe-eval` in script/style sources (required by some frontend frameworks)\n- `blob:` and `data:` URIs for media\n- `object-src 'none'` ŌĆö blocks Flash/plugins\n\nThe Android config overrides this to `null` (unrestricted), which is typical for mobile thin-client builds connecting to remote endpoints.\n\n## Build\n\n`build.rs` delegates to `tauri_build::build()` which generates the Tauri runtime bindings from the configuration files.\n\n### Desktop Build\n\n```bash\n# Development\ncargo run -p librefang-desktop\n\n# Production (requires custom-protocol)\ncargo build -p librefang-desktop --features custom-protocol --release\n```\n\n### Mobile Build\n\nMobile requires one-time scaffold generation:\n\n```bash\ncd crates/librefang-desktop\n\n# Android (requires Android NDK 26+, SDK API 26+, Java 17)\ncargo tauri android init\ncargo tauri android dev\n\n# iOS (macOS only, requires Xcode 15+)\ncargo tauri ios init\ncargo tauri ios dev\n```\n\nThe generated `gen/android/` and `gen/apple/` directories must be committed after initialization.\n\n## Bundle Configuration\n\n- **Bundle targets**: `all` ŌĆö produces platform-native installers (`.msi`/`.exe` on Windows, `.dmg`/`.app` on macOS, `.deb`/`.AppImage` on Linux)\n- **Category**: `Productivity`\n- **Windows webview**: Download bootstrapper mode ŌĆö downloads WebView2 if not installed\n- **Windows signing**: SHA-256 digest, certificate configured at release time\n- **Linux AppImage**: `bundleMediaFramework` disabled","other-librefang-extensions":"# Other ŌĆö librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang. Provides three major capabilities:\n\n- **One-click MCP server setup** ŌĆö automated configuration and lifecycle management for MCP (Model Context Protocol) servers\n- **Credential vault** ŌĆö encrypted storage with OS keyring integration and a portable AES-256-GCM file-based fallback\n- **OAuth2 PKCE** ŌĆö Authorization Code Flow with PKCE for secure third-party authentication\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-extensions] --> B[MCP Server Setup]\n    A --> C[Credential Vault]\n    A --> D[OAuth2 PKCE]\n    C --> E{OS Keyring Available?}\n    E -->|Yes| F[keyring crate<br>libsecret / Keychain / Credential Manager]\n    E -->|No| G[AES-256-GCM File Store]\n    G --> H[Argon2 KDF]\n    G --> I[Encrypted file on disk]\n    D --> J[Axum callback server]\n    D --> K[reqwest HTTP client]\n```\n\n## Key Components\n\n### Credential Vault\n\nSecure storage for sensitive credentials (API keys, tokens, certificates).\n\n**Backend selection is automatic and transparent:**\n\n| Platform | Primary Backend | Fallback |\n|----------|----------------|----------|\n| Linux (glibc) | OS keyring via `libsecret` | AES-256-GCM file |\n| macOS | macOS Keychain | AES-256-GCM file |\n| Windows | Windows Credential Manager | AES-256-GCM file |\n| Linux (musl) | *not available* | AES-256-GCM file |\n| Android | *not available* | AES-256-GCM file |\n\nThe vault implementation lives in `vault.rs`. The `os_keyring` helper attempts to create a `keyring::Entry` at compile time based on target configuration. When the `keyring` crate is not compiled in (musl-static or Android cross builds), the vault seamlessly falls back to the file-based store ŌĆö no code changes required.\n\n**Encryption details for the file-based store:**\n\n- **KDF:** Argon2 for deriving encryption keys from master passwords\n- **Encryption:** AES-256-GCM with random nonces per operation\n- **Memory safety:** `zeroize` is used to clear sensitive key material from memory after use\n\n### OAuth2 PKCE\n\nImplements the Authorization Code Flow with Proof Key for Code Exchange (PKCE), suitable for public clients that cannot securely store a client secret.\n\nKey implementation details drawn from dependencies:\n\n- **`axum`** ŌĆö spawns a temporary local HTTP server to receive the OAuth2 callback with the authorization code\n- **`reqwest`** ŌĆö makes the token exchange request to the provider's token endpoint\n- **`sha2` + `base64`** ŌĆö generates the `code_verifier` (cryptographic random) and `code_challenge` (SHA-256 hash, base64url-encoded) per RFC 7636\n- **`rand`** ŌĆö cryptographically secure random generation for `code_verifier` and state parameters\n\n### MCP Server Setup\n\nOne-click setup for MCP server instances. Uses `toml` for reading/writing server configuration files and `dashmap` for thread-safe concurrent access to server state during setup and teardown.\n\n## Dependencies\n\n### Core\n\n| Crate | Purpose |\n|-------|---------|\n| `librefang-types` | Shared type definitions across LibreFang crates |\n| `serde` / `serde_json` / `toml` | Serialization of configurations, credentials, and server state |\n| `thiserror` | Ergonomic error types |\n| `tracing` | Structured logging |\n| `chrono` | Timestamp handling for tokens and credentials |\n| `dashmap` | Lock-free concurrent map for runtime server state |\n| `tokio` | Async runtime primitives |\n| `dirs` | Platform-specific config/data directory resolution |\n\n### Networking & TLS\n\n| Crate | Purpose |\n|-------|---------|\n| `reqwest` | HTTP client for OAuth2 token exchange and MCP communication |\n| `rustls` | TLS implementation (no OpenSSL dependency) |\n| `webpki-roots` / `rustls-native-certs` | CA certificate bundles for TLS verification |\n| `axum` | Lightweight HTTP server for OAuth2 redirect callback |\n\n### Cryptography & Security\n\n| Crate | Purpose |\n|-------|---------|\n| `aes-gcm` | AES-256-GCM authenticated encryption for the file-based vault |\n| `argon2` | Key derivation from master passwords |\n| `sha2` | SHA-256 hashing (PKCE code challenge, integrity checks) |\n| `rand` | CSPRNG for nonces, verifiers, and salts |\n| `zeroize` | Secure memory clearing for keys and credentials |\n| `base64` | Base64url encoding for PKCE and storage formats |\n\n### Platform Keyring (target-gated)\n\n```toml\n# Only compiled on: Linux (glibc), macOS, Windows\n# Excluded on: musl targets, Android\nkeyring = { workspace = true }\n```\n\nThis target gating prevents build failures on platforms where `libsecret`'s C FFI (`libdbus-sys`) is unavailable. The vault code handles the absence at runtime without any feature flags or configuration from the consumer.\n\n## Integration with LibreFang\n\n`librefang-extensions` sits alongside the core LibreFang crates:\n\n- Depends on **`librefang-types`** for shared data structures and error types\n- Provides extension/integration capabilities consumed by the application layer\n- In tests, depends on **`librefang-runtime`** (`dev-dependencies`) for integration test scenarios\n\n## Testing\n\nThe crate uses:\n\n- **`tempfile`** ŌĆö isolated temporary directories for vault file storage tests, ensuring no side effects on the developer's system\n- **`serial_test`** ŌĆö serializes tests that may conflict with shared resources (OS keyring, temporary files, callback server ports)\n- **`librefang-runtime`** (dev-only) ŌĆö provides runtime infrastructure for integration tests\n\nRun the test suite:\n\n```bash\ncargo test -p librefang-extensions\n```\n\n## Cross-Compilation Notes\n\nWhen cross-compiling for musl-static targets or Android, the `keyring` dependency is automatically excluded. The vault will always use the file-based AES-256-GCM backend on these targets. No feature flags or environment variables need to be set ŌĆö this is handled entirely by Cargo's target-specific dependency resolution via `cfg(...)` predicates in `Cargo.toml`.","other-librefang-hands":"# Other ŌĆö librefang-hands\n\n# librefang-hands\n\nHands system for LibreFang ŌĆö curated autonomous capability packages.\n\n## Overview\n\nA **hand** in LibreFang is a curated, self-contained capability package that describes an autonomous action or set of actions the system can perform. This module provides the core abstractions for defining, loading, storing, and managing hands throughout their lifecycle.\n\nHands serve as the bridge between high-level task intent and concrete execution. Each hand encapsulates everything needed to carry out a specific capability ŌĆö metadata, configuration, and a reference to the logic that implements it.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[TOML Manifest] -->|deserialize| B[Hand Definition]\n    B -->|register| C[Hand Registry<br/>DashMap]\n    C -->|resolve| D[Runtime Execution]\n    E[librefang-types] -->|shared types| B\n    E -->|shared types| C\n```\n\nHands are defined declaratively (via TOML manifests), loaded into an in-memory registry backed by `DashMap` for concurrent access, and resolved at runtime when the system needs to invoke a capability.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across all LibreFang modules |\n| `serde` / `serde_json` / `toml` | Serialization and deserialization of hand manifests and metadata |\n| `dashmap` | Lock-free concurrent hashmap powering the hand registry |\n| `uuid` | Unique identification of hand instances |\n| `chrono` | Timestamp tracking for hand lifecycle events |\n| `thiserror` | Ergonomic error types for hand loading and validation failures |\n| `tracing` | Structured logging throughout hand operations |\n\n## Hand Lifecycle\n\n1. **Definition** ŌĆö A hand is authored as a TOML manifest describing its identity, capabilities, and configuration schema.\n2. **Loading** ŌĆö The manifest is read and deserialized into a typed hand definition. Validation ensures required fields are present and well-formed.\n3. **Registration** ŌĆö The validated hand is inserted into the registry, making it available for lookup by ID or capability name.\n4. **Resolution** ŌĆö When the runtime needs a capability, it queries the registry to find a matching hand.\n5. **Execution** ŌĆö The resolved hand is handed off to `librefang-runtime` for dispatch and execution.\n\n## Module Boundaries\n\nThis module is intentionally self-contained. It owns the data model and storage layer for hands but does not execute them directly. Execution is delegated to `librefang-runtime`, which is listed as a dev-dependency ŌĆö the runtime depends on this module, not the other way around.\n\nThe separation means:\n- Hand definitions can be loaded and inspected without spinning up the full runtime.\n- The registry can be populated in tests using `tempfile`-backed manifests without side effects.\n- Other modules can query hand metadata without pulling in execution logic.\n\n## Testing\n\nTests use `serial_test` to serialize access to shared state, and `tempfile` to create isolated temporary directories for hand manifests. The `librefang-runtime` dev-dependency enables integration tests that verify hand resolution through the runtime path.","other-librefang-http":"# Other ŌĆö librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing centralized proxy configuration and TLS certificate handling for the LibreFang project.\n\n## Purpose\n\nThis crate encapsulates the construction of `reqwest::Client` instances so that every component in LibreFang performs HTTP requests with consistent TLS behavior and proxy settings. Rather than each crate independently configuring its own HTTP client, they delegate to this library to avoid duplicating certificate-loading logic and proxy environment handling.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Consumer crate] -->|calls builder| B[librefang-http]\n    B -->|constructs| C[reqwest::Client]\n    B -->|loads certs via| D[rustls-native-certs]\n    B -->|falls back to| E[webpki-roots]\n    B -->|uses| F[rustls]\n    B -->|reads types from| G[librefang-types]\n```\n\n## Key Responsibilities\n\n### TLS Certificate Resolution\n\nThe crate uses **rustls** as its TLS backend (not native TLS) and applies a two-tier certificate loading strategy:\n\n1. **System certificate store** ŌĆö via `rustls-native-certs`. Loads the operating system's trusted root certificates (e.g., `/etc/ssl/certs` on Linux, the Windows certificate store, or Keychain on macOS).\n2. **Bundled Mozilla roots** ŌĆö via `webpki-roots`. If system certificate loading fails or produces no valid roots, the crate falls back to Mozilla's curated root certificate bundle compiled into the binary.\n\nThis ensures the application works reliably across environments ŌĆö from standard desktop/server setups where system certs are available, to minimal containers where they may not be present.\n\n### Proxy Support\n\nThe builder configures the `reqwest` client to respect standard proxy environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`, etc.) through reqwest's built-in proxy handling.\n\n### Shared Type Integration\n\nThe crate depends on `librefang-types` to accept any configuration structures or error types that are shared across the project, keeping the builder API consistent with the rest of the codebase.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `reqwest` | HTTP client construction and request execution |\n| `rustls` | Pure-Rust TLS implementation |\n| `rustls-native-certs` | Loads root certificates from the OS trust store |\n| `webpki-roots` | Bundled Mozilla root certificates as a fallback |\n| `tracing` | Structured logging of certificate loading and client build events |\n| `librefang-types` | Shared configuration and error types |\n\n## Usage by Other Crates\n\nConsumer crates depend on `librefang-http` and call into it to obtain a preconfigured `reqwest::Client`. This avoids each consumer needing to independently manage TLS root stores or proxy settings. The `tracing` instrumentation inside this crate means certificate loading issues and build failures are visible in whatever tracing subscriber the application configures.","other-librefang-kernel-handle":"# Other ŌĆö librefang-kernel-handle\n\n# librefang-kernel-handle\n\n## Purpose\n\n`librefang-kernel-handle` defines the `KernelHandle` trait ŌĆö the primary interface that in-process callers use to interact with the LibreFang kernel. It provides a consistent, async-friendly contract for issuing requests and receiving responses without requiring callers to understand the kernel's internal architecture.\n\nThis is a **trait-only crate**. It contains no runtime logic of its own; it exists to decouple \"what the kernel can do\" from \"how the kernel does it,\" enabling dependency injection, testing with mocks, and separation of concerns across the workspace.\n\n## Role in the Architecture\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé                  In-Process Caller                    Ōöé\nŌöé         (holds a dyn KernelHandle)                    Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n               Ōöé async method calls\n               Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé           librefang-kernel-handle                     Ōöé\nŌöé         KernelHandle trait definition                 Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n               Ōöé implemented by\n               Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé         Concrete kernel implementation                Ōöé\nŌöé    (e.g., librefang-kernel or test doubles)           Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\nAny crate that needs to talk to the kernel depends on `librefang-kernel-handle` rather than the kernel implementation directly. This keeps the dependency graph clean and makes unit testing straightforward ŌĆö test suites can provide a lightweight stub or mock implementing the same trait.\n\n## Dependencies\n\n| Crate | Why it's needed |\n|---|---|\n| `librefang-types` | Shared domain types (requests, responses, errors) that flow through the trait methods |\n| `async-trait` | Enables `async` methods in the trait definition via the `#[async_trait]` macro |\n| `serde_json` | JSON serialization for message payloads passed across the handle boundary |\n| `tracing` | Structured logging/spans within trait default implementations or instrumented wrappers |\n| `uuid` | Correlation and request identifiers used in handle operations |\n\n## Usage\n\nAdd the crate as a dependency in `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-kernel-handle = { path = \"../librefang-kernel-handle\" }\n```\n\nThen accept a handle as a trait object where the kernel is needed:\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\n\nasync fn do_work(kernel: &dyn KernelHandle) {\n    // Call trait methods on `kernel`...\n}\n```\n\n## Testing\n\nBecause the crate is a pure trait definition with no execution flows, testing against it means providing your own implementation. A typical pattern:\n\n```rust\nstruct MockKernelHandle { /* fields */ }\n\n#[async_trait]\nimpl KernelHandle for MockKernelHandle {\n    // Return canned responses for unit tests\n}\n```\n\nThis avoids pulling in the real kernel or any I/O layer into test binaries.\n\n## Design Notes\n\n- **No `impl` blocks with real logic.** The crate intentionally avoids concrete implementations. All behavior lives in downstream crates.\n- **Async-first.** Every trait method is async, reflecting the inherently asynchronous nature of kernel communication.\n- **Trait object safe.** The trait is designed to be usable as `dyn KernelHandle`, enabling runtime polymorphism across the workspace.\n- **Minimal dependency surface.** The crate depends only on types and utilities ŌĆö never on other implementation crates ŌĆö to prevent circular dependencies.","other-librefang-kernel-metering":"# Other ŌĆö librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis module is responsible for tracking resource consumption and enforcing usage quotas within the LibreFang kernel. It provides the machinery to measure the cost of operations and ensure that consumers of kernel services stay within their allocated budgets.\n\n## Purpose\n\nMetering is a critical cross-cutting concern in the LibreFang kernel. Every operation that consumes resources ŌĆö memory allocations, compute time, I/O ŌĆö needs to be accounted for. This module provides:\n\n- **Cost tracking**: Recording resource consumption as operations execute.\n- **Quota enforcement**: Rejecting or throttling operations when a consumer exceeds its allocated budget.\n- **Budget lifecycle**: Managing the creation, adjustment, and expiration of resource budgets.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions for metering-related structures, identifiers, and error types. |\n| `librefang-memory` | Memory allocation tracking ŌĆö metering needs to understand memory consumption to cost allocations accurately. |\n| `librefang-runtime` | Execution context and runtime state ŌĆö metering decisions may depend on the current runtime environment. |\n| `serde` | Serialization support for persisting metering state, quotas, and usage reports across restarts or for external reporting. |\n\n## Architecture\n\nThe metering module sits between the runtime and the resource-consuming subsystems. It acts as an intermediary that all billable operations pass through:\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ     operation request     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé   Runtime   Ōöé ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ Ōöé  Kernel Metering  Ōöé\nŌöé   (caller)  Ōöé                            Ōöé                  Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś     allow / deny          Ōöé  ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ  Ōöé\n                     ŌŚäŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ  Ōöé  Ōöé Quota Store Ōöé  Ōöé\n                                          Ōöé  ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś  Ōöé\n                                          Ōöé  ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ  Ōöé\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   resource usage report   Ōöé  Ōöé Cost Ledger Ōöé  Ōöé\nŌöé   Memory /  Ōöé ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌ¢║ Ōöé  ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś  Ōöé\nŌöé   I/O / ... Ōöé                            ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\n## Key Concepts\n\n### Cost Units\n\nResources are measured in abstract cost units rather than raw bytes or cycles. This allows the kernel to normalize different resource types ŌĆö memory, compute, I/O ŌĆö into a single comparable metric for budgeting purposes.\n\n### Quotas\n\nA quota represents a hard or soft limit on resource consumption for a given context (e.g., a session, a tenant, or a workload). When an operation's projected cost would push usage past a quota, the metering module signals enforcement.\n\n### Metering Context\n\nEach billable operation is evaluated within a metering context that determines which quota applies and how costs are attributed. The context is typically derived from the runtime state provided by `librefang-runtime`.\n\n## Integration Points\n\nWhen extending or consuming this module:\n\n- **New resource types**: If a new kernel subsystem produces billable resources, report consumption through this module's metering interface rather than implementing ad-hoc tracking.\n- **Quota configuration**: Quotas are serializable via `serde`, allowing them to be loaded from configuration files or external services.\n- **Enforcement hooks**: Subsystems that perform costly operations should check with the metering module *before* committing the operation, not after.\n\n## Current Status\n\nThe module currently has no detected execution flows or call edges, indicating it is in an early or scaffolded state. The dependency chain is in place (`librefang-types`, `librefang-memory`, `librefang-runtime`, `serde`), but the core metering and enforcement logic has not yet been wired into the rest of the kernel.\n\nWhen implementing this module, start with:\n\n1. Define the cost model ŌĆö what operations are billable and how they are weighted.\n2. Implement the quota store with serialization support.\n3. Wire cost checks into the memory allocation path via `librefang-memory`.\n4. Expose enforcement decisions to `librefang-runtime` so callers receive clear feedback on quota violations.","other-librefang-kernel-router":"# Other ŌĆö librefang-kernel-router\n\n# librefang-kernel-router\n\nHand/Template routing engine for the LibreFang kernel.\n\n## Purpose\n\nTh
