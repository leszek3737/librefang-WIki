--> RULES[\"TEMPLATE_RULES<br/>(hardcoded regex patterns)\"]\n    AUTO_TPL --> META[\"Manifest metadata<br/>(agent.toml [metadata.routing])\"]\n    AUTO_TPL --> SEM_T[\"semantic_scores (optional)\"]\n\n    AUTO_HAND --> HANDS[\"Hand candidates<br/>(HAND.toml [routing])\"]\n    AUTO_HAND --> SEM_H[\"semantic_scores (optional)\"]\n\n    RULES --> SCORE[\"Weighted scoring\"]\n    META --> SCORE\n    SEM_T --> SCORE\n\n    HANDS --> HSCORE[\"Weighted scoring\"]\n    SEM_H --> HSCORE\n\n    SCORE --> PICK[\"Best template or<br/>orchestrator fallback\"]\n    HSCORE --> HPICK[\"Best hand or<br/>None fallback\"]\n```\n\n## Public API\n\n### `auto_select_template(message, agents_dir, semantic_scores) -> TemplateSelection`\n\nRoutes a user message to the best agent template.\n\n| Parameter | Type | Description |\n|---|---|---|\n| `message` | `&str` | The raw user message |\n| `agents_dir` | `&Path` | Path to the agents workspace directory (e.g. `$HOME/.librefang/workspaces/agents`) |\n| `semantic_scores` | `Option<&HashMap<String, f32>>` | Optional precomputed cosine similarities keyed by template name |\n\nReturns a `TemplateSelection` containing the chosen `template` name, a human-readable `reason`, and the numeric `score`.\n\n**Routing priority:**\n\n1. Keyword matching against both hardcoded `TEMPLATE_RULES` and manifest `[metadata.routing]` aliases.\n2. If no keyword match, semantic-only candidates with similarity ≥ `SEMANTIC_ONLY_THRESHOLD` (0.55) are considered.\n3. If multiple templates score closely and the message contains multi-domain indicators (`\"同时\"`, `\"multi\"`, `\"分别\"`, etc.), the message is routed to `\"orchestrator\"`.\n4. If nothing matches at all, defaults to `\"orchestrator\"`.\n\n### `auto_select_hand(message, semantic_scores) -> HandSelection`\n\nRoutes a user message to the best hand. Hands are tool-using agents defined in `HAND.toml` files under `$LIBREFANG_HOME/registry/hands/`.\n\n| Parameter | Type | Description |\n|---|---|---|\n| `message` | `&str` | The raw user message |\n| `semantic_scores` | `Option<&HashMap<String, f32>>` | Optional cosine similarities keyed by hand ID |\n\nReturns a `HandSelection`. When no hand scores above `MIN_HAND_SCORE` (2), `hand_id` is `None`.\n\n### `load_template_manifest(home_dir, template) -> Result<AgentManifest, String>`\n\nLoads and parses an `agent.toml` manifest from `$home_dir/workspaces/agents/$template/agent.toml`. Validates the template name against path-traversal characters (only `a-zA-Z0-9`, `-`, `_` allowed).\n\n### `all_template_descriptions(agents_dir) -> Vec<(String, String)>`\n\nReturns `(template_name, embed_text)` pairs for all routable templates (excludes `\"assistant\"`). The `embed_text` field concatenates name, description, and tags for embedding computation. Used by the kernel to build template embeddings for semantic routing.\n\n### Cache Control\n\n| Function | Purpose |\n|---|---|\n| `set_hand_route_home_dir(home_dir)` | Set the LibreFang home directory for hand candidate loading |\n| `invalidate_hand_route_cache()` | Clear cached hand candidates; call after hand install/uninstall |\n| `invalidate_manifest_cache()` | Clear cached manifest candidates; call after config hot-reload or agent changes |\n\n## Scoring System\n\nAll routing uses the same weighted scoring model:\n\n| Signal | Weight | Source |\n|---|---|---|\n| Explicit alias / strong keyword | 6 | User-configured aliases in `[metadata.routing]`, hardcoded strong patterns |\n| Generated phrase | 2 | Auto-derived from template name, tags, description |\n| Weak alias / weak keyword | 1 | User-configured weak aliases, id-derived tokens |\n| Semantic bonus | 0–5 | `floor(similarity × MAX_SEMANTIC_BONUS)` |\n\n### Thresholds\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `MIN_HAND_SCORE` | 2 | Single weak hit (score 1) is too noisy; requires strong hit or multiple weak hits |\n| `MAX_SEMANTIC_BONUS` | 5.0 | Caps semantic contribution so keywords still dominate |\n| `SEMANTIC_ONLY_THRESHOLD` | 0.55 | Minimum cosine similarity for a semantic-only match when no keywords hit |\n\n### Hand candidate phrase sources\n\n**Strong phrases** (`strong_phrases`):\n- Explicit `aliases` from `[routing]` section in `HAND.toml`\n- Phrases derived from the hand's `description` field via `description_phrases()`\n\n**Weak phrases** (`weak_phrases`):\n- Explicit `weak_aliases` from `[routing]` section\n- Tokens from the hand ID split on `-` and `_`, filtered by length ≥ 3 and not in `GENERIC_ENGLISH_WORDS`\n\n## Keyword Matching\n\n### Regex-based matching (TEMPLATE_RULES)\n\nThe 30 hardcoded `RouteRule` entries each define labeled regex patterns in two tiers:\n\n- **Strong patterns** — high-confidence intent signals like `\\bdebug\\b`, `代码审查`, `deploy`\n- **Weak patterns** — lower-confidence signals like `\\bcode\\b`, `日志`, `review`\n\nAll patterns are compiled with `(?i)` (case-insensitive) and cached in `REGEX_CACHE` for reuse.\n\n### Phrase-based matching (manifest metadata and hand routing)\n\nUses `phrase_matches()` which branches on content type:\n\n- **ASCII phrases**: Wraps the phrase in word-boundary regex `(^|[^a-z0-9])phrase([^a-z0-9]|$)` with spaces mapped to `[\\s_-]+`.\n- **Non-ASCII phrases** (CJK, etc.): Simple case-insensitive `contains` check.\n\n## Phrase Generation Pipeline\n\n```\ndescription / tags\n       │\n       ▼\n  split_phrase_chunks()     Split on punctuation (.,;，。、etc.)\n       │\n       ▼\n  normalize_phrase_chunk()  Strip leading/trailing generic English words\n       │\n       ▼\n  ┌─────┴──────┐\n  ASCII?       Non-ASCII\n  │            │\n  ▼            ▼\n  ascii_phrase_candidates()  is_meaningful_unicode_phrase()\n  │                           │\n  ├─ english_variants()       └─ Keep if 2–32 chars\n  ├─ content words (≥4 chars, non-generic)\n  └─ bigram windows\n       │\n       ▼\n     dedupe()\n```\n\nThe `GENERIC_ENGLISH_WORDS` list (~45 entries including \"a\", \"the\", \"helper\", \"specialist\", \"workflow\") is used throughout to filter out noise from auto-generated phrases.\n\n## Bilingual Support\n\n`TEMPLATE_RULES` patterns cover both English and Chinese intents:\n\n```rust\nRouteRule {\n    target: \"coder\",\n    strong: &[\n        (\"implement\", r\"\\bimplement\\b|\\bbuild\\b|\\brefactor\\b|\\bpatch\\b\"),\n        (\"写代码\", r\"写代码|实现功能|补丁|脚本|编码|重构|开发\"),\n    ],\n    weak: &[\n        (\"code\", r\"\\bcode\\b|\\bfunction\\b|\\bapi\\b\"),\n        (\"代码\", r\"代码|程序|模块|接口\"),\n    ],\n}\n```\n\nFor languages without hardcoded patterns (Japanese, Korean, etc.), routing relies on the `semantic_scores` parameter — the kernel precomputes embedding similarities against template/hand descriptions and passes them in.\n\n## Caching Strategy\n\nThree global `OnceLock<Mutex<...>>` caches avoid redundant work:\n\n| Cache | Key | Invalidated by |\n|---|---|---|\n| `REGEX_CACHE` | Raw pattern string | Never (patterns are static) |\n| `MANIFEST_CACHE` | `agents_dir` path | `invalidate_manifest_cache()` |\n| `HAND_ROUTE_CACHE` | `home_dir` path string | `invalidate_hand_route_cache()` |\n\nThe incoming call graph shows that `invalidate_hand_route_cache()` is called from `install_hand` and `uninstall_hand` in the skills route handler. `invalidate_manifest_cache()` should be called on config hot-reload or agent install/uninstall.\n\n## Template Exclusion\n\n`ROUTING_EXCLUDED_TEMPLATES` currently contains `[\"assistant\"]`. Templates in this list are skipped during manifest candidate building and excluded from `all_template_descriptions()`.","kernel-core-librefang-kernel-src":"# Kernel Core — librefang-kernel-src\n\n# LibreFang Kernel Core (`librefang-kernel`)\n\nThe kernel is the runtime heart of the LibreFang Agent Operating System. It owns the agent lifecycle — from registration through execution to termination — and provides the shared infrastructure all agents depend on: configuration, scheduling, event routing, health monitoring, and inter-agent communication.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Kernel Core\"\n        K[LibreFangKernel]\n        CFG[Config Loader]\n        REG[AgentRegistry]\n        SUP[Supervisor]\n        BG[BackgroundExecutor]\n        BUS[EventBus]\n        RL[Config Reload Planner]\n    end\n\n    CFG -->|loads & migrates| K\n    K -->|owns| REG\n    K -->|owns| SUP\n    K -->|owns| BG\n    K -->|owns| BUS\n    RL -->|diffs config snapshots| K\n    SUP -->|shutdown signal| BG\n    BUS -->|routes events| BG\n```\n\nAll kernel state is held behind `DashMap` concurrent maps, so agents can be registered, queried, and mutated from any tokio task without a global lock.\n\n---\n\n## Module Layout\n\n| Module | Responsibility |\n|---|---|\n| `kernel` | Top-level `LibreFangKernel` struct — wires everything together. Re-exported at crate root. |\n| `config` | Loads `config.toml`, resolves includes, runs version migrations. |\n| `config_reload` | Diffs two `KernelConfig` values into a `ReloadPlan` (restart / hot-reload / no-op). |\n| `registry` | `AgentRegistry` — concurrent agent CRUD with name and tag indexes. |\n| `supervisor` | `Supervisor` — shutdown signaling, panic/restart counters, per-agent restart limits. |\n| `background` | `BackgroundExecutor` — autonomous agent loops (continuous, periodic, proactive). |\n| `event_bus` | `EventBus` — pub/sub event routing with history buffer and stale-channel GC. |\n| `scheduler` | Token usage tracking and quota enforcement. |\n| `triggers` | Pattern-matching trigger engine for proactive agents. |\n| `session_policy` | Session auto-reset and idle timeout policies. |\n| `cron` | Cron-style job scheduling. |\n| `workflow` | Multi-step workflow DAG execution with conditionals. |\n| `approval` | Human-in-the-loop approval gate. |\n| `auth` | Authentication primitives. |\n| `pairing` | Device pairing protocol. |\n| `inbox` | Per-agent message inbox management. |\n| `heartbeat` | Liveness monitoring for agents. |\n| `hooks` | Lifecycle hook dispatch (agent spawn, loop end, etc.). |\n| `capabilities` | Agent capability negotiation. |\n| `auto_dream` | Autonomous background reasoning (\"dreaming\"). |\n| `auto_reply` | Automatic reply heuristics. |\n| `orchestration` | Multi-agent orchestration patterns. |\n| `wizard` | First-run setup wizard. |\n| `whatsapp_gateway` | WhatsApp channel bridge. |\n| `mcp_oauth_provider` | OAuth flow for MCP server connections. |\n| `metering` | Re-exported from `librefang-kernel-metering`. |\n| `router` | Re-exported from `librefang-kernel-router`. |\n\n---\n\n## Configuration (`config.rs`)\n\n### Loading Pipeline\n\n`load_config(path)` reads a TOML file (default: `~/.librefang/config.toml` or `$LIBREFANG_HOME/config.toml`) through this pipeline:\n\n1. **Read & parse** the root TOML file. On any failure, fall back to `KernelConfig::default()`.\n2. **Resolve includes** — if the root contains `include = [\"base.toml\", \"overrides.toml\"]`, each file is loaded and deep-merged (root wins over includes; later includes win over earlier ones). Security constraints:\n   - Absolute paths are rejected.\n   - `..` path components are rejected.\n   - Canonical path must stay within the config directory.\n   - Circular includes are detected via a `HashSet` of visited paths.\n   - Nesting depth capped at `MAX_INCLUDE_DEPTH` (10).\n3. **Run migrations** — if `config_version` is missing or behind `CONFIG_VERSION`, `run_migrations` transforms the TOML value in-place. On success the migrated config is written back to disk so future loads skip migration.\n4. **Detect unknown fields** — if `strict_config = true`, unknown top-level fields cause rejection (defaults returned). Otherwise unknown fields are logged as warnings.\n5. **Deserialize** into `KernelConfig`.\n\n### Deep Merge\n\n`deep_merge_toml(base, overlay)` recursively merges TOML tables — overlay values win. For non-table values, overlay replaces base entirely.\n\n### Key Functions\n\n```rust\npub fn load_config(path: Option<&Path>) -> KernelConfig\npub fn deep_merge_toml(base: &mut toml::Value, overlay: &toml::Value)\npub fn default_config_path() -> PathBuf\npub fn librefang_home() -> PathBuf\n```\n\n---\n\n## Config Hot-Reload (`config_reload.rs`)\n\nWhen the config file changes on disk, the kernel diffs the old and new configs to produce a `ReloadPlan`.\n\n### Three Change Categories\n\n| Category | Examples | Behavior |\n|---|---|---|\n| **Restart required** | `api_listen`, `network_enabled`, `network`, `memory`, `home_dir`, `data_dir`, `vault` | Kernel must fully restart. |\n| **Hot-reloadable** | `channels`, `skills`, `web`, `browser`, `approval`, `cron`, `mcp_servers`, `tool_policy`, `proxy`, `default_model`, `provider_api_keys`, `dashboard credentials` | Applied in-place via `HotAction` enum. |\n| **No-op** | `log_level`, `language`, `mode`, `stable_prefix_mode`, `sanitize`, `api_key` | Effective immediately through ArcSwap config swap; no explicit action needed. |\n\n### Usage\n\n```rust\nlet plan = build_reload_plan(&old_config, &new_config);\nplan.log_summary();  // structured logging\n\nif plan.restart_required {\n    // tell operator to restart\n} else if should_apply_hot(reload_mode, &plan) {\n    for action in &plan.hot_actions {\n        // apply each HotAction variant\n    }\n}\n```\n\n`validate_config_for_reload(config)` runs sanity checks before applying (non-empty `api_listen`, reasonable `max_cron_jobs`, valid approval policy, network secret when networking is on).\n\n---\n\n## Agent Registry (`registry.rs`)\n\n`AgentRegistry` is a lock-free concurrent store backed by three `DashMap` indexes:\n\n- **Primary**: `AgentId → AgentEntry`\n- **Name**: `String → AgentId` (enforces unique names via atomic `Entry` API to avoid TOCTOU races)\n- **Tag**: `String → Vec<AgentId>`\n\n### Core Operations\n\n| Method | Description |\n|---|---|\n| `register(entry)` | Atomically inserts into all three indexes. Returns `AgentAlreadyExists` on name collision. |\n| `get(id)` / `find_by_name(name)` | Read-only clones. |\n| `set_state(id, state)` / `set_mode(id, mode)` | Update agent lifecycle state/mode, bump `last_active`. |\n| `remove(id)` | Removes from all indexes; cleans tag membership. |\n| `list()` | Returns all agents sorted by name for deterministic ordering. |\n| `touch(id)` | Updates `last_active` without changing state — used by heartbeat to prevent false timeouts during long-running operations. |\n\n### Field-Level Update Methods\n\nThe registry provides ~30 targeted update methods that mutate a single field and bump `last_active`. These avoid the cost of clone-modify-replace:\n\n- `update_system_prompt`, `update_model`, `update_model_and_provider`, `update_model_provider_config`, `update_max_tokens`, `update_temperature`\n- `update_skills` (also clears `skills_disabled`), `update_tool_filters` (also clears `tools_disabled`), `update_mcp_servers`\n- `update_name` (atomic name index swap — inserts new, removes old), `update_description`\n- `update_resources` (hourly/daily/monthly cost limits, token limits)\n- `update_auto_dream_enabled` / `is_auto_dream_enabled` — lightweight bool accessor without cloning the full entry, optimized for the hot-path hook that fires every agent turn.\n- `update_workspace`, `update_source_toml_path`, `replace_manifest`\n- `update_web_search_augmentation`, `update_fallback_models`\n- `mark_onboarding_complete`\n- `schedule_session_wipe`, `mark_resume_pending`, `update_session_reset_state`\n- `update_session_id`\n\n### Session Reset Flow\n\nSession resets use a two-phase protocol:\n\n1. `schedule_session_wipe(id)` — sets `force_session_wipe = true` on the entry.\n2. On the agent's next invocation, the kernel checks this flag, performs the hard reset, then calls `update_session_reset_state(id, reason)` which clears `force_session_wipe` and `resume_pending`.\n\n`mark_resume_pending(id)` is used after interrupted restarts, but is ignored if `force_session_wipe` is already set (hard-wipe takes precedence).\n\n---\n\n## Supervisor (`supervisor.rs`)\n\nThe `Supervisor` manages graceful shutdown and tracks agent health.\n\n### Shutdown Signaling\n\nUses a `tokio::sync::watch` channel. The supervisor holds the sender; any number of tasks can clone the receiver:\n\n```rust\nlet supervisor = Supervisor::new();\nlet shutdown_rx = supervisor.subscribe();\n\n// In background loops:\ntokio::select! {\n    _ = tokio::time::sleep(interval) => { /* do work */ }\n    _ = shutdown_rx.changed() => { /* break loop */ }\n}\n```\n\n### Health Tracking\n\n- `record_panic()` — increments a global `AtomicU64` panic counter.\n- `record_restart()` — increments global restart counter.\n- `record_agent_restart(agent_id, max_restarts)` — per-agent restart counting. Returns `Err(count)` when the agent exceeds `max_restarts` (0 means unlimited).\n- `reset_agent_restarts(agent_id)` — clears the counter (e.g., after operator intervention).\n- `health()` — returns `SupervisorHealth { is_shutting_down, panic_count, restart_count }`.\n\n---\n\n## Background Executor (`background.rs`)\n\n`BackgroundExecutor` manages autonomous agent loops in three scheduling modes:\n\n### Schedule Modes\n\n| Mode | Behavior |\n|---|---|\n| `Reactive` | No background task — agent only responds to incoming messages. |\n| `Continuous { check_interval_secs }` | Self-prompts on a fixed interval with random initial jitter. |\n| `Periodic { cron }` | Self-prompts on a cron/interval schedule. |\n| `Proactive { conditions }` | No dedicated loop — activated by the trigger engine when matching events fire. |\n\n### Concurrency Control\n\nA global `Semaphore` (default 5 permits, configurable via `with_concurrency`) caps concurrent background LLM calls across all agents. Each tick acquires a permit before sending the self-prompt; the permit is held until the agent finishes processing.\n\n### Skip-if-Busy\n\nEach agent has an `AtomicBool` busy flag. If the previous tick is still running when the next interval fires, the new tick is skipped. This prevents unbounded queue growth for slow agents.\n\n### Pause/Resume\n\n`pause_agent(id)` / `resume_agent(id)` set a per-agent pause flag. Paused agents have their ticks skipped but the loop keeps running. Safe to call before `start_agent` — the flag is pre-created so the loop starts in the paused state (used for hand agents).\n\n### BusyGuard RAII\n\nA `BusyGuard` struct wraps the busy flag. On `Drop` (including panic unwinds), it clears the flag. This ensures the agent isn't permanently stuck in \"busy\" if a tick panics.\n\n### Cron Parsing\n\n`parse_cron_to_secs(cron)` converts schedule expressions to seconds:\n\n- `\"every 30s\"`, `\"every 5m\"`, `\"every 1h\"`, `\"every 2d\"`\n- Standard 5-field cron: `\"*/15 * * * *\"` → 900s\n- Falls back to 300s for unparseable expressions.\n\n`parse_condition(condition)` converts proactive trigger strings to `TriggerPattern` values:\n- `\"event:agent_spawned\"`, `\"event:lifecycle\"`, `\"event:memory_update\"`\n- `\"memory:some.key.pattern\"`\n- `\"all\"`\n\n---\n\n## Event Bus (`event_bus.rs`)\n\n`EventBus` provides pub/sub event routing with pattern matching.\n\n### Routing Targets\n\n| `EventTarget` | Behavior |\n|---|---|\n| `Agent(id)` | Delivered only to that agent's channel. |\n| `Broadcast` | Delivered to the global channel **and** all per-agent channels. |\n| `Pattern(pattern)` | Phase 1: broadcast to all subscribers for client-side pattern matching. |\n| `System` | Delivered to the global channel only. |\n\n### Backpressure\n\nChannels have bounded capacity (1024 global, 256 per-agent). When a channel is full, the event is dropped and `dropped_count` is incremented. Drop warnings are rate-limited to once per 10 seconds to avoid log flooding.\n\n### History\n\nA `VecDeque` ring buffer retains the last 1000 events. `history(limit)` returns the most recent `limit` events in reverse chronological order.\n\n### Cleanup\n\n- `unsubscribe_agent(id)` — removes the per-agent channel on agent termination.\n- `gc_stale_channels(live_agent_ids)` — removes channels for agents no longer in the registry, returning the count of cleaned-up channels.\n\n---\n\n## Execution Flow: Agent Lifecycle\n\nA typical agent lifecycle through the kernel:\n\n1. **Register** — `AgentRegistry::register(entry)` creates indexes. Agent starts in `AgentState::Created`.\n2. **Spawn** — Kernel sets state to `AgentState::Running`, subscribes to the event bus, starts background loop if schedule is non-reactive, registers triggers if proactive.\n3. **Execute** — Messages arrive via inbox or self-prompt. Each turn: acquire LLM permit, run inference, dispatch tools, record usage in scheduler, publish lifecycle events to event bus, touch `last_active` via registry.\n4. **Background ticks** — `BackgroundExecutor` loops check the supervisor's shutdown signal, the pause flag, and the busy flag before each tick.\n5. **Health** — Supervisor tracks panics and restarts. If an agent panics, the supervisor records it; the kernel may restart the agent up to `max_restarts`.\n6. **Shutdown** — `Supervisor::shutdown()` sends `true` on the watch channel. All background loops observe the change and exit. Agent channels are removed from the event bus.\n\n---\n\n## Thread Safety Conventions\n\nAll kernel state uses `DashMap` for fine-grained concurrent access — there is no single `RwLock<KernelState>`. This means:\n\n- Multiple agents can be updated simultaneously without contention.\n- Read operations (`get`, `find_by_name`, `is_auto_dream_enabled`) never block writers.\n- Update methods use `get_mut()` on a single DashMap entry, holding that shard's lock briefly.\n\nThe exception is `EventBus::history`, which uses `Arc<RwLock<VecDeque<_>>>` since history writes are append-only and reads are infrequent.\n\n---\n\n## Re-exports\n\nThe crate root (`lib.rs`) re-exports:\n\n```rust\npub use kernel::DeliveryTracker;\npub use kernel::LibreFangKernel;\npub use librefang_kernel_metering as metering;\npub use librefang_kernel_router as router;\n```\n\n`LibreFangKernel` is the primary entry point — it holds `Arc` references to the registry, supervisor, event bus, background executor, config, and all other subsystems.","kernel-core":"# Kernel Core\n\n# Kernel Core\n\nThe Kernel Core is the runtime foundation of the LibreFang Agent Operating System. It manages the complete agent lifecycle and provides the shared infrastructure that all agents depend on to run, communicate, and stay within budget.\n\n## Sub-module Map\n\n| Sub-module | Role |\n|---|---|\n| [Kernel Core — librefang-kernel-src](librefang-kernel-src.md) | Main orchestrator. Owns agent registration, supervision, scheduling, event routing, config loading, workflow execution, and triggers. |\n| [Kernel Handle — librefang-kernel-handle-src](librefang-kernel-handle-src.md) | Defines the `KernelHandle` trait — the callback interface agents use to talk back to the kernel. Exists to break the circular dependency between kernel and runtime. |\n| [Metering — librefang-kernel-metering-src](librefang-kernel-metering-src.md) | Real-time LLM cost tracking and quota enforcement at per-agent, per-provider, and global levels. |\n| [Router — librefang-kernel-router-src](librefang-kernel-router-src.md) | Routes incoming messages to the best-matching agent template or hand using keyword and semantic scoring. |\n\n## How They Fit Together\n\n```mermaid\nflowchart TD\n    subgraph Kernel[\"librefang-kernel (core)\"]\n        K[LibreFangKernel]\n        REG[AgentRegistry]\n        SUP[Supervisor]\n        BUS[EventBus]\n        WF[Workflow Engine]\n    end\n\n    subgraph Handle[\"librefang-kernel-handle\"]\n        KH[\"KernelHandle trait\"]\n    end\n\n    subgraph Metering[\"librefang-kernel-metering\"]\n        ME[MeteringEngine]\n        US[UsageStore]\n        MC[ModelCatalog]\n    end\n\n    subgraph Router[\"librefang-kernel-router\"]\n        MR[Message Router]\n    end\n\n    MR -->|selects agent| K\n    K -->|implements| KH\n    KH -.->|injected into| AGENT[\"Agent Loops<br/>(librefang-runtime)\"]\n    K -->|every LLM call| ME\n    ME --> US\n    ME --> MC\n    K -->|owns| REG\n    K -->|owns| SUP\n    K -->|owns| BUS\n    K -->|owns| WF\n```\n\n## Key Cross-cutting Workflows\n\n**Message handling.** An incoming user message enters the kernel, which delegates to the [Router](librefang-kernel-router-src.md) to select the best agent template or hand. The kernel then dispatches execution through the `Supervisor` and `BackgroundExecutor`, injecting a `KernelHandle` implementation so the agent can spawn sub-agents, send messages, or post tasks without ever importing the kernel directly.\n\n**LLM cost control.** Every LLM call flows through the [MeteringEngine](librefang-kernel-metering-src.md) twice — pre-call to check budget limits (per-agent, per-provider, global) and post-call to persist a `UsageRecord`. Calls that would exceed quota are rejected before execution. Price lookups come from the `ModelCatalog`; aggregates feed back into dashboards and enforcement.\n\n**Dependency inversion via KernelHandle.** The kernel depends on `librefang-runtime` to drive agent loops, but those loops need kernel access. The [Kernel Handle](librefang-kernel-handle-src.md) trait solves this: the kernel implements `KernelHandle` and injects it at startup, so the runtime only depends on the lightweight trait crate — no circular import.\n\n**Workflow orchestration.** The kernel's workflow engine (`Workflow`, DAG execution, conditional steps, loops) coordinates multi-step agent processes. Workflows are loaded from disk, run through topological sorting, and executed with configurable error modes (skip, retry, fail).","llm-drivers-librefang-llm-driver-src":"# LLM Drivers — librefang-llm-driver-src\n\n# LLM Driver (`librefang-llm-driver`)\n\nProvider-agnostic abstraction over LLM APIs. Every concrete provider (Anthropic, OpenAI, Ollama, Vertex AI, Azure OpenAI, etc.) implements the same `LlmDriver` trait, and all error responses are classified into a unified taxonomy that drives automatic provider failover.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Loop / Runtime] -->|CompletionRequest| B[LlmDriver trait]\n    B -->|complete| C[Provider impl<br/>Anthropic / OpenAI / Ollama / ...]\n    B -->|stream| C\n    C -->|Ok| D[CompletionResponse]\n    C -->|Err| E[LlmError]\n    E -->|failover_reason| F[FailoverReason]\n    E -->|classify_error| G[ClassifiedError]\n    F --> H[FallbackChain<br/>retry / skip provider]\n    G --> I[User-facing<br/>sanitized message]\n```\n\nThe crate is split into two cohesive units:\n\n- **`lib.rs`** — request/response types, the `LlmDriver` trait, `DriverConfig`, `StreamEvent`, and `LlmError` with its `failover_reason()` method.\n- **`llm_errors.rs`** — the full error classification pipeline (`classify_error`, `classify_error_with_context`), sanitization, and the `FailoverReason` taxonomy.\n\n---\n\n## Core Trait\n\n### `LlmDriver`\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: tokio::sync::mpsc::Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError>;\n\n    fn is_configured(&self) -> bool { true }\n}\n```\n\n- **`complete`** — blocking (non-streaming) request. Returns the full response at once.\n- **`stream`** — sends incremental `StreamEvent`s through the `tx` channel. The default implementation wraps `complete()`: it emits a single `TextDelta` followed by `ContentComplete`. Concrete providers override this to emit true token-by-token streaming.\n- **`is_configured`** — returns `false` only for `StubDriver`; all real providers return `true`.\n\n### Request / Response\n\n**`CompletionRequest`** carries everything an LLM call needs:\n\n| Field | Purpose |\n|---|---|\n| `model` | Provider-specific model identifier (e.g. `\"claude-sonnet-4-20250514\"`, `\"gpt-4o\"`) |\n| `messages` | Conversation history as `Vec<Message>` |\n| `tools` | Available `ToolDefinition`s for function calling |\n| `max_tokens` | Generation cap |\n| `temperature` | Sampling temperature |\n| `system` | Extracted system prompt (some APIs need this as a separate parameter) |\n| `thinking` | Extended thinking configuration (models that support chain-of-thought) |\n| `prompt_caching` | Enable prompt caching (Anthropic: explicit cache markers; OpenAI: automatic prefix) |\n| `response_format` | Structured output (`ResponseFormat`) |\n| `timeout_secs` | Per-request timeout override — lets the agent loop grant longer timeouts for expensive operations |\n| `extra_body` | Provider-specific parameters merged into the API body (last-wins on key conflict) |\n| `agent_id` | Calling agent's identity, forwarded as an HTTP header for MCP bridge routing |\n\n**`CompletionResponse`** contains:\n\n- `content: Vec<ContentBlock>` — text, thinking, and tool-use blocks\n- `stop_reason: StopReason` — why generation ended\n- `tool_calls: Vec<ToolCall>` — extracted tool invocations\n- `usage: TokenUsage` — input/output token counts\n\nUse `response.text()` to concatenate all `ContentBlock::Text` blocks into a single string.\n\n---\n\n## Streaming Events\n\n`StreamEvent` represents incremental output from a streaming LLM call:\n\n| Variant | Direction | Meaning |\n|---|---|---|\n| `TextDelta { text }` | LLM → UI | Incremental text token |\n| `ThinkingDelta { text }` | LLM → UI | Incremental reasoning/chain-of-thought text |\n| `ToolUseStart { id, name }` | LLM → UI | A tool call block has begun |\n| `ToolInputDelta { text }` | LLM → UI | Partial JSON input for the in-progress tool call |\n| `ToolUseEnd { id, name, input }` | LLM → UI | Tool call complete with parsed JSON input |\n| `ContentComplete { stop_reason, usage }` | LLM → UI | Full response finished |\n| `PhaseChange { phase, detail }` | Agent loop → UI | Lifecycle phase transition |\n| `ToolExecutionResult { name, result_preview, is_error }` | Agent loop → UI | Tool finished executing |\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) is the phase name emitted when the LLM has finished streaming text and the agent loop is about to enter post-processing. Consumers use this to unblock user input before the full response payload is finalized.\n\n---\n\n## Error Handling\n\n### `LlmError`\n\nProvider errors are captured in a structured enum:\n\n```rust\npub enum LlmError {\n    Http(String),\n    Api { status: u16, message: String },\n    RateLimited { retry_after_ms: u64, message: Option<String> },\n    Parse(String),\n    MissingApiKey(String),\n    Overloaded { retry_after_ms: u64 },\n    AuthenticationFailed(String),\n    ModelNotFound(String),\n    TimedOut { inactivity_secs: u64, partial_text: String, ... },\n}\n```\n\nEvery variant implements `failover_reason()` → `FailoverReason`, which classifies the error into a provider-switching decision. Classification is purely structural (variant + status code + message content) with no allocations, making it suitable for hot-path use inside `FallbackChain`.\n\n### Error Classification Pipeline\n\nThe `llm_errors` module provides two levels of classification:\n\n#### `classify_error(message, status) -> ClassifiedError`\n\nThe core classifier. It combines **HTTP status-code fast paths** with **case-insensitive substring pattern matching** to sort any error from any of the 19+ supported providers into one of eight `LlmErrorCategory` values:\n\n| Category | Retryable | Typical signals |\n|---|---|---|\n| `RateLimit` | ✅ | 429, \"rate limit\", \"quota exceeded\", \"TPM/RPM limit\" |\n| `Overloaded` | ✅ | 503, \"overloaded\", \"high demand\", \"service unavailable\" |\n| `Timeout` | ✅ | \"ETIMEDOUT\", \"ECONNRESET\", \"connection refused\", \"fetch failed\" |\n| `Billing` | ❌ | 402, \"insufficient credits\", \"payment required\" |\n| `Auth` | ❌ | 401, \"invalid api key\", \"authentication_error\" |\n| `ContextOverflow` | ❌ | 413, \"context_length_exceeded\", \"prompt is too long\" |\n| `Format` | ❌ | 400, \"invalid request\", \"schema\", \"validation error\" |\n| `ModelNotFound` | ❌ | 404, \"model not found\", \"unknown model\" |\n\n**Classification priority order** (most specific first):\n\n1. Status-code fast paths: 429 → RateLimit, 402 → Billing, 401 → Auth, 403 → multi-way branch, 404 → ModelNotFound\n2. Context overflow patterns (very specific, checked first to avoid false matches)\n3. Billing patterns\n4. Auth patterns\n5. Rate limit patterns\n6. Model-not-found patterns\n7. Format patterns\n8. Overloaded patterns\n9. Timeout/network patterns\n10. HTML error page detection (Cloudflare)\n11. Fallback: 5xx → Overloaded, 4xx → Format, network-sounding → Timeout, else → Format\n\nThe **403 handling is particularly nuanced** because different providers overload it: Anthropic uses 403 for rate limits, Chinese providers (Qwen, ZhiPu) use it for quota/region/billing issues, and others use it for model permission errors. The classifier checks `FORBIDDEN_NON_AUTH_PATTERNS` (quota, balance, region, model, etc.) before falling back to `Auth`, avoiding misclassification.\n\n#### `classify_error_with_context(message, status, provider, model) -> ClassifiedError`\n\nThe preferred entry point when provider and model metadata are available. Wraps `classify_error` and enriches the result with:\n\n- `provider` and `model` fields for logging\n- `suggestion` — an actionable resolution hint (e.g. `\"Model 'claude-99' may not be available on anthropic. Check available models with librefang models list.\"`)\n- `sanitized_message` — enriched with `[provider=X, model=Y]` suffix\n\n### `FailoverReason`\n\nThe provider-switching taxonomy used by `FallbackChain`:\n\n```rust\npub enum FailoverReason {\n    RateLimit(Option<u64>),  // back off (with optional ms hint), retry same provider\n    CreditExhausted,         // skip to next provider immediately\n    AuthError,               // skip to next provider (another slot may have a valid key)\n    ModelUnavailable,        // skip to next provider\n    ContextTooLong,          // propagate to caller — they must compress context\n    Timeout,                 // skip to next provider\n    HttpError,               // skip to next provider\n    Unknown,                 // propagate immediately\n}\n```\n\n`LlmError::failover_reason()` maps from the structured error into this taxonomy. The `RateLimit` variant carries an optional retry-delay hint in milliseconds.\n\n### Sanitization\n\nAll classified errors produce a user-safe `sanitized_message` that:\n\n1. Extracts the actual error message from JSON bodies (`error.message`, `message`, or `detail` fields)\n2. Redacts secret fragments (`sk-*`, `key-*`, `Bearer *` tokens)\n3. Strips internal wrapper prefixes like `\"LLM driver error: API error (NNN): \"`\n4. Replaces HTML error pages (Cloudflare 521–530) with `\"provider returned an error page\"`\n5. Caps messages at 300 characters\n\nWhen no raw detail is available, per-category fallback messages are used (e.g. `\"Billing issue. Check your API plan and balance.\"`).\n\n### Utility Functions\n\n- **`extract_retry_delay(message) -> Option<u64>`** — parses `\"retry after N\"`, `\"retry-after: N\"`, or `\"try again in Nms\"` into milliseconds.\n- **`is_transient(message) -> bool`** — quick heuristic: returns `true` for rate limit, overloaded, or timeout patterns.\n- **`is_html_error_page(body) -> bool`** — detects `<!DOCTYPE`, `<html`, Cloudflare `cf-error-code` attributes, and Cloudflare status codes 521–530.\n\n---\n\n## Configuration\n\n### `DriverConfig`\n\nSerializable configuration for constructing a driver:\n\n```rust\npub struct DriverConfig {\n    pub provider: String,\n    pub api_key: Option<String>,\n    pub base_url: Option<String>,\n    pub vertex_ai: VertexAiConfig,\n    pub azure_openai: AzureOpenAiConfig,\n    pub skip_permissions: bool,       // default: true\n    pub message_timeout_secs: u64,    // default: 300\n    pub mcp_bridge: Option<McpBridgeConfig>,\n    pub proxy_url: Option<String>,\n}\n```\n\nKey defaults and behaviors:\n\n- **`skip_permissions`** defaults to `true` because LibreFang runs as a headless daemon. The CLI driver adds `--dangerously-skip-permissions` to spawned Claude processes. LibreFang's own RBAC layer provides the actual capability restrictions.\n- **`message_timeout_secs`** (300s default) is an **inactivity timeout** for CLI-based providers — the process is killed after this many seconds of silence on stdout, not wall-clock time.\n- **`mcp_bridge`** is set at runtime by the kernel (not serialized). When present, the driver writes a temp `mcp_config.json` and passes `--mcp-config` to the CLI subprocess, bridging LibreFang tools via the daemon's `/mcp` endpoint.\n- **`proxy_url`** overrides the global proxy for this specific provider.\n\n**Security:** `DriverConfig` implements a custom `Debug` that redacts `api_key`, `vertex_ai.credentials_path`, and `proxy_url`.\n\n### `McpBridgeConfig`\n\n```rust\npub struct McpBridgeConfig {\n    pub base_url: String,       // e.g. \"http://127.0.0.1:4545\"\n    pub api_key: Option<String>, // X-API-Key header (empty = no auth)\n}\n```\n\n---\n\n## Integration Points\n\n**Who calls this crate:**\n\n- `librefang-runtime` — agent loop, routing (`make_request`), proactive memory, tool execution, web fetch/search, TTS synthesis, provider health probes, plugin management\n- `librefang-runtime-mcp` — MCP tool bridging, OAuth metadata discovery\n- `librefang-runtime-oauth` — ChatGPT and Copilot device auth flows, token exchange, model discovery\n- `librefang-runtime-wasm` — WASM host functions for network fetch\n- `librefang-skills` — ClawHub file retrieval\n- `librefang-testing` — `MockLlmDriver` for test harnesses\n- `librefang-llm-drivers` — concrete `LlmDriver` implementations and `FallbackChain` logic\n\n**What this crate depends on:**\n\n- `librefang_types` — shared domain types (`Message`, `ContentBlock`, `TokenUsage`, `ToolCall`, `ToolDefinition`, config types, `ResponseFormat`, `ThinkingConfig`)\n- `async-trait` — for the `LlmDriver` trait\n- `serde` / `serde_json` — serialization for config and JSON parsing in error extraction\n- `thiserror` — error derive for `LlmError`\n- `tokio` — async runtime and `mpsc` channel for streaming","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nProvider-agnostic LLM interface with concrete implementations, automatic failover, and operational tooling for credential management, rate-limit tracking, and response filtering.\n\n## Sub-modules\n\n| Sub-module | Role |\n|---|---|\n| [LLM Driver (librefang-llm-driver)](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait (`complete` / `stream`), the unified `LlmError` → `ClassifiedError` taxonomy, and `FailoverReason` logic that drives automatic provider fallback. |\n| [LLM Drivers (librefang-llm-drivers)](librefang-llm-drivers-src.md) | Concrete provider implementations (Anthropic, OpenAI, Ollama, Vertex AI, Gemini, Azure OpenAI) plus shared infrastructure: credential pooling, rate-limit tracking, think-block filtering, and token rotation. |\n\n## How They Fit Together\n\n`librefang-llm-driver` owns the **abstraction layer** — the trait, the request/response types, and error classification. `librefang-llm-drivers` owns the **implementations and runtime infrastructure** that sit behind that trait. Nothing in the agent loop or higher-level runtime imports a concrete provider directly; everything flows through the `LlmDriver` trait.\n\n```mermaid\ngraph LR\n    subgraph librefang-llm-driver\n        Trait[LlmDriver trait]\n        Err[LlmError / ClassifiedError / FailoverReason]\n    end\n\n    subgraph librefang-llm-drivers\n        Providers[Provider impls<br/>Anthropic · OpenAI · Ollama · Vertex AI · Gemini · Azure]\n        Pool[CredentialPool<br/>round-robin keys]\n        RL[RateLimitTracker<br/>header parsing · ASCII display]\n        TF[ThinkFilter<br/>stream delta filtering]\n        TR[TokenRotation<br/>resets_sooner scheduling]\n    end\n\n    Agent[Agent Loop] -->|CompletionRequest| Trait\n    Trait --> Providers\n    Providers --> Pool\n    Providers --> RL\n    Providers --> TF\n    Providers --> TR\n    Providers -->|Err| Err\n    Err -->|failover_reason| FallbackChain[Fallback Chain]\n```\n\n## Key Cross-Module Workflows\n\n**Request → response (happy path):** The agent loop calls `LlmDriver::stream` or `LlmDriver::complete`. A `ProviderEntry` is selected from the driver registry; the credential pool provides the next key via round-robin. The provider makes the HTTP call, streams deltas through `ThinkFilter` to strip `<think/>` blocks, and parses rate-limit headers into `RateLimitTracker` buckets (displayed as ASCII bars in the CLI).\n\n**Error classification → failover:** When a provider returns an error, `classify_error` maps it to a `ClassifiedError` and `FailoverReason`. The fallback chain uses this classification to decide whether to retry the same provider, skip to the next one, or surface a sanitized message to the user.\n\n**Token rotation across providers:** `TokenRotation::complete` compares reset timestamps (`resets_sooner`) across providers and credential slots, preferring the one that recovers soonest — feeding back into the `ProviderEntry` selection.","memory-system":"# Memory System\n\n# Memory System (`librefang-memory`)\n\n## Overview\n\nThe memory substrate for the LibreFang Agent Operating System. It provides a unified memory API over three SQLite-backed storage backends — structured key-value, semantic text/vector search, and a knowledge graph — so agents can persist and recall information through a single interface.\n\nThe crate also ships a **proactive memory** layer (mem0-style) that automatically extracts, deduplicates, and retrieves memories during conversations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    AgentLoop[\"Agent Loop (runtime)\"]\n    PM[\"ProactiveMemoryStore\"]\n    Sub[\"MemorySubstrate\"]\n\n    AgentLoop --> PM\n    AgentLoop --> Sub\n\n    PM --> Struct[\"StructuredStore<br/>(kv_store table)\"]\n    PM --> Sem[\"SemanticStore<br/>(memories table)\"]\n    PM --> KG[\"KnowledgeStore<br/>(entities + relations)\"]\n\n    Sub --> Struct\n    Sub --> Sem\n    Sub --> KG\n    Sub --> Session[\"SessionStore<br/>(sessions + canonical_sessions)\"]\n    Sub --> Usage[\"UsageStore<br/>(usage_events)\"]\n    Sub --> Prompt[\"PromptStore<br/>(prompt_versions)\"]\n\n    Sem -->|\"optional\"| VS[\"VectorStore<br/>(SqliteVectorStore or HttpVectorStore)\"]\n\n    Sub --> Mig[\"migration.rs<br/>(schema v1–v19)\"]\n    PM --> Chunk[\"chunker.rs<br/>(text splitting)\"]\n    PM --> Cons[\"consolidation.rs<br/>(merge + decay)\"]\n    PM --> Decay[\"decay.rs<br/>(TTL cleanup)\"]\n```\n\n## Storage Backends\n\n### Structured Store (`structured.rs`)\n\nPer-agent key-value storage backed by the `kv_store` table. Stores JSON-serialized values with optimistic concurrency via a `version` column. Used for agent state, configuration, and memory metadata entries (keys prefixed with `memory:`).\n\nKey methods: `get()`, `set()`, `delete()`, `list_kv()`, `remove_agent()`.\n\n### Semantic Store (`semantic.rs`)\n\nFree-text memory storage in the `memories` table. Each memory has a scope (`user_memory`, `session_memory`, `agent_memory`), confidence score, access tracking, and optional embedding blob.\n\nRetrieval paths:\n- **Keyword fallback**: `recall()` uses `LIKE` matching against content.\n- **Vector search**: `recall_with_embedding()` computes cosine similarity between a query embedding and stored embeddings, falling back to `LIKE` when no embedding is available.\n\nThe store supports per-agent memory caps via `lowest_confidence()` for eviction, and `update_content()` for in-place memory edits.\n\n### Knowledge Graph (`knowledge.rs`)\n\nEntity-relation graph in `entities` and `relations` tables. Entities have a type (Person, Organization, Concept, etc.) and arbitrary JSON properties. Relations link two entities with a typed edge and confidence score.\n\nGraph queries (`query_graph()`) accept a `GraphPattern` with optional source, relation type, and target filters. The JOIN logic resolves entities by both ID and name, so relations that reference entities by name (as the MCP tool does) match correctly.\n\n### Session Store (`session.rs`)\n\nManages conversation sessions in the `sessions` table plus a `canonical_sessions` table for cross-channel persistent memory. Supports:\n\n- Per-session message history with labels and peer isolation (`peer_id`)\n- Canonical session context that merges messages across channels\n- LLM-generated summaries for compaction (`store_llm_summary`)\n- Full-text search via an FTS5 virtual table (`sessions_fts`)\n- JSONL mirror writes for audit/logging\n- Session TTL cleanup (`cleanup_expired_sessions`, `cleanup_excess_sessions`)\n\n### Usage Store (`usage.rs`)\n\nCost tracking and metering in `usage_events`. Records per-call token counts, cost, latency, model name, and provider. Supports:\n\n- Per-agent, per-model, and per-provider queries\n- Hourly and daily aggregation\n- Budget enforcement: `check_quota_and_record()` enforces hourly/daily caps\n- Global budget cap: `check_global_budget_and_record()`\n- Provider-aware budgets: `check_all_with_provider_and_record()`\n\n## Proactive Memory (`proactive.rs`)\n\nA mem0-style API layer built on top of `MemorySubstrate`. Implements the `ProactiveMemory` and `ProactiveMemoryHooks` traits from `librefang-types`.\n\n### Memory Levels\n\n| Level | Scope String | Persistence | Decay |\n|-------|-------------|-------------|-------|\n| User | `user_memory` | Permanent | Never |\n| Session | `session_memory` | TTL-based | After `session_ttl_hours` |\n| Agent | `agent_memory` | TTL-based | After `agent_ttl_days` |\n\n### Core Operations\n\n**`add(messages, user_id)`** — Extracts memories from conversation messages and stores them:\n\n1. The configured `MemoryExtractor` (default or custom LLM-backed) produces `MemoryItem` candidates and optional `RelationTriple`s.\n2. For each candidate, `add_with_decision()` runs the mem0 dedup flow:\n   - Embed the new content (if embedding driver is available).\n   - Search for similar existing memories (vector or keyword).\n   - The extractor decides: `Add` (new memory), `Update` (replace existing), or `Noop` (duplicate).\n3. On `Update`, the old memory is edited in-place, preserving its ID and access stats. A version history chain is maintained in metadata.\n4. Conflict detection flags contradictory updates (e.g., \"I love X\" → \"I hate X\").\n5. Extracted relation triples are upserted into the knowledge graph with deduplication.\n6. Per-agent memory cap is enforced via `evict_if_over_cap()`, which removes the lowest-confidence memories.\n\n**`search(query, user_id, limit)`** — Semantic search across all levels, ranked by relevance and confidence.\n\n**`auto_memorize(messages, user_id)`** — Hook called after each agent turn to extract and store new memories.\n\n**`auto_retrieve(user_id, query)`** — Hook called before agent execution to inject relevant memories into context. Also triggers periodic maintenance (confidence decay, session TTL cleanup).\n\n### Maintenance Tasks\n\nAll maintenance is rate-limited to at most once per hour and triggered automatically from `search()`, `auto_retrieve()`, and `consolidate()`:\n\n- **Confidence decay** (`decay_confidence()`): Applies exponential decay based on days since last access, with a log-based boost for frequently accessed memories.\n- **Session TTL cleanup** (`cleanup_expired()`): Soft-deletes session-level memories older than the configured TTL across all agents.\n- **Consolidation counters**: Trims the in-memory HashMap when it exceeds 1000 entries.\n\n### Import/Export\n\n- `export_all(agent_id)` — Serializes all memories as `Vec<MemoryExportItem>`.\n- `import_memories(agent_id, items)` — Bulk import with duplicate detection (>90% text similarity skips the item). Enforces per-agent cap after import.\n\n## Chunker (`chunker.rs`)\n\nSplits long documents into overlapping chunks suitable for embedding. Strategy:\n\n1. Split on paragraph boundaries (`\\n\\n`).\n2. If a paragraph exceeds `max_size`, split on sentence boundaries (`. `, `。`, `？`, `！`).\n3. If a sentence still exceeds `max_size`, hard-split at the character limit.\n4. Overlap is applied by prepending the last N characters of the previous chunk.\n\nAll operations are Unicode-safe using char-based iteration.\n\n## Consolidation (`consolidation.rs`)\n\n`ConsolidationEngine` reduces noise in the memory store:\n\n1. **Decay**: Reduces confidence of memories not accessed in 7 days by a configurable decay factor (floored at 0.1).\n2. **Merge**: Pairs of memories with >90% text similarity (Jaccard on lowercased words) are merged — the higher-confidence memory is kept, the lower is soft-deleted. Capped at 100 merges per run to avoid O(n²) blowup.\n\n## Time-Based Decay (`decay.rs`)\n\nHard-deletes stale memories based on scope-specific TTLs configured in `MemoryDecayConfig`:\n\n- **USER scope**: Never deleted.\n- **SESSION scope**: Deleted after `session_ttl_days` of no access.\n- **AGENT scope**: Deleted after `agent_ttl_days` of no access.\n\nAccessing a memory resets its `accessed_at` timestamp, extending its lifetime.\n\n## Vector Store Abstraction\n\nThe `VectorStore` trait (defined in `librefang-types`) has two implementations:\n\n- **`SqliteVectorStore`** (`semantic.rs`): Stores embeddings as BLOBs in the `memories` table. Cosine similarity computed in Rust.\n- **`HttpVectorStore`** (`http_vector_store.rs`): Delegates to a remote HTTP service. Expects a REST contract with `/insert`, `/search`, `/delete`, and `/get_embeddings` endpoints.\n\n## Schema Migrations (`migration.rs`)\n\nSequential migrations from v1 (initial schema) through v19. Uses SQLite's `user_version` pragma for tracking. Key tables created across versions:\n\n| Version | Addition |\n|---------|----------|\n| 1 | Core tables: agents, sessions, events, kv_store, task_queue, memories, entities, relations |\n| 3 | Embedding column on memories |\n| 4 | usage_events for cost tracking |\n| 5 | canonical_sessions for cross-channel memory |\n| 9 | Performance indexes for proactive memory queries |\n| 10 | agent_id on entities/relations for per-agent cleanup |\n| 12 | FTS5 virtual table for full-text session search |\n| 13 | Prompt versioning and A/B testing tables |\n| 15 | Multimodal columns (image_url, image_embedding, modality) |\n| 16 | peer_id on memories and sessions for per-user isolation |\n| 17 | Approval audit log |\n| 19 | Provider column on usage_events |\n\n## Provider Plugin System (`provider.rs`)\n\n`MemoryProvider` trait with `MemoryManager` for dependency injection. `NullMemoryProvider` is a no-op implementation for testing or when memory is disabled. `MemoryError` wraps all storage errors.\n\n## Integration Points\n\nThe runtime crate consumes memory through several paths:\n\n- **Agent loop** (`librefang-runtime/src/agent_loop.rs`): Calls `save_session_async()` after each turn, `setup_recalled_memories()` before execution, and `remember_interaction_best_effort()` after completion.\n- **Context engine** (`librefang-runtime/src/context_engine.rs`): Constructs `MemorySubstrate` and feeds recalled memories into the agent context.\n- **Compactor** (`librefang-runtime/src/compactor.rs`): Reads session history to decide when to compact.\n- **API routes** (`src/routes/memory.rs`): CRUD endpoints for memory items use `get_by_id()` and `find_agent_id_for_memory()`.\n- **Proactive memory init** (`librefang-runtime/src/proactive_memory.rs`): Wires up `ProactiveMemoryStore` with optional LLM extractor and embedding driver.\n\n## Configuration\n\n`ProactiveMemoryConfig` controls proactive memory behavior:\n\n| Field | Purpose |\n|-------|---------|\n| `max_memories_per_agent` | Hard cap; 0 disables eviction |\n| `confidence_decay_rate` | Exponential decay factor; ≤0 disables |\n| `session_ttl_hours` | Hours before session memories expire; 0 disables |\n| `auto_memorize_enabled` | Whether `auto_memorize` extracts from conversations |\n| `auto_retrieve_enabled` | Whether `auto_retrieve` injects context before agent turns |\n\n`MemoryDecayConfig` controls the separate TTL-based decay sweep:\n\n| Field | Purpose |\n|-------|---------|\n| `enabled` | Master switch |\n| `session_ttl_days` | Days before hard-deleting session memories |\n| `agent_ttl_days` | Days before hard-deleting agent memories |\n| `decay_interval_hours` | How often the sweep runs |","migration":"# Migration\n\n# Migration Module (`librefang-migrate`)\n\nThe migration engine imports agents, memory, sessions, skills, and channel configurations from other agent frameworks into LibreFang's native format.\n\n## Supported Sources\n\n| Source | Status | Config Format |\n|--------|--------|---------------|\n| OpenClaw | Fully supported | JSON5 (`openclaw.json`) or legacy YAML (`config.yaml`) |\n| OpenFang | Fully supported | Same TOML format — copy with schema validation |\n| LangChain | Not yet supported | — |\n| AutoGPT | Not yet supported | — |\n\n## Public API\n\nThe entry point is `run_migration`, which dispatches to the appropriate sub-module based on `MigrateSource`:\n\n```rust\nuse librefang_migrate::{MigrateSource, MigrateOptions, run_migration};\n\nlet report = run_migration(&MigrateOptions {\n    source: MigrateSource::OpenClaw,\n    source_dir: PathBuf::from(\"/home/user/.openclaw\"),\n    target_dir: PathBuf::from(\"/home/user/.librefang\"),\n    dry_run: false,\n})?;\n```\n\n### `MigrateOptions`\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `source` | `MigrateSource` | Which framework to import from |\n| `source_dir` | `PathBuf` | Path to the source workspace |\n| `target_dir` | `PathBuf` | Path to the LibreFang home directory |\n| `dry_run` | `bool` | When `true`, report what would happen without writing files |\n\n### `MigrateError`\n\nAll errors are consolidated into a single enum with these variants:\n\n- `SourceNotFound(PathBuf)` — source directory does not exist\n- `ConfigParse(String)` — config file could not be parsed\n- `AgentParse(String)` — agent definition could not be parsed\n- `Io(std::io::Error)` — filesystem errors\n- `Yaml(serde_yaml::Error)` — YAML parsing errors (legacy format)\n- `Json5Parse(String)` — JSON5 parsing errors (modern OpenClaw)\n- `TomlSerialize(toml::ser::Error)` — TOML output serialization errors\n- `UnsupportedSource(String)` — requested source is not yet implemented\n\n### `MigrationReport`\n\nReturned by `run_migration`, the report contains three lists:\n\n- `imported: Vec<MigrateItem>` — items successfully (or would-be) migrated\n- `skipped: Vec<SkippedItem>` — items that cannot be migrated, with reasons\n- `warnings: Vec<String>` — non-fatal issues encountered\n\nEach `MigrateItem` has a `kind` (Config, Agent, Channel, Secret, Memory, Session, Skill), a `name`, and a `destination` path. The report's `to_markdown()` method produces a human-readable summary.\n\n## OpenClaw Migration\n\n### Workspace Detection\n\n`detect_openclaw_home()` checks these locations in order:\n\n1. `OPENCLAW_STATE_DIR` environment variable\n2. `~/.openclaw`, `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`\n3. `~/openclaw`, `~/.config/openclaw`\n4. `%APPDATA%/openclaw` and `%LOCALAPPDATA%/openclaw` (Windows)\n\nA directory is considered valid if it contains a recognized config file (`openclaw.json`, `clawdbot.json`, `moldbot.json`, `moltbot.json`, or `config.yaml`) or has `sessions/` or `memory/` subdirectories.\n\n### Workspace Scanning\n\n`scan_openclaw_workspace()` inspects a workspace without migrating and returns a `ScanResult` listing:\n\n- All agents found (name, provider, model, tool count, whether they have memory/sessions/workspaces)\n- All channels configured\n- All skills installed\n- Whether memory data exists\n\n### Two Config Formats\n\nOpenClaw has two generations of config layout. The migration engine auto-detects which one is in use:\n\n**Modern (JSON5)** — Everything in a single `openclaw.json`:\n\n```\n~/.openclaw/\n├── openclaw.json          # Global config, agents, channels, tools, cron, hooks\n├── auth-profiles.json     # Credentials (not migrated)\n├── sessions/              # JSONL conversation logs\n├── memory/                # Per-agent MEMORY.md files\n├── skills/\n├── workspaces/\n└── memory-search/         # SQLite vector index (not portable)\n```\n\n**Legacy (YAML)** — Scattered YAML files:\n\n```\n~/.openclaw/\n├── config.yaml            # Global model and provider settings\n├── agents/\n│   └── <agent>/\n│       ├── agent.yaml\n│       ├── MEMORY.md\n│       └── workspace/\n├── messaging/\n│   ├── telegram.yaml\n│   ├── discord.yaml\n│   └── ...\n└── skills/\n    ├── community/\n    └── custom/\n```\n\n### Migration Pipeline\n\n```\nmigrate(options)\n  ├── find_config_file()       # Detect JSON5 vs YAML\n  ├── migrate_from_json5()     # or migrate_from_legacy_yaml()\n  │     ├── migrate_config_from_json()\n  │     │     └── migrate_channels_from_json()\n  │     ├── migrate_agents_from_json()\n  │     │     └── convert_agent_from_json()   # per agent\n  │     ├── migrate_memory_files()\n  │     ├── migrate_workspace_dirs()\n  │     ├── migrate_sessions()\n  │     └── report_skipped_features()\n  └── Write migration_report.md\n```\n\n### What Gets Migrated\n\n| Item | Source Location | Target Location |\n|------|----------------|-----------------|\n| Global config | `openclaw.json` or `config.yaml` | `config.toml` |\n| Agent definitions | `agents.list[]` or `agents/<id>/agent.yaml` | `agents/<id>/agent.toml` |\n| Channel configs | `channels.{telegram,discord,...}` or `messaging/*.yaml` | `[channels.*]` in `config.toml` |\n| Secrets (tokens) | Inline in JSON5 or env var refs | `secrets.env` |\n| Memory files | `memory/<agent>/MEMORY.md` | `agents/<agent>/imported_memory.md` |\n| Session logs | `sessions/*.jsonl` | `imported_sessions/*.jsonl` |\n| Workspace dirs | `workspaces/<agent>/` | `agents/<agent>/workspace/` |\n\n### What Is Not Migrated\n\nThese features are reported as skipped items with explanations:\n\n- **Cron jobs** — LibreFang uses `ScheduleMode::Periodic` instead\n- **Webhook hooks** — LibreFang uses its own event system\n- **Auth profiles** — Security-sensitive; users must set environment variables manually\n- **Memory vector index** (`memory-search/index.db`) — SQLite binary index is not portable; LibreFang rebuilds embeddings\n- **Memory backend config** — LibreFang uses its own SQLite + vector store\n- **Session scope config** — LibreFang uses per-agent sessions\n- **Skills** — Must be reinstalled via `librefang skill install`\n- **iMessage** — macOS-only, requires manual setup\n- **BlueBubbles** — No LibreFang adapter exists\n\n### Channel Support\n\nThirteen channel types are recognized. Tokens extracted from inline values are written to `secrets.env` with restricted permissions (0600 on Unix).\n\n| Channel | Migrated | Notes |\n|---------|----------|-------|\n| Telegram | Yes | `bot_token` → `secrets.env` |\n| Discord | Yes | `token` → `secrets.env` |\n| Slack | Yes | `bot_token` + `app_token` → `secrets.env`; `allow_from` cannot map (Slack uses channel IDs) |\n| WhatsApp | Yes | Baileys credential directory is copied; re-authentication may be needed |\n| Signal | Yes | Constructs API URL from `http_host` + `http_port` |\n| Matrix | Yes | `access_token` → `secrets.env`; `allow_from` cannot map |\n| Google Chat | Yes | Service account JSON file is copied |\n| Teams | Yes | `app_password` → `secrets.env`; `allow_from` cannot map (Teams uses tenant IDs) |\n| IRC | Yes | Server, port, nick, channels, TLS all mapped |\n| Mattermost | Yes | `bot_token` → `secrets.env` |\n| Feishu | Yes | `domain` is mapped to `region` (\"intl\" for Lark, \"cn\" for Feishu) |\n| iMessage | Skipped | macOS-only, manual setup required |\n| BlueBubbles | Skipped | No adapter available |\n\n### Policy Mapping\n\nOpenClaw policies are translated to LibreFang equivalents:\n\n**DM Policy:**\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `open` | `respond` |\n| `allowlist` / `allow_list` | `allowed_only` |\n| `pairing` / `disabled` | `ignore` |\n\n**Group Policy:**\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `open` / `all` | `all` |\n| `mention` / `mention_only` | `mention_only` |\n| `commands` / `commands_only` / `slash_only` | `commands_only` |\n| `disabled` / `ignore` | `ignore` |\n\n### Model Reference Handling\n\nOpenClaw uses `\"provider/model\"` strings (e.g. `\"anthropic/claude-sonnet-4-20250514\"`). The `split_model_ref()` function separates these, falling back to provider `\"anthropic\"` if no slash is present. The `map_provider()` function normalizes provider names (e.g., `\"claude\"` → `\"anthropic\"`, `\"gemini\"` → `\"google\"`).\n\nAgent entries can also specify fallback models via `OpenClawAgentModel::Detailed`, which are emitted as `[[fallback_models]]` TOML arrays in the agent manifest.\n\n### Tool Mapping and Capabilities\n\nTool names from OpenClaw are mapped to LibreFang equivalents via `librefang_types::tool_compat::{is_known_librefang_tool, map_tool_name}`. Unrecognized tools are reported as warnings and omitted.\n\nTool profiles (`minimal`, `coding`, `research`, `messaging`, `automation`, `full`) are resolved through `librefang_types::agent::ToolProfile::tools()`.\n\nCapabilities are derived heuristically from the tool list:\n\n- `shell_exec` → `capabilities.shell = [\"*\"]`\n- `web_fetch`, `web_search`, `browser_navigate` → `capabilities.network = [\"*\"]`\n- `agent_send`, `agent_list` → `capabilities.agent_message = [\"*\"]` and `agent_spawn = true`\n- `\"*\"` (wildcard) → all of the above\n\n### Agent Identity / System Prompt\n\nThe `extract_identity_prompt()` function handles multiple identity formats:\n\n- **Plain string** — used directly\n- **Structured object** — searches for keys in priority order: `systemPrompt`, `system_prompt`, `prompt`, `instructions`, `instruction`, `content`, `text`, `value`, `persona`, `identity`, `description`\n- **Array** — parts are joined with double newlines\n- **Nested objects** — recursed until a string value is found\n\nIf no identity is configured, a default prompt is generated using the agent's display name.\n\n## OpenFang Migration\n\nOpenFang uses the same TOML format as LibreFang (it is a community fork). The migration copies config, agents, and related files with validation and schema drift warnings via `librefang_types::config::validation`.\n\n## Report Module (`report`)\n\n`MigrationReport` is serializable and includes:\n\n- `to_markdown()` — generates a markdown summary for display or file output\n- `print_summary()` — prints a formatted summary to stdout (used by the CLI)\n\n## Integration Points\n\nThe migration module is called from three places in the larger codebase:\n\n- **CLI** (`librefang-cli/src/main.rs`) — `cmd_migrate` calls `run_migration()` and prints the summary\n- **HTTP API** (`src/routes/config.rs`) — `run_migrate`, `migrate_detect`, and `migrate_scan` endpoints\n- **TUI init wizard** (`tui/screens/init_wizard.rs`) — `run` detects OpenClaw, `handle_migration_key` executes the migration\n\n## Security Considerations\n\n- Tokens and secrets extracted from inline JSON5 values are written to `secrets.env`, not to `config.toml`. The config file references them via `*_env` field names (e.g., `bot_token_env = \"TELEGRAM_BOT_TOKEN\"`).\n- `write_secret_env()` restricts file permissions to `0600` on Unix systems.\n- Auth profiles and credential files are explicitly excluded from migration and reported as skipped with instructions to set environment variables manually.","networking-p2p":"# Networking & P2P\n\n# LibreFang Wire Protocol (OFP) — Networking & P2P\n\nThe `librefang-wire` crate implements the **OFP** (LibreFang Wire Protocol), the networking layer that enables multiple LibreFang kernels to discover, authenticate, and communicate with each other over TCP. It provides cross-machine agent discovery, message routing, and a security model built on HMAC-SHA256 authentication with replay protection.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Local Kernel\"\n        PH[PeerHandle trait]\n        AG[Local Agents]\n    end\n\n    subgraph \"librefang-wire\"\n        PN[PeerNode]:::core\n        PR[PeerRegistry]:::core\n        WM[WireMessage]:::core\n        NT[NonceTracker]\n    end\n\n    subgraph \"Remote Kernel\"\n        RPN[PeerNode]\n        RPR[PeerRegistry]\n    end\n\n    PN -->|TCP listener| INBOUND[Inbound connections]\n    PN -->|TCP client| OUTBOUND[Outbound connections]\n    PN --> PR\n    PN --> NT\n    PN -->|routes to| PH\n    PH --> AG\n    PR -->|tracks| PEERS[PeerEntry list]\n    INBOUND -.->|handshake + messages| RPN\n    OUTBOUND -.->|handshake + messages| RPN\n\n    classDef core fill:#2d5a88,color:#fff\n```\n\n**Core flow:** A `PeerNode` binds a TCP listener, accepts incoming connections, performs mutual HMAC-authenticated handshakes, then enters a message dispatch loop that routes remote requests through the `PeerHandle` trait to local agents.\n\n---\n\n## Wire Protocol\n\nAll communication uses a JSON-framed binary protocol over TCP. Every message is prefixed with a **4-byte big-endian length header** followed by a UTF-8 JSON body.\n\n```\n┌──────────────┬──────────────────────────┐\n│ Length (u32) │      JSON payload        │\n│  big-endian  │                          │\n└──────────────┴──────────────────────────┘\n```\n\nAfter handshake completion, messages switch to an **authenticated frame format** that appends a 64-character hex HMAC-SHA256 signature:\n\n```\n┌──────────────┬──────────────────┬──────────────┐\n│ Length (u32) │  JSON payload    │  HMAC-SHA256  │\n│  big-endian  │                  │  (64 hex ch)  │\n└──────────────┴──────────────────┴──────────────┘\n```\n\nThe length field covers both the JSON body and the HMAC trailer. The maximum message size is **16 MB** (`MAX_MESSAGE_SIZE`).\n\n### Message Envelope\n\nEvery message is a `WireMessage` containing a unique `id` and a `WireMessageKind`:\n\n```rust\npub struct WireMessage {\n    pub id: String,           // UUID, used to correlate request/response\n    pub kind: WireMessageKind, // tagged union: Request | Response | Notification\n}\n```\n\nThe `WireMessageKind` enum is internally tagged with `\"type\"` for JSON serialization:\n\n- **`WireRequest`** — tagged by `\"method\"`: `handshake`, `discover`, `agent_message`, `ping`\n- **`WireResponse`** — tagged by `\"method\"`: `handshake_ack`, `discover_result`, `agent_response`, `pong`, `error`\n- **`WireNotification`** — tagged by `\"event\"`: `agent_spawned`, `agent_terminated`, `shutting_down`\n\n### Encoding/Decoding Functions\n\n| Function | Purpose |\n|----------|---------|\n| `encode_message(msg)` | Serializes a `WireMessage` to `Vec<u8>` (length prefix + JSON) |\n| `decode_length(header)` | Extracts the body length from a 4-byte header |\n| `decode_message(body)` | Parses a JSON byte slice into a `WireMessage` |\n\n---\n\n## Authentication & Security\n\nOFP mandates HMAC-SHA256 authentication. The `PeerConfig.shared_secret` field **must** be set — the node refuses to start without it.\n\n### Handshake Authentication\n\nBoth sides of a connection perform a mutual HMAC handshake:\n\n1. **Initiator** sends a `Handshake` request containing a random `nonce` and `auth_hmac = HMAC-SHA256(shared_secret, nonce + node_id)`.\n2. **Responder** checks the nonce for replay (via `NonceTracker`), verifies the HMAC, then replies with a `HandshakeAck` containing its own nonce and HMAC.\n3. Both sides derive a **per-session key**: `derive_session_key(shared_secret, our_nonce, their_nonce)` = `HMAC-SHA256(shared_secret, our_nonce || their_nonce)`.\n\nNonce order matters: the initiator passes `(our_nonce, ack_nonce)` and the responder passes `(their_nonce, our_nonce)`, producing the same derived key.\n\n### Per-Message HMAC\n\nAfter handshake, all subsequent messages use `write_message_authenticated` / `read_message_authenticated`, which append and verify a per-message HMAC computed over the JSON body using the session key. Any tampering or forgery results in a `WireError::HandshakeFailed`.\n\n### Replay Protection\n\n`NonceTracker` is a time-windowed (5-minute) deduplication map backed by a `DashMap`. It uses a single atomic `entry()` call to prevent TOCTOU races where two concurrent handshakes with the same replayed nonce could both pass. The tracker has a hard cap of 100,000 entries to prevent memory exhaustion under nonce-flooding attacks — once at capacity, new nonces are rejected (fail-closed).\n\n### Unauthenticated Message Rejection\n\nAny message that is not a `Handshake` request sent before completing the handshake is rejected with an `Error(401)` response. This includes `Ping`, `Discover`, and `AgentMessage`.\n\n---\n\n## Key Components\n\n### `PeerNode`\n\nThe central networking struct. Owns the TCP listener, `PeerRegistry`, and `NonceTracker`.\n\n**Lifecycle:**\n\n1. **`PeerNode::start(config, registry, handle)`** — Binds the TCP listener, spawns the accept loop, returns `(Arc<PeerNode>, JoinHandle)`.\n2. **`connect_to_peer(addr, handle)`** — Opens an outbound connection, performs the handshake, registers the peer, and spawns a connection loop.\n3. **`send_to_peer(node_id, agent, message, sender, handle)`** — One-shot message: opens a new connection, handshakes, sends an `AgentMessage`, reads the `AgentResponse`, then the connection closes.\n4. **Accept loop** — For each inbound connection, calls `handle_inbound` which performs the handshake and enters the `connection_loop`.\n\n**Connection loop** (`connection_loop`) reads messages in a loop, dispatching:\n- **Requests** → routed to `PeerHandle` methods, responses written back\n- **Notifications** → handled by `handle_notification` (updates the registry)\n- **Responses** → logged as unexpected (connection loops are for inbound traffic)\n\n### `PeerHandle` Trait\n\nThe integration point between the wire layer and the kernel. The kernel implements this trait to route remote requests to local agents:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\n- `local_agents()` — Called during handshake and discovery to advertise this node's agents.\n- `handle_agent_message()` — Routes an `AgentMessage` to the named local agent, returns the response text.\n- `discover_agents()` — Searches local agents by name, tags, or description.\n- `uptime_secs()` — Returns node uptime for `Pong` responses.\n\n### `PeerRegistry`\n\nThread-safe (`Arc<RwLock<HashMap<String, PeerEntry>>>`) store of all known peers. Each `PeerEntry` records the peer's `node_id`, `node_name`, socket `address`, advertised `agents`, `state` (`Connected`/`Disconnected`), `connected_at` timestamp, and `protocol_version`.\n\n**Key operations:**\n\n| Method | Description |\n|--------|-------------|\n| `add_peer(entry)` | Register/update a peer after handshake |\n| `remove_peer(node_id)` | Remove a peer entirely |\n| `mark_disconnected(node_id)` | Set state to `Disconnected` (kept for reconnect) |\n| `mark_connected(node_id)` | Set state back to `Connected` |\n| `get_peer(node_id)` | Get a snapshot of a specific peer |\n| `connected_peers()` | All peers in `Connected` state |\n| `find_agents(query)` | Search agents across all connected peers by name/tag/description |\n| `all_remote_agents()` | Every agent on every connected peer |\n| `add_agent(node_id, agent)` / `remove_agent(node_id, agent_id)` | Update a peer's agent list (used by notifications) |\n\n`find_agents` returns `Vec<RemoteAgent>`, which pairs each `RemoteAgentInfo` with the owning `peer_node_id`. Disconnected peers are excluded from search results.\n\n### `PeerConfig`\n\n```rust\npub struct PeerConfig {\n    pub listen_addr: SocketAddr,   // e.g., \"0.0.0.0:7000\" or \"127.0.0.1:0\" for OS-assigned\n    pub node_id: String,            // UUID — defaults to a new v4 UUID\n    pub node_name: String,          // Human-readable name\n    pub shared_secret: String,      // Required. Set via [network] shared_secret in config.toml\n}\n```\n\nWhen `listen_addr` uses port `0`, the OS assigns an ephemeral port available via `peer_node.local_addr()`.\n\n### `NonceTracker`\n\nInternal to `PeerNode`. Not exposed publicly, but critical for security:\n\n- 5-minute replay window with automatic garbage collection on each insertion.\n- 100,000 entry hard cap (fail-closed under flooding).\n- Uses `DashMap::entry()` for atomic check-and-insert, preventing TOCTOU races.\n\n---\n\n## Message Types Reference\n\n### Requests (`WireRequest`)\n\n| Method | Fields | Purpose |\n|--------|--------|---------|\n| `handshake` | `node_id`, `node_name`, `protocol_version`, `agents`, `nonce`, `auth_hmac` | Identity exchange + HMAC auth |\n| `discover` | `query` | Search agents on remote peer |\n| `agent_message` | `agent`, `message`, `sender` | Send a message to a remote agent |\n| `ping` | — | Liveness check |\n\n### Responses (`WireResponse`)\n\n| Method | Fields | Purpose |\n|--------|--------|---------|\n| `handshake_ack` | `node_id`, `node_name`, `protocol_version`, `agents`, `nonce`, `auth_hmac` | Accept handshake + mutual auth |\n| `discover_result` | `agents` | Matched agents list |\n| `agent_response` | `text` | Agent's reply text |\n| `pong` | `uptime_secs` | Liveness confirmation |\n| `error` | `code`, `message` | Error (401=auth required, 403=auth failed, 404=not found, 500=agent error) |\n\n### Notifications (`WireNotification`)\n\nOne-way messages that don't expect a response. Handled via `handle_notification` which updates the registry in place.\n\n| Event | Fields | Effect |\n|-------|--------|--------|\n| `agent_spawned` | `agent: RemoteAgentInfo` | Added to peer's agent list |\n| `agent_terminated` | `agent_id` | Removed from peer's agent list |\n| `shutting_down` | — | Peer marked disconnected |\n\nUse `broadcast_notification(registry, notification, shared_secret)` to send a notification to all connected peers. It opens a fresh TCP connection per peer, derives a per-message key from a fresh nonce, and sends an authenticated frame.\n\n---\n\n## Integration Points\n\n### From the Kernel\n\nThe kernel creates a `PeerRegistry`, implements `PeerHandle`, and calls `PeerNode::start` during initialization. Other modules interact with the wire layer through:\n\n- `peer_node.local_addr()` — Used by OAuth flows, test servers, and the desktop app server to coordinate ports.\n- `peer_node.node_id()` — Used by the network status route (`src/routes/network.rs`).\n- `peer_node.registry()` — Accessed via `all_peers()`, `connected_count()`, `find_agents()` from the network routes and WebSocket command handler.\n\n### From API/Routes\n\n- `network_status` — Reads `registry().connected_count()`, `registry().all_peers()`, `node_id()`, `local_addr()`.\n- `list_peers` — Calls `registry().all_peers()`.\n- `handle_command` (WebSocket) — Calls `registry().all_peers()`.\n\n### From Tests\n\nIntegration tests across the project use `local_addr()` to discover the dynamically assigned port for HTTP compatibility tests, daemon lifecycle tests, load tests, and API integration tests.\n\n---\n\n## Protocol Version\n\nThe current protocol version is `PROTOCOL_VERSION = 1`. Both sides verify version agreement during handshake — a mismatch returns `WireError::VersionMismatch` and an `Error` response with code 1.\n\n---\n\n## Error Handling\n\n`WireError` covers all failure modes:\n\n| Variant | When |\n|---------|------|\n| `Io` | TCP read/write failures |\n| `Json` | Malformed JSON in messages |\n| `HandshakeFailed` | Auth failures, replay detection, unexpected message order |\n| `ConnectionClosed` | Remote end closed the connection (clean shutdown) |\n| `MessageTooLarge` | Frame exceeds 16 MB limit |\n| `VersionMismatch` | Protocol version disagreement |\n\nThe connection loop treats `ConnectionClosed` as a clean exit; all other errors are logged and the peer is marked disconnected in the registry.","other-agents-md":"# Other — AGENTS.md\n\n# AGENTS.md — GitNexus Agent Instructions\n\n## Purpose\n\n`AGENTS.md` is the top-level instruction file consumed by AI coding agents (e.g., Claude Code) operating in this repository. It defines mandatory safety protocols that the agent **must** follow before modifying any code, and provides a routing table to task-specific skill files for deeper guidance.\n\nThe file sits at the root of the project and is the first thing an compliant agent reads when a session begins. It is bounded by `<!-- gitnexus:start -->` / `<!-- gitnexus:end -->` markers so that GitNexus itself can regenerate the content without disturbing surrounding documentation.\n\n## How It Works\n\nThe file is divided into four sections, each serving a distinct role in the agent's workflow:\n\n```\n┌─────────────────────────────────────────────┐\n│  Header — index metadata & staleness hint    │\n├─────────────────────────────────────────────┤\n│  Always Do — mandatory pre-edit checks       │\n├─────────────────────────────────────────────┤\n│  Never Do — hard prohibitions                │\n├─────────────────────────────────────────────┤\n│  Resources — URI-addressable knowledge base  │\n├─────────────────────────────────────────────┤\n│  CLI — task-to-skill-file routing table      │\n└─────────────────────────────────────────────┘\n```\n\n### Header\n\nStates the codebase identity (`crates`), index statistics (symbol count, relationship count, execution flow count), and instructs the agent to run `npx gitnexus analyze` if any tool reports a stale index.\n\n### Always Do\n\nFour mandatory behaviors that form the safety rail around every code change:\n\n| Behavior | GitNexus Tool Invoked | When |\n|----------|----------------------|------|\n| Impact analysis before edits | `gitnexus_impact({target, direction: \"upstream\"})` | Before modifying any function, class, or method |\n| Change detection before commit | `gitnexus_detect_changes()` | Before every commit |\n| Risk disclosure to user | — (reporting step) | When impact analysis returns HIGH or CRITICAL |\n| Flow-based code exploration | `gitnexus_query({query})` | When exploring unfamiliar code |\n| Deep symbol context lookup | `gitnexus_context({name})` | When full caller/callee/flow context is needed |\n\n### Never Do\n\nHard prohibitions designed to prevent the most common classes of AI-introduced bugs:\n\n- **No blind edits** — every symbol modification must be preceded by `gitnexus_impact`.\n- **No ignored warnings** — HIGH/CRITICAL risk results block the edit until the user explicitly approves.\n- **No find-and-replace renames** — `gitnexus_rename` understands the call graph and avoids partial or incorrect renames.\n- **No unverified commits** — `gitnexus_detect_changes()` must confirm the blast radius matches intent.\n\n### Resources\n\nFive `gitnexus://` URI templates that the agent can resolve to retrieve structured knowledge about the codebase:\n\n| URI | Content |\n|-----|---------|\n| `gitnexus://repo/crates/context` | Codebase overview and index freshness check |\n| `gitnexus://repo/crates/clusters` | All functional areas / modules |\n| `gitnexus://repo/crates/processes` | All indexed execution flows |\n| `gitnexus://repo/crates/process/{name}` | Step-by-step trace of a specific execution flow |\n\n### CLI Routing Table\n\nMaps common development tasks to the corresponding skill file under `.claude/skills/gitnexus/`:\n\n- **Exploring** → `gitnexus-exploring/SKILL.md`\n- **Impact analysis** → `gitnexus-impact-analysis/SKILL.md`\n- **Debugging** → `gitnexus-debu
