th the outside world.\n3. **Store creation** — A `wasmtime::Store` is created per-skill instance, carrying its own state and resource limits.\n4. **Instantiation** — The module is instantiated against the configured linker, producing a skill instance.\n5. **Invocation** — The skill's exported functions (e.g., `on_activate`, `on_tick`, `on_deactivate`) are called by the runtime as game events demand.\n\n### Host Function Surface\n\nSkills communicate with the engine exclusively through host functions injected into the linker. The expected categories include:\n\n- **Kernel commands** — routed through `librefang-kernel-handle`, allowing skills to query game state or request actions.\n- **HTTP requests** — proxied through `librefang-http` for skills that need external data, gated by permission checks.\n- **Serialization helpers** — utilities for skills to serialize/deserialize structured data using `serde_json`.\n\nThe exact function signatures depend on the WASI or custom ABI this module defines. When extending the host surface, prefer narrow, capability-based APIs over broad access.\n\n### Isolation Model\n\nEach skill runs in its own wasmtime `Store`. This provides:\n\n- **Memory isolation** — a skill cannot read or write another skill's linear memory.\n- **Resource limits** — CPU and memory caps can be enforced per-store.\n- **Capability restriction** — only host functions explicitly registered in the linker are callable.\n\n## Integration Points\n\n### For Engine Developers\n\nTo embed this runtime in the LibreFang kernel:\n\n1. Depend on `librefang-runtime-wasm` in your crate.\n2. Construct the runtime, passing a `librefang-kernel-handle` instance.\n3. Load skill modules from your asset pipeline.\n4. Call skill entry points in response to game events.\n\n### For Skill Authors\n\nSkills are compiled to WASM and export well-known functions. They import host functions provided by this runtime. Refer to the skill SDK documentation for the guest-side API.\n\n## Current Status\n\nThe call graph shows no detected internal, incoming, or outgoing calls, which indicates this module is in an early or scaffolded state — the dependency declarations and description define the intended architecture, but the execution paths have not yet been wired up. Contributors should expect the public API to evolve as the sandbox is implemented.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate is the top-level orchestration layer that wires together LLM drivers, sandboxing, skill execution, memory, channel I/O, MCP tooling, OAuth flows, and WASM plugin support into a coherent agent lifecycle.\n\n## Role in the System\n\n`librefang-runtime` sits at the center of the LibreFang architecture. It does not implement low-level primitives itself — instead it depends on focused sub-crates and coordinates them to provide a complete environment where agents can be instantiated, run, paused, and torn down.\n\n```\n┌──────────────────────────────────────────────────────────────┐\n│                    librefang-runtime                         │\n│                                                              │\n│  ┌─────────────┐  ┌──────────────┐  ┌────────────────────┐  │\n│  │ Agent       │  │ Skill        │  │ LLM Driver         │  │\n│  │ Lifecycle   │  │ Dispatch     │  │ Integration        │  │\n│  └──────┬──────┘  └──────┬───────┘  └────────┬───────────┘  │\n│         │                │                    │              │\n│  ┌──────┴──────┐  ┌──────┴───────┐  ┌────────┴───────────┐  │\n│  │ Sandbox     │  │ Memory       │  │ Channel I/O        │  │\n│  │ (WASM/Landlock/seccomp)│  │                    │              │\n│  └─────────────┘  └──────────────┘  └────────────────────┘  │\n│                                                              │\n│  ┌─────────────┐  ┌──────────────┐  ┌────────────────────┐  │\n│  │ MCP Runtime │  │ OAuth Runtime│  │ HTTP / WebSocket   │  │\n│  └─────────────┘  └──────────────┘  └────────────────────┘  │\n└──────────────────────────────────────────────────────────────┘\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    RT[librefang-runtime] --> Types[librefang-types]\n    RT --> HTTP[librefang-http]\n    RT --> KH[librefang-kernel-handle]\n    RT --> MCP[librefang-runtime-mcp]\n    RT --> OAuth[librefang-runtime-oauth]\n    RT --> WASM[librefang-runtime-wasm]\n    RT --> LLMDrv[librefang-llm-drivers]\n    RT --> LLM[librefang-llm-driver]\n    RT --> CH[librefang-channels]\n    RT --> MEM[librefang-memory]\n    RT --> SK[librefang-skills]\n```\n\n### Subsystem Breakdown\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types — agent IDs, messages, configuration structs |\n| `librefang-http` | HTTP client/server utilities used for outbound API calls and inbound webhooks |\n| `librefang-kernel-handle` | Low-level kernel interface for privilege management and process control |\n| `librefang-runtime-mcp` | Model Context Protocol runtime — tool registration, invocation, and result routing |\n| `librefang-runtime-oauth` | OAuth2 flow handling — token acquisition, refresh, and storage |\n| `librefang-runtime-wasm` | WebAssembly runtime powered by Wasmtime — sandboxed execution of user-supplied code |\n| `librefang-llm-drivers` / `librefang-llm-driver` | LLM provider abstraction — streaming completions, embeddings, model selection |\n| `librefang-channels` | Async channel primitives for inter-agent and agent-to-system messaging |\n| `librefang-memory` | Short-term and long-term memory — storage, retrieval, and context window management |\n| `librefang-skills` | Skill definitions, registration, and dispatch logic |\n\n## Sandbox Features\n\nThe runtime supports three complementary sandboxing mechanisms for isolating untrusted code execution. These are controlled via Cargo feature flags:\n\n### `landlock-sandbox`\n\nLinux Landlock LSM integration. Provides filesystem access control by restricting the set of paths an agent process can read, write, or execute.\n\n```toml\n# Cargo.toml\n[features]\nlandlock-sandbox = [\"dep:landlock\"]\n```\n\nAvailable only on Linux kernels ≥ 5.13.\n\n### `seccomp-sandbox`\n\nSeccomp BPF syscall filtering. Restricts the set of system calls available inside sandboxed execution contexts.\n\n```toml\n# Cargo.toml\n[features]\nseccomp-sandbox = [\"dep:seccompiler\"]\n```\n\n### `wasm-hooks`\n\nEnables hook points within the WASM execution environment, allowing agents to register callbacks at specific lifecycle stages.\n\n```toml\n# Cargo.toml\n[features]\nwasm-hooks = []\n```\n\nAll three features are optional and disabled by default. Enable them individually or combine them for defense in depth:\n\n```toml\nlibrefang-runtime = { path = \"../librefang-runtime\", features = [\"landlock-sandbox\", \"seccomp-sandbox\"] }\n```\n\n## Key External Dependencies\n\nThe runtime pulls in several categories of external crates:\n\n**Async runtime and streams:**\n- `tokio`, `tokio-stream`, `futures` — async execution and stream composition\n\n**Serialization and data:**\n- `serde`, `serde_json`, `toml` — configuration parsing and message serialization\n\n**Cryptography and security:**\n- `ed25519-dalek` — Ed25519 signing and verification\n- `sha2`, `hmac` — hashing and HMAC computation\n- `hex`, `base64` — encoding utilities\n- `rand` — secure random number generation\n- `zeroize` — secure memory wiping for secrets\n\n**WASM execution:**\n- `wasmtime` — WebAssembly runtime engine\n\n**Networking:**\n- `reqwest` — HTTP client\n- `tokio-tungstenite` — async WebSocket client\n- `rustls`, `webpki-roots`, `rustls-native-certs` — TLS without OpenSSL dependency\n- `ureq` — synchronous HTTP (used in non-async contexts such as sandbox setup)\n- `http` — HTTP type definitions\n\n**Storage:**\n- `rusqlite` — SQLite for persistent state\n- `dashmap` — concurrent hash maps for in-memory indexes\n\n**System interaction (Unix-only):**\n- `libc` — low-level POSIX bindings for process and signal management\n\n**Archiving:**\n- `flate2`, `tar` — decompression and archive extraction for bundle/package handling\n\n## Building\n\n```bash\n# Default build (no sandbox features)\ncargo build -p librefang-runtime\n\n# With full Linux sandboxing\ncargo build -p librefang-runtime --features \"landlock-sandbox,seccomp-sandbox\"\n\n# With WASM hooks enabled\ncargo build -p librefang-runtime --features \"wasm-hooks\"\n```\n\n## Testing\n\n```bash\ncargo test -p librefang-runtime\n```\n\nDev-dependencies include `tokio-test` for async test utilities.\n\n## Integration Notes\n\nWhen consuming `librefang-runtime` from a higher-level crate or application:\n\n1. **Feature selection matters.** Sandbox features are compile-time only — choose them based on your target deployment environment and security requirements.\n\n2. **Wasmtime version alignment.** The WASM runtime uses `wasmtime` as a workspace dependency. Ensure any crates that also depend on Wasmtime use the same version to avoid duplicate symbols or ABI mismatches.\n\n3. **TLS configuration.** The runtime uses `rustls` exclusively. If your deployment requires custom CA certificates, configure them via `rustls-native-certs` (system cert store) or provide roots explicitly through `webpki-roots`.\n\n4. **Platform considerations.** The `libc` dependency is gated behind `cfg(unix)`. Windows builds will compile without it, but certain low-level process management features will be unavailable.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides the registry, loader, marketplace client, and OpenClaw compatibility layer.\n\n## Purpose\n\nThis crate manages the full lifecycle of **skills** in LibreFang: discovering them on disk, loading their definitions, resolving dependencies and versions, downloading from a marketplace, and maintaining compatibility with the OpenClaw skill format. It acts as the single source of truth for what skills are available and how they're configured.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Skill Loader]\n    B --> C[Local Filesystem]\n    B --> D[Skill Archives .zip]\n    A --> E[Marketplace Client]\n    E --> F[Remote Marketplace API]\n    A --> G[OpenClaw Compat Layer]\n    G --> H[OpenClaw YAML Skills]\n    B --> I[librefang-types]\n```\n\nThe module is organized around four concerns:\n\n- **Registry** — Maintains the known set of skills, supports lookup by name and version constraint, and handles concurrent access.\n- **Loader** — Reads skill definitions from the filesystem and from zip archives, deserializing them from TOML, JSON, or YAML formats.\n- **Marketplace Client** — Downloads skills from a remote marketplace over HTTPS, verifies integrity via SHA-256 checksums, and stores them locally.\n- **OpenClaw Compatibility** — Translates OpenClaw-format skill definitions (YAML-based) into LibreFang's internal representation.\n\n## Key Dependencies & What They Enable\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared types representing skills, metadata, and configuration structures used across all LibreFang crates |\n| `serde`, `serde_json`, `toml`, `serde_yaml` | Multi-format deserialization of skill definitions |\n| `walkdir` | Recursive filesystem traversal to discover installed skills |\n| `zip` | Extraction of packaged skill archives |\n| `reqwest`, `rustls`, `webpki-roots`, `rustls-native-certs` | HTTPS client for marketplace communication with platform-native or bundled TLS roots |\n| `sha2`, `hex` | SHA-256 integrity verification of downloaded skills |\n| `semver` | Semantic version parsing and constraint resolution for skill versions |\n| `fs2` | File-based locking to prevent concurrent corruption of the skill store |\n| `aho-corasick` | Efficient multi-pattern matching for skill name lookups and search |\n| `dirs` | Resolving platform-standard directories for local skill storage |\n| `uuid`, `chrono` | Unique identifiers and timestamps for skill records |\n| `tracing` | Structured logging throughout skill operations |\n| `thiserror` | Ergonomic error type definitions |\n\n## Skill Loading Flow\n\n1. **Discovery** — The registry scans configured skill directories using `walkdir`, identifying skill definition files.\n2. **Deserialization** — Each definition is parsed from its native format (TOML, JSON, or YAML) into the shared types from `librefang-types`.\n3. **Validation** — Version constraints are checked with `semver`, and metadata integrity is confirmed.\n4. **Registration** — Validated skills are entered into the in-memory registry, protected by file locks (`fs2`) when persisting changes.\n\nFor OpenClaw-format skills, the compat layer intercepts YAML definitions and translates them before registration.\n\n## Marketplace Operations\n\nThe marketplace client handles:\n\n- **Searching** remote skill listings.\n- **Downloading** skill packages over TLS-secured connections.\n- **Verifying** SHA-256 checksums of downloaded content against published hashes.\n- **Installing** verified packages to the local skill directory, extracting archives as needed.\n\nTLS certificate verification uses either the platform's native certificate store (`rustls-native-certs`) or the bundled Mozilla roots (`webpki-roots`), depending on the build configuration.\n\n## Error Handling\n\nAll fallible operations return typed errors derived via `thiserror`. Error variants cover:\n\n- Filesystem I/O failures during discovery or installation\n- Deserialization errors for malformed skill definitions\n- Network errors from marketplace requests\n- Integrity check failures (hash mismatches)\n- Version constraint resolution failures\n- Lock contention errors from concurrent access\n\n## Integration with the Codebase\n\nThis crate depends on `librefang-types` for shared data structures and produces skill information consumed by higher-level game logic. Other LibreFang modules query the skill registry to determine available abilities, their parameters, and version compatibility — this crate does not depend on those consumers in return.\n\n## Development\n\nRun tests with:\n\n```bash\ncargo test -p librefang-skills\n```\n\nTests use `tempfile` and `tokio-test` to create isolated filesystem environments and validate async operations without touching the real skill store.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Purpose\n\nThis crate serves as the centralized metrics and observability layer for the LibreFang project. It provides shared metric definitions, helper functions, and instrumentation utilities that other crates consume to emit telemetry data. By isolating telemetry concerns into a dedicated library, all components in the workspace report metrics through a consistent interface and naming scheme.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `metrics` (workspace) | The core `metrics` facade crate — provides the `counter!`, `gauge!`, `histogram!`, and `increment_counter!` macros used throughout the project. This crate is neutral regarding the backend exporter. |\n| `librefang-types` | Shared domain types (game state enums, player identifiers, etc.) used as labels or keys in metric instrumentation. |\n| `tokio-test` (dev) | Async test utilities used in unit tests within this crate. |\n\n## Design\n\nThe crate follows the `metrics` crate's **facade pattern**: it depends only on the `metrics` API, not on any specific exporter. The actual metrics backend (e.g., Prometheus via `metrics-exporter-prometheus`) is configured at the binary/application level, not in this library. This means:\n\n- **No global state is initialized here.** The exporter is wired up by the top-level binary crate.\n- **Only definitions and helpers live here.** Metric names, label constants, and instrumentation wrappers that other crates call.\n\n## How It Connects to the Codebase\n\n```\n┌──────────────────────────┐\n│  Application Binary      │\n│  (wires up Prometheus    │\n│   exporter, starts server)│\n└───────────┬──────────────┘\n            │ depends on\n            ▼\n┌──────────────────────────┐\n│  librefang-telemetry     │◄──── other library crates import\n│  (metric definitions,    │      helpers to emit metrics\n│   label constants,       │\n│   instrumentation utils) │\n└───────────┬──────────────┘\n            │ depends on\n            ▼\n┌──────────────────────────┐\n│  librefang-types         │\n│  (shared domain types    │\n│   used as metric labels) │\n└──────────────────────────┘\n```\n\nLibrary crates such as `librefang-server` or game logic modules depend on `librefang-telemetry` to record events (e.g., connections, game rounds, errors) without coupling to any specific observability backend.\n\n## Adding New Metrics\n\nWhen instrumenting a new subsystem:\n\n1. **Define metric name constants** in this crate so naming is centralized and discoverable.\n2. **Define label key constants** to avoid string duplication across call sites.\n3. **Use the `metrics` macros** (`counter!`, `gauge!`, `histogram!`) in helper functions exposed from this crate, or re-export the macros for direct use by consumers.\n4. **Reference types from `librefang-types`** for label values when the label represents a domain concept (e.g., game phase, player role).\n\n## Testing\n\nTests use `tokio-test` for async test scenarios. Because the `metrics` facade is a no-op when no exporter is installed, tests in this crate typically verify that instrumentation helpers compile, accept the correct types, and exercise label construction logic — without needing a live metrics sink.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Test Infrastructure\n\n## Overview\n\n`librefang-testing` provides reusable mock infrastructure for testing LibreFang API routes, runtime components, and kernel behavior **without starting a full daemon**. It creates isolated, ephemeral environments using in-memory SQLite databases and temporary directories, enabling fast, deterministic unit and integration tests across the entire crate graph.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TB[TestAppState] --> MKB[MockKernelBuilder]\n    MKB -->|build| K[LibreFangKernel]\n    MKB -->|creates| TD[TempDir]\n    TB -->|holds| TD\n    TB -->|produces| R[Router /api/*]\n    H[helpers] --> TR[test_request]\n    H --> AJ[assert_json_ok]\n    H --> AE[assert_json_error]\n    MLD[MockLlmDriver] -->|implements| LD[LlmDriver trait]\n    FLD[FailingLlmDriver] -->|implements| LD\n    K -->|used by| TB\n```\n\n## Public Exports\n\nThe crate re-exports its primary types and functions from the root:\n\n```rust\nuse librefang_testing::{\n    test_request, assert_json_ok, assert_json_error,  // helpers\n    MockLlmDriver, FailingLlmDriver,                  // mock drivers\n    MockKernelBuilder,                                 // kernel builder\n    TestAppState,                                      // app state builder\n};\n```\n\n---\n\n## Components\n\n### test_request — HTTP Request Builder\n\nDefined in `helpers.rs`. Constructs an `axum::http::Request<Body>` suitable for use with `tower::ServiceExt::oneshot`.\n\n```rust\npub fn test_request(method: Method, path: &str, body: Option<&str>) -> Request<Body>\n```\n\n**Behavior:**\n- When `body` is `Some(_)`, automatically sets the `content-type: application/json` header.\n- When `body` is `None`, sends an empty body with no content-type header.\n\n**Usage:**\n\n```rust\nlet req = test_request(Method::GET, \"/api/health\", None);\n\nlet body = serde_json::json!({ \"message\": \"hello\" }).to_string();\nlet req = test_request(Method::POST, \"/api/agents/123/message\", Some(&body));\n```\n\n### assert_json_ok / assert_json_error — Response Assertions\n\nDefined in `helpers.rs`. These async functions read the full response body, assert the status code, and parse the body as JSON. They **panic** with descriptive messages on failure, including the raw response body for debugging.\n\n```rust\npub async fn assert_json_ok(response: Response<Body>) -> serde_json::Value\npub async fn assert_json_error(response: Response<Body>, expected_status: StatusCode) -> serde_json::Value\n```\n\n- `assert_json_ok` — asserts status `200 OK`.\n- `assert_json_error` — asserts an arbitrary expected error status.\n\nBoth return the parsed `serde_json::Value` for further assertions.\n\n**Typical pattern:**\n\n```rust\nlet resp = router.oneshot(req).await.expect(\"request failed\");\nlet json = assert_json_ok(resp).await;\nassert!(json.get(\"items\").is_some());\n```\n\n---\n\n### MockLlmDriver — Configurable Fake LLM Provider\n\nDefined in `mock_driver.rs`. Implements the `LlmDriver` trait from `librefang_runtime::llm_driver`. Returns canned responses in sequence and records all calls for post-hoc assertions.\n\n#### Construction\n\n```rust\n// Multiple sequential responses\nlet driver = MockLlmDriver::new(vec![\"First response\".into(), \"Second response\".into()]);\n\n// Single repeating response\nlet driver = MockLlmDriver::with_response(\"Always this\");\n```\n\nWhen the response list is exhausted, the driver wraps around to the **last** response for all subsequent calls. At least one response is required (panics otherwise).\n\n#### Builder Methods\n\n| Method | Default | Description |\n|--------|---------|-------------|\n| `with_tokens(input, output)` | `input=10, output=5` | Overrides token usage in the response |\n| `with_stop_reason(reason)` | `StopReason::EndTurn` | Overrides the stop reason |\n\n#### Call Recording\n\nEvery call to `complete` records a `RecordedCall`:\n\n```rust\npub struct RecordedCall {\n    pub model: String,\n    pub message_count: usize,\n    pub tool_count: usize,\n    pub system: Option<String>,\n}\n```\n\nRetrieve recordings:\n\n```rust\nlet calls = driver.recorded_calls();  // Vec<RecordedCall>\nlet count = driver.call_count();       // usize\n```\n\n#### Streaming Support\n\n`MockLlmDriver::stream` internally calls `complete`, then emits a `StreamEvent::TextDelta` followed by `StreamEvent::ContentComplete` on the provided channel. This simulates a minimal streaming response.\n\n#### FailingLlmDriver\n\nA separate struct that **always** returns an `LlmError::Api` on every `complete` call. Use it for testing error-handling paths:\n\n```rust\nlet driver = FailingLlmDriver::new(\"simulated API failure\");\nlet result = driver.complete(request).await;\nassert!(result.is_err());\nassert!(!driver.is_configured());  // always returns false\n```\n\n---\n\n### MockKernelBuilder — Minimal Kernel Construction\n\nDefined in `mock_kernel.rs`. Builds a real `LibreFangKernel` instance using `LibreFangKernel::boot_with_config` with an in-memory-friendly configuration:\n\n- **Database**: SQLite file inside a temp directory (`<tmp>/data/test.db`)\n- **Networking**: Disabled (`network_enabled = false`)\n- **Directories**: Temp directories for `home`, `data`, `skills`, and agent/hAND workspaces\n- **Heavy services**: OFP, cron, and network listeners are skipped\n\n#### API\n\n```rust\n// Default minimal kernel\nlet (kernel, _tmp) = MockKernelBuilder::new().build();\n\n// Custom configuration\nlet (kernel, _tmp) = MockKernelBuilder::new()\n    .with_config(|cfg| {\n        cfg.language = \"zh\".into();\n        cfg.default_model.provider = \"test\".into();\n    })\n    .build();\n\n// Convenience function (equivalent to new().build())\nlet (kernel, _tmp) = test_kernel();\n```\n\n**Critical:** The caller **must hold onto the returned `TempDir`** for the lifetime of the kernel. Dropping it deletes the temp directory, invalidating any file paths the kernel references.\n\n#### Where It's Used Across the Codebase\n\n`MockKernelBuilder::build` is the primary entry point for creating test kernels across the entire project. Modules that depend on it include:\n\n- `librefang-http` — proxy configuration tests\n- `librefang-runtime` — provider health probes, model catalog, web fetch, web search, plugin management, tool execution\n- `librefang-runtime-mcp` — MCP connection and OAuth metadata discovery\n- `librefang-runtime-oauth` — device flow OAuth\n- `librefang-skills` — ClawHub, SkillHub, marketplace\n- `librefang-cli` — daemon discovery, MCP backend creation\n- `librefang-desktop` — build script\n- `librefang-runtime-wasm` — host function network access\n\n---\n\n### TestAppState — Full API Router for Testing\n\nDefined in `test_app.rs`. Combines `MockKernelBuilder` with `AppState` construction to produce a fully-wired `axum::Router` for testing API endpoints end-to-end.\n\n#### Construction\n\n```rust\n// Default\nlet app = TestAppState::new();\n\n// Custom kernel builder\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| { /* ... */ })\n);\n\n// From an existing kernel\nlet (kernel, tmp) = MockKernelBuilder::new().build();\nlet app = TestAppState::from_kernel(kernel, tmp);\n```\n\n#### Getting a Router\n\n```rust\nlet router = app.router();\n```\n\nThis produces an `axum::Router` with all API routes nested under `/api`, mirroring the production setup. The router covers:\n\n| Category | Routes |\n|----------|--------|\n| System | `health`, `health/detail`, `status`, `version`, `metrics` |\n| Agents | CRUD, `message`, `stop`, `model`, `mode`, `session(s)`, `tools`, `skills`, `logs` |\n| Profiles | `list`, `get` |\n| Skills | `list`, `create` |\n| Config | `get`, `schema`, `set`, `reload` |\n| Memory | `search`, `stats` |\n| Usage | `stats`, `summary` |\n| Tools/Commands | `list`, `get` |\n| Models/Providers | `list` |\n| Sessions | `list` |\n\n#### Sending Requests\n\nUse `tower::ServiceExt::oneshot` with the router:\n\n```rust\nuse tower::ServiceExt;\n\nlet app = TestAppState::new();\nlet router = app.router();\n\nlet req = test_request(Method::GET, \"/api/agents\", None);\nlet resp = router.oneshot(req).await.expect(\"request failed\");\nlet json = assert_json_ok(resp).await;\nassert!(json[\"items\"].is_array());\n```\n\n#### Accessing State Directly\n\n```rust\nlet state: Arc<AppState> = app.app_state();\nlet state: Arc<AppState> = app.state.clone();  // equivalent via pub field\n```\n\nThe `AppState` is the same production type from `librefang_api::routes`, with kernel, channels config, caches, and all other fields populated. Some fields (like `peer_registry`, `prometheus_handle`) are set to `None` since they aren't needed for most route tests.\n\n---\n\n## Typical Test Patterns\n\n### Pattern 1: Testing a GET Endpoint\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_my_endpoint() {\n    let app = TestAppState::new();\n    let router = app.router();\n\n    let req = test_request(Method::GET, \"/api/skills\", None);\n    let resp = router.oneshot(req).await.unwrap();\n    let json = assert_json_ok(resp).await;\n\n    assert!(json[\"items\"].is_array());\n}\n```\n\n### Pattern 2: Testing Error Responses\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_not_found() {\n    let app = TestAppState::new();\n    let router = app.router();\n\n    let req = test_request(Method::GET, \"/api/agents/nonexistent-uuid\", None);\n    let resp = router.oneshot(req).await.unwrap();\n    let json = assert_json_error(resp, StatusCode::NOT_FOUND).await;\n\n    assert!(json.get(\"error\").is_some());\n}\n```\n\n### Pattern 3: POST with JSON Body\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_create_resource() {\n    let app = TestAppState::new();\n    let router = app.router();\n\n    let body = serde_json::json!({ \"name\": \"test\" }).to_string();\n    let req = test_request(Method::POST, \"/api/agents\", Some(&body));\n    let resp = router.oneshot(req).await.unwrap();\n    assert!(resp.status() == StatusCode::OK || resp.status() == StatusCode::CREATED);\n}\n```\n\n### Pattern 4: Mocking LLM Responses\n\n```rust\n#[tokio::test]\nasync fn test_with_mock_llm() {\n    let driver = MockLlmDriver::with_response(\"Hello world\")\n        .with_tokens(50, 20)\n        .with_stop_reason(StopReason::EndTurn);\n\n    let resp = driver.complete(request).await.unwrap();\n    assert_eq!(resp.text(), \"Hello world\");\n    assert_eq!(driver.call_count(), 1);\n}\n```\n\n### Pattern 5: Kernel-Only Tests (No HTTP)\n\nFor components that need a kernel but not an HTTP router:\n\n```rust\nlet (kernel, _tmp) = MockKernelBuilder::new()\n    .with_config(|cfg| cfg.network_enabled = false)\n    .build();\n\n// Use kernel.registry, kernel.memory, etc. directly\n```\n\n---\n\n## Runtime Requirements\n\n- Tests using `TestAppState` or `MockKernelBuilder::build` require `#[tokio::test(flavor = \"multi_thread\")]` because the kernel boots async runtime services internally.\n- Tests using only `MockLlmDriver` or `FailingLlmDriver` can use standard `#[tokio::test]`.\n- The `multi_thread` flavor is necessary because `boot_with_config` spawns background tasks and uses `tokio::sync` primitives that require a multi-threaded runtime.\n\n## Internal Utility\n\nThe `read_body` function in `helpers.rs` is a private async helper that consumes a `Response<Body>` and returns the full body as a `String`, panicking on collection or UTF-8 decoding errors.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure for the LibreFang workspace. Provides reusable mock implementations and HTTP test utilities so that integration tests across all crates can run without real kernel hardware, LLM backends, or network services.\n\n## Purpose\n\nTesting a multi-crate system like LibreFang requires consistent, deterministic test doubles. This crate centralizes three categories of test support:\n\n- **Mock kernel** — simulates the kernel interface in-process, allowing tests to exercise runtime, channel, skill, hand, and extension code without hardware or elevated privileges.\n- **Mock LLM driver** — returns canned or configurable responses, enabling skill and extension tests to run offline and deterministically.\n- **API route test utilities** — helpers for constructing Axum router instances, sending requests through the full middleware stack, and asserting on responses, including telemetry-enabled routes.\n\nBecause every other workspace crate can depend on `librefang-testing` in `[dev-dependencies]`, the mock implementations and test helpers serve as the single source of truth for how test environments are configured.\n\n## Position in the Workspace\n\n```mermaid\ngraph TD\n    TT[librefang-testing]\n    TT --> TK[librefang-kernel]\n    TT --> TR[librefang-runtime]\n    TT --> TM[librefang-memory]\n    TT --> TA[librefang-api]\n    TT --> TW[librefang-wire]\n    TT --> TC[librefang-channels]\n    TT --> TS[librefang-skills]\n    TT --> TH[librefang-hands]\n    TT --> TE[librefang-extensions]\n    TT --> TT2[librefang-types]\n    TA -->|telemetry feature| TT\n```\n\n`librefang-testing` sits at the top of the dependency graph as a consumer, not a library depended upon by production crates. It pulls in nearly every sibling crate so it can wire them together into realistic test scenarios.\n\n## Key Dependencies and Their Roles\n\n| Dependency | Why it's needed |\n|---|---|\n| `librefang-kernel` | Provides the kernel trait/interface that the mock kernel must implement or wrap. |\n| `librefang-runtime` | Test environments need a runtime to execute async tasks under realistic conditions. |\n| `librefang-memory` | In-memory storage backends used by mocks to avoid touching disk or external services. |\n| `librefang-api` | Imported with `telemetry` feature enabled so route tests can cover the full middleware stack including observability. |\n| `librefang-wire` | Wire-protocol types are needed to construct valid request/response payloads in API tests. |\n| `librefang-channels`, `librefang-skills`, `librefang-hands`, `librefang-extensions` | Tested components; the mocks and helpers exist to exercise these crates' integration points. |\n| `librefang-types` | Shared domain types used throughout assertions and mock response construction. |\n| `axum` + `tower` | The API layer is built on Axum; test utilities use `tower::ServiceExt` to call routes without binding a real HTTP listener. |\n| `http-body-util` | Body extraction helpers for reading Axum response bodies in tests. |\n| `dashmap` | Concurrent map used internally by mocks to track state across async test steps. |\n| `tempfile` | Creates temporary directories for tests that need filesystem interaction without polluting the build tree. |\n| `uuid` | Generates deterministic or random UUIDs for test entities. |\n\n## Mock Kernel\n\nThe mock kernel replaces the real kernel backend with an in-process implementation. This allows tests to:\n\n1. **Boot a simulated environment** without kernel modules or privileged operations.\n2. **Inspect submitted commands** — the mock records what was sent so tests can assert on invocation order, arguments, and frequency.\n3. **Inject controlled responses** — configure the mock to return specific results, errors, or delays for exercising error paths and timeouts.\n\nState is typically held in `DashMap`-backed structures so that concurrent test tasks (e.g., multiple skills running simultaneously) interact safely with the mock.\n\n## Mock LLM Driver\n\nThe mock LLM driver provides offline, deterministic LLM responses. Key capabilities:\n\n- **Pre-configured responses** — register expected prompts and their corresponding completions before the test runs.\n- **Verification** — after the test, inspect which prompts were actually sent to confirm skill logic invokes the LLM correctly.\n- **Error simulation** — configure the driver to return errors or malformed output to test fallback and retry logic in skills and extensions.\n\nThis eliminates network latency, API costs, and non-determinism from LLM-powered test paths.\n\n## API Route Test Utilities\n\nThese helpers wrap Axum's testing patterns to reduce boilerplate across the workspace. A typical test flow:\n\n1. Build an application router with the desired routes and middleware, including the telemetry layer from `librefang-api`'s `telemetry` feature.\n2. Use `tower::ServiceExt::oneshot` (or similar) to send a constructed request through the router.\n3. Use `http_body_util::BodyExt` to collect and deserialize the response body.\n4. Assert on status codes, headers, and response payloads.\n\nBecause the router is constructed in-process, these tests execute quickly and can be run in CI without port-binding conflicts.\n\n## Usage in Other Crates\n\nAdd to `[dev-dependencies]`:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\nThen import the mock implementations or test helpers needed for the specific test. Each mock is designed to be constructed inline within a test function, configured for that test's scenario, and dropped at the end — no global state or test ordering requirements.\n\n## Design Principles\n\n- **No shared mutable global state.** Mocks are instantiated per-test, with internal state managed through concurrency-safe containers like `DashMap`.\n- **Deterministic by default.** Timestamps, UUIDs, and random values should be controlled or seeded so that test runs are reproducible.\n- **Feature parity with production paths.** Mocks implement the same traits as production implementations, ensuring that tests exercise the same code paths that run in production, just with different backends.\n- **Minimal test boilerplate.** Common setup patterns (router construction, mock wiring, response deserialization) are extracted into reusable helpers so individual test functions remain focused on assertions.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types-locales\n\nLocalization data for LibreFang API error messages, stored as [Project Fluent](https://projectfluent.org/) (`.ftl`) message catalogs.\n\n## Purpose\n\nThis module holds the human-readable error strings returned by the LibreFang API. Each locale file maps a stable message identifier to a translated string, allowing the API surface to remain locale-aware without hardcoding user-facing text in business logic.\n\n## Directory Layout\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl      # German\n├── en/errors.ftl      # English (canonical / most complete)\n├── es/errors.ftl      # Spanish\n├── fr/errors.ftl      # French\n├── ja/errors.ftl      # Japanese\n└── zh-CN/errors.ftl   # Simplified Chinese\n```\n\nEvery locale uses the same file name (`errors.ftl`) and the same message identifiers. The Fluent runtime resolves which file to load based on the requested locale at runtime.\n\n## Message Identifier Convention\n\nAll identifiers follow the pattern:\n\n```\napi-error-<domain>-<detail>\n```\n\n| Segment | Meaning |\n|---------|---------|\n| `api-error-` | Constant prefix — scopes these keys to API-level errors |\n| `<domain>` | The subsystem or resource type (e.g. `agent`, `session`, `webhook`) |\n| `<detail>` | Specific error condition (e.g. `not-found`, `missing-url`, `too-large`) |\n\nExamples:\n\n```ftl\napi-error-agent-not-found = Agent not found\napi-error-webhook-url-unreachable = Webhook URL is unreachable: { $error }\napi-error-goal-circular-parent = Circular parent reference detected\n```\n\n## Interpolated Variables\n\nSome messages include Fluent variables enclosed in `{ $name }` syntax. The calling code must supply these values at lookup time.\n\nCommon variables:\n\n| Variable | Used by | Example |\n|----------|---------|---------|\n| `$reason` | `bad-request`, `message-delivery-failed` | `\"Bad request: { $reason }\"` |\n| `$error` | `*-failed`, `*-parse-failed` messages | `\"Failed to parse configuration: { $error }\"` |\n| `$name` | `template-not-found`, `profile-not-found`, `provider-unknown` | `\"Unknown provider '{ $name }'\"` |\n| `$id` | `agent-not-found-with-id`, `goal-not-found-with-id` | `\"Agent not found: { $id }\"` |\n| `$step` | `workflow-step-needs-agent` | `\"Step '{ $step }' needs 'agent_id' or 'agent_name'\"` |\n| `$alias` | `provider-alias-exists`, `provider-alias-not-found` | `\"Alias '{ $alias }' already exists\"` |\n| `$url` | `network-a2a-not-found`, `network-missing-url` | `\"A2A agent '{ $url }' not found\"` |\n| `$status` | `network-auth-failed` | `\"Authentication failed (HTTP { $status })\"` |\n| `$event` | `webhook-unknown-event` | `\"Unknown event type '{ $event }'...\"` |\n| `$valid` | `agent-invalid-sort`, `webhook-unknown-event` | `\"Valid fields: { $valid }\"` |\n| `$field` | `agent-invalid-sort` | `\"Invalid sort field '{ $field }'...\"` |\n| `$max` | `skill-description-too-long`, `file-too-large` | `\"File too large (max { $max })\"` |\n| `$provider` | `provider-model-exists` | `\"...in provider '{ $provider }'\"` |\n\n## Domain Coverage\n\nMessages are organized into these domains. English (`en/errors.ftl`) is the authoritative source and defines the full set:\n\n| Domain | Example messages | EN count |\n|--------|-----------------|----------|\n| Agent | `not-found`, `spawn-failed`, `invalid-id`, `execution-failed`, `clone-spawn-failed` | 17 |\n| Message | `too-large`, `delivery-failed`, `required`, `streaming-failed` | 5 |\n| Template | `invalid-name`, `not-found`, `parse-failed`, `required` | 6 |\n| Manifest | `too-large`, `invalid-format`, `signature-mismatch`, `signature-failed` | 5 |\n| Auth | `invalid-key`, `missing-header`, `missing` | 3 |\n| Session | `load-failed`, `not-found`, `cleanup-*-failed` | 7 |\n| Workflow | `missing-steps`, `step-needs-agent`, `execution-failed` | 5 |\n| Trigger | `missing-agent-id`, `invalid-pattern`, `registration-failed` | 7 |\n| Budget | `invalid-amount`, `update-failed`, `provide-at-least-one` | 3 |\n| Config | `parse-failed`, `write-failed`, `save-failed`, `remove-failed` | 5 |\n| Profile | `not-found` | 1 |\n| Cron | `invalid-id`, `not-found`, `invalid-expression-detail` | 6 |\n| Goal | `not-found`, `circular-parent`, `progress-range`, `save-failed` | 16 |\n| Memory | `not-enabled`, `export-failed`, `missing-kv`, `serialization-error` | 9 |\n| Network / A2A | `not-enabled`, `connection-failed`, `auth-failed` | 7 |\n| Plugin | `missing-name`, `missing-path`, `invalid-source` | 5 |\n| Channel | `unknown`, `invalid-from`, `invalid-to` | 4 |\n| Provider | `missing-alias`, `alias-exists`, `secrets-write-failed` | 22 |\n| Skill | `invalid-name`, `only-prompt`, `install-failed` | 10 |\n| Hand | `not-found`, `definition-not-found`, `instance-not-found` | 3 |\n| MCP | `missing-name`, `missing-transport`, `invalid-config` | 5 |\n| Integration / Extension | `not-found`, `missing-id` | 3 |\n| System | `cli-not-found` | 1 |\n| KV | `missing-fields`, `missing-value`, `missing-path` | 4 |\n| Approval | `invalid-id`, `not-found` | 2 |\n| Webhook | `not-enabled`, `url-unreachable`, `unknown-event` | 14 |\n| Backup | `not-found`, `missing-manifest`, `dir-create-failed` | 11 |\n| Schedule | `not-found`, `missing-cron`, `invalid-cron-detail` | 10 |\n| Job | `invalid-id`, `not-retryable`, `disappeared-cancel` | 5 |\n| Task | `not-found`, `disappeared` | 2 |\n| Pairing | `not-enabled`, `invalid-token` | 2 |\n| Binding | `out-of-range` | 1 |\n| Command | `not-found` | 1 |\n| File / Upload | `not-found`, `too-large`, `path-traversal` | 14 |\n| Tool | `provide-allowlist`, `not-found` | 2 |\n| Validation | `content-empty`, `color-invalid`, `avatar-url-invalid` | 5 |\n| General | `not-found`, `internal`, `bad-request`, `rate-limited` | 4 |\n\n## Locale Completeness\n\nThe English catalog is the most comprehensive. Other locales fall into two tiers:\n\n**Tier 1 — Near-complete** (follows `en` closely, includes newer domains like goals, memory, network, webhooks, backups, schedules, file uploads):\n- `ja` (Japanese)\n\n**Tier 2 — Core subset** (covers foundational domains: agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, plus general errors):\n- `de` (German)\n- `es` (Spanish)\n- `fr` (French)\n- `zh-CN` (Simplified Chinese)\n\nWhen adding new error messages, update `en/errors.ftl` first, then propagate to other locales.\n\n## Adding a New Error Message\n\n1. **Define the key in English** (`locales/en/errors.ftl`):\n   ```ftl\n   api-error-<domain>-<detail> = Human-readable message with optional { $variable }\n   ```\n\n2. **Add translations** to each locale file under the same identifier. If a translation is not yet available, the Fluent runtime will fall back to the English string (depending on the configured fallback chain).\n\n3. **Use the message in code** by referencing the identifier string exactly. For example, in Rust with the `fluent` crate:\n   ```rust\n   let msg = bundle.get_message(\"api-error-agent-not-found\");\n   ```\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g. `pt-BR/`).\n2. Copy `en/errors.ftl` into the new directory as a starting template.\n3. Translate all message values, preserving:\n   - The message identifier (left-hand side) exactly as-is.\n   - Variable syntax (`{ $name }`) exactly as-is.\n   - Any literal formatting such as `Bearer <api_key>` or size limits like `(max 64KB)` — verify whether these should be localized or kept as-is for your locale.\n\n## Integration with the Codebase\n\nThis module is a **pure data module** — it contains no executable code, no function calls, and no type definitions. Other crates in the workspace consume these `.ftl` files at build time or runtime via a Fluent localization bundle. The `librefang-types` crate likely includes these files as `include_str!` resources or bundles them into the binary for the API server to look up error messages by identifier when constructing error responses.","other-librefang-types-src":"# Other — librefang-types-src\n\n# Model Catalog Types (`librefang-types/src/model_catalog.rs`)\n\nShared data structures that define how LLM providers and their models are represented throughout the application. Every crate that needs to read, merge, or display model catalog information depends on these types.\n\n## Overview\n\nThe types here serve two distinct serialization contexts:\n\n- **TOML catalog files** — community-maintained `providers/*.toml` files that declare providers and models. Represented by `ProviderCatalogToml`, `ModelCatalogFile`, and `AliasesCatalogFile`.\n- **Runtime state** — provider metadata enriched with live authentication status, model counts, and proxy configuration. Represented by `ProviderInfo` and `ModelOverrides`.\n\nThe conversion from catalog-file types to runtime types is one-directional: `ProviderCatalogToml` → `ProviderInfo` via the `From` impl, which fills runtime-only fields with defaults.\n\n## Core Types\n\n### `ModelTier`\n\nCapability classification for models, ordered from most to least powerful:\n\n| Variant | Examples | Serde form |\n|---|---|---|\n| `Frontier` | Claude Opus, GPT-4.1 | `\"frontier\"` |\n| `Smart` | Claude Sonnet, Gemini 2.5 Flash | `\"smart\"` |\n| `Balanced` *(default)* | GPT-4o-mini, Groq Llama | `\"balanced\"` |\n| `Fast` | Cheapest models for trivial tasks | `\"fast\"` |\n| `Local` | Ollama, vLLM, LM Studio | `\"local\"` |\n| `Custom` | User-defined at runtime | `\"custom\"` |\n\nImplements `Display` (lowercase name) and serde's `rename_all = \"lowercase\"`.\n\n### `AuthStatus`\n\nTracks the full lifecycle of provider credential detection:\n\n```\nMissing ──► Configured ──► ValidatedKey    (live probe confirms key works)\n              │\n              ▼\n          InvalidKey                   (HTTP 401/403 from provider)\n\nMissing ──► AutoDetected               (key found via fallback env var)\nMissing ──► ConfiguredCli              (CLI tool like claude-code available)\nMissing ──► CliNotInstalled            (CLI provider, but tool not found)\n\nNotRequired                            (local providers)\nNotRequired ◄─► LocalOffline           (local service probe failed)\n```\n\n**`is_available()`** — returns `true` for `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Returns `false` for `InvalidKey`, `Missing`, `CliNotInstalled`, and `LocalOffline`. This method is the primary gate used by API routes, WebSocket handlers, and the runtime catalog to decide whether a provider can be used for inference.\n\nNote: `LocalOffline` is special — `detect_auth()` will **not** reset it. Only the background probe that detected the service going offline can transition it back to `NotRequired`.\n\n### `ModelCatalogEntry`\n\nA single model in the catalog with all metadata needed for routing and cost estimation:\n\n- **Identity**: `id` (canonical), `display_name`, `provider`, `aliases`\n- **Capability**: `tier`, `context_window`, `max_output_tokens`\n- **Feature flags**: `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`\n- **Pricing**: `input_cost_per_m`, `output_cost_per_m` (USD per million tokens)\n\nAll boolean feature flags default to `false`. The `provider` field defaults to empty — when omitted in community catalog files, it is inferred from the `[provider].id` section during catalog merge (handled in `librefang-runtime`).\n\n### `ModelOverrides`\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` — `None` means \"use the layer above\":\n\n```\nAgent-level ModelConfig  →  ModelOverrides  →  System defaults\n       (highest precedence)                      (lowest)\n```\n\nFields include `temperature`, `top_p`, `max_tokens`, `frequency_penalty`, `presence_penalty`, `reasoning_effort`, and behavioral flags (`use_max_completion_tokens`, `no_system_role`, `force_max_tokens`).\n\nUse `is_empty()` to check if no overrides are set (all fields `None`).\n\n### `ModelType`\n\nClassifies a model as `Chat` (default), `Speech`, or `Embedding`. Stored in `ModelOverrides.model_type` to override the default assumption that catalog models are chat models.\n\n## Provider Types\n\n### `ProviderCatalogToml` → `ProviderInfo`\n\n```mermaid\nflowchart LR\n    subgraph \"TOML catalog file\"\n        PCT[ProviderCatalogToml]\n    end\n    subgraph \"Runtime\"\n        PI[ProviderInfo]\n    end\n    PCT -- \"From impl\" --> PI\n    note[\"+ auth_status = Missing\\n+ model_count = 0\\n+ available_models = []\\n+ is_custom = false\\n+ proxy_url = None\"]\n```\n\n`ProviderCatalogToml` maps 1:1 to the `[provider]` TOML section. It intentionally omits runtime-only fields so it can be cleanly deserialized from disk.\n\n`ProviderInfo` adds the runtime layer:\n\n| Field | Purpose |\n|---|---|\n| `auth_status` | Live credential detection state |\n| `model_count` | Number of models from this provider in the catalog |\n| `available_models` | Model IDs confirmed by live API probe (empty until background validation) |\n| `is_custom` | `true` if added via dashboard \"Add provider\" (not from registry) |\n| `proxy_url` | Per-provider proxy override |\n| `media_capabilities` | e.g. `\"image_generation\"`, `\"text_to_speech\"` |\n\nWhen `is_custom` is `true`, the dashboard shows a full \"Delete\" control. Built-in providers can only be deconfigured (key removed) because registry sync would recreate their TOML on next boot.\n\n### `RegionConfig`\n\nPer-region endpoint overrides within a provider. Each region has its own `base_url` and an optional `api_key_env` override. When `api_key_env` is `None`, the provider-level key is used.\n\nRegion selection at runtime:\n\n```rust\nlet resolved_url = provider\n    .regions\n    .get(selected_region)\n    .map(|r| r.base_url.as_str())\n    .unwrap_or(&provider.base_url);\n```\n\n## File Formats\n\n### `ModelCatalogFile`\n\nThe unified TOML format for both the main repository and community model catalogs:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\n\n# Optional regional endpoints\n[provider.regions.us]\nbase_url = \"https://us.api.anthropic.com\"\napi_key_env = \"ANTHROPIC_API_KEY_US\"  # optional override\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nThe `provider` section is optional — catalog files that only contain models rely on the provider being resolved during merge.\n\n### `AliasesCatalogFile`\n\nSimple short-name → canonical-ID mapping:\n\n```toml\n[aliases]\nsonnet = \"claude-sonnet-4-20250514\"\nhaiku = \"claude-haiku-4-5-20251001\"\n```\n\n## Cross-Crate Usage\n\nThese types are consumed across the codebase:\n\n- **`librefang-runtime`** — merges discovered models into `ModelCatalogEntry`, calls `is_available()` to filter available models\n- **`librefang-api`** — channel bridge and WebSocket handler call `is_available()` before routing requests\n- **`librefang-kernel-metering`** — reads `ModelCatalogFile` for cost estimation (with fallback to legacy budget rates when pricing is zero)\n- **HTTP routes** (`src/routes/agents.rs`, `src/routes/providers.rs`) — gate agent creation and model listing behind `is_available()`\n\nAll serde serialization uses `skip_serializing_if` on optional/empty fields in `ModelOverrides` and `ProviderInfo` to keep persisted output clean.","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# librefang-types: Agent Manifest Round-Trip Tests\n\n## Purpose\n\nThis test module (`agent_form_roundtrip.rs`) validates that the Rust `AgentManifest` deserializer can correctly parse the exact TOML output produced by the dashboard's visual editor. Its primary goal is **drift detection**: if the TypeScript serializer in `crates/librefang-api/dashboard/src/lib/agentManifest.ts` changes its output format and the Rust types in `librefang_types::agent` aren't updated accordingly, these tests will fail at build time.\n\nThis is not a general fuzzing or property-test suite. Each test case mirrors a specific code path in the dashboard's form serializer.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Dashboard Form<br/>TypeScript] -->|serializes| B[TOML string]\n    B -->|toml::from_str| C[AgentManifest<br/>Rust struct]\n    A -.->|must match| C\n    D[agent_form_roundtrip.rs] -->|asserts| C\n```\n\nThe contract being tested is: **for any TOML the dashboard emits, `toml::from_str::<AgentManifest>` must succeed and produce the expected struct values.**\n\n## Test Cases\n\n### `parses_form_minimum_viable_output`\n\nTests the smallest valid manifest the form can emit. Contains only the required fields:\n\n- `name`, `version`, `module`\n- A `[model]` section with `provider` and `model`\n\nVerifies that optional sections (`resources`, `capabilities`, `tags`, etc.) are not required for parsing to succeed.\n\n### `parses_form_full_output_with_capabilities_and_resources`\n\nTests a manifest with all \"standard\" (non-advanced) sections filled in:\n\n- `tags`, `skills`, `description`\n- `[model]` with `system_prompt`, `temperature`, `max_tokens`\n- `[resources]` with rate and cost limits\n- `[capabilities]` with `network`, `shell`, and `agent_spawn`\n\n### `parses_form_with_advanced_sections`\n\nThe most comprehensive test. Covers every advanced section the form's serializer emits:\n\n| Section | Fields tested |\n|---|---|\n| Top-level | `priority`, `session_mode`, `web_search_augmentation`, `schedule`, `exec_policy` |\n| `[thinking]` | `budget_tokens`, `stream_thinking` |\n| `[autonomous]` | `max_iterations`, `heartbeat_channel` |\n| `[routing]` | `simple_model`, `medium_model`, `complex_model`, thresholds |\n| `[[fallback_models]]` | Array-of-tables with `provider`/`model` |\n| `[[context_injection]]` | Array-of-tables with `name`/`content`/`position` |\n| `[capabilities]` | `memory_read`, `memory_write`, `agent_message`, `ofp_connect` |\n\nThis test is the most sensitive to field renames or enum variant changes.\n\n### `parses_form_response_format_json_schema`\n\nTests the `response_format` field when the form emits a `json_schema` type. The form serializes the JSON schema as an inline TOML table, and this test confirms the kernel deserializes it into `ResponseFormat::JsonSchema` with correct `name` and `strict` values.\n\n### `omitting_optional_sections_uses_defaults`\n\nTests the behavior when the form emits no `[resources]` or `[capabilities]` sections at all. Verifies that:\n\n- `capabilities.network` defaults to an empty vec\n- `capabilities.agent_spawn` defaults to `false`\n- `resources.max_llm_tokens_per_hour` is `None` (inherits global default)\n\n## Maintenance Guidelines\n\n**When adding a new field to `AgentManifest` or changing an existing field name/type**, you must:\n\n1. Update the Rust struct in `librefang_types::agent`.\n2. Update the TypeScript serializer in `agentManifest.ts`.\n3. Add or update the relevant test case here to cover the new/changed field.\n\n**When adding a new advanced section to the form**, add a corresponding test case that includes every field in that section. Mirror the exact TOML structure the TypeScript serializer produces — do not hand-write \"representative\" TOML.\n\n**If a test fails after a TypeScript change but the Rust types are correct**, the test TOML string needs to be updated to match the new serializer output. Copy the actual TOML output from the dashboard rather than guessing.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nCore type definitions, traits, and shared data structures for the LibreFang Agent OS.\n\n## Purpose\n\nThis crate serves as the foundational type layer for the LibreFang system. It defines the shared vocabulary — data structures, enums, traits, error types, and configuration models — that all other crates in the workspace consume. By isolating types into their own crate, the system avoids circular dependencies and ensures that multiple components can communicate through a common type contract without coupling to implementation details.\n\nThe crate is **pure data and trait definitions**. It contains no business logic, no I/O, and no side effects. No execution flows originate from or pass through this module.\n\n## Dependency Rationale\n\nThe dependencies chosen signal the specific domains this crate covers:\n\n| Dependency | Role in this crate |\n|---|---|\n| `serde`, `serde_json` | Derive `Serialize`/`Deserialize` on all wire types for JSON and generic serialization |\n| `chrono` | Timestamp types for events, logs, and scheduling |\n| `uuid` | Unique identifiers for agents, tasks, sessions |\n| `thiserror` | Ergonomic error type derivation for domain-specific error enums |\n| `toml` | Deserialization of configuration files into typed config structs |\n| `dirs` | Resolution of standard platform directories for default config/data paths |\n| `async-trait` | Async-capable trait definitions for agent backends and transport layers |\n| `ed25519-dalek`, `sha2`, `hex`, `rand` | Cryptographic types — key pairs, signatures, digests — for agent identity and message authentication |\n| `fluent`, `unic-langid` | Internationalization types for localizable user-facing messages |\n| `regex-lite` | Pattern types for validation rules and input matching |\n\nThe `rmp-serde` dev-dependency indicates that types are tested for MessagePack round-trip serialization in addition to JSON, suggesting the system supports multiple wire formats.\n\n## Architectural Role\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[Agent Runtime]\n    A --> C[Transport Layer]\n    A --> D[CLI / Frontend]\n    A --> E[Task Scheduler]\n    A --> F[Plugin System]\n    style A fill:#2d5016,stroke:#5a8a32,color:#fff\n```\n\nEvery other crate in the workspace depends on `librefang-types`. No crate in the workspace depends on it transitively through another crate — it is always a direct dependency, keeping the type layer flat and explicit.\n\n## Type Categories\n\n### Identity and Cryptography\n\nTypes derived from `ed25519-dalek` and `sha2` define the agent identity model. Ed25519 key pairs represent agent identities. SHA-256 digests provide content-addressable references for tasks, configurations, and artifacts. The `hex` crate handles human-readable encoding of keys and hashes. The `rand` crate supports key generation and nonce creation.\n\nThese types implement `Serialize`/`Deserialize` so they can be transmitted over the wire and persisted to disk.\n\n### Messaging and Wire Protocol\n\nAll message types — requests, responses, events, and acknowledgements — are defined here with serde support. The dual testing against both JSON and MessagePack (via `rmp-serde` in dev-dependencies) ensures the types remain format-agnostic.\n\n### Configuration\n\nTyped configuration structs deserialized from TOML files. The `dirs` crate provides default path resolution so that configuration structs can express platform-appropriate fallback values (e.g., `~/.config/librefang/` on Linux, `%APPDATA%` on Windows).\n\n### Error Types\n\nDomain error enums derived with `thiserror`. These encode all failure modes that cross crate boundaries — transport errors, validation errors, crypto errors, and configuration errors. Each variant carries context appropriate to its category.\n\n### Async Traits\n\nTraits annotated with `#[async_trait]` define the async interfaces that implementing crates must satisfy — agent backends, message transports, storage adapters, and similar pluggable components.\n\n### Localization\n\nTypes integrating `fluent` and `unic-langid` support localizable message strings. This allows the system to present logs, errors, and user-facing text in the agent's configured language.\n\n## Usage Patterns\n\nOther crates depend on this library by adding it to their `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-types = { path = \"../librefang-types\" }\n```\n\nAll public types are re-exported from the crate root. Consumers import them directly:\n\n```rust\nuse librefang_types::{AgentId, TaskRequest, Config, Error};\n```\n\n## Adding New Types\n\nWhen adding types to this crate, follow these constraints:\n\n1. **No logic.** Types should be data carriers. Methods should be limited to constructors, accessors, and pure conversions. If you find yourself writing business logic, it belongs in a different crate.\n2. **Derive serde.** All serializable types should derive `Serialize` and `Deserialize` unless there is a specific security reason not to.\n3. **Test round-trips.** Verify serialization round-trips in both JSON and MessagePack, following the pattern established by the existing `rmp-serde` dev-dependency.\n4. **Keep it leaf-free.** This crate must not depend on any other workspace crate. It sits at the bottom of the dependency graph. External crate additions require justification — each one increases compile times for every consumer.","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer for the LibreFang Protocol (OFP).\n\n## Purpose\n\n`librefang-wire` implements the wire protocol that allows LibreFang agents to communicate with each other over the network. It handles message serialization, framing, cryptographic authentication, and connection lifecycle management. This crate sits between the high-level agent logic and the raw TCP/Tokio transport, providing a typed, authenticated, and async-ready messaging layer.\n\n## Role in the System\n\n```\n┌─────────────────┐\n│  Agent Logic     │\n│  (application)   │\n└────────┬────────┘\n         │  calls\n┌────────▼────────┐\n│ librefang-wire  │  ← this crate\n│ (OFP messaging) │\n└────────┬────────┘\n         │  uses\n┌────────▼────────┐\n│ librefang-types │  shared message & error types\n└─────────────────┘\n```\n\nOther crates in the workspace depend on `librefang-wire` to send and receive OFP messages. The crate itself depends on `librefang-types` for shared type definitions (message envelopes, error codes, identifiers) and on Tokio for async I/O.\n\n## Key Capabilities\n\nThe dependency list reveals the core concerns of this module:\n\n### Message Authentication (HMAC-SHA256)\n\nEvery message on the wire is authenticated using HMAC with SHA-256. The `hmac`, `sha2`, and `subtle` crates work together for this:\n\n- **`hmac` + `sha2`**: Compute HMAC-SHA256 digests over serialized message payloads.\n- **`subtle`**: Constant-time comparison of MAC tags to prevent timing side-channel attacks during verification.\n- **`hex`**: Encode/decode MAC tags for wire transmission.\n\nAgents share a pre-shared key. The sender computes a MAC over the message body and attaches it; the receiver recomputes and verifies in constant time before accepting the message.\n\n### Concurrent Connection Tracking\n\nThe `dashmap` dependency indicates that the module maintains a concurrent map of active connections or pending handshakes. This allows multiple agents to connect simultaneously without contention, as `DashMap` provides sharded internal locking.\n\n### Serialization\n\nMessages are serialized to JSON via `serde` and `serde_json`. This keeps the protocol human-readable during development and simplifies interop, at the cost of some bandwidth efficiency.\n\n### Unique Identification\n\n- **`uuid`**: Generates unique message IDs for request-response correlation and deduplication.\n- **`chrono`**: Timestamps for message expiry, replay protection, and logging.\n\n### Error Handling\n\n`thiserror` provides typed, ergonomic error enums for protocol-level failures — malformed frames, authentication failures, timeouts, and unexpected message types.\n\n### Observability\n\n`tracing` spans are embedded throughout the networking code so that every message send, receive, and authentication event can be correlated in structured logs.\n\n## Protocol Handshake\n\nBased on the dependencies, the expected connection flow is:\n\n```mermaid\nsequenceDiagram\n    participant A as Agent A\n    participant B as Agent B\n    A->>B: Hello (random nonce)\n    B->>A: HelloAck (random nonce)\n    Note over A,B: Both derive session context from nonces + shared key\n    A->>B: Authenticated message (HMAC-SHA256)\n    B->>A: Authenticated message (HMAC-SHA256)\n```\n\n1. **Hello exchange** — Each agent generates a random nonce (`rand`) and sends it to the peer. This ensures freshness and prevents replay.\n2. **Session derivation** — Both agents use the exchanged nonces along with the pre-shared key to compute a session-specific HMAC key.\n3. **Steady-state messaging** — All subsequent messages carry an HMAC computed with the session key. The receiver verifies in constant time (`subtle`) before processing.\n\n## Usage from Other Crates\n\nOther workspace members bring in `librefang-wire` as a dependency and use it to establish authenticated channels between agents. The `async-trait` dependency suggests that the crate exposes trait-based interfaces for transport abstraction, allowing tests or alternative transports to be swapped in.\n\nThe typical integration pattern is:\n\n1. Create a transport (likely a Tokio TCP stream wrapper).\n2. Perform the OFP handshake to establish a session.\n3. Send and receive typed messages from `librefang-types`, with authentication handled transparently by this crate.\n4. The concurrent connection map (`dashmap`) tracks active sessions internally.\n\n## Testing\n\nThe `tokio-test` dev-dependency is used for writing async tests that exercise the handshake, message round-tripping, and authentication failure paths without requiring a live network.","other":"# Other\n\n# Other — Supporting Crates & Infrastructure\n\nThis module group contains the bulk of the LibreFang Agent OS crate ecosystem — everything from foundational type definitions through the kernel, runtime, API surface, and user-facing clients. The crates are organized into layered clusters that build upward from pure data definitions to full user-facing applications.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Clients\n        CLI[librefang-cli]\n        DASH[librefang-api-dashboard]\n        DESK[librefang-desktop]\n    end\n\n    subgraph \"API Layer\"\n        API[librefang-api]\n        APITEST[librefang-api-tests]\n        APISTATIC[librefang-api-static]\n    end\n\n    subgraph Kernel\n        KERN[librefang-kernel]\n        KROUTER[librefang-kernel-router]\n        KMETER[librefang-kernel-metering]\n        KHANDLE[librefang-kernel-handle]\n        KTESTS[librefang-kernel-tests]\n    end\n\n    subgraph Runtime\n        RT[librefang-runtime]\n        RTMCP[librefang-runtime-mcp]\n        RTOAUTH[librefang-runtime-oauth]\n        RTWASM[librefang-runtime-wasm]\n    end\n\n    subgraph \"LLM Integration\"\n        LLMDRV[librefang-llm-driver]\n        LLMDRIVERS[librefang-llm-drivers]\n    end\n\n    subgraph \"Agent Subsystems\"\n        MEM[librefang-memory]\n        CH[librefang-channels]\n        SKILLS[librefang-skills]\n        HANDS[librefang-hands]\n        EXT[librefang-extensions]\n        WIRE[librefang-wire]\n    end\n\n    subgraph Foundation\n        TYPES[librefang-types]\n        HTTP[librefang-http]\n        TELE[librefang-telemetry]\n        TESTING[librefang-testing]\n    end\n\n    CLI --> KERN\n    CLI --> API\n    DESK --> API\n    DESK --> KERN\n    DASH --> API\n\n    API --> KERN\n    API --> RT\n\n    KERN --> KROUTER\n    KERN --> KMETER\n    KERN --> RT\n    KERN --> MEM\n    KERN --> CH\n    KERN --> SKILLS\n\n    RT --> RTMCP\n    RT --> RTOAUTH\n    RT --> RTWASM\n    RT --> LLMDRV\n    RT --> MEM\n\n    LLMDRIVERS --> LLMDRV\n\n    CH --> HTTP\n    EXT --> HTTP\n    RT --> HTTP\n\n    TESTING --> KERN\n    APITEST --> TESTING\n    KTESTS --> KHANDLE\n```\n\n## Layer Overview\n\n### Foundation\n\n| Crate | Role |\n|---|---|\n| [librefang-types](librefang-types.md) | Shared data structures, traits, enums, and error types — the vocabulary every other crate speaks |\n| [librefang-types-locales](librefang-types-locales.md) | Localized API error messages (6 languages via Project Fluent) |\n| [librefang-http](librefang-http.md) | Centralized `reqwest` client builder with TLS and proxy configuration |\n| [librefang-telemetry](librefang-telemetry.md) | OpenTelemetry metric definitions and instrumentation macros |\n| [librefang-testing](librefang-testing.md) | Mock kernel, mock LLM driver, and API route test helpers used across the workspace |\n\n### Kernel\n\n[librefang-kernel](librefang-kernel.md) is the central orchestrator. It owns the agent lifecycle — loading config, initializing subsystems, coordinating message flow, and managing SQLite state. Its focused sub-crates handle specific concerns:\n\n- [librefang-kernel-router](librefang-kernel-router.md) — resolves input to the correct hand/template\n- [librefang-kernel-metering](librefang-kernel-metering.md) — cost tracking and quota enforcement\n- [librefang-kernel-handle](librefang-kernel-handle.md) — the `KernelHandle` trait, a lightweight interface crate that breaks circular dependencies\n\n### Runtime\n\n[librefang-runtime](librefang-runtime.md) is the execution environment. It wires together LLM drivers, skill execution, memory access, and channel I/O into a coherent agent lifecycle. Sub-crates provide specific capabilities:\n\n- [librefang-runtime-wasm](librefang-runtime-wasm.md) — WASM sandbox for isolated skill execution\n- [librefang-runtime-mcp](librefang-runtime-mcp.md) — Model Context Protocol client for external tool servers\n- [librefang-runtime-oauth](librefang-runtime-oauth.md) — OAuth 2.0 PKCE flows for ChatGPT and GitHub Copilot providers\n\n### LLM Integration\n\n[librefang-llm-driver](librefang-llm-driver.md) defines the `LlmDriver` trait that decouples the rest of the system from any specific provider. [librefang-llm-drivers](librefang-llm-drivers.md) contains the concrete implementations for Anthropic, OpenAI, Gemini, and others — translating generic requests into provider-specific HTTP payloads.\n\n### Agent Subsystems\n\n| Crate | Role |\n|---|---|\n| [librefang-memory](librefang-memory.md) | Persistence substrate — conversation history, task state, session-scoped context with cross-session isolation |\n| [librefang-channels](librefang-channels.md) | Bridge layer to 40+ messaging platforms, each feature-gated for compile-time selection |\n| [librefang-skills](librefang-skills.md) | Skill registry, loader, marketplace client, and OpenClaw compatibility |\n| [librefang-hands](librefang-hands.md) | Curated autonomous capability packages — what an agent can do and what it requires |\n| [librefang-extensions](librefang-extensions.md) | MCP server setup, encrypted credential vault (AES-256-GCM), and OAuth2 PKCE for integrations |\n| [librefang-wire](librefang-wire.md) | Agent-to-agent networking via the LibreFang Protocol (OFP) — serialization, framing, cryptographic auth |\n\n### API & Dashboard\n\n[librefang-api](librefang-api.md) exposes the full system through RESTful JSON and WebSocket endpoints. It integrates nearly every other crate into a unified network service built on axum.\n\n[librefang-api-dashboard](librefang-api-dashboard.md) is the React 19 SPA that provides the management UI — agent lifecycle, workflows, scheduling, analytics, and configuration. [librefang-api-static](librefang-api-static.md) holds its i18n translation files (English and Japanese).\n\n### Clients\n\n- [librefang-cli](librefang-cli.md) — the `librefang` binary; a feature-rich CLI for configuring, running, and debugging agents\n- [librefang-cli-locales](librefang-cli-locales.md) — CLI localization in Fluent format (English, Simplified Chinese)\n- [librefang-cli-templates](librefang-cli-templates.md) — TOML config templates written during `librefang init`\n- [librefang-desktop](librefang-desktop.md) — Tauri 2.0 native desktop app wrapping the kernel and web UI, with system tray, auto-updates, and notifications. Supported by [librefang-desktop-capabilities](librefang-desktop-capabilities.md) (security config) and [librefang-desktop-gen](librefang-desktop-gen.md) (auto-generated permission schemas)\n\n### Migration & Testing\n\n[librefang-migrate](librefang-migrate.md) imports agent configurations from other frameworks into LibreFang's native format. Test suites at each layer ensure correctness: [librefang-api-tests](librefang-api-tests.md) (HTTP integration, load, OpenAPI spec), [librefang-kernel-tests](librefang-kernel-tests.md) and [librefang-kernel-src](librefang-kernel-src.md) (kernel lifecycle, WASM, workflows), [librefang-channels-tests](librefang-channels-tests.md) (bridge dispatch), [librefang-memory-tests](librefang-memory-tests.md) (session isolation regression), and [librefang-runtime-tests](librefang-runtime-tests.md) (OAuth/MCP integration).\n\n## Key Cross-Module Workflows\n\n**Agent message processing:** A message arrives through [librefang-channels](librefang-channels.md) → [librefang-kernel](librefang-kernel.md) routes it via [librefang-kernel-router](librefang-kernel-router.md) → [librefang-runtime](librefang-runtime.md) executes through an [librefang-llm-driver](librefang-llm-driver.md) implementation → [librefang-memory](librefang-memory.md) persists context → response flows back through channels.\n\n**Dashboard to kernel:** [librefang-api-dashboard](librefang-api-dashboard.md) calls API endpoints on [librefang-api](librefang-api.md) → which exercises the full path through [librefang-testing](librefang-testing.md)'s mock infrastructure in tests → validated end-to-end by [librefang-api-tests](librefang-api-tests.md) against a real kernel on a random port.\n\n**Type-driven consistency:** Every crate depends on [librefang-types](librefang-types.md) for shared vocabulary. [librefang-types-tests](librefang-types-tests.md) guards against drift between the dashboard's TypeScript serializer and the Rust deserializer, ensuring the TOML contract holds across the boundary.","overview":"# crates — Wiki\n\n# LibreFang Agent OS — Codebase Overview\n\nWelcome to the **LibreFang Agent OS** (`crates` repository). LibreFang is an open-source agent operating system that lets you build, configure, and run AI-powered agents that connect to 40+ messaging platforms, use tools, manage memory, and collaborate — all from a single unified runtime.\n\nWhether you're spinning up a conversational bot on Telegram, deploying an autonomous \"Hand\" that works in the background, or wiring agents together across machines, this is the codebase that makes it happen.\n\n## Architecture at a Glance\n\n```mermaid\ngraph TD\n    CLI[\"CLI & Terminal UI\"]\n    DESK[\"Desktop App\"]\n    DASH[\"Dashboard Frontend\"]\n\n    CLI --> API[\"REST API Server\"]\n    DESK --> API\n    DASH --> API\n\n    API --> KERNEL[\"Agent Kernel\"]\n    API --> RUNTIME[\"Agent Runtime\"]\n\n    RUNTIME --> KERNEL\n    RUNTIME --> LLM[\"LLM Drivers\"]\n    RUNTIME --> MEMORY[\"Memory & Sessions\"]\n    RUNTIME --> SKILLS[\"Skills & Marketplace\"]\n\n    KERNEL --> CHANNELS[\"Channel Adapters\"]\n    KERNEL --> MEMORY\n\n    CHANNELS -.->|\"Telegram, Discord,<br/>Slack, WhatsApp…\"| EXT[\"40+ Platforms\"]\n\n    TYPES[\"Core Types\"] -.->|\"shared by all\"| API\n```\n\nThe system is organized into clearly separated layers:\n\n### Foundation\n\n[Core Types & Configuration](core-types-configuration.md) defines the shared data structures — every struct, enum, and serialization helper that crosses crate boundaries lives here. There is no business logic, just types that the entire workspace depends on.\n\n[Shared Infrastructure](shared-infrastructure.md) handles cross-cutting concerns: outbound HTTP (with proper CA root seeding and proxy configuration), OpenTelemetry/Prometheus observability via [librefang-telemetry](shared-infrastructure.md), and data migration via [librefang-migrate](shared-infrastructure.md).\n\n### Runtime Core\n\nThe [Agent Kernel](agent-kernel.md) is the orchestrator — it manages agent lifecycles, enforces budgets, routes messages, handles approvals and auth, and coordinates workflows. Think of it as the OS scheduler and process supervisor for agents.\n\nThe [Agent Runtime](agent-runtime.md) is the execution engine. It runs the core agent loop: assembling prompts, calling LLMs, executing tools, recalling memories, and streaming responses back. It talks to LLM providers through the [LLM Drivers](llm-drivers.md) abstraction layer, which separates the driver trait from provider-specific implementations (OpenAI, Anthropic, local models, and others).\n\n[Memory & Sessions](memory-sessions.md) provides the persistent substrate — structured key-value storage in SQLite, semantic search, and a knowledge graph — plus a proactive memory layer that automatically extracts and deduplicates facts during conversations.\n\n### Capability Extensions\n\n[Channel Adapters](channel-adapters.md) bridges LibreFang to the outside world. Each adapter (Telegram, Discord, Slack, WhatsApp, Teams, Matrix, IRC, email, and many more) translates platform-specific messages into a unified `ChannelMessage` format. Adapters are feature-gated — you compile only what you need.\n\n[Skills & Marketplace](skills-marketplace.md) implements the plugin system. Skills are self-contained bundles (a TOML manifest plus code or prompt context) that extend agent capabilities at runtime. Agents can even create skills themselves.\n\n[Extensions & MCP](extensions-mcp.md) manages MCP (Model Context Protocol) server integrations — discovering catalog templates, storing credentials securely, and monitoring server health.\n\n[Hands](hands.md) are pre-built, domain-complete autonomous agent configurations. Unlike regular agents you chat with interactively, Hands work in the background — you check in on them rather than drive them.\n\n[Peer Networking](peer-networking.md) enables cross-machine agent discovery and communication using the LibreFang Wire Protocol, with HMAC-SHA256 authentication.\n\n### User-Facing Clients\n\nUsers interact with LibreFang through three interfaces:\n\n- **[CLI & Terminal UI](cli-terminal-ui.md)** — ~60 subcommands organized into domain groups, plus a full-screen TUI dashboard and an interactive init wizard. In normal operation it acts as a thin HTTP client to a running daemon.\n- **[Dashboard Frontend](dashboard-frontend.md)** — a React SPA for managing agents, channels, skills, workflows, and runtime configuration through a web browser.\n- **[Desktop Application](desktop-application.md)** — a Tauri 2.0 native app that can either boot an embedded kernel locally or connect to a remote instance, with system tray integration, global hotkeys, and auto-updates.\n\nAll three clients communicate through the [REST API Server](rest-api-server.md), which is the HTTP gateway to the kernel and runtime.\n\n## Key End-to-End Flow\n\nA typical message flow looks like this:\n\n1. A user sends a message on a platform (e.g., Telegram).\n2. The **[Channel Adapters](channel-adapters.md)** module translates it into a `ChannelMessage` and dispatches it to the kernel.\n3. The **[Agent Kernel](agent-kernel.md)** routes the message to the appropriate agent.\n4. The **[Agent Runtime](agent-runtime.md)** assembles a prompt (pulling context from **[Memory & Sessions](memory-sessions.md)**), calls an LLM via **[LLM Drivers](llm-drivers.md)**, and executes any tools the agent invokes (potentially loading **[Skills & Marketplace](skills-marketplace.md)** plugins or calling out to **[Extensions & MCP](extensions-mcp.md)** servers).\n5. The response flows back through the kernel, into the channel adapter, and out to the user on their platform.\n\nFor web or desktop users, the same flow i
