.config.ts\n└── tsconfig.json\n```\n\n## Data Layer\n\nThe data layer is the most architecturally significant part of the dashboard. It enforces a strict separation between raw API calls, cached queries, and cache-invalidating mutations.\n\n### Query Key Factories (`src/lib/queries/keys.ts`)\n\nEvery query and mutation references keys produced by centralized factory objects. Each domain (agents, sessions, workflows, etc.) has a factory that produces hierarchical keys anchored on a root:\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nBecause every sub-key spreads from `fooKeys.all`, invalidating the root refreshes every cached entry in that domain. The narrowest appropriate key should always be used for invalidation.\n\nCurrent domains: `agents`, `analytics`, `approvals`, `channels`, `config`, `cron`, `fanghub`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `triggers`, `workflows`.\n\n### Query Hooks (`src/lib/queries/<domain>.ts`)\n\nEach domain file exports:\n- `fooQueryOptions(filters?)` — a `queryOptions()` call with key, fetch function, and `staleTime`.\n- `useFoo(filters?, options?)` — a `useQuery` wrapper that pages import.\n\nHooks accept an optional `options` bag (`enabled`, `staleTime`, `refetchInterval`) so call sites can override polling/gating per-page:\n\n```ts\ntype UseFooOptions = {\n  enabled?: boolean;\n  staleTime?: number;\n  refetchInterval?: number | false;\n};\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled: options.enabled,\n    staleTime: options.staleTime,\n    refetchInterval: options.refetchInterval,\n  });\n}\n```\n\nThe hook sets sensible defaults (shared `staleTime`, optional `refetchInterval`) so consumers without special needs inherit one consistent policy.\n\n### Mutation Hooks (`src/lib/mutations/<domain>.ts`)\n\nEvery write operation is a `useMutation` hook. **Cache invalidation lives inside the hook** — call sites never need to know which keys are affected. Call sites may attach their own `onSuccess`/`onError` for UI feedback (toasts, dialog dismissal), which is orthogonal to invalidation.\n\n**Invalidation strategy** — always prefer the narrowest key set:\n\n| Pattern | Keys invalidated | When to use |\n|---|---|---|\n| Per-id update | `fooKeys.detail(id)` + `fooKeys.lists()` | Patch, rename, status change that affects list rows. **Default template.** |\n| List-shape change | `fooKeys.lists()` | Create, delete, reorder — no existing detail to refresh. |\n| Scoped change | `fooKeys.detail(id)` or nested sub-key | Change is genuinely local; list projection unaffected. |\n| Bulk / cross-cutting | `fooKeys.all` | Bulk import, cache reset, schema migration. Not the default. |\n\nExample — per-id patch where the list projection also changes:\n\n```ts\nexport function useUpdateFoo() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: updateFoo,\n    onSuccess: (_data, variables) => {\n      qc.invalidateQueries({ queryKey: fooKeys.lists() });\n      qc.invalidateQueries({ queryKey: fooKeys.detail(variables.id) });\n    },\n  });\n}\n```\n\n### Adding a New Endpoint\n\n1. **Raw call** — add the function in `src/api.ts` (or re-export via `src/lib/http/client.ts`).\n2. **Key factory** — add a factory to `src/lib/queries/keys.ts` following the hierarchical pattern. Every sub-key must be anchored with `...fooKeys.all`.\n3. **Query hook** — add `fooQueryOptions` and `useFoo` in `src/lib/queries/<domain>.ts`.\n4. **Mutation hooks** — add `useXxx` hooks in `src/lib/mutations/<domain>.ts` with invalidation.\n5. **Tests** — add the factory to the `all factories exist` test in `keys.test.ts`. Add anchoring tests for non-trivial factories.\n\nRun all three verification commands after changes:\n\n```bash\npnpm typecheck    # tsc --noEmit\npnpm test --run   # vitest\npnpm build        # vite build\n```\n\n### Exceptions: Uncached Data\n\nStreaming/SSE connections, terminal window lifecycle, and one-shot probes that must not be cached may call `fetch` directly. These are kept narrow and commented. See `src/components/TerminalTabs.tsx` for the canonical example.\n\n## Agent Manifest System\n\nThe dashboard includes a complete TOML-based agent manifest editor powered by `smol-toml`:\n\n- **`src/lib/agentManifest.ts`** — `parseManifestToml()`, `serializeManifestForm()`, `validateManifestForm()`, plus `emptyManifestForm()` / `emptyManifestExtras()` factories.\n- **`src/lib/agentManifestMarkdown.ts`** — `generateManifestMarkdown()` renders a manifest as human-readable Markdown for preview/export.\n\nThe form model handles:\n- First-class fields: name, description, model config, resources, capabilities, schedule, thinking, autonomous guardrails, routing, fallback models, context injection, response format, exec policy, lifecycle overrides.\n- **Extras preservation**: unknown TOML keys (custom provider params, future schema fields) are round-tripped in an `extras` bag so user edits never silently drop data.\n- Mutual-exclusion guards prevent emitting both a shorthand form field and a preserved TOML table for the same key (e.g., `exec_policy` string vs. `[exec_policy]` table).\n- Numeric field validation rejects negatives, out-of-range integers, and non-numeric garbage without throwing.\n\n## Authentication\n\n- **API key storage**: `src/api.ts` stores the bearer token in `localStorage` under `librefang-api-key`. All API calls attach it via `Authorization: Bearer <token>`.\n- **WebSocket auth**: `buildAuthenticatedWebSocketUrl()` appends `?token=` to WebSocket URLs.\n- **Credential check**: on load, the dashboard probes `/api/auth/dashboard-check`. If the server requires credentials, a sign-in dialog appears (validated in the Playwright e2e suite).\n- **Stale auth cleanup**: `verifyStoredAuth()` makes a protected request; on 401 it clears the stored key so the user is re-prompted.\n\n## PWA Support\n\n- **`public/manifest.json`** — declares the app as standalone with `start_url: /dashboard/#/overview`.\n- **`public/sw.js`** — service worker that precaches `/dashboard/`, uses network-only for `/api/` requests, and stale-while-revalidate for all other GETs.\n- **`index.html`** — registers the service worker on load, sets mobile meta tags, and provides a dark theme-color.\n\n## Styling & Theming\n\nThe dashboard uses Tailwind CSS v4 with a CSS-first configuration (`src/index.css`):\n\n- **Semantic color tokens** via CSS custom properties: `--brand-color`, `--success-color`, `--bg-surface`, etc. Light and dark palettes are defined in `:root` and `:root.dark`.\n- **Custom breakpoints**: `3xl` (1920px) and `4xl` (2560px) for QHD/UHD card grids.\n- **Animation system**: spring-physics curves (`--apple-spring`), page entrance (`fade-in-up` with blur), modal entrance (`fade-in-scale`), staggered children, card glow hover effects. All respect `prefers-reduced-motion`.\n- **Custom scrollbar**: `.scrollbar-thin` for minimal scroll indicators.\n\n## Testing\n\n### Unit / Integration Tests (Vitest)\n\nTests live alongside source files with a `.test.ts` / `.test.tsx` suffix. Key patterns:\n\n- **`src/lib/test/query-client.tsx`** exports `createQueryClientWrapper()` which provides a real `QueryClient` for `renderHook` tests. Almost every query and mutation test uses this.\n- **Mutation tests** spy on `queryClient.invalidateQueries` to verify exactly which keys are invalidated — no more, no less.\n- **Query tests** verify `enabled` gating (disabled when IDs are empty), correct query keys, and data flow.\n- **Agent manifest tests** cover round-trip parse→serialize→parse, TOML edge cases (nested tables, special characters, mutual exclusion), and numeric validation.\n\n```bash\npnpm test --run      # Single run\npnpm test:watch      # Watch mode\n```\n\n### End-to-End Tests (Playwright)\n\n```bash\npnpm e2e\n```\n\nConfigured in `playwright.config.ts` — starts a dev server on `127.0.0.1:4173`, then:\n\n- Verifies the dashboard shell loads with all primary navigation links (Overview, Agents, Sessions, Approvals, Comms, Providers, Channels, Skills, Hands, Workflows, Scheduler, Goals, Analytics, Memory, Runtime, Logs).\n- Verifies page navigation renders the correct heading.\n- Verifies the sign-in dialog appears when the auth endpoint returns `credentials` mode.\n\n## Development Workflow\n\n```bash\npnpm install                # Install dependencies\npnpm dev                    # Start Vite dev server\npnpm typecheck              # TypeScript check (tsc --noEmit)\npnpm test --run             # Run all Vitest tests\npnpm build                  # Production build\npnpm openapi:types          # Regenerate API types from OpenAPI spec\n```\n\n### Commit Convention\n\n```\nfeat(dashboard/<area>): description\nfix(dashboard/<area>): description\nrefactor(dashboard/<area>): description\n```\n\n### Key Conventions\n\n- **TypeScript strict mode** — no `any` in new hooks. Use types from `src/api.ts` or `openapi/generated.ts`.\n- **Never build `queryKey` inline** — always call the factory from `keys.ts`.\n- **Never subscribe to the same endpoint with a different key** for a subset — use `select` on the shared `queryOptions`.\n- **Every call-site override** of `enabled`/`staleTime`/`refetchInterval` must carry a short inline comment explaining why.","other-librefang-api-src":"# Other — librefang-api-src\n\n# LibreFang API Login Page (`login_page.html`)\n\n## Purpose\n\nA self-contained, zero-dependency HTML page that serves as the authentication gate for the LibreFang dashboard. It collects user credentials (and optionally a TOTP code), submits them to the backend API, stores the returned session token in `localStorage`, and redirects the user to the dashboard.\n\nThe page is served directly by the API server when an unauthenticated request hits a protected route — there is no build step, no framework, and no external asset loading.\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant U as Browser\n    participant S as API Server\n    U->>S: GET /dashboard/ (no session)\n    S-->>U: 401 → serves login_page.html\n    U->>U: User fills username + password\n    U->>S: POST /api/auth/dashboard-login\n    alt requires TOTP\n        S-->>U: { requires_totp: true }\n        U->>U: Shows TOTP field\n        U->>S: POST /api/auth/dashboard-login (with totp_code)\n    end\n    S-->>U: { ok: true, token: \"...\" }\n    U->>U: localStorage.setItem(\"librefang-api-key\", token)\n    U->>U: location.replace(original target)\n```\n\n## Key Components\n\n### Form Fields\n\n| Field | Element ID | Name Attribute | Behavior |\n|---|---|---|---|\n| Username | `#u` | `username` | Text input, trimmed before submission, autofocus on load |\n| Password | `#p` | `password` | Password input, sent as-is |\n| TOTP code | `#t` | `totp_code` | Hidden by default. Shown when the server responds with `requires_totp: true`. Accepts exactly 6 digits, numeric input mode. |\n\n### Authentication Flow\n\nThe JavaScript in the `<script>` block at the bottom of the page drives the entire flow:\n\n1. **Intercept submit** — The form's `submit` event is captured and prevented from performing a full-page POST.\n2. **Build payload** — Constructs a JSON object with `username` and `password`. If `requiresTotp` is `true` (set by a prior attempt), the trimmed value of the TOTP field is included as `totp_code`.\n3. **POST to `/api/auth/dashboard-login`** — Sent with `Content-Type: application/json` and `credentials: 'same-origin'` so cookies accompany the request.\n4. **Handle response** — Three branches:\n   - **Success** (`d.ok && d.token`): Stores `d.token` under `localStorage` key `librefang-api-key`, then redirects to the originally requested path (falling back to `/dashboard/`).\n   - **TOTP required** (`d.requires_totp`): Sets `requiresTotp = true`, unhides `#totp-row`, focuses the TOTP input, and prompts the user.\n   - **Failure**: Displays `d.error` (or a generic message) in the `#err` element.\n5. **Error/cleanup** — Network errors show \"Network error.\" The submit button is re-enabled in the `finally` block regardless of outcome.\n\n### Token Storage\n\nOn successful authentication, the token is written to:\n\n```js\nlocalStorage.setItem('librefang-api-key', d.token);\n```\n\nAll subsequent dashboard API calls are expected to read from this same `localStorage` key. The `try/catch` around the `setItem` call guards against cases where `localStorage` is unavailable (e.g., private browsing in some older browsers).\n\n### Redirect Logic\n\n```js\nvar target = location.pathname + location.search + location.hash;\nif (!target || target === '/') target = '/dashboard/';\nlocation.replace(target);\n```\n\nThis preserves the user's original destination. When the server serves this login page in response to a `401`, the browser's URL bar still holds the path the user originally requested. After login, the page replaces itself with that same path, allowing the now-authenticated request to proceed. If the user landed on `/` (the root), they are sent to `/dashboard/` instead.\n\n## Styling\n\nThe page uses a dark theme by default and adapts to light mode via a `@media (prefers-color-scheme: light)` rule block. Key visual details:\n\n- **Card**: Centered via CSS Grid (`place-items: center`), capped at `380px` wide with `92vw` fallback for small screens.\n- **Inputs**: Dark background with a subtle border; focus state highlights with a blue ring (`#7c8cff`).\n- **Button**: Full-width, uses the same accent blue (`#7c8cff`) with dark text for contrast.\n- **Error messages**: Rendered in `#ff7a7a` inside an `aria-live=\"polite\"` region so screen readers announce changes automatically.\n\n## Integration Points\n\n| Integration | Detail |\n|---|---|\n| **Backend endpoint** | `POST /api/auth/dashboard-login` — expects JSON `{ username, password, totp_code? }`, returns `{ ok, token }` or `{ requires_totp }` or `{ error }`. |\n| **Token consumer** | Other dashboard pages or JS modules read the token from `localStorage.getItem('librefang-api-key')`. |\n| **Configuration** | The footer references `config.toml`, indicating the server's auth requirements are driven by its TOML config file. |\n| **Serving** | The API server is expected to serve this HTML file on `401` responses for protected routes, or when the user navigates to the login path directly. |\n\n## Security Notes\n\n- The page sets `<meta name=\"robots\" content=\"noindex, nofollow\">` to prevent search engine indexing.\n- `autocomplete` attributes are set appropriately (`username`, `current-password`, `one-time-code`) to work with browser password managers and autofill.\n- The TOTP input uses `inputmode=\"numeric\"` with a `pattern` of `[0-9]{6}` and `maxlength=\"6\"` to constrain input on mobile keyboards.\n- Credentials are sent exclusively via a `POST` request with JSON — never as URL parameters.","other-librefang-api-static":"# Other — librefang-api-static\n\n# librefang-api/static/locales\n\nStatic internationalization (i18n) locale files for the LibreFang web dashboard. These JSON files provide every user-facing string used across the UI, organized by page and component.\n\n## Purpose\n\nThe locales directory contains translation catalogs consumed by the frontend's i18n layer. Each file is a flat-to-nested JSON object keyed by logical section (page, component, or feature), with leaf values being the translated strings. The frontend resolves keys at render time—no server-side rendering of text is involved.\n\nCurrently provided locales:\n\n| File | Language |\n|------|----------|\n| `en.json` | English (default) |\n| `ja.json` | Japanese |\n\n## Key Structure\n\nKeys follow a `section.subsection.leaf` hierarchy that mirrors the UI's component tree. Top-level sections correspond to pages or major UI areas:\n\n```\nnav          → sidebar / top-level navigation labels\nstatus       → connection status indicators\nbtn          → shared button labels\nlabel        → shared field labels\nauth         → API key authentication prompt\nhealth       → health check status text\nstat         → dashboard stat card labels\ncard         → dashboard card titles\nagents       → agents list actions\ndetail       → agent detail panel fields\nmode         → agent mode labels (observe / assist / full)\ncategory     → agent categories\nprofile      → tool profile labels and descriptions\ntemplate     → built-in agent template names/descriptions\ntime         → relative time formatting\nonboarding   → first-run onboarding banner\nprovider     → LLM provider setup UI\noverview     → overview/dashboard page\nsecurity     → security feature labels\nagentChat    → chat interface (largest section)\nsessionsPage → sessions and memory browser\nagentsPage   → agent creation and management\napprovals    → execution approval queue\nlogsPage     → live logs and audit trail\nruntimePage  → runtime information display\nsettingsPage → settings panels (providers, models, tools, security, network, budget, memory, migration)\nworkflowsPage → workflow list and execution\nworkflowBuilder → visual workflow builder\nschedulerPage → cron jobs and event triggers\nchannelsPage → messaging channel setup\nskillsPage   → skills and MCP servers\nhandsPage    → curated capability packages\npluginsPage  → plugin management\ncommsPage    → inter-agent communication\nsetupWizard  → guided setup wizard\ngoalsPage    → goals tracking\nanalyticsPage → usage analytics and cost tracking\nmemoryPage   → proactive memory browser\ntheme        → theme selector labels\nsidebar      → sidebar hints\nconfirm      → shared confirmation dialog\n```\n\nNumbered suffixes (e.g., `agentsPage2`, `settingsPage2`, `analyticsPage2`) denote secondary or supplemental keys for the same feature area—typically used when a newer UI revision added keys that should not overwrite existing ones during a transition period.\n\n## Interpolation\n\nStrings use `{placeholder}` syntax for dynamic values. The frontend i18n library (typically something like `t('key', { count: 5 })`) substitutes these at render time.\n\nCommon placeholders:\n\n| Placeholder | Used in | Example |\n|---|---|---|\n| `{count}` | Counters, pagination | `\"{count} agent(s) running\"` |\n| `{name}` | Entity names | `\"Agent \\\"{name}\\\" stopped\"` |\n| `{message}` | Error propagation | `\"Failed: {message}\"` |\n| `{provider}` | Provider names | `\"{provider} - ready\"` |\n| `{model}` | Model identifiers | `\"Switched to {model}\"` |\n| `{time}` | Timestamps | `\"Last synced: {time}\"` |\n| `{filtered}`, `{total}` | Search/filter results | `\"{filtered} of {total}\"` |\n| `{configured}`, `{total}` | Setup progress | `\"{configured}/{total} configured\"` |\n| `{old}`, `{new}` | Memory conflict display | `\"Previously '{old}', now '{new}'\"` |\n| `{level}` | Thinking level | `\"Thinking ({level})...\"` |\n| `{tool}` | Tool names | `\"Using {tool}...\"` |\n| `{key}` | Memory key names | `\"Delete key \\\"{key}\\\"?\"` |\n| `{file}` | File names | `\"{file} saved\"` |\n\nThere is no pluralization framework embedded in these files—English uses explicit forms like `\"agent(s)\"` or `\"{count} key(s)\"`. The Japanese locale uses counters like `\"{count} 個のキー\"`.\n\n## Adding a New Locale\n\n1. Copy `en.json` to a new file named with the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g., `fr.json`, `zh-CN.json`, `ko.json`).\n2. Translate all leaf string values. Do **not** translate keys or structural nesting.\n3. Preserve all `{placeholder}` tokens exactly as they appear—these are resolved at runtime.\n4. Register the new locale in the frontend's i18n configuration (outside this directory).\n\nExample minimal diff for `fr.json`:\n\n```json\n{\n  \"nav\": {\n    \"chat\": \"Discussion\",\n    \"agents\": \"Agents\",\n    ...\n  }\n}\n```\n\n## Adding New UI Strings\n\nWhen adding a new feature to the frontend:\n\n1. Add the key under the appropriate top-level section. If the feature is a new page, create a new top-level section (e.g., `\"myNewPage\": { ... }`).\n2. Use the same key path in **all** locale files. Missing keys fall back to the `en.json` value in most i18n libraries, but maintaining parity avoids blank strings.\n3. Use `{placeholder}` interpolation rather than string concatenation.\n4. For toast/notification messages, include both a success and failure variant:\n\n```json\n\"someAction\": \"Action completed\",\n\"someActionFailed\": \"Action failed: {message}\"\n```\n\n## Key Naming Conventions\n\n| Pattern | Meaning | Example |\n|---|---|---|\n| `*Title` | Dialog or section heading | `\"deleteScheduleTitle\"` |\n| `*Confirm` | Confirmation prompt body | `\"stopAgentConfirm\"` |\n| `*Desc` | Description text | `\"proactiveMemoryDesc\"` |\n| `*Placeholder` | Input placeholder text | `\"agentNamePlaceholder\"` |\n| `*Toast` | Toast notification text | `\"approvedToast\"` |\n| `*Failed` | Error message | `\"saveConfigFailed\"` |\n| `load*Failed` | Data load error | `\"loadAgentsFailed\"` |\n| `tab*` | Tab label | `\"budgetTab\"` |\n| `cmd.*` | Slash command description | `\"cmd.help\"` |\n\n## Relationship to the Codebase\n\n```mermaid\ngraph LR\n    A[en.json / ja.json] -->|loaded by| B[Frontend i18n init]\n    B -->|provides t fn| C[Vue / Svelte / React components]\n    D[API daemon] -->|serves| A\n    C -->|calls| E[REST / WebSocket API]\n```\n\n- The API daemon (Rust `librefang-api`) serves these files as static assets under a `/locales/` or equivalent route.\n- The frontend's i18n layer fetches the appropriate JSON file based on the user's language preference (browser locale, stored preference, or explicit selection).\n- Components call `t('section.key', { param: value })` to resolve strings. There is no server-side string interpolation.\n- All user-facing text in the dashboard should originate from these files. The only hardcoded English that may appear in the frontend is developer-oriented console output or debug labels.\n\n## Maintenance Notes\n\n- **Key parity**: After editing `en.json`, ensure `ja.json` (and any future locales) receive corresponding entries. A CI check or pre-commit hook comparing key sets is recommended.\n- **No executable content**: These files contain only static strings. No JavaScript, HTML, or template logic.\n- **Size**: `en.json` contains approximately 1,000+ unique keys. Keep sections well-organized to avoid key collisions.\n- **Numbered section variants** (`settingsPage2`, `agentsPage2`, etc.) are temporary migration artifacts. They should be merged into the primary section once the UI transition is complete, then removed.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# LibreFang API Integration Tests\n\n## Overview\n\nThe `librefang-api/tests/` directory contains integration tests that exercise the full HTTP API stack end-to-end. Every test boots a real `LibreFangKernel`, binds an actual `axum` HTTP server to a random port, and fires real TCP requests via `reqwest`. There are no mocks, no in-memory router shortcuts, and no test-only shortcuts in the application code.\n\nTests that require a live LLM (e.g., sending a message through Groq and getting a response) are gated behind the `GROQ_API_KEY` environment variable and gracefully skip when the key is absent.\n\n### Run commands\n\n```bash\n# All API integration tests\ncargo test -p librefang-api --test api_integration_test -- --nocapture\n\n# Load tests (includes some #[ignore] stress tests)\ncargo test -p librefang-api --test load_test -- --nocapture\n\n# Daemon lifecycle tests\ncargo test -p librefang-api --test daemon_lifecycle_test -- --nocapture\n\n# Tool invoke security tests\ncargo test -p librefang-api --test tools_invoke_test -- --nocapture\n\n# OpenAPI spec generation\ncargo test -p librefang-api --test openapi_spec_test -- --nocapture\n\n# Include ignored (flaky) stress tests\ncargo test -p librefang-api -- --include-ignored -- --nocapture\n```\n\n---\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Harness\"\n        TS[\"TestServer<br/>(real TCP on random port)\"]\n        FR[\"FullRouterHarness<br/>(tower::oneshot, full router)\"]\n        TH[\"Harness<br/>(tool-invoke focused)\"]\n    end\n\n    subgraph \"Infrastructure\"\n        K[\"LibreFangKernel::boot_with_config\"]\n        AS[\"AppState (Arc)\"]\n        TMP[\"tempfile::TempDir\"]\n    end\n\n    subgraph \"Per-test lifecycle\"\n        BOOT[\"Boot kernel\"]\n        BIND[\"Bind 127.0.0.1:0\"]\n        SPAWN[\"tokio::spawn(axum::serve)\"]\n        HIT[\"reqwest / oneshot\"]\n        DROP[\"Drop → kernel.shutdown()\"]\n    end\n\n    TS --> K\n    FR --> K\n    TH --> K\n    K --> AS\n    TMP --> K\n    BOOT --> BIND --> SPAWN --> HIT --> DROP\n```\n\n---\n\n## Test Harness Infrastructure\n\n### `TestServer` — real TCP server\n\nDefined in `api_integration_test.rs` and `load_test.rs`. Boots a kernel, constructs a full `AppState`, mounts a minimal or full route set on an `axum::Router`, binds to `127.0.0.1:0` (OS-assigned random port), and spawns the server in a background tokio task.\n\nThe `Drop` impl calls `state.kernel.shutdown()`, ensuring clean teardown even if a test panics. The `_tmp: tempfile::TempDir` field keeps the temporary home directory alive for the test's duration and cleans it up on drop.\n\nThree factory functions exist:\n\n| Function | Provider | Use case |\n|---|---|---|\n| `start_test_server()` | ollama (no key needed) | Most tests — kernel boots without LLM credentials |\n| `start_test_server_with_llm()` | groq / `GROQ_API_KEY` | Tests that need a real LLM round-trip |\n| `start_test_server_with_provider()` | arbitrary | Configurable provider for specialized tests |\n| `start_test_server_with_auth(api_key)` | ollama + Bearer token | Auth middleware integration tests |\n\n### `FullRouterHarness` — in-process router\n\nDefined in `api_integration_test.rs`. Uses `server::build_router()` to construct the same router the production daemon uses, including versioned API aliases (`/api/v1/*`), dashboard locale serving, provider endpoints, and API key middleware. Tests hit this via `tower::ServiceExt::oneshot` — no TCP involved. This catches routing, middleware, and versioning bugs that a minimal test router would miss.\n\n### `Harness` — tool-invoke security harness\n\nDefined in `tools_invoke_test.rs`. Minimal router mounting only `POST /api/tools/{name}/invoke`. Accepts a `ToolInvokeConfig` parameter so each test can control whether the endpoint is enabled, which tools are allowlisted, etc. Uses `tower::oneshot` for speed.\n\n---\n\n## Test Files\n\n### `api_integration_test.rs`\n\nThe largest test file. Covers the core API surface:\n\n**Health and status**\n- `test_health_endpoint` — public health returns `{ \"status\": \"ok\" }`, redacted details, includes `x-request-id`\n- `test_status_endpoint` — returns running state, agent count, uptime, default provider\n- `test_request_id_header_is_uuid` — validates the UUID format\n\n**API versioning**\n- `test_build_router_exposes_versioned_api_aliases` — both `/api/health` and `/api/v1/health` work, `x-api-version: v1` header present\n- `test_build_router_path_version_beats_unknown_accept_header` — path-based version wins over content negotiation\n- `test_build_router_unauthorized_responses_include_api_version_header` — even 401s carry the version header\n\n**Agent lifecycle**\n- `test_spawn_list_kill_agent` — full CRUD cycle: spawn → list (find by name) → kill → verify removal\n- `test_multiple_agents_lifecycle` — spawn 3 agents, verify counts, kill incrementally\n- `test_agent_session_empty` — newly spawned agent has zero messages\n- `test_agent_monitoring_endpoints` — `/metrics` returns token usage and tool call stats; `/logs` supports level filtering\n- `test_send_message_with_llm` — gated behind `GROQ_API_KEY`; sends a message, verifies non-empty response and token counts\n\n**Pagination, sorting, search** (agent list)\n- `test_agent_list_paginated_response_format` — `{ items, total, offset, limit }`\n- `test_agent_list_invalid_sort_returns_400` — typo in `sort=` parameter\n- `test_agent_list_valid_sort_fields` — `name`, `created_at`, `last_active`, `state`\n- `test_agent_list_limit_clamped_to_max` — `limit=9999` clamped to 100\n- `test_agent_list_pagination` — offset/limit cursor through results\n- `test_agent_list_text_search` — `q=` parameter filters by name/description\n\n**Workflows and triggers**\n- `test_workflow_crud` — create, list, verify step count\n- `test_trigger_crud` — create with `lifecycle` pattern, list (unfiltered and filtered by `agent_id`), delete, verify empty\n\n**Error handling**\n- `test_invalid_agent_id_returns_400` — non-UUID path parameter on message/kill/session\n- `test_kill_nonexistent_agent_returns_404` — valid UUID that doesn't exist\n- `test_spawn_invalid_manifest_returns_400` — malformed TOML in manifest\n\n**Authentication**\n- `test_auth_health_is_public` — `/api/health` accessible without token\n- `test_auth_rejects_no_token` — protected endpoint without header → 401 \"Missing\"\n- `test_auth_rejects_wrong_token` — wrong Bearer token → 401 \"Invalid\"\n- `test_auth_accepts_correct_token` — correct token → 200\n- `test_auth_disabled_when_no_key` — empty API key means auth disabled entirely\n\n**MCP bridge** (`/mcp` endpoint)\n- `test_mcp_http_rehydrates_caller_context_from_agent_header` — `X-LibreFang-Agent-Id` header restores caller identity; without it, tools requiring agent context fail\n- `test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated` — garbage/unknown UUID degrades gracefully\n- `test_mcp_http_unrestricted_agent_can_call_any_tool` — manifest with no `[capabilities]` section means all tools allowed\n- `test_mcp_http_enforces_agent_tool_allowlist` — agent without `cron_list` in capabilities is denied even through `/mcp`\n\n**Providers and localization**\n- `test_build_router_providers_marks_local_providers` — Ollama is flagged `is_local: true`\n- `test_build_router_serves_dashboard_locales` — `/locales/{en,zh-CN,ja}.json` return correct translations\n\n**Migration and config**\n- `test_run_migrate_uses_daemon_home_when_target_dir_is_empty` — OpenClaw migration writes to daemon home\n- `test_config_reload_hot_reloads_proxy_changes` — proxy settings applied without restart; `hot_actions_applied` includes `ReloadProxy`\n\n**Hands**\n- `list_active_hands_includes_definition_metadata` — installs a hand definition, activates it, verifies the `/api/hands/active` response includes `hand_name`, `hand_icon`, `coordinator_role`, and `agent_ids`\n\n---\n\n### `daemon_lifecycle_test.rs`\n\nTests the daemon startup/shutdown lifecycle:\n\n- `test_daemon_info_serde_roundtrip` — `DaemonInfo` serializes to JSON and back\n- `test_read_daemon_info_from_file` — reads `daemon.json` from disk\n- `test_read_daemon_info_missing_file` — returns `None` for absent file\n- `test_read_daemon_info_corrupt_json` — returns `None` for invalid JSON\n- `test_full_daemon_lifecycle` — boot kernel, start server, write daemon info, hit health/status, call shutdown, verify file cleanup\n- `test_stale_daemon_info_detection` — reads file with implausible PID (stale detection is the caller's responsibility)\n- `test_server_immediate_responsiveness` — health endpoint responds in <1s from server start\n\n---\n\n### `tools_invoke_test.rs`\n\nSecurity-focused tests for `POST /api/tools/{name}/invoke`. Each test configures a different `ToolInvokeConfig` to exercise a specific access-control branch:\n\n| Test | Config | Expected |\n|---|---|---|\n| `test_invoke_disabled_returns_403` | `enabled: false` (default) | 403 |\n| `test_invoke_tool_not_in_allowlist_returns_403` | `enabled: true, allowlist: [\"notify_owner\"]` | 403 for `web_search` |\n| `test_invoke_unknown_tool_returns_404` | `enabled: true, allowlist: [\"*\"]` | 404 |\n| `test_invoke_approval_gated_without_agent_id_returns_400` | `enabled: true, allowlist: [\"shell_exec\"]` | 400 (no `?agent_id=`) |\n| `test_invoke_malformed_agent_id_returns_400` | `enabled: true, allowlist: [\"notify_owner\"]` | 400 for `?agent_id=not-a-uuid` |\n| `test_invoke_allowlisted_non_approval_tool_succeeds` | `enabled: true, allowlist: [\"notify_owner\"]` | 200 |\n| `test_invoke_writes_audit_entry` | `enabled: true, allowlist: [\"notify_owner\"]` | 200 + `AuditAction::ToolInvoke` entry |\n| `test_invoke_file_read_uses_plumbed_workspace_root` | `enabled: true, allowlist: [\"file_read\"]` | 200, reads file from sandbox |\n\n---\n\n### `load_test.rs`\n\nPerformance and concurrency tests. Most print throughput/latency metrics to stderr (visible with `--nocapture`):\n\n- `load_endpoint_latency` — measures p50/p95/p99 for 8 GET endpoints over 100 requests each; gates on p95 < 1s\n- `load_concurrent_reads` — 50 simultaneous requests across health/agents/status/metrics\n- `load_session_management` — creates 10 sessions, lists them, switches through them\n- `load_workflow_operations` — 15 concurrent workflow creates, then list\n- `load_metrics_sustained` — 200 sequential hits to `/api/metrics`, verifies Prometheus output\n- `load_concurrent_agent_spawns` — `#[ignore]` 20 parallel agent spawns\n- `load_spawn_kill_cycle` — `#[ignore]` 10 sequential spawn+kill cycles\n\nThe `#[ignore]` tests have known race conditions in the agent registry under high concurrency and are excluded from normal CI runs.\n\n---\n\n### `openapi_spec_test.rs`\n\nSingle test that generates the full OpenAPI spec from `utoipa` annotations, validates it has 100+ paths, and writes it to `<repo_root>/openapi.json` for SDK codegen and CI consumption.\n\n---\n\n## Conventions and Patterns\n\n**Temp directory lifecycle.** Every harness stores a `tempfile::TempDir` in a `_tmp` field. The leading underscore is intentional — the field is never read, but dropping it cleans up the kernel's home directory. The `Drop` impl on each harness struct calls `kernel.shutdown()` to stop async workers.\n\n**Multi-threaded tokio runtime.** All async tests use `#[tokio::test(flavor = \"multi_thread\")]` because the kernel spawns background tasks that require a multi-threaded runtime.\n\n**Manifest constants.** Test agent manifests (`TEST_MANIFEST`, `LLM_MANIFEST`, `MCP_TEST_MANIFEST`) are TOML strings embedded as constants. The ollama-based manifests don't make real LLM calls; the Groq-based manifest is only used when `GROQ_API_KEY` is set.\n\n**Default assistant.** The kernel auto-spawns a default \"assistant\" agent on boot. Tests account for this by expecting `agent_count >= 1` and filtering by name when looking for test-spawned agents.\n\n**Warmup rounds.** The latency test runs 10 warmup requests before measuring to avoid cold-start noise from lazy cache initialization, which caused flaky failures on Windows CI.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nHTTP and WebSocket API server for the LibreFang Agent OS daemon. This crate exposes the management surface of LibreFang — agent lifecycle, skill invocation, channel configuration, terminal access, and the embedded dashboard — through a unified REST/WebSocket interface built on Axum.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Client[\"HTTP / WS Clients\"]\n    API[\"librefang-api<br/>(Axum server)\"]\n    Kernel[\"librefang-kernel\"]\n    Runtime[\"librefang-runtime\"]\n    Memory[\"librefang-memory\"]\n    Channels[\"librefang-channels\"]\n    Wire[\"librefang-wire\"]\n    Skills[\"librefang-skills\"]\n    Hands[\"librefang-hands\"]\n    Extensions[\"librefang-extensions\"]\n    Telemetry[\"librefang-telemetry\"]\n    Migrate[\"librefang-migrate\"]\n\n    Client -->|REST / WebSocket| API\n    API --> Kernel\n    API --> Runtime\n    API --> Memory\n    API --> Channels\n    API --> Wire\n    API --> Skills\n    API --> Hands\n    API --> Extensions\n    API --> Telemetry\n    API --> Migrate\n```\n\nThe API layer sits at the top of the dependency stack, composing nearly every other LibreFang crate into a coherent HTTP service. It does not implement business logic itself — it translates HTTP/WebSocket requests into calls against the kernel, runtime, skills, and channel subsystems.\n\n## Build Process (`build.rs`)\n\nThe build script performs three tasks before compilation:\n\n1. **Dashboard asset placeholder** — Creates `static/react/` if it doesn't exist. The `include_dir!` macro (from the `include_dir` crate) embeds this directory at compile time. On fresh clones the directory is empty, so nothing is embedded; the runtime falls back to serving assets from `~/.librefang/dashboard/`. This avoids build failures when the dashboard hasn't been built yet.\n\n2. **Version metadata** — Captures three environment variables via `cargo:rustc-env`:\n   - `GIT_SHA` — short commit hash (`git rev-parse --short HEAD`), falls back to `\"unknown\"`\n   - `BUILD_DATE` — UTC date in `YYYY-MM-DD` format, falls back to `\"unknown\"`\n   - `RUSTC_VERSION` — full rustc version string, falls back to `\"unknown\"`\n\n   These are available at runtime via `env!()` macros and are typically exposed through a `/version` or `/health` endpoint.\n\n## Feature Flags\n\nFeatures control which channel backends are compiled in and whether telemetry infrastructure is included.\n\n### Channel Features\n\nEach channel feature is a passthrough to `librefang-channels`. Available channels:\n\n| Category | Channels |\n|----------|----------|\n| Core messaging | `channel-telegram`, `channel-discord`, `channel-slack`, `channel-matrix`, `channel-irc` |\n| Enterprise | `channel-teams`, `channel-google-chat`, `channel-mattermost`, `channel-webex` |\n| Social | `channel-mastodon`, `channel-bluesky`, `channel-reddit`, `channel-linkedin`, `channel-twitch` |\n| Messaging apps | `channel-whatsapp`, `channel-signal`, `channel-messenger`, `channel-viber`, `channel-line`, `channel-threema` |\n| Chinese platforms | `channel-wechat`, `channel-wecom`, `channel-dingtalk`, `channel-qq` |\n| Open/Federated | `channel-xmpp`, `channel-nostr`, `channel-mumble` |\n| Notification | `channel-gotify`, `channel-ntfy` |\n| Other | `channel-email`, `channel-webhook`, `channel-voice`, `channel-rocketchat`, `channel-zulip`, `channel-feishu`, `channel-revolt`, `channel-flock`, `channel-guilded`, `channel-keybase`, `channel-nextcloud`, `channel-pumble`, `channel-twist`, `channel-discourse`, `channel-gitter` |\n\nThree meta-features are provided:\n\n- **`all-channels`** — enables every channel listed above.\n- **`mini`** — enables the 12 most common channels (Telegram, Discord, Slack, Matrix, Email, Webhook, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat).\n- **`default`** — includes `all-channels` and `telemetry`.\n\n### Telemetry Feature\n\n`telemetry` enables OpenTelemetry trace export, Prometheus metrics, and the supporting crates (`opentelemetry`, `opentelemetry_sdk`, `opentelemetry-otlp`, `tracing-opentelemetry`, `metrics`, `metrics-exporter-prometheus`). When disabled, the server still logs via `tracing` but does not export traces or metrics.\n\n## Key Dependencies and Their Roles\n\n| Crate | Purpose in the API layer |\n|-------|-------------------------|\n| `axum` + `tower` + `tower-http` | HTTP framework, middleware stack (CORS, compression, tracing, rate limiting) |\n| `governor` | Per-IP rate limiting on public endpoints |\n| `jsonwebtoken`, `hmac`, `sha2` | JWT issuance and verification for API authentication |\n| `argon2` | Password hashing for local admin accounts |\n| `subtle` | Constant-time comparison for timing-safe auth checks |\n| `portable-pty` | PTY allocation for WebSocket terminal sessions |\n| `utoipa` | OpenAPI 3.x spec generation from route definitions |\n| `include_dir` | Compile-time embedding of the React dashboard |\n| `dashmap` | Concurrent maps for in-process state (e.g., active WebSocket sessions) |\n| `tokio-stream`, `futures` | Async stream composition for WebSocket and SSE endpoints |\n\n## Authentication and Security\n\nThe API uses JWT-based authentication with multiple layers:\n\n- **Argon2** for password storage — resistant to GPU-based brute force.\n- **HMAC-SHA256** for token signing (`hmac` + `sha2`).\n- **`subtle`** for constant-time comparison on secret values, preventing timing side-channels.\n- **`governor`** rate limiting on authentication endpoints to mitigate credential stuffing.\n\n## Terminal Access\n\nThe `portable-pty` dependency enables interactive terminal sessions over WebSocket. The API server allocates a pseudo-terminal, proxies input/output through the WebSocket connection, and tracks active sessions in memory via `dashmap`.\n\n## Dashboard Embedding\n\nThe React dashboard is embedded at compile time using `include_dir!(\"static/react\")`. The build script ensures this directory exists (creating it empty if necessary). The workflow is:\n\n1. **Development** — Dashboard is built separately (`npm run build`), output lands in `static/react/`, and gets embedded on the next `cargo build`.\n2. **Fresh clone** — Directory is empty; nothing is embedded. The server serves assets from the runtime directory `~/.librefang/dashboard/` instead.\n3. **Release builds** — CI populates `static/react/` before building the API crate.\n\n## Platform-Specific Dependencies\n\nOn Unix targets (`cfg(unix)`), the crate depends on `rustix` with the `process` feature. This is used for low-level process operations (signal handling, fd management) that complement the `librefang-runtime` process registry.\n\n## Relationship to Other Modules\n\nThe build script interacts with other crates in two minor ways:\n\n- It reads `librefang-runtime`'s process registry pattern (the `output` function) as a reference for how subprocess metadata is captured.\n- It checks a pattern similar to `librefang-extensions`'s vault `exists` method for file-existence gating logic.\n\nAt runtime, the API is the primary entry point for all external interaction with the LibreFang daemon. Downstream crates (channels, skills, hands) are invoked indirectly through the kernel and runtime, never directly from route handlers.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels — Dispatch Benchmarks\n\nLocation: `librefang-channels/benches/dispatch.rs`\n\n## Purpose\n\nCriterion micro-benchmark suite measuring the performance of three hot-path categories in the channel messaging subsystem:\n\n| Category | What it measures |\n|---|---|\n| **Serialization** | `serde_json` encode/decode of `ChannelMessage` |\n| **Routing** | `AgentRouter::resolve` and `resolve_with_context` under direct, default-fallback, binding-match, and context-aware scenarios |\n| **Formatting** | `format_for_channel` across all `OutputFormat` variants, `split_message`, and `default_phase_emoji` |\n\nThese benchmarks guard against regressions in the latency-critical path from inbound platform message to agent dispatch.\n\n## Running\n\n```bash\n# All benchmark groups\ncargo bench -p librefang-channels\n\n# A single group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n```\n\nOutput is written to `target/criterion/` with HTML reports by default.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph dispatch.rs\n        A[make_sample_message]\n        S[serialization group]\n        R[routing group]\n        F[formatting group]\n    end\n\n    subgraph librefang-channels\n        CM[ChannelMessage / ChannelUser]\n        AR[AgentRouter]\n        FC[format_for_channel]\n        SM[split_message]\n        PE[default_phase_emoji]\n    end\n\n    S -->|serde_json| CM\n    R --> AR\n    F --> FC\n    F --> SM\n    F --> PE\n    A --> CM\n```\n\n## Criterion Groups\n\n### `serialization`\n\n| Benchmark function | Underlying operation |\n|---|---|\n| `bench_message_serialize` | `serde_json::to_string(&ChannelMessage)` |\n| `bench_message_deserialize` | `serde_json::from_str::<ChannelMessage>(&json)` |\n| `bench_message_roundtrip` | Serialize then immediately deserialize |\n\nAll three operate on a sample `ChannelMessage` produced by `make_sample_message()` — a Telegram text message with a sender, timestamp, and empty metadata. The sample is constructed once per benchmark; only the iteration loop pays the (de)serialization cost.\n\n### `routing`\n\n| Benchmark function | Router state | Scenario |\n|---|---|---|\n| `bench_router_resolve_direct` | One direct route (`Telegram` / `user-42` → agent) | Exact match on channel + peer |\n| `bench_router_resolve_default_fallback` | Only a default agent set | No matching route, falls back |\n| `bench_router_resolve_binding_match` | One `AgentBinding` with channel + peer_id rule | Binding table lookup |\n| `bench_router_resolve_with_context` | One `AgentBinding` with channel + guild_id + roles rule; `BindingContext` with matching roles | Context-aware resolution via `resolve_with_context` |\n\nThe routing benchmarks exercise progressively more complex `AgentRouter` paths:\n\n1. **Direct** — `set_direct_route` stores a `(channel, peer_id) → AgentId` mapping. `resolve` performs a map lookup.\n2. **Default fallback** — When no route matches, `resolve` returns the agent set via `set_default`.\n3. **Binding match** — `load_bindings` feeds `AgentBinding` entries (with `BindingMatchRule` predicates). `resolve` evaluates rules against the incoming channel and peer.\n4. **Context-aware** — `resolve_with_context` additionally considers `guild_id` and `roles` from `BindingContext`, enabling guild/role-based dispatch (relevant for Discord).\n\nEach benchmark constructs and configures the router *outside* the timing loop so only the resolution logic is measured.\n\n### `formatting`\n\n| Benchmark function | Input | Format |\n|---|---|---|\n| `bench_format_markdown_passthrough` | Multi-paragraph markdown | `OutputFormat::Markdown` (identity) |\n| `bench_format_telegram_html` | Multi-paragraph markdown | `OutputFormat::TelegramHtml` |\n| `bench_format_slack_mrkdwn` | Multi-paragraph markdown | `OutputFormat::SlackMrkdwn` |\n| `bench_format_plain_text` | Multi-paragraph markdown | `OutputFormat::PlainText` (strip all formatting) |\n| `bench_format_telegram_html_short` | `\"Hello world!\"` | `OutputFormat::TelegramHtml` |\n| `bench_split_message_short` | `\"Hello!\"` | Split at 4096 chars |\n| `bench_split_message_long` | 500 lines (~10 KB) | Split at 4096 chars |\n| `bench_default_phase_emoji_all` | All six `AgentPhase` variants | Emoji lookup |\n\nThe `SAMPLE_MARKDOWN` constant exercises bold, italic, code spans, links, and list items — the rich subset of Markdown that every formatter must handle. The short-text benchmarks measure baseline overhead on trivial inputs.\n\n`bench_default_phase_emoji_all` iterates over `Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, and `Error` in a single measured closure.\n\n## Test Data\n\n### `make_sample_message()`\n\nReturns a `ChannelMessage` with:\n- `channel`: `ChannelType::Telegram`\n- `platform_message_id`: `\"msg-12345\"`\n- `sender`: `ChannelUser { platform_id: \"user-42\", display_name: \"Alice\", librefang_user: None }`\n- `content`: `ChannelContent::Text(\"Hello, how can you help me today?\")`\n- `target_agent`: `None`\n- `timestamp`: `Utc::now()` (captured at construction time)\n- `is_group`: `false`\n- `metadata`: empty `HashMap`\n\n### `SAMPLE_MARKDOWN`\n\nA 6-line Markdown string containing bold, italic, inline code, links, and a bulleted list — representative of agent output formatting workloads.\n\n### `SHORT_TEXT`\n\nThe string `\"Hello world!\"` — used to measure formatter overhead on minimal input.\n\n## External Dependencies\n\n| Crate | Usage |\n|---|---|\n| `criterion` | Benchmark framework (`criterion_group!` / `criterion_main!`) |\n| `serde_json` | JSON (de)serialization of `ChannelMessage` |\n| `chrono` | `Utc::now()` for message timestamps |\n| `smallvec` | `BindingContext.roles` is a `SmallVec` — the `smallvec!` macro is used in setup |\n\n## Relationship to Production Code\n\nThis benchmark file imports exclusively from:\n- `librefang_channels::formatter` — the `format_for_channel` function\n- `librefang_channels::router` — `AgentRouter` and `BindingContext`\n- `librefang_channels::types` — `ChannelMessage`, `ChannelContent`, `ChannelUser`, `ChannelType`, `AgentPhase`, `default_phase_emoji`, `split_message`\n- `librefang_types::agent` — `AgentId`\n- `librefang_types::config` — `OutputFormat`, `AgentBinding`, `BindingMatchRule`\n\nAny change to the serializer derived on `ChannelMessage`, the router's binding evaluation logic, or the formatter's markdown parser should be reflected in these benchmarks. Adding a new `OutputFormat` variant or `ChannelType` should be accompanied by a corresponding benchmark here.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# Bridge Integration Tests (`librefang-channels/tests/bridge_integration_test.rs`)\n\nIntegration tests for the `BridgeManager` dispatch pipeline. Tests exercise the full message flow — from adapter ingestion through routing, kernel dispatch, and response delivery — using in-process mocks. No external services are contacted.\n\n## Architecture\n\n```mermaid\ngraph LR\n    T[Test] -->|inject msg| MA[MockAdapter]\n    MA -->|ChannelMessage stream| BM[BridgeManager]\n    BM -->|resolve agent| AR[AgentRouter]\n    BM -->|dispatch| MH[MockHandle]\n    MH -->|response| BM\n    BM -->|send / send_streaming| MA\n    T -->|assert captured output| MA\n```\n\nEvery test follows the same pattern:\n1. Create a mock handle (kernel side) and an `AgentRouter`.\n2. Optionally pre-route users to agents via `router.set_user_default()`.\n3. Create a mock adapter (channel side), returning an `mpsc::Sender` for message injection.\n4. Construct a `BridgeManager`, call `start_adapter()`, inject messages, sleep briefly, then assert on captured output.\n5. Call `manager.stop()` to clean up.\n\n## Mock Adapters\n\n### `MockAdapter`\n\nBasic `ChannelAdapter` implementation. Does **not** support streaming.\n\n| Method | Behavior |\n|--------|----------|\n| `start()` | Returns a `ReceiverStream` from an injectable `mpsc::Receiver` |\n| `send()` | Captures `(platform_id, text)` into `sent: Arc<Mutex<Vec<...>>>` |\n| `stop()` | Signals shutdown via `watch::Sender` |\n\n**Construction:** `MockAdapter::new(name, channel_type) → (Arc<Self>, mpsc::Sender<ChannelMessage>)`\n\nThe returned sender is used to inject test messages. Call `adapter.get_sent()` to inspect responses delivered through `send()`.\n\n### `MockStreamingAdapter`\n\nStreaming-capable adapter. `supports_streaming()` returns `true`.\n\n| Method | Behavior |\n|--------|----------|\n| `send_streaming()` | Assembles all deltas from the receiver, captures the full text into `streamed` |\n| `send()` | Captures into the separate `sent` buffer |\n\nThis separation lets tests assert whether the streaming or non-streaming path was taken. Use `get_streamed()` and `get_sent()` respectively.\n\n### `MockFailingStreamingAdapter`\n\nClaims streaming support but always returns `Err` from `send_streaming()`. Drains the delta channel before failing so the bridge's `buffered_text` is populated for the fallback path. Used to exercise error recovery and metric recording.\n\n## Mock Kernel Handles\n\nAll implement `ChannelBridgeHandle`.\n\n### `MockHandle`\n\nReturns `Echo: {message}` from `send_message()`. Maintains a `received` log of `(AgentId, String)` pairs. Agent list is provided at construction.\n\n### `MockStreamingHandle`\n\nImplements `send_message_streaming()` by splitting the echo response into word-by-word deltas over an `mpsc::channel(16)`. Used to verify that streaming adapters receive deltas rather than a single assembled response.\n\n### `MockProgressHandle`\n\nImplements `send_message_streaming_with_sender_status()`. Emits a synthetic progress marker (`🔧 tool_name`) followed by prose text, then reports `Ok(())` via the status oneshot. Tests the V2 contract that non-streaming adapters (Discord, Slack, Matrix) see progress markers in the consolidated response.\n\n### `MockKernelErrorHandle`\n\nSends partial text deltas then reports `Err(\"rate limit hit\")` on the status oneshot. Exercises the \"send_streaming Err + kernel Err\" Telegram-path outcome.\n\n### `MockKernelOkHandle`\n\nKernel succeeds (`Ok(())` on status oneshot). Additionally implements `record_delivery()`, logging each call as `(success: bool, err: Option<String>)` into a `DeliveryLog`. Used to verify the Bug 1 fix: when kernel succeeds, `record_delivery` must be called with `(true, None)` even if the transport-side `send_streaming` fails.\n\n## Helper Functions\n\n### `make_text_msg(channel, user_id, text) → ChannelMessage`\n\nCreates a text message with sensible defaults (platform_message_id: `\"msg1\"`, display_name: `\"TestUser\"`, no thread, no metadata).\n\n### `make_command_msg(channel, user_id, cmd, args) → ChannelMessage`\n\nCreates a `ChannelContent::Command` message from a command name and string arguments.\n\n## Test Suite\n\n### Basic Dispatch\n\n| Test | Command / Content | Asserts |\n|------|-------------------|---------|\n| `test_bridge_dispatch_text_message` | Text: `\"Hello agent!\"` | Routed agent receives message; adapter receives `Echo: Hello agent!` |\n| `test_bridge_dispatch_agents_command` | `/agents` | Response lists all registered agent names |\n| `test_bridge_dispatch_help_command` | `/help` | Response mentions `/agents` and `/agent` |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` | Confirmation message sent; `router.resolve()` returns the correct agent |\n| `test_bridge_dispatch_no_agent_assigned` | Text (no route) | Error message contains `\"No agents available\"` |\n| `test_bridge_dispatch_slash_command_in_text` | Text: `\"/agents\"` | Slash-in-text is parsed as a command; agents are listed |\n| `test_bridge_dispatch_status_command` | `/status` | Response contains agent count |\n\n### Lifecycle & Multi-Adapter\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_manager_lifecycle` | Send 5 messages, receive 5 echo responses in order, stop completes without hanging |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run concurrently; each receives only its own responses |\n\n### Streaming Paths\n\n| Test | Configuration | Expected behavior |\n|------|--------------|-------------------|\n| `test_bridge_streaming_adapter_uses_send_streaming` | Streaming adapter + streaming handle | `send_streaming()` called; `send()` **not** called |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | Non-streaming adapter + streaming handle | `send()` called with assembled response |\n| `test_default_send_streaming_collects_and_sends` | Direct call to default `send_streaming` on `MockAdapter` | Deltas assembled into `\"Hello world!\"` and delivered via `send()` |\n\n### Error & Progress Paths\n\n| Test | Configuration | Expected behavior |\n|------|--------------|-------------------|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | `MockProgressHandle` + non-streaming adapter | Response contains `🔧` progress marker and post-tool prose |\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | `MockKernelErrorHandle` + `MockFailingStreamingAdapter` | Fallback `send()` delivers buffered text including progress markers |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | `MockKernelOkHandle` + `MockFailingStreamingAdapter` | Fallback delivers text; `record_delivery` called with `(success=true, err=None)` — the transport error must not leak into metrics |\n\n## Key Design Decisions\n\n**100ms–300ms sleeps** are used instead of explicit synchronization. This keeps tests simple but makes them sensitive to system load. The sleeps are intentionally generous for CI environments.\n\n**`Arc<Mutex<Vec<...>>>`** is used for captured output rather than async primitives because the mocks are accessed from both async tasks and synchronous test assertions. The critical sections are trivial (clone/append), so contention is negligible.\n\n**Separate mock structs** rather than a single configurable mock keep each test's intent clear. Reading `MockFailingStreamingAdapter` immediately signals \"this adapter fails streaming,\" whereas a flag-based approach would require tracing flag values back through test setup.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\n**Channel Bridge Layer** — pluggable messaging integrations for LibreFang.\n\n## Overview\n\n`librefang-channels` is the messaging abstraction layer that bridges LibreFang's core alerting and event system to dozens of external communication platforms. It translates LibreFang's internal message types into platform-specific API calls, webhook payloads, and protocol messages, and vice versa — ingesting replies and interactions back into the system.\n\nEvery supported platform is gated behind a Cargo feature flag, allowing downstream consumers to compile only the channels they need and minimize dependency bloat.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Core[\"librefang-types<br/>(shared types)\"]\n    Chan[\"librefang-channels\"]\n\n    Chan --> T[\"Telegram\"]\n    Chan --> D[\"Discord\"]\n    Chan --> S[\"Slack\"]\n    Chan --> M[\"Matrix\"]\n    Chan --> E[\"Email (SMTP/IMAP)\"]\n    Chan --> W[\"Webhook (generic)\"]\n    Chan --> O[\"40+ more channels\"]\n\n    Core -->|\"MessageEvent, Config types\"| Chan\n    Chan -->|\"Platform SDKs / HTTP / WS\"| O\n    Chan -->|\"Platform SDKs / HTTP / WS\"| T\n    Chan -->|\"Platform SDKs / HTTP / WS\"| D\n    Chan -->|\"Platform SDKs / HTTP / WS\"| S\n    Chan -->|\"Platform SDKs / HTTP / WS\"| M\n    Chan -->|\"Platform SDKs / HTTP / WS\"| E\n    Chan -->|\"Platform SDKs / HTTP / WS\"| W\n```\n\nEach channel implementation follows a uniform interface defined in terms of `librefang-types`, so the rest of the codebase can dispatch messages without knowing which platform sits at the other end.\n\n## Feature Flags\n\n### Default\n\nThe `default` feature enables all channels listed below **except** `channel-mqtt`. This gives a batteries-included experience for typical deployments.\n\n### `all-channels`\n\nEnables every channel including `channel-mqtt`. Useful for testing or building a universal binary.\n\n### Individual channel features\n\nEach channel is independently selectable. Combine them as needed:\n\n```toml\n# Minimal build — only Telegram and Discord\n[dependencies]\nlibrefang-channels = { version = \"0.1\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n] }\n```\n\n### Full feature list\n\n| Feature flag | Platform | Extra dependencies |\n|---|---|---|\n| `channel-telegram` | Telegram Bot API | — |\n| `channel-discord` | Discord | — |\n| `channel-slack` | Slack | — |\n| `channel-matrix` | Matrix | — |\n| `channel-email` | Email (SMTP + IMAP) | `lettre`, `imap`, `rustls-connector`, `mailparse` |\n| `channel-webhook` | Generic webhooks | — |\n| `channel-whatsapp` | WhatsApp | — |\n| `channel-signal` | Signal | — |\n| `channel-teams` | Microsoft Teams | — |\n| `channel-mattermost` | Mattermost | — |\n| `channel-irc` | IRC | — |\n| `channel-google-chat` | Google Chat | `rsa` |\n| `channel-twitch` | Twitch | — |\n| `channel-rocketchat` | Rocket.Chat | — |\n| `channel-zulip` | Zulip | — |\n| `channel-xmpp` | XMPP | — |\n| `channel-bluesky` | Bluesky (AT Protocol) | — |\n| `channel-feishu` | Feishu / Lark | `aes`, `cbc` |\n| `channel-line` | LINE | — |\n| `channel-mastodon` | Mastodon | — |\n| `channel-messenger` | Facebook Messenger | — |\n| `channel-reddit` | Reddit | — |\n| `channel-revolt` | Revolt | — |\n| `channel-viber` | Viber | — |\n| `channel-voice` | Voice / telephony gateway | — |\n| `channel-flock` | Flock | — |\n| `channel-guilded` | Guilded | — |\n| `channel-keybase` | Keybase | — |\n| `channel-nextcloud` | Nextcloud Talk | — |\n| `channel-nostr` | Nostr | `k256` |\n| `channel-pumble` | Pumble | — |\n| `channel-threema` | Threema | — |\n| `channel-twist` | Twist | — |\n| `channel-webex` | Cisco Webex | — |\n| `channel-dingtalk` | DingTalk | — |\n| `channel-discourse` | Discourse | — |\n| `channel-gitter` | Gitter | — |\n| `channel-gotify` | Gotify | — |\n| `channel-linkedin` | LinkedIn | — |\n| `channel-mumble` | Mumble | — |\n| `channel-ntfy` | ntfy | — |\n| `channel-qq` | QQ | — |\n| `channel-wechat` | WeChat | — |\n| `channel-wecom` | WeCom (Enterprise WeChat) | `aes`, `cbc`, `roxmltree` |\n| `channel-mqtt` | MQTT | `rumqttc` |\n\n## Core Dependencies\n\nThese are always linked regardless of which channels are enabled:\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared domain types — message events, channel configs, error types |\n| `tokio` | Async runtime for all channel I/O |\n| `reqwest` | HTTP client for REST-based channel APIs |\n| `axum` | HTTP server for receiving webhook callbacks |\n| `tokio-tungstenite` | WebSocket client for streaming platforms |\n| `serde` / `serde_json` | Serialization of payloads and configs |\n| `dashmap` | Concurrent maps for channel state tracking |\n| `async-trait` | Trait object support for channel implementations |\n| `hmac` / `sha2` / `sha1` | Signature verification on incoming webhooks |\n| `base64` / `hex` | Encoding utilities |\n| `image` | Image processing (JPEG, PNG, WebP) for media attachments |\n| `tracing` | Structured logging |\n| `uuid` | Correlation IDs for message tracking |\n| `url` | URL parsing and construction |\n\n## Benchmarks\n\nThe crate ships a Criterion benchmark suite under `benches/dispatch` measuring message dispatch throughput:\n\n```sh\ncargo bench --bench dispatch\n```\n\n## Relationship to Other Crates\n\n- **`librefang-types`** — Defines the `MessageEvent`, `ChannelConfig`, and related types that this crate consumes and produces. Every channel implementation translates between these shared types and its platform-specific wire format.\n- **Downstream consumers** — The main LibreFang binary or other workspace crates depend on `librefang-channels` to get a ready-to-use set of channel drivers without touching individual platform SDKs.\n\n## Adding a New Channel\n\n1. Add a new feature flag in `Cargo.toml`:\n\n   ```toml\n   channel-example = []\n   ```\n\n   Add any platform-specific optional dependencies if needed. Include the feature in both `default` and `all-channels` lists.\n\n2. Create the channel module under the appropriate source file, implementing the shared channel trait from `librefang-types`.\n\n3. Gate the module with `#[cfg(feature = \"channel-example\")]`.\n\n4. Register the channel in the dispatch registry so it can be resolved by name at runtime.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# librefang-cli-locales\n\nLocalization resource files for the LibreFang CLI. This module contains all user-facing strings used by the command-line interface, organized as Fluent (`.ftl`) translation catalogs.\n\n## Purpose\n\nThe CLI never hardcodes user-visible text. Every label, error message, hint, and status line lives in these Fluent message files, allowing the interface to be presented in the user's preferred language without changing application logic.\n\n## Supported Locales\n\n| Locale | File | Language |\n|--------|------|----------|\n| `en` | `locales/en/main.ftl` | English (default) |\n| `zh-CN` | `locales/zh-CN/main.ftl` | Simplified Chinese |\n\n## File Format\n\nAll files use [Project Fluent](https://projectfluent.org/) syntax. A message consists of an identifier, an optional `=` sign, and the translated value:\n\n```fluent\ndaemon-starting = Starting daemon...\n```\n\nMessages can reference variables passed at runtime using `{ $variable }`:\n\n```fluent\nkernel-booted = Kernel booted ({ $provider }/{ $model })\n```\n\nSome messages have companion `-fix` variants that provide remediation hints displayed alongside errors:\n\n```fluent\nerror-daemon-comm = Daemon communication error: { $error }\nerror-daemon-comm-fix = Check `librefang status` or restart: librefang start\n```\n\n## Message Categories\n\nThe files are internally organized by section comments. Below is the complete category map shared across all locales.\n\n### Daemon Lifecycle\n\nCovers start, stop, restart, background launch, health polling, and error states. Key identifiers:\n\n- `daemon-starting`, `daemon-started`, `daemon-stopped`, `daemon-stopped-ok`\n- `daemon-started-bg`, `daemon-still-starting`\n- `daemon-bg-exited`, `daemon-bg-exited-fix`, `daemon-bg-wait-fail`, `daemon-bg-wait-fail-fix`\n- `daemon-already-running`, `daemon-not-running`\n- `daemon-restarting`, `daemon-no-running-starting`, `daemon-no-running-auto`\n\n### Labels\n\nShort nouns used as table headers, field names, and status indicators. These are typically used in structured output (status tables, info sections).\n\n- `label-api`, `label-dashboard`, `label-provider`, `label-model`, `label-pid`, `label-log`\n- `label-status`, `label-agents`, `label-data-dir`, `label-uptime`, `label-version`, `label-daemon`\n- `label-id`, `label-active-agents`, `label-pairing-code`, `label-expires`\n- `label-home`, `label-platform`, `label-sessions`, `label-memory`, `label-started`\n- `label-response`, `label-checks`, `label-auth`, `label-mcp`, `label-peers`\n- `label-channels`, `label-skills`, `label-hands`, `label-config-warnings`\n\n### Hints\n\nActionable guidance displayed after commands or in interactive flows. These often include inline command examples.\n\n- `hint-open-dashboard`, `hint-stop-daemon`, `hint-check-status`\n- `hint-start-daemon`, `hint-start-daemon-cmd`, `hint-or-chat`\n- `hint-non-interactive`, `hint-non-interactive-wizard`\n- `hint-no-api-keys`, `hint-groq-free`, `hint-ollama-local`, `hint-gemini-free`, `hint-deepseek-free`\n- `hint-doctor-repair`, `hint-run-init`, `hint-run-start`, `hint-config-edit`\n- `hint-set-key`, `hint-set-key-provider`\n\n### Interactive Guide\n\nStrings for the first-run setup wizard (`librefang init`). Covers provider selection, API key pasting, and verification feedback.\n\n- `guide-title`, `guide-free-providers-title`, `guide-get-free-key`\n- `guide-paste-key-placeholder`, `guide-paste-key-hint`\n- `guide-setting-up`, `guide-testing-key`, `guide-key-verified`, `guide-test-key-unverified`\n- `guide-help-select`, `guide-help-paste`, `guide-help-wait`\n\n### Init\n\nCompletion messages for the initialization flow.\n\n- `init-quick-success`, `init-interactive-success`, `init-cancelled`\n- `init-next-start`, `init-next-chat`\n\n### Error Messages\n\nGeneral filesystem and I/O errors:\n\n- `error-home-dir`, `error-create-dir`, `error-create-dir-fix`\n- `error-write-config`, `error-config-created`, `error-config-exists`\n\nDaemon communication errors:\n\n- `error-daemon-returned`, `error-daemon-returned-fix`\n- `error-request-timeout`, `error-request-timeout-fix`\n- `error-connect-refused`, `error-connect-refused-fix`\n- `error-daemon-comm`, `error-daemon-comm-fix`\n\nBoot errors:\n\n- `error-boot-config`, `error-boot-config-fix`\n- `error-boot-db`, `error-boot-db-fix`\n- `error-boot-auth`, `error-boot-auth-fix`\n- `error-boot-generic`, `error-boot-generic-fix`\n\nDaemon requirement guard:\n\n- `error-require-daemon`, `error-require-daemon-fix`\n\n### Provider Detection\n\nAuto-detection feedback shown at startup.\n\n- `detected-provider`, `detected-gemini`, `detected-ollama`\n\n### Desktop App\n\nMessages for launching the optional desktop GUI.\n\n- `desktop-launching`, `desktop-started`, `desktop-launch-fail`, `desktop-not-found`\n\n### Agent Commands\n\nAll agent lifecycle messages: spawning, killing, model assignment, and template handling.\n\n- `agent-spawned`, `agent-spawned-inprocess`, `agent-spawn-failed`, `agent-spawn-agent-failed`\n- `agent-killed`, `agent-kill-failed`, `agent-invalid-id`\n- `agent-model-set`, `agent-set-model-failed`, `agent-unknown-field`\n- `agent-no-agents`, `agent-no-daemon-for-set`\n- `agent-template-not-found`, `agent-template-not-found-fix`\n- `agent-no-templates`, `agent-no-templates-fix`\n- `agent-template-parse-fail`, `agent-template-parse-fail-fix`\n- `section-agent-templates`\n\n### Manifest Errors\n\n- `manifest-not-found`, `manifest-not-found-fix`\n- `error-reading-manifest`, `error-parsing-manifest`\n\n### Status Display\n\nSection headers and field values for `librefang status` output.\n\n- `section-daemon-status`, `section-status-inprocess`\n- `section-active-agents`, `section-persisted-agents`\n- `label-daemon-not-running`, `section-status-locked`\n- `section-recent-errors`, `section-verbose`\n- `auth-none`, `auth-api-key`, `auth-dashboard-login`, `auth-user-keys`\n- `warn-public-bind`, `warn-key-missing`\n\n### Doctor\n\nDiagnostic and repair output.\n\n- `doctor-title`, `doctor-all-passed`, `doctor-repairs-applied`, `doctor-some-failed`\n- `doctor-no-api-keys`, `section-getting-api-key`\n\n### Security\n\nSecurity posture display (audit trail, sandboxing, wire protocol).\n\n- `section-security-status`\n- `label-audit-trail`, `label-taint-tracking`, `label-wasm-sandbox`, `label-wire-protocol`\n- `value-audit-trail`, `value-taint-tracking`, `value-wasm-sandbox`, `value-wire-protocol`\n- `value-api-keys`, `value-manifests`\n- `audit-verified`, `audit-failed`\n\n### Health\n\n- `health-ok`, `health-not-running`\n\n### Channel Setup\n\nMessaging platform configuration flows (Telegram, Discord, Slack, WhatsApp, Email, Signal, Matrix).\n\n- `section-channel-setup`, `channel-configured`, `channel-no-token`, `channel-no-email`\n- `channel-token-saved`, `channel-app-token-saved`, `channel-bot-token-saved`\n- `channel-password-saved`, `channel-phone-saved`, `channel-key-saved`\n- `channel-unknown`, `channel-unknown-fix`\n- `channel-test-ok`, `channel-test-fail`\n- `section-setup-telegram`, `section-setup-discord`, `section-setup-slack`, `section-setup-whatsapp`\n- `section-setup-email`, `section-setup-signal`, `section-setup-matrix`\n\n### Vault\n\nEncrypted credential storage messages.\n\n- `vault-initialized`, `vault-not-initialized`, `vault-not-init-run`\n- `vault-unlock-failed`, `vault-empty-value`\n- `vault-stored`, `vault-store-failed`, `vault-removed`, `vault-key-not-found`, `vault-remove-failed`\n\n### Cron\n\nScheduled job management.\n\n- `cron-created`, `cron-create-failed`\n- `cron-deleted`, `cron-delete-failed`\n- `cron-toggled`, `cron-toggle-failed`\n\n### Approvals\n\nHuman-in-the-loop approval workflow.\n\n- `approval-responded`, `approval-failed`\n\n### Memory\n\nAgent persistent memory key-value operations.\n\n- `memory-set`, `memory-set-failed`, `memory-deleted`, `memory-delete-failed`\n\n### Devices\n\nMobile device pairing via QR code.\n\n- `section-device-pairing`, `device-scan-qr`\n- `device-removed`, `device-remove-failed`\n\n### Webhooks\n\nWebhook CRUD and test operations.\n\n- `webhook-created`, `webhook-create-failed`\n- `webhook-deleted`, `webhook-delete-failed`\n- `webhook-test-ok`, `webhook-test-failed`\n\n### Models\n\nModel selection and catalog.\n\n- `model-set-success`, `model-set-failed`, `model-no-catalog`\n- `section-select-model`, `model-out-of-range`\n\n### Config\n\nConfiguration file operations: get, set, unset, set-key.\n\n- `config-set-success`, `config-unset-success`\n- `config-no-file`, `config-no-file-fix`\n- `config-read-failed`, `config-parse-error`, `config-parse-fix`, `config-parse-fix-alt`\n- `config-key-not-found`, `config-key-path-not-found`, `config-empty-key`\n- `config-section-not-scalar`, `config-section-not-scalar-fix`\n- `config-parent-not-table`, `config-serialize-failed`, `config-write-failed`\n- `config-set-kv`, `config-removed-key`, `config-no-key`\n- `config-saved-key`, `config-save-key-failed`\n- `config-removed-env`, `config-remove-key-failed`, `config-env-not-set`\n- `config-set-key-hint`, `config-update-key-hint`\n\n### Hands\n\nTool/hand instance lifecycle.\n\n- `hand-install-deps-success`, `hand-paused`, `hand-resumed`\n\n### Uninstall\n\nFull uninstall flow covering daemon stop, file removal, and platform-specific autostart cleanup (Windows registry, macOS launch agent, Linux systemd/autostart).\n\n- `uninstall-goodbye`, `uninstall-cancelled`, `uninstall-stopping-daemon`\n- `uninstall-removed`, `uninstall-remove-failed`, `uninstall-removed-data-kept`\n- `uninstall-removed-autostart-win`, `uninstall-removed-launch-agent`, `uninstall-remove-launch-fail`\n- `uninstall-removed-autostart-linux`, `uninstall-remove-autostart-fail`\n- `uninstall-removed-systemd`, `uninstall-remove-systemd-fail`\n- `uninstall-cleaned-path`, `uninstall-cleaned-path-win`\n\n### Reset\n\nSelective data removal.\n\n- `reset-success`, `reset-fail`\n\n### Logs\n\nLog tailing output.\n\n- `log-following`, `log-path-hint`\n\n## How the CLI Consumes These Messages\n\nThe CLI loads Fluent bundles at startup based on the user's locale (typically derived from environment variables like `LANG`, `LC_ALL`, or an explicit `--locale` flag). Code references messages by their Fluent identifier:\n\n```\n// Conceptual usage (actual API varies by Fluent bindings)\nbundle.getMessage(\"daemon-starting\")        // → \"Starting daemon...\"\nbundle.getMessage(\"kernel-booted\", { provider: \"groq\", model: \"llama3\" })\n```\n\nThe `-fix` suffix convention pairs every remediatable error with an actionable suggestion. The CLI renders them together:\n\n```\nDaemon communication error: connection refused\nCheck `librefang status` or restart: librefang start\n```\n\n## Adding a New Locale\n\n1. Create a directory under `locales/` with the appropriate locale code (e.g. `locales/ja/`).\n2. Copy `locales/en/main.ftl` into the new directory.\n3. Translate all right-hand-side values. **Do not** change message identifiers or variable names.\n4. Keep the section comment structure intact for maintainability.\n5. Register the new locale in the CLI's Fluent bundle loader.\n\n## Adding a New Message\n\n1. Add the message to **every** locale file, not just `en/main.ftl`. If a translation is not yet available, use the English text as a placeholder — missing identifiers cause runtime fallback errors.\n2. Place it under the correct section comment.\n3. Follow existing naming conventions:\n   - `kebab-case` identifiers\n   - `-fix` suffix for remediation hints\n   - `section-` prefix for UI section headers\n   - `label-` prefix for short field labels\n   - `hint-` prefix for guidance text\n   - `error-` prefix for error messages\n   - `warn-` prefix for warnings\n   - `value-` prefix for descriptive values paired with labels\n\n## Conventions\n\n| Pattern | Meaning | Example |\n|---------|---------|---------|\n| `{ $var }` | Runtime variable interpolation | `daemon-error = Error: { $error }` |\n| `-fix` suffix | Remediation hint paired with an error | `error-connect-refused-fix` |\n| `section-` prefix | Section heading in TUI output | `section-daemon-status` |\n| `label-` prefix | Short noun for tables/lists | `label-uptime` |\n| `hint-` prefix | Contextual guidance | `hint-stop-daemon` |\n| `error-` prefix | Error condition | `error-boot-auth` |\n| `warn-` prefix | Warning condition | `warn-public-bind` |\n| `value-` prefix | Descriptive text paired with a label | `value-wasm-sandbox` |\n| `guide-` prefix | First-run wizard content | `guide-paste-key-hint` |\n\nAll files within a single locale use `main.ftl` as the sole entry point. There is no message splitting across multiple files per locale.","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration templates used by the `librefang init` command to generate a working `config.toml` for LibreFang Agent OS.\n\n## Purpose\n\nThis module contains two static TOML template files that serve as the basis for a new installation's configuration. They are not executed directly — the CLI reads them at init time, substitutes placeholder values, and writes the result to the user's config directory.\n\n| File | When Used |\n|------|-----------|\n| `init_default_config.toml` | Full reference config with every section commented out except the essentials. Written when the user chooses the \"default\" setup path or wants a complete starting point. |\n| `init_wizard_config.toml` | Minimal skeleton written by the interactive setup wizard. Contains only the fields the wizard collected (provider, model, API key) plus a few sensible defaults. |\n\n## Template Placeholders\n\nBoth files use Mustache-style `{{variable}}` tokens that the CLI replaces before writing:\n\n| Placeholder | Source | Example Substitution |\n|-------------|--------|----------------------|\n| `{{provider}}` | Wizard selection / CLI flag | `openai` |\n| `{{model}}` | Wizard selection / CLI flag | `gpt-4o` |\n| `{{api_key_env}}` | Environment variable name chosen by user | `OPENAI_API_KEY` |\n| `{{api_key_line}}` | Pre-formatted line (wizard only) | `api_key_env = \"OPENAI_API_KEY\"` |\n| `{{routing_section}}` | Optional routing block (wizard only) | Empty string or a `[routing]` table |\n\n## Configuration Sections\n\nThe following sections appear in `init_default_config.toml`. Sections marked *active* are uncommented by default; *opt-in* sections are commented out and must be explicitly enabled.\n\n### Active by Default\n\n#### Server Settings\n```toml\napi_listen = \"127.0.0.1:4545\"\nlog_level = \"info\"             # trace | debug | info | warn | error\nmode = \"default\"               # stable | default | dev\nupdate_channel = \"stable\"      # stable | beta | rc\n```\n- **`api_listen`** — Bind address for the HTTP/WebSocket server. `\"127.0.0.1:4545\"` for local-only; `\"0.0.0.0:4545\"` to expose on LAN.\n- **`mode`** — Controls feature gating. `stable` hides experimental features; `dev` enables everything.\n- **`update_channel`** — Determines which release track to pull updates from.\n\n#### Dashboard Credentials\n```toml\ndashboard_user = \"librefang\"\ndashboard_pass = \"librefang\"\n```\nDefault credentials for the web dashboard. The template includes a comment directing users to change these immediately, and documents three secure alternatives:\n1. **Vault** — `librefang vault set dashboard_password` then reference as `dashboard_pass = \"vault:dashboard_password\"`\n2. **Environment variable** — Set `LIBREFANG_DASHBOARD_PASS`\n3. **Direct string** — Replace the value inline (least secure)\n\n#### Default LLM\n```toml\n[default_model]\nprovider = \"{{provider}}\"\nmodel = \"{{model}}\"\napi_key_env = \"{{api_key_env}}\"\n```\nThe primary model used when no agent-specific override is set. `api_key_env` names the environment variable holding the API key rather than embedding the key itself.\n\n#### Memory\n```toml\n[memory]\ndecay_rate = 0.05\n\n[proactive_memory]\nenabled = true\nauto_memorize = true\nauto_retrieve = true\nmax_retrieve = 10\n```\n- **`decay_rate`** — Confidence reduction per cycle for stored memories.\n- **`proactive_memory`** — Controls automatic fact extraction from conversations and context retrieval. Sub-options like `extraction_threshold`, `session_ttl_hours`, `duplicate_threshold`, and `max_memories_per_agent` are available but commented out.\n\n#### Performance\n```toml\nprompt_caching = true\nstable_prefix_mode = true\nusage_footer = \"full\"          # off | tokens | cost | full\n```\n- **`prompt_caching`** — Reduces LLM costs by reusing cached prompts (Anthropic/OpenAI).\n- **`stable_prefix_mode`** — Improves cache hit rate by maintaining a consistent prompt prefix.\n- **`usage_footer`** — Controls what token/cost information is displayed in responses.\n\n#### Web Tools\n```toml\n[web]\nsearch_provider
