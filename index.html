s for the performance-critical paths in `librefang-channels`: message (de)serialization, agent routing/dispatch, and output formatting. It lives under `librefang-channels/benches/dispatch.rs` and runs via `cargo bench`.\n\n## Running\n\n```sh\n# All benchmark groups\ncargo bench -p librefang-channels\n\n# A single benchmark\ncargo bench -p librefang-channels -- message_serialize\n```\n\nThe binary is registered through Criterion's `criterion_main!` macro at the bottom of the file.\n\n## Benchmark Groups\n\nThe benchmarks are organized into three Criterion groups, each exercising a distinct subsystem.\n\n### Serialization (`serialization`)\n\nMeasures JSON throughput for `ChannelMessage` using `serde_json`.\n\n| Benchmark | What it measures |\n|---|---|\n| `message_serialize` | `serde_json::to_string` on a typical `ChannelMessage` |\n| `message_deserialize` | `serde_json::from_str` parsing the same JSON back |\n| `message_roundtrip` | Serialize then deserialize in one iteration (combined overhead) |\n\nAll three use a shared `make_sample_message()` helper that constructs a representative Telegram text message with a sender, timestamp, and empty metadata map. This function is the single source of truth for the fixture data—changing it affects all three benches.\n\n### Routing (`routing`)\n\nExercises `AgentRouter` resolution under four scenarios of increasing complexity.\n\n```mermaid\nflowchart LR\n    A[\"resolve()\"] -->|\"direct hit\"| B[\"set_direct_route\"]\n    A -->|\"no match\"| C[\"default fallback\"]\n    D[\"resolve_with_context()\"] -->|\"binding rules\"| E[\"load_bindings + roles\"]\n```\n\n| Benchmark | Router setup | Resolution path |\n|---|---|---|\n| `router_resolve_direct` | One direct route (`Telegram` / `user-42`) plus a default | Hits the direct route immediately |\n| `router_resolve_default_fallback` | Only a default agent set | Falls through to the default because no specific route matches |\n| `router_resolve_binding_match` | An agent registered as `\"support\"` with a binding matching `telegram` + `vip-user` | Binding-based match via `load_bindings` |\n| `router_resolve_with_context` | An agent registered as `\"admin-bot\"` with a binding matching `discord` + `guild-1` + `admin` role | Full `resolve_with_context` with `BindingContext` containing guild ID and roles |\n\nThe context-aware bench constructs a `BindingContext` with `Cow::Borrowed` strings and a `smallvec` of roles to simulate realistic call overhead.\n\n**Key APIs exercised:** `AgentRouter::new`, `set_default`, `set_direct_route`, `register_agent`, `load_bindings`, `resolve`, `resolve_with_context`.\n\n### Formatting (`formatting`)\n\nBenchmarks the `format_for_channel` function from `librefang_channels::formatter` and the `split_message` / `default_phase_emoji` helpers from `types`.\n\n| Benchmark | Input | Output format |\n|---|---|---|\n| `format_markdown_passthrough` | Multi-paragraph markdown | `OutputFormat::Markdown` |\n| `format_telegram_html` | Same markdown | `OutputFormat::TelegramHtml` |\n| `format_slack_mrkdwn` | Same markdown | `OutputFormat::SlackMrkdwn` |\n| `format_plain_text` | Same markdown | `OutputFormat::PlainText` |\n| `format_telegram_html_short` | `\"Hello world!\"` | `OutputFormat::TelegramHtml` |\n| `split_message_short` | `\"Hello!\"` | N/A — tests split at 4096-char boundary |\n| `split_message_long` | 500 repeated lines (~13 KB) | N/A — forces multiple splits |\n| `default_phase_emoji_all` | All six `AgentPhase` variants | N/A — lookup overhead only |\n\nThe `SAMPLE_MARKDOWN` constant includes bold, italic, inline code, links, and a bullet list—covering the formatter's full conversion surface. The `SHORT_TEXT` constant provides a best-case baseline for short-input formatting paths.\n\nThe `default_phase_emoji_all` bench iterates over `Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, and `Error` to measure phase-to-emoji mapping cost across all variants.\n\n## Fixture Data\n\n### `make_sample_message()`\n\nReturns a `ChannelMessage` with these characteristics:\n\n- **Channel:** `Telegram`\n- **Message ID:** `\"msg-12345\"`\n- **Sender:** `ChannelUser { platform_id: \"user-42\", display_name: \"Alice\" }` with no linked LibreFang user\n- **Content:** `Text(\"Hello, how can you help me today?\")`\n- **Group:** `false`, no thread ID, empty metadata\n- **Timestamp:** `Utc::now()` (captured once at construction time)\n\nSince the timestamp is fixed per bench invocation (the message is built once before the timed loop), it does not introduce variance.\n\n## Dependencies on Other Crates\n\n| Crate | Usage |\n|---|---|\n| `librefang-channels` | Primary crate under test (types, router, formatter) |\n| `librefang-types` | `AgentId`, `OutputFormat`, `AgentBinding`, `BindingMatchRule` |\n| `criterion` | Benchmark harness |\n| `chrono` | `Utc::now()` for message timestamps |\n| `serde_json` | Serialization layer being measured |\n| `smallvec` | Role list in `BindingContext` |\n\n## Adding New Benchmarks\n\nTo add a benchmark to an existing group, define a `fn bench_*(c: &mut Criterion)` function and append it to the relevant `criterion_group!` macro call at the bottom of the file. To create a new group, add another `criterion_group!` and include it in `criterion_main!`.\n\nUse `black_box` on all inputs to prevent the compiler from constant-folding or dead-code-eliminating the work under measurement.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# librefang-channels Integration Tests\n\nBridge dispatch pipeline tests that verify the full message lifecycle from adapter ingestion through routing, agent dispatch, and response delivery — all in-process with no external service dependencies.\n\n## Architecture\n\nThe tests wire **real production components** (`BridgeManager`, `AgentRouter`) against **mock implementations** of the two integration boundaries:\n\n```mermaid\ngraph LR\n    subgraph Test Infrastructure\n        TX[mpsc::Sender] -->|inject messages| MA[MockAdapter]\n        MA -->|ChannelMessage stream| BM[BridgeManager]\n        BM -->|dispatch| MH[MockHandle]\n        MH -->|response| BM\n        BM -->|send / send_streaming| MA\n    end\n    BM --> AR[AgentRouter]\n```\n\n- **`ChannelAdapter`** mock — replaces real platform adapters (Telegram, Discord, etc.)\n- **`ChannelBridgeHandle`** mock — replaces the real kernel connection\n\nCommunication flows through real `tokio` channels and tasks, making these true integration tests rather than unit tests with mocked dependencies.\n\n## Mock Components\n\n### Channel Adapters\n\n| Adapter | Streaming | Behavior |\n|---------|-----------|----------|\n| `MockAdapter` | No | Echoes responses; captures sent text and interactive button labels |\n| `MockStreamingAdapter` | Yes | Implements `send_streaming`; captures streamed deltas separately from non-streaming sends |\n| `MockFailingStreamingAdapter` | Yes | `send_streaming` always returns `Err`; drains the delta channel to populate `buffered_text` before failing |\n\nAll adapters use an `mpsc::Receiver<ChannelMessage>` as their message source, allowing tests to inject arbitrary messages through a paired `mpsc::Sender`. Sent responses are captured in an `Arc<Mutex<Vec<_>>>` for post-assertion inspection.\n\n### Kernel Handles\n\n| Handle | Key Methods | Behavior |\n|--------|-------------|----------|\n| `MockHandle` | `send_message` | Returns `Echo: {message}`; records received messages |\n| `MockStreamingHandle` | `send_message_streaming` | Splits echo response into word-by-word deltas over `mpsc::Receiver<String>` |\n| `MockProgressHandle` | `send_message_streaming_with_sender_status` | Emits progress marker `🔧 tool_name` followed by prose; reports kernel success |\n| `MockKernelErrorHandle` | `send_message_streaming_with_sender_status` | Emits partial text + progress, then reports `Err(\"rate limit hit\")` via status oneshot |\n| `MockKernelOkHandle` | `send_message_streaming_with_sender_status` + `record_delivery` | Emits clean text, reports `Ok(())`, logs all `record_delivery` calls for metric assertion |\n\n### Message Constructors\n\n- **`make_text_msg(channel, user_id, text)`** — builds a `ChannelMessage` with `ChannelContent::Text`\n- **`make_command_msg(channel, user_id, cmd, args)`** — builds a `ChannelMessage` with `ChannelContent::Command`\n\nBoth set sensible defaults for unused fields (`platform_message_id: \"msg1\"`, `is_group: false`, `thread_id: None`).\n\n## Test Coverage\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_dispatch_text_message` | A text message from a pre-routed user reaches the correct agent; the echo response is delivered back to the adapter |\n| `test_bridge_dispatch_no_agent_assigned` | An unrouted user receives a \"No agents available\" error message instead of a silent failure |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text starting with `/` (e.g., `\"/agents\"`) is detected and handled as a command, not forwarded to an agent |\n\n### Command Handling\n\n| Test | Command | Expected behavior |\n|------|---------|-------------------|\n| `test_bridge_dispatch_agents_command` | `/agents` | Lists all registered agents by name |\n| `test_bridge_dispatch_help_command` | `/help` | Returns help text mentioning `/agents` and `/agent` |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` | Confirms selection; updates `AgentRouter` so future messages from that user route to the selected agent |\n| `test_bridge_dispatch_status_command` | `/status` | Returns uptime info including running agent count |\n\n### Lifecycle and Multi-Adapter\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_manager_lifecycle` | Start → send 5 sequential messages → all 5 echo responses received → clean stop without hanging |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run concurrently on the same `BridgeManager`; messages on each adapter receive independent correct responses |\n\n### Streaming Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both adapter and handle support streaming, `send_streaming` is called (not `send`); full streamed text is reassembled |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter doesn't support streaming, `send()` is called with the complete response even though the handle provides a streaming API |\n| `test_default_send_streaming_collects_and_sends` | The default `send_streaming` implementation on `ChannelAdapter` collects all deltas and forwards the assembled text to `send()` |\n\n### Progress Markers and Error Recovery\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapters (Discord/Slack/Matrix) receive `🔧` progress markers in their consolidated response via the streaming-with-status pipeline |\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | When both `send_streaming` and the kernel status report errors, the buffered fallback delivers accumulated partial text including progress markers |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression test**: When kernel succeeds but transport `send_streaming` fails, `record_delivery` is called with `(success=true, err=None)` — the transport stream error must not leak into the metric's error field |\n\n## Test Pattern\n\nEvery test follows the same structure:\n\n```rust\n// 1. Set up routing\nlet router = Arc::new(AgentRouter::new());\nrouter.set_user_default(\"user1\".to_string(), agent_id);\n\n// 2. Create mock components\nlet (adapter, tx) = MockAdapter::new(\"test\", ChannelType::Telegram);\nlet handle = Arc::new(MockHandle::new(agents));\n\n// 3. Wire through real BridgeManager\nlet mut manager = BridgeManager::new(handle, router);\nmanager.start_adapter(adapter).await.unwrap();\n\n// 4. Inject a message\ntx.send(make_text_msg(ChannelType::Telegram, \"user1\", \"hello\")).await.unwrap();\n\n// 5. Wait for async processing\ntokio::time::sleep(Duration::from_millis(100)).await;\n\n// 6. Assert on captured outputs\nlet sent = adapter_ref.get_sent();\nassert_eq!(sent[0].1, \"Echo: hello\");\n\n// 7. Clean shutdown\nmanager.stop().await;\n```\n\nThe `tokio::time::sleep` calls allow the async dispatch loop to process messages. Tests use 100–300ms depending on the number of async steps involved (streaming tests need more time for delta propagation).\n\n## Relationship to Production Code\n\nThese tests exercise three production modules end-to-end:\n\n- **`bridge::BridgeManager`** — adapter lifecycle, message dispatch, response delivery, streaming negotiation\n- **`router::AgentRouter`** — user-to-agent routing via `set_user_default` and `resolve`\n- **`types`** — `ChannelAdapter` trait, `ChannelBridgeHandle` trait, `ChannelMessage`, `ChannelContent`, `ChannelUser`\n\nNo production code from this test module is called by other modules — it is purely a verification layer.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\nChannel Bridge Layer — pluggable messaging integrations for LibreFang.\n\n## Overview\n\n`librefang-channels` provides a unified abstraction over 40+ messaging platforms, enabling LibreFang to send, receive, and synchronize messages across disparate communication services. Each channel is a compile-time selectable feature, allowing deployments to include only the integrations they need and keep binary size and dependency count minimal.\n\n## Architecture\n\nAll channels implement a common async interface (defined in `librefang-types`), which the core dispatch layer uses to route outbound messages and accept inbound ones. The crate handles protocol-specific concerns — HTTP webhook verification, WebSocket lifecycle management, encryption/decryption, signature validation, and message format translation — behind that uniform interface.\n\n```mermaid\ngraph TD\n    Core[\"LibreFang Core Dispatch\"] -->|\"outbound message\"| CB[\"Channel Bridge\"]\n    CB -->|\"normalized Message\"| T[\"Telegram\"]\n    CB -->|\"normalized Message\"| D[\"Discord\"]\n    CB -->|\"normalized Message\"| S[\"Slack\"]\n    CB -->|\"normalized Message\"| E[\"Email (SMTP/IMAP)\"]\n    CB -->|\"normalized Message\"| W[\"Webhook\"]\n    CB -->|\"normalized Message\"| O[\"... 35+ more channels\"]\n    T -->|\"inbound event\"| CB\n    D -->|\"inbound event\"| CB\n    S -->|\"inbound event\"| CB\n    E -->|\"inbound event\"| CB\n    CB -->|\"normalized Event\"| Core\n```\n\n## Feature Flags\n\nEvery channel is individually gated behind a Cargo feature. Two meta-features control bulk inclusion:\n\n| Feature | Behavior |\n|---|---|\n| `default` | Enables all channels **except** `channel-mqtt`. Covers the 44 most common integrations. |\n| `all-channels` | Enables every channel including `channel-mqtt`. |\n\nTo build with only specific channels, disable default features and list the ones you need:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n    \"channel-email\",\n] }\n```\n\n### Available Channels\n\n| Feature | Platform | Extra Dependencies |\n|---|---|---|\n| `channel-telegram` | Telegram Bot API | — |\n| `channel-discord` | Discord | — |\n| `channel-slack` | Slack | — |\n| `channel-matrix` | Matrix | — |\n| `channel-email` | Email (SMTP + IMAP) | `lettre`, `imap`, `rustls-connector`, `mailparse` |\n| `channel-webhook` | Generic webhooks | — |\n| `channel-whatsapp` | WhatsApp Business | — |\n| `channel-signal` | Signal | — |\n| `channel-teams` | Microsoft Teams | — |\n| `channel-mattermost` | Mattermost | — |\n| `channel-irc` | IRC | — |\n| `channel-google-chat` | Google Chat | `rsa` |\n| `channel-twitch` | Twitch | — |\n| `channel-rocketchat` | Rocket.Chat | — |\n| `channel-zulip` | Zulip | — |\n| `channel-xmpp` | XMPP | — |\n| `channel-bluesky` | Bluesky (AT Protocol) | — |\n| `channel-feishu` | Feishu / Lark | `aes`, `cbc` |\n| `channel-line` | LINE | — |\n| `channel-mastodon` | Mastodon | — |\n| `channel-messenger` | Facebook Messenger | — |\n| `channel-reddit` | Reddit | — |\n| `channel-revolt` | Revolt | — |\n| `channel-viber` | Viber | — |\n| `channel-voice` | Voice / telephony | — |\n| `channel-flock` | Flock | — |\n| `channel-guilded` | Guilded | — |\n| `channel-keybase` | Keybase | — |\n| `channel-nextcloud` | Nextcloud Talk | — |\n| `channel-nostr` | Nostr | `k256` |\n| `channel-pumble` | Pumble | — |\n| `channel-threema` | Threema | — |\n| `channel-twist` | Twist | — |\n| `channel-webex` | Cisco Webex | — |\n| `channel-dingtalk` | DingTalk | — |\n| `channel-discourse` | Discourse | — |\n| `channel-gitter` | Gitter | — |\n| `channel-gotify` | Gotify | — |\n| `channel-linkedin` | LinkedIn | — |\n| `channel-mumble` | Mumble | — |\n| `channel-ntfy` | ntfy.sh | — |\n| `channel-qq` | QQ | — |\n| `channel-wechat` | WeChat | — |\n| `channel-wecom` | WeCom (Enterprise WeChat) | `aes`, `cbc`, `roxmltree` |\n| `channel-mqtt` | MQTT | `rumqttc` |\n\n## Shared Infrastructure\n\nWhile each channel handles its own protocol specifics, several cross-cutting capabilities are shared across the crate:\n\n### HTTP Transport\n\n`reqwest` provides the HTTP client for REST-based channels. `axum` is included for channels that receive inbound events via webhook — it spins up lightweight HTTP listeners to accept platform callbacks.\n\n### WebSocket Transport\n\n`tokio-tungstenite` supports channels requiring persistent real-time connections (e.g., Discord gateway, IRC, some Matrix transports).\n\n### Cryptographic Verification\n\nChannels that validate webhook signatures or decrypt payloads share these crates:\n\n- **`hmac` + `sha2` / `sha1`** — HMAC-based signature verification (Slack, WhatsApp, Viber, generic webhooks, etc.)\n- **`aes` + `cbc`** — AES-CBC decryption for platforms that encrypt callback payloads (Feishu, WeCom)\n- **`k256`** — Elliptic curve operations for Nostr event signing/verification\n- **`rsa`** — RSA signature validation for Google Chat service account authentication\n\n### Media Handling\n\nThe `image` crate (with JPEG, PNG, and WebP support) handles avatar and attachment processing — resizing, format conversion, and thumbnail generation for platforms with media constraints.\n\n### Concurrency\n\n`dashmap` provides lock-free concurrent maps for tracking active connections, rate limiters, and per-channel state. `tokio-stream` and `futures` manage async event pipelines.\n\n## Relationship to Other Crates\n\n```\nlibrefang-types  ← defines the Channel trait, Message, Event, and shared types\n        ↑\nlibrefang-channels ← implements Channel for each platform (this crate)\n        ↑\nlibrefang-core    ← dispatches messages through the Channel interface\n```\n\n`librefang-channels` depends on `librefang-types` for trait definitions and shared data structures. It does not depend on the core crate — direction is strictly outward. The core engine calls into channels; channels never call back into core directly. Inbound events are returned through the trait interface for the core to process.\n\n## Benchmarks\n\nThe crate ships a Criterion benchmark suite (`benches/dispatch`) for measuring channel dispatch throughput. Run with:\n\n```sh\ncargo bench -p librefang-channels --bench dispatch\n```\n\n## Adding a New Channel\n\n1. Add a new feature flag in `Cargo.toml`:\n   ```toml\n   channel-newplatform = [\"dep:some-crate\"]\n   ```\n2. Add the feature to both the `default` and `all-channels` lists.\n3. Declare any optional dependencies the channel requires.\n4. Implement the channel trait (from `librefang-types`) in a new module within the crate, gated by `#[cfg(feature = \"channel-newplatform\")]`.\n5. Register the channel in the factory/registry so the core can discover it at runtime.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# LibreFang CLI Locales\n\nLocalization resources for the LibreFang command-line interface, providing all user-facing strings in multiple languages using [Project Fluent](https://projectfluent.org/) (`.ftl`) format.\n\n## Structure\n\n```\nlibrefang-cli/locales/\n├── en/           # English (default / fallback)\n│   └── main.ftl\n└── zh-CN/        # Simplified Chinese\n    └── main.ftl\n```\n\nEach locale directory contains a single `main.ftl` file holding the complete translation catalog for that language. The locale directory names follow [BCP 47](https://tools.ietf.org/html/b4647) conventions.\n\n## Format\n\nAll files use Fluent's `.ftl` syntax. A message consists of an identifier, optional attributes, and a value that may contain variables and select expressions:\n\n```ftl\n# Simple message\ndaemon-starting = Starting daemon...\n\n# Message with a variable\ndaemon-error = Daemon error: { $error }\n\n# Message with a typed variable (pluralization, etc.)\nagents-loaded = { $count } agent(s) loaded\n```\n\nVariables like `{ $error }`, `{ $path }`, `{ $name }`, `{ $id }`, `{ $provider }`, `{ $model }`, `{ $command }`, `{ $action }`, `{ $status }`, `{ $count }`, `{ $url }`, `{ $display }`, `{ $env_var }`, `{ $key }`, `{ $value }`, `{ $field }`, `{ $agent }`, and `{ $max }` are passed at call sites in the Rust codebase via the `fluent` / `flume` / `icu` integration layer.\n\n## Message Categories\n\nMessages are organized into sections by comment headers within each file:\n\n| Section | Prefix | Purpose |\n|---|---|---|\n| Daemon lifecycle | `daemon-*` | Start, stop, restart, background launch, health checks |\n| Labels | `label-*` | Field labels for status displays and tables |\n| Hints | `hint-*` | Contextual guidance shown after commands or errors |\n| Setup guide | `guide-*` | Interactive first-run wizard strings |\n| Initialization | `init-*` | `librefang init` success/cancel messages |\n| Errors | `error-*` | Error messages, each paired with a `*-fix` variant |\n| Boot errors | `error-boot-*` | Kernel startup failures |\n| Provider detection | `detected-*` | Auto-detected LLM provider announcements |\n| Desktop app | `desktop-*` | Desktop launcher status |\n| Dashboard | `dashboard-*` | Web dashboard open messages |\n| Agent commands | `agent-*` | Spawn, kill, model-set, template operations |\n| Manifest errors | `manifest-*`, `error-*-manifest` | Agent manifest file issues |\n| Status display | `section-*`, `label-*`, `warn-*` | Status subcommand output sections and warnings |\n| Doctor | `doctor-*` | Diagnostic check results |\n| Security | `label-*`, `value-*`, `audit-*` | Security status display values |\n| Health | `health-*` | Simple health check outcomes |\n| Channel setup | `channel-*`, `section-setup-*` | Messaging channel configuration (Telegram, Discord, Slack, WhatsApp, Email, Signal, Matrix) |\n| Vault | `vault-*` | Credential vault operations |\n| Cron | `cron-*` | Scheduled job management |\n| Approvals | `approval-*` | Human-in-the-loop approval responses |\n| Memory | `memory-*` | Agent memory key-value operations |\n| Devices | `device-*` | Mobile device pairing |\n| Webhooks | `webhook-*` | Webhook CRUD and testing |\n| Models | `model-*`, `section-select-*` | Model catalog selection |\n| Config | `config-*` | Configuration get/set/unset, key management, env file ops |\n| Hand commands | `hand-*` | Hand instance lifecycle (install deps, pause, resume) |\n| Daemon notify | `daemon-restart-notify` | Post-config-change restart reminder |\n| System info | `section-system-info` | System information header |\n| Uninstall | `uninstall-*` | Full uninstall flow including per-OS autostart cleanup |\n| Reset | `reset-*` | Data directory reset |\n| Logs | `log-*` | Log file tailing |\n\n## Error/Fix Pattern\n\nMost error messages follow a paired convention: the error message itself and an adjacent `*-fix` message providing remediation guidance. For example:\n\n```ftl\nerror-boot-auth = LLM provider authentication failed\nerror-boot-auth-fix = Run `librefang doctor` to check your API key configuration\n```\n\nThe calling code retrieves both messages and displays them together, giving users actionable next steps for every failure mode.\n\n## Adding a New Message\n\n1. Add the message identifier and English text to `en/main.ftl` under the appropriate section comment.\n2. Mirror the identifier in every other locale's `main.ftl` with the translated value.\n3. Use the message ID in Rust code via the Fluent localization helper (typically `fl!(\"message-id\", variable => value)` or the project's wrapper).\n4. If the message includes variables, ensure they match the names passed at the call site.\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` named with the appropriate BCP 47 tag (e.g., `ja` for Japanese, `de` for German).\n2. Copy `en/main.ftl` into the new directory.\n3. Translate every message value while preserving:\n   - All message identifiers (left-hand side of `=`)\n   - All variable references (`{ $var }`)\n   - All section comments (lines starting with `#`)\n4. Register the locale in the application's locale negotiation / configuration layer.\n\n## Naming Conventions\n\n- **Kebab-case** for all message identifiers: `daemon-started-bg`, `config-set-kv`\n- **Dashed prefixes** group related messages: `agent-*`, `vault-*`, `cron-*`\n- **`-fix` suffix** marks remediation hints paired with an error\n- **`section-*` prefix** marks headings used as table/section dividers in output\n- **`label-*` prefix** marks short field labels (often used in key-value displays)\n- **`hint-*` prefix** marks longer contextual guidance strings","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# LibreFang CLI Templates\n\n## Overview\n\nThis module provides the TOML configuration templates used by `librefang init` to generate a working `config.toml` for a LibreFang Agent OS installation. It contains no executable code — only two template files that serve as the source-of-truth for every configurable option the platform supports.\n\n| Template | Purpose |\n|---|---|\n| `init_default_config.toml` | Full reference config with every section documented and most advanced options commented out |\n| `init_wizard_config.toml` | Minimal skeleton emitted by the interactive `librefang init --wizard` flow |\n\nBoth files are processed by the CLI at initialization time, where Jinja-style `{{placeholders}}` are replaced with user-supplied or detected values.\n\n---\n\n## Template Variables\n\nThe templates use `{{...}}` delimiters that the CLI replaces during project scaffolding:\n\n| Variable | Used In | Description |\n|---|---|---|\n| `{{provider}}` | Both files | LLM provider identifier (e.g. `openai`, `anthropic`, `ollama`) |\n| `{{model}}` | Both files | Default model name (e.g. `gpt-4o`, `claude-sonnet-4-20250514`) |\n| `{{api_key_env}}` | `init_default_config.toml` | Environment variable name holding the API key |\n| `{{api_key_line}}` | `init_wizard_config.toml` | Entire pre-formatted `api_key_env = \"...\"` line (or empty for keyless providers) |\n| `{{routing_section}}` | `init_wizard_config.toml` | Optional generated routing section block |\n\n---\n\n## init_default_config.toml\n\nThe **full reference template**. Every LibreFang configuration section is present, with advanced or optional features commented out and annotated. This file serves two purposes:\n\n1. **Generated config** — when the user runs `librefang init` without `--wizard`, this template is rendered with the user's provider/model/key and written directly to disk as a ready-to-edit starting point.\n2. **Living documentation** — because every section is present with inline comments, users can discover and uncomment features without consulting external docs.\n\n### Configuration Sections\n\n#### Core server settings\n\nTop-level keys controlling the runtime:\n\n- **`api_listen`** — bind address. Defaults to `127.0.0.1:4545` (local only). Change to `0.0.0.0:4545` to expose on LAN.\n- **`log_level`** — verbosity: `trace | debug | info | warn | error`.\n- **`mode`** — runtime profile: `stable | default | dev`.\n- **`update_channel`** — release track: `stable | beta | rc`.\n\n#### Dashboard authentication\n\n`dashboard_user` / `dashboard_pass` default to `librefang`/`librefang`. The template comments strongly advise changing these and point to three secure alternatives:\n\n1. **Vault** — `librefang vault set dashboard_password`, then reference as `vault:dashboard_password`.\n2. **Environment variable** — set `LIBREFANG_DASHBOARD_PASS`.\n3. **Direct value** — for local development only.\n\n#### Terminal access control\n\nThe commented `[terminal]` section governs remote shell access:\n\n| Key | Default | Purpose |\n|---|---|---|\n| `allow_remote` | `false` | Permit remote terminal connections (still requires auth) |\n| `allow_unauthenticated_remote` | `false` | Hard guard: must be explicitly true to expose unauthenticated shell |\n| `require_proxy_headers` | `false` | Enable only behind a reverse proxy setting `X-Forwarded-For` / `X-Real-IP` |\n\n#### Performance tuning\n\n- **`prompt_caching`** — enable Anthropic/OpenAI prompt caching to reduce costs.\n- **`stable_prefix_mode`** — optimize prompt structure for higher cache hit rates.\n- **`usage_footer`** — dashboard footer detail: `off | tokens | cost | full`.\n\n#### Default model (`[default_model]`)\n\nThe primary LLM the agent uses. Rendered from template variables. An optional `base_url` allows pointing to a local proxy or compatible endpoint.\n\n#### Memory (`[memory]`)\n\nControls the long-term memory subsystem:\n\n- **`decay_rate`** — how fast memory confidence decreases per cycle (default `0.05`).\n- **`embedding_model`** — optional override for the embedding model used for memory indexing.\n\n#### Proactive memory (`[proactive_memory]`)\n\nAuto-extraction and auto-recall of facts from conversations:\n\n| Key | Default | Purpose |\n|---|---|---|\n| `enabled` | `true` | Master switch |\n| `auto_memorize` | `true` | Extract facts automatically |\n| `auto_retrieve` | `true` | Inject relevant memories automatically |\n| `max_retrieve` | `10` | Cap on memories injected per retrieval |\n| `extraction_threshold` | `0.7` | Minimum confidence to persist a memory |\n| `session_ttl_hours` | `24` | Session lifetime |\n| `duplicate_threshold` | `0.5` | Similarity threshold for deduplication |\n| `max_memories_per_agent` | `1000` | Per-agent memory cap |\n\n#### Web tools (`[web]`)\n\nWeb search and fetch configuration:\n\n- **`search_provider`** — `auto` walks the priority chain: Tavily → Brave → Jina → Perplexity → DuckDuckGo, using whichever has credentials configured.\n- **`[web.fetch]`** — controls page extraction: `max_chars`, `timeout_secs`, `readability` (HTML-to-text cleaning).\n- **`ssrf_allowed_hosts`** — allowlist for internal CIDRs/hostnames. Cloud metadata addresses (`169.254.x.x`, `100.64.x.x`) are always blocked.\n\n#### Task queue (`[queue.concurrency]`)\n\nLane-based concurrency limits:\n\n| Lane | Default | Purpose |\n|---|---|---|\n| `main_lane` | `3` | Concurrent user messages |\n| `cron_lane` | `2` | Concurrent scheduled jobs |\n| `subagent_lane` | `3` | Concurrent child agents |\n\n#### Shell execution policy (`[exec_policy]`)\n\nSecurity boundary for shell commands:\n\n- **`mode`** — `deny` (no commands), `allowlist` (only listed commands), or `full` (unrestricted).\n- **`timeout_secs`** — hard kill after 30s by default.\n- **`max_output_bytes`** — truncated at 100 KB.\n\n#### Hot-reload (`[reload]`)\n\nConfiguration file change detection:\n\n- **`mode`** — `off | restart | hot | hybrid` (hybrid attempts hot-reload, falls back to restart on structural changes).\n- **`debounce_ms`** — coalesces rapid edits (500 ms).\n\n#### Provider regions (`[provider_regions]`)\n\nSelects regional endpoints for multi-region providers (e.g., `qwen = \"intl\"`, `minimax = \"china\"`).\n\n#### Provider URL overrides (`[provider_urls]`)\n\nCustom endpoints for local/self-hosted providers like Ollama or vLLM.\n\n#### Fallback providers (`[[fallback_providers]]`)\n\nTOML array-of-tables defining an ordered LLM failover chain. Each entry mirrors `[default_model]` structure.\n\n#### Rate limiting (`[rate_limit]`)\n\nGCRA-based rate limiting for API and WebSocket traffic:\n\n- `api_requests_per_minute` — per-IP token budget.\n- `max_ws_per_ip` / `ws_messages_per_minute` / `ws_idle_timeout_secs` — WebSocket controls.\n- `ws_debounce_ms` / `ws_debounce_chars` — streaming text delta batching.\n\n#### Registry sync (`[registry]`)\n\n- **`cache_ttl_secs`** — how often to re-download the agent registry (default 24 hours).\n\n#### Session compaction (`[compaction]`)\n\nLLM-based conversation history summarization to stay within context windows:\n\n| Key | Default | Purpose |\n|---|---|---|\n| `threshold_messages` | `30` | Trigger compaction above this count |\n| `keep_recent` | `10` | Messages preserved verbatim |\n| `max_summary_tokens` | `1024` | Token budget for the summary |\n| `token_threshold_ratio` | `0.7` | Also trigger at 70% of context window |\n| `max_chunk_chars` | `80000` | Per-chunk size limit |\n| `max_retries` | `3` | Retry limit for summarization LLM calls |\n\n#### Event triggers (`[triggers]`)\n\nWorkflow automation controls:\n\n- **`cooldown_secs`** — minimum interval between firings of the same trigger.\n- **`max_per_event`** — cap on triggers per event.\n- **`max_depth`** — recursion guard.\n- **`max_workflow_secs`** — hard timeout (1 hour default).\n\n#### Budget and cost control (`[budget]`)\n\nHierarchical cost management:\n\n- Global caps: `max_hourly_usd`, `max_daily_usd`, `max_monthly_usd`.\n- `alert_threshold` — warn at a percentage of the limit.\n- Per-provider caps under `[budget.providers.<name>]` allow throttling paid providers (e.g., `moonshot`, `openai`) while leaving local providers (`ollama`, `litellm`) uncapped.\n\n#### Extended thinking (`[thinking]`)\n\nFor Claude models supporting chain-of-thought:\n\n- **`budget_tokens`** — token allocation for internal reasoning.\n- **`stream_thinking`** — whether to surface thinking tokens to the client.\n\n#### Channels\n\nPre-configured integration blocks for external messaging platforms:\n\n- **`[channels.telegram]`** — Telegram bot with user allowlisting.\n- **`[channels.discord]`** — Discord bot.\n- **`[channels.slack]`** — Slack bot (requires both bot and app tokens).\n- **`[channels.wechat]`** — Personal WeChat via iLink protocol with `hash@im.wechat` user format.\n\n#### MCP servers (`[[mcp_servers]]`)\n\nModel Context Protocol server integrations. Each entry specifies a `name`, `timeout_secs`, and a `[mcp_servers.transport]` sub-table (currently `stdio` with `command` and `args`).\n\n#### Browser automation (`[browser]`)\n\nHeadless browser settings: `headless` mode, viewport dimensions, session limit.\n\n#### Docker sandbox (`[docker]`)\n\nIsolated code execution: enable/disable, base image, memory limit, timeout.\n\n#### File inbox (`[inbox]`)\n\nAsync command input via filesystem: drop `.txt` files into a directory with an optional `agent:<name>` first-line directive. The system polls at `poll_interval_secs`.\n\n#### P2P federation\n\n- **`network_enabled`** — master switch.\n- **`[network]`** — `shared_secret` required for peer authentication.\n\n---\n\n## init_wizard_config.toml\n\nThe **minimal wizard template**. It contains only the settings that the interactive wizard prompts for:\n\n```toml\napi_listen = \"127.0.0.1:4545\"\n\n[default_model]\nprovider = \"{{provider}}\"\nmodel = \"{{model}}\"\n{{api_key_line}}\n\n[memory]\ndecay_rate = 0.05\n{{routing_section}}\n```\n\nKey differences from the full template:\n\n- **No commented sections.** The user gets only what they configured, keeping the file short and scannable.\n- **`{{api_key_line}}** is either rendered as `api_key_env = \"OPENAI_API_KEY\"` or omitted entirely for keyless providers like Ollama.\n- **`{{routing_section}}`** injects a `[routing]` block only when the wizard configures multi-model routing.\n\nUsers who need advanced options can either:\n- Run `librefang init` without `--wizard` to get the full annotated config, or\n- Consult the full template and copy sections into their existing config.\n\n---\n\n## Integration with the CLI\n\n```mermaid\nflowchart LR\n    A[\"librefang init\"] --> B{\"--wizard flag?\"}\n    B -- Yes --> C[\"init_wizard_config.toml\"]\n    B -- No --> D[\"init_default_config.toml\"]\n    C --> E[\"Replace placeholders\"]\n    D --> E\n    E --> F[\"Write config.toml\"]\n```\n\nThe CLI's init command reads the appropriate template, performs variable substitution on `{{...}}` tokens, and writes the result to the project's `config.toml`. The full template doubles as in-file documentation — every section is present with explanatory comments, so users can uncomment features as needed.\n\n### Adding new configuration sections\n\nWhen a new feature requires a config option:\n\n1. Add the section to **`init_default_config.toml`** — commented out with inline documentation.\n2. If the wizard should prompt for it, add the minimal render to **`init_wizard_config.toml`** with an appropriate placeholder.\n3. Ensure the CLI's init logic handles the new placeholder substitution.\n\nKeeping both templates in sync is critical: the full template is the authoritative reference for every option the system recognizes.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nThe command-line interface for LibreFang Agent OS. This crate produces the `librefang` binary — the primary way users interact with the agent system, whether through direct commands, a terminal UI, or background services.\n\n## Role in the Codebase\n\n`librefang-cli` is the **top-level executable crate**. It doesn't contain business logic itself; instead, it wires together the library crates and provides the user-facing entry point:\n\n```\nlibrefang (binary)\n ├── librefang-kernel      — core orchestration\n ├── librefang-api         — communication channels\n ├── librefang-runtime     — process/task runtime\n ├── librefang-skills      — skill definitions & loading\n ├── librefang-extensions  — extension management\n ├── librefang-migrate     — database schema migrations\n └── librefang-types       — shared type definitions\n```\n\n## Build Script (`build.rs`)\n\nThe build script runs three tasks at compile time:\n\n| Task | Environment Variable | Purpose |\n|------|---------------------|---------|\n| Git hooks setup | — | Runs `git config core.hooksPath scripts/hooks` so all developers share the same hooks |\n| Git SHA capture | `GIT_SHA` | Short commit hash via `git rev-parse --short HEAD` |\n| Build date capture | `BUILD_DATE` | UTC date in `YYYY-MM-DD` format |\n| Rustc version capture | `RUSTC_VERSION` | Full `rustc --version` output |\n\nThese environment variables are embedded at compile time and used for version display (`--version` output, diagnostics, logs). All fallback to `\"unknown\"` if the commands fail (e.g., building from a tarball without git).\n\n## Feature Flags\n\nFeatures control which communication channels and observability stack get compiled in:\n\n| Feature | Default | Effect |\n|---------|---------|--------|\n| `all-channels` | ✓ (via `default`) | Enables all transport/channel backends in `librefang-api` |\n| `mini` | ✗ | Compiles a minimal channel subset from `librefang-api` — use for constrained builds |\n| `telemetry` | ✓ (via `default`) | Enables OpenTelemetry tracing via `opentelemetry_sdk` and `tracing-opentelemetry` |\n\nTo build a minimal binary:\n\n```toml\n# In a Cargo.toml override or .cargo/config.toml\n[features]\ndefault = [\"mini\"]\n```\n\n## Key Dependencies and What They Enable\n\n### CLI Framework\n- **clap** / **clap_complete** — Argument parsing and shell completion generation.\n\n### Terminal UI\n- **ratatui** — Full TUI framework. The CLI likely offers an interactive dashboard mode alongside single-command usage.\n\n### Storage & Migrations\n- **rusqlite** — Embedded SQLite for local state, configuration, and session history.\n- **librefang-migrate** — Schema migrations run at startup or on demand.\n\n### Networking & Security\n- **reqwest** (with `blocking`) — HTTP client for API calls and resource fetching.\n- **rustls** — TLS backend; avoids OpenSSL dependency.\n\n### Observability\n- **tracing** / **tracing-subscriber** — Structured logging throughout the application.\n- **opentelemetry_sdk** / **tracing-opentelemetry** — Optional distributed tracing export.\n\n### Configuration\n- **toml** / **toml_edit** — Reading and writing TOML config files while preserving formatting and comments.\n- **dirs** — Respects OS-standard config/cache/data directories.\n\n### Internationalization\n- **fluent** / **unic-langid** — Localization framework for user-facing messages.\n\n### Utilities\n- **colored** — Colored terminal output.\n- **walkdir** — Recursive directory traversal (skill/extension discovery).\n- **open** — Open URLs or files in the system default application.\n- **zeroize** — Secure memory clearing for sensitive data.\n- **uuid** — Unique identifiers.\n- **libc** — Low-level system calls (likely for signal handling or process management).\n- **chrono** — Timestamp handling.\n\n### Memory Allocator\nOn non-MSVC targets, **tikv-jemallocator** replaces the system allocator for improved performance with `disable_initial_exec_tls` to avoid linker issues in certain environments.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    User[User / Script] --> CLI[librefang binary]\n    CLI --> Kernel[librefang-kernel]\n    CLI --> API[librefang-api]\n    CLI --> Runtime[librefang-runtime]\n    CLI --> Migrate[librefang-migrate]\n    Kernel --> Types[librefang-types]\n    API --> Types\n    Runtime --> Types\n    CLI --> Skills[librefang-skills]\n    CLI --> Extensions[librefang-extensions]\n    Skills --> Types\n    Extensions --> Types\n    Migrate --> DB[(SQLite)]\n```\n\nThe CLI crate is the composition root — it parses user input, initializes the runtime and database, loads skills and extensions, then delegates execution to the appropriate library crate.\n\n## Building\n\n```bash\n# Standard build (all channels + telemetry)\ncargo build -p librefang-cli\n\n# Minimal build\ncargo build -p librefang-cli --no-default-features --features mini\n\n# Release binary\ncargo build --release -p librefang-cli\n# Output: target/release/librefang\n```\n\n## Compile-Time Variables\n\nThe build script injects these via `cargo:rustc-env`, accessible in code as:\n\n```rust\nenv!(\"GIT_SHA\")       // e.g., \"a1b2c3d\"\nenv!(\"BUILD_DATE\")    // e.g., \"2025-01-15\"\nenv!(\"RUSTC_VERSION\") // e.g., \"rustc 1.82.0 (f6e511eec 2024-10-15)\"\n```\n\nUse these in `--version` output or diagnostic logs.\n\n## Notes for Contributors\n\n- **Git hooks** are auto-configured on first build. The hooks live in `scripts/hooks/` at the repository root.\n- The `clap_complete` dependency suggests shell completions can be generated — look for a `completions` subcommand in the CLI.\n- When adding new features that gate optional functionality, prefer delegating the feature flag to the relevant library crate rather than adding logic in the CLI itself.\n- The `reqwest` dependency uses `blocking` mode — if async HTTP is needed, coordinate with the tokio runtime already in use.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop application for the LibreFang Agent OS, built on **Tauri 2.0**. This crate produces the `librefang-desktop` binary — a self-contained desktop client that bundles a local HTTP server with a native window shell, system tray, auto-updater, and platform installer.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-desktop<br/>Tauri 2.0 Binary] --> B[librefang-kernel]\n    A --> C[librefang-api]\n    A --> D[librefang-types]\n    A --> E[librefang-extensions]\n    C --> F[reqwest / axum / tokio]\n    A --> G[Tauri Plugins]\n    G --> G1[updater]\n    G --> G2[autostart]\n    G --> G3[notification]\n    G --> G4[single-instance]\n    G --> G5[shell]\n    G --> G6[dialog]\n    G --> G7[global-shortcut]\n```\n\nThe desktop app sits at the top of the dependency tree. It imports the core crates but does not export anything consumed by other workspace members — it is a pure **leaf node** in the module graph.\n\n## Key Dependencies\n\n### Internal crates\n\n| Crate | Role |\n|---|---|\n| `librefang-kernel` | Core agent runtime and orchestration |\n| `librefang-api` | HTTP API layer (axum-based). Feature flags propagate through |\n| `librefang-types` | Shared type definitions |\n| `librefang-extensions` | Extension system for agents |\n\n### Tauri plugins\n\n| Plugin | Purpose |\n|---|---|\n| `tauri-plugin-notification` | Native OS notifications |\n| `tauri-plugin-shell` | Open external URLs and spawn processes |\n| `tauri-plugin-single-instance` | Prevent duplicate app instances |\n| `tauri-plugin-dialog` | Native file/message dialogs |\n| `tauri-plugin-global-shortcut` | System-wide keyboard shortcuts |\n| `tauri-plugin-autostart` | Launch at login / system boot |\n| `tauri-plugin-updater` | In-app updates signed with minisign |\n\n### Notable external crates\n\n- **clap** — CLI argument parsing (the binary accepts runtime flags)\n- **dirs** — Platform-standard directory paths for config/cache/data\n- **toml** — TOML configuration file parsing\n- **open** — Open URLs in the user's default browser\n- **axum** / **tokio** — Embedded HTTP server for local API\n- **tracing** / **tracing-subscriber** — Structured logging\n\n## Feature Flags\n\nFeatures primarily control which communication channels `librefang-api` includes. They forward directly into the `librefang-api` crate.\n\n| Feature | Effect |\n|---|---|\n| `default` | Standard channel set via `librefang-api/default` |\n| `all-channels` | Enables every supported channel |\n| `mini` | Minimal channel subset for lighter builds |\n| `custom-protocol` | Tauri production flag; switches asset loading from `dev-server` to `custom-protocol`. Enabled automatically in release bundles. |\n\n## Build System\n\n### `build.rs`\n\nThe build script delegates entirely to `tauri_build::build()`, which generates the embeddable assets and protocol handlers Tauri needs at compile time.\n\n### Bundle configuration (`tauri.conf.json`)\n\n| Field | Value |\n|---|---|\n| **Product name** | `LibreFang` |\n| **Identifier** | `ai.librefang.desktop` |\n| **Bundle targets** | All (`.deb`, `.AppImage`, `.dmg`, `.msi`, etc.) |\n| **Category** | Productivity |\n| **Minimum macOS** | 12.0 |\n| **Windows WebView** | Download bootstrapper |\n\nThe app declares **no windows** in the config (`\"windows\": []`). Windows are created programmatically at runtime — this is typical for system-tray–driven apps that may show/hide a main window based on user interaction.\n\n## Content Security Policy\n\nThe CSP is configured to allow:\n\n- Connections to `http://127.0.0.1:*` and `ws://127.0.0.1:*` — communication with the embedded local API server\n- Google Fonts loading over HTTPS\n- Inline styles and eval'd scripts (required for the webview UI framework)\n- Image and media sources from `self`, `data:`, `blob:`, and localhost\n- `object-src 'none'` — blocks plugin content\n\nAll other sources are restricted to `'self'`.\n\n## Auto-Updater\n\nThe updater is configured with:\n\n- **Public key**: Minisign ed25519 key for signature verification\n- **Endpoint**: `https://github.com/librefang/librefang/releases/latest/download/latest.json`\n- **Windows install mode**: `passive` (shows progress, requires no user interaction)\n\nUpdates are checked and applied through the `tauri-plugin-updater` integration. The release signing key is embedded in `tauri.conf.json` under `plugins.updater.pubkey`.\n\n## Building\n\n```bash\n# Development (uses dev-server for frontend assets)\ncargo build -p librefang-desktop\n\n# Production bundle (enables custom-protocol)\ncargo build -p librefang-desktop --features custom-protocol --release\n```\n\nTo produce platform installers, run through Tauri's bundler which invokes `cargo tauri build`. This automatically enables the `custom-protocol` feature and generates platform-specific installers in `target/release/bundle/`.\n\n## Platform Notes\n\n- **Linux**: AppImage and `.deb` are generated. No media framework bundling (`bundleMediaFramework: false`).\n- **macOS**: Requires macOS 12.0+. No special entitlements or exception domains are configured by default.\n- **Windows**: Uses SHA-256 digest for signing. WebView2 is installed via download bootstrapper if not present. No code-signing certificate thumbprint is set in the default config — supply one via environment or config override for signed builds.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang. Provides three integrated subsystems: one-click MCP (Model Context Protocol) server setup, an encrypted credential vault, and OAuth2 PKCE authentication flows.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-extensions\"\n        MCPS[MCP Server Setup]\n        CV[Credential Vault]\n        OA[OAuth2 PKCE]\n    end\n\n    MCPS -->|stores config| CV\n    OA -->|stores tokens| CV\n    CV -->|AES-GCM + Argon2| ENC[Encrypted Storage]\n    OA -->|callback listener| AXUM[Local HTTP Server]\n    OA -->|token exchange| REQ[HTTP Client]\n\n    LT[librefang-types] -->|shared types| MCPS\n    LT -->|shared types| CV\n    LT -->|shared types| OA\n```\n\n## Key Components\n\n### Credential Vault\n\nEncrypted at-rest storage for sensitive credentials — API keys, OAuth tokens, MCP server secrets, and any other integration secrets.\n\n**Encryption stack:**\n- **Argon2** — derives an encryption key from a user-provided master password. Key derivation is deliberately slow to resist brute-force attacks.\n- **AES-GCM** — authenticated encryption for vault contents. Provides both confidentiality and integrity checking.\n- **Zeroize** — sensitive in-memory structures (keys, plaintext credentials) are zeroed on drop to minimize exposure window.\n\n**Runtime storage:**\n- **DashMap** — concurrent hashmap used as the in-memory credential cache. Allows multiple async tasks to read/write credentials without locking the entire map.\n- **Platform directories** — uses the `dirs` crate to locate the appropriate platform-specific directory (`~/.config/librefang/` on Linux, equivalents on macOS/Windows) for the encrypted vault file.\n- **TOML/JSON** — serialization format for persisted vault data.\n\n### OAuth2 PKCE\n\nImplements the OAuth2 Authorization Code flow with PKCE (Proof Key for Code Exchange), the recommended flow for native/desktop applications.\n\n**Flow components:**\n- **PKCE generation** — uses `rand` to generate a cryptographically random code verifier, `sha2` to produce the code challenge (S256 method), and `base64` for URL-safe encoding.\n- **Callback listener** — spins up a temporary local HTTP server using `axum` on a random port to receive the authorization redirect. The server handles exactly one request and then shuts down.\n- **Token exchange** — uses `reqwest` (backed by `rustls`) to exchange the authorization code for access/refresh tokens.\n- **URL construction** — the `url` crate handles all URL building and validation for authorization endpoints.\n\n**Token lifecycle:**\n- Access tokens and refresh tokens are stored in the credential vault after successful exchange.\n- Tokens are retrieved transparently by other subsystems when making authenticated requests.\n\n### MCP Server Setup\n\nOne-click setup for MCP (Model Context Protocol) servers. Handles discovering server configuration, provisioning credentials, and preparing a server for use.\n\n- Relies on `serde_json` for MCP server configuration documents.\n- Integrates with the credential vault to store any server-specific secrets.\n- Uses types from `librefang-types` for MCP server descriptors and configuration shapes.\n\n## Dependencies and Rationale\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across all LibreFang crates |\n| `aes-gcm` | Authenticated encryption for vault contents |\n| `argon2` | Key derivation from master password |\n| `zeroize` | Secure memory clearing for keys and plaintext |\n| `dashmap` | Lock-free concurrent credential cache |\n| `axum` | Local HTTP server for OAuth2 redirect callback |\n| `reqwest` + `rustls` | TLS-backed HTTP client for OAuth2 token exchange |\n| `sha2` + `rand` + `base64` | PKCE code verifier/challenge generation |\n| `toml` + `serde_json` | Configuration and vault serialization |\n| `url` | URL parsing and construction for OAuth2 endpoints |\n| `dirs` | Platform-appropriate config directory resolution |\n\n## Relationship to Other Crates\n\nThis crate sits between the core type system and higher-level application layers:\n\n- **Consumes** `librefang-types` for all shared data structures.\n- **Consumed by** application and runtime layers (including `librefang-runtime`, which appears as a dev-dependency for integration testing).\n- Other modules that need credentials, OAuth flows, or MCP configuration depend on this crate rather than reimplementing those concerns.\n\n## Testing\n\nThe dev-dependencies indicate the testing approach:\n\n- `tokio-test` — async test utilities for testing the OAuth2 flow and vault operations.\n- `tempfile` — creates temporary directories for vault files in isolation, ensuring tests don't touch real credentials.\n- `serial_test` — serializes tests that share filesystem or port resources, preventing race conditions in CI.\n- `librefang-runtime` — used for integration tests that exercise the full extension loading pipeline.\n\nWhen writing tests for this crate, use `tempfile::tempdir()` for any vault path, wrap tests that bind local ports with `#[serial]`, and prefer the `tokio::test` macro for async test functions.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nThe **Hands** system defines curated, self-contained capability packages that can be assigned to autonomous agents within LibreFang. A \"hand\" represents a discrete bundle of functionality—tools, permissions, constraints, and metadata—that an agent can use to interact with its environment.\n\n## Purpose\n\nRather than granting agents blanket access to all available capabilities, the Hands system provides a mechanism for packaging and distributing well-defined capability sets. Each hand is:\n\n- **Self-describing** — carries its own metadata, version, and dependency information\n- **Curated** — intentionally assembled with specific tools and constraints\n- **Composable** — multiple hands can be assigned to a single agent\n- **Persistable** — serializable to and from TOML/JSON for storage and transport\n\nThis module handles the definition, loading, validation, and runtime management of these capability packages.\n\n## Key Concepts\n\n### Hand\n\nA hand is the central unit of capability. It groups together related tools, configuration parameters, and policy constraints into a named, versioned package. Hands serve as the bridge between what an agent *can* do and what it is *allowed* to do.\n\n### Hand Registry\n\nThe module maintains a thread-safe registry of loaded hands using `DashMap`, allowing concurrent lookups and modifications. The registry supports:\n\n- Dynamic registration of new hands at runtime\n- Lookup by unique identifier\n- Enumeration of all available hands and their capabilities\n\n### Manifest Format\n\nHands are defined via manifest files (TOML or JSON) that describe:\n\n- **Identity** — name, version, unique ID (`uuid`)\n- **Capabilities** — the tools and actions the hand provides\n- **Constraints** — rate limits, permission boundaries, and safety policies\n- **Dependencies** — other hands or runtime features required\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Manifest File<br/>TOML / JSON] -->|Load & Deserialize| B[Hand]\n    B -->|Validate| C{Valid?}\n    C -->|Yes| D[Hand Registry<br/>DashMap]\n    C -->|No| E[HandError]\n    D -->|Lookup / Enumerate| F[Agent Assignment]\n    D -->|Serialize| G[Manifest Export]\n```\n\n## Error Handling\n\nErrors are consolidated through the `HandError` enum, powered by `thiserror`. Common error conditions include:\n\n- **Parse failures** — malformed TOML/JSON manifests\n- **Validation errors** — missing required fields, invalid capability definitions, or unresolvable dependencies\n- **Registry conflicts** — duplicate hand registration with the same identifier\n- **IO errors** — failures reading manifest files from disk\n\nAll errors carry sufficient context for debugging via the `tracing` integration.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across LibreFang modules |\n| `serde` / `serde_json` / `toml` | Serialization and deserialization of hand manifests |\n| `thiserror` | Ergonomic error type derivation |\n| `tracing` | Structured logging and diagnostic spans |\n| `uuid` | Unique identification for each hand instance |\n| `chrono` | Timestamp handling for metadata and audit trails |\n| `dashmap` | Lock-free concurrent map for the hand registry |\n\n## Testing\n\nThe test suite (`dev-dependencies`) includes:\n\n- **`tokio-test`** — async runtime support for testing concurrent registry operations\n- **`tempfile`** — isolated temporary directories for manifest file I/O tests\n- **`librefang-runtime`** — integration tests that validate hands against the actual runtime\n- **`serial_test`** — ensures certain tests (e.g., global registry state) run without parallel interference\n\n## Integration Points\n\nThis module sits between the type definitions (`librefang-types`) and the execution layer (`librefang-runtime`). Other modules consume the Hands API to:\n\n1. Resolve which capabilities an agent has access to at execution time\n2. Validate that a requested action falls within the constraints of an assigned hand\n3. Export hand definitions for distribution or persistence\n\nThe Hands module itself does not execute agent logic—it provides the data structures, loading machinery, and registry that upstream consumers rely on.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing consistent TLS configuration and proxy support across the LibreFang project.\n\n## Purpose\n\nThis crate centralizes HTTP client construction so that every component in LibreFang makes outbound requests with the same TLS stack, certificate validation strategy, and proxy behavior. Rather than each crate independently configuring a `reqwest::Client`, they call into this library to obtain a pre-configured client builder or fully-built client.\n\n## Why This Exists\n\nRepeatedly configuring `reqwest` with rustls, certificate stores, and proxy settings across multiple binaries and libraries leads to drift and bugs. This crate encodes the project's HTTP policies in one place:\n\n- **TLS via rustls** — avoids an OpenSSL dependency and keeps the build statically linkable.\n- **Certificate fallback chain** — loads native system certs first (`rustls-native-certs`); if that fails or produces an empty set, falls back to Mozilla's `webpki-roots` bundle so requests work on minimal containers and CI hosts.\n- **Proxy awareness** — respects environment proxy variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`) through reqwest's built-in proxy support.\n- **Consistent tracing** — integrates with the project-wide `tracing` subscriber so HTTP-level errors and connection events appear in structured logs.\n\n## Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared types used across LibreFang (config structs, error types, etc.) that influence client configuration. |\n| `reqwest` | Underlying HTTP client. This crate wraps its builder API. |\n| `rustls` | TLS implementation. Used to construct a custom `rustls::ClientConfig` with the project's certificate strategy. |\n| `webpki-roots` | Mozilla's root certificate store. Serves as the fallback when native certs are unavailable. |\n| `rustls-native-certs` | Loads certificates from the OS trust store. Preferred source of root certs. |\n| `tracing` | Structured logging for certificate loading failures, proxy detection, and TLS handshake issues. |\n\n## How It Fits into LibreFang\n\n```mermaid\ngraph TD\n    A[librefang-http] --> B[reqwest::Client]\n    A --> C[rustls TLS config]\n    A --> D[librefang-types]\n    E[CLI binary] --> A\n    F[Other LibreFang crates] --> A\n```\n\nAny crate or binary that needs to make outbound HTTP calls depends on `librefang-http`, calls its builder function, and receives a `reqwest::Client` (or `reqwest::ClientBuilder`) ready for use. The caller does not need to know about TLS internals or certificate paths.\n\n## Integration Points with `librefang-types`\n\nThis crate reads shared configuration types from `librefang-types` to determine:\n\n- Whether to enforce certificate validation or accept invalid certs (e.g., for testing or air-gapped environments).\n- Proxy configuration if explicitly provided rather than inferred from environment variables.\n- Timeout values and connection pool settings.\n\nSee `librefang-types` documentation for the specific config structs involved.\n\n## Building a Client\n\nThe typical usage pattern is:\n\n1. Load configuration via `librefang-types`.\n2. Pass relevant config into this crate's builder function.\n3. Receive a configured `reqwest::Client`.\n4. Use that client for all outbound requests.\n\nAll logging during client construction (cert loading, proxy detection, TLS warnings) is emitted through `tracing` at appropriate levels (`debug` for routine operations, `warn` for fallback behavior, `error` for failures).","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\nDefines the `KernelHandle` trait — the primary interface for in-process callers to interact with the LibreFang kernel.\n\n## Purpose\n\nThis crate provides a standardized abstraction for components that need to call into the LibreFang kernel from within the same process. Rather than coupling callers directly to kernel internals, the `KernelHandle` trait offers a stable, async-aware contract that decouples the caller from the kernel's implementation details.\n\nThis is a foundational crate: it contains the trait definition and supporting types, with no concrete kernel implementation. Downstream crates provide the actual `KernelHandle` implementations.\n\n## When to Use This Crate\n\nImport `librefang-kernel-handle` when you are:\n\n- **Implementing a kernel** — you will provide a concrete type that satisfies the `KernelHandle` trait.\n- **Writing an in-process caller** — such as a plugin, FFI boundary shim, or embedded runtime — that needs to invoke kernel operations without going through IPC or a network boundary.\n\n## Dependencies and What They Signal\n\n| Dependency | Role in This Crate |\n|---|---|\n| `librefang-types` | Shared domain types passed between caller and kernel (messages, error types, etc.) |\n| `async-trait` | The `KernelHandle` trait uses async methods; `async-trait` provides the proc-macro support |\n| `serde` / `serde_json` | Trait methods likely accept or return serializable payloads |\n| `tokio` | Async runtime backing the trait's futures |\n| `tracing` | Instrumentation spans on kernel interactions for observability |\n| `uuid` | Correlation or request identifiers for tracing kernel calls |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[In-Process Caller] -->|depends on trait| B[librefang-kernel-handle]\n    C[Kernel Implementation] -->|implements trait| B\n    B -->|uses types from| D[librefang-types]\n    A -->|calls through| B\n    A -.->|at runtime dispatches to| C\n```\n\nThe caller depends only on the trait crate, never on the kernel implementation directly. This allows swapping kernel backends (e.g., a real kernel vs. a test double) without modifying caller code.\n\n## Relationship to the Wider Codebase\n\n- **`librefang-types`** — The shared vocabulary. Any struct or enum that crosses the `KernelHandle` boundary is defined there, not here.\n- **Kernel implementation crates** — Live elsewhere in the workspace and provide `impl KernelHandle for …`.\n- **Caller crates** — Accept a `dyn KernelHandle` (or generic `H: KernelHandle`) and invoke methods through it.\n\nBecause this crate has no outgoing or incoming internal calls, it is purely definitional. It introduces no side effects, no global state, and no build-time code generation beyond the `async-trait` macro expansion.\n\n## Usage Pattern\n\nA typical caller takes the handle as a dependency:\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\n\nasync fn do_work<H: KernelHandle>(kernel: &H) {\n    // Call through the trait — actual dispatch is transparent\n}\n```\n\nA typical kernel implementation:\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\n\nstruct MyKernel { /* ... */ }\n\n#[async_trait]\nimpl KernelHandle for MyKernel {\n    // concrete method bodies\n}\n```\n\nTesting is straightforward: substitute a mock or stub implementation of `KernelHandle` without modifying the code under test.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis crate provides the metering subsystem for the LibreFang kernel. It is responsible for tracking resource consumption costs and enforcing quotas during execution. Metering ensures that operations stay within defined resource budgets, preventing runaway or excessive resource usage.\n\n## Purpose\n\nMetering is a critical concern in any runtime that executes potentially untrusted or resource-intensive work. This module serves as the kernel-level enforcement point for:\n\n- **Cost accounting** — Tracking the cumulative cost of operations as they execute\n- **Quota enforcement** — Halting or rejecting operations when resource budgets are exhausted\n- **Resource budgeting** — Defining and managing limits on consumable resources\n\n## Dependencies\n\n```toml\nlibrefang-types    # Shared type definitions used across the kernel\nlibrefang-memory   # Memory subsystem integration for memory-related metering\nlibrefang-runtime  # Runtime hooks for enforcing quotas during execution\nserde              # Serialization support for persisting or transmitting metering data\n```\n\nThe dependency on `librefang-memory` indicates that memory consumption is one of the metered resources. The `librefang-runtime` dependency suggests that quota checks are integrated into the execution loop, likely through runtime hooks or checkpoints. `serde` support implies that metering state can be serialized — useful for reporting, persistence, or cross-process communication.\n\n## Integration with the Kernel\n\nThis module sits between the runtime execution layer and the resource subsystems. When the runtime executes operations, it consults this metering crate to track cost and enforce quotas before allowing operations to proceed.\n\n```\n┌──────────────────┐\n│  librefang-      │\n│  runtime         │\n│                  │\n│  Executes ops,   │\n│  checks quotas   │\n└────────┬─────────┘\n         │ queries / reports\n         ▼\n┌──────────────────┐\n│  librefang-      │\n│  kernel-metering │\n│                  │\n│  Tracks costs,   │\n│  enforces limits │\n└────────┬─────────┘\n         │ reads consumption\n         ▼\n┌──────────────────┐\n│  librefang-      │\n│  memory          │\n│                  │\n│  Provides memory │\n│  usage data      │\n└──────────────────┘\n```\n\n## Serialization\n\nThe `serde` dependency enables metering and quota data to be serialized. This supports:\n\n- Exporting metering reports for analysis\n- Persisting quota configurations\n- Communicating resource usage across crate boundaries","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand and template routing engine for the LibreFang kernel.\n\n## Purpose\n\nThis module is responsible for **routing** — resolving which **Hand** definition and which **template** apply to a given input. It acts as the decision layer between receiving raw input and dispatching it to the appropriate processing logic. Think of it as the kernel's traffic director: given a piece of content, it determines where that content should go.\n\n## Architecture\n\nThe routing engine depends on several sibling crates, each serving a distinct role in the pipeline:\n\n```\n┌──────────────────────────┐\n│   librefang-kernel-router│\n│                          │\n│  ┌────────────────────┐  │\n│  │  Route Definitions │◄─────── toml (config files)\n│  └───────┬────────────┘  │\n│          │               │\n│          ▼               │\n│  ┌────────────────────┐  │\n│  │  Pattern Matching  │◄─────── regex-lite\n│  └───────┬────────────┘  │\n│          │               │\n│          ▼               │\n│  ┌────────────────────┐  │\n│  │    Route Result    │──────► librefang-hands\n│  └────────────────────┘  │     librefang-types\n└──────────────────────────┘\n```\n\n### Key dependencies and what they imply\n\n| Dependency | Role in this module |\n|---|---|\n| `librefang-types` | Shared type definitions used in route matching results — likely route IDs, match metadata, or resolved targets |\n| `librefang-hands` | The target of routing decisions. Routes resolve to a specific Hand that will handle the input |\n| `regex-lite` | Lightweight regex engine used for pattern-based route matching. Route rules likely use regex patterns to test against incoming content |\n| `toml` | Route definitions are loaded from TOML configuration files, allowing declarative route setup |\n| `dirs` | Standard platform directories — used to locate configuration files (e.g., user-level or system-level route definitions) |\n| `serde` / `serde_json` | Deserialization of route configuration and serialization of match results |\n| `tracing` | Structured logging of routing decisions for debugging and observability |\n\n## How routing works\n\nBased on the dependency profile, the routing flow follows this pattern:\n\n1. **Load route definitions** — TOML configuration files are discovered (via `dirs`) and deserialized (via `toml` + `serde`) into internal route rule structures.\n\n2. **Evaluate patterns** — When input arrives, each route's pattern (expressed as a regex via `regex-lite`) is tested against the input. Routes are evaluated in a defined order, likely respecting priority or specificity.\n\n3. **Resolve to a Hand** — A successful match produces a result referencing a Hand from `librefang-hands`, along with any captured groups or metadata typed via `librefang-types`.\n\n4. **Emit tracing events** — Routing decisions are instrumented with `tracing` spans, making it possible to trace why a particular route was selected or why no route matched.\n\n## Configuration\n\nRoute definitions are expected to live in TOML files. The use of `dirs` suggests the router looks in standard configuration locations:\n\n- A user-level config directory (e.g., `~/.config/librefang/`)\n- Potentially a system-level fallback\n\nRoute entries likely include:\n\n- A **pattern** field containing a regex expression\n- A **target** field referencing a Hand identifier\n- Optional **priority** or **order** for disambiguation when multiple routes match\n\n## Testing\n\nThe dev-dependency on `tempfile` and `librefang-runtime` indicates that tests:\n\n- Create temporary directories and TOML files to test configuration loading in isolation\n- May use `librefang-runtime` to exercise the router within a realistic execution context, verifying end-to-end routing behavior\n\n## Relationship to the kernel\n\nThis module is one component of the LibreFang kernel. It sits between input ingestion and hand execution:\n\n```\nInput → [router resolves Hand] → [Hand processes input] → Output\n```\n\nThe router itself is stateless with respect to input — it makes a routing decision per request based on the current configuration. Configuration changes (loaded from TOML) would affect subsequent routing decisions.\n\n## Integration points\n\nWhen consuming this module from elsewhere in the kernel:\n\n- Initialize the router by providing a configuration path or relying on default discovery via `dirs`\n- Call into the router with the relevant input or content to match against\n- Receive a resolved reference to a Hand (from `librefang-hands`) to dispatch to\n- Handle the case where no route matches, which should be logged via `tracing`","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# Kernel Test Suite (`librefang-kernel/src/kernel/tests.rs`)\n\n## Purpose\n\nIntegration and regression test suite for the LibreFang kernel. Tests exercise the kernel's public and internal APIs against real filesystem state, in-process agent registries, and mock channel adapters — covering capability enforcement, notification routing, skill lifecycle, provider switching, and LLM response parsing.\n\n## Test Infrastructure\n\n### `RecordingChannelAdapter`\n\nA mock `ChannelAdapter` that captures outbound messages into a `Arc<Mutex<Vec<String>>>` instead of delivering them. Used by notification routing tests to assert exactly which recipients received messages.\n\n```rust\nlet adapter = Arc::new(RecordingChannelAdapter::new(\"test\"));\nlet sent = adapter.sent.clone();  // inspect after the call under test\nkernel.channel_adapters.insert(\"test\".to_string(), adapter);\n```\n\n`start()` returns an empty stream; `send()` records `\"{platform_id}:{text}\"` for each `ChannelContent::Text`.\n\n### `EnvVarGuard` / `set_test_env`\n\nRAII guard that removes an environment variable when dropped. Prevents test cross-contamination when testing env-var-backed config like API key rotation profiles.\n\n```rust\nlet _guard = set_test_env(\"LIBREFANG_TEST_ROTATION_PRIMARY_KEY_A\", \"key-1\");\n// env var is cleaned up when _guard goes out of scope\n```\n\n### `install_test_skill`\n\nWrites a minimal valid `skill.toml` + `prompt_context.md` into a directory so the skill registry accepts it at load time.\n\n```rust\ninstall_test_skill(&skills_parent, \"my-skill\", &[\"tag-a\", \"tag-b\"]);\n```\n\n### `make_trace`\n\nCreates a `DecisionTrace` with minimal defaults for trace summarization tests.\n\n---\n\n## Coverage Areas\n\n### Agent Spawning and Lineage\n\nThe kernel enforces a **capability subset rule**: a child agent's declared capabilities must not exceed its parent's. This prevents a restricted agent from escalating privileges by spawning a child with broader access.\n\n| Test | Behavior verified |\n|------|-------------------|\n| `test_spawn_child_exceeding_parent_is_rejected` | Parent with only `file_read` cannot spawn a child requesting `*`, `shell:*`, `network:*` — returns `\"Privilege escalation denied\"` |\n| `test_spawn_child_with_subset_capabilities_is_allowed` | Parent with `file_read` + `file_write` can spawn a child requesting only `file_read` |\n| `test_spawn_with_unknown_parent_fails_closed` | Passing a stale `AgentId` as parent fails with `\"not registered\"` instead of silently treating it as a top-level spawn |\n\nWhen an agent declares `shell_exec` in `capabilities.tools` without an explicit `exec_policy`, the kernel **auto-promotes** the policy to `Full` (test: `test_shell_exec_available_when_declared_in_tools_without_explicit_exec_policy`).\n\n### API Key Rotation\n\n`collect_rotation_key_specs` resolves profiles into `RotationKeySpec` entries, handling:\n\n- **Deduplication**: If a profile references the same env var as the primary key, it gets `use_primary_driver: true` instead of appearing twice\n- **Missing env vars**: Profiles whose env var is unset are silently skipped\n- **Ordering**: Primary key is prepended when no profile shares its value\n\n### Provider Switching\n\n`set_agent_model` must clear per-agent `api_key_env` and `base_url` overrides when the provider changes — otherwise the agent routes requests to the old endpoint with stale credentials (regression for issue #2380). Same-provider model swaps preserve existing overrides.\n\nThe flow tested: spawn agent with provider A + overrides → call `set_agent_model` with provider B → verify `api_key_env` and `base_url` are `None`.\n\n### Tool Availability and Filtering\n\n```mermaid\nflowchart TD\n    A[Agent manifest] --> B{tools_disabled?}\n    B -->|yes| C[Return empty]\n    B -->|no| D{Explicit tools declared?}\n    D -->|yes| E[Filter by declared tools with glob matching]\n    D -->|no| F{ToolProfile set?}\n    F -->|yes| G[Expand profile to tool list]\n    F -->|no| H[All builtin tools available]\n    E --> I[Merge with default-available tools]\n    G --> I\n    H --> I\n    I --> J[Return merged set]\n```\n\nKey behaviors:\n\n- **Glob patterns**: `file_*` in `capabilities.tools` matches `file_read`, `file_write`, `file_list` but not `web_fetch` (`test_available_tools_glob_pattern_matches_mcp_tools`)\n- **Tool profiles vs explicit tools**: When both are present, explicit tools win and the profile is not expanded (`test_manifest_to_capabilities_profile_overridden_by_explicit_tools`)\n- **Disabled tools**: `tools_disabled: true` suppresses all tools including skill and MCP tools\n- **Skill evolution tools**: `skill_evolve_*`, `skill_read_file`, `skill_evolve_write_file`, `skill_evolve_remove_file` are always available regardless of the agent's declared capabilities — every agent can self-evolve skills\n\n### Notification Routing\n\nEscalated approval notifications use this precedence order:\n\n1. **Per-request `route_to`** on the `ApprovalRequest` — highest priority\n2. Routing rules matching the tool pattern\n3. Agent notification rules\n4. Global `approval_channels`\n\nTest `test_notify_escalated_approval_prefers_request_route_to` sets up all four layers and verifies only the explicit per-request target receives the notification.\n\n### Skill Lifecycle and Configuration\n\nFour interrelated properties tested:\n\n| Property | Test |\n|----------|------|\n| `skills.disabled` list filters skills at boot | `test_skills_config_disabled_list_filters_at_boot` |\n| `skills.extra_dirs` loaded as overlay; local install wins on collision | `test_skills_config_extra_dirs_loaded_as_overlay` |\n| `reload_skills()` re-applies disabled list and extra_dirs | `test_reload_skills_preserves_disabled_and_extra_dirs` |\n| Stable mode freezes registry; reload becomes no-op | `test_stable_mode_freezes_registry_and_skips_review_gate` |\n\n### Hand Activation\n\nHands are pre-configured agent instances. Tests verify:\n\n- Activation does not inject runtime `tool_allowlist` or `tool_blocklist` entries — skill/MCP tools remain visible\n- Deactivation followed by reactivation produces an identical runtime profile (capabilities, allowlist, blocklist, MCP servers)\n\n### JSON Extraction from LLM Responses\n\n`extract_json_from_llm_response` handles multiple formats the LLM might return:\n\n- JSON inside ` ```json ``` ` code blocks (including multiple blocks — first valid one wins)\n- Bare `{...}` objects embedded in surrounding text\n- JSON with nested braces inside string values\n- Malformed JSON → returns `None`\n- No JSON present → returns `None`\n\n### Reviewer Block Sanitization\n\n`sanitize_reviewer_block` and `sanitize_reviewer_line` clean text before it enters the review envelope:\n\n- Strips triple backticks (prevents a compromised prior response from forging a JSON block the reviewer mistakes for its own)\n- Strips `<data>`/`<\/data>` envelope markers (prevents escaping the envelope)\n- Removes control
