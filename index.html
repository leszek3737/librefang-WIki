 (`config_injection.rs`) resolves skill-declared configuration variables into system prompt sections.\n\n### Declaration\n\nSkills declare variables in `skill.toml`:\n\n```toml\n[[config_vars]]\nkey = \"wiki.base_url\"\ndescription = \"Base URL of the internal wiki\"\ndefault = \"https://wiki.example.com\"\n```\n\n### Resolution\n\n1. `collect_config_vars()` gathers declarations from all enabled skills, deduplicating by key (first declaration wins).\n2. `resolve_config_vars()` looks up each key in the user's `~/.librefang/config.toml` under `skills.config.<key>`. For example, `wiki.base_url` resolves from:\n   ```toml\n   [skills.config.wiki]\n   base_url = \"https://wiki.corp.example.com\"\n   ```\n3. Empty config values fall back to the declared `default`. Variables with neither value nor default are omitted.\n4. `format_config_section()` produces a prompt section:\n   ```\n   ## Skill Config Variables\n   wiki.base_url = https://wiki.corp.example.com\n   db.host = localhost\n   ```\n\nIncomplete declarations (empty key or description) are silently skipped.\n\n## Security Pipeline\n\nThe `verify` module provides two scanning functions:\n\n- **`SkillVerifier::security_scan(manifest)`** ŌĆö inspects the manifest structure for dangerous configurations\n- **`SkillVerifier::scan_prompt_content(content)`** ŌĆö detects prompt injection patterns in skill instructions\n\nScanning runs at two points:\n1. **Installation time** ŌĆö during `install_from_bytes()`, both manifest and prompt content are scanned. Critical-severity warnings block installation and clean up the partially-created skill directory.\n2. **Evolution time** ŌĆö `validate_prompt_content()` scans all new/patched prompt content before writing. Critical warnings block the mutation.\n\nContent size is also enforced: prompt context is capped at 160,000 characters (~55k tokens).\n\n## Tool Runner Integration\n\nThe runtime layer (`librefang-runtime/src/tool_runner.rs`) exposes evolution operations as agent tools:\n\n- `tool_skill_evolve_create` ŌåÆ `create_skill()`\n- `tool_skill_evolve_update` ŌåÆ `update_skill()`\n- `tool_skill_evolve_patch` ŌåÆ `patch_skill()`\n- `tool_skill_evolve_rollback` ŌåÆ `rollback_skill()`\n- `tool_skill_evolve_delete` ŌåÆ `delete_skill()`\n- `tool_skill_evolve_write_file` ŌåÆ `write_supporting_file()`\n- `tool_skill_evolve_remove_file` ŌåÆ `remove_supporting_file()`\n- `tool_skill_read_file` ŌåÆ reads file + `record_skill_usage()`\n- `execute_tool_raw` ŌåÆ `record_skill_usage()` on every skill tool invocation\n\nThe tool runner checks `is_frozen()` on the registry before allowing any mutations. The CLI's `cmd_doctor` command also runs `scan_prompt_content()` across all installed skills for proactive auditing.\n\n## Error Handling\n\nAll functions return `Result<_, SkillError>` where `SkillError` variants include:\n\n| Variant | Meaning |\n|---|---|\n| `Network(msg)` | HTTP failure after all retries |\n| `RateLimited(msg)` | 429 after 5 attempts |\n| `InvalidManifest(msg)` | Parse error, validation failure, or fuzzy-match failure |\n| `SecurityBlocked(msg)` | Prompt injection detected or deletion of non-local skill |\n| `AlreadyInstalled(name)` | Skill directory already exists |\n| `NotFound(name)` | Skill or file not found |\n| `Io(err)` | Filesystem error |","wire-protocol-networking":"# Wire Protocol & Networking\n\n# LibreFang Wire Protocol (OFP) ŌĆö Agent-to-Agent Networking\n\nThe `librefang-wire` crate implements the LibreFang Wire Protocol (OFP), the networking layer that enables separate LibreFang kernels to discover each other's agents, authenticate connections, and exchange messages over TCP. Every cross-machine interaction ŌĆö agent messaging, discovery queries, lifecycle notifications ŌĆö flows through this module.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Kernel A] -->|TCP + OFP| B[Kernel B]\n    A --> C[PeerNode]\n    B --> D[PeerNode]\n    C --> E[PeerRegistry]\n    D --> F[PeerRegistry]\n    C -->|PeerHandle trait| G[Local Agents]\n    D -->|PeerHandle trait| H[Local Agents]\n    C -->|connection_loop| I[Message Dispatch]\n    D -->|connection_loop| J[Message Dispatch]\n```\n\nEach kernel runs a `PeerNode` that binds a TCP listener. When two kernels connect, they perform an HMAC-authenticated handshake, exchange their agent rosters, and enter a message dispatch loop. The `PeerHandle` trait is the integration point where the kernel plugs in its agent routing logic.\n\n## Wire Protocol\n\nAll communication uses length-prefixed JSON frames over TCP.\n\n### Framing\n\nEvery message on the wire has this structure:\n\n```\n[4 bytes: big-endian length of payload][JSON payload]\n```\n\nPost-handshake messages append a 64-character hex HMAC:\n\n```\n[4 bytes: big-endian length][JSON body][64 bytes: hex HMAC-SHA256]\n```\n\nThe maximum message size is 16 MB (`MAX_MESSAGE_SIZE`). The functions `encode_message` / `decode_message` / `decode_length` in `message.rs` handle serialization, and `write_message` / `read_message` in `peer.rs` handle async TCP I/O for unauthenticated frames. The `_authenticated` variants handle HMAC-appended frames.\n\n### Message Types\n\nAll messages are wrapped in a `WireMessage` envelope carrying a unique `id` and a `kind` discriminated by a `\"type\"` tag:\n\n| Variant | Tag | Direction |\n|---|---|---|\n| `WireRequest` | `\"request\"` | Initiator ŌåÆ Responder |\n| `WireResponse` | `\"response\"` | Responder ŌåÆ Initiator |\n| `WireNotification` | `\"notification\"` | One-way, no response |\n\n**Requests** are further discriminated by a `\"method\"` tag:\n\n- `Handshake` ŌĆö exchange peer identity, agents, and HMAC credentials\n- `Discover` ŌĆö search for agents matching a query\n- `AgentMessage` ŌĆö send a message to a specific remote agent\n- `Ping` ŌĆö liveness check\n\n**Responses** use a matching `\"method\"` tag:\n\n- `HandshakeAck` ŌĆö confirms handshake with the responder's identity and HMAC\n- `DiscoverResult` ŌĆö returns matched `RemoteAgentInfo` entries\n- `AgentResponse` ŌĆö returns the target agent's reply text\n- `Pong` ŌĆö includes uptime in seconds\n- `Error` ŌĆö carries an error code and message\n\n**Notifications** use an `\"event\"` tag and are fire-and-forget:\n\n- `AgentSpawned` ŌĆö a new agent is available on the peer\n- `AgentTerminated` ŌĆö an agent has stopped\n- `ShuttingDown` ŌĆö the peer is going offline\n\nThe current protocol version is `PROTOCOL_VERSION = 1`. A version mismatch during handshake immediately terminates the connection.\n\n## Authentication & Security Model\n\nOFP requires a pre-shared secret configured via `PeerConfig.shared_secret`. The `PeerNode::start` method refuses to boot if the secret is empty. Authentication operates at two layers:\n\n### Handshake Authentication\n\nEach side generates a random nonce (UUID v4) and computes:\n\n```\nHMAC-SHA256(shared_secret, nonce + node_id)\n```\n\nBoth the request (`Handshake`) and response (`HandshakeAck`) carry `nonce` and `auth_hmac` fields. Each side independently verifies the other's HMAC using constant-time comparison (`subtle::ConstantTimeEq`). A failed HMAC results in an immediate connection drop.\n\n### Nonce Replay Protection\n\nThe `NonceTracker` stores every nonce seen within a 5-minute sliding window. The `check_and_record` method uses `DashMap::entry` to atomically check and insert, preventing a TOCTOU race where concurrent connections with a replayed nonce could both pass. Once the tracker reaches 100,000 entries (the `max_entries` cap), it rejects new nonces to prevent memory exhaustion from flooding attacks.\n\n### Session Key Derivation\n\nAfter both HMACs verify, a per-session key is derived:\n\n```rust\nderive_session_key(shared_secret, our_nonce, their_nonce)\n// = HMAC-SHA256(shared_secret, our_nonce + their_nonce)\n```\n\nNonce order matters ŌĆö the initiator and responder pass their own nonce first, so the derived keys are identical because `connect_to_peer` and `handle_inbound` both call `derive_session_key` with the client nonce first and the server nonce second.\n\n### Per-Message Authentication\n\nAll post-handshake messages are wrapped with an appended HMAC computed over the JSON body using the session key. The `write_message_authenticated` and `read_message_authenticated` functions handle this transparently. If the HMAC does not match, the message is rejected as tampered or forged.\n\n### Unauthenticated Rejection\n\nAny message received before a completed handshake is rejected with an `Error` response (code 401). This includes `Ping`, `Discover`, and `AgentMessage` ŌĆö the server enforces handshake-first.\n\n## Key Components\n\n### `PeerNode`\n\nThe core networking actor. Created via `PeerNode::start`, which binds a TCP listener and spawns an accept loop. Key methods:\n\n- **`start(config, registry, handle)`** ŌĆö Binds the listener, validates config, returns `(Arc<PeerNode>, JoinHandle)`.\n- **`connect_to_peer(addr, handle)`** ŌĆö Opens an outbound connection, performs the full HMAC handshake, registers the peer, and spawns a `connection_loop` task.\n- **`send_to_peer(node_id, agent, message, sender, handle)`** ŌĆö Opens a fresh connection to a known peer, handshakes, sends an `AgentMessage`, and returns the response text. Used for one-shot remote agent calls.\n- **`local_addr()`** / **`node_id()`** / **`registry()`** ŌĆö Accessors.\n\n### `PeerHandle` Trait\n\nThe integration point for the kernel. The `PeerNode` calls these methods when handling inbound requests:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\nThe kernel implements `PeerHandle` to route incoming `AgentMessage` requests to its local agent system, provide agent listings for handshakes and discovery, and report uptime.\n\n### `PeerRegistry`\n\nA thread-safe (`Arc<RwLock<HashMap>>`) store of all known peers. Each `PeerEntry` records:\n\n| Field | Purpose |\n|---|---|\n| `node_id` | Unique peer identifier |\n| `node_name` | Human-readable name |\n| `address` | `SocketAddr` for reconnection |\n| `agents` | Advertised `RemoteAgentInfo` list |\n| `state` | `Connected` or `Disconnected` |\n| `connected_at` | Timestamp from `chrono::Utc` |\n| `protocol_version` | Negotiated during handshake |\n\nKey operations:\n\n- **`add_peer`** / **`remove_peer`** ŌĆö Register or remove a peer entry.\n- **`mark_disconnected`** / **`mark_connected`** ŌĆö Toggle state without removing the entry (supports reconnect scenarios).\n- **`add_agent`** / **`remove_agent`** ŌĆö Update a peer's agent list (used when processing `AgentSpawned` / `AgentTerminated` notifications).\n- **`find_agents(query)`** ŌĆö Searches across all connected peers, matching against agent name, description, and tags (case-insensitive). Returns `Vec<RemoteAgent>` which includes the owning `peer_node_id`.\n- **`connected_peers()`** / **`all_peers()`** ŌĆö Snapshot of peers filtered by state.\n- **`connected_count()`** / **`total_count()`** ŌĆö Quick counts.\n\n### `NonceTracker`\n\nConcurrent replay-detection using a `DashMap<String, Instant>`. Expired entries (older than 5 minutes) are garbage-collected on each `check_and_record` call. The atomic entry API prevents race conditions ŌĆö exactly one concurrent caller can win for a given nonce.\n\n### Error Handling\n\n`WireError` covers all failure modes:\n\n- `Io` / `Json` ŌĆö underlying I/O or serialization errors\n- `HandshakeFailed` ŌĆö HMAC failure, nonce replay, rejected auth\n- `ConnectionClosed` ŌĆö clean EOF\n- `MessageTooLarge` ŌĆö exceeded 16 MB limit\n- `VersionMismatch` ŌĆö protocol version disagreement\n\n## Connection Lifecycle\n\n```mermaid\nsequenceDiagram\n    participant A as Kernel A (initiator)\n    participant B as Kernel B (responder)\n    A->>B: TCP connect\n    A->>B: Handshake(node_id, nonce_a, HMAC_a, agents)\n    B->>B: verify HMAC_a, check nonce_a replay\n    B->>A: HandshakeAck(node_id, nonce_b, HMAC_b, agents)\n    A->>A: verify HMAC_b, check nonce_b replay\n    A->>A: derive session_key\n    B->>B: derive session_key\n    Note over A,B: Both sides register each other in PeerRegistry\n    loop Message dispatch (per-message HMAC)\n        A->>B: AgentMessage(agent, text) + HMAC\n        B->>A: AgentResponse(text) + HMAC\n        B->>A: Notification(AgentSpawned) + HMAC\n    end\n```\n\n1. **Connect** ŌĆö The initiator opens a TCP connection to the responder's listen address.\n2. **Handshake** ŌĆö Both sides exchange identity, agent lists, nonces, and HMACs. Either side can reject on HMAC failure or version mismatch.\n3. **Session key** ŌĆö Both derive an identical session key from the two nonces and the shared secret.\n4. **Dispatch loop** ŌĆö The `connection_loop` function reads authenticated messages, dispatches requests to `PeerHandle`, forwards notifications to the `PeerRegistry`, and writes authenticated responses.\n5. **Teardown** ŌĆö On disconnect or error, the peer is marked `Disconnected` in the registry (not removed, to support reconnect).\n\n### Broadcasting Notifications\n\n`broadcast_notification` sends a one-way notification to all connected peers. It opens a fresh TCP connection per peer, derives a per-message key from a fresh nonce, and writes a single authenticated frame. Any errors are collected and returned to the caller.\n\n## Configuration\n\n`PeerConfig` controls the local node:\n\n| Field | Default | Description |\n|---|---|---|\n| `listen_addr` | `\"127.0.0.1:0\"` | Bind address (port 0 = OS-assigned) |\n| `node_id` | Random UUID | Unique node identifier |\n| `node_name` | `\"librefang-node\"` | Human-readable name |\n| `shared_secret` | `\"\"` (must be set) | Pre-shared key for HMAC auth |\n\nThe shared secret must be identical on all peers that need to communicate. The config is typically loaded from `[network]` section in `config.toml`.\n\n## Integration with the Rest of LibreFang\n\nThe wire module is consumed by several other crates:\n\n- **`librefang-api`** ŌĆö Uses `PeerRegistry::all_peers` and `connected_count` in `/network` routes and WebSocket handlers to display peer status.\n- **`librefang-cli`** ŌĆö References `registry` and `local_addr` during initialization.\n- **`librefang-desktop`** and other crates ŌĆö Call `local_addr` for test server setup and OAuth redirect binding.\n\nThe kernel implements `PeerHandle` and passes it to `PeerNode::start`. From that point, inbound OFP requests are automatically routed through the kernel's agent system."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
