}\n```\n\nThis is intended for CI, release builds, and packaging pipelines ŌĆö not for everyday development.\n\n### Available channel features\n\n| Feature flag | Optional dependencies |\n|---|---|\n| `channel-telegram` | ŌĆö |\n| `channel-discord` | ŌĆö |\n| `channel-slack` | ŌĆö |\n| `channel-matrix` | ŌĆö |\n| `channel-email` | `lettre`, `imap`, `rustls-connector`, `mailparse` |\n| `channel-webhook` | ŌĆö |\n| `channel-whatsapp` | ŌĆö |\n| `channel-signal` | ŌĆö |\n| `channel-teams` | ŌĆö |\n| `channel-mattermost` | ŌĆö |\n| `channel-irc` | ŌĆö |\n| `channel-google-chat` | `rsa` |\n| `channel-twitch` | ŌĆö |\n| `channel-rocketchat` | ŌĆö |\n| `channel-zulip` | ŌĆö |\n| `channel-xmpp` | ŌĆö |\n| `channel-bluesky` | ŌĆö |\n| `channel-feishu` | `aes`, `cbc` |\n| `channel-line` | ŌĆö |\n| `channel-mastodon` | ŌĆö |\n| `channel-messenger` | ŌĆö |\n| `channel-reddit` | ŌĆö |\n| `channel-revolt` | ŌĆö |\n| `channel-viber` | ŌĆö |\n| `channel-voice` | ŌĆö |\n| `channel-flock` | ŌĆö |\n| `channel-guilded` | ŌĆö |\n| `channel-keybase` | ŌĆö |\n| `channel-nextcloud` | ŌĆö |\n| `channel-nostr` | `k256` |\n| `channel-pumble` | ŌĆö |\n| `channel-threema` | ŌĆö |\n| `channel-twist` | ŌĆö |\n| `channel-webex` | ŌĆö |\n| `channel-dingtalk` | ŌĆö |\n| `channel-discourse` | ŌĆö |\n| `channel-gitter` | ŌĆö |\n| `channel-gotify` | ŌĆö |\n| `channel-linkedin` | ŌĆö |\n| `channel-mumble` | ŌĆö |\n| `channel-ntfy` | ŌĆö |\n| `channel-qq` | ŌĆö |\n| `channel-wechat` | ŌĆö |\n| `channel-wecom` | `aes`, `cbc` |\n| `channel-mqtt` | `rumqttc` |\n\nChannels with cryptographic or protocol-specific needs (e.g., AES-CBC for Feishu/WeCom, RSA for Google Chat, secp256k1 for Nostr, MQTT client) pull in their respective dependencies only when that feature is enabled.\n\n## Core Dependencies\n\nEvery channel adapter has access to the following shared workspace dependencies, regardless of which feature is active:\n\n- **`librefang-types`** ŌĆö shared type definitions for messages, events, and configuration\n- **`tokio`** / **`futures`** / **`async-trait`** ŌĆö async runtime and trait infrastructure\n- **`reqwest`** / **`tokio-tungstenite`** ŌĆö HTTP and WebSocket clients\n- **`serde`** / **`serde_json`** ŌĆö serialization\n- **`axum`** ŌĆö inbound webhook endpoint handling\n- **`hmac`** / **`sha2`** / **`sha1`** ŌĆö signature verification for platform webhooks\n- **`dashmap`** ŌĆö concurrent state maps\n- **`tracing`** ŌĆö structured logging\n- **`image`** ŌĆö image processing (JPEG, PNG, WebP) for media handling\n- **`regex`** / **`regex-lite`** ŌĆö pattern matching\n\n## Adding a New Channel Adapter\n\nWhen adding a new channel to this crate, three places must be updated in `Cargo.toml`:\n\n1. **Add a new `channel-<name> = []` feature** (with any optional dependencies it needs).\n2. **Add `\"channel-<name>\"` to the `all-channels` array** so it is included in complete builds.\n3. **Add any channel-specific optional dependencies** under `[dependencies]` with `optional = true`.\n\nKeep the entries alphabetically sorted within their respective sections to maintain consistency with the existing 44 adapters.\n\n## Benchmarks\n\nThe crate includes a Criterion benchmark suite:\n\n```sh\ncargo bench --bench dispatch\n```\n\nThis measures message dispatch throughput across the active channel adapters, useful for regression testing when modifying the dispatch path.\n\n## Relationship to the Workspace\n\n```\nlibrefang-types          ŌåÉ shared type definitions\n    Ōåæ\nlibrefang-channels       ŌåÉ this crate\n    Ōåæ\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé       Ōöé           Ōöé\napi    cli      desktop\n```\n\n- **`librefang-api`** ŌĆö exposes channels via the HTTP/gRPC API surface\n- **`librefang-cli`** ŌĆö enables channels for command-line tooling\n- **`librefang-desktop`** ŌĆö enables channels for the desktop application\n\nEach downstream crate forwards only the channel features its users are expected to need.","other-librefang-cli-locales":"# Other ŌĆö librefang-cli-locales\n\n# librefang-cli-locales\n\nFluent (FTL) translation catalogs for the LibreFang CLI. This module holds every user-facing string the CLI prints ŌĆö labels, status messages, error diagnostics, hints, and setup wizard text ŌĆö in a format the [Project Fluent](https://projectfluent.org/) runtime can resolve at launch time.\n\n## File Layout\n\n```\nlibrefang-cli/locales/\nŌö£ŌöĆŌöĆ en/          # English ŌĆö the primary/source locale\nŌöé   ŌööŌöĆŌöĆ main.ftl\nŌööŌöĆŌöĆ zh-CN/       # Simplified Chinese\n    ŌööŌöĆŌöĆ main.ftl\n```\n\nEach locale directory mirrors the same `main.ftl` structure. The CLI loads the file that matches the user's `LANG` / `LC_MESSAGES` setting at startup; `en` acts as the unconditional fallback.\n\n## Why Fluent, Not Plain JSON\n\nFluent (`.ftl`) supports:\n\n| Feature | Example in this module |\n|---|---|\n| **Variable interpolation** | `daemon-error = Daemon error: { $error }` |\n| **Pluralisation** | `{ $count }` rendered via caller context |\n| **Section comments** | `# --- Daemon lifecycle ---` (organisational only) |\n| **Separation of concerns** | Message IDs are stable; translators edit only the value |\n\nThis lets translators work on a single file per locale without touching code.\n\n## Message Organisation\n\nMessages are grouped into logical sections via comment headers. Both locales follow the same section order:\n\n| Section | Prefix | Purpose |\n|---|---|---|\n| Daemon lifecycle | `daemon-*` | Start, stop, restart, background launch, health waits |\n| Labels | `label-*` | Short field names for tables/status output |\n| Hints | `hint-*` | Contextual help text suggesting next commands |\n| Init wizard | `init-*`, `guide-*` | First-run setup flow messages |\n| Errors (filesystem) | `error-*` | Config/IO/parse errors with `*-fix` companions |\n| Errors (daemon comms) | `error-daemon-*`, `error-boot-*` | Network/boot failures |\n| Errors (require daemon) | `error-require-daemon-*` | Commands that need a running daemon |\n| Provider detection | `detected-*` | Auto-detected LLM backends |\n| Desktop app | `desktop-*` | GUI launch messages |\n| Dashboard | `dashboard-*` | Web UI open/URL messages |\n| Agent commands | `agent-*` | Spawn, kill, template, model set |\n| Manifest errors | `manifest-*` | Missing/corrupt template manifests |\n| Status display | `section-*`, `warn-*`, `auth-*` | Structured status output sections |\n| Doctor | `doctor-*` | Diagnostic pass/fail/repair |\n| Security | `value-*`, `audit-*` | Security feature descriptions and audit results |\n| Health | `health-*` | Simple up/down checks |\n| Channel setup | `channel-*`, `section-setup-*` | Telegram, Discord, Slack, WhatsApp, Email, Signal, Matrix |\n| Vault | `vault-*` | Credential store operations |\n| Cron | `cron-*` | Scheduled job CRUD |\n| Approvals | `approval-*` | Approval workflow responses |\n| Memory | `memory-*` | Per-agent key/value store |\n| Devices | `device-*` | Mobile pairing QR / removal |\n| Webhooks | `webhook-*` | Webhook CRUD and test |\n| Models | `model-*` | Default model selection |\n| Config | `config-*` | Get/set/unset, key management, `.env` interactions |\n| Hand commands | `hand-*` | Hand instance pause/resume/deps |\n| Uninstall | `uninstall-*` | Platform-specific cleanup (Windows/macOS/Linux) |\n| Reset | `reset-*` | Data directory removal |\n| Logs | `log-*` | Tail/follow hints |\n\n## Conventions\n\n### Message IDs\n\n- **Kebab-case**: `daemon-still-starting`, `channel-bot-token-saved`\n- **Hierarchical by domain**: All agent messages start with `agent-`, all config messages with `config-`\n- **`-fix` suffix**: Companion messages that suggest remediation steps (e.g. `error-boot-auth-fix`)\n\n### Error + Fix Pairing\n\nMost error messages come in pairs. The base message describes the failure; the `-fix` variant tells the user what to do:\n\n```ftl\nerror-connect-refused = Cannot connect to daemon\nerror-connect-refused-fix = Is the daemon running? Start it with: librefang start\n```\n\nThe calling code retrieves both and renders them together, ensuring users always see actionable guidance.\n\n### Interpolated Variables\n\nVariables are wrapped in `{ $name }`. Common variable names across the module:\n\n| Variable | Typical source |\n|---|---|\n| `$error` | Underlying error message from the runtime |\n| `$path` | Filesystem path (logs, config, data) |\n| `$url` | Daemon or dashboard URL |\n| `$status` | HTTP-style status code or exit code |\n| `$command` | CLI subcommand name |\n| `$name` | Entity name (agent, channel, provider) |\n| `$id` | Unique identifier (agent, webhook, cron, device) |\n| `$key` | Config key or vault key |\n| `$value` | New value being set |\n| `$provider` / `$model` | LLM provider or model identifier |\n| `$count` | Numeric count (agents, models, keys) |\n| `$action` | Past-tense verb like \"pause\", \"resume\", \"approve\" |\n| `$env_var` | Environment variable name |\n| `$display` | Human-readable provider name |\n\n## Adding a New Locale\n\n1. Create `librefang-cli/locales/<locale-code>/main.ftl`.\n2. Copy `en/main.ftl` as the starting point.\n3. Translate every message value ŌĆö **do not change message IDs or variable names**.\n4. Keep section comments for readability.\n5. Register the new locale in the CLI's Fluent loader (see the i18n initialization module).\n\n### Checklist for Translators\n\n- [ ] Every message ID from `en/main.ftl` is present\n- [ ] All `{ $variable }` references are preserved exactly\n- [ ] No message IDs are renamed or removed\n- [ ] Command names in backticks (`` `librefang start` ``) remain untranslated\n- [ ] URLs remain unchanged\n- [ ] Section comments are kept for future maintenance\n\n## Adding New Messages\n\nWhen introducing a new user-facing string:\n\n1. Add the message to `en/main.ftl` under the correct section (or create a new section).\n2. Follow the naming convention: `<domain>-<description>`.\n3. If it's an error, add a matching `-fix` variant.\n4. Immediately add the same message ID to all other locale files ŌĆö use the English text as a placeholder with a `TODO` comment so translators can find it:\n\n```ftl\n# TODO: translate\ndaemon-new-feature = Some new English message\n```\n\n5. Reference the message from code via `fluent_bundle.get_message(\"daemon-new-feature\")`.\n\n## Relationship to the CLI Codebase\n\nThis module is a **pure data** dependency. The CLI's i18n layer loads these `.ftl` files at startup and resolves messages by ID. No code in this module imports or calls anything else, and nothing imports code from it ŌĆö only the Fluent runtime reads the files.\n\n```mermaid\nflowchart LR\n    A[CLI i18n init] -->|loads| B[en/main.ftl]\n    A -->|loads| C[zh-CN/main.ftl]\n    A -->|fallback| B\n    D[CLI commands] -->|resolve by ID| A\n```\n\nThe CLI commands (`start`, `stop`, `agent`, `config`, `doctor`, etc.) request messages by their Fluent ID. The i18n layer returns the resolved string for the active locale, interpolating any variables the command provides. If a message ID is missing in the active locale, Fluent falls back to English automatically.","other-librefang-cli-templates":"# Other ŌĆö librefang-cli-templates\n\n# librefang-cli-templates\n\nConfiguration template files used by the LibreFang CLI during project initialization. These are static TOML templates containing Mustache-style placeholders that get interpolated at `librefang init` time to produce a ready-to-edit `librefang.toml`.\n\n## Templates\n\n### `init_default_config.toml`\n\nThe full reference configuration. It ships with every option documented inline ŌĆö including commented-out sections for channels, MCP servers, browser automation, Docker sandbox, budget controls, and rate limiting. Its purpose is twofold:\n\n1. **Serve as a working starter config** after placeholder substitution, with sensible loopback-only defaults.\n2. **Act as a self-documenting reference** that developers can browse to discover available settings.\n\n**Placeholders:**\n\n| Placeholder | Replaced With |\n|---|---|\n| `{{provider}}` | LLM provider selected during init (e.g. `openai`, `anthropic`) |\n| `{{model}}` | Default model identifier (e.g. `gpt-4o`, `claude-sonnet-4-20250514`) |\n| `{{api_key_env}}` | Environment variable name holding the API key (e.g. `OPENAI_API_KEY`) |\n\n### `init_wizard_config.toml`\n\nA minimal template produced by the interactive setup wizard. It contains only the essential settings needed to start the daemon ŌĆö server listen address, default model, and memory configuration ŌĆö keeping the file uncluttered for new users.\n\n**Placeholders:**\n\n| Placeholder | Replaced With |\n|---|---|\n| `{{provider}}` | LLM provider selected in wizard |\n| `{{model}}` | Model identifier chosen in wizard |\n| `{{api_key_line}}` | Rendered `api_key_env = \"...\"` line, or empty string if the provider doesn't require a key |\n| `{{routing_section}}` | Optional agent routing block generated from wizard choices |\n\n## How Templates Are Consumed\n\n```mermaid\nflowchart LR\n    A[\"librefang init\"] --> B{Wizard mode?}\n    B -- Yes --> C[\"init_wizard_config.toml\"]\n    B -- No --> D[\"init_default_config.toml\"]\n    C --> E[\"Mustache interpolation\"]\n    D --> E\n    E --> F[\"Write librefang.toml\"]\n```\n\nThe CLI reads the appropriate template, substitutes placeholders with values collected from the user (or from sensible defaults), and writes the result as `librefang.toml` in the project directory.\n\n## Security Defaults\n\nBoth templates ship with **loopback-only** binding (`api_listen = \"127.0.0.1:4545\"`) and the shell execution policy set to `deny`. The full template includes inline warnings about the requirement to configure authentication before changing to a non-loopback address.\n\n## Adding New Configuration Options\n\nWhen adding a new setting to the LibreFang daemon:\n\n1. Add the option to `init_default_config.toml` in its appropriate section, commented out if it's optional, with a brief inline description.\n2. If the option is essential for first-run, add it to `init_wizard_config.toml` as well (potentially behind a new placeholder).\n3. Ensure placeholder naming follows the `snake_case` convention and matches the variable names used in the CLI's template rendering code.","other-librefang-cli-tests":"# Other ŌĆö librefang-cli-tests\n\n# librefang-cli/tests/build_rs_no_git_mutation\n\nRegression test suite ensuring `build.rs` never mutates the user's Git configuration or invokes side-effecting Git subcommands. Introduced to prevent a recurrence of [issue #3641].\n\n## Background\n\nA previous `build.rs` script silently modified the user's global Git configuration (specifically `core.hooksPath`) during an ordinary `cargo build`. This is a hostile act against developer machines ŌĆö build scripts must be read-only with respect to the user's environment. These tests statically analyze `build.rs` at test time to guarantee no regression.\n\n## How It Works\n\nEach test reads the source text of `build.rs`, strips line comments to avoid false positives from documentation mentioning the banned tokens, then asserts that forbidden substrings are absent.\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé   read_build_rs()       ŌöéŌöĆŌöĆŌåÆ reads build.rs from disk\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n           Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé   strip_comments()      ŌöéŌöĆŌöĆŌåÆ removes // line comments\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n           Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé   assert!(!src.contains(bad))    ŌöéŌöĆŌöĆŌåÆ fails if banned token found\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\n### `read_build_rs()`\n\nLocates `build.rs` relative to `CARGO_MANIFEST_DIR` and reads it into a `String`. Panics if the file cannot be read ŌĆö the file must exist for any meaningful test run.\n\n### `strip_comments(src: &str) -> String`\n\nRemoves `//` line comments (everything from `//` to end-of-line) so that doc comments or inline notes referencing the old bug ŌĆö for example `// Previously this script ran git config` ŌĆö do not cause a false-positive test failure.\n\nStripping is deliberately simple: it looks for the first `//` on each line and truncates. It does not handle string literals or block comments, which is acceptable because `build.rs` is not expected to contain string literals with `//` that collide with the banned tokens.\n\n## Test Cases\n\n### `build_rs_does_not_mutate_git_config`\n\nChecks two things:\n\n| Banned token | Reason |\n|---|---|\n| `\"config\"` | Prevents any invocation of `git config` (even read-only). If a future change needs `git config --get`, an explicit carve-out must be added here rather than silently allowing it. |\n| `\"hooksPath\"` | Specifically blocks modification of `core.hooksPath`, the exact mechanism of the original bug. |\n\nThe ban on the bare `\"config\"` token is intentionally broad. The comment in the test explains the rationale: if a legitimate read-only need arises, the test should be updated with a targeted allow-list rather than loosening the blanket prohibition.\n\n### `build_rs_uses_only_read_only_git_subcommands`\n\nScans for a hardcoded list of side-effecting Git subcommands:\n\n```\n\"init\", \"clone\", \"commit\", \"push\", \"pull\",\n\"fetch\", \"checkout\", \"reset\", \"add\", \"rm\"\n```\n\nIf `build.rs` contains any of these as string literals (e.g., as arguments to `Command::new(\"git\").arg(\"commit\")`), the test fails. The check is substring-based against the post-comment-stripped source, so it catches tokens wherever they appear in the file.\n\n## Extending the Guard\n\nTo add new banned operations, append entries to the `forbidden` array in `build_rs_uses_only_read_only_git_subcommands` or add a new `assert!` in `build_rs_does_not_mutate_git_config`.\n\nIf a legitimate read-only Git operation is needed in `build.rs` (e.g., `git config --get` to read a value), the test must be updated to:\n\n1. Allow the specific safe pattern (e.g., check that `\"config\"` only appears alongside `\"--get\"`).\n2. Document why the exception is safe.\n\nDo **not** simply remove the assertion.\n\n## Relationship to the Codebase\n\nThis module has no runtime dependencies beyond the standard library. It does not call into any other crate code, and nothing calls into it ŌĆö it runs solely as part of `cargo test` in `librefang-cli`.\n\n- **Monitors:** `build.rs` at the crate root.\n- **Depended on by:** CI and local development workflows (via `cargo test`).\n- **Related issue:** #3641.","other-librefang-cli":"# Other ŌĆö librefang-cli\n\n# librefang-cli\n\nThe command-line interface and primary binary distribution for the LibreFang Agent OS. This crate produces the `librefang` executable, which serves as the entry point for running agents, managing configurations, and interacting with the system.\n\n## Overview\n\n`librefang-cli` is a thin orchestration layer that wires together the domain crates of the LibreFang ecosystem. It does not implement business logic itself ŌĆö instead, it handles:\n\n- CLI argument parsing (via `clap`)\n- Configuration file discovery and loading\n- Feature-gated channel adapter selection\n- Build metadata embedding (git SHA, build date, compiler version)\n- Optional OpenTelemetry telemetry initialization\n- Terminal UI rendering (via `ratatui`)\n\n## Binary\n\nThe produced binary is named **`librefang`**, built from `src/main.rs`.\n\n```toml\n[[bin]]\nname = \"librefang\"\npath = \"src/main.rs\"\n```\n\n## Dependency Graph\n\nThe CLI sits at the top of the crate dependency tree, pulling in every domain module:\n\n```mermaid\ngraph TD\n    CLI[librefang-cli] --> API[librefang-api]\n    CLI --> KERNEL[librefang-kernel]\n    CLI --> RUNTIME[librefang-runtime]\n    CLI --> CHANNELS[librefang-channels]\n    CLI --> SKILLS[librefang-skills]\n    CLI --> EXTENSIONS[librefang-extensions]\n    CLI --> MEMORY[librefang-memory]\n    CLI --> MIGRATE[librefang-migrate]\n    CLI --> TYPES[librefang-types]\n    API --> CHANNELS\n    API --> KERNEL\n    API --> RUNTIME\n```\n\n## Feature Flags\n\nFeature flags control which channel adapters and optional subsystems are compiled into the binary. This exists primarily to keep developer iteration fast ŌĆö heavy dependencies like `matrix-sdk-crypto`, `lettre`, `imap`, `rumqttc`, and `nostr-sdk` are excluded by default.\n\n| Feature | Description |\n|---|---|\n| `default` | Enables `core-channels` (Telegram, Discord, Slack, webhook, ntfy) + `telemetry`. This is what you get with a plain `cargo build`. |\n| `all-channels` | Enables every channel adapter. Used by release CI to produce full binaries. Does **not** imply `telemetry` on its own. |\n| `mini` | Minimal channel set for resource-constrained environments. |\n| `android` | All channels except email, due to a `rustls-connector` + `rustls-platform-verifier` incompatibility on Android (`Verifier::new_with_extra_roots` not implemented). |\n| `telemetry` | Enables OpenTelemetry tracing exporters. Pulls in `opentelemetry`, `opentelemetry_sdk`, and `tracing-opentelemetry`. |\n\n### Build Commands for Common Scenarios\n\n```bash\n# Fast developer build (core channels only, ~30s cold)\ncargo build -p librefang-cli\n\n# Release binary with all channels (used by CI)\ncargo build -p librefang-cli --release --features all-channels\n\n# Minimal footprint build\ncargo build -p librefang-cli --no-default-features --features mini\n\n# Android target (no email channel)\ncargo build -p librefang-cli --target aarch64-linux-android --no-default-features --features android\n\n# All channels without telemetry (explicit opt-out)\ncargo build -p librefang-cli --no-default-features --features all-channels\n```\n\n> **Note:** If you build with `--no-default-features --features all-channels`, telemetry is disabled because `all-channels` does not include it. Add `telemetry` explicitly if you need both.\n\n## Build Script (`build.rs`)\n\nThe build script captures environment metadata at compile time and injects it via `cargo:rustc-env` directives. These are accessible at runtime via `env!()` macros:\n\n| Environment Variable | Source | Example Value |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a1b2c3d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nAll three gracefully fall back to `\"unknown\"` if the command fails (e.g., building from a tarball without git).\n\nUsage in source code:\n```rust\nlet version = format!(\n    \"{} ({} {})\",\n    env!(\"CARGO_PKG_VERSION\"),\n    env!(\"GIT_SHA\"),\n    env!(\"BUILD_DATE\"),\n);\n```\n\n## Memory Allocator\n\nOn non-MSVC targets (Linux, macOS, BSD), the binary uses **tikv-jemallocator** with `disable_initial_exec_tls` enabled:\n\n```rust\n#[cfg(not(target_env = \"msvc\"))]\n#[global_allocator]\nstatic GLOBAL: tikv_jemallocator::Jemalloc = tikv_jemallocator::Jemalloc;\n```\n\nThis is defined as a workspace dependency and linked automatically via the `Cargo.toml` dependency on `tikv-jemallocator`.\n\n## Key External Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `clap` | CLI argument parsing and shell completion generation |\n| `clap_complete` | Shell completion scripts (bash, zsh, fish, etc.) |\n| `ratatui` | Terminal UI framework for interactive views |\n| `tracing` / `tracing-subscriber` | Structured logging and trace collection |\n| `colored` | Colored terminal output |\n| `toml` / `toml_edit` | Configuration file reading and writing |\n| `fluent` / `unic-langid` | Internationalization (i18n) support |\n| `open` | Open URLs/files in the system default application |\n| `zeroize` | Secure memory zeroing for sensitive data |\n\n## Connection to Other Modules\n\nThe CLI is the assembly point. It does not define data types, channel logic, or runtime behavior ŌĆö it delegates:\n\n- **`librefang-api`** ŌĆö HTTP server startup, routing, and the channel feature flags that propagate through the dependency tree\n- **`librefang-kernel`** ŌĆö Core agent logic and lifecycle management\n- **`librefang-runtime`** ŌĆö Process registry and execution environment\n- **`librefang-channels`** ŌĆö Channel adapter implementations (Telegram, Discord, Matrix, etc.)\n- **`librefang-skills`** ŌĆö Skill/plugin loading and execution\n- **`librefang-extensions`** ŌĆö Extension system\n- **`librefang-memory`** ŌĆö Persistent agent memory\n- **`librefang-migrate`** ŌĆö Database migration runner\n- **`librefang-types`** ŌĆö Shared type definitions\n\n## Contributing\n\nWhen adding a new dependency or channel adapter, consider whether it should be behind a feature flag. Heavy or platform-specific dependencies (crypto libraries, async runtimes for specific protocols, native TLS stacks) should be gated to avoid slowing down the default developer build.","other-librefang-desktop-capabilities":"# Other ŌĆö librefang-desktop-capabilities\n\n# librefang-desktop-capabilities\n\n## Overview\n\nThis module defines the **Tauri capability configurations** for LibreFang. Capabilities are a core Tauri security mechanism ŌĆö they declare which plugins and core APIs the application is allowed to use, which windows they apply to, and which platforms they target. Without an explicit capability entry, a Tauri plugin API is blocked at runtime.\n\nThe module contains two capability files that split permissions by platform family:\n\n| File | Target Platforms |\n|---|---|\n| `default.json` | macOS, Windows, Linux |\n| `mobile.json` | iOS, Android |\n\n## Why Two Files?\n\nSeveral Tauri plugins bundled in LibreFang are **desktop-only** ŌĆö they have no implementation on mobile operating systems. Including their permissions in a mobile capability would cause build failures or runtime errors. The split ensures each platform family only references plugins that are actually compiled into its binary.\n\n**Desktop-only plugins excluded from mobile:**\n- `shell` ŌĆö process spawning\n- `global-shortcut` ŌĆö system-wide hotkeys\n- `autostart` ŌĆö login-item / launch-at-login\n- `updater` ŌĆö in-app update flow\n\n## Capability Structure\n\nEvery capability file shares the same Tauri schema:\n\n```json\n{\n  \"$schema\": \"https://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json\",\n  \"identifier\": \"<unique-name>\",\n  \"description\": \"<human-readable summary>\",\n  \"windows\": [\"main\"],\n  \"platforms\": [\"...\"],\n  \"permissions\": [\"...\"]\n}\n```\n\n| Field | Purpose |\n|---|---|\n| `$schema` | JSON Schema for IDE validation and autocomplete |\n| `identifier` | Unique name referenced by Tauri at build time |\n| `description` | Human-readable documentation of the capability's intent |\n| `windows` | Which webview windows these permissions apply to (`main` is the primary window) |\n| `platforms` | OS targets ŌĆö Tauri ignores the capability on non-matching platforms |\n| `permissions` | Ordered list of permission identifiers granted to the window |\n\n## Permission Reference\n\n### Desktop (`default.json`)\n\n| Permission | Plugin | Grants |\n|---|---|---|\n| `core:default` | Tauri core | Standard core APIs (window management, events, etc.) |\n| `notification:default` | `notification` | Sending OS-level notifications |\n| `shell:default` | `shell` | Spawning child processes and executing shell commands |\n| `dialog:default` | `dialog` | Native file pickers, message dialogs |\n| `global-shortcut:allow-register` | `global-shortcut` | Registering a system-wide keyboard shortcut |\n| `global-shortcut:allow-unregister` | `global-shortcut` | Removing a previously registered shortcut |\n| `global-shortcut:allow-is-registered` | `global-shortcut` | Querying whether a shortcut is currently registered |\n| `autostart:default` | `autostart` | Launching the app at user login |\n| `updater:default` | `updater` | Checking for and applying in-app updates |\n\n### Mobile (`mobile.json`)\n\n| Permission | Plugin | Grants |\n|---|---|---|\n| `core:default` | Tauri core | Standard core APIs |\n| `notification:default` | `notification` | Push / local notifications |\n| `dialog:default` | `dialog` | Native dialogs (alerts, action sheets) |\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Tauri Security Layer\n        Cap[\"Capabilities Module\"]\n    end\n\n    subgraph Desktop Plugins\n        Core[\"core:default\"]\n        Notif[\"notification:default\"]\n        Shell[\"shell:default\"]\n        Dialog[\"dialog:default\"]\n        GS[\"global-shortcut:*\"]\n        Auto[\"autostart:default\"]\n        Up[\"updater:default\"]\n    end\n\n    subgraph Mobile Plugins\n        MCore[\"core:default\"]\n        MNotif[\"notification:default\"]\n        MDialog[\"dialog:default\"]\n    end\n\n    Cap -->|\"default.json\"| Desktop Plugins\n    Cap -->|\"mobile.json\"| Mobile Plugins\n```\n\n## How to Add a New Permission\n\n1. **Identify the plugin** ŌĆö find its permission identifier in the plugin's documentation (e.g., `fs:allow-read`).\n2. **Determine platform support** ŌĆö check whether the plugin is available on mobile.\n3. **Add to the correct file**:\n   - Desktop-supported ŌåÆ add to `default.json` `permissions` array.\n   - Mobile-supported ŌåÆ add to `mobile.json` `permissions` array as well.\n   - Desktop-only ŌåÆ add only to `default.json`.\n4. **Validate** ŌĆö the `$schema` field enables IDE validation. Run `cargo tauri build` or `cargo tauri dev` to confirm no permission errors.\n\n> **Warning:** Over-granting permissions weakens the security model. Always request the narrowest permission set (e.g., prefer `global-shortcut:allow-register` over `global-shortcut:allow-all` when only registration is needed).\n\n## Relationship to the Rest of the Codebase\n\nThis module is **purely declarative** ŌĆö it contains no executable code and defines no functions. It is consumed by the Tauri build system at compile time:\n\n1. **Build time** ŌĆö Tauri reads all files under `capabilities/`, resolves the permission tree, and generates a capability snapshot embedded in the binary.\n2. **Runtime** ŌĆö when frontend code or a Rust backend handler calls a plugin API, Tauri checks the snapshot before allowing the call. Unlisted permissions are rejected with a capability error.\n\nPlugin initialization code in the application (Rust-side `Builder::plugin(...)` calls and frontend JavaScript imports) will silently fail or error if the corresponding capability permission is missing. Keep permissions in sync with the actual plugins registered in the app builder.","other-librefang-desktop-gen":"# Other ŌĆö librefang-desktop-gen\n\n# librefang-desktop-gen\n\nAuto-generated Tauri build output containing platform scaffolding and security permission schemas for the LibreFang desktop application. This directory is managed by the Tauri CLI and should not be hand-edited unless you are intentionally modifying the capability/permission configuration.\n\n## Directory Structure\n\n```\ngen/\nŌö£ŌöĆŌöĆ android/              # Android project scaffold (populated by `cargo tauri android init`)\nŌöé   ŌööŌöĆŌöĆ README.md\nŌö£ŌöĆŌöĆ apple/                # Apple (iOS/macOS) project scaffold (populated by `cargo tauri ios init`)\nŌöé   ŌööŌöĆŌöĆ README.md\nŌööŌöĆŌöĆ schemas/\n    Ōö£ŌöĆŌöĆ acl-manifests.json    # Full catalog of every plugin permission\n    Ōö£ŌöĆŌöĆ capabilities.json     # Active capability grants for this app\n    ŌööŌöĆŌöĆ desktop-schema.json   # JSON Schema for validating capability files\n```\n\n## Platform Scaffolding\n\n### Android\n\nPopulated by running `cargo tauri android init` from `crates/librefang-desktop/`. Generates the Gradle-based Android project wrapping the Tauri webview.\n\n### Apple\n\nPopulated by running `cargo tauri ios init` from `crates/librefang-desktop/` (macOS only). Generates the Xcode project for iOS builds.\n\nBoth directories start as stub README files and are filled in by the Tauri CLI during platform initialization.\n\n## Security Model\n\nLibreFang uses Tauri's capability-based security system. The webview frontend has zero access to native APIs unless explicitly granted through a capability. This is enforced at build time via the schemas in this directory.\n\n### How Capabilities Work\n\n```mermaid\nflowchart LR\n    A[capabilities.json] -->|defines| B[Capability]\n    B -->|targets| C[Window Label]\n    B -->|targets| D[Platform]\n    B -->|grants| E[Permission List]\n    E -->|references| F[acl-manifests.json]\n    F -->|resolves| G[Plugin Commands]\n```\n\nEach capability specifies:\n- **`identifier`** ŌĆö unique name for the capability\n- **`windows`** ŌĆö which app windows receive these permissions (glob patterns supported)\n- **`platforms`** ŌĆö which OS targets the capability applies to\n- **`permissions`** ŌĆö list of granted permission identifiers\n- **`local`** ŌĆö whether locally-served content can use these permissions (default `true`)\n\n### Active Capabilities\n\nThe app defines two capabilities in `capabilities.json`:\n\n#### `default` ŌĆö Desktop Platforms\n\n| Field | Value |\n|-------|-------|\n| Windows | `main` |\n| Platforms | macOS, Windows, Linux |\n\nGranted permissions:\n- `core:default` ŌĆö all standard Tauri core plugins (path, event, window, webview, app, image, resources, menu, tray)\n- `notification:default` ŌĆö full notification API\n- `shell:default` ŌĆö `shell:allow-open` (opens `http(s)://`, `tel:`, `mailto:` links)\n- `dialog:default` ŌĆö message, save, and open dialogs\n- `global-shortcut:allow-register`\n- `global-shortcut:allow-unregister`\n- `global-shortcut:allow-is-registered`\n- `autostart:default` ŌĆö enable, disable, and query auto-start on boot\n- `updater:default` ŌĆö check, download, and install updates\n\n#### `mobile` ŌĆö iOS / Android\n\n| Field | Value |\n|-------|-------|\n| Windows | `main` |\n| Platforms | iOS, Android |\n\nGranted permissions:\n- `core:default`\n- `notification:default`\n- `dialog:default`\n\nDesktop-only plugins (shell, global-shortcut, autostart, updater) are excluded from mobile builds.\n\n## Permission Reference\n\nAll available permissions are cataloged in `acl-manifests.json`. Below is a summary of the plugin groups used by LibreFang.\n\n### Core Plugins (`core:default`)\n\nThe `core:default` permission set aggregates defaults for all core subsystems:\n\n| Plugin | Default Grants |\n|--------|---------------|\n| `core:path` | resolve, resolve-directory, normalize, join, dirname, extname, basename, is-absolute |\n| `core:event` | listen, unlisten, emit, emit-to |\n| `core:window` | read-only window queries (position, size, state) + internal-toggle-maximize |\n| `core:webview` | get-all-webviews, webview-position, webview-size, internal-toggle-devtools |\n| `core:app` | version, name, tauri-version, identifier, bundle-type, listener registration |\n| `core:image` | new, from-bytes, from-path, rgba, size |\n| `core:resources` | close |\n| `core:menu` | full menu CRUD and manipulation |\n| `core:tray` | full tray icon management |\n\n### Shell Plugin\n\n`shell:default` only grants `allow-open`, which opens URLs in the system browser. The shell scope schema in `desktop-schema.json` supports configuring allowed commands with argument validation via regex, but LibreFang does not use this ŌĆö only URL opening is permitted.\n\n### Notification Plugin\n\n`notification:default` grants the full notification API: permission checks, sending notifications, managing channels (Android), canceling, and batching.\n\n### Dialog Plugin\n\n`dialog:default` grants `allow-message`, `allow-save`, and `allow-open`.\n\n### Global Shortcut Plugin\n\nNo default set. LibreFang explicitly grants three permissions:\n- `global-shortcut:allow-register`\n- `global-shortcut:allow-unregister`\n- `global-shortcut:allow-is-registered`\n\n### Autostart Plugin\n\n`autostart:default` grants `allow-enable`, `allow-disable`, `allow-is-enabled` for managing boot-time auto-start.\n\n### Updater Plugin\n\n`updater:default` grants `allow-check`, `allow-download`, `allow-install`, `allow-download-and-install`.\n\n## Modifying Permissions\n\nTo add or restrict a permission:\n\n1. Edit `capabilities.json` to add or remove permission identifiers from the relevant capability.\n2. The build will validate your changes against `desktop-schema.json` and `acl-manifests.json`.\n3. Permission identifiers follow the format `plugin-name:permission-name` (e.g., `dialog:allow-open`). Core plugins use a two-segment prefix (e.g., `core:window:allow-center`).\n\nPermissions can be simple strings or objects with scoped `allow`/`deny` arrays. The shell plugin is the primary example supporting scoped entries, where you can restrict which commands and arguments the webview can invoke.\n\n## Regenerating\n\nThis directory is regenerated by the Tauri CLI during builds. To regenerate manually:\n\n```bash\n# From crates/librefang-desktop/\ncargo tauri build          # regenerates schemas\ncargo tauri android init   # populates android/\ncargo tauri ios init       # populates apple/ (macOS only)\n```\n\nThe `schemas/` directory is overwritten on each build based on the app's `tauri.conf.json` and any capability files in the source tree. The platform directories are only populated by the respective init commands.","other-librefang-desktop":"# Other ŌĆö librefang-desktop\n\n# librefang-desktop\n\nNative desktop and mobile application for the LibreFang Agent OS, built on Tauri 2.0. Provides the system tray, bundled HTTP server, auto-updater, and a thin mobile client that connects to a remote daemon.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph Desktop\n        UI[WebView UI] --> |Tauri IPC| Kernel[librefang-kernel]\n        Kernel --> API[librefang-api HTTP server]\n        Kernel --> Ext[librefang-extensions]\n    end\n    subgraph Mobile\n        MUI[Mobile WebView] --> |HTTP/WS| Remote[Remote librefang daemon]\n    end\n    subgraph Shared\n        Types[librefang-types]\n    end\n    Kernel --> Types\n    API --> Types\n```\n\nOn **desktop**, the Tauri binary embeds the full LibreFang runtime ŌĆö kernel, API server, and extensions all run in-process. The WebView communicates with the Rust backend through Tauri's IPC bridge.\n\nOn **mobile**, the app is a thin dashboard client. It connects over HTTP/WebSocket to a remote `librefang` daemon running on a server, NAS, or desktop machine. This is by design: cron jobs, autodream, channel adapters, and triggers require 24├Ś7 uptime, which iOS and Android cannot guarantee in the background.\n\n## Platform Targets\n\n| Target | Identifier | Tray | Autostart | Updater | Shell |\n|--------|-----------|------|-----------|---------|-------|\n| macOS (`x86_64`, `aarch64`) | `ai.librefang.desktop` | Ō£ģ always | Ō£ģ | Ō£ģ | Ō£ģ |\n| Windows | `ai.librefang.desktop` | Ō£ģ always | Ō£ģ | Ō£ģ | Ō£ģ |\n| Linux desktop | `ai.librefang.desktop` | ŌÜĀ’ĖÅ opt-in | Ō£ģ | Ō£ģ | Ō£ģ |\n| iOS | `ai.librefang.app` | ŌĆö | ŌĆö | ŌĆö | ŌĆö |\n| Android | `ai.librefang.app` | ŌĆö | ŌĆö | ŌĆö | ŌĆö |\n\n### Desktop-only plugins (compiled out on mobile)\n\nThese are gated by `cfg(not(any(target_os = \"ios\", target_os = \"android\")))`:\n\n- **`tauri-plugin-single-instance`** ŌĆö prevents multiple app instances\n- **`tauri-plugin-autostart`** ŌĆö launch at login\n- **`tauri-plugin-global-shortcut`** ŌĆö system-wide hotkeys\n- **`tauri-plugin-updater`** ŌĆö in-app updates with public key verification\n- **`tauri-plugin-shell`** ŌĆö CLI process spawning\n\n### Mobile-only plugins\n\n- **`tauri-plugin-barcode-scanner`** ŌĆö QR code scanning for the connection wizard\n- **`keyring`** ŌĆö secure credential storage via platform keystores\n\n## Cargo Features\n\n| Feature | Default | Description |\n|---------|---------|-------------|\n| `default` | Ō£ģ | Mirrors `librefang-api/default` (all stable channels) |\n| `all-channels` | ŌĆö | Enables all channel adapters including experimental ones |\n| `mini` | ŌĆö | Minimal channel set via `librefang-api/mini` |\n| `custom-protocol` | ŌĆö | Production Tauri builds (`tauri/custom-protocol`) |\n| `mobile` | ŌĆö | No-op documentation flag; mobile targets are `cfg`-gated |\n| `linux-tray` | ŌĆö | Re-enables system tray on Linux (see below) |\n| `mobile-no-email` | ŌĆö | Excludes `channel-email` for Android builds |\n\n### The `linux-tray` feature and GTK3 advisory\n\nTauri 2.10's `tray-icon` feature on Linux pulls `libappindicator-rs 0.9`, which transitively depends on 8 unmaintained GTK3 crates (RUSTSEC-2024-0411 through RUSTSEC-0420) plus a `glib` unsoundness issue (RUSTSEC-2024-0429).\n\nThe default Linux build **does not include the system tray** to keep headless/CI builds clean. To opt in:\n\n```bash\ncargo build --features linux-tray\n```\n\nThis accepts the audit advisories until Tauri migrates to `tray-icon 0.22+`/ksni. Tracked in #3667.\n\nOn macOS and Windows the tray is always enabled ŌĆö those platforms use native APIs (`NSStatusItem` / `Shell_NotifyIconW`) with no GTK involvement.\n\n### The `mobile-no-email` feature\n\nThe `channel-email` adapter depends on `rustls-connector 0.23.0`, which pulls `rustls-platform-verifier 0.7.0`. Its `Verifier::new_with_extra_roots` is not implemented for the Android target, causing a compile failure. The `mobile-no-email` feature builds with all channels except email:\n\n```bash\ncargo tauri android build --no-default-features --features mobile-no-email\n```\n\n## Configuration Files\n\nTauri uses a layered configuration system. The base `tauri.conf.json` is merged with platform-specific overlays at build time.\n\n### `tauri.conf.json` ŌĆö base config\n\n- **Product**: LibreFang v26.5.32028\n- **Identifier**: `ai.librefang.desktop`\n- **CSP**: Restricts to `self`, `tauri:`, `ipc:`, `127.0.0.1:*` for HTTP/WS, plus Google Fonts domains\n- **Bundle targets**: all (`.deb`, `.AppImage`, `.dmg`, `.msi`, `.exe`)\n- **macOS minimum**: 12.0\n- **Windows signing**: SHA-256 digest, WebView2 bootstrapper download\n\n### `tauri.desktop.conf.json` ŌĆö desktop overlay\n\nConfigures the auto-updater plugin:\n- Public key for update signature verification\n- Endpoint: `https://github.com/librefang/librefang/releases/latest/download/latest.json`\n- Windows install mode: `passive` (shows progress, no user interaction required)\n\n### `tauri.android.conf.json` ŌĆö Android overlay\n\n- **Identifier**: `ai.librefang.app`\n- **Frontend**: served from `../librefang-api/static/react`\n- **URL scheme**: `lfconnect://localhost/`\n- **Minimum SDK**: API 26 (Android 8.0)\n\n### `tauri.ios.conf.json` ŌĆö iOS overlay\n\n- **Identifier**: `ai.librefang.app`\n- **Frontend**: same React bundle as Android\n- **URL scheme**: `lfconnect://localhost/`\n- **Minimum system version**: iOS 16.0\n\n## Crate Type\n\nThe `[lib]` section produces three outputs:\n\n```toml\ncrate-type = [\"staticlib\", \"cdylib\", \"lib\"]\n```\n\n- **`staticlib`** ŌĆö linked into the native shell by Xcode (iOS)\n- **`cdylib`** ŌĆö loaded by the Tauri mobile runtime (Android)\n- **`lib` (rlib)** ŌĆö normal Rust library for the desktop binary in `src/main.rs`\n\nCargo cannot conditionalize `crate-type` on `cfg(mobile)` at the manifest level, so desktop builds also produce the `staticlib` and `cdylib` outputs. This adds approximately 10ŌĆō20% to clean build times. If desktop build performance becomes a concern, this is a known bottleneck.\n\n## Dependencies\n\nThe crate integrates the full LibreFang stack:\n\n| Crate | Purpose |\n|-------|---------|\n| `librefang-kernel` | Core agent runtime, scheduling, triggers |\n| `librefang-api` | HTTP/WS server serving the React dashboard |\n| `librefang-types` | Shared domain types |\n| `librefang-extensions` | Channel adapters and plugin system |\n\nExternal dependencies include `tokio` (async runtime), `axum` (HTTP framework), `reqwest` (HTTP client), `clap` (CLI argument parsing), `tracing` (structured logging), and `toml`/`serde_json` for configuration serialization.\n\n## Build Process\n\n`build.rs` delegates entirely to `tauri_build::build()`, which:\n1. Reads and merges the layered Tauri configuration files\n2. Generates Rust bindings for Tauri IPC commands\n3. Produces platform-specific build artifacts\n\nFor development:\n\n```bash\n# Desktop\ncargo tauri dev\n\n# Android emulator (after `cargo tauri android init`)\ncargo tauri android dev\n\n# iOS Simulator (macOS only, after `cargo tauri ios init`)\ncargo tauri ios dev\n```\n\nFor production builds:\n\n```bash\ncargo tauri build                           # desktop\ncargo tauri build --features custom-protocol  # with custom protocol handler\n```\n\n## Mobile Deep Dive\n\nSee `MOBILE.md` in this directory for full mobile development documentation including:\n- Android NDK/SDK requirements\n- Xcode setup for iOS\n- Scaffold generation (`gen/android/`, `gen/apple/`)\n- Release pipeline details (`.aab`, `.apk`, `.ipa`)\n- TestFlight and Play Internal Testing upload workflows\n\nMinimum OS versions:\n\n| Platform | Minimum |\n|----------|---------|\n| iOS | 16.0 |\n| Android | API 26 (Android 8.0) |\n\n## Related Issues\n\n- Epic: #3351\n- System tray / GTK3 advisory: #3667\n- Mobile scaffold: #3342\n- Mobile UX: #3343\n- Connection wizard + QR: #3344\n- CI build jobs: #3345\n- Distribution: #3348","other-librefang-extensions":"# Other ŌĆö librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang, providing three core capabilities: one-click MCP (Model Context Protocol) server setup, a secure credential vault, and OAuth2 PKCE authentication flows.\n\n## Purpose\n\nThis crate centralizes all \"external-facing\" integration concerns that LibreFang needs to interact with third-party services and tooling. Rather than scattering credential management, server provisioning, and auth flows across the codebase, `librefang-extensions` provides a unified, well-tested surface for:\n\n- **Storing and retrieving secrets** through an OS-native keyring with a transparent encrypted-file fallback.\n- **Bootstrapping MCP servers** with minimal user interaction (\"one-click\" setup).\n- **Completing OAuth2 authorization code flows with PKCE**, handling the cryptographic challenge construction and token exchange.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph librefang-extensions\n        Vault[Credential Vault]\n        MCP[MCP Server Setup]\n        OAuth[OAuth2 PKCE]\n    end\n\n    Vault -->|encrypted at rest| FileStore[File-based Store]\n    Vault -->|when available| OSKeyring[OS Keyring]\n    Vault -->|key derivation| Argon2[\"Argon2 ŌåÆ AES-256-GCM\"]\n    OSKeyring -.->|libsecret / Keychain / Credential Manager| Platform[Platform Backend]\n\n    OAuth -->|PKCE challenge| SHA256[SHA-256 + Base64url]\n    OAuth -->|token exchange| HTTP[reqwest HTTP Client]\n\n    MCP --> Types[librefang-types]\n    Vault --> Types\n    OAuth --> Types\n```\n\nAll three subsystems depend on `librefang-types` for shared data structures and error types, keeping the interface consistent with the rest of the LibreFang ecosystem.\n\n## Key Components\n\n### Credential Vault\n\nThe vault (`vault.rs`) provides secure, persistent storage for tokens, API keys, and other secrets. It uses a dual-backend strategy:\n\n1. **OS Keyring** (preferred) ŌĆö When compiled for a supported target, secrets are stored in the platform's native credential store:\n   - **macOS**: Keychain\n   - **Windows**: Credential Manager\n   - **Linux (glibc)**: libsecret\n\n2. **AES-256-GCM File Store** (fallback) ŌĆö When no OS keyring backend is available (e.g., musl-static or Android cross builds), the vault transparently falls back to an encrypted file stored on disk.\n\n**Key derivation**: Master keys are derived from a user-provided passphrase using Argon2, then used to encrypt individual entries with AES-256-GCM. The `zeroize` crate ensures key material is cleared from memory after use.\n\n**Concurrent access**: The vault uses `DashMap` for lock-free concurrent reads and writes, safe for use across async tasks.\n\n### MCP Server Setup\n\nOne-click provisioning of MCP (Model Context Protocol) servers. Handles server configuration discovery, setup orchestration, and integration with LibreFang's runtime. Configuration is serialized via `serde_json` and/or `toml` depending on the server's expected format.\n\n### OAuth2 PKCE\n\nImplements the OAuth2 Authorization Code flow with Proof Key for Code Exchange (RFC 7636):\n\n1. Generates a cryptographically random code verifier using `rand`.\n2. Derives the code challenge via SHA-256 hash and Base64url encoding (`sha2` + `base64`).\n3. Spins up a local HTTP listener using `axum` to capture the authorization callback.\n4. Exchanges the authorization code for tokens via `reqwest`, authenticating the request with the PKCE code verifier.\n5. Stores the resulting tokens in the credential vault.\n\nHMAC is available for token signature verification where needed, with constant-time comparison via `subtle` to prevent timing attacks.\n\n## Platform Considerations\n\nThe OS keyring dependency is **target-gated** to avoid build failures on platforms without a usable backend:\n\n```toml\n[target.'cfg(any(\n    all(target_os = \"linux\", not(target_env = \"musl\")),\n    target_os = \"macos\",\n    target_os = \"windows\"\n))'.dependencies]\nkeyring = { workspace = true }\n```\n\n| Target | OS Keyring | Fallback |\n|---|---|---|\n| Linux (glibc) | libsecret | ŌĆö |\n| Linux (musl) | *not compiled* | AES-256-GCM file |\n| macOS | Keychain | ŌĆö |\n| Windows | Credential Manager | ŌĆö |\n| Android | *not compiled* | AES-256-GCM file |\n\nThe vault detects at compile time which backends are available and selects automatically ŌĆö no feature flags or runtime configuration needed.\n\n## TLS\n\nOutbound HTTP requests (token exchange, MCP server communication) use `reqwest` backed by `rustls` with both `webpki-roots` and `rustls-native-certs` for certificate verification, ensuring compatibility across environments without depending on OpenSSL.\n\n## Integration with LibreFang\n\n```\nlibrefang-types       ŌåÉ shared types, error definitions\nlibrefang-extensions  ŌåÉ this crate\nlibrefang-runtime     ŌåÉ used in dev-dependencies for integration tests\n```\n\nOther LibreFang crates consume this module's public API to:\n- Retrieve stored credentials when connecting to services.\n- Provision MCP servers during workspace setup.\n- Kick off OAuth2 flows when a user authorizes a third-party integration.\n\n## Testing\n\nThe crate uses `tempfile` for isolated vault tests and `serial_test` to prevent parallel test interference with shared resources (filesystem, keyring). Integration tests pull in `librefang-runtime` to verify end-to-end flows.","other-librefang-hands":"# Other ŌĆö librefang-hands\n\n# librefang-hands\n\nCurated autonomous capability packages for the LibreFang system.\n\n## Overview\n\nIn LibreFang, a **Hand** is a self-contained, declaratively-defined capability package ŌĆö a unit of autonomous behavior that can be loaded, validated, and dispatched at runtime. `librefang-hands` provides the data structures, loading logic, and concurrent registry for managing these packages.\n\nHands are the bridge between static configuration and runtime execution. Each hand describes *what* it can do and *what it needs*, while the runtime decides *when* to invoke it.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[TOML Config Files] -->|parse| B[Hand Definition]\n    B -->|validate| C[Hand Registry]\n    C -->|lookup| D[Runtime Dispatcher]\n    B --> E[HandManifest]\n    B --> F[HandMetadata]\n    G[librefang-types] -->|shared types| B\n```\n\n## Key Concepts\n\n### Hand\n\nA hand encapsulates a discrete capability ŌĆö for example, a network probing task, a file analysis routine, or a notification action. Each hand is identified by a unique `uuid` and carries metadata describing its purpose, version, and requirements.\n\n### Hand Manifest\n\nEvery hand is defined by a **manifest**, typically authored in TOML. The manifest declares:\n\n- **Identity** ŌĆö name, version, unique ID, and description\n- **Capabilities** ŌĆö what operations this hand can perform\n- **Requirements** ŌĆö runtime dependencies or environmental constraints\n- **Configuration schema** ŌĆö accepted parameters and their types\n\nThe `toml` and `serde` dependencies handle deserialization of these manifests into structured Rust types.\n\n### Hand Registry\n\nThe module maintains a thread-safe registry of loaded hands, backed by `dashmap`. This allows concurrent registration and lookup without external locking, which is critical in an asynchronous runtime where multiple tasks may query available hands simultaneously.\n\n## Dependencies & Integration\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions (hand IDs, status enums, capability descriptors) used across all LibreFang crates |\n| `serde` / `serde_json` / `toml` | Serialization framework for manifest parsing and hand state persistence |\n| `thiserror` | Ergonomic error types for manifest validation and registry operations |\n| `tracing` | Structured logging for hand lifecycle events (loading, validation failures, registration) |\n| `uuid` | Unique identifiers for each hand instance |\n| `chrono` | Timestamps for hand registration, last-used tracking, and expiration |\n| `dashmap` | Lock-free concurrent map powering the hand registry |\n\n### Relationship to Other Crates\n\n- **`librefang-types`** ŌĆö This crate consumes shared types but does not depend on the runtime directly (except in tests via `librefang-runtime`).\n- **`librefang-runtime`** ŌĆö Consumes hands from the registry at execution time. The runtime is a dev-dependency here, used only in integration tests to verify that hands load and resolve correctly end-to-end.\n- Downstream consumers should depend on `librefang-hands` to define or inspect hands, and on `librefang-runtime` to execute them.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover the hand lifecycle:\n\n- **Parse errors** ŌĆö Malformed TOML manifests, missing required fields, type mismatches during deserialization.\n- **Validation errors** ŌĆö Hands that fail structural or semantic validation (e.g., conflicting capabilities, invalid parameter schemas).\n- **Registry errors** ŌĆö Duplicate registration, lookup failures, or concurrent modification issues.\n\nAll errors are traceable via `tracing` spans, which emit structured diagnostics at the point of failure.\n\n## Testing\n\nThe test suite uses:\n\n- **`tempfile`** ŌĆö Creates isolated temporary directories for testing manifest loading from disk without polluting the filesystem.\n- **`serial_test`** ŌĆö Serializes tests that share registry state, preventing race conditions in global or shared registries.\n- **`librefang-runtime`** ŌĆö Integration tests that verify end-to-end hand loading and runtime resolution.\n\nTo run the tests:\n\n```bash\ncargo test -p librefang-hands\n```\n\n## Usage Patterns\n\n### Defining a Hand via TOML\n\nHands are typically defined in `.toml` files following the manifest schema. The hand is then loaded, validated, and inserted into the registry.\n\n### Looking Up a Hand\n\nConsumers query the registry by ID or capability to retrieve a hand definition, which the runtime then uses to dispatch execution.\n\n### Registering Hands Programmatically\n\nIn addition to TOML loading, hands can be constructed and registered directly in code ŌĆö useful for built-in system hands or dynamically generated capabilities.\n\n---\n\n*This crate is part of the LibreFang workspace. See the workspace root for build instructions and overall architecture documentation.*","other-librefang-http":"# Other ŌĆö librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing a pre-configured `reqwest` client with proxy support and TLS certificate fallback logic for the LibreFang project.\n\n## Purpose\n\nRather than each crate in the workspace constructing its own `reqwest::Client` with ad-hoc TLS and proxy configuration, this module centralizes that logic into a single reusable builder. Any workspace member that needs to make outbound HTTP requests should depend on this crate and use the client it produces.\n\n## Key Design Decisions\n\n### Pure-Rust TLS via rustls\n\nThis module uses **rustls** instead of native-tls/openssl. This means:\n\n- No system OpenSSL dependency ŌĆö simpler cross-compilation and static builds.\n- Certificate verification is handled entirely in Rust.\n\n### Dual Certificate Loading (Fallback Strategy)\n\nThe module depends on both `webpki-roots` and `rustls-native-certs`, which enables a fallback strategy for TLS root certificates:\n\n1. **Attempt to load native system certificates** via `rustls-native-certs` ŌĆö these are the CA certificates installed on the host OS (e.g., `/etc/ssl/certs` on Linux, the Windows certificate store, or the Keychain on macOS).\n2. **Fall back to Mozilla's WebPKI root bundle** via `webpki-roots` if native certificate loading fails or produces an empty set ŌĆö this ensures the client works in minimal environments (scratch containers, minimal Docker images) where no system CA store is present.\n\n### Proxy Support\n\nThe underlying `reqwest` client is configured to respect standard proxy environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`, etc.) through reqwest's built-in proxy handling. This allows the operator to route LibreFang's outbound HTTP traffic through a corporate proxy or network egress point without code changes.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Calling crate] -->|requests client| B[librefang-http]\n    B -->|builds| C[reqwest::Client]\n    B -->|configures TLS with| D[rustls]\n    D -->|try first| E[rustls-native-certs]\n    E -->|empty or error| F[webpki-roots fallback]\n    C -->|respects| G[Proxy env vars]\n    A -->|uses client for| H[Outbound HTTP requests]\n```\n\n## Dependency Interactions\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shares type definitions across the workspace; this module may reference configuration types or error types defined there. |\n| `reqwest` | The underlying HTTP client. This module configures and exposes a `reqwest::Client` (or `ClientBuilder`) for consumers. |\n| `rustls` | Provides the `ClientConfig` used to construct a TLS backend for reqwest. |\n| `rustls-native-certs` | Loads the host system's root CA certificates into the rustls configuration. |\n| `webpki-roots` | Ships Mozilla's curated root CA bundle as a static fallback. |\n| `tracing` | Emits structured log events (e.g., warnings when native cert loading fails and fallback is activated). |\n\n## Usage by Other Crates\n\nConsumers add this crate as a dependency and call its builder/client constructor to obtain a ready-to-use `reqwest::Client`. The returned client comes pre-configured with appropriate TLS roots and proxy awareness, so callers simply use standard reqwest methods (`get`, `post`, etc.) without worrying about transport-layer setup.\n\nNo execution flows were detected originating from or terminating in this module ŌĆö it is a pure utility library that produces a configured client and returns it to the caller. All request execution happens in the consuming crate.","other-librefang-kernel-handle-tests":"# Other ŌĆö librefang-kernel-handle-tests\n\n# librefang-kernel-handle Tests\n\nIntegration tests that verify the **default method implementations** on the `KernelHandle` trait. The `KernelHandle` trait provides default behaviors for convenience methods, approval flows, ACLs, cron scheduling, and configuration ŌĆö these tests ensure those defaults remain stable and correct.\n\n## Test Organization\n\nThree test files, each covering a distinct category of default behavior:\n\n| File | Focus |\n|---|---|\n| `defaults_approval.rs` | Approval gating defaults (auto-approve, no denials) |\n| `defaults_delegation.rs` | Delegation from convenience methods to core trait methods |\n| `defaults_returns.rs` | Default return values for ACL, cron, timeout, workspace config |\n\n## Testing Strategy\n\nAll three files share the same approach: implement `KernelHandle` with minimal stubs for the **required** methods, then call the **provided (default)** methods and assert their behavior. This proves the trait's default implementations work independently of any real kernel backend.\n\nA typical stub struct (e.g., `NoopKernelHandle`) returns `Err(\"not implemented\")` or empty collections for every required method, since the tests never invoke those paths directly.\n\n## Approval Defaults (`defaults_approval.rs`)\n\nUses `NoopKernelHandle` to verify that when no approval policy is configured, the system is permissive:\n\n| Test | Method | Expected Default |\n|---|---|---|\n| `test_request_approval_default_auto_approves` | `request_approval(agent_id, tool, summary, None)` | `Ok(ApprovalDecision::Approved)` |\n| `test_is_tool_denied_with_context_default_false` | `is_tool_denied_with_context(tool, sender, channel)` | `false` |\n| `test_requires_approval_default_false` | `requires_approval(tool)` | `false` |\n\nThese defaults mean that a bare `KernelHandle` implementation without overridden approval methods will allow all tool usage without human-in-the-loop gating.\n\n## Delegation Defaults (`defaults_delegation.rs`)\n\nVerifies that convenience methods on the trait delegate to the correct core methods. Each test uses an `AtomicBool` flag inside the stub struct to confirm the underlying method was actually called.\n\n```mermaid\nflowchart LR\n    A[\"send_to_agent_as()\"] -->|delegates to| B[\"send_to_agent()\"]\n    C[\"spawn_agent_checked()\"] -->|delegates to| D[\"spawn_agent()\"]\n    E[\"requires_approval_with_context()\"] -->|delegates to| F[\"requires_approval()\"]\n```\n\n| Test | Stub Struct | Delegation Verified |\n|---|---|---|\n| `test_send_to_agent_as_delegates_to_send_to_agent` | `TrackingSendHandle` | `send_to_agent_as` ŌåÆ `send_to_agent` |\n| `test_spawn_agent_checked_delegates_to_spawn_agent` | `TrackingSpawnHandle` | `spawn_agent_checked` ŌåÆ `spawn_agent` |\n| `test_requires_approval_with_context_delegates_to_requires_approval` | `TrackingApprovalHandle` | `requires_approval_with_context` ŌåÆ `requires_approval` |\n\nThe delegation pattern is important: implementors only need to override the core method (`send_to_agent`, `spawn_agent`, `requires_approval`), and the context-aware variant (`send_to_agent_as`, `spawn_agent_checked`, `requires_approval_with_context`) automatically picks up the behavior. This keeps the trait implementation surface small.\n\n## Return Value Defaults (`defaults_returns.rs`)\n\nTests the remaining default implementations using `NoopKernelHandle`:\n\n### User Policy and ACL\n\n| Test | Method | Expected Default |\n|---|---|---|\n| `test_resolve_user_tool_decision_default_allow` | `resolve_user_tool_decision(tool, sender, channel)` | `UserToolGate::Allow` |\n| `test_memory_acl_for_sender_default_none` | `memory_acl_for_sender(sender, channel)` | `None` |\n\n### Cron Scheduling\n\n`test_cron_defaults_return_errors` confirms all three cron methods return an error containing `\"Cron scheduler not available\"`:\n\n- `cron_create(agent, config)` ŌåÆ `Err`\n- `cron_list(agent)` ŌåÆ `Err`\n- `cron_cancel(job_id)` ŌåÆ `Err`\n\nThis ensures that implementors who don't override cron methods get a clear, descriptive error rather than a panic or silent failure.\n\n### Configuration Constants\n\n| Test | Method | Expected Default |\n|---|---|---|\n| `test_tool_timeout_defaults` | `tool_timeout_secs()` / `tool_timeout_secs_for(tool)` | `120` seconds |\n| `test_max_agent_call_depth_default` | `max_agent_call_depth()` | `5` |\n| `test_workspace_prefix_defaults_empty` | `readonly_workspace_prefixes(agent)` / `named_workspace_prefixes(agent)` | Empty `Vec` |\n\n## Relationship to `KernelHandle`\n\nThese tests live in the `librefang-kernel-handle` crate's test directory because they exercise the **trait's default method bodies** ŌĆö not any particular concrete implementation. The Rust trait system allows default method definitions that call other (required) trait methods. This test suite locks in the contract for those defaults.\n\nWhen adding a new default method to `KernelHandle`, add a corresponding test here following the existing pattern:\n\n1. Either reuse `NoopKernelHandle` (if the test only checks a return value) or create a new tracking struct with `AtomicBool` flags (if the test verifies delegation).\n2. Implement all required `KernelHandle` methods with stubs.\n3. Assert the default method's behavior.","other-librefang-kernel-handle":"# Other ŌĆö librefang-kernel-handle\n\n# librefang-kernel-handle\n\nDefines the `KernelHandle` trait ŌĆö the primary in-process interface for callers that need to interact with the LibreFang kernel.\n\n## Purpose\n\nThis crate provides a stable, trait-based contract between the LibreFang kernel and any in-process caller (drivers, services, test harnesses). By separating the *interface definition* into its own crate, the kernel implementation and its consumers can depend on the trait without creating circular dependencies or pulling in unnecessary implementation details.\n\n## Role in the Architecture\n\n```mermaid\ngraph LR\n    A[Consumer Crate] -->|depends on| H[librefang-kernel-handle]\n    K[Kernel Implementation] -->|implements| H\n    A -.->|uses trait object| K\n```\n\nAny crate that needs to call into the kernel depends on `librefang-kernel-handle` for the trait definition. The kernel crate itself implements the trait and constructs concrete instances that consumers receive (typically via dependency injection or a factory).\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types passed across the trait boundary (commands, events, error types) |\n| `async-trait` | Enables `async` methods in the trait definition |\n| `serde_json` | JSON serialization for message payloads crossing the handle boundary |\n| `tracing` | Structured logging and span instrumentation |\n| `uuid` | Unique identifiers for sessions, requests, or correlation tokens |\n\n## Usage\n\n### Implementing the Trait\n\nA kernel implementation provides a concrete type that satisfies the trait. Because the trait uses `async-trait`, implementors apply `#[async_trait]` to their impl block:\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\nuse async_trait::async_trait;\n\nstruct MyKernel { /* ... */ }\n\n#[async_trait]\nimpl KernelHandle for MyKernel {\n    // ...\n}\n```\n\n### Consuming the Trait\n\nCallers receive the trait (often as `Arc<dyn KernelHandle>` or a generic parameter) and invoke methods without knowing the concrete kernel type:\n\n```rust\nuse librefang_kernel_handle::KernelHandle;\n\nasync fn do_work(kernel: &dyn KernelHandle) {\n    // Call trait methods defined in this crate\n}\n```\n\n### Testing\n\nThe `dev-dependencies` section includes `tokio` with `macros` and `rt` features, indicating that doc tests and unit tests for the trait or mock implementations use the Tokio async runtime. When writing tests against `KernelHandle`, annotate test functions with `#[tokio::test]`.\n\n## Design Notes\n\n- **No execution flows or internal call graph.** This crate contains only trait definitions and possibly default method implementations. There is no runtime logic, no internal state, and no outbound calls to other LibreFang crates at the trait-definition level.\n- **Trait-only crate.** Keeping the interface in a standalone crate enforces a clean boundary. Changes to the kernel's internals do not require recompiling consumers unless the trait signature itself changes.\n- **Serialization boundary.** The presence of `serde_json` suggests that the handle may abstract over a serialization step ŌĆö callers pass structured types, and the handle is responsible for encoding/decoding as needed by the underlying transport or IPC mechanism.","other-librefang-kernel-metering":"# Other ŌĆö librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis module is responsible for tracking resource consumption and enforcing usage quotas within the LibreFang kernel. It provides the accounting layer that ensures callers cannot exceed their allocated budgetsŌĆöwhether those budgets are measured in compute steps, memory allocations, or other finite resources.\n\nThe module is currently in a **scaffolded state**: the package manifest and dependency graph are defined, but no execution flows or call edges have been wired yet. The documentation below describes the intended architecture based on the declared dependencies and package description.\n\n## Intended Role\n\nMetering sits between raw resource consumption and quota enforcement:\n\n- **Metering** ŌĆö measuring how much of a resource has been used.\n- **Quota enforcement** ŌĆö deciding whether a requested operation is allowed given the remaining budget, and rejecting or flagging it when the limit is exceeded.\n\nThis is a cross-cutting concern: any kernel subsystem that consumes finite resources should route through this module so that usage is consistently accounted for.\n\n## Dependencies\n\n| Dependency | Purpose in this module |\n|---|---|\n| `librefang-types` | Shared type definitionsŌĆölikely includes metering-related types such as `Quota`, `UsageReport`, or `ResourceId`. |\n| `librefang-memory` | Memory is a primary resource to meter. This module probably queries or hooks into the memory allocator to track allocation counts or bytes used. |\n| `librefang-runtime` | Access to runtime stateŌĆölikely needed to associate metering data with the current execution context (e.g., which tenant or session is consuming resources). |\n| `serde` | Serialization support for persisting metering snapshots, transmitting usage data over IPC, or encoding quota configurations. |\n\n## Expected Architecture\n\n```mermaid\ngraph TD\n    A[Caller / Kernel subsystem] -->|request operation| B{Metering gate}\n    B -->|check quota| C[Quota store]\n    C -->|remaining budget| B\n    B -->|budget exceeded| D[Reject / signal]\n    B -->|budget available| E[Allow operation]\n    E -->|record usage| F[Usage accumulator]\n    F -->|update| C\n```\n\nThe expected flow is:\n\n1. A kernel subsystem requests to perform a metered operation.\n2. The metering gate checks the caller's remaining quota.\n3. If the budget is exhausted, the request is rejected or a signal is raised.\n4. If the budget allows, the operation proceeds and the actual consumption is recorded back into the usage accumulator.\n\n## Integration Points\n\nWhen implemented, this module is expected to be consumed by:\n\n- **The request dispatch layer** ŌĆö to meter incoming requests before they reach handlers.\n- **Memory allocation paths** ŌĆö to count bytes or allocations against a per-context budget.\n- **Compute-heavy operations** ŌĆö to enforce step or cycle limits on long-running work.\n\n## Status\n\nThis module is **not yet implemented**. The `Cargo.toml` and dependency declarations are in place, but no types, traits, or functions have been defined. Contributions should begin by establishing the core types (quotas, usage counters, resource kinds) and the enforcement API surface.","other-librefang-kernel-router":"# Other ŌĆö librefang-kernel-router\n\n# librefang-kernel-router\n\nHand and template routing engine for the LibreFang kernel. This module is responsible for resolving incoming requests to the correct hand implementation based on configurable routing rules and template matching.\n\n## Overview\n\nLibreFang uses a **hand** abstraction ŌĆö discrete processing units that handle specific categories of input. The router sits at the front of the kernel's request pipeline, examining incoming data and determining which hand (or chain of hands) should process it.\n\nRouting decisions are driven by **templates**: pattern-based rules that match against request attributes. Templates can use literal matching, regex patterns, or structured criteria to classify input.\n\n## Architecture\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé              Incoming Request                    Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n                   Ōöé\n                   Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé            Router                                Ōöé\nŌöé  ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ  ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ  Ōöé\nŌöé  Ōöé Template    ŌöéŌöĆŌ¢ČŌöé Hand Resolution           Ōöé  Ōöé\nŌöé  Ōöé Matching    Ōöé  Ōöé (via librefang-hands)     Ōöé  Ōöé\nŌöé  ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś  ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś  Ōöé\nŌöé  ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉŌöé\nŌöé  Ōöé Route Configuration (TOML)                  ŌöéŌöé\nŌöé  ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöśŌöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n                   Ōöé\n                   Ō¢╝\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé          Target Hand Execution                   Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\n## Dependencies\n\n| Crate | Purpose |\n|-------|---------|\n| `librefang-types` | Shared type definitions for requests, routes, and routing metadata |\n| `librefang-hands` | Hand registry and hand trait implementations |\n| `serde_json` | Deserialization of route definitions stored in JSON format |\n| `regex-lite` | Pattern matching within template rules |\n| `toml` | Parsing route configuration from TOML files |\n| `dirs` | Resolving platform-specific configuration directories |\n| `tracing` | Structured logging of routing decisions and diagnostics |\n\n## Configuration\n\nRoute definitions are loaded from TOML configuration files. The router uses the `dirs` crate to locate platform-appropriate configuration paths (e.g., `~/.config/librefang/` on Linux).\n\nConfiguration defines the mapping between templates and hands. Each route entry specifies:\n\n- A **template pattern** to match against incoming data\n- The **hand identifier** to dispatch to upon match\n- Optional **priority** or **ordering** hints for ambiguous matches\n\n## Routing Process\n\n1. **Load configuration** ŌĆö Parse TOML route definitions at startup.\n2. **Receive request** ŌĆö Accept an incoming request from the kernel pipeline.\n3. **Template evaluation** ŌĆö Match the request against loaded templates using literal and regex-based comparison (`regex-lite`).\n4. **Hand resolution** ŌĆö Use `librefang-hands` to look up the hand implementation associated with the matched template.\n5. **Dispatch** ŌĆö Forward the request to the resolved hand for execution.\n\nAll routing decisions are instrumented with `tracing` spans, enabling runtime diagnostics of which templates matched and why.\n\n## Integration with LibreFang\n\nThis module is a kernel-level component. It consumes types from `librefang-types` and delegates actual request processing to hands provided by `librefang-hands`. The runtime (`librefang-runtime`) is used only in dev-dependencies for integration tests that verify end-to-end routing behavior.\n\n## Testing\n\nTests use `tempfile` to create isolated configuration files, ensuring route loading and matching logic is verified without mutating system config paths.","other-librefang-kernel-tests":"# Other ŌĆö librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and contract tests for the `librefang-kernel` crate. This test suite validates the kernel's public APIs end-to-end: agent lifecycle, hand activation, memory isolation, RBAC policy evaluation, WASM execution, workflow orchestration, audit retention, and the `purge_sentinels` CLI binary.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Infrastructure\"\n        COMMON[common/mod.rs<br>boot_kernel / boot_kernel_with_users]\n        MKB[MockKernelBuilder<br>librefang-testing]\n    end\n\n    subgraph \"Contract Tests (KernelHandle trait)\"\n        BROADER[kernel_handle_contract_broader.rs]\n        CRON[kernel_handle_contract_cron_spawn.rs]\n        MEMORY[kernel_handle_contract_memory.rs]\n        RBAC_CT[kernel_handle_contract_rbac.rs]\n        SPAWN[kernel_handle_contract_spawn_checked.rs]\n        TASK[kernel_handle_contract_task.rs]\n    end\n\n    subgraph \"Feature Tests\"\n        AUDIT[audit_retention_test.rs]\n        INTEGRATION[integration_test.rs]\n        MULTI[multi_agent_test.rs]\n        RBAC_M3[rbac_m3_evaluate_tool_call.rs]\n        WASM[wasm_agent_integration_test.rs]\n        WORKFLOW[workflow_integration_test.rs]\n        PURGE[purge_sentinels_test.rs]\n    end\n\n    COMMON --> BROADER\n    COMMON --> CRON\n    COMMON --> MEMORY\n    COMMON --> RBAC_CT\n    COMMON --> SPAWN\n    COMMON --> TASK\n\n    MKB --> AUDIT\n    MKB --> WASM\n    MKB --> WORKFLOW\n```\n\n## Shared Infrastructure\n\n### `common/mod.rs`\n\nProvides two helper functions used across the `kernel_handle_contract_*` test files:\n\n- **`boot_kernel() -> (LibreFangKernel, TempDir)`** ŌĆö Boots a kernel with no users, network disabled, and a temporary SQLite database. Creates the required directory layout (`data/`, `skills/`, `workspaces/agents/`, `workspaces/hands/`).\n- **`boot_kernel_with_users(users: Vec<UserConfig>) -> (LibreFangKernel, TempDir)`** ŌĆö Same as above but injects user configurations for RBAC tests.\n\nBoth functions return the `TempDir` to keep it alive for the test's duration. The kernel is booted via `LibreFangKernel::boot_with_config`.\n\n### `MockKernelBuilder` (from `librefang-testing`)\n\nUsed by most feature-level tests. Provides a `.with_config(|c| { ... })` hook to customize `KernelConfig` before building. Returns `(LibreFangKernel, TempDir)`.\n\n## Runtime Requirements\n\nSeveral tests require the **multi-threaded Tokio runtime** because `start_background_agents` and other kernel paths call `tokio::task::block_in_place`, which panics on the default current-thread runtime:\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\n```\n\nThe crate-level `#![recursion_limit = \"256\"]` is set in `audit_retention_test.rs` and `workflow_integration_test.rs` because deeply-nested async closures (17 spawned in `start_background_agents`) and complex future layouts exceed the compiler's default recursion limit of 128.\n\n### Environment-dependent tests\n\nTests that call live LLM APIs check for `GROQ_API_KEY` at runtime:\n\n- `integration_test.rs` ŌĆö marked `#[ignore = \"Requires GROQ_API_KEY environment variable\"]`\n- `multi_agent_test.rs::test_six_agent_fleet` ŌĆö early-returns with `eprintln!`\n- `workflow_integration_test.rs::test_workflow_e2e_with_g
