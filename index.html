k`, etc.). Used upstream for provider-specific behaviour like message formatting and tool schema adaptation.\n\n---\n\n## Infrastructure Modules\n\n### `backoff` ŌĆö Jittered Exponential Backoff\n\nProvides retry delay computation with proportional jitter to avoid thundering-herd effects when multiple sessions retry simultaneously.\n\n**Formula:** `delay = max(exp_delay, floor) + jitter`\n\nwhere `exp_delay = min(base ├Ś 2^(attemptŌłÆ1), max_delay)` and `jitter Ōłł [0, jitter_ratio ├Ś base_for_jitter]`.\n\n#### Key Functions\n\n| Function | Use Case |\n|---|---|\n| `jittered_backoff(attempt, base, max, jitter_ratio, floor)` | Fully configurable delay |\n| `standard_retry_delay(attempt, floor)` | Standard LLM retries ŌĆö 2 s base, 60 s cap, 50% jitter |\n| `tool_use_retry_delay(attempt)` | Tool-use failures ŌĆö 1.5 s base, 60 s cap, 50% jitter |\n\nThe `floor` parameter honours server-supplied `Retry-After` headers (capped at 300 s). The random seed combines wall-clock nanoseconds with a process-global Weyl-sequence counter (`JITTER_COUNTER`) so that concurrent calls within the same clock tick still produce diverse delays ŌĆö critical on Windows where clock granularity is ~15 ms.\n\nAll arithmetic is performed in `f64` space and clamped before constructing a `Duration`, avoiding the overflow panic that `Duration::mul_f64` triggers for large exponents.\n\n### `credential_pool` ŌĆö Multi-Key Failover\n\nManages multiple API keys per provider with automatic exhaustion tracking and cooldown.\n\n#### Selection Strategies\n\n| Strategy | Behaviour |\n|---|---|\n| `FillFirst` (default priority ordering) | Always picks the highest-priority available key. Premium keys are exhausted before falling back. |\n| `RoundRobin` (default) | Cycles through available keys in priority order. Distributes load evenly. |\n| `Random` | Picks a random available key using a time-seeded LCG (no `rand` dependency). |\n| `LeastUsed` | Picks the key with the fewest successful `request_count` values. |\n\n#### Lifecycle\n\n```\nacquire() ŌåÆ Option<String>       // Get next available key (cloned)\nmark_success(&key)                // Increment count, clear exhaustion\nmark_exhausted(&key)              // Enter cooldown for DEFAULT_EXHAUSTED_TTL (1 hour)\n```\n\nCredentials are sorted by priority (descending) at construction. Exhausted credentials are excluded from selection until their cooldown expires. Calling `mark_success` on an exhausted key immediately clears the cooldown (early-recovery path).\n\nThe pool is `Send + Sync` behind a single `Mutex`, ensuring the `RoundRobin` index and credential list are always read/written atomically ŌĆö no TOCTOU between reading the index and selecting a credential.\n\n#### `CredentialSnapshot`\n\nThe `snapshot()` method returns redacted diagnostic views (`key_hint: \"****abcd\"`, priority, request_count, is_exhausted) safe for logging and dashboards. Raw API keys are never exposed.\n\n#### `ArcCredentialPool`\n\nA type alias for `Arc<CredentialPool>`. Use `new_arc_pool(keys, strategy)` for a ready-to-share handle.\n\n---\n\n## Provider Drivers\n\n### Anthropic (`drivers/anthropic`)\n\nFull implementation of the Anthropic Messages API (version `2023-06-01`).\n\n**Features:**\n- System prompt extraction from messages or explicit field\n- Prompt caching with `cache_control` markers, respecting the 4-breakpoint-per-request cap\n- Extended thinking (`budget_tokens`) with automatic `max_tokens` adjustment\n- Tool use (content blocks + `ToolCall` extraction)\n- SSE streaming with incremental `TextDelta`, `ThinkingDelta`, `ToolInputDelta`, and `ToolUseEnd` events\n- Automatic retry on 429/529 with `standard_retry_delay`\n- Cross-process rate-limit guard via `shared_rate_guard` (429 lockouts only ŌĆö 529 is server capacity, not account-level)\n- Rate-limit header extraction and logging via `RateLimitSnapshot`\n- `response_format` injection into system prompt (Anthropic has no native field)\n- `Retry-After` header honouring as the backoff floor\n\n**Prompt caching strategy (`system_and_3` rolling window):**\n\nThe driver stamps `cache_control` markers on up to 4 breakpoints:\n1. System prompt block (always)\n2. Last tool definition (when tools are present)\n3ŌĆō4. Trailing message blocks (newest first)\n\nThe function `apply_cache_markers_system_and_3` walks the message list tail-to-head, skipping empty `Blocks` payloads (e.g., Thinking-only turns that `convert_message` filters out) without consuming the breakpoint budget. This ensures the rolling window always covers 2ŌĆō3 actual messages.\n\n**1-hour cache TTL:** When `cache_ttl: Some(\"1h\")` is set, the driver attaches the `extended-cache-ttl-2025-04-11` beta header and writes `\"ttl\": \"1h\"` into every `cache_control` marker. The default (no `ttl` key) maps to Anthropic's 5-minute window.\n\n**Tool input sanitization (`ensure_object`):**\n\nAnthropic requires tool `input` to be a JSON object. `ensure_object` handles malformed inputs:\n- `null` ŌåÆ `{}`\n- String containing a JSON object ŌåÆ parsed and used\n- Any other type ŌåÆ `{\"raw_input\": <value>}` for debugging\n\n### Bedrock (`drivers/bedrock`)\n\nAWS Bedrock Converse API driver using bearer token authentication (`AWS_BEARER_TOKEN_BEDROCK`).\n\n**Credential resolution order:**\n1. Explicit `bedrock_api_key` argument\n2. `AWS_BEARER_TOKEN_BEDROCK` environment variable\n\n**Region resolution:**\n1. Explicit `region` argument\n2. `AWS_REGION` env var\n3. `AWS_DEFAULT_REGION` env var\n4. Fallback: `us-east-1`\n\nThe endpoint is constructed as `https://bedrock-runtime.{region}.amazonaws.com/model/{model}/converse`. Messages are converted to Bedrock's `ConverseRequest` format with proper tool-use/tool-result pairing validation.\n\n### Aider (`drivers/aider`)\n\nSpawns the `aider` CLI as a subprocess in non-interactive mode. Aider manages its own LLM provider authentication via standard environment variables.\n\n**Key details:**\n- Model IDs prefixed with `aider/` are stripped before passing to `--model`\n- Always runs with `--yes-always`, `--no-auto-commits`, `--no-git`\n- Authentication errors are detected from stderr patterns (\"not authenticated\", \"api key\", etc.)\n- Returns zero token usage (CLI doesn't report this)\n- Detectable via `aider_available()` / `AiderDriver::detect()`\n\n### Other Drivers (referenced in call graph)\n\n| Driver | Protocol | Auth |\n|---|---|---|\n| `OpenAiDriver` | OpenAI Chat Completions API (also DeepSeek, Ollama, and other compatible endpoints) | API key |\n| `VertexAiDriver` | Google Vertex AI with JWT signing (service account or `gcloud` CLI) | Service account JSON / gcloud |\n| `GeminiDriver` | Google Gemini API (shares request building with Vertex AI) | API key |\n| `ClaudeCodeDriver` | Claude Code CLI subprocess | Local credentials (`~/.claude/`) |\n| `QwenCodeDriver` | Qwen Code CLI subprocess with environment filtering | Local credentials |\n| `TokenRotationDriver` | Wrapper that rotates to a new credential on rate-limit errors | Delegates to inner driver |\n| `FallbackChain` | Chains multiple `ChainEntry` drivers; tries each in order on failure | Per-entry |\n\n---\n\n## Driver Construction\n\nDrivers are created through the `create_driver` / `create_driver_from_entry` functions in `drivers/mod.rs`, which:\n\n1. Resolve the provider's API format via `provider_api_format`\n2. Look up default URLs and settings via `provider_defaults`\n3. Check for CLI-based providers via `cli_provider_available` / `is_cli_provider`\n4. Construct the appropriate driver with proxy and timeout settings\n\nProvider defaults include base URLs, model aliases, and credential sources for known providers (Novita, Bedrock, Kimi Coding, etc.).\n\n---\n\n## Thread Safety and Concurrency\n\n- All drivers are `Send + Sync` and safe to share across async tasks.\n- `CredentialPool` uses a single `Mutex<CredentialPoolInner>` for atomic index + credential reads.\n- The backoff counter `JITTER_COUNTER` is an `AtomicU64` with `Relaxed` ordering ŌĆö sufficient for seed diversity.\n- API keys are stored in `Zeroizing<String>` wrappers that zero memory on drop.\n- HTTP clients are obtained from `librefang_http::proxied_client()` or `proxied_client_with_override(proxy_url)` for per-provider proxy support.\n\n## Usage from the Runtime\n\nThe consumer layer (`librefang-runtime`) interacts with this crate primarily through:\n\n- **`call_with_retry` / `stream_with_retry`** in `agent_loop` ŌĆö acquires a credential from the pool, calls the driver, and handles retry/exhaustion marking\n- **`build_driver`** in `aux_client` ŌĆö constructs a driver from a config entry\n- **`detect_auth`** in `model_catalog` ŌĆö probes for CLI provider availability\n- **`probe_provider`** in `provider_health` ŌĆö checks provider connectivity using the driver's API format","llm-provider-drivers":"# LLM Provider Drivers\n\n# LLM Provider Drivers\n\nThe LLM Provider Drivers module is LibreFang's interface to every supported large language model provider. It is split into two cooperating crates: one that defines the abstraction contract, and one that ships concrete implementations and the shared operational infrastructure they all rely on.\n\n## Structure\n\n```mermaid\ngraph LR\n    subgraph Consumers\n        AL[agent_loop]\n        AU[aux_client]\n        MU[media_understanding]\n    end\n\n    subgraph \"llm-driver (trait layer)\"\n        LD[LlmDriver trait]\n        CR[CompletionRequest / CompletionResponse]\n        SE[StreamEvent]\n        LE[LlmError / FailoverReason]\n    end\n\n    subgraph \"llm-drivers (implementation layer)\"\n        DR[Provider Drivers]\n        BO[Backoff & Retry]\n        TR[Token Rotation]\n        RL[Rate Limit Tracker]\n        SG[Shared Rate Guard]\n    end\n\n    Consumers --> LD\n    LD -.->|implemented by| DR\n    DR --> BO\n    DR --> TR\n    DR --> RL\n    DR --> SG\n    DR --> CR\n    DR --> SE\n    DR --> LE\n```\n\n| Sub-module | Responsibility |\n|---|---|\n| [librefang-llm-driver](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait, request/response types (`CompletionRequest`, `CompletionResponse`), streaming protocol (`StreamEvent`), error taxonomy (`LlmError`, `FailoverReason`), and driver configuration. This is the contract that every provider implements. |\n| [librefang-llm-drivers](librefang-llm-drivers-src.md) | Contains the concrete driver implementations (OpenAI, Anthropic, Gemini, Bedrock, Vertex AI, Ollama, Aider, Claude Code, Qwen Code, and OpenAI-compatible proxies) plus the shared cross-cutting infrastructure: retry backoff with jitter, credential pooling via `token_rotation`, rate-limit tracking, and cross-process rate-limit guards. |\n\n## Key Cross-Module Workflows\n\n**Request lifecycle.** A consumer such as `agent_loop` builds a `CompletionRequest` (types from `llm-driver`) and calls a concrete driver (from `llm-drivers`). The driver serialises the request for its specific provider, then deserialises the response back into the shared `CompletionResponse` / `StreamEvent` types so the caller never needs to know which provider was used.\n\n**Credential rotation and failover.** Drivers use `token_rotation` to cycle through available API keys, cooling down slots that return errors. When a request fails, the error is classified into a `FailoverReason` (defined in `llm-driver`), which the runtime uses to decide whether to retry with a different key, fall back to another provider, or surface the error to the user.\n\n**Rate-limit awareness.** Before issuing a request, each driver checks the `shared_rate_guard` (cross-process mutex) and the `rate_limit_tracker`. After a response, 429 headers are recorded. This state is shared across all driver instances so that one process's rate-limit backoff benefits every other process using the same guard file.\n\n**Retry with backoff.** Transient failures trigger `standard_retry_delay` (exponential backoff with jitter), also defined in `llm-drivers`. The error taxonomy from `llm-driver` determines which failures are retryable versus fatal.","memory-system":"# Memory System\n\n# Memory System (`librefang-memory`)\n\n## Purpose\n\nThe memory system is the persistent substrate for the LibreFang Agent Operating System. It provides agents with three complementary storage models ŌĆö key-value, semantic text search, and a knowledge graph ŌĆö unified behind a single `MemorySubstrate` type and exposed through both a low-level substrate API and a higher-level mem0-style proactive memory interface.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Public API Layer\"\n        PM[ProactiveMemoryStore]\n        MS[MemorySubstrate]\n        KLG[KnowledgeStore]\n    end\n\n    subgraph \"Storage Backends\"\n        STR[StructuredStore]\n        SEM[SemanticStore]\n        SS[SessionStore]\n    end\n\n    subgraph \"Infrastructure\"\n        MIG[Migration v1ŌĆōv23]\n        ACL[MemoryNamespaceGuard]\n        CHK[chunker]\n        CON[ConsolidationEngine]\n        DCY[decay]\n    end\n\n    subgraph \"Vector Stores\"\n        SV[SqliteVectorStore]\n        HV[HttpVectorStore]\n    end\n\n    PM --> STR\n    PM --> SEM\n    PM --> KLG\n    PM --> CHK\n    MS --> STR\n    MS --> SEM\n    MS --> KLG\n    MS --> SS\n    SEM --> SV\n    SEM --> HV\n    ACL --> PM\n    CON --> SEM\n    DCY --> SEM\n    MIG -.-> MS\n```\n\nAll data lives in a single SQLite database (via `rusqlite`). Schema creation and evolution are handled by `migration::run_migrations`, which applies 23 incremental migrations idempotently using the `user_version` pragma.\n\n## Key Components\n\n### `MemorySubstrate` (`substrate.rs`)\n\nThe top-level facade. Owns an `Arc<Mutex<Connection>>` and composes `StructuredStore`, `SemanticStore`, `KnowledgeStore`, and `SessionStore`. Created with `MemorySubstrate::open_in_memory` for tests or `MemorySubstrate::open` for production.\n\nExposes methods like `remember`, `recall`, `structured_get`/`structured_set`, session management, and `import`/`export`.\n\n### `ProactiveMemoryStore` (`proactive.rs`)\n\nA mem0-style API layered on top of `MemorySubstrate`. Provides:\n\n- **`search(query, user_id, limit)`** ŌĆö Semantic search across all memory levels, with optional vector similarity when an embedding driver is configured.\n- **`add(messages, user_id)`** ŌĆö Extracts facts from messages via a `MemoryExtractor`, deduplicates against existing memories, and stores new fragments.\n- **`get(user_id)` / `list()`** ŌĆö Retrieve user-level or all memories.\n- **`auto_memorize(agent_id, messages)`** ŌĆö Hook called after each conversation turn; extracts and stores relevant facts.\n- **`auto_retrieve(agent_id, query)`** ŌĆö Hook called before agent execution; returns recalled memories as context.\n\nExtraction is driven by a pluggable `MemoryExtractor` trait (default: regex-based `DefaultMemoryExtractor`; the runtime layer can swap in an LLM-powered extractor). New memories are deduplicated against existing ones using `text_similarity` (Jaccard on word sets) ŌĆö memories above 90% similarity are merged rather than duplicated.\n\nThe store also runs periodic background maintenance:\n- **Confidence decay** ŌĆö Rate-limited to once per hour. Applies exponential decay based on `days_since_access`, with a log-based boost for frequently accessed memories.\n- **Session TTL cleanup** ŌĆö Soft-deletes session-level memories older than `session_ttl_hours`.\n\n### `SemanticStore` (`semantic.rs`)\n\nStores and retrieves text-based memories in the `memories` table. Core methods:\n\n- **`remember`** ŌĆö Stores a memory fragment. Optionally chunks long text via the `chunker` module.\n- **`recall`** / **`recall_with_embedding`** ŌĆö Searches memories. When an embedding driver is present, uses vector similarity search; otherwise falls back to SQL `LIKE` matching.\n- **`forget_session_older_than_global`** ŌĆö Soft-deletes expired session memories.\n\nMemories carry `confidence` (0.0ŌĆō1.0), `scope` (`user_memory`, `session_memory`, `agent_memory`), `accessed_at`, and `access_count`. Each recall updates `accessed_at` and increments `access_count`, which feeds into the decay/boost calculation.\n\n### `StructuredStore` (`structured.rs`)\n\nA per-agent key-value store in the `kv_store` table. Values are serialized as JSON blobs. Used for agent state, configuration, and memory metadata. Supports namespace-scoped access via `MemoryNamespaceGuard`.\n\n### `KnowledgeStore` (`knowledge.rs`)\n\nAn entity-relation graph stored in SQLite. Two tables:\n\n- **`entities`** ŌĆö Nodes with `entity_type` (Person, Organization, Location, etc.), `name`, and arbitrary `properties` (JSON).\n- **`relations`** ŌĆö Directed edges with `relation_type` (WorksAt, RelatedTo, etc.), `confidence`, and `properties`.\n\nThe key method is `query_graph(GraphPattern)`, which performs a triple-pattern query joining entities and relations. The JOIN matches entities by both ID and name, supporting the MCP tool's convention of referencing entities by name rather than UUID.\n\n`has_relation` checks for the existence of a specific edge, and `delete_by_agent` removes all entities and relations owned by an agent.\n\n### `chunker` (`chunker.rs`)\n\nSplits long text into overlapping chunks for embedding-based storage. The splitting strategy is hierarchical:\n\n1. Split on paragraph boundaries (`\\n\\n`).\n2. If a paragraph exceeds `max_size`, split on sentence boundaries (ASCII `. `/`.\\n`, Chinese `ŃĆé`, `’╝¤`, `’╝ü`).\n3. If a sentence still exceeds `max_size`, hard-split at the character boundary.\n\nOverlap is applied by prepending the last `overlap` characters of the previous chunk to the next. All splitting operates on Unicode character boundaries, not byte offsets.\n\n```rust\npub fn chunk_text(text: &str, max_size: usize, overlap: usize) -> Vec<String>\n```\n\n### Consolidation and Decay\n\nTwo separate mechanisms manage memory lifecycle:\n\n**`ConsolidationEngine`** (`consolidation.rs`) ŌĆö Runs a consolidation cycle with two phases:\n1. **Confidence decay** ŌĆö Reduces confidence of memories not accessed in 7+ days by `confidence * (1 - decay_rate)`, floored at 0.1.\n2. **Duplicate merging** ŌĆö Compares all active memories pairwise using `text_similarity`. Pairs above 90% similarity are merged: the lower-confidence duplicate is soft-deleted, and the keeper's confidence is lifted to the maximum of the two. Capped at 100 merges per run to avoid O(n┬▓) blowup.\n\n**`run_decay`** (`decay.rs`) ŌĆö Time-based hard deletion governed by `MemoryDecayConfig`. Deletes (not soft-deletes) SESSION and AGENT scope memories whose `accessed_at` is older than the configured TTL. USER scope memories are never touched. Accessing a memory (via recall) resets the timer by updating `accessed_at`.\n\n### `MemoryNamespaceGuard` (`namespace_acl.rs`)\n\nPer-user access control for memory namespaces. Wraps a `UserMemoryAccess` ACL and gates four operations:\n\n| Method | Required permissions |\n|---|---|\n| `check_read(namespace)` | Namespace in `readable_namespaces` |\n| `check_write(namespace)` | Namespace in `writable_namespaces` |\n| `check_delete(namespace)` | `delete_allowed` flag + write access |\n| `check_export(namespace)` | `export_allowed` flag + read access |\n\nNamespaces support glob-style prefixes: `\"kv:*\"` grants access to `\"kv:alice\"`, `\"kv:bob\"`, etc.\n\nThe guard also handles **PII redaction**. When `pii_access` is `false`, the guard replaces PII-tagged content with `[REDACTED:PII]` before returning fragments to the user. PII detection uses two signals:\n1. A `taint_labels` metadata field containing `\"Pii\"` (case-insensitive).\n2. A regex pass (`redact_pii_in_text`) that detects email addresses, phone numbers, SSNs, and credit card numbers.\n\nThe kernel calls `check_read` and `redact_all` at every memory call site (see the execution flow: `memory_get_user ŌåÆ redact_all ŌåÆ redact_item ŌåÆ redact_pii_in_text`).\n\n### `HttpVectorStore` (`http_vector_store.rs`)\n\nA `VectorStore` implementation that delegates to a remote HTTP service, allowing integration with external vector databases (Qdrant, Weaviate, custom microservices) without native client dependencies.\n\nThe remote service must implement four endpoints:\n\n| Method | Path | Purpose |\n|---|---|---|\n| POST | `/insert` | Store an embedding with payload and metadata |\n| POST | `/search` | Nearest-neighbor search by query embedding |\n| DELETE | `/delete` | Remove an embedding by ID |\n| POST | `/get_embeddings` | Bulk-fetch embeddings by ID list |\n\n### `Migration` (`migration.rs`)\n\nSchema management across 23 versions. Each migration is a function (`migrate_v1` through `migrate_v23`) that checks whether it has already been applied using `column_exists` or the `migrations` table, then applies `ALTER TABLE` or `CREATE TABLE` statements. Running `run_migrations` is idempotent ŌĆö safe to call on every boot.\n\nKey tables created:\n\n| Table | Purpose |\n|---|---|\n| `agents` | Agent registry |\n| `sessions` | Session history |\n| `memories` | Semantic memory fragments with embeddings |\n| `entities` / `relations` | Knowledge graph |\n| `kv_store` | Per-agent key-value storage |\n| `usage_events` | LLM cost tracking and metering |\n| `prompt_versions` | Prompt versioning and A/B testing |\n| `audit_entries` | Merkle-audited action log |\n| `canonical_sessions` | Cross-channel persistent session state |\n\n### `UsageStore` (`usage.rs`)\n\nTracks LLM token consumption per agent, model, provider, and user. Methods:\n- `check_quota_and_record` ŌĆö Validates against per-agent and global budget caps before recording.\n- `check_all_and_record` ŌĆö Validates all budget dimensions (global, per-agent, per-provider).\n- `query_summary` / `query_by_model` ŌĆö Aggregates usage for dashboards.\n- `query_user_ranking` ŌĆö Ranks users by daily spend for admin views.\n\n## Memory Scopes\n\nThree scope levels control persistence and decay behavior:\n\n| Scope | Constant | Decay behavior |\n|---|---|---|\n| **User** | `user_memory` | Never deleted. Permanent knowledge about the user. |\n| **Session** | `session_memory` | Deleted after `session_ttl_hours` of inactivity or `session_ttl_days` (config-dependent). |\n| **Agent** | `agent_memory` | Deleted after `agent_ttl_days` of no access. |\n\n## Data Flow: Memory Recall with PII Redaction\n\nThe most common end-to-end flow, showing how a user request travels from the HTTP API through the ACL and redaction layers:\n\n```mermaid\nsequenceDiagram\n    participant API as memory route\n    participant PM as ProactiveMemoryStore\n    participant ACL as NamespaceGuard\n    participant SEM as SemanticStore\n    participant DB as SQLite\n\n    API->>PM: search_with_guard(query, user_id, guard)\n    PM->>ACL: check_read(\"proactive\")\n    ACL-->>PM: Allow\n    PM->>SEM: recall(agent_id, query)\n    SEM->>DB: SELECT ... WHERE content LIKE ?\n    DB-->>SEM: rows\n    SEM-->>PM: Vec<MemoryFragment>\n    PM->>ACL: redact_all(fragments)\n    ACL->>ACL: redact_item per fragment\n    ACL-->>PM: redacted fragments\n    PM-->>API: search results\n```\n\n## Integration Points\n\n- **`librefang-runtime`** creates `MemorySubstrate` instances and wraps them in `ProactiveMemoryStore`. It also provides the LLM-backed `MemoryExtractor` and `EmbeddingFn` implementations.\n- **`librefang-api`** HTTP routes call `ProactiveMemoryStore` methods, passing a `MemoryNamespaceGuard` resolved from the authenticated user's ACL.\n- **Agent loop** (`librefang-runtime/src/agent_loop.rs`) calls `setup_recalled_memories` which invokes `recall_with_embedding_async` through the substrate, then runs `redact_all` via the namespace guard before injecting context.\n- **Compactor** (`librefang-runtime/src/compactor.rs`) uses `Session` for canonical context window management.\n\n## Configuration\n\n`ProactiveMemoryConfig` controls:\n\n| Field | Default | Description |\n|---|---|---|\n| `confidence_decay_rate` | ŌĆö | Exponential decay coefficient. 0 disables decay. |\n| `session_ttl_hours` | 0 | Session memory TTL. 0 disables cleanup. |\n| `auto_memorize_enabled` | ŌĆö | Whether `auto_memorize` extracts and stores facts. |\n| `auto_retrieve_enabled` | ŌĆö | Whether `auto_retrieve` injects recalled context. |\n\n`MemoryDecayConfig` controls hard deletion:\n\n| Field | Description |\n|---|---|\n| `enabled` | Master switch for the decay sweep. |\n| `session_ttl_days` | Days before session memories are hard-deleted. |\n| `agent_ttl_days` | Days before agent memories are hard-deleted. |\n| `decay_interval_hours` | How often the decay sweep runs. |\n\n`ChunkConfig` (from the runtime config) controls text chunking:\n\n| Field | Description |\n|---|---|\n| `max_size` | Maximum characters per chunk. |\n| `overlap` | Overlap characters between consecutive chunks. |\n| `enabled` | Whether long text is chunked or stored as-is. |","other-librefang-api-dashboard":"# Other ŌĆö librefang-api-dashboard\n\n# LibreFang API Dashboard\n\n## Overview\n\nThe dashboard is a single-page application that provides a web interface for the LibreFang autonomous agent operating system. It exposes management and monitoring capabilities for agents, sessions, approvals, communication channels, skills, hands (multi-agent orchestrations), workflows, scheduling, memory, analytics, and runtime configuration.\n\nBuilt on React 19 with TanStack Router v1 for file-based routing and TanStack Query v5 for server-state management, the dashboard enforces a strict layered architecture where UI components never call the API directlyŌĆöall data access flows through a shared hooks layer.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Pages[\"Pages<br/>(src/pages/)\"] --> Hooks[\"Query & Mutation Hooks<br/>(src/lib/queries/ & src/lib/mutations/)\"]\n    Hooks --> HTTP[\"HTTP Client<br/>(src/lib/http/client.ts)\"]\n    HTTP --> API[\"Raw API Layer<br/>(src/api.ts)\"]\n    API --> Backend[\"LibreFang Backend API\"]\n    Hooks --> Keys[\"Query Key Factories<br/>(src/lib/queries/keys.ts)\"]\n    Keys --> Cache[\"TanStack Query Cache\"]\n    Pages --> Components[\"Shared Components<br/>(src/components/)\"]\n    Components --> Hooks\n```\n\n## Tech Stack\n\n| Layer | Technology |\n|---|---|\n| UI Framework | React 19 |\n| Routing | TanStack Router v1 |\n| Server State | TanStack Query v5 |\n| State Management | Zustand v5 |\n| Styling | Tailwind CSS v4 (with custom semantic palette) |\n| Build | Vite 7 |\n| Type Generation | openapi-typescript |\n| Terminal Emulation | xterm.js |\n| Charts | Recharts |\n| Animations | Motion (Framer Motion) |\n| i18n | i18next + react-i18next |\n| TOML Parsing | smol-toml |\n| Testing | Vitest + Testing Library + Playwright |\n| Package Manager | pnpm 10 |\n\n## Project Structure\n\n```\ndashboard/\nŌö£ŌöĆŌöĆ e2e/                          # Playwright end-to-end tests\nŌöé   ŌööŌöĆŌöĆ dashboard.spec.ts\nŌö£ŌöĆŌöĆ public/\nŌöé   Ōö£ŌöĆŌöĆ manifest.json             # PWA manifest\nŌöé   Ōö£ŌöĆŌöĆ sw.js                     # Service worker (stale-while-revalidate)\nŌöé   Ōö£ŌöĆŌöĆ icon-192.png\nŌöé   ŌööŌöĆŌöĆ icon-512.png\nŌö£ŌöĆŌöĆ src/\nŌöé   Ōö£ŌöĆŌöĆ main.tsx                  # Application entry point\nŌöé   Ōö£ŌöĆŌöĆ api.ts                    # Raw API calls + auth helpers\nŌöé   Ōö£ŌöĆŌöĆ api.test.ts\nŌöé   Ōö£ŌöĆŌöĆ index.css                 # Tailwind config, theme variables, animations\nŌöé   Ōö£ŌöĆŌöĆ components/\nŌöé   Ōöé   ŌööŌöĆŌöĆ ui/\nŌöé   Ōöé       Ōö£ŌöĆŌöĆ DeliveryTargetsEditor.tsx   # Schedule delivery target builder\nŌöé   Ōöé       Ōö£ŌöĆŌöĆ MultiSelectCmdk.tsx         # Command-palette multi-select\nŌöé   Ōöé       ŌööŌöĆŌöĆ *.test.tsx\nŌöé   Ōö£ŌöĆŌöĆ pages/                    # Route page components\nŌöé   ŌööŌöĆŌöĆ lib/\nŌöé       Ōö£ŌöĆŌöĆ http/\nŌöé       Ōöé   Ōö£ŌöĆŌöĆ client.ts         # Thin typed wrapper over src/api.ts\nŌöé       Ōöé   ŌööŌöĆŌöĆ errors.ts         # ApiError class\nŌöé       Ōö£ŌöĆŌöĆ queries/\nŌöé       Ōöé   Ōö£ŌöĆŌöĆ keys.ts           # All query-key factories\nŌöé       Ōöé   Ōö£ŌöĆŌöĆ keys.test.ts      # Factory existence & anchoring tests\nŌöé       Ōöé   ŌööŌöĆŌöĆ <domain>.ts       # queryOptions + useXxx hooks per domain\nŌöé       Ōö£ŌöĆŌöĆ mutations/\nŌöé       Ōöé   ŌööŌöĆŌöĆ <domain>.ts       # useXxx mutation hooks with invalidation\nŌöé       Ōö£ŌöĆŌöĆ agentManifest.ts      # TOML manifest parser/serializer/validator\nŌöé       Ōö£ŌöĆŌöĆ agentManifestMarkdown.ts  # Manifest ŌåÆ Markdown renderer\nŌöé       Ōö£ŌöĆŌöĆ chat.ts               # Chat message normalization utilities\nŌöé       Ōö£ŌöĆŌöĆ chatPicker.ts         # Agent/hand grouping for chat picker UI\nŌöé       Ōö£ŌöĆŌöĆ csvParser.ts          # RFC-4180 CSV parser (user import)\nŌöé       ŌööŌöĆŌöĆ test/\nŌöé           ŌööŌöĆŌöĆ query-client.ts   # Shared test helpers (createQueryClientWrapper)\nŌö£ŌöĆŌöĆ package.json\nŌö£ŌöĆŌöĆ playwright.config.ts\nŌööŌöĆŌöĆ vite.config.ts\n```\n\n**Query/mutation domain files** currently exist for: `agents`, `analytics`, `approvals`, `channels`, `config`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, and `workflows`.\n\n## Data Layer\n\nThe data layer is the most architecturally significant part of the dashboard. It enforces a strict separation: pages and components never call `fetch()` or `api.*` directlyŌĆöthey import hooks from `src/lib/queries/` and `src/lib/mutations/`.\n\n### HTTP Client & Error Handling\n\n`src/lib/http/client.ts` wraps `src/api.ts` with typed re-exports. All API calls go through this layer. `src/lib/http/errors.ts` defines the `ApiError` class used for structured error handling.\n\n### Authentication\n\nAuthentication is token-based. The API layer (`src/api.ts`) provides these helpers:\n\n- **`setApiKey(token)`** / **`clearApiKey()`** ŌĆö store/remove a bearer token in `localStorage` under the key `librefang-api-key`.\n- **`getStoredApiKey()`** ŌĆö retrieves the token; `buildHeaders()` automatically injects it as `Authorization: Bearer <token>`.\n- **`verifyStoredAuth()`** ŌĆö probes a protected endpoint; on 401, clears the stale token and returns `false`.\n- **`buildAuthenticatedWebSocketUrl(path)`** ŌĆö appends `?token=...` to WebSocket URLs for terminal/session streams.\n\nThe dashboard supports a credentials-based sign-in flow. When `/api/auth/dashboard-check` returns `{ mode: \"credentials\" }`, a sign-in dialog is presented.\n\n### Query Key Factories\n\nAll cache keys live in `src/lib/queries/keys.ts`. Each domain has a factory object that produces hierarchical keys anchored to a root `all` key. This design enables precise invalidation: a mutation can invalidate just `agentKeys.detail(\"abc\")`, all lists via `agentKeys.lists()`, or the entire domain via `agentKeys.all`.\n\n```ts\n// Canonical factory pattern\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nEvery sub-key **must** be anchored with `...fooKeys.all`. Tests in `keys.test.ts` verify this anchoringŌĆörun them after any change to the key factories.\n\n### Query Hooks\n\nEach domain file in `src/lib/queries/` exports a `queryOptions` factory and a `useXxx` hook:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled: options.enabled,\n    staleTime: options.staleTime,\n    refetchInterval: options.refetchInterval,\n  });\n}\n```\n\nHooks accept an optional `options` bag (`enabled`, `staleTime`, `refetchInterval`) so call sites can override per-page needs without duplicating query definitions. Call-site overrides must include an inline comment explaining why (e.g., bell-icon polls fast but is gated by tab visibility).\n\n### Mutation Hooks\n\nMutations live in `src/lib/mutations/<domain>.ts`. **Every write operation invalidates relevant queries**, and invalidation logic lives inside the hookŌĆöcallers never need to know which keys are affected.\n\nInvalidation scope follows a strict hierarchy (from narrowest to broadest):\n\n| Scope | When to use | Example mutations |\n|---|---|---|\n| `fooKeys.detail(id)` + `fooKeys.lists()` | Per-id update where the list projection also changes | `usePatchAgent`, `usePatchAgentConfig`, experiment mutations |\n| `fooKeys.lists()` | List-shape change with no existing detail to refresh | `useCreateAgent`, `useDeleteAgent`, `useCloneAgent` |\n| `fooKeys.detail(id)` or nested sub-key | Change scoped to one detail, list unaffected | `useSwitchAgentSession` |\n| `fooKeys.all` | Bulk import, cache reset, cross-cutting changes | `useActivateHand`, `useResolveApproval` |\n\nFan-out trade-off: invalidating `fooKeys.all` while N items are cached refetches every list plus every cached detail and nested sub-key for each item. Use it only when all sub-keys are genuinely stale.\n\nCall sites may attach their own `onSuccess`/`onError` handlers for UI feedback (toasts, modal dismissal), but these are orthogonal to invalidation.\n\n### Cross-Domain Invalidation\n\nSome mutations touch multiple domains. For example:\n\n- **`useActivateHand`** invalidates `handKeys.all` + `agentKeys.all` + `overviewKeys.snapshot()`\n- **`useSetDefaultProvider`** invalidates `providerKeys.all` + `modelKeys.lists` + `runtimeKeys.status()`\n- **`useCreateAgentSession`** invalidates `agentKeys.sessions(agentId)` + `agentKeys.detail(agentId)` + `sessionKeys.lists()`\n- **`useRunWorkflow`** invalidates `workflowKeys.lists()` + `workflowKeys.runs(workflowId)` + `workflowKeys.runDetail(runId)`\n\n### Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts` (or re-export via `src/lib/http/client.ts`).\n2. Add a key factory in `src/lib/queries/keys.ts` following the hierarchical pattern.\n3. Add query options + `useXxx` hook in `src/lib/queries/<domain>.ts`.\n4. Add mutation hooks in `src/lib/mutations/<domain>.ts` with appropriate invalidation.\n5. Add test cases in `keys.test.ts`.\n\n## Key Libraries & Utilities\n\n### Agent Manifest (TOML)\n\n`src/lib/agentManifest.ts` handles parsing, validating, and serializing agent configuration TOML files. This powers the agent creation/editing UI.\n\n- **`parseManifestToml(toml)`** ŌåÆ `{ ok: true, form, extras }` or `{ ok: false, message }`. Extracts known fields into a structured `form` state; unrecognized fields are preserved in `extras` for round-trip fidelity.\n- **`serializeManifestForm(form, extras?)`** ŌåÆ TOML string. Emits hand-tuned field ordering, omits empty/default values, and handles mutual exclusion (e.g., `exec_policy` shorthand vs. `[exec_policy]` table).\n- **`validateManifestForm(form)`** ŌåÆ array of error field paths (e.g., `[\"name\", \"model.provider\"]`).\n\n**Notable edge cases handled:**\n- TOML special character escaping (quotes, backslashes, newlines)\n- Numeric field validation (rejects negatives, out-of-range, non-numeric input)\n- `exec_policy` alias normalization (`\"none\"` ŌåÆ `\"deny\"`, `\"all\"` ŌåÆ `\"full\"`, etc.)\n- Nested sub-table extras inside `[model]` don't break TOML section scoping\n- `response_format` mutual exclusion between form-mode and preserved extras\n- Per-fallback-model `extra_params` (e.g., Qwen's `enable_memory`) round-trip correctly\n\n### Agent Manifest Markdown\n\n`src/lib/agentManifestMarkdown.ts` renders a manifest as human-readable Markdown for preview/export. Empty sections (resources, capabilities) are omitted. An \"Advanced configuration\" section is appended when extras are present.\n\n### CSV Parser\n\n`src/lib/csvParser.ts` provides RFC-4180-compliant CSV parsing:\n\n- **`parseCsvText(text)`** ŌĆö handles BOM stripping, quoted fields with embedded newlines/commas, escaped double-quotes, CRLF/CR/LF line endings, and avoids phantom trailing records.\n- **`parseUsersCsv(text, validRoles)`** ŌĆö validates required `name`/`role` columns, treats unknown columns as channel bindings, flags invalid roles while still surfacing rows for preview.\n\n### Chat Utilities\n\n`src/lib/chat.ts` normalizes API message shapes for display:\n\n- **`normalizeRole(role)`** ŌĆö lowercases API role strings (`\"User\"` ŌåÆ `\"user\"`)\n- **`asText(content)`** ŌĆö converts unknown content types to string representation\n- **`formatMeta(meta)`** ŌĆö formats usage metadata (`\"12 in / 34 out | 2 iter | $0.0012\"`)\n- **`normalizeToolOutput(event)`** ŌĆö extracts tool output events for persistent display, filtering malformed events\n\n### Chat Picker\n\n`src/lib/chatPicker.ts` handles the grouping logic for the agent selection UI in chat:\n\n- **`groupedPicker(agents, hands, showHandAgents)`** ŌĆö when `showHandAgents` is true, groups hand-spawned agents under their hand instance header (coordinator first, then alphabetical by role); standalone agents remain separate. Inactive/paused hands and empty hand instances are hidden. Hand-spawned agents never fall back to the standalone list when grouping is enabled.\n\n### Delivery Target Editor\n\n`src/components/ui/DeliveryTargetsEditor.tsx` validates schedule delivery targets with four target types:\n\n- **Channel** ŌĆö requires `channel_type` and `recipient`; optional `thread_id` and `account_id` are stripped when empty\n- **Webhook** ŌĆö requires HTTPS URL; blocks SSRF targets (localhost, loopback, link-local 169.254.169.254, metadata.google.internal, IPv6 `[::1]`); empty `auth_header` is stripped\n- **Local file** ŌĆö requires relative path; rejects absolute paths (Unix and Windows), path traversal (`..`)\n- **Email** ŌĆö requires `to` address; empty `subject_template` is stripped\n\n### Multi-Select Component\n\n`src/components/ui/MultiSelectCmdk.tsx` is a command-palette-based multi-select widget built on `cmdk`. It supports keyboard navigation (Backspace removes last chip), search filtering, and hides already-selected options from the dropdown.\n\n## Service Worker & PWA\n\nThe dashboard is an installable PWA:\n\n- **`manifest.json`** configures standalone display, dark theme, and app icons.\n- **`sw.js`** implements a stale-while-revalidate caching strategy for static assets. API requests (`/api/*`) always bypass the cache (network-only). Only GET requests are cached.\n- The service worker is registered in `index.html` with a silent catch for environments that don't support it.\n\n## Styling & Theming\n\n### Dual-Mode Semantic Palette\n\nThe CSS in `src/index.css` defines light and dark mode through CSS custom properties:\n\n| Token | Light | Dark |\n|---|---|---|\n| `--brand-color` | Sky 600 (`#0284c7`) | Sky 400 (`#38bdf8`) |\n| `--bg-main` | `#f8fafc` | `#020617` |\n| `--bg-surface` | `#ffffff` | `rgba(15,23,42,0.92)` |\n\nDark mode is activated via the `.dark` class (not `prefers-color-scheme`), enabling user toggle. A `@custom-variant dark` directive ensures Tailwind utilities respect this class.\n\n### Animation System\n\nApple-inspired spring curves are defined as CSS variables (`--apple-spring`, `--apple-ease`, `--apple-bounce`). The `.card-glow` utility provides hover depth and glow effects. Actual animation variants live in `src/lib/motion.ts` and per-component files; `prefers-reduced-motion` is handled per-variant via `useReducedMotion`.\n\n### Custom Breakpoints\n\nTailwind v4 defaults stop at 1536px. The dashboard adds `3xl` (1920px) and `4xl` (2560px) breakpoints for QHD/4K displays, enabling 5-wide and 6-wide card grids.\n\n### Safe Area Utilities\n\nCustom utilities (`pb-safe`, `pb-safe-2`, `pb-safe-4`, `pt-safe`, `pl-safe`, `pr-safe`) use `env(safe-area-inset-*)` to handle iOS home indicator and Android gesture navigation bar insets.\n\n## Testing Strategy\n\n### Unit Tests (Vitest + Testing Library)\n\nUnit tests cover:\n\n- **API layer** (`api.test.ts`) ŌĆö auth token injection, WebSocket URL building, config patching, tool management\n- **Query key factories** (`keys.test.ts`) ŌĆö existence checks and anchoring validation\n- **Mutation hooks** (`lib/mutations/*.test.tsx`) ŌĆö verify exact invalidation keys using a shared `createQueryClientWrapper` helper from `lib/test/query-client.ts`\n- **Utility libraries** ŌĆö TOML round-trips, CSV parsing, chat normalization, delivery target validation, multi-select behavior\n\nMutation tests follow a consistent pattern: spy on `queryClient.invalidateQueries`, fire the mutation, assert exact key calls. This catches both missing invalidations and overly broad ones (e.g., `usePatchAgentConfig` tests verify it does **not** invalidate `handKeys.details()`).\n\n### End-to-End Tests (Playwright)\n\n`e2e/dashboard.spec.ts` verifies:\n\n- The dashboard shell loads with all navigation links visible (Overview, Agents, Sessions, Approvals, Comms, Providers, Channels, Skills, Hands, Workflows, Scheduler, Goals, Analytics, Memory, Runtime, Logs)\n- Navigation between pages works\n- The sign-in dialog appears when the auth endpoint returns `{ mode: \"credentials\" }`\n\nPlaywright runs against the Vite dev server on port 4173.\n\n## Build & Development\n\n```bash\npnpm dev                    # Start Vite dev server\npnpm build                  # Production build (must succeed)\npnpm preview                # Preview production build\npnpm typecheck              # TypeScript strict check (tsc --noEmit)\npnpm test                   # Run Vitest unit tests\npnpm test:watch             # Vitest in watch mode\npnpm e2e                    # Playwright end-to-end tests\npnpm openapi:types          # Regenerate types from OpenAPI spec\n```\n\nAfter any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`, run all three verification steps:\n\n```bash\npnpm typecheck && pnpm test --run && pnpm build\n```\n\nA passing typecheck alone is insufficientŌĆöthe key-factory tests catch anchoring regressions that TypeScript does not.\n\n## Conventions\n\n- **TypeScript strict mode** ŌĆö no `any` in new hooks; types come from `src/api.ts` or `openapi/generated.ts`\n- **Commit format** ŌĆö `feat(dashboard/<area>):`, `refactor(dashboard/queries):`, `fix(dashboard/<area>):`. No `Co-Authored-By` footers.\n- **Query key construction** ŌĆö always use factory functions; never build keys inline\n- **Data deduplication** ŌĆö never subscribe to the same endpoint with a different key for a subset; use `select` on shared `queryOptions`\n- **Mutation invalidation** ŌĆö always inside the hook; call sites may add UI callbacks but must not manage cache invalidation\n- **Exceptions for non-cached data** ŌĆö streaming/SSE, imperative fire-and-forget control channels (e.g., `TerminalTabs.tsx` terminal lifecycle), and one-shot probes may call `fetch` directly. Keep these narrow and comment why.","other-librefang-api-src":"# Other ŌĆö librefang-api-src\n\n# LibreFang API ŌĆö Login Page\n\n## Overview\n\n`login_page.html` is a self-contained, single-file authentication page for the LibreFang dashboard. It ships as a static HTML document with inline CSS and JavaScript ŌĆö no build step, no external dependencies, no framework. The server serves this page to unauthenticated requests that need dashboard access.\n\n## Purpose\n\nThis page acts as the gateway to the LibreFang dashboard. It collects credentials, optionally handles two-factor authentication (TOTP), and stores the resulting API token in the browser's `localStorage` for downstream use by the dashboard.\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant U as Browser\n    participant L as login_page.html\n    participant A as /api/auth/dashboard-login\n\n    U->>L: GET (unauthenticated)\n    L->>U: Render sign-in form\n    U->>L: Submit username + password\n    L->>A: POST credentials\n    A-->>L: {ok: true, token} OR {requires_totp: true}\n    alt TOTP required\n        L->>U: Show TOTP input field\n        U->>L: Submit username + password + totp_code\n        L->>A: POST with TOTP\n        A-->>L: {ok: true, token}\n    end\n    L->>U: Store token, redirect to /dashboard/\n```\n\n## Key Components\n\n### Form Fields\n\n| Field | HTML ID | `name` attribute | Behavior |\n|---|---|---|---|\n| Username | `u` | `username` | Text input, required, auto-focused on load |\n| Password | `p` | `password` | Password input, required |\n| TOTP code | `t` | `totp_code` | Numeric input, hidden by default, revealed only when the server responds with `requires_totp: true` |\n\n### Authentication Flow\n\nThe JavaScript IIFE attached to the form handles a two-phase login:\n\n1. **Initial submission** ŌĆö Sends `username` and `password` as JSON to `POST /api/auth/dashboard-login`.\n2. **TOTP challenge** ŌĆö If the response contains `{ requires_totp: true }`, the TOTP input row is unhidden, the user enters a 6-digit code, and the next submission includes `totp_code` in the payload alongside the credentials.\n\nOn success (`{ ok: true, token: \"...\" }`), the token is written to `localStorage` under the key **`librefang-api-key`**, and the browser is redirected to the originally requested path (or `/dashboard/` as a fallback).\n\n### Token Storage\n\n```javascript\nlocalStorage.setItem('librefang-api-key', d.token);\n```\n\nThe dashboard and other authenticated pages read the API key from this same `localStorage` key. The login page's redirect preserves the user's intended destination by reconstructing it from `location.pathname + location.search + location.hash`.\n\n### Error Handling\n\nErrors are displayed in the `#err` element (an `aria-live=\"polite\"` region for accessibility). Three error categories are handled:\n\n| Scenario | Message shown |\n|---|---|\n| Server returns an error | `d.error` from the response body, or `\"Sign in failed.\"` as fallback |\n| Server requires TOTP | `\"Enter your 6-digit TOTP code.\"` (informational, not a failure) |\n| Network failure | `\"Network error.\"` |\n\nThe submit button is disabled during in-flight requests to prevent double submission, and re-enabled in the `finally` block.\n\n## Styling and Theming\n\nThe page uses CSS custom properties and `prefers-color-scheme` media queries to support both dark and light modes:\n\n- **Dark mode (default):** Dark background (`#0b0d12`), card with `#12151c` fill, light text.\n- **Light mode:** Triggered by `@media (prefers-color-scheme: light)`, overrides body background, card styling, input fields, and subtitle color.\n\nThe `:root` declaration `color-scheme: light dark` signals to the browser that both modes are supported, ensuring native form controls (scrollbars, focus rings) also adapt.\n\nThe card is centered using `display: grid; place-items: center` on the body and constrained to `min(92vw, 380px)` for mobile responsiveness.\n\n## Security Considerations\n\n- **`noindex, nofollow`** ŌĆö The `<meta name=\"robots\">` tag prevents search engine indexing of the login page.\n- **`credentials: 'same-origin'`** ŌĆö Cookies and auth headers are sent only to the same origin, preventing credential leakage in cross-origin contexts.\n- **`autocomplete` attributes** ŌĆö Username and password fields use standard `autocomplete` values (`username`, `current-password`), allowing password managers to function correctly. The TOTP field uses `autocomplete=\"one-time-code\"` for browser autofill of SMS/authenticator codes.\n\n## Integration Points\n\nThis page depends on exactly one backend endpoint:\n\n- **`POST /api/auth/dashboard-login`** ŌĆö Accepts `{ username, password }` or `{ username, password, totp_code }`, returns `{ ok: true, token }` on success or `{ requires_totp: true }` / `{ error: string }` on failure.\n\nThe page is a static asset with no server-side rendering. The backend should serve it for any unauthenticated request to dashboard routes, allowing the client-side redirect logic to return the user to their intended destination after login.\n\nConfiguration is referenced in the footer text: `config.toml`. This points operators to the server configuration file where authentication settings are defined.","other-librefang-api-static":"# Other ŌĆö librefang-api-static\n\n# librefang-api-static ŌĆö Locale & Static Assets\n\n## Purpose\n\nThis module holds static assets served by the LibreFang API, currently consisting of **i18n locale files** that provide all user-facing strings for the web dashboard. Every label, button, toast message, placeholder, and status indicator in the UI draws its text from these JSON dictionaries.\n\n## File Layout\n\n```\nlibrefang-api/static/\nŌööŌöĆŌöĆ locales/\n    Ōö£ŌöĆŌöĆ en.json    ŌåÉ Primary / fallback language\n    ŌööŌöĆŌöĆ ja.json    ŌåÉ Japanese translation\n```\n\nThe API serves these files to the frontend, which selects the appropriate locale at runtime based on the user's language preference.\n\n## Locale File Structure\n\nEach locale file is a single flat-ish JSON object with **top-level namespaces** that map to pages, components, or logical groupings. The convention is:\n\n```\nnamespace.subNamespace.key\n```\n\n### Primary Namespaces\n\n| Namespace | Scope |\n|---|---|\n| `nav` | Sidebar navigation labels |\n| `status` | Connection / health status strings |\n| `btn` | Reusable button labels (save, delete, cancel, etc.) |\n| `label` | Generic field labels (name, key, value, status) |\n| `auth` | API-key authentication gate |\n| `page` | Page titles used in headers |\n| `health` | Health-check status labels |\n| `stat` | Stat card headings (agents running, tokens used, etc.) |\n| `card` | Dashboard card titles |\n| `agents` | Agent list page |\n| `agentsPage` | Agent creation/management page |\n| `detail` | Agent detail panel (info, files, config tabs) |\n| `agentChat` | Agent chat interface ŌĆö the largest namespace |\n| `agentChat2` | Chat overlay controls (focus mode, model switch) |\n| `sessionsPage` | Session browser & agent memory editor |\n| `approvals` | Execution approval queue |\n| `logsPage` | Live log stream & audit trail viewer |\n| `runtimePage` | Runtime info page |\n| `settingsPage` | Full settings page (providers, models, tools, security, network, budget, proactive memory, migration) |\n| `settingsPage2` | Supplementary settings controls |\n| `workflowsPage` | Workflow list & runner |\n| `workflowBuilder` | Visual workflow builder (drag-and-drop canvas) |\n| `schedulerPage` | Cron jobs, event triggers, run history |\n| `channelsPage` | Messaging channel setup (Telegram, Discord, Slack, WhatsApp, etc.) |\n| `skillsPage` | Skills browser, ClawHub integration, MCP servers, quick-start skills |\n| `handsPage` | Hands ŌĆö curated autonomous capability packages |\n| `pluginsPage` | Plugin management |\n| `commsPage` | Inter-agent communication & task board |\n| `goalsPage` | Goal tracking with sub-goals |\n| `analyticsPage` | Usage analytics, token/cost breakdowns |\n| `memoryPage` | Proactive memory browser |\n| `setupWizard` | First-run setup wizard (welcome ŌåÆ provider ŌåÆ agent ŌåÆ try ŌåÆ channel ŌåÆ done) |\n| `security` | Security system short labels |\n| `onboarding` | First-visit onboarding banner |\n| `provider` | LLM provider setup |\n| `overview` | Dashboard overview cards & recent activity |\n| `time` | Relative time formatting |\n| `mode` | Agent mode labels (Observe / Assist / Full) |\n| `category` | Skill/template categories |\n| `profile` | Tool profile descriptions (Minimal ŌåÆ Full) |\n| `template` | Agent template names & descriptions |\n| `theme` | Theme selector labels |\n| `sidebar` | Sidebar keyboard shortcut hints |\n| `confirm` | Generic confirm dialog buttons |\n| `setupWizard2` | Supplementary wizard controls |\n\n## Interpolation\n\nStrings use **brace-delimited placeholders** for dynamic values:\n\n```json\n\"stepsCompleted\": \"{count} of 5 steps completed\"\n\"providerConnected\": \"{provider} connected ({latency}ms)\"\n```\n\nThe frontend substitutes these at render time. There is no pluralization library embedded in the locale files ŌĆö plural handling is done per-key (e.g., separate `noSessionsYet` vs. `sessionsCreatedWhen`).\n\n## Adding a New Language\n\n1. Copy `en.json` to a new file named with the appropriate [ISO 639-1 code](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) (e.g., `de.json` for German).\n2. Translate all string values. **Do not change keys or structure** ŌĆö the frontend references keys by path.\n3. Keep interpolation tokens (`{count}`, `{message}`, `{name}`, etc.) intact in translated strings.\n4. Register the new locale in the frontend's i18n configuration (outside this module).\n\n## Adding New Strings\n\nWhen adding UI features:\n\n1. **Find the right namespace.** If the feature lives on an existing page, add keys to that page's namespace (e.g., `agentsPage.newKey`). For cross-cutting strings, use a generic namespace (`btn`, `label`, `status`).\n2. **Add the key to every locale file.** Missing keys fall back to `en.json`, but leaving other locales incomplete degrades the experience for those users.\n3. **Use descriptive key names.** Prefer `deleteFailed` over `error2`. Group related keys under a sub-object when there are more than a handful.\n\n## Namespace Design Patterns\n\nThe files follow several conventions worth noting when extending them:\n\n### Toast messages\n\nActions that produce transient feedback place toast strings adjacent to the action, not in a central `toast` namespace:\n\n```json\n\"agentsPage\": {\n  \"agentSpawned\": \"Agent \\\"{name}\\\" spawned\",\n  \"spawnFailed\": \"Spawn failed: {message}\"\n}\n```\n\n### Nested sub-namespaces\n\nLarge pages use nested objects for logical grouping:\n\n```json\n\"agentChat\": {\n  \"cmd\": { \"help\": \"...\", \"model\": \"...\" },\n  \"toast\": { \"modelSwitched\": \"...\", \"switchFailed\": \"...\" },\n  \"sys\": { \"compacting\": \"...\", \"compactDone\": \"...\" }\n}\n```\n\n### Enum-like sets\n\nStatus values, filter options, and categories are grouped even when there are only a few:\n\n```json\n\"approvals\": {\n  \"filter\": { \"all\": \"All\", \"pending\": \"Pending\", \"approved\": \"Approved\", \"rejected\": \"Rejected\" },\n  \"status\": { \"pending\": \"Pending\", \"approved\": \"Approved\", \"rejected\": \"Rejected\", \"expired\": \"Expired\" }\n}\n```\n\n### Shared vs. page-specific keys\n\nCommon actions (save, delete, cancel) live in `btn.*`. Page-specific labels live in their own namespace even if the text overlaps ŌĆö this keeps each page self-contained and simplifies independent translation.\n\n## Relationship to the Rest of the Codebase\n\n- **Frontend components** import from these files via the i18n layer and reference keys by dotted path (e.g., `t('agentsPage.spawnAgent')`).\n- **The API server** serves the `static/` directory as-is ŌĆö no build step or transformation occurs server-side.\n- **Security feature descriptions** in `settingsPage.coreFeatures`, `settingsPage.configurableFeatures`, and `settingsPage.monitoringFeatures` are the canonical user-facing descriptions of the security subsystems implemented in the Rust kernel. Keep these in sync when security behavior changes.","other-librefang-api-tests":"# Other ŌĆö librefang-api-tests\n\n# librefang-api-tests ŌĆö HTTP Integration Tests\n\n## Purpose\n\nThis test binary (`api_integration_test`) exercises the full LibreFang API stack end-to-end. Each test boots a real `LibreFangKernel`, starts an actual `axum` HTTP server on a random port, and fires real `reqwest` HTTP calls against it. There are **no mocks** ŌĆö the router, middleware, kernel, and audit chain are all production code.\n\nTests that require a live LLM response are gated behind the `GROQ_API_KEY` environment variable and skip gracefully when it is absent.\n\n```mermaid\nflowchart TD\n    subgraph \"Test Infrastructure\"\n        TS[start_test_server]\n        TSL[start_test_server_with_llm]\n        TSA[start_test_server_with_auth]\n        SFR[start_full_router]\n        SFRP[start_full_router_with_proactive]\n        SRBAC[start_test_server_with_rbac_users]\n    end\n\n    subgraph \"Per-Test Server Stack\"\n        TMP[tempdir + config.toml]\n        K[LibreFangKernel::boot_with_config]\n        AS[AppState]\n        R[Router with routes + middleware]\n        LISTEN[\"TcpListener bind(127.0.0.1:0)\"]\n    end\n\n    subgraph \"Clients\"\n        REQ[reqwest::Client]\n        ONESHOT[\"tower ServiceExt::oneshot\"]\n    end\n\n    TS --> TMP --> K --> AS --> R --> LISTENER\n    TSL --> TMP\n    TSA --> TMP\n    SFR --> TMP\n\n    REQ -->|\"HTTP over TCP\"| LISTEN\n    ONESHOT -->|\"in-process\"| R\n```\n\n## Running\n\n```bash\n# All integration tests (no LLM required)\ncargo test -p librefang-api --test api_integration_test -- --nocapture\n\n# Include LLM-gated tests\nGROQ_API_KEY=... cargo test -p librefang-api --test api_integration_test -- --nocapture\n```\n\nAll tests use `#[tokio::test(flavor = \"multi_thread\")]` because the kernel spawns background tasks during boot.\n\n---\n\n## Test Infrastructure\n\n### `TestServer`\n\nHolds a fully-booted HTTP server listening on a random port. Provides:\n- `base_url` ŌĆö e.g. `http://127.0.0.1:49152`\n- `config_path` ŌĆö path to the written `config.toml` in a temp directory\n- `state` ŌĆö `Arc<AppState>` shared with the running server\n- `_tmp` ŌĆö `tempfile::TempDir` that cleans up on drop\n\nOn `Drop`, calls `state.kernel.shutdown()` to tear down the kernel gracefully.\n\n### `FullRouterHarness`\n\nUses `server::build_router` (the same function production uses) to construct the complete router including versioned API aliases, dashboard assets, and all nested sub-routers. Does **not** bind a TCP listener ŌĆö tests call `app.clone().oneshot(request)` to exercise the router in-process. This harness is used for tests that need routes not present in the minimal `TestServer` router (e.g. `/api/v1/*`, `/locales/*`, `/api/providers`, `/api/hands/*`, `/api/migrate`, `/api/memory/*`).\n\n### Server Construction Helpers\n\n| Helper | LLM Provider | Auth | Use Case |\n|---|---|---|---|\n| `start_test_server()` | ollama (no key) | disabled | Most tests ŌĆö agent lifecycle, pagination, tools, triggers |\n| `start_test_server_with_llm()` | groq (needs `GROQ_API_KEY`) | disabled | Real LLM round-trip through kernel |\n| `start_test_server_with_provider(provider, model, env)` | configurable | disabled | Internal; called by the two above |\n| `start_test_server_with_auth(api_key)` | ollama | Bearer token | Auth rejection/acceptance tests |\n| `start_full_router(api_key)` | ollama | via `build_router` | Full production router, in-process |\n| `start_full_router_with_proactive(enabled)` | ollama | via `build_router` | Memory endpoint tests |\n| `start_test_server_with_rbac_users(api_key, users)` | ollama | Bearer + RBAC roles | Audit, budget, authz, user policy tests |\n| `start_test_server_with_full_user_configs(api_key, users)` | ollama | Bearer + RBAC roles | Effective-permissions snapshot tests with full `UserConfig` |\n\n### Utility Functions\n\n- **`loopback_get(uri)`** ŌĆö Builds a `Request<Body>` with a loopback `ConnectInfo` extension injected. Required for oneshot tests that hit non-public endpoints because `axum` oneshot doesn't populate `ConnectInfo` from a real TCP connection; without it the fail-closed auth branch treats the request as non-loopback and returns 401.\n- **`call_mcp_cron_list(server, agent_header)`** ŌĆö Sends a JSON-RPC `tools/call` for `cron_list` to `/mcp`, optionally with an `X-LibreFang-Agent-Id` header. Returns `(StatusCode, serde_json::Value)`.\n\n### Test Manifests\n\nFour TOML manifest constants are defined for spawning test agents:\n\n| Constant | Provider | Capabilities | Purpose |\n|---|---|---|---|\n| `TEST_MANIFEST` | ollama | `file_read` | Default test agent |\n| `LLM_MANIFEST` | groq | `file_read` | Real LLM test |\n| `MCP_TEST_MANIFEST` | ollama | `cron_list`, `cron_create`, `cron_cancel` | MCP bridge caller-context tests |\n| `UNRESTRICTED_MANIFEST` | ollama | none (no `[capabilities]`) | Tests that empty tool list = unrestricted |\n\n---\n\n## Test Coverage by Area\n\n### Health & Status\n\n- **`test_health_endpoint`** ŌĆö `GET /api/health` returns `{ status: \"ok\", version: \"...\" }`. Verifies `x-request-id` header injection. Confirms public health is redacted (no `database` or `agent_count`).\n- **`test_status_endpoint`** ŌĆö `GET /api/status` returns `running` status, agent count (1 for the auto-spawned assistant), uptime, default provider, and agent array.\n\n### Router Versioning & Middleware\n\n- **`test_build_router_exposes_versioned_api_aliases`** ŌĆö Both `/api/health` and `/api/v1/health` resolve, both set `x-api-version: v1`. `/api/versions` returns `{ current: \"v1\", supported: [\"v1\"] }`.\n- **`test_build_router_path_version_beats_unknown_accept_header`** ŌĆö Path-based version (`/api/v1/`) takes precedence over an `Accept: application/vnd.librefang.v99+json` header.\n- **`test_request_id_header_is_uuid`** ŌĆö The `x-request-id` middleware emits a valid UUID.\n\n### Dashboard & Locales\n\n- **`test_build_router_serves_dashboard_locales`** ŌĆö `/locales/en.json`, `/locales/zh-CN.json`, `/locales/ja.json` all return 200 with correct `nav.chat` translations.\n\n### Providers\n\n- **`test_build_router_providers_marks_local_providers`** ŌĆö `GET /api/providers` includes ollama with `is_local: true`.\n\n### Config Reload\n\n- **`test_config_reload_hot_reloads_proxy_changes`** ŌĆö `POST /api/config/reload` with a new `[proxy]` section returns `{ restart_required: false, hot_actions_applied: [\"ReloadProxy\"] }`.\n\n### Agent Lifecycle\n\n- **`test_spawn_list_kill_agent`** ŌĆö Full CRUD: spawn ŌåÆ verify 201 + agent_id ŌåÆ list (2 agents) ŌåÆ kill ŌåÆ list (1 agent).\n- **`test_multiple_agents_lifecycle`** ŌĆö Spawns 3 agents, verifies list counts at each step, kills them one by one.\n- **`test_invalid_agent_id_returns_400`** ŌĆö Non-UUID path parameters on `/message`, kill, and session endpoints return 400.\n- **`test_kill_nonexistent_agent_returns_404`** ŌĆö Valid UUID that doesn't map to an agent returns 404.\n- **`test_spawn_invalid_manifest_returns_400`** ŌĆö Malformed TOML returns 400 with \"Invalid manifest\".\n- **`test_send_message_with_llm`** ŌĆö (Gated on `GROQ_API_KEY`) Spawns an agent with Groq, sends a message, asserts non-empty response, positive token counts, and session message count > 0.\n\n### Agent Sessions\n\n- **`test_agent_session_empty`** ŌĆö Fresh agent session has `message_count: 0`.\n- **`test_get_agent_session_rejects_cross_agent_session_id`** ŌĆö Regression guard for PR #3071: requesting agent A's session endpoint with agent B's `session_id` returns 404. Malformed UUID returns 400. Same-agent round-trip succeeds.\n- **`test_agent_session_trajectory_export_empty`** ŌĆö Default JSON format returns a bundle with `schema_version`, metadata (including `system_prompt_sha256`, `librefang_version`), and empty messages array. JSONL format (`?format=jsonl`) returns `application/x-ndjson` with a metadata header line.\n- **`test_agent_session_trajectory_404_on_unknown_session`** ŌĆö Random UUID returns 404.\n\n### Agent Monitoring\n\n- **`test_agent_monitoring_endpoints`** ŌĆö `GET /agents/{id}/metrics` returns token usage, tool calls, avg response time. `GET /agents/{id}/logs?level=custom_error&n=10` filters audit entries by outcome.\n\n### Agent List Pagination & Filtering\n\n- **`test_agent_list_paginated_response_format`** ŌĆö Response shape: `{ items, total, offset, limit }`. `limit` is null when unspecified.\n- **`test_agent_list_invalid_sort_returns_400`** ŌĆö Unknown sort field returns 400 with error mentioning the field.\n- **`test_agent_list_valid_sort_fields`** ŌĆö `name`, `created_at`, `last_active`, `state` all return 200.\n- **`test_agent_list_limit_clamped_to_max`** ŌĆö `limit=9999` is clamped to 100.\n- **`test_agent_list_pagination`** ŌĆö `limit=1&offset=0` and `offset=1` return distinct single-item pages.\n- **`test_agent_list_text_search`** ŌĆö `q=unique-searchable` matches by name/description. Non-matching query returns empty array.\n\n### Workflows & Triggers\n\n- **`test_workflow_crud`** ŌĆö Create workflow with steps referencing an agent name ŌåÆ list ŌåÆ verify shape.\n- **`test_trigger_crud`** ŌĆö Create lifecycle trigger ŌåÆ list (unfiltered and filtered by `agent_id`) ŌåÆ delete ŌåÆ verify empty.\n\n### Authentication\n\n- **`test_auth_health_is_public`** ŌĆö `/api/health` accessible without auth even when `api_key` is set.\n- **`test_auth_rejects_no_token`** ŌĆö Protected endpoint without `Authorization` header returns 401 \"Missing\".\n- **`test_auth_rejects_wrong_token`** ŌĆö Wrong Bearer token returns 401 \"Invalid\".\n- **`test_auth_accepts_correct_token`** ŌĆö Correct token returns 200.\n- **`test_auth_disabled_when_no_key`** ŌĆö Empty API key = auth disabled; protected endpoints accessible.\n- **`test_build_router_unauthorized_responses_include_api_version_header`** ŌĆö Even 401 responses carry `x-api-version: v1`.\n\n### Tools\n\n- **`test_list_tools`** ŌĆö Returns `{ tools: [...], total: N }` with `total > 0`.\n- **`test_get_tool_found`** ŌĆö Fetches first tool by name, verifies `description` and `input_schema`.\n- **`test_get_tool_not_found`** ŌĆö Unknown tool name returns 404.\n\n### Hands\n\n- **`list_active_hands_includes_definition_metadata`** ŌĆö Installs a hand definition, activates it, sets multi-role agents. Verifies `/api/hands/active` includes `hand_name`, `hand_icon`, `coordinator_role`, and `agent_ids` object mapping role names to agent IDs.\n- **`hand_runtime_config_patch_supports_tristate_and_404`** ŌĆö `PATCH /api/agents/{id}/hand-runtime-config` with:\n  - **Set override**: `model`, `provider`, `api_key_env`, `base_url`, `max_tokens`, `temperature`, `web_search_augmentation` ŌĆö all applied.\n  - **Preserve (missing field)**: omitting `api_key_env`/`base_url` leaves prior override unchanged.\n  - **Clear (empty/whitespace)**: `\"api_key_env\": \"   \"` or `\"base_url\": \"\"` clears the override without disturbing unrelated fields.\n  - **404**: unknown agent ID returns `NOT_FOUND`.\n\n### MCP Bridge\n\n- **`test_mcp_http_rehydrates_caller_context_from_agent_header`** ŌĆö Regression guard for issue #2699. Without `X-LibreFang-Agent-Id`, `cron_list` returns error (\"Agent ID required\"). With the header pointing to a registered agent that has `cron_list` in its capabilities, the call succeeds.\n- **`test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated`** ŌĆö Garbage or unknown UUID in the header degrades gracefully to the unauthenticated path (error, not 500).\n- **`test_mcp_http_unrestricted_agent_can_call_any_tool`** ŌĆö An agent with no `[capabilities]` section (unrestricted) can call `cron_list` through the bridge.\n- **`test_mcp_http_enforces_agent_tool_allowlist`** ŌĆö An agent whose manifest only grants `file_read` is denied `cron_list` with \"Permission denied\".\n\n### Multi-Client SSE Streaming\n\n- **`test_attach_session_stream_fans_out_to_multiple_clients`** ŌĆö Two concurrent `GET /api/agents/{id}/sessions/{sid}/stream` connections are opened. The test polls `receiver_count` on the broadcast channel until both are subscribed, then publishes a `StreamEvent::TextDelta`. Both clients receive the event.\n- **`test_attach_session_stream_404_for_unknown_agent`** ŌĆö Unknown agent + session returns 404.\n\n### Memory Endpoints\n\n- **`test_memory_list_returns_200_when_proactive_disabled`** ŌĆö `/api/memory` returns 200 (not 500) with `{ proactive_enabled: false, total: 0, memories: [] }`.\n- **`test_memory_stats_returns_200_when_proactive_disabled`** ŌĆö `/api/memory/stats` returns 200 with `{ proactive_enabled: false, stats: null }`.\n- **`test_memory_list_includes_proactive_enabled_when_enabled`** and **`test_memory_stats_includes_proactive_enabled_when_enabled`** ŌĆö Verify the flag is `true` and existing fields remain.\n\n### Migration\n\n- **`test_run_migrate_uses_daemon_home_when_target_dir_is_empty`** ŌĆö `POST /api/migrate` with `target_dir: \"\"` writes to the daemon's home directory. Injects loopback `ConnectInfo` so the auth layer allows the request.\n\n### RBAC ŌĆö Audit Endpoints\n\n- **`test_audit_query_rejects_anonymous`** ŌĆö No Bearer header ŌåÆ 401 at middleware.\n- **`test_audit_query_rejects_viewer_admin_returns_200`** ŌĆö Viewer ŌåÆ 403 (in-handler `require_admin` gate). Admin ŌåÆ 200 with `{ entries, count, limit }`.\n- **`test_audit_export_csv_emits_documented_headers`** ŌĆö CSV export returns `Content-Type: text/csv`, `Content-Disposition: attachment; filename=audit.csv`, and the documented header row including `prev_hash` as the final column.\n\n### RBAC ŌĆö Budget Endpoints\n\n- **`test_user_budget_detail_includes_enforced_true`** ŌĆö `/api/budget/users/Alice` returns `{ enforced: true, hourly: { spend }, daily: { spend }, monthly: { spend }, alert_breach }`.\n\n### RBAC ŌĆö Effective Permissions\n\n- **`test_effective_permissions_admin_returns_200_with_full_payload`** ŌĆö Seeds a user with non-default `tool_policy`, `tool_categories`, `memory_access`, `budget`, `channel_tool_rules`, and `channel_bindings`. Verifies every field round-trips through `/api/authz/effective/Alice`.\n- **`test_effective_permissions_viewer_rejected_403`** ŌĆö Viewer denied by in-handler `require_admin`.\n- **`test_effective_permissions_unknown_user_404`** ŌĆö Unknown user returns 404 (not synthesised defaults).\n- **`test_effective_permissions_rejects_anonymous`** ŌĆö Anonymous ŌåÆ 401 at middleware.\n- **`test_effective_permissions_distinguishes_none_from_empty`** ŌĆö A user with `tool_policy: None` serialises as `null`; a user with `tool_policy: Some(UserToolPolicy::default())` serialises as `{ allowed_tools: [], denied_tools: [] }`. Prevents regressions where the snapshot collapses \"not configured\" vs \"configured empty\".\n\n---\n\n## How to Add a New Integration Test\n\n1. Choose the right server helper. Most tests need `start_test_server()`. If you need routes only present in the full production router, use `start_full_router(\"\")`.\n2. If testing auth, use `start_test_server_with_auth(\"your-key\")` or `start_test_server_with_rbac_users(...)` for role-based tests.\n3. For in-process tests (no TCP), use a `FullRouterHarness` and call `harness.app.clone().oneshot(request)`. Remember to inject `ConnectInfo` via `loopback_get()` for non-public endpoints.\n4. Clean up is automatic ŌĆö `TestServer` and `FullRouterHarness` both call `kernel.shutdown()` on drop, and `TempDir` cleans the filesystem.\n5. If the test requires a real LLM, guard it with `if std::env::var(\"GROQ_API_KEY\").is_err() { return; }` and use `start_test_server_with_llm()`.","other-librefang-api":"# Other ŌĆö librefang-api\n\n# librefang-api\n\nThe HTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate is the primary entry point for external clients ŌĆö dashboard UIs, CLI tools, and programmatic integrations ŌĆö exposing the full agent lifecycle over a RESTful and real-time WebSocket surface.\n\n## Architecture\n\n`librefang-api` sits at the top of the crate dependency graph, importing nearly every other `librefang-*` crate to compose a unified server. It does not contain business logic itself; instead it wires together the kernel, runtime, memory, channels, skills, and extensions behind HTTP/WebSocket handlers.\n\n```mermaid\ngraph TD\n    Client[HTTP / WS Clients] --> API[librefang-api<br>axum handlers]\n    API --> Kernel[librefang-kernel]\n    API --> Runtime[librefang-runtime]\n    API --> Memory[librefang-memory]\n    API --> Channels[librefang-channels]\n    API --> Skills[librefang-skills]\n    API --> Hands[librefang-hands]\n    API --> Extensions[librefang-extensions]\n    API --> LLM[librefang-llm-drivers]\n    API --> Wire[librefang-wire]\n    API --> Migrate[librefang-migrate]\n    API --> Telemetry[librefang-telemetry]\n    API --> Types[librefang-types]\n```\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role in the API |\n|---|---|\n| `axum` / `tower` / `tower-http` | HTTP framework, middleware stack (CORS, compression, tracing, etc.) |\n| `utoipa` | OpenAPI schema generation from handler signatures |\n| `governor` | Request rate limiting |\n| `jsonwebtoken`, `argon2`, `hmac`, `sha2` | Authentication ŌĆö JWT issuance/verification, password hashing, HMAC signatures |\n| `tokio` / `tokio-stream` | Async runtime and stream utilities for WebSocket handling |\n| `portable-pty` | PTY allocation for interactive terminal sessions over WebSocket |\n| `dashmap` | Concurrent maps for in-process state (active sessions, connections) |\n| `include_dir` | Embeds the React dashboard static assets at compile time |\n| `schemars` | JSON Schema generation for API types (used alongside `utoipa`) |\n\n## Feature Flags\n\nThe crate uses feature flags extensively to control which communication channels are compiled in, plus an optional telemetry stack. All features are additive.\n\n### Channel Features\n\nEach `channel-*` feature is forwarded directly to the corresponding feature in `librefang-channels`. The supported channels are:\n\n`telegram`, `discord`, `slack`, `matrix`, `email`, `voice`, `webhook`, `whatsapp`, `signal`, `teams`, `mattermost`, `irc`, `google-chat`, `twitch`, `rocketchat`, `zulip`, `xmpp`, `bluesky`, `feishu`, `line`, `mastodon`, `messenger`, `reddit`, `revolt`, `viber`, `flock`, `guilded`, `keybase`, `nextcloud`, `nostr`, `pumble`, `threema`, `twist`, `webex`, `dingtalk`, `discourse`, `gitter`, `gotify`, `linkedin`, `mumble`, `ntfy`, `qq`, `wechat`, `wecom`\n\n### Feature Groups\n\n| Feature | Description |\n|---|---|\n| `default` | Enables `all-channels` + `telemetry` |\n| `all-channels` | Every channel listed above |\n| `all-channels-no-email` | All channels except `email`. Required for Android targets where `rustls-platform-verifier` lacks `new_with_extra_roots` support. |\n| `mini` | 12 core channels: telegram, discord, slack, matrix, email, webhook, whatsapp, signal, teams, mattermost, irc, google-chat |\n| `telemetry` | OpenTelemetry tracing export + Prometheus metrics endpoint (`opentelemetry`, `opentelemetry_sdk`, `opentelemetry-otlp`, `tracing-opentelemetry`, `metrics`, `metrics-exporter-prometheus`) |\n\n### Selecting a Minimal Build\n\nTo compile only the channels you need and skip telemetry:\n\n```toml\n# In the workspace or overriding librefang-api\n[dependencies]\nlibrefang-api = { path = \"librefang-api\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n] }\n```\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks at compile time:\n\n### 1. Static Dashboard Directory Scaffolding\n\nCreates `static/react/` inside the crate root if it doesn't exist. This directory is gitignored and normally populated by building the React dashboard (or downloading release assets). `include_dir!` embeds whatever is present at compile time; when the directory is empty, the runtime falls back to serving assets from `~/.librefang/dashboard/`.\n\n### 2. Build Metadata Injection\n\nThree environment variables are emitted and available to the binary via `env!()`:\n\n| Variable | Source | Example Value |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a3f9c12` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\nIf any command fails (e.g., building outside a git repo), the variable defaults to `\"unknown\"`.\n\n### Platform-Specific Dependency\n\nOn Unix targets, the crate depends on `rustix` with the `process` feature. This is used for low-level process operations not covered by the standard library.\n\n## Authentication and Security\n\nThe dependency set indicates a multi-layered auth model:\n\n- **Password hashing**: `argon2` for secure credential storage\n- **JWT**: `jsonwebtoken` for stateless token-based auth on API endpoints\n- **HMAC/SHA-256**: `hmac` + `sha2` for webhook signature verification and request integrity\n- **Constant-time comparison**: `subtle` for timing-safe equality checks (token comparison, signature validation)\n- **Rate limiting**: `governor` provides per-IP or per-key request throttling\n\n## API Surface\n\nThe crate exposes both REST and WebSocket endpoints. Based on the dependency set:\n\n- **REST endpoints** ŌĆö CRUD operations for agent configuration, channel management, extension lifecycle, memory inspection, skill invocation, and LLM driver configuration. Schema documentation is auto-generated via `utoipa`.\n- **WebSocket endpoints** ŌĆö Real-time event streaming, interactive terminal sessions (via `portable-pty`), and agent output streaming (via `tokio-stream`/`futures`).\n- **Dashboard** ŌĆö The React frontend is embedded via `include_dir` and served as static files, with fallback to a user-local directory at runtime.\n\n## Configuration\n\nThe crate uses `toml` and `toml_edit` for reading and modifying persistent configuration files. `toml_edit` preserves formatting and comments when writing back, making it suitable for user-editable config files that the API updates programmatically.\n\n## Migration\n\n`librefang-migrate` is included to run database schema migrations at startup, ensuring the storage layer is up to date before the API begins serving requests.\n\n## Testing\n\nDev dependencies include `tempfile` for filesystem-based tests, `uuid` for generating test identifiers, and `http-body-util` for low-level HTTP body inspection in integration tests.","other-librefang-channels-benches":"# Other ŌĆö librefang-channels-benches\n\n# librefang-channels ŌĆö Dispatch Benchmarks\n\n## Overview\n\nThe `benches/dispatch.rs` benchmark suite measures the hot-path performance of three critical subsystems in `librefang-channels` using [Criterion](https://bheisler.github.io/criterion.rs/book/):\n\n| Benchmark Group | What it measures | Primary APIs under test |\n|---|---|---|\n| **serialization** | JSON round-trip cost of channel messages | `serde_json::to_string` / `from_str` on `ChannelMessage` |\n| **routing** | Agent resolution latency under various routing strategies | `AgentRouter::resolve`, `resolve_with_context` |\n| **formatting** | Markdown-to-output conversion and message splitting | `format_for_channel`, `split_message`, `default_phase_emoji` |\n\nThese represent the per-message overhead on the critical dispatch path ŌĆö every inbound or outbound channel message passes through at least one of these layers.\n\n## Running\n\n```bash\n# All benchmarks\ncargo bench -p librefang-channels\n\n# Single group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n\n# Individual benchmark (substring match)\ncargo bench -p librefang-channels -- router_resolve_direct\n```\n\nCriterion reports are saved under `target/criterion/`. Use `--baseline <name>` and `--save-baseline <name>` to compare across commits.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[dispatch.rs] --> B[serialization group]\n    A --> C[routing group]\n    A --> D[formatting group]\n\n    B --> B1[ChannelMessage serde_json]\n    C --> C1[AgentRouter::resolve]\n    C --> C2[AgentRouter::resolve_with_context]\n    D --> D1[format_for_channel]\n    D --> D2[split_message]\n    D --> D3[default_phase_emoji]\n```\n\n## Test Fixture\n\n`make_sample_message()` constructs a representative `ChannelMessage` used across all serialization benchmarks:\n\n```rust\nChannelMessage {\n    channel: ChannelType::Telegram,\n    platform_message_id: \"msg-12345\",\n    sender: ChannelUser { platform_id: \"user-42\", display_name: \"Alice\", .. },\n    content: ChannelContent::Text(\"Hello, how can you help me today?\"),\n    timestamp: Utc::now(),\n    metadata: HashMap::new(),  // empty\n    ..Default::default()\n}\n```\n\nThi
