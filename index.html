river] -->|implements| LD\n    MLD -->|records| RC[RecordedCall]\n```\n\n**Two independent testing tracks:**\n\n1. **API route testing** — `MockKernelBuilder` → `TestAppState` → `Router` → send requests via `tower::ServiceExt::oneshot`, assert responses with helpers.\n2. **LLM behavior testing** — `MockLlmDriver` / `FailingLlmDriver` implement the `LlmDriver` trait directly, usable wherever a driver is injected.\n\n---\n\n## Key Components\n\n### `MockKernelBuilder`\n\nBuilds a real `LibreFangKernel` instance with a minimal environment:\n\n- **In-memory-capable SQLite** — database file lives under a temp directory.\n- **Temp directory tree** — creates `data/`, `skills/`, `workspaces/agents/`, `workspaces/hands/` automatically.\n- **Networking disabled** — `network_enabled` is set to `false`.\n- **Custom config** — `with_config` accepts a closure to override any `KernelConfig` field before boot.\n\n```rust,ignore\nlet (kernel, _tmp) = MockKernelBuilder::new()\n    .with_config(|cfg| {\n        cfg.language = \"zh\".into();\n        cfg.default_model.provider = \"test\".into();\n    })\n    .build();\n```\n\n**Important:** The returned `TempDir` must be held for the lifetime of the kernel. Dropping it deletes the underlying files and invalidates any path-based operations.\n\nConvenience function: `test_kernel()` is equivalent to `MockKernelBuilder::new().build()`.\n\n### `MockLlmDriver`\n\nA configurable fake that implements `LlmDriver`. Features:\n\n- **Canned responses** — provide a `Vec<String>` at construction; responses are returned in order. When the list is exhausted, the last response repeats.\n- **Call recording** — every call to `complete` or `stream` pushes a `RecordedCall` with `model`, `message_count`, `tool_count`, and `system`.\n- **Builder customization** — `with_tokens(input, output)` and `with_stop_reason(reason)` override defaults.\n- **Streaming simulation** — `stream` sends a `TextDelta` event followed by `ContentComplete`.\n\n```rust,ignore\nlet driver = MockLlmDriver::new(vec![\"Hello\".into(), \"World\".into()])\n    .with_tokens(100, 50)\n    .with_stop_reason(StopReason::EndTurn);\n\nlet resp = driver.complete(request).await.unwrap();\nassert_eq!(driver.call_count(), 1);\nassert_eq!(driver.recorded_calls()[0].model, \"test-model\");\n```\n\n### `FailingLlmDriver`\n\nAlways returns `LlmError::Api` with the given message. Useful for testing error-handling paths.\n\n```rust,ignore\nlet driver = FailingLlmDriver::new(\"simulated failure\");\nassert!(driver.complete(request).await.is_err());\nassert!(!driver.is_configured());\n```\n\n### `TestAppState`\n\nWraps `MockKernelBuilder` output into a full `AppState` and exposes an axum `Router` with all API routes mounted under `/api`. This is the primary entry point for HTTP-level route tests.\n\nConstruction paths:\n- `TestAppState::new()` — default mock kernel.\n- `TestAppState::with_builder(builder)` — custom `MockKernelBuilder`.\n- `TestAppState::from_kernel(kernel, tmp)` — pre-built kernel, caller holds `TempDir`.\n\nThe `router()` method returns a `Router` covering agents CRUD, skills, config, memory, budget, system endpoints, models, providers, and sessions — matching the production route layout.\n\n```rust,ignore\nlet app = TestAppState::new();\nlet router = app.router();\n\nlet req = test_request(Method::GET, \"/api/health\", None);\nlet resp = router.oneshot(req).await.unwrap();\nlet json = assert_json_ok(resp).await;\n```\n\nThe `state` field is `Arc<AppState>`, accessible for direct kernel inspection (e.g., checking config values or registry state after an operation).\n\n### Helpers\n\n| Function | Purpose |\n|---|---|\n| `test_request(method, path, body)` | Builds an `axum::http::Request<Body>`. Automatically sets `content-type: application/json` when a body is provided. |\n| `assert_json_ok(response)` | Asserts status 200, parses body as JSON. Returns `serde_json::Value`. |\n| `assert_json_error(response, expected_status)` | Asserts status matches, parses body as JSON. Returns `serde_json::Value`. |\n\nAll assertion helpers panic with a descriptive message including the raw response body on failure.\n\n---\n\n## Typical Test Pattern\n\n```rust,ignore\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_something() {\n    // 1. Set up the test app\n    let app = TestAppState::new();\n    let router = app.router();\n\n    // 2. Build a request\n    let req = test_request(Method::POST, \"/api/agents\", Some(r#\"{\"manifest_toml\": \"...\"}\"#));\n\n    // 3. Send it through the router\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n\n    // 4. Assert on the response\n    let json = assert_json_ok(resp).await;\n    assert!(json.get(\"id\").is_some());\n}\n```\n\nTests requiring multi-threaded tokio runtime (anything touching the kernel or SQLite) must use `#[tokio::test(flavor = \"multi_thread\")]`.\n\n---\n\n## Connections to the Rest of the Codebase\n\n`MockKernelBuilder::build` internally calls `LibreFangKernel::boot_with_config`, which exercises the real kernel initialization path including vault unlock, config validation, and database setup. This means:\n\n- **Provider health probes** (`librefang-runtime/src/provider_health.rs`) use the test kernel to build HTTP clients and probe providers.\n- **Plugin manager** (`librefang-runtime/src/plugin_manager.rs`) uses the test kernel for install/list operations.\n- **Skill registries** (`librefang-skills/src/clawhub.rs`, `skillhub.rs`, `marketplace.rs`) use it to test HTTP fetching and catalog sync.\n- **OAuth flows** (`librefang-runtime-oauth`) use it to test device flow start/poll with vault-backed secrets.\n- **MCP connectors** (`librefang-runtime-mcp`) use it for SSE and HTTP transport setup.\n- **Desktop server** (`librefang-desktop/src/server.rs`) uses it in integration tests for the full server startup path.\n\nThe `TestAppState` is specific to `librefang-api` route testing and constructs a production-faithful `AppState` including `WebhookStore`, session tracking, provider probe caches, and media driver caches — all backed by temp files.","type-definitions":"# Type Definitions\n\n# `librefang-types` — Core Type Definitions\n\n## Purpose\n\nThis crate defines every shared data structure used across the LibreFang Agent Operating System — the kernel, runtime, memory substrate, wire protocol, channels, and tooling. It contains **no business logic**: only types, traits, constants, and a small set of pure utility functions.\n\nEvery other crate in the workspace depends on `librefang-types`. Changes here ripple outward, so backward-compatible serde defaults and `#[serde(default)]` annotations are used liberally to tolerate missing fields from older configurations.\n\n## Module Map\n\n```mermaid\ngraph TD\n    lib[\"lib.rs<br/>(VERSION, truncate_str)\"]\n    lib --> agent[\"agent<br/>Identity, Manifest, Lifecycle\"]\n    lib --> approval[\"approval<br/>Approval Gate, Policy\"]\n    lib --> capability[\"capability<br/>Capability matching, glob\"]\n    lib --> config[\"config<br/>Shared config types\"]\n    lib --> error[\"error<br/>LibreFangError enum\"]\n    lib --> tool[\"tool<br/>ToolDefinition\"]\n    lib --> memory[\"memory<br/>Memory records\"]\n    lib --> message[\"message<br/>LLM message types\"]\n    lib --> scheduler[\"scheduler<br/>CronJob, OneShotJob\"]\n    lib --> serde_compat[\"serde_compat<br/>Lenient deserializers\"]\n    lib --> other[\"... 14 more modules\"]\n\n    agent -->|uses| tool\n    agent -->|uses| config\n    agent -->|uses| serde_compat\n    approval -->|uses| capability\n```\n\nThe full submodule list:\n\n| Module | Purpose |\n|--------|---------|\n| `agent` | Agent identity, manifest, lifecycle states, scheduling, experiments |\n| `approval` | Execution approval gate — requests, policy, audit, TOTP |\n| `capability` | Capability matching and glob patterns |\n| `comms` | Inter-agent communication primitives |\n| `config` | Shared configuration types (`ExecPolicy`, `ThinkingConfig`, `ResponseFormat`, etc.) |\n| `error` | Unified `LibreFangError` enum |\n| `event` | Event bus types |\n| `goal` | Goal/task tracking |\n| `i18n` | Internationalization support |\n| `manifest_signing` | Cryptographic manifest signing and verification |\n| `media` | Media/attachment types |\n| `memory` | Memory substrate records and extraction |\n| `message` | LLM message types (`TokenUsage`, etc.) |\n| `model_catalog` | LLM model catalog entries |\n| `registry_schema` | Agent registry serialization |\n| `scheduler` | Cron and one-shot job definitions |\n| `serde_compat` | Lenient deserializers for evolving schemas |\n| `subagent` | Sub-agent spawning types |\n| `taint` | Input taint tracking and validation |\n| `tool` | `ToolDefinition` and schema normalization |\n| `tool_compat` | Tool name migration helpers |\n| `tool_policy` | Per-tool execution policies |\n| `webhook` | Webhook payload types |\n| `workflow_template` | Workflow/template definitions |\n\n---\n\n## Core Identity Types\n\n### `AgentId`\n\nA UUID-based unique identifier for agent instances. Supports two generation modes:\n\n- **Random** (`AgentId::new()`) — UUID v4, for standard agents.\n- **Deterministic** (`AgentId::from_hand_id()` / `AgentId::from_hand_agent()`) — UUID v5 with a fixed namespace, so the same logical entity always maps to the same UUID across daemon restarts.\n\n```rust\n// Random — unique each time\nlet id = AgentId::new();\n\n// Deterministic — same input always yields the same UUID\nlet hand_agent = AgentId::from_hand_agent(\"researcher\", \"analyst\", None);\nlet instance_agent = AgentId::from_hand_agent(\"researcher\", \"analyst\", Some(instance_uuid));\n```\n\nThe `from_hand_agent` method has a backward-compatibility contract: when `instance_id` is `None`, it hashes `\"{hand_id}:{role}\"` (the legacy format). When `Some`, it hashes `\"{hand_id}:{role}:{instance_id}\"`. This ensures existing single-instance hands retain their original IDs after upgrades.\n\n### `UserId`\n\nWrapper around a UUID v4. Used to identify human operators.\n\n### `SessionId`\n\nIdentifies a conversation session. Two construction modes:\n\n- **Random** (`SessionId::new()`) — fresh session per call.\n- **Deterministic** (`SessionId::for_channel(agent_id, channel)`) — UUID v5 derived from agent ID + channel name, so the same agent-channel pair always resumes the same session across restarts.\n\n### `SessionLabel`\n\nA validated human-readable label for sessions (e.g., `\"support inbox\"`, `\"research\"`). Constraints:\n\n- 1–128 characters after trimming\n- Only alphanumeric characters, spaces, hyphens, and underscores\n- Rejected if empty, too long, or containing special characters\n\n---\n\n## Agent Manifest System\n\n`AgentManifest` is the central configuration object that defines everything about an agent. It's typically loaded from TOML on disk and deserialized with lenient defaults.\n\n### Key Fields\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `name` | `String` | Human-readable agent name |\n| `module` | `String` | Agent module path (WASM/Python/builtin) |\n| `schedule` | `ScheduleMode` | How the agent wakes up |\n| `session_mode` | `SessionMode` | Session reuse strategy for automated invocations |\n| `model` | `ModelConfig` | Primary LLM configuration |\n| `fallback_models` | `Vec<FallbackModel>` | Chain of fallback LLMs |\n| `resources` | `ResourceQuota` | Memory, CPU, token, and cost limits |\n| `capabilities` | `ManifestCapabilities` | Declared capability grants |\n| `profile` | `Option<ToolProfile>` | Named tool preset |\n| `tools` | `HashMap<String, ToolConfig>` | Per-tool configuration |\n| `tool_allowlist` / `tool_blocklist` | `Vec<String>` | Tool filtering |\n| `exec_policy` | `Option<ExecPolicy>` | Shell execution policy override |\n| `autonomous` | `Option<AutonomousConfig>` | 24/7 agent guardrails |\n| `routing` | `Option<ModelRoutingConfig>` | Auto model selection by complexity |\n| `thinking` | `Option<ThinkingConfig>` | Per-agent extended thinking override |\n| `response_format` | `Option<ResponseFormat>` | LLM structured output |\n| `allowed_plugins` | `Vec<String>` | Plugin allowlist |\n| `context_injection` | `Vec<ContextInjection>` | Extra context prepended to sessions |\n| `is_hand` | `bool` | Whether spawned by a Hand |\n\n### TOML Deserialization\n\nThe manifest uses `#[serde(default)]` on every field plus custom lenient deserializers from the `serde_compat` module. This means:\n\n- **Missing fields** get sensible defaults\n- **Type mismatches** (e.g., a string where a list is expected) silently fall back to defaults instead of failing\n- **Unknown fields** are ignored\n\nThe `model.system_prompt` field supports both single-line and multi-line TOML strings. Multi-line prompts with triple quotes (`\"\"\"`) are the recommended format from the dashboard wizard, preserving newlines, embedded quotes, and code blocks.\n\nThe `model` field accepts either `model` or `name` as the model identifier key (via `#[serde(alias = \"name\")]`).\n\n---\n\n## Tool Profiles\n\n`ToolProfile` is a named preset that expands to a concrete tool list and derived capabilities:\n\n| Profile | Tools |\n|---------|-------|\n| `Minimal` | `file_read`, `file_list` |\n| `Coding` | `file_read`, `file_write`, `file_list`, `shell_exec`, `web_fetch` |\n| `Research` | `web_fetch`, `web_search`, `file_read`, `file_write` |\n| `Messaging` | `agent_send`, `agent_list`, `channel_send`, `memory_store`, `memory_list`, `memory_recall` |\n| `Automation` | All of Coding + Messaging |\n| `Full` / `Custom` | `[\"*\"]` (all tools) |\n\nEach profile's `implied_capabilities()` method derives a `ManifestCapabilities` struct — for example, `Coding` implies `network: [\"*\"]` and `shell: [\"*\"]`, while `Messaging` implies `agent_spawn: true`.\n\n---\n\n## Agent Lifecycle & Modes\n\n### `AgentState`\n\n```rust\npub enum AgentState {\n    Created,    // Spawned but not yet started\n    Running,    // Actively processing\n    Suspended,  // Paused\n    Terminated, // Cannot be resumed\n    Crashed,    // Awaiting recovery\n}\n```\n\n### `AgentMode` — Permission Levels\n\nControls what tools an agent can access:\n\n| Mode | Behavior |\n|------|----------|\n| `Observe` | No tools at all |\n| `Assist` | Read-only tools only: `file_read`, `file_list`, `memory_list`, `memory_recall`, `web_fetch`, `web_search`, `agent_list` |\n| `Full` | All granted tools (default) |\n\n`AgentMode::filter_tools()` applies the restriction to a `Vec<ToolDefinition>` at runtime.\n\n### `ScheduleMode`\n\n| Variant | Trigger |\n|---------|---------|\n| `Reactive` | Message/event arrival (default) |\n| `Periodic { cron }` | Cron schedule |\n| `Proactive { conditions }` | Condition threshold monitoring |\n| `Continuous { check_interval_secs }` | Persistent loop (default: 300s) |\n\n### `SessionMode`\n\nControls session behavior for non-channel (automated) invocations:\n\n- `Persistent` — reuse the agent's session (default, backward-compatible)\n- `New` — fresh session per invocation\n\n---\n\n## Model Configuration\n\n### `ModelConfig`\n\nPrimary LLM settings per agent:\n\n- `provider`, `model` (or `name` alias) — which LLM to use\n- `max_tokens`, `temperature` — generation parameters\n- `system_prompt` — agent's persona/instructions\n- `api_key_env`, `base_url` — provider-specific overrides\n- `extra_params` — `HashMap<String, serde_json::Value>` flattened into the API request body via `#[serde(flatten)]`. Used for provider-specific features (e.g., Qwen's `enable_memory`). Conflicting keys override standard fields.\n\n### `ModelRoutingConfig`\n\nAuto-selects between cheap/mid/expensive models based on prompt token count:\n\n```toml\n[routing]\nsimple_model = \"claude-haiku-4-5-20251001\"\nmedium_model = \"claude-sonnet-4-20250514\"\ncomplex_model = \"claude-sonnet-4-20250514\"\nsimple_threshold = 100\ncomplex_threshold = 500\n```\n\n### `FallbackModel`\n\nDefines a fallback chain. If the primary model fails, each fallback is tried in order. Has the same fields as `ModelConfig` minus `system_prompt`/`max_tokens`/`temperature`.\n\n### `AutonomousConfig`\n\nGuardrails for 24/7 autonomous agents:\n\n- `quiet_hours` — cron expression for downtime\n- `max_iterations` — per-invocation loop cap (default: 50)\n- `max_restarts` — crash recovery limit (default: 10)\n- `heartbeat_interval_secs` — health check frequency (default: 30)\n- `heartbeat_timeout_secs` — optional per-agent timeout override\n- `heartbeat_keep_recent` — how many NO_REPLY turns to keep\n- `heartbeat_channel` — where to send heartbeat alerts\n\n---\n\n## Approval System\n\nThe approval module implements a human-in-the-gate system for dangerous operations. When an agent attempts a tool in the approval list, execution pauses until a human responds.\n\n### Core Flow\n\n```mermaid\nsequenceDiagram\n    participant A as Agent\n    participant K as Kernel\n    participant H as Human Operator\n    A->>K: Tool call (shell_exec)\n    K->>K: Check ApprovalPolicy\n    K->>H: ApprovalRequest (risk=High)\n    Note over A: Agent paused\n    H->>K: ApprovalResponse (Approved/Denied/ModifyAndRetry)\n    K->>A: Resume or reject\n```\n\n### `ApprovalDecision`\n\n| Variant | Serializable As | Behavior |\n|---------|----------------|----------|\n| `Approved` | `\"approved\"` | Proceed |\n| `Denied` | `\"denied\"` | Block, agent notified |\n| `TimedOut` | `\"timed_out\"` | Auto-deny after timeout |\n| `Skipped` | `\"skipped\"` | Skip tool, agent continues |\n| `ModifyAndRetry { feedback }` | `{\"type\":\"modify_and_retry\",\"feedback\":\"...\"}` | Human requests modification |\n\nSimple variants serialize as plain strings for backward compatibility. `ModifyAndRetry` serializes as an object. The custom deserializer handles both formats transparently.\n\n### `ApprovalPolicy`\n\nConfigured globally and optionally per-agent:\n\n- **`require_approval`** — list of tool names (or `true`/`false` shorthand). Default: `[\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\"]`\n- **`timeout_secs`** — auto-deny window (10–300 seconds, default 60)\n- **`auto_approve`** — shorthand: if `true`, clears the require list at boot\n- **`trusted_senders`** — user IDs that bypass the approval gate\n- **`channel_rules`** — per-channel tool allow/deny lists with glob support\n- **`timeout_fallback`** — behavior on timeout: `Deny`, `Skip`, or `Escalate`\n- **`second_factor`** — TOTP verification: `None`, `Totp`, `Login`, or `Both`\n- **`totp_tools`** — which tools require TOTP (empty = all in `require_approval`)\n- **`totp_grace_period_secs`** — skip re-verification within this window (max 3600)\n- **`routing`** — route specific tool approvals to specific notification targets\n\n### `ChannelToolRule`\n\nPer-channel tool authorization with glob patterns:\n\n```toml\n[[approval.channel_rules]]\nchannel = \"telegram\"\nallowed_tools = [\"file_*\"]\ndenied_tools = [\"shell_exec\"]\n```\n\nEvaluation rules:\n1. If the tool matches any denied pattern → **denied** (deny-wins)\n2. If there's an allow list, the tool must match at least one pattern → otherwise **denied**\n3. Empty allow + no deny match → **no opinion** (falls through to default policy)\n\nWildcard patterns use `capability::glob_matches` — supports a single `*` (e.g., `\"file_*\"`, `\"*_exec\"`, `\"*\"`).\n\n### `RiskLevel`\n\n| Level | Emoji | Meaning |\n|-------|-------|---------|\n| `Low` | ℹ️ | Informational |\n| `Medium` | ⚠️ | Caution |\n| `High` | 🚨 | Dangerous operation |\n| `Critical` | ☠️ | Destructive/unrecoverable |\n\n### Validation\n\nBoth `ApprovalRequest` and `ApprovalPolicy` expose `validate()` methods that check field bounds (tool name length, description length, timeout range, sender counts, etc.). The kernel calls these before persisting or acting on untrusted input.\n\n---\n\n## Session Management\n\n`SessionId::for_channel(agent_id, channel)` derives a deterministic UUID v5 session key. This is the mechanism by which the same Telegram/Discord/WhatsApp conversation always resumes the same agent context across daemon restarts.\n\nThe `SessionMode` field on the manifest controls behavior for non-channel invocations (cron ticks, triggers, `agent_send` calls):\n\n- `Persistent` — always resume the existing session\n- `New` — create a fresh session each time\n\n---\n\n## Resource Quotas\n\n`ResourceQuota` defines per-agent limits:\n\n| Field | Default |\n|-------|---------|\n| `max_memory_bytes` | 256 MB |\n| `max_cpu_time_ms` | 30,000 ms |\n| `max_tool_calls_per_minute` | 60 |\n| `max_llm_tokens_per_hour` | 0 (unlimited) |\n| `max_network_bytes_per_hour` | 100 MB |\n| `max_cost_per_hour_usd` | 0.0 (unlimited) |\n| `max_cost_per_day_usd` | 0.0 (unlimited) |\n| `max_cost_per_month_usd` | 0.0 (unlimited) |\n\n---\n\n## Prompt Experiments (A/B Testing)\n\nThe types define a complete A/B testing framework for prompt variants:\n\n- **`PromptExperiment`** — defines an experiment with traffic splits, success criteria, and variants\n- **`ExperimentVariant`** — maps to a `PromptVersion`\n- **`SuccessCriteria`** — configurable pass conditions (user helpful, no tool errors, non-empty, custom score)\n- **`ExperimentVariantMetrics`** — aggregated results per variant\n- **`ExperimentStatus`** — lifecycle: `Draft` → `Running` → `Paused` → `Completed`\n\n---\n\n## Hook Events\n\n`HookEvent` defines interception points in the agent loop:\n\n| Event | When |\n|-------|------|\n| `BeforeToolCall` | Before a tool executes; handler can block |\n| `AfterToolCall` | After tool completion |\n| `BeforePromptBuild` | Before system prompt construction |\n| `AgentLoopEnd` | After the agent loop completes |\n\n---\n\n## Agent Identity\n\n`AgentIdentity` provides visual metadata for dashboard display:\n\n```toml\n[identity]\nemoji = \"🤖\"\navatar_url = \"https://example.com/bot.png\"\ncolor = \"#FF5C00\"\narchetype = \"assistant\"\nvibe = \"friendly\"\ngreeting_style = \"warm\"\n```\n\n`AgentEntry` stores the full runtime state of a registered agent: its ID, manifest, lifecycle state, mode, parent/children relationships, session, tags, identity, and onboarding status.\n\n---\n\n## Utility Functions\n\n### `truncate_str`\n\n```rust\npub fn truncate_str(s: &str, max_bytes: usize) -> &str\n```\n\nTruncates a string to at most `max_bytes` without splitting a UTF-8 character boundary. Walks backward from the cut point to the nearest character boundary. This was introduced to fix production panics caused by multi-byte characters (em dashes, CJK, emoji) being split mid-sequence.\n\nUsed throughout the kernel and session management for constraining output to wire-protocol limits.\n\n---\n\n## Serde Compatibility (`serde_compat`)\n\nThe `serde_compat` module provides lenient deserializers that tolerate type mismatches by falling back to defaults:\n\n- `vec_lenient` — deserializes `Vec<T>`, returning empty vec on failure\n- `map_lenient` — deserializes `HashMap<K, V>`, returning empty map on failure\n- `exec_policy_lenient` — parses `ExecPolicy` from string shorthand or full table\n\nThese are applied to manifest fields that evolved over time (e.g., `fallback_models`, `skills`, `metadata`) to ensure old config files load without errors on newer versions.\n\n---\n\n## Version Constant\n\n```rust\npub const VERSION: &str = env!(\"CARGO_PKG_VERSION\");\n```\n\nInjected from the workspace `Cargo.toml` at compile time. Used as the default `AgentManifest::version` and exposed to the runtime for diagnostics.\n\n---\n\n## Integration Points\n\nThe types crate is consumed by:\n\n- **`librefang-kernel`** — reads `AgentManifest` from TOML, stores `AgentEntry` in the registry, evaluates `ApprovalPolicy`\n- **`librefang-runtime`** — uses `ModelConfig` to configure LLM drivers, `ResourceQuota` for enforcement\n- **`librefang-runtime-wasm`** — checks `ManifestCapabilities` via `capability::capability_matches`\n- **`librefang-runtime-mcp`** — converts `ToolDefinition` schemas, scans for taint\n- **`librefang-channels`** — uses `SessionId::for_channel` for session binding\n- **`librefang-api`** — serializes types over HTTP/websocket\n- **`librefang-skills`** — maps tool names via `tool_compat`\n- **Dashboard/UI** — consumes JSON-serialized types via the API","website-scripts":"# Website — scripts\n\n# Website — Scripts: `fetch-registry.ts`\n\nBuild-time script that pulls registry data from the `librefang/librefang-registry` GitHub repository and writes it to `public/registry.json` for static consumption by the website.\n\n## Overview\n\nThe Librefang project maintains a separate registry repository containing TOML metadata files for various extension types (hands, channels, providers, etc.). This script resolves that remote data at build time so the website can serve it as a static JSON file without runtime API calls.\n\n## Execution\n\n```bash\n# Direct\nnpx tsx scripts/fetch-registry.ts\n\n# With GitHub token (avoids rate limits on CI)\nGITHUB_TOKEN=ghp_... npx tsx scripts/fetch-registry.ts\n```\n\nThe output is written to `web/public/registry.json`.\n\n## How It Works\n\n```mermaid\nflowchart TD\n    A[main] --> B[\"fetchDir() ×7 categories\"]\n    B --> C[GitHub Contents API]\n    C --> D[\"Filter directories & TOML files\"]\n    D --> E[\"fetchToml() for hands & channels\"]\n    E --> F[\"parseToml()\"]\n    F --> G[\"Write registry.json\"]\n```\n\n1. **Directory listing** — Calls `fetchDir()` for each of the seven registry categories against GitHub's Contents API. This returns all directories (for categories like `hands` and `agents` that are folder-based) or `.toml` files (for flat-file categories).\n\n2. **Detail fetching** — For `hands` and `channels`, fetches the actual TOML content via `raw.githubusercontent.com` and parses it into structured `Detail` objects. Other categories currently only contribute a count.\n\n3. **Serialization** — Assembles all data into a single object and writes it to `public/registry.json`.\n\n## Key Functions\n\n### `fetchDir(path: string): Promise<GHItem[]>`\n\nQueries `https://api.github.com/repos/librefang/librefang-registry/contents/{path}` and returns items that are either directories or `.toml` files, excluding `README.md`. Returns an empty array on failure (non-throwing).\n\n### `parseToml(text: string): Detail`\n\nMinimal TOML parser that extracts:\n\n| Field | Source |\n|-------|--------|\n| `id`, `name`, `description`, `category`, `icon` | Top-level `key = \"value\"` pairs |\n| `tags` | `tags = [\"...\", \"...\"]` array |\n| `i18n` | `[i18n.{lang}]` sections with `description` |\n\nThis is intentionally lightweight — it uses regex matching rather than a full TOML AST, which is sufficient for the flat structure the registry uses.\n\n### `fetchToml(path: string): Promise<Detail | null>`\n\nFetches raw file content from GitHub and passes it through `parseToml`. Returns `null` on any HTTP error.\n\n## Output Schema\n\nThe generated `registry.json` has this shape:\n\n```ts\ninterface RegistryData {\n  hands: Detail[]          // Full parsed TOML details\n  channels: Detail[]       // Full parsed TOML details\n  handsCount: number\n  channelsCount: number\n  providersCount: number\n  integrationsCount: number\n  workflowsCount: number\n  agentsCount: number\n  pluginsCount: number\n  fetchedAt: string        // ISO 8601 timestamp\n}\n\ninterface Detail {\n  id: string\n  name: string\n  description: string\n  category: string\n  icon: string\n  tags?: string[]\n  i18n?: Record<string, { description: string }>\n}\n```\n\nOnly `hands` and `channels` currently produce full `Detail[]` arrays. All other categories contribute a count only.\n\n## GitHub API Authentication\n\nThe script reads `process.env.GITHUB_TOKEN`. When present, it's sent as a `Bearer` token in the `Authorization` header. Unauthenticated requests are rate-limited to 60/hour by GitHub, so setting this token is recommended in CI environments.\n\n## Registry Categories\n\n| Category | Storage format | Fully parsed |\n|----------|---------------|-------------|\n| `hands` | `hands/{id}/HAND.toml` | ✅ |\n| `channels` | `channels/{name}.toml` | ✅ |\n| `providers` | `providers/{name}.toml` | Count only |\n| `integrations` | `integrations/{name}.toml` | Count only |\n| `workflows` | `workflows/{name}.toml` | Count only |\n| `agents` | `agents/{id}/` (directory) | Count only |\n| `plugins` | `plugins/{name}.toml` | Count only |\n\nExtending a category to produce full details requires adding a `fetchToml` call in `main()` with the correct path pattern, then pushing the results into the output object.\n\n## Error Handling\n\n- `fetchDir` logs the failing path and status, then returns `[]` — the build continues with empty data for that category.\n- `fetchToml` returns `null` on HTTP errors; these are filtered out with `.filter(Boolean)` before serialization.\n- Uncaught errors in `main` are caught by `.catch(console.error)`.","website-src":"# Website — src\n\n# Website — `web/src`\n\nThe marketing and documentation site for LibreFang. A single-page React application rendered at `librefang.ai` with client-side routing for locale prefixes, `/deploy`, and `/changelog`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    App[App.tsx] -->|path-based routing| DeployPage[DeployPage]\n    App -->|path-based routing| ChangelogPage[ChangelogPage]\n    App -->|renders| Nav\n    App -->|renders| Hero\n    App -->|renders| Architecture\n    App -->|renders| Hands\n    App -->|renders| Workflows\n    App -->|renders| Performance\n    App -->|renders| Install\n    App -->|renders| Downloads\n    App -->|renders| Docs\n    App -->|renders| FAQ\n    App -->|renders| GitHubStats\n    App -->|renders| Community\n    App -->|renders| Footer\n    App -->|reads| Store[Zustand store]\n    App -->|calls| useRegistry[useRegistry hook]\n    App -->|reads| i18n[translations map]\n    Hands -->|calls| useRegistry\n    Hands -->|calls| getLocalizedDesc\n    Hands -->|calls| sortByPopularity\n    Downloads -->|React Query| StatsAPI[stats.librefang.ai]\n    GitHubStats -->|fetch| StatsAPI\n    GitHubStats -->|fetch| CounterAPI[counter.librefang.ai]\n```\n\n## Routing\n\nRouting is purely path-based — no router library. `App` inspects `window.location.pathname` on mount:\n\n| Path | Renders |\n|------|---------|\n| `/` | Main landing page (all sections) |\n| `/zh`, `/zh-TW`, `/ja`, `/ko`, `/de`, `/es` | Same landing page, locale detected |\n| `/deploy` | `DeployPage` component |\n| `/changelog` | `ChangelogPage` component |\n\nLanguage is detected by `getCurrentLang()`, which reads the URL prefix. The detected language is written into the Zustand store via `useAppStore.setState({ lang })` on mount and `popstate`.\n\n## State Management\n\n**File:** `store.ts` (imported as `useAppStore`)\n\nThe Zustand store holds:\n\n- **`lang`** — current language code (`'en'`, `'zh'`, `'zh-TW'`, `'ja'`, `'ko'`, `'de'`, `'es'`)\n- **`theme`** — `'dark'` or `'light'`\n- **`switchLang(code)`** — changes `lang`, updates `document.documentElement.lang`, pushes a new history entry\n- **`toggleTheme()`** — toggles between dark and light\n\nEvery section component reads `lang` and `theme` from this store as needed.\n\n## Internationalization\n\n**File:** `i18n.ts`\n\n### Types\n\n- **`Language`** — `{ code, name, url }` — one entry per supported locale\n- **`Translation`** — a flat interface covering every translatable string across all sections (`nav`, `hero`, `stats`, `architecture`, `hands`, `performance`, `install`, `faq`, `community`, `meta`, `workflows`, `docs`, `githubStats`, `contributing`, `footer`)\n\n### Supported Languages\n\n| Code | Name | URL prefix |\n|------|------|------------|\n| `en` | English | `/` |\n| `zh` | 简体中文 | `/zh` |\n| `zh-TW` | 繁體中文 | `/zh-TW` |\n| `ja` | 日本語 | `/ja` |\n| `ko` | 한국어 | `/ko` |\n| `de` | Deutsch | `/de` |\n| `es` | Español | `/es` |\n\n### How It Works\n\n`App` resolves the translation object for the current language:\n\n```ts\nconst t = translations[lang] || translations['en']!\n```\n\nEvery section component receives `t: Translation` as a prop. Some sections (like `Downloads`) supplement the shared `Translation` type with inline locale maps for strings not in the shared schema.\n\n## Data Fetching\n\n### Registry — `useRegistry`\n\nThe `useRegistry` hook (from `useRegistry.ts`) fetches the hands and channels registry. It returns `{ data: RegistryData }` where `RegistryData` includes arrays of `hands` and `channels` with `id`, `name`, `category`, `tags`, and localized `description` fields.\n\nUsed by:\n- **`App`** — passes `registry` to `Hero` for live stat counts\n- **`Architecture`** — renders channels (layer 0) and hands (layer 1) from registry data\n- **`Hands`** — renders the full hands carousel\n\n### Releases — `Downloads`\n\nThe `Downloads` component uses `@tanstack/react-query` (`useQuery`) to fetch `https://stats.librefang.ai/api/releases`. The response is an array of GitHub release objects with `tag_name`, `assets`, and `html_url`. It takes the first release and passes its assets through `categorizeAssets()`.\n\n### GitHub Stats — `GitHubStats`\n\nFetches two endpoints in parallel via `useEffect`:\n\n1. `https://stats.librefang.ai/api/github` → stars, forks, issues, prs, downloads, lastUpdate, starHistory\n2. `https://counter.librefang.ai/api` → docs visit count\n\n## Section Components\n\nAll section components follow the pattern: accept `{ t: Translation }`, render a `<section>` with an `id` for anchor navigation, and use `FadeIn` for scroll-triggered entrance animations.\n\n### `Nav`\n\nFixed top navigation bar. Key behaviors:\n- Tracks scroll state to add a backdrop blur background (`scrolled`)\n- Uses `IntersectionObserver` to highlight the currently visible section in the nav (`activeSection`)\n- Language dropdown with click-outside and Escape-key dismissal\n- Theme toggle button (sun/moon icon)\n- Responsive: full nav on `md:` screens, hamburger menu on mobile\n- Smooth-scrolls to `#anchor` links\n\n### `Hero`\n\nFull-viewport landing section with:\n- **Typing animation** via `useTyping(t.hero.typing)` — cycles through translated strings, typing and deleting at configurable speed/pause\n- Badge with version info\n- CTA buttons: \"Get Started\" (anchors to `#install`) and \"View on GitHub\"\n- Desktop-only terminal preview showing `librefang status` output\n- Stats bar showing cold start, memory, hands count, providers count (hands/providers counts come from registry data when available)\n\n### `useTyping(texts, speed, pause)`\n\nCustom hook that animates typing and deleting through an array of strings. Returns the current display string. Parameters:\n- `texts` — array of strings to cycle through\n- `speed` — typing speed in ms (default 60)\n- `pause` — pause at end of each string in ms (default 2000)\n\n### `FadeIn`\n\nA Framer Motion wrapper component. Props:\n- `delay` — delay in milliseconds (converted to seconds internally)\n- `className` — passed through to the `motion.div`\n\nAnimates from `{ opacity: 0, y: 24 }` to `{ opacity: 1, y: 0 }` with `whileInView`, firing once.\n\n### `Architecture`\n\nFive expandable layers (Channels → Hands → Kernel → Runtime → Hardware). Each layer row is a button that toggles an expanded detail panel. Layers 0 and 1 render live registry data (channels and hands respectively), sorted by popularity. Layers 2–4 render static `DetailGrid` components with technical feature names and translated descriptions.\n\n### Popularity Sorting\n\nTwo helper functions:\n- **`isPopular(item)`** — checks if `item.tags` includes `'popular'`\n- **`sortByPopularity(items)`** — stable sort, popular items first. Used by `Architecture` and `Hands`.\n\n### `Hands`\n\nHorizontal-scroll carousel of hand cards. Each card links to `https://docs.librefang.ai/agent/hands#{hand.id}`. Category colors are mapped via `categoryColors`:\n\n| Category | Color |\n|----------|-------|\n| content | amber |\n| data | cyan |\n| productivity | emerald |\n| communication | purple |\n| development | rose |\n| research | blue |\n\nDescriptions are localized via `getLocalizedDesc(hand, lang)` from `useRegistry.ts`.\n\n### `Workflows`\n\nSix workflow cards in a responsive grid. Icon assignment is positional (`workflowIcons` array mapped by index).\n\n### `Performance`\n\nComparison table (LibreFang vs \"Others\"). Desktop renders an HTML `<table>`, mobile renders stacked cards.\n\n### `Install`\n\nTerminal-style code block with OS-specific install commands. Auto-detects OS from `navigator.userAgent`. Includes a copy-to-clipboard button and OS switcher tabs (macOS / Windows / Linux).\n\n### `Downloads`\n\nCategorizes release assets into Desktop App and CLI via `categorizeAssets()`, which matches filenames against regex patterns:\n\n- **Desktop:** `.dmg` (Intel/ARM), `-setup.exe` (x64/ARM), `.AppImage`, `.deb`, `.rpm`\n- **CLI:** `apple-darwin.tar.gz`, `unknown-linux-gnu.tar.gz`, `unknown-linux-musl.tar.gz`, `pc-windows-msvc.zip`, `linux-android.tar.gz`\n\nA third column provides one-click deploy links (Fly.io, Railway, Render, GCP, Docker).\n\nThe SDK section shows copy-to-clipboard commands for pip, npm, cargo, and go.\n\n### `categorizeAssets(assets)`\n\nTakes `ReleaseAsset[]` and returns `DownloadItem[]` (Desktop + CLI). Each asset is matched against known filename patterns. SHA256 files are skipped.\n\n### `FAQ`\n\nAccordion. Only one item open at a time (`openIndex`). Uses `AnimatePresence` for smooth expand/collapse.\n\n### `GitHubStats`\n\nFetches live GitHub metrics and renders:\n- 7-stat grid (stars, forks, issues, PRs, downloads, docs visits, last update) with loading skeletons\n- Star history bar chart (up to 30 bars)\n- Contributors image from `contrib.rocks`\n\n### `Community`\n\nFour-card grid linking to GitHub PRs, Issues, Discussions, and Discord.\n\n### `BackToTop`\n\nFixed button that appears after scrolling one viewport height. Smooth-scrolls to top.\n\n### `trackEvent(action, label)`\n\nThin wrapper around `window.gtag()` for Google Analytics event tracking. Guards against SSR (`typeof window !== 'undefined'`). Used by `Hero` CTAs and `Install` copy button.\n\n## Adding a New Language\n\n1. Add an entry to the `languages` array in `i18n.ts` with `{ code, name, url }`\n2. Add a corresponding entry in the `translations` record keyed by the same code\n3. Add a path check in `getCurrentLang()` in `App.tsx`\n4. Add URL prefix entries in any inline locale maps (e.g., `Downloads` labels)\n\n## Adding a New Section\n\n1. Define the section's strings in the `Translation` interface in `i18n.ts`\n2. Add translations for every language in the `translations` record\n3. Create a component accepting `{ t: Translation }` (and optionally `registry`)\n4. Add the component to the `App` return tree\n5. Add a nav link in the `links` array inside `Nav`\n6. Ensure the section has an `id` attribute matching the nav `href`","website-web":"# Website — web\n\n# Website — web\n\nThe LibreFang marketing site and install entrypoint. This is a React + TypeScript single-page application built with Vite, deployed as static assets alongside two Cloudflare Workers for analytics.\n\nLive at `https://librefang.ai`.\n\n## Architecture Overview\n\n```mermaid\ngraph LR\n    subgraph \"Static Site (Vite)\"\n        A[index.html] --> B[main.tsx]\n        B --> C[App.tsx]\n        C --> D[i18n.ts]\n        C --> E[store.ts]\n        C --> F[useRegistry.ts]\n    end\n\n    subgraph \"Build-time\"\n        S[fetch-registry.ts] --> R[registry.json]\n    end\n\n    subgraph \"Cloudflare Workers\"\n        GW[github-stats-worker]\n        VC[visit-counter-worker]\n    end\n\n    C -->|fetch| GW\n    C -->|fetch| VC\n    C -->|fetch with fallback| R\n    R -->|bundled into| A\n```\n\nThree deployment units:\n\n1. **Static Vite site** — landing page, localized routes, install scripts, PWA assets\n2. **github-stats-worker** — proxies GitHub API, caches in KV, records daily snapshots\n3. **visit-counter-worker** — tracks page visits, serves tracking script\n\n## Quick Start\n\n```bash\npnpm install\npnpm dev        # starts on port 3002\npnpm build      # outputs to dist/\npnpm preview    # serve the production build locally\n```\n\nBoth `dev` and `build` automatically run `predev` / `prebuild`, which execute `scripts/fetch-registry.ts` to refresh `public/registry.json`.\n\n## Key Files\n\n| Path | Purpose |\n|---|---|\n| `src/App.tsx` | All page sections (Hero, Features, Comparison, Install, FAQ), data fetching, language detection |\n| `src/i18n.ts` | Translations and language list for 7 locales |\n| `src/store.ts` | Zustand store — language state, CJK font lazy-loading |\n| `src/useRegistry.ts` | Hook that fetches registry from the worker API with `registry.json` fallback |\n| `src/main.tsx` | React entrypoint, React Query provider setup |\n| `src/lib/utils.ts` | `cn()` helper combining `clsx` + `tailwind-merge` |\n| `src/index.css` | Tailwind directives and custom component styles |\n| `scripts/fetch-registry.ts` | Build-time script that writes `public/registry.json` |\n| `index.html` | SEO metadata, inline bootstrap scripts (language, theme, fonts), GA, visit counter |\n\n## Internationalization\n\nSeven locales via path-prefix routing:\n\n| Prefix | Language |\n|---|---|\n| `/` | English |\n| `/zh/` | Simplified Chinese |\n| `/zh-TW/` | Traditional Chinese |\n| `/de/` | Deutsch |\n| `/ja/` | Japanese |\n| `/ko/` | Korean |\n| `/es/` | Spanish |\n\nDetection happens in two places:\n\n1. **`index.html` inline script** — runs before React hydrates, sets `window.__INITIAL_LANG__` and `document.documentElement.lang`\n2. **`src/store.ts`** — React-level language state derived from the current path\n\nThe `index.html` bootstrap also loads the appropriate CJK Google Font (Noto Sans SC/TC/JP/KR) when the detected locale requires one. Non-CJK locales use the base `Inter` + `Outfit` stack.\n\n### Adding a New Language\n\n1. Add translations and a `languages` entry in `src/i18n.ts`\n2. Add path-prefix detection in `src/store.ts`\n3. Add path-prefix detection in the inline script inside `index.html`\n4. Add the new URL to `public/sitemap.xml`\n\n## Data Fetching and External Services\n\n### GitHub Stats\n\n`src/App.tsx` requests `https://stats.librefang.ai/api/github` (proxied through the github-stats-worker) for stars, forks, issues, and release info. The Hero section also directly calls `https://api.github.com/repos/librefang/librefang/releases/latest`.\n\n### Registry\n\n`src/useRegistry.ts` fetches agent registry data from `https://stats.librefang.ai/api/registry`. If the remote is unavailable, it falls back to the build-time `public/registry.json` generated by `scripts/fetch-registry.ts`.\n\n### Visit Counter\n\n`index.html` loads `https://counter.librefang.ai/script.js` (async). `src/App.tsx` also calls `GET https://counter.librefang.ai/api` for display data.\n\n### Google Analytics\n\n`index.html` includes `gtag` with measurement ID `G-9Q0WS7SHZ6`.\n\nAll external endpoints are hardcoded to production domains. Local development hits production services unless you modify the source.\n\n## Build Configuration\n\n### Vite (`vite.config.ts`)\n\n- Dev server on port `3002`, host exposed (`host: true`)\n- Manual chunks: `vendor-react`, `vendor-motion`, `vendor-query`\n- Single entry: `./index.html`\n\n### TypeScript (`tsconfig.json`)\n\nStrict mode with `noUnusedLocals`, `noUnusedParameters`, `noUncheckedIndexedAccess`. Targets ES2020 with bundler module resolution. Separate config (`tsconfig.node.json`) covers `vite.config.ts`.\n\n### Tailwind (`tailwind.config.js`)\n\nDark mode via `class` strategy. Custom theme tokens:\n\n- **Colors**: `surface` (CSS variable–based), custom `cyan` and `amber` shades\n- **Fonts**: `sans` stack includes Inter + all four Noto Sans CJK variants; `mono` uses JetBrains Mono\n\n### ESLint (`eslint.config.js`)\n\nFlat config format. Applies `react-hooks` and `react-refresh` plugin rules to all JS/TS/JSX/TSX files. Ignores `dist/`.\n\n## Cloudflare Workers\n\n### github-stats-worker\n\n| | |\n|---|---|\n| Endpoint | `GET /api/github` |\n| KV Binding | `KV` |\n| Secret | `GITHUB_TOKEN` (optional, raises rate limits) |\n| Cron | Records daily history snapshots |\n\nAggregates stars, forks, issues, PRs, and downloads from the GitHub API, caches in KV.\n\n### visit-counter-worker\n\n| | |\n|---|---|\n| Endpoints | `GET /api`, `POST /api/track`, `GET /script.js` |\n| KV Binding | `VISIT_COUNTER` |\n\nServes the embeddable tracking script and a stats API for the frontend.\n\n### Deployment\n\nEach worker has its own `wrangler.toml`. Before deploying:\n\n1. Replace `account_id` and KV namespace IDs\n2. If domains change, update `src/App.tsx`, `index.html`, and `public/_headers` (CSP allowlist)\n3. Set secrets: `wrangler secret put GITHUB_TOKEN`\n\n```bash\ncd workers/github-stats-worker && wrangler deploy\ncd workers/visit-counter-worker && wrangler deploy\n```\n\nWorker deployment is manual — not wired into the frontend build.\n\n## Static Assets and Installers\n\n`public/` contains files served as-is:\n\n- `install.sh` / `install.ps1` — public installer scripts\n- `install-manifest.json` — installer channels and binary download metadata\n- `favicon.svg`, `logo.png`, `og-image.svg` — branding\n- `manifest.webmanifest` — PWA manifest\n- `robots.txt`, `sitemap.xml` — SEO\n- `_headers`, `_redirects` — security headers, CSP, caching rules for compatible hosts\n\n### Installer File Synchronization\n\nSome install-related files exist in **both** the repository root and `public/`. When modifying installers, always update both copies and `public/install-manifest.json`.\n\n## Content Maintenance Guide\n\n### Landing page copy or visuals\n- Translations: `src/i18n.ts`\n- Layout and sections: `src/App.tsx`\n- Assets: replace in `public/`\n\n### Release or installer metadata\n- `public/install-manifest.json`\n- Root-level and `public/` installer scripts (keep in sync)\n- Verify install URLs shown in the UI match actual endpoints\n\n### Analytics infrastructure\n- Worker code: `workers/`\n- Frontend endpoints: `src/App.tsx`\n- CSP allowlist: `public/_headers`\n\n### SEO metadata\n- `<title>`, `<meta>`, OG/Twitter cards, structured data: `index.html`\n- Sitemap: `public/sitemap.xml`\n\n## Common Pitfalls\n\n- **Split installer files** — root and `public/` copies must match; changing only one is a bug\n- **Hardcoded API domains** — stats and counter URLs in the frontend point to production; changing worker domains requires CSP updates\n- **CSP regressions** — `public/_headers` blocks unlisted third-party origins; new external scripts/fonts need explicit allowlisting\n- **Locale path coverage** — new languages require updates in four separate locations (`i18n.ts`, `store.ts`, `index.html` bootstrap, `sitemap.xml`)\n\n## Command Reference\n\n| Command | Description |\n|---|---|\n| `pnpm dev` | Start dev server on port 3002 (runs registry fetch first) |\n| `pnpm build` | Production build to `dist/` (runs registry fetch first) |\n| `pnpm preview` | Serve the production build locally |\n| `pnpm fetch-registry` | Manually refresh `public/registry.json` |\n| `pnpm lint` | Type-check with `tsc --noEmit` |","website-workers":"# Website — workers\n\n# Website Workers\n\nTwo Cloudflare Workers that power the Librefang website's dynamic data: GitHub repository statistics with registry metadata, and a lightweight visit counter.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph \"github-stats-worker\"\n        GH_SSE[scheduled handler]\n        GH_HTTP[HTTP handler]\n        MIG[migrateOldKeys]\n        RDS[recordDailyStats]\n        RRC[refreshRegistryCache]\n    end\n\n    subgraph \"visit-counter-worker\"\n        VT_HTTP[HTTP handler]\n    end\n\n    subgraph \"External\"\n        GHA[GitHub API]\n        GH_RAW[GitHub Raw]\n    end\n\n    subgraph \"KV Stores\"\n        KV_MAIN[(KV)]\n        KV_VISIT[(VISIT_COUNTER)]\n    end\n\n    GH_HTTP --> MIG\n    GH_HTTP --> KV_MAIN\n    GH_SSE --> RDS --> MIG\n    GH_SSE --> RRC\n    GH_HTTP --> GHA\n    RRC --> GHA\n    RRC --> GH_RAW\n    VT_HTTP --> KV_VISIT\n```\n\n---\n\n## github-stats-worker\n\nServes cached GitHub stats, releases, and registry data. Runs scheduled tasks to record daily snapshots and keep the registry cache warm.\n\n### HTTP Endpoints\n\nAll endpoints return JSON with CORS headers (`Access-Control-Allow-Origin: *`).\n\n#### `GET /api/github`\n\nReturns current repository stats plus the last 30 days of history. Serves from KV cache for 30 minutes. Accepts a `?refresh` query parameter to bypass cache.\n\n**Response shape:**\n\n```json\n{\n  \"stars\": 42,\n  \"forks\": 10,\n  \"issues\": 5,\n  \"prs\": 3,\n  \"lastUpdate\": \"2024-01-15T10:00:00Z\",\n  \"createdAt\": \"2023-06-01T00:00:00Z\",\n  \"downloads\": 1234,\n  \"starHistory\": [\n    { \"date\": \"2024-01-15\", \"stars\": 42, \"forks\": 10, \"issues\": 5, \"prs\": 3 }\n  ]\n}\n```\n\nOn a cache miss, makes three parallel GitHub API calls (repo info, releases, open PRs) and updates the `stats_history` KV key before responding.\n\n#### `GET /api/releases`\n\nProxies the last 20 GitHub releases. 30-minute KV cache. On upstream failure, serves stale cache rather than returning an error.\n\n#### `GET /api/registry`\n\nReturns counts and names for all registry categories (hands, channels, providers, integrations, workflows, agents, plugins). 1-hour KV cache. Accepts `?refresh` to bypass. On error, falls back to stale cache.\n\n**Response shape:**\n\n```json\n{\n  \"hands\": [{ \"id\": \"example\", \"name\": \"Example\", \"description\": \"\", \"category\": \"\", \"icon\": \"\" }],\n  \"channels\": [{ \"id\": \"slack\", \"name\": \"Slack\", \"description\": \"\", \"category\": \"\", \"icon\": \"\" }],\n  \"handsCount\": 5,\n  \"channelsCount\": 3,\n  \"providersCount\": 2,\n  \"integrationsCount\": 4,\n  \"workflowsCount\": 1,\n  \"agentsCount\": 2,\n  \"pluginsCount\": 3,\n  \"fetchedAt\": \"2024-01-15T10:00:00.000Z\"\n}\n```\n\n### Scheduled Handler\n\nTriggered by Cloudflare Cron Triggers. Runs two tasks concurrently via `ctx.waitUntil`:\n\n1. **`recordDailyStats`** — Fetches current star/fork/issue/PR counts from GitHub and appends (or replaces) today's entry in `stats_history`. Keeps a rolling 90-day window.\n\n2. **`refreshRegistryCache`** — Fetches directory listings from the `librefang-registry` repo, compares counts against the cached data, and only re-fetches TOML files if counts have changed. TOML files are fetched in batches of 10 from `raw.githubusercontent.com`, parsed for metadata (id, name, description, category, icon, tags, i18n sections), and stored as the full registry payload.\n\n### Stats History and Migration\n\nStats history is stored as a single JSON array under the `stats_history` KV key, with one entry per day up to 90 days. Each entry:\n\n```json\n{ \"date\": \"2024-01-15\", \"stars\": 42, \"forks\": 10, \"issues\": 5, \"prs\": 3 }\n```\n\n**Migration from old format.** The system previously stored individual KV keys like `stars_2024-01-15`, `forks_2024-01-15`, etc. `migrateOldKeys` runs automatically when `stats_history` has fewer than 7 entries and the `stats_migration_done` flag is not set. It scans the last 90 days of old keys, merges them into the blob, deduplicates by date, and sets `stats_migration_done` so it never runs again.\n\n### KV Keys Used\n\n| Key | Content |\n|---|---|\n| `stats_history` | JSON array of daily stat entries (90 days) |\n| `stats_migration_done` | `\"1\"` after old-format migration completes |\n| `github_stats` | Cached JSON response for `/api/github` |\n| `github_stats_time` | Unix timestamp of last cache write |\n| `releases_data` | Cached JSON response for `/api/releases` |\n| `releases_data_time` | Unix timestamp of last cache write |\n| `registry_data` | Cached JSON response for `/api/registry` |\n| `registry_data_time` | Unix timestamp of last cache write |\n\n### Environment Bindings\n\n| Binding | Type | Purpose |\n|---|---|---|\n| `KV` | KV Namespace | All cached data and stats history |\n| `GITHUB_TOKEN` | Secret (optional) | Increases GitHub API rate limit from 60 to 5,000 requests/hour |\n\n---\n\n## visit-counter-worker\n\nA minimal visit counter that tracks total and daily page views. No authentication or bot filtering — intended for rough traffic estimates displayed on the site.\n\n### HTTP Endpoints\n\nAll endpoints include CORS headers.\n\n#### `POST /api/track`\n\nRecords a page visit. Increments both the total counter and a date-keyed daily counter. Returns `{ success: true, total }`.\n\n#### `GET /` or `GET /api`\n\nReturns current counts:\n\n```json\n{ \"total\": 1234, \"today\": 56, \"date\": \"2024-01-15\" }\n```\n\n#### `GET /script.js`\n\nReturns a self-executing JavaScript snippet that sends a POST to `https://counter.librefang.ai/api/track` with the current `pathname`. Uses `keepalive: true` so the request survives page navigation.\n\n### KV Keys Used\n\n| Key | Content |\n|---|---|\n| `total` | Running total of all visits |\n| `today_YYYY-MM-DD` | Visit count for that specific date |\n\n### Environment Bindings\n\n| Binding | Type | Purpose |\n|---|---|---|\n| `VISIT_COUNTER` | KV Namespace | Visit counters |\n\n---\n\n## Caching Strategy\n\nBoth workers follow the same pattern: check a timestamp key alongside the data key, serve from cache if within the TTL, and fall back to stale data on upstream errors rather than surfacing failures to users.\n\n| Data | TTL | Stale fallback |\n|---|---|---|\n| GitHub stats | 30 min | No (returns fresh error) |\n| Releases | 30 min | Yes |\n| Registry | 1 hour | Yes |\n| Visit counters | None (real-time) | N/A |\n\nThe `?refresh` query parameter on `/api/github` and `/api/registry` bypasses the cache check entirely and forces a fresh fetch from upstream.","wire-protocol":"# Wire Protocol\n\n# Wire Protocol (`librefang-wire`)\n\nAgent-to-agent networking over TCP using the LibreFang Wire Protocol (OFP). Enables cross-machine discovery, authentication, and message routing between LibreFang kernels.\n\n## Wire Format\n\nEvery message on the wire uses a length-prefixed JSON frame:\n\n```\n┌────────────────────┬──────────────────────────┐\n│  4 bytes (BE u32)  │     JSON payload          │\n│  length of payload │     (WireMessage)         │\n└────────────────────┴──────────────────────────┘\n```\n\nAfter the HMAC handshake completes, post-handshake frames append a 64-character hex HMAC:\n\n```\n┌──────────┬──────────────┬─────────────────────┐\n│ 4B len   │  JSON body   │  64-byte hex HMAC   │\n│ (total)  │              │  HMAC(key, body)     │\n└──────────┴──────────────┴─────────────────────┘\n```\n\nThe length field covers both the JSON body and the trailing HMAC. Maximum message size is 16 MB (`MAX_MESSAGE_SIZE`).\n\nEncoding/decoding is handled by `encode_message`, `decode_length`, and `decode_message` in the `message` module. The `peer` module provides async I/O wrappers: `write_message`, `read_message`, `write_message_authenticated`, and `read_message_authenticated`.\n\n## Authentication & Security Model\n\nOFP mandates authentication — it refuses to start without a configured `shared_secret`. The protocol has three layers of protection:\n\n### 1. HMAC Handshake\n\nEvery connection begins with a mutual HMAC-authenticated handshake. Both sides generate a random nonce and compute:\n\n```\nHMAC-SHA256(shared_secret, nonce || node_id)\n```\n\nThe initiator sends a `Handshake` request containing its nonce and HMAC. The responder verifies the HMAC, checks the nonce for replay, then replies with a `HandshakeAck` containing its own nonce and HMAC. The initiator then verifies that response.\n\nAny connection that sends a non-`Handshake` message as its first frame is rejected with a `401` error and the connection is dropped.\n\n### 2. Nonce Replay Protection\n\n`NonceTracker` records every nonce seen within a 5-minute sliding window. It uses `DashMap::entry` for atomic check-and-insert, preventing TOCTOU races where concurrent connections could both pass a `contains_key` check before either inserts. The tracker has a hard cap of 100,000 entries — under flood conditions it fails closed rather than growing unbounded.\n\n### 3. Per-Session and Per-Message HMAC\n\nAfter the handshake, both sides derive a session key:\n\n```rust\nsession_key = HMAC-SHA256(shared_secret, client_nonce || server_nonce)\n```\n\nNonce order matters — the client's nonce comes first regardless of which side is computing the key. All subsequent messages on that connection are framed with a trailing HMAC over the JSON body, verified on read. Tampered or forged messages are rejected.\n\n## Connection Lifecycle\n\n```mermaid\nsequenceDiagram\n    participant C as Client (PeerNode)\n    participant S as Server (PeerNode)\n    C->>S: TCP connect\n    C->>S: Handshake {nonce_c, HMAC(secret, nonce_c||node_c)}\n    S->>S: verify HMAC, check nonce_c replay\n    S->>C: HandshakeAck {nonce_s, HMAC(secret, nonce_s||node_s)}\n    C->>C: verify HMAC, check nonce_s replay\n    C->>C: derive session_key\n    S->>S: derive session_key\n    loop Authenticated message exchange\n        C->>S: Request + HMAC(session_key, body)\n        S->>C: Response + HMAC(session_key, body)\n    end\n```\n\n### Inbound connections (accept loop)\n\n`PeerNode::start` binds a `TcpListener` and spawns an accept loop. For each incoming connection, `handle_inbound` reads the handshake, verifies the HMAC and nonce, sends a `HandshakeAck`, derives the session key, then enters the `connection_loop`.\n\n### Outbound connections\n\n`connect_to_peer` opens a TCP connection, sends a handshake, verifies the `HandshakeAck`, and spawns a background task running `connection_loop`. The remote peer is registered in the local `PeerRegistry`.\n\n`send_to_peer` is a one-shot variant: it opens a connection, performs the full handshake, sends a single `AgentMessage`, reads the response, and closes. It does not keep the connection alive.\n\n## Message Types\n\nThe `WireMessage` envelope carries a unique `id` and a `WireMessageKind`:\n\n| Kind | Tag | Description |\n|------|-----|-------------|\n| `WireRequest::Handshake` | `\"handshake\"` | Initial authentication exchange |\n| `WireRequest::Discover` | `\"discover\"` | Query remote agents by name/tag/description |\n| `WireRequest::AgentMessage` | `\"agent_message\"` | Send text to a remote agent, receive response |\n| `WireRequest::Ping` | `\"ping\"` | Liveness check |\n| `WireResponse::HandshakeAck` | `\"handshake_ack\"` | Accept handshake, exchange identity |\n| `WireResponse::DiscoverResult` | `\"discover_result\"` | List of matching agents |\n| `WireResponse::AgentResponse` | `\"agent_response\"` | Agent's text reply |\n| `WireResponse::Pong` | `\"pong\"` | Liveness reply with uptime |\n| `WireResponse::Error` | `\"error\"` | Error with code and message |\n| `WireNotification::AgentSpawned` | `\"agent_spawned\"` | New agent available on peer |\n| `WireNotification::AgentTerminated` | `\"agent_terminated\"` | Agent no longer available |\n| `WireNotification::ShuttingDown` | `\"shutting_down\"` | Peer is going offline |\n\nAll types use `#[serde(tag = \"...\")]` for discriminant serialization — requests use `\"method\"`, responses use `\"method\"`, and notifications use `\"event\"`. The outer `WireMessageKind` uses `#[serde(tag = \"type\")]`.\n\nAgent metadata is carried in `RemoteAgentInfo`: `id`, `name`, `description`, `tags`, `tools`, and `state`.\n\n## PeerNode\n\n`PeerNode` is the main networking entry point. It owns the listener, configuration, registry reference, nonce tracker, and session key state.\n\n### Creation\n\n```rust\nlet (node, task_handle) = PeerNode::start(config, registry, handle).await?;\n```\n\n`start` validates that `shared_secret` is non-empty, binds the listener, and spawns the accept loop. It returns an `Arc<PeerNode>` and the `JoinHandle` for the accept task.\n\n### Key methods\n\n| Method | Purpose |\n|--------|---------|\n| `local_addr()` | Returns the actual bound address (useful when binding to port 0) |\n| `node_id()` | This node's unique identifier |\n| `registry()` | Access the `PeerRegistry` |\n| `connect_to_peer(addr, handle)` | Establish outbound connection with full handshake |\n| `send_to_peer(node_id, agent, message, sender, handle)` | One-shot agent message to a known peer |\n\n## PeerHandle Trait\n\nThe kernel implements `PeerHandle` to bridge the wire protocol with local agent infrastructure:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\n- `local_agents` — called during handshake and discovery to advertise this node's agents\n- `handle_agent_message` — routes incoming remote messages to local agents\n- `discover_agents` — searches local agents matching a query string (name, tags, description)\n- `uptime_secs` — included in `Pong` responses\n\n## PeerRegistry\n\nThread-safe (`RwLock<HashMap<...>>`) store for known peers. Thread safety is managed internally — consumers receive `Clone` copies of `PeerEntry` values.\n\n### Peer states\n\n- **Connected** — handshake completed, eligible for message routing\n- **Disconnected** — connection lost, entry retained for reconnection\n\nDisconnected peers are excluded from `find_agents` and `connected_peers` but remain in `all_peers`.\n\n### Agent management\n\nThe registry tracks agents per-peer. `find_agents` searches across all connected peers, matching against name, tags, and description (case-insensitive). Results are returned as `RemoteAgent` structs pairing the agent info with the owning `peer_node_id`.\n\n`add_agent` and `remove_agent` support incremental updates driven by `AgentSpawned` / `AgentTerminated` notifications received in the connection loop.\n\n### Key methods\n\n| Method | Returns |\n|--------|---------|\n| `add_peer(entry)` | Register/update a peer |\n| `remove_peer(node_id)` | Remove entirely |\n| `mark_disconnected(node_id)` | Set state without removing |\n| `mark_connected(node_id)` | Restore to connected |\n| `get_peer(node_id)` | Single peer snapshot |\n| `connected_peers()` | All peers in Connected state |\n| `find_agents(query)` | Cross-peer agent search |\n| `all_remote_agents()` | Every agent on every connected peer |\n| `connected_count()` / `total_count()` | Counts |\n\n## Broadcasting\n\n`broadcast_notification` sends a one-shot notification to all connected peers. For each peer it opens a fresh TCP connection, derives a per-message key from the shared secret and a fresh nonce, writes the authenticated message, and closes. Failures are collected and returned — the caller decides how to handle them.\n\n## Integration Points\n\nThe kernel (`src/kernel/mod.rs`) calls `start_ofp_node` to create a `PeerNode` with a `PeerConfig` populated from the application configuration. The kernel implements `PeerHandle` to route wire messages into the local agent system.\n\nThe HTTP API exposes network status through `src/routes/network.rs`, reading `registry().connected_count()`, `total_count()`, `local_addr()`, and `all_peers()`. The WebSocket layer (`librefang-api/src/ws`) also reads `all_peers()` for channel bridge output."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
