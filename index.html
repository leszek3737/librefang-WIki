at route structure under a single root route. Every page is **lazy-loaded** via `React.lazy()` with a `Suspense` wrapper (`<L>`) that renders `null` as fallback — page transition animations mask the brief loading gap.\n\nThe root route's component is `App`, which provides the persistent shell layout. Each child route renders into the `<Outlet />` in the main content area.\n\nRoute `/` redirects to `/overview`. The `/canvas` route validates search params (`t` for timestamp, `wf` for workflow ID).\n\n### Page Components (30 routes)\n\nAll pages live in `src/pages/` and are loaded on demand:\n\n| Route | Page | Domain |\n|-------|------|--------|\n| `/overview` | OverviewPage | System dashboard |\n| `/chat` | ChatPage | Agent conversation |\n| `/agents` | AgentsPage | Agent management |\n| `/approvals` | ApprovalsPage | Approval queue |\n| `/hands` | HandsPage | Hand definitions & instances |\n| `/providers` | ProvidersPage | LLM provider config |\n| `/models` | ModelsPage | Model catalog |\n| `/media` | MediaPage | Image/video/music generation |\n| `/channels` | ChannelsPage | Channel configuration |\n| `/skills` | SkillsPage | Skill management |\n| `/plugins` | PluginsPage | Plugin management |\n| `/mcp-servers` | McpServersPage | MCP server management |\n| `/workflows` | WorkflowsPage | Workflow builder |\n| `/scheduler` | SchedulerPage | Cron schedule management |\n| `/goals` | GoalsPage | Goal tracking |\n| `/analytics` | AnalyticsPage | Usage analytics |\n| `/memory` | MemoryPage | Memory browser |\n| `/logs` | LogsPage | Log viewer |\n| `/runtime` | RuntimePage | Runtime diagnostics |\n| `/comms` | CommsPage | Inter-agent communications |\n| `/terminal` | TerminalPage | Web terminal (conditional) |\n| `/network` | NetworkPage | P2P network status |\n| `/a2a` | A2APage | Agent-to-Agent protocol |\n| `/telemetry` | TelemetryPage | Telemetry data |\n| `/config/*` | ConfigPage | Configuration editor |\n| `/settings` | SettingsPage | Dashboard settings |\n| `/canvas` | CanvasPage | Visual workflow editor |\n| `/wizard` | WizardPage | Setup wizard |\n\n## Testing — `api.test.ts`\n\nUnit tests using Vitest that mock `fetch`, `localStorage`, `navigator`, and `window.location`. Tests cover:\n\n- **`buildAuthenticatedWebSocketUrl`** — Verifies the token is appended as a query parameter.\n- **`verifyStoredAuth`** — Confirms that a 401 response clears the stale token and returns `false`.\n- **Bearer token propagation** — Asserts that `listTools()` and `getMetricsText()` include the `Authorization: Bearer` header in their requests.\n- **`patchAgentConfig`** — Validates that the request body includes `temperature` and `max_tokens` fields and that the URL path encodes the agent ID correctly.\n\nThe test file includes a `LocalStorageMock` implementation since the dashboard runs in Node during testing.\n\n## Key Patterns for Contributors\n\n### Adding a New API Endpoint\n\n1. Define the response interface in `api.ts`.\n2. Add the function using the appropriate primitive (`get`, `post`, `put`, `patch`, `del`).\n3. Specify the timeout if it's long-running (use `LONG_RUNNING_TIMEOUT_MS`).\n\n### Adding a New Page\n\n1. Create `src/pages/NewPage.tsx` with a named export.\n2. Add a lazy import in `router.tsx`.\n3. Add a route definition with `createRoute`.\n4. Add a nav item to the appropriate group in `App.tsx`'s `navGroups` array.\n5. Add the i18n key to the translation files.\n\n### Authentication Flow\n\nAny page can rely on the global 401 handler — if a request fails with 401, the login dialog reappears automatically. Pages don't need to handle auth errors individually. The guard resets when a new token is stored via `setApiKey()`, so re-authentication works after token expiry.","deployment-deploy":"# Deployment — deploy\n\n# Deployment — `deploy/`\n\nDeployment configurations and tooling for LibreFang. This module provides everything needed to run LibreFang in production: a multi-stage Docker build, container orchestration files, a systemd unit for bare-metal installs, a cloud platform blueprint, and a full observability stack.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Dockerfile stages\"\n        A[\"node:20-alpine<br/>(dashboard-builder)\"] -->|static/react assets| B[\"rust:1-slim-bookworm<br/>(builder)\"]\n        B -->|librefang binary| C[\"node:lts-bookworm-slim<br/>(runtime)\"]\n    end\n\n    subgraph \"Deployment targets\"\n        C --> D[\"docker-compose.yml<br/>standalone service\"]\n        C --> E[\"render.yaml<br/>managed platform\"]\n        F[\"librefang.service<br/>systemd / bare-metal\"]\n    end\n\n    subgraph \"Observability\"\n        G[\"docker-compose.observability.yml\"] --> H[\"Prometheus :9090\"]\n        G --> I[\"Grafana :3000\"]\n        H -.->|scrapes /api/metrics| D\n    end\n```\n\n---\n\n## Dockerfile\n\nA three-stage build that produces a minimal runtime image.\n\n### Stage 1 — `dashboard-builder`\n\n- **Base:** `node:20-alpine`\n- Builds the React dashboard from `crates/librefang-api/dashboard`\n- Outputs static assets to `/build/static/react`\n\n### Stage 2 — `builder`\n\n- **Base:** `rust:1-slim-bookworm`\n- Installs build dependencies (`build-essential`, `pkg-config`, `libssl-dev`, `perl`)\n- Copies the full workspace: `Cargo.toml`, `Cargo.lock`, `crates/`, `xtask/`, `packages/`\n- Copies the React build artifacts from stage 1 into `crates/librefang-api/static/react`\n- Uses Docker build caches for the cargo registry, git clone cache, and `target/` directory to speed up rebuilds\n- Produces the release binary at `/usr/local/bin/librefang`\n\n### Stage 3 — Runtime\n\n- **Base:** `node:lts-bookworm-slim`\n- Installs runtime dependencies:\n  - `ca-certificates` — TLS certificate validation\n  - `python3` / `python3-venv` — required for package sandboxing\n  - `libicu72` — ICU data for internationalization\n  - `gosu` — privilege dropping for the entrypoint\n- Copies the binary from the builder stage and the `packages/` directory to `/opt/librefang/packages`\n- Copies `docker-entrypoint.sh` as the container entrypoint\n- Exposes port **4545**\n- Sets `LIBREFANG_HOME=/data`\n\nThe choice of `node:lts-bookworm-slim` as the runtime base (instead of a Rust-specific image) is intentional — the `packages/` sandbox may invoke Node.js tooling.\n\n---\n\n## docker-entrypoint.sh\n\nRuns as **root** during initialization, then drops to the `node` user via `gosu` before executing the main process.\n\n### Initialization sequence\n\n1. **Data directory** — Creates `$LIBREFANG_HOME` (default `/data`) and ensures it is owned by `node:node`. Subsequent boots skip the `chown` if ownership is already correct.\n\n2. **First-boot init** — Runs `librefang init` only when `$DATA_DIR/config.toml` does not exist. This is intentional: the kernel re-syncs its internal registry on every startup, so re-running init would accumulate timestamped config backups without adding value.\n\n3. **Cloud platform port injection** — When `PORT` is set (injected by Railway, Render, Fly.io), the entrypoint rewrites `api_listen` in `config.toml` on every boot. This is necessary because a rescheduled machine may receive a different port.\n\n4. **Model override** — When `LIBREFANG_MODEL` is set, overwrites `model =` in `config.toml`. Useful for switching models without recreating the container.\n\n5. **Exec** — `exec gosu node \"$@\"` replaces the shell process with the actual command (default: `librefang start --foreground`) running as `node`.\n\n---\n\n## docker-compose.yml\n\nThe primary compose file for running LibreFang as a standalone service.\n\n**Key configuration:**\n\n| Setting | Value | Notes |\n|---------|-------|-------|\n| Image | `ghcr.io/librefang/librefang:latest` | Pre-built from GitHub Container Registry |\n| Port | `4545:4545` | API and dashboard |\n| Volume | `librefang-data:/data` | Named volume for persistent data |\n| Restart | `unless-stopped` | Survives host reboots |\n\n**Environment variables** are passed through for LLM provider keys (`ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, `GROQ_API_KEY`) and messaging platform bot tokens (`TELEGRAM_BOT_TOKEN`, `DISCORD_BOT_TOKEN`, `SLACK_BOT_TOKEN`, `SLACK_APP_TOKEN`). All default to empty, so only keys you set in your `.env` file or shell environment are forwarded.\n\n**Building from source** — Uncomment the `build:` block to build locally instead of pulling the GHCR image:\n\n```yaml\nbuild:\n  context: ..\n  dockerfile: deploy/Dockerfile\n```\n\n---\n\n## docker-compose.observability.yml\n\nA separate compose file that runs Prometheus and Grafana alongside LibreFang. Uses the `librefang` project name so it can coexist with the main compose file.\n\n### Services\n\n- **Prometheus** (`prom/prometheus:latest`) — Listens on `:9090`. Scrapes LibreFang at `http://host.docker.internal:4545/api/metrics` every 15 seconds. Configuration is loaded from `deploy/prometheus/prometheus.yml`.\n\n- **Grafana** (`grafana/grafana:latest`) — Listens on `:3000`. Default credentials: `admin` / `admin`. Datasource and four dashboards are auto-provisioned from `deploy/grafana/`.\n\n### Prerequisites\n\nPrometheus metrics must be enabled in the LibreFang configuration:\n\n```toml\n[telemetry]\nprometheus_enabled = true\n```\n\n### Dashboards\n\n| Dashboard | File | Purpose |\n|-----------|------|---------|\n| LibreFang Overview | `librefang.json` | System health: version, uptime, agent counts, sessions, daily cost, panics/restarts |\n| LLM & Token Usage | `librefang-llm.json` | Token consumption by agent/provider/model with interactive template variables |\n| HTTP & API | `librefang-http.json` | Request rates, latency percentiles (p50/p90/p99), status codes, slowest endpoints |\n| Cost & Budget | `librefang-cost.json` | Spending visibility with per-agent breakdown and input/output cost ratios |\n\nAll four dashboards include cross-navigation links to each other.\n\n### Usage\n\n```bash\n# Start the observability stack (LibreFang must already be running)\ndocker compose -f docker-compose.observability.yml up -d\n\n# Stop and remove containers\ndocker compose -f docker-compose.observability.yml down\n\n# Stop and delete all stored metrics data\ndocker compose -f docker-compose.observability.yml down -v\n```\n\n### Customizing the scrape target\n\nEdit `prometheus/prometheus.yml` to point at a remote LibreFang instance:\n\n```yaml\nscrape_configs:\n  - job_name: \"librefang\"\n    metrics_path: /api/metrics\n    static_configs:\n      - targets: [\"your-server.example.com:4545\"]\n```\n\n---\n\n## librefang.service\n\nA systemd unit file for running LibreFang directly on a host (VM, bare metal) without Docker.\n\n### Installation\n\n```bash\nsudo cp deploy/librefang.service /etc/systemd/system/\nsudo useradd --system --home-dir /var/lib/librefang librefang\nsudo mkdir -p /var/lib/librefang\nsudo chown librefang:librefang /var/lib/librefang\nsudo systemctl daemon-reload\nsudo systemctl enable --now librefang\n```\n\n### Configuration\n\n- **User/Group:** `librefang` — the service never runs as root\n- **Working directory:** `/var/lib/librefang`\n- **Environment file:** `/etc/librefang/env` (optional; create it to set API keys without modifying the unit)\n\nExample `/etc/librefang/env`:\n\n```\nANTHROPIC_API_KEY=sk-ant-...\nOPENAI_API_KEY=sk-...\n```\n\n### Security hardening\n\nThe unit applies strict systemd sandboxing:\n\n| Directive | Effect |\n|-----------|--------|\n| `NoNewPrivileges=true` | Prevents escalation via setuid binaries |\n| `ProtectSystem=strict` | Makes the entire filesystem read-only except explicit paths |\n| `ReadWritePaths=/var/lib/librefang` | Only writable directory |\n| `ProtectHome=true` | Hides `/home`, `/root`, `/run/user` |\n| `PrivateTmp=true` | Isolated `/tmp` |\n| `ProtectKernelTunables=true` | Read-only `/sys`, `/proc/sys` |\n| `ProtectKernelModules=true` | Blocks module loading |\n| `ProtectControlGroups=true` | Read-only `/sys/fs/cgroup` |\n| `RestrictSUIDSGID=true` | Blocks setuid/setgid creation |\n| `MemoryDenyWriteExecute=false` | Disabled — JIT compilers in Node.js packages require W+X memory |\n\n`MemoryDenyWriteExecute` is explicitly set to `false` because the package sandboxing system spawns Node.js processes that use JIT compilation.\n\n### Resource limits\n\n- **LimitNOFILE=65536** — High file descriptor limit for concurrent agent sessions and package operations\n- **LimitNPROC=4096** — Allows the `librefang` user to spawn sufficient child processes\n\n---\n\n## render.yaml\n\nBlueprint for deploying to [Render](https://render.com) as a managed Docker service.\n\n### Limitations on the free tier\n\nThe free plan does **not** support persistent disks. All data (config, conversation history, local database) is lost on each deploy or restart. The YAML includes commented-out instructions for attaching a disk on paid plans:\n\n```yaml\ndisk:\n  name: librefang-data\n  mountPath: /data\n  sizeGB: 1\n```\n\n### Configuration\n\n- **Health check:** `/api/health` — Render uses this to determine instance readiness\n- **Environment variables:** `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, `GROQ_API_KEY` — marked as `sync: false` so they are not inherited from the Render account and must be set manually for security\n\nTo deploy, connect your repository to Render and it will detect `deploy/render.yaml` automatically, or specify `deploy/render.yaml` as the blueprint path.\n\n---\n\n## Quick Reference: Choosing a Deployment Method\n\n| Method | Best for | Persistent data | Command |\n|--------|----------|-----------------|---------|\n| Docker Compose | Self-hosted servers, full control | ✅ Named volume | `docker compose up -d` |\n| Systemd | Bare-metal/VM without Docker | ✅ `/var/lib/librefang` | `systemctl enable --now librefang` |\n| Render | Managed hosting, no ops | ⚠️ Paid plans only | Push to connected repo |\n| Docker manual | Custom orchestration | Mount a volume | `docker run -v ... ghcr.io/librefang/librefang:latest` |","deployment-fly":"# Deployment — fly\n\n# Deployment — Fly.io\n\nThe `deploy/fly/` module provides a fully automated, one-command deployment pipeline for LibreFang on [Fly.io](https://fly.io). It includes interactive provisioning, configuration, deployment, and teardown — no prior Fly.io setup required.\n\n## Files\n\n| File | Purpose |\n|---|---|\n| `deploy/fly/deploy.sh` | End-to-end provisioning and deployment script |\n| `deploy/fly/fly.toml` | Fly.io machine/app configuration (image, volumes, HTTP service) |\n| `deploy/fly/uninstall.sh` | Interactive teardown of deployed LibreFang apps |\n\n## Quick Start\n\n```bash\n# Deploy\ncurl -sL https://raw.githubusercontent.com/librefang/librefang/main/deploy/fly/deploy.sh | bash\n\n# Uninstall\ncurl -sL https://raw.githubusercontent.com/librefang/librefang/main/deploy/fly/uninstall.sh | bash\n```\n\nBoth scripts are safe to pipe into bash — they are pure shell with no hidden dependencies beyond `flyctl`, `git`, `openssl`, and `python3`.\n\n## Deployment Pipeline (`deploy.sh`)\n\nThe script runs eight sequential stages. Each stage must succeed before the next begins (`set -euo pipefail`).\n\n```mermaid\nflowchart TD\n    A[Check / Install flyctl] --> B[Auth via browser]\n    B --> C[Clone repo to tempdir]\n    C --> D[Name & create Fly app]\n    D --> E[Create 1GB persistent volume]\n    E --> F[Set LLM provider secrets]\n    F --> G[flyctl deploy --remote-only]\n    G --> H[Print URLs & cleanup tempdir]\n```\n\n### Stage Details\n\n**1. Prerequisite check** — Verifies `flyctl` is on `$PATH`. If missing, downloads and installs it via the official Fly.io installer, then adds `~/.fly/bin` to `$PATH`.\n\n**2. Authentication** — Runs `flyctl auth whoami` to test for an existing session. If unauthenticated, opens a browser for OAuth login via `flyctl auth login`.\n\n**3. Clone** — Creates a temporary directory, shallow-clones (`--depth 1`) the LibreFang repository, and `cd`s into it.\n\n**4. App creation** — Prompts for an app name. Accepts custom names (sanitized to lowercase alphanumeric with hyphens) or auto-generates one as `librefang-<8-hex-chars>`. Retries on name collision. Updates the `app` field in `fly.toml` via `sed`.\n\n**5. Persistent volume** — Creates a 1 GB volume named `librefang_data` in the configured region. This volume is mounted at `/data` inside the container (see `fly.toml` `[mounts]`).\n\n**6. LLM provider secrets** — Presents an interactive TUI multi-select menu for eight LLM providers:\n\n| Provider | Environment Variable |\n|---|---|\n| OpenAI | `OPENAI_API_KEY` |\n| Anthropic | `ANTHROPIC_API_KEY` |\n| Google Gemini | `GEMINI_API_KEY` |\n| Groq | `GROQ_API_KEY` |\n| DeepSeek | `DEEPSEEK_API_KEY` |\n| OpenRouter | `OPENROUTER_API_KEY` |\n| Mistral | `MISTRAL_API_KEY` |\n| xAI / Grok | `XAI_API_KEY` |\n\nFor each selected provider, the script prompts for the API key and sets it via `flyctl secrets set`. This stage is optional — pressing `Esc` or `q` skips it entirely.\n\n**7. Deploy** — Runs `flyctl deploy` using the modified `fly.toml`, with `--remote-only` so the build happens on Fly's remote builders (no Docker required locally).\n\n**8. Cleanup** — Prints the dashboard URL (`https://<app>.fly.dev`), health check endpoint, and management commands. Removes the temporary clone directory.\n\n### Default Region\n\nThe default region is `nrt` (Tokyo). To change it, modify the `REGION` variable at the top of `deploy.sh` and the `primary_region` in `fly.toml`.\n\n## App Configuration (`fly.toml`)\n\n```toml\napp = \"librefang\"               # Overwritten at deploy time\nprimary_region = \"nrt\"\n\n[build]\nimage = \"ghcr.io/librefang/librefang:latest\"   # Pre-built OCI image\n\n[env]\nLIBREFANG_HOME = \"/data\"\nLIBREFANG_LISTEN = \"0.0.0.0:4545\"\n\n[http_service]\ninternal_port = 4545\nforce_https = true\nauto_stop_machines = \"suspend\"   # Machines suspend on idle\nauto_start_machines = true\nmin_machines_running = 1\n\n[mounts]\nsource = \"librefang_data\"        # Created by deploy.sh stage 5\ndestination = \"/data\"\n\n[[vm]]\nmemory = \"256mb\"\ncpu_kind = \"shared\"\ncpus = 1\n```\n\nKey configuration points:\n\n- **Image source**: Deploys from the published GHCR container image, not a local build.\n- **Persistence**: The `librefang_data` volume is mounted at `/data`, which `LIBREFANG_HOME` points to. All mutable state lives here.\n- **HTTP service**: Listens on port `4545` internally, exposed with forced HTTPS and automatic machine management.\n- **VM sizing**: 256 MB shared-CPU — sufficient for the proxy workload. Adjust `[[vm]]` for higher throughput.\n\n## Uninstallation (`uninstall.sh`)\n\nTeardown is the reverse of provisioning:\n\n1. **Verify `flyctl` and auth** — Same checks as `deploy.sh`.\n2. **Discover apps** — Fetches all apps via `flyctl apps list --json` and filters for names starting with `librefang` using an inline Python script.\n3. **Interactive selection** — Same TUI multi-select pattern as deploy: choose one or more apps to destroy, or cancel with `Esc`/`q`.\n4. **Confirmation** — Requires typing `yes` explicitly. Warns that all data, volumes, and secrets are permanently deleted.\n5. **Destroy** — Calls `flyctl apps destroy <app> --yes` for each selected app.\n\n## TUI Multi-Select Pattern\n\nBoth scripts share a terminal UI for multi-selection. Understanding its controls helps when guiding users:\n\n| Key | Action |\n|---|---|\n| `↑` / `k` | Move cursor up |\n| `↓` / `j` | Move cursor down |\n| `Space` | Toggle selection on current item |\n| `Enter` | Confirm (selects current item if none toggled) |\n| `Esc` / `q` | Cancel / skip |\n\nThe implementation hides the terminal cursor (`\\033[?25l`), redraws in-place using `\\033[<n>A` to move up, and restores the cursor on exit via a `trap` on `RETURN`.\n\n## Managing Secrets After Deployment\n\nAPI keys can be added or rotated at any time without redeploying:\n\n```bash\n# Add a new provider key\nflyctl secrets set ANTHROPIC_API_KEY=sk-ant-... --app librefang-myapp\n\n# Rotate an existing key\nflyctl secrets set OPENAI_API_KEY=sk-new-key --app librefang-myapp\n\n# List current secrets (names only, values are hidden)\nflyctl secrets list --app librefang-myapp\n```\n\nFly.io injects secrets as environment variables on the next machine start. If the app is already running with `auto_stop_machines = \"suspend\"`, you can force a restart:\n\n```bash\nflyctl machines restart --app librefang-myapp\n```","deployment-gcp":"# Deployment — gcp\n\n# Deployment — GCP (Free Tier)\n\nProvisions a single `e2-micro` Compute Engine instance running LibreFang, entirely within GCP's always-free tier. The deployment uses Terraform for infrastructure and cloud-init for VM bootstrapping — no Ansible, no Packer, no container registry required.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TF[\"terraform apply\"]\n    TF --> VPC[\"google_compute_network\"]\n    TF --> SUB[\"google_compute_subnetwork<br/>(10.0.1.0/24)\"]\n    TF --> FW_SSH[\"Firewall: SSH (22)\"]\n    TF --> FW_HTTP[\"Firewall: HTTP (4545)\"]\n    TF --> VM[\"google_compute_instance<br/>e2-micro / 30 GB disk\"]\n    VM -->|user-data| CI[\"cloud-init.yml.tpl\"]\n    CI --> DL[\"Download librefang binary\"]\n    CI --> SVC[\"systemd: librefang.service\"]\n    SVC --> APP[\"librefang start<br/>:4545\"]\n```\n\nThe result is a single Ubuntu 24.04 VM exposing LibreFang's dashboard and API on port 4545 with an ephemeral public IP.\n\n## File Reference\n\n| File | Purpose |\n|------|---------|\n| `main.tf` | All Terraform resources: VPC, subnet, firewall rules, compute instance |\n| `variables.tf` | Input variables with defaults and sensitivity flags |\n| `outputs.tf` | Post-apply outputs: `external_ip`, `ssh_command`, `dashboard_url` |\n| `cloud-init.yml.tpl` | Cloud-init template rendered with API keys and version; creates the systemd unit |\n| `terraform.tfvars.example` | Copy-to-`terraform.tfvars` template with commented defaults |\n\n## Infrastructure Details\n\n### Compute\n\n- **Machine type:** `e2-micro` (0.25 vCPU, 1 GB RAM) — covered by free tier\n- **Boot disk:** 30 GB `pd-standard` on Ubuntu 24.04 LTS — matches the 30 GB free-tier disk allowance\n- **Networking:** Custom VPC (`librefang-vpc`) with a single subnet (`10.0.1.0/24`). An ephemeral public IP is assigned automatically via the `access_config` block.\n\n### Firewall\n\nTwo rules attached to the `librefang` target tag:\n\n| Rule | Protocol | Port | Source |\n|------|----------|------|--------|\n| `librefang-allow-ssh` | TCP | 22 | `0.0.0.0/0` |\n| `librefang-allow-http` | TCP | 4545 | `0.0.0.0/0` |\n\nBoth are open to the internet. For production use, restrict `source_ranges` to your own IP ranges.\n\n## Cloud-Init Bootstrap\n\nThe `cloud-init.yml.tpl` template is rendered by Terraform at apply time, injecting API keys and the desired release version. It performs the following in order:\n\n1. **Creates a `librefang` user** with passwordless sudo.\n2. **Installs packages:** `curl`, `jq`, `htop`, `fail2ban`.\n3. **Writes the systemd unit** to `/etc/systemd/system/librefang.service` with these environment variables:\n   - `LIBREFANG_HOME=/data`\n   - `LIBREFANG_BIND=0.0.0.0:4545`\n   - `GROQ_API_KEY`, `OPENAI_API_KEY`, `ANTHROPIC_API_KEY` (from Terraform variables)\n4. **Downloads the LibreFang binary** from GitHub Releases. Supports both `latest` (queries the GitHub API with `jq` to find the matching asset) and pinned versions (constructs the URL directly). Detects architecture (`x86_64` or `aarch64`) automatically.\n5. **Enables and starts** the `librefang` systemd service.\n\n### Service Hardening\n\nThe systemd unit applies these restrictions:\n\n```ini\nProtectSystem=strict\nReadWritePaths=/data\nPrivateTmp=true\nNoNewPrivileges=true\n```\n\nThe process runs as the `librefang` user with write access only to `/data`.\n\n## Configuration\n\nCopy and edit the variables file:\n\n```bash\ncp terraform.tfvars.example terraform.tfvars\n```\n\n### Required Variables\n\n| Variable | Description |\n|----------|-------------|\n| `project_id` | Your GCP project ID |\n\n### Optional Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `region` | `us-central1` | GCP region for all resources |\n| `zone` | `us-central1-a` | GCP zone for the VM |\n| `ssh_pub_key_path` | `~/.ssh/id_rsa.pub` | Local path to your SSH public key (injected into the VM via metadata) |\n| `librefang_version` | `latest` | GitHub release tag, or `\"latest\"` to auto-detect |\n\n### API Key Variables\n\nAt least one must be non-empty for LibreFang to function. All are marked `sensitive` so they won't appear in Terraform logs.\n\n| Variable | Default |\n|----------|---------|\n| `groq_api_key` | `\"\"` |\n| `openai_api_key` | `\"\"` |\n| `anthropic_api_key` | `\"\"` |\n\n## Deployment\n\n```bash\ncd deploy/gcp\n\n# Authenticate gcloud (sets up application-default credentials)\ngcloud auth application-default login\n\n# Initialize Terraform providers\nterraform init\n\n# Review the plan\nterraform plan\n\n# Apply (~2 minutes for GCP to provision the VM)\nterraform apply\n```\n\nAfter `apply` completes, note the outputs:\n\n```\ndashboard_url = \"http://XX.XX.XX.XX:4545\"\nssh_command   = \"ssh librefang@XX.XX.XX.XX\"\n```\n\n### Verify\n\nWait approximately one minute for cloud-init to finish downloading and starting LibreFang:\n\n```bash\ncurl http://$(terraform output -raw external_ip):4545/api/health\n```\n\n### SSH Access\n\n```bash\nssh librefang@$(terraform output -raw external_ip)\n```\n\nYour public key (from `ssh_pub_key_path`) is injected via the instance's `ssh-keys` metadata, authenticating you as the `librefang` user.\n\n## Teardown\n\n```bash\nterraform destroy\n```\n\nThis deletes the VM, disk, firewall rules, subnet, and VPC. The ephemeral public IP is released automatically. Any data in `/data` on the VM is lost.\n\n## Free-Tier Cost\n\n| Resource | Free Allowance | This Deployment |\n|----------|---------------|-----------------|\n| e2-micro | 1 instance/month (us-west1, us-central1, us-east1 only) | 1 instance |\n| Standard persistent disk | 30 GB/month | 30 GB |\n| Outbound egress | 1 GB/month (to non-China/Australia) | Minimal |\n\nThe deployment costs **$0/month** as long as you stay within these limits. Egress beyond 1 GB/month is billed at standard rates.\n\n> **Note:** The `region` default is `us-central1`, which qualifies for the free-tier e2-micro. Changing to a non-free-tier region will incur charges.\n\n## Customization Points\n\n- **Pin a version:** Set `librefang_version = \"v0.4.2-20260314\"` in `terraform.tfvars` for reproducible deploys.\n- **Restrict firewall access:** Edit the `source_ranges` in `main.tf` for `google_compute_firewall.allow_ssh` and `allow_http` to limit access by IP.\n- **Add a persistent disk:** Attach an additional `google_compute_disk` and mount it in cloud-init if you need data persistence independent of the boot disk.\n- **HTTPS:** Place Cloudflare Tunnel or a reverse proxy (Caddy/nginx) in front of port 4545 for TLS termination — this is not included in the default config.","deployment-grafana":"# Deployment — grafana\n\n# Deployment — Grafana\n\n## Overview\n\nThis module provides a complete Grafana observability stack for LibreFang, consisting of four pre-built dashboards and the provisioning configuration to load them automatically. All dashboards query a single Prometheus datasource and are cross-linked for quick navigation between views.\n\n## Directory Layout\n\n```\ndeploy/grafana/\n├── dashboards/\n│   ├── librefang.json           # System Overview (uid: librefang-overview)\n│   ├── librefang-llm.json       # LLM & Token Usage (uid: librefang-llm)\n│   ├── librefang-http.json      # HTTP & API Metrics (uid: librefang-http)\n│   └── librefang-cost.json      # Cost & Budget (uid: librefang-cost)\n└── provisioning/\n    ├── dashboards/\n    │   └── dashboard.yml         # Auto-loads JSON from /var/lib/grafana/dashboards\n    └── datasources/\n        └── prometheus.yml         # Registers Prometheus at http://prometheus:9090\n```\n\n## Provisioning\n\n### Datasource\n\n`provisioning/datasources/prometheus.yml` registers a single Prometheus instance:\n\n| Field | Value |\n|-------|-------|\n| `name` | Prometheus |\n| `uid` | `librefang-prometheus` |\n| `type` | prometheus |\n| `access` | proxy |\n| `url` | `http://prometheus:9090` |\n| `isDefault` | true |\n| `editable` | false |\n\nEvery dashboard targets this datasource by uid (`\"uid\": \"librefang-prometheus\"`). The hostname `prometheus` assumes a Docker Compose or Kubernetes network where Prometheus is reachable at that name on port 9090.\n\n### Dashboard Provider\n\n`provisioning/dashboards/dashboard.yml` tells Grafana to recursively load all JSON files from `/var/lib/grafana/dashboards`. In a container deployment, mount the `dashboards/` directory to that path:\n\n```yaml\nvolumes:\n  - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro\n```\n\nThe provider allows edits and deletions from the UI (`editable: true`, `disableDeletion: false`), but those changes are ephemeral — they reset when the container restarts unless you persist Grafana's data directory.\n\n## Dashboard Navigation\n\nAll four dashboards include a top-level link bar for cross-navigation:\n\n```mermaid\ngraph LR\n    A[Overview<br/>librefang-overview] -->|link| B[LLM & Tokens<br/>librefang-llm]\n    A -->|link| C[HTTP & API<br/>librefang-http]\n    A -->|link| D[Cost & Budget<br/>librefang-cost]\n    B -->|link| A\n    B -->|link| C\n    B -->|link| D\n    C -->|link| A\n    C -->|link| B\n    C -->|link| D\n    D -->|link| A\n    D -->|link| B\n```\n\nEach link uses the dashboard uid in the URL path (e.g. `/d/librefang-llm`) so they work regardless of the Grafana root URL.\n\n## Dashboard Details\n\n### 1. LibreFang Overview (`librefang-overview`)\n\n**File**: `librefang.json`  \n**Default time range**: Last 1 hour  \n**Template variables**: None\n\nThe landing dashboard showing system health at a glance.\n\n**Row 1 — Status bar** (6 stat panels):\n\n| Panel | Metric | Notes |\n|-------|--------|-------|\n| Version | `librefang_info` | Displays `{{version}}` label, no graph |\n| Uptime | `librefang_uptime_seconds` | Formatted as duration |\n| Active Agents | `librefang_agents_active` | Yellow at 10, red at 50 |\n| Total Agents | `librefang_agents_total` | Instant query |\n| Active Sessions | `librefang_active_sessions` | Yellow at 5, red at 20 |\n| Cost Today | `librefang_cost_usd_today` | USD, yellow at $1, red at $10 |\n\n**Row 2 — Health indicators** (2 stat panels):\n\n| Panel | Metric | Notes |\n|-------|--------|-------|\n| Panics | `librefang_panics_total` | Orange at 1, red at 100 |\n| Restarts | `librefang_restarts_total` | Red at ≥1 |\n\n**Charts**:\n\n| Panel | Type | Metrics |\n|-------|------|---------|\n| Panics & Restarts Over Time | timeseries | `librefang_panics_total`, `librefang_restarts_total` |\n| Active vs Total Agents | timeseries | `librefang_agents_active`, `librefang_agents_total` |\n\n---\n\n### 2. LLM & Token Usage (`librefang-llm`)\n\n**File**: `librefang-llm.json`  \n**Default time range**: Last 1 hour  \n**Template variables**: `agent`, `provider`, `model` (all multi-select with \"All\" default)\n\nDeep-dive into LLM usage patterns.\n\n**Template Variables**\n\n| Name | Query | Dependency |\n|------|-------|------------|\n| `$agent` | `label_values(librefang_tokens, agent)` | None |\n| `$provider` | `label_values(librefang_tokens, provider)` | None |\n| `$model` | `label_values(librefang_tokens{provider=~\"$provider\"}, model)` | Filtered by `$provider` |\n\nAll three use `allValue: \".*\"` with regex matching in queries (e.g. `agent=~\"$agent\"`).\n\n**Row 1 — Summary stats** (4 panels):\n\n| Panel | Metric |\n|-------|--------|\n| Total Tokens | `sum(librefang_tokens{...})` |\n| Input Tokens | `sum(librefang_tokens_input{...})` |\n| Output Tokens | `sum(librefang_tokens_output{...})` |\n| LLM Calls | `sum(librefang_llm_calls{...})` |\n\n**Charts**:\n\n| Panel | Type | Details |\n|-------|------|---------|\n| Tokens Consumed by Agent | stacked timeseries | Per-agent token lines, legend shows last value and max |\n| LLM Calls by Agent | stacked bars | Per-agent call counts |\n| Input vs Output Tokens | stacked bars | Blue=input, orange=output |\n| Tokens by Provider/Model | stacked timeseries | Grouped by `(provider, model)` |\n| Agent Token Breakdown | donut chart | Current distribution per agent |\n| Token Input/Output Ratio | donut chart | Global ratio, blue vs orange |\n| Tool Calls by Agent | stacked bars | `librefang_tool_calls` metric |\n\n---\n\n### 3. HTTP & API Metrics (`librefang-http`)\n\n**File**: `librefang-http.json`  \n**Default time range**: Last 1 hour  \n**Template variables**: None\n\nStandard RED (Rate, Errors, Duration) metrics for the HTTP layer.\n\n**Metrics used**:\n\n| Metric | Type | Labels |\n|--------|------|--------|\n| `librefang_http_requests_total` | counter | `method`, `status`, `path` |\n| `librefang_http_request_duration_seconds_bucket` | histogram | `path`, `le` |\n\n**Panels**:\n\n| Panel | Type | PromQL |\n|-------|------|--------|\n| HTTP Request Rate | timeseries | `sum(rate(librefang_http_requests_total[5m]))` + by method |\n| Request Latency (p50/p90/p99) | timeseries | `histogram_quantile(0.50/0.90/0.99, ...)` over 5m windows |\n| Request Rate by Status Code | stacked timeseries | Grouped by `status` label |\n| HTTP Error Rate (4xx/5xx) | timeseries | Regex matchers `status=~\"4..\"` and `status=~\"5..\"` |\n| Top Endpoints by Request Count | horizontal bargauge | `topk(10, sum by (path) (increase(...[1h])))` |\n| Slowest Endpoints (p99) | horizontal bargauge | `topk(10, histogram_quantile(0.99, ...))` by path |\n\nThe latency panel uses fixed colors: green for p50, orange for p90, red for p99. Error rates use orange for 4xx and red for 5xx.\n\n---\n\n### 4. Cost & Budget (`librefang-cost`)\n\n**File**: `librefang-cost.json`  \n**Default time range**: Last 6 hours  \n**Template variables**: Same as LLM dashboard (`agent`, `provider`, `model`)\n\nFocuses on spending patterns and token cost proxies.\n\n**Panels**:\n\n| Panel | Type | Purpose |\n|-------|------|---------|\n| Cost Today (USD) | stat | Direct cost metric with 4-step threshold ($0→green, $1→yellow, $5→orange, $10→red) |\n| Total Tokens | stat | 1h window sum, used as cost proxy |\n| LLM Calls | stat | 1h window sum |\n| Cost Trend | timeseries | `librefang_cost_usd_today` over time |\n| Tokens by Agent (cost proxy) | stacked timeseries | Per-agent token consumption |\n| Cost by Model (token share) | donut chart | `sum by (provider, model)` |\n| Output Tokens by Agent | horizontal bargauge | `topk(10, librefang_tokens_output{...})` — highlights most expensive agents |\n| Input / Output Token Ratio | donut chart | Blue=input (cheaper), orange=output (expensive) |\n\nThe 6-hour default window is wider than other dashboards to better show daily cost accumulation.\n\n## Required Prometheus Metrics\n\nThe application must expose the following metrics at its `/metrics` endpoint for these dashboards to function:\n\n```\n# Info\nlibrefang_info{version=\"...\"}\n\n# System health\nlibrefang_uptime_seconds\nlibrefang_agents_active\nlibrefang_agents_total\nlibrefang_active_sessions\nlibrefang_panics_total\nlibrefang_restarts_total\n\n# Cost\nlibrefang_cost_usd_today\n\n# LLM usage (labels: agent, provider, model)\nlibrefang_tokens\nlibrefang_tokens_input\nlibrefang_tokens_output\nlibrefang_llm_calls\nlibrefang_tool_calls\n\n# HTTP (labels: method, status, path)\nlibrefang_http_requests_total\nlibrefang_http_request_duration_seconds_bucket\n```\n\nAll label names in the dashboards are hardcoded — the application must use exactly `agent`, `provider`, `model`, `method`, `status`, and `path` as label keys.\n\n## Deployment\n\nMount both directories into the Grafana container:\n\n```yaml\nservices:\n  grafana:\n    image: grafana/grafana:latest\n    volumes:\n      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro\n      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro\n    environment:\n      - GF_SECURITY_ADMIN_USER=admin\n      - GF_SECURITY_ADMIN_PASSWORD=secret\n    ports:\n      - \"3000:3000\"\n```\n\nGrafana reads provisioning on startup. To reload dashboards without restarting, send a `POST` to the admin API or set `GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH` to one of the JSON files to set a custom landing page.\n\n## Modifying Dashboards\n\n1. **Edit in Grafana UI** — make changes, then use \"Inspect → JSON Model\" to export back to the JSON files.\n2. **Edit JSON directly** — all files use schema version 39. Key fields to preserve:\n   - `uid` — used by cross-dashboard links and the provisioning system.\n   - `datasource.uid` — must remain `\"librefang-prometheus\"`.\n   - `templating.list` — variable names (`$agent`, `$provider`, `$model`) are referenced in PromQL expressions via regex matchers like `agent=~\"$agent\"`.\n3. **Add new panels** — respect the `gridPos` layout. Panels are positioned on a 24-column grid. The `y` coordinate determines row placement.\n\nWhen adding a new dashboard, create the JSON file in `dashboards/`, choose a uid matching the `librefang-*` convention, and add navigation links in the `links` array of the other dashboards to integrate it into the cross-navigation flow.","deployment-prometheus":"# Deployment — prometheus\n\n# Deployment — Prometheus Configuration\n\n## Purpose\n\nThis module provides the Prometheus scrape configuration for monitoring the LibreFang application and its Ollama inference backend. It is a static YAML configuration file consumed directly by a Prometheus server instance, typically running in Docker alongside the application services.\n\n## Configuration File\n\n**Location:** `deploy/prometheus/prometheus.yml`\n\n## Global Settings\n\n| Setting | Value | Description |\n|---------|-------|-------------|\n| `scrape_interval` | `15s` | How frequently Prometheus scrapes targets across all jobs |\n| `evaluation_interval` | `15s` | How frequently Prometheus evaluates alerting and recording rules |\n\nBoth intervals use the same 15-second default, which balances observability granularity with minimal overhead on the scraped services.\n\n## Scrape Targets\n\nThe configuration defines two scrape jobs:\n\n### `librefang`\n\nScrapes application-level metrics from the main LibreFang service.\n\n- **Metrics endpoint:** `/api/metrics`\n- **Target:** `host.docker.internal:4545`\n- **Instance label:** `librefang-local`\n\nThe use of `host.docker.internal` indicates Prometheus runs inside a Docker container while the LibreFang application runs on the host machine. The port `4545` must match the application's listening port.\n\n### `ollama`\n\nScrapes metrics from the Ollama LLM inference service.\n\n- **Metrics endpoint:** `/metrics`\n- **Target:** `host.docker.internal:9102`\n- **Instance label:** `ollama-local`\n\nOllama exposes its own Prometheus-compatible metrics at `/metrics`. The port `9102` must match the Ollama exporter or service port.\n\n## Architecture\n\n```mermaid\ngraph LR\n    P[Prometheus<br/>Docker Container] -->|15s scrape /api/metrics| L[LibreFang<br/>host:4545]\n    P -->|15s scrape /metrics| O[Ollama<br/>host:9102]\n```\n\nPrometheus reaches both services through the Docker host networking bridge (`host.docker.internal`), which allows a containerized Prometheus to access services bound to host ports.\n\n## Usage\n\n### Running with Docker\n\n```bash\ndocker run -d \\\n  --name prometheus \\\n  -p 9090:9090 \\\n  -v $(pwd)/deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \\\n  prom/prometheus\n```\n\nAfter startup, the Prometheus UI is available at `http://localhost:9090`.\n\n### Running with Docker Compose\n\nIf integrating into a compose file, mount this configuration as a volume:\n\n```yaml\nservices:\n  prometheus:\n    image: prom/prometheus\n    ports:\n      - \"9090:9090\"\n    volumes:\n      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml\n```\n\n## Modifying the Configuration\n\n### Adding a new scrape target\n\nAppend a new entry under `scrape_configs`:\n\n```yaml\n- job_name: \"my-service\"\n  metrics_path: /metrics\n  static_configs:\n    - targets: [\"host.docker.internal:8080\"]\n      labels:\n        instance: \"my-service-local\"\n```\n\n### Changing the scrape interval for a single job\n\nOverride the global interval per-job:\n\n```yaml\n- job_name: \"librefang\"\n  scrape_interval: 10s\n  metrics_path: /api/metrics\n  static_configs:\n    - targets: [\"host.docker.internal:4545\"]\n```\n\n### Switching to service discovery\n\nFor non-local deployments, replace `static_configs` with a service discovery mechanism (e.g., DNS, Consul, or Kubernetes SD). Example with DNS:\n\n```yaml\n- job_name: \"librefang\"\n  metrics_path: /api/metrics\n  dns_sd_configs:\n    - names: [\"librefang.production.internal\"]\n      type: A\n      port: 4545\n```\n\n## Notes\n\n- This configuration does not define alerting rules or an `alertmanager` section. For production use, add a `rule_files` block and configure alerting endpoints.\n- There are no recording rules configured. Long-running dashboards may benefit from pre-aggregated recording rules to reduce query load.\n- The `host.docker.internal` hostname resolves correctly on Docker Desktop (macOS, Windows). On Linux, add `extra_hosts: [\"host.docker.internal:host-gateway\"]` to the Prometheus container configuration.","deployment-railway":"# Deployment — railway\n\n# Deployment — Railway\n\n## Overview\n\nThis module contains the Railway deployment configuration for the application. Railway uses these files to build a Docker image and manage the deployment lifecycle, including health monitoring and restart behavior.\n\nThe module provides the configuration in two formats — `railway.json` and `railway.toml` — both expressing identical settings. Railway supports either format; only one is required at runtime.\n\n## Files\n\n| File | Format | Purpose |\n|------|--------|---------|\n| `deploy/railway/railway.json` | JSON | Railway configuration conforming to the official `$schema`. Preferred for IDE validation and autocomplete. |\n| `deploy/railway/railway.toml` | TOML | Equivalent configuration in TOML. Provided for compatibility or developer preference. |\n\n## Configuration Reference\n\n### Build\n\n```json\n{\n  \"build\": {\n    \"dockerfilePath\": \"./deploy/Dockerfile\"\n  }\n}\n```\n\n- **`dockerfilePath`**: Points to the Dockerfile at `./deploy/Dockerfile` (relative to the project root). Railway uses this to build the container image. The Dockerfile itself lives in the `deploy/` directory alongside this configuration.\n\n### Deploy\n\n```json\n{\n  \"deploy\": {\n    \"healthcheckPath\": \"/api/health\",\n    \"restartPolicyType\": \"ON_FAILURE\"\n  }\n}\n```\n\n| Setting | Value | Description |\n|---------|-------|-------------|\n| `healthcheckPath` | `/api/health` | Railway sends periodic HTTP GET requests to this endpoint. A successful response (2xx) confirms the application is ready to receive traffic. |\n| `restartPolicyType` | `ON_FAILURE` | The container is restarted only when it exits with a non-zero status code (crash or error). Successful exits do not trigger a restart. |\n\n## Health Check Contract\n\nRailway expects the application to expose `GET /api/health` and return a 2xx status code once it is fully initialized and ready to serve requests. Until this endpoint responds successfully, Railway will not route traffic to the instance.\n\nMake sure the application:\n1. Starts listening on the configured port before the health check timeout elapses.\n2. Returns a 2xx response from `/api/health` only when all critical dependencies (database, cache, etc.) are connected and ready.\n\n## Relationship to the Rest of the Codebase\n\nThis module is a deployment artifact — it contains no executable code, no imports, and no runtime dependencies.\n\n- **Dockerfile** (`deploy/Dockerfile`): Referenced by both config files. Defines the image build steps, including copying source, installing dependencies, and specifying the start command.\n- **Application code**: Must implement the `/api/health` endpoint that Railway probes during deployment.\n\n## Usage\n\n### Deploy via Railway CLI\n\n```bash\n# Link the project (if not already linked)\nrailway link\n\n# Deploy using the configuration in this directory\nrailway up\n```\n\n### Deploy via Railway Dashboard\n\n1. Connect your Git repository to a Railway project.\n2. Railway auto-detects `railway.json` or `railway.toml` in the `deploy/railway/` directory.\n3. Configure the **Root Directory** setting in the Railway service to point to `deploy/railway/` so Railway finds the config file, or ensure the config file is at the repository root.\n\n### Choosing Between Config Formats\n\nBoth files are maintained in sync. Use whichever fits your workflow:\n\n- **`railway.json`** — enables schema validation in editors via the `$schema` field.\n- **`railway.toml`** — familiar syntax for teams using TOML across other tooling.\n\nDo **not** keep both files in the service root with conflicting values. Remove the one you are not using, or ensure they remain identical.","deployment-render-yaml":"# Deployment — render.yaml\n\n# Deployment — `render.yaml`\n\n## Purpose\n\nThis file defines the Render platform deployment configuration for **LibreFang**. It tells Render how to build, run, and configure the application as a containerized web service.\n\n## Overview\n\nThe configuration specifies a single Docker-based web service with three LLM provider API keys injected as environment variables. It targets Render's **free tier**, which comes with a critical caveat around data persistence.\n\n## Service Definition\n\n| Field | Value |\n|---|---|\n| **Service type** | `web` (HTTP-accessible) |\n| **Runtime** | Docker |\n| **Name** | `librefang` |\n| **Dockerfile path** | `deploy/Dockerfile` |\n| **Plan** | Free |\n| **Health check** | `GET /api/health` |\n\nThe application must implement a handler at `/api/health` that returns a successful HTTP response (typically `200 OK`). Render uses this endpoint to determine whether the service is running and ready to receive traffic.\n\n## Environment Variables\n\nThree API keys are defined with `sync: false`, meaning they are **manually set** by the developer in the Render dashboard and never pulled from a linked repository or auto-synced source.\n\n| Variable | Purpose |\n|---|---|\n| `GROQ_API_KEY` | Authentication key for the Groq LLM API |\n| `OPENAI_API_KEY` | Authentication key for the OpenAI API |\n| `ANTHROPIC_API_KEY` | Authentication key for the Anthropic API |\n\nAll three are optional at the config level — the application decides which providers to enable based on which keys are present. Set only the keys for providers you intend to use.\n\n## Free Tier Limitations\n\nRender's free tier does **not** support persistent disks. This means:\n\n- **Configuration**, **conversation history**, and any **local database** are stored in-memory or on ephemeral filesystem.\n- All data is **lost on every deploy or restart**.\n- The service spins down after periods of inactivity, causing further data loss.\n\nThis is acceptable for testing and demonstration, but not for production use.\n\n## Upgrading to Persistent Storage\n\nTo retain data across restarts, upgrade to a paid Render plan and add a disk block to the service definition:\n\n```yaml\nservices:\n  - type: web\n    runtime: docker\n    name: librefang\n    dockerfilePath: deploy/Dockerfile\n    plan: starter                # paid plan required\n    healthCheckPath: /api/health\n    disk:\n      name: librefang-data\n      mountPath: /data\n      sizeGB: 1\n    envVars:\n      - key: LIBREFANG_HOME\n        value: /data\n      - key: GROQ_API_KEY\n        sync: false\n      - key: OPENAI_API_KEY\n        sync: false\n      - key: ANTHROPIC_API_KEY\n        sync: false\n```\n\nThen set `LIBREFANG_HOME=/data` so the application writes all persistent state to the mounted disk. Adjust `sizeGB` based on your storage needs.\n\n## Relationship to Other Files\n\n```mermaid\ngraph LR\n    A[render.yaml] -->|references| B[deploy/Dockerfile]\n    B -->|builds| C[Application Source]\n    A -->|expects| D[\"/api/health endpoint\"]\n    A -->|injects| E[API Key Env Vars]\n    E -->|consumed by| C\n```\n\n- **`deploy/Dockerfile`** — The actual container build instructions. `render.yaml` points to this file; Render executes it during deployment.\n- **`/api/health`** — Must be implemented in the application source. Without a responding health check, Render will consider the service unhealthy and may terminate it.\n- **Application code** — Reads the injected `GROQ_API_KEY`, `OPENAI_API_KEY`, and `ANTHROPIC_API_KEY` environment variables at runtime to configure LLM provider clients.\n\n## Deployment Workflow\n\n1. Push changes to the connected Git branch.\n2. Render detects the `render.yaml` at the repository root.\n3. Render builds the Docker image using `deploy/Dockerfile`.\n4. The container starts; Render begins polling `/api/health`.\n5. Once the health check passes, the service is marked live and receives traffic.\n\n## Notes\n\n- The `sync: false` flag on each env var means you **must** set them manually in the Render dashboard under the service's Environment settings. They will not appear in logs or build output.\n- No `startCommand` is needed because the Dockerfile's `CMD` or `ENTRYPOINT` defines the startup process.\n- No `buildFilter` or branch configuration is specified here. If needed, add a `buildFilter` block to limit which branches or path changes trigger deploys.","deployment-whatsapp-gateway":"# Deployment — whatsapp-gateway\n\n# WhatsApp Gateway\n\nThe `whatsapp-gateway` is a standalone Node.js process that bridges WhatsApp (via the Baileys library) and the LibreFang agent platform. It receives WhatsApp messages, forwards them to a LibreFang agent for processing, and delivers the agent's responses back to WhatsApp contacts.\n\n## Architecture\n\n```mermaid\ngraph LR\n    WA[WhatsApp] -->|Baileys| GW[Gateway]\n    GW -->|POST /message| LF[LibreFang Agent]\n    LF -->|SSE stream| GW\n    GW -->|sendMessage| WA\n    GW -->|SQLite| DB[(messages.db)]\n    GW -->|HTTP API| UI[Dashboard / CLI]\n```\n\n## Configuration\n\nThe gateway reads from two sources, merged at startup:\n\n| Source | Priority | Path |\n|--------|----------|------|\n| `config.toml` | base defaults | `~/.librefang/config.toml` (overridable via `LIBREFANG_CONFIG`) |\n| Environment variables | overrides | — |\n\n### Environment Variables\n\n| Variable | Default | Purpose |\n|----------|---------|---------|\n| `WHATSAPP_GATEWAY_PORT` | `3009` | HTTP API listen port |\n| `LIBREFANG_URL` | `http://127.0.0.1:4545` | LibreFang daemon URL |\n| `LIBREFANG_DEFAULT_AGENT` | from config.toml | Agent name or UUID |\n| `WHATSAPP_DB_PATH` | `./messages.db` | SQLite database path |\n| `WHATSAPP_OWNER_JID` | — | Single owner JID (overrides config.toml `owner_numbers`) |\n| `CONVERSATION_TTL_HOURS` | `24` | Stranger conversation expiry |\n| `WA_HEARTBEAT_MS` | `180000` | Heartbeat timeout before forced reconnect |\n| `WA_HEARTBEAT_CHECK_MS` | `30000` | Heartbeat check interval |\n| `LIBREFANG_ECHO_TRACKER` | — | Set to `off` to disable echo suppression |\n\n### config.toml (WhatsApp section)\n\n```toml\n[channels.whatsapp]\ndefault_agent = \"assistant\"\nowner_numbers = [\"+391234567890\"]\nconversation_ttl_hours = 24\n```\n\n`owner_numbers` is critical — it determines which WhatsApp contacts are treated as the **owner** (full agent access + relay capabilities) versus **strangers** (sandboxed conversations with escalation tags).\n\n## Startup Flow\n\n1. Initialize SQLite (`messages.db`) with WAL mode and `messages` + `jid_last_seen` tables\n2. Read `config.toml` for agent name, owner numbers, conversation TTL\n3. Validate owner number format (7–15 digits)\n4. Build `OWNER_JIDS` set via `deriveOwnerJids()` from `lib/identity`\n5. Start HTTP server on `127.0.0.1:PORT`\n6. If `auth_store/creds.json` exists, auto-connect to WhatsApp\n7. Schedule background tasks: conversation eviction, DB cleanup, catch-up sweep\n\n## Connection Lifecycle\n\n### QR Pairing (`POST /login/start`)\n\nCreates a Baileys socket with `useMultiFileAuthState` from `./auth_store`. The QR code is converted to a base64 data URL and returned to the caller. Credentials are persisted on `creds.update` events so subsequent starts skip the QR flow.\n\n### Reconnection\n\nNon-terminal disconnects trigger exponential backoff reconnection via `computeBackoffDelay()`:\n\n- Base: `2s × 1.8^(attempt-1)`, capped at 30s\n- ±25% jitter\n- No hard stop — retries continue indefinitely at the capped interval\n\nTerminal disconnects (`loggedOut`, `forbidden`) clear the auth store and require manual re-pairing.\n\n### Heartbeat Watchdog (ST-01)\n\nA periodic check (`WA_HEARTBEAT_CHECK_MS` interval) compares `Date.now()` against `lastInboundAt`. If no inbound `messages.upsert` event arrives within `WA_HEARTBEAT_MS` (default 180s), the socket is force-closed to trigger the reconnect path.\n\n## Message Processing Pipeline\n\n```mermaid\ngraph TD\n    RX[messages.upsert] --> DEDUP{Duplicate?}\n    DEDUP -->|Yes| DROP[Drop]\n    DEDUP -->|No| STORE[Store raw msg]\n    STORE --> SELF{fromMe?}\n    SELF -->|Not self-chat| DROP2[Drop]\n    SELF -->|Self-chat or inbound| LID[Resolve LID → PN]\n    LID --> OWNER{Is owner?}\n    OWNER -->|Yes| OWNER_PATH[Owner routing]\n    OWNER -->|No, stranger| STRANGER_PATH[Stranger routing]\n    OWNER -->|Group| GROUP_PATH[Group routing]\n```\n\n### Inbound Message Handling (`messages.upsert`, type `notify`)\n\nFor each message:\n\n1. **Raw storage** — store in `messageStore` Map for Baileys retry decryption\n2. **Deduplication** — `recentMessageIds` Map with 60s window\n3. **Self-chat filter** — `fromMe` messages are only processed if addressed to own JID (WhatsApp \"Notes to Self\")\n4. **LID resolution** — resolve opaque `<digits>@lid` identifiers to phone-number JIDs via `resolvePeerId()` from `lib/identity`, with proactive `sock.onWhatsApp()` lookup for first-seen LIDs (`resolveLidProactively`)\n5. **Owner/stranger classification** — based on `OWNER_JIDS` and `ownerLidJids` sets\n6. **Rate limiting** — 3 messages per 60s window for strangers and groups\n7. **Agent resolution** — resolve `DEFAULT_AGENT` name → UUID via `GET /api/agents`\n8. **Media processing** — download from WhatsApp, upload to LibreFang (`POST /api/agents/{id}/upload`)\n9. **Echo suppression** — drop messages matching recently-sent outbound text (EB-01)\n10. **Context enrichment** — reply quotes, forwarded flags, location/contact parsing\n11. **DB save** — insert into `messages` table with `processed=0`\n12. **Read receipt** — send blue ticks immediately\n13. **Forward to LibreFang** — via streaming SSE endpoint with progressive WhatsApp edits\n14. **Response delivery** — strip `NO_REPLY` sentinel, convert markdown, send or edit message\n15. **DB update** — mark message as `processed=1`\n\n### Stranger Routing (Step C)\n\nStrangers receive a `[WHATSAPP_STRANGER_CONTEXT]` prefix injected before their message, containing:\n- Sender identity (push name, phone)\n- Conversation metadata (message count, start time)\n- Available routing tags (`[NOTIFY_OWNER]`)\n\nAgent responses to strangers are:\n- Cleaned of `[NOTIFY_OWNER]` tags before delivery to the stranger\n- Any extracted notifications are forwarded to the owner JID with 5-minute debounce per stranger\n\n### Owner Routing (Step E)\n\nWhen the owner messages the gateway and active stranger conversations exist, the agent receives:\n- `[ACTIVE_STRANGER_CONVERSATIONS]` block listing all active strangers with last message excerpts\n- `[SYSTEM_INSTRUCTION_WHATSAPP_RELAY]` instructing the agent to use `[RELAY_TO_STRANGER]` tags\n\nRelay commands are validated:\n- Target JID must exist in `activeConversations`\n- Message is reformulated by the agent (never raw owner text)\n- Audit-logged with timestamp, recipient, and message excerpt\n- Failed relays report errors back to the owner\n\n### Group Routing\n\nGroup messages include sender identity prefix `[Group message from ...]`. Participant rosters are fetched via `sock.groupMetadata()` and cached for 5 minutes (`GROUP_METADATA_TTL_MS`). The roster is forwarded to LibreFang in the `group_participants` payload field. Mention detection checks `mentionedJid` arrays against own JID.\n\n### NO_REPLY Sentinel\n\nAgents can emit `NO_REPLY` to silently decline answering. The `stripNoReply()` function handles three observed patterns:\n- Bare: entire response is `NO_REPLY`\n- Trailing: `...text\\nNO_REPLY`\n- Glued: `...emoji🎩NO_REPLY`\n\nWhen the stripped result is empty, message delivery is suppressed entirely.\n\n## Streaming (Progressive Edits)\n\nWhen the LibreFang SSE endpoint (`/api/agents/{id}/message/stream`) is available, the gateway:\n\n1. Opens a POST with `Accept: text/event-stream`\n2. Accumulates `chunk` events into a growing text buffer\n3. Calls `onProgress(accumulatedText)` at most every 2 seconds (`STREAMING_EDIT_INTERVAL_MS`)\n4. `onProgress` sends the first message via `sock.sendMessage({ text })`, then edits it in-place via `{ edit: key }`\n5. Internal tags (`[NOTIFY_OWNER]`, `[RELAY_TO_STRANGER]`, `NO_REPLY`) are scrubbed from partial text before each edit\n6. Falls back to non-streaming `forwardToLibreFang()` on any SSE error\n\n## Media Processing\n\nSupported media types: image, video, audio (including voice notes/Push-to-Talk), stickers, documents.\n\nFlow:\n1. `getDownloadableMedia()` detects the media type key in the Baileys message object\n2. `downloadMedia()` calls Baileys' `downloadMediaMessage()` with a 30s timeout and one retry\n3. Size check against `MAX_MEDIA_SIZE` (50MB)\n4. `uploadToLibreFang()` POSTs the buffer to `POST /api/agents/{id}/upload` with content type and filename headers\n5. If the upload response includes a `transcription` field (for audio), it's used as the message text\n6. On failure, falls back to a text descriptor like `[Photo from Alice]`\n\nAudio messages with PTT flag (voice notes) are transcribed when LibreFang's upload endpoint returns a transcription.\n\n## SQLite Message Store\n\nWAL-mode database with two tables:\n\n**`messages`** — every inbound/outbound message:\n- `id` (primary key), `jid`, `sender_jid`, `push_name`, `phone`, `text`\n- `direction` (`inbound`/`outbound`), `timestamp` (epoch ms)\n- `processed`: `0` = pending, `1` = done, `-1` = permanently failed\n- `retry_count`, `raw_type` (`text`, `image`, `audio`, `location`, `contact`, `decryption_error`, etc.)\n\n**`jid_last_seen`** — last message timestamp per JID for gap detection.\n\nPrepared statements are created once at module load for performance.\n\n### Catch-Up Sweep (Fase 3.1)\n\nRuns every 5 minutes. Selects messages with `processed=0` older than 30 seconds and re-forwards them to LibreFang. Messages with null/empty `jid` are skipped (`shouldSkipCatchupForMissingJid`). Group messages are skipped entirely (cannot determine mention context for replay). After `CATCHUP_MAX_RETRIES` (3) failures, messages are marked `processed=-1`.\n\n### Gap Detection (Fase 3.2 Option C)\n\nRuns every 10 minutes. Warns if a JID with recent activity (within 2 hours) has been silent for more than 30 minutes while an active conversation exists — indicates possible message loss.\n\n### DB Cleanup\n\nRuns daily. Deletes processed/failed messages older than 7 days.\n\n## Markdown → WhatsApp Formatting\n\n`markdownToWhatsApp()` converts LLM Markdown output to WhatsApp's formatting syntax:\n\n| Markdown | WhatsApp |\n|----------|----------|\n| `**bold**` | `*bold*` |\n| `*italic*` | `_italic_` |\n| `~~strike~~` | `~strike~` |\n| `` `code` `` | ` ```code``` ` |\n\nNotable edge cases handled:\n- `__init__` (Python dunders) is **not** converted to bold\n- Bullet list items (`* item`) are **not** converted to italic\n- Inline code content is protected from bold/italic conversion\n- Backslash-escaped stars (`\\*`) are preserved as literal `*`\n- Bold content containing `*` is shielded from italic regex collision\n\n## Identity Resolution (LID ↔ Phone Number)\n\nWhatsApp assigns opaque LID identifiers (`<digits>@lid`) that are unrelated to phone numbers. The gateway maintains two caches:\n\n- `lidToPnJid` (Map) — populated from `msg.key.senderPn` and proactive `sock.onWhatsApp()` lookups\n- `ownerLidJids` (Set) — resolved once at connection open for all `OWNER_NUMBERS`\n\nResolution priority in `resolvePeerId()`:\n1. `msg.key.senderPn` (Baileys-provided)\n2. `lidToPnJid` cache\n3. `msg.key.participant` (group sender)\n4. Raw `remoteJid` if already `@s.whatsapp.net`\n\nUnresolved identities log a structured `identity_unresolved` event with a reason tag.\n\n## Decryption Retry\n\nBaileys may fail to decrypt messages (stub type 39 / status `ERROR`). The gateway:\n\n1. Tracks retry counts in `decryptRetryMap` (keyed by `jid:msgId`)\n2. After `DECRYPT_RETRY_MAX` (3) failures, marks the message as permanently failed\n3. Sends a fallback notification to the owner with the message ID and a hint to ask the contact to resend\n4. Successful retries (arriving via later `messages.upsert`) clear the retry entry\n\n## Conversation Tracker\n\nIn-memory `Map<jid, ConversationState>` for stranger conversations only:\n\n- TTL-based eviction (configurable, default 24h) via 15-minute sweep\n- Capped at 20 messages per conversation\n- Tracks push name, phone, message count, escalation status\n- Provides context blocks for owner-facing agent prompts\n\n## HTTP API\n\nAll endpoints accept/return JSON. CORS is restricted to `localhost`, `127.0.0.1`, `tauri://localhost`, and `app://localhost` origins.\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/login/start` | Start Baileys connection, returns QR data URL |\n| `GET` | `/login/status` | Poll connection status |\n| `POST` | `/message/send` | Send text message (`{ to, text }`) |\n| `POST` | `/message/send-image` | Send image (`{ to, image_url, caption }`) |\n| `POST` | `/message/send-audio` | Send audio/voice note (`{ to, audio_url, ptt }`) |\n| `GET` | `/conversations` | List active stranger conversations |\n| `GET` | `/messages/unprocessed` | List failed-to-forward messages |\n| `GET` | `/messages/:jid` | Message history for a chat (`?limit=&since=`) |\n| `GET` | `/health` | Health check with connection status |\n\nRequest body size is capped at 64KB.\n\n## Session Isolation\n\nEach WhatsApp conversation gets its own LibreFang session via the `channel_type` field:\n\n```\nchannel_type: \"whatsapp:<chatJid>\"\n```\n\nThis ensures the kernel creates separate sessions per contact. The gateway fails fast (throws `CHATJID_EMPTY`) if `chatJid` is missing, preventing unrelated chats from merging into a single session.\n\n## Background Tasks\n\n| Task | Interval | Purpose |\n|------|----------|---------|\n| Conversation eviction | 15 min | Remove expired stranger conversations |\n| Rate limit cleanup | 5 min | Purge expired rate limit entries |\n| Dedup cleanup | 2 min | Purge expired message IDs |\n| Escalation debounce cleanup | 10 min | Purge stale escalation timestamps |\n| Message store + decrypt retry cleanup | 1 min | Purge expired raw message cache and decrypt retry entries |\n| Catch-up sweep | 5 min | Re-process unprocessed messages |\n| Gap detection | 10 min | Warn on suspicious silence |\n| DB cleanup | 24 hr | Delete old processed/failed messages |\n| Heartbeat check | 30s | Force-reconnect if no inbound activity |\n\n## Graceful Shutdown\n\nOn `SIGINT`/`SIGTERM`:\n\n1. Re-entry guarded (prevents double-shutdown from overlapping signals)\n2. Stops heartbeat watchdog\n3. Tears down Baileys socket (`cleanupSocket`)\n4. Closes HTTP server (drains connections via `closeAllConnections`)\n5. Force-exits after 10s timeout\n\n## Exported API (for testing)\n\nThe module exports internal functions for unit testing:\n\n- `markdownToWhatsApp`, `extractNotifyOwner`, `extractRelayCommands`\n- `buildConversationsContext`, `isRateLimited`\n- `buildCorsHeaders`, `isAllowedOrigin`, `parseBody`\n- `forwardToLibreFang`, `forwardToLibreFangStreaming`\n- `shouldSkipCatchupForMissingJid`, `resolveLidProactively`\n- `checkHeartbeat`, `computeBackoffDelay`\n- `getGroupParticipants`, `invalidateGroupRoster`, `groupMetadataCache`\n- `echoTracker`, `ECHO_TRACKER_ENABLED`, `EchoTracker`","deployment-worker":"# Deployment — worker\n\n# Deployment Worker\n\nA Cloudflare Worker that provides a web UI and API for one-click LibreFang deployment to Fly.io, along with links to alternative deployment platforms.\n\n## Overview\n\nThe worker serves two purposes:\n\n- **Static HTML page** at the root path — a deployment portal listing platform options (Fly.io, Render, Railway, GCP, Docker, and local installers)\n- **Deployment API** at `POST /api/deploy` — orchestrates a full Fly.io provisioning pipeline using the user's API token\n\n**Route:** `deploy.librefang.ai/*`\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant U as Browser\n    participant W as Cloudflare Worker\n    participant FM as Fly Machines API\n    participant FG as Fly GraphQL API\n\n    U->>W: POST /api/deploy {token}\n    W->>FM: GET /v1/apps (validate token)\n    FM-->>W: 200 OK\n    W->>FM: POST /v1/apps (create app)\n    FM-->>W: app created\n    W->>FG: allocateIPAddress (shared v4)\n    W->>FG: allocateIPAddress (v6)\n    W->>FM: POST /v1/apps/{name}/volumes\n    FM-->>W: volume created\n    W->>FM: POST /v1/apps/{name}/machines\n    FM-->>W: machine launched\n    W-->>U: {success, url, appName, ...}\n```\n\n## Key Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `FLY_API` | `https://api.machines.dev/v1` | Fly.io Machines REST API base |\n| `DOCKER_IMAGE` | `ghcr.io/librefang/librefang:latest` | Container image deployed to Fly |\n| `REGION` | `nrt` | Tokyo region for all provisioned resources |\n\n## Core Functions\n\n### `fetch(request, env)`\n\nWorker entry point. Routes based on path and method:\n\n- `POST /api/deploy` → `handleDeploy`\n- All other requests → serves the static HTML page\n\nThe `env` binding provides access to Cloudflare Worker secrets, specifically `OPENROUTER_API_KEY` which is injected into deployed instances as a free default LLM provider.\n\n### `handleDeploy(request, env)`\n\nOrchestrates the six-step Fly.io provisioning pipeline:\n\n1. **Validate token** — `GET /v1/apps` against the Fly Machines API. Returns `401` if invalid.\n2. **Create app** — `POST /v1/apps` with name `librefang-{randomHex(6)}` under the `personal` org.\n3. **Allocate IP addresses** — Two GraphQL mutations via `https://api.fly.io/graphql`:\n   - Shared IPv4 (required for public HTTPS)\n   - IPv6\n4. **Create persistent volume** — `POST /v1/apps/{name}/volumes` — 1 GB volume named `librefang_data` in region `nrt`.\n5. **Build environment** — Sets `LIBREFANG_HOME=/data` and `OPENROUTER_API_KEY` from the worker's own secret.\n6. **Launch machine** — `POST /v1/apps/{name}/machines` with:\n   - 1 shared CPU, 256 MB RAM\n   - HTTP/TLS service on ports 80/443 → internal port 4545\n   - Volume mounted at `/data`\n   - `auto_destroy: false`\n\nOn success, returns:\n\n```json\n{\n  \"success\": true,\n  \"appName\": \"librefang-a1b2c3d4e5f6\",\n  \"url\": \"https://librefang-a1b2c3d4e5f6.fly.dev\",\n  \"dashboardUrl\": \"https://fly.io/apps/librefang-a1b2c3d4e5f6\",\n  \"machineId\": \"...\",\n  \"region\": \"nrt\"\n}\n```\n\nError responses at any step include a descriptive message and appropriate HTTP status.\n\n### `randomHex(len)`\n\nCryptographically secure hex string generator using `crypto.getRandomValues()`. Used for unique app name suffixes.\n\n### `json(data, status)`\n\nResponse helper. Returns a `Response` with JSON content type and the given status code (default `200`).\n\n## Environment Bindings\n\nSet via `wrangler.toml` or the Cloudflare dashboard:\n\n| Variable | Required | Purpose |\n|---|---|---|\n| `OPENROUTER_API_KEY` | Yes | Injected into deployed instances as the default free LLM provider (Step 3.5 Flash) |\n\n## Frontend\n\nThe `HTML` constant contains the entire single-page application. Key sections:\n\n- **Platform selection grid** — Cards for Fly.io, Render, Railway, GCP, Docker, and local installers (macOS/Linux/Windows) with copy-to-clipboard install commands\n- **Fly.io deploy form** — Revealed when the user selects Fly.io. Contains step-by-step instructions, a token input field, and a deploy button\n- **Progress indicator** — Animated step-by-step progress during deployment (auth → app → network → volume → machine)\n- **Result view** — Links to the deployed instance and Fly.io console on success\n- **Troubleshooting** — Expandable FAQ covering SSO token issues, missing images, and post-deploy configuration\n\nThe frontend POSTs the token to `/api/deploy` and handles the response entirely client-side. A simulated progress indicator advances on a 1.5-second interval while the actual API call is in flight.\n\n## Configuration\n\n**`wrangler.toml`:**\n\n```toml\nname = \"librefang-deploy\"\nmain = \"src/index.js\"\ncompatibility_date = \"2024-12-01\"\n\nroutes = [\n  { pattern = \"deploy.librefang.ai/*\", zone_name = \"librefang.ai\" }\n]\n```\n\nThe worker is auto-deployed via GitHub Actions on changes to `deploy/worker/`.\n\n## Security Considerations\n\n- **Token handling:** The user's Fly.io API token is sent from the browser to the worker, then forwarded directly to Fly.io APIs. It is never stored or logged by the worker.\n- **No authentication on the worker itself:** The `/api/deploy` endpoint is public. Rate limiting and abuse prevention rely on Cloudflare's built-in protections and the fact that deployment requires a valid Fly.io token.","deployment":"# Deployment\n\n# Deployment\n\nEverything needed to run and monitor LibreFang in production. This module provides multiple deployment targets, a complete observability stack, a one-click deployment portal, and a WhatsApp integration bridge.\n\n## Deployment Targets\n\nLibreFang supports several deployment paths, all building from the same multi-stage Dockerfile defined in [deploy/](deploy.md):\n\n| Target | Module | Best for |\n|--------|--------|----------|\n| Docker Compose | [deploy/](deploy.md) | Self-hosted, full control |\n| Fly.io | [fly/](fly.md) | Edge deployment, one-command setup |\n| GCP Free Tier | [gcp/](gcp.md) | Zero-cost `e2-micro` instance via Terraform |\n| Railway | [railway/](railway.md) | Managed platform with health checks |\n| Render | [render.yaml](render-yaml.md) | Managed free-tier container hosting |\n| Bare metal | [deploy/](deploy.md) | systemd unit (`librefang.service`) |\n\nThe [Cloudflare Worker](worker.md) at `deploy.librefang.ai` provides a browser-based deployment portal that links to all platform options and automates Fly.io provisioning via its `POST /api/deploy` endpoint.\n\n## Observability Stack\n\nPrometheus and Grafana work together to provide full-stack monitoring:\n\n1. **[Prometheus](prometheus.md)** scrapes the LibreFang application and Ollama backend every 15 seconds.\n2. **[Grafana](grafana.md)** auto-provisions four linked dashboards — system overview, LLM/token usage, HTTP/API metrics, and cost/budget tracking — all querying the Prometheus datasource.\n\nBoth are included in the `docker-compose.yml` stack from [deploy/](deploy.md).\n\n## Integrations\n\nThe [WhatsApp Gateway](whatsapp-gateway.md) is a standalone Node.js process that bridges WhatsApp conversations to LibreFang agents. It uses the Baileys library for WhatsApp connectivity, SQLite for message persistence, and communicates with the agent platform via HTTP POST and SSE streaming. Deploy it alongside any of the deployment targets above.\n\n## Quick Navigation\n\n- **Deploy locally with Docker:** See [deploy/](deploy.md) for the compose stack.\n- **One-click cloud deploy:** Visit the [Worker](worker.md) portal or run [fly/deploy.sh](fly.md) directly.\n- **Free-tier cloud:** Use [gcp/](gcp.md) (Terraform) or [render.yaml](render-yaml.md).\n- **Set up monitoring:** Deploy [Prometheus](prometheus.md) and [Grafana](grafana.md) together.\n- **Connect WhatsApp:** Configure the [WhatsApp Gateway](whatsapp-gateway.md) with your LibreFang instance.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop Application\n\nNative desktop client for the LibreFang Agent Operating System, built on Tauri 2.0. Wraps the kernel and embedded API server in a native window with system tray integration, global shortcuts, auto-update, and support for connecting to either a local or remote LibreFang instance.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"main.rs<br/>CLI (clap)\"] --> RUN[\"lib.rs run()\"]\n    RUN --> MODE{StartupMode?}\n    MODE -->|Remote URL| NAV_REMOTE[\"Navigate WebView<br/>to remote URL\"]\n    MODE -->|Local| BOOT[\"server.rs<br/>start_server()\"]\n    MODE -->|ConnectionScreen| CONN_SCREEN[\"connection.rs<br/>connection_html()\"]\n    BOOT --> KERNEL[\"LibreFangKernel::boot()\"]\n    KERNEL --> AXUM[\"axum server<br/>127.0.0.1:0\"]\n    AXUM --> NAV_LOCAL[\"Navigate WebView<br/>to local server\"]\n    CONN_SCREEN -->|user picks remote| CONNECT_REMOTE[\"connect_remote()\"]\n    CONN_SCREEN -->|user picks local| START_LOCAL[\"start_local()\"]\n    START_LOCAL --> BOOT\n    CONNECT_REMOTE --> NAV_REMOTE\n    RUN --> TRAY[\"tray.rs<br/>System tray\"]\n    RUN --> SHORTCUTS[\"shortcuts.rs<br/>Global hotkeys\"]\n    RUN --> UPDATER[\"updater.rs<br/>Auto-update\"]\n```\n\n## Startup and Connection Mode Resolution\n\nThe entry point is `main()`, which parses CLI arguments via clap and calls `librefang_desktop::run()`. Before any async work begins, `load_dotenv()` is called synchronously to populate the process environment from `~/.librefang/.env` — this must happen before spawning any threads because `std::env::set_var` is undefined safe once concurrent threads exist.\n\n### Startup Priority Chain\n\n`run()` resolves the connection mode in this order:\n\n1. **CLI `--server-url <URL>`** — Immediate remote mode\n2. **CLI `--local`** — Immediate local mode, skip connection screen\n3. **Environment variable `LIBREFANG_SERVER_URL`** — Remote mode\n4. **Saved preference** from `~/.librefang/desktop.toml` — Restores last choice\n5. **Connection screen** — Interactive HTML page letting the user decide\n\nThe resolved mode is represented by the private `StartupMode` enum (`Remote(String)`, `Local`, `ConnectionScreen`). Depending on the variant, the kernel may be booted immediately or deferred until the user chooses via the connection screen.\n\n### CLI Flags\n\n```\nlibrefang-desktop [--server-url <URL>] [--local]\n```\n\n- `--server-url` — Connect to a remote server (e.g., `http://192.168.1.100:4545`). Must include scheme.\n- `--local` — Force local server boot, skipping the connection screen.\n\n## Managed State\n\nTauri managed state is registered once at startup with interior-mutable wrappers (`RwLock`, `Mutex`). All state updates go through these locks — `manage()` is never called a second time.\n\n| State Type | Inner Type | Purpose |\n|---|---|---|\n| `PortState` | `RwLock<Option<u16>>` | Local server port. `None` in remote mode or before boot. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel handle + startup timestamp. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | Current dashboard URL (local or remote) the WebView points at. |\n| `RemoteMode` | `RwLock<bool>` | `true` when connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Handle to the running embedded server for shutdown. Filled after boot or by `start_local`. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the server started (used for uptime display).\n\n## Embedded Server Lifecycle\n\nThe `server` module handles local kernel + API server management.\n\n### Boot Sequence (`start_server`)\n\n1. **Kernel boot** — `LibreFangKernel::boot(None)` runs synchronously (no tokio needed)\n2. **Port binding** — A `TcpListener` binds to `127.0.0.1:0` on the calling thread, guaranteeing the port is known before any Tauri window is created\n3. **Background thread** — A dedicated OS thread (`librefang-server`) creates its own multi-thread tokio runtime and runs the axum server\n4. **Background agents** — `kernel.start_background_agents()` is called inside the tokio context\n5. **Approval sweep** — `kernel.spawn_approval_sweep_task()` starts the periodic approval expiry checker\n6. **Dashboard sync** — `sync_dashboard()` downloads/updates the WebUI assets in the background\n\nReturns a `ServerHandle` containing the port, kernel reference, shutdown channel, and thread join handle.\n\n### Shutdown\n\n`ServerHandle` uses `compare_exchange` on an `AtomicBool` to prevent double-shutdown. There are two paths:\n\n- **Explicit `shutdown()`** — Sends the shutdown signal via `watch` channel, joins the background thread, calls `kernel.shutdown()`\n- **Drop** — Sends the shutdown signal but does not block on the thread join (best-effort cleanup)\n\nThe graceful shutdown flow inside `run_embedded_server`:\n1. The `watch` receiver waits for `true`\n2. Axum's `with_graceful_shutdown` completes\n3. Channel bridges are stopped via `bridge_manager.lock().await`\n\n## IPC Commands\n\nAll commands are registered via `tauri::generate_handler![]` in `run()`. They communicate with the WebView frontend through Tauri's IPC layer.\n\n### Status and Query Commands\n\n| Command | Returns | Description |\n|---|---|---|\n| `get_port` | `u16` | Port the embedded server is listening on |\n| `get_status` | `serde_json::Value` | JSON with `status`, `port`, `agents`, `uptime_secs` |\n| `get_agent_count` | `usize` | Number of registered agents |\n| `get_autostart` | `bool` | Whether auto-start on login is enabled |\n\n### Import Commands\n\n**`import_agent_toml`** — Opens a native file picker filtered to `.toml`, parses the file as an `AgentManifest`, copies it to `~/.librefang/workspaces/agents/{name}/agent.toml`, then calls `kernel.spawn_agent()`. Returns the agent name on success.\n\n**`import_skill_file`** — Opens a file picker accepting `.md`, `.toml`, `.py`, `.js`, `.wasm` files, copies to `~/.librefang/skills/`, then calls `kernel.reload_skills()` to hot-reload the skill registry.\n\n### Connection Commands\n\nDefined in the `connection` module, exposed via IPC:\n\n- **`test_connection(url)`** — HTTP GET to `{url}/api/health` with a 10-second timeout. Returns the JSON response on success.\n- **`connect_remote(url, remember)`** — Validates URL, verifies health endpoint, updates all managed state (sets `RemoteMode = true`, clears `PortState` and `KernelState`), optionally saves preference, navigates the WebView via `window.location.href`.\n- **`start_local(remember)`** — Spawns the embedded server via `tokio::task::spawn_blocking(start_server)`, fills all managed state, stores the `ServerHandle`, starts event forwarding, optionally saves preference, navigates the WebView.\n\n### System Commands\n\n| Command | Description |\n|---|---|\n| `set_autostart(enabled)` | Enable/disable OS login auto-start via `tauri-plugin-autostart` |\n| `check_for_updates` | On-demand update check, returns `UpdateInfo` |\n| `install_update` | Downloads and installs the latest update, then restarts the app |\n| `open_config_dir` | Opens `~/.librefang/` in the OS file manager |\n| `open_logs_dir` | Opens `~/.librefang/logs/` in the OS file manager |\n\n## Connection Screen\n\nWhen no startup mode is determined, the app renders a self-contained HTML page inside the WebView. The `connection_html()` function returns a complete HTML/CSS/JS document with:\n\n- A URL input field for remote server connection\n- \"Test Connection\" and \"Co
