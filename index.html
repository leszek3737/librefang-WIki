llowing `LibreFangKernel` public surface:\n\n- **Lifecycle**: `boot_with_config()`, `shutdown()`\n- **Agents**: `spawn_agent()`, `kill_agent()`, `send_message()`, `send_message_streaming()`, `agent_registry()` (`.get()`, `.find_by_name()`, `.list()`, `.count()`)\n- **Hands**: `activate_hand()`, `deactivate_hand()`, `pause_hand()`, `resume_hand()`, `hands()` (`.install_from_content()`, `.get_instance()`, `.find_by_agent()`, `.deactivate()`)\n- **Triggers**: `register_trigger()`, `remove_trigger()`, `list_triggers()`\n- **Workflows**: `register_workflow()`, `run_workflow()`, `workflow_engine()` (`.list_workflows()`, `.create_run()`, `.get_run()`, `.list_runs()`)\n- **Self-handle**: `set_self_handle()`\n\n## Adding New Tests\n\n1. **Use a unique temp directory name** — Call `test_config(\"your-test-name\")` or create an equivalent with a unique path.\n2. **Clean up after yourself** — Call `kernel.shutdown()` at the end of every test.\n3. **Guard LLM tests** — Check `std::env::var(\"GROQ_API_KEY\").is_err()` and return early with a skip message.\n4. **WASM tests need multi-threaded runtime** — Use `#[tokio::test(flavor = \"multi_thread\")]`.\n5. **Hand definitions** — Use `install_hand(&kernel, TOML_CONTENT)` to register hand definitions before calling `activate_hand()`.","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nThe central orchestration crate for the LibreFang Agent OS. It wires together all subsystems — LLM interaction, skill execution, routing, metering, memory, and channel communication — into a coherent agent runtime.\n\n## Role in the Architecture\n\n`librefang-kernel` sits at the top of the dependency tree. It does not export a library target consumed by other crates; instead, it is the **integration point** that pulls in every subsystem and makes them collaborate. Think of it as the glue layer that owns configuration loading, process lifecycle, and cross-cutting coordination.\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --> T[librefang-types]\n    K --> M[librefang-memory]\n    K --> KR[librefang-kernel-router]\n    K --> KM[librefang-kernel-metering]\n    K --> R[librefang-runtime]\n    K --> S[librefang-skills]\n    K --> H[librefang-hands]\n    K --> E[librefang-extensions]\n    K --> LLM[librefang-llm-driver]\n    K --> W[librefang-wire]\n    K --> C[librefang-channels]\n```\n\n## Subsystem Responsibilities\n\nThe kernel pulls in each crate for a distinct role:\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared data structures, error types, and domain primitives used across all crates. |\n| `librefang-memory` | Persistent storage and recall — conversation history, agent state, and long-term knowledge. |\n| `librefang-kernel-router` | Request routing — dispatches incoming messages to the correct agent, skill, or handler. |\n| `librefang-kernel-metering` | Usage tracking and rate limiting for LLM calls, token consumption, and resource accounting. |\n| `librefang-runtime` | The agent execution runtime — manages the lifecycle and isolation of running agents. |\n| `librefang-skills` | Skill definitions — modular capabilities that agents can invoke (e.g., web search, code execution). |\n| `librefang-hands` | Action execution layer — carries out concrete operations on behalf of agents. |\n| `librefang-extensions` | Plugin/extension system — allows third-party extensions to hook into agent behavior. |\n| `librefang-llm-driver` | LLM provider abstraction — communicates with language model APIs. |\n| `librefang-wire` | Wire protocol — serialization and transport-level messaging between components. |\n| `librefang-channels` | Channel management — handles inbound/outbound communication channels (defaults features disabled, likely feature-gated per deployment). |\n\n## Key External Dependencies\n\nThe kernel's dependency selection reveals its operational concerns:\n\n### Async Runtime\n- **`tokio`** — all I/O is async; the kernel is built around Tokio's runtime.\n\n### Serialization & Configuration\n- **`serde`**, **`serde_json`**, **`toml`**, **`serde_yaml`** — configuration files and message payloads can arrive in JSON, TOML, or YAML. This suggests the kernel reads agent configs and possibly skill definitions from multiple formats.\n\n### Concurrency Primitives\n- **`dashmap`** — concurrent hash maps for shared mutable state (agent registries, active sessions).\n- **`arc-swap`** — atomic swapping of `Arc` references, used for hot-reloading configuration or swapping active state without locking.\n- **`crossbeam`** — multi-producer/multi-consumer channels and concurrent data structures.\n\n### Persistence\n- **`rusqlite`** — embedded SQLite. The kernel maintains a local database, likely for agent state, metering records, or session history.\n\n### Security & Authentication\n- **`totp-rs`** — TOTP (Time-based One-Time Password) generation/verification, indicating the kernel handles two-factor authentication flows.\n- **`subtle`** — constant-time comparisons, used for cryptographic safety (timing-attack resistance when comparing secrets or tokens).\n- **`zeroize`** — secure memory clearing for sensitive data (API keys, tokens, passwords).\n\n### Scheduling\n- **`cron`** (v0.16) — cron expression parsing and scheduling, used for periodic tasks, health checks, or scheduled agent actions.\n\n### Networking\n- **`reqwest`** — outbound HTTP client, used for calling external LLM APIs, webhooks, or remote services.\n\n### Observability\n- **`tracing`**, **`tracing-subscriber`** — structured logging and tracing throughout the kernel lifecycle.\n\n### Platform-Specific\n- **`libc`** (Unix only) — low-level Unix system calls, gated behind `cfg(unix)`. Likely used for signal handling, file descriptor management, or process control.\n\n## Binaries\n\n### `purge_sentinels`\n\nLocated at `bin/purge_sentinels.rs`. A standalone utility binary for cleaning up sentinel files — likely lock files or marker files used to track in-progress operations. Run this to recover from unclean shutdowns that leave stale sentinels on disk.\n\n## Configuration Loading\n\nThe presence of `toml`, `serde_yaml`, and `serde_json` together with `dirs` suggests the kernel loads configuration from the user's config directory in multiple possible formats. A typical flow would be:\n\n1. Locate the config directory via `dirs`.\n2. Detect and parse the config file (TOML, YAML, or JSON).\n3. Populate runtime state using `arc-swap` for lock-free access.\n4. Pass config sections to each subsystem (router, metering, LLM driver, etc.).\n\n## Thread Safety Model\n\nThe kernel uses a shared-state model built on:\n\n- **`Arc<T>`** for reference-counted shared ownership across Tokio tasks.\n- **`ArcSwap<T>`** for configurations or registries that change rarely but are read frequently — readers never block, writers atomically install a new snapshot.\n- **`DashMap`** for high-contention mutable maps (active sessions, registered skills, etc.).\n- **`crossbeam` channels** for message passing between subsystems, avoiding lock-based coordination.\n\n## Data Flow (Typical Request)\n\n```mermaid\nsequenceDiagram\n    participant CH as Channels\n    participant RT as Kernel / Runtime\n    participant RR as Router\n    participant LLM as LLM Driver\n    participant SK as Skills / Hands\n    participant MM as Memory\n    participant MT as Metering\n\n    CH->>RT: Incoming message\n    RT->>RR: Route to handler\n    RR->>LLM: LLM completion request\n    LLM-->>RT: Completion response\n    MT->>MT: Record token usage\n    RT->>SK: Execute skill / action\n    SK-->>RT: Result\n    RT->>MM: Persist interaction\n    RT-->>CH: Outbound response\n```\n\nThis is a simplified view — extensions can hook into multiple points, and the router may dispatch to sub-agents.\n\n## Testing\n\nDev-dependencies include:\n- **`tokio-test`** — for async test utilities (`tokio::test` macros, mock timers).\n- **`tempfile`** — for creating temporary directories and files, used to isolate tests that touch the filesystem (SQLite databases, config files, sentinel files).\n\nRun the test suite:\n\n```bash\ncargo test -p librefang-kernel\n```\n\n## Contributing\n\nWhen adding a new subsystem integration:\n\n1. Add the crate dependency in `Cargo.toml`.\n2. Wire initialization into the kernel startup sequence.\n3. Ensure any shared state is protected with the appropriate concurrency primitive (`Arc`, `ArcSwap`, or `DashMap`).\n4. If the subsystem handles secrets or tokens, use `zeroize` to clear sensitive data on drop.\n5. Add `tracing` instrumentation at all entry points.\n6. Write tests using `tempfile` for any filesystem-dependent behavior.","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nLLM driver trait and shared types for LibreFang.\n\n## Purpose\n\nThis crate defines the abstraction layer through which the rest of the LibreFang codebase communicates with large language model backends. It provides a common trait that concrete LLM integrations must implement, along with the shared types used in request/response flows. By isolating the driver contract here, higher-level modules remain decoupled from any specific LLM provider.\n\n## Role in the Architecture\n\n`librefang-llm-driver` sits between the application logic and concrete LLM implementations. It has no knowledge of specific providers — it only defines *what* a driver must do, not *how*.\n\n```mermaid\ngraph TD\n    A[Application Logic] -->|depends on| B[librefang-llm-driver]\n    B -->|trait bound| C[Concrete LLM Driver A]\n    B -->|trait bound| D[Concrete LLM Driver B]\n    C -->|HTTP/gRPC| E[LLM Provider API]\n    D -->|HTTP/gRPC| F[LLM Provider API]\n    B -->|uses types from| G[librefang-types]\n```\n\n## Dependencies and What They Signal\n\n| Dependency | Purpose in this crate |\n|---|---|\n| `librefang-types` | Shared domain types (messages, conversation context, configuration) that cross module boundaries |\n| `async-trait` | Enables async methods in trait definitions — LLM calls are inherently I/O-bound and must be non-blocking |\n| `serde` / `serde_json` | Serialization of request/response types for transport and configuration parsing |\n| `thiserror` | Ergonomic, typed error definitions for driver-level failures |\n| `tokio` | Async runtime primitives used by driver implementations |\n\n## What This Crate Provides\n\n### Driver Trait\n\nThe core export is an async trait that concrete LLM backends implement. Any new provider is integrated by implementing this trait and wiring it into the application at startup.\n\n### Request and Response Types\n\nShared structures representing prompts, chat histories, completion parameters, and model responses. These types are what the application logic constructs and consumes, keeping it agnostic to provider-specific wire formats.\n\n### Error Types\n\nA unified error enum covering common failure modes — network errors, rate limiting, invalid responses, authentication failures, and context-length violations. Drivers translate provider-specific errors into these common types so that callers handle a single error surface.\n\n## Contributing a New LLM Driver\n\n1. Create a new crate (or module) for the provider.\n2. Depend on `librefang-llm-driver` and `librefang-types`.\n3. Implement the driver trait against the provider's API.\n4. Map all provider-specific error cases into the shared error types defined here.\n5. Register the driver in the application's startup/configuration logic.\n\n## Relationship to `librefang-types`\n\nTypes defined in `librefang-types` represent domain concepts that are meaningful across the entire codebase. This crate reuses those types in its trait signatures rather than defining its own parallel versions, ensuring consistency and avoiding mapping layers.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait. This module contains the provider-specific logic for communicating with large language model APIs such as Anthropic (Claude), OpenAI (GPT), and Google Gemini.\n\n## Purpose\n\nThis crate is the **implementation layer** that sits behind the `librefang-llm-driver` trait abstraction. Each provider has its own driver module handling:\n\n- Request serialization in the provider's expected format\n- Authentication (API keys, OAuth tokens, request signing)\n- HTTP communication via `librefang-http` and `reqwest`\n- Response parsing, including streaming Server-Sent Events (SSE)\n- Error mapping into a unified error type\n\nConsumers of the LLM subsystem depend on the trait crate (`librefang-llm-driver`), not on this crate directly. This keeps provider details isolated and swappable.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Consumer Code] -->|depends on trait| B[librefang-llm-driver]\n    C[librefang-llm-drivers] -->|implements| B\n    C -->|HTTP calls| D[librefang-http]\n    C -->|OAuth flows| E[librefang-runtime-oauth]\n    C -->|shared types| F[librefang-types]\n    C -->|reqwest / streaming| G[Provider APIs]\n```\n\n## Key Dependencies and Why They Exist\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-llm-driver` | Defines the trait each driver implements. |\n| `librefang-types` | Shared types: messages, tool definitions, completion responses, etc. |\n| `librefang-http` | Shared HTTP client construction and configuration. |\n| `librefang-runtime-oauth` | OAuth token acquisition for providers that require it (e.g., Gemini with service accounts). |\n| `reqwest` | Underlying HTTP client for sending requests to provider endpoints. |\n| `tokio-stream` / `futures` | Async stream handling for SSE-based streaming completions. |\n| `serde` / `serde_json` | JSON serialization of requests and deserialization of responses. |\n| `sha2` / `hmac` / `hex` / `zeroize` | Cryptographic request signing for providers that require signed payloads (e.g., AWS Sigv4-style auth). `zeroize` ensures sensitive key material is cleared from memory. |\n| `base64` | Encoding binary data in authentication headers or image content parts. |\n| `dashmap` | Concurrent map for caching tokens, session state, or rate-limit tracking across async tasks. |\n| `regex-lite` | Lightweight pattern matching, likely for extracting structured data from model output. |\n| `url` | URL construction and validation for provider endpoints. |\n| `chrono` / `uuid` | Timestamps and request IDs used in signed requests or correlation headers. |\n| `rand` | Randomness for nonce generation in signing flows. |\n\n## Provider Drivers\n\nEach driver translates the generic trait interface into a specific provider's wire format. While the exact module layout is provider-specific, the general pattern is:\n\n1. **Build the request body** — Map `librefang-types` structures (messages, tools, parameters) into the provider's JSON schema.\n2. **Authenticate** — Attach API keys via headers, obtain OAuth tokens via `librefang-runtime-oauth`, or compute HMAC signatures.\n3. **Send the request** — Use `librefang-http` (backed by `reqwest`) to POST to the provider's completions endpoint.\n4. **Parse the response** — Deserialize the provider's JSON response into the shared `librefang-types` completion types.\n5. **Handle streaming** — For streaming completions, parse SSE frames from the byte stream (`tokio-stream`) and yield partial results incrementally.\n\n### Supported Providers\n\n- **Anthropic** — Claude family of models. Uses `x-api-key` header authentication.\n- **OpenAI** — GPT family. Uses `Authorization: Bearer` header authentication.\n- **Gemini** — Google's Gemini models. May use OAuth service-account flows via `librefang-runtime-oauth`.\n\n## Error Handling\n\nDriver-specific errors (HTTP status codes, provider error payloads, network failures, auth failures) are mapped into the unified error type defined in `librefang-llm-driver`. This ensures that consumer code handles errors consistently regardless of which provider is in use.\n\n`thiserror` is used for ergonomic error derivation.\n\n## Observability\n\nAll drivers emit structured log events via `tracing` for request/response lifecycle events (request sent, response received, errors, retries). This integrates with the workspace-wide tracing setup.\n\n## Adding a New Provider\n\n1. Create a new module file named after the provider.\n2. Define a struct that holds configuration (API key, base URL, model name).\n3. Implement the trait from `librefang-llm-driver`.\n4. Handle serialization, authentication, HTTP, and deserialization within the impl.\n5. Register the driver in whatever factory/registry the workspace uses for instantiation.\n\n## Relationship to the Workspace\n\nThis crate is consumed at runtime by whatever orchestration or agent layer the Librefang project provides. It is intentionally a leaf dependency — it depends on abstractions (`librefang-llm-driver`, `librefang-types`) but nothing in the workspace depends on it directly. Higher-level code selects and instantiates the appropriate driver based on configuration.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory/tests — Chat-Scoped Canonical Context Integration Tests\n\n## Purpose\n\nThis module contains integration regression tests that guard a **cross-session privacy leak** in the canonical memory subsystem. Before the fix, every WhatsApp DM and group sharing the same agent would see each other's conversation history injected into the LLM prompt. A private chat could surface group messages and vice versa.\n\nThe tests exercise the full **append → load → context roundtrip** through the crate's public API — the same path the kernel calls on every inbound message — ensuring the session-scoping fix in `session.rs` continues to work correctly.\n\n## Bug Context and Fix\n\n`CanonicalEntry` records were stored globally per agent with no session association. When `canonical_context` was called to assemble LLM prompt context, it returned entries from all channels indiscriminately. The fix introduced two changes in `session.rs`:\n\n1. **Write path**: `append_canonical` now tags each `CanonicalEntry` with the originating `SessionId`.\n2. **Read path**: `canonical_context` filters entries by the provided `SessionId`, returning only messages from that session.\n\n## Test Infrastructure\n\n### `setup()`\n\nCreates an isolated in-memory SQLite database, runs schema migrations via `run_migrations`, and returns a fresh `SessionStore` backed by a shared `Arc<Mutex<Connection>>`. Each test gets a fully independent database.\n\n### `user_msg(text)`\n\nHelper that constructs a `Message` with `Role::User` and the given text content. Used to simulate inbound user messages appended to canonical memory.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it verifies**: The core isolation guarantee. Two chat sessions derived from the same agent — a WhatsApp DM (`whatsapp:393331111111@s.whatsapp.net`) and a WhatsApp group (`whatsapp:120363111111111111@g.us`) — must not see each other's canonical entries.\n\n**Flow**:\n\n1. Derive two `SessionId` values via `SessionId::for_channel` and assert they differ.\n2. Append three messages in interleaved order: `dm-1`, `group-1`, `dm-2`.\n3. Call `canonical_context` filtered by the DM session — verify only `[\"dm-1\", \"dm-2\"]` is returned.\n4. Call `canonical_context` filtered by the group session — verify only `[\"group-1\"]` is returned.\n\nIf this test fails, the session-scoping filter is broken and private messages are leaking across chat boundaries.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it verifies**: Backward compatibility for callers that have not adopted per-session filtering. Passing `session_id = None` to `canonical_context` must return all canonical entries across all sessions for the agent, preserving the original cross-channel semantics.\n\n**Flow**:\n\n1. Create two sessions (WhatsApp and Telegram) under the same agent.\n2. Append one message to each session.\n3. Call `canonical_context(agent, None, None)` and verify both messages appear in order.\n\nIf this test fails, the unfiltered path was broken during the session-scoping refactor.\n\n## Relationship to Production Code\n\n```mermaid\ngraph TD\n    A[Tests] -->|append_canonical| B[SessionStore]\n    A -->|canonical_context| B\n    B -->|tags & filters by| C[SessionId]\n    B -->|persists via| D[SQLite + run_migrations]\n    C -->|derived from| E[SessionId::for_channel]\n```\n\n| Test function | Calls into | Source module |\n|---|---|---|\n| `setup` | `run_migrations` | `librefang-memory/src/migration.rs` |\n| `setup` | `SessionStore::new` | `librefang-memory/src/session.rs` |\n| Both tests | `append_canonical` | `librefang-memory/src/session.rs` |\n| Both tests | `canonical_context` | `librefang-memory/src/session.rs` |\n| Both tests | `SessionId::for_channel` | `librefang-types/src/agent.rs` |\n| `user_msg` | `Message` constructor | `librefang-types/src/message.rs` |\n\n## Running\n\n```sh\n# From the workspace root\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# Or all tests in the crate\ncargo test -p librefang-memory\n```\n\nNo external services or environment variables are required — all tests use in-memory SQLite.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Purpose\n\n`librefang-memory` provides the persistence and state-management layer for LibreFang agents. It abstracts how agent memories are stored, retrieved, serialized, and addressed, offering a substrate that other LibreFang components build on top of rather than accessing raw storage directly.\n\nThe crate is positioned as a foundational library — it defines the traits and data structures that describe memory operations, while concrete implementations handle the actual storage mechanics.\n\n## Role in the Architecture\n\n```mermaid\ngraph TD\n    A[Agent Runtime] --> B[librefang-memory]\n    B --> C[librefang-types]\n    B --> D[SQLite via rusqlite]\n    B --> E[Serialization Layer]\n    E --> F[MessagePack]\n    E --> G[JSON]\n```\n\nOther LibreFang crates depend on `librefang-memory` when they need to persist or recall agent state, conversation history, or intermediate computation results. In return, `librefang-memory` depends on `librefang-types` for shared domain types that flow across module boundaries.\n\n## Key Dependencies and What They Signal\n\n| Dependency | Role |\n|---|---|\n| `rusqlite` | Embedded SQLite for durable, queryable local storage |\n| `rmp-serde` | MessagePack serialization — compact binary encoding for memory entries |\n| `serde` / `serde_json` | Generic serialization with JSON support for interoperability |\n| `sha2` | Cryptographic hashing, likely for content-addressed memory lookups |\n| `async-trait` | Async trait definitions enabling pluggable memory backends |\n| `uuid` | Unique identifiers for memory entries and sessions |\n| `chrono` | Timestamps for memory entry creation, expiry, and ordering |\n| `reqwest` | HTTP client — suggests optional remote memory or sync capabilities |\n| `tracing` | Structured logging throughout memory operations |\n| `thiserror` | Ergonomic error types for memory-specific failures |\n\n## Design Expectations\n\nBased on the dependency set and crate description, the module is built around these patterns:\n\n**Pluggable backends.** The `async-trait` dependency indicates that memory operations are defined as traits, allowing different storage backends (SQLite, in-memory, remote) to be swapped without changing consumer code.\n\n**Dual serialization.** Both `rmp-serde` and `serde_json` are present, suggesting that memory entries can be serialized to compact MessagePack for local storage or JSON for external exchange and debugging.\n\n**Content addressing.** The `sha2` dependency points to hash-based identification of memory content, enabling deduplication and integrity verification.\n\n**Durable local storage.** `rusqlite` provides an embedded SQL database, meaning agents can maintain persistent memory across restarts without requiring an external database service.\n\n## Error Handling\n\nErrors are defined using `thiserror`, producing typed error variants that callers can pattern-match on. This ensures that failures in storage, serialization, or retrieval are distinguishable and handleable at the appropriate layer.\n\n## Testing\n\nThe dev-dependencies include `tokio-test` for async test helpers and `tempfile` for creating ephemeral directories. Tests likely spin up temporary SQLite databases to verify memory operations in isolation without polluting the host filesystem.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations, agents, and related data from other C2 agent frameworks into LibreFang's native format.\n\n## Purpose\n\nWhen transitioning to LibreFang from another command-and-control agent framework, operators typically need to port existing agent configurations, listener definitions, credential stores, or other operational data. `librefang-migrate` provides the tooling to parse foreign framework export formats and convert them into LibreFang-compatible types defined in `librefang-types`.\n\n## Supported Input Formats\n\nThe module depends on multiple deserialization libraries, indicating support for reading migration sources in:\n\n| Format | Crate | Typical Use |\n|---|---|---|\n| JSON | `serde_json` | Standard API exports, structured dumps |\n| YAML | `serde_yaml` | Configuration files, human-edited exports |\n| JSON5 | `json5` | Relaxed JSON with comments, some framework configs |\n| TOML | `toml` | Rust-ecosystem and some tool configurations |\n\nAll deserialization is driven through `serde`, so any format can be used as long as the source data maps to the expected schema.\n\n## Key Dependencies\n\n- **`librefang-types`** — The target type system. All migration output is expressed as types from this crate (agent configs, listener definitions, etc.).\n- **`walkdir`** — Recursive directory traversal for discovering migration source files when importing from a directory tree rather than a single file.\n- **`uuid`** / **`chrono`** — Generating new identifiers and timestamps during migration, since source frameworks use incompatible ID schemes.\n- **`dirs`** — Resolving standard platform directories (e.g., locating a source framework's default config path).\n- **`thiserror`** — Typed error definitions for migration failures.\n- **`tracing`** — Structured logging of migration progress and warnings.\n\n## Architecture\n\nMigration generally follows a three-stage pipeline:\n\n```mermaid\nflowchart LR\n    A[Discover Source Files] --> B[Parse Foreign Format]\n    B --> C[Convert to librefang-types]\n    C --> D[Emit / Write Output]\n```\n\n1. **Discovery** — Locate source files on disk using `walkdir` or accept an explicit path. When importing from an installed framework, `dirs` can resolve default installation paths.\n\n2. **Parsing** — Deserialize the source file into an intermediate representation using the appropriate format crate. Invalid or partial data is reported through `thiserror`-based error types and logged via `tracing`.\n\n3. **Conversion** — Map the intermediate representation to `librefang-types` structures. This is where framework-specific field mapping, ID regeneration (`uuid`), and timestamp normalization (`chrono`) occur.\n\n4. **Output** — The caller receives native LibreFang types ready for serialization or direct use in the rest of the application.\n\n## Error Handling\n\nMigration failures are represented as typed errors using `thiserror`. Common failure modes include:\n\n- **Unrecognized format** — The source file cannot be parsed as any supported format.\n- **Schema mismatch** — The file parses but does not match the expected structure for the source framework.\n- **Validation failure** — The converted LibreFang type fails validation constraints defined in `librefang-types`.\n- **I/O errors** — Filesystem issues during discovery or reading.\n\nAll errors implement `std::error::Error` and carry context about which file and field caused the failure.\n\n## Testing\n\nThe `tempfile` dev-dependency is used to construct isolated directory trees in tests. Migration tests typically:\n\n1. Create a temporary directory populated with synthetic source files in the foreign framework's format.\n2. Run the migration pipeline against the temp directory.\n3. Assert that the output converts to the expected `librefang-types` structures.\n4. Assert that malformed inputs produce the expected error variant.\n\n## Relationship to Other Crates\n\n`librefang-migrate` is a pure consumer of `librefang-types`. It produces those types but does not depend on any other LibreFang crate — no runtime, no database, no networking. This keeps the migration engine testable in isolation and suitable for inclusion in either a CLI tool or a larger application.\n\nNo other crate in the workspace currently calls into `librefang-migrate` at compile time; it is expected to be invoked explicitly (e.g., from a binary or a plugin) rather than linked automatically.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This crate provides the integration layer between the LibreFang system and MCP-compatible services, enabling the runtime to discover and invoke tools, access resources, and manage prompts exposed by MCP servers.\n\n## Purpose\n\nThe Model Context Protocol standardizes how AI applications communicate with external tool providers and data sources. This crate implements the client side of that protocol within the LibreFang runtime, allowing the system to:\n\n- Connect to MCP servers over HTTP transport\n- Discover available tools and their schemas\n- Invoke tools and collect results\n- Handle authentication and request signing where required\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-runtime-mcp] --> B[librefang-types]\n    A --> C[librefang-http]\n    A --> D[rmcp]\n    A --> E[reqwest]\n    D --> F[MCP Protocol Layer]\n    C --> G[HTTP Infrastructure]\n```\n\nThe crate sits between the higher-level runtime orchestration and the lower-level HTTP/protocol plumbing. It delegates HTTP concerns to `librefang-http` and uses `rmcp` as the underlying MCP protocol implementation, adapting both to the type system defined in `librefang-types`.\n\n## Dependencies and Their Roles\n\n### Internal Crates\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions — request/response structures, error types, and domain models used across all LibreFang crates |\n| `librefang-http` | HTTP client configuration, connection pooling, and shared request infrastructure |\n\n### External Crates\n\n| Crate | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation — handles message serialization, protocol negotiation, and transport framing |\n| `reqwest` | Underlying HTTP client used for requests to MCP servers |\n| `http` | Low-level HTTP types (`Request`, `Response`, `HeaderMap`) |\n| `tokio` | Async runtime for non-blocking I/O |\n| `serde` / `serde_json` | JSON serialization for MCP message payloads |\n| `async-trait` | Async trait definitions for pluggable transport or client behaviors |\n| `base64` / `sha2` | Encoding and hashing — likely used for authentication signatures or payload integrity checks |\n| `url` | URL parsing and construction for MCP server endpoints |\n| `rand` | Random number generation — used for nonce generation, request IDs, or similar protocol requirements |\n| `tracing` | Structured logging and diagnostics |\n\n## Relationship to the Rest of LibreFang\n\nThis crate is a leaf dependency within the LibreFang workspace. It has no dependents among the other workspace crates (no incoming calls detected), which means it is consumed directly by the top-level runtime binary or application entry point rather than by other library crates.\n\nThe flow of data is:\n\n1. The runtime entry point loads configuration specifying MCP server endpoints.\n2. This crate is initialized with that configuration, using `librefang-http` for the underlying HTTP client.\n3. The runtime calls into this crate to discover tools or invoke them during execution.\n4. Results are returned as types from `librefang-types`, keeping the interface consistent with the rest of the system.\n\n## Key Design Decisions\n\n**Transport over HTTP.** The dependency on `reqwest` and `http` (rather than `tokio` raw I/O or a WebSocket library) indicates that this client communicates with MCP servers via HTTP. This aligns with the MCP specification's HTTP-based transport.\n\n**Protocol delegation to `rmcp`.** Rather than implementing MCP message framing from scratch, the crate relies on the `rmcp` crate for protocol-level concerns. This crate's responsibility is the integration glue — mapping LibreFang types to `rmcp` types, managing HTTP connections via `librefang-http`, and handling any authentication or retry logic specific to the LibreFang deployment.\n\n**Authentication support.** The presence of `base64`, `sha2`, and `rand` suggests that the crate handles some form of request signing or token-based authentication when communicating with MCP servers. This is implemented locally rather than delegated to `librefang-http`, keeping the authentication logic MCP-specific.\n\n## Contributing\n\nWhen modifying this crate, keep the following in mind:\n\n- **Do not introduce circular dependencies.** This crate must not depend on any LibreFang crate that itself depends on this one. Currently it only depends on `librefang-types` and `librefang-http`, which are both low-level infrastructure crates.\n- **Keep `rmcp` concerns isolated.** Avoid leaking `rmcp` types through the public API. Convert to `librefang-types` at the boundary so consumers don't need to depend on `rmcp` directly.\n- **Use `tracing` for all diagnostics.** Do not use `println!` or `eprintln!`. Instrument public functions with `tracing::instrument` where appropriate.\n- **All I/O must be async.** Every function that performs network requests should return a `Future` or accept an async runtime context. The crate relies entirely on `tokio` for concurrency.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth authentication flows for LibreFang runtime drivers. Handles token acquisition and refresh for third-party AI services (ChatGPT, GitHub Copilot) using industry-standard OAuth 2.0 + PKCE mechanisms.\n\n## Purpose\n\nLibreFang integrates with external AI providers that require user authentication. This module isolates all OAuth logic so that runtime drivers don't need to implement their own auth flows. It provides the cryptographic primitives, HTTP exchange logic, and token lifecycle management needed to authenticate against these services securely.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests auth| B[librefang-runtime-oauth]\n    B -->|uses types| C[librefang-types]\n    B -->|HTTP calls| D[librefang-http]\n    B -->|token exchange| E[OAuth Provider API]\n    B -->|secure cleanup| F[zeroize / sha2]\n```\n\nThe module sits between a runtime driver and the external OAuth provider. It generates PKCE challenges, initiates the authorization flow, exchanges authorization codes for tokens, and manages credential hygiene.\n\n## Dependencies and Their Roles\n\n### Internal Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared types for OAuth tokens, credentials, and error representations |\n| `librefang-http` | HTTP client abstractions used for token exchange and refresh requests |\n\n### Cryptographic & Security Dependencies\n\n| Crate | Role |\n|---|---|\n| `sha2` | SHA-256 hashing for PKCE code challenge generation |\n| `base64` | Base64url encoding of the code verifier and challenge |\n| `rand` | Cryptographically secure random generation of the code verifier |\n| `hex` | Hex encoding for fingerprinting and hash comparison |\n| `zeroize` | Secure memory wiping of sensitive credentials (tokens, secrets) after use |\n\n### Async & Serialization\n\n| Crate | Role |\n|---|---|\n| `tokio` | Async runtime for non-blocking token exchange |\n| `reqwest` | Underlying HTTP client for outbound requests to OAuth endpoints |\n| `serde` / `serde_json` | Serialization of token responses and request payloads |\n\n## OAuth Flow (PKCE)\n\nThe module implements the OAuth 2.0 Authorization Code flow with PKCE (Proof Key for Code Exchange). This avoids exposing a client secret in native/runtime environments.\n\n### Sequence\n\n1. **Generate code verifier** — A cryptographically random string created via `rand`.\n2. **Derive code challenge** — SHA-256 hash of the verifier, Base64url-encoded using `sha2` + `base64`.\n3. **Initiate authorization** — Redirect or present the user with the provider's authorization URL, including the code challenge.\n4. **Exchange authorization code** — Send the received code along with the original code verifier to the token endpoint via `librefang-http` / `reqwest`.\n5. **Store token** — Deserialize the JSON response (`serde_json`) into typed structures from `librefang-types`.\n6. **Zero sensitive data** — The code verifier and any intermediate secrets are securely wiped using `zeroize`.\n\n## Supported Providers\n\n- **ChatGPT (OpenAI)** — OAuth flow for authenticating with OpenAI's API.\n- **GitHub Copilot** — OAuth flow leveraging GitHub's device authorization or code flow as used by Copilot integrations.\n\nEach provider has distinct token endpoints and scopes, but the PKCE mechanics are shared.\n\n## Credential Hygiene\n\nTokens, code verifiers, and other secrets are held in types that implement `Zeroize` from the `zeroize` crate. When these values go out of scope or are explicitly cleared, their memory is overwritten, minimizing the window of exposure for sensitive credential material.\n\n## Integration with Runtime Drivers\n\nA runtime driver consumes this module by calling into its auth entry points (typed via `librefang-types`) to obtain valid access tokens before making API requests to the target AI service. The driver does not handle OAuth logic directly — it delegates entirely to this crate.\n\nError conditions (expired tokens, rejected codes, network failures) are reported via `thiserror`-derived error types, allowing drivers to surface meaningful messages or trigger re-authentication flows.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests — MCP OAuth Integration Tests\n\n## Purpose\n\nThis module validates the OAuth authentication layer for MCP (Model Context Protocol) server connections. It ensures that metadata discovery falls back correctly, OAuth providers are wired through the connection stack, token lifecycle operations work in isolation, and auth state transitions serialize properly for the dashboard UI.\n\nMany of these tests are explicitly marked as **regression tests** guarding against bugs that previously shipped — notably a case where `oauth_provider: None` silently disabled the entire OAuth flow, and a case where revoking tokens removed the auth state entirely, causing the \"Authorize\" button to disappear.\n\n## Test Categories\n\n### OAuth Metadata Discovery\n\nTwo tests exercise `discover_oauth_metadata`:\n\n| Test | Scenario | Expected outcome |\n|---|---|---|\n| `test_discover_fallback_to_config` | Server URL is unreachable, but an `McpOAuthConfig` is provided | Returns metadata built from config values (`auth_url`, `token_url`, `client_id`) |\n| `test_discover_fails_without_any_source` | Server URL is unreachable, no config provided | Returns an error containing `\"OAuth metadata\"` |\n\nThese validate the fallback chain: when the well-known discovery endpoint on the MCP server is unreachable, the system falls back to static configuration from `McpOAuthConfig`. If neither source is available, it fails with a descriptive error.\n\n### OAuth Provider Wiring Regression Test\n\n`test_http_connect_calls_oauth_provider_load_token` is the most architecturally significant test in this file. It catches the bug where `oauth_provider: None` was passed in the kernel's `connect_mcp_servers`, silently disabling OAuth.\n\nIt works by:\n\n1. Creating a `TrackingOAuthProvider` that records whether `load_token` was invoked (via an `AtomicBool`)\n2. Configuring an `McpServerConfig` with `McpTransport::Http` pointing at a port nothing listens on (`127.0.0.1:1`)\n3. Calling `McpConnection::connect` and asserting it fails\n4. **Critically**: asserting that `load_token` was called on the provider, proving the provider was passed through and consulted — not silently dropped\n\n```\nMcpConnection::connect(config with oauth_provider: Some(...))\n  → attempts HTTP connection → fails/401\n  → calls oauth_provider.load_token(server_url)     ← this is what we're verifying\n```\n\nIf this test fails with *\"OAuth provider's load_token was never called\"*, it means the provider is not being threaded through the connection logic.\n\n### Token Lifecycle Tests\n\nThese tests use `InMemoryOAuthProvider`, a mock `McpOAuthProvider` that stores tokens in a `HashMap` guarded by a `tokio::sync::Mutex`. They validate the CRUD contract of the `McpOAuthProvider` trait:\n\n| Test | What it verifies |\n|---|---|\n| `test_provider_store_then_load` | `store_tokens` → `load_token` returns the stored access token; initially returns `None` |\n| `test_provider_clear_removes_token` | `clear_tokens` removes the token; subsequent `load_token` returns `None` |\n| `test_provider_clear_is_isolated` | Clearing tokens for server A does not affect server B's tokens |\n| `test_provider_reauthorize_after_clear` | After clearing, a new `store_tokens` with different credentials succeeds — models the revoke → re-authorize flow |\n\nThe state machine being validated:\n\n```mermaid\nstateDiagram-v2\n    [*] --> Empty : provider created\n    Empty --> Stored : store_tokens()\n    Stored --> Stored : load_token() returns access_token\n    Stored --> Empty : clear_tokens()\n    Empty --> Stored : store_tokens() new token\n    Stored --> Stored : store_tokens() overwrites\n```\n\n### Auth State Serialization Tests\n\nTwo synchronous tests validate `McpAuthState` enum serialization via `serde_json`:\n\n| Test | What it verifies |\n|---|---|\n| `test_auth_state_lifecycle` | Full cycle: `NeedsAuth` → `PendingAuth` → `Authorized` → `NeedsAuth` (after revoke). Each state serializes with the correct `\"state\"` discriminant. |\n| `test_needs_auth_serializes_differently_from_pending_auth` | `NeedsAuth` and `PendingAuth` produce **different** `\"state\"` values (`\"needs_auth\"` vs `\"pending_auth\"`). |\n\nThe lifecycle regression: previously, revoking a token deleted the auth state entirely rather than transitioning to `NeedsAuth`, which caused the dashboard's \"Authorize\" button to vanish. The test asserts that after revoke, the state is `NeedsAuth` — ensuring the button reappears.\n\nThe serialization distinction test guards against a bug where the dashboard showed \"Authorizing...\" on boot before the user clicked anything, because both states serialized identically.\n\n## Mock Implementations\n\n### `TrackingOAuthProvider`\n\nRecords invocation of `load_token` via an `AtomicBool`. Returns `None` for `load_token` (forcing the connection to treat it as no cached token). All other methods are no-ops.\n\nUsed exclusively by `test_http_connect_calls_oauth_provider_load_token` to prove the provider is wired through the connection stack.\n\n### `InMemoryOAuthProvider`\n\nStores `OAuthTokens` in a `HashMap<String, OAuthTokens>` behind a `tokio::sync::Mutex`. Fully functional in-memory implementation of `McpOAuthProvider`:\n\n- **`load_token`**: Returns the `access_token` field from the stored `OAuthTokens`, or `None`.\n- **`store_tokens`**: Inserts/overwrites the entry for the server URL.\n- **`clear_tokens`**: Removes the entry for the server URL.\n\n## Dependencies on Production Code\n\nThis test module imports from:\n\n- **`librefang_runtime::mcp_oauth`**: `discover_oauth_metadata`, `OAuthTokens`, `McpAuthState`, `McpOAuthProvider`\n- **`librefang_runtime::mcp`**: `McpConnection`, `McpServerConfig`, `McpTransport`\n- **`librefang_types::config`**: `McpOAuthConfig`","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime. This module provides a WebAssembly-based execution environment that isolates and runs user-authored \"skills\" safely within the game runtime.\n\n## Purpose\n\nLibreFang skills are user-defined behaviors that need to execute within the game without compromising the host system. This module uses [wasmtime](https://wasmtime.dev/) to compile and instantiate WASM modules, providing a sandboxed runtime where skills can operate with controlled, explicitly-granted capabilities.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-runtime-wasm] --> B[librefang-types]\n    A --> C[librefang-kernel-handle]\n    A --> D[librefang-http]\n    A --> E[wasmtime]\n    A --> F[librefang-kernel-handle]\n    A --> D\n    E -->|compiles & instantiates| G[WASM Skill Module]\n    C -->|host functions exposed to| G\n    D -->|HTTP capability for| G\n```\n\nThe sandbox bridges the WASM guest and the LibreFang host. Skills running inside wasmtime can call imported host functions to interact with the game kernel and make HTTP requests, but cannot access anything the host does not explicitly expose.\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `wasmtime` | WASM compilation, instantiation, and execution engine |\n| `librefang-types` | Shared type definitions exchanged between host and guest |\n| `librefang-kernel-handle` | Exposes kernel operations (state queries, event emission) as host functions callable from WASM |\n| `librefang-http` | Provides HTTP client capability to skills that need to make outbound requests |\n| `serde` / `serde_json` | Serialization of data passed across the WASM boundary |\n| `tokio` | Async runtime backing wasmtime and I/O operations |\n| `reqwest` | Underlying HTTP client used by `librefang-http` |\n| `tracing` | Structured logging for sandbox lifecycle events |\n| `thiserror` / `anyhow` | Error types for sandbox initialization and execution failures |\n\n## WASM Boundary Design\n\nCommunication between the host and a WASM skill involves:\n\n1. **Memory sharing** — The host reads from and writes to the WASM module's linear memory.\n2. **Host function imports** — Skills declare imports that the host satisfies using `librefang-kernel-handle` and `librefang-http`, giving skills access to kernel operations and HTTP without direct system access.\n3. **Serialization** — Complex data structures are serialized with `serde_json` before being written into WASM memory, and deserialized on the other side.\n\n## Integration with LibreFang\n\nThis module is consumed by the higher-level runtime orchestration. Other modules load a compiled `.wasm` skill file, pass it to this sandbox for instantiation, and then drive execution by invoking the skill's exported functions in response to game events.\n\nThe dependency on `librefang-kernel-handle` rather than the kernel itself ensures the sandbox only has access to the kernel through the controlled handle interface, maintaining the security boundary.\n\n## Error Handling\n\nErrors originating from this module fall into two categories:\n\n- **Initialization errors** — WASM compilation failures, missing imports, or incompatible module formats. These are reported before any skill code runs.\n- **Runtime errors** — Traps, out-of-bounds memory access, or host function failures during execution. These are caught at the sandbox boundary and surfaced to the caller.\n\nBoth categories use `thiserror` for typed error variants and `anyhow` for internal propagation where specific error handling is not required.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate orchestrates the full lifecycle of an agent — from initialization through task execution to shutdown — by composing subsystems for LLM interaction, sandboxed code execution, memory, skills, and external protocol support.\n\n## Architecture\n\nThe runtime sits at the center of LibreFang's agent stack. It does not implement low-level primitives itself; instead it wires together sibling crates into a coherent execution environment.\n\n```mermaid\ngraph TD\n    RT[librefang-runtime] --> TYPES[librefang-types]\n    RT --> HTTP[librefang-http]\n    RT --> KH[librefang-kernel-handle]\n    RT --> MCP[librefang-runtime-mcp]\n    RT --> OAUTH[librefang-runtime-oauth]\n    RT --> LLM_DRV[librefang-llm-drivers]\n    RT --> LLM_D[librefang-llm-driver]\n    RT --> WASM[librefang-runtime-wasm]\n    RT --> CH[librefang-channels]\n    RT --> MEM[librefang-memory]\n    RT --> SK[librefang-skills]\n```\n\n### Subsystem responsibilities\n\n| Dependency | Role in the runtime |\n|---|---|\n| `librefang-types` | Shared domain types (messages, agent config, error types) |\n| `librefang-http` | Outbound HTTP client used by agents for web requests |\n| `librefang-kernel-handle` | Host-level system interactions |\n| `librefang-runtime-mcp` | Model Context Protocol client — lets agents call external tool servers |\n| `librefang-runtime-oauth` | OAuth flows for authenticating agents against third-party services |\n| `librefang-llm-drivers` / `librefang-llm-driver` | Pluggable LLM backends (OpenAI, Anthropic, local models, etc.) |\n| `librefang-runtime-wasm` | WebAssembly sandbox for running untrusted agent code |\n| `librefang-channels` | Async message passing between agent components and external consumers |\n| `librefang-memory` | Persistent and ephemeral memory stores for agent context |\n| `librefang-skills` | Declarative skill definitions and dispatch |\n\n## Key capabilities\n\n### Sandboxed execution\n\nThe runtime provides two orthogonal sandboxing mechanisms, both optional and selected at compile time via Cargo features:\n\n- **`landlock-sandbox`** — Linux Landlock access-control profiles. Constrains filesystem and network access for spawned processes.\n- **`seccomp-sandbox`** — seccomp-bpf syscall filters via `seccompiler`. Restricts the set of syscalls available to sandboxed code.\n- **WASM sandbox** — `wasmtime`-based execution of untrusted WebAssembly modules through `librefang-runtime-wasm`. Enabled unconditionally; the `wasm-hooks` feature adds additional hook points.\n\nOn Unix platforms, `libc` is linked directly for low-level process and signal handling required by sandbox setup.\n\n### LLM integration\n\nLLM calls are routed through the `librefang-llm-driver` trait abstraction, with concrete implementations provided by `librefang-llm-drivers`. The runtime manages:\n\n- Streaming response handling via `tokio-stream` and `futures`\n- Request signing where required (Ed25519 via `ed25519-dalek`)\n- Retry and error propagation\n\n### Model Context Protocol (MCP)\n\nThrough `librefang-runtime-mcp` and the `rmcp` crate, the runtime exposes an MCP client so agents can discover and invoke tools on external MCP-compliant servers over stdio or HTTP transports.\n\n### Cryptographic operations\n\n- **Ed25519** (`ed25519-dalek`) — agent identity signing and verification\n- **HMAC-SHA256** (`hmac` + `sha2`) — message authentication and webhook verification\n- **Hex/Base64** encoding for wire formats\n- **`zeroize`** — secure cleanup of sensitive key material\n\n### Persistence and state\n\n- **SQLite** (`rusqlite`) — local relational storage for agent state, conversation history, and configuration\n- **Concurrent maps** (`dashmap`) — in-process, lock-free keyed state\n- **`parking_lot`** mutexes and rw-locks for synchronized access patterns\n\n### Networking\n\n- **`reqwest`** — async HTTP client\n- **`ureq`** — synchronous HTTP fallback (used in contexts where an async runtime is unavailable, such as WASM host functions)\n- **`tokio-tungstenite`** — WebSocket connections, with TLS via `rustls`\n- **`rustls`** with `webpki-roots` / `rustls-native-certs` — TLS certificate verification\n\n### Package management\n\n`flate2` and `tar` are included for unpacking skill bundles and WASM modules distributed as `.tar.gz` archives.\n\n## Feature flags\n\n| Feature | Default | Description |\n|---|---|---|\n| `landlock-sandbox` | off | Enable Linux Landlock filesystem/network sandboxing |\n| `seccomp-sandbox` | off | Enable seccomp-bpf syscall filtering |\n| `wasm-hooks` | off | Register additional WASM lifecycle hooks |\n\nBoth sandbox features target Linux. They compile conditionally and have no effect on other platforms.\n\n## Adding the dependency\n\n```toml\n[dependencies]\nlibrefang-runtime = { path = \"../librefang-runtime\" }\n\n# Optional: enable sandboxing\n[features]\ndefault = []\nlinux-sandbox = [\"librefang-runtime/landlock-sandbox\", \"librefang-runtime/seccomp-sandbox\"]\n```\n\n## Thread safety and async runtime\n\nThe crate is designed for use within a `tokio` multi-threaded runtime. All public async functions expect an active Tokio context. Shared state uses `DashMap` and `parking_lot` primitives rather than `std::sync` to minimize async-aware lock contention.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang — provides skill registry, filesystem loader, marketplace integration, and OpenClaw compatibility.\n\n## Overview\n\nThis module manages the full lifecycle of skills in LibreFang: discovery on disk, loading and parsing, registration at runtime, version management, and retrieval from a marketplace. It also provides backward compatibility with the OpenClaw skill format.\n\nA **skill** in LibreFang is a self-contained unit of behavior that can be discovered, loaded, and invoked at runtime. Skills are packaged as archives (`.zip`) and described by metadata in TOML, JSON, or YAML formats.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Filesystem Loader]\n    A --> C[Marketplace Client]\n    B --> D[Skill Packages on Disk]\n    C --> E[Remote Marketplace API]\n    A --> F[OpenClaw Compatibility Layer]\n    F --> G[OpenClaw-format Skills]\n```\n\n## Key Subsystems\n\n### Skill Registry\n\nThe central in-memory store for all loaded skills. Skills are identified by a unique `uuid` and tracked with semantic versioning via `semver`. The registry supports lookup, enumeration, and removal of skills.\n\n### Filesystem Loader\n\nUses `walkdir` to recursively discover skill packages under configured directories. The loader:\n\n1. Scans standard directories (via the `dirs` crate) and user-configured paths\n2. Extracts metadata from `serde`-deserializable manifests (TOML, JSON, or YAML)\n3. Verifies package integrity using SHA-256 hashes (`sha2`, `hex`)\n4. Extracts `.zip` archives using the `zip` crate\n5. Registers loaded skills with the registry\n\nFile locking (`fs2`) prevents concurrent access corruption when multiple processes load or update skills simultaneously.\n\n### Marketplace Client\n\nAn async HTTP client (`reqwest` with `rustls` for TLS) that connects to a remote skill marketplace. Responsible for:\n\n- Searching and browsing available skills\n- Downloading skill packages\n- Verifying downloaded content integrity\n- Tracking download timestamps with `chrono`\n\nTLS root certificates are sourced from both `webpki-roots` (Mozilla bundle) and `rustls-native-certs` (system certificate store) for broad compatibility.\n\n### OpenClaw Compatibility Layer\n\nTranslates skills authored in the OpenClaw format into LibreFang's internal representation. This layer uses `serde_yaml` and `serde_json` to parse OpenClaw metadata schemas and map them to the LibreFang skill model defined in `librefang-types`.\n\n## Dependencies and Their Roles\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions (`Skill`, `SkillManifest`, etc.) |\n| `serde` / `serde_json` / `toml` / `serde_yaml` | Multi-format metadata deserialization |\n| `walkdir` | Recursive directory traversal for skill discovery |\n| `zip` | Skill package extraction |\n| `sha2` / `hex` | SHA-256 integrity hashing |\n| `semver` | Semantic version parsing and comparison |\n| `uuid` | Unique skill identification |\n| `reqwest` / `rustls` | Marketplace HTTP client with TLS |\n| `fs2` | File-based locking for concurrent safety |\n| `aho-corasick` | Efficient multi-pattern matching for skill triggers |\n| `dirs` | Platform-standard directory paths |\n| `chrono` | Timestamps for marketplace operations |\n\n## Relationship to Other Modules\n\nThis module depends on **`librefang-types`** for all shared data structures — it does not define its own skill types. Other modules in LibreFang consume this crate to resolve and invoke skills by name or ID.\n\nThere are no direct outgoing calls to other LibreFang crates beyond `librefang-types`, keeping this module self-contained and testable in isolation.\n\n## Testing\n\nTests use `tempfile` for isolated filesystem operations and `tokio-test` for async runtime in marketplace tests. Skill loading, integrity verification, and OpenClaw format conversion are the primary test surfaces.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for the LibreFang project.\n\n## Overview\n\n`librefang-telemetry` serves as the centralized metrics layer for LibreFang. It wraps the [`metrics`](https://docs.rs/metrics) facade crate and exposes domain-specific metric definitions, helpers, and labels tailored to the server's operational concerns — game sessions, player activity, network throughput, and system health.\n\nBy isolating all metric registration and labeling into its own crate, the rest of the codebase can record observations without worrying about cardinality management, naming conventions, or exporter configuration.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `metrics` | Vendor-agnostic metrics facade. Provides macros like `counter!`, `gauge!`, `histogram!`, and `increment_counter!`. |\n| `librefang-types` | Shared domain types used in metric labels (e.g., game mode identifiers, player states). |\n| `tokio-test` (dev) | Async test utilities for validating metric behavior under concurrent scenarios. |\n\n## Role in the Architecture\n\n```\n┌──────────────────┐\n│  Application     │\n│  Binary / Server │\n│                  │\n│  metrics::*      │  ← macros called throughout business logic\n└────────┬─────────┘\n         │ depends on\n         ▼\n┌──────────────────┐       ┌──────────────────┐\n│ librefang-       │──────▶│ librefang-types  │\n│ telemetry        │       │                  │\n│                  │       │ Shared types for │\n│ Metric names,    │       │ labels & keys    │\n│ label constants, │       └──────────────────┘\n│ helper functions │\n└──────────────────┘\n```\n\nThe binary crate wires up a concrete metrics exporter (e.g., `metrics-exporter-prometheus`) at startup. `librefang-telemetry` does **not** select or configure an exporter — it only defines *what* to measure and *how* to label it. This separation keeps the telemetry definitions portable across different observability backends.\n\n## Key Concepts\n\n### Naming Conventions\n\nMetric names follow a dotted namespace to avoid collisions and group related observations:\n\n- `librefang.session.*` — game session lifecycle (created, destroyed, active count)\n- `librefang.player.*` — player connection metrics (joins, leaves, concurrent)\n- `librefang.network.*` — bytes sent/received, message latency\n- `librefang.system.*` — process-level health (CPU, memory, uptime)\n\nAll name constants are centralized here so that typos or renaming only need to happen in one place.\n\n### Label Design\n\nLabels are derived from types in `librefang-types`. Keeping label values bounded is critical for Prometheus — unbounded cardinality (e.g., using a raw player ID as a label) would explode metric storage. This crate is responsible for defining which label dimensions are safe to use and providing helpers that map domain types to label sets.\n\n## Integration Points\n\nOther LibreFang crates consume this module by:\n\n1. **Depending on it** in their `Cargo.toml`.\n2. **Calling metric helpers** or using the re-exported `metrics` macros with the names/labels defined here.\n3. **Never importing `metrics` directly** — going through this crate ensures consistent naming and labeling.\n\nThe application binary is responsible for:\n\n1. Initializing a metrics exporter before any observations are recorded.\n2. Optionally installing a `metrics::Recorder` that routes to OpenTelemetry, Prometheus, or both.\n3. Calling into this crate's setup functions to register any default gauge or counter baseline values.\n\n## Testing\n\nThe `tokio-test` dev dependency indicates that tests exercise metric recording under async contexts — validating that counters and histograms behave correctly when multiple tasks record concurrently, and that label resolution from `librefang-types` values produces the expected keys.","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Test Suite (`tests.rs`)\n\nThis file contains integration and unit tests that both validate the application's API surface and serve as executable documentation for the `librefang-testing` crate's test infrastructure.\n\n## Purpose\n\nThe tests exercise three distinct concerns:\n\n1. **HTTP API correctness** — Verifies routing, status codes, and response shapes for all agent-related endpoints.\n2. **Mock driver behavior** — Confirms that `MockLlmDriver` and `FailingLlmDriver` behave as advertised (call recording, custom token counts, forced errors).\n3. **Custom kernel configuration** — Demonstrates how to inject configuration overrides into the test kernel.\n\n## Test Execution Model\n\n```mermaid\nflowchart LR\n    A[TestAppState::new] --> B[app.router]\n    B --> C[test_request]\n    C --> D[router.oneshot]\n    D --> E{assert_json_ok or assert_json_error}\n    E --> F[JSON body assertions]\n```\n\nEvery HTTP-level test follows the same sequence: construct a `TestAppState`, extract the Axum `Router`, build a request with `test_request`, dispatch it via `oneshot`, and assert on the response using `assert_json_ok` (for 2xx) or `assert_json_error` (for error status codes).\n\n## HTTP API Tests\n\nAll HTTP tests use `#[tokio::test(flavor = \"multi_thread\")]` because the router and underlying kernel require a multi-threaded Tokio runtime.\n\n### Read Endpoints\n\n| Test | Method & Path | Expected Status | What It Validates |\n|---|---|---|---|\n| `test_health_endpoint` | `GET /api/health` | 200 | Response contains `\"status\": \"ok\"` or `\"status\": \"degraded\"` |\n| `test_version_endpoint` | `GET /api/version` | 200 | Response contains a `version` field |\n| `test_list_agents` | `GET /api/agents` | 200 | Response shape is `{items: [...], total: N}` |\n| `test_get_agent_invalid_id` | `GET /api/agents/not-a-valid-uuid` | 400 | Malformed UUID is rejected with an `error` field |\n| `test_get_agent_not_found` | `GET /api/agents/{uuid}` | 404 | Valid but nonexistent UUID returns `error` field |\n\n### Mutation Endpoints\n\n| Test | Method & Path | Expected Status | What It Validates |\n|---|---|---|---|\n| `test_spawn_agent_post` | `POST /api/agents` | 200 or 201 | Accepts a `manifest_toml` body and creates an agent |\n| `test_delete_agent_not_found` | `DELETE /api/agents/{uuid}` | 404 | Deleting a nonexistent agent returns an error |\n| `test_set_model_not_found` | `PUT /api/agents/{uuid}/model` | 4xx/5xx | Setting model on a nonexistent agent fails |\n| `test_send_message_agent_not_found` | `POST /api/agents/{uuid}/message` | 404/400 | Messaging a nonexistent agent fails |\n| `test_patch_agent_not_found` | `PATCH /api/agents/{uuid}` | 404/400 | Patching a nonexistent agent fails |\n\n### Common Patterns for Writing New API Tests\n\n**Happy-path test:**\n```rust\nlet app = TestAppState::new();\nlet router = app.router();\nlet req = test_request(Method::GET, \"/api/some-endpoint\", None);\nlet resp = router.oneshot(req).await.expect(\"request failed\");\nlet json = assert_json_ok(resp).await;\n// assert on json fields...\n```\n\n**Error-path test:**\n```rust\nlet app = TestAppState::new();\nlet router = app.router();\nlet req = test_request(Method::GET, \"/api/agents/bad-id\", None);\nlet resp = router.oneshot(req).await.expect(\"request failed\");\nlet json = assert_json_error(resp, StatusCode::BAD_REQUEST).await;\n// assert on json[\"error\"]...\n```\n\n**Request with a JSON body:**\n```rust\nlet body = serde_json::json!({ \"key\": \"value\" }).to_string();\nlet req = test_request(Method::POST, \"/api/endpoint\", Some(&body));\n```\n\n## Mock Driver Tests\n\nThese tests run as plain `#[tokio::test]` (no multi-thread requirement) since they don't touch the Axum router.\n\n### MockLlmDriver\n\n`test_mock_llm_driver_recording` — Constructs a `MockLlmDriver` with a queue of responses (`[\"回复1\", \"回复2\"]`), calls `complete()` twice, and verifies:\n\n- Responses are returned in FIFO order.\n- `call_count()` reflects the number of invocations.\n- `recorded_calls()` captures the `model` and `system` fields from each request.\n\n`test_mock_llm_driver_custom_tokens_and_stop_reason` — Uses the builder pattern:\n\n```rust\nlet driver = MockLlmDriver::with_response(\"test\")\n    .with_tokens(200, 100)\n    .with_stop_reason(StopReason::MaxTokens);\n```\n\nThis overrides the default token usage (`input_tokens`, `output_tokens`) and the `stop_reason` on the generated `CompletionResponse`.\n\n### FailingLlmDriver\n\n`test_failing_llm_driver` — Validates that:\n\n- Every call to `complete()` returns `Err`.\n- The error message contains the string passed to `FailingLlmDriver::new()`.\n- `is_configured()` returns `false`.\n\nUse `FailingLlmDriver` when you need to exercise error-handling paths in code that depends on `LlmDriver`.\n\n## Custom Configuration Tests\n\n`test_custom_config_kernel` demonstrates injecting overrides via `MockKernelBuilder`:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n);\nassert_eq!(app.state.kernel.config_ref().language, \"zh\");\n```\n\nUse `TestAppState::with_builder` (instead of `TestAppState::new`) whenever the test needs specific kernel configuration — custom language, model defaults, feature flags, etc.\n\n## Dependencies on Other Crates\n\n| Crate | What's Used |\n|---|---|\n| `librefang-runtime` | `CompletionRequest`, `LlmDriver` trait, `StopReason` |\n| `librefang-types` | `message::StopReason` enum |\n| `axum` | `http::Method`, `http::StatusCode` |\n| `tower` | `ServiceExt` (provides `oneshot`) |\n| `uuid` | `Uuid::new_v4` for generating nonexistent-agent IDs |\n\n## Conventions\n\n- All HTTP endpoint tests assert on the shape of JSON responses, not on exact values — this keeps tests resilient to minor implementation changes.\n- Nonexistent resources use freshly generated UUIDs (`Uuid::new_v4()`) to guarantee they don't collide with seeded data.\n- Error responses are expected to include an `\"error\"` key in the JSON body.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure for the Librefang workspace: mock kernel, mock LLM driver, and API route test utilities.\n\nThis crate is a **dev-only dependency** — it never ships in production builds. It provides reusable fakes, mocks, and harnesses so that other workspace crates can write integration and unit tests without needing real hardware, a live LLM backend, or a running HTTP server.\n\n## Role in the Workspace\n\n`librefang-testing` sits downstream of nearly every other Librefang crate. It imports the kernel, runtime, memory, API, wire protocol, channels, skills, hands, and extensions modules so that test helpers can construct fully-wired (but fake) subsystems.\n\n```mermaid\ngraph TD\n    T[librefang-testing] --> K[librefang-kernel]\n    T --> RT[librefang-runtime]\n    T --> M[librefang-memory]\n    T --> A[librefang-api]\n    T --> W[librefang-wire]\n    T --> C[librefang-channels]\n    T --> S[librefang-skills]\n    T --> H[librefang-hands]\n    T --> E[librefang-extensions]\n    T --> TY[librefang-types]\n    A --> |\"telemetry feature\"| T\n```\n\nBy pulling in `librefang-api` with only the `telemetry` feature enabled (and `default-features = false`), the crate avoids pulling in real server infrastructure while still gaining access to telemetry types needed for assertions.\n\n## Key Capabilities\n\n### Mock Kernel\n\nProvides a fake implementation of the kernel interface. Tests can instantiate the mock, optionally pre-program responses or record calls, and assert that the system under test interacts with the kernel as expected.\n\n### Mock LLM Driver\n\nProvides a deterministic stand-in for the LLM backend. This allows tests of skills, extensions, and agent logic to run without network calls, with full control over what \"completions\" the mock returns.\n\n### API Route Test Utilities\n\nWraps `librefang-api` routes in an in-process `axum` router backed by `tower::ServiceExt`. Tests send requests through the full HTTP stack (serialization, middleware, routing, handlers) without opening a real listener. The `http-body-util` dependency is used for reading response bodies in these tests.\n\n## Usage\n\nAdd `librefang-testing` as a **dev-dependency** in the crate you are testing:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\n### Typical API Route Test Pattern\n\n```rust\nuse librefang_testing::TestRouter;\n\n#[tokio::test]\nasync fn test_my_route() {\n    let app = TestRouter::new(/* mock kernel, mock llm, etc. */);\n\n    let response = app\n        .oneshot(\n            axum::http::Request::builder()\n                .method(\"POST\")\n                .uri(\"/some/endpoint\")\n                .header(\"content-type\", \"application/json\")\n                .body(r#\"{\"key\": \"value\"}\"#.into())\n                .unwrap(),\n        )\n        .await\n        .unwrap();\n\n    assert_eq!(response.status(), 200);\n}\n```\n\n## Dependencies — Why They Exist\n\n| Dependency | Reason |\n|---|---|\n| `librefang-types` | Shared domain types used in test assertions and fixture construction |\n| `librefang-kernel` | Traits to mock |\n| `librefang-runtime` | Runtime context fakes |\n| `librefang-memory` | In-memory state setups for tests |\n| `librefang-api` (telemetry only) | Route handlers and telemetry types for route-level tests |\n| `librefang-wire` | Wire-format types for serialization/deserialization tests |\n| `librefang-channels` | Channel fakes for testing async message flows |\n| `librefang-skills` | Skill types for integration fixtures |\n| `librefang-hands` | Hand/action types for integration fixtures |\n| `librefang-extensions` | Extension types for integration fixtures |\n| `axum`, `tower` | In-process HTTP test harness |\n| `dashmap` | Concurrent state inside mocks |\n| `tempfile` | Temporary directories for tests that touch the filesystem |\n| `uuid` | Generating deterministic or random IDs in fixtures |\n| `async-trait` | Implementing async mock traits |\n| `http-body-util` | Reading response bodies in route tests |\n\n## Guidelines for Extending\n\n- **Keep mocks minimal.** Only implement the surface area that tests actually exercise. Over-mocking couples tests to implementation details.\n- **Prefer determinism.** Mocks should return predictable data by default. If randomness is needed, accept a seed or value explicitly rather than using global RNG.\n- **Don't add real I/O.** This crate should never depend on network, disk (beyond `tempfile`), or external services. Tests using this crate must remain fast and hermetic.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types — Locales (API Error Messages)\n\n## Overview\n\nThis directory contains localized API error messages for LibreFang, stored as [Project Fluent](https://projectfluent.org/) (`.ftl`) resource files. Every user-facing error returned by the LibreFang API resolves its display string through these locale files, keeping error text separate from application logic.\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl      # German\n├── en/errors.ftl      # English  (canonical / most complete)\n├── es/errors.ftl      # Spanish\n├── fr/errors.ftl      # French\n├── ja/errors.ftl      # Japanese\n└── zh-CN/errors.ftl   # Simplified Chinese\n```\n\nThere is no executable code in this module. The `.ftl` files are pure translation resources consumed at runtime by the Fluent localization framework bundled into the LibreFang type definitions.\n\n---\n\n## Fluent Message Format\n\nEach message follows the Fluent syntax:\n\n```fluent\nmessage-key = Translated text\nmessage-with-variable = Operation failed: { $reason }\n```\n\n- **Keys** use kebab-case prefixed with `api-error-` and grouped by domain (e.g. `api-error-agent-not-found`).\n- **Variables** are interpolated with `{ $variable_name }` — these are supplied by the calling code at runtime.\n\n---\n\n## Message Key Convention\n\nAll keys follow the pattern:\n\n```\napi-error-<domain>-<detail>\n```\n\n| Segment | Description |\n|---|---|\n| `api-error-` | Fixed prefix — distinguishes these from UI or CLI messages |\n| `<domain>` | Resource or subsystem: `agent`, `session`, `provider`, `webhook`, etc. |\n| `<detail>` | Specific error condition: `not-found`, `invalid-id`, `missing-pattern`, etc. |\n\n### Variable interpolation patterns\n\nMost variables pass through context from the API layer:\n\n| Variable | Typical source |\n|---|---|\n| `{ $reason }` | A human-readable explanation of why a request was rejected |\n| `{ $error }` | An underlying error string from a subsystem |\n| `{ $name }` | A resource identifier (template name, profile name, etc.) |\n| `{ $id }` | A UUID or resource ID |\n| `{ $step }` | A workflow step identifier |\n| `{ $alias }` | A provider alias |\n| `{ $provider }` | A provider name |\n| `{ $url }` | A URL argument |\n| `{ $max }` | A size limit value |\n| `{ $field }` / `{ $valid }` | Sort field validation details |\n| `{ $status }` | HTTP status code |\n| `{ $event }` | Event type name |\n\n---\n\n## Coverage by Domain\n\nThe **English** locale is the canonical source and contains the full message set. The following table summarizes the error domains and their coverage across locales.\n\n| Domain | en | ja | de | es | fr | zh-CN |\n|---|:---:|:---:|:---:|:---:|:---:|:---:|\n| Agent | ✅ 17 | ✅ 13 | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 |\n| Message | ✅ 5 | ✅ 5 | ✅ 2 | ✅ 2 | ✅ 2 | ✅ 2 |\n| Template | ✅ 6 | ✅ 6 | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 |\n| Manifest | ✅ 5 | ✅ 5 | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 |\n| Auth | ✅ 3 | ✅ 3 | ✅ 3 | ✅ 3 | ✅ 3 | ✅ 3 |\n| Session | ✅ 7 | ✅ 6 | ✅ 2 | ✅ 2 | ✅ 2 | ✅ 2 |\n| Workflow | ✅ 5 | ✅ 5 | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 |\n| Trigger | ✅ 7 | ✅ 7 | ✅ 7 | ✅ 7 | ✅ 7 | ✅ 7 |\n| Budget | ✅ 3 | ✅ 3 | ✅ 2 | ✅ 2 | ✅ 2 | ✅ 2 |\n| Config | ✅ 5 | ✅ 5 | ✅ 2 | ✅ 2 | ✅ 2 | ✅ 2 |\n| Profile | ✅ 1 | ✅ 1 | ✅ 1 | ✅ 1 | ✅ 1 | ✅ 1 |\n| Cron | ✅ 6 | ✅ 6 | ✅ 3 | ✅ 3 | ✅ 3 | ✅ 3 |\n| Goal | ✅ 16 | ✅ 16 | — | — | — | — |\n| Memory | ✅ 9 | ✅ 9 | — | — | — | — |\n| Network/A2A | ✅ 7 | ✅ 7 | — | — | — | — |\n| Plugin | ✅ 5 | ✅ 5 | — | — | — | — |\n| Channel | ✅ 4 | ✅ 4 | — | — | — | — |\n| Provider | ✅ 20 | ✅ 20 | — | — | — | — |\n| Skill | ✅ 9 | ✅ 9 | — | — | — | — |\n| Hand | ✅ 3 | ✅ 3 | — | — | — | — |\n| MCP | ✅ 5 | ✅ 5 | — | — | — | — |\n| Integration/Extension | ✅ 3 | ✅ 3 | — | — | — | — |\n| System | ✅ 1 | ✅ 1 | — | — | — | — |\n| KV | ✅ 4 | ✅ 4 | — | — | — | — |\n| Approval | ✅ 2 | ✅ 2 | — | — | — | — |\n| Webhook | ✅ 13 | ✅ 10 | — | — | — | — |\n| Backup | ✅ 11 | ✅ 11 | — | — | — | — |\n| Schedule | ✅ 9 | ✅ 9 | — | — | — | — |\n| Job | ✅ 5 | ✅ 5 | — | — | — | — |\n| Task | ✅ 2 | ✅ 2 | — | — | — | — |\n| Pairing | ✅ 2 | ✅ 2 | — | — | — | — |\n| Binding | ✅ 1 | ✅ 1 | — | — | — | — |\n| Command | ✅ 1 | ✅ 1 | — | — | — | — |\n| File/Upload | ✅ 14 | ✅ 14 | — | — | — | — |\n| Tool | ✅ 2 | ✅ 2 | — | — | — | — |\n| Validation | ✅ 5 | ✅ 5 | — | — | — | — |\n| General | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 | ✅ 4 |\n\n### Locale tiers\n\n- **Tier 1 (complete)** — `en`, `ja`: All domains represented. Japanese tracks closely with English.\n- **Tier 2 (base)** — `de`, `es`, `fr`, `zh-CN`: Core domains only (agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, general).\n\n---\n\n## Adding a New Error Message\n\n1. **Add the key to `en/errors.ftl`** first. English is the canonical locale and acts as the fallback when a key is missing in another language.\n\n   ```fluent\n   api-error-<domain>-<detail> = English description here\n   ```\n\n2. **Add translations** to every other locale file that covers that domain. If a locale does not include the domain at all (e.g., German has no `goal` messages), the Fluent runtime will fall back to English for that key.\n\n3. **Follow naming rules**:\n   - Prefix: `api-error-`\n   - Use kebab-case throughout.\n   - Group by domain in the file, matching existing section comments (e.g. `# Agent errors`).\n\n4. **If the message needs runtime data**, use a Fluent variable:\n   ```fluent\n   api-error-foo-bar-failed = Foo bar failed: { $reason }\n   ```\n   Ensure the calling code passes `reason` into the Fluent message resolver.\n\n---\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using an [BCP 47](https://tools.ietf.org/html/bcp47) language tag (e.g. `pt-BR/`).\n2. Create `errors.ftl` inside it.\n3. Translate messages from `en/errors.ftl`. At minimum, include the Tier 2 core domains to provide a functional experience.\n4. Register the new locale in the application's Fluent bundle initialization (outside this module).\n\n---\n\n## Fallback Behavior\n\nWhen a requested message key is absent from the active locale, the Fluent resolver falls back through the locale chain and ultimately resolves against the English bundle. This means:\n\n- A German user will see English text for any domain not present in `de/errors.ftl` (e.g., goals, memory, webhooks).\n- **Missing keys never produce runtime crashes** — they surface as the English string or the raw key name if even the English bundle lacks it.\n\n---\n\n## Relationship to the Rest of the Codebase\n\n```\n┌──────────────────────┐\n│   API route handlers  │\n│  (construct error     │\n│   response with key)  │\n└─────────┬────────────┘\n          │ looks up key + passes args\n          ▼\n┌──────────────────────┐\n│   Fluent bundle       │\n│  (loaded from         │\n│   locales/<lang>/     │\n│   errors.ftl)         │\n└─────────┬────────────┘\n          │ reads .ftl at startup\n          ▼\n┌──────────────────────┐\n│  librefang-types/     │\n│  locales/             │\n│    en/errors.ftl      │\n│    de/errors.ftl      │\n│    ...                │\n└──────────────────────┘\n```\n\nThe `librefang-types` crate defines the shared type system and, through this locales directory, the canonical error message catalog. API handlers reference keys by name (e.g., `api-error-agent-not-found`) and delegate formatting to the Fluent runtime, which loads the appropriate `.ftl` file based on the user's language preference. This separation ensures that error messages can be corrected or translated without modifying business logic.","other-librefang-
