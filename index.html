model keyed by `AgentId`:\n\n```rust\nlet caps = CapabilityManager::new();\n\n// Grant\ncaps.grant(agent_id, vec![\n    Capability::ToolInvoke(\"file_read\".to_string()),\n    Capability::ToolInvoke(\"file_write\".to_string()),\n]);\n\n// Check\nlet result = caps.check(agent_id, &Capability::ToolInvoke(\"file_read\".to_string()));\n// result.is_granted() == true\n\n// List\nlet all: Vec<Capability> = caps.list(agent_id);\n\n// Revoke on agent shutdown\ncaps.revoke_all(agent_id);\n```\n\nThe `check()` method delegates pattern matching to `capability_matches()` from `librefang_types::capability`, which supports the same glob-style wildcards used in approval policy. If no capabilities are registered for an agent, `check()` returns `Denied`.\n\n---\n\n## Concurrency Model\n\nAll three managers use `DashMap` as their primary concurrent data structure:\n\n- **`AuthManager`** — `DashMap<UserId, UserIdentity>` and `DashMap<String, UserId>` for lock-free reads during identification and authorization.\n- **`ApprovalManager`** — `DashMap<Uuid, PendingRequest>` for pending requests. The `recent` history uses `std::sync::Mutex<VecDeque<ApprovalRecord>>` (contention is rare — only on resolution). The policy uses `std::sync::RwLock<ApprovalPolicy>` to allow concurrent reads during hot-reload. TOTP state uses `std::sync::Mutex` for both `totp_grace` and `totp_failures`.\n- **`CapabilityManager`** — `DashMap<AgentId, Vec<Capability>>`.\n\nThe approval manager's `request_approval` method is `async` and uses a `tokio::sync::oneshot` channel to communicate the decision back to the blocking caller. All other methods are synchronous — the kernel's periodic sweep (`expire_pending_requests`) handles timeout progression for the deferred path.\n\n---\n\n## Typical Request Lifecycle\n\nFor a deferred approval request flowing through the system:\n\n```mermaid\nsequenceDiagram\n    participant Agent\n    participant Kernel\n    participant ApprovalMgr as ApprovalManager\n    participant API as HTTP API\n    participant Human\n\n    Agent->>Kernel: Tool call (shell_exec)\n    Kernel->>ApprovalMgr: submit_request(req, deferred)\n    ApprovalMgr-->>Kernel: Ok(Uuid)\n    Kernel->>Human: Notification (escalated)\n\n    Human->>API: POST /approve {id, code}\n    API->>ApprovalMgr: is_totp_locked_out(user)\n    API->>ApprovalMgr: verify_totp_code(secret, code)\n    API->>ApprovalMgr: resolve(id, Approved, totp_verified=true)\n    ApprovalMgr->>ApprovalMgr: push_recent() + audit_log_write()\n    ApprovalMgr-->>API: (response, Some(deferred))\n    API->>Kernel: Execute deferred tool\n```\n\n---\n\n## Configuration\n\nAll three managers are configured through the kernel's `UserConfig` and `ApprovalPolicy` types (defined in `librefang-types`):\n\n- **`UserConfig`** — Name, role string, channel bindings, optional API key hash.\n- **`ApprovalPolicy`** — `require_approval` list (glob patterns), `trusted_senders`, `channel_rules`, `timeout_fallback`, `second_factor`, `totp_tools`, `totp_grace_period_secs`, `auto_approve_autonomous`, etc.\n\nPolicy can be hot-reloaded at runtime via `ApprovalManager::update_policy(new_policy)`.","authentication-security-librefang-runtime-oauth-src":"# Authentication & Security — librefang-runtime-oauth-src\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication for ChatGPT and GitHub Copilot. This crate provides two independent authentication modules — one for OpenAI's ChatGPT backend and one for GitHub's Copilot device flow — consumed by the CLI and the web API layer at runtime.\n\n## Module Layout\n\n```\nlibrefang-runtime-oauth/src/\n├── lib.rs               # Re-exports chatgpt_oauth and copilot_oauth\n├── chatgpt_oauth.rs     # OpenAI/ChatGPT OAuth (browser + device flows)\n└── copilot_oauth.rs     # GitHub Copilot device flow\n```\n\n## Architecture\n\n```mermaid\nflowchart TD\n    subgraph \"Callers\"\n        CLI[\"librefang-cli<br/>authenticate_chatgpt()\"]\n        WEB[\"src/routes/providers.rs<br/>copilot_oauth_start/poll()\"]\n        DRIVER[\"src/drivers/chatgpt.rs<br/>refresh_token()\"]\n    end\n\n    subgraph \"chatgpt_oauth\"\n        SOF[start_oauth_flow]\n        SDA[start_device_auth_flow]\n        PDA[poll_device_auth_flow]\n        RCB[run_oauth_callback_server]\n        ECT[exchange_code_for_tokens]\n        RAT[refresh_access_token]\n        FBC[fetch_best_codex_model]\n    end\n\n    subgraph \"copilot_oauth\"\n        SDF[start_device_flow]\n        PDF[poll_device_flow]\n    end\n\n    CLI -->|\"browser path\"| SOF\n    CLI --> RCB\n    CLI --> ECT\n    CLI -->|\"device path\"| SDA\n    CLI --> PDA\n    CLI --> FBC\n    DRIVER --> RAT\n    WEB --> SDF\n    WEB --> PDF\n```\n\n---\n\n## ChatGPT Authentication\n\nThe `chatgpt_oauth` module supports two mutually exclusive paths to obtain OAuth tokens from OpenAI's `auth.openai.com` endpoint. Both produce a `ChatGptAuthResult` containing a bearer access token and an optional refresh token (wrapped in `Zeroizing<String>` to minimize credential exposure in memory).\n\n### Flow Selection\n\n| Environment | Recommended Flow | Rationale |\n|---|---|---|\n| Desktop with browser | Browser callback | Seamless UX — browser opens, user authenticates, auto-redirected |\n| Headless / SSH / CI | Device auth | No localhost port or browser required; user visits a URL on another device |\n\n### Browser Callback Flow\n\n**Step 1 — Initiate**\n\n```rust\nlet (auth_url, port, pkce_verifier, state) = chatgpt_oauth::start_oauth_flow().await?;\n```\n\n`start_oauth_flow` performs:\n1. Probes `127.0.0.1:1455` to confirm the port is available (matches OpenAI's registered redirect URI).\n2. Generates a PKCE verifier/challenge pair via `generate_pkce()`.\n3. Generates a random state parameter via `create_state()`.\n4. Assembles the full authorization URL via `build_authorization_url()`.\n\nOpen the returned `auth_url` in the user's browser.\n\n**Step 2 — Wait for callback**\n\n```rust\nlet code = chatgpt_oauth::run_oauth_callback_server(port, &state).await?;\n```\n\nSpawns a minimal async HTTP server on `127.0.0.1:{port}` that:\n- Accepts `GET /auth/callback?code=...&state=...`\n- Validates the `state` parameter against CSRF\n- Returns an HTML success or error page to the browser\n- Sends the authorization code back through a oneshot channel\n- Times out after `AUTH_TIMEOUT_SECS` (300 seconds)\n\n**Step 3 — Exchange code for tokens**\n\n```rust\nlet result = chatgpt_oauth::exchange_code_for_tokens(&code, &pkce_verifier, port).await?;\n```\n\nPosts to `https://auth.openai.com/oauth/token` with the authorization code, PKCE verifier, and redirect URI. Returns `ChatGptAuthResult`.\n\n### Device Auth Flow\n\nDesigned for headless environments. Returns `DeviceAuthFlowError::BrowserFallback` if the user's OpenAI account/workspace doesn't support device auth, allowing the caller to fall back to the browser flow.\n\n**Step 1 — Request user code**\n\n```rust\nlet prompt = chatgpt_oauth::start_device_auth_flow().await?;\n// prompt.device_auth_id  — used for polling\n// prompt.user_code       — e.g. \"ABCD-EFGH\"\n// prompt.interval_secs   — recommended poll interval\n```\n\nInstruct the user to visit `DEVICE_AUTH_URL` (`https://auth.openai.com/codex/device`) and enter the code.\n\n**Step 2 — Poll until complete**\n\n```rust\nlet result = chatgpt_oauth::poll_device_auth_flow(&prompt).await?;\n```\n\nPolls `DEVICE_AUTH_TOKEN_URL` at the server-recommended interval. HTTP 403/404 responses are treated as \"authorization pending\" (user hasn't completed yet). On success (HTTP 200), the response contains an `authorization_code` and `code_verifier` which are exchanged for tokens via `exchange_code_for_tokens_with_redirect_uri()` using `DEVICE_AUTH_REDIRECT_URI`. Times out after `DEVICE_AUTH_TIMEOUT_SECS` (15 minutes).\n\n### Token Refresh\n\n```rust\nlet result = chatgpt_oauth::refresh_access_token(&refresh_token).await?;\n```\n\nPosts to the token endpoint with `grant_type=refresh_token`. Used by `src/drivers/chatgpt.rs` when the stored access token expires.\n\n### Model Discovery\n\n```rust\nlet model = chatgpt_oauth::fetch_best_codex_model(&access_token).await;\n```\n\nCalls `GET {CHATGPT_BASE_URL}/codex/models?client_version={VERSION}` and returns the model slug with the highest `priority` value. Falls back to `\"gpt-5.1-codex-mini\"` on any failure.\n\n### Key Types\n\n#### `ChatGptAuthResult`\n\n```rust\npub struct ChatGptAuthResult {\n    pub access_token: Zeroizing<String>,\n    pub refresh_token: Option<Zeroizing<String>>,\n    pub expires_in: Option<u64>,\n}\n```\n\nAll credential fields use `Zeroizing<String>` from the `zeroize` crate to ensure memory is overwritten when dropped.\n\n#### `DeviceAuthPrompt`\n\n```rust\npub struct DeviceAuthPrompt {\n    pub device_auth_id: String,\n    pub user_code: String,\n    pub interval_secs: u64,\n}\n```\n\n#### `DeviceAuthFlowError`\n\n```rust\npub enum DeviceAuthFlowError {\n    BrowserFallback { message: String },  // Caller should try browser flow\n    Fatal(String),                         // Do not silently fall back\n}\n```\n\n#### `PkceChallenge`\n\n```rust\npub struct PkceChallenge {\n    pub verifier: String,    // 64 random bytes, base64url-encoded (86 chars)\n    pub challenge: String,   // SHA-256 of verifier, base64url-encoded\n}\n```\n\n### PKCE Details\n\n`generate_pkce()` produces a 64-byte random verifier base64url-encoded to 86 characters. The challenge is the SHA-256 hash of the verifier, also base64url-encoded. The `S256` method is used per RFC 7636.\n\n### Callback Server Internals\n\n`run_oauth_callback_server` spawns a tokio TCP listener that:\n1. Reads raw HTTP requests (up to 8192 bytes).\n2. Parses the request path for `GET /auth/callback`.\n3. Extracts query parameters via `parse_query_params()` (handles `%XX` and `+` encoding).\n4. Validates state, checks for OAuth error parameters, extracts the code.\n5. Sends the code through a `oneshot::Sender` protected by an `Arc<Mutex<Option<Sender>>>`.\n6. Serves an HTML success or error page back to the browser.\n7. Non-`/auth/callback` paths receive a 404.\n\n### Session Token Detection\n\n`chatgpt_session_available()` checks whether the `CHATGPT_SESSION_TOKEN` environment variable is set and non-empty, allowing callers to skip OAuth entirely if a direct session token is available.\n\n---\n\n## Copilot Authentication\n\nThe `copilot_oauth` module implements the GitHub OAuth 2.0 Device Authorization Grant (RFC 8628) using the public Copilot client ID (`Iv1.b507a08c87ecfe98` — same as the VS Code Copilot extension).\n\n### Device Flow\n\n```mermaid\nsequenceDiagram\n    participant App\n    participant GitHub\n    participant Browser\n\n    App->>GitHub: POST /login/device/code\n    GitHub-->>App: device_code + user_code + verification_uri\n    App->>Browser: Show user_code and verification_uri\n    Browser->>GitHub: User enters code and authorizes\n    loop Poll every interval seconds\n        App->>GitHub: POST /login/oauth/access_token\n        GitHub-->>App: authorization_pending\n    end\n    App->>GitHub: POST /login/oauth/access_token\n    GitHub-->>App: access_token\n```\n\n**Step 1 — Request device code**\n\n```rust\nlet response = copilot_oauth::start_device_flow().await?;\n// response.device_code       — internal code for polling\n// response.user_code         — e.g. \"A1B2-C3D4\"\n// response.verification_uri  — \"https://github.com/login/device\"\n// response.interval          — poll interval in seconds\n```\n\n**Step 2 — Poll for completion**\n\n```rust\nlet status = copilot_oauth::poll_device_flow(&response.device_code).await;\nmatch status {\n    DeviceFlowStatus::Pending => { /* keep polling */ }\n    DeviceFlowStatus::Complete { access_token } => { /* done */ }\n    DeviceFlowStatus::SlowDown { new_interval } => { /* increase interval */ }\n    DeviceFlowStatus::Expired => { /* restart flow */ }\n    DeviceFlowStatus::AccessDenied => { /* user denied */ }\n    DeviceFlowStatus::Error(msg) => { /* handle error */ }\n}\n```\n\n### Key Types\n\n#### `DeviceCodeResponse`\n\n```rust\npub struct DeviceCodeResponse {\n    pub device_code: String,\n    pub user_code: String,\n    pub verification_uri: String,\n    pub expires_in: u64,\n    pub interval: u64,\n}\n```\n\n#### `DeviceFlowStatus`\n\n```rust\npub enum DeviceFlowStatus {\n    Pending,\n    Complete { access_token: Zeroizing<String> },\n    SlowDown { new_interval: u64 },\n    Expired,\n    AccessDenied,\n    Error(String),\n}\n```\n\nNote: GitHub returns HTTP 200 with an `error` field during polling (not HTTP error codes). `poll_device_flow` handles all standard RFC 8628 error codes: `authorization_pending`, `slow_down`, `expired_token`, and `access_denied`.\n\n---\n\n## Constants and Configuration\n\n### ChatGPT Endpoints\n\n| Constant | Value |\n|---|---|\n| `CHATGPT_BASE_URL` | `https://chatgpt.com/backend-api` |\n| `CLIENT_ID` | `app_EMoamEEZ73f0CkXaXp7hrann` |\n| `AUTHORIZE_URL` | `https://auth.openai.com/oauth/authorize` |\n| `TOKEN_URL` | `https://auth.openai.com/oauth/token` |\n| `DEVICE_AUTH_USERCODE_URL` | `https://auth.openai.com/api/accounts/deviceauth/usercode` |\n| `DEVICE_AUTH_TOKEN_URL` | `https://auth.openai.com/api/accounts/deviceauth/token` |\n| `DEVICE_AUTH_URL` | `https://auth.openai.com/codex/device` |\n| `DEVICE_AUTH_REDIRECT_URI` | `https://auth.openai.com/deviceauth/callback` |\n\n### Timeout Defaults\n\n| Constant | Value |\n|---|---|\n| `CALLBACK_BIND` | `127.0.0.1:1455` |\n| `AUTH_TIMEOUT_SECS` | 300 (5 minutes) |\n| `DEVICE_AUTH_TIMEOUT_SECS` | 900 (15 minutes) |\n| `DEFAULT_DEVICE_AUTH_POLL_INTERVAL_SECS` | 5 |\n\n### Scopes\n\n`SCOPE`: `openid profile email offline_access api.connectors.read api.connectors.invoke`\n\nThese scopes grant access to the ChatGPT Responses API at `CHATGPT_BASE_URL`, not the standard `/v1/chat/completions` endpoint.\n\n---\n\n## Dependency Map\n\nThe module depends on:\n\n- **`librefang-http`** — `proxied_client()` and `proxied_client_builder()` for HTTP requests (respects system proxy settings)\n- **`librefang-types`** — `VERSION` constant for model discovery API calls\n- **`zeroize`** — `Zeroizing<String>` for credential memory safety\n- **`sha2`** + **`base64`** — PKCE challenge generation\n- **`tokio`** — async runtime, TCP listener, oneshot channels, timeouts\n\nThe module is consumed by:\n\n- **`librefang-cli`** (`authenticate_chatgpt`, `persist_chatgpt_auth`) — primary caller of the full ChatGPT auth lifecycle\n- **`src/routes/providers.rs`** (`copilot_oauth_start`, `copilot_oauth_poll`) — web API endpoints for Copilot auth\n- **`src/drivers/chatgpt.rs`** (`refresh_token`) — runtime token refresh for the ChatGPT driver","authentication-security-librefang-runtime-src":"# Authentication & Security — librefang-runtime-src\n\n# Authentication & Security — `librefang-runtime`\n\nThis module provides three security primitives used throughout the agent runtime: a tamper-evident audit trail, a PII filter for LLM-bound messages, and a provider circuit breaker with auth profile rotation.\n\n---\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    AL[Agent Loop] -->|filter_message| PII[PiiFilter]\n    AL -->|check / record_failure| CB[ProviderCooldown]\n    AL -->|record| AUD[AuditLog]\n\n    Routes[HTTP Routes] -->|record| AUD\n    Routes -->|recent / verify_integrity| AUD\n    Dream[Auto-Dream] -->|record| AUD\n\n    PII -->|Redact or Pseudonymize| LLM[LLM Provider]\n    CB -->|Allow / Reject| LLM\n    AUD -->|persist| SQLite[(audit_entries)]\n    AUD -->|tip anchor| Anchor[(anchor file)]\n```\n\n---\n\n## 1. Audit Trail (`audit.rs`)\n\n### Purpose\n\nEvery security-sensitive action in the runtime — tool invocations, shell execution, agent lifecycle events, config changes, memory access — is appended to an append-only log. Each entry's SHA-256 hash chains back to the previous entry, making any tampering detectable.\n\n### Data Model\n\n**`AuditAction`** — categorises the event:\n\n| Variant | Typical use |\n|---|---|\n| `ToolInvoke` | Agent calls a tool |\n| `ShellExec` | Shell command execution |\n| `AgentSpawn` / `AgentKill` | Agent lifecycle |\n| `MemoryAccess` | Reading/writing agent memory |\n| `FileAccess` / `NetworkAccess` | Sandbox boundary events |\n| `AuthAttempt` | Authentication successes/failures |\n| `WireConnect` | Wire protocol connections |\n| `ConfigChange` | Runtime config modifications |\n| `DreamConsolidation` | Auto-dream lifecycle phases |\n| `CapabilityCheck` | Permission checks |\n\n**`AuditEntry`** — a single linked-list node:\n\n```\nseq  timestamp  agent_id  action  detail  outcome  prev_hash  hash\n```\n\n- `seq` — monotonically increasing, 0-indexed.\n- `prev_hash` — SHA-256 of the previous entry (64 zero-characters for genesis).\n- `hash` — SHA-256 of this entry's fields concatenated with `prev_hash`.\n\n### `AuditLog` Construction\n\n| Constructor | Persistence | Anchor | Use case |\n|---|---|---|---|\n| `new()` | In-memory only | No | Tests, ephemeral runs |\n| `with_db(conn)` | SQLite `audit_entries` table (schema V8) | No | Standard deployment |\n| `with_db_anchored(conn, path)` | SQLite + external tip file | Yes | Hardened deployment |\n\nOn construction, `with_db` and `with_db_anchored` load all existing rows, rebuild the chain in memory, and run `verify_integrity()`. A boot-time failure is logged loudly but does **not** prevent startup — the failure surfaces via the `/api/audit/verify` endpoint instead.\n\n### Recording Events\n\n```rust\naudit_log.record(\n    \"agent-1\",                       // agent_id\n    AuditAction::ShellExec,          // action\n    \"rm -rf /\",                      // detail\n    \"denied\",                        // outcome\n);\n```\n\n`record()` appends the entry to both the in-memory chain and SQLite (if configured), then atomically updates the anchor file. The function returns the new entry's hash.\n\n### Integrity Verification\n\n`verify_integrity()` walks the entire chain and recomputes every hash. It checks:\n\n1. **Link consistency** — each entry's `prev_hash` equals the previous entry's `hash`.\n2. **Content integrity** — recomputing `compute_entry_hash` for every entry matches the stored `hash`.\n3. **Anchor agreement** (if configured) — the anchor file's `seq:hash` pair matches the in-DB tip.\n\n### Threat Model — The Anchor File\n\nThe Merkle chain alone is self-consistent: an attacker with write access to `audit_entries` can delete all rows, fabricate a new history, and recompute every hash from genesis. `verify_integrity()` would return `Ok` because there is nothing to compare the tip against.\n\nThe anchor file closes this gap by storing the latest `<seq> <hex-hash>\\n` outside SQLite, written atomically via `write_anchor` (temp file + rename). On boot, `with_db_anchored` compares the anchor against the DB tip and logs a loud `MISMATCH` if they diverge. Subsequent `verify_integrity()` calls return `Err` until the two agree.\n\nFor stronger guarantees, place the anchor on a path the daemon can write to but unprivileged code cannot (e.g., a chmod-0400 file, a read-only mount, or piped to `logger`).\n\n### Retention\n\n`prune(retention_days)` removes entries older than the given threshold from both SQLite and the in-memory list. Pass `0` for unlimited retention (no-op).\n\n### Callers\n\nThe audit log is wired into routes and subsystems across the codebase:\n\n- **Config routes** — `config_set`, `config_reload`, `shutdown`\n- **System routes** — `create_backup`, `restore_backup`\n- **Skills routes** — `add_mcp_server`, `update_mcp_server`, `delete_mcp_server`\n- **Auto-dream** — `run_dream`, `finalize_failure`, `finalize_abort`, `set_agent_enabled`\n- **Agent routes** — `agent_metrics`, `agent_logs`\n- **API surface** — `audit_recent` returns `recent(n)` entries; `audit_verify` calls `verify_integrity()`.\n\n---\n\n## 2. PII Filter (`pii_filter.rs`)\n\n### Purpose\n\nBefore user messages and sender context reach an LLM provider, the PII filter strips or replaces personally identifiable information according to the configured `PrivacyMode`.\n\n### Built-in Detection Patterns\n\n| Label | Detects |\n|---|---|\n| `email` | Standard email addresses |\n| `phone` | E.164, US formatted, international with spaces/dashes |\n| `credit_card` | Visa (4), Mastercard (51–55), Amex (34/37), Discover (6011/65) |\n| `ssn` | US Social Security Numbers (with or without dashes) |\n\nCustom patterns are passed to `PiiFilter::new(custom_patterns)` and compiled at construction time. Invalid regex patterns are logged and skipped.\n\n### Privacy Modes\n\n| Mode | Behaviour |\n|---|---|\n| `Off` | No filtering — text passes through unchanged |\n| `Redact` | Every match is replaced with `[REDACTED]` |\n| `Pseudonymize` | Every unique match gets a stable label like `[Email-A]`, `[Phone-B]` |\n\n### Pseudonym Stability\n\nThe pseudonym map (`HashMap<String, String>`) ensures the same PII value always maps to the same label within a session. Counters increment per category: the first email becomes `[Email-A]`, the second `[Email-B]`, and so on through `[Email-Z]`, `[Email-AA]`, etc.\n\n### Filtering Sender Context\n\n`filter_sender_context` applies the same mode to `SenderContext` fields:\n\n| Field | `Redact` | `Pseudonymize` |\n|---|---|---|\n| `user_id` | `[REDACTED]` | `[User_id-A]` |\n| `display_name` | `[REDACTED]` | `[User-A]` |\n| `account_id` | `[REDACTED]` | `[Account-A]` |\n| `channel` | preserved | preserved |\n| `is_group`, `was_mentioned`, `thread_id` | preserved | preserved |\n\n### Integration Point\n\nThe agent loop calls `filter_message` via `push_filtered_user_message` before dispatching to the LLM, ensuring no raw PII leaves the runtime.\n\n---\n\n## 3. Provider Circuit Breaker (`auth_cooldown.rs`)\n\n### Purpose\n\nWhen an LLM provider starts failing, the circuit breaker prevents request storms by applying exponential backoff per provider. Billing errors (HTTP 402) receive significantly longer cooldowns. A half-open probing mechanism allows automatic recovery detection.\n\n### Circuit States\n\n```mermaid\nstateDiagram-v2\n    [*] --> Closed\n    Closed --> Open : record_failure\n    Open --> HalfOpen : cooldown expires\n    HalfOpen --> Closed : probe succeeds\n    HalfOpen --> Open : probe fails\n    Open --> Closed : record_success / force_reset\n```\n\n- **Closed** — healthy; all requests flow.\n- **Open** — failing; requests are rejected with a `retry_after_secs` hint.\n- **HalfOpen** — cooldown expired; a single probe request is allowed through to test recovery.\n\n### Cooldown Calculation\n\nGeneral errors use `base_cooldown_secs × backoff_multiplier^exponent`, where `exponent = min(error_count - 1, max_exponent)`. The result is capped at `max_cooldown_secs`.\n\nBilling errors use the same formula with separate parameters (`billing_base_cooldown_secs`, `billing_multiplier`, `billing_max_cooldown_secs`) that default to much higher values (5 hours base, 24 hours max).\n\n### Default Configuration\n\n| Parameter | General | Billing |\n|---|---|---|\n| Base cooldown | 60s | 18 000s (5h) |\n| Max cooldown | 3 600s (1h) | 86 400s (24h) |\n| Multiplier | 5.0× | 2.0× |\n| Max exponent | 3 | 10 |\n\n### API\n\n| Method | Description |\n|---|---|\n| `check(provider)` | Returns `Allow`, `AllowProbe`, or `Reject { reason, retry_after_secs }` |\n| `record_success(provider)` | Resets error count, closes the circuit |\n| `record_failure(provider, is_billing)` | Increments error count, opens the circuit |\n| `record_probe_result(provider, success)` | Closes circuit on success; extends cooldown on failure |\n| `get_state(provider)` | Returns `Closed`, `Open`, or `HalfOpen` |\n| `snapshot()` | Returns all provider states for API/dashboard |\n| `force_reset(provider)` | Admin action — removes all state for a provider |\n| `clear_expired()` | Removes entries with expired cooldowns and zero errors |\n\n### Probing\n\nWhen `probe_enabled` is true (default), `check()` may return `AllowProbe` instead of `Reject` if the `probe_interval_secs` has elapsed since the last probe. This sends one request through to test whether the provider has recovered, without unblocking all traffic.\n\n### Auth Profile Rotation\n\nProviders can be configured with multiple `AuthProfile` entries, each with a `priority` and `api_key_env`:\n\n| Method | Description |\n|---|---|\n| `select_profile(provider, profiles)` | Returns the highest-priority profile not currently in cooldown |\n| `advance_profile(provider, failed_profile, is_billing)` | Marks a specific profile as failed, triggering its own cooldown |\n\nProfile state is tracked under composite keys (`{provider}::{profile_name}`), so failing one API key automatically falls back to the next priority.\n\n### Integration Points\n\nThe agent loop calls:\n- `check_retry_cooldown` → `check()` to decide whether to attempt a request.\n- `record_retry_failure` → `record_failure()` when a provider returns an error.\n- `record_retry_success` → `record_success()` when a provider responds normally.\n\n### Failure Window\n\nErrors older than `failure_window_secs` (default 24 hours) are forgotten — the `total_errors_in_window` counter resets. This prevents a provider from being permanently penalised for transient issues.\n\n---\n\n## Thread Safety\n\nAll three components are designed for concurrent use:\n\n| Component | Mechanism |\n|---|---|\n| `AuditLog` | `Mutex<Vec<AuditEntry>>`, `Mutex<String>` for tip, `Arc<Mutex<Connection>>` for DB |\n| `PiiFilter` | `Mutex<HashMap>` for pseudonym map and counters (interior mutability) |\n| `ProviderCooldown` | `DashMap<String, ProviderState>` for lock-free concurrent access |\n\nPoisoned mutexes are recovered with `unwrap_or_else(|e| e.into_inner())` — the runtime favours availability over halting on a panicked thread.","authentication-security-librefang-types-src":"# Authentication & Security — librefang-types-src\n\n# Authentication & Security — `librefang-types`\n\nThis crate defines the shared type layer for LibreFang's multi-layered security model. It ships no runtime logic — only data structures, validation rules, and pattern-matching helpers that the kernel, runtime, and external consumers rely on for consistent enforcement.\n\nThe security model is built on three independent pillars:\n\n1. **Capability-based access control** — immutable grants assigned at agent creation\n2. **Human-in-the-loop approval gates** — interactive confirmation for dangerous tools\n3. **Information-flow taint tracking** — runtime data provenance to prevent injection and exfiltration\n\nA fourth subsystem — **tool policy** — provides deny-wins glob-pattern filtering layered on top of capabilities.\n\n```mermaid\ngraph TD\n    A[Agent Action] --> B{Capability Check}\n    B -->|Denied| X[CapabilityDenied error]\n    B -->|Granted| C{Tool Policy}\n    C -->|Denied| X2[Policy Denied]\n    C -->|Allowed| D{Requires Approval?}\n    D -->|Yes| E[ApprovalRequest sent to operator]\n    E --> F{ApprovalDecision}\n    F -->|Approved + TOTP| G{Tool Execution}\n    F -->|Denied/Skipped| X3[Tool Not Run]\n    D -->|No| H{Taint Check}\n    G --> H\n    H -->|Clean| I[Execute]\n    H -->|Violation| X4[TaintViolation error]\n```\n\n---\n\n## Capability System — `capability.rs`\n\nAgents operate under a whitelist of explicit permissions. No action is permitted unless a matching capability has been granted. Capabilities are immutable after agent creation and enforced at the kernel and WASM host-function level.\n\n### `Capability` enum\n\nTagged-serde enum (`#[serde(tag = \"type\", content = \"value\")]`) covering all permissionable domains:\n\n| Variant | Domain | Content |\n|---|---|---|\n| `FileRead` / `FileWrite` | Filesystem | Glob pattern for paths |\n| `NetConnect` | Outbound network | Host pattern (`\"api.openai.com:443\"`) |\n| `NetListen` | Inbound network | Port number |\n| `ToolInvoke` / `ToolAll` | Tool execution | Tool ID glob, or wildcard |\n| `LlmQuery` / `LlmMaxTokens` | LLM access | Model pattern, or token budget |\n| `AgentSpawn` / `AgentMessage` / `AgentKill` | Inter-agent | Agent name pattern |\n| `MemoryRead` / `MemoryWrite` | Memory scopes | Scope pattern |\n| `ShellExec` | Shell commands | Command pattern |\n| `EnvRead` | Environment | Variable name pattern |\n| `OfpDiscover` / `OfpConnect` / `OfpAdvertise` | Wire protocol (OFP) | Peer pattern or boolean |\n| `EconSpend` / `EconEarn` / `EconTransfer` | Economic | USD amount or agent pattern |\n\n### Pattern matching: `glob_matches`\n\nShared glob engine used across the crate (approval tool names, channel rules, TOTP tool lists):\n\n- `\"*\"` — matches everything\n- `\"prefix*\"` — prefix match\n- `\"*suffix\"` — suffix match\n- `\"prefix*suffix\"` — both ends must match, value must be at least `prefix.len() + suffix.len()`\n- Exact string — literal match\n\nOnly a single `*` wildcard is supported per pattern.\n\n### `capability_matches`\n\nDetermines whether a granted capability satisfies a required one:\n\n- Different variants never match (e.g., `FileRead` cannot satisfy `FileWrite`)\n- `ToolAll` satisfies any `ToolInvoke`\n- Pattern-bearing variants use `glob_matches` on their content\n- Numeric variants use comparison: `LlmMaxTokens(granted) >= required`, `EconSpend(granted) >= required`, `NetListen` requires exact port equality\n\n### `validate_capability_inheritance`\n\nPrevents privilege escalation during sub-agent spawning. Called from `librefang-runtime::tool_runner::spawn_agent_checked`. Every capability requested by the child must be covered by at least one parent capability. If any child capability lacks a matching parent grant, the function returns an error and the spawn is denied.\n\n### `CapabilityCheck` and error propagation\n\n`CapabilityCheck::require()` converts a denied check into `LibreFangError::CapabilityDenied(reason)`, used by the WASM host in `librefang-runtime-wasm::host_functions::check_capability`.\n\n---\n\n## Approval Gate — `approval.rs`\n\nWhen an agent attempts a tool listed in the approval policy, the kernel creates an `ApprovalRequest`, pauses the agent, and notifies a human operator. The operator responds with an `ApprovalResponse` carrying an `ApprovalDecision`.\n\n### Core types\n\n**`ApprovalRequest`** — created by the kernel, sent to operators:\n- `id` (`Uuid`) — unique request identifier\n- `agent_id`, `tool_name`, `description`, `action_summary` — context for the operator\n- `risk_level` (`RiskLevel`) — `Low` / `Medium` / `High` / `Critical`, with `emoji()` for dashboard display\n- `timeout_secs` — auto-deny deadline (clamped to 10–300 seconds)\n- `sender_id`, `channel` — provenance of the triggering request\n- `route_to` — per-request notification override\n- `escalation_count` — tracks re-notification cycles (max 3)\n\n**`ApprovalResponse`** — operator's decision:\n- `request_id`, `decision`, `decided_at`, `decided_by`\n\n**`ApprovalDecision`** — the actual verdict:\n- `Approved`, `Denied`, `TimedOut`, `Skipped` — serialize as plain strings for backward compatibility\n- `ModifyAndRetry { feedback }` — serializes as `{\"type\": \"modify_and_retry\", \"feedback\": \"...\"}`, allowing the operator to request modification with guidance\n\nHelper methods: `is_approved()`, `is_terminal()` (returns `false` for `ModifyAndRetry`), `as_str()`.\n\n### `ApprovalPolicy`\n\nCentral configuration for the approval subsystem. Deserializes with `#[serde(default)]` so empty JSON objects produce safe defaults.\n\nKey fields:\n\n| Field | Default | Purpose |\n|---|---|---|\n| `require_approval` | `[\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\", \"skill_evolve_*\"]` | Tools that require human approval |\n| `timeout_secs` | `60` | Seconds before auto-deny (10–300) |\n| `auto_approve` | `false` | Shorthand: if `true`, `apply_shorthands()` clears the require list |\n| `auto_approve_autonomous` | `false` | Auto-approve in autonomous mode |\n| `trusted_senders` | `[]` | User IDs that bypass approval (max 100) |\n| `channel_rules` | `[]` | Per-channel tool allow/deny lists |\n| `timeout_fallback` | `Deny` | Behavior on timeout: `Deny`, `Skip`, or `Escalate { extra_timeout_secs }` |\n| `routing` | `[]` | Route specific tool patterns to notification targets |\n| `second_factor` | `None` | TOTP enforcement scope |\n| `totp_issuer` | `\"LibreFang\"` | Authenticator app label |\n| `totp_grace_period_secs` | `300` | Skip re-verification within this window |\n| `totp_tools` | `[]` | Glob patterns for tools requiring TOTP (empty = all approved tools) |\n\nThe `require_approval` field accepts either a string list or a boolean shorthand via `deserialize_require_approval`:\n- `true` → expands to the default mutation set\n- `false` → empty list (no approval required)\n\n### `SecondFactor` enum\n\nControls where TOTP verification is enforced:\n\n- `None` — no second factor (default)\n- `Totp` — approvals only\n- `Login` — dashboard login only\n- `Both` — approvals + login\n\nQuery methods: `requires_login_totp()`, `requires_approval_totp()`. The policy method `tool_requires_totp(tool_name)` checks whether a specific tool triggers TOTP based on `second_factor` and the `totp_tools` glob list.\n\n### `ChannelToolRule`\n\nPer-channel tool authorization with deny-wins semantics:\n\n```\nChannelToolRule {\n    channel: \"telegram\",\n    allowed_tools: [\"file_read\", \"file_*\"],\n    denied_tools: [\"shell_exec\"],\n}\n```\n\n`check_tool(tool_name)` returns `Some(true)` (allowed), `Some(false)` (denied), or `None` (no opinion). Deny always wins over allow. Patterns support wildcards via `glob_matches`.\n\nThe policy method `check_channel_tool(channel, tool_name)` finds the first matching rule and delegates to `check_tool`.\n\n### `TimeoutFallback`\n\n- `Deny` — reject the request (default)\n- `Skip` — skip the tool, agent continues\n- `Escalate { extra_timeout_secs }` — extend timeout and re-notify (default escalation: 120 seconds)\n\n### Notification and audit types\n\n- `NotificationTarget` — channel type + recipient + optional thread ID\n- `AgentNotificationRule` — per-agent glob pattern for notification routing\n- `NotificationConfig` — approval channels, alert channels, agent rules\n- `ApprovalRoutingRule` — tool pattern → notification targets\n- `ApprovalAuditEntry` — persistent audit log for every decision, including `second_factor_used`\n\n### Validation\n\nBoth `ApprovalRequest::validate()` and `ApprovalPolicy::validate()` check field lengths, character constraints, timeout bounds, and tool name patterns. All tool name validation uses the internal `validate_tool_name` helper which allows alphanumeric characters, underscores, and at most one `*` wildcard.\n\n---\n\n## Taint Tracking — `taint.rs`\n\nA lattice-based information-flow control system that prevents tainted data from reaching sensitive sinks without explicit declassification. Guards against prompt injection, data exfiltration, and confused-deputy attacks.\n\n### `TaintLabel` — provenance tags\n\n| Label | Meaning |\n|---|---|\n| `ExternalNetwork` | Data from an outbound HTTP/response |\n| `UserInput` | Direct user-supplied input |\n| `Pii` | Personally identifiable information |\n| `Secret` | API keys, tokens, passwords |\n| `UntrustedAgent` | Output from a sandboxed/untrusted agent |\n\n### `TaintedValue`\n\nA string annotated with a `HashSet<TaintLabel>` and a human-readable `source` description.\n\nKey operations:\n- `clean(value, source)` — creates an untainted value\n- `merge_taint(other)` — unions labels from another value (used during concatenation)\n- `check_sink(sink)` — returns `Err(TaintViolation)` if any label is blocked\n- `declassify(label)` — explicitly removes a label (security decision by the caller)\n- `is_tainted()` — whether any labels remain\n\n### `TaintSink` — blocked label sets\n\nPredefined sinks matching the kernel's enforcement points:\n\n| Sink | Blocked labels | Threat mitigated |\n|---|---|---|\n| `shell_exec()` | `ExternalNetwork`, `UntrustedAgent`, `UserInput` | Shell injection |\n| `net_fetch()` | `Secret`, `Pii` | Data exfiltration |\n| `agent_message()` | `Secret` | Credential leakage between agents |\n| `mcp_tool_call()` | `Secret`, `Pii` | Credential/PII leakage to external MCP servers |\n\n### `check_outbound_text_violation` — heuristic secret/PII scanner\n\nA best-effort pattern detector invoked by the runtime before sending tool arguments to external sinks (MCP calls, channel sends, network fetches). This is not a full information-flow tracker — it catches the common \"LLM stuffs an API key into a tool call\" pattern.\n\n**Secret detection** — three independent checks, any one triggers:\n\n1. **`Authorization:` header literal** — unambiguous\n2. **Key-value shapes** — matches `key=value`, `key:value`, `\"key\":`, `'key':` after whitespace normalization. Checked against a denylist of secret key names (`api_key`, `token`, `password`, `authorization`, etc.)\n3. **Opaque token heuristic** — long (≥32 chars) alphanumeric strings that mix letters and digits but are not pure hex (to exclude git SHAs, SHA-256 digests, UUIDs). Also flags well-known credential prefixes: `sk-`, `ghp_`, `github_pat_`, `xoxp-`, `xoxb-`, `AKIA`, `AIza`. Excludes strings containing date components (`YYYY-MM-DD`) and file paths.\n\n**PII detection** — regex-based checks for email addresses, phone numbers, credit card numbers (Visa/MC/Amex/Discover test BINs), and SSNs. Skipped for \"tokenish mixed\" strings (long alphanumerics without `@` or whitespace) and Unix/Slack-style numeric timestamps (`1747123456.789000`).\n\nOn detection, the payload is wrapped in a `TaintedValue` and run through `check_sink` to produce a consistent `TaintViolation` error message.\n\n**Known limitations** (documented in code and SECURITY.md): copy-pasted obfuscation (base64, homoglyphs, zero-width character splits) bypasses this filter. It is a safety net, not a guarantee.\n\n### Integration with runtime\n\nThe call graph shows where these types are consumed:\n\n- `librefang-runtime::tool_runner::check_taint_shell_exec` → `TaintSink::shell_exec()` + `check_sink()`\n- `librefang-runtime::tool_runner::check_taint_net_fetch` → `TaintSink::net_fetch()` + `check_sink()`\n- `librefang-runtime::tool_runner::tool_agent_send` / `tool_channel_send` → `TaintSink::agent_message()`\n- `librefang-runtime-mcp::scan_mcp_arguments_for_taint` → `TaintSink::mcp_tool_call()` + `check_outbound_text_violation()`\n\n---\n\n## Tool Policy — `tool_policy.rs`\n\nProvides the data types for deny-wins, glob-pattern tool access control. The actual resolution logic lives in `librefang-runtime::tool_policy` to avoid circular dependencies.\n\n### Types\n\n**`PolicyEffect`** — `Allow` or `Deny` (serializes as lowercase strings).\n\n**`ToolPolicyRule`** — a pattern + effect pair:\n```rust\nToolPolicyRule {\n    pattern: \"shell_*\",\n    effect: PolicyEffect::Deny,\n}\n```\n\n**`ToolGroup`** — named collection of patterns for reusable rule authoring:\n```rust\nToolGroup {\n    name: \"web_tools\",\n    tools: vec![\"web_fetch\", \"web_search\", \"http_*\"],\n}\n```\n\n**`ToolPolicy`** — complete configuration:\n- `agent_rules` — highest priority, checked first\n- `global_rules` — checked after agent rules\n- `groups` — named tool pattern collections\n- `subagent_max_depth` — maximum nesting depth (default: 10)\n- `subagent_max_concurrent` — maximum concurrent sub-agents (default: 5)\n\nResolution order: agent rules → global rules. In each layer, the first matching rule wins. If no rule matches, the default is allow. Deny wins over allow when both match at the same priority level.","authentication-security":"# Authentication & Security\n\n# Authentication & Security\n\nLibreFang implements a **layered, defense-in-depth security model** spanning five crates — from shared type definitions through API gateway enforcement to runtime data protection.\n\n## Sub-module Map\n\n| Sub-module | Layer | Role |\n|---|---|---|\n| [librefang-types](librefang-types-src.md) | **Shared vocabulary** | Data structures and validation rules for capabilities, approval gates, taint tracking, and tool policies |\n| [librefang-api](librefang-api-src.md) | **API gateway** | GCRA rate limiting, OAuth2/OIDC federation, Argon2id dashboard password hashing |\n| [librefang-kernel](librefang-kernel-src.md) | **Core authorization** | RBAC identity, per-agent capability grants, human-in-the-loop approval for dangerous tools |\n| [librefang-runtime](librefang-runtime-src.md) | **Runtime protection** | Tamper-evident audit logging, PII redaction/pseudonymisation, provider circuit breaker with auth-profile rotation |\n| [librefang-runtime-oauth](librefang-runtime-oauth-src.md) | **Provider OAuth** | ChatGPT (browser + device flow) and GitHub Copilot device-flow authentication |\n\n## How the Layers Fit Together\n\n```\nRequest ──► Rate Limiter (api)\n               │\n               ▼\n          API Key / OIDC Auth (api)\n               │\n               ▼\n          RBAC + Capability Check (kernel ← types)\n               │\n               ▼\n          Approval Gate? (kernel ← types)\n               │\n               ▼\n          PII Filter on outbound (runtime ← types taint)\n               │\n               ▼\n          Audit Record (runtime)\n               │\n               ▼\n          Provider Call (runtime → runtime-oauth for token refresh)\n```\n\n**Types are the contract.** `librefang-types` defines capability sets, approval request/response shapes, taint markers, and tool-policy glob rules with built-in validation. Every other crate consumes these types so enforcement is consistent across the API boundary, kernel, and runtime.\n\n**The API is the gatekeeper.** Every inbound request passes through the GCRA rate limiter, then API-key or OIDC middleware (`oauth.rs`), and finally Argon2id-based dashboard session derivation (`password_hash.rs`) before reaching kernel authorization.\n\n**The kernel is the policy engine.** `AuthManager` performs RBAC lookups, `CapabilitySet` checks grant or deny specific agent actions, and the approval subsystem gates dangerous tool executions behind human confirmation — all using type definitions from `librefang-types`.\n\n**The runtime is the safety net.** Before any message reaches an LLM provider, `PiiFilter` redacts or pseudonymises sensitive data. `ProviderCooldown` implements a circuit breaker that tracks auth failures per provider and rotates auth profiles when needed. `AuditLog` records every security-relevant event with a tamper-evident hash chain anchored to SQLite.\n\n**Runtime-oauth bridges external providers.** When the circuit breaker triggers a profile rotation, or when a user first connects a provider, `librefang-runtime-oauth` handles the ChatGPT or Copilot OAuth exchange and returns fresh tokens.\n\n## Key Cross-module Workflows\n\n**Dashboard login → terminal action.** A dashboard password is verified with Argon2id (`api/password_hash.rs`), producing a session token. Subsequent terminal operations (rename, delete window) pass through `valid_api_tokens` → `dashboard_session_token` → `authorize_terminal_request` in the kernel, then are audit-logged by the runtime.\n\n**Dangerous tool execution.** The kernel's approval subsystem (defined in `types/approval.rs`, enforced in `kernel/approval.rs`) pauses execution and surfaces a confirmation request. Approval policies use glob-pattern tool rules with deny-wins semantics. Only after human response does execution resume — and the decision is recorded in the audit log.\n\n**Outbound data protection.** Taint tracking types (`types/taint.rs`) classify data provenance. The runtime's `PiiFilter` applies these rules before LLM calls, blocking shell injection patterns, credit card numbers, phone numbers, and authorization-shaped JSON in outbound payloads. Simultaneously, `check_outbound_text_violation` prevents MCP tool calls from leaking sensitive context.\n\n**Provider auth resilience.** The runtime's circuit breaker (`auth_cooldown.rs`) independently tracks each provider. On repeated auth failures, it opens the circuit; a probe interval allows periodic retry. Successful probes close the circuit. Profile rotation triggers a fresh OAuth flow via `librefang-runtime-oauth`, which handles the token exchange and redirect handling for both ChatGPT and Copilot.\n\n---\n\nConsult each sub-module's page for implementation details, configuration options, and internal architecture diagrams.","channel-integrations":"# Channel Integrations\n\n# Channel Integrations\n\nThe `librefang-channels` crate is the messaging bridge layer for LibreFang Agent OS. It translates messages from 40+ external platforms into a unified `ChannelMessage` format and dispatches them to agents via the kernel, then delivers agent responses back through the originating channel.\n\n## Architecture Overview\n\n```mermaid\ngraph LR\n    subgraph Platforms\n        TG[Telegram]\n        DC[Discord]\n        SL[Slack]\n        WA[WhatsApp]\n        O[40+ more...]\n    end\n\n    subgraph librefang-channels\n        CA[ChannelAdapter trait] --> BM[BridgeManager]\n        BM --> SJ[Sanitizer]\n        BM --> RL[Rate Limiter]\n        BM --> AR[AgentRouter]\n        BM --> FM[Formatter]\n        BM --> JN[Message Journal]\n    end\n\n    BM -->|ChannelBridgeHandle| K[Kernel]\n    K -->|agent response| BM\n    BM --> CA\n    CA --> Platforms\n```\n\nThe crate has a hard dependency boundary: it **cannot** depend on `librefang-kernel` or `librefang-api` directly (to avoid circular dependencies). Instead, the kernel implements the `ChannelBridgeHandle` trait defined here, and passes it into `BridgeManager` at startup.\n\n## Feature Flags\n\nChannel adapters are individually gated behind Cargo feature flags prefixed with `channel-`:\n\n```toml\n# Cargo.toml — enable specific channels\n[dependencies]\nlibrefang-channels = { features = [\"channel-telegram\", \"channel-discord\"] }\n\n# Or enable all 40+ channels at once\nlibrefang-channels = { features = [\"all-channels\"] }\n```\n\nCore infrastructure (`bridge`, `types`, `router`, `sanitizer`, `rate_limiter`, `formatter`, `message_journal`) is always compiled regardless of feature selection.\n\n## Key Types\n\n### `ChannelMessage`\n\nThe unified inbound message envelope. Every adapter converts its platform-specific event into this structure:\n\n```rust\npub struct ChannelMessage {\n    pub channel: ChannelType,         // Telegram, Discord, Slack, etc.\n    pub sender: ChannelUser,          // Platform user identity\n    pub content: ChannelContent,      // Text, Image, Command, Voice, etc.\n    pub is_group: bool,               // Group vs DM context\n    pub thread_id: Option<String>,    // Thread/topic routing\n    pub metadata: HashMap<String, Value>,  // Platform-specific extras\n    pub platform_message_id: String,  // For lifecycle reactions\n    pub timestamp: DateTime<Utc>,\n}\n```\n\n### `ChannelContent`\n\nAn enum covering all supported inbound content types:\n\n| Variant | Description |\n|---|---|\n| `Text(String)` | Plain text message |\n| `Command { name, args }` | Parsed slash command (e.g. `/agent gpt4`) |\n| `Image { url, caption, mime_type }` | Photo with optional caption |\n| `Voice { url, duration_seconds, caption }` | Voice message |\n| `Video { url, caption, duration_seconds, mime_type }` | Video clip |\n| `Audio { url, caption, duration_seconds, mime_type }` | Audio file |\n| `File { url, filename }` | Arbitrary file attachment |\n| `FileData { filename, data, mime_type }` | In-memory file bytes |\n| `Location { lat, lon }` | Shared coordinates |\n| `Interactive { text, buttons }` | Outbound inline keyboard |\n| `ButtonCallback { action, message_text }` | User clicked a button |\n| `EditInteractive { message_id, text, buttons }` | Update an existing interactive message |\n| `DeleteMessage { message_id }` | Delete a previously sent message |\n| `Animation { url, caption, duration_seconds }` | GIF/animation |\n| `Sticker { file_id }` | Platform sticker |\n| `MediaGroup { items }` | Album of media |\n| `Poll { question, options, is_anonymous }` | Poll creation |\n| `PollAnswer { poll_id, option_ids }` | User voted on a poll |\n\n### `ChannelAdapter` trait\n\nEvery channel adapter implements this async trait:\n\n```rust\n#[async_trait]\npub trait ChannelAdapter: Send + Sync {\n    fn name(&self) -> &str;\n    fn channel_type(&self) -> ChannelType;\n\n    async fn start(&self) -> Result<Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>>;\n    async fn stop(&self) -> Result<()>;\n    async fn send(&self, user: &ChannelUser, content: ChannelContent) -> Result<()>;\n\n    // Optional methods with defaults\n    async fn send_in_thread(&self, user: &ChannelUser, content: ChannelContent, thread_id: &str) -> Result<()>;\n    async fn send_typing(&self, user: &ChannelUser) -> Result<()>;\n    async fn send_reaction(&self, user: &ChannelUser, message_id: &str, reaction: &LifecycleReaction) -> Result<()>;\n    fn supports_streaming(&self) -> bool;\n    async fn send_streaming(&self, user: &ChannelUser, rx: Receiver<String>, thread_id: Option<&str>) -> Result<()>;\n    async fn create_webhook_routes(&self) -> Option<(Router, Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>)>;\n    fn typing_events(&self) -> Option<Receiver<TypingEvent>>;\n    fn suppress_error_responses(&self) -> bool;\n}\n```\n\nAdapters that receive messages via webhook (Telegram, Slack, Discord, etc.) should implement `create_webhook_routes` to return an `axum::Router` and a message stream. This avoids each adapter spawning its own HTTP server — instead, `BridgeManager` collects all webhook routes and merges them into a single router mounted on the main API server at `/channels/{adapter_name}/webhook`.\n\n### `SenderContext`\n\nPropagated to the agent's system prompt so it knows who is messaging and from where:\n\n```rust\npub struct SenderContext {\n    pub channel: String,\n    pub user_id: String,\n    pub chat_id: Option<String>,\n    pub display_name: String,\n    pub is_group: bool,\n    pub was_mentioned: bool,\n    pub thread_id: Option<String>,\n    pub account_id: Option<String>,\n    pub auto_route: AutoRouteStrategy,\n    pub group_participants: Vec<ParticipantRef>,\n    pub use_canonical_session: bool,\n    // ... auto-routing tuning fields\n}\n```\n\n### `ChannelBridgeHandle` trait\n\nThe kernel's interface as seen by the channel layer. Defined here to break the circular dependency; implemented in `librefang-api` on the real kernel. Key methods:\n\n| Method | Purpose |\n|---|---|\n| `send_message(agent_id, message)` | Basic agent call, returns text response |\n| `send_message_with_sender(agent_id, message, sender)` | Agent call with identity context |\n| `send_message_with_blocks(agent_id, blocks)` | Multimodal (text + images) agent call |\n| `send_message_streaming_with_sender_status(...)` | Streaming with terminal status reporting |\n| `find_agent_by_name(name)` | Resolve agent by manifest name |\n| `list_agents()` | List running agents |\n| `spawn_agent_by_name(name)` | Hot-spawn an agent |\n| `reset_session(agent_id)` | Clear agent session |\n| `compact_session(agent_id)` | Trigger LLM context compaction |\n| `set_model(agent_id, model)` | Change an agent's model |\n| `channel_overrides(channel_type, account_id)` | Get per-channel config overrides |\n| `authorize_channel_user(...)` | RBAC check |\n| `classify_reply_intent(text, sender, model)` | Lightweight LLM \"should we reply?\" check |\n| `check_auto_reply(agent_id, message)` | Auto-reply evaluation |\n| `subscribe_events()` | Kernel event bus subscription |\n| `send_channel_push(channel_type, recipient, message, thread_id)` | Proactive outbound push |\n\nMost methods have sensible defaults (no-ops or stubs) so the kernel implementation only needs to override what it supports.\n\n## BridgeManager\n\n`BridgeManager` is the central orchestrator. It:\n\n1. Owns all running channel adapters\n2. Subscribes to each adapter's message stream\n3. Applies input sanitization, rate limiting, and group/DM policy checks\n4. Routes messages to the correct agent via `AgentRouter`\n5. Delivers agent responses back through the originating adapter\n6. Manages lifecycle reactions (emoji phases: ⏳ → 🤔 → ✅/❌)\n7. Optionally debounces rapid-fire messages from the same sender\n8. Records message delivery outcomes for metrics\n\n### Startup\n\n```rust\nlet mut manager = BridgeManager::new(kernel_handle, router);\n\n// Optional: enable crash-recovery journal\nlet manager = manager.with_journal(MessageJournal::new(\"journal.db\")?);\n\n// Start each configured adapter\nmanager.start_adapter(telegram_adapter).await?;\nmanager.start_adapter(discord_adapter).await?;\n\n// Collect webhook routes for the main API server\nlet webhook_router = manager.take_webhook_router();\n// Mount at /channels on your axum server\n```\n\n### Message Dispatch Pipeline\n\nEvery inbound message passes through this pipeline inside `dispatch_message`:\n\n```\nInbound ChannelMessage\n  │\n  ├─ 1. Input Sanitization\n  │     Checks for prompt injection patterns.\n  │     Warn mode: log + allow. Block mode: reject + notify user.\n  │\n  ├─ 2. Channel Overrides\n  │     Fetch per-channel config (output format, threading, policies).\n  │\n  ├─ 3. DM/Group Policy\n  │     GroupPolicy::Ignore → drop\n  │     GroupPolicy::CommandsOnly → drop non-commands\n  │     GroupPolicy::MentionOnly → check mentions + trigger patterns\n  │     GroupPolicy::All → allow (optionally with reply precheck)\n  │\n  ├─ 4. Rate Limiting\n  │     Per-channel global limit + per-user limit.\n  │\n  ├─ 5. Command Handling\n  │     Built-in slash commands (/help, /agents, /model, etc.)\n  │     Blocked commands fall through to agent as text.\n  │\n  ├─ 6. Content Normalization\n  │     Images → download + base64 for vision models\n  │     Voice/Video/File → descriptive text fallback\n  │     Button callbacks → command dispatch or text\n  │\n  ├─ 7. Agent Resolution\n  │     Thread route → binding context → user default → \"assistant\" fallback\n  │\n  ├─ 8. RBAC Authorization\n  │\n  ├─ 9. Auto-Reply Check\n  │\n  ├─ 10. Journal Recording (crash recovery)\n  │\n  ├─ 11. Lifecycle Reactions\n  │      Queued → Thinking → [Streaming] → Done/Error\n  │\n  └─ 12. Agent Call (streaming or buffered)\n         Response formatted per channel → sent back\n```\n\n### Agent Resolution Logic\n\nThe `resolve_or_fallback` function determines which agent handles a message:\n\n1. **Thread route** — if metadata contains `thread_route_agent`, resolve that agent by name\n2. **Binding context** — `AgentRouter.resolve_with_context` checks account bindings, guild mappings, and user defaults\n3. **Fallback chain** — look up agent named `\"assistant\"`, then first available running agent; auto-set as user default for future messages\n\nIf an agent ID becomes stale (agent was recreated), `try_reresolution` detects the \"Agent not found\" error, re-resolves the channel's default agent by name, and retries once.\n\n### Message Debouncing\n\nWhen a channel's overrides set `message_debounce_ms > 0`, `BridgeManager` enables a `MessageDebouncer` per sender. This coalesces rapid-fire messages (common in Telegram when users send voice + text + image in quick succession):\n\n- First message starts a timer (`debounce_ms`)\n- Subsequent messages buffer in a per-sender queue\n- Typing events from the platform reset the debounce timer\n- A hard maximum (`debounce_max_ms`) guarantees eventual flush\n- Buffer size cap (`debounce_max_buffer`) forces early flush on volume\n\nWhen flushed, multiple text messages are joined with newlines. Multiple commands with the same name have their arguments concatenated. Images are downloaded and accumulated into a single `ContentBlock` array for multimodal dispatch.\n\n### Streaming Support\n\nAdapters that implement `supports_streaming() -> true` receive incremental text deltas via `send_streaming`. The bridge uses `send_message_streaming_with_sender_status` which returns both a text-delta channel **and** a oneshot status receiver. This distinguishes four outcomes:\n\n| Stream | Kernel | Result |\n|--------|--------|--------|\n| ✅ | ✅ | Normal success, Done reaction |\n| ✅ | ❌ | Partial text delivered, Error reaction, delivery recorded as failed |\n| ❌ | ✅ | Fall back to `send_response` with buffered text, Done reaction |\n| ❌ | ❌ | Fall back, honor `suppress_error_responses`, Error reaction |\n\n### Lifecycle Reactions\n\nAdapters that support reactions (currently Telegram) display emoji indicating processing phase:\n\n| Phase | Emoji | Meaning |\n|---|---|---|\n| `Queued` | ⏳ | Message received |\n| `Thinking` | 🤔 | Agent is processing |\n| `Streaming` | (adapter-specific) | Streaming tokens |\n| `Done` | ✅ | Response delivered |\n| `Error` | ❌ | Agent or delivery failed |\n\nEach reaction removes the previous one (`remove_previous: true`).\n\n## Group Message Gating\n\nGroup messages go through multi-layer filtering to prevent the bot from responding when it shouldn't:\n\n### Mention-Only Mode (`GroupPolicy::MentionOnly`)\n\nA message is processed if **any** of:\n- `was_mentioned` metadata is `true`\n- The message is a slash command\n- The message text matches a `group_trigger_patterns` regex\n\n### Vocative Trigger Guard (OB-04/OB-05)\n\nEnabled via `LIBREFANG_GROUP_ADDRESSEE_GUARD=on` (shipped default-off for observation). When active, two additional checks run:\n\n- **OB-04 (addressee guard):** If the message opens with a vocative like `\"Caterina, ...\"` and `Caterina` is a known group participant (but not the bot), the message is skipped — the user is talking to someone else.\n- **OB-05 (positional vocative):** Even if a trigger pattern like `\"Signore\"` matches mid-message, it must appear at a vocative position (sentence start or after punctuation). The pattern `\"Caterina, chiedi al Signore...\"` is correctly rejected because \"Signore\" is not at a vocative position.\n\n### Reply Precheck\n\nWhen `reply_precheck` is enabled on a channel with `GroupPolicy::All`, the bridge calls `classify_reply_intent` — a lightweight LLM classification — to decide whether the bot should respond. This is skipped for mentions and commands.\n\n## Slash Commands\n\nBuilt-in commands are intercepted before reaching the agent:\n\n| Command | Behavior |\n|---|---|\n| `/start`, `/help` | Usage instructions |\n| `/agents` | Lists agents (interactive buttons when supported) |\n| `/agent <name>` | Bind to a specific agent for your user |\n| `/status` | Agent status and uptime |\n| `/models` | Model selection menu (provider → model drill-down) |\n| `/model <name>` | Set current agent's model |\n| `/new` | Spawn a fresh agent |\n| `/reboot` | Hard reset agent session |\n| `/compact` | Trigger context compaction |\n| `/stop` | Abort current LLM run |\n| `/usage` | Token usage and cost |\n| `/think` | Toggle extended thinking |\n| `/btw <question>` | Ephemeral side-question (no session history) |\n| `/skills`, `/hands` | List installed skills/hands |\n| `/workflows`, `/triggers`, `/schedules` | Automation management |\n| `/approvals`, `/approve`, `/reject` | Approval workflow |\n| `/budget`, `/peers`, `/a2a` | Budget, network, A2A agent info |\n\nCommands can be restricted per channel via `allowed_commands`, `blocked_commands`, or `disable_commands` in `ChannelOverrides`. Blocked commands are forwarded to the agent as plain text.\n\nInteractive menus (`/agents`, `/models`) use `ChannelContent::Interactive` with `InteractiveButton` arrays. Button callbacks arrive as `ChannelContent::ButtonCallback` and are dispatched internally (provider/model drill-down) or as slash commands.\n\n## Per-Channel Overrides\n\n`ChannelOverrides` (fetched from the kernel via `channel_overrides()`) controls channel-specific behavior:\n\n```rust\npub struct ChannelOverrides {\n    pub dm_policy: DmPolicy,               // Ignore, AllowedOnly, Respond\n    pub group_policy: GroupPolicy,          // Ignore, CommandsOnly, MentionOnly, All\n    pub output_format: Option<OutputFormat>,// Markdown, Html, PlainText\n    pub threading: bool,                    // Reply in threads\n    pub rate_limit_per_minute: u32,         // Global channel limit\n    pub rate_limit_per_user: u32,           // Per-user limit\n    pub disable_commands: bool,\n    pub allowed_commands: Vec<String>,\n    pub blocked_commands: Vec<String>,\n    pub group_trigger_patterns: Vec<String>,// Regex patterns for MentionOnly mode\n    pub reply_precheck: bool,               // LLM-based reply intent classification\n    pub message_debounce_ms: u64,           // Debounce window\n    pub message_debounce_max_ms: u64,       // Hard debounce ceiling\n    pub message_debounce_max_buffer: usize,  // Buffer size cap\n    pub auto_route: AutoRouteStrategy,      // Off, FirstMatch, Confidence, Sticky\n    // ... tuning parameters\n}\n```\n\n## Message Journal\n\nOptional crash-recovery journaling. When enabled, `BridgeManager` records every message before dispatch and marks it completed or failed after. On startup:\n\n```rust\nlet pending = manager.recover_pending().await;\nfor entry in &pending {\n    // Re-dispatch to the correct agent\n}\n```\n\nOn shutdown, `manager.compact_journal().await` flushes and compacts the journal.\n\n## Webhook Route Collection\n\nAdapters that receive messages via HTTP webhooks (most modern platforms) implement `create_webhook_routes()` returning an `axum::Router` + message stream. `BridgeManager` collects these routes:\n\n```rust\nlet webhook_router = manager.take_webhook_router();\n// Returns a merged router:\n//   /telegram/webhook → Telegram adapter\n//   /discord/webhook  → Discord adapter\n//   /slack/webhook    → Slack adapter\n```\n\nMount this on the main API server under `/channels`. Webhook adapters handle their own signature verification internally, so no auth middleware should be applied.\n\n## Proactive Push Messages\n\nExternal callers (REST API, cron jobs, workflows) can push outbound messages through a channel adapter without going through the agent loop:\n\n```rust\nmanager.push_message(\"telegram\", \"chat_id_12345\", \"Hello!\", None).await?;\n```\n\nThis delegates to the kernel's `send_channel_push`, which looks up the adapter by name and delivers via `ChannelAdapter::send()`.\n\n## Shutdown\n\n```rust\nmanager.stop().await;\n```\n\nThis signals all dispatch loops via a watch channel, stops each adapter (releasing WebSocket connections, HTTP servers, ports), and awaits all spawned tasks.\n\n## Implementing a New Channel Adapter\n\n1. Create `src/my_channel.rs` implementing `ChannelAdapter`\n2. Add the feature gate in `src/lib.rs`:\n   ```rust\n   #[cfg(feature = \"channel-my-channel\")]\n   pub mod my_channel;\n   ```\n3. Add the feature to `Cargo.toml` with appropriate dependencies\n4. Convert platform events to `ChannelMessage` in your `start()` or `create_webhook_routes()` stream\n5. Implement `send()` to deliver `ChannelContent` back to the platform\n6. For webhook-based adapters, prefer `create_webhook_routes()` over a standalone HTTP server","cli-tui":"# CLI & TUI\n\n# LibreFang CLI & TUI\n\nThe `librefang-cli` crate provides the primary user-facing interface for LibreFang — a `clap`-based command-line tool and a ratatui-powered interactive terminal dashboard. It is the entry point users invoke via the `librefang` binary.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[librefang binary] --> B{Subcommand?}\n    B -->|None + TTY| C[Launcher menu]\n    B -->|None + pipe| D[Print help]\n    B -->|tui / chat| E[ratatui TUI]\n    B -->|init / config / status / ...| F[One-shot CLI commands]\n    B -->|start| G[Daemon launcher]\n    B -->|mcp| H[MCP stdio server]\n\n    F -->|daemon running| I[HTTP via daemon_client]\n    F -->|no daemon| J[In-process kernel]\n\n    G -->|background| K[Detached child process]\n    G -->|foreground| L[LibreFangKernel in-process]\n\n    E --> I\n\n    subgraph \"Shared Infrastructure\"\n        M[ui.rs - formatted output]\n        N[http_client.rs - reqwest builder]\n        O[i18n.rs - translations]\n        P[table.rs - table rendering]\n        Q[progress.rs - progress bars]\n    end\n```\n\n## Execution Modes\n\nThe CLI operates in three distinct modes depending on the subcommand and terminal state:\n\n### Single-shot CLI commands\nCommands like `status`, `agent list`, `config show`, `doctor`, etc. These either talk to a running daemon over HTTP or fall back to an in-process kernel. Tracing goes to stderr with library-level noise suppressed (only WARN+ from `librefang_kernel`, `librefang_runtime`, `librefang_extensions`). The `RUST_LOG` environment variable overrides this suppression.\n\n### TUI / Interactive chat\nCommands `tui`, `chat`, and `agent chat`. Tracing is redirected to a log file (`~/.librefang/logs/tui.log`) because stderr output corrupts the ratatui alternate screen. The Ctrl+C handler is **not** installed for these modes — ratatui needs to restore the terminal via its own cleanup path, and `process::exit` would bypass that.\n\n### Launcher (no subcommand)\nWhen invoked with no subcommand on an interactive TTY, the user is presented with a menu: Get Started, Chat, Dashboard, Desktop App, Terminal UI, Show Help, or Quit. When stdout is piped, help text is printed instead.\n\n## Startup Sequence\n\n`main()` follows this initialization order:\n\n1. **TLS provider** — installs `aws_lc_rs` as the rustls crypto provider before any async/TLS operations\n2. **Dotenv** — loads `~/.librefang/.env` into the process environment (system env vars take priority)\n3. **i18n** — reads `language` from config and initializes translations via `i18n::init`\n4. **CLI parsing** — `Cli::parse()` via clap\n5. **Mode detection** — determines if this is a TUI mode based on the subcommand\n6. **Log level** — reads `log_level` from config (falls back to `\"info\"`)\n7. **Tracing init** — file-based for TUI modes, stderr for CLI modes\n8. **Ctrl+C handler** — installed only for non-TUI modes (Windows: `SetConsoleCtrlHandler`, Unix: default SIGINT)\n\n## Daemon Communication\n\n### Discovery\n\n`find_daemon()` reads daemon info from `~/.librefang/daemon.json` via `read_daemon_info`, then probes `http://{addr}/api/health`. The listen address is normalized — `0.0.0.0` is replaced with `127.0.0.1` to avoid macOS DNS hangs.\n\n### HTTP Client\n\n`daemon_client()` builds a `reqwest::blocking::Client` with:\n- 120-second timeout\n- Optional `Authorization: Bearer <key>` header if `api_key` is set in config\n- Connection via `http_client::client_builder()` (shared builder for consistent TLS/proxy settings)\n\n### Error Handling\n\n`daemon_json()` wraps HTTP responses and maps common errors to user-friendly i18n messages:\n- Timeouts → `error-request-timeout`\n- Connection refused → `error-connect-refused`\n- 5xx responses → `error-daemon-returned`\n\nAll exit with code 1 after displaying the error and suggested fix.\n\n## Initialization System (`init`)\n\nThe `init` command has three paths:\n\n| Mode | Trigger | Behavior |\n|------|---------|----------|\n| Quick | `--quick` or non-TTY | Auto-detects provider, writes defaults, no prompts |\n| Interactive | TTY + no existing config | Launches ratatui wizard (5-step: provider → API key → model → test → launch) |\n| Upgrade | existing `config.toml` | Backs up config, syncs registry, merges missing top-level keys |\n\n### Upgrade Flow\n\nWhen `config.toml` already exists, the interactive path automatically redirects to upgrade. The upgrade process:\n\n1. Backs up to `~/.librefang/backups/config-YYYYMMDD-HHMMSS.toml` (keeps last 3)\n2. Syncs registry content with TTL=0 (forces refresh)\n3. Ensures `data/`, vault, and git repo exist\n4. Merges missing top-level keys from the default config template\n5. Scalar keys are inserted before the first `[table]` header to maintain TOML validity\n6. Table sections are appended at the end with a comment separator\n\n### Auto-detection\n\n`detect_best_provider()` checks environment variables for known API keys (e.g., `GROQ_API_KEY`, `OPENAI_API_KEY`, `ANTHROPIC_API_KEY`) and selects the first match. Falls back to a hardcoded default.\n\n## Command Routing\n\nThe `Commands` enum is generated by clap's `#[derive(Subcommand)]` and covers ~40 top-level commands. Many have their own nested subcommand trees marked with `[*]` in help text:\n\n- **Agent** — `new`, `spawn`, `list`, `chat`, `kill`, `set`\n- **Skill** — `install`, `list`, `remove`, `search`, `test`, `publish`, `create`, `evolve`\n- **Channel** — `list`, `setup`, `test`, `enable`, `disable`\n- **Hand** — `list`, `active`, `status`, `install`, `activate`, `deactivate`, `info`, `check-deps`, `install-deps`, `pause`, `resume`, `settings`, `set`, `reload`, `chat`\n- **Config** — `show`, `edit`, `get`, `set`, `unset`, `set-key`, `delete-key`, `test-key`\n- **Models** — `list`, `aliases`, `providers`, `set`\n- **Trigger** — `list`, `get`, `create`, `update`, `enable`, `disable`, `delete`\n- **Security** — `status`, `audit`, `verify`, `audit-reset`\n- **Memory** — `list`, `get`, `set`, `delete`\n- **Vault** — `init`, `set`, `list`, `remove`\n- **Cron** — `list`, `create`, `delete`, `enable`, `disable`\n- **Gateway** — `start`, `stop`, `restart`, `status`\n- **Workflow** — `list`, `create`, `run`\n- **Service** — `install`, `uninstall`, `status`\n- **Webhooks** — `list`, `create`, `delete`, `test`\n\nConvenience aliases exist at the top level: `spawn`, `agents`, `kill`, `chat`, `logs`, `health`, `message`, `sessions`.\n\n## Daemon Lifecycle\n\n### Start\n\n`cmd_start()` handles three scenarios:\n- **Background** (default) — spawns a detached child process with `--spawned` flag, writes PID to `daemon.json`\n- **Tail** (`--tail`) — background spawn then streams `logs/daemon.log` via `std::io::copy`\n- **Foreground** (`--foreground`) — boots `LibreFangKernel` in-process, installs graceful shutdown handler\n\nThe spawned child process re-initializes tracing with daemon-appropriate settings (file appender, full log levels).\n\n### Stop\n\n`cmd_stop()` reads the daemon PID from `daemon.json` and sends SIGTERM (Unix) or taskkill (Windows). Falls back to force-kill via `force_kill_pid()` if graceful shutdown times out.\n\n## MCP Server\n\n`librefang mcp` with no subcommand starts a JSON-RPC stdio server that exposes LibreFang to MCP-compatible clients (Claude Code, Cursor, etc.). The server:\n- Reads JSON-RPC messages from stdin\n- Routes to `handle_message()` which dispatches to tool implementations\n- Uses `create_backend()` to establish a connection to the running daemon\n- Writes responses to stdout via `write_message()`\n\nSubcommands `list`, `catalog`, `add`, `remove` manage `[[mcp_servers]]` entries in `config.toml`.\n\n## Submodules\n\n| Module | Purpose |\n|--------|---------|\n| `ui` | Formatted output helpers: `banner()`, `success()`, `error()`, `error_with_fix()`, `hint()`, `kv()`, `section()`, `next_steps()` |\n| `table` | Table rendering for agent lists, model lists, etc. Used across the codebase including by other crates |\n| `progress` | Progress bar with OSC-based terminal progress reporting |\n| `i18n` | Translation system with `t()` and `t_args()` functions, initialized from config `language` field |\n| `templates` | Agent template discovery (`load_all_templates`, `discover_template_dirs`) and rendering |\n| `launcher` | Interactive menu shown when no subcommand is given on a TTY |\n| `tui` | Full ratatui-based terminal dashboard, init wizard screens, agent management |\n| `mcp` | MCP stdio server implementation |\n| `desktop_install` | Desktop app installation helpers |\n| `http_client` | Shared reqwest client builder with consistent TLS/proxy settings |\n\n## Configuration Access Patterns\n\nThe module uses several lightweight config readers that avoid full deserialization:\n\n- `load_log_level_from_config()` — reads just `log_level` from config.toml\n- `load_language_from_config()` — reads just `language`\n- `load_update_channel_from_config()` — reads just `update_channel`\n- `load_log_dir_from_config()` — reads just `log_dir`\n- `daemon_config_context()` — loads full config via `load_config()` for daemon commands that need `home_dir`, `api_key`, and `log_dir`\n\n## Home Directory Resolution\n\n`cli_librefang_home()` resolves in this order:\n1. `LIBREFANG_HOME` environment variable (if set)\n2. `~/.librefang/` (default)\n\nThis is used throughout the crate for config, data, logs, vault, and daemon info paths.\n\n## Vault Integration\n\nThe encrypted credential vault (`vault.enc`) is initialized during `init` via `init_vault_if_missing()`. API keys are also stored in `.env` for backward compatibility. The vault uses `librefang_extensions::vault::CredentialVault` with keyring-backed master key resolution.\n\n## Git-based Config Versioning\n\n`init_git_if_missing()` creates a git repo in `~/.librefang/` during initialization:\n- Writes `.gitignore` excluding `secrets.env`, `vault.enc`, `daemon.json`, `logs/`, `cache/`, `registry/`, `data/`, `backups/`, and database files\n- Creates an initial commit\n- The upgrade flow preserves this repo and adds `.gitignore` entries for `backups/`\n\n## Platform-specific Behavior\n\n### Windows Ctrl+C\nOn Windows/MSYS, the default signal handler doesn't reliably interrupt blocking `read_line` calls. The custom `SetConsoleCtrlHandler`:\n- First Ctrl+C: prints \"Interrupted.\" and exits cleanly (code 0)\n- Second Ctrl+C: hard exit (code 130)\n\n### Unix\nDefault SIGINT handler works correctly for interrupting `read_line` — no custom handler needed.\n\n### File Permissions\nOn Unix, `restrict_file_permissions()` and `restrict_dir_permissions()` set 0600/0700 modes on sensitive files and directories (config, vault, backups).\n\n## Self-update\n\n`cmd_update()` downloads the latest GitHub release binary:\n- Channels: `stable`, `beta`, `rc` (configurable via `update_channel` in config)\n- `--check` performs a dry run\n- `--version` pins a specific tag\n- `--channel` overrides the configured channel for one invocation","dashboard-api-client":"# Dashboard API Client\n\n# Dashboard API Client\n\nThe Dashboard API Client is the data-access layer for the LibreFang dashboard frontend. It provides typed, authenticated HTTP functions for every backend endpoint and wraps them in React Query hooks so page components never call `fetch` directly.\n\n## Architecture\n\n```\n┌──────────────────────────────────────────────────────────────────┐\n│  Page Components                                                 │\n│  (ChatPage, AgentsPage, WorkflowsPage, ...)                     │\n└──────────┬───────────────────────────────┬───────────────────────┘\n           │ queries/                      │ mutations/\n           ▼                               ▼\n┌─────────────────┐            ┌─────────────────────────────────┐\n│ useQuery hooks   │            │ useMutation hooks               │\n│ (read paths)     │            │ (write paths)                   │\n└────────┬────────┘            └──────────────┬──────────────────┘\n         │                                     │\n         │      lib/http/client.ts             │\n         │  (curated re-export whitelist)      │\n         └──────────────┬──────────────────────┘\n                        │\n                        ▼\n               ┌─────────────────┐\n               │    api.ts        │\n               │  (raw functions  │\n               │   + interfaces)  │\n               └────────┬────────┘\n                        │\n              ┌─────────┴──────────┐\n              │  HTTP primitives   │\n              │  get / post / put  │\n              │  patch / del       │\n              └─────────┬──────────┘\n                        │\n                  buildHeaders()\n                  authHeader()\n                        │\n                        ▼\n                   Backend REST API\n```\n\n## Module Structure\n\n| File | Role |\n|---|---|\n| `api.ts` | All endpoint functions, TypeScript interfaces, and low-level HTTP primitives. This is the only file that calls `fetch`. |\n| `lib/http/errors.ts` | `ApiError` class — thrown on non-2xx responses. |\n| `lib/http/client.ts` | Explicit re-export whitelist. Query and mutation hooks import from here, never directly from `api.ts`. |\n| `lib/mutations/*.ts` | React Query `useMutation` wrappers that call client functions and invalidate the relevant query caches on success. |\n\n## Authentication\n\nAuthentication is token-based. The API key is stored in `localStorage` under the key `librefang-api-key`.\n\n### Token lifecycle\n\n- **`setApiKey(key)`** — persists the token and resets the 401 guard so future unauthorized responses can re-trigger the login dialog.\n- **`clearApiKey()`** — removes the token from storage.\n- **`getStoredApiKey()`** — reads the raw token string.\n- **`hasApiKey()`** — returns `true` when a non-empty token exists.\n\n### How tokens reach the backend\n\nEvery request flows through `buildHeaders()` → `authHeader()`. The resulting `Authorization: Bearer <token>` header is merged into every HTTP primitive (`get`, `post`, `put`, `patch`, `del`, `getText`).\n\n`authHeader()` also injects an `Accept-Language` header sourced from `localStorage(\"i18nextLng\")` with a fallback to `navigator.language`.\n\n### 401 handling\n\nWhen the backend returns a 401, `parseError()` fires a one-shot global callback (`_onUnauthorized`), clears the stored token, and redirects the user to the login screen. The `_unauthorizedFired` guard prevents infinite loops when multiple in-flight requests fail simultaneously.\n\nCall `setOnUnauthorized(fn)` at app startup (typically in `App.tsx`) to register this callback.\n\n### Session login\n\n- **`dashboardLogin(username, password, totpCode?)`** — posts credentials to `/api/auth/dashboard-login`. On success the returned token is automatically persisted via `setApiKey`.\n- **`dashboardLogout()`** — posts to `/api/auth/logout` (best-effort, network failures don't block), then clears the local token.\n- **`verifyStoredAuth()`** — probes `/api/security` with the stored token to check if it is still accepted by the backend. Retries up to 3 times with 1-second backoff.\n\n### Auth mode detection\n\n`checkDashboardAuthMode()` queries `/api/auth/dashboard-check` and returns one of four modes: `\"credentials\"`, `\"api_key\"`, `\"hybrid\"`, or `\"none\"`.\n\n## HTTP Primitives\n\nFive generic helpers handle all communication. Each accepts a path, merges auth headers, and throws `ApiError` on failure.\n\n| Function | Method | Timeout |\n|---|---|---|\n| `get<T>(path)` | GET | Browser default |\n| `post<T>(path, body, timeout?)` | POST | 60s default, 300s for long-running ops |\n| `put<T>(path, body)` | PUT | Browser default |\n| `patch<T>(path, body)` | PATCH | Browser default |\n| `del<T>(path)` | DELETE | Browser default |\n| `getText(path)` | GET | Returns raw string instead of JSON |\n\n`post` uses an `AbortController` to enforce the timeout. If the request aborts, a human-readable timeout error is thrown that notes the operation may still be running server-side.\n\nTwo timeout constants are defined:\n\n- `DEFAULT_POST_TIMEOUT_MS` = 60 000 (standard writes)\n- `LONG_RUNNING_TIMEOUT_MS` = 300 000 (agent messages, workflow runs, skill installs)\n\n## WebSocket URLs\n\n`buildAuthenticatedWebSocketUrl(path)` constructs a `ws://` or `wss://` URL with the current API key appended as a `?token=` query parameter. Used by streaming and real-time features.\n\n## Error Handling\n\nAll non-2xx responses are parsed into an `ApiError` instance:\n\n```typescript\nclass ApiError extends Error {\n  readonly status: number;   // HTTP status code\n  readonly code: string;     // error code string (e.g. \"HTTP_401\")\n  readonly message: string;  // human-readable message\n}\n```\n\nThe parser prefers the `detail` field from the response body (human-readable), falling back to the `error` field (machine code). Consumers
