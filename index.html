                    '# Internationalization\n\n# Internationalization (i18n) Module\n\nThe `i18n/` directory contains translated documentation and error message catalogs for LibreFang\'s multi-language support.\n\n## Overview\n\nLibreFang serves a global community of developers and users. The i18n module ensures that documentation, error messages, and user-facing strings are available in multiple languages. This module follows a **full-document translation** approach for documentation, where each language has a complete translated version of the source document, rather than fragment-by-fragment translation.\n\n## Directory Structure\n\n```\ni18n/\n├── README.md              # This module\'s guide for translators\n├── README.de.md           # German translation\n├── README.es.md           # Spanish translation\n├── README.ja.md           # Japanese translation\n├── README.ko.md           # Korean translation\n├── README.pl.md           # Polish translation\n├── README.zh.md           # Chinese translation\n├── en.toml                # English error message catalog\n├── zh.toml                # Chinese error message catalog\n├── getting-started.fr.md  # French getting started guide\n└── skill-development.zh.md # Chinese skill development guide\n```\n\n## Translation Types\n\n### Full-Document Translations\n\nThe README translations (`README.*.md`) are complete translations of the project\'s root `README.md`. Each file maintains:\n\n- The same heading structure and hierarchy\n- Identical HTML/markdown formatting\n- Matching image paths and badge URLs\n- Consistent multi-language navigation bars\n\n### Error Message Catalogs\n\nThe `.toml` files (`en.toml`, `zh.toml`) provide human-readable reference catalogs for translatable error messages. These map string keys to translated messages:\n\n```toml\n[agent]\nnot-found = "Agent not found"\nspawn-failed = "Agent spawn failed"\n```\n\n> **Note:** The runtime uses Fluent (`.ftl`) files under `crates/librefang-types/locales/` for actual translation lookup. The TOML files serve as a human-readable catalog and reference for external tooling.\n\n### Topic-Specific Guides\n\nAdditional translated guides cover specialized topics:\n- `getting-started.fr.md` — French quickstart guide\n- `skill-development.zh.md` — Chinese skill development documentation\n\n## Adding a New Language\n\n### Step 1: Create the Translation File\n\nCopy the English `README.md` into `i18n/` with the appropriate ISO 639-1 language code:\n\n```bash\ncp README.md i18n/README.fr.md  # For French\n```\n\n### Step 2: Translate Content\n\nTranslate all content while preserving:\n\n- **Heading levels** — `##` remains `##`\n- **Code blocks** — Commands and code examples stay in English\n- **Placeholders** — `{reason}`, `{error}`, `{name}` remain unchanged\n- **Technical terms** — Keep "LibreFang", "Rust", "crate", "API" in English\n- **Brand names** — "LibreFang", "Hands", "FangHub" are never translated\n\n### Step 3: Update Navigation Bars\n\nAdd your language to the multi-language navigation bar in **all translation files**:\n\n```html\n<p align="center">\n    <a href="../README.md">English<\/a> | \n    <a href="README.zh.md">中文<\/a> | \n    <a href="README.ja.md">日本語<\/a> | \n    <!-- Add your language here -->\n    <a href="README.fr.md">Français<\/a>\n<\/p>\n```\n\nUpdate the navigation bar in:\n- The new translation file itself\n- All existing translation files\n- The root `README.md`\n\n### Step 4: Submit Changes\n\n```bash\ngit checkout -b i18n/add-french\ngit add i18n/README.fr.md\n# Update navigation bars in existing files\ngit add README.md i18n/README.de.md i18n/README.es.md ...\ngit commit -m "docs(i18n): add French translation"\ngit push origin i18n/add-french\n```\n\n## Adding Translation Keys\n\nWhen the English `README.md` receives new sections:\n\n1. **Review the diff** to identify what changed\n2. **Add translated sections** to each language file at the same position\n3. **If you cannot translate all languages:**\n   - Update the languages you know\n   - Open GitHub issues for remaining languages\n   - Tag them with `i18n` and the language code (e.g., `i18n:fr`, `i18n:de`)\n\n## Style Guidelines\n\n### Keep Translations Concise\n\nMatch the tone and length of the English original. Avoid adding explanatory footnotes or commentary that isn\'t in the source.\n\n### Preserve All Markup\n\n```markdown\n<!-- Keep these exactly as-is -->\n<img src="../public/assets/logo.png" />\n<a href="https://discord.gg/...">Discord<\/a>\n[![Deploy Hub](https://img.shields.io/...)]\n```\n\n### Use Natural Phrasing\n\nPrefer idiomatic expressions over literal word-for-word translation:\n\n```diff\n- "Agentes que trabajan para ti"     # Literal\n+ "Agentes trabajando para ti"         # Idiomatic\n```\n\n### Maintain Terminology Consistency\n\nIf you translate "agent" as a specific word in your language, use that word everywhere:\n\n```toml\n# German example - consistent terminology\nagent = "Agent"           # First occurrence\n"Research Agent" = "Recherche-Agent"   # Consistent\n"Lead Agent" = "Lead-Agent"             # Consistent\n```\n\n### Handle Technical Terms\n\n| Category | Example | Recommendation |\n|----------|---------|----------------|\n| Product names | LibreFang, FangHub, Hands | Never translate |\n| Languages | Rust, Python, Go | Never translate |\n| Protocols | API, REST, WebSocket, MCP | Never translate |\n| Technical concepts | WebAssembly, sandbox, CLI | Translate surrounding text only |\n| Feature names | SKILL.md, HAND.toml | Keep format, translate description |\n\n## Error Message Translation\n\nThe TOML catalogs cover runtime error messages. To add a new language\'s error catalog:\n\n### 1. Copy the English Catalog\n\n```bash\ncp i18n/en.toml i18n/ja.toml\n```\n\n### 2. Translate Each Value\n\n```toml\n# en.toml\n[agent]\nnot-found = "Agent not found"\n\n# ja.toml\n[agent]\nnot-found = "エージェントが見つかりません"\n```\n\n### 3. Preserve Placeholders\n\n```toml\n# en.toml\n[message]\ndelivery-failed = "Message delivery failed: {reason}"\n\n# ja.toml\n[message]\ndelivery-failed = "メッセージの配信に失敗しました: {reason}"\n```\n\n## Testing Translations\n\n### Visual Review\n\nOpen the markdown file in a GitHub preview or local markdown viewer to verify:\n\n- Headings render at correct levels\n- Tables align properly\n- Code blocks display correctly\n- Images load\n\n### Link Verification\n\nCheck all relative links resolve correctly from the `i18n/` directory:\n\n```bash\n# From repo root\ncd i18n\n\n# Verify relative paths work\n# These should resolve to existing files:\n../README.md              # Root README\n../docs/CONTRIBUTING.md   # Contributing guide\n../public/assets/logo.png # Logo image\n```\n\n### Navigation Bar Testing\n\nClick through each language link in the navigation bar to confirm:\n\n- All links point to existing files\n- The current language is correctly highlighted\n- Return links work bidirectionally\n\n### Diff Comparison\n\nCompare your translation against the English original section by section:\n\n```bash\n# Show side-by-side diff\ndiff -y --suppress-common-lines README.md i18n/README.fr.md | head -100\n```\n\n## Integration with Build System\n\nThe i18n module integrates with the broader LibreFang build system:\n\n```mermaid\nflowchart LR\n    A[English README.md] --> B[Translation Files]\n    B --> C[i18n/README.*.md]\n    B --> D[Topic Guides]\n    \n    E[en.toml] --> F[crates/librefang-types/locales/]\n    F --> G[Runtime .ftl files]\n    \n    H[Contributors] --> I[PR Reviews]\n    I --> B\n    I --> G\n```\n\nTranslations are **not compiled** into binaries directly. They serve as:\n\n1. **User-facing documentation** — Rendered on GitHub or the documentation site\n2. **Reference for runtime i18n** — The TOML catalogs define message keys\n3. **Onboarding resources** — Help non-English speakers contribute to the project\n\n## Related Documentation\n\n- [`docs/CONTRIBUTING.md`](../docs/CONTRIBUTING.md) — General contribution guidelines\n- [`docs/GOVERNANCE.md`](../docs/GOVERNANCE.md) — Project governance structure\n- [`crates/librefang-types/locales/`](../crates/librefang-types/locales/) — Runtime Fluent files\n- [ISO 639-1 Language Codes](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) — Reference for language codes',
                "kernel-core":
                    '# Kernel Core\n\n\n# LibreFang Kernel Core\n\nThe LibreFang kernel is the central orchestrator of the agent operating system. It manages the complete lifecycle of agents—from spawning and scheduling to message routing, permission enforcement, and background execution. The kernel exposes its functionality through a trait-based interface (`KernelHandle`) consumed by the runtime and API layers.\n\n## Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph "Kernel Core"\n        K[LibreFangKernel]\n        AM[ApprovalManager]\n        AU[AuthManager]\n        BG[BackgroundExecutor]\n        RE[Registry]\n        WF[WorkflowEngine]\n        CR[CronScheduler]\n        TR[TriggerEngine]\n        EB[EventBus]\n        IN[Inbox]\n        RT[Router]\n    end\n\n    subgraph "External Consumers"\n        API[librefang-api]\n        RT_RUNTIME[librefang-runtime]\n        DESKTOP[librefang-desktop]\n        CLI[librefang-cli]\n    end\n\n    API --> K\n    RT_RUNTIME --> K\n    DESKTOP --> K\n    CLI --> K\n\n    K --> AM\n    K --> AU\n    K --> BG\n    K --> RE\n    K --> WF\n    K --> CR\n    K --> TR\n    K --> EB\n    K --> IN\n    K --> RT\n```\n\n## Module Organization\n\n| Module | Responsibility |\n|--------|---------------|\n| `kernel.rs` | Main kernel entry point, `LibreFangKernel` struct |\n| `approval.rs` | Gates dangerous operations behind human approval; TOTP second factor |\n| `auth.rs` | RBAC user management and action authorization |\n| `background.rs` | Runs agents autonomously on schedules or triggers |\n| `workflow.rs` | DAG-based workflow execution engine |\n| `cron.rs` | Cron-based job scheduling |\n| `triggers.rs` | Event-driven trigger pattern matching |\n| `registry.rs` | Agent registry with lookup by ID and name |\n| `router.rs` | Message routing between channels and agents |\n| `inbox.rs` | Per-agent message inbox with deduplication |\n| `event_bus.rs` | Pub/sub event distribution |\n| `supervisor.rs` | Process supervision and graceful shutdown |\n| `config.rs` | Configuration loading and validation |\n| `config_reload.rs` | Hot-reload support for config changes |\n| `auto_reply.rs` | Trigger-driven background replies |\n| `pairing.rs` | Device pairing for multi-device access |\n| `orchestration.rs` | Multi-agent coordination |\n| `metering.rs` | Usage tracking and limits |\n| `heartbeat.rs` | Agent health monitoring |\n| `wizard.rs` | Interactive setup wizard |\n| `whatsapp_gateway.rs` | WhatsApp Business API gateway |\n\n## Core Kernel\n\nThe kernel is instantiated once per process and holds references to all subsystems:\n\n```rust\npub use kernel::LibreFangKernel;\npub use kernel::DeliveryTracker;\n```\n\nThe kernel exposes a `KernelHandle` trait used by the runtime to interact with kernel services without depending on the concrete implementation.\n\n## Execution Approval (`approval.rs`)\n\nThe approval system gates dangerous tool executions behind human review. It supports both **blocking** (agent waits) and **deferred** (non-blocking) approval paths.\n\n### Approval Flow\n\n```mermaid\nsequenceDiagram\n    participant Agent\n    participant Kernel\n    participant ApprovalMgr\n    participant API\n    participant Human\n\n    Agent->>Kernel: Execute tool (shell_exec)\n    Kernel->>ApprovalMgr: requires_approval(tool_name)?\n    alt needs approval\n        Kernel->>ApprovalMgr: request_approval(req)\n        ApprovalMgr-->>Agent: Pending...\n        API->>ApprovalMgr: list_pending()\n        API->>Human: Show pending request\n        Human->>API: resolve(request_id, Approved, totp_verified=true)\n        API->>ApprovalMgr: resolve(...)\n        ApprovalMgr-->>Agent: ApprovalDecision::Approved\n        Agent->>Agent: Execute tool\n    else no approval needed\n        Kernel-->>Agent: Proceed\n    end\n```\n\n### Blocking vs. Deferred Approval\n\n**Blocking** (`request_approval`) — the agent task suspends until a decision arrives:\n\n```rust\npub async fn request_approval(&self, req: ApprovalRequest) -> ApprovalDecision\n```\n\n**Deferred** (`submit_request`) — returns immediately with a UUID; the deferred payload is returned atomically when resolved:\n\n```rust\npub fn submit_request(\n    &self,\n    req: ApprovalRequest,\n    deferred: DeferredToolExecution,\n) -> Result<uuid::Uuid, String>\n```\n\nThe `resolve` method returns both the `ApprovalResponse` and the stored `DeferredToolExecution` in a single atomic operation, ensuring the tool execution context is never lost.\n\n### Policy-Based Gating\n\nApproval requirements are evaluated against an `ApprovalPolicy` using multiple bypass rules in priority order:\n\n1. **Trusted sender bypass** — if the sender is in `trusted_senders`, approval is skipped entirely\n2. **Channel allow rule** — if a channel explicitly allows the tool, bypass approval\n3. **Channel deny rule** — if a channel explicitly denies the tool, approval always triggers\n4. **Default list** — fall back to the `require_approval` glob patterns\n\n```rust\npub fn requires_approval_with_context(\n    &self,\n    tool_name: &str,\n    sender_id: Option<&str>,\n    channel: Option<&str>,\n) -> bool\n```\n\nGlob patterns support wildcards: `"file_*"` matches `file_read`, `file_write`, etc.\n\n### TOTP Second Factor\n\nWhen `ApprovalPolicy.second_factor == SecondFactor::Totp`, approved decisions require TOTP verification. The system implements RFC 6238 TOTP with SHA-1, 6 digits, 30-second step, and ±1 window tolerance.\n\n**Verification:**\n\n```rust\npub fn verify_totp_code(secret_base32: &str, code: &str) -> Result<bool, String>\n```\n\n**Grace period** — after a successful TOTP verification, subsequent approvals for the same user skip TOTP for `totp_grace_period_secs` (default: 0, meaning always required).\n\n**Rate limiting** — after `TOTP_MAX_FAILURES` (5) consecutive failures, the sender is locked out for `TOTP_LOCKOUT_SECS` (300s). Lockout state persists to the database so it survives daemon restarts.\n\n**Recovery codes** — 8 one-time recovery codes in `xxxx-xxxx` format can replace TOTP:\n\n```rust\npub fn generate_recovery_codes() -> Vec<String>\npub fn verify_recovery_code(stored_json: &str, code: &str) -> Result<(bool, String), String>\n```\n\n### Timeout Behavior\n\nWhen an approval request times out, the behavior is governed by `TimeoutFallback`:\n\n| Fallback | Behavior |\n|----------|----------|\n| `Escalate { extra_timeout_secs }` | Re-insert with `escalation_count + 1`; up to 3 escalations before final timeout |\n| `TimedOut` | Resolve with `ApprovalDecision::TimedOut` |\n| `Skip` | Resolve with `ApprovalDecision::Skipped` |\n\nThe periodic `expire_pending_requests()` method sweeps expired requests and returns escalated/deferred outcomes separately:\n\n```rust\npub fn expire_pending_requests(&self) -> (\n    Vec<EscalatedApproval>,\n    Vec<(uuid::Uuid, ApprovalDecision, DeferredToolExecution)>,\n)\n```\n\n## Authentication (`auth.rs`)\n\nThe `AuthManager` implements hierarchical RBAC, mapping platform identities (Telegram ID, Discord ID, etc.) to LibreFang users with roles.\n\n### Role Hierarchy\n\n```rust\npub enum UserRole {\n    Viewer = 0,   // Read-only access\n    User   = 1,   // Chat with agents\n    Admin  = 2,   // Spawn/kill agents, install skills, view usage\n    Owner  = 3,   // Full access including user management\n}\n```\n\n### Authorization\n\nActions map to minimum required roles:\n\n| Action | Required Role |\n|--------|---------------|\n| `ChatWithAgent`, `ViewConfig` | User |\n| `ViewUsage`, `SpawnAgent`, `KillAgent`, `InstallSkill` | Admin |\n| `ModifyConfig`, `ManageUsers` | Owner |\n\n```rust\npub fn authorize(&self, user_id: UserId, action: &Action) -> LibreFangResult<()>\n```\n\n### Channel Binding\n\nUsers are identified by their platform identity through channel bindings:\n\n```rust\n// UserConfig example\nUserConfig {\n    name: "Alice".to_string(),\n    role: "owner".to_string(),\n    channel_bindings: {\n        let mut m = HashMap::new();\n        m.insert("telegram".to_string(), "123456".to_string());\n        m\n    },\n}\n```\n\n```rust\npub fn identify(&self, channel_type: &str, platform_id: &str) -> Option<UserId>\n```\n\n## Background Execution (`background.rs`)\n\nThe `BackgroundExecutor` runs agents autonomously according to their `ScheduleMode`:\n\n| Mode | Behavior |\n|------|----------|\n| `Reactive` | No background loop; agent responds to messages only |\n| `Continuous { check_interval_secs }` | Self-prompt on fixed interval |\n| `Periodic { cron }` | Self-prompt on cron/interval schedule |\n| `Proactive` | Trigger-driven via the trigger engine |\n\n### Security: Concurrency Limits\n\nA global semaphore (`llm_semaphore`) limits concurrent background LLM calls across all agents (default: 5). Each tick:\n\n1. Acquires the semaphore permit (blocks if limit reached)\n2. Checks the busy flag (skips if previous tick still running)\n3. Checks the pause flag (skips if agent is paused)\n4. Sends the self-prompt and spawns a watcher task\n\nThe `BusyGuard` RAII struct ensures the busy flag is cleared even if the task panics.\n\n### Pause/Resume\n\nAgents can be paused and resumed mid-loop:\n\n```rust\npub fn pause_agent(&self, agent_id: AgentId)\npub fn resume_agent(&self, agent_id: AgentId)\n```\n\nPre-creating the pause flag before `start_agent` allows pausing an agent before its loop begins.\n\n### Cron Parsing\n\nThe `parse_cron_to_secs` function handles:\n\n- `"every 30s"`, `"every 5m"`, `"every 1h"`, `"every 1d"`\n- Standard 5-field cron (`*/15 * * * *` → 900s)\n\n### Trigger Conditions\n\n`parse_condition` converts proactive condition strings to `TriggerPattern`:\n\n| Condition | Pattern |\n|-----------|---------|\n| `"all"` | `TriggerPattern::All` |\n| `"event:agent_spawned"` | `TriggerPattern::AgentSpawned` |\n| `"event:agent_terminated"` | `TriggerPattern::AgentTerminated` |\n| `"event:lifecycle"` | `TriggerPattern::Lifecycle` |\n| `"event:memory_update"` | `TriggerPattern::MemoryUpdate` |\n| `"memory:some_key"` | `TriggerPattern::MemoryKeyPattern` |\n\n## Auto-Reply (`auto_reply.rs`)\n\nThe `AutoReplyEngine` triggers agent-generated responses to incoming messages with suppression and concurrency control.\n\n```rust\npub fn should_reply(\n    &self,\n    message: &str,\n    channel_type: &str,\n    agent_id: AgentId,\n) -> Option<AgentId>\n```\n\nSuppression patterns (case-insensitive) prevent auto-reply for commands like `/stop` or `/pause`. A semaphore limits concurrent auto-replies (`max_concurrent`, default: 3).\n\n## Workflow Engine (`workflow.rs`)\n\nThe workflow engine executes agents according to directed acyclic graphs (DAGs) defined in YAML or JSON.\n\n### Execution Model\n\n```mermaid\ngraph LR\n    A[Step A] --> B[Step B]\n    A --> C[Step C]\n    B --> D[Step D]\n    C --> D\n```\n\nSteps run in topological order. Fan-out (`parallel: true`) executes child steps concurrently. Fan-in waits for all parallel branches.\n\n### Variable Expansion\n\nSteps can reference outputs from upstream steps:\n\n```yaml\nvariables:\n  repo: "librefang/librefang"\nsteps:\n  - name: "clone"\n    agent: "dev"\n    prompt: "Clone {{repo}}"\n  - name: "build"\n    agent: "dev"\n    prompt: "Build {{steps.clone.output}}"\n```\n\n### Error Handling\n\nEach step can define an `on_error` strategy:\n\n- `continue` — log error and proceed\n- `skip` — skip remaining steps\n- `fail` — abort the run\n\n### Context Injection\n\nWorkflow runs inject context into agent prompts:\n\n```rust\nstruct WorkflowContext {\n    run_id: WorkflowRunId,\n    workflow_id: WorkflowId,\n    step_name: String,\n    step_index: usize,\n    previous_outputs: HashMap<String, Value>,\n    variables: HashMap<String, Value>,\n}\n```\n\nContext injection can be disabled via agent manifest or step-level override.\n\n## Cron Scheduler (`cron.rs`)\n\nThe `CronScheduler` manages recurring workflow executions using `cron` crate parsing.\n\n```rust\npub fn update_cron_job(\n    &self,\n    workflow_id: &WorkflowId,\n    schedule: &str,\n    context: HashMap<String, String>,\n) -> LibreFangResult<JobId>\n```\n\nNext-run computation uses `compute_next_run_after` to calculate precise UTC timestamps from cron expressions.\n\n## Registry (`registry.rs`)\n\nThe `Registry` maintains the agent catalog with name-based lookup:\n\n```rust\npub fn find_by_name(&self, name: &str) -> Option<AgentInfo>\n```\n\n## Message Routing (`router.rs`)\n\nThe router dispatches incoming messages to agents based on routing rules and inbox state.\n\n## Event Bus (`event_bus.rs`)\n\nA pub/sub system for internal kernel events. External consumers (desktop, runtime) subscribe to receive notifications:\n\n```rust\npub fn subscribe_all(&self, handler: impl Fn(Event) + \'static)\n```\n\n## Configuration (`config.rs`)\n\nKernel configuration is loaded from TOML and validated. Hot-reload support (`config_reload.rs`) allows runtime updates to policies without restart:\n\n```rust\npub fn has_changes(&self) -> bool\n```\n\n## Connections to Other Crates\n\n| Crate | Interaction |\n|-------|-------------|\n| `librefang-runtime` | Calls `KernelHandle` trait methods; receives agent responses via `send_to_agent` |\n| `librefang-api` | Uses `ApprovalManager` (resolve/list), `AuthManager` (authorize), `CronScheduler`, `WorkflowEngine`, `Registry` |\n| `librefang-desktop` | Subscribes to `EventBus` for real-time updates |\n| `librefang-cli` | Loads configuration via `config.rs` |\n| `librefang-hands` | Agents spawned through kernel with hand metadata attached |\n\n## Key Design Decisions\n\n1. **DashMap for concurrent registries** — all submodules use `DashMap` for lock-free concurrent access without poisoning.\n2. **Async/sync separation** — approval uses `tokio::sync::oneshot` for blocking paths; the manager itself is `Sync`.\n3. **TOTP persistence** — lockout state survives daemon restarts via SQLite; lockout window is reconstructed from elapsed time.\n4. **BusyGuard pattern** — background loops clear their busy flag even on panic, preventing permanent blockage.\n5. **Deferred atomic return** — `resolve` returns both the response and deferred payload together, eliminating TOCTOU races.',
                "memory-management":
                    '# Memory Management\n\n# Memory Management Module (`librefang-memory`)\n\nThe `librefang-memory` crate provides the memory substrate for the LibreFang Agent Operating System. It exposes a unified API over three storage backends—structured, semantic, and knowledge graph—all backed by SQLite with optional external vector database support.\n\n## Architecture Overview\n\nThe module is organized in three conceptual layers:\n\n| Layer | Purpose | Backing Store |\n|-------|---------|---------------|\n| **Proactive Memory** | mem0-style API for agents: search, add, get, list | `ProactiveMemoryStore` |\n| **Memory Substrate** | Unified facade over all storage backends | `MemorySubstrate` |\n| **Backend Stores** | Individual stores for structured, semantic, and graph data | SQLite + optional vector DB |\n\n```mermaid\ngraph TB\n    subgraph "Proactive Layer"\n        PM[ProactiveMemoryStore]\n        PMH[ProactiveMemoryHooks]\n    end\n\n    subgraph "Facade"\n        MS[MemorySubstrate]\n    end\n\n    subgraph "Backend Stores"\n        SS[SemanticStore]\n        Str[StructuredStore]\n        KG[KnowledgeStore]\n        US[UsageStore]\n    end\n\n    subgraph "Storage"\n        SQLite[(SQLite)]\n        Vec[VectorStore<br/>HttpVectorStore or<br/>SqliteVectorStore]\n    end\n\n    PM --> PMH\n    PM --> MS\n    PMH --> MS\n    MS --> SS\n    MS --> Str\n    MS --> KG\n    MS --> US\n    SS --> SQLite\n    SS --> Vec\n    Str --> SQLite\n    KG --> SQLite\n    US --> SQLite\n```\n\n## Multi-Level Memory\n\nThe system manages memories at three TTL tiers:\n\n- **USER** (`user_memory`): Permanent user knowledge. Never decays or is auto-deleted. Stores preferences, important facts, and relationship information.\n- **SESSION** (`session_memory`): Session-scoped context. Decays after `session_ttl_days` of no access. Stores ephemeral interaction context.\n- **AGENT** (`agent_memory`): Agent-level knowledge. Decays after `agent_ttl_days` of no access. Stores learned agent behaviors and working context.\n\nEvery memory carries a `confidence` score (0.0–1.0) that decays over time and is boosted by repeated access.\n\n## Key Components\n\n### MemorySubstrate (`substrate.rs`)\n\nThe central facade that orchestrates all stores. Provides:\n\n- **KV operations**: `set`, `get`, `delete` for structured key-value data\n- **Session management**: `create_session`, `get_session`, `save_session`, `search_sessions`\n- **Semantic memory**: `remember`, `remember_with_embedding_async`, `recall`, `recall_with_embedding`\n- **Agent registry**: `save_agent`, `load_agent`, `load_all_agents`\n- **Task queue**: `task_post`, `task_claim`, `task_complete`, `task_list`\n- **Canonical sessions**: Cross-channel persistent memory via `append_canonical`, `canonical_context`\n\n### SemanticStore (`semantic.rs`)\n\nHandles embedding-backed memory storage and retrieval. Supports two search modes:\n\n1. **Vector search**: When an embedding driver is provided, uses cosine similarity against stored vectors\n2. **LIKE fallback**: When no embedding driver is available, searches using SQL `LIKE` on text content\n\nKey operations:\n- `remember_with_embedding`: Store a memory with its embedding\n- `recall_with_embedding`: Search using a query embedding\n- `update_content`: In-place content update preserving ID, scope, and access statistics\n- `forget_session_older_than_global`: Batch soft-delete of session memories\n\n### StructuredStore (`structured.rs`)\n\nKey-value store for per-agent structured data. Backed by the `kv_store` SQLite table. Supports typed JSON values and version tracking.\n\n### KnowledgeStore (`knowledge.rs`)\n\nGraph store for entities and relations. Backed by `entities` and `relations` SQLite tables. Supports pattern queries via `GraphPattern` with optional source, relation type, and target filters.\n\nThe store resolves entity references by both ID and name, handling the common case where MCP tools create relations referencing entities by name rather than UUID.\n\n### Knowledge Graph Entities and Relations\n\nThe knowledge graph stores structured facts extracted from conversations:\n\n```rust\n// Entities: people, organizations, concepts\nEntity {\n    id: String,\n    entity_type: EntityType,  // Person, Organization, Concept, Custom\n    name: String,\n    properties: HashMap<String, JsonValue>,\n    created_at: DateTime<Utc>,\n    updated_at: DateTime<Utc>,\n}\n\n// Relations: directed edges between entities\nRelation {\n    source: String,  // entity ID or name\n    relation: RelationType,  // WorksAt, Knows, RelatedTo, etc.\n    target: String,\n    properties: HashMap<String, JsonValue>,\n    confidence: f32,\n    created_at: DateTime<Utc>,\n}\n```\n\n### ProactiveMemoryStore (`proactive.rs`)\n\nA mem0-style wrapper over `MemorySubstrate` that provides a simpler API:\n\n```rust\n// Search memories semantically\nlet results = store.search("preferences", user_id, 10).await?;\n\n// Add a memory with automatic deduplication\nstore.add(&[json!({"role": "user", "content": "I prefer dark mode"})], user_id).await?;\n\n// Auto-retrieve relevant memories before agent execution\nlet context = store.auto_retrieve(user_id, query).await?;\n\n// Auto-memorize after agent decisions\nstore.auto_memorize(user_id, agent_id, decision).await?;\n```\n\n**Auto-deduplication flow**: Before adding a memory, the store searches for similar existing memories. The `MemoryExtractor` trait decides whether to `Add`, `Update`, or `Noop`:\n\n- **Noop**: Skip if a very similar memory (>90% text similarity) already exists\n- **Add**: Store as a new memory\n- **Update**: Merge into an existing memory, preserving a version history chain\n\n**Conflict detection**: When updating, the store checks whether the update is a refinement or a contradiction. Contradictory updates are flagged with `conflict_detected: true` in metadata.\n\n### Text Chunker (`chunker.rs`)\n\nSplits long documents into overlapping chunks suitable for embedding:\n\n1. Split on paragraph boundaries (`\\n\\n`) first\n2. If a paragraph exceeds `max_size`, split on sentence boundaries (`. `, `。`, `？`, `！`)\n3. If a sentence still exceeds `max_size`, hard-split at character boundaries (respecting UTF-8)\n\nOverlap is applied by prepending the last `overlap` characters of the previous chunk. The chunker properly handles Unicode (Chinese, emoji) via char-based iteration.\n\n### Consolidation Engine (`consolidation.rs`)\n\nReduces storage and improves retrieval quality by merging similar memories:\n\n1. **Decay phase**: Reduce confidence of memories not accessed in 7 days\n2. **Merge phase**: Soft-delete memories with >90% text similarity to a higher-confidence memory\n\nThe merge is capped at 100 merges per consolidation run to avoid O(n²) blowup on large stores.\n\n### Time-Based Decay (`decay.rs`)\n\nHard-deletes memories past their TTL:\n\n- **SESSION** scope: Deleted if not accessed for `session_ttl_days`\n- **AGENT** scope: Deleted if not accessed for `agent_ttl_days`\n- **USER** scope: Never automatically deleted\n\nAccessing a memory (via `recall_with_embedding`) resets the `accessed_at` timestamp, preventing decay.\n\n### Vector Store Implementations\n\nTwo `VectorStore` implementations exist:\n\n**SqliteVectorStore** (`semantic.rs`): Stores embeddings as BLOBs in the SQLite `memories` table. Suitable for single-node deployments.\n\n**HttpVectorStore** (`http_vector_store.rs`): Delegates to a remote HTTP service (Qdrant, Weaviate, custom microservice). Expected API:\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| POST | `/insert` | Store embedding |\n| POST | `/search` | Query by embedding |\n| DELETE | `/delete` | Remove embedding |\n| POST | `/get_embeddings` | Batch retrieval |\n\n### Session Management (`session.rs`)\n\nManages conversation history with support for:\n\n- **Per-session storage**: Messages stored as JSON blobs in SQLite\n- **Full-text search**: FTS5 virtual table (`sessions_fts`) for semantic session lookup\n- **Canonical sessions**: Cross-channel persistent memory that survives session boundaries\n- **Compaction**: Summarizes old messages to stay within context window limits\n- **TTL enforcement**: `cleanup_expired_sessions` removes sessions past `session_ttl_days`\n\n### Usage Tracking (`usage.rs`)\n\nRecords token usage and cost per agent per model. Used for metering and billing. Tables: `usage_events` with columns for `input_tokens`, `output_tokens`, `cost_usd`, `latency_ms`.\n\n### Schema Migrations (`migration.rs`)\n\n18 migrations bring the database from initial schema to current version:\n\n- **v1**: Core tables (agents, sessions, events, kv_store, task_queue, memories, entities, relations)\n- **v3**: Add `embedding` column to memories for vector search\n- **v5**: Canonical sessions for cross-channel memory\n- **v9**: Performance indexes for proactive memory queries\n- **v10**: Add `agent_id` to entities and relations for per-agent cleanup\n- **v12**: FTS5 virtual table for full-text session search\n- **v13**: Prompt versioning and A/B testing tables\n- **v15**: Multimodal memory (image URL, image embedding, modality)\n- **v16**: `peer_id` for per-user isolation\n- **v17**: Persistent approval audit log\n- **v18**: TOTP lockout tracking\n\n## Proactive Memory Lifecycle\n\nThe proactive memory hooks integrate with the agent loop:\n\n```mermaid\nsequenceDiagram\n    participant AL as Agent Loop\n    participant PMH as ProactiveMemoryHooks\n    participant PMS as ProactiveMemoryStore\n    participant SS as SemanticStore\n    participant KG as KnowledgeStore\n\n    AL->>PMH: before_agent_run(context)\n    PMH->>PMS: auto_retrieve(user_id, query)\n    PMS->>SS: recall_with_embedding()\n    SS-->>PMS: relevant memories\n    PMS-->>PMH: injected context\n\n    AL->>PMH: after_agent_decision(decision)\n    PMH->>PMS: auto_memorize()\n    PMS->>PMS: add_with_decision()\n    alt Add/Update\n        PMS->>SS: remember_with_embedding()\n        PMS->>SS: update_content()\n        PMS->>KG: store_relations()\n    else Noop\n        Note over PMS: Skip (duplicate)\n    end\n\n    alt Every 10 calls\n        PMS->>SS: consolidate()\n    end\n```\n\n**Rate-limited maintenance**: Decay and session cleanup run at most once per hour, even when called on every request.\n\n## Configuration\n\nKey configuration options in `ProactiveMemoryConfig`:\n\n| Field | Default | Purpose |\n|-------|---------|---------|\n| `max_memories_per_agent` | 0 (unlimited) | Cap on memories per agent |\n| `session_ttl_hours` | 0 (disabled) | Session memory TTL |\n| `confidence_decay_rate` | 0.0 (disabled) | Exponential decay rate for unaccessed memories |\n\n## Connecting to the Rest of the Codebase\n\n**Agent Loop Integration** (`librefang-runtime/src/agent_loop.rs`):\n- `remember_interaction_best_effort`: Stores user/assistant message pairs\n- `save_session_async`: Persists session after each turn\n- `setup_recalled_memories`: Injects `auto_retrieve` results into context\n\n**Context Engine** (`librefang-runtime/src/context_engine.rs`):\n- `ingest`: Calls `recall_with_embedding_async` to pull relevant memories\n- `remember`: Direct `remember` call for specific facts\n\n**Proactive Memory Initialization** (`librefang-runtime/src/proactive_memory.rs`):\n- `init_proactive_memory_full`: Creates store with custom extractor and embedding driver\n\n**HTTP Routes** (`src/routes/memory.rs`):\n- `memory_delete`, `memory_update`: Use `find_agent_id_for_memory` → `get_by_id` to locate and modify memories\n\n**Knowledge Graph via MCP** (`src/routes/memory.rs`):\n- `knowledge_add_relation`: Adds entities and relations via `KnowledgeStore`\n- `knowledge_query`: Pattern-based graph queries',
                "migration-tools":
                    '# Migration Tools\n\n# Migration Tools Module\n\nThe `librefang-migrate` crate handles importing agents, configuration, memory, sessions, and channel settings from external agent frameworks into LibreFang. It is the primary onboarding path for users switching from OpenClaw, OpenFang, or other compatible frameworks.\n\n## Overview\n\nMigration is a one-time, directional process: source frameworks export configuration and state, which this module transforms into LibreFang\'s TOML-based format. The migration is designed to be **safe and informative** — it produces a detailed report of what was imported, what was skipped, and any warnings encountered along the way.\n\n### Supported Sources\n\n| Source | Status | Config Format |\n|--------|--------|---------------|\n| OpenClaw | ✅ Full support | JSON5 (`openclaw.json`) or legacy YAML |\n| OpenFang | ✅ Full support | Same as OpenClaw JSON5 |\n| LangChain | ❌ Planned | — |\n| AutoGPT | ❌ Planned | — |\n\n### What Gets Migrated\n\n| Item | JSON5 Migration | Legacy YAML Migration |\n|------|-----------------|----------------------|\n| Global config | ✅ | ✅ |\n| Agents | ✅ | ✅ |\n| Memory (MEMORY.md) | ✅ | ✅ |\n| Session logs (JSONL) | ✅ | ❌ |\n| Workspace directories | ✅ | ✅ |\n| Messaging channels (13+ adapters) | ✅ | ✅ |\n| Tool profiles | ✅ | ✅ |\n| Fallback models | ✅ | ❌ |\n\n### What Is Skipped\n\nThe following are intentionally not migrated. Each generates a warning in the migration report:\n\n- **Cron jobs** — LibreFang uses `ScheduleMode::Periodic` instead\n- **Webhook hooks** — Use LibreFang\'s event system\n- **Auth profiles / credentials** — Exported for security; set as environment variables\n- **Vector index database** — LibreFang rebuilds embeddings on first run\n- **Skills** — Must be reinstalled via `librefang skill install`\n- **iMessage channel** — macOS-only; requires manual setup\n- **BlueBubbles channel** — No LibreFang adapter available\n\n## Architecture\n\nThe module is split into four source files:\n\n```\nlibrefang-migrate/\n├── lib.rs        # Public API: MigrateOptions, MigrateSource, run_migration\n├── openclaw.rs   # OpenClaw migration logic (JSON5 + legacy YAML)\n├── openfang.rs   # OpenFang migration logic\n└── report.rs     # MigrationReport and Markdown output\n```\n\n```mermaid\ngraph TD\n    A[run_migration] --> B{Source type}\n    B -->|OpenClaw| C[openclaw::migrate]\n    B -->|OpenFang| D[openfang::migrate]\n    B -->|Other| E[Unsupported error]\n    \n    C --> C1[migrate_from_json5]\n    C --> C2[migrate_from_legacy_yaml]\n    \n    C1 --> C1a[migrate_config_from_json]\n    C1 --> C1b[migrate_agents_from_json]\n    C1 --> C1c[migrate_channels_from_json]\n    C1 --> C1d[migrate_memory_files]\n    C1 --> C1e[migrate_workspace_dirs]\n    C1 --> C1f[migrate_sessions]\n    \n    C2 --> C2a[migrate_legacy_config]\n    C2 --> C2b[migrate_legacy_agents]\n    C2 --> C2c[parse_legacy_channels]\n    \n    C1b --> F[convert_agent_from_json]\n    C2b --> G[convert_legacy_agent]\n    \n    C1a --> H[LibreFangConfig TOML]\n    F --> H\n    G --> H\n    C1c --> H\n    \n    H --> I[MigrationReport]\n    \n    I --> J[Markdown report file]\n    I --> K[API caller]\n```\n\n## Public API\n\n### `MigrateOptions`\n\n```rust\npub struct MigrateOptions {\n    pub source: MigrateSource,        // Which framework to migrate from\n    pub source_dir: PathBuf,          // Path to source workspace\n    pub target_dir: PathBuf,         // LibreFang home directory\n    pub dry_run: bool,               // Preview mode — no files written\n}\n```\n\n### `run_migration`\n\n```rust\npub fn run_migration(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>\n```\n\nEntry point for all migrations. Dispatches to the appropriate source handler and returns a structured report.\n\n### Auto-Detection\n\n```rust\npub fn detect_openclaw_home() -> Option<PathBuf>\npub fn scan_openclaw_workspace(path: &Path) -> ScanResult\n```\n\nThese functions support the init wizard and config UI. `detect_openclaw_home()` searches standard locations:\n\n```text\n~/.openclaw/            (modern)\n~/.clawdbot/            (legacy)\n~/.moldbot/             (legacy)\n~/.moltbot/             (legacy)\n~/.config/openclaw/     (XDG)\n%APPDATA%/openclaw/     (Windows)\n%LOCALAPPDATA%/openclaw/\n```\n\nThe `OPENCLAW_STATE_DIR` environment variable overrides auto-detection.\n\n## OpenClaw Workspace Structure\n\nModern OpenClaw uses a **single JSON5 config file** at `~/.openclaw/openclaw.json` that contains everything:\n\n```text\n~/.openclaw/\n├── openclaw.json           # JSON5 — all config lives here\n├── auth-profiles.json      # Auth credentials (NOT migrated)\n├── sessions/               # JSONL conversation logs\n│   ├── main.jsonl\n│   └── agent:coder:main.jsonl\n├── memory/                 # Per-agent MEMORY.md files\n│   ├── default/MEMORY.md\n│   └── coder/MEMORY.md\n├── memory-search/          # SQLite vector index (NOT migrated)\n├── skills/                 # Installed skills (NOT migrated)\n├── cron/                   # Cron state (NOT migrated)\n├── hooks/                  # Webhook hooks (NOT migrated)\n└── workspaces/             # Per-agent working directories\n    └── coder/\n```\n\nLegacy OpenClaw (very old installs) used a **YAML-based structure**:\n\n```text\n~/.moldbot/\n├── config.yaml             # Global config\n├── agents/\n│   └── coder/\n│       ├── agent.yaml      # Per-agent config\n│       ├── MEMORY.md\n│       ├── sessions/\n│       └── workspace/\n├── messaging/\n│   ├── telegram.yaml\n│   └── discord.yaml\n└── skills/\n```\n\n## Agent Migration\n\n### Tool Profile Mapping\n\nOpenClaw tool profiles map to LibreFang `ToolProfile` values:\n\n| OpenClaw Profile | LibreFang Profile | Tools Included |\n|------------------|-------------------|----------------|\n| `minimal` | `minimal` | Minimal set |\n| `coding`, `coder`, `developer`, `dev` | `coding` | Read, Write, Bash, etc. |\n| `research`, `researcher` | `research` | Web search, fetch, etc. |\n| `messaging`, `chat` | `messaging` | Messaging tools |\n| `automation`, `automator` | `automation` | Automation tools |\n| `custom` | `custom` | Custom profile |\n| (unknown) | `full` | All tools |\n\nThe `tools_for_profile()` function delegates to `librefang_types::agent::ToolProfile` to ensure migration and kernel use identical definitions.\n\n### Tool Name Compatibility\n\nThe migration uses `librefang_types::tool_compat` to handle tool name differences:\n\n- `Read` → `file_read` (if recognized by LibreFang)\n- `Write` → `file_write`\n- `Bash` → `shell_exec`\n- `WebSearch` → `web_search`\n- Unknown tools → logged as warnings\n\n### Capability Derivation\n\nThe `derive_capabilities()` function infers LibreFang capability grants from the tool list:\n\n| Tool | Capability Granted |\n|------|-------------------|\n| `*` (wildcard) | Full shell, network, agent_message, agent_spawn |\n| `shell_exec` | `shell = ["*"]` |\n| `web_fetch`, `web_search`, `browser_navigate` | `network = ["*"]` |\n| `agent_send`, `agent_list` | `agent_message = ["*"]`, `agent_spawn = true` |\n\n### Identity / System Prompt Extraction\n\nOpenClaw\'s `identity` field is flexible — it can be a raw string or a structured object. The migration searches for common prompt-bearing keys:\n\n```\nsystemPrompt, system_prompt, prompt, instructions, instruction,\ncontent, text, value, persona, identity, description\n```\n\nIf identity is empty or missing, a default prompt is generated.\n\n### Per-Agent Configuration Preserved\n\nSeveral per-agent settings that were previously dropped are now correctly migrated:\n\n- **`tool_blocklist`** — Previously silently dropped, causing widened tool access\n- **`workspace`** — Custom working directory path\n- **`skills`** — Per-agent skill allowlist\n\n## Channel Migration\n\nLibreFang supports 13+ messaging channel adapters. The migration maps each to LibreFang\'s TOML format:\n\n| Channel | OpenClaw Field | LibreFang Mapping |\n|---------|---------------|-------------------|\n| Telegram | `botToken` | `channels.telegram.bot_token_env` |\n| Discord | `token` | `channels.discord.bot_token_env` |\n| Slack | `botToken`, `appToken` | `channels.slack.bot_token_env`, `app_token_env` |\n| WhatsApp | `authDir` (Baileys) | Credentials copied to `credentials/` |\n| Signal | `httpUrl`, `httpHost` | `channels.signal.api_url` |\n| Matrix | `accessToken` | `channels.matrix.access_token_env` |\n| Google Chat | `serviceAccountFile` | Copied to `credentials/google_chat_sa.json` |\n| MS Teams | `appPassword` | `channels.teams.app_password_env` |\n| IRC | `host`, `port`, `nick`, `password` | `channels.irc` fields |\n| Mattermost | `botToken` | `channels.mattermost.token_env` |\n| Feishu | `appId`, `appSecret` | `channels.feishu.app_id`, `app_secret_env` |\n| iMessage | `cliPath` | Skipped (macOS-only) |\n| BlueBubbles | — | Skipped (no adapter) |\n\n### Policy Mapping\n\nOpenClaw\'s DM and group policies map to LibreFang equivalents:\n\n**DM Policy:**\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `open` | `respond` |\n| `allowlist` / `allow_list` | `allowed_only` |\n| `pairing` / `disabled` | `ignore` |\n\n**Group Policy:**\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `open` / `all` | `all` |\n| `mention` / `mention_only` | `mention_only` |\n| `commands` / `commands_only` / `slash_only` | `commands_only` |\n| `disabled` / `ignore` | `ignore` |\n\n### Secrets Handling\n\nAPI tokens and credentials are **never written to TOML files**. Instead, they are:\n\n1. Extracted from the source config\n2. Written to `secrets.env` with restricted permissions (`0o600` on Unix)\n3. Referenced in `config.toml` via `*_env` fields (e.g., `bot_token_env = "TELEGRAM_BOT_TOKEN"`)\n\nOn Unix systems, file permissions are restricted after writing to prevent other users from reading secrets.\n\n### Limitations\n\nSome OpenClaw `allow_from` fields cannot be auto-migrated:\n\n- **Slack** — Uses per-user allowlists; LibreFang has only `allowed_channels`\n- **Matrix** — Uses `allow_from` for users; LibreFang has only `allowed_rooms`\n- **Teams** — Uses `allow_from` for users; LibreFang has only `allowed_tenants`\n- **IRC** — No per-user allowlist field in LibreFang\n\nThese generate warnings in the migration report.\n\n## Provider Mapping\n\nOpenClaw provider names map to LibreFang providers:\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `anthropic`, `claude` | `anthropic` |\n| `openai`, `gpt` | `openai` |\n| `groq` | `groq` |\n| `ollama` | `ollama` |\n| `openrouter` | `openrouter` |\n| `deepseek` | `deepseek` |\n| `together` | `together` |\n| `mistral` | `mistral` |\n| `fireworks` | `fireworks` |\n| `google`, `gemini` | `google` |\n| `xai`, `grok` | `xai` |\n| `cerebras` | `cerebras` |\n| `sambanova` | `sambanova` |\n\nUnknown providers pass through unchanged.\n\nDefault API key environment variables are derived per provider (e.g., `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`, etc.). Ollama requires no API key.\n\n## Migration Report\n\nAfter migration, a `migration_report.md` is written to the target directory:\n\n```markdown\n# Migration Report\n\n**Source:** OpenClaw  \n**Date:** 2024-01-15 10:30:00 UTC  \n**Dry run:** false\n\n## Imported (24 items)\n\n| Kind | Name | Destination |\n|------|------|-------------|\n| Config | openclaw.json | config.toml |\n| Agent | coder | agents/coder/agent.toml |\n| Agent | researcher | agents/researcher/agent.toml |\n| Channel | telegram | config.toml [channels.telegram] |\n| Channel | discord | config.toml [channels.discord] |\n| Memory | coder/MEMORY.md | agents/coder/imported_memory.md |\n| ... | ... | ... |\n\n## Skipped (8 items)\n\n| Kind | Name | Reason |\n|------|------|--------|\n| Skill | web-scraper | Skills must be reinstalled via `librefang skill install` |\n| Config | auth-profiles | Auth profiles not migrated for security |\n| Channel | imessage | macOS-only channel |\n| Channel | bluebubbles | No LibreFang adapter available |\n| ... | ... | ... |\n\n## Warnings (3 items)\n\n- Agent \'coder\': tool \'unknown-tool\' has no LibreFang equivalent\n- WhatsApp Baileys credentials copied — you may need to re-authenticate\n- Matrix: OpenClaw \'allow_from\' could not be auto-mapped\n```\n\n## Error Handling\n\n`MigrateError` variants:\n\n```rust\npub enum MigrateError {\n    SourceNotFound(PathBuf),           // Source directory doesn\'t exist\n    ConfigParse(String),               // Failed to parse config.yaml\n    AgentParse(String),               // Failed to parse agent.yaml\n    Io(std::io::Error),               // File system errors\n    Yaml(serde_yaml::Error),          // YAML parse errors\n    Json5Parse(String),               // JSON5 parse errors\n    TomlSerialize(toml::ser::Error),  // TOML output errors\n    UnsupportedSource(String),         // Unknown/unsupported source framework\n}\n```\n\n## Usage\n\n### From the CLI\n\n```bash\nlibrefang migrate --source openclaw --source-dir ~/.openclaw --target-dir ~/.librefang\nlibrefang migrate --source openfang --source-dir ~/.openfang --target-dir ~/.librefang --dry-run\n```\n\n### From the Init Wizard\n\nThe TUI init wizard (`tui/screens/init_wizard.rs`) uses `detect_openclaw_home()` and `scan_openclaw_workspace()` to offer one-click migration during setup.\n\n### Programmatically\n\n```rust\nuse librefang_migrate::{run_migration, MigrateOptions, MigrateSource};\n\nlet options = MigrateOptions {\n    source: MigrateSource::OpenClaw,\n    source_dir: PathBuf::from("~/.openclaw"),\n    target_dir: PathBuf::from("~/.librefang"),\n    dry_run: true,\n};\n\nlet report = run_migration(&options)?;\nprintln!("{}", report.to_markdown());\n```\n\n## Integration Points\n\nThe migration module is called from:\n\n| Caller | Purpose |\n|--------|---------|\n| `librefang-cli/src/main.rs` | `cmd_migrate` command |\n| `tui/screens/init_wizard.rs` | Auto-detect and offer migration during setup |\n| `src/routes/config.rs` | Web UI migration endpoints |\n| `xtask/src/migrate.rs` | Internal development tooling |\n\n## Security Considerations\n\n1. **Credentials never go to TOML** — All tokens are written to `secrets.env` and referenced by environment variable name.\n\n2. **Restricted file permissions** — `secrets.env` is created with `0o600` permissions on Unix systems, preventing other users from reading it.\n\n3. **Auth profiles not migrated** — OpenClaw\'s `auth-profiles.json` contains raw API keys and OAuth tokens. This file is explicitly skipped and a warning is generated. Users must set credentials as environment variables.\n\n4. **Vector index not migrated** — The SQLite database containing vector embeddings is not portable. LibreFang rebuilds the index on first run with the migrated memory files.\n\n5. **WhatsApp credentials** — Baileys session data is copied but users may need to re-authenticate after migration due to device linkage differences.',
                other: '# Other\n\n# Other Module\n\nThis module contains miscellaneous infrastructure components that support the documentation site and web presence but don\'t belong to other specific feature modules. It includes URL redirects for backward compatibility, the main site header component, and Cloudflare Workers for analytics tracking.\n\n## Module Structure\n\n```\ndocs/public/_redirects              # URL redirect rules for backward compatibility\ndocs/src/components/Header.tsx      # Site-wide header component\nweb/workers/github-stats-worker/    # Cloudflare Worker for GitHub statistics\nweb/workers/visit-counter-worker/   # Cloudflare Worker for visit tracking\n```\n\n---\n\n## URL Redirects (`docs/public/_redirects`)\n\n### Purpose\n\nWhen the documentation site restructured its URLs from flat, top-level paths to a hierarchical group-based organization (April 2026), existing bookmarks and external links would break. This redirect configuration ensures all old URLs continue working by mapping them to their new hierarchical locations.\n\n### Redirect Format\n\nThe file uses [Netlify\'s redirect format](https://docs.netlify.com/routing/redirects/), where each line specifies a source path, destination path, and HTTP status code:\n\n```\n/old-path    /new-path    301\n```\n\n### Redirect Groups\n\nThe redirects are organized into logical groups matching the new documentation hierarchy:\n\n| Group | Old Prefix | New Prefix | Purpose |\n|-------|-----------|------------|---------|\n| Getting Started | `/librefang`, `/roadmap`, `/examples`, `/glossary`, `/comparison` | `/getting-started/*` | Core docs entry points |\n| Configuration | `/providers`, `/providers/*` | `/configuration/providers*` | Provider configuration |\n| Architecture | `/security` | `/architecture/security` | Security documentation |\n| Agent | `/agents`, `/hands`, `/memory`, `/skills`, `/plugins`, `/prompt-intelligence`, `/workflows` | `/agent/*` | Agent-related docs |\n| Integrations | `/channels`, `/api`, `/sdk`, `/cli`, `/android-termux`, `/mcp-a2a`, `/migration`, `/desktop`, `/development` | `/integrations/*` | External integrations |\n| Operations | `/troubleshooting`, `/production`, `/faq` | `/operations/*` | Deployment and operations |\n| Chinese locale | `/zh/*` | `/zh/getting-started/*`, etc. | zh-Hans translations |\n\n### Key Rules\n\n```nginx\n# Exact matches must come before wildcards\n/providers              /configuration/providers         301\n/providers/*            /configuration/providers/:splat  301\n```\n\nThe wildcard rule with `:splat` captures any path segments beyond `/providers/` and appends them to the destination.\n\n---\n\n## Header Component (`docs/src/components/Header.tsx`)\n\n### Purpose\n\nThe `Header` component provides the persistent top navigation bar across all documentation pages. It integrates search, navigation, language switching, and theme controls.\n\n### Component Architecture\n\n```mermaid\ngraph TD\n    Header --> Search\n    Header --> MobileNavigation\n    Header --> Logo\n    Header --> ThemeToggle\n    Header --> LangSwitch\n    Header -.-> useMobileNavigationStore\n    Header -.-> useIsInsideMobileNavigation\n    \n    LangSwitch --> usePathname\n    Header --> useScroll\n```\n\n### Key Features\n\n#### Scroll-Based Blur Effect\n\nThe header applies a dynamic backdrop blur that increases as the user scrolls:\n\n```typescript\nconst { scrollY } = useScroll();\nconst bgOpacityLight = useTransform(scrollY, [0, 72], ["50%", "90%"]);\nconst bgOpacityDark = useTransform(scrollY, [0, 72], ["20%", "80%"]);\n```\n\nAt scroll position 0, the background is 50% opaque (light) / 20% (dark). By 72px scroll depth, it reaches 90% / 80% opacity. This creates a smooth transition from transparent to solid as content scrolls beneath.\n\n#### Language Switching\n\nThe `LangSwitch` component detects the current locale from the pathname and toggles between English and Chinese:\n\n```typescript\n// English path: /getting-started/overview\n// Chinese path:  /zh/getting-started/overview\n\nif (isZh) {\n  targetPath = pathname.replace(/^\\/zh/, "") || "/";\n} else {\n  targetPath = `/zh${pathname === "/" ? "" : pathname}`;\n}\n```\n\n#### Responsive Behavior\n\n| Breakpoint | Behavior |\n|------------|----------|\n| Mobile | Logo, mobile nav, search, language/theme toggles visible |\n| Desktop (md+) | Full navigation links, condensed toolbar |\n\nThe header shifts from a centered layout on mobile to a left-aligned sidebar-connected layout on larger screens (`lg:left-72 xl:left-80`).\n\n### Props\n\nThe component forwards refs and additional props to the underlying `motion.div` for animation support, making it compatible with scroll-based entrance animations.\n\n---\n\n## Cloudflare Workers\n\n### GitHub Stats Worker\n\n**Location:** `web/workers/github-stats-worker/`\n\nA scheduled Cloudflare Worker that fetches repository statistics from GitHub\'s API daily and caches them in a KV namespace.\n\n**Configuration:**\n- **Cron trigger:** Runs daily at 00:00 UTC\n- **KV binding:** `KV` namespace for cached statistics\n- **Purpose:** Provides stars, forks, and other metrics for the documentation site without rate-limiting GitHub\'s API\n\n### Visit Counter Worker\n\n**Location:** `web/workers/visit-counter-worker/`\n\nA Cloudflare Worker that tracks page visits by incrementing counters stored in a KV namespace.\n\n**Configuration:**\n- **KV binding:** `VISIT_COUNTER` namespace for persistence\n- **Purpose:** Anonymously tracks documentation page views for analytics\n\n### Worker Architecture Pattern\n\nBoth workers follow a common pattern:\n\n```mermaid\nsequenceDiagram\n    participant Cron as Cron Trigger\n    participant Worker as CF Worker\n    participant KV as KV Namespace\n    \n    Cron->>Worker: Scheduled event\n    Worker->>GitHub or Visit Data\n    Worker->>KV: Store/update\n```\n\nWorkers use Cloudflare\'s edge runtime, enabling:\n- **Global distribution** — Workers run at edge locations near users\n- **Durable storage** — KV namespaces persist data across invocations\n- **Cost efficiency** — Scheduled workers have minimal compute costs\n\n---\n\n## Integration Points\n\n| Component | Connects To | Purpose |\n|-----------|-------------|---------|\n| `Header.tsx` | `MobileNavigation` | Mobile menu state management |\n| `Header.tsx` | `Search` | Documentation search |\n| `Header.tsx` | `ThemeToggle` | Dark/light mode |\n| `Header.tsx` | `withPrefix` | Locale-aware URL generation |\n| `Header.tsx` | `usePathname` | Route detection for locale |\n| `_redirects` | Netlify CDN | Production redirect handling |\n| Workers | Cloudflare KV | Data persistence |\n| Workers | External APIs | GitHub stats retrieval |\n\n---\n\n## Contribution Notes\n\nWhen adding new documentation pages:\n1. **Add redirects** if the URL pattern changes — follow the existing format with exact matches before wildcards\n2. **Update Header nav** if adding a major top-level section — the header lists primary navigation destinations\n3. **Consider locale parity** — both English and Chinese redirect patterns should be maintained',

                    '# librefang — Wiki\n\n# LibreFang\n\nLibreFang is an open-source Agent Operating System built in Rust. It provides a complete platform for running, orchestrating, and extending AI agents — with built-in support for 40+ messaging channels, autonomous capability packages (called Hands), a pluggable skills system, and multi-peer agent networking.\n\n## Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph "Client Layer"\n        CLI[librefang-cli]\n        Dashboard[Dashboard]\n        Desktop[librefang-desktop]\n        SDKs[SDKs]\n    end\n\n    subgraph "Core Platform"\n        APIServer[librefang-api]\n        KernelCore[librefang-kernel]\n        Runtime[librefang-runtime]\n        Memory[librefang-memory]\n        Types[librefang-types]\n    end\n\n    subgraph "Integration Layer"\n        Channels[librefang-channels]\n        Extensions[librefang-extensions]\n        Wire[librefang-wire]\n    end\n\n    CLI --> APIServer\n    Dashboard --> APIServer\n    Desktop --> APIServer\n    SDKs --> APIServer\n\n    APIServer --> KernelCore\n    APIServer --> Runtime\n    APIServer --> Memory\n\n    KernelCore --> Runtime\n    KernelCore --> Memory\n\n    Runtime --> Types\n    KernelCore --> Types\n    Memory --> Types\n\n    Channels --> Runtime\n    Extensions --> Runtime\n    Wire --> Runtime\n```\n\n## How It Fits Together\n\n**librefang-kernel** is the central orchestrator. It manages the complete lifecycle of agents — spawning, scheduling, permission enforcement, and message routing. It exposes a trait-based interface consumed by everything else.\n\n**librefang-runtime** is the execution engine. It receives messages, drives LLM inference, executes tools, and manages agent sessions. The runtime handles sandboxing, plugin loading, and MCP protocol communication.\n\n**librefang-api** is the HTTP/WebSocket interface. The same binary that runs the daemon also serves the web-based Dashboard and the API consumed by CLI, SDKs, and external integrations.\n\n**librefang-memory** provides the memory substrate — a unified API over structured storage, semantic search, and knowledge graphs, all backed by SQLite with optional external vector database support.\n\n**librefang-channels** bridges 40+ messaging platforms (Slack, Discord, WhatsApp, Matrix, and many others) into the kernel. Each adapter normalizes platform-specific messages into a unified format and routes them to the appropriate agent.\n\n**librefang-extensions** handles MCP server integration — discovery, authentication, OAuth flows, health monitoring, and automatic reconnection. This is how you add external tools and capabilities to your agents.\n\n**librefang-wire** implements OFP (OpenFang Protocol), the peer-to-peer networking layer that lets agents on different machines discover each other and exchange messages over TCP with HMAC authentication.\n\n**librefang-cli** is the primary command-line interface for operating the daemon, spawning agents, managing channels, and configuring the system.\n\n**librefang-hands** provides autonomous capability packages — pre-built agent configurations you activate from a marketplace. Unlike regular agents you chat with, Hands run in the background and you check in on them periodically.\n\n**librefang-skills** offers a pluggable architecture for extending agent capabilities through tools, prompt context injection, and sandboxed code execution.\n\n**librefang-types** is the canonical source of truth for all shared data structures. Every crate in the workspace depends on these types — they define the shapes of data, serialization contracts, and validation rules without any business logic.\n\n## Key End-to-End Flows\n\n**Agent Message Flow**: When a message arrives via a channel adapter → it enters the runtime → the agent loop processes it through the LLM driver → tool calls are executed → responses flow back through the same channel adapter to the original user.\n\n**API Request Flow**: CLI, Dashboard, or SDK → librefang-api HTTP server → kernel handle → kernel core orchestration → runtime execution → memory operations → response back up the chain.\n\n**MCP Tool Call Flow**: Runtime agent loop → MCP client → MCP server (via extensions system) → tool result → agent continues processing.\n\n## Getting Started\n\nAfter cloning the repository:\n\n```bash\n# Build the workspace\ncargo build --release\n\n# Initialize configuration\n./target/release/librefang init\n\n# Start the daemon\n./target/release/librefang start\n\n# Spawn your first agent\n./target/release/librefang agent create --name my-agent\n```\n\nOr use the [Desktop Application](librefang-desktop.md) for a native GUI experience on Windows, macOS, or Linux.\n\n## Project Structure\n\n```\ncrates/\n├── librefang-types/      # Shared data types and validation\n├── librefang-memory/     # Memory substrate (vector, graph, structured)\n├── librefang-runtime/    # Agent execution engine\n├── librefang-kernel/     # Core orchestrator\n├── librefang-api/        # HTTP/WebSocket API server\n├── librefang-cli/        # Command-line interface\n├── librefang-channels/   # Channel bridge (40+ platforms)\n├── librefang-skills/     # Skills system\n├── librefang-extensions/ # MCP server integration\n├── librefang-hands/      # Autonomous capability packages\n├── librefang-wire/       # OFP peer-to-peer protocol\n├── librefang-migrate/    # Migration tools\n└── librefang-telemetry/  # Observability infrastructure\n```\n\n## Where to Go Next\n\n- **[Kernel Core](librefang-kernel.md)** — Understand how agents are orchestrated\n- **[Runtime Engine](librefang-runtime.md)** — Deep dive into agent execution\n- **[API Server](librefang-api.md)** — Explore the HTTP interface and endpoints\n- **[CLI](librefang-cli.md)** — Command-line operations reference\n- **[Dashboard](dashboard.md)** — Web UI for managing LibreFang\n- **[Extensions System](librefang-extensions.md)** — Adding MCP server integrations\n- **[Channels](librefang-channels.md)** — Connecting messaging platforms\n- **[Deployment](deploy-fly.md)** — Deploy to Fly.io, GCP, or Docker',

                    "# Runtime Engine\n\n\n# Runtime Engine\n\nThe runtime engine (`librefang-runtime`) is the execution core of LibreFang. It manages the agent lifecycle — from receiving a message through LLM inference, tool execution, and session persistence — while providing isolation, safety, and extensibility through sandboxing, plugins, and the MCP protocol.\n\n## Module Overview\n\nThe crate exposes a single library target with a flat module structure. Key domains:\n\n| Domain | Modules |\n|--------|---------|\n| Agent execution | `agent_loop`, `loop_guard` |\n| LLM abstraction | `llm_driver`, `llm_errors`, `drivers/*` |\n| Tool system | `tool_runner`, `tool_policy`, `sandbox`, `subprocess_sandbox`, `docker_sandbox`, `workspace_sandbox` |\n| Protocol | `a2a`, `mcp`, `mcp_server` |\n| Context management | `context_engine`, `context_budget`, `context_overflow`, `compactor` |\n| Memory & embeddings | `embedding`, `proactive_memory` |\n| Web & media | `web_search`, `web_fetch`, `web_cache`, `web_content`, `browser`, `media`, `media_understanding`, `image_gen`, `tts` |\n| Utilities | `http_client`, `retry`, `auth_cooldown`, `graceful_shutdown`, `hooks`, `pii_filter`, `audit`, `trace_store`, `session_repair` |\n\n## The Agent Loop\n\nThe core execution engine is `agent_loop::run_agent_loop`. It implements a tool-use loop: the agent calls the LLM, the LLM returns text and/or tool calls, tools execute, and the results feed back into the next LLM call.\n\n### Loop Lifecycle\n\n```mermaid\nflowchart TD\n    A[User Message] --> B[Memory Recall]\n    B --> C[Prompt Build]\n    C --> D[LLM Call]\n    D --> E{Stop Reason?}\n    E -->|EndTurn| F[Save Session]\n    E -->|ToolUse| G[Execute Tools]\n    G --> H{More iterations?}\n    H -->|Yes| D\n    H -->|No| F\n    F --> I[Return AgentLoopResult]\n```\n\n### Key Parameters\n\n- **Max iterations**: 50 default, configurable per agent via `autonomous.max_iterations`\n- **Max history**: 40 messages; older messages are trimmed at conversation-turn boundaries\n- **Tool timeout**: 600 seconds for agent_send/agent_spawn and browser tools; configurable per agent\n- **Max continuations**: 5 consecutive MaxTokens responses before returning partial output\n- **Consecutive all-failed abort**: 3 iterations where every tool call hard-fails triggers loop exit\n\n### Context Assembly\n\nBefore each LLM call, the loop assembles the context window:\n\n1. **Overflow recovery** (`context_overflow`): If the message list exceeds the context window, messages are compressed using structured extraction. If compression fails, the loop exits with an error.\n2. **Context guard** (`context_budget`): A head+tail strategy ensures the prompt always fits within available tokens, leaving room for the response.\n\nAfter each iteration, tool result content is truncated to prevent token bloat. When a `ContextEngine` is registered, truncation is delegated to it so plugins can customize the strategy.\n\n### Memory Integration\n\nThe loop integrates two memory systems:\n\n- **Recall**: Before each turn, the loop retrieves up to 5 relevant memories using vector similarity (if an `EmbeddingDriver` is available) or text search. Retrieved memories are injected into the prompt.\n- **Remember**: After each turn, the interaction is saved as an episodic memory with optional embedding.\n\nProactive memory (`proactive_memory`) provides additional retrieval and memorization hooks via `auto_retrieve` and `auto_memorize`.\n\n### Loop Phases\n\nCallbacks (`PhaseCallback`) notify callers of lifecycle transitions:\n\n| Phase | Meaning |\n|-------|---------|\n| `Thinking` | LLM call in progress |\n| `ToolUse { tool_name }` | Tool execution in progress |\n| `Streaming` | Tokens being streamed to client |\n| `Done` | Loop completed successfully |\n| `Error` | Loop terminated with error |\n\n## Tool Execution\n\n### `tool_runner::execute_tool`\n\nThis is the single entry point for all tool calls. It:\n\n1. Resolves the tool name (handles normalization and aliases)\n2. Checks the loop guard (circuit breaker)\n3. Routes to the appropriate handler:\n   - **Skill tools**: loaded from `librefang_skills` registry\n   - **Built-in tools**: file I/O, shell, web fetch/search, knowledge graph, task posting, agent spawning\n   - **MCP tools**: forwarded over MCP connections\n   - **Browser tools**: executed via `BrowserManager`\n4. Enforces workspace boundaries and path traversal guards\n5. Runs taint analysis on shell execution inputs\n6. Records execution traces for debugging\n\n### Sandboxing\n\nMultiple sandbox layers provide defense in depth:\n\n| Sandbox | Module | Isolation mechanism |\n|---------|--------|---------------------|\n| Subprocess | `subprocess_sandbox` | `tokio::process::Command` with environment filtering |\n| Docker | `docker_sandbox` | OCI container with configurable image and resource limits |\n| Workspace | `workspace_sandbox` | Path canonicalization and traversal detection |\n\nThe workspace sandbox is particularly important: it validates that all file paths resolve within the agent's configured workspace root, blocking path traversal attacks.\n\n## A2A Protocol\n\nThe `a2a` module implements Google's Agent-to-Agent protocol for cross-framework interoperability.\n\n### Core Types\n\n- **`AgentCard`**: A JSON capability manifest served at `/.well-known/agent.json`. Describes agent name, description, skills, and supported input/output modes.\n- **`A2aTask`**: The unit of work exchanged between agents, with status tracking and message/artifact accumulation.\n- **`A2aTaskStore`**: In-memory task store with TTL-based eviction (24h default) and capacity management. Terminal-state tasks (Completed/Failed/Cancelled) are evicted before non-terminal tasks when at capacity.\n\n### Client Operations\n\n- **`discover`**: Fetches an external agent's `AgentCard` from `/.well-known/agent.json`\n- **`send_task`**: Sends a task via JSON-RPC `tasks/send`\n- **`get_task`**: Polls task status via JSON-RPC `tasks/get`\n\n### Server\n\n- **`build_agent_card`**: Generates an `AgentCard` from an `AgentManifest`, converting LibreFang tools into A2A skill descriptors\n\n## LLM Driver Architecture\n\nThe `llm_driver` module defines the `LlmDriver` trait and `CompletionRequest`/`CompletionResponse` types. Driver implementations live in `drivers/`:\n\n- `openai.rs` — OpenAI-compatible APIs (OpenAI, Azure, generic OpenAI-compatible)\n- `anthropic.rs` — Anthropic Claude API\n- `google.rs` — Google Vertex AI and Gemini API\n- `openrouter.rs` — OpenRouter aggregation\n- `ollama.rs` — Local Ollama\n- `cloudflare.rs` — Cloudflare Workers AI\n- `deepseek.rs` — DeepSeek API\n\nEach driver implements:\n- **`complete`**: Single-shot completion\n- **`stream`**: Streaming completion yielding `StreamEvent`s\n- **`is_configured`**: Returns true when the driver has valid credentials\n\n## Context Management\n\n### `context_engine`\n\nA pluggable trait (`ContextEngine`) allows custom context assembly strategies. Implementations can override:\n- `ingest`: Called before the LLM call to recall relevant memories\n- `assemble`: Called to build the full message list for the LLM\n- `truncate_tool_result`: Called to truncate tool result content\n- `after_turn`: Called after each turn for post-processing\n\n### `context_budget`\n\nImplements head+tail truncation: the system prompt goes at the front, recent messages at the tail, with older middle messages dropped while preserving conversation boundaries.\n\n### `context_overflow`\n\nHandles severe overflow by attempting progressive recovery:\n1. Strip all images from prior turns\n2. Merge adjacent messages\n3. Strip thinking blocks\n4. Truncate all tool results to a fixed limit\n5. Final error if still overflowed\n\n## HTTP Client\n\n`http_client::proxied_client_builder` constructs a `reqwest::Client` that respects system proxy environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`). All outgoing HTTP requests from the runtime (A2A discovery, web search, web fetch) route through this client.\n\n## Web Tools\n\n| Module | Function |\n|--------|----------|\n| `web_search` | Tavily, Perplexity, DuckDuckGo, Jina, Brave Search, DuckDuckGo Instant Answers |\n| `web_fetch` | HTTP GET with host allowlist, redirects, timeout, ETag/Last-Modified caching |\n| `web_cache` | In-memory cache for web content with TTL |\n| `web_content` | HTML-to-Markdown conversion |\n| `browser` | Browser automation (via CDP) for JavaScript-heavy pages |\n\n## Hooks System\n\n`hooks` provides lifecycle hooks that plugins can register:\n\n| Event | Timing |\n|-------|--------|\n| `BeforePromptBuild` | Before the system prompt and messages are assembled |\n| `BeforeToolCall` | Before each tool call; can block the tool |\n| `AfterToolCall` | After each tool completes |\n| `AgentLoopEnd` | After the loop finishes (success or failure) |\n\nHooks run best-effort: failures are logged but do not abort the loop.\n\n## Loop Guard (Circuit Breaker)\n\n`loop_guard` implements a circuit breaker that prevents tool call loops:\n\n- **Per-tool circuit breaker**: After a tool is called `N` times in a single turn (default 3), subsequent calls to that tool return a soft error\n- **Global circuit breaker**: After `N` total tool calls (default 150), the loop exits\n- **Loop detection**: Tracks repeated patterns in tool call sequences\n\nThe guard classifies outcomes:\n- **`Allow`**: Tool call proceeds\n- **`Warn`**: Tool call proceeds but a warning is appended to the result\n- **`Block`**: Tool call is rejected with an error\n- **`CircuitBreak`**: Loop terminates immediately\n\n## Retry and Backoff\n\n`retry` handles transient failures with exponential backoff:\n- Rate limit (429) and overload (529) responses trigger retry with exponential backoff\n- Configurable base delay and max retries\n- Auth cooldown (`auth_cooldown`) tracks per-provider cooldown windows to avoid hammering rate-limited providers\n\n## Shell Bleed Prevention\n\n`shell_bleed` strips ANSI escape sequences and terminal control codes from tool results. This prevents malicious tools from injecting color codes or control sequences that could obscure output or exploit terminal vulnerabilities.\n\n## PII Filtering\n\n`pii_filter` redacts personally identifiable information (emails, phone numbers, credit cards, etc.) from user messages before they reach the LLM, and from tool results before they are persisted. The redaction patterns are configurable.\n\n## Audit and Tracing\n\n- `audit` logs structured events for compliance and debugging\n- `trace_store` persists decision traces (tool call inputs, outputs, timing) that are captured during the agent loop\n- `reply_directives` extracts structured directives from agent responses (e.g., `reply_to`, `silent`, `current_thread`)\n\n## Graceful Shutdown\n\n`graceful_shutdown` coordinates orderly shutdown across all runtime components, ensuring in-flight tool executions and LLM calls complete or are cancelled cleanly.\n\n## Key Dependencies\n\n```mermaid\ngraph LR\n    subgraph \"Runtime Engine\"\n        AL[agent_loop] --> TR[tool_runner]\n        AL --> LD[llm_driver]\n        AL --> CE[context_engine]\n        AL --> LG[loop_guard]\n        TR --> SB[sandbox]\n        TR --> MCP[mcp]\n        TR --> Skills[librefang_skills]\n    end\n\n    AL --> Memory[librefang_memory]\n    AL --> Types[librefang_types]\n    LD --> Drivers[drivers/*]\n    SB --> Docker[docker_sandbox]\n    SB --> Subprocess[subprocess_sandbox]\n    SB --> Workspace[workspace_sandbox]\n```\n\n## Configuration Points\n\nThe runtime is configured via `AgentManifest` metadata fields:\n\n| Field | Purpose |\n|-------|---------|\n| `sender_user_id` | Per-sender trust and authorization context |\n| `sender_channel` | Channel-specific tool authorization |\n| `hand_allowed_env` | Environment variables exposed to skill tools |\n| `privacy` | PII redaction configuration |\n| `is_group` | Enable group chat `[sender]:` prefix |\n| `sender_display_name` | Display name for group chat prefix |\n| `stable_prefix_mode` | Disable vector memory recall |\n| `prompt_caching` | Enable prompt caching for applicable providers |\n| `timeout_secs` | Override tool execution timeout |\n| `exec_policy` | Execution policy for sandboxed tools |",
                sdks: '# SDKs\n\n# LibreFang SDKs\n\nOfficial language clients for the LibreFang Agent OS REST API. Four implementations provide identical functionality across Go, JavaScript/TypeScript, Python, and Rust.\n\n## Overview\n\nThe SDKs enable remote control of a LibreFang server through its REST API. Each client manages HTTP communication, request/response serialization, error handling, and SSE streaming. The client architecture follows a **resource pattern**: related operations are grouped into resource objects attached to the main client.\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    LibreFang Client                          │\n├─────────────────────────────────────────────────────────────┤\n│  agents    sessions   workflows   skills   channels         │\n│  tools     models     providers   memory   triggers         │\n│  schedules                                                  │\n└────────────────────┬────────────────────────────────────────┘\n                     │ HTTP / SSE\n                     ▼\n        ┌────────────────────────────┐\n        │   LibreFang Server API     │\n        │   (localhost:4545)         │\n        └────────────────────────────┘\n```\n\n## Client Initialization\n\nAll SDKs follow the same initialization pattern: create a client pointing at the server URL, then access resources through named properties.\n\n**Go**\n```go\nclient := librefang.New("http://localhost:4545")\n```\n\n**JavaScript**\n```javascript\nconst { LibreFang } = require("@librefang/sdk");\nconst client = new LibreFang("http://localhost:4545");\n```\n\n**Python**\n```python\nfrom librefang import Client\nclient = Client("http://localhost:4545")\n```\n\n**Rust**\n```rust\nuse librefang::LibreFang;\nlet client = LibreFang::new("http://localhost:4545");\n```\n\n## Resources and Operations\n\n### AgentResource\n\nFull agent lifecycle management and messaging. Agents are the primary abstraction in LibreFang—each represents an autonomous agent that can receive messages, execute tools, and maintain conversation state.\n\n| Operation | Method | Description |\n|-----------|--------|-------------|\n| `List` / `list()` | GET /api/agents | Retrieve all agents |\n| `Get` / `get(id)` | GET /api/agents/{id} | Fetch single agent by ID |\n| `Create` / `create()` | POST /api/agents | Spawn a new agent |\n| `Delete` / `delete(id)` | DELETE /api/agents/{id} | Terminate an agent |\n| `Stop` / `stop(id)` | POST /api/agents/{id}/stop | Halt agent execution |\n| `Clone` / `clone(id)` | POST /api/agents/{id}/clone | Duplicate an agent |\n| `Update` / `update(id, data)` | PUT /api/agents/{id}/update | Modify agent configuration |\n| `SetMode` / `set_mode(id, mode)` | PUT /api/agents/{id}/mode | Change agent operating mode |\n| `SetModel` / `set_model(id, model)` | PUT /api/agents/{id}/model | Switch the underlying LLM |\n| `Message` / `message(id, text)` | POST /api/agents/{id}/message | Send message, wait for full response |\n| `Stream` / `stream(id, text)` | POST /api/agents/{id}/message/stream | Send message, receive SSE stream |\n| `Session` / `session(id)` | GET /api/agents/{id}/session | Get current session state |\n| `ResetSession` / `reset_session(id)` | POST /api/agents/{id}/session/reset | Clear conversation history |\n| `ListSessions` / `list_sessions(id)` | GET /api/agents/{id}/sessions | Enumerate agent\'s sessions |\n| `CreateSession` / `create_session(id, label)` | POST /api/agents/{id}/sessions | Create named session |\n| `SwitchSession` / `switch_session(id, sessionId)` | POST /api/agents/{id}/sessions/{id}/switch | Change active session |\n| `GetSkills` / `get_skills(id)` | GET /api/agents/{id}/skills | List agent\'s enabled skills |\n| `SetSkills` / `set_skills(id, skills)` | PUT /api/agents/{id}/skills | Assign skills to agent |\n| `SetIdentity` / `set_identity(id, **identity)` | PATCH /api/agents/{id}/identity | Update agent persona |\n| `PatchConfig` / `patch_config(id, **c
