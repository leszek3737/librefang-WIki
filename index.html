n## Copilot OAuth (`copilot_oauth`)\n\nImplements GitHub's OAuth 2.0 Device Authorization Grant (RFC 8628) for obtaining a GitHub personal access token for Copilot.\n\n### Device Flow\n\n1. **`start_device_flow()`** — POSTs to `https://github.com/login/device/code` with `client_id=Iv1.b507a08c87ecfe98` (VSCode Copilot extension's public client ID) and `scope=read:user`. Returns a `DeviceCodeResponse` with `device_code`, `user_code`, `verification_uri`, `expires_in`, and `interval`.\n\n2. The user visits `verification_uri` and enters `user_code`.\n\n3. **`poll_device_flow(device_code)`** — POSTs to `https://github.com/login/oauth/access_token` with the device code. Returns a `DeviceFlowStatus`:\n\n| Variant | Meaning |\n|---------|---------|\n| `Pending` | User hasn't completed authorization yet |\n| `Complete { access_token }` | Success — contains the token as `Zeroizing<String>` |\n| `SlowDown { new_interval }` | Server requests longer poll interval |\n| `Expired` | Device code expired, must restart |\n| `AccessDenied` | User denied the authorization |\n| `Error(String)` | Unexpected error |\n\nGitHub returns HTTP 200 with an `error` field during pending states, so error handling checks the JSON body rather than HTTP status codes.\n\n### Key Types\n\n| Type | Description |\n|------|-------------|\n| `DeviceCodeResponse` | Parsed response from device code initiation — all fields required |\n| `DeviceFlowStatus` | Enum representing the current state of the polling cycle |\n\n---\n\n## Security Considerations\n\n- **PKCE (S256)**: The browser flow uses Proof Key for Code Exchange with SHA-256 to prevent authorization code interception attacks.\n- **State parameter**: A random 16-byte hex string protects against CSRF during the browser callback.\n- **Zeroizing**: Both `access_token` and `refresh_token` are wrapped in `Zeroizing<String>` from the `zeroize` crate, ensuring memory is cleared when dropped.\n- **CSRF validation**: `run_oauth_callback_server` validates the `state` parameter matches the one generated at flow start. Mismatched state returns HTTP 400.\n- **Timeout enforcement**: Browser flow times out after 5 minutes; device auth flow after 15 minutes.\n\n## Integration Points\n\nThis module is consumed by:\n\n| Consumer | What it calls |\n|----------|---------------|\n| `librefang-cli` (`authenticate_chatgpt`) | `start_oauth_flow`, `run_oauth_callback_server`, `exchange_code_for_tokens`, `start_device_auth_flow`, `poll_device_auth_flow`, `fetch_best_codex_model` |\n| `src/drivers/chatgpt.rs` (`refresh_token`) | `refresh_access_token` |\n| `src/routes/providers.rs` | `start_device_flow`, `poll_device_flow` |\n\nHTTP requests go through `librefang_http::proxied_client()` and `librefang_http::proxied_client_builder()`, which respect system proxy configuration.","authentication-security":"# Authentication & Security\n\n# Authentication & Security\n\nThis module group provides the complete identity, access control, and credential management layer for LibreFang. It spans five sub-modules that together handle every authentication scenario: end-user login, agent authorization, encrypted secret storage, and OAuth flows for external providers.\n\n## Sub-module Responsibilities\n\n| Sub-module | Role |\n|---|---|\n| [librefang-api-src](librefang-api-src.md) | Inbound authentication gateway — validates Bearer JWTs, API keys, session tokens, and dashboard passwords (Argon2id). Manages webhook subscriptions with SSRF mitigations and HMAC delivery signing. |\n| [librefang-kernel-src](librefang-kernel-src.md) | Runtime authorization — RBAC (`auth`), human-in-the-loop approval gating (`approval`), per-agent capability grants (`capabilities`), QR-code device pairing (`pairing`), and MCP OAuth token management (`mcp_oauth_provider`). |\n| [librefang-extensions-src](librefang-extensions-src.md) | Credential storage and resolution — encrypted `CredentialVault` (AES-256-GCM with `Zeroizing<String>` in-memory secrets), and a `CredentialResolver` chain that falls back through vault → `.env` → environment variable → interactive prompt. |\n| [librefang-runtime-mcp-src](librefang-runtime-mcp-src.md) | OAuth 2.0 discovery for MCP servers — RFC 8414 metadata resolution, PKCE, WWW-Authenticate header parsing, and SSRF-hardened endpoint validation. |\n| [librefang-runtime-oauth-src](librefang-runtime-oauth-src.md) | OAuth 2.0 for ChatGPT and GitHub Copilot — browser-based and device-code flows, token exchange with PKCE, refresh logic, and Codex model discovery. |\n\n## How They Connect\n\n```mermaid\ngraph LR\n    subgraph \"Inbound Requests\"\n        API[librefang-api-src<br/>JWT / API Key / Password]\n    end\n\n    subgraph \"Authorization\"\n        KERN[librefang-kernel-src<br/>RBAC · Approval · Capabilities]\n    end\n\n    subgraph \"Credential Storage\"\n        EXT[librefang-extensions-src<br/>CredentialVault · Resolver]\n    end\n\n    subgraph \"Outbound OAuth\"\n        MCP[librefang-runtime-mcp-src<br/>MCP Server Discovery]\n        OAUTH[librefang-runtime-oauth-src<br/>ChatGPT · Copilot]\n    end\n\n    API -->|identity| KERN\n    KERN -->|mcp_oauth_provider| EXT\n    MCP -->|token storage via kernel| EXT\n    OAUTH -->|token storage via kernel| EXT\n    KERN -->|agent capabilities| API\n```\n\n### Key Cross-Module Workflows\n\n**User login → authorized action.** A request hits [librefang-api-src](librefang-api-src.md) which validates the credential (JWT via OIDC, Argon2id password hash, or session token derived through `derive_dashboard_session_token`). The verified identity is passed to [librefang-kernel-src](librefang-kernel-src.md)'s RBAC layer to determine role-based permissions, and optionally through the `approval` manager if the action is flagged as dangerous.\n\n**MCP server authentication.** [librefang-runtime-mcp-src](librefang-runtime-mcp-src.md) discovers OAuth metadata from MCP endpoints (SSRF-hardened), then delegates token storage and refresh to [librefang-kernel-src](librefang-kernel-src.md)'s `mcp_oauth_provider`, which persists tokens in [librefang-extensions-src](librefang-extensions-src.md)'s `CredentialVault`.\n\n**LLM provider OAuth.** [librefang-runtime-oauth-src](librefang-runtime-oauth-src.md) handles browser-based and device-code flows for ChatGPT and GitHub Copilot. Acquired tokens follow the same path through the kernel's OAuth provider into the encrypted vault.\n\n**Webhook delivery.** [librefang-api-src](librefang-api-src.md) validates webhook target URLs against private IP ranges (`is_private_ip`, `canonical_ip`) to prevent SSRF, then signs deliveries with HMAC for receipt verification.","channel-integrations":"# Channel Integrations\n\n# Channel Integrations (`librefang-channels`)\n\n## Overview\n\nThe Channel Integrations module is the bridge layer between external messaging platforms and the LibreFang Agent OS kernel. It provides 40+ pluggable channel adapters that translate platform-specific messages (Telegram, Discord, Slack, WhatsApp, IRC, Matrix, etc.) into a unified `ChannelMessage` format, then dispatch them to the appropriate agent through the kernel.\n\nEvery adapter is gated behind a Cargo feature flag (`channel-xxx`). The `default` feature enables popular channels; use `all-channels` to compile everything.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"External Platforms\"\n        TG[Telegram]\n        DC[Discord]\n        SL[Slack]\n        WA[WhatsApp]\n        MORE[\"40+ more...\"]\n    end\n\n    subgraph \"librefang-channels\"\n        A1[\"Telegram Adapter\"]\n        A2[\"Discord Adapter\"]\n        A3[\"Slack Adapter\"]\n        A4[\"WhatsApp Adapter\"]\n\n        BM[BridgeManager]\n        RL[AgentRouter]\n        SAN[InputSanitizer]\n        FMT[Formatter]\n        RL2[RateLimiter]\n        DB[MessageDebouncer]\n        JNL[MessageJournal]\n    end\n\n    subgraph \"librefang-api / Kernel\"\n        CBH[ChannelBridgeHandle]\n    end\n\n    TG --> A1\n    DC --> A2\n    SL --> A3\n    WA --> A4\n    MORE --> BM\n\n    A1 --> BM\n    A2 --> BM\n    A3 --> BM\n    A4 --> BM\n\n    BM --> SAN\n    BM --> RL\n    BM --> RL2\n    BM --> DB\n    BM --> JNL\n    BM --> FMT\n\n    BM -->|send_message| CBH\n    BM -->|send_message_streaming_with_sender_status| CBH\n    CBH -->|trait impl in librefang-api| BM\n```\n\n## Core Types\n\nAll adapters produce and consume types defined in `types.rs`:\n\n| Type | Purpose |\n|------|---------|\n| `ChannelMessage` | Unified inbound message — carries content, sender, channel type, metadata, thread context |\n| `ChannelContent` | Enum of all supported content: `Text`, `Command`, `Image`, `Voice`, `Video`, `File`, `Location`, `Interactive`, `ButtonCallback`, `EditInteractive`, `Audio`, `Animation`, `Sticker`, `MediaGroup`, `Poll`, `PollAnswer`, `FileData`, `DeleteMessage` |\n| `ChannelUser` | Sender identity — `platform_id`, `display_name`, optional `librefang_user` |\n| `SenderContext` | Full sender context propagated to agents — channel, user ID, chat ID, group status, mention status, thread ID, account ID, auto-route config, group participants |\n| `ChannelAdapter` | Trait each adapter implements — `name()`, `start()`, `send()`, `send_in_thread()`, `send_typing()`, `send_reaction()`, `send_streaming()`, `stop()`, etc. |\n| `ChannelType` | Enum identifying the platform — `Telegram`, `Discord`, `Slack`, `WhatsApp`, `Signal`, `Matrix`, `Email`, `Teams`, `Mattermost`, `WeChat`, `WebChat`, `CLI`, `Custom(String)` |\n| `InteractiveButton` | Button for inline keyboards — `label`, `action`, optional `style`/`url` |\n| `LifecycleReaction` | Emoji reaction for processing phases — `emoji`, `phase`, `remove_previous` |\n\n## ChannelBridgeHandle\n\nDefined in `bridge.rs`, this trait represents kernel operations that channel adapters need. It is defined in `librefang-channels` to avoid circular dependencies — the actual implementation lives in `librefang-api` on top of the kernel.\n\nKey methods, grouped by function:\n\n**Messaging**\n- `send_message` / `send_message_with_sender` — basic agent send\n- `send_message_with_blocks` / `send_message_with_blocks_and_sender` — multimodal (text + images)\n- `send_message_streaming` / `send_message_streaming_with_sender` — streaming text deltas\n- `send_message_streaming_with_sender_status` — streaming + terminal success/error status via oneshot\n- `send_message_ephemeral` — `/btw` side-question (no session persistence)\n\n**Agent Management**\n- `find_agent_by_name` — resolve agent name to ID\n- `list_agents` — running agents as `(id, name)` pairs\n- `spawn_agent_by_name` — create agent from manifest\n- `reset_session` / `reboot_session` / `compact_session` — session lifecycle\n- `set_model` — switch an agent's LLM\n- `stop_run` — cancel in-progress LLM call\n- `set_thinking` — toggle extended thinking mode\n\n**Channel Configuration**\n- `channel_overrides` — per-channel config overrides (format, threading, policies, rate limits)\n- `authorize_channel_user` — RBAC check\n\n**Introspection**\n- `list_models_text` / `list_providers_text` / `list_skills_text` / `list_hands_text`\n- `list_providers_interactive` / `list_models_by_provider` — structured data for interactive menus\n- `uptime_info` / `session_usage` / `budget_text` / `peers_text` / `a2a_agents_text`\n\n**Automation**\n- `list_workflows_text` / `run_workflow_text`\n- `list_triggers_text` / `create_trigger_text` / `delete_trigger_text`\n- `list_schedules_text` / `manage_schedule_text`\n- `list_approvals_text` / `resolve_approval_text`\n- `subscribe_events` — broadcast receiver for kernel events (e.g. `ApprovalRequested`)\n\n**Delivery & Routing**\n- `classify_reply_intent` — lightweight LLM check: should the bot reply to this group message?\n- `check_auto_reply` — auto-reply engine hook\n- `record_delivery` — track delivery success/failure for metrics\n- `send_channel_push` — proactive outbound message (REST API push endpoint)\n\nAll methods have sensible defaults so the kernel can incrementally implement features.\n\n## BridgeManager\n\n`BridgeManager` is the central orchestrator. It owns all running adapters and manages the full dispatch pipeline.\n\n### Construction\n\n```rust\n// Basic\nlet mgr = BridgeManager::new(kernel_handle, router);\n\n// With custom sanitizer config\nlet mgr = BridgeManager::with_sanitizer(kernel_handle, router, &sanitize_config);\n\n// With crash-recovery journal\nlet mgr = BridgeManager::new(kernel_handle, router).with_journal(journal);\n```\n\n### Starting an Adapter\n\n`start_adapter()` subscribes to the adapter's message stream and spawns a dispatch loop. Each incoming message gets its own concurrent task so slow LLM calls (10–30s) don't block subsequent messages. A semaphore (capacity 32) caps concurrent dispatches to prevent unbounded memory under burst traffic.\n\nIf an adapter provides webhook routes via `create_webhook_routes()`, those are collected for mounting on the shared API server under `/channels/{name}/webhook`. Otherwise the adapter falls back to managing its own HTTP server.\n\n### Message Debouncing\n\nWhen `message_debounce_ms` is configured in channel overrides, rapid messages from the same sender are merged before dispatch. This is critical for platforms where users send text, then photos, then more text in quick succession.\n\nThe debouncer has three flush triggers:\n1. **Timeout** — `debounce_ms` after the last message (with timer reset on each new message)\n2. **Hard deadline** — `debounce_max_ms` after the first message\n3. **Buffer full** — `debounce_max_buffer` messages accumulated\n\nTyping events extend or shorten the debounce window: if the user is still typing, the timer resets; if they stop, the flush fires after a short delay.\n\nWhen merged, same-type messages concatenate their text; command messages with the same name merge their arguments; mixed types fall back to text concatenation.\n\n### Shutdown\n\n`stop()` signals all dispatch loops via a watch channel, then calls `adapter.stop()` on each adapter to release connections, then awaits all spawned tasks.\n\n### Webhook Routes\n\n`take_webhook_router()` drains collected webhook routes and merges them into a single `axum::Router`, nested under `/{adapter_name}`. The caller should mount this under `/channels` on the main API server without auth middleware — adapters handle their own signature verification.\n\n## Message Dispatch Pipeline\n\nWhen a `ChannelMessage` arrives, `dispatch_message()` (or the debounced variant) runs it through a multi-stage pipeline:\n\n### 1. Input Sanitization\n\n`InputSanitizer` checks text, image captions, voice/video captions for prompt injection patterns. Three outcomes:\n- **Clean** — pass through\n- **Warned** — log a warning but allow (suspicious but not conclusive)\n- **Blocked** — reject the message and send a generic response\n\n### 2. Channel Override Loading\n\n`channel_overrides()` fetches per-channel configuration including output format, threading, DM/group policies, rate limits, trigger patterns, auto-route settings, and command allowlists/blocklists.\n\n### 3. DM/Group Policy Enforcement\n\nFor **group messages**, `should_process_group_message()` applies the configured `GroupPolicy`:\n\n| Policy | Behavior |\n|--------|----------|\n| `Ignore` | Drop all group messages |\n| `CommandsOnly` | Only process messages that look like commands |\n| `MentionOnly` | Only process when the bot is mentioned, the message matches a trigger pattern, or it's a command |\n| `All` | Process everything (optionally with `reply_precheck` LLM classification) |\n\nThe **addressee guard** (enabled via `LIBREFANG_GROUP_ADDRESSEE_GUARD=on`) uses positional vocative detection to avoid false triggers. For example, in \"Caterina, chiedi al Signore...\" with trigger pattern \"Signore\", the guard recognizes the turn is addressed to Caterina (leading vocative) and suppresses the match.\n\nFor **DMs**, `DmPolicy` controls access: `Ignore`, `AllowedOnly` (RBAC), or `Respond`.\n\n### 4. Rate Limiting\n\nTwo levels via `ChannelRateLimiter`:\n- **Global** — `rate_limit_per_minute` across all users on the channel\n- **Per-user** — `rate_limit_per_user` per sender identity\n\n### 5. Command Handling\n\nMessages matching `ChannelContent::Command` or starting with `/` are dispatched to `handle_command()`. Available commands include `start`, `help`, `agents`, `agent`, `status`, `models`, `providers`, `new`, `reboot`, `compact`, `model`, `stop`, `usage`, `think`, `skills`, `hands`, `btw`, `workflows`, `triggers`, `schedules`, `approvals`, `approve`, `reject`, `budget`, `peers`, `a2a`.\n\nCommands `/agents` and `/models` produce interactive inline keyboards when adapters support them.\n\nCommands blocked by channel policy (`disable_commands`, `allowed_commands`, `blocked_commands`) fall through as plain text to the agent.\n\n### 6. Agent Resolution\n\n`resolve_or_fallback()` determines the target agent:\n1. **Thread routing** — if `thread_route_agent` is set in metadata, resolve by name\n2. **Context routing** — `AgentRouter.resolve_with_context()` considers channel, account ID, peer ID, guild ID\n3. **Fallback** — try an agent named \"assistant\", then the first running agent\n\nOn stale agent IDs (\"Agent not found\" errors), the dispatcher re-resolves the channel default by name and retries once.\n\n### 7. Streaming vs. Non-Streaming Dispatch\n\nIf the adapter supports streaming (`supports_streaming()`), the dispatcher calls `send_message_streaming_with_sender_status()` which returns:\n- `mpsc::Receiver<String>` — incremental text deltas piped to the adapter\n- `oneshot::Receiver<Result<(), String>>` — terminal success/error from the kernel\n\nThe text is buffered while streaming. If the stream transport fails, the buffered text is re-sent via `send_response()` as fallback. The kernel status determines the final lifecycle reaction (Done vs. Error) and delivery tracking.\n\n### 8. Response Formatting\n\n`formatter::format_for_channel()` adapts the agent's output to the channel's expected format (Markdown, HTML, plain text) based on `OutputFormat` from channel overrides.\n\n### 9. Lifecycle Reactions\n\nAdapters that support reactions display emoji indicators of processing state:\n- ⏳ Queued → 🤔 Thinking → 📡 Streaming → ✅ Done / ❌ Error\n\n### 10. Delivery Tracking\n\n`record_delivery()` logs success/failure per agent, channel, and recipient — used for metrics and workflow delivery targeting (including Telegram forum-topic thread context).\n\n### 11. Message Journal\n\nWhen configured, every dispatched message is journaled before processing. On crash recovery, `recover_pending()` returns in-flight entries for re-dispatch. `compact_journal()` flushes on shutdown.\n\n## Agent Router\n\n`AgentRouter` manages the mapping from channel users to agents:\n\n- **Per-user defaults** — `set_user_default()` / `resolve()` — each user gets their preferred agent\n- **Channel defaults** — `channel_default()` / `update_channel_default()` — fallback for users without a preference\n- **Context binding** — `resolve_with_context()` considers `BindingContext` (channel, account_id, peer_id, guild_id, roles)\n- **Broadcast routing** — `has_broadcast()` / `resolve_broadcast()` — one user to multiple agents with parallel or sequential strategy\n\n## Broadcast Routing\n\nWhen a sender has broadcast targets configured, their message is dispatched to all target agents simultaneously. The `BroadcastStrategy` controls execution:\n\n| Strategy | Behavior |\n|----------|----------|\n| `Parallel` | All agents queried concurrently; responses combined with `[agent_name]: response` |\n| `Sequential` | Agents queried one at a time in order |\n\n## Interactive Menus\n\nThe `/models` command produces a provider → model drill-down menu using `ButtonCallback` handling. The flow:\n1. `/models` → list providers as inline buttons (`prov:{id}`)\n2. Provider button → list that provider's models (`model:{id}`) + back button\n3. Model button → set the active model via `set_model()` + confirmation\n\nThe `/agents` command lists agents as buttons that trigger `/agent {name}` callbacks.\n\n## Channel Adapters\n\nEach adapter implements the `ChannelAdapter` trait. Key methods:\n\n| Method | Description |\n|--------|-------------|\n| `name()` | Unique adapter identifier |\n| `channel_type()` | Corresponding `ChannelType` |\n| `start()` | Start receiving messages, return a `Stream<Item = ChannelMessage>` |\n| `create_webhook_routes()` | Optional: return `(Router, Stream)` for shared-server mounting |\n| `send()` | Send a `ChannelContent` to a `ChannelUser` |\n| `send_in_thread()` | Send within a specific thread/topic |\n| `send_typing()` | Show typing indicator |\n| `send_reaction()` | Add/remove emoji reaction |\n| `send_streaming()` | Pipe streaming text deltas to the user |\n| `typing_events()` | Optional stream of typing indicators from the platform |\n| `stop()` | Shutdown the adapter |\n| `supports_streaming()` | Whether progressive output is supported |\n| `suppress_error_responses()` | Whether error messages should be hidden (e.g. public channels) |\n\n## Feature Flags\n\nEnable channels via Cargo features:\n\n```toml\n[dependencies.librefang-channels]\nfeatures = [\"channel-telegram\", \"channel-discord\"]\n```\n\nOr use feature groups:\n- `default` — popular channels\n- `all-channels` — everything\n\nAvailable adapters (alphabetical): bluesky, dingtalk, discord, discourse, email, feishu, flock, gitter, google-chat, gotify, guilded, irc, keybase, line, linkedin, mastodon, matrix, mattermost, messenger, mqtt, mumble, nextcloud, nostr, ntfy, pumble, qq, reddit, revolt, rocketchat, signal, slack, teams, telegram, threema, twist, twitch, viber, voice, webex, webhook, wechat, wecom, whatsapp, xmpp, zulip.\n\n## Infrastructure Modules\n\n| Module | Purpose |\n|--------|---------|\n| `http_client` | Shared HTTP client for adapter API calls |\n| `sanitizer` | Prompt injection detection with configurable strictness |\n| `rate_limiter` | Token-bucket rate limiter (per-channel, per-user) |\n| `formatter` | Output format adaptation (Markdown, HTML, plain text) per channel |\n| `message_journal` | SQLite-backed journal for crash recovery |\n| `sidecar` | Sidecar process management for adapters that need external binaries |\n\n## Adding a New Channel Adapter\n\n1. Create `src/my_channel.rs` implementing `ChannelAdapter`\n2. Gate it with `#[cfg(feature = \"channel-my-channel\")]` in `src/lib.rs`\n3. Add the feature to `Cargo.toml`\n4. Convert platform events into `ChannelMessage` with the appropriate `ChannelContent` variant\n5. Implement `send()` to deliver responses back to the platform\n6. Optionally implement `create_webhook_routes()` for webhook-based platforms\n7. Add `ChannelType::Custom(\"my_channel\")` mapping in `channel_type_str()`","cli-terminal-ui":"# CLI & Terminal UI\n\n# CLI & Terminal UI Module\n\n## Overview\n\n`librefang-cli` is the command-line interface for the LibreFang Agent OS. It provides over 40 top-level commands and subcommands for deploying, managing, and orchestrating AI agents from the terminal. The CLI operates in two modes:\n\n- **Daemon mode** — when the kernel daemon is running (`librefang start`), the CLI communicates over HTTP to a background API server.\n- **Single-shot mode** — when no daemon is available, commands boot an in-process `LibreFangKernel` instance for the duration of the command.\n\nThe module also contains a full-screen terminal UI (TUI) built with ratatui, used for the interactive setup wizard, chat sessions, and the launcher dashboard.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[main] --> B{Is TUI mode?}\n    B -- Yes --> C[init_tracing_file]\n    C --> D[TUI subsystem]\n    B -- No --> E[install_ctrlc_handler]\n    E --> F[init_tracing_stderr]\n    F --> G{Daemon running?}\n    G -- Yes --> H[HTTP client → daemon API]\n    G -- No --> I[In-process kernel]\n    D --> J[Launcher / Chat / Init Wizard]\n    D --> K[Free Provider Guide]\n    H --> L[Command handlers]\n    I --> L\n```\n\n## Entry Point\n\n`main()` in `src/main.rs` performs this initialization sequence:\n\n1. **Crypto provider** — installs `aws_lc_rs` as the rustls default (required before any async/TLS work).\n2. **Dotenv** — loads `~/.librefang/.env` into the process environment via `librefang_extensions::dotenv::load_dotenv()`. System environment variables take priority.\n3. **i18n** — reads the `language` field from `config.toml` and initializes the translation system via `i18n::init()`.\n4. **CLI parsing** — `Cli::parse()` using clap with a `--config` global flag and a `Commands` subcommand enum.\n5. **TUI detection** — determines if this invocation needs the terminal in raw mode (launcher with no subcommand, `tui`, `chat`, or `agent chat`). TUI modes get file-based tracing and skip the Ctrl+C handler.\n6. **Tracing** — see [Tracing & Logging](#tracing--logging) below.\n7. **Command dispatch** — a `match` on `cli.command` routes to `cmd_*` handler functions.\n\n## Execution Modes\n\n### TUI Mode\n\nActivated when the command is `tui`, `chat`, `agent chat`, or when the binary is launched with no subcommand on an interactive terminal.\n\nKey differences from CLI mode:\n- Tracing writes to `~/.librefang/tui.log` (stderr output corrupts ratatui's raw terminal).\n- No Ctrl+C handler is installed — ratatui needs to restore the terminal state on exit.\n- The launcher screen presents a menu: Get Started, Chat, Dashboard, Desktop App, Terminal UI, Show Help, Quit.\n\n### CLI Mode\n\nAll other subcommands. Tracing goes to stderr with a compact, timestamp-free format. A Ctrl+C handler is installed that cleanly exits on first press and force-exits on second.\n\n### Daemon vs. Single-Shot\n\nEach `cmd_*` handler checks for a running daemon via `find_daemon()`:\n\n```rust\npub(crate) fn find_daemon() -> Option<String>\n```\n\nThis reads `~/.librefang/daemon.json` (written by the daemon at startup), normalizes `0.0.0.0` to `127.0.0.1`, and probes the `/api/health` endpoint. If the daemon is reachable, commands use `daemon_client()` (an HTTP client with optional `Authorization: Bearer` header). If not, they fall back to loading config and creating an in-process kernel.\n\n## Command Structure\n\nCommands are defined via clap's `#[derive(Subcommand)]` on the `Commands` enum. The hierarchy is:\n\n| Top-level | Subcommands | Purpose |\n|-----------|-------------|---------|\n| `init` | — | Create `~/.librefang/`, write defaults |\n| `start` | — | Launch daemon (background, foreground, or tail) |\n| `stop` | — | Stop running daemon |\n| `restart` | — | Stop then start |\n| `chat` | — | Interactive chat with default agent |\n| `message` | — | One-shot message + response |\n| `tui` | — | Full-screen terminal dashboard |\n| `status` | — | Daemon health and uptime |\n| `doctor` | — | Diagnostic checks |\n| `agent` | `new`, `spawn`, `list`, `chat`, `kill`, `set` | Agent lifecycle |\n| `workflow` | `list`, `create`, `run` | Multi-step workflows |\n| `trigger` | `list`, `create`, `delete` | Event triggers |\n| `skill` | `install`, `list`, `remove`, `search`, `test`, `publish`, `create`, `evolve` | Skill management |\n| `channel` | `list`, `setup`, `test`, `enable`, `disable` | Messaging integrations |\n| `hand` | `list`, `active`, `activate`, `deactivate`, `info`, `check-deps`, `install-deps`, `pause`, `resume`, `settings`, `set`, `reload`, `chat` | Autonomous execution modules |\n| `config` | `show`, `edit`, `get`, `set`, `unset`, `set-key`, `delete-key`, `test-key` | Configuration management |\n| `models` | `list`, `aliases`, `providers`, `set` | LLM model browsing |\n| `mcp` | `list`, `catalog`, `add`, `remove` | Model Context Protocol servers |\n| `cron` | `list`, `create`, `delete`, `enable`, `disable` | Scheduled jobs |\n| `security` | `status`, `audit`, `verify`, `audit-reset` | Security and audit trail |\n| `memory` | `list`, `get`, `set`, `delete` | Agent KV store |\n| `vault` | `init`, `set`, `list`, `remove` | Encrypted credential storage |\n| `webhooks` | `list`, `create`, `delete`, `test` | HTTP callback triggers |\n| `gateway` | `start`, `stop`, `restart`, `status` | Low-level daemon control |\n| `service` | `install`, `uninstall`, `status` | OS auto-start (systemd/launchd/Windows) |\n\nSeveral convenience aliases exist: `spawn` → `agent new`, `agents` → `agent list`, `kill` → `agent kill`, `setup` → `init --quick`, `configure` → `init` (interactive), `onboard` → interactive wizard.\n\n## Initialization & Onboarding\n\n### `cmd_init(quick: bool)`\n\nThe init flow creates `~/.librefang/` and all required state:\n\n1. **Directory creation** — `~/.librefang/` and `~/.librefang/data/`, with `restrict_dir_permissions()` enforcing `0700` on Unix.\n2. **Registry sync** — `librefang_runtime::registry_sync::sync_registry()` downloads provider configs and integrations.\n3. **Vault init** — `init_vault_if_missing()` creates the encrypted credential vault at `vault.enc`.\n4. **Git init** — `init_git_if_missing()` creates a git repo for config versioning, with a `.gitignore` excluding secrets, cache, DB files, and backups.\n5. **Existing config detection** — if `config.toml` already exists in interactive mode, the user is redirected to `cmd_init_upgrade()` to avoid overwriting their settings (#1862).\n6. **Provider detection** — `detect_best_provider()` probes environment variables for 13+ cloud providers, checks local Ollama, and falls back to an interactive TUI guide for free providers.\n\n**Quick mode** (`--quick`) skips all prompts and writes sensible defaults. **Interactive mode** launches the ratatui-based `init_wizard` with a 5-step flow (provider selection, API key, model, daemon start, launch choice).\n\n### `cmd_init_upgrade()`\n\nHandles upgrades of existing installations:\n\n1. Backs up `config.toml` with a timestamp (e.g., `config.toml.bak.20240315-093000`).\n2. Forces registry sync (TTL=0).\n3. Finds top-level keys present in the default template but missing from the user's config.\n4. Appends missing scalars before the first `[table]` header and missing tables at end of file — preserving the user's comments and formatting.\n5. Warns about legacy `~/.openclaw` installations and outdated `require_approval` lists.\n\n## Daemon Communication\n\n### `find_daemon()` / `find_daemon_in_home()`\n\nReads `~/.librefang/daemon.json` via `librefang_api::server::read_daemon_info()`, then probes `http://{addr}/api/health` with a 1-second connect timeout. Returns the base URL on success.\n\n### `daemon_client()`\n\nBuilds a `reqwest::blocking::Client` with:\n- 120-second request timeout\n- Optional `Authorization: Bearer <api_key>` header (read from config via `read_api_key()`)\n\n### `daemon_json()`\n\nUtility that sends a request, checks the response status, and parses the JSON body. On connection failures, it exits with i18n-localized error messages and suggested fixes (timeout, connection refused, generic).\n\n### `read_api_key()`\n\nReads the `api_key` field from `config.toml`. When set, all daemon HTTP requests include the bearer token. When empty/missing, requests are unauthenticated.\n\n## Terminal UI (TUI)\n\nThe TUI subsystem lives in the `tui` module and uses ratatui for full-screen terminal rendering. Key screens:\n\n- **Launcher** — shown when running `librefang` with no arguments on an interactive terminal. Presents: Get Started, Chat, Dashboard, Desktop App, Terminal UI, Help, Quit.\n- **Init wizard** (`tui::screens::init_wizard`) — 5-step interactive onboarding (provider, key, model, daemon, launch).\n- **Free provider guide** (`tui::screens::free_provider_guide`) — helps users pick a free LLM provider (Groq, Gemini, etc.) and configure an API key.\n- **Chat** — interactive chat with streaming agent responses.\n- **Agent management** — list, spawn, and monitor agents.\n\nThe TUI event loop runs on a background thread (`spawn_event_thread`), with key events dispatched through `handle_key` to tab-specific handlers.\n\n## Key Internal Modules\n\n| Module | Purpose |\n|--------|---------|\n| `desktop_install` | Locates and launches the Tauri desktop app binary, offers to download if missing |\n| `http_client` | Shared `reqwest::blocking::Client` builder (TLS config, timeouts) |\n| `i18n` | Translation system — `init(&language)` loads catalogs, `t()` / `t_args()` look up strings |\n| `launcher` | Launcher menu — returns `LauncherChoice` enum |\n| `mcp` | MCP stdio server — reads JSON-RPC from stdin, dispatches to `create_backend()`, writes responses |\n| `progress` | Terminal progress bars with OSC 9/4 support; handles zero-total edge case gracefully |\n| `table` | `Table` builder for pretty-printed tabular output (used across the codebase) |\n| `templates` | `load_all_templates()` discovers agent templates from registry and `~/.librefang/templates/` |\n| `tui` | Full ratatui application: event loop, screens, widgets |\n| `ui` | CLI output helpers: `banner()`, `success()`, `error()`, `error_with_fix()`, `hint()`, `kv()`, `section()`, `next_steps()`, `blank()` |\n\n## Tracing & Logging\n\nTwo tracing initializers, selected based on execution mode:\n\n### `init_tracing_stderr(log_level)`\n\nFor CLI subcommands. Layers:\n- **EnvFilter** — reads `RUST_LOG`, falls back to the configured `log_level`. When `RUST_LOG` is not set explicitly, library crates (`librefang_kernel`, `librefang_runtime`, `librefang_extensions`) are muted to `warn`/`error` to prevent config-load chatter from leaking into one-shot commands.\n- **Compact stderr layer** — no timestamps, no target prefix.\n- **File layer** — appends to `~/.librefang/daemon.log` with full format.\n- **OTel reload layer** (feature-gated `telemetry`) — a no-op slot that `init_otel_tracing` can swap in later.\n\n### `init_tracing_file(log_level, custom_log_dir)`\n\nFor TUI modes. Writes to `~/.librefang/tui.log` (or custom `log_dir`). If file creation fails, falls back to `/dev/null` suppression rather than corrupting the terminal.\n\nThe `log_level` is read from `config.toml`'s `log_level` field via `load_log_level_from_config()`, defaulting to `\"info\"`.\n\n## Platform-Specific Behavior\n\n### Ctrl+C Handling\n\n- **Windows** — installs a custom `SetConsoleCtrlHandler` because the default handler doesn't reliably interrupt blocking `read_line` calls in MINGW. First Ctrl+C prints \"Interrupted.\" and exits cleanly; second press calls `process::exit(130)`.\n- **Unix** — no custom handler needed; the default SIGINT handler already interrupts `read_line` and terminates.\n\n### File Permissions\n\nOn Unix, `restrict_file_permissions()` enforces `0600` on sensitive files (config, vault, backups) and `restrict_dir_permissions()` enforces `0700` on `~/.librefang/`. These are no-ops on non-Unix platforms.\n\n### Auto-Start Service\n\nThe `service` subcommand manages OS-specific auto-start:\n- **Linux**: systemd user service at `~/.config/systemd/user/librefang.service`\n- **macOS**: LaunchAgent at `~/Library/LaunchAgents/ai.librefang.daemon.plist`\n- **Windows**: registry entry under `HKCU\\...\\Run`\n\n## Configuration\n\nThe CLI reads from `~/.librefang/config.toml` (overridable via `LIBREFANG_HOME` env var or `--config` flag). Key config fields used by the CLI:\n\n| Field | Used by |\n|-------|---------|\n| `api_key` | `daemon_client()` for bearer auth |\n| `home_dir` | `DaemonConfigContext` for daemon paths |\n| `log_dir` | Custom log output directory |\n| `log_level` | Tracing verbosity |\n| `language` | i18n locale |\n| `update_channel` | `stable`/`beta`/`rc` for self-update |\n\nAPI keys are stored in `~/.librefang/.env` (dotenv format) or in the encrypted `vault.enc` via the `vault` subcommand.\n\n## Dependency Graph\n\nThe CLI sits at the top of the dependency tree:\n\n```\nlibrefang-cli\n├── librefang-api        (daemon info reading, telemetry)\n├── librefang-kernel     (in-process kernel, config loading)\n├── librefang-types      (AgentId, AgentManifest, config types)\n├── librefang-extensions (dotenv, vault, credential encryption)\n├── librefang-runtime    (provider detection, model catalog, registry sync)\n├── librefang-hands      (hand management)\n├── librefang-migrate    (framework migration: openclaw, langchain, autogpt)\n├── clap / clap_complete (arg parsing, shell completions)\n├── ratatui              (TUI rendering)\n├── reqwest              (HTTP client for daemon communication)\n├── colored              (terminal color output)\n└── tracing / tracing-subscriber (structured logging)\n```","core-types-configuration":"# Core Types & Configuration\n\n# Core Types & Configuration (`librefang-types`)\n\n## Purpose\n\n`librefang-types` is the shared vocabulary crate for the LibreFang Agent Operating System. It defines every data structure that crosses a crate boundary — between the kernel, runtime, memory substrate, channel adapters, wire protocol, and API layer. The crate contains **no business logic**: it is purely types, serialization helpers, and validation.\n\nEvery other crate in the workspace depends on `librefang-types`, and nothing depends on it in return. Changing a struct here is a workspace-wide event.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-types (this crate)\"\n        A[agent.rs] --> T[tool.rs]\n        A --> TC[tool_compat.rs]\n        A --> SC[serde_compat.rs]\n        A --> C[config.rs]\n        A --> E[error.rs]\n        AP[approval.rs] --> CAP[capability.rs]\n        AP --> SC\n        MEM[memory.rs]\n        MSG[message.rs]\n        EVT[event.rs]\n        SCHED[scheduler.rs]\n        CFG[config.rs]\n    end\n\n    subgraph \"Consumers\"\n        K[kernel] --> A\n        K --> AP\n        RT[runtime-wasm] --> A\n        RT --> EVT\n        MCP[runtime-mcp] --> T\n        MCP --> TC\n        CH[channels] --> MSG\n        MEMS[memory substrate] --> MEM\n        API[API layer] --> CFG\n    end\n```\n\n## Module Layout\n\n| Module | Domain | Key Types |\n|--------|--------|-----------|\n| `agent` | Agent identity, manifests, scheduling | `AgentId`, `SessionId`, `AgentManifest`, `ToolProfile`, `AgentMode` |\n| `approval` | Tool authorization flow | `ApprovalRequest`, `ApprovalResponse`, `ApprovalPolicy`, `ApprovalDecision` |\n| `capability` | Capability matching / glob logic | `glob_matches` (used by approval channel rules) |\n| `config` | Global daemon configuration | `ExecPolicy`, `ThinkingConfig`, `ResponseFormat`, `ContextInjection` |\n| `error` | Unified error enum | `LibreFangError` |\n| `event` | Internal event bus types | `AgentMessage`, hook payloads |\n| `goal` | Goal tracking | `GoalId` |\n| `i18n` | Internationalization | `t()`, `t_args()` |\n| `manifest_signing` | Manifest integrity / signing | Envelope verification |\n| `media` | Image/TTS generation | `ImageGenRequest`, `MediaTtsRequest` |\n| `memory` | Memory substrate types | `MemoryKey`, session structures |\n| `message` | LLM message types | `Message`, `TokenUsage`, `text_content()` |\n| `model_catalog` | Model metadata registry | Provider capability flags (`supports_tools`) |\n| `registry_schema` | Agent registry on-disk format | Registry entries |\n| `scheduler` | Job scheduling types | Cron jobs, webhook validation |\n| `serde_compat` | Lenient deserialization helpers | `vec_lenient`, `map_lenient`, `exec_policy_lenient` |\n| `subagent` | Sub-agent orchestration | `SubagentContext`, preamble formatting |\n| `taint` | PII / security scanning | `payload_contains_pii`, `scan_mcp_arguments_for_taint` |\n| `tool` | Tool definitions | `ToolDefinition`, `normalize_schema_for_provider` |\n| `tool_compat` | Legacy tool name mapping | `map_tool_name`, `normalize_tool_name` |\n| `tool_policy` | Tool execution policy | Per-tool allow/deny rules |\n| `webhook` | Webhook payloads | `AgentHookPayload` |\n| `workflow_template` | Workflow/template types | Reusable agent blueprints |\n\n---\n\n## Identity System\n\n### `AgentId` — Deterministic and Random\n\n`AgentId` wraps a `Uuid` and provides three construction strategies:\n\n| Constructor | UUID Version | Use Case |\n|-------------|-------------|----------|\n| `AgentId::new()` | v4 (random) | One-off agents, testing |\n| `AgentId::from_name(name)` | v5 (SHA-1) | Named agents that must survive restarts |\n| `AgentId::from_hand_id(hand_id)` | v5 | Multi-agent hand instances |\n| `AgentId::from_hand_agent(hand, role, instance_id)` | v5 | Specific role within a hand |\n\nAll v5 derivation uses a single fixed namespace UUID with typed prefixes (`agent:`, `hand:`, bare `hand_id`) to prevent collisions between different entity kinds sharing the same name.\n\n**Backward compatibility note**: `from_hand_agent` with `instance_id: None` produces the legacy format `\"{hand_id}:{role}\"` so existing single-instance hands retain their original IDs (no orphaned cron jobs or memory keys).\n\n### `SessionId` — Channel-Derived\n\n```rust\nlet sid = SessionId::for_channel(agent_id, \"telegram\");\n```\n\n`SessionId::for_channel` uses UUID v5 with a dedicated namespace so the `(agent_id, channel)` pair always maps to the same session across process restarts. This is how the kernel reconnects a Telegram user to their existing conversation after a reboot.\n\nThe namespace is intentionally not an RFC 4122 well-known namespace (DNS/URL/OID/X500) to avoid collisions with other UUID v5 consumers.\n\n### `SessionMode`\n\nControls session reuse for automated (non-channel) invocations:\n\n- **`Persistent`** (default) — background ticks, triggers, and `agent_send` reuse the agent's long-lived session.\n- **`New`** — each invocation gets a fresh session.\n\n---\n\n## Agent Manifest (`AgentManifest`)\n\n`AgentManifest` is the central configuration object for every agent. It's loaded from TOML on disk (or generated by the dashboard wizard) and drives the kernel's spawn logic.\n\n### Core Fields\n\n```toml\nname = \"research-agent\"\nversion = \"1.0.0\"\ndescription = \"Deep research with web search\"\nauthor = \"ops\"\nmodule = \"builtin:chat\"\nschedule = \"reactive\"          # or { periodic = { cron = \"0 9 * * *\" } }\nsession_mode = \"persistent\"    # or \"new\"\nenabled = true\n```\n\n### Model Configuration (`ModelConfig`)\n\n```toml\n[model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nmax_tokens = 4096\ntemperature = 0.7\nsystem_prompt = \"\"\"\nYou are a research assistant.\nUse web_search to find current information.\n\"\"\"\n# Optional: provider-specific extensions flattened into the API body\nenable_memory = true\n```\n\nThe `model` field accepts an alias `name` for backward compatibility with older TOML configs. Provider-specific extension parameters go in `extra_params` (via `#[serde(flatten)]`), which are merged directly into the API request body. If a key conflicts with a standard field, `extra_params` wins.\n\n### Fallback Model Chain\n\n```toml\n[[fallback_models]]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\napi_key_env = \"GROQ_API_KEY\"\n\n[[fallback_models]]\nprovider = \"ollama\"\nmodel = \"gemma3:27b\"\nbase_url = \"http://localhost:11434\"\n```\n\nThe kernel tries the primary model first, then each fallback in order on failure.\n\n### Tool Configuration\n\nThree mechanisms control tool availability, evaluated in this order:\n\n1. **`tools_disabled = true`** — hard kill switch, overrides everything.\n2. **`profile`** — named preset (`Minimal`, `Coding`, `Research`, `Messaging`, `Automation`, `Full`, `Custom`) that expands to a tool list and derived capabilities.\n3. **`tool_allowlist` / `tool_blocklist`** — fine-grained allow/deny on top of the profile.\n\n#### Tool Profiles\n\n| Profile | Tools |\n|---------|-------|\n| `Minimal` | `file_read`, `file_list` |\n| `Coding` | `file_read`, `file_write`, `file_list`, `shell_exec`, `web_fetch` |\n| `Research` | `web_fetch`, `web_search`, `file_read`, `file_write` |\n| `Messaging` | `agent_send`, `agent_list`, `channel_send`, `memory_store`, `memory_list`, `memory_recall` |\n| `Automation` | All 12 tools from Coding + Messaging |\n| `Full` / `Custom` | `\"*\"` (all tools) |\n\n`ToolProfile::implied_capabilities()` derives a `ManifestCapabilities` struct from the tool list — e.g., `Coding` implies `network = [\"*\"]` and `shell = [\"*\"]` but not `agent_spawn`.\n\n### `AgentMode` — Runtime Permission Filter\n\n`AgentMode` is set on `AgentEntry` at runtime (not in the manifest) and filters the tool list before each agent loop iteration:\n\n- **`Observe`** — no tools at all.\n- **`Assist`** — read-only tools only: `file_read`, `file_list`, `memory_list`, `memory_recall`, `web_fetch`, `web_search`, `agent_list`.\n- **`Full`** (default) — all granted tools.\n\n### Resource Quotas\n\n```toml\n[resources]\nmax_memory_bytes = 268_435_456    # 256 MB\nmax_cpu_time_ms = 30_000          # 30 seconds\nmax_tool_calls_per_minute = 60\nmax_llm_tokens_per_hour = 100_000  # None = inherit global, Some(0) = unlimited\nmax_cost_per_hour_usd = 0.0        # 0.0 = unlimited\nmax_cost_per_day_usd = 5.0\nmax_cost_per_month_usd = 50.0\n```\n\n`effective_token_limit()` normalizes the `Option<u64>` to a plain `u64`: both `None` and `Some(0)` yield `0` (unlimited), which callers check before enforcement.\n\n### Autonomous Configuration\n\nFor 24/7 agents:\n\n```toml\n[autonomous]\nquiet_hours = \"0 22 * * *\"      # cron expression\nmax_iterations = 50\nmax_restarts = 10\nheartbeat_interval_secs = 30\nheartbeat_timeout_secs = 90      # optional per-agent override\nheartbeat_keep_recent = 5        # optional: how many NO_REPLY turns to keep\nheartbeat_channel = \"telegram\"   # where to send heartbeat alerts\n```\n\n### Scheduling (`ScheduleMode`)\n\n```toml\n# Reactive (default) — wake on message/event\nschedule = \"reactive\"\n\n# Periodic — wake on cron\nschedule = { periodic = { cron = \"0 9 * * mon-fri\" } }\n\n# Proactive — wake on condition thresholds\nschedule = { proactive = { conditions = [\"queue_depth > 10\"] } }\n\n# Continuous — persistent loop\nschedule = { continuous = { check_interval_secs = 300 } }\n```\n\n### Context and Thinking Overrides\n\nPer-agent overrides that fall back to global config:\n\n```toml\nthinking = { budget_tokens = 5000, stream_thinking = true }\n\n[[context_injection]]\nposition = \"after_system\"\ncontent = \"Current time: {{now}}\"\n```\n\n### Dream Consolidation\n\n```toml\nauto_dream_enabled = true\nauto_dream_min_hours = 4.0       # override global [auto_dream] min_hours\nauto_dream_min_sessions = 10     # override global min_sessions\n```\n\nOpt-in per agent because consolidation costs tokens. Requires global `[auto_dream] enabled = true`.\n\n---\n\n## Approval System\n\n### Flow\n\n```mermaid\nsequenceDiagram\n    participant A as Agent Loop\n    participant K as Kernel\n    participant H as Human Operator\n    \n    A->>K: tool_call(\"shell_exec\", \"rm -rf /tmp/cache\")\n    K->>K: Check ApprovalPolicy\n    alt Tool requires approval\n        K->>K: Create ApprovalRequest\n        K->>H: Notify (Telegram/Discord/email)\n        K->>K: Pause agent\n        H->>K: ApprovalResponse (approved/denied/modify_and_retry)\n        alt Approved\n            K->>A: Execute tool\n        else ModifyAndRetry\n            K->>A: Return feedback, retry\n        else Timeout\n            K->>K: Apply TimeoutFallback\n        end\n    else No approval needed\n        K->>A: Execute tool immediately\n    end\n```\n\n### `ApprovalPolicy`\n\nControls which operations require human authorization:\n\n```toml\n[approval]\n# Boolean shorthand: true = default set, false = nothing\n# Or a list: [\"shell_exec\", \"file_delete\"]\nrequire_approval = true\n\ntimeout_secs = 60                  # 10..300\nauto_approve_autonomous = false    # bypass for autonomous agents\nauto_approve = false               # if true, clears require_approval at boot\ntimeout_fallback = \"deny\"          # \"deny\" | \"skip\" | { escalate = { extra_timeout_secs = 120 } }\n\n# Trusted senders bypass approval entirely\ntrusted_senders = [\"admin_123\", \"ops_456\"]\n\n# Per-channel tool rules (evaluated in order, first match wins)\n[[approval.channel_rules]]\nchannel = \"telegram\"\ndenied_tools = [\"shell_exec\"]      # deny-wins over allow\n\n[[approval.channel_rules]]\nchannel = \"discord\"\nallowed_tools = [\"file_read\", \"web_fetch\"]\n\n# Second-factor authentication\nsecond_factor = \"totp\"             # \"none\" | \"totp\" | \"login\" | \"both\"\ntotp_issuer = \"LibreFang\"\ntotp_grace_period_secs = 300       # skip re-verification within window\ntotp_tools = [\"shell_exec\"]        # empty = all approval tools need TOTP\n```\n\n#### Default Approval Set\n\n```rust\n[\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\", \"skill_evolve_*\"]\n```\n\nThe `skill_evolve_*` glob ensures that skill mutation tools (which write to `~/.librefang/skills/`) are gated at the same level as direct filesystem writes.\n\n### `ApprovalDecision`\n\nFive outcomes, with custom serialization:\n\n| Decision | Serialized As | Terminal? |\n|----------|---------------|-----------|\n| `Approved` | `\"approved\"` | Yes |\n| `Denied` | `\"denied\"` | Yes |\n| `TimedOut` | `\"timed_out\"` | Yes |\n| `Skipped` | `\"skipped\"` | Yes |\n| `ModifyAndRetry` | `{\"type\":\"modify_and_retry\",\"feedback\":\"...\"}` | No — agent retries |\n\nSimple variants serialize as plain strings for backward compatibility with existing API clients. `ModifyAndRetry` is an object because it carries feedback data.\n\n### `ChannelToolRule`\n\nPer-channel authorization with wildcard glob support:\n\n```rust\nlet rule = ChannelToolRule {\n    channel: \"telegram\".into(),\n    allowed_tools: vec![\"file_*\".into()],     // glob pattern\n    denied_tools: vec![\"file_delete\".into()],  // deny-wins\n};\nrule.check_tool(\"file_read\");   // Some(true)\nrule.check_tool(\"file_delete\"); // Some(false) — denied despite matching allow glob\nrule.check_tool(\"shell_exec\");  // Some(false) — not in allow list\n```\n\n### `TimeoutFallback`\n\nWhen no human responds within `timeout_secs`:\n\n- **`Deny`** (default) — treat as `Denied`.\n- **`Skip`** — agent continues without executing the tool.\n- **`Escalate`** — re-notify with additional timeout. `escalation_count` tracks iterations (max 3).\n\n### Risk Levels\n\nEach `ApprovalRequest` carries a `RiskLevel` with a display emoji:\n\n| Level | Emoji | Hex |\n|-------|-------|-----|\n| Low | ℹ️ | `\\u{2139}\\u{fe0f}` |\n| Medium | ⚠️ | `\\u{26a0}\\u{fe0f}` |\n| High | 🚨 | `\\u{1f6a8}` |\n| Critical | ☠️ | `\\u{2620}\\u{fe0f}` |\n\n---\n\n## Agent Identity and Registry\n\n### `AgentEntry`\n\nThe kernel's live registry entry for a spawned agent:\n\n```rust\npub struct AgentEntry {\n    pub id: AgentId,\n    pub name: String,\n    pub manifest: AgentManifest,\n    pub state: AgentState,         // Created | Running | Suspended | Terminated | Crashed\n    pub mode: AgentMode,           // Observe | Assist | Full\n    pub session_id: SessionId,\n    pub parent: Option<AgentId>,   // spawned-by relationship\n    pub children: Vec<AgentId>,\n    pub identity: AgentIdentity,   // emoji, color, archetype, vibe\n    pub onboarding_completed: bool,\n    pub is_hand: bool,             // set by hand spawner, survives restart\n    pub source_toml_path: Option<PathBuf>,\n    // ...\n}\n```\n\n### `AgentIdentity`\n\nVisual and personality metadata for the dashboard:\n\n```toml\n[identity]\nemoji = \"🔥\"\ncolor = \"#FF5C00\"\narchetype = \"devops\"\nvibe = \"technical\"\ngreeting_style = \"brief\"\n```\n\n---\n\n## Prompt Experiments (A/B Testing)\n\nThe types crate defines the data model for prompt versioning and A/B experiments:\n\n- **`PromptVersion`** — versioned system prompt with content hash and variable tracking.\n- **`PromptExperiment`** — an experiment with traffic split, success criteria, and variants.\n- **`ExperimentVariant`** — a named variant pointing to a prompt version.\n- **`ExperimentStatus`** — `Draft`, `Running`, `Paused`, `Completed`.\n- **`SuccessCriteria`** — configurable pass conditions (`require_user_helpful`, `require_no_tool_errors`, custom score thresholds).\n\n---\n\n## Utility Functions\n\n### `truncate_str`\n\n```rust\npub fn truncate_str(s: &str, max_bytes: usize) -> &str\n```\n\nSafely truncates a string to at most `max_bytes`, never splitting a UTF-8 character. Steps backward from the cut point to the nearest character boundary. This exists because LLM output can contain multi-byte characters (em dashes, CJK, emoji) and a naive byte-slice would panic.\n\n**Historical note**: This function was introduced after production panics in `kernel.rs` and `session.rs` caused by em dashes (U+2014, 3 bytes) appearing at exactly the truncation boundary (issue #104).\n\n### `serde_compat` Module\n\nLenient deserializers that prevent config loading from failing on common mistakes:\n\n- `vec_lenient` — treats `null` as empty vec, accepts single values as one-element vecs.\n- `map_lenient` — treats `null` as empty map.\n- `exec_policy_lenient` — accepts string shorthands (`\"allow\"`, `\"deny\"`, `\"full\"`, `\"allowlist\"`) or full table for `ExecPolicy`.\n\nThese are applied via `#[serde(deserialize_with = \"...\")]` on manifest fields so that minor config errors don't prevent agent loading.\n\n---\n\n## Validation\n\nBoth `ApprovalRequest` and `ApprovalPolicy` expose a `validate()` method that checks:\n\n- Tool name format: alphanumeric + underscores only (plus `*` for wildcards), max 64 chars, single wildcard per name.\n- Timeout bounds: 10–300 seconds.\n- List size limits: max 100 trusted senders, 50 channel rules, 50 tools per rule.\n- TOTP grace period: max 3600 seconds.\n- Required non-empty fields.\n\nValidation is called at config load time and when creating approval requests, before they enter the workflow.\n\n---\n\n## Web Search Augmentation\n\n`WebSearchAugmentationMode` controls automatic web search injection before LLM calls:\n\n| Mode | Behavior |\n|------|----------|\n| `Off` | Disabled |\n| `Auto` (default) | Search only when the model catalog reports `supports_tools == false` |\n| `Always` | Search before every call |\n\nThis enables models without tool/function calling support (e.g., Ollama Gemma) to benefit from web search without requiring the `web_search` tool.\n\n---\n\n## Integration Points\n\n### Consumed by the kernel (`src/`)\nThe kernel reads `AgentManifest` from TOML, constructs `AgentEntry` at spawn time, and uses `ApprovalPolicy` to gate dangerous tool calls. `SessionId::for_channel` reconnects users to existing sessions after restart.\n\n### Consumed by runtimes (`librefang-runtime-wasm`, `librefang-runtime-mcp`)\nWASM host functions check `capability_matches()` from the `capability` module. The MCP runtime registers tools using `ToolDefinition` and scans arguments with `scan_mcp_arguments_for_taint()`.\n\n### Consumed by channels (`librefang-channels`)\nChannel adapters use `Message` and `TokenUsage` types. The `i18n` module's `t()` and `t_args()` functions provide localized strings for channel-facing messages.\n\n### Consumed by memory (`librefang-memory`)\nThe memory substrate uses `MemoryKey`, session structures, and `extract_text_content()` from the `message` module for session persistence.\n\n### Consumed by skills (`librefang-skills`)\nThe skills system uses `map_tool_name()` and `is_known_librefang_tool()` from `tool_compat` for backward compatibility with legacy skill definitions.","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\nThe dashboard is a single-page React application that provides the management UI for LibreFang. It covers agent lifecycle, configuration, monitoring, chat, workflows, analytics, and infrastructure control through a sidebar-driven layout served at `/dashboard`.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[main.tsx] --> B[QueryClientProvider]\n    A --> C[RouterProvider]\n    A --> D[ToastContainer]\n    C --> E[App.tsx - Shell]\n    E --> F[Sidebar Navigation]\n    E --> G[Header Bar]\n    E --> H[Outlet - Routed Pages]\n    E --> I[AuthDialog]\n    E --> J[CommandPalette]\n    E --> K[NotificationCenter]\n    E --> L[ChunkErrorBoundary]\n    H --> M[\"Lazy Pages<br/>(~30 code-split chunks)\"]\n    M --> N[api.ts - HTTP Layer]\n    N --> O[LibreFang REST API]\n```\n\n## Entry Point — `main.tsx`\n\nBootstraps the React tree with three providers:\n\n- **`QueryClientProvider`** — TanStack Query for all server-state fetching. The `QueryClient` is configured with conservative defaults: one retry, 30-second stale time, no background refetch, no refetch on window focus.\n- **`RouterProvider`** — The TanStack Router instance from `router.tsx`.\n- **`ToastContainer`** — Global toast notification surface, rendered as a sibling to the router so it floats above all page content.\n\nInternationalization is initialized as a side-effect import (`./lib/i18n`).\n\n## Router — `router.tsx`\n\nUses TanStack Router with `basepath: \"/dashboard\"` and intent-based preloading (`defaultPreload: \"intent\"` — routes begin loading when the user hovers a nav link).\n\n### Route Tree\n\nAll pages are loaded via `lazyWithReload()`, which wraps React's `lazy()` with automatic recovery for stale chunks. The root route renders `App`, and the index route redirects `/` → `/overview`.\n\n| Path | Page Component | Notes |\n|------|---------------|-------|\n| `/overview` | `OverviewPage` | Dashboard home |\n| `/chat` | `ChatPage` | Accepts `?agentId=` search param |\n| `/canvas` | `CanvasPage` | Accepts `?t=` and `?wf=` search params |\n| `/agents` | `AgentsPage` | |\n| `/approvals` | `ApprovalsPage` | |\n| `/hands` | `HandsPage` | |\n| `/providers` | `ProvidersPage` | |\n| `/models` | `ModelsPage` | |\n| `/media` | `MediaPage` | |\n| `/channels` | `ChannelsPage` | |\n| `/skills` | `SkillsPage` | |\n| `/plugins` | `PluginsPage` | |\n| `/mcp-servers` | `McpServersPage` | |\n| `/workflows` | `WorkflowsPage` | |\n| `/scheduler` | `SchedulerPage` | |\n| `/goals` | `GoalsPage` | |\n| `/analytics` | `AnalyticsPage` | |\n| `/memory` | `MemoryPage` | |\n| `/logs` | `LogsPage` | |\n| `/runtime` | `RuntimePage` | |\n| `/comms` | `CommsPage` | |\n| `/terminal` | `TerminalPage` | Conditionally shown in nav |\n| `/network` | `NetworkPage` | |\n| `/a2a` | `A2APage` | |\n| `/telemetry` | `TelemetryPage` | |\n| `/sessions` | `SessionsPage` | |\n| `/settings` | `SettingsPage` | |\n| `/wizard` | `WizardPage` | |\n| `/config/general` | `ConfigPage` | `category=\"general\"` |\n| `/config/memory` | `ConfigPage` | `category=\"memory\"` |\n| `/config/tools` | `ConfigPage` | `category=\"tools\"` |\n| `/config/channels` | `ConfigPage` | `category=\"channels\"` |\n| `/config/security` | `ConfigPage` | `category=\"security\"` |\n| `/config/network` | `ConfigPage` | `category=\"network\"` |\n| `/config/infra` | `ConfigPage` | `category=\"infra\"` |\n\n### Chunk Error Recovery\n\nWhen the dashboard is rebuilt (dev HMR, version upgrade), old chunk hashes become invalid. The router handles this at two levels:\n\n1. **`lazyWithReload`** — Wraps each `lazy()` import. On chunk failure, calls `tryAutoReload()` which sets a `sessionStorage` cooldown key and calls `window.location.reload()` once per 10 seconds.\n\n2. **`ChunkErrorBoundary`** — The router's `defaultErrorComponent`. Catches render-time errors from stale React dispatcher state (a Vite HMR artifact). Shows a diagnostic UI with **Reload**, **Force Reload** (clears the cooldown), and optional stack trace.\n\nTwo regex patterns detect recoverable errors:\n- `CHUNK_ERROR_RE` — matches \"dynamically imported module\", \"Loading chunk … failed\"\n- `REACT_DISPATCHER_RE` — matches \"reading 'useState'\", \"reading 'useContext'\", etc.\n\n## Application Shell — `App.tsx`\n\nThe root component manages layout, authentication, navigation, and global UI concerns.\n\n### Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant App\n    participant API as api.ts\n    participant Backend\n\n    App->>API: checkDashboardAuthMode()\n    API->>Backend: GET /dashboard auth mode\n    Backend-->>API: AuthMode\n    alt mode == \"none\"\n        App->>App: setAuthNeeded(false)\n    else mode != \"none\"\n        App->>API: verifyStoredAuth()\n        API->>Backend: GET (with stored credentials)\n        alt authenticated\n            App->>App: setAuthNeeded(false)\n        else not authenticated\n            App->>App: Show AuthDialog\n        end\n    end\n```\n\n**Auth modes** (`AuthMode` type from `api.ts`):\n\n| Mode | Behavior |\n|------|----------|\n| `\"none\"` | No authentication required |\n| `\"api_key\"` | API key input only |\n| `\"credentials\"` | Username + password (with optional TOTP) |\n| `\"hybrid\"` | User chooses between API key and credentials tabs |\n\n**`AuthDialog`** handles:\n- API key submission — stores key via `setApiKey()`, validates with `verifyStoredAuth()`\n- Credential submission — calls `dashboardLogin(username, password)`\n- TOTP 2FA — when `dashboardLogin` returns `requires_totp: true`, shows a 6-digit code input, then calls `dashboardLogin(username, password, totpCode)`\n\nA global 401 handler is registered via `setOnUnauthorized()`. Any API call that returns 401 triggers re-authentication by re-checking the auth mode and showing the dialog.\n\n**`ChangePasswordModal`** provides self-service credential updates:\n- Change username (minimum 2 characters)\n- Change password (minimum 8 characters, confirmation required)\n- Both require current password verification\n- Calls `changePassword()`, then clears credentials and reloads on success\n\n### Sidebar Navigation\n\nThe sidebar is organized into six navigation groups, each defined in the `navGroups` memo:\n\n| Group | Items |\n|-------|-------|\n| **Core** | Overview, Chat, Agents, Approvals, Hands |\n| **Configure** | Providers, Models, Media, Channels, Skills, Plugins, MCP Servers |\n| **Config** | General, Memory, Tools, Channels, Security, Network, Infra, Settings |\n| **Automate** | Workflows, Scheduler, Goals |\n| **Observe** | Analytics, Memory, Logs, Runtime |\n| **Advanced** | Comms, Terminal (conditional), Network, A2A, Telemetry |\n\nThe Terminal nav item only appears when `terminalEnabled` is `true`, which is fetched from `getStatus()` on mount.\n\n**Nav layouts** (controlled by `useUIStore.navLayout`):\n- **Grouped** — all groups visible with labels\n- **Collapsible** — groups can be collapsed/expanded via `toggleNavGroup()`\n\n**Sidebar states**:\n- Desktop: expanded (280px) or collapsed (24px icons-only), toggled by `toggleSidebar()`\n- Mobile: slides in from left as an overlay, controlled by `isMobileMenuOpen`\n\n### Header Bar\n\nThe top header contains:\n- Mobile menu button (hidden on `lg:` breakpoint)\n- **NotificationCenter** — notification bell component\n- Language toggle (English ↔ Chinese)\n- Theme toggle (light ↔ dark)\n- User menu dropdown with Settings, Change Password, and Logout\n\n### UI Store\n\nGlobal UI state lives in `useUIStore` (Zustand). Key fields consumed in `App`:\n\n| Field | Purpose |\n|-------|---------|\n| `theme` | `\"light\"` or `\"dark\"`, toggles the `.dark` class on `<html>` |\n| `language` | `\"en\"` or `\"zh\"` |\n| `isSidebarCollapsed` | Desktop sidebar collapse state |\n| `isMobileMenuOpen` | Mobile overlay sidebar state |\n| `navLayout` | `\"grouped\"` or `\"collapsible\"` |\n| `collapsedNavGroups` | Record of group keys to collapsed state |\n| `terminalEnabled` | Whether the terminal feature is available |\n\n## API Layer\n\nAll backend communication goes through `api.ts`, which provides:\n\n- **`get()` / `post()` / `put()` / `patch()` / `del()`** — Generic HTTP methods that call `buildHeaders()` for auth injection and `parseError()` for error normalization\n- **`buildHeaders()`** → `authHeader()` → reads stored credentials from `localStorage`\n- **`setOnUnauthorized(callback)`** — Registers a global callback invoked on 401 responses, used by `App` to trigger re-authentication\n- **Auth functions**: `checkDashboardAuthMode`, `verifyStoredAuth`, `dashboardLogin`, `dashboardLogout`, `setApiKey`, `clearApiKey`, `getDashboardUsername`, `changePassword`\n- **Domain functions**: `listAgents`, `listProviders`, `listChannels`, `createWorkflow`, `runWorkflow`, `clawhubSearch`, `clawhubInstall`, etc.\n\nThe generated OpenAPI types in `openapi/generated.ts` provide full type coverage for all API endpoints and response shapes. These types are auto-generated and should not be edited directly.\n\n## Design System — `index.css`\n\n### Theming\n\nColors are defined as CSS custom properties with light/dark variants:\n\n- **Semantic colors**: `--brand-color`, `--success-color`, `--warning-color`, `--error-color`, `--accent-color`\n- **Layout colors**: `--bg-main`, `--bg-surface`, `--bg-surface-hover`, `--border-color`, `--text-muted`\n\nThese are mapped to Tailwind utilities via `@theme` declarations: `--color-brand`, `--color-surface`, `--color-text-dim`, etc. Dark mode uses `@custom-variant dark (&:where(.dark, .dark *))` so the `.dark` class on `<html>` activates all `dark:` utilities.\n\n### Custom Breakpoints\n\n| Name | Width | Purpose |\n|------|------|---------|\n| `3xl` | 1920px | QHD — 5-column card grids |\n| `4xl` | 2560px | UHD/4K — 6-column card grids |\n\n### Animation System\n\nSpring-physics curves modeled after Apple's motion design:\n\n| Variable | Curve | Use |\n|----------|-------|-----|\n| `--apple-spring` | `cubic-bezier(0.22, 1, 0.36, 1)` | Page transitions, sidebar |\n| `--apple-ease` | `cubic-bezier(0.25, 0.1, 0.25, 1)` | Chat messages |\n| `--apple-bounce` | `cubic-bezier(0.34, 1.56, 0.64, 1)` | Modals |\n\nApplied classes:\n- `.animate-fade-in-up` — 600ms spring entrance with blur-to-sharp\n- `.animate-fade-in-scale` — 500ms bounce scale for modals\n- `.animate-message-in` — 220ms light rise for chat bubbles\n- `.stagger-children` — Cascading entrance for child elements (40ms offset per child, disabled on mobile)\n- `.card-glow` — Hover depth effect with brand-tinted shadow\n- `.animate-progress` — Progress bar fill animation\n\nAll animations respect `prefers-reduced-motion: reduce` by disabling transforms, opacity transitions, and filters.\n\n## Adding a New Page\n\n1. Create the page component in `src/pages/MyPage.tsx` and export it as a named export.\n2. In `router.tsx`, add a `lazyWithReload` import:\n   ```tsx\n   const MyPage = lazyWithReload(() => import(\"./pages/MyPage\").then(m => ({ default: m.MyPage })));\n   ```\n3. Create a route:\n   ```tsx\n   const myRoute = createRoute({\n     getParentRoute: () => rootRoute,\n     path: \"/my-page\",\n     component: () => <L><MyPage /><\/L>\n   });\n   ```\n4. Add `myRoute` to the `routeTree` array.\n5. Optionally add a nav entry in the appropriate `navGroups` group in `App.tsx`.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop\n\nNative desktop application wrapping the LibreFang Agent OS. Built on Tauri 2.0, it boots the kernel and embedded API server, opens a native WebView pointing at the WebUI dashboard, and provides system tray integration, single-instance enforcement, native OS notifications, global shortcuts, auto-start, and automatic updates.\n\nSupports two modes of operation: **local mode** (embeds and manages a kernel + API server) and **remote mode** (connects the WebView to an already-running LibreFang instance elsewhere on the network).\n\n---\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"main.rs<br/>CLI (clap)\"]\n    RUN[\"lib.rs<br/>run()\"]\n    MODE{StartupMode?}\n    REMOTE[\"Remote Mode<br/>WebView → remote URL\"]\n    LOCAL[\"Local Mode<br/>start_server()\"]\n    SCREEN[\"Connection Screen<br/>Embedded HTML\"]\n\n    LOCAL --> SRV[\"server.rs<br/>ServerHandle\"]\n    SRV --> KERNEL[\"LibreFangKernel\"]\n    SRV --> AXUM[\"Embedded axum server<br/>127.0.0.1:random\"]\n\n    RUN --> TRAY[\"tray.rs<br/>System tray\"]\n    RUN --> SHORT[\"shortcuts.rs<br/>Global hotkeys\"]\n    RUN --> UPDATER[\"updater.rs<br/>Auto-update\"]\n\n    subgraph \"Tauri Managed State\"\n        PS[\"PortState\"]\n        KS[\"KernelState\"]\n        SUS[\"ServerUrlState\"]\n        RM[\"RemoteMode\"]\n        SH[\"ServerHandleHolder\"]\n    end\n\n    subgraph \"IPC Commands\"\n        CMD[\"commands.rs\"]\n        CONN[\"connection.rs\"]\n    end\n\n    CLI --> RUN\n    RUN --> MODE\n    MODE -->|Remote URL| REMOTE\n    MODE -->|--local| LOCAL\n    MODE -->|No preference| SCREEN\n    SCREEN -->|User chooses| CONN\n    CONN -->|start_local| SRV\n    CONN -->|connect_remote| REMOTE\n```\n\n---\n\n## Startup Flow\n\n### Entry Point (`main.rs`)\n\nThe binary entry point does two things before anything else:\n\n1. **Loads environment variables** from `~/.librefang/.env`, `secrets.env`, and vault files. This must happen synchronously at the top of `main()` because `std::env::set_var` is undefined behavior once other threads exist.\n2. **Parses CLI arguments** via clap:\n\n| Flag | Type | Purpose |\n|------|------|---------|\n| `--server-url <URL>` | `Option<String>` | Connect directly to a remote LibreFang server |\n| `--local` | `bool` | Skip connection screen, start local server immediately |\n\nThen calls `librefang_desktop::run(server_url, force_local)`.\n\n### Startup Mode Resolution (`lib.rs::run`)\n\nThe application resolves its connection mode using a strict priority chain:\n\n```\nCLI --server-url  >  CLI --local  >  LIBREFANG_SERVER_URL env var  >  saved preference  >  connection screen\n```\n\nThis produces one of three `StartupMode` variants:\n\n- **`StartupMode::Remote(url)`** — WebView navigates directly to the remote URL. No local kernel or server is started.\n- **`StartupMode::Local`** — `server::start_server()` is called immediately. The kernel boots, an axum server binds to `127.0.0.1:0` (random port), and the WebView navigates to `http://127.0.0.1:{port}`.\n- **`StartupMode::ConnectionScreen`** — A blank window is created and injected with self-contained HTML from `connection::connection_html()`. The user chooses remote or local from the UI.\n\n### Tauri Plugin Registration\n\nPlugins are registered conditionally for desktop targets (`#[cfg(desktop)]`):\n\n| Plugin | Purpose |\n|--------|---------|\n| `tauri_plugin_notification` | Native OS notifications |\n| `tauri_plugin_shell` | Shell access |\n| `tauri_plugin_dialog` | Native file dialogs |\n| `tauri_plugin_single_instance` | Focus existing window if already running |\n| `tauri_plugin_autostart` | Launch at login (passes `--minimized`) |\n| `tauri_plugin_updater` | Self-update mechanism |\n| `tauri_plugin_global_shortcut` | System-wide keyboard shortcuts |\n\nIf global shortcut registration fails, the app logs a warning and continues — it's non-fatal.\n\n---\n\n## Managed State\n\nTauri managed state is registered once at startup with interior-mutable wrappers. All updates flow through the `RwLock`/`Mutex` guards; `manage()` is never called a second time.\n\n| State Type | Inner Type | Purpose |\n|------------|------------|---------|\n| `PortState` | `RwLock<Option<u16>>` | Local server port. `None` in remote mode or before boot. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel instance + startup `Instant`. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | The URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | Whether currently connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Handle to the running server. Filled after boot; taken on shutdown or server change. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the kernel started, enabling uptime tracking.\n\n---\n\n## Server Lifecycle (`server.rs`)\n\n### `start_server()`\n\n1. Calls `LibreFangKernel::boot(None)` synchronously (no tokio required).\n2. Binds a `TcpListener` to `127.0.0.1:0` on the calling thread to reserve a port before any window is created.\n3. Spawns a named thread (`librefang-server`) that creates its own multi-threaded tokio runtime.\n4. Inside that runtime: calls `kernel.start_background_agents()`, spawns the approval sweep task, then runs the axum server via `run_embedded_server()`.\n\nReturns a `ServerHandle` containing the port, kernel `Arc`, shutdown watch channel, and the join handle.\n\n### `ServerHandle` Shutdown\n\nShutdown uses a `watch::Sender<bool>` channel with double-shutdown protection via `AtomicBool`:\n\n- **`shutdown(self)`** — Sends `true`, joins the server thread, then calls `kernel.shutdown()`. Blocks until complete.\n- **`Drop`** — Sends `true` but does not join the thread (best-effort, non-blocking).\n\nThe `compare_exchange` on `shutdown_initiated` prevents both methods from racing if called concurrently.\n\n### `run_embedded_server()`\n\nConverts the `std::net::TcpListener` to `tokio::net::TcpListener`, builds the axum router via `librefang_api::server::build_router()`, syncs dashboard assets in the background, and serves with graceful shutdown driven by the watch channel. On shutdown, it stops the bridge manager's channel bridges.\n\n---\n\n## Connection Screen (`connection.rs`)\n\nA self-contained HTML/CSS/JS page injected into an `about:blank` WebView. Provides two paths:\n\n1. **Remote connection** — User enters a server URL. The app tests connectivity via `/api/health`, then navigates the WebView.\n2. **Local server** — User clicks \"Start Local Server\". The app boots the kernel and server on a blocking thread, then navigates.\n\n### Preference Persistence\n\nSaved to `~/.librefang/desktop.toml` as:\n\n```toml\n[connection]\nmode = \"remote\"        # or \"local\"\nserver_url = \"http://...\"  # absent for local mode\n```\n\nLoaded by `load_saved_preference()`, saved by `save_preference()`. Health check must succeed before saving.\n\n### IPC Commands\n\n| Command | Parameters | Description |\n|---------|------------|-------------|\n| `test_connection` | `url: String` | Hits `/api/health` on the remote server. Returns the JSON response or an error. |\n| `connect_remote` | `url: String, remember: bool` | Validates URL, health-checks, saves preference, updates all managed state to remote mode, navigates WebView. |\n| `start_local` | `remember: bool` | Boots local server via `spawn_blocking`, fills all managed state, starts event forwarding, navigates WebView. |\n\nWhen switching modes, the commands clear the previous mode's state. For example, `connect_remote` sets `PortState` and `KernelState` to `None` since those are local-only.\n\n---\n\n## IPC Commands (`commands.rs`)\n\nAll commands return `Result<T, String>` for Tauri serialization.\n\n| Command | Returns | Description |\n|---------|---------|-------------|\n| `get_port` | `u16` | Returns the local server port. Errors if no local server. |\n| `get_status` | `serde_json::Value` | JSON with `status`, `port`, `agents` count, `uptime_secs`. |\n| `get_agent_count` | `usize` | Number of registered agents in the kernel. |\n| `import_agent_toml` | `String` | Opens native file picker, validates TOML as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, spawns the agent. Returns agent name. |\n| `import_skill_file` | `String` | Opens native file picker, copies to `~/.librefang/skills/`, triggers `kernel.reload_skills()`. Returns filename. |\n| `get_autostart` | `bool` | Whether launch-at-login is enabled. |\n| `set_autostart` | `bool` | Enable/disable autostart. Returns new state. |\n| `check_for_updates` | `UpdateInfo` | On-demand update check. |\n| `install_update` | `()` | Downloads and installs update, restarts app. Does not return on success. |\n| `open_config_dir` | `()` | Opens `~/.librefang/` in OS file manager. |\n| `open_logs_dir` | `()` | Opens `~/.librefang/logs/` in OS file manager. |\n\n---\n\n## System Tray (`tray.rs`)\n\n`setup_tray()` builds a menu with contextual information and actions:\n\n```\n┌─────────────────────────────┐\n│ Show Window                 │\n│ Open in Browser             │\n│ Change Server...            │\n│ ─────────────────────────── │\n│ Agents: 3 running           │  (disabled, display-only)\n│ Status: Running (2h 15m)    │  (disabled, display-only)\n│ ─────────────────────────── │\n│ ☑ Launch at Login           │\n│ Check for Updates...        │\n│ Open Config Directory        │\n│ ─────────────────────────── │\n│ Quit LibreFang              │\n└─────────────────────────────┘\n```\n\nKey behaviors:\n\n- **Status items** reflect current mode: shows \"Remote (url)\" for remote mode or \"Running (uptime)\" for local mode. These are read at tray setup time and are not dynamically updated.\n- **Open in Browser** reads `ServerUrlState` (works for both modes), falling back to `PortState` for backward compatibility.\n- **Change Server** shuts down any running local server (in a spawned thread to avoid blocking the tray handler), clears local state, and re-injects the connection screen HTML into the WebView.\n- **Left-click tray icon** shows and focuses the window.\n- **Close button** is intercepted in `on_window_event` — the window is hidden instead of destroyed, keeping the app running in the tray.\n\n---\n\n## Global Shortcuts (`shortcuts.rs`)\n\n`build_shortcut_plugin()` registers three system-wide shortcuts:\n\n| Shortcut | Action |\n|----------|--------|\n| `Ctrl+Shift+O` | Show/focus the LibreFang window |\n| `Ctrl+Shift+N` | Show window + emit `\"navigate\"` event with payload `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `\"navigate\"` event with payload `\"chat\"` |\n\nThe WebUI listens for the `\"navigate\"` event to route to the appropriate page. Registration failure is non-fatal — the app logs a warning and continues without shortcuts.\n\n---\n\n## Auto-Update System (`updater.rs`)\n\n### `UpdateInfo`\n\n```rust\npub struct UpdateInfo {\n    pub available: bool,\n    pub version: Option<String>,\n    pub body: Option<String>,\n}\n```\n\n### Startup Auto-Update\n\n`spawn_startup_check()` runs after a 10-second delay. If an update is found, it sends a notification, waits 3 seconds for visibility, then silently downloads and installs. On success, `app_handle.restart()` terminates the process — the function never returns.\n\n### Manual Update\n\nTwo-step process exposed as IPC commands:\n\n1. `check_for_update()` — Returns `UpdateInfo` for the frontend to display.\n2. `download_and_install_update()` — Performs the actual download and restart. Does not return on success.\n\nThe tray's \"Check for Updates...\" menu item chains both steps: if an update is available, it notifies the user and installs immediately; if up-to-date, it shows a confirmation notification.\n\n---\n\n## Event Forwarding (`lib.rs::forward_kernel_events`)\n\nWhen running in local mode, a background task subscribes to the kernel's event bus and forwards critical events as native OS notifications:\n\n| Event | Notification Title |\n|-------|--------------------|\n| `LifecycleEvent::Crashed` | \"Agent Crashed\" |\n| `SystemEvent::KernelStopping` | \"Kernel Stopping\" |\n| `SystemEvent::QuotaEnforced` | \"Quota Enforced\" |\n\nAll other event types are skipped. The task handles broadcast lag gracefully (logs and continues) and exits cleanly when the channel closes.\n\n---\n\n## Window Behavior\n\n- **Single instance** — If a second instance launches, the existing window is shown, unminimized, and focused. The second instance exits.\n- **Close to tray** — Clicking the window close button hides the window instead of quitting. The app continues running in the system tray.\n- **Connection screen** — Created by navigating to `about:blank` and injecting HTML via `window.eval()`. This avoids needing a separate HTML file in the Tauri bundle.\n- **Title** — Set to \"LibreFang — Connect\" on the connection screen, \"LibreFang\" otherwise.\n\n---\n\n## Configuration Files\n\n| File | Purpose |\n|------|---------|\n| `~/.librefang/.env` | Environment variables loaded at startup |\n| `~/.librefang/secrets.env` | Secret environment variables |\n| `~/.librefang/desktop.toml` | Pers
