 HTTP client/server abstractions |\n| `librefang-channels` | Async message-passing channels between runtime components |\n| `librefang-kernel-handle` | Low-level kernel interface |\n\n### Sandboxing\n\nTwo optional Linux sandboxing strategies are available behind feature flags:\n\n- **`landlock-sandbox`** ŌĆö Uses the Linux Landlock LSM to restrict filesystem and network access for spawned processes.\n- **`seccomp-sandbox`** ŌĆö Uses seccomp-bpf to filter allowed syscalls.\n\nBoth can be enabled simultaneously. On non-Unix platforms, neither feature has effect.\n\n### Document Processing\n\n- **`pdf-extract`** ŌĆö Extracts text content from PDF files, enabling agents to ingest PDF documents.\n\n### Cryptography & Integrity\n\n- **`ed25519-dalek`** ŌĆö Ed25519 signing and verification, used for agent identity and message authentication.\n- **`sha2`**, **`hmac`** ŌĆö Hashing and HMAC for integrity checks.\n- **`zeroize`** ŌĆö Secure clearing of sensitive key material from memory.\n\n### Concurrency & State\n\n- **`dashmap`** ŌĆö Lock-free concurrent hashmap for runtime-wide shared state.\n- **`parking_lot`** ŌĆö Performance-oriented synchronization primitives.\n- **`tokio`** ŌĆö Async runtime foundation.\n\n### Persistence\n\n- **`rusqlite`** ŌĆö Embedded SQLite for structured local storage (session history, configuration, caches).\n\n### Networking\n\n- **`tokio-tungstenite`** ŌĆö Async WebSocket client, used for streaming connections to LLM providers or real-time services.\n- **`ureq`** ŌĆö Synchronous HTTP fallback for contexts where async is unavailable.\n\n## Feature Flags\n\n```toml\n# Enable Linux Landlock filesystem/network sandboxing\nlandlock-sandbox = [\"dep:landlock\"]\n\n# Enable seccomp-bpf syscall filtering\nseccomp-sandbox = [\"dep:seccompiler\"]\n```\n\nBoth features are off by default. Enable them in `Cargo.toml` when building for production Linux deployments:\n\n```toml\nlibrefang-runtime = { features = [\"landlock-sandbox\", \"seccomp-sandbox\"] }\n```\n\n## Relationship to Other Crates\n\nThis crate sits near the top of the dependency graph. It is a **consumer**, not a library crate consumed by other workspace members. Downstream crates (CLI, server, or integration layers) depend on `librefang-runtime` to bootstrap and manage agents.\n\nThe sibling crates it depends on are intentionally kept thin and focused. The runtime's job is to:\n\n1. **Initialize** an agent with its configuration, identity keys, and LLM driver.\n2. **Run** the agent loop ŌĆö sending prompts, receiving completions, dispatching tool calls via MCP or skills.\n3. **Isolate** untrusted code execution through WASM or OS-level sandboxing.\n4. **Persist** conversation and agent state through the memory and SQLite layers.\n5. **Authenticate** to external APIs using the OAuth runtime when required.","other-librefang-skills":"# Other ŌĆö librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang ŌĆö provides the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer.\n\n## Overview\n\nThis crate manages the full lifecycle of **skills** (also called \"plugins\" or \"addons\" in other systems): discovery from disk, deserialization of manifests, registration in an in-memory index, downloading from a remote marketplace, and interoperability with the OpenClaw skill format.\n\nIt is a pure library crate with no binary target. Other LibreFang components depend on it to resolve and instantiate skills at runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Loader]\n    A --> C[Marketplace Client]\n    B --> D[Filesystem Scan]\n    B --> E[Manifest Parse]\n    C --> F[Remote API via reqwest+rustls]\n    A --> G[OpenClaw Adapter]\n    D --> H[.zip / .toml / .yaml / .json]\n    E --> H\n```\n\n## Key Concepts\n\n### Skill Manifest\n\nEvery skill is described by a manifest file containing metadata such as name, version, description, and entry-point path. Manifests may be authored in TOML, YAML, or JSON ŌĆö the loader detects the format by file extension and deserializes through the appropriate `serde` frontend.\n\nVersions follow **semantic versioning** (`semver` crate) and are compared/enforced throughout the registry.\n\n### Skill Package\n\nSkills are distributed as **ZIP archives** containing the manifest and all runtime assets. The loader unpacks these into a local directory and indexes them.\n\nIntegrity is verified via **SHA-256** digests (`sha2` + `hex`) computed over the archive bytes.\n\n## Components\n\n### Registry\n\nThe central in-memory store of all known skills. It supports:\n\n- **Insertion and lookup** by skill ID and version range.\n- **Efficient name-based search** using the Aho-Corasick algorithm (`aho-corasick` crate), allowing fast fuzzy or prefix matching across the full catalogue.\n- **Thread-safe access** designed for use within a Tokio runtime.\n\n### Loader\n\nReads skills from the local filesystem:\n\n1. **Walks** a configured skill directory recursively (`walkdir`).\n2. Detects manifest files by extension (`.toml`, `.yaml`, `.json`).\n3. **Parses** the manifest into a typed skill descriptor (`serde` deserialization).\n4. For `.zip` packages, **extracts** the archive (`zip` crate) and locates the manifest inside.\n5. **Registers** the loaded skill into the registry.\n\nFile-level locking (`fs2`) prevents concurrent write corruption when multiple processes load or update skills in a shared directory.\n\n### Marketplace Client\n\nDownloads skills from a remote marketplace over HTTPS:\n\n- Uses **reqwest** with a **rustls** TLS backend (`rustls` + `webpki-roots` + `rustls-native-certs`) ŌĆö no native TLS library dependency required.\n- Supports querying the marketplace catalogue and fetching individual skill packages.\n- Timestamps downloads using `chrono` for cache/validation purposes.\n\n### OpenClaw Compatibility\n\nAn adapter layer that translates **OpenClaw-format** skill packages into LibreFang's internal representation. This allows users to migrate or share skills between the two ecosystems without manual conversion.\n\n## Error Handling\n\nAll fallible operations return `Result<T, SkillError>` where `SkillError` is an enum derived via `thiserror`. Variants cover I/O failures, manifest parse errors, ZIP extraction issues, network errors from the marketplace, integrity check failures, and version constraint violations.\n\n## Logging\n\nSignificant operations (skill discovery, load failures, marketplace requests, integrity mismatches) are instrumented with `tracing` spans and events. Downstream consumers should initialize a `tracing` subscriber to capture this output.\n\n## Dependencies on Other Crates\n\n| Crate | Role in this module |\n|---|---|\n| `librefang-types` | Shared domain types (skill descriptors, IDs, etc.) |\n| `serde` / `serde_json` / `toml` / `serde_yaml` | Multi-format manifest deserialization |\n| `zip` | Skill package extraction |\n| `walkdir` | Recursive directory scanning |\n| `reqwest` + `rustls` | Marketplace HTTPS client |\n| `sha2` + `hex` | Package integrity verification |\n| `semver` | Version parsing and comparison |\n| `aho-corasick` | Fast skill name search |\n| `fs2` | File locking for concurrent safety |\n| `tokio` | Async runtime primitives |\n\n## Testing\n\nTests use `tempfile` to create isolated directory trees for loader tests and `serial_test` to serialize tests that share filesystem state. Run with:\n\n```bash\ncargo test -p librefang-skills\n```","other-librefang-telemetry":"# Other ŌĆö librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Overview\n\n`librefang-telemetry` provides the metrics layer for the LibreFang system. It is a thin library crate that defines the application-level metrics used throughout the codebase ŌĆö counters, gauges, histograms, and labeled instruments ŌĆö using the [`metrics`](https://docs.rs/metrics) facade crate.\n\nBecause it depends on the `metrics` facade rather than a concrete exporter, the actual backend (Prometheus, OpenTelemetry, etc.) is selected at the binary level. This crate's job is to **declare** what gets measured; the application binary wires up the exporter.\n\n## Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `metrics` (workspace) | Metrics facade ŌĆö provides macros like `counter!`, `gauge!`, `histogram!`, and the `Metrics` trait for custom instrumentation |\n| `librefang-types` | Shared domain types used as labels or keys in metrics (e.g., game identifiers, session types) |\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[librefang-telemetry] -->|defines instruments| B[\"metrics facade (macros)\"]\n    A -->|uses types as labels| C[librefang-types]\n    D[Application Binary] -->|depends on| A\n    D -->|wires exporter| E[\"metrics-exporter-prometheus / opentelemetry\"]\n    B -.->|dispatches to| E\n```\n\nThe crate itself has no runtime behavior. It contains no `main`, no async runtime, and no side effects. It exists solely to:\n\n1. **Centralize metric definitions** so that metric names, labels, and units are consistent across all LibreFang components.\n2. **Depend on `librefang-types`** so that domain types can be used as metric labels without duplicating definitions.\n\n## Usage\n\nOther crates in the workspace import `librefang-telemetry` and call into the `metrics` macros it exposes or wraps. The concrete exporter is configured in the final binary (e.g., `librefang-server`).\n\n### Wiring up the exporter (binary level)\n\nThe binary crate selects and installs a metrics exporter. For example, with a Prometheus exporter:\n\n```rust\n// In the application binary ŌĆö not in this crate\nuse metrics_exporter_prometheus::PrometheusBuilder;\n\nlet recorder = PrometheusBuilder::new().build_recorder();\nmetrics::set_boxed_recorder(Box::new(recorder)).unwrap();\n```\n\n### Recording metrics (library level)\n\nComponents throughout the codebase call the `metrics` macros directly or via helpers defined in this crate:\n\n```rust\nuse metrics::counter;\n\ncounter!(\"connections_total\", \"protocol\" => \"tcp\").increment(1);\n```\n\nBecause `librefang-telemetry` centralizes the metric naming conventions, prefer importing from this crate when it re-exports or wraps the `metrics` macros, ensuring namespacing stays consistent.\n\n## Metric Naming Conventions\n\nAll metrics in LibreFang should follow these conventions to ensure uniformity:\n\n- **Prefix**: Metrics are prefixed with a namespace (e.g., `librefang_`) to avoid collisions when exported.\n- **Suffixes**: Use standard suffixes ŌĆö `_total` for counters, `_seconds` for time-based histograms, `_bytes` for size-based instruments.\n- **Labels**: Use types from `librefang-types` where applicable to keep label values consistent and type-safe.\n\n## Role in the Workspace\n\nThis crate sits in the \"other\" category ŌĆö it is not a service or a core domain crate. It is a shared utility that any crate needing observability can depend on without pulling in a concrete metrics backend.\n\n| Aspect | Detail |\n|---|---|\n| **Layer** | Cross-cutting / infrastructure |\n| **Depends on** | `librefang-types`, `metrics` |\n| **Depended on by** | Any workspace crate that emits metrics |\n| **Runtime** | None ŌĆö compile-time definitions only |\n\n## Contributing\n\nWhen adding new metrics:\n\n1. Add the metric definition in this crate to keep naming centralized.\n2. Use types from `librefang-types` for labels where possible.\n3. Document the metric's purpose, unit, and expected labels.\n4. Do **not** add a dependency on a specific exporter in this crate ŌĆö that belongs in the binary.","other-librefang-testing":"# Other ŌĆö librefang-testing\n\n# librefang-testing\n\nTest infrastructure providing mock implementations of core system components and utilities for testing API routes.\n\n## Purpose\n\nThis crate centralizes test-only tooling used across the `librefang` workspace. Rather than each crate shipping its own ad-hoc mocks and test helpers, `librefang-testing` provides:\n\n- **Mock kernel** ŌĆö a deterministic, in-memory stand-in for the real kernel, used in integration and unit tests that need kernel semantics without side effects.\n- **Mock LLM driver** ŌĆö a fake LLM backend that returns canned or configurable responses, allowing API and runtime logic to be tested without network calls or API keys.\n- **API route test utilities** ŌĆö helpers for constructing and invoking Axum routes in isolation, including request building, response body parsing, and test-state management.\n\n## Dependencies & Rationale\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared domain types used in assertions and request/response construction. |\n| `librefang-kernel` | Provides the trait/interface that the mock kernel implements. |\n| `librefang-runtime` | Runtime abstractions the mock LLM driver satisfies. |\n| `librefang-api` | Route definitions and handlers being tested; pulled with `telemetry` feature but without default features to keep the test dependency graph lean. |\n| `axum`, `tower`, `http-body-util` | Building lightweight test servers, layering middleware, and reading response bodies without spinning up a real HTTP listener. |\n| `dashmap` | Concurrent map used internally by mocks to track state across async calls. |\n| `tempfile` | Creating ephemeral directories/files for tests that touch the filesystem. |\n| `toml`, `serde_json` | Serializing/deserializing configuration and request/response payloads in tests. |\n| `uuid` | Generating deterministic or random identifiers within mocks. |\n| `async-trait` | Implementing async trait methods on mock structs. |\n| `tokio` | Async test runtime (`#[tokio::test]`). |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Test in any crate] --> B[librefang-testing]\n    B --> C[Mock Kernel]\n    B --> D[Mock LLM Driver]\n    B --> E[API Route Test Utilities]\n    C -.implements.-> F[librefang-kernel trait]\n    D -.implements.-> G[librefang-runtime trait]\n    E -.uses.-> H[librefang-api routes]\n    C --> I[dashmap / tempfile]\n    D --> I\n    E --> J[axum + tower + http-body-util]\n```\n\nThe mock kernel and mock LLM driver implement the same traits defined in `librefang-kernel` and `librefang-runtime` respectively. This allows tests to substitute the real implementations by simply swapping the dependency injection, keeping production code completely unaware of test infrastructure.\n\nThe API route utilities leverage Axum's `tower::ServiceExt` patternŌĆöcalling `.oneshot(request)` on a constructed routerŌĆöso tests exercise the full middleware and handler stack without binding to a network port.\n\n## Usage Patterns\n\n### Using the Mock Kernel\n\nTests inject the mock kernel wherever the kernel trait is expected. The mock maintains state in memory (backed by `DashMap`), so successive calls reflect prior mutationsŌĆöwrites are visible to subsequent reads within the same test. Any temporary file or directory needs are handled via `tempfile`, which cleans up on drop.\n\n### Using the Mock LLM Driver\n\nThe mock LLM driver implements the same async interface as production drivers. It can be pre-configured with specific responses, allowing tests to assert how the system handles various LLM outputs (valid responses, empty responses, errors) without network traffic or latency.\n\n### Testing API Routes\n\nThe route test utilities handle the boilerplate of:\n\n1. Constructing an Axum `Router` with the desired routes and middleware.\n2. Building HTTP requests with appropriate headers, query parameters, and JSON bodies via `serde_json`.\n3. Executing the request through the router using `tower::ServiceExt::oneshot`.\n4. Reading and deserializing the response body with `http-body-util`.\n\nThis gives tests full coverage of request parsing, handler logic, middleware, and response serialization in a single function call.\n\n## Relationship to Other Crates\n\n`librefang-testing` is a **dev-only dependency**ŌĆöit is never included in production builds. Other workspace crates reference it in their `[dev-dependencies]` to access mocks and utilities during `cargo test`. Because it depends on `librefang-api`, `librefang-kernel`, and `librefang-runtime`, it stays in sync with their interfaces: if a trait signature changes, the mocks must be updated, and compilation catches the mismatch immediately.","other-librefang-types-locales":"# Other ŌĆö librefang-types-locales\n\n# librefang-types-locales\n\nLocalized API error messages for the LibreFang platform, stored in [Project Fluent](https://projectfluent.org/) (`.ftl`) format. This module is a **static resource** ŌĆö it contains no executable code. Other crates load these files at runtime through a Fluent-compatible localization system to produce human-readable error strings in the user's preferred language.\n\n## Supported Locales\n\n| Directory | Language | Completeness |\n|-----------|----------|-------------|\n| `en/` | English (reference) | Full ŌĆö all error keys |\n| `ja/` | Japanese | Full ŌĆö matches English |\n| `de/` | German | Partial ŌĆö core errors only |\n| `es/` | Spanish | Partial ŌĆö core errors only |\n| `fr/` | French | Partial ŌĆö core errors only |\n| `zh-CN/` | Simplified Chinese | Partial ŌĆö core + tool errors |\n\nEnglish (`en`) is the canonical source of truth. When other locales are missing a key, the Fluent runtime falls back to English automatically.\n\n## File Structure\n\nEach locale contains a single `errors.ftl` file:\n\n```\nlocales/\nŌö£ŌöĆŌöĆ de/errors.ftl\nŌö£ŌöĆŌöĆ en/errors.ftl\nŌö£ŌöĆŌöĆ es/errors.ftl\nŌö£ŌöĆŌöĆ fr/errors.ftl\nŌö£ŌöĆŌöĆ ja/errors.ftl\nŌööŌöĆŌöĆ zh-CN/errors.ftl\n```\n\n## Message Format\n\nMessages follow Fluent syntax. Each line defines a message identifier and its localized text:\n\n```fluent\napi-error-agent-not-found = Agent not found\n```\n\n### Variables\n\nMany messages accept interpolated variables using `{$name}` syntax:\n\n```fluent\napi-error-message-delivery-failed = Message delivery failed: { $reason }\napi-error-template-not-found = Template '{ $name }' not found\napi-error-agent-execution-failed = Agent execution failed: { $error }\napi-error-agent-not-found-with-id = Agent not found: { $id }\n```\n\nWhen calling code resolves a message, it passes a map of variable values. The Fluent runtime substitutes them into the output string.\n\n## Error Key Naming Convention\n\nAll keys follow the pattern:\n\n```\napi-error-<domain>-<specific-error>\n```\n\nDomains in the current catalog:\n\n| Domain | Example Key | Typical Variables |\n|--------|------------|-------------------|\n| `agent` | `api-error-agent-not-found` | `$id`, `$error`, `$field`, `$valid` |\n| `message` | `api-error-message-too-large` | `$reason` |\n| `template` | `api-error-template-not-found` | `$name`, `$error` |\n| `manifest` | `api-error-manifest-signature-mismatch` | ŌĆö |\n| `auth` | `api-error-auth-invalid-key` | ŌĆö |\n| `session` | `api-error-session-not-found` | `$error` |\n| `workflow` | `api-error-workflow-missing-steps` | `$step` |\n| `trigger` | `api-error-trigger-not-found` | ŌĆö |\n| `budget` | `api-error-budget-update-failed` | ŌĆö |\n| `config` | `api-error-config-parse-failed` | `$error` |\n| `profile` | `api-error-profile-not-found` | `$name` |\n| `cron` | `api-error-cron-create-failed` | `$error` |\n| `goal` | `api-error-goal-circular-parent` | `$id`, `$error` |\n| `memory` | `api-error-memory-not-found` | ŌĆö |\n| `network` | `api-error-network-connection-failed` | `$url`, `$error`, `$status` |\n| `plugin` | `api-error-plugin-missing-name` | ŌĆö |\n| `channel` | `api-error-channel-unknown` | ŌĆö |\n| `provider` | `api-error-provider-not-found` | `$name`, `$alias`, `$id`, `$provider`, `$error` |\n| `skill` | `api-error-skill-missing-name` | `$error`, `$max` |\n| `hand` | `api-error-hand-not-found` | `$id` |\n| `mcp` | `api-error-mcp-not-found` | `$name`, `$error` |\n| `integration` | `api-error-integration-not-found` | `$id` |\n| `extension` | `api-error-extension-not-found` | `$id` |\n| `system` | `api-error-system-cli-not-found` | ŌĆö |\n| `kv` | `api-error-kv-missing-fields` | ŌĆö |\n| `approval` | `api-error-approval-not-found` | ŌĆö |\n| `webhook` | `api-error-webhook-not-found` | `$error`, `$event`, `$valid` |\n| `backup` | `api-error-backup-not-found` | `$error` |\n| `schedule` | `api-error-schedule-not-found` | `$error` |\n| `job` | `api-error-job-not-found` | ŌĆö |\n| `task` | `api-error-task-not-found` | ŌĆö |\n| `pairing` | `api-error-pairing-not-enabled` | ŌĆö |\n| `binding` | `api-error-binding-out-of-range` | ŌĆö |\n| `command` | `api-error-command-not-found` | `$name` |\n| `file` | `api-error-file-not-found` | `$max` |\n| `tool` | `api-error-tool-not-found` | `$name` |\n| `validation` | `api-error-validation-title-required` | ŌĆö |\n| *(general)* | `api-error-not-found` | `$reason` |\n\nGeneral errors (`api-error-not-found`, `api-error-internal`, `api-error-bad-request`, `api-error-rate-limited`) have no domain prefix segment beyond `api-error-`.\n\n## How the Codebase Consumes These Files\n\nThis module produces no function calls and receives none. It is a **pure data** dependency. The typical integration path is:\n\n1. At build time or startup, the consuming crate locates the `locales/` directory (via `CARGO_MANIFEST_DIR`, a configured path, or `include_str!`).\n2. A Fluent `Bundle` is constructed per locale, loading `errors.ftl` from each directory.\n3. When an API handler needs to return an error, it calls into a localization function that:\n   - Selects the user's preferred locale (from `Accept-Language`, configuration, or session data).\n   - Looks up the message by its Fluent identifier (e.g., `api-error-agent-not-found`).\n   - Passes any required variables (e.g., `{ \"id\": \"abc-123\" }`).\n   - Returns the resolved string for use in the HTTP response body.\n\n## Adding a New Error Message\n\n1. **Add the key to `en/errors.ftl`** ŌĆö this is the reference locale. Place it under the correct domain comment heading, or add a new heading if it's a new domain.\n\n   ```fluent\n   api-error-agent-new-example = New example error: { $detail }\n   ```\n\n2. **Add translations to all other locales** that should cover this error. At minimum, add the key to every locale directory that exists. If a locale is still a partial translation, adding the key is still recommended to make future completion easier.\n\n3. **Use the key in application code** ŌĆö reference the identifier when constructing API error responses so the Fluent resolver can look it up at runtime.\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` using the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g., `pt-BR/`).\n2. Copy `en/errors.ftl` into the new directory as a starting template.\n3. Translate every message value (the text after `=`) while keeping:\n   - All message identifiers unchanged.\n   - All variable references (`{ $name }`) unchanged.\n   - All comments (optional ŌĆö translate or remove as needed).\n4. Register the new locale in whatever locale negotiation or bundle construction logic the consuming crate uses.","other-librefang-types-src":"# Other ŌĆö librefang-types-src\n\n# librefang-types ŌĆö Model Catalog Types\n\nShared data structures for the librefang model registry. This module defines the schema that flows through every layer: TOML catalog files on disk, the runtime model catalog, metering/cost estimation, and the dashboard API.\n\n## Architecture\n\n```mermaid\ngraph LR\n    TOML[\"TOML Catalog Files\"] --> MCF[ModelCatalogFile]\n    MCF --> PCT[ProviderCatalogToml]\n    MCF --> MCE[ModelCatalogEntry]\n    PCT -->|From impl| PI[ProviderInfo]\n    PI --> Runtime[\"librefang-runtime<br/>model_catalog / model_metadata\"]\n    MCE --> Runtime\n    MCE --> Metering[\"librefang-kernel-metering<br/>cost estimation\"]\n    MCE --> Dashboard[\"routes/providers<br/>add_custom_model\"]\n    ACF[AliasesCatalogFile] --> Runtime\n```\n\n## Core Enums\n\n### `ModelTier`\n\nCapability classification for models. Serde lowercases (`\"frontier\"`, `\"smart\"`, etc.). Default is `Balanced`.\n\n| Variant | Typical examples |\n|---|---|\n| `Frontier` | Claude Opus, GPT-4.1 |\n| `Smart` | Claude Sonnet, Gemini 2.5 Flash |\n| `Balanced` | GPT-4o-mini, Groq Llama |\n| `Fast` | Fastest/cheapest for simple tasks |\n| `Local` | Ollama, vLLM, LM Studio |\n| `Custom` | User-defined models added at runtime |\n\nMarked `#[non_exhaustive]` ŌĆö new tiers may be added without a semver bump.\n\n### `AuthStatus`\n\nProvider authentication state, detected at runtime. Default is `Missing`.\n\nKey method: **`is_available()`** ŌĆö returns `true` for `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Returns `false` for `InvalidKey` (key exists but rejected), `Missing`, `CliNotInstalled`, and `LocalOffline`.\n\nNotable variants:\n- **`AutoDetected`** ŌĆö key found via a fallback env var; functionally usable but may not match the actual provider.\n- **`LocalOffline`** ŌĆö local provider probed and found offline. Unlike `Missing`, `detect_auth()` will not reset this; the probe loop owns the transition back to `NotRequired`.\n\n### `Modality`\n\nWhat kind of output the model produces. Controls which fields in `ModelCatalogEntry` are required. Default is `Text`.\n\n- **`Text`** ŌĆö chat/completion/reasoning models. `context_window` and `max_output_tokens` are required (enforced by `validate()`).\n- **`Image`**, **`Audio`**, **`Video`**, **`Music`** ŌĆö asset-generation models. Token context fields may be zero/absent; `validate()` skips the nonzero check.\n\n### `ModelType`\n\nClassification used in `ModelOverrides`: `Chat` (default), `Speech`, `Embedding`.\n\n## Core Structs\n\n### `ModelCatalogEntry`\n\nA single model in the catalog. Deserialized from the `[[models]]` TOML array sections.\n\n**Fields of note:**\n\n| Field | Notes |\n|---|---|\n| `context_window` / `max_output_tokens` | `#[serde(default)]` ŌĆö absent means `0`. Consumers **must not** feed `0` into compaction thresholds or budget math; treat it as unknown. |\n| `image_input_cost_per_m` / `image_output_cost_per_m` | `Option<f64>`, only set for image/multimodal models with separate image token pricing. |\n| `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking` | Capability flags, all default `false`. |\n| `aliases` | Short names resolved at lookup time (e.g. `\"sonnet\"` ŌåÆ canonical ID). |\n\n**Methods:**\n\n- **`is_image_generation()`** ŌĆö convenience check for `modality == Modality::Image`.\n- **`validate()`** ŌĆö modality-aware schema check. For `Text` models, rejects entries where `context_window` or `max_output_tokens` is zero. Non-text modalities pass unconditionally. Catalog loaders **must** call this and reject failing entries.\n\n### `ModelOverrides`\n\nPer-model inference parameter overrides, persisted to `~/.librefang/model_overrides.json` keyed by `provider:model_id`. Every field is `Option` ŌĆö `None` means \"use the agent's or system default.\"\n\nOverride precedence (highest to lowest): agent-level `ModelConfig` ŌåÆ `ModelOverrides` ŌåÆ system defaults.\n\n**`is_empty()`** returns `true` when all fields are `None`.\n\n### `ProviderInfo`\n\nRuntime provider metadata. Includes fields not present in TOML (auth status, model count, available models list, custom flag, proxy URL). This is what the rest of the codebase works with.\n\n### `ProviderCatalogToml`\n\nProvider metadata as stored in TOML files. A clean 1:1 mapping to `[provider]` sections ŌĆö no runtime fields.\n\n**Conversion:** `From<ProviderCatalogToml> for ProviderInfo` populates runtime fields with safe defaults (`auth_status: Missing`, `model_count: 0`, empty `available_models`, `is_custom: false`).\n\n### `RegionConfig`\n\nPer-region endpoint override within a provider. Contains a `base_url` and optional `api_key_env`. When a region is selected, its `base_url` replaces the provider-level default; if `api_key_env` is set, it overrides the provider-level key env var.\n\n### `ModelCatalogFile`\n\nTop-level catalog file structure: an optional `[provider]` section plus a `[[models]]` array. Used for both the main registry catalog and community catalog files.\n\n### `AliasesCatalogFile`\n\nSeparate alias mapping file (`[aliases]` section) mapping short names to canonical model IDs.\n\n## TOML Format\n\nA complete catalog file:\n\n```toml\n[provider]\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\nsignup_url = \"https://console.anthropic.com/settings/keys\"\n\n[provider.regions.us]\nbase_url = \"https://dashscope-us.aliyuncs.com/compatible-mode/v1\"\n\n[[models]]\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\nmodality = \"text\"           # optional, defaults to \"text\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\nsupports_thinking = false\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nImage-generation models omit the token fields and include image cost fields:\n\n```toml\n[[models]]\nid = \"gpt-image-2\"\ndisplay_name = \"GPT Image 2\"\ntier = \"frontier\"\nmodality = \"image\"\ninput_cost_per_m = 5.00\noutput_cost_per_m = 10.00\nimage_input_cost_per_m = 8.00\nimage_output_cost_per_m = 30.00\n```\n\n## Validation Contract\n\n`ModelCatalogEntry::validate()` enforces a critical invariant: **text models must have nonzero `context_window` and `max_output_tokens`**. This prevents silent propagation of `0` into downstream compaction thresholds and budget calculations.\n\nCatalog loaders (`librefang-runtime::model_catalog::from_sources`, `routes::providers::add_custom_model`) call `validate()` after deserialization and reject entries that fail. Non-text modalities (image, audio, video, music) skip this check because they legitimately lack a token context.\n\n## Downstream Consumers\n\n| Consumer | Usage |\n|---|---|\n| `librefang-runtime::model_catalog` | Loads and merges catalog files; calls `validate()` on entries |\n| `librefang-runtime::model_metadata` | Looks up `ModelCatalogEntry` for inference parameter resolution |\n| `librefang-kernel-metering` | Reads `input_cost_per_m` / `output_cost_per_m` for cost estimation |\n| `routes::providers` | Dashboard \"Add provider\" / \"Add custom model\" flows; calls `validate()` on user-submitted entries |\n\n## Design Notes\n\n- All enums are `#[non_exhaustive]` to allow future expansion without breaking changes.\n- Serde uses `rename_all = \"lowercase\"` for enums and `rename_all = \"snake_case\"` for `AuthStatus`, matching their TOML/JSON representations.\n- Optional cost fields use `skip_serializing_if = \"Option::is_none\"` to keep serialized output clean.\n- `ProviderCatalogToml` and `ProviderInfo` are separate structs to maintain a clear boundary between on-disk schema and runtime state ŌĆö the `From` impl handles the conversion with safe defaults.","other-librefang-types-tests":"# Other ŌĆö librefang-types-tests\n\n# librefang-types ŌĆö Integration Tests\n\n## Overview\n\nThis directory contains three integration test suites that guard against serialization and configuration drift across the system. Together they form a continuous-intigration safety net that catches three specific bug classes:\n\n1. **Dashboard Ōåö kernel TOML drift** ŌĆö the visual editor in the dashboard emits TOML that the kernel must parse without error.\n2. **`Default` impl vs. `#[serde(default)]` drift** ŌĆö a manual `Default` implementation that omits a field will silently disagree with serde's per-field defaulting (issue #3404).\n3. **Schema generation regressions** ŌĆö `schemars` must produce valid, sufficiently large JSON Schema for core config types.\n\n## Test Files\n\n### `agent_form_roundtrip.rs`\n\n**Purpose:** Ensures the TOML emitted by the dashboard's agent manifest visual editor (implemented in `agentManifest.ts`) can be round-tripped through the kernel's `AgentManifest` deserializer.\n\n**Why it exists:** The dashboard serializer and the kernel deserializer are maintained in different languages. A renamed field, changed enum variant, or new required field in one place without updating the other causes runtime parse failures. These tests lock the contract at build time.\n\n**Test cases:**\n\n| Test | What it covers |\n|------|----------------|\n| `parses_form_minimum_viable_output` | Bare-minimum manifest: `name`, `version`, `module`, and a `[model]` section with `provider` and `model`. |\n| `parses_form_full_output_with_capabilities_and_resources` | All common sections populated: `tags`, `skills`, model tuning (`temperature`, `max_tokens`), `resources` quotas, and `capabilities` (network, shell, `agent_spawn`). |\n| `parses_form_with_advanced_sections` | Every advanced section filled: priority, session mode, web search augmentation, schedule, exec policy, thinking budget, autonomous settings, routing tiers, fallback models, context injection. Also verifies enum parsing (`Priority::High`, `SessionMode::New`). |\n| `parses_form_response_format_json_schema` | Inline TOML table for `response_format` with `JsonSchema` variant, including `strict = true`. |\n| `omitting_optional_sections_uses_defaults` | Confirms that leaving out `resources` and `capabilities` falls back to empty/zero defaults (e.g., `network` is empty, `agent_spawn` is false, `max_llm_tokens_per_hour` is `None`). |\n\n**Key type:** `librefang_types::agent::AgentManifest`\n\n### `config_default_roundtrip.rs`\n\n**Purpose:** Regression guard for [issue #3404](#). When a new field is added with `#[serde(default)]` but the developer forgets to add it to the manual `Default` impl (or vice versa), the two sources of \"default\" silently diverge. These tests catch that drift.\n\n**Mechanism:**\n\n```\nassert_default_roundtrip::<T>(\"T\")\n```\n\nFor each config type `T`, the helper performs two checks:\n\n1. **Empty-TOML agreement:** `T::default()` serialized to TOML must equal an empty TOML document deserialized into `T` and re-serialized. If they differ, a field has `#[serde(default)]` returning one value while the `Default` impl produces another.\n2. **Round-trip idempotency:** `T::default()` ŌåÆ serialize to TOML ŌåÆ deserialize back ŌåÆ serialize again must produce identical TOML.\n\nEquality is checked by comparing serialized TOML strings rather than requiring `PartialEq` on every config struct, which would cascade through the entire nested tree.\n\n**Helper functions:**\n\n- `assert_default_roundtrip::<T>(label)` ŌĆö common case; both sources must agree on every field.\n- `assert_default_roundtrip_with::<T>(label, normalize)` ŌĆö for types with a known legitimate divergence. The `normalize` closure adjusts the divergent field before comparison, while every other field is still checked exactly.\n\n**Types with known divergences:**\n\n| Type | Divergent field | Reason |\n|------|----------------|--------|\n| `KernelConfig` | `config_version` | `Default` sets current `CONFIG_VERSION` (2); serde's `default_config_version()` returns `1` as a migration tripwire for legacy on-disk configs. |\n| `ChannelsConfig` | `file_download_max_bytes` | `#[derive(Default)]` gives `0`; serde helper `default_file_download_max_bytes` returns 50 MiB. Flagged as a known bug requiring triage. |\n\n**Covered types** (all other tests use `assert_default_roundtrip` without normalization):\n\n`QueueConfig`, `QueueConcurrencyConfig`, `BudgetConfig`, `SessionConfig`, `CompactionTomlConfig`, `TaskBoardConfig`, `TriggersConfig`, `WebhookTriggerConfig`, `WebConfig`, `WebFetchConfig`, `BrowserConfig`, `BraveSearchConfig`, `TavilySearchConfig`, `PerplexitySearchConfig`, `JinaSearchConfig`, `ReloadConfig`, `RateLimitConfig`, `SkillsConfig`, `ExtensionsConfig`, `VaultConfig`, `AutoReplyConfig`, `InboxConfig`, `TelemetryConfig`, `PromptIntelligenceConfig`, `CanvasConfig`, `ThinkingConfig`, `ContextEngineTomlConfig`, `ExternalAuthConfig`, `AuditConfig`, `PrivacyConfig`, `HealthCheckConfig`, `HeartbeatTomlConfig`, `AutoDreamConfig`, `RegistryConfig`, `MemoryConfig`, `MemoryDecayConfig`, `ChunkConfig`, `NetworkConfig`, `TtsConfig`, `DockerSandboxConfig`, `PairingConfig`, `SanitizeConfig`, `ParallelToolsConfig`, `TerminalConfig`, `VoiceConfig`, `LinkedInConfig`, `AgentManifest`, `BroadcastConfig`.\n\n### `schemars_poc.rs`\n\n**Purpose:** Proof-of-concept diagnostics that dump `schemars`-generated JSON Schema (draft-07) for representative config types. These are visual-check tests, not automated assertions (except for `KernelConfig`).\n\nRun with `--nocapture` to see output:\n\n```bash\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```\n\n| Test | What it checks |\n|------|---------------|\n| `dump_budget_config_schema` | Prints the schema for `BudgetConfig`. |\n| `dump_vault_config_schema` | Tests `Option<PathBuf>` rendering ŌĆö how schemars handles filesystem path types. |\n| `full_kernel_config_schema_generates` | Asserts the full `KernelConfig` schema has >50 top-level properties and >50 nested definitions. Validates that the schema is well-formed JSON. |\n| `dump_response_format_schema` | Tagged enum carrying `serde_json::Value` ŌĆö a high-risk edge case for schema correctness. |\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Dashboard (TypeScript)\"\n        A[agentManifest.ts<br/>TOML serializer]\n    end\n\n    subgraph \"librefang-types (Rust)\"\n        B[AgentManifest<br/>TOML deserializer]\n        C[Config structs<br/>Default + serde]\n        D[schemars<br/>JSON Schema gen]\n    end\n\n    A -- \"TOML output\" --> B\n    C -- \"T::default() vs empty TOML\" --> E[config_default_roundtrip.rs]\n    C -- \"schema_for! T\" --> F[schemars_poc.rs]\n    B -- \"parse verification\" --> G[agent_form_roundtrip.rs]\n```\n\n## Adding a New Config Type to Tests\n\n**For `config_default_roundtrip.rs`:** Add a new test function:\n\n```rust\n#[test]\nfn my_config_default_roundtrips_through_toml() {\n    assert_default_roundtrip::<MyConfig>(\"MyConfig\");\n}\n```\n\nIf the type has a known legitimate divergence (like a migration version field), use `assert_default_roundtrip_with` and pass a normalization closure that copies the canonical value.\n\n**For `agent_form_roundtrip.rs`:** Add a new test only if the dashboard form gains new TOML sections or changes serialization behavior. Mirror the exact TOML the TypeScript serializer emits.\n\n**For `schemars_poc.rs`:** Add a new dump test if the type introduces a novel schema pattern (e.g., new generic wrapper, custom `JsonSchema` impl) that needs visual verification.","other-librefang-types":"# Other ŌĆö librefang-types\n\n# librefang-types\n\nCore type definitions, traits, and shared data structures for the LibreFang Agent OS.\n\n## Purpose\n\nThis crate acts as the shared vocabulary of the entire LibreFang system. It defines the data structures, enums, traits, error types, and configuration schemas that all other crates consume. It contains **no business logic, no I/O, and no side effects** ŌĆö purely type definitions and their serialization/deserialization support.\n\nBecause every other crate in the workspace depends on `librefang-types`, changes here have wide-reaching impact. Treat it as a stable contract layer.\n\n## Position in the Architecture\n\n```mermaid\ngraph TD\n    A[librefang-agent] --> T[librefang-types]\n    B[librefang-comms] --> T\n    C[librefang-crypto] --> T\n    D[other workspace crates] --> T\n    T --> S[serde / serde_json]\n    T --> SC[schemars]\n```\n\nAll workspace crates import from this module. It depends only on external libraries, never on sibling crates.\n\n## Domain Areas\n\nThe types in this crate are organized around several domains, each informed by its dependencies.\n\n### Identity and Cryptography\n\nDependencies: `ed25519-dalek`, `sha2`, `hex`, `zeroize`\n\nDefines types related to agent identity, key material, and signature verification. Key types likely include agent IDs, public/private key wrappers, and signature structs. The `zeroize` dependency indicates that secret key material is securely cleared from memory when dropped.\n\n### Configuration\n\nDependencies: `toml`, `dirs`, `serde`\n\nConfiguration structs that deserialize from TOML files. These define the agent's runtime settings, connection parameters, and feature flags. The `dirs` crate provides platform-standard config directory paths.\n\n### Messaging and Protocol\n\nDependencies: `serde`, `serde_json`, `chrono`, `uuid`\n\nMessage envelopes, request/response types, and protocol headers shared between agents and the control plane. Timestamps (`chrono`) and correlation IDs (`uuid`) are first-class citizens in these types.\n\n### Internationalization\n\nDependencies: `fluent`, `unic-langid`\n\nLanguage identifiers and localized string types. The agent supports multiple languages for status messages, error descriptions, and user-facing output.\n\n### Error Types\n\nDependencies: `thiserror`\n\nDomain-specific error enums with `std::error::Error` implementations. These are the canonical error types returned across crate boundaries, enabling consistent error handling without coupling crates to each other's internals.\n\n### Trait Definitions\n\nDependencies: `async-trait`\n\nShared async traits that define the interfaces components must implement. These enable dependency injection and testability across crates ŌĆö for example, a transport trait, a storage trait, or a key provider trait.\n\n### Schema Generation\n\nDependency: `schemars` (with `chrono` and `uuid1` features)\n\nAll serializable types derive `JsonSchema`, enabling automatic JSON Schema generation. This supports configuration validation, API documentation, and external tooling integration.\n\n## Usage\n\nAdd to your crate's `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-types = { path = \"../librefang-types\" }\n```\n\nImport types as needed:\n\n```rust\nuse librefang_types::config::AgentConfig;\nuse librefang_types::error::AgentError;\nuse librefang_types::identity::AgentId;\n```\n\n## Conventions\n\n| Convention | Reason |\n|---|---|\n| All serializable types derive `Serialize`, `Deserialize`, and `JsonSchema` | Consistency across wire formats and schema generation |\n| Error types use `thiserror` derive macros | Ergonomic, zero-cost error definitions |\n| Secret-bearing types implement `Zeroize` | Prevent key material from lingering in memory |\n| Enums use `#[serde(rename_all = \"snake_case\")]` | Stable, consistent JSON/TOML representation |\n\n## Testing\n\nDev-dependencies include `rmp-serde` (MessagePack serialization) and `tempfile`, suggesting tests verify that types round-trip correctly through multiple serialization formats and that file-based config loading behaves as expected.\n\nRun tests from the workspace root:\n\n```bash\ncargo test -p librefang-types\n```\n\n## When to Modify This Crate\n\n**Add to this crate when:**\n- A new data structure is shared between two or more workspace crates\n- A new trait defines a cross-crate interface\n- A new error variant needs to be propagated across crate boundaries\n\n**Do not add to this crate:**\n- Business logic or stateful operations\n- I/O, networking, or filesystem access (beyond type definitions)\n- Crate-specific helpers that only one consumer needs","other-librefang-wire":"# Other ŌĆö librefang-wire\n\n# librefang-wire\n\nLibreFang Protocol (OFP) ŌĆö agent-to-agent networking.\n\n## Overview\n\n`librefang-wire` implements the LibreFang Protocol (OFP), the wire-level protocol used for secure communication between LibreFang agents. It provides message framing, serialization, cryptographic handshake, and authenticated channel management on top of async I/O.\n\nEvery agent-to-agent interaction in LibreFang flows through this crate: peer discovery handshakes, authenticated message exchange, session management, and encrypted payload transport.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Application] --> B[OFP Session Layer]\n    B --> C[Message Framing]\n    B --> D[Crypto Handshake]\n    D --> E[X25519 Key Exchange]\n    D --> F[Ed25519 Authentication]\n    B --> G[HKDF Session Keys]\n    G --> H[HMAC-SHA256 Message Auth]\n    C --> I[Tokio Async Transport]\n```\n\n## Cryptographic Protocol\n\nThe handshake and message authentication rely on a layered set of cryptographic primitives, all sourced from well-audited Rust crates:\n\n| Primitive | Crate | Purpose |\n|---|---|---|\n| Ed25519 | `ed25519-dalek` | Agent identity signing and verification |\n| X25519 | `x25519-dalek` | Ephemeral Diffie-Hellman key exchange |\n| HKDF-SHA256 | `hkdf` + `sha2` | Deriving session keys from shared secrets |\n| HMAC-SHA256 | `hmac` + `sha2` | Per-message authentication codes |\n| Constant-time comparison | `subtle` | Timing-safe MAC/tag verification |\n\nThe handshake flow establishes a shared secret via X25519, authenticates both peers with Ed25519 signatures over the handshake transcript, and derives per-session symmetric keys via HKDF. All subsequent messages carry an HMAC tag verified in constant time.\n\n## Key Dependencies and Their Roles\n\n### Networking\n\n- **`tokio`** ŌĆö All I/O is async. Read and write operations on the transport are `tokio`-driven, allowing many concurrent agent sessions without blocking.\n- **`async-trait`** ŌĆö Trait definitions for transport abstractions and session handlers use `async fn` in trait methods.\n\n### Serialization\n\n- **`serde`** / **`serde_json`** ŌĆö Message structures are serde-derived. JSON is used as the on-wire format for OFP control messages, making debugging straightforward while remaining interoperable.\n- **`base64`** ŌĆö Binary data (keys, signatures, ciphertext) is base64-encoded within JSON payloads.\n\n### Concurrency\n\n- **`dashmap`** ŌĆö The session registry uses `DashMap` to manage active peer sessions across multiple Tokio tasks without a global mutex.\n\n### Identity and Metadata\n\n- **`uuid`** ŌĆö Each session and message carries a unique identifier.\n- **`chrono`** ŌĆö Timestamps for message expiry, handshake freshness, and logging.\n- **`librefang-types`** ŌĆö Shared type definitions (agent IDs, protocol enums, error codes) that keep wire types consistent with the rest of the codebase.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover:\n\n- Handshake failures (signature verification, unexpected message order)\n- Transport errors (unexpected EOF, framing corruption)\n- Cryptographic errors (invalid key material, MAC mismatch)\n- Serialization errors (malformed JSON, invalid base64)\n\nAll errors implement `std::error::Error` and integrate with the `tracing` subsystem for structured logging.\n\n## Relationship to Other Crates\n\n- **`librefang-types`** ŌĆö This crate consumes shared types but does not depend on higher-level crates. It is a leaf dependency in the protocol stack, ensuring that changes to application logic cannot break the wire protocol.\n\n## Testing\n\nThe `tempfile` dev-dependency is used for integration tests that exercise session persistence and key storage against real filesystem paths, ensuring handshake material and session state survive across process restarts.","other":"# Other\n\n# Other\n\nSupporting crates, frontends, and infrastructure that round out the LibreFang Agent OS. This module group contains everything outside the main agent and communications crates ŌĆö the kernel, runtime, API surface, client applications, and the test suites that hold them together.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Clients\n        CLI[librefang-cli]\n        DESK[librefang-desktop]\n        DASH[librefang-api-dashboard]\n    end\n\n    subgraph \"API Layer\"\n        API[librefang-api]\n        LOGIN[librefang-api-src]\n        I18N[librefang-api-static]\n    end\n\n    subgraph Kernel\n        K[librefang-kernel]\n        KH[librefang-kernel-handle]\n        KR[librefang-kernel-router]\n        KM[librefang-kernel-metering]\n    end\n\n    subgraph Runtime\n        RT[librefang-runtime]\n        WASM[librefang-runtime-wasm]\n        MCP[librefang-runtime-mcp]\n        OAUTH[librefang-runtime-oauth]\n    end\n\n    subgraph \"LLM Drivers\"\n        LD[librefang-llm-driver]\n        LDS[librefang-llm-drivers]\n    end\n\n    subgraph Foundation\n        TYPES[librefang-types]\n        HTTP[librefang-http]\n        WIRE[librefang-wire]\n        TELE[librefang-telemetry]\n    end\n\n    subgraph Storage\n        MEM[librefang-memory]\n    end\n\n    subgraph \"Skills & Hands\"\n        SKILLS[librefang-skills]\n        HANDS[librefang-hands]\n    end\n\n    subgraph Integrations\n        CH[librefang-channels]\n        EXT[librefang-extensions]\n        MIG[librefang-migrate]\n    end\n\n    CLI --> API\n    DESK --> API\n    DASH --> API\n    API --> K\n    K --> RT\n    K --> KH\n    K --> KR\n    K --> KM\n    K --> MEM\n    K --> EXT\n    RT --> LD\n    RT --> WASM\n    RT --> MCP\n    RT --> OAUTH\n    RT --> CH\n    RT --> SKILLS\n    RT --> HANDS\n    LDS --> LD\n    LD --> HTTP\n    MCP --> HTTP\n    WIRE --> HTTP\n    CH --> HTTP\n    EXT --> HTTP\n    K --> TYPES\n    RT --> TYPES\n    API --> TYPES\n    WIRE --> TYPES\n```\n\n## Sub-module Groups\n\n### Foundation\n\n| Crate | Purpose |\n|-------|---------|\n| [librefang-types](librefang-types.md) | Shared type definitions, traits, error types, and configuration schemas ŌĆö the vocabulary every other crate depends on. |\n| [librefang-http](librefang-http.md) | Centralized `reqwest` client builder with rustls TLS and proxy support, used by any crate making outbound HTTP calls. |\n| [librefang-wire](librefang-wire.md) | LibreFang Protocol (OFP) ŌĆö cryptographic handshake, message framing, and authenticated channels for agent-to-agent networking. |\n| [librefang-telemetry](librefang-telemetry.md) | `metrics` facade declarations for counters, gauges, and histograms; the binary selects the exporter (Prometheus, OTLP). |\n\n### Kernel\n\n[librefang-kernel](librefang-kernel.md) is the top-level orchestrator. It wires subsystems together without implementing logic itself. Its supporting crates:\n\n- [librefang-kernel-handle](librefang-kernel-handle.md) ŌĆö the `KernelHandle` trait, separating interface from implementation so consumers avoid circular dependencies.\n- [librefang-kernel-router](librefang-kernel-router.md) ŌĆö template-based routing engine that resolves incoming requests to the correct hand.\n- [librefang-kernel-metering](librefang-kernel-metering.md) ŌĆö cost tracking and quota enforcement (scaffolded).\n\n### Runtime & Execution\n\n[librefang-runtime](librefang-runtime.md) orchestrates the agent lifecycle ŌĆö LLM calls, tool dispatch, memory access, and channel I/O. Its specialized sub-crates:\n\n- [librefang-runtime-wasm](librefang-runtime-wasm.md) ŌĆö WASM sandbox for isolated skill execution.\n- [librefang-runtime-mcp](librefang-runtime-mcp.md) ŌĆö Model Context Protocol client for external tool servers.\n- [librefang-runtime-oauth](librefang-runtime-oauth.md) ŌĆö OAuth 2.0 / device-authorization flows for ChatGPT and GitHub Copilot backends.\n\n### LLM Layer\n\n[librefang-llm-driver](librefang-llm-driver.md) defines the provider-agnostic trait and shared request/response types. [librefang-llm-drivers](librefang-llm-drivers.md) ships concrete implementations for Anthropic, OpenAI, and Gemini.\n\n### Memory\n\n[librefang-memory](librefang-memory.md) provides the SQLite-backed memory substrate ŌĆö short-term conversation context, long-term knowledge, content-addressed storage, and group roster persistence via [librefang-memory-src](librefang-memory-src.md).\n\n### Channels & Integration\n\n[librefang-channels](librefang-channels.md) is the feature-gated bridge layer supporting 40+ messaging platforms. [librefang-extensions](librefang-extensions.md) adds MCP server bootstrapping, a credential vault, and OAuth2 PKCE flows. [librefang-migrate](librefang-migrate.md) imports configurations from other agent frameworks.\n\n### Skills & Hands\n\n[librefang-skills](librefang-skills.md) manages the skill lifecycle ŌĆö filesystem discovery, manifest parsing, registry indexing, and marketplace downloads. [librefang-hands](librefang-hands.md) provides declarative capability packages that the kernel router resolves and the runtime dispatches.\n\n### API & Dashboard\n\n[librefang-api](librefang-api.md) exposes the full agent surface over REST and WebSocket via Axum. The [dashboard](librefang-api-dashboard.md) is a React 19 SPA (TanStack Router + Query) for real-time monitoring and management. Supporting assets:\n\n- [librefang-api-src](librefang-api-src.md) ŌĆö self-contained login page with TOTP 2FA support.\n- [librefang-api-static](librefang-api-static.md) ŌĆö i18n locale JSON files (`en`, `ja`).\n\n### Client Applications\n\n[librefang-cli](librefang-cli.md) is the primary binary ŌĆö argument parsing, config loading, feature-gated channel selection, and optional TUI rendering. It ships with [FTL locale catalogs](librefang-cli-locales.md) and [TOML configuration templates](librefang-cli-templates.md).\n\n[librefang-desktop](librefang-desktop.md) wraps everything in a Tauri 2.0 native shell with system tray, auto-updater, and mobile client support. Its [capabilities](librefang-desktop-capabilities.md) and [generated scaffolding](librefang-desktop-gen.md) configure platform-specific permissions.\n\n### Testing Infrastructure\n\n[librefang-testing](librefang-testing.md) centralizes mock implementations ŌĆö `MockKernel`, `MockLlmDriver`, and Axum route test helpers ŌĆö used across all integration suites. Every major crate has a companion `-tests` module (e.g., [librefang-kernel-tests](librefang-kernel-tests.md), [librefang-api-tests](librefang-api-tests.md)) that validates end-to-end wiring without mocks on the HTTP layer.\n\nBenchmarks live in [librefang-channels-benches](librefang-channels-benches.md), profiling the serialization, routing, and formatting hot paths.\n\n## Key Cross-Module Workflows\n\n**Inbound message processing:** A message arrives through [librefang-channels](librefang-channels.md) ŌåÆ [librefang-kernel](librefang-kernel.md) routes it via [librefang-kernel-router](librefang-kernel-router.md) ŌåÆ [librefang-runtime](librefang-runtime.md) dispatches to the LLM through [librefang-llm-drivers](librefang-llm-drivers.md) ŌåÆ tools execute in [librefang-runtime-wasm](librefang-runtime-wasm.md) or via [librefang-runtime-mcp](librefang-runtime-mcp.md) ŌåÆ results persist in [librefang-memory](librefang-memory.md).\n\n**Dashboard ŌåÆ API ŌåÆ Kernel:** The [React dashboard](librefang-api-dashboard.md) calls REST endpoints on [librefang-api](librefang-api.md), which delegates to [librefang-kernel](librefang-kernel.md) through the [KernelHandle](librefang-kernel-handle.md) trait. Auth flows (login, TOTP) are handled by the [login page](librefang-api-src.md) before the SPA loads.\n\n**CLI bootstrapping:** [librefang-cli](librefang-cli.md) parses args, loads config from a [template](librefang-cli-templates.md), initializes telemetry via [librefang-telemetry](librefang-telemetry.md), and starts the kernel. Localization strings come from [Fluent catalogs](librefang-cli-locales.md).\n\n**Desktop bundling:** [librefang-desktop](librefang-desktop.md) embeds the kernel, API server, and extensions into a Tauri binary. Platform capabilities are declared in [librefang-desktop-capabilities](librefang-desktop-capabilities.md) and scaffolded by [librefang-desktop-gen](librefang-desktop-gen.md).\n\n**Agent-to-agent communication:** [librefang-wire](librefang-wire.md) handles cryptographic handshakes (X25519 + Ed25519) and encrypted message transport between peers, using [librefang-http](librefang-http.md) for the underlying connections.","overview":"# crates ŌĆö Wiki\n\n# LibreFang Agent OS\n\nLibreFang is a full-stack agent operating system that lets you build, deploy, and manage autonomous AI agents across dozens of messaging platforms. Agents chat with users over Telegram, Discord, Slack, WhatsApp, and 30+ other channels ŌĆö or run autonomously in the background as \"Hands\" ŌĆö while the kernel enforces policy, manages memory, and orchestrates tool execution.\n\n## Architecture\n\nThe system is organized as a layered architecture with clear separation of concerns. At the center sits the [Kernel Core](librefang-kernel-src.md), which acts as the authoritative orchestrator for all agent operations ŌĆö approval gates, RBAC, workflow execution, config hot-reload, and background agent spawning all flow through it.\n\nUser-facing interfaces wrap the kernel on all sides:\n\n- **Web**: The [Dashboard Frontend](librefang-api-dashboard.md) (React SPA) talks to the [API Server](librefang-api-src.md) over HTTP. The API server translates dashboard actions and channel webhooks into kernel calls.\n- **Desktop/Mobile**: The [Desktop Application](librefang-desktop.md) (Tauri 2.0) embeds either a local kernel or connects to a remote daemon, providing native OS integration.\n- **Terminal**: The [CLI & TUI](librefang-cli.md) operates over HTTP when a daemon is running, or boots an in-process kernel for single-shot commands.\n\nInbound messages from external platforms arrive through [Channel Adapters](librefang-channels.md), which normalize messages behind a uniform `ChannelAdapter` trait. The adapters route into the kernel, which dispatches to the [Agent Runtime](librefang-runtime.md) ŌĆö the execution engine that manages the full LLM call cycle, tool execution, memory recall, and streaming responses. The runtime leans on [LLM Drivers](librefang-llm-driver-src.md) for provider-agnostic completions (Anthropic, OpenAI, Gemini, Bedrock, and more) and on the [Memory System](librefang-memory.md) for persistent structured storage, semantic vector search, and a knowledge graph.\n\nCapabilities beyond the core live in [Skills & Extensions](librefang-extensions-src.md), which handles skill installation, security scanning, runtime tool execution, and infrastructure services like credential management. The [Hands System](librefang-hands.md) builds on top to offer autonomous background agents that you deploy from a marketplace and monitor rather than drive interactively.\n\nFor multi-node deployments, the [P2P Networking](librefang-wire.md) module (LibreFang Wire Protocol) provides authenticated peer-to-peer communication between kernels.\n\nEverything shares [Shared Types](librefang-types.md) (`librefang-types`), the foundational crate of data structures that crosses every process boundary.\n\n```mermaid\ngraph TD\n    subgraph \"Clients\"\n        DASH[Dashboard Frontend]\n        DESK[Desktop App]\n        CLI[CLI & TUI]\n    end\n\n    subgraph \"API Layer\"\n        API[API Server]\n    end\n\n    subgraph \"Core\"\n        KERNEL[Kernel Core]\n        RUNTIME[Agent Runtime]\n        MEMORY[Memory System]\n    end\n\n    subgraph \"I/O\"\n        CHANNELS[Channel Adapters]\n        LLM[LLM Drivers]\n    end\n\n    subgraph \"Capabilities\"\n        SKILLS[Skills & Extensions]\n        HANDS[Hands System]\n    end\n\n    P2P[P2P Networking]\n\n    DASH --> API\n    DESK --> API\n    CLI --> API\n    API --> KERNEL\n    CHANNELS --> API\n    KERNEL --> RUNTIME\n    RUNTIME --> LLM\n    RUNTIME --> MEMORY\n    KERNEL --> HANDS\n    KERNEL --> P2P\n    SKILLS --> RUNTIME\n```\n\n## Key End-to-End Flow: User Sends a Message\n\nHere's what happens when a user sends a message to an agent through a channel like Telegram:\n\n1. The **Channel Adapter** receives the inbound message and normalizes it into LibreFang's internal format.\n2. The adapter hands the message to the **API Server** (via the channel bridge), which authenticates the request and forwards it to the **Kernel Core**.\n3. The kernel checks RBAC policies, approval gates, and agent routing rules, then dispatches to the **Agent Runtime**.\n4. The runtime assembles context ŌĆö pulling relevant memories from the **Memory System**, loading the agent's tool profile from **Skills & Extensions**, and constructing a completion request.\n5. The runtime calls the **LLM Drivers** to get a streaming response from the configured provider, executing any tool calls the model requests along the way.\n6. The response streams back through the kernel ŌåÆ API server ŌåÆ channel adapter ŌåÆ external platform.\n\nA similar flow serves the dashboard: when an operator triggers a workflow from the WorkflowsPage, the React app calls the API server, which delegates to the kernel's workflow DAG engine.\n\n## Getting Around the Codebase\n\nNew to the project? A good reading path:\n\n1. **[Shared Types](librefang-types.md)** ŌĆö the vocabulary everything else uses. Understanding the core types (`AgentId`, `SessionId`, `AgentManifest`, `CompletionRequest`) will make every other module clearer.\n2. **[Kernel Core](librefang-kernel-src.md)** ŌĆö the central orchestrator. This is where policy, routing, and lifecycle decisions are made.\n3. **[Agent Runtime](librefang-runtime.md)** ŌĆö the execution engine. Follow this to understand how messages are actually processed end to end.\n4. From there, dive into whichever surface you're working on ŌĆö the dashboard, a specific channel adapter, the memory subsystem, or elsewhere. Each module has its own dedicated wiki page with deeper detail.\n\n## Other Modules\n\n- **[Migration](librefang-migrate.md)** ŌĆö imports agents, memory, sessions, and configs from OpenClaw, OpenFang, and other frameworks.\n- **[Infrastructure Utilities](librefang-http.md)** ŌĆö shared HTTP client, telemetry/metrics, and test harness crates used across the codebase.","p2p-networking":"# P2P Networking\n\n# P2P Networking (librefang-wire)\n\nThe LibreFang Wire Protocol (OFP) provides authenticated, integrity-protected peer-to-peer communication between LibreFang kernels over TCP. Each kernel runs a `PeerNode` that accepts inbound connections and initiates outbound connections to federation partners, exchanging agent information and routing messages to remote agents.\n\n**Important:** OFP provides authentication, integrity, and replay protection but does **not** provide confidentiality. Wire-level encryption must come from the deployment layer (WireGuard, Tailscale, SSH tunnel, or service-mesh mTLS).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[PeerNode] --> B[TcpListener]\n    A --> C[PeerRegistry]\n    A --> D[NonceTracker]\n    A --> E[PeerRateLimiter]\n    A --> F[Ed25519 KeyPair]\n    A --> G[Trust Store]\n\n    H[Remote Peer] -->|TCP| B\n    B -->|Handshake| I[verify_and_pin_identity]\n    I -->|ECDH| J[EphemeralKex]\n    I -->|TOFU| G\n\n    A -->|post-handshake| K[connection_loop]\n    K -->|per-message HMAC| L[read/write_message_authenticated]\n```\n\n## Authentication Model\n\nOFP uses two mandatory authentication layers that operate in sequence during every handshake:\n\n### Layer 1 ŌĆö Network Admission (HMAC-SHA256)\n\nA pre-shared `shared_secret` gates network access. The handshake carries:\n\n```\nauth_data = \"{nonce}|{sender_node_id}|{recipient_node_id}\"\nauth_hmac = HMAC-SHA256(shared_secret, auth_data)\n```\n\nBinding the HMAC to both sender and recipient node IDs prevents a captured handshake from being replayed against a different federation peer that shares the same `shared_secret` (#3875). HMAC verification happens **before** the nonce is recorded (#3880), so an attacker who doesn't know the secret cannot fill nonce capacity.\n\n### Layer 2 ŌĆö Per-Peer Identity (Ed25519)\n\nEvery node persists an Ed25519 keypair in `<data_dir>/peer_keypair.json` via `PeerKeyManager`. During the handshake, each side optionally sends:\n\n- `public_key` ŌĆö base64-encoded Ed25519 verifying key\n- `identity_signature` ŌĆö Ed25519 signature over the same `auth_data` bytes the HMAC covers (plus the ephemeral pubkey if present)\n\nThe recipient verifies the signature and enforces **Trust-On-First-Use (TOFU) pinning**: the first time a `node_id` is seen, its public key is pinned. Subsequent handshakes from the same `node_id` must present the identical public key or are rejected. Pins persist across restarts in `<data_dir>/trusted_peers.json`.\n\nNet effect: a leaked `shared_secret` no longer lets an attacker impersonate a previously-pinned peer ŌĆö they would also need that node's private key.\n\n## Forward Secrecy (Ephemeral X25519 Key Exchange)\n\nEach handshake optionally generates a fresh X25519 keypair via `EphemeralKex::generate()`. Both peers exchange their ephemeral public keys (covered by the Ed25519 identity signature, so an active MITM cannot substitute them), then derive a shared secret via ECDH. The static `shared_secret` never enters the derivation.\n\n```\nsession_key = HKDF-SHA256(\n    salt  = handshake_transcript(client_nonce, server_nonce),\n    IKM   = X25519(ephemeral_local_secret, ephemeral_remote_public),\n    info  = \"librefang-ofp/v1/session-key\"\n)\n```\n\nThe `EphemeralKex` struct is consumed and dropped after derivation ŌĆö `StaticSecret` zeroizes on drop, so past session keys cannot be reconstructed from a future key leak.\n\nWhen either side omits the ephemeral pubkey, the kernel falls back to the legacy derivation: `HMAC-SHA256(shared_secret, our_nonce || their_nonce)`. This maintains backward compatibility during a rolling upgrade.\n\n### handshake_transcript\n\n```rust\npub fn handshake_transcript(client_nonce: &str, server_nonce: &str) -> Vec<u8>\n```\n\nProduces `client_nonce|server_nonce` (client first, server second, regardless of caller). Both sides must produce the same byte string for the session key to agree. Different transcripts yield different keys even when the same ephemeral pair is reused.\n\n## Key Components\n\n### PeerNode\n\nThe central networking entity. Created via `PeerNode::start` (HMAC-only) or `PeerNode::start_with_identity` (Ed25519 + optional trust store directory).\n\n```rust\nlet (node, task_handle) = PeerNode::start_with_identity(\n    config,\n    registry,\n    handle,\n    Some(keypair),\n    Some(data_dir.into()),\n).await?;\n```\n\nKey responsibilities:\n- **Accept loop** ŌĆö spawns a task per inbound TCP connection\n- **Handshake** ŌĆö HMAC verification, Ed25519 identity verification + TOFU pinning, ephemeral KEX, nonce replay check\n- **Session key derivation** ŌĆö ECDH-derived when both peers support it, legacy HMAC-derived otherwise\n- **Connection loop** ŌĆö per-message HMAC-authenticated read/write dispatch\n- **Rate limiting** ŌĆö per-peer message and token budgets\n\n### PeerConfig\n\n| Field | Purpose | Default |\n|-------|---------|---------|\n| `listen_addr` | TCP bind address | `127.0.0.1:0` |\n| `node_id` | Unique node identifier | Random UUID |\n| `node_name` | Human-readable name | `\"librefang-node\"` |\n| `shared_secret` | **Required.** HMAC pre-shared key | ŌĆö |\n| `max_messages_per_peer_per_minute` | Rate limit (0 = unlimited) | 60 |\n| `max_llm_tokens_per_peer_per_hour` | Optional token budget | `None` |\n\n### PeerHandle Trait\n\nThe kernel implements this trait to handle incoming remote requests:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\n### WireMessage Protocol\n\nAll communication uses length-prefixed JSON frames: `[4-byte BE length][JSON body]`. After handshake, frames include a trailing HMAC: `[4-byte BE length][JSON body][64-char hex HMAC]`.\n\n**Envelope:**\n\n```rust\npub struct WireMessage {\n    pub id: String,\n    pub kind: WireMessageKind,  // Request | Response | Notification | Unknown\n}\n```\n\n**Handshake fields relevant to security:**\n\n| Field | Layer | Notes |\n|-------|-------|-------|\n| `nonce` | HMAC | UUID, replay-protected |\n| `auth_hmac` | HMAC | `HMAC-SHA256(shared_secret, nonce\\|sender\\|recipient)` |\n| `public_key` | Ed25519 | Optional, base64 |\n| `identity_signature` | Ed25519 | Optional, covers `auth_data[\\|ephemeral_pubkey]` |\n| `ephemeral_pubkey` | X25519 KEX | Optional, base64 X25519 public key |\n\n**Forward compatibility:** Unknown `type`, `method`, or `event` values decode as `Unknown` variants (#3544). The TCP link stays alive; older peers ignore messages from newer protocol versions.\n\n### Ed25519KeyPair and PeerKeyManager\n\n`Ed25519KeyPair` wraps an Ed25519 signing key. `PeerKeyManager` handles persistence:\n\n```rust\nlet mut mgr = PeerKeyManager::new(data_dir);\nlet keypair = mgr.load_or_generate()?;  // Load or create + persist\nlet node_id = mgr.node_id().unwrap();   // Stable UUID\n```\n\nKey file format (`peer_keypair.json`):\n\n```json\n{\n  \"public_key\": \"<base64>\",\n  \"private_key\": \"<base64>\",\n  \"node_id\": \"<uuid>\"\n}\n```\n\nOn load, `PeerKeyManager` re-derives the public key from the private seed and cross-checks it against the file. Mismatches are rejected. PR-1 era files missing `node_id` are automatically migrated.\n\n### EphemeralKex\n\n```rust\nlet kex = EphemeralKex::generate()?;\nlet public_for_wire = kex.public_b64();  // base64 X25519 public key\nlet session_key = kex.derive_session_key(remote_pubkey_b64, &transcript)?;\n```\n\n`derive_session_key` consumes `self`, ensuring the ephemeral private key is dropped. It rejects the all-zero shared point (low-order public key attack) and uses HKDF-SHA256 with the handshake transcript as salt.\n\n### NonceTracker\n\nPrevents replay attacks with a time-bounded set of seen nonces:\n\n- **Window:** 5 minutes\n- **Capacity:** 100,000 entries (hard cap, fails closed)\n- **GC:** Amortized ŌĆö expired nonces are swept only when the map reaches 80% capacity, preventing unauthenticated attackers from forcing O(n) sweeps on every connection attempt\n- **TOCTOU-safe:** Uses `DashMap::entry` for atomic check-and-insert\n\n### PeerRateLimiter\n\nTwo independent per-peer limits:\n\n1. **Message rate:** `max_messages_per_peer_per_minute` ŌĆö excess `AgentMessage` requests return HTTP 429 before reaching the LLM\n2. **Token budget:** `max_llm_tokens_per_peer_per_hour` ŌĆö cumulative cap checked after each LLM turn\n\n### PeerRegistry\n\nThread-safe (`Arc<RwLock>`) store of known peers and their agents. Supports:\n- `add_peer` / `get_peer` / `mark_disconnected`\n- `find_agents` ŌĆö searches across all connected peers by name, tag, or description\n- `add_agent` / `remove_agent` ŌĆö updated by `AgentSpawned`/`AgentTerminated` notifications\n\n### TrustedPeers\n\nPersistent backing store for TOFU pins. Loaded at startup via `start_with_identity` with a `trust_store_dir` argument. New pins are written to disk after in-memory insertion; persistence failure is logged but does not roll back the in-memory pin.\n\n## Security Properties Summary\n\n| Threat | Mitigation | Issue |\n|--------|-----------|-------|\n| Shared secret leak ŌåÆ node impersonation | Ed25519 identity + TOFU pinning | #3873 |\n| Shared secret leak ŌåÆ in-flight HMAC forgery | Ephemeral X25519 session key derivation | #4269 |\n| Future key compromise ŌåÆ past traffic decryption | Ephemeral keys zeroized after handshake | #4269 |\n| Cross-node replay of handshake packets | HMAC bound to `(sender, recipient)` node IDs | #3875 |\n| Nonce replay within window | `NonceTracker` with atomic check-and-record | #3880 |\n| Unauthenticated nonce-fill DoS | HMAC verified before nonce recording | #3880 |\n| Peer LLM budget drain | `PeerRateLimiter` (message rate + token budget) | #3876 |\n| Oversized payload from federated peer | `MAX_PEER_MESSAGE_BYTES` (64 KiB) | #3876 |\n| Downgrade to HMAC-only after pin | Reject `node_id` with prior pin that omits identity | #3873 |\n| TOFU pin map exhaustion | Hard cap at 100,000 entries | #3873 |\n| Low-order X25519 pubkey attack | Reject all-zero shared secret | #4269 |\n| MITM substitution of ephemeral pubkey | Ephemeral bound to Ed25519 signature scope | #4269 |\n\n## Connection Lifecycle\n\n1. **TCP connect** ŌĆö client opens socket to server\n2. **Client handshake** ŌĆö sends `WireRequest::Handshake` with HMAC nonce, Ed25519 pubkey + signature, X25519 ephemeral pubkey\n3. **Server verifies HMAC** ŌĆö rejects if invalid (no nonce recorded yet)\n4. **Server verifies Ed25519 identity** ŌĆö signature check + TOFU pin compare\n5. **Server records nonce** ŌĆö only after both verifications pass\n6. **Server handshake ack** ŌĆö sends `WireResponse::HandshakeAck` with its own HMAC, identity, and ephemeral\n7. **Both sides derive session key** ŌĆö ECDH if both peers sent ephemeral pubkeys, legacy HMAC otherwise\n8. **Connection loop** ŌĆö per-message HMAC-authenticated frame exchange\n9. **Disconnect** ŌĆö registry marks peer disconnected; `ShuttingDown` notification sent on graceful shutdown\n\n## Outbound Operations\n\n### connect_to_peer / connect_to_peer_with_id\n\n```rust\nnode.connect_to_peer_with_id(addr, handle, \"recipient-node-id\").await?;\n```\n\nPerforms a full handshake and spawns a long-lived `connection_loop` task. Use `connect_to_peer_with_id` with the known remote node ID to bind the HMAC to that specific recipient (#3875).\n\n### send_to_peer\n\n```rust\nlet response = node.send_to_peer(\"remote-node-id\", \"agent-name\", \"message\", Some(\"sender\"), handle).await?;\n```\n\nOpens a new connection, performs handshake, sends a single `AgentMessage`, reads the response, and closes. Suitable for one-shot RPC-style calls.\n\n### broadcast_notification\n\n```rust\nlet errors = broadcast_notification(&registry, WireNotification::AgentSpawned { agent }, &shared_secret).await;\n```\n\nDelivers a notification to all currently connected peers. Returns a list of `(node_id, error)` for any that failed.\n\n## Configuration Checklist\n\n1. Set `shared_secret` in `[network]` section of `config.toml` ŌĆö OFP refuses to start without it\n2. Ensure `<data_dir>/peer_keypair.json` is readable only by the daemon user (permissions are set to 0600 on Unix automatically)\n3. Pass `trust_store_dir` to `start_with_identity` for persistent TOFU pins across restarts\n4. Tune `max_messages_per_peer_per_minute` and `max_llm_tokens_per_peer_per_hour` based on your federation's LLM budget\n5. Verify the identity fingerprint via `GET /api/network/status` and compare out-of-band with your federation partner before trusting a new peer","shared-types":"# Shared Types\n\n# Shared Types (`librefang-types`)\n\nCore data structures shared across the LibreFang agent OS ŌĆö kernel, runtime, API layer, and channel adapters all depend on this crate. Every fundamental type that crosses a process boundary or is persisted to disk lives here.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Identity Layer\"\n        UID[UserId]\n        AID[AgentId]\n        SID[SessionId]\n    end\n    subgraph \"Agent Definition\"\n        AM[AgentManifest]\n        MC[ModelConfig]\n        TP[ToolProfile]\n        MCAPS[ManifestCapabilities]\n        RQ[ResourceQuota]\n    end\n    subgraph \"Agent Lifecycle\"\n        AE[AgentEntry]\n        AS[AgentState]\n        AMODE[AgentMode]\n        SCHED[ScheduleMode]\n    end\n    subgraph \"Approval Gate\"\n        AP[ApprovalPolicy]\n        AR[ApprovalRequest]\n        ARESP[ApprovalResponse]\n        AD[ApprovalDecision]\n    end\n    UID --> AE\n    AID --> AE\n    SID --> AE\n    AM --> AE\n    AS --> AE\n    TP --> AM\n    MC --> AM\n    RQ --> AM\n    AP --> AR\n    AR --> ARESP\n    AD --> ARESP\n```\n\n## Deterministic Identity\n\nA core design principle: identities must survive daemon restarts. Random UUIDs would change on every boot, breaking audit-log correlation and session continuity. Instead, the crate uses **UUID v5** (SHA-1 name-based) derivation so the same logical input always produces the same identifier.\n\n### `UserId`\n\n```rust\nUserId::from_name(\"Alice\")  // ŌåÆ deterministic UUID v5\nUserId::new()               // ŌåÆ random UUID v4 (avoid for config-sourced users)\n```\n\nDerived from `LIBREFANG_USER_NAMESPACE` ŌĆö a frozen constant. **Changing this namespace breaks every existing user identity across the fleet.** Use `from_name` for all users that originate from configuration files; the random constructor exists only for transient/anonymous contexts.\n\n### `AgentId`\n\nThree derivation paths, all using a single namespace with typed prefixes to avoid collisions:\n\n| Method | Input format | Use case |\n|---|---|---|\n| `from_name(name)` | `\"agent:{name}\"` | Top-level named agents |\n| `from_hand_id(hand_id)` | `\"{hand_id}\"` (bare, backward compat) | Multi-agent hand instances |\n| `from_hand_agent(hand_id, role, instance_id)` | `\"{hand_id}:{role}\"` or `\"{hand_id}:{role}:{instance_id}\"` | Specific role within a hand |\n\nThe `instance_id` parameter controls backward compatibility: `None` preserves the legacy single-instance hash format; `Some(uuid)` produces unique IDs per hand instance.\n\n### `SessionId`\n\nThree derivation strategies with disjoint UUID namespaces to prevent collisions:\n\n```rust\n// Persistent channel session ŌĆö same (agent, channel) always ŌåÆ same session\nSessionId::for_channel(agent_id, \"telegram\")\n\n// Isolated per-fire cron session ŌĆö each cron run gets its own session\nSessionId::for_cron_run(agent_id, \"job-uuid:2026-04-25T10:00:00Z\")\n\n// Structured routing key with optional account dimension\nSessionId::from_route_key(agent_id, \"telegram\", \"alice\", \"conv-123\")\n```\n\n**Backward compatibility in `from_route_key`:** when `account` is empty, the result is identical to `for_channel` ŌĆö existing sessions that never carried an account dimension are preserved. When `account` is non-empty, a `v2:` prefix is mixed into the hash space to avoid collisions with legacy keys.\n\nThe cron-run namespace is intentionally disjoint from the channel namespace, so a `for_cron_run(agent, \"cron\")` ID never collides with `for_channel(agent, \"cron\")`.\n\n## Agent Manifest (`AgentManifest`)\n\nThe complete declarative specification of an agent ŌĆö what it can do, how it runs, and where its limits are. Parsed from `agent.toml` files or constructed programmatically.\n\n### Key Fields by Category\n\n**Identity & Metadata**\n- `name`, `version`, `description`, `author`, `tags` ŌĆö human-readable identification\n- `enabled` ŌĆö disabled agents are not spawned on startup\n- `is_hand` ŌĆö marks agents spawned by a Hand workflow\n\n**Model Configuration**\n- `model` ŌĆö primary LLM config (`ModelConfig` with provider, model name, temperature, system prompt, context window overrides, and provider-specific `extra_params`)\n- `fallback_models` ŌĆö ordered chain of `FallbackModel` entries tried on primary failure\n- `routing` ŌĆö optional `ModelRoutingConfig` for auto-selecting models by query complexity\n- `pinned_model` ŌĆö freeze model selection (Stable mode)\n- `response_format` ŌĆö structured output constraint\n- `thinking` ŌĆö per-agent extended thinking budget override\n\n**Scheduling & Sessions**\n- `schedule` ŌĆö `Reactive` (event-driven, default), `Periodic { cron }`, `Proactive { conditions }`, or `Continuous { check_interval_secs }`\n- `session_mode` ŌĆö `Persistent` (reuse session) or `New` (fresh session per invocation)\n- `max_concurrent_invocations` ŌĆö cap on parallel trigger-dispatch fires (requires `session_mode = \"new\"` for caps > 1)\n- `max_history_messages` ŌĆö per-agent override on message-history trim cap\n\n**Capabilities & Tools**\n- `capabilities` ŌĆö `ManifestCapabilities` granting network, shell, memory, agent-spawn, and OFP permissions\n- `profile` ŌĆö named `ToolProfile` (`Minimal`, `Coding`, `Research`, `Messaging`, `Automation`, `Full`, `Custom`) th
