var PAGES = {"agent-kernel-librefang-kernel-handle-src":"# Agent Kernel — librefang-kernel-handle-src\n\n# librefang-kernel-handle\n\nDependency-inversion boundary between the agent runtime and the kernel.\n\n## Purpose\n\n`librefang-runtime` drives agent loops and executes tools. Those tools need to call back into the kernel — to spawn agents, send messages, manage shared memory, and so on. But the runtime cannot depend on `librefang-kernel` directly without creating a circular dependency.\n\nThis crate solves that by defining `KernelHandle`: a trait that enumerates every kernel operation the runtime might need. The kernel implements the trait and injects the concrete handle into each agent loop at startup.\n\n```mermaid\ngraph LR\n  KR[\"librefang-kernel<br/>(implements KernelHandle)\"]\n  KH[\"librefang-kernel-handle<br/>(trait definition)\"]\n  RT[\"librefang-runtime<br/>(calls KernelHandle methods)\"]\n  KR -->|depends on| KH\n  RT -->|depends on| KH\n  KR -.->|passes impl into| RT\n```\n\nThe runtime never knows which kernel it is talking to; it only sees the trait object.\n\n---\n\n## Key type: `AgentInfo`\n\nA plain data struct returned by listing and discovery operations:\n\n| Field | Type | Description |\n|---|---|---|\n| `id` | `String` | Agent UUID |\n| `name` | `String` | Human-readable name |\n| `state` | `String` | Current lifecycle state |\n| `model_provider` | `String` | e.g. `\"openai\"`, `\"anthropic\"` |\n| `model_name` | `String` | e.g. `\"gpt-4o\"` |\n| `description` | `String` | Agent purpose |\n| `tags` | `Vec<String>` | Free-form labels |\n| `tools` | `Vec<String>` | Tool names available to the agent |\n\n---\n\n## The `KernelHandle` trait\n\n`KernelHandle` is an async trait (`Send + Sync`) with over 50 methods organised into functional groups. Every method has a **default implementation** so that stubs, test doubles, and partial implementations compile without boilerplate.\n\n### Design patterns in the defaults\n\n**Error-on-missing.** Methods for optional subsystems (cron, hands, approvals, channels, workflows, prompt store) default to returning an error string like `\"Cron scheduler not available\"`. This makes it immediately clear when a feature is used against a handle that doesn't support it.\n\n**Graceful no-op.** Utility methods (`touch_heartbeat`, `fire_agent_step`, `auto_track_prompt_version`, `readonly_workspace_prefixes`) default to doing nothing, so lightweight implementations work without overrides.\n\n**Delegation chain.** Some methods delegate to a simpler sibling so implementors only need to override one of the pair:\n\n| Method | Default delegate | Purpose of the wrapper |\n|---|---|---|\n| `send_to_agent_as` | `send_to_agent` | Adds cancel-cascade tracking (issue #3044) |\n| `spawn_agent_checked` | `spawn_agent` | Adds capability-inheritance enforcement |\n| `requires_approval_with_context` | `requires_approval` | Adds sender/channel context |\n| `tool_timeout_secs_for` | `tool_timeout_secs` | Adds per-tool glob-based overrides |\n\n---\n\n## Method groups\n\n### Agent lifecycle\n\n| Method | Async | Description |\n|---|---|---|\n| `spawn_agent` | ✓ | Create an agent from a TOML manifest; returns `(id, name)` |\n| `spawn_agent_checked` | ✓ | Same, but validates child capabilities against `parent_caps` |\n| `list_agents` | | All running agents |\n| `find_agents` | | Search by name substring, tag, or tool name (case-insensitive) |\n| `kill_agent` | | Terminate by ID |\n\n### Inter-agent messaging\n\n| Method | Description |\n|---|---|\n| `send_to_agent` | Send a message and receive the response |\n| `send_to_agent_as` | Like above, but records `parent_agent_id` so `/stop` cascades through the call chain |\n\n`tool_agent_send` in the runtime calls `send_to_agent_as` and also consults `max_agent_call_depth` to prevent unbounded recursion between agents.\n\n### Shared memory\n\n| Method | Scoped by `peer_id`? | Description |\n|---|---|---|\n| `memory_store` | ✓ | Write a JSON value under a key |\n| `memory_recall` | ✓ | Read a value back |\n| `memory_list` | ✓ | List all keys (within a namespace) |\n\nWhen `peer_id` is `Some`, keys are isolated per-peer so different users of the same agent don't see each other's data.\n\n### Task queue\n\nA cooperative task board agents use to distribute work:\n\n| Method | Async | Description |\n|---|---|---|\n| `task_post` | ✓ | Create a task; returns task ID |\n| `task_claim` | ✓ | Claim the next unassigned task |\n| `task_complete` | ✓ | Mark done with a result string |\n| `task_list` | ✓ | Filter by status (`\"pending\"`, `\"completed\"`, etc.) |\n| `task_get` | ✓ | Single task by ID, including result and retry count |\n| `task_delete` | ✓ | Remove a task |\n| `task_retry` | ✓ | Reset to pending |\n| `task_update_status` | ✓ | Set to `\"pending\"` or `\"cancelled\"` |\n\n### Events and knowledge graph\n\n| Method | Description |\n|---|---|\n| `publish_event` | Fire a custom event that proactive agents can react to |\n| `knowledge_add_entity` | Add an entity to the graph |\n| `knowledge_add_relation` | Add a relation |\n| `knowledge_query` | Match a `GraphPattern`, return `GraphMatch` results |\n\n### Cron scheduling\n\n| Method | Default | Description |\n|---|---|---|\n| `cron_create` | Error | Create a scheduled job for an agent |\n| `cron_list` | Error | List an agent's jobs |\n| `cron_cancel` | Error | Cancel by job ID |\n\nAll three default to `\"Cron scheduler not available\"`. The runtime's `tool_schedule_create`, `tool_schedule_list`, and `tool_schedule_delete` tools call through these.\n\n### Approval system\n\nThe approval flow has two paths:\n\n**Blocking path** — used when the tool call is already in flight:\n- `requires_approval` / `requires_approval_with_context` — check policy\n- `request_approval` — block until approved/denied/timeout (defaults to `Approved`)\n\n**Deferred path** — used when the tool should be paused and resumed:\n- `submit_tool_approval` — returns a `ToolApprovalSubmission` immediately\n- `resolve_tool_approval` — approve/deny, returns the deferred payload\n- `get_approval_status` — poll current state\n\n`is_tool_denied_with_context` provides a hard-deny check that short-circuits before the approval flow even starts.\n\n### Hands\n\nSpecialised autonomous agents that can be installed and activated:\n\n| Method | Default | Description |\n|---|---|---|\n| `hand_list` | Error | Available Hands and activation status |\n| `hand_install` | Error | Install from TOML + skill content |\n| `hand_activate` | Error | Spawn the Hand's agent |\n| `hand_status` | Error | Dashboard metrics for an active Hand |\n| `hand_deactivate` | Error | Stop a running Hand |\n\n### A2A (Agent-to-Agent) discovery\n\n| Method | Default | Description |\n|---|---|---|\n| `list_a2a_agents` | Empty vec | External A2A agents as `(name, url)` pairs |\n| `get_a2a_agent_url` | `None` | Look up URL by name |\n\n`tool_a2a_send` in the runtime resolves the target via `get_a2a_agent_url` before sending.\n\n### Channel messaging\n\nMulti-adapter outbound messaging to users on Slack, Telegram, email, etc.:\n\n| Method | Supports threads | Supports multi-account |\n|---|---|---|\n| `send_channel_message` | ✓ | ✓ |\n| `send_channel_media` | ✓ | ✓ |\n| `send_channel_file_data` | ✓ | ✓ |\n| `send_channel_poll` | — | ✓ |\n\nAll default to `\"Channel … not available\"`. The runtime's `tool_channel_send` dispatches to the appropriate method based on the tool arguments.\n\n### Prompt versioning and experiments\n\nA full CRUD system for prompt version management and A/B experimentation:\n\n**Versions:** `get_prompt_version`, `list_prompt_versions`, `create_prompt_version`, `delete_prompt_version`, `set_active_prompt_version`, `auto_track_prompt_version`\n\n**Experiments:** `list_experiments`, `create_experiment`, `get_experiment`, `update_experiment_status`, `get_experiment_metrics`, `get_running_experiment`, `record_experiment_request`\n\nAll default to empty/error. The runtime's `build_prompt_setup` calls `auto_track_prompt_version` and `get_prompt_version` during prompt assembly.\n\n### Workflows, goals, and forked execution\n\n| Method | Default | Description |\n|---|---|---|\n| `run_workflow` | Error | Execute a workflow by ID or name; returns `(run_id, output)` |\n| `goal_list_active` | Empty | Pending/in-progress goals |\n| `goal_update` | Error | Change status or progress |\n| `run_forked_agent_oneshot` | Error | Forked turn that collapses to a single text response; used by proactive memory extraction |\n\n`run_forked_agent_oneshot` is notable: it shares the parent turn's `(system + tools + messages)` prefix for prompt cache alignment with Anthropic, rather than issuing a cold standalone call. The fork's messages do not persist into the canonical session, and the turn-end hook fires with `is_fork: true` to prevent recursive auto-dream.\n\n### Utilities\n\n| Method | Default | Called by |\n|---|---|---|\n| `touch_heartbeat` | No-op | `run_agent_loop`, `run_agent_loop_streaming` — prevents heartbeat false-positives during long LLM calls |\n| `tool_timeout_secs` | `120` | Global tool execution timeout |\n| `tool_timeout_secs_for` | Delegates to `tool_timeout_secs` | `execute_single_tool_call` — per-tool override with glob matching |\n| `max_agent_call_depth` | `5` | `tool_agent_send` — inter-agent recursion guard |\n| `fire_agent_step` | No-op | `run_agent_loop` — external hook at each loop iteration |\n| `readonly_workspace_prefixes` | Empty | `execute_tool_raw` — enforces workspace access modes |\n\n---\n\n## Implementing `KernelHandle`\n\nThe kernel's concrete implementation lives in `librefang-kernel`. A minimal implementation for testing only needs to override the methods it exercises:\n\n```rust\nstruct MockHandle;\n\n#[async_trait]\nimpl KernelHandle for MockHandle {\n    async fn send_to_agent(&self, _id: &str, msg: &str) -> Result<String, String> {\n        Ok(format!(\"echo: {msg}\"))\n    }\n\n    fn list_agents(&self) -> Vec<AgentInfo> {\n        vec![]\n    }\n}\n```\n\nEvery other method will use its default. Methods for subsystems you don't override will return clear error messages when accidentally called, rather than panicking or silently doing the wrong thing.\n\nWhen implementing delegation-chain methods, override the **inner** method (`send_to_agent`, `spawn_agent`, `requires_approval`, `tool_timeout_secs`) and only override the wrapper if you need the extended semantics.","agent-kernel-librefang-kernel-metering-src":"# Agent Kernel — librefang-kernel-metering-src\n\n# Agent Kernel — Metering Engine\n\n## Overview\n\nThe metering engine (`MeteringEngine`) tracks LLM token usage, estimates costs, and enforces spending quotas at three independent levels: per-agent, per-provider, and global. All persistent state lives in a SQLite-backed `UsageStore` (provided by `librefang-memory`).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[MeteringEngine] -->|persists| B[UsageStore SQLite]\n    A -->|reads pricing| C[ModelCatalog]\n    A -->|enforces| D[Agent Quota]\n    A -->|enforces| E[Global Budget]\n    A -->|enforces| F[Provider Budget]\n    D & E & F -->|atomic txn| B\n```\n\nEvery usage event is represented by a `UsageRecord` (agent ID, provider, model, token counts, cost, latency). The engine can persist records, query aggregate spend across time windows, and block calls that would exceed configured limits.\n\n## Quota Enforcement Hierarchy\n\nBudget limits are checked at three levels, each with hourly / daily / monthly windows:\n\n| Level | Config type | Scope |\n|-------|-------------|-------|\n| **Per-agent** | `ResourceQuota` | Spending attributed to a single `AgentId` |\n| **Per-provider** | `ProviderBudget` | Spending routed through a named provider (e.g. `moonshot`, `openrouter`) |\n| **Global** | `BudgetConfig` | Total spend across all agents and providers |\n\nA zero-valued limit means **unlimited** — that window is skipped entirely during enforcement.\n\n## Key API Surface\n\n### Construction\n\n```rust\nlet store = Arc::new(UsageStore::new(substrate.usage_conn()));\nlet engine = MeteringEngine::new(store);\n```\n\nThe engine holds a single `Arc<UsageStore>` and performs no I/O at construction time.\n\n### Recording Usage\n\n```rust\nengine.record(&UsageRecord { agent_id, provider, model, input_tokens, output_tokens, cost_usd, tool_calls, latency_ms })?;\n```\n\n`record` is a thin pass-through to `UsageStore::record`. It persists a single usage event but does **not** check any quotas.\n\n### Atomic Check-and-Record\n\nThe non-atomic pattern of calling `check_quota` then `record` has a TOCTOU race — concurrent requests can both pass the check before either writes. The engine provides three atomic variants that wrap the check and insert in a single SQLite transaction:\n\n| Method | Checks performed |\n|--------|-----------------|\n| `check_quota_and_record` | Per-agent quota only |\n| `check_global_budget_and_record` | Global budget only |\n| `check_all_and_record` | Per-agent + global + per-provider |\n\n`check_all_and_record` is the **preferred entry point** after an LLM call. It resolves the per-provider budget from `BudgetConfig.providers` keyed by `record.provider`, then delegates to `UsageStore::check_all_with_provider_and_record`. On failure, the record is **not** inserted — the transaction rolls back.\n\n### Standalone Quota Checks\n\nFor pre-dispatch gating or dashboard use:\n\n- `check_quota(agent_id, &quota)` — per-agent hourly/daily/monthly\n- `check_global_budget(&budget)` — global hourly/daily/monthly\n- `check_provider_budget(provider, &budget)` — per-provider cost + token limits\n\nThese are read-only and non-atomic. They return `LibreFangError::QuotaExceeded` with a human-readable message identifying which limit was breached.\n\n### Budget Status\n\n`budget_status(&budget)` returns a `BudgetStatus` snapshot with current spend, configured limit, and utilization percentage for each window:\n\n```rust\npub struct BudgetStatus {\n    pub hourly_spend: f64,   pub hourly_limit: f64,   pub hourly_pct: f64,\n    pub daily_spend: f64,    pub daily_limit: f64,    pub daily_pct: f64,\n    pub monthly_spend: f64,  pub monthly_limit: f64,  pub monthly_pct: f64,\n    pub alert_threshold: f64,\n    pub default_max_llm_tokens_per_hour: u64,\n}\n```\n\n`BudgetStatus` implements `serde::Serialize` for API exposure.\n\n### Querying Usage\n\n- `get_summary(agent_id: Option<AgentId>)` — aggregate `UsageSummary` for one agent or all agents\n- `get_by_model()` — `Vec<ModelUsage>` grouped by model name\n\n### Cleanup\n\n`cleanup(days)` delegates to `UsageStore::cleanup_old` to purge records older than the given number of days. Returns the count of deleted rows.\n\n## Cost Estimation\n\nTwo static methods estimate cost from token counts — they do not touch the store:\n\n### `estimate_cost` (fallback, no catalog)\n\n```rust\nlet cost = MeteringEngine::estimate_cost(model, input_tokens, output_tokens, cache_read_tokens, cache_creation_tokens);\n```\n\nUses flat default rates: **$1.00 / $3.00 per million tokens** (input / output). Useful in tests or when no catalog is available.\n\n### `estimate_cost_with_catalog` (preferred)\n\n```rust\nlet cost = MeteringEngine::estimate_cost_with_catalog(&catalog, model, input_tokens, output_tokens, cache_read, cache_creation);\n```\n\nLooks up the model in the `ModelCatalog` and uses its `input_cost_per_m` / `output_cost_per_m`. Falls back to default rates if the model is not found.\n\n**Special case — ChatGPT session-auth models:** If the catalog returns zero pricing for a model whose provider is `\"chatgpt\"`, the method applies the default rates instead of returning $0. This ensures budgets still function for session-authenticated models that don't expose per-token pricing. Local-tier models with zero pricing are **not** substituted — they genuinely cost nothing.\n\n### Token Pricing Breakdown\n\nThe internal `estimate_cost_from_rates` function handles three token categories:\n\n| Token type | Pricing multiplier |\n|------------|--------------------|\n| Regular input (total minus cache tokens) | `input_per_m × 1.0` |\n| Cache-read input | `input_per_m × 0.10` |\n| Cache-creation input | `input_per_m × 1.25` |\n| Output | `output_per_m × 1.0` |\n\nRegular input is computed as `input_tokens - cache_read_input_tokens - cache_creation_input_tokens`, clamped to zero via `saturating_sub`.\n\n## Dependencies\n\n| Crate | What's used |\n|-------|-------------|\n| `librefang-memory` | `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage`, `MemorySubstrate` |\n| `librefang-types` | `AgentId`, `ResourceQuota`, `LibreFangError`, `ModelCatalogEntry`, `BudgetConfig`, `ProviderBudget` |\n| `librefang-runtime` | `ModelCatalog` (for catalog-based cost estimation) |","agent-kernel-librefang-kernel-router-src":"# Agent Kernel — librefang-kernel-router-src\n\n# Agent Kernel — `librefang-kernel-router`\n\nMessage routing engine that maps incoming user messages to the most appropriate agent template or hand. Uses layered keyword matching with optional semantic similarity blending for cross-lingual support.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[User Message] --> AUTO_T[auto_select_template]\n    MSG --> AUTO_H[auto_select_hand]\n    \n    AUTO_T --> RULES[TEMPLATE_RULES<br/>hardcoded regex patterns]\n    AUTO_T --> META[Manifest Metadata<br/>agent.toml routing config]\n    \n    AUTO_H --> HANDS[Hand Route Candidates<br/>HAND.toml routing sections]\n    \n    RULES --> SCORE[Weighted Scoring]\n    META --> SCORE\n    HANDS --> HSCORE[Weighted Scoring]\n    \n    SCORE -->|semantic_scores provided| SEMANTIC[Semantic Bonus Blend]\n    HSCORE -->|semantic_scores provided| SEMANTIC\n    \n    SCORE --> TSEL[TemplateSelection]\n    HSCORE --> HSEL[HandSelection]\n```\n\nTwo independent routing decisions are made for each message: which **template** (agent persona) to use, and which **hand** (tool-capable agent) to activate. Callers invoke `auto_select_template` and `auto_select_hand` separately, passing the same message and optional semantic scores.\n\n## Template Routing\n\n`auto_select_template(message, agents_dir, semantic_scores)` returns a `TemplateSelection` with the template name, match reason, and score.\n\nThe function evaluates three sources in priority order:\n\n1. **Hardcoded `TEMPLATE_RULES`** — 28 built-in `RouteRule` entries covering English and Chinese regex patterns. Each rule has `strong` patterns (weighted 6) and `weak` patterns (weighted 1).\n2. **Manifest metadata** — `auto_select_template_from_metadata` scans `agents_dir` for agent directories containing `agent.toml`. The `[metadata.routing]` section declares `aliases`, `weak_aliases`, and `exclude_generated`.\n3. **Semantic fallback** — When keyword matching yields nothing and `semantic_scores` is provided, any template scoring ≥ 0.55 similarity gets a bonus.\n\nWhen the top two scored templates differ by a small margin and the message contains multi-domain indicators (`同时`, `分别`, `协作`, `多个`, `multi`, `together`), the router falls back to `orchestrator`.\n\nThe excluded template `\"assistant\"` is never a routing target.\n\n### Scoring Weights\n\n| Source | Weight |\n|---|---|\n| Explicit alias (hardcoded strong or manifest `aliases`) | 6 |\n| Generated phrase (from name/tags/description) | 2 |\n| Weak alias (hardcoded weak or manifest `weak_aliases`) | 1 |\n| Semantic bonus | 0–5 (scaled from cosine similarity) |\n\n### `TemplateSelection`\n\n```rust\npub struct TemplateSelection {\n    pub template: String,\n    pub reason: String,\n    pub score: usize,\n}\n```\n\nWhen no match is found, defaults to `\"orchestrator\"` with score 0.\n\n## Hand Routing\n\n`auto_select_hand(message, semantic_scores)` returns a `HandSelection`.\n\nHands are loaded from `{LIBREFANG_HOME}/registry/hands/{hand_id}/HAND.toml`. Each `HandDefinition` provides a `[routing]` section with `aliases` (strong) and `weak_aliases`. Additional strong phrases are auto-generated from the hand's description; weak phrases come from the hand ID's hyphen-separated tokens (filtered against `GENERIC_ENGLISH_WORDS`).\n\n### Minimum Score Threshold\n\n`MIN_HAND_SCORE = 2`. A single weak keyword hit (score 1) is rejected as too noisy. At least one strong hit or two weak hits are required.\n\n### `HandSelection`\n\n```rust\npub struct HandSelection {\n    pub hand_id: Option<String>,  // None when no hand matches\n    pub reason: String,\n    pub score: usize,\n}\n```\n\n## Semantic Score Blending\n\nBoth `auto_select_template` and `auto_select_hand` accept `Option<&HashMap<String, f32>>` containing precomputed cosine similarities between the message embedding and each candidate's description embedding.\n\nBlending rules:\n- Semantic bonus is computed as `(similarity * 5.0).round()` and added to the keyword score.\n- Keyword matches always participate in scoring; semantic is additive.\n- For **semantic-only** fallback (no keyword hits), similarity must reach `SEMANTIC_ONLY_THRESHOLD = 0.55`.\n- Strong keyword matches override conflicting semantic suggestions because the combined keyword + semantic score for the correct candidate exceeds the semantic-only score for a wrong candidate.\n\nCallers are expected to use `all_template_descriptions(agents_dir)` to get `(template_name, embed_text)` pairs for computing embeddings externally.\n\n## Caching\n\nThree global caches avoid redundant work across calls:\n\n| Cache | Static | Invalidation |\n|---|---|---|\n| `MANIFEST_CACHE` | `OnceLock<Mutex<Option<ManifestCacheEntry>>>` | `invalidate_manifest_cache()` |\n| `HAND_ROUTE_CACHE` | `OnceLock<Mutex<Option<HandRouteCacheEntry>>>` | `invalidate_hand_route_cache()` |\n| `REGEX_CACHE` | `OnceLock<Mutex<HashMap<String, Regex>>>` | Never invalidated |\n\nThe manifest cache keys on the `agents_dir` path — a different directory triggers a rebuild. The hand route cache keys on the resolved home directory string.\n\n**Call `invalidate_manifest_cache()` and `invalidate_hand_route_cache()` after**:\n- Config hot-reload\n- Agent install/uninstall (incoming calls from `install_hand` / `uninstall_hand` in `src/routes/skills.rs`)\n- Any modification to `HAND.toml` or `agent.toml` files\n\n## Phrase Generation\n\nSeveral functions extract matchable phrases from metadata:\n\n- **`description_phrases(description)`** — Splits on punctuation and CJK delimiters (`、。，；：（）–—`), strips generic English words, returns ASCII word n-grams (via `ascii_phrase_candidates`) and meaningful Unicode segments (2–32 chars).\n- **`tag_phrases(tags)`** — Normalizes each tag the same way as description phrases, with a lower minimum word length of 3.\n- **`english_variants(text)`** — Generates the original kebab-case form, a space-separated form, and individual hyphen-split parts.\n- **`manifest_routing_config(manifest)`** — Extracts `aliases`, `strong_aliases`, `weak_aliases`, and `exclude_generated` from `[metadata.routing]`.\n\nAll phrase lists are deduplicated by `dedupe()`, which preserves insertion order.\n\n## Pattern Matching\n\n- **`regex_matches(message, pattern)`** — Case-insensitive regex match with cached compilation. Invalid patterns compile to a never-match sentinel.\n- **`phrase_matches(message, phrase)`** — Dispatches on `is_ascii_phrase`. ASCII phrases get word-boundary-aware regex matching (`(?i)(^|[^a-z0-9])...([^a-z0-9]|$)` with spaces mapped to `[\\s_-]+`). Unicode phrases use simple `contains` on lowercased strings.\n\n## Template Manifest Loading\n\n`load_template_manifest(home_dir, template)` resolves to `{home_dir}/workspaces/agents/{template}/agent.toml` and deserializes into `AgentManifest`. Template names are validated by `is_safe_template_name` — only ASCII alphanumeric, hyphens, and underscores are allowed.\n\n`all_template_descriptions(agents_dir)` returns `(template_name, \"name: description. Tags: tag1, tag2\")` pairs for every non-excluded template that has a non-empty description. Use this to build embedding vectors for semantic routing.\n\n## Home Directory Resolution\n\n`resolve_hand_route_home_dir()` checks, in order:\n1. `HAND_ROUTE_HOME_DIR` set via `set_hand_route_home_dir()`\n2. `LIBREFANG_HOME` environment variable\n3. `~/.librefang` (via `dirs::home_dir()` with temp fallback)\n\n## Public API Summary\n\n| Function | Purpose |\n|---|---|\n| `auto_select_template` | Route message to agent template |\n| `auto_select_hand` | Route message to hand |\n| `load_template_manifest` | Load `AgentManifest` from disk |\n| `all_template_descriptions` | Get template descriptions for embedding |\n| `set_hand_route_home_dir` | Configure home directory for hand loading |\n| `invalidate_manifest_cache` | Clear manifest routing cache |\n| `invalidate_hand_route_cache` | Clear hand routing cache |\n\n## Integration Points\n\n- **`install_hand` / `uninstall_hand`** (`src/routes/skills.rs`) → call `invalidate_hand_route_cache()` after registry mutations.\n- **`librefang_hands::registry::parse_hand_toml`** → used by `load_hand_route_candidates` to parse `HAND.toml` definitions.\n- **`librefang_types::agent::AgentManifest`** → the manifest type returned by `load_template_manifest`.\n- **`librefang_runtime::registry_sync::resolve_home_dir_for_tests`** → used in test setup to initialize the hand route home directory.","agent-kernel-librefang-kernel-src":"# Agent Kernel — librefang-kernel-src\n\n# Agent Kernel — `librefang-kernel`\n\nThe agent kernel is the central coordination layer for LibreFang. It controls which operations require human approval before execution, enforces role-based access control for multi-user deployments, and manages background consolidation locks for the auto-dream subsystem.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Kernel\n        AM[ApprovalManager]\n        AU[AuthManager]\n        CL[ConsolidationLock]\n    end\n\n    subgraph External\n        API[HTTP / WebSocket API]\n        AGENT[Agent Runtime]\n        DB[(SQLite Audit DB)]\n        FS[(Lock File)]\n    end\n\n    AGENT -->|\"tool execution request\"| AM\n    API -->|\"resolve / reject\"| AM\n    API -->|\"identify + authorize\"| AU\n    AM -->|\"audit entries\"| DB\n    AM -->|\"TOTP lockout state\"| DB\n    CL -->|\"mtime + PID\"| FS\n```\n\n---\n\n## Approval System (`approval.rs`)\n\n### Purpose\n\nDangerous agent operations — shell execution, file writes, patch applications — must not run autonomously unless a human explicitly approves them. The `ApprovalManager` implements this gate with two execution paths:\n\n| Path | Method | Behavior |\n|------|--------|----------|\n| **Blocking** | `request_approval()` | Agent coroutine awaits resolution (or timeout). Used for synchronous tool calls. |\n| **Deferred** | `submit_request()` | Returns immediately with a UUID; the `DeferredToolExecution` payload is stored and returned atomically on `resolve()`. Used for multi-step agent responses. |\n\n### Key Constants\n\n| Constant | Value | Purpose |\n|----------|-------|---------|\n| `MAX_PENDING_PER_AGENT` | 5 | Prevents a single agent from flooding the approval queue. |\n| `MAX_RECENT_APPROVALS` | 100 | In-memory history ring buffer for dashboard display. |\n| `MAX_ESCALATIONS` | 3 | Maximum re-notification rounds before falling back to `TimedOut`. |\n| `TOTP_MAX_FAILURES` | 5 | Consecutive TOTP failures before lockout. |\n| `TOTP_LOCKOUT_SECS` | 300 | Lockout duration in seconds (5 minutes). |\n\n### Construction\n\n```rust\n// In-memory only (no audit persistence)\nlet mgr = ApprovalManager::new(policy);\n\n// With persistent audit log and TOTP lockout survival across restarts\nlet mgr = ApprovalManager::new_with_db(policy, sqlite_connection);\n```\n\n`new_with_db` loads persisted TOTP lockout state from the `totp_lockout` table. Entries whose lockout window has already expired are discarded at load time so a daemon restart does not extend a lockout beyond the original 5-minute window.\n\n### Policy Evaluation\n\n#### `requires_approval(tool_name)`\n\nChecks the `require_approval` list using glob matching (via `glob_matches`). Patterns like `\"file_*\"` match `file_read`, `file_write`, etc. A single `\"*\"` matches everything.\n\n#### `requires_approval_with_context(tool_name, sender_id, channel)`\n\nContext-aware check with a priority chain:\n\n1. **Trusted sender bypass** — if `sender_id` appears in `trusted_senders`, returns `false` immediately.\n2. **Channel rules** — if a `ChannelToolRule` exists for the channel:\n   - Explicit allow → `false` (no approval needed).\n   - Explicit deny → `true` (approval required, hard gate).\n3. **Default list** — falls back to `require_approval` glob matching.\n\n`is_tool_denied_with_context()` checks only the deny side (trusted sender still bypasses).\n\n### Blocking Approval Flow\n\n```rust\nlet decision = mgr.request_approval(req).await;\n```\n\nInternally this:\n\n1. Checks the per-agent pending limit (`MAX_PENDING_PER_AGENT`). Exceeding it returns `Denied` immediately.\n2. Creates a `tokio::sync::oneshot` channel and inserts a `PendingRequest` into the `DashMap`.\n3. Waits with `tokio::time::timeout` using an effective timeout computed by `effective_timeout_secs()`.\n4. On timeout, the `TimeoutFallback` policy determines the outcome:\n   - `Escalate { extra_timeout_secs }` — bumps `escalation_count`, re-inserts the request, and loops (up to `MAX_ESCALATIONS` rounds, each with increasing timeout).\n   - `Skip` — resolves as `Skipped`.\n   - `Deny` (default) — resolves as `TimedOut`.\n\n### Deferred (Non-Blocking) Approval Flow\n\n```rust\nlet id = mgr.submit_request(req, deferred_execution)?;\n// ... later ...\nlet (response, maybe_deferred) = mgr.resolve(id, decision, decided_by, totp_verified, user_id)?;\n```\n\n- `submit_request()` rejects duplicate `tool_use_id` values (same tool call cannot be submitted twice).\n- `expire_pending_requests()` is called periodically by the kernel to sweep timed-out deferred requests. Returns escalated requests separately from terminal expirations.\n- On resolve, the `DeferredToolExecution` is returned atomically with the `ApprovalResponse`.\n\n### Resolution\n\n`resolve()` is the single entry point for both blocking and deferred paths:\n\n- For blocking requests, it sends the decision through the oneshot channel to wake the awaiting agent.\n- For deferred requests, it returns the stored `DeferredToolExecution` payload.\n- If the request ID is not found in pending, it checks `recent` records and returns a descriptive error (e.g., \"Already Approved by admin\").\n\nBatch operations:\n\n| Method | Notes |\n|--------|-------|\n| `resolve_batch()` | Resolves multiple IDs with the same decision. No TOTP support. |\n| `resolve_all_for_session()` | Resolves every pending request matching a `session_id`. Skips TOTP-protected items (returns `Err` per item). |\n\n### Session-Scoped Queries\n\nMirrors Hermes-Agent's gateway approval model:\n\n- `list_pending_for_session(session_id)` — all pending requests for a session.\n- `has_pending_for_session(session_id)` — boolean check for dashboard gating.\n- `resolve_all_for_session(session_id, decision, decided_by)` — atomically resolve all matching requests.\n\n### TOTP Second Factor\n\nWhen `ApprovalPolicy.second_factor` is `SecondFactor::Totp`, approvals for tools listed in `totp_tools` (or all tools if the list is empty) require a verified TOTP code.\n\n#### Verification Flow\n\n1. Caller verifies the TOTP code externally using `ApprovalManager::verify_totp_code(secret, code)`.\n2. Caller passes `totp_verified: true` to `resolve()`.\n3. `resolve()` checks `policy.tool_requires_totp(tool_name)` and enforces the gate.\n\n#### Grace Period\n\nAfter a successful TOTP verification, the user enters a grace period (`totp_grace_period_secs`). Subsequent approvals by the same `user_id` bypass TOTP within this window. Set to `0` to disable.\n\n#### Lockout\n\n- `record_totp_failure(sender_id)` increments the failure counter. After `TOTP_MAX_FAILURES` consecutive failures, the sender is locked out for `TOTP_LOCKOUT_SECS`.\n- `is_totp_locked_out(sender_id)` checks the current state.\n- Lockout state is persisted to SQLite (`totp_lockout` table) and restored on restart.\n- A successful TOTP verification (`record_totp_grace`) clears the failure counter.\n\n#### TOTP Utilities\n\n| Method | Description |\n|--------|-------------|\n| `verify_totp_code(secret, code)` | RFC 6238, SHA-1, 6 digits, 30s step, ±1 window. |\n| `verify_totp_code_with_issuer(secret, code, issuer)` | Same with custom issuer label. |\n| `generate_totp_secret(issuer, account)` | Returns `(base32_secret, otpauth_uri, qr_base64_png)`. |\n| `generate_recovery_codes()` | 8 codes in `DDDD-DDDD` format. |\n| `verify_recovery_code(stored_json, code)` | Consumes a matching code, returns updated JSON. |\n\n### Risk Classification\n\n`classify_risk(tool_name)` is a static method returning:\n\n| Tool | Risk |\n|------|------|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n### Audit Logging\n\nWhen constructed with `new_with_db()`, every resolved request is written to the `approval_audit` table. Query methods:\n\n- `query_audit(limit, offset, agent_id, tool_name)` — paginated with optional filters.\n- `audit_count(agent_id, tool_name)` — total count with optional filters.\n\n### Hot-Reload\n\n`update_policy(policy)` replaces the active policy under a write lock. The `RwLock` is acquired once and held for both the TOTP gate check and grace-period recording in `resolve()`, preventing a hot-reload race between two separate lock acquisitions.\n\n---\n\n## Authentication & Authorization (`auth.rs`)\n\n### Purpose\n\nMaps platform identities (Telegram user ID, Discord user ID, etc.) to LibreFang users with hierarchical roles, then enforces permission checks on kernel actions.\n\n### Role Hierarchy\n\n```rust\npub enum UserRole {\n    Viewer = 0,  // Read-only — can view agent output\n    User   = 1,  // Standard — can chat with agents\n    Admin  = 2,  // Can spawn/kill agents, install skills\n    Owner  = 3,  // Full access including user management\n}\n```\n\nRoles are ordered (`Ord`), so `identity.role >= action.required_role()` is the single authorization check.\n\n### Action Permissions\n\n| Action | Minimum Role |\n|--------|-------------|\n| `ChatWithAgent` | User |\n| `ViewConfig` | User |\n| `ViewUsage` | Admin |\n| `SpawnAgent` | Admin |\n| `KillAgent` | Admin |\n| `InstallSkill` | Admin |\n| `ModifyConfig` | Owner |\n| `ManageUsers` | Owner |\n\n### Construction and Identity Resolution\n\n```rust\nlet auth = AuthManager::new(&user_configs);\n```\n\nEach `UserConfig` contains a name, role string, and a map of channel bindings (`\"telegram\" → \"123456\"`). The manager builds two indexes:\n\n- `users`: `DashMap<UserId, UserIdentity>` — the canonical user store.\n- `channel_index`: `DashMap<String, UserId>` — maps `\"channel_type:platform_id\"` to a user.\n\n#### `identify(channel_type, platform_id) → Option<UserId>`\n\nLooks up the channel index. Returns `None` for unrecognized users.\n\n#### `authorize(user_id, action) → LibreFangResult<()>`\n\nReturns `Ok(())` if the user's role meets the action's requirement, or `LibreFangError::AuthDenied` otherwise. Unknown users are always denied.\n\n#### `is_enabled()`\n\nReturns `false` when no users are configured. When RBAC is disabled, the kernel typically falls back to open access.\n\n---\n\n## Auto-Dream Consolidation Lock (`auto_dream/lock.rs`)\n\n### Purpose\n\nPrevents concurrent consolidation runs (the \"auto-dream\" background process that restructures agent memory) across both threads and separate processes. Uses a lock file with a dual-purpose design:\n\n- **File body**: `\"<pid>:<uuid>\"` — identifies the current lock holder for liveness checks.\n- **File mtime**: Treated as `last_consolidated_at` (milliseconds since epoch). No separate timestamp store exists.\n\n### Lock Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Unlocked\n    Unlocked --> Acquired: try_acquire() succeeds\n    Acquired --> Released: release()\n    Acquired --> RolledBack: rollback(prior_mtime)\n    Released --> Unlocked\n    RolledBack --> Unlocked\n```\n\n### `try_acquire() → Result<Option<u64>>`\n\n1. Reads existing lock file. If a live holder PID is found within `HOLDER_STALE_MS` (1 hour), returns `Ok(None)` (lock is held).\n2. Stale or dead holders are reclaimed.\n3. Writes `\"<our_pid>:<unique_uuid>\"` to the file.\n4. Re-reads the file to verify the write won the race (last-writer-wins). The UUID token prevents same-process racers from falsely passing this check.\n5. An in-process `DashSet` (`IN_PROCESS_CLAIMS`) serializes concurrent acquirers within the same daemon.\n6. Returns `Ok(Some(prior_mtime))` on success.\n\n### `rollback(prior_mtime)`\n\nAfter a failed consolidation, rewinds the lock file's mtime to its pre-acquire value so the next time-gate check will pass and retry. If `prior_mtime` is `0` (no prior lock existed), the file is deleted entirely.\n\n### `release()`\n\nClears the PID body and refreshes mtime to now. Without clearing the body, the still-running process would appear as a live holder on the next tick, blocking re-dreams.\n\n### `read_last_consolidated_at() → Result<u64>`\n\nReturns the lock file's mtime in milliseconds, or `0` if the file doesn't exist (never consolidated).\n\n### Platform Notes\n\n- **Unix**: `set_mtime_ms()` uses `libc::utimes()` for sub-second mtime precision. Process liveness uses `kill(pid, 0)` (signal 0 probe).\n- **Non-Unix**: Mtime rewind is a no-op (lock file is written but mtime is not set back on failure). Process liveness always returns `true`, relying solely on the stale window.\n\n---\n\n## Integration Points\n\n| Consumer | Uses |\n|----------|------|\n| HTTP API routes (`src/routes/system.rs`) | TOTP setup/confirm/revoke flows call `ApprovalManager` TOTP utilities and vault integration. |\n| Agent runtime | Calls `request_approval()` for synchronous tool gating, `submit_request()` for deferred tools. |\n| Kernel tick loop | Calls `expire_pending_requests()` periodically to sweep timed-out deferred requests. |\n| Dashboard / WebSocket | Calls `list_pending()`, `list_recent()`, `query_audit()` for UI display. |\n| Channel gateways | Call `identify()` + `authorize()` to map platform users to roles before processing commands. |\n| Auto-dream scheduler | Calls `ConsolidationLock::try_acquire()` / `release()` / `rollback()` around consolidation runs. |\n| Skill registry | Uses `path()` from lock module for test fixtures (shared test utilities). |\n\n### Policy Hot-Reload\n\nThe kernel can call `update_policy()` at any time. The `RwLock` ensures concurrent reads during policy evaluation are not disrupted. In `resolve()`, the policy snapshot is taken once and reused for both the TOTP gate check and grace-period recording to avoid TOCTOU issues.","agent-kernel":"# Agent Kernel\n\n# Agent Kernel\n\nThe agent kernel is LibreFang's central coordination layer. It mediates every interaction between the agent runtime and the outside world — handling approvals, routing messages, tracking costs, and enforcing access control.\n\n## Sub-modules\n\n| Module | Responsibility |\n|--------|---------------|\n| [**librefang-kernel**](librefang-kernel.md) | Core services: approval gates, auth, consolidation locks, and workflow execution |\n| [**librefang-kernel-handle**](librefang-kernel-handle.md) | Dependency-inversion trait (`KernelHandle`) that lets the runtime call back into the kernel without circular imports |\n| [**librefang-kernel-metering**](librefang-kernel-metering.md) | Token usage tracking, cost estimation, and quota enforcement at agent, provider, and global levels |\n| [**librefang-kernel-router**](librefang-kernel-router.md) | Maps incoming user messages to the best agent template or hand via keyword and semantic matching |\n\n## How they fit together\n\n```mermaid\nflowchart LR\n  RT[\"Agent Runtime\"]\n  KH[\"KernelHandle trait\"]\n  K[\"Kernel Core\"]\n  R[\"Router\"]\n  M[\"Metering Engine\"]\n\n  RT -->|\"calls via trait\"| KH\n  KH -.->|\"implemented by\"| K\n  K -->|\"route message\"| R\n  K -->|\"record usage\"| M\n  R -->|\"select agent/hand\"| RT\n```\n\nThe runtime never imports the kernel directly. Instead, it depends on the thin `librefang-kernel-handle` crate, which defines the `KernelHandle` trait. The kernel implements this trait and injects the concrete handle at agent startup, breaking the circular dependency.\n\nOnce the runtime is running, the kernel orchestrates three key concerns:\n\n1. **Message routing** — When a user message arrives, the kernel delegates to the [router](librefang-kernel-router.md), which scores candidates via keyword rules, manifest metadata, and optional semantic similarity, then returns the best-matching template or hand.\n\n2. **Approval gating** — Tool execution requests flow through the kernel's `ApprovalManager`. High-risk operations suspend until resolved or rejected through the external API, with every decision persisted to the SQLite audit database.\n\n3. **Cost enforcement** — Every LLM call produces a `UsageRecord` that the [metering engine](librefang-kernel-metering.md) persists and checks against three independent budgets (agent, provider, global). Overages are rejected before the request reaches the provider.\n\n## Key cross-cutting workflows\n\n**Agent loop lifecycle** — The kernel injects a `KernelHandle` into each agent loop. The runtime uses this handle to spawn agents, send messages, and manage shared memory. The router selects which agent template to instantiate, the metering engine tracks its token spend, and the approval manager gates its tool calls.\n\n**Incoming message flow** — User message → router (`auto_select_template` or `auto_select_hand`) → agent instantiation → kernel-mediated execution → usage record persisted.\n\n**Auto-dream consolidation** — The kernel's `ConsolidationLock` coordinates background dream cycles, ensuring only one consolidation runs at a time while the router and metering engine continue serving foreground requests.","agent-runtime-librefang-runtime-mcp-src":"# Agent Runtime — librefang-runtime-mcp-src\n\n# Agent Runtime — `librefang-runtime-mcp`\n\nMCP (Model Context Protocol) client for connecting to external MCP servers, discovering their tools, and invoking them on behalf of the agent runtime. All MCP tools are surfaced as namespaced tools (`mcp_{server}_{tool}`) to prevent name collisions across servers.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TR[\"tool_runner<br/>execute_tool_raw\"] -->|\"is_mcp_tool /<br/>resolve_mcp_server_from_known\"| MC[\"McpConnection\"]\n    TR -->|\"call_tool\"| MC\n    MC --> T[\"Taint Scanner\"]\n    MC --> STDIO[\"Stdio<br/>(rmcp SDK)\"]\n    MC --> SSE[\"SSE<br/>(JSON-RPC POST)\"]\n    MC --> HTTP[\"Streamable HTTP<br/>(rmcp SDK)\"]\n    MC --> HC[\"HttpCompat<br/>(plain HTTP)\"]\n    HTTP -->|\"401 → discover_oauth_metadata\"| OAUTH[\"mcp_oauth\"]\n    ROUTES[\"routes/mcp_auth<br/>auth_start\"] -->|\"discover_oauth_metadata\"| OAUTH\n```\n\n## Transports\n\nThe module supports four transport modes via `McpTransport`:\n\n| Transport | Protocol | Tool Discovery | Roots Support |\n|---|---|---|---|\n| `Stdio` | Subprocess stdin/stdout via rmcp SDK | `tools/list` during handshake | Yes — `RootsClientHandler` |\n| `Sse` | HTTP POST with JSON-RPC 2.0 | `tools/list` after manual `initialize` | No — unidirectional |\n| `Http` | Streamable HTTP (MCP 2025-03-26+) via rmcp SDK | `tools/list` during handshake | Local servers only |\n| `HttpCompat` | Plain HTTP with configurable method/path | Static declaration in config | No — no MCP handshake |\n\n### Connection lifecycle\n\n`McpConnection::connect(config)` is the single entry point. It:\n\n1. Validates the URL (SSRF check via `check_ssrf`)\n2. Spawns/connects to the transport\n3. Performs MCP handshake (Stdio/Http via rmcp; SSE via manual `initialize`)\n4. Discovers tools via `tools/list` or static config (HttpCompat)\n5. Registers each tool under `mcp_{server}_{tool}` namespace\n\n### Tool invocation\n\n`McpConnection::call_tool(name, arguments)` resolves the namespaced name back to the original, runs the outbound taint scanner, then dispatches to the appropriate transport. A `TransportKind` tag avoids borrow-checker conflicts between `self.inner` and `self.config` across await points.\n\n## Security\n\n### Outbound taint scanning\n\nBefore any tool call is dispatched, `scan_mcp_arguments_for_taint_with_policy` walks every string leaf in the JSON argument tree and checks it against `TaintSink::mcp_tool_call`. Two detection mechanisms run:\n\n1. **Content heuristic** — `check_outbound_text_violation_with_skip` matches credential patterns (API keys, tokens, PII)\n2. **Key-name blocking** — Object keys matching `MCP_SENSITIVE_KEY_NAMES` (e.g. `authorization`, `api_key`, `secret`) with non-empty string values are blocked regardless of value shape\n\nThe scanner is hard-capped at depth 64 (`MCP_TAINT_SCAN_MAX_DEPTH`) to prevent stack exhaustion from pathological payloads.\n\n**Redaction guarantee**: violation messages contain only the JSON path and rule name — never the offending payload value. These messages flow back to the LLM and logs.\n\n#### Per-tool, per-path exemptions\n\n`McpTaintPolicy` allows disabling specific taint rules for specific argument paths in specific tools. The JSONPath matcher supports:\n\n- Exact paths: `$.tabId`\n- Wildcards: `$.*`, `$.a.*`\n- Array wildcards: `$.items[*]`\n\n`resolve_skip_rules` collects all matching `skip_rules` for the current tool+path before calling `check_outbound_text_violation_with_skip`.\n\nSet `taint_scanning: false` on `McpServerConfig` to disable the content heuristic entirely for trusted local servers. Key-name blocking remains active even when scanning is off.\n\n### Subprocess sandboxing (Stdio)\n\n- Shell interpreters (`bash`, `sh`, `cmd`, `powershell`, etc.) are blocked — servers must specify a runtime directly (`npx`, `node`, `python`)\n- Path traversal (`..`) in the command is rejected\n- The subprocess does **not** inherit the parent environment — only `SAFE_ENV_VARS` (PATH, HOME, language/locale vars, Node/Python/Rust/Go/Ruby paths) plus explicitly declared `env` entries are passed\n- Environment variable expansion (`$VAR`, `${VAR}`) in args avoids needing `sh -c` wrappers\n\n### SSRF protection\n\n- `check_ssrf` blocks cloud metadata endpoints (`169.254.169.254`, `metadata.google.internal`)\n- `is_local_url` uses proper URL parsing (not substring matching) to detect loopback addresses — prevents spoofing via `127.0.0.1.evil.com` or `127.0.0.1@attacker.com`\n- Filesystem roots are only advertised to local servers (Stdio always; HTTP only if `is_local_url` returns true)\n\n## Tool Namespacing\n\nAll MCP tools are prefixed to avoid collisions across servers:\n\n- `format_mcp_tool_name(\"github\", \"create_issue\")` → `\"mcp_github_create_issue\"`\n- Server names are normalized: hyphens become underscores, everything lowercase\n- `resolve_mcp_server_from_known` is the **recommended** way to reverse the mapping — it tries each known server name and picks the longest matching prefix, handling multi-word server names correctly\n- `extract_mcp_server` is a simpler heuristic that splits on the first `_` after `mcp_` — only reliable for single-word server names\n\n## MCP Roots\n\n`RootsClientHandler` implements `rmcp::ClientHandler` to advertise filesystem root directories during the MCP `initialize` handshake. Roots are converted to `file://` URIs using the `url` crate for proper percent-encoding and Windows path handling.\n\nRoots are populated at runtime by the kernel (home dir + agent workspaces) via `McpServerConfig.roots`. This field is `#[serde(skip)]` — never serialized to/from config.\n\n## OAuth (`mcp_oauth`)\n\nThe `mcp_oauth` module handles OAuth discovery and authentication for Streamable HTTP connections.\n\n### Three-tier metadata discovery\n\n`discover_oauth_metadata` resolves OAuth endpoints using three fallback tiers:\n\n1. **WWW-Authenticate header** — Parse `resource_metadata` URL from the `Bearer` challenge → fetch RFC 8414 metadata\n2. **`.well-known`** — Construct `.well-known/oauth-authorization-server` from the server URL origin → fetch\n3. **Config fallback** — Use `McpOAuthConfig.auth_url` + `McpOAuthConfig.token_url` directly\n\nEach tier's results can be merged with config overrides via `merge_metadata_with_config` (config takes precedence).\n\n### Security layers for metadata URL\n\n`extract_metadata_url` applies three validation layers:\n\n1. **HTTPS only** — `http://` rejected per RFC 8414\n2. **Same-origin** — metadata URL must share scheme+host+port with the server URL\n3. **IP blocklist** — `is_ssrf_blocked_host` rejects loopback, private, and link-local ranges\n\n### Authentication flow\n\nWhen `connect_streamable_http` receives a 401:\n\n1. `extract_auth_header_from_error` downcasts through rmcp's error chain to recover the `WWW-Authenticate` header\n2. `discover_oauth_metadata` resolves endpoints\n3. Connection returns `Err(\"OAUTH_NEEDS_AUTH\")` to signal the API layer\n4. The API layer (`routes/mcp_auth::auth_start`) drives the PKCE flow via the UI\n5. On success, `McpOAuthProvider::store_tokens` persists tokens; `load_token` injects them as `Authorization: Bearer` headers on subsequent connections\n\nKey types: `OAuthMetadata`, `McpAuthState` (state machine: `NotRequired` → `NeedsAuth` → `PendingAuth` → `Authorized`), `OAuthTokens`, `McpOAuthProvider` trait.\n\nPKCE helpers: `generate_pkce()` returns `(verifier, SHA256_challenge)` as base64url; `generate_state()` produces a random state parameter.\n\n## Integration Points\n\n| Caller | Function called | Purpose |\n|---|---|---|\n| `tool_runner::execute_tool_raw` | `is_mcp_tool` | Route tool calls to MCP |\n| `tool_runner::execute_tool_raw` | `resolve_mcp_server_from_known` | Find owning connection |\n| `tool_runner::execute_tool_raw` | `McpConnection::call_tool` | Execute the tool |\n| `routes::agents::get_agent_mcp_servers` | `resolve_mcp_server_from_known` | List available servers |\n| `routes::mcp_auth::auth_start` | `discover_oauth_metadata` | Start OAuth flow |\n| `mcp_oauth_provider::load_token` | `store_tokens` | Persist OAuth tokens |\n\n## HttpCompat Transport\n\nThe `HttpCompat` variant adapts plain HTTP/JSON backends that don't speak MCP protocol. Tools are statically declared in config with:\n\n- `path` — URL path template with `{param}` placeholders (percent-encoded via `encode_http_compat_path_value`)\n- `method` — GET, POST, PUT, PATCH, DELETE\n- `request_mode` — `JsonBody`, `Query`, or `None`\n- `response_mode` — `Text` (raw) or `Json` (pretty-printed)\n- `headers` — Static values or environment variable references (`value_env`)\n\nConfiguration is validated upfront by `validate_http_compat_config` — requires non-empty `base_url`, at least one tool, and each header must define `value` or `value_env`.\n\n## Key Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `MCP_TAINT_SCAN_MAX_DEPTH` | 64 | JSON tree depth cap for taint walker |\n| `MCP_SENSITIVE_KEY_NAMES` | 15 keys | Credential-shaped object key blocklist |\n| `SAFE_ENV_VARS` | ~35 vars | Allowlist for subprocess environment |","agent-runtime-librefang-runtime-oauth-src":"# Agent Runtime — librefang-runtime-oauth-src\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication runtime for LibreFang, providing token acquisition and refresh for **ChatGPT** (OpenAI) and **GitHub Copilot**. The module ships two independent flows per provider, optimized for both interactive desktop use and headless environments.\n\n## Module Layout\n\n```\nlibrefang-runtime-oauth/src/\n├── lib.rs               # Re-exports chatgpt_oauth and copilot_oauth\n├── chatgpt_oauth.rs     # OpenAI/ChatGPT OAuth — browser + device auth\n└── copilot_oauth.rs     # GitHub Copilot OAuth — device flow only\n```\n\n## Architecture\n\n```mermaid\nflowchart LR\n  subgraph CLI[\"librefang-cli\"]\n    A[authenticate_chatgpt]\n    B[persist_chatgpt_auth]\n  end\n\n  subgraph Server[\"librefang-server (routes/providers)\"]\n    C[copilot_oauth_start]\n    D[copilot_oauth_poll]\n  end\n\n  subgraph Drivers\n    E[chatgpt driver]\n  end\n\n  subgraph This[\"librefang-runtime-oauth\"]\n    F[chatgpt_oauth]\n    G[copilot_oauth]\n  end\n\n  A --> F\n  B --> F\n  C --> G\n  D --> G\n  E -->|refresh token| F\n\n  F -->|HTTP| H[auth.openai.com]\n  G -->|HTTP| I[github.com]\n```\n\n---\n\n## chatgpt_oauth — OpenAI Authentication\n\nImplements two OAuth flows against OpenAI's Codex endpoints. Tokens obtained here carry the `api.connectors` scopes and work with the ChatGPT backend Responses API, **not** the standard `/v1/chat/completions` endpoint.\n\n### Constants\n\n| Constant | Value | Purpose |\n|---|---|---|\n| `CHATGPT_BASE_URL` | `https://chatgpt.com/backend-api` | Backend API base for OAuth-token requests |\n| `CLIENT_ID` | `app_EMoamEEZ73f0CkXaXp7hrann` | OpenAI Codex CLI OAuth client |\n| `AUTHORIZE_URL` | `https://auth.openai.com/oauth/authorize` | Authorization endpoint |\n| `TOKEN_URL` | `https://auth.openai.com/oauth/token` | Token exchange and refresh endpoint |\n| `DEVICE_AUTH_URL` | `https://auth.openai.com/codex/device` | User-facing device verification page |\n| `DEVICE_AUTH_REDIRECT_URI` | `https://auth.openai.com/deviceauth/callback` | Redirect URI for device flow token exchange |\n| `SCOPE` | `openid profile email offline_access api.connectors.read api.connectors.invoke` | Requested OAuth scopes |\n\n### Core Types\n\n**`ChatGptAuthResult`** — Returned by every successful token operation. Wraps tokens in `Zeroizing<String>` to minimize credential lifetime in memory.\n\n| Field | Type | Description |\n|---|---|---|\n| `access_token` | `Zeroizing<String>` | Bearer token for API calls |\n| `refresh_token` | `Option<Zeroizing<String>>` | Long-lived token for renewal |\n| `expires_in` | `Option<u64>` | Seconds until access token expiry |\n\n**`DeviceAuthPrompt`** — Display-only struct for the device auth flow. Present these to the user, then pass to `poll_device_auth_flow`.\n\n| Field | Type | Description |\n|---|---|---|\n| `device_auth_id` | `String` | Server-issued identifier for polling |\n| `user_code` | `String` | One-time code the user enters at `DEVICE_AUTH_URL` |\n| `interval_secs` | `u64` | Recommended seconds between poll requests |\n\n**`DeviceAuthFlowError`** — Two variants with distinct handling semantics:\n\n- **`BrowserFallback { message }`** — Device auth isn't available for this account/workspace (HTTP 404). Callers should fall back to the browser flow.\n- **`Fatal(String)`** — Unrecoverable failure; do not silently retry.\n\n**`PkceChallenge`** — PKCE verifier and S256 challenge pair used in the browser flow.\n\n### Browser Flow\n\nFor desktop environments with a browser. Opens the user's browser to the OpenAI authorization page, then listens for a redirect callback on `127.0.0.1:1455`.\n\n```\nstart_oauth_flow() → build_authorization_url()\n        ↓\n  Browser opens → user logs in → redirect to localhost:1455\n        ↓\nrun_oauth_callback_server(port, state) → authorization code\n        ↓\nexchange_code_for_tokens(code, verifier, port) → ChatGptAuthResult\n```\n\n1. **`start_oauth_flow()`** — Binds port 1455 to confirm availability, generates PKCE + state, builds the auth URL. Returns `(auth_url, port, pkce_verifier, state)`. The caller should open `auth_url` in a browser, then immediately call `run_oauth_callback_server` with the port and state.\n\n2. **`run_oauth_callback_server(port, expected_state)`** — Starts an async TCP server that handles `GET /auth/callback?code=...&state=...`. Validates the CSRF state parameter, sends the authorization code through a oneshot channel, and serves a success/error HTML page to the browser. Times out after 5 minutes.\n\n3. **`exchange_code_for_tokens(code, code_verifier, port)`** — Posts the authorization code, PKCE verifier, and redirect URI to `TOKEN_URL`. Returns `ChatGptAuthResult`.\n\n### Device Auth Flow\n\nFor headless or remote environments. The user visits a URL on any device and enters a code.\n\n```\nstart_device_auth_flow() → DeviceAuthPrompt\n        ↓\n  User visits DEVICE_AUTH_URL, enters user_code\n        ↓\npoll_device_auth_flow(&prompt) → ChatGptAuthResult\n```\n\n1. **`start_device_auth_flow()`** — POSTs to the OpenAI device auth usercode endpoint. Returns `DeviceAuthPrompt` with the code and polling interval. Returns `DeviceAuthFlowError::BrowserFallback` on HTTP 404 (device auth not enabled).\n\n2. **`poll_device_auth_flow(prompt)`** — Polls the device auth token endpoint every `prompt.interval_secs` seconds. HTTP 403/404 are treated as \"still pending.\" On success, automatically exchanges the resulting authorization code for tokens via `exchange_code_for_tokens_with_redirect_uri`. Times out after 15 minutes.\n\n### Token Refresh\n\n**`refresh_access_token(refresh_token)`** — Posts a `refresh_token` grant to `TOKEN_URL`. Used by the ChatGPT driver when the stored access token has expired.\n\n### Model Discovery\n\n**`fetch_best_codex_model(access_token)`** — Calls `GET {CHATGPT_BASE_URL}/codex/models` with the access token, sorts results by `priority` descending, and returns the highest-priority model slug. Falls back to `\"gpt-5.1-codex-mini\"` on any failure. Called by the CLI during `persist_chatgpt_auth` to associate the best available model with the stored credentials.\n\n### Session Token Detection\n\n**`chatgpt_session_available()`** — Returns `true` if the `CHATGPT_SESSION_TOKEN` environment variable is set and non-empty. Allows callers to skip OAuth entirely when a direct session token is present.\n\n### PKCE and State Utilities\n\n- **`generate_pkce()`** — Generates 64 random bytes, base64url-encodes them as the verifier, then SHA-256 hashes and base64url-encodes the result as the S256 challenge.\n- **`create_state()`** — Generates 16 random bytes hex-encoded (32 characters) as a CSRF-protection state parameter.\n- **`build_authorization_url(port, code_challenge, state)`** — Constructs the full authorization URL with all required query parameters including PKCE challenge, scopes, and OpenAI-specific flags (`codex_cli_simplified_flow`, `id_token_add_organizations`).\n\n### Internal Callback Server\n\n`handle_oauth_callback` is the per-connection handler inside the callback server. It performs raw HTTP parsing on a `TcpStream`:\n\n- Extracts the request path and parses query parameters via `parse_query_params`\n- Checks for OAuth error responses and serves an error HTML page\n- Validates `state` against the expected value (rejects CSRF mismatches with HTTP 400)\n- Validates that `code` is present and non-empty\n- Sends the code through a `oneshot::Sender` guarded by an `Arc<Mutex<Option<...>>>`\n- Serves `success_html()` or `error_html()` as appropriate\n\nURL encoding/decoding is handled internally by `urlencod` (percent-encoding) and `urldecode` (`%XX` and `+` handling) rather than pulling in a URL crate.\n\n---\n\n## copilot_oauth — GitHub Copilot Authentication\n\nImplements the OAuth 2.0 Device Authorization Grant (RFC 8628) against GitHub, using the same public client ID as the VSCode Copilot extension (`Iv1.b507a08c87ecfe98`).\n\n### Core Types\n\n**`DeviceCodeResponse`** — Result of initiating a device flow.\n\n| Field | Type | Description |\n|---|---|---|\n| `device_code` | `String` | Internal code for polling |\n| `user_code` | `String` | Code the user enters at the verification URI |\n| `verification_uri` | `String` | URL the user visits |\n| `expires_in` | `u64` | Seconds until the device code expires |\n| `interval` | `u64` | Recommended polling interval in seconds |\n\n**`DeviceFlowStatus`** — Result of each poll attempt. The caller drives a polling loop based on these variants:\n\n| Variant | Meaning |\n|---|---|\n| `Pending` | User hasn't authorized yet — keep polling |\n| `Complete { access_token }` | Success — token is wrapped in `Zeroizing<String>` |\n| `SlowDown { new_interval }` | Server requested a longer interval |\n| `Expired` | Device code expired — restart the flow |\n| `AccessDenied` | User explicitly denied |\n| `Error(String)` | Unexpected failure |\n\n### Flow\n\n```\nstart_device_flow() → DeviceCodeResponse\n        ↓\n  User visits verification_uri, enters user_code\n        ↓\npoll_device_flow(device_code) → DeviceFlowStatus\n        ↓                            ↓\n  Pending → wait, retry       Complete → use access_token\n```\n\n1. **`start_device_flow()`** — POSTs to `https://github.com/login/device/code` with the Copilot client ID and `read:user` scope. Returns the parsed `DeviceCodeResponse`. Uses a 15-second HTTP timeout via `librefang_http::proxied_client_builder`.\n\n2. **`poll_device_flow(device_code)`** — POSTs to `https://github.com/login/oauth/access_token` with the device code grant type. GitHub returns HTTP 200 with an `error` field during pending states, so error detection inspects the JSON body rather than HTTP status. Returns `DeviceFlowStatus` for the caller to act on.\n\nThe caller (in `librefang-server` routes) is responsible for the polling loop, sleeping between attempts based on the interval from `start_device_flow` and any `SlowDown` adjustments.\n\n---\n\n## Integration Points\n\n| Caller Location | Function Called | When |\n|---|---|---|\n| `librefang-cli` → `authenticate_chatgpt` | `start_oauth_flow`, `start_device_auth_flow`, `poll_device_auth_flow`, `run_oauth_callback_server`, `exchange_code_for_tokens` | CLI login command |\n| `librefang-cli` → `persist_chatgpt_auth` | `fetch_best_codex_model` | After successful auth, to determine the model |\n| `librefang-server` → `copilot_oauth_start` | `start_device_flow` | Web UI initiates Copilot login |\n| `librefang-server` → `copilot_oauth_poll` | `poll_device_flow` | Web UI polls for Copilot auth completion |\n| `librefang-server` → `chatgpt driver` → `refresh_token` | `refresh_access_token` | Automatic token renewal on 401 |\n\nAll HTTP requests go through `librefang_http::proxied_client()` or `proxied_client_builder()`, ensuring proxy environment variables and custom CA certificates are respected.\n\n---\n\n## Security Considerations\n\n- **Zeroizing credentials**: `ChatGptAuthResult` and Copilot tokens are wrapped in `Zeroizing<String>`, which zeroizes memory on drop.\n- **PKCE**: The browser flow uses SHA-256 S256 code challenges, preventing authorization code interception.\n- **CSRF protection**: The state parameter is validated in the callback server. Mismatches are rejected with HTTP 400.\n- **No credential logging**: Tokens are never logged. Only the authorization URL (which contains the challenge, not the verifier) is logged at debug level.","agent-runtime-librefang-runtime-src":"# Agent Runtime — librefang-runtime-src\n\n# LibreFang Runtime (`librefang-runtime`)\n\nThe runtime crate is the execution engine of LibreFang. It contains the core agent loop that orchestrates LLM calls, tool execution, memory recall, and session persistence, as well as the A2A (Agent-to-Agent) interoperability layer for cross-framework agent communication.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    UserMsg[\"User Message\"] --> ALC[\"run_agent_loop\"]\n    ALC --> Recall[\"Memory Recall\"]\n    Recall --> LLM[\"LLM Completion\"]\n    LLM -->|EndTurn| Finalize[\"Finalize Turn\"]\n    LLM -->|ToolUse| Stage[\"StagedToolUseTurn\"]\n    Stage --> Exec[\"execute_single_tool_call\"]\n    Exec -->|results| Commit[\"commit()\"]\n    Commit --> LLM\n    Finalize --> Persist[\"Session Save\"]\n    Finalize --> AutoMem[\"auto_memorize\"]\n\n    subgraph \"A2A Protocol\"\n        AC[\"AgentCard\"] -->|served at| WK[\"/.well-known/agent.json\"]\n        Client[\"A2aClient\"] -->|discovers| WK\n        Client -->|tasks/send| External[\"External Agent\"]\n        TS[\"A2aTaskStore\"] -->|tracks| Task[\"A2aTask\"]\n    end\n```\n\n---\n\n## Agent Loop (`agent_loop.rs`)\n\nThe agent loop is the heart of the runtime. It handles a single user turn end-to-end: receiving the message, recalling relevant memories, calling the LLM, executing any tool calls the model requests, and persisting the conversation.\n\n### Entry Points\n\nTwo public entry points serve different channel types:\n\n- **`run_agent_loop`** — non-streaming (returns the full response at once)\n- **`run_agent_loop_streaming`** — streaming (emits `StreamEvent` values over an `mpsc` channel as tokens arrive)\n\nBoth share the same core logic; the streaming variant wraps completion calls in the streaming driver and forwards `StreamEvent::Token` / `StreamEvent::PhaseChange` events to the caller.\n\n### Loop Lifecycle\n\nThe loop proceeds through these phases:\n\n1. **Pre-flight checks** — provider configuration validation, cooldown checks, checkpoint restoration\n2. **Memory recall** — vector search (embedding-based) or text search, plus proactive memory auto-retrieval\n3. **Prompt assembly** — system prompt construction, A/B experiment variant selection, memory context injection\n4. **Message preparation** — session repair, safe trimming, image stripping, PII filtering\n5. **LLM completion** — rate-limited by a process-global semaphore (`MAX_CONCURRENT_LLM_CALLS = 5`), with retry logic for transient errors\n6. **Tool execution** (if `stop_reason == ToolUse`) — staged commit pattern, see below\n7. **Turn finalization** — response delivery, auto-memorize, session persistence, hook firing\n\n### `StagedToolUseTurn` — Atomic Tool-Use Commits\n\nThe `StagedToolUseTurn` struct is a critical correctness mechanism. It solves a class of bugs (upstream #2381) where tool-use turns left session history in a half-committed state — an assistant `ToolUse` message without the paired user `ToolResult` response — causing API rejections on the next turn.\n\n**How it works:**\n\n- When the LLM responds with `ToolUse`, a `StagedToolUseTurn` buffers the assistant message and accumulates tool results in memory\n- Each `execute_single_tool_call` appends its result via `append_result()`\n- Only when `commit()` is called do both the assistant message and the user tool-result message get pushed to `session.messages` and the LLM working copy atomically\n- If the loop exits early (error, signal, interrupt), `pad_missing_results()` fills in synthetic \"tool interrupted\" results for any unexecuted tool calls before committing\n- Dropping the struct without committing leaves `session.messages` untouched — by construction, no orphan `ToolUse` can reach persistence\n\n### Tool Execution\n\n`execute_single_tool_call` processes a single tool invocation through this pipeline:\n\n1. **Loop guard check** — circuit breaker, block, or warn verdicts\n2. **Fork allowlist check** — in fork mode, only explicitly permitted tools execute\n3. **Pre-tool hook** — `HookEvent::BeforeToolCall` can block execution\n4. **Execution with timeout** — `TOOL_TIMEOUT_SECS = 600s`, configurable per-tool via `KernelHandle::tool_timeout_secs_for`\n5. **Decision trace recording** — captures rationale, input, output summary, timing\n6. **Post-tool hook** — `HookEvent::AfterToolCall`\n7. **Transform hook** — `HookEvent::TransformToolResult` can rewrite the result content\n8. **Content sanitization** — strips injection markers, truncates to context budget\n\n### Loop Guard and Safety Mechanisms\n\n| Mechanism | Constant | Purpose |\n|-----------|----------|---------|\n| Max iterations | `AutonomousConfig::DEFAULT_MAX_ITERATIONS` | Prevents infinite agent loops |\n| Consecutive all-failed abort | `MAX_CONSECUTIVE_ALL_FAILED = 3` | Exits when every tool fails N times in a row |\n| Max continuations | `MAX_CONTINUATIONS = 5` | Caps `MaxTokens` response continuation rounds |\n| History trim | `MAX_HISTORY_MESSAGES = 40` | Prevents context overflow from growing conversation |\n| Tool timeout | `TOOL_TIMEOUT_SECS = 600` | Per-tool execution deadline |\n| LLM concurrency | `MAX_CONCURRENT_LLM_CALLS = 5` | Global semaphore caps in-flight API calls |\n\nSoft errors (parameter mistakes, sandbox rejections, approval denials) do not count toward the consecutive-failure threshold — the LLM is expected to self-correct. Hard errors (network failures, unrecognized tools) do.\n\n### Memory Recall\n\nThe loop uses a tiered recall strategy:\n\n1. **Context engine** (when available) — plugin-customizable `ingest()` → `recalled_memories`\n2. **Vector search** — embedding-based similarity search with `MemoryFilter` scoping\n3. **Text search** — fallback when embedding fails\n4. **Proactive memory** — `ProactiveMemoryStore::auto_retrieve()` adds deduplicated memory items\n\nFork turns (`opts.is_fork = true`) and stable-prefix-mode agents skip auto-retrieval to maintain cache alignment with the parent turn.\n\n### Session Repair and Trimming\n\n`safe_trim_messages` cuts message history at conversation-turn boundaries so `ToolUse`/`ToolResult` pairs are never split. After trimming, `session_repair::validate_and_repair` re-validates the surviving messages. If fewer than 2 messages survive, a minimal `[user_message]` is synthesized.\n\n`strip_prior_image_data` removes base64 image data from all messages except the last user message, preventing token bloat from already-processed images.\n\n### Web Search Augmentation\n\nWhen enabled (`web_search_augmentation` != `Off`), the loop can augment context with web search results:\n\n- **Auto mode**: augments only when the model doesn't support tools\n- **Always mode**: always augments\n- Uses a lightweight LLM call to generate focused search queries from conversation context\n- Falls back to the raw user message if query generation fails\n\n### A/B Experiments\n\n`select_running_experiment` checks for active prompt experiments via the kernel handle. When one is found, session-based hash determines the variant, and the variant's `prompt_version_id` replaces the default system prompt.\n\n### `LoopOptions`\n\n| Field | Purpose |\n|-------|---------|\n| `is_fork` | Derivative turn — skip session persistence, flag hooks |\n| `allowed_tools` | Runtime tool allowlist (enforced at execute time, not schema level, to preserve cache alignment) |\n| `interrupt` | Per-session interrupt handle for long-running tools |\n| `max_iterations` | Operator-level override for iteration cap |\n\n### `AgentLoopResult`\n\nThe loop returns a structured result containing:\n\n- `response` — final text (empty when `silent`)\n- `total_usage` — cumulative `TokenUsage` across all LLM calls\n- `iterations` — how many loop iterations ran\n- `silent` — agent chose not to reply\n- `provider_not_configured` — no LLM provider available\n- `decision_traces` — per-tool-call traces with rationale, timing, outcomes\n- `memories_saved` / `memories_used` / `memory_conflicts` — memory subsystem feedback\n- `new_messages_start` — index for slicing turn messages from the session\n- `owner_notice` — optional private message to the operator (from `notify_owner` tool)\n- `skill_evolution_suggested` — flags when 5+ tool calls suggest skill review\n\n### Utility Functions\n\n**`strip_provider_prefix(model, provider)`** — normalizes model IDs by removing provider prefixes (`openrouter/` → bare model) and qualifying bare model names for providers that require `org/model` format (OpenRouter, Together, Fireworks, Replicate, HuggingFace). Recognizes common families: `gemini-*`, `claude-*`, `gpt-*`, `llama-*`, `deepseek-*`, `mistral-*`, `qwen-*`, `command-*`.\n\n**`build_group_sender_prefix`** — constructs `[sender]: ` prefixes for group chats, sanitizing labels to prevent spoofing or format injection.\n\n**`is_no_reply`** / **`is_progress_text_leak`** — detect silent-response tokens and progress-text leaks (short ellipsis-terminated preambles the model emits before abandoning a tool call).\n\n### Lazy Tool Loading\n\nWhen an agent's granted tool set exceeds `LAZY_TOOLS_THRESHOLD = 30`, the loop activates lazy mode: only always-native tools plus any tools the LLM has explicitly loaded via `tool_load` are included in the request. This reduces prompt size for agents with access to the full ~75 builtin catalog. The `tool_load` tool must be in the allowlist for lazy mode to engage — otherwise all tools are shipped eagerly.\n\n---\n\n## A2A Protocol (`a2a.rs`)\n\nImplements Google's Agent-to-Agent protocol for cross-framework agent interoperability. The module provides both server-side (exposing LibreFang agents) and client-side (discovering and interacting with external agents) functionality.\n\n### Core Types\n\n#### `AgentCard`\n\nJSON capability manifest served at `/.well-known/agent.json`. Describes an agent's name, description, endpoint URL, capabilities (streaming, push notifications, state transition history), and skills.\n\nBuilt from a LibreFang `AgentManifest` via `build_agent_card()`, which converts tool names into A2A skill descriptors.\n\n#### `A2aTask`\n\nUnit of work exchanged between agents. Contains:\n\n- `id` — unique task identifier\n- `session_id` — optional session for conversation continuity\n- `status` — wrapped in `A2aTaskStatusWrapper` for flexible serialization\n- `messages` — conversation history (list of `A2aMessage` with `A2aPart` content)\n- `artifacts` — outputs produced by the task\n\n#### `A2aTaskStatus`\n\n```rust\nenum A2aTaskStatus {\n    Submitted,      // received but not started\n    Working,        // being processed\n    InputRequired,  // needs more input from caller\n    Completed,      // done successfully\n    Cancelled,      // cancelled by user\n    Failed,         // failed\n}\n```\n\n`A2aTaskStatusWrapper` handles the two serialization forms implementations use: bare string (`\"completed\"`) and object (`{\"state\": \"completed\", \"message\": null}`). The `state()` method extracts the underlying status regardless of encoding.\n\n#### `A2aPart` — Message Content\n\nTagged enum supporting three content types:\n\n- `Text { text }` — plain text\n- `File { name, mime_type, data }` — base64-encoded file\n- `Data { mime_type, data }` — structured JSON\n\n#### `A2aArtifact` — Task Outputs\n\nArtifacts carry optional `name`, `description`, `metadata`, `index`, and `last_chunk` fields (all optional per spec) plus a list of `A2aPart` content blocks.\n\n### `A2aTaskStore` — Task Lifecycle Management\n\nIn-memory bounded store for tracking A2A tasks. Used by the server side to track tasks created by `tasks/send`, polled by `tasks/get`, and cancelled by `tasks/cancel`.\n\n**Eviction policy** (applied lazily on each `insert`):\n\n1. **TTL sweep** — any task older than `task_ttl` (default 24 hours) is removed regardless of state, including `Working`/`InputRequired` tasks that would otherwise accumulate\n2. **Capacity eviction** — if at capacity after TTL sweep, evict the oldest terminal-state task first (`Completed`/`Failed`/`Cancelled`), falling back to the oldest task overall\n\n```rust\nlet store = A2aTaskStore::new(1000);               // 1000-task capacity\nlet store = A2aTaskStore::with_ttl(100, Duration::from_secs(3600)); // custom TTL\n```\n\nKey methods:\n\n| Method | Description |\n|--------|-------------|\n| `insert(task)` | Insert with eviction |\n| `get(task_id)` | Retrieve by ID |\n| `update_status(task_id, status)` | Update status and touch timestamp |\n| `complete(task_id, response, artifacts)` | Add response message + artifacts, set Completed |\n| `fail(task_id, error_message)` | Add error message, set Failed |\n| `cancel(task_id)` | Set Cancelled |\n\n### `A2aClient` — External Agent Interaction\n\nHTTP client for discovering and communicating with external A2A agents.\n\n```rust\nlet client = A2aClient::new();\n\n// Fetch an agent's card\nlet card: AgentCard = client.discover(\"https://other.example.com\").await?;\n\n// Send a task\nlet task: A2aTask = client.send_task(\n    \"https://other.example.com/a2a\",\n    \"Summarize this document\",\n    Some(\"session-123\"),\n).await?;\n\n// Poll task status\nlet updated: A2aTask = client.get_task(\n    \"https://other.example.com/a2a\",\n    &task.id,\n).await?;\n```\n\nAll methods use JSON-RPC 2.0 (`tasks/send`, `tasks/get`). The client uses the shared `proxied_client_builder` from `librefang-http` with a 30-second timeout.\n\n### Boot-Time Discovery\n\n`discover_external_agents(agents)` is called during kernel boot to fetch agent cards from all configured external agents. Failures are logged but non-fatal — the system continues with whatever agents were successfully discovered.\n\n---\n\n## Cross-Module Integration Points\n\n- **`librefang-types`** — message types, tool definitions, agent manifest, memory types\n- **`librefang-memory`** — `MemorySubstrate`, `Session`, `ProactiveMemoryStore`\n- **`librefang-llm-driver`** — `LlmDriver` trait, `CompletionRequest`, `StreamEvent`\n- **`librefang-http`** — `proxied_client_builder` for HTTP clients with proxy support\n- **`librefang-skills`** — `SkillRegistry` for skill-based tool resolution\n- **Kernel handle** (`KernelHandle`) — runtime policy interface (tool timeouts, experiment lookup, prompt version tracking)","agent-runtime-librefang-runtime-wasm-src":"# Agent Runtime — librefang-runtime-wasm-src\n\n# Agent Runtime — `librefang-runtime-wasm`\n\nWASM sandbox for executing untrusted agent skills and plugins with deny-by-default capability-based access control.\n\n## Overview\n\nThis crate provides a Wasmtime-based sandbox that runs agent skills compiled to WASM. Every operation a guest module attempts — filesystem access, network requests, shell execution, inter-agent messaging — is gated behind an explicit capability check. Nothing is allowed unless the caller grants it.\n\nThe sandbox defends against both accidental misuse and deliberate exploitation through layered security controls:\n\n- **Capability gating** — every host function checks `check_capability` before acting\n- **Path traversal protection** — `..` components are rejected outright; symlinks are canonicalized\n- **SSRF protection** — DNS is resolved once, validated against private IP ranges (including IPv4-mapped IPv6), then pinned to prevent rebinding attacks\n- **Shell environment sanitization** — child processes inherit only a hardcoded allowlist of safe env vars, never API keys or vault tokens\n- **Fuel metering** — deterministic CPU instruction budget per invocation\n- **Epoch-based wall-clock timeouts** — with an RAII-guarded watchdog thread that won't leak or cause cross-store false interrupts\n\n## Architecture\n\n```mermaid\ngraph TD\n    Kernel[\"Kernel / Runtime\"] -->|\"wasm_bytes + config + input\"| Sandbox[\"WasmSandbox\"]\n    Sandbox -->|\"spawn_blocking\"| ExecSync[\"execute_sync\"]\n    ExecSync -->|\"compile + instantiate\"| Wasmtime[\"Wasmtime Engine\"]\n    Wasmtime -->|\"import 'librefang'\"| HostCall[\"host_call\"]\n    Wasmtime -->|\"import 'librefang'\"| HostLog[\"host_log\"]\n    HostCall --> Dispatch[\"dispatch\"]\n    Dispatch --> CapCheck[\"check_capability\"]\n    CapCheck -->|granted| Handlers[\"fs_read / net_fetch / shell_exec / kv_* / ...\"]\n    CapCheck -->|denied| ErrorJSON[\"{\\\"error\\\": \\\"Capability denied: ...\\\"}\"]\n    Handlers --> KernelHandle[\"KernelHandle (optional)\"]\n```\n\n## Guest ABI\n\nWASM modules must export three symbols:\n\n| Export | Signature | Purpose |\n|--------|-----------|---------|\n| `memory` | `(memory 1+)` | Linear memory for data exchange |\n| `alloc` | `(func (param i32) (result i32))` | Bump allocator — guest receives a byte count, returns a pointer |\n| `execute` | `(func (param i32 i32) (result i64))` | Main entry point — receives `(input_ptr, input_len)`, returns packed `(result_ptr << 32 \\| result_len)` |\n\nThe `execute` function receives its input as JSON bytes written by the host into guest memory. It returns its output the same way: a packed `i64` where the high 32 bits are a pointer into guest m
