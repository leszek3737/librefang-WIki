var PAGES = {"agent-hands":"# Agent Hands\n\n# Agent Hands\n\nHands are pre-built, domain-complete autonomous agent configurations that users activate from a marketplace. Unlike regular agents you chat with interactively, Hands run in the background — you check in on them, not the other way around.\n\nEach Hand is defined by a `HAND.toml` file (with optional `SKILL.md` for agent instructions) and managed at runtime by the `HandRegistry`.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Disk\"\n        RT[\"registry/hands/{id}/HAND.toml\"]:::disk\n        WT[\"workspaces/{id}/HAND.toml\"]:::disk\n        ST[\"hand_state.json\"]:::disk\n        AT[\"registry/agents/{name}/agent.toml\"]:::disk\n    end\n\n    subgraph \"HandRegistry (in-memory)\"\n        DEF[\"definitions<br/>DashMap&lt;id, HandDefinition&gt;\"]:::mem\n        INST[\"instances<br/>DashMap&lt;uuid, HandInstance&gt;\"]:::mem\n        AIDX[\"agent_index<br/>agent_id → instance_id\"]:::mem\n        BIDX[\"active_index<br/>hand_id → instance_id\"]:::mem\n    end\n\n    RT -->|scan + parse| DEF\n    WT -->|scan + parse| DEF\n    AT -->|base template resolve| DEF\n    DEF -->|activate| INST\n    INST --> AIDX\n    INST --> BIDX\n    INST -->|persist_state| ST\n    ST -->|load_state| INST\n\n    classDef disk fill:#f0f0f0,stroke:#666\n    classDef mem fill:#e8f4fd,stroke:#3a86a8\n```\n\n## HAND.toml Format\n\nA `HAND.toml` describes everything about a hand: its identity, agents, requirements, settings, dashboard metrics, and routing hints.\n\n### Single-Agent vs Multi-Agent\n\nHands support two agent declaration formats:\n\n**Single-agent** — use `[agent]` at the top level. Internally stored as role `\"main\"` with `coordinator = true`:\n\n```toml\n[agent]\nname = \"clip-agent\"\ndescription = \"Video clip creator\"\nsystem_prompt = \"You create video clips.\"\n```\n\n**Multi-agent** — use `[agents.<role>]` sections. One agent should be marked `coordinator` (the one receiving user messages). If none is marked, the first by role name is used:\n\n```toml\n[agents.planner]\ncoordinator = true\ninvoke_hint = \"Use planner for task decomposition\"\nname = \"planner-agent\"\nsystem_prompt = \"You plan tasks.\"\n\n[agents.analyst]\nname = \"analyst-agent\"\nsystem_prompt = \"You analyze data.\"\n```\n\n### Model Configuration — Nested vs Legacy Flat\n\nAgents can declare their model config in two ways:\n\n**Nested** (preferred for new hands):\n```toml\n[agents.planner.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nmax_tokens = 8192\ntemperature = 0.5\nsystem_prompt = \"You plan research.\"\n```\n\n**Legacy flat** (fields at the agent level):\n```toml\n[agents.planner]\nname = \"planner-agent\"\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\nsystem_prompt = \"You plan.\"\n```\n\nFlat fields are auto-converted to nested format during parsing. The provider/model defaults are the string `\"default\"`, which the kernel resolves to the user's global default at agent spawn time.\n\n### Base Template Reuse\n\nMulti-agent entries can reference a shared agent template via `base`, avoiding duplication:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"generic-chat\"          # loaded from registry/agents/generic-chat/agent.toml\nname = \"blog-writer\"           # overrides base name\n\n[agents.writer.model]\nsystem_prompt = \"You write blog posts.\"  # overrides base prompt\n# provider, model, max_tokens etc. inherited from base\n```\n\nBase templates are resolved by `parse_multi_agent_entry`, which loads the template TOML, normalizes flat fields to nested, and deep-merges the hand's overrides on top. Template names are validated against path traversal (`..`, `/`, `\\`).\n\n### Full Reference\n\n```toml\nid = \"clip\"\nversion = \"1.2.0\"\nname = \"Clip Hand\"\ndescription = \"Autonomous video clip creation\"\ncategory = \"content\"\nicon = \"🎬\"\ntools = [\"shell_exec\"]\nskills = [\"video_editing\"]\nmcp_servers = []\nallowed_plugins = []\n\n[routing]\naliases = [\"video editor\", \"clip maker\"]\nweak_aliases = [\"cut video\", \"trim\"]\n\n[metadata]\nfrequency = \"on-demand\"\ntoken_consumption = \"medium\"\ndefault_active = false\nactivation_warning = \"Uses FFmpeg for video processing\"\n\n[[requires]]\nkey = \"ffmpeg\"\nlabel = \"FFmpeg\"\nrequirement_type = \"binary\"\ncheck_value = \"ffmpeg\"\ndescription = \"Core video processing engine\"\noptional = false\n\n[requires.install]\nmacos = \"brew install ffmpeg\"\nlinux_apt = \"sudo apt install ffmpeg\"\nmanual_url = \"https://ffmpeg.org/download.html\"\nestimated_time = \"2-5 min\"\n\n[[settings]]\nkey = \"stt_provider\"\nlabel = \"STT Provider\"\ndescription = \"Speech-to-text engine\"\nsetting_type = \"select\"\ndefault = \"auto\"\n\n[[settings.options]]\nvalue = \"auto\"\nlabel = \"Auto-detect\"\n\n[[settings.options]]\nvalue = \"groq\"\nlabel = \"Groq Whisper\"\nprovider_env = \"GROQ_API_KEY\"\nbinary = \"whisper\"\n\n[[dashboard.metrics]]\nlabel = \"Clips created\"\nmemory_key = \"clips_count\"\nformat = \"number\"\n\n[i18n.zh]\nname = \"剪辑 Hand\"\ndescription = \"自主视频剪辑\"\n```\n\n## Core Types\n\n### `HandDefinition`\n\nThe parsed representation of a `HAND.toml`. Key fields:\n\n| Field | Purpose |\n|-------|---------|\n| `id` | Unique identifier (e.g. `\"clip\"`) |\n| `agents` | `BTreeMap<String, HandAgentManifest>` — role name to agent manifest. Single-agent hands use key `\"main\"`. |\n| `requires` | `Vec<HandRequirement>` — checked before/during activation |\n| `settings` | `Vec<HandSetting>` — user-facing configuration |\n| `routing` | `HandRouting` — alias keywords for intent matching |\n| `skill_content` | Bundled `SKILL.md` content (populated at load, not in TOML) |\n| `agent_skill_content` | Per-role `SKILL-{role}.md` overrides |\n| `i18n` | `HashMap<String, HandI18n>` — localized strings by language code |\n\nKey methods:\n- **`coordinator()`** → `Option<(&str, &HandAgentManifest)>` — finds the coordinator agent (explicit flag, or first by sort order)\n- **`agent()`** → `Option<&AgentManifest>` — backward-compatible single-agent accessor\n- **`is_multi_agent()`** → `bool` — true when more than one agent is defined\n\n### `HandInstance`\n\nA running instantiation of a `HandDefinition`. Created by `activate()`, tracked in the registry until `deactivate()`.\n\n| Field | Purpose |\n|-------|---------|\n| `instance_id` | `Uuid` — unique per activation |\n| `hand_id` | Which definition this is an instance of |\n| `status` | `Active`, `Paused`, `Error(String)`, or `Inactive` |\n| `agent_ids` | `BTreeMap<String, AgentId>` — role → spawned agent (populated by kernel) |\n| `coordinator_role` | Explicitly persisted coordinator role name |\n| `config` | User's configuration overrides |\n\nCoordinator resolution follows a precedence chain:\n1. Explicit `coordinator_role` if it matches an existing agent\n2. Single-agent case: the only entry\n3. Fallback to role named `\"main\"`\n4. First agent by BTreeMap sort order\n\n### `HandRequirement`\n\nDeclares a prerequisite for activation. `requirement_type` determines the check:\n\n| Type | Check performed |\n|------|----------------|\n| `Binary` | Binary exists on PATH (special cases for `python3` and `chromium`) |\n| `EnvVar` / `ApiKey` | Environment variable is set and non-empty |\n| `AnyEnvVar` | Any of the comma-separated env vars in `check_value` is set |\n\nOptional requirements (`optional = true`) don't block activation. When an active hand has unmet optional requirements, it's reported as **degraded** rather than \"requirements not met\".\n\n### `HandSetting` and `resolve_settings`\n\nSettings declared in `[[settings]]` are shown in the activation modal. Three types:\n\n- **`Select`** — dropdown with `[[settings.options]]`. Options can declare `provider_env` / `binary` for availability badges.\n- **`Toggle`** — boolean switch (`\"true\"`/`\"false\"`).\n- **`Text`** — freeform input. Can declare `env_var` to expose the value.\n\n`resolve_settings(settings, config)` produces:\n- `prompt_block` — a markdown summary of the user's choices to inject into the system prompt\n- `env_vars` — environment variable names the agent's subprocess needs access to (based on selected options)\n\n### `HandError`\n\n```rust\npub enum HandError {\n    NotFound(String),           // hand_id not in registry\n    AlreadyActive(String),      // hand already has a live instance\n    AlreadyRegistered(String),  // hand_id already in definitions\n    BuiltinHand(String),        // can't uninstall registry hands\n    InstanceNotFound(Uuid),     // instance uuid not found\n    ActivationFailed(String),   // generic activation error\n    TomlParse(String),          // HAND.toml parse failure\n    Io(std::io::Error),         // filesystem error\n    Config(String),             // configuration error\n}\n```\n\n## HandRegistry\n\nThread-safe (`Send + Sync`) registry managing hand definitions and active instances. All concurrent access uses lock-free `DashMap` for reads; a `Mutex` serializes the check-then-insert in `activate` to prevent duplicate activations.\n\n### Definition Installation\n\nThree installation paths, all going through `register_definition()` which rejects duplicate IDs:\n\n| Method | Use case | Base templates | Persisted to disk |\n|--------|----------|----------------|-------------------|\n| `install_from_path` | Local directory install | ✅ resolved | No |\n| `install_from_content` | API-based install from raw TOML | ❌ rejected | No |\n| `install_from_content_persisted` | Dashboard \"install from content\" | ✅ resolved | Yes → `workspaces/{id}/` |\n\n`install_from_content` explicitly rejects hands with `base` references because it has no access to the agents registry directory. Use `install_from_content_persisted` or `install_from_path` when templates are needed.\n\n### Uninstallation\n\n`uninstall_hand(home_dir, hand_id)` enforces three invariants:\n\n1. **NotFound** — hand_id must exist in the registry\n2. **BuiltinHand** — only hands with a `workspaces/{id}/HAND.toml` file can be removed. Registry-sourced hands live under `registry/hands/` and would be recreated on the next sync.\n3. **AlreadyActive** — deactivate before uninstalling. Prevents dangling kernel references.\n\nOn success, removes the in-memory definition and deletes the `workspaces/{id}/` directory.\n\n### Hand Discovery\n\n`scan_hands_dir(home_dir)` searches two locations:\n\n1. `home_dir/registry/hands/` — built-in hands from the shared registry tarball (reset on every sync)\n2. `home_dir/workspaces/` — user-installed hands (survive restarts)\n\nSubdirectories of `workspaces/` that aren't hands (e.g. agent workspace directories) are filtered out by the `HAND.toml` existence check. Registry entries take precedence on ID collisions.\n\nEach hand directory can contain:\n- `HAND.toml` (required)\n- `SKILL.md` — shared skill content for all agents\n- `SKILL-{role}.md` — per-agent skill override (e.g. `SKILL-planner.md`)\n\n### Activation Lifecycle\n\n```\n1. Kernel receives activate request\n2. registry.activate(hand_id, config)\n   - Checks definition exists\n   - Checks not already active (via active_index, O(1))\n   - Creates HandInstance with fresh UUID\n   - Inserts into instances, active_index\n3. Kernel spawns agents (single or multi)\n4. registry.set_agents(instance_id, agent_ids, coordinator_role)\n   - Stores role → AgentId mapping\n   - Updates agent_index for O(1) reverse lookup\n5. registry.persist_state(path)\n   - Writes Active/Paused/Error instances to hand_state.json\n```\n\nThe `activate_lock` Mutex ensures two concurrent requests cannot both pass the \"already active\" check before either inserts.\n\n### State Persistence\n\n`persist_state()` writes all non-Inactive instances to `hand_state.json` (version 4 format). `load_state()` restores them, supporting backward compatibility with v1–v3 formats:\n\n| Version | Format |\n|---------|--------|\n| v1 | Bare JSON array of instance objects |\n| v2 | Single `agent_id` field (converted to `{\"main\": id}`) |\n| v3 | `PersistedState` with versioned schema |\n| v4 | Current — includes `coordinator_role`, `activated_at`, `updated_at` |\n\nErrored and inactive instances are skipped during load. Restored instances preserve their original UUID via `activate_with_id()` so deterministic agent IDs remain stable across restarts.\n\n### Readiness\n\n`readiness(hand_id)` computes a snapshot combining requirement checks with runtime state:\n\n```rust\npub struct HandReadiness {\n    pub requirements_met: bool,  // all mandatory reqs satisfied\n    pub active: bool,            // has a running instance\n    pub degraded: bool,          // active but some reqs unmet\n}\n```\n\nOnly non-optional requirements gate `requirements_met`. Degraded is true when any requirement (optional or not) is unmet while the hand is active — some features may not work.\n\n### Requirement Checking Details\n\n`check_requirement` performs platform-aware checks:\n\n- **Binary**: walks `PATH` segments, checks file existence and execute bit (Unix). Special cases:\n  - `python3`: actually runs `python3 --version` / `python --version` and checks for \"Python 3\" in output, with `OnceLock` caching. Falls back to absolute paths (`/usr/bin/python3`, `/usr/local/bin/python3`).\n  - `chromium`: tries `chromium-browser`, `google-chrome`, `google-chrome-stable`, `chrome`, and `CHROME_PATH` env var.\n- **EnvVar / ApiKey**: checks var is set and non-empty. Supports aliases (e.g., `GEMINI_API_KEY` also accepts `GOOGLE_API_KEY`).\n- **AnyEnvVar**: comma-separated list in `check_value`; any one being set is sufficient.\n\n### Settings Availability\n\n`check_settings_availability(hand_id, lang)` returns per-option availability status. For each `Select` option:\n- No `provider_env` and no `binary` → always available\n- `provider_env` set → checks env var (with alias support)\n- `binary` set → checks binary on PATH\n\nSupports i18n: when `lang` is provided, label/description are pulled from `[i18n.{lang}.settings.{key}]` if present, falling back to English.\n\n## Relationship to the Kernel\n\nThe kernel (`src/kernel/mod.rs`) is the primary consumer:\n\n| Kernel action | Registry method |\n|---------------|-----------------|\n| Boot | `reload_from_disk(home_dir)` |\n| Activate hand | `activate()` → spawn agents → `set_agents()` |\n| Deactivate hand | `deactivate()` → kill agents |\n| Pause/resume | `pause()` / `resume()` |\n| Find hand by agent | `find_by_agent(agent_id)` |\n| Check dependencies | `readiness(hand_id)` → `check_requirements(hand_id)` |\n| Persist state | `persist_state(path)` |\n| Restore on restart | `load_state(path)` → `activate_with_id()` |\n| Get active agent | `instance.agent_id()` via `list_instances()` |\n\nThe HTTP routes (`src/routes/skills.rs`) use `readiness()` and `check_requirements()` to populate the hands list and dependency check endpoints. The router module (`librefang-kernel-router`) calls `parse_hand_toml()` directly to extract routing keywords from hand definitions for intent matching.","api-server-api-docs":"# API Server — api-docs\n\n# API Server — `api-docs` Module\n\n## Overview\n\nThe `api-docs` module provides interactive API documentation for the service. It is a **static, standalone module** consisting of two files that together deliver a Swagger UI interface driven by an OpenAPI specification.\n\n| File | Purpose |\n|---|---|\n| `index.html` | Host page that loads and renders the Swagger UI widget |\n| `openapi.json` | Machine-readable OpenAPI specification describing all API endpoints, request/response schemas, and authentication requirements |\n\nThis module has **no runtime dependencies** on other modules in the codebase and exposes no callable functions or classes. It is a documentation artifact consumed directly by browsers.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    subgraph api-docs\n        SPEC[openapi.json]\n        HTML[index.html]\n    end\n    HTML -->|reads| SPEC\n    DEV[Developer Browser] -->|requests| HTML\n    DEV -->|requests| SPEC\n    HTML -->|loads| UI[Swagger UI CDN]\n```\n\n## How It Works\n\n1. **`index.html`** is served as a static page (typically at a path like `/docs` or `/api-docs`). It embeds or loads Swagger UI from a CDN or bundled asset and configures it to fetch `openapi.json` from the same directory.\n\n2. **`openapi.json`** conforms to the [OpenAPI Specification](https://swagger.io/specification/). It defines:\n   - All available API paths and HTTP methods\n   - Request parameters, request body schemas, and response schemas\n   - Authentication/authorization requirements\n   - Data models referenced across endpoints\n\n3. Swagger UI renders the spec as an interactive page where developers can explore endpoints, review expected payloads, and in some configurations, send test requests directly from the browser.\n\n## Integration with the Codebase\n\n- **No code coupling.** This module does not import or export anything. No other module calls into it at runtime.\n- **Served as static assets.** The API server's static-file middleware or reverse proxy configuration is responsible for mounting this directory at the desired URL path.\n- **`openapi.json` is the single source of truth** for the API contract. It should be updated whenever endpoints are added, removed, or their schemas change. Keeping it in sync with the actual route handlers is a manual (or tool-assisted) responsibility.\n\n## Maintenance Guidelines\n\n- **When adding or modifying API endpoints**, update `openapi.json` to reflect the new paths, parameters, request bodies, and response schemas.\n- **Schema consistency** — ensure model definitions in `openapi.json` match the validation schemas and response shapes used by the route handlers in the main API module.\n- **Versioning** — if the API is versioned, update the `info.version` field in `openapi.json` accordingly.\n- **Serving** — confirm the server or proxy is configured to serve this directory with the correct `Content-Type` (`application/json` for the spec, `text/html` for the page).\n- **Security** — in production, consider whether the docs endpoint should be publicly accessible or restricted to authenticated/internal users.","api-server-librefang-api":"# API Server — librefang-api\n\n# LibreFang API Server (`librefang-api`)\n\n## Overview\n\nThe `librefang-api` crate is the HTTP/WebSocket API server for the LibreFang Agent OS daemon. It runs the kernel in-process and exposes agent management, status monitoring, chat, and configuration through JSON REST endpoints and WebSocket connections. The CLI, dashboard SPA, and external integrations all communicate through this layer.\n\nThe crate is built on [Axum](https://github.com/tokio-rs/axum) and provides production-grade middleware for authentication, rate limiting, structured logging, internationalized error messages, and security headers.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Client[\"CLI / Dashboard / External\"] --> Middleware\n    subgraph Middleware [\"Middleware Pipeline\"]\n        AL[\"accept_language\"] --> RL[\"request_logging\"]\n        RL --> AVH[\"api_version_headers\"]\n        AVH --> AUTH[\"auth\"]\n        AUTH --> SH[\"security_headers\"]\n        SH --> OIDC[\"oidc_auth_middleware\"]\n    end\n    Middleware --> Routes[\"Route Handlers\"]\n    Routes --> Kernel[\"librefang-kernel\"]\n    AUTH --> AuthState\n    OIDC --> OAuth[\"oauth module\"]\n    OAuth --> IdP[\"External IdP\"]\n```\n\n## Module Organization\n\n| Module | Purpose |\n|---|---|\n| `server` | Server bootstrap, router construction, graceful shutdown |\n| `routes` | HTTP route handlers (agents, config, budget, sessions, etc.) |\n| `middleware` | Auth, logging, version headers, security headers, i18n |\n| `oauth` | OAuth2/OIDC login, callback, token refresh, introspection |\n| `ws` | WebSocket handler for real-time agent chat |\n| `openai_compat` | OpenAI-compatible chat completion endpoint |\n| `webchat` | Embedded chat UI page rendering |\n| `webhook_store` | Webhook subscription CRUD and persistence |\n| `channel_bridge` | External channel (WeChat, WhatsApp, etc.) message bridging |\n| `stream_chunker` | Splits streaming LLM output into SSE-compatible chunks |\n| `stream_dedup` | Deduplication for concurrent stream consumers |\n| `terminal` | PTY/process management for terminal features |\n| `rate_limiter` | In-memory per-IP rate limiting |\n| `password_hash` | Argon2 password hashing and session token management |\n| `validation` | Request body validation helpers |\n| `versioning` | API version negotiation from path and `Accept` headers |\n| `openapi` | OpenAPI 3.0 spec generation (via `utoipa`) |\n| `types` | Shared API types (request/response structs) |\n| `telemetry` | Optional (`telemetry` feature) Prometheus metrics and tracing export |\n\n## Authentication & Authorization\n\nThe API supports four authentication mechanisms that are evaluated in a single pass by the `auth` middleware:\n\n### 1. Static API Keys\n\nConfigured via `api_key` in `config.toml`. Multiple keys are supported by separating them with `\\n`. Accepted as either `Authorization: Bearer <key>` or `X-API-Key: <key>` header, or as a `?token=<key>` query parameter (for SSE/WebSocket clients that cannot set headers).\n\nWhen the key is empty or whitespace-only, authentication is disabled entirely (local development mode).\n\n### 2. Per-User API Keys\n\nRole-based API access via `user_api_keys` configuration. Each key is an Argon2 hash that maps to a named user with a specific `UserRole`:\n\n| Role | GET | POST (limited) | POST (all) | Owner-only writes |\n|---|---|---|---|---|\n| `Viewer` | ✅ | ❌ | ❌ | ❌ |\n| `User` | ✅ | ✅ (message, clone, approvals) | ❌ | ❌ |\n| `Admin` | ✅ | ✅ | ✅ | ❌ |\n| `Owner` | ✅ | ✅ | ✅ | ✅ |\n\n**Owner-only write endpoints** (`/api/config`, `/api/config/set`, `/api/config/reload`, `/api/auth/change-password`, `/api/shutdown`) are locked to `Owner` role regardless of method. This list is exact-match only — new endpoints are not silently locked down.\n\nThe `AuthenticatedApiUser` struct is inserted into request extensions when a per-user key matches, so downstream handlers can inspect `name` and `role`.\n\n### 3. Dashboard Session Tokens\n\nThe dashboard login flow generates random session tokens stored in `AuthState::active_sessions`. These tokens are checked after static keys, with expired sessions pruned on each validation.\n\n### 4. OAuth2/OIDC Tokens\n\nWhen external auth is enabled, Bearer tokens are validated against configured provider JWKS endpoints. See [OAuth2/OIDC Integration](#oauth2oidc-integration) below.\n\n### Path Normalization\n\nBefore any ACL check, paths are normalized:\n- Version prefix stripped: `/api/v1/agents` → `/api/agents`\n- Trailing slashes removed: `/api/agents/` → `/api/agents`\n- Root path preserved: `/` stays `/` (not empty string)\n\n### Public Endpoints\n\n**Always public** (regardless of configuration):\n- `/`, `/logo.png`, `/favicon.ico`\n- `/api/health`, `/api/version`, `/api/versions`\n- `/api/auth/callback`, `/api/auth/dashboard-login`, `/api/auth/dashboard-check`\n- `/api/providers/github-copilot/oauth/*`\n- `/api/mcp/servers/{name}/auth/callback` (GET only)\n- Static assets under `/dashboard/`, `/a2a/`, `/api/uploads/`\n- `/api/auth/login`, `/api/auth/providers`, `/.well-known/agent.json`, `/api/config/schema`\n\n**Dashboard reads** (public unless `require_auth_for_reads` is set):\n- `/api/agents`, `/api/profiles`, `/api/config`, `/api/status`, `/api/models`, `/api/budget`, `/api/approvals`, `/api/skills`, `/api/sessions`, `/api/workflows`, `/api/hands`, etc.\n- `/api/logs/stream` (SSE, read-only)\n\n**Always requires auth**:\n- `/api/health/detail` — returns operational data (panic counts, model IDs, config warnings)\n- All POST/PUT/DELETE/PATCH to non-public endpoints\n\n### `require_auth_for_reads`\n\nWhen enabled in configuration and any authentication method is configured, the dashboard read endpoints require a valid token. This prevents remote enumeration of agents, config, and budget on publicly reachable deployments. `/api/health` remains public for load balancer probes.\n\nThe flag only engages when authentication is actually configured (API key, user API keys, or dashboard username/password). Setting the flag without configuring any auth is a no-op.\n\n## Middleware Pipeline\n\nRequests pass through the middleware stack in order:\n\n```\naccept_language → request_logging → api_version_headers → auth → security_headers → oidc_auth_middleware → handler\n```\n\n### `accept_language`\n\nParses the `Accept-Language` header via `librefang_types::i18n::parse_accept_language` and stores the resolved language code in `RequestLanguage` request extension. Sets `Content-Language` on the response.\n\n### `request_logging`\n\nGenerates a UUID request ID, logs method/path/status/latency, records HTTP metrics via `librefang_telemetry::metrics::record_http_request`, and injects `x-request-id` into the response.\n\nSuccessful GET requests log at `DEBUG` level to reduce noise; all other requests log at `INFO`.\n\n### `api_version_headers`\n\nAdds `X-API-Version` to every response. Version is resolved from:\n1. Explicit path prefix (`/api/v1/...`)\n2. `Accept: application/vnd.librefang.<version>+json` header\n3. Default (latest version)\n\nUnknown vendor versions on unversioned paths return `406 Not Acceptable`.\n\n### `auth`\n\nFull authentication and authorization middleware. See [Authentication & Authorization](#authentication--authorization) above.\n\nSecurity properties:\n- **Constant-time comparison** for all token checks (via `subtle::ConstantTimeEq`) to prevent timing attacks\n- **Loopback-only enforcement** for `/api/shutdown` — checks `ConnectInfo<SocketAddr>` and requires `ip().is_loopback()`\n- **Expired session cleanup** — prunes expired sessions from `active_sessions` on each token check\n\n### `security_headers`\n\nApplied to **all** responses unconditionally:\n\n| Header | Value |\n|---|---|\n| `X-Content-Type-Options` | `nosniff` |\n| `X-Frame-Options` | `DENY` |\n| `X-XSS-Protection` | `1; mode=block` |\n| `Content-Security-Policy` | Restrictive CSP (self + inline for bundled JS/CSS, Google Fonts) |\n| `Referrer-Policy` | `strict-origin-when-cross-origin` |\n| `Cache-Control` | `no-store, no-cache, must-revalidate` |\n| `Strict-Transport-Security` | `max-age=63072000; includeSubDomains` |\n\n### `oidc_auth_middleware`\n\nExtracts Bearer JWT tokens and validates them against configured provider JWKS endpoints. When validation succeeds, `IdTokenClaims` is injected into request extensions. This middleware does **not** block requests — access control is handled by `auth`.\n\n## OAuth2/OIDC Integration\n\nThe `oauth` module provides full OAuth2/OIDC login flows supporting multiple providers (Google, GitHub, Azure AD, Keycloak, or any OIDC-compliant provider).\n\n### Provider Resolution\n\nProviders are resolved from `ExternalAuthConfig`:\n\n1. **Multi-provider mode**: Iterate `config.providers`, resolving each via OIDC discovery or explicit URLs.\n2. **Legacy fallback**: If no providers are defined but `issuer_url` + `client_id` are set, use those.\n\nResolution results are `ResolvedProvider` structs containing all endpoints, client ID, scopes, and domain restrictions.\n\n### Caching\n\n| Cache | TTL | Scope |\n|---|---|---|\n| OIDC discovery | 1 hour | Per issuer URL |\n| JWKS keys | 1 hour | Per JWKS URI |\n| Token store | 24 hours | Per user `sub` |\n\nAll caches use `tokio::sync::RwLock<HashMap<...>>` with lazy static initialization.\n\n### CSRF Protection\n\nState tokens are HMAC-SHA256-signed payloads containing provider ID, nonce, and timestamp:\n\n```\nbase64url(json_payload).base64url(hmac_signature)\n```\n\n- Signing key: `LIBREFANG_STATE_SECRET` env var, or a random per-process key\n- TTL: 10 minutes\n- Verified on callback before code exchange\n\n### Login Flow\n\n```\nGET /api/auth/login/{provider}\n  → build_state_token(provider_id)\n  → 302 redirect to provider authorization URL\n\nGET/POST /api/auth/callback?code=...&state=...\n  → verify_state_token(state)\n  → exchange_code(token_endpoint, code, ...)\n  → validate_jwt_cached(id_token, jwks_uri, audience)\n  → verify nonce matches state token\n  → check allowed_domains\n  → store tokens in TokenStore\n  → return {token, refresh_token, user}\n```\n\n### Token Refresh\n\n`POST /api/auth/refresh` accepts a refresh token (from request body or token store lookup) and exchanges it for new access/refresh tokens. When multiple providers are configured, the `provider` field must be specified.\n\n### Token Introspection\n\n`POST /api/auth/introspect` follows RFC 7662 conventions, returning `{\"active\": true/false, ...}` with full claims for valid tokens.\n\n### JWT Validation\n\nTokens are validated using `jsonwebtoken` with:\n- RSA keys (RS256/RS384/RS512) from JWKS `n`/`e` components\n- EC keys (ES256/ES384) from JWKS `x`/`y` components\n- Audience validation against configured `audience` (or `client_id` as fallback)\n- Expiration enforcement\n\n### Key Types\n\n- **`IdTokenClaims`**: Standard OIDC claims (`sub`, `email`, `name`, `picture`, `roles`, `iss`, `aud`, `nonce`, `exp`, `iat`)\n- **`OidcAudience`**: Supports both single-string and array `aud` values with `contains()` helper\n- **`ResolvedProvider`**: Fully resolved provider with endpoints, client config, and domain restrictions\n- **`TokenStore`**: In-memory store keyed by user `sub`, holding access/refresh tokens with 24h TTL eviction\n\n### Domain Restriction\n\nWhen `allowed_domains` is configured on a provider:\n- Users without an `email` claim are **rejected** (both in callback and middleware)\n- Email domain must match an entry in the allowlist\n- Applied during both login callback and OIDC middleware validation\n\n## Connecting to the Kernel\n\nThe API server runs the kernel in the same process. Route handlers receive an `Arc<AppState>` via Axum's `State` extractor, which provides access to `state.kernel` — the kernel instance. From there, handlers call kernel methods like:\n\n- `agent_registry()` — agent CRUD and messaging\n- `config_ref()` / `config_snapshot()` — configuration reads\n- `model_catalog_ref()` — model resolution\n- `metering_ref()` — usage tracking\n- `budget_config()` — budget queries\n- `running_tasks_ref()` — task management\n\nWebSocket handlers (`ws` module) maintain persistent connections for real-time agent chat, calling `inject_attachments_into_session`, `resolve_attachments`, and kernel messaging methods.\n\n## Feature Flags\n\n| Flag | Effect |\n|---|---|\n| `telemetry` | Enables the `telemetry` module (Prometheus metrics, tracing export, observability stack) |\n\n## Error Responses\n\nAll error responses are JSON (`application/json`) with i18n-aware messages. The error structure is:\n\n```json\n{\"error\": \"message\"}\n```\n\nError message language is determined by the `accept_language` middleware and resolved via `librefang_types::i18n::ErrorTranslator`. Two primary auth error keys:\n- `api-error-auth-missing-header` — no credentials provided\n- `api-error-auth-invalid-key` — credentials provided but incorrect\n\nThe `WWW-Authenticate: Bearer` header is set on 401 responses.","api-server-openapi-json":"# API Server — openapi.json\n\n# LibreFang API — OpenAPI Specification\n\n## Overview\n\nThis is the **OpenAPI 3.1.0 specification** for LibreFang Agent Operating System's REST API. It defines every HTTP endpoint the server exposes for managing AI agents, tools, workflows, external integrations, and more. The spec lives at `openapi.json` in the API server module root and serves as the single source of truth for route definitions, request/response shapes, and operation IDs.\n\n- **Version:** `2026.4.13-beta19`\n- **License:** Apache-2.0\n- **Spec version:** OpenAPI 3.1.0\n\n### How this file is used\n\nThe spec is consumed by:\n- **Route handlers** — operation IDs (e.g. `spawn_agent`, `list_agents`) map to handler function names in the server code.\n- **Auto-generated client SDKs** — external consumers generate typed clients from this file.\n- **Dashboard frontend** — the web UI discovers available endpoints and their parameters from this spec.\n- **Validation middleware** — request bodies tagged with `$ref` schemas are validated at runtime against the definitions in `components/schemas`.\n\n## API Surface by Domain\n\nThe spec organizes endpoints into the following tag groups:\n\n```mermaid\ngraph LR\n    subgraph Core\n        A[agents]\n        B[sessions]\n        C[memory]\n    end\n    subgraph Infrastructure\n        D[system]\n        E[auth]\n        F[budget]\n        G[models]\n    end\n    subgraph Connectivity\n        H[channels]\n        I[network]\n        J[a2a]\n    end\n    subgraph Extensibility\n        K[skills]\n        L[extensions]\n        M[integrations]\n        N[mcp]\n        O[hands]\n    end\n    subgraph Automation\n        P[workflows]\n        Q[webhooks]\n        R[approvals]\n    end\n```\n\n---\n\n### Agents (`agents`)\n\nAll CRUD, lifecycle, and per-agent configuration endpoints share the `/api/agents` prefix.\n\n| Method | Path | Operation ID | Purpose |\n|--------|------|-------------|---------|\n| `GET` | `/api/agents` | `list_agents` | List agents with filtering, pagination, sorting (`q`, `status`, `limit`, `offset`, `sort`, `order`) |\n| `POST` | `/api/agents` | `spawn_agent` | Spawn a new agent from a `SpawnRequest` manifest |\n| `GET` | `/api/agents/{id}` | `get_agent` | Get single agent details |\n| `DELETE` | `/api/agents/{id}` | `kill_agent` | Kill an agent |\n| `PATCH` | `/api/agents/{id}` | `patch_agent` | Partial update (name, description, model, system prompt) |\n| `PUT` | `/api/agents/{id}/update` | `update_agent` | Replace manifest (TOML-based `AgentUpdateRequest`) |\n| `POST` | `/api/agents/{id}/clone` | `clone_agent` | Clone agent + workspace files (`CloneAgentRequest`) |\n| `PATCH` | `/api/agents/{id}/config` | `patch_agent_config` | Hot-update config fields (`PatchAgentConfigRequest`) |\n| `PATCH` | `/api/agents/{id}/identity` | `update_agent_identity` | Update visual identity (`UpdateIdentityRequest`) |\n\n**Bulk operations** under `/api/agents/bulk`:\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `POST` | `/api/agents/bulk` | `bulk_create_agents` |\n| `DELETE` | `/api/agents/bulk` | `bulk_delete_agents` |\n| `POST` | `/api/agents/bulk/start` | `bulk_start_agents` |\n| `POST` | `/api/agents/bulk/stop` | `bulk_stop_agents` |\n\nBulk requests use `BulkCreateRequest` or `BulkAgentIdsRequest` schemas depending on the operation.\n\n**Messaging & streaming:**\n\n| Method | Path | Operation ID | Notes |\n|--------|------|-------------|-------|\n| `POST` | `/api/agents/{id}/message` | `send_message` | Synchronous message (`MessageRequest` → `MessageResponse`) |\n| `POST` | `/api/agents/{id}/message/stream` | `send_message_stream` | SSE streaming response (same `MessageRequest` body) |\n| `POST` | `/api/agents/{id}/upload` | `upload_file` | Raw binary upload; requires `Content-Type` and `X-Filename` headers |\n\n**Session management:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/agents/{id}/session` | `get_agent_session` |\n| `GET` | `/api/agents/{id}/sessions` | `list_agent_sessions` |\n| `POST` | `/api/agents/{id}/sessions` | `create_agent_session` |\n| `POST` | `/api/agents/{id}/sessions/{session_id}/switch` | `switch_agent_session` |\n| `GET` | `/api/agents/{id}/sessions/{session_id}/export` | `export_session` |\n| `POST` | `/api/agents/{id}/sessions/import` | `import_session` |\n| `GET` | `/api/agents/{id}/sessions/by-label/{label}` | `find_session_by_label` |\n| `POST` | `/api/agents/{id}/session/reset` | `reset_session` |\n| `POST` | `/api/agents/{id}/session/reboot` | `reboot_session` |\n| `POST` | `/api/agents/{id}/session/compact` | `compact_session` |\n\n`reset` saves a summary before clearing. `reboot` does a hard clear with no summary. `compact` triggers LLM-based session summarization.\n\n**Per-agent resource assignments:**\n\n| Method | Path | Operation ID | What it manages |\n|--------|------|-------------|----------------|\n| `GET`/`PUT` | `/api/agents/{id}/tools` | `get_agent_tools` / `set_agent_tools` | Tool allowlist/blocklist |\n| `GET`/`PUT` | `/api/agents/{id}/skills` | `get_agent_skills` / `set_agent_skills` | Skill allowlist |\n| `GET`/`PUT` | `/api/agents/{id}/mcp_servers` | `get_agent_mcp_servers` / `set_agent_mcp_servers` | MCP server allowlist |\n| `PUT` | `/api/agents/{id}/mode` | `set_agent_mode` | Operational mode (`SetModeRequest`) |\n| `PUT` | `/api/agents/{id}/model` | `set_model` | LLM model override |\n| `POST` | `/api/agents/{id}/stop` | `stop_agent` | Cancel current LLM run |\n\n**Workspace & diagnostics:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/agents/{id}/files` | `list_agent_files` |\n| `GET`/`PUT`/`DELETE` | `/api/agents/{id}/files/{filename}` | `get_agent_file` / `set_agent_file` / `delete_agent_file` |\n| `GET` | `/api/agents/{id}/deliveries` | `get_agent_deliveries` |\n| `DELETE` | `/api/agents/{id}/history` | `clear_agent_history` |\n| `GET` | `/api/agents/{id}/traces` | `get_agent_traces` |\n\n`get_agent_traces` returns structured decision traces showing why each tool was selected in the last agent loop — useful for debugging and auditing.\n\n---\n\n### Agent-to-Agent Protocol (`a2a`)\n\nTwo sub-prefixes: `/a2a/` for the local agent's A2A protocol interface, and `/api/a2a/` for managing external A2A agents.\n\n**Local A2A interface:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/.well-known/agent.json` | `a2a_agent_card` |\n| `GET` | `/a2a/agents` | `a2a_list_agents` |\n| `POST` | `/a2a/tasks/send` | `a2a_send_task` |\n| `GET` | `/a2a/tasks/{id}` | `a2a_get_task` |\n| `POST` | `/a2a/tasks/{id}/cancel` | `a2a_cancel_task` |\n\n**External A2A management:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/a2a/agents` | `a2a_list_external_agents` |\n| `GET` | `/api/a2a/agents/{id}` | `a2a_get_external_agent` |\n| `POST` | `/api/a2a/discover` | `a2a_discover_external` |\n| `POST` | `/api/a2a/send` | `a2a_send_external` |\n| `GET` | `/api/a2a/tasks/{id}/status` | `a2a_external_task_status` |\n\nThe `a2a_external_task_status` endpoint requires a `?url=` query parameter identifying which external agent to query.\n\n---\n\n### Authentication (`auth`)\n\n| Method | Path | Operation ID | Notes |\n|--------|------|-------------|-------|\n| `GET` | `/api/auth/providers` | `auth_providers` | List configured OAuth/OIDC providers |\n| `GET` | `/api/auth/login` | `auth_login` | Redirect to default provider (302) |\n| `GET` | `/api/auth/login/{provider}` | `auth_login_provider` | Redirect to named provider (302) |\n| `GET`/`POST` | `/api/auth/callback` | `auth_callback` / `auth_callback_post` | OAuth code exchange (browser vs programmatic) |\n| `POST` | `/api/auth/introspect` | `auth_introspect` | RFC 7662 token validation (`{active: true/false}`) |\n| `GET` | `/api/auth/userinfo` | `auth_userinfo` | Decoded JWT claims or provider userinfo fallback |\n\nThe POST callback variant accepts a `CallbackBody` schema for API clients that can't follow browser redirects.\n\n---\n\n### Memory (`memory`, `proactive-memory`)\n\n**Agent KV memory:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/agents/{id}/memory/export` | `export_agent_memory` |\n| `POST` | `/api/agents/{id}/memory/import` | `import_agent_memory` |\n\nImport accepts a `kv` object and an optional `clear_existing: true` flag.\n\n**Proactive memory system:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/memory` | `memory_list` |\n| `POST` | `/api/memory` | `memory_add` |\n| `GET` | `/api/memory/agents/{id}` | `memory_list_agent` |\n| `DELETE` | `/api/memory/agents/{id}` | `memory_reset_agent` |\n| `POST` | `/api/memory/agents/{id}/consolidate` | `memory_consolidate` |\n\nAll list endpoints support `category`, `offset`, and `limit` query parameters. `memory_add` routes through the extraction pipeline. `memory_consolidate` merges duplicates and cleans stale entries.\n\n---\n\n### Budget & Cost Tracking (`budget`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET`/`PUT` | `/api/budget` | `budget_status` / `update_budget` |\n| `GET` | `/api/budget/agents` | `agent_budget_ranking` |\n| `GET`/`PUT` | `/api/budget/agents/{id}` | `agent_budget_status` / `update_agent_budget` |\n\nBudget updates are in-memory only — they are not persisted to `config.toml`.\n\n---\n\n### Channels (`channels`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/channels` | `list_channels` |\n| `POST` | `/api/channels/reload` | `reload_channels` |\n| `POST`/`DELETE` | `/api/channels/{name}/configure` | `configure_channel` / `remove_channel` |\n| `POST` | `/api/channels/{name}/test` | `test_channel` |\n\n**QR login flows:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `POST` | `/api/channels/wechat/qr/start` | `wechat_qr_start` |\n| `GET` | `/api/channels/wechat/qr/status` | `wechat_qr_status` |\n| `POST` | `/api/channels/whatsapp/qr/start` | `whatsapp_qr_start` |\n| `GET` | `/api/channels/whatsapp/qr/status` | `whatsapp_qr_status` |\n\nThe test endpoint accepts optional `channel_id` or `chat_id` in the body for live message delivery verification.\n\n---\n\n### Inter-Agent Networking (`network`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/comms/topology` | `comms_topology` |\n| `GET` | `/api/comms/events` | `comms_events` |\n| `GET` | `/api/comms/events/stream` | `comms_events_stream` |\n| `POST` | `/api/comms/send` | `comms_send` |\n| `POST` | `/api/comms/task` | `comms_task` |\n\n`comms_events_stream` is an SSE endpoint polling the audit log every 500ms. `comms_events` merges data from both the event bus and the audit log.\n\n---\n\n### Workflows / Cron (`workflows`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET`/`POST` | `/api/cron/jobs` | `list_cron_jobs` / `create_cron_job` |\n| `GET`/`PUT`/`DELETE` | `/api/cron/jobs/{id}` | `cron_job_status` / `update_cron_job` / `delete_cron_job` |\n| `PUT` | `/api/cron/jobs/{id}/enable` | `toggle_cron_job` |\n\n---\n\n### Model Catalog (`models`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/catalog/status` | `catalog_status` |\n| `POST` | `/api/catalog/update` | `catalog_update` |\n\n`catalog_update` downloads the latest TOML catalog files from GitHub, caches them locally, and refreshes the kernel's in-memory catalog.\n\n---\n\n### MCP Servers (`mcp`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET`/`POST` | `/api/mcp/servers` | `list_mcp_servers` / `add_mcp_server` |\n| `GET`/`PUT`/`DELETE` | `/api/mcp/servers/{name}` | `get_mcp_server` / `update_mcp_server` / `delete_mcp_server` |\n\nAdding a server expects `McpServerConfigEntry` (name, transport, timeout_secs, env), persists to `config.toml`, and triggers a config reload. The GET on a single server returns live connection status and available tools.\n\n---\n\n### Skills & Marketplace (`skills`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/clawhub/browse` | `clawhub_browse` |\n| `GET` | `/api/clawhub/search` | `clawhub_search` |\n| `GET` | `/api/clawhub/skill/{slug}` | `clawhub_skill_detail` |\n| `GET` | `/api/clawhub/skill/{slug}/code` | `clawhub_skill_code` |\n| `POST` | `/api/clawhub/install` | `clawhub_install` |\n| `GET` | `/api/marketplace/search` | `marketplace_search` |\n\n`clawhub_browse` supports `sort` (trending, downloads, stars, updated, rating), `limit`, and `cursor`. `clawhub_install` runs the full security pipeline: SHA256 verification, manifest scan, prompt injection scan, and binary dependency check.\n\n---\n\n### Hands (`hands`)\n\nHands are autonomous agent instances with their own lifecycle:\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/hands` | `list_hands` |\n| `GET` | `/api/hands/{hand_id}` | `get_hand` |\n| `POST` | `/api/hands/install` | `install_hand` |\n| `POST` | `/api/hands/reload` | `reload_hands` |\n| `POST` | `/api/hands/{hand_id}/activate` | `activate_hand` |\n| `POST` | `/api/hands/{hand_id}/check-deps` | `check_hand_deps` |\n| `POST` | `/api/hands/{hand_id}/install-deps` | `install_hand_deps` |\n| `GET`/`PUT` | `/api/hands/{hand_id}/settings` | `get_hand_settings` / `update_hand_settings` |\n| `GET` | `/api/hands/active` | `list_active_hands` |\n| `GET` | `/api/hands/instances/{id}/browser` | `hand_instance_browser` |\n| `GET` | `/api/hands/instances/{id}/stats` | `hand_stats` |\n| `POST` | `/api/hands/instances/{id}/pause` | `pause_hand` |\n| `POST` | `/api/hands/instances/{id}/resume` | `resume_hand` |\n| `DELETE` | `/api/hands/instances/{id}` | `deactivate_hand` |\n\nActivating a hand spawns an agent; deactivating kills it.\n\n---\n\n### Integrations (`integrations`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/integrations` | `list_integrations` |\n| `GET` | `/api/integrations/available` | `list_available_integrations` |\n| `GET` | `/api/integrations/health` | `integrations_health` |\n| `POST` | `/api/integrations/add` | `add_integration` |\n| `POST` | `/api/integrations/reload` | `reload_integrations` |\n| `GET`/`DELETE` | `/api/integrations/{id}` | `get_integration` / `remove_integration` |\n| `POST` | `/api/integrations/{id}/reconnect` | `reconnect_integration` |\n\n`reload_integrations` hot-reloads configs and reconnects MCP servers.\n\n---\n\n### Extensions (`extensions`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/extensions` | `list_extensions` |\n| `GET` | `/api/extensions/{name}` | `get_extension` |\n| `POST` | `/api/extensions/install` | `install_extension` |\n| `POST` | `/api/extensions/uninstall` | `uninstall_extension` |\n\n---\n\n### Approvals (`approvals`)\n\nHuman-in-the-loop gating for agent actions:\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/approvals` | `list_approvals` |\n| `POST` | `/api/approvals` | `create_approval` |\n| `GET` | `/api/approvals/{id}` | `get_approval` |\n| `POST` | `/api/approvals/{id}/approve` | `approve_request` |\n| `POST` | `/api/approvals/{id}/reject` | `reject_request` |\n\nThe list endpoint transforms field names for dashboard compatibility: `action_summary` → `action`, `agent_id` → `agent_name`, `requested_at` → `created_at`.\n\n---\n\n### Webhooks (`webhooks`)\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `POST` | `/api/hooks/agent` | `webhook_agent` |\n| `POST` | `/api/hooks/wake` | `webhook_wake` |\n\n`webhook_agent` runs an isolated agent turn. `webhook_wake` injects a custom event into the kernel's event system to trigger proactive agents.\n\n---\n\n### System & Configuration (`system`)\n\n**Health:**\n\n| Method | Path | Operation ID | Auth |\n|--------|------|-------------|------|\n| `GET` | `/api/health` | `health` | Public |\n| `GET` | `/api/health/detail` | `health_detail` | Required |\n\nThe public health endpoint returns only `status` and `version` to prevent information leakage.\n\n**Configuration:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/config` | `get_config` |\n| `GET` | `/api/config/schema` | `config_schema` |\n| `POST` | `/api/config/reload` | `config_reload` |\n| `POST` | `/api/config/set` | `config_set` |\n\n`config_set` accepts `{\"path\": \"section.key\", \"value\": \"...\"}`, writes to `config.toml`, and triggers a reload. `config_reload` diffs current vs on-disk config, validates, and applies hot-reloadable changes.\n\n**Audit:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/audit/recent` | `audit_recent` |\n| `GET` | `/api/audit/verify` | `audit_verify` |\n\n**Backups:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `POST` | `/api/backup` | `create_backup` |\n| `GET` | `/api/backups` | `list_backups` |\n| `DELETE` | `/api/backups/{filename}` | `delete_backup` |\n\nBackups are stored in `<home_dir>/backups/` with timestamped filenames.\n\n**Other:**\n\n| Method | Path | Operation ID |\n|--------|------|-------------|\n| `GET` | `/api/commands` | `list_commands` |\n| `GET` | `/api/commands/{name}` | `get_command` |\n| `GET` | `/api/bindings` | `list_bindings` |\n| `POST` | `/api/bindings` | `add_binding` |\n| `DELETE` | `/api/bindings/{index}` | `remove_binding` |\n| `POST` | `/api/init` | `quick_init` |\n| `GET` | `/api/logs/stream` | `logs_stream` |\n\n`logs_stream` is an SSE endpoint with optional `level`, `filter`, and `token` query parameters. It sends a heartbeat every 15 seconds and backfills existing entries on first connect.\n\n---\n\n## Schema References\n\nThe spec defines the following named schemas in `#/components/schemas/` (referenced by `$ref` throughout):\n\n| Schema | Used by |\n|--------|---------|\n| `SpawnRequest` | `spawn_agent` |\n| `SpawnResponse` | `spawn_agent` (200) |\n| `BulkCreateRequest` | `bulk_create_agents` |\n| `BulkAgentIdsRequest` | `bulk_delete_agents`, `bulk_start_agents`, `bulk_stop_agents` |\n| `CloneAgentRequest` | `clone_agent` |\n| `PatchAgentConfigRequest` | `patch_agent_config` |\n| `UpdateIdentityRequest` | `update_agent_identity` |\n| `MessageRequest` | `send_message`, `send_message_stream` |\n| `MessageResponse` | `send_message` (200) |\n| `SetModeRequest` | `set_agent_mode` |\n| `AgentUpdateRequest` | `update_agent` |\n| `SetAgentFileRequest` | `set_agent_file` |\n| `CallbackBody` | `auth_callback_post` |\n\nMany endpoints have empty `schema: {}` for their request/response bodies, indicating schemas that are defined at the handler level rather than in this spec file. When extending the API, prefer adding explicit schemas to `components/schemas` and referencing them via `$ref`.\n\n## Path Conventions\n\n- **Public endpoints** — no authentication required: `/.well-known/agent.json`, `/api/health`\n- **API endpoints** — prefixed with `/api/`, require authentication via JWT in the `Authorization` header\n- **Protocol endpoints** — prefixed with `/a2a/`, follow the Agent-to-Agent protocol standard\n- **Webhook endpoints** — prefixed with `/api/hooks/`, designed for external system integration\n- **SSE streams** — identified by `/stream` suffix, return `text/event-stream` content type\n\n## Contributing to the Spec\n\nWhen adding a new endpoint:\n\n1. Choose the correct tag from the existing set. Create a new tag only if the domain is genuinely distinct.\n2. Set the `operationId` to match the handler function name (snake_case).\n3. Define request/response schemas explicitly in `components/schemas` — avoid empty `schema: {}` entries.\n4. Include all query parameters with `required` and type constraints.\n5. Document error responses (400, 401, 404, 500) where applicable.\n6. For SSE endpoints, note the `text/event-stream` response type and any heartbeat/polling behavior in the `description` field.","api-server":"# API Server\n\n# API Server\n\nThe API Server module group provides the HTTP/WebWebSocket interface for LibreFang Agent OS. It exposes agent management, chat, status monitoring, configuration, and external integrations through JSON REST endpoints and WebSocket connections. The CLI, dashboard SPA, and third-party consumers all communicate through this layer.\n\n## Sub-modules\n\n| Module | Role |\n|---|---|\n| [librefang-api](librefang-api.md) | The live server — Axum-based HTTP/WS handlers, middleware pipeline, and supporting infrastructure (OAuth, webhooks, WebSocket management, versioning) |\n| [api-docs](api-docs.md) | Static Swagger UI host (`index.html`) that renders the interactive documentation page in browsers |\n| [openapi.json](openapi.json.md) | OpenAPI 3.1.0 specification — the single source of truth for every route, request/response schema, and operation ID |\n\n## How they fit together\n\n```mermaid\nflowchart LR\n    Consumer[\"CLI / Dashboard / SDK\"]\n    Spec[\"openapi.json\"]\n\n    subgraph Server [\"librefang-api\"]\n        MW[\"Middleware<br/>(auth, rate-limit, logging)\"]\n        Routes[\"Route Handlers\"]\n        WS[\"WebSocket Layer\"]\n    end\n\n    subgraph Docs [\"api-docs\"]\n        UI[\"Swagger UI\"]\n    end\n\n    Spec -->|\"operation IDs map to\"| Routes\n    Spec -->|\"rendered by\"| UI\n    Consumer -->|\"HTTP/WS\"| MW --> Routes\n    Consumer -->|\"GET /docs\"| UI\n    Routes -->|\"kernel, vault, providers\"| Runtime[\"librefang-runtime / extensions\"]\n```\n\nThe **spec** (`openapi.json`) is the contract. Operation IDs such as `spawn_agent` and `list_agents` map directly to handler function names inside `librefang-api`. The **docs** module is a zero-dependency artifact that simply serves that spec through Swagger UI — it has no runtime coupling to the server. The **server** implements the contract and wires every request through a shared middleware pipeline (authentication, rate limiting, structured logging, i18n error messages, security headers) before dispatching to route handlers.\n\n## Key cross-cutting workflows\n\n- **Provider health checks** — `list_providers` in the routes layer calls through provider health probing → kernel boot → vault unlock → master key resolution, ensuring every provider listing reflects live connectivity status.\n- **WebSocket lifecycle** — Connection acquisition (`try_acquire_ws_slot` / `WsConnectionGuard`) enforces concurrency limits. Inbound text messages are classified for streaming errors and deduplicated via `stream_dedup`. Origin validation rejects cross-host connections while permitting loopback and configured extras.\n- **Webhook delivery** — Creation flows through SSRF protection (`is_private_ip`), URL/length validation, and HMAC signature computation. Updates support secret rotation and selective field clearing.\n- **API versioning** — The `Accept` header is parsed by `versioning` helpers to route requests to the correct handler revision, enabling backward-compatible API evolution.\n- **Channel integrations** (e.g. WeChat QR) — Route handlers bootstrap the kernel and vault on first use, following the same boot → unlock → key resolution path as provider flows.\n\nFor implementation details, see the individual sub-module pages linked above.","build-system-flake-nix":"# Build System — flake.nix\n\n# Build System — `flake.nix`\n\n## Overview\n\nThe LibreFang project uses a Nix flake to define a reproducible, cross-platform build pipeline for its Rust workspace. The flake leverages [crane](https://github.com/ipetkov/crane) for incremental Cargo builds with aggressive caching, and [rust-overlay](https://github.com/oxalica/rust-overlay) to pin a consistent Rust toolchain across all developer machines and CI environments.\n\n## Dependency Graph\n\n```mermaid\ngraph TD\n    A[nixpkgs-unstable] --> B[flake outputs]\n    C[crane] --> B\n    D[rust-overlay] -->|follows nixpkgs| B\n    E[flake-utils] -->|eachDefaultSystem| B\n    B --> F[packages.librefang-cli]\n    B --> G[checks: clippy + fmt]\n    B --> H[devShells.default]\n```\n\n## Inputs\n\n| Input | Purpose |\n|---|---|\n| `nixpkgs` | Package set (tracks `nixpkgs-unstable`) |\n| `crane` | Cargo-aware Nix build library — handles dependency caching, clippy, formatting checks |\n| `flake-utils` | Provides `eachDefaultSystem` to iterate outputs over all supported platforms |\n| `rust-overlay` | Supplies `rust-bin` for selecting a specific Rust toolchain; follows `nixpkgs` to avoid mismatched libc versions |\n\n## Build Pipeline\n\nThe flake produces outputs per-system via `flake-utils.lib.eachDefaultSystem`. Within each system, the build proceeds through these stages:\n\n### 1. Toolchain Selection\n\n```\nrustToolchain = pkgs.rust-bin.stable.latest.default.override {\n  extensions = [ \"rust-src\" \"rust-analyzer\" \"clippy\" ];\n};\n```\n\nPins the latest stable Rust compiler and adds `rust-src` (for IDE completion), `rust-analyzer`, and `clippy`. This toolchain is passed to crane via `overrideToolchain`.\n\n### 2. Source Filtering\n\n```\nsrc = craneLib.cleanCargoSource ./.;\n```\n\n`cleanCargoSource` strips non-Rust files (documentation assets, non-Cargo config, etc.) from the source tree. This ensures that edits to files like `README.md` or this documentation don't invalidate the build cache.\n\n### 3. Dependency Caching Layer\n\n```\ncargoArtifacts = craneLib.buildDepsOnly commonArgs;\n```\n\nThis is the critical performance optimization. `buildDepsOnly` compiles **only** the workspace's third-party dependencies and stores the resulting build artifacts. Because `src` filtering removes irrelevant files, these artifacts are cached and reused as long as `Cargo.lock` and dependency declarations don't change — even when application code changes frequently.\n\n### 4. Application Build\n\n```\nlibrefang = craneLib.buildPackage (commonArgs // {\n  inherit cargoArtifacts;\n  cargoExtraArgs = \"--package librefang-cli\";\n  doCheck = false;\n});\n```\n\nBuilds the `librefang-cli` crate using the pre-cached dependencies. Tests are disabled (`doCheck = false`) because the test suite requires network access and runtime infrastructure that isn't available in the Nix sandbox.\n\n## Native Dependencies\n\n**Build-time** (`nativeBuildInputs`):\n- `pkg-config` — for locating system libraries\n- `rustToolchain` — the pinned Rust compiler\n\n**Run-time / link-time** (`buildInputs`):\n- `openssl` — TLS/SSL support (likely for HTTP client functionality)\n\n**Darwin-specific** (conditionally included):\n- `apple-sdk` — macOS system headers\n- `libiconv` — character encoding conversion (common requirement on macOS for Rust builds)\n\n## Outputs\n\n### `packages.default` / `packages.librefang-cli`\n\nThe compiled `librefang-cli` binary. These are the same derivation exposed under two attribute names for convenience.\n\n### `apps.default`\n\nWraps the CLI binary as a Nix app, allowing `nix run .` to execute `librefang-cli` directly.\n\n### `checks`\n\n| Check | What it does |\n|---|---|\n| `librefang` | Builds the CLI package (verifies compilation succeeds) |\n| `librefang-clippy` | Runs `cargo clippy --workspace --all-targets` with `-D warnings` — all warnings are treated as errors |\n| `librefang-fmt` | Runs `cargo fmt --check` — fails if any file is not formatted |\n\nRun all checks with:\n\n```bash\nnix flake check\n```\n\n### `devShells.default`\n\nA development environment that includes everything needed to work on LibreFang:\n\n**Rust tooling** (via crane devShell and the checks attribute):\n- The pinned Rust toolchain with `rust-src`, `rust-analyzer`, and `clippy`\n\n**Additional CLI tools**:\n- `cargo-watch` — auto-recompile on file changes\n- `cargo-edit` — `cargo add`/`rm` with version management\n- `cargo-expand` — macro expansion for debugging\n- `just` — task runner (likely used for project workflows)\n- `gh` — GitHub CLI\n- `git`, `nodejs`, `python3` — general development utilities\n\nThe shell inherits build inputs from the `librefang` derivation via `inputsFrom`, ensuring the same `openssl`, `pkg-config`, and platform libraries are available during development.\n\nEnter the shell with:\n\n```bash\nnix develop\n```\n\n## Common Workflows\n\n### Building the CLI\n\n```bash\nnix build .            # result appears in ./result/bin/librefang-cli\nnix build .#librefang-cli   # explicit attribute\n```\n\n### Running Without Installing\n\n```bash\nnix run . -- <args>\n```\n\n### Entering the Development Environment\n\n```bash\nnix develop\n# Or with automatic environment loading via direnv:\necho \"use flake\" > .envrc && direnv allow\n```\n\n### Running CI Checks Locally\n\n```bash\nnix flake check        # runs build + clippy + fmt check\n```\n\n## Design Decisions\n\n- **`strictDeps = true`**: Ensures the build environment is hermetic — only explicitly listed dependencies are available. This prevents builds from silently depending on system packages.\n- **`doCheck = false`**: The Nix sandbox blocks network access, making integration tests impossible. Tests should be run outside Nix (e.g., via `cargo test` in the dev shell or a CI runner with network access).\n- **`buildDepsOnly` before `buildPackage`**: This two-stage build is the single most impactful caching strategy. Application code changes (the common case during development) never recompile dependencies.\n- **`cleanCargoSource` filtering**: Prevents cache invalidation from non-code changes. Only changes to `Cargo.toml`, `Cargo.lock`, and `.rs` files trigger rebuilds.","build-system-hooks":"# Build System — hooks\n\n# Build System — Git Hooks\n\n## Purpose\n\nThis module provides Git hook scripts that enforce code quality checks before changes are committed. Currently, it contains a single `pre-commit` hook that ensures all Rust code conforms to the project's formatting standards.\n\n## Installation\n\nConfigure Git to use the project's hooks directory:\n\n```sh\ngit config core.hooksPath scripts/hooks\n```\n\nThis setting is repository-local, so it won't affect your global Git configuration. Every developer working on the project should run this command after cloning.\n\n## Pre-Commit Hook\n\n**File:** `scripts/hooks/pre-commit`\n\n### What It Does\n\nThe hook runs `cargo fmt --check` to verify that all staged Rust files are already formatted. It follows a two-phase approach:\n\n1. **Check phase** — Runs `cargo fmt --check` silently (stderr suppressed via `2>/dev/null`). If formatting is correct, the hook exits successfully and the commit proceeds.\n\n2. **Auto-format phase** — If the check fails, the hook runs `cargo fmt` to fix the formatting automatically, prints a message, and exits with code `1` to abort the commit. This forces the developer to review the changes, re-stage the formatted files, and commit again.\n\n### Why It Aborts Instead of Committing\n\nThe hook intentionally rejects the commit after auto-formatting rather than silently committing the reformatted code. This ensures the developer reviews what `cargo fmt` changed and explicitly stages those changes, preventing unexpected diffs from entering the repository.\n\n### Execution Flow\n\n```mermaid\nflowchart TD\n    A[git commit] --> B[cargo fmt --check]\n    B -->|Pass| C[Commit proceeds]\n    B -->|Fail| D[cargo fmt auto-format]\n    D --> E[Abort commit, exit 1]\n    E --> F[Developer re-stages and commits again]\n```\n\n### Requirements\n\n- **Rust toolchain** with `cargo fmt` available in `PATH`.\n- The `rustfmt` component must be installed (`rustup component add rustfmt`).\n\n### Bypass\n\nTo skip the hook in exceptional situations (e.g., WIP commits), use:\n\n```sh\ngit commit --no-verify\n```\n\nUse this sparingly — CI should still catch formatting issues.","build-system-justfile":"# Build System — justfile\n\n# Build System — justfile\n\n## Overview\n\nThe `justfile` is the project's task runner, powered by [just](https://github.com/casey/just). It serves as the single entry point for all build, test, lint, release, and maintenance commands across the LibreFang workspace. Most non-trivial operations delegate to `cargo xtask` commands implemented in the `xtask` crate, keeping this file as a thin routing layer.\n\nRunning `just` with no arguments prints the full recipe list via `just --list`.\n\n## Prerequisites\n\n| Tool | Purpose | Install |\n|------|---------|---------|\n| `just` | Recipe runner | `cargo install just` |\n| `cargo` | Rust builds, xtask runner | rustup |\n| `pnpm` | Dashboard frontend builds | `npm install -g pnpm` |\n| `tauri-cli` | Desktop app builds (optional) | `cargo install tauri-cli` |\n\n## Core Development Recipes\n\nThese cover the standard edit–build–test cycle.\n\n| Recipe | Command | Description |\n|--------|---------|-------------|\n| `build` | `cargo build --workspace --lib` | Compile all workspace libraries |\n| `test` | `cargo test --workspace` | Run all workspace tests |\n| `check` | `cargo check --workspace` | Type-check without producing artifacts |\n| `lint` | `cargo clippy --workspace --all-targets -- -D warnings` | Clippy with warnings as errors |\n| `fmt` | `cargo fmt --all` | Format all Rust code in place |\n| `fmt-check` | `cargo fmt --all -- --check` | Verify formatting without modifying files |\n| `doc` | `cargo doc --workspace --no-deps --open` | Build and open rustdoc |\n\nThe `ci` recipe runs `cargo xtask ci`, which combines build, test, clippy, and web linting into a single pass for local CI simulation before pushing.\n\n## Web & Desktop Builds\n\nThe project ships a React dashboard compiled to static assets, consumed by both the API server and the Tauri desktop app.\n\n```\ndashboard-build\n       │\n       ▼\ndesktop-build ─────► cargo tauri build\ndesktop-dev   ─────► cargo tauri dev\ninstall       ─────► ~/.librefang/bin\ninstall-full  ─────► ~/.librefang/bin + ~/.librefang/dashboard\n```\n\n- **`build-web *ARGS`** — General-purpose frontend build, delegates to `cargo xtask build-web`.\n- **`dashboard-build`** — Builds only the React dashboard assets (shorthand for `build-web --dashboard`).\n- **`dash`** — Starts the React dev server with hot reload. Requires the API running on `:4545`. Changes directory to `crates/librefang-api/dashboard` and runs `pnpm install && pnpm dev`.\n- **`desktop-build`** and **`desktop-dev`** — Build or run the Tauri desktop app. Both depend on `dashboard-build` to ensure frontend assets are current before the Tauri bundle is created.\n\n## Installation Recipes\n\n### Unix (`~/.librefang/bin`)\n\n- **`install`** — Builds `librefang-cli` with the `release-local` profile and copies the binary to `~/.librefang/bin/librefang`.\n- **`install-full`** — Extends `install` by also deploying a fresh dashboard to `~/.librefang/dashboard` and writing a `.version` file extracted from `cargo metadata`.\n\n### Windows (`%USERPROFILE%\\.librefang\\bin`)\n\n- **`install`** — Same as the Unix variant, using `cmd` syntax (`if not exist`, `copy /Y`).\n\nBoth platform variants are gated with `[unix]` and `[windows]` attributes. The `set windows-shell := [\"cmd\", \"/c\"]` directive at the top ensures correct shell invocation on Windows.\n\n## Xtask-Delegated Recipes\n\nMost operational complexity lives behind `cargo xtask <name>` calls. The justfile passes through any extra arguments via the `*ARGS` variadic parameter, so each recipe supports xtask-specific flags.\n\n### Build & Release\n\n| Recipe | Xtask | Purpose |\n|--------|-------|---------|\n| `dist *ARGS` | `xtask dist` | Cross-platform release binaries |\n| `docker *ARGS` | `xtask docker` | Build and optionally push Docker images |\n| `release *ARGS` | `xtask release` | Cut a new release |\n| `publish-sdks *ARGS` | `xtask publish-sdks` | Publish SDKs to npm, PyPI, crates.io |\n| `publish-npm-binaries *ARGS` | `xtask publish-npm-binaries` | Publish CLI binaries to npm |\n| `publish-pypi-binaries *ARGS` | `xtask publish-pypi-binaries` | Publish CLI wheels to PyPI |\n\n### Code Quality & Analysis\n\n| Recipe | Xtask | Purpose |\n|--------|-------|---------|\n| `coverage *ARGS` | `xtask coverage` | Test coverage reports |\n| `bench *ARGS` | `xtask bench` | Criterion benchmarks |\n| `deps *ARGS` | `xtask deps` | Dependency vulnerability/updates audit |\n| `license-check *ARGS` | `xtask license-check` | Dependency license validation |\n| `check-links *ARGS` | `xtask check-links` | Broken link detection in docs |\n| `loc *ARGS` | `xtask loc` | Lines of code and dependency graph stats |\n\n### Code Generation & Documentation\n\n| Recipe | Xtask | Purpose |\n|--------|-------|---------|\n| `codegen *ARGS` | `xtask codegen` | OpenAPI spec and other generated code |\n| `api-docs *ARGS` | `xtask api-docs` | API docs from OpenAPI spec |\n| `changelog *ARGS` | `xtask changelog` | Generate CHANGELOG from merged PRs |\n| `contributors *ARGS` | `xtask contributors` | Contributor/star history SVGs |\n\n### Environment & Maintenance\n\n| Recipe | Xtask | Purpose |\n|--------|-------|---------|\n| `setup *ARGS` | `xtask setup` | First-time dev environment setup |\n| `dev *ARGS` | `xtask dev` | Start daemon + dashboard hot reload |\n| `doctor *ARGS` | `xtask doctor` | Diagnose environment issues |\n| `db *ARGS` | `xtask db` | Database info, backup, reset |\n| `clean-all *ARGS` | `xtask clean-all` | Remove all build artifacts (Rust + web) |\n| `update-deps *ARGS` | `xtask update-deps` | Update Rust and web dependencies |\n| `sync-versions *ARGS` | `xtask sync-versions` | Synchronize crate versions across workspace |\n| `fmt-all *ARGS` | `xtask fmt` | Format both Rust and web code |\n| `validate-config *ARGS` | `xtask validate-config` | Validate config.toml |\n| `pre-commit *ARGS` | `xtask pre-commit` | fmt + clippy + test in one pass |\n| `migrate *ARGS` | `xtask migrate` | Migrate agents from other frameworks |\n\n### Testing\n\n| Recipe | Xtask | Purpose |\n|--------|-------|---------|\n| `integration-test *ARGS` | `xtask integration-test` | Live integration test suite |\n\n## Passing Arguments\n\nAll variadic recipes use `*ARGS` which forwards extra arguments to the underlying xtask. For example:\n\n```bash\n# Run integration tests against a specific host\njust integration-test --host http://staging.example.com\n\n# Build Docker image with a specific tag\njust docker --tag v2.1.0 --push\n\n# Run benchmarks for a specific crate\njust bench --bench crate_name\n```\n\n## Recipe Dependency Graph\n\nRecipes with a `:` suffix (e.g., `desktop-build: dashboard-build`) declare dependencies. The following recipes chain automatically:\n\n```\ndesktop-build ──► dashboard-build\ndesktop-dev   ──► dashboard-build\ninstall       ──► dashboard-build    (both unix and windows)\ninstall-full  ──► dashboard-build\n```\n\nWhen you run `just desktop-build`, `just` first runs `dashboard-build` to compile the React assets, then proceeds with the Tauri build. No manual ordering is required.","build-system-mise-toml":"# Build System — mise.toml\n\n# Build System — `mise.toml`\n\n## Purpose\n\n`mise.toml` is the project-level tool version manifest. It declaratively pins the exact versions of all runtime and build tools required to develop, build, and test this project. By committing this file to version control, every contributor gets a consistent, reproducible toolchain with no manual setup beyond installing mise itself.\n\n## How It Works\n\nWhen a developer enters the project directory, mise reads `mise.toml` and automatically activates the specified tool versions. If a tool isn't installed locally, mise downloads and installs it on first use.\n\nActivation happens via shell hooks (`eval \"$(mise activate bash/zsh/fish)\"`) or the `mise exec` / `mise run` commands.\n\n## Declared Tools\n\n| Tool | Version | Role |\n|------|---------|------|\n| `just` | 1.48 | Command runner. Repeats common project tasks (build, test, lint, etc.) without relying on OS-specific Make quirks. |\n| `pnpm` | 10.33 | JavaScript package manager. Handles dependency installation, workspace management, and script running for the project's Node/TypeScript code. |\n| `rust` | 1.92 | Rust toolchain (rustc + cargo). Required to compile any Rust source in the project. |\n\n## Developer Workflow\n\n### Initial Setup\n\n```bash\n# Install mise (if not already installed)\ncurl https://mise.run | sh\n\n# Activate mise in your shell (one-time)\necho 'eval \"$(mise activate zsh)\"' >> ~/.zshrc\n\n# Enter the project — mise auto-installs pinned tools\ncd /path/to/project\n```\n\n### Day-to-Day Usage\n\n```bash\n# Verify active tool versions\nmise current\n\n# Run a task defined in a justfile\njust build\n\n# Run pnpm commands\npnpm install\npnpm test\n```\n\n### Updating a Tool Version\n\n1. Edit the version string in `mise.toml`.\n2. Commit the change so the rest of the team picks it up.\n\n```toml\n# Example: upgrade pnpm\npnpm = \"10.34\"\n```\n\n## Conventions\n\n- **Always pin exact versions** (e.g., `\"1.48\"`, not `\"^1\"` or `\"latest\"`). This guarantees reproducibility across machines and CI.\n- **One tool, one line.** Keep the `[tools]` section flat and alphabetically sorted for readability.\n- **Avoid `~/.config/mise/config.toml` overrides** for tools declared here. Local overrides can mask version mismatches that will break CI.\n\n## CI Integration\n\nCI pipelines should call `mise install` early in the pipeline to ensure all tools are available:\n\n```yaml\n# GitHub Actions example\n- name: Install tools\n  run: mise install\n- name: Build\n  run: just build\n```\n\nThis guarantees CI uses the same pinned versions defined in `mise.toml`.","build-system-rust-toolchain-toml":"# Build System — rust-toolchain.toml\n\n# Build System — `rust-toolchain.toml`\n\n## Overview\n\nThis file pins the Rust toolchain for the entire project. It is read automatically by **rustup** whenever any Rust command (`cargo build`, `cargo test`, `rustc`, etc.) is invoked inside this repository, ensuring that every developer and CI runner uses the same compiler version and component set.\n\n## Configuration\n\n```toml\n[toolchain]\nchannel = \"stable\"\ncomponents = [\"rustfmt\", \"clippy\"]\n```\n\n| Field | Value | Purpose |\n|---|---|---|\n| `channel` | `\"stable\"` | Selects the latest stable release of the Rust compiler. This channel is updated every six weeks when a new Rust edition ships. |\n| `components` | `[\"rustfmt\", \"clippy\"]` | Installs `rustfmt` (code formatting) and `clippy` (linting) alongside the compiler so they are guaranteed to be available. |\n\n## How It Works\n\nWhen a Rust command runs in this directory, rustup checks for `rust-toolchain.toml` (or the legacy `rust-toolchain` file). If found, it:\n\n1. Resolves the specified `channel` to an exact compiler version (e.g., `stable-x86_64-unknown-linux-gnu`).\n2. Ensures that toolchain is installed, downloading it if necessary.\n3. Ensures every listed `component` is installed for that toolchain.\n4. Activates the toolchain for the current command.\n\nThis happens transparently — no manual `rustup default` or `rustup override` is needed.\n\n## Why `stable`\n\nUsing the `stable` channel means:\n\n- The project relies only on features that have passed Rust's stabilization process.\n- No nightly-only APIs are used, reducing breakage risk from upstream changes.\n- CI and onboarding are predictable; there is no need to track a specific nightly date.\n\nIf a specific compiler version must be pinned for reproducibility, the `channel` value can be changed to an exact version string (e.g., `\"1.78.0\"`).\n\n## Modifying This File\n\n**Adding a component.** If a new tool is needed project-wide (e.g., `llvm-tools-preview` for coverage), append it to the `components` array:\n\n```toml\ncomponents = [\"rustfmt\", \"clippy\", \"llvm-tools-preview\"]\n```\n\n**Switching channels.** Change `channel` to `\"nightly\"` or a pinned version only with deliberate team agreement, as this affects every build in the repository.\n\n**Do not delete this file.** Removing it causes each developer's default toolchain to be used, which may differ in version or available components, leading to inconsistent formatting, lint results, or compilation errors.\n\n## Relationship to the Rest of the Build\n\nThis file is the foundation for every other Rust-based step in the project:\n\n- **`cargo build` / `cargo test`** — compile and test against the pinned compiler.\n- **`cargo fmt --check`** — requires the `rustfmt` component declared here.\n- **`cargo clippy`** — requires the `clippy` component declared here.\n- **CI pipelines** — rely on this file to provision the correct toolchain automatically, with no extra configuration in the CI YAML.\n\nNo module calls into this file and it calls nothing; it is purely declarative configuration consumed by the toolchain layer.","build-system-rustfmt-toml":"# Build System — rustfmt.toml\n\n# Build System — `rustfmt.toml`\n\n## Purpose\n\nThis file defines the workspace-wide code formatting policy for LibreFang. It is consumed automatically by `cargo fmt` (which invokes `rustfmt` under the hood) and is enforced as a CI gate — any PR that does not conform to these rules will fail CI checks.\n\n## When It Runs\n\n- **Locally:** Developers run `cargo fmt` manually (or via an editor save hook) before committing.\n- **CI:** The continuous integration pipeline runs `cargo fmt -- --check` to verify that all committed source matches the configured style. A non-zero exit status fails the build.\n\n## Configuration Options\n\n| Option | Value | Effect |\n|---|---|---|\n| `edition` | `\"2021\"` | Tells rustfmt to apply formatting rules consistent with Rust Edition 2021 syntax and idioms. |\n| `max_width` | `100` | Maximum line width before rustfmt wraps expressions. The default is 100; repeated here for explicitness so future editors don't have to guess the project's intent. |\n| `use_field_init_shorthand` | `true` | Rewrites `Foo { x: x }` as `Foo { x }` when field and variable names match, reducing visual noise in struct literals. |\n| `use_try_shorthand` | `true` | Rewrites `try!()` macro calls to the `?` operator, keeping the codebase consistent with modern Rust error-propagation style. |\n\n## How It Connects to the Rest of the Codebase\n\nThis file lives at the workspace root and applies uniformly to **every crate and module** in the LibreFang workspace. There are no per-crate overrides — a single formatting standard covers the entire project.\n\nNo other modules call into or depend on this file at runtime; its influence is purely at the tooling and CI layer.\n\n## Developer Workflow\n\n1. Make code changes.\n2. Run `cargo fmt` before staging commits.\n3. Verify with `cargo fmt -- --check` if you want to catch drift early.\n4. Push — CI will re-validate.","build-system-scripts":"# Build System — scripts\n\n# Build System — `scripts/read_email.py`\n\nA standalone command-line utility that connects to an IMAP mailbox, searches across multiple folders for emails from a specified sender, and prints the latest matching email's headers and body to stdout. Designed for use in automated build/release pipelines that need to verify email notifications.\n\n## Execution Flow\n\n```mermaid\nflowchart TD\n    A[CLI invocation] --> B[Read env vars & args]\n    B --> C{Credentials present?}\n    C -- No --> X[Exit 1 with error]\n    C -- Yes --> D[IMAP4_SSL connect + login]\n    D --> E[Iterate folder list]\n    E --> F[search_folder]\n    F --> G{IDs found?}\n    G -- No --> H{More folders?}\n    H -- Yes --> E\n    H -- No --> I[Print NO_EMAIL_FOUND, exit 0]\n    G -- Yes --> J[Fetch last ID RFC822]\n    J --> K[Decode subject + extract body]\n    K --> L[Print subject/from/date/body]\n```\n\n## Usage\n\n```bash\n# Required environment variables\nexport EMAIL_USERNAME=\"user@example.com\"\nexport EMAIL_PASSWORD=\"app-specific-password\"\n\n# Optional overrides\nexport IMAP_SERVER=\"imap.gmail.com\"   # default shown\nexport IMAP_PORT=\"993\"                 # default shown\n\n# Read latest email from a specific sender\npython scripts/read_email.py \"noreply@github.com\"\n\n# Read latest email across all senders\npython scripts/read_email.py\n```\n\n### Positional Arguments\n\n| Argument | Required | Description |\n|----------|----------|-------------|\n| `sender` | No | Email address to filter by. When omitted, matches all senders. |\n\n### Exit Codes\n\n| Code | Meaning |\n|------|---------|\n| `0` | Success (email found and printed, or no email found) |\n| `1` | Fatal error (missing credentials, IMAP login failure, fetch failure) |\n\n## Environment Variables\n\n| Variable | Required | Default | Description |\n|----------|----------|---
