nThe `gen/schemas/` directory holds three files that collectively define the IPC security boundary between the frontend webview and the native backend:\n\n| File | Purpose |\n|------|---------|\n| `acl-manifests.json` | Declares every permission (allow/deny) available across all registered plugins |\n| `capabilities.json` | Maps the **default** capability to the `main` window, listing which permissions are granted |\n| `desktop-schema.json` | JSON Schema for validating capability files, including scoped permission entries |\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[Tauri Build Pipeline] --> B[\"gen/schemas/\"]\n    B --> C[acl-manifests.json]\n    B --> D[capabilities.json]\n    B --> E[desktop-schema.json]\n    D -->|\"references permissions from\"| C\n    E -->|\"validates structure of\"| D\n    F[\"Frontend (webview)\"] -->|\"IPC call\"| G{Tauri Runtime}\n    G -->|\"checks\"| D\n    D -->|\"resolves via\"| C\n```\n\n## Default Capability\n\nThe `capabilities.json` defines a single capability called `default`, applied to the `main` window with local access enabled. It grants:\n\n| Permission | Scope |\n|------------|-------|\n| `core:default` | All core sub-plugin defaults (path, event, window, webview, app, image, resources, menu, tray) |\n| `notification:default` | Full notification API (send, cancel, channels, permissions) |\n| `shell:default` | `open` command for `http(s)://`, `tel:`, `mailto:` URLs |\n| `dialog:default` | Message, save, and open dialogs |\n| `global-shortcut:allow-register` | Register global keyboard shortcuts |\n| `global-shortcut:allow-unregister` | Unregister global keyboard shortcuts |\n| `global-shortcut:allow-is-registered` | Check if a shortcut is registered |\n| `autostart:default` | Enable, disable, and check auto-start on boot |\n| `updater:default` | Check, download, and install application updates |\n\nNote that `global-shortcut` intentionally does **not** use its `default` permission set (which is empty). Instead, specific allow permissions are granted individually — this is by design, as global shortcuts are considered inherently dangerous and must be explicitly opted into.\n\n## ACL Manifest Structure\n\nEach plugin entry in `acl-manifests.json` follows this pattern:\n\n```\n{\n  \"default_permission\": { \"identifier\", \"description\", \"permissions\": [...] },\n  \"permissions\": {\n    \"allow-<command>\": { \"identifier\", \"description\", \"commands\": { \"allow\": [\"<command>\"], \"deny\": [] } },\n    \"deny-<command>\":  { \"identifier\", \"description\", \"commands\": { \"allow\": [], \"deny\": [\"<command>\"] } }\n  },\n  \"permission_sets\": {},\n  \"global_scope_schema\": null | { ... }\n}\n```\n\n### Plugins with Scoped Permissions\n\nThe `shell` plugin is the only one that defines a `global_scope_schema`. It accepts `ShellScopeEntry` objects that control which system commands the webview can execute. Each entry specifies either a `cmd` path (with optional `$HOME`, `$CONFIG`, etc. variable prefix) or a `sidecar` flag, plus optional argument validation via regex.\n\n### Core Sub-Plugins\n\nThe `core:default` permission set aggregates defaults from nine sub-plugins:\n\n- **core:path** — `resolve`, `join`, `normalize`, `basename`, `dirname`, `extname`, `is_absolute`, `resolve_directory`\n- **core:event** — `listen`, `unlisten`, `emit`, `emit_to`\n- **core:window** — Window queries (`get_all_windows`, `inner_size`, `is_fullscreen`, etc.) and `internal_toggle_maximize`\n- **core:webview** — Webview queries (`get_all_webviews`, `webview_position`, `webview_size`) and `internal_toggle_devtools`\n- **core:app** — `version`, `name`, `tauri_version`, `identifier`, `bundle_type`, `register_listener`, `remove_listener`\n- **core:image** — `new`, `from_bytes`, `from_path`, `rgba`, `size`\n- **core:resources** — `close`\n- **core:menu** — Full menu CRUD: `new`, `append`, `prepend`, `insert`, `remove`, `remove_at`, `items`, `get`, `popup`, `create_default`, `set_as_app_menu`, `set_as_window_menu`, text/enabled/checked/accelerator/icon setters, and macOS-specific NSApp menu assignments\n- **core:tray** — Tray lifecycle and appearance: `new`, `get_by_id`, `remove_by_id`, `set_icon`, `set_menu`, `set_tooltip`, `set_title`, `set_visible`, `set_temp_dir_path`, `set_icon_as_template`, `set_show_menu_on_left_click`\n\n## desktop-schema.json\n\nThis is the JSON Schema (draft-07) used by Tauri's tooling to validate capability files. It defines:\n\n- **CapabilityFile** — accepts a single `Capability`, an array of them, or an object with a `capabilities` key\n- **Capability** — requires `identifier` and `permissions`; optionally `windows`, `webviews`, `platforms`, `remote`, `local`\n- **PermissionEntry** — either a bare identifier string or an object with `identifier` plus optional `allow`/`deny` scope arrays\n- **CapabilityRemote** — `urls` array using URLPattern syntax for granting IPC access to remote origins\n\nThe schema uses conditional `if/then` blocks to provide scope-specific validation for `shell:*` permissions, referencing `ShellScopeEntry` and `ShellScopeEntryAllowedArgs` definitions.\n\n## Regeneration\n\nThese files are regenerated on every `tauri build` or `tauri dev` invocation. To update them:\n\n1. Modify plugin registrations in the Rust source (`src-tauri/`)\n2. Run `cargo tauri dev` or `cargo tauri build`\n3. The build script regenerates all files under `gen/schemas/`\n\nDo not commit manual changes to this directory — they will be overwritten on the next build.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop application for the LibreFang Agent OS, built on **Tauri 2.0**. It wraps the core agent runtime, API server, and extension system into a cross-platform desktop experience with system tray integration, auto-updates, and single-instance enforcement.\n\n## Architecture\n\n```mermaid\ngraph TD\n    UI[Frontend Webview] -->|Tauri IPC| RC[Rust Core]\n    RC --> KK[librefang-kernel]\n    RC --> KA[librefang-api]\n    RC --> KE[librefang-extensions]\n    RC --> KT[librefang-types]\n    KA -->|HTTP/ws| UI\n    KK --> KA\n    KK --> KE\n```\n\nThe desktop app is a thin host layer. The frontend (not included in this crate) communicates with the Rust backend via Tauri's IPC bridge, while also connecting directly to the embedded API server over `http://127.0.0.1:*` and `ws://127.0.0.1:*` for real-time streaming. The heavy lifting — agent orchestration, channel management, extension loading — is delegated entirely to the workspace crates.\n\n## Feature Flags\n\nFeatures propagate to `librefang-api` to control which channel backends are compiled in.\n\n| Flag | Effect |\n|------|--------|\n| `default` | Standard feature set (forwards to `librefang-api/default`) |\n| `all-channels` | Enables every available channel backend |\n| `mini` | Minimal build with reduced channel support |\n| `custom-protocol` | Production-only; switches Tauri to use `tauri://` protocol instead of `localhost` for asset loading |\n\n`custom-protocol` should **only** be enabled in release/bundled builds. Development builds rely on the dev server on localhost.\n\n## Tauri Plugins\n\n| Plugin | Purpose |\n|--------|---------|\n| `tauri-plugin-notification` | Native OS notifications for agent events |\n| `tauri-plugin-shell` | Spawning external processes from the frontend |\n| `tauri-plugin-single-instance` | Prevents multiple app instances from running simultaneously |\n| `tauri-plugin-dialog` | Native file/dialog pickers |\n| `tauri-plugin-global-shortcut` | System-wide keyboard shortcuts to summon the app |\n| `tauri-plugin-autostart` | Launch on system login |\n| `tauri-plugin-updater` | Signed auto-update from GitHub Releases |\n\nTauri itself is built with the `tray-icon` and `image-png` features to support a system tray with a PNG icon.\n\n## Configuration (`tauri.conf.json`)\n\n### App Identity\n\n- **Product name**: `LibreFang`\n- **Identifier**: `ai.librefang.desktop`\n- **Version**: follows the workspace version (currently `26.4.32276`)\n\n### Windows\n\nThe `windows` array is intentionally empty (`[]`). Windows are created dynamically at runtime by the Rust backend rather than declared statically in the config. This allows the app to start minimized to the system tray and open windows on demand.\n\n### Security — CSP\n\nThe Content Security Policy is tuned for a hybrid Tauri + local API server setup:\n\n- **connect-src** allows `self`, loopback HTTP, and loopback WebSockets — required for the frontend to reach the embedded `librefang-api` server.\n- **script-src** includes `'unsafe-inline'` and `'unsafe-eval'` for framework compatibility.\n- **object-src** is set to `none`.\n- External font loading from Google Fonts is permitted.\n- Media and frame sources allow `blob:` URLs for streamed agent output.\n\n### Auto-Updater\n\nUpdates are fetched from:\n```\nhttps://github.com/librefang/librefang/releases/latest/download/latest.json\n```\n\nThe updater is configured with an Ed25519 public key for signature verification. On Windows, installation mode is `passive` (prompts the user). The public key and endpoint are baked into the bundle config — they are not runtime-configurable.\n\n## Bundling\n\nThe app bundles for all standard targets:\n\n| Platform | Formats | Notes |\n|----------|---------|-------|\n| Linux | `.deb`, `.AppImage` | No media framework bundled (`bundleMediaFramework: false`) |\n| macOS | `.dmg` / `.app` | Minimum macOS 12.0 |\n| Windows | `.msi` / `.exe` | SHA-256 digests; WebView2 bootstrapped on demand |\n\nIcons must be provided at `icons/` relative to the crate root: `icon.ico`, `icon.png`, `32x32.png`, `128x128.png`, `128x128@2x.png`.\n\n## Build Process\n\n`build.rs` delegates entirely to `tauri_build::build()`, which:\n1. Parses `tauri.conf.json`.\n2. Generates Rust code for the declared capabilities and plugins.\n3. On `custom-protocol` builds, embeds the frontend dist as bundled assets.\n\nThe `[[bin]]` target is `src/main.rs` with the binary name `librefang-desktop`.\n\n## Dependency Graph\n\n```\nlibrefang-desktop\n├── librefang-kernel      (agent runtime)\n├── librefang-api         (HTTP/WS server, feature-gated)\n├── librefang-types       (shared domain types)\n├── librefang-extensions  (extension loading)\n├── tauri + plugins       (desktop shell)\n├── tokio                 (async runtime)\n├── axum                  (used by librefang-api, also available here)\n├── clap                  (CLI argument parsing)\n├── reqwest               (HTTP client)\n├── tracing / tracing-subscriber  (structured logging)\n├── serde / serde_json / toml     (serialization)\n└── open                  (open URLs in default browser)\n```\n\n`librefang-api` is imported with `default-features = false` so that the desktop crate controls exactly which features are active via its own feature flags.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang. Provides three major capabilities:\n\n- **One-click MCP (Model Context Protocol) server setup** — streamline provisioning and connection of MCP-compatible servers.\n- **Credential vault** — encrypted at-rest storage backed by the OS keyring for secrets, API keys, and tokens.\n- **OAuth2 PKCE flow** — browser-based authorization with Proof Key for Code Exchange, for services that require user consent.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-extensions\"\n        MCP[\"MCP Server Setup\"]\n        Vault[\"Credential Vault\"]\n        OAuth[\"OAuth2 PKCE\"]\n    end\n\n    Types[\"librefang-types\"]\n    Keyring[\"OS Keyring<br/>(libsecret / Keychain / Credential Manager)\"]\n\n    MCP --> Types\n    Vault --> Types\n    OAuth --> Types\n    Vault --> Keyring\n    OAuth --> Vault\n```\n\n## Key Subsystems\n\n### MCP Server Setup\n\nProvisions and configures MCP-compatible servers with minimal manual steps. Reads server definitions from TOML configuration (via the `toml` crate) and manages their lifecycle.\n\nRelevant dependencies: `reqwest`, `rustls`, `webpki-roots`, `rustls-native-certs`, `tokio`.\n\n### Credential Vault\n\nStores secrets (API keys, tokens, passwords) in an encrypted on-disk format using **AES-256-GCM** for encryption and **Argon2** for key derivation. The encryption key material is held in the operating-system native keyring via the `keyring` crate, meaning the vault file itself is safe to store on disk without exposing plaintext secrets even if the file is read directly.\n\nKey security properties:\n\n| Property | Mechanism |\n|---|---|\n| Encryption at rest | AES-256-GCM (`aes-gcm`) |\n| Key derivation | Argon2 (`argon2`) |\n| Key storage | OS keyring — libsecret (Linux), Keychain (macOS), Credential Manager (Windows) |\n| Memory hygiene | `zeroize` for secure clearing of sensitive buffers |\n| Platform directories | `dirs` crate for resolving config/data paths |\n\n### OAuth2 PKCE\n\nImplements the Authorization Code flow with PKCE (Proof Key for Code Exchange) for public clients. This is the recommended flow for native/desktop applications that need to obtain OAuth2 tokens from providers like Google, GitHub, etc.\n\nThe flow involves:\n\n1. Generating a cryptographically random code verifier (`rand`, `sha2`).\n2. Computing the SHA-256 code challenge.\n3. Spinning up a temporary local HTTP server (`axum`) to receive the redirect callback.\n4. Exchanging the authorization code for tokens via `reqwest`.\n5. Storing the resulting tokens in the credential vault.\n\nRelevant dependencies: `axum`, `reqwest`, `rand`, `sha2`, `base64`, `chrono`.\n\n## Integration Points\n\n### librefang-types\n\nThe module depends on `librefang-types` for shared data structures — credential definitions, server configuration shapes, error types, and other cross-crate contracts. Any new extension or integration should define its public types there.\n\n### Concurrency\n\nThe `dashmap` dependency provides a lock-free concurrent hashmap, used for in-process caching of decrypted credentials and active OAuth2 states. This allows multiple async tasks (`tokio`) to access vault contents safely without a global mutex.\n\n## Configuration\n\nThe module uses TOML for its configuration files. Configuration is resolved from platform-standard directories via the `dirs` crate. A typical configuration file defines:\n\n- MCP server endpoints and connection parameters\n- Vault storage location and encryption settings\n- OAuth2 provider client IDs and redirect parameters\n\n## Error Handling\n\nErrors are surfaced through `thiserror`-derived error enums covering:\n\n- Encryption/decryption failures (AES-GCM, Argon2)\n- Keyring access errors (OS keyring unavailable or locked)\n- Network errors (OAuth2 token exchange, MCP server communication)\n- Configuration parsing errors (TOML/JSON deserialization)\n- TLS certificate errors (rustls)\n\nAll errors are instrumented through `tracing` for observability.\n\n## Testing\n\nDev dependencies include `tempfile` for isolated filesystem-based tests and `serial_test` to serialize tests that interact with the OS keyring (since keyring backends are typically process-wide singletons). `librefang-runtime` is also included as a dev dependency to provide the async runtime harness needed for integration tests.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nCurated autonomous capability packages for the LibreFang system.\n\n## Overview\n\n`librefang-hands` manages **hands** — discrete, self-contained capability packages that can be assigned to agents within the LibreFang framework. Each hand represents a curated set of behaviors or tools that an agent can use autonomously. The module is responsible for defining, loading, storing, and retrieving these capability packages.\n\n## Concept: What Is a Hand?\n\nA hand is a named, versioned bundle of autonomous capability. Rather than granting agents unrestricted access to all available actions, hands provide a controlled mechanism for scoping what an agent can do. This enables:\n\n- **Principle of least privilege** — agents receive only the capabilities they need\n- **Reusability** — common capability sets are defined once and shared across agents\n- **Auditing** — each hand is identifiable and traceable\n\n## Dependencies and Their Roles\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across the LibreFang ecosystem |\n| `serde`, `serde_json`, `toml` | Serialization and deserialization — hands are loaded from declarative config files (TOML) and may be serialized to JSON for transport or storage |\n| `thiserror` | Ergonomic error types for hand loading, validation, and lookup failures |\n| `tracing` | Structured logging throughout the hand lifecycle |\n| `uuid` | Unique identification for hand instances and registrations |\n| `chrono` | Timestamping for hand creation, modification, and audit records |\n| `dashmap` | Concurrent hashmap for thread-safe storage and retrieval of registered hands |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[TOML Config Files] -->|parse| B[Hand Definitions]\n    B -->|validate| C[Hand Registry]\n    C -->|dashmap| D[Concurrent Store]\n    E[librefang-runtime] -.->|queries| C\n    F[librefang-types] -.->|shared types| B\n```\n\nHands originate as TOML configuration files, are parsed and validated into structured definitions, and then registered in a concurrent store backed by `dashmap`. The runtime (`librefang-runtime`, a dev dependency here) queries the registry when assigning capabilities to agents.\n\n## Key Design Decisions\n\n### Concurrent Access via DashMap\n\nThe use of `dashmap` indicates that the hand registry is accessed from multiple threads simultaneously — likely because the runtime manages several agents in parallel, each needing to resolve its assigned hands without blocking others.\n\n### TOML-First Configuration\n\nHands are defined declaratively in TOML. This choice keeps configuration human-readable and version-control friendly, separating the definition of capabilities from the code that executes them.\n\n### Error Handling\n\nErrors are handled through `thiserror`, providing typed, descriptive error variants for common failure modes such as:\n\n- Malformed or missing TOML configuration\n- Validation failures (missing required fields, invalid values)\n- Lookup failures when a requested hand is not registered\n\n## Relationship to Other Modules\n\n- **`librefang-types`**: Defines the base data structures that hands build upon. This crate depends on it directly.\n- **`librefang-runtime`**: Consumes the hand registry at execution time. It appears as a dev dependency, suggesting the crate is tested against the runtime but does not depend on it at compile time.\n- **Broader system**: Hands sit between the static definition layer (config files, types) and the dynamic execution layer (runtime, agents), acting as the bridge that translates declared capabilities into actionable agent behavior.\n\n## Testing\n\nThe test suite uses:\n\n- `tempfile` — for creating isolated temporary directories when testing config file loading\n- `serial_test` — to serialize tests that may share global state or filesystem resources\n- `librefang-runtime` — for integration tests that verify hand registration works correctly within the runtime context\n\nTests are expected to cover TOML parsing, validation logic, concurrent registration and lookup, and error paths.","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing proxy support and TLS certificate fallback for the LibreFang project.\n\n## Overview\n\nThis crate centralizes the construction of `reqwest::Client` instances so that every component in the LibreFang workspace makes outbound HTTP requests with consistent TLS configuration and proxy handling. Rather than each crate independently configuring its own HTTP client, they all delegate to this single library.\n\n## Why This Exists\n\nNetwork environments vary wildly. Some systems have well-maintained system certificate stores; others do not. Some networks require an HTTP proxy; others don't. If each crate built its own `reqwest::Client`, TLS and proxy logic would be duplicated and could drift out of sync. `librefang-http` owns that responsibility once.\n\n## TLS Certificate Strategy\n\nThe crate uses **rustls** as its TLS backend (not native-tls), with a two-tier certificate trust strategy:\n\n1. **Native system certificates** (`rustls-native-certs`) — Loads the host operating system's trusted certificate store. This is the preferred path because it respects any custom CAs the user or administrator has installed.\n\n2. **Bundled Mozilla certificates** (`webpki-roots`) — Falls back to the Mozilla root program bundled into the binary if native certificate loading fails or the system store is empty/missing.\n\nThis fallback ensures LibreFang works on minimal containers (like Alpine or scratch Docker images) that may not have `ca-certificates` installed, while still honoring system trust stores where available.\n\n## Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `reqwest` | HTTP client; configured via its builder API |\n| `rustls` | TLS implementation; rustls is chosen over native-tls for cross-platform consistency |\n| `webpki-roots` | Bundled Mozilla CA certificates for fallback trust |\n| `rustls-native-certs` | Loader for the OS-native certificate store |\n| `tracing` | Structured logging for TLS and proxy configuration events |\n| `librefang-types` | Shared type definitions used across the workspace |\n\n## Relationship to Other Crates\n\n```\nlibrefang-types\n      ▲\n      │\nlibrefang-http\n      │\n      │  used by\n      ▼\n  (other LibreFang crates that need HTTP)\n```\n\nThis crate sits between `librefang-types` (which it depends on for shared types) and whichever LibreFang components need to make outbound HTTP calls. It is a leaf dependency in terms of outgoing calls — it does not call into other LibreFang crates at runtime, but it is called *by* them to obtain a configured `reqwest::Client`.\n\n## Design Notes\n\n**No detected internal call graph.** This module is primarily configuration and builder logic. It constructs a `reqwest::Client` and returns it. There are no deep internal call hierarchies, state machines, or async runtimes managed here. The complexity lies in the TLS fallback chain and proxy environment detection, both of which happen at client construction time.\n\n**Logging.** The `tracing` dependency is used to emit diagnostic events — for example, logging whether native certs were found, how many were loaded, whether webpki-roots were used as fallback, and what proxy settings were detected. This is critical for debugging connectivity issues in the field.\n\n## Usage Pattern (Conceptual)\n\nOther crates in the workspace use this library to obtain a client rather than calling `reqwest::Client::builder()` directly:\n\n```rust\n// Inside some other LibreFang crate\nlet client = librefang_http::build_client()?;\nlet response = client.get(\"https://example.com\").send().await?;\n```\n\nThe exact API surface (function names, builder options) is defined in this crate's `src/` — consult the Rustdoc for the specific entry points.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\n## Purpose\n\n`librefang-kernel-handle` defines the `KernelHandle` trait — the primary abstraction for in-process callers that need to interact with the LibreFang kernel. It provides a unified interface that decouples callers from the kernel's concrete implementation, allowing different parts of the system to issue kernel operations through a consistent contract.\n\nThis crate is intentionally minimal: it contains only the trait definition and associated types, keeping the boundary specification separate from both the kernel implementation and its consumers.\n\n## Role in the Architecture\n\n```mermaid\ngraph TD\n    A[In-Process Callers] -->|depend on| KH[KernelHandle Trait]\n    KH -->|uses| T[librefang-types]\n    K[Kernel Implementation] -->|implements| KH\n    A2[Test Harnesses / Mocks] -->|implements| KH\n```\n\nThe trait lives in its own crate so that:\n\n- **Callers** only depend on the lightweight trait crate, not the full kernel.\n- **The kernel** depends on this crate to implement the trait.\n- **Test code** can provide mock/stub implementations without pulling in real kernel dependencies.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types exchanged across the kernel boundary (requests, responses, errors) |\n| `async-trait` | Enables async methods in the trait definition |\n| `serde_json` | JSON serialization for message payloads passed through the handle |\n| `tracing` | Structured logging and diagnostic spans within trait interactions |\n| `uuid` | Unique identifiers for sessions, requests, or other kernel-tracked entities |\n\nThe presence of `async-trait` confirms that the `KernelHandle` trait includes asynchronous methods — callers should expect to `await` kernel operations.\n\n## Usage Patterns\n\n### Implementing the Trait\n\nThe kernel's concrete type implements `KernelHandle`, translating each trait method into internal kernel operations. Because the trait uses `async-trait`, implementations use `async fn` syntax directly:\n\n```rust\n#[async_trait]\nimpl KernelHandle for MyKernel {\n    async fn some_operation(&self, /* ... */) -> Result<\/* ... */> {\n        // delegate to internal kernel machinery\n    }\n}\n```\n\n### Consuming the Trait\n\nCallers accept a `dyn KernelHandle` (or a generic constrained by the trait) rather than a concrete kernel type:\n\n```rust\nasync fn do_work(kernel: &dyn KernelHandle) {\n    // invoke kernel operations through the trait\n}\n```\n\nThis inversion keeps caller code agnostic to the kernel's internals and simplifies testing.\n\n## Relationship to `librefang-types`\n\nAll data structures flowing through the `KernelHandle` interface are defined in `librefang-types`. This crate re-exports nothing — it relies on callers and implementors to import types from `librefang-types` directly. Keeping types in a separate crate ensures a stable, shared vocabulary across the entire LibreFang workspace without circular dependencies.\n\n## Design Notes\n\n- **Zero execution flows**: This crate is purely a trait definition. It has no runtime behavior, no internal call graph, and no side effects. Its value is architectural — it defines the contract.\n- **No outgoing calls**: The trait declares methods but delegates all real work to implementors.\n- **Serialization with `serde_json`**: Some trait methods likely accept or return JSON values, enabling flexible, schema-tolerant communication across the kernel boundary.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Purpose\n\nThis module provides the metering layer responsible for tracking resource consumption and enforcing usage quotas within the LibreFang kernel. It serves as the economic and resource governance component, ensuring that operations stay within defined budget and quota boundaries.\n\nMetering in this context refers to the measurement and accounting of computational costs — such as memory allocations, execution time, or operation counts — while quota enforcement acts on those measurements to prevent runaway or unauthorized resource consumption.\n\n## Dependencies\n\n| Crate | Role |\n|-------|------|\n| `librefang-types` | Shared type definitions used across the kernel |\n| `librefang-memory` | Memory allocation tracking and management |\n| `librefang-runtime` | Runtime primitives and execution context |\n| `serde` | Serialization support for persisting or transmitting metering data |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-kernel-metering] --> B[librefang-types]\n    A --> C[librefang-memory]\n    A --> D[librefang-runtime]\n    A --> E[serde]\n    style A fill:#2d5a88,color:#fff\n```\n\nThe module sits at the intersection of three core kernel crates. It draws type definitions from `librefang-types`, uses `librefang-memory` to ground its understanding of memory costs, and hooks into `librefang-runtime` for execution-level metering. The `serde` dependency enables metering data — such as usage snapshots or quota configurations — to be serialized for logging, reporting, or persistence.\n\n## Key Concepts\n\n### Metering\n\nMetering involves instrumenting kernel operations to record their resource cost. This provides the raw data needed to answer questions like:\n\n- How much memory has a session or tenant consumed?\n- How many operations have been executed?\n- Is a particular code path more expensive than expected?\n\n### Quota Enforcement\n\nQuota enforcement builds on metering data by comparing current usage against configured limits. When a quota is exceeded, the enforcement layer takes action — typically by rejecting the operation, signaling an error, or throttling further requests.\n\n## Integration Notes\n\nWhen integrating with this module:\n\n- **Reading metering data.** Consumers should rely on the serialized forms exposed through `serde`-compatible types for structured access to usage statistics.\n- **Setting quotas.** Quota thresholds are expected to be expressed in terms of the types defined in `librefang-types`, ensuring consistency across the kernel.\n- **Memory-sensitive operations.** Any code path that allocates through `librefang-memory` should consider whether metering is required for that allocation class.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand/Template routing engine for the LibreFang kernel.\n\n## Purpose\n\nThis crate is responsible for **routing** — resolving which hand definition and which template should handle a given request or input event. It acts as the dispatch layer that sits between raw input and the kernel's hand execution system, mapping symbolic names or patterns to concrete hand/template configurations.\n\n## Role in the Architecture\n\n```\n┌──────────────┐    ┌─────────────────────┐    ┌────────────────┐\n│  Input/Event  │───▶│  kernel-router      │───▶│  librefang-    │\n│  Source       │    │  (route resolution) │    │  hands         │\n└──────────────┘    └─────────────────────┘    └────────────────┘\n                            │\n                            ▼\n                     ┌────────────────┐\n                     │  librefang-    │\n                     │  types         │\n                     └────────────────┘\n```\n\nThe router consumes type definitions from `librefang-types` and produces routing decisions that are consumed by `librefang-hands`. It is the glue that determines *which* hand runs, *where* its template lives, and *how* parameters bind.\n\n## Key Dependencies\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared type definitions — route descriptors, hand identifiers, template metadata |\n| `librefang-hands` | Hand definitions and execution targets that routes resolve to |\n| `regex-lite` | Pattern matching for route rules — supports wildcard/glob-style matching of hand names or template paths |\n| `serde_json` | Deserialization of route configuration files (JSON format) |\n| `toml` | Deserialization of route configuration files (TOML format) |\n| `dirs` | Resolving platform-specific config directories to locate route definition files |\n| `tracing` | Structured logging of route resolution, cache hits/misses, and fallback behavior |\n\n## Configuration Loading\n\nThe router supports loading routing tables from both **TOML** and **JSON** configuration files. It uses the `dirs` crate to resolve platform-standard configuration directories (e.g., `~/.config/librefang/` on Linux), allowing users to define custom hand-to-template mappings without modifying compiled code.\n\nTypical config lookup order:\n\n1. Path specified by environment variable (if applicable)\n2. User config directory (`dirs::config_dir()` / `librefang/`)\n3. Bundled/fallback defaults\n\n## Route Resolution\n\nA route maps a **hand identifier** (and optionally a template name or pattern) to a concrete execution target. The `regex-lite` dependency indicates that route rules support pattern-based matching rather than only exact string equality — allowing a single rule to match multiple hands or template variants.\n\nResolution follows a priority model:\n\n1. **Exact matches** are checked first.\n2. **Pattern matches** (regex) are evaluated in definition order.\n3. **Fallback/default** route applies if nothing else matches.\n\nAll resolution steps are instrumented with `tracing` spans, making it straightforward to debug why a particular hand was (or wasn't) routed.\n\n## Testing\n\nThe `librefang-runtime` dev-dependency indicates that integration tests exercise the router within a full or partial runtime environment, verifying that routes resolve correctly end-to-end rather than in isolation. The `tempfile` dev-dependency suggests tests that create temporary configuration files to validate loading and parsing behavior without touching the user's real config.\n\n## Relationship to Other Crates\n\n- **Consumers** call into this crate to resolve which hand/template pair to activate.\n- **`librefang-hands`** provides the target definitions; the router does not execute hands itself — it only selects them.\n- **`librefang-types`** supplies the shared vocabulary (structs, enums) that both the router and its consumers agree on.\n- **`librefang-runtime`** orchestrates the router alongside other kernel subsystems during actual execution.","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# `librefang-kernel` Test Suite\n\n## Overview\n\nThe `tests.rs` module inside `librefang-kernel/src/kernel/` is the integration and regression test suite for the `LibreFangKernel` — the central runtime that manages agent lifecycles, tool routing, approval flows, hand (multi-agent preset) activation, skill evolution, and background maintenance tasks.\n\nTests are organized around **behavioral domains** rather than individual functions. Each domain validates invariants that cross several internal subsystems (registry, memory substrate, channel adapters, skill registry) through the kernel's public API.\n\n## Test Infrastructure\n\n### `RecordingChannelAdapter`\n\nA stub `ChannelAdapter` that captures all sent messages into an `Arc<Mutex<Vec<String>>>`. Used by notification and approval tests to assert delivery without a live channel backend.\n\n- `start()` returns an empty stream (no inbound messages)\n- `send()` records `\"{platform_id}:{text}\"` for each `ChannelContent::Text`\n- `stop()` is a no-op\n\n### `EnvVarGuard` / `set_test_env`\n\nRAII guard for environment variables in tests. `set_test_env(key, value)` sets an env var and returns an `EnvVarGuard` that removes it on drop. Used by API key rotation tests to isolate `LIBREFANG_TEST_*` variables.\n\n### `cascade_test_kernel`\n\nHelper that boots a kernel against a fresh tempdir (leaked to survive the test) and returns `Arc<LibreFangKernel>`. Used by parent/stop cascade tests to avoid repeating boilerplate boot sequences.\n\n### `install_test_skill`\n\nWrites a minimal valid `skill.toml` + `prompt_context.md` into a given parent directory. Used by skills wiring tests to seed the skill registry without a real skill installation pipeline.\n\n### `test_manifest`\n\nFactory function producing a minimal `AgentManifest` with configurable name, description, and tags. Used by agent registry lookup tests.\n\n## Test Domains\n\n### API Key Rotation\n\nTests for `collect_rotation_key_specs`:\n\n| Test | What it verifies |\n|---|---|\n| `test_collect_rotation_key_specs_dedupes_primary_profile_key` | When a profile's `api_key_env` resolves to the same value as the primary key, the profile appears once with `use_primary_driver: true`; no duplicate key entries. |\n| `test_collect_rotation_key_specs_prepends_distinct_primary_and_skips_missing_profiles` | A distinct primary key is prepended. Profiles whose env var is unset are silently dropped from the spec list. |\n\n### Approval Notification Routing\n\n`test_notify_escalated_approval_prefers_request_route_to` — validates the priority hierarchy for escalated approval notifications. When an `ApprovalRequest` carries explicit `route_to` targets, those win over:\n- Approval routing rules (`approval.routing`)\n- Agent notification rules (`notification.agent_rules`)\n- Global approval channels (`notification.approval_channels`)\n\n### Agent Manifest → Capabilities\n\nTests for `manifest_to_capabilities`:\n\n| Test | Behavior |\n|---|---|\n| `test_manifest_to_capabilities` | Explicit `capabilities.tools` + `agent_spawn` produce corresponding `Capability` variants. |\n| `test_manifest_to_capabilities_with_profile` | A `ToolProfile::Coding` expands into file, shell, and web tool capabilities. |\n| `test_manifest_to_capabilities_profile_overridden_by_explicit_tools` | When `capabilities.tools` is non-empty, the profile is **not** expanded — explicit declarations take precedence. |\n\n### Agent Registry Lookups\n\n| Test | Behavior |\n|---|---|\n| `test_send_to_agent_by_name_resolution` | `find_by_name` and `get(UUID)` both resolve registered agents. |\n| `test_find_agents_by_tag` | Tag-based and name-substring filtering works across multiple registered agents. |\n\n### Agent Spawning and Lineage\n\nThese tests exercise `spawn_agent_inner` and the capability subset enforcement for parent/child relationships.\n\n```mermaid\ngraph TD\n    A[spawn_agent_inner] --> B{parent provided?}\n    B -->|No| C[Register as top-level agent]\n    B -->|Yes| D{parent in registry?}\n    D -->|No| E[Fail: \"not registered\"]\n    D -->|Yes| F{child caps ⊆ parent caps?}\n    F -->|No| G[Fail: \"Privilege escalation denied\"]\n    F -->|Yes| H[Register as child agent]\n```\n\n| Test | Key invariant |\n|---|---|\n| `test_spawn_agent_applies_local_default_model_override` | Agents with `provider: \"default\"` store `\"default\"` at spawn time; concrete resolution happens at execution time. |\n| `test_spawn_child_exceeding_parent_is_rejected` | A child requesting capabilities beyond its parent's is rejected before registry insertion. |\n| `test_spawn_child_with_subset_capabilities_is_allowed` | A child whose tools are a strict subset of the parent's spawns successfully. |\n| `test_spawn_with_unknown_parent_fails_closed` | A stale `AgentId` as parent fails with \"not registered\" rather than silently treating the child as top-level. |\n\n### Provider Switching\n\n`test_set_agent_model_clears_overrides_when_provider_changes` — regression test for issue #2380. When `set_agent_model` switches an agent to a different provider, stale `api_key_env` and `base_url` overrides from the previous provider must be cleared. Same-provider model swaps must **preserve** existing overrides.\n\n### Hand Activation and Deactivation\n\nHands are multi-agent presets defined by `HAND.toml` files. These tests validate the activate → override → deactivate → reactivate lifecycle.\n\n| Test | What it verifies |\n|---|---|\n| `test_hand_activation_does_not_seed_runtime_tool_filters` | `tool_allowlist` and `tool_blocklist` remain empty after activation so skill/MCP tools stay visible. |\n| `test_hand_reactivation_rebuilds_same_runtime_profile` | Deactivating and reactivating a hand rebuilds the agent from the `HAND.toml` definition, discarding any runtime overrides from the previous activation. |\n| `reactivate_builds_from_hand_toml_not_override` | Extended version of the above covering model, provider, `api_key_env`, `base_url`, `max_tokens`, `temperature`, and `web_search_augmentation`. |\n| `test_hand_skills_propagate_to_derived_agent_manifest` | Hand-level `skills = [...]` allowlist propagates into each derived agent's `AgentManifest.skills` (issue #3135). |\n| `test_hand_skills_intersect_per_role_overrides` | When both hand and per-role agent declare skills, the effective list is the intersection. |\n\n### Tool Availability\n\n| Test | What it verifies |\n|---|---|\n| `test_available_tools_returns_empty_when_tools_disabled` | `tools_disabled: true` suppresses all builtin, skill, and MCP tools. |\n| `test_available_tools_glob_pattern_matches_mcp_tools` | Glob patterns like `file_*` match `file_read`, `file_write`, `file_list` (regression for exact-match-only bug). |\n| `test_shell_exec_available_when_declared_in_tools_without_explicit_exec_policy` | Agents declaring `shell_exec` in tools auto-promote their `exec_policy` to `Full` even when the global default is `Deny`. |\n| `test_skill_evolve_tools_default_available_to_restricted_agent` | Skill evolution tools (`skill_evolve_create`, etc.) are always available regardless of restrictive `capabilities.tools`. |\n\n### Message Routing\n\n| Test | What it verifies |\n|---|---|\n| `test_should_reuse_cached_route_for_brief_follow_up` | Short follow-up messages (\"fix that\", \"继续\") reuse cached routes; long or terminal messages (\"thanks\") do not. |\n| `test_assistant_route_key_scopes_sender_and_thread` | Route keys incorporate channel, user_id, and thread_id to prevent cross-context leakage. |\n| `test_boot_spawns_assistant_as_default_agent` | A fresh kernel boot auto-spawns an `assistant` agent. |\n| `test_send_message_ephemeral_unknown_agent_returns_not_found` | Ephemeral messages to non-existent agents error out. |\n| `test_send_message_ephemeral_does_not_modify_session` | Ephemeral (`/btw`) messages never mutate the real session history. |\n\n### Background Task Idempotency\n\n| Test | What it verifies |\n|---|---|\n| `test_spawn_approval_sweep_task_is_idempotent` | Calling `spawn_approval_sweep_task` twice starts only one loop (atomic guard). |\n| `test_spawn_task_board_sweep_task_is_idempotent` | Same idempotency guarantee for `spawn_task_board_sweep_task` (issue #2923). |\n| `test_task_board_sweep_resets_stuck_in_progress_task` | A claimed task past its TTL gets reset to `pending` so another worker can re-claim. |\n\n### Condition Evaluation\n\nTests for `evaluate_condition`:\n\n- `None` and empty string conditions evaluate to `true`.\n- `\"agent.tags contains 'tag'\"` matches against the agent's tag list.\n- Unknown formats default to `false` (strict — prevents accidental bypass).\n\n### Peer-Scoped Keys\n\n`test_peer_scoped_key` — `peer_scoped_key(\"car\", Some(\"user-123\"))` → `\"peer:user-123:car\"`. Without a peer ID, the key is passed through unchanged.\n\n### Thinking Override\n\nTests for `apply_thinking_override`:\n\n| Override value | Effect |\n|---|---|\n| `None` | Leaves `manifest.thinking` untouched. |\n| `Some(false)` | Clears `manifest.thinking` to `None`. |\n| `Some(true)` when unset | Inserts default `ThinkingConfig`. |\n| `Some(true)` when already set | Preserves existing `budget_tokens`. |\n\n### JSON Extraction from LLM Responses\n\nTests for `LibreFangKernel::extract_json_from_llm_response`:\n\n- Extracts JSON from `\\`\\`\\`json` code blocks.\n- Extracts bare `{...}` objects surrounded by prose.\n- Handles nested braces inside string values (old find/rfind approach failed here).\n- Returns `None` for no JSON, malformed JSON, or multiple code blocks (takes first valid).\n\n### Background Skill Review\n\n`is_transient_review_error` classifies errors:\n\n| Transient (retryable) | Permanent (no retry) |\n|---|---|\n| Timeouts, connection closures, network errors | Missing JSON, validation errors, security blocks, rate limits |\n\n`summarize_traces_for_review` produces bounded summaries: first N and last N traces with `\"omitted\"` for the middle, keeping output under the trace count threshold.\n\n### Reviewer Block Sanitization\n\nTests for `sanitize_reviewer_block` and `sanitize_reviewer_line`:\n\n- Strips triple-backtick code fences to prevent prompt injection via forged JSON blocks.\n- Strips `<\/data>` / `<data>` envelope markers.\n- Removes control characters (`\\x00`, `\\x07`) while preserving `\\n` and `\\t`.\n- Truncates by **character count** (not byte count) with `…[truncated]` marker.\n- Collapses newlines and replaces brackets with parentheses at the line level.\n\n### Skills Configuration Wiring\n\n| Test | What it verifies |\n|---|---|\n| `test_skills_config_disabled_list_filters_at_boot` | `skills.disabled` in config prevents listed skills from loading at boot. |\n| `test_skills_config_extra_dirs_loaded_as_overlay` | `skills.extra_dirs` loads external skills; local install wins name collisions. |\n| `test_reload_skills_preserves_disabled_and_extra_dirs` | Hot-reload re-applies the disabled list and overlay dirs (regression: they used to vanish). |\n| `test_stable_mode_freezes_registry_and_skips_review_gate` | `KernelMode::Stable` freezes the skill registry; review gates refuse to spawn. |\n\n### Cron Job Peer Context\n\n`test_cron_create_preserves_peer_id` — regression for `cron_create` silently dropping `peer_id` from the job payload. Jobs created with `peer_id` must persist it; jobs without it must have `peer_id: null`.\n\n### Parent /Stop Cascade\n\nTests for the session interrupt propagation chain (issue #3044):\n\n```mermaid\ngraph LR\n    P[parent turn active] -->|cancel| PI[SessionInterrupt]\n    PI -->|cascade via new_with_upstream| CI[child SessionInterrupt]\n    CI -->|is_cancelled = true| CL[child loop exits]\n```\n\n| Test | What it verifies |\n|---|---|\n| `cascade_primitives_via_session_interrupts_dashmap` | Parent cancel propagates to child; child cancel does **not** propagate to parent. |\n| `no_upstream_when_parent_has_no_active_turn` | Lookup returns `None` for idle parents — no cascade, no error. |\n| `send_to_agent_as_tolerates_unregistered_parent_uuid` | Unregistered parent UUID falls through gracefully; error references the missing child. |\n| `send_to_agent_as_rejects_unparseable_parent_id` | Garbage parent IDs surface an error rather than panicking. |\n\n### Atomic TOML Writes\n\nTests for `atomic_write_toml` — the crash-safe replacement for `fs::write` used by `persist_manifest_to_disk`:\n\n| Test | What it verifies |\n|---|---|\n| `atomic_write_replaces_existing_content` | Stages to `.tmp`, renames into place; final content is correct. |\n| `atomic_write_leaves_no_tmp_file_on_success` | No staging artifacts remain after a successful write. |\n| `atomic_write_no_partial_state_under_concurrency` | Two threads racing to write the same path never produce a corrupt/partial file; readers always see a complete payload. |\n\n### Hand State Persistence Across Restarts\n\nThese tests simulate a daemon restart by booting a kernel, activating a hand, persisting state, shutting down, and booting a fresh kernel that restores from `hand_state.json`.\n\n| Test | What it verifies |\n|---|---|\n| `boot_drift_preserves_hand_settings_tail` | `## User Configuration` settings block survives restart via `activate_hand_with_id`. |\n| `boot_drift_preserves_skill_and_team_tails` | `## Reference Knowledge` (from `SKILL.md`) and `## Your Team` (peer roster) survive restart. |\n| `hand_runtime_override_survives_restart_via_activate_hand_with_id` | Model, provider, max_tokens, temperature, and web_search_augmentation overrides round-trip through `hand_state.json`. |\n| `deactivate_hand_removes_hand_agent_rows_from_sqlite` | SQLite rows for hand agents are scrubbed even when the in-memory registry has already evicted them (post-restart scenario). |\n| `boot_gc_removes_orphaned_hand_agent_rows` | On boot, `is_hand = true` rows not claimed by any active hand instance are garbage-collected from SQLite. |\n\n> **Note on `start_background_agents`**: The `#[ignore]` test `hand_runtime_override_survives_restart_via_start_background_agents` exercises the full async restore coroutine. It is disabled in CI because it depends on network-adjacent operations (registry sync, context engine). The deterministic sibling test above covers the same logic without those dependencies.\n\n## Patterns and Conventions\n\n- **Tempdir isolation**: Every test creates a unique `tempfile::tempdir()` as `home_dir`. No test relies on shared filesystem state.\n- **Kernel lifecycle**: Tests follow `boot_with_config` → exercise → `shutdown()`. The `shutdown()` call is essential to join background tasks and release file locks.\n- **Graceful skipping**: Hand tests that depend on optional components (e.g., `apitester` hand being installed) catch `\"unsatisfied requirements\"` errors and return early with a diagnostic `eprintln!`.\n- **Atomicity guards**: Background sweep tasks use `AtomicBool` guards (`approval_sweep_started`, `task_board_sweep_started`) to ensure single-instance spawning across concurrent callers.\n- **`std::mem::forget(dir)`**: The `cascade_test_kernel` helper leaks its tempdir so the directory survives the returned kernel's lifetime. This is acceptable in test code.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and end-to-end tests for the `librefang-kernel` crate. These tests exercise the full kernel boot path, agent lifecycle, RBAC enforcement, WASM execution, workflow orchestration, audit retention, and the `purge_sentinels` CLI binary — all against the real kernel with minimal mocking.\n\n## Structure\n\n```\ntests/\n├── audit_retention_test.rs          # Audit log trimming & self-audit M7\n├── integration_test.rs              # Basic boot → spawn → message pipeline\n├── multi_agent_test.rs              # Hand lifecycle, state persistence, settings\n├── purge_sentinels_test.rs          # purge_sentinels CLI binary tests\n├── rbac_m3_evaluate_tool_call.rs    # RBAC M3 tool-call evaluation\n├── wasm_agent_integration_test.rs   # WASM module execution pipeline\n└── workflow_integration_test.rs     # Workflow engine registration & E2E runs\n```\n\n## Running\n\nMost tests are self-contained and need no external services:\n\n```bash\ncargo test -p librefang-kernel\n```\n\nTests requiring a live LLM are gated on `GROQ_API_KEY` and print a skip message when unset:\n\n```bash\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test integration_test -- --nocapture\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test workflow_integration_test -- --nocapture\n```\n\nThe RBAC tests set a throwaway env var (`RBAC_M3_TEST_KEY`) internally — no real API key needed.\n\nThe audit retention test uses `#[tokio::test(flavor = \"multi_thread\")]` because `start_background_agents` calls `tokio::task::block_in_place`, which panics on the default current-thread runtime.\n\n## Test Categories\n\n### Integration Pipeline (`integration_test.rs`)\n\nTwo tests validating the core kernel→agent→LLM round-trip:\n\n- **`test_full_pipeline_with_groq`** — Boots `LibreFangKernel`, spawns a single agent from a TOML `AgentManifest`, sends a message through the Groq API, and asserts a non-empty response with non-zero token usage.\n- **`test_multiple_agents_different_models`** — Spawns two agents (llama-3.3-70b-versatile and llama-3.1-8b-instant) concurrently, verifies both respond independently, then cleans up.\n\nBoth tests call `kernel.spawn_agent()`, `kernel.send_message()`, `kernel.kill_agent()`, and `kernel.shutdown()` in sequence.\n\n### Multi-Agent Hand Lifecycle (`multi_agent_test.rs`)\n\nThe largest test file. Exercises the **hand** abstraction — pre-packaged agent templates that can be activated, paused, resumed, and deactivated.\n\n```mermaid\nstateDiagram-v2\n    [*] --> Installed: install_from_content\n    Installed --> Active: activate_hand\n    Active --> Paused: pause_hand\n    Paused --> Active: resume_hand\n    Active --> Deactivated: deactivate_hand\n    Deactivated --> Active: activate_hand (re-activation)\n```\n\n**Core lifecycle tests:**\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_activate_hand_spawns_agent` | Activation creates an agent in the registry |\n| `test_deactivate_kills_agent` | Deactivation removes the agent |\n| `test_pause_and_resume_hand` | Pause preserves the agent; status transitions correctly |\n| `test_activate_nonexistent_hand_fails` | Error on unknown hand ID |\n| `test_deactivate_nonexistent_instance_fails` | Error on unknown instance UUID |\n\n**Deterministic agent IDs:**\n\n`test_deterministic_agent_id` and `test_deterministic_id_stable_across_reactivation` confirm that `AgentId::from_hand_agent(\"test-clip\", \"main\", None)` produces the same ID across activations (legacy single-instance format).\n\n**Multi-agent hands:**\n\n`HAND_C` defines two agents (`analyst`, `planner`) with `coordinator = true` on the planner. `test_explicit_coordinator_role_used_for_routes` verifies that routing resolves to the declared coordinator rather than defaulting to \"main\".\n\n**Metadata and tool inheritance:**\n\n- `test_agent_tagged_with_hand_metadata` — Agents receive `hand:<id>` and `hand_instance:<uuid>` tags.\n- `test_hand_tools_applied_to_agent` — The hand's `tools` array propagates into the agent's `capabilities.tools`.\n- `test_system_prompt_preserved` — The hand's `system_prompt` reaches the agent manifest.\n- `test_default_provider_resolved_to_kernel_default` — The `\"default\"` provider sentinel is resolved at activation time.\n\n**State persistence (`hand_state.json`):**\n\n`test_hand_state_persistence` writes a version-5 state file with typed fields (`instance_id`, `status`, `activated_at`, `updated_at`) and an `agent_ids` map. `test_multi_agent_hand_state_persists_coordinator_role` confirms the `coordinator_role` field survives to disk.\n\n**Settings schema (`[[settings]]`):**\n\nThree tests exercise default-seeding:\n\n1. `test_activation_seeds_schema_defaults_into_config` — Empty user config gets filled from `[[settings]].default`.\n2. `test_activation_preserves_user_overrides_over_defaults` — User-provided values win over schema defaults.\n3. `test_reactivation_backfills_missing_schema_keys` — Schema evolution: keys added after the initial activation are backfilled on reactivation without overwriting existing values.\n\n**Coexistence:**\n\n`test_multiple_hands_coexist` and `test_deactivate_one_hand_preserves_other` confirm that activating two hands produces distinct agents and deactivating one doesn't kill the other.\n\n**Trigger preservation on reactivation:**\n\n`test_reactivation_restores_triggers_to_original_roles` registers a trigger on the `analyst` role, deactivates, reactivates, and confirms the trigger stays attached to `analyst` without leaking to `planner`.\n\n**Live fleet test:**\n\n`test_six_agent_fleet` spawns 6 agents (coder, researcher, writer, ops, analyst, hello-world) against Groq, sends a message to each, and prints a summary table. Requires `GROQ_API_KEY`.\n\n### RBAC Tool-Call Evaluation (`rbac_m3_evaluate_tool_call.rs`)\n\nEnd-to-end tests for the three-layer tool authorization pipeline. Uses `KernelHandle::resolve_user_tool_decision` through the real trait object — no mocks.\n\n**Test helpers:**\n\n- `boot(users, groups)` — Creates a kernel with specific `UserConfig` entries and `ToolGroup` definitions. Leaks the tempdir to keep paths alive.\n- `user(name, role, platform_id, tool_policy, tool_categories)` — Builds a `UserConfig` with a Telegram channel binding.\n\n**Authorization cases:**\n\n| Test | Layer exercised | Expected result |\n|------|----------------|-----------------|\n| `evaluate_tool_call_user_deny_short_circuits` | User explicit deny | `Deny` (regardless of agent capabilities) |\n| `evaluate_tool_call_both_allow` | User explicit allow | `Allow` |\n| `evaluate_tool_call_user_role_no_allow_list_needs_approval` | No policy, User role | `NeedsApproval` |\n| `evaluate_tool_call_user_categories_resolve_against_kernel_groups` | Bulk category deny | `Deny` for tools in denied group |\n| `evaluate_tool_call_user_categories_allow_list_short_circuits_for_user_role` | Category allow-list, User role | `Allow` for matching tools, `Deny` for non-matching |\n| `evaluate_tool_call_unrecognised_sender_no_longer_fail_open` | Guest gate (H7 hardening) | Safe tools → `Allow`; unsafe → `NeedsApproval` |\n| `evaluate_tool_call_trait_layer_none_sender_fails_closed` | `(None, None)` regression | `NeedsApproval` for unsafe tools; `Allow` for safe |\n| `evaluate_tool_call_reload_picks_up_new_policy` | `AuthManager::reload` | Policy changes take effect immediately |\n\n**Special carve-out:**\n\n`submit_tool_approval_hand_agent_force_human_skips_auto_approve` verifies that hand-tagged agents auto-approve tool calls by default, but `force_human = true` in `DeferredToolExecution` overrides that carve-out and routes to `Pending`.\n\n### WASM Agent Execution (`wasm_agent_integration_test.rs`)\n\nTests the `module = \"wasm:<path>\"` execution path using real WAT modules compiled by the WASM runtime.\n\n**Test WAT modules:**\n\n| Module | Behavior |\n|--------|----------|\n| `ECHO_WAT` | Bump-allocator + returns input JSON as-is |\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` |\n| `INFINITE_LOOP_WAT` | Infinite `br` loop — triggers fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to `librefang.host_call` import |\n\n**Test cases:**\n\n- `test_wasm_agent_hello_response` — Fixed response; asserts `\"hello from wasm\"`.\n- `test_wasm_agent_echo` — Echo module; asserts input message appears in output.\n- `test_wasm_agent_fuel_exhaustion` — Infinite loop; asserts error mentions \"Fuel exhausted\".\n- `test_wasm_agent_missing_module` — Nonexistent `.wasm` file; asserts \"Failed to read\" error.\n- `test_wasm_agent_host_call_time` — Host-call proxy; verifies the host function import pipeline.\n- `test_wasm_agent_streaming_fallback` — Streaming API on WASM agent; collects `TextDelta` + `ContentComplete` events.\n- `test_multiple_wasm_agents` — Two WASM agents coexisting; verifies registry count.\n- `test_mixed_wasm_and_llm_agents` — WASM + LLM agent in the same kernel; verifies coexistence and independent execution.\n\n### Workflow Engine (`workflow_integration_test.rs`)\n\nTests workflow registration, agent resolution, and end-to-end multi-step pipeline execution.\n\n**Kernel-level wiring (no LLM):**\n\n- `test_workflow_register_and_resolve` — Creates a 2-step `Workflow` with `StepAgent::ByName`, registers it via `kernel.register_workflow()`, verifies agent lookup with `find_by_name()`, and creates a `WorkflowRun`.\n- `test_workflow_agent_by_id` — Same but using `StepAgent::ById` for direct agent reference.\n- `test_trigger_registration_with_kernel` — Registers `TriggerPattern::Lifecycle` and `TriggerPattern::SystemKeyword` triggers, verifies listing and removal.\n\n**Full E2E (requires `GROQ_API_KEY`):**\n\n`test_workflow_e2e_with_groq` runs a 2-step analyst→writer pipeline through the real LLM. Verifies:\n- Workflow completes successfully\n- Both steps produce non-zero token counts\n- `step_results[0].step_name == \"analyze\"`, `[1].step_name == \"summarize\"`\n- Run state is `Completed`\n- `list_runs()` returns the run\n\nUses `#![recursion_limit = \"256\"]` because the deeply-nested future from `LoopOptions` / `SessionInterrupt` changes can overflow the default 128.\n\n### Audit Retention (`audit_retention_test.rs`)\n\nSingle test (`test_kernel_boot_with_retention_config_starts_trim_task`) that validates the periodic audit log trim task:\n\n1. Boots the kernel with `max_in_memory_entries: Some(10)` and `trim_interval_secs: Some(1)`.\n2. Seeds 50 `AuditAction::RoleChange` entries (well over the cap).\n3. Calls `kernel.start_background_agents()` to spawn the periodic task.\n4. Sleeps 2.5s to allow at least one trim cycle.\n5. Asserts `audit.len() <= 20` (cap + self-audit row).\n6. Asserts at least one `AuditAction::RetentionTrim` self-audit row exists.\n7. Asserts `audit.verify_integrity()` still passes after trimming.\n\n### Purge Sentinels CLI (`purge_sentinels_test.rs`)\n\nBlack-box tests for the `purge_sentinels` binary, driven via `std::process::Command` with `env!(\"CARGO_BIN_EXE_purge_sentinels\")`.\n\n**Fixture setup:**\n\nCreates a temp directory with:\n- `a.md` — Contains whole-line sentinels (`NO_REPLY`, `[no reply needed]`)\n- `b.md` — Contains a mid-sentence `NO_REPLY` (should be preserved)\n- `c.md` — Clean file, no sentinels\n- `nested/d.md` — Lowercase `no_reply` with surrounding whitespace\n\n**Test cases:**\n\n| Test | Flags | Assertion |\n|------|-------|-----------|\n| `dry_run_reports_counts_and_touches_nothing` | `--dry-run` | Reports `removed=3` but files unchanged, no `.bak` created |\n| `apply_creates_backup_and_rewrites` | `--apply` | `.bak` matches original; sentinels removed from `a.md`; `b.md` unchanged (mid-sentence); `nested/d.md` cleaned |\n| `apply_is_idempotent` | `--apply` × 2 | Second run reports `removed=0`; files and backups unchanged |\n| `apply_aborts_when_existing_bak_differs` | `--apply` with stale `.bak` | Non-zero exit; stderr mentions \"backup mismatch\" |\n| `nonexistent_path_exits_non_zero` | `--apply /bad/path` | Non-zero exit; stderr mentions \"does not exist\" |\n\n## Common Patterns\n\n### Temp directory isolation\n\nEvery test creates an isolated temp directory under `std::env::temp_dir()` with a unique suffix:\n\n```rust\nfn test_config(name: &str) -> KernelConfig {\n    let tmp = std::env::temp_dir().join(format!(\"librefang-hand-test-{name}\"));\n    let _ = std::fs::remove_dir_all(&tmp);\n    std::fs::create_dir_all(&tmp).unwrap();\n    // ...\n}\n```\n\nThe RBAC tests use `tempfile::tempdir()` and intentionally leak the `TempDir` via `Box::leak` so the kernel's file paths remain valid for the test's duration.\n\n### Kernel boot and shutdown\n\nAll tests follow the same lifecycle:\n\n```rust\nlet kernel = LibreFangKernel::boot_with_config(config).expect(\"kernel boots\");\n// ... exercise kernel APIs ...\nkernel.shutdown();\n```\n\n`shutdown()` is always called, even in assertion-heavy tests, to ensure clean resource release.\n\n### LLM guard\n\nTests requiring a live LLM check the environment at the top:\n\n```rust\nif std::env::var(\"GROQ_API_KEY\").is_err() {\n    eprintln!(\"GROQ_API_KEY not set, skipping integration test\");\n    return;  // not a panic — test passes as \"ignored\"\n}\n```\n\nThis pattern means `cargo test` succeeds without API keys while still running all deterministic tests.\n\n### Multi-threaded runtime requirement\n\nTests that call `start_background_agents()` or exercise WASM execution use `#[tokio::test(flavor = \"multi_thread\")]` because the kernel's synchronous substrate touches (`toml_edit`, memory operations) use `tokio::task::block_in_place`, which panics on the current-thread runtime.","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\n**Core kernel for the LibreFang Agent OS**\n\nThe kernel is the central orchestration crate of the LibreFang agent. It wires together the LLM driver, skill system, hand (action) executors, extension loading, routing, metering, memory, and channel subsystems into a coherent agent runtime. Think of it as the process supervisor and message bus that gives all other components a place to plug in and cooperate.\n\n## Architecture\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --> KR[kernel-router]\n    K --> KM[kernel-metering]\n    K --> RT[runtime]\n    K --> LLM[llm-driver]\n    K --> SK[skills]\n    K --> HD[hands]\n    K --> EX[extensions]\n    K --> MEM[memory]\n    K --> WR[wire]\n    K --> CH[channels]\n    K --> TY[types]\n```\n\nThe kernel sits at the top of the dependency tree. Every other `librefang-*` crate provides a focused capability; the kernel owns initialization, configuration loading, lifecycle management, and the glue code that binds those capabilities into a running agent.\n\n## Key Responsibilities\n\n### Configuration Loading\nThe kernel reads agent configuration from multiple serialization formats — TOML, YAML, and JSON — via the respective `serde` frontends. Configuration covers LLM provider settings, channel definitions, scheduled tasks, and extension parameters.\n\n### Persistence (SQLite)\nUses `rusqlite` for local structured storage. This backs conversation history, metering records, agent state snapshots, and sentinel tracking.\n\n### Concurrency Model\n- **`tokio`** provides the async runtime.\n- **`dashmap`** is used for lock-free concurrent hash maps (e.g., active session registries, skill lookup tables).\n- **`arc-swap`** enables atomic swapping of shared configuration or service handles without stopping the world — important for hot-reload scenarios.\n\n### Authentication & Security\n- **`totp-rs`** — Time-based one-time password generation and verification for agent-to-controller authentication.\n- **`zeroize`** — Secure clearing of sensitive material (API keys, tokens, secrets) from memory after use.\n- **`subtle`** — Constant-time comparisons to prevent timing side-channels during credential checks.\n\n### Scheduled Tasks\nThe `cron` crate drives periodic agent behaviors — health checks, metering flushes, memory compaction, and similar housekeeping tasks defined in cron-expression syntax.\n\n### Platform-Specific Code\nOn Unix targets, `libc` is linked directly. This is used for low-level system interactions that `tokio` and the standard library don't cover (e.g., process signal handling, file descriptor management, or privilege operations relevant to an agent OS).\n\n## Subsystems Integration\n\n| Dependency | Role in the Kernel |\n|---|---|\n| `librefang-types` | Shared domain types exchanged across all subsystems |\n| `librefang-memory` | Short-term and long-term agent memory storage and retrieval |\n| `librefang-kernel-router` | Message routing between skills, hands, extensions, and the LLM |\n| `librefang-kernel-metering` | Token usage tracking, rate limiting, and quota enforcement |\n| `librefang-runtime` | Low-level runtime primitives the kernel builds upon |\n| `librefang-skills` | Pluggable skill definitions the agent can invoke |\n| `librefang-hands` | Action execution layer (tool use, API calls, file operations) |\n| `librefang-extensions` | Third-party or user-provided extension loading |\n| `librefang-llm-driver` | Unified interface to LLM providers |\n| `librefang-wire` | Wire protocol for inter-process and network communication |\n| `librefang-channels` | Inbound/outbound channel adapters (e.g., HTTP, WebSocket, CLI) |\n\n## Binary: `purge_sentinels`\n\nPath: `bin/purge_sentinels.rs`\n\nA maintenance utility that cleans up stale sentinel records from the SQLite database. Sentinels are lightweight markers used to track in-flight operations, lock ownership, or deduplication states. Over time, crashed or interrupted sessions can leave orphaned sentinels behind. Run this binary periodically (or via a cron job) to reclaim those resources:\n\n```sh\n# Typical usage\nlibrefang-kernel --bin purge_sentinels\n```\n\nThe binary links against the same `rusqlite` storage layer used by the main kernel, so it operates on the same database and respects the same schema.\n\n## HTTP Client\n\nThe kernel depends on `reqwest` for outbound HTTP calls — primarily for contacting LLM provider APIs, but also for webhook delivery and extension endpoint probing.\n\n## Pattern Matching\n\nBoth `regex` and `regex-lite` are included. The kernel uses `regex-lite` for lightweight, compile-time-fast pattern matching in hot paths (e.g., message classification), and the full `regex` crate where advanced features like lookahead or Unicode character classes are needed.\n\n## Time Handling\n\n`chrono` and `chrono-tz` provide timezone-aware datetime arithmetic, used in cron scheduling, metering window calculations, and audit log timestamps.\n\n## Development & Testing\n\nDev dependencies include `tokio-test` for async test utilities and `tempfile` for creating isolated temporary directories during tests — essential for tests that touch the SQLite database or file system without polluting the host environment.","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\n## Purpose\n\n`librefang-llm-driver` provides the abstract interface and shared types that decouple LibreFang's core logic from any specific LLM provider. It defines the **trait** that concrete LLM backends must implement, along with the request/response types and error definitions they share.\n\nThis module contains no concrete implementations — it exists so that the rest of the codebase can depend on a stable abstraction without being tied to a particular LLM service.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared domain types used across the project |\n| `async-trait` | Enables `async fn` in trait definitions |\n| `serde` / `serde_json` | Serialization of request and response types |\n| `thiserror` | Derived `Error` enum for driver-specific failures |\n| `tokio` | Async runtime support |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Core / Game Logic] -->|depends on| B[librefang-llm-driver]\n    B -->|trait definition| C[LLM Driver Trait]\n    B -->|shared types| D[Request / Response / Error Types]\n    E[Concrete LLM Backend] -->|implements| C\n    F[Another LLM Backend] -->|implements| C\n    A -->|uses| E\n    A -->|uses| F\n```\n\nThe core game logic only knows about the trait defined here. Concrete backends (e.g., an OpenAI driver, a local model driver) depend on this crate, implement the trait, and are injected at runtime.\n\n## Key Components\n\n### LLM Driver Trait\n\nAn async trait (via `async-trait`) that defines the contract every LLM backend must satisfy. Implementors receive a request, interact with their specific LLM service, and return a typed response.\n\n### Shared Types\n\nRequest and response structures annotated with `serde` derive macros. These are the common language between callers and drivers — regardless of which LLM provider sits behind the trait, the data flowing in and out uses the same shapes.\n\n### Error Type\n\nA `thiserror`-derived error enum representing failures that can occur during LLM interaction (e.g., network errors, rate limits, malformed responses). This gives callers a uniform error type to match on, independent of the backend.\n\n## Integration\n\nTo use this module from another crate:\n\n```toml\n[dependencies]\nlibrefang-llm-driver = { path = \"../librefang-llm-driver\" }\n```\n\nTo implement a new LLM backend, depend on this crate, import the driver trait, and implement it for your backend struct. The rest of LibreFang can then accept your backend as a generic or trait object.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait. This crate contains the actual integrations with LLM APIs—Anthropic, OpenAI, Gemini, and others—translating the shared driver interface into provider-specific HTTP requests and response parsing.\n\n## Purpose\n\nWhile `librefang-llm-driver` defines *what* an LLM driver looks like (the trait), this crate provides the *implementations*. Each driver handles the specifics of its provider's authentication scheme, request format, streaming protocol, and response structure, while exposing a uniform interface to the rest of the application.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver<br/>trait definition] --> B[librefang-llm-drivers<br/>concrete implementations]\n    B --> C[Anthropic Driver]\n    B --> D[OpenAI Driver]\n    B --> E[Gemini Driver]\n    B --> F[Other Providers]\n    C & D & E & F --> G[librefang-http<br/>HTTP client layer]\n    H[librefang-runtime-oauth] --> C & D & E & F\n    B --> I[librefang-types<br/>shared types]\n```\n\n## Key Dependencies and Their Roles\n\n| Dependency | Role |\n|---|---|\n| `librefang-llm-driver` | Provides the trait (`LlmDriver` or similar) that each provider implements |\n| `librefang-types` | Shared types for prompts, completions, messages, and error types |\n| `librefang-http` | HTTP client abstraction used to make outbound requests to provider APIs |\n| `librefang-runtime-oauth` | OAuth token acquisition for providers that require dynamic authentication |\n| `reqwest` | Underlying HTTP client for raw request/response handling |\n| `async-trait` | Enables async methods in the driver trait implementation |\n| `serde` / `serde_json` | Serialization of request bodies and deserialization of provider responses |\n| `dashmap` | Concurrent map, likely used for caching tokens or connection state |\n| `sha2` | Hashing, possibly for request signing or cache key generation |\n| `zeroize` | Secure clearing of sensitive data (API keys, tokens) from memory |\n\n## How It Works\n\nEach driver follows a consistent internal pattern:\n\n1. **Request Construction** — Translates the generic prompt/completion request into the provider's native JSON format.\n2. **Authentication** — Attaches the appropriate credentials. This may be a static API key, a Bearer token, or an OAuth token obtained via `librefang-runtime-oauth`.\n3. **HTTP Dispatch** — Sends the request through `librefang-http`, which wraps `reqwest` with shared configuration, retry logic, and observability.\n4. **Response Parsing** — Deserializes the provider-specific response into the shared types from `librefang-types`.\n5. **Credential Cleanup** — Uses `zeroize` to securely clear API keys and tokens from memory when they are no longer needed.\n\n## Adding a New Provider\n\nTo add support for a new LLM provider:\n\n1. Create a new module file (e.g., `src/newprovider.rs`).\n2. Define a struct representing the driver, holding any provider-specific configuration (API key, base URL, model identifiers).\n3. Implement the driver trait from `librefang-llm-driver` for your struct.\n4. Handle request serialization matching the provider's API specification.\n5. Register the driver in the module's public exports so consumers can instantiate it.\n\nKey considerations for new drivers:\n- Use `librefang-http` for all outbound requests rather than calling `reqwest` directly, to maintain consistent tracing, error handling, and retry behavior.\n- If the provider uses OAuth, integrate with `librefang-runtime-oauth` for token management.\n- Ensure all sensitive fields (keys, tokens) derive or implement `Zeroize` so they are scrubbed from memory on drop.\n- Use `tracing` instrumentation on public methods for observability.\n\n## Connection to the Codebase\n\nThis crate sits between the abstract driver interface and the network layer:\n\n- **Downstream consumers** (e.g., `librefang-core`, application code) depend only on `librefang-llm-driver` for the trait, then select a concrete driver from this crate at runtime or configuration time.\n- **Upstream dependencies** provide the building blocks: trait definition, types, HTTP transport, and OAuth flow.\n\nBecause the trait is the contract, the rest of the codebase never needs to know which provider is in use. Swapping from OpenAI to Anthropic is a matter of changing which concrete driver is instantiated.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests\n\nIntegration regression tests for chat-scoped canonical context filtering in `librefang-memory`.\n\n## Purpose\n\nThis module guards against a cross-channel message leak in the canonical memory store. Before the fix in `session.rs`, every WhatsApp DM and group that shared the same `AgentId` had each other's history injected into the LLM prompt. A private DM could surface group messages, and vice versa. The fix tags each `CanonicalEntry` with the originating `SessionId` and filters by that tag at read time.\n\nThe tests exercise the full append → load → context roundtrip through the crate's public API (`SessionStore`), which is the same path the kernel calls on every inbound message.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[setup] --> B[run_migrations]\n    A --> C[SessionStore::new]\n    C --> D[append_canonical]\n    C --> E[canonical_context]\n    D --> F[(SQLite in-memory)]\n    E --> F\n```\n\nEvery test opens a fresh in-memory SQLite database, runs schema migrations, and constructs a `SessionStore` backed by an `Arc<Mutex<Connection>>`. This mirrors the production setup without requiring a persistent database.\n\n## Test Infrastructure\n\n### `setup()`\n\nCreates an isolated `SessionStore` for each test:\n\n1. Opens an in-memory SQLite connection via `Connection::open_in_memory`.\n2. Runs database migrations via `run_migrations(&conn)`.\n3. Wraps the connection in `Arc<Mutex<Connection>>` and returns a new `SessionStore`.\n\n### `user_msg(text)`\n\nHelper that builds a `Message` with `Role::User`, `MessageContent::Text`, no pin, and no timestamp. Keeps test assertions focused on content rather than message construction.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it validates:** Session-scoped filtering prevents cross-channel leakage.\n\n**Scenario:** A single agent serves both a WhatsApp DM (with Jessica) and a WhatsApp group (containing Jessica). Messages arrive interleaved across both sessions.\n\n**Steps:**\n\n1. Derive two `SessionId` values from channel identifiers using `SessionId::for_channel`:\n   - `session_dm` ← `\"whatsapp:393331111111@s.whatsapp.net\"`\n   - `session_group` ← `\"whatsapp:120363111111111111@g.us\"`\n2. Assert the two session IDs differ (different chats must not collapse to the same session).\n3. Append `\"dm-1\"` → `\"group-1\"` → `\"dm-2\"` in that order, each tagged with its own `SessionId`.\n4. Call `canonical_context(agent, Some(session_dm), None)` and assert the returned messages are exactly `[\"dm-1\", \"dm-2\"]` — no `\"group-1\"`.\n5. Call `canonical_context(agent, Some(session_group), None)` and assert the returned messages are exactly `[\"group-1\"]` — no `\"dm-1\"` or `\"dm-2\"`.\n\n**Failure mode:** If `append_canonical` stops tagging entries with `SessionId`, or if `canonical_context` stops filtering by that tag, the DM context will contain `\"group-1\"` and the test fails.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it validates:** Passing `session_id = None` to `canonical_context` returns messages from all sessions, preserving the original cross-channel semantics.\n\n**Scenario:** Two sessions on different platforms (WhatsApp and Telegram) each contribute one message.\n\n**Steps:**\n\n1. Append `\"a-1\"` tagged with `session_a` and `\"b-1\"` tagged with `session_b`.\n2. Call `canonical_context(agent, None, None)` (no session filter).\n3. Assert the returned messages are `[\"a-1\", \"b-1\"]`.\n\n**Failure mode:** If the unfiltered path is accidentally broken by the session-scoping change, this test catches the regression.\n\n## Relationships to Other Modules\n\n| Module | Relationship |\n|---|---|\n| `librefang-memory::session` | Primary target. Tests call `SessionStore::append_canonical` and `SessionStore::canonical_context`. |\n| `librefang-memory::migration` | `setup` calls `run_migrations` to prepare the schema. |\n| `librefang-types::agent` | Uses `AgentId::new()` and `SessionId::for_channel` to derive session identities from channel addresses. |\n| `librefang-types::message` | Constructs `Message` with `Role`, `MessageContent`, and related fields. |\n\n## Running\n\n```bash\n# From the workspace root\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n```","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Overview\n\n`librefang-memory` provides the persistence and state management layer for LibreFang agents. It abstracts storage operations behind a substrate that other modules can rely on for reading, writing, querying, and managing agent state across resta
