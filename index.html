n\nConsumers of this crate should expect to:\n\n1. Initialize an MCP client with a target endpoint URL\n2. Use the client to list available tools, invoke tools, and handle responses\n3. Rely on the crate for proper serialization of MCP-compliant messages\n\n## Building\n\n```bash\ncargo build -p librefang-runtime-mcp\n```\n\n## Testing\n\n```bash\ncargo test -p librefang-runtime-mcp\n```","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication flows for LibreFang runtime drivers, providing token acquisition and refresh for third-party AI services (ChatGPT, GitHub Copilot).\n\n## Purpose\n\nThis module encapsulates the full OAuth lifecycle required by runtime drivers that authenticate against external providers. It isolates credential handling, PKCE generation, token exchange, and refresh logic into a dedicated crate so that drivers remain focused on request orchestration rather than authentication mechanics.\n\n## Dependencies & What They Signal\n\n| Dependency | Role in This Module |\n|---|---|\n| `librefang-types` | Shared types — likely `TokenResponse`, credential structs, error enums |\n| `librefang-http` | Shared HTTP client configuration and middleware |\n| `reqwest` | Outbound HTTP calls to authorization and token endpoints |\n| `tokio` | Async runtime for I/O-bound OAuth exchanges |\n| `serde` / `serde_json` | Serialization of token payloads and provider responses |\n| `base64` / `sha2` / `hex` | PKCE code verifier/challenge generation (SHA-256 digest, base64url encoding) |\n| `rand` | Cryptographically secure random generation for `state` and `code_verifier` values |\n| `zeroize` | Secure memory clearing for secrets (verifiers, client secrets, tokens) |\n| `thiserror` | Typed error definitions for OAuth-specific failure modes |\n| `tracing` | Structured logging of flow progress and failures |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests token| B[librefang-runtime-oauth]\n    B -->|PKCE + auth URL| C[Browser / User Agent]\n    C -->|callback with code| B\n    B -->|token exchange| D[OAuth Provider]\n    D -->|access + refresh tokens| B\n    B -->|typed tokens| A\n    B -->|HTTP calls| E[librefang-http]\n    B -->|shared types| F[librefang-types]\n```\n\nThe module acts as a bridge between the runtime driver (which needs an access token to call an AI provider's API) and the OAuth provider's token endpoints. It does not embed a browser; it produces authorization URLs and consumes redirect callbacks.\n\n## Key Concepts\n\n### PKCE (Proof Key for Code Exchange)\n\nAll flows use PKCE to protect the authorization code exchange:\n\n1. **Generate** a random `code_verifier` (high-entropy string via `rand`).\n2. **Derive** the `code_challenge` by computing `SHA-256(code_verifier)` and base64url-encoding the digest (`sha2` + `base64`).\n3. **Include** the `code_challenge` and `code_challenge_method=S256` in the authorization URL.\n4. **Send** the original `code_verifier` during the token exchange to prove possession.\n\nThe `zeroize` dependency ensures that `code_verifier` and any client secrets are cleared from memory once the exchange completes.\n\n### Supported Providers\n\n- **ChatGPT (OpenAI)** — OAuth flow targeting OpenAI's authorization server.\n- **GitHub Copilot** — OAuth flow targeting GitHub's device-flow or web-flow authorization.\n\nEach provider has distinct endpoints, scopes, and token response shapes, but the underlying PKCE and token lifecycle is shared.\n\n### Token Lifecycle\n\n1. **Authorization request** — Build a URL the user visits to grant consent.\n2. **Code exchange** — Redeem the authorization code (received via callback) for access and refresh tokens.\n3. **Token refresh** — Use the refresh token to obtain a new access token when the current one expires.\n4. **Secure disposal** — Zeroize all intermediate secrets.\n\n## Error Handling\n\nErrors are defined via `thiserror` and cover:\n\n- Network failures during token exchange (`reqwest` errors)\n- Provider-specific error responses (`invalid_grant`, `expired_token`, etc.)\n- PKCE or state mismatches (possible tampering or session corruption)\n- Missing or malformed configuration\n\nAll errors implement `std::error::Error` and integrate with `tracing` for structured diagnostics.\n\n## Integration Points\n\n### Consuming from a Runtime Driver\n\nA runtime driver depends on this crate and calls into it to:\n\n1. Obtain an authorization URL to present to the user.\n2. Handle the callback containing the authorization code.\n3. Complete the exchange and receive a typed `TokenResponse`.\n4. Periodically refresh the token using the stored refresh token.\n\n### Relationship to Other Crates\n\n- **`librefang-types`** — This crate reuses or re-exports token and credential types rather than defining its own duplicates.\n- **`librefang-http`** — HTTP calls go through the shared HTTP layer, inheriting its proxy support, timeout configuration, and TLS settings.\n\n## Security Considerations\n\n- **`zeroize`** is used for all secret values to minimize the window of exposure in memory.\n- **`state` parameter** is randomly generated per-request and validated on callback to prevent CSRF.\n- **No secrets in logs** — `tracing` spans log flow progress (e.g., \"token exchange started\", \"token refreshed\") but never log credentials, verifiers, or token values.\n- **PKCE** eliminates the need to embed a `client_secret` in desktop/runtime applications where the secret cannot be safely stored.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime/tests/mcp_oauth_integration\n\nIntegration tests for MCP (Model Context Protocol) OAuth discovery, provider wiring, token lifecycle, and auth state serialization.\n\n## Purpose\n\nThis test module validates two critical areas of the MCP OAuth system:\n\n1. **OAuth provider integration** — ensuring the OAuth provider is correctly wired into the MCP connection layer and not silently dropped.\n2. **Token lifecycle correctness** — store, load, clear, isolation, and re-authorization behavior through the `McpOAuthProvider` trait.\n\nSeveral tests are explicitly marked as **regression tests**, guarding against specific historical bugs.\n\n## Test Categories\n\n### OAuth Metadata Discovery\n\nThese tests exercise `discover_oauth_metadata` from `librefang-runtime`'s `mcp_oauth` module.\n\n| Test | What it verifies |\n|---|---|\n| `test_discover_fallback_to_config` | When the remote `.well-known` endpoint is unreachable, the function falls back to values supplied in `McpOAuthConfig` and returns a valid `OAuthMetadata` with the configured `auth_url`, `token_url`, and `client_id`. |\n| `test_discover_fails_without_any_source` | When no remote metadata is available **and** no `McpOAuthConfig` is provided, the function returns an error containing `\"OAuth metadata\"`. |\n\n### OAuth Provider Wiring Regression\n\n**`test_http_connect_calls_oauth_provider_load_token`**\n\nThis is a regression test for a bug where `oauth_provider: None` was passed in the kernel's `connect_mcp_servers` function, silently disabling the entire OAuth flow. The test:\n\n1. Creates a `TrackingOAuthProvider` (see mock providers below) that atomically records whether `load_token` was called.\n2. Configures an `McpConnection` targeting `127.0.0.1:1` (guaranteed connection failure) with the tracking provider.\n3. Asserts the connection fails (expected).\n4. **Critically**, asserts that `load_token` was called on the provider, proving the provider reference survived into the connection layer and wasn't replaced with `None`.\n\n### Token Lifecycle Tests\n\nThese tests use the `InMemoryOAuthProvider` mock to validate the `McpOAuthProvider` trait contract without a vault dependency.\n\n| Test | Flow | Assertion |\n|---|---|---|\n| `test_provider_store_then_load` | `load` (empty) → `store` → `load` | Initially returns `None`; after store, returns the exact access token. |\n| `test_provider_clear_removes_token` | `store` → `load` (present) → `clear` → `load` | Token present before clear, absent after. |\n| `test_provider_clear_is_isolated` | `store` for A and B → `clear` A → `load` B | Clearing A's tokens does not affect B's tokens. |\n| `test_provider_reauthorize_after_clear` | `store` v1 → `clear` → `store` v2 → `load` | After revocation, re-authorization stores a new token that loads correctly (state transition: `tok_v1` → gone → `tok_v2`). |\n\n### Auth State Serialization\n\nTwo synchronous tests validate the `McpAuthState` enum's serialization behavior:\n\n| Test | What it verifies |\n|---|---|\n| `test_auth_state_lifecycle` | Full lifecycle: `NeedsAuth` → `PendingAuth` → `Authorized` → `NeedsAuth` (after revoke). Each state serializes with the correct `\"state\"` JSON key. The final state after revocation is `NeedsAuth`, ensuring the \"Authorize\" button reappears in the dashboard. |\n| `test_needs_auth_serializes_differently_from_pending_auth` | Regression test: `NeedsAuth` and `PendingAuth` produce different `\"state\"` values (`\"needs_auth\"` vs `\"pending_auth\"`), preventing the dashboard from showing \"Authorizing...\" before the user initiates authorization. |\n\n## Mock Providers\n\n### `TrackingOAuthProvider`\n\nA minimal `McpOAuthProvider` implementation that uses an `AtomicBool` to record whether `load_token` was invoked. Used exclusively by the wiring regression test.\n\n- `load_token` — sets the flag to `true`, returns `None` (forces 401 failure).\n- `store_tokens` — no-op, returns `Ok(())`.\n- `clear_tokens` — no-op, returns `Ok(())`.\n\nThread-safe via `AtomicBool` with `Ordering::SeqCst`.\n\n### `InMemoryOAuthProvider`\n\nA fully functional in-memory `McpOAuthProvider` backed by a `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`. Used by all token lifecycle tests.\n\n- `load_token` — returns the stored `access_token` for the given server URL, or `None`.\n- `store_tokens` — inserts or replaces the token entry for the server URL.\n- `clear_tokens` — removes the entry for the server URL only (isolation guaranteed by HashMap key).\n\n## Dependencies\n\n```mermaid\ngraph TD\n    subgraph \"Test Module (mcp_oauth_integration.rs)\"\n        A[discover_oauth_metadata tests]\n        B[OAuth wiring regression test]\n        C[Token lifecycle tests]\n        D[Auth state serialization tests]\n    end\n\n    subgraph \"Production Code\"\n        E[discover_oauth_metadata]:::prod\n        F[McpConnection::connect]:::prod\n        G[McpOAuthProvider trait]:::prod\n        H[McpAuthState enum]:::prod\n        I[OAuthTokens struct]:::prod\n    end\n\n    A --> E\n    B --> F\n    C --> G\n    C --> I\n    D --> H\n\n    classDef prod fill:#e8f4e8,stroke:#4a9\n```\n\n## Running\n\n```bash\n# All tests in this module\ncargo test -p librefang-runtime --test mcp_oauth_integration\n\n# Only the OAuth wiring regression test\ncargo test -p librefang-runtime --test mcp_oauth_integration test_http_connect_calls_oauth_provider_load_token\n\n# Only synchronous auth state tests\ncargo test -p librefang-runtime --test mcp_oauth_integration -- --test-threads=1 test_auth_state\n```","other-librefang-runtime-wasm":"# Other — librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime. This crate provides a WebAssembly-based execution environment that isolates and runs user-defined \"skills\" — plugin-like game logic — within sandboxed WASM instances.\n\n## Purpose\n\nSkills in LibreFang are authored as WebAssembly modules and executed in a controlled sandbox. This crate owns the lifecycle of those modules: loading WASM binaries, instantiating them via the [Wasmtime](https://wasmtime.dev/) runtime, and mediating all communication between guest code and the host system.\n\nBy compiling skills to WASM, the system gains:\n\n- **Memory safety** — guest code cannot corrupt host memory\n- **Resource limits** — CPU and memory budgets are enforced by the runtime\n- **Portability** — skills can be authored in any language that targets WASM\n\n## Dependencies\n\nThe crate sits between the kernel layer and the broader LibreFang ecosystem:\n\n| Dependency | Role |\n|---|---|\n| `wasmtime` | WASM compilation, instantiation, and execution |\n| `librefang-types` | Shared domain types passed across the host/guest boundary |\n| `librefang-kernel-handle` | Handle protocol for communicating with the game kernel |\n| `librefang-http` | HTTP utilities, likely for fetching remote WASM modules or exposing skill APIs |\n| `tokio` | Async runtime backing all WASM invocation |\n| `serde` / `serde_json` | Serialization of data exchanged with WASM guests |\n| `reqwest` | HTTP client for external requests made on behalf of skill modules |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Kernel] -->|dispatch skill invocation| B[librefang-runtime-wasm]\n    B -->|load & instantiate| C[Wasmtime Engine]\n    C -->|execute| D[WASM Skill Module]\n    D -->|host calls| B\n    B -->|kernel protocol| E[librefang-kernel-handle]\n    B -->|shared types| F[librefang-types]\n    B -->|HTTP fetch/proxy| G[librefang-http]\n```\n\n## Key Concepts\n\n### Skill Lifecycle\n\n1. **Loading** — A WASM binary (the compiled skill) is fetched or read from storage. `reqwest` and `librefang-http` may be involved for remote modules.\n2. **Compilation** — The binary is compiled through the Wasmtime engine.\n3. **Instantiation** — A module instance is created with configured imports (host functions the skill can call) and resource limits.\n4. **Invocation** — The host calls an exported function on the instance (e.g., a skill entry point), passing serialized input via `serde_json`.\n5. **Teardown** — The instance is dropped, releasing its linear memory and any allocated resources.\n\n### Host-Guest Boundary\n\nAll data crossing the WASM boundary is serialized to JSON or passed as primitive types. The crate defines host functions that guest modules can import — these are the only way a skill can interact with the outside game state. Typical host functions include:\n\n- Reading game state through the kernel handle\n- Sending messages or events\n- Making bounded HTTP requests via `reqwest`\n\n### Sandboxing\n\nWasmtime enforces isolation at the instruction level. Each skill instance operates in its own linear memory with a configured ceiling. The host controls exactly which capabilities are exposed through the import table — a skill cannot access the filesystem, network, or kernel except through explicitly provided host functions.\n\n## Integration Points\n\nThis crate is consumed by higher orchestration layers (likely the main server or a skill manager) that decide *when* to instantiate and invoke skills. It exposes the runtime machinery while remaining agnostic to scheduling or routing decisions.\n\nThe `librefang-kernel-handle` dependency suggests that skill invocations may need to query or mutate kernel state, with the handle providing the typed protocol for those operations.","other-librefang-runtime":"# Other — librefang-runtime\n\n# librefang-runtime\n\nThe core agent execution environment for LibreFang. This crate orchestrates the full lifecycle of an AI agent — from loading a configuration and connecting to an LLM provider, through managing conversation memory and executing tools, to running sandboxed WASM skills and communicating over MCP channels.\n\n## Architecture\n\n`librefang-runtime` is the integration point that pulls together domain-specific subsystems into a coherent agent loop. It does not implement low-level details itself; instead it coordinates the following sibling crates:\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    librefang-runtime                         │\n│                  (agent orchestration)                       │\n│                                                              │\n│  ┌──────────┐ ┌───────────┐ ┌────────────┐ ┌─────────────┐ │\n│  │ LLM      │ │ Skill     │ │ Memory     │ │ Channel     │ │\n│  │ Drivers  │ │ Execution │ │ Management │ │ I/O         │ │\n│  └────┬─────┘ └─────┬─────┘ └─────┬──────┘ └──────┬──────┘ │\n│       │             │             │                │        │\n│  ┌────┴─────┐ ┌─────┴──────┐ ┌───┴──────┐ ┌──────┴──────┐ │\n│  │ -llm-    │ │ -runtime-  │ │ -memory  │ │ -channels   │ │\n│  │ driver   │ │ wasm       │ │          │ │              │ │\n│  │ -llm-    │ │ -skills    │ │          │ │              │ │\n│  │ drivers  │ │ -kernel-   │ │          │ │              │ │\n│  │          │ │  handle    │ │          │ │              │ │\n│  └──────────┘ └────────────┘ └──────────┘ └─────────────┘ │\n│                                                              │\n│  ┌──────────────────┐ ┌────────────────────────────────┐    │\n│  │ -runtime-mcp     │ │ -runtime-oauth                 │    │\n│  │ (Model Context   │ │ (OAuth token management)       │    │\n│  │  Protocol)       │ │                                 │    │\n│  └──────────────────┘ └────────────────────────────────┘    │\n│                                                              │\n│  ┌──────────────────┐ ┌────────────────────────────────┐    │\n│  │ -types           │ │ -http                           │    │\n│  │ (shared types)   │ │ (HTTP primitives)               │    │\n│  └──────────────────┘ └────────────────────────────────┘    │\n└─────────────────────────────────────────────────────────────┘\n```\n\n### Dependency roles\n\n| Crate | Role in the runtime |\n|---|---|\n| `librefang-types` | Shared domain types — agent IDs, message structs, configuration shapes — used across all crates. |\n| `librefang-http` | Low-level HTTP primitives for outbound requests to LLM APIs and other services. |\n| `librefang-kernel-handle` | Kernel-level interfaces used during sandboxed execution and process management. |\n| `librefang-runtime-mcp` | Model Context Protocol client/server implementation for tool discovery and invocation. |\n| `librefang-runtime-oauth` | OAuth 2.0 flows for authenticating with LLM providers and third-party APIs. |\n| `librefang-llm-driver` | Trait-level abstraction for LLM backends (streaming, chat completions, embeddings). |\n| `librefang-llm-drivers` | Concrete driver implementations (OpenAI, Anthropic, local models, etc.). |\n| `librefang-runtime-wasm` | WASM-based sandboxed execution engine for running untrusted skill code via Wasmtime. |\n| `librefang-channels` | Async message-passing channels between agent components and external systems. |\n| `librefang-memory` | Conversation and working-memory persistence (backed by SQLite via `rusqlite`). |\n| `librefang-skills` | Skill registry and execution — tools, functions, and capabilities an agent can invoke. |\n\n## Sandbox features\n\nThe runtime supports two optional Linux sandboxing mechanisms to constrain untrusted code execution:\n\n### Landlock (`landlock-sandbox` feature)\n\nEnables the `landlock` crate for file-system access control. When active, WASM skill execution and subprocess spawning can be restricted to specific directory trees, preventing arbitrary file access.\n\n```toml\n# Cargo.toml\n[features]\nlandlock-sandbox = [\"dep:landlock\"]\n```\n\nRequires Linux kernel ≥ 5.13.\n\n### Seccomp (`seccomp-sandbox` feature)\n\nEnables the `seccompiler` crate to install BPF syscall filters. This provides a hard boundary on which system calls sandboxed code can make.\n\n```toml\n# Cargo.toml\n[features]\nseccomp-sandbox = [\"dep:seccompiler\"]\n```\n\nBoth features can be combined for defense in depth. On non-Linux platforms these features compile but are no-ops.\n\n### WASM hooks (`wasm-hooks` feature)\n\nAn additional feature flag that extends the WASM runtime with host-side hook callbacks. Enable this when skills need to react to lifecycle events (initialization, pre/post-execution, teardown) within the Wasmtime environment.\n\n## Key subsystems\n\n### Agent execution loop\n\nThe runtime drives a repeating cycle:\n\n1. **Receive input** — from a channel, WebSocket (`tokio-tungstenite`), or HTTP endpoint.\n2. **Load context** — conversation history and working memory from `librefang-memory`.\n3. **Call the LLM** — via `librefang-llm-driver` / `librefang-llm-drivers`, supporting streaming responses.\n4. **Process tool calls** — if the LLM requests tool use, dispatch through `librefang-skills` or `librefang-runtime-mcp`.\n5. **Execute skills** — optionally sandboxed via `librefang-runtime-wasm` (Wasmtime).\n6. **Persist state** — store updated memory, conversation turns, and skill results.\n7. **Emit output** — back through the originating channel.\n\n### Memory and persistence\n\n`rusqlite` provides local SQLite storage for conversation history, agent configuration, and session state. The `librefang-memory` crate exposes the interface; the runtime manages lifecycle (opening connections, running migrations).\n\n### Cryptography and identity\n\n- `ed25519-dalek` — Ed25519 signing/verification for agent identity and message authentication.\n- `sha2` / `hmac` — HMAC-based integrity checks and hashing.\n- `zeroize` — secure memory cleanup for sensitive key material.\n\n### Concurrency model\n\nThe runtime is fully async, built on `tokio`. Shared state uses `dashmap` for lock-free concurrent access to registries (active agents, skill caches, session maps). Stream handling uses `tokio-stream` and `futures` utilities.\n\n### Package management\n\n`flate2` and `tar` handle unpacking skill packages and WASM modules distributed as `.tar.gz` archives. `ureq` (blocking HTTP) is used for simple fetch-and-verify operations during package download where an async HTTP client is unnecessary.\n\n## Building\n\n```bash\n# Standard build (no sandboxing)\ncargo build -p librefang-runtime\n\n# With Landlock sandboxing (Linux only)\ncargo build -p librefang-runtime --features landlock-sandbox\n\n# With both sandboxing mechanisms\ncargo build -p librefang-runtime --features \"landlock-sandbox,seccomp-sandbox\"\n\n# With WASM lifecycle hooks\ncargo build -p librefang-runtime --features wasm-hooks\n```\n\n## Platform notes\n\n- **Unix-specific**: The `libc` dependency (gated behind `cfg(unix)`) is used for POSIX process management — UID/GID switching, `chroot`, signal handling — when running sandboxed subprocesses.\n- **Non-Linux**: The `landlock-sandbox` and `seccomp-sandbox` features depend on Linux-specific syscalls. They compile on other platforms but provide no runtime isolation.\n- **TLS**: `rustls` with `webpki-roots` and `rustls-native-certs` provides TLS for outbound connections without depending on OpenSSL.","other-librefang-skills":"# Other — librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang providing a local registry, filesystem loader, remote marketplace client, and OpenClaw compatibility layer.\n\n## Overview\n\nSkills are the primary extensibility mechanism in LibreFang. This crate is responsible for every stage of a skill's lifecycle: discovery on disk or from a remote marketplace, loading and parsing of skill manifests, version resolution, integrity verification, and registration into a queryable in-memory registry.\n\nThe crate is intentionally self-contained. It depends on `librefang-types` for shared data structures but does not call into any other LibreFang crate, nor does any other crate call into it at the code level. Downstream consumers instantiate and drive the APIs from their own runtime context.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Skill Registry] --> B[Local Loader]\n    A --> C[Marketplace Client]\n    B --> D[Manifest Parser]\n    D --> E[TOML / YAML / JSON]\n    C --> F[HTTPS via reqwest + rustls]\n    C --> G[Integrity Check - sha2]\n    B --> H[ZIP Archive Support]\n    A --> I[OpenClaw Adapter]\n```\n\n## Key Components\n\n### Skill Registry\n\nAn in-memory store of loaded skill definitions. Skills are keyed by a unique identifier and version. The registry supports:\n\n- Looking up a skill by name and optional version constraint\n- Listing all available skills\n- Resolving semantic version constraints to a single best match using the `semver` crate\n\n### Local Loader\n\nScans configured skill directories using `walkdir`, parses each skill's manifest, and registers valid skills. The loader handles three manifest formats via `serde`:\n\n- **TOML** — the native LibreFang format\n- **YAML** — via `serde_yaml`\n- **JSON** — via `serde_json`\n\nSkills packaged as `.zip` archives are extracted in-memory using the `zip` crate before manifest parsing.\n\nThe `dirs` crate resolves platform-appropriate default directories when no explicit paths are configured.\n\n### Marketplace Client\n\nDownloads skills from a remote marketplace over HTTPS. Key details:\n\n- Uses `reqwest` with `rustls` for TLS — no native OpenSSL dependency\n- Loads system root certificates via `rustls-native-certs` and bundles Mozilla roots via `webpki-roots` as a fallback\n- Verifies downloaded artifacts against their published SHA-256 digests using `sha2` and `hex`\n- File locking via `fs2` prevents concurrent write corruption when multiple processes install skills simultaneously\n\nAll network operations are async and rely on the `tokio` runtime.\n\n### OpenClaw Adapter\n\nProvides compatibility with OpenClaw-formatted skill packages. The adapter translates OpenClaw manifest fields and directory structures into LibreFang's native representation so that existing OpenClaw skills can be loaded without modification.\n\n### Version Management\n\nAll skill versions follow semantic versioning. The `semver` crate is used to parse version strings, compare versions, and evaluate version requirement expressions (e.g., `^1.2.0`, `>=2.0.0-beta`).\n\n## Dependency Rationale\n\n| Dependency | Role in this crate |\n|---|---|\n| `aho-corasick` | Fast multi-pattern matching for skill name and command lookups |\n| `chrono` | Timestamps on cached marketplace responses and skill installation metadata |\n| `fs2` | File locking during skill installation to avoid race conditions |\n| `semver` | Parsing and comparing skill version numbers |\n| `sha2` / `hex` | SHA-256 integrity verification of downloaded artifacts |\n| `uuid` | Unique identifiers for marketplace transactions and cache entries |\n| `zip` | Reading skills distributed as ZIP archives |\n| `walkdir` | Recursive directory traversal during skill discovery |\n| `serde_json` / `toml` / `serde_yaml` | Deserialization of skill manifests in three formats |\n\n## Error Handling\n\nErrors are expressed through thiserror-derived types. The main error categories are:\n\n- **IO errors** — permission denied, missing directories, corrupt ZIP archives\n- **Parse errors** — malformed manifests, invalid TOML/YAML/JSON\n- **Network errors** — marketplace unreachable, TLS handshake failure, HTTP error responses\n- **Integrity errors** — SHA-256 digest mismatch after download\n- **Version errors** — unresolvable version constraints\n\nAll errors carry enough context for the caller to report actionable messages.\n\n## Logging\n\nThe crate emits structured log entries via `tracing` spans at standard levels:\n\n- `DEBUG` — individual files scanned, manifests parsed, cache hits/misses\n- `INFO` — skills loaded, marketplace queries, installations completed\n- `WARN` — skipped invalid manifests, version conflicts\n- `ERROR` — download failures, integrity check failures\n\n## Testing\n\nTests use `tempfile` to create isolated directory trees for the local loader and registry, avoiding side effects on the developer's actual skill directory. `tokio-test` provides the async runtime for marketplace client tests.","other-librefang-telemetry":"# Other — librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry and Prometheus metrics instrumentation for the LibreFang project.\n\n## Overview\n\n`librefang-telemetry` provides a centralized metrics layer for the LibreFang ecosystem. It wraps the `metrics` crate and exposes a consistent instrumentation surface that other LibreFang crates can depend on without each one needing to configure exporters or metric sinks independently.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `metrics` | Core metrics facade — provides counters, gauges, histograms, and the macro interface for recording values |\n| `librefang-types` | Shared type definitions across the LibreFang workspace |\n\n**Dev dependencies:**\n\n| Dependency | Purpose |\n|---|---|\n| `tokio-test` | Async test utilities for validating telemetry under simulated runtime conditions |\n\n## Role in the Workspace\n\nThis crate sits at the foundation of the LibreFang observability stack. Other workspace members import `librefang-telemetry` to record metrics, while the top-level binary (or a dedicated telemetry initializer) is responsible for installing the actual exporter backend (e.g., Prometheus scrape endpoint).\n\n```mermaid\ngraph TD\n    A[librefang-telemetry] -->|depends on| B[metrics crate]\n    A -->|depends on| C[librefang-types]\n    D[Workspace binaries] -->|installs exporter| B\n    E[Other LibreFang crates] -->|records metrics via| A\n```\n\n## Usage\n\n### Recording metrics from other crates\n\nAdd `librefang-telemetry` as a dependency in your crate's `Cargo.toml`:\n\n```toml\n[dependencies]\nlibrefang-telemetry = { path = \"../librefang-telemetry\" }\n```\n\nThen use the `metrics` macros or the re-exported helpers provided by this crate to instrument your code.\n\n### Setting up the exporter (binary side)\n\nThe application binary is responsible for initializing a metrics exporter before any measurements are recorded. This separation keeps library crates free of exporter-specific configuration.\n\n## Architecture Notes\n\n- **No internal call graph.** This crate is a leaf dependency — it does not call into other LibreFang modules at runtime. It re-exports or wraps the `metrics` facade and may define shared metric name constants or helper functions.\n- **No incoming calls detected in static analysis.** Other crates consume this module through the `metrics` macro layer, which is resolved at compile time rather than through direct function calls, making the dependency invisible to a simple call-graph trace.\n- The `librefang-types` dependency suggests that metric labels or identifiers may be derived from domain types shared across the project (e.g., player identifiers, game states, room codes).\n\n## Testing\n\nTests use `tokio-test` to simulate asynchronous contexts. Run the test suite with:\n\n```sh\ncargo test -p librefang-telemetry\n```","other-librefang-testing-src":"# Other — librefang-testing-src\n\n# librefang-testing — Test Suite\n\n## Purpose\n\nThe `tests.rs` module within `librefang-testing` serves a dual role: it **validates** the test infrastructure itself and **demonstrates** how to write integration tests against the librefang API. Every test in this file uses the crate's own public helpers, making them executable reference examples for anyone writing tests against the librefang HTTP API or runtime components.\n\n## Test Infrastructure Dependencies\n\n```mermaid\ngraph TD\n    tests_rs[\"tests.rs<br/>(this module)\"]\n    test_app[\"TestAppState<br/>(test_app.rs)\"]\n    helpers[\"helpers<br/>(test_request, assert_json_ok, assert_json_error)\"]\n    mock_kernel[\"MockKernelBuilder<br/>(mock_kernel.rs)\"]\n    mock_driver[\"MockLlmDriver / FailingLlmDriver<br/>(mock_driver.rs)\"]\n    runtime[\"librefang_runtime<br/>(LlmDriver trait, CompletionRequest)\"]\n\n    tests_rs --> test_app\n    tests_rs --> helpers\n    tests_rs --> mock_kernel\n    tests_rs --> mock_driver\n    test_app --> mock_kernel\n    mock_driver --> runtime\n```\n\n## Common Test Pattern\n\nAlmost every API-level test follows the same structure:\n\n```rust\n#[tokio::test(flavor = \"multi_thread\")]\nasync fn test_something() {\n    // 1. Create an isolated test application\n    let app = TestAppState::new();\n    let router = app.router();\n\n    // 2. Build a request using the helper\n    let req = test_request(Method::GET, \"/api/some-endpoint\", None);\n\n    // 3. Execute the request via oneshot (no running server needed)\n    let resp = router.oneshot(req).await.expect(\"request failed\");\n\n    // 4. Assert on the response\n    let json = assert_json_ok(resp).await;\n    // ... inspect json ...\n}\n```\n\nFor error cases, replace step 4 with `assert_json_error(resp, StatusCode::BAD_REQUEST)`.\n\n> **Note:** API tests use `flavor = \"multi_thread\"` because the router internally requires a multi-threaded Tokio runtime.\n\n## Test Categories\n\n### Health and Version Endpoints\n\n| Test | Endpoint | Purpose |\n|------|----------|---------|\n| `test_health_endpoint` | `GET /api/health` | Returns 200 with `{\"status\": \"ok\" \\| \"degraded\"}` |\n| `test_version_endpoint` | `GET /api/version` | Returns 200 with a `version` field |\n\nThese are the simplest tests — no request body, no path parameters. They verify that basic infrastructure wiring works.\n\n### Agent CRUD Operations\n\n| Test | Endpoint | Expected Status |\n|------|----------|----------------|\n| `test_list_agents` | `GET /api/agents` | 200 — returns `{items: [...], total: N, offset: 0}` |\n| `test_get_agent_invalid_id` | `GET /api/agents/not-a-valid-uuid` | 400 — rejects malformed UUID |\n| `test_get_agent_not_found` | `GET /api/agents/{uuid}` | 404 — valid UUID, nonexistent agent |\n| `test_spawn_agent_post` | `POST /api/agents` | 200 or 201 — creates agent from TOML manifest |\n| `test_delete_agent_not_found` | `DELETE /api/agents/{uuid}` | 404 — nonexistent agent |\n| `test_set_model_not_found` | `PUT /api/agents/{uuid}/model` | 4xx/5xx — nonexistent agent |\n| `test_send_message_agent_not_found` | `POST /api/agents/{uuid}/message` | 400 or 404 |\n| `test_patch_agent_not_found` | `PATCH /api/agents/{uuid}` | 400 or 404 |\n\nThe not-found tests all generate a random UUID via `uuid::Uuid::new_v4()` to ensure the ID does not collide with any seeded data.\n\nFor POST/PUT/PATCH tests that carry a body, pass the JSON string as the third argument to `test_request`:\n\n```rust\nlet body = serde_json::json!({ \"manifest_toml\": manifest }).to_string();\nlet req = test_request(Method::POST, \"/api/agents\", Some(&body));\n```\n\n### Custom Kernel Configuration\n\n`test_custom_config_kernel` demonstrates how to build a `TestAppState` with modified configuration using the builder pattern:\n\n```rust\nlet app = TestAppState::with_builder(\n    MockKernelBuilder::new().with_config(|cfg| {\n        cfg.language = \"zh\".into();\n    })\n);\n// Verify the config was applied\nassert_eq!(app.state.kernel.config_ref().language, \"zh\");\n```\n\nThis test does **not** make HTTP requests — it validates that `MockKernelBuilder::with_config` correctly propagates configuration into the kernel. Use this pattern when your test needs specific config values (language, model defaults, timeouts, etc.) rather than the defaults from `TestAppState::new()`.\n\n### Mock LLM Driver\n\nTwo mock driver implementations are tested:\n\n#### `MockLlmDriver` — Returns preconfigured responses\n\n`test_mock_llm_driver_recording` validates:\n- **Queued responses**: The driver is constructed with `MockLlmDriver::new(vec![\"回复1\".into(), \"回复2\".into()])` and returns them in order via `complete()`.\n- **Call recording**: After calls, `driver.call_count()` returns `2` and `driver.recorded_calls()` exposes the full `CompletionRequest` for each call, allowing assertions on model name, system prompt, etc.\n\n`test_mock_llm_driver_custom_tokens_and_stop_reason` validates the builder pattern for customizing response metadata:\n\n```rust\nlet driver = MockLlmDriver::with_response(\"test\")\n    .with_tokens(200, 100)                    // input_tokens, output_tokens\n    .with_stop_reason(StopReason::MaxTokens);\n```\n\nThis does **not** require a multi-threaded runtime — plain `#[tokio::test]` suffices since no HTTP router is involved.\n\n#### `FailingLlmDriver` — Always errors\n\n`test_failing_llm_driver` validates:\n- `complete()` always returns `Err` containing the configured message.\n- `is_configured()` returns `false`.\n\nUse `FailingLlmDriver` when testing error-handling paths (retry logic, fallback behavior, user-facing error messages).\n\n## Helper Reference\n\nThese are the core utilities imported from the crate root and used throughout the tests:\n\n| Helper | Signature | Returns |\n|--------|-----------|---------|\n| `test_request` | `(method, path, body: Option<&str>) → Request<String>` | A ready-to-send Axum request |\n| `assert_json_ok` | `(response) → Value` | Parses body as JSON, asserts status 200 |\n| `assert_json_error` | `(response, expected_status) → Value` | Parses body as JSON, asserts the given error status |\n\n## Writing a New Test\n\nTo add a test for a new or existing endpoint:\n\n1. Decide if you need a standard or customized `TestAppState`. Use `TestAppState::new()` for defaults, or `TestAppState::with_builder(...)` for custom kernel config or mock driver setup.\n2. Build the request with `test_request(method, path, optional_body)`.\n3. Call `router.oneshot(req).await` to execute without spawning a real server.\n4. Assert success with `assert_json_ok(resp)` or failure with `assert_json_error(resp, status)`.\n5. Inspect the returned `serde_json::Value` for domain-specific assertions.\n\nAll tests in this module are self-contained and independent — `TestAppState::new()` creates a fresh, isolated application state with no shared mutable state between tests.","other-librefang-testing":"# Other — librefang-testing\n\n# librefang-testing\n\nTest infrastructure providing mock implementations and route-level test utilities for the LibreFang workspace.\n\n## Purpose\n\nThis crate centralizes all test-facing infrastructure so that downstream crates can write integration and unit tests without reaching for real kernel interfaces, live LLM backends, or a running HTTP server. Everything lives behind deterministic, in-process fakes that can be inspected and controlled from test code.\n\nThree categories of support are provided:\n\n| Category | What it gives you |\n|---|---|\n| **Mock kernel** | An in-memory kernel stand-in that records invocations and returns caller-configured responses |\n| **Mock LLM driver** | A fake LLM backend that skips network I/O and produces scripted completions |\n| **API route test helpers** | Axum `Router` bootstrapping, request construction, and response body helpers |\n\n## Workspace role\n\n`librefang-testing` is a **dev-only dependency** — it is never compiled into production binaries. It sits at the top of the dependency graph, referencing almost every other workspace crate so that it can assemble fully-wired subsystems in isolation:\n\n```mermaid\ngraph TD\n    T[librefang-testing] --> types[librefang-types]\n    T --> kernel[librefang-kernel]\n    T --> runtime[librefang-runtime]\n    T --> memory[librefang-memory]\n    T --> api[librefang-api]\n    T --> wire[librefang-wire]\n    T --> channels[librefang-channels]\n    T --> skills[librefang-skills]\n    T --> hands[librefang-hands]\n    T --> extensions[librefang-extensions]\n```\n\nBecause it pulls in the full stack, individual test suites can choose how much to mock. A test for an API route handler, for example, can swap in the mock LLM driver while still exercising the real kernel and memory subsystems.\n\n## Key dependencies and why they matter\n\n| Dependency | Role in this crate |\n|---|---|\n| `axum` / `tower` / `http-body-util` | Building an in-process `Router`, sending test requests, and reading response bodies without a live HTTP listener |\n| `tokio` | Async runtime for all test helpers |\n| `dashmap` | Concurrent map used internally by mocks to track call history across concurrent test tasks |\n| `tempfile` | Creating temporary directories when a test needs an isolated filesystem root |\n| `async-trait` | Defining mock implementations of async traits from `librefang-kernel` and `librefang-skills` |\n| `serde` / `serde_json` | Serializing/deserializing fixture data and response bodies |\n\nThe `librefang-api` dependency is imported with `default-features = false` and only the `telemetry` feature, keeping the test helper lean while still supporting the tracing/span infrastructure the API layer expects.\n\n## Usage patterns\n\n### Consuming from another crate\n\nAdd the crate as a **dev-dependency** in the consumer's `Cargo.toml`:\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\n### Mock kernel\n\nThe mock kernel implements the same trait defined in `librefang-kernel` but operates entirely in memory. Tests configure expected return values before exercising the system under test, then assert against recorded call history to verify correct sequencing.\n\n### Mock LLM driver\n\nThe mock LLM driver replaces the real driver from `librefang-skills` (or `librefang-extensions`). It accepts a pre-scripted sequence of completions and returns them in order, making prompt-generation logic fully deterministic.\n\n### API route tests\n\nRoute-level helpers handle the boilerplate of constructing an `axum::Router` with the appropriate state, converting it into a `tower::Service`, and issuing requests via `http-body-util`. A typical test:\n\n1. Builds a `Router` with test-appropriate state (mock kernel, mock LLM, etc.)\n2. Constructs an HTTP request with the desired method, path, and body\n3. Calls the router via `tower::ServiceExt::oneshot`\n4. Reads and deserializes the response body\n\nThis avoids binding to a real TCP port and keeps tests fast and isolated.\n\n## Guidelines for contributors\n\n- **Do not add production code here.** This crate must never appear in a non-dev `[dependencies]` section.\n- **Keep mocks minimal.** Only implement the surface area that current tests actually exercise. Unused mock methods should panic with a clear message so missing coverage is immediately visible.\n- **Prefer deterministic defaults.** Mocks should return sensible zero-values or empty collections when no explicit expectation is configured, rather than panicking, unless the test explicitly opts into strict mode.\n- **Reuse, don't re-create.** If multiple crates need the same fixture or helper, move it into this crate rather than duplicating it in each crate's `tests/` directory.","other-librefang-types-locales":"# Other — librefang-types-locales\n\n# librefang-types-locales\n\nFluent (FTL) locale files providing localized API error messages for the LibreFang platform. This is a pure data module — no executable code — consumed at runtime by the Fluent localization system to resolve user-facing error strings by language.\n\n## Directory Layout\n\n```\nlibrefang-types/locales/\n├── de/errors.ftl       # German (partial)\n├── en/errors.ftl       # English (canonical — most complete)\n├── es/errors.ftl       # Spanish (partial)\n├── fr/errors.ftl       # French (partial)\n├── ja/errors.ftl       # Japanese (near-complete)\n└── zh-CN/errors.ftl    # Simplified Chinese (partial)\n```\n\n## Message Format\n\nAll files use [Project Fluent](https://projectfluent.org/) syntax. Each message has an identifier and a string value, optionally with interpolated variables:\n\n```ftl\n# Simple message\napi-error-agent-not-found = Agent not found\n\n# Parameterized message\napi-error-message-delivery-failed = Message delivery failed: { $reason }\n```\n\n## Naming Convention\n\nIdentifiers follow the pattern `api-error-{domain}-{description}`:\n\n| Segment | Meaning |\n|---------|---------|\n| `api-error` | Fixed prefix — all messages are API error responses |\n| `{domain}` | Feature area: `agent`, `message`, `template`, `manifest`, `auth`, `session`, `workflow`, `trigger`, `budget`, `config`, `profile`, `cron`, `goal`, `memory`, `network`, `plugin`, `channel`, `provider`, `skill`, `hand`, `mcp`, `integration`, `extension`, `system`, `kv`, `approval`, `webhook`, `backup`, `schedule`, `job`, `task`, `pairing`, `binding`, `command`, `file`, `tool`, `validation` |\n| `{description}` | kebab-case summary of the specific error |\n\n## Coverage by Domain\n\n**English (`en`)** is the canonical locale and defines every key. Other locales translate a subset. The major domains are:\n\n| Domain | Example Keys | Key Count (en) |\n|--------|-------------|----------------|\n| agent | `agent-not-found`, `agent-spawn-failed`, `agent-execution-failed` | 17 |\n| provider | `provider-missing-alias`, `provider-alias-exists`, `provider-secret-write-failed` | 21 |\n| goal | `goal-not-found`, `goal-circular-parent`, `goal-save-failed` | 19 |\n| file | `file-not-found`, `file-path-traversal`, `file-unsupported-type` | 16 |\n| webhook | `webhook-not-enabled`, `webhook-url-unreachable` | 11 |\n| skill | `skill-missing-name`, `skill-invalid-name`, `skill-install-failed` | 10 |\n| backup | `backup-invalid-archive`, `backup-missing-manifest` | 11 |\n| schedule | `schedule-not-found`, `schedule-invalid-cron` | 10 |\n| memory | `memory-not-enabled`, `memory-missing-kv` | 9 |\n| cron | `cron-invalid-expression`, `cron-missing-field` | 6 |\n| session | `session-load-failed`, `session-cleanup-expired-failed` | 7 |\n| network | `network-a2a-not-found`, `network-auth-failed` | 7 |\n| mcp | `mcp-missing-name`, `mcp-invalid-config` | 5 |\n| Others | (template, manifest, auth, workflow, trigger, budget, config, profile, plugin, channel, integration, extension, system, kv, approval, job, task, pairing, binding, command, tool, validation, general) | varies |\n\n## Locale Completeness\n\nEnglish and Japanese are the most complete. German, Spanish, French, and Simplified Chinese cover the core set of older domains (agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, general) but lack newer domains added later (goal, memory, network, plugin, channel, provider, skill, hand, mcp, webhook, backup, schedule, job, task, pairing, binding, command, file, tool, validation, integration, extension, system, kv, approval).\n\n**When adding a new error message**, always add it to `en/errors.ftl` first, then add translations to `ja/errors.ftl`. The other locales can be translated incrementally — the Fluent system will fall back to English for missing keys.\n\n## Interpolated Variables\n\nMessages use Fluent variables wrapped in `{ $name }`. The following variable names appear across the locales:\n\n| Variable | Used In | Example |\n|----------|---------|---------|\n| `$reason` | `bad-request`, `message-delivery-failed` | `Bad request: { $reason }` |\n| `$error` | `*-failed`, `*-parse-failed` keys | `Failed to parse template: { $error }` |\n| `$name` | `template-not-found`, `profile-not-found`, `command-not-found` | `Template '{ $name }' not found` |\n| `$id` | `agent-not-found-with-id`, `goal-not-found-with-id`, `hand-not-found` | `Agent not found: { $id }` |\n| `$step` | `workflow-step-needs-agent` | `Step '{ $step }' needs 'agent_id'` |\n| `$alias` | `provider-alias-exists`, `provider-alias-not-found` | `Alias '{ $alias }' already exists` |\n| `$url` | `network-a2a-not-found`, `network-missing-url` | `A2A agent '{ $url }' not found` |\n| `$status` | `network-auth-failed` | `Authentication failed (HTTP { $status })` |\n| `$field` | `agent-invalid-sort` | `Invalid sort field '{ $field }'` |\n| `$valid` | `agent-invalid-sort`, `webhook-unknown-event` | `Valid fields: { $valid }` |\n| `$max` | `skill-description-too-long`, `file-too-large` | `max { $max }` |\n| `$event` | `webhook-unknown-event` | `Unknown event type '{ $event }'` |\n| `$provider` | `provider-model-exists` | `already exists in provider '{ $provider }'` |\n\n## How It Connects to the Codebase\n\nThe consuming code loads these FTL files via a Fluent bundle (typically `fluent-templates` or `fluent-bundle` in Rust). At runtime:\n\n1. The application initializes a Fluent localization bundle for the user's locale\n2. When the API needs to return an error, it looks up the message identifier (e.g., `api-error-agent-not-found`)\n3. The bundle resolves the message in the current locale, interpolating any variables\n4. If the current locale lacks a key, Fluent falls back through the locale chain to English\n\nThe error identifiers in these `.ftl` files are the single source of truth for error message text. Backend error-handling code references these identifiers by name; the actual human-readable strings live exclusively in these locale files.\n\n## Adding a New Error Message\n\n1. Add the key to `locales/en/errors.ftl` under the appropriate domain comment section\n2. Follow the naming pattern: `api-error-{domain}-{description}`\n3. Use `{ $variable }` interpolation for any dynamic content — do not embed runtime values directly\n4. Add the same key to `locales/ja/errors.ftl` with a Japanese translation\n5. Optionally add translations to `de`, `es`, `fr`, `zh-CN`\n\n## Adding a New Locale\n\n1. Create `locales/{locale-code}/errors.ftl`\n2. Copy the full contents of `en/errors.ftl` as a starting point\n3. Translate all message values — do **not** change the identifiers or variable names\n4. Register the new locale in the application's Fluent bundle configuration","other-librefang-types-src":"# Other — librefang-types-src\n\n# librefang-types: Model Catalog Types\n\nShared data structures for the model registry — the canonical type definitions that every crate in the system imports to describe AI models, providers, authentication state, and inference parameters.\n\n## Purpose\n\nThis module is the **single source of truth** for model catalog types. It contains no business logic — only data definitions with `Serialize`/`Deserialize` support and a few convenience methods. Every other crate (`librefang-runtime`, `librefang-api`, `librefang-kernel-metering`, the HTTP routes) depends on these types rather than defining their own, ensuring a consistent schema across TOML catalog files, JSON persistence, and in-memory state.\n\n## Architecture\n\n```mermaid\nclassDiagram\n    direction LR\n\n    class ModelCatalogFile {\n        +provider: Option~ProviderCatalogToml~\n        +models: Vec~ModelCatalogEntry~\n    }\n\n    class ProviderCatalogToml {\n        +id: String\n        +display_name: String\n        +api_key_env: String\n        +base_url: String\n        +key_required: bool\n        +regions: HashMap~String, RegionConfig~\n        +media_capabilities: Vec~String~\n    }\n\n    class ProviderInfo {\n        +auth_status: AuthStatus\n        +model_count: usize\n        +available_models: Vec~String~\n        +is_custom: bool\n        +proxy_url: Option~String~\n    }\n\n    class ModelCatalogEntry {\n        +id: String\n        +tier: ModelTier\n        +context_window: u64\n        +supports_tools: bool\n        +aliases: Vec~String~\n    }\n\n    class ModelOverrides {\n        +temperature: Option~f32~\n        +max_tokens: Option~u32~\n        +is_empty() bool\n    }\n\n    class AliasesCatalogFile {\n        +aliases: HashMap~String, String~\n    }\n\n    ModelCatalogFile --> ProviderCatalogToml\n    ModelCatalogFile --> ModelCatalogEntry\n    ProviderCatalogToml --> ProviderInfo : From<T>\n    ProviderInfo --> AuthStatus\n    ProviderInfo --> RegionConfig\n    ModelCatalogEntry --> ModelTier\n```\n\n## Key Types\n\n### Enums\n\n#### `ModelTier`\n\nCategorizes a model's capability tier. Used for filtering and display grouping.\n\n| Variant | Example Models | Serde Form |\n|---------|---------------|------------|\n| `Frontier` | Claude Opus, GPT-4.1 | `\"frontier\"` |\n| `Smart` | Claude Sonnet, Gemini 2.5 Flash | `\"smart\"` |\n| `Balanced` | GPT-4o-mini, Groq Llama | `\"balanced\"` |\n| `Fast` | Fastest/cheapest models | `\"fast\"` |\n| `Local` | Ollama, vLLM, LM Studio | `\"local\"` |\n| `Custom` | User-defined runtime additions | `\"custom\"` |\n\nDefault is `Balanced`.\n\n#### `AuthStatus`\n\nRepresents the runtime-detected authentication state for a provider. The default is `Missing`.\n\n| Variant | Meaning | `is_available()` |\n|---------|---------|:-:|\n| `ValidatedKey` | API key confirmed valid via live probe | ✅ |\n| `Configured` | Key present, not yet validated | ✅ |\n| `ConfiguredCli` | No key, but CLI tool available (e.g. `claude-code`) | ✅ |\n| `AutoDetected` | Key found via fallback env var — may not match provider | ✅ |\n| `NotRequired` | Local provider, no key needed | ✅ |\n| `InvalidKey` | Key rejected (HTTP 401/403) | ❌ |\n| `Missing` | No API key found | ❌ |\n| `CliNotInstalled` | CLI provider but CLI not installed | ❌ |\n| `LocalOffline` | Local provider probed offline | ❌ |\n\n`AuthStatus::is_available()` is the primary gate used throughout the codebase — route handlers (`send_message`, `list_models`, `get_model`), WebSocket handlers (`handle_text_message`), and the runtime (`available_models`) all call it to decide whether a provider can service requests.\n\n`LocalOffline` is special: unlike `Missing`, the probe that detected it owns the transition back to `NotRequired`. `detect_auth()` will not reset it — the probe must confirm the service is listening.\n\n#### `ModelType`\n\nClassifies what kind of inference a model performs: `Chat` (default), `Speech`, or `Embedding`.\n\n### Structs\n\n#### `ModelCatalogEntry`\n\nA single model in the catalog. Maps directly to a `[[models]]` TOML entry. Key fields:\n\n- **`id`** — Canonical identifier (e.g. `\"claude-sonnet-4-20250514\"`). Must be unique across the catalog.\n- **`provider`** — Provider identifier. When omitted in community catalog files, it's inferred from the `[provider].id` section during the catalog merge in `librefang-runtime`.\n- **`tier`** — `ModelTier` for capability classification.\n- **`context_window`** / **`max_output_tokens`** — Token limits in u64.\n- **`input_cost_per_m`** / **`output_cost_per_m`** — Cost per million tokens in USD. Used by `librefang-kernel-metering` for cost estimation.\n- **Capability flags** — `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`. All default to `false`.\n- **`aliases`** — Short names that resolve to this model (e.g. `[\"sonnet\", \"claude-sonnet\"]`).\n\n#### `ProviderCatalogToml` → `ProviderInfo`\n\nTwo parallel structs represent provider metadata at different stages:\n\n- **`ProviderCatalogToml`** — What's stored in TOML files under `providers/*.toml`. Contains only persistent fields (id, display name, base URL, regions, etc.).\n- **`ProviderInfo`** — The runtime version with additional fields: `auth_status`, `model_count`, `available_models`, `is_custom`, `proxy_url`.\n\n`ProviderCatalogToml` implements `From<ProviderCatalogToml> for ProviderInfo`, initializing all runtime fields to defaults (`auth_status: Missing`, `model_count: 0`, `available_models: []`, `is_custom: false`).\n\nThe `is_custom` field is set by the runtime catalog loader, not the TOML file — it checks whether the file is also present in `registry/providers/` to distinguish built-in providers (which can only be deconfigured, not deleted) from user-added ones (which get a \"Delete\" control in the dashboard).\n\n#### `RegionConfig`\n\nPer-region endpoint overrides within a provider:\n\n```rust\npub struct RegionConfig {\n    pub base_url: String,\n    pub api_key_env: Option<String>,\n}\n```\n\nWhen a region is selected, its `base_url` overrides the provider-level default. The `api_key_env` override allows regional keys (falls back to the provider-level env var when `None`).\n\nRegion selection pattern (used by callers):\n\n```rust\nlet resolved_url = provider.regions\n    .get(selected_region)\n    .map(|r| r.base_url.as_str())\n    .unwrap_or(&provider.base_url);\n```\n\n#### `ModelOverrides`\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json` keyed by `provider:model_id`. Every field is `Option` — `None` means \"use the layer above\".\n\nThe override precedence chain is:\n\n1. **Agent-level `ModelConfig`** (highest priority)\n2. **`ModelOverrides`** (this struct)\n3. **System defaults** (lowest priority)\n\nUse `ModelOverrides::is_empty()` to check if no overrides are set.\n\nNotable fields beyond standard sampling parameters:\n\n- **`use_max_completion_tokens`** — Send `max_completion_tokens` instead of `max_tokens` in API requests (some providers require this).\n- **`no_system_role`** — The model does not support system role messages; the caller should merge system prompts into the user message.\n- **`force_max_tokens`** — Always send `max_tokens` even when the provider doesn't require it.\n\n#### `ModelCatalogFile`\n\nThe top-level TOML catalog file structure:\n\n```toml\n[provider]                          # optional — present in community catalog files\nid = \"anthropic\"\ndisplay_name = \"Anthropic\"\napi_key_env = \"ANTHROPIC_API_KEY\"\nbase_url = \"https://api.anthropic.com\"\nkey_required = true\n\n[[models]]                          # required — at least one model entry\nid = \"claude-sonnet-4-20250514\"\ndisplay_name = \"Claude Sonnet 4\"\nprovider = \"anthropic\"\ntier = \"smart\"\ncontext_window = 200000\nmax_output_tokens = 64000\ninput_cost_per_m = 3.0\noutput_cost_per_m = 15.0\nsupports_tools = true\nsupports_vision = true\nsupports_streaming = true\naliases = [\"sonnet\", \"claude-sonnet\"]\n```\n\nThe `provider` section can be omitted (for catalog files that only add models to already-known providers).\n\n#### `AliasesCatalogFile`\n\nA separate aliases file mapping short names to canonical model IDs:\n\n```toml\n[aliases]\nsonnet = \"claude-sonnet-4-20250514\"\nhaiku = \"claude-haiku-4-5-20251001\"\n```\n\n## Serde Conventions\n\n- **Enum variants** serialize as `lowercase` for `ModelTier`/`ModelType` and `snake_case` for `AuthStatus` (matching the `#[serde(rename_all = \"...\")]` attributes).\n- **Optional fields** in `ModelOverrides` use `skip_serializing_if = \"Option::is_none\"` to keep JSON output clean.\n- **Empty vectors** in `ProviderInfo` (`available_models`) use `skip_serializing_if = \"Vec::is_empty\"`.\n- **Default booleans** in `ModelCatalogEntry` (`supports_tools`, etc.) use `#[serde(default)]` so they're optional in TOML.\n\n## Cross-Crate Usage\n\nThis module is consumed by:\n\n- **`librefang-runtime`** — `merge_discovered_models` and `available_models` use `ModelCatalogEntry` and `AuthStatus::is_available()`.\n- **`librefang-kernel-metering`** — `ModelCatalogFile` is used for cost estimation (reading `input_cost_per_m` / `output_cost_per_m`).\n- **`librefang-api`** — `list_providers_interactive` and `handle_text_message` gate on `is_available()`.\n- **HTTP routes** — `send_message` (agents), `list_models` and `get_model` (providers) all check `is_available()` before proceeding.","other-librefang-types-tests":"# Other — librefang-types-tests\n\n# Agent Form Roundtrip Tests\n\n## Purpose\n\nThis module validates that TOML output produced by the dashboard's visual agent editor can be correctly parsed by the Rust backend's `AgentManifest` deserializer. It serves as a **cross-language contract test** — catching drift between the TypeScript serializer in `crates/librefang-api/dashboard/src/lib/agentManifest.ts` and the Rust deserialization logic in `librefang_types::agent::AgentManifest`.\n\nWithout these tests, a renamed field or changed enum variant in either codebase would silently break the agent creation flow at runtime.\n\n## How It Works\n\nEach test constructs a TOML string that mirrors the exact output of the dashboard form serializer, deserializes it into an `AgentManifest` struct using `toml::from_str`, and asserts on the resulting fields. This approach tests the real serde-derived deserialization path — no mocks, no intermediate representations.\n\n## Test Coverage\n\n### `parses_form_minimum_viable_output`\n\nValidates the smallest valid manifest the form can emit: `name`, `version`, `module`, and a `[model]` section with `provider` and `model`. Confirms the kernel does not require any optional sections to deserialize successfully.\n\n### `parses_form_full_output_with_capabilities_and_resources`\n\nTests a manifest with all standard sections populated:\n\n- Metadata: `description`, `tags`, `skills`\n- Model tuning: `system_prompt`, `temperature`, `max_tokens`\n- Resource quotas: `max_tool_calls_per_minute`, `max_cost_per_hour_usd`\n- Capabilities: `network` (host allowances), `shell` (allowed commands), `agent_spawn` (boolean flag)\n\n### `parses_form_with_advanced_sections`\n\nThe broadest test. Covers every advanced panel the form exposes:\n\n| Section | Fields validated |\n|---|---|\n| Top-level enums | `priority`, `session_mode`, `web_search_augmentation`, `exec_policy` |\n| Scheduling | `schedule = { periodic = { cron = \"...\" } }` inline table syntax |\n| `[thinking]` | `budget_tokens`, `stream_thinking` |\n| `[autonomous]` | `max_iterations`, `heartbeat_channel` |\n| `[routing]` | `simple_model`, `medium_model`, `complex_model`, thresholds |\n| `[[fallback_models]]` | Array-of-tables with `provider` and `model` |\n| `[[context_injection]]` | Array-of-tables with `name`, `content`, `position` |\n| Extended capabilities | `memory_read`, `memory_write`, `agent_message`, `ofp_connect` (glob patterns) |\n\n### `parses_form_response_format_json_schema`\n\nVerifies that `response_format`, serialized as an inline TOML table, deserializes into the `ResponseFormat::JsonSchema` variant with correct `name` and `strict` fields. This catches issues where the form emits a structure the kernel's enum doesn't expect.\n\n### `omitting_optional_sections_uses_defaults`\n\nConfirms that when the form omits `[resources]` and `[capabilities]` entirely, the parsed struct uses sensible defaults: empty collections for capability lists, `false` for `agent_spawn`, and `None` for optional resource limits. This matters because the form suppresses empty sections rather than emitting empty tables.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Dashboard Form<br/>TypeScript serializer] -->|emits TOML| B[agent_form_roundtrip tests]\n    B -->|deserializes via| C[librefang_types::agent::AgentManifest]\n    B -.->|catches drift with| A\n```\n\nThe dependency chain:\n\n- **Producer**: `crates/librefang-api/dashboard/src/lib/agentManifest.ts` — TypeScript serializer generating TOML from form state\n- **Consumer**: `librefang_types::agent::AgentManifest` — Rust struct with serde/toml derive macros defining the canonical schema\n- **Guard**: This test module — ensures both sides agree on field names, types, enum variants, structural conventions, and default behavior\n\n## Contributing\n\nWhen adding a new field to `AgentManifest`:\n\n1. Add the field to the Rust struct with appropriate serde attributes\n2. Update the dashboard serializer to emit the new field\n3. Extend the relevant test here — or add a new one — covering both the populated and omitted cases\n\nIf you rename or remove a field, expect these tests to fail. That failure is intentional: it signals that the dashboard serializer needs a matching update.","other-librefang-types":"# Other — librefang-types\n\n# librefang-types\n\nCore type definitions, traits, and shared data structures for the LibreFang Agent OS.\n\n## Purpose\n\nThis crate serves as the foundational type library for the entire LibreFang ecosystem. It defines the canonical data models, error types, configuration structures, cryptographic primitives, and trait contracts that all other crates depend on. It contains no business logic or I/O — only declarations and trait definitions.\n\nBecause every other crate in the workspace references `librefang-types`, this module must remain lightweight, stable, and free of heavy side-effect dependencies.\n\n## Architectural Role\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[Agent runtime crates]\n    A --> C[Networking / messaging crates]\n    A --> D[CLI and tooling]\n    A --> E[Plugin / extension crates]\n    style A fill:#2d6a4f,color:#fff\n```\n\nAll crates import from `librefang-types` but this crate imports nothing from other workspace members. This unidirectional dependency keeps the type layer free of circular references and compilation coupling.\n\n## Key Dependency Domains\n\nThe crate's responsibilities can be inferred from its dependency set. Each dependency group maps to a distinct domain of type definitions:\n\n### Serialization (`serde`, `serde_json`, `toml`)\n\nAll public data structures derive `Serialize` and `Deserialize`, enabling wire-format agnostic serialization. The `toml` dependency indicates configuration types are deserialized from TOML files. The `serde_json` dependency supports JSON as an interchange format, likely for agent-to-server communication and API boundaries.\n\n### Identity and Integrity (`uuid`, `ed25519-dalek`, `sha2`, `hex`, `rand`)\n\nAgent identity, message signing, and payload integrity verification are core to LibreFang. The `ed25519-dalek` crate provides Ed25519 public/private key types and signature operations. Combined with `sha2` for hashing and `uuid` for unique identifiers, this crate defines types for:\n\n- Agent identity keys and key fingerprints\n- Signed messages and envelopes\n- Payload digests and verification metadata\n- Cryptographic randomness for key generation\n\n### Temporal Types (`chrono`)\n\nTimestamps on events, messages, log entries, and configuration artifacts use `chrono` types. All timestamp-bearing structs use `chrono::DateTime<Utc>` (or similar) to ensure consistent timezone handling across the system.\n\n### Error Handling (`thiserror`)\n\nCustom error enums for the domain are defined here using `thiserror` derives. These error types are re-exported so that downstream crates can return unified `Result<T, librefang_types::Error>` variants without defining their own error hierarchies for cross-cutting concerns.\n\n### Asynchronous Contracts (`async-trait`)\n\nTrait definitions for async operations — such as message handlers, transport layers, or storage backends — use the `#[async_trait]` macro. Concrete implementations live in other crates; only the trait signatures live here.\n\n### Localization (`fluent`, `unic-langid`)\n\nThe Fluent i18n system and Unicode language identifiers support multi-language agent responses and log messages. This crate defines locale-aware types and possibly the trait for resolving localized strings, keeping internationalization concerns centralized.\n\n### Pattern Matching (`regex-lite`)\n\nLightweight regex types for input validation, identifier parsing, or configuration matching. The `regex-lite` choice over full `regex` signals that only basic pattern matching is needed without full Unicode word boundary support.\n\n### Filesystem Paths (`dirs`)\n\nStandard platform directory resolution (`dirs`) is used to define default path constants — such as configuration directories, data directories, and key storage locations — as part of the configuration type layer.\n\n## Design Principles\n\n1. **Zero business logic.** Structs, enums, traits, and constants only. Any function that performs I/O, network calls, or state mutation belongs in a different crate.\n\n2. **Serde-first modeling.** Every serializable type is designed with `serde` in mind. Field names use `#[serde(rename = \"...\")]` where needed for stable wire formats.\n\n3. **Trait-driven extensibility.** Core behaviors (messaging, signing, storage) are expressed as traits with `async_trait`, allowing concrete implementations to be swapped or mocked in downstream crates.\n\n4. **Dev dependency isolation.** The `rmp-serde` dev dependency (`MessagePack` serialization) is used only in tests to verify that types round-trip correctly through non-JSON formats, confirming format-agnostic serde correctness.\n\n## Testing Conventions\n\nTests in this crate focus on:\n\n- **Serialization round-trips.** Every struct serializes to JSON, TOML, and MessagePack (via `rmp-serde`) and deserializes back to an equal value.\n- **Default and builder patterns.** Types with `Default` implementations are verified for sensible values.\n- **Validation logic.** Any inherent validation methods on types (e.g., key length checks, identifier format) are tested here.\n\n## Adding New Types\n\nWhen adding types to this crate:\n\n- Ensure all structs and enums derive `Serialize`, `Deserialize`, `Debug`, `Clone` at minimum.\n- Add `#[cfg(test)]` round-trip tests for any new serializable type.\n- Avoid adding runtime dependencies. If a new dependency is needed, evaluate whether the type truly belongs in this foundational crate or in a higher-level crate.\n- Re-export new types from the crate root (`lib.rs`) so consumers can import with `use librefang_types::MyType` without navigating internal module paths.","other-librefang-wire":"# Other — librefang-wire\n\n# librefang-wire\n\nAgent-to-agent networking layer for the LibreFang Protocol (OFP). This crate handles message framing, serialization, authenticated transport, and connection management between LibreFang agents.\n\n## Role in the System\n\n`librefang-wire` sits between the high-level agent logic and the raw network I/O. It is responsible for taking typed messages, authenticating them, framing them for the wire, and delivering them over async TCP connections. It depends on `librefang-types` for shared message definitions and type primitives used across the LibreFang ecosystem.\n\n```\n┌──────────────┐     ┌──────────────────┐     ┌───────────────┐\n│  Agent Logic │────▶│ librefang-wire   │────▶│  TCP (tokio)  │\n│              │◀────│ (framing, auth,  │◀────│               │\n│              │     │  routing)        │     │               │\n└──────────────┘     └──────────────────┘     └───────────────┘\n                            │\n                            ▼\n                     ┌──────────────┐\n                     │librefang-types│\n                     │(shared types) │\n                     └──────────────┘\n```\n\n## Core Responsibilities\n\n### Protocol Framing\n\nMessages are serialized to JSON (via `serde_json`) and framed for transmission over TCP streams. The framing protocol handles:\n\n- Delimiting message boundaries on a byte stream\n- Ensuring complete messages are received before deserialization\n- Multiplexing message types over a single connection\n\n### Authenticated Messaging\n\nThe crate implements HMAC-based message authentication using the following dependency chain:\n\n| Dependency | Purpose |\n|---|---|\n| `hmac` + `sha2` | HMAC-SHA256 computation for message integrity |\n| `subtle` | Constant-time comparison to prevent timing attacks during verification |\n| `rand` | Secure random generation for nonces and challenge tokens |\n| `hex` | Encoding/decoding of HMAC digests |\n\nEvery message on the wire carries an authentication tag. Receivers verify the tag before deserializing the payload, ensuring that only agents sharing a valid key can communicate.\n\n### Concurrent Connection State\n\n`dashmap` provides a lock-free concurrent hashmap, used internally to track active connections, peer state, and session metadata across async tasks without blocking the Tokio runtime.\n\n### Error Handling\n\nAll fallible operations return structured errors derived via `thiserror`. Errors distinguish between:\n\n- Protocol-level failures (malformed frames, bad magic bytes)\n- Authentication failures (invalid HMAC, expired challenges)\n- I/O failures (disconnected peers, timeouts)\n\n### Observability\n\n`tracing` spans and events are emitted throughout the transport lifecycle — connection establishment, message send/receive, authentication handshake steps, and error conditions.\n\n## Key Dependencies and Their Usage\n\n| Crate | Usage |\n|---|---|\n| `tokio` | Async runtime; TCP stream handling, task spawning |\n| `serde` / `serde_json` | Message serialization and deserialization |\n| `uuid` | Unique message and session identifiers |\n| `chrono` | Timestamps for messages and session tracking |\n| `async-trait` | Async trait definitions for transport abstractions |\n| `librefang-types` | Shared protocol types (message enums, payloads, IDs) |\n\n## Integration Points\n\nOther crates in the workspace consume `librefang-wire` to establish agent-to-agent communication channels without dealing with framing, authentication, or connection lifecycle management directly. The crate exposes an async API compatible with the Tokio runtime used throughout LibreFang.\n\nTo use this crate, add it as a dependency:\n\n```toml\n[dependencies]\nlibrefang-wire = { path = \"../librefang-wire\" }\n```\n\n## Testing\n\nThe `tokio-test` dev-dependency is used for writing async tests that exercise connection setup, message round-trips, and authentication handshake behavior without requiring a live network.","other":"# Other\n\n# Other — LibreFang Agent OS\n\nThis module group constitutes the **LibreFang Agent OS** — a full-stack platform for building, running, and managing autonomous AI agents. The sub-modules span from foundational type definitions through to desktop, CLI, and web interfaces.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"User-Facing\"\n        CLI[librefang-cli]\n        DSK[librefang-desktop]\n        DASH[librefang-api-dashboard]\n    end\n\n    subgraph \"API Layer\"\n        API[librefang-api]\n        WIRE[librefang-wire]\n        CH[librefang-channels]\n    end\n\n    subgraph \"Kernel & Runtime\"\n        K[librefang-kernel]\n        RT[librefang-runtime]\n        LLM[librefang-llm-drivers]\n        WASM[librefang-runtime-wasm]\n        MCP[librefang-runtime-mcp]\n    end\n\n    subgraph \"Foundation\"\n        T[librefang-types]\n        MEM[librefang-memory]\n        SK[librefang-skills]\n        H[librefang-hands]\n        HTTP[librefang-http]\n        TEL[librefang-telemetry]\n    end\n\n    CLI --> API\n    CLI --> K\n    DSK --> API\n    DSK --> K\n    DASH --> API\n\n    API --> K\n    API --> RT\n    API --> MEM\n    API --> CH\n\n    K --> RT\n    K --> H\n    K --> MEM\n    K --> SK\n\n    RT --> LLM\n    RT --> WASM\n    RT --> MCP\n    RT --> MEM\n\n    LLM --> T\n    CH --> T\n    WIRE --> T\n    HTTP --> T\n```\n\n## Module Groups\n\n### Foundation\n\n| Module | Role |\n|--------|------|\n| [librefang-types](Other%20-%20librefang-types.md) | Canonical data models, error types, traits — the single source of truth every other crate depends on |\n| [librefang-http](Other%20-%20librefang-http.md) | Shared `reqwest::Client` builder with uniform TLS/proxy configuration |\n| [librefang-telemetry](Other%20-%20librefang-telemetry.md) | Centralized `metrics` facade for OpenTelemetry/Prometheus instrumentation |\n\n### Kernel & Orchestration\n\nThe **kernel** is the central hub. It does not implement subsystem logic — it wires everything together:\n\n- [librefang-kernel](Other%20-%20librefang-kernel.md) — top-level orchestration: agent lifecycles, tool dispatch, skill evolution, approval workflows, auto-reply\n- [librefang-kernel-handle](Other%20-%20librefang-kernel-handle.md) — the `KernelHandle` trait abstracting in-process kernel access\n- [librefang-kernel-metering](Other%20-%20librefang-kernel-metering.md) — cost accounting and quota enforcement\n- [librefang-kernel-router](Other%20-%20librefang-kernel-router.md) — resolves incoming requests to the correct hand and template\n\n### Agent Runtime\n\nThe **runtime** manages a single agent's execution loop — LLM calls, memory, tool invocation, and skill execution:\n\n- [librefang-runtime](Other%20-%20librefang-runtime.md) — coordinates the agent loop by integrating sibling crates\n- [librefang-llm-driver](Other%20-%20librefang-llm-driver.md) / [librefang-llm-drivers](Other%20-%20librefang-llm-drivers.md) — abstract LLM trait and concrete provider implementations (Anthropic, OpenAI, Gemini, etc.)\n- [librefang-runtime-wasm](Other%20-%20librefang-runtime-wasm.md) — Wasmtime-based sandbox for user-authored skills\n- [librefang-runtime-mcp](Other%20-%20librefang-runtime-mcp.md) — Model Context Protocol client for tool discovery\n- [librefang-runtime-oauth](Other%20-%20librefang-runtime-oauth.md) — OAuth 2.0 PKCE flows for third-party service auth\n\n### Capabilities\n\n| Module | Role |\n|--------|------|\n| [librefang-hands](Other%20-%20librefang-hands.md) | Curated capability packages — self-contained handler units loaded from TOML/JSON config |\n| [librefang-skills](Other%20-%20librefang-skills.md) | Skill lifecycle: filesystem loader, remote marketplace, version resolution, in-memory registry |\n| [librefang-memory](Other%20-%20librefang-memory.md) | SQLite-backed persistent storage for agent state, conversation history, and session context |\n| [librefang-extensions](Other%20-%20librefang-extensions.md) | MCP server bootstrap, AES-256-GCM credential vault, OAuth2 integrations |\n\n### Networking & Messaging\n\n- [librefang-wire](Other%20-%20librefang-wire.md) — agent-to-agent authenticated transport over async TCP (LibreFang Protocol framing)\n- [librefang-channels](Other%20-%20librefang-channels.md) — pluggable bridge to 40+ messaging/notification platforms through a unified `Channel` trait\n\n### User Interfaces\n\n**Web:** [librefang-api](Other%20-%20librefang-api.md) is the HTTP/WebSocket server that composes all subsystems into a network-facing service. It ships an embedded [dashboard](Other%20-%20librefang-api-dashboard.md) (React 19 + TanStack), a self-contained [login page](Other%20-%20librefang-api-src.md), and [i18n locale files](Other%20-%20librefang-api-static.md).\n\n**CLI:** [librefang-cli](Other%20-%20librefang-cli.md) produces the `librefang` binary — a `clap`-based CLI with a TUI layer ([screens](Other%20-%20librefang-cli-src.md)) and [Fluent locale catalogs](Other%20-%20librefang-cli-locales.md).\n\n**Desktop:** [librefang-desktop](Other%20-%20librefang-desktop.md) wraps everything in a Tauri 2.0 shell with system tray, auto-updates, and capability-based security ([capabilities](Other%20-%20librefang-desktop-capabilities.md), [generated ACLs](Other%20-%20librefang-desktop-gen.md)).\n\n### Testing & Migration\n\n- [librefang-testing](Other%20-%20librefang-testing.md) — shared mock kernel, mock LLM driver, and route-level test helpers\n- [librefang-migrate](Other%20-%20librefang-migrate.md) — imports agent configurations from third-party frameworks\n\nEach major crate has a companion test module (e.g. [kernel tests](Other%20-%20librefang-kernel-tests.md), [API tests](Other%20-%20librefang-api-tests.md), [memory tests](Other%20-%20librefang-memory-tests.md), [channels tests](Other%20-%20librefang-channels-tests.md), [runtime tests](Other%20-%20librefang-runtime-tests.md), [types tests](Other%20-%20librefang-types-tests.md)) exercising real infrastructure without mocks where possible.\n\n### AI Agent Directives\n\n[AGENTS.md](Other%20-%20AGENTS.md) and [CLAUDE.md](Other%20-%20CLAUDE.md) are policy files consumed by AI coding assistants. They enforce mandatory pre-edit impact analysis against GitNexus's static analysis index to prevent blind edits from cascading through the call graph.\n\n## Key Cross-Cutting Workflow\n\nA typical request flows through the system like this:\n\n1. A user action hits **librefang-api** (HTTP) or **librefang-cli** (TUI)\n2. The request is routed to **librefang-kernel**, which resolves the target agent and hand via **librefang-kernel-router**\n3. **librefang-kernel** delegates execution to **librefang-runtime**, which runs the agent loop\n4. The runtime calls a concrete **librefang-llm-driver** for inference, loads context from **librefang-memory**, and optionally executes sandboxed skills via **librefang-runtime-wasm** or external tools via **librefang-runtime-mcp**\n5. Results are persisted to **librefang-memory**, dispatched outbound through **librefang-channels** or **librefang-wire**, and metered by **librefang-kernel-metering**\n6. **librefang-telemetry** records metrics at every layer","overview":"# crates — Wiki\n\n# LibreFang Agent OS\n\nLibreFang is a full-stack platform for building
