--------|\n| `send()` | Captures into `self.sent` |\n| `supports_streaming()` | Returns `true` |\n| `send_streaming()` | Collects all deltas into `full_text`, stores in `self.streamed` |\n\nUse `get_streamed()` to inspect streaming output and `get_sent()` to verify the non-streaming path was **not** invoked.\n\n### MockFailingStreamingAdapter\n\nStreaming-capable adapter whose `send_streaming()` **always returns `Err`**. Drains the delta stream first (so the bridge's internal `buffered_text` accumulates), then fails. Used to exercise fallback-to-`send()` error paths.\n\n### MockHandle\n\nBasic `ChannelBridgeHandle` that echoes messages and serves a static agent list.\n\n| Method | Behavior |\n|--------|----------|\n| `send_message()` | Records `(agent_id, message)` in `received`, returns `\"Echo: {message}\"` |\n| `find_agent_by_name()` | Looks up the static agent list |\n| `list_agents()` | Returns the full agent list |\n| `spawn_agent_by_name()` | Always returns `Err(\"mock: spawn not implemented\")` |\n\n### MockStreamingHandle\n\n`ChannelBridgeHandle` that provides `send_message_streaming()`. Splits the echo response into **word-level deltas** emitted from a spawned task, returning an `mpsc::Receiver<String>`.\n\n### MockProgressHandle\n\n`ChannelBridgeHandle` implementing `send_message_streaming_with_sender_status()`. Synthesizes a progress marker line (`🔧 tool_name`) followed by prose text, then reports success via the status oneshot. Mirrors production `start_stream_text_bridge_with_status` behavior.\n\n### MockKernelErrorHandle / MockKernelOkHandle\n\nHandle variants that control the **status oneshot** outcome:\n\n- `MockKernelErrorHandle` — emits progress + text deltas, then reports `Err(\"rate limit hit\")` on the status channel. Exercises the `send_streaming Err + kernel Err` outcome.\n- `MockKernelOkHandle` — emits clean text, reports `Ok(())` on status. Also implements `record_delivery()` to capture `(success, error)` metric pairs. Exercises the `send_streaming Err + kernel Ok` outcome (Bug 1 regression fix).\n\n### EventBusHandle\n\n`ChannelBridgeHandle` that exposes a real `tokio::sync::broadcast` channel via `subscribe_events()`. Used for approval listener tests. Returns `(handle, broadcast::Sender)` so tests can inject `Event` instances.\n\n### NotifyingAdapter\n\n`ChannelAdapter` that overrides `notification_recipients()` to return a configured operator list. Returns an immediately-closed `mpsc` stream from `start()` (no inbound messages needed). Captures outbound notifications in `sent`.\n\n## Message Constructors\n\n```rust\nfn make_text_msg(channel: ChannelType, user_id: &str, text: &str) -> ChannelMessage\nfn make_command_msg(channel: ChannelType, user_id: &str, cmd: &str, args: Vec<&str>) -> ChannelMessage\n```\n\nBoth set `platform_message_id` to `\"msg1\"`, `display_name` to `\"TestUser\"`, `is_group` to `false`, `thread_id` to `None`, and empty metadata. `make_command_msg` wraps the content as `ChannelContent::Command`.\n\n## Test Coverage Matrix\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_dispatch_text_message` | Text message routes to the correct agent via `AgentRouter`; response echoes back through the adapter |\n| `test_bridge_dispatch_no_agent_assigned` | Unrouted user gets `\"No agents available\"` error message |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text `\"/agents\"` is parsed and handled as a command |\n| `test_bridge_manager_lifecycle` | Start → 5 sequential messages → stop completes without hanging |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) dispatch independently in the same `BridgeManager` |\n\n### Command Handling\n\n| Test | Command | Expected behavior |\n|------|---------|-------------------|\n| `test_bridge_dispatch_agents_command` | `/agents` | Lists all registered agent names |\n| `test_bridge_dispatch_help_command` | `/help` | Returns help text mentioning `/agents` and `/agent` |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` | Confirms selection; updates `AgentRouter` so subsequent `resolve()` returns the chosen agent |\n| `test_bridge_dispatch_status_command` | `/status` | Returns `\"N agent(s) running\"` |\n\n### Streaming Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_streaming_adapter_uses_send_streaming` | Streaming-capable adapter receives deltas via `send_streaming`, not `send` |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | Non-streaming adapter uses `send()` even when the handle supports streaming |\n| `test_default_send_streaming_collects_and_sends` | Default `ChannelAdapter::send_streaming` impl collects all deltas and calls `send()` with assembled text |\n\n### Progress Markers\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapter (Discord) receives progress markers (🔧) in the consolidated response — the V2 contract that progress is surfaced on every channel |\n\n### Error Recovery\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | Both `send_streaming` and kernel status report errors; fallback `send()` delivers partial buffered text with progress markers preserved |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression test**: kernel succeeds but transport fails → `record_delivery` is called with `(success=true, err=None)`. Success=true + err=Some is a contradictory metric that must not occur. |\n\n### Approval Listener\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_approval_listener_delivers_to_configured_recipients` | `ApprovalRequested` event on the kernel's event bus reaches all configured notification recipients with formatted text (includes approval ID prefix, tool name, `/approve`/`/reject` hints) |\n| `test_approval_listener_skips_adapter_without_recipients` | Adapter with no notification recipients produces no `send()` calls — no crash, no spurious delivery |\n\n## Adding a New Test\n\n1. **Create your mock(s)** using the existing patterns. Most tests need `MockHandle::new(agents)` and `MockAdapter::new(name, channel_type)`.\n2. **Set up routing** — call `router.set_user_default(user_id, agent_id)` if the test expects a routed agent.\n3. **Wire the bridge**:\n   ```rust\n   let mut manager = BridgeManager::new(handle, router);\n   manager.start_adapter(adapter.clone()).await.unwrap();\n   ```\n4. **Inject messages** through the `mpsc::Sender` returned by the mock's constructor.\n5. **Assert asynchronously** using `wait_until(\"descriptive label\", || condition)`.\n6. **Clean up** with `manager.stop().await`.\n\n### When you need a new mock\n\n- For **adapter behavior variants**, implement `ChannelAdapter` on a new struct. Override `supports_streaming()` and `send_streaming()` only if testing streaming paths.\n- For **kernel behavior variants**, implement `ChannelBridgeHandle`. Override `send_message_streaming_with_sender_status()` for progress/error path testing, or `subscribe_events()` for event-driven features.\n- Use `Arc<Mutex<Vec<...>>>` for capturing side effects — this is `Send + Sync + 'static` safe for spawned tasks.\n\n## Key Production Interfaces Exercised\n\n| Interface | Production module | Role in tests |\n|-----------|------------------|---------------|\n| `ChannelAdapter` | `librefang_channels::types` | Mocked; provides inbound stream and outbound delivery |\n| `ChannelBridgeHandle` | `librefang_channels::bridge` | Mocked; acts as the kernel/agent backend |\n| `BridgeManager` | `librefang_channels::bridge` | Real; orchestrates dispatch |\n| `AgentRouter` | `librefang_channels::router` | Real; maps users to agents |\n| `ChannelMessage`, `ChannelContent`, `ChannelUser`, `ChannelType` | `librefang_channels::types` | Constructed directly |","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\nChannel Bridge Layer for LibreFang. Provides 40+ pluggable messaging integrations that convert inbound platform messages into unified `ChannelMessage` events for the kernel and route agent replies back out.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph \"External Platforms\"\n        T[Telegram]\n        D[Discord]\n        S[Slack]\n        W[Webhook]\n        O[37+ more]\n    end\n\n    subgraph \"librefang-channels\"\n        A[ChannelAdapter trait]\n        R[Router / Dispatch]\n        C[Core modules]\n    end\n\n    K[librefang-kernel]\n\n    T -->|HTTP webhook| A\n    D -->|HTTP webhook| A\n    S -->|HTTP webhook| A\n    W -->|HTTP POST| A\n    O -->|various| A\n\n    A --> R\n    R -->|ChannelMessage| K\n    K -->|reply| R\n    R -->|send()| A\n    A -->|HTTP/WS/SMTP| T\n    A -->|HTTP/WS/SMTP| D\n```\n\nChannels sit below the kernel. The kernel calls into channels through dispatch; channels never import the kernel. Each adapter implements the `ChannelAdapter` trait, and the router/dispatch layer fans messages in and replies out.\n\n## Cargo Features\n\n**`default = []`**. Every workspace consumer (`librefang-api`, `librefang-cli`, `librefang-desktop`) sets `default-features = false` and forwards an explicit subset. There is no default channel set.\n\n| Feature flag | Platform |\n|---|---|\n| `channel-telegram` | Telegram |\n| `channel-discord` | Discord |\n| `channel-slack` | Slack |\n| `channel-matrix` | Matrix (pulls in `pulldown-cmark`) |\n| `channel-email` | IMAP/SMTP (pulls in `lettre`, `imap`, `mailparse`, `rustls-*`) |\n| `channel-webhook` | Generic outbound webhook |\n| `channel-whatsapp` | WhatsApp |\n| `channel-signal` | Signal |\n| `channel-teams` | Microsoft Teams |\n| `channel-mattermost` | Mattermost |\n| `channel-irc` | IRC |\n| `channel-google-chat` | Google Chat (pulls in `rsa`) |\n| `channel-mqtt` | MQTT (pulls in `rumqttc`) |\n| `channel-bluesky` | Bluesky |\n| `channel-nostr` | Nostr (pulls in `k256`) |\n| `channel-feishu` | Feishu/Lark (pulls in `aes`, `cbc`) |\n| `channel-wecom` | WeCom (pulls in `aes`, `cbc`) |\n| `channel-ntfy` | ntfy |\n| `all-channels` | Aggregates every adapter above. Used by release CI only. |\n\nSee `Cargo.toml` for the complete feature matrix (44 adapters total).\n\n## Always-Compiled Core\n\nThe trait definition, dispatch glue, and shared utilities compile unconditionally. Only individual adapter implementations are feature-gated.\n\n**Core modules:**\n\n| Module | Responsibility |\n|---|---|\n| `types` | `ChannelMessage`, session IDs, shared types |\n| `bridge` | Adapter registration and lifecycle |\n| `router` | Inbound message routing to the kernel |\n| `commands` | Channel-side command handling |\n| `formatter` | Message formatting across platforms |\n| `sanitizer` | Input sanitization |\n| `message_journal` | Message persistence/journaling |\n| `message_truncator` | Platform-aware message splitting |\n| `rate_limiter` | Per-channel rate limiting |\n| `roster` | Contact/participant management |\n| `sidecar` | Auxiliary channel processes |\n| `thread_ownership` | Thread/conversation ownership tracking |\n| `attachment_enrich` | Attachment metadata extraction |\n\n**Re-exports for platform limits:**\n\n- `split_to_utf16_chunks`, `truncate_to_utf16_limit`, `utf16_len` — UTF-16 aware text utilities for platforms that count in UTF-16 code units\n- `DISCORD_MESSAGE_LIMIT` — 2000 characters\n- `TELEGRAM_MESSAGE_LIMIT` — 4096 characters\n- `TELEGRAM_CAPTION_LIMIT` — 1024 characters\n\n## Boundary\n\n### What this crate owns\n\n- `ChannelAdapter` trait and all adapter implementations under `src/<channel>/`\n- `ChannelMessage` event type\n- Message routing and dispatch logic\n- Attachment enrichment, sanitization, formatting, truncation\n\n### What this crate does NOT own\n\n- HTTP webhook route handlers — those live in `librefang-api/src/routes/channels.rs`\n- Kernel's per-`(agent, session)` lock — channel messages always derive `SessionId::for_channel(agent, \"channel:chat\")`\n\n### Dependency direction\n\n| Depends on | Does NOT depend on |\n|---|---|\n| `librefang-types` | `librefang-kernel` |\n| `librefang-extensions` (vault, shared HTTP client) | `librefang-runtime` |\n| `librefang-http` | |\n\n## Inbound Message Flow\n\n1. External platform sends a webhook/event to `librefang-api`.\n2. The API route handler in `librefang-api/src/routes/channels.rs` invokes the channel adapter.\n3. The adapter parses the platform-specific payload into a `ChannelMessage`.\n4. The router dispatches the `ChannelMessage` to the kernel.\n5. The kernel processes the message, producing a reply.\n6. The kernel calls back into the adapter's `send()` method.\n7. The adapter translates the reply into the platform's API format and delivers it.\n\n## Webhook Security\n\nHMAC/signature verification is **mandatory** for these platforms. Adapters must refuse to start if verification cannot be configured.\n\n| Platform | Environment variable | Config key | Behavior |\n|---|---|---|---|\n| Messenger | `MESSENGER_APP_SECRET` | `[channels.messenger] app_secret_env` | Missing header → 400, mismatch → 401 |\n| Teams | `TEAMS_SECURITY_TOKEN` | `[channels.teams] security_token_env` | Base64 outgoing-webhook token verification |\n| LINE | Platform signature header | — | HMAC-SHA256 on request body |\n| Viber | Platform signature header | — | HMAC-SHA256 on request body |\n| DingTalk | Platform signature header | — | Platform-specific signature |\n\nHealth check probes (curl, monitoring) that omit the signature header will receive 4xx responses. This is intentional.\n\n## Outbound Webhook SSRF Guard\n\nThe `[channels.webhook] callback_url` is validated at adapter startup. The URL must resolve to a public IP. The following are rejected:\n\n- **Private ranges:** 10/8, 172.16/12, 192.168/16\n- **CGN:** 100.64/10\n- **Loopback:** 127/8, ::1\n- **Link-local and multicast**\n- **Cloud metadata endpoints** (169.254/16)\n- **IPv6 short forms:** `[::]`\n- **IPv4-mapped IPv6:** `[::ffff:127.0.0.1]`\n- **NAT64 prefixes**\n- **Trailing-dot FQDNs**\n\nFor local development, use a public tunnel (ngrok, cloudflared) or omit `callback_url` entirely.\n\n## Adding a New Channel Adapter\n\n1. **Create the adapter:** New file `src/<channel>/mod.rs` implementing the `ChannelAdapter` trait.\n2. **Register the feature:** Add `channel-<name> = []` to `Cargo.toml` `[features]`. Add `\"channel-<name>\"` to the `all-channels` list.\n3. **Default is off:** Every adapter ships off-by-default. Never add a new channel to `default`.\n4. **Wire the webhook route** (if the platform uses push delivery) in `librefang-api/src/routes/channels.rs`.\n5. **Write send-path tests:** Create `tests/<channel>_wiremock.rs` with at minimum:\n   - A `send()` happy-path test against a wiremock server\n   - One error-response test (non-2xx from the platform API)\n6. **Document environment variables** in the adapter module's doc comment.\n\nPRs without a `send()` wiremock test will be rejected.\n\n## Testing\n\n- **Inbound parsing:** 795 existing tests covering platform payload parsing.\n- **Outbound `send()`:** Historically undertested. All new work must include wiremock-based tests in `tests/<channel>_wiremock.rs`.\n- **Benchmarks:** Dispatch benchmarks live in `benches/dispatch`.\n\n## Rules and Taboos\n\n| Rule | Reason |\n|---|---|\n| No `librefang-kernel` import | Channels are below the kernel in the dependency graph. The kernel calls into channels; channels never call up. |\n| No bespoke `reqwest::Client` | Use `librefang-extensions::http_client::shared_client()` for connection pooling and consistent TLS configuration. |\n| No `default = [\"all-channels\"]` | The default feature set is and must remain empty. |\n| No bypassing HMAC verification | If a platform requires signature verification, the adapter must implement it or refuse to start. Never silently skip. |\n| No raw `callback_url` without SSRF guard | Use the existing SSRF validation guard for all outbound webhook URLs. |","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# librefang-cli-locales\n\nLocalization module for the LibreFang CLI, providing user-facing messages in multiple languages via [Project Fluent](https://projectfluent.org/) (`.ftl`) translation files.\n\n## Purpose\n\nEvery string the CLI prints — daemon status, error messages, setup wizard prompts, section headings — lives in these locale files rather than being hardcoded. This ensures the CLI is localizable and that all user-facing text is centralized for easy auditing and maintenance.\n\n## Supported Locales\n\n| Locale | Directory | Language |\n|--------|-----------|----------|\n| `en` | `locales/en/main.ftl` | English (default) |\n| `zh-CN` | `locales/zh-CN/main.ftl` | Simplified Chinese |\n\nThe English file is the canonical source of truth. The Chinese file mirrors its structure one-to-one, using identical message identifiers.\n\n## File Format\n\nFiles use Fluent's FTL syntax. Each entry is a key-value pair, optionally with variables:\n\n```fluent\n# Simple message\ndaemon-starting = Starting daemon...\n\n# Message with a variable\nkernel-booted = Kernel booted ({ $provider }/{ $model })\n\n# Multi-line message (note the leading newline)\nshutdown-401-fallback-fix = Stop the daemon manually, then start it again:\n    kill { $pid }    # or: kill -9 { $pid } if it does not exit\n    librefang start\n```\n\n### Variables\n\nVariables are interpolated at runtime by the CLI's localization layer. Common variable names:\n\n- `$error` — error detail string\n- `$path` — filesystem path\n- `$url` — daemon or dashboard URL\n- `$status` — HTTP status code\n- `$pid` — process ID\n- `$count` — numeric count\n- `$id` — resource identifier (agent, cron job, webhook, etc.)\n- `$name` — display name\n- `$key` — config or vault key\n- `$value` — config value\n- `$provider` / `$model` — LLM provider and model identifiers\n- `$env_var` — environment variable name\n- `$command` — CLI subcommand name\n- `$action` — past-tense action verb (e.g., \"pause\", \"resume\")\n- `$field` — field name\n- `$max` — upper bound for numeric selection\n- `$display` — provider display name\n\n## Message Categories\n\nThe locale files are organized into sections by comment headers. The identifiers follow a `category-detail` naming convention.\n\n### Daemon Lifecycle (`daemon-*`, `shutdown-*`)\n\nMessages for `librefang start`, `stop`, and `restart`. Covers startup, health-wait loops, background mode, and the Issue #4693 shutdown-401 fallback flow (where a freshly upgraded CLI can't authenticate against a stale daemon and falls back to PID-based termination).\n\n### Labels (`label-*`, `value-*`, `auth-*`, `warn-*`)\n\nShort field labels used in status tables and info displays — e.g. `label-api`, `label-pid`, `label-status`, `value-audit-trail`.\n\n### Hints and Guidance (`hint-*`, `guide-*`)\n\nContextual help strings surfaced after commands or during interactive setup. The `guide-*` keys power the first-run quick setup wizard that walks users through picking a free LLM provider and pasting an API key.\n\n### Init (`init-*`)\n\nOutput from `librefang init` in both quick (non-interactive) and interactive (wizard) modes.\n\n### Error Messages (`error-*`, `manifest-*`)\n\nStructured error output with two-part patterns: the error itself and a `-fix` companion message suggesting remediation:\n\n```fluent\nerror-connect-refused = Cannot connect to daemon\nerror-connect-refused-fix = Is the daemon running? Start it with: librefang start\n```\n\nBoot-specific errors (`error-boot-*`) are separated from general daemon communication errors.\n\n### Status and Sections (`section-*`)\n\nHeading labels for grouped output in `librefang status`, `librefang doctor`, and similar display commands.\n\n### Channel Setup (`channel-*`)\n\nStrings for `librefang channel setup <name>`, covering Telegram, Discord, Slack, WhatsApp, Email, Signal, and Matrix.\n\n### Vault (`vault-*`)\n\nMessages for credential vault operations: init, store, remove, and the key rotation flow (`vault-rotate-*`). The rotation messages include detailed validation and failure diagnostics for old/new master key mismatches.\n\n### Agent Commands (`agent-*`)\n\nOutput for agent lifecycle: spawn, kill, model assignment, and template discovery.\n\n### Config (`config-*`)\n\nMessages for `librefang config get/set/unset/set-key/edit`, including env-file management via `config-saved-key` and `config-removed-env`.\n\n### Other Categories\n\n- **Cron** (`cron-*`) — scheduled job management\n- **Approvals** (`approval-*`) — human-in-the-loop approval responses\n- **Memory** (`memory-*`) — agent key-value memory operations\n- **Devices** (`device-*`) — mobile device pairing and QR code display\n- **Webhooks** (`webhook-*`) — webhook CRUD and testing\n- **Models** (`model-*`) — default model selection\n- **Hands** (`hand-*`) — hand instance pause/resume and dependency install\n- **Security** (`audit-*`) — audit trail integrity verification output\n- **Health** (`health-*`) — simple daemon health check responses\n- **Uninstall** (`uninstall-*`) — full removal flow including platform-specific autostart cleanup\n- **Reset** (`reset-*`) — data directory reset\n- **Logs** (`log-*`) — log file tailing\n\n## How to Add a New Locale\n\n1. Create a new directory under `locales/` using the appropriate BCP 47 tag (e.g. `ja` for Japanese).\n2. Copy `locales/en/main.ftl` as a starting template.\n3. Translate every message value while keeping all identifiers, variables (`{ $var }`), and multiline structure identical.\n4. Register the locale in the CLI's localization loader (the mechanism depends on the Fluent integration layer in the parent crate).\n\n## How to Add a New Message\n\n1. Add the identifier and English text to `locales/en/main.ftl` under the appropriate section comment.\n2. Add the same identifier to every other locale file (`zh-CN/main.ftl`, etc.) with a translated value. If a translation is not yet available, copy the English string as a placeholder — missing keys will fall back to English at runtime.\n3. Reference the identifier in the CLI codebase using the Fluent localization API (e.g., `fl!(\"daemon-starting\")`).\n\n## Naming Conventions\n\n| Pattern | Usage | Examples |\n|---------|-------|---------|\n| `category-detail` | Primary message | `daemon-started`, `vault-rotate-success` |\n| `category-detail-fix` | Remediation companion | `error-connect-refused-fix` |\n| `section-*` | Display section heading | `section-daemon-status` |\n| `label-*` | Table/field label | `label-uptime`, `label-auth` |\n| `hint-*` | Contextual help line | `hint-stop-daemon` |\n| `warn-*` | Warning indicator | `warn-public-bind` |\n| `value-*` | Label value pair | `value-audit-trail` |\n| `auth-*` | Auth method display | `auth-api-key` |\n\n## Relationship to the Codebase\n\nThis module is a pure resource bundle — it contains no executable code, no Rust modules, and no build logic. The CLI binary loads these `.ftl` files at startup via the Fluent localization framework and looks up messages by identifier when rendering output.\n\n```mermaid\ngraph LR\n    CLI[librefang-cli binary] -->|loads .ftl files| FL[Fluent localization layer]\n    FL --> EN[locales/en/main.ftl]\n    FL --> ZH[locales/zh-CN/main.ftl]\n    FL -->|fl! macro lookup| Output[Terminal output]\n```\n\nAll other CLI submodules (daemon control, agent management, config, vault, etc.) depend on this module for user-facing strings but never hardcode their own.","other-librefang-cli-templates":"# Other — librefang-cli-templates\n\n# librefang-cli-templates\n\nStatic TOML configuration templates used by `librefang init` to scaffold a new LibreFang Agent OS configuration file.\n\n## Overview\n\nThis module contains no executable code. It ships two TOML template files that are rendered at project initialization time. Placeholders in the form `{{key}}` are substituted with user-provided values collected during the init or setup-wizard flow.\n\n| File | Purpose |\n|---|---|\n| `init_default_config.toml` | Full reference config with every section present (most commented out). Used by `librefang init` when the user wants a complete starting point. |\n| `init_wizard_config.toml` | Minimal skeleton generated by the interactive setup wizard (`librefang init --wizard`). Only essential keys are emitted. |\n\n## Template Rendering\n\nBoth files are plain TOML with Mustache-style placeholders. The CLI init command reads the appropriate file, performs string substitution, and writes the result to the user's config directory.\n\n### Placeholders\n\n| Placeholder | Used In | Description |\n|---|---|---|\n| `{{provider}}` | Both | LLM provider name (e.g. `openai`, `anthropic`, `ollama`) |\n| `{{model}}` | Both | Default model identifier (e.g. `gpt-4o`, `claude-sonnet-4-20250514`) |\n| `{{api_key_env}}` | `init_default_config.toml` | Environment variable name holding the API key (e.g. `OPENAI_API_KEY`) |\n| `{{api_key_line}}` | `init_wizard_config.toml` | Pre-formatted `api_key_env = \"...\"` line (or empty string if not applicable) |\n| `{{routing_section}}` | `init_wizard_config.toml` | Optional agent routing TOML block appended after memory config |\n\nNo template engine dependency is required — simple string replacement (`str.replace`) suffices.\n\n## Configuration Sections Reference\n\nThe sections below appear in `init_default_config.toml` as inline documentation. When modifying the template, keep comments accurate and in sync with the runtime config parser.\n\n### Core Settings (top-level keys)\n\n| Key | Default | Values |\n|---|---|---|\n| `api_listen` | `\"127.0.0.1:4545\"` | Bind address and port. Loopback-only by default. |\n| `log_level` | `\"info\"` | `trace` \\| `debug` \\| `info` \\| `warn` \\| `error` |\n| `mode` | `\"default\"` | `stable` \\| `default` \\| `dev` |\n| `update_channel` | `\"stable\"` | `stable` \\| `beta` \\| `rc` |\n\n### Security Model\n\nThe template enforces a safe-by-default posture:\n\n- **Non-loopback binding is rejected** unless authentication is configured. The daemon checks for `api_key`, `dashboard_user`/`dashboard_pass`, or `[[users]]` entries before accepting a non-loopback `api_listen`.\n- `LIBREFANG_ALLOW_NO_AUTH=1` overrides this guard (documented as not recommended).\n- Dashboard defaults (`librefang` / `librefang`) must be changed after first login.\n- Secure credential storage is supported via vault references (`\"vault:dashboard_password\"`) or environment variables (`LIBREFANG_DASHBOARD_PASS`).\n\n### Terminal Access Control (`[terminal]`)\n\nCommented out by default. Three keys control remote shell access:\n\n- `allow_remote` — enables remote terminal connections (requires auth unless overridden).\n- `allow_unauthenticated_remote` — foot-gun guard; must be explicitly set to `true`.\n- `require_proxy_headers` — enable only behind a reverse proxy that sets `X-Forwarded-For` / `X-Real-IP`.\n\n### LLM Configuration (`[default_model]`)\n\nThe primary model used when no agent-specific override exists.\n\n```toml\n[default_model]\nprovider = \"{{provider}}\"\nmodel = \"{{model}}\"\napi_key_env = \"{{api_key_env}}\"\n# base_url = \"\"    # optional endpoint override\n```\n\n### Memory (`[memory]` and `[proactive_memory]`)\n\n- `[memory].decay_rate` — confidence decay per cycle (default `0.05`).\n- `[proactive_memory]` controls automatic fact extraction and recall. Enabled by default with `auto_memorize = true` and `auto_retrieve = true`.\n\n### Web Tools (`[web]`)\n\n- `search_provider = \"auto\"` auto-detects among Tavily → Brave → Jina → Perplexity → DuckDuckGo based on available API keys.\n- `[web.fetch]` controls page extraction limits and SSRF protection. Cloud metadata addresses (`169.254.x.x`, `100.64.x.x`) are always blocked.\n\n### Task Queue (`[queue.concurrency]`)\n\nConcurrency caps per lane:\n\n| Lane | Default | Purpose |\n|---|---|---|\n| `main_lane` | 3 | User messages |\n| `cron_lane` | 2 | Scheduled jobs |\n| `subagent_lane` | 3 | Child agents |\n| `trigger_lane` | 8 | In-flight trigger dispatches |\n| `default_per_agent` | 1 | Per-agent fallback |\n\n### Shell Execution Policy (`[exec_policy]`)\n\n```toml\n[exec_policy]\nmode = \"deny\"           # deny | allowlist | full\ntimeout_secs = 30\nmax_output_bytes = 102400\n```\n\n`deny` is the safest default — no shell commands execute until the operator explicitly opens access.\n\n### Hot-Reload (`[reload]`)\n\n```toml\n[reload]\nmode = \"hybrid\"     # off | restart | hot | hybrid\ndebounce_ms = 500\n```\n\n`hybrid` applies hot-reload where possible and restarts the daemon for keys that require it.\n\n### Optional Sections (commented out)\n\nThese sections are present in `init_default_config.toml` but commented out. Uncomment to activate:\n\n| Section | Purpose |\n|---|---|\n| `[[fallback_providers]]` | LLM failover chain when the default provider fails |\n| `[rate_limit]` | GCRA-based per-IP rate limiting for API and WebSocket |\n| `[registry]` | Agent registry sync interval |\n| `[compaction]` | LLM-based session history summarization |\n| `[triggers]` | Event trigger recursion and cooldown limits |\n| `[budget]` | Per-hour/day/month cost caps with per-provider overrides |\n| `[thinking]` | Extended thinking budget for Claude models |\n| `[channels.telegram/discord/slack/wechat]` | Messaging channel integrations |\n| `[[mcp_servers]]` | External MCP tool servers |\n| `[browser]` | Headless browser automation |\n| `[docker]` | Containerized code execution sandbox |\n| `[inbox]` | File-based async message ingestion |\n| `[network]` | P2P federation between LibreFang nodes |\n| `[provider_regions]` | Regional endpoint selection (e.g., Qwen intl, MiniMax China) |\n| `[provider_urls]` | Custom provider endpoints (Ollama, vLLM, etc.) |\n\n### Editor Integration (ACP)\n\nDocumented in the template comments but requires no configuration keys. Editors spawn `librefang acp` as a child process. The ACP server auto-selects between in-process mode and daemon-attached mode (via `~/.librefang/acp.sock` on Unix).\n\n## Relationship to the Codebase\n\n```\n┌──────────────────────┐\n│  librefang init      │\n│  (CLI command)       │\n└──────┬───────────────┘\n       │ reads template + collects user input\n       ▼\n┌──────────────────────────────────┐\n│  templates/                      │\n│    init_default_config.toml      │──── string replace ────▶  ~/.librefang/config.toml\n│    init_wizard_config.toml       │\n└──────────────────────────────────┘\n                                                    │\n                                                    ▼\n                                          ┌──────────────────┐\n                                          │  config loader    │\n                                          │  (runtime)        │\n                                          └──────────────────┘\n```\n\nThe templates are a one-time scaffolding concern. After generation, the user edits `~/.librefang/config.toml` directly and the runtime config loader parses it. The templates have no further involvement at runtime.\n\n## Modifying Templates\n\nWhen adding a new configuration key:\n\n1. Add the key to `init_default_config.toml` in the appropriate section, commented out with a descriptive comment.\n2. If the key is essential for first run, add it (with placeholder if needed) to `init_wizard_config.toml`.\n3. Ensure the init command's substitution logic handles any new `{{placeholder}}` tokens.\n4. Keep inline comments concise — they serve as in-file documentation for operators who never read external docs.","other-librefang-cli-tests":"# Other — librefang-cli-tests\n\n# librefang-cli-tests\n\nIntegration and regression tests for the `librefang-cli` crate. This module contains two test suites that guard against specific historical regressions: one preventing `build.rs` from mutating user git configuration, and another validating the credential vault key-rotation pipeline end-to-end.\n\n## Test Files\n\n### `build_rs_no_git_mutation.rs`\n\n**Issue:** #3641 — A prior version of `build.rs` silently modified the user's global git config (specifically `core.hooksPath`) during compilation. This is a supply-chain-adjacent hazard: build scripts should be read-only with respect to the developer's environment.\n\n**Strategy:** Static analysis of `build.rs` source at test time. The tests read the file from disk, strip `//` comments to avoid false positives from doc comments mentioning the old bug, and assert that banned string literals do not appear.\n\n#### Tests\n\n| Test | What it asserts |\n|------|----------------|\n| `build_rs_does_not_mutate_git_config` | The source contains neither `\"config\"` nor `\"hooksPath\"` as string literals. The bare `\"config\"` token is banned outright — if read-only `git config --get` is ever needed, an explicit allowance must be added here. |\n| `build_rs_uses_only_read_only_git_subcommands` | The source does not contain any of `\"init\"`, `\"clone\"`, `\"commit\"`, `\"push\"`, `\"pull\"`, `\"fetch\"`, `\"checkout\"`, `\"reset\"`, `\"add\"`, or `\"rm\"` as string literals. |\n\n#### Helper Functions\n\n- **`read_build_rs()`** — Reads `build.rs` from `CARGO_MANIFEST_DIR`. Panics if the file is unreadable so the failure is unambiguous in CI.\n- **`strip_comments(src)`** — Removes `//`-style line comments. This is intentionally simple (not a full Rust lexer) because `build.rs` is straightforward code; it's sufficient to prevent doc comments referencing the old bug from triggering the check.\n\n#### Adding a new forbidden pattern\n\nAppend the string literal to the `forbidden` array in `build_rs_uses_only_read_only_git_subcommands`. If a read-only git invocation is legitimately needed, add a targeted allow-list check rather than weakening the blanket ban.\n\n---\n\n### `vault_rotate_key.rs`\n\n**Issue:** #3651 — The `librefang vault rotate-key` CLI subcommand re-encrypts the credential vault under a new master key. This test suite exercises the full rotation pipeline at the library level rather than spawning the CLI binary.\n\n**Why library-level testing instead of CLI spawning:** The actual `cmd_vault_rotate_key` function calls `std::process::exit` on errors and reads `LIBREFANG_VAULT_KEY_OLD` / `LIBREFANG_VAULT_KEY_NEW` from the process environment. Spawning the binary in tests creates environment pollution and makes parallel `cargo test` runs flaky. Driving `librefang_extensions::vault::CredentialVault` directly is deterministic, covers the real invariants, and runs safely in parallel.\n\n#### Test helper\n\n- **`key_filled(b: u8) -> Zeroizing<[u8; 32]>`** — Produces a deterministic 32-byte key where every byte is `b`. Avoids `OsRng` so failures are reproducible.\n\n#### Tests\n\n**`rotate_key_end_to_end_replaces_master_key_and_preserves_entries`**\n\nFull lifecycle across four phases:\n\n1. **Create** — Initialize a vault under key A, store `API_KEY` and `REFRESH_TOKEN`, verify sentinel is present.\n2. **Rotate** — Unlock with key A, verify sentinel, confirm user-visible keys match expectations, then call `rewrap_with_new_key(key_b)`.\n3. **Verify new key** — Unlock with key B, assert both stored values are recovered as plaintext, verify sentinel survived rotation, confirm sentinel is hidden from `list_keys()`.\n4. **Reject old key** — Assert `unlock_with_key(key_a)` fails. This is the core security invariant.\n\n**`rewrap_with_identical_key_still_decrypts`**\n\nThe CLI rejects same-key rotation as a user footgun, but at the library level `rewrap_with_new_key` with the same key is idempotent (re-encrypts under a fresh AES-GCM nonce/salt). This test confirms the library doesn't corrupt the vault in that case.\n\n**`sentinel_round_trips_through_rotation`**\n\nUses `iter_all_entries()` (which includes reserved internal keys invisible to `list_keys()`) to directly inspect the sentinel key/value pair after rotation. Asserts the sentinel value round-trips exactly — without this, the post-rotation vault would fail the boot integrity check.\n\n```mermaid\nflowchart TD\n    A[init_with_key key_old] --> B[set user entries]\n    B --> C[verify_or_install_sentinel]\n    C --> D[unlock_with_key key_old]\n    D --> E[rewrap_with_new_key key_new]\n    E --> F[unlock_with_key key_new]\n    F --> G{get user entries}\n    F --> H[verify_or_install_sentinel]\n    F --> I[iter_all_entries → SENTINEL_KEY]\n    E --> J[unlock_with_key key_old → MUST FAIL]\n```\n\n## Dependencies on Other Crates\n\n| Crate | Usage |\n|-------|-------|\n| `librefang-extensions` | `CredentialVault`, `SENTINEL_KEY`, `SENTINEL_VALUE` — the vault API under test |\n| `tempfile` | Isolated temporary directories for vault files |\n| `zeroize` | `Zeroizing` wrappers for key material and plaintext values |\n\n## Running\n\n```sh\n# All tests in this module\ncargo test -p librefang-cli --test build_rs_no_git_mutation --test vault_rotate_key\n\n# Individual suites\ncargo test -p librefang-cli --test build_rs_no_git_mutation\ncargo test -p librefang-cli --test vault_rotate_key\n```\n\nNo environment variables, external services, or network access are required. All tests are hermetic and safe for parallel execution.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nCommand-line interface for the LibreFang Agent OS. Produces the `librefang` binary that serves as the primary entry point for interacting with the system.\n\n## Overview\n\nThe CLI operates in two modes depending on whether a daemon is already running:\n\n- **Daemon mode** (`librefang start`): Starts a long-lived HTTP API server and dashboard at `http://127.0.0.1:4545`.\n- **Single-shot mode**: When no daemon is detected, individual commands boot an in-process kernel, execute, and exit.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[librefang binary] -->|HTTP client| DAEMON[Running Daemon :4545]\n    CLI -->|In-process kernel| KERNEL[librefang-kernel]\n    KERNEL --> API[librefang-api]\n    API --> CHANNELS[librefang-channels]\n    API --> SKILLS[librefang-skills]\n    API --> EXTENSIONS[librefang-extensions]\n    KERNEL --> MEMORY[librefang-memory]\n    KERNEL --> MIGRATE[librefang-migrate]\n    CLI --> ACP[librefang-acp]\n    CLI --> RUNTIME[librefang-runtime]\n```\n\n## Feature Flags\n\nFeature flags control which channel adapters and capabilities are compiled. This keeps developer build times reasonable — the default feature set avoids heavy dependencies like `matrix-sdk-crypto`, `lettre`, `imap`, `rsa`, `rumqttc`, and `nostr-sdk`.\n\n| Feature | Description |\n|---|---|\n| `default` | Enables `core-channels` (telegram, discord, slack, webhook, ntfy) and `telemetry`. |\n| `all-channels` | Enables the full ~25-channel adapter set. Does **not** imply `telemetry`. |\n| `mini` | Minimal build via `librefang-api/mini`. |\n| `android` | All channels except email (excluded due to `rustls-connector` + `rustls-platform-verifier` incompatibility on Android). |\n| `telemetry` | Enables OpenTelemetry tracing export. Brings in `opentelemetry`, `opentelemetry_sdk`, and `tracing-opentelemetry`. |\n\n**Release CI** builds with `--features all-channels` (default features remain active, so `telemetry` is included). To build everything explicitly with no defaults:\n\n```bash\ncargo build -p librefang-cli --no-default-features --features all-channels,telemetry\n```\n\n## Common Commands\n\n| Command | Description |\n|---|---|\n| `librefang start` | Start the daemon (HTTP API + dashboard). |\n| `librefang init` | Write a starter config to `~/.librefang/config.toml`. |\n| `librefang agent <subcommand>` | Spawn, list, or message agents. |\n| `librefang doctor` | Diagnose the local environment and configuration. |\n\nRun `librefang help` or any subcommand with `--help` for the full catalog.\n\n## Build Script (`build.rs`)\n\nThe build script captures metadata at compile time and injects it via `cargo:rustc-env`:\n\n| Variable | Source | Fallback |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `\"unknown\"` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `\"unknown\"` |\n| `RUSTC_VERSION` | `rustc --version` | `\"unknown\"` |\n\nThese are accessible at runtime via `env!(\"GIT_SHA\")`, `env!(\"BUILD_DATE\")`, and `env!(\"RUSTC_VERSION\")` — typically used in `--version` output or diagnostic commands like `doctor`.\n\n## Key Dependencies\n\n### Internal crates\n\n- **librefang-kernel** — Core agent runtime and orchestration.\n- **librefang-api** — HTTP API layer and channel adapter registry. The CLI passes feature flags through to this crate.\n- **librefang-channels** — Channel adapter implementations (feature-gated).\n- **librefang-migrate** — Database migration logic.\n- **librefang-skills** — Agent skill definitions.\n- **librefang-extensions** — Extension system.\n- **librefang-memory** — Agent memory and persistence.\n- **librefang-runtime** — Runtime support utilities.\n- **librefang-acp** — Access control policies (with `kernel-adapter` feature).\n- **librefang-types** — Shared type definitions.\n\n### Notable external crates\n\n- **clap** / **clap_complete** — Argument parsing and shell completion generation.\n- **tokio** — Async runtime.\n- **tracing** / **tracing-subscriber** — Structured logging.\n- **reqwest** (blocking) — HTTP client for daemon communication.\n- **ratatui** — Terminal UI framework (used for the dashboard).\n- **rusqlite** — SQLite for local state.\n- **toml** / **toml_edit** — Configuration file parsing and manipulation.\n- **tikv-jemallocator** — Global allocator on non-MSVC targets, replacing the system allocator for improved performance. Gated behind `cfg(not(target_env = \"msvc\"))`.\n\n## Configuration\n\nThe CLI reads configuration from `~/.librefang/config.toml`. Generate a starter config with:\n\n```bash\nlibrefang init\n```\n\nThe config file controls the HTTP bind address, channel credentials, telemetry endpoints, and other agent settings.","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# LibreFang Desktop Capabilities\n\n## Overview\n\nThis module defines the Tauri capability configurations for the LibreFang desktop application. Capabilities in Tauri serve as a security boundary, specifying which APIs and features are available to the application's windows on each platform. The module contains two declarative JSON files that gate access to system-level functionality across desktop and mobile builds.\n\n## Purpose\n\nTauri uses a capability-based security model rather than traditional blanket permissions. Each capability file declares:\n\n- **Which windows** the permissions apply to\n- **Which platforms** the configuration targets\n- **Which Tauri plugin APIs** are explicitly allowed\n\nThis ensures the application only requests the minimum set of system permissions it needs, and that mobile builds don't attempt to invoke desktop-only APIs that aren't bundled.\n\n## Configuration Files\n\n### `default.json` — Desktop Platforms\n\nTargets **macOS**, **Windows**, and **Linux**. Applied to the `main` window.\n\n| Permission | Purpose |\n|---|---|\n| `core:default` | Base Tauri runtime functionality |\n| `notification:default` | System notification delivery |\n| `shell:default` | Shell and process execution |\n| `dialog:default` | Native file and message dialogs |\n| `global-shortcut:allow-register` | Register global keyboard shortcuts |\n| `global-shortcut:allow-unregister` | Remove registered global shortcuts |\n| `global-shortcut:allow-is-registered` | Query whether a shortcut is registered |\n| `autostart:default` | Launch at system login |\n| `updater:default` | In-app update checks and installation |\n\nThe `global-shortcut` permissions use fine-grained `allow-*` scopes rather than the plugin's `default` set, limiting access to only the three operations the application needs.\n\n### `mobile.json` — Mobile Platforms\n\nTargets **iOS** and **Android**. Applied to the `main` window.\n\n| Permission | Purpose |\n|---|---|\n| `core:default` | Base Tauri runtime functionality |\n| `notification:default` | System notification delivery |\n| `dialog:default` | Native file and message dialogs |\n\nMobile builds intentionally exclude `shell`, `global-shortcut`, `autostart`, and `updater`. These plugins either lack mobile implementations or provide functionality (system-wide hotkeys, login-item registration, self-updating) that is inappropriate or unsupported on iOS/Android.\n\n## Permission Coverage by Platform\n\n```mermaid\ngraph LR\n    subgraph Desktop[\"Desktop — default.json\"]\n        D1[core]\n        D2[notification]\n        D3[shell]\n        D4[dialog]\n        D5[global-shortcut]\n        D6[autostart]\n        D7[updater]\n    end\n\n    subgraph Mobile[\"Mobile — mobile.json\"]\n        M1[core]\n        M2[notification]\n        M3[dialog]\n    end\n```\n\n## Adding a New Permission\n\nWhen introducing a new Tauri plugin to the application:\n\n1. **Add the plugin dependency** to `Cargo.toml` and/or `package.json` as required.\n2. **Determine platform support.** Check whether the plugin works on mobile or is desktop-only.\n3. **Add the permission identifier** to the relevant capability file(s):\n   - Cross-platform plugin → add to both `default.json` and `mobile.json`.\n   - Desktop-only plugin → add to `default.json` only.\n4. **Prefer specific scopes.** Use `allow-<action>` over `<plugin>:default` when you only need a subset of the plugin's functionality.\n\n### Permission Identifier Format\n\nIdentifiers follow the pattern `<plugin>:<scope>`:\n\n- `core:default` — the core plugin's default permission set\n- `global-shortcut:allow-register` — a specific allowed action\n- `notification:default` — the notification plugin's default permission set\n\nEach file references the [Tauri schema](https://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json) in its `$schema` field, which enumerates all valid permission identifiers.\n\n## Relationship to the Application\n\nThese capability files are consumed at build time by the Tauri bundler. The frontend code in `librefang-desktop` can only invoke Tauri APIs that are explicitly listed in the capability configuration matching the current platform. Calling an unlisted API produces a runtime permission error.\n\nThe capability system is purely declarative — there are no function calls, imports, or execution flows within this module. It acts as a static security policy enforced by the Tauri runtime.\n\n## Key Considerations\n\n- **Least privilege.** Only add permissions the application actively uses. Avoid `default` scopes when specific `allow-*` permissions suffice.\n- **Platform isolation.** Keep the mobile capability set minimal. Plugins like `shell` and `autostart` have no meaningful implementation on iOS/Android and must not be included.\n- **Window scoping.** Both configurations target only the `main` window. If additional windows are introduced, new capability files must explicitly list them in the `windows` array, or the existing files must be updated to include the new window names.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop/gen — Tauri Generated Scaffolding & Security Schemas\n\n## Purpose\n\nThe `gen/` directory is automatically generated by Tauri v2's build tooling and contains two categories of output:\n\n1. **Platform scaffolding** (`android/`, `apple/`) — native project stubs for mobile builds\n2. **Security schemas** (`schemas/`) — ACL manifests, capability definitions, and JSON Schema files that govern what the frontend webview may access via the Tauri IPC layer\n\nThis directory is **not hand-edited** in normal development. It is regenerated by `cargo tauri build`, `cargo tauri dev`, or the platform-specific init commands. The source of truth for capabilities lives in the Tauri configuration, not here.\n\n---\n\n## Directory Structure\n\n```\ngen/\n├── android/            # Android Studio project (populated by cargo tauri android init)\n│   └── README.md\n├── apple/              # Xcode project (populated by cargo tauri ios init, macOS only)\n│   └── README.md\n└── schemas/\n    ├── acl-manifests.json      # All plugin permission definitions\n    ├── capabilities.json       # Resolved capability sets for this app\n    └── desktop-schema.json     # JSON Schema validating capability files\n```\n\n---\n\n## Platform Scaffolding\n\n### Android\n\nPopulated by running from `crates/librefang-desktop/`:\n\n```bash\ncargo tauri android init\n```\n\nThis generates a standard Android Studio project under `gen/android/` that wraps the Tauri webview in an Android activity.\n\n### Apple (iOS / macOS)\n\nPopulated by running from `crates/librefang-desktop/` on macOS:\n\n```bash\ncargo tauri ios init\n```\n\nGenerates an Xcode project under `gen/apple/`.\n\nBoth directories start as stub README files and are populated only when mobile builds are initialized.\n\n---\n\n## Security Schemas\n\n### `acl-manifests.json`\n\nDeclares every permission available from every Tauri plugin bundled into LibreFang. Each plugin entry contains:\n\n| Field | Description |\n|---|---|\n| `default_permission` | The permission set applied when you reference `plugin-name:default` |\n| `permissions` | Individual `allow-*` / `deny-*` identifiers mapping to specific IPC commands |\n| `permission_sets` | Named groups of permissions (beyond the default) |\n| `global_scope_schema` | JSON Schema for scoped permissions (e.g., shell command allowlists) |\n\n**Plugins present in the manifest:**\n\n| Plugin | Default allows | Key capability |\n|---|---|---|\n| `core` | Aggregates all core plugin defaults | Umbrella for path, event, window, webview, app, image, resources, menu, tray |\n| `core:app` | App metadata, listeners, multi-window query | `version`, `name`, `tauri-version`, `identifier` |\n| `core:event` | All event commands | `listen`, `unlisten`, `emit`, `emit_to` |\n| `core:image` | All image commands | `new`, `from-bytes`, `from-path`, `rgba`, `size` |\n| `core:menu` | All menu commands | Full CRUD for menu items, accelerators, app/window menus |\n| `core:path` | All path commands | `resolve`, `join`, `dirname`, `basename`, etc. |\n| `core:resources` | Resource close | `close` |\n| `core:tray` | All tray commands | Create, remove, set icon/menu/tooltip/title/visible |\n| `core:webview` | Webview introspection + devtools | `get_all_webviews`, position/size queries, `internal_toggle_devtools` |\n| `core:window` | Window state queries | Position, size, fullscreen, minimized, maximized, focused, theme, monitors |\n| `autostart` | Enable, disable, check auto-start on boot | `allow-enable`, `allow-disable`, `allow-is-enabled` |\n| `dialog` | Message, save, open dialogs | `allow-message`, `allow-save`, `allow-open` |\n| `global-shortcut` | None by default (opt-in) | `register`, `unregister`, `is_registered` |\n| `notification` | Full notification lifecycle | Permission checks, notify, channels, batch, cancel |\n| `shell` | `open` for `http(s)://`, `tel:`, `mailto:` | `execute`, `spawn`, `kill`, `stdin_write` available but not default |\n| `updater` | Full update lifecycle | `check`, `download`, `install`, `download_and_install` |\n\n### `capabilities.json`\n\nDefines the actual capabilities granted to windows in LibreFang. Two capability sets are configured:\n\n#### `default` — Desktop\n\n```json\n{\n  \"identifier\": \"default\",\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"shell:default\",\n    \"dialog:default\",\n    \"global-shortcut:allow-register\",\n    \"global-shortcut:allow-unregister\",\n    \"global-shortcut:allow-is-registered\",\n    \"autostart:default\",\n    \"updater:default\"\n  ],\n  \"platforms\": [\"macOS\", \"windows\", \"linux\"]\n}\n```\n\nGranted to the `main` window on desktop platforms. Notable decisions:\n\n- **`global-shortcut`** is granted individual permissions rather than a blanket default — only `register`, `unregister`, and `is_registered` are exposed.\n- **`shell:default`** allows opening `http(s)://`, `tel:`, and `mailto:` links but does **not** expose `execute`, `spawn`, or `kill` to the frontend.\n- **`updater:default`** gives the frontend full control over the update check/download/install cycle.\n\n#### `mobile` — iOS / Android\n\n```json\n{\n  \"identifier\": \"mobile\",\n  \"windows\": [\"main\"],\n  \"permissions\": [\n    \"core:default\",\n    \"notification:default\",\n    \"dialog:default\"\n  ],\n  \"platforms\": [\"iOS\", \"android\"]\n}\n```\n\nA reduced permission set — desktop-only plugins (`shell`, `global-shortcut`, `autostart`, `updater`) are omitted since they are not bundled on mobile targets.\n\n### `desktop-schema.json`\n\nA JSON Schema (Draft 7) document that validates capability files. It defines the structure for:\n\n- **`Capability`** — identifier, description, windows/webviews matchers, permissions list, platform filter, remote URL config, local flag\n- **`PermissionEntry`** — either a bare identifier string (`\"core:default\"`) or an object with `identifier` + scoped `allow`/`deny` arrays\n- **`Identifier`** — exhaustive enum of every valid permission string across all bundled plugins\n- **`ShellScopeEntry`** — defines allowed shell commands with argument validators (regex-based) and support for sidecar commands\n\nThis schema is used by Tauri's CLI and build system to validate capability files at build time.\n\n---\n\n## How to Modify Permissions\n\nThe `gen/schemas/` files are derived artifacts. To change what the frontend can access:\n\n1. **Edit the source capability files** in `src-tauri/capabilities/` (or wherever the Tauri config references them)\n2. **Rebuild** with `cargo tauri build` or `cargo tauri dev` — the schemas are regenerated automatically\n3. **Verify** by checking `gen/schemas/capabilities.json` reflects your changes\n\nNever edit `gen/` files directly — they will be overwritten on the next build.\n\n---\n\n## Relationship to the Rest of the Codebase\n\n```mermaid\ngraph TD\n    A[src-tauri/capabilities/<br/>Source capability files] -->|cargo tauri build| B[gen/schemas/<br/>Generated schemas]\n    B -->|Read by| C[Tauri runtime<br/>Permission enforcement]\n    D[Frontend webview] -->|IPC calls| C\n    C -->|Allow / Deny| D\n    E[gen/android/<br/>gen/apple/] -->|Mobile build targets| F[APK / IPA]\n```\n\n- The **source capability files** define intent\n- The **generated schemas** are the resolved, machine-readable form\n- The **Tauri runtime** reads the generated schemas at app startup to enforce the permission boundary between the frontend and the native backend\n- The **platform directories** are only relevant when building for mobile","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop and mobile application for the LibreFang Agent OS, built on **Tauri 2.0**. This crate produces the installable GUI application that users interact with directly — a system-tray-aware desktop agent on macOS/Windows/Linux, and a thin remote-dashboard client on iOS/Android.\n\n## Architecture Overview\n\n```mermaid\ngraph LR\n  subgraph Desktop\n    A[librefang-desktop] --> B[librefang-kernel]\n    A --> C[librefang-api]\n    A --> D[librefang-extensions]\n    A --> E[librefang-types]\n  end\n  subgraph Mobile\n    F[librefang-desktop] -->|HTTP/WS| G[Remote Daemon]\n  end\n```\n\n**Desktop** runs the full LibreFang stack in-process — kernel, API server, extensions, and all channel adapters are embedded and communicate locally.\n\n**Mobile** is a thin client only. The app renders a dashboard that connects over HTTP/WebSocket to a remote `librefang` daemon running on a server, VPS, NAS, or desktop machine. This is intentional: LibreFang needs 24×7 uptime for cron jobs, autodream, channel adapters, and triggers, which iOS/Android cannot guarantee due to OS background execution limits.\n\n## Platform Matrix\n\n| Platform | Role | Tray Icon | Autostart | Updater | Shell Plugin | Single Instance |\n|----------|------|-----------|-----------|---------|--------------|-----------------|\n| macOS | Full agent | Always on | ✓ | ✓ | ✓ | ✓ |\n| Windows | Full agent | Always on | ✓ | ✓ | ✓ | ✓ |\n| Linux | Full agent | Opt-in (`linux-tray`) | ✓ | ✓ | ✓ | ✓ |\n| iOS | Thin client | — | — | — | — | — |\n| Android | Thin client | — | — | — | — | — |\n\nMobile-only plugins (`tauri-plugin-barcode-scanner`, `keyring`) are gated behind `cfg(any(target_os = \"ios\", target_os = \"android\"))`. Desktop-only plugins are gated behind the inverse. See `MOBILE.md` for the full list of compiled-out features.\n\n## Crate Layout\n\n```\nlibrefang-desktop/\n├── Cargo.toml                  # Dependencies, features, crate-type\n├── build.rs                    # tauri_build::build()\n├── src/\n│   ├── main.rs                 # Desktop binary entry point\n│   └── lib.rs                  # Library crate (shared by desktop binary + mobile shells)\n├── tauri.conf.json             # Base Tauri config (CSP, bundle, product metadata)\n├── tauri.desktop.conf.json     # Desktop overlay (auto-updater pubkey + endpoints)\n├── tauri.android.conf.json     # Android overlay (lfconnect:// scheme, minSdkVersion)\n├── tauri.ios.conf.json         # iOS overlay (lfconnect:// scheme, minimumSystemVersion)\n├── gen/                        # Generated mobile scaffolds (commit after init)\n│   ├── android/                # Gradle project (cargo tauri android init)\n│   └── apple/                  # Xcode project (cargo tauri ios init)\n└── MOBILE.md                   # Mobile build/distribution guide\n```\n\nTauri's configuration layering merges platform-specific `.conf.json` files over the base `tauri.conf.json`. The `identifier` field differentiates desktop (`ai.librefang.desktop`) from mobile (`ai.librefang.app`).\n\n## Crate Types\n\n```toml\n[lib]\ncrate-type = [\"staticlib\", \"cdylib\", \"lib\"]\n```\n\nAll three are required so the same crate works everywhere:\n\n- **`lib`** (rlib) — the desktop binary in `src/main.rs` links against this normally.\n- **`staticlib`** — iOS/Android native shells (Xcode/Gradle) link the static archive.\n- **`cdylib`** — the Tauri mobile runtime loads the dynamic library.\n\n**Side effect:** desktop builds also produce the `staticlib` and `cdylib` outputs, adding ~10–20% to clean build time. Cargo cannot conditionalize `crate-type` on target at the manifest level, so this cost is accepted for workspace uniformity.\n\n## Cargo Features\n\n| Feature | Effect |\n|---------|--------|\n| `default` | Inherits `librefang-api/default` |\n| `all-channels` | Inherits `librefang-api/all-channels` |\n| `mini` | Inherits `librefang-api/mini` (minimal channel set) |\n| `custom-protocol` | Enables `tauri/custom-protocol` — required for production `.dmg`/`.msi`/`.deb` bundles |\n| `mobile` | No-op flag documenting the mobile build path; mobile targets are cfg-gated |\n| `linux-tray` | Re-enables the system tray on Linux desktop via `tauri/tray-icon` |\n| `mobile-no-email` | Excludes the email channel (`librefang-api/all-channels-no-email`) — needed because `rustls-platform-verifier 0.7.0` has an unimplemented method on Android |\n\n### The Linux Tray Situation\n\nOn macOS and Windows, the system tray uses native APIs (`NSStatusItem` / `Shell_NotifyIconW`) — no issues. On Linux, Tauri 2.10's `tray-icon` feature pulls `libappindicator-rs 0.9`, which transitively depends on 8 unmaintained GTK3 crates (RUSTSEC-2024-0411 through RUSTSEC-2024-0420) plus a `glib` unsoundness (RUSTSEC-2024-0429). Headless Linux servers and CI environments don't need a tray, so it's off by default. To opt in:\n\n```bash\ncargo build --features linux-tray\n```\n\nThis will be revisited once Tauri migrates to `tray-icon 0.22+` or the `ksni` backend. See issue #3667.\n\n## Tauri Configuration Details\n\n### Content Security Policy (`tauri.conf.json`)\n\nThe desktop CSP is strict and explicit. Key directives:\n\n- **`default-src 'self'`** — only local origin by default.\n- **`connect-src`** — allows `http://127.0.0.1:*` and `ws://127.0.0.1:*` for the embedded API server and WebSocket communication.\n- **`script-src`** — allows `tauri:` and `ipc:` schemes plus `'unsafe-inline'` (required for the React frontend bundle).\n- **`img-src` / `media-src`** — permits `blob:` and `data:` URIs for dynamic content.\n- **`object-src 'none'`** — blocks plugin content entirely.\n\n### Auto-Updater (`tauri.desktop.conf.json`)\n\nDesktop builds include `tauri-plugin-updater` configured with:\n\n- A public key for update signature verification (minisign format).\n- A GitHub Releases endpoint: `https://github.com/librefang/librefang/releases/latest/download/latest.json`.\n- Windows install mode set to `passive` (shows progress, requires no user interaction beyond UAC).\n\nMobile builds do not include the updater — distribution goes through the App Store and Play Store.\n\n### Mobile URL Scheme\n\nBoth `tauri.android.conf.json` and `tauri.ios.conf.json` configure the main window to load `lfconnect://localhost/` — a custom protocol scheme for the connection wizard. The frontend is served from `../librefang-api/static/react`, the same static React bundle used by the API server.\n\n## Build Commands\n\n### Desktop\n\n```bash\n# Development (hot reload)\ncargo tauri dev\n\n# Production bundle (requires custom-protocol)\ncargo tauri build\n```\n\n### Mobile\n\n```bash\n# One-time scaffold generation (commit the gen/ directories afterward)\ncargo tauri android init\ncargo tauri ios init        # macOS only\n\n# Development\ncargo tauri android dev\ncargo tauri ios dev          # macOS only\n\n# CI smoke test (Android, no email channel)\ncargo build --no-default-features --features mobile-no-email\n```\n\nMinimum OS versions: iOS 14.0 (config says 16.0 for the bundle), Android API 26 (Android 8.0).\n\n## Dependencies on Workspace Crates\n\n- **`librefang-kernel`** — the agent runtime (schedulers, triggers, automations). Embedded in desktop, not used on mobile.\n- **`librefang-api`** — HTTP/WebSocket API server. Feature propagation (`default`, `all-channels`, `mini`, `all-channels-no-email`) controls which channel adapters are compiled in.\n- **`librefang-types`** — shared domain types.\n- **`librefang-extensions`** — extension loading and management.\n\nThe mobile builds depend on `librefang-api` with `default-features = false` (overridden per feature flag) to minimize binary size since the full API server stack isn't needed for a thin client.\n\n## Release and Distribution\n\n- Desktop bundles (`.dmg`, `.msi`, `.deb`, `.AppImage`) are produced by `cargo tauri build` and distributed via GitHub Releases with auto-update support.\n- Mobile builds (signed `.aab`/`.apk`/`.ipa`) are handled by CI jobs `mobile_android` and `mobile_ios` in `.github/workflows/release.yml`.\n- Store uploads go to TestFlight (iOS) and Play Internal Testing (Android) unattended from CI.\n- Upload secrets, version-mapping rules, and the recovery runbook for failed uploads are in `docs/src/app/operations/mobile-release/page.mdx`.\n- Required upload secrets are tracked in `.github/SECRETS.md`.\n- The privacy policy template for both stores is at `.github/templates/PRIVACY_MOBILE_TEMPLATE.md`, pending legal review before publication.","other-librefang-extensions-tests":"# Other — librefang-extensions-tests\n\n# librefang-extensions-tests: Credential Vault Integration Tests\n\nIntegration test suite for the `CredentialVault` subsystem. Exercises the full encrypt → persist → reload → decrypt lifecycle against real disk I/O (via `tempfile`), validating invariants the daemon relies on at boot and at runtime.\n\n## Scope\n\nThe tests live in `librefang-extensions/tests/vault_roundtrip.rs` and target the public API surface exposed by `librefang_extensions::vault`:\n\n| API under test | What is verified |\n|---|---|\n| `decode_master_key` | Rejects keys that don't decode to exactly 32 bytes; accepts valid 32-byte keys |\n| `CredentialVault::new` + `init_with_key` | Fresh vault initialisation on an empty path |\n| `set` / `get` / `list_keys` / `remove` | Normal CRUD operations, plus sentinel key filtering |\n| `unlock_with_key` | Re-opening an existing vault file with the correct key; rejection of a wrong key |\n\nNo OS keyring, environment variables, or network services are required. All disk state lives inside a `tempfile::TempDir` that is cleaned up on drop.\n\n## Key Invariants Verified\n\n### 1. Master key length enforcement (`decode_master_key_rejects_wrong_byte_length`)\n\n`decode_master_key` requires a base64-encoded string that decodes to **exactly 32 bytes**. A common mistake is passing 32 ASCII characters (which base64-decodes to 24 bytes). The test pins this rejection so a future caller cannot accidentally boot with a truncated key.\n\n```rust\n// 24 raw bytes → base64 string → decode_master_key → Error\n// 32 raw bytes → base64 string → decode_master_key → Ok\n```\n\n### 2. Full round-trip (`vault_roundtrip_encrypt_then_decrypt_with_same_key`)\n\nProves that data written in one `CredentialVault` lifetime survives to the next:\n\n1. Initialise a fresh vault with key K.\n2. Write two entries (`OPENAI_API_KEY`, `ANTHROPIC_API_KEY`).\n3. **Drop** the vault (in-memory state is zeroed; only the encrypted file survives).\n4. Reopen the same file with key K.\n5. Assert both entries decrypt to their original values.\n6. Assert `list_keys` returns user-facing keys but **hides** the internal `SENTINEL_KEY`.\n\n### 3. Wrong-key rejection (`vault_unlock_with_wrong_key_fails`)\n\nAES-GCM authenticates ciphertext, so a mismatched key must fail loudly rather than produce garbage plaintext. This is the contract the boot path depends on (issue #3651). The test accepts either `ExtensionError::Vault(_)` or `ExtensionError::VaultKeyMismatch { .. }` — the specific variant is not pinned because it has changed across format versions. The contract is simply: **non-`Ok`, and `is_unlocked()` remains `false`**.\n\n### 4. Sentinel key write protection (`vault_rejects_writes_to_reserved_sentinel_key`)\n\nThe `SENTINEL_KEY` constant (introduced for #3651) is owned by the vault implementation. The public `set` and `remove` methods must reject any attempt to write to or delete it, preventing external callers from silently breaking the boot-path verification branch.\n\n## Test Architecture\n\n```mermaid\nflowchart TD\n    A[fixture_key_b64] -->|all-zeros 32-byte key, base64 encoded| B[decode_master_key]\n    C[fixture_vault_path] -->|tempdir/vault.enc| D[CredentialVault::new]\n\n    B --> E[init_with_key]\n    D --> E\n    E --> F[set / get / remove / list_keys]\n    F --> G[unlock_with_key]\n    G --> H{Key matches?}\n    H -- Yes --> I[Entries recoverable]\n    H -- No --> J[ExtensionError::Vault or VaultKeyMismatch]\n```\n\n### Helper Functions\n\n- **`fixture_key_b64()`** — Returns a deterministic base64-encoded 32-byte key (all zeros). Not cryptographically strong, but sufficient for round-trip validation. Mirrors the production recipe: `openssl rand -base64 32` produces 44 chars decoding to 32 bytes.\n- **`fixture_vault_path(tmp)`** — Returns `tmp.path().join(\"vault.enc\")` for a given `TempDir`.\n\n### External Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang_extensions` | Provides `CredentialVault`, `decode_master_key`, `SENTINEL_KEY`, `ExtensionError` |\n| `tempfile` | Creates isolated temporary directories for each test |\n| `base64` | Encodes/decodes test keys; uses the `Engine` trait |\n| `zeroize` | `Zeroizing<T>` wrapper ensures sensitive key material is wiped on drop |\n\n## Relationship to Production Code\n\nThese tests exercise the **public API only** — no direct file I/O, no knowledge of the on-disk format, no access to private vault internals. This means:\n\n- The on-disk encryption format can evolve without rewriting tests (as long as the API contract holds).\n- The sentinel key behavior is enforced at the API boundary, not via file-level checks.\n- The `ExtensionError` variants tested (`Vault`, `VaultKeyMismatch`) are the same ones the daemon's boot path handles, ensuring error propagation remains consistent.\n\n### References to related issues\n\n| Issue | Relevance |\n|---|---|\n| #3696 | Original credential vault feature — this test module was introduced alongside it |\n| #3651 | Sentinel key mechanism — tested here to prevent regressions in write protection and `list_keys` filtering |\n\n## Running\n\n```sh\n# Run just the vault integration tests\ncargo test -p librefang-extensions --test vault_roundtrip\n\n# Run with output visible\ncargo test -p librefang-extensions --test vault_roundtrip -- --nocapture\n```\n\nNo special environment setup is required. Tests are fully self-contained and safe to run in parallel.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nAgent-side toolkit that doesn't belong in `runtime` or `kernel`. MCP server catalog, encrypted credential vault, OAuth2 PKCE client, provider health probes, plugin installer, shared HTTP client, and dotenv parsing.\n\nThis crate sits **above** `kernel` and **below** `librefang-api` / `librefang-cli` / `librefang-desktop`. It depends on `librefang-types` (and `librefang-runtime` in dev-dependencies only). Nothing in `kernel` depends on extensions.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"librefang-api\"] -->|imports| EXT[\"librefang-extensions\"]\n    CLI[\"librefang-cli\"] -->|imports| EXT\n    DESK[\"librefang-desktop\"] -->|imports| EXT\n    EXT -->|depends on| TYPES[\"librefang-types\"]\n    EXT -.->|dev-dep| RT[\"librefang-runtime\"]\n    KERNEL[\"librefang-kernel\"] -.->|no dependency| EXT\n```\n\n## Module Map\n\n| Module | Responsibility |\n|---|---|\n| `catalog` | MCP server catalog at `~/.librefang/mcp/catalog/`. Templates and available servers. |\n| `credentials` | Auth-source unification. Resolves credentials from multiple providers with defined precedence. |\n| `dotenv` | `.env` file parsing for agent workspaces. |\n| `health` | Provider liveness probes. Backed by `provider_health` in runtime. |\n| `http_client` | Shared `reqwest::Client` builder. All HTTP must go through here. |\n| `installer` | MCP server install, update, and uninstall flows. |\n| `oauth` | OAuth2 PKCE client with Dynamic Client Registration (RFC 7591). |\n| `vault` | AES-256-GCM encrypted credential vault with OS keyring integration. |\n\n## Credential Vault\n\nThe `vault` module stores secrets encrypted at rest using AES-256-GCM. Key derivation uses Argon2. The master key comes from one of three sources, tried in order:\n\n1. **Environment variable** `LIBREFANG_VAULT_KEY` — base64-encoded, must decode to exactly 32 bytes. Generate with `openssl rand -base64 32` (produces 44 characters).\n2. **OS keyring** — `libsecret` on Linux, Keychain on macOS, Credential Manager on Windows. Not compiled in for musl-static or Android targets; the vault transparently falls back to file storage.\n3. **File fallback** — `~/Library/Application Support/librefang/.keyring` on macOS (mode `0600`). Linux and Windows use the OS keyring.\n\n### macOS Keychain Behavior\n\nmacOS skips the Keychain by default (see #2766). Enable it with config:\n\n```toml\n[vault]\nuse_os_keyring = true\n```\n\nThe migration path: on first boot, the vault performs one final read from Keychain, mirrors the key to the file fallback, and never touches Keychain again.\n\n### Invariants\n\n- All vault operations go through the `Vault` API. Never read the `.keyring` file directly.\n- Per-agent vault instances are cached behind a `RwLock<HashMap<AgentId, Arc<Vault>>>`. Invalidate on credential change.\n- The master key is held in memory and zeroized on drop via the `zeroize` crate.\n\n## Shared HTTP Client\n\nCall `http_client::shared_client()` to get a pre-configured `reqwest::Client`. It provides:\n\n- `User-Agent: librefang/<version>` (matches `librefang_runtime::USER_AGENT`)\n- Connection pooling\n- Sensible timeout, redirect, and TLS defaults (using `rustls` with `webpki-roots` and `rustls-native-certs`)\n\n**Do not create bespoke `reqwest::Client` instances.** This is enforced in code review. The shared client ensures consistent behavior across all HTTP traffic and avoids connection-pool proliferation.\n\n## OAuth2 for MCP Servers\n\nThe OAuth flow is split across two crates:\n\n- **This crate** (`oauth` module): PKCE generation, token exchange, token refresh, Dynamic Client Registration per RFC 7591. These are the building blocks.\n- **`librefang-api`** (`routes/mcp_auth.rs`): The user-facing flow that drives the building blocks — callback handling, redirecting the user's browser, receiving the authorization code.\n\n### Flow Overview\n\n1. The daemon detects a `401` from an MCP server and sets `NeedsAuth` state on the connection.\n2. The API layer initiates PKCE, generates the authorization URL, and redirects the user.\n3. When the MCP server has a `registration_endpoint` but no `client_id`, Dynamic Client Registration (RFC 7591) is used to register one automatically.\n4. The callback endpoint receives the authorization code, exchanges it for tokens, and stores them in the vault.\n\n### Docker Considerations\n\nDo not bind ephemeral localhost ports for OAuth callbacks in daemon code. Inside Docker, that port is unreachable from the host. Route all callbacks through the API server's existing port (the `api` crate handles this).\n\n## Credential Resolution\n\nThe `credentials` module provides a unified `resolve()` function that checks sources in strict precedence:\n\n1. Environment variables\n2. Vault (encrypted store)\n3. CLI login session\n4. File-based credentials\n\nWhen adding a new credential provider, integrate it into this precedence chain rather than bypassing it.\n\n## Plugin Installer\n\nUse `installer` for all MCP server install, update, and uninstall operations. Do not spawn raw `tokio::process` commands for plugin management. The installer handles process lifecycle, error reporting, and catalog updates atomically.\n\n## Dependency Policy\n\n| Allowed | Forbidden |\n|---|---|\n| `librefang-types` | `librefang-api` |\n| `librefang-runtime` (dev-dep only) | `librefang-cli` |\n| All workspace external crates | `librefang-desktop` |\n\nExtensions sit below the application layers. Importing upward creates circular dependency cycles.\n\n## Platform-Specific Compilation\n\nThe `keyring` crate is conditionally compiled for targets that have a working OS keyring backend:\n\n```rust\n// Cargo.toml target cfg\n[target.'cfg(any(\n    all(target_os = \"linux\", not(target_env = \"musl\")),\n    target_os = \"macos\",\n    target_os = \"windows\"\n))'.dependencies]\nkeyring = { workspace = true }\n```\n\nOn musl-static and Android targets, `libdbus-sys` (the secret-service C FFI) has no usable backend and would break the build. The vault module's `os_keyring()` function handles the absent-backend case by falling back to file-based storage.","other-librefang-hands-tests":"# Other — librefang-hands-tests\n\n# librefang-hands/tests/registry_smoke\n\nIntegration smoke tests that exercise the `HandRegistry` public API lifecycle end-to-end. These tests operate against a temporary directory with no LLM, no kernel, and no network — they validate pure tool-dispatch and persistence behaviour.\n\n## Purpose\n\nEvery historical regression in the hand registry has been a **cross-method invariant violation**: definitions present without a workspace directory, instances lingering after uninstall, or a refused uninstall corrupting in-memory state. Unit tests in `registry.rs` cover individual method contracts; these smoke tests catch the composition bugs that slip through when methods are called in sequence.\n\n## Test Cases\n\n### `install_activate_deactivate_uninstall_lifecycle`\n\nWalks the complete lifecycle a custom hand goes through in production:\n\n1. **Fresh state** — A new `HandRegistry` has zero definitions and zero instances.\n2. **Install** — `install_from_content_persisted` writes `HAND.toml` and `SKILL.md` to `home/workspaces/<id>/` and registers the definition in memory. Asserts both files exist on disk and `list_definitions` / `get_definition` reflect the new hand.\n3. **Activate** — `activate(\"smoke-hand\", HashMap::new())` creates a live instance with status `HandStatus::Active`. Verifies the instance appears in `list_instances` and is retrievable via `get_instance`.\n4. **Uninstall while active (must fail)** — `uninstall_hand` returns an error. Critically, asserts that the failed call does **not** perturb in-memory state: the definition and instance are still present. This is the invariant the DELETE `/api/hands/{id}` route depends on.\n5. **Deactivate** — `deactivate(instance_id)` removes the instance from `list_instances`.\n6. **Uninstall after deactivation (must succeed)** — `uninstall_hand` now succeeds. Asserts the in-memory definition is gone and the workspace directory is physically removed from disk.\n\n### `definitions_round_trip_through_a_disk_reload`\n\nValidates that `home/workspaces/<id>/HAND.toml` is the source of truth for persistence:\n\n1. One `HandRegistry` installs a hand via `install_from_content_persisted`.\n2. A second, independent `HandRegistry` is created (simulating a daemon restart). It starts empty.\n3. `reload_from_disk(home)` discovers and loads the hand from the filesystem.\n4. Asserts `get_definition` returns the correct data after reload.\n\nThis test locks in the contract that a process restart can fully recover state from disk without replaying any in-memory log.\n\n## Fixtures\n\n| Constant | Purpose |\n|---|---|\n| `SMOKE_HAND_TOML` | Minimal valid `HAND.toml` with id `smoke-hand`, category `data`, and a single routing alias. |\n| `SMOKE_SKILL_MD` | Trivial Markdown body for the skill file. |\n\nBoth fixtures are embedded as string constants — no external files required.\n\n## API Surface Under Test\n\n```\nHandRegistry::new()\nHandRegistry::install_from_content_persisted(home, toml, skill_md)\nHandRegistry::list_definitions()\nHandRegistry::get_definition(id)\nHandRegistry::activate(hand_id, config_map)\nHandRegistry::list_instances()\nHandRegistry::get_instance(instance_id)\nHandRegistry::deactivate(instance_id)\nHandRegistry::uninstall_hand(home, hand_id)\nHandRegistry::reload_from_disk(home)\n```\n\n## Dependencies\n\n- `tempfile` — creates isolated temporary directories so tests never touch real state.\n- `librefang_hands::registry::HandRegistry` — the system under test.\n- `librefang_hands::HandStatus` — enum for asserting instance status after activation.\n\n## Running\n\n```sh\ncargo test -p librefang-hands --test registry_smoke\n```\n\nNo environment variables, external services, or setup required.","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nCurated autonomous capability packages for LibreFang.\n\n## Purpose\n\nA **Hand** in LibreFang is a self-contained, curated capability package — a declarative unit of autonomous functionality that can be loaded, validated, and managed by the runtime. This crate defines the Hand data model, handles parsing and serialization of hand definitions (TOML/JSON), and provides a thread-safe registry for tracking available hands.\n\nThink of a hand as a blueprint: it describes *what* a capability does, *what* it requires, and *how* it should be configured, without embedding the execution logic itself. Execution is handled by the runtime layer.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────┐\n│                librefang-hands                   │\n│                                                  │\n│  ┌──────────┐  ┌────────────┐  ┌─────────────┐  │\n│  │ Hand     │  │ Hand       │  │ Hand        │  │\n│  │ Defini-  │  │ Registry   │  │ Loading &   │  │\n│  │ tion     │  │ (DashMap)  │  │ Validation  │  │\n│  └──────────┘  └───────
