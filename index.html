vels**: `Pass` (green), `Info` (informational), `Warn` (fixable misconfiguration), `Error` (blocks operation). Every result carries a stable snake_case `name` (for JSON output), a human `summary`, and an optional `hint`.\n\n### Desktop Install — `desktop_install.rs`\n\nDiscovers, downloads, and installs the LibreFang desktop app from GitHub releases.\n\n**Discovery order** (`find_desktop_binary()`):\n1. Sibling of the current CLI executable\n2. PATH lookup\n3. Platform-specific standard location (`/Applications/LibreFang.app`, `%LOCALAPPDATA%\\LibreFang\\`, `~/.local/bin/`)\n\n**Platform installers**:\n- **macOS**: DMG mounted via `hdiutil`, `.app` bundle copied to `/Applications`, quarantine attribute cleared\n- **Windows**: NSIS silent install (`/S`), binary expected at `%LOCALAPPDATA%\\LibreFang\\LibreFang.exe`\n- **Linux**: AppImage copied to `~/.local/bin/librefang-desktop` with `chmod 0755`\n\n**Launch** (`launch()`): On macOS, detects `.app` bundles and uses `open -a`; elsewhere, spawns the binary detached with null stdio.\n\n### Internationalization — `i18n.rs`\n\nFluent-based i18n with thread-local state. Supports English (`en`) and Simplified Chinese (`zh-CN`).\n\n**Usage**:\n```rust\ni18n::init(\"zh-CN\");\nlet label = t(\"label-dashboard\"); // \"控制台\"\nlet msg = t_args(\"models-available\", &[(\"count\", \"12\")]); // \"12 models available\"\n```\n\nFTL resources are compiled in via `include_str!`. Missing keys fall back to `[key_name]`. Initialization failures silently fall back to the default language (English).\n\n### Log Filter — `log_filter.rs`\n\nReloadable `EnvFilter` for the daemon's tracing stack, backed by `ArcSwap` so the filter can be swapped at runtime (e.g., from the dashboard) without restarting.\n\nKey design points:\n- **Per-layer filter**: The OTel exporter sees the full span tree while stderr stays terse\n- **Baseline directives**: Boot-time per-target overrides (e.g., `librefang_kernel=warn`) are stored in `BASELINE_DIRECTIVES` and reapplied on every reload, preventing a dashboard \"debug\" toggle from unmasking kernel noise\n- **Cache invalidation**: `tracing_core::callsite::rebuild_interest_cache()` is called after every swap\n- **CLI adapter**: `CliLogLevelReloader` implements the kernel's `LogLevelReloader` trait\n\n### HTTP Client — `http_client.rs`\n\nBlocking `reqwest` client builder with bundled CA roots from `librefang_runtime::http_client::tls_config()`. Used throughout the CLI for GitHub API calls, daemon communication, and release downloads.\n\n### Progress — `progress.rs`\n\nANSI-based progress reporting (no external TUI dependency for this module). Provides:\n- **ProgressBar**: Percentage bar with Unicode block characters (`█░`)\n- **Spinner**: Braille-pattern animation frames\n- **OSC 9;4**: Terminal progress protocol for Windows Terminal/iTerm2\n- **Delay suppression**: Output hidden for operations completing under 200ms\n- **`ProgressReporter` trait**: Abstract interface so callers work in both TTY and piped environments\n\nUse `auto(label, total)` to get the right reporter: animated bars on TTY, plain `[n/total]` lines over pipes.\n\n### Bundled Agents — `bundled_agents.rs`\n\nThin wrapper delegating to `librefang_runtime::registry_sync::sync_registry` for backwards compatibility with existing CLI callers.\n\n## Event System (TUI)\n\nThe TUI module (referenced in the call graph but whose source is split across `tui/`) uses a threaded event architecture:\n\n- `spawn_event_thread` is the central dispatcher\n- Individual operations (`spawn_daemon_detect`, `spawn_fetch_channels`, `spawn_run_workflow`, etc.) spawn background threads that communicate results back to the main TUI loop via channels\n- Daemon communication uses HTTP clients built by `make_daemon_client` / `make_daemon_client_with_timeout`\n- Agent streaming falls back via `daemon_fallback` when the daemon is unavailable, using in-process `AgentLoopResult`\n\n## Cross-Cutting Concerns\n\n**Thread safety for env var tests**: Tests that mutate process-global env vars (`LIBREFANG_HOME`, `LIBREFANG_VAULT_KEY`) use module-scoped `Mutex` guards (`ENV_LOCK`, `env_lock()`) to serialize access, since `cargo test` runs in parallel.\n\n**Platform conditionals**: The codebase uses `#[cfg(unix)]`, `#[cfg(windows)]`, and `#[cfg(target_os = \"...\")]` extensively. Non-applicable platform branches compile to no-ops or stubs, with `#[allow(unused_variables)]` where needed.\n\n**No panics on missing features**: Doctor checks return `Info` for missing config; ACP falls back to in-process mode on stale sockets; desktop install offers manual download URLs when automatic install is unsupported.","dashboard-ui":"# Dashboard UI\n\n# Dashboard UI Module\n\nThe dashboard is a React-based single-page application that provides a web interface for managing and monitoring the LibreFang agent platform. It communicates with the LibreFang kernel through a REST API and Server-Sent Events (SSE) for real-time updates.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[React SPA] --> B[api.ts - API Client]\n    B --> C[generated.ts - OpenAPI Types]\n    B --> D[REST API Endpoints]\n    B --> E[SSE Streams]\n    B --> F[WebSocket Connections]\n    D --> G[LibreFang Kernel]\n    E --> G\n    F --> G\n    A --> H[React Router]\n    H --> I[Pages]\n    I --> J[lib/queries - React Query]\n    I --> K[lib/mutations]\n    J --> B\n    K --> B\n```\n\n## Key Files\n\n| File | Purpose |\n|---|---|\n| `openapi/generated.ts` | Auto-generated TypeScript types from the OpenAPI schema. **Do not edit directly** — regenerated via `openapi-typescript`. |\n| `dashboard/src/api.ts` | Hand-written API client layer. All HTTP calls, authentication header construction, error parsing, and WebSocket setup live here. |\n| `dashboard/src/main.tsx` | Application entry point. Mounts the React tree and the `ToastContainer`. |\n| `dashboard/src/App.tsx` | Root component. Handles auth checks (`checkAuth`), terminal feature detection (`setTerminalEnabled`), and renders `SidebarUserBlock` with `UserMenuPanel`. |\n| `dashboard/src/router.tsx` | Route definitions mapping paths to page components (e.g., `UserPolicyPage`, `PluginsPage`). |\n\n## Auto-Generated API Types (`generated.ts`)\n\nThis file is produced by `openapi-typescript` and exports TypeScript interfaces describing every endpoint the kernel exposes. It is the single source of truth for request/response shapes.\n\n### Structure\n\nThe file exports these top-level namespaces:\n\n- **`paths`** — Maps every URL pattern to its HTTP methods and associated operation IDs. Each path entry specifies which methods are available and points into the `operations` interface.\n- **`operations`** — Maps operation IDs (e.g., `\"list_agents\"`, `\"spawn_agent\"`) to their request parameters, request body, and response types.\n- **`components`** — Shared schemas referenced by operations (request/response bodies, enums, etc.).\n\n### Adding a New Endpoint\n\nWhen a new route is added to the kernel's OpenAPI spec:\n\n1. Regenerate the types: `npx openapi-typescript <spec-url> -o dashboard/openapi/generated.ts`\n2. The new path and operation types will appear automatically.\n3. Add a corresponding caller function in `api.ts`.\n\n## API Client Layer (`api.ts`)\n\nAll backend communication flows through `api.ts`. It provides HTTP primitives and domain-specific functions layered on top.\n\n### HTTP Primitives\n\nFour core functions handle all requests:\n\n| Function | Method | Auth |\n|---|---|---|\n| `get<T>(path, params?)` | GET | Automatic via `buildHeaders` |\n| `post<T>(path, body?, params?)` | POST | Automatic |\n| `put<T>(path, body?, params?)` | PUT | Automatic |\n| `del<T>(path, params?)` | DELETE | Automatic |\n\nEach primitive calls `buildHeaders` → `authHeader` → `getStoredApiKey` to attach the current API key. Responses are typed via generics. Errors are caught and normalized through `parseError` → `fromResponse` → `ApiError`.\n\n### Authentication Flow\n\n```\nRequest → buildHeaders() → authHeader() → getStoredApiKey()\n                                              ↓\n                                     localStorage / cookie\n                                              ↓\n                                     Authorization: Bearer <key>\n```\n\n- **`getStoredApiKey()`** — Retrieves the persisted API key from browser storage.\n- **`authHeader()`** — Formats the key into an `Authorization: Bearer` header.\n- **`buildHeaders()`** — Assembles the full headers object including auth and content type.\n- **`verifyStoredAuth()`** — Validates that the stored credentials are still valid (used at app startup and in tests).\n\nFor WebSocket connections, `buildAuthenticatedWebSocket` constructs a WS URL with the token attached as a query parameter since browsers cannot set custom headers on WebSocket handshakes.\n\n### Error Handling\n\n```\nHTTP Error Response\n    ↓\nparseError(response)\n    ↓\nfromResponse(response)   [from lib/http/errors.ts]\n    ↓\nApiError { status, message, detail }\n```\n\nEvery API function wraps the HTTP primitive in a try/catch that converts the raw response into a typed `ApiError`. This ensures the UI can display meaningful error messages and React Query can track error states.\n\n### Domain-Specific API Functions\n\nThe file exports ~100+ functions organized by domain. Here are the major groups:\n\n#### Agent Management\n- `getAgentDetail(id)` → GET `/api/agents/{id}`\n- `sendAgentMessage(id, body)` → POST `/api/agents/{id}/message`\n- `stopAgent(id)` → POST `/api/agents/{id}/stop`\n- `uploadAgentFile(id, file)` → POST `/api/agents/{id}/upload` (uses `parseError` directly for upload-specific error handling)\n\n#### Hand Agents\n- `patchHandAgentRuntimeConfig(id, patch)` — Calls `serializeHandAgentRuntimeConfigPatch` to transform the UI form state before sending.\n- `sendHandMessage(id, body)` → POST to the hand agent's messaging endpoint.\n\n#### A2A (Agent-to-Agent)\n- `sendA2ATask(body)` → POST `/a2a/tasks/send`\n\n#### Memory\n- `updateMemory(id, content)` → PUT `/api/memory/items/{id}`\n\n#### MCP Servers\n- `addMcpServer(config)` → POST `/api/mcp/servers`\n- `reloadMcp()` → POST `/api/mcp/reload`\n\n#### Usage & Metrics\n- `getUsageSummary()` → GET `/api/usage/summary`\n- `getUsageByModelPerformance()` → GET `/api/usage/by-model`\n- `getMetricsText()` → GET `/api/metrics` (returns raw Prometheus text via `getText` instead of JSON-parsed `get`)\n\n#### Other Domains\n- `listTools()` — Tool definitions\n- `listGoals()` — Goal tracking\n- `getNetworkStatus()` — OFP network status\n- `createSchedule(body)` — Scheduled jobs\n- `createPairingRequest()` — Device pairing\n- `listTerminalWindows()` — Terminal feature (uses `buildHeaders` directly for special headers)\n- `deleteBackup(filename)` — Backup management\n- `modifyAndRetryApproval(id, body)` — Approval workflow\n- `transcribeAudio(blob)` — Audio transcription (uses `buildHeaders` for multipart)\n- `submitVideo(body)` — Video submission\n- `saveWorkflowAsTemplate(body)` — Workflow templates\n- `setDefaultProvider(name)` — Provider configuration\n\n### Utility Functions\n\n- **`deref(ref)`** — Resolves JSON `$ref` pointers within API responses by calling `resolveRef`.\n- **`serializeHandAgentRuntimeConfigPatch(patch)`** — Transforms the dashboard's hand agent configuration form into the kernel's expected wire format.\n\n## Real-Time Streams\n\nThe dashboard consumes three types of real-time data:\n\n### Server-Sent Events (SSE)\n\n| Stream | Endpoint | Purpose |\n|---|---|---|\n| Audit log | `GET /api/logs/stream` | Live audit entries with backfill on connect. Heartbeat every 15s. Filters via `level`, `filter`, `token` query params. |\n| Agent messages | `POST /api/agents/{id}/message/stream` | Streaming LLM responses token-by-token. |\n| Session attach | `GET /api/agents/{id}/sessions/{session_id}/stream` | Subscribe to an in-flight session's events. Late attachers receive events from subscribe time (no replay). |\n| Comms events | `GET /api/comms/events/stream` | Inter-agent communication events. Polls audit log every 500ms. |\n\n### WebSocket\n\n- `buildAuthenticatedWebSocket(path)` — Constructs an authenticated WS connection for terminal and other interactive features.\n\n## React Query Integration\n\nThe `lib/queries/` and `lib/mutations/` directories wrap `api.ts` functions for React Query:\n\n```\nlib/queries/skills.ts  →  getSkillDetail()  →  get()  →  buildHeaders()  →  authHeader()  →  getStoredApiKey()\nlib/mutations/skills.ts →  installSkill()   →  post() →  buildHeaders()  →  authHeader()  →  getStoredApiKey()\nlib/mutations/agents.ts →  stopAgent()      →  post() →  buildHeaders()  →  authHeader()  →  getStoredApiKey()\n```\n\nQuery functions feed data into React Query caches. Mutation functions trigger state changes and invalidate related queries on success. Both go through the same authenticated pipeline in `api.ts`.\n\n## Pages\n\nThe router maps URLs to page components. Key pages visible in the call graph:\n\n| Page | File | API Functions Used |\n|---|---|---|\n| **MemoryPage** | `src/pages/MemoryPage.tsx` | Memory CRUD, search, consolidation |\n| **AuditPage** | `src/pages/AuditPage.tsx` | Audit log stream, query, export, verify |\n| **A2APage** | `src/pages/A2APage.tsx` | `sendA2ATask`, agent discovery |\n| **TerminalPage** | `src/pages/TerminalPage.tsx` | `listTerminalWindows`, WebSocket |\n| **UserPolicyPage** | `dashboard/src/router.tsx` | User management |\n| **PluginsPage** | `dashboard/src/router.tsx` | Extensions/MCP management |\n\n## Shared Libraries\n\nPages depend on shared utilities in `src/lib/`:\n\n- **`useListNav`** — Keyboard-navigable list component hook\n- **`chat.ts` / `extractAssistantHistoryParts`** — Chat message parsing\n- **`agentManifest.ts` / `emptyManifestExtras`** — Agent manifest formatting\n- **`sessionSelector.ts` / `pickLatestSessionId`** — Session selection logic\n- **`csvParser.ts` / `parseCsvText`** — CSV parsing for audit exports\n\n## Testing\n\nTests live alongside the source:\n\n- `dashboard/src/api.test.ts` — Tests `verifyStoredAuth`, `updateAgentTools`, `getAgentTools`, `patchHandAgentRuntimeConfig`, `buildAuthenticatedWebSocket`, `getMetricsText`\n- `src/pages/MemoryPage.test.tsx` — Component tests for MemoryPage\n- `src/lib/*.test.ts` — Unit tests for shared utilities\n\nWhen writing API tests, mock at the `fetch` level rather than importing `api.ts` internals. The test file demonstrates this pattern: it calls exported functions and asserts on the resulting HTTP requests.\n\n## API Endpoint Reference by Domain\n\nThe `generated.ts` `paths` interface documents ~120 endpoints. Grouped by prefix:\n\n| Prefix | Count | Purpose |\n|---|---|---|\n| `/api/agents` | ~30 | CRUD, sessions, memory, files, tools, skills, mode, stats, traces |\n| `/api/a2a` | 5 | External agent discovery and task delegation |\n| `/a2a` | 4 | Standard A2A protocol endpoints |\n| `/api/sessions` | 6 | Session listing, cleanup, labels |\n| `/api/memory` | 15 | Proactive memory CRUD, search, consolidation, import/export |\n| `/api/budget` | 5 | Global and per-agent/user budget tracking |\n| `/api/usage` | 4 | Token usage, daily breakdowns, model-level stats |\n| `/api/mcp` | 8 | MCP server management, catalog, health, taint rules |\n| `/api/channels` | 7 | Channel adapter configuration, QR login flows |\n| `/api/auth` | 6 | OAuth2 login/callback, providers, userinfo, introspect |\n| `/api/skills` | 4 | Skill installation, creation, uninstall |\n| `/api/hands` | 12 | Hand marketplace, activation, pause/resume, browser state |\n| `/api/triggers` | 4 | Event trigger CRUD |\n| `/api/schedules` / `/api/cron` | 8 | Scheduled and cron job management |\n| `/api/budget` | 5 | Cost tracking and limits |\n| `/api/comms` | 4 | Inter-agent messaging, topology, events |\n| `/api/backup` / `/api/restore` | 4 | State backup and restoration |\n| `/api/providers` | 8 | LLM provider management, key/URL config, testing |\n| `/api/models` | 6 | Model catalog, aliases, custom models |\n| `/api/audit` | 4 | Audit log query, export, chain verification |\n| `/api/approvals` | 4 | Approval request workflow |\n| `/api/config` | 4 | Config read/reload/set/schema |\n| `/api/users` | 5 | User management, key rotation |\n| `/api/health` | 2 | Liveness probe and detailed diagnostics |\n| `/api/logs/stream` | 1 | SSE audit log stream |\n| `/api/metrics` | 1 | Prometheus-format metrics |\n| `/api/tools` | 3 | Tool listing and direct invocation |\n| `/api/extensions` | 4 | Extension catalog and install/uninstall |\n| `/api/catalog` | 2 | Remote model catalog sync |\n| `/api/clawhub` | 4 | ClawHub skill marketplace browse/search/install |\n| `/api/network` | 1 | OFP network status |\n| `/api/peers` | 2 | OFP peer discovery |\n| `/api/pairing` | 5 | Device pairing and notifications |\n| `/api/queue` | 1 | Command queue status |\n| `/api/security` | 1 | Security feature status |\n| `/api/templates` | 2 | Agent template listing |\n| `/api/hooks` | 2 | Webhook triggers (agent turn, wake event) |\n| `/api/migrate` | 3 | Framework migration |\n| `/api/marketplace` | 1 | FangHub marketplace search |\n| `/api/profiles` | 2 | Tool profiles |\n| `/api/commands` | 2 | Chat command registry |\n| `/api/bindings` | 2 | Agent bindings |\n| `/api/auto-dream` | 4 | Auto-dream scheduling |\n| `/api/shutdown` | 1 | Graceful shutdown |\n| `/api/init` | 1 | Quick provider detection and init |\n\n## Regenerating OpenAPI Types\n\n```bash\n# From the project root, point openapi-typescript at the running kernel's spec\nnpx openapi-typescript http://localhost:3000/openapi.json -o librefang-api/dashboard/openapi/generated.ts\n```\n\nThe file header explicitly states: *\"This file was auto-generated by openapi-typescript. Do not make direct changes to the file.\"* Any manual edits will be overwritten on the next regeneration.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop Application\n\nTauri 2.0 native wrapper for the LibreFang Agent Operating System. Provides a desktop window hosting the LibreFang WebUI, with an optional embedded kernel + API server, system tray integration, native notifications, global shortcuts, auto-start, and in-app updates. On mobile (iOS/Android), the app runs as a thin client connecting to a remote daemon.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"main.rs<br/>CLI (clap)\"] --> RUN[\"lib.rs::run()\"]\n    RUN --> MODE{StartupMode?}\n    MODE -->|Remote URL| NAV_DIRECT[\"Navigate to URL\"]\n    MODE -->|Local| BOOT[\"server.rs::start_server()\"]\n    MODE -->|ConnectionScreen| CONN_SCREEN[\"lfconnect:// URI scheme\"]\n\n    BOOT --> KERNEL[\"LibreFangKernel::boot()\"]\n    KERNEL --> BG_THREAD[\"Background thread<br/>(own tokio RT)\"]\n    BG_THREAD --> AXUM[\"axum API server<br/>127.0.0.1:0\"]\n\n    CONN_SCREEN --> IPC[\"Tauri IPC commands\"]\n    IPC --> CONNECT_REMOTE[\"connect_remote()\"]\n    IPC --> START_LOCAL[\"start_local()\"]\n    START_LOCAL --> BOOT\n\n    subgraph \"Managed State (interior-mutable)\"\n        PORT[\"PortState\"]\n        KSTATE[\"KernelState\"]\n        URL[\"ServerUrlState\"]\n        REMOTE[\"RemoteMode\"]\n        HOLDER[\"ServerHandleHolder\"]\n    end\n\n    RUN --> PORT\n    RUN --> KSTATE\n    RUN --> URL\n    RUN --> REMOTE\n    RUN --> HOLDER\n```\n\n## Startup and Connection Mode Resolution\n\nThe application resolves how to connect through a priority chain:\n\n1. **CLI `--server-url <URL>`** → Remote mode, connect directly\n2. **CLI `--local`** → Local mode, boot embedded server (desktop only)\n3. **Environment variable `LIBREFANG_SERVER_URL`** → Remote mode\n4. **Saved preference** from `~/.librefang/desktop.toml` → Restores previous choice\n5. **Connection screen** → User picks remote URL or starts local server\n\n`main.rs` parses CLI arguments via clap and calls `librefang_desktop::run(server_url, force_local)`. On mobile, `mobile_main()` is the entry point (required by `tauri::mobile_entry_point`) and calls `run(None, false)`.\n\n```rust\n// Connection preference persisted at ~/.librefang/desktop.toml\npub struct ConnectionPreference {\n    pub mode: String,              // \"remote\" or \"local\"\n    pub server_url: Option<String>, // set for remote, None for local\n}\n```\n\n## Managed State\n\nAll runtime state is registered once during `Tauri::Builder::setup()` via `builder.manage()`. Updates happen through interior mutability (`RwLock`/`Mutex`), never by re-managing.\n\n| State Type | Inner Type | Purpose |\n|---|---|---|\n| `PortState` | `RwLock<Option<u16>>` | Embedded server port. `None` in remote mode or before boot. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel handle + `Instant` for uptime. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | `true` when connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Desktop only. Holds the server handle for shutdown. |\n\n`KernelInner` stores an `Arc<LibreFangKernel>` and the `Instant` the server started, enabling uptime calculations.\n\n## Embedded Server (`server.rs`)\n\nDesktop-only. Boots the kernel and runs the axum API server on a background thread with its own tokio runtime.\n\n### Boot Sequence\n\n1. `LibreFangKernel::boot(None)` — synchronous kernel initialization\n2. `TcpListener::bind(\"127.0.0.1:0\")` — bind to a random free port on the main thread (guarantees port is known before any window is created)\n3. Spawn a named thread `\"librefang-server\"` with a fresh multi-thread tokio runtime\n4. Inside the runtime: `kernel.start_background_agents()`, `kernel.spawn_approval_sweep_task()`, then `run_embedded_server()`\n5. `build_router()` creates the axum app; `sync_dashboard()` downloads dashboard assets in the background\n\n### Shutdown\n\n`ServerHandle` owns a `watch::Sender<bool>` channel. Calling `shutdown()` or dropping the handle sends `true`, which triggers axum's graceful shutdown. A `compare_exchange` on `shutdown_initiated` prevents double-shutdown. The kernel's own `shutdown()` is called after the server thread joins.\n\n## URL Validation (`validate_server_url`)\n\nEnforces a security policy to prevent MITM attacks via IPC-injected webview content (issue #3673):\n\n- `https://` is always accepted\n- `http://` is only allowed for loopback addresses (`127.0.0.0/8`, `::1`, `localhost`)\n- Userinfo in the authority (`@`) is always rejected — prevents `http://[::1]@evil.com/` bypass\n- Unknown schemes are rejected\n\nThis runs before any WebView navigation to a user-supplied URL.\n\n## IPC Commands (`commands.rs`)\n\nAll commands are `#[tauri::command]` functions invoked from the frontend. They are split into two handler sets based on target platform:\n\n### Desktop + Mobile (shared)\n\n| Command | Signature | Description |\n|---|---|---|\n| `get_port` | `() → Result<u16, String>` | Returns the embedded server port |\n| `get_status` | `() → Result<JsonValue, String>` | Status object: `{ status, port, agents, uptime_secs }` |\n| `get_agent_count` | `() → Result<usize, String>` | Number of registered agents |\n| `import_agent_toml` | `() → Result<String, String>` | File picker → parse TOML manifest → copy to `~/.librefang/workspaces/agents/{name}/agent.toml` → `spawn_agent()` |\n| `import_skill_file` | `() → Result<String, String>` | File picker → copy to `~/.librefang/skills/` → `reload_skills()` |\n| `open_config_dir` | `() → Result<(), String>` | Opens `~/.librefang/` in OS file manager |\n| `open_logs_dir` | `() → Result<(), String>` | Opens `~/.librefang/logs/` in OS file manager |\n| `uninstall_app` | `async → Result<(), String>` | Platform-specific uninstall (see below) |\n| `test_connection` | `(url) → Result<JsonValue, String>` | Hits `{url}/api/health` with 10s timeout |\n| `connect_remote` | `async (url, remember, window) → Result<(), String>` | Validates URL, health-checks, updates managed state, navigates WebView |\n\n### Desktop-only\n\n| Command | Description |\n|---|---|\n| `get_autostart` | Check if launch-at-login is enabled |\n| `set_autostart(enabled)` | Enable/disable launch-at-login |\n| `check_for_updates` | Returns `UpdateInfo { available, version, body }` |\n| `install_update` | Downloads, installs, and restarts |\n| `start_local` | Boots embedded server, updates all managed state, navigates WebView |\n\n### Mobile-only\n\n| Command | Description |\n|---|---|\n| `store_credentials(base_url, api_key)` | JSON-encode into OS keyring (`librefang-mobile` / `daemon-credentials`) |\n| `get_credentials` | Retrieve from keyring, returns `null` if none stored |\n| `clear_credentials` | Delete from keyring |\n\n### `uninstall_app` — Platform Behavior\n\n- **Windows**: Queries `HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall` for `LibreFang`, extracts `UninstallString`, spawns the NSIS uninstaller, exits.\n- **macOS**: Walks up from the executable to find the enclosing `.app` bundle, moves it to Trash via `osascript` + Finder, exits.\n- **Linux/AppImage**: Deletes the AppImage binary (or `$APPIMAGE` env var) and exits.\n- **Linux/system package**: Returns an error with the distro-specific uninstall command (`apt remove`, `dnf remove`, `pacman -R`).\n- **Mobile**: Returns an error directing the user to the platform app store.\n\n## Connection Screen (`connection.rs`)\n\nA self-contained HTML/CSS/JS page served through a custom Tauri URI scheme protocol (`lfconnect://localhost/`). This replaced the old `about:blank` + `document.write` approach which broke on WebKitGTK 2.50 (issue #3052).\n\nThe page provides:\n- Server URL input with **Test Connection** and **Connect** buttons\n- **Start Local Server** button (stripped on mobile — no embedded server)\n- **Remember this choice** checkbox\n- **Uninstall LibreFang** button\n\nThe JS polls for `window.__TAURI__.core.invoke` availability (up to 8 seconds) to handle asynchronous IPC initialization on `about:blank`-equivalent pages.\n\n### Mobile Bundling\n\nOn mobile release builds, the dashboard is embedded in the app bundle. `navigation_target()` returns `tauri://localhost/index.html#api=<percent-encoded daemon URL>` — the dashboard's `bundleMode` uses the hash-encoded URL to proxy API/WS requests to the daemon. On debug builds and desktop, `navigation_target()` returns the daemon URL directly.\n\n## Native Notifications (`forward_kernel_events`)\n\nSubscribes to the kernel event bus and forwards critical events as OS-level notifications via `tauri-plugin-notification`:\n\n- **Agent Crashed** — `LifecycleEvent::Crashed { agent_id, error }`\n- **Kernel Stopping** — `SystemEvent::KernelStopping`\n- **Quota Enforced** — `SystemEvent::QuotaEnforced { agent_id, spent, limit }`\n\nUses `recv_event_skipping_lag` to handle slow consumers — dropped events are counted in `EventBus::dropped_count()` and logged as errors rather than silently discarded (issue #3630).\n\n## System Tray (`tray.rs`)\n\nDesktop-only. On Linux, gated behind the `linux-tray` Cargo feature due to GTK3 unmaintained-crate advisories (RUSTSEC-2024-0411..0420, 0429).\n\nMenu items:\n- **Show Window** — focus the main window\n- **Open in Browser** — open the current server URL in the default browser\n- **Change Server...** — shut down local server if running, clear state, navigate back to connection screen\n- **Agents: N running** — display-only\n- **Status: Running/Remote** — display-only with uptime or remote URL\n- **Launch at Login** — toggle auto-start\n- **Check for Updates...** — probe, download, install, restart\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — `app.exit(0)`\n\nLeft-click on the tray icon shows the main window. The window's close button is intercepted to hide to tray instead of quitting.\n\n## Global Shortcuts (`shortcuts.rs`)\n\nDesktop-only. Registered via `tauri_plugin_global_shortcut`:\n\n| Shortcut | Action |\n|---|---|\n| `Ctrl+Shift+O` | Show/focus window |\n| `Ctrl+Shift+N` | Show window + emit `navigate` event with `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `navigate` event with `\"chat\"` |\n\nRegistration failure is non-fatal — the app logs a warning and continues.\n\n## Auto-Updater (`updater.rs`)\n\nDesktop-only. Two entry points:\n\n1. **Startup check** (`spawn_startup_check`) — 10-second delay, then probes the update manifest endpoint. If reachable, checks for updates and silently installs + restarts. A 3-second notification is shown before restart.\n2. **On-demand** (`check_for_update` / `download_and_install_update`) — triggered from the tray menu or IPC commands.\n\n`manifest_reachable()` does a pre-flight HEAD request to the configured updater endpoint. This avoids noisy error logs when the release pipeline hasn't published a `latest.json` manifest (e.g., missing `TAURI_SIGNING_PRIVATE_KEY`).\n\n`download_and_install_update()` calls `app_handle.restart()` on success — the function never returns `Ok`.\n\n## Window Behavior\n\n- Close button → hide to tray (desktop), intercepted via `on_window_event`\n- Single instance enforcement: second launch focuses the existing window\n- Minimum window size: 800×600, default: 1280×800 (desktop)\n- Mobile window is declared in `tauri.ios.conf.json` / `tauri.android.conf.json`\n\n## File System Layout\n\n```\n~/.librefang/\n├── desktop.toml              # Connection preference (mode + server_url)\n├── .env                      # Environment overrides (loaded at startup)\n├── secrets.env               # Secrets (loaded at startup)\n├── vault                     # Encrypted vault (loaded at startup)\n├── logs/                     # Application logs\n├── skills/                   # Imported skill files (md, toml, py, js, wasm)\n└── workspaces/\n    └── agents/\n        └── {name}/\n            └── agent.toml    # Imported agent manifests\n```","extensions-vault":"# Extensions & Vault\n\n# Extensions & Vault (`librefang-extensions`)\n\n## Purpose\n\n`librefang-extensions` manages everything related to connecting LibreFang to external services: discovering MCP server templates, securely storing the credentials those services require, monitoring their health, and installing them into the user's config. It owns no side effects beyond disk I/O for the vault and `.env` files — the kernel, CLI, and API layer drive all writes.\n\nAll installed MCP servers are stored as `[[mcp_servers]]` entries in `~/.librefang/config.toml`, each with an optional `template_id` linking back to the catalog entry it came from.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Credential Sources\"\n        V[\"Vault<br/>(vault.enc)\"]\n        DE[\".env file\"]\n        EV[\"Process env vars\"]\n        IP[\"Interactive prompt\"]\n    end\n\n    subgraph \"Templates & Install\"\n        CAT[\"McpCatalog<br/>(catalog/*.toml)\"]\n        INST[\"Installer\"]\n    end\n\n    subgraph \"Runtime\"\n        CR[\"CredentialResolver\"]\n        HM[\"HealthMonitor<br/>(DashMap)\"]\n        OA[\"OAuth PKCE\"]\n        DT[\"dotenv loader\"]\n    end\n\n    CR --> V\n    CR --> DE\n    CR --> EV\n    CR --> IP\n    INST --> CAT\n    INST --> CR\n    DT --> V\n    DT --> DE\n\n    KERNEL[\"Kernel / API / CLI\"] --> INST\n    KERNEL --> HM\n    KERNEL --> CR\n    KERNEL --> OA\n```\n\n---\n\n## Key Components\n\n### Credential Vault (`vault.rs`)\n\nAES-256-GCM encrypted secret storage at `~/.librefang/vault.enc`. The vault provides at-rest encryption with path-bound AAD (additional authenticated data) so a ciphertext cannot be moved between file paths.\n\n**Master key resolution** (in priority order):\n\n1. `LIBREFANG_VAULT_KEY` environment variable\n2. OS keyring (macOS Keychain / Windows Credential Manager / Linux Secret Service via `libsecret`)\n3. File-based fallback at `<data_local_dir>/librefang/.keyring` — AES-256-GCM wrapped with an Argon2id key derived from a machine fingerprint\n\nOn macOS, the OS keyring is **opt-in** by default because the Keychain ACL is bound to the per-binary code signature — every `cargo build` invalidates the ACL and triggers a re-authorization prompt. Set `LIBREFANG_VAULT_NO_KEYRING=false` or configure `use_os_keyring: true` in config to override.\n\n**Key operations:**\n\n| Method | Description |\n|---|---|\n| `CredentialVault::new(path)` | Create a locked vault handle |\n| `init()` | Generate a master key, store it, create an empty vault |\n| `init_with_key(key)` | Initialize with an explicit 32-byte key (testing/programmatic) |\n| `unlock()` | Decrypt and load entries using the resolved master key |\n| `unlock_with_key(key)` | Unlock with an explicit key |\n| `get(key)` / `set(key, value)` / `remove(key)` | CRUD on secrets |\n| `rewrap_with_new_key(new_key)` | Re-encrypt the entire vault under a new master key |\n| `verify_or_install_sentinel()` | Validate the startup sentinel (#3651) |\n\n**Startup Sentinel (#3651):** Every vault contains a reserved `__sentinel__` key with a known plaintext value (`librefang-vault-sentinel-v1`). After `unlock()`, the boot path calls `verify_or_install_sentinel()` — if the sentinel decrypts to the wrong value, the daemon refuses to start with `VaultKeyMismatch`. This catches the case where `LIBREFANG_VAULT_KEY` points to the wrong key before any credential is silently lost. The sentinel key is write-protected: `set()` and `remove()` reject it.\n\n**On-disk format:** `OFV1` magic header + JSON with `version`, `salt`, `nonce`, `ciphertext` (all base64), and `schema_version`. Schema version 0 uses path-only AAD (legacy compat); version 1 prepends the schema version as little-endian bytes to the AAD. Writes are atomic via `<path>.tmp` + `fsync` + `rename`, created with mode 0600.\n\n**Keyring file migration:** Version 2 keyring files (raw `random_id` fingerprint) are auto-migrated to version 3 (SHA-512 mixed fingerprint) on first load.\n\n### Credential Resolver (`credentials.rs`)\n\nResolves secrets from multiple sources in a fixed priority chain:\n\n1. **Encrypted vault** (`vault.enc`) — if unlocked\n2. **Dotenv file** (`~/.librefang/.env`) — loaded at construction time\n3. **Process environment variables**\n4. **Interactive prompt** — CLI only, opt-in via `.with_interactive(true)`\n\nThe resolver wraps the vault through a `VaultSource` enum that is either `Owned` (standalone vault for CLI/tests) or `Shared` (an `Arc<RwLock<CredentialVault>>` from the kernel's cached vault handle). The shared path avoids re-running Argon2id KDF on every API request.\n\n```rust\n// Short-lived (CLI, tests)\nlet resolver = CredentialResolver::new(Some(vault), Some(dotenv_path));\n\n// Long-lived (API handlers) — reuses the kernel's cached vault\nlet resolver = CredentialResolver::with_vault_handle(\n    Some(kernel_vault_handle),\n    Some(dotenv_path),\n);\n```\n\n**Key methods:**\n\n- `resolve(key)` → `Option<Zeroizing<String>>` — try all sources in order\n- `resolve_all(&[keys])` → `HashMap<String, Zeroizing<String>>` — batch resolve\n- `missing_credentials(&[keys])` → `Vec<String>` — identify gaps\n- `has_credential(key)` → `bool` — check without prompting\n- `store_in_vault(key, value)` — write-through to the vault\n- `clear_dotenv_cache(key)` — evict a stale dotenv entry after dashboard deletion\n\n### Dotenv Loader (`dotenv.rs`)\n\nLoads secrets into the process environment from multiple files, called once from synchronous `main()` before the tokio runtime starts (required because `std::env::set_var` is UB once other threads exist).\n\n**Load priority** (highest first — earlier sources never override later ones):\n\n1. Existing system environment variables\n2. Credential vault (`vault.enc`)\n3. `~/.librefang/.env`\n4. `~/.librefang/secrets.env`\n\nThe `load_dotenv()` function is gated by a `Once` guard — repeated calls are no-ops.\n\n**File management functions:**\n\n- `save_env_key(key, value)` — upsert a key in `.env` with atomic write (PID-uniquified temp file, 0600 at creation time, `fsync` + `rename`)\n- `remove_env_key(key)` — delete a key from `.env`\n- `list_env_keys()` — enumerate key names (no values)\n- `escape_env_value` / `unescape_env_value` — handle `\\`, `\\n`, `\\r`, `\"` inside double-quoted values; single-quoted values are literal\n\n### MCP Catalog (`catalog.rs`)\n\nRead-only in-memory index of MCP server templates stored at `~/.librefang/mcp/catalog/`. Templates are refreshed from the upstream `librefang-registry` by `librefang_runtime::registry_sync`.\n\n**Two valid layouts:**\n\n- **Flat:** `<id>.toml` — ID from filename minus extension\n- **Directory:** `<id>/MCP.toml` — for multi-file MCP packages, ID from directory name\n\n`load()` performs a full reload — existing entries are cleared before reading disk so deleted templates don't linger.\n\n**Query methods:**\n\n- `get(id)` — lookup by ID\n- `list()` — all entries sorted by ID\n- `list_by_category(category)` — filter by `McpCategory` (DevTools, etc.)\n- `search(query)` — fuzzy match against ID, name, description, and tags\n\n### Health Monitor (`health.rs`)\n\nTracks the operational status of configured MCP servers using a `DashMap<String, McpHealth>` for lock-free concurrent access from background health-check tasks and foreground API handlers.\n\n**`McpHealth` fields:** `status` (Ready/Error/Available/Setup), `tool_count`, `last_ok`, `last_error`, `consecutive_failures`, `reconnecting`, `reconnect_attempts`, `connected_since`.\n\n**Auto-reconnect** uses exponential backoff: 5s → 10s → 20s → 40s → ... capped at 300s (configurable via `max_backoff_secs`), with a maximum of 10 attempts. The monitor only suggests reconnection via `should_reconnect()` — the actual reconnect logic lives in the kernel.\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig::default());\nmonitor.register(\"github\");\nmonitor.report_ok(\"github\", 12);\nlet should = monitor.should_reconnect(\"github\"); // false — healthy\n```\n\n### OAuth2 PKCE (`oauth.rs`)\n\nImplements the complete Authorization Code + PKCE flow for Google, GitHub, Microsoft, and Slack. Each flow:\n\n1. Generates a PKCE code verifier/challenge pair (S256)\n2. Binds an ephemeral localhost HTTP server to a random port\n3. Constructs an HMAC-signed state token binding the flow to `(auth_url, client_id, redirect_uri, nonce, expiry)`\n4. Opens the browser to the authorization URL\n5. Waits for the callback (5-minute timeout)\n6. Exchanges the authorization code for tokens\n\n**State token security (#3791):** The state is `base64url(json_payload).base64url(hmac)`. The HMAC key is a per-process random 32-byte value (`OnceLock`), so a daemon restart invalidates any in-flight flows. Verification checks the HMAC in constant time, confirms the payload hasn't expired (10-minute TTL), and validates that the `provider`, `client_id`, and `redirect_uri` match the expected values. Only the first valid callback wins; subsequent hits get a \"Gone\" response.\n\nClient IDs are resolved from defaults (embedded placeholders) with config-file overrides via `resolve_client_ids()`.\n\n### HTTP Client (`http_client.rs`)\n\nA shared `reqwest::ClientBuilder` configured with:\n\n- Native CA roots (via `rustls_native_certs`) with `webpki_roots` fallback\n- `aws_lc_rs` TLS provider\n- 10-second connect timeout, 30-second read timeout\n- Maximum 5 redirects\n\nUse `client_builder()` for custom configuration or `new_client()` for the default built client.\n\n### Installer (`installer.rs`)\n\nPure transforms from catalog templates to `McpServerConfigEntry` values. No side effects — the caller decides when to persist the result.\n\n**`install_integration(catalog, resolver, id, provided_keys)`** pipeline:\n\n1. Look up the template by ID in the catalog\n2. Store any user-provided credentials in the vault (best-effort)\n3. Check which required env vars are still missing\n4. Convert the template transport into a `McpTransportEntry`\n5. Return an `InstallResult` with status (`Ready` if all creds present, `Setup` if missing), the server entry, and a human-readable message\n\n**`catalog_entry_to_mcp_server(entry)`** maps transport types:\n\n- `McpCatalogTransport::Stdio { command, args }` → `McpTransportEntry::Stdio`\n- `McpCatalogTransport::Sse { url }` → `McpTransportEntry::Sse`\n- `McpCatalogTransport::Http { url }` → `McpTransportEntry::Http`\n\nThe resulting entry gets `template_id` set to the catalog ID so the dashboard can trace it back.\n\n**Scaffolding:** `scaffold_integration(dir)` and `scaffold_skill(dir)` generate starter TOML templates for custom MCP servers and skills respectively.\n\n---\n\n## Integration Points\n\n### Daemon Boot Sequence\n\nThe vault is central to daemon startup. The typical flow:\n\n1. `dotenv::load_dotenv()` runs from synchronous `main()` — injects vault secrets + `.env` into process env\n2. `run_daemon()` → `check_bind_auth_safety()` → `resolve_dashboard_credential()` → `vault.unlock()`\n3. After unlock, `verify_or_install_sentinel()` validates the key\n4. The kernel caches the unlocked vault as an `Arc<RwLock<CredentialVault>>` for API request handlers\n\n### API Request Path\n\nAPI handlers (terminal operations, skill routes) call `resolve_dashboard_credential()` which reads from the cached vault. The `CredentialResolver` with `VaultSource::Shared` routes through this cache to avoid Argon2id on every request.\n\n### TUI / CLI\n\nThe init wizard (`tui/screens/init_wizard.rs`) and free provider guide (`tui/screens/free_provider_guide.rs`) call `save_env_key()` directly. The CLI `vault rotate-key` subcommand uses `decode_master_key()`, `init_with_key()`, `rewrap_with_new_key()`, and `verify_or_install_sentinel()`.\n\n---\n\n## Error Handling\n\nAll operations return `ExtensionResult<T>` (`Result<T, ExtensionError>`). Key error variants:\n\n| Variant | Meaning |\n|---|---|\n| `NotFound(id)` | Catalog entry doesn't exist |\n| `VaultLocked` | Vault hasn't been unlocked yet |\n| `VaultKeyMismatch { hint }` | Sentinel failed — wrong master key |\n| `Vault(msg)` | Encryption/decryption/IO failure |\n| `OAuth(msg)` | PKCE flow failure |\n| `Io(err)` | Filesystem errors |\n\n---\n\n## File Layout\n\n```\n~/.librefang/\n├── vault.enc              # AES-256-GCM encrypted credentials\n├── .env                   # User-managed secrets (0600)\n├── secrets.env            # Additional secrets (0600)\n├── config.toml            # [[mcp_servers]] entries live here\n└── mcp/catalog/           # Template files\n    ├── github.toml        # Flat layout\n    ├── slack.toml\n    └── my-server/         # Directory layout\n        └── MCP.toml\n\n<data_local_dir>/librefang/\n└── .keyring               # File-based keyring fallback (0600)\n```","hands-orchestration":"# Hands Orchestration\n\n# Hands Orchestration (`librefang-hands`)\n\n## Purpose\n\nA **Hand** is a pre-built, domain-complete autonomous agent package that users activate from a marketplace. Unlike regular agents (which you chat with interactively), Hands work for you in the background — you check in on them rather than driving them turn-by-turn.\n\nThis crate provides:\n\n- **Type definitions** for hand definitions, instances, settings, requirements, dashboards, and localization\n- **TOML parsing** for `HAND.toml` configuration files, including legacy format migration and agent template inheritance\n- **`HandRegistry`** — a concurrent-safe registry that manages hand definitions and tracks active instances across daemon restarts\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"HAND.toml Parsing\"\n        A[HAND.toml file] --> B{agents_dir provided?}\n        B -->|Yes| C[parse_hand_definition]\n        B -->|No| D[serde Deserialize]\n        C --> E[parse_multi_agent_entry]\n        E -->|base set| F[Load template + deep_merge]\n        E -->|no base| G[parse_single_agent_section]\n        G --> H{has model sub-table?}\n        H -->|Yes| I[AgentManifest::deserialize]\n        H -->|No| J[LegacyHandAgentConfig → AgentManifest]\n        D --> H\n    end\n\n    subgraph \"Registry\"\n        K[HandRegistry] --> L[definitions: DashMap]\n        K --> M[instances: DashMap]\n        K --> N[agent_index: reverse lookup]\n        K --> O[active_index: hand_id → instance]\n    end\n\n    subgraph \"Persistence\"\n        P[persist_state] --> Q[hand_state.json v5]\n        R[load_state] --> Q\n        R -->|v3+| S[Typed deserialization]\n        R -->|v1/v2| T[Untyped fallback]\n    end\n```\n\n## Core Types\n\n### `HandDefinition`\n\nThe static configuration parsed from `HAND.toml`. Key fields:\n\n| Field | Purpose |\n|-------|---------|\n| `id` | Unique identifier (e.g. `\"clip\"`) |\n| `version` | Semantic version, defaults to `\"0.0.0\"` |\n| `agents` | `BTreeMap<String, HandAgentManifest>` — agent manifests keyed by role name |\n| `requires` | Prerequisites (binaries, env vars, API keys) that must be met before activation |\n| `settings` | Configurable options shown in the activation modal |\n| `dashboard` | Metrics schema for the hand's dashboard |\n| `routing` | Keywords for deterministic hand selection |\n| `i18n` | Localized strings keyed by language code |\n| `skill_content` | Bundled `SKILL.md` content (populated at load time, not in TOML) |\n| `agent_skill_content` | Per-role `SKILL-{role}.md` overrides (populated at load time) |\n\nSingle-agent hands store their agent as `agents[\"main\"]`. Use `coordinator()` to find the agent that receives user messages — it returns the explicitly-marked coordinator, or falls back to the first agent by role name.\n\n### `HandInstance`\n\nA runtime instance linking a `HandDefinition` to its spawned agents. Created by `HandRegistry::activate()`, populated with agent IDs by the kernel after spawning. Key fields:\n\n- `instance_id: Uuid` — unique instance identifier\n- `hand_id: String` — which definition this is an instance of\n- `status: HandStatus` — `Active`, `Paused`, `Error(String)`, or `Inactive`\n- `agent_ids: BTreeMap<String, AgentId>` — role → spawned agent mapping\n- `coordinator_role: Option<String>` — persisted coordinator routing\n- `config: HashMap<String, Value>` — user-provided configuration overrides\n- `agent_runtime_overrides: BTreeMap<String, HandAgentRuntimeOverride>` — dashboard-edited model/provider overrides that survive restarts\n- `activated_at`, `updated_at` — timestamps preserved across daemon restarts\n\n### `HandAgentRuntimeOverride`\n\nPer-role runtime overrides for model, provider, API key, base URL, max tokens, temperature, and web search augmentation. These are merged with `Option` semantics — the override field wins if present, otherwise the definition's value is used. See `merge_agent_runtime_override()` for the merge logic.\n\n### `HandReadiness`\n\nComputed by `HandRegistry::readiness()`, combines requirement checks with runtime state:\n\n- `requirements_met` — all **non-optional** requirements are satisfied\n- `active` — at least one instance is in `Active` status\n- `degraded` — active but some requirement (optional or not) is unmet\n\n## HAND.toml Format\n\nHands support two agent configuration formats:\n\n### Single-Agent (legacy)\n\n```toml\nid = \"clip\"\nname = \"Clip Maker\"\ndescription = \"Autonomous video clipping\"\ncategory = \"content\"\nicon = \"🎬\"\ntools = [\"shell_exec\"]\n\n[agent]\nname = \"clip-agent\"\ndescription = \"Creates video clips\"\nsystem_prompt = \"You are a video editing assistant.\"\n\n[dashboard]\nmetrics = []\n```\n\nAutomatically converted to `agents = {\"main\": ...}` with `coordinator = true`.\n\n### Multi-Agent\n\n```toml\nid = \"research\"\nname = \"Research Team\"\ndescription = \"Multi-agent research pipeline\"\ncategory = \"data\"\ntools = []\n\n[agents.planner]\ncoordinator = true\ninvoke_hint = \"Use planner for task decomposition\"\nname = \"planner-agent\"\ndescription = \"Plans research tasks\"\n\n[agents.planner.model]\nprovider = \"anthropic\"\nmodel = \"claude-sonnet-4-20250514\"\nmax_tokens = 8192\nsystem_prompt = \"You plan research.\"\n\n[agents.analyst]\nname = \"analyst-agent\"\ndescription = \"Analyzes data\"\n\n[agents.analyst.model]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\nsystem_prompt = \"You analyze data.\"\n\n[dashboard]\nmetrics = []\n```\n\n### Model Configuration: Flat vs Nested\n\nLegacy `HAND.toml` files may use flat top-level fields (`provider`, `model`, `system_prompt`, etc.) inside `[agent]`. The parser auto-detects this via the presence of a `[agent.model]` sub-table:\n\n- **Nested** (`model` is a table) → parsed as `AgentManifest` directly\n- **Flat** (no `model` table) → parsed as `LegacyHandAgentConfig`, then converted to `AgentManifest`\n\nThe sentinel values `\"default\"` for provider and model defer to the user's global configuration at resolution time, so hands don't hardcode specific providers.\n\n### Agent Template Inheritance (`base`)\n\nMulti-agent entries can reference a shared agent template via `base`:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"my-writer\"\n\n[agents.writer.model]\nsystem_prompt = \"You are a blog post writer.\"\n```\n\nThis loads `{agents_dir}/my-writer/agent.toml` and deep-merges the hand's overrides on top (hand wins). Template names are validated against path traversal — they must be simple directory names without separators or `..`.\n\nThe merge is handled by `deep_merge_toml()` which recursively merges tables and replaces scalars/arrays. `normalize_flat_to_nested()` ensures legacy flat-format templates are converted before merging so fields don't get orphaned.\n\n**Restriction:** `base` is only supported in `[agents.*]` format. `[agent]` (single-agent) does not support it — use `[agents.main]` instead.\n\n## Settings System\n\nHands declare configurable settings in `[[settings]]` arrays. Three types are supported:\n\n| Type | Behavior |\n|------|----------|\n| `select` | Dropdown with predefined options. Each option can declare `provider_env` and `binary` for availability badges. |\n| `toggle` | Boolean switch. Value is `\"true\"` or `\"false\"`. |\n| `text` | Free-text input. Can declare `env_var` to expose the value as an environment variable. |\n\n### `resolve_settings()`\n\nTakes a hand's settings schema and user config map, produces:\n\n- `prompt_block` — Markdown appended to the system prompt summarizing user choices\n- `env_vars` — List of environment variable names the agent's subprocess should have access to\n\nFor `select` settings, only the chosen option's `provider_env` is collected (not all options).\n\n## Requirements Checking\n\nEach `HandRequirement` has a `requirement_type` that determines the check:\n\n| Type | Check |\n|------|-------|\n| `Binary` | Binary exists on PATH (special handling for `python3` and `chromium`) |\n| `EnvVar` / `ApiKey` | Environment variable is set and non-empty |\n| `AnyEnvVar` | Any one of comma-separated env vars is set |\n\nRequirements can be marked `optional: true` — these don't block activation but cause the hand to be reported as \"degraded\" when unmet.\n\nEach requirement can carry a `HandInstallInfo` with platform-specific install commands (macOS, Windows, Linux via apt/dnf/pacman), signup URLs, docs, and step-by-step guides.\n\n## HandRegistry\n\nThe central runtime store. Thread-safe via `DashMap` for concurrent reads and `Mutex` for serialized mutations.\n\n### Indexes\n\n| Index | Key | Value | Purpose |\n|-------|-----|-------|---------|\n| `definitions` | `hand_id` | `HandDefinition` | All known hand configurations |\n| `instances` | `instance_id` (Uuid) | `HandInstance` | Active and paused instances |\n| `agent_index` | `agent_id` (string) | `instance_id` (Uuid) | Reverse lookup: which instance owns an agent |\n| `active_index` | `hand_id` | `instance_id` (Uuid) | O(1) check: is a hand currently active? |\n\n### Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Active: activate()\n    Active --> Paused: pause()\n    Paused --> Active: resume()\n    Active --> Error: set_error()\n    Error --> Active: resume()\n    Active --> Inactive: deactivate()\n    Paused --> Inactive: deactivate()\n    Inactive --> [*]\n```\n\nKey methods:\n\n- **`activate()`** / **`activate_with_id()`** — creates an instance. Uses a mutex to prevent races where concurrent requests both pass the \"already active\" check. Accepts an optional `instance_id` for daemon restart recovery.\n- **`deactivate()`** — removes instance, cleans up all reverse indexes. If multiple instances of the same hand exist, re-inserts another active instance into `active_index`.\n- **`set_agents()`** — called by the kernel after spawning agents. Updates `agent_index` atomically.\n- **`merge_agent_runtime_override()`** — partial update with `Option` merge semantics (new value wins if present, old preserved otherwise).\n\n### Hand Discovery\n\nHands are loaded from two directories:\n\n1. **`{home}/registry/hands/`** — read-only, comes from the shared registry tarball\n2. **`{home}/workspaces/`** — user-writable, populated by `install_from_content_persisted()`\n\nRegistry entries take precedence on ID collisions. Both are scanned by `reload_from_disk()`.\n\nPer-agent skill files follow the pattern `SKILL-{role}.md` (e.g. `SKILL-pm.md`) and are loaded into `agent_skill_content`. When present for a role, they take precedence over the shared `SKILL.md`.\n\n### Install Methods\n\n| Method | Use Case | Base Templates | Persisted to Disk |\n|--------|----------|----------------|-------------------|\n| `install_from_path()` | Load from a directory | ✅ resolved | No |\n| `install_from_content()` | API-based install, no filesystem | ❌ rejected | No |\n| `install_from_content_persisted()` | Dashboard \"install from content\" | ✅ resolved | Yes (`workspaces/{id}/`) |\n\n`install_from_content()` explicitly rejects hands that use `base` template references because it has no access to the agents registry directory.\n\n### Uninstall\n\n`uninstall_hand()` removes the in-memory definition and deletes the `workspaces/{id}/` directory. Refuses to:\n- Uninstall built-in hands (those only in `registry/hands/`)\n- Uninstall hands with live instances (deactivate first)\n\n## State Persistence\n\nHand state is persisted to `hand_state.json` using atomic writes (write to temp file, `sync_all`, `rename`, parent directory fsync on Unix).\n\n### Version History\n\n| Version | Changes |\n|---------|---------|\n| v1 | Bare JSON array, single `agent_id` |\n| v2 | `{ version, instances }` wrapper |\n| v3 | Multi-agent: `agent_ids` map + `coordinator_role` |\n| v4 | `activated_at` / `updated_at` timestamps |\n| v5 | `agent_runtime_overrides` for dashboard-edited model settings |\n\nLoading is forward-compatible: v5 can load v1–v4 files. Legacy `config.__model_overrides__` blobs are migrated into `agent_runtime_overrides` during load. Errored and inactive instances are skipped during restoration.\n\nThe `PersistedInstance` struct uses `#[serde(default)]` + `skip_serializing_if` on version-bumped fields, so a downgrade from v5 to v4 silently drops the overrides field without corrupting the file.\n\n## Localization (i18n)\n\nHands can declare `[i18n.{lang}]` sections with localized names, descriptions, category names, per-agent strings, and per-setting labels/descriptions. All fields are optional — untranslated items fall back to English. The registry's `check_settings_availability()` accepts an optional `lang` parameter and applies translations to the response.\n\n## Routing\n\n`HandRouting` provides deterministic keyword matching for hand selection:\n\n- `aliases` — strong signals, score ×3 each\n- `weak_aliases` — supporting signals, score ×1 each\n\nKeywords are English-only; cross-lingual matching is handled by semantic embedding fallback in the routing layer.\n\n## Error Handling\n\nAll operations return `HandResult<T>` with `HandError` variants:\n\n- `NotFound` — hand definition or instance not found\n- `AlreadyActive` — duplicate activation blocked\n- `AlreadyRegistered` — duplicate definition insertion blocked\n- `BuiltinHand` — attempted uninstall of a registry hand\n- `InstanceNotFound` — operation on non-existent instance UUID\n- `ActivationFailed` — instance collision during recovery\n- `TomlParse` — HAND.toml parsing errors\n- `Io` — filesystem errors\n- `Config` — configuration/validation errors\n\n## Consumers\n\nThis module is used by:\n\n- **Kernel** (`src/kernel/`) — spawns agents from hand definitions, applies settings/team blocks, manages lifecycle\n- **API routes** (`src/routes/skills.rs`) — lists hands, checks requirements and readiness\n- **TUI** (`src/tui/event.rs`) — displays available and active hands\n- **ACP server** (`librefang-acp/`) — resumes paused hands via RPC","kernel-core-librefang-http-src":"# Kernel Core — librefang-http-src\n\n# librefang-http\n\nCentralized HTTP client factory with proxy support and resilient TLS configuration.\n\nEvery outbound HTTP request in the kernel should go through this crate so that proxy settings and TLS roots are applied uniformly. Bypassing it risks certificate-validation failures on minimal hosts (Docker, Termux, musl) and inconsistent proxy routing.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[init_proxy] -->|writes| B[GLOBAL_PROXY RwLock]\n    A -->|exports env vars once| C[HTTP_PROXY / HTTPS_PROXY / NO_PROXY]\n    D[tls_config] -->|returns cached| E[rustls::ClientConfig]\n    E -->|webpki-roots + system certs| F[RootCertStore]\n    G[proxied_client_builder] --> H[active_proxy]\n    H --> B\n    G --> I[build_http_client]\n    I --> D\n    I --> J[reqwest::ClientBuilder]\n    J --> K[proxied_client]\n    J --> L[proxied_client_fallback]\n    M[proxied_client_with_override] --> D\n```\n\n## Initialization Sequence\n\nAt daemon startup, before the Tokio runtime spawns worker threads:\n\n```rust\nuse librefang_http::init_proxy;\nuse librefang_types::config::ProxyConfig;\n\n// Called once from synchronous bootstrap.\ninit_proxy(proxy_config_from_toml);\n```\n\nThis does two things:\n\n1. **Writes `GLOBAL_PROXY`** — a `RwLock<Option<ProxyConfig>>` that `proxied_client_builder()` reads on every call.\n2. **Exports environment variables** — `HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY` (and their lowercase equivalents) are set via `std::env::set_var`. This happens **only on the initial call** (when `GLOBAL_PROXY` is still `None`), because `set_var` is unsound in a multi-threaded context. Crates that build their own `reqwest::Client` (e.g. `librefang-channels`) rely on reqwest's built-in env-var detection, so these exports keep them consistent.\n\nSubsequent calls (hot-reload) overwrite `GLOBAL_PROXY` but skip the env-var export.\n\n## TLS Configuration\n\nOn systems without system CA certificates, reqwest's default TLS backend panics during initialization. This crate solves that by building a `rustls::ClientConfig` that:\n\n1. **Always seeds with bundled Mozilla CA roots** (`webpki_roots::TLS_SERVER_ROOTS`) — ensures common public CAs are trusted everywhere.\n2. **Supplements with system CA certificates** (`rustls_native_certs::load_native_certs`) — adds org-internal and self-signed CAs.\n\nThe config is built once and cached in a `OnceLock`. Access it via `tls_config()`, or more commonly, through any of the client builders which call it internally.\n\n## Client Builders\n\n### Primary entry points\n\n| Function | Returns | Use when |\n|---|---|---|\n| `proxied_client()` | `reqwest::Client` | You need a ready client with global proxy settings |\n| `proxied_client_builder()` | `reqwest::ClientBuilder` | You need to customize timeouts, headers, etc. before building |\n| `proxied_client_fallback()` | `reqwest::Client` | A per-provider proxy override was invalid; enforces a 300 s total timeout as a safety net |\n| `proxied_client_with_override(url)` | `Result<reqwest::Client>` | A provider has its own proxy URL that overrides the global config |\n\n### Backward-compatible aliases\n\n`client_builder()` → `proxied_client_builder()`  \n`new_client()` → `proxied_client()`\n\n### Lower-level\n\n`build_http_client(&ProxyConfig)` — constructs a `ClientBuilder` from an explicit config rather than reading `GLOBAL_PROXY`. Prefer the higher-level functions unless you need this control.\n\n## Proxy Resolution Logic\n\nWhen `build_http_client` constructs a client:\n\n- **Explicit `ProxyConfig` fields** (`http_proxy`, `https_proxy`, `no_proxy`) are applied directly to the builder.\n- **`None` fields** are left unset, allowing reqwest's built-in env-var detection (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`) to provide the fallback.\n- This avoids double-applying settings that `init_proxy` already exported as env vars.\n\nValid proxy URL schemes: `http://`, `https://`, `socks5://`, `socks5h://`. Invalid schemes are logged as warnings and skipped.\n\n## Timeouts\n\nAll clients built through this crate carry sensible defaults:\n\n| Timeout | Duration | Rationale |\n|---|---|---|\n| `connect_timeout` | 30 s | Caps TCP + TLS handshake; generous for slow international links to LLM providers |\n| `read_timeout` | 300 s | Per-read inactivity timeout (not total request time). Streaming LLM responses keep it alive; a true upstream stall triggers it |\n| `timeout` (fallback client) | 300 s | Total per-request budget; prevents a stuck upstream from wedging the agent loop |\n\nCallers can override these on the `ClientBuilder` returned by `proxied_client_builder()`.\n\n## User-Agent\n\nAll clients set `User-Agent: librefang/<version>` automatically, derived from `CARGO_PKG_VERSION`.\n\n## Usage Across the Codebase\n\nThis crate is a leaf dependency consumed by nearly every subsystem that makes outbound HTTP calls:\n\n- **OAuth flows** — `start_device_flow`, `poll_device_flow`, `refresh_access_token`, `discover_oauth_metadata`, `exchange_copilot_token`\n- **LLM provider health** — `probe_client`, `probe_model`, `probe_api_key`\n- **Media understanding** — `whisper_transcribe`, `elevenlabs_transcribe`, `gemini_transcribe`\n- **Tool execution** — `tool_web_fetch_legacy`, `tool_web_search_legacy`, `tool_location_get`, `host_net_fetch`\n- **Plugin management** — `install_plugin_with_deps`, `plugin_registry_search`, `plugin_update_check`\n- **Webhooks and channels** — `test_webhook`, `send_channel_test_message`, `cron_deliver_response`\n- **API surfaces** — `sync_dashboard`, `resolve_url_attachments`\n\n## Thread Safety Notes\n\n- `GLOBAL_PROXY` uses `RwLock` — readers (via `active_proxy`) are never blocked by each other; only hot-reload writes take a write lock briefly.\n- `TLS_CONFIG` uses `OnceLock` — lock-free after first initialization.\n- `std::env::set_var` is confined to the single-threaded bootstrap phase. The `is_initial` guard in `init_proxy` ensures it never runs after worker threads exist.","kernel-core-librefang-kernel-handle-src":"# Kernel Core — librefang-kernel-handle-src\n\n# librefang-kernel-handle — Kernel Role Traits\n\n## Purpose\n\nThis crate defines the **seam between the agent runtime and the kernel**: a set of role traits that express every capability the runtime needs from the kernel (agent lifecycle, memory, task queues, approvals, channel I/O, ACP bridges, etc.).\n\nPrior to issue #3746, the entire surface was crammed into a single 50+ method `KernelHandle` god-trait. This crate now exposes **18 independent role traits** plus a `KernelHandle` supertrait alias that combines them all. Callers can express narrow bounds — `T: ApprovalGate` — instead of pulling the entire kernel surface into scope.\n\n## Architecture\n\n```mermaid\ngraph BT\n    AC[AgentControl] --> KH\n    MA[MemoryAccess] --> KH\n    WA[WikiAccess] --> KH\n    TQ[TaskQueue] --> KH\n    EB[EventBus] --> KH\n    KG[KnowledgeGraph] --> KH\n    CC[CronControl] --> KH\n    AG[ApprovalGate] --> KH\n    HC[HandsControl] --> KH\n    A2A[A2ARegistry] --> KH\n    CS[ChannelSender] --> KH\n    PS[PromptStore] --> KH\n    WR[WorkflowRunner] --> KH\n    GC[GoalControl] --> KH\n    TP[ToolPolicy] --> KH\n    AA[ApiAuth] --> KH\n    SW[SessionWriter] --> KH\n    AFB[AcpFsBridge] --> KH\n    ATB[AcpTerminalBridge] --> KH\n\n    KH[KernelHandle<br/>supertrait alias] --> Impl[\"LibreFangKernel<br/>(blanket impl)\"]\n\n    style KH fill:#f9f,stroke:#333\n    style Impl fill:#bbf,stroke:#333\n```\n\nThe blanket `impl KernelHandle for T` means any concrete type that implements all 18 role traits automatically satisfies `KernelHandle`. Existing `Arc<dyn KernelHandle>` call sites (117 at split time) keep working unchanged.\n\n## Error Model\n\nAll trait methods return `KernelResult<T>`, an alias for `Result<T, KernelOpError>`:\n\n```rust\npub use librefang_types::error::LibreFangError as KernelOpError;\npub type KernelResult<T> = Result<T, KernelOpError>;\n```\n\n`KernelOpError` is a re-export of the workspace's canonical `LibreFangError` enum. This gives callers structured pattern-matching across the runtime↔kernel seam instead of substring-matching on `String` errors:\n\n```rust\nmatch err {\n    KernelOpError::AgentNotFound(_) => /* 404 */,\n    KernelOpError::CapabilityDenied(_) => /* 403 */,\n    KernelOpError::Unavailable(_) => /* 503 */,\n    // ...\n}\n```\n\nUse `KernelResult<T>` in all new method signatures rather than spelling out the full type.\n\n## Role Trait Reference\n\n### Agent Lifecycle & Communication\n\n**`AgentControl`** *(async)* — Agent spawning, inter-agent messaging, listing, heartbeats, and forked one-shot calls.\n\n| Method | Purpose |\n|--------|---------|\n| `spawn_agent` | Create an agent from a TOML manifest |\n| `spawn_agent_checked` | Spawn with capability inheritance enforcement |\n| `send_to_agent` | Send a message and await the response |\n| `send_to_agent_as` | Send on behalf of a parent (enables cancel cascade) |\n| `list_agents` | Return all running agents as `Vec<AgentInfo>` |\n| `kill_agent` | Terminate an agent by ID |\n| `find_agents` | Search by name, tag, or tool (case-insensitive) |\n| `touch_heartbeat` | Refresh `last_active` during long LLM calls |\n| `fire_agent_step` | Emit `agent:step` hook event |\n| `run_forked_agent_oneshot` | Forked turn collapsing to a single text response |\n| `max_agent_call_depth` | Config-derived inter-agent depth limit (default: 5) |\n\n`spawn_agent_checked` defaults to delegating to `spawn_agent` without enforcement. The real kernel overrides this to verify every capability in the child manifest is covered by `parent_caps`.\n\n`send_to_agent_as` has a default impl that falls back to `send_to_agent` with a trace-level log, so handles that don't support cancel cascading are discoverable at runtime.\n\n`run_forked_agent_oneshot` errors by default. It exists for the proactive memory extractor: the fork shares the parent's prompt prefix for cache alignment rather than starting a cold `driver.complete()` call.\n\n### Memory\n\n**`MemoryAccess`** *(sync)* — Shared cross-agent key/value store with optional per-peer namespace isolation.\n\n| Method | Notes |\n|--------|-------|\n| `memory_store` | Write a value; `peer_id` scopes the key namespace |\n| `memory_recall` | Read a value; respects peer scoping |\n| `memory_list` | List keys; respects peer scoping |\n| `memory_acl_for_sender` | Resolve per-user RBAC ACL; returns `None` when RBAC is off |\n\n**`WikiAccess`** *(sync)* — Durable markdown knowledge vault (`librefang-memory-wiki`). All methods default to `Unavailable` so stubs compile unchanged when the wiki feature is off.\n\n| Method | Notes |\n|--------|-------|\n| `wiki_get` | Fetch a page as JSON; `not_found` vs `unavailable` |\n| `wiki_search` | Substring search across page bodies |\n| `wiki_write` | Write with `[[topic]]` cross-refs and monotonic provenance |\n\n`wiki_write` with `force = false` refuses silent overwrites when the on-disk file has drifted (mtime or sha256), returning `KernelOpError::conflict(...)`. Provenance is append-only — the vault never overwrites the provenance list.\n\n### Coordination\n\n**`TaskQueue`** *(async)* — Shared task lifecycle: post, claim, complete, list, delete, retry, get, update status.\n\n**`EventBus`** *(async)* — Fire-and-forget custom events for proactive agent triggers. Single method: `publish_event`.\n\n**`KnowledgeGraph`** *(async)* — Entity/relation insert and pattern query. `knowledge_add_entity` and `knowledge_add_relation` take their arguments by reference so callers that may retry avoid forced moves.\n\n**`CronControl`** *(async)* — Agent-owned scheduled jobs: `cron_create`, `cron_list`, `cron_cancel`. All default to `Unavailable`.\n\n**`GoalControl`** *(sync)* — List active goals and update goal status/progress.\n\n### Approval & Policy\n\n**`ApprovalGate`** *(async + sync)* — Tool approval policy queries and the pending-approval lifecycle.\n\n| Method | Notes |\n|--------|-------|\n| `requires_approval` | Simple policy check |\n| `requires_approval_with_context` | Policy check with sender/channel context |\n| `is_tool_denied_with_context` | Hard-deny check for sender/channel |\n| `resolve_user_tool_decision` | Per-user RBAC gate → `Allow`/`Deny`/`NeedsApproval` |\n| `request_approval` | Blocking approval wait |\n| `submit_tool_approval` | Non-blocking submission with deferred payload |\n| `resolve_tool_approval` | Resolve and retrieve deferred payload |\n| `get_approval_status` | Poll current status |\n\n`resolve_user_tool_decision` defaults to `Allow` to preserve pre-M3 behaviour for stubs and embedded callers without an `AuthManager`. The real kernel always overrides this.\n\n**`ToolPolicy`** *(sync)* — Read-side configuration for tool execution: timeouts, env passthrough policy, workspace prefixes (read-only and named), channel file download directory, and upload directory.\n\nTimeout resolution order for `tool_timeout_secs_for`:\n1. Exact match in `config.tool_timeouts`\n2. Longest glob match in `config.tool_timeouts`\n3. Global `config.tool_timeout_secs`\n\n### Agents & Hands\n\n**`HandsControl`** *(async)* — Specialized agent (\"Hand\") lifecycle: list, install, activate, status, deactivate. All default to `Unavailable`.\n\n**`A2ARegistry`** *(sync)* — Read-only directory of discovered external A2A agents. Returns `(name, url)` pairs.\n\n### Channels & Messaging\n\n**`ChannelSender`** *(async + sync)* — Outbound channel adapters for text, media, file data, and polls, plus group roster management.\n\n| Method | Notes |\n|--------|-------|\n| `send_channel_message` | Text to a recipient via named adapter |\n| `send_channel_media` | Image/file with optional caption |\n| `send_channel_file_data` | Raw bytes (`bytes::Bytes` for zero-copy cloning) |\n| `send_channel_poll` | Poll/quiz creation |\n| `roster_upsert` / `roster_members` / `roster_remove_member` | Group roster CRUD |\n\nAll send methods accept `thread_id` and `account_id` for thread replies and multi-bot routing. File data uses `bytes::Bytes` to avoid buffer copies in wrapping layers (metering, retry, fan-out) — significant with the 10 MiB upload bump (#3514).\n\n### Prompt Management\n\n**`PromptStore`** *(sync)* — Prompt version CRUD, experiment lifecycle, metric recording, and auto-tracking of system prompt changes. Methods that accept owned types (`create_prompt_version`, `create_experiment`) take them by reference so callers keep a copy for response JSON without double-cloning.\n\n### Workflow\n\n**`WorkflowRunner`** *(async)* — Single method: `run_workflow`. Takes a workflow ID (UUID or name) and an input string; returns `(run_id, output)`.\n\n### API Auth\n\n**`ApiAuth`** *(sync)* — Single method returning an `ApiAuthSnapshot`:\n\n```\nApiAuthSnapshot\n├── api_key: String\n├── dashboard: DashboardRawConfig { user, pass, pass_hash }\n├── home_dir: PathBuf\n├── device_api_keys: Vec<(device_id, api_key_hash)>\n└── config_users: Vec<ApiUserConfigSnapshot>\n```\n\nImplementations must acquire all values from a single config snapshot so callers see a consistent view across hot-reload boundaries.\n\n### Session Injection\n\n**`SessionWriter`** *(sync)* — Pre-inject content blocks into an agent session before an LLM turn (used by HTTP attachment uploads). The production implementation calls `MemorySubstrate::save_session` synchronously (blocking SQLite write). Callers in async contexts should wrap in `tokio::task::spawn_blocking` until #3579 lands async substrate support.\n\n### ACP Bridges\n\n**`AcpFsBridge`** *(async + sync)* — Routes file I/O through an attached ACP editor instead of the local filesystem.\n\nClient registration model:\n- `register_acp_fs_client(session_id, client)` — called on editor connect\n- `unregister_acp_fs_client(session_id)` — called on disconnect\n- `acp_fs_client(session_id) → Option<Arc<dyn AcpFsClient>>` — lookup\n\nConvenience methods `acp_read_text_file` and `acp_write_text_file` dispatch through the bound client, returning `Unavailable` when no editor is attached. Runtime tools should fall back to local fs in that case.\n\n**`AcpTerminalBridge`** *(async + sync)* — Same registration model for terminal commands. `acp_run_terminal_command` runs a command through the editor's PTY (create → wait → output → release) and returns `AcpTerminalRunResult` with output, truncation flag, exit code, and signal.\n\n**`AcpFsClient`** and **`AcpTerminalClient`** are object-safe traits implemented by `librefang-acp` handles. The kernel stores `Arc<dyn AcpFsClient>` / `Arc<dyn AcpTerminalClient>` per session.\n\n## Data Types\n\n### `AgentInfo`\n\n```rust\npub struct AgentInfo {\n    pub id: String,\n    pub name: String,\n    pub state: String,\n    pub model_provider: String,\n    pub model_name: String,\n    pub description: String,\n    pub tags: Vec<String>,\n    pub tools: Vec<String>,\n}\n```\n\nReturned by `list_agents` and `find_agents`.\n\n### `AcpTerminalRunResult`\n\n```rust\npub struct AcpTerminalRunResult {\n    pub output: String,\n    pub truncated: bool,\n    pub exit_code: Option<i32>,\n    pub signal: Option<String>,\n}\n```\n\n## Usage Patterns\n\n### Narrowing bounds on new code\n\nInstead of accepting the full `KernelHandle`, express only what you need:\n\n```rust\n// Old (pulls in everything):\nfn dispatch(h: &dyn KernelHandle) { ... }\n\n// New (only what's needed):\nfn dispatch(h: &dyn ApprovalGate) { ... }\nfn tool_executor(h: &(dyn ToolPolicy + ApprovalGate)) { ... }\n```\n\n### Implementing test stubs\n\nRole traits with default methods that return `Unavailable` or no-ops can be satisfied with an empty `impl`:\n\n```rust\nstruct MyStub;\nimpl CronControl for MyStub {}        // all methods → Unavailable\nimpl ApprovalGate for MyStub {}       // requires_approval → false, etc.\nimpl ToolPolicy for MyStub {}         // tool_timeout_secs → 120, etc.\nimpl AcpFsBridge for MyStub {}        // register/unregister → no-op\n```\n\nTraits with required methods (`AgentControl`, `MemoryAccess`, `TaskQueue`, `EventBus`, `KnowledgeGraph`, `ApiAuth`, `SessionWriter`) need explicit stub implementations. Missing a required method is a compile error, not a silent runtime failure.\n\n### Importing everything\n\n```rust\nuse librefang_kernel_handle::prelude::*;\n```\n\nBrings in `KernelHandle`, all 18 role traits, and the associated data types.\n\n## Default Implementation Strategy\n\nDefaults that hide a missing capability behind `Err(\"X not available\")` are preserved as-is to keep the role-trait split a pure structural refactor with zero behavior change. They are gathered onto the owning role trait so future PRs can tighten each contract independently — removing defaults one role at a time rather than landing 30+ removals atomically.","kernel-core-librefang-kernel-metering-src":"# Kernel Core — librefang-kernel-metering-src\n\n# Kernel Core — librefang-kernel-metering\n\n## Overview\n\nThe metering engine tracks LLM call costs and enforces spending quotas at four independent levels: per-agent, global, per-provider, and per-user. It wraps a SQLite-backed `UsageStore` and adds an in-memory reservation ledger to prevent concurrent requests from collectively overshooting budget caps.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[LLM call request] --> B[reserve_global_budget]\n    B -->|estimated cost| C[CostReservationLedger]\n    B -->|reads| D[SQLite UsageStore]\n    C -->|tracks pending| B\n    B -->|rejected| E[QuotaExceeded error]\n    B -->|ok| F[Dispatch LLM call]\n    F -->|response| G[check_all_and_record]\n    G -->|atomic txn| D\n    G -->|ok| H[MeteringReservation.settle]\n    H -->|releases| C\n    F -->|failure| I[MeteringReservation.release]\n    I -->|releases| C\n```\n\n## Key Types\n\n### `MeteringEngine`\n\nThe main entry point. Holds two pieces of state:\n\n- `store: Arc<UsageStore>` — persistent SQLite store for settled usage records\n- `pending: Arc<CostReservationLedger>` — in-memory ledger of reserved-but-not-settled USD\n\nConstruct with `MeteringEngine::new(store)`.\n\n### `MeteringReservation`\n\nA `#[must_use]` RAII token returned by `reserve_global_budget`. Holds an `estimated_usd` reservation against the global budget. Consumers must call one of:\n\n| Method | When to call |\n|---|---|\n| `settle()` | After the actual usage record has been persisted (the SQLite row now reflects the real cost) |\n| `release()` | When the dispatch failed before any cost was incurred |\n\nIf neither is called (e.g. due to a panic), `Drop` releases the reservation as a safety net.\n\n### `BudgetStatus`\n\nA serializable snapshot of current spend versus configured limits across hourly/daily/monthly windows. Produced by `budget_status()`.\n\n### `CostReservationLedger` (internal)\n\nA `Mutex<f64>` tracking total reserved USD across all in-flight calls. The three operations are `add`, `release` (clamped at zero to defend against floating-point drift), and `current`.\n\n## Budget Enforcement Layers\n\nEach layer is independent — zero-valued limits are treated as \"unlimited\" and skipped.\n\n| Layer | Config type | Method | Scopes |\n|---|---|---|---|\n| Per-agent | `ResourceQuota` | `check_quota` | hourly, daily, monthly cost |\n| Global | `BudgetConfig` | `check_global_budget` | hourly, daily, monthly cost |\n| Per-provider | `ProviderBudget` | `check_provider_budget` | hourly, daily, monthly cost; hourly tokens |\n| Per-user | `UserBudgetConfig` | `check_user_budget` | hourly, daily, monthly cost |\n\nPer-provider budgets are stored as a map in `BudgetConfig.providers`, keyed by provider name.\n\n### Atomic vs. Non-Atomic Checks\n\nThe non-atomic methods (`check_quota`, `check_global_budget`, `check_provider_budget`) query SQLite and return a snapshot. They are suitable for dashboards or pre-dispatch gating but admit a TOCTOU race: concurrent requests can both pass the check before either records usage.\n\nThe atomic methods perform check + record inside a single SQLite transaction:\n\n- `check_quota_and_record` — per-agent only\n- `check_global_budget_and_record` — global only\n- `check_all_and_record` — **preferred**. Checks per-agent, global, and per-provider budgets, then inserts the usage row, all in one transaction. On failure the record is not inserted.\n\n## The Concurrent Overshoot Fix (#3616)\n\n### Problem\n\nWhen N triggers fire concurrently, each reads the same pre-call total from SQLite, each passes the budget gate, and each commits — producing an N× overshoot.\n\n### Solution\n\n`reserve_global_budget` adds an estimated cost to the in-memory `CostReservationLedger` *before* dispatching the LLM call. Subsequent callers see the pending hold reflected in their budget projection.\n\n### Comparison-Operator Asymmetry\n\nThis is intentional and should be preserved:\n\n- `reserve_global_budget` uses `>` — a single call that exactly reaches the cap is allowed through (a fresh kernel with its first call shouldn't be rejected).\n- `check_global_budget` uses `>=` — once the limit is fully consumed, no further calls are dispatched.\n\n### Limitations\n\nThe reservation ledger only synchronizes in-process callers. Two separate processes (or an out-of-band SQL writer) can still race. Full cross-process atomicity is the re
