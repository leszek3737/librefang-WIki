            var PAGES = {
                "agent-hands":
                    '# Agent Hands\n\n# LibreFang Hands — Autonomous Capability Packages\n\nHands are pre-built, domain-complete agent configurations that users activate from a marketplace. Unlike regular agents (where you chat with them), Hands work autonomously for you — you check in on them periodically while they run in the background.\n\n## Overview\n\nThe `librefang-hands` crate provides:\n\n- **Hand definitions** — parsed from `HAND.toml` files, describing agent capabilities, settings, requirements, and routing metadata\n- **Hand instances** — running activations of a hand, tracking status and spawned agents\n- **Hand registry** — in-memory store managing definitions, instances, and persistence\n- **Requirement checking** — validates that system dependencies (binaries, API keys, environment variables) are available before activation\n\n## Key Types\n\n### HandDefinition\n\nThe complete configuration for a hand, parsed from `HAND.toml`:\n\n```rust\npub struct HandDefinition {\n    pub id: String,                      // e.g. "clip"\n    pub version: String,                 // e.g. "1.2.0"\n    pub name: String,                    // Human-readable name\n    pub description: String,\n    pub category: HandCategory,           // Content, Security, Data, etc.\n    pub icon: String,                     // Emoji icon\n    pub tools: Vec<String>,              // Required tools\n    pub skills: Vec<String>,             // Skill allowlist\n    pub mcp_servers: Vec<String>,        // MCP server allowlist\n    pub allowed_plugins: Vec<String>,\n    pub requires: Vec<HandRequirement>,   // Activation prerequisites\n    pub settings: Vec<HandSetting>,      // User-configurable options\n    pub agents: BTreeMap<String, HandAgentManifest>,  // Agent configs by role\n    pub dashboard: HandDashboard,\n    pub routing: HandRouting,             // Keywords for hand selection\n    pub skill_content: Option<String>,   // Bundled SKILL.md content\n    pub agent_skill_content: HashMap<String, String>,  // SKILL-{role}.md content\n    pub metadata: Option<HandMetadata>,   // Frequency, token consumption, warnings\n    pub i18n: HashMap<String, HandI18n>, // Localized strings\n}\n```\n\n### HandInstance\n\nA running activation of a hand:\n\n```rust\npub struct HandInstance {\n    pub instance_id: Uuid,\n    pub hand_id: String,\n    pub status: HandStatus,              // Active, Paused, Error, Inactive\n    pub agent_ids: BTreeMap<String, AgentId>,  // Spawned agents by role\n    pub coordinator_role: Option<String>, // Which role receives user messages\n    pub config: HashMap<String, serde_json::Value>,  // User settings\n    pub activated_at: DateTime<Utc>,\n    pub updated_at: DateTime<Utc>,\n}\n```\n\n### HandRegistry\n\nThe central manager for all hands:\n\n```rust\npub struct HandRegistry {\n    definitions: DashMap<String, HandDefinition>,  // hand_id → definition\n    instances: DashMap<Uuid, HandInstance>,        // instance_id → instance\n    agent_index: DashMap<String, Uuid>,            // agent_id → instance_id\n    active_index: DashMap<String, Uuid>,            // hand_id → active instance_id\n    activate_lock: Mutex<()>,                       // Serializes activate/deactivate\n    persist_lock: Mutex<()>,                        // Guards hand_state.json writes\n}\n```\n\n## HAND.toml Format\n\nHands are defined in TOML with two agent configuration formats:\n\n### Single-Agent Format\n\n```toml\nid = "clip"\nname = "Clip Hand"\ndescription = "Autonomous video clipping"\ncategory = "content"\nicon = "✂️"\ntools = ["shell_exec"]\n\n[[requires]]\nkey = "ffmpeg"\nlabel = "FFmpeg must be installed"\nrequirement_type = "binary"\ncheck_value = "ffmpeg"\n\n[agent]\nname = "clip-agent"\ndescription = "Clips videos"\nsystem_prompt = "You clip videos..."\n\n[dashboard]\nmetrics = []\n```\n\n### Multi-Agent Format\n\n```toml\nid = "research"\nname = "Research Hand"\ndescription = "Multi-agent research pipeline"\ncategory = "content"\n\n[agents.planner]\ncoordinator = true\ninvoke_hint = "Use planner for task decomposition"\nname = "planner-agent"\nsystem_prompt = "You plan research tasks..."\n\n[agents.analyst]\nname = "analyst-agent"\ndescription = "Analyzes data"\nprovider = "groq"\nmodel = "llama-3.3-70b-versatile"\nsystem_prompt = "You analyze data..."\n```\n\nMulti-agent hands can use `base` template references to inherit from agent templates:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = "my-writer-template"  # Loads from agents registry\nsystem_prompt = "You are a blog post writer."\n```\n\n## Agent Template Resolution\n\nHands can reuse agent configurations via the `base` field. When a hand agent specifies `base = "template-name"`, the registry:\n\n1. Loads `agents/template-name/agent.toml` from the agents registry directory\n2. Deep-merges the hand\'s inline fields on top\n\n```mermaid\ngraph LR\n    A[HandDefinition HAND.toml] --> B{has base?}\n    B -->|Yes| C[Load agents/{base}/agent.toml]\n    B -->|No| D[Use inline config]\n    C --> E[Deep merge: hand fields win]\n    D --> E\n    E --> F[HandAgentManifest]\n    \n    G[Flat format] --> H[normalize_flat_to_nested]\n    H --> E\n```\n\nThe `normalize_flat_to_nested` function converts legacy flat-format agent TOML (where `provider`, `model`, `system_prompt` are top-level scalars) into the nested `[model]` sub-table format before merging. This ensures that hand overlays with nested `[model]` sections correctly override base template fields.\n\n## Settings and User Configuration\n\nHands declare configurable settings that users fill in when activating:\n\n```toml\n[[settings]]\nkey = "stt_provider"\nlabel = "STT Provider"\ndescription = "Speech-to-text engine"\nsetting_type = "select"\ndefault = "auto"\n\n[[settings.options]]\nvalue = "auto"\nlabel = "Auto-detect"\n\n[[settings.options]]\nvalue = "groq"\nlabel = "Groq Whisper"\nprovider_env = "GROQ_API_KEY"\n\n[[settings.options]]\nvalue = "local"\nlabel = "Local Whisper"\nbinary = "whisper"\n```\n\nThe `resolve_settings()` function converts user selections into:\n\n- A **prompt block** appended to the system prompt (e.g., "STT: Groq Whisper (groq)")\n- A list of **environment variables** the agent subprocess needs (e.g., `GROQ_API_KEY`)\n\n```rust\npub fn resolve_settings(\n    settings: &[HandSetting],\n    config: &HashMap<String, serde_json::Value>,\n) -> ResolvedSettings {\n    // Returns: prompt_block + env_vars\n}\n```\n\n### Setting Types\n\n| Type | Description | Config Value |\n|------|-------------|--------------|\n| `select` | Choose from options | `"value"` string |\n| `text` | Free-form text input | `"value"` string |\n| `toggle` | Boolean on/off | `"true"` or `"false"` |\n\n## Requirements System\n\nRequirements gate activation — the hand cannot activate until all non-optional requirements are met.\n\n```toml\n[[requires]]\nkey = "ffmpeg"\nlabel = "FFmpeg must be installed"\nrequirement_type = "binary"\ncheck_value = "ffmpeg"\ndescription = "FFmpeg is the core video processing engine."\noptional = false\n\n[requires.install]\nmacos = "brew install ffmpeg"\nwindows = "winget install Gyan.FFmpeg"\nlinux_apt = "sudo apt install ffmpeg"\nmanual_url = "https://ffmpeg.org/download.html"\nestimated_time = "2-5 min"\n```\n\n### Requirement Types\n\n| Type | Check | Example |\n|------|-------|---------|\n| `binary` | Binary exists on PATH | `"ffmpeg"`, `"chromium"` |\n| `env_var` | Environment variable is set | `"HOME"` |\n| `api_key` | API key env var is set | `"OPENAI_API_KEY"` |\n| `any_env_var` | Any of comma-separated vars set | `"GROQ_API_KEY,OPENAI_API_KEY"` |\n\n### Python3 Detection\n\nThe `python3` binary check has special handling to avoid false positives from:\n\n- **Windows Store shims** — `python3.exe` that opens the Store instead of running\n- **Python 2 installations** — where `python` exists but is Python 2\n\nIt runs `python3 --version` (or `python --version` as fallback) and verifies the output contains "Python 3". The result is cached for the process lifetime via `OnceLock`.\n\n## Hand Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Inactive: HandDefinition loaded\n    Inactive --> Active: activate()\n    Active --> Paused: pause()\n    Active --> Inactive: deactivate()\n    Paused --> Active: resume()\n    Paused --> Error: set_error()\n    Error --> Active: resume()\n    Error --> Inactive: deactivate()\n```\n\n### Activation\n\n```rust\nimpl HandRegistry {\n    pub fn activate(\n        &self,\n        hand_id: &str,\n        config: HashMap<String, serde_json::Value>,\n    ) -> HandResult<HandInstance>\n}\n```\n\n- Checks requirements are met\n- Serializes via `activate_lock` to prevent race conditions\n- Creates a `HandInstance` with status `Active`\n- Returns the instance; **agent spawning is done by the kernel**\n\n### Multi-Instance Support\n\nThe registry supports multiple instances of the same hand. Pass `instance_id: Some(uuid)` to `activate_with_id()` when restoring from persisted state:\n\n```rust\npub fn activate_with_id(\n    &self,\n    hand_id: &str,\n    config: HashMap<String, serde_json::Value>,\n    instance_id: Option<Uuid>,\n    timestamps: Option<(DateTime<Utc>, DateTime<Utc>)>,\n) -> HandResult<HandInstance>\n```\n\n## Persistence and Recovery\n\nThe registry persists active instances to `hand_state.json` so they survive daemon restarts:\n\n```rust\nimpl HandRegistry {\n    pub fn persist_state(&self, path: &Path) -> HandResult<()>\n    pub fn load_state(path: &Path) -> Vec<HandStateEntry>\n}\n```\n\nPersisted fields:\n\n- `hand_id`, `instance_id`, `config`, `agent_ids`, `coordinator_role`\n- `status` (Active and Paused are persisted; Error is also persisted so users see what went wrong)\n- `activated_at`, `updated_at`\n\n### Legacy Format Support\n\nThe loader handles three format versions:\n\n- **v4**: `PersistedState { version: 4, instances: [...] }`\n- **v2/v3**: `{ "version": 2, "instances": [...] }`\n- **v1**: Bare array `[...]`\n\nSingle-agent v1/v2 format (`agent_id: "uuid"`) is converted to multi-agent format (`{"main": uuid}`).\n\n## Internationalization\n\nHands can provide localized strings for display names, descriptions, and settings:\n\n```toml\n[i18n.zh]\nname = "线索生成"\ndescription = "自主线索生成"\n\n[i18n.zh.agents.main]\nname = "主协调器"\ndescription = "协调各个子智能体完成任务"\n\n[i18n.zh.settings.target_industry]\nlabel = "目标行业"\ndescription = "聚焦的行业领域"\n```\n\nAll fields are optional — the English defaults from `[[settings]]` and `[agent]` are used when translations are absent.\n\n## Registry Operations\n\n### Loading Hands from Disk\n\n```rust\npub fn reload_from_disk(&self, home_dir: &Path) -> (usize, usize)\n```\n\nScans two locations, with registry entries taking precedence on ID collisions:\n\n1. `registry/hands/{id}/` — Read-only registry (synced from librefang-registry tarball)\n2. `workspaces/{id}/` — User-installed hands (survives daemon restarts)\n\n### Installing Hands\n\n| Method | Use Case | Base Template Resolution |\n|--------|----------|-------------------------|\n| `install_from_path` | Install from filesystem directory | ✅ Yes (via `agents_dir`) |\n| `install_from_content` | API-based install | ❌ No (rejected if base is used) |\n| `install_from_content_persisted` | Dashboard "install from content" | ✅ Yes (resolves `agents_dir`) |\n\n### Uninstalling Hands\n\n```rust\npub fn uninstall_hand(&self, home_dir: &Path, hand_id: &str) -> HandResult<()>\n```\n\nRules:\n\n1. **NotFound** — Hand ID doesn\'t exist in memory\n2. **BuiltinHand** — Hand lives in `registry/hands/` (would be recreated on next sync)\n3. **AlreadyActive** — A live instance exists (must deactivate first)\n4. **Success** — Removes from memory, deletes `workspaces/{id}/`\n\n## Requirement and Settings Availability\n\n### Checking Requirements\n\n```rust\npub fn check_requirements(&self, hand_id: &str) -> HandResult<Vec<(HandRequirement, bool)>>\n```\n\nReturns each requirement paired with whether it\'s currently satisfied.\n\n### Checking Settings Availability\n\n```rust\npub fn check_settings_availability(\n    &self,\n    hand_id: &str,\n    lang: Option<&str>,\n) -> HandResult<Vec<SettingStatus>>\n```\n\nFor each setting option, determines availability based on:\n\n- **`provider_env`**: Checks if the env var (or aliases like `GEMINI_API_KEY` → `GOOGLE_API_KEY`) is set\n- **`binary`**: Checks if the binary exists on PATH and is executable\n\n### Readiness\n\n```rust\npub fn readiness(&self, hand_id: &str) -> Option<HandReadiness>\n```\n\nReturns a combined view:\n\n```rust\npub struct HandReadiness {\n    pub requirements_met: bool,  // All non-optional requirements satisfied\n    pub active: bool,             // Has an Active-status instance\n    pub degraded: bool,           // Active but some requirement unmet\n}\n```\n\n## Integration Points\n\n### With the Kernel\n\nThe kernel is responsible for:\n\n- **Spawning agents** after `activate()` returns the instance\n- **Killing agents** after `deactivate()`\n- **Updating instance agent IDs** via `set_agents()`\n\n```rust\n// Kernel spawns agents, then:\nregistry.set_agents(instance_id, agent_ids, coordinator_role);\n\n// Kernel encounters error, then:\nregistry.set_error(instance_id, error_message);\n```\n\n### With the Router\n\nThe router uses hand routing keywords for deterministic hand selection:\n\n```rust\npub struct HandRouting {\n    pub aliases: Vec<String>,      // Strong signals (score ×3)\n    pub weak_aliases: Vec<String>, // Weak signals (score ×1)\n}\n```\n\n### With the TUI\n\nThe TUI uses `list_definitions()` and `list_instances()` to display the hand dashboard.\n\n### With the API\n\nThe HTTP API routes use the registry for all hand operations:\n\n- `GET /api/hands` → `list_definitions()`\n- `POST /api/hands/:id/activate` → `activate()`\n- `POST /api/hands/:id/deactivate` → `deactivate()`\n- `GET /api/hands/:id/requirements` → `check_requirements()`\n- `GET /api/hands/:id/settings` → `check_settings_availability()`\n\n## Key Design Decisions\n\n1. **Single-instance by default** — Only one active instance per hand unless `instance_id` is explicitly passed to `activate_with_id()`. This simplifies the common case.\n\n2. **DashMap for concurrent access** — All registry maps use `DashMap` for lock-free concurrent reads. The `activate_lock` mutex only serializes the check-then-insert window for activation.\n\n3. **Reverse indexes** — `agent_index` enables O(1) `find_by_agent()`, and `active_index` enables O(1) "is this hand active?" checks.\n\n4. **Skill content loading** — `SKILL.md` is loaded into `skill_content`; `SKILL-{role}.md` files populate `agent_skill_content` with per-role overrides.\n\n5. **TOML flexibility** — Both flat and wrapped (`[hand]`) formats are supported, with automatic format detection and legacy field conversion.',
                "api-server-api-docs":
                    '# API Server — api-docs\n\n# LibreFang API Documentation (`api-docs`)\n\n## Overview\n\nThe `api-docs` module serves as the interactive API documentation portal for LibreFang. It provides a self-contained documentation site powered by Swagger UI that loads the OpenAPI 3.1.0 specification and renders it as a browsable, interactive reference for all REST API endpoints.\n\n```mermaid\ngraph LR\n    A[Developer] -->|Loads| B[Swagger UI]\n    B -->|Fetches| C[openapi.json]\n    C -->|Defines| D[All API Endpoints]\n    D --> E[Interactive Docs]\n    E -->|Try it out| F[LibreFang API Server]\n```\n\n## Purpose\n\nThis module solves two problems:\n\n1. **Documentation as Code** — The `openapi.json` file is the single source of truth for the API surface. It documents every endpoint, parameter, request body, and response without duplicating information in external docs.\n\n2. **Interactive Exploration** — Developers can open `index.html` in a browser, browse endpoints by tag, expand request/response schemas, and send live requests (when pointed at a running API server).\n\n## Components\n\n### `index.html` — Swagger UI Host\n\nThis file bootstraps the Swagger UI 5.x interface:\n\n```html\nSwaggerUIBundle({\n    url: "openapi.json",\n    dom_id: \'#swagger-ui\',\n    deepLinking: true,\n    presets: [\n        SwaggerUIBundle.presets.apis,\n        SwaggerUIBundle.SwaggerUIStandalonePreset\n    ],\n    layout: "BaseLayout"\n})\n```\n\nKey configuration choices:\n\n| Option | Value | Purpose |\n|--------|-------|---------|\n| `url` | `"openapi.json"` | Loads the local OpenAPI spec file |\n| `deepLinking` | `true` | Enables URL-based navigation to specific endpoints |\n| `presets.apis` | default | Core API documentation preset |\n| `SwaggerUIStandalonePreset` | default | Full UI with sidebar, topbar, and operations pane |\n| `layout` | `"BaseLayout"` | Standard three-panel layout |\n\nThe Swagger UI assets are loaded from the unpkg CDN (`unpkg.com/swagger-ui-dist@5`), making this module fully static — no build step or server-side rendering required.\n\n### `openapi.json` — API Specification\n\nThe specification file defines the complete LibreFang REST API using OpenAPI 3.1.0. It is organized into the following tags, each grouping related endpoints:\n\n| Tag | Description |\n|-----|-------------|\n| `a2a` | Agent-to-Agent (A2A) protocol — discovery, task submission, status |\n| `agents` | Agent lifecycle — spawn, kill, message, clone, file management |\n| `sessions` | Conversation session management |\n| `memory` | Agent KV memory export/import |\n| `approvals` | Approval workflow for restricted actions |\n| `auth` | OAuth2/OIDC authentication endpoints |\n| `budget` | Global and per-agent cost tracking |\n| `models` | Model catalog synchronization |\n| `channels` | Messaging channels (WhatsApp, Discord, Slack, Telegram, etc.) |\n| `skills` | ClawHub marketplace and skill installation |\n| `workflows` | Cron job scheduling and management |\n| `extensions` | Extension lifecycle management |\n| `hands` | Browser automation hands (playwright-based agents) |\n| `webhooks` | External triggers for agent hooks and system events |\n| `integrations` | Integration templates and MCP connections |\n| `mcp` | MCP server configuration and tooling |\n| `proactive-memory` | Shared proactive memory system |\n| `network` | Inter-agent communication and topology |\n| `system` | Health checks, audit logs, config management, backups |\n\n#### Notable Endpoint Patterns\n\n**Agent Management**\n- `GET /api/agents` — List with filtering (`q`, `status`), pagination (`limit`, `offset`), and sorting (`sort`, `order`)\n- `POST /api/agents` — Spawn new agent from manifest\n- `PATCH /api/agents/{id}` — Partial update of name, description, system prompt\n- `POST /api/agents/{id}/message` — Send message to agent\n- `POST /api/agents/{id}/message/stream` — SSE streaming response\n\n**File Workspace**\n- `GET /api/agents/{id}/files/{filename}` — Read workspace identity file\n- `PUT /api/agents/{id}/files/{filename}` — Write workspace identity file\n- `POST /api/agents/{id}/upload` — Upload raw file attachments with `Content-Type` and `X-Filename` headers\n\n**Session Management**\n- `GET /api/agents/{id}/session` — Get current session (conversation history)\n- `POST /api/agents/{id}/session/reset` — Reset session with summary\n- `POST /api/agents/{id}/session/reboot` — Hard reset (no summary)\n- `POST /api/agents/{id}/session/compact` — Trigger LLM-based compaction\n\n**A2A Protocol**\n- `GET /.well-known/agent.json` — Agent card for A2A discovery\n- `POST /a2a/tasks/send` — Submit task to local A2A agent\n- `POST /api/a2a/send` — Send task to external remote A2A agent\n\n**Budget Tracking**\n- `GET /api/budget` — Global budget status with spend percentage\n- `GET /api/budget/agents/{id}` — Per-agent quota status\n- `PUT /api/budget/agents/{id}` — Runtime budget limit updates\n\n**System Operations**\n- `GET /api/health` — Public liveness probe (no auth, minimal info)\n- `GET /api/health/detail` — Full diagnostics (requires auth)\n- `POST /api/backup` — Create timestamped backup archive\n- `GET /api/logs/stream` — SSE log stream with filtering\n\n## How It Works\n\nThe module is entirely static and requires no runtime dependencies:\n\n1. **Load `index.html`** — Browser fetches Swagger UI bundle from unpkg CDN\n2. **Swagger UI initializes** — Reads `openapi.json` from the same directory\n3. **Spec is parsed** — Swagger UI extracts tags, paths, schemas, and parameters\n4. **UI renders** — Endpoints appear grouped by tag in the sidebar; each endpoint can be expanded to show documentation\n5. **Try it out** — If the API server is running (CORS permitting), developers can send live requests directly from the browser\n\n## Relationship to the API Server\n\nThe `openapi.json` specification is consumed by:\n\n- **This module (Swagger UI)** — Renders interactive documentation\n- **OpenAPI client generators** — Tools like `openapi-generator` can produce typed client libraries from the spec\n- **API validation tooling** — Servers can validate incoming requests against the spec\n\nThe API server itself implements all endpoints defined in `openapi.json`. When the server starts, it should serve this `api-docs/` directory as static files, typically at a path like `/docs` or `/api-docs`, so the interactive docs are available alongside the API.\n\n## Usage\n\nTo view the documentation:\n\n```bash\n# Serve the api-docs directory statically\n# (or open index.html directly in a browser)\n\n# Example with Python\'s built-in server\ncd api-docs\npython -m http.server 8080\n\n# Then open http://localhost:8080\n```\n\nTo update the API documentation when endpoints change, edit `openapi.json` directly — Swagger UI will pick up the changes on the next page load.',
                "api-server-librefang-api":
                    '# API Server — librefang-api\n\n# librefang-api — HTTP/WebSocket API Server\n\nThe `librefang-api` crate provides the HTTP and WebSocket API layer for the LibreFang Agent OS daemon. It exposes agent management, status queries, chat interaction, OAuth authentication, and OpenAI-compatible endpoints as JSON REST APIs.\n\n## Overview\n\nLibreFang runs as a long-lived daemon with an in-process kernel. The API server provides the primary interface for all clients:\n\n- **CLI clients** — authenticate via bearer token or API key\n- **Dashboard SPA** — browser-based UI served by the same process\n- **External integrations** — OpenAI-compatible clients, webhook consumers\n- **Terminal sessions** — WebSocket-based interactive sessions\n\nThe server is built on [Axum](https://github.com/tokio-rs/axum), Tokio\'s most mature web framework, and integrates with the kernel\'s actor model for agent messaging.\n\n## Architecture\n\n```mermaid\ngraph TB\n    subgraph "librefang-api"\n        WS[WebSocket Handler]\n        REST[REST Routes]\n        MW[Middleware Stack]\n        AUTH[Auth Middleware]\n        OAUTH[OAuth/OIDC Module]\n        OPENAI[OpenAI Compat]\n        WS_PROTO[Stream Dedup<br/>Stream Chunker]\n    end\n\n    subgraph "librefang-kernel"\n        KR[Kernel]\n        REG[Agent Registry]\n        CH[Channel Bridge]\n    end\n\n    subgraph "librefang-extensions"\n        VAULT[Vault]\n    end\n\n    subgraph "librefang-runtime"\n        HTTP[HTTP Client]\n        TELEMETRY[Telemetry]\n    end\n\n    WS --> WS_PROTO\n    REST --> MW\n    MW --> AUTH\n    AUTH --> OAUTH\n    AUTH --> VAULT\n    WS --> KR\n    REST --> KR\n    OPENAI --> KR\n    OPENAI --> REG\n    OAUTH --> HTTP\n    WS_PROTO --> KR\n    CH --> KR\n```\n\n## Middleware Stack\n\nThe middleware module (`middleware.rs`) handles cross-cutting concerns applied to every request.\n\n### Authentication (`auth`)\n\nThe `auth` middleware validates requests against multiple credential sources:\n\n```rust\npub struct AuthState {\n    pub api_key_lock: Arc<tokio::sync::RwLock<String>>,\n    pub active_sessions: Arc<tokio::sync::RwLock<HashMap<String, SessionToken>>>,\n    pub dashboard_auth_enabled: bool,\n    pub user_api_keys: Arc<Vec<ApiUserAuth>>,\n}\n```\n\n**Credential sources** (checked in order):\n1. **Static API key** — configured in `config.toml`, supports multiple keys separated by newlines\n2. **Bearer token** — `Authorization: Bearer <token>` header\n3. **Query parameter** — `?token=` for SSE clients that cannot set custom headers\n4. **Active sessions** — randomly generated tokens from dashboard login\n5. **Per-user API keys** — hashed credentials with role-based access\n\n**Public endpoints** bypass authentication entirely. These include dashboard assets, health checks, model/provider listings, and OAuth entry points (login, callback):\n\n```rust\nlet is_public = path == "/"\n    || path == "/api/health"\n    || (path.starts_with("/dashboard/") && is_get)\n    || (path == "/api/agents" && is_get)  // GET only\n    || path == "/api/auth/callback"       // OAuth entry point\n    // ... more paths\n```\n\n### Role-Based Access Control\n\nPer-user API keys support three roles defined in `librefang_kernel::auth::UserRole`:\n\n| Role | Access |\n|------|--------|\n| `Viewer` | GET requests only |\n| `User` | GET + limited POST (agent messages, clone, approvals) |\n| `Admin` | Full access |\n\n```rust\nfn user_role_allows_request(role: UserRole, method: &Method, path: &str) -> bool {\n    if role >= UserRole::Admin || *method == Method::GET {\n        return true;\n    }\n    if role < UserRole::User {\n        return false;\n    }\n    // User role: only specific POST endpoints\n    if *method == Method::POST {\n        return path.starts_with("/api/agents/")\n            && (path.ends_with("/message") || path.ends_with("/message/stream"))\n            || /* clone, approvals */;\n    }\n    false\n}\n```\n\n### Security Headers\n\nApplied to all responses:\n\n```http\nX-Content-Type-Options: nosniff\nX-Frame-Options: DENY\nContent-Security-Policy: default-src \'self\'; script-src \'self\' \'unsafe-inline\'; ...\nStrict-Transport-Security: max-age=63072000; includeSubDomains\nReferrer-Policy: strict-origin-when-cross-origin\nCache-Control: no-store, no-cache, must-revalidate\n```\n\n### Request Logging\n\nRoutine `GET 2xx` requests log at `DEBUG` level to reduce noise. All other requests log at `INFO` with request ID, method, path, status, and latency in milliseconds.\n\n### API Versioning\n\nResponses include `X-API-Version` headers. The server supports both versioned paths (`/api/v1/agents`) and an unversioned alias (`/api/agents`) that routes to the latest version. Content-type negotiation via `Accept: application/vnd.librefang.v1+json` is also supported.\n\n## OAuth2/OIDC Authentication\n\nThe `oauth.rs` module enables external identity provider integration for single sign-on.\n\n### Provider Resolution\n\nProviders are resolved either from explicit configuration or via OIDC discovery:\n\n```rust\npub(crate) async fn resolve_providers(\n    config: &ExternalAuthConfig,\n) -> Vec<ResolvedProvider> {\n    // 1. Multi-provider mode: each provider in config.providers\n    for provider in &config.providers {\n        if !provider.auth_url.is_empty() {\n            // Use explicit URLs (e.g., GitHub OAuth2)\n        } else {\n            // OIDC discovery via issuer_url\n        }\n    }\n    // 2. Legacy fallback for single-provider config\n}\n```\n\n### Supported Providers\n\n| Provider | Discovery | Auth Method |\n|----------|-----------|-------------|\n| Generic OIDC | `.well-known/openid-configuration` | Authorization Code + PKCE |\n| Google Workspace | OIDC | Authorization Code |\n| GitHub | Explicit URLs | OAuth2 |\n| Azure AD | OIDC | Authorization Code |\n| Keycloak | OIDC | Authorization Code |\n\n### OAuth Flow\n\n```\n┌─────────┐                    ┌──────────────┐                    ┌─────────────┐\n│  User   │──GET /auth/login──▶│   LibreFang  │──302 Redirect─────▶│  IdP        │\n│ Browser │                    │   API Server │                    │             │\n└─────────┘                    └──────────────┘                    └─────────────┘\n     │                               ▲                                   │\n     │                               │                                   │\n     │◀───302 /auth/callback─────────┼───────────────────────────────────┘\n     │     ?code=xxx&state=yyy       │     code + state (GET) or POST body\n     │                               │\n     │                               ▼\n     │                    ┌──────────────────┐\n     │                    │ Validate state   │\n     │                    │ Exchange code    │\n     │                    │ Store tokens     │\n     │                    │ Return JWT      │\n     │                    └──────────────────┘\n```\n\n### State Token (CSRF Protection)\n\nState tokens are HMAC-signed to prevent CSRF:\n\n```rust\nstruct OAuthStatePayload {\n    provider: String,\n    nonce: String,\n    ts: u64,  // Timestamp for expiry\n}\n\nfn build_state_token(provider_id: &str) -> String {\n    // payload = base64url(JSON) . base64url(HMAC-SHA256)\n}\n\nfn verify_state_token(state: &str) -> Result<OAuthStatePayload, String> {\n    // 1. Split on "."\n    // 2. Verify HMAC signature\n    // 3. Decode and parse JSON\n    // 4. Check expiry (10 minute TTL)\n}\n```\n\n### JWKS Caching\n\nJWT validation uses cached JWKS keysets:\n\n```rust\nstatic JWKS_CACHE: LazyLock<JwksCache> = LazyLock::new(JwksCache::default);\nconst JWKS_CACHE_TTL: Duration = Duration::from_secs(3600);\n```\n\nKeys are cached per JWKS URI for one hour, then refreshed on the next validation attempt.\n\n### Token Refresh\n\nWhen access tokens expire, clients exchange refresh tokens for new credentials:\n\n```\nPOST /api/auth/refresh\n{\n    "refresh_token": "...",\n    "provider": "google"  // optional if single provider\n}\n```\n\nThe server maintains an in-memory token store (`TokenStore`) keyed by user subject (`sub`) for automatic refresh without requiring the client to store the refresh token.\n\n## OpenAI-Compatible API\n\nThe `openai_compat.rs` module provides a `/v1/chat/completions` endpoint compatible with OpenAI client libraries.\n\n### Model Resolution\n\nThe `model` field in requests resolves to an agent:\n\n```rust\nfn resolve_agent(state: &AppState, model: &str) -> Option<(AgentId, String)> {\n    // 1. "librefang:<name>" → find by name\n    if let Some(name) = model.strip_prefix("librefang:") {\n        return state.kernel.agent_registry().find_by_name(name);\n    }\n    // 2. Valid UUID → find by ID\n    if let Ok(id) = model.parse::<AgentId>() {\n        return state.kernel.agent_registry().get(id);\n    }\n    // 3. Plain string → try as agent name\n    state.kernel.agent_registry().find_by_name(model)\n}\n```\n\n### Message Conversion\n\nOpenAI message format converts to internal `Message` format:\n\n```rust\nfn convert_messages(oai_messages: &[OaiMessage]) -> Vec<Message> {\n    // role: "user" → User, "assistant" → Assistant, "system" → System\n    // content: text → MessageContent::Text\n    //          parts → MessageContent::Blocks (with ContentBlock::Text/Image)\n}\n```\n\n### Streaming Response\n\nStreaming responses use Server-Sent Events:\n\n```rust\nasync fn stream_response(...) -> Result<Sse<...>, String> {\n    let (mut rx, _handle) = kernel.send_message_streaming_with_routing(...).await?;\n    \n    // Stream events:\n    // - role delta (initial)\n    // - text delta\n    // - tool_use_start → tool_call chunk\n    // - tool_input_delta → arguments chunk\n    // - content_complete → finish_reason="stop"\n}\n```\n\nEach chunk follows the OpenAI SSE format:\n\n```json\n{"id":"chatcmpl-xxx","object":"chat.completion.chunk","created":123,"model":"agent","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}\n```\n\n## WebSocket Sessions\n\nWebSocket connections enable real-time interactive sessions. The `ws.rs` module handles:\n\n- **Agent messaging** — streaming message exchange\n- **Terminal sessions** — PTY-based shell access\n- **Event streaming** — SSE logs and status updates\n\n### Authentication\n\nWebSocket connections authenticate via query parameter (headers unavailable in native WS):\n\n```\nws://localhost:18789/ws?token=<api_key>\n```\n\n### Stream Deduplication\n\nIn multi-replica scenarios, the `stream_dedup.rs` module prevents duplicate events from reaching clients using a sliding window approach:\n\n```rust\npub struct StreamDedup {\n    window: VecDeque<SentEvent>,\n    seen: HashSet<String>,\n}\n\nimpl StreamDedup {\n    pub fn record_sent(&mut self, event_id: &str);\n    pub fn is_duplicate(&mut self, event_id: &str) -> bool;\n}\n```\n\n## Rate Limiting\n\nThe `rate_limiter.rs` module implements rate limiting using the Generalized Cell Rate Algorithm (GCRA):\n\n```rust\npub fn gcra_rate_limit(\n    event_name: &str,\n    calls_per_window: u32,\n    window_secs: u32,\n) -> Result<(), RateLimitError>\n```\n\n## Integration Points\n\n### With Kernel\n\nThe API server holds a reference to the kernel and routes requests:\n\n```\n┌────────────────┐    ┌─────────────────────────────────────┐\n│ API Routes     │───▶│ librefang_kernel::Kernel            │\n│                │    │                                     │\n│ GET /api/agents│───▶│ agent_registry().list()            │\n│ POST /message  │───▶│ send_message_with_handle()          │\n│ /ws            │───▶│ send_message_streaming_with_routing│\n└────────────────┘    └─────────────────────────────────────┘\n```\n\n### With Vault\n\nDashboard credentials and machine fingerprints are stored in the vault:\n\n```rust\n// Authentication flow\nresolve_dashboard_credential() \n    → vault.unlock() \n    → vault.load() \n    → vault.resolve_master_key()\n```\n\n### With Webhook Store\n\nWebhooks are stored encrypted and decoded on demand:\n\n```rust\n// Tool execution\ntool_image_analyze()\n    → webhook_store.encode()\n    → send webhook\n```\n\n## Configuration\n\nAPI server behavior is controlled via `config.toml`:\n\n```toml\n[api]\nhost = "127.0.0.1"      # Bind address\nport = 18789            # Default port\napi_key = ""            # Static API key (empty = auth disabled)\nmax_request_size = 10485760  # 10MB\n\n[api.external_auth]\nenabled = false\nissuer_url = "https://accounts.google.com"\nclient_id = "..."\nclient_secret_env = "LIBREFANG_OAUTH_CLIENT_SECRET"\n\n[api.external_auth.providers]\n# Multiple providers supported\n[[api.external_auth.providers]]\nid = "github"\ndisplay_name = "GitHub"\nauth_url = "https://github.com/login/oauth/authorize"\ntoken_url = "https://github.com/login/oauth/access_token"\nclient_id = "..."\nclient_secret_env = "GH_SECRET"\nscopes = ["read:user"]\n```\n\n## Testing\n\nThe middleware includes comprehensive integration tests:\n\n```bash\n# Run middleware tests\ncargo test -p librefang-api middleware::tests\n\n# Run OAuth tests\ncargo test -p librefang-api oauth::tests\n\n# Run OpenAI compat tests\ncargo test -p librefang-api openai_compat::tests\n```\n\nKey test scenarios covered:\n- Role-based access control enforcement\n- Path normalization preventing ACL bypass via trailing slashes\n- CSRF protection via state token validation\n- JWKS caching behavior\n- OIDC discovery with fallback',
                "api-server-openapi-json":
                    '# API Server — openapi.json\n\n# LibreFang API Specification\n\n## Overview\n\nThe LibreFang API is a RESTful interface for the LibreFang Agent Operating System. It provides comprehensive endpoints for managing AI agents, their lifecycles, communication, memory, workflows, integrations, and system operations. The API follows the OpenAPI 3.1.0 specification.\n\n**API Version**: 2026.4.10-beta17  \n**Specification Version**: OpenAPI 3.1.0  \n**License**: Apache-2.0\n\n## API Organization\n\nThe API is organized into functional areas using tags. Understanding these groupings helps navigate the 130+ available endpoints.\n\n```mermaid\ngraph TB\n    subgraph "Core Agent Operations"\n        A[agents] --> A1[Lifecycle]\n        A --> A2[Sessions]\n        A --> A3[Memory]\n        A --> A4[Tools/Skills]\n        A --> A5[Messaging]\n    end\n    \n    subgraph "Agent Communication"\n        B[a2a] --> B1[Local A2A]\n        B --> B2[External A2A]\n        C[comms] --> C1[Inter-Agent]\n    end\n    \n    subgraph "External Integration"\n        D[channels] --> D1[40 Adapters]\n        E[mcp] --> E1[MCP Servers]\n        F[integrations] --> F1[External Services]\n        G[extensions] --> G1[Plugins]\n    end\n    \n    subgraph "Automation"\n        H[hands] --> H1[Browser Control]\n        I[workflows] --> I1[Cron Jobs]\n    end\n    \n    subgraph "System"\n        J[system] --> J1[Config/Health]\n        K[auth] --> K1[OAuth/JWT]\n        L[budget] --> L1[Cost Control]\n    end\n```\n\n## Authentication\n\n### OAuth2 Login Flow\n\nThe API supports multi-provider OAuth2 authentication.\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/auth/login` | GET | Redirect to default OAuth provider |\n| `/api/auth/login/{provider}` | GET | Redirect to specific OAuth provider |\n| `/api/auth/callback` | GET/POST | Handle OAuth callback (browser or programmatic) |\n| `/api/auth/providers` | GET | List configured OAuth/OIDC providers |\n\n### Token Management\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/auth/introspect` | POST | Validate token, return claims (RFC 7662) |\n| `/api/auth/userinfo` | GET | Get current user info from JWT or provider |\n\nThe `auth_introspect` endpoint follows RFC 7662 conventions, returning `{"active": true/false, ...}` with decoded claims.\n\n### Health Endpoint\n\nThe `/api/health` endpoint is public and requires no authentication, returning only status and version to prevent information leakage. Use `/api/health/detail` for full diagnostics (requires auth).\n\n## Agent Management\n\nAgent management constitutes the largest portion of the API. Agents are the core abstraction in LibreFang.\n\n### Agent Lifecycle\n\n| Endpoint | Method | Operation |\n|----------|--------|-----------|\n| `/api/agents` | GET | List agents with filtering, pagination, sorting |\n| `/api/agents` | POST | Spawn a new agent |\n| `/api/agents/{id}` | GET | Get agent details |\n| `/api/agents/{id}` | PATCH | Partially update agent fields |\n| `/api/agents/{id}` | DELETE | Kill an agent |\n\n**List Filtering Parameters:**\n- `q` — Free-text search on name/description\n- `status` — Filter by lifecycle state\n- `limit`/`offset` — Pagination\n- `sort` — Sort by: name, created_at, last_active, state\n- `order` — asc (default) or desc\n\n### Bulk Operations\n\nFor managing multiple agents simultaneously:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/agents/bulk` | POST | Create multiple agents |\n| `/api/agents/bulk` | DELETE | Delete multiple agents |\n| `/api/agents/bulk/start` | POST | Set multiple agents to Full mode |\n| `/api/agents/bulk/stop` | POST | Stop multiple agents\' current runs |\n\n### Agent Configuration\n\nHot-update agent configuration without restarting:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/agents/{id}/config` | PATCH | Hot-update name, description, system prompt, identity, model |\n| `/api/agents/{id}/identity` | PATCH | Update visual identity fields |\n| `/api/agents/{id}/model` | PUT | Change the LLM model |\n\n### Cloning and Duplication\n\n```http\nPOST /api/agents/{id}/clone\n```\n\nClones an agent including its workspace files. Requires a new name in the request body.\n\n## Messaging\n\nSend messages to agents and receive responses with optional streaming support.\n\n### Single Message\n\n```http\nPOST /api/agents/{id}/message\n```\n\nAccepts a `MessageRequest` body and returns a `MessageResponse`. Returns 404 if the agent doesn\'t exist.\n\n### Streaming Response\n\n```http\nPOST /api/agents/{id}/message/stream\n```\n\nReturns Server-Sent Events (SSE) for streaming responses, useful for long-running agent operations.\n\n### File Uploads\n\n```http\nPOST /api/agents/{id}/upload\n```\n\nUploads raw file bytes with required headers:\n- `Content-Type` — MIME type (e.g., `image/png`, `application/pdf`)\n- `X-Filename` — Original filename\n\n## Session Management\n\nAgents maintain conversation history through sessions.\n\n### Session Operations\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/agents/{id}/session` | GET | Get current session history |\n| `/api/agents/{id}/sessions` | GET | List all sessions for an agent |\n| `/api/agents/{id}/sessions` | POST | Create a new session |\n| `/api/agents/{id}/sessions/{session_id}/switch` | POST | Switch to a different session |\n| `/api/agents/{id}/sessions/by-label/{label}` | GET | Find session by label (scoped to agent) |\n\n### Session Reset and Compaction\n\nThree levels of session management:\n\n| Endpoint | Method | Behavior |\n|----------|--------|----------|\n| `/api/agents/{id}/session/reset` | POST | Reset session with summary |\n| `/api/agents/{id}/session/reboot` | POST | Hard-reboot (full clear, no summary) |\n| `/api/agents/{id}/session/compact` | POST | Trigger LLM session compaction |\n\n### Session Import/Export\n\nFor session migration and hibernation:\n\n```http\nGET  /api/agents/{id}/sessions/{session_id}/export\nPOST /api/agents/{id}/sessions/import\n```\n\n## Memory Management\n\n### Agent KV Memory\n\nKey-value memory operations for individual agents:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/agents/{id}/memory/export` | GET | Export all KV memory as JSON |\n| `/api/agents/{id}/memory/import` | POST | Import KV memory from JSON |\n\nImport accepts `{"kv": {...}, "clear_existing": true}` to wipe existing memory first.\n\n### Proactive Memory\n\nA separate memory system for proactive agent behavior:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/memory` | GET | List memories with category filter and pagination |\n| `/api/memory` | POST | Add memories via extraction pipeline |\n| `/api/memory/agents/{id}` | GET | List memories for specific agent |\n| `/api/memory/agents/{id}` | DELETE | Reset all memories for an agent |\n| `/api/memory/agents/{id}/consolidate` | POST | Merge duplicates, cleanup stale entries |\n\n**Pagination parameters**: `offset` (default 0), `limit` (default 10, max 100).\n\n## Agent Capabilities\n\n### Tool Allowlists and Blocklists\n\n```http\nGET /api/agents/{id}/tools\nPUT /api/agents/{id}/tools\n```\n\nControls which tools an agent can access. Accepts `allowlist` and/or `blocklist` arrays.\n\n### Skill Allowlists\n\n```http\nGET /api/agents/{id}/skills\nPUT /api/agents/{id}/skills\n```\n\nRestricts which skills an agent may invoke.\n\n### MCP Server Assignment\n\nModel Context Protocol server access control:\n\n```http\nGET /api/agents/{id}/mcp_servers\nPUT /api/agents/{id}/mcp_servers\n```\n\nAccepts an array of MCP server names.\n\n### Workspace Files\n\nIdentity files stored in agent workspaces:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/agents/{id}/files` | GET | List workspace identity files |\n| `/api/agents/{id}/files/{filename}` | GET | Read a file |\n| `/api/agents/{id}/files/{filename}` | PUT | Write a file |\n| `/api/agents/{id}/files/{filename}` | DELETE | Delete a file |\n\n### Agent Traces\n\n```http\nGET /api/agents/{id}/traces\n```\n\nReturns decision traces from the agent\'s most recent message, showing why each tool was selected. Useful for debugging and auditing.\n\n## Agent-to-Agent Communication (A2A)\n\nLibreFang implements the A2A protocol for inter-agent communication.\n\n### Local A2A Endpoints\n\nThese operate on the local task store:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/.well-known/agent.json` | GET | Get the A2A agent card |\n| `/a2a/agents` | GET | List all A2A agent cards |\n| `/a2a/tasks/send` | POST | Submit a task to an agent |\n| `/a2a/tasks/{id}` | GET | Get task status |\n| `/a2a/tasks/{id}/cancel` | POST | Cancel a tracked task |\n\n### External A2A Endpoints\n\nFor communicating with agents on remote systems:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/a2a/agents` | GET | List discovered external A2A agents |\n| `/api/a2a/agents/{id}` | GET | Get specific external agent (by index, URL, or name) |\n| `/api/a2a/discover` | POST | Discover new external agent by URL |\n| `/api/a2a/send` | POST | Send task to external A2A agent |\n| `/api/a2a/tasks/{id}/status` | GET | Get status from external agent (requires `url` query param) |\n\n## Inter-Agent Communication\n\nBeyond A2A, the API provides broader communication primitives:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/comms/send` | POST | Send message from one agent to another |\n| `/api/comms/task` | POST | Post task to agent task queue |\n| `/api/comms/topology` | GET | Build agent topology graph |\n| `/api/comms/events` | GET | Get recent inter-agent events |\n| `/api/comms/events/stream` | GET | SSE stream of inter-agent events |\n\nThe `/api/comms/events/stream` endpoint polls the audit log every 500ms for new events.\n\n## Messaging Channels\n\nLibreFang supports 40 channel adapters for connecting agents to external messaging platforms.\n\n### Channel Management\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/channels` | GET | List all channel adapters with status |\n| `/api/channels/reload` | POST | Hot-reload channels from disk config |\n| `/api/channels/{name}/configure` | POST | Save channel secrets and config |\n| `/api/channels/{name}/configure` | DELETE | Remove channel configuration |\n| `/api/channels/{name}/test` | POST | Connectivity check + optional live test |\n\nThe test endpoint accepts optional `channel_id` (Discord/Slack) or `chat_id` (Telegram) for live message testing.\n\n### WeChat Integration\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/channels/wechat/qr/start` | POST | Request QR code from iLink for WeChat login |\n| `/api/channels/wechat/qr/status` | GET | Poll iLink for QR scan confirmation |\n\n### WhatsApp Integration\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/channels/whatsapp/qr/start` | POST | Start WhatsApp Web QR login session |\n| `/api/channels/whatsapp/qr/status` | GET | Poll for QR scan completion |\n\nWhatsApp requires a running gateway (e.g., Baileys-based bridge). Returns setup instructions if no gateway is available.\n\n## Skill Marketplace\n\n### ClawHub\n\nBrowse and install skills from ClawHub:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/clawhub/browse` | GET | Browse skills by sort order |\n| `/api/clawhub/search` | GET | Vector/semantic search for skills |\n| `/api/clawhub/skill/{slug}` | GET | Get skill details |\n| `/api/clawhub/skill/{slug}/code` | GET | Fetch skill source (SKILL.md) |\n| `/api/clawhub/install` | POST | Install with security pipeline |\n\n**Browse parameters**: `sort` (trending, downloads, stars, updated, rating), `limit`, `cursor`.\n\n**Install Security Pipeline**: ClawHub installs run full verification:\n1. SHA256 verification\n2. Format detection\n3. Manifest security scan\n4. Prompt injection scan\n5. Binary dependency check\n\n### FangHub Marketplace\n\n```http\nGET /api/marketplace/search?q=query\n```\n\nSearches the FangHub marketplace.\n\n## Budget and Cost Control\n\n### Global Budget\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/budget` | GET | Get current budget status |\n| `/api/budget` | PUT | Update global limits (runtime only) |\n\n### Per-Agent Budget\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/budget/agents` | GET | Per-agent cost ranking (top spenders) |\n| `/api/budget/agents/{id}` | GET | Per-agent budget/quota status |\n| `/api/budget/agents/{id}` | PUT | Update per-agent limits at runtime |\n\nBudget updates via PUT are in-memory only and not persisted to config.toml.\n\n## Workflows and Scheduling\n\n### Cron Jobs\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/cron/jobs` | GET | List cron jobs (optional `agent_id` filter) |\n| `/api/cron/jobs` | POST | Create a new cron job |\n| `/api/cron/jobs/{id}` | PUT | Update cron job configuration |\n| `/api/cron/jobs/{id}` | DELETE | Delete a cron job |\n| `/api/cron/jobs/{id}/enable` | PUT | Enable or disable a job |\n| `/api/cron/jobs/{id}/status` | GET | Get specific job status |\n\n## Hands (Browser Automation)\n\n"Hands" are browser automation capabilities. Each hand has a definition (marketplace) and instances (running agents).\n\n### Hand Definitions\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/hands` | GET | List all hand definitions |\n| `/api/hands/{hand_id}` | GET | Get hand with requirements check |\n| `/api/hands/reload` | POST | Reload definitions from disk |\n\n### Hand Activation\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/hands/{hand_id}/activate` | POST | Activate hand (spawns agent) |\n| `/api/hands/{hand_id}/check-deps` | POST | Check dependency status |\n| `/api/hands/{hand_id}/install-deps` | POST | Auto-install missing dependencies |\n| `/api/hands/instances/{id}` | DELETE | Deactivate (kills agent) |\n\n### Hand Instances\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/hands/active` | GET | List active hand instances |\n| `/api/hands/instances/{id}/browser` | GET | Get live browser state |\n| `/api/hands/instances/{id}/pause` | POST | Pause instance |\n| `/api/hands/instances/{id}/resume` | POST | Resume paused instance |\n| `/api/hands/instances/{id}/stats` | GET | Dashboard stats |\n\n### Hand Settings\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/hands/{hand_id}/settings` | GET | Get schema and current values |\n| `/api/hands/{hand_id}/settings` | PUT | Update instance settings |\n\n## MCP Server Management\n\nModel Context Protocol servers extend agent capabilities.\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/mcp/servers` | GET | List MCP servers and their tools |\n| `/api/mcp/servers` | POST | Add new MCP server configuration |\n| `/api/mcp/servers/{name}` | GET | Get server + live connection status + tools |\n| `/api/mcp/servers/{name}` | PUT | Update server configuration |\n| `/api/mcp/servers/{name}` | DELETE | Remove server configuration |\n\nThe `add_mcp_server` and `update_mcp_server` endpoints expect JSON matching `McpServerConfigEntry` (name, transport, timeout_secs, env).\n\n## Extensions and Integrations\n\n### Extensions\n\nPlugin-style extensions:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/extensions` | GET | List installed extensions with status |\n| `/api/extensions/{name}` | GET | Get extension details |\n| `/api/extensions/install` | POST | Install by name |\n| `/api/extensions/uninstall` | POST | Uninstall by name |\n\n### Integrations\n\nExternal service integrations:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/integrations` | GET | List installed integrations |\n| `/api/integrations/available` | GET | List available templates |\n| `/api/integrations/add` | POST | Install integration |\n| `/api/integrations/{id}` | GET | Get integration details |\n| `/api/integrations/{id}` | DELETE | Remove integration |\n| `/api/integrations/{id}/reconnect` | POST | Reconnect MCP server |\n| `/api/integrations/reload` | POST | Hot-reload configs and reconnect MCP |\n| `/api/integrations/health` | GET | Health status for all |\n\n## System Operations\n\n### Configuration Management\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/config` | GET | Get config (secrets redacted) |\n| `/api/config/schema` | GET | Get config structure schema |\n| `/api/config/set` | POST | Set single config value and persist |\n| `/api/config/reload` | POST | Reload from disk, apply hot-reloadable changes |\n\nThe `config_set` endpoint accepts `{"path": "section.key", "value": "..."}` and persists to config.toml.\n\nThe `config_reload` endpoint diffs against current config, validates, and applies hot-reloadable actions (approval policy, cron limits, etc.).\n\n### Health and Diagnostics\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/health` | GET | Minimal liveness probe (public, no auth) |\n| `/api/health/detail` | GET | Full diagnostics (requires auth) |\n\n### Audit and Logging\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/audit/recent` | GET | Get recent audit log entries |\n| `/api/audit/verify` | GET | Verify audit chain integrity |\n| `/api/logs/stream` | GET | SSE stream of audit logs |\n\nThe logs stream endpoint filters by:\n- `level` — info, warn, error\n- `filter` — text substring in action/detail/agent_id\n- `token` — auth token for EventSource clients\n\nHeartbeat pings every 15 seconds; polls every second for new entries.\n\n### Backup Management\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/backup` | POST | Create backup archive of kernel state |\n| `/api/backups` | GET | List existing backups |\n| `/api/backups/{filename}` | DELETE | Delete specific backup |\n\nBackups are stored in `<home_dir>/backups/` with timestamped filenames.\n\n### Key Bindings\n\n```http\nGET  /api/bindings    # List all agent bindings\nPOST /api/bindings    # Add new binding\n```\n\n```http\nDELETE /api/bindings/{index}  # Remove binding by index\n```\n\n### Commands\n\nDynamic slash menu commands:\n\n```http\nGET /api/commands           # List available commands\nGET /api/commands/{name}    # Lookup single command\n```\n\n### Initialization\n\n```http\nPOST /api/init\n```\n\nQuick initialization that detects provider, writes config, and reloads. Skips if config.toml exists.\n\n## Webhooks\n\nExternal systems can trigger agent operations via webhooks:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/hooks/agent` | POST | Run isolated agent turn |\n| `/api/hooks/wake` | POST | Inject system event |\n\n**Agent Webhook**: Sends message directly to specified agent, enables CI/CD and Slack integration.\n\n**Wake Webhook**: Publishes custom event to kernel event system for triggering proactive agents.\n\n## Approvals\n\nFor workflows requiring human authorization:\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/approvals` | GET | List pending and recent approvals |\n| `/api/approvals` | POST | Create approval request |\n| `/api/approvals/{id}` | GET | Get single approval |\n| `/api/approvals/{id}/approve` | POST | Approve request |\n| `/api/approvals/{id}/reject` | POST | Reject request |\n\nThe list endpoint transforms field names for dashboard compatibility: `action_summary` → `action`, `agent_id` → `agent_name`, `requested_at` → `created_at`.\n\n## Agent Deliveries\n\n```http\nGET /api/agents/{id}/deliveries\n```\n\nLists recent delivery receipts for an agent.\n\n## Model Catalog\n\n```http\nGET /api/catalog/status   # Check last sync time\nPOST /api/catalog/update  # Sync from remote (GitHub)\n```\n\nThe update downloads latest TOML files and refreshes the kernel\'s in-memory catalog.\n\n## Error Responses\n\nStandard HTTP status codes:\n\n| Code | Meaning |\n|------|---------|\n| 200 | Success |\n| 201 | Created (memory operations) |\n| 302 | Redirect (OAuth flows) |\n| 400 | Bad request / Invalid manifest |\n| 401 | Not authenticated |\n| 404 | Resource not found |\n| 500 | Internal server error |',
                "api-server":
                    "# API Server\n\n# API Server\n\nThe API Server module group provides the HTTP and WebSocket interface for the LibreFang Agent OS daemon, including interactive documentation and a formal API specification.\n\n## Components\n\n| Module | Purpose |\n|--------|---------|\n| [librefang-api](librefang-api.md) | HTTP and WebSocket API server built on Axum |\n| [api-docs](api-docs.md) | Interactive Swagger UI documentation portal |\n| [openapi.json](openapi.json.md) | OpenAPI 3.1.0 specification with 130+ endpoints |\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                     API Server                          │\n├─────────────────────────────────────────────────────────┤\n│                                                         │\n│  ┌─────────────┐    serves    ┌─────────────────────┐  │\n│  │  api-docs   │──────────────│   Swagger UI        │  │\n│  └─────────────┘              └─────────────────────┘  │\n│         │                              ▲               │\n│         │ loads                        │ fetches        │\n│         ▼                              │               │\n│  ┌─────────────┐                       │               │\n│  │ openapi.json│───────────────────────────────────────┘\n│  └─────────────┘\n│         ▲\n│         │ defines\n│         │\n│  ┌─────────────┐    implements     ┌─────────────────┐\n│  │ librefang-api│─────────────────│  REST + WebSocket │\n│  └─────────────┘                   │   Endpoints      │\n│                                    └─────────────────┘\n└─────────────────────────────────────────────────────────┘\n```\n\nThe three modules form a layered stack:\n\n1. **[openapi.json](openapi.json.md)** — The canonical contract defining all endpoints, request/response schemas, and authentication requirements\n2. **[librefang-api](librefang-api.md)** — The runtime implementation that fulfills the contract, handling HTTP/WebSocket traffic and business logic\n3. **[api-docs](api-docs.md)** — The developer-facing interface that renders the specification as interactive documentation\n\n## Key Cross-Module Workflows\n\n### Authentication Flow (Terminal WebSocket)\n\nTerminal sessions demonstrate how the server coordinates authentication across multiple systems:\n\n```\nterminal_ws → validate_api_tokens → dashboard_session_token \n→ resolve_dashboard_credential → vault.unlock \n→ vault.resolve_master_key → vault.load_keyring_key\n```\n\nThis chain verifies API tokens, resolves session credentials, and unlocks secure storage for the terminal session.\n\n### Webhook Delivery\n\nWebhook registration and delivery flows through the server:\n\n```\ncreate_webhook → validate_url → persist_webhook \n→ trigger_event → deliver_to_webhook_endpoint\n```\n\nWebhooks are validated for security (rejecting private IPs), stored with configurable event filters, and dispatched asynchronously.\n\n## API Surface\n\nThe combined API provides:\n\n- **Agent lifecycle management** — create, configure, start, stop agents\n- **Chat interaction** — message exchange with streaming responses\n- **Session management** — persistent conversation contexts\n- **Memory operations** — knowledge storage and retrieval\n- **Tool/skill registration** — extend agent capabilities\n- **OAuth integration** — third-party authentication\n- **OpenAI-compatible endpoints** — drop-in replacement support\n- **Webhook system** — event-driven integrations\n- **Dashboard SPA** — browser-based control interface\n\n## Relationship to Other Modules\n\nThe API server acts as the gateway for all external clients. Internally, it coordinates with:\n\n- **[librefang-extensions/vault](librefang-extensions.md#vault)** — secure credential and key storage\n- **Kernel modules** — agent execution, memory, and tool registry\n- **Authentication providers** — OAuth flows and API key management\n\nSee individual sub-module documentation for implementation details.",
                "build-system-flake-nix":
                    '# Build System — flake.nix\n\n# LibreFang Build System — `flake.nix`\n\n## Overview\n\nThis module defines the Nix flake for LibreFang, providing reproducible builds, automated checks, and a standardized development environment across all supported platforms. The flake uses [crane](https://github.com/ipetkov/crane) to integrate Rust tooling with Nix, ensuring efficient incremental builds and cache-friendly workflows.\n\n## Input Dependencies\n\nThe flake declares four primary inputs that form the foundation of the build system:\n\n| Input | Source | Purpose |\n|-------|--------|---------|\n| `nixpkgs` | `github:NixOS/nixpkgs/nixpkgs-unstable` | Base package set and Nix utilities |\n| `crane` | `github:ipetkov/crane` | Rust-specific build helpers and caching |\n| `flake-utils` | `github:numtide/flake-utils` | Cross-platform compatibility helpers |\n| `rust-overlay` | `github:oxalica/rust-overlay` | Rust toolchain management with latest stable |\n\nThe `rust-overlay` input follows `nixpkgs` to maintain version consistency between the two.\n\n## Build Architecture\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│                        flake.nix                                │\n├─────────────────────────────────────────────────────────────────┤\n│                                                                 │\n│  ┌──────────────┐     ┌──────────────────────────────────────┐ │\n│  │   nixpkgs    │────▶│         pkgs (with rust overlay)     │ │\n│  │  (unstable)  │     └──────────────────────────────────────┘ │\n│  └──────────────┘                      │                      │\n│         │                              ▼                      │\n│         │              ┌───────────────────────────────┐      │\n│         │              │      rustToolchain           │      │\n│         │              │   (stable.latest.default)    │      │\n│         │              │   + rust-src, rust-analyzer, │      │\n│         │              │     clippy extensions        │      │\n│         │              └───────────────────────────────┘      │\n│         │                              │                      │\n│         ▼                              ▼                      │\n│  ┌──────────────────────────────────────────────────────────┐ │\n│  │                     craneLib                             │ │\n│  │  (mkLib pkgs with custom toolchain)                      │ │\n│  └──────────────────────────────────────────────────────────┘ │\n│                              │                                 │\n│         ┌────────────────────┼────────────────────┐           │\n│         ▼                    ▼                    ▼           │\n│  ┌─────────────┐    ┌────────────────┐    ┌──────────────┐   │\n│  │ cleanCargo  │    │ buildDepsOnly  │    │ buildPackage │   │\n│  │ Source src  │    │ (cargoArtifacts)    │ (librefang)  │   │\n│  └─────────────┘    └────────────────┘    └──────────────┘   │\n│         │                   │                    │           │\n│         └───────────────────┴────────────────────┘           │\n│                             ▼                                 │\n│              ┌───────────────────────────────┐              │\n│              │         checks                │              │\n│              │  (clippy, fmt, librefang)     │              │\n│              └───────────────────────────────┘              │\n│                             │                                 │\n│         ┌────────────────────┼────────────────────┐           │\n│         ▼                    ▼                    ▼           │\n│  ┌─────────────┐    ┌────────────────┐    ┌──────────────┐   │\n│  │  packages   │    │    apps        │    │  devShells   │   │\n│  │ default     │    │  default       │    │   default    │   │\n│  └─────────────┘    └────────────────┘    └──────────────┘   │\n│                                                                 │\n└─────────────────────────────────────────────────────────────────┘\n```\n\n## Key Components\n\n### Rust Toolchain Configuration\n\n```nix\nrustToolchain = pkgs.rust-bin.stable.latest.default.override {\n  extensions = [ "rust-src" "rust-analyzer" "clippy" ];\n};\n```\n\nThe toolchain is built from `rust-bin` (instead of nixpkgs\' `rustc`) to ensure:\n- **Latest stable Rust** via `stable.latest`\n- **`rust-src`** — Required for procedural macros and build scripts\n- **`rust-analyzer`** — Language server for IDE support in the dev shell\n- **`clippy`** — Linter used by the CI checks\n\n### Source Filtering\n\n```nix\nsrc = craneLib.cleanCargoSource ./.;\n```\n\n`cleanCargoSource` filters the repository to only include files relevant to Rust compilation, excluding:\n- `.git` directory\n- `target/` build artifacts\n- Documentation files not needed for compilation\n- Other non-Rust source files\n\nThis optimization improves build caching and reduces the evaluation surface.\n\n### Dependency Caching Strategy\n\n```nix\ncargoArtifacts = craneLib.buildDepsOnly commonArgs;\n\nlibrefang = craneLib.buildPackage (commonArgs // {\n  inherit cargoArtifacts;\n  # ...\n});\n```\n\nThe build system uses a two-phase approach:\n1. **`buildDepsOnly`** — Compiles `Cargo.lock` dependencies first, producing `cargoArtifacts`\n2. **`buildPackage`** — Builds the actual project using cached dependencies\n\nThis pattern enables granular caching: dependency compilation can be reused across rebuilds when only application code changes.\n\n### Native Dependencies\n\n```nix\nnativeBuildInputs = with pkgs; [\n  pkg-config\n  rustToolchain\n];\n\nbuildInputs = with pkgs; [\n  openssl\n] ++ pkgs.lib.optionals pkgs.stdenv.isDarwin [\n  pkgs.apple-sdk\n  pkgs.libiconv\n];\n```\n\n- **`pkg-config`** — Locates library headers during build\n- **`openssl`** — Required by the Rust `openssl` crate\n- **Darwin-specific** — `apple-sdk` provides system headers, `libiconv` handles text encoding\n\n### Strict Dependency Mode\n\n```nix\ncommonArgs = {\n  # ...\n  strictDeps = true;\n};\n```\n\n`strictDeps = true` ensures all dependencies must be explicitly declared in `nativeBuildInputs` or `buildInputs`. This catches missing dependencies early and improves reproducibility.\n\n## Output Types\n\n### Checks\n\nThe `checks` output provides reproducible validation of code quality:\n\n| Check | Command | Purpose |\n|-------|---------|---------|\n| `librefang` | `cargo build` | Verifies the project compiles |\n| `librefang-clippy` | `cargo clippy --workspace` | Runs linter with `-D warnings` |\n| `librefang-fmt` | `cargo fmt --check` | Validates code formatting |\n\nThese checks run automatically in CI via `nix flake check`.\n\n### Packages\n\n```nix\npackages = {\n  default = librefang;\n  librefang-cli = librefang;\n};\n```\n\nThe CLI binary is the default package. Users can build it with:\n\n```bash\nnix build                      # default package\nnix build .#librefang-cli      # explicit reference\n```\n\n### Apps\n\n```nix\napps.default = flake-utils.lib.mkApp {\n  drv = librefang;\n};\n```\n\nEnables running the application directly:\n\n```bash\nnix run .                      # run the CLI\n```\n\n### Development Shell\n\n```nix\ndevShells.default = craneLib.devShell {\n  checks = self.checks.${system};\n  packages = with pkgs; [ ... ];\n  inputsFrom = [ librefang ];\n  shellHook = \'\' ... \'\';\n};\n```\n\nThe dev shell provides:\n\n| Component | Description |\n|-----------|-------------|\n| `checks` | Runs clippy/fmt checks when entering the shell |\n| `inputsFrom` | Inherits build dependencies from `librefang` |\n| `cargo-watch` | Auto-rebuild on file changes |\n| `cargo-edit` | CLI for adding/removing dependencies |\n| `cargo-expand` | Macro debugging |\n| `just` | Command runner (alternative to Makefile) |\n| `gh`, `git`, `nodejs`, `python3` | Standard development tools |\n\nEnter the development environment with:\n\n```bash\nnix develop\n```\n\n## How to Use\n\n### Building\n\n```bash\n# Build the CLI binary\nnix build\n\n# Find the result\n./result/bin/librefang --version\n```\n\n### Development Workflow\n\n```bash\n# Enter the dev environment\nnix develop\n\n# Run clippy with auto-rebuild\ncargo watch -x clippy\n\n# Format code\ncargo fmt\n\n# Check formatting\ncargo fmt -- --check\n\n# Add a dependency\ncargo add tokio\n```\n\n### CI/Testing\n\n```bash\n# Run all checks locally (same as CI)\nnix flake check\n\n# Check a specific system\nnix flake check --system x86_64-linux\n```\n\n### Reproducing CI Locally\n\nThe dev shell\'s `checks = self.checks.${system}` ensures that entering the shell runs clippy and format checks, matching the CI pipeline exactly.\n\n## Build Targets\n\nThe flake targets the workspace package `librefang-cli`:\n\n```nix\ncargoExtraArgs = "--package librefang-cli";\n```\n\nThis corresponds to a Cargo workspace member defined in `Cargo.toml`. To build different workspace crates, modify `cargoExtraArgs` or reference other packages by their workspace names.',
                "build-system-hooks":
                    '# Build System — hooks\n\n\n# Build System — hooks\n\nA collection of Git hooks that enforce code quality standards at commit time. Currently provides automated Rust code formatting checks.\n\n## Purpose\n\nThis module ensures consistent Rust code formatting across the codebase without requiring developers to manually remember to run formatting commands. The pre-commit hook catches formatting issues before they enter the version control history, preventing style debates in code reviews and keeping diffs focused on logic changes rather than whitespace or style differences.\n\n## How It Works\n\n### Pre-commit Hook\n\nLocated at `scripts/hooks/pre-commit`, this hook executes automatically before each `git commit` completes.\n\n**Execution flow:**\n\n1. Git triggers the hook before finalizing a commit\n2. The hook runs `cargo fmt --check` to compare current code against Rust\'s default formatting rules\n3. If the check passes (exit code 0), the commit proceeds normally\n4. If the check fails (non-zero exit code):\n   - The hook runs `cargo fmt` to auto-format the code\n   - Prints instructions asking the developer to re-stage the formatted files\n   - Exits with code 1 to abort the current commit\n\nThe hook intentionally aborts the commit rather than committing poorly formatted code. Developers must stage the auto-formatted changes and commit again—this reinforces the habit of reviewing formatting changes before committing.\n\n## Installation\n\nThe repository uses Git\'s `core.hooksPath` configuration to point to this directory:\n\n```bash\ngit config core.hooksPath scripts/hooks\n```\n\nThis is a repository-level setting, so the hooks apply to all developers cloning the repository without any additional setup. The `core.hooksPath` approach is preferred over `.git/hooks/` symlinks because it works reliably in CI/CD environments and doesn\'t require per-developer configuration.\n\n## Integration with the Build System\n\nThe hooks module integrates with the broader build system through Cargo commands:\n\n| Command | Purpose |\n|---------|---------|\n| `cargo fmt --check` | Reads `rustfmt.toml` and applies Rust\'s default formatting rules to detect deviations |\n| `cargo fmt` | Auto-corrects formatting deviations according to the same rules |\n\nBoth commands operate on the entire Rust codebase. The formatting configuration lives in `rustfmt.toml` at the repository root—if present, it customizes the formatting rules; if absent, Rust\'s defaults apply.\n\n## Extending the Hooks\n\nTo add additional checks (such as linting, tests, or other quality gates), modify `scripts/hooks/pre-commit` to run those checks before the final exit. Chain checks so that a failure in any check aborts the commit:\n\n```sh\n#!/bin/sh\n# Example extension pattern\ncargo fmt --check 2>/dev/null || { cargo fmt; echo "Formatted. Re-stage and commit."; exit 1; }\n\n# Add more checks here\n# npm run lint || { echo "Lint failed"; exit 1; }\n# cargo test || { echo "Tests failed"; exit 1; }\n```\n\nEach check should exit with non-zero to block the commit on failure.',
                "build-system-justfile":
                    '# Build System — justfile\n\n# Build System — justfile\n\nThe `justfile` is the central command hub for LibreFang development. It wraps Cargo and custom xtask commands behind a consistent, human-readable interface using [`just`](https://github.com/casey/just), a modern alternative to Make.\n\n## Overview\n\nRather than requiring developers to remember complex `cargo` invocations or locate custom scripts, the justfile provides named recipes for every common development task. It serves as both documentation ("what can I do?") and automation ("run it").\n\nThe justfile coordinates across multiple build targets:\n\n- **Rust workspace**: Core libraries and CLI\n- **Web assets**: React dashboard served by the API\n- **Desktop app**: Tauri-based application\n- **SDKs**: npm, PyPI, and crates.io publishing\n\n## Quick Reference\n\n```bash\njust                    # List all available recipes\njust build              # Build all workspace libraries\njust test               # Run all tests\njust lint               # Run clippy with strict warnings\njust fmt                # Format code\njust ci                 # Run local CI (build + test + lint)\n```\n\n## Prerequisites\n\nBefore using the justfile, install the required tools:\n\n```bash\n# Required\ncargo install just\n\n# For desktop development\ncargo install tauri-cli\n\n# For dashboard development\npnpm install\n```\n\nThe justfile sets Windows shell to `cmd /c` for cross-platform compatibility.\n\n## Core Development Commands\n\n### Build and Test\n\n| Recipe | Description |\n|--------|-------------|\n| `just build` | Compile all workspace libraries in debug mode |\n| `just test` | Run all workspace tests |\n| `just check` | Type-check without compiling (faster iteration) |\n| `just clean` | Remove build artifacts |\n\n### Code Quality\n\n| Recipe | Description |\n|--------|-------------|\n| `just fmt` | Format all Rust code with `cargo fmt` |\n| `just fmt-check` | Verify formatting without modifying files |\n| `just lint` | Run clippy with `-D warnings` (fails on any warning) |\n| `just check` | Type-check the workspace |\n\n### Documentation\n\n| Recipe | Description |\n|--------|-------------|\n| `just doc` | Build and open workspace documentation in browser |\n| `just api-docs` | Generate API documentation from OpenAPI spec |\n| `just check-links` | Validate links in documentation |\n\n## Web Development\n\nThe web stack consists of a React dashboard served statically by the API. The dashboard must be built before any command that needs it.\n\n### Dashboard Commands\n\n| Recipe | Description |\n|--------|-------------|\n| `just dashboard-build` | Build React dashboard assets to `crates/librefang-api/static/react` |\n| `just dash` | Start dashboard in development mode with hot reload |\n| `just build-web` | Build all frontend targets (dashboard, web, docs) |\n\n```mermaid\nflowchart LR\n    A[just dashboard-build] --> B[pnpm build]\n    B --> C[static/react]\n    C --> D[API serves at /dashboard]\n    C --> E[Desktop app bundles it]\n```\n\n### Development Workflow\n\n```bash\n# Terminal 1: Start API\ncargo run -p librefang-api\n\n# Terminal 2: Start dashboard with hot reload\njust dash\n```\n\nThe dashboard dev server proxies API requests to `localhost:4545`.\n\n## Desktop Application (Tauri)\n\nBuilds a native desktop application that bundles the dashboard.\n\n| Recipe | Description |\n|--------|-------------|\n| `just desktop-build` | Build production desktop executable |\n| `just desktop-dev` | Run desktop app in development mode |\n\n### Dependency Chain\n\n```\ndesktop-build / desktop-dev\n    └── dashboard-build\n            └── pnpm build\n```\n\nThe desktop recipes automatically build dashboard assets first because the Tauri app embeds them.\n\n## Installation\n\n### CLI Installation\n\nInstall the release build of the CLI to `~/.librefang/bin`:\n\n```bash\n# Unix/macOS\njust install\n\n# Windows\njust install\n```\n\nThe `install` recipe on Unix uses the `release-local` Cargo profile and copies the binary to the user-local bin directory.\n\n### Full Installation\n\nIncludes CLI binary plus a static copy of the dashboard:\n\n```bash\njust install-full\n```\n\nThis installs:\n- Binary to `~/.librefang/bin/librefang`\n- Dashboard to `~/.librefang/dashboard`\n- Version file to `~/.librefang/dashboard/.version`\n\n## Extended Tasks (xtask)\n\nMost recipes delegate to `cargo xtask`, which runs custom tasks defined in a dedicated xtask crate. This pattern allows complex build logic in Rust while remaining accessible via simple commands.\n\n### Release Management\n\n| Recipe | Description |\n|--------|-------------|\n| `just release` | Create and publish a release |\n| `just changelog` | Generate CHANGELOG from merged PRs |\n| `just sync-versions` | Synchronize crate versions across workspace |\n| `just dist` | Build release binaries for multiple platforms |\n| `just docker` | Build and push Docker image |\n\n### SDK Publishing\n\n| Recipe | Description |\n|--------|-------------|\n| `just publish-sdks` | Publish all SDKs to npm, PyPI, and crates.io |\n| `just publish-npm-binaries` | Publish CLI binaries to npm |\n| `just publish-pypi-binaries` | Publish CLI wheels to PyPI |\n\n### Development Helpers\n\n| Recipe | Description |\n|--------|-------------|\n| `just setup` | Set up local development environment |\n| `just doctor` | Diagnose development environment issues |\n| `just db` | Database management (info, backup, reset) |\n| `just integration-test` | Run live integration tests |\n| `just coverage` | Generate test coverage report |\n| `just bench` | Run criterion benchmarks |\n| `just codegen` | Run code generation (OpenAPI spec, etc.) |\n\n### Maintenance\n\n| Recipe | Description |\n|--------|-------------|\n| `just deps` | Audit dependencies for vulnerabilities |\n| `just license-check` | Check dependency licenses |\n| `just update-deps` | Update Rust and web dependencies |\n| `just clean-all` | Clean all b
