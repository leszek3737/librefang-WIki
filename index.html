<template>\"` resolution\n- **`librefang_runtime::registry_sync::resolve_home_dir_for_tests`** — test-only home directory setup\n\nThe `semantic_scores` parameter on both routing functions receives pre-computed embedding cosine similarities from the kernel's embedding layer. When `None`, the router degrades gracefully to keyword-only matching — non-English input without keyword patterns simply returns no match rather than erroring.\n\n## Excluded Templates\n\nTemplates listed in `ROUTING_EXCLUDED_TEMPLATES` (`[\"assistant\"]`) are excluded from manifest-based routing and from `all_template_descriptions()`. They can still be loaded directly via `load_template_manifest()`.\n\n## Security\n\n`is_safe_template_name()` validates that template names contain only ASCII alphanumeric characters, hyphens, and underscores, preventing directory traversal in `load_template_manifest_at()`.","kernel-core":"# Kernel Core\n\n# Kernel Core\n\nThe central nervous system of LibreFang. This module group orchestrates agent dispatch, enforces spending quotas, routes messages to specialist agents, exposes the kernel's API surface to the agent runtime, and manages all outbound HTTP infrastructure.\n\n## Sub-modules\n\n| Module | Responsibility |\n|--------|---------------|\n| [Kernel](librefang-kernel-src.md) | Core runtime — agent identity registry, approval gates with TOTP/recovery codes, and RBAC-based auth |\n| [Kernel Handle](librefang-kernel-handle-src.md) | 19 focused role traits that decouple the agent runtime from a concrete kernel implementation |\n| [Kernel Router](librefang-kernel-router-src.md) | Scores and selects the best specialist agent (hand) or template for each inbound message |\n| [Kernel Metering](librefang-kernel-metering-src.md) | Token pricing, SQLite-backed usage recording, and hierarchical budget enforcement with reservation holds |\n| [HTTP](librefang-http-src.md) | Shared HTTP client builder with portable TLS roots (Mozilla CA bundle + system certs) and global proxy management |\n\n## How they fit together\n\n```mermaid\nflowchart LR\n    MSG[\"Inbound message\"] --> Router[\"Router\"]\n    Router -->|\"selected hand\"| Handle[\"Kernel Handle (traits)\"]\n    Handle --> Kernel[\"Kernel (concrete)\"]\n    Kernel -->|\"1. reserve budget\"| Metering[\"Metering\"]\n    Metering -->|\"budget OK\"| Kernel\n    Kernel -->|\"2. LLM call via\"| HTTP[\"HTTP\"]\n    HTTP -->|\"response + usage\"| Kernel\n    Kernel -->|\"3. record & settle\"| Metering\n    Kernel -->|\"4. approval gate\"| Approval[\"Approval system\"]\n```\n\n**Inbound dispatch** is the primary cross-cutting flow. When a message arrives, the [Router](librefang-kernel-router-src.md) evaluates candidate hands via keyword matching and semantic similarity, then selects the highest-scoring specialist. The kernel dispatches the call through the [Handle](librefang-kernel-handle-src.md) trait boundary — keeping the agent runtime decoupled from kernel internals.\n\n**Budget enforcement** wraps every LLM call. The [Metering](librefang-kernel-metering-src.md) engine reserves a global budget hold before dispatch, the call executes via the [HTTP](librefang-http-src.md) client (which applies proxy settings and portable TLS roots), and then metering atomically checks all budget levels and records the actual spend to SQLite before settling the reservation.\n\n**Approval and auth** gate sensitive operations. The kernel's approval system (with TOTP, recovery codes, session-scoped resolution, and concurrent-failure tracking) is exposed to agents through the Handle trait. RBAC policies in the kernel's auth module resolve sender identities against tool groups, ensuring the router-selected agent has permission to act.\n\n**Outbound HTTP** from any sub-module flows through the shared [HTTP](librefang-http-src.md) builder — including provider health probes initiated from the runtime layer, which depend on the TLS and proxy infrastructure to avoid panics on musl/Android/minimal Docker environments.","llm-drivers-librefang-llm-driver-src":"# LLM Drivers — librefang-llm-driver-src\n\n# librefang-llm-driver\n\nProvider-agnostic LLM driver interface. Defines the `LlmDriver` trait, request/response types, error taxonomy, streaming events, and error classification used by all concrete driver implementations (Anthropic, OpenAI, Gemini, Claude Code CLI, etc.).\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller[\"Agent Loop / FallbackChain\"] -->|CompletionRequest| LD[LlmDriver trait]\n    LD -->|CompletionResponse| Caller\n    LD -->|StreamEvent via mpsc| Caller\n    LD --> C1[Anthropic Driver]\n    LD --> C2[OpenAI-compat Driver]\n    LD --> C3[Gemini Driver]\n    LD --> C4[Claude Code CLI Driver]\n    LD -->|LlmError| FR[failover_reason]\n    FR --> FBC[FallbackChain switching]\n    LE[classify_error] --> CE[ClassifiedError]\n    LE2[classify_error_with_context] --> CE\n```\n\n## LlmDriver Trait\n\nThe central abstraction. Every concrete provider implements `LlmDriver`:\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest) -> Result<CompletionResponse, LlmError>;\n    async fn stream(&self, request: CompletionRequest, tx: Sender<StreamEvent>) -> Result<CompletionResponse, LlmError>;\n    fn is_configured(&self) -> bool { true }\n    fn family(&self) -> LlmFamily { LlmFamily::Other }\n}\n```\n\n**`complete`** — mandatory. Performs a single non-streaming request.\n\n**`stream`** — has a default implementation that wraps `complete`, emitting a single `TextDelta` followed by `ContentComplete`. Concrete drivers override this to emit incremental events as SSE chunks arrive. If the receiver (`tx`) is dropped (client disconnect, abort), the default returns `LlmError::Http(\"stream receiver dropped\")` so the caller stops driving cancelled work (#3543).\n\n**`is_configured`** — returns `false` only for `StubDriver`. All real drivers return `true`.\n\n**`family`** — returns the driver's `LlmFamily` for future family-level policy hooks (prompt-cache semantics, tool-schema normalization). Defaults to `Other`; concrete drivers override.\n\n## CompletionRequest\n\nAll fields default to zero/empty values. Callers must set `model` and `messages` at minimum.\n\nKey design decisions:\n\n- **`messages: Arc<Vec<Message>>`** and **`tools: Arc<Vec<ToolDefinition>>`** — wrapped in `Arc` so cloning the request during retries or fallbacks only bumps a refcount instead of deep-copying potentially hundreds of KB of conversation history (#3766, #3586).\n\n- **`prompt_caching`** / **`cache_ttl`** — enables Anthropic-style `cache_control` markers or relies on OpenAI automatic prefix caching. `cache_ttl` accepts `Some(\"1h\")` for extended TTL on Anthropic; other drivers ignore it.\n\n- **`extra_body: Option<HashMap<String, serde_json::Value>>`** — provider-specific parameters merged into the top-level request body. Last-wins on key conflicts with standard parameters.\n\n- **`timeout_secs: Option<u64>`** — per-request timeout override. Used by the agent loop to grant longer timeouts for requests involving slow tools.\n\n- **`agent_id` / `session_id` / `step_id`** — caller identity propagated as `x-librefang-{agent,session,step}-id` HTTP headers on OpenAI-compatible endpoints. Gives downstream observability stable correlation keys without parsing the request body. `None` for out-of-band callers (compaction, routing probes, tests).\n\n- **`reasoning_echo_policy`** — sourced from the model catalog at request-construction time. Controls how the OpenAI-compat driver handles `reasoning_content` on historical assistant turns. Other drivers ignore it.\n\n## CompletionResponse\n\nContains `content: Vec<ContentBlock>`, `stop_reason`, `tool_calls`, and `usage`.\n\nThe `text()` method concatenates all `ContentBlock::Text` blocks, skipping thinking blocks and tool-use blocks.\n\n## LlmError\n\nNon-exhaustive error enum. Each variant carries enough context for failover decisions:\n\n| Variant | Semantics | Failover classification |\n|---|---|---|\n| `Http(String)` | Transport-level failure (connection refused, TLS) | `HttpError` |\n| `Api { status, message, code }` | Provider returned an error HTTP response | See below |\n| `RateLimited { retry_after_ms, message }` | 429 with optional delay | `RateLimit(Some(ms))` |\n| `Parse(String)` | Response body could not be decoded | `Unknown` |\n| `MissingApiKey(String)` | No API key configured for this slot | `AuthError` |\n| `Overloaded { retry_after_ms }` | 503 / capacity error | `RateLimit(Some(ms))` |\n| `AuthenticationFailed(String)` | Invalid/expired key | `AuthError` |\n| `ModelNotFound(String)` | Model doesn't exist on this provider | `ModelUnavailable` |\n| `TimedOut { inactivity_secs, partial_text, … }` | CLI subprocess stalled | `Timeout` |\n\n### failover_reason()\n\nThe `LlmError::failover_reason()` method classifies any error into a `FailoverReason` without allocation. This drives `FallbackChain` provider-switching decisions.\n\nClassification is purely structural (variant + embedded status/code). For `Api` errors, two paths exist:\n\n1. **`code: Some(ProviderErrorCode)`** — the driver populated a typed error code from the provider's structured JSON body. Classification is exhaustive and locale-independent (#3745). This is the preferred path; drivers should populate `code` whenever the response body has a structured `error.code` or `error.type` field.\n\n2. **`code: None`** — legacy fallback using status-code-only heuristics. Ambiguous statuses (400, 403, 404, 500) without a typed code map to `HttpError` (skip to next provider) rather than guessing from the human-readable message.\n\n### TimedOut and partial_text\n\n`TimedOut.partial_text` is `Option<Arc<str>>` so cloning the error variant is an O(1) refcount bump, not a potential megabyte copy (#3552). The `Display` impl only references `partial_text_len`; CLI driver callers that want the actual body pattern-match the variant and clone the `Arc`.\n\n## StreamEvent\n\nEvents emitted during streaming:\n\n- **`TextDelta`** — incremental text content\n- **`ThinkingDelta`** — incremental reasoning/thinking text\n- **`ToolUseStart`** / **`ToolInputDelta`** / **`ToolUseEnd`** — tool use lifecycle\n- **`ContentComplete`** — final event with stop reason and token usage\n- **`PhaseChange`** — agent lifecycle transitions (e.g. `PHASE_RESPONSE_COMPLETE`)\n- **`ToolExecutionResult`** — tool result from the agent loop (not from the LLM driver itself)\n- **`OwnerNotice`** — private notice routed to the owner's DM (channel bridge)\n\nThe constant `PHASE_RESPONSE_COMPLETE` signals that the final LLM text has been streamed and the agent loop is entering post-processing. Consumers use this to unblock user input before the full response payload is ready.\n\n## LlmFamily\n\nCoarse-grained provider grouping for future cross-cutting policy:\n\n- **`Anthropic`** — Claude direct API, Anthropic-compatible providers\n- **`OpenAi`** — OpenAI Chat Completions wire format (OpenAI, Azure, Groq, OpenRouter, DeepInfra, Together, Cerebras, etc.)\n- **`Google`** — Gemini API, Vertex AI\n- **`Local`** — Ollama, LM Studio, vLLM (native protocol; OpenAI-shim proxies report `OpenAi`)\n- **`Other`** — default; Cohere, custom CLIs, out-of-tree drivers\n\nSerializes as `snake_case` (`\"open_ai\"`, `\"anthropic\"`, etc.).\n\n## DriverConfig\n\nConfiguration for constructing a driver instance. Key fields:\n\n- **`api_key: Option<String>`** — redacted in the `Debug` impl (security)\n- **`base_url: Option<String>`** — endpoint override\n- **`vertex_ai` / `azure_openai`** — provider-specific sub-configs from `KernelConfig`\n- **`skip_permissions: bool`** — defaults to `true`; adds `--dangerously-skip-permissions` for Claude Code CLI\n- **`message_timeout_secs: u64`** — inactivity-based timeout for CLI drivers (default 300s)\n- **`mcp_bridge: Option<McpBridgeConfig>`** — when set, writes a temp `mcp_config.json` and passes `--mcp-config` to the spawned Claude CLI so the subprocess discovers LibreFang tools via the daemon's `/mcp` endpoint (#2314). Skipped by Serde; populated at runtime by the kernel.\n- **`proxy_url`** — per-provider proxy override\n- **`request_timeout_secs`** — HTTP client timeout for API drivers (CLI drivers use `message_timeout_secs` instead)\n- **`emit_caller_trace_headers`** — controls whether `x-librefang-{agent,session,step}-id` headers appear on outbound requests. Defaults to `true`; operators with strict zero-egress policies can disable it.\n\n## llm_errors Submodule\n\n### Error Classification\n\n`classify_error(message, status)` categorizes raw API errors into 8 `LlmErrorCategory` variants using case-insensitive substring matching against pattern tables. No regex dependency.\n\nPriority order (most specific first):\n\n1. **ContextOverflow** — `\"context_length_exceeded\"`, `\"prompt is too long\"`, etc.\n2. **Billing** — status 402, `\"insufficient credits\"`, `\"payment required\"`\n3. **Auth** — status 401, `\"invalid api key\"`, `\"authentication_error\"`\n4. **RateLimit** — status 429, `\"rate limit\"`, `\"resource exhausted\"`\n5. **ModelNotFound** — status 404, `\"model not found\"`, `\"unknown model\"`\n6. **Format** — status 400, `\"invalid request\"`, `\"schema\"`, `\"validation_error\"`\n7. **Overloaded** — status 500/503, `\"overloaded\"`, `\"high demand\"`\n8. **Timeout** — `\"ETIMEDOUT\"`, `\"ECONNRESET\"`, `\"fetch failed\"`\n\n**403 special handling**: Chinese providers often return 403 for quota/region/model-permission issues rather than auth failures. The classifier checks `FORBIDDEN_NON_AUTH_PATTERNS` (quota, region, model permission) before falling back to `Auth`. This prevents false-positive auth classification that would skip a valid provider slot.\n\n`classify_error_with_context(message, status, provider, model)` enriches the result with provider/model metadata and an actionable `suggestion` string. Preferred when context is available.\n\n### Sanitization\n\n`sanitize_for_user(category, raw)` produces user-facing messages that include a sanitized excerpt of the raw error (capped at 300 chars). The sanitization pipeline:\n\n1. Detect HTML error pages (Cloudflare 521-530) → replace with generic message\n2. Extract `.error.message` / `.message` / `.detail` from JSON bodies\n3. Redact secrets (`sk-*`, `key-*`, `Bearer *` patterns)\n4. Strip the `\"LLM driver error: API error (NNN): \"` wrapper\n5. Cap to 200 chars for the excerpt, 300 for the full message\n\n`cap_message` walks back to the nearest UTF-8 char boundary to avoid panicking on CJK/emoji input.\n\n### FailoverReason\n\nEight-variant taxonomy that drives `FallbackChain` provider switching:\n\n| Variant | Recovery |\n|---|---|\n| `RateLimit(Option<u64>)` | Sleep (optional hint ms), retry same provider |\n| `CreditExhausted` | Skip to next provider |\n| `ContextTooLong` | Propagate to caller (must compress) |\n| `ModelUnavailable` | Skip to next provider |\n| `Timeout` | Skip to next provider |\n| `HttpError` | Skip to next provider |\n| `AuthError` | Skip to next provider (another slot may have a valid key) |\n| `Unknown` | Propagate immediately |\n\n### ProviderErrorCode\n\nTyped classification populated by drivers from structured JSON error responses. Carried on `LlmError::Api.code`. Drivers that parse `error.code` or `error.type` from the response body should map it to one of: `RateLimit`, `CreditExhausted`, `ContextLengthExceeded`, `ModelNotFound`, `AuthError`, `ServerUnavailable`, `ServerError`, `BadRequest`.\n\nWhen `code` is `None`, `failover_reason()` falls back to status-code-only heuristics.\n\n### Utility Functions\n\n- **`extract_retry_delay(message) → Option<u64>`** — parses `\"retry after N\"`, `\"retry-after: Nms\"`, `\"try again in N\"` from error messages. Returns milliseconds.\n- **`is_transient(message) → bool`** — quick heuristic checking timeout, overloaded, rate-limit, and SSL transient patterns. No full classification needed.\n- **`is_html_error_page(body) → bool`** — detects Cloudflare/HTML error pages by checking for `<!DOCTYPE`, `<html`, `cf-error-code`, or Cloudflare status codes 521-530.\n\n## Adding a New Driver\n\n1. Create a new crate or module implementing `LlmDriver`\n2. Override `family()` to return the appropriate `LlmFamily`\n3. Override `stream()` for true streaming; the default wraps `complete`\n4. When parsing error responses, populate `LlmError::Api.code` with the appropriate `ProviderErrorCode` variant to enable precise failover classification\n5. Populate `emit_caller_trace_headers` from `DriverConfig` if the driver talks to HTTP endpoints","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nProvider-agnostic LLM integration layer that defines a uniform interface for completion requests, streaming, and error handling, then ships multiple concrete driver implementations behind a health-aware fallback system.\n\n## Sub-modules\n\n| Sub-module | Role |\n|---|---|\n| [librefang-llm-driver](librefang-llm-driver-src.md) | Core `LlmDriver` trait, request/response types, streaming events, and error classification taxonomy |\n| [librefang-llm-drivers](librefang-llm-drivers-src.md) | Concrete driver implementations, credential pooling, fallback routing, and stream utilities |\n\n## How they fit together\n\n```mermaid\ngraph LR\n    subgraph \"librefang-llm-driver (interface)\"\n        T[\"LlmDriver trait\"]\n        ERR[\"classify_error → ClassifiedError\"]\n    end\n\n    subgraph \"librefang-llm-drivers (implementations)\"\n        CP[\"CredentialPool\"]\n        FB[\"FallbackChain\"]\n        D1[Anthropic]\n        D2[OpenAI / ChatGPT]\n        D3[Bedrock]\n        D4[Gemini]\n        D5[Claude Code CLI]\n        D6[Codex CLI]\n        D7[Copilot]\n    end\n\n    CP -->|provides keys| D1 & D2 & D3 & D4 & D7\n    D1 & D2 & D3 & D4 & D5 & D6 & D7 -.->|implement| T\n    FB -->|routes to healthiest| D1 & D2 & D3 & D4 & D5 & D6 & D7\n    ERR -->|drives failover| FB\n```\n\n[librefang-llm-driver](librefang-llm-driver-src.md) defines the contract — `LlmDriver::complete`, `LlmDriver::stream`, `CompletionRequest`/`CompletionResponse`, and the `classify_error` taxonomy that categorises failures as overloaded, context overflow, transient, etc.\n\n[librefang-llm-drivers](librefang-llm-drivers-src.md) implements that contract across seven providers, then layers two orchestration mechanisms on top:\n\n- **CredentialPool** — rotates API keys and marks them exhausted when a provider returns rate-limit errors, so the next request automatically picks a live key.\n- **FallbackChain** — wraps multiple drivers behind EWMA-based health scoring. When `classify_error` reports a retryable or overloaded failure, the chain suppresses the unhealthy driver for a cooldown window and routes subsequent requests to the next healthiest provider.\n\nCLI-based drivers (Claude Code, Codex) additionally probe for local credential files and binary availability at startup, allowing the fallback chain to skip them entirely when unavailable.\n\n## Key cross-module workflows\n\n1. **Request with fallback** — Caller issues a `CompletionRequest` through `FallbackChain`. The chain picks the healthiest driver, calls `complete`, and if the result is a classified error, it re-routes to the next driver after updating health scores.\n2. **Streaming** — `LlmDriver::stream` returns `mpsc`-based `StreamEvent`s; the trait layer tests that dropped receivers surface as default stream errors.\n3. **Credential rotation** — A driver obtains a key from `CredentialPool::fill_first`, uses it for the request, and on rate-limit classification calls `mark_exhausted` so subsequent calls skip that key.","memory-system":"# Memory System\n\n# Memory System\n\nThe Memory System provides Librefang's persistent storage, retrieval, and lifecycle management for both structured agent memories and wiki-based documents. It comprises two cooperating sub-modules:\n\n- **[librefang-memory-src](librefang-memory-src.md)** — Core memory subsystem: embeddings, knowledge graph, decay, migration, ACLs, and proactive retrieval.\n- **[librefang-memory-wiki-src](librefang-memory-wiki-src.md)** — Wiki-based document vault: Markdown pages with frontmatter, link resolution, and provenance tracking.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-memory (core)\"\n        Substrate[substrate.rs<br/>SQLite storage]\n        Migration[migration.rs<br/>Schema migrations]\n        Consolidation[consolidation.rs<br/>Embedding merge]\n        Decay[decay.rs<br/>TTL / forgetting]\n        Knowledge[knowledge.rs<br/>Entity-relation graph]\n        Chunker[chunker.rs<br/>Text chunking]\n        ACL[namespace_acl.rs<br/>PII redaction]\n        Proactive[proactive.rs<br/>Auto-retrieval]\n    end\n\n    subgraph \"librefang-memory-wiki\"\n        Vault[vault.rs<br/>Page store + provenance]\n        Frontmatter[frontmatter.rs<br/>YAML parsing]\n    end\n\n    Substrate --> Migration\n    Migration --> Consolidation\n    Substrate --> Proactive\n    Substrate --> Decay\n    Proactive --> Knowledge\n    Vault --> Frontmatter\n    ACL --> Proactive\n\n    style Substrate fill:#2d5a3d,color:#fff\n    style Vault fill:#3d2d5a,color:#fff\n```\n\n## How the sub-modules relate\n\n### Initialization chain\n\nThe core memory subsystem boots through a strict dependency chain: `substrate.rs` opens the SQLite pool, `migration.rs` runs schema migrations (checking `get_schema_version`, applying versioned upgrades like `migrate_v22`), and `consolidation.rs` calls `run_migrations` during setup before performing embedding operations. This ensures the schema is current before any memory operations begin.\n\n### Memory lifecycle\n\nOnce initialized, memories flow through several interconnected components:\n\n1. **Ingestion** — Text is split into chunks via `chunker.rs`, then stored through `proactive.rs` (`add`, `add_with_level`).\n2. **Knowledge graph** — Entities and relations are managed in `knowledge.rs` (`add_entity`, `add_relation`), linked to proactive memory entries.\n3. **Decay** — `decay.rs` manages TTL-based forgetting (`run_decay`). Accessing a memory resets its decay timer, creating a \"use it or lose it\" behavior.\n4. **Consolidation** — `consolidation.rs` merges embeddings (`insert_memory_full`), handling dimension mismatches gracefully.\n5. **Access control** — `namespace_acl.rs` applies PII redaction based on metadata labels, skipping redaction when access is explicitly granted.\n\n### Wiki vault\n\nThe wiki sub-module operates more independently. `vault.rs` manages Markdown pages with YAML frontmatter parsed by `frontmatter.rs`. Key invariants enforced at this layer:\n\n- **Provenance tracking** — Every page records its origin; `concurrent_writes_to_same_topic_are_serialised` and `crlf_authored_pages_are_parsed_not_treated_as_bodyless` both rely on `provenance` and `fresh_vault` to maintain consistency.\n- **Link resolution** — `native_render_rewrites_links_to_relative_paths` transforms internal links using provenance metadata.\n- **Frontmatter defaults** — `read_page_if_present` delegates to `default_for` in `frontmatter.rs` to supply missing fields.\n\n## Cross-sub-module flows\n\nThe `frontmatter.rs` parser's `split` utility is used beyond the wiki vault itself. Plugin version checking flows through `librefang-runtime`'s `semver_parts`, which calls into `frontmatter::split` — making the wiki frontmatter module a shared utility for structured text parsing across the system. This connection is exercised in the `benchmark_plugin_hook`, `test_plugin_hook`, and `plugin_update_check` execution paths.\n\nIn the opposite direction, `proactive.rs` depends on `substrate.rs` for its in-memory test databases (`open_in_memory`), and all knowledge graph operations route through the same substrate layer.","migration-tools":"# Migration Tools\n\n# Migration Tools (`librefang-migrate`)\n\n## Purpose\n\nThe migration engine imports agents, configuration, memory, sessions, and channel setups from other agent frameworks into LibreFang's native format. It currently supports **OpenClaw** (both modern JSON5 and legacy YAML layouts) and **OpenFang** (same-format fork), with stubs for LangChain and AutoGPT.\n\nAll migrations are **atomic**, **idempotent**, and **non-destructive**: existing files are backed up, writes go through a staging directory, and a marker file prevents accidental re-runs from overwriting user edits.\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"CLI / Init Wizard / API routes\"] --> run_migration[\"run_migration()\"]\n    run_migration -->|OpenClaw| OC[\"openclaw::migrate()\"]\n    run_migration -->|OpenFang| OF[\"openfang::migrate()\"]\n    OC --> Scan[\"scan_openclaw_workspace()\"]\n    OC --> Migrate[\"migrate()\"]\n    Migrate --> JSON5[\"migrate_from_json5()\"]\n    Migrate --> YAML[\"migrate_from_legacy_yaml()\"]\n    JSON5 --> Config[\"Config migration\"]\n    JSON5 --> Agents[\"Agent migration\"]\n    JSON5 --> Memory[\"Memory migration\"]\n    JSON5 --> Sessions[\"Session migration\"]\n    JSON5 --> Channels[\"Channel migration\"]\n    Migrate --> Staging[\"Staging dir → promote_staging()\"]\n    Staging --> Target[\"~/.librefang\"]\n```\n\n## Entry Point\n\n### `run_migration(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>`\n\nDispatches to the appropriate backend based on `options.source`. Returns a `MigrationReport` listing every imported item, skipped feature, and warning.\n\n### `MigrateOptions`\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `source` | `MigrateSource` | Framework to import from |\n| `source_dir` | `PathBuf` | Path to the source workspace |\n| `target_dir` | `PathBuf` | Path to the LibreFang home directory |\n| `dry_run` | `bool` | Report only — no disk writes |\n\n### `MigrateSource` Variants\n\n- **`OpenClaw`** — fully supported\n- **`OpenFang`** — fully supported (delegates to `openfang::migrate`)\n- **`LangChain`** / **`AutoGpt`** — returns `MigrateError::UnsupportedSource`\n\n## Error Handling (`MigrateError`)\n\n| Variant | Meaning |\n|---------|---------|\n| `SourceNotFound(PathBuf)` | Source directory does not exist |\n| `ConfigParse(String)` | Config file could not be parsed |\n| `AgentParse(String)` | Agent definition could not be parsed |\n| `Io(std::io::Error)` | Filesystem I/O failure |\n| `Yaml(serde_yaml::Error)` | YAML parse error |\n| `Json5Parse(String)` | JSON5 parse error |\n| `TomlSerialize(toml::ser::Error)` | TOML output serialization failure |\n| `UnsupportedSource(String)` | Framework not yet implemented |\n| `InvalidId(String)` | Agent ID contains path traversal (security: #3794) |\n| `UnsupportedVersion(u32)` | Schema version not in `[1, 2]` (compat: #3797) |\n| `StagingExists(PathBuf)` | Stale staging from a previous failed run (#3798) |\n\n## OpenClaw Migration (`openclaw` module)\n\n### Source Layout\n\nThe migrator handles two OpenClaw generations:\n\n**Modern (JSON5):**\n```\n~/.openclaw/\n├── openclaw.json          # Single JSON5 config (everything)\n├── auth-profiles.json     # Credentials\n├── sessions/*.jsonl       # Conversation logs\n├── memory/<agent>/MEMORY.md\n├── skills/\n└── workspaces/<agent>/\n```\n\n**Legacy (YAML):**\n```\n~/.openclaw/\n├── config.yaml            # Global config\n├── agents/<name>/agent.yaml\n├── agents/<name>/MEMORY.md\n├── messaging/<channel>.yaml\n└── skills/\n```\n\nConfig auto-detection via `find_config_file()` checks for `openclaw.json`, `clawdbot.json`, `moldbot.json`, `moltbot.json`, then falls back to `config.yaml`.\n\n### Auto-Detection\n\n**`detect_openclaw_home() -> Option<PathBuf>`** searches standard locations in order:\n1. `OPENCLAW_STATE_DIR` environment variable\n2. `~/.openclaw`, `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`, `~/openclaw`, `~/.config/openclaw`\n3. `%APPDATA%/openclaw` and `%LOCALAPPDATA%/openclaw` on Windows\n\nReturns `Some(path)` only when the directory contains a recognized config file or `sessions/`/`memory/` subdirectories.\n\n### Workspace Scanning\n\n**`scan_openclaw_workspace(path: &Path) -> ScanResult`** inspects an OpenClaw workspace without modifying anything. Returns lists of discovered agents, channels, skills, and whether memory exists. Used by the TUI init wizard and the API routes for pre-migration previews.\n\n### Migration Pipeline\n\n`openclaw::migrate()` executes these steps:\n\n#### 1. Pre-flight checks\n\n- Verifies `source_dir` exists\n- Checks for the `.openclaw_migrated` marker file — if present, returns immediately with a warning (idempotency)\n- For non-dry-run, checks for a stale staging directory and refuses to proceed if one exists (#3798)\n\n#### 2. Staging and atomicity\n\nAll writes go to a sibling staging directory (e.g., `~/.librefang.migrate-staging`). On success, `promote_staging()` atomically renames each file into the real target. Existing files in the target are **never overwritten** — staged duplicates are dropped with a warning. On failure, the staging directory is left intact for manual inspection.\n\nIndividual file writes use `atomic_write()`: content is written to a `.tmp` sibling first, then `fs::rename`d into place to prevent torn writes.\n\n#### 3. Config migration\n\nExtracts the default model from `agents.defaults.model`, builds a `LibreFangConfig` struct, serializes to TOML, and writes as `config.toml`. Includes the current `CONFIG_VERSION` so the kernel recognizes the file as up-to-date.\n\n#### 4. Agent migration\n\nFor each agent entry in `openclaw.json` (or `agents/<name>/agent.yaml` for legacy):\n\n- **ID validation** (`validate_migration_id`): rejects empty strings, NUL bytes, and path-traversal components (#3794)\n- **Model resolution**: splits `\"provider/model\"` references, extracts fallback models from `Detailed` variant\n- **Tool mapping**: maps OpenClaw tool names via `librefang_types::tool_compat::{is_known_librefang_tool, map_tool_name}`; resolves profiles (`ToolProfile::Minimal`, `Coding`, `Research`, `Messaging`, `Automation`, `Full`) to concrete tool lists\n- **Tool blocklist**: carries over `tools.deny` entries (previously dropped, which widened access)\n- **Capability derivation**: infers `shell`, `network`, `agent_message`, `agent_spawn` from the mapped tool list\n- **Identity extraction**: `extract_identity_prompt()` handles both raw strings and nested structured objects, searching a priority list of keys (`systemPrompt`, `instructions`, `persona`, etc.)\n- **Skill allowlists**: preserved per-agent if present\n- **Workspace paths**: preserved if set\n\nOutput: `agents/<id>/agent.toml` in LibreFang manifest format.\n\n#### 5. Channel migration\n\nSupports 13 channel types: Telegram, Discord, Slack, WhatsApp, Signal, Matrix, Google Chat, Teams, IRC, Mattermost, Feishu, iMessage, and BlueBubbles.\n\nEach channel is:\n- Mapped to a TOML table with policy overrides (`dm_policy`, `group_policy`)\n- Secrets (tokens, passwords) extracted into `secrets.env` with restricted permissions (`0o600` on Unix)\n- Allow-lists converted to TOML arrays where LibreFang supports them\n- Skipped with a reported reason where no adapter exists (iMessage, BlueBubbles)\n\nPolicy mapping:\n| OpenClaw DM Policy | LibreFang |\n|---|---|\n| `open` | `respond` |\n| `allowlist` | `allowed_only` |\n| `pairing`/`disabled` | `ignore` |\n\n| OpenClaw Group Policy | LibreFang |\n|---|---|\n| `open`/`all` | `all` |\n| `mention` | `mention_only` |\n| `commands`/`slash_only` | `commands_only` |\n| `disabled` | `ignore` |\n\n#### 6. Memory migration\n\nCopies `MEMORY.md` files from both `memory/<agent>/MEMORY.md` and `agents/<agent>/MEMORY.md` (legacy layout) to `agents/<agent>/imported_memory.md`. Deduplicates — if an agent's memory was found in the primary location, the legacy fallback is skipped.\n\n#### 7. Workspace and session migration\n\n- **Workspaces**: copies `workspaces/<agent>/` (or `agents/<agent>/workspace/`) directories recursively to `agents/<agent>/workspace/`\n- **Sessions**: copies `sessions/*.jsonl` files to `imported_sessions/`\n\n#### 8. Skipped features report\n\nThe following OpenClaw features have no LibreFang equivalent and are reported as skipped:\n\n| Feature | Reason |\n|---------|--------|\n| `cron` | Use LibreFang's `ScheduleMode::Periodic` |\n| `hooks` | Use LibreFang's event system |\n| `auth-profiles` / `auth-profiles.json` | Security — set env vars manually |\n| `skills.entries` | Reinstall via `librefang skill install` |\n| `memory-search/index.db` | SQLite vector index not portable |\n| `session` config | LibreFang uses per-agent sessions |\n| `memory` backend config | LibreFang uses SQLite with vector embeddings |\n\n### Provider Mapping\n\n`map_provider()` normalizes provider names:\n\n| OpenClaw | LibreFang |\n|----------|-----------|\n| `anthropic`, `claude` | `anthropic` |\n| `openai`, `gpt` | `openai` |\n| `google`, `gemini` | `google` |\n| `xai`, `grok` | `xai` |\n| `groq`, `ollama`, `deepseek`, etc. | passed through as-is |\n\n`default_api_key_env()` maps each provider to its standard environment variable name (e.g., `anthropic` → `ANTHROPIC_API_KEY`). Ollama returns an empty string (no key needed).\n\n## Integration Points\n\nThe migration module is called from three places:\n\n| Caller | Function | Context |\n|--------|----------|---------|\n| `tui/screens/init_wizard.rs` | `detect_openclaw_home()`, `scan_openclaw_workspace()` | Pre-migration preview in the TUI setup wizard |\n| `tui/screens/init_wizard.rs` | `run_migration()` | User confirms migration |\n| `src/routes/config.rs` | `detect_openclaw_home()` → `scan_openclaw_workspace()` → `run_migration()` | HTTP API endpoints |\n\nThe `MigrationReport` returned by `run_migration()` is serialized to `migration_report.md` inside the target directory and includes all imported items, skipped features, and warnings.\n\n## Adding a New Source Framework\n\n1. Add a variant to `MigrateSource` in `lib.rs` and update its `Display` impl\n2. Add a dispatch arm in `run_migration()` — return `UnsupportedSource` for stubs\n3. Create a new module file (e.g., `langchain.rs`) implementing a `migrate(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>` function\n4. Follow the OpenClaw module's pattern: scan → stage → write → promote","other-librefang-acp-tests":"# Other — librefang-acp-tests\n\n# librefang-acp Integration Tests\n\n## Overview\n\nThe `acp_integration.rs` test module provides end-to-end integration tests for the LibreFang Agent Client Protocol (ACP) adapter. These tests validate on-the-wire JSON-RPC behavior — request/response correctness, notification ordering, permission round-trips, reverse-RPC paths, and error handling — without requiring a running LibreFang kernel or a real LLM provider.\n\nEach test constructs an in-memory duplex pipe, wires `librefang_acp::run_with_transport` to one end and an `agent_client_protocol::Client` to the other, then drives both sides through a `MockKernel` implementation.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph Test Process\n        A[Client builder<br/>+ handlers] <-->|duplex pipes| B[run_with_transport]\n        B --> C[MockKernel<br/>implements AcpKernel]\n        A --> D[Test assertions]\n    end\n```\n\nThe `run_with_transport` server reads/writes JSON-RPC frames on one side of the duplex pair while the `Client` builder does the same on the opposite side. The `MockKernel` supplies canned `StreamEvent`s and captures approval decisions, allowing tests to assert both directions of the protocol.\n\n## Test Harness\n\n### `MockKernel`\n\nA stub implementation of the `AcpKernel` trait (`librefang_acp::AcpKernel`) that replaces the real kernel for testing.\n\n**Key fields:**\n\n| Field | Type | Purpose |\n|---|---|---|\n| `canned_events` | `AsyncMutex<Vec<StreamEvent>>` | Events emitted by `send_prompt`, consumed once |\n| `approval_tx` | `broadcast::Sender<ApprovalEvent>` | Injects approval requests into the broadcast stream |\n| `resolves` | `AsyncMutex<Vec<(Uuid, ApprovalDecision)>>` | Captures calls to `resolve_approval` for assertion |\n| `last_session_id` | `AsyncMutex<Option<LfSessionId>>` | Records the session ID from the last `send_prompt` call |\n| `fs_client` | `std::sync::Mutex<Option<FsClientHandle>>` | Stores the `FsClientHandle` set during `initialize` |\n| `terminal_client` | `std::sync::Mutex<Option<TerminalClientHandle>>` | Stores the `TerminalClientHandle` set during `initialize` |\n| `canned_history` | `AsyncMutex<Vec<(Role, String)>>` | History returned by `fetch_session_history` |\n\n**Helper methods:**\n\n- **`new(canned: Vec<StreamEvent>)`** — Constructs an `Arc<MockKernel>` with pre-loaded stream events.\n- **`set_history(history)`** — Sets canned conversation history for session load tests.\n- **`fs_client_handle()`** / **`terminal_client_handle()`** — Retrieves the client handles stashed during initialization.\n- **`fire_approval(lf_session_id)`** — Injects an `ApprovalEvent::Created` into the broadcast channel, simulating the kernel queuing an approval request. Returns the `Uuid` of the created request for later assertion.\n\n**`AcpKernel` trait methods:**\n\n- `resolve_agent` — Returns a nil `AgentId`.\n- `send_prompt` — Records the session ID, drains `canned_events` into a channel, and returns the receiver.\n- `subscribe_approvals` — Returns a new broadcast receiver.\n- `resolve_approval` — Appends `(request_id, decision)` to `resolves`.\n- `set_fs_client` / `set_terminal_client` — Stash the handles passed by the adapter at initialization time.\n- `fetch_session_history` — Returns the canned history.\n\n### `duplex_pair()`\n\nCreates two `tokio::io::duplex` pipes and adapts them with `tokio_util::compat` for use with the `futures`-based `agent_client_protocol::ByteStreams` transport. Returns four values: `(server_reader, server_writer, client_reader, client_writer)`.\n\n### `recv<T>(sent: SentRequest<T>)`\n\nAwaits the result of a `SentRequest` by bridging it through a `oneshot` channel. Used throughout the tests to convert the callback-based `SentRequest::on_receiving_result` API into a direct `.await`.\n\n### `poll_for<T>(f)`\n\nPolls a closure every 25ms for up to 1 second until it returns `Some(T)`. Used to wait for handles that the server side sets asynchronously during initialization.\n\n### `wait_for_session_id(kernel)` / `wait_for_resolve(kernel, req_id)`\n\nPolling helpers that wait for the kernel to record a session ID from `send_prompt` or an approval resolution, respectively. Both panic after ~1 second if the condition is never met.\n\n## Test Cases\n\nAll tests use `#[tokio::test(flavor = \"current_thread\")]` and wrap their bodies in a `LocalSet` to support `spawn_local` for the server task.\n\n### `initialize_and_prompt_emits_text_chunks_and_end_turn`\n\nValidates the core prompt flow:\n\n1. Client sends `InitializeRequest`, asserts `agent_info.name == \"librefang\"`.\n2. Client creates a new session via `NewSessionRequest`.\n3. Client sends `PromptRequest` with text content.\n4. MockKernel emits two `TextDelta` events followed by `ContentComplete` with `EndTurn`.\n5. Asserts the `PromptResponse.stop_reason` is `EndTurn`.\n6. Asserts the client received two `AgentMessageChunk` notifications with the concatenated text \"Hello world\".\n\n### `permission_round_trip_resolves_kernel_approval`\n\nValidates the approval reverse-RPC path:\n\n1. Initialize and create a session, then kick off a prompt (keeps the bridge alive).\n2. Wait for `send_prompt` to record the `LfSessionId`.\n3. Call `kernel.fire_approval(lf_id)` to inject an `ApprovalEvent::Created`.\n4. The bridge dispatches `session/request_permission` to the client.\n5. Client handler always responds with `allow_once`.\n6. Asserts the kernel's `resolve_approval` was called with `ApprovalDecision::Approved` for the correct request UUID.\n\nThe client handler also asserts that exactly 4 permission options are presented (matching the standard permission set).\n\n### `unknown_session_id_returns_invalid_params`\n\nValidates error handling for invalid sessions:\n\n1. Initialize but do **not** create a session.\n2. Send a `PromptRequest` with a fabricated session ID `\"does-not-exist\"`.\n3. Asserts the result is an error.\n\n### `fs_read_text_file_round_trip`\n\nValidates the reverse-RPC path for filesystem operations:\n\n1. Client declares `fs.read_text_file` capability in the `InitializeRequest`.\n2. After initialization, the test retrieves the `FsClientHandle` from the mock kernel.\n3. Calls `handle.read_text_file(session_id, \"/tmp/hello.txt\", None, None)`.\n4. The adapter issues an `fs/read_text_file` request to the client.\n5. Client handler asserts the path matches and responds with `\"canned editor content\"`.\n6. Asserts the handle returns the canned content.\n\n### `terminal_run_command_round_trip`\n\nValidates the full terminal lifecycle through four reverse-RPCs:\n\n1. Client declares `terminal` capability in initialization.\n2. Test retrieves the `TerminalClientHandle` from the mock kernel.\n3. Calls `handle.run_command(\"echo\", [\"hello\"], [], None, None)` via the `AcpTerminalClient` trait.\n4. The adapter issues these requests in sequence:\n   - `terminal/create` → client responds with `TerminalId(\"term-1\")`\n   - `terminal/wait_for_exit` → client responds with exit code `0`\n   - `terminal/output` → client responds with `\"hello world\\n\"`, not truncated\n   - `terminal/release` → client responds with default\n5. Asserts the `AcpTerminalRunResult` contains the expected output, exit code, and truncation flag.\n\n### `session_load_replays_history_to_client`\n\nValidates session reconnection and history replay:\n\n1. Mock kernel is pre-loaded with two history turns: a user message and an assistant response.\n2. Client sends a `LoadSessionRequest` with a stable session ID `\"reconnecting-session\"`.\n3. The adapter calls `fetch_session_history`, then emits two `session/update` notifications.\n4. Asserts the first notification is a `UserMessageChunk` with `\"previous question\"` and the second is an `AgentMessageChunk` with `\"previous answer\"`.\n\n## Relationship to the Codebase\n\n- **`librefang_acp::run_with_transport`** — The server entry point under test. It accepts an `AcpKernel` impl, an `AgentId`, and a `ByteStreams` transport, then serves the ACP JSON-RPC protocol.\n- **`agent_client_protocol`** — Provides the `Client` builder, `ByteStreams` transport, all schema types (`InitializeRequest`, `PromptRequest`, etc.), and the `ConnectionTo` context for sending requests.\n- **`librefang_llm_driver::StreamEvent`** — Defines the streaming event variants (`TextDelta`, `ContentComplete`) that the mock kernel emits.\n- **`librefang_types`** — Core domain types: `AgentId`, `SessionId`, `ApprovalDecision`, `ApprovalEvent`, `ApprovalRequest`, `RiskLevel`, `TokenUsage`, and `StopReason`.\n- **`librefang_kernel_handle::AcpTerminalClient`** — The trait that exposes `run_command` on `TerminalClientHandle`. The terminal test exercises the same path the runtime's `shell_exec` arm uses.\n\n## Running the Tests\n\n```bash\ncargo test -p librefang-acp --test acp_integration\n```\n\nAll tests run on a single tokio thread (`flavor = \"current_thread\"`) with `LocalSet` to support intra-task spawning. No external services, ports, or files are required.","other-librefang-acp":"# Other — librefang-acp\n\n# librefang-acp\n\nAgent Client Protocol (ACP) adapter for LibreFang. Bridges LibreFang's kernel and LLM infrastructure to the [Agent Client Protocol](https://github.com/AcpProtocol/acp), allowing LibreFang agents to run inside editors like Zed, VS Code, and JetBrains over stdio JSON-RPC.\n\n## Overview\n\nACP defines a standard for editor–agent communication. This crate implements the **server side**: it exposes LibreFang as an ACP-compatible agent that any ACP-speaking editor can consume. The transport is stdio-based JSON-RPC, orchestrated by the `agent-client-protocol` and `agent-client-protocol-tokio` workspace crates.\n\nThe crate is intentionally thin on protocol logic — it delegates message parsing, framing, and routing to the upstream ACP libraries. Its real job is **adaptation**: translating between ACP's abstract kernel interface (`AcpKernel`) and LibreFang's concrete kernel.\n\n## Architecture\n\n```mermaid\ngraph LR\n    Editor[Editor<br/>Zed / VS Code / JetBrains] -->|stdio JSON-RPC| AcpServer[ACP Transport<br/>agent-client-protocol-tokio]\n    AcpServer --> AcpAdapter[librefang-acp]\n    AcpAdapter -->|AcpKernel trait| Kernel[LibreFang Kernel]\n    AcpAdapter --> LLM[librefang-llm-driver]\n    AcpAdapter --> Types[librefang-types]\n```\n\n## Key Trait: `AcpKernel`\n\nThe central abstraction in this crate is the `AcpKernel` trait (defined in the `agent-client-protocol` workspace crate). It represents the operations an ACP server needs from its backing agent — session management, message handling, approval requests, and so on.\n\nThere are two ways `AcpKernel` gets implemented:\n\n1. **`KernelAdapter`** (behind the `kernel-adapter` feature) — wraps `Arc<LibreFangKernel>` from `librefang-kernel` and maps each `AcpKernel` method to the corresponding kernel operation. This is the production path, used by `librefang-cli` (in-process) and `librefang-api` (daemon-attached).\n\n2. **Custom implementations** — integration tests and alternative kernel backends implement `AcpKernel` directly, keeping the test/alternative surface free of the heavy `librefang-kernel` dependency tree.\n\n## Feature Flags\n\n| Flag | Default | Effect |\n|------|---------|--------|\n| `kernel-adapter` | off | Pulls in `librefang-kernel`. Provides `KernelAdapter` implementing `AcpKernel` over `Arc<LibreFangKernel>`. |\n\n### Why `kernel-adapter` is optional\n\nThe full kernel dependency tree is heavy. Pure-protocol consumers — integration tests validating JSON-RPC framing, or hypothetical alternative kernel backends — don't need it. They implement `AcpKernel` directly and avoid the compile cost.\n\nThe flag is enabled by `librefang-cli` and `librefang-api`, which are the two crates that actually host a running ACP server connected to a real kernel.\n\n## Dependencies\n\n### Required\n\n| Crate | Role |\n|-------|------|\n| `librefang-types` | Shared type definitions (messages, session IDs, etc.) |\n| `librefang-llm-driver` | LLM backend abstraction for generating responses |\n| `librefang-kernel-handle` | Lightweight handle to a running kernel instance |\n| `agent-client-protocol` | ACP trait definitions and types |\n| `agent-client-protocol-tokio` | Tokio-based ACP transport (stdio framing, JSON-RPC dispatch) |\n| `tokio`, `tokio-util` | Async runtime and codec utilities |\n| `async-trait` | Trait async methods |\n| `serde`, `serde_json` | Serialization |\n| `tracing` | Structured logging |\n| `dashmap` | Concurrent session/conversation state maps |\n| `uuid` | Session and conversation ID generation |\n| `thiserror` | Error type derivation |\n\n### Optional\n\n| Crate | Flag | Role |\n|-------|------|------|\n| `librefang-kernel` | `kernel-adapter` | Full kernel, used by `KernelAdapter` |\n\n### Dev-only\n\n`futures` (for duplex transport `AsyncRead`/`AsyncWrite` bounds in tests) and `chrono` (for `ApprovalRequest` test fixtures). Kept out of the production dependency tree.\n\n## Integration Points\n\n### librefang-cli\n\nThe CLI enables `kernel-adapter` and starts an in-process ACP server over stdio. When an editor launches the CLI as a language server–style subprocess, it gets a full LibreFang agent.\n\n### librefang-api\n\nThe API server enables `kernel-adapter` to host an ACP endpoint attached to a long-running kernel daemon, serving multiple editor connections.\n\n### Integration tests\n\n`tests/acp_integration.rs` exercises the full JSON-RPC message flow — handshake, session creation, conversation turns, approval requests — without pulling in `librefang-kernel`. Tests implement `AcpKernel` with stubs or mocks, using the `futures` crate's duplex transport to simulate the stdio pipe.\n\n## Error Handling\n\nErrors are consolidated through `thiserror`. The main error variants cover:\n\n- **Protocol errors** — malformed JSON-RPC, unexpected message types, missing fields.\n- **Kernel errors** — forwarded from `librefang-kernel` or `librefang-kernel-handle` when the backing kernel rejects an operation.\n- **Transport errors** — stdio pipe closed, framing failures, I/O errors.\n\nAll errors are logged through `tracing` with structured fields (session ID, conversation ID, method name) for observability in editor logs.\n\n## Session Management\n\n`dashmap` provides the concurrent map backing active sessions. Each editor connection gets a session keyed by UUID. Within a session, conversations are tracked so that approval requests (e.g., \"allow this file write?\") can be correlated back to the originating editor prompt and surfaced correctly in the ACP protocol.","other-librefang-api-src":"# Other — librefang-api-src\n\n# LibreFang Login Page (`login_page.html`)\n\n## Overview\n\nA self-contained, single-file HTML page that serves as the authentication gate for the LibreFang dashboard. It includes inline CSS and vanilla JavaScript — no external dependencies, no build step, no framework. The page is served at `/dashboard` and `/dashboard/` and acts as the entry point before the SPA shell loads.\n\n## Purpose\n\n- Collect user credentials (username + password)\n- Optionally collect a TOTP code when two-factor authentication is required\n- Authenticate against the backend API at `POST /api/auth/dashboard-login`\n- Persist the returned session token in `localStorage`\n- Redirect the user to the SPA root (`/`) upon success\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant LoginPage as login_page.html\n    participant API as /api/auth/dashboard-login\n\n    User->>LoginPage: Submit credentials\n    LoginPage->>API: POST {username, password}\n    API-->>LoginPage: {ok, token} or {requires_totp}\n    alt TOTP required\n        LoginPage->>LoginPage: Show TOTP input\n        User->>LoginPage: Submit TOTP code\n        LoginPage->>API: POST {username, password, totp_code}\n        API-->>LoginPage: {ok, token}\n    end\n    LoginPage->>LoginPage: Store token in localStorage\n    LoginPage->>User: Redirect to target path\n```\n\n## Two-Factor Authentication Flow\n\nThe TOTP field (`#totp-row`) is hidden by default. The flow is:\n\n1. User submits username and password.\n2. The API responds with `{ \"requires_totp\": true }`.\n3. The `#totp-row` element is unhidden, the TOTP input receives focus, and a prompt message is shown.\n4. On the next submission, `totp_code` is included in the payload alongside the credentials.\n5. A successful response returns `{ \"ok\": true, \"token\": \"...\" }`.\n\nThe TOTP input is constrained to 6 numeric digits via `inputmode=\"numeric\"`, `pattern=\"[0-9]{6}\"`, and `maxlength=\"6\"`.\n\n## Token Storage\n\nOn a successful login, the JWT or session token returned by the API is stored under the key **`librefang-api-key`** in `localStorage`. The write is wrapped in a `try/catch` to gracefully handle environments where `localStorage` is unavailable (e.g., Safari private browsing).\n\nAny downstream SPA or API client should read the token from this same key.\n\n## Redirect Logic\n\nAfter storing the token, the page determines the redirect target:\n\n```\ncurrent path = \"/\"           → redirect to \"/\"\ncurrent path = \"/dashboard\"  → redirect to \"/\"\ncurrent path = \"/dashboard/\" → redirect to \"/\"\nany other path               → redirect to path + search + hash\n```\n\nThe special-casing of `/dashboard` and `/dashboard/` exists because those paths host the inline login page itself — redirecting back to them would land on a 404 or re-render the login form. All other paths are preserved with their query string and fragment intact, allowing deep-linking into the SPA after authentication.\n\n## Styling\n\nThe page supports both dark and light color schemes via `prefers-color-scheme`:\n\n- **Dark mode** (default): Dark background (`#0b0d12`), card background (`#12151c`), light text.\n- **Light mode**: Light background (`#f6f7fb`), white card, dark text, adjusted via a `@media` block.\n\nThe `:root` declaration `color-scheme: light dark` ensures native form controls also adapt. The layout centers the card vertically and horizontally using CSS Grid (`display: grid; place-items: center`). The card is capped at `380px` wide with `width: min(92vw, 380px)`.\n\n## API Contract\n\nThe page expects the backend endpoint `POST /api/auth/dashboard-login` to accept and return the following shapes:\n\n**Request:**\n```json\n{\n  \"username\": \"string\",\n  \"password\": \"string\",\n  \"totp_code\": \"string (optional, 6 digits)\"\n}\n```\n\n**Response — success:**\n```json\n{\n  \"ok\": true,\n  \"token\": \"string\"\n}\n```\n\n**Response — TOTP required:**\n```json\n{\n  \"requires_totp\": true\n}\n```\n\n**Response — failure:**\n```json\n{\n  \"ok\": false,\n  \"error\": \"string (human-readable message)\"\n}\n```\n\nAll responses are expected to have `Content-Type: application/json`. The page sends `credentials: 'same-origin'` to include cookies if the backend uses them.\n\n## Error Handling\n\nErrors are displayed in the `#err` element with `aria-live=\"polite\"` for screen reader announcements. There are three error paths:\n\n| Condition | Message shown |\n|---|---|\n| API returns `{ error: \"...\" }` | The `error` string from the response |\n| API returns a non-ok response with no `error` field | Generic \"Sign in failed.\" |\n| `fetch` throws a network error | \"Network error.\" |\n\nThe submit button is disabled during the in-flight request and re-enabled in the `finally` block to prevent duplicate submissions.\n\n## Integration Notes\n\n- This file is not part of the SPA build. It is served directly by the backend as a static HTML page at `/dashboard` and `/dashboard/`.\n- The `<meta name=\"robots\" content=\"noindex, nofollow\">` tag prevents search engine indexing.\n- The `autocomplete` attributes are set to `username`, `current-password`, and `one-time-code` to ensure password managers and browser autofill work correctly.\n- The form `action` is not set; submission is handled entirely by the JavaScript `submit` event listener which calls `e.preventDefault()`.","other-librefang-api-static":"# Other — librefang-api-static\n\n# Static Locale Files — `librefang-api/static/locales/`\n\n## Purpose\n\nThis directory holds the **i18n translation catalogs** for the LibreFang web dashboard. Every user-facing string — navigation labels, button text, error messages, toast notifications, section descriptions, and onboarding content — is defined here rather than hardcoded in React components. The frontend's i18n layer (loaded via `react/assets/i18n-*.js`) reads these JSON files at runtime and resolves keys to the user's selected locale.\n\n## Files\n\n| File | Language | Status |\n|---|---|---|\n| `locales/en.json` | English | Primary / source of truth |\n| `locales/ja.json` | Japanese | In-progress translation |\n\nThe English catalog is the canonical source. Other locale files should mirror its key structure exactly, translating only the leaf values.\n\n## Key Namespacing Convention\n\nKeys are organized into **top-level namespaces** that map to UI sections or functional domains. The naming convention uses camelCase for namespaces and keys:\n\n```\nnamespace.subkey.leafKey\n```\n\n### Major namespaces\n\n| Namespace | Scope | Example keys |\n|---|---|---|\n| `nav` | Sidebar navigation | `chat`, `agents`, `settings`, `memory` |\n| `btn` | Shared button labels | `send`, `save`, `delete`, `cancel` |\n| `label` | Generic field labels | `status`, `provider`, `model` |\n| `auth` | API key authentication overlay | `title`, `hint`, `placeholder` |\n| `status` | Connection/state badges | `connecting`, `ready`, `disconnected` |\n| `time` | Relative timestamps | `now`, `minutesAgo`, `hoursAgo` |\n| `overview` | Dashboard overview page | `connectionError`, `recentActivity`, `quickActions` |\n| `agentChat` | Chat interface | `generating`, `thinking`, `welcomeTips`, `cmd.*` |\n| `agentsPage` | Agent management | `createAgent`, `spawnAgent`, `archetype.*` |\n| `sessionsPage` | Session/memory browser | `conversationSessions`, `agentMemory` |\n| `settingsPage` | Settings tabs | `llmProviders`, `coreFeatures.*`, `configurableFeatures.*` |\n| `logsPage` | Live log + audit trail | `auditTitle`, `chainVerified`, `verifyChain` |\n| `approvals` | Execution approval queue | `pendingCount`, `approve`, `reject` |\n| `workflowsPage` | Workflow editor | `createWorkflow`, `mode.*` |\n| `workflowBuilder` | Visual workflow canvas | `nodePalette`, `nodeType.*`, `exportToml` |\n| `schedulerPage` | Cron jobs + event triggers | `cron.*`, `triggerType.*` |\n| `channelsPage` | Messaging channel config | `step.*`, `status.*`, `category.*` |\n| `skillsPage` | Skills & ClawHub browser | `clawHubTab`, `category.*`, `quickStartSkill.*` |\n| `handsPage` | Autonomous capability packages | `activate`, `status.*`, `step.*` |\n| `pluginsPage` | Plugin management | `installedTab`, `source*` |\n| `commsPage` | Inter-agent messaging | `event.*`, `state.*` |\n| `setupWizard` | First-run wizard | `welcomeStep` through `doneStep` |\n| `analyticsPage` | Usage/cost dashboards | `tokenBreakdown`, `dailyCost` |\n| `memoryPage` | Proactive memory viewer | `totalMemories`, `level` |\n| `goalsPage` | Goal tracking | `statusPending`, `addSubGoal` |\n| `security` | Security feature names | `merkleAudit`, `taintTracking` |\n| `profile` | Agent tool profiles | `minimal`, `coding`, `full` |\n| `template` | Agent templates (10 built-in) | `GeneralAssistant`, `CodeHelper`, … |\n| `onboarding` | First-visit banner | `welcome`, `launchWizard` |\n| `provider` | LLM provider setup | `bannerText`, `ollamaDetected` |\n| `detail` | Agent detail panel | `toolFilters`, `fallbacks`, `clone` |\n| `mode` | Agent modes | `observe`, `assist`, `full` |\n| `category` | Agent categories | `general`, `development`, `research` |\n| `theme` | Theme switcher | `light`, `dark`, `system` |\n| `sidebar` | Sidebar hints | `shortcutHint` |\n| `confirm` | Confirmation dialog | `cancel`, `confirm` |\n\nSeveral namespaces have a `*Page2` variant (e.g. `agentsPage2`, `analyticsPage2`) that contains supplementary keys for secondary UI elements — these are typically loaded in extended or refactored views.\n\n## Interpolation\n\nString values use **brace-delimited placeholders** for dynamic content:\n\n```json\n\"minutesAgo\": \"{count}m ago\",\n\"agentsRunning\": \"{count} agent(s) running\",\n\"providerConnected\": \"{provider} connected ({latency}ms)\",\n\"stopAgentConfirm\": \"Stop agent \\\"{name}\\\"? The agent will be shut down.\"\n```\n\nThe frontend i18n runtime substitutes these at render time. When adding keys, follow these rules:\n\n- Use `{variableName}` for substitutions\n- Keep placeholder names semantic: `{count}`, `{name}`, `{provider}`, `{model}`, `{message}`\n- For pluralizable values, let the component logic handle plural/singular; the string itself should be neutral (e.g., `\"{count} agent(s) running\"`)\n\n## Nested sub-namespaces\n\nSome namespaces use deeper nesting to group related keys:\n\n```\nagentChat.cmd.help\nagentChat.cmd.model\nagentChat.toast.modelSwitched\nagentChat.sys.thinkOnDesc\nsettingsPage.coreFeatures.path_traversal.name\nsettingsPage.coreFeatures.path_traversal.description\nschedulerPage.cron.everyMinute\nschedulerPage.triggerType.lifecycle\nskillsPage.quickStartSkill.code-review-guide.name\n```\n\nThese correspond to discrete UI subsections (command definitions, toast messages, system messages, security feature details).\n\n## Relationship to the React Frontend\n\n```mermaid\ngraph LR\n    A[locales/en.json] --> B[i18n runtime]\n    C[locales/ja.json] --> B\n    B --> D[React components]\n    D -->|t(\"overview.recentActivity\")| B\n    B -->|\"Recent Activity\"| D\n```\n\nThe i18n runtime (initialized in `react/assets/i18n-*.js`) loads these JSON files and exposes a `t()` function to all React components. Tests reference the locale data via `react/assets/index-*.js` (the `find` calls in integration tests verify that rendered output contains expected translated strings).\n\nThe locale files are served as **static assets** from the `static/locales/` directory — the Rust API server (`librefang-api`) mounts them via a static file handler, making them available to the browser at runtime.\n\n## Adding a New Locale\n\n1. Copy `en.json` to a new file named with the appropriate [BCP 47](https://tools.ietf.org/html/bcp47) tag (e.g. `de.json`, `fr.json`, `zh-CN.json`)\n2. Translate all leaf string values — **do not** modify any keys\n3. Leave any ICU-format placeholders (`{count}`, `{name}`) untouched in the translated strings\n4. Register the new locale in the frontend i18n configuration (the `i18n-*.js` bundle)\n5. Run the `dashboard/scripts/i18n-parity.mjs` script to verify the new file has parity with `en.json`\n\n### Parity checking\n\nThe `i18n-parity.mjs` script validates that every key in `en.json` exists in all other locale files and vice versa. It flags:\n- Missing keys (present in `en.json` but absent from the target locale)\n- Extra keys (present in the target locale but not in `en.json`)\n\n## Adding New Keys\n\nWhen adding a new UI feature:\n\n1. Choose the appropriate namespace. For a new page, create a new top-level namespace following the `*Page` convention.\n2. Group related strings under sub-keys (e.g., `cmd.*` for commands, `toast.*` for notifications, `status.*` for state labels).\n3. Add the key to **all** locale files. For non-English locales, either provide the translation or copy the English value as a placeholder with a `// TODO` comment in a parallel tracking issue.\n4. Use the established naming patterns:\n   - `*Title` for dialog/section headings\n   - `*Desc` for description text\n   - `*Placeholder` for input placeholders\n   - `*Confirm` for confirmation dialog text\n   - `*Failed` for error toast messages\n   - `*Toast` for success toast messages\n\n## Key Coverage Summary\n\nThe English catalog (`en.json`) contains approximately **850+ translation keys** spanning:\n\n- **22 page-level namespaces** (overview, agents, sessions, settings, logs, approvals, workflows, scheduler, channels, skills, hands, plugins, comms, analytics, memory, goals, runtime, etc.)\n- **10 agent templates** (GeneralAssistant, CodeHelper, Researcher, Writer, DataAnalyst, DevOpsEngineer, CustomerSupport, Tutor, APIDesigner, MeetingNotes)\n- **9 tool profiles** (minimal through full)\n- **8 security core features** with full descriptions\n- **4 configurable security features** with descriptions and tuning hints\n- **3 monitoring features**\n- **18 slash commands** (help, new, reboot, compact, model, think, context, verbose, etc.)\n- **20+ cron presets** (every minute through monthly schedules)\n- **18 skill categories** and **6 channel categories**\n- **4 quick-start skills**","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nHTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate is the primary network surface through which CLI clients, desktop applications, mobile apps, and browser sessions interact with the LibreFang kernel.\n\n## Architecture\n\nThe kernel runs in-process. All external clients connect over this API surface — JSON REST endpoints and WebSocket streams. The bundled React dashboard SPA is embedded into the binary at compile time and served as static assets.\n\n```mermaid\ngraph TB\n    subgraph Clients\n        CLI[CLI Client]\n        Desktop[Desktop App]\n        Mobile[Mobile App]\n        Browser[Browser / Dashboard]\n    end\n\n    subgraph librefang-api\n        Router[Axum Router]\n        MW[Middleware Layer]\n        REST[REST Handlers]\n        WS[WebSocket Handlers]\n        SPA[Static SPA Assets]\n    end\n\n    subgraph In-Process\n        Kernel[librefang-kernel]\n        Channels[librefang-channels]\n        Memory[librefang-memory]\n        LLM[librefang-llm-drivers]\n        Skills[librefang-skills]\n    end\n\n    Clients -->|HTTP/WS| Router\n    Router --> MW\n    MW --> REST\n    MW --> WS\n    Browser -->|GET| SPA\n    REST --> Kernel\n    WS --> Kernel\n    Kernel --> Channels\n    Kernel --> Memory\n    Kernel --> LLM\n    Kernel --> Skills\n```\n\n## Public API Entry Points\n\n| Entry Point | Purpose |\n|---|---|\n| `server::build_router(kernel, addr)` | Assembles the complete axum router and shared `AppState`. This is the main integration point. |\n| `routes::*` | Endpoint handlers organized by domain (agents, sessions, channels, approvals, MCP, peer/A2A networking). |\n| `middleware` | Authentication, rate limiting, and telemetry. Defines route visibility sets: `PUBLIC_ROUTES_ALWAYS`, `PUBLIC_ROUTES_GET_ONLY`, `PUBLIC_ROUTES_DASHBOARD_READS`. |\n| `ws` | WebSocket authentication and streaming handlers. |\n\n## Feature Flags and Channel Adapters\n\nThis crate exposes a granular feature flag system that controls which channel adapters are compiled in. Channel features are forwarded directly to `librefang-channels`.\n\n### Feature Sets\n\n| Feature | Description |\n|---|---|\n| `default` | Enables `core-channels` + `telemetry` |\n| `telemetry` | OpenTelemetry tracing export + Prometheus metrics |\n| `core-channels` | Telegram, Discord, Slack, Webhook, ntfy — lightweight HTTP-only adapters |\n| `mini` | 12 core channels (core-channels + Matrix, Email, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat) |\n| `all-channels` | Every available channel adapter |\n| `all-channels-no-email` | All channels except email — used for Android targets where `rustls-platform-verifier` lacks `new_with_extra_roots` support |\n| `channel-*` | Individual channel toggle (e.g., `channel-telegram`, `channel-discord`) |\n\n### Default Selection Rationale\n\nThe `core-channels` set (5 adapters) keeps plain `cargo build` fast. Each member uses only the workspace HTTP stack (`reqwest` + `rustls`) — no heavy transitive dependencies. Release and packaging pipelines opt into `all-channels` explicitly.\n\nTo add a new member to `core-channels`, verify its dependency tree first. See issues #3655 / #3688 for context on the compilation cost decisions.\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks:\n\n1. **Dashboard embed directory** — Ensures `static/react/` exists so `include_dir!` never fails on fresh clones. This directory is gitignored since it contains build artifacts from `npm run build` in the dashboard subcrate or downloaded release assets. When empty, `include_dir!` embeds nothing and the runtime falls back to serving assets from `~/.librefang/dashboard/`.\n\n2. **Git commit hash** — Captured via `git rev-parse --short HEAD` and exposed as the `GIT_SHA` environment variable.\n\n3. **Build metadata** — `BUILD_DATE` (UTC date) and `RUSTC_VERSION` are captured and embedded for diagnostics.\n\n## Platform-Specific Dependencies\n\n### Unix\n\n- `rustix` (with `process` feature) — used for process management operations.\n- `libc` — low-level system interface.\n\n### Windows\n\n- `windows-sys` (with `Win32_Foundation`, `Win32_Security`, `Win32_Security_Authorization`) — used for SDDL → `SECURITY_DESCRIPTOR` conversion on the ACP named-pipe listener. This restricts the pipe DACL to the daemon's owner SID so other local users cannot connect. See issue #3313. Since `windows-sys` is already a transitive dependency through tokio, adding it as a direct dependency is effectively free.\n\n## Key Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-kernel` | Core agent OS runtime — runs in-process |\n| `librefang-kernel-handle` | Typed handle to the kernel instance |\n| `librefang-types` | Shared type definitions across the workspace |\n| `librefang-channels` | Channel adapter implementations (feature-gated) |\n| `librefang-llm-drivers` | LLM provider integrations |\n| `librefang-memory` | Conversation memory and context management |\n| `librefang-wire` | Wire protocol types for WebSocket communication |\n| `librefang-skills` | Agent skill system |\n| `librefang-hands` | Tool/hand execution |\n| `librefang-extensions` | Extension loading and management |\n| `librefang-acp` | Agent Client Protocol implementation (with `kernel-adapter` feature) |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-telemetry` | Telemetry infrastructure |\n| `librefang-http` | Shared HTTP utilities |\n| `axum` | Async web framework |\n| `tower-http` | Middleware (CORS, compression, tracing, etc.) |\n| `utoipa` | OpenAPI schema generation |\n| `governor` | Rate limiting |\n\n## Authentication and Middleware\n\nThe middleware layer controls route access through three route sets:\n\n- **`PUBLIC_ROUTES_ALWAYS`** — Accessible without authentication (e.g., login, health checks).\n- **`PUBLIC_ROUTES_GET_ONLY`** — Read-only endpoints that don't require auth for GET requests.\n- **`PUBLIC_ROUTES_DASHBOARD_READS`** — Dashboard-specific read endpoints.\n\nAuthentication uses JWT tokens (`jsonwebtoken`), with password hashing via `argon2` and HMAC-SHA256 for signature verification (`hmac` + `sha2`). Constant-time comparison (`subtle`) prevents timing attacks on token validation.\n\n## OpenAPI Specification\n\nThe committed `openapi.json` at the workspace root is generated by `utoipa` and regenerated via:\n\n```bash\ncargo xtask codegen --openapi\n```\n\nDrift is verified in CI using hash baselines stored in `xtask/baselines/`.\n\n## Dashboard SPA\n\nThe React dashboard lives under `dashboard/` (TypeScript / React / TanStack Query). It is built by `cargo xtask build-web` and embedded into the binary via `include_dir!`. The dashboard source is a separate subcrate; this crate only consumes its build output.\n\n## Telemetry\n\nWhen the `telemetry` feature is enabled:\n\n- **Tracing** — Exported via OpenTelemetry OTLP protocol.\n- **Metrics** — Exposed through a Prometheus exporter endpoint.\n\nBoth are optional to keep the dependency tree minimal for embedded or resource-constrained deployments.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels Benchmarks — Dispatch Hot Paths\n\n## Overview\n\nThe `dispatch.rs` benchmark suite measures the performance of three critical hot paths in the `librefang-channels` crate using [Criterion](https://bheisler.github.io/criterion.rs/):\n\n| Category | What it measures | Benches affected |\n|---|---|---|\n| **Serialization** | JSON round-trip cost of `ChannelMessage` | 3 benchmarks |\n| **Routing** | Agent resolution latency across dispatch strategies | 4 benchmarks |\n| **Formatting** | Markdown-to-channel format conversion, message splitting, emoji lookup | 8 benchmarks |\n\nThese benchmarks cover the per-message overhead incurred on every incoming and outgoing channel event. Regression in any of these paths directly impacts message throughput.\n\n## Running\n\n```bash\n# All benchmarks\ncargo bench -p librefang-channels\n\n# Single group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n\n# Single benchmark by name\ncargo bench -p librefang-channels -- router_resolve_direct\n```\n\nCriterion groups are registered via `criterion_main!` at the bottom of the file:\n\n```\ncriterion_main!(serialization, routing, formatting);\n```\n\n## Benchmark Groups\n\n### Serialization (`serialization` group)\n\nMeasures `serde_json` overhead on `ChannelMessage`, a struct containing strings, an enum (`ChannelContent`), an optional `AgentId`, a `DateTime<Utc>`, and a `HashMap<String, String>` for metadata.\n\n| Benchmark | Operation |\n|---|---|\n| `message_serialize` | `serde_json::to_string(&msg)` |\n| `message_deserialize` | `serde_json::from_str::<ChannelMessage>(&json)` |\n| `message_roundtrip` | Serialize then deserialize in one iteration |\n\nThe sample message is constructed by `make_sample_message()` with a Telegram channel, a text content payload, and a populated sender. All three benches call this helper once in setup; only the iteration body is measured.\n\n**What to watch for:** Adding fields to `ChannelMessage` or changing `serde` attributes (e.g., `#[serde(flatten)]`) can shift both serialize and deserialize timings.\n\n### Routing (`routing` group)\n\nMeasures `AgentRouter::resolve` and `resolve_with_context` under four scenarios of increasing complexity:\n\n#### `router_resolve_direct`\n\nThe fastest path. A direct route is registered via `set_direct_route(\"telegram\", \"user-42\", agent)`, then `resolve` is called with a matching channel + peer. This hits a direct map lookup.\n\n#### `router_resolve_default_fallback`\n\nNo bindings match. The router falls through to the default agent set via `set_default`. Measures the cost of a cache miss on direct routes followed by the default fallback.\n\n#### `router_resolve_binding_match`\n\nBindings are loaded from an `AgentBinding` config (match on `channel` + `peer_id`). Tests the cost of evaluating match rules against incoming channel + user. The agent is first registered with `register_agent(\"support\", agent)`, then `load_bindings` is called.\n\n#### `router_resolve_with_context`\n\nThe richest resolution path. Uses `resolve_with_context` with a `BindingContext` that includes `guild_id` and `roles`. The binding rule matches on `channel`, `guild_id`, and `roles`. This exercises the full context-aware matching logic including role set intersection.\n\n**What to watch for:** The number of loaded bindings and the complexity of `BindingMatchRule` fields (especially `roles` as a vec) scale the per-resolve cost. If binding count grows, this is where you'll see it first.\n\n### Formatting (`formatting` group)\n\nExercises `format_for_channel` (from `librefang_channels::formatter`) across all `OutputFormat` variants, plus `split_message` and `default_phase_emoji`.\n\n#### Format conversion benchmarks\n\nTwo input sizes are used:\n- `SAMPLE_MARKDOWN` — a multi-paragraph string (~300 chars) with bold, italic, inline code, and links.\n- `SHORT_TEXT` — `\"Hello world!\"` (12 chars).\n\n| Benchmark | Input | OutputFormat |\n|---|---|---|\n| `format_markdown_passthrough` | `SAMPLE_MARKDOWN` | `Markdown` |\n| `format_telegram_html` | `SAMPLE_MARKDOWN` | `TelegramHtml` |\n| `format_slack_mrkdwn` | `SAMPLE_MARKDOWN` | `SlackMrkdwn` |\n| `format_plain_text` | `SAMPLE_MARKDOWN` | `PlainText` |\n| `format_telegram_html_short` | `SHORT_TEXT` | `TelegramHtml` |\n\nThe short-text benchmark isolates the per-call overhead (function call, format dispatch) from the per-character parsing cost.\n\n#### Message splitting benchmarks\n\n| Benchmark | Input | Chunk limit |\n|---|---|---|\n| `split_message_short` | `\"Hello!\"` | 4096 |\n| `split_message_long` | 500 lines (~9 KB) | 4096 |\n\n`split_message` is called with a 4096-character Telegram limit. The long variant exercises the line-boundary splitting algorithm under realistic multi-chunk conditions.\n\n#### Emoji lookup benchmark\n\n`default_phase_emoji_all` iterates over all six `AgentPhase` variants (`Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, `Error`) in a single iteration. This is a micro-benchmark to catch regressions if emoji resolution becomes non-trivial (e.g., loading from a map instead of a match expression).\n\n## Shared Test Fixtures\n\n### `make_sample_message()`\n\nConstructs a `ChannelMessage` with:\n- `channel`: `ChannelType::Telegram`\n- `platform_message_id`: `\"msg-12345\"`\n- `sender`: `ChannelUser` with `platform_id: \"user-42\"`, `display_name: \"Alice\"`, no linked user\n- `content`: `ChannelContent::Text(\"Hello, how can you help me today?\")`\n- `target_agent`: `None`\n- `timestamp`: `Utc::now()`\n- `is_group`: `false`\n- `metadata`: empty `HashMap`\n\nThis is representative of a typical inbound message. If the `ChannelMessage` schema evolves, this fixture should be updated to match.\n\n## External Dependencies\n\nThe benchmarks exercise code from these `librefang-channels` modules:\n\n```\ndispatch.rs\n├── types.rs       → ChannelMessage, ChannelUser, ChannelContent, ChannelType,\n│                    split_message, default_phase_emoji, AgentPhase\n├── router.rs      → AgentRouter, BindingContext\n│                    methods: new, set_default, set_direct_route,\n│                    register_agent, load_bindings, resolve, resolve_with_context\n├── formatter.rs   → format_for_channel\n└── librefang_types::config → AgentBinding, BindingMatchRule, OutputFormat\n    librefang_types::agent  → AgentId\n```\n\n## Interpreting Results\n\nCriterion outputs median and mean iteration times along with a change estimate against the previous run. Key thresholds to care about:\n\n- **Serialization**: Should remain under a few microseconds for a single message. A jump likely indicates a `serde` attribute change or a new heavy field type.\n- **Routing**: `router_resolve_direct` should be near-instant (hash lookup). `router_resolve_with_context` is the ceiling — if it exceeds a few hundred nanoseconds, review the binding matching algorithm.\n- **Formatting**: The `format_telegram_html` benchmark is the most complex parser path. Compare against `format_markdown_passthrough` to see how much overhead the actual format conversion adds beyond identity return.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# librefang-channels Integration Tests\n\n## Purpose\n\nIntegration tests that exercise the **full `BridgeManager` dispatch pipeline** end-to-end. Every test wires real production components (`BridgeManager`, `AgentRouter`) against mock implementations of `ChannelAdapter` and `ChannelBridgeHandle`, sending messages through tokio channels and asserting on the results. No external services are contacted.\n\n## Architecture\n\n```mermaid\ngraph LR\n    T[Test injects message via mpsc::Sender] --> A[MockAdapter]\n    A -->|start() returns Stream| BM[BridgeManager]\n    BM -->|dispatch_message| H[MockHandle / MockStreamingHandle]\n    H -->|echo response| BM\n    BM -->|send() / send_streaming()| A\n    A -->|captured in Arc<Mutex<Vec>>| assertions\n\n    subgraph Production Components\n        BM\n        R[AgentRouter]\n    end\n\n    subgraph Test Doubles\n        A\n        H\n    end\n\n    BM --- R\n```\n\n## Key Utility: `wait_until`\n\n```rust\nasync fn wait_until<F>(label: &str, mut cond: F)\nwhere\n    F: FnMut() -> bool,\n```\n\nReplaces fixed `tokio::time::sleep` with a **2-second deadline-bounded poll** (5ms tick interval). This gives the async dispatch pipeline exactly as much time as it needs while failing fast on regressions. The 2-second budget is generous for in-process communication but catches stuck dispatches quickly.\n\nUse this in every test instead of arbitrary sleeps. The `label` parameter appears in the panic message on timeout, making flake diagnosis trivial.\n\n## Mock Implementations\n\n### MockAdapter\n\nBasic `ChannelAdapter` that does **not** support streaming. Used for Discord/Slack/WebChat-style adapters.\n\n| Method | Behavior |\n|--------|----------|\n| `start()` | Returns a `ReceiverStream` from an `mpsc::Receiver<ChannelMessage>` |\n| `send()` | Captures `(platform_id, text)` pairs into `Arc<Mutex<Vec<...>>>`. Flattens `Interactive` button labels into text. |\n| `stop()` | Sends `true` on a `watch` channel |\n| `supports_streaming()` | Returns `false` (default) |\n\nCreated via `MockAdapter::new(name, channel_type)` which returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`. Inject test messages through the sender; read captured responses via `get_sent()`.\n\n### MockStreamingAdapter\n\n`ChannelAdapter` that **does** support streaming. Tracks both `send()` and `send_streaming()` calls separately so tests can assert which path was taken.\n\n| Method | Behavior |\n|--------|--
