llowing security flags:\n\n| Flag | Default | Purpose |\n|---|---|---|\n| `--memory` | `512m` | Prevent memory exhaustion |\n| `--cpus` | `1.0` | CPU ceiling |\n| `--pids-limit` | `100` | Fork-bomb mitigation |\n| `--cap-drop ALL` | always | Remove all Linux capabilities |\n| `--security-opt no-new-privileges` | always | Prevent privilege escalation |\n| `--network` | `none` | No network access by default |\n| `--read-only` | enabled | Immutable root filesystem |\n| `--tmpfs` | `/tmp:size=64m` | Writable tmpfs where needed |\n\nCapabilities in `config.cap_add` are conditionally restored — each entry is validated as `[A-Za-z0-9_]+` before being passed to `--cap-add`. Invalid entries are logged and skipped.\n\nThe agent's workspace directory is mounted **read-only** at the configured `workdir` (default `/workspace`). The container runs `sleep infinity` to stay alive for subsequent exec calls.\n\n### `exec_in_sandbox(container, command, timeout) -> Result<ExecResult, String>`\n\nExecutes a command inside a running container via `docker exec ... sh -c <command>`. Before execution:\n\n1. **`validate_command`** rejects empty commands and any containing shell metacharacters (see [Command Validation](#command-validation))\n2. A `tokio::time::timeout` wraps the entire operation — a `Duration` exceeded error is returned on timeout\n3. Output is truncated at 50,000 characters using char-boundary-safe slicing to avoid UTF-8 panics\n\n### `destroy_sandbox(container) -> Result<(), String>`\n\nForce-stops and removes the container (`docker rm -f`). Failures are logged as warnings but do not propagate as errors — the caller can continue even if the container was already gone.\n\n### `is_docker_available() -> bool`\n\nProbes `docker version --format {{.Server.Version}}`. Returns `true` only if Docker is installed, the daemon is reachable, and responds with a server version.\n\n## Command Validation\n\n`validate_command` delegates to `helpers::contains_shell_metacharacters`, which applies a two-pass analysis:\n\n**First pass — always blocked (including inside quotes):**\n- Embedded newlines (`\\n`, `\\r`)\n- Null bytes (`\\0`)\n\n**Second pass — blocked outside quoted regions:**\n\nThe function calls `strip_quoted_regions` to remove content inside single quotes (`'...'`) and double quotes (`\"...\"` with backslash escapes). On the remaining unquoted text, it blocks:\n\n| Pattern | Rejection reason |\n|---|---|\n| `` ` `` | Backtick command substitution |\n| `$(` | `$()` command substitution |\n| `${` | Variable expansion |\n| `;` | Command chaining |\n| `\\|` | Pipe operator |\n| `>`, `<` | I/O redirection |\n| `{`, `}` | Brace expansion |\n| `&` | Background/ampersand operator |\n\nThis means `python script.py` and `ls -la /workspace` are allowed, but `echo $(id)`, `cat /etc/passwd | grep root`, and `echo hello; rm -rf /` are rejected.\n\n## Container Pool\n\n`ContainerPool` enables container reuse across sessions, avoiding the overhead of repeated `docker run` / `docker rm` cycles.\n\n```rust\nlet pool = ContainerPool::new();\n\n// Return a container to the pool\npool.release(container, config_hash(&config));\n\n// Retrieve a matching container (same config, idle >= cool_secs)\nif let Some(container) = pool.acquire(config_hash(&config), 30) {\n    // reuse\n}\n\n// Reclaim resources periodically\npool.cleanup(idle_timeout_secs: 300, max_age_secs: 3600).await;\n```\n\n**How it works:**\n\n- Backed by `DashMap<String, PoolEntry>` for lock-free concurrent access\n- `PoolEntry` tracks `config_hash`, `last_used` instant, and `created` instant\n- `acquire(config_hash, cool_secs)` scans for an entry matching the hash that has been idle at least `cool_secs` seconds, then removes it from the map\n- `release` inserts the container with the current timestamp\n- `cleanup` destroys containers that exceed idle timeout or max age, removing them from both Docker and the map\n\n### `config_hash(config) -> u64`\n\nHashes `image`, `network`, `memory_limit`, and `workdir` into a `u64`. Containers with different configurations will have different hashes and won't be cross-reused from the pool.\n\n## Bind Mount Validation\n\n`validate_bind_mount(path, blocked)` performs multi-layer security checks before any host path is mounted into a container:\n\n**Layer 1 — Structural checks:**\n- Path must be absolute (`/...`)\n- Path traversal (`..`) components are rejected\n\n**Layer 2 — Default blocked paths:**\n\nThese paths are always blocked regardless of configuration:\n\n```\n/etc, /proc, /sys, /dev, /var/run/docker.sock, /root, /boot\n```\n\n**Layer 3 — User-configured blocked paths:**\n\nThe `blocked` parameter accepts additional paths from configuration.\n\n**Layer 4 — Symlink escape detection:**\n\nIf the path exists, it is canonicalized via `std::fs::canonicalize` and the resolved path is re-checked against all blocked lists. If the path does not yet exist, the function walks up the ancestor chain to find the nearest existing directory, canonicalizes that, then appends the remaining path components and checks the combined result. This prevents an attacker from pre-creating a symlink at a non-existent path that later resolves into a blocked location.\n\n## Helpers Module\n\n`pub mod helpers` contains self-contained copies of string utilities from `librefang-runtime`. These are duplicated here to avoid a cyclic dependency back into the parent runtime crate.\n\n| Function | Mirrors |\n|---|---|\n| `safe_truncate_str(s, max_bytes)` | `librefang_runtime::str_utils::safe_truncate_str` |\n| `contains_shell_metacharacters(command)` | `librefang_runtime::subprocess_sandbox::contains_shell_metacharacters` |\n| `strip_quoted_regions(command)` | (internal helper for the above) |\n\nThe parent crate runs a parity test (`crates/librefang-runtime/tests/docker_sandbox_helpers_parity.rs`) that asserts these implementations match the canonical versions byte-for-byte, preventing silent drift if the denylist is updated upstream.\n\n## Default Configuration\n\nThe `DockerSandboxConfig` defaults (from `Default`):\n\n| Field | Default |\n|---|---|\n| `enabled` | `false` |\n| `image` | `python:3.12-slim` |\n| `container_prefix` | `librefang-sandbox` |\n| `workdir` | `/workspace` |\n| `network` | `none` |\n| `memory_limit` | `512m` |\n| `cpu_limit` | `1.0` |\n| `timeout_secs` | `60` |\n| `read_only_root` | `true` |\n| `cap_add` | `[]` |\n| `tmpfs` | `[\"/tmp:size=64m\"]` |\n| `pids_limit` | `100` |\n\n## Integration Pattern\n\nThis crate sits below `librefang-runtime` and is called when the runtime needs to execute untrusted agent code under OS-level isolation. A typical session:\n\n```rust\nlet container = create_sandbox(&config, \"agent-xyz\", workspace_path).await?;\nlet result = exec_in_sandbox(&container, \"python solve.py\", Duration::from_secs(30)).await?;\n// ...inspect result.exit_code, result.stdout, result.stderr...\ndestroy_sandbox(&container).await?;\n```\n\nWith pooling enabled, the runtime wraps this with `ContainerPool` acquire/release calls to amortize container startup cost across multiple agent sessions sharing the same configuration.","runtime-subsystems":"# Runtime Subsystems\n\n# Runtime Subsystems\n\nThe runtime subsystems are the operational core of the LibreFang agent daemon. They provide four independent but complementary capabilities that together handle **external tool connectivity**, **media processing**, **secure code execution**, and **tamper-evident auditing**.\n\n```mermaid\ngraph LR\n    subgraph \"Agent Runtime\"\n        Kernel[Kernel / Tool Runner]\n    end\n\n    subgraph \"Runtime Subsystems\"\n        MCP[MCP Client]\n        Media[Media Engine]\n        Sandbox[Docker Sandbox]\n        Audit[Audit Trail]\n    end\n\n    Kernel -->|\"tool invocation\"| MCP\n    Kernel -->|\"image / audio / video\"| Media\n    Kernel -->|\"code execution\"| Sandbox\n    MCP -->|\"security-critical events\"| Audit\n    Sandbox -->|\"security-critical events\"| Audit\n    Media -->|\"security-critical events\"| Audit\n```\n\n## Sub-modules\n\n| Sub-module | Purpose |\n|---|---|\n| [MCP Client](librefang-runtime-mcp-src.md) | Connects to external MCP servers, discovers tools, scans arguments for tainted data, and invokes tools over stdio/SSE/HTTP transports. All tools are namespaced as `mcp_{server}_{tool}`. |\n| [Media Engine](librefang-runtime-media-src.md) | Provider-agnostic media generation (TTS via OpenAI, ElevenLabs, MiniMax, Google Cloud TTS) and understanding (image description, audio transcription, video analysis) behind a uniform `MediaDriver` trait. |\n| [Docker Sandbox](librefang-runtime-sandbox-docker-src.md) | OS-level isolation for agent code execution. Manages container creation, command validation, bind-mount sanitization, and container pooling with defense-in-depth against escape and injection. |\n| [Audit Trail](librefang-runtime-audit-src.md) | Append-only, Merkle-hash-chained audit log persisted to SQLite. Detects tampering via `verify_integrity` and anchors the chain tip to an external file. |\n\n## Cross-subsystem workflows\n\n**Tool invocation → Audit.** The MCP client and Docker sandbox are the primary producers of security-critical events. When a tool is invoked through MCP or a command is executed in a sandbox, the action is recorded in the audit trail's Merkle chain, ensuring post-incident forensics cannot be silently altered.\n\n**OAuth discovery → SSRF protection.** MCP server authentication (`auth_start`) flows through OAuth metadata discovery (`discover_oauth_metadata`), which resolves and validates the metadata URL against blocked hosts (`is_ssrf_blocked_host_impl`), including IPv6-embedded IPv4 checks. The resulting HTTP client is built with TLS configuration from `librefang-http`.\n\n**Taint scanning → Argument safety.** Before any MCP tool invocation, arguments are walked via `walk_taint` and checked against `is_sensitive_key_name` to prevent secrets from leaking into external tool calls. Scan errors are explicitly non-revealing.\n\n**Media understanding → Provider routing.** The `MediaEngine` routes requests (image description, audio transcription, video analysis) to the appropriate provider backend. Each backend is accessed through a `MediaDriverCache` that manages instantiated drivers and resolves provider aliases via `new_with_urls`.\n\n## Key design principles\n\n- **Defense-in-depth**: Sandboxing uses layered validation (image names, container names, command metacharacter detection, symlink canonicalization). Audit uses both in-database Merkle chains and out-of-band anchor files.\n- **Provider agnosticism**: Media backends are interchangeable behind the `MediaDriver` trait, with capabilities queries so callers can fail gracefully when a provider doesn't support a given operation (e.g., Gemini TTS).\n- **Namespace isolation**: MCP tools from different servers never collide, and environment variable expansion is gated by an explicit allowlist.","shared-types-configuration":"# Shared Types & Configuration\n\n# Agent Types (`librefang-types/src/agent.rs`)\n\nThis module defines the shared type system for agent identity, manifests, lifecycle state, scheduling, resource quotas, and session resolution. It is the single source of truth used by the kernel, runtime, API layer, and CLI — any crate that needs to reason about what an agent *is* or *does* depends on these types.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Identity\n        AID[AgentId] --- UID[UserId]\n        AID --- SID[SessionId]\n    end\n    subgraph Configuration\n        AM[AgentManifest] --> MC[ModelConfig]\n        AM --> RQ[ResourceQuota]\n        AM --> SM[ScheduleMode]\n        AM --> AC[AutonomousConfig]\n        AM --> TP[ToolProfile]\n        AM --> MCap[ManifestCapabilities]\n        AM --> MT[ManifestTrigger]\n        AM --> CO[CompactionOverrides]\n        AM --> SWC[SkillWorkshopConfig]\n    end\n    subgraph Runtime State\n        AE[AgentEntry] --> AS[AgentState]\n        AE --> AM2[AgentMode]\n        AE --> AM\n    end\n```\n\n## Identifiers\n\nAll identifiers are newtype wrappers around `Uuid` with deterministic derivation via UUID v5 (SHA-1 + namespace). This ensures the same logical entity always maps to the same UUID across daemon restarts, preserving session history, audit logs, and cron-job associations.\n\n### `AgentId`\n\n| Constructor | Determinism | Use Case |\n|---|---|---|\n| `AgentId::new()` | Random (v4) | One-off agents |\n| `AgentId::from_name(name)` | Deterministic (v5, `agent:{name}`) | Named agents in config |\n| `AgentId::from_hand_id(hand_id)` | Deterministic (v5, bare `hand_id`) | Hand instances (backward compat) |\n| `AgentId::from_hand_agent(hand_id, role, instance_id)` | Deterministic (v5) | Multi-agent hand roles |\n\nAll deterministic derivation uses a single `AgentId::NAMESPACE` with typed prefixes (`agent:`, `hand:`) to prevent collisions between agents and hands that share the same name.\n\n**Backward compatibility note**: `from_hand_agent` with `instance_id: None` produces `\"{hand_id}:{role}\"` (legacy format). With `Some(id)`, it produces `\"{hand_id}:{role}:{id}\"`. Existing single-instance hands must pass `None` to keep their original IDs.\n\n### `UserId`\n\nSame pattern: `UserId::new()` for random, `UserId::from_name(name)` for deterministic v5 derivation using `LIBREFANG_USER_NAMESPACE`. The namespace constant is frozen — changing it would rotate every existing `UserId` and break audit-log correlation.\n\n### `SessionId`\n\nSession IDs have multiple derivation paths, each using a distinct UUID v5 namespace to prevent collisions:\n\n| Method | Namespace | Input | Purpose |\n|---|---|---|---|\n| `SessionId::new()` | — (v4) | — | Fresh random session |\n| `SessionId::for_channel(agent_id, channel)` | `CHANNEL_SESSION_NAMESPACE` | `\"{agent_id}:{channel}\"` | Per-channel persistent session |\n| `SessionId::for_sender_scope(agent_id, channel, chat_id)` | `CHANNEL_SESSION_NAMESPACE` | `\"{channel}:{chat_id}\"` or `\"{channel}\"` | Canonical scope (single source of truth for #4868) |\n| `SessionId::for_cron_run(agent_id, run_key)` | `CRON_RUN_SESSION_NAMESPACE` | `\"{agent_id}:{run_key}\"` | Per-fire cron isolation |\n| `SessionId::from_route_key(agent_id, channel, account, conversation)` | `CHANNEL_SESSION_NAMESPACE` | v2 format when account non-empty | Multi-tenant routing |\n\n**Session resolution precedence** (documented on `AgentManifest::session_mode`):\n\n1. Explicit `session_id_override` from dispatch caller — always wins\n2. Per-trigger `session_mode` override\n3. Channel branch — always uses `for_channel`, overrides manifest when `SenderContext.channel` is present\n4. Cron — synthesizes channel `\"cron\"` or uses per-job override\n5. Manifest `session_mode` — final fallback\n\n`for_sender_scope` is the canonical scope formula shared by the kernel's inbound resolver, channel-bridge commands, and the agent-execution path. Do not inline the scope construction — call this method to avoid drift.\n\n`from_route_key` is backward-compatible: when `account` is empty, it falls through to `for_channel` semantics. When `account` is non-empty, it uses a `v2:` prefix to produce IDs in a disjoint hash space.\n\n## Agent Manifest (`AgentManifest`)\n\nThe complete declarative configuration for an agent, typically loaded from `agent.toml`. Key field groups:\n\n### Core Identity\n- `name`, `version`, `description`, `author` — metadata\n- `module` — path to agent code (`\"builtin:chat\"`, WASM file, Python file)\n- `enabled` — disabled agents are not spawned on startup\n\n### Model Configuration\n- `model: ModelConfig` — provider, model name, temperature, system prompt, context window overrides, provider-specific `extra_params` (flattened into API request body via `#[serde(flatten)]`)\n- `fallback_models: Vec<FallbackModel>` — chain tried in order on primary failure\n- `routing: Option<ModelRoutingConfig>` — auto-select cheap/mid/expensive models by token-count thresholds\n- `pinned_model: Option<String>` — override for Stable mode\n- `thinking: Option<ThinkingConfig>` — per-agent extended thinking budget override\n\n`ModelConfig.model` accepts a `#[serde(alias = \"name\")]` so both `model = \"...\"` and `name = \"...\"` work in TOML.\n\n### Scheduling\n- `schedule: ScheduleMode` — `Reactive` (event-driven), `Periodic { cron }`, `Proactive { conditions }`, or `Continuous { check_interval_secs }`\n- `session_mode: SessionMode` — `Persistent` (reuse session) or `New` (fresh session per invocation)\n\n### Resource Limits (`ResourceQuota`)\n\n| Field | Default | Notes |\n|---|---|---|\n| `max_memory_bytes` | 256 MB | WASM memory |\n| `max_cpu_time_ms` | 30,000 | Per invocation |\n| `max_tool_calls_per_minute` | 60 | — |\n| `max_llm_tokens_per_hour` | `None` (inherit global) | `Some(0)` = unlimited |\n| `burst_ratio` | `None` (→ 0.2) | Fraction of hourly budget per minute, clamped `[0.01, 1.0]` |\n| `max_cost_per_hour_usd` | 0.0 (unlimited) | — |\n| `max_cost_per_day_usd` | 0.0 | — |\n| `max_cost_per_month_usd` | 0.0 | — |\n\nUse `effective_token_limit()` and `effective_burst_ratio(global_default)` to resolve `None` into concrete values at enforcement time.\n\n### Tool Access Control\n\nTools are resolved through a multi-layer filter pipeline:\n\n1. **`tools_disabled: bool`** — master kill switch, overrides everything\n2. **`profile: Option<ToolProfile>`** — named preset expands to tool list + capabilities\n3. **`tool_allowlist`** — if non-empty, only these tools pass\n4. **`tool_blocklist`** — applied after allowlist\n5. **`mode: AgentMode`** — runtime permission filter (`Observe` = no tools, `Assist` = read-only, `Full` = all)\n\nTool profiles expand via `ToolProfile::tools()` and `ToolProfile::implied_capabilities()`:\n\n| Profile | Tool Count | Capabilities |\n|---|---|---|\n| `Minimal` | 2 | No network, no shell |\n| `Coding` | 5 | Network + shell |\n| `Research` | 4 | Network, no shell |\n| `Messaging` | 6 | Agent spawn + memory |\n| `Automation` | 12 | All capabilities |\n| `Full` / `Custom` | `[\"*\"]` | All capabilities |\n\n### Autonomous Agent Guardrails (`AutonomousConfig`)\n\nFor 24/7 agents:\n- `quiet_hours` — cron expression for downtime\n- `max_iterations` — cap on LLM iterations per invocation (default 50, policy constant `DEFAULT_MAX_ITERATIONS`)\n- `max_restarts` — before permanent stop\n- `heartbeat_interval_secs` / `heartbeat_timeout_secs` — health monitoring\n- `heartbeat_channel` — where to send heartbeat status\n\n### Declarative Triggers (`ManifestTrigger`)\n\nTriggers in `agent.toml` are reconciled against the runtime trigger store on spawn/reload:\n- Missing entries are created\n- Drifted entries are updated (TOML wins)\n- Runtime-only triggers follow `reconcile_orphans` policy (`Keep` / `Warn` / `Delete`)\n\nThe `pattern` field is a raw `serde_json::Value` — it's deserialized at reconcile time using the same `preprocess_pattern_json` normalization as the API route, so new `TriggerPattern` variants don't require coordinated crate edits.\n\n### Per-Agent Overrides\n\nSeveral fields override kernel-global settings:\n\n| Field | Global Config Section | Scope |\n|---|---|---|\n| `compaction` | `[compaction]` | `CompactionOverrides.resolve(global)` |\n| `thinking` | `[thinking]` | Direct replacement |\n| `exec_policy` | `[tool_exec]` | Direct replacement |\n| `tool_exec_backend` | `[tool_exec]` | `BackendKind` selection |\n| `channel_overrides` | Per-channel config | `ChannelOverrides` |\n| `max_history_messages` | `max_history_messages` | Trim cap |\n| `max_concurrent_invocations` | `queue.concurrency.default_per_agent` | Per-agent semaphore (NOT hot-reloaded) |\n| `proactive_memory` | `[proactive_memory]` | Per-field opt-out |\n\n`CompactionOverrides.resolve()` merges per-agent `Some(_)` values on top of the global `CompactionTomlConfig`, returning a fresh config without mutating the global. `token_threshold_ratio` is clamped to `[0.0, 1.0]` during resolution.\n\n### Skill Workshop (`SkillWorkshopConfig`)\n\nOpt-in passive capture of reusable workflows from successful interactions. Default is `enabled: false`. When enabled:\n- `review_mode: Heuristic` — pattern match only, no LLM cost\n- `approval_policy: Pending` — candidates wait for human review in `~/.librefang/skills/pending/`\n- `max_pending: 20` — LRU eviction\n\n### Workspaces\n\n```toml\n[workspaces]\nlibrary = { path = \"shared/library\", mode = \"rw\" }\nvault   = { mount = \"/Users/me/Obsidian\", mode = \"r\" }\n```\n\n`WorkspaceDecl` supports two mutually exclusive modes:\n- **`path`** — relative to `workspaces_dir`, auto-created\n- **`mount`** — absolute host path, must be in `allowed_mount_roots`\n\n### Concurrency Control\n\n`max_concurrent_invocations` scopes to trigger-dispatch fan-out only. Channel messages, cron jobs, and `agent_send` are not throttled by this knob. Caps > 1 require `session_mode = \"new\"` on the manifest — parallel writes to a single persistent session are undefined and auto-clamped to 1 with a `WARN` log.\n\n**Hot-reload caveat**: the per-agent semaphore is sized on first dispatch and is not invalidated by manifest swap. To pick up a new cap, kill and respawn the agent.\n\n## Runtime State (`AgentEntry`)\n\nThe kernel's registry entry for a live agent:\n\n- `id`, `name`, `manifest` — identity and configuration\n- `state: AgentState` — lifecycle (`Created` → `Running` → `Suspended` / `Terminated` / `Crashed`)\n- `mode: AgentMode` — permission filter (`Observe` / `Assist` / `Full`)\n- `session_id` — active session\n- `parent` / `children` — spawn hierarchy\n- `force_session_wipe` — next invocation clears message history (priority over `resume_pending`)\n- `resume_pending` — agent interrupted by restart, will resume on same transcript\n- `has_processed_message` — sticky flag for heartbeat monitor; distinguishes \"never received work\" from \"genuinely hanging\"\n\n## Agent Name Validation\n\n`validate_agent_name(name)` rejects names starting with `_operator:` — this prefix is reserved for synthetic workflow-engine node names (Wait / Gate / Approval / Transform / Branch) that appear in run history. A user-supplied name collision would make the dashboard ambiguous.\n\n## Session Labels (`SessionLabel`)\n\nValidated human-readable labels (1–128 chars, alphanumeric + spaces + hyphens + underscores). Created via `SessionLabel::new(label)` which returns `Err(InvalidInput)` on validation failure.\n\n## A/B Prompt Experiments\n\n`PromptExperiment` and `ExperimentVariant` support controlled prompt testing with:\n- Traffic splitting\n- Success criteria (user helpfulness, tool error presence, non-empty output, custom score)\n- Per-variant metrics (`ExperimentVariantMetrics`)\n\n## Key Design Decisions\n\n1. **Deterministic IDs everywhere** — UUID v5 with typed prefixes ensures the same config always produces the same ID. This is critical for audit-log correlation across restarts and for session history preservation.\n\n2. **Separate namespaces per ID type** — `AgentId::NAMESPACE`, `LIBREFANG_USER_NAMESPACE`, `CHANNEL_SESSION_NAMESPACE`, and `CRON_RUN_SESSION_NAMESPACE` are all distinct. Even if input strings coincide, different entity types cannot collide.\n\n3. **`for_sender_scope` as single source of truth** — The scope formula lives in one method called by the kernel inbound resolver, channel-bridge commands, and agent-execution paths. Inlining it would re-introduce #4868 (channel `/new` deleting the wrong session).\n\n4. **Per-agent overrides as `Option<_>`** — Each override field defaults to `None` (inherit global). The `resolve()` pattern (e.g., `CompactionOverrides::resolve`) merges `Some(_)` on top of the global without mutating it, so different agents can produce different merged configs from the same global snapshot.\n\n5. **Tool profile → capabilities expansion** — `ToolProfile::implied_capabilities()` derives network, shell, agent-spawn, and memory capabilities from the tool list so operators don't have to manually keep capabilities in sync with their tool selections.","skills-system":"# Skills System\n\n# Skills System\n\nThe skills system provides a complete lifecycle for agent capabilities: discovery and installation from the ClawHub marketplace, agent-driven self-evolution (create, patch, update, rollback), configuration injection into system prompts, and a multi-layer security pipeline that validates every mutation.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Marketplace\"\n        CHC[ClawHubClient]\n        CHC -->|search/browse| API[ClawHub API]\n        CHC -->|install| SEC[Security Pipeline]\n    end\n\n    subgraph \"Evolution\"\n        EVO[evolution module]\n        EVO -->|create/update/patch| LOCK[File Locking]\n        EVO -->|fuzzy patch| FUZZ[Fuzzy Matcher]\n        EVO -->|versioning| VERS[Version History]\n        EVO -->|rollback| SNAP[Rollback Snapshots]\n    end\n\n    subgraph \"Config\"\n        CFG[config_injection]\n        CFG -->|collect| VARS[Config Vars]\n        CFG -->|resolve| TOML[config.toml]\n    end\n\n    SEC --> VERIFY[SkillVerifier]\n    VERIFY -->|scan_prompt_content| INJ[Injection Detection]\n    VERIFY -->|security_scan| MANIFEST[Manifest Scan]\n\n    CHC -->|write| DISK[skill.toml + prompt_context.md]\n    EVO -->|atomic_write| DISK\n```\n\n## Key Types\n\nAll core types live in `librefang-skills/src/lib.rs` and are referenced throughout the module:\n\n| Type | Purpose |\n|------|---------|\n| `SkillManifest` | Root TOML manifest (`skill.toml`) defining name, version, runtime, tools, config vars |\n| `InstalledSkill` | A loaded skill with its manifest, filesystem path, and enabled state |\n| `SkillMeta` | Skill identity: name, version, description, author, license, tags |\n| `SkillRuntimeConfig` | Runtime type (`PromptOnly` or `Shell`) plus entry point |\n| `SkillConfigVar` | A declared config variable with key, description, and optional default |\n| `SkillSource` | Origin: `Local`, `Native`, `ClawHub`, `Skillhub`, `OpenClaw` |\n| `SkillError` | Error enum: `Network`, `Io`, `InvalidManifest`, `SecurityBlocked`, `NotFound`, `AlreadyInstalled`, `RateLimited` |\n\n## ClawHub Marketplace Client\n\n`ClawHubClient` interacts with the [ClawHub API](https://clawhub.ai/api/v1/) to search, browse, and install community skills.\n\n### Construction\n\n```rust\n// Default client — points to https://clawhub.ai/api/v1\nlet client = ClawHubClient::new(cache_dir.into());\n\n// Custom endpoint (used for regional mirrors like cn.clawhub.ai)\nlet client = ClawHubClient::with_url(\"https://cn.clawhub.ai/api/v1\", cache_dir.into());\n```\n\nSet `LIBREFANG_DANGEROUSLY_SKIP_TLS_VERIFICATION=true` or `1` to disable TLS verification for servers with expired certificates. Only use this in testing.\n\n### API Methods\n\n| Method | Endpoint | Returns |\n|--------|----------|---------|\n| `search(query, limit)` | `GET /api/v1/search?q=...&limit=N` | `ClawHubSearchResponse` (key: `results`) |\n| `browse(sort, limit, cursor)` | `GET /api/v1/skills?limit=N&sort=trending` | `ClawHubBrowseResponse` (key: `items`, paginated via `next_cursor`) |\n| `get_skill(slug)` | `GET /api/v1/skills/{slug}` | `ClawHubSkillDetail` (includes `expected_sha256` for checksum validation) |\n| `get_file(slug, path)` | `GET /api/v1/skills/{slug}/file?path=SKILL.md` | Raw file content as `String` |\n| `install(slug, target_dir)` | Downloads and installs a skill | `ClawHubInstallResult` |\n| `install_from_bytes(slug, target_dir, bytes)` | Installs from raw bytes (no checksum) | `ClawHubInstallResult` |\n| `is_installed(slug, skills_dir)` | Checks if skill exists locally | `bool` |\n| `entry_version(entry)` | Extracts version from a browse entry | `&str` |\n\nSort orders: `ClawHubSort::Trending`, `Updated`, `Downloads`, `Stars`, `Rating`.\n\n### Retry and Rate Limiting\n\nAll HTTP requests go through `get_with_retry`, which handles 429 and 5xx responses with exponential backoff:\n\n- **Max retries**: 5 (including first attempt)\n- **Base delay**: 1.5s, doubling per attempt, capped at 30s\n- **Jitter**: 0–25% randomization using system clock nanos\n- **Retry-After header**: Respected when present, capped at 30s\n\nAfter exhausting retries on a 429, the client returns `SkillError::RateLimited` with a human-readable message.\n\n### Installation Pipeline\n\n`install` and `install_with_expected_sha256` execute this sequence:\n\n1. **Fetch detail** — retrieves `expected_sha256` from the registry (best-effort; proceeds without it if unavailable)\n2. **Checksum validation** — computed SHA256 of downloaded bytes compared against registry hash. Mismatch returns `SkillError::SecurityBlocked` immediately, before any files are written\n3. **Detect format** — SKILL.md (YAML front matter starting with `---`), zip archive (magic bytes `PK`), or package.json\n4. **Extract** — zip entries are extracted with path-traversal protection via `resolve_skill_child_path`; SKILL.md/package.json saved directly\n5. **Convert** — SKILL.md converted via `openclaw_compat::convert_skillmd`, package.json via `openclaw_compat::convert_openclaw_skill`\n6. **Security scan** — `SkillVerifier::scan_prompt_content` checks for prompt injection (critical findings block installation); `SkillVerifier::security_scan` audits the manifest\n7. **Binary dependency check** — `which_check` verifies required binaries exist on `PATH`\n8. **Atomic promotion** — content is staged in a `.staging-{slug}-{pid}-{counter}` directory, then `rename()`d to the final location. This prevents partial installs from loading on daemon restart\n\nStaging directory names use a process-local `AtomicU64` counter (not just nanosecond timestamps) to guarantee uniqueness even when two threads race within OS clock resolution.\n\n### Slug Validation\n\n`validate_slug` rejects empty slugs and any slug containing characters outside `[a-zA-Z0-9-_]`. This is applied to all API methods that take a slug parameter.\n\n### Path Safety\n\n`resolve_skill_child_path` rejects:\n- Absolute paths\n- Path components other than `Component::Normal` (blocks `..`, device namespaces, etc.)\n\nThis is applied to both zip extraction and direct file writes.\n\n## Skill Evolution\n\nThe evolution module (`evolution.rs`) enables agents to create, modify, and delete PromptOnly skills autonomously. Every mutation goes through security scanning, version tracking, and atomic filesystem writes.\n\n### Core Operations\n\n| Function | Purpose | Version Bump |\n|----------|---------|--------------|\n| `create_skill` | Create a new PromptOnly skill | Initial `0.1.0` |\n| `update_skill` | Full rewrite of `prompt_context.md` | Patch (`0.1.0` → `0.1.1`) |\n| `patch_skill` | Fuzzy find-and-replace on prompt context | Patch |\n| `rollback_skill` | Revert to previous version snapshot | Patch |\n| `delete_skill` | Remove a local/agent-evolved skill | N/A |\n| `uninstall_skill` | Remove any installed skill (user-initiated) | N/A |\n\nAll operations return `EvolutionResult` with post-operation counters (`evolution_count`, `mutation_count`, `use_count`) so callers can report state without a second disk read.\n\n### Concurrency: File Locking\n\nEvery mutation acquires an exclusive file lock before touching the filesystem:\n\n```\n{skills_dir}/.evolution-locks/{skill_name}.lock\n```\n\nLock files live **outside** the skill directory so that `delete_skill` can hold the lock across `remove_dir_all` (on Windows, open file handles inside the directory would block deletion). Locking uses `fs2::FileExt::lock_exclusive()` — `flock` on Unix, `LockFileEx` on Windows.\n\nUnder the lock, operations re-read `skill.toml` from disk to get the current version, preventing concurrent writers from producing duplicate version numbers.\n\n### Atomic Writes\n\nAll file mutations use `atomic_write`, which writes to a temp file and renames:\n\n```rust\nfn atomic_write(path: &Path, content: &str) -> Result<(), SkillError>\n```\n\nTemp file names encode the process ID, thread ID, a monotonic `AtomicU64` counter, and a nanosecond timestamp to avoid collisions across threads and processes.\n\n### Fuzzy Matching for Patches\n\n`fuzzy_find_and_replace` applies a 6-strategy cascade, from strictest to most lenient:\n\n1. **Exact** — literal substring match\n2. **LineTrimmed** — trim leading/trailing whitespace per line\n3. **WhitespaceNormalized** — collapse whitespace runs to single space\n4. **IndentFlexible** — strip all leading whitespace per line\n5. **BlockAnchor** — match first and last lines exactly, verify middle ≥60% similar (lowered to ≥50% for the first candidate)\n6. **WhitespaceStripped** — remove all whitespace on both sides, substring match. Includes a 3-character minimum guard to prevent short English words from matching spuriously (e.g., \"a\" inside \"banana\"). Designed primarily for CJK content where inter-character spaces carry no semantic meaning\n\nWhen `replace_all=false` and multiple matches are found, the function returns `SkillError::InvalidManifest` with the match count so the agent can decide whether to widen context or set `replace_all=true`.\n\nOn complete failure, `closest_lines` surfaces the top 3 most similar lines in the content (Jaccard similarity on character sets, threshold >0.3) as \"did you mean?\" hints in the error message.\n\n`old_str` must be non-empty — an empty pattern would match at every character boundary and corrupt the content.\n\n### Version Management\n\nVersion history is stored in `.evolution.json` alongside `skill.toml`:\n\n```rust\nstruct SkillEvolutionMeta {\n    versions: Vec<SkillVersionEntry>,  // newest last, capped at 10\n    use_count: u64,                     // successful invocations\n    evolution_count: u64,               // total entries written (including create)\n    mutation_count: u64,                // post-create mutations only\n}\n```\n\n- `evolution_count` bumps on every `record_version` call (including initial creation)\n- `mutation_count` bumps only on post-create edits (update, patch, rollback)\n- A freshly created skill reports `mutation_count = 0`\n- Version strings are bumped using `semver::Version::parse` with a fallback for non-standard formats\n\nRollback snapshots are stored in `.rollback/` with nanosecond-precision filenames:\n\n```\nprompt_context_20260401_143052_042157823_12345.md\n```\n\nOlder snapshots beyond the 10-entry cap are pruned automatically.\n\n### Supporting Files\n\nSkills can maintain auxiliary files in four whitelisted subdirectories: `references/`, `templates/`, `scripts/`, `assets/`.\n\n| Function | Purpose |\n|----------|---------|\n| `write_supporting_file(skill, rel_path, content)` | Write a file (max 1 MiB), with security scan and path containment check |\n| `remove_supporting_file(skill, rel_path)` | Delete a file and prune empty ancestor directories |\n| `list_supporting_files(skill)` | Recursively list all supporting files, keyed by subdirectory |\n\nPath validation rejects absolute paths, `..` traversal, and any path not rooted in one of the four allowed subdirectories. Symlinks are not followed during recursive walks (bounded to 16 levels deep).\n\nBoth write and remove operations acquire the per-skill lock and perform a `canonicalize`-based containment check to detect symlink-based escape attempts.\n\n### `delete_skill` vs `uninstall_skill`\n\n- `delete_skill` — agent-facing. Refuses to delete non-local skills (checks `manifest.source`). Rejects manifests with no `source` field. Missing manifests (orphaned scaffolding) are allowed.\n- `uninstall_skill` — user-facing (dashboard, CLI). Removes any skill regardless of source. Still acquires the lock and checks existence under it.\n\nBoth reject path-traversal attempts in the skill name.\n\n## Config Injection\n\nThe config injection module (`config_injection.rs`) resolves skill-declared configuration variables and formats them for system prompt injection.\n\n### Declaration\n\nSkills declare config variables in `skill.toml`:\n\n```toml\n[[config_vars]]\nkey = \"wiki.base_url\"\ndescription = \"Base URL of the internal wiki\"\ndefault = \"https://wiki.example.com\"\n\n[[config_vars]]\nkey = \"api.timeout\"\ndescription = \"Request timeout in seconds\"\n```\n\n### Storage Convention\n\nIn `~/.librefang/config.toml`, values live under `skills.config`:\n\n```toml\n[skills.config.wiki]\nbase_url = \"https://wiki.corp.example.com\"\n\n[skills.config.api]\ntimeout = 30\n```\n\nThe logical dotted key `wiki.base_url` resolves by walking `skills` → `config` → `wiki` → `base_url` in the TOML tree.\n\n### Resolution Pipeline\n\n1. **`collect_config_vars(skills)`** — Gathers declarations from enabled skills, deduplicating by key (first declaration wins). Skips entries with empty keys or descriptions.\n2. **`resolve_config_vars(vars, config_toml)`** — Walks the dotted path for each variable. Empty config values fall back to the declared default. Variables with neither a config value nor a default are omitted entirely.\n3. **`format_config_section(resolved)`** — Formats as:\n\n```\n## Skill Config Variables\nwiki.base_url = https://wiki.corp.example.com\napi.timeout = 30\n```\n\nReturns an empty string when no variables resolve, so callers can skip injection with an `is_empty()` guard.\n\n## Security Pipeline\n\nSecurity scanning runs at two critical points:\n\n### During ClawHub Install\n\n1. **SHA256 checksum** — validated against registry-provided hash before extraction\n2. **Prompt injection scan** — `SkillVerifier::scan_prompt_content` on prompt context; critical findings block installation\n3. **Manifest scan** — `SkillVerifier::security_scan` on the converted manifest\n4. **Binary dependency check** — warns (does not block) if declared binaries are missing\n\n### During Evolution\n\n1. **`validate_prompt_content`** — enforces the 160,000 character limit (≈55k tokens) and runs `scan_prompt_content`; critical findings block the mutation\n2. **Supporting file writes** — scanned before writing; blocked content is never written to disk\n3. **Supporting file removes** — `canonicalize`-based containment check prevents symlink escapes\n\n## Error Handling\n\n`SkillError` is the unified error type:\n\n| Variant | When |\n|---------|------|\n| `Network(msg)` | HTTP failures, parse errors, retries exhausted |\n| `RateLimited(msg)` | 429 after all retries (includes guidance to wait and retry) |\n| `Io(err)` | Filesystem errors during install, evolution, or atomic writes |\n| `InvalidManifest(msg)` | Malformed TOML, missing fields, invalid names, fuzzy match failures |\n| `SecurityBlocked(msg)` | Checksum mismatches, prompt injection detection, unauthorized deletes |\n| `NotFound(msg)` | Skill or file doesn't exist |\n| `AlreadyInstalled(name)` | Attempting to create a skill that already exists |\n\nAll error messages are designed to be actionable — fuzzy match failures include closest-line hints, rate limit errors include retry guidance, and multi-match errors tell the agent to set `replace_all=true` or provide more context.","wire-protocol-networking":"# Wire Protocol & Networking\n\n# Wire Protocol & Networking (`librefang-wire`)\n\n## Purpose\n\n`librefang-wire` implements the **OFP (LibreFang Wire Protocol)** — the TCP-based, JSON-framed protocol for cross-machine agent discovery, authentication, and communication between LibreFang kernels. It handles everything from connection management and cryptographic handshake to per-message integrity and rate limiting.\n\nOFP is a **plaintext** protocol by design. Authentication, integrity, and replay protection are provided in-crate; confidentiality (protection against passive observers) is delegated to the deployment overlay — WireGuard, Tailscale, SSH tunnels, or service-mesh mTLS. Do not add TLS termination to this crate without re-evaluating [the documented decision](https://docs.librefang.ai/architecture/ofp-wire) (closed #3874, closed PR #4001).\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"librefang-wire\"\n        PN[PeerNode] -->|owns| PR[PeerRegistry]\n        PN -->|owns| KP[Ed25519KeyPair]\n        PN -->|owns| NT[NonceTracker]\n        PN -->|owns| RL[PeerRateLimiter]\n        PN -->|owns| PP[TOFU Pin Map]\n        PN -->|uses| TS[TrustedPeers Store]\n        PN -->|produces| EK[EphemeralKex]\n    end\n\n    subgraph \"Handshake Flow\"\n        H1[Generate X25519 ephemeral] --> H2[Compute HMAC auth_data]\n        H2 --> H3[Sign identity scope with Ed25519]\n        H3 --> H4[Send Handshake request]\n        H4 --> H5[Receive HandshakeAck]\n        H5 --> H6[Verify remote HMAC + identity]\n        H6 --> H7[Derive session_key via ECDH]\n    end\n\n    PN --> H1\n    H7 --> CL[Connection Loop]\n    CL -->|per-message HMAC| WM[read/write_message_authenticated]\n```\n\n## Security Model\n\nOFP enforces **four** independent security layers. All four are required for a successful connection:\n\n### Layer 1 — Network Admission (HMAC-SHA256)\n\nCoarse \"cluster password\" gate. The handshake carries:\n\n```\nauth_hmac = HMAC-SHA256(shared_secret, nonce | sender_node_id | recipient_node_id)\n```\n\nThe `recipient_node_id` binding (#3875) prevents a captured handshake from being replayed against a *different* federation node that shares the same `shared_secret`.\n\n### Layer 2 — Per-Peer Identity (Ed25519, #3873)\n\nEach node persists an Ed25519 keypair in `<data_dir>/peer_keypair.json`. The handshake carries the sender's public key plus an Ed25519 signature over the same auth-data string the HMAC covers. Recipients:\n\n1. Verify the signature against the public key\n2. TOFU-pin the public key to the sender's `node_id`\n3. Reject subsequent handshakes claiming the same `node_id` with a different public key\n\nPins persist across restarts in `<data_dir>/trusted_peers.json`.\n\n**Net effect**: a leaked `shared_secret` no longer lets an attacker impersonate a previously-pinned peer — they'd also need that node's private key file.\n\n### Layer 3 — Forward Secrecy (X25519 ECDH, #4269)\n\nEach handshake generates a fresh X25519 ephemeral keypair. Both peers exchange public halves inside the handshake messages (covered by the Ed25519 signature so an active MITM cannot substitute their own key). The session key is then derived as:\n\n```\nshared_point = X25519(local_ephemeral_secret, remote_ephemeral_public)\nsession_key = HKDF-SHA256(salt=transcript, ikm=shared_point, info=\"librefang-ofp/v1/session-key\")\n```\n\nThe ephemeral private key is dropped after derivation (`StaticSecret` zeroizes on drop), so future compromise of `shared_secret` or static Ed25519 keys cannot decrypt recorded past traffic.\n\n### Layer 4 — Per-Message HMAC\n\nPost-handshake, every message on the wire is framed as:\n\n```\n[4-byte big-endian length][JSON body][64-char hex HMAC]\n```\n\nThe HMAC is computed over the JSON body using the session key. Messages with invalid HMACs are rejected as tampered or forged.\n\n### Additional Protections\n\n| Mechanism | Where | Purpose |\n|---|---|---|\n| Nonce replay tracking | `NonceTracker` in `peer.rs` | 5-minute window, 100k cap, amortized GC |\n| Per-peer rate limiting | `PeerRateLimiter` in `peer.rs` | Configurable messages/minute + token budget/hour |\n| Message size cap | `MAX_PEER_MESSAGE_BYTES` (64 KiB) | Prevents LLM budget drain via oversized payloads |\n| Transport size cap | `MAX_MESSAGE_SIZE` (16 MiB) | General transport-level limit |\n| TOFU pin cap | `MAX_PIN_ENTRIES` (100k) | Prevents unbounded memory growth from identity flooding |\n| Downgrade rejection | `verify_and_pin_identity` | A peer previously seen with Ed25519 cannot drop back to HMAC-only |\n| Low-order key rejection | `EphemeralKex::derive_session_key` | All-zero X25519 output is explicitly rejected |\n\n## Backward Compatibility\n\nAll new fields in the handshake are `Option<String>` with `skip_serializing_if`:\n\n- `public_key` / `identity_signature` — absent in pre-#3873 peers\n- `ephemeral_pubkey` — absent in pre-#4269 peers\n\nWhen both sides provide an ephemeral pubkey, ECDH-derived session key is used. When either side omits it, the legacy path is used:\n\n```\nsession_key = HMAC-SHA256(shared_secret, our_nonce || their_nonce)\n```\n\nThis allows rolling out the federation incrementally without breaking existing peers.\n\n## Key Types\n\n### `WireMessage` and Variants (`message.rs`)\n\nThe top-level envelope. Each message has a unique `id` and a `kind`:\n\n| Variant | Tag | Purpose |\n|---|---|---|\n| `WireRequest::Handshake` | `\"type\":\"request\",\"method\":\"handshake\"` | Initial identity exchange |\n| `WireRequest::Discover` | `\"type\":\"request\",\"method\":\"discover\"` | Agent search on remote peer |\n| `WireRequest::AgentMessage` | `\"type\":\"request\",\"method\":\"agent_message\"` | Send message to remote agent |\n| `WireRequest::Ping` | `\"type\":\"request\",\"method\":\"ping\"` | Liveness check |\n| `WireResponse::HandshakeAck` | `\"type\":\"response\",\"method\":\"handshake_ack\"` | Handshake acceptance |\n| `WireResponse::AgentResponse` | `\"type\":\"response\",\"method\":\"agent_response\"` | Agent reply |\n| `WireResponse::Error` | `\"type\":\"response\",\"method\":\"error\"` | Error with code + message |\n| `WireNotification::AgentSpawned` | `\"type\":\"notification\",\"event\":\"agent_spawned\"` | New agent on peer |\n| `WireNotification::AgentTerminated` | `\"type\":\"notification\",\"event\":\"agent_terminated\"` | Agent gone |\n| `WireNotification::ShuttingDown` | `\"type\":\"notification\",\"event\":\"shutting_down\"` | Peer shutting down |\n\n**Forward compatibility** (#3544): `WireMessageKind::Unknown`, `WireRequest::Unknown`, `WireResponse::Unknown`, and `WireNotification::Unknown` are catch-all variants using `#[serde(other)]`. Unknown message types from newer protocol versions decode successfully and are silently dropped, keeping the TCP link alive.\n\n### `PeerNode` (`peer.rs`)\n\nThe central actor. Owns the TCP listener, manages connections, performs handshakes, and routes messages.\n\n```rust\n// Start with Ed25519 identity (production):\nlet (node, task) = PeerNode::start_with_identity(\n    config, registry, handle, Some(keypair), Some(trust_dir)\n).await?;\n\n// Start without identity (legacy / testing):\nlet (node, task) = PeerNode::start(config, registry, handle).await?;\n```\n\n**Key methods:**\n\n| Method | Description |\n|---|---|\n| `start_with_identity` | Bind listener, hydrate TOFU pins from disk, start accept loop |\n| `connect_to_peer_with_id` | Outbound connection with recipient-bound HMAC (#3875) |\n| `connect_to_peer` | Outbound connection without recipient binding (bootstrap only) |\n| `send_to_peer` | One-shot: connect, handshake, send agent message, read response |\n| `identity_fingerprint` | SHA-256 fingerprint of local Ed25519 public key for OOB verification |\n| `list_pinned_peers` | Snapshot of all TOFU pins with fingerprints |\n| `pinned_peer_count` | Count of pinned identities (surfaced via `/api/network/status`) |\n\n### `PeerHandle` Trait (`peer.rs`)\n\nThe kernel's integration point. Implement this trait to wire OFP into the rest of the system:\n\n```rust\n#[async_trait]\nimpl PeerHandle for MyKernel {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo> { /* ... */ }\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String> { /* ... */ }\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo> { /* ... */ }\n    fn uptime_secs(&self) -> u64 { /* ... */ }\n}\n```\n\n### `PeerConfig` (`peer.rs`)\n\n| Field | Default | Description |\n|---|---|---|\n| `listen_addr` | `\"127.0.0.1:0\"` | TCP bind address |\n| `node_id` | Random UUID | Unique node identifier |\n| `node_name` | `\"librefang-node\"` | Human-readable name |\n| `shared_secret` | **required** | HMAC pre-shared key — OFP refuses to start if empty |\n| `max_messages_per_peer_per_minute` | `60` | Per-peer rate limit; `0` disables |\n| `max_llm_tokens_per_peer_per_hour` | `None` | Per-peer token budget; `None` disables |\n\n### `Ed25519KeyPair` and `PeerKeyManager` (`keys.rs`)\n\n`Ed25519KeyPair` wraps an Ed25519 signing key. Key operations:\n\n- `generate()` — create a fresh keypair from OS CSPRNG\n- `sign(data)` — returns base64(64-byte signature)\n- `verifying_key()` — reconstruct the `VerifyingKey` from stored public bytes\n- `fingerprint()` — SHA-256 of the base64 public key, hex-encoded\n\n`PeerKeyManager` handles persistence at `<data_dir>/peer_keypair.json`. On load it:\n\n1. Re-derives the public key from the stored seed and cross-checks against the stored public key (rejects tampered files)\n2. Migrates PR-1 files (no `node_id` field) by minting a UUID and rewriting\n3. Sets file permissions to `0600` on Unix (best-effort)\n\n### `EphemeralKex` (`kex.rs`)\n\nRepresents one side of a per-handshake X25519 key exchange:\n\n```rust\nlet our_kex = EphemeralKex::generate()?;          // fresh keypair\nlet our_pub_b64 = our_kex.public_b64();           // put in handshake message\n// ... exchange pubkeys on the wire ...\nlet session_key = our_kex.derive_session_key(their_pub_b64, &transcript)?;\n// our_kex is consumed (private key zeroized)\n```\n\nThe `transcript` is built by `handshake_transcript(client_nonce, server_nonce)` — nonces concatenated in a fixed order (client first) so both sides produce the same salt regardless of who is calling.\n\n### `NonceTracker` (`peer.rs`)\n\nThread-safe (`DashMap`-backed) replay detector. Uses a single `DashMap::entry()` call to avoid TOCTOU races. Key design decisions:\n\n- **5-minute window** — handshake nonces are single-use UUIDs\n- **100k entry cap** — prevents unbounded growth from flood attacks\n- **Amortized GC** — `retain()` sweep only runs when the map hits 80% capacity, so an unauthenticated attacker cannot force O(n) scans on every connection attempt\n- **Fails closed** — at capacity, new nonces are rejected rather than accepted without tracking\n\n### `PeerRateLimiter` (`peer.rs`)\n\nTwo independent sliding-window limits per peer:\n\n1. **Message rate**: configurable `max_messages_per_peer_per_minute` (default 60). Checked *before* any agent work is done. Excess messages get a 429 response.\n2. **Token budget**: optional `max_llm_tokens_per_peer_per_hour`. Recorded *after* LLM completion (token cost is unknown upfront). Future TODO: wire actual token counts from `handle_agent_message`.\n\n### `PeerRegistry` (`registry.rs`)\n\nTracks known peers and their agents. Thread-safe (`Arc<DashMap>`). Key operations: `add_peer`, `get_peer`, `connected_peers`, `mark_disconnected`, `add_agent`, `remove_agent`, `find_agents`.\n\n## Handshake Protocol (Wire-Level)\n\n```mermaid\nsequenceDiagram\n    participant C as Client\n    participant S as Server\n\n    C->>S: Handshake {nonce, node_id, auth_hmac, public_key, identity_signature, ephemeral_pubkey}\n    S->>S: Verify HMAC (shared_secret)\n    S->>S: Verify Ed25519 identity + TOFU check\n    S->>S: Record nonce (replay check)\n    S->>S: Generate own X25519 ephemeral\n    S->>C: HandshakeAck {nonce, node_id, auth_hmac, public_key, identity_signature, ephemeral_pubkey}\n    C->>C: Verify HMAC\n    C->>C: Verify Ed25519 identity + TOFU check\n    C->>C: Record nonce\n    C->>C: Derive session_key = HKDF(X25519(our_secret, their_pub), transcript)\n    Note over C,S: Post-handshake: all messages use per-message HMAC with session_key\n```\n\nThe Ed25519 signature scope (#4269) covers both `auth_data` and the ephemeral pubkey:\n\n```\nscope = auth_data                          (legacy, no ephemeral)\nscope = auth_data | \"|\" | ephemeral_pubkey (with ephemeral)\n```\n\nThis binds the ephemeral key to the static identity, preventing an active MITM from substituting their own X25519 public key during the handshake.\n\n## Framing\n\n**Unauthenticated** (handshake only):\n```\n[4 bytes: big-endian JSON length][JSON body]\n```\n\n**Authenticated** (post-handshake):\n```\n[4 bytes: big-endian (JSON length + 64)][JSON body][64 bytes: hex HMAC-SHA256(session_key, JSON body)]\n```\n\nFunctions: `encode_message`, `decode_message`, `decode_length` in `message.rs`. Authenticated I/O: `write_message_authenticated`, `read_message_authenticated` in `peer.rs`.\n\n## Connection Lifecycle\n\n1. **Accept** — `accept_loop` spawns one Tokio task per inbound TCP connection\n2. **Handshake** — `handle_inbound` validates HMAC, identity, nonce, sends ack, derives session key\n3. **Message loop** — `connection_loop` reads authenticated messages, dispatches to `handle_request_in_loop` or `handle_notification`\n4. **Teardown** — on error or EOF, the peer is marked disconnected in the registry\n\n## Integration with the Rest of the Codebase\n\n- **Kernel** (`librefang-kernel`) implements `PeerHandle` to route remote agent messages to local agents\n- **API layer** (`librefang-api`) surfaces `identity_fingerprint`, `pinned_peer_count`, and `list_pinned_peers` via `GET /api/network/status` and `GET /api/network/trusted-peers`\n- **Configuration** — `shared_secret`, rate limits, and trust store directory come from `[network]` in `config.toml`\n- **Manifest signing** (`librefang-types`) reuses `verifying_key()` from `Ed25519KeyPair` for artifact verification\n\n## Common Patterns\n\n### Starting a production node with full security\n\n```rust\nlet mut key_mgr = PeerKeyManager::new(data_dir.clone());\nlet keypair = key_mgr.load_or_generate()?.clone();\nlet node_id = key_mgr.node_id().unwrap().to_string();\n\nlet config = PeerConfig {\n    listen_addr: \"0.0.0.0:7070\".parse()?,\n    node_id,\n    node_name: hostname,\n    shared_secret: config_file.shared_secret,\n    max_messages_per_peer_per_minute: 60,\n    max_llm_tokens_per_peer_per_hour: Some(100_000),\n};\n\nlet (node, _task) = PeerNode::start_with_identity(\n    config,\n    registry,\n    kernel_handle,\n    Some(keypair),\n    Some(data_dir),\n).await?;\n```\n\n### Connecting to a known peer\n\n```rust\n// With recipient binding (prevents cross-node replay):\nnode.connect_to_peer_with_id(peer_addr, handle.clone(), \"recipient-node-id\").await?;\n\n// Or send a one-shot agent message:\nnode.send_to_peer(\"remote-node-id\", \"coder\", \"Write a test\", None, handle.clone()).await?;\n```\n\n### Broadcasting a notification\n\n```rust\nlet errors = broadcast_notification(\n    &registry,\n    WireNotification::AgentSpawned { agent: info },\n    &shared_secret,\n).await;\nfor (node_id, err) in errors {\n    warn!(\"Failed to notify {}: {}\", node_id, err);\n}\n```\n\n## Error Types\n\n`WireError` covers all wire-protocol failures:\n\n| Variant | When |\n|---|---|\n| `Io` | TCP read/write failures |\n| `Json` | Malformed JSON frames |\n| `HandshakeFailed` | HMAC mismatch, identity rejection, nonce replay, ECDH failure |\n| `ConnectionClosed` | Peer disconnected (clean EOF) |\n| `MessageTooLarge` | Frame exceeds 16 MiB |\n| `VersionMismatch` | Incompatible protocol versions |\n\n`KeyError` (in `keys.rs`) covers key operations: `Io`, `Serialization`, `InvalidFormat`, `Rng`, `BadSignature`.\n\n## Protocol Versioning\n\nThe current protocol version is `PROTOCOL_VERSION = 1` (defined in `message.rs`).\n\nThe HKDF info string `\"librefang-ofp/v1/session-key\"` in `kex.rs` serves as a secondary versioning hook for session key derivation — bumping it on a breaking change prevents old clients and new servers from accidentally agreeing on a key."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
