Response::Pong` | `\"response\"` / `\"pong\"` | Server → Client | Uptime in seconds |\n| `WireResponse::Error` | `\"response\"` / `\"error\"` | Server → Client | Error with code and message |\n| `WireNotification::AgentSpawned` | `\"notification\"` / `\"agent_spawned\"` | One-way | New agent advertised |\n| `WireNotification::AgentTerminated` | `\"notification\"` / `\"agent_terminated\"` | One-way | Agent removed |\n| `WireNotification::ShuttingDown` | `\"notification\"` / `\"shutting_down\"` | One-way | Peer graceful shutdown |\n\nEach `RemoteAgentInfo` struct carries: `id`, `name`, `description`, `tags`, `tools`, and `state`.\n\n## Authentication & Security\n\nThe protocol is designed around a pre-shared key model. Every peer must be configured with the same `shared_secret` — the node refuses to start without one.\n\n### Handshake Flow\n\n1. The initiator generates a UUID nonce and computes `HMAC-SHA256(shared_secret, nonce || node_id)`.\n2. It sends a `WireRequest::Handshake` containing its identity, agent list, nonce, and HMAC.\n3. The responder verifies the HMAC, checks the nonce against the `NonceTracker` (replay protection), and responds with a `WireResponse::HandshakeAck` containing its own nonce and HMAC.\n4. The initiator verifies the ack HMAC and checks the responder's nonce for replay.\n5. Both sides derive a session key: `session_key = HMAC-SHA256(shared_secret, our_nonce || their_nonce)`.\n\nAfter handshake, all messages on that connection use per-message HMAC (the session key signs the JSON body). Any message sent before a successful handshake is rejected with error code `401`.\n\n### Nonce Replay Protection\n\n`NonceTracker` prevents replay attacks within a 5-minute window. It uses a `DashMap` for lock-free concurrent access, and the `check_and_record` method performs an atomic `entry` check to avoid TOCTOU races — even under concurrent load with the same nonce, exactly one caller wins. The tracker has a hard cap of 100,000 entries; when at capacity, new nonces are rejected (failing closed) to prevent memory exhaustion from flooding attacks.\n\n### HMAC Verification\n\nAll HMAC comparisons use constant-time equality (`subtle::ConstantTimeEq`) to prevent timing side-channels.\n\n## Key Types\n\n### `PeerNode`\n\nThe central networking actor. Created via `PeerNode::start(config, registry, handle)`, which binds the TCP listener and spawns the accept loop. Key methods:\n\n- **`start`** — Binds to `config.listen_addr`, validates that `shared_secret` is non-empty, spawns the accept loop. Returns `(Arc<PeerNode>, JoinHandle<()>)`.\n- **`connect_to_peer(addr, handle)`** — Opens a TCP connection, performs the full HMAC handshake, registers the remote peer, and spawns a connection loop task.\n- **`send_to_peer(node_id, agent, message, sender, handle)`** — Opens a fresh authenticated connection to the peer identified by `node_id`, sends an `AgentMessage`, and returns the response text. Performs a full handshake on each call.\n- **`local_addr()`** — Returns the actual bound address (useful when binding to port `0`).\n- **`registry()`** — Returns a reference to the `PeerRegistry`.\n\n### `PeerHandle` trait\n\nThe integration point between the networking layer and the kernel. The kernel implements these methods:\n\n| Method | Purpose |\n|---|---|\n| `local_agents()` | Return agent metadata for handshake and discovery responses |\n| `handle_agent_message(agent, message, sender)` | Route a message to a local agent and return its response |\n| `discover_agents(query)` | Search local agents by name, tags, or description |\n| `uptime_secs()` | Return local uptime for pong responses |\n\n### `PeerRegistry`\n\nThread-safe (`Arc<RwLock<HashMap<String, PeerEntry>>>`) store of known peers. Each `PeerEntry` records the peer's `node_id`, `node_name`, `address`, advertised `agents`, `state` (`Connected` / `Disconnected`), `connected_at` timestamp, and `protocol_version`.\n\nKey operations:\n\n- **`add_peer`** / **`remove_peer`** — Register or remove a peer entry.\n- **`mark_disconnected`** / **`mark_connected`** — Toggle state without removing the entry (supports reconnection scenarios).\n- **`find_agents(query)`** — Searches agent names, descriptions, and tags across all connected peers. Returns `Vec<RemoteAgent>` which pairs each agent with its `peer_node_id`.\n- **`add_agent`** / **`remove_agent`** — Update a specific peer's agent list (driven by `AgentSpawned` / `AgentTerminated` notifications).\n- **`connected_count()`** / **`total_count()`** — Peer counts for status reporting.\n\n### `PeerConfig`\n\nConfiguration with sensible defaults:\n\n```rust\nPeerConfig {\n    listen_addr: \"127.0.0.1:0\",  // bind to random port\n    node_id: uuid::Uuid::new_v4(),\n    node_name: \"librefang-node\",\n    shared_secret: \"\",           // MUST be set — start() will fail\n}\n```\n\n### `NonceTracker`\n\nInternal security component. Tracks seen nonces in a `DashMap<String, Instant>` with a 5-minute garbage-collection window. The `max_entries` cap (default 100,000) prevents unbounded growth under flood conditions. The `check_and_record` method is atomic and race-free.\n\n### `WireError`\n\nError type for the wire layer:\n\n| Variant | Meaning |\n|---|---|\n| `Io` | TCP I/O failure |\n| `Json` | Serialization/deserialization failure |\n| `HandshakeFailed` | HMAC mismatch, replay detected, or unexpected response |\n| `ConnectionClosed` | Remote end closed the connection (clean EOF) |\n| `MessageTooLarge` | Frame exceeds 16 MB limit |\n| `VersionMismatch` | Incompatible protocol versions |\n\n## Connection Lifecycle\n\n```mermaid\nsequenceDiagram\n    participant A as PeerNode A\n    participant B as PeerNode B\n\n    A->>B: TCP connect\n    A->>B: Handshake (nonce_A, HMAC_A)\n    B->>B: verify HMAC, check nonce replay\n    B->>A: HandshakeAck (nonce_B, HMAC_B)\n    A->>A: verify HMAC, check nonce replay\n    A->>A: derive session_key\n    B->>B: derive session_key\n\n    loop Message exchange\n        A->>B: AgentMessage (HMAC-signed)\n        B->>B: verify per-message HMAC\n        B->>A: AgentResponse (HMAC-signed)\n    end\n\n    A->>B: ShuttingDown notification\n    B->>B: mark_disconnected\n```\n\n### Inbound connections (`accept_loop` → `handle_inbound`)\n\n1. The accept loop spawns a task per incoming TCP connection.\n2. `handle_inbound` reads the first message — it **must** be a `Handshake`. Any other message type results in a `401` error and connection drop.\n3. After successful handshake, the connection enters `connection_loop` which reads frames, dispatches requests through `PeerHandle`, and writes responses.\n\n### Outbound connections (`connect_to_peer`)\n\n1. Opens a TCP stream, sends a `Handshake` with HMAC, and reads the `HandshakeAck`.\n2. Verifies the ack's HMAC and nonce, derives the session key.\n3. Registers the peer and spawns a `connection_loop` task for ongoing communication.\n\n### One-shot messaging (`send_to_peer`)\n\nFor simple request-response patterns, `send_to_peer` opens a fresh connection, performs the full handshake, sends a single `AgentMessage`, reads the `AgentResponse`, and closes. This is stateless from the caller's perspective but carries the full authentication overhead.\n\n### Broadcasting (`broadcast_notification`)\n\nSends a one-way notification to all connected peers by opening a fresh TCP connection to each, deriving a per-message key from a fresh nonce, and writing an authenticated frame. Returns a list of `(node_id, WireError)` for any peers that failed to receive the notification.\n\n## Integration with the Rest of LibreFang\n\nThe wire crate is consumed by several other crates:\n\n- **`librefang-api`** — Calls `PeerNode::local_addr()` to determine the bound port, and reads `PeerRegistry` methods (`all_peers`, `connected_count`, `total_count`, `node_id`) for the `/network/status` and `/network/peers` API routes.\n- **`librefang-cli`** — Accesses the registry for peer status display.\n- **`librefang-desktop`** — Uses `local_addr()` for the embedded server.\n- **Extension crates** (`librefang-runtime-oauth`, `librefang-runtime-mcp`) — Use `local_addr()` for localhost redirect/callback URLs.\n\nThe kernel implements `PeerHandle` to bridge the wire layer with the agent runtime, routing incoming remote messages to the appropriate local agent and returning responses across the network.\n\n## Configuration\n\nSet the shared secret in `config.toml`:\n\n```toml\n[network]\nshared_secret = \"your-secret-key-here\"\n```\n\nThe `listen_addr` defaults to `127.0.0.1:0` (random port). To bind to a specific address:\n\n```toml\n[network]\nlisten_addr = \"0.0.0.0:7000\"\n```\n\nAll peers in a cluster must share the same `shared_secret`. Mismatched secrets cause handshake HMAC verification failures.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\nA single-page application for managing and monitoring the LibreFang autonomous agent operating system. Built with React 19, TanStack Router v1, TanStack Query v5, and Vite 7.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Pages[\"Pages (src/pages/)\"] --> Queries[\"Query Hooks (src/lib/queries/)\"]\n    Pages --> Mutations[\"Mutation Hooks (src/lib/mutations/)\"]\n    Queries --> QueryOpts[\"queryOptions + useXxx\"]\n    Mutations --> Invalidation[\"Cache Invalidation\"]\n    Queries --> Keys[\"Key Factories (keys.ts)\"]\n    Mutations --> Keys\n    QueryOpts --> Client[\"HTTP Client (src/lib/http/client.ts)\"]\n    Invalidation --> QC[\"QueryClient\"]\n    Client --> API[\"Raw API (src/api.ts)\"]\n    API --> Backend[\"LibreFang Backend API\"]\n```\n\nAll data flows through a strict layered pipeline. Pages and components never call `fetch()` or `src/api.ts` directly — they consume TanStack Query hooks from the `src/lib/` layer. The only exceptions are streaming/SSE connections and fire-and-forget control channels (e.g., `TerminalTabs.tsx`).\n\n## Directory Structure\n\n```\ndashboard/\n├── e2e/                          # Playwright end-to-end tests\n├── public/\n│   ├── manifest.json             # PWA manifest\n│   ├── sw.js                     # Service worker (stale-while-revalidate for static assets)\n│   ├── icon-192.png / icon-512.png\n├── src/\n│   ├── main.tsx                  # Application entry point\n│   ├── api.ts                    # Raw fetch wrappers, auth helpers, type definitions\n│   ├── pages/                    # Route page components\n│   ├── components/               # Shared UI components\n│   │   └── ui/                   # Primitives (MultiSelectCmdk, etc.)\n│   ├── lib/\n│   │   ├── http/\n│   │   │   ├── client.ts         # Thin typed wrapper over api.ts\n│   │   │   └── errors.ts         # ApiError class\n│   │   ├── queries/\n│   │   │   ├── keys.ts           # Query-key factories for all domains\n│   │   │   ├── keys.test.ts      # Anchoring/hierarchy smoke tests\n│   │   │   └── <domain>.ts       # queryOptions + useXxx hooks\n│   │   ├── mutations/\n│   │   │   └── <domain>.ts       # useXxx mutation hooks with invalidation\n│   │   ├── agentManifest.ts      # TOML manifest parse/serialize/validate\n│   │   ├── agentManifestMarkdown.ts\n│   │   ├── chat.ts               # Message normalization utilities\n│   │   ├── chatPicker.ts         # Agent/hand grouping for chat selectors\n│   │   └── test/\n│   │       └── query-client.tsx  # createQueryClientWrapper for hook tests\n│   ├── openapi/\n│   │   └── generated.ts          # Auto-generated types from OpenAPI schema\n│   └── setupTests.ts\n├── index.html\n├── package.json\n├── vite.config.ts\n├── playwright.config.ts\n└── AGENTS.md                     # Agent/contributor instructions\n```\n\n## Data Layer\n\n### Query Key Factories\n\nEvery domain has a hierarchical key factory in `src/lib/queries/keys.ts`. All sub-keys are anchored to the domain's root key so broad invalidation works correctly.\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nCurrent domains: `agents`, `analytics`, `approvals`, `channels`, `config`, `cron`, `fanghub`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `triggers`, `workflows`.\n\nKey factories are tested in `keys.test.ts` — at minimum every factory appears in the \"all factories exist\" list, and non-trivial hierarchies have anchoring tests. These tests catch regressions that TypeScript alone does not.\n\n### Query Hooks\n\nEach domain file in `src/lib/queries/` exports `queryOptions` and a `useXxx` hook:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\ntype UseFooOptions = {\n  enabled?: boolean;\n  staleTime?: number;\n  refetchInterval?: number | false;\n};\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  const { enabled, staleTime, refetchInterval } = options;\n  return useQuery({\n    ...fooQueryOptions(filters),\n    enabled,\n    staleTime,\n    refetchInterval,\n  });\n}\n```\n\nHooks set sensible defaults in `queryOptions` so consumers without special needs inherit a consistent policy. The `enabled`, `staleTime`, and `refetchInterval` overrides let call sites adjust per-page behavior — for example:\n\n- `useApprovals({ enabled: open })` — gates polling to when the approval panel is open\n- `useCommsEvents(50, { refetchInterval: 5_000 })` — polls at 5s for live events\n- `useAgentTemplates({ enabled })` — lazy-loads templates only when a dialog opens\n- `useApprovalCount({ refetchInterval: 5_000 })` — drives the bell icon badge\n\nEvery call-site override carries a short inline comment explaining why.\n\n### Mutation Hooks\n\nMutations live in `src/lib/mutations/<domain>.ts`. **Every write operation must invalidate** affected query keys, and the invalidation logic must live inside the hook — callers never need to know which keys a mutation touches.\n\n#### Invalidation Strategy\n\nChoose the narrowest key set that covers what actually changed:\n\n| Scenario | Keys to invalidate | Examples |\n|----------|-------------------|---------|\n| Per-id update that also changes the list projection | `detail(id)` + `lists()` | `usePatchAgentConfig`, `useUpdateWorkflow` |\n| List-shape change with no existing detail | `lists()` | `useCreateWorkflow`, `useDeleteAgent` |\n| Scoped to one detail or nested collection | `detail(id)` or nested sub-key | `useDeletePromptVersion` |\n| Cross-domain or bulk reset | `.all` | `useSpawnAgent`, `useActivateHand` |\n\n```ts\n// Default template: per-id patch where the list projection also changes\nexport function useUpdateFoo() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: updateFoo,\n    onSuccess: (_data, variables) => {\n      qc.invalidateQueries({ queryKey: fooKeys.lists() });\n      qc.invalidateQueries({ queryKey: fooKeys.detail(variables.id) });\n    },\n  });\n}\n```\n\nAvoid over-invalidating with `.all` — it refetches every cached sub-key for every cached item. Reserve it for true bulk operations like `useImportFoos` or cache resets.\n\nCall sites may additionally attach `onSuccess`/`onError` for UI feedback (toasts, modal dismissal, state resets). This is orthogonal to invalidation and stays at the call site.\n\n## Navigation & Pages\n\nThe dashboard exposes these top-level routes (confirmed by the E2E shell test):\n\n| Route | Purpose |\n|-------|---------|\n| Overview | System snapshot, key metrics |\n| Agents | Agent management, config editing, prompt experiments |\n| Sessions | Active and past agent sessions |\n| Approvals | Pending human-approval requests |\n| Comms | Communications events, channel testing |\n| Providers | LLM provider configuration |\n| Channels | Channel bridge management |\n| Skills | Skill installation, FangHub/ClawHub browsing |\n| Hands | Multi-agent hand orchestration |\n| Workflows | Workflow builder, execution history |\n| Scheduler | Cron schedules and triggers |\n| Goals | Agent goal tracking |\n| Analytics | Usage metrics and charts |\n| Memory | Agent memory inspection and cleanup |\n| Runtime | Backups, tasks, server controls |\n| Logs | System log viewer |\n\n## Authentication\n\nThe dashboard supports credentials-based authentication. When `GET /api/auth/dashboard-check` returns `{ mode: \"credentials\" }`, a sign-in dialog is presented. The API key is stored in `localStorage` under `librefang-api-key` and attached as a `Bearer` token on all subsequent requests via `buildHeaders()` / `authHeader()`.\n\nKey auth helpers in `src/api.ts`:\n\n- `setApiKey(key)` / `getStoredApiKey()` / `clearApiKey()` — manage the stored token\n- `verifyStoredAuth()` — probes a protected endpoint; clears stale tokens on 401\n- `buildAuthenticatedWebSocketUrl(path)` — appends `?token=` to WebSocket URLs\n\n## Agent Manifest System\n\nAgent configurations are defined in TOML manifests. The `src/lib/agentManifest.ts` module provides a full parse/serialize/validate pipeline with round-trip fidelity.\n\n### Form State Model\n\nThe manifest form represents every known TOML field as a dedicated property (strings for numeric fields to handle partial input). Unknown fields are preserved in an `extras` structure, ensuring hand-edited TOML survives a round-trip through the dashboard editor.\n\nKey capabilities:\n\n- **`emptyManifestForm()`** — creates a blank form with all defaults\n- **`parseManifestToml(toml)`** — parses TOML into `{ ok, form, extras, message? }`; normalizes aliases (e.g., `exec_policy: \"none\"` → `\"deny\"`)\n- **`serializeManifestForm(form, extras?)`** — produces TOML with a deterministic field order; omits defaults and empty values\n- **`validateManifestForm(form)`** — returns an array of field paths with errors (e.g., missing `name`, `model.provider`, `model.model`)\n\n### Advanced Fields\n\nFirst-class form fields include: `thinking` (budget, streaming), `autonomous` (iterations, heartbeats), `routing` (simple/medium/complex model tiers), `fallback_models[]`, `context_injection[]`, `response_format`, `schedule` (periodic/continuous), `exec_policy_shorthand`, and `workspace`/`priority`/`session_mode`.\n\n### Markdown Preview\n\n`generateManifestMarkdown(form, extras?)` in `agentManifestMarkdown.ts` produces a human-readable Markdown summary for agent detail views.\n\n## Chat & Messaging Utilities\n\n`src/lib/chat.ts` provides normalization helpers:\n\n- **`normalizeRole(role)`** — maps API casing (`\"User\"`) to lowercase (`\"user\"`)\n- **`asText(content)`** — converts string or JSON content to display text\n- **`formatMeta(meta)`** — formats token usage and cost metadata\n- **`normalizeToolOutput(event)`** — extracts tool name, content, and error status from tool result events\n\n`src/lib/chatPicker.ts` provides `groupedPicker(agents, hands, showHandAgents)` which organizes agents into standalone vs. hand-grouped entries for chat target selection, with coordinator-first ordering and alphabetical fallback.\n\n## Service Worker & PWA\n\nThe dashboard is a PWA with offline support:\n\n- **`public/manifest.json`** — standalone display mode, dark theme (`#020617` background)\n- **`public/sw.js`** — caches `/dashboard/` on install; uses stale-while-revalidate for static GETs; skips API requests entirely\n\n## API Layer\n\n`src/api.ts` contains all raw HTTP functions and type definitions. It handles:\n\n- Bearer token injection via `buildHeaders()`\n- Error parsing via `parseError()` → `ApiError`\n- WebSocket URL construction with auth tokens\n- Response normalization (e.g., `listTools` handles both `{ tools: [...] }` and bare `[...]` responses)\n\n`src/lib/http/client.ts` re-exports these with tighter typing. Generated types from the backend OpenAPI schema live in `openapi/generated.ts` and are refreshed with `pnpm openapi:types`.\n\n## Testing\n\n### Unit Tests (Vitest)\n\n```bash\npnpm test --run          # Run all vitest tests\npnpm test:watch          # Watch mode\n```\n\nHook tests use `createQueryClientWrapper` from `src/lib/test/query-client.tsx`, which provides a real `QueryClient` with spyable `invalidateQueries`. The pattern:\n\n```ts\nconst { queryClient, wrapper } = createQueryClientWrapper();\nconst invalidateSpy = vi.spyOn(queryClient, \"invalidateQueries\");\nconst { result } = renderHook(() => useMyMutation(), { wrapper });\n\nawait result.current.mutateAsync(payload);\nexpect(invalidateSpy).toHaveBeenCalledWith({ queryKey: expectedKey });\n```\n\nTest categories:\n- **Key factory tests** (`keys.test.ts`) — anchoring and hierarchy verification\n- **Query hook tests** — enabled/disabled guards, correct key usage, data flow\n- **Mutation hook tests** — invalidation correctness, narrow key targeting\n- **Utility tests** — TOML round-trips, chat normalization, chat picker grouping\n\n### End-to-End Tests (Playwright)\n\n```bash\npnpm e2e\n```\n\nPlaywright runs against a dev server on `127.0.0.1:4173`. Tests cover:\n- Shell navigation (all sidebar links visible and functional)\n- Auth dialog appearance when credentials are required\n\n### Type Checking\n\n```bash\npnpm typecheck           # tsc --noEmit\n```\n\nTypeScript strict mode. No `any` in new hooks — lean on types from `api.ts` or `openapi/generated.ts`.\n\n## Build & Verification\n\nRun all three after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`:\n\n```bash\npnpm typecheck           # Must pass\npnpm test --run          # Must pass (catches key anchoring regressions tsc misses)\npnpm build               # vite build — must succeed\n```\n\nA passing typecheck alone is insufficient — the key-factory tests catch structural issues the compiler cannot.\n\n## Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts` (or re-export via `src/lib/http/client.ts`)\n2. Add a key factory in `src/lib/queries/keys.ts` following the hierarchical pattern, anchored to `.all`\n3. Add `queryOptions` + `useXxx` in `src/lib/queries/<domain>.ts`\n4. Add mutation hooks in `src/lib/mutations/<domain>.ts` with narrow invalidation\n5. Add tests in `keys.test.ts` (minimum: factory existence) and corresponding mutation/query test files\n6. Regenerate types if the API schema changed: `pnpm openapi:types`\n\n## Commit Convention\n\n```\nfeat(dashboard/<area>): ...\nrefactor(dashboard/queries): ...\nfix(dashboard/<area>): ...\n```\n\nNever include a `Co-Authored-By` footer.","other-librefang-api-src":"# Other — librefang-api-src\n\n# LibreFang API Source — OpenAI Compatibility Layer & Login UI\n\n## Overview\n\nThis module contains two standalone components that serve as external-facing interfaces to LibreFang:\n\n1. **`openai_compat.rs`** — An OpenAI-compatible API surface (`/v1/chat/completions`, `/v1/models`) that lets any OpenAI client library interact with LibreFang agents as if they were models.\n2. **`login_page.html`** — A self-contained, zero-dependency HTML login page for the dashboard, served directly by the API server.\n\n---\n\n## OpenAI Compatibility Layer (`openai_compat.rs`)\n\n### Purpose\n\nLibreFang agents are not LLM models in the traditional sense — they are conversational loops backed by LLMs, tools, and memory. This module translates the OpenAI Chat Completions API protocol into LibreFang agent interactions, enabling tools like `curl`, the OpenAI Python SDK, LangChain, or any OpenAI-compatible client to talk to a LibreFang agent without custom integration code.\n\n### Architecture\n\n```mermaid\nflowchart LR\n    Client[\"OpenAI Client\"]\n    Client -->|POST /v1/chat/completions| Handler[\"chat_completions()\"]\n    Handler --> Resolve[\"resolve_agent()\"]\n    Resolve --> Registry[\"Agent Registry\"]\n    Handler --> Convert[\"convert_messages()\"]\n    Handler -->|stream=true| Stream[\"stream_response()\"]\n    Handler -->|stream=false| Kernel[\"Kernel.send_message_with_handle()\"]\n    Stream --> KernelStream[\"Kernel.send_message_streaming_with_routing()\"]\n    Handler -->|GET /v1/models| Models[\"list_models()\"]\n    Models --> Registry\n```\n\n### Endpoints\n\n#### `POST /v1/chat/completions` — `chat_completions()`\n\nThe primary endpoint. Accepts an OpenAI-style `ChatCompletionRequest` and routes it to a LibreFang agent.\n\n**Request body:**\n\n| Field | Type | Required | Description |\n|-------|------|----------|-------------|\n| `model` | `string` | Yes | Agent identifier (see resolution rules below) |\n| `messages` | `OaiMessage[]` | Yes | Conversation messages |\n| `stream` | `bool` | No | Enable SSE streaming (default: `false`) |\n| `max_tokens` | `u32` | No | Passed through (currently advisory) |\n| `temperature` | `f32` | No | Passed through (currently advisory) |\n\n**Agent resolution** (`resolve_agent`) attempts three lookup strategies in order:\n\n1. **`librefang:<name>`** — Explicit prefix. Calls `agent_registry().find_by_name()` with the stripped suffix.\n2. **UUID string** — Parses as `AgentId` and calls `agent_registry().get()`.\n3. **Plain string** — Falls back to treating the entire string as an agent name via `find_by_name()`.\n\nIf no agent is found, returns a `404` with an OpenAI-style `model_not_found` error object.\n\n**Non-streaming path:** Calls `kernel.send_message_with_handle()` with the last user message's text content. The full agent response (potentially spanning multiple LLM iterations and tool calls) is returned as a single `ChatCompletionResponse`. The `strip_think_tags()` helper from `crate::ws` removes internal thinking markers from the output.\n\n**Streaming path:** Delegates to `stream_response()`, which:\n1. Calls `kernel.send_message_streaming_with_routing()` to obtain a `StreamEvent` receiver.\n2. Sends an initial chunk with `role: \"assistant\"`.\n3. Spawns a Tokio task that forwards `StreamEvent` variants as `ChatCompletionChunk` objects over SSE.\n4. Terminates with a final chunk carrying `finish_reason: \"stop\"` and a `[DONE]` sentinel.\n\n**Error responses** follow the OpenAI error shape:\n```json\n{\n  \"error\": {\n    \"message\": \"...\",\n    \"type\": \"invalid_request_error\",\n    \"code\": \"model_not_found\"\n  }\n}\n```\n\n#### `GET /v1/models` — `list_models()`\n\nReturns all registered agents as OpenAI model objects. Each agent appears as:\n```json\n{\n  \"id\": \"librefang:<agent-name>\",\n  \"object\": \"model\",\n  \"created\": <unix_timestamp>,\n  \"owned_by\": \"librefang\"\n}\n```\n\n### Message Conversion\n\n`convert_messages()` transforms OpenAI-format messages into LibreFang `Message` structs:\n\n- **Role mapping:** `\"user\"` → `Role::User`, `\"assistant\"` → `Role::Assistant`, `\"system\"` → `Role::System`, anything else defaults to `Role::User`.\n- **Content handling** via the `OaiContent` enum:\n  - `OaiContent::Text` — Simple string content becomes `MessageContent::Text`.\n  - `OaiContent::Parts` — An array of typed content parts:\n    - `OaiContentPart::Text` → `ContentBlock::Text`\n    - `OaiContentPart::ImageUrl` → `ContentBlock::Image` (only `data:` URIs with base64 encoding; remote URLs are dropped)\n  - `OaiContent::Null` — The message is filtered out entirely.\n\nMessages with `Null` content or parts arrays that resolve to zero blocks are silently excluded.\n\n### Streaming Event Mapping\n\nThe spawned forwarder task in `stream_response()` handles these `StreamEvent` variants:\n\n| StreamEvent | Chunk Output |\n|-------------|-------------|\n| `TextDelta` | Delta with `content` field |\n| `ToolUseStart` | Delta with `tool_calls[i]` containing `id`, `type`, and `function.name` |\n| `ToolInputDelta` | Delta with `tool_calls[i]` containing incremental `function.arguments` |\n| `ContentComplete` (with `StopReason::ToolUse`) | Resets tool index for next iteration, no chunk emitted |\n| `ContentComplete` (other reasons) | No chunk emitted, waits for channel close |\n| All others (`ToolUseEnd`, `ToolExecutionResult`, `ThinkingDelta`, `PhaseChange`) | Silently skipped |\n\nThe tool call index increments per tool within each agent iteration and resets to zero when a `ToolUse` stop reason triggers a new iteration.\n\n### Key Types\n\n**Request types:** `ChatCompletionRequest`, `OaiMessage`, `OaiContent` (untagged enum), `OaiContentPart` (internally tagged), `OaiImageUrlRef`\n\n**Response types:** `ChatCompletionResponse`, `Choice`, `ChoiceMessage`, `UsageInfo`, `ChatCompletionChunk`, `ChunkChoice`, `ChunkDelta`, `OaiToolCall`, `OaiToolCallFunction`, `ModelObject`, `ModelListResponse`\n\nSerialization uses `skip_serializing_if = \"Option::is_none\"` throughout to maintain backward compatibility — `tool_calls` and `content` fields are absent from JSON when `None`, matching OpenAI's behavior.\n\n### Dependencies on Other Modules\n\n- **`crate::routes::AppState`** — Shared application state containing the kernel handle.\n- **`crate::ws::strip_think_tags`** — Strips internal `<think/>` markers from non-streaming responses.\n- **`librefang_runtime::kernel_handle::KernelHandle`** — Trait object for interacting with the agent kernel.\n- **`librefang_runtime::llm_driver::StreamEvent`** — Enum of streaming events from the LLM driver.\n- **`librefang_types::agent::AgentId`** — Agent identifier type (UUID-based).\n- **`librefang_types::message`** — `Message`, `MessageContent`, `ContentBlock`, `Role`, `StopReason`.\n\n---\n\n## Login Page (`login_page.html`)\n\n### Purpose\n\nA fully self-contained HTML/CSS/JS login page served at the root of the API server. It has zero external dependencies — no CDN links, no build step, no framework. This is the authentication gate for the LibreFang dashboard.\n\n### Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant Browser\n    participant API as /api/auth/dashboard-login\n\n    User->>Browser: Enter username + password\n    Browser->>API: POST {username, password}\n    API-->>Browser: {ok: true, token: \"...\"}\n\n    alt TOTP required\n        API-->>Browser: {requires_totp: true}\n        Browser->>User: Show TOTP input\n        User->>Browser: Enter 6-digit code\n        Browser->>API: POST {username, password, totp_code}\n        API-->>Browser: {ok: true, token: \"...\"}\n    end\n\n    Browser->>Browser: Store token in localStorage\n    Browser->>Browser: Redirect to destination\n```\n\n### Behavior Details\n\n**Form submission** (`#f` submit handler):\n1. Prevents default form submission.\n2. Clears any previous error message.\n3. Disables the submit button (`#btn`).\n4. Builds a JSON payload with `username` and `password`. If `requiresTotp` is `true` (set after a previous attempt indicated TOTP is needed), includes `totp_code`.\n5. Sends a `POST` to `/api/auth/dashboard-login` with `credentials: 'same-origin'`.\n\n**On success** (`d.ok && d.token`):\n- Stores the token under `localStorage` key `librefang-api-key` (wrapped in try/catch to handle storage unavailability).\n- Redirects to the original request path. If the path is just `/`, redirects to `/dashboard/`. Uses `location.replace()` to avoid leaving the login page in history.\n\n**On TOTP required** (`d.requires_totp`):\n- Sets the internal `requiresTotp` flag.\n- Unhides the `#totp-row` element.\n- Focuses the TOTP input.\n- Displays the prompt \"Enter your 6-digit TOTP code.\"\n\n**On failure:**\n- Displays `d.error` if present, otherwise \"Sign in failed.\"\n- Network errors display \"Network error.\"\n\n**Cleanup:** The submit button is re-enabled in the `finally` block regardless of outcome.\n\n### TOTP Input\n\nThe TOTP field (`#t`) has `inputmode=\"numeric\"`, `pattern=\"[0-9]{6}\"`, and `maxlength=\"6\"` for mobile-friendly entry. It also specifies `autocomplete=\"one-time-code\"` for browser autofill support. The field is hidden by default and only revealed when the server responds with `requires_totp: true`.\n\n### Design\n\n- **Dark theme by default** (`#0b0d12` background), with a `prefers-color-scheme: light` media query that switches to a light palette.\n- Single centered card (`width: min(92vw, 380px)`) using CSS Grid `place-items: center`.\n- Input focus state uses a blue ring (`#7c8cff` with `box-shadow`).\n- The error area uses `aria-live=\"polite\"` for screen reader announcements.\n- The page sets `<meta name=\"robots\" content=\"noindex, nofollow\">` to prevent search engine indexing.\n- Footer text references `config.toml` as the configuration source for auth settings.","other-librefang-api-static":"# Other — librefang-api-static\n\n# librefang-api-static — Static Frontend Assets (Locales)\n\n## Purpose\n\nThis module provides the internationalization (i18n) locale files for the LibreFang web dashboard. All user-facing text displayed in the frontend UI — labels, button captions, status messages, toast notifications, page descriptions, error messages, and onboarding copy — is defined here rather than hardcoded in components. This allows the dashboard to be presented in multiple languages without modifying application logic.\n\nCurrently supported languages:\n\n| Locale | File | Language |\n|--------|------|----------|\n| `en` | `locales/en.json` | English (default) |\n| `ja` | `locales/ja.json | Japanese |\n\n## File Structure\n\n```\nstatic/\n└── locales/\n    ├── en.json\n    └── ja.json\n```\n\nThe JSON files are flat key-value maps organized into nested namespaces by feature area. The frontend's i18n library resolves translation keys at render time using dot-path notation (e.g., `agentsPage.spawnAgent`, `agentChat.cmd.help`).\n\n## Translation Key Architecture\n\n### Interpolation\n\nStrings use `{variableName}` placeholders that the i18n runtime replaces with dynamic values:\n\n```json\n\"agentsStopped\": \"{count} agent(s) stopped\"\n```\n\nRendered as: `\"3 agent(s) stopped\"` when `{count}` is `3`.\n\nCommon interpolation variables across the locale files:\n\n| Variable | Used For |\n|----------|----------|\n| `{count}` | Numeric counts (agents, tokens, entries, files) |\n| `{name}` | Agent, channel, schedule, or skill names |\n| `{message}` | Error/detail message strings |\n| `{provider}` | LLM provider name (anthropic, openai, etc.) |\n| `{model}` | Model identifier |\n| `{time}` | Timestamp display |\n| `{key}` | Memory key name |\n| `{tool}` | Tool name |\n| `{old}`, `{new}` | Previous and updated values in memory conflicts |\n| `{filtered}`, `{total}` | Filtered vs total result counts |\n| `{configured}`, `{total}` | Configured vs total providers/channels |\n\n### Namespace Organization\n\nEach JSON file is organized into top-level namespaces corresponding to dashboard sections and shared UI components:\n\n```mermaid\ngraph TD\n    ROOT[en.json / ja.json] --> NAV[nav]\n    ROOT --> SHARED[btn, label, status, time, theme, confirm]\n    ROOT --> AUTH[auth, onboarding]\n    ROOT --> CHAT[agentChat, agentChat2]\n    ROOT --> PAGES[Page-specific namespaces]\n    ROOT --> SETTINGS[settingsPage, settingsPage2]\n    ROOT --> WIZARD[setupWizard, setupWizard2]\n\n    PAGES --> P1[overview]\n    PAGES --> P2[agentsPage, agentsPage2]\n    PAGES --> P3[sessionsPage]\n    PAGES --> P4[approvals]\n    PAGES --> P5[logsPage]\n    PAGES --> P6[runtimePage]\n    PAGES --> P7[workflowsPage]\n    PAGES --> P8[workflowBuilder]\n    PAGES --> P9[schedulerPage]\n    PAGES --> P10[channelsPage]\n    PAGES --> P11[skillsPage]\n    PAGES --> P12[handsPage]\n    PAGES --> P13[pluginsPage]\n    PAGES --> P14[commsPage]\n    PAGES --> P15[analyticsPage]\n    PAGES --> P16[goalsPage]\n    PAGES --> P17[memoryPage]\n```\n\n## Key Sections\n\n### Shared UI Elements\n\n**`nav`** — Sidebar navigation labels for all dashboard sections (Chat, Monitor, Overview, Analytics, Logs, Agents, Sessions, Approvals, Comms, Automation, Workflows, Scheduler, Goals, Extensions, Channels, Skills, Hands, Plugins, System, Runtime, Settings, Memory).\n\n**`btn`** — Generic button labels reused across the entire UI: `refresh`, `unlock`, `retry`, `send`, `stop`, `cancel`, `save`, `delete`, `edit`, `add`, `close`, `back`, `next`, `skip`, `test`, `go`, `chat`, `copy`, `copied`.\n\n**`label`** — Common field labels: `status`, `version`, `provider`, `model`, `agent`, `messages`, `actions`, `name`, `key`, `value`.\n\n**`status`** — Connection state indicators: `connecting`, `reconnecting`, `disconnected`, `ready`, `error`, `notConfigured`, `unknown`.\n\n**`time`** — Relative time formatting strings with `{count}` interpolation: `now`, `secondsAgo`, `minutesAgo`, `hoursAgo`, `daysAgo`.\n\n**`confirm`** — Shared confirmation dialog buttons: `cancel`, `confirm`.\n\n### Authentication and Onboarding\n\n**`auth`** — API key gate screen shown when the instance requires authentication: title, description, placeholder, and hint pointing users to `~/.librefang/config.toml`.\n\n**`onboarding`** — First-launch banner: welcome message, \"Launch Setup Wizard\" and \"Configure Manually\" options, dismiss action.\n\n**`setupWizard` / `setupWizard2`** — Multi-step guided setup flow covering provider configuration, agent creation, test message, optional channel connection, and completion summary. Contains ~60 keys covering every label, toast, and error message in the wizard flow.\n\n### Agent Chat\n\n**`agentChat`** — The largest single namespace (~100+ keys). Covers:\n- Session management (create, switch, list)\n- Message rendering states (`generating`, `processing`, `thinking`, `thinkingWithLevel`, `usingTool`, `working`)\n- Slash command definitions (`cmd.help`, `cmd.new`, `cmd.model`, `cmd.think`, `cmd.context`, `cmd.verbose`, etc.)\n- File attachment and voice recording UX\n- Toast notifications for model switches, session resets, compaction results\n- System status output (`sys.systemStatus`, `sys.budgetStatus`, `sys.ofpNetwork`)\n- Welcome tips and keyboard shortcut hints\n\n### Agent Management\n\n**`agentsPage`** — Agent creation (wizard and raw TOML modes), spawning, stopping, cloning, model switching, history clearing, tool filter management, archetype and vibe labels.\n\n**`detail`** — Agent detail panel: info tab, files tab, config tab, tool filters (allowlist/blocklist), fallback chain management.\n\n**`profile`** — Tool profile descriptions: `minimal`, `coding`, `research`, `messaging`, `automation`, `balanced`, `precise`, `creative`, `full`.\n\n**`template`** — Built-in agent template names and descriptions: `GeneralAssistant`, `CodeHelper`, `Researcher`, `Writer`, `DataAnalyst`, `DevOpsEngineer`, `CustomerSupport`, `Tutor`, `APIDesigner`, `MeetingNotes`.\n\n### Settings\n\n**`settingsPage`** — The second-largest namespace, covering nine settings tabs:\n\n| Sub-namespace | Content |\n|---------------|---------|\n| Provider config | API key management, OAuth flows, custom provider setup |\n| Model catalog | Browsing, filtering, custom model addition, catalog sync |\n| Tools | Tool listing and search |\n| Security | Full descriptions of 15 security features organized into `coreFeatures`, `configurableFeatures`, `monitoringFeatures` |\n| Network / OFP | Peer networking, A2A agent discovery |\n| Budget | Spending limits (hourly/daily/monthly), alert thresholds, top spenders |\n| Proactive Memory | mem0-style auto-memorize/auto-retrieve configuration |\n| System | Raw config JSON editing |\n| Migration | OpenClaw/OpenFang data import flow |\n\nThe security feature descriptions include structured objects with `name`, `description`, and either `threat` (for core features) or `hint` (for configurable features):\n\n```json\n\"coreFeatures\": {\n  \"ssrf_protection\": {\n    \"name\": \"SSRF Protection\",\n    \"description\": \"Blocks outbound requests to private IPs...\",\n    \"threat\": \"Internal network reconnaissance, cloud credential theft\"\n  }\n}\n```\n\n### Automation\n\n**`workflowsPage`** — Workflow CRUD, step definition, execution, and run history.\n\n**`workflowBuilder`** — Visual drag-and-drop workflow editor: node palette (Agent Step, Parallel Fan-out, Condition, Loop, Collect, Start, End), connection management, TOML export, node configuration labels.\n\n**`schedulerPage`** — Cron-based scheduled jobs and event triggers. Includes human-readable cron presets (`cron.everyMinute`, `cron.daily9am`, `cron.weekdays9am`, etc.), trigger type labels, and run history.\n\n**`goalsPage`** — Hierarchical goal tracking with sub-goals, status progression (Pending → In Progress → Completed/Cancelled), and progress tracking.\n\n### Extensions\n\n**`channelsPage`** — Messaging channel configuration (Telegram, Discord, Slack, WhatsApp, etc.). Three-step setup flow (Configure → Verify → Ready), QR code management for WhatsApp, Business API fallback, connection testing.\n\n**`skillsPage`** — Installed skills, ClawHub browsing and search, MCP server management, quick-start skill creation. Category labels covering 18 domains (coding, git, web, devops, browser, search, ai, data, productivity, communication, media, notes, security, cli, marketing, finance, smart-home, docs).\n\n**`handsPage`** — Curated autonomous capability packages. Three-step activation flow (Dependencies → Configure → Launch), browser session viewing, pause/resume/deactivate controls.\n\n**`pluginsPage`** — Plugin management with install sources (Registry, Local Path, Git URL), plugin scaffolding, and hook type labels (`ingest`, `after_turn`).\n\n### Monitoring and Analytics\n\n**`logsPage`** — Live log streaming and tamper-evident audit trail. States: `paused`, `live`, `polling`, `disconnected`. Chain verification output: `valid` / `broken`.\n\n**`approvals`** — Execution approval workflow: pending/approved/rejected/expired statuses, approval and rejection actions with confirmations.\n\n**`analyticsPage`** — Usage analytics with four tabs: Summary, By Model, By Agent, Costs. Token breakdowns, cost tracking, daily cost charts, provider/model cost breakdowns, tier classifications (Frontier, Smart, Balanced, Fast).\n\n**`runtimePage`** — Runtime information display: platform, architecture, API listen address, provider status with latency, uptime formatting.\n\n### Memory\n\n**`memoryPage`** — Proactive memory system UI: search, filtering by agent/level/category, version history display, CRUD operations, memory-level breakdown (User, Session, Agent).\n\n## Adding a New Locale\n\nTo add support for a new language:\n\n1. **Copy `en.json`** as the starting template:\n   ```\n   cp locales/en.json locales/<locale-code>.json\n   ```\n\n2. **Translate all values** — Do not modify keys or structural nesting. Only translate the string values.\n\n3. **Preserve interpolation placeholders** — Keep `{count}`, `{name}`, `{message}`, etc. exactly as-is. Reorder surrounding text as needed for target-language grammar.\n\n4. **Preserve Markdown formatting** — Some strings contain Markdown (e.g., `agentChat.welcomeTips` uses `**bold**` and `- ` list markers). Maintain these verbatim.\n\n5. **Register the locale** in the frontend's i18n configuration (outside this module).\n\n## Adding New Translation Keys\n\nWhen adding a new UI feature or page:\n\n1. **Namespace by page/component** — Create a new top-level key matching the page or component name (e.g., `\"graphsPage\"` for a new Graphs page).\n\n2. **Group related strings** — Use shallow nesting for sub-sections (e.g., `filter`, `status`, `toast` within a page namespace).\n\n3. **Use consistent suffixes** across namespaces:\n   - `*Title` — Dialog/section titles\n   - `*Desc` / `*Description` — Descriptive text\n   - `*Placeholder` — Input placeholders\n   - `*Failed` — Error toast messages\n   - `*Toast` — Success toast messages\n   - `*Confirm` — Confirmation dialog body text\n\n4. **Update all locale files** — Every key in `en.json` must have a corresponding entry in every other locale file, even if the initial value is the English string (to be translated later).","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests\n\nIntegration and load tests for the LibreFang HTTP API. These tests boot a real `LibreFangKernel`, start an actual axum server on an ephemeral port, and exercise endpoints over HTTP using `reqwest`. No mocks, no test frameworks beyond tokio's test runtime.\n\n## Running\n\n```bash\n# All tests (no LLM key needed for most)\ncargo test -p librefang-api -- --nocapture\n\n# Single test file\ncargo test -p librefang-api --test api_integration_test -- --nocapture\n\n# Tests that call a real LLM (requires Groq)\nGROQ_API_KEY=gsk_... cargo test -p librefang-api --test api_integration_test -- --nocapture\n\n# Skipped/flaky tests (concurrent spawn races)\ncargo test -p librefang-api --test load_test -- --nocapture --ignored\n```\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Harnesses\"\n        TS[start_test_server]\n        TSLLM[start_test_server_with_llm]\n        TSAUTH[start_test_server_with_auth]\n        FR[start_full_router]\n    end\n\n    subgraph \"Per-Test Stack\"\n        TMP[tempfile::TempDir]\n        KC[KernelConfig]\n        K[LibreFangKernel::boot_with_config]\n        AS[AppState]\n        AX[axum::serve on 127.0.0.1:0]\n    end\n\n    subgraph \"Shared Infrastructure\"\n        ML[middleware layers]\n        RT[route definitions from routes::]\n        WS[ws::agent_ws]\n    end\n\n    TS --> TMP\n    TS --> KC --> K --> AS\n    AS --> AX\n    FR --> |\"server::build_router\"| AS\n\n    AX --> ML --> RT\n    ML --> WS\n```\n\nEach test creates an isolated `tempfile::TempDir` holding the kernel's `home_dir` and `data_dir`, boots a fresh `LibreFangKernel`, assembles an `AppState`, and binds an axum server to port 0 (OS-assigned random port). The `TempDir` lives as long as the test's `TestServer` or `FullRouterHarness` struct, ensuring filesystem cleanup on drop. The kernel is shut down in the `Drop` impl.\n\n## Test Files\n\n### `api_integration_test.rs`\n\nThe primary integration suite (~30 tests). Covers:\n\n| Category | Tests | Key endpoints |\n|---|---|---|\n| **Health & Status** | `test_health_endpoint`, `test_status_endpoint` | `/api/health`, `/api/status` |\n| **API Versioning** | `test_build_router_exposes_versioned_api_aliases`, `test_build_router_path_version_beats_unknown_accept_header` | `/api/v1/*`, `/api/versions` |\n| **Agent Lifecycle** | `test_spawn_list_kill_agent`, `test_multiple_agents_lifecycle`, `test_agent_session_empty` | `/api/agents` |\n| **Agent Monitoring** | `test_agent_monitoring_endpoints` | `/api/agents/{id}/metrics`, `/api/agents/{id}/logs` |\n| **Pagination & Search** | `test_agent_list_paginated_response_format`, `test_agent_list_pagination`, `test_agent_list_text_search`, `test_agent_list_valid_sort_fields`, `test_agent_list_invalid_sort_returns_400`, `test_agent_list_limit_clamped_to_max` | `/api/agents?q=&sort=&limit=&offset=` |\n| **Workflows** | `test_workflow_crud` | `/api/workflows` |\n| **Triggers** | `test_trigger_crud` | `/api/triggers` |\n| **Tools** | `test_list_tools`, `test_get_tool_found`, `test_get_tool_not_found` | `/api/tools`, `/api/tools/{name}` |\n| **Config Reload** | `test_config_reload_hot_reloads_proxy_changes` | `/api/config/reload` |\n| **Auth** | `test_auth_health_is_public`, `test_auth_rejects_no_token`, `test_auth_rejects_wrong_token`, `test_auth_accepts_correct_token`, `test_auth_disabled_when_no_key` | Bearer token via `middleware::auth` |\n| **MCP Bridge** | `test_mcp_http_rehydrates_caller_context_from_agent_header`, `test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated`, `test_mcp_http_unrestricted_agent_can_call_any_tool`, `test_mcp_http_enforces_agent_tool_allowlist` | `/mcp` with `X-LibreFang-Agent-Id` header |\n| **Migration** | `test_run_migrate_uses_daemon_home_when_target_dir_is_empty` | `/api/migrate` |\n| **Dashboard** | `test_build_router_serves_dashboard_locales`, `test_build_router_providers_marks_local_providers` | `/locales/*`, `/api/providers` |\n| **Hands** | `list_active_hands_includes_definition_metadata` | `/api/hands/active` |\n| **Error Handling** | `test_invalid_agent_id_returns_400`, `test_kill_nonexistent_agent_returns_404`, `test_spawn_invalid_manifest_returns_400`, `test_request_id_header_is_uuid` | Various |\n\n### `daemon_lifecycle_test.rs`\n\nTests daemon startup, PID file management, and shutdown:\n\n- `test_daemon_info_serde_roundtrip` — `DaemonInfo` JSON round-trip.\n- `test_read_daemon_info_from_file` — reads `daemon.json` from disk.\n- `test_read_daemon_info_missing_file` — returns `None` when absent.\n- `test_read_daemon_info_corrupt_json` — returns `None` for invalid JSON.\n- `test_full_daemon_lifecycle` — boots kernel, writes `daemon.json`, hits health/status, calls shutdown, cleans up file.\n- `test_stale_daemon_info_detection` — verifies file is readable even with a dead PID (liveness check is in `run_daemon`, not `read_daemon_info`).\n- `test_server_immediate_responsiveness` — asserts `/api/health` responds in under 1 second.\n\n### `load_test.rs`\n\nPerformance benchmarks gated behind `#[ignore]` for flaky tests. All tests print throughput/latency metrics to stderr:\n\n- `load_endpoint_latency` — measures p50/p95/p99 for 8 GET endpoints over 100 requests each, with a 10-request warmup to amortize cold-start costs. Asserts p95 < 1s.\n- `load_concurrent_reads` — 50 simultaneous GETs across health/agents/status/metrics.\n- `load_concurrent_agent_spawns` (ignored) — 20 parallel POST `/api/agents`.\n- `load_spawn_kill_cycle` (ignored) — 10 sequential spawn-then-kill cycles.\n- `load_session_management` — creates 10 sessions, lists them, switches through each.\n- `load_workflow_operations` — 15 concurrent workflow creates, then lists.\n- `load_metrics_sustained` — 200 sequential hits to `/api/metrics`, asserts response contains `librefang_agents_active`.\n\n### `openapi_spec_test.rs`\n\nSingle test `generate_openapi_json` that:\n\n1. Calls `ApiDoc::openapi()` via `utoipa::OpenApi`.\n2. Serializes to pretty JSON.\n3. Asserts 100+ paths exist (regression guard against accidental route removal).\n4. Writes the spec to `openapi.json` at the repository root for SDK codegen and CI consumption.\n\n## Test Harness Infrastructure\n\n### `TestServer`\n\nUsed by most integration tests. Builds a minimal route table by hand (health, status, agents, triggers, workflows, tools, MCP, shutdown) and attaches middleware explicitly:\n\n```\nCorsLayer::permissive()\nTraceLayer::new_for_http()\nmiddleware::request_logging\n```\n\nThe auth variant (`start_test_server_with_auth`) additionally layers in `middleware::auth` with an `AuthState` constructed from the kernel's API key.\n\n### `FullRouterHarness`\n\nUses `server::build_router` instead of a hand-built route table. This gives the full production middleware stack, API versioning (`/api/v1/*`), dashboard static assets, locale files, provider listing, and migration endpoints. Tests that need the full router (versioning, locales, providers, migration, hands) use this harness.\n\n### `start_test_server_with_provider`\n\nThe core factory. Parameters:\n\n- `provider` — LLM provider string (e.g. `\"ollama\"`, `\"groq\"`)\n- `model` — model identifier\n- `api_key_env` — environment variable name for the API key\n\nCreates a `KernelConfig` with `home_dir` and `data_dir` inside a temp directory, boots the kernel, constructs `AppState` with all required fields (caches, session maps, webhook store, shutdown notify), builds the router, binds to `127.0.0.1:0`, and spawns the server in a background tokio task.\n\n## Manifests\n\nSeveral TOML manifests are defined as constants for spawning test agents:\n\n| Constant | Purpose | Provider | Capabilities |\n|---|---|---|---|\n| `TEST_MANIFEST` | Default test agent | ollama | `file_read`, full memory |\n| `LLM_MANIFEST` | Real LLM calls | groq / llama-3.3-70b-versatile | `file_read`, full memory |\n| `MCP_TEST_MANIFEST` | MCP caller-context tests | ollama | `cron_list`, `cron_create`, `cron_cancel` |\n| Inline `UNRESTRICTED_MANIFEST` | No tool restrictions | ollama | none (unrestricted) |\n\n## LLM-Gated Tests\n\nTests requiring a real LLM call check for `GROQ_API_KEY` at startup and gracefully skip if unset:\n\n```rust\nif std::env::var(\"GROQ_API_KEY\").is_err() {\n    eprintln!(\"GROQ_API_KEY not set, skipping LLM integration test\");\n    return;\n}\n```\n\n`test_send_message_with_llm` is the primary LLM test: spawns a Groq-backed agent, sends `\"Say hello in exactly 3 words.\"`, and asserts non-empty response with positive token counts.\n\n## MCP Caller Context Tests\n\nA critical regression guard for issue #2699. The `/mcp` endpoint must read `X-LibreFang-Agent-Id` from the request header to rehydrate the caller's agent identity. Without this, CLI drivers (claude-code) cannot invoke workspace/cron/media tools because the tool executor has no agent context for permission checks.\n\nThe helper `call_mcp_cron_list` sends a JSON-RPC `tools/call` for `cron_list` with an optional agent header. Four tests verify:\n\n1. No header → error (\"Agent ID required\")\n2. Valid header, restricted agent → permission denied (allowlist enforced)\n3. Valid header, unrestricted agent → success (empty tools list means \"allow all\")\n4. Invalid/unknown header → graceful fallback to unauthenticated error (not a 500)\n\n## Adding New Tests\n\n1. For endpoint tests that don't need the full router, add a test to `api_integration_test.rs` using `start_test_server()`.\n2. If you need the full production middleware stack, versioned routes, or dashboard assets, use `start_full_router()` and `harness.app.clone().oneshot(...)`.\n3. For auth-specific tests, use `start_test_server_with_auth(\"your-api-key\")`.\n4. For performance benchmarks, add to `load_test.rs`. Use `#[ignore]` if the test is flaky under concurrency.\n5. All multi-threaded tests must use `#[tokio::test(flavor = \"multi_thread\")]` because the kernel spawns background tasks.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nHTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate exposes the primary network interface through which external clients — browsers, CLI tools, and other agents — interact with the LibreFang runtime. It also embeds and serves the React-based dashboard UI.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Client[HTTP / WS Client] --> API[librefang-api<br/>Axum Server]\n    API --> Kernel[librefang-kernel]\n    API --> Runtime[librefang-runtime]\n    API --> Channels[librefang-channels]\n    API --> Skills[librefang-skills]\n    API --> Hands[librefang-hands]\n    API --> Extensions[librefang-extensions]\n    API --> Memory[librefang-memory]\n    API --> Telemetry[librefang-telemetry]\n    API --> Wire[librefang-wire]\n    API --> Migrate[librefang-migrate]\n    API --> Types[librefang-types]\n```\n\nThe API crate is a thin orchestration layer. It wires Axum routes and WebSocket endpoints to the domain crates that do the real work. Business logic lives downstream; this crate is responsible for request parsing, authentication, rate limiting, serialization, and serving static assets.\n\n## Feature Flags\n\nFeature flags control which channel backends are compiled in and whether telemetry infrastructure is active.\n\n### Telemetry\n\n| Flag | Default | Effect |\n|------|---------|--------|\n| `telemetry` | ✓ | Enables OpenTelemetry trace export and Prometheus metrics endpoint |\n\nWhen enabled, pulls in `opentelemetry`, `opentelemetry_sdk`, `opentelemetry-otlp`, `tracing-opentelemetry`, `metrics`, and `metrics-exporter-prometheus`.\n\n### Channel Features\n\nEvery messaging channel is individually gated. The flag names follow the pattern `channel-<name>` and are forwarded directly to `librefang-channels`.\n\n**Predefined feature groups:**\n\n- **`all-channels`** (default) — compiles every supported channel backend (40+ protocols including Telegram, Discord, Slack, Matrix, WhatsApp, Signal, Teams, IRC, and many more).\n- **`mini`** — a curated subset of 12 core channels (Telegram, Discord, Slack, Matrix, Email, Webhook, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat). Use this for smaller binary sizes when only the most common channels are needed.\n\nTo build with only specific channels, disable default features and enable only what you need:\n\n```toml\n# In a dependent Cargo.toml or via command line\nlibrefang-api = { default-features = false, features = [\"channel-telegram\", \"channel-discord\", \"telemetry\"] }\n```\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks at compile time:\n\n1. **Dashboard directory scaffolding** — Ensures `static/react/` exists so the `include_dir!` macro (used at runtime to embed dashboard assets) never fails on fresh clones. This directory is gitignored because it contains build artifacts from the dashboard's `npm run build` step. When empty, the runtime falls back to serving assets from `~/.librefang/dashboard/`.\n\n2. **Git commit hash** — Captured via `git rev-parse --short HEAD` and exposed as the `GIT_SHA` environment variable, embedded into the binary for version reporting.\n\n3. **Build date and compiler version** — `BUILD_DATE` (UTC date) and `RUSTC_VERSION` are similarly captured and embedded.\n\nAll three values gracefully degrade to `\"unknown\"` when the commands aren't available (e.g., building from a tarball without git).\n\n## Key Dependencies and Their Roles\n\n| Crate | Purpose within the API |\n|-------|----------------------|\n| `axum`, `tower`, `tower-http` | HTTP framework, middleware stack, CORS/compression/tracing layers |\n| `governor` | Request rate limiting |\n| `utoipa` | OpenAPI spec generation with Axum integration |\n| `jsonwebtoken` | JWT validation for API authentication |\n| `argon2` | Password hashing for local credential storage |\n| `hmac`, `sha2`, `subtle` | HMAC-SHA256 signature verification (e.g., webhook validation) with constant-time comparison |\n| `governor` | Token-bucket rate limiting per IP or API key |\n| `include_dir` | Embeds the compiled React dashboard into the binary |\n| `dashmap` | Concurrent in-memory state maps (e.g., active WebSocket sessions) |\n| `portable-pty` | Terminal/PTY management for interactive shell endpoints |\n| `flate2`, `tar`, `zip` | Archive handling for extension packaging/upload |\n| `reqwest` | Outbound HTTP client for webhook dispatch and extension downloads |\n| `toml`, `toml_edit` | Reading and programmatically modifying configuration files |\n\n## Authentication Model\n\nThe API uses JWT-based authentication (`jsonwebtoken`) for session tokens and `argon2` for password hashing at the credential storage layer. Webhook endpoints use HMAC-SHA256 (`hmac` + `sha2`) with constant-time equality checks (`subtle`) to verify signed payloads from channel providers.\n\n## API Documentation\n\nOpenAPI documentation is generated at compile time via `utoipa` with the `axum_extras` feature. The generated spec is served from a route on the running server, providing interactive documentation for all registered endpoints.\n\n## Connection to the Rest of the Codebase\n\nThis crate sits at the **edge** of the LibreFang system. It does not contain domain logic itself but delegates to:\n\n- **librefang-kernel** — Core agent lifecycle and orchestration\n- **librefang-runtime** — Execution environment management\n- **librefang-channels** — Inbound/outbound message routing across channel backends\n- **librefang-skills** — Skill registry and invocation\n- **librefang-hands** — Tool/hand execution for agent actions\n- **librefang-extensions** — Extension management, including vault access for secrets\n- **librefang-memory** — Conversation and long-term memory storage\n- **librefang-migrate** — Database schema migration\n- **librefang-wire** — Wire protocol types shared between API and daemon\n- **librefang-telemetry** — Telemetry infrastructure shared across crates\n- **librefang-types** — Common type definitions\n\n## Building\n\n```bash\n# Full build with all channels and telemetry\ncargo build -p librefang-api\n\n# Minimal build with select channels\ncargo build -p librefang-api --no-default-features \\\n  --features \"channel-telegram,channel-discord,telemetry\"\n\n# Mini preset (12 core channels)\ncargo build -p librefang-api --no-default-features --features \"mini,telemetry\"\n```\n\n### Dashboard Assets\n\nThe React dashboard is embedded via `include_dir!`. To include compiled assets:\n\n1. Build the dashboard (`npm run build` in the dashboard subcrate), which outputs into `librefang-api/static/react/`, or\n2. Leave the directory empty — the server will serve assets from `~/.librefang/dashboard/` at runtime instead.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels Benchmarks — Dispatch Hot Paths\n\nLocation: `librefang-channels/benches/dispatch.rs`\n\n## Purpose\n\nThis module provides Criterion microbenchmarks for the performance-critical paths in `librefang-channels`. It measures throughput and latency of three subsystems that execute on every inbound message: JSON serialization, agent routing, and output format conversion.\n\nRun the benchmarks:\n\n```bash\ncargo bench -p librefang-channels\n```\n\n## Benchmark Groups\n\nThe benchmarks are organized into three Criterion groups, which can also be run individually by filtering:\n\n```bash\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n```\n\n### 1. Serialization (`serialization`)\n\nTests JSON round-trip performance of `ChannelMessage` via `serde_json`.\n\n| Benchmark | What it measures |\n|---|---|\n| `message_serialize` | `ChannelMessage` → JSON string |\n| `message_deserialize` | JSON string → `ChannelMessage` |\n| `message_roundtrip` | Serialize then deserialize in one iteration |\n\nAll three use a shared `make_sample_message()` helper that constructs a realistic `ChannelMessage` with a Telegram channel, text content, sender info, and a UTC timestamp. The message includes an empty `HashMap` for metadata, matching the common no-extra-metadata case.\n\n### 2. Routing (`routing`)\n\nTests `AgentRouter` resolution paths with increasing complexity.\n\n| Benchmark | Router setup | Resolution path |\n|---|---|---|\n| `router_resolve_direct` | One default agent + one direct route (`Telegram`/`user-42` → agent) | Direct route lookup |\n| `router_resolve_default_fallback` | One default agent, no specific routes | Falls through to default |\n| `router_resolve_binding_match` | Named agent + `AgentBinding` matching `telegram` channel + `vip-user` peer | Binding rule evaluation |\n| `router_resolve_with_context` | Named agent + `AgentBinding` matching `discord` channel + `guild_id` + `roles` | Context-aware resolution via `resolve_with_context` with `BindingContext` |\n\nThe progression from direct lookup → default fallback → binding match → context-aware resolution reflects the actual resolution hierarchy in `router.rs`. The `resolve_with_context` benchmark is the most expensive path because it constructs a `BindingContext` with borrowed `guild_id` and multiple `roles` and then evaluates them against loaded bindings.\n\n### 3. Formatting (`formatting`)\n\nTests `format_for_channel` across all `OutputFormat` variants and `split_message` at different input sizes.\n\n| Benchmark | Input | Format |\n|---|---|---|\n| `format_markdown_passthrough` | Multi-paragraph markdown | `OutputFormat::Markdown` |\n| `format_telegram_html` | Multi-paragraph markdown | `OutputFormat::TelegramHtml` |\n| `format_slack_mrkdwn` | Multi-paragraph markdown | `OutputFormat::SlackMrkdwn` |\n| `format_plain_text` | Multi-paragraph markdown | `OutputFormat::PlainText` |\n| `format_telegram_html_short` | 12-character plain string | `OutputFormat::TelegramHtml` |\n| `split_message_short` | 6-character string, 4096 limit | N/A |\n| `split_message_long` | 500-line text (~12KB), 4096 limit | N/A |\n| `default_phase_emoji_all` | All six `AgentPhase` variants | N/A |\n\nThe multi-paragraph `SAMPLE_MARKDOWN` constant exercises bold, italic, code, links, and list formatting — the full conversion surface. The short-text benchmarks measure the fast-path overhead when no conversion is needed.\n\n`default_phase_emoji_all` iterates over `Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, and `Error` in a single iteration to measure aggregate phase-lookup cost.\n\n## Architecture\n\n```mermaid\ngraph TD\n    B[dispatch.rs] -->|serialize/deserialize| CM[ChannelMessage<br/>types.rs]\n    B -->|resolve / resolve_with_context| AR[AgentRouter<br/>router.rs]\n    B -->|format_for_channel| FM[formatter.rs]\n    B -->|split_message / default_phase_emoji| CM\n    AR -->|load_bindings / register_agent| BC[BindingContext<br/>router.rs]\n```\n\n## Dependencies on Other Crates\n\n- **`librefang-channels`** (library under test): provides `AgentRouter`, `BindingContext`, `format_for_channel`, `ChannelMessage`, `ChannelContent`, `ChannelType`, `ChannelUser`, `split_message`, `default_phase_emoji`, and `AgentPhase`.\n- **`librefang-types`**: provides `AgentId`, `OutputFormat`, `AgentBinding`, and `BindingMatchRule` used to configure the router and formatter.\n- **`criterion`**: benchmark harness.\n- **`chrono`**: `Utc::now()` for message timestamps.\n- **`smallvec`**: used internally by `BindingContext` for the `roles` field.\n\n## Adding New Benchmarks\n\n1. **Identify the group**: serialization, routing, or formatting.\n2. **Write the benchmark function** following the existing pattern — call `black_box` on all inputs, use `b.iter(|| ...)` for the measured closure.\n3. **Add the function** to the appropriate `criterion_group!` macro invocation at the bottom of the file.\n4. Verify the benchmark compiles and runs: `cargo bench -p librefang-channels -- <bench_name>`.\n\n## Caveats\n\n- Router benchmarks construct a fresh `AgentRouter` per benchmark function (in the setup, outside the timed loop). The timed portion measures only the `resolve*` calls, not setup overhead.\n- `bench_message_roundtrip` is not simply the sum of `message_serialize` + `message_deserialize` because Criterion's statistical analysis accounts for variance independently per benchmark.\n- All benchmarks use `black_box` on inputs to prevent the compiler from constant-folding or eliminating the work.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# librefang-channels Integration Tests\n\n## Purpose\n\nThis module provides integration tests for the `BridgeManager` dispatch pipeline. Tests exercise the **complete message flow** — from adapter ingestion through routing, kernel dispatch, and response delivery — without contacting any external service. All communication happens in-process via real tokio channels and tasks.\n\n## Architecture\n\nEach test follows the same wiring pattern:\n\n```mermaid\ngraph LR\n    T[Test code] -->|inject via mpsc::Sender| A[MockAdapter]\n    A -->|ChannelMessage stream| B[BridgeManager]\n    B -->|dispatch| H[MockHandle]\n    H -->|response| B\n    B -->|send / send_streaming| A\n    T -->|assert on captured output| A\n```\n\n**Key production types under test:**\n- `BridgeManager` — orchestrates adapter lifecycles and message dispatch\n- `AgentRouter` — maps `(ChannelType, user_id)` → `AgentId`\n- `ChannelBridgeHandle` — the kernel-side trait the bridge dispatches to\n- `ChannelAdapter` — the channel-side trait that produces/consumes messages\n\n## Mock Types\n\n### Channel Adapters\n\n| Mock | Streaming | Purpose |\n|------|-----------|---------|\n| `MockAdapter` | No | Basic adapter. Captures `send()` output as `(platform_id, text)` pairs. Flattens interactive button labels into text for assertion. |\n| `MockStreamingAdapter` | Yes | Overrides `send_streaming()`. Records streamed deltas separately from non-streaming sends, allowing tests to assert which path was taken. |\n| `MockFailingStreamingAdapter` | Yes (always fails) | `send_streaming()` drains the delta channel then returns `Err`. Used to exercise the buffered-text fallback branch. |\n\nAll adapters are created via a `new(name, channel_type)` function that returns `(Arc<Self>, mpsc::Sender<ChannelMessage>)`. Inject test messages through the sender; inspect captured output via `get_sent()` / `get_streamed()`.\n\n### Kernel Handles\n\n| Mock | Streaming | Progress | Purpose |\n|------|-----------|----------|---------|\n| `MockHandle` | No | — | Echoes messages. Serves a static agent list. Records received `(AgentId, message)` pairs. |\n| `MockStreamingHandle` | Yes (word deltas) | — | Splits the echo response into per-word deltas emitted over an `mpsc::channel`. |\n| `MockProgressHandle` | Via `send_message_streaming_with_sender_status` | 🔧 markers | Emits a progress line (`🔧 \\`tool_name\\``) followed by prose. Tests the V2 contract where progress is surfaced on all channels. |\n| `MockKernelErrorHandle` | Yes | 🔧 markers | Sends partial deltas then reports `Err` via the status oneshot. Tests the double-failure outcome (transport + kernel both fail). |\n| `MockKernelOkHandle` | Yes | — | Sends clean deltas and reports `Ok(())`. Implements `record_delivery()` to capture `(success, err)` pairs — used to assert the metric contract from the Bug 1 fix. |\n\n## Helper Functions\n\n### `make_text_msg(channel, user_id, text) → ChannelMessage`\n\nConstructs a `ChannelMessage` with `ChannelContent::Text`. Useful for testing normal message dispatch.\n\n### `make_command_msg(channel, user_id, cmd, args) → ChannelMessage`\n\nConstructs a `ChannelMessage` with `ChannelContent::Command`. Used for slash-command tests (`/agents`, `/help`, `/agent`, `/status`).\n\n## Test Catalog\n\n### Basic Dispatch\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_dispatch_text_message` | A text message from a pre-routed user reaches the kernel handle and the echo response is delivered back through the adapter's `send()`. |\n| `test_bridge_dispatch_no_agent_assigned` | An unrouted user receives a \"No agents available\" error response. |\n\n### Command Handling\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_dispatch_agents_command` | `/agents` command lists all registered agents by name. |\n| `test_bridge_dispatch_help_command` | `/help` returns help text mentioning `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` updates the router so subsequent messages from that user route to the selected agent. Asserts both the confirmation message and `router.resolve()` state. |\n| `test_bridge_dispatch_status_command` | `/status` returns uptime info including running agent count. |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text `/agents` (not the `Command` variant) is still handled as a command by the bridge. |\n\n### Lifecycle & Multi-Adapter\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_manager_lifecycle` | Start adapter → send 5 messages → all 5 echo responses received → `stop()` completes without hanging. |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run simultaneously on the same `BridgeManager`. Messages sent to each adapter produce responses on the correct adapter. |\n\n### Streaming Paths\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both the adapter and handle support streaming, `send_streaming()` is called and `send()` is **not** called. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | A non-streaming adapter uses `send()` even when the handle supports streaming. |\n| `test_default_send_streaming_collects_and_sends` | The default `ChannelAdapter::send_streaming()` implementation collects all deltas and calls `self.send()` with the assembled text. |\n\n### Progress Markers & Error Recovery\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapters (Discord/Slack/Matrix) receive progress markers (🔧 `tool_name`) in the consolidated response via the V2 `send_message_streaming_with_sender_status` path. |\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | When both `send_streaming()` fails and the kernel reports an error, the fallback `send()` delivers the buffered partial text including progress markers. |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression test.** When the kernel succeeds but `send_streaming()` fails, the fallback delivers buffered text and `record_delivery()` is called with `(success=true, err=None)` — never `err=Some(...)` when success is true. |\n\n## Writing New Tests\n\nTo add a new integration test:\n\n1. **Choose or create a mock handle** — start with `MockHandle` unless you need streaming, progress markers, or specific error injection.\n2. **Choose or create a mock adapter** — use `MockAdapter` for basic tests, `MockStreamingAdapter` for streaming paths.\n3. **Wire everything up:**\n   ```rust\n   let handle = Arc::new(MockHandle::new(vec![(agent_id, \"name\".into())]));\n   let router = Arc::new(AgentRouter::new());\n   router.set_user_default(\"user1\".into(), agent_id);  // if needed\n\n   let (adapter, tx) = MockAdapter::new(\"test-name\", ChannelType::Telegram);\n   let adapter_ref = adapter.clone();\n\n   let mut manager = BridgeManager::new(handle, router);\n   manager.start_adapter(adapter).await.unwrap();\n   ```\n4. **Inject messages** via `tx.send(make_text_msg(...)).await.unwrap()`.\n5. **Wait** with `tokio::time::sleep(Duration::from_millis(100..300))` for the async pipeline.\n6. **Assert** on `adapter_ref.get_sent()` (and `get_streamed()` for streaming adapters).\n7. **Clean up** with `manager.stop().await`.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\n**Channel Bridge Layer** — pluggable messaging integrations for LibreFang.\n\nThis crate provides a uniform interface for sending and receiving messages across 43+ messaging platforms. Each platform is compiled behind a Cargo feature flag, allowing deployments to include only the channels they need.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────┐\n│              librefang-channels                  │\n│                                                  │\n│  ┌──────────┐ ┌──────────┐ ┌──────────┐        │\n│  │ Telegram │ │ Discord  │ │  Slack   │  ...    │\n│  │  Driver  │ │  Driver  │ │  Driver  │         │\n│  └────┬─────┘ └────┬─────┘ └────┬─────┘        │\n│       │             │             │              │\n│       └─────────────┼─────────────┘              │\n│                     │                            │\n│              ┌──────▼──────┐                     │\n│              │  Dispatch   │                     │\n│              │   / Router  │                     │\n│              └──────┬──────┘                     │\n│                     │                            │\n└─────────────────────┼────────────────────────────┘\n                      │\n              ┌───────▼───────┐\n              │ librefang-    │\n              │   types       │\n              └───────────────┘\n```\n\nEach channel driver translates between platform-specific APIs (REST, WebSocket, IMAP, etc.) and the shared types defined in `librefang-types`. A central dispatch/router normalizes inbound messages and routes outbound messages to the correct driver.\n\n## Supported Channels\n\n| Channel | Feature Flag | Extra Dependencies |\n|---------|-------------|-------------------|\n| Telegram | `channel-telegram` | — |\n| Discord | `channel-discord` | — |\n| Slack | `channel-slack` | — |\n| Matrix | `channel-matrix` | — |\n| Email | `channel-email` | `lettre`, `imap`, `rustls-connector`, `mailparse` |\n| Webhook | `channel-webhook` | — |\n| WhatsApp | `channel-whatsapp` | — |\n| Signal | `channel-signal` | — |\n| Microsoft Teams | `channel-teams` | — |\n| Mattermost | `channel-mattermost` | — |\n| IRC | `channel-irc` | — |\n| Google Chat | `channel-google-chat` | `rsa` |\n| Twitch | `channel-twitch` | — |\n| Rocket.Chat | `channel-rocketchat` | — |\n| Zulip | `channel-zulip` | — |\n| XMPP | `channel-xmpp` | — |\n| Bluesky | `channel-bluesky` | — |\n| Feishu (Lark) | `channel-feishu` | `aes`, `cbc` |\n| LINE | `channel-line` | — |\n| Mastodon | `channel-mastodon` | — |\n| Messenger (Facebook) | `channel-messenger` | — |\n| Reddit | `channel-reddit` | — |\n| Revolt | `channel-revolt` | — |\n| Viber | `channel-viber` | — |\n| Voice | `channel-voice` | — |\n| Flock | `channel-flock` | — |\n| Guilded | `channel-guilded` | — |\n| Keybase | `channel-keybase` | — |\n| Nextcloud Talk | `channel-nextcloud` | — |\n| Nostr | `channel-nostr` | `k256` |\n| Pumble | `channel-pumble` | — |\n| Threema | `channel-threema` | — |\n| Twist | `channel-twist` | — |\n| Webex | `channel-webex` | — |\n| DingTalk | `channel-dingtalk` | — |\n| Discourse | `channel-discourse` | — |\n| Gitter | `channel-gitter` | — |\n| Gotify | `channel-gotify` | — |\n| LinkedIn | `channel-linkedin` | — |\n| Mumble | `channel-mumble` | — |\n| ntfy | `channel-ntfy` | — |\n| QQ | `channel-qq` | — |\n| WeChat | `channel-wechat` | — |\n| WeCom | `channel-wecom` | `aes`, `cbc`, `roxmltree` |\n| MQTT | `channel-mqtt` | `rumqttc` |\n\n## Feature Flags\n\n### Default\n\nThe `default` feature enables all channels **except** `channel-mqtt`:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\" }\n```\n\n### Selective inclusion\n\nTo include only specific channels, disable default features and list the ones you need:\n\n```toml\n[dependencies]\nlibrefang-channels = {\n    path = \"../librefang-channels\",\n    default-features = false,\n    features = [\"channel-telegram\", \"channel-discord\"],\n}\n```\n\n### All channels\n\nThe `all-channels` feature includes every channel, including `channel-mqtt`:\n\n```toml\n[dependencies]\nlibrefang-channels = {\n    path = \"../librefang-channels\",\n    default-features = false,\n    features = [\"all-channels\"],\n}\n```\n\n## Key Dependencies and Their Roles\n\n| Dependency | Purpose |\n|-----------|---------|\n| `librefang-types` | Shared domain types (messages, channel configs, events) |\n| `tokio` | Async runtime for all channel I/O |\n| `reqwest` | HTTP client for REST-based channel APIs |\n| `tokio-tungstenite` | WebSocket transport (used by several real-time channels) |\n| `axum` | HTTP server for receiving webhook callbacks |\n| `serde` / `serde_json` | Serialization of API payloads and config |\n| `dashmap` | Concurrent hashmap for managing channel state |\n| `async-trait` | Async trait definitions for the channel driver interface |\n| `image` | Image processing (JPEG, PNG, WebP) for media handling |\n| `hmac` / `sha2` / `sha1` | HMAC-SHA signature verification for webhook authentication |\n| `zeroize` | Secure clearing of sensitive credentials from memory |\n| `rustls` | TLS via Rustls (no OpenSSL dependency) |\n\n### Channel-specific cryptography\n\n- **`channel-email`**: `lettre` (SMTP sending), `imap` + `rustls-connector` + `mailparse` (IMAP receiving and parsing).\n- **`channel-google-chat`**: `rsa` for service account authentication (JWT signing).\n- **`channel-feishu` / `channel-wecom`**: `aes` + `cbc` for decrypting callback payloads. WeCom additionally uses `roxmltree` for XML-based API responses.\n- **`channel-nostr`**: `k256` for secp256k1 key management and event signing per the Nostr protocol.\n- **`channel-mqtt`**: `rumqttc` as the MQTT v5 client.\n\n## Benchmarking\n\nA dispatch benchmark is available under `benches/dispatch`:\n\n```bash\ncargo bench --bench dispatch\n```\n\nThis measures message routing throughput through the dispatch layer, useful when evaluating the overhead
