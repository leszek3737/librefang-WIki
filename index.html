ol\n\n`StreamEvent` drives real-time UI updates in the terminal and TUI layers:\n\n| Variant | When emitted |\n|---|---|\n| `TextDelta { text }` | Each incremental text chunk |\n| `ThinkingDelta { text }` | Extended thinking/reasoning output |\n| `ToolUseStart { id, name }` | Model begins a tool invocation |\n| `ToolInputDelta { text }` | Partial JSON input for an active tool call |\n| `ToolUseEnd { id, name, input }` | Tool input complete, parsed JSON ready |\n| `ContentComplete { stop_reason, usage }` | Model finished generating |\n| `PhaseChange { phase, detail }` | Agent lifecycle transition |\n| `ToolExecutionResult { name, result_preview, is_error }` | Tool finished executing (emitted by agent loop, not driver) |\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) signals that all LLM text has been streamed and post-processing (session save, proactive memory) is about to begin. Consumers use this to unblock user input before the full response payload is assembled.\n\n---\n\n## Error Handling\n\n### `LlmError`\n\nStructured errors with provider-aware context:\n\n| Variant | Meaning |\n|---|---|\n| `Http(String)` | Transport-level failure (DNS, TLS, connection refused) |\n| `Api { status, message }` | Provider returned a non-2xx HTTP response |\n| `RateLimited { retry_after_ms, message }` | Explicit rate limit with optional backoff hint |\n| `Parse(String)` | Response body could not be deserialized |\n| `MissingApiKey(String)` | No API key configured for this provider |\n| `Overloaded { retry_after_ms }` | Provider at capacity, transient |\n| `AuthenticationFailed(String)` | Invalid or expired credentials |\n| `ModelNotFound(String)` | Requested model doesn't exist on this provider |\n| `TimedOut { inactivity_secs, partial_text, … }` | Subprocess stalled; partial output captured |\n\nEach variant carries the information needed for the caller to decide whether to retry, switch providers, or surface an error to the user.\n\n#### `LlmError::failover_reason()`\n\nMaps any `LlmError` variant to a [`FailoverReason`](#failoverreason) — a lightweight, allocation-free classification that drives `FallbackChain` provider-switching logic:\n\n```mermaid\nflowchart LR\n    LE[LlmError] --> FR[failover_reason]\n    FR --> RC[RateLimit]\n    FR --> CE[CreditExhausted]\n    FR --> MU[ModelUnavailable]\n    FR --> CT[ContextTooLong]\n    FR --> TO[Timeout]\n    FR --> HE[HttpError]\n    FR --> AE[AuthError]\n    FR --> UK[Unknown]\n```\n\nClassification is purely structural (variant + embedded status/message), making it infallible and zero-allocation. The `Api` variant inspects the HTTP status code and error message content to disambiguate ambiguous codes like 403 (which can mean rate limit, billing block, model permission, or genuine auth failure depending on the provider).\n\n---\n\n### Error Classification (`llm_errors` module)\n\nThe `llm_errors` submodule provides a standalone classification pipeline that converts raw error strings + optional HTTP status codes into structured, sanitized errors. It handles quirks across 19+ providers without relying on regex.\n\n#### `LlmErrorCategory`\n\nEight mutually exclusive categories:\n\n| Category | Retryable | Typical HTTP codes |\n|---|---|---|\n| `RateLimit` | ✅ | 429 |\n| `Overloaded` | ✅ | 500, 503 |\n| `Timeout` | ✅ | — |\n| `Billing` | ❌ | 402 |\n| `Auth` | ❌ | 401, 403 |\n| `ContextOverflow` | ❌ | 413, sometimes 400 |\n| `Format` | ❌ | 400 |\n| `ModelNotFound` | ❌ | 404 |\n\n#### `ClassifiedError`\n\nEnriched result with metadata:\n\n```rust\npub struct ClassifiedError {\n    pub category: LlmErrorCategory,\n    pub is_retryable: bool,\n    pub is_billing: bool,\n    pub suggested_delay_ms: Option<u64>,\n    pub sanitized_message: String,    // safe for user display\n    pub raw_message: String,          // for logging only\n    pub provider: Option<String>,\n    pub model: Option<String>,\n    pub suggestion: Option<String>,   // actionable advice\n}\n```\n\n#### Classification functions\n\n**`classify_error(message, status) → ClassifiedError`**\n\nEntry point when provider/model context is unavailable. Uses a two-phase approach:\n\n1. **Status-code fast paths** — unambiguous codes (429 → RateLimit, 402 → Billing, 401 → Auth, 404 → ModelNotFound) return immediately.\n2. **Pattern matching pipeline** — for ambiguous codes (especially 403) and status-less errors, checks case-insensitive substring patterns in priority order: ContextOverflow → Billing → Auth → RateLimit → ModelNotFound → Format → Overloaded → Timeout.\n\n**`classify_error_with_context(message, status, provider, model) → ClassifiedError`**\n\nPreferred entry point. Wraps `classify_error` and enriches the result with provider/model metadata and an actionable `suggestion` string.\n\n#### 403 disambiguation\n\nHTTP 403 is the most ambiguous status code across providers. The classifier handles it with layered checks:\n\n1. Check rate-limit patterns first (`\"rate limit\"`, `\"too many requests\"`, etc.)\n2. Check billing patterns (`\"credit\"`, `\"balance\"`, `\"billing\"`)\n3. Check context overflow patterns\n4. Check model-not-found patterns\n5. Check `FORBIDDEN_NON_AUTH_PATTERNS` (quota, region, model permission) — if matched, falls through to the general pipeline instead of defaulting to Auth\n6. Check `AUTH_PATTERNS` (`\"invalid api key\"`, `\"unauthorized\"`, etc.)\n7. Default to Auth if nothing else matches\n\nThis prevents false-positive auth classifications for Chinese providers that return 403 for quota/region/model-permission issues.\n\n#### Sanitization\n\nAll user-facing messages pass through sanitization to prevent leaking secrets:\n\n- **Secret redaction**: Strips `sk-…`, `key-…`, `Bearer …` tokens\n- **HTML detection**: Identifies Cloudflare/CDN error pages and replaces them with a generic message\n- **JSON extraction**: Pulls the human-readable message from `{\"error\":{\"message\":\"…\"}}` structures\n- **Wrapper stripping**: Removes the `\"LLM driver error: API error (NNN): \"` prefix\n- **Length capping**: Final messages are capped at 300 characters\n\n#### Retry delay extraction\n\n`extract_retry_delay(message)` recognizes several provider-specific formats:\n\n| Pattern | Interpretation |\n|---|---|\n| `\"retry after 30\"` | 30 seconds → 30 000 ms |\n| `\"retry-after: 5\"` | 5 seconds → 5 000 ms |\n| `\"try again in 10\"` | 10 seconds → 10 000 ms |\n| `\"retry after 500ms\"` | 500 milliseconds |\n\n#### Transient detection\n\n`is_transient(message)` is a lightweight heuristic (no full classification) that returns `true` for timeout, overloaded, and rate-limit patterns. Useful for quick retry decisions without the overhead of full classification.\n\n---\n\n## `FailoverReason`\n\nProvider-switching taxonomy used by `FallbackChain` in `librefang-llm-drivers`:\n\n| Variant | Recovery strategy |\n|---|---|\n| `RateLimit(Option<u64>)` | Sleep (optional hint ms), retry same provider |\n| `CreditExhausted` | Skip to next provider immediately |\n| `ModelUnavailable` | Skip to next provider |\n| `ContextTooLong` | Propagate to caller (must compress context) |\n| `Timeout` | Skip to next provider |\n| `HttpError` | Skip to next provider |\n| `AuthError` | Skip to next provider (next slot may have valid key) |\n| `Unknown` | Propagate immediately |\n\n`FailoverReason` is produced by both `LlmError::failover_reason()` (from structured errors) and the `classify_error` pipeline (from raw error strings).\n\n---\n\n## `DriverConfig`\n\nSerializable configuration for constructing driver instances:\n\n```rust\npub struct DriverConfig {\n    pub provider: String,\n    pub api_key: Option<String>,\n    pub base_url: Option<String>,\n    pub vertex_ai: VertexAiConfig,\n    pub azure_openai: AzureOpenAiConfig,\n    pub skip_permissions: bool,          // default: true\n    pub message_timeout_secs: u64,       // default: 300\n    pub mcp_bridge: Option<McpBridgeConfig>,\n    pub proxy_url: Option<String>,\n}\n```\n\nKey details:\n\n- **Security**: The `Debug` implementation redacts `api_key`, `vertex_ai.credentials_path`, and `proxy_url`.\n- **`skip_permissions`**: Defaults to `true` because LibreFang runs as a daemon with no interactive terminal. The daemon's own RBAC layer controls agent capabilities.\n- **`message_timeout_secs`**: Inactivity-based (silence on stdout), not wall-clock.\n- **`mcp_bridge`**: Not serialized (`#[serde(skip)]`); set only by the kernel at driver construction time. Contains the daemon base URL and optional API key for bridging LibreFang tools into CLI-based drivers (e.g., Claude Code) via MCP.\n\n### `McpBridgeConfig`\n\n```rust\npub struct McpBridgeConfig {\n    pub base_url: String,       // e.g. \"http://127.0.0.1:4545\"\n    pub api_key: Option<String>,\n}\n```\n\nThe MCP endpoint lives at `{base_url}/mcp`. The driver writes a temporary `mcp_config.json` and passes `--mcp-config` to the spawned CLI subprocess so it discovers LibreFang tools through the daemon's `/mcp` endpoint.\n\n---\n\n## Usage Patterns\n\n### Implementing a new provider\n\n```rust\nstruct MyProviderDriver { config: DriverConfig }\n\n#[async_trait]\nimpl LlmDriver for MyProviderDriver {\n    async fn complete(&self, request: CompletionRequest) -> Result<CompletionResponse, LlmError> {\n        // Build provider-specific HTTP request from CompletionRequest fields\n        // Send request\n        // Parse response into CompletionResponse\n        // On error, return appropriate LlmError variant\n    }\n\n    // Override stream() if the provider supports SSE\n}\n```\n\n### Consuming the driver\n\n```rust\nlet driver: Box<dyn LlmDriver> = /* ... */;\nlet request = CompletionRequest {\n    model: \"gpt-4\".into(),\n    messages: vec![/* ... */],\n    tools: vec![/* ... */],\n    max_tokens: 4096,\n    temperature: 0.7,\n    ..Default::default()\n};\n\nmatch driver.complete(request).await {\n    Ok(response) => {\n        let text = response.text();\n        let tool_calls = response.tool_calls;\n    }\n    Err(LlmError::RateLimited { retry_after_ms, .. }) => {\n        tokio::time::sleep(Duration::from_millis(retry_after_ms)).await;\n        // retry...\n    }\n    Err(e) => {\n        let reason = e.failover_reason();\n        // drive failover logic\n    }\n}\n```\n\n### Classifying raw errors\n\n```rust\nuse librefang_llm_driver::llm_errors::{classify_error_with_context, is_transient};\n\n// Quick check\nif is_transient(&raw_message) {\n    // retry\n}\n\n// Full classification with context\nlet classified = classify_error_with_context(\n    &raw_message,\n    Some(403),\n    Some(\"anthropic\"),\n    Some(\"claude-sonnet-4-20250514\"),\n);\n\nprintln!(\"Category: {:?}\", classified.category);\nprintln!(\"Retryable: {}\", classified.is_retryable);\nprintln!(\"Suggestion: {}\", classified.suggestion.unwrap_or_default());\nprintln!(\"User message: {}\", classified.sanitized_message);\n```","llm-drivers-librefang-llm-drivers-src":"# LLM Drivers — librefang-llm-drivers-src\n\n# librefang-llm-drivers\n\nUnified LLM provider abstraction layer for LibreFang. This crate defines a common `LlmDriver` trait and implements concrete drivers for multiple LLM backends (Anthropic, OpenAI, ChatGPT, Gemini/Vertex AI, Aider CLI, and others). It also provides shared infrastructure for retry logic, credential pooling, rate-limit monitoring, and streaming response parsing.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"LlmDriver trait\"\n        A[complete]\n        B[stream]\n    end\n\n    subgraph \"Concrete Drivers\"\n        C[AnthropicDriver]\n        D[OpenAIDriver]\n        E[ChatGptDriver]\n        F[AiderDriver]\n        G[VertexAiDriver]\n        H[QwenCodeDriver]\n        I[TokenRotation wrapper]\n    end\n\n    subgraph \"Shared Infrastructure\"\n        J[backoff::jittered_backoff]\n        K[CredentialPool]\n        L[RateLimitSnapshot]\n        M[ThinkFilter]\n    end\n\n    C --> A\n    D --> A\n    E --> A\n    F --> A\n    G --> A\n    H --> A\n    I --> A\n\n    C --> J\n    C --> L\n    D --> J\n    D --> L\n    E --> E1[ChatGptTokenCache]\n    I --> K\n    A --> M\n```\n\n## Core Abstractions\n\n### `LlmDriver` Trait\n\nEvery provider implements the `LlmDriver` trait (from `llm_driver` module), which exposes two methods:\n\n- **`complete(request: CompletionRequest) -> Result<CompletionResponse, LlmError>`** — single-shot request/response.\n- **`stream(request: CompletionRequest, tx: Sender<StreamEvent>) -> Result<CompletionResponse, LlmError>`** — server-sent-events streaming. Delta events (`TextDelta`, `ToolInputDelta`, `ThinkingDelta`, `ToolUseStart`, `ToolUseEnd`) are forwarded to `tx` in real time; the final `CompletionResponse` is returned when the stream ends.\n\n### `CompletionRequest`\n\nCarries the full specification for an LLM call:\n\n| Field | Purpose |\n|---|---|\n| `model` | Provider-specific model identifier (e.g. `\"claude-sonnet-4-5\"`, `\"aider/sonnet\"`) |\n| `messages` | Conversation history as `Vec<Message>` |\n| `system` | Optional system prompt (some providers extract from messages if missing) |\n| `tools` | Tool definitions for function calling |\n| `max_tokens` | Maximum output tokens |\n| `temperature` | Sampling temperature |\n| `thinking` | Optional extended-thinking config (`budget_tokens`) |\n| `prompt_caching` | Enable Anthropic-style prompt caching markers |\n| `response_format` | `Text`, `Json`, or `JsonSchema` output constraint |\n| `timeout_secs` | Per-request timeout override |\n| `extra_body` | Provider-specific JSON extensions |\n\n### `CompletionResponse`\n\nNormalized response across all providers:\n\n- `content: Vec<ContentBlock>` — text, thinking, tool-use, tool-result, and image blocks\n- `tool_calls: Vec<ToolCall>` — extracted tool invocations (also mirrored in `content`)\n- `stop_reason: StopReason` — `EndTurn`, `ToolUse`, `MaxTokens`, or `StopSequence`\n- `usage: TokenUsage` — input/output tokens plus cache statistics\n\n### `LlmError`\n\nError variants include `Http`, `Api { status, message }`, `RateLimited`, `Overloaded`, `Parse`, `MissingApiKey`, and `AuthenticationFailed`. Drivers map provider-specific errors into these categories so callers don't need to understand each provider's error schema.\n\n### `StreamEvent`\n\nEvents emitted during streaming:\n\n- `TextDelta { text }` — incremental text fragment\n- `ThinkingDelta { text }` — extended-thinking fragment\n- `ToolUseStart { id, name }` — tool invocation begins\n- `ToolInputDelta { text }` — partial tool argument JSON\n- `ToolUseEnd { id, name, input }` — tool invocation complete with parsed input\n- `ContentComplete { stop_reason, usage }` — final event with token counts\n\n## Supporting Infrastructure\n\n### Backoff (`backoff.rs`)\n\nJittered exponential backoff for retry loops. The formula is:\n\n```\ndelay = max(exp_delay, floor) + jitter\nwhere:\n  exp_delay = min(base × 2^(attempt-1), max_delay)\n  jitter    ∈ [0, jitter_ratio × base_for_jitter]\n```\n\n**Key functions:**\n\n- **`jittered_backoff(attempt, base_delay, max_delay, jitter_ratio, floor)`** — core computation. The `floor` parameter honours server-supplied `Retry-After` headers (capped at 300 s). All arithmetic is done in `f64` space to avoid `Duration` overflow panics on large attempt numbers.\n- **`standard_retry_delay(attempt, floor)`** — convenience wrapper using 2 s base, 60 s cap, 50% jitter.\n- **`tool_use_retry_delay(attempt)`** — faster variant with 1.5 s base for tool-use failures.\n\nSeed diversity is ensured by combining wall-clock nanoseconds with a process-global Weyl-sequence counter (`JITTER_COUNTER`), so concurrent retry loops don't produce correlated delays.\n\n### Credential Pool (`credential_pool.rs`)\n\nThread-safe pool of API keys for a single provider, supporting automatic failover when keys are rate-limited (429) or quota-exhausted (402).\n\n**Selection strategies (`PoolStrategy`):**\n\n| Strategy | Behavior |\n|---|---|\n| `FillFirst` | Always use the highest-priority available key; fall back on exhaustion. Maximises premium-key utilisation. |\n| `RoundRobin` | Cycle through available keys in priority order. Distributes load evenly. |\n| `Random` | Choose a random available key per call (simple LCG, no `rand` dependency). |\n| `LeastUsed` | Pick the key with the fewest successful requests. |\n\n**Lifecycle:**\n\n1. `acquire()` — select and return a cloned API key, or `None` if all keys are exhausted.\n2. On success: call `mark_success(api_key)` — increments `request_count` and clears any active exhaustion marker (early recovery).\n3. On 429/402: call `mark_exhausted(api_key)` — places the key in cooldown for `exhausted_ttl` (default 1 hour).\n\nAll mutable state (credentials + round-robin index) is behind a single `Mutex` so selection is atomic — no TOCTOU between reading the index and picking a credential.\n\n**Diagnostics:** `snapshot()` returns `Vec<CredentialSnapshot>` with redacted key hints (`****abcd`), priority, request count, and exhaustion status. Safe for logs and dashboards.\n\n**Shared usage:** Wrap in `Arc` using the `ArcCredentialPool` type alias or `new_arc_pool()` constructor.\n\n### Rate Limit Tracking (`rate_limit_tracker.rs`)\n\nParses rate-limit headers from provider responses into a `RateLimitSnapshot`. Supports both OpenAI-style (`x-ratelimit-*`) and Anthropic-style (`anthropic-ratelimit-*`) header formats. Provides:\n\n- Bucket-level display with ASCII utilization bars\n- Warning detection when approaching limits\n- Usage ratios for proactive throttling decisions\n\nUsed throughout the codebase for logging (via `display()`) and is_warning detection after each API call.\n\n### Think Filter (`think_filter.rs`)\n\nProcesses streamed text to handle `<think …>…<\/think` blocks that some models emit. Ensures thinking content is properly separated from user-visible text during streaming. Called from wire-layer `write_message` and process output handlers.\n\n## Driver Implementations\n\n### Anthropic (`drivers/anthropic.rs`)\n\nFull implementation of the Anthropic Messages API (version `2023-06-01`).\n\n**Features:**\n- Tool use with `tool_use` and `tool_result` content blocks\n- Extended thinking (`budget_tokens` configuration)\n- Prompt caching via `cache_control: {\"type\": \"ephemeral\"}` markers on the last system block, last tool definition, and last message's last content block\n- Image support (base64 inline and file-based)\n- Automatic retry on 429 (rate-limited) and 529 (overloaded) with `standard_retry_delay` and `Retry-After` header extraction\n- Both `complete()` and `stream()` with full SSE parsing\n\n**Prompt caching strategy:** When `prompt_caching` is enabled, three cache breakpoints are stamped:\n1. System prompt block (cached once for all calls sharing the same system prompt)\n2. Last tool definition (system + tools cached as one unit)\n3. Last message's last content block (full conversation prefix cached for multi-turn savings)\n\nThis maximises Anthropic's 4-breakpoint-per-request budget by concentrating cache scope on the expensive shared prefixes.\n\n**Response format:** Anthropic has no native `response_format` field, so `append_response_format_instructions` injects JSON/JSON-schema constraints into the system prompt.\n\n**Tool input normalization:** `ensure_object()` handles malformed tool inputs — `null` becomes `{}`, JSON-encoded strings are parsed, and non-object values are wrapped in `{\"raw_input\": …}` for debugging.\n\n### ChatGPT (`drivers/chatgpt.rs`)\n\nCalls the ChatGPT Responses API (`/codex/responses`) using OAuth session tokens. This is distinct from the OpenAI driver which uses `/v1/chat/completions` with API keys.\n\n**Token lifecycle:**\n1. Session token provided at construction or via `CHATGPT_SESSION_TOKEN` env var\n2. Cached in `ChatGptTokenCache` with a 7-day TTL (tokens typically last ~2 weeks)\n3. On 401/eligible-403: automatic refresh using `CHATGPT_REFRESH_TOKEN` with a 15 s timeout\n4. Post-refresh auth failures propagate as `AuthenticationFailed`\n\n**Streaming:** The Responses API uses SSE with event types like `response.output_text.delta`, `response.function_call_arguments.delta`, and `response.completed`. The driver accumulates text, thinking/reasoning, and tool-call state incrementally, falling back to the `response.completed` payload if streaming deltas were missed.\n\n**Message mapping:** System messages are merged into the `instructions` field; user/assistant messages become `input` items with `role` and `content`.\n\n### Aider (`drivers/aider.rs`)\n\nSpawns the `aider` CLI as a subprocess in non-interactive mode. Aider manages its own LLM authentication via standard environment variables (`OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, etc.).\n\n**Usage pattern:**\n1. `detect()` checks if `aider --version` succeeds\n2. `build_prompt()` flattens the message history into a bracketed text prompt (`[System]`, `[User]`, `[Assistant]` labels)\n3. `build_args()` produces CLI arguments: `--message`, `--yes-always`, `--no-auto-commits`, `--no-git`, and optional `--model`\n4. The model prefix `aider/` is stripped (e.g. `\"aider/sonnet\"` → `\"--model sonnet\"`)\n\nToken usage is not available from the CLI interface, so `input_tokens` and `output_tokens` are always 0.\n\n### Other Drivers (referenced via call graph)\n\n- **OpenAI** (`drivers/openai.rs`) — standard `/v1/chat/completions` with streaming, tool use, and proxy support\n- **Vertex AI** (`drivers/vertex_ai.rs`) — Google Cloud Vertex AI with JWT-based authentication, RSA-SHA256 signing, and Gemini message format conversion\n- **Qwen Code** (`drivers/qwen_code.rs`) — CLI-based driver for Qwen, similar pattern to Aider\n- **Token Rotation** (`drivers/token_rotation.rs`) — wrapper driver that rotates through multiple credential-backed drivers on rate-limit errors\n\n## Integration with the Codebase\n\nThe LLM drivers crate sits between the application layer and provider APIs:\n\n- **Configuration** (`librefang-types::config`) provides `DriverConfig` with provider-specific settings (API keys, base URLs, proxy URLs)\n- **Message types** (`librefang-types::message`) define `Message`, `ContentBlock`, `Role`, `StopReason`, and `TokenUsage` — shared across all drivers\n- **Tool types** (`librefang-types::tool`) define `ToolDefinition` and `ToolCall`\n- **HTTP client** (`librefang-http`) provides pre-configured `reqwest::Client` instances with optional proxy support via `proxied_client()` and `proxied_client_with_override()`\n- **OAuth** (`librefang-runtime-oauth`) handles ChatGPT token refresh\n- **Runtime** consumes drivers for agent execution, tool running, and plugin management","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nProvider-agnostic LLM interface for LibreFang, split into an abstract contract layer and a concrete implementation layer supporting 15+ backends.\n\n## Sub-module Breakdown\n\n| Sub-module | Role |\n|---|---|\n| [LLM Driver (trait layer)](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait, request/response types (`CompletionRequest`, `CompletionResponse`), streaming protocol (`StreamEvent`), error taxonomy (`LlmError`, `FailoverReason`), and `DriverConfig`. No HTTP logic — purely interface. |\n| [LLM Drivers (implementations)](librefang-llm-drivers-src.md) | Concrete drivers (`AnthropicDriver`, `OpenAIDriver`, `ChatGptDriver`, `VertexAiDriver`, `AiderDriver`, `QwenCodeDriver`) plus shared infrastructure: retry logic, credential pooling, rate-limit monitoring, and streaming response parsing. |\n\n## How They Fit Together\n\n```mermaid\ngraph TB\n    subgraph \"Trait Layer — librefang-llm-driver\"\n        Trait[\"LlmDriver trait<br/>(complete · stream)\"]\n        Req[\"CompletionRequest\"]\n        Resp[\"CompletionResponse\"]\n        Err[\"LlmError · FailoverReason\"]\n        SE[\"StreamEvent\"]\n    end\n\n    subgraph \"Implementation Layer — librefang-llm-drivers\"\n        AD[\"AnthropicDriver\"]\n        OD[\"OpenAIDriver\"]\n        VD[\"VertexAiDriver\"]\n        Others[\"ChatGpt · Aider · QwenCode · …\"]\n        Infra[\"CredentialPool · RateLimitTracker<br/>ThinkFilter · Retry logic\"]\n    end\n\n    AD --> Trait\n    OD --> Trait\n    VD --> Trait\n    Others --> Trait\n    Infra -.-> AD\n    Infra -.-> OD\n    Infra -.-> VD\n```\n\n**All concrete drivers implement the `LlmDriver` trait** from the trait layer. Callers depend only on `complete()` and `stream()`, never on provider-specific details. The implementation layer's shared infrastructure (credential rotation, rate-limit headers, think-tag filtering) is used internally by the drivers but is invisible to consumers.\n\n## Key Cross-Module Workflows\n\n1. **Request lifecycle** — A `CompletionRequest` from the trait layer is passed to a concrete driver's `complete()` or `stream()`. The driver handles HTTP, parsing, and error classification via `classify_error` / `classify_error_with_context`, returning a provider-agnostic `CompletionResponse` or `StreamEvent` sequence.\n\n2. **Failover & error handling** — The trait layer defines `FailoverReason` and the error taxonomy. Concrete drivers classify raw provider errors into these categories, enabling upstream failover logic to decide whether to retry, switch credentials (via `CredentialPool`), or fall back to another provider.\n\n3. **Rate-limit awareness** — `RateLimitTracker` parses provider-specific response headers (Anthropic format, standard `X-RateLimit-*` headers) into a unified model, surfacing usage ratios and warnings that feed back into credential rotation and throttling decisions.","memory-system":"# Memory System\n\n# Memory System (`librefang-memory`)\n\nPersistent memory substrate for the LibreFang Agent Operating System. Agents read and write memories through a unified API that spans three storage layers — structured key-value, semantic text/vector search, and a knowledge graph — all backed by SQLite with optional external vector databases.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent / Runtime] --> PMS[ProactiveMemoryStore]\n    PMS --> MS[MemorySubstrate]\n    MS --> SS[StructuredStore]\n    MS --> SEM[SemanticStore]\n    MS --> KS[KnowledgeStore]\n    MS --> SES[SessionStore]\n\n    SEM --> |\"embedding available\"| VS[VectorStore]\n    VS --> |\"local\"| SQLITE_VEC[SqliteVectorStore]\n    VS --> |\"remote\"| HTTP[HttpVectorStore]\n\n    PMS --> CE[ConsolidationEngine]\n    PMS --> DECAY[decay::run_decay]\n    PMS --> CHUNK[chunker::chunk_text]\n```\n\n## Storage Layers\n\n### Structured Store (`structured`)\n\nPer-agent key-value store persisted in the `kv_store` SQLite table. Used for agent state, configuration blobs, and memory item metadata keyed as `memory:<id>`.\n\nPrimary operations: `set`, `get`, `delete`, `list_kv`, `remove_agent`.\n\n### Semantic Store (`semantic`)\n\nStores arbitrary text memories with optional vector embeddings in the `memories` table. Supports both keyword (LIKE) search and vector similarity search depending on whether an embedding driver is configured.\n\nKey methods:\n- `remember` / `remember_with_embedding` — store a memory fragment\n- `recall` — keyword-based retrieval\n- `recall_with_embedding` — vector similarity retrieval, falls back to keyword search when no embedding is available\n- `update_content` — in-place content update preserving ID and access stats\n- `forget` / `forget_session_older_than_global` — soft/hard delete\n- `lowest_confidence` — fetch N memories with lowest confidence (used for eviction)\n\nMemories carry a `scope` field (`user_memory`, `session_memory`, `agent_memory`, `episodic`) that governs visibility and decay behavior.\n\n### Knowledge Graph (`knowledge`)\n\nSQLite-backed graph with `entities` and `relations` tables. Entities have an `entity_type` (Person, Organization, Concept, etc.) and arbitrary JSON properties. Relations connect two entities with a typed edge and a confidence score.\n\n`query_graph` accepts a `GraphPattern` with optional source, relation type, and target filters. The JOIN matches entities by both ID and name, which is critical for the MCP tool path that references entities by name rather than UUID.\n\n`has_relation` checks for duplicate edges before insertion.\n\n### Session Store (`session`)\n\nManages conversation sessions in the `sessions` table with support for canonical cross-channel session history (`canonical_sessions` table). Each session stores a message log, optional label, and `peer_id` for per-user isolation.\n\nNotable features:\n- **Canonical sessions**: A single persistent conversation per agent that merges messages from multiple channels (WhatsApp, web, etc.), enabling cross-channel memory continuity.\n- **FTS5 full-text search**: A virtual table `sessions_fts` enables full-text search over session content.\n- **JSONL mirroring**: Sessions can be mirrored to a `.jsonl` file for external processing.\n- **Session cleanup**: `cleanup_expired_sessions` removes old sessions based on configurable retention limits.\n\n## Proactive Memory (`proactive`)\n\nThe mem0-style API layer that wraps `MemorySubstrate` with intelligent memory management. `ProactiveMemoryStore` implements two traits:\n\n### `ProactiveMemory` — CRUD API\n\n| Method | Description |\n|--------|-------------|\n| `search(query, user_id, limit)` | Semantic search across all memory levels for a user |\n| `add(messages, user_id)` | Extract and store memories from conversation messages |\n| `get(memory_id)` | Retrieve a single user-level memory |\n| `delete(memory_id)` | Delete a memory by ID |\n| `list(user_id, level, category)` | List memories with optional filters |\n| `update(memory_id, content)` | Update memory content in-place |\n| `export_all(agent_id)` | Export all memories as a flat JSON list |\n| `import_memories(agent_id, items)` | Bulk import with duplicate detection |\n| `stats(agent_id)` | Return memory statistics |\n\n### `ProactiveMemoryHooks` — Automatic Hooks\n\n| Method | Description |\n|--------|-------------|\n| `auto_memorize(agent_id, peer_id, messages)` | Extract facts from messages, deduplicate, and store |\n| `auto_retrieve(agent_id, query)` | Search memories and return formatted context string |\n\n### Decision Flow\n\nWhen `add` or `auto_memorize` processes a message:\n\n1. The `MemoryExtractor` (default: rule-based `DefaultMemoryExtractor`) extracts `MemoryItem` candidates from the messages.\n2. For each item, `add_with_decision` searches for similar existing memories.\n3. The extractor's `decide_action` returns one of:\n   - **ADD** — New memory, no close match exists.\n   - **UPDATE** — Close match found; update the existing memory in-place. A version history chain is maintained in metadata.\n   - **NOOP** — Duplicate; skip silently.\n4. Conflict detection compares old vs. new content and flags contradictory updates.\n5. Extracted relation triples are stored in the knowledge graph with deduplication.\n\n### Embedding Integration\n\nWhen an `EmbeddingFn` is provided via `with_embedding()`:\n\n- Memories are stored with vector embeddings in the `embedding` BLOB column.\n- `recall_with_embedding` performs vector similarity search via the configured `VectorStore`.\n- Without an embedding driver, search falls back to keyword LIKE matching.\n\n### Memory Cap and Eviction\n\nWhen `max_memories_per_agent` is configured (non-zero), every add/import triggers `evict_if_over_cap`. This fetches the lowest-confidence memories via `SemanticStore::lowest_confidence` and removes them (both from the semantic table and the KV mirror).\n\n### Periodic Maintenance\n\nThree maintenance tasks run automatically, each rate-limited to at most once per hour:\n\n| Task | Trigger | Purpose |\n|------|---------|---------|\n| `decay_confidence` | search, auto_retrieve | Exponential confidence decay: `conf * e^(-rate * days)` with a log-based boost for frequently accessed memories |\n| `cleanup_expired` | search, auto_retrieve | Soft-delete session-level memories older than `session_ttl_hours` |\n| `consolidate` | every 10th `auto_memorize` per agent | Merge highly similar memories (>90% Jaccard similarity) |\n\nAll three are invoked by `maybe_run_maintenance`, which is called from `search`, `auto_retrieve`, and after consolidation counters hit threshold.\n\n## Text Chunking (`chunker`)\n\nLong documents are split into overlapping chunks before embedding. `chunk_text(text, max_size, overlap)` applies a three-level splitting strategy:\n\n1. **Paragraph boundaries** (`\\n\\n`)\n2. **Sentence boundaries** (`. ` / `.\\n`, `。`, `？`, `！`) for oversized paragraphs\n3. **Hard character split** for oversized sentences\n\nOverlap is applied by prepending the last `overlap` characters of the previous chunk. All length calculations are character-based (not byte-based) for correct Unicode handling.\n\n## Memory Decay (`decay`)\n\nScope-based time decay that hard-deletes stale memories:\n\n| Scope | Behavior |\n|-------|----------|\n| `user_memory` | **Never** decays — permanent user knowledge |\n| `session_memory` | Decays after `session_ttl_days` of no access |\n| `agent_memory` | Decays after `agent_ttl_days` of no access |\n\nDecay is driven by `MemoryDecayConfig` and gated by `config.enabled`. Accessing a memory (via search/recall) updates `accessed_at`, resetting the decay timer.\n\n## Consolidation (`consolidation`)\n\n`ConsolidationEngine` performs two phases per cycle:\n\n1. **Confidence decay**: Reduces confidence of memories not accessed in 7 days by a factor of `(1 - decay_rate)`, floored at 0.1.\n2. **Duplicate merge**: Loads all active memories sorted by confidence, compares all pairs via `text_similarity` (Jaccard on lowercase words), and merges pairs above 90% similarity. The higher-confidence memory is kept; the lower is soft-deleted and its confidence is lifted if it was higher. Capped at 100 merges per run to avoid O(n²) blowup.\n\nReturns a `ConsolidationReport` with counts and duration.\n\n## Vector Store Abstraction (`http_vector_store`)\n\n`HttpVectorStore` implements the `VectorStore` trait by delegating to a remote HTTP service. This allows LibreFang to use external vector databases (Qdrant, Weaviate, custom services) without native client dependencies.\n\nExpected API contract:\n\n| Method | Endpoint | Purpose |\n|--------|----------|---------|\n| `insert` | `POST /insert` | Store a vector with payload and metadata |\n| `search` | `POST /search` | K-nearest-neighbor search |\n| `delete` | `DELETE /delete` | Remove a vector by ID |\n| `get_embeddings` | `POST /get_embeddings` | Batch fetch raw embeddings by IDs |\n\n`SqliteVectorStore` provides a local alternative backed by SQLite (used when no external service is configured).\n\n## Schema Migrations (`migration`)\n\nThe database schema is versioned via SQLite's `user_version` pragma. `run_migrations` applies sequential migrations from the current version to `SCHEMA_VERSION` (currently 19). Key tables created across versions:\n\n| Version | Addition |\n|---------|----------|\n| 1 | Core tables: agents, sessions, events, kv_store, task_queue, memories, entities, relations |\n| 3 | `embedding` BLOB column on memories |\n| 4 | `usage_events` for cost tracking |\n| 5 | `canonical_sessions` for cross-channel memory |\n| 9 | Performance indexes for proactive memory queries |\n| 10 | `agent_id` on entities and relations |\n| 12 | FTS5 virtual table for session search |\n| 13 | Prompt versioning and A/B testing tables |\n| 15 | Multimodal columns (image_url, image_embedding, modality) |\n| 16 | `peer_id` on memories and sessions for per-user isolation |\n| 17 | `approval_audit` table |\n| 19 | `provider` column on usage_events for per-provider budgets |\n\nMigrations are idempotent — `column_exists` guards prevent duplicate ALTER TABLE errors.\n\n## Memory Provider Plugin System (`provider`)\n\nA trait-based plugin interface:\n\n- **`MemoryProvider`** — Trait for pluggable memory backends.\n- **`MemoryManager`** — Orchestrates providers.\n- **`NullMemoryProvider`** — No-op implementation for testing or when memory is disabled.\n\n## Integration Points\n\n### From the Runtime (`librefang-runtime`)\n\n- **Agent loop** (`agent_loop.rs`): Calls `save_session_async` after each turn and `remember` via `remember_interaction_best_effort`. Recalls memories via `recall_with_embedding_async` during `setup_recalled_memories`.\n- **Context engine** (`context_engine.rs`): Creates `MemorySubstrate` instances and uses `remember` to store extracted facts.\n- **Proactive memory** (`proactive_memory.rs`): Initializes `ProactiveMemoryStore` with optional LLM extractor and embedding driver, calls `with_embedding` to attach the driver.\n- **Compactor** (`compactor.rs`): Reads `Session` objects to decide whether compaction is needed and to compact message history.\n\n### From the API Layer (`librefang-api`)\n\n- **Memory routes** (`memory.rs`): Handle memory CRUD HTTP endpoints, calling `get_by_id` on the semantic store to resolve memory ownership.\n- **Agent routes** (`agents.rs`): Call `save_session` and `get_session` during message injection.\n- **Skills routes** (`skills.rs`): Trigger session persistence through the hand_send_message flow.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\nA React 19 single-page application for managing and monitoring LibreFang autonomous agents. Built with TanStack Router v1 for routing, TanStack Query v5 for server state, and Tailwind CSS v4 for styling.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Pages[\"src/pages/\"] --> QueryHooks[\"src/lib/queries/\"]\n    Pages --> MutationHooks[\"src/lib/mutations/\"]\n    QueryHooks --> HttpClient[\"src/lib/http/client.ts\"]\n    MutationHooks --> HttpClient\n    HttpClient --> ApiLayer[\"src/api.ts\"]\n    ApiLayer --> Backend[\"LibreFang Kernel API\"]\n    QueryHooks --> KeyFactories[\"src/lib/queries/keys.ts\"]\n    MutationHooks -->|invalidates| KeyFactories\n```\n\nPages and components never call `fetch()` or `src/api.ts` directly. All data access flows through the hooks layer (`src/lib/queries/` for reads, `src/lib/mutations/` for writes), which wraps the HTTP client and manages TanStack Query cache invalidation.\n\nThe sole exceptions are streaming/SSE connections and fire-and-forget control channels (e.g., terminal WebSocket lifecycle in `TerminalTabs.tsx`), which call `fetch` directly with an inline comment explaining why.\n\n## Navigation Surface\n\nThe dashboard provides 16 top-level sections, each backed by its own page component:\n\n| Route | Page | Domain |\n|-------|------|--------|\n| Overview | `OverviewPage` | `overview` |\n| Agents | `AgentsPage` | `agents` |\n| Sessions | `SessionsPage` | `sessions` |\n| Approvals | `ApprovalsPage` | `approvals` |\n| Comms | `ChannelsPage` | `channels` |\n| Providers | `ProvidersPage` | `providers` |\n| Channels | `ChannelsPage` | `channels` |\n| Skills | `SkillsPage` | `skills` |\n| Hands | `HandsPage` | `hands` |\n| Workflows | `WorkflowsPage` / `CanvasPage` | `workflows` |\n| Scheduler | `SchedulesPage` | `schedules` |\n| Goals | `GoalsPage` | `goals` |\n| Analytics | `AnalyticsPage` | `analytics` |\n| Memory | `MemoryPage` | `memory` |\n| Runtime | `RuntimePage` | `runtime` |\n| Logs | Terminal page | `terminal` |\n\n## Data Layer\n\n### Directory Layout\n\n```\nsrc/lib/\n  http/\n    client.ts          # Thin wrapper over src/api.ts + typed re-exports\n    errors.ts          # ApiError class\n  queries/\n    keys.ts            # Hierarchical query-key factories for every domain\n    keys.test.ts       # Anchoring and existence tests for all factories\n    <domain>.ts        # queryOptions + useXxx hooks per domain\n  mutations/\n    <domain>.ts        # useXxx mutation hooks with built-in invalidation\n```\n\nCurrent domain files: `agents`, `analytics`, `approvals`, `channels`, `config`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `workflows`.\n\n### Query Key Factories\n\nEvery domain defines a hierarchical key factory in `src/lib/queries/keys.ts`. Each sub-key is anchored to the domain's `all` key so that broad invalidation cascades correctly:\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nNever build a `queryKey` inline — always call the factory. Never subscribe to the same endpoint with a different key to get a subset; use `select` on the shared `queryOptions` instead.\n\n### Query Hooks\n\nEach domain file exports a `queryOptions` factory and a corresponding `useXxx` hook:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters) {\n  return useQuery(fooQueryOptions(filters));\n}\n```\n\nHooks accept an optional `options` argument for per-call overrides (`enabled`, `staleTime`, `refetchInterval`). Every call-site override must include a short inline comment explaining why the default is being overridden.\n\n### Mutation Hooks and Cache Invalidation\n\nEvery write operation invalidates the appropriate query keys **inside the mutation hook** — callers never need to know which keys are touched. Call sites may attach their own `onSuccess`/`onError` for UI feedback (toasts, modal dismissal); that is orthogonal to invalidation.\n\nInvalidation must use the **narrowest keys** that cover what actually changed:\n\n| Scenario | Keys to invalidate | Examples |\n|----------|--------------------|----------|\n| Per-id update where list projection also changes | `detail(id)` + `lists()` | `usePatchAgent`, `usePatchAgentConfig`, experiment mutations |\n| List-shape change, no existing detail | `lists()` | `useCreateFoo`, `useDeleteFoo`, `useCloneAgent` |\n| Change scoped to one detail or nested collection | `detail(id)` or nested sub-key | `useSwitchAgentSession` |\n| Bulk import / cache reset / cross-cutting change | `all` | `useSpawnAgent`, `useSuspendAgent`, `useDeleteAgent`, `useResumeAgent` |\n\nThe `all` key is **not the default**. Invalidating `fooKeys.all` when N items are cached refetches the list plus every cached `detail(id)` and any nested sub-keys for each of the N items. Use it only when that is the desired effect.\n\n### Adding a New Endpoint\n\n1. Add the raw API call in `src/api.ts` (or re-export via `src/lib/http/client.ts`).\n2. Add a key factory to `src/lib/queries/keys.ts` following the hierarchical pattern.\n3. Add `queryOptions` + `useXxx` in `src/lib/queries/<domain>.ts`.\n4. Add mutation hooks in `src/lib/mutations/<domain>.ts` with invalidation.\n5. Add anchoring/existence tests to `src/lib/queries/keys.test.ts`.\n\n## Authentication\n\nThe dashboard supports credential-based authentication. The auth flow is:\n\n1. On load, `verifyStoredAuth()` probes a protected endpoint with the stored bearer token.\n2. If the server returns 401, the stored token is cleared and a sign-in dialog is shown.\n3. `setApiKey()` persists the token to `localStorage` under the key `librefang-api-key`.\n4. All subsequent API calls include `Authorization: Bearer <token>` via `buildHeaders()`.\n5. WebSocket URLs are authenticated by appending `?token=<key>` via `buildAuthenticatedWebSocketUrl()`.\n\n## Agent Manifest System\n\nThe dashboard includes a full TOML manifest editor for agent configuration, located in `src/lib/agentManifest.ts`. This handles:\n\n- **Parsing**: `parseManifestToml()` converts TOML text into a structured form state + extras object. It normalizes aliases (e.g., `exec_policy: \"none\"` → `exec_policy_shorthand: \"deny\"`) and handles unknown fields by preserving them as extras.\n- **Serialization**: `serializeManifestForm()` converts form state back to TOML, with mutual exclusion logic to prevent key/table redefinition conflicts (e.g., if the user picks an `exec_policy` shorthand, any preserved `[exec_policy]` table is dropped).\n- **Validation**: `validateManifestForm()` flags missing required fields (`name`, `model.provider`, `model.model`).\n- **Markdown preview**: `generateManifestMarkdown()` renders a human-readable summary of the manifest.\n\nKey design decisions:\n- Numeric fields are stored as strings in form state and validated/converted during serialization (negative values and values above `MAX_SAFE_INTEGER` are silently dropped).\n- `FallbackModel` entries carry an `extras` bag for provider-specific fields (e.g., Qwen's `enable_memory`), which round-trip through parse/serialize.\n- `response_format` has three modes: `text`, `json`, `json_schema`. The `json_schema` mode carries a stringified schema body to avoid React uncontrolled→controlled warnings.\n\n## Supporting Libraries\n\n### Chat Utilities (`src/lib/chat.ts`)\n\nProvides message normalization for the chat interface:\n- `normalizeRole()` — maps API role strings to lowercase (`\"User\"` → `\"user\"`).\n- `asText()` — converts unknown content values to displayable text.\n- `formatMeta()` — formats token usage metadata (`\"12 in / 34 out | 2 iter | $0.0012\"`).\n- `normalizeToolOutput()` — extracts structured tool output events for persistent display, filtering malformed entries.\n\n### Chat Picker (`src/lib/chatPicker.ts`)\n\n`groupedPicker()` organizes agents into standalone agents and hand-instance groups for the chat target picker:\n- When `showHandAgents` is false, all agents (including hand-spawned) appear as flat standalone.\n- When true, hand-spawned agents are grouped under their hand instance, with the coordinator role listed first and remaining roles sorted alphabetically.\n- Inactive or empty hands are hidden entirely — their agents do not fall back to standalone.\n\n### Trigger Pattern Formatting (`src/lib/triggerPattern.ts`)\n\n`formatTriggerPattern()` converts trigger configurations into human-readable pattern strings.\n\n### Multi-Select Component (`src/components/ui/MultiSelectCmdk.tsx`)\n\nA combobox-based multi-select built on `cmdk`. Supports:\n- Chip display with individual remove buttons.\n- Backspace to remove the last selected item.\n- Search filtering of the dropdown list.\n- Already-selected items are excluded from the dropdown.\n- Controlled via `value`/`onChange` props.\n\n## Theming and Styling\n\nThe dashboard uses a semantic color system defined in `src/index.css` with CSS custom properties, supporting light and dark modes:\n\n- **Light mode**: Subtle, high-contrast palette with Slate backgrounds and Sky brand accent.\n- **Dark mode**: Glowing, softer contrast with a radial gradient background and lighter accent variants.\n\nCustom Tailwind breakpoints (`3xl: 1920px`, `4xl: 2560px`) extend the default scale for QHD and UHD displays, allowing card grids to go 5- or 6-wide on large monitors.\n\nThe animation system uses spring-physics curves (`--apple-spring`, `--apple-ease`, `--apple-bounce`) for page entrances, modal transitions, and staggered card reveals. All animations respect `prefers-reduced-motion: reduce`.\n\n## Build and Verification\n\n```bash\npnpm typecheck          # tsc --noEmit — must be green\npnpm test --run         # vitest — all unit/integration tests pass\npnpm build              # vite build — production bundle must succeed\npnpm e2e                # Playwright end-to-end tests\n```\n\nRun all three (`typecheck`, `test`, `build`) after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`. A passing typecheck alone is insufficient — the key-factory tests catch anchoring regressions that the compiler does not detect.\n\n### Key Generation for OpenAPI Types\n\n```bash\npnpm openapi:types      # Generates openapi/generated.ts from the running kernel\n```\n\n## Testing Patterns\n\n### Query and Mutation Tests\n\nAll query and mutation hook tests use `createQueryClientWrapper` from `src/lib/test/query-client.tsx`, which provides a real `QueryClient` configured for testing (no retries, no garbage collection). Tests spy on `queryClient.invalidateQueries` to verify the correct key factories are invalidated:\n\n```ts\nconst { queryClient, wrapper } = createQueryClientWrapper();\nconst invalidateSpy = vi.spyOn(queryClient, \"invalidateQueries\");\nconst { result } = renderHook(() => usePatchAgent(), { wrapper });\n\nawait result.current.mutateAsync({ agentId: \"a1\", body: { name: \"new\" } });\n\nexpect(invalidateSpy).toHaveBeenCalledWith({ queryKey: agentKeys.lists() });\nexpect(invalidateSpy).toHaveBeenCalledWith({ queryKey: agentKeys.detail(\"a1\") });\n```\n\nHTTP client functions are mocked at the `src/lib/http/client` module level to prevent real network requests.\n\n### End-to-End Tests\n\nPlaywright tests in `e2e/dashboard.spec.ts` verify:\n- The shell loads with all expected navigation links visible.\n- Route navigation works (clicking \"Comms\" shows the Comms heading).\n- The sign-in dialog appears when credentials are required (using route mocking to simulate the auth check).\n\n## Execution Flow Examples\n\nA typical page-to-API mutation flow traverses five layers. For example, when a user approves an approval on the Approvals page:\n\n1. `ApprovalsPage` calls `useResolveApproval().mutateAsync()`.\n2. The mutation hook calls `resolveApproval()` from `src/api.ts`.\n3. `resolveApproval()` calls `post()` which builds headers via `authHeader()` → `getItem()` from localStorage.\n4. On 401, `parseError()` triggers `clearApiKey()` to strip the expired token.\n5. On success, the mutation hook invalidates `approvalKeys.all`, causing all approval queries to refetch.\n\nWhen a user updates a workflow on the Canvas page:\n\n1. `CanvasPageInner` calls `useUpdateWorkflow().mutateAsync()`.\n2. The mutation hook calls `updateWorkflow()` → `put()` → `buildHeaders()`.\n3. On success, invalidates `workflowKeys.lists()`, `workflowKeys.detail(id)`, and `workflowKeys.runs(id)`.\n\n## Conventions\n\n- **TypeScript strict mode** with no `any` in new hooks. Types come from `src/api.ts` or `openapi/generated.ts`.\n- **Hooks set sensible defaults** in `queryOptions` (`staleTime`, `refetchInterval`). Accept an optional `{ enabled?; staleTime?; refetchInterval? }` argument for per-page overrides with an inline comment explaining why.\n- **Mutation invalidation is self-contained** in the hook. Call sites may add `onSuccess`/`onError` for UI feedback but never for cache management.\n- **Commit messages** follow `feat(dashboard/<area>):`, `refactor(dashboard/<area>):`, `fix(dashboard/<area>):` — never include a `Co-Authored-By` footer.","other-librefang-api-src":"# Other — librefang-api-src\n\n# LibreFang API Login Page\n\n## Overview\n\n`login_page.html` is a self-contained, single-file authentication UI served by the LibreFang API. It provides the dashboard sign-in flow, including optional TOTP two-factor authentication. The page ships with no external dependencies — all styles and logic are inlined.\n\n## Purpose\n\nWhen a request hits a protected dashboard route without a valid session, the API server returns this page (typically as a `401` response or via a redirect). The user authenticates, receives a JWT token, and is forwarded to the originally requested URL.\n\n## Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant U as Browser\n    participant L as login_page.html\n    participant A as /api/auth/dashboard-login\n\n    U->>L: Loads login form\n    U->>L: Submits username + password\n    L->>A: POST JSON payload\n    alt credentials accepted, no 2FA\n        A-->>L: { ok: true, token: \"jwt...\" }\n        L->>L: Store token in localStorage\n        L->>U: Redirect to original URL\n    else TOTP required\n        A-->>L: { requires_totp: true }\n        L->>U: Show TOTP input field\n        U->>L: Submits username + password + totp_code\n        L->>A: POST JSON payload\n        A-->>L: { ok: true, token: \"jwt...\" }\n        L->>U: Redirect to original URL\n    else invalid credentials\n        A-->>L: { error: \"message\" }\n        L->>U: Display error\n    end\n```\n\n## Key Components\n\n### HTML Structure\n\n| Element | ID | Purpose |\n|---------|-----|---------|\n| `<form>` | `f` | The sign-in form, intercepts submit events |\n| Username input | `u` | Collects `username`, auto-completed |\n| Password input | `p` | Collects `password`, auto-completed |\n| TOTP input | `t` | Collects 6-digit `totp_code`, hidden by default |\n| Submit button | `btn` | Triggers authentication, disabled during requests |\n| Error display | `err` | Shows error messages with `aria-live=\"polite\"` |\n| TOTP row | `totp-row` | Container for TOTP field, toggled via `hidden` attribute |\n\n### API Interaction\n\n**Endpoint:** `POST /api/auth/dashboard-login`\n\n**Request body (basic auth):**\n```json\n{\n  \"username\": \"user\",\n  \"password\": \"pass\"\n}\n```\n\n**Request body (with TOTP):**\n```json\n{\n  \"username\": \"user\",\n  \"password\": \"pass\",\n  \"totp_code\": \"123456\"\n}\n```\n\n**Expected responses:**\n\n| Response | Meaning |\n|----------|---------|\n| `{ ok: true, token: \"jwt...\" }` | Success — token stored, user redirected |\n| `{ requires_totp: true }` | Credentials valid but 2FA required — TOTP field shown |\n| `{ error: \"message\" }` | Authentication failure — error displayed |\n\n### Token Storage\n\nOn successful authentication, the JWT is persisted to `localStorage` under the key `librefang-api-key`. Downstream dashboard pages must read this key and include it in API requests (typically as an `Authorization: Bearer <token>` header).\n\n### Redirect Behavior\n\nAfter successful login, the page redirects to the URL the user originally requested:\n\n```javascript\nvar target = location.pathname + location.search + location.hash;\nif (!target || target === '/') target = '/dashboard/';\nlocation.replace(target);\n```\n\nThis means the server must preserve the original path in the URL when serving the login page (e.g., redirecting `/dashboard/settings` to `/login?next=/dashboard/settings`, or serving the login page at the same URL with a `401` status). If the pathname is just `/`, the fallback destination is `/dashboard/`.\n\n## Theming\n\nThe page supports light and dark mode via `prefers-color-scheme`:\n\n- **Dark mode (default):** Dark background (`#0b0d12`), card background `#12151c`, light text.\n- **Light mode:** Light background (`#f6f7fb`), white card, dark text.\n\nThe `:root` declaration `color-scheme: light dark` ensures native form controls also respect the user's preference.\n\n## Styling Notes\n\n- The layout uses CSS Grid (`place-items: center`) to vertically and horizontally center the card.\n- The card width is clamped to `min(92vw, 380px)` for mobile responsiveness.\n- The TOTP input uses `inputmode=\"numeric\"` to trigger a numeric keyboard on mobile devices, with `pattern=\"[0-9]{6}\"` and `maxlength=\"6\"` for validation.\n- Focus states use a blue ring (`#7c8cff`) with a soft glow for accessibility.\n\n## Integration with the Server\n\nThe server should serve this file when:\n\n1. An unauthenticated request hits a protected dashboard route.\n2. The server responds with this HTML (either as a `401` response body or via a `302` redirect to a login route).\n\nThe server must also implement the `/api/auth/dashboard-login` endpoint that this page calls. See the API module documentation for the server-side handler.\n\n## Configuration\n\nThe footer references `config.toml` as the source of authentication configuration. This is informational only — the page itself does not read any configuration.\n\n## Accessibility\n\n- Form inputs have associated `<label>` elements.\n- The error container uses `aria-live=\"polite\"` so screen readers announce errors.\n- The main card has `role=\"main\"`.\n- The `autofocus` attribute on the username input allows immediate typing.\n- `autocomplete` attributes are set correctly for password managers (`username`, `current-password`, `one-time-code`).\n- The page uses `<meta name=\"robots\" content=\"noindex, nofollow\">` to prevent search engine indexing.","other-librefang-api-static":"# Other — librefang-api-static\n\n# librefang-api-static — Static Frontend Localization\n\n## Purpose\n\nThis module provides the internationalization (i18n) locale data for the LibreFang web dashboard. It contains JSON translation files loaded by the frontend at runtime to render all user-facing text in the appropriate language.\n\nThere is no executable code in this module — it is pure static data consumed by the dashboard's i18n layer.\n\n## File Layout\n\n```\nlibrefang-api/static/locales/\n├── en.json    # Primary locale (English) — canonical source of truth\n└── ja.json    # Japanese translation (partial)\n```\n\nAdditional locales follow the same pattern: one `<code>.json` file per language, keyed by ISO 639-1 code.\n\n## How It Connects to the Codebase\n\nThe locale files sit inside the API server's static asset tree. When the browser loads the dashboard, the frontend i18n library (typically loaded via `librefang-api/static/js/`) fetches the appropriate JSON file based on the user's language preference and replaces all translatable strings in the UI.\n\nThe API server serves these files as static content — no backend processing occurs.\n\n## Translation Key Structure\n\nAll keys are organized hierarchically by page or functional area. The top-level namespace corresponds to a UI domain:\n\n| Namespace | Scope |\n|---|---|\n| `nav` | Sidebar/top navigation labels |\n| `status` | Connection and system status indicators |\n| `btn` | Reusable button labels |\n| `label` | Generic form and column labels |\n| `auth` | API key authentication gate |\n| `page` | Page title overrides |\n| `health` | Health-check status text |\n| `stat` | Dashboard statistic card headers |\n| `card` | Card titles on the overview page |\n| `agents` | Agent list prompts |\n| `detail` | Agent detail panel (info, files, config tabs) |\n| `mode` | Agent mode labels (observe, assist, full) |\n| `category` | Filter categories |\n| `profile` | Tool profile names and descriptions |\n| `template` | Built-in agent template metadata |\n| `time` | Relative time formatting |\n| `onboarding` | First-run onboarding banner |\n| `provider` | LLM provider setup UI |\n| `overview` | Dashboard overview page |\n| `security` | Security feature labels |\n| `agentChat` | Chat interface — messages, commands, toasts |\n| `sessionsPage` | Session management page |\n| `agentsPage` | Agent creation and management page |\n| `approvals` | Execution approval workflow |\n| `logsPage` | Live logs and audit trail |\n| `runtimePage` | Runtime information page |\n| `settingsPage` | Full settings panel (providers, models, tools, security, network, budget, memory, migration) |\n| `workflowsPage` | Workflow list and execution |\n| `workflowBuilder` | Visual workflow builder |\n| `schedulerPage` | Cron jobs and event triggers |\n| `channelsPage` | Messaging channel configuration |\n| `skillsPage` | Skills marketplace and MCP servers |\n| `handsPage` | Hands — curated autonomous capability packages |\n| `pluginsPage` | Plugin management |\n| `commsPage` | Inter-agent communication |\n| `setupWizard` | First-run setup wizard (multi-step) |\n| `goalsPage` | Goals and sub-goals |\n| `analyticsPage` | Usage analytics and cost tracking |\n| `memoryPage` | Proactive memory browser |\n| `theme` | Theme switcher labels |\n| `sidebar` | Sidebar shortcut hints |\n| `agentChat2`, `settingsPage2`, etc. | Supplementary keys for secondary UI states |\n| `confirm` | Generic confirm/cancel dialog |\n\n### Interpolation\n\nStrings use `{variable}` placeholders for dynamic values. The frontend i18n library replaces these at render time. Examples:\n\n```json\n\"minutesAgo\": \"{count}m ago\"\n\"providerConnected\": \"{provider} connected ({latency}ms)\"\n\"entriesCount\": \"{filtered} of {total} entries\"\n```\n\n### Deep Nesting\n\nSome namespaces nest two or three levels deep to scope related keys:\n\n```json\n\"agentChat\": {\n  \"cmd\": {\n    \"help\": \"Show available commands\",\n    \"model\": \"Show or switch model (/model [name])\"\n  },\n  \"toast\": {\n    \"modelSwitched\": \"Switched to {model}\"\n  },\n  \"sys\": {\n    \"thinkStatus\": \"Extended thinking\"\n  }\n}\n```\n\n```mermaid\ngraph TD\n    A[en.json / ja.json] --> B[i18n Library]\n    B --> C[Dashboard UI]\n    C --> D[Sidebar Nav]\n    C --> E[Agent Chat]\n    C --> F[Settings Panel]\n    C --> G[Logs & Audit]\n    C --> H[All Other Pages]\n    I[User Language Preference] --> B\n```\n\n## Adding a New Locale\n\n1. Copy `en.json` to a new file named `<iso-code>.json` (e.g., `de.json`).\n2. Translate all string values while preserving keys and `{variable}` placeholders exactly.\n3. Place the file in `librefang-api/static/locales/`.\n4. Register the locale in the frontend's i18n configuration (typically in the dashboard's JavaScript initialization).\n\n## Adding New Keys\n\nWhen new UI text is needed:\n\n1. Add the key to `en.json` first — it is the canonical source.\n2. Mirror the key path in every other locale file (even if the translation is pending, include the key with the English value as a fallback).\n3. Use the key in the frontend via the i18n library's lookup function (e.g., `t('agentsPage.spawnAgentFailed')`).\n\n## Key Naming Conventions\n\n- **camelCase** for all key names.\n- **PascalCase** reserved for agent template IDs (e.g., `GeneralAssistant`, `DevOpsEngineer`).\n- Toast/notification messages live under a `toast` sub-namespace within their page namespace.\n- Error messages typically include a `{message}` placeholder for the backend error string.\n- Confirmation dialogs are paired as `<action>Title` / `<action>Confirm` (e.g., `deleteSessionTitle`, `deleteSessionConfirm`).\n\n## Notable Content Areas\n\n### Agent Templates (`template.*`)\n\nTen built-in agent templates ship with the dashboard. Each has a `name` and `desc` key:\n\n- `GeneralAssistant`, `CodeHelper`, `Researcher`, `Writer`, `DataAnalyst`, `DevOpsEngineer`, `CustomerSupport`, `Tutor`, `APIDesigner`, `MeetingNotes`\n\n### Chat Commands (`agentChat.cmd.*`)\n\nAll slash commands available in the chat interface are documented here, including `/think`, `/model`, `/compact`, `/reboot`, `/budget`, `/peers`, and `/a2a`.\n\n### Security Features (`settingsPage.coreFeatures.*`, `configurableFeatures.*`, `monitoringFeatures.*`)\n\nThe settings page enumerates all 15 security features with their names, descriptions, threats prevented, and (where applicable) tuning hints. This is the single source of truth for the security documentation displayed in the UI.\n\n### Time Formatting (`time.*`)\n\nRelative timestamps use `{count}` interpolation: `secondsAgo`, `minutesAgo`, `hoursAgo`, `daysAgo`, plus `now`.\n\n## Maintenance Notes\n\n- The Japanese locale (`ja.json`) is a partial translation — many later-added keys (especially under `settingsPage.securityDependency`, `channelsPage`, and later pages) may still carry English values or be truncated.\n- When the source file is truncated (as seen in the provided `ja.json`), the i18n layer falls back to the `en.json` value for any missing key.\n- There are no build steps or compilation for these files — they are served as-is by the API server's static file handler.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests\n\nIntegration and load tests for the LibreFang HTTP API. These tests boot a real `LibreFangKernel`, bind an axum server to a random port, and exercise endpoints via `reqwest` — no mocking.\n\n## Test Files\n\n| File | Purpose | Run command |\n|------|---------|-------------|\n| `api_integration_test.rs` | End-to-end HTTP tests for every API surface | `cargo test -p librefang-api --test api_integration_test -- --nocapture` |\n| `daemon_lifecycle_test.rs` | Daemon startup, PID file, health probe, graceful shutdown | `cargo test -p librefang-api --test daemon_lifecycle_test` |\n| `load_test.rs` | Concurrent throughput, latency percentiles, session/workflow stress | `cargo test -p librefang-api --test load_test -- --nocapture` |\n| `openapi_spec_test.rs` | Generates and validates the OpenAPI spec to `openapi.json` | `cargo test -p librefang-api --test openapi_spec_test` |\n\n## Test Infrastructure\n\n### TestServer\n\nThe primary harness. Creates a temporary directory, boots a `LibreFangKernel` with an ollama provider (no real LLM needed), builds a minimal axum `Router` with the routes under test, binds to `127.0.0.1:0`, and returns the base URL for `reqwest` calls.\n\n```rust\nlet server = start_test_server().await;\nlet client = reqwest::Client::new();\nlet resp = client.get(format!(\"{}/api/health\", server.base_url)).send().await.unwrap();\n```\n\nCleanup: `TestServer::drop` calls `state.kernel.shutdown()`, which stops the runtime. The `tempfile::TempDir` is deleted automatically.\n\n### FullRouterHarness\n\nUses `server::build_router()` to construct the complete production router — including versioned aliases (`/api/v1/*`), locale files, the dashboard, migration endpoints, and provider lists. Tests that need the full routing stack (version negotiation, locale serving, provider metadata) use this instead of `TestServer`.\n\n```rust\nlet harness = start_full_router(\"\").await;\nlet response = harness.app.clone()\n    .oneshot(Request::builder().uri(\"/api/health\").body(Body::empty()).unwrap())\n    .await.unwrap();\n```\n\n### Provider Variants\n\n| Function | LLM provider | Use case |\n|----------|-------------|----------|\n| `start_test_server()` | ollama (no key) | All tests that don't need a real LLM response |\n| `start_test_server_with_llm()` | groq | Tests gated behind `GROQ_API_KEY` env var |\n| `start_test_server_with_provider(provider, model, env)` | configurable | Custom provider setups |\n| `start_test_server_with_auth(api_key)` | ollama | Tests that enable Bearer-token authentication |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Test function] -->|starts| B[TestServer / FullRouterHarness]\n    B --> C[tempfile::TempDir]\n    B --> D[LibreFangKernel::boot_with_config]\n    D --> E[AppState]\n    E --> F[Arc&lt;Router&gt; with routes + middleware]\n    F --> G[TcpListener bind 127.0.0.1:0]\n    G --> H[tokio::spawn axum::serve]\n    A -->|HTTP via reqwest| H\n    A -->|or oneshot via tower| F\n    H -->|response| A\n    B -.->|Drop: kernel.shutdown| D\n```\n\nTests interact with the server in two ways:\n\n1. **Real HTTP** (`TestServer`) — `reqwest::Client` sends requests to the random-bound TCP port. Used for most integration tests.\n2. **In-process tower oneshot** (`FullRouterHarness`) — calls `app.clone().oneshot(request)` without network I/O. Used when testing router-level features (version headers, locale files, auth middleware responses).\n\n## Test Coverage by Area\n\n### API Endpoints (`api_integration_test.rs`)\n\n- **Health & Status**: `GET /api/health` (public, redacted), `GET /api/status` (detailed, includes agent count and uptime)\n- **Agent Lifecycle**: spawn via `POST /api/agents`, list (paginated with `items`/`total`/`offset`/`limit`), kill via `DELETE /api/agents/{id}`\n- **Agent Operations**: send message (`POST /api/agents/{id}/message`), session retrieval, metrics, logs with level filtering\n- **Workflows**: create, list\n- **Triggers**: create, list (unfiltered and filtered by `agent_id`), delete\n- **Tools**: list all, get by name, 404 for nonexistent\n- **MCP Bridge**: `POST /mcp` with `X-LibreFang-Agent-Id` header for caller-context rehydration (regression guard for issue #2699)\n- **Config Reload**: hot-reload proxy changes without restart\n- **Migration**: OpenClaw migration with empty `target_dir` falls back to daemon home\n- **Error Handling**: invalid UUID → 400, nonexistent agent → 404, invalid TOML manifest → 400\n\n### Authentication (`api_integration_test.rs`)\n\nTests using `start_test_server_with_auth()`:\n\n- `GET /api/health` remains public even with auth enabled\n- Requests without a token → 401 \"Missing\"\n- Wrong bearer token → 401 \"Invalid\"\n- Correct `Bearer <api_key>` → 200\n- Empty API key in config disables auth entirely\n\n### Versioning & Routing (`api_integration_test.rs`)\n\n- `/api/v1/*` aliases serve the same handlers as `/api/*`\n- `x-api-version: v1` header on all responses\n- Path-based version wins over unknown `Accept` header (`application/vnd.librefang.v99+json`)\n- `GET /api/versions` returns current and supported version list\n- Unauthorized responses still include `x-api-version`\n\n### Agent List Features (`api_integration_test.rs`)\n\n- **Pagination**: `limit` and `offset` query params, clamped to max 100\n- **Sorting**: `sort=name|created_at|last_active|state`, invalid field → 400\n- **Text search**: `q=<query>` filters by name/description\n\n### Daemon Lifecycle (`daemon_lifecycle_test.rs`)\n\n- `DaemonInfo` serialization round-trip\n- `read_daemon_info()` from file, missing file (→ `None`), corrupt JSON (→ `None`)\n- Full lifecycle: boot kernel → write `daemon.json` → verify health/status → call shutdown → verify cleanup\n- Server responds to health within 1 second of startup\n\n### Load Tests (`load_test.rs`)\n\n| Test | What it measures |\n|------|-----------------|\n| `load_concurrent_agent_spawns` | 20 parallel `POST /api/agents` (marked `#[ignore]` — race condition) |\n| `load_endpoint_latency` | p50/p95/p99 for 8 read endpoints over 100 iterations each |\n| `load_concurrent_reads` | 50 simultaneous GETs across health/agents/status/metrics |\n| `load_session_management` | Create 10 sessions, list, rapid-switch |\n| `load_workflow_operations` | 15 concurrent workflow creates + list |\n| `load_spawn_kill_cycle` | Sequential spawn then kill of 10 agents (marked `#[ignore]`) |\n| `load_metrics_sustained` | 200 sequential `GET /api/metrics` requests |\n\nLoad tests print throughput numbers to stderr. The p95 threshold is 1 second — these are smoke tests for pathological slowness, not microbenchmarks.\n\n### OpenAPI Spec (`openapi_spec_test.rs`)\n\n`generate_openapi_json` calls `ApiDoc::openapi()`, serializes to JSON, validates that it contains 100+ paths, and writes the result to `<repo_root>/openapi.json` for SDK codegen and CI.\n\n## How to Add a New Test\n\n1. **Decide the harness**: If the test exercises standard agent/workflow/trigger endpoints, use `start_test_server()`. If it needs the full production router (locales, versioning, providers, migration), use `start_full_router()`.\n\n2. **For LLM-dependent tests**, guard with:\n   ```rust\n   if std::env::var(\"GROQ_API_KEY\").is_err() {\n       eprintln!(\"GROQ_API_KEY not set, skipping LLM integration test\");\n       return;\n   }\n   let server = start_test_server_with_llm().await;\n   ```\n\n3. **For auth tests**, use `start_test_server_with_auth(\"your-key\")` which layers the `middleware::auth` middleware onto the router.\n\n4. **Cleanup is automatic** — the `TempDir` and kernel shutdown happen in `Drop`. No teardown code needed.\n\n## Manifest Constants\n\nThree TOML manifests are defined as constants for spawning test agents:\n\n- **`TEST_MANIFEST`** — ollama provider, grants `file_read` capability. Used by most tests.\n- **`LLM_MANIFEST`** — groq provider, grants `file_read`. Used by `test_send_message_with_llm`.\n- **`MCP_TEST_MANIFEST`** — ollama provider, grants `cron_list`, `cron_create`, `cron_cancel`. Used by MCP bridge tests.\n\n## Key Dependencies\n\n- `tempfile` — isolated temporary directories per test\n- `reqwest` — HTTP client for real network calls\n- `tower::ServiceExt` — in-process `oneshot()` for full-router tests\n- `librefang_kernel::LibreFangKernel` — real kernel instance\n- `librefang_api::{routes, middleware, server, ws}` — production code under test\n- `librefang_runtime::registry_sync` — populates model catalog in `start_full_router`","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nThe HTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate exposes the daemon's capabilities — agent management, channel orchestration, skill execution, memory, extensions, and telemetry — through a RESTful HTTP API and WebSocket endpoints. It also embeds and serves the React-based dashboard UI.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Client[HTTP / WS Clients] --> API[librefang-api<br>Axum + Tower]\n    Dashboard[React Dashboard] --> API\n    API --> Kernel[librefang-kernel]\n    API --> Runtime[librefang-runtime]\n    API --> Memory[librefang-memory]\n    API --> Channels[librefang-channels]\n    API --> Skills[librefang-skills]\n    API --> Hands[librefang-hands]\n    API --> Extensions[librefang-extensions]\n    API --> Wire[librefang-wire]\n    API --> Migrate[librefang-migrate]\n    API --> Telemetry[librefang-telemetry]\n    API --> Types[librefang-types]\n```\n\nThe API layer is a thin HTTP/WS façade over the `librefang-kernel` core. It does not implement business logic itself — it translates HTTP requests into kernel operations and serializes responses.\n\n## Feature Flags\n\nFeature flags control which channel backends and telemetry integrations are compiled in. All flags are additive.\n\n### Presets\n\n| Feature | Description |\n|---|---|\n| `default` | Enables `all-channels` + `telemetry` |\n| `all-channels` | Every channel backend (~40 platforms) |\n| `mini` | 12 core channels: Telegram, Discord, Slack, Matrix, Email, Webhook, WhatsApp, Signal, Teams, Mattermost, IRC, Google Chat |\n| `telemetry` | OpenTelemetry tracing export + Prometheus metrics endpoint |\n\n### Individual Channel Flags\n\nEach channel is toggled by a `channel-<name>` feature. These are forwarded directly to `librefang-channels`, so the API crate itself remains channel-agnostic — it simply ensures the selected backends are compiled into the final binary.\n\nAvailable channels: `telegram`, `discord`, `slack`, `matrix`, `email`, `voice`, `webhook`, `whatsapp`, `signal`, `teams`, `mattermost`, `irc`, `google-chat`, `twitch`, `rocketchat`, `zulip`, `xmpp`, `bluesky`, `feishu`, `line`, `mastodon`, `messenger`, `reddit`, `revolt`, `viber`, `flock`, `guilded`, `keybase`, `nextcloud`, `nostr`, `pumble`, `threema`, `twist`, `webex`, `dingtalk`, `discourse`, `gitter`, `gotify`, `linkedin`, `mumble`, `ntfy`, `qq`, `wechat`, `wecom`.\n\n### Telemetry Feature\n\nWhen enabled, pulls in:\n- `opentelemetry` / `opentelemetry_sdk` / `opentelemetry-otlp` — distributed tracing export via OTLP\n- `tracing-opentelemetry` — bridges `tracing` spans to OpenTelemetry\n- `metrics` / `metrics-exporter-prometheus` — Prometheus-compatible metrics endpoint\n\n## Key Dependencies and Their Roles\n\n| Crate | Role in the API |\n|---|---|\n| `axum` + `tower` + `tower-http` | HTTP framework, middleware stack (CORS, compression, tracing, rate limiting) |\n| `governor` | Request rate limiting middleware |\n| `jsonwebtoken` | JWT issuance and validation for API authentication |\n| `argon2` | Password hashing for user credential storage |\n| `hmac` + `sha2` | HMAC-SHA256 for webhook signature verification and token integrity |\n| `subtle` | Constant-time comparison for security-sensitive equality checks |\n| `utoipa` | OpenAPI 3.x spec generation with Axum integration |\n| `include_dir` | Embeds the compiled React dashboard into the binary |\n| `dashmap` | Concurrent hash maps for in-memory request/session state |\n| `tokio-stream` + `futures` | Async stream utilities for WebSocket and SSE endpoints |\n| `flate2` + `tar` + `zip` | Archive handling for extension packaging/upload |\n| `reqwest` | Outbound HTTP client (health checks, extension downloads, OAuth flows) |\n| `portable-pty` | PTY allocation for interactive terminal WebSocket sessions |\n| `toml` + `toml_edit` | Configuration file reading and programmatic editing |\n| `socket2` | Low-level socket configuration for the HTTP listener |\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks:\n\n1. **Ensures the static dashboard directory exists.** The path `static/react/` is gitignored because it contains build artifacts from the dashboard's `npm run build`. If the directory is missing (fresh clone, CI without dashboard build), it creates an empty placeholder so `include_dir!` compiles without error. At runtime, if the embedded directory is empty, assets are served from `~/.librefang/dashboard/` instead.\n\n2. **Captures build metadata** and injects it as compile-time environment variables:\n\n   | Variable | Source | Example |\n   |---|---|---|\n   | `GIT_SHA` | `git rev-parse --short HEAD` | `a3f7c2d` |\n   | `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n   | `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0` |\n\n   These are available throughout the crate via `env!(\"GIT_SHA\")`, etc., and are typically exposed through a `/api/version` or `/health` endpoint.\n\n3. **Graceful fallback.** If `git`, `date`, or `rustc` aren't available (e.g., cross-compilation environments), the value defaults to `\"unknown\"`.\n\n### Build-Time Constants Reference\n\n```rust,ignore\n// Available anywhere in librefang-api after compilation\nenv!(\"GIT_SHA\")       // e.g., \"a3f7c2d\"\nenv!(\"BUILD_DATE\")    // e.g., \"2025-01-15\"\nenv!(\"RUSTC_VERSION\") // e.g., \"rustc 1.82.0 (...\"\n```\n\n## Dashboard Embedding Strategy\n\nThe dashboard is a React application compiled to static files. The embedding uses `include_dir!` from the `include_dir` crate:\n\n- **At compile time:** `static/react/` is embedded into the binary. If the directory is empty (no dashboard build), nothing is embedded.\n- **At runtime:** The server falls back to serving files from `~/.librefang/dashboard/`, allowing dashboard updates without recompiling the daemon.\n\nThis two-tier approach means:\n- Release binaries ship with the dashboard baked in.\n- Development builds can skip the dashboard npm build step.\n- Operators can override the embedded dashboard by placing files in the runtime directory.\n\n## Authentication Model\n\nBased on the dependency set (`jsonwebtoken`, `argon2`, `hmac`/`sha2`, `subtle`):\n\n- **Password authentication** uses Argon2 hashing for stored credentials.\n- **JWT tokens** are issued after authentication and validated on subsequent requests.\n- **Webhook verification** uses HMAC-SHA256 signatures.\n- **Constant-time comparison** (`subtle`) prevents timing attacks on token/signature checks.\n\n## Platform-Specific Dependencies\n\nOn Unix targets, the crate depends on `rustix` with the `process` feature, used for low-level process management operations (likely for PTY handling and process supervision beyond what `portable-pty` provides).\n\n## Relationship to Other Crates\n\n```\nlibrefang-types       ← Shared type definitions (request/response DTOs, error types)\nlibrefang-kernel      ← Core agent orchestration logic\nlibrefang-runtime     ← Process lifecycle and registry management\nlibrefang-memory      ← Agent memory and context storage\nlibrefang-channels    ← Channel backend implementations (feature-gated)\nlibrefang-wire        ← Protocol/message serialization\nlibrefang-skills      ← Skill registry and execution\nlibrefang-hands       ← Tool/hand capabilities for agents\nlibrefang-extensions  ← Extension loading and vault management\nlibrefang-migrate     ← Database schema migrations\nlibrefang-telemetry   ← Shared telemetry primitives\n```\n\nThe API crate is the top-level integration point — it pulls in every other workspace crate to present a unified HTTP interface. It does not define new domain concepts; it maps HTTP semantics onto the existing kernel operations.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels-benches — Dispatch Hot-Path Benchmarks\n\n## Purpose\n\nThis module provides Criterion-based microbenchmark
