roq` ŌĆö early-returns with `eprintln!`\n\n## Test Files\n\n### Audit Retention ŌĆö `audit_retention_test.rs`\n\nValidates milestone M7: the kernel's periodic trim task activates on boot and the self-audit `RetentionTrim` row is written when entries are actually dropped.\n\n**Test: `test_kernel_boot_with_retention_config_starts_trim_task`**\n\n- Configures `trim_interval_secs = 1` and `max_in_memory_entries = 10`\n- Seeds 50 `AuditAction::RoleChange` entries (chosen because it has no per-action retention rule ŌĆö ensures the cap path is the sole reason rows are dropped)\n- Calls `start_background_agents()` explicitly to boot the periodic task\n- Sleeps 2.5s to allow the 1s interval to fire\n- Asserts the log collapsed to Ōēż20 entries (cap of 10 + the self-audit `RetentionTrim` row + possible boot-time entries)\n- Asserts at least one `AuditAction::RetentionTrim` row exists\n- Asserts `audit.verify_integrity()` still passes after the trim\n\n### Integration ŌĆö `integration_test.rs`\n\nBasic kernel boot ŌåÆ agent spawn ŌåÆ message send ŌåÆ response validation against the Groq API.\n\n| Test | What it validates |\n|------|-------------------|\n| `test_full_pipeline_with_groq` | Single agent: spawn, send message, get non-empty response with token usage > 0, then kill |\n| `test_multiple_agents_different_models` | Two agents with different models (`llama-3.3-70b-versatile` vs `llama-3.1-8b-instant`), both respond, coexist, and are independently killable |\n\n### KernelHandle Contract Tests\n\nThese tests exercise the `KernelHandle` trait object (`&dyn KernelHandle`) to validate the public API contract independently of the concrete `LibreFangKernel` type.\n\n#### `kernel_handle_contract_broader.rs`\n\nGeneral kernel operations:\n\n| Test | Validates |\n|------|-----------|\n| `test_roster_roundtrip` | `roster_upsert` ŌåÆ `roster_members` ŌåÆ `roster_remove_member` cycle |\n| `test_goal_list_active_default_empty` | Fresh kernel returns empty goal list |\n| `test_list_a2a_agents_default_empty` | Fresh kernel returns empty A2A agent list |\n| `test_get_a2a_agent_url_default_none` | Unknown agent returns `None` |\n| `test_kill_agent_unknown_returns_error` | Killing nonexistent agent returns `Err` |\n| `test_publish_event_succeeds` | Event publishing succeeds on a fresh kernel |\n\n#### `kernel_handle_contract_cron_spawn.rs`\n\nCron job creation and agent spawning:\n\n| Test | Validates |\n|------|-----------|\n| `test_cron_create_preserves_peer_id` | `cron_create` stores and `cron_list` returns the `peer_id` field |\n| `test_cron_create_without_peer_id` | Omitting `peer_id` results in `null` in the stored job |\n| `test_spawn_agent_returns_valid_identity` | `spawn_agent` returns a non-empty ID and correct name; agent appears in `list_agents` |\n| `test_list_agents_returns_manifest_metadata` | `list_agents` and `find_agents` surface name, description, and ID from the manifest |\n\n#### `kernel_handle_contract_memory.rs`\n\nMemory namespace isolation between global and peer-scoped stores:\n\n| Test | Validates |\n|------|-----------|\n| `test_memory_store_recall_isolates_peer_namespaces` | Same key in global, `peer-a`, `peer-b` stores returns correct values; unregistered peer returns `None` |\n| `test_memory_list_separates_global_and_peer_keys` | `memory_list(None)` returns only global keys; `memory_list(Some(\"peer-a\"))` returns only peer keys |\n| `test_memory_recall_nonexistent_key_returns_none` | Missing keys return `None` in both global and peer scopes |\n\n#### `kernel_handle_contract_rbac.rs`\n\nUser policy resolution for tool access and memory ACLs:\n\n| Test | Validates |\n|------|-----------|\n| `test_resolve_user_tool_decision_default_allow_for_unconfigured_user` | No registered users ŌåÆ guest mode ŌåÆ `Allow` |\n| `test_memory_acl_for_sender_default_none_for_unconfigured_user` | No users ŌåÆ `None` (no restriction) |\n| `test_resolve_user_tool_decision_uses_sender_and_channel_policy` | Telegram-bound user gets their deny; unknown sender gets guest gate; wrong channel doesn't match |\n| `test_memory_acl_for_sender_uses_sender_and_channel_binding` | Memory ACL is scoped to sender ID + channel binding |\n| `test_requires_approval_with_context_delegates_to_requires_approval` | Context-aware variant delegates to the simpler method |\n| `test_is_tool_denied_with_context_default_false` | Default config denies no tools |\n\n#### `kernel_handle_contract_spawn_checked.rs`\n\nCapability-checked agent spawning (prevents child agents from exceeding parent capabilities):\n\n| Test | Validates |\n|------|-----------|\n| `test_spawn_agent_checked_with_empty_parent_caps` | Spawns successfully with empty capability list |\n| `test_spawn_agent_checked_passes_parent_id` | Parent-child relationship tracked; both appear in `list_agents` |\n| `test_spawn_agent_checked_with_capability_list` | Wildcard and glob capabilities accepted |\n| `test_spawn_agent_checked_rejects_capability_escalation` | Child requesting `shell_exec` when parent only has `FileRead` is rejected; error mentions \"escalation\" or \"capability\" |\n\n#### `kernel_handle_contract_task.rs`\n\nTask lifecycle (post ŌåÆ claim ŌåÆ complete):\n\n| Test | Validates |\n|------|-----------|\n| `test_task_post_preserves_assigned_to_and_created_by` | Both fields stored and retrievable via `task_list` |\n| `test_task_claim_returns_assigned_task` | Claim returns the correct task |\n| `test_task_complete_updates_status` | Status becomes `\"completed\"` and result is stored |\n| `test_task_post_with_no_assignment` | Unassigned tasks have null/empty `assigned_to` and `created_by` |\n\n### Multi-Agent / Hand Lifecycle ŌĆö `multi_agent_test.rs`\n\nThe largest test file. Covers the hand (agent-template) activation lifecycle: deterministic IDs, pause/resume, state persistence, schema defaults, trigger reactivation, tool inheritance, and multi-hand coexistence.\n\n#### Hand definitions used\n\n| Constant | ID | Agents | Purpose |\n|----------|-----|--------|---------|\n| `HAND_A` | `test-clip` | Single `main` agent | Basic lifecycle tests |\n| `HAND_B` | `test-devops` | Single `main` agent | Coexistence tests |\n| `HAND_C` | `test-research` | `analyst` + `planner` (coordinator) | Multi-agent routing |\n| `HAND_WITH_SETTINGS` | `test-settings` | Single `main` agent | Schema default seeding |\n\n#### Key test cases\n\n| Test | Validates |\n|------|-----------|\n| `test_activate_hand_spawns_agent` | Activation creates an agent in the registry |\n| `test_deterministic_agent_id` | `AgentId::from_hand_agent(\"test-clip\", \"main\", None)` matches the spawned agent |\n| `test_explicit_coordinator_role_used_for_routes` | HAND_C routes resolve to `planner` (marked `coordinator = true`), not `analyst` |\n| `test_deterministic_id_stable_across_reactivation` | Deactivate + reactivate yields the same legacy-format agent ID |\n| `test_deactivate_kills_agent` | Agent removed from registry after deactivation |\n| `test_pause_and_resume_hand` | Pause sets status to `\"Paused\"` (agent still exists); resume sets `\"Active\"` |\n| `test_agent_tagged_with_hand_metadata` | Agent has tags `hand:test-clip` and `hand_instance:{uuid}` |\n| `test_hand_tools_applied_to_agent` | Hand's tool list merged into agent's manifest capabilities |\n| `test_hand_state_persistence` | State file written as JSON v5 with `instance_id`, `status`, `agent_ids` map |\n| `test_multi_agent_hand_state_persists_coordinator_role` | `coordinator_role` field persisted to disk |\n| `test_activation_seeds_schema_defaults_into_config` | `[[settings]]` defaults fill the instance config when no user overrides provided |\n| `test_activation_preserves_user_overrides_over_defaults` | User-supplied values take precedence; unset keys still get defaults |\n| `test_reactivation_backfills_missing_schema_keys` | Schema evolution: keys added after initial activation are backfilled from defaults |\n| `test_multiple_hands_coexist` | Two hands active simultaneously with distinct agent IDs |\n| `test_deactivate_one_hand_preserves_other` | Independent lifecycle per hand |\n| `test_find_instance_by_agent_id` | `hands().find_by_agent()` returns the correct instance |\n| `test_reactivation_restores_triggers_to_original_roles` | Triggers stay attached to their role's agent after deactivate/reactivate; planner doesn't inherit analyst's triggers |\n| `test_six_agent_fleet` | *(Live LLM)* Spawns 6 agents with distinct roles, sends messages to each, prints fleet summary with token counts |\n\n### RBAC M3 ŌĆö `rbac_m3_evaluate_tool_call.rs`\n\nEnd-to-end RBAC evaluation with real `LibreFangKernel`, `AuthManager`, and `KernelHandle` trait dispatch. Tests the full deny ŌåÆ needs-approval ŌåÆ allow decision chain.\n\nUses a local `boot()` helper that creates a kernel with specific `UserConfig` and `ToolPolicy` (with `ToolGroup` definitions). Leaks the `TempDir` intentionally (test is short-lived).\n\n| Test | Scenario | Expected |\n|------|----------|----------|\n| `evaluate_tool_call_user_deny_short_circuits` | User denies `shell_exec` | `Deny { reason }` ŌĆö deny takes precedence over any agent capability |\n| `evaluate_tool_call_both_allow` | User allows `file_read` | `Allow` |\n| `evaluate_tool_call_user_role_no_allow_list_needs_approval` | User role, no policy | `NeedsApproval` ŌĆö escalation from `NeedsRoleEscalation` |\n| `evaluate_tool_call_user_categories_resolve_against_kernel_groups` | `denied_groups: [\"shell_tools\"]` | `shell_exec` ŌåÆ `Deny`; `file_read` ŌåÆ `Allow` (admin self-authorizes) |\n| `evaluate_tool_call_unrecognised_sender_no_longer_fail_open` | Unknown sender on bound channel | Safe tool ŌåÆ `Allow`; `shell_exec` ŌåÆ `NeedsApproval` (fail-closed) |\n| `evaluate_tool_call_trait_layer_none_sender_fails_closed` | `(None, None)` sender/channel | `shell_exec` ŌåÆ `NeedsApproval`; `file_read` ŌåÆ `Allow`; `Some(\"cron\")` ŌåÆ `Allow` (system-call carve-out); `Some(\"system\")` ŌåÆ `NeedsApproval` |\n| `evaluate_tool_call_user_categories_allow_list_short_circuits_for_user_role` | User role with `allowed_groups` | Tool in group ŌåÆ `Allow`; tool outside ŌåÆ `Deny` |\n| `submit_tool_approval_hand_agent_force_human_skips_auto_approve` | Hand-tagged agent, `force_human=true` | `force_human=false` ŌåÆ `AutoApproved`; `force_human=true` ŌåÆ `Pending` |\n| `evaluate_tool_call_reload_picks_up_new_policy` | `auth_manager().reload()` with updated policy | Stale policy invalidated; new deny takes effect immediately |\n\n### WASM Agent ŌĆö `wasm_agent_integration_test.rs`\n\nTests real WASM execution through the kernel pipeline (no mocks for the WASM runtime).\n\n#### WASM modules used\n\n| Constant | Behavior |\n|----------|----------|\n| `ECHO_WAT` | Returns input JSON as-is (bump allocator, passthrough `execute`) |\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` from static data |\n| `INFINITE_LOOP_WAT` | `loop { br 0 }` ŌĆö triggers fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\n| Test | Validates |\n|------|-----------|\n| `test_wasm_agent_hello_response` | Fixed response module returns `\"hello from wasm\"` |\n| `test_wasm_agent_echo` | Echo module response contains the input message |\n| `test_wasm_agent_fuel_exhaustion` | Infinite loop ŌåÆ error mentioning fuel |\n| `test_wasm_agent_missing_module` | Nonexistent `.wasm` ŌåÆ error mentioning the file |\n| `test_wasm_agent_host_call_time` | Host call proxy dispatches and returns non-empty response |\n| `test_wasm_agent_streaming_fallback` | `send_message_streaming` produces Ōēź2 events; final result matches fixed response |\n| `test_multiple_wasm_agents` | Two WASM agents coexist; registry shows 3 (2 WASM + default assistant) |\n| `test_mixed_wasm_and_llm_agents` | WASM and LLM agents coexist in the same kernel; killing one doesn't affect the other |\n\n### Workflow ŌĆö `workflow_integration_test.rs`\n\nTests the workflow engine: registration, agent resolution (by name and by ID), run creation, trigger management, and full E2E pipeline execution.\n\n| Test | Validates |\n|------|-----------|\n| `test_workflow_register_and_resolve` | Agents resolved by name; workflow stored; run created with correct input |\n| `test_workflow_agent_by_id` | Agent referenced by ID; run creation succeeds |\n| `test_trigger_registration_with_kernel` | Register `Lifecycle` and `SystemKeyword` triggers; list all/agent-specific; remove by ID |\n| `test_workflow_e2e_with_groq` | *(Live LLM)* 2-step pipeline (analyst ŌåÆ writer); verifies token usage, step results, run state `Completed` |\n\n### Purge Sentinels ŌĆö `purge_sentinels_test.rs`\n\nTests the `purge_sentinels` binary (discovered via `env!(\"CARGO_BIN_EXE_purge_sentinels\")`). The binary removes whole-line sentinel markers (e.g., `NO_REPLY`, `[no reply needed]`, `no_reply`) from Markdown files.\n\nUses a `fixture_dir()` helper that creates a directory structure with files containing various sentinel patterns.\n\n| Test | Validates |\n|------|-----------|\n| `dry_run_reports_counts_and_touches_nothing` | Reports removal count; no files modified; no `.bak` created |\n| `apply_creates_backup_and_rewrites` | `.bak` matches original; sentinels removed; mid-sentence sentinels preserved; clean files untouched; nested files processed |\n| `apply_is_idempotent` | Second run reports 0 removals; files and backups unchanged |\n| `apply_aborts_when_existing_bak_differs` | Stale `.bak` ŌåÆ non-zero exit with \"backup mismatch\" error; stale `.bak` preserved |\n| `nonexistent_path_exits_non_zero` | Invalid path ŌåÆ error containing \"does not exist\" |\n\n## Adding New Tests\n\n1. **For `KernelHandle` contract tests**: Add to the appropriate `kernel_handle_contract_*.rs` file. Use `boot()` or `boot_with_users()` from `common/mod.rs`. Always test through `&dyn KernelHandle` to validate the trait contract.\n\n2. **For feature integration tests**: Create a new `*_test.rs` file. Use `MockKernelBuilder` from `librefang-testing` for most cases. Use `#[tokio::test(flavor = \"multi_thread\")]` if the test touches kernel internals that call `block_in_place`.\n\n3. **For live LLM tests**: Guard with `std::env::var(\"GROQ_API_KEY\")` at the top of the test. Either early-return (preferred for multi-agent tests) or use `#[ignore]` annotation.\n\n4. **Recursion limit**: If the compiler suggests increasing the recursion limit after adding trait bounds or async closures, add `#![recursion_limit = \"256\"]` at the crate level of the test file.","other-librefang-kernel":"# Other ŌĆö librefang-kernel\n\n# librefang-kernel\n\nThe central orchestration crate for the LibreFang Agent OS. It assembles the various subsystems into a coherent kernel that drives the agent's lifecycle ŌĆö from LLM interaction and skill dispatch to extension management, metering, and inter-process communication.\n\n## Architecture\n\n`librefang-kernel` sits at the top of the dependency graph. It does not implement subsystem logic itself; instead, it wires together the following specialized crates:\n\n```\n                    ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n                    Ōöé  librefang-kernel   Ōöé\n                    ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n                              Ōöé\n          ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n          Ōöé                   Ōöé                   Ōöé\n          Ō¢╝                   Ō¢╝                   Ō¢╝\n   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n   Ōöé kernel-routerŌöé   Ōöékernel-meteringŌöé   Ōöé   runtime     Ōöé\n   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n          Ōöé                   Ōöé                   Ōöé\n          Ō¢╝                   Ō¢╝                   Ō¢╝\n   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n   Ōöé    skills    Ōöé   Ōöé  llm-driver  Ōöé   Ōöé   channels    Ōöé\n   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n          Ōöé                   Ōöé                   Ōöé\n          Ō¢╝                   Ō¢╝                   Ō¢╝\n   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n   Ōöé    hands     Ōöé   Ōöé  extensions  Ōöé   Ōöé     wire      Ōöé\n   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n          Ōöé                                       Ōöé\n          Ō¢╝                                       Ō¢╝\n   ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ                       ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n   Ōöé   memory     Ōöé                       Ōöé    types      Ōöé\n   ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś                       ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\n## Subsystem Responsibilities\n\n| Crate | Role within the kernel |\n|---|---|\n| `librefang-kernel-router` | Routes incoming requests to the appropriate handler |\n| `librefang-kernel-metering` | Tracks resource consumption and usage metrics |\n| `librefang-runtime` | Manages the async runtime and agent execution lifecycle |\n| `librefang-skills` | Registers and dispatches agent skills |\n| `librefang-hands` | Executes concrete actions (tool use, I/O) |\n| `librefang-extensions` | Loads and manages extensions that augment agent behavior |\n| `librefang-llm-driver` | Abstracts communication with language model providers |\n| `librefang-wire` | Defines the wire protocol for inter-service messaging |\n| `librefang-channels` | Provides communication channels (feature-gated, default features disabled) |\n| `librefang-memory` | Manages conversation and persistent memory storage |\n| `librefang-types` | Shared type definitions used across all crates |\n\n## Key External Dependencies\n\nThe kernel pulls in several categories of functionality through workspace dependencies:\n\n**Persistence & storage**\n- `rusqlite` ŌĆö SQLite for local structured storage\n- `dashmap` ŌĆö Concurrent hash maps for in-memory state\n- `arc-swap` ŌĆö Atomic swapping of shared references (hot-reloadable configuration)\n\n**Serialization & configuration**\n- `serde`, `serde_json`, `toml`, `serde_yaml` ŌĆö Multi-format config and data handling\n\n**Security & cryptography**\n- `sha2` ŌĆö SHA-256 hashing\n- `subtle` ŌĆö Constant-time comparisons (credential verification)\n- `totp-rs` ŌĆö Time-based one-time password generation\n- `zeroize` ŌĆö Secure memory clearing for sensitive data\n- `hex`, `rand` ŌĆö Hex encoding and cryptographic randomness\n\n**Scheduling & time**\n- `cron` ŌĆö Cron-expression based task scheduling\n- `chrono`, `chrono-tz` ŌĆö Timezone-aware timestamp handling\n\n**Networking**\n- `reqwest` ŌĆö HTTP client for outbound API calls\n- `regex`, `regex-lite` ŌĆö Pattern matching for routing and input validation\n\n**Platform-specific**\n- `libc` (Unix only) ŌĆö Low-level system calls on Unix platforms\n\n## Binary: `purge_sentinels`\n\nA dedicated CLI tool (`bin/purge_sentinels.rs`) for cleaning up sentinel artifacts ŌĆö likely lock files, marker files, or temporary state left by the kernel during operation. Run independently of the main agent process for maintenance.\n\n## Testing\n\nThe crate uses several testing utilities:\n- `tokio-test` ŌĆö Async test helpers\n- `tempfile` ŌĆö Temporary directory/file fixtures\n- `serial_test` ŌĆö Serialized test execution (for tests sharing stateful resources like SQLite)\n- `librefang-testing` ŌĆö Project-specific test harnesses and fixtures\n- `librefang-kernel-handle` ŌĆö Provides kernel handles for integration testing without a full agent bootstrap\n\nTests that touch SQLite or the filesystem should be annotated with `#[serial_test::serial]` to avoid concurrency issues.\n\n## Relationship to the Rest of the Codebase\n\n`librefang-kernel` is a **consumer** crate ŌĆö it depends on every other `librefang-*` module but nothing depends on it in return. It acts as the composition root where all subsystems are instantiated, configured, and connected. To add a new subsystem:\n\n1. Implement the logic in its own `librefang-*` crate.\n2. Add the crate as a dependency in this crate's `Cargo.toml`.\n3. Wire it into the kernel's initialization and runtime loop.","other-librefang-llm-driver":"# Other ŌĆö librefang-llm-driver\n\n# librefang-llm-driver\n\nLLM driver trait and shared types for LibreFang.\n\n## Purpose\n\nThis crate defines the abstraction layer through which the rest of the LibreFang codebase interacts with large language models. Rather than coupling the application directly to any specific LLM provider, `librefang-llm-driver` exposes a provider-agnostic trait (or set of traits) along with the shared types that callers and implementors rely on ŌĆö request/response structures, configuration types, and error definitions.\n\nConcrete implementations (e.g., an OpenAI driver, a local-model driver) depend on this crate and fill in the trait with provider-specific HTTP calls, token handling, and so on. Downstream crates that *consume* LLM capabilities depend only on this abstraction, making it straightforward to swap or mock providers.\n\n## Dependencies\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared domain types (game concepts, prompts, etc.) that the LLM driver may reference |\n| `async-trait` | Enables async methods in trait definitions |\n| `serde` / `serde_json` | Serialization of requests to and deserialization of responses from LLM providers |\n| `thiserror` | Derive `Error` for the driver-specific error enum |\n| `tokio` | Async runtime primitives used by the trait's async methods |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[librefang-llm-driver]\n    B --> C[Provider Implementation A]\n    B --> D[Provider Implementation B]\n    C --> E[Application / Game Server]\n    D --> E\n```\n\nThe crate sits between the domain types (`librefang-types`) and one or more concrete provider crates. The application holds a trait object and dispatches calls without knowing which provider backs it.\n\n## What This Crate Provides\n\n### Driver trait\n\nAn async trait that represents the capability to prompt an LLM and receive a structured or unstructured response. Callers use this trait as the boundary; implementors satisfy it with provider-specific logic.\n\n### Request and response types\n\nShared data structures that normalize how prompts are composed and how completions are represented, independent of any single provider's wire format.\n\n### Error type\n\nA consolidated error enum (derived via `thiserror`) that captures the failure modes common across LLM providers ŌĆö network errors, rate-limit responses, deserialization failures, and similar. Provider crates wrap their specific errors into these variants so that consumers handle a single, uniform error type.\n\n## How It Connects to the Codebase\n\n- **Upstream**: `librefang-types` supplies the domain vocabulary. The driver trait may accept or return types defined there (for example, structured game-state objects the LLM should reason about).\n- **Downstream**: Concrete provider crates implement the trait and are selected at application startup (via feature flags, configuration, or runtime plugin selection). The game server or other consumers accept a `dyn LlmDriver` (or similar) and remain decoupled from the backing service.\n\n## Adding a New Provider\n\n1. Create a new crate (or module) that depends on `librefang-llm-driver`.\n2. Implement the driver trait, translating the generic request types into the provider's HTTP API format.\n3. Map provider-specific errors into the crate's error enum.\n4. Register the provider in the application's startup/configuration logic.\n\nBecause the trait and shared types live here, no changes to downstream consumers are required when a new provider is added.","other-librefang-llm-drivers-tests":"# Other ŌĆö librefang-llm-drivers-tests\n\n# librefang-llm-drivers-tests\n\nIntegration test suite for the LLM driver layer. Validates retry logic, error classification, adaptive request rewriting, and cross-process rate-limit coordination for the OpenAI, Anthropic, and Gemini drivers.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Files\"\n        A[anthropic_retry.rs]\n        G[gemini_retry.rs]\n        OC[openai_retry_complete.rs]\n        OS[openai_retry_stream.rs]\n        SG[shared_rate_guard_integration.rs]\n    end\n\n    subgraph \"common/mod.rs\"\n        TE[TestEnv / isolated_env]\n        RB[Request Builders]\n        MB[Mock Response Builders]\n        CS[collect_stream]\n        LF[lockout_file_exists / create_lockout_file]\n    end\n\n    A --> TE\n    A --> MB\n    A --> CS\n    A --> LF\n    G --> TE\n    G --> MB\n    G --> CS\n    OC --> TE\n    OC --> RB\n    OC --> MB\n    OC --> LF\n    OS --> TE\n    OS --> RB\n    OS --> MB\n    OS --> CS\n    SG --> TE\n    SG --> RB\n\n    TE -->|LIBREFANG_HOME + zero backoff| B[backoff::enable_test_zero_backoff]\n    LF -->|reads lockout files| SRG[shared_rate_guard::key_id_hash]\n```\n\n## Shared Infrastructure (`common/mod.rs`)\n\n### Environment Isolation\n\nEvery test calls `isolated_env()` to create a `TestEnv` that:\n\n1. Creates a `tempfile::TempDir` and sets `LIBREFANG_HOME` to point at it. This prevents tests from reading or writing real rate-limit state in `~/.librefang/rate_limits/`.\n2. Sets `NO_PROXY` / `no_proxy` to `127.0.0.1,localhost` so the HTTP client talks directly to the wiremock server, bypassing any system proxy.\n3. Calls `backoff::enable_test_zero_backoff()` to obtain a `ZeroBackoffGuard`. While this guard lives, all exponential-backoff sleeps collapse to zero, keeping test execution fast.\n\n`TestEnv` holds both the temp dir and the guard. Dropping `_env` at test end restores normal behaviour.\n\n### Request Constructors\n\n| Function | Purpose |\n|---|---|\n| `simple_request(model)` | Minimal `CompletionRequest`: one user message, no tools, `max_tokens=16`, `temperature=0.0`. |\n| `request_with_tools(model)` | Adds a single `get_weather` tool definition. Used to test tool-stripping retries. |\n| `request_with_temperature(model, temp)` | Sets a non-zero temperature. Used to test temperature-stripping retries. |\n| `o_series_request()` | Targets `o3-mini` with `temperature=1.0` and higher token limits. |\n\nAll return `CompletionRequest` from `librefang_llm_driver`.\n\n### Mock Response Builders\n\nPer-provider helpers construct `ResponseTemplate` or `serde_json::Value` bodies matching real API shapes:\n\n- **OpenAI**: `openai_200_body`, `openai_429_response`, `openai_400_temperature_rejected`, `openai_400_max_tokens_unsupported`, `openai_400_max_tokens_cap`, `openai_400_tool_not_supported`, `openai_500_tool_error`, `openai_400_tool_use_failed`, `openai_sse_body`\n- **Anthropic**: `anthropic_200_body`, `anthropic_429_response`, `anthropic_529_response`, `anthropic_sse_body`\n- **Gemini**: `gemini_200_body`, `gemini_429_response`, `gemini_503_response`, `gemini_sse_body`\n\nSSE builders emit properly formatted `data:` lines; Anthropic's includes the full event stream (`message_start` ŌåÆ `content_block_start` ŌåÆ deltas ŌåÆ `content_block_stop` ŌåÆ `message_delta` ŌåÆ `message_stop`).\n\n### Lockout File Utilities\n\n- **`lockout_file_exists(provider, api_key)`** ŌĆö hashes the key via `shared_rate_guard::key_id_hash`, then checks whether `{LIBREFANG_HOME}/rate_limits/{provider}__{hash}.json` exists on disk.\n- **`create_lockout_file(provider, api_key, until)`** ŌĆö writes a lockout record with the given expiry. Used to simulate a pre-existing lockout.\n\n### Stream Collection\n\n`collect_stream(driver, request)` spawns a `tokio::mpsc` channel, calls `driver.stream(request, tx)`, drains all `StreamEvent` values into a `Vec`, and returns `(result, events)`. This lets tests assert both the final `Result` and the individual stream events.\n\n### Driver Factories\n\n`mock_openai_driver`, `mock_anthropic_driver`, and `mock_gemini_driver` each construct a driver instance with a random API key and the wiremock server URL as proxy, plus a 5-second timeout.\n\n### Miscellaneous\n\n- `request_json(request)` ŌĆö parses a wiremock `Request` body as JSON for assertion.\n- `provider_for_openai_mock()` ŌĆö returns `\"openai-compat\"`, the provider string OpenAI-family drivers write into lockout files.\n- `rate_limit_dir_path()` ŌĆö resolves the rate-limit directory from `LIBREFANG_HOME` (falling back to `~/.librefang`).\n\n---\n\n## Test Files\n\n### `anthropic_retry.rs`\n\nTests `AnthropicDriver` retry behaviour. Uses a local `driver_with_key` helper that creates a driver with a unique `sk-ant-test-{uuid}` key and a 5-second timeout.\n\nHelper functions `anthropic_429_fast_retry()` and `anthropic_529_overloaded()` produce mock responses with short `retry-after` values (1 second) so zero-backoff mode keeps tests instant.\n\n| Test | Scenario | Assertions |\n|---|---|---|\n| `aa1_429_retry_then_success` | Two 429s then 200 | 3 total requests; lockout file created |\n| `aa2_429_exhaustion` | Four consecutive 429s | `RateLimited` error; lockout file exists |\n| `aa3_529_retry_then_success_no_lockout` | One 529 then 200 | 2 requests; **no** lockout file (529 = overloaded, not account-level rate limit) |\n| `aa4_529_exhaustion_overloaded` | Four consecutive 529s | `Overloaded` error; no lockout file |\n| `aa5_stream_429_retry` | Two 429s then SSE stream on `stream()` | Stream completes with non-empty events; 3 requests |\n\nKey distinction: Anthropic 429 triggers a lockout file (account-level rate limit), while 529 (overloaded) does not.\n\n### `gemini_retry.rs`\n\nTests `GeminiDriver`. Uses a custom `SequencedResponder` that returns responses in order from a `Vec<ResponseTemplate>`, with an `AtomicUsize` counter tracking how many times the mock was hit. This is needed because Gemini's endpoint path includes the model name in the URL, making priority-based mocking less ergonomic.\n\n| Test | Scenario | Assertions |\n|---|---|---|\n| `ag1_429_retry_then_success` | Two 429s then 200 | 3 hits; lockout file created |\n| `ag2_429_exhaustion` | Four consecutive 429s | `RateLimited` error; 4 hits |\n| `ag3_503_retry_then_success_no_lockout` | One 503 then 200 | 2 hits; **no** lockout file |\n| `ag4_auth_failure_403` | Single 403 | `AuthenticationFailed` error; exactly 1 hit (no retry) |\n| `ag5_stream_429_retry` | Two 429s then SSE stream | Stream succeeds; 3 hits |\n\n### `openai_retry_complete.rs`\n\nTests `OpenAIDriver.complete()` (non-streaming). This is the most extensive file, covering adaptive request rewriting ŌĆö the driver detects specific error patterns and mutates the request before retrying.\n\nCustom matchers `BodyContains` and `BodyNotContains` implement wiremock `Match` by inspecting the UTF-8 request body, enabling assertions like \"second request must not contain `max_tokens`\".\n\n| Test | Scenario | Adaptive Behaviour |\n|---|---|---|\n| `oc1_429_retry_then_success` | Two 429s then 200 | Standard retry; lockout file created |\n| `oc2_429_exhaustion` | All 429s | `RateLimited` after 4 attempts (initial + 3 retries) |\n| `oc3_preexisting_lockout_blocks_request` | Lockout file pre-created | Zero HTTP requests ŌĆö short-circuited by file check |\n| `oc4_max_tokens_to_max_completion_tokens` | 400: `max_tokens` unsupported | Retries with `max_completion_tokens` instead of `max_tokens` |\n| `oc5_temperature_strip` | 400: `temperature` unsupported | First request has `temperature`; retry omits it |\n| `oc6_toolless_retry_on_500` | 500 with tools in request | First request has `tools` + `tool_choice`; retry omits both |\n| `oc7_max_tokens_auto_cap` | 400: `max_tokens` exceeds limit | Retries with capped value (extracted from error message) |\n| `oc8_non_retryable_403` | 403 permission denied | No retry; single request; `Api { status: 403 }` |\n| `oc9_groq_tool_use_failed_retries` | 400: `tool_use_failed` | Retries up to 3 times (2 failures + success) |\n| `oc10_max_retries_exceeded_generic_500` | Generic 500 without tools | No retry (generic 500 only retries if tools are present) |\n\n### `openai_retry_stream.rs`\n\nTests `OpenAIDriver.stream()` with the same categories of adaptive rewriting, applied to streaming requests.\n\n| Test | Scenario | Adaptive Behaviour |\n|---|---|---|\n| `os1_429_retry_then_success_stream` | Two 429s then SSE stream | Stream produces `TextDelta` events; 3 requests |\n| `os2_stream_options_strip` | 400: `stream_options` unsupported | First request includes `stream_options`; retry omits it |\n| `os3_429_exhaustion_stream` | All 429s | `RateLimited`; empty events; 4 requests |\n| `os4_temperature_strip_stream` | 400: `temperature` unsupported | First has `temperature`; retry omits it |\n\n### `shared_rate_guard_integration.rs`\n\nEnd-to-end test of the cross-process rate-limit guard. Instead of wiremock, it spawns a raw TCP listener (`TcpListener`) that unconditionally responds with HTTP 429 and an `x-ratelimit-reset-requests-1h: 3540` header. An `AtomicUsize` counter tracks accepted connections.\n\nThe test flow:\n\n1. Create an isolated `LIBREFANG_HOME` temp directory.\n2. Instantiate `OpenAIDriver` (driver A), call `complete()` ŌåÆ server is hit, lockout file is written.\n3. Instantiate a **separate** `OpenAIDriver` (driver B) with the same API key ŌåÆ simulates a different process with no shared in-memory state.\n4. Call `complete()` on driver B ŌåÆ assert the TCP hit counter did **not** advance (request was short-circuited by the lockout file).\n5. Verify the lockout file on disk: valid JSON, provider `\"openai-compat\"`, `until_unix` approximately 1 hour in the future.\n\nThis validates the core acceptance criteria: a rate-limit event in one process prevents network requests from sibling processes.\n\n## Conventions\n\n- **Serial execution**: Every test is annotated `#[serial_test::serial]`. Tests share environment variables (`LIBREFANG_HOME`, `NO_PROXY`) that are process-global in Rust's `std::env`, so concurrent execution would cause cross-test contamination.\n- **Deterministic naming**: API keys include UUIDs or process IDs to avoid collisions even if `isolated_env()` weren't used.\n- **Priority-based mocking**: In wiremock, `up_to_n_times(N)` with a lower priority number fires first. Higher-priority mocks act as catch-alls. This lets tests express \"fail N times, then succeed.\"\n- **Zero backoff**: `backoff::enable_test_zero_backoff()` must be called in every test to avoid real sleeps during retry loops. The returned `ZeroBackoffGuard` restores original behaviour on drop.","other-librefang-llm-drivers":"# Other ŌĆö librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait. Each driver encapsulates the HTTP communication, authentication, request formatting, and response parsing required to interact with a specific LLM provider's API.\n\n## Purpose\n\nThis crate serves as the bridge between Librefang's generic LLM abstraction layer (`librefang-llm-driver`) and the actual provider APIs. It ships ready-to-use driver implementations for providers such as **Anthropic**, **OpenAI**, and **Google Gemini**, handling the idiosyncrasies of each provider's wire format, authentication scheme, and error semantics.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver] -->|\"defines trait\"| B[librefang-llm-drivers]\n    B -->|uses| C[librefang-types]\n    B -->|uses| D[librefang-http]\n    B -->|uses| E[librefang-runtime-oauth]\n    B -->|\"HTTP calls\"| F[Provider APIs]\n    \n    subgraph Drivers\n        G[Anthropic Driver]\n        H[OpenAI Driver]\n        I[Gemini Driver]\n    end\n    \n    B --- G\n    B --- H\n    B --- I\n```\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-llm-driver` | Defines the trait (`LlmDriver` or similar) that each concrete driver implements |\n| `librefang-types` | Shared domain types ŌĆö request/response models, error types, configuration structs |\n| `librefang-http` | Shared HTTP client utilities, middleware, or request building helpers |\n| `librefang-runtime-oauth` | OAuth token acquisition and refresh, used by providers that require OAuth (e.g., Gemini via Google credentials) |\n| `reqwest` | Underlying HTTP client for making API calls to provider endpoints |\n| `async-trait` | Enables async methods in the driver trait implementation |\n| `dashmap` | Concurrent hashmap used for thread-safe caching (e.g., token caches, response memoization) |\n| `sha2` / `zeroize` | Secure hashing and memory zeroing for credential handling |\n| `base64` | Encoding for API keys and payload construction |\n\n## How Drivers Work\n\nEach driver follows the same general pattern:\n\n1. **Configuration** ŌĆö Accept provider-specific configuration (API key, base URL, model name, etc.) at construction time.\n2. **Authentication** ŌĆö Attach credentials to outgoing requests. For OpenAI and Anthropic, this is typically an `Authorization` header with an API key. For Gemini, OAuth tokens are obtained and refreshed via `librefang-runtime-oauth`.\n3. **Request Formatting** ŌĆö Translate the generic `librefang-types` request model into the provider's expected JSON payload format, including any provider-specific parameters.\n4. **HTTP Dispatch** ŌĆö Send the request using `reqwest` (often through `librefang-http` helpers for retries, timeouts, and middleware).\n5. **Response Parsing** ŌĆö Deserialize the provider's JSON response into `librefang-types` response models, normalizing away provider-specific field names and structures.\n6. **Error Handling** ŌĆö Map provider-specific error responses (rate limits, auth failures, server errors) into the shared error types from `librefang-types`.\n\n## Adding a New Provider Driver\n\nTo add support for a new LLM provider:\n\n1. Create a new module file (e.g., `src/newprovider.rs`).\n2. Define a struct holding the provider's configuration and any runtime state (token caches, HTTP client handle).\n3. Implement the driver trait from `librefang-llm-driver` for your struct.\n4. Handle authentication ŌĆö use a static API key header, or integrate with `librefang-runtime-oauth` if the provider uses OAuth.\n5. Implement request serialization and response deserialization, mapping to/from `librefang-types`.\n6. Register the driver in any factory or registry module so it can be instantiated by name.\n\n### Example Skeleton\n\n```rust\nuse async_trait::async_trait;\nuse librefang_llm_driver::LlmDriver; // adjust to actual trait name\nuse librefang_types::{LlmRequest, LlmResponse, LlmError};\n\npub struct NewProviderDriver {\n    api_key: String,\n    client: reqwest::Client,\n}\n\n#[async_trait]\nimpl LlmDriver for NewProviderDriver {\n    async fn complete(&self, request: LlmRequest) -> Result<LlmResponse, LlmError> {\n        // 1. Build provider-specific HTTP request\n        // 2. Send via self.client\n        // 3. Parse response into LlmResponse\n        todo!()\n    }\n}\n```\n\n## Security Considerations\n\n- **Credential zeroing**: The `zeroize` dependency ensures sensitive data (API keys, tokens) can be securely erased from memory when dropped.\n- **OAuth token caching**: Tokens obtained via `librefang-runtime-oauth` are stored in a `DashMap` for concurrent access, and should be refreshed proactively before expiry.\n- **No credential logging**: The `tracing` integration should be configured to never log full API keys or tokens. Drivers should redact sensitive headers in trace output.\n\n## Testing\n\nThe `dev-dependencies` indicate the testing strategy:\n\n- **`wiremock`** ŌĆö Mock HTTP servers for integration testing against simulated provider APIs. Each driver should have wiremock-based tests that verify request formatting, response parsing, and error handling without hitting real endpoints.\n- **`serial_test`** ŌĆö Serializes tests that share state (e.g., credential files, environment variables), preventing race conditions in concurrent test runs.\n- **`tempfile`** ŌĆö Creates temporary directories and files for tests that involve credential storage or file-based configuration.\n\nTests are typically organized per driver, with a shared wiremock setup that stubs the provider's API endpoints.","other-librefang-memory-src":"# Other ŌĆö librefang-memory-src\n\n# RosterStore ŌĆö SQLite-Backed Group Roster\n\n## Overview\n\n`RosterStore` persists group chat membership across daemon restarts. Instead of embedding the full roster into the agent's system prompt (wasting tokens), agents query this store on demand through the `group_members` tool.\n\nThe store lives in `librefang-memory/src/roster_store.rs` and wraps a shared SQLite connection behind a `Mutex`.\n\n## Schema\n\nThe table `group_roster` is created by `migration::migrate_v28` during `MemorySubstrate::open`. `RosterStore::new` intentionally does **not** run DDL ŌĆö all schema changes go through the single migration ladder so that failures surface at boot rather than at construction time.\n\n| Column | Type | Role |\n|---|---|---|\n| `channel_type` | TEXT | Platform identifier (e.g. `\"telegram\"`) |\n| `chat_id` | TEXT | Group/chat identifier |\n| `user_id` | TEXT | User identifier within that chat |\n| `display_name` | TEXT | Current display name |\n| `username` | TEXT | Optional platform username |\n| `first_seen` | INTEGER | Unix timestamp of first insert |\n| `last_seen` | INTEGER | Unix timestamp, updated on every upsert |\n\nThe unique constraint is `(channel_type, chat_id, user_id)`.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[MemorySubstrate::open] -->|runs migrations| M[migration::migrate_v28]\n    A -->|constructs| R[RosterStore]\n    R -->|wraps| DB[(Arc Mutex Connection)]\n    T[group_members tool] -->|queries| R\n```\n\n`MemorySubstrate::open` runs all migrations (including `migrate_v28` which creates the `group_roster` table) and then passes the `Arc<Mutex<Connection>>` into `RosterStore::new`.\n\n## API\n\n### `new(conn: Arc<Mutex<Connection>>) -> Self`\n\nWraps an existing connection. No schema creation, no panics on locked/read-only databases.\n\n### `upsert(channel, chat_id, user_id, display_name, username)`\n\nInserts a new member or updates an existing one. On conflict:\n- `display_name` is **always** overwritten with the new value.\n- `username` is overwritten **only if** a non-`None` value is provided (`COALESCE` preserves the old username).\n- `last_seen` is refreshed to the current unix timestamp.\n- `first_seen` is set only on insert and never modified.\n\n**Silently returns** if `chat_id` or `user_id` is empty ŌĆö this guards against malformed events without logging or panicking.\n\n### `members(channel, chat_id) -> Vec<(user_id, display_name, Option<username>)>`\n\nReturns all members of a specific group chat, sorted alphabetically by `display_name`. Returns an empty `Vec` for unknown chats.\n\n### `remove_member(channel, chat_id, user_id)`\n\nDeletes a single member record. Used when the platform reports a user leaving a group.\n\n### `member_count(channel, chat_id) -> usize`\n\nReturns the number of tracked members. Returns `0` on query failure or for unknown chats.\n\n## Key Design Decisions\n\n1. **No DDL in the constructor.** Schema ownership lives entirely in `migration.rs`. This keeps `RosterStore::new` infallible and prevents lock/read-only errors from appearing mid-run.\n\n2. **Mutex, not async.** SQLite doesn't support concurrent writes. The `Mutex<Connection>` serializes access simply and correctly. Callers holding the lock do minimal work (single SQL statements).\n\n3. **Silent failure on empty IDs.** `upsert` returns early when `chat_id` or `user_id` is empty rather than inserting garbage rows or panicking. This makes the store resilient to incomplete platform events.\n\n4. **Username preservation.** The `ON CONFLICT` clause uses `COALESCE(excluded.username, group_roster.username)` so that an upsert without a username (e.g., the platform didn't provide one) doesn't erase a previously known username.\n\n## Testing\n\nTests in the `#[cfg(test)]` module use `Connection::open_in_memory()` and call `migration::run_migrations` to set up the full schema, then construct a `RosterStore` via `new`. Key scenarios covered:\n\n- **`upsert_and_list`** ŌĆö basic insert and alphabetical retrieval.\n- **`idempotent_upsert_updates_display_name`** ŌĆö repeated upserts update the display name without duplicating rows.\n- **`remove_member`** ŌĆö deletion works and remaining members are unaffected.\n- **`empty_chat_returns_nothing`** ŌĆö unknown chat IDs yield empty results.\n- **`different_chats_are_isolated`** ŌĆö members in one chat don't leak into another.\n- **`empty_ids_are_ignored`** ŌĆö empty `chat_id` or `user_id` values are silently dropped.\n\nTo add a new test, use the `in_memory_store()` helper which handles connection creation, migration, and store construction.","other-librefang-memory-tests":"# Other ŌĆö librefang-memory-tests\n\n# librefang-memory-tests: Canonical Chat-Scoped Integration Tests\n\n## Purpose\n\nThis module contains **integration regression tests** for the `librefang-memory` crate. Specifically, it guards against a cross-session data leak bug where canonical memory entries from one chat session could bleed into another when both sessions belonged to the same agent.\n\nThe underlying fix lives in `librefang-memory::session`, where each `CanonicalEntry` is tagged with its originating `SessionId` and filtered at read time. These tests exercise the full append ŌåÆ load ŌåÆ context roundtrip through the crate's public API ŌĆö the same path the kernel calls on every inbound message.\n\n## The Bug Being Guarded Against\n\nBefore the fix, WhatsApp DMs and group chats sharing the same `AgentId` would have their canonical memory merged into a single pool. When the kernel assembled the LLM prompt, a private DM could receive group messages in its context window, and vice versa. This was a **privacy leak**: unrelated participants' messages could be exposed across conversation boundaries.\n\nThe fix introduced per-`SessionId` tagging on `CanonicalEntry` records and session-scoped filtering in `canonical_context`.\n\n## Test Infrastructure\n\n### `setup()`\n\nCreates a fresh, isolated `SessionStore` backed by an in-memory SQLite database:\n\n1. Opens an in-memory `Connection` via `rusqlite`.\n2. Runs database migrations via `run_migrations`.\n3. Wraps the connection in `Arc<Mutex<Connection>>` and constructs a `SessionStore`.\n\nEach test gets its own isolated database, so tests are independent and order-insensitive.\n\n### `user_msg(text)`\n\nHelper that constructs a `Message` with `Role::User` and `MessageContent::Text`. The `pinned` flag is `false` and `timestamp` is `None`. Used throughout both tests to build canonical entries.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\nThe primary regression test. It simulates a realistic scenario where a single agent serves both a WhatsApp DM and a WhatsApp group chat containing the same contact.\n\n**Setup:**\n\n- One `AgentId` shared across both chats.\n- Two sessions derived via `SessionId::for_channel`:\n  - `session_dm` ŌĆö `whatsapp:393331111111@s.whatsapp.net` (DM)\n  - `session_group` ŌĆö `whatsapp:120363111111111111@g.us` (group)\n\nThe test first asserts that these two channel identifiers produce **distinct** `SessionId` values, confirming the channel-derivation function works correctly.\n\n**Sequence of operations:**\n\n1. Append `user_msg(\"dm-1\")` under `session_dm`.\n2. Append `user_msg(\"group-1\")` under `session_group`.\n3. Append `user_msg(\"dm-2\")` under `session_dm`.\n\n**Assertions:**\n\n- Querying `canonical_context` with `session_dm` returns only `[\"dm-1\", \"dm-2\"]` ŌĆö the interleaved `\"group-1\"` must not appear.\n- Querying `canonical_context` with `session_group` returns only `[\"group-1\"]` ŌĆö neither `\"dm-1\"` nor `\"dm-2\"` must appear.\n\nThis confirms that writes are correctly tagged and reads are correctly filtered by session scope.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\nEnsures backward compatibility for callers that have not adopted per-session filtering.\n\n**Setup:**\n\n- One `AgentId` with two sessions across different platforms (`whatsapp` and `telegram`).\n\n**Operations:**\n\n1. Append `\"a-1\"` under session A (WhatsApp).\n2. Append `\"b-1\"` under session B (Telegram).\n3. Call `canonical_context` with `session_id = None`.\n\n**Assertion:**\n\n- Both `\"a-1\"` and `\"b-1\"` are returned, preserving the original cross-channel canonical-memory semantics. This ensures that existing consumers of the API that don't pass a session filter continue to work unchanged.\n\n## API Surface Exercised\n\n| Method | Called On | Purpose in Tests |\n|---|---|---|\n| `SessionId::for_channel(agent, channel)` | `SessionId` | Derives a session-specific ID from an agent and a channel string |\n| `append_canonical(agent, messages, None, Some(session))` | `SessionStore` | Writes canonical entries tagged with the given session |\n| `canonical_context(agent, Some(session), None)` | `SessionStore` | Reads canonical entries filtered by session |\n| `canonical_context(agent, None, None)` | `SessionStore` | Reads all canonical entries unfiltered (backward compat) |\n| `run_migrations(&conn)` | `migration` module | Initializes the SQLite schema |\n\n## Execution Flow\n\n```mermaid\nflowchart TD\n    A[setup] -->|in-memory SQLite| B[run_migrations]\n    B --> C[SessionStore::new]\n    C --> D[Test body]\n    D --> E[append_canonical x N]\n    E --> F[canonical_context with session filter]\n    F --> G[Assert filtered results]\n    D --> H[canonical_context without filter]\n    H --> I[Assert unfiltered results]\n```\n\n## Relationship to the Wider Codebase\n\n- **`librefang-memory::session`** ŌĆö Contains the production `SessionStore` implementation, the `append_canonical` and `canonical_context` methods, and the `CanonicalEntry` tagging/filtering logic that these tests guard.\n- **`librefang-memory::migration`** ŌĆö Provides `run_migrations`, called during setup to ensure the test schema matches production.\n- **`librefang-types::agent`** ŌĆö Defines `AgentId` and `SessionId`, including the `for_channel` derivation function.\n- **`librefang-types::message`** ŌĆö Defines `Message`, `Role`, and `MessageContent` used to construct test payloads.\n\nThe kernel invokes these same APIs on every inbound message to store and retrieve conversation context. These tests ensure that the privacy boundary between chat sessions is maintained end-to-end through the public API, without relying on internal implementation details.","other-librefang-memory":"# Other ŌĆö librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS. This crate provides persistent storage, retrieval, and management of agent memory ŌĆö including conversation history, task context, and long-term knowledge ŌĆö backed by SQLite.\n\n## Purpose\n\nAgents in LibreFang need to persist and recall information across sessions and tasks. `librefang-memory` provides the storage layer that makes this possible. It handles:\n\n- **Short-term memory**: Recent conversation turns and active task context\n- **Long-term memory**: Durable knowledge that persists across agent restarts\n- **Content-addressed storage**: Memories are hashed for integrity and deduplication\n- **Structured and serialized storage**: Memories are serialized (JSON and MessagePack) for flexible retrieval\n\nThe crate is intentionally database-agnostic at the API level, though the reference implementation uses SQLite via `rusqlite`.\n\n## Dependencies and Why They Matter\n\n| Dependency | Role in This Crate |\n|---|---|\n| `rusqlite` | Primary embedded database for persistent memory storage |\n| `serde` / `serde_json` | Serialization of memory entries and metadata |\n| `rmp-serde` | MessagePack encoding for compact binary storage of memory payloads |\n| `sha2` | Content hashing for deduplication and integrity verification of stored memories |\n| `tokio` | Async runtime ŌĆö memory operations that may involve I/O are async |\n| `async-trait` | Defines async trait interfaces for memory backends |\n| `uuid` | Unique identifiers for individual memory entries |\n| `chrono` | Timestamps for memory creation, access, and expiration |\n| `librefang-types` | Shared domain types (agent IDs, session identifiers, memory-related types) |\n| `tracing` | Structured logging of memory operations for observability |\n| `reqwest` | HTTP client ŌĆö used when memory operations involve remote memory services or syncing |\n| `thiserror` | Ergonomic error type definitions |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Runtime] -->|store / recall| B[Memory Substrate]\n    B --> C[SQLite Backend]\n    B --> D[Serialization Layer]\n    D --> E[JSON serde_json_]\n    D --> F[MessagePack rmp-serde_]\n    B --> G[Content Addressing]\n    G --> H[SHA-256 sha2_]\n    C --> I[Local DB File]\n    B -->|optional sync| J[Remote Service reqwest_]\n```\n\nThe memory substrate sits between the agent runtime and the underlying storage. All memory operations flow through a common interface, allowing the runtime to store and retrieve context without coupling to a specific backend.\n\n## Key Concepts\n\n### Memory Entries\n\nEach memory entry is a discrete unit of information the agent has persisted. An entry typically contains:\n\n- A **UUID** identifying the memory\n- A **timestamp** (via `chrono`) recording when it was created\n- A **payload** ŌĆö the actual content, serialized as JSON or MessagePack\n- An optional **content hash** (SHA-256) for deduplication and integrity\n\n### Content Addressing\n\nUsing `sha2`, the crate hashes memory payloads. This enables:\n\n- **Deduplication**: Identical memories aren't stored twice\n- **Integrity checks**: Corrupted entries can be detected on retrieval\n- **Content-based lookup**: Retrieve memories by their content hash rather than by ID\n\n### Serialization Formats\n\nTwo formats are supported for memory payloads:\n\n- **JSON** (`serde_json`): Human-readable, useful for debugging and interoperability\n- **MessagePack** (`rmp-serde`): Compact binary format, used when storage efficiency matters\n\nThe choice of format may be configurable per memory entry or per backend.\n\n### Async Interface\n\nMemory operations are defined using `async-trait`, making them compatible with the Tokio runtime used throughout LibreFang. This ensures that database I/O never blocks the agent's primary event loop.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover scenarios such as:\n\n- Database connection or query failures\n- Serialization and deserialization errors\n- Content hash mismatches (integrity violations)\n- Remote sync failures (when applicable)\n\nConsumers of this crate should expect `Result<T, MemoryError>` (or equivalent) return types and handle errors appropriately ŌĆö particularly in agent logic where a failed memory recall should degrade gracefully rather than crash the agent.\n\n## Testing\n\nThe `tempfile` dev-dependency is used to create temporary directories for SQLite databases during tests. This keeps tests isolated and repeatable ŌĆö each test gets a fresh, ephemeral database that is cleaned up automatically.\n\n## Relationship to Other Crates\n\n- **`librefang-types`**: This crate depends on shared types from `librefang-types`. Any `MemoryId`, `AgentId`, `SessionId`, or memory-related structs are defined there, not here. This crate implements storage and retrieval logic using those types.\n- **Agent crates**: Agent runtime crates consume this library's public API to persist and recall context. This crate does not depend on agent-specific logic ŌĆö it is a general-purpose memory layer.\n\n## When to Use This Crate\n\nUse `librefang-memory` directly when:\n\n- You are building or extending an agent runtime that needs persistent memory\n- You need to implement custom memory retrieval strategies (e.g., recency-weighted, relevance-ranked)\n- You are testing agent behavior that depends on memory state\n\nDo **not** use this crate when:\n\n- You only need to define memory-related types ŌĆö use `librefang-types` instead\n- You need ephemeral, in-memory-only storage with no persistence guarantees","other-librefang-migrate":"# Other ŌĆö librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations and data from other agent frameworks into LibreFang.\n\n## Purpose\n\n`librefang-migrate` provides tooling to bring existing agent framework installationsŌĆötheir configurations, agent definitions, conversation histories, and related artifactsŌĆöinto the LibreFang ecosystem. It handles format detection, parsing, transformation, and output of LibreFang-compatible structures.\n\n## Design\n\nThe crate is structured around a multi-format parsing pipeline. Its dependency footprint reveals its approach:\n\n| Dependency | Role |\n|---|---|\n| `serde`, `serde_json`, `serde_yaml`, `json5`, `toml` | Deserialize source configurations in their native formats |\n| `walkdir` | Recursively discover files in a source framework's directory tree |\n| `librefang-types` | Target types for the converted output |\n| `thiserror` | Typed error handling for migration failures |\n| `tracing` | Structured logging of migration progress and warnings |\n| `chrono` | Timestamp normalization during import |\n| `dirs` | Locate standard platform directories (e.g., auto-discovering existing framework data) |\n\n### Migration Pipeline\n\n```mermaid\nflowchart LR\n    A[Source Directory] --> B[Discovery walkdir]\n    B --> C[Format Detection]\n    C --> D[Parse serde / json5 / toml / yaml]\n    D --> E[Transform to librefang-types]\n    E --> F[Write Output]\n```\n\nThe process follows four stages:\n\n1. **Discovery** ŌĆö Walk a directory tree using `walkdir` to locate candidate files for migration.\n2. **Detection** ŌĆö Identify the source framework and file format (JSON, YAML, TOML, JSON5) based on file extensions and content structure.\n3. **Parsing & Transformation** ŌĆö Deserialize the source data and map it onto `librefang-types` structures.\n4. **Output** ŌĆö Emit the converted data in LibreFang's native representation.\n\n## Relationship to Other Crates\n\nThis crate sits at the edge of the workspace. It depends on `librefang-types` for its output structures but is not depended upon by any other workspace crate. It is intended to be used as a standalone binary or invoked as a one-time import step, not as a runtime dependency of the core agent system.\n\n## Error Handling\n\nErrors are defined using `thiserror` and cover common migration failure modes: unsupported source formats, malformed configuration files, missing required fields during transformation, and filesystem I/O errors during discovery or output.\n\n## Testing\n\nThe `tempfile` dev-dependency is used to construct ephemeral directory trees in tests, simulating source framework layouts without touching the real filesystem.","other-librefang-runtime-mcp":"# Other ŌĆö librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This crate provides integration with MCP-compatible services, enabling the runtime to communicate with model context servers for AI-assisted operations.\n\n## Purpose\n\nThis module acts as the bridge between the LibreFang runtime and external MCP services. It handles connection management, request serialization, and response parsing for Model Context Protocol interactions.\n\n## Dependencies & Their Roles\n\n### Internal Crates\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the project |\n| `librefang-http` | HTTP client infrastructure for making requests to MCP endpoints |\n\n### External Crates\n\n| Crate | Role |\n|---|---|\n| `rmcp` | Rust MCP client library ŌĆö core protocol implementation |\n| `reqwest` | Underlying HTTP client used for transport |\n| `tokio` | Async runtime for non-blocking I/O |\n| `serde` / `serde_json` | Serialization and deserialization of MCP messages |\n| `http` | Low-level HTTP types (request/response builders, headers) |\n| `async-trait` | Async trait definitions for MCP client abstractions |\n| `thiserror` | Derived error types for protocol and transport failures |\n| `base64` / `sha2` | Encoding and hashing ŌĆö likely used for authentication or payload verification |\n| `url` | URL parsing and construction for MCP endpoints |\n| `rand` | Random number generation ŌĆö likely for nonce or session identifier creation |\n| `arc-swap` | Atomic swapping of shared state ŌĆö enables live reconfiguration of MCP connections without service interruption |\n| `tracing` | Structured logging throughout the client lifecycle |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Runtime] -->|calls| B[librefang-runtime-mcp]\n    B -->|HTTP transport| C[librefang-http]\n    B -->|protocol logic| D[rmcp]\n    B -->|types| E[librefang-types]\n    B -->|MCP Server| F[External MCP Service]\n    C -->|underlying requests| F\n```\n\nThe module wraps `rmcp` with LibreFang-specific configuration and error handling. `librefang-http` provides the transport layer, while `rmcp` handles the MCP protocol semantics.\n\n## Key Design Decisions\n\n**`arc-swap` for live reconfiguration.** MCP connection details (endpoints, authentication tokens, configuration) can be updated at runtime without requiring a restart. `arc-swap` provides lock-free atomic swaps of the shared client configuration.\n\n**Authentication via `base64` + `sha2`.** MCP endpoints likely require authenticated requests. These crates support encoding credentials and computing request signatures or token hashes.\n\n**Separation of transport and protocol.** HTTP-level concerns live in `librefang-http`, while MCP message formatting, method dispatch, and response parsing belong here. This keeps each crate focused and testable in isolation.\n\n## Integration Points\n\nThis crate is consumed by other LibreFang runtime components that need to query or interact with MCP-compatible AI services. It does not depend on higher-level LibreFang modules, keeping it a leaf dependency in the crate graph.\n\nNo inbound or outbound call edges were detected in static analysis, suggesting the module exposes a library API (traits, structs, functions) rather than driving its own execution flow. The consuming runtime component is responsible for instantiation and lifecycle management.","other-librefang-runtime-oauth":"# Other ŌĆö librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication flows for LibreFang runtime drivers. This module implements the authorization machinery required to authenticate with third-party LLM providersŌĆöspecifically ChatGPT and GitHub CopilotŌĆöso that upstream runtime drivers can make authenticated API calls.\n\n## Role in the Codebase\n\nLibreFang wraps multiple LLM backends behind a unified interface. Some of those backends (ChatGPT, GitHub Copilot) require browser-based OAuth 2.0 flows or device-authorization flows before they can be used. This module isolates all OAuth concerns into a single crate so that runtime drivers remain focused on request/response translation.\n\nDownstream, the runtime drivers for ChatGPT and GitHub Copilot depend on this module to obtain and refresh access tokens. Upstream, this module depends on `librefang-types` for shared data structures and `librefang-http` for HTTP client configuration.\n\n## Dependency Rationale\n\nThe crate's dependencies reveal its implementation strategy:\n\n| Dependency | Purpose |\n|---|---|\n| `reqwest` | HTTP client for token exchange requests to OAuth endpoints |\n| `serde` / `serde_json` | Serialization of token responses and PKCE parameters |\n| `sha2`, `base64`, `hex` | PKCE code verifier/challenge generation (SHA-256 digest, base64url encoding) |\n| `rand` | Cryptographically secure random generation of code verifiers and state parameters |\n| `zeroize` | Secure zeroing of sensitive credentials (tokens, secrets) in memory after use |\n| `thiserror` | Typed error definitions for OAuth-specific failure modes |\n| `tracing` | Structured logging of flow progress for debugging |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests token| B[librefang-runtime-oauth]\n    B -->|HTTP POST| C[OAuth Provider]\n    C -->|token response| B\n    B -->|access token| A\n    B -->|HTTP config| D[librefang-http]\n    B -->|shared types| E[librefang-types]\n```\n\nThe module acts as a self-contained token broker. A runtime driver calls into this module when it needs a valid access token. The module handles the full lifecycle: checking for cached tokens, initiating an authorization flow if needed, exchanging codes for tokens, and returning the credential to the caller.\n\n## OAuth Flow Variants\n\nThe module supports provider-specific OAuth patterns:\n\n- **ChatGPT** ŌĆö Likely uses an authorization code flow with PKCE, given the presence of `sha2`, `base64`, and `rand` for generating code verifiers and challenges. This flow requires the user to authorize in a browser, after which the module exchanges the authorization code for tokens.\n\n- **GitHub Copilot** ŌĆö GitHub's device authorization flow is the standard pattern for CLI/tool integrations. The module requests a device code, presents it to the user for verification, and polls the token endpoint until the user completes authorization.\n\n## Security Considerations\n\nThe inclusion of `zeroize` signals that tokens and secrets are treated as sensitive data. Implementations in this module are expected to:\n\n- Clear code verifiers, client secrets, and tokens from memory when they are no longer needed.\n- Avoid logging sensitive values; `tracing` spans should capture flow state without leaking credentials.\n- Use `rand` for generating unpredictable state parameters and PKCE verifiers to prevent CSRF and code interception attacks.\n\n## Error Handling\n\nOAuth flows can fail in many waysŌĆönetwork errors, expired codes, user denial, rate limiting. The `thiserror` dependency indicates that this module defines a dedicated error enum covering these cases, allowing callers to distinguish between transient failures (retryable) and permanent failures (requiring user intervention).\n\n## Integration Points\n\nWhen adding support for a new OAuth-protected provider:\n\n1. Define the provider's token endpoints and scopes within this module.\n2. Implement the appropriate flow (authorization code + PKCE, device code, or client credentials).\n3. The corresponding runtime driver in the workspace then depends on this module and calls into the new flow.\n\nThe separation ensures that OAuth logicŌĆötoken persistence, refresh logic, PKCE generation, pollingŌĆöis not duplicated across drivers.","other-librefang-runtime-tests":"# Other ŌĆö librefang-runtime-tests\n\n# librefang-runtime-tests\n\nIntegration tests for `librefang-runtime` that verify two critical behavioral contracts: **MCP OAuth authentication flows** and **tool runner parameter forwarding**. These tests catch regressions that unit tests in the source crates cannot, because they validate end-to-end wiring between components.\n\n## Test Files\n\n| File | Domain | Tests |\n|------|--------|-------|\n| `mcp_oauth_integration.rs` | OAuth discovery, token lifecycle, auth state serialization | 9 |\n| `tool_runner_forwarding.rs` | Memory tool peer-id forwarding | 7 |\n| `tool_runner_forwarding_task_cron.rs` | Task and cron tool forwarding | 5 |\n\n## MCP OAuth Integration Tests\n\n### OAuth Metadata Discovery\n\nTests for `discover_oauth_metadata` from `librefang_runtime::mcp_oauth`.\n\n- **`test_discover_fallback_to_config`** ŌĆö When the well-known endpoint is unreachable (nonexistent host), the function falls back to values supplied in `McpOAuthConfig`. Verifies that `authorization_endpoint`, `token_endpoint`, and `client_id` are extracted correctly from the config.\n- **`test_discover_fails_without_any_source`** ŌĆö When neither remote discovery nor a local config is available, the call returns an error containing \"OAuth metadata\".\n\n### OAuth Provider Wiring (Regression)\n\n- **`test_http_connect_calls_oauth_provider_load_token`** ŌĆö A regression test that catches the bug where `oauth_provider: None` was passed in the kernel's `connect_mcp_servers`, silently disabling the entire OAuth flow. It uses a `TrackingOAuthProvider` mock with an `AtomicBool` flag to prove that `McpConnection::connect` actually invokes `load_token` on the provider when a Streamable HTTP server returns 401.\n\nThe test connects to `http://127.0.0.1:1/nonexistent-mcp` (guaranteed connection refused) and asserts that despite the failure, the provider's `load_token` was called.\n\n### Token Lifecycle via `InMemoryOAuthProvider`\n\nA mock `McpOAuthProvider` implementation backed by `tokio::sync::Mutex<HashMap<String, OAuthTokens>>` that exercises the full store/load/clear cycle without vault dependencies.\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_provider_store_then_load` | `store_tokens` ŌåÆ `load_token` returns the same access token |\n| `test_provider_clear_removes_token` | `clear_tokens` causes subsequent `load_token` to return `None` |\n| `test_provider_clear_is_isolated` | Clearing tokens for server A does not affect server B |\n| `test_provider_reauthorize_after_clear` | Store ŌåÆ clear ŌåÆ store with new token works (re-authorization after revoke) |\n\n### Auth State Serialization (Regression)\n\nThese synchronous tests validate `McpAuthState` enum serialization to prevent dashboard UI bugs.\n\n- **`test_auth_state_lifecycle`** ŌĆö Walks the full state machine: `NeedsAuth` ŌåÆ `PendingAuth` ŌåÆ `Authorized` ŌåÆ `NeedsAuth` (after revoke). Each state serializes with the expected `\"state\"` discriminator. The final assertion catches a bug where revoking removed the auth state entirely, leaving no \"Authorize\" button in the dashboard.\n- **`test_needs_auth_serializes_differently_from_pending_auth`** ŌĆö Ensures `NeedsAuth` and `PendingAuth` produce distinct `\"state\"` values. Regression for a bug where the dashboard showed \"Authorizing...\" at boot before the user clicked Authorize.\n\n## Tool Runner Forwarding Tests\n\nThese tests verify that `execute_tool_raw` correctly propagates context fields (`sender_id`, `caller_agent_id`) through to the appropriate `KernelHandle` method parameters. This is a security-critical concern: peer-scoped memory must receive the correct `peer_id`.\n\n### Architecture\n\nEach test file uses a **capturing kernel mock** ŌĆö a `KernelHandle` implementation that records method arguments into `Arc<Mutex<Vec<...>>>` instead of performing real operations. This lets tests assert on what the kernel *received*, not what it *did*.\n\n```mermaid\ngraph LR\n    T[\"Test\"] -->|\"execute_tool_raw(tool, input, ctx)\"| E[\"execute_tool_raw\"]\n    E -->|\"kernel.memory_store(key, value, peer_id)\"| K[\"CapturingKernel\"]\n    K -->|\"record peer_id\"| L[\"Arc<Mutex<Vec>>\"]\n    T -->|\"assert\"| L\n```\n\n### Memory Forwarding (`tool_runner_forwarding.rs`)\n\nUses `CapturingKernel` which records `peer_id: Option<String>` for each of the three memory operations.\n\n| Test | Tool | `sender_id` in ctx | Expected `peer_id` at kernel |\n|------|------|--------------------|------------------------------|\n| `test_memory_store_forwards_sender_id_as_peer_id` | `memory_store` | `Some(\"user-42\")` | `Some(\"user-42\")` |\n| `test_memory_store_forwards_none_when_no_sender` | `memory_store` | `None` | `None` |\n| `test_memory_recall_forwards_sender_id_as_peer_id` | `memory_recall` | `Some(\"user-99\")` | `Some(\"user-99\")` |\n| `test_memory_recall_forwards_none_when_no_sender` | `memory_recall` | `None` | `None` |\n| `test_memory_list_forwards_sender_id_as_peer_id` | `memory_list` | `Some(\"user-7\")` | `Some(\"user-7\")` |\n| `test_memory_list_forwards_none_when_no_sender` | `memory_list` | `None` | `None` |\n| `test_sender_id_not_leaked_between_calls` | `memory_store` | Sequential: alice, bob, None | Respective `peer_id` per call |\n\nThe last test (`test_sender_id_not_leaked_between_calls`) is particularly important ŌĆö it calls `execute_tool_raw` three times with different `ToolExecContext` instances and verifies that each call receives exactly the `sender_id` from its own context, not a stale value from a previous call.\n\n### Task and Cron Forwarding (`tool_runner_forwarding_task_cron.rs`)\n\nUses a separate `CapturingKernel` that records `task_post`'s `created_by` parameter and `cron_create`'s `(agent_id, job_json)` pair.\n\n| Test | Tool | Context fields | Kernel assertion |\n|------|------|----------------|------------------|\n| `test_task_post_forwards_caller_as_created_by` | `task_post` | `caller_agent_id: Some(\"agent-1\")` | `created_by == Some(\"agent-1\")` |\n| `test_task_post_forwards_none_created_by` | `task_post` | `caller_agent_id: None` | `created_by == None` |\n| `test_cron_create_injects_sender_peer_id` | `cron_create` | `sender_id: Some(\"peer-xyz\")` | `job_json[\"peer_id\"] == \"peer-xyz\"` |\n| `test_cron_create_preserves_existing_peer_id` | `cron_create` | `sender_id: Some(\"peer-xyz\")`, input has `peer_id: \"existing\"` | `job_json[\"peer_id\"] == \"existing\"` (not overwritten) |\n| `test_cron_create_forwards_caller_as_agent_id` | `cron_create` | `caller_agent_id: Some(\"agent-1\")` | `agent_id == \"agent-1\"` |\n\nThe `test_cron_create_preserves_existing_peer_id` test ensures that when the cron job payload already contains a `peer_id`, the system does not overwrite it with the context's `sender_id`. This prevents accidental cross-contamination of identity.\n\n## Test Helpers\n\n### `make_ctx`\n\nBoth tool runner test files define a `make_ctx` helper that constructs a `ToolExecContext` with only the fields needed for the test populated (`kernel`, `sender_id`, `caller_agent_id`). All other fields are `None`. This keeps tests focused and readable.\n\n### Mock Providers\n\n| Provider | Used in | Storage |\n|----------|---------|---------|\n| `TrackingOAuthProvider` | OAuth wiring regression | `AtomicBool` flag |\n| `InMemoryOAuthProvider` | Token lifecycle tests | `Mutex<HashMap>` |\n| `CapturingKernel` (memory) | Memory forwarding tests | `Mutex<Vec<Option<String>>>` |\n| `CapturingKernel` (task/cron) | Task/cron forwarding tests | `Mutex<Vec<...>>` for task_post and cron_create |\n\nAll mock implementations implement the same trait (`McpOAuthProvider` or `KernelHandle`) with stubs returning `Err(\"not implemented\")` for methods not under test, making failures obvious if an unexpected code path is hit.\n\n## Key External Dependencies\n\n- `librefang_runtime::mcp_oauth` ŌĆö `discover_oauth_metadata`, `McpOAuthProvider`, `McpOAuthError`, `OAuthTokens`, `McpAuthState`\n- `librefang_runtime::tool_runner` ŌĆö `execute_tool_raw`, `ToolExecContext`\n- `librefang_runtime::mcp` ŌĆö `McpConnection`, `McpServerConfig`, `McpTransport`, `empty_taint_rule_sets_handle`\n- `librefang_kernel_handle` ŌĆö `KernelHandle` trait, `AgentInfo`\n- `librefang_types::config` ŌĆö `McpOAuthConfig`","other-librefang-runtime-wasm":"# Other ŌĆö librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime. This crate provides a WebAssembly-based execution environment that isolates and runs user-authored \"skills\" within the LibreFang game system.\n\n## Purpose\n\nLibreFang skills are user-defined behaviors that extend game functionality. Running them inside a WASM sandbox provides:\n\n- **Security**: Skills cannot access host memory or system resources directly\n- **Portability**: Skills compiled to WASM run on any platform LibreFang supports\n- **Control**: The host determines exactly which capabilities are exposed to each skill\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph Host\n        K[librefang-kernel-handle]\n        H[librefang-http]\n        T[librefang-types]\n    end\n\n    subgraph \"librefang-runtime-wasm\"\n        E[Wasmtime Engine]\n        S[Sandbox]\n    end\n\n    subgraph \"Skill WASM Module\"\n        SK[User Code]\n    end\n\n    E -->|loads & instantiates| SK\n    SK -->|imports (host functions)| S\n    S -->|delegates to| K\n    S -->|delegates to| H\n    T -.->|shared types| S\n```\n\nThe runtime loads compiled `.wasm` modules using **Wasmtime**, injects host-provided functions as WASM imports, and orchestrates skill execution. Skills interact with the game kernel and HTTP layer exclusively through these imported functionsŌĆönever directly.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `wasmtime` | Compiles and executes WASM modules; provides the sandboxing boundary |\n| `librefang-kernel-handle` | Exposes game kernel operations that skills can invoke |\n| `librefang-http` | Provides HTTP capabilities to skills when permitted |\n| `librefang-types` | Shared type definitions passed between host and guest |\n| `tokio` | Async runtime for non-blocking skill execution |\n| `serde_json` | Serializing/deserializing data exchanged across the WASM boundary |\n| `tracing` | Structured logging of sandbox lifecycle events |\n\n## Integration Points\n\nThis crate sits between the game kernel and user-authored code. It consumes `librefang-kernel-handle` to proxy kernel operations into the WASM guest and uses `librefang-types` to ensure type consistency across the boundary.\n\nOther LibreFang components depend on this crate to instantiate and manage the skill sandbox rather than interacting with WASM directly.","other-librefang-runtime":"# Other ŌĆö librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate is the orchestration layer that ties together LLM drivers, tool execution, sandboxing, memory, and communication channels into a coherent agent lifecycle.\n\n## Architecture\n\n```mermaid\ngraph TD\n    RT[librefang-runtime] --> LLMD[LLM Drivers]\n    RT --> WASM[WASM Sandbox]\n    RT --> MCP[MCP Protocol]\n    RT --> OAUTH[OAuth Runtime]\n    RT --> MEM[Memory Store]\n    RT --> SKILLS[Skills Registry]\n    RT --> HTTP[HTTP Layer]\n    RT --> KH[Kernel Handle]\n    RT --> CH[Channels]\n\n    subgraph \"Optional Sandboxing\"\n        WASM\n        LL[landlock]\n        SC[seccomp]\n    end\n```\n\nThe runtime acts as the central coordinator. It does not implement low-level functionality itself ŌĆö instead it consumes specialized sibling crates and wires them into an agent execution loop.\n\n## Key Dependency Groups\n\n### Agent Execution Core\n\n| Crate | Role |\n|---|---|\n| `librefang-llm-drivers` / `librefang-llm-driver` | Interfaces to LLM providers for inference |\n| `librefang-runtime-wasm` | WebAssembly-based sandboxed execution of agent code or tools |\n| `librefang-skills` | Registry and dispatch of agent skills/tools |\n| `librefang-memory` | Persistent and ephemeral memory stores for conversation and agent state |\n\n### Communication\n\n| Crate | Role |\n|---|---|\n| `librefang-runtime-mcp` | Model Context Protocol support for tool-calling and context exchange |\n| `librefang-runtime-oauth` | OAuth flows for authenticating with external services |\n| `librefang-http` |
