uild artifacts and caches |\n| `just validate-config` | Validate config.toml |\n| `just loc` | Code statistics (lines, dependency graph) |\n\n## Development Workflows\n\n### Local CI Simulation\n\n```bash\njust ci\n```\n\nThis runs the same checks as the CI pipeline:\n- Build all targets\n- Run all tests\n- Run clippy with strict warnings\n- Web linting\n\n### Pre-commit Checklist\n\n```bash\njust pre-commit\n```\n\nRuns formatting, linting, and tests before committing:\n\n```\ncargo fmt → cargo clippy → cargo test\n```\n\n### Migration Workflow\n\n```bash\njust migrate <framework>\n```\n\nImport agents from other agent frameworks into LibreFang.\n\n## Architecture\n\nThe justfile follows a layered architecture:\n\n```\n┌─────────────────────────────────────┐\n│           justfile                  │  ← User interface\n├─────────────────────────────────────┤\n│         cargo xtask                 │  ← Custom build tasks\n├───────────┬───────────┬────────────┤\n│  cargo    │  pnpm     │  tauri     │  ← Build tools\n├───────────┴───────────┴────────────┤\n│   Rust workspace   │  Web assets  │  ← Build targets\n└─────────────────────┴──────────────┘\n```\n\n### Key Design Decisions\n\n1. **Dashboard-first dependencies**: Commands that need web assets always build them first, ensuring consistency across targets.\n\n2. **Platform-specific recipes**: The `[unix]` and `[windows]` attributes handle path and shell differences without complex conditionals in recipes.\n\n3. **Pass-through arguments**: Recipes like `build-web *ARGS` accept arbitrary arguments, forwarding them to the underlying command for flexibility.\n\n4. **Composite tasks via xtask**: Complex operations live in the xtask crate rather than cluttering the justfile, keeping it readable.\n\n## Common Tasks\n\n### Full Development Setup\n\n```bash\njust setup              # Install all dependencies\njust build              # Verify build works\njust pre-commit         # Run pre-commit checks\n```\n\n### Release Process\n\n```bash\njust sync-versions      # Ensure versions are consistent\njust changelog          # Generate changelog\njust release            # Create release\njust publish-sdks       # Publish SDKs\njust docker             # Build and push image\n```\n\n### Investigating Issues\n\n```bash\njust doctor             # Check environment setup\njust lint               # Run linter to catch issues\njust coverage           # Check test coverage\njust check-links        # Validate documentation links\n```',
                "build-system-mise-toml":
                    '# Build System — mise.toml\n\n# Build System — `mise.toml`\n\n## Overview\n\nThis file is the **mise configuration** for the project. [Mise](https://mise.jdx.dev/) (formerly rtx) is a development environment manager that handles tool version management, replacing tools like `nvm`, `rustup`, and `pyenv`.\n\nWhen you run commands in this project, mise automatically activates the correct versions of these tools based on this configuration.\n\n## Configured Tools\n\n| Tool | Version | Purpose |\n|------|---------|---------|\n| `just` | 1.48 | Command runner / task automation |\n| `pnpm` | 10.33 | Node.js package manager |\n| `rust` | 1.92 | Rust compiler and toolchain |\n\n## How It Works\n\n### Automatic Tool Activation\n\nWhen you enter this project directory, mise reads `mise.toml` and ensures the specified tool versions are available. This happens through mise\'s shell integration or the `.mise.toml` detection system.\n\n### Tool Usage\n\n**Just** (`just`) serves as the project\'s task runner. Common commands:\n\n```bash\njust              # List available recipes\njust <recipe>     # Run a specific recipe\n```\n\n**pnpm** manages JavaScript/TypeScript dependencies if the project includes Node.js components:\n\n```bash\npnpm install\npnpm build\npnpm test\n```\n\n**Rust** provides the compiler and toolchain for any Rust components in the project:\n\n```bash\ncargo build\ncargo test\ncargo fmt\n```\n\n## Project Integration\n\n```\n┌─────────────────────────────────┐\n│         mise.toml               │\n│  (version declarations)         │\n└────────────┬────────────────────┘\n             │ mise reads on directory entry\n             ▼\n┌─────────────────────────────────┐\n│    Active Tool Versions         │\n│  • just 1.48                    │\n│  • pnpm 10.33                   │\n│  • rust 1.92                    │\n└────────────┬────────────────────┘\n             │ available to\n             ▼\n┌─────────────────────────────────┐\n│   Project Commands              │\n│  • just (task runner)           │\n│  • pnpm (package manager)       │\n│  • cargo/rustc (compiler)       │\n└─────────────────────────────────┘\n```\n\n## Updating Tool Versions\n\nTo upgrade a tool version, edit `mise.toml`:\n\n```toml\n[tools]\njust = "1.50"       # Update from 1.48\npnpm = "10.40"      # Update from 10.33\nrust = "1.95"       # Update from 1.92\n```\n\nThen run:\n\n```bash\nmise install\n```\n\n## Relationship to Other Configuration\n\nThis file defines **runtime versions** of tools. It complements:\n\n- **`package.json`** — Node.js dependency declarations (uses pnpm)\n- **`Justfile`** — Task definitions (uses just to execute)\n- **`Cargo.toml`** — Rust package definitions (uses rust toolchain)\n\n## Prerequisites\n\nMise must be installed on your system:\n\n```bash\n# macOS\nbrew install mise\n\n# Linux\ncurl https://mise.run | sh\n\n# Verify installation\nmise --version\n```\n\nAfter installation, enable mise in your shell (add to `.bashrc`, `.zshrc`, etc.):\n\n```bash\neval "$(mise activate bash)"  # or zsh, fish, etc.\n```',
                "build-system-rust-toolchain-toml":
                    '# Build System — rust-toolchain.toml\n\n# rust-toolchain.toml\n\n## Overview\n\nThis file configures the Rust toolchain for the project. It ensures consistent Rust version and tooling across all developers and CI environments by pinning specific settings that `rustup` reads automatically when operating in the project directory.\n\n## Configuration\n\n### Channel\n\n```toml\nchannel = "stable"\n```\n\nThe project targets the **stable** Rust channel, meaning it uses the latest officially released Rust compiler. This ensures:\n\n- The project builds with a well-tested, production-ready compiler\n- No unstable features are required\n- Maximum compatibility with the Rust ecosystem\n\n### Components\n\n```toml\ncomponents = ["rustfmt", "clippy"]\n```\n\nTwo additional components are installed alongside the base toolchain:\n\n| Component | Purpose |\n|-----------|---------|\n| `rustfmt` | Code formatter; ensures consistent code style across the codebase |\n| `clippy` | Linter; provides additional warnings and suggestions beyond the compiler |\n\n## Toolchain Resolution\n\nWhen `cargo`, `rustc`, or other Rust tools run from this directory or any subdirectory, `rustup` automatically reads this file and ensures the specified toolchain is active.\n\nThe resolution order is:\n\n1. `rust-toolchain.toml` or `rust-toolchain` file in current directory\n2. `rust-toolchain.toml` or `rust-toolchain` in parent directories (walked upward)\n3. `RUSTUP_TOOLCHAIN` environment variable override\n4. Default toolchain set via `rustup default`\n\n## Developer Workflow\n\n### Running Formatter Checks\n\n```bash\ncargo fmt -- --check\n```\n\n### Running the Linter\n\n```bash\ncargo clippy\n```\n\n### Updating the Toolchain\n\nTo switch to a different Rust version locally (for testing against nightly, beta, or a specific version):\n\n```bash\nrustup override set nightly\nrustup override set 1.70.0\nrustup override unset  # Remove override, return to toolchain.toml\n```\n\nThis override takes precedence over `rust-toolchain.toml` until unset.\n\n### Verifying Current Toolchain\n\n```bash\nrustup show\n```\n\nShows the currently active toolchain and its source (toolchain file vs. override vs. default).',
                "build-system-rustfmt-toml":
                    '# Build System — rustfmt.toml\n\n# Build System — rustfmt.toml\n\nConfiguration file enforcing consistent Rust code formatting across the LibreFang workspace.\n\n## Overview\n\nThis file defines the **rustfmt** settings that are applied to all Rust source code in the LibreFang project. The configuration is version-controlled alongside the source code and enforced automatically by CI to prevent formatting inconsistencies from entering the codebase.\n\n## Configuration Options\n\n| Option | Value | Purpose |\n|--------|-------|---------|\n| `edition` | `"2021"` | Specifies Rust edition 2021 for all crates in the workspace |\n| `max_width` | `100` | Maximum line length before rustfmt wraps code |\n| `use_field_init_shorthand` | `true` | Allows `Point { x, y }` instead of `Point { x: x, y: y }` |\n| `use_try_shorthand` | `true` | Allows `?` operator instead of `try!()` macro |\n\n### edition\n\n```toml\nedition = "2021"\n```\n\nSets the Rust language edition to 2021 for the entire workspace. This enables modern syntax features and ensures compatibility with current Rust tooling.\n\n### max_width\n\n```toml\nmax_width = 100\n```\n\nDefines the maximum character width for lines. Code exceeding this limit is automatically wrapped. The 100-character limit is a common balance between readability and preventing excessive line breaks on wide monitors.\n\n### use_field_init_shorthand\n\n```toml\nuse_field_init_shorthand = true\n```\n\nWhen enabled, struct initialization can use shorthand syntax when the field name matches the variable name:\n\n```rust\n// Without shorthand (disabled)\nlet point = Point { x: x, y: y };\n\n// With shorthand (enabled)\nlet point = Point { x, y };\n```\n\n### use_try_shorthand\n\n```toml\nuse_try_shorthand = true\n```\n\nAllows the `?` operator instead of the older `try!()` macro syntax:\n\n```rust\n// Without shorthand (disabled)\nlet value = try!(some_result);\n\n// With shorthand (enabled)\nlet value = some_result?;\n```\n\n## CI Integration\n\nThe configuration file header documents the CI enforcement:\n\n```toml\n# Enforced by CI — run `cargo fmt` before pushing.\n```\n\nBefore pushing changes, developers should run:\n\n```bash\ncargo fmt\n```\n\nThis reformats staged files to match the workspace configuration. CI will reject pull requests containing formatting deviations.\n\n## Developer Workflow\n\n```\n┌─────────────────────────────────────────────┐\n│            Local Development                 │\n├─────────────────────────────────────────────┤\n│                                             │\n│  1. Edit Rust source files                  │\n│  2. Run `cargo fmt` to auto-format          │\n│  3. Review changes (formatted code only)    │\n│  4. Commit and push                         │\n│                                             │\n└─────────────────┬───────────────────────────┘\n                  │\n                  ▼\n┌─────────────────────────────────────────────┐\n│                 CI Pipeline                  │\n├─────────────────────────────────────────────┤\n│                                             │\n│  cargo fmt --check                          │\n│  → Fails if unformatted code detected       │\n│  → Passes only if code matches rustfmt.toml │\n│                                             │\n└─────────────────────────────────────────────┘\n```\n\n## Maintenance Notes\n\n- **No external dependencies** — rustfmt ships with Rust, requiring no additional tooling\n- **Workspace-level configuration** — Placed at the workspace root, applies to all crates\n- **Minimal settings** — Only essential options are specified; rustfmt uses defaults for everything else\n- **Single source of truth** — One file controls formatting for the entire codebase',
                "build-system-scripts":
                    '# Build System — scripts\n\n# Build System — Email Reader (`scripts/read_email.py`)\n\nRetrieves the most recent email from a specified sender via IMAP, searching across multiple email folders with graceful fallback handling for different mailbox types.\n\n## Overview\n\nThis script connects to an IMAP mail server, searches for emails from a given sender across standard folders, and outputs the latest matching email\'s metadata and body. It handles encoding edge cases, prefers plain text over HTML content, and works with both Gmail and standard IMAP servers.\n\n**Primary use case:** Automated build or CI systems that receive notifications via email and need programmatic access to message content.\n\n## Environment Configuration\n\nThe script requires no command-line configuration beyond an optional sender argument. All authentication uses environment variables:\n\n| Variable | Required | Default | Description |\n|----------|----------|---------|-------------|\n| `EMAIL_USERNAME` | Yes | — | IMAP login username |\n| `EMAIL_PASSWORD` | Yes | — | IMAP login password |\n| `IMAP_SERVER` | No | `imap.gmail.com` | IMAP server hostname |\n| `IMAP_PORT` | No | `993` | IMAP server port |\n\nExample usage:\n\n```bash\nexport EMAIL_USERNAME="build-bot@example.com"\nexport EMAIL_PASSWORD="app-specific-password"\nexport IMAP_SERVER="imap.gmail.com"\n\npython scripts/read_email.py "noreply@github.com"\n```\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[main] --> B[IMAP4_SSL Connection]\n    A --> C[search_folder loop]\n    C --> D["folder: INBOX"]\n    C --> E["folder: [Gmail]/All Mail"]\n    C --> F["folder: Promotions"]\n    C --> G["folder: Updates"]\n    D --> H{Found emails?}\n    E --> H\n    F --> H\n    G --> H\n    H -->|No| I[Exit: NO_EMAIL_FOUND]\n    H -->|Yes| J[Fetch latest email]\n    J --> K[decode_header for subject]\n    J --> L[get_body for content]\n    K --> M[Output metadata]\n    L --> M\n```\n\n## Key Components\n\n### `decode_str(s, enc=None)`\n\nDecodes a byte string to a Unicode string with safe fallback handling.\n\n- Accepts both `bytes` and `str` inputs\n- Defaults to UTF-8 when no encoding specified\n- Silently replaces invalid characters rather than raising exceptions\n\n### `get_body(msg)`\n\nExtracts human-readable text content from an email message.\n\n**Content preference order:**\n1. Plain text (`text/plain`) parts without attachments\n2. HTML content (`text/html`) — stripped of tags if no plain text found\n\nThe function walks through multipart messages recursively and returns the first viable content option.\n\n### `search_folder(mail, folder, sender)`\n\nSearches a single IMAP folder for messages matching the sender filter.\n\n**Returns:** List of message IDs (oldest first, so `[-1]` gives the latest)\n\n**Error handling:** Silently skips folders that fail to select or search, printing a warning. This prevents a single inaccessible folder from aborting the entire operation.\n\n### `main()`\n\nOrchestrates the email retrieval workflow:\n\n1. Parses command-line arguments and environment variables\n2. Establishes SSL-secured IMAP connection\n3. Iterates through folder candidates until emails are found\n4. Fetches the most recent matching email\n5. Decodes subject header and extracts body content\n6. Outputs structured results to stdout\n\n## Folder Search Strategy\n\nThe script attempts folders in this order:\n\n```\nINBOX → "[Gmail]/All Mail" → "[Gmail]/Promotions" → "[Gmail]/Updates" → Promotions → Updates\n```\n\n**Gmail behavior:** Gmail uses bracketed folder names like `[Gmail]/All Mail`. The script includes quoted versions for compatibility. If Gmail throws errors on bracketed names (due to server configuration), the unbracketed `Promotions` and `Updates` entries catch the search.\n\n**Non-Gmail servers:** Only `INBOX`, `Promotions`, and `Updates` are practical. Gmail-specific paths fail gracefully with warnings.\n\n## Output Format\n\nWhen emails are found, output is written to stdout in this format:\n\n```\nSUBJECT: <decoded subject line>\nFROM: <sender address>\nDATE: <date header>\n---BODY---\n<email body content, up to 4000 characters>\n```\n\nExit codes:\n\n| Code | Meaning |\n|------|---------|\n| `0` | Success (email found or `NO_EMAIL_FOUND` message printed) |\n| `1` | Configuration error (missing credentials) or connection failure |\n\n## Error Handling\n\n| Error Condition | Behavior |\n|-----------------|----------|\n| Missing `EMAIL_USERNAME` | Error message to stderr, exit 1 |\n| Missing `EMAIL_PASSWORD` | Error message to stderr, exit 1 |\n| Invalid `IMAP_PORT` | Error message to stderr, exit 1 |\n| IMAP connection failure | Error message to stderr, exit 1 |\n| Folder search failure | Warning to stderr, continue to next folder |\n| Message fetch failure | Error message to stderr, logout, exit 1 |\n| No emails found | `NO_EMAIL_FOUND` message to stdout, exit 0 |\n\n## Encoding Handling\n\nSubject lines commonly use RFC 2047 encoded-word syntax (e.g., `=?UTF-8?B?...?=`). The `decode_header` function from the standard library handles this, returning a tuple of `(decoded_bytes, charset)`. The script then decodes the bytes using the reported charset with UTF-8 fallback.\n\nBody content uses `errors=\'ignore\'` for payload decoding, preventing malformed messages from crashing the script.\n\n## Integration Notes\n\n- **No outgoing calls** to other project modules — this is a standalone utility script\n- **Exit codes** support shell scripting: check `$?` after invocation\n- **Output parsing:** Downstream scripts can grep for `SUBJECT:`, `FROM:`, etc. to extract fields programmatically\n- **Body truncation:** Bodies over 4000 characters are cut off to prevent unbounded output in CI environments',
                "build-system-src":
                    '# Build System — src\n\n# Build System — `xtask`\n\nThe `xtask` crate provides build automation and developer tooling for the LibreFang workspace using the `cargo xtask` pattern. Rather than relying on external build tools or Makefiles, LibreFang defines all workspace automation tasks as Rust modules that run via `cargo xtask <command>`.\n\nThis approach offers several advantages: tasks are written in the same language as the project, they have full access to the workspace\'s type system, and they work identically across all platforms that Rust supports.\n\n## Module Structure\n\n```\nxtask/\n├── src/\n│   ├── main.rs          # CLI entry point, command dispatch\n│   ├── common.rs       # Shared utilities (repo_root)\n│   ├── api_docs.rs     # OpenAPI → Swagger UI\n│   ├── bench.rs        # Criterion benchmark runner\n│   ├── build_web.rs    # pnpm frontend builds\n│   ├── changelog.rs    # PR → changelog generator\n│   ├── check_links.rs  # Link validation (lychee)\n│   ├── ci.rs           # Local CI simulation\n│   ├── clean_all.rs    # Build artifact cleanup\n│   ├── codegen.rs      # OpenAPI spec generation\n│   ├── contributors.rs # GitHub → SVG generators\n│   ├── coverage.rs     # llvm-cov integration\n│   ├── db.rs           # SQLite management\n│   ├── deps.rs         # Security audits\n│   ├── dev.rs          # Hot-reload dev environment\n│   ├── dist.rs         # Cross-platform release builds\n│   ├── docker.rs       # Container image builds\n│   ├── doctor.rs       # Environment diagnostics\n│   ├── fmt.rs          # Formatting checks (rustfmt, prettier)\n│   ├── integration_test.rs  # Live API tests\n│   ├── license_check.rs    # License compliance\n│   ├── loc.rs          # Lines-of-code statistics\n│   ├── migrate.rs      # Agent migration\n│   ├── pre_commit.rs   # Pre-commit hook\n│   ├── publish_npm_binaries.rs\n│   ├── publish_pypi_binaries.rs\n│   ├── publish_sdks.rs\n│   ├── release.rs      # Full release pipeline\n│   ├── setup.rs        # Initial environment setup\n│   ├── sync_versions.rs # Multi-package version sync\n│   └── update_deps.rs  # Dependency updates\n└── Cargo.toml\n```\n\n## CLI Interface\n\nAll tasks are exposed as subcommands of `cargo xtask`. The top-level `Cli` struct uses `clap` to parse the command line, dispatching each `Command` variant to its corresponding module\'s `run` function:\n\n```rust\nenum Command {\n    Release(release::ReleaseArgs),\n    BuildWeb(build_web::BuildWebArgs),\n    Ci(ci::CiArgs),\n    // ... 30+ additional commands\n}\n```\n\nEach submodule defines its own `Args` struct (deriving `Parser` and `Debug`) and exports a `run(Args) -> Result<(), Box<dyn Error>>` function. The main loop handles errors uniformly:\n\n```rust\nif let Err(e) = result {\n    eprintln!("Error: {e}");\n    std::process::exit(1);\n}\n```\n\n## Key Components\n\n### `common::repo_root`\n\nEvery task needs to resolve the workspace root. Rather than assuming `std::env::current_dir()`, `repo_root()` walks upward until it finds a `Cargo.toml` containing `[workspace]`. This makes the tasks work correctly regardless of the current working directory:\n\n```rust\npub fn repo_root() -> PathBuf {\n    let mut dir = std::env::current_dir().expect("cannot get cwd");\n    loop {\n        let cargo_toml = dir.join("Cargo.toml");\n        if cargo_toml.exists() {\n            let content = std::fs::read_to_string(&cargo_toml).unwrap_or_default();\n            if content.contains("[workspace]") {\n                return dir;\n            }\n        }\n        if !dir.pop() {\n            panic!("could not find workspace root");\n        }\n    }\n}\n```\n\nAll modules import and use this via `use crate::common::repo_root;`.\n\n### Development Environment (`dev.rs`)\n\nThe `dev` command orchestrates a full local development setup:\n\n1. **Kill stale processes** on ports 4545 (daemon) and 5173-5178 (dashboard)\n2. **Build** `librefang-cli` in debug mode\n3. **Auto-init** if no `config.toml` exists\n4. **Start dashboard** dev server in background with hot reload\n5. **Start daemon** on port 4545\n6. **Enter watch loop** via `cargo-watch` on `crates/`\n\nTwo background threads provide developer convenience:\n\n- **Auto-pull**: Every 30 seconds, fetches `origin/main` and rebases if new commits exist\n- **Hotkey listener**: Raw terminal input provides shortcuts (`r`=rebase, `o`=open dashboard, `l`=logs, `s`=status, `c`=clear, `?`=help)\n\nThe watch loop rebuilds `librefang-cli` on every change to `crates/`, then kills and restarts the daemon with a carefully constructed shell script that handles the stop-start sequence atomically.\n\n### Release Pipeline (`release.rs`)\n\nThe `release` command executes the full release workflow: generate changelog → sync versions → commit → tag → create GitHub PR. It computes the next version using Calendar Versioning (`YYYY.M.D.N` format) and validates the working tree is clean before proceeding.\n\n### Web Builds (`build_web.rs`)\n\nBuilds React frontend assets by running `pnpm install --frozen-lockfile && pnpm run build` for each of three directories:\n\n- `crates/librefang-api/dashboard` — React dashboard\n- `web/` — main web frontend\n- `docs/` — documentation site\n\nSelective builds are possible via `--dashboard`, `--web`, and `--docs` flags.\n\n### Integration Testing (`integration_test.rs`)\n\nStarts a fresh daemon, waits for the health endpoint, and runs HTTP requests against it:\n\n```\nGET /api/health\nGET /api/agents\nGET /api/budget\nGET /api/network/status\nPOST /api/agents/{id}/message  (if --skip-llm not set)\n```\n\nVerifies budget updates after LLM calls when an API key is provided.\n\n### Changelog Generation (`changelog.rs`)\n\nParses git log between the latest stable tag and `HEAD`, extracts PR numbers from commit messages (via `#\\d+` regex), fetches PR titles and authors via `gh pr view --json`, classifies by conventional commit prefix, and writes a formatted section to `CHANGELOG.md`.\n\n### Contributors & Star History (`contributors.rs`)\n\nTwo SVG generators that fetch GitHub data via the `gh` CLI:\n\n- **Contributors SVG**: Fetches the contributor list, downloads avatars via `curl`, embeds them as base64 data URIs (required because GitHub\'s CSP blocks external image loads in SVGs), and arranges them in a grid with links to profiles\n- **Star History SVG**: Fetches stargazer timestamps, builds a cumulative daily series, and renders a dark-themed line chart with area fill\n\n### Version Synchronization (`sync_versions.rs`)\n\nKeeps version strings consistent across:\n\n- `Cargo.toml` (workspace version)\n- `sdks/rust/Cargo.toml`\n- `sdks/js/package.json`\n- `sdks/python/setup.py`\n- Tauri configuration\n\nUses `toml_edit` for in-place modification of TOML files.\n\n### Cross-Platform Distribution (`dist.rs`)\n\nBuilds release binaries for all supported targets using `cargo build --release --target <triple>`. Default targets:\n\n```\nx86_64-unknown-linux-gnu\naarch64-unknown-linux-gnu\nx86_64-apple-darwin\naarch64-apple-darwin\nx86_64-pc-windows-msvc\n```\n\nUses `cross` for cross-compilation when `--cross` is set. Archives each build as `.tar.gz` (Unix) or `.zip` (Windows).\n\n## Architecture\n\n```mermaid\ngraph TB\n    subgraph "CLI Layer"\n        CLI["main.rs: Cli"]\n    end\n\n    subgraph "Commands"\n        Dev["dev.rs"]\n        CI["ci.rs"]\n        Release["release.rs"]\n        BuildWeb["build_web.rs"]\n        Dist["dist.rs"]\n        Docker["docker.rs"]\n        Test["integration_test.rs"]\n        Setup["setup.rs"]\n        Coverage["coverage.rs"]\n        Deps["deps.rs"]\n        Changelog["changelog.rs"]\n        Codegen["codegen.rs"]\n        SyncVersions["sync_versions.rs"]\n        Publish["publish_sdks.rs"]\n        Others["30+ other modules"]\n    end\n\n    subgraph "Shared"\n        Common["common.rs\\nrepo_root()"]\n    end\n\n    CLI --> Dev\n    CLI --> CI\n    CLI --> Release\n    CLI --> BuildWeb\n    CLI --> Dist\n    CLI --> Docker\n    CLI --> Test\n    CLI --> Setup\n    CLI --> Coverage\n    CLI --> Deps\n    CLI --> Changelog\n    CLI --> Codegen\n    CLI --> SyncVersions\n    CLI --> Publish\n    CLI --> Others\n\n    Dev --> Common\n    CI --> Common\n    Test --> Common\n    BuildWeb --> Common\n```\n\n## External Tool Dependencies\n\nThe xtask system manages several external tools, installing them on demand when not found:\n\n| Tool | Purpose | Auto-install |\n|------|---------|--------------|\n| `cargo-watch` | File watching in `dev` | Yes |\n| `cargo-llvm-cov` | Coverage reports | Yes |\n| `cargo-audit` | Security advisories | Yes |\n| `cargo-outdated` | Update checking | Yes |\n| `lychee` | Link checking | No (basic fallback available) |\n| `cross` | Cross-compilation | No |\n| `cargo-deny` | License checking | No (metadata fallback) |\n| `gh` | GitHub API access | No |\n| `pnpm` | Web builds | No |\n\n## Common Patterns\n\n### Error Handling\n\nAll `run()` functions return `Result<(), Box<dyn std::error::Error>>`. The main function exits with code 1 on any error, printing the error message to stderr.\n\n### Path Resolution\n\nEvery task begins by calling `repo_root()` to get an absolute path to the workspace root. All file operations are relative to this root, ensuring consistent behavior regardless of where `cargo xtask` is invoked from.\n\n### Command Execution\n\nShell commands are executed via `std::process::Command`. Tasks check `status.success()` and return errors on failure rather than panicking.\n\n### File Discovery\n\nTasks search for files in multiple candidate locations (e.g., `find_openapi_spec` checks `openapi.json`, `crates/librefang-api/openapi.json`, and `docs/openapi.json`) and use the first one that exists.',
                "build-system-tests":
                    '# Build System — tests\n\n# install_sh_test.sh — Installer Script Tests\n\nTests the `install.sh` installer script by sourcing it in isolated environments and verifying behavior of its core functions.\n\n## Overview\n\nThis test suite validates the installer script\'s ability to:\n- Map shell names to their appropriate RC file paths\n- Select the correct RC file when multiple shells are present\n- Parse boolean configuration flags\n- Detect parent shells even when invoked via `curl | sh`\n\n## Test Environment Setup\n\nEach test runs against a temporary home directory to avoid polluting the developer\'s actual shell configuration:\n\n```sh\nTMP_HOME=$(mktemp -d)\nHOME="$TMP_HOME" LIBREFANG_INSTALLER_SOURCE_ONLY=1 . "$INSTALLER_PATH"\n```\n\n- `LIBREFANG_INSTALLER_SOURCE_ONLY=1` loads the script\'s functions without triggering interactive prompts\n- The script is sourced (`.`) rather than executed, making functions directly callable\n\n## Test Cases\n\n### `shell_rc_from_shell` Mappings\n\nVerifies that each supported shell maps to its correct RC file location:\n\n| Shell | Expected RC File |\n|-------|------------------|\n| `zsh` | `$HOME/.zshrc` |\n| `/bin/bash` | `$HOME/.bashrc` |\n| `fish` | `$HOME/.config/fish/config.fish` |\n\n```sh\n[ "$(shell_rc_from_shell zsh)" = "$TMP_HOME/.zshrc" ] || fail "zsh rc mapping"\n```\n\n### `choose_shell_rc` Fallback Order\n\nTests the priority order when multiple RC files exist. The function should prefer shells in this order: **bash → zsh → fish**.\n\n```sh\n# All three present → bashrc wins\n[ "$(choose_shell_rc "")" = "$TMP_HOME/.bashrc" ]\n\n# bashrc missing → zshrc wins\n[ "$(choose_shell_rc "")" = "$TMP_HOME/.zshrc" ]\n\n# bashrc and zshrc missing → fish wins\n[ "$(choose_shell_rc "")" = "$TMP_HOME/.config/fish/config.fish" ]\n```\n\n### `is_enabled` Flag Parser\n\nValidates the function that parses `LIBREFANG_AUTO_START` and similar boolean flags.\n\n**Accept as true:**\n```\n1, true, TRUE, yes, YES, on, ON\n```\n\n**Reject (must return false):**\n```\n0, false, FALSE, no, NO, off, OFF, "" (empty string)\n```\n\n```sh\nfor truthy in 1 true TRUE yes YES on ON; do\n    is_enabled "$truthy" || fail "is_enabled should accept $truthy"\ndone\nfor falsy in 0 false FALSE no NO off OFF ""; do\n    if is_enabled "$falsy"; then\n        fail "is_enabled should reject $falsy"\n    fi\ndone\n```\n\n### `detect_user_shell` Parent Shell Detection\n\nTests an edge case where `detect_user_shell` must look past an intermediate `sh` shell to find the actual parent (typically zsh when using `curl | sh`).\n\nThe test uses a fake `ps` binary that simulates this sequence:\n\n1. First call to `ps -o comm=` returns `"sh"` (the pipe shell)\n2. Query for parent PID returns `"222"`\n3. Second call to `ps -o comm= -p 222` returns `"zsh"` (the actual shell)\n\n```sh\n# Fake ps outputs based on call count:\n# Call 1: "sh"\n# Call 2 (ppid query): "222"  \n# Call 3: "zsh"\n```\n\nThe detector must traverse this chain and return `"zsh"`:\n\n```sh\nDETECTED=$(HOME="$TMP_HOME" ... sh -c \'. "$INSTALLER_PATH"; detect_user_shell\')\n[ "$DETECTED" = "zsh" ] || fail "detect_user_shell expected zsh, got: $DETECTED"\n```\n\n## Running the Tests\n\n```sh\n./scripts/tests/install_sh_test.sh\n```\n\nAll tests must pass for the output to be:\n\n```\nPASS: shell_rc_from_shell mappings\nPASS: choose_shell_rc fallback order\nPASS: LIBREFANG_AUTO_START flag parser\nPASS: detect_user_shell handles curl|sh parent shell\nAll install.sh tests passed.\n```\n\n## Failure Handling\n\nThe test script uses two helper functions:\n\n```sh\nfail() {\n    echo "FAIL: $*" >&2\n    exit 1\n}\n\npass() {\n    echo "PASS: $*"\n}\n```\n\nAny assertion failure exits immediately with status 1, making the script suitable for CI integration.\n\n## Relationship to Installer\n\nThis test file validates the non-interactive portions of `web/public/install.sh`. The tested functions handle:\n\n- **Shell detection** — determining which shell the user runs\n- **RC file selection** — choosing where to write initialization commands\n- **Configuration parsing** — interpreting boolean settings\n- **Parent shell traversal** — safely detecting the real shell across process boundaries\n\nThese are the building blocks that allow `install.sh` to add itself to the user\'s shell configuration regardless of which shell they use.',
                "build-system-xtask":
                    '# Build System — xtask\n\n# xtask — LibreFang Build Automation\n\nCross-platform build automation for the LibreFang workspace. This crate replaces scattered shell scripts and manual workflows with a single, consistent Rust CLI built with [clap](https://clap.rs/).\n\n## Purpose\n\nLibreFang is a multi-component project spanning:\n\n- **Core Rust crates** (workspace with multiple packages)\n- **JavaScript/TypeScript frontends** (dashboard, web app, docs)\n- **SDKs** (JavaScript, Python, Rust)\n- **Desktop integration** (Tauri configuration)\n- **Deployment artifacts** (Docker, distribution binaries)\n\nManaging builds, releases, and development workflows across these components manually is error-prone. The `xtask` crate centralizes all build automation in one place:\n\n- **Consistent interface** — one tool for all operations\n- **Fail-fast CI** — runs the same checks locally that CI runs remotely\n- **Version synchronization** — keeps CalVer in sync across all manifests\n- **Safe defaults** — interactive prompts with `--no-confirm` for CI\n- **Comprehensive coverage** — from development to deployment\n\n## Architecture\n\nThe crate follows the standard Rust `xtask` pattern: a separate Cargo package that provides build-time utilities invoked via `cargo xtask <command>`.\n\n```\nxtask/\n├── Cargo.toml          # Dependencies and package metadata\n├── README.md           # Command reference and usage examples\n└── src/\n    └── main.rs         # All commands and logic (embedded in crate)\n```\n\n### Command Organization\n\nCommands fall into several categories:\n\n| Category | Commands |\n|----------|----------|\n| **Release** | `release`, `changelog`, `sync-versions`, `publish-sdks` |\n| **Build** | `build-web`, `dist`, `docker`, `codegen` |\n| **Quality** | `ci`, `fmt`, `clippy`, `license-check`, `check-links` |\n| **Testing** | `integration-test`, `coverage`, `bench` |\n| **Maintenance** | `deps`, `update-deps`, `clean-all`, `setup` |\n| **Development** | `dev`, `doctor`, `db`, `validate-config`, `api-docs` |\n| **Migration** | `migrate` |\n\n### Key Dependencies\n\n```toml\nclap = { version = "4", features = ["derive", "env"] }  # CLI argument parsing\nserde = { version = "1", features = ["derive"] }        # Serialization\ntoml_edit = "0.25"                                       # TOML manipulation\nregex = "1"                                              # Pattern matching\nchrono = "0.4"                                           # Date/time handling\nbase64 = { workspace = true }                           # Encoding\nlibrefang-migrate = { path = "../crates/librefang-migrate" }  # Migration logic\n```\n\n## Core Commands\n\n### Release Flow (`release`)\n\nThe `release` command orchestrates the complete release process:\n\n```bash\ncargo xtask release --version 2026.3.2214\n```\n\n**Process flow:**\n\n1. Generate CHANGELOG from merged PRs since last tag\n2. Sync version strings across all manifests\n3. Build the dashboard\n4. Commit changes\n5. Create git tag\n6. Push to remote\n7. Create GitHub PR with release notes\n\n```mermaid\nflowchart LR\n    A[Generate CHANGELOG] --> B[Sync Versions]\n    B --> C[Build Dashboard]\n    C --> D[Commit + Tag]\n    D --> E[Push]\n    E --> F[Create PR]\n```\n\n**Prerequisites:**\n\n- Clean working tree (no uncommitted changes)\n- On `main` branch\n- `gh` CLI authenticated for PR creation\n\n**Options:**\n\n| Flag | Description |\n|------|-------------|\n| `--version` | Explicit version (CalVer format: `YYYY.M.D.N`) |\n| `--no-confirm` | Skip interactive prompts (for CI) |\n| `--no-push` | Skip push and PR creation |\n| `--no-article` | Skip Dev.to article generation |\n\n### Version Synchronization (`sync-versions`)\n\nEnsures consistent version strings across all package manifests:\n\n```bash\ncargo xtask sync-versions 2026.3.2214\n```\n\n**Files updated:**\n\n| File | Format Notes |\n|------|--------------|\n| `Cargo.toml` (workspace) | Standard Cargo version |\n| `sdk/javascript/package.json` | npm semver |\n| `sdk/python/setup.py` | PEP 440 (hyphens to dots: `1.0.0-beta1` → `1.0.0b1`) |\n| `sdk/rust/Cargo.toml` | Standard Cargo version |\n| `sdk/rust/README.md` | Badge/version display |\n| `packages/whatsapp-gateway/package.json` | npm semver |\n| `crates/librefang-desktop/tauri.conf.json` | MSI-compatible encoding |\n\n### Changelog Generation (`changelog`)\n\nCreates a CHANGELOG.md entry from GitHub PRs:\n\n```bash\ncargo xtask changelog 2026.3.22 v2026.3.2114\n```\n\n**PR Classification by Commit Prefix:**\n\n| Prefix | Section |\n|--------|---------|\n| `feat:` | Added |\n| `fix:` | Fixed |\n| `refactor:` | Changed |\n| `perf:` | Performance |\n| `docs:` | Documentation |\n| `chore:`, `ci:`, `build:`, `test:` | Maintenance |\n\nRequires the `gh` CLI for GitHub API access.\n\n## Development Workflows\n\n### Local CI (`ci`)\n\nRun the same quality checks locally that CI runs:\n\n```bash\ncargo xtask ci --release\n```\n\n**Execution order (fail-fast):**\n\n1. `cargo build --workspace --lib`\n2. `cargo test --workspace`\n3. `cargo clippy --workspace --all-targets -- -D warnings`\n4. `pnpm run lint` in `web/` (if exists)\n\n```mermaid\nflowchart TD\n    A[Build] --> B[Test]\n    B --> C[Clippy]\n    C --> D[Web Lint]\n    A -.->|fail| X[Stop]\n    B -.->|fail| X\n    C -.->|fail| X\n```\n\n**Options:**\n\n| Flag | Description |\n|------|-------------|\n| `--no-test` | Skip unit tests |\n| `--no-web` | Skip web lint |\n| `--release` | Use release profile |\n\n### Development Server (`dev`)\n\nStart the daemon and dashboard together:\n\n```bash\ncargo xtask dev --port 5000 --release\n```\n\nThis builds the project, starts the LibreFang daemon, and launches the React dashboard. All processes are terminated together on Ctrl+C.\n\n### Environment Diagnostics (`doctor`)\n\nVerify your development environment is correctly configured:\n\n```bash\ncargo xtask doctor --port 5000\n```\n\n**Checks performed:**\n\n- Rust toolchain availability\n- Required binaries (`cargo`, `rustup`, `pnpm`, `gh`, `docker`, `just`)\n- Port availability\n- Daemon health and responsiveness\n- Configuration file validity\n- API key presence (if configured)\n- Workspace state (clean worktree, correct branch)\n\n### Pre-Commit Checks (`pre-commit`)\n\nRun before committing to catch issues early:\n\n```bash\ncargo xtask pre-commit --fix\n```\n\n**Steps:**\n\n1. Format check (Rust fmt + Prettier)\n2. Clippy linting\n3. Unit tests (can skip with `--no-test`)\n\n## Build Commands\n\n### Web Frontend Builds (`build-web`)\n\nBuild one or more frontend targets:\n\n```bash\ncargo xtask build-web --dashboard --web --docs\n```\n\n**Targets:**\n\n| Target | Directory | Framework |\n|--------|-----------|-----------|\n| `dashboard` | `crates/librefang-api/dashboard/` | React + Vite |\n| `web` | `web/` | React + Vite |\n| `docs` | `docs/` | Next.js |\n\nEach target is skipped if it doesn\'t contain a `package.json`.\n\n### Distribution Binaries (`dist`)\n\nCross-compile release binaries:\n\n```bash\ncargo xtask dist --cross --output release-artifacts\n```\n\n**Default targets:**\n\n| Platform | Architectures |\n|----------|---------------|\n| Linux | x86_64, aarch64 |\n| macOS | x86_64, aarch64 |\n| Windows | x86_64 |\n\n**Output format:**\n\n- Linux/macOS: `.tar.gz`\n- Windows: `.zip`\n\nUses [`cross`](https://github.com/cross-rs/cross) for cross-compilation when `--cross` is specified.\n\n### Docker Image (`docker`)\n\nBuild and push the container image:\n\n```bash\ncargo xtask docker --push --latest --tag 2026.3.2214\n```\n\n**Image details:**\n\n- Registry: `ghcr.io/librefang/librefang`\n- Dockerfile: `deploy/Dockerfile`\n- Multi-platform support with `--platform`\n\n## SDK Publishing (`publish-sdks`)\n\nPublish SDKs to their respective registries:\n\n```bash\ncargo xtask publish-sdks --dry-run\ncargo xtask publish-sdks --js --python --rust\n```\n\n**SDKs:**\n\n| SDK | Registry | Tool |\n|-----|----------|------|\n| JavaScript | npm | `npm` |\n| Python | PyPI | `twine` |\n| Rust | crates.io | `cargo` |\n\n## Database Management (`db`)\n\nInspect and manage LibreFang databases:\n\n```bash\ncargo xtask db --info\ncargo xtask db --backup ./backup\ncargo xtask db --reset --data-dir ~/.librefang\n```\n\n**Operations:**\n\n- `info` — Display database paths and sizes\n- `backup` — Copy database files to backup directory\n- `reset` — Delete all databases (requires daemon to be stopped)\n\n## Integration Testing (`integration-test`)\n\nRun live API integration tests:\n\n```bash\ncargo xtask integration-test --api-key $GROQ_API_KEY\n```\n\n**Test sequence:**\n\n1. Start the daemon on specified port\n2. `GET /api/health` — Health check\n3. `GET /api/agents` — List agents\n4. `GET /api/budget` — Check budget\n5. `GET /api/network/status` — Network status\n6. `POST /api/agents/{id}/message` — Send message (requires LLM)\n7. Verify budget decreased after LLM call\n\n**Defaults:**\n\n- Binary: `target/release/librefang`\n- Port: derived from config\n\n## Code Quality\n\n### Dependency Auditing (`deps`)\n\nCheck for security vulnerabilities and outdated packages:\n\n```bash\ncargo xtask deps --audit --outdated --web\n```\n\n**Tools used:**\n\n| Check | Tool | Auto-install |\n|-------|------|--------------|\n| Rust audit | `cargo-audit` | Yes |\n| Rust outdated | `cargo-outdated` | Yes |\n| Web audit | `pnpm audit` | No |\n\n### Test Coverage (`coverage`)\n\nGenerate coverage reports:\n\n```bash\ncargo xtask coverage --open --output ./cov-report\n```\n\nRequires `cargo-llvm-cov`, which is auto-installed if missing.\n\n### License Compliance (`license-check`)\n\nVerify dependencies use acceptable licenses:\n\n```bash\ncargo xtask license-check --deny "GPL-3.0,AGPL-3.0"\n```\n\nUses `cargo-deny` if installed, falls back to `cargo metadata`.\n\n### Link Checking (`check-links`)\n\nValidate documentation links:\n\n```bash\ncargo xtask check-links --path docs --exclude "example.com"\n```\n\nUses `lychee` if installed, otherwise falls back to a basic relative-link checker.\n\n## Configuration Validation (`validate-config`)\n\nVerify `~/.librefang/config.toml`:\n\n```bash\ncargo xtask validate-config --config ./my-config.toml --show\n```\n\nValidates:\n\n- TOML syntax\n- Known fields present\n- Values within expected ranges\n\n## Migration (`migrate`)\n\nImport agents from other frameworks:\n\n```bash\ncargo xtask migrate --source openfang --source-dir ./import --dry-run\n```\n\n**Supported sources:**\n\n- `openclaw`\n- `openfang`\n\nUses the `librefang-migrate` crate internally for conversion logic.\n\n## Common Workflows\n\n### Full Release (Manual)\n\n```bash\n# 1. Ensure clean state\ncargo xtask doctor\ngit status  # should be clean\n\n# 2. Run CI locally\ncargo xtask ci --release\n\n# 3. Run integration tests\ncargo xtask integration-test --skip-llm\n\n# 4. Perform release\ncargo xtask release --version 2026.3.2214 --no-confirm\n```\n\n### New Contributor Setup\n\n```bash\n# Install all dependencies\ncargo xtask setup\n\n# Verify environment\ncargo xtask doctor\n\n# Start development\ncargo xtask dev\n```\n\n### Debugging a Release Issue\n\n```bash\n# Check changelog generation\ncargo xtask changelog 2026.3.22 v2026.3.2114\n\n# Check version sync\ncargo xtask sync-versions --dry-run 2026.3.2214\n\n# Verify config\ncargo xtask validate-config\n\n# Check license compliance\ncargo xtask license-check\n```\n\n## Extension Points\n\n### Adding a New Command\n\nTo add a command to xtask:\n\n1. Define a new `#[derive(Subcommand)]` variant in the enum\n2. Implement a handler function with `#[tokio::main]` if async\n3. Add documentation in this README following the existing format\n4. Update the command reference table\n\n### Custom Targets for `dist`\n\nEdit the target list in the `dist` command implementation to add new platforms or architectures.\n\n### Migration Source Plugins\n\nAdd new source support in `librefang-migrate` crate and reference it from the `migrate` command.',
                channels:
                    '# Channels\n\n# Channels Module (`librefang-channels`)\n\nProvides a **Channel Bridge Layer** that connects 40+ messaging platforms to the LibreFang kernel. Each platform adapter normalises its native message format into a unified `ChannelMessage`, then the bridge dispatches those messages to the appropriate agent. Responses flow back through the same adapter to the original user.\n\n## Overview\n\nThe module is split into two parts:\n\n| Part | Always compiled? | Purpose |\n|------|-----------------|---------|\n| Core infrastructure (`bridge`, `router`, `sanitizer`, `rate_limiter`, `formatter`, `types`, `message_journal`, `sidecar`, `http_client`) | Yes | Bridge logic, routing, security, formatting, crash recovery |\n| Channel adapters (40 individual modules) | No — each gated behind a `channel-xxx` Cargo feature | Platform-specific message normalisation and delivery |\n\n```mermaid\nblock-beta\n  columns 1\n\n  block:Telegram\n    columns 1\n    tg_adapter[TelegramAdapter]\n  end\n\n  block:Discord\n    columns 1\n    dc_adapter[DiscordAdapter]\n  end\n\n  block:Slack\n    columns 1\n    sl_adapter[SlackAdapter]\n  end\n\n  block:More_Adapters\n    columns 1\n    more[...]\n  end\n\n  adapters["40+ Channel Adapters<br/>(feature-gated)"]\n  bridge[BridgeManager<br/>dispatch, debounce, RBAC]\n  router[AgentRouter<br/>routing, bindings]\n  sanitizer[InputSanitizer<br/>prompt injection]\n  rate_limiter[ChannelRateLimiter]\n  kernel["librefang-api<br/>(ChannelBridgeHandle impl)"]\n\n  adapters --> bridge\n  bridge --> router\n  bridge --> sanitizer\n  bridge --> rate_limiter\n  bridge --> kernel\n```\n\n## Feature Flags\n\nAll 40+ channels are gated. The crate\'s `Cargo.toml` defines a `default` set of popular channels and an `all-channels` metafeature:\n\n```toml\n[features]\ndefault = ["channel-telegram", "channel-discord", "channel-slack", "channel-matrix", "channel-email"]\nall-channels = ["channel-bluesky", "channel-dingtalk", "channel-discord", ...]\n# ... one entry per channel\n```\n\nEnable a single channel in your `Cargo.toml`:\n\n```toml\nlibrefang-channels = { version = "...", features = ["channel-telegram"] }\n```\n\n## Core Types (`types.rs`)\n\n### `ChannelMessage`\n\nThe canonical message type all adapters produce. An inbound message from any platform is normalised into this shape:\n\n```rust\npub struct ChannelMessage {\n    pub channel:        ChannelType,\n    pub sender:         ChannelUser,\n    pub content:        ChannelContent,\n    pub is_group:       bool,\n    pub thread_id:      Option<String>,\n    pub timestamp:      DateTime<Utc>,\n    pub metadata:       HashMap<String, serde_json::Value>,\n    pub platform_message_id: String,\n}\n```\n\n### `ChannelContent`\n\nDiscriminated enum covering every content type LibreFang handles:\n\n```rust\npub enum ChannelContent {\n    Text(String),\n    Command { name: String, args: Vec<String> },   // slash commands\n    Image { url, caption, mime_type },\n    File { url, filename },\n    Voice { url, caption, duration_seconds },\n    Video { url, caption, duration_seconds },\n    Location { lat, f64, lon: f64 },\n    FileData { filename, data },\n    Interactive { text, payload },\n    ButtonCallback { action, message_text },\n}\n```\n\n### `ChannelType`\n\nPlatform discriminator used for routing and config lookups:\n\n```rust\npub enum ChannelType {\n    Telegram, Discord, Slack, WhatsApp, Signal,\n    Matrix, Email, Teams, Mattermost, WeChat,\n    WebChat, CLI, Custom(String),\n}\n```\n\n### `ChannelUser`\n\nIdentifies the sender on a channel:\n\n```rust\npub struct ChannelUser {\n    pub platform_id:   String,   // native user/chat ID\n    pub display_name:  String,\n    pub avatar_url:    Option<String>,\n    pub librefang_user: Option<String>, // optional LibreFang user ID (for cross-channel identity)\n}\n```\n\n### `SenderContext`\n\nPropagates sender identity to the agent\'s system prompt so the agent knows who is talking and from which channel. Built by `build_sender_context()` in `bridge.rs` from the incoming `ChannelMessage` and any per-channel overrides.\n\n```rust\npub struct SenderContext {\n    pub channel:                       String,\n    pub user_id:                       String,\n    pub display_name:                  String,\n    pub is_group:                      bool,\n    pub was_mentioned:                 bool,\n    pub thread_id:                     Option<String>,\n    pub account_id:                    Option<String>,\n    pub auto_route:                    AutoRouteStrategy,\n    pub auto_route_ttl_minutes:        u32,\n    pub auto_route_confidence_threshold: f32,\n    pub auto_route_sticky_bonus:       i32,\n    pub auto_route_divergence_count:   i32,\n}\n```\n\n## `ChannelAdapter` Trait\n\nEvery channel adapter implements `ChannelAdapter`, defined in `types.rs`. The trait is `async_trait`:\n\n```rust\n#[async_trait]\npub trait ChannelAdapter: Send + Sync {\n    fn name(&self) -> &str;\n    fn channel_type(&self) -> ChannelType;\n    fn supports_streaming(&self) -> bool { false }\n    fn suppress_error_responses(&self) -> bool { false }\n\n    // Start the adapter\'s receive loop and return a message stream.\n    async fn start(&self) -> Result<Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>, ...>;\n\n    // Provide webhook routes and stream together. If not implemented,\n    // the adapter falls back to standalone mode via start().\n    async fn create_webhook_routes(&self) -> Option<(axum::Router, Pin<Box<dyn Stream<Item = ChannelMessage> + Send>>)> { None }\n\n    async fn send(&self, user: &ChannelUser, content: ChannelContent) -> Result<(), String>;\n    async fn send_in_thread(&self, user: &ChannelUser, content: ChannelContent, thread_id: &str) -> Result<(), String> { ... }\n    async fn send_streaming(&self, user: &ChannelUser, text_rx: Receiver<String>, thread_id: Option<&str>) -> Result<(), String> { Err("Not supported".into()) }\n    async fn send_typing(&self, user: &ChannelUser) -> Result<(), String> { Ok(()) }\n    async fn send_reaction(&self, user: &ChannelUser, message_id: &str, reaction: &LifecycleReaction) -> Result<(), String> { Ok(()) }\n    async fn stop(&self) -> Result<(), String> { Ok(()) }\n    fn typing_events(&self) -> Option<Receiver<TypingEvent>> { None }\n}\n```\n\nThe two startup paths matter:\n\n- **`start()`** — adapter manages its own connection (long-lived WebSocket, polling loop, etc.). Returns a `Stream<ChannelMessage>`. Used by adapters that cannot expose a webhook (e.g., IRC, XMPP, Matrix).\n- **`create_webhook_routes()`** — adapter returns an `axum::Router` to be mounted on the shared HTTP server at `/channels/{name}/webhook`. This avoids each adapter needing its own HTTP port. Routes are collected by `BridgeManager::take_webhook_router()` and merged into the main API server.\n\n## Bridge Manager (`bridge.rs`)\n\n### `ChannelBridgeHandle` Trait\n\nDefines every kernel operation an adapter may call. It lives in `librefang-channels` to avoid circular dependencies (the kernel crate cannot be a dependency here). The actual implementation lives in `librefang-api/src/channel_bridge.rs`.\n\nKey methods:\n\n| Category | Methods |\n|----------|---------|\n| Messaging | `send_message`, `send_message_with_blocks`, `send_message_with_sender`, `send_message_streaming`, `send_message_streaming_with_sender` |\n| Agent lifecycle | `find_agent_by_name`, `list_agents`, `spawn_agent_by_name`, `reset_session`, `reboot_session`, `compact_session` |\n| Agent control | `set_model`, `stop_run`, `set_thinking` |\n| Info | `uptime_info`, `list_models_text`, `list_providers_text`, `list_skills_text`, `list_hands_text` |\n| Ephemeral | `send_message_ephemeral` — `/btw` side-question, no session history |\n| Security | `authorize_channel_user` — RBAC gate per channel/platform_id/action |\n| Overrides | `channel_overrides` — per-channel config (format, threading, command policy, rate limits) |\n| Streaming | `send_message_streaming` / `_with_sender` — text deltas piped back to adapter |\n| Delivery tracking | `record_delivery` — delivery receipts for cron/workflow pushes |\n| Auto-reply | `check_auto_reply` — engine decides whether to process a message |\n| Automation | `list_workflows_text`, `run_workflow_text`, `list_triggers_text`, `create_trigger_text`, `delete_trigger_text`, `list_schedules_text`, `manage_schedule_text`, `list_approvals_text`, `resolve_approval_text` |\n| System | `budget_text`, `peers_text`, `a2a_agents_text` |\n| Events | `subscribe_events` — broadcast receiver for `ApprovalRequested` and other kernel events |\n\nDefault implementations for most methods return `"Not available."` strings. The kernel is expected to override only the methods it supports.\n\n### `BridgeManager`\n\nOwns all running adapters and manages the dispatch pipeline.\n\n```rust\npub struct BridgeManager {\n    handle:       Arc<dyn ChannelBridgeHandle>,\n    router:       Arc<AgentRouter>,\n    rate_limiter: ChannelRateLimiter,\n    sanitizer:    Arc<InputSanitizer>,\n    adapters:     Vec<Arc<dyn ChannelAdapter>>,\n    webhook_routes: Vec<(String, axum::Router)>,\n    journal:      Option<MessageJournal>,\n    tasks:        Vec<tokio::task::JoinHandle<()>>,\n}\n```\n\nConstruction options (all chainable):\n\n```rust\nBridgeManager::new(handle, router)\n    .with_sanitizer(sanitize_config)   // override default sanitizer config\n    .with_journal(journal)             // enable crash recovery\n```\n\n### `start_adapter`\n\nAttaches an adapter to the manager. This is where the message dispatch pipeline begins:\n\n1. Call `adapter.create_webhook_routes()` if the adapter provides webhook routes; otherwise call `adapter.start()`.\n2. If `message_debounce_ms > 0`, enable the **debounce path** (see below).\n3. Otherwise, the **fast path**: each incoming `ChannelMessage` spawns a concurrent tokio task (limited by a semaphore of 32) that calls `dispatch_message()`.\n\n```rust\npub async fn start_adapter(\n    &mut self,\n    adapter: Arc<dyn ChannelAdapter>,\n) -> Result<(), Box<dyn std::error::Error + Send + Sync>>\n```\n\n### Message Debouncing\n\nWhen `message_debounce_ms` is configured for a channel (via `ChannelOverrides`), the bridge buffers rapid messages from the same sender and flushes them as a single merged dispatch after the debounce interval. This prevents a burst of 10 messages in 1 second from spawning 10 separate agent calls.\n\n```\nsender_key = "{channel_type}:{platform_id}"\n\non message → push to SenderBuffer → reset debounce timer\non debounce timer fires → drain buffer → dispatch merged message\non max_timer fires (hard limit) → drain immediately\non typing stop → reset debounce timer (typing pauses the flush)\n```\n\nMessages of the same type (text + text) are merged by concatenating with `\\n`. Multiple `/command` invocations with the same name are merged into a single command with combined args. Mixed content types always fall back to text concatenation.\n\n### Message Dispatch Pipeline\n\nBoth `dispatch_message()` (text path) and `dispatch_with_blocks()` (multimodal path) apply this sequence:\n\n```mermaid\nflowchart TD\n    A["1. Input sanitization\\n(prompt injection detection)"] --> B["2. Channel overrides lookup\\n(format, threading, policies)"]\n    B --> C{"3. DM/Group policy check"}\n    C -->|Group + policy mismatch| Z[return]\n    C -->|Pass| D["4. Rate limiting\\n(global + per-user)"]\n    D -->|Rate limited| Y[send_response + return]\n    D -->|Pass| E{"5. Built-in command?"}\n    E -->|yes + allowed| F["handle_command → send_response"]\n    E -->|no| G["6. RBAC authorize_channel_user"]\n    G -->|denied| X[send_response \'Access denied\' + return]\n    G -->|pass| H["7. Auto-reply check"]\n    H -->|auto-reply fires| W[send_response + record_delivery]\n    H -->|pass| I["8. Journal record\\n(crash recovery)"]\n    I --> J["9. Send typing indicator\\n(best-effort)"]\n    J --> K["10. Lifecycle reaction: ⏳ Queued → 🤔 Thinking"]\n    K --> L{"11. Adapter supports streaming?"}\n    L -->|yes| M["12a. send_message_streaming_with_sender\\ntee to adapter.send_streaming"]\n    L -->|no| N["12b. send_message_with_sender\\n(non-streaming)"]\n    M --> O{"13. Streaming ok?"}\n    O -->|yes| P["✅ Done reaction\\nupdate journal → Completed"]\n    O -->|fallback| Q["Send buffered text (non-streaming)\\n✅ Done reaction"]\n    N --> R{"14. Agent response received?"}\n    R -->|ok| S["send_response\\n✅ Done reaction\\nupdate journal → Completed"]\n    R -->|error| T["handle_send_error\\n❌ Error reaction\\nupdate journal → Failed"]\n```\n\n### Image Handling (`download_image_to_blocks`)\n\nWhen a `ChannelContent::Image` arrives, the bridge:\n\n1. **Detects MIME type** using a four-tier priority: adapter hint > Content-Type header (if `image/*`) > magic byte sniffing > URL extension.\n2. **Enforces size limits**: images > 5 MB are rejected with a text fallback.\n3. **Downscales** images > 200 KB to max 1024×1024 px using the `image` crate\'s `Triangle` filter, then re-encodes as JPEG. This protects the LLM context budget when users send multiple photos.\n4. **Saves to disk** (`/tmp/librefang_uploads/{uuid}.{ext}`) rather than base64-encoding into the session. The `ContentBlock::ImageFile` variant holds the path, keeping sessions lightweight.\n5. Falls back to base64 inline encoding if the file write fails.\n\n### Lifecycle Reactions\n\nThe bridge sends emoji reactions to the user\'s message as the agent processes it:\n\n| Phase | Emoji |\n|-------|-------|\n| Queued | ⏳ |\n| Thinking | 🤔 |\n| Streaming | 🔄 |\n| Done | ✅ |\n| Error | ❌ |\n\nThese are best-effort (non-blocking). The Telegram adapter sends them as actual Telegram message reactions; others log or skip silently.\n\n### Streaming Path\n\nWhen `adapter.supports_streaming()` returns `true`, the bridge:\n\n1. Calls `send_message_streaming_with_sender()`, receiving a `Receiver<String>` of text deltas.\n2. **Tees** the stream: one copy feeds `adapter.send_streaming()` (progressive display), another accumulates into a buffer.\n3. If `send_streaming()` succeeds → done.\n4. If it fails → falls back to `send_response()` with the accumulated buffer text.\n\nThis ensures the user always gets a response even if the streaming channel closes mid-stream.\n\n### Slash Commands\n\nThe bridge handles built-in slash commands directly without calling the LLM:\n\n| Command | Description |\n|---------|-------------|\n| `/start`, `/help` | Welcome and help text |\n| `/agents`, `/agent <name>` | List or select an agent |\n| `/new`, `/reboot`, `/compact` | Session management |\n| `/model [name]`, `/stop`, `/usage`, `/think` | Agent control |\n| `/models`, `/providers`, `/skills`, `/hands`, `/status` | System info |\n| `/btw <question>` | Ephemeral side-question |\n| `/workflows`, `/workflow run <name>` | Workflow management |\n| `/triggers`, `/trigger add/del` | Trigger management |\n| `/schedules`, `/schedule add/del/run` | Cron management |\n| `/approvals`, `/approve`, `/reject` | Approval workflow |\n| `/budget`, `/peers`, `/a2a` | System monitoring |\n\nCommands can be embedded in plain text (e.g., a user types `/agents` without a leading space). The bridge detects `text.starts_with(\'/\')` and routes to `handle_command()`.\n\n### Command Policy\n\nPer-channel overrides control which commands are allowed:\n\n```rust\n// Precedence (highest first):\n// 1. disable_commands = true  → all commands blocked\n// 2. allowed_commands non-empty  → whitelist (only these)\n// 3. blocked_commands non-empty  → blacklist (all except these)\n// 4. default  → everything allowed\nfn is_command_allowed(cmd: &str, overrides: Option<&ChannelOverrides>) -> bool\n```\n\nConfig entries accept either `"agent"` or `"/agent"` (leading slash is stripped for matching).\n\n### Group Policies\n\nWhen a message arrives in a group context, `should_process_group_message()` applies the configured `GroupPolicy`:\n\n| Policy | Behaviour |\n|--------|-----------|\n| `Ignore` | Silently drop |\n| `CommandsOnly` | Process only if `ChannelContent::Command` or text starting with `/` |\n| `MentionOnly` | Process only if `was_mentioned`, a command, or matches a regex trigger pattern |\n| `All` | Always process |\n\nRegex trigger patterns are compiled once into a `RegexSet` and cached in a `DashMap` keyed by the pattern set. Pattern compilation errors are logged but do not crash the bridge.\n\n### RBAC\n\nBefore forwarding any message to an agent, `dispatch_message()` calls `handle.authorize_channel_user(ct_str, sender_id, "chat")`. The default implementation allows everything. The kernel can override this to enforce per-channel, per-user permission checks.\n\n### Crash Recovery (`message_journal`)\n\nWhen a `MessageJournal` is attached, every inbound message is written to the journal **before** dispatch with status `Processing`. On success the status is updated to `Completed`; on failure to `Failed`. On startup, `recover_pending()` returns all `Processing` entries so the caller can re-dispatch them. The journal is compacted on graceful shutdown.\n\n### Approval Event Listener\n\n`start_approval_listener()` subscribes to kernel events and listens for `ApprovalRequested`. When one arrives, it logs a notification for each adapter. Concrete delivery (sending an inline-keyboard message to the specific user) is noted as a follow-up feature requiring per-adapter user tracking.\n\n### Push API\n\n`push_message()` is the bridge-level entry point for the REST API\'s `POST /api/agents/:id/push`. It validates inputs, then delegates to `handle.send_channel_push()`, which looks up the adapter by type and calls `ChannelAdapter::send()`. This allows external callers to trigger outbound messages without going through the agent loop.\n\n## Agent Router (`router.rs`)\n\nThe router resolves incoming messages to a target `AgentId` using:\n\n1. **Thread routing** — the adapter can tag a message with `metadata["thread_route_agent"]` to route it to a specific agent based on the conversation thread.\n2. **Binding context** — `resolve_with_context()` uses `account_id`, `guild_id`, `peer_id`, and `channel` to find a per-binding agent mapping.\n3. **User default** — `resolve()` checks if the user has a cached default agent.\n4. **Channel default** — fallback to the channel-wide default agent.\n5. **Sticky re-resolution** — if the cached channel default returns "Agent not found", the bridge re-resolves by name and retries once.\n\nBroadcast routing sends a single message to multiple agents in parallel or sequentially based on the configured `BroadcastStrategy`.\n\n## Input Sanitizer (`sanitizer.rs`)\n\nDetects prompt injection attacks in inbound text. Returns:\n\n- `Clean` — pass through\n- `Warned(reason)` — pass through but log\n- `Blocked(reason)` — return an error message to the user and abort dispatch\n\nConfigured via `SanitizeConfig` in `librefang-types`.\n\n## Rate Limiter (`rate_limiter.rs`)\n\nSliding-window rate limiter keyed on `{channel}:{sender_id}` and `{channel}:__global__`. Checks are per-override config (`rate_limit_per_minute`, `rate_limit_per_user`). Returns an error message string on limit breach.\n\n## Formatter (`formatter.rs`)\n\nTransforms agent response text for channel-specific conventions (markdown stripping, code block formatting, character limits). `default_output_format_for_channel()` returns a sensible default per channel type.\n\n## Sidecar (`sidecar.rs`)\n\nProvides a pre-configured `reqwest::Client` with sensible timeouts and proxy support for all channel adapters. The HTTP client is shared across the bridge for image downloads and webhook calls.\n\n## Adding a New Channel Adapter\n\n1. Create `crates/librefang-channels/src/{name}.rs` implementing `ChannelAdapter`.\n2. Add the module declaration in `lib.rs` with `#[cfg(feature = "channel-{name}")]` and a public re-export if needed.\n3. Add `channel-{name}` to `Cargo.toml` under the appropriate feature group.\n4. Implement `ChannelAdapter::start()` or `create_webhook_routes()` to produce a `Stream<Item = ChannelMessage>`.\n5. Implement `send()` (required) and any optional methods (`send_streaming`, `send_reaction`, etc.) your platform supports.\n6. Call `dispatch_message()` from the adapter\'s test suite to verify integration.\n\nThe adapter owns only platform-specific logic (API calls, WebSocket handling, signature verification). All routing, RBAC, rate limiting, sanitization, and agent dispatch are handled by `BridgeManager`.',
                cli: '# CLI\n\n# LibreFang CLI\n\nThe CLI (`librefang-cli`) is the primary user-facing interface for LibreFang. It provides a comprehensive command-line toolkit for initializing, configuring, and operating the LibreFang Agent OS, as well as managing agents, skills, channels, and the daemon lifecycle.\n\n## Overview\n\nLibreFang operates in two distinct modes:\n\n**Daemon Mode**: When `librefang start` launches the daemon, subsequent CLI invocations communicate with it over HTTP. The CLI becomes a lightweight client, delegating work to the running kernel process.\n\n**Single-Shot Mode**: When no daemon is running, CLI commands boot an in-process `LibreFangKernel` to execute the requested operation. This enables commands like `librefang init` and `librefang doctor` to work without a persistent daemon.\n\n```mermaid\nflowchart LR\n    subgraph "CLI Process"\n        A[librefang CLI] --> B{Command}\n        B -->|start| C[Daemon Process]\n        B -->|agent list| D{HTTP Request}\n        B -->|init| E[In-Process Kernel]\n    end\n    \n    C -->|runs| F[LibreFangKernel]\n    D -->|localhost| C\n    E -->|boots| F\n    \n    G[~/.librefang] --> |config, vault| C\n    G --> |config| E\n```\n\n## Entry Point and Command Dispatch\n\nThe `main()` function in `main.rs` handles several critical initialization steps before dispatching to command handlers:\n\n1. **rustls Crypto Provider**: Initializes the AWS-LC-RS crypto provider for TLS operations (required by rustls 0.23+)\n2. **Environment Loading**: Loads `~/.librefang/.env` into the process environment via `dotenv::load_dotenv()`\n3. **Internationalization**: Initializes i18n with the configured language (defaults to English)\n4. **Tracing Setup**: Configures logging based on whether the command uses TUI mode or CLI mode\n5. **Ctrl+C Handler**: Installs a platform-specific handler for clean interrupt handling (primarily Windows/MINGW)\n\n### TUI vs CLI Mode Detection\n\nThe CLI detects whether it\'s entering TUI mode (terminal user interface) or remaining in standard CLI mode:\n\n```rust\nlet is_tui_mode = is_launcher\n    || matches!(cli.command, Some(Commands::Tui))\n    || matches!(cli.command, Some(Commands::Chat { .. }))\n    || matches!(cli.command, Some(Commands::Agent(AgentCommands::Chat { .. })));\n```\n\nTUI mode requires special handling:\n- **No Ctrl+C handler**: TUI mode bypasses the Ctrl+C handler because `process::exit()` bypasses `ratatui::restore()`, leaving the terminal in raw mode\n- **File-based tracing**: Logs write to `tui.log` instead of stderr to avoid corrupting the terminal display\n\n### Command Matching\n\nThe `main()` function uses exhaustive pattern matching on `cli.command` to dispatch to handler functions. Each command variant maps to a dedicated `cmd_*` function:\n\n```rust\nmatch cli.command {\n    Some(Commands::Tui) => tui::run(cli.config),\n    Some(Commands::Init { quick, upgrade }) => { ... }\n    Some(Commands::Agent(sub)) => match sub {\n        AgentCommands::List { json } => cmd_agent_list(cli.config, json),\n        AgentCommands::Chat { agent_id } => cmd_agent_chat(cli.config, &agent_id),\n        // ...\n    },\n    // ... 60+ command variants\n}\n```\n\n## Daemon Communication\n\n### Daemon Detection\n\nWhen executing commands that require the daemon, the CLI first checks if one is running:\n\n```rust\npub(crate) fn find_daemon() -> Option<String> {\n    find_daemon_in_home(&cli_librefang_home())\n}\n\nfn find_daemon_in_home(home_dir: &PathBuf) -> Option<String> {\n    let info = read_daemon_info(home_dir)?;\n    let addr = info.listen_addr.replace("0.0.0.0", "127.0.0.1");\n    let url = format!("http://{addr}/api/health");\n    // ...\n}\n```\n\nThe daemon writes its connection info to `~/.librefang/daemon.json`, which the CLI reads to discover the API endpoint.\n\n### HTTP Client Building\n\nThe `daemon_client()` function constructs an HTTP client with appropriate timeouts and authentication:\n\n```rust\npub(crate) fn daemon_client() -> reqwest::blocking::Client {\n    daemon_client_with_api_key(read_api_key().as_deref())\n}\n\nfn daemon_client_with_api_key(api_key: Option<&str>) -> reqwest::blocking::Client {\n    let mut builder = http_client::client_builder()\n        .timeout(Duration::from_secs(120));\n\n    if let Some(key) = api_key {\n        let mut headers = HeaderMap::new();\n        headers.insert(AUTHORIZATION, HeaderValue::from_str(&format!("Bearer {key}")).unwrap());\n        builder = builder.default_headers(headers);\n    }\n    builder.build().expect("Failed to build HTTP client")\n}\n```\n\nWhen `api_key` is configured in `config.toml`, the client automatically includes `Authorization: Bearer <key>` on every request.\n\n### JSON Response Handling\n\nThe `daemon_json()` helper parses responses and provides user-friendly error messages:\n\n```rust\npub(crate) fn daemon_json(resp: Result<Response, reqwest::Error>) -> Value {\n    match resp {\n        Ok(r) => { /* check status, return body */ }\n        Err(e) => {\n            if msg.contains("Connection refused") {\n                ui::error_with_fix(&i18n::t("error-connect-refused"),\n                    &i18n::t("error-connect-refused-fix"));\n            }\n            std::process::exit(1);\n        }\n    }\n}\n```\n\n## Daemon Lifecycle Management\n\n### Starting the Daemon\n\n`cmd_start()` handles daemon startup with three modes:\n\n1. **Detached (default)**: Spawns the process in the background, waits for it to become healthy, then returns\n2. **Foreground**: Runs the kernel inline within the CLI process\n3. **Spawned (internal)**: Used when the detached child relaunches itself with `--spawned`\n\n```rust\nfn cmd_start(config: Option<PathBuf>, tail: bool, spawned: bool, foreground: bool) {\n    // Check if already running\n    if let Some(base) = find_daemon_in_home(&daemon.home_dir) {\n        ui::error_with_fix(&i18n::t_args("daemon-already-running", &[("url", &base)]), ...);\n    }\n\n    if !spawned && !foreground {\n        // Detached mode: spawn and wait\n        let log_path = daemon_log_path_for_config(config.as_deref());\n        let mut child = spawn_detached_daemon(config.as_deref(), &log_path)?;\n        // Wait for health check...\n    } else {\n        // Foreground mode: boot kernel inline\n        let rt = tokio::runtime::Runtime::new().unwrap();\n        rt.block_on(async {\n            let kernel = LibreFangKernel::boot(config.as_deref())?;\n            librefang_api::server::run_daemon(kernel, &listen_addr, ...).await\n        });\n    }\n}\n```\n\n### Detached Daemon Spawning\n\n`spawn_detached_daemon()` creates a properly backgrounded process:\n\n- **Unix**: Uses `setsid()` to create a new session, orphaning the process from the terminal\n- **Windows**: Uses `DETACHED_PROCESS | CREATE_NEW_PROCESS_GROUP | CREATE_NO_WINDOW` flags\n- **Log redirection**: Both stdout and stderr append to the daemon log file\n\n```rust\n#[cfg(unix)]\ncommand.pre_exec(|| {\n    if libc::setsid() == -1 {\n        return Err(io::Error::last_os_error());\n    }\n    Ok(())\n});\n```\n\n## Initialization (`librefang init`)\n\nThe init command sets up the LibreFang home directory and configuration:\n\n1. **Create directories**: `~/.librefang/` and `~/.librefang/data/` with mode 0700\n2. **Sync registry**: Downloads provider/integration metadata from the registry\n3. **Initialize vault**: Creates the encrypted credential store\n4. **Init git repo**: Sets up version control for configuration\n5. **Detect provider**: Auto-detects available API keys\n6. **Write config**: Creates `config.toml` with sensible defaults\n\n### Provider Auto-Detection\n\n`detect_best_provider()` probes for available API keys across 13+ providers:\n\n```rust\nfn detect_best_provider() -> (String, String, String) {\n    // 1. Check cloud providers via runtime registry\n    if let Some((provider, _model, env_var)) =\n        librefang_runtime::drivers::detect_available_provider()\n    {\n        return (provider, env_var, default_model_for_provider(provider));\n    }\n\n    // 2. Check Ollama (local, no API key needed)\n    if check_ollama_available() {\n        return ("ollama".to_string(), "OLLAMA_API_KEY".to_string(),\n            default_model_for_provider("ollama"));\n    }\n\n    // 3. Launch TUI guide for free provider setup\n    if let Some(result) = guide_free_provider_setup() {\n        return result;\n    }\n}\n```\n\n### Upgrade Path\n\nWhen `config.toml` already exists, `librefang init` redirects to the upgrade flow (`cmd_init_upgrade()`) to preserve user settings:\n\n```rust\nif !quick && librefang_dir.join("config.toml").exists() {\n    ui::hint("Existing installation detected — running upgrade to preserve your settings.");\n    cmd_init_upgrade();\n    return;\n}\n```\n\nThe upgrade process:\n1. Backs up existing config with timestamp\n2. Syncs registry (TTL=0 forces refresh)\n3. Merges new default fields without overwriting existing values\n4. Detects and warns about legacy `.openclaw` installations\n\n## Security Features\n\n### File Permission Hardening\n\nOn Unix systems, sensitive files and directories receive restricted permissions:\n\n```rust\n#[cfg(unix)]\npub(crate) fn restrict_file_permissions(path: &Path) {\n    use std::os::unix::fs::PermissionsExt;\n    let _ = std::fs::set_permissions(path, std::fs::Permissions::from_mode(0o600));\n}\n\n#[cfg(unix)]\npub(crate) fn restrict_dir_permissions(path: &Path) {\n    let _ = std::fs::set_permissions(path, std::fs::Permissions::from_mode(0o700));\n}\n```\n\nApplied to:\n- `~/.librefang/` directory (0700)\n- `config.toml` (0600)\n- Config backups (0600)\n\n### Ctrl+C Handler\n\nWindows/MINGW environments receive special handling because the default signal handler doesn\'t reliably interrupt blocking `read_line` calls:\n\n```rust\n#[cfg(windows)]\nunsafe extern "system" fn handler(_ctrl_type: u32) -> i32 {\n    if CTRLC_PRESSED.swap(true, Ordering::SeqCst) {\n        // Second press: hard exit\n        std::process::exit(130);\n    }\n    // First press: exit cleanly\n    let _ = std::io::Write::write_all(&mut std::io::stderr(), b"\\nInterrupted.\\n");\n    std::process::exit(0);\n}\n```\n\n### Credential Vault\n\nAPI keys are stored in an encrypted vault (`vault.enc`) rather than plaintext in config files:\n\n```rust\nfn init_vault_if_missing(librefang_dir: &Path) {\n    let vault_path = librefang_dir.join("vault.enc");\n    if vault_path.exists() { return; }\n\n    let mut vault = librefang_extensions::vault::CredentialVault::new(vault_path);\n    if let Err(e) = vault.init() {\n        tracing::debug!("vault init skipped: {e}"); // Silent failure\n    }\n}\n```\n\n## Configuration\n\n### Home Directory Resolution\n\nThe LibreFang home directory resolves with this priority:\n\n```rust\nfn cli_librefang_home() -> PathBuf {\n    if let Ok(home) = std::env::var("LIBREFANG_HOME") {\n        return PathBuf::from(home);\n    }\n    dirs::home_dir()\n        .unwrap_or_else(std::env::temp_dir)\n        .join(".librefang")\n}\n```\n\n### Lightweight Config Reading\n\nCommands that need specific config values without full deserialization use TOML parsing:\n\n```rust\nfn load_log_level_from_config() -> String {\n    let level = (|| -> Option<String> {\n        let config_path = dirs::home_dir()?.join(".librefang").join("config.toml");\n        let content = std::fs::read_to_string(&config_path).ok()?;\n        let config: toml::Value = toml::from_str(&content).ok()?;\n        config.get("log_level")?.as_str().map(|s| s.to_string())\n    })();\n    level.unwrap_or_else(|| "info".to_string())\n}\n```\n\nThis avoids the overhead of fully deserializing the config struct when only one field is needed.\n\n## Module Structure\n\n| Module | Purpose |\n|--------|---------|\n| `main.rs` | Entry point, command dispatch, daemon management, init flow |\n| `ui.rs` | User-facing output helpers (success, error, hint, banner) |\n| `http_client.rs` | Reusable HTTP client configuration |\n| `i18n.rs` | Internationalization with runtime language loading |\n| `tui/` | Terminal user interface using ratatui |\n| `templates.rs` | Agent template loading and management |\n| `progress.rs` | OSC-based progress indicators for terminals |\n| `table.rs` | ASCII table formatting for CLI output |\n| `mcp.rs` | Model Context Protocol server over stdio |\n| `launcher.rs` | Interactive launcher for first-time users |\n| `dotenv.rs` | `.env` file loading |\n| `desktop_install.rs` | Tauri desktop app detection and installation |\n\n## Key Dependencies\n\n- **clap**: Command-line argument parsing with subcommands\n- **reqwest**: HTTP client for daemon communication\n- **tokio**: Async runtime for daemon foreground mode\n- **ratatui**: Terminal UI framework for TUI screens\n- **tracing/tracing-subscriber**: Structured logging\n- **toml**: Configuration file parsing\n- **librefang_kernel**: Core kernel implementation\n- **librefang_api**: Daemon HTTP API server\n- **librefang_runtime**: Model catalog, registry, drivers',
                configuration:
                    '# Configuration\n\n# Configuration Module\n\nLibreFang uses a single TOML configuration file at `~/.librefang/config.toml` to control all aspects of the Agent OS. The configuration system supports environment variable interpolation, hot-reload, vault-based credential storage, and sensible defaults for every field.\n\n## Overview\n\nThe configuration system lives in `librefang-kernel` and is represented by the `KernelConfig` struct. Every field has a default value, so the config file is entirely optional — LibreFang boots with sensible defaults on first run.\n\n```mermaid\ngraph LR\n    A[config.toml] --> B[KernelConfig<br/>serdeDeserialize]\n    C[Environment Variables] --> B\n    D[Vault<br/>vault.enc] --> B\n    B --> E[Runtime Values]\n    E --> F[Kernel]\n    E --> G[API Server]\n    E --> H[Channels]\n```\n\n## Config File Location\n\n| Environment | Path |\n|-------------|------|\n| Linux/macOS | `~/.librefang/config.toml` |\n| Windows | `%USERPROFILE%\\.librefang\\config.toml` |\n| Custom | `LIBREFANG_CONFIG=/path/to/config.toml` |\n\n## Environment Variable Interpolation\n\nConfig values support `${VAR_NAME}` syntax for secrets:\n\n```toml\n# Environment variable\napi_key_env = "ANTHROPIC_API_KEY"\n\n# Vault reference (encrypted storage)\ndashboard_pass = "vault:dashboard_password"\n\n# Base64-encoded literal (rare)\n# secret_key = "base64:SGVsbG9Xb3JsZAo="\n```\n\n## Configuration Reference\n\n### Server\n\n```toml\napi_listen = "0.0.0.0:4545"   # Bind address; use "127.0.0.1:4545" for local-only\nlog_level = "info"            # trace | debug | info | warn | error\nmode = "default"              # stable | default | dev\n```\n\n### Dashboard Authentication\n\n```toml\ndashboard_user = "librefang"\ndashboard_pass = "librefang"  # Change this immediately after first login\n\n# Secure storage options:\ndashboard_pass = "vault:dashboard_password"  # Encrypted vault\ndashboard_pass = "env:LIBREFANG_DASHBOARD_PASS"  # Environment variable\n```
