ic counters, gauges, and histograms that other crates in the workspace record during runtime.\n\n## Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `metrics` (workspace) | The `metrics` facade crate ŌĆö provides the `counter!`, `gauge!`, `histogram!`, and `describe_*!` macros used to define and emit metrics. |\n| `librefang-types` | Shared domain types. Telemetry labels and metric dimensions reference types defined here (e.g., game identifiers, player states). |\n\n## Role in the Workspace\n\nThis crate sits alongside `librefang-types` as a leaf dependency: other workspace crates depend on it, but it does not depend on any application or server crate. The dependency direction is:\n\n```\nlibrefang-server  ŌöĆŌöĆŌ¢║  librefang-telemetry  ŌöĆŌöĆŌ¢║  librefang-types\nlibrefang-game    ŌöĆŌöĆŌ¢║  librefang-telemetry  ŌöĆŌöĆŌ¢║  librefang-types\n       ...                (records metrics)        (shared types)\n```\n\nOther crates call into `librefang-telemetry` at key points in their execution (connection handling, game events, errors) to record measurements. This crate itself makes no outgoing calls to other workspace modules.\n\n## Usage Pattern\n\nConsumers import this crate and call its metric-registration functions at startup (to describe and initialize metrics), then use the `metrics` macros or helper functions throughout their code paths to emit data points:\n\n```rust\n// At application startup ŌĆö registers and describes metrics\nlibrefang_telemetry::install();\n\n// During runtime ŌĆö record a measurement\ncounter!(\"librefang_connections_total\", \"protocol\" => \"tcp\").increment(1);\n```\n\n## Notes\n\n- This crate does **not** configure an exporter. The choice of Prometheus endpoint, OpenTelemetry push/pull, or console output is left to the final binary crate, which pulls in the appropriate `metrics-exporter-*` implementation.\n- Because the `metrics` crate uses a global receiver, calls made before an exporter is installed are no-ops ŌĆö tests and benchmarks can run without any telemetry backend.\n","other-librefang-testing":"# Other ŌĆö librefang-testing\n\n# librefang-testing\n\nTest infrastructure crate providing mock implementations and HTTP route test utilities for the Librefang ecosystem.\n\n## Purpose\n\nThis crate centralizes all test-only code so that other crates never need to pull in mock-specific dependencies in production builds. It ships three categories of test support:\n\n1. **Mock kernel** ŌĆö an in-memory stand-in for `librefang-kernel` that skips real I/O.\n2. **Mock LLM driver** ŌĆö a deterministic fake for the LLM backend used by the runtime.\n3. **API route test utilities** ŌĆö helpers for constructing `axum` test requests against `librefang-api` routes without binding a real HTTP listener.\n\n## Dependencies & Integration\n\n| Dependency | Why it's here |\n|---|---|\n| `librefang-types` | Re-exports shared domain types so tests can construct fixtures. |\n| `librefang-kernel` | The real kernel trait/interface that the mock must satisfy. |\n| `librefang-runtime` | The runtime under test; tests feed it the mock kernel and mock LLM. |\n| `librefang-api` (feature `telemetry`) | Route definitions. Tests build an `axum::Router` from these and fire requests through it. |\n| `axum` / `tower` | Used to assemble a one-shot `Service` for route-level HTTP tests. |\n| `tokio` | Async test runtime. |\n| `serde_json` | JSON body construction and assertion helpers. |\n| `dashmap` | Concurrent map used internally by mocks to track state across await points. |\n| `tempfile` | Temporary directories for tests that touch the filesystem. |\n| `uuid` | Generating deterministic or random test IDs. |\n| `http-body-util` | Reading response bodies in route tests. |\n\n## Architecture\n\n```mermaid\ngraph TD\n    T[librefang-testing] --> MK[Mock Kernel]\n    T --> ML[Mock LLM Driver]\n    T --> RT[Route Test Helpers]\n    MK -.-> K[librefang-kernel trait]\n    ML -.-> LR[librefang-runtime LLM interface]\n    RT -.-> A[librefang-api Router]\n```\n\nTests in other crates depend on `librefang-testing` as a dev-dependency. The test code instantiates the mocks it needs, wires them into the component under test, and optionally uses the route helpers to exercise HTTP endpoints end-to-end.\n\n## Usage Patterns\n\n### Adding to a crate's dev-dependencies\n\n```toml\n[dev-dependencies]\nlibrefang-testing = { path = \"../librefang-testing\" }\n```\n\n### Route-level testing\n\nThe route helpers wrap `tower::ServiceExt` to send a request through an `axum::Router` without a live server. A typical test:\n\n1. Build a `Router` from `librefang-api`, injecting the mock kernel and mock LLM via state.\n2. Construct an `axum::extract::Request` (or use a convenience builder from this crate).\n3. Call `tower::ServiceExt::oneshot(router, request)` and inspect the response.\n\nThis keeps tests fastŌĆöno TCP, no real LLM, no real kernel I/OŌĆöwhile still exercising the full middleware and handler stack.\n\n### Mock state inspection\n\nMocks built with `dashmap` allow tests to inspect internal state (e.g., how many times the kernel was called, what arguments were passed) from concurrent test tasks without external synchronization.\n\n## Design Notes\n\n- **No production code depends on this crate.** It is exclusively a `[dev-dependencies]` target.\n- The `librefang-api` dependency enables only the `telemetry` feature and uses `default-features = false` to avoid pulling in server-side extras (like real TLS or listener setup) that route tests don't need.\n- Because no execution flows originate or terminate here, the mocks are entirely passiveŌĆöthey respond to calls from the runtime and API layers under test.","other-librefang-types-locales":"# Other ŌĆö librefang-types-locales\n\n# librefang-types-locales\n\nFluent (`.ftl`) message catalogs providing localized API error strings for the LibreFang platform. This is a pure data module ŌĆö no executable code, no call graph. Other crates resolve these message IDs at runtime via a Fluent localization library.\n\n## Supported Locales\n\n| Code | Language | Completeness |\n|------|----------|-------------|\n| `en` | English | **Full** ŌĆö canonical source of truth |\n| `ja` | Japanese | Near-full |\n| `de` | German | Partial (core subset) |\n| `es` | Spanish | Partial (core subset) |\n| `fr` | French | Partial (core subset) |\n| `zh-CN` | Simplified Chinese | Partial (core subset + tool errors) |\n\n## File Layout\n\n```\nlibrefang-types/locales/\nŌö£ŌöĆŌöĆ en/errors.ftl      # canonical ŌĆö all message IDs defined here\nŌö£ŌöĆŌöĆ ja/errors.ftl\nŌö£ŌöĆŌöĆ de/errors.ftl\nŌö£ŌöĆŌöĆ es/errors.ftl\nŌö£ŌöĆŌöĆ fr/errors.ftl\nŌööŌöĆŌöĆ zh-CN/errors.ftl\n```\n\nEach file contains a single Fluent resource: `errors.ftl`. The locale directory name doubles as the Fluent locale identifier.\n\n## Message ID Convention\n\nEvery identifier follows the pattern:\n\n```\napi-error-<category>-<detail>\n```\n\nLowercase, hyphen-separated. No dots, no uppercase. This namespace is flat ŌĆö there is no hierarchical grouping in the identifier itself, only in the source-level comments.\n\n## Error Categories\n\nThe English catalog defines messages across these functional areas:\n\n| Category | Prefix | Typical concerns |\n|----------|--------|-----------------|\n| Agent | `api-error-agent-*` | Spawn, lookup, workspace, execution, cloning, sort validation |\n| Message | `api-error-message-*` | Size limits (64 KB), delivery, streaming |\n| Template | `api-error-template-*` | Name validation, parsing, manifest requirements |\n| Manifest | `api-error-manifest-*` | Size limits (1 MB), format, signature verification |\n| Auth | `api-error-auth-*` | API key validation, missing headers, provider config |\n| Session | `api-error-session-*` | Load, lookup, cleanup, label resolution |\n| Workflow | `api-error-workflow-*` | Step validation, execution, ID format |\n| Trigger | `api-error-trigger-*` | Pattern validation, agent binding, registration |\n| Budget | `api-error-budget-*` | Amount validation, update failures |\n| Config | `api-error-config-*` | Parse/write/save/remove operations |\n| Profile | `api-error-profile-*` | Lookup by name |\n| Cron | `api-error-cron-*` | Expression validation (5-field), creation |\n| Goal | `api-error-goal-*` | CRUD, hierarchy (parent/circular), status enum, field length |\n| Memory | `api-error-memory-*` | Enablement check, KV operations, serialization, export/import |\n| Network / A2A | `api-error-network-*` | Peer-to-peer, A2A agent discovery, connection/auth failures |\n| Plugin | `api-error-plugin-*` | Source validation (registry/local/git), missing fields |\n| Channel | `api-error-channel-*` | Agent ID validation, from/to checks |\n| Provider | `api-error-provider-*` | Alias management, model registration, secrets, URL validation |\n| Skill | `api-error-skill-*` | Name constraints, directory creation, TOML writes, install |\n| Hand | `api-error-hand-*` | Definition/instance lookup |\n| MCP | `api-error-mcp-*` | Server configuration, transport validation |\n| Integration / Extension | `api-error-integration-*`, `api-error-extension-*` | ID-based lookup |\n| System | `api-error-system-*` | CLI availability |\n| KV | `api-error-kv-*` | Structured memory field/value/path requirements |\n| Approval | `api-error-approval-*` | ID format, lookup |\n| Webhook | `api-error-webhook-*` | URL validation, event types, reachability, publishing |\n| Backup | `api-error-backup-*` | Archive validation, manifest presence, file operations |\n| Schedule | `api-error-schedule-*` | CRUD, cron expression validation |\n| Job | `api-error-job-*` | Retryable state checks, disappearance |\n| Task | `api-error-task-*` | Lookup, disappearance |\n| Pairing | `api-error-pairing-*` | Enablement, token validation |\n| Binding | `api-error-binding-*` | Index range |\n| Command | `api-error-command-*` | Command lookup |\n| File / Upload | `api-error-file-*` | Whitelist, size limits, path traversal, content type, depth |\n| Tool | `api-error-tool-*` | Allowlist/blocklist, invoke permissions, agent context |\n| Validation | `api-error-validation-*` | General field constraints (content, name, title, avatar, color) |\n| General | `api-error-not-found`, `api-error-internal`, `api-error-bad-request`, `api-error-rate-limited` | Catch-all HTTP-level errors |\n\n## Interpolation Variables\n\nMessages use Fluent placeable syntax for dynamic values. The variables in use across the catalogs are:\n\n| Variable | Used in | Example message |\n|----------|---------|----------------|\n| `{ $reason }` | `message-delivery-failed`, `bad-request` | Reason for failure or rejection |\n| `{ $error }` | `template-parse-failed`, `config-parse-failed`, `agent-execution-failed`, `cron-create-failed`, `goal-save-failed`, `network-connection-failed`, `skill-dir-create-failed`, `mcp-invalid-config`, `webhook-url-unreachable`, `backup-*-failed`, `schedule-*-failed`, `provider-secrets-*-failed`, `provider-token-save-failed` | Underlying error detail |\n| `{ $name }` | `template-not-found`, `profile-not-found`, `provider-alias-not-found`, `provider-not-found`, `provider-unknown`, `mcp-not-found`, `command-not-found`, `tool-not-found`, `tool-invoke-denied` | Entity name |\n| `{ $id }` | `agent-not-found-with-id`, `goal-not-found-with-id`, `goal-parent-not-found`, `hand-not-found`, `integration-not-found`, `extension-not-found` | Entity identifier |\n| `{ $step }` | `workflow-step-needs-agent` | Step name in a workflow |\n| `{ $url }` | `network-a2a-not-found`, `network-missing-url` | URL parameter |\n| `{ $status }` | `network-auth-failed` | HTTP status code |\n| `{ $alias }` | `provider-alias-exists`, `provider-alias-not-found` | Provider alias |\n| `{ $provider }` | `provider-model-exists` | Provider name |\n| `{ $max }` | `skill-description-too-long`, `file-too-large` | Maximum allowed value |\n| `{ $event }` | `webhook-unknown-event` | Event type string |\n| `{ $valid }` | `agent-invalid-sort`, `webhook-unknown-event` | List of valid options |\n| `{ $field }` | `agent-invalid-sort` | Field name |\n\n## Adding a New Error Message\n\n1. **Add the identifier to `en/errors.ftl` first.** The English catalog is the canonical source. Choose the correct category prefix and a descriptive suffix.\n\n2. **Add translations to other locale files.** At minimum, add the same identifier to all locale files. If a translation is not yet ready, you may omit it ŌĆö Fluent will fall back to English for missing keys ŌĆö but this should be tracked as a translation gap.\n\n3. **Use variables, not string concatenation.** Reference dynamic values as `{ $variableName }` in the message body. Pass them as a Fluent args map at the call site.\n\nExample addition to `en/errors.ftl`:\n\n```fluent\n# Widget errors\napi-error-widget-not-found = Widget '{ $id }' not found\napi-error-widget-creation-failed = Failed to create widget: { $error }\n```\n\nCorresponding entry in `ja/errors.ftl`:\n\n```fluent\n# Ńé”ŃéŻŃéĖŃé¦ŃāāŃāłŃé©Ńā®Ńā╝\napi-error-widget-not-found = Ńé”ŃéŻŃéĖŃé¦ŃāāŃāł '{ $id }' ŃüīĶ”ŗŃüżŃüŗŃéŖŃüŠŃüøŃéō\napi-error-widget-creation-failed = Ńé”ŃéŻŃéĖŃé¦ŃāāŃāłŃü«õĮ£µłÉŃü½Õż▒µĢŚŃüŚŃüŠŃüŚŃü¤: { $error }\n```\n\n## Adding a New Locale\n\n1. Create a new directory under `locales/` with the appropriate BCP 47 tag (e.g., `pt-BR/`).\n2. Create `errors.ftl` inside it.\n3. Translate entries from the English catalog. Keep the identifiers **identical** ŌĆö only the right-hand-side message text changes.\n4. Register the new locale in the application's localization bundle initialization.\n\n## Locale Completeness\n\nThe non-English locales fall into two tiers based on coverage:\n\n- **Near-complete** (`ja`): Covers all categories including goal, memory, network, plugin, channel, provider, skill, hand, MCP, integration/extension, system, KV, approval, webhook, backup, schedule, job, task, pairing, binding, command, file, tool, and validation errors.\n- **Core subset** (`de`, `es`, `fr`, `zh-CN`): Covers agent, message, template, manifest, auth, session, workflow, trigger, budget, config, profile, cron, and general errors. Notably missing are goal, memory, network, plugin, channel, provider, skill, hand, MCP, webhook, backup, schedule, job, file, tool, and validation categories. `zh-CN` additionally includes tool errors.\n\nWhen consuming messages at runtime, ensure the fallback chain terminates at `en` so that missing translations in partial locales degrade gracefully.\n\n## Integration with the Codebase\n\nThis module is consumed by the `librefang-types` crate, which exposes typed error enums or response structures that reference these Fluent message IDs. The typical usage pattern:\n\n1. Application code raises a typed error (e.g., `AgentNotFound`).\n2. The error handler maps it to the Fluent message ID `api-error-agent-not-found`.\n3. The localization layer looks up the message in the current locale's `errors.ftl`, interpolating any variables.\n4. The rendered string is returned to the client in the API response.\n\nBecause this module is pure static data, it has no dependencies and no runtime behavior. It is included in the build as a resource file (via `include_str!` or a build-time copy step, depending on the consuming crate's approach).","other-librefang-types-src":"# Other ŌĆö librefang-types-src\n\n# librefang-types ŌĆö Model Catalog Types\n\nShared data structures for the model registry. This crate is the single source of truth for types that represent AI models, providers, authentication state, and catalog file formats. It contains no business logic ŌĆö only serialization-ready types consumed by the runtime, metering kernel, and API routes.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TOML[\"providers/*.toml<br/>(Catalog Files)\"] -->|deserialize| MCF[ModelCatalogFile]\n    TOML -->|deserialize| ACF[AliasesCatalogFile]\n    MCF --> PCT[ProviderCatalogToml]\n    MCF --> MCE[ModelCatalogEntry]\n    PCT -->|From into| PI[ProviderInfo]\n    MCE -->|validate| Runtime[\"librefang-runtime<br/>(model_catalog, model_metadata)\"]\n    PI --> Runtime\n    MCE --> Metering[\"librefang-kernel-metering<br/>(cost estimation)\"]\n    MO[ModelOverrides] -->|persisted to disk| Disk[\"~/.librefang/model_overrides.json\"]\n```\n\n## Enums\n\n### `ModelTier`\n\nA model's capability bracket. Serialized as lowercase strings (`\"frontier\"`, `\"smart\"`, etc.). Defaults to `Balanced`.\n\n| Variant | Semantics | Examples |\n|---------|-----------|---------|\n| `Frontier` | Cutting-edge, most capable | Claude Opus, GPT-4.1 |\n| `Smart` | Capable and cost-effective | Claude Sonnet, Gemini 2.5 Flash |\n| `Balanced` | Speed/cost tradeoff (default) | GPT-4o-mini, Groq Llama |\n| `Fast` | Cheapest, fastest | ŌĆö |\n| `Local` | Self-hosted via Ollama, vLLM, LM Studio | ŌĆö |\n| `Custom` | User-defined at runtime | ŌĆö |\n\n### `AuthStatus`\n\nProvider authentication state, detected at runtime. This is the field that drives UI visibility of provider setup prompts and API call routing decisions.\n\nKey behaviors:\n\n- **`is_available()`** ŌĆö returns `true` for `ValidatedKey`, `Configured`, `AutoDetected`, `ConfiguredCli`, and `NotRequired`. Returns `false` for `InvalidKey`, `Missing`, `CliNotInstalled`, and `LocalOffline`. The key distinction: `InvalidKey` means credentials exist but are rejected (HTTP 401/403), so the provider is not usable.\n- **`LocalOffline`** is special ŌĆö it's set when a local provider's port isn't listening, and only the probe logic can transition it back to `NotRequired`. Calling `detect_auth()` won't reset it.\n- Defaults to `Missing`.\n\n### `Modality`\n\nWhat kind of output a model produces. This determines which fields in `ModelCatalogEntry` are required.\n\n- `Text` (default) ŌĆö chat/completion models. **Must** have non-zero `context_window` and `max_output_tokens` (enforced by `validate()`).\n- `Image` ŌĆö image-generation models (e.g. gpt-image-2). Context fields default to 0 and are not validated.\n- `Audio` ŌĆö TTS/STT models. Same relaxed validation as `Image`.\n- `Video` ŌĆö video-generation models.\n- `Music` ŌĆö music/lyrics generation.\n\n### `ModelType`\n\nModel classification for inference routing: `Chat` (default), `Speech`, or `Embedding`. Used in `ModelOverrides` to override how a model is treated regardless of what the catalog says.\n\n## Structs\n\n### `ModelCatalogEntry`\n\nA single model in the catalog. This is the core record that flows through the entire system ŌĆö from TOML deserialization through cost estimation to the API layer.\n\n#### Critical: zero-value semantics for `context_window` and `max_output_tokens`\n\nBoth fields use `#[serde(default)]`, meaning absent TOML keys deserialize to `0`. For non-text modalities this is expected and correct. For `Text` models, a `0` would silently corrupt downstream compaction thresholds and budget calculations.\n\n**Callers must run `validate()` after deserialization.** The runtime's `from_sources()` does this, and the API route `add_custom_model()` does this. Any new code path that creates `ModelCatalogEntry` from external input must call `validate()` and reject entries that fail.\n\n#### Cost fields\n\n- `input_cost_per_m` / `output_cost_per_m` ŌĆö cost per million tokens in USD. Always present (defaults to `0.0`).\n- `image_input_cost_per_m` / `image_output_cost_per_m` ŌĆö `Option<f64>`, only set for multimodal/image models where pixel tokens are priced separately. Serialized only when `Some`.\n\n#### Capability flags\n\nAll default to `false`: `supports_tools`, `supports_vision`, `supports_streaming`, `supports_thinking`.\n\n### `ModelOverrides`\n\nPer-model inference parameter overrides persisted to `~/.librefang/model_overrides.json`, keyed by `provider:model_id`. Every field is `Option` ŌĆö `None` means \"use the layer above.\"\n\nThe resolution order is: **agent-level `ModelConfig` ŌåÆ `ModelOverrides` ŌåÆ system defaults.**\n\nUse `is_empty()` to check whether any overrides are set (all fields `None`).\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `model_type` | `Option<ModelType>` | Override model classification |\n| `temperature` | `Option<f32>` | Sampling temperature (0.0ŌĆō2.0) |\n| `top_p` | `Option<f32>` | Nucleus sampling (0.0ŌĆō1.0) |\n| `max_tokens` | `Option<u32>` | Max completion tokens |\n| `frequency_penalty` | `Option<f32>` | Frequency penalty (-2.0ŌĆō2.0) |\n| `presence_penalty` | `Option<f32>` | Presence penalty (-2.0ŌĆō2.0) |\n| `reasoning_effort` | `Option<String>` | \"low\", \"medium\", or \"high\" |\n| `use_max_completion_tokens` | `Option<bool>` | Use `max_completion_tokens` param |\n| `no_system_role` | `Option<bool>` | Model doesn't support system role |\n| `force_max_tokens` | `Option<bool>` | Send `max_tokens` even if provider doesn't require it |\n\nFields serialize only when present (`skip_serializing_if = \"Option::is_none\"`), keeping the JSON file clean.\n\n### `ProviderInfo` vs `ProviderCatalogToml`\n\nTwo structs represent the same conceptual provider, for different stages:\n\n- **`ProviderCatalogToml`** ŌĆö maps 1:1 to the `[provider]` section in a TOML catalog file. No runtime state.\n- **`ProviderInfo`** ŌĆö the runtime representation, with additional fields: `auth_status`, `model_count`, `available_models`, `is_custom`, `proxy_url`.\n\n`ProviderCatalogToml` converts to `ProviderInfo` via `From` impl. The converter initializes runtime fields to their defaults (`Missing`, `0`, empty vecs). The runtime then populates `auth_status` via probing, `model_count` from the catalog, and `is_custom` based on whether the provider file came from the registry or was user-created.\n\n#### `RegionConfig`\n\nPer-region endpoint override within a provider. Contains `base_url` and an optional `api_key_env` override. When `api_key_env` is `None`, the provider-level key is used.\n\nRegion selection pattern ŌĆö consumers resolve the effective base URL by checking if a region key exists in the map:\n\n```rust\nlet url = provider.regions.get(region_name)\n    .map(|r| &r.base_url)\n    .unwrap_or(&provider.base_url);\n```\n\n#### `is_custom` field on `ProviderInfo`\n\nDrives the dashboard's delete behavior. Built-in providers (from the registry) can only be deconfigured ŌĆö their TOML would be re-created on the next registry sync. Custom providers (added via the dashboard \"Add provider\" flow) get a real delete control.\n\n### `ModelCatalogFile`\n\nThe unified top-level catalog file format. Contains an optional `[provider]` section and a `[[models]]` array. Used by both the main repository catalog (`catalog/providers/*.toml`) and the community model catalog repository.\n\nThe `provider` field is `Option<ProviderCatalogToml>` because some catalog files only contain models (with the provider already known from context).\n\n### `AliasesCatalogFile`\n\nA simple `[aliases]` table mapping short names to canonical model IDs. Stored separately from the main catalog to allow community alias packs without modifying model entries.\n\n## Downstream consumers\n\n| Consumer | What it uses |\n|----------|-------------|\n| `librefang-runtime::model_catalog` | `ModelCatalogFile`, `ModelCatalogEntry::validate()` |\n| `librefang-runtime::model_metadata` | `ModelCatalogEntry` for lookup and synthesis |\n| `librefang-kernel-metering` | `ModelCatalogFile` for cost estimation |\n| `src/routes/providers` | `validate()` when adding custom models via the API |\n\n## Serialization conventions\n\nAll enums use `#[serde(rename_all = \"lowercase\")]` (for `ModelTier`, `Modality`, `ModelType`) or `#[serde(rename_all = \"snake_case\")` (for `AuthStatus`). The TOML and JSON representations match the Rust `Display` impl for each enum variant.\n\nOptional cost fields on `ModelCatalogEntry` use `skip_serializing_if = \"Option::is_none\"` to keep serialized output clean. All `ModelOverrides` fields follow the same pattern. `ProviderInfo::available_models` skips serialization when empty to avoid writing `[]` for unprobed providers.","other-librefang-types-tests":"# Other ŌĆö librefang-types-tests\n\n# librefang-types ŌĆö Integration Tests\n\n## Purpose\n\nThis module contains cross-boundary integration tests that guard against drift between two independent implementations of the same serialization contract:\n\n1. **The dashboard's TypeScript serializer** (`crates/librefang-api/dashboard/src/lib/agentManifest.ts`) ŌĆö produces TOML from a visual form editor in the browser.\n2. **The kernel's Rust deserializer** (`librefang_types::agent::AgentManifest`) ŌĆö consumes that TOML on the server side.\n\nBecause these two code paths live in different languages and crates, there is no compile-time guarantee they stay in sync. The tests here encode the exact TOML the dashboard emits and assert the Rust side parses it correctly. Any field rename, type change, or structural shift will cause a build failure.\n\nA secondary set of tests exercises the `schemars`-generated JSON Schema output for key configuration types, serving as a live reference and sanity check for schema completeness.\n\n---\n\n## Test Files\n\n### `agent_form_roundtrip.rs`\n\nAll tests in this file follow the same pattern: embed a TOML literal matching dashboard output, deserialize it into an `AgentManifest`, and assert specific field values.\n\n#### Test coverage by complexity tier\n\n| Test | What it covers |\n|------|---------------|\n| `parses_form_minimum_viable_output` | Bare-minimum manifest: `name`, `version`, `module`, and a `[model]` table with `provider` and `model`. Everything else omitted. |\n| `parses_form_full_output_with_capabilities_and_resources` | Mid-complexity manifest adding `description`, `tags`, `skills`, model tuning (`temperature`, `max_tokens`, `system_prompt`), `resources` quotas, and `capabilities` (network allowlist, shell commands, `agent_spawn`). |\n| `parses_form_with_advanced_sections` | Full-complexity manifest exercising every optional section: `priority`, `session_mode`, `web_search_augmentation`, `schedule`, `exec_policy`, `thinking`, `autonomous`, `routing`, `fallback_models`, and `context_injection`. |\n| `parses_form_response_format_json_schema` | The `response_format` field with the `JsonSchema` variant, including inline schema and `strict` flag. Validates tagged-enum deserialization. |\n| `omitting_optional_sections_uses_defaults` | Confirms that omitting `[resources]` and `[capabilities]` tables entirely produces sensible defaults (empty vectors, `false` booleans, `None` for optional quotas). |\n\n#### How to extend\n\nWhen the dashboard form gains a new field or section:\n\n1. Update the TypeScript serializer in `agentManifest.ts`.\n2. Add or modify a TOML literal in the appropriate test here to mirror the new output.\n3. Assert the new field on the parsed `AgentManifest` struct.\n4. Run `cargo test -p librefang-types --test agent_form_roundtrip`.\n\nIf the Rust struct hasn't been updated yet, the test will fail to compile or panic on a missing/wrong field ŌĆö which is exactly the signal you want.\n\n---\n\n### `schemars_poc.rs`\n\nDiagnostic tests that print `schemars`-generated JSON Schema (Draft 7) to stdout. These are **not** assertion-heavy ŌĆö they exist for developer inspection during schema migration.\n\nRun with visible output:\n\n```bash\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```\n\n#### Tests\n\n| Test | Type under schema | Notes |\n|------|-------------------|-------|\n| `dump_budget_config_schema` | `BudgetConfig` | Baseline struct. |\n| `dump_vault_config_schema` | `VaultConfig` | Contains `Option<PathBuf>` ŌĆö verifies filesystem path rendering. |\n| `full_kernel_config_schema_generates` | `KernelConfig` | End-to-end sanity: asserts >50 top-level properties and >50 definitions. Catches regressions where the schema generation silently drops fields. |\n| `dump_response_format_schema` | `ResponseFormat` | Tagged enum carrying `serde_json::Value` ŌĆö a known risk point for schema correctness. |\n\nThese tests serve as a bridge between the hand-written JSON Schema currently used by the dashboard and the eventual goal of deriving schemas entirely from Rust types via `schemars`.\n\n---\n\n## Relationship to the Rest of the Codebase\n\n```mermaid\ngraph LR\n    A[Dashboard TypeScript<br>agentManifest.ts] -->|emits TOML| B[agent_form_roundtrip<br>test literals]\n    B -->|parses via| C[librefang_types::<br>AgentManifest]\n    C -->|used by| D[Kernel runtime]\n    C -->|generates schema via| E[schemars]\n    E -->|dumped by| F[schemars_poc<br>test output]\n```\n\n- **Upstream dependency**: `librefang_types` ŌĆö the tests import `AgentManifest`, `Priority`, `SessionMode`, `ResponseFormat`, and config structs from this crate.\n- **Contract counterpart**: The TypeScript file `agentManifest.ts` is the other party in the serialization contract. Changes there must be mirrored here.\n- **No outgoing calls**: These tests are self-contained; they deserialize in-memory strings and assert on the resulting structs. No filesystem, network, or database interaction.\n\n---\n\n## Running\n\n```bash\n# All integration tests in this crate\ncargo test -p librefang-types\n\n# Only the round-trip tests\ncargo test -p librefang-types --test agent_form_roundtrip\n\n# Schema dumps with visible output\ncargo test -p librefang-types --test schemars_poc -- --nocapture\n```","other-librefang-types":"# Other ŌĆö librefang-types\n\n# librefang-types\n\nCore type definitions and traits shared across the LibreFang Agent OS.\n\n## Purpose\n\nThis crate is the foundational type library for LibreFang. It contains no business logic or runtime behavior ŌĆö only data structures, error types, trait definitions, and serialization helpers that other crates in the workspace depend on. Every other module in LibreFang references this crate for shared vocabulary.\n\nBecause it has no incoming or outgoing call edges and no execution flows, it is a pure leaf dependency in the compile graph. It can be reviewed, tested, and versioned independently of any agent runtime.\n\n## Dependency Rationale\n\nThe dependencies reveal the domains this crate covers:\n\n| Dependency | Purpose |\n|---|---|\n| `serde`, `serde_json`, `toml` | Serialization formats for messages, config, and persistence |\n| `chrono`, `uuid` | Timestamps and unique identifiers for events and agents |\n| `thiserror` | Ergonomic error type derivation |\n| `ed25519-dalek`, `sha2`, `hex`, `zeroize` | Cryptographic types ŌĆö Ed25519 keys, SHA digests, secure memory handling |\n| `fluent`, `unic-langid` | Internationalization types and language identifiers |\n| `regex-lite` | Pattern types for validation rules |\n| `schemars` | JSON Schema generation from Rust types (enables `chrono` and `uuid1` features so generated schemas understand those types) |\n| `async-trait` | Async trait definitions for plugin interfaces or transport abstractions |\n| `dirs` | Standard directory path constants |\n| `tracing` | Span/event types for structured logging |\n\nDev dependencies (`rmp-serde`, `tempfile`) support unit tests that verify serialization round-trips through MessagePack and temporary file I/O.\n\n## Type Domains\n\nBased on the dependency set, this crate defines types across these domains:\n\n### Identity and Cryptography\n\nTypes for Ed25519 key pairs, public keys, signatures, and SHA-256 digests. The `zeroize` dependency ensures secret key material can be securely cleared from memory. These types wrap `ed25519-dalek` primitives with serde support so they can be transmitted and stored.\n\n### Messaging and Events\n\nRequest/response envelopes, event payloads, and message headers using `uuid` for correlation IDs and `chrono` for timestamps. All message types derive `Serialize` and `Deserialize`.\n\n### Configuration\n\nStructured config types parsed from TOML files. The `dirs` crate provides standard paths (config dir, data dir) as constants or helper functions.\n\n### Error Handling\n\nA hierarchy of error types using `thiserror` ŌĆö covering serialization failures, crypto errors, validation errors, and I/O errors. These are designed to be composable so consuming crates can use `From` conversions.\n\n### Localization\n\nTypes for language identifiers (`unic-langid`) and Fluent localization resources. These allow the agent OS to produce localized status messages and error descriptions.\n\n### Schema Generation\n\nTypes annotated with `schemars` derive macros so JSON Schemas can be auto-generated. This is useful for API documentation, validation, and interop with external tooling.\n\n## Traits\n\nThe `async-trait` dependency indicates async trait definitions. These likely define interfaces that agent plugins or transport backends must implement, such as:\n\n- Message send/receive contracts\n- Authentication or key exchange protocols\n- Plugin lifecycle hooks\n\nThese traits live in the types crate so that implementations and consumers both depend on the same abstraction without creating circular dependencies.\n\n## Usage in the Workspace\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé  agent-bin   ŌöéŌöĆŌöĆŌöĆŌöĆŌ¢ČŌöé  librefang-  ŌöéŌöĆŌöĆŌöĆŌöĆŌ¢ČŌöé  librefang-  Ōöé\nŌöé              Ōöé     Ōöé  runtime     Ōöé     Ōöé  types       Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś     ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś     ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ            Ō¢▓\nŌöé  librefang-  ŌöéŌöĆŌöĆŌöĆŌöĆŌ¢ČŌöé  librefang-  ŌöéŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\nŌöé  crypto      Ōöé     Ōöé  transport   Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś     ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\nEvery other crate in the workspace depends on `librefang-types` but `librefang-types` depends on nothing within the workspace. This unidirectional dependency graph keeps the type layer stable and avoids circular imports.\n\n## Conventions\n\n- All public types derive `Serialize`, `Deserialize`, `Debug`, and `Clone` unless there is a specific reason not to (e.g., secret key types omit `Debug`).\n- Error types implement `std::error::Error` and `Display` via `thiserror`.\n- Types that are part of a public API surface derive `JsonSchema` from `schemars`.\n- Secret-bearing structures use `zeroize::Zeroize` on drop.\n\n## Testing\n\nTests focus on serialization round-trips (JSON, TOML, and MessagePack via `rmp-serde`) and schema generation correctness. The `tempfile` dev dependency supports tests that verify config file parsing from disk.","other-librefang-wire":"# Other ŌĆö librefang-wire\n\n# librefang-wire\n\nLibreFang Protocol (OFP) ŌĆö agent-to-agent networking layer.\n\n## Purpose\n\n`librefang-wire` defines and implements the wire protocol used for secure, authenticated communication between LibreFang agents. It is responsible for message framing, serialization, cryptographic authentication, and the async transport abstractions that carry OFP messages over the network.\n\nThis crate does **not** implement application-level RPC or command logic. It provides the foundational transport and protocol primitives that higher-level agent communication builds upon.\n\n## Role in the Architecture\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé              Agent Application              Ōöé\nŌöé         (commands, RPC, session logic)      Ōöé\nŌö£ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöż\nŌöé            librefang-wire (OFP)             ŌöéŌŚäŌöĆŌöĆ you are here\nŌöé  framing ┬Ę auth ┬Ę serialization ┬Ę transport Ōöé\nŌö£ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöż\nŌöé            librefang-types                  Ōöé\nŌöé        shared domain types & errors         Ōöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\n`librefang-wire` sits directly above `librefang-types`, consuming shared domain types and error definitions. It exposes async transport and protocol primitives to the rest of the codebase.\n\n## Key Capabilities\n\n### Message Authentication (HMAC-SHA256)\n\nThe crate depends on `hmac`, `sha2`, `hex`, and `subtle`, indicating that every message on the wire is authenticated using HMAC-SHA256. The `subtle` crate provides constant-time comparison, which prevents timing side-channel attacks during signature verification.\n\nThis means:\n- Outbound messages are signed with a shared secret key.\n- Inbound messages are verified before any processing occurs.\n- Signature comparison is constant-time to resist timing attacks.\n\n### Async Transport\n\nBuilt on `tokio`, all I/O is fully asynchronous. The `async-trait` dependency suggests that transport behaviors are defined as async traits, allowing different underlying implementations (TCP, TLS, Unix sockets, etc.) to be swapped in behind a common interface.\n\n### Concurrent Connection Management\n\nThe `dashmap` dependency indicates that the module maintains a concurrent map of active connections or sessions. `DashMap` provides lock-free concurrent access, which is critical for agents handling many simultaneous peer connections without contention bottlenecks.\n\n### Serialization\n\nMessages are serialized to JSON via `serde` and `serde_json`. Each message carries a `uuid` for correlation and `chrono` timestamps for ordering and replay protection.\n\n### Error Handling\n\nErrors are defined using `thiserror`, producing typed, ergonomic error variants that integrate cleanly with the `?` operator and the broader LibreFang error hierarchy in `librefang-types`.\n\n## Dependency Breakdown\n\n| Dependency | Role in `librefang-wire` |\n|---|---|\n| `librefang-types` | Shared domain types, message envelopes, error types |\n| `tokio` | Async runtime for all network I/O |\n| `serde` / `serde_json` | Message serialization and deserialization |\n| `uuid` | Unique message and correlation IDs |\n| `chrono` | Timestamps for message ordering |\n| `thiserror` | Typed error definitions |\n| `tracing` | Structured logging of protocol events |\n| `async-trait` | Async trait definitions for transport abstraction |\n| `hmac` / `sha2` | HMAC-SHA256 message authentication |\n| `hex` | Hex encoding/decoding of signatures and keys |\n| `subtle` | Constant-time comparison for signature verification |\n| `dashmap` | Concurrent map for connection/session tracking |\n\n## Security Considerations\n\n- **Authentication**: HMAC-SHA256 ensures message integrity and authenticity. Messages that fail verification are rejected before deserialization of any payload.\n- **Constant-time comparison**: The `subtle` crate ensures that HMAC verification does not leak information through timing differences.\n- **No plaintext secrets in logs**: The `tracing` integration should be used to log protocol events without exposing key material or raw message bodies.\n\n## Integration Points\n\nWhen consuming `librefang-wire` from other crates:\n\n1. Depend on `librefang-wire` in `Cargo.toml`.\n2. Use the transport trait implementations to establish connections to peer agents.\n3. Construct messages using types from `librefang-types`, then pass them to the wire layer for signing and transmission.\n4. Incoming messages arrive authenticated and deserialized, ready for application-level handling.","other":"# Other\n\n# Other ŌĆö Supporting Crates & Infrastructure\n\nThis module group contains the crates that compose the **LibreFang Agent OS** ŌĆö a self-hosted autonomous agent platform with multi-channel messaging, LLM orchestration, sandboxed skill execution, and both web and native desktop interfaces.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Entry Points\n        CLI[librefang-cli]\n        DSK[librefang-desktop]\n    end\n\n    subgraph API Surface\n        API[librefang-api]\n        DB[librefang-api-dashboard]\n        LPS[librefang-api-src]\n        STA[librefang-api-static]\n    end\n\n    subgraph Kernel\n        K[librefang-kernel]\n        KH[librefang-kernel-handle]\n        KR[librefang-kernel-router]\n        KM[librefang-kernel-metering]\n    end\n\n    subgraph Runtime\n        RT[librefang-runtime]\n        RW[librefang-runtime-wasm]\n        RM[librefang-runtime-mcp]\n        RO[librefang-runtime-oauth]\n    end\n\n    subgraph LLM\n        LD[librefang-llm-driver]\n        LDS[librefang-llm-drivers]\n    end\n\n    subgraph Channels & Memory\n        CH[librefang-channels]\n        MM[librefang-memory]\n    end\n\n    subgraph Foundations\n        TY[librefang-types]\n        HT[librefang-http]\n        SK[librefang-skills]\n        HA[librefang-hands]\n        EX[librefang-extensions]\n        TL[librefang-telemetry]\n        WR[librefang-wire]\n    end\n\n    CLI --> API\n    CLI --> K\n    DSK --> API\n    DSK --> K\n    API --> KH\n    DB --> API\n    KH -.-> K\n    K --> RT\n    K --> CH\n    K --> MM\n    K --> KR\n    K --> KM\n    K --> HA\n    RT --> LD\n    LDS --> LD\n    RT --> RW\n    RT --> RM\n    RT --> RO\n    RM --> HT\n    LDS --> HT\n    CH --> TY\n    MM --> TY\n    K --> TY\n    RT --> TY\n    SK --> TY\n    EX --> HT\n    WR --> TY\n    TL --> TY\n```\n\n## How the Sub-Modules Fit Together\n\n### Type Foundation\n\n[librefang-types](librefang-types.md) is the leaf dependency that every other crate references for shared data structures, error types, and trait definitions. Its companion crates handle localization ([librefang-types-locales](librefang-types-locales.md)), model catalog structures ([librefang-types-src](librefang-types-src.md)), and cross-language serialization contract tests ([librefang-types-tests](librefang-types-tests.md)).\n\n### Kernel & Orchestration\n\n[librefang-kernel](librefang-kernel.md) is the composition root ŌĆö it wires together all subsystems without implementing domain logic itself. It depends on:\n\n- [librefang-kernel-handle](librefang-kernel-handle.md) ŌĆö the `KernelHandle` trait that in-process callers (API, channels) use to issue requests\n- [librefang-kernel-router](librefang-kernel-router.md) ŌĆö pattern-matching dispatch to hands and templates\n- [librefang-kernel-metering](librefang-kernel-metering.md) ŌĆö cost tracking and quota enforcement\n\n[librefang-kernel-tests](librefang-kernel-tests.md) exercises the full kernel lifecycle end-to-end.\n\n### Agent Runtime\n\n[librefang-runtime](librefang-runtime.md) manages agent lifecycles, LLM dispatch, and sandboxing. It draws on:\n\n- [librefang-llm-driver](librefang-llm-driver.md) / [librefang-llm-drivers](librefang-llm-drivers.md) ŌĆö the trait abstraction and concrete provider implementations (Anthropic, OpenAI, Gemini, etc.), with shared rate-limit guard tests in [librefang-llm-drivers-tests](librefang-llm-drivers-tests.md)\n- [librefang-runtime-wasm](librefang-runtime-wasm.md) ŌĆö WASM sandbox for skill execution via wasmtime\n- [librefang-runtime-mcp](librefang-runtime-mcp.md) ŌĆö MCP client for dynamic tool discovery\n- [librefang-runtime-oauth](librefang-runtime-oauth.md) ŌĆö OAuth 2.0 PKCE flows for ChatGPT and GitHub Copilot backends\n\n[librefang-runtime-tests](librefang-runtime-tests.md) validates the MCP/OAuth integration path.\n\n### Channel Bridge\n\n[librefang-channels](librefang-channels.md) provides a uniform messaging interface across 40+ platforms, isolating each behind feature-gated adapters. Performance is tracked by [librefang-channels-benches](librefang-channels-benches.md) and correctness by [librefang-channels-tests](librefang-channels-tests.md).\n\n### API & Dashboard\n\n[librefang-api](librefang-api.md) exposes the full agent lifecycle over HTTP and WebSocket, wiring together the kernel, runtime, memory, channels, skills, and extensions behind axum handlers. The browser-based management interface is [librefang-api-dashboard](librefang-api-dashboard.md) (React 19 + TanStack), with a self-contained [login page](librefang-api-src.md) and [static locale assets](librefang-api-static.md). End-to-end HTTP tests live in [librefang-api-tests](librefang-api-tests.md).\n\n### Entry Points\n\nOperators interact with LibreFang through two binaries:\n\n- [librefang-cli](librefang-cli.md) ŌĆö the `librefang` command-line tool, with i18n via [librefang-cli-locales](librefang-cli-locales.md) and init templates from [librefang-cli-templates](librefang-cli-templates.md)\n- [librefang-desktop](librefang-desktop.md) ŌĆö a Tauri 2.0 native app (full daemon on desktop, thin client on mobile), with capability declarations in [librefang-desktop-capabilities](librefang-desktop-capabilities.md) and generated build scaffolding in [librefang-desktop-gen](librefang-desktop-gen.md)\n\n### Supporting Infrastructure\n\n| Crate | Role |\n|---|---|\n| [librefang-memory](librefang-memory.md) | Persistence layer for agent state and conversation history (session-scoped) |\n| [librefang-hands](librefang-hands.md) | Curated autonomous capability packages ŌĆö the bridge between intent and execution |\n| [librefang-skills](librefang-skills.md) | Skill registry, filesystem loader, marketplace client, and OpenClaw compatibility |\n| [librefang-extensions](librefang-extensions.md) | MCP server setup, encrypted credential vault, and OAuth2 PKCE |\n| [librefang-http](librefang-http.md) | Shared `reqwest::Client` builder with centralized proxy and TLS configuration |\n| [librefang-telemetry](librefang-telemetry.md) | OpenTelemetry + Prometheus metrics instrumentation |\n| [librefang-wire](librefang-wire.md) | LibreFang Protocol ŌĆö agent-to-agent networking with cryptographic authentication |\n| [librefang-migrate](librefang-migrate.md) | One-shot import tool for converting foreign C2/agent configs into LibreFang types |\n| [librefang-testing](librefang-testing.md) | Shared mock kernel, fake LLM driver, and axum route test utilities |\n\n## Key Workflows That Span Sub-Modules\n\n**Incoming message flow:** A user sends a message on a platform ŌåÆ [librefang-channels](librefang-channels.md) adapter ingests and normalizes it ŌåÆ [librefang-kernel](librefang-kernel.md) receives it via the bridge ŌåÆ [librefang-kernel-router](librefang-kernel-router.md) resolves the target hand/agent ŌåÆ [librefang-runtime](librefang-runtime.md) dispatches to the LLM via [librefang-llm-drivers](librefang-llm-drivers.md) ŌåÆ the response flows back through channels ŌåÆ conversation is persisted in [librefang-memory](librefang-memory.md).\n\n**Skill execution:** [librefang-skills](librefang-skills.md) discovers and loads a skill manifest ŌåÆ the runtime invokes it through [librefang-runtime-wasm](librefang-runtime-wasm.md) ŌåÆ the WASM sandbox executes in isolation, communicating with the kernel via [librefang-kernel-handle](librefang-kernel-handle.md).\n\n**Dashboard interaction:** The browser loads [librefang-api-dashboard](librefang-api-dashboard.md) ŌåÆ TanStack Query hooks call [librefang-api](librefang-api.md) REST/WebSocket endpoints ŌåÆ the API delegates to the kernel through the `KernelHandle` trait ŌåÆ [librefang-telemetry](librefang-telemetry.md) records metrics throughout.\n\n**MCP tool invocation:** The runtime connects to external tool servers via [librefang-runtime-mcp](librefang-runtime-mcp.md) ŌåÆ authentication is handled by [librefang-runtime-oauth](librefang-runtime-oauth.md) and [librefang-extensions](librefang-extensions.md) credential vault ŌåÆ all HTTP traffic uses [librefang-http](librefang-http.md) for consistent TLS/proxy behavior.\n\n**Cross-agent communication:** [librefang-wire](librefang-wire.md) provides the framing, serialization, and cryptographic primitives for agent-to-agent messaging over the network, sitting below application-level RPC logic.","overview":"# crates ŌĆö Wiki\n\n# LibreFang Agent OS\n\nLibreFang is a self-hosted autonomous agent platform. It lets you define AI agents, connect them to messaging channels (Telegram, Discord, Slack, and more), equip them with skills and tools, and let them operate either interactively or autonomously in the background. Everything runs on your infrastructure ŌĆö no third-party cloud required.\n\n## Architecture\n\n```mermaid\ngraph TD\n    UI[\"User Interfaces<br/>CLI ┬Ę Desktop ┬Ę Dashboard\"]\n    API[\"API Server\"]\n    Kernel[\"Agent Kernel<br/>auth ┬Ę safety ┬Ę RBAC\"]\n    Runtime[\"Agent Runtime<br/>LLM Ōåö tool loop\"]\n    LLM[\"LLM Provider Drivers\"]\n    Memory[\"Memory System<br/>KV ┬Ę semantic ┬Ę graph\"]\n    Skills[\"Skills System\"]\n    Channels[\"Channel Integrations\"]\n    MCP[\"Extensions & MCP\"]\n    Wire[\"Wire Protocol ┬Ę OFP\"]\n\n    UI --> API\n    Channels --> Kernel\n    API --> Kernel\n    Kernel --> Runtime\n    Runtime --> LLM\n    Runtime --> Memory\n    Runtime --> Skills\n    Runtime --> MCP\n    Kernel <--> Wire\n```\n\n## How it works\n\nUsers interact with LibreFang through one of three entry points: the [CLI & Terminal UI](librefang-cli-src.md) for scripting and local use, the [Desktop Application](librefang-desktop-src.md) for a native windowed experience, or the [Dashboard Frontend](librefang-dashboard-src.md) for browser-based management. All three talk to the [API Server](librefang-api-src.md), which is the single HTTP entry point into the backend.\n\nExternal messaging platforms ŌĆö Telegram, Discord, Slack, WhatsApp, and others ŌĆö are handled by [Channel Integrations](librefang-channels-src.md). Channel adapters normalize incoming messages and route them into the kernel.\n\nThe [Agent Kernel](librefang-kernel-src.md) is the gatekeeper. It enforces authentication, role-based access control, execution approval policies, and resource metering before any agent runs. Once a request is authorized, it hands off to the [Agent Runtime](librefang-runtime-src.md), the execution engine that drives the iterative LLM conversation loop ŌĆö calling the model, executing tool calls, managing context, and returning responses.\n\nDuring execution, the runtime draws on several supporting subsystems:\n\n- **[LLM Provider Drivers](librefang-llm-driver-src.md)** ŌĆö a trait-based abstraction over OpenAI, Anthropic, local models, and other LLM providers, with shared retry, streaming, and fallback logic.\n- **[Memory System](librefang-memory-src.md)** ŌĆö three complementary stores (key-value, semantic text search, and a knowledge graph) that give agents persistent, queryable memory across sessions.\n- **[Skills System](librefang-skills-src.md)** ŌĆö marketplace-driven skill discovery, installation, and execution. Skills teach agents new capabilities, and agents can even evolve their own skills autonomously.\n- **[Extensions & MCP](librefang-extensions-src.md)** ŌĆö MCP server lifecycle, credential vaults, OAuth flows, and sandboxed plugin execution for connecting agents to external tools and services.\n\nFor background autonomous work, [Hands & Orchestration](librefang-hands-src.md) provides pre-built, domain-complete agent configurations (called \"Hands\") that users activate from a marketplace and monitor rather than chat with interactively.\n\nMulti-node deployments are connected by the [Wire Protocol & Networking](librefang-wire-src.md) module (OFP), which handles TCP-based agent discovery, authentication, and cross-kernel messaging.\n\nEverything sits on a shared foundation: [Shared Types & Configuration](librefang-types-src.md) defines the canonical data structures used across every crate, while [Infrastructure & Utilities](librefang-testing-src.md) provides shared HTTP client logic, telemetry, framework migration tooling, and test mocks.\n\n## Key end-to-end flow\n\nA typical chat interaction follows this path:\n\n1. A user sends a message on a connected platform (e.g., Telegram).\n2. The **Channel Integration** adapter receives it, normalizes it, and routes it to the **Agent Kernel**.\n3. The **Kernel** authenticates the user, checks RBAC permissions, and enforces safety policies.\n4. The authorized request is passed to the **Agent Runtime**, which loads relevant context and memories.\n5. The runtime calls out to an **LLM Provider** to generate a response, potentially executing tool calls in a loop.\n6. If tool execution is needed, the runtime may invoke **Skills** or **Extensions & MCP** servers.\n7. New memories are persisted via the **Memory System**.\n8. The response flows back through the kernel and channel adapter to the user.\n\nThe same flow works when initiated from the dashboard, CLI, or desktop app ŌĆö only the entry point changes; the backend path through API ŌåÆ Kernel ŌåÆ Runtime is identical.","shared-types-configuration":"# Shared Types & Configuration\n\n# Shared Types & Configuration (`librefang-types`)\n\nThe `librefang-types` crate defines the canonical data structures shared across the LibreFang agent OS ŌĆö every other crate (runtime, API, drivers, channels) depends on it. Types here are **serialization-stable**: they round-trip cleanly through JSON and TOML, and deterministic ID derivation guarantees that the same logical entity (agent, user, session) always maps to the same UUID across daemon restarts.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Identity\n        AgentId -->|from_name| SessionId\n        AgentId -->|for_channel| SessionId\n        AgentId -->|for_cron_run| SessionId\n        UserId -->|from_name| UserId\n    end\n    subgraph Manifest\n        AgentManifest --> ModelConfig\n        AgentManifest --> ScheduleMode\n        AgentManifest --> ResourceQuota\n        AgentManifest --> ManifestCapabilities\n        AgentManifest --> ToolProfile\n        AgentManifest --> AutonomousConfig\n        AgentManifest --> WorkspaceDecl\n    end\n    subgraph Registry\n        AgentEntry --> AgentId\n        AgentEntry --> AgentManifest\n        AgentEntry --> AgentState\n        AgentEntry --> AgentMode\n    end\n    subgraph Approval\n        ApprovalPolicy --> ChannelToolRule\n        ApprovalPolicy --> TimeoutFallback\n        ApprovalRequest --> RiskLevel\n        ApprovalResponse --> ApprovalDecision\n    end\n```\n\n---\n\n## Deterministic Identity (`AgentId`, `UserId`, `SessionId`)\n\nAll three ID types wrap a `Uuid` and offer two construction paths: **random** (`::new()` ŌåÆ UUID v4) and **deterministic** (`::from_name()` ŌåÆ UUID v5). Deterministic IDs are the default for anything that originates from configuration, because they survive daemon restarts and preserve audit-log continuity.\n\n### `AgentId`\n\n```rust\n// Random (one-shot agents, tests)\nlet id = AgentId::new();\n\n// Deterministic ŌĆö same name always produces the same UUID\nlet id = AgentId::from_name(\"brand-guardian\");\n```\n\nAll deterministic derivation uses a single internal namespace with **typed prefixes** to prevent collisions:\n\n| Method | UUID v5 input | Purpose |\n|--------|--------------|---------|\n| `from_name(name)` | `\"agent:{name}\"` | Top-level named agents |\n| `from_hand_id(hand_id)` | `hand_id` (bare, backward compat) | Hand instances |\n| `from_hand_agent(hand, role, None)` | `\"{hand}:{role}\"` | Single-instance hand roles |\n| `from_hand_agent(hand, role, Some(id))` | `\"{hand}:{role}:{id}\"` | Multi-instance hand roles |\n\nThe `from_hand_agent` overload with `instance_id: None` preserves the legacy hash format so existing single-instance hands keep their original agent IDs (no orphaned cron jobs or memory keys).\n\n### `UserId`\n\n```rust\n// Deterministic ŌĆö uses the frozen LIBREFANG_USER_NAMESPACE\nlet uid = UserId::from_name(\"Alice\");  // always same UUID for \"Alice\"\n```\n\n`LIBREFANG_USER_NAMESPACE` is a constant that **must never be changed** ŌĆö rotating it rehashes every user ID and breaks fleet-wide audit correlation.\n\n### `SessionId`\n\nSession IDs use **disjoint UUID v5 namespaces** to prevent cross-category collisions:\n\n| Factory method | Namespace | Input format | Use case |\n|---------------|-----------|-------------|----------|\n| `for_channel(agent, channel)` | `CHANNEL_SESSION_NS` | `\"{agent_uuid}:{channel}\"` | Persistent channel sessions |\n| `for_cron_run(agent, run_key)` | `CRON_RUN_SESSION_NS` | `\"{agent_uuid}:{run_key}\"` | Isolated per-fire cron sessions |\n| `from_route_key(agent, ch, acct, conv)` | `CHANNEL_SESSION_NS` | Varies (see below) | Multi-tenant channel routing |\n\n`from_route_key` is backward-compatible with `for_channel`:\n\n- When `account` is empty ŌåÆ delegates to `for_channel` (same ID as before).\n- When `account` is non-empty ŌåÆ uses a `\"v2:\"` prefix to produce IDs in a disjoint hash space, preventing accidental collisions with legacy sessions.\n\nAll channel/account/conversation inputs are lowercased before hashing for case-insensitive matching.\n\n---\n\n## Agent Manifest (`AgentManifest`)\n\nThe manifest is the complete declarative specification of an agent ŌĆö what model it uses, what tools it can access, how it's scheduled, and every tunable parameter. It deserializes from `agent.toml` files and JSON API payloads.\n\n### Key Fields\n\n#### Model Configuration (`ModelConfig`)\n\n```toml\n[model]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"   # or `name = \"...\"` (alias)\nmax_tokens = 4096\ntemperature = 0.7\nsystem_prompt = \"\"\"\nYou are a helpful coding assistant.\nAlways explain your reasoning.\n\"\"\"\ncontext_window = 32768              # optional override\nmax_output_tokens = 2048            # optional override\n```\n\nThe `model` field accepts an `#[serde(alias = \"name\")]` so both `model` and `name` keys work in TOML. Provider-specific extension parameters go in `extra_params`, which is flattened directly into the API request body:\n\n```toml\n[model]\nprovider = \"qwen\"\nmodel = \"qwen3.6\"\nenable_memory = true                # ŌåÆ extra_params\nmemory_max_window = 50              # ŌåÆ extra_params\n```\n\n#### Fallback Models\n\nAn ordered chain of fallback models tried when the primary fails:\n\n```toml\n[[fallback_models]]\nprovider = \"groq\"\nmodel = \"llama-3.3-70b-versatile\"\n\n[[fallback_models]]\nprovider = \"ollama\"\nmodel = \"gemma3:12b\"\nbase_url = \"http://localhost:11434\"\n```\n\n#### Tool Access Control\n\nTool availability is resolved through multiple layers, evaluated in this order:\n\n1. **`tools_disabled`** ŌĆö hard kill switch, no tools at all.\n2. **`tool_blocklist`** ŌĆö specific exclusions (applied last).\n3. **`tool_allowlist`** ŌĆö if non-empty, only these tools pass (empty = all).\n4. **`profile`** ŌĆö named preset expanding to a tool list + derived capabilities.\n5. **`AgentMode`** ŌĆö runtime filter applied by the kernel (`Observe` drops everything, `Assist` keeps read-only tools, `Full` passes all).\n\n#### Profiles (`ToolProfile`)\n\n| Profile | Tools included | Derived capabilities |\n|---------|---------------|---------------------|\n| `Minimal` | `file_read`, `file_list` | No network, no shell |\n| `Coding` | `file_*`, `shell_exec`, `web_fetch` | Network + shell |\n| `Research` | `web_fetch`, `web_search`, `file_read`, `file_write` | Network |\n| `Messaging` | `agent_*`, `channel_send`, `memory_*` | Agent spawn + memory |\n| `Automation` | All 12 standard tools | Network + shell + agent + memory |\n| `Full` / `Custom` | `\"*\"` (all tools) | All capabilities |\n\nProfiles also derive `ManifestCapabilities` ŌĆö the `implied_capabilities()` method inspects the tool list and sets `network`, `shell`, `agent_spawn`, `agent_message`, and `memory_*` scopes automatically.\n\n#### Scheduling (`ScheduleMode`)\n\n```rust\npub enum ScheduleMode {\n    Reactive,                                    // wake on message/event (default)\n    Periodic { cron: String },                   // cron schedule\n    Proactive { conditions: Vec<String> },       // condition monitoring\n    Continuous { check_interval_secs: u64 },     // persistent loop (default: 300s)\n}\n```\n\n#### Session Mode (`SessionMode`)\n\nControls session resolution for non-channel invocations (cron, triggers, `agent_send`):\n\n- **`Persistent`** (default) ŌĆö reuses the agent's single session across invocations.\n- **`New`** ŌĆö creates a fresh session for each invocation.\n\nWhen `max_concurrent_invocations > 1`, the manifest **must** use `session_mode = \"new\"`. Persistent mode with concurrency > 1 is auto-clamped to 1 with a `WARN` log because parallel writes to a single session's history are undefined.\n\n#### Workspaces (`WorkspaceDecl`)\n\nNamed shared directories that multiple agents can access:\n\n```toml\n[workspaces]\nlibrary = { path = \"shared/library\", mode = \"rw\" }\nvault   = { mount = \"/Users/me/Obsidian\", mode = \"r\" }\n```\n\n- **`path`** ŌĆö relative to `workspaces_dir`, auto-created by the kernel.\n- **`mount`** ŌĆö absolute host path (e.g., Obsidian vault), must be whitelisted in `config.toml: allowed_mount_roots`.\n\nMutual exclusivity is enforced at boot by `resolve_workspace_decl`, not at the schema level ŌĆö this lets the dashboard show validation errors in context during hot-reload.\n\n#### Autonomous Agents (`AutonomousConfig`)\n\nGuardrails for 24/7 background agents:\n\n```toml\n[autonomous]\nquiet_hours = \"0 22 * * *\"          # optional cron for quiet periods\nmax_iterations = 50                 # LLM loop cap per invocation\nmax_restarts = 10                   # crash recovery limit\nheartbeat_interval_secs = 30\nheartbeat_timeout_secs = 90         # optional override (default: interval ├Ś 2)\nheartbeat_keep_recent = 5           # optional: prune old NO_REPLY turns\nheartbeat_channel = \"telegram\"      # where to send heartbeat alerts\n```\n\n`DEFAULT_MAX_ITERATIONS` (50) is the shared policy constant ŌĆö `librefang-runtime` re-exports it so its fallback path stays in lockstep.\n\n#### Model Routing (`ModelRoutingConfig`)\n\nAuto-selects between cheap/mid/expensive models based on token complexity:\n\n```toml\n[routing]\nsimple_model = \"claude-haiku-4-5-20251001\"\nmedium_model = \"claude-sonnet-4-20250514\"\ncomplex_model = \"claude-sonnet-4-20250514\"\nsimple_threshold = 100    # below = simple\ncomplex_threshold = 500   # above = complex\n```\n\n#### Per-Agent Overrides\n\nThe manifest supports granular per-agent overrides that take precedence over global config:\n\n| Field | Overrides global |\n|-------|-----------------|\n| `thinking` | `[thinking]` config |\n| `exec_policy` | Global `exec_policy` |\n| `channel_overrides` | Channel-level `ChannelOverrides` |\n| `max_history_messages` | `KernelConfig.max_history_messages` |\n| `max_concurrent_invocations` | `KernelConfig.queue.concurrency.default_per_agent` |\n| `auto_dream_min_hours` | `[auto_dream] min_hours` |\n| `auto_dream_min_sessions` | `[auto_dream] min_sessions` |\n| `context_injection` | Global `session.context_injection` (appended after) |\n\n---\n\n## Agent Registry (`AgentEntry`)\n\nThe runtime representation of a registered agent ŌĆö wraps the manifest with lifecycle state, identity, and session management flags:\n\n```rust\npub struct AgentEntry {\n    pub id: AgentId,\n    pub name: String,\n    pub manifest: AgentManifest,\n    pub state: AgentState,          // Created | Running | Suspended | Terminated | Crashed\n    pub mode: AgentMode,            // Observe | Assist | Full\n    pub session_id: SessionId,\n    pub identity: AgentIdentity,    // emoji, avatar, color, archetype, vibe\n    // ... lifecycle flags\n}\n```\n\n### Session Reset Flags\n\nThree flags control session auto-reset behavior (mirrors hermes-agent `SessionEntry`):\n\n- **`force_session_wipe`** ŌĆö next `execute_llm_agent` call clears message history (keeps `session_id`). Takes priority over `resume_pending`.\n- **`resume_pending`** ŌĆö agent was interrupted by restart/shutdown; preserves existing `session_id` and continues on the same transcript. Cleared after the next successful turn.\n- **`has_processed_message`** ŌĆö sticky flag set when the agent processes its first real message. Prevents the heartbeat monitor from flagging never-dispatched agents as unresponsive (which would trigger a crash-recover loop).\n\n---\n\n## Approval System (`ApprovalPolicy`, `ApprovalRequest`, `ApprovalResponse`)\n\nWhen an agent attempts a dangerous operation, the kernel creates an approval request and pauses the agent until a human responds.\n\n### Approval Policy\n\n```toml\n[approval]\nrequire_approval = [\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\", \"skill_evolve_*\"]\ntimeout_secs = 60\nauto_approve_autonomous = false\nauto_approve = false               # alias: true clears require_approval\n```\n\n`require_approval` accepts either a list of tool names (with glob patterns) or a boolean shorthand:\n\n- `true` ŌåÆ the default mutation set (shell_exec, file_write, file_delete, apply_patch, skill_evolve_*)\n- `false` ŌåÆ empty list (no tools require approval)\n\n#### Channel-Specific Rules\n\n```toml\n[[approval.channel_rules]]\nchannel = \"telegram\"\nallowed_tools = [\"file_read\", \"web_search\"]\ndenied_tools = [\"shell_exec\"]\n```\n\nRules are evaluated in order; first match wins. Deny takes precedence over allow (deny-wins). Tool names in allow/deny lists support glob patterns (e.g., `\"file_*\"`) matched via `glob_matches`.\n\n#### Trusted Senders\n\n```toml\n[approval]\ntrusted_senders = [\"user:admin_001\", \"user:ops_lead\"]\n```\n\nRequests originating from these sender IDs bypass the approval gate entirely.\n\n#### Timeout Behavior (`TimeoutFallback`)\n\n| Variant | Behavior |\n|---------|----------|\n| `Deny` (default) | Auto-deny on timeout |\n| `Skip` | Skip the tool, agent continues |\n| `Escalate { extra_timeout_secs }` | Extend timeout and re-notify |\n\n#### Second-Factor (TOTP)\n\n```toml\n[approval]\nsecond_factor = \"totp\"             # None | Totp | Login | Both\ntotp_issuer = \"LibreFang\"\ntotp_grace_period_secs = 300       # skip re-verification within window\ntotp_tools = [\"shell_exec\", \"file_delete\"]  # empty = all require_approval tools\n```\n\n`tool_requires_totp(tool_name)` checks whether a specific tool needs TOTP verification: returns `true` if `second_factor` requires approval TOTP **and** either `totp_tools` is empty (all tools) or the tool matches a pattern in `totp_tools`.\n\n### Approval Decision\n\n`ApprovalDecision` has a custom serialization format:\n\n- Simple variants ŌåÆ plain strings: `\"approved\"`, `\"denied\"`, `\"timed_out\"`, `\"skipped\"`\n- `ModifyAndRetry` ŌåÆ object: `{\"type\": \"modify_and_retry\", \"feedback\": \"Use --dry-run first\"}`\n\nThis lets the dashboard/CLI handle feedback-enabled retries without changing the wire format for simple cases.\n\n### Notification Routing\n\nApproval requests are routed to notification targets (Telegram, Slack, email, etc.):\n\n```toml\n[[approval.routing]]\ntool_pattern = \"shell_*\"\nroute_to = [{ channel_type = \"telegram\", recipient = \"-1001234567890\" }]\n```\n\nPer-agent rules and global alert channels provide additional routing layers.\n\n---\n\n## Resource Quotas (`ResourceQuota`)\n\nDefault limits per agent (overridable in manifest):\n\n| Resource | Default |\n|----------|---------|\n| `max_memory_bytes` | 256 MB |\n| `max_cpu_time_ms` | 30,000 ms |\n| `max_tool_calls_per_minute` | 60 |\n| `max_llm_tokens_per_hour` | `None` (inherit global) |\n| `max_network_bytes_per_hour` | 100 MB |\n| `max_cost_per_hour_usd` | 0.0 (unlimited) |\n| `max_cost_per_day_usd` | 0.0 (unlimited) |\n| `max_cost_per_month_usd` | 0.0 (unlimited) |\n\n`effective_token_limit()` normalizes `None` and `Some(0)` both to `0` (unlimited), so enforcement code can simply skip when the value is `0`.\n\n---\n\n## Validation\n\nBoth `ApprovalRequest` and `ApprovalPolicy` implement `validate()` methods that check field lengths, value ranges, and format constraints:\n\n- Tool names: alphanumeric + underscores (and `*` for glob patterns), max 64 chars\n- Descriptions: max 1024 chars\n- Action summaries: max 512 chars\n- Timeouts: 10ŌĆō300 seconds\n- Collection sizes: bounded (e.g., `MAX_TRUSTED_SENDERS = 100`, `MAX_CHANNEL_RULES = 50`)\n\nValidation errors are returned as human-readable `String` messages (not structured error types) because they're surfaced directly to operators in config-load logs and dashboard error toasts.\n\n---\n\n## Serialization Compatibility\n\nThe crate uses several serde compat helpers (from `crate::serde_compat`) to make config files tolerant of common mistakes:\n\n- `vec_lenient` ŌĆö deserializes `null` and missing fields as empty `Vec`\n- `map_lenient` ŌĆö deserializes `null` and missing fields as empty `HashMap`\n- `exec_policy_lenient` ŌĆö accepts string shorthands or full table for exec policy\n\nAll enums use `#[serde(rename_all = \"snake_case\")]` for consistent wire format. `WorkspaceMode` additionally accepts aliases (`\"rw\"`, `\"read-write\"`, `\"r\"`, `\"read\"`, `\"read-only\"`).","skills-system":"# Skills System\n\n# Skills System\n\n## Overview\n\nThe Skills System (`librefang-skills`) manages the full lifecycle of agent skills: discovery, installation, execution, self-evolution, and deletion. A **skill** is a self-contained unit of capability ŌĆö typically a prompt template or a set of tool definitions ŌĆö that teaches an agent how to approach a class of tasks.\n\nThe module handles three major concerns:\n\n- **Marketplace integration** ŌĆö search, browse, download, and install community skills from ClawHub\n- **Skill evolution** ŌĆö let agents autonomously create, patch, and refine their own skills with versioned rollback\n- **Configuration injection** ŌĆö declare and resolve skill-specific config variables into system prompts\n\n```mermaid\ngraph TD\n    subgraph \"Marketplace\"\n        CH[ClawHub Client] -->|download + scan| INSTALL[Install Pipeline]\n        INSTALL -->|convert| OC[OpenClaw Compat]\n        INSTALL -->|verify| SEC[Security Scanner]\n    end\n\n    subgraph \"Registry\"\n        REG[Skill Registry] -->|load_all| SKILLS[(skill.toml files)]\n        REG -->|tool_definitions| TR[Tool Runner]\n    end\n\n    subgraph \"Evolution\"\n        TR -->|create/patch/update| EVO[Evolution Engine]\n        EVO -->|fuzzy patch| FUZZY[Fuzzy Matcher]\n        EVO -->|atomic write| FS[Filesystem]\n        EVO -->|version snapshot| META[.evolution.json]\n    end\n\n    subgraph \"Config\"\n        CFG[Config Injection] -->|collect + resolve| PROMPT[System Prompt]\n    end\n\n    SEC -->|CriticalWarning| BLOCK[Block Install]\n    INSTALL -->|skill.toml + prompt_context.md| SKILLS\n```\n\n## Skill Format\n\nEvery installed skill is a directory containing at minimum a `skill.toml` manifest. Prompt-only skills also carry a `prompt_context.md` file with their instruction template.\n\n### Manifest (`skill.toml`)\n\n```toml\n[skill]\nname = \"wiki-helper\"\nversion = \"0.1.0\"\ndescription = \"Integrate with an internal wiki\"\nauthor = \"agent-evolved\"\ntags = [\"research\", \"wiki\"]\n\n[runtime]\nruntime_type = \"PromptOnly\"\nentry = \"\"\n\n[[tools]]\nname = \"wiki_search\"\ndescription = \"Search the wiki for a topic\"\n\n[[config_vars]]\nkey = \"wiki.base_url\"\ndescription = \"Base URL of the internal wiki\"\ndefault = \"https://wiki.example.com\"\n```\n\nKey fields:\n\n| Field | Purpose |\n|---|---|\n| `skill.name` | Lowercase alphanumeric + hyphens/underscores, max 64 chars |\n| `runtime.runtime_type` | `PromptOnly` or `NodeJs` ŌĆö determines execution model |\n| `tools[]` | Tool definitions exposed to the agent when this skill is active |\n| `config_vars[]` | Declared config keys the skill depends on |\n| `source` | Origin: `Local`, `Native`, `ClawHub`, `OpenClaw` ŌĆö controls deletion permissions |\n\n### Source Formats\n\nThe install pipeline accepts three formats and converts them to `skill.toml`:\n\n1. **SKILL.md** ŌĆö Prompt-only format with YAML front matter. Detected by leading `---`. Converted by `openclaw_compat::convert_skillmd`.\n2. **package.json** ŌĆö Node.js skill packages with OpenClaw metadata. Detected by `openclaw_compat::detect_openclaw_skill`. Converted by `openclaw_compat::convert_openclaw_skill`.\n3. **skill.toml** ŌĆö Native LibreFang manifest. Used directly.\n\n## ClawHub Marketplace Client\n\n`ClawHubClient` (`clawhub.rs`) connects to the ClawHub API at `https://clawhub.ai/api/v1`. It handles search, browse, detail lookup, file fetching, and full skill installation.\n\n### API Endpoints\n\n| Method | Endpoint | Returns |\n|---|---|---|\n| `search()` | `GET /api/v1/search?q=...&limit=N` | `ClawHubSearchResponse` (key: `results`) |\n| `browse()` | `GET /api/v1/skills?limit=N&sort=...` | `ClawHubBrowseResponse` (key: `items`) |\n| `get_skill()` | `GET /api/v1/skills/{slug}` | `ClawHubSkillDetail` |\n| `get_file()` | `GET /api/v1/skills/{slug}/file?path=...` | Raw file text |\n| `install()` | `GET /api/v1/download?slug=...` | Downloads zip/SKILL.md |\n\n### Sort Orders\n\n`ClawHubSort` enum: `Trending`, `Updated`, `Downloads`, `Stars`, `Rating`.\n\n### Retry Behavior\n\nAll HTTP requests use `get_with_retry()` with:\n- Up to **5 attempts** on 429 (rate-limit) and 5xx (server error) responses\n- Exponential backoff starting at 1.5s, capped at 30s\n- Jitter (0ŌĆō25%) to avoid thundering herd\n- `Retry-After` header respected when present\n\n### Installation Pipeline\n\n`install()` and `install_from_bytes()` execute a seven-step pipeline:\n\n1. **SHA256 hash** of downloaded content for audit\n2. **Format detection** ŌĆö SKILL.md front matter, zip magic bytes (`PK`), or fallback to `package.json`\n3. **Zip extraction** ŌĆö all entries extracted with path-traversal protection via `resolve_skill_child_path()`\n4. **Format conversion** ŌĆö SKILL.md or OpenClaw format converted to native `SkillManifest`\n5. **Manifest security scan** ŌĆö `SkillVerifier::security_scan()` checks for dangerous patterns\n6. **Prompt injection scan** ŌĆö `SkillVerifier::scan_prompt_content()` blocks critical-severity injection patterns; installation is aborted and the skill directory is cleaned up\n7. **Binary dependency check** ŌĆö warns if declared binaries are missing from `PATH`\n\nThe result is a `ClawHubInstallResult` containing the skill name, version, any warnings, tool name translations (OpenClaw ŌåÆ LibreFang naming), and whether the skill is prompt-only.\n\n### Path Safety\n\nAll file paths are validated by `resolve_skill_child_path()`, which rejects:\n- Absolute paths\n- `..` components (path traversal)\n- Any component that is not `Component::Normal`\n\nSlug validation (`validate_slug`) restricts characters to ASCII alphanumeric, `-`, and `_`.\n\n### TLS Configuration\n\nSet the environment variable `LIBREFANG_DANGEROUSLY_SKIP_TLS_VERIFICATION=true` or `1` to disable TLS certificate verification (testing only).\n\n## Skill Evolution\n\nThe evolution module (`evolution.rs`) lets agents create and refine skills from their execution experience. Every mutation is versioned, security-scanned, and protected by file locks.\n\n### Core Operations\n\n| Function | Purpose | Version Bump |\n|---|---|---|\n| `create_skill()` | Create a new PromptOnly skill | Initial `0.1.0` |\n| `update_skill()` | Full rewrite of `prompt_context.md` | Patch bump |\n| `patch_skill()` | Fuzzy find-and-replace on prompt content | Patch bump |\n| `rollback_skill()` | Revert to previous version snapshot | Patch bump |\n| `delete_skill()` | Remove agent-created skills only | ŌĆö |\n| `uninstall_skill()` | Remove any installed skill | ŌĆö |\n| `write_supporting_file()` | Add files to `references/`, `templates/`, `scripts/`, `assets/` | ŌĆö |\n| `remove_supporting_file()` | Remove supporting files | ŌĆö |\n| `record_skill_usage()` | Increment use counter in `.evolution.json` | ŌĆö |\n\nAll operations return `EvolutionResult` with post-operation counters (`evolution_count`, `mutation_count`, `use_count`) so callers don't need a separate metadata read.\n\n### Fuzzy Patching\n\n`patch_skill()` uses a 6-strategy fuzzy matcher (`fuzzy_find_and_replace`) to tolerate LLM formatting variance. Strategies are tried in order from strict to loose:\n\n1. **Exact** ŌĆö literal substring match\n2. **LineTrimmed** ŌĆö each line trimmed of leading/trailing whitespace\n3. **WhitespaceNormalized** ŌĆö whitespace runs collapsed to single space\n4. **IndentFlexible** ŌĆö all leading whitespace stripped\n5. **BlockAnchor** ŌĆö match first + last lines, require Ōēź50% middle similarity\n6. **WhitespaceStripped** ŌĆö all whitespace removed from both sides; substring match. Last resort for CJK content where inter-character spaces carry no semantic meaning. Requires Ōēź3 characters to avoid false positives on short English fragments.\n\nIf all strategies fail, the error message includes the closest matching lines from the content as a hint for the next patch attempt.\n\nWhen `replace_all` is `false` and multiple matches are found, the operation fails with an error asking for more context ŌĆö this prevents accidental bulk replacement.\n\n### Version History\n\nEach skill maintains a `.evolution.json` file alongside `skill.toml`:\n\n```json\n{\n  \"versions\": [\n    {\n      \"version\": \"0.1.2\",\n      \"timestamp\": \"2026-03-15T10:30:00+00:00\",\n      \"changelog\": \"Improved analysis section [strategy: Exact, matches: 1]\",\n      \"content_hash\": \"sha256:...\",\n      \"author\": \"agent:abc-123\"\n    }\n  ],\n  \"use_count\": 42,\n  \"evolution_count\": 4,\n  \"mutation_count\": 3\n}\n```\n\n- **`evolution_count`** ŌĆö total version entries written (including initial creation)\n- **`mutation_count`** ŌĆö changes after creation (update/patch/rollback)\n- **`use_count`** ŌĆö incremented by `record_skill_usage()` after successful tool invocations\n- **`author`** ŌĆö tracks mutation origin: `\"agent:<id>\"`, `\"cli\"`, `\"dashboard\"`, `\"reviewer\"`\n\nHistory is capped at 10 entries (`MAX_VERSION_HISTORY`). Rollback snapshots are stored in `.rollback/` with nanosecond-precision filenames to avoid collisions.\n\n### Deletion Safety\n\nTwo deletion paths exist:\n\n- **`delete_skill()`** ŌĆö agent-facing. Only removes skills with `source = \"Local\"` or `source = \"Native\"`. Refuses to delete marketplace/bundled skills or skills without a `source` field.\n- **`uninstall_skill()`** ŌĆö user-facing (CLI/dashboard). Removes any skill regardless of source.\n\nBoth acquire the per-skill lock before deletion and re-check existence under the lock to prevent TOCTOU races.\n\n### Supporting Files\n\nAgents can write supporting files to four allowed subdirectories: `references/`, `templates/`, `scripts/`, `assets/`. Files are capped at 1 MiB (`MAX_SUPPORTING_FILE_SIZE`). Path traversal and symlink-escape attacks are blocked by canonical-path containment checks. Empty parent directories are cleaned up on removal. Directory walking is bounded to 16 levels deep (`SUPPORTING_FILE_MAX_DEPTH`).\n\n### Concurrency Model\n\nAll evolution operations use **per-skill file locks** via `fs2::FileExt::lock_exclusive()`:\n\n- Lock files live at `{skills_dir}/.evolution-locks/{name}.lock` ŌĆö outside the skill directory so they survive `remove_dir_all()` on Windows.\n- Locks are acquired **before** any filesystem work, including directory existence checks.\n- All mutations read the live on-disk state under the lock (re-reading `skill.toml` for version, re-reading `prompt_context.md` for current content) to avoid stale-snapshot bugs under concurrent writers.\n\nAll file writes use **atomic write** (`atomic_write()`): content is written to a temp file with pid + thread-id + monotonic-counter + nanosecond naming, then renamed. A global `AtomicU64` counter prevents same-process temp-file collisions even without the per-skill lock.\n\n## Config Injection\n\nThe config injection module
