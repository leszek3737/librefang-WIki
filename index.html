 = \"auto\"       # Tavily → Brave → Jina → Perplexity → DuckDuckGo\n\n[web.fetch]\nmax_chars = 50000\ntimeout_secs = 30\nreadability = true\n```\n- **`search_provider`** — `\"auto\"` tries providers in priority order based on which API keys are present in the environment.\n- **`web.fetch`** — Controls web page extraction. Cloud metadata IPs (169.254.x.x, 100.64.x.x) are always blocked; internal CIDRs can be allowlisted via `ssrf_allowed_hosts`.\n\n#### Task Queue Concurrency\n```toml\n[queue.concurrency]\nmain_lane = 3\ncron_lane = 2\nsubagent_lane = 3\n```\nSeparate concurrency lanes prevent scheduled jobs or child agents from starving user-facing message processing.\n\n#### Shell Execution Policy\n```toml\n[exec_policy]\nmode = \"deny\"                  # deny | allowlist | full\ntimeout_secs = 30\nmax_output_bytes = 102400\n```\n- **`deny`** — No shell commands allowed (safest default).\n- **`allowlist`** — Only pre-approved commands execute.\n- **`full`** — Unrestricted (use with caution).\n\n#### Config Hot-Reload\n```toml\n[reload]\nmode = \"hybrid\"                # off | restart | hot | hybrid\ndebounce_ms = 500\n```\n- **`hybrid`** — Hot-reloads what it can, restarts the process for structural changes.\n- **`debounce_ms`** — Prevents rapid reloads during batched file saves.\n\n### Opt-In Sections (Commented Out)\n\nThese sections are fully documented in the template but must be explicitly uncommented:\n\n| Section | Purpose |\n|---------|---------|\n| `[[fallback_providers]]` | LLM failover chain — define backup providers tried in order on failure |\n| `[rate_limit]` | GCRA-based rate limiting for API requests and WebSocket connections |\n| `[compaction]` | LLM-based session history summarization when message count grows |\n| `[triggers]` | Event-driven automation with recursion guards |\n| `[budget]` | Cost caps (hourly/daily/monthly) with per-provider overrides |\n| `[thinking]` | Extended thinking budget for Claude models |\n| `[channels.telegram]` | Telegram bot integration |\n| `[channels.discord]` | Discord bot integration |\n| `[channels.slack]` | Slack bot integration |\n| `[channels.wechat]` | Personal WeChat via iLink protocol |\n| `[[mcp_servers]]` | Model Context Protocol server connections for external tools |\n| `[browser]` | Headless browser automation (Playwright) |\n| `[docker]` | Docker sandbox for isolated code execution |\n| `[inbox]` | File-based async command interface — drop text files to trigger agents |\n| `[network]` | P2P federation between LibreFang instances |\n| `[registry]` | Agent registry sync cache TTL |\n| `[provider_regions]` | Regional endpoint selection for multi-region providers (e.g., `qwen = \"intl\"`) |\n| `[provider_urls]` | Override provider API endpoints (for local proxies, vLLM, Ollama) |\n| `[terminal]` | Remote terminal access control with authentication guards |\n\n## How the Templates Connect to the CLI\n\n```mermaid\nflowchart LR\n    A[\"librefang init\"] --> B{Wizard?}\n    B -- Yes --> C[\"init_wizard_config.toml\"]\n    B -- No --> D[\"init_default_config.toml\"]\n    C --> E[\"Substitute {{placeholders}}\"]\n    D --> E\n    E --> F[\"Write config.toml\"]\n```\n\n1. The user runs `librefang init`.\n2. If the interactive wizard is selected, the CLI collects provider, model, and API key preferences, then loads `init_wizard_config.toml` and fills in the placeholders.\n3. If the default path is selected (or `--default` flag is used), the CLI loads `init_default_config.toml` with minimal substitutions.\n4. The CLI replaces all `{{…}}` tokens with the gathered values and writes the final `config.toml`.\n\n## Adding a New Configuration Section\n\nTo add a new top-level or nested section:\n\n1. Add the section to `init_default_config.toml` in its appropriate topical position, commented out if it should be opt-in.\n2. If the wizard should configure it, add the corresponding template placeholder to `init_wizard_config.toml`.\n3. Update the wizard flow in the CLI code to collect the new values and perform substitution.\n\nKeep sections grouped by concern (server, LLM, tools, integrations) and follow the existing comment style: a `# ── Section Name ─────` separator line followed by inline comments explaining each key.","other-librefang-cli":"# Other — librefang-cli\n\n# librefang-cli\n\nThe command-line interface for LibreFang Agent OS. This crate produces the `librefang` binary — the primary entry point for interacting with, configuring, and running the agent system.\n\n## Overview\n\n`librefang-cli` is a thin but feature-rich shell that wires together the core LibreFang libraries and exposes them through CLI subcommands, an optional TUI, and configuration management. It does not implement business logic itself; instead, it delegates to the following internal crates:\n\n| Dependency | Role |\n|---|---|\n| `librefang-kernel` | Core agent runtime and orchestration |\n| `librefang-api` | Communication channels (feature-gated) |\n| `librefang-runtime` | Process registry and execution environment |\n| `librefang-types` | Shared data structures and types |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-skills` | Skill/plugin loading and management |\n| `librefang-extensions` | Extension system |\n\n## Architecture\n\n```mermaid\ngraph TD\n    CLI[\"librefang (binary)\"]\n    CLI --> Kernel[\"librefang-kernel\"]\n    CLI --> API[\"librefang-api\"]\n    CLI --> Runtime[\"librefang-runtime\"]\n    CLI --> Skills[\"librefang-skills\"]\n    CLI --> Extensions[\"librefang-extensions\"]\n    CLI --> Migrate[\"librefang-migrate\"]\n    API --> |\"feature: all-channels\"| Channels[\"All channel backends\"]\n    API --> |\"feature: mini\"| Mini[\"Minimal channel set\"]\n    CLI --> |\"feature: telemetry\"| OTEL[\"OpenTelemetry\"]\n    Runtime --> PR[\"process_registry\"]\n```\n\n## Feature Flags\n\nFeatures control which capabilities are compiled into the binary.\n\n### `default`\nEnables `librefang-api/all-channels` and `telemetry`. Produces a full-featured build.\n\n### `all-channels`\nForwarded to `librefang-api/all-channels`. Includes all communication channel backends.\n\n### `mini`\nForwarded to `librefang-api/mini`. Produces a minimal binary with reduced channel support — useful for constrained environments or faster builds during development.\n\n### `telemetry`\nEnables OpenTelemetry tracing export. Pulls in `opentelemetry_sdk` and `tracing-opentelemetry`. Also forwards the `telemetry` feature to `librefang-api`. When disabled, tracing still works locally via `tracing-subscriber` but no OTLP export occurs.\n\n## Build Script (`build.rs`)\n\nThe build script performs four tasks at compile time:\n\n### 1. Git Hooks Configuration\n```\ngit config core.hooksPath scripts/hooks\n```\nAutomatically sets the shared hook path for all developers on first build. Failures are silently ignored (e.g., when not in a git repository).\n\n### 2. Git Commit Hash\n```\nGIT_SHA=<short hash>\n```\nCaptured via `git rev-parse --short HEAD`. Falls back to `\"unknown\"` when not in a git repo. Embedded as a runtime-accessible environment variable for version display.\n\n### 3. Build Date\n```\nBUILD_DATE=<YYYY-MM-DD>\n```\nUTC date at build time. Used alongside the git hash in version output. Falls back to `\"unknown\"`.\n\n### 4. Rustc Version\n```\nRUSTC_VERSION=<version string>\n```\nCaptured from `rustc --version`. Included in diagnostic output.\n\nAll four values are set via `cargo:rustc-env=...` and accessible at runtime through the `env!` macro.\n\n## Key External Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `clap` / `clap_complete` | Argument parsing and shell completion generation |\n| `ratatui` | Terminal UI framework for interactive mode |\n| `tokio` | Async runtime |\n| `tracing` / `tracing-subscriber` | Structured logging |\n| `serde` / `serde_json` / `toml` / `toml_edit` | Configuration file serialization |\n| `dirs` | Standard directory paths (config, data, cache) |\n| `reqwest` | HTTP client (blocking feature enabled) |\n| `rusqlite` | SQLite database access |\n| `colored` | Terminal color output |\n| `fluent` / `unic-langid` | Localization/i18n |\n| `open` | Open URLs/files in the system default handler |\n| `rustls` | TLS without OpenSSL dependency |\n| `walkdir` | Recursive directory traversal |\n| `zeroize` | Secure memory clearing for sensitive data |\n| `uuid` | UUID generation |\n\n### Memory Allocator\n\nOn non-MSVC targets (Linux, macOS, BSD), the binary uses `tikv-jemallocator` with `disable_initial_exec_tls` for improved allocation performance. This is not used on Windows MSVC builds.\n\n## Version Information\n\nThe binary reports version metadata composed of:\n- `GIT_SHA` — embedded at build time\n- `BUILD_DATE` — embedded at build time\n- `RUSTC_VERSION` — embedded at build time\n- Package version — from `Cargo.toml` workspace\n\nThis is typically exposed through a `--version` flag or `version` subcommand.\n\n## Configuration\n\nThe CLI uses TOML-based configuration, with paths resolved via the `dirs` crate for platform-appropriate locations (`~/.config/librefang/` on Linux, `%APPDATA%` on Windows, etc.). The `toml_edit` dependency allows the CLI to modify configuration files while preserving comments and formatting.\n\n## Building\n\n```bash\n# Full build (default features)\ncargo build -p librefang-cli\n\n# Minimal build\ncargo build -p librefang-cli --no-default-features --features mini\n\n# Without telemetry\ncargo build -p librefang-cli --no-default-features --features all-channels\n```\n\nThe resulting binary is located at `target/debug/librefang` (or `target/release/librefang`).","other-librefang-desktop-capabilities":"# Other — librefang-desktop-capabilities\n\n# librefang-desktop-capabilities\n\n## Overview\n\nThis module defines the **default capability set** for the LibreFang desktop application using Tauri's permission system. It is a static configuration file (`default.json`) that declares which Tauri plugins and core APIs the application is authorized to use.\n\nTauri's capability system acts as an allowlist: if a permission is not listed here, the corresponding API calls will be rejected at runtime. This file gates access for the **main window** of the application.\n\n## File Location\n\n```\nlibrefang-desktop/capabilities/default.json\n```\n\n## Schema\n\nThe file is validated against Tauri's official schema:\n\n```\nhttps://raw.githubusercontent.com/nicedoc/tauri/refs/heads/dev/crates/tauri-utils/schema.json\n```\n\nEditor tooling that supports `$schema` (VS Code, JetBrains IDEs) will provide autocompletion and validation against this schema.\n\n## Structure\n\n| Field | Value | Purpose |\n|---|---|---|\n| `identifier` | `\"default\"` | Names this capability set; referenced internally by Tauri's permission resolver |\n| `description` | Human-readable string | Documentation only — not evaluated at runtime |\n| `windows` | `[\"main\"]` | Restricts these permissions to the window labeled `\"main\"` |\n| `permissions` | Array of strings | The granted permission identifiers |\n\n## Granted Permissions\n\n### Core\n\n| Permission | Effect |\n|---|---|\n| `core:default` | Standard Tauri core APIs — window management, event system, basic IPC |\n\n### Shell\n\n| Permission | Effect |\n|---|---|\n| `shell:default` | Default shell operations (e.g., opening URLs in the system browser) |\n\n### Dialog\n\n| Permission | Effect |\n|---|---|\n| `dialog:default` | Native file picker, message boxes, and confirm dialogs |\n\n### Notification\n\n| Permission | Effect |\n|---|---|\n| `notification:default` | System notification delivery |\n\n### Global Shortcut\n\n| Permission | Effect |\n|---|---|\n| `global-shortcut:allow-register` | Register global keyboard shortcuts that work even when the app is not focused |\n| `global-shortcut:allow-unregister` | Remove previously registered shortcuts |\n| `global-shortcut:allow-is-registered` | Query whether a shortcut is currently registered |\n\nNote: Global shortcut permissions are granted individually rather than via the `default` set, indicating the app uses explicit register/unregister/query control rather than blanket access.\n\n### Autostart\n\n| Permission | Effect |\n|---|---|\n| `autostart:default` | Read and write the application's launch-at-login configuration |\n\n### Updater\n\n| Permission | Effect |\n|---|---|\n| `updater:default` | Check for and apply application updates |\n\n## How It Connects to the Codebase\n\nThis file has no imports, function calls, or runtime logic. It is consumed at **build time** by Tauri's capability resolver:\n\n1. Tauri's build plugin reads all JSON files under the `capabilities/` directory.\n2. The declared permissions are compiled into the application binary.\n3. At runtime, when frontend JavaScript or Rust backend code invokes a Tauri command (e.g., registering a global shortcut), the permission is checked against this compiled set.\n4. Unauthorized calls return a permission-denied error.\n\nBecause there are no additional capability files, this single file is the **complete** permission surface for the application.\n\n## Modifying Permissions\n\nTo add a new permission (for example, filesystem access):\n\n1. Add the permission identifier to the `permissions` array.\n2. Rebuild the application — changes to this file are not hot-reloaded.\n3. Verify that the corresponding Tauri plugin is also registered in the app's Rust-side builder (typically in `main.rs` or `lib.rs`), since a declared permission without a registered plugin has no effect.\n\nTo scope permissions to additional windows, add the window label to the `windows` array, or create a separate capability file with a different `identifier`.\n\n## Security Considerations\n\n- This file grants permissions to the **main** window. If the application opens additional windows (e.g., a popout or secondary view), they will have **no permissions** unless explicitly added.\n- `shell:default` allows opening external URLs. Validate any user-controlled input before passing it to shell APIs to prevent unintended resource access.\n- `global-shortcut` permissions allow key registration system-wide. Conflicting shortcuts with other applications should be handled gracefully via error handling around `register` calls.","other-librefang-desktop-gen":"# Other — librefang-desktop-gen\n\n# librefang-desktop-gen — Tauri Generated Schemas\n\nAuto-generated security and capability schemas for the LibreFang desktop application. This directory is produced by Tauri's build pipeline and should not be manually edited.\n\n## Purpose\n\nTauri v2 enforces a capability-based security model. Every IPC command the frontend can invoke must be explicitly permitted through a permission system. During compilation, Tauri introspects all registered plugins and application commands, then writes three schema files into this directory:\n\n| File | Role |\n|---|---|\n| `schemas/acl-manifests.json` | Full catalog of every permission every plugin exposes — identifiers, descriptions, and the allow/deny command lists. |\n| `schemas/capabilities.json` | The resolved set of capabilities actually granted to windows at runtime. |\n| `schemas/desktop-schema.json` | JSON Schema (draft-07) that validates capability definition files. Used by IDEs and tooling. |\n\nThese files are consumed by the Tauri runtime at startup and by the TypeScript/JavaScript bindings generator.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Tauri Plugins] --> B[Build Pipeline]\n    C[tauri.conf.json] --> B\n    B --> D[schemas/acl-manifests.json]\n    B --> E[schemas/capabilities.json]\n    B --> F[schemas/desktop-schema.json]\n    D --> G[Runtime Permission Check]\n    E --> G\n    F --> H[IDE Validation / TS Codegen]\n```\n\n## acl-manifests.json — Permission Catalog\n\nEach top-level key is a plugin namespace. Within each namespace there are two important structures:\n\n### Default Permission Sets\n\nA `default_permission` defines the bundle of permissions granted when you reference `plugin-name:default` in a capability. For example, `core:default` expands to the defaults of nine sub-plugins:\n\n```\ncore:path:default, core:event:default, core:window:default,\ncore:webview:default, core:app:default, core:image:default,\ncore:resources:default, core:menu:default, core:tray:default\n```\n\n### Individual Permissions\n\nEach permission entry follows an `allow-*/deny-*` naming convention that maps directly to backend command names:\n\n```json\n{\n  \"allow-enable\": {\n    \"identifier\": \"allow-enable\",\n    \"description\": \"Enables the enable command without any pre-configured scope.\",\n    \"commands\": { \"allow\": [\"enable\"], \"deny\": [] }\n  }\n}\n```\n\n- **`allow-*`** entries whitelist a specific command.\n- **`deny-*`** entries explicitly block a command, overriding any broader allow.\n\n### Plugin Namespaces Present\n\n| Namespace | Purpose | Default Grants |\n|---|---|---|\n| `autostart` | Boot auto-start control | `enable`, `disable`, `is_enabled` |\n| `core` | Umbrella for all core sub-plugins | All core sub-plugin defaults |\n| `core:app` | App metadata, listeners, theme | `version`, `name`, `tauri_version`, `identifier`, `bundle_type`, `register_listener`, `remove_listener` |\n| `core:event` | Event system (emit/listen) | `listen`, `unlisten`, `emit`, `emit_to` |\n| `core:image` | Image creation and inspection | `new`, `from_bytes`, `from_path`, `rgba`, `size` |\n| `core:menu` | Native menu construction | All menu CRUD and mutation commands |\n| `core:path` | Path resolution utilities | `resolve`, `resolve_directory`, `join`, `normalize`, etc. |\n| `core:resources` | Resource handle management | `close` |\n| `core:tray` | System tray operations | All tray CRUD and property setters |\n| `core:webview` | Webview lifecycle and props | `get_all_webviews`, `webview_position`, `webview_size`, `internal_toggle_devtools` |\n| `core:window` | Window management | Read-only queries (position, size, state) + `internal_toggle_maximize` |\n| `dialog` | Native dialogs | `ask`, `confirm`, `message`, `save`, `open` |\n| `global-shortcut` | Keyboard shortcut registration | **None by default** — must be explicitly granted |\n| `notification` | OS notification system | Full notification lifecycle |\n| `shell` | Shell/process execution | `open` only (http/https, tel, mailto) |\n| `updater` | Self-update workflow | `check`, `download`, `install`, `download_and_install` |\n\n### Shell Global Scope\n\nThe `shell` plugin is the only namespace with a `global_scope_schema`. It defines `ShellScopeEntry` objects that restrict which system commands and sidecars the frontend can invoke, with optional argument validation via regex.\n\n## capabilities.json — Active Capability Grants\n\nThis file contains the resolved capabilities the app actually uses. The LibreFang default capability:\n\n```\nIdentifier:  default\nWindows:     [\"main\"]\nLocal:       true\nPermissions:\n  core:default\n  notification:default\n  shell:default\n  dialog:default\n  global-shortcut:allow-register\n  global-shortcut:allow-unregister\n  global-shortcut:allow-is-registered\n  autostart:default\n  updater:default\n```\n\nKey observations:\n\n- **Only the `main` window** receives any IPC access. Any additional windows would need their own capability entries or must match a glob pattern.\n- **`global-shortcut`** is deliberately not granted as a default set. Only the three specific commands (`register`, `unregister`, `is_registered`) are allowed — not `register_all` or `unregister_all`.\n- **`shell`** is restricted to the default set, meaning only `open` is available. `execute`, `spawn`, `kill`, and `stdin_write` are not granted.\n\n## desktop-schema.json — Capability File Validation Schema\n\nA JSON Schema (draft-07) defining the legal structure of Tauri capability files. Key definitions:\n\n### `Capability`\n\nThe core object. Fields:\n\n- **`identifier`** (required) — Unique name for the capability grouping.\n- **`permissions`** (required) — Array of `PermissionEntry` objects.\n- **`windows`** / **`webviews`** — Glob patterns matching window/webview labels.\n- **`local`** — Whether local app URLs can use this capability (default `true`).\n- **`remote`** — Optional `CapabilityRemote` for specific external domains.\n- **`platforms`** — Optional filter to restrict to macOS, Windows, Linux, etc.\n\n### `PermissionEntry`\n\nEither a plain string identifier (`\"core:default\"`) or an object with scope:\n\n```json\n{\n  \"identifier\": \"shell:allow-execute\",\n  \"allow\": [{ \"cmd\": \"/usr/bin/ls\", \"name\": \"list-files\", \"args\": true }],\n  \"deny\": []\n}\n```\n\nThe schema uses conditional `if/then` blocks so that `allow`/`deny` scope arrays are only validated when the identifier belongs to the `shell` plugin (the only plugin with a global scope schema).\n\n### `Identifier`\n\nAn exhaustive `oneOf` enumerating every valid permission string across all plugins. This enables IDE autocomplete and validation when editing capability files.\n\n## Regeneration\n\nThese files are regenerated automatically on every build. To force regeneration:\n\n```bash\ncd librefang-desktop\ncargo tauri dev    # or: cargo tauri build\n```\n\nThe files appear at `gen/schemas/` relative to the Tauri app root. Do not commit manual changes — they will be overwritten.\n\n## Adding New Permissions\n\n1. **New plugin command**: Define the command in Rust with `#[tauri::command]`, register it in the builder. Tauri auto-generates the corresponding `allow-*`/`deny-*` entries on next build.\n\n2. **Grant to frontend**: Edit the capability file (typically in `src-tauri/capabilities/default.json`) to add the permission identifier, then rebuild.\n\n3. **Scope-restricted permissions**: For plugins like `shell` that support scoping, provide `allow`/`deny` arrays in the capability entry to constrain what arguments or paths the frontend can pass.","other-librefang-desktop":"# Other — librefang-desktop\n\n# librefang-desktop\n\nNative desktop application for LibreFang, built on **Tauri 2.0**. This crate packages the LibreFang agent runtime into a platform-native desktop shell with system tray integration, auto-update support, and native OS dialogs.\n\n## Purpose\n\nLibreFang's core services (kernel, API server, extensions) are headless by design. `librefang-desktop` wraps those services in a native window with:\n\n- A system tray icon for background operation\n- Native OS notifications and dialogs\n- Single-instance enforcement (only one copy runs at a time)\n- Global keyboard shortcuts\n- Auto-launch on login\n- Automatic updates from GitHub Releases\n\nThe web UI is served by the embedded `librefang-api` HTTP server, and Tauri's webview renders it in a native window.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Tauri App] --> B[System Tray]\n    A --> C[Native Plugins]\n    C --> D[Notification]\n    C --> E[Shell / Open]\n    C --> F[Single Instance]\n    C --> G[Dialog]\n    C --> H[Global Shortcut]\n    C --> I[Autostart]\n    C --> J[Updater]\n    A --> K[librefang-api]\n    K --> L[librefang-kernel]\n    K --> M[librefang-extensions]\n    K --> N[librefang-types]\n```\n\nThe binary is a standard Tauri application. At startup it initializes the agent stack through the dependent crates and opens a webview pointed at the local API server.\n\n## Dependencies on Other Crates\n\n| Crate | Role |\n|---|---|\n| `librefang-kernel` | Core agent runtime — manages agent lifecycle and orchestration |\n| `librefang-api` | HTTP/WebSocket server that serves the web UI — runs on `127.0.0.1` inside the app |\n| `librefang-types` | Shared type definitions |\n| `librefang-extensions` | Extension system for agent capabilities |\n\n`librefang-api` is included **without default features** by default, which means the API server starts in its minimal embedded configuration suitable for in-process use alongside the Tauri runtime.\n\n## Feature Flags\n\nFeatures are forwarded to `librefang-api` to control which transport channels are compiled in:\n\n| Feature | Effect |\n|---|---|\n| `default` | Standard feature set (forwards to `librefang-api/default`) |\n| `all-channels` | Enables all communication channels (forwards to `librefang-api/all-channels`) |\n| `mini` | Minimal build with fewer channels (forwards to `librefang-api/mini`) |\n| `custom-protocol` | Tauri production feature — uses `tauri://` protocol instead of `localhost` for serving assets. **Required for release builds.** |\n\n## Tauri Configuration\n\nDefined in `tauri.conf.json`.\n\n### App Identity\n\n- **Product name:** `LibreFang`\n- **Identifier:** `ai.librefang.desktop`\n- **Version:** synced via workspace (`26.4.32245`)\n\n### Windows\n\nThe `windows` array is **empty** in the config. Windows are created programmatically at runtime — typically a single main window pointing at the local API server.\n\n### Content Security Policy\n\nThe CSP allows:\n\n- Connections to `http://127.0.0.1:*` and `ws://127.0.0.1:*` (the embedded API)\n- Google Fonts loading (`https://fonts.googleapis.com`, `https://fonts.gstatic.com`)\n- Inline styles and scripts (required for the SPA framework)\n- Media and frame sources from `blob:` and local origins\n- `object-src 'none'` and `base-uri 'self'` for hardening\n\n### Auto-Updater\n\nConfigured to check GitHub Releases for updates:\n\n```json\n\"endpoints\": [\"https://github.com/librefang/librefang/releases/latest/download/latest.json\"]\n```\n\n- Uses a public key for signature verification (embedded in config)\n- On Windows, uses **passive** install mode (prompts user, installs in background)\n- Signing is handled via Tauri's built-in updater signing with Ed25519\n\n### Bundle Settings\n\nTargets all platforms:\n\n| Platform | Format | Notes |\n|---|---|---|\n| **Linux** | `.deb`, `.AppImage` | No media framework bundling; no extra deb dependencies |\n| **macOS** | `.dmg`, `.app` | Minimum macOS 12.0; no custom entitlements |\n| **Windows** | `.msi`, `.exe` | SHA-256 digest; WebView2 downloaded via bootstrapper if missing |\n\n## Tauri Plugins Used\n\n| Plugin | Purpose |\n|---|---|\n| `tauri-plugin-notification` | Native OS notifications for agent events |\n| `tauri-plugin-shell` | Opening external URLs/files via the OS |\n| `tauri-plugin-single-instance` | Ensures only one app instance runs; forwards args to existing instance |\n| `tauri-plugin-dialog` | Native file open/save dialogs, message boxes |\n| `tauri-plugin-global-shortcut` | System-wide hotkeys (e.g., show/hide window) |\n| `tauri-plugin-autostart` | Register/unregister login item (LaunchAgent, registry key, etc.) |\n| `tauri-plugin-updater` | Check and apply updates from GitHub Releases |\n\n## Build\n\nThe build script (`build.rs`) delegates entirely to `tauri_build::build()`, which:\n\n1. Compiles and bundles frontend assets\n2. Generates the Tauri runtime metadata\n3. Produces platform-specific installers based on `bundle.targets`\n\n```bash\n# Development build\ncargo build -p librefang-desktop\n\n# Production build (uses custom-protocol for asset serving)\ncargo build -p librefang-desktop --features custom-protocol --release\n```\n\n## Connection to the Rest of the Codebase\n\n`librefang-desktop` is the top-level user-facing entry point. It does not export any libraries — it is a pure binary crate.\n\n**Inbound:** Nothing depends on this crate.\n\n**Outbound:** It consumes the entire LibreFang stack at runtime by pulling in `librefang-kernel` (agent execution), `librefang-api` (HTTP/WS server for the UI), `librefang-extensions` (plugin system), and `librefang-types` (shared data structures).\n\nThe desktop app starts the API server in-process, then opens a Tauri webview window pointing at it. The frontend communicates with the backend over HTTP/WebSocket on `127.0.0.1`, using the same API that would be available if running `librefang-api` as a standalone server.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang, providing one-click MCP server setup, an encrypted credential vault, and OAuth2 PKCE authentication flows.\n\n## Purpose\n\nThis crate serves as the integration layer between LibreFang and external services. It handles three core responsibilities:\n\n- **MCP Server Management** — discovering, configuring, and launching Model Context Protocol servers with minimal user friction (\"one-click\" setup).\n- **Credential Vault** — securely storing and retrieving API keys, tokens, and other secrets at rest using AES-256-GCM encryption with Argon2 key derivation.\n- **OAuth2 PKCE** — performing browser-based OAuth2 authorization flows (with Proof Key for Code Exchange) for services that require it, including spinning up a local HTTP callback server.\n\n## Architecture\n\n```mermaid\ngraph TD\n    LF[\"LibreFang Core\"] -->|uses| EXT[\"librefang-extensions\"]\n    EXT -->|depends on| TYPES[\"librefang-types\"]\n    EXT -->|manages| VAULT[\"Credential Vault\"]\n    EXT -->|manages| OAUTH[\"OAuth2 PKCE Flow\"]\n    EXT -->|manages| MCP[\"MCP Server Setup\"]\n    VAULT -->|AES-256-GCM| DISK[\"Encrypted Storage\"]\n    OAUTH -->|axum callback| BROWSER[\"Browser Auth\"]\n    MCP -->|spawns| SERVERS[\"MCP Server Processes\"]\n```\n\n## Key Components\n\n### Credential Vault\n\nEncrypts sensitive credentials before writing them to disk and decrypts them on demand. The vault never holds plaintext secrets in memory longer than necessary.\n\n**Cryptographic stack** (derived from dependencies):\n\n| Concern | Library | Details |\n|---|---|---|\n| Symmetric encryption | `aes-gcm` | AES-256-GCM authenticated encryption |\n| Key derivation | `argon2` | Argon2 password-based KDF for deriving encryption keys from a master passphrase |\n| Secure memory | `zeroize` | Plaintext keys and credentials are zeroed after use |\n| Hashing | `sha2` | SHA-256 for integrity checks and PKCE code challenges |\n| Random generation | `rand` | Cryptographically secure random nonces and salt generation |\n\nVault files are stored under the user's data directory (via `dirs`), and all concurrent access is managed through `dashmap`.\n\n### OAuth2 PKCE\n\nImplements the full Authorization Code Flow with PKCE for browser-based authentication:\n\n1. Generates a cryptographically random code verifier (`rand` + `base64`).\n2. Derives the code challenge using SHA-256 (`sha2`).\n3. Opens the user's browser to the authorization endpoint (`url` for URL construction).\n4. Spins up a temporary local HTTP server (`axum`) to receive the callback with the authorization code.\n5. Exchanges the code for tokens via `reqwest`, using TLS verification through `rustls` with platform-native and/or Mozilla certificate roots.\n6. Stores the resulting tokens in the credential vault.\n\n### MCP Server Setup\n\nHandles the lifecycle of MCP server integrations:\n\n- **Discovery and configuration** — reads server definitions from TOML/JSON configuration files (`toml`, `serde_json`).\n- **One-click setup** — orchestrates the steps needed to get an MCP server running, including credential provisioning (pulling from the vault or triggering an OAuth2 flow as needed).\n- **Process management** — spawns and tracks MCP server processes via Tokio's async runtime.\n\n### TLS Stack\n\nAll outbound HTTP connections (token exchanges, MCP API calls) use `reqwest` backed by `rustls` rather than the system TLS library. Certificate roots come from two sources:\n\n- `webpki-roots` — Mozilla's bundled CA certificates.\n- `rustls-native-certs` — Platform-native certificate store.\n\nThis ensures connectivity in both bundled and system-installed configurations.\n\n## Dependencies on Other Crates\n\n| Dependency | Usage |\n|---|---|\n| `librefang-types` | Shared types (credentials, server descriptors, extension manifests) |\n| `librefang-runtime` (dev) | Used only in tests for async runtime access |\n\nNo other LibreFang crates depend on `librefang-extensions` at the compilation level — it is consumed at the application layer by higher-level crates that compose the full LibreFang binary.\n\n## Thread Safety and Concurrency\n\nThe credential vault uses `dashmap` for lock-free concurrent read/write access, allowing multiple extension handlers to retrieve or store credentials simultaneously without blocking. All async operations run on the Tokio runtime, and the local OAuth2 callback server integrates with the same runtime.\n\n## Testing\n\nDev-dependencies include `tokio-test` for async test helpers, `tempfile` for isolated vault storage during tests, and `serial_test` to serialize tests that touch shared filesystem state (such as the encrypted vault files on disk).","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nThe hands system for LibreFang — provides curated autonomous capability packages that encapsulate discrete, composable units of functionality within the LibreFang ecosystem.\n\n## Overview\n\nA **Hand** is a self-contained capability package that defines an autonomous action or set of actions the system can perform. Hands are the primary mechanism by which LibreFang extends its behavior: each hand declares what it can do, what it requires, and how it executes.\n\nThis module is responsible for:\n\n- **Defining** the Hand data model and associated types\n- **Loading** hand specifications from configuration (TOML/JSON)\n- **Managing** a concurrent registry of available hands\n- **Validating** hand definitions before registration\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[TOML/JSON Config] -->|Load| B[Hand Spec]\n    B -->|Validate| C{Valid?}\n    C -->|Yes| D[Hand Registry - DashMap]\n    C -->|No| E[ValidationError]\n    D -->|Lookup| F[librefang-runtime]\n    B --> G[librefang-types]\n```\n\nHands are loaded from declarative configuration files, validated against the expected schema, and registered in a concurrent registry (`DashMap`). The runtime module (`librefang-runtime`) consumes registered hands for execution.\n\n## Key Concepts\n\n### Hand\n\nA hand represents a single autonomous capability. Each hand carries:\n\n- A **unique identifier** (`uuid`) for tracking and deduplication\n- **Metadata** including name, description, and timestamps (`chrono`)\n- A **capability specification** defining inputs, outputs, and constraints\n- **Configuration** loaded from serialized formats (`serde` + `toml`/`serde_json`)\n\n### Hand Registry\n\nThe module maintains a thread-safe registry of all loaded hands using `DashMap`, allowing concurrent reads and writes without a global lock. This supports the async, multi-task nature of the LibreFang runtime.\n\n### Validation\n\nBefore a hand enters the registry, it undergoes validation to ensure structural correctness and internal consistency. Errors during validation or loading are surfaced through a typed error enum using `thiserror`.\n\n## Dependencies and Integration\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across all LibreFang modules |\n| `serde` / `serde_json` / `toml` | Serialization and deserialization of hand specifications |\n| `thiserror` | Ergonomic error types for load and validation failures |\n| `tracing` | Structured logging throughout the hand lifecycle |\n| `uuid` | Unique identification of each hand instance |\n| `chrono` | Timestamping for creation, modification, and audit |\n| `dashmap` | Lock-free concurrent hashmap for the hand registry |\n\nThe runtime module (`librefang-runtime`) is a **dev-dependency**, used only in tests to verify that hands integrate correctly with the execution environment.\n\n## Error Handling\n\nAll fallible operations return typed errors derived via `thiserror`. The primary error categories are:\n\n- **Parse errors** — malformed TOML or JSON configuration\n- **Validation errors** — a hand definition that doesn't meet schema requirements\n- **Registry errors** — conflicts such as duplicate hand registration\n\nErrors are instrumented with `tracing` spans to provide context in logs.\n\n## Testing\n\nThe test suite uses:\n\n- `tokio-test` for async test harnesses\n- `tempfile` for creating isolated configuration files during tests\n- `serial_test` to order tests that share global state\n- `librefang-runtime` to verify end-to-end hand execution\n\nRun the tests:\n\n```bash\ncargo test -p librefang-hands\n```","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing consistent TLS configuration and proxy support across the LibreFang workspace.\n\n## Purpose\n\nEvery component in LibreFang that makes outbound HTTP requests (scrapers, feed fetchers, API clients) needs a properly configured `reqwest` client. This crate centralizes that configuration so TLS trust anchors and proxy settings are handled uniformly rather than duplicated across crates.\n\nThe two core concerns this module owns:\n\n- **TLS certificate resolution** — Builds a `rustls::RootCertStore` by loading the system's native certificate store, with a fallback to Mozilla's bundled `webpki-roots` if native certs are missing or unreadable.\n- **Client construction** — Exposes a pre-configured `reqwest::ClientBuilder` (or fully-built `reqwest::Client`) so downstream crates don't have to think about TLS backends, cipher suites, or proxy environment variables.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `reqwest` | HTTP client; uses the `rustls-tls` feature (via workspace) rather than native-tls |\n| `rustls` | Pure-Rust TLS implementation |\n| `webpki-roots` | Mozilla's CA certificate bundle, bundled at compile time |\n| `rustls-native-certs` | Loads certificates from the OS trust store |\n| `tracing` | Emits warnings when certificate sources fail |\n| `librefang-types` | Shared type definitions across the workspace |\n\n## How TLS Certificate Loading Works\n\n```mermaid\nflowchart TD\n    A[Build RootCertStore] --> B{Load native certs}\n    B -->|Success| C[Use native certs]\n    B -->|Failure| D[Warn via tracing]\n    D --> E[Load webpki-roots]\n    C --> F[Configure reqwest ClientBuilder]\n    E --> F\n    F --> G[Return Client to caller]\n```\n\nThe strategy is defensive: on most Linux systems, `rustls-native-certs` will find certificates in `/etc/ssl/certs` or the distribution's equivalent. On minimal containers or unusual environments, that load may return empty or error. When that happens, the module logs a warning and falls back to `webpki-roots`, ensuring HTTPS requests still work.\n\n## Integration with Other Crates\n\nDownstream crates depend on `librefang-http` at the library level:\n\n```toml\n# In a sibling crate's Cargo.toml\n[dependencies]\nlibrefang-http = { path = \"../librefang-http\" }\n```\n\nThey then use the provided builder/client instead of calling `reqwest::Client::new()` directly. This guarantees that every outbound request shares the same TLS trust anchors and proxy behavior.\n\n## Relationship to `librefang-types`\n\nThis crate depends on `librefang-types` for any shared configuration structs or error types related to HTTP setup (e.g., proxy configuration, timeout settings). It does **not** depend on higher-level crates — nothing in `librefang-http` knows about feeds, scraping, or domain-specific logic.\n\n## Building and Testing\n\nFrom the workspace root:\n\n```bash\ncargo build -p librefang-http\ncargo test -p librefang-http\n```\n\nBecause the module uses `rustls` rather than `native-tls`, no system OpenSSL development headers are required. The only runtime requirement for full native cert loading is that the host system has a populated certificate store — otherwise the webpki-roots fallback is used automatically.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\nProvides the `KernelHandle` trait — the primary in-process interface for callers that need to interact with the LibreFang kernel.\n\n## Purpose\n\nThis crate defines a trait abstraction that decouples kernel consumers from the kernel's concrete implementation. Any component running in the same process as the LibreFang kernel (services, plugins, internal subsystems) depends on a `KernelHandle` implementation rather than the kernel directly, which keeps coupling loose and makes testing straightforward.\n\n## Dependencies and What They Imply\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared domain types exchanged across kernel boundaries |\n| `async-trait` | The `KernelHandle` trait methods are async |\n| `serde` / `serde_json` | Request/response serialization for kernel operations |\n| `tokio` | Async runtime primitives |\n| `tracing` | Structured logging and span instrumentation on kernel calls |\n| `uuid` | Identifier generation, likely for correlating requests or tracking kernel operations |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[In-Process Caller] -->|depends on trait| B[KernelHandle Trait]\n    B -->|implemented by| C[Kernel Core]\n    B -->|implemented by| D[Test Mock / Stub]\n```\n\nThe trait sits between callers and the kernel. Production callers receive a real kernel-backed implementation. Tests substitute a lightweight mock that satisfies the same contract without needing kernel state.\n\n## Usage Pattern\n\nCallers receive a `KernelHandle` — typically through dependency injection or a constructor argument — and invoke its async methods to perform kernel operations. The caller never knows (or cares) whether it is talking to the live kernel or a test double.\n\nBecause the call graph shows no outgoing or incoming edges, this module is purely definitional: it declares the interface without pulling in additional internal crates at runtime. The only substantive dependency is `librefang-types` for the shared vocabulary.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis module provides the infrastructure for tracking computational resource consumption and enforcing usage limits within the LibreFang kernel. It acts as the kernel's accounting layer — recording how much work has been performed and ensuring that consumers do not exceed their allocated quotas.\n\nMetering in this context refers to the continuous measurement of resource usage (compute cycles, memory allocations, or other cost units), while quota enforcement is the policy mechanism that decides whether a requested operation is permitted based on current usage versus configured limits.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the kernel |\n| `librefang-memory` | Memory management primitives, likely used for allocation tracking within metering |\n| `librefang-runtime` | Runtime support for execution context and scheduling |\n| `serde` | Serialization of metering records and quota configurations for persistence or transport |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> D[librefang-kernel-metering]\n    B[librefang-memory] --> D\n    C[librefang-runtime] --> D\n    D -->|metering data| E[Consumers]\n```\n\nThe module sits between the kernel's foundational libraries (`types`, `memory`, `runtime`) and higher-level consumers that need to query or enforce resource limits. It defines the data model for metering and the logic for quota checks, but relies on external callers to integrate these checks into the execution path.\n\n## Key Concepts\n\n### Cost Metering\n\nEvery billable or trackable operation contributes to a metering counter. The module is responsible for:\n\n- **Recording** cost units consumed by operations.\n- **Aggregating** usage over time windows or per-tenant scopes.\n- **Persisting** metering data via `serde`-based serialization for durability or reporting.\n\n### Quota Enforcement\n\nQuotas are the hard limits applied on top of metered usage. The enforcement layer:\n\n- **Checks** current metered usage against configured quota thresholds.\n- **Rejects** or **throttles** operations that would exceed the quota.\n- **Provides** feedback to callers about remaining capacity.\n\n## Integration Points\n\n### Downstream Consumers\n\nOther kernel modules and external services are expected to:\n\n1. **Query** the current metered usage before performing expensive operations.\n2. **Report** cost increments after operations complete.\n3. **Subscribe** to quota exhaustion events if applicable.\n\n### Serialization\n\nThe `serde` dependency indicates that metering records and quota configurations are serializable. This supports:\n\n- Persisting usage data across restarts.\n- Transmitting metering information to external billing or monitoring systems.\n- Loading quota configurations from external sources.\n\n## Implementation Notes\n\nGiven the module's current state (no detected execution flows or call edges), it likely consists primarily of **data structure definitions** and **pure logic functions** rather than runtime-active services. Consumers instantiate and drive the metering lifecycle themselves.\n\nWhen contributing to this module:\n\n- Keep metering logic **pure and side-effect-free** where possible — callers should control when and how state is mutated.\n- Ensure all metering types derive or implement `Serialize` / `Deserialize` from `serde` for compatibility with the persistence layer.\n- Avoid introducing circular dependencies with `librefang-memory` or `librefang-runtime`; this module should remain a consumer, not a provider, of those APIs.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand and template routing engine for the LibreFang kernel. This module is responsible for resolving user input events to the appropriate hand definitions and template layouts, acting as the central dispatch layer between raw input and the rendering pipeline.\n\n## Role in the Architecture\n\n`librefang-kernel-router` sits between the input layer and the layout engine. When a key event or gesture is detected, the router determines which hand configuration and which template should handle it. This decouples input detection from the actual finger positioning and glyph rendering logic.\n\n```\n┌─────────────┐     ┌──────────────────────┐     ┌──────────────┐\n│ Input Layer │────▶│ librefang-kernel-    │────▶│ Layout/      │\n│             │     │ router               │     │ Rendering    │\n└─────────────┘     └──────────────────────┘     └──────────────┘\n                           │\n                    ┌──────┴──────┐\n                    ▼             ▼\n             librefang-     Config /\n             hands          Template\n                            Files\n```\n\n## Dependencies and What They Enable\n\n| Dependency | Purpose in This Module |\n|---|---|\n| `librefang-types` | Shared type definitions—key codes, hand identifiers, routing result types |\n| `librefang-hands` | Hand definitions and finger mapping data used during routing |\n| `serde` / `serde_json` | Deserialization of route configurations and template files |\n| `toml` | Parsing of user-facing TOML configuration files for custom routes |\n| `regex-lite` | Pattern matching against input identifiers or template selectors |\n| `dirs` | Resolving platform-specific config directories for user route overrides |\n| `tracing` | Instrumentation of routing decisions for debugging and diagnostics |\n\n## Key Concepts\n\n### Hands\n\nA \"hand\" represents a physical hand layout—a mapping of fingers to positional slots. The router queries `librefang-hands` to look up hand definitions when resolving a route. Hands are typically identified by a string or enum variant (e.g., left hand vs. right hand, or a named custom layout).\n\n### Templates\n\nTemplates define the structural arrangement of glyphs or actions within a given context. The router matches an input event to a template, which then dictates how downstream modules render or interpret the input.\n\n### Routing\n\nRouting is the process of accepting an input event (key press, gesture, or mode change) and producing a resolved target: which hand to use and which template to apply. Routes can be built-in defaults or user-defined overrides loaded from configuration.\n\n## Configuration Loading\n\nThe module uses `dirs` to locate platform-appropriate configuration directories and `toml` to parse route definitions. This allows users to define custom routing rules without modifying compiled code. A typical config lookup sequence:\n\n1. Check the user's local config directory (via `dirs::config_dir()`).\n2. Look for a LibreFang-specific subdirectory.\n3. Parse any `.toml` route override files found.\n4. Fall back to compiled-in default routes if no overrides exist.\n\n## Testing\n\nThe dev-dependency on `librefang-runtime` indicates that integration tests spin up a minimal runtime to exercise routing end-to-end, while `tempfile` is used to create isolated config directories for deterministic test runs.\n\n## Integration Points\n\nOther kernel modules call into the router when they need to resolve an input context. The router itself is primarily a lookup and dispatch engine—it does not own state beyond its loaded configuration. It delegates to:\n\n- **`librefang-hands`** for hand structure queries.\n- **`librefang-types`** for shared data structures passed back to callers.\n\nConsumers of this module should expect a stateless or lazily-initialized service: load the configuration once, then query routes repeatedly with no side effects.","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel Tests\n\nIntegration and end-to-end test suite for the `librefang-kernel` crate. These tests exercise the full kernel lifecycle — boot, agent spawning, messaging, hand management, WASM execution, workflow orchestration, and CLI tooling — against real infrastructure when API keys are available, and against stubs otherwise.\n\n## Test Files\n\n| File | Scope | Requires API Key |\n|---|---|---|\n| `integration_test.rs` | Basic agent boot → spawn → message pipeline | `GROQ_API_KEY` |\n| `multi_agent_test.rs` | Hand lifecycle, multi-agent coexistence, state persistence | Partial (fleet test only) |\n| `wasm_agent_integration_test.rs` | WASM module loading, execution, fuel limits, streaming | No |\n| `workflow_integration_test.rs` | Workflow registration, agent resolution, multi-step pipelines | `GROQ_API_KEY` (E2E only) |\n| `purge_sentinels_test.rs` | `purge_sentinels` CLI binary | No |\n\n## Running the Tests\n\n```bash\n# Fast: all local tests (no API keys needed)\ncargo test -p librefang-kernel\n\n# Full: include live LLM integration tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel -- --nocapture\n```\n\nTests that require `GROQ_API_KEY` print a skip message and return early when the variable is unset — they never fail in CI without keys.\n\nWASM tests require `#[tokio::test(flavor = \"multi_thread\")]` because WASM execution spawns blocking tasks.\n\nThe workflow E2E test sets `#![recursion_limit = \"256\"]` at the crate level to accommodate deeply-nested future types produced by the kernel → runtime → agent_loop call chain.\n\n## Kernel Boot Pattern\n\nEvery test follows the same structure:\n\n```\n1. Create a KernelConfig with an isolated temp directory\n2. Boot the kernel with LibreFangKernel::boot_with_config()\n3. Exercise the API under test\n4. Call kernel.shutdown()\n```\n\nEach test creates its own temp directory (under `$TMPDIR/librefang-<test-name>-<suffix>`) to avoid state leakage between parallel runs. The `test_config()` helpers in each file construct a `KernelConfig` pointing at these isolated paths.\n\n## Test Coverage by Domain\n\n### Agent Lifecycle (`integration_test.rs`)\n\nTests the minimal happy path:\n\n- **`test_full_pipeline_with_groq`** — Boots kernel, spawns a single agent from a TOML `AgentManifest`, sends `\"Say hello in exactly 5 words.\"`, asserts a non-empty response and token usage > 0, then kills the agent.\n- **`test_multiple_agents_different_models`** — Spawns two agents (llama-3.3-70b-versatile and llama-3.1-8b-instant) simultaneously, sends messages to both, verifies both respond. Tests that the kernel correctly multiplexes different model configs.\n\nBoth tests validate the response struct fields: `result.response`, `result.total_usage.input_tokens`, `result.total_usage.output_tokens`, `result.iterations`.\n\n### Hand Lifecycle (`multi_agent_test.rs`)\n\nThe most extensive test file. Covers the hand system (reusable agent templates):\n\n**Activation and Deactivation**\n\n- `test_activate_hand_spawns_agent` — Installing a hand definition and activating it creates a live agent in the registry.\n- `test_deactivate_kills_agent` — `deactivate_hand` removes the agent from the registry.\n- `test_activate_nonexistent_hand_fails` / `test_deactivate_nonexistent_instance_fails` — Error handling for invalid IDs.\n\n**Deterministic Agent IDs**\n\n- `test_deterministic_agent_id` — Agent IDs derive from `AgentId::from_hand_agent(hand_id, role, None)`, producing the same ID for the same hand + role combination.\n- `test_deterministic_id_stable_across_reactivation` — Deactivating and reactivating a single-instance hand produces the same agent ID (legacy format).\n\n**Coordinator Roles**\n\n- `test_explicit_coordinator_role_used_for_routes` — A hand with `[agents.planner] coordinator = true` routes messages to the planner role, not the first-defined agent. The `HandInstance.coordinator_role` field reflects this.\n\n**Pause and Resume**\n\n- `test_pause_and_resume_hand` — Pausing sets status to `\"Paused\"` while keeping the agent alive. Resuming sets it back to `\"Active\"`. Error cases for nonexistent instances also tested.\n\n**Metadata and Tool Inheritance**\n\n- `test_agent_tagged_with_hand_metadata` — Agents spawned by hands receive tags `hand:<hand_id>` and `hand_instance:<instance_id>`.\n- `test_hand_tools_applied_to_agent` — Tools declared in the hand definition (`tools = [\"file_read\", \"file_write\", \"shell_exec\"]`) propagate to the agent's `capabilities.tools`.\n- `test_system_prompt_preserved` — The hand's `system_prompt` appears in the agent manifest.\n- `test_default_provider_resolved_to_kernel_default` — `provider = \"default\"` and `model = \"default\"` in hand definitions are resolved to the actual values from `KernelConfig.default_model`.\n\n**State Persistence**\n\n- `test_hand_state_persistence` — After activation, `data/hand_state.json` is written with version 4 format, including typed fields (`instance_id`, `status`, `activated_at`, `updated_at` as strings) and an `agent_ids` map.\n- `test_multi_agent_hand_state_persists_coordinator_role` — The `coordinator_role` field is persisted in the state file.\n\n**Multi-Hand Coexistence**\n\n- `test_multiple_hands_coexist` — Two different hands can be active simultaneously with distinct agent IDs.\n- `test_deactivate_one_hand_preserves_other` — Killing one hand's instance leaves the other hand's agent alive.\n- `test_find_instance_by_agent_id` — `hands().find_by_agent()` reverse-maps from agent ID to hand instance.\n\n**Trigger Reactivation**\n\n- `test_reactivation_restores_triggers_to_original_roles` — After deactivating and reactivating a multi-agent hand, triggers remain attached to their original role's agent. The planner does not inherit the analyst's triggers.\n\n**Live Fleet Test**\n\n- `test_six_agent_fleet` — Spawns 6 agents (coder, researcher, writer, ops, analyst, hello-world) with different models and tool sets, sends a unique prompt to each, verifies all respond. Prints a fleet summary with aggregate token usage.\n\n### WASM Agents (`wasm_agent_integration_test.rs`)\n\nTests the `module = \"wasm:<path>\"` agent type using hand-written WAT (WebAssembly Text Format) modules:\n\n**Test Modules**\n\n| Module | Behavior |\n|---|---|\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` from pre-loaded memory |\n| `ECHO_WAT` | Returns input JSON as-is (pointer/length passthrough) |\n| `INFINITE_LOOP_WAT` | Infinite `br` loop — tests fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\n**Test Cases**\n\n- `test_wasm_agent_hello_response` — Fixed-response module returns `\"hello from wasm\"`.\n- `test_wasm_agent_echo` — Echo module's response contains the input message.\n- `test_wasm_agent_fuel_exhaustion` — Infinite loop triggers a fuel-exhaustion error (checks for `\"Fuel exhausted\"` or `\"fuel\"` in error message).\n- `test_wasm_agent_missing_module` — Referencing a nonexistent `.wasm` file fails with a descriptive error.\n- `test_wasm_agent_host_call_time` — End-to-end test of the `host_call` import mechanism.\n- `test_wasm_agent_streaming_fallback` — `send_message_streaming` on a WASM agent produces at least 2 events (`TextDelta` + `ContentComplete`), then resolves to the same response as `send_message`.\n- `test_multiple_wasm_agents` — Two WASM agents coexist (echo + hello), registry count is 3 (includes default assistant).\n- `test_mixed_wasm_and_llm_agents` — WASM and builtin:chat agents coexist in the same kernel. Killing the WASM agent reduces the registry count.\n\nWASM modules must export `memory`, `alloc(size) -> ptr`, and `execute(ptr, len) -> i64` (packed as high-32=pointer, low-32=length).\n\n### Workflows (`workflow_integration_test.rs`)\n\nTests the workflow engine that chains agents into multi-step pipelines:\n\n**Kernel-Level Wiring (no LLM)**\n\n- `test_workflow_register_and_resolve` — Creates a 2-step `Workflow` with `StepAgent::ByName`, registers it via `kernel.register_workflow()`, verifies it appears in `workflow_engine().list_workflows()`, and that `agent_registry().find_by_name()` resolves the agent. Creates a run and verifies the input is stored.\n- `test_workflow_agent_by_id` — Same but with `StepAgent::ById`, proving the workflow accepts direct agent IDs.\n- `test_trigger_registration_with_kernel` — Registers `TriggerPattern::Lifecycle` and `TriggerPattern::SystemKeyword` triggers on an agent, lists them (global and per-agent), removes one, verifies the other remains.\n\n**Full E2E with LLM**\n\n- `test_workflow_e2e_with_groq` — Spawns two agents (`wf-analyst` and `wf-writer`), creates a sequential 2-step workflow (analyze → summarize), runs it with real Groq LLM calls. Verifies:\n  - Both steps produce non-empty output\n  - Token usage is > 0 for all steps\n  - `WorkflowRunState::Completed`\n  - `step_results` contains 2 entries with correct step names\n  - `workflow_engine().list_runs()` returns 1 run\n\nWorkflow steps use `prompt_template` with `{{input}}` and `{{output_var}}` interpolation.\n\n### Purge Sentinels CLI (`purge_sentinels_test.rs`)\n\nTests the `purge_sentinels` binary that removes sentinel lines (e.g., `NO_REPLY`, `[no reply needed]`) from markdown files.\n\n**Test Fixtures**\n\nThe `fixture_dir()` helper creates a temp directory with:\n\n| File | Content |\n|---|---|\n| `a.md` | Two whole-line sentinels (`NO_REPLY`, `[no reply needed]`) plus real text |\n| `b.md` | Mid-sentence `NO_REPLY` (not whole-line) — should be preserved |\n| `c.md` | Clean file, no sentinels |\n| `nested/d.md` | Lowercase `no_reply` with surrounding whitespace |\n\n**Test Cases**\n\n- `dry_run_reports_counts_and_touches_nothing` — `--dry-run` prints removal counts but leaves all files and backups unchanged.\n- `apply_creates_backup_and_rewrites` — `--apply` creates `.bak` files with original content, removes whole-line sentinels, preserves mid-sentence sentinels, skips clean files, recurses into subdirectories.\n- `apply_is_idempotent` — Running `--apply` twice produces `removed=0` on the second pass with no file changes.\n- `apply_aborts_when_existing_bak_differs` — If a `.bak` file exists but doesn't match the current file content, the tool exits non-zero with a `\"backup mismatch\"` error.\n- `nonexistent_path_exits_non_zero` — Invalid paths produce a clear `\"does not exist\"` error.\n\n## Key Kernel API Surface Exercised\n\n```rust\n// Boot and shutdown\nLibreFangKernel::boot_with_config(config) -> Result<LibreFangKernel>\nkernel.shutdown()\n\n// Agent management\nkernel.spawn_agent(manifest) -> Result<AgentId>\nkernel.kill_agent(agent_id) -> Result<()>\nkernel.agent_registry().get(id) -> Option<AgentEntry>\nkernel.agent_registry().find_by_name(name) -> Option<AgentEntry>\nkernel.agent_registry().list() -> Vec<AgentEntry>\nkernel.agent_registry().count() -> usize\n\n// Messaging\nkernel.send_message(agent_id, text).await -> Result<AgentResponse>\nkernel.send_message_streaming(agent_id, text, None) -> Result<(Receiver, JoinHandle)>\n\n// Hands\nkernel.hands().install_from_content(toml, path)\nkernel.activate_hand(hand_id, HashMap::new()) -> Result<HandInstance>\nkernel.deactivate_hand(instance_id) -> Result<()>\nkernel.pause_hand(instance_id) -> Result<()>\nkernel.resume_hand(instance_id) -> Result<()>\nkernel.hands().get_instance(instance_id) -> Option<HandInstance>\nkernel.hands().find_by_agent(agent_id) -> Option<HandInstance>\n\n// Triggers\nkernel.register_trigger(agent_id, pattern, template, priority) -> Result<TriggerId>\nkernel.list_triggers(Some(agent_id)) -> Vec<Trigger>\nkernel.remove_trigger(trigger_id) -> bool\n\n// Workflows\nkernel.register_workflow(workflow).await -> WorkflowId\nkernel.run_workflow(wf_id, input).await -> Result<(RunId, String)>\nkernel.workflow_engine().list_workflows().await -> Vec<Workflow>\nkernel.workflow_engine().create_run(wf_id, input).await -> Option<RunId>\nkernel.workflow_engine().get_run(run_id).await -> Option<WorkflowRun>\nkernel.workflow_engine().list_runs(None).await -> Vec<WorkflowRun>\n```\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Files\"\n        IT[integration_test.rs]\n        MA[multi_agent_test.rs]\n        WA[wasm_agent_integration_test.rs]\n        WF[workflow_integration_test.rs]\n        PS[purge_sentinels_test.rs]\n    end\n\n    subgraph \"Kernel API\"\n        KB[LibreFangKernel::boot_with_config]\n        SA[spawn_agent / kill_agent]\n        SM[send_message / send_message_streaming]\n        HH[activate_hand / deactivate_hand / pause_hand]\n        TR[register_trigger / list_triggers]\n        WR[register_workflow / run_workflow]\n    end\n\n    subgraph \"External\"\n        GQ[Groq API]\n        WM[WASM Runtime]\n        FS[Filesystem]\n    end\n\n    IT --> KB --> SA --> SM --> GQ\n    MA --> KB --> HH --> SA\n    WA --> KB --> SA --> WM\n    WF --> KB --> SA --> WR --> GQ\n    PS --> FS\n```\n\n## Adding New Tests\n\nWhen adding integration tests to this crate:\n\n1. **Isolate state** — Always create a unique temp directory via `test_config(\"descriptive-name\")`. Never share directories between tests.\n2. **Always shutdown** — End every test with `kernel.shutdown()` to clean up resources.\n3. **Guard live LLM tests** — Wrap Groq-dependent code with `if std::env::var(\"GROQ_API_KEY\").is_err() { return; }`.\n4. **Use `multi_thread` for WASM** — WASM tests need `#[tokio::test(flavor = \"multi_thread\")]`.\n5. **Prefer `Arc<LibreFangKernel>` for workflows** — The workflow engine requires shared ownership when passing the kernel into async execution contexts.\n6. **Assert observable behavior, not internal state** — Tests verify agent registry membership, response content, token counts, file contents, and status strings rather than private fields.","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nCore kernel for the LibreFang Agent OS. This crate acts as the central orchestrator, wiring together the agent's subsystems—memory, routing, metering, skill execution, LLM integration, extensions, and communications—into a coherent runtime.\n\n## Purpose\n\nThe kernel is responsible for:\n\n- **Bootstrapping** the agent from configuration and bringing all subsystems online\n- **Coordinating** message flow between skills, hands, the LLM driver, and external channels\n- **Persisting** state to SQLite via `rusqlite`\n- **Scheduling** recurring and cron-driven tasks\n- **Enforcing** authentication and security policies (TOTP, constant-time comparison, zeroization of secrets)\n\n## Architecture\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --> R[librefang-kernel-router]\n    K --> M[librefang-kernel-metering]\n    K --> RT[librefang-runtime]\n    K --> S[librefang-skills]\n    K --> H[librefang-hands]\n    K --> E[librefang-extensions]\n    K --> LLM[librefang-llm-driver]\n    K --> W[librefang-wire]\n    K --> CH[librefang-channels]\n    K --> MEM[librefang-memory]\n    K --> T[librefang-types]\n```\n\nThe kernel sits at the top of the dependency graph. It re-exports and composes functionality from sibling crates but is not itself imported by any other `librefang-*` crate. Downstream consumers (binaries, integration tests, the `purge_sentinels` utility) depend on this crate to get a fully wired agent.\n\n## Key Subsystem Integrations\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions (messages, configs, domain types) |\n| `librefang-memory` | Conversation and long-term memory storage |\n| `librefang-kernel-router` | Message routing between skills and channels |\n| `librefang-kernel-metering` | Usage tracking, rate limiting, metrics |\n| `librefang-runtime` | Async runtime configuration and lifecycle |\n| `librefang-skills` | Skill registry and execution |\n| `librefang-hands` | Action/tool execution layer |\n| `librefang-extensions` | Extension loading and lifecycle |\n| `librefang-llm-driver` | LLM provider abstraction |\n| `librefang-wire` | Wire protocol for inter-process/network communication |\n| `librefang-channels` | Inbound/outbound channel adapters (no default features) |\n\n## Notable External Dependencies\n\nThese reflect specific kernel capabilities:\n\n- **`rusqlite`** — Embedded SQLite for persistent state. The kernel owns the database connection pool and schema migrations.\n- **`dashmap`** / **`arc-swap`** / **`crossbeam`** — Lock-free concurrent data structures for hot paths (skill registries, extension state, configuration hot-reload).\n- **`cron`** — Cron expression parsing and scheduling of periodic tasks.\n- **`totp-rs`** — Time-based one-time password generation and verification for agent authentication.\n- **`subtle`** — Constant-time comparison operations for security-sensitive checks.\n- **`zeroize`** — Secure memory clearing for secrets and credentials.\n- **`reqwest`** — Outbound HTTP client for webhooks and external API calls.\n- **`serde`** / **`serde_json`** / **`toml`** / **`serde_yaml`** — Multi-format configuration and serialization.\n- **`libc`** *(Unix only)* — Low-level system calls for signal handling or process management.\n\n## Binary: `purge_sentinels`\n\nLocated at `bin/purge_sentinels.rs`. A maintenance utility that cleans up stale sentinel records from the database. Typically run as a cron job or scheduled task outside the main agent process.\n\n## Configuration\n\nThe kernel reads agent configuration from files in TOML or YAML format (via `serde` deserialization). The `dirs` crate is used to locate platform-appropriate configuration directories.\n\nKey configuration concerns include:\n- LLM provider settings (model, endpoint, credentials)\n- Channel adapter configurations\n- Skill enablement and parameters\n- Metering thresholds\n- Cron schedules for periodic tasks\n\n## Security Model\n\nThe kernel takes several measures to handle secrets responsibly:\n\n- Credentials are held in memory behind `zeroize`-enabled types, ensuring they are overwritten when dropped.\n- Authentication challenges use `totp-rs` for time-based codes.\n- Secret comparisons use `subtle` to avoid timing side-channels.\n- The kernel avoids logging sensitive material by respecting `tracing` level filters.\n\n## Testing\n\nTests use `tokio-test` for async test helpers and `tempfile` for isolated filesystem-based test fixtures (e.g., ephemeral SQLite databases, temporary configuration files).\n\n## Adding a New Subsystem\n\nTo integrate a new component into the kernel:\n\n1. Add the crate dependency to `Cargo.toml`.\n2. Initialize the subsystem during kernel bootstrap (typically in the top-level `start` or `init` function).\n3. Wire it into the router if it needs to receive or emit messages.\n4. Register metering hooks if it consumes billable resources.\n5. Expose any new configuration fields through the existing config struct with appropriate `serde` attributes.","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\nLLM driver trait and shared types for LibreFang.\n\n## Purpose\n\nThis crate defines the abstraction layer through which the rest of the LibreFang application communicates with large language model backends. It provides a common trait (interface) that concrete LLM implementations must satisfy, along with shared types for requests, responses, and errors.\n\nBy keeping the driver contract in its own crate, the rest of the codebase depends only on this abstraction—not on any specific LLM provider. This allows swapping or adding backends without touching core game logic.\n\n## Role in the Architecture\n\n```\n┌─────────────────────────────────────────────────┐\n│               LibreFang Core                     │\n│  (depends on librefang-llm-driver trait only)    │\n└──────────────┬──────────────────────────────────┘\n               │ calls through trait\n               ▼\n┌──────────────────────────────────┐\n│     librefang-llm-driver         │\n│  • Driver trait definition       │\n│  • Shared request/response types │\n│  • Error types                   │\n└──────────────┬───────────────────┘\n               │ trait is implemented by\n               ▼\n┌──────────────────────────────────┐\n│   Concrete LLM driver crates     │\n│  (e.g. OpenAI, local, etc.)      │\n└──────────────────────────────────┘\n```\n\n## Dependencies and Their Rationale\n\n| Dependency | Why It's Here |\n|---|---|\n| `librefang-types` | Shares domain types (game-specific definitions) that the driver needs to interpret or produce. |\n| `async-trait` | The driver trait is async. `async-trait` provides the procedural macro to make `async fn` work in trait definitions, since the driver will perform network I/O against LLM APIs. |\n| `serde` / `serde_json` | Request and response types are serializable. LLM APIs speak JSON, so the driver's shared types need `Serialize`/`Deserialize` bounds. |\n| `thiserror` | Defines structured error types for driver failures (API errors, rate limits, malformed responses, etc.). |\n| `tokio` | Async runtime. The trait's async methods rely on Tokio for I/O and task execution. |\n\n## What This Crate Provides\n\n### Driver Trait\n\nThe central export is an async trait that concrete LLM backends implement. Any crate that needs to call an LLM accepts a boxed or generic instance of this trait, keeping the consumer decoupled from provider specifics.\n\n### Shared Types\n\nRequest and response structures that are provider-agnostic. These give the rest of the codebase a stable vocabulary for talking to LLMs regardless of which backend is active.\n\n### Error Types\n\nA common error enum covering the failure modes any LLM driver can hit—network issues, authentication failures, rate limiting, and unexpected response formats. Consumers handle one error type rather than provider-specific ones.\n\n## Integration Guide\n\n**Consuming the trait** from another crate:\n\n1. Add `librefang-llm-driver` as a dependency.\n2. Accept the driver trait (typically `Box<dyn DriverTrait>`) in your component's constructor or function signature.\n3. Call the trait methods. You never reference a concrete provider type.\n\n**Implementing a new backend**:\n\n1. Create a new crate that depends on `librefang-llm-driver`.\n2. Define a struct representing your provider's client.\n3. Implement the driver trait for that struct, translating the shared request types into provider-specific HTTP calls and mapping provider-specific responses back into the shared response types.\n4. Map provider-specific errors into the shared error enum.\n\n## Design Notes\n\n- This crate intentionally has **no outbound calls**. It defines types and traits only. All I/O happens in concrete implementation crates.\n- Because it depends on `librefang-types`, the driver trait can express operations in terms of the game's domain vocabulary rather than raw strings.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers that implement the `librefang-llm-driver` trait. Each driver translates a uniform API surface into the specific HTTP protocol, authentication scheme, and payload format required by a given LLM provider (Anthropic, OpenAI, Gemini, etc.).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver<br/>trait definition] --> B[librefang-llm-drivers<br/>concrete implementations]\n    B --> C[Anthropic Driver]\n    B --> D[OpenAI Driver]\n    B --> E[Gemini Driver]\n    B --> F[Other Providers...]\n    B --> G[librefang-http<br/>HTTP client layer]\n    B --> H[librefang-runtime-oauth<br/>OAuth token management]\n    B --> I[librefang-types<br/>shared types]\n```\n\nDownstream consumers depend only on the `librefang-llm-driver` trait. They never reference this crate directly — it is plugged in at application assembly time, keeping provider specifics behind a stable interface.\n\n## Role in the Codebase\n\n| Concern | Owning Crate |\n|---|---|\n| Trait definition / abstract interface | `librefang-llm-driver` |\n| **Concrete provider implementations** | **`librefang-llm-drivers` (this crate)** |\n| Shared domain types | `librefang-types` |\n| HTTP transport | `librefang-http` |\n| OAuth token lifecycle | `librefang-runtime-oauth` |\n\n## Key Design Patterns\n\n### Authentication\n\nDrivers handle provider-specific authentication internally:\n\n- **API-key-based providers** (Anthropic, OpenAI) attach keys via request headers. The `zeroize` dependency ensures sensitive key material is cleared from memory when dropped.\n- **OAuth-based providers** (Gemini) delegate token acquisition and refresh to `librefang-runtime-oauth`.\n- **Signed-request providers** use `sha2`, `hmac`, and `hex` to compute request signatures when a provider requires it (for example, AWS-derived signing schemes).\n\n### Streaming\n\nThe `tokio-stream` dependency indicates that drivers support streaming (server-sent events) for incremental token delivery. Each driver parses its provider's specific SSE wire format into the common stream type defined by the driver trait.\n\n### Concurrency and Caching\n\n`dashmap` is used for lock-free concurrent access to internal state, likely for:\n\n- Caching OAuth tokens between requests\n- Storing resolved model capabilities or endpoint metadata\n\n## Dependency Rationale\n\nSeveral dependencies are worth calling out because they signal implementation details:\n\n| Dependency | Purpose |\n|---|---|\n| `async-trait` | Provides the async-compatible trait implementation that each driver fulfills |\n| `reqwest` | Low-level HTTP client used through the `librefang-http` abstraction |\n| `serde` / `serde_json` | Serialization of request payloads and deserialization of provider-specific response envelopes |\n| `base64` | Encoding for providers that transmit credentials or content in base64 |\n| `regex-lite` | Lightweight pattern matching, likely for response post-processing or content extraction |\n| `url` | URL construction for provider-specific API endpoints |\n| `uuid` / `rand` | Request ID generation and nonce creation |\n| `chrono` | Timestamp handling for authentication signatures and logging |\n| `bytes` | Efficient byte-buffer handling for streaming response bodies |\n| `tracing` | Structured logging and span creation for observability |\n\n## Adding a New Provider\n\n1. Create a new module within this crate (e.g., `src/newprovider.rs`).\n2. Define a struct that holds provider-specific configuration (API key, endpoint URL, etc.).\n3. Implement the `LlmDriver` trait from `librefang-llm-driver`:\n   - `complete` (or equivalent) — build the provider's JSON request body, send it via `librefang-http`, parse the response.\n   - `stream` — same, but return a `Stream` of partial results using `tokio-stream`.\n4. Map provider-specific error codes into the error type from `librefang-llm-driver` or `librefang-types`.\n5. Register the new driver in whatever factory or configuration resolver the application uses.\n\nWhen adding a provider that uses OAuth, reuse the token management from `librefang-runtime-oauth` rather than implementing a bespoke flow. For providers requiring request signing, follow the existing pattern using `sha2`/`hmac` and ensure key material is wrapped in a `zeroize::Zeroize`-compatible structure.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests: Canonical Chat-Scoped Integration Tests\n\n## Purpose\n\nThis test module is an **integration regression suite** that guards a critical privacy fix in `librefang-memory`. The fix ensures that canonical context entries are tagged with the originating `SessionId` and filtered at read time. Without it, every WhatsApp DM and group sharing the same agent would see each other's history injected into the LLM prompt — meaning a private chat could leak group messages and vice versa.\n\nThe tests exercise the full append → load → context roundtrip via the crate's public API, mirroring the actual call path the kernel uses on every inbound message.\n\n## What Bug It Prevents\n\nBefore the session-scoping fix, `SessionStore::canonical_context` returned all canonical entries for an agent regardless of which chat session they came from. In a multi-tenant WhatsApp scenario where one agent handles both DMs and groups:\n\n1. User sends \"dm-1\" in a private WhatsApp chat.\n2. Someone sends \"group-1\" in a WhatsApp group the agent also serves.\n3. User sends \"dm-2\" in the private chat.\n4. The DM's LLM prompt would receive all three messages, leaking \"group-1\" from the group context.\n\nThe fix adds a `SessionId` column to canonical entries and a filter clause in `canonical_context`.\n\n## Test Infrastructure\n\n### `setup() -> SessionStore`\n\nCreates a fresh, isolated test environment:\n\n1. Opens an in-memory SQLite database via `Connection::open_in_memory`.\n2. Runs database migrations via `run_migrations`.\n3. Wraps the connection in `Arc<Mutex<Connection>>` and constructs a `SessionStore`.\n\nEach test gets its own blank database, so tests are fully independent.\n\n### `user_msg(text: &str) -> Message`\n\nConvenience helper that constructs a `Message` with `Role::User`, the given text as `MessageContent::Text`, `pinned: false`, and `timestamp: None`. Used to build canonical entries quickly without boilerplate.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\nThe primary isolation regression test. It simulates two WhatsApp conversations for the same agent:\n\n- **DM session**: derived from `SessionId::for_channel(agent, \"whatsapp:393331111111@s.whatsapp.net\")`\n- **Group session**: derived from `SessionId::for_channel(agent, \"whatsapp:120363111111111111@g.us\")`\n\n**Sequence**:\n\n1. Append `\"dm-1\"` to the DM session.\n2. Append `\"group-1\"` to the group session.\n3. Append `\"dm-2\"` to the DM session (interleaved timing).\n\n**Assertions**:\n\n- `session_dm` and `session_group` are not equal — different channels must derive different session IDs.\n- `canonical_context(agent, Some(session_dm), None)` returns exactly `[\"dm-1\", \"dm-2\"]` — no group messages.\n- `canonical_context(agent, Some(session_group), None)` returns exactly `[\"group-1\"]` — no DM messages.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\nEnsures backward
