is module is responsible for **routing incoming data to the appropriate Hand or Template** based on pattern matching rules. It acts as the kernel's dispatch layer ŌĆö given some input, it determines which registered handler should process it by evaluating match conditions defined in routing configuration.\n\n## Role in the Architecture\n\n```mermaid\ngraph LR\n    A[librefang-types] --> B[librefang-kernel-router]\n    C[librefang-hands] --> B\n    B --> D[librefang-runtime]\n```\n\nThe router sits between the type definitions (`librefang-types`) and the hand implementations (`librefang-hands`). At runtime, the `librefang-runtime` module loads and exercises the router to resolve which hand to invoke for a given input.\n\n## Dependencies and What They Indicate\n\n| Dependency | Role in This Module |\n|---|---|\n| `librefang-types` | Shared type definitions ŌĆö route entries, match criteria, hand references |\n| `librefang-hands` | Access to registered hand definitions that routes point to |\n| `regex-lite` | Pattern-based matching logic for route evaluation |\n| `serde_json` | Deserialization of routing rules from JSON-format configuration |\n| `toml` | Deserialization of routing rules from TOML-format configuration |\n| `dirs` | Resolving platform-specific config/data directories for route file discovery |\n| `tracing` | Instrumentation of route resolution and match evaluation |\n\nThe presence of both `serde_json` and `toml` indicates the router supports at least two configuration formats. The `dirs` crate suggests it looks for routing configuration in standard user or system directories rather than requiring hardcoded paths.\n\n## Key Concepts\n\n### Routes\n\nA route is a mapping from a **match condition** to a **target hand or template**. Routes are likely loaded from configuration files at startup and organized into a routing table.\n\n### Match Evaluation\n\nThe `regex-lite` dependency indicates that route matching uses regular expressions. Routes may match against fields of the incoming data ŌĆö for example, matching on identifiers, type tags, or content patterns.\n\n### Routing Table\n\nRoutes are assembled into a routing table. When the router receives input, it evaluates match conditions in a defined order and returns the first matching hand/template reference.\n\n## Configuration\n\nRoute definitions are loaded from configuration files. The router searches standard platform directories (via `dirs`) and supports both JSON and TOML formats. This allows users to define routing rules without modifying compiled code.\n\n## Testing\n\nThe dev-dependency on `tempfile` and `librefang-runtime` indicates that tests create temporary configuration files to verify route loading and resolution behavior end-to-end through the runtime.","other-librefang-kernel-tests":"# Other ŌĆö librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and end-to-end test suite for the `librefang-kernel` crate. These tests exercise the full kernel lifecycleŌĆöboot, agent management, tool policy enforcement, WASM execution, hand orchestration, workflow pipelines, audit retention, and CLI toolingŌĆöagainst real subsystems (no mocks for the kernel itself).\n\n## Test Files Overview\n\n| File | Scope | Requires LLM? |\n|---|---|---|\n| `integration_test.rs` | Kernel boot ŌåÆ agent spawn ŌåÆ Groq message round-trip | `GROQ_API_KEY` |\n| `multi_agent_test.rs` | Hand lifecycle, settings, state persistence, fleet coexistence | No (live fleet test opt-in) |\n| `rbac_m3_evaluate_tool_call.rs` | RBAC user-tool policy evaluation, role escalation, hot-reload | No |\n| `wasm_agent_integration_test.rs` | WASM module loading, execution, fuel limits, host calls, streaming | No |\n| `workflow_integration_test.rs` | Workflow registration, agent resolution, multi-step E2E pipeline | `GROQ_API_KEY` (opt-in) |\n| `audit_retention_test.rs` | Periodic audit trim task, in-memory cap enforcement, self-audit row | No |\n| `purge_sentinels_test.rs` | `purge_sentinels` CLI binary: dry-run, apply, idempotency, backup safety | No |\n\n## Running\n\n```bash\n# All tests (LLM-dependent tests auto-skip without the key)\ncargo test -p librefang-kernel\n\n# Live LLM integration tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel --test integration_test -- --nocapture\n\n# Multi-threaded tests that require the multi_thread runtime\ncargo test -p librefang-kernel --test audit_retention_test\ncargo test -p librefang-kernel --test rbac_m3_evaluate_tool_call\n```\n\nSeveral tests use `#[tokio::test(flavor = \"multi_thread\")]` because `start_background_agents` and WASM execution paths call `tokio::task::block_in_place`, which panics on the default current-thread runtime.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    TC[test_config helper] --> KC[KernelConfig]\n    KC --> BOOT[LibreFangKernel::boot_with_config]\n    BOOT --> REG[agent_registry]\n    BOOT --> AUDIT[audit log]\n    BOOT --> HANDS[hand registry]\n    BOOT --> AUTH[auth_manager]\n    BOOT --> WF[workflow_engine]\n\n    REG --> SPAWN[spawn_agent]\n    SPAWN --> SEND[send_message / send_message_streaming]\n\n    HANDS --> ACTIVATE[activate_hand]\n    ACTIVATE --> INST[HandInstance]\n\n    AUTH --> RESOLVE[resolve_user_tool_decision]\n    AUTH --> RELOAD[reload]\n```\n\nAll tests follow the same pattern: construct a `KernelConfig` pointing at a temporary directory, boot the kernel, exercise the API surface, assert invariants, then call `kernel.shutdown()`.\n\n## integration_test.rs\n\nBasic kernel lifecycle with live Groq API calls.\n\n**`test_full_pipeline_with_groq`** ŌĆö Boots the kernel, parses an `AgentManifest` from TOML, calls `spawn_agent`, sends a message via `send_message`, asserts the response is non-empty and token usage is reported, then kills the agent.\n\n**`test_multiple_agents_different_models`** ŌĆö Spawns two agents backed by different Groq models (`llama-3.3-70b-versatile` and `llama-3.1-8b-instant`), sends each a message, and verifies both respond independently.\n\nBoth tests return early if `GROQ_API_KEY` is unset.\n\n## multi_agent_test.rs\n\nComprehensive hand-lifecycle coverage. A *hand* is a named, installable agent configuration that the kernel can activate, pause, deactivate, and re-activate with deterministic identity.\n\n### Hand Definitions\n\nTests define hands as inline TOML strings installed via `kernel.hands().install_from_content()`. Three standard fixtures are used:\n\n- **HAND_A** (`test-clip`) ŌĆö single-agent hand with `tools = [\"file_read\", \"file_write\", \"shell_exec\"]`\n- **HAND_B** (`test-devops`) ŌĆö single-agent hand with `tools = [\"shell_exec\"]`\n- **HAND_C** (`test-research`) ŌĆö multi-agent hand with an explicit `coordinator = true` on the planner role\n\n### Lifecycle Tests\n\n| Test | What it verifies |\n|---|---|\n| `test_activate_hand_spawns_agent` | Activation creates an agent and registers it |\n| `test_deterministic_agent_id` | `AgentId::from_hand_agent(\"test-clip\", \"main\", None)` matches the spawned ID |\n| `test_explicit_coordinator_role_used_for_routes` | When `coordinator = true` is set on a non-first agent, routing uses that role |\n| `test_deterministic_id_stable_across_reactivation` | Deactivate ŌåÆ reactivate produces the same agent ID (legacy single-instance format) |\n| `test_deactivate_kills_agent` | Agent removed from registry after deactivation |\n| `test_pause_and_resume_hand` | Status transitions Active ŌåÆ Paused ŌåÆ Active; agent stays registered |\n| `test_agent_tagged_with_hand_metadata` | Agent gets `hand:test-clip` and `hand_instance:<uuid>` tags |\n| `test_hand_tools_applied_to_agent` | Agent capabilities inherit the hand's tool list |\n| `test_system_prompt_preserved` | Agent manifest carries the hand's `system_prompt` |\n| `test_default_provider_resolved_to_kernel_default` | `provider = \"default\"` sentinel is resolved at activation time |\n\n### Error Cases\n\n`test_activate_nonexistent_hand_fails`, `test_deactivate_nonexistent_instance_fails`, `test_pause_nonexistent_instance_fails`, `test_resume_nonexistent_instance_fails` ŌĆö all assert `is_err()`.\n\n### Settings and Schema Defaults\n\nUses `HAND_WITH_SETTINGS` which declares `[[settings]]` blocks with `verbosity` (select, default `\"normal\"`) and `max_concurrency` (text, default `\"5\"`).\n\n- **`test_activation_seeds_schema_defaults_into_config`** ŌĆö Empty user config gets filled from schema defaults; persisted to `hand_state.json`.\n- **`test_activation_preserves_user_overrides_over_defaults`** ŌĆö User-supplied values win over defaults; unset keys still get defaults.\n- **`test_reactivation_backfills_missing_schema_keys`** ŌĆö Simulates an older state file missing a key; re-activation backfills from current schema without clobbering existing values.\n\n### State Persistence\n\n**`test_hand_state_persistence`** ŌĆö After activation, `data/hand_state.json` exists with version 5 format. Validates typed fields (`instance_id`, `status`, `activated_at`, `updated_at` as strings) and the `agent_ids` map.\n\n**`test_multi_agent_hand_state_persists_coordinator_role`** ŌĆö The `coordinator_role` field is persisted when a multi-agent hand is activated.\n\n### Coexistence\n\n- **`test_multiple_hands_coexist`** ŌĆö Two hands activated simultaneously with distinct agent IDs.\n- **`test_deactivate_one_hand_preserves_other`** ŌĆö Killing one hand's agent doesn't affect the other.\n- **`test_find_instance_by_agent_id`** ŌĆö `kernel.hands().find_by_agent()` reverse-lookup works.\n\n### Trigger Reactivation\n\n**`test_reactivation_restores_triggers_to_original_roles`** ŌĆö Registers a trigger on the analyst role, deactivates, reactivates. Verifies triggers stay attached to the correct role agent and don't leak to the coordinator.\n\n### Live Fleet Test\n\n**`test_six_agent_fleet`** ŌĆö Requires `GROQ_API_KEY`. Spawns 6 agents (coder, researcher, writer, ops, analyst, hello-world) using two models, sends each a tailored prompt, verifies all respond with non-empty output, and reports aggregate token usage.\n\n## rbac_m3_evaluate_tool_call.rs\n\nEnd-to-end RBAC Phase 2 tests. Boots a real kernel with `[[users]]` and `tool_policy` configuration, then exercises `KernelHandle::resolve_user_tool_decision` through the trait object.\n\n### Setup\n\nThe `boot()` helper creates a kernel with configurable `UserConfig` entries and `ToolGroup` definitions. The `user()` helper constructs a `UserConfig` with channel bindings and optional per-user `UserToolPolicy` / `UserToolCategories`.\n\n### Decision Matrix Tests\n\n| Test | User policy | Expected result |\n|---|---|---|\n| `evaluate_tool_call_user_deny_short_circuits` | `denied_tools: [\"shell_exec\"]` | `Deny` (user gate fires before agent capability) |\n| `evaluate_tool_call_both_allow` | `allowed_tools: [\"file_read\"]` | `Allow` |\n| `evaluate_tool_call_user_role_no_allow_list_needs_approval` | No policy, role=user | `NeedsApproval` (role escalation required) |\n| `evaluate_tool_call_user_categories_resolve_against_kernel_groups` | `denied_groups: [\"shell_tools\"]` where group contains `shell_exec` | `Deny` for grouped tool, `Allow` for admin+other |\n| `evaluate_tool_call_user_categories_allow_list_short_circuits_for_user_role` | `allowed_groups: [\"read_only\"]` | `Allow` for `file_read`, `Deny` for `shell_exec` |\n\n### Security Regression Tests\n\n- **`evaluate_tool_call_unrecognised_sender_no_longer_fail_open`** ŌĆö H7 fix: unrecognised sender IDs route through the guest gate (read-only tools allowed, others need approval). Previously returned `Allow` unconditionally.\n- **`evaluate_tool_call_trait_layer_none_sender_fails_closed`** ŌĆö PR #3205: `(None, None)` sender/channel no longer sets `system_call=true`. Only `Some(\"cron\")` retains the system-call escape hatch. Pseudo-channels like `\"system\"` fail closed.\n- **`submit_tool_approval_hand_agent_force_human_skips_auto_approve`** ŌĆö B3: `DeferredToolExecution.force_human=true` overrides the hand-agent auto-approve carve-out. Without `force_human`, hand-tagged agents auto-approve.\n\n### Hot Reload\n\n**`evaluate_tool_call_reload_picks_up_new_policy`** ŌĆö Calls `kernel.auth_manager().reload()` with updated user policies and verifies the new deny rule takes effect immediately.\n\n## wasm_agent_integration_test.rs\n\nTests real WASM module execution through the kernel. Modules are written as WAT (WebAssembly Text) and placed on disk for the kernel's `wasm:` module loader.\n\n### Module Fixtures\n\n| Constant | Behavior |\n|---|---|\n| `ECHO_WAT` | Returns input pointer/length as-is; kernel extracts JSON |\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` at offset 0 |\n| `INFINITE_LOOP_WAT` | Infinite `br` loop; triggers fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\nAgents are spawned with `module = \"wasm:<filename>\"` in their TOML manifest.\n\n### Test Cases\n\n- **`test_wasm_agent_hello_response`** ŌĆö Fixed-response module returns `\"hello from wasm\"`.\n- **`test_wasm_agent_echo`** ŌĆö Echo module includes the input message in its output.\n- **`test_wasm_agent_fuel_exhaustion`** ŌĆö Infinite loop fails with an error containing \"Fuel exhausted\" or \"fuel\".\n- **`test_wasm_agent_missing_module`** ŌĆö Nonexistent `.wat` file produces an error mentioning the file.\n- **`test_wasm_agent_host_call_time`** ŌĆö Proxy module exercises the `host_call` import end-to-end.\n- **`test_wasm_agent_streaming_fallback`** ŌĆö `send_message_streaming` returns at least 2 events (TextDelta + ContentComplete); final result matches the fixed response.\n- **`test_multiple_wasm_agents`** ŌĆö Two WASM agents (hello + echo) coexist with distinct results; registry reports 3 agents (2 WASM + default assistant).\n- **`test_mixed_wasm_and_llm_agents`** ŌĆö WASM and builtin:chat agents coexist; WASM agent executes while LLM agent is registered but not called.\n\n## workflow_integration_test.rs\n\nTests the workflow engine's registration, agent resolution, and execution paths. Uses `#![recursion_limit = \"256\"]` due to deeply nested future types from the kernel ŌåÆ runtime ŌåÆ agent_loop call chain.\n\n### Kernel-Level Wiring (No LLM)\n\n- **`test_workflow_register_and_resolve`** ŌĆö Registers a 2-step workflow with `StepAgent::ByName` references, verifies `find_by_name` resolution, creates a run, and checks the run record.\n- **`test_workflow_agent_by_id`** ŌĆö Workflow step references an agent directly by ID via `StepAgent::ById`.\n- **`test_trigger_registration_with_kernel`** ŌĆö Registers `Lifecycle` and `SystemKeyword` triggers, lists by agent, removes one, verifies remaining.\n\n### E2E with Live LLM\n\n**`test_workflow_e2e_with_groq`** ŌĆö Requires `GROQ_API_KEY`. Spawns `wf-analyst` and `wf-writer` agents, creates a 2-step sequential pipeline (analyze ŌåÆ summarize), runs it, and asserts:\n- Both steps produce output\n- Token usage is reported for each step\n- `WorkflowRunState::Completed`\n- Step names match the definition\n- Run appears in `list_runs()`\n\n### Workflow Types Used\n\n```\nWorkflow { id, name, description, steps, created_at, layout }\nWorkflowStep { name, agent, prompt_template, mode, timeout_secs, error_mode, output_var, inherit_context, depends_on }\nStepAgent::ByName { name } | StepAgent::ById { id }\nStepMode::Sequential\nErrorMode::Fail\n```\n\n## audit_retention_test.rs\n\nVerifies M7 audit retention: the periodic trim task fires and the self-audit `RetentionTrim` row is recorded.\n\n**`test_kernel_boot_with_retention_config_starts_trim_task`** ŌĆö Configures `AuditRetentionConfig` with `trim_interval_secs: 1` and `max_in_memory_entries: 10`. Seeds 50 audit entries via `audit.record()`, calls `start_background_agents()`, sleeps 2.5s, then asserts:\n\n- Log length collapsed near the cap (Ōēż 20, accounting for the self-audit row and boot-time entries)\n- At least one `AuditAction::RetentionTrim` entry exists\n- `audit.verify_integrity()` still passes after trimming\n\nThe `max_in_memory_entries` cap path is used instead of per-action `retention_days_by_action` because the cap doesn't require manipulating internal timestamps.\n\n## purge_sentinels_test.rs\n\nIntegration tests for the `purge_sentinels` CLI binary, discovered via `env!(\"CARGO_BIN_EXE_purge_sentinels\")`.\n\n### Fixture\n\n`fixture_dir()` creates a temp directory with:\n- `a.md` ŌĆö contains whole-line `NO_REPLY` and `[no reply needed]` sentinels\n- `b.md` ŌĆö `NO_REPLY` embedded mid-sentence (should be preserved)\n- `c.md` ŌĆö clean file with no sentinels\n- `nested/d.md` ŌĆö lowercase `no_reply` with leading/trailing spaces\n\n### Test Cases\n\n| Test | Verifies |\n|---|---|\n| `dry_run_reports_counts_and_touches_nothing` | Reports `removed=3` lines, no file modifications, no `.bak` created |\n| `apply_creates_backup_and_rewrites` | `.bak` matches original; sentinels removed from `a.md` and `nested/d.md`; `b.md` unchanged (mid-sentence); `c.md` untouched (no `.bak`) |\n| `apply_is_idempotent` | Second run reports `removed=0`; files and backups unchanged |\n| `apply_aborts_when_existing_bak_differs` | Pre-seeded stale `.bak` causes non-zero exit with \"backup mismatch\" error; stale `.bak` preserved |\n| `nonexistent_path_exits_non_zero` | Invalid path produces stderr containing \"does not exist\" |\n\nThe binary only removes *whole-line* sentinels (case-insensitive, whitespace-trimmed). Sentence-embedded occurrences like `b.md`'s `\"I said NO_REPLY yesterday\"` are preserved.\n\n## Common Patterns\n\n### Temporary Directories\n\nEvery test creates an isolated temp directory under `$TMP/librefang-<test-name>-<suffix>`. The directory is cleaned up before each run (`remove_dir_all` + `create_dir_all`) to prevent cross-test contamination.\n\n### Kernel Lifecycle\n\n```rust\nlet config = test_config(\"unique-name\");\nlet kernel = LibreFangKernel::boot_with_config(config).expect(\"kernel boots\");\n// ... exercise kernel APIs ...\nkernel.shutdown();\n```\n\n`shutdown()` is always called to flush state and release resources. Tests that need `Arc<Kernel>` wrap it explicitly.\n\n### Conditional LLM Tests\n\nTests requiring live LLM access follow the pattern:\n\n```rust\nif std::env::var(\"GROQ_API_KEY\").is_err() {\n    eprintln!(\"GROQ_API_KEY not set, skipping integration test\");\n    return;\n}\n```\n\nThis allows the full suite to run in CI without API keys while still supporting manual live testing.","other-librefang-kernel":"# Other ŌĆö librefang-kernel\n\n# librefang-kernel\n\nThe central orchestration crate for the **LibreFang Agent OS**. This is the top-level kernel that wires together all subsystems ŌĆö routing, metering, runtime, skills, hands, extensions, LLM drivers, communication channels, and persistence ŌĆö into a single cohesive agent process.\n\n## Role in the Architecture\n\n`librefang-kernel` is the **composition root**. It does not implement domain logic itself. Instead, it owns initialization, lifecycle management, and the glue that connects sibling crates:\n\n```\n                    ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n                    Ōöé  librefang-kernel   Ōöé\n                    Ōöé  (this crate)       Ōöé\n                    ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n           ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n           Ōöé                 Ōöé                  Ōöé\n     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ    ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n     Ōöé  router   Ōöé    Ōöé metering  Ōöé     Ōöé  runtime   Ōöé\n     ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöś    ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöś     ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n           Ōöé                Ōöé                  Ōöé\n    ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö╝ŌöĆŌöĆŌöĆŌöĆŌöÉ           Ōöé           ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n    Ōöé      Ōöé    Ōöé           Ōöé           Ōöé      Ōöé      Ōöé\nŌöīŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöÉŌöīŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöÉŌöé     ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöĆŌöĆŌöÉ ŌöīŌöĆŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöÉŌöīŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöÉŌöīŌöĆŌ¢╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöéskillsŌöéŌöéhandsŌöéŌöé     Ōöé  memory  Ōöé Ōöé  wire ŌöéŌöé llm ŌöéŌöéextensionsŌöé\nŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöśŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöśŌöé     ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöśŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöśŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n         ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌ¢╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\n         Ōöé  channels   Ōöé\n         ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś\n```\n\nEvery other crate in the workspace is a leaf dependency that provides a specific capability. The kernel decides **when** and **how** those capabilities are used.\n\n## Key Responsibilities\n\n| Area | Description |\n|---|---|\n| **Initialization** | Bootstraps the database (via `rusqlite`), loads configuration (TOML/YAML/JSON), and constructs all subsystem instances in dependency order. |\n| **Message routing** | Delegates to `librefang-kernel-router` to dispatch incoming messages from channels to the appropriate handler. |\n| **Metering** | Delegates to `librefang-kernel-metering` for usage tracking, rate limiting, or quota enforcement. |\n| **Agent lifecycle** | Manages the runtime loop ŌĆö receiving input, invoking the LLM via `librefang-llm-driver`, executing skills via `librefang-skills`, and performing actions via `librefang-hands`. |\n| **Scheduled tasks** | Uses the `cron` crate to run periodic or time-based jobs (e.g., cleanup, health checks, sentinel purging). |\n| **Authentication** | Integrates `totp-rs` and `subtle` (constant-time comparison) for TOTP-based multi-factor authentication, and `zeroize` to securely clear secrets from memory. |\n| **Persistence** | Stores state in SQLite (`rusqlite`) with concurrent access managed through `dashmap` and `arc-swap` for lock-free hot-reload of shared configuration. |\n| **Communication** | Sends and receives messages over the wire protocol (`librefang-wire`) through pluggable channel backends (`librefang-channels`). |\n\n## Dependency Breakdown\n\n### Workspace sibling crates\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared data structures, error types, and domain primitives used across all crates. |\n| `librefang-memory` | Short-term and long-term memory subsystem for the agent's conversational and factual context. |\n| `librefang-kernel-router` | Message routing logic ŌĆö maps incoming events to the correct handler or skill. |\n| `librefang-kernel-metering` | Usage metering, quota tracking, and rate-limiting hooks. |\n| `librefang-runtime` | The async runtime layer and task orchestration primitives. |\n| `librefang-skills` | Pluggable skill system ŌĆö discrete capabilities the agent can invoke (e.g., web search, code execution). |\n| `librefang-hands` | The action/motor layer ŌĆö executes side effects the agent decides to perform. |\n| `librefang-extensions` | Extension loading and lifecycle for third-party or user-provided plugins. |\n| `librefang-llm-driver` | Abstracted LLM backend ŌĆö sends prompts, receives completions, handles streaming. |\n| `librefang-wire` | Wire protocol definitions for inter-service and client-server communication. |\n| `librefang-channels` | Channel backends (default features disabled ŌĆö only the features the kernel selects are compiled in). |\n\n### Notable external libraries\n\n| Library | Why it's here |\n|---|---|\n| `rusqlite` | Embedded SQLite for persistent state. |\n| `dashmap` / `arc-swap` | Lock-free concurrent maps and atomically-swapped shared state. |\n| `cron` | Cron-expression parsing and scheduling for periodic tasks. |\n| `totp-rs` | TOTP generation and validation for 2FA. |\n| `subtle` | Constant-time comparisons to prevent timing attacks on auth tokens. |\n| `zeroize` | Securely zeroes secrets from memory when they are dropped. |\n| `chrono` / `chrono-tz` | Timezone-aware timestamp handling. |\n| `reqwest` | Outbound HTTP client (for extensions, webhooks, or API calls). |\n| `regex` / `regex-lite` | Pattern matching in message routing or input validation. |\n| `libc` (Unix only) | Low-level Unix system calls (likely for signal handling or process management). |\n\n## Binary: `purge_sentinels`\n\nLocated at `bin/purge_sentinels.rs`.\n\nThis is a standalone maintenance binary, not part of the main agent process. It is responsible for cleaning up stale sentinel records ŌĆö likely watchdog entries, lock files, or lease markers that were not gracefully released (e.g., after a crash).\n\nRun it directly:\n\n```bash\n# Via cargo\ncargo run --bin purge_sentinels\n\n# Or the compiled binary\n./purge_sentinels\n```\n\nThe binary reads the same configuration as the main kernel to locate the database and identify sentinels eligible for removal.\n\n## Configuration Loading\n\nThe kernel supports three configuration formats via its Serde-based loading:\n\n- **TOML** (`toml` crate) ŌĆö the primary format for agent configuration files.\n- **YAML** (`serde_yaml` crate) ŌĆö alternative for complex or human-edited configs.\n- **JSON** (`serde_json` crate) ŌĆö typically machine-generated or for interchange.\n\nThe `dirs` crate is used to resolve platform-appropriate configuration paths (`~/.config/librefang/` on Linux, etc.).\n\n## Thread Safety and Concurrency\n\nThe kernel is designed to run on the Tokio async runtime (`tokio`) and uses several concurrency patterns:\n\n- **`DashMap`** for concurrent access to hot data structures (e.g., active sessions, in-flight requests) without a global lock.\n- **`ArcSwap`** for atomic hot-reload of configuration or shared read-mostly state ŌĆö readers never block, writers publish a new `Arc` atomically.\n- **`futures`** for composing complex async workflows (e.g., fan-out to multiple skills, concurrent channel reads).\n\n## Development\n\n### Running tests\n\n```bash\ncargo test -p librefang-kernel\n```\n\nDev dependencies include `tokio-test` (for async test helpers) and `tempfile` (for creating temporary databases and config files in isolation).\n\n### Adding a new subsystem\n\n1. Create a new `librefang-<name>` crate in the workspace.\n2. Add it as a dependency in this crate's `Cargo.toml`.\n3. Initialize it during kernel bootstrap (respecting dependency order).\n4. Wire it into the router if it handles incoming messages.\n\n## Platform Notes\n\nOn Unix targets, `libc` is included for low-level operations. The kernel may behave differently on non-Unix platforms in areas like signal handling or process management. The `cfg(unix)` gate ensures `libc` is only compiled where needed.","other-librefang-llm-driver":"# Other ŌĆö librefang-llm-driver\n\n# librefang-llm-driver\n\nLLM driver abstraction layer for LibreFang. This crate defines the trait interface and shared data types that concrete LLM provider implementations must satisfy.\n\n## Purpose\n\nThis crate serves as a **trait-only abstraction boundary** between LibreFang's core logic and any specific LLM backend. It exists so that the rest of the codebase can program against a generic driver interface without coupling to a particular provider's API, request format, or SDK.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LibreFang Core] -->|depends on| B[librefang-llm-driver]\n    B -->|defines trait| C[LlmDriver]\n    D[Provider A impl] -->|implements| C\n    E[Provider B impl] -->|implements| C\n    B -->|uses types from| F[librefang-types]\n```\n\nThe crate itself contains **no concrete implementations** and performs **no outbound calls**. It is purely a contract: types, error definitions, and an async trait that downstream provider crates fulfill.\n\n## Key Dependencies\n\n| Crate | Role |\n|---|---|\n| `async-trait` | Enables async methods in the driver trait definition |\n| `serde` / `serde_json` | Serialization for shared request/response types |\n| `thiserror` | Derive-based error types for driver failures |\n| `librefang-types` | Reuses domain types from the broader LibreFang type system |\n| `tokio` | Async runtime primitives needed by trait signatures |\n\n## What This Crate Provides\n\n### Driver Trait\n\nAn async trait (built with `async-trait`) representing the contract for an LLM backend. Any provider-specific crate implements this trait to integrate with LibreFang. The trait methods define the operations the core system needs from an LLM ŌĆö typically prompt submission and response retrieval.\n\n### Shared Types\n\nCommon data structures for LLM interactions: request shapes, response shapes, configuration parameters, and any intermediate types that both the core system and provider implementations need to agree on. These are annotated with `serde` derives to support serialization.\n\n### Error Types\n\nA structured error enum (via `thiserror`) capturing the failure modes common across LLM drivers ŌĆö for example, network errors, rate limiting, malformed responses, or authentication failures. Provider implementations map their specific errors into these shared variants.\n\n## Relationship to Other Crates\n\n- **Depends on `librefang-types`**: Imports and reuses domain-level types rather than duplicating definitions.\n- **Implemented by provider crates**: Any crate that wraps a specific LLM API depends on `librefang-llm-driver` and provides a concrete trait implementation.\n- **Consumed by core**: The main LibreFang application accepts a boxed trait object and calls through the abstraction.\n\n## Adding a New LLM Provider\n\nTo integrate a new backend:\n\n1. Create a new crate (or module) that depends on `librefang-llm-driver`.\n2. Define a struct holding provider-specific configuration and any client state.\n3. Implement the driver trait for that struct.\n4. Map provider-specific errors into the shared error types defined here.\n5. Register the implementation with the core system at startup.\n\nBecause the trait is async and the error types are standardized, swapping or layering providers requires no changes to downstream consumers.","other-librefang-llm-drivers-tests":"# Other ŌĆö librefang-llm-drivers-tests\n\n# Shared Rate Guard Integration Tests\n\n## Purpose\n\nThis module validates that rate-limit lockouts are **shared across independent driver instances** ŌĆö simulating what happens when multiple processes (or a restarted process) encounter a 429 from an LLM provider. The core guarantee is that once any driver observes a 429, all subsequent drivers sharing the same `LIBREFANG_HOME` will short-circuit without touching the network until the cooldown expires.\n\nThis test locks down three acceptance criteria:\n\n1. A 429 response produces an atomic JSON file under `<LIBREFANG_HOME>/rate_limits/`.\n2. A second client instantiated during the cooldown observes the same lockout and **never reaches the provider**.\n3. Lockouts persist across simulated process boundaries (achieved here by constructing a brand-new `OpenAIDriver` with no shared in-memory state).\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant TA as Test (driver_a)\n    participant Stub as stub 429 server\n    participant FS as LIBREFANG_HOME/rate_limits/\n\n    TA->>Stub: POST /chat/completions\n    Stub-->>TA: HTTP 429 + x-ratelimit-reset-requests-1h: 3540\n    TA->>FS: Write lockout JSON\n    TA-->>TA: Err(RateLimited)\n\n    participant TB as Test (driver_b)\n    TB->>FS: Check for existing lockout\n    FS-->>TB: Lockout file found (not expired)\n    TB-->>TB: Err(RateLimited) ŌĆö no network call\n    Note over TB,Stub: hit_count unchanged\n```\n\n## Test Components\n\n### `spawn_stub_429_server()`\n\nSpawns a background TCP listener on `127.0.0.1:0` (random port) that unconditionally responds with HTTP 429 to every connection. Each accepted connection increments an `Arc<AtomicUsize>` counter, which the test uses as proof of whether the network was actually reached.\n\nThe stub's response deliberately **omits the `retry-after` header** so that the driver's internal backoff loop uses its default short base delay (2 seconds) rather than sleeping for a full minute. This keeps the test fast while still validating that the `x-ratelimit-reset-requests-1h` header (set to 3540 seconds, ~59 minutes) is correctly parsed and persisted as the lockout duration.\n\nReturns `(base_url, hit_count)` ŌĆö the URL for pointing the driver at the stub and the atomic counter for making assertions.\n\n### `drain_request()`\n\nA minimal async helper that reads a single chunk from the incoming TCP stream to consume the request headers. Uses a 200ms timeout as a best-effort drain; since `reqwest` always sends the full request before reading the response, this single read is sufficient for test purposes.\n\n### `simple_request(model)`\n\nConstructs a minimal `CompletionRequest` with a single `\"hello\"` user message, 16 max tokens, zero temperature, and no tools. Used by the main test to pass a valid request payload through the driver.\n\n### `shared_rate_guard_short_circuits_second_client` (test)\n\nThe core integration test, structured in three phases:\n\n**Setup.** Creates an isolated temporary directory via `tempfile::tempdir()` and sets it as `LIBREFANG_HOME`, ensuring the test doesn't interfere with real lockout state. Also sets `NO_PROXY` to `127.0.0.1,localhost` to prevent ambient proxy settings from intercepting loopback traffic.\n\n**Phase 1 ŌĆö First client.** Instantiates `OpenAIDriver` via `with_proxy_and_timeout`, sends a completion request, and asserts:\n- The result is `Err(LlmError::RateLimited { .. })`.\n- The stub's `hit_count` is Ōēź 1 (the server was actually contacted).\n\n**Phase 2 ŌĆö Second client.** Creates a completely new `OpenAIDriver` instance (no shared state with the first) and sends the same request. Asserts:\n- The result is again `Err(LlmError::RateLimited { .. })`.\n- The stub's `hit_count` is **unchanged** ŌĆö proving the request was short-circuited by the file-based lockout, not the network.\n\n**Phase 3 ŌĆö Lockout file validation.** Reads the persisted JSON from `<LIBREFANG_HOME>/rate_limits/` and asserts:\n- Exactly one `.json` file exists.\n- `\"provider\"` is `\"openai-compat\"`.\n- `\"until_unix\"` is at least 3000 seconds in the future, confirming the `x-ratelimit-reset-requests-1h: 3540` header was used as the cooldown source.\n\n## Dependencies and Integration Points\n\n| Dependency | Role |\n|---|---|\n| `librefang_llm_driver` | Provides `CompletionRequest`, `LlmDriver` trait, and `LlmError` |\n| `librefang_llm_drivers::drivers::openai::OpenAIDriver` | The concrete driver under test |\n| `librefang_types::message::Message` | Used to construct the `Message::user(\"hello\")` payload |\n| `LIBREFANG_HOME` env var | Controls where the rate-limit lockout files are persisted |\n| `<LIBREFANG_HOME>/rate_limits/*.json` | The file-based shared state mechanism being validated |\n\n## Running\n\n```bash\ncargo test -p librefang-llm-drivers --test shared_rate_guard_integration\n```\n\nNo external services or API keys are required ŌĆö the stub server provides all responses. The test is fully self-contained and cleans up its temporary directory and environment variables on completion.","other-librefang-llm-drivers":"# Other ŌĆö librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait. Each driver encapsulates the API specifics, authentication, and request/response handling for a particular LLM provider (Anthropic, OpenAI, Gemini, etc.).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver] -->|trait LlmDriver| B[librefang-llm-drivers]\n    B --> C[Anthropic Driver]\n    B --> D[OpenAI Driver]\n    B --> E[Gemini Driver]\n    B --> F[...other providers]\n    B -->|HTTP requests| G[librefang-http]\n    B -->|OAuth flows| H[librefang-runtime-oauth]\n    B -->|shared types| I[librefang-types]\n```\n\nAll drivers share a common interface defined in `librefang-llm-driver`, allowing the rest of the codebase to interact with any LLM provider without knowing the specifics of its API.\n\n## Key Dependencies and Their Roles\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-llm-driver` | Provides the trait (`LlmDriver` or similar) that each concrete driver implements |\n| `librefang-http` | Shared HTTP client configuration, request building, and response handling |\n| `librefang-runtime-oauth` | OAuth token acquisition and refresh for providers that require it (e.g., Gemini via Google Cloud credentials) |\n| `librefang-types` | Shared domain types ŌĆö model identifiers, message structures, completion responses, error types |\n| `reqwest` | Underlying HTTP client used to call provider APIs |\n| `serde` / `serde_json` | Serialization of request payloads and deserialization of provider-specific JSON responses |\n| `dashmap` | Concurrent hashmap used for thread-safe caching (likely token/credential caching) |\n| `sha2` / `base64` | Cryptographic hashing and encoding ŌĆö used in request signing or key derivation |\n| `zeroize` | Secure memory clearing for sensitive credentials after use |\n| `dirs` | Resolution of platform-specific config/cache directories for credential storage |\n\n## How Drivers Work\n\nEach driver follows the same general pattern:\n\n1. **Configuration** ŌĆö The driver is constructed with provider-specific configuration (API key, base URL, default model, etc.).\n\n2. **Authentication** ŌĆö Depending on the provider, the driver either attaches a static API key to requests or uses `librefang-runtime-oauth` to obtain and refresh OAuth tokens. Credentials are held in memory with `zeroize`-protected types where sensitivity demands it, and may be cached in a `DashMap` to avoid redundant auth round-trips.\n\n3. **Request Construction** ŌĆö The driver translates the generic input types from `librefang-types` into the provider's expected JSON format using `serde`. Provider-specific quirks (e.g., Anthropic's `messages` format vs. OpenAI's `chat.completions` endpoint) are handled here.\n\n4. **HTTP Call** ŌĆö Requests are dispatched through `librefang-http` / `reqwest`. The driver manages retries, timeouts, and rate-limit handling as appropriate for each provider.\n\n5. **Response Parsing** ŌĆö Provider-specific JSON responses are deserialized into the shared response types from `librefang-types`, normalizing differences across APIs into a uniform shape.\n\n6. **Error Handling** ŌĆö Provider-specific error responses are mapped into the common error types defined in `librefang-types`.\n\n## Relationship to the Rest of the Codebase\n\nThis module is a **pure consumer** of the trait defined in `librefang-llm-driver`. Downstream code (e.g., orchestration layers, evaluation pipelines) depends only on the trait, selecting a concrete driver at runtime based on configuration. This separation means:\n\n- Adding a new LLM provider requires only a new driver module here, implementing the existing trait.\n- The rest of the codebase remains agnostic to provider specifics.\n- Drivers can be tested in isolation using mocked HTTP responses.\n\n## Credential Security\n\nGiven the dependency on `zeroize` and `sha2`, this module takes care to:\n\n- Clear sensitive credentials (API keys, OAuth tokens) from memory when they are no longer needed.\n- Avoid logging raw credentials via `tracing`.\n- Store cached credentials in platform-appropriate directories resolved through `dirs`, never hardcoding paths.","other-librefang-memory-tests":"# Other ŌĆö librefang-memory-tests\n\n# librefang-memory-tests: Canonical Chat-Scoped Integration Tests\n\n## Purpose\n\nThis module contains integration regression tests that guard a critical privacy fix in `session.rs`. Before the fix, every WhatsApp DM and group conversation sharing the same agent would see each other's history injected into the LLM prompt ŌĆö meaning a private chat could leak group messages and vice versa.\n\nThe fix tags each `CanonicalEntry` with the originating `SessionId` at write time and filters by session at read time. These tests exercise the full append ŌåÆ load ŌåÆ context roundtrip via the crate's public API, which is what the kernel actually calls.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[setup] -->|creates in-memory SQLite| B[run_migrations]\n    A -->|wraps conn in| C[SessionStore]\n    D[canonical_context_isolates_two_whatsapp_chats_for_same_agent] --> A\n    D -->|derives via| E[SessionId::for_channel]\n    D -->|writes via| F[SessionStore::append_canonical]\n    D -->|reads via| G[SessionStore::canonical_context]\n    H[canonical_context_unfiltered_returns_all_for_backward_compat] --> A\n    H --> E\n    H --> F\n    H --> G\n```\n\n## Test Harness\n\n### `setup() ŌåÆ SessionStore`\n\nCreates a fresh in-memory SQLite database, runs the full migration suite via `run_migrations`, and returns a new `SessionStore` backed by an `Arc<Mutex<Connection>>`. Each test calls `setup()` independently so there is no state leakage between tests.\n\n### `user_msg(text: &str) ŌåÆ Message`\n\nHelper that constructs a `Message` with `Role::User`, `MessageContent::Text`, no pin, and no timestamp. Used to build the canonical entries that get appended to the store.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**What it verifies:** Two distinct WhatsApp conversations ŌĆö a DM (`whatsapp:393331111111@s.whatsapp.net`) and a group (`whatsapp:120363111111111111@g.us`) ŌĆö that share the same `AgentId` must not see each other's canonical context.\n\n**Flow:**\n\n1. Creates a single agent and derives two different `SessionId` values via `SessionId::for_channel`.\n2. Asserts the two sessions are not equal (different chats must produce different sessions).\n3. Appends three messages in interleaved order: `dm-1`, `group-1`, `dm-2` ŌĆö each tagged with its own session.\n4. Calls `canonical_context(agent, Some(session_dm), None)` and asserts only `[\"dm-1\", \"dm-2\"]` are returned.\n5. Calls `canonical_context(agent, Some(session_group), None)` and asserts only `[\"group-1\"]` is returned.\n\n**Regression being guarded:** Without the `SessionId` tag on `CanonicalEntry`, all three messages would appear in both contexts, causing cross-chat leakage into the LLM prompt.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**What it verifies:** When `canonical_context` is called with `session_id = None`, it returns all messages across all sessions for that agent. This preserves the original cross-channel canonical-memory semantics for callers that haven't adopted per-session filtering yet.\n\n**Flow:**\n\n1. Creates an agent and two sessions (WhatsApp and Telegram).\n2. Appends one message to each session.\n3. Calls `canonical_context(agent, None, None)` and asserts both `[\"a-1\", \"b-1\"]` are returned.\n\n## Relationship to Production Code\n\n| Production API | Used in tests |\n|---|---|\n| `run_migrations` (`librefang_memory::migration`) | Database initialization in `setup()` |\n| `SessionStore::new` (`librefang_memory::session`) | Wrapping the migrated connection |\n| `SessionStore::append_canonical` | Writing tagged canonical entries |\n| `SessionStore::canonical_context` | Reading filtered (or unfiltered) context |\n| `SessionId::for_channel` (`librefang_types::agent`) | Deriving session identity from channel address |\n\nThese tests are the canonical consumer of the session-scoped filtering contract. If you change the `SessionId`-tagging logic in `session.rs` or the filtering behavior in `canonical_context`, these tests must continue to pass.","other-librefang-memory":"# Other ŌĆö librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Overview\n\n`librefang-memory` provides the persistence and retrieval layer for LibreFang agents. It serves as the \"memory\" component ŌĆö responsible for storing, indexing, and recalling agent state, conversation history, and any other data that needs to survive across sessions or be shared between agent components.\n\n## Purpose\n\nAn agent operating system needs structured, queryable memory. This module abstracts the storage substrate so that the rest of the system can:\n\n- **Persist agent state** across restarts and sessions\n- **Recall prior interactions** and context\n- **Store and retrieve typed data** using the shared definitions from `librefang-types`\n\n## Dependencies & What They Indicate\n\n| Dependency | Role |\n|---|---|\n| `rusqlite` | Primary storage backend ŌĆö SQLite for embedded, file-based persistence |\n| `serde` / `serde_json` / `rmp-serde` | Serialization layer supporting both JSON and MessagePack formats |\n| `librefang-types` | Shared type definitions used across the LibreFang ecosystem |\n| `tokio` | Async runtime integration for non-blocking storage operations |\n| `sha2` | Cryptographic hashing ŌĆö likely for content-addressable storage or integrity checks |\n| `uuid` | Unique identifiers for memory entries and records |\n| `chrono` | Timestamps for temporal indexing and queries |\n| `reqwest` | HTTP client ŌĆö suggests optional remote storage or synchronization capability |\n| `tracing` | Structured logging and diagnostics |\n| `thiserror` | Ergonomic error type definitions |\n| `async-trait` | Async trait support for defining storage backends as pluggable interfaces |\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Components] -->|read/write| M[librefang-memory]\n    M -->|persists to| S[SQLite Database]\n    M -->|serializes via| SE[serde / rmp-serde]\n    M -->|hashes with| H[sha2]\n    M -->|types from| T[librefang-types]\n    M -.->|optional sync| R[Remote Storage via reqwest]\n```\n\nThe module sits between agent components and the underlying storage. All memory operations go through this layer, which handles serialization, indexing, and retrieval.\n\n## Integration Points\n\n- **`librefang-types`** ŌĆö This module consumes shared type definitions (agent messages, state structures, etc.) rather than defining its own, ensuring consistency across the system.\n- **Agent components** ŌĆö Other modules in LibreFang read from and write to memory through the APIs this crate exposes.\n- **Filesystem** ŌĆö SQLite databases are stored on disk, with `tempfile` used in tests for isolated, ephemeral storage.\n\n## Testing\n\nThe `tempfile` dev-dependency indicates that tests create isolated temporary databases. This ensures test runs are repeatable and don't pollute the development environment with leftover state files.","other-librefang-migrate":"# Other ŌĆö librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations, payloads, and agent definitions from other C2/agent frameworks into LibreFang's native format.\n\n## Purpose\n\nWhen migrating to LibreFang from an existing agent framework, operators typically have accumulated configurations, agent profiles, and infrastructure definitions that need to be converted. `librefang-migrate` provides the tooling to parse these foreign formats and produce validated `librefang-types` structures that the rest of the system can consume.\n\nThis crate is a standalone utility ŌĆö it has no incoming or outgoing runtime dependencies on other LibreFang modules beyond the shared type definitions. It can be run as a one-shot import tool without spinning up the full LibreFang stack.\n\n## Supported Input Formats\n\nThe dependency set indicates support for the following configuration formats:\n\n| Format | Crate | Typical Use |\n|---|---|---|\n| JSON | `serde_json` | Standard structured config, API exports |\n| YAML | `serde_yaml` | Human-edited configs, CI/CD pipelines |\n| JSON5 | `json5` | Configs with comments, trailing commas |\n| TOML | `toml` | Rust-ecosystem configs, simpler files |\n\nThis breadth of format support means the migration engine can consume exports from virtually any agent framework without requiring pre-conversion.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Foreign Config Files] --> B[Directory Walker]\n    B --> C[Format Detection & Parsing]\n    C --> D[Framework-specific Converter]\n    D --> E[librefang-types Structs]\n    E --> F[Serialized Output]\n```\n\nThe pipeline is linear: discover files, detect their format, parse them, apply framework-specific conversion logic, and emit validated LibreFang types.\n\n## Key Components\n\n### Directory Traversal\n\nPowered by `walkdir`, the engine recursively scans a source directory to locate importable configuration files. This supports batch migrations where an operator points the tool at an existing framework's config directory.\n\n### Format Detection and Parsing\n\nFiles are parsed based on their extension or content structure. All four supported formats deserialize through `serde`, so the engine can normalize heterogeneous collections where a foreign framework stores different files in different formats.\n\n### Framework-Specific Converters\n\nEach supported source framework has its own conversion module that maps foreign schema fields to `librefang-types` equivalents. These converters are responsible for:\n\n- Translating agent option names and value types\n- Converting timestamp formats (`chrono`) from foreign conventions to LibreFang's standard\n- Mapping cryptographic material and credential references\n- Resolving path references relative to the source directory\n\n### Error Handling\n\nErrors are structured through `thiserror`, providing clear diagnostics when a foreign config cannot be parsed or contains fields that lack a LibreFang equivalent. The `tracing` integration produces detailed logs during migration runs, which is valuable when diagnosing partial import failures across large config sets.\n\n## Relationship to Other Crates\n\n- **`librefang-types`** ŌĆö The sole internal dependency. All migration output is expressed as types from this crate (agent configs, listener definitions, credential stores, etc.). This ensures migrated data is immediately usable by the rest of the LibreFang ecosystem without further transformation.\n- **No runtime coupling** ŌĆö Other LibreFang crates do not call into `librefang-migrate`, and it does not call into them. It is a build-time or CLI-invoked tool, not a library consumed during normal agent operation.\n\n## Usage Pattern\n\nBecause no execution flows were detected in the call graph, this module is designed to be invoked directly (e.g., via a binary target or CLI subcommand) rather than called programmatically during agent execution. A typical invocation would:\n\n1. Accept a source directory path and a target output path\n2. Walk the source directory for recognized config files\n3. Detect the source framework from file structure and content\n4. Parse and convert each file\n5. Write validated `librefang-types` structures to the output location\n\nThe `dirs` crate provides access to standard platform directories, which may be used to establish default output paths (e.g., placing migrated configs into the user's LibreFang config directory).\n\n## Testing\n\nTests use `tempfile` to create isolated directory structures that mimic foreign framework layouts, ensuring conversion logic is verified against realistic file hierarchies without touching the operator's actual configuration.","other-librefang-runtime-mcp":"# Other ŌĆö librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime.\n\n## Purpose\n\nThis crate provides an MCP client that enables the LibreFang runtime to communicate with MCP-compatible tool servers. MCP is a standardized protocol that allows AI models to discover and invoke external tools, access resources, and receive structured prompts. By integrating an MCP client, the runtime can extend its capabilities dynamically by connecting to external tool providers.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[LibreFang Runtime] --> B[librefang-runtime-mcp]\n    B --> C[rmcp]\n    B --> D[librefang-http]\n    B --> E[librefang-types]\n    C --> F[MCP Tool Servers]\n    D --> G[reqwest]\n```\n\nThe module sits between the LibreFang runtime core and external MCP servers, using the `rmcp` crate as the underlying protocol implementation. It relies on `librefang-http` for consistent HTTP transport configuration and `librefang-types` for shared type definitions.\n\n## Dependencies and Their Roles\n\n### Internal Crates\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the LibreFang workspace |\n| `librefang-http` | HTTP client construction and configuration, ensuring consistent transport behavior across the project |\n\n### External Crates\n\n| Crate | Role |\n|---|---|\n| `rmcp` | Core MCP protocol implementation ŌĆö handles message framing, tool discovery, and invocation semantics |\n| `reqwest` | Underlying HTTP client used to communicate with MCP servers |\n| `tokio` | Async runtime for non-blocking I/O |\n| `serde` / `serde_json` | Serialization of MCP request/response payloads |\n| `sha2` / `base64` | Cryptographic hashing and encoding, likely used for message integrity or authentication with MCP servers |\n| `url` | URL parsing and construction for MCP server endpoints |\n| `rand` | Random number generation, likely for nonce or session identifier creation |\n| `arc-swap` | Lock-free atomic swapping of shared state ŌĆö used for hot-reloading or updating MCP client configuration without disrupting active connections |\n| `async-trait` | Async trait definitions for trait objects |\n| `http` | Low-level HTTP types (request/response parts, header maps) |\n| `tracing` | Structured logging and diagnostics |\n\n## Integration Points\n\nThis crate is consumed by the LibreFang runtime to:\n\n1. **Discover tools** ŌĆö Query MCP servers for available tools and their schemas.\n2. **Invoke tools** ŌĆö Send structured invocation requests and return results to the runtime.\n3. **Manage connections** ŌĆö Maintain and potentially rotate connections to one or more MCP servers using thread-safe state (`arc-swap`).\n\n## Security Considerations\n\nThe inclusion of `sha2` and `base64` suggests this module may implement message authentication or integrity checks when communicating with MCP servers. The `rand` crate likely supports generation of cryptographic nonces for such flows. Developers modifying this crate should ensure any authentication logic remains constant-time where comparison is involved.\n\n## Workspace Configuration\n\nThis crate is part of the LibreFang workspace and inherits its `version`, `edition`, and `license` from the workspace root. All workspace-level dependency versions are managed centrally.","other-librefang-runtime-oauth":"# Other ŌĆö librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth 2.0 authentication flows for LibreFang runtime drivers, providing token acquisition and refresh for ChatGPT and GitHub Copilot backends.\n\n## Overview\n\nThis crate encapsulates the complete OAuth lifecycle ŌĆö from generating PKCE challenges to exchanging authorization codes for access tokens. It is consumed by runtime drivers that need to authenticate against third-party LLM providers (ChatGPT, GitHub Copilot) on behalf of a LibreFang user.\n\nThe module is intentionally self-contained: it holds no direct coupling to specific driver implementations. Drivers call into this crate's public API to obtain tokens, keeping authentication logic centralized and auditable.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests token| B[OAuth Flow]\n    B -->|builds request| C[librefang-http]\n    C -->|HTTP call| D[Provider Token Endpoint]\n    B -->|reads/writes| E[librefang-types]\n    B -->|secure wipe| F[zeroize]\n```\n\n**Key design decisions:**\n\n- **PKCE-based flows** ŌĆö Uses SHA-256 challenges (`sha2` + `base64`) with cryptographically random verifiers (`rand`) to protect the authorization code exchange. No client secrets are embedded in the binary.\n- **Secret hygiene** ŌĆö All intermediate secrets (verifiers, tokens, codes) are held in types that implement `zeroize::Zeroize`, ensuring sensitive material is cleared from memory on drop.\n- **Async throughout** ŌĆö All network I/O is async via `tokio`, compatible with the rest of the LibreFang runtime.\n\n## Dependencies\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-types` | Shared OAuth-related types, error variants, token response structs |\n| `librefang-http` | HTTP client abstraction; ensures consistent TLS config, proxy settings, and user-agent headers across the project |\n| `reqwest` | Underlying HTTP client for token endpoint requests |\n| `serde` / `serde_json` | Deserializing token responses; serializing request bodies |\n| `thiserror` | Typed error enums for OAuth-specific failure modes |\n| `tracing` | Structured logging of flow progress (challenge generation, token exchange, refresh) |\n| `base64` | URL-safe Base64 encoding of PKCE challenges and code verifiers |\n| `sha2` | SHA-256 digest for PKCE challenge derivation |\n| `rand` | Cryptographically secure random generation of PKCE verifiers and state parameters |\n| `zeroize` | Secure memory clearing for secrets |\n| `hex` | Hex encoding of hash outputs where needed |\n\n## Integration Points\n\n### Downstream consumers\n\nRuntime drivers (e.g., a ChatGPT driver or GitHub Copilot driver) depend on this crate at the workspace level. A driver typically:\n\n1. Calls an OAuth flow entry point to kick off authorization.\n2. Receives back an access token (and optional refresh token) typed from `librefang-types`.\n3. Passes the token to subsequent API calls against the LLM provider.\n\n### Upstream dependencies\n\n- **`librefang-types`** must define the token and error types this crate produces. If adding a new provider flow, ensure the shared types include any provider-specific fields (e.g., GitHub Copilot's additional scope metadata).\n- **`librefang-http`** provides the HTTP client builder. Any changes to its TLS configuration or proxy support automatically apply to OAuth requests made here.\n\n## Adding a New Provider Flow\n\nTo add support for a new OAuth provider:\n\n1. Define any provider-specific token or error types in `librefang-types`.\n2. Implement a new flow function in this crate following the existing pattern: generate a PKCE verifier, derive the challenge, open the authorization URL, listen for the callback, and exchange the code.\n3. Ensure all secret values use `zeroize`-compatible types.\n4. Add `tracing` instrumentation at each major step (challenge generation, redirect received, token exchange attempted, token received).\n5. Export the new flow from the crate root so drivers can import it.\n\n## Error Handling\n\nErrors are expressed via `thiserror`-derived enums covering:\n\n- **Network failures** ŌĆö The token endpoint was unreachable or returned a non-200 status.\n- **Deserialization failures** ŌĆö The provider returned an unexpected response shape.\n- **PKCE/state mismatches** ŌĆö The callback returned an invalid state parameter or the code exchange was rejected.\n- **Expired/revoked tokens** ŌĆö Refresh attempts that fail because the refresh token is no longer valid.\n\nAll errors implement `std::error::Error` and carry enough context (provider name, HTTP status, response body excerpt) to be useful in logs without leaking full secrets.\n\n## Security Considerations\n\n- **No secrets in logs.** Token values, code verifiers, and authorization codes are never included in `tracing` output. Logs reference only flow state transitions (e.g., \"PKCE challenge generated\", \"token exchange succeeded\").\n- **Zeroize on drop.** Types wrapping secret material implement `Drop` via `zeroize` to reduce the window where secrets exist in process memory.\n- **PKCE mandatory.** All flows use Proof Key for Code Exchange. Implicit grant or client-secret flows are not supported, avoiding secrets embedded in desktop/native applications.","other-librefang-runtime-tests":"# Other ŌĆö librefang-runtime-tests\n\n# librefang-runtime-tests: MCP OAuth Integration Tests\n\n## Purpose\n\nThis module contains integration tests that validate the OAuth authentication flow for MCP (Model Context Protocol) server connections. It guards against regressions in three critical areas: OAuth metadata discovery, provider wiring during HTTP connections, and the token/auth-state lifecycle.\n\n## Why These Tests Exist\n\nSeveral tests in this file are explicitly marked as regression tests because they catch specific bugs that shipped previously:\n\n- **`test_http_connect_calls_oauth_provider_load_token`** ŌĆö catches a bug where `oauth_provider: None` was passed in the kernel's `connect_mcp_servers`, silently disabling the entire OAuth flow.\n- **`test_needs_auth_serializes_differently_from_pending_auth`** ŌĆö catches a bug where the dashboard showed \"Authorizing...\" at boot before the user had clicked Authorize.\n- **`test_auth_state_lifecycle`** ŌĆö catches a bug where revoking removed the auth state entirely, leaving no \"Authorize\" button in the dashboard.\n\n## Test Categories\n\n### OAuth Metadata Discovery\n\n| Test | What it verifies |\n|---|---|\n| `test_discover_fallback_to_config` | When the remote server is unreachable, `discover_oauth_metadata` falls back to values from `McpOAuthConfig` |\n| `test_discover_fails_without_any_source` | Discovery returns an error when there is no remote endpoint and no fallback config |\n\nThese tests call `discover_oauth_metadata` from `librefang-runtime-mcp/src/mcp_oauth.rs` with a nonexistent URL (`https://nonexistent.example.com/mcp`) to force the fallback path.\n\n### OAuth Provider Wiring\n\n**`test_http_connect_calls_oauth_provider_load_token`** is the key integration test. It proves that `McpConnection::connect` actually invokes the OAuth provider when a Streamable HTTP server returns a 401 error. It uses `TrackingOAuthProvider` ŌĆö a mock that sets an `AtomicBool` when `load_token` is called ŌĆö to detect whether the provider was consulted at all.\n\n```mermaid\nflowchart LR\n    A[McpConnection::connect] -->|401 response| B[OAuth provider.load_token]\n    B -->|None returned| C[Connection fails]\n    B -->|Some token| D[Retry with token]\n```\n\nThe test connects to `http://127.0.0.1:1/nonexistent-mcp` (a port with no listener), configures a `TrackingOAuthProvider`, and asserts that `load_token_called` is true after the connection fails. If this assertion fires, someone has reintroduced the bug where the provider is `None`.\n\n### Token Lifecycle via Mock Provider\n\n`InMemoryOAuthProvider` is a mock implementation of `McpOAuthProvider` that stores tokens in an in-memory `HashMap` (no vault dependency). It exercises the `load_token` / `store_tokens` / `clear_tokens` round-trip:\n\n| Test | Behavior verified |\n|---|---|\n| `test_provider_store_then_load` | `store_tokens` followed by `load_token` returns the stored access token |\n| `test_provider_clear_removes_token` | `clear_tokens` removes the token for a given server URL |\n| `test_provider_clear_is_isolated` | Clearing tokens for one server does not affect another server |\n| `test_provider_reauthorize_after_clear` | After clearing, storing a new token works (store ŌåÆ clear ŌåÆ store round-trip) |\n\n### Auth State Serialization\n\nThese are synchronous (`#[test]`) tests that validate `McpAuthState` serializes correctly through its lifecycle. This state machine drives what the dashboard UI shows:\n\n```mermaid\nstateDiagram-v2\n    [*] --> NeedsAuth: Server returns 401\n    NeedsAuth --> PendingAuth: User clicks Authorize\n    PendingAuth --> Authorized: OAuth callback succeeds\n    Authorized --> NeedsAuth: User revokes access\n```\n\n| Test | Behavior verified |\n|---|---|\n| `test_auth_state_lifecycle` | The full cycle NeedsAuth ŌåÆ PendingAuth ŌåÆ Authorized ŌåÆ NeedsAuth produces correct JSON at each step |\n| `test_needs_auth_serializes_differently_from_pending_auth` | `needs_auth` and `pending_auth` serialize to different `\"state\"` values so the UI can distinguish them |\n\n## Mock Implementations\n\n### `TrackingOAuthProvider`\n\nRecords whether `load_token` was called via an `AtomicBool`. Returns `None` from `load_token` to force the connection to fail with 401. Used exclusively by `test_http_connect_calls_oauth_provider_load_token`.\n\n### `InMemoryOAuthProvider`\n\nFull in-memory implementation backed by `tokio::sync::Mutex<HashMap<String, OAuthTokens>>`. Supports all three trait methods (`load_token`, `store_tokens`, `clear_tokens`) and is used by the token lifecycle tests.\n\n## External Dependencies\n\nThe tests interact with these parts of the codebase:\n\n- **`librefang_runtime::mcp_oauth`** ŌĆö `discover_oauth_metadata`, `McpOAuthProvider` trait, `OAuthTokens`, `McpAuthState`\n- **`librefang_runtime::mcp`** ŌĆö `McpConnection::connect`, `McpServerConfig`, `McpTransport`, `empty_taint_rule_sets_handle`\n- **`librefang_types::config`** ŌĆö `McpOAuthConfig`\n- **`librefang_types::oauth`** ŌĆö `OAuthTokens` struct definition\n\n## Running the Tests\n\n```sh\n# All tests in this file\ncargo test -p librefang-runtime --test mcp_oauth_integration\n\n# Only the token lifecycle tests (fast, no network)\ncargo test -p librefang-runtime --test mcp_oauth_integration -- provider_\n\n# Only the auth state serialization tests (synchronous, instant)\ncargo test -p librefang-runtime --test mcp_oauth_integration -- auth_state\n```\n\nThe discovery and HTTP connection tests attempt to reach non-routable addresses, so they exercise timeout/error paths rather than actual network calls. No external services are required.","other-librefang-runtime-wasm":"# Other ŌĆö librefang-runtime-wasm\n\n# librefang-runtime-wasm\n\nWASM skill sandbox for the LibreFang runtime.\n\n## Purpose\n\nThis crate provides a WebAssembly-based sandboxing layer responsible for executing **skills** ŌĆö user-defined or dynamically-loaded game logic ŌĆö in an isolated, safe environment. By compiling skill code to WASM and running it through the [wasmtime](https://wasmtime.dev/) runtime, the system ensures that skill execution cannot compromise the host process, access unauthorized resources, or interfere with other subsystems.\n\n## Architecture\n\nThe crate sits between the LibreFang kernel and the skill code being executed. It uses `wasmtime` as its WASM engine and depends on several sibling crates for type definitions, kernel communication, and HTTP support.\n\n```mermaid\ngraph TD\n    A[Skill WASM Module] --> B[librefang-runtime-wasm]\n    B --> C[wasmtime Runtime]\n    B --> D[librefang-types]\n    B --> E[librefang-kernel-handle]\n    B --> F[librefang-http]\n    style B fill:#2d6,stroke:#333,color:#fff\n```\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `wasmtime` | Core WASM runtime ŌĆö provides compilation, instantiation, and execution of WASM modules |\n| `librefang-types` | Shared type definitions used across the LibreFang ecosystem |\n| `librefang-kernel-handle` | Interface for communicating with the LibreFang kernel from within the sandbox |\n| `librefang-http` | HTTP client/server support, available to skills that need to make outbound requests |\n| `tokio` | Async runtime backing all I/O and WASM execution |\n| `serde_json` | JSON serialization for data exchange between the host and WASM guests |\n| `tracing` | Structured logging and diagnostics |\n| `thiserror` / `anyhow` | Error type definitions and ergonomic error propagation |\n\n## Design Principles\n\n- **Isolation**: Skill code runs inside a WASM sandbox with no direct access to the host filesystem, network, or memory. All interaction with the outside world goes through explicitly-imported host functions exposed via the kernel handle.\n- **Determinism**: WASM execution is deterministic given the same inputs, which supports reproducible game logic and testing.\n- **Async-native**: Built on `tokio`, allowing the runtime to interleave skill execution with other asynchronous game server work without blocking.\n\n## Integration Points\n\nSkills running inside this sandbox interact with the rest of the LibreFang system through two primary channels:\n\n1. **Kernel handle** (`librefang-kernel-handle`): Skills call into the kernel to query game state, emit events, or request services. The runtime acts as a bridge, exporting host functions that the WASM module can import and call.\n\n2. **HTTP layer** (`librefang-http`): Skills that need to communicate with external services do so through the HTTP crate, which the runtime mediates to enforce security policies.\n\nData flowing between the host and WASM guest is serialized as JSON via `serde_json`, with the shared types in `librefang-types` ensuring schema compatibility on both sides.\n\n## Error Handling\n\nThe crate uses a layered error strategy:\n\n- `thiserror` for defining concrete, typed error enums specific to WASM sandbox operations (e.g., compilation failures, instantiation errors, trap handling).\n- `anyhow` for internal propagation where the specific error variant is less important than the diagnostic context.\n\nAll errors are instrumented with `tracing` spans to aid debugging in production.","other-librefang-runtime":"# Other ŌĆö librefang-runtime\n\n# librefang-runtime\n\nAgent runtime and execution environment for LibreFang. This crate is the top-level orchestrator responsible for managing agent lifecycles, dispatching skill invocations, coordinating LLM interactions, and enforcing sandboxing boundaries during execution.\n\n## Architecture\n\n`librefang-runtime` sits at the center of the LibreFang agent stack. It does not implement low-level primitives itself ŌĆö instead it wires together the domain-specific subsystems into a cohesive execution loop.\n\n```mermaid\ngraph TD\n    RT[librefang-runtime] --> TYPES[librefang-types]\n    RT --> HTTP[librefang-http]\n    RT --> KH[librefang-kernel-handle]\n    RT --> LLM_DRIVERS[librefang-llm-drivers]\n    RT --> LLM_DRV[librefang-llm-driver]\n    RT --> WASM[librefang-runtime-wasm]\n    RT --> MCP[librefang-runtime-mcp]\n    RT --> OAUTH[librefang-runtime-oauth]\n    RT --> CH[librefang-channels]\n    RT --> MEM[librefang-memory]\n    RT --> SK[librefang-skills]\n```\n\n### Subsystem responsibilities\n\n| Dependency | Role in the runtime |\n|---|---|\n| `librefang-types` | Shared domain types (agent IDs, messages, configs) |\n| `librefang-http` | Outbound HTTP communication |\n| `librefang-kernel-handle` | Kernel-level resource management |\n| `librefang-llm-drivers` / `librefang-llm-driver` | LLM provider abstraction ŌĆö model invocation, streaming, token accounting |\n| `librefang-runtime-wasm` | WASM-based agent/plugin sandboxed execution |\n| `librefang-runtime-mcp` | Model Context Protocol client ŌĆö tool discovery and invocation |\n| `librefang-runtime-oauth` | OAuth flows for authenticating agents against external services |\n| `librefang-channels` | Message routing between agents, users, and external systems |\n| `librefang-memory` | Short-term and long-term agent memory storage and retrieval |\n| `librefang-skills` | Skill registry ŌĆö loading, resolving, and dispatching agent capabilities |\n\n## Key capabilities\n\n### Agent identity and cryptography\n\nThe runtime depends on `ed25519-dalek`, `sha2`, `hmac`, and `zeroize` for agent identity management. Agents are identified by Ed25519 key pairs. HMAC-SHA256 is available for message authentication. All secret material uses `zeroize` to clear memory on drop.\n\n### Concurrent state management\n\n`dashmap` and `parking_lot` provide the concurrency primitives for the runtime's internal state: live agent sessions, active channel subscriptions, and in-flight LLM requests. These are chosen over `std::sync` for lower contention under high agent counts.\n\n### Package and document handling\n\n- **Agent packages**: `flate2` and `tar` handle `.tar.gz` archive extraction for agent bundle installation.\n- **PDF ingestion**: `pdf-extract` parses PDF documents, making content available to agents for analysis.\n- **Shell argument parsing**: `shlex` tokenizes tool command strings.\n\n### WebSocket support\n\n`tokio-tungstenite` provides async WebSocket connectivity, used for real-time channel communication and streaming LLM responses.\n\n### Synchronous HTTP fallback\n\n`ureq` is included alongside `reqwest` for contexts where an async HTTP client is unavailable or undesirable ŌĆö for example, inside a tightly sandboxed WASM host or during early startup before the Tokio runtime is fully initialized.\n\n## Sandboxing\n\nThe runtime offers two optional Linux sandboxing mechanisms, enabled via Cargo features:\n\n| Feature | Dependency | Mechanism |\n|---|---|---|\n| `landlock-sandbox` | `landlock` 0.4 | Linux Landlock LSM ŌĆö filesystem access control |\n| `seccomp-sandbox` | `seccompiler` 0.5 | seccomp-bpf syscall filtering |\n\nBoth are optional and compiled out by default. On Unix systems, `libc` is linked for low-level platform calls (UID/GID management, `chroot`, process signals).\n\nThe `wasm-hooks` feature flag enables additional WASM hook points for lifecycle callbacks within the runtime.\n\n## Configuration\n\n`toml` is used for deserializing runtime configuration files. Configuration typically covers:\n\n- Agent identity and key material paths\n- LLM provider endpoints and model selection\n- Memory backend settings\n- Channel connection strings\n- Sandbox policy definitions\n\n`dirs` and `tempfile` manage XDG-compliant config/data directories and ephemeral working directories for agent execution.\n\n## Data persistence\n\n`rusqlite` provides embedded SQLite storage for local agent state, session history, and cached data. This is used alongside `librefang-memory` for persistence that doesn't require an external database.\n\n## Integration points\n\nWhen consuming this crate, you typically:\n\n1. **Construct a runtime instance** with a loaded configuration.\n2. **Register skills** via the `librefang-skills` integration.\n3. **Attach channel listeners** through `librefang-channels`.\n4. **Start the execution loop**, which dispatches incoming messages to agents, invokes LLM drivers, runs MCP tool calls, and optionally executes WASM plugins under sandbox constraints.\n\nThe runtime manages the full lifecycle ŌĆö from message ingestion through LLM reasoning to skill invocation and response delivery ŌĆö coordinating all subsystems transparently.","other-librefang-skills":"# Other ŌĆö librefang-skills\n\n# librefang-skills\n\nSkill system for LibreFang ŌĆö provides the registry, filesystem loader, marketplace client, and OpenClaw compatibility layer for discovering, loading, and managing skills.\n\n## Purpose\n\nA **skill** in LibreFang is a self-contained unit of functionality that can be discovered at runtime, loaded on demand, and optionally fetched from a remote marketplace. This crate provides all infrastructure for that lifecycle:\n\n- **Defining** what a skill looks like (its metadata, version, dependencies).\n- **Discovering** skills on the local filesystem via directory traversal.\n- **Loading** skill definitions from TOML, JSON, or YAML manifests, and extracting packaged archives (`.zip`).\n- **Registering** loaded skills in a central registry for lookup by name or pattern.\n- **Fetching** skills from a remote marketplace over HTTPS, with integrity verification.\n- **Compatibility** with the OpenClaw skill format, allowing LibreFang to consume skills originally authored for that ecosystem.\n\n## Architecture\n\n```mermaid\ngraph TD\n    FS[Filesystem Loader] -->|walks directories| REG[Skill Registry]\n    MKT[Marketplace Client] -->|downloads + verifies| REG\n    REG -->|lookup by name/pattern| CONSUMERS[Application Layer]\n    OCV[OpenClaw Adapter] -->|translates format| REG\n\n    subgraph Storage\n        DISK[(skill manifests + assets)]\n    end\n\n    FS -->|reads .toml/.json/.yaml/.zip| DISK\n    MKT -->|writes to| DISK\n```\n\n## Key Subsystems\n\n### Skill Registry\n\nThe registry is the central in-memory index of all available skills. It supports:\n\n- **Name-based lookup** ŌĆö retrieve a skill by its unique identifier.\n- **Pattern-based search** ŌĆö efficient multi-pattern matching over skill names or tags (backed by `aho-corasick`).\n- **Version tracking** ŌĆö skills are versioned using semantic versioning (`semver` crate), enabling version constraints and conflict detection.\n\n### Filesystem Loader\n\nUses `walkdir` to recursively scan configured skill directories for manifests. Supported manifest formats:\n\n| Format | Extension |\n|--------|-----------|\n| TOML   | `.toml`   |\n| JSON   | `.json`   |\n| YAML   | `.yaml` / `.yml` |\n\nPackaged skills distributed as `.zip` archives are extracted and their manifests read during the walk.\n\nFile locking (`fs2`) prevents corruption when multiple processes load or install skills concurrently against the same directory.\n\n### Marketplace Client\n\nAn async HTTP client (`reqwest` with `rustls`) that:\n\n1. Connects to a configured marketplace endpoint over HTTPS.\n2. Downloads skill packages.\n3. Verifies package integrity using SHA-256 digests (`sha2` + `hex`).\n4. Writes verified packages to the local skill directory.\n\nTLS certificate validation uses both the `webpki-roots` Mozilla bundle and `rustls-native-certs` for system-installed certificates, ensuring compatibility across platforms.\n\n### OpenClaw Compatibility\n\nAn adapter layer that translates OpenClaw-format skill definitions into LibreFang's native types (from `librefang-types`). This allows the ecosystem to reuse existing OpenClaw skills without modification.\n\n## Dependencies and Their Roles\n\n| Dependency | Role in this crate |\n|------------|-------------------|\n| `librefang-types` | Shared type definitions (skill metadata structs, error types) |\n| `serde` / `serde_json` / `toml` / `serde_yaml` | De/serialization of skill manifests in multiple formats |\n| `thiserror` | Derived error types for loader, registry, and marketplace operations |\n| `tracing` | Structured logging throughout the skill lifecycle |\n| `tokio` | Async runtime for marketplace HTTP calls and concurrent I/O |\n| `walkdir` | Recursive directory traversal for skill discovery |\n| `chrono` | Timestamp handling for skill installation and cache metadata |\n| `reqwest` | HTTP client for marketplace communication |\n| `rustls` + `webpki-roots` + `rustls-native-certs` | TLS backend for secure marketplace connections |\n| `sha2` + `hex` | SHA-256 integrity verification of downloaded packages |\n| `zip` | Extraction of packaged skill archives |\n| `aho-corasick` | Fast multi-pattern matching for skill name/tag lookups |\n| `semver` | Parsing and comparing semantic version strings in skill metadata |\n| `fs2` | Filesystem locking for safe concurrent access to skill storage |\n\n## Relationship to Other Crates\n\nThis crate sits above `librefang-types`, consuming the skill-related types defined there (metadata structs, version types, error enums). It is consumed by the application layer, which uses the registry to resolve and dispatch skills at runtime.\n\nNo other crates in the workspace call into `librefang-skills` directly ŌĆö the call graph shows it as a leaf dependency that exposes a self-contained API surface to its consumers.\n\n## Testing\n\nTests use `tempfile` to create isolated filesystem trees for loader and registry tests, avoiding side effects on the host system. The `serial_test` crate serializes tests that share filesystem state, preventing race conditions during parallel test execution.","other-librefang-telemetry":"# Other ŌĆö librefang-telemetry\n\n# librefang-telemetry\n\nOpenTelemetry + Prometheus metrics instrumentation for LibreFang.\n\n## Overview\n\n`librefang-telemetry` is a utility crate that provides observability primitives for the LibreFang project. It builds on the [`metrics`](https://docs.rs/metrics) facade to define domain-specif
