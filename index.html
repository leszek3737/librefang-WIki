reshold |\n| `MAX_CONSECUTIVE_ALL_FAILED` | 3 | Abort threshold for repeated hard failures |\n| `DEFAULT_CONTEXT_WINDOW` | 200,000 | Token-based trimming fallback |\n| `USER_AGENT` | `librefang/{version}` | HTTP header for all outgoing requests |\n\n## Provider Prefix Handling\n\n`strip_provider_prefix(model, provider)` normalizes model IDs for providers that store qualified names (`provider/org/model`) but require only `org/model` at the API. For providers requiring qualified format (OpenRouter, Together, Fireworks, Replicate, Chutes, HuggingFace), bare model names like `gemini-2.5-flash` are auto-qualified to `google/gemini-2.5-flash` via `normalize_bare_model_id`.\n\n## Integration Points\n\n- **Kernel** — `KernelHandle` trait provides session persistence, experiment lookup, prompt versioning, and tool timeout configuration.\n- **Memory** — `MemorySubstrate` for recall/remember; `ProactiveMemoryStore` for `auto_memorize`/`auto_retrieve`.\n- **Skills** — `SkillRegistry` passed to `tool_runner` for skill-based tool dispatch.\n- **MCP** — `McpConnection` objects passed through for Model Context Protocol tool calls.\n- **Hooks** — `HookRegistry` fires `BeforeToolCall` / `AfterToolCall` / `AgentLoopEnd` events. Hooks can block tool execution by returning `Err`.\n- **Context Engine** — Optional plugin interface for custom context window management, memory recall, and tool result truncation.\n- **HTTP** — All outgoing HTTP uses `librefang_http::proxied_client_builder()` for consistent proxy and TLS configuration.","agent-runtime-librefang-runtime-wasm-src":"# Agent Runtime — librefang-runtime-wasm-src\n\n# LibreFang WASM Runtime (`librefang-runtime-wasm`)\n\nSecure sandbox for executing untrusted agent skills and plugins as compiled WebAssembly modules. Built on Wasmtime with deny-by-default capability enforcement, deterministic CPU metering, and wall-clock timeouts.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"WASM Sandbox\"\n        A[WasmSandbox::execute] --> B[compile module]\n        B --> C[instantiate with linker]\n        C --> D[write input to guest memory]\n        D --> E[call guest execute]\n        E --> F[read output from guest memory]\n    end\n\n    subgraph \"Host Function Layer\"\n        G[host_call] --> H[dispatch]\n        H --> I[check_capability]\n        H --> J[host_fs_read / host_fs_write]\n        H --> K[host_net_fetch]\n        H --> L[host_shell_exec]\n        H --> M[host_kv_get / host_kv_set]\n        H --> N[host_agent_send / host_agent_spawn]\n    end\n\n    E -.->|\"import\"| G\n    K -.->|SSRF + DNS pin| O[librefang_http]\n    M -.->|kernel handle| P[librefang_kernel_handle]\n    N -.->|kernel handle| P\n    I -.->|capability_matches| Q[librefang_types::capability]\n```\n\n## Module Layout\n\n| File | Responsibility |\n|------|---------------|\n| `sandbox.rs` | Wasmtime engine lifecycle, guest/host ABI, memory marshalling, fuel and epoch enforcement |\n| `host_functions.rs` | Capability-checked host function implementations, path/SSRF/shell security |\n\n## Sandbox Engine\n\n`WasmSandbox` wraps a Wasmtime `Engine` configured with fuel consumption and epoch interruption. Create one instance per kernel and reuse it — the engine is expensive to construct but compiles and instantiates many modules.\n\n### Execution Flow\n\n1. **`WasmSandbox::execute`** (async) — offloads to `spawn_blocking` because WASM compilation and execution are CPU-bound.\n2. **`execute_sync`** — the core path:\n   - Compiles the WASM bytes (accepts `.wasm` binary or `.wat` text).\n   - Creates a `Store<GuestState>` with the caller's capabilities and optional kernel handle.\n   - Sets the fuel budget (`SandboxConfig::fuel_limit`).\n   - Starts a watchdog thread for wall-clock timeout (`SandboxConfig::timeout_secs`, default 30s).\n   - Builds a `Linker` with `host_call` and `host_log` imports.\n   - Instantiates the module, retrieves required guest exports (`memory`, `alloc`, `execute`).\n   - Marshals JSON input into guest memory via `alloc`.\n   - Calls guest `execute`, unpacks the packed `i64` result `(ptr << 32 | len)`.\n   - Reads and deserializes JSON output from guest memory.\n   - Returns `ExecutionResult` with output JSON and fuel consumed.\n\n### Watchdog Thread\n\nThe watchdog uses `park_timeout` with an `AtomicBool` done flag rather than a sleep loop. An RAII `WatchdogGuard` sets the flag and joins the thread on every exit path (success, error, panic). This avoids the previous problems:\n\n- No leaked OS threads from fire-and-forget sleep loops.\n- No false epoch interrupts on concurrent stores (the flag is checked before `increment_epoch`).\n- Sub-microsecond cleanup on the happy path via `Thread::unpark`.\n\n### SandboxConfig\n\n| Field | Default | Purpose |\n|-------|---------|---------|\n| `fuel_limit` | `1_000_000` | Max WASM instructions. `0` = unlimited. |\n| `max_memory_bytes` | `16 MiB` | Reserved for future enforcement. |\n| `capabilities` | `vec![]` | Capabilities granted to this invocation. |\n| `timeout_secs` | `30` | Wall-clock timeout via epoch interruption. |\n\n### SandboxError Variants\n\n| Variant | Trigger |\n|---------|---------|\n| `Compilation` | Wasmtime module compilation failure. |\n| `Instantiation` | Linker/instantiation failure. |\n| `Execution` | Runtime trap, timeout (epoch interrupt), or `spawn_blocking` join failure. |\n| `FuelExhausted` | Guest consumed all allocated fuel. |\n| `AbiError` | Missing exports, invalid packed pointers, JSON parse errors, memory bounds violations. |\n\n## Guest ABI\n\nWASM modules targeting this sandbox **must** export three symbols:\n\n```wat\n(memory (export \"memory\") 1)                          ;; linear memory\n(func (export \"alloc\") (param $size i32) (result i32)) ;; bump allocator\n(func (export \"execute\") (param $ptr i32) (param $len i32) (result i64))\n```\n\n- **`alloc(size) -> ptr`** — allocate `size` bytes in guest linear memory, return pointer.\n- **`execute(input_ptr, input_len) -> i64`** — receive JSON input bytes, return packed `(result_ptr << 32) | result_len` pointing to JSON output bytes.\n\nThe host writes input by calling `alloc`, then `copy_from_slice` into guest memory. After `execute` returns, the host reads output from the packed pointer/length.\n\n## Host ABI\n\nThe sandbox provides two imports under the `\"librefang\"` module:\n\n### `host_call(request_ptr: i32, request_len: i32) -> i64`\n\nRPC dispatch for all capability-checked operations. Reads a JSON request from guest memory:\n\n```json\n{\"method\": \"fs_read\", \"params\": {\"path\": \"/data/file.txt\"}}\n```\n\nReturns a packed `(ptr, len)` pointing to JSON in guest memory:\n\n```json\n{\"ok\": \"file contents here\"}\n```\n\nor\n\n```json\n{\"error\": \"Capability denied: FileRead(\\\"/data/file.txt\\\")\"}\n```\n\n### `host_log(level: i32, msg_ptr: i32, msg_len: i32)`\n\nLightweight logging. No capability check. Level mapping: `0` = trace, `1` = debug, `2` = info, `3` = warn, `≥4` = error.\n\n## Host Function Dispatch\n\n`host_functions::dispatch` routes method names to handlers. Every handler (except `time_now`) checks capabilities before executing.\n\n### Method Reference\n\n| Method | Required Capability | Kernel Required | Notes |\n|--------|--------------------|-----------------|-------|\n| `time_now` | *none* | No | Returns `{\"ok\": <unix_epoch_secs>}`. Always allowed. |\n| `fs_read` | `FileRead(path)` | No | Reads file to string. Path traversal protected. |\n| `fs_write` | `FileWrite(path)` | No | Writes string to file. Path traversal protected. |\n| `fs_list` | `FileRead(path)` | No | Lists directory entries. Path traversal protected. |\n| `net_fetch` | `NetConnect(host)` | No | HTTP client with SSRF protection and DNS pinning. |\n| `shell_exec` | `ShellExec(command)` | No | Executes process with sanitized environment. |\n| `env_read` | `EnvRead(name)` | No | Reads single environment variable. |\n| `kv_get` | `MemoryRead(key)` | Yes | Reads from kernel memory store. |\n| `kv_set` | `MemoryWrite(key)` | Yes | Writes to kernel memory store. |\n| `agent_send` | `AgentMessage(target)` | Yes | Sends message to another agent. |\n| `agent_spawn` | `AgentSpawn` | Yes | Spawns child agent with capability inheritance check. |\n\nAll methods return `{\"ok\": ...}` on success or `{\"error\": \"...\"}` on failure.\n\n### Capability Checking\n\n`check_capability` iterates granted capabilities and calls `librefang_types::capability::capability_matches`. Wildcard capabilities (e.g., `FileRead(\"*\")`) match any resource within that domain. If no match is found, the operation is rejected immediately — deny by default.\n\n## Security Measures\n\n### Path Traversal Protection\n\nTwo functions enforce safe filesystem access:\n\n- **`safe_resolve_path`** — for reads where the target must exist. Rejects any `..` component, then `canonicalize`s to resolve symlinks.\n- **`safe_resolve_parent`** — for writes where the file may not exist yet. Canonicalizes the parent directory, validates the filename doesn't contain `..`, and joins them.\n\nBoth functions run **after** the capability gate, providing defense-in-depth.\n\n### SSRF Protection\n\n`host_net_fetch` runs `is_ssrf_target` before any HTTP request:\n\n1. **Scheme allowlist** — only `http://` and `https://` (blocks `file://`, `gopher://`, `ftp://`).\n2. **Hostname blocklist** — `localhost`, cloud metadata endpoints (`169.254.169.254`, `metadata.google.internal`, etc.).\n3. **DNS resolution** — resolves the hostname, checks every returned IP.\n4. **IP classification** — `canonical_ip` unwraps IPv4-mapped IPv6 (`::ffff:X.X.X.X`) to prevent bypass, then blocks loopback, unspecified, and private ranges (RFC 1918, link-local).\n5. **DNS pinning** — the resolved addresses are pinned on the HTTP client via `resolve()`, preventing DNS rebinding / TOCTOU attacks between the check and the actual connection.\n\nThe HTTP client is built via `librefang_http::proxied_client_builder`, which provides proxy-aware configuration.\n\n### Shell Environment Sanitization\n\n`host_shell_exec` calls `sanitize_shell_env` on every `Command`:\n\n- `env_clear()` removes the entire parent environment.\n- Only a hardcoded allowlist is restored: `PATH`, `HOME`, `TMPDIR`, `TMP`, `TEMP`, `LANG`, `LC_ALL`, `TERM`.\n- On Windows, additional safe vars are restored (`USERPROFILE`, `SYSTEMROOT`, etc.).\n\nThis prevents exfiltration of LLM provider API keys, vault tokens, and cloud metadata credentials through the child process environment. Commands are executed directly via `Command::new` (no shell), so shell injection is not possible.\n\n### Memory Safety\n\nAll pointer arithmetic in the sandbox uses `checked_add` to prevent wraparound on 32-bit hosts. Guest memory accesses are bounds-checked against the actual WASM linear memory size before any read or write.\n\n### Capability Inheritance\n\n`host_agent_spawn` calls `kernel.spawn_agent_checked` with the parent's capabilities. The kernel enforces that the child's capabilities are a subset of the parent's — a spawned agent cannot escalate privileges.\n\n## Integration Points\n\n| Dependency | Usage |\n|-----------|-------|\n| `librefang_types` | `Capability` enum, `capability_matches` function. |\n| `librefang_kernel_handle` | `KernelHandle` trait for `memory_recall`, `memory_store`, `send_to_agent`, `spawn_agent_checked`. |\n| `librefang_http` | `proxied_client_builder` for SSRF-safe, proxy-aware HTTP requests. |\n\n## Testing\n\nThe test suite covers:\n\n- **Capability gating** — every host function rejects calls without matching capabilities (`test_fs_read_denied_no_capability`, `test_shell_exec_denied`, `test_env_read_denied`, etc.).\n- **Capability granting** — wildcard capabilities allow access (`test_fs_read_granted_wildcard`, `test_env_read_granted`).\n- **Shell environment stripping** — stamps a fake secret into the parent env, runs `/usr/bin/env` via `shell_exec`, verifies the child output doesn't contain it but does contain `PATH` (`test_shell_exec_strips_parent_env_secrets`, Unix only).\n- **SSRF blocking** — private IPs, loopback, metadata endpoints, blocked schemes (`test_ssrf_private_ips_blocked`, `test_ssrf_scheme_validation`).\n- **SSRF IPv6 bypass** — `::ffff:10.0.0.1` and similar are correctly classified as private (`test_is_private_ip_recognises_ipv4_mapped_v6`).\n- **Path traversal** — `..` components rejected in both `safe_resolve_path` and `safe_resolve_parent` (`test_safe_resolve_path_traversal`).\n- **Fuel exhaustion** — infinite loop module traps with `FuelExhausted` at low fuel limit (`test_fuel_exhaustion`).\n- **Echo module** — basic round-trip: input JSON comes back unchanged (`test_echo_module`).\n- **Host call proxy** — `time_now` works through the full sandbox round-trip, unknown methods return errors, capability-denied operations return errors (`test_host_call_time_now`, `test_host_call_unknown_method`, `test_host_call_capability_denied`).\n\nTest WAT modules (`ECHO_WAT`, `INFINITE_LOOP_WAT`, `HOST_CALL_PROXY_WAT`) are defined inline in `sandbox.rs` and don't require external WASM files.","agent-runtime":"# Agent Runtime\n\n# Agent Runtime\n\nThe execution layer that turns user messages into intelligent, tooled responses. It orchestrates the core agent loop, LLM drivers, tool execution, external service integrations, and plugin sandboxing.\n\n## Sub-Modules\n\n| Module | Purpose |\n|--------|---------|\n| [**Core Runtime**](librefang-runtime-src.md) | Agent loop, LLM driver orchestration, memory recall, prompt assembly, tool execution pipeline, and 30+ supporting subsystems |\n| [**MCP Client**](librefang-runtime-mcp-src.md) | Connects to external MCP servers, discovers their tools, and dispatches namespaced tool calls (`mcp_{server}_{tool}`) |\n| [**OAuth**](librefang-runtime-oauth-src.md) | Browser-based and device-flow OAuth 2.0 for ChatGPT (OpenAI) and GitHub Copilot authentication |\n| [**WASM Sandbox**](librefang-runtime-wasm-src.md) | Wasmtime-based sandbox for executing untrusted skills and plugins with deny-by-default capabilities |\n\n## How They Fit Together\n\n```mermaid\ngraph LR\n    subgraph \"Core Runtime\"\n        AL[agent_loop] --> LLM[LLM Driver]\n        LLM --> TR[tool_runner]\n        TR --> BT[Built-in Tools]\n    end\n\n    subgraph \"MCP Client\"\n        TR -->|namespaced dispatch| MC[McpConnection]\n        MC --> EXT[External MCP Servers]\n    end\n\n    subgraph \"OAuth\"\n        EXT -->|401 challenge| OA[mcp_oauth]\n        OA --> CHAT[ChatGPT Auth]\n        OA --> COPILOT[Copilot Auth]\n    end\n\n    subgraph \"WASM Sandbox\"\n        PM[plugin_manager] --> WS[WasmSandbox]\n        WS --> CAP{capability check}\n        CAP -->|fs, net, kv| HOST[Host Functions]\n    end\n\n    AL --> PM\n```\n\n**Tool dispatch** is the primary integration point. The core runtime's `tool_runner` sends built-in tools directly to their handlers, while MCP-discovered tools route through `McpConnection`, which supports Stdio, HTTP, and SSE transports. When an MCP server returns a 401, the MCP client delegates to its OAuth subsystem to discover metadata, acquire tokens, and retry.\n\n**Authentication flows** are shared. The standalone OAuth module handles the user-facing ChatGPT and Copilot login flows (browser redirect and device-code polling), while the MCP module's embedded OAuth handles machine-to-machine authentication against protected MCP servers.\n\n**Plugin execution** flows from the core runtime's `plugin_manager` into the WASM sandbox. Skills are loaded, versioned, and dispatched as compiled Wasmtime modules. The sandbox gates all host interactions—filesystem reads, network fetches, KV store access—through explicit capability checks, keeping untrusted code isolated from the host.\n\n## Key Cross-Module Workflows\n\n1. **Tooled response cycle** — `agent_loop` → memory recall → prompt assembly → LLM → `tool_runner` → built-in tool or MCP dispatch → result feeds back into the loop\n2. **Authenticated MCP call** — `tool_runner` resolves the MCP server → `McpConnection.call_tool` → if 401, `mcp_oauth` runs PKCE flow → retries with token\n3. **Skill sandboxing** — `plugin_manager` parses and versions the plugin → `WasmSandbox.execute` compiles and instantiates it → host functions gate filesystem, network, and KV access behind capability checks","channel-adapters":"# Channel Adapters\n\n# Channel Adapters (`librefang-channels`)\n\n## Purpose\n\nThe channel adapters module is the messaging bridge layer for the LibreFang Agent OS. It translates messages from 40+ external platforms (Telegram, Discord, Slack, WhatsApp, Teams, Matrix, IRC, email, and many more) into a unified `ChannelMessage` format and dispatches them to agents through the kernel. Responses flow back through the same adapter, formatted for the target platform.\n\nChannels are compiled only when needed — each is gated behind a `channel-xxx` Cargo feature flag.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph External Platforms\n        T[Telegram]\n        D[Discord]\n        S[Slack]\n        W[WhatsApp]\n        O[...40+ more]\n    end\n\n    subgraph librefang-channels\n        A[ChannelAdapter trait] --> BM[BridgeManager]\n        BM --> RL[Rate Limiter]\n        BM --> SA[Input Sanitizer]\n        BM --> RT[AgentRouter]\n        BM --> J[Message Journal]\n        BM --> DSP[Dispatch Pipeline]\n    end\n\n    subgraph Kernel\n        CBH[ChannelBridgeHandle] --> AGT[Agent Loop]\n    end\n\n    T --> A\n    D --> A\n    S --> A\n    W --> A\n    O --> A\n    DSP -->|send_message_with_sender| CBH\n    AGT -->|response| DSP\n```\n\n## Feature Flags\n\nEvery channel adapter is opt-in. Two meta-features control broad enablement:\n\n- **`default`** — enables popular channels (Telegram, Discord, Slack, etc.)\n- **`all-channels`** — enables all 40+ adapters\n\nIndividual flags follow the pattern `channel-<name>`:\n\n```\nchannel-telegram    channel-discord     channel-slack\nchannel-whatsapp    channel-signal      channel-matrix\nchannel-teams       channel-email       channel-mattermost\nchannel-irc         channel-xmpp        channel-wechat\nchannel-wechat      channel-reddit      channel-mastodon\nchannel-bluesky     channel-line        channel-zulip\n# ... and many more\n```\n\nCore infrastructure (`bridge`, `router`, `types`, `formatter`, `sanitizer`, `rate_limiter`, `message_journal`, `sidecar`) is always compiled.\n\n## Core Components\n\n### `ChannelBridgeHandle` (trait)\n\nDefined in `bridge.rs` and implemented by `librefang-api` on the kernel. This trait breaks the circular dependency — the channels crate cannot depend on the kernel directly, so it defines the interface the kernel must satisfy.\n\nKey methods:\n\n| Method | Purpose |\n|---|---|\n| `send_message` | Send text to an agent, get text response |\n| `send_message_with_sender` | Send with `SenderContext` (channel identity, group info) |\n| `send_message_with_blocks` | Send multimodal content (text + images) |\n| `send_message_streaming_with_sender` | Stream text deltas for progressive display |\n| `send_message_ephemeral` | `/btw` — no session history loaded or saved |\n| `find_agent_by_name` | Resolve agent name to `AgentId` |\n| `list_agents` | List running agents as `(id, name)` pairs |\n| `spawn_agent_by_name` | Create an agent from a manifest |\n| `authorize_channel_user` | RBAC check — returns `Err(reason)` if denied |\n| `channel_overrides` | Per-channel configuration overrides |\n| `classify_reply_intent` | LLM-based \"should we reply?\" for group messages |\n| `check_auto_reply` | Auto-reply engine hook |\n| `record_delivery` | Track delivery success/failure |\n| `resolve_approval_text` | Approve/reject with optional TOTP |\n| `subscribe_events` | Broadcast receiver for kernel events (approvals, etc.) |\n| `send_channel_push` | Proactive outbound message from REST API |\n\nMost methods have default implementations that return \"not available\" responses, so the kernel only needs to implement the methods it supports.\n\n### `BridgeManager`\n\nOwns all running channel adapters and orchestrates message dispatch. Created via:\n\n```rust\nlet mut manager = BridgeManager::new(kernel_handle, router);\n// Optional: configure sanitizer, journal\nmanager = manager.with_journal(journal);\n```\n\nKey methods:\n\n- **`start_adapter(adapter)`** — subscribes to the adapter's message stream and spawns a dispatch loop. If the adapter provides webhook routes via `create_webhook_routes()`, those are collected for mounting on the shared API server instead of running a standalone HTTP server per adapter.\n- **`start_approval_listener(adapters)`** — subscribes to kernel `ApprovalRequested` events and forwards approval notifications to all adapters.\n- **`push_message(channel, recipient, text, thread_id)`** — entry point for the REST API push endpoint (`POST /api/agents/:id/push`).\n- **`take_webhook_router()`** — returns a merged `axum::Router` of all adapter webhook routes, nested under `/{adapter_name}`. Mount under `/channels` without auth middleware (adapters handle their own signature verification).\n- **`stop()`** — signals shutdown, stops adapters, awaits tasks.\n- **`recover_pending()`** — reclaims messages that were in-flight during a crash.\n\n### `ChannelAdapter` (trait, in `types.rs`)\n\nThe interface each platform adapter implements. Every adapter must provide:\n\n- **`name()`** / **`channel_type()`** — identifiers\n- **`start()`** — start the platform connection, return a message stream\n- **`stop()`** — shut down connections\n- **`send(user, content)`** — deliver a response to a user\n- **`send_in_thread(user, content, thread_id)`** — reply within a specific thread/topic\n- **`send_typing(user)`** / **`send_reaction(user, msg_id, reaction)`** — UX indicators\n- **`supports_streaming()`** / **`send_streaming(user, rx, thread_id)`** — progressive token output\n- **`create_webhook_routes()`** — optional; return `(axum::Router, message_stream)` to share the main API server's HTTP port\n- **`typing_events()`** — optional channel of `TypingEvent` for debounce control\n- **`suppress_error_responses()`** — if `true`, agent errors are logged but not sent to the user\n\n### `ChannelMessage` and `ChannelContent`\n\nThe unified message envelope. Every adapter converts its platform-specific payload into:\n\n```rust\nChannelMessage {\n    channel: ChannelType,       // Telegram, Discord, Slack, Custom(\"...\"), etc.\n    sender: ChannelUser,        // platform_id, display_name, is_bot, librefang_user\n    content: ChannelContent,    // Text, Command, Image, File, Voice, Video, ...\n    is_group: bool,\n    thread_id: Option<String>,\n    metadata: HashMap<String, Value>,  // adapter-specific: was_mentioned, guild_id, ...\n    platform_message_id: String,\n    timestamp: DateTime<Utc>,\n}\n```\n\n`ChannelContent` variants cover the full range of media types: `Text`, `Command`, `Image`, `File`, `FileData`, `Voice`, `Video`, `Audio`, `Animation`, `Sticker`, `Location`, `MediaGroup`, `Poll`, `PollAnswer`, `Interactive`, `ButtonCallback`, `EditInteractive`, `DeleteMessage`.\n\n### `AgentRouter`\n\nMaps `(channel_type, platform_user_id)` pairs to `AgentId`. Supports:\n\n- Per-channel defaults\n- Per-user bindings (via `/agent <name>` command)\n- Account/guild-aware routing via `BindingContext`\n- Thread-based routing (metadata key `thread_route_agent`)\n- Broadcast routing (one user → multiple agents, parallel or sequential)\n- Fallback chain: thread route → binding context → user default → channel default → \"assistant\" → first available agent\n\nWhen no agent is found and a fallback is auto-selected, the router stores it as the user's default for future messages.\n\n### `SenderContext`\n\nPropagation struct that carries channel identity to the agent's system prompt:\n\n```rust\nSenderContext {\n    channel: String,           // \"telegram\", \"discord\", ...\n    user_id: String,           // resolved sender identity (metadata or platform_id)\n    chat_id: Option<String>,   // platform_id\n    display_name: String,\n    is_group: bool,\n    was_mentioned: bool,\n    thread_id: Option<String>,\n    account_id: Option<String>,\n    auto_route: AutoRouteStrategy,\n    group_participants: Vec<ParticipantRef>,  // for addressee guard\n}\n```\n\nBuilt by `build_sender_context()` from the incoming message and channel overrides.\n\n## Message Processing Pipeline\n\nEvery incoming `ChannelMessage` passes through this dispatch flow in `dispatch_message()`:\n\n1. **Input sanitization** — `InputSanitizer` checks text, image captions, voice captions, and video captions for prompt injection patterns. Three outcomes: `Clean` (pass), `Warned` (log + pass), `Blocked` (reject with generic message).\n\n2. **Channel overrides** — fetched via `channel_overrides()`. Controls output format, threading, DM/group policy, rate limits, debounce timing, command allowlists.\n\n3. **Group policy gate** — `should_process_group_message()` applies one of four policies:\n   - `Ignore` — drop all group messages\n   - `CommandsOnly` — process only slash commands\n   - `MentionOnly` — require mention, command, or trigger pattern match\n   - `All` — process everything (optionally filtered by `reply_precheck` LLM call)\n\n4. **Rate limiting** — per-channel global limit and per-user limit, both configurable via overrides.\n\n5. **Command handling** — slash commands (`/agent`, `/status`, `/models`, `/help`, `/approve`, etc.) are intercepted and dispatched to `handle_command()`. Blocked commands fall through to the agent as plain text. `/agents` and `/models` produce interactive inline keyboards when the adapter supports them.\n\n6. **Media processing** — images are downloaded, magic-byte-detected (JPEG/PNG/GIF/WebP), and sent as `ContentBlock::Image` for vision-capable models. Other media types are converted to descriptive text.\n\n7. **Button callback handling** — `ButtonCallback` messages with `prov:`, `model:`, or `back:providers` actions are handled as interactive menu navigation (model selection flow) without touching the agent.\n\n8. **Broadcast routing** — if the user has broadcast targets, the message is fanned out to all target agents (parallel or sequential per `BroadcastStrategy`).\n\n9. **Agent resolution** — `resolve_or_fallback()` tries thread route → binding context → user default → channel default → fallback agent.\n\n10. **RBAC** — `authorize_channel_user()` gates access before the agent is called.\n\n11. **Auto-reply** — `check_auto_reply()` can intercept and respond without an agent call.\n\n12. **Journal recording** — if a `MessageJournal` is configured, the message is recorded as `Processing` before dispatch.\n\n13. **Typing indicator + lifecycle reactions** — the adapter sends a typing indicator and emoji reactions: ⏳ Queued → 🤔 Thinking → 📡 Streaming → ✅ Done / ❌ Error.\n\n14. **Agent dispatch** — either streaming (`send_message_streaming_with_sender`) or standard (`send_message_with_sender`). On streaming failure, falls back to the buffered text via `send_response()`. On \"Agent not found\" errors, attempts re-resolution by name.\n\n15. **Delivery tracking** — `record_delivery()` logs success or failure for each dispatch.\n\n## Message Debouncing\n\nWhen `message_debounce_ms` is set in channel overrides, the `MessageDebouncer` buffers rapid messages from the same sender:\n\n- Each unique sender (`channel:platform_id`) gets a buffer\n- After the first message arrives, a timer starts (`debounce_ms`)\n- New messages extend the buffer and reset the timer\n- Typing events from the adapter pause the timer (user is still composing)\n- A hard maximum (`debounce_max_ms`, default 30s) forces a flush regardless\n- Buffer size limit (`debounce_max_buffer`, default 64) also forces a flush\n- On flush, messages are merged: same-type commands concatenate args; mixed types concatenate as text; images are collected as `ContentBlock`s\n\nThis prevents a burst of messages from creating multiple competing agent sessions.\n\n## Group Message Gating\n\nThe addressee guard prevents false triggers in group chats where the bot's name appears mid-sentence but isn't being addressed:\n\n- **Positional vocative detection** (`is_vocative_trigger`) — a trigger pattern only matches at the start of a turn or after a sentence boundary (`[.!?]`), and is rejected if another capitalized vocative precedes it\n- **Cross-participant detection** (`is_addressed_to_other_participant`) — if the turn opens with a vocative matching a group roster member who isn't the bot, the message is skipped\n- Enabled via environment variable `LIBREFANG_GROUP_ADDRESSEE_GUARD=on` (shipped default-off for observation)\n\n## Streaming Support\n\nAdapters that implement `supports_streaming() -> true` and `send_streaming()` receive an `mpsc::Receiver<String>` of incremental text deltas. The bridge:\n\n1. Calls `send_message_streaming_with_sender()` on the kernel handle\n2. Tees the delta stream: forwards to the adapter while buffering a copy\n3. If the adapter's `send_streaming()` fails, falls back to sending the buffered text via the standard `send()` path\n\nAdapters without streaming support use the standard request-response path.\n\n## Crash Recovery\n\nWhen a `MessageJournal` is attached via `with_journal()`:\n\n- Every dispatched message is recorded as `Processing` before the agent call\n- On success, status is updated to `Completed`\n- On failure, status is updated to `Failed` with the error\n- On restart, `recover_pending()` returns entries that were interrupted\n- `compact_journal()` flushes and compacts the journal on shutdown\n\n## Interactive Model Selection Flow\n\nThe `/models` command triggers a multi-step interactive flow:\n\n1. `/models` → inline keyboard listing providers\n2. `prov:<id>` callback → inline keyboard listing that provider's models + \"Back\" button\n3. `model:<id>` callback → confirmation message \"✅ Active model: <name>\"\n4. `back:providers` → back to provider list\n\nAll of this is handled within the bridge layer without agent involvement.\n\n## Adding a New Channel Adapter\n\n1. Create a new module file (e.g. `src/myservice.rs`)\n2. Implement `ChannelAdapter` for your adapter struct\n3. Gate it with `#[cfg(feature = \"channel-myservice\")]` in `src/lib.rs`\n4. Add the feature flag to `Cargo.toml`\n5. Prefer `create_webhook_routes()` over `start()` to share the API server's HTTP port\n6. Convert platform payloads into `ChannelMessage` with the correct `ChannelType`\n7. Populate `metadata` with platform-specific fields (e.g. `was_mentioned`, `guild_id`, `account_id`)\n\nKey integration points:\n\n- For **mention detection**, set `metadata[\"was_mentioned\"] = true`\n- For **group participant rosters**, set `metadata[\"group_participants\"]` as a JSON array of `{display_name, ...}` objects\n- For **thread routing**, set `metadata[\"thread_route_agent\"]` to an agent name\n- For **RBAC identity**, set `metadata[\"sender_user_id\"]` to the user's canonical ID (falls back to `platform_id`)\n- For **multi-account** channels, set `metadata[\"account_id\"]`","cli-terminal-ui":"# CLI & Terminal UI\n\n# CLI & Terminal UI Module\n\n## Overview\n\n`librefang-cli` is the command-line interface for LibreFang Agent OS. It provides ~60 subcommands organized into a tree of domain groups (agents, skills, channels, models, etc.) and two full-screen interactive interfaces: a ratatui TUI dashboard and a multi-step init wizard.\n\nThe CLI operates in one of two modes depending on whether a daemon is already running:\n\n- **Daemon mode** — the CLI acts as a thin HTTP client, forwarding requests to `librefang start` over localhost. This is the normal runtime path.\n- **Single-shot mode** — when no daemon is available, the CLI boots an in-process `LibreFangKernel`, executes the command, and exits. Used by `start --foreground` and certain internal flows.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[main] --> B{Command?}\n    B -->|None + TTY| C[launcher picker]\n    B -->|TUI / Chat| D[ratatui TUI]\n    B -->|start / gateway| E[Daemon lifecycle]\n    B -->|init / onboard| F[Init wizard]\n    B -->|mcp| G[MCP stdio server]\n    B -->|all others| H[Daemon HTTP client]\n\n    E -->|background| I[spawn_detached_daemon]\n    E -->|foreground| J[in-process kernel]\n    H --> K[find_daemon]\n    K --> L[daemon_client → HTTP]\n    F --> M[detect_best_provider]\n    M --> N[13+ providers + Ollama]\n```\n\n## Entry Point & Dispatch\n\n`main()` in `src/main.rs` performs this bootstrap sequence:\n\n1. **TLS initialization** — installs the `aws_lc_rs` crypto provider for rustls (must happen before any async/TLS).\n2. **Environment loading** — `dotenv::load_dotenv()` reads `~/.librefang/.env` into the process environment. Then `load_vault()` decrypts `vault.enc` via the system keyring.\n3. **i18n** — reads the `language` key from `config.toml` and initializes the translation catalog (`i18n::init`).\n4. **Argument parsing** — `Cli::parse()` via clap. The full command tree is defined as nested `enum` variants under `Commands`.\n5. **Tracing setup** — TUI/chat modes route logs to `~/.librefang/tui.log` (stderr would corrupt ratatui's raw-mode output). All other commands trace to stderr and a `daemon.log` file.\n6. **Ctrl+C handler** — skipped for TUI modes (ratatui needs to restore the terminal). On Windows, a custom `SetConsoleCtrlHandler` force-exits on interrupt because the default handler doesn't reliably break `read_line`.\n\nThe match on `cli.command` dispatches to individual `cmd_*` functions. When `None` and stdout is a TTY, the interactive launcher picker is shown.\n\n## Command Tree\n\nThe clap `Commands` enum defines the top-level subcommands. Groups with subcommands are marked with `[*]` in the help text:\n\n| Top-level command | Subcommand group | Purpose |\n|---|---|---|\n| `init` | — | Create `~/.librefang/` and default config |\n| `start` / `stop` / `restart` | — | Daemon lifecycle |\n| `chat` | — | Quick interactive chat with default agent |\n| `tui` | — | Full-screen terminal dashboard |\n| `spawn` | — | Agent spawn alias (template or manifest) |\n| `agent` | `new`, `spawn`, `list`, `chat`, `kill`, `set` | Agent management |\n| `skill` | `install`, `list`, `remove`, `search`, `test`, `publish`, `create`, `evolve` | Skill lifecycle |\n| `channel` | `list`, `setup`, `test`, `enable`, `disable` | Messaging integrations |\n| `hand` | `list`, `active`, `activate`, `deactivate`, `info`, `check-deps`, `install-deps`, `pause`, `resume`, `settings`, `set`, `reload`, `chat` | Autonomous execution modules |\n| `models` | `list`, `aliases`, `providers`, `set` | LLM model browser |\n| `config` | `show`, `edit`, `get`, `set`, `unset`, `set-key`, `delete-key`, `test-key` | Configuration management |\n| `mcp` | `list`, `catalog`, `add`, `remove` (or bare stdio server) | Model Context Protocol |\n| `vault` | `init`, `set`, `list`, `remove` | Encrypted credential storage |\n| `workflow` | `list`, `create`, `run` | Multi-step agent chains |\n| `trigger` | `list`, `create`, `delete` | Event-driven agent invocation |\n| `cron` | `list`, `create`, `delete`, `enable`, `disable` | Scheduled jobs |\n| `gateway` | `start`, `stop`, `restart`, `status` | Low-level daemon control |\n| `approvals` | `list`, `approve`, `reject` | Human-in-the-loop review |\n| `security` | `status`, `audit`, `verify` | Audit trail and integrity |\n| `memory` | `list`, `get`, `set`, `delete` | Agent KV store |\n| `devices` | `list`, `pair`, `remove` | Device pairing |\n| `webhooks` | `list`, `create`, `delete`, `test` | HTTP callback triggers |\n| `service` | `install`, `uninstall`, `status` | Boot-time auto-start |\n\nUtility commands: `status`, `health`, `doctor`, `dashboard`, `logs`, `sessions`, `message`, `update`, `migrate`, `auth`, `completion`, `new`, `qr`, `hash-password`, `system`, `reset`, `uninstall`.\n\nMany top-level commands are convenience aliases (`agents` → `agent list`, `kill` → `agent kill`, `spawn` → `agent spawn` with template resolution).\n\n## Daemon Communication\n\n### Discovery\n\n`find_daemon()` reads `~/.librefang/daemon.json` via `read_daemon_info()` to get the listen address, then probes `http://{addr}/api/health` with a 2-second timeout. The address normalization replaces `0.0.0.0` with `127.0.0.1` to avoid macOS DNS hangs.\n\n### HTTP Client\n\n`daemon_client()` builds a `reqwest::blocking::Client` with:\n- 120-second timeout\n- `Authorization: Bearer {api_key}` header when `api_key` is set in config\n- TLS via rustls (not native-tls)\n\nAll daemon calls go through `daemon_json()` which provides unified error handling — mapping connection refused, timeout, and server errors to localized error messages with suggested fixes via `ui::error_with_fix`.\n\n### Authentication\n\nThe `api_key` field in `config.toml` gates daemon access. `read_api_key()` loads it, and `daemon_client_with_api_key()` injects it as a Bearer token. When empty, no auth header is sent.\n\n## Initialization Flows\n\n`cmd_init` has three paths:\n\n### Quick mode (`--quick` or non-TTY)\n1. Create `~/.librefang/` and `data/` subdirectory\n2. Run `sync_registry` to download provider/integration/assistant definitions\n3. Initialize vault (`vault.enc`) and git repo\n4. Call `detect_best_provider()` to find an API key\n5. Write `config.toml` from the `INIT_DEFAULT_CONFIG_TEMPLATE` with detected provider/model\n6. Print next steps\n\n### Interactive wizard (TTY, no existing config)\nDelegates to `tui::screens::init_wizard::run()` — a ratatui multi-screen flow:\n1. Welcome screen\n2. Provider selection\n3. API key entry\n4. Default model selection\n5. Launch choice (desktop app, dashboard, or chat)\n\nOn completion, the wizard may auto-start the daemon and launch the user's chosen interface.\n\n### Upgrade mode (`--upgrade` or existing config detected)\n1. Backup `config.toml` with timestamp (`config.toml.bak.YYYYMMDD-HHMMSS`)\n2. Force-sync registry (TTL=0)\n3. Merge new default fields into the existing config without overwriting user values — `find_missing_toplevel_keys` appends only missing top-level keys, preserving comments and formatting by inserting scalars before the first `[table]` header and tables at the end\n4. Warn about legacy `require_approval` configurations missing `file_write`/`file_delete`\n5. Detect legacy `~/.openclaw` installations\n\n### Provider Detection\n\n`detect_best_provider()` probes in order:\n1. **Cloud providers** — `librefang_runtime::drivers::detect_available_provider()` checks 13+ env vars (OpenAI, Anthropic, Gemini, Groq, DeepSeek, OpenRouter, Mistral, Together, Fireworks, xAI, Perplexity, Cohere, Azure OpenAI, plus `GOOGLE_API_KEY`)\n2. **Local Ollama** — TCP connect to `127.0.0.1:11434` with 500ms timeout\n3. **Interactive guide** — launches a TUI screen to pick a free provider and enter a key\n4. **Fallback** — defaults to Groq with printed hints\n\n## Daemon Lifecycle\n\n### `cmd_start`\n\n```mermaid\ngraph LR\n    A[cmd_start] --> B{--spawned?}\n    B -->|yes| C[Run kernel in-process]\n    B -->|no| D{--foreground?}\n    D -->|yes| C\n    D -->|no| E[spawn_detached_daemon]\n    E --> F{--tail?}\n    F -->|yes| G[stream daemon.log]\n    F -->|no| H[print PID + exit]\n```\n\nBackground daemon spawning (`spawn_detached_daemon`):\n- Re-executes the current binary with `start --spawned`\n- Redirects stdout/stderr to `daemon.log`\n- On Unix: calls `setsid()` via `pre_exec` to detach from the controlling terminal\n- On Windows: uses `DETACHED_PROCESS | CREATE_NEW_PROCESS_GROUP | CREATE_NO_WINDOW` creation flags\n- Writes `daemon.json` with PID and listen address for later discovery\n\n### `cmd_stop`\n\nSends `POST /api/shutdown` to the daemon. If the daemon is unresponsive, falls back to `force_kill_pid()` using the PID from `daemon.json`.\n\n## Terminal UI (TUI)\n\nThe `tui` module provides full-screen ratatui interfaces:\n\n- **Dashboard** (`tui::run`) — multi-tab interface with agent list, logs, status\n- **Init wizard** (`tui::screens::init_wizard`) — 5-step onboarding\n- **Free provider guide** (`tui::screens::free_provider_guide`) — helps pick a free LLM provider\n- **Chat** — used by `cmd_quick_chat` and `cmd_agent_chat`\n\n### Event architecture\n\nThe TUI uses a dedicated event thread (`spawn_event_thread`) that polls the daemon API and sends results back to the main thread via a channel. Key events trigger tab-specific refresh functions like `refresh_agents` → `load_daemon_agents` and `refresh_dashboard` → `spawn_fetch_dashboard`.\n\n## MCP Server\n\n`mcp::run_mcp_server` implements the Model Context Protocol over stdio, allowing MCP-compatible clients (Claude Code, Cursor) to communicate with LibreFang:\n\n1. Reads JSON-RPC messages from stdin line by line\n2. Dispatches via `handle_message` to create a backend (`create_backend`) that wraps the kernel\n3. Writes JSON-RPC responses to stdout via `write_message`\n\nThe MCP subcommands (`list`, `catalog`, `add`, `remove`) manage `[[mcp_servers]]` entries in `config.toml` and support hot-reload when the daemon is running.\n\n## Supporting Modules\n\n| Module | Purpose |\n|---|---|\n| `ui` | Colored output helpers: `banner`, `success`, `error`, `hint`, `kv`, `section`, `next_steps`, `error_with_fix`, `check_ok` |\n| `progress` | Terminal progress bars with OSC 52 support |\n| `table` | Pretty-printed table formatter used across CLI output |\n| `templates` | Agent template discovery (`load_all_templates`, `discover_template_dirs`) |\n| `i18n` | Translation catalog loaded from config; keyed by message ID with `t()` and `t_args()` |\n| `http_client` | Shared `reqwest::Client` builder with TLS configuration |\n| `desktop_install` | Locate/download/launch the Tauri desktop app |\n| `launcher` | Initial picker shown when `librefang` is run with no arguments on a TTY |\n\n## Platform Considerations\n\n### Ctrl+C Handling\n\n- **Windows**: Custom `SetConsoleCtrlHandler` because the default handler doesn't interrupt blocking `read_line`. First press prints \"Interrupted\" and exits cleanly; second press hard-exits with code 130.\n- **Unix**: The default SIGINT handler already interrupts `read_line`; no custom handler needed.\n\n### File Permissions\n\nOn Unix, `restrict_file_permissions` sets `0600` and `restrict_dir_permissions` sets `0700` on sensitive files (config, vault, backups, daemon log directory). These are no-ops on non-Unix platforms.\n\n### Path Conventions\n\n- Home directory: `LIBREFANG_HOME` env var overrides `~/.librefang/`\n- Config: `~/.librefang/config.toml`\n- Secrets: `~/.librefang/.env` and `~/.librefang/vault.enc`\n- Daemon info: `~/.librefang/daemon.json`\n- Logs: `~/.librefang/logs/daemon.log` (customizable via `log_dir` in config)\n- TUI logs: `~/.librefang/tui.log`","core-types-configuration":"# Core Types & Configuration\n\n# Core Types & Configuration (`librefang-types`)\n\n## Purpose\n\n`librefang-types` is the shared type definitions crate for the LibreFang Agent Operating System. It contains **no business logic** — only data structures, serialization helpers, and validation methods that every other crate in the workspace depends on. If a struct or enum appears in more than one crate, it lives here.\n\n```mermaid\ngraph TD\n    subgraph \"Consumers of librefang-types\"\n        KERNEL[librefang-kernel]\n        RUNTIME[librefang-runtime]\n        API[librefang-api]\n        MEMORY[librefang-memory]\n        CHANNELS[librefang-channels]\n        CLI[librefang-cli]\n        SKILLS[librefang-skills]\n    end\n\n    TYPES[librefang-types<br/>24 modules, 0 business logic]\n\n    TYPES --> KERNEL\n    TYPES --> RUNTIME\n    TYPES --> API\n    TYPES --> MEMORY\n    TYPES --> CHANNELS\n    TYPES --> CLI\n    TYPES --> SKILLS\n```\n\n## Module Layout\n\n| Module | Responsibility |\n|--------|---------------|\n| `agent` | Agent identity, manifests, lifecycle state, scheduling, resource quotas, model config, experiments |\n| `approval` | Execution approval workflow — requests, decisions, policies, TOTP, channel rules |\n| `capability` | Capability matching and glob pattern logic |\n| `comms` | Inter-agent communication types |\n| `config` | Global configuration structures (`ThinkingConfig`, `ResponseFormat`, `ExecPolicy`, `ContextInjection`) |\n| `error` | Unified `LibreFangError` enum |\n| `event` | Event types for the agent event loop |\n| `goal` | Goal tracking types |\n| `i18n` | Internationalization message lookup |\n| `manifest_signing` | Cryptographic manifest signing and verification |\n| `media` | Media/attachment types |\n| `memory` | Memory substrate types (scopes, extraction, embeddings) |\n| `message` | LLM message types (`TokenUsage`, content blocks) |\n| `model_catalog` | Model capability registry |\n| `registry_schema` | Agent registry serialization schema |\n| `scheduler` | Job scheduling types (cron, intervals, delivery) |\n| `serde_compat` | Lenient deserialization helpers (fallback on malformed input) |\n| `subagent` | Subagent spawning and context types |\n| `taint` | PII detection and taint tracking for tool I/O |\n| `tool` | Tool definitions, decision traces, schema normalization |\n| `tool_compat` | Cross-platform tool name mapping (OpenClaw compatibility) |\n| `tool_policy` | Tool execution policy rules |\n| `webhook` | Outbound webhook configuration |\n| `workflow_template` | Reusable workflow definitions |\n\nThe compile-time version constant is exported at the crate root:\n\n```rust\npub const VERSION: &str = env!(\"CARGO_PKG_VERSION\");\n```\n\n---\n\n## Agent Identity & Deterministic IDs\n\nThe crate provides three core identity types, each wrapping a `Uuid`:\n\n### `AgentId`\n\n```rust\nlet random = AgentId::new();                    // UUID v4\nlet named  = AgentId::from_name(\"brand-guardian\"); // UUID v5, deterministic\nlet hand   = AgentId::from_hand_id(\"browser\");     // UUID v5, deterministic\n```\n\nDeterministic IDs use UUID v5 (SHA-1) with a fixed namespace so that the **same logical name always produces the same ID across daemon restarts**. This preserves session history, cron job associations, and memory key ownership.\n\nFor multi-agent hands (where a single hand definition spawns multiple role-specific agents), use `from_hand_agent`:\n\n```rust\n// Legacy single-instance: \"hand_id:role\"\nlet legacy = AgentId::from_hand_agent(\"researcher\", \"lead\", None);\n\n// Multi-instance: \"hand_id:role:instance_id\"\nlet instance = AgentId::from_hand_agent(\"researcher\", \"lead\", Some(instance_uuid));\n```\n\nThe internal namespace uses typed prefixes (`agent:`, `hand:`) to prevent collisions between agents and hands that share the same name.\n\n### `SessionId`\n\n```rust\nlet random = SessionId::new();\nlet channel = SessionId::for_channel(agent_id, \"telegram\");\n```\n\n`SessionId::for_channel` derives a deterministic UUID v5 from the `(agent_id, channel)` pair. The channel name is lowercased before hashing, so `\"Telegram\"` and `\"telegram\"` resolve to the same session. Each channel gets its own session per agent, and cron/trigger sessions are distinct from channel sessions.\n\n### `UserId`\n\nSimple UUID v4 wrapper with standard `Display`/`FromStr` implementations.\n\n---\n\n## Agent Manifest (`AgentManifest`)\n\nThe `AgentManifest` is the central configuration structure for every agent. It's typically loaded from TOML files and deserialized with lenient defaults so that agents only need to specify the fields they care about.\n\n### Key Sections\n\n**Model configuration** — `ModelConfig` specifies the LLM provider, model identifier, temperature, max tokens, and system prompt. The `model` field accepts a `name` alias for TOML backward compatibility. Provider-specific extension parameters (e.g., Qwen's `enable_memory`) go in `extra_params`, which is flattened into the API request body via `#[serde(flatten)]`.\n\n**Fallback chain** — `fallback_models: Vec<FallbackModel>` defines an ordered list of alternative providers/models to try if the primary fails.\n\n**Tool configuration** — Controlled by three layers:\n1. `profile: Option<ToolProfile>` — Named presets (`Minimal`, `Coding`, `Research`, `Messaging`, `Automation`, `Full`) that expand to tool lists and derived capabilities.\n2. `tool_allowlist` / `tool_blocklist` — Fine-grained per-tool filtering.\n3. `tools_disabled: bool` — Emergency kill switch.\n\n**Resource quotas** — `ResourceQuota` enforces memory, CPU time, tool call rate, token consumption, and cost limits (hourly/daily/monthly). Token limits follow a convention: `None` inherits the global default, `Some(0)` means unlimited, and `Some(n)` enforces `n` tokens per hour. Use `effective_token_limit()` to resolve this to a plain `u64`.\n\n**Scheduling** — `ScheduleMode` controls when an agent wakes up:\n- `Reactive` — on message/event arrival (default)\n- `Periodic { cron }` — cron schedule\n- `Proactive { conditions }` — condition monitoring\n- `Continuous { check_interval_secs }` — persistent loop\n\n**Session behavior** — `SessionMode` controls whether automated invocations (cron ticks, triggers, `agent_send`) reuse the agent's persistent session (`Persistent`, default) or create a fresh one (`New`).\n\n**Autonomous configuration** — `AutonomousConfig` provides guardrails for 24/7 agents: quiet hours (cron expression), max iterations per invocation, max restarts before permanent stop, heartbeat interval with optional timeout override, and heartbeat notification channel.\n\n**Thinking configuration** — Per-agent `ThinkingConfig` (budget tokens, stream thinking) overrides the global `[thinking]` config when set.\n\n**Web search augmentation** — `WebSearchAugmentationMode` automatically searches the web before LLM calls. `Auto` (default) only augments when the model catalog reports `supports_tools == false`, enabling models like Ollama Gemma4 that don't support function calling to benefit from web search.\n\n**Auto-dream** — `auto_dream_enabled`, `auto_dream_min_hours`, and `auto_dream_min_sessions` control per-agent participation in background memory consolidation, with optional overrides for the global time/session gates.\n\n### TOML Deserialization\n\nThe crate uses lenient deserializers (`crate::serde_compat`) for all list and map fields. This means:\n- Missing fields default to empty collections rather than causing parse errors.\n- Malformed entries in lists/maps are silently dropped instead of failing the entire manifest load.\n- The `exec_policy` field accepts both string shorthands (`\"allow\"`, `\"deny\"`) and full table definitions.\n\nMulti-line system prompts in TOML use triple-quoted strings:\n\n```toml\n[model]\nsystem_prompt = \"\"\"\nYou are a coding assistant.\n\nRules:\n- Always use proper indentation\n- Test your code\n\"\"\"\n```\n\n---\n\n## Agent Lifecycle & Modes\n\n### `AgentState`\n\n```rust\nenum AgentState {\n    Created,    // Spawned but not started\n    Running,    // Actively processing\n    Suspended,  // Paused, not processing\n    Terminated, // Cannot be resumed\n    Crashed,    // Awaiting recovery\n}\n```\n\n### `AgentMode`\n\nPermission-based operational mode that filters available tools:\n\n| Mode | Behavior |\n|------|----------|\n| `Observe` | No tools available (read-only observation) |\n| `Assist` | Only read-only tools: `file_read`, `file_list`, `memory_list`, `memory_recall`, `web_fetch`, `web_search`, `agent_list` |\n| `Full` | All granted tools available (default) |\n\n`AgentMode::filter_tools()` applies the filter at runtime based on the current mode.\n\n---\n\n## Tool Profiles\n\n`ToolProfile` expands to both a tool name list and derived `ManifestCapabilities`:\n\n```rust\nlet tools = ToolProfile::Coding.tools();\n// → [\"file_read\", \"file_write\", \"file_list\", \"shell_exec\", \"web_fetch\"]\n\nlet caps = ToolProfile::Coding.implied_capabilities();\n// → network: [\"*\"], shell: [\"*\"], agent_spawn: false, ...\n```\n\nProfile expansion derives capabilities by inspecting the tool list. For example, `Coding` includes `web_fetch` so `network` is set to `[\"*\"]`. `Messaging` includes `agent_send` so `agent_spawn` is `true` and `agent_message` is `[\"*\"]`.\n\n---\n\n## Approval System (`approval` module)\n\nThe approval system gates dangerous agent operations behind human review. When an agent attempts a tool in the `require_approval` list, the kernel creates an `ApprovalRequest`, pauses the agent, and notifies operators.\n\n### Core Flow\n\n```mermaid\nsequenceDiagram\n    participant Agent\n    participant Kernel\n    participant Operator\n\n    Agent->>Kernel: tool call (shell_exec)\n    Kernel->>Kernel: Check ApprovalPolicy\n    Kernel->>Operator: ApprovalRequest (notification)\n    Operator->>Kernel: ApprovalResponse (approved/denied/modify+retry)\n    Kernel->>Agent: Execute or reject\n```\n\n### `ApprovalPolicy`\n\nConfiguration for the approval gate:\n\n| Field | Default | Purpose |\n|-------|---------|---------|\n| `require_approval` | `[\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\", \"skill_evolve_*\"]` | Tools requiring human approval |\n| `timeout_secs` | 60 | Auto-deny timeout (range: 10–300) |\n| `auto_approve` | `false` | If true, clears the require list entirely |\n| `auto_approve_autonomous` | `false` | Auto-approve when agent is in autonomous mode |\n| `trusted_senders` | `[]` | User IDs that bypass approval |\n| `channel_rules` | `[]` | Per-channel tool allow/deny rules |\n| `timeout_fallback` | `Deny` | Behavior on timeout: `Deny`, `Skip`, or `Escalate` |\n| `second_factor` | `None` | TOTP enforcement scope |\n| `totp_tools` | `[]` | Tools requiring TOTP (empty = all gated tools) |\n\nThe `require_approval` field accepts a boolean shorthand in TOML:\n- `require_approval = false` → empty list (no approval needed)\n- `require_approval = true` → the default mutation set\n\nTool names support glob patterns with a single `*` wildcard (e.g., `\"file_*\"`, `\"skill_evolve_*\"`).\n\n### `ApprovalDecision`\n\nFive possible outcomes:\n\n| Decision | Description |\n|----------|-------------|\n| `Approved` | Tool may execute |\n| `Denied` | Tool is blocked, agent receives error |\n| `TimedOut` | No response within timeout window |\n| `ModifyAndRetry { feedback }` | Human requests modification, agent retries with feedback |\n| `Skipped` | Timeout fallback: tool is skipped, agent continues |\n\n`ModifyAndRetry` serializes as a JSON object `{\"type\": \"modify_and_retry\", \"feedback\": \"...\"}` while all other variants serialize as plain strings for backward compatibility.\n\n### Channel Rules\n\n`ChannelToolRule` provides per-channel authorization:\n\n```toml\n[[approval.channel_rules]]\nchannel = \"telegram\"\nallowed_tools = [\"file_read\", \"web_fetch\"]\ndenied_tools = [\"shell_exec\"]\n```\n\nEvaluation is deny-wins: if a tool matches both allowed and denied patterns, it's denied. Patterns support single-`*` glob matching. Rules are evaluated in order; the first rule matching the request's channel wins.\n\n### Second Factor (TOTP)\n\n`SecondFactor` controls where TOTP verification is enforced:\n\n- `None` — no TOTP (default)\n- `Totp` — approvals only\n- `Login` — dashboard login only\n- `Both` — approvals and login\n\nA grace period (`totp_grace_period_secs`, default 300s, max 3600s) allows subsequent approvals to skip TOTP re-verification within the window.\n\n### Validation\n\nBoth `ApprovalRequest` and `ApprovalPolicy` expose `validate()` methods that check field bounds (name lengths, timeout ranges, list sizes) and return descriptive error messages. The kernel should call these before persisting or acting on the data.\n\n---\n\n## Utility Functions\n\n### `truncate_str`\n\n```rust\npub fn truncate_str(s: &str, max_bytes: usize) -> &str\n```\n\nTruncates a string to at most `max_bytes` without splitting a UTF-8 character boundary. This was introduced to fix production panics (issue #104) caused by slicing strings at mid-character byte offsets — particularly em dashes (`—`, 3 bytes) and emoji (4 bytes).\n\nThe function walks backward from `max_bytes` to the nearest char boundary, so truncation never produces invalid UTF-8 or mojibake.\n\n---\n\n## Serialization Compatibility (`serde_compat`)\n\nThe `serde_compat` module provides lenient deserializers used throughout the manifest and config types:\n\n- `vec_lenient` — Deserializes sequences, silently dropping malformed entries instead of failing.\n- `map_lenient` — Same for maps.\n- `exec_policy_lenient` — Accepts string shorthands or full table definitions for `ExecPolicy`.\n\nThese ensure that a single malformed field in a TOML file doesn't prevent the entire agent from loading.","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\nThe dashboard is a React-based single-page application that provides the web interface for managing LibreFang agents, channels, skills, workflows, and all runtime configuration. It communicates with the LibreFang API server through a typed API client layer and React Query-based data fetching hooks.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    Pages[Page Components<br>src/pages/] --> Mutations[Mutation Hooks<br>lib/mutations/]\n    Pages --> Queries[Query Hooks<br>lib/queries/]\n    Queries --> APIClient[API Client<br>dashboard/src/api.ts]\n    Mutations --> APIClient\n    APIClient --> GeneratedTypes[OpenAPI Types<br>dashboard/openapi/generated.ts]\n    APIClient -->|HTTP requests| Backend[LibreFang API Server]\n    APIClient --> AuthLayer[Auth Layer<br>localStorage / headers]\n    AuthLayer -->|401 handling| ClearKey[clearApiKey]\n```\n\n## Key Layers\n\n### 1. Auto-Generated OpenAPI Types (`dashboard/openapi/generated.ts`)\n\nThis file is machine-generated by `openapi-typescript` and must **never** be edited directly. It contains:\n\n- **`paths`** — A discriminated union mapping every API route to its HTTP methods, parameter shapes, and response types. Each path entry lists which methods are available (`get`, `post`, `put`, `delete`, `patch`, etc.) with `never` for unsupported methods.\n- **`operations`** — Named operation IDs matching the backend route handlers (e.g., `spawn_agent`, `list_agents`, `send_message_stream`).\n- **`components[\"schemas\"]`** — Request and response body types such as `SpawnRequest`, `MessageRequest`, `MessageResponse`, `PatchAgentConfigRequest`, `BulkAgentIdsRequest`, and `AttachmentRef`.\n\nTo regenerate after backend API changes:\n```bash\nnpx openapi-typescript http://localhost:3000/api/openapi.json -o dashboard/openapi/generated.ts\n```\n\n### 2. API Client (`dashboard/src/api.ts`)\n\nThe central HTTP client module. All backend communication flows through here.\n\n#### Core Request Helpers\n\nFour low-level functions handle all HTTP verbs:\n\n| Function | Method | Use |\n|----------|--------|-----|\n| `get<T>(path)` | GET | Fetching resources |\n| `getText(path)` | GET | Fetching raw text (e.g., TOML manifests) |\n| `post<T>(path, body?)` | POST | Creating resources, triggering actions |\n| `put<T>(path, body?)` | PUT | Replacing/setting resources |\n| `del<T>(path)` | DELETE | Removing resources |\n\nEach helper:\n1. Calls `buildHeaders()` to attach authentication\n2. Serializes the body as JSON (for `post`/`put`)\n3. Checks the response status\n4. Parses errors via `parseError()`\n\n#### Authentication\n\nThe API key is stored in `localStorage` and managed through:\n\n- **`getStoredApiKey()`** — Reads from `localStorage.getItem`\n- **`setApiKey(key)`** — Writes to `localStorage.setItem`\n- **`clearApiKey()`** — Removes the stored key\n- **`authHeader()`** — Retrieves the key for request headers\n- **`buildHeaders()`** — Constructs the full `Headers` object including the `Authorization` header\n- **`verifyStoredAuth()`** — Validates the stored key against the server; calls `clearApiKey()` on failure\n\nWhen any request returns a 401, `parseError()` triggers `clearApiKey()` to force re-authentication.\n\n#### Error Handling\n\n`parseError(response)` interprets non-2xx responses and constructs an `ApiError` (from `lib/http/errors.ts`). This error type is what all mutation and query consumers receive.\n\n### 3. Query Hooks (`lib/queries/`)\n\nReact Query wrappers that provide cached, auto-refreshing data to page components. Each file corresponds to a domain:\n\n| File | Key Hooks | Primary API Calls |\n|------|-----------|-------------------|\n| `agents.ts` | `useAgentDetail`, `useAgentSessions`, `useExperimentMetrics` | `getAgentDetail`, `listAgentSessions` |\n| `analytics.ts` | `useUsageSummary` | `listUsageByAgent` |\n| `hands.ts` | `useHandSession`, `useHandStats`, `useActiveHands` | `getHandSession`, `getHandStats`, `listActiveHands` |\n| `mcp.ts` | `useMcpHealth` | `getMcpServer`, MCP health endpoint |\n| `memory.ts` | `useMemoryStats` | Memory stats endpoint |\n| `runtime.ts` | `auditRecentQueryOptions` | `auditRecent` |\n| `overview.ts` | `versionInfoQueryOptions` | Version endpoint |\n| `schedules.ts` | Schedule query options | Schedule list endpoints |\n\nQuery hooks are consumed directly by page components and compositional UI elements. They use React Query's `queryOptions` pattern for configuration.\n\n### 4. Mutation Hooks (`lib/mutations/`)\n\nWrappers around React Query mutations for write operations. Notable modules:\n\n| File | Key Mutations |\n|------|---------------|\n| `agents.ts` | `useCreatePromptVersion`, agent CRUD |\n| `channels.ts` | `useTestChannel` |\n| `config.ts` | `useSetConfigValue` |\n| `runtime.ts` | `useCreateBackup`, `useCleanupSessions` |\n| `schedules.ts` | `useCreateSchedule`, `useDeleteSchedule`, `useRunSchedule` |\n| `workflows.ts` | `useRunWorkflow` |\n\nEach mutation calls the corresponding `api.ts` function and invalidates relevant query caches on success.\n\n## Typical Execution Flow\n\nUsing the \"test channel\" feature as an example of the full request lifecycle:\n\n```\nChannelsPage component\n  → useTestChannel mutation hook (lib/mutations/channels.ts)\n    → testChannel() (dashboard/src/api.ts)\n      → post('/api/channels/{name}/test', body)\n        → buildHeaders()\n          → authHeader()\n            → getStoredApiKey() → localStorage.getItem\n        → fetch() with JSON body\n        → parseError() on failure\n          → ApiError (lib/http/errors.ts)\n          → clearApiKey() on 401\n```\n\n## Page Components\n\nPages live in `src/pages/` and consume query/mutation hooks. Key pages include:\n\n- **ChatPage** / **CanvasPageInner** — Agent chat interface; reads auth state from `localStorage`\n- **AgentsPage** — Agent list, spawning, prompt management (`PromptsExperimentsModal`)\n- **ChannelsPage** — Channel configuration and connectivity testing\n- **WorkflowsPage** — Workflow creation, execution, and template management\n- **McpServersPage** — MCP server status and configuration\n- **TerminalPage** — Interactive terminal connected to agent sessions\n\n## Routing\n\n`dashboard/src/router.tsx` sets up the SPA router using lazy-loaded page components via `lazyWithReload`, which supports hot module replacement during development. Route guards check for a stored API key via `localStorage.getItem`.\n\n## Internationalization\n\n`src/lib/i18n.ts` initializes the i18n subsystem, integrating with the CLI's i18n module for shared translation resources.\n\n## Utility Libraries\n\n- **`src/lib/chat.ts`** — `normalizeRole()` and `asText()` for normalizing chat message formats\n- **`src/lib/chatPicker.ts`** — `groupedPicker()` for agent/chat selection UI\n\n## Development Guidelines\n\n- **Never edit `generated.ts`** — Regenerate it from the backend OpenAPI spec\n- **All API calls go through `api.ts`** — Pages and components should never call `fetch` directly\n- **Add new endpoints as functions in `api.ts`** first, then wrap in query/mutation hooks\n- **Use the operation IDs from `generated.ts`** as reference for what endpoints exist and their expected shapes\n- **Handle auth failures gracefully** — `parseError` auto-clears stale keys; UI components should detect the cleared state and show the login prompt","desktop-application":"# Desktop Application\n\n# LibreFang Desktop Application\n\nA Tauri 2.0 native desktop wrapper for the LibreFang Agent OS. The application can either boot an embedded kernel and API server locally, or connect to a remote LibreFang instance. It provides a system tray, global keyboard shortcuts, native OS notifications, auto-start on login, and automatic updates.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"main.rs<br/>CLI parsing\"] --> RUN[\"lib.rs run()\"]\n    RUN --> MODE{\"Resolve<br/>StartupMode\"}\n    MODE -->|Remote URL| REMOTE[\"WebView → remote server\"]\n    MODE -->|Local| BOOT[\"server::start_server()\"]\n    MODE -->|No preference| CONN[\"Connection Screen HTML\"]\n    CONN -->|User picks remote| CR[\"connect_remote()\"]\n    CONN -->|User picks local| SL[\"start_local()\"]\n    CR --> REMOTE\n    SL --> BOOT\n    BOOT --> KERNEL[\"LibreFangKernel\"]\n    BOOT --> AXUM[\"axum HTTP server<br/>background thread\"]\n    KERNEL --> EVENTS[\"Event bus\"]\n    EVENTS --> NOTIFY[\"forward_kernel_events()<br/>→ OS notifications\"]\n    RUN --> TRAY[\"System tray\"]\n    RUN --> SHORTCUTS[\"Global shortcuts\"]\n    RUN --> UPDATER[\"Auto-updater\"]\n```\n\n## Startup and Connection Mode Resolution\n\nThe application resolves how to connect through a priority chain:\n\n1. **CLI `--server-url <URL>`** — immediate remote connection\n2. **CLI `--local`** — skip connection screen, boot local server\n3. **`LIBREFANG_SERVER_URL` environment variable** — remote connection\n4. **Saved preference** in `~/.librefang/desktop.toml` — uses last choice\n5. **Connection screen** — user decides at runtime\n\n`main()` loads environment variables from `~/.librefang/.env` at the synchronous boundary (before any threads spawn, since `std::env::set_var` is UB with concurrent threads), parses CLI arguments via `clap`, and delegates to `lib::run()`.\n\n### Connection Preference Persistence\n\n`connection::load_saved_preference()` and `connection::save_preference()` read/write a `DesktopConfig` struct to `~/.librefang/desktop.toml`. The `ConnectionPreference` struct stores the mode (`\"local\"` or `\"remote\"`) and an optional `server_url`.\n\n## Managed State\n\nTauri managed state is registered once during setup with interior-mutable wrappers (`RwLock`). All state updates go through these locks rather than re-registering state.\n\n| State Type | Inner Type | Purpose |\n|---|---|---|\n| `PortState` | `RwLock<Option<u16>>` | Local server port. `None` in remote mode or before boot. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel handle + startup timestamp. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | The URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | `true` when connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Owning handle to the embedded server. Filled after boot. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the server started, used for uptime calculation and agent counts.\n\n## Embedded Server (`server.rs`)\n\n`start_server()` boots the kernel synchronously, binds a `TcpListener` to `127.0.0.1:0` (OS-assigned port), then spawns a dedicated background thread running its own tokio runtime. Inside that runtime:\n\n1. `kernel.start_background_agents().await` — boot agents marked for auto-start\n2. `kernel.spawn_approval_sweep_task()` — periodic approval expiry cleanup\n3. `run_embedded_server()` — builds the axum router via `librefang_api::server::build_router`, converts the std `TcpListener` to tokio, and serves with graceful shutdown via a `watch` channel\n\nThe background thread also spawns a task to sync dashboard assets via `librefang_api::webchat::sync_dashboard`.\n\n### Shutdown\n\n`ServerHandle` owns the shutdown `watch::Sender` and the server thread's `JoinHandle`. Calling `shutdown()` sends `true` on the channel, waits for the thread to join, then calls `kernel.shutdown()`. The `Drop` impl does a best-effort shutdown signal without blocking. An `AtomicBool` guard prevents double-shutdown.\n\n## IPC Commands (`commands.rs`)\n\nAll commands are registered via `tauri::generate_handler![]` and invoked from the WebView frontend.\n\n| Command | Parameters | Returns | Description |\n|---|---|---|---|\n| `get_port` | — | `u16` | Local server port |\n| `get_status` | — | `JSON` | Status object: `status`, `port`, `agents`, `uptime_secs` |\n| `get_agent_count` | — | `usize` | Number of registered agents |\n| `import_agent_toml` | — | `String` | Opens file picker, validates TOML as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, spawns the agent |\n| `import_skill_file` | — | `String` | Opens file picker (`.md/.toml/.py/.js/.wasm`), copies to `~/.librefang/skills/`, triggers hot-reload |\n| `get_autostart` | — | `bool` | Whether auto-start is enabled |\n| `set_autostart` | `enabled: bool` | `bool` | Enable/disable auto-start |\n| `check_for_updates` | — | `UpdateInfo` | On-demand update check |\n| `install_update` | — | `()` | Download, install, restart |\n| `open_config_dir` | — | `()` | Opens `~/.librefang/` in OS file manager |\n| `open_logs_dir` | — | `()` | Opens `~/.librefang/logs/` in OS file manager |\n\n## Connection Screen and Mode Switching (`connection.rs`)\n\n### Connection Screen\n\nWhen no startup mode is resolved, `connection_html()` returns a self-contained HTML/CSS/JS page injected into a blank WebView. The page provides:\n- A URL input with **Test Connection** and **Connect** buttons for remote servers\n- A **Start Local Server** button\n- A **Remember this choice** checkbox\n- Status feedback area\n\nThe frontend calls Tauri IPC commands (`test_connection`, `connect_remote`, `start_local`) via `window.__TAURI__.core.invoke`.\n\n### IPC Commands\n\n**`test_connection(url)`** — Validates the URL scheme, sends `GET /api/health` with a 10-second timeout, returns the JSON response body.\n\n**`connect_remote(url, remember)`** — Validates and health-checks the URL, saves preference if requested, updates all managed state to remote mode (clears `PortState`, `KernelState`, sets `RemoteMode = true`, sets `ServerUrlState`), then navigates the WebView to the remote URL.\n\n**`start_local(remember)`** — Spawns `crate::server::start_server()` on a blocking thread, fills all managed state with the local server's details, stores the `ServerHandle`, starts event forwarding, saves preference if requested, and navigates the WebView to `http://127.0.0.1:{port}`.\n\n## System Tray (`tray.rs`)\n\n`setup_tray()` builds a tray icon with a context menu:\n\n- **Show Window** / **Open in Browser** / **Change Server...** — actions\n- **Agents: N running** / **Status: Running/Remote (uptime)** — informational (disabled items)\n- **Launch at Login** — toggle via `CheckMenuItem`\n- **Check for Updates...** — runs `updater::check_for_update()`, installs if available, sends notifications\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — calls `app.exit(0)`\n\nThe **Change Server** action shuts down any running local server, clears local state, and re-injects the connection screen HTML into the WebView.\n\nLeft-clicking the tray icon shows and focuses the window.\n\n## Global Shortcuts (`shortcuts.rs`)\n\n`build_shortcut_plugin()` registers three system-wide hotkeys:\n\n| Shortcut | Action |\n|---|---|\n| `Ctrl+Shift+O` | Show/focus window |\n| `Ctrl+Shift+N` | Show window + emit `navigate` event with `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `navigate` event with `\"chat\"` |\n\nThe WebUI listens for the `navigate` event to switch pages. Registration failure is non-fatal — the app logs a warning and continues.\n\n## Auto-Updater (`updater.rs`)\n\n`spawn_startup_check()` runs after a 10-second delay, checks for updates via the Tauri updater plugin, and if found, sends a notification, waits 3 seconds, then installs and restarts.\n\n`check_for_update()` returns an `UpdateInfo` struct with `available`, `version`, and `body` fields. `download_and_install_update()` performs the actual download and calls `app_handle.restart()` — on success the function never returns.\n\nBoth the tray menu's **Check for Updates** and the IPC commands `check_for_updates` / `install_update` go through the same `do_check()` / `download_and_install_update()` functions.\n\n## Event Forwarding and Notifications\n\n`forward_kernel_events()` subscribes to the kernel's event bus via `subscribe_all()` and converts critical events into native OS notifications:\n\n- `LifecycleEvent::Crashed` → \"Agent Crashed\"\n- `SystemEvent::KernelStopping` → \"Kernel Stopping\"\n- `SystemEvent::QuotaEnforced` → \"Quota Enforced\" with spend details\n\nAll other events are ignored. Broadcast lag is logged but doesn't stop the listener.\n\n## Window Lifecycle\n\nOn desktop, closing the window hides it to the system tray instead of quitting (`CloseRequested` → `api.prevent_close()` + `window.hide()`). The app only truly exits when the user selects **Quit** from the tray menu.\n\nSingle-instance enforcement (`tauri_plugin_single_instance`) focuses the existing window if a second instance is launched.","extensions-mcp":"# Extensions & MCP\n\n# Extensions & MCP\n\nThe `librefang-extensions` crate manages the full lifecycle of MCP (Model Context Protocol) server integrations: discovering catalog templates, storing credentials securely, installing servers into the user's config, and monitoring their health.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Catalog\n        A[McpCatalog] -->|reads| B[~/.librefang/mcp/catalog/*.toml]\n    end\n    subgraph Credentials\n        C[CredentialVault] -->|encrypted| D[~/.librefang/vault.enc]\n        E[CredentialResolver] -->|1. vault| C\n        E -->|2. dotenv| F[~/.librefang/.env]\n        E -->|3. env| G[std::env]\n        E -->|4. prompt| H[interactive]\n    end\n    subgraph Installer\n        I[install_integration] -->|reads| A\n        I -->|stores keys| E\n        I -->|returns| J[McpServerConfigEntry]\n    end\n    subgraph Runtime\n        K[dotenv::load_dotenv] -->|injects| G\n        L[HealthMonitor] -->|tracks| M[McpHealth]\n    end\n    N[OAuth PKCE] -->|tokens| E\n    I -->|writes to| O[config.toml mcp_servers]\n```\n\n## Module Layout\n\n| Module | Visibility | Purpose |\n|--------|-----------|---------|\n| `catalog` | `pub` | Read-only MCP server template registry |\n| `credentials` | `pub` | Multi-source credential resolution chain |\n| `dotenv` | `pub` | Shared `.env` + vault → process environment loader |\n| `health` | `pub` | MCP server health tracking with exponential backoff |\n| `http_client` | `pub(crate)` | Shared `reqwest` client with bundled CA roots |\n| `installer` | `pub` | Pure transform: catalog entry → `McpServerConfigEntry` |\n| `oauth` | `pub` | OAuth2 PKCE localhost callback flows |\n| `vault` | `pub` | AES-256-GCM encrypted secret storage |\n\n## Core Types (`src/lib.rs`)\n\nThe crate root defines all shared types and the error enum used across modules.\n\n### Error Handling\n\nAll fallible operations return `ExtensionResult<T>`, backed by `ExtensionError`:\n\n```rust\nmatch result {\n    Err(ExtensionError::NotFound(id)) => { /* catalog entry missing */ },\n    Err(ExtensionError::VaultLocked) => { /* need unlock */ },\n    Err(ExtensionError::AlreadyInstalled(id)) => { /* duplicate */ },\n    // ...\n}\n```\n\nKey variants:\n- **`NotFound`** / **`AlreadyInstalled`** / **`NotInstalled`** — catalog and config state queries\n- **`CredentialNotFound`** — credential resolution found nothing\n- **`Vault`** / **`VaultLocked`** — encryption errors or locked vault\n- **`OAuth`** — PKCE flow failures\n- **`Io`** / **`Http`** / **`TomlParse`** — infra-level errors\n\n### MCP Catalog Entry Schema\n\n`McpCatalogEntry` is the central type — a bundled template describing how to configure an MCP server:\n\n```toml\nid = \"github\"\nname = \"GitHub\"\ndescription = \"GitHub API integration\"\ncategory = \"devtools\"\nicon = \"\"\ntags = [\"github\", \"api\"]\n\n[transport]\ntype = \"stdio\"\ncommand = \"npx\"\nargs = [\"-y\", \"@modelcontextprotocol/server-github\"]\n\n[[required_env]]\nname = \"GITHUB_PERSONAL_ACCESS_TOKEN\"\nlabel = \"Personal Access Token\"\nhelp = \"Create at https://github.com/settings/tokens\"\nis_secret = true\nget_url = \"https://github.com/settings/tokens\"\n\n[health_check]\ninterval_secs = 60\nunhealthy_threshold = 3\n```\n\n**`McpCatalogTransport`** has three variants: `Stdio`, `Sse`, and `Http`. Unlike the kernel's `McpTransportEntry`, there is no `HttpCompat` variant — that's a power-user transport that doesn't ship as a catalog template. The installer converts between the two types.\n\n**`McpStatus`** represents the lifecycle of a server: `Available` → `Setup` (credentials missing) → `Ready` (running), with `Error` and `Disabled` as alternate states.\n\n---\n\n## Catalog (`catalog.rs`)\n\n`McpCatalog` provides an in-memory view of all template files under `~/.librefang/mcp/catalog/`. It is purely read-only — installed servers live in `config.toml` under `[[mcp_servers]]` with an optional `template_id` pointing back to the catalog.\n\n### File Layout\n\nTwo on-disk layouts are valid:\n\n```\n~/.librefang/mcp/catalog/\n├── github.toml              # (A) flat file\n├── slack.toml\n└── complex-mcp/             # (B) directory-backed\n    └── MCP.toml\n```\n\nFor layout (A), the `id` comes from the filename minus `.toml`. For layout (B), the `id` is the directory name and the manifest is `MCP.toml` inside it.\n\n### Loading\n\n```rust\nlet mut catalog = McpCatalog::new(&home_dir);\nlet count = catalog.load(&home_dir);\n```\n\n`load()` performs a **full reload** — it clears the in-memory map first so deleted entries don't linger. Returns the number of entries loaded. Malformed files are skipped with a `warn!` log.\n\n### Querying\n\n```rust\n// Get by exact ID\nlet entry = catalog.get(\"github\").unwrap();\n\n// List all, sorted by ID\nlet all = catalog.list();\n\n// Filter by category\nlet devtools = catalog.list_by_category(&McpCategory::DevTools);\n\n// Fuzzy search (id, name, description, tags)\nlet results = catalog.search(\"search\");\n```\n\nCatalog entries are refreshed from the upstream registry by `librefang_runtime::registry_sync`. This crate does not perform network fetches itself.\n\n---\n\n## Credential Vault (`vault.rs`)\n\nAES-256-GCM encrypted storage at `~/.librefang/vault.enc`. Secrets are zeroed on drop using `Zeroizing<String>`.\n\n### Encryption Scheme\n\n1. Master key (32 bytes) stored in OS keyring or `LIBREFANG_VAULT_KEY` env var\n2. Per-save: random 16-byte salt + 12-byte nonce generated\n3. Master key + salt → Argon2id → derived encryption key\n4. Derived key encrypts the serialized JSON via AES-256-GCM\n5. File written with `OFV1` magic header + JSON payload\n\n### Keyring Fallback\n\nWhen the OS keyring is unavailable, the master key is wrapped with AES-256-GCM using an Argon2id-derived key from a machine fingerprint (username + hostname hash). The wrapped key is stored at `<local data dir>/librefang/.keyring`. Legacy v1 XOR-obfuscated files are automatically migrated to v2 on first load.\n\n### Lifecycle\n\n```rust\nlet mut vault = CredentialVault::new(home_dir.join(\"vault.enc\"));\n\n// Initialize (generates random key, stores in keyring)\nvault.init()?;\n\n// Or with explicit key (testing / programmatic)\nvault.init_with_key(master_key)?;\n\n// Unlock (reads from keyring or env var)\nvault.unlock()?;\n\n// Or with explicit key\nvault.unlock_with_key(master_key)?;\n\n// Read / write\nvault.set(\"GITHUB_TOKEN\".to_string(), Zeroizing::new(\"ghp_xxx\".to_string()))?;\nlet token = vault.get(\"GITHUB_TOKEN\"); // Option<Zeroizing<String>>\nvault.remove(\"GITHUB_TOKEN\")?;\n\n// List key names (not values)\nlet keys: Vec<&str> = vault.list_keys();\n```\n\nThe vau
