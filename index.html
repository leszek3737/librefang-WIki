Purpose |\n|---|---|---|\n| `POST` | `/insert` | Store embedding with payload and metadata |\n| `POST` | `/search` | Query by embedding with optional filter, return top-K |\n| `DELETE` | `/delete` | Remove by ID |\n| `POST` | `/get_embeddings` | Batch fetch embeddings by IDs |\n\n```rust\nlet store = HttpVectorStore::new(\"http://localhost:6333/collections/memories\");\n// Plugs into SemanticStore when an EmbeddingFn is configured\n```\n\n## Schema Migrations\n\nThe `migration` module manages SQLite schema versioning via the `user_version` pragma. Currently at version 19. Key tables created across migrations:\n\n| Table | Version | Purpose |\n|---|---|---|\n| `agents` | v1 | Agent registry |\n| `sessions` | v1 | Session history |\n| `events` | v1 | Event log |\n| `kv_store` | v1 | Per-agent key-value |\n| `task_queue` | v1 | Task management |\n| `memories` | v1, v3, v15, v16 | Semantic memories + embeddings + multimodal + peer_id |\n| `entities`, `relations` | v1, v10 | Knowledge graph + agent_id |\n| `usage_events` | v4, v14, v19 | Cost tracking + latency + provider |\n| `canonical_sessions` | v5 | Cross-channel persistent memory |\n| `paired_devices` | v7 | Device pairing |\n| `audit_entries` | v8 | Merkle audit trail |\n| `prompt_versions` | v13 | Prompt versioning |\n| `prompt_experiments` | v13 | A/B testing |\n| `sessions_fts` | v12 | FTS5 full-text search |\n| `approval_audit` | v17 | Approval audit log |\n| `totp_lockout` | v18 | TOTP lockout tracking |\n\nMigrations are idempotent — `run_migrations` can be called repeatedly without error.\n\n## Usage Tracking (`usage`)\n\nRecords per-request token usage, cost, latency, and tool call counts in `usage_events`. Supports:\n\n- Quota enforcement (hourly/daily token limits per agent)\n- Global budget caps\n- Per-provider budget enforcement\n- Model performance metrics (latency percentiles, success rates)\n- Automatic cleanup of old records\n\n## Integration Points\n\n**From the runtime** (`librefang-runtime`):\n- `MemorySubstrate::open_in_memory()` for testing\n- `ProactiveMemoryStore::with_default_config()` / `with_extractor()` / `with_embedding()` for production setup\n- `save_session_async()` called after each agent loop turn\n- `recall_with_embedding_async()` called during context assembly before each turn\n- `auto_memorize()` / `auto_retrieve()` hooks integrated into the agent loop\n\n**From API routes** (`librefang-api`):\n- Memory CRUD endpoints call `ProactiveMemoryStore::search()`, `get()`, `update()`, `delete()`\n- `find_agent_id_for_memory()` resolves memory ownership for authorization\n- Usage stats endpoints query the usage tracker\n\n## Re-exports\n\nThe crate re-exports commonly used types for convenience:\n\n```rust\n// Core types from librefang-types\npub use librefang_types::memory::{\n    ExtractionResult, MemoryAction, MemoryAddResult, MemoryFilter, MemoryFragment,\n    MemoryId, MemoryItem, MemoryLevel, MemorySource, ProactiveMemory,\n    ProactiveMemoryConfig, ProactiveMemoryHooks, RelationTriple, VectorSearchResult,\n    VectorStore,\n};\n\n// Proactive memory types\npub use proactive::{MemoryExportItem, MemoryStats, ProactiveMemoryStore};\n\n// Prompt store\npub use prompt::PromptStore;\n\n// Vector store implementations\npub use http_vector_store::HttpVectorStore;\npub use semantic::SqliteVectorStore;\n\n// Top-level substrate\npub use substrate::MemorySubstrate;\n```","memory-system-librefang-runtime-src":"# Memory System — librefang-runtime-src\n\n# Memory System — `librefang-runtime`\n\n## Overview\n\nThis module provides the runtime layer for LibreFang's semantic memory system. It contains two subsystems:\n\n1. **Embedding drivers** (`embedding.rs`) — compute vector representations of text for similarity search, with support for multiple cloud and local providers.\n2. **Proactive memory** (`proactive_memory.rs`) — automatically extract facts from conversations and inject relevant context into agent turns, using LLM-powered extraction and conflict resolution.\n\n```mermaid\ngraph TD\n    subgraph Initialization\n        A[create_embedding_driver] --> B{provider?}\n        B -->|openai/ollama/vllm/etc| C[OpenAIEmbeddingDriver]\n        B -->|cohere| D[CohereEmbeddingDriver]\n        B -->|bedrock| E[BedrockEmbeddingDriver]\n        B -->|auto| F[detect_embedding_provider]\n        F --> C\n        F --> D\n    end\n\n    subgraph Proactive Memory\n        G[init_proactive_memory_full_with_extractor] --> H[ProactiveMemoryStore]\n        G --> I[LlmMemoryExtractor]\n        I -->|extract_memories| J[LLM complete call]\n        I -->|decide_action| J\n        H -->|auto_retrieve| K[EmbeddingBridge]\n        K --> C\n        K --> D\n        K --> E\n    end\n\n    C --> L[(SQLite BLOB storage)]\n    D --> L\n    E --> L\n```\n\n## Embedding Drivers\n\n### The `EmbeddingDriver` Trait\n\nAll drivers implement `EmbeddingDriver` — an async trait that abstracts vector computation:\n\n```rust\n#[async_trait]\npub trait EmbeddingDriver: Send + Sync {\n    async fn embed(&self, texts: &[&str]) -> Result<Vec<Vec<f32>>, EmbeddingError>;\n    async fn embed_one(&self, text: &str) -> Result<Vec<f32>, EmbeddingError>; // default impl\n    fn dimensions(&self) -> usize;\n    async fn embed_image(&self, _image_data: &[u8]) -> Result<Vec<f32>, EmbeddingError>; // optional\n    fn supports_images(&self) -> bool { false }\n}\n```\n\n- **`embed`** — batch embedding. Returns one vector per input text.\n- **`embed_one`** — convenience wrapper around `embed` for single texts.\n- **`dimensions`** — returns the vector length. Used for schema initialization and index sizing.\n- **`embed_image` / `supports_images`** — optional multimodal support. Returns `Unsupported` by default.\n\n### Provider Implementations\n\n#### `OpenAIEmbeddingDriver`\n\nWorks with any provider that exposes the `/v1/embeddings` endpoint. Supported providers:\n\n| Provider | Auth | Notes |\n|----------|------|-------|\n| OpenAI | `OPENAI_API_KEY` | Default 1536-dim models |\n| OpenRouter | `OPENROUTER_API_KEY` | Proxies multiple model families |\n| Mistral | `MISTRAL_API_KEY` | `mistral-embed` |\n| Together | `TOGETHER_API_KEY` | Open-source models |\n| Fireworks | `FIREWORKS_API_KEY` | `nomic-ai/nomic-embed-text-v1.5` etc. |\n| Ollama | No key required | Local, defaults to `localhost:11434` |\n| vLLM | No key required | Local, defaults to `localhost:8000` |\n| LM Studio | No key required | Local, defaults to `localhost:1234` |\n\n**Groq is intentionally excluded** — it has no embeddings endpoint (only chat + Whisper), so auto-wiring it would produce silent 404s.\n\nRequest shape:\n```json\n{\n  \"model\": \"text-embedding-3-small\",\n  \"input\": [\"text1\", \"text2\"]\n}\n```\n\nThe `/v1` path segment is automatically appended to base URLs for known providers when missing.\n\n#### `CohereEmbeddingDriver`\n\nCohere's API is not OpenAI-compatible — it uses a different endpoint (`/v2/embed`), different request shape (`texts` + required `input_type`), and a different response structure (embeddings nested under `embeddings.float`). A dedicated driver is required; sending Cohere requests through `OpenAIEmbeddingDriver` produces 404s.\n\nKey behaviors:\n\n- **Batch limit**: 96 texts per request (Cohere rejects larger batches; this driver fails fast with a clear error).\n- **`input_type`**: Cohere v3 models produce asymmetric embeddings. The driver defaults to `search_document` (optimized for indexing). Override via `LIBREFANG_COHERE_INPUT_TYPE` env var with one of: `search_document`, `search_query`, `classification`, `clustering`. Invalid values are ignored with a warning.\n- **Model fallback**: If a non-Cohere model name is passed (e.g., `text-embedding-3-small` from auto-detect), the driver falls back to `embed-multilingual-v3.0` with a warning, rather than sending a name Cohere would reject.\n- **API key required at construction**: Unlike the OpenAI driver (which accepts empty keys for local providers), Cohere rejects unauthenticated calls, so the driver fails immediately at `new()` if the key is empty.\n- **Base URL required**: No hardcoded fallback — must come from the model catalog or explicit config.\n\n#### `BedrockEmbeddingDriver`\n\nUses Amazon Bedrock embedding models (Titan, Cohere on Bedrock) via manually-signed SigV4 REST calls. This avoids pulling in the full `aws-sdk-*` dependency tree.\n\nKey behaviors:\n\n- **Per-text invocation**: Bedrock's Titan `/invoke` endpoint accepts a single `inputText` per call, so `embed` loops over texts sequentially.\n- **Credential source**: Reads `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, and optionally `AWS_SESSION_TOKEN` from environment variables. Region defaults to `us-east-1` unless `AWS_REGION` or an explicit override is provided.\n- **SigV4 signing**: Minimal implementation in `sigv4_auth_header()` covering POST + JSON body (the only shape Bedrock invoke uses). Derived keys are produced by `sigv4_signing_key()`.\n\n### Driver Factory: `create_embedding_driver`\n\n```rust\npub fn create_embedding_driver(\n    provider: &str,\n    model: &str,\n    api_key_env: &str,\n    custom_base_url: Option<&str>,\n    dimensions_override: Option<usize>,\n) -> Result<Box<dyn EmbeddingDriver + Send + Sync>, EmbeddingError>\n```\n\nCentral factory function. Routing logic:\n\n1. **`provider == \"auto\"`** → calls `detect_embedding_provider()`, then recurses with the detected name.\n2. **`provider == \"bedrock\"`** → creates `BedrockEmbeddingDriver`. `custom_base_url` is interpreted as a region override.\n3. **`provider == \"cohere\"`** → creates `CohereEmbeddingDriver`. Validates API key presence, resolves base URL (required), remaps non-Cohere model names.\n4. **All others** → creates `OpenAIEmbeddingDriver`. Cloud providers require a base URL from the model catalog. Local providers (`ollama`, `vllm`, `lmstudio`) have hardcoded defaults.\n\n**Security**: Emits a `warn!` log when the resolved base URL is not localhost, alerting operators that text content will leave the machine.\n\n### Auto-Detection: `detect_embedding_provider`\n\nChecks environment variables in priority order:\n\n1. `OPENAI_API_KEY` → `\"openai\"`\n2. `OPENROUTER_API_KEY` → `\"openrouter\"`\n3. `MISTRAL_API_KEY` → `\"mistral\"`\n4. `TOGETHER_API_KEY` → `\"together\"`\n5. `FIREWORKS_API_KEY` → `\"fireworks\"`\n6. `COHERE_API_KEY` → `\"cohere\"`\n7. `OLLAMA_HOST` (non-empty) → `\"ollama\"`\n8. `None` if nothing is set\n\n`GROQ_API_KEY` is deliberately absent from this list.\n\n### Dimension Inference\n\nBoth `infer_dimensions` (OpenAI/Bedrock) and `infer_cohere_dimensions` map known model names to their vector lengths. Unknown models default to 1536 (OpenAI) or 1024 (Cohere). Callers can override with `dimensions_override` in `EmbeddingConfig`.\n\nKnown dimension mappings:\n\n| Model | Dimensions |\n|-------|-----------|\n| `text-embedding-3-small` | 1536 |\n| `text-embedding-3-large` | 3072 |\n| `text-embedding-ada-002` | 1536 |\n| `all-MiniLM-L6-v2` | 384 |\n| `all-mpnet-base-v2` | 768 |\n| `nomic-embed-text` | 768 |\n| `amazon.titan-embed-text-v1` | 1536 |\n| `amazon.titan-embed-text-v2:0` | 1024 |\n| `embed-english-v3.0` | 1024 |\n| `embed-multilingual-v3.0` | 1024 |\n| `embed-english-light-v3.0` | 384 |\n| `embed-english-v2.0` | 4096 |\n\n### Utility Functions\n\n- **`cosine_similarity(a, b)`** — dot product normalized by magnitudes. Returns `0.0` for mismatched lengths or zero vectors.\n- **`embedding_to_bytes` / `embedding_from_bytes`** — serialize `Vec<f32>` to/from little-endian byte vectors for SQLite BLOB storage.\n\n### Error Handling\n\n`EmbeddingError` variants cover the full lifecycle:\n\n| Variant | When |\n|---------|------|\n| `Http` | Network/transport failures |\n| `Api { status, message }` | Non-200 response from provider |\n| `Parse` | JSON deserialization failures |\n| `MissingApiKey` | Required env var unset or empty |\n| `InvalidInput` | Bad batch size, missing config |\n| `Unsupported` | Image embeddings on non-vision drivers |\n\n---\n\n## Proactive Memory\n\n### Architecture\n\nThe proactive memory system has two operating modes:\n\n- **`auto_retrieve`** — before each agent turn, embed the user's message and retrieve semantically similar memories from the store, injecting them as context.\n- **`auto_memorize`** — after each agent turn, extract factual memories from the conversation and persist them.\n\nBoth are controlled by `ProactiveMemoryConfig`. If both flags are false, `init_proactive_memory` returns `None` and the system is inert.\n\n### Initialization Chain\n\n```\ninit_proactive_memory                         → basic (no LLM, no embedding)\ninit_proactive_memory_with_llm                → LLM extractor only\ninit_proactive_memory_with_embedding          → embedding driver only\ninit_proactive_memory_full                    → both, returns Arc<ProactiveMemoryStore>\ninit_proactive_memory_full_with_extractor     → both, also returns LlmMemoryExtractor\n```\n\nThe `_with_extractor` variant exists because the kernel needs the concrete `LlmMemoryExtractor` handle to wire up internal references. The store only holds a `dyn MemoryExtractor` trait object.\n\n### `EmbeddingBridge`\n\nA thin adapter that wraps the runtime's `EmbeddingDriver` to implement `librefang_memory::proactive::EmbeddingFn`:\n\n```rust\nstruct EmbeddingBridge(Arc<dyn EmbeddingDriver + Send + Sync>);\n```\n\nThis breaks the circular dependency: `librefang-memory` defines the trait, `librefang-runtime` owns the concrete drivers, and the bridge connects them without either crate depending on the other.\n\n### `LlmMemoryExtractor`\n\nUses an LLM to extract structured memories from conversation text. Implements the `MemoryExtractor` trait from `librefang-types`.\n\n#### `extract_memories`\n\n1. **Conversation condensation**: Iterates messages, skipping `system` and `unknown` roles. Joins remaining content as `\"{role}: {content}\\n\"`, truncating at 8000 characters at the last complete message boundary.\n2. **LLM call**: Sends the condensed conversation to the LLM with a detailed extraction system prompt (`build_extraction_prompt`). Uses JSON response format and temperature 0.1 for consistency.\n3. **Parsing**: `parse_llm_extraction_response` handles:\n   - New format: `{\"memories\": [...], \"relations\": [...]}`\n   - Legacy format: `[...]` (array of memories, no relations)\n   - Markdown code blocks wrapping JSON (```json ... ```)\n   - Content truncation at 2000 chars with UTF-8-safe boundary handling\n   - Missing optional fields (defaults: category → `\"general\"`, level → `Session`, relation types → `\"concept\"`)\n\nThe extraction prompt instructs the LLM to produce nuanced, actionable memories rather than flat database entries, with explicit priority ordering (communication style > frustrations > preferences > work style > technical background > project context > personal details).\n\n#### `extract_memories_with_agent_id`\n\nOriginally designed for a fork-based extraction path that would share the parent agent's prompt cache. The fork approach was removed because it cannot thread `response_format: json_object` through `run_forked_agent_oneshot`, causing weak models to reply in prose instead of JSON. This method now delegates directly to `extract_memories`. The `agent_id` parameter is retained for forward compatibility.\n\n#### `decide_action`\n\nLLM-powered conflict resolution for ADD/UPDATE/NOOP decisions:\n\n1. If no existing memories → `Add` immediately (no LLM call).\n2. Otherwise, sends the new memory and existing candidates to the LLM with `DECISION_SYSTEM_PROMPT`.\n3. `parse_decision_response` handles:\n   - Case-insensitive action strings\n   - `existing_id` as UUID string or numeric (1-based index)\n   - Invalid/missing IDs falling back to `Add` (safe: may duplicate but never silently drops information)\n   - Markdown code blocks wrapping the response\n   - Unparseable responses defaulting to `Add`\n\nIf the LLM call fails entirely, falls back to `DefaultMemoryExtractor`'s heuristic.\n\n#### `format_context`\n\nFormats retrieved memories for injection into the agent's context. The template explicitly instructs the agent not to mechanically recite memories (\"NEVER say 'based on my memory...'\") and to let remembered preferences silently guide behavior.\n\n### Prompt Caching\n\nBoth extraction and decision calls support `prompt_caching` (controlled by `KernelConfig.prompt_caching`). When enabled, the stable system prompts (`EXTRACTION_SYSTEM_PROMPT`, `DECISION_SYSTEM_PROMPT`) get `cache_control` markers for Anthropic's prompt caching. Non-Anthropic providers ignore the flag, so enabling it is safe cross-provider.\n\nThe system prompts are deliberately separate from the agent's own system prompt — they're optimized for extraction quality, not for sharing cache keys with the main conversation.\n\n### Key Constants\n\n| Constant | Value | Purpose |\n|----------|-------|---------|\n| `MAX_EXTRACTION_CHARS` | 8000 | Conversation text sent to extraction LLM |\n| `MAX_MEMORY_CONTENT_LENGTH` | 2000 | Maximum chars per extracted memory |\n| `COHERE_EMBED_MAX_BATCH` | 96 | Cohere API batch limit |\n| Decision timeout | 15s | `decide_action` LLM call timeout |\n| Extraction timeout | 30s | `extract_memories` LLM call timeout |\n\n### Response Parsing: `strip_code_block`\n\nHandles the common case where LLMs wrap JSON in markdown code blocks:\n\n- Strips leading text before the first ` ``` `\n- Skips language tags (json, JSON, etc.)\n- Extracts content between first ` ``` ` and last ` ``` `\n- Passes through plain JSON unchanged\n\n---\n\n## Error Philosophy\n\nThe module follows a \"never silently drop information\" principle:\n\n- Unparseable extraction responses produce empty results (no crash, no partial data).\n- Unparseable decision responses default to `Add` (may duplicate, but won't lose new facts).\n- Missing API keys fail at driver construction, not at first embed call.\n- External API usage emits `warn!` logs about data leaving the machine.","memory-system-librefang-types-src":"# Memory System — librefang-types-src\n\n# Memory System — `librefang-types/src/memory.rs`\n\n## Purpose\n\nThis module defines every type, trait, and helper that the rest of the memory subsystem depends on. It is the **type-only layer** — no storage backends, no database connections, no LLM calls live here. Other crates (`librefang-memory`, `librefang-runtime`) implement the traits and wire up real backends.\n\nThe module covers three concerns:\n\n1. **Data structures** for storing and querying memory (`MemoryFragment`, `MemoryItem`, `Entity`, `Relation`, …)\n2. **Trait abstractions** that decouple consumers from storage backends (`Memory`, `ProactiveMemory`, `VectorStore`, `MemoryExtractor`)\n3. **Built-in algorithms** that any implementation can reuse (`cosine_similarity`, `text_similarity`, `DefaultMemoryExtractor`, default `decide_action` logic)\n\n---\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"librefang-types (this crate)\"\n        MF[MemoryFragment]\n        MI[MemoryItem]\n        ME[MemoryExtractor trait]\n        DME[DefaultMemoryExtractor]\n        MT[Memory trait]\n        PM[ProactiveMemory trait]\n        PMH[ProactiveMemoryHooks trait]\n        VS[VectorStore trait]\n        PMC[ProactiveMemoryConfig]\n    end\n\n    subgraph \"librefang-memory\"\n        SemImpl[SemanticStore]\n        ProImpl[ProactiveMemory impl]\n        VecImpl[VectorStore impls]\n    end\n\n    subgraph \"librefang-runtime\"\n        RT[ProactiveMemoryRuntime]\n        AL[Agent Loop]\n    end\n\n    MT --> MF\n    PM --> MI\n    PMH --> ME\n    ME --> DME\n    DME --> MI\n    SemImpl -- implements --> MT\n    SemImpl -- uses --> MF\n    ProImpl -- implements --> PM\n    ProImpl -- implements --> PMH\n    VecImpl -- implements --> VS\n    RT -- implements --> ME\n    AL -- calls --> PMH\n```\n\n---\n\n## Memory Tiers\n\n### `MemoryLevel`\n\nMulti-level memory scoping. Each tier has a different lifecycle:\n\n| Variant | Scope string | Lifecycle |\n|---------|-------------|-----------|\n| `User` | `\"user_memory\"` | Persists across sessions. Stores preferences, identity, expertise. |\n| `Session` | `\"session_memory\"` | Current conversation only. TTL-gated (default 24 h). Stores task context. |\n| `Agent` | `\"agent_memory\"` | Agent-specific learned behaviors. Persists like User but scoped to one agent. |\n\nConstruction helpers on `MemoryItem` map directly to these:\n\n```rust\nlet user_mem = MemoryItem::user(\"Prefers dark mode\");\nlet session_mem = MemoryItem::session(\"Debugging WebSocket reconnect logic\");\nlet agent_mem = MemoryItem::agent(\"Always explain reasoning before giving code\");\n```\n\n`MemoryLevel` parses flexibly — both `\"user\"` and `\"user_memory\"` resolve to `MemoryLevel::User`. Unknown strings default to `Session`.\n\n---\n\n## Core Data Structures\n\n### `MemoryFragment`\n\nThe **internal storage unit** for the semantic store. A `MemoryFragment` is what gets persisted, embedded, and queried by the `Memory` trait's `remember`/`recall` operations.\n\nKey fields:\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `id` | `MemoryId` (UUID wrapper) | Unique identifier |\n| `agent_id` | `AgentId` | Owning agent |\n| `content` | `String` | Textual content |\n| `embedding` | `Option<Vec<f32>>` | Populated by the semantic store's embedding driver |\n| `metadata` | `HashMap<String, serde_json::Value>` | Arbitrary key-value pairs (category, peer_id, etc.) |\n| `source` | `MemorySource` | Origin (Conversation, Document, Observation, …) |\n| `confidence` | `f32` | 0.0–1.0 score, subject to exponential decay |\n| `scope` | `String` | Collection name — maps to `MemoryLevel::scope_str()` or custom values |\n| `modality` | `MemoryModality` | Text, Image, or MultiModal |\n| `image_embedding` | `Option<Vec<f32>>` | Separate embedding for image payloads |\n\n### `MemoryItem`\n\nThe **external-facing** memory type for the mem0-style `ProactiveMemory` API. Simpler than `MemoryFragment` — no embedding vectors, no internal IDs.\n\nUse `MemoryItem::from_fragment(frag)` to convert from the internal representation. The conversion maps `MemoryFragment.scope` → `MemoryLevel`, extracts `category` from metadata, and populates access statistics.\n\nBuilder-style chainable methods:\n\n```rust\nlet item = MemoryItem::user(\"Prefers concise answers\")\n    .with_category(\"communication_style\")\n    .with_metadata(\"channel\", json!(\"slack\"));\n```\n\n### `MemoryFilter`\n\nFilter criteria passed to `recall` and `VectorStore::search`. Supports:\n\n- `agent_id`, `source`, `scope` — identity filters\n- `min_confidence` — quality gate\n- `after`/`before` — time range\n- `metadata` — arbitrary key-value match\n- `peer_id` — per-user isolation in multi-user channels\n\nConstructors: `MemoryFilter::agent(id)`, `MemoryFilter::scope(\"user_memory\")`.\n\n### Knowledge Graph Types\n\n| Type | Role |\n|------|------|\n| `Entity` | Node: person, org, project, concept, etc. |\n| `EntityType` | Enum including `Custom(String)` for extensibility |\n| `Relation` | Directed edge with confidence score |\n| `RelationType` | Enum: `WorksAt`, `KnowsAbout`, `Uses`, `PartOf`, `Custom(String)`, … |\n| `GraphPattern` | Query template (source/relation/target filters + max depth) |\n| `GraphMatch` | Query result: (source entity, relation, target entity) triple |\n| `RelationTriple` | Lightweight (subject, relation, object) extracted from conversation |\n\n---\n\n## Traits\n\n### `Memory` — Unified Agent Memory API\n\nThe high-level interface agents use. Abstracts over structured (key-value), semantic (vector), and graph storage:\n\n| Method | Store | Description |\n|--------|-------|-------------|\n| `get` / `set` / `delete` | Key-value | Per-agent structured storage |\n| `remember` | Semantic | Store a `MemoryFragment` with auto-embedding |\n| `recall` | Semantic | Vector similarity search with optional `MemoryFilter` |\n| `forget` | Semantic | Soft-delete by `MemoryId` |\n| `add_entity` / `add_relation` / `query_graph` | Graph | Knowledge graph CRUD |\n| `consolidate` | Maintenance | Merge duplicates, decay confidence |\n| `export` / `import` | Maintenance | Serialize/deserialize all data (`Json` or `MessagePack`) |\n\n### `ProactiveMemory` — mem0-Style API\n\nSimplified, user-centric operations. Implementations live in `librefang-memory/src/proactive.rs`.\n\n| Method | Description |\n|--------|-------------|\n| `search(query, user_id, limit)` | Semantic search scoped to a user |\n| `add(messages, user_id)` | Extract + store memories from conversation messages |\n| `add_with_level(messages, user_id, level)` | Same, but at a specific `MemoryLevel` |\n| `get(user_id)` | Retrieve all user memories |\n| `list(user_id, category)` | Filtered listing |\n| `delete(memory_id, user_id)` | Remove by ID |\n| `update(memory_id, user_id, content)` | Replace content, preserve metadata |\n\n### `ProactiveMemoryHooks` — Auto-Memorize / Auto-Retrieve\n\nCalled by the agent loop (`librefang-runtime/src/agent_loop.rs`) before and after execution:\n\n- **`auto_memorize`** — Runs after the agent finishes. Extracts facts from the conversation and stores them. Accepts `peer_id` for multi-user channel isolation.\n- **`auto_retrieve`** — Runs before the agent starts. Loads relevant context given the incoming query.\n\n### `VectorStore` — Pluggable Vector Backend\n\nAbstracts the embedding storage layer so implementations can swap between SQLite (default), Qdrant, Pinecone, etc.\n\n| Method | Description |\n|--------|-------------|\n| `insert(id, embedding, payload, metadata)` | Upsert a vector |\n| `search(query_embedding, limit, filter)` | ANN search, descending by similarity |\n| `delete(id)` | Remove by ID |\n| `get_embeddings(ids)` | Batch fetch stored embeddings |\n| `backend_name()` | Human-readable identifier (e.g. `\"sqlite\"`, `\"qdrant\"`) |\n\n---\n\n## `MemoryExtractor` Trait and Conflict Resolution\n\n`MemoryExtractor` is the intelligence layer for the proactive memory system. It has two responsibilities:\n\n1. **Extract** important facts and relationships from raw conversation messages\n2. **Decide** what to do when a new memory conflicts with an existing one\n\n### Extraction\n\nTwo methods:\n\n- `extract_memories(messages, categories)` — Primary entry point\n- `extract_memories_with_agent_id(messages, agent_id, categories)` — Preferred when the agent ID is known; allows implementations to route the LLM call through a forked agent turn for prompt cache reuse. Default delegates to `extract_memories`, ignoring the agent ID.\n\nBoth return an `ExtractionResult` containing:\n- `memories: Vec<MemoryItem>` — Extracted facts\n- `relations: Vec<RelationTriple>` — Relationship triples for the knowledge graph\n- `has_content: bool` — Whether anything was found\n- `conflicts: Vec<MemoryConflict>` — Detected contradictions\n\n### Conflict Decision (`decide_action`)\n\nThe default implementation in the trait provides a **tiered heuristic** that any implementor can override:\n\n```\n1. Exact string match → Noop\n2. Existing ⊃ new     → Noop (already covered)\n3. New ⊃ existing     → Update (new is more complete)\n4. Embedding available → cosine_similarity\n   else               → Jaccard word overlap (text_similarity)\n   ≥ 0.95             → Noop (near-duplicate)\n   > threshold*       → Update (best candidate wins)\n   otherwise          → Add\n```\n\n\\* Threshold is `0.5` when both memories share the same category, `0.6` otherwise.\n\nThe `MemoryAction` enum captures the outcome:\n\n```rust\npub enum MemoryAction {\n    Add,                                          // No conflict\n    Update { existing_id: String },               // Supersedes existing\n    Noop,                                         // Duplicate / subsumed\n}\n```\n\nWhen an `Update` action is taken and the old and new content appear contradictory (low similarity + negation patterns), a `MemoryConflict` is surfaced in the `MemoryAddResult` so callers can log or handle it.\n\n### `DefaultMemoryExtractor`\n\nA rule-based extractor that requires **no LLM**. It scans user messages for keyword patterns across four categories:\n\n| Category | Example triggers |\n|----------|-----------------|\n| Preference | \"I prefer …\", \"I never …\", \"My favorite …\" |\n| Personal detail | \"My name is …\", \"I work at …\", \"I live in …\" |\n| Tool/technology | \"I use …\", \"Our tech stack is …\", \"I code in …\" |\n| Project context | \"I'm trying to …\", \"The bug is …\" (session-level, >10 chars) |\n\nExtraction uses `extract_after_pattern` to grab the phrase up to the first sentence boundary, avoiding storing entire messages. Internal dedup (`push_memory`) skips identical content.\n\nThe `format_context` method produces a natural-language preamble that instructs the agent to use remembered context naturally without meta-commentary (\"based on my memory…\").\n\n---\n\n## Similarity Functions\n\n### `text_similarity(a, b) -> f32`\n\nJaccard word overlap. Tokenizes both strings on whitespace, computes intersection/union. Returns `0.0` for two empty strings (not `1.0`).\n\nUsed as a fallback when embeddings are unavailable.\n\n### `cosine_similarity(a, b) -> f32`\n\nStandard dot-product cosine similarity on `f32` slices. Returns:\n- `1.0` for identical direction\n- `0.0` for orthogonal or empty/mismatched vectors\n- `-1.0` for opposite direction\n\n---\n\n## Configuration: `ProactiveMemoryConfig`\n\nControls the proactive memory subsystem. Loaded from `config.toml` under `[proactive_memory]`.\n\n| Field | Default | Purpose |\n|-------|---------|---------|\n| `enabled` | `true` | Master toggle |\n| `auto_memorize` | `true` | Extract after agent execution |\n| `auto_retrieve` | `true` | Load context before agent execution |\n| `max_retrieve` | `10` | Cap on memories per query |\n| `extraction_threshold` | `0.7` | Confidence floor for near-duplicate detection |\n| `extraction_model` | `None` | LLM model for extraction; `None` → rule-based |\n| `extract_categories` | 7 defaults (communication_style, preference, expertise, …) | Restricts what the extractor looks for |\n| `session_ttl_hours` | `24` | Auto-cleanup age for session memories |\n| `duplicate_threshold` | `0.5` | Similarity floor for duplicate detection |\n| `confidence_decay_rate` | `0.01` | Exponential decay per day (~70 days to halve) |\n| `max_memories_per_agent` | `1000` | Eviction cap; `0` disables |\n\n---\n\n## Cross-Crate Integration Points\n\nThis module has no outgoing dependencies — it only defines types. The rest of the system consumes it:\n\n| Consumer | What it uses |\n|----------|-------------|\n| `librefang-memory/src/proactive.rs` | `ProactiveMemory`, `ProactiveMemoryHooks` implementations; `MemoryAddResult`, `MemoryId`, `text_similarity`, `scope_str`, `Entity`, `Relation` |\n| `librefang-memory/src/semantic.rs` | `MemoryFragment`, `VectorSearchResult` as return types |\n| `librefang-memory/src/substrate.rs` | `ImportReport` from the `Memory::import` path |\n| `librefang-runtime/src/proactive_memory.rs` | `ProactiveMemoryConfig`, `MemoryExtractor` implementation (LLM-backed); `ExtractionResult`, `RelationTriple`, `MemoryItem` for parsing LLM responses |\n| `librefang-runtime/src/agent_loop.rs` | `MemoryFilter`, `MemoryFragment`, `MemoryId`, `scope_str` for proactive item → fragment conversion and recalled-memory setup |\n| `librefang-runtime/src/context_engine.rs` | `MemoryFragment`, `MemoryFilter` for context ingestion |\n| `src/routes/memory.rs` | `MemoryFragment` for update/delete flows |\n\n---\n\n## Operational Flows\n\n### Adding a Memory (mem0-style)\n\n```mermaid\nsequenceDiagram\n    participant AL as Agent Loop\n    participant PM as ProactiveMemory impl\n    participant ME as MemoryExtractor\n    participant VS as VectorStore\n\n    AL->>PM: add(messages, user_id)\n    PM->>ME: extract_memories(messages, categories)\n    ME-->>PM: ExtractionResult (memories + relations)\n    loop For each extracted memory\n        PM->>ME: decide_action(new_item, existing)\n        ME-->>PM: MemoryAction (Add/Update/Noop)\n        alt Add\n            PM->>VS: insert(id, embedding, payload, meta)\n        else Update\n            PM->>VS: delete(old_id)\n            PM->>VS: insert(new_id, embedding, payload, meta)\n        end\n    end\n    PM-->>AL: Vec<MemoryItem>\n```\n\n### Auto-Memorize / Auto-Retrieve Cycle\n\n1. **Before execution**: Agent loop calls `auto_retrieve(user_id, query, peer_id)`. Relevant memories are loaded and injected into the agent's context via `format_context`.\n2. **After execution**: Agent loop calls `auto_memorize(user_id, conversation, peer_id)`. New facts are extracted and stored. Session memories older than `session_ttl_hours` are cleaned up. If `max_memories_per_agent` is exceeded, oldest/lowest-confidence memories are evicted.\n\n### Confidence Decay\n\nMemories not accessed lose confidence over time following exponential decay:\n\n```\neffective_confidence = confidence * e^(-confidence_decay_rate * days_since_access)\n```\n\nWith the default rate of `0.01`, a memory retains ~50% confidence after ~70 days. Consolidation runs apply this decay and may merge or evict memories below threshold.","memory-system":"# Memory System\n\n# Memory System\n\nThe memory substrate for the LibreFang Agent Operating System. It provides persistent storage, semantic search, and proactive context management across agent conversations.\n\n## Sub-modules\n\n| Module | Role |\n|--------|------|\n| [**Types**](librefang-types-src.md) | Data structures and trait contracts — `MemoryFragment`, `MemoryItem`, `Entity`, `Relation`, plus the `Memory`, `VectorStore`, and `ProactiveMemory` traits |\n| [**Memory**](librefang-memory-src.md) | Storage substrate — SQLite-backed implementations of every store (structured, semantic, session, knowledge, prompt, usage) and background maintenance |\n| [**Runtime**](librefang-runtime-src.md) | Runtime services — embedding drivers for vector computation and the LLM-powered proactive memory engine |\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"librefang-types\"\n        T[Traits & Types]\n    end\n\n    subgraph \"librefang-runtime\"\n        ED[Embedding Drivers]\n        PM[Proactive Memory Engine]\n        LLM[LLM Memory Extractor]\n    end\n\n    subgraph \"librefang-memory\"\n        MS[MemorySubstrate]\n        SS[SemanticStore]\n        ST[StructuredStore]\n        SE[SessionStore]\n        KS[KnowledgeStore]\n        PS[PromptStore]\n        UT[UsageTracker]\n        VS[VectorStore]\n    end\n\n    PM -->|uses| ED\n    PM -->|uses| LLM\n    PM -->|stores via| MS\n    PM -.->|implements trait| T\n    ED -.->|implements trait| T\n    MS --> SS\n    MS --> ST\n    MS --> SE\n    MS --> KS\n    MS --> PS\n    MS --> UT\n    SS --> VS\n    MS -.->|implements trait| T\n\n    VS -->|embedding vectors| ED\n```\n\n## How the pieces fit together\n\n**Types** defines the contracts. Every trait (`Memory`, `VectorStore`, `ProactiveMemory`, `MemoryExtractor`) and data structure (`MemoryFragment`, `MemoryItem`, `Entity`, `Relation`) lives there. The other two modules implement these traits.\n\n**Memory** is the persistence layer. `MemorySubstrate` provides a unified API over six SQLite-backed stores — structured key-value, semantic vector search, session history, knowledge graph, prompt templates, and usage tracking. It also runs background maintenance for decay, consolidation, and eviction.\n\n**Runtime** provides the two services that make memory intelligent:\n\n1. **Embedding drivers** compute vector representations via OpenAI-compatible endpoints, Cohere's native API, or AWS Bedrock (with SigV4 signing). The `create_embedding_driver` factory and `detect_embedding_provider` auto-wiring handle provider selection from environment variables.\n\n2. **Proactive memory** automatically extracts facts from conversations using an LLM, resolves conflicts with existing memories, and injects relevant context into future agent turns. `EmbeddingBridge` connects the embedding drivers to the proactive memory store for similarity-based retrieval.\n\n## Key cross-module workflows\n\n**Proactive memory extraction**: An agent conversation passes through `SessionStore` → text extraction → `ProactiveMemoryStore` invokes `LlmMemoryExtractor` → the LLM returns extracted facts → they are deduplicated, embedded via an `EmbeddingDriver`, and stored in `SemanticStore` with vector indices.\n\n**Semantic retrieval**: A query is embedded by an `EmbeddingDriver` → `VectorStore` performs similarity search against stored vectors in SQLite (or delegates to a remote service like Qdrant) → matching `MemoryFragment` records are returned ranked by cosine similarity.\n\n**Global budget tracking**: Token usage is recorded through `UsageTracker` during LLM calls, feeding back into memory decisions about when to consolidate or evict.\n\nSee the individual sub-module pages for implementation details, configuration options, and API reference.","networking-p2p":"# Networking & P2P\n\n# Networking & P2P — LibreFang Wire Protocol (OFP)\n\nThe `librefang-wire` crate implements the LibreFang Wire Protocol, a TCP-based peer-to-peer networking layer that enables LibreFang kernels running on different machines to discover each other's agents, exchange messages, and coordinate work. All communication is authenticated via HMAC-SHA256 with a shared secret.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    K1[Kernel A] --> PN1[PeerNode]\n    K2[Kernel B] --> PN2[PeerNode]\n    PN1 -->|TCP + OFP| PN2\n    PN1 --> PR1[PeerRegistry]\n    PN2 --> PR2[PeerRegistry]\n    PN1 -->|PeerHandle trait| K1\n    PN2 -->|PeerHandle trait| K2\n    PN1 -->|broadcast_notification| PN2\n```\n\nEach kernel owns one `PeerNode` that both listens for inbound connections and initiates outbound ones. The `PeerHandle` trait is the integration point — the kernel implements it to route incoming remote requests to its local agents. `PeerRegistry` tracks all known peers and their advertised agents in a thread-safe map.\n\n## Wire Protocol\n\nAll messages use a length-prefixed JSON framing over TCP:\n\n```\n[4 bytes: big-endian length of JSON body]\n[N bytes: JSON-encoded WireMessage]\n```\n\nPost-handshake, every frame also carries a trailing 64-character hex HMAC:\n\n```\n[4 bytes: length of (JSON + HMAC)]\n[JSON body]\n[64 bytes: hex-encoded HMAC-SHA256 of JSON body, keyed with session key]\n```\n\nThe maximum frame size is 16 MB (`MAX_MESSAGE_SIZE`).\n\n### Message Envelope\n\nEvery message is a `WireMessage` containing a unique `id` and a `kind` (one of `Request`, `Response`, or `Notification`):\n\n```rust\npub struct WireMessage {\n    pub id: String,\n    pub kind: WireMessageKind,\n}\n```\n\n`WireMessageKind` is a tagged enum with variants `Request(WireRequest)`, `Response(WireResponse)`, and `Notification(WireNotification)`.\n\nEncoding and decoding are handled by `encode_message()`, `decode_length()`, and `decode_message()` in `message.rs`.\n\n### Request Types\n\n| Method | Purpose |\n|--------|---------|\n| `handshake` | Exchange identity, agent lists, and HMAC authentication |\n| `discover` | Query remote agents by name, tag, or description |\n| `agent_message` | Send a message to a specific remote agent and get a response |\n| `ping` | Liveness check — responds with `pong` and uptime |\n\n### Response Types\n\n| Method | Purpose |\n|--------|---------|\n| `handshake_ack` | Acknowledge handshake with own identity and HMAC |\n| `discover_result` | Return matching `RemoteAgentInfo` list |\n| `agent_response` | Return agent's text reply |\n| `pong` | Uptime in seconds |\n| `error` | Error code + message |\n\n### Notification Types (one-way, no response)\n\n| Event | Purpose |\n|-------|---------|\n| `agent_spawned` | A new agent is available on the peer |\n| `agent_terminated` | An agent was shut down |\n| `shutting_down` | Peer is going offline |\n\n## Authentication & Security\n\n### Handshake Flow\n\n1. **Client** generates a random nonce, computes `HMAC-SHA256(shared_secret, nonce + node_id)`, and sends a `Handshake` request.\n2. **Server** verifies the HMAC using constant-time comparison. If valid, generates its own nonce + HMAC and replies with `HandshakeAck`.\n3. Both sides derive a **per-session key**: `HMAC-SHA256(shared_secret, our_nonce + their_nonce)`.\n4. All subsequent messages on this connection use `write_message_authenticated` / `read_message_authenticated`, which append and verify a per-message HMAC keyed with the session key.\n\n```mermaid\nsequenceDiagram\n    participant C as Client\n    participant S as Server\n    C->>S: Handshake {nonce_c, HMAC(secret, nonce_c + node_c)}\n    S->>S: verify HMAC, check nonce replay\n    S->>C: HandshakeAck {nonce_s, HMAC(secret, nonce_s + node_s)}\n    C->>C: verify HMAC, check nonce replay\n    Note over C,S: Both derive: session_key = HMAC(secret, nonce_c + nonce_s)\n    C->>S: AgentMessage + HMAC(session_key, body)\n    S->>C: AgentResponse + HMAC(session_key, body)\n```\n\n### Nonce Replay Protection\n\n`NonceTracker` prevents replay attacks using a concurrent `DashMap`:\n\n- **5-minute window** — nonces older than this are garbage-collected on each insertion.\n- **100k entry cap** — if the map is full after GC, new nonces are rejected to prevent unbounded memory growth under flood.\n- **Atomic check-and-record** — uses `DashMap::entry()` API in a single call, eliminating TOCTOU races where two concurrent handshakes with the same replayed nonce could both pass.\n\n### Security Guarantees\n\n- `PeerNode::start` **refuses to boot** if `shared_secret` is empty.\n- Any message sent before completing the handshake is rejected with error code 401.\n- HMAC comparison uses `subtle::ConstantTimeEq` to prevent timing attacks.\n- Session keys are unique per connection even when the shared secret is reused, because they incorporate both sides' random nonces.\n- Nonce ordering matters: `derive_session_key(secret, our_nonce, their_nonce)` produces different keys depending on argument order, so each side calls it with its own nonce first.\n\n## PeerNode\n\n`PeerNode` is the main networking object. It binds a TCP listener, accepts inbound connections, and can initiate outbound connections.\n\n### Starting a Node\n\n```rust\nlet (node, task_handle) = PeerNode::start(config, registry, handle).await?;\n```\n\n- `config: PeerConfig` — listen address, node ID, node name, shared secret.\n- `registry: PeerRegistry` — where discovered peers are tracked.\n- `handle: Arc<dyn PeerHandle>` — the kernel's implementation of request routing.\n\nReturns the node (wrapped in `Arc`) and a `JoinHandle` for the accept loop task.\n\n### Connecting to a Peer\n\n```rust\nnode.connect_to_peer(remote_addr, handle.clone()).await?;\n```\n\nPerforms the full HMAC handshake, registers the peer in the local `PeerRegistry`, and spawns a background task for the message dispatch loop.\n\n### Sending a One-Shot Message\n\n```rust\nlet response = node.send_to_peer(\"node-2\", \"coder\", \"Write hello world\", None, handle).await?;\n```\n\nOpens a fresh TCP connection, performs the handshake, sends an `AgentMessage`, reads the `AgentResponse`, and closes. This is stateless — each call is a complete authenticated session.\n\n### Broadcasting Notifications\n\n```rust\nlet errors = broadcast_notification(&registry, WireNotification::AgentSpawned { agent }, &secret).await;\n```\n\nIterates all connected peers, opens a connection to each, derives a per-message key from a fresh nonce, and sends the notification with HMAC. Returns a list of `(node_id, WireError)` for any peers that failed to receive it.\n\n## PeerHandle Trait\n\nThe kernel implements `PeerHandle` to bridge the wire protocol with the local agent runtime:\n\n```rust\n#[async_trait]\npub trait PeerHandle: Send + Sync + 'static {\n    fn local_agents(&self) -> Vec<RemoteAgentInfo>;\n    async fn handle_agent_message(&self, agent: &str, message: &str, sender: Option<&str>) -> Result<String, String>;\n    fn discover_agents(&self, query: &str) -> Vec<RemoteAgentInfo>;\n    fn uptime_secs(&self) -> u64;\n}\n```\n\n- `local_agents()` — called during handshake and discovery to advertise what this node offers.\n- `handle_agent_message()` — routes an incoming remote message to the named local agent and returns its response.\n- `discover_agents()` — performs a local search matching name, tags, or description.\n- `uptime_secs()` — reported in `Pong` responses.\n\n## PeerRegistry\n\nA thread-safe (`Arc<RwLock<HashMap>>`) store for all known peers. Key operations:\n\n| Method | Description |\n|--------|-------------|\n| `add_peer(entry)` | Register/update a peer after handshake |\n| `remove_peer(node_id)` | Remove entirely |\n| `mark_disconnected(node_id)` | Set state to `Disconnected` (kept for reconnect) |\n| `mark_connected(node_id)` | Restore to `Connected` |\n| `get_peer(node_id)` | Snapshot of a single peer |\n| `connected_peers()` | All peers in `Connected` state |\n| `find_agents(query)` | Search across all connected peers' agents (matches name, tags, description, case-insensitive) |\n| `all_remote_agents()` | Every agent on every connected peer |\n| `add_agent(node_id, agent)` / `remove_agent(node_id, agent_id)` | Update a peer's agent list after notifications |\n| `connected_count()` / `total_count()` | Peer counts |\n\n`find_agents` returns `Vec<RemoteAgent>`, which pairs each `RemoteAgentInfo` with the `peer_node_id` that hosts it — callers need both to route messages.\n\n## Connection Lifecycle\n\nThe `connection_loop` function drives post-handshake communication:\n\n1. Reads a message (authenticated or plain depending on whether a session key exists).\n2. For `Notification` variants — dispatches to `handle_notification` which updates the registry (adds/removes agents, marks peers disconnected).\n3. For `Request` variants — calls `handle_request_in_loop` which dispatches to the `PeerHandle` implementation and writes the response.\n4. For `Response` variants — logs a warning (unexpected in the connection loop; responses flow back through `send_to_peer`).\n5. On connection close or error, the peer is marked disconnected in the registry.\n\n## Integration with the Rest of LibreFang\n\n- The **REST API** (`src/routes/network.rs`) reads from `PeerRegistry` to serve `network_status`, `list_peers`, and `comms_topology` endpoints.\n- The **WebSocket handler** (`librefang-api/src/ws.rs`) queries `all_peers` for the dashboard.\n- The **channel bridge** (`librefang-api/src/channel_bridge.rs`) formats peer lists for chat platforms.\n- The **event bus** (`librefang-types/src/event.rs`) defines `NetworkEvent` variants (`PeerConnected`, `PeerDisconnected`, `MessageReceived`, `DiscoveryResult`) that the kernel fires in response to wire protocol activity.\n- **Topology types** (`librefang-types/src/comms.rs`) — `Topology`, `TopoNode`, `TopoEdge` — represent the agent graph for the UI, built from both local and remote agent data.\n\n## Configuration\n\n`PeerConfig` fields:\n\n| Field | Default | Description |\n|-------|---------|-------------|\n| `listen_addr` | `127.0.0.1:0` | TCP bind address (port 0 = OS-assigned) |\n| `node_id` | Random UUID | Unique node identifier |\n| `node_name` | `\"librefang-node\"` | Human-readable name |\n| `shared_secret` | **empty (required)** | HMAC pre-shared key. Set `[network] shared_secret` in `config.toml` |\n\n## Error Handling\n\n`WireError` covers all failure modes:\n\n- `Io` — TCP read/write failures\n- `Json` — malformed messages\n- `HandshakeFailed` — HMAC mismatch, nonce replay, version mismatch, or missing secret\n- `ConnectionClosed` — clean shutdown\n- `MessageTooLarge` — frame exceeds 16 MB\n- `VersionMismatch` — protocol version disagreement\n\n## Protocol Version\n\nThe current protocol version is `1` (`PROTOCOL_VERSION` constant in `message.rs`). Both sides check version equality during handshake and refuse mismatches.","other-agents-md":"# Other — AGENTS.md\n\n# AGENTS.md — GitNexus Code Intelligence Agent Instructions\n\n## Purpose\n\nThis file is a **policy and reference document** consumed by AI coding agents (Claude, Cursor, etc.) operating within the `crates` repository. It enforces a mandatory safety protocol: no symbol-level edit may proceed without first assessing its blast radius through GitNexus's static analysis index.\n\nThe repository is pre-indexed by GitNexus with **24,313 symbols**, **56,272 relationships**, and **300 execution flows**. The instructions in this file ensure agents leverage that index rather than falling back to fragile text search or blind edits.\n\n## How It Works\n\nWhen an AI agent loads this project, it reads `AGENTS.md` and adopts the rules as operational constraints. The file defines two categories of rules and provides a lookup table for task-specific skill files.\n\n### Mandatory Safety Gate\n\nEvery code modification must pass through a two-step gate:\n\n```mermaid\nflowchart LR\n    A[Proposed Edit] --> B[gitnexus_impact]\n    B --> C{Risk Level?}\n    C -->|LOW/MEDIUM| D[Proceed with Edit]\n    C -->|HIGH/CRITICAL| E[Warn User]\n    E --> D\n    D --> F[gitnexus_detect_changes]\n    F --> G[Commit]\n```\n\n1. **Pre-edit**: Run `gitnexus_impact({target, direction: \"upstream\"})` to surface the blast radius — direct callers, affected processes, and risk classification.\n2. **Pre-commit**: Run `gitnexus_detect_changes()` to confirm changes are scoped to expected symbols and flows.\n\nIf either step surfaces `HIGH` or `CRITICAL` risk, the agent **must** warn the user before proceeding.\n\n### Exploration Workflow\n\nFor read-only tasks (understanding architecture, tracing bugs), the agent uses:\n\n- **`gitnexus_query({query: \"concept\"})`** — Returns execution flows matching a conceptual query, grouped by process and ranked by relevance. Replaces manual `grep`/`ripgrep`.\n- **`gitnexus_context({name: \"symbolName\"})`** — Returns full neighborhood context for a symbol: callers, callees, and participating execution flows.\n- **Resource URIs** — Structured data sources for browsing clusters, processes, and step-by-step traces.\n\n## Key Components\n\n### Agent Rules\n\n| Category | Rules | Intent |\n|----------|-------|--------|\n| **Always Do** | Run impact analysis before edits; run change detection before commits; warn on HIGH/CRITICAL risk; use query instead of grep; use context for full symbol detail | Prevent unscoped breakage |\n| **Never Do** | Edit without impact analysis; ignore risk warnings; find-and-replace renames; commit without change detection | Prevent common agent mistakes |\n\n### Tool Reference\n\n| Tool | Invocation | Purpose |\n|------|------------|---------|\n| `gitnexus_impact` | `gitnexus_impact({target: \"symbolName\", direction: \"upstream\"})` | Blast radius analysis for a symbol |\n| `gitnexus_detect_changes` | `gitnexus_detect_changes()` | Verify change scope before committing |\n| `gitnexus_query` | `gitnexus_query({query: \"concept\"})` | Search execution flows by concept |\n| `gitnexus_context` | `gitnexus_context({name: \"symbolName\"})` | Full caller/callee/flow context |\n| `gitnexus_rename` | Implicit (referenced in Never Do) | Graph-aware renaming across the codebase |\n\n### Resource URIs\n\nAgents can read structured data directly:\n\n- `gitnexus://repo/crates/context` — Codebase overview and index freshness check\n- `gitnexus://repo/crates/clusters` — All functional areas\n- `gitnexus://repo/crates/processes` — All execution flows\n- `gitnexus://repo/crates/process/{name}` — Step-by-step execution trace for a named process\n\n### Skill File Routing\n\nTask-specific workflows are delegated to dedicated skill files under `.claude/skills/gitnexus/`:\n\n| Task Type | Skill File |\n|-----------|------------|\n| Architecture exploration | `gitnexus-exploring/SKILL.md` |\n| Blast radius / impact analysis | `gitnexus-impact-analysis/SKILL.md` |\n| Bug tracing | `gitnexus-debugging/SKILL.md` |\n| Refactoring (rename, extract, split) | `gitnexus-refactoring/SKILL.md` |\n| Tool and schema reference | `gitnexus-guide/SKILL.md` |\n| CLI commands (index, status, clean, wiki) | `gitnexus-cli/SKILL.md` |\n\n## Stale Index Handling\n\nIf any GitNexus tool reports a stale index, the agent should instruct the user to regenerate it by running:\n\n```bash\nnpx gitnexus analyze\n```\n\nThis must happen before relying on any query, impact, or context results, since stale data could produce incorrect blast radius assessments.\n\n## Relationship to the Rest of the Codebase\n\nThis file has **no runtime code, no imports, and no call graph**. It is a static Markdown configuration consumed at agent session start. Its effectiveness depends entirely on:\n\n1. The **GitNexus MCP server** being connected and serving the indexed data.\n2. The **skill files** under `.claude/skills/gitnexus/` being present and containing current tool schemas.\n3. The **index** being up to date with the current source tree.\n\nIf any of these dependencies are missing, the agent will lack the context needed to follow the rules in this file, and edits will proceed without safety checks — the exact scenario this document is designed to prevent.","other-claude-md":"# Other — CLAUDE.md\n\n# CLAUDE.md — GitNexus Operational Directives\n\n## Purpose\n\n`CLAUDE.md` is not executable code. It is a **directive file** consumed by the Claude AI assistant to enforce safe coding practices when working on the `crates` codebase. It defines mandatory workflows, prohibited actions, and navigation aids that leverage the GitNexus code intelligence index (24,313 symbols, 56,272 relationships, 300 execution flows).\n\nEvery instruction in this file exists to prevent Claude from making blind edits that cascade through the call graph undetected.\n\n## Mandatory Workflows\n\n### Pre-Edit Impact Analysis\n\nBefore modifying any function, class, or method, Claude **must** run:\n\n```\ngitnexus_impact({target: \"symbolName\", direction: \"upstream\"})\n```\n\nThis returns:\n- **Direct callers** of the target symbol\n- **Affected processes** (execution flows that traverse the symbol)\n- **Risk level** classification\n\nIf the risk level is `HIGH` or `CRITICAL`, Claude must warn the user and obtain explicit confirmation before proceeding.\n\n### Pre-Commit Change Detection\n\nBefore committing any changes, Claude **must** run:\n\n```\ngitnexus_detect_changes()\n```\n\nThis verifies that the diff only touches expected symbols and execution flows. If unexpected symbols appear in the results, the commit should be held and the discrepancy reported to the user.\n\n## Prohibited Actions\n\n| Prohibition | Rationale |\n|---|---|\n| Editing without `gitnexus_impact` | Changes with unknown blast radius can silently break downstream consumers |\n| Ignoring HIGH/CRITICAL warnings | These indicate significant surface area affected by the proposed edit |\n| Find-and-replace renaming | Textual substitution misses dynamic references; `gitnexus_rename` traces the call graph |\n| Committing without `gitnexus_detect_changes` | Prevents accidental scope creep in commits |\n\n## Navigation Patterns\n\n### Exploring Unfamiliar Code\n\nInstead of grepping, use semantic queries:\n\n```\ngitnexus_query({query: \"concept\"})\n```\n\nReturns process-grouped results ranked by relevance — faster and more accurate than text search.\n\n### Deep Symbol Context\n\nFor full caller/callee/flow information on a specific symbol:\n\n```\ngitnexus_context({name: \"symbolName\"})\n```\n\n## Exposed Resources\n\nThese URI-based resources provide structured views into the codebase:\n\n| Resource URI | Content |\n|---|---|\n| `gitnexus://repo/crates/context` | Codebase overview; index freshness check |\n| `gitnexus://repo/crates/clusters` | All functional areas of the codebase |\n| `gitnexus://repo/crates/processes` | Complete list of indexed execution flows |\n| `gitnexus://repo/crates/process/{name}` | Step-by-step trace of a specific execution flow |\n\n## Skill File Reference\n\nTask-specific operational procedures are delegated to skill files under `.claude/skills/gitnexus/`:\n\n| Task | Skill File |\n|---|---|\n| Architecture exploration | `gitnexus-exploring/SKILL.md` |\n| Impact / blast radius analysis | `gitnexus-impact-analysis/SKILL.md` |\n| Bug tracing | `gitnexus-debugging/SKILL.md` |\n| Refactoring (rename, extract, split) | `gitnexus-refactoring/SKILL.md` |\n| Tool & schema reference | `gitnexus-guide/SKILL.md` |\n| CLI commands (index, status, clean) | `gitnexus-cli/SKILL.md` |\n\n## Index Staleness\n\nGitNexus tools may warn that the index is stale. When this happens, regenerate it before relying on any query results:\n\n```bash\nnpx gitnexus analyze\n```\n\n## Architecture Context\n\n```mermaid\nflowchart TD\n    A[CLAUDE.md] --> B[Mandatory Rules]\n    A --> C[Resources]\n    A --> D[Skill Files]\n\n    B --> B1[gitnexus_impact]\n    B --> B2[gitnexus_detect_changes]\n    B --> B3[gitnexus_rename]\n\n    C --> C1[repo/context]\n    C --> C2[repo/clusters]\n    C --> C3[repo/processes]\n    C --> C4[repo/process/name]\n\n    D --> D1[exploring]\n    D --> D2[impact-analysis]\n    D --> D3[debugging]\n    D --> D4[refactoring]\n    D --> D5[guide]\n    D --> D6[cli]\n```\n\nThis file has no imports, no exports, and no runtime behavior. It is consumed at session startup by Claude and governs all subsequent interactions with the codebase through GitNexus MCP tools.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\nThe admin dashboard for LibreFang — a single-page application built with React 19, TanStack Router v1, and TanStack Query v5. It provides real-time management of agents, sessions, workflows, channels, skills, and the full agent operating system.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    P[\"Pages<br/>src/pages/\"] --> Q[\"Query Hooks<br/>src/lib/queries/\"]\n    P --> M[\"Mutation Hooks<br/>src/lib/mutations/\"]\n    Q --> K[\"Query Key Factories<br/>src/lib/queries/keys.ts\"]\n    M --> K\n    Q --> HC[\"HTTP Client<br/>src/lib/http/client.ts\"]\n    M --> HC\n    HC --> API[\"Raw API Calls<br/>src/api.ts\"]\n    API --> SV[\"LibreFang Server<br/>/api/*\"]\n    P -->|SSE/WebSocket| SV\n```\n\n## Tech Stack\n\n| Layer | Technology |\n|---|---|\n| Framework | React 19, TanStack Router v1 |\n| Data fetching | TanStack Query v5 |\n| State management | Zustand (client-side UI state) |\n| Build | Vite 7, TailwindCSS 4 |\n| Language | TypeScript strict mode |\n| Routing | File-based via TanStack Router |\n| Canvas | XYFlow (`@xyflow/react`) for workflow visual editor |\n| Terminal | xterm.js (`@xterm/xterm`) for agent terminal sessions |\n| Charts | Recharts |\n| i18n | i18next + react-i18next |\n| TOML parsing | smol-toml |\n| PWA | Service worker with stale-while-revalidate caching |\n\n## Data Layer Architecture\n\nAll server data flows through a layered hooks system. Pages and components never call `fetch()` or `api.*` directly (except documented exceptions for streaming/SSE).\n\n### Directory Layout\n\n```\nsrc/\n├── api.ts                         # Raw fetch wrappers, auth helpers\n├── main.tsx                       # App entry point\n├── pages/                         # Route pages\n├── components/                    # Shared UI components\n├── lib/\n│   ├── http/\n│   │   ├── client.ts              # Typed re-exports over api.ts\n│   │   └── errors.ts              # ApiError class\n│   ├── queries/\n│   │   ├── keys.ts                # Query-key factories (all domains)\n│   │   ├── keys.test.ts           # Anchoring/hierarchy smoke tests\n│   │   ├── <domain>.ts            # queryOptions + useXxx hooks\n│   │   └── ...\n│   ├── mutations/\n│   │   ├── <domain>.ts            # useXxx mutation hooks with invalidation\n│   │   └── ...\n│   ├── agentManifest.ts           # TOML manifest parser/serializer\n│   ├── agentManifestMarkdown.ts   # Manifest → Markdown renderer\n│   ├── chat.ts                    # Chat message normalization\n│   ├── chatPicker.ts              # Agent/hand grouping for chat picker\n│   └── test/\n│       └── query-client.tsx        # createQueryClientWrapper for tests\n├── openapi/\n│   └── generated.ts               # Auto-generated types from OpenAPI schema\n```\n\n### Domains\n\nThe data layer is organized by domain. Current domains:\n\n`agents`, `analytics`, `approvals`, `channels`, `config`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `workflows`\n\n## Query Key Factories\n\nEvery domain has a hierarchical query-key factory in `src/lib/queries/keys.ts`. Keys are anchored to a root `all` array so that broad invalidation cascades correctly through `queryClient.invalidateQueries`.\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nSub-keys like `agentKeys.sessions(agentId)`, `agentKeys.promptVersions(agentId)`, `agentKeys.experiments(agentId)`, and `agentKeys.experimentMetrics(experimentId)` extend the hierarchy for nested collections.\n\n**Invariant**: Every sub-key MUST be anchored with `...domainKeys.all`. The smoke tests in `keys.test.ts` verify this — add a test case whenever you add a new factory.\n\n## Query Hooks\n\nQuery hooks wrap `queryOptions` + `useQuery` and set sensible defaults for `staleTime` and `refetchInterval`. Consumers can override per-page:\n\n```ts\ntype UseFooOptions = {\n  enabled?: boolean;\n  staleTime?: number;\n  refetchInterval?: number | false;\n};\n\nexport function useFoo(filters?: FooFilters, options: UseFooOptions = {}) {\n  return useQuery({\n    ...fooQueryOptions(filters),\n    ...options,\n  });\n}\n```\n\n### Enabled Guards\n\nHooks that require a resource ID (e.g., `useAgentDetail(id)`, `useAgentSessions(id)`, `useExperiments(id)`) disable themselves when the ID is an empty string, preventing spurious fetches before route params resolve.\n\n## Mutation Hooks\n\nMutations encapsulate write operations and **must invalidate** the affected query keys inside the hook. Call sites never need to know which keys are touched.\n\n### Invalidation Strategy\n\nUse the narrowest key set that covers what actually changed:\n\n| Pattern | When to use | Example mutations |\n|---|---|---|\n| `detail(id)` + `lists()` | Per-id update where list projection also changes | `usePatchAgent`, `usePatchAgentConfig` |\n| `lists()` only | List-shape change, no existing detail to refresh | `useCreateAgent`, `useCreateWorkflow` |\n| `detail(id)` or nested sub-key | Change scoped to one detail or nested collection | `useSendHandMessage` → `handKeys.session(id)` |\n| `domain.all` | Bulk import, cache reset, cross-cutting change | `useSpawnAgent`, `useDeleteAgent`, `useUninstallHand` |\n\nExample — standard per-id patch:\n\n```ts\nexport function usePatchAgent() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: patchAgent,\n    onSuccess: (_data, variables) => {\n      qc.invalidateQueries({ queryKey: agentKeys.lists() });\n      qc.invalidateQueries({ queryKey: agentKeys.detail(variables.agentId) });\n    },\n  });\n}\n```\n\n### Cross-Domain Invalidation\n\nSome mutations touch multiple domains. For example:\n\n- **`useActivateHand`** invalidates `handKeys.all`, `agentKeys.all`, and `overviewKeys.snapshot()` because activating a hand spawns new agents and changes system overview.\n- **`useRunSchedule`** invalidates `scheduleKeys.all` and `cronKeys.all`.\n- **`useSetDefaultProvider`** invalidates `providerKeys.all`, `modelKeys.lists()`, and `runtimeKeys.status`.\n- **`useResolveApproval`** invalidates `approvalKeys.all`.\n- **`useDeleteAgentSession`** branches: with an `agentId` it invalidates `agentKeys.sessions(id)`, `agentKeys.detail(id)`, and `sessionKeys.lists()`; without one it falls back to `agentKeys.all` + `sessionKeys.lists()`.\n\n### Call-Site `onSuccess`/`onError`\n\nCall sites MAY attach per-call `onSuccess`/`onError` handlers for UI feedback (toasts, modal dismissal, local state). This is orthogonal to the built-in invalidation. Reference: `MemoryPage` delete/cleanup, `ChannelsPage` configure/test.\n\n## Authentication\n\nThe dashboard uses token-based auth stored in `localStorage` under the key `librefang-api-key`.\n\n- **`setApiKey(token)`** — stores the token.\n- **`authHeader()`** — reads the token and returns a `Bearer` authorization header.\n- **`verifyStoredAuth()`** — probes a protected endpoint; clears the stored token on 401.\n- **`buildAuthenticatedWebSocketUrl(path)`** — appends `?token=...` to WebSocket URLs.\n\nThe sign-in dialog appears when `/api/auth/dashboard-check` returns `{ mode: \"credentials\" }`. The E2E test in `e2e/dashboard.spec.ts` verifies this flow.\n\n### Error Handling Flow\n\nWhen any API call returns a non-2xx status:\n\n1. `api.ts` calls `parseError()` to construct an `ApiError` from the response.\n2. TanStack Query surfaces the error to the mutation/query hook.\n3. For 401s specifically, the flow may call `clearApiKey()` to force re-authentication.\n\n```\nPage → useMutation → client function → api.ts fetch → parseError → ApiError\n```\n\n## Agent Manifest System\n\n`src/lib/agentManifest.ts` handles parsing and serializing agent definition TOML files used by the LibreFang kernel.\n\n### Core Functions\n\n- **`parseManifestToml(toml)`** — parses a TOML string into a validated `{ form, extras, ok }` result. Form fields are first-class; anything the parser doesn't recognize is preserved in `extras`.\n- **`serializeManifestForm(form, extras?)`** — converts form state back to TOML, merging extras while respecting section scoping.\n- **`validateManifestForm(form)`** — returns an array of field paths with errors (e.g., missing `name`, `model.provider`, `model.model`).\n- **`emptyManifestForm()`** / **`emptyManifestExtras()`** — factory functions for blank state.\n\n### Key Design Decisions\n\n1. **Mutual exclusion**: When a form field covers a TOML key that also exists in `extras`, the form field wins during serialization. This prevents duplicate key/table conflicts (e.g., `exec_policy` shorthand vs. `[exec_policy]` table, `response_format` mode vs. preserved `[response_format]` extras).\n\n2. **Section scoping**: Nested TOML tables inside form-known sections (like `[model.exotic_subtable]`) are serialized after all form-known keys to avoid re-anchoring the section scope.\n\n3. **Number validation**: `serializeManifestForm` silently omits negative values, non-numeric strings, and values exceeding `MAX_SAFE_INTEGER` rather than producing invalid TOML.\n\n4. **Round-trip fidelity**: The test suite verifies that `parse(serialize(parse(toml)))` preserves both `form` and `extras` identically.\n\n### Advanced Fields\n\nThe manifest supports: `schedule` (periodic/continuous), `thinking` (budget_tokens, stream_thinking), `autonomous` (max_iterations, heartbeat_channel), `routing` (simple/medium/complex model tiers), `fallback_models`, `context_injection`, `response_format` (text/json/json_schema with inline schemas), `exec_policy` (deny/allowlist/full with alias normalization), and lifecycle overrides (`priority`, `session_mode`, `web_search_augmentation`, `pinned_model`, `workspace`, `allowed_plugins`).\n\n### Markdown Generation\n\n`src/lib/agentManifestMarkdown.ts` renders a manifest form as human-readable Markdown with sections for model, resources, capabilities, skills, MCP servers, schedule, fallback models, extended thinking, autonomous guardrails, model routing, context injections, response format, lifecycle overrides, and advanced configuration (extras).\n\n## Chat Utilities\n\n`src/lib/chat.ts` provides message normalization for the chat interface:\n\n- **`normalizeRole(role)`** — normalizes API role strings (`\"User\"` → `\"user\"`, etc.)\n- **`asText(value)`** — converts unknown content blocks to displayable text\n- **`formatMeta(meta)`** — formats usage metadata as `\"N in / M out | K iter | $X.XXXX\"`\n- **`normalizeToolOutput(event)`** — extracts tool name, content, and error status from tool output events; returns `null` for malformed events\n\n## Chat Picker Grouping\n\n`src/lib/chatPicker.ts` provides `groupedPicker(agents, hands, showHandAgents)` which organizes agents for the chat interface:\n\n- **Standalone agents**: Non-hand agents, always shown\n- **Hand groups**: When `showHandAgents` is true, hand-spawned agents are grouped under their hand instance header, sorted alphabetically by hand name\n- **Role ordering**: Within a hand group, the coordinator role comes first, then remaining roles alphabetically\n- **Filtering**: Inactive/paused hand instances and empty hand groups are hidden entirely\n\n## UI Components\n\n### MultiSelectCmdk\n\nA multi-select combobox built on `cmdk`. Features:\n- Chip display with per-item remove buttons\n- Backspace removes the last selected item\n- Fuzzy search filtering of options\n- Already-selected items are hidden from the dropdown\n- Controlled via `value`/`onChange` props\n\n## Navigation & Pages\n\nThe dashboard shell provides navigation to these primary sections (verified by E2E tests):\n\nOverview, Agents, Sessions, Approvals, Comms, Providers, Channels, Skills, Hands, Workflows, Scheduler, Goals, Analytics, Memory, Runtime, Logs\n\n## Service Worker & PWA\n\n`public/sw.js` implements a caching strategy:\n\n- **API requests** (`/api/*`): Network only — never cached\n- **Static assets**: Stale-while-revalidate — serve from cache, update in background\n- **Non-GET requests**: Bypassed (Cache API limitation)\n\nThe PWA manifest (`public/manifest.json`) configures standalone display with the LibreFang branding, theme color `#0284c7`, and background `#020617`.\n\n## E2E Tests\n\nPlaywright tests in `e2e/dashboard.spec.ts` run against a dev server on `127.0.0.1:4173`:\n\n1. **Shell load test**: Verifies all primary navigation links are visible and that clicking Comms, Hands, and Goals navigates correctly.\n2. **Auth dialog test**: Mocks `/api/auth/dashboard-check` to return `{ mode: \"credentials\" }` and verifies the sign-in dialog with username/password fields appears.\n\n## Unit Test Patterns\n\nTests use `createQueryClientWrapper` from `src/lib/test/query-client.tsx` which provides a test `QueryClient` and a React wrapper for `renderHook`. Key test patterns:\n\n- **Query tests**: Verify hooks are disabled on empty IDs, fetch correctly on valid IDs, and cache under the expected query key.\n- **Mutation tests**: Spy on `queryClient.invalidateQueries` and assert exact key sequences.\n- **Mutation tests with cross-domain effects**: Verify all touched domains are invalidated (e.g., `useActivateHand` touches hands, agents, and overview).\n- **Parser/serializer tests**: Round-trip verification, edge cases for TOML scoping, number validation, mutual exclusion of form fields vs. extras.\n\n## Build & Verification\n\n```bash\npnpm typecheck                # tsc --noEmit — must pass\npnpm test --run               # vitest — all tests must pass\npnpm build                    # vite build — must succeed\npnpm openapi:types            # Regenerate types from server OpenAPI schema\npnpm e2e                      # Playwright end-to-end tests\n```\n\nRun all three (`typecheck`, `test`, `build`) after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`. The key-factory tests catch anchoring regressions that TypeScript alone does not.\n\n## Adding a New Domain\n\n1. Add the raw API call in `src/api.ts`.\n2. Add a key factory in `src/lib/queries/keys.ts` following the hierarchical pattern.\n3. Add the query file at `src/lib/queries/<domain>.ts` with `queryOptions` and `useXxx` hooks.\n4. Add mutations at `src/lib/mutations/<domain>.ts` with correct invalidation.\n5. Update `src/lib/queries/keys.test.ts` with factory existence and anchoring tests.\n\n## Commit Conventions\n\nFollow the root repo pattern scoped to the dashboard:\n\n```\nfeat(dashboard/<area>): description\nrefactor(dashboard/queries): description\nfix(dashboard/<area>): description\n```\n\nNever include a `Co-Authored-By` footer.","other-librefang-api-src":"# Other — librefang-api-src\n\n# librefang-api-src — Login Page\n\n## Overview\n\n`login_page.html` is a self-contained, single-file login interface for the LibreFang dashboard. It ships as a static HTML document with embedded CSS and JavaScript — no build step, no external dependencies. The page handles credential collection, optional TOTP two-factor authentication, and client-side token persistence.\n\n## Purpose in the System\n\nThis page acts as the authentication gate for the LibreFang dashboard. When unauthenticated users hit a protected route, the server serves this page. After successful authentication, users are redirected to their originally requested destination (or `/dashboard/` by default).\n\n## Architecture\n\n```mermaid\nsequenceDiagram\n    participant U as User Browser\n    participant L as login_page.html\n    participant A as /api/auth/dashboard-login\n\n    U->>L: Loads login page\n    U->>L: Submits username + password\n    L->>A: POST {username, password}\n    A-->>L: {requires_totp: true}\n    L->>U: Shows TOTP input field\n    U->>L: Submits TOTP code\n    L->>A: POST {username, password, totp_code}\n    A-->>L: {ok: true, token: \"...\"}\n    L->>L: Store token in localStorage\n    L->>U: Redirect to dashboard\n```\n\n## Key Components\n\n### HTML Form (`#f`)\n\nThe form contains three input fields, only two of which are visible initially:\n\n| Element | ID | Purpose |\n|---|---|---|\n| Username input | `#u` | Collects the user's username. Has `autocomplete=\"username\"` and `autofocus`. |\n| Password input | `#p` | Collects the user's password. Type is `password` with `autocomplete=\"current-password\"`. |\n| TOTP code input | `#t` | Hidden by default (`#totp-row` has `hidden` attribute). Shown only when the API responds with `requires_totp: true`. Accepts exactly 6 numeric digits. |\n\nThe submit button (`#btn`) is disabled during in-flight requests to prevent double submission.\n\n### JavaScript Logic\n\nAll logic runs inside an immediately-invoked function expression (IIFE), keeping the global scope clean. Key behaviors:\n\n**State tracking:**\n- `requiresTotp` — a boolean flag, set to `true` when the server indicates TOTP is required for this account.\n\n**`setError(msg)`**\n- Sets or clears the text content of the `#err` element. The element has `aria-live=\"polite\"` so screen readers announce error messages automatically.\n\n**Form submission handler:**\n1. Prevents default form submission (`e.preventDefault()`).\n2. Clears any existing error and disables the button.\n3. Builds a JSON payload with `username` and `password`. If `requiresTotp` is true, includes `totp_code`.\n4. Sends a `POST` request to `/api/auth/dashboard-login` with `Content-Type: application/json` and `credentials: 'same-origin'` (includes cookies for session context).\n5. On success (`d.ok && d.token`):\n   - Stores the token in `localStorage` under the key `librefang-api-key` (wrapped in a `try/catch` to handle cases where localStorage is unavailable).\n   - Redirects to the current `location.pathname + location.search + location.hash`, falling back to `/dashboard/` if the path is `/`.\n6. If the response includes `requires_totp`:\n   - Sets `requiresTotp = true`, reveals the TOTP row, and focuses the TOTP input.\n   - Displays a prompt to enter the 6-digit code.\n7. Otherwise, displays the error from `d.error` or a generic fallback.\n8. On network failure, displays \"Network error.\"\n9. Re-enables the button in the `finally` block regardless of outcome.\n\n### Styling\n\nThe page uses a dark theme by default (`#0b0d12` background) with a light theme triggered by `prefers-color-scheme: light`. The card is centered using CSS Grid (`place-items: center`). All styling is done via embedded `<style>` with CSS custom properties for color scheme toggling.\n\nNotable design decisions:\n- `:root { color-scheme: light dark; }` ensures native form controls adapt to the active scheme.\n- The card has a max width of 380px with responsive scaling via `min(92vw, 380px)`.\n- Input focus states use a blue ring (`#7c8cff`) for clear visibility.\n- The `robots` meta tag is set to `noindex, nofollow` to prevent search engine indexing.\n\n## API Contract\n\nThe page communicates with a single endpoint:\n\n**`POST /api/auth/dashboard-login`**\n\nRequest body:\n```json\n{\n  \"username\": \"string\",\n  \"password\": \"string\",\n  \"totp_code\": \"123456\"    // optional, required on second step\n}\n```\n\nExpected responses:\n\n| Condition | Response Shape |\n|---|---|\n| Successful login | `{ \"ok\": true, \"token\": \"<jwt-or-api-key>\" }` |\n| TOTP required | `{ \"requires_totp\": true }` |\n| Any failure | `{ \"error\": \"<human-readable message>\" }` |\n\n## Token Storage\n\nOn successful authentication, the token is written to `localStorage` under the key **`librefang-api-key`**. Downstream dashboard pages or API clients should read from this key when making authenticated requests. The `try/catch` wrapper accounts for environments where localStorage access is blocked (e.g., Safari in private browsing mode or quota limits).\n\n## Configuration Reference\n\nThe footer message references `config.toml` as the location where authentication requirements are configured. This is a display-only hint to the operator — the page itself does not read any configuration file.\n\n## Integration Notes\n\n- **No build step required.** This file can be served directly by any static file server or embedded in a Go binary via `embed.FS` or equivalent.\n- **No external JavaScript or CSS dependencies.** Everything is self-contained.\n- **The page is locale-fixed to English** (`lang=\"en\"`). Internationalization would require externalizing the strings.\n- **The `credentials: 'same-origin'` fetch option** ensures cookies (e.g., CSRF or session cookies) are included in the request, matching the expectation that the API lives on the same origin.","other-librefang-api-static":"# Other — librefang-api-static\n\n# Static Locales — `librefang-api/static/`\n\n## Purpose\n\nThis directory contains the **i18n (internationalization) locale files** for the LibreFang web dashboard. Every user-facing string in the UI is defined here, organized as flat JSON key–value maps under semantic namespaces. The frontend loads the appropriate locale at runtime based on the user's language preference.\n\n## Supported Languages\n\n| File | Language | Code |\n|---|---|---|\n| `locales/en.json` | English (default) | `en` |\n| `locales/ja.json` | Japanese | `ja` |\n\n## File Format\n\nEach locale file is a single JSON object. Keys are dot-path navigable namespaces (e.g. `agentsPage.createAgent`), and values are the translated strings. Some strings contain **interpolation placeholders** in curly braces (e.g. `{count}`, `{name}`, `{message}`) that the frontend replaces at render time.\n\n```jsonc\n{\n  \"agentsPage\": {\n    \"agentSpawned\": \"Agent \\\"{name}\\\" spawned\",\n    \"agentsStopped\": \"{count} agent(s) stopped\"\n  }\n}\n```\n\n## Namespace Map\n\nThe key namespaces and the UI sections they serve:\n\n| Namespace | UI Section |\n|---|---|\n| `nav` | Sidebar navigation labels |\n| `status` | Connection / system status indicators |\n| `btn` | Shared button labels (Refresh, Save, Delete, etc.) |\n| `label` | Generic field labels |\n| `auth` | API key authentication gate |\n| `page` | Page title overrides |\n| `health` | Health check status text |\n| `stat` | Dashboard stat card labels |\n| `card` | Dashboard card titl
