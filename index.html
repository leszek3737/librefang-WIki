 can narrow with `err instanceof ApiError` to access structured error information.\n\n## The Client Re-export Layer\n\n`lib/http/client.ts` is a deliberate abstraction barrier between `api.ts` and the React Query layer. It re-exports specific functions and types — nothing is glob-exported.\n\n**Why this matters:**\n\n- Renaming or removing a function in `api.ts` breaks at `client.ts` first, not in dozens of hook files.\n- The whitelist is a reviewable surface — reviewers can see exactly what the data layer exposes.\n- `ApiError` is re-exported alongside the functions so hooks can `import { ApiError } from \"../http/client\"` without reaching into the errors module directly.\n\nThe file is organized into three sections: **query functions** (reads), **mutation functions** (writes), and **type re-exports**.\n\n## React Query Mutation Hooks\n\nEach `lib/mutations/*.ts` file exports `useMutation` hooks that:\n\n1. Call the corresponding `client.ts` function.\n2. Invalidate the affected query caches on success using `queryClient.invalidateQueries()`.\n\n### Cache invalidation patterns\n\nMutations use query key factories (imported from `lib/queries/keys`) to target precise cache slices:\n\n```typescript\n// Only invalidate one agent's detail\nqc.invalidateQueries({ queryKey: agentKeys.detail(variables.agentId) });\n\n// Invalidate the entire agents namespace\nqc.invalidateQueries({ queryKey: agentKeys.all });\n\n// Invalidate snapshot + agents when an agent is created\nqc.invalidateQueries({ queryKey: agentKeys.all });\nqc.invalidateQueries({ queryKey: overviewKeys.snapshot() });\n```\n\nSome mutations intentionally skip invalidation. For example, `useStopAgent` does not invalidate queries because stopping an agent's run does not change agent list state — the UI reconciles streaming state separately.\n\n### Domain-specific mutation files\n\n| File | Domain | Key Hooks |\n|---|---|---|\n| `agents.ts` | Agent CRUD, sessions, prompt versions, experiments | `useSpawnAgent`, `usePatchAgent`, `usePatchAgentConfig`, `useSwitchAgentSession`, `useCreatePromptVersion` |\n| `analytics.ts` | Budget | `useUpdateBudget` |\n| `approvals.ts` | Approval decisions, TOTP | `useApproveApproval`, `useRejectApproval`, `useBatchResolveApprovals`, `useTotpSetup` |\n| `autoDream.ts` | Memory consolidation | `useTriggerAutoDream`, `useAbortAutoDream`, `useSetAutoDreamEnabled` |\n| `channels.ts` | Channel config and testing | `useConfigureChannel`, `useTestChannel`, `useReloadChannels` |\n| `config.ts` | Configuration and batch writes | `useSetConfigValue`, `useBatchSetConfigValues`, `useReloadConfig` |\n| `goals.ts` | Goal CRUD | `useCreateGoal`, `useUpdateGoal`, `useDeleteGoal` |\n| `hands.ts` | Hand lifecycle and messaging | `useActivateHand`, `useDeactivateHand`, `useSendHandMessage` |\n| `mcp.ts` | MCP server management | `useAddMcpServer`, `useUpdateMcpServer`, `useReconnectMcpServer` |\n\n## Endpoint Coverage by Domain\n\n### Agents (`/api/agents/*`)\n\nListing, CRUD, session management, prompt versioning, and A/B experiments. Two distinct patch endpoints exist:\n\n- `patchAgent(id, body)` — manifest-level updates (name, system prompt, MCP servers, model).\n- `patchAgentConfig(id, config)` — runtime model tuning only (max tokens, temperature, web search augmentation).\n\n### Workflows (`/api/workflows/*`)\n\nFull lifecycle including a `dryRunWorkflow` endpoint that validates variable expansion without making LLM calls, and `saveWorkflowAsTemplate` to promote a workflow into a reusable template.\n\n### Skills (`/api/skills/*`, hubs)\n\nThree skill registries are surfaced:\n\n- **Local skills** — `listSkills`, `installSkill`, evolution APIs (`evolveUpdateSkill`, `evolvePatchSkill`, `evolveRollbackSkill`).\n- **ClawHub** — community marketplace (`clawhubBrowse`, `clawhubSearch`, `clawhubInstall`).\n- **SkillHub** — alternative registry (`skillhubBrowse`, `skillhubSearch`, `skillhubInstall`).\n- **FangHub** — official LibreFang registry (`fanghubListSkills`).\n\n### Hands (`/api/hands/*`)\n\nHands are persistent agent orchestrations. The API supports activation, pausing, settings management, secret injection, session messaging, and per-instance stats. Built-in hands cannot be uninstalled; `uninstallHand` works only for user-installed custom hands.\n\n### Memory (`/api/memory/*`)\n\nCRUD for memory items, semantic search, stats, config (embedding provider/model, decay rate, proactive memory toggles), and manual `decayMemories`/`cleanupMemories` operations.\n\n### MCP Servers (`/api/mcp/*`)\n\nUnified API for both raw-configured and catalog-installed servers. Includes health monitoring, OAuth flow (`startMcpAuth`, `revokeMcpAuth`), and a browseable catalog.\n\n### Media (`/api/media/*`)\n\nImage generation, speech synthesis, audio transcription (accepts a `Blob` directly with appropriate content type), video generation with polling, and music generation.\n\n### Configuration (`/api/config/*`)\n\nRead full config, get schema (with field types, options, and validation constraints), set individual values, export raw TOML, and reload. The reload response includes `restart_required` and `restart_reasons` so the UI can prompt the user.\n\n### Other domains\n\n- **Channels** — messaging channel setup (WeChat/WhatsApp QR flows), testing, reload.\n- **Comms** — inter-agent topology, events, message passing, task posting.\n- **Security** — security status, audit trail, approval queue with TOTP second factor.\n- **Budget/Usage** — cost tracking by agent/model/day, budget limits.\n- **Terminal** — tmux window management (list, create, rename, delete).\n- **Auto-Dream** — background memory consolidation status, triggering, and abort.\n- **Network/Peers/A2A** — p2p networking and agent-to-agent discovery.\n- **Plugins** — install, uninstall, scaffold, dependency installation, registry listing.\n\n## Adding a New Endpoint\n\n1. **Define the response interface** in `api.ts` if the backend returns a structured shape.\n2. **Implement the function** in `api.ts` using the appropriate HTTP primitive. Use `encodeURIComponent` on all path parameters. Use `LONG_RUNNING_TIMEOUT_MS` for operations that invoke LLM calls.\n3. **Re-export the function** in `lib/http/client.ts` in the correct section (query vs. mutation).\n4. **Re-export any new types** in the type section of `client.ts`.\n5. **Create a mutation hook** in the appropriate `lib/mutations/*.ts` file if the endpoint is a write operation. Add cache invalidation using the relevant query key factory.\n6. **Create a query hook** in `lib/queries/*.ts` if the endpoint is a read operation (not shown in this module but follows the same pattern through `client.ts`).\n\n## Conventions\n\n- All path parameters are encoded with `encodeURIComponent`.\n- Optional query parameters are built with `URLSearchParams` and conditionally appended.\n- Response arrays default to `[]` when the backend returns `undefined` (e.g., `data.providers ?? []`).\n- Integer query parameters are clamped to sane bounds (e.g., `listAuditRecent` limits to 1–1000).\n- The `Accept-Language` header is attached to every request for i18n-aware error messages from the backend.","dashboard-frontend":"# Dashboard Frontend\n\n# Dashboard Frontend\n\n## Overview\n\nThe Dashboard Frontend is a React-based single-page application that provides a management UI for the LibreFang agent platform. It communicates with the LibreFang kernel daemon via a RESTful HTTP API and real-time streaming endpoints (SSE/WebSocket). The codebase is split across two directory roots: `dashboard/src/` (core API layer, app shell, routing) and `src/` (page components, feature libraries, and shared utilities).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[openapi/generated.ts] -->|type safety| B[dashboard/src/api.ts]\n    B -->|HTTP client| C[LibreFang Kernel API]\n    B -->|auth headers| D[Auth Store<br/>localStorage]\n    E[lib/queries/] -->|React Query hooks| B\n    F[lib/mutations/] -->|React Query hooks| B\n    G[Page Components<br/>src/pages/*] -->|call| E\n    G -->|call| F\n    G -->|use| H[lib/utilities<br/>manifest, chat, i18n]\n    I[dashboard/src/App.tsx] -->|renders| J[dashboard/src/router.tsx]\n    J -->|routes to| G\n```\n\n## Key Layers\n\n### Auto-Generated API Types — `openapi/generated.ts`\n\nThis file is **machine-generated** by `openapi-typescript` from the kernel's OpenAPI spec. **Never edit it directly** — regenerate it when the backend API changes.\n\nIt exports three primary namespaces:\n\n| Export | Purpose |\n|--------|---------|\n| `paths` | Maps every API route to its HTTP methods, parameters, and operation IDs |\n| `operations` | Referenced by `paths` — contains request/response shapes per operation |\n| `components[\"schemas\"]` | Shared DTOs like `SpawnRequest`, `MessageRequest`, `BulkActionResult`, etc. |\n\nThe types are used implicitly by the hand-written API client in `dashboard/src/api.ts` to ensure compile-time correctness when calling endpoints.\n\n### API Client — `dashboard/src/api.ts`\n\nThe central HTTP client layer. Key responsibilities:\n\n- **HTTP methods**: Exports `get()`, `post()`, `put()`, `patch()`, `del()` helpers that build authenticated requests against the kernel's base URL.\n- **Authentication**: `buildHeaders()` → `authHeader()` reads the stored credential from localStorage via `getItem()`. Supports multiple auth modes:\n  - API key (`setApiKey()` / `clearApiKey()`)\n  - Dashboard credentials (`dashboardLogin()` / `dashboardLogout()`)\n  - OAuth2 token verification (`verifyStoredAuth()`)\n- **Error handling**: `parseError()` normalizes HTTP errors into `ApiError` instances (from `lib/http/errors.ts`), which propagates to React Query's error channels.\n- **Streaming**: Separate functions handle SSE endpoints (logs, comms events) and the chat WebSocket connection.\n\nPublic surface includes typed functions for every kernel endpoint, for example:\n- `getStatus()`, `getVersionInfo()` — system info\n- `runWorkflow()`, `updateWorkflow()` — workflow management\n- `testChannel()`, `configureChannel()` — channel setup\n- `createPromptVersion()`, `createAgentSession()` — agent operations\n\n### Data Fetching — React Query Hooks\n\nLocated in two directories:\n\n**Queries** (`lib/queries/`): Read-only data fetchers that wrap `api.ts` functions in `useQuery` hooks.\n\n| Module | Purpose |\n|--------|---------|\n| `lib/queries/providers.ts` | `useProviders()` — provider list with auth status |\n| `lib/queries/workflows.ts` | `useWorkflows()`, `useWorkflowTemplates()`, `useWorkflowRuns()`, `useWorkflowRunDetail()` |\n| `lib/queries/schedules.ts` | Schedule/triggers data |\n\n**Mutations** (`lib/mutations/`): Write operations wrapped in `useMutation` hooks.\n\n| Module | Purpose |\n|--------|---------|\n| `lib/mutations/overview.ts` | `useQuickInit()` — first-run wizard setup |\n| `lib/mutations/providers.ts` | `useSetProviderKey()`, `useSetDefaultProvider()` |\n| `lib/mutations/workflows.ts` | `useRunWorkflow()`, `useDryRunWorkflow()`, `useUpdateWorkflow()`, `useInstantiateTemplate()` |\n| `lib/mutations/agents.ts` | `useCreatePromptVersion()`, `useCreateAgentSession()` |\n| `lib/mutations/schedules.ts` | `useCreateSchedule()` |\n| `lib/mutations/channels.ts` | `useTestChannel()` |\n\nEvery mutation follows the same pattern: call an `api.ts` function → React Query manages loading/error/cache state → the page component reads the mutation state.\n\n### Page Components — `src/pages/`\n\nEach page is a self-contained React component that composes query hooks, mutation hooks, and local UI state.\n\n| Page | File | Key Features |\n|------|------|--------------|\n| **WizardPage** | `src/pages/WizardPage.tsx` | First-run setup: detects providers (`useProviders`), sets API key (`useSetProviderKey`), sets default provider (`useSetDefaultProvider`), runs quick init (`useQuickInit`) |\n| **AgentsPage** | `src/pages/AgentsPage.tsx` | Agent list, prompt version management (`PromptsExperimentsModal`), session creation |\n| **ChatPage** | `src/pages/ChatPage.tsx` | Real-time chat with agents. Uses `useChatMessages` which manages both HTTP (`sendViaHttp`) and WebSocket (`useWebSocket`) transport, message IDs via `makeMessageId` |\n| **WorkflowsPage** | `src/pages/WorkflowsPage.tsx` | Workflow CRUD, template instantiation, dry-run, execution, shortcut creation (`useCreateShortcut`) |\n| **CanvasPage** | `src/pages/CanvasPage.tsx` | Visual workflow editor, uses `truncateId` for display |\n| **ChannelsPage** | `src/pages/ChannelsPage.tsx` | Channel adapter configuration, `ChannelCard` with `getChannelIcon`, test connectivity |\n| **ProvidersPage** | `src/pages/ProvidersPage.tsx` | Provider management, test connectivity (`handleTest` → `getActionResultError`), shortcut creation |\n| **ModelsPage** | `src/pages/ModelsPage.tsx` | Model catalog, add form (`handleAdd` → `resetForm`), mobile cards use `modelKey` from `lib/hiddenModels.ts` |\n| **MediaPage** | `src/pages/MediaPage.tsx` | Media provider browsing via `providersWithCapability` |\n| **McpServersPage** | `src/pages/McpServersPage.tsx` | MCP server management, `AuthBadge` via `serverIdentityOf`, `ServerCard` via `getTransportDetail`, field updates via `updateField`, tool toggling via `toggleTools` |\n| **SkillsPage** | `src/pages/SkillsPage.tsx` | Skill marketplace, rate-limit error detection (`isRateLimitError`) |\n| **SchedulerPage** | `src/pages/SchedulerPage.tsx` | Cron job and trigger management, `openEditTrigger` |\n| **LogsPage** | `src/pages/LogsPage.tsx` | Real-time log viewer, time formatting via `formatTime` from `lib/datetime.ts` |\n| **ApprovalsPage** | `src/pages/ApprovalsPage.tsx` | Approval queue, `statusBadge` rendering, decision handling (`handleDecision` → `executeDecision`) |\n\n### App Shell — `dashboard/src/App.tsx`\n\nEntry point that orchestrates:\n\n1. **Auth bootstrap** — `checkAuth()` calls `checkDashboardAuthMode()` then `verifyStoredAuth()` to restore sessions.\n2. **Auth mode detection** — Determines whether the kernel uses API key, dashboard credentials, or OAuth.\n3. **Login flows** — `handleApiKeySubmit` (API key), `handleCredentialsSubmit` (username/password via `dashboardLogin`), `handleSubmit` (password change via `changePassword` + `clearApiKey`), `ChangePasswordModal` (username display via `getDashboardUsername`).\n4. **Logout** — Calls `dashboardLogout()`.\n5. **Unauthorized hook** — `setOnUnauthorized()` registers a callback that triggers re-authentication when a 401 is received.\n6. **Version polling** — `getVersionInfo()` and `getStatus()` on mount.\n\n### Router — `dashboard/src/router.tsx`\n\nMaps URL paths to page components. Includes `tryAutoReload` which checks localStorage for a stored auth token and attempts silent re-authentication on page load.\n\n### Shared Libraries — `src/lib/`\n\nUtility modules used across pages:\n\n| Module | Purpose |\n|--------|---------|\n| `src/lib/agentManifest.ts` | TOML serialization for agent manifests. `serializeManifestForm()` orchestrates `splitTopLevelExtras`, `writeStringScalar` (with `escapeTomlString`), `writeNumberScalar`, `jsonValueToInlineToml` (recursive), `parseScheduleField` (via `asString`). |\n| `src/lib/agentManifestMarkdown.ts` | Markdown generation from manifest data. `generateManifestMarkdown()` uses `pushList` helper. |\n| `src/lib/chat.ts` | Chat message normalization — `normalizeRole`, `asText`, `formatMeta`, `normalizeToolOutput`. |\n| `src/lib/chatPicker.ts` | Chat target selection via `groupedPicker`. |\n| `src/lib/triggerPattern.ts` | Trigger pattern formatting via `formatTriggerPattern`. |\n| `src/lib/datetime.ts` | Time formatting helpers like `formatTime`. |\n| `src/lib/string.ts` | String utilities like `truncateId`. |\n| `src/lib/hiddenModels.ts` | Model key resolution via `modelKey`. |\n| `src/lib/useCreateShortcut.ts` | Shared hook for creating dashboard shortcuts, used by `WorkflowsPage` and `ProvidersPage`. |\n| `src/lib/i18n.ts` | Internationalization bootstrap, calls `init()` from the Rust CLI i18n module. |\n\n### Component Library — `src/components/`\n\nReusable UI components. Notable:\n\n| Component | Purpose |\n|-----------|---------|\n| `AgentManifestForm` | Dynamic form for editing agent TOML manifests. The call graph shows it receives `update`/`commit` callbacks that align with the kernel's content hashing (`sha256_hex`, `compute_entry_hash`, etc.) and usage tracking pipelines. |\n\n## Request Lifecycle\n\nA typical write operation follows this path:\n\n```\nPage component (event handler)\n  → Mutation hook (lib/mutations/*.ts)\n    → API function (dashboard/src/api.ts)\n      → HTTP method helper (post/put/patch/del)\n        → buildHeaders() → authHeader() → getItem() [reads stored token]\n        → fetch() to kernel\n        → parseError() on failure → ApiError\n      → React Query cache invalidation\n    → Page re-renders with new data\n```\n\nA typical read operation:\n\n```\nPage component (mount / route change)\n  → Query hook (lib/queries/*.ts)\n    → API function (dashboard/src/api.ts)\n      → get() → buildHeaders() → fetch()\n    → React Query caches response\n  → Page renders from cache\n```\n\n## Authentication Flow\n\nThe dashboard supports three authentication modes, detected at startup by `checkDashboardAuthMode()`:\n\n1. **API Key** — User enters a key in the wizard. Stored via `setApiKey()`, sent as `Authorization: Bearer <key>`.\n2. **Dashboard Credentials** — Username/password login via `dashboardLogin()`. Session managed with tokens.\n3. **OAuth2** — Redirect-based flow. The kernel handles the OAuth callback (`/api/auth/callback`), and the dashboard stores the resulting token.\n\nAll modes converge on `authHeader()` which reads the stored credential and attaches it to every outbound request. When a request returns 401, the `setOnUnauthorized()` callback triggers re-authentication.\n\n## Real-Time Streaming\n\nThe dashboard uses two streaming mechanisms:\n\n- **SSE (Server-Sent Events)** — Used for log streaming (`/api/logs/stream`), inter-agent comms events (`/api/comms/events/stream`), and chat streaming (`/api/agents/{id}/message/stream`). The kernel sends heartbeat pings every 15 seconds.\n- **WebSocket** — Used by `ChatPage`'s `useChatMessages` hook via `useWebSocket` for bidirectional agent chat with lower latency than SSE.\n\n## Agent Manifest Handling\n\nAgent configuration uses TOML manifests. The frontend provides full serialization/deserialization:\n\n1. **Parsing** — Manifest TOML is parsed into form state.\n2. **Editing** — `AgentManifestForm` provides a dynamic UI for all manifest fields including system prompt, model, provider, temperature, max_tokens, tools, skills, and custom extras.\n3. **Serialization** — `serializeManifestForm()` converts form state back to valid TOML, handling string escaping (`escapeTomlString`), nested objects (`splitTopLevelExtras`), number formatting (`writeNumberScalar`), inline JSON values (`jsonValueToInlineToml`), and schedule fields (`parseScheduleField`).\n4. **Submission** — The serialized TOML is sent to `POST /api/agents` (spawn) or `PATCH /api/agents/{id}/config` (hot-update).\n\n## Development Guidelines\n\n### Adding a New Page\n\n1. Create the component in `src/pages/NewPage.tsx`.\n2. Add query hooks in `lib/queries/` if the page reads data.\n3. Add mutation hooks in `lib/mutations/` if the page writes data.\n4. Ensure the API functions exist in `dashboard/src/api.ts` with proper types from `openapi/generated.ts`.\n5. Register the route in `dashboard/src/router.tsx`.\n\n### Adding a New API Endpoint\n\n1. Add/update the endpoint in the kernel's OpenAPI spec.\n2. Regenerate `openapi/generated.ts` by running the openapi-typescript generator.\n3. Add a typed function in `dashboard/src/api.ts` that calls the appropriate HTTP method helper.\n4. Create a query or mutation hook wrapping the new function.\n5. Use the hook in the target page component.\n\n### Working with Generated Types\n\nThe `paths` interface in `openapi/generated.ts` is the single source of truth for all API routes and their shapes. When consuming API responses in TypeScript, prefer using the operation types (e.g., `operations[\"list_agents\"][\"responses\"][\"200\"][\"content\"][\"application/json\"]`) rather than defining separate interface duplicates.","desktop-application":"# Desktop Application\n\n# LibreFang Desktop\n\nNative desktop application wrapping the LibreFang Agent OS, built on **Tauri 2.0**. Boots the kernel and embedded API server, opens a native WebView window pointed at the WebUI, and provides system tray integration, global shortcuts, auto-start, single-instance enforcement, and automatic updates.\n\nSupports two connection modes: **local** (embedded server) and **remote** (connect to an external LibreFang instance).\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    CLI[\"main.rs<br/>CLI + dotenv\"] --> run[\"lib.rs<br/>run()\"]\n    run -->|resolves mode| SM{StartupMode?}\n    SM -->|Remote| WEBVIEW[\"WebView → remote URL\"]\n    SM -->|Local| SERVER[\"server.rs<br/>embedded API\"]\n    SM -->|ConnectionScreen| CONN[\"connection.rs<br/>HTML connection screen\"]\n    CONN -->|user picks remote| REMOTE_CMD[\"connect_remote()\"]\n    CONN -->|user picks local| LOCAL_CMD[\"start_local()\"]\n    LOCAL_CMD --> SERVER\n    SERVER --> KERNEL[\"LibreFangKernel\"]\n    SERVER --> ROUTER[\"librefang-api<br/>build_router()\"]\n    ROUTER --> WEBVIEW\n    REMOTE_CMD --> WEBVIEW\n    run --> TRAY[\"tray.rs<br/>system tray\"]\n    run --> SHORTCUTS[\"shortcuts.rs<br/>global shortcuts\"]\n    run --> UPDATER[\"updater.rs<br/>auto-update\"]\n    KERNEL -->|event bus| NOTIFY[\"forward_kernel_events()<br/>OS notifications\"]\n```\n\n## Startup Flow\n\nEntry point is `main()` in `main.rs`, which:\n\n1. Calls `librefang_extensions::dotenv::load_dotenv()` **synchronously** at the `main()` boundary — this must happen before any threads are spawned because `std::env::set_var` is undefined behavior once other threads exist.\n2. Parses CLI arguments via `clap`.\n3. Delegates to `librefang_desktop::run()`.\n\n### Startup Mode Resolution\n\n`run()` resolves the connection mode with this priority chain:\n\n| Priority | Source | Behavior |\n|----------|--------|----------|\n| 1 (highest) | `--server-url <URL>` CLI arg | `StartupMode::Remote(url)` |\n| 2 | `--local` CLI flag | `StartupMode::Local` |\n| 3 | `LIBREFANG_SERVER_URL` env var | `StartupMode::Remote(url)` |\n| 4 | Saved preference in `~/.librefang/desktop.toml` | Mode from file |\n| 5 (lowest) | None of the above | `StartupMode::ConnectionScreen` |\n\nFor direct modes (remote or local), the server URL is resolved and the WebView navigates straight to the dashboard. For the connection screen, a self-contained HTML page is injected into an `about:blank` WebView — see [Connection Screen](#connection-screen).\n\n## Managed State\n\nTauri managed state is registered once during app setup using interior-mutable `RwLock`/`Mutex` wrappers. All updates go through the locks — `manage()` is never called a second time.\n\n| State Type | Inner Type | Purpose |\n|------------|-----------|---------|\n| `PortState` | `RwLock<Option<u16>>` | Local server port. `None` in remote mode. |\n| `KernelState` | `RwLock<Option<KernelInner>>` | Kernel instance + startup timestamp. `None` in remote mode. |\n| `ServerUrlState` | `RwLock<String>` | URL the WebView points at (local or remote). |\n| `RemoteMode` | `RwLock<bool>` | Whether connected to a remote server. |\n| `ServerHandleHolder` | `Mutex<Option<ServerHandle>>` | Handle to the embedded server. Filled lazily by `start_local` or during direct local boot. |\n\n`KernelInner` holds an `Arc<LibreFangKernel>` and the `Instant` the kernel started (used for uptime display).\n\n## Embedded Server (`server.rs`)\n\n### `start_server() → Result<ServerHandle, Error>`\n\nBoots the kernel and starts the API server on a background thread:\n\n1. Calls `LibreFangKernel::boot(None)` synchronously.\n2. Binds a `TcpListener` to `127.0.0.1:0` **on the calling thread** — this guarantees the port is known before any Tauri window is created.\n3. Spawns a named thread (`librefang-server`) that creates its own multi-threaded tokio runtime.\n4. Inside that runtime: starts background agents, spawns the approval expiry sweep task, then runs the axum server via `build_router()` from `librefang-api`.\n5. Triggers dashboard asset sync in the background.\n\n### `ServerHandle`\n\nOwns the kernel, the shutdown watch channel, and the server thread join handle. Shutdown is idempotent — an `AtomicBool` prevents double-shutdown. The `Drop` impl sends the shutdown signal without blocking; the explicit `shutdown()` method waits for the thread to join.\n\nThe watch channel (`tokio::sync::watch`) triggers `axum::serve`'s graceful shutdown handler.\n\n## Connection Screen (`connection.rs`)\n\nWhen no startup mode can be resolved, a self-contained HTML page is injected via `document.write()` into a blank WebView. The page provides:\n\n- **Server URL input** with \"Test Connection\" and \"Connect\" buttons\n- **\"Start Local Server\"** button\n- **\"Remember this choice\"** checkbox\n- Status messages for success/error states\n\nThe page calls Tauri IPC commands through `window.__TAURI__.core.invoke`.\n\n### IPC Commands\n\n#### `test_connection(url)`\n\nValidates the URL scheme, hits `{url}/api/health` with a 10-second timeout, and returns the health endpoint's JSON response. Used as a pre-flight check before committing to a remote connection.\n\n#### `connect_remote(url, remember)`\n\n1. Validates URL and runs health check (same as `test_connection`).\n2. If `remember` is true, saves a `ConnectionPreference` to `~/.librefang/desktop.toml`.\n3. Updates all managed state: sets `ServerUrlState` to the remote URL, sets `RemoteMode(true)`, clears `PortState` and `KernelState` to `None`.\n4. Navigates the WebView via `window.location.href`.\n\n#### `start_local(remember)`\n\n1. Calls `server::start_server()` on a blocking thread (since kernel boot is synchronous).\n2. Updates all managed state: sets port, kernel, server URL to `http://127.0.0.1:{port}`, `RemoteMode(false)`.\n3. Stores the `ServerHandle` in `ServerHandleHolder`.\n4. Spawns the `forward_kernel_events` task for native notifications.\n5. Optionally saves the preference.\n6. Navigates the WebView to the local dashboard.\n\n### Preference Persistence\n\nPreferences are stored as TOML in `~/.librefang/desktop.toml`:\n\n```toml\n[connection]\nmode = \"remote\"\nserver_url = \"http://192.168.1.100:4545\"\n```\n\nOr for local mode:\n\n```toml\n[connection]\nmode = \"local\"\n```\n\nThe file is read by `load_saved_preference()` and written by `save_preference()`. Existing file contents are fully replaced on write.\n\n## IPC Commands (`commands.rs`)\n\nAll commands return `Result<T, String>` for Tauri serialization. Commands that require a local kernel return `\"No local server running\"` when in remote mode.\n\n| Command | Signature | Description |\n|---------|-----------|-------------|\n| `get_port` | `() → u16` | Returns the embedded server's port. |\n| `get_status` | `() → JSON` | Returns `{ status, port, agents, uptime_secs }`. |\n| `get_agent_count` | `() → usize` | Number of registered agents. |\n| `import_agent_toml` | `() → String` | Opens native file picker, validates TOML as `AgentManifest`, copies to `~/.librefang/workspaces/agents/{name}/agent.toml`, spawns the agent. |\n| `import_skill_file` | `() → String` | Opens native file picker for skill files (`.md`, `.toml`, `.py`, `.js`, `.wasm`), copies to `~/.librefang/skills/`, triggers hot-reload. |\n| `get_autostart` | `() → bool` | Whether launch-at-login is enabled. |\n| `set_autostart` | `(enabled: bool) → bool` | Toggle launch-at-login. Returns new state. |\n| `check_for_updates` | `() → UpdateInfo` | On-demand update check. |\n| `install_update` | `() → ()` | Downloads, installs, and restarts. Never returns on success. |\n| `open_config_dir` | `() → ()` | Opens `~/.librefang/` in OS file manager. |\n| `open_logs_dir` | `() → ()` | Opens `~/.librefang/logs/` in OS file manager. |\n\n## System Tray (`tray.rs`)\n\n### Menu Items\n\n- **Show Window** — focuses the main window\n- **Open in Browser** — opens the server URL in the default browser (works for both local and remote modes)\n- **Change Server...** — shuts down any local server, clears state, navigates back to the connection screen\n- **Agents: N running** — display-only, disabled\n- **Status: Running (Xm Ys)** or **Status: Remote (url)** — display-only, disabled\n- **Launch at Login** — checkbox toggle for auto-start\n- **Check for Updates...** — triggers update check + install with notification feedback\n- **Open Config Directory** — opens `~/.librefang/`\n- **Quit LibreFang** — calls `app.exit(0)`\n\nLeft-clicking the tray icon shows and focuses the window.\n\n### Change Server Flow\n\nThe \"Change Server...\" menu item:\n\n1. Takes the `ServerHandle` from `ServerHandleHolder` and calls `shutdown()` on a background thread (to avoid blocking the tray handler).\n2. Clears `PortState` and `KernelState`.\n3. Re-injects the connection screen HTML into the WebView.\n\nThis allows switching between remote and local modes without restarting the application.\n\n## Global Shortcuts (`shortcuts.rs`)\n\nThree system-wide keyboard shortcuts, registered via `tauri-plugin-global-shortcut`:\n\n| Shortcut | Action |\n|----------|--------|\n| `Ctrl+Shift+O` | Show/focus the window |\n| `Ctrl+Shift+N` | Show window + emit `navigate` event with payload `\"agents\"` |\n| `Ctrl+Shift+C` | Show window + emit `navigate` event with payload `\"chat\"` |\n\nRegistration failure is non-fatal — the app logs a warning and continues without shortcuts. The `navigate` events are consumed by the WebUI frontend to switch pages.\n\n## Auto-Update (`updater.rs`)\n\n### Startup Check\n\n`spawn_startup_check()` runs 10 seconds after app launch:\n\n1. Checks for an available update.\n2. If found, sends an OS notification, waits 3 seconds for visibility, then downloads and installs.\n3. On successful install, calls `app_handle.restart()` — the process never returns.\n4. All errors are logged, never panic.\n\n### On-Demand Check\n\n`check_for_update()` returns an `UpdateInfo` struct:\n\n```rust\npub struct UpdateInfo {\n    pub available: bool,\n    pub version: Option<String>,\n    pub body: Option<String>,\n}\n```\n\n`download_and_install_update()` performs the actual download. It calls `app_handle.restart()` on success, so it never returns `Ok(())`.\n\nThe updater is powered by `tauri-plugin-updater`.\n\n## Event Forwarding\n\n`forward_kernel_events()` subscribes to the kernel's event bus and forwards critical events as native OS notifications:\n\n| Event | Notification Title |\n|-------|--------------------|\n| `LifecycleEvent::Crashed` | \"Agent Crashed\" |\n| `SystemEvent::KernelStopping` | \"Kernel Stopping\" |\n| `SystemEvent::QuotaEnforced` | \"Quota Enforced\" |\n\nAll other events are ignored. Broadcast lag is handled gracefully with a warning log. When the channel closes, the loop exits.\n\nThis task is spawned during both direct local boot and the `start_local` connection command.\n\n## Desktop-Only Features\n\nSeveral features are gated behind `#[cfg(desktop)]`:\n\n- **Single instance** — `tauri_plugin_single_instance` focuses the existing window when a second instance launches.\n- **Auto-start** — `tauri_plugin_autostart` with `--minimized` flag.\n- **Global shortcuts** — system-wide hotkeys.\n- **System tray** — `tray.rs` is only compiled and set up on desktop.\n- **Auto-update** — `tauri_plugin_updater` and `spawn_startup_check`.\n- **Close-to-tray** — `WindowEvent::CloseRequested` hides the window instead of quitting.\n\nOn mobile targets (`#[cfg(mobile)]`), the entry point is marked via `tauri::mobile_entry_point` and these features are omitted.\n\n## Window Behavior\n\n- Close button hides to tray (desktop) instead of quitting.\n- Minimum window size: 800×600.\n- Default window size: 1280×800, centered.\n- Window title is \"LibreFang — Connect\" on the connection screen, \"LibreFang\" otherwise.\n\n## Key File Locations\n\n| Path | Purpose |\n|------|---------|\n| `~/.librefang/desktop.toml` | Connection preference persistence |\n| `~/.librefang/workspaces/agents/{name}/agent.toml` | Imported agent manifests |\n| `~/.librefang/skills/` | Imported skill files |\n| `~/.librefang/logs/` | Application logs |","kernel-core-librefang-kernel-handle-src":"# Kernel Core — librefang-kernel-handle-src\n\n# librefang-kernel-handle\n\nThe dependency-inversion layer that lets agents interact with the kernel without creating circular imports.\n\n## Purpose\n\n`librefang-runtime` drives the agent loop — processing LLM responses, executing tool calls, managing conversation state. Many of those tools need to reach back into the kernel: spawning child agents, reading shared memory, posting tasks, requesting human approval, and so on. But the kernel owns the runtime, so a direct `librefang-kernel → librefang-runtime → librefang-kernel` import cycle would be inevitable.\n\nThis crate breaks the cycle by defining `KernelHandle` — an `#[async_trait]` that enumerates every kernel operation an agent might need. The kernel implements the trait and injects it into the agent loop at startup. The runtime only depends on the trait, never on the kernel itself.\n\n```mermaid\ngraph TD\n    K[\"librefang-kernel<br/>(implements KernelHandle)\"]\n    H[\"librefang-kernel-handle<br/>(defines KernelHandle trait)\"]\n    R[\"librefang-runtime<br/>(agent loop, tool_runner)\"]\n\n    K -->|\"depends on\"| H\n    R -->|\"depends on\"| H\n    K -.->|\"passes &dyn KernelHandle<br/>into agent loop\"| R\n```\n\n## Key Types\n\n### `AgentInfo`\n\n```rust\npub struct AgentInfo {\n    pub id: String,\n    pub name: String,\n    pub state: String,\n    pub model_provider: String,\n    pub model_name: String,\n    pub description: String,\n    pub tags: Vec<String>,\n    pub tools: Vec<String>,\n}\n```\n\nReturned by `list_agents` and `find_agents`. Carries enough metadata for an agent to decide whether (and how) to interact with a peer.\n\n### `KernelHandle` trait\n\nThe central abstraction. All methods are documented in source, but they fall into functional groups:\n\n| Group | Methods | Sync / Async |\n|---|---|---|\n| **Agent lifecycle** | `spawn_agent`, `spawn_agent_checked`, `kill_agent`, `send_to_agent`, `list_agents`, `find_agents` | mixed |\n| **Shared memory** | `memory_store`, `memory_recall`, `memory_list` | sync |\n| **Task queue** | `task_post`, `task_claim`, `task_complete`, `task_list`, `task_delete`, `task_retry` | async |\n| **Knowledge graph** | `knowledge_add_entity`, `knowledge_add_relation`, `knowledge_query` | async |\n| **Events** | `publish_event` | async |\n| **Cron scheduling** | `cron_create`, `cron_list`, `cron_cancel` | async |\n| **Approval system** | `requires_approval*`, `is_tool_denied_with_context`, `request_approval`, `submit_tool_approval`, `resolve_tool_approval`, `get_approval_status` | mixed |\n| **Hands** | `hand_list`, `hand_install`, `hand_activate`, `hand_status`, `hand_deactivate` | async |\n| **External A2A** | `list_a2a_agents`, `get_a2a_agent_url` | sync |\n| **Channel messaging** | `send_channel_message`, `send_channel_media`, `send_channel_file_data`, `send_channel_poll` | async |\n| **Prompt versioning** | `get_prompt_version`, `list_prompt_versions`, `create_prompt_version`, `delete_prompt_version`, `set_active_prompt_version`, `auto_track_prompt_version` | sync |\n| **Experiments** | `get_running_experiment`, `record_experiment_request`, `list_experiments`, `create_experiment`, `get_experiment`, `update_experiment_status`, `get_experiment_metrics` | sync |\n| **Goals** | `goal_list_active`, `goal_update` | sync |\n| **Workflows** | `run_workflow` | async |\n| **Forked execution** | `run_forked_agent_oneshot` | async |\n| **Heartbeat** | `touch_heartbeat` | sync |\n| **Config queries** | `tool_timeout_secs`, `max_agent_call_depth` | sync |\n\n## Design Patterns\n\n### Default implementations for optional subsystems\n\nMost methods have default implementations that return errors (`\"… not available\"`) or no-ops. This is intentional — it lets test harnesses and minimal kernel implementations provide only the surface area they need. The kernel overrides whichever methods it actually supports.\n\nThe pattern to follow when adding a new method:\n\n```rust\n// Default: unavailable. Kernel overrides for real behavior.\nasync fn hand_list(&self) -> Result<Vec<serde_json::Value>, String> {\n    Err(\"Hands system not available\".to_string())\n}\n```\n\n### Internal delegation\n\nTwo methods delegate to sibling methods by default:\n\n- **`spawn_agent_checked`** → calls `spawn_agent`. The kernel must override this to enforce that the child manifest's capabilities are a subset of `parent_caps`.\n- **`requires_approval_with_context`** → calls `requires_approval`. The kernel overrides when approval policy varies by sender or channel.\n\n### Scoped memory with `peer_id`\n\n`memory_store`, `memory_recall`, and `memory_list` accept `peer_id: Option<&str>`. When `Some`, the key is namespaced to that peer, so different users talking to the same agent get isolated memory. When `None`, the key is global to the agent.\n\n### Forked agent execution\n\n`run_forked_agent_oneshot` is the \"structured-output via forked call\" primitive. It spawns a child agent turn that shares the parent's `(system + tools + messages)` prefix for prompt cache alignment, drains it to completion, and returns the final text. The fork's messages do not persist into the agent's canonical session. Used internally by the proactive memory extractor.\n\n## How the runtime uses this trait\n\nThe runtime receives a `&dyn KernelHandle` (or `Arc<dyn KernelHandle>`) and calls methods from two primary call sites:\n\n1. **`tool_runner.rs`** — almost every `tool_*` function receives the handle and calls the corresponding kernel method. Examples:\n   - `tool_channel_send` → `send_channel_message` / `send_channel_media` / `send_channel_file_data` / `send_channel_poll`\n   - `tool_agent_send` → `max_agent_call_depth` (guard check) then `send_to_agent`\n   - `tool_cron_create` / `tool_cron_list` / `tool_cron_cancel` → the respective cron methods\n\n2. **`agent_loop.rs`** — the main loop calls:\n   - `touch_heartbeat` before each LLM call to prevent heartbeat false-positives\n   - `auto_track_prompt_version` and `get_prompt_version` during prompt setup\n   - `tool_timeout_secs` to set per-tool execution deadlines\n   - `max_agent_call_depth` to guard against unbounded agent recursion\n\n## Implementing `KernelHandle`\n\nThe real implementation lives in `librefang-kernel`, which holds references to the agent registry, shared memory store, task queue, channel adapters, and so on. A sketch:\n\n```rust\nstruct LiveKernelHandle {\n    agents: Arc<AgentRegistry>,\n    memory: Arc<SharedMemory>,\n    tasks: Arc<TaskQueue>,\n    // ...\n}\n\n#[async_trait]\nimpl KernelHandle for LiveKernelHandle {\n    async fn spawn_agent(\n        &self,\n        manifest_toml: &str,\n        parent_id: Option<&str>,\n    ) -> Result<(String, String), String> {\n        let manifest = parse_manifest(manifest_toml)?;\n        let agent = self.agents.spawn(manifest, parent_id).await?;\n        Ok((agent.id, agent.name))\n    }\n\n    fn list_agents(&self) -> Vec<AgentInfo> {\n        self.agents.all().into_iter().map(Into::into).collect()\n    }\n\n    // ... override every method that the kernel supports\n}\n```\n\n### For testing\n\nA stub or mock only needs to implement the methods the test exercises. Everything else falls back to its default (error or no-op), so test setup stays minimal.\n\n## Adding a new method\n\n1. Add the method signature with a default implementation to `KernelHandle` in `lib.rs`.\n2. Default should either return an error (`\"… not available\"`) for subsystems the kernel may not have, or a sensible no-op/empty value.\n3. Override in `LiveKernelHandle` inside `librefang-kernel`.\n4. Add the corresponding `tool_*` function in `librefang-runtime/src/tool_runner.rs` if agents should call it as a tool.\n5. Register the tool in the agent's tool manifest.","kernel-core-librefang-kernel-metering-src":"# Kernel Core — librefang-kernel-metering-src\n\n# librefang-kernel-metering\n\nLLM cost tracking and quota enforcement for the LibreFang kernel.\n\nThis crate provides the `MeteringEngine` — the central component responsible for recording LLM usage events, estimating call costs, and enforcing spending limits across three independent budget layers: per-agent, global, and per-provider.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[LLM Call Completes] --> B[check_all_and_record]\n    B --> C{Per-Agent Quota}\n    B --> D{Global Budget}\n    B --> E{Per-Provider Budget}\n    C --> F[SQLite Transaction]\n    D --> F\n    E --> F\n    F -->|All pass| G[Record Inserted]\n    F -->|Any fail| H[QuotaExceeded Error]\n    H --> I[Record NOT inserted]\n```\n\nAll quota checks and the usage insert happen inside a single SQLite transaction when using the atomic APIs. This eliminates the TOCTOU race where two concurrent requests both pass independent quota checks before either records its spend.\n\n## Core Types\n\n### `MeteringEngine`\n\nThe single public struct. Wraps an `Arc<UsageStore>` (SQLite-backed persistence from `librefang-memory`) and exposes all recording, querying, and enforcement methods.\n\n```rust\nlet store = Arc::new(UsageStore::new(substrate.usage_conn()));\nlet engine = MeteringEngine::new(store);\n```\n\n### `BudgetStatus`\n\nA serializable snapshot of current spend versus configured limits across hourly, daily, and monthly windows. Returned by `budget_status()` for dashboard/alerting use.\n\nFields: `hourly_spend`, `hourly_limit`, `hourly_pct` (and equivalent for daily/monthly), `alert_threshold`, `default_max_llm_tokens_per_hour`.\n\n## Cost Estimation\n\nTwo public methods compute the USD cost of an LLM call from token counts. Both handle cache-aware pricing:\n\n| Token Type | Multiplier |\n|---|---|\n| Regular input | 1.0× input rate |\n| Cache-read input | 0.10× input rate |\n| Cache-creation input | 1.25× input rate |\n| Output | 1.0× output rate |\n\nRates are expressed as USD per million tokens.\n\n### `estimate_cost` (static fallback)\n\n```rust\nMeteringEngine::estimate_cost(\n    model,                  // unused — pricing is model-independent\n    input_tokens,\n    output_tokens,\n    cache_read_input_tokens,\n    cache_creation_input_tokens,\n)\n```\n\nUses fixed default rates: **$1.00/M** input, **$3.00/M** output. Intended for unit tests and environments without a model catalog.\n\n### `estimate_cost_with_catalog` (production path)\n\n```rust\nMeteringEngine::estimate_cost_with_catalog(\n    &catalog,\n    \"claude-sonnet-4-20250514\",\n    input_tokens,\n    output_tokens,\n    cache_read_input_tokens,\n    cache_creation_input_tokens,\n)\n```\n\nLooks up the model in the `ModelCatalog` (from `librefang-runtime`) and uses provider-specific pricing. Falls back to the default rates if the model is not found.\n\n**Special cases:**\n\n- **Zero-priced local models** (e.g., Ollama): cost is `$0.00`. No override.\n- **Zero-priced ChatGPT session-auth models** (provider `\"chatgpt\"`): despite the catalog reporting $0/$0, the engine applies the default $1/$3 rates so that budgets still provide a conservative spend estimate. This is gated by `should_use_legacy_budget_estimate`, which checks `entry.provider == \"chatgpt\"`.\n\n## Quota Enforcement\n\n### Three Budget Layers\n\nThe engine enforces limits at three independent levels. A zero-valued limit means \"unlimited\" and is skipped during enforcement.\n\n**1. Per-Agent Quota** — `ResourceQuota`\n\nFields: `max_cost_per_hour_usd`, `max_cost_per_day_usd`, `max_cost_per_month_usd`.\n\nChecked by `check_quota(agent_id, &quota)`.\n\n**2. Global Budget** — `BudgetConfig`\n\nFields: `max_hourly_usd`, `max_daily_usd`, `max_monthly_usd`.\n\nAggregates spend across all agents. Checked by `check_global_budget(&budget)`.\n\n**3. Per-Provider Budget** — `ProviderBudget`\n\nFields: `max_cost_per_hour_usd`, `max_cost_per_day_usd`, `max_cost_per_month_usd`, `max_tokens_per_hour`.\n\nProviders are keyed by string name in `BudgetConfig.providers` (`HashMap<String, ProviderBudget>`). Provider budgets are isolated — spend on one provider does not affect another. Checked by `check_provider_budget(provider, &provider_budget)`.\n\nAll enforcement methods return `LibreFangResult<()>`. On violation, they return `LibreFangError::QuotaExceeded` with a message identifying the budget layer, provider/agent, and the actual vs. allowed amounts.\n\n### Non-Atomic (Check-Then-Record)\n\n```rust\nengine.record(&usage_record)?;           // persists to SQLite\nengine.check_quota(agent_id, &quota)?;   // reads from SQLite\nengine.check_global_budget(&budget)?;\nengine.check_provider_budget(\"openai\", &provider_budget)?;\n```\n\nThese are independent operations. Between a `check_quota` call and a subsequent `record`, another concurrent request could push spend over the limit. Use this pattern only for dashboards, pre-dispatch gating, or single-threaded contexts.\n\n### Atomic (Check-and-Record)\n\nFor production LLM dispatch, use one of the atomic methods that wrap everything in a single SQLite transaction:\n\n| Method | Checks |\n|---|---|\n| `check_quota_and_record(&record, &quota)` | Per-agent only |\n| `check_global_budget_and_record(&record, &budget)` | Global only |\n| `check_all_and_record(&record, &quota, &budget)` | Per-agent + global + per-provider |\n\n`check_all_and_record` is the preferred entry point. It resolves the provider-specific budget from `budget.providers` using `record.provider` as the key, then delegates to `UsageStore::check_all_with_provider_and_record` which executes all checks and the insert atomically. On failure, the record is **not** inserted.\n\n```rust\nmatch engine.check_all_and_record(&record, &quota, &budget) {\n    Ok(()) => { /* record persisted, all quotas satisfied */ },\n    Err(LibreFangError::QuotaExceeded(msg)) => { /* record NOT persisted */ },\n    Err(e) => { /* storage error */ },\n}\n```\n\n## Querying Usage\n\n| Method | Returns | Filter |\n|---|---|---|\n| `get_summary(agent_id)` | `UsageSummary` | Optional agent filter |\n| `get_by_model()` | `Vec<ModelUsage>` | All agents, grouped by model |\n| `budget_status(&budget)` | `BudgetStatus` | Global spend snapshot |\n| `cleanup(days)` | `usize` (deleted count) | Removes records older than N days |\n\n## Dependencies\n\n- **`librefang-memory`** — provides `UsageStore` (SQLite persistence), `UsageRecord`, `UsageSummary`, `ModelUsage`\n- **`librefang-types`** — provides `AgentId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `ModelCatalogEntry`, error types\n- **`librefang-runtime`** — provides `ModelCatalog` for pricing lookups (only needed for `estimate_cost_with_catalog`)","kernel-core-librefang-kernel-router-src":"# Kernel Core — librefang-kernel-router-src\n\n# Kernel Router (`librefang-kernel-router`)\n\nThe router is the central dispatch module in LibreFang. Given a freeform user message, it decides **which agent template** or **which hand** should handle the request. It combines keyword matching, manifest metadata analysis, and optional embedding-based semantic similarity into a single scored ranking.\n\n## Architecture Overview\n\n```mermaid\nflowchart TD\n    MSG[User message] --> HAND[auto_select_hand]\n    MSG --> TPL[auto_select_template]\n\n    subgraph Hand Routing\n        HAND --> HRC[hand_route_candidates]\n        HRC --> HANDS_TOML[HAND.toml files]\n        HAND --> |\"optional\"| SEM[semantic_scores]\n    end\n\n    subgraph Template Routing\n        TPL --> RULES[TEMPLATE_RULES]\n        TPL --> META[auto_select_template_from_metadata]\n        META --> MRC[manifest_route_candidates]\n        MRC --> AGENT_TOML[agent.toml files]\n        TPL --> |\"optional\"| SEM\n    end\n\n    HAND --> HS[HandSelection]\n    TPL --> TS[TemplateSelection]\n```\n\n## Core Types\n\n| Type | Purpose |\n|------|---------|\n| `HandSelection` | Result of hand routing — `hand_id` is `None` when no hand matches. |\n| `TemplateSelection` | Result of template routing — always returns a template (falls back to `\"orchestrator\"`). |\n| `RouteRule` | A hardcoded keyword rule with strong/weak regex pattern groups targeting a named template. |\n| `HandRouteCandidate` | A hand loaded from disk, with its strong and weak phrase lists ready for matching. |\n| `ManifestRouteCandidate` | A template loaded from `agent.toml`, carrying explicit aliases, generated phrases, and weak phrases. |\n\n## Primary Public API\n\n### `auto_select_hand(message, semantic_scores) -> HandSelection`\n\nRoutes a message to the best-matching hand. Candidates are built from `HAND.toml` files found under `$LIBREFANG_HOME/registry/hands/`.\n\n- Strong phrases come from `[routing].aliases` plus description-derived phrases.\n- Weak phrases come from `[routing].weak_aliases` plus tokenized hand ID segments.\n- A minimum score of `MIN_HAND_SCORE` (2) is required. A single weak hit (score 1) is rejected as too noisy.\n- When `semantic_scores` is provided, cosine similarities are blended in as bonus points (`similarity × MAX_SEMANTIC_BONUS`, rounded).\n\nReturns `HandSelection { hand_id: None, .. }` when nothing reaches threshold.\n\n### `auto_select_template(message, agents_dir, semantic_scores) -> TemplateSelection`\n\nRoutes a message to the best-matching agent template through a two-layer pipeline:\n\n1. **Hardcoded rules** (`TEMPLATE_RULES`) — a curated table of 28 template rules with bilingual (English + Chinese) regex patterns. These score at the `EXPLICIT_ALIAS_WEIGHT` (6) tier.\n2. **Manifest metadata** (`auto_select_template_from_metadata`) — scans `agents_dir/*/agent.toml` for `[metadata.routing]` aliases and auto-generated phrases from names/tags/descriptions.\n\n**Multi-domain detection**: When the top two scoring templates differ and the message contains tokens like \"同时\", \"分别\", \"协作\", \"multi\", or \"together\", the router falls back to `\"orchestrator\"` to coordinate multiple specialists.\n\n**Fallback**: If nothing matches at all, returns `\"orchestrator\"`.\n\n### `load_template_manifest(home_dir, template) -> Result<AgentManifest, String>`\n\nReads and parses `home_dir/workspaces/agents/{template}/agent.toml`. Validates the template name against `is_safe_template_name` (ASCII alphanumeric plus `-` and `_`).\n\n### `all_template_descriptions(agents_dir) -> Vec<(String, String)>`\n\nReturns `(template_name, embed_text)` pairs for all routable templates (excluding `\"assistant\"`). Used by the kernel to precompute embedding vectors for semantic routing. The embed text combines name, description, and tags.\n\n## Scoring Model\n\n```\nfinal_score = explicit_alias_hits × 6\n            + generated_phrase_hits × 2\n            + weak_phrase_hits × 1\n            + round(semantic_similarity × 5.0)\n```\n\n| Constant | Value | Meaning |\n|----------|-------|---------|\n| `EXPLICIT_ALIAS_WEIGHT` | 6 | Hand-curated aliases and hardcoded rule patterns |\n| `GENERATED_PHRASE_WEIGHT` | 2 | Auto-extracted phrases from tags/descriptions |\n| `WEAK_PHRASE_WEIGHT` | 1 | Weak aliases and tokenized ID segments |\n| `MAX_SEMANTIC_BONUS` | 5.0 | Upper bound on semantic contribution |\n| `SEMANTIC_ONLY_THRESHOLD` | 0.55 | Minimum similarity for a semantic-only match |\n| `MIN_HAND_SCORE` | 2 | Floor for hand routing to suppress noise |\n\nTemplates have no minimum score threshold — a single weak hit (score 1) can route, but the orchestrator fallback catches genuinely ambiguous cases.\n\n## Phrase Extraction Pipeline\n\nThe router extracts routing phrases from agent metadata in a language-agnostic way:\n\n1. **`description_phrases`** — Splits description text on punctuation and CJK separators (。、，；etc.), strips generic English stop words (defined in `GENERIC_ENGLISH_WORDS`), and produces matching candidates. ASCII phrases go through `ascii_phrase_candidates` for word-level and bigram extraction. CJK phrases pass through directly if 2–32 characters.\n\n2. **`tag_phrases`** — Each tag is treated as a phrase candidate. ASCII tags are further split into sub-words and bigrams. CJK tags are kept intact.\n\n3. **`english_variants`** — Generates space-separated and hyphen-split variants of compound names (e.g., `\"release-notes\"` → `[\"release-notes\", \"release notes\", \"release\", \"notes\"]`).\n\n4. **`manifest_routing_config`** — Reads `[metadata.routing]` from `agent.toml` for `aliases`, `strong_aliases`, `weak_aliases`, and the `exclude_generated` flag.\n\n## Matching Functions\n\n### `phrase_matches(message, phrase)`\n\nLanguage-aware substring matching:\n- **ASCII phrases**: Escaped as regex with word-boundary-aware patterns (`(^|[^a-z0-9])phrase([^a-z0-9]|$)`), case-insensitive. Spaces in the phrase become flexible separators (`[\\s_-]+`).\n- **Unicode phrases**: Simple case-insensitive `contains` check.\n\n### `regex_matches(message, pattern)`\n\nCompiles regex patterns lazily into a global cache (`REGEX_CACHE`). Failed compilations produce a never-match sentinel. All patterns are wrapped in `(?i)` for case-insensitivity.\n\n## Caching\n\nThree independent caches backed by `OnceLock<Mutex<...>>`:\n\n| Cache | Key | Invalidation |\n|-------|-----|-------------|\n| `HAND_ROUTE_CACHE` | Home directory path | `invalidate_hand_route_cache()` |\n| `MANIFEST_CACHE` | `agents_dir` path | `invalidate_manifest_cache()` |\n| `REGEX_CACHE` | Pattern string | Never (append-only) |\n\nThe routing skill endpoints call `invalidate_hand_route_cache()` after `install_hand` / `uninstall_hand` operations. Config hot-reload should call both `invalidate_manifest_cache()` and `invalidate_hand_route_cache()`.\n\n## Home Directory Resolution\n\nHand route candidates require a LibreFang home directory, resolved in order:\n\n1. Explicitly set via `set_hand_route_home_dir()` (used by the runtime at startup).\n2. `LIBREFANG_HOME` environment variable.\n3. `~/.librefang` (falling back to the system temp directory if `dirs::home_dir()` returns `None`).\n\n## Hardcoded Template Rules\n\nThe `TEMPLATE_RULES` table covers 28 specialist templates with bilingual keyword patterns:\n\n`hello-world`, `coder`, `debugger`, `test-engineer`, `code-reviewer`, `architect`, `security-auditor`, `devops-lead`, `researcher`, `analyst`, `data-scientist`, `planner`, `writer`, `tutor`, `doc-writer`, `translator`, `email-assistant`, `meeting-assistant`, `social-media`, `sales-assistant`, `customer-support`, `recruiter`, `legal-assistant`, `personal-finance`, `recipe-assistant`, `travel-planner`, `health-tracker`, `home-automation`, `ops`, `orchestrator`.\n\nEach rule has a `strong` list (label → regex pairs, scored at weight 6) and an optional `weak` list (scored at weight 1). Strong patterns typically include both English and Chinese variants.\n\nThe `ROUTING_EXCLUDED_TEMPLATES` list (`[\"assistant\"]`) prevents certain templates from appearing in metadata-based routing.\n\n## Integration Points\n\n| Caller | When |\n|--------|------|\n| `install_hand` / `uninstall_hand` (skills routes) | Invalidates hand route cache after registry changes |\n| Kernel startup | Calls `set_hand_route_home_dir()` to establish the hand registry path |\n| Kernel routing loop | Calls `auto_select_hand()` and `auto_select_template()` per message |\n| Embedding precompute | Calls `all_template_descriptions()` to build vectors for semantic routing |\n\n## Testing Conventions\n\nTests use `ensure_registry()` to set up the hand route home directory via `librefang_runtime::registry_sync::resolve_home_dir_for_tests()`. The `hand()` helper wraps `auto_select_hand` without semantic scores for concise assertions.\n\nTest categories cover:\n- Per-hand keyword routing (collector, researcher, clip, predictor, trader, etc.)\n- `MIN_HAND_SCORE` threshold enforcement\n- Negative/boundary cases (generic greetings, short ambiguous messages)\n- Semantic score blending (Chinese, Japanese, Korean fallback)\n- Cache consistency\n- Custom hand loading from temp directories","kernel-core-librefang-kernel-src":"# Kernel Core — librefang-kernel-src\n\n# Kernel Core — `librefang-kernel-src`\n\nThe central runtime for the LibreFang Agent Operating System. The kernel manages agent lifecycles, configuration, resource quotas, scheduling, inter-agent communication, and process supervision.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Kernel[\"LibreFangKernel\"]\n        Config[\"config<br/>(TOML + includes + migration)\"]\n        Registry[\"AgentRegistry<br/>(DashMap + indexes)\"]\n        Scheduler[\"AgentScheduler<br/>(quotas + usage tracking)\"]\n        EventBus[\"EventBus<br/>(broadcast + per-agent channels)\"]\n        Supervisor[\"Supervisor<br/>(shutdown + restart tracking)\"]\n        BgExec[\"BackgroundExecutor<br/>(continuous / periodic / proactive)\"]\n    end\n\n    Config -->|ReloadPlan| ConfigReload[\"config_reload<br/>(hot-reload diffing)\"]\n    EventBus -->|triggers| Triggers[\"triggers\"]\n    BgExec -->|send_message| Registry\n    Supervisor -->|shutdown_rx| BgExec\n    Scheduler -->|check_quota| Registry\n```\n\nAll core state structures use `DashMap` for lock-free concurrent access across tokio tasks. The kernel is designed to run as a single long-lived process (daemon), with the `Supervisor` coordinating graceful shutdown.\n\n---\n\n## Configuration — `config`\n\nLoads `KernelConfig` from `~/.librefang/config.toml` (or `$LIBREFANG_HOME/config.toml`).\n\n### Include system\n\nThe `include` field accepts an array of relative TOML paths. Included files are deep-merged first, then the root config overrides them. Security constraints:\n\n- Absolute paths are rejected\n- `..` path components are rejected\n- Canonical path must stay within the config directory\n- Circular includes are detected and rejected\n- Maximum nesting depth is 10 (`MAX_INCLUDE_DEPTH`)\n\nDeep merge is handled by `deep_merge_toml`: tables are merged recursively, all other types are overwritten by the overlay.\n\n### Versioned migration\n\nConfigs carry a `config_version` integer. When the file version is behind `CONFIG_VERSION`, `run_migrations` transforms the TOML value in-place and writes the migrated config back to disk. On migration failure, the original config is used as a best-effort fallback.\n\n### Strict vs tolerant mode\n\n- **Tolerant** (default): unknown top-level fields are logged as warnings and ignored.\n- **Strict** (`strict_config = true`): unknown fields cause the entire config to be rejected, falling back to defaults with `strict_config` preserved.\n\n### Key functions\n\n| Function | Purpose |\n|---|---|\n| `load_config(path: Option<&Path>)` | Main entry point. Returns `KernelConfig`. |\n| `deep_merge_toml(base, overlay)` | Recursively merges two TOML values. |\n| `default_config_path()` | Returns `$LIBREFANG_HOME/config.toml` or `~/.librefang/config.toml`. |\n| `librefang_home()` | Returns the home directory, respecting the `LIBREFANG_HOME` env var. |\n\n---\n\n## Config Hot-Reload — `config_reload`\n\nProduces a `ReloadPlan` by diffing two `KernelConfig` instances. Every detected change falls into one of three categories:\n\n| Category | Examples | Behavior |\n|---|---|---|\n| **Restart required** | `api_listen`, `network_enabled`, `memory`, `vault`, `home_dir`, `data_dir` | Cannot be patched at runtime. |\n| **Hot-reloadable** | `channels`, `skills`, `mcp_servers`, `tool_policy`, `proxy`, `default_model`, `provider_api_keys`, `approval`, `extensions` | Applied via `HotAction` enum without restart. |\n| **No-op** | `log_level`, `language`, `mode`, `stable_prefix_mode`, `sanitize` | Effective immediately via config swap; no explicit action needed. |\n\n### `ReloadPlan`\n\n```rust\npub struct ReloadPlan {\n    pub restart_required: bool,\n    pub restart_reasons: Vec<String>,\n    pub hot_actions: Vec<HotAction>,\n    pub noop_changes: Vec<String>,\n}\n```\n\n- `has_changes()` — returns true if any change was detected.\n- `is_hot_reloadable()` — returns true if no restart is required.\n- `log_summary()` — emits structured log lines for each category.\n\n### Validation\n\n`validate_config_for_reload(config)` checks:\n- `api_listen` is non-empty\n- `max_cron_jobs ≤ 10_000`\n- Approval policy passes its own validation\n- If `network_enabled`, then `network.shared_secret` must be non-empty\n\n### Applying the plan\n\n`should_apply_hot(mode, plan)` maps the configured `ReloadMode` (`Off`, `Restart`, `Hot`, `Hybrid`) to a boolean indicating whether the caller should apply hot actions.\n\n---\n\n## Agent Registry — `registry`\n\nThread-safe agent store backed by `DashMap` with three indexes:\n\n- **Primary**: `AgentId → AgentEntry`\n- **Name**: `String → AgentId` (enforces uniqueness)\n- **Tag**: `String → Vec<AgentId>` (for tag-based lookups)\n\n### Concurrency safety\n\nName uniqueness uses `DashMap::entry()` with the `Entry` API to avoid TOCTOU races between `contains_key` and `insert`. The `update_name` method atomically inserts the new name index entry before updating the agent, and rolls back if the agent ID doesn't exist.\n\n### Mutation methods\n\nThe registry exposes granular update methods that each bump `last_active`:\n\n| Method | What it changes |\n|---|---|\n| `register` / `remove` | Full entry insertion/removal (also updates indexes) |\n| `set_state` / `set_mode` | Agent state/mode transitions |\n| `touch` | Updates `last_active` only (for heartbeat during long operations) |\n| `update_model`, `update_temperature`, `update_max_tokens` | LLM parameters |\n| `update_model_and_provider`, `update_model_provider_config` | Model + connection hints together |\n| `update_system_prompt` | Hot-swaps the system prompt (effective on next message) |\n| `update_skills` | Replaces skill list and clears `skills_disabled` flag |\n| `update_tool_filters` | Replaces allowlist/blocklist and clears `tools_disabled` flag |\n| `update_name` | Renames agent (updates name index atomically) |\n| `update_auto_dream_enabled` | Toggles auto-dream opt-in flag |\n| `is_auto_dream_enabled` | Cheap bool-only read (no clone) — returns `false` for missing agents |\n| `replace_manifest` | Wholesale manifest replacement (used by `reload_agent_from_disk`) |\n| `mark_onboarding_complete` | Sets onboarding timestamp |\n| `update_resources` | Partial update of budget limits (hourly/daily/monthly/tokens-per-hour) |\n\n`list()` returns agents sorted by name for deterministic ordering.\n\n---\n\n## Supervisor — `supervisor`\n\nManages graceful shutdown and tracks process health.\n\n### Shutdown signaling\n\nUses a `tokio::sync::watch::channel<bool>`. Call `subscribe()` to get a receiver that fires when `shutdown()` is invoked. Components like the `BackgroundExecutor` select on `shutdown.changed()` to break out of loops.\n\n### Restart and panic tracking\n\n| Counter | Method | Purpose |\n|---|---|---|\n| `panic_count` | `record_panic()` | Total panics caught across all agents |\n| `restart_count` | `record_restart()` | Global restart counter |\n| Per-agent restarts | `record_agent_restart(id, max)` | Returns `Err(count)` when `max` is exceeded |\n\n`max_restarts = 0` means unlimited. `reset_agent_restarts(id)` clears the counter (for manual intervention).\n\n### Health report\n\n`health()` returns a `SupervisorHealth` snapshot with `is_shutting_down`, `panic_count`, and `restart_count`. This is consumed by the dashboard and CLI (`useMcpHealth`, `useTerminalHealth`, `fetch_health_timed`).\n\n---\n\n## Scheduler — `scheduler`\n\nEnforces resource quotas and tracks per-agent usage with a rolling hourly window.\n\n### `UsageTracker`\n\n| Field | Window | Purpose |\n|---|---|---|\n| `total_tokens`, `input_tokens`, `output_tokens` | 1 hour | Token budget tracking |\n| `llm_calls` | 1 hour | API call counting |\n| `tool_call_timestamps` | 1 minute sliding window | Tool-call rate limiting |\n| `token_timestamps` | 1 minute sliding window | Burst detection |\n\nThe hourly window auto-resets when `window_start` is older than 1 hour.\n\n### Quota enforcement — `check_quota`\n\nChecks three limits in order:\n\n1. **Hourly token limit**: `total_tokens > effective_token_limit()` → `QuotaExceeded`\n2. **Burst limit**: tokens in the last minute must not exceed 1/5 of the hourly budget\n3. **Tool-call rate**: `tool_calls_in_last_minute >= max_tool_calls_per_minute` → `QuotaExceeded`\n\nA value of `0` for any limit means unlimited. Agents with no registered quota are also unlimited.\n\n### Key methods\n\n- `register(id, quota)` — sets initial quota and usage tracker\n- `update_quota(id, quota)` — replaces quota without resetting accumulated usage (for hot-reload)\n- `record_usage(id, usage)` — adds token counts from an LLM response\n- `record_tool_calls(id, count)` — appends timestamps to the sliding window\n- `get_usage(id)` — returns a `UsageSnapshot`\n- `abort_task(id)` / `unregister(id)` — cleanup\n\n---\n\n## Event Bus — `event_bus`\n\nPub/sub system with a history buffer.\n\n### Routing\n\n| `EventTarget` | Routing behavior |\n|---|---|\n| `Agent(id)` | Delivered only to that agent's channel |\n| `Broadcast` | Sent to the global channel AND all agent channels |\n| `Pattern(_)` | Broadcast to all (pattern matching is phase 1) |\n| `System` | Sent only to the global channel |\n\n### Capacity\n\n- Global broadcast channel: 1024 slots\n- Per-agent channels: 256 slots\n- History ring buffer: 1000 events (`HISTORY_SIZE`)\n\nWhen a channel is full, events are silently dropped and `dropped_count` is incremented. Drop warnings are rate-limited to once per 10 seconds.\n\n### Lifecycle\n\n- `subscribe_agent(id)` — creates a channel on first call for that agent\n- `unsubscribe_agent(id)` — removes the channel\n- `gc_stale_channels(live_agents)` — removes channels for agents no longer in the registry\n\n---\n\n## Background Executor — `background`\n\nRuns autonomous agents in three modes:\n\n| Mode | Description |\n|---|---|\n| `Continuous` | Self-prompts on a fixed interval (`check_interval_secs`) |\n| `Periodic` | Wakes on a simplified cron schedule (parsed to seconds) |\n| `Proactive` | Wakes when matching events fire (no dedicated task) |\n| `Reactive` | No background task (default, message-driven only) |\n\n### Concurrency control\n\nA global `tokio::sync::Semaphore` limits concurrent background LLM calls to `MAX_CONCURRENT_BG_LLM` (default 5). Each tick acquires a permit before sending the self-prompt. The permit is held until the tick completes (via RAII `BusyGuard` + watcher task).\n\n### Startup jitter\n\nBoth continuous and periodic loops apply random jitter (`0..interval`) before the first tick. This prevents all agents from loading sessions into memory simultaneously at boot.\n\n### Pause/resume\n\nPer-agent `AtomicBool` flags allow pausing background loops without stopping them. `pause_agent(id)` can be called before `start_agent` — the flag is pre-created so the loop starts in the paused state.\n\n### Busy guard\n\nThe `BusyGuard` struct clears the per-agent busy flag on drop, even if the task panics. This prevents a crashed tick from permanently blocking future ticks.\n\n---\n\n## Other Submodules\n\n| Module | Purpose |\n|---|---|\n| `approval` | Human-in-the-loop approval gate for sensitive operations |\n| `auth` | Authentication and API key validation |\n| `auto_dream` | Autonomous dreaming/consolidation scheduler for agents |\n| `capabilities` | Capability negotiation between agents |\n| `cron` | Cron job scheduling and management |\n| `error` | Kernel-specific error types |\n| `heartbeat` | Agent health monitoring and stale-agent detection |\n| `inbox` | Message inbox management per agent |\n| `kernel` | Main `LibreFangKernel` struct and `DeliveryTracker` |\n| `mcp_oauth_provider` | OAuth provider for MCP server connections |\n| `metering` | Re-exported from `librefang-kernel-metering` |\n| `orchestration` | Multi-agent orchestration patterns |\n| `pairing` | Agent pairing protocol |\n| `router` | Re-exported from `librefang-kernel-router` — message routing |\n| `triggers` | Pattern-based event triggers (memory deltas, key patterns) |\n| `whatsapp_gateway` | WhatsApp bridge installation and lifecycle |\n| `wizard` | First-run agent setup wizard (`build_plan` produces `AgentManifest`) |\n| `workflow` | DAG-based workflow engine with templates, persistence, and fan-out parallelism |\n\n---\n\n## Public API Surface\n\nThe crate re-exports two primary types:\n\n```rust\npub use kernel::DeliveryTracker;\npub use kernel::LibreFangKernel;\n```\n\n`LibreFangKernel` is the main entry point that owns all subsystems (registry, scheduler, event bus, supervisor, background executor) and wires them together. `DeliveryTracker` tracks message delivery status across channels.\n\n---\n\n## Contributing Guidelines\n\n**Thread safety**: All shared state uses `DashMap`. Do not introduce `Mutex<HashMap<...>>` — the lock-free concurrent access is load-bearing under high agent counts.\n\n**Adding new config fields**: After adding a field to `KernelConfig` in `librefang-types`:\n1. If the field can be hot-reloaded, add a `HotAction` variant and a check in `build_reload_plan`.\n2. If it requires restart, add it to the restart-required section.\n3. If it's a no-op, add it to the noop section.\n\n**Adding registry mutations**: Every mutation method must bump `last_active`. Use `get_mut` on the DashMap — do not clone-modify-reinsert (it creates a TOCTOU window).\n\n**New background modes**: Extend `ScheduleMode` in `librefang-types`, then add a match arm in `BackgroundExecutor::start_agent`. Remember to acquire the LLM semaphore and use the `BusyGuard` pattern.","kernel-core":"# Kernel Core\n\n# Kernel Core\n\nThe central runtime and supporting services for the LibreFang Agent Operating System. The kernel orchestrates agent lifecycles from instantiation through shutdown, while providing the routing, metering, and interface layers that make multi-agent coordination possible.\n\n## Sub-modules at a glance\n\n| Sub-module | Responsibility |\n|---|---|\n| [Kernel Core (runtime)](librefang-kernel-src.md) | Agent lifecycles, configuration, scheduling, event bus, process supervision, and background execution |\n| [Metering](librefang-kernel-metering-src.md) | LLM cost tracking and quota enforcement across per-agent, global, and per-provider budgets |\n| [Router](librefang-kernel-router-src.md) | Request dispatch — selects which agent template or hand should handle an incoming message |\n| [Handle](librefang-kernel-handle-src.md) | Dependency-inversion trait (`KernelHandle`) that lets agents call back into the kernel without circular imports |\n\n## How they fit together\n\n```\nUser message\n    │\n    ▼\n┌──────────┐   selects agent    ┌─────────────────┐\n│  Router   │ ─────────────────▶│  AgentRegistry   │\n└──────────┘                    └────────┬─────────┘\n                                         │ spawns / supervises\n                                         ▼\n                                ┌─────────────────┐\n                                │  Agent Instance  │──┐\n                                └────────┬─────────┘  │\n                                    │    │            │\n                          calls via │    │ LLM call   │\n                       KernelHandle │    │ completes  │\n                                    ▼    ▼            │\n                              ┌──────────────┐        │\n                              │   Metering    │◀───────┘\n                              └──────────────┘  records cost &\n                                                  enforces quotas\n```\n\nThe **Router** is the entry point for every user message. It scores candidate templates and hands using keyword matching, manifest metadata, and optional semantic embeddings, then hands the selected agent to the kernel runtime.\n\nThe **Kernel runtime** owns the resulting agent lifecycle. Its `AgentRegistry` tracks live agents, the `AgentScheduler` enforces resource quotas, the `EventBus` handles inter-agent communication via broadcast and per-agent channels, and the `Supervisor` manages shutdown and restart tracking. The `BackgroundExecutor` drives continuous, periodic, and proactive tasks.\n\nThe **Handle** breaks what would otherwise be a circular import: the kernel owns the runtime, but agents need to reach back into the kernel to spawn children, read shared memory, post tasks, and request human approval. `KernelHandle` is an `#[async_trait]` that enumerates every such operation; the kernel implements it and injects it at agent startup.\n\nThe **Metering engine** sits at the LLM call boundary. When an agent completes an LLM call, `check_all_and_record` validates spending against three independent budget layers—per-agent, global, and per-provider—inside a single SQLite transaction. If any layer is exceeded, the call is rejected with a `QuotaExceeded` error and no usage is recorded.\n\n## Key cross-cutting workflows\n\n- **Request handling:** Router → Kernel (registry + scheduler) → Agent instance → Metering (cost recorded)\n- **Agent callback:** Agent → KernelHandle → Kernel (spawn child, shared memory, human approval, etc.)\n- **Budget enforcement:** Metering intercepts every LLM call, checks all three budget layers atomically, and blocks over-budget calls before they reach the provider","llm-providers-librefang-llm-driver-src":"# LLM Providers — librefang-llm-driver-src\n\n# librefang-llm-driver\n\nProvider-agnostic LLM driver abstraction and error classification for LibreFang.\n\nThis crate defines the core `LlmDriver` trait that all LLM provider implementations (Anthropic, OpenAI, Gemini, Ollama, etc.) conform to, along with the request/response types, streaming event protocol, and a comprehensive error classification system used throughout the runtime.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Loop / Routing] -->|CompletionRequest| B[LlmDriver trait]\n    B -->|complete| C[Provider Implementation]\n    B -->|stream| C\n    C -->|CompletionResponse / StreamEvent| A\n    C -->|LlmError| D[llm_errors::classify_error]\n    D -->|ClassifiedError| E[Retry Logic / User Feedback]\n    F[DriverConfig] -->|configures| B\n```\n\nThe crate is split into two modules:\n\n- **`lib.rs`** — the `LlmDriver` trait, `CompletionRequest`/`CompletionResponse` types, `StreamEvent` protocol, `DriverConfig`, and the `LlmError` enum.\n- **`llm_errors`** — error classification (`classify_error`), sanitization for user display, retry-delay extraction, and transient-error detection. Handles error formats from all 19+ supported providers.\n\n## Core Types\n\n### CompletionRequest\n\nA request to an LLM for completion. Constructed by the agent loop or routing layer and passed to a driver.\n\n| Field | Type | Purpose |\n|---|---|---|\n| `model` | `String` | Model identifier (e.g. `\"claude-sonnet-4-20250514\"`) |\n| `messages` | `Vec<Message>` | Conversation history |\n| `tools` | `Vec<ToolDefinition>` | Tools available to the model |\n| `max_tokens` | `u32` | Maximum tokens to generate |\n| `temperature` | `f32` | Sampling temperature |\n| `system` | `Option<String>` | System prompt (extracted for APIs requiring it separately) |\n| `thinking` | `Option<ThinkingConfig>` | Extended thinking / reasoning configuration |\n| `prompt_caching` | `bool` | Enable prompt caching (Anthropic: ephemeral cache markers; OpenAI: automatic prefix caching) |\n| `response_format` | `Option<ResponseFormat>` | Structured output format |\n| `timeout_secs` | `Option<u64>` | Per-request timeout override (seconds, inactivity-based) |\n| `extra_body` | `Option<HashMap<String, Value>>` | Provider-specific parameters merged into the request body (last-wins) |\n| `agent_id` | `Option<String>` | Caller agent identity for MCP bridge forwarding |\n\n### CompletionResponse\n\n```rust\npub struct CompletionResponse {\n    pub content: Vec<ContentBlock>,\n    pub stop_reason: StopReason,\n    pub tool_calls: Vec<ToolCall>,\n    pub usage: TokenUsage,\n}\n```\n\nUse `response.text()` to concatenate all text content blocks into a single string. This is the most common accessor — it filters out `Thinking` blocks and any non-text content.\n\n### StreamEvent\n\nEvents emitted during streaming. The agent loop consumes these via a `tokio::sync::mpsc::Receiver` to provide real-time feedback.\n\n| Variant | When emitted |\n|---|---|\n| `TextDelta { text }` | Incremental text content |\n| `ToolUseStart { id, name }` | A tool use block has begun |\n| `ToolInputDelta { text }` | Incremental JSON for an in-progress tool call |\n| `ToolUseEnd { id, name, input }` | Tool call complete with parsed input |\n| `ThinkingDelta { text }` | Incremental reasoning/thinking text |\n| `ContentComplete { stop_reason, usage }` | Entire response is done |\n| `PhaseChange { phase, detail }` | Agent lifecycle phase transition (UX indicators) |\n| `ToolExecutionResult { name, result_preview, is_error }` | Tool execution finished (emitted by agent loop, not the driver) |\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) is the phase name signalling that LLM text has finished streaming and the agent loop is entering post-processing (session save, proactive memory). Consumers use this to unblock user input before the full response payload is ready.\n\n## The LlmDriver Trait\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError> { /* default impl */ }\n\n    fn is_configured(&self) -> bool { true }\n}\n```\n\n**`complete`** — required. Sends a non-streaming request and returns the full response.\n\n**`stream`** — optional override. The default implementation wraps `complete()` and emits `TextDelta` + `ContentComplete` events. Real provider implementations override this to emit incremental deltas. The method returns the full `CompletionResponse` when done, so callers always get a complete result regardless of whether they consume the stream events.\n\n**`is_configured`** — returns `true` for all real drivers. Only `StubDriver` returns `false`, used for testing or when no provider is available.\n\n### Implementing a New Provider\n\n1. Create a struct holding provider-specific state (HTTP client, API key, base URL, etc.).\n2. Implement `LlmDriver` with at minimum `complete()`.\n3. Override `stream()` if the provider supports SSE or incremental responses.\n4. Return `LlmError` variants mapped from provider-specific errors (see error handling below).\n\n## DriverConfig\n\nConfiguration for constructing a driver. Passed from `KernelConfig` down to the driver factory.\n\n```rust\npub struct DriverConfig {\n    pub provider: String,\n    pub api_key: Option<String>,\n    pub base_url: Option<String>,\n    pub vertex_ai: VertexAiConfig,\n    pub azure_openai: AzureOpenAiConfig,\n    pub skip_permissions: bool,          // default: true\n    pub message_timeout_secs: u64,       // default: 300\n    pub mcp_bridge: Option<McpBridgeConfig>,\n    pub proxy_url: Option<String>,\n}\n```\n\nNotable fields:\n\n- **`skip_permissions`** defaults to `true` because LibreFang runs as a daemon with no interactive terminal. The daemon's own capability/RBAC layer handles authorization.\n- **`message_timeout_secs`** is inactivity-based (seconds of silence on stdout), not wall-clock time. Only applies to CLI-based providers like Claude Code.\n- **`mcp_bridge`** configures bridging LibreFang tools into a CLI driver via MCP. Not se
