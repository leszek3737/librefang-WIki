------|-------------|\n| `EMAIL_USERNAME` | Yes | — | IMAP login username |\n| `EMAIL_PASSWORD` | Yes | — | IMAP login password or app-specific password |\n| `IMAP_SERVER` | No | `imap.gmail.com` | IMAP server hostname |\n| `IMAP_PORT` | No | `993` | IMAP server port (must be an integer) |\n\n## Output Format\n\nThe script writes structured, line-delimited output to stdout, making it straightforward to parse in shell pipelines:\n\n```\nFound 3 email(s) in INBOX\nSUBJECT: Your build succeeded\nFROM: CI <ci@example.com>\nDATE: Mon, 12 May 2025 10:30:00 -0400\n---BODY---\nPlain text content of the email...\n```\n\nWhen no matching email exists:\n\n```\nNO_EMAIL_FOUND (searched: INBOX, All Mail, Promotions, Updates)\n```\n\nThe body is truncated to 4000 characters. Diagnostic warnings and errors go to stderr, so stdout remains clean for programmatic consumption.\n\n## Internal Functions\n\n### `decode_str(s, enc=None)`\n\nDecodes a byte string or returns a plain string as-is. Used primarily for decoding email headers that may be encoded in various character sets.\n\n- **Parameters**: `s` — bytes or str, `enc` — encoding name (defaults to `\"utf-8\"`)\n- **Returns**: `str`, never `None` (empty string fallback)\n\n### `get_body(msg)`\n\nExtracts the text content from an `email.message.Message` object with a two-pass strategy:\n\n1. **First pass**: Looks for a `text/plain` part that is not an attachment.\n2. **Second pass** (fallback): Looks for a `text/html` part, strips all HTML tags via regex, and collapses whitespace.\n\nFor non-multipart messages, decodes the single payload directly.\n\n- **Parameters**: `msg` — an `email.message.Message` instance\n- **Returns**: `str` — the extracted body text, or `\"\"` if nothing could be extracted\n\n### `search_folder(mail, folder, sender)`\n\nSelects a single IMAP folder in readonly mode and searches for messages matching the given sender. If `sender` is an empty string, matches all messages.\n\n- **Parameters**:\n  - `mail` — an authenticated `imaplib.IMAP4_SSL` instance\n  - `folder` — IMAP folder name (e.g., `\"INBOX\"`, `'\"[Gmail]/All Mail\"'`)\n  - `sender` — email address string, or `\"\"` for all\n- **Returns**: `list[bytes]` — message IDs, empty list on failure\n- **Error handling**: Catches all exceptions, prints a warning to stderr, and returns `[]` so the caller can continue to the next folder.\n\n## Folder Search Strategy\n\nFolders are searched in a fixed priority order. The script stops at the first folder containing matching emails:\n\n1. `INBOX`\n2. `[Gmail]/All Mail`\n3. `[Gmail]/Promotions`\n4. `[Gmail]/Updates`\n5. `Promotions`\n6. `Updates`\n\nGmail-specific folder names (entries 2–4) will fail gracefully on non-Gmail servers — `search_folder` catches the exception and returns an empty list, allowing the generic folder names (entries 5–6) to be tried next.\n\nThe script always fetches the **last** ID from the found set (`found_ids[-1]`), which corresponds to the most recent email in that folder matching the sender.\n\n## Integration Notes\n\n- **Standalone module**: This script has no imports from the rest of the codebase and no external dependencies beyond the Python standard library. It can be invoked independently.\n- **Pipeline usage**: Suitable for CI/CD steps that need to validate email delivery. Pair with `grep` or `jq` to assert on subject or body content.\n- **Gmail app passwords**: When using Gmail, the account must have 2-factor authentication enabled and an app-specific password generated. Standard account passwords will be rejected.\n- **IMAP must be enabled**: The target mailbox must have IMAP access enabled in its settings.","build-system-src":"# Build System — src\n\n# Build System — `xtask`\n\nWorkspace automation for LibreFang. Every development workflow—building, testing, releasing, publishing—is driven through `cargo xtask <command>`.\n\n## Architecture\n\nThe xtask follows a flat module-per-task convention. Each module exports two things: a clap `Parser` struct for arguments, and a `pub fn run(args) -> Result<(), Box<dyn std::error::Error>>` entry point. `main.rs` wires them together as subcommands.\n\n```mermaid\ngraph TD\n    CLI[\"cargo xtask &lt;command&gt;\"] --> Parser[\"clap::Parser\"]\n    Parser --> Command[\"Command enum\"]\n    Command --> Module[\"module::run(args)\"]\n    Module --> Common[\"common::repo_root()\"]\n    Module --> Ext[\"External tools<br/>(cargo, pnpm, gh, docker, ...)\"]\n```\n\nThe `common` module provides a single function—`repo_root()`—that walks upward from the current directory until it finds a `Cargo.toml` containing `[workspace]`. Every task uses this to resolve paths.\n\n## Command Reference\n\n### Build & Release\n\n| Command | Purpose |\n|---|---|\n| `build-web` | Build frontend assets (dashboard, web, docs) via pnpm |\n| `dist` | Cross-compile release binaries for multiple platforms |\n| `docker` | Build and optionally push a Docker image |\n| `release` | Full release flow: changelog → sync versions → commit → tag → PR |\n| `sync-versions` | Propagate the workspace version across Cargo.toml, SDKs, Tauri config, etc. |\n\n### Testing & Quality\n\n| Command | Purpose |\n|---|---|\n| `ci` | Run the full CI suite locally: build, test, clippy, web lint |\n| `integration-test` | Spin up the daemon and exercise HTTP endpoints against it |\n| `coverage` | Generate test coverage via `cargo llvm-cov` (HTML or lcov) |\n| `bench` | Run criterion benchmarks with optional baseline comparison |\n| `fmt` | Check or fix formatting for Rust (rustfmt) and web (prettier) |\n| `pre-commit` | One-shot check: fmt + clippy + test |\n| `check-links` | Validate links in Markdown docs (lychee or built-in fallback) |\n\n### Development\n\n| Command | Purpose |\n|---|---|\n| `dev` | Start the daemon with hot-reload, dashboard dev server, and interactive hotkeys |\n| `setup` | Bootstrap a local development environment |\n| `doctor` | Diagnose missing tools, stale ports, config issues, API key status |\n| `db` | Inspect, back up, or reset the local SQLite database |\n| `clean-all` | Remove all build artifacts (Rust + frontend) with size reporting |\n\n### Documentation & Metadata\n\n| Command | Purpose |\n|---|---|\n| `api-docs` | Generate a standalone Swagger UI page from the OpenAPI spec |\n| `changelog` | Produce a classified `CHANGELOG.md` entry from merged GitHub PRs |\n| `contributors` | Generate contributors SVG and star-history SVG via the GitHub API |\n| `loc` | Lines-of-code statistics and workspace dependency graph |\n| `codegen` | Regenerate derived files (OpenAPI spec) |\n\n### Publishing\n\n| Command | Purpose |\n|---|---|\n| `publish-sdks` | Publish JS, Python, and Rust SDKs to their respective registries |\n| `publish-npm-binaries` | Build and publish platform-specific CLI binaries to npm |\n| `publish-pypi-binaries` | Build and publish platform-specific wheels to PyPI |\n\n### Dependency Management\n\n| Command | Purpose |\n|---|---|\n| `deps` | Audit for vulnerabilities (`cargo audit`, `pnpm audit`) and check for updates |\n| `update-deps` | Update Rust and web dependencies |\n| `license-check` | Verify dependency licenses against a deny list |\n\n### Other\n\n| Command | Purpose |\n|---|---|\n| `migrate` | Migrate agent configurations from OpenClaw or OpenFang |\n| `validate-config` | Validate a `config.toml` file |\n\n## Adding a New Task\n\n1. Create `src/my_task.rs` with an `Args` struct and a `run` function:\n\n```rust\nuse crate::common::repo_root;\nuse clap::Parser;\n\n#[derive(Parser, Debug)]\npub struct MyTaskArgs {\n    #[arg(long)]\n    pub flag: bool,\n}\n\npub fn run(args: MyTaskArgs) -> Result<(), Box<dyn std::error::Error>> {\n    let root = repo_root();\n    // ...\n    Ok(())\n}\n```\n\n2. Add `mod my_task;` to `main.rs`.\n\n3. Add a variant to the `Command` enum with the `run` dispatch in the `match` block.\n\n## Key Patterns\n\n### Error Handling\n\nAll tasks return `Result<(), Box<dyn std::error::Error>>`. On failure, `main` prints the error to stderr and exits with code 1. Tasks that run multiple sub-steps (like `ci`, `deps`) count failures and report a summary at the end.\n\n### External Tool Detection\n\nSeveral tasks check for external tools before use. Some auto-install missing tools (`coverage` installs `cargo-llvm-cov`, `dev` installs `cargo-watch`, `deps` installs `cargo-audit` and `cargo-outdated`). The helper `has_command` or inline `Command::new(...).arg(\"--version\")` checks are used throughout.\n\n### Conditional Execution\n\nTasks like `build-web`, `ci`, and `fmt` detect the presence of `package.json` or tool availability to skip irrelevant steps rather than failing. This keeps the commands portable across different developer environments.\n\n### Workspace Version\n\nSeveral tasks (`dist`, `docker`, `release`, `sync_versions`) read the version from the workspace `Cargo.toml` using `toml_edit`:\n\n```rust\nfn read_workspace_version(root: &Path) -> String {\n    let content = fs::read_to_string(root.join(\"Cargo.toml\")).unwrap_or_default();\n    let doc = content.parse::<toml_edit::DocumentMut>().ok();\n    doc.and_then(|d| {\n        d[\"workspace\"][\"package\"][\"version\"].as_str().map(String::from)\n    }).unwrap_or_else(|| \"unknown\".into())\n}\n```\n\n### Cross-Platform Builds\n\n`dist` supports five default targets (Linux x86_64/ARM64, macOS x86_64/ARM64, Windows x86_64) and can use `cross` for cross-compilation. Archives are `.tar.gz` on Unix and `.zip` on Windows.\n\n## Notable Task Details\n\n### `dev` — Interactive Development Environment\n\nThe most complex task. It:\n\n1. Kills stale processes on relevant ports (4545, 5173–5178) and removes stale `daemon.json`\n2. Builds `librefang-cli` and runs `librefang init --quick` if no config exists\n3. Starts the dashboard dev server (`pnpm dev`) in the background\n4. Launches `cargo watch` scoped to `crates/` (excluding the dashboard's own directory) for rebuild-and-restart cycles\n5. Spawns background threads for:\n   - **Auto-pull**: fetches and rebases `origin/main` every 30 seconds\n   - **Hotkey listener**: reads single keypresses (`r` rebase, `o` open dashboard, `l` logs, `s` status, `c` clear, `?` help)\n\n### `integration-test` — Live Endpoint Testing\n\nStarts the daemon as a subprocess, polls `/api/health` until responsive, then exercises endpoints (`/api/agents`, `/api/budget`, `/api/network/status`) and optionally an LLM round-trip. Uses `curl` subprocess calls for HTTP requests and cleans up the daemon on exit.\n\n### `changelog` — PR Classification\n\nFetches PR data via `gh api`, classifies titles by conventional-commit prefix (`feat` → Added, `fix` → Fixed, etc.), and inserts the result into `CHANGELOG.md` at the correct position. Replaces an existing section for the same version if present.\n\n### `contributors` — SVG Generation\n\nDownloads contributor avatars from GitHub, encodes them as base64 data URIs (to avoid CSP issues in rendered SVGs), and produces a grid layout. The star-history chart queries `stargazers` with the `star+json` accept header for timestamps and renders a polyline chart.","build-system-tests":"# Build System — tests\n\n# Build System — `install.sh` Tests\n\n## Overview\n\n`scripts/tests/install_sh_test.sh` is a POSIX-compliant shell test harness that validates logic in `web/public/install.sh` — the curl-pipeable installer script. It exercises four exported functions from the installer in complete isolation by sourcing the installer with `LIBREFANG_INSTALLER_SOURCE_ONLY=1` (which loads functions but skips execution) and pointing `$HOME` at a temporary directory.\n\n## When to Run\n\nExecute from the repository root:\n\n```sh\nsh scripts/tests/install_sh_test.sh\n```\n\nNo external test framework is required. The script uses only POSIX `sh` builtins and standard utilities (`mktemp`, `ps`).\n\n## Test Isolation Strategy\n\nThe script creates a throwaway home directory and rebinds `$HOME` before sourcing the installer:\n\n```sh\nTMP_HOME=$(mktemp -d)\nHOME=\"$TMP_HOME\" LIBREFANG_INSTALLER_SOURCE_ONLY=1 . \"$INSTALLER_PATH\"\n```\n\nThis ensures:\n- No real user config files are read or mutated.\n- The installer's top-level code is suppressed (`LIBREFANG_INSTALLER_SOURCE_ONLY`), leaving only function definitions available for testing.\n- Temporary files are rooted under `$TMP_HOME`.\n\n## Test Suites\n\n### 1. `shell_rc_from_shell` — Shell-to-RC-Path Mapping\n\nVerifies that the function returns the correct config file path for each supported shell:\n\n| Input | Expected path |\n|---|---|\n| `zsh` | `$HOME/.zshrc` |\n| `/bin/bash` | `$HOME/.bashrc` |\n| `fish` | `$HOME/.config/fish/config.fish` |\n\n### 2. `choose_shell_rc` — Fallback Priority\n\nTests the fallback order when no explicit shell is specified. The function should prefer `.bashrc`, fall back to `.zshrc`, and finally to the fish config:\n\n1. All three files exist → selects `.bashrc`\n2. `.bashrc` removed → selects `.zshrc`\n3. `.zshrc` also removed → selects `config.fish`\n\nThe test creates all three files upfront, then removes them one at a time to validate each step.\n\n### 3. `is_enabled` — Auto-Start Flag Parsing\n\nValidates that the function correctly classifies truthy and falsy string values used for the `LIBREFANG_AUTO_START` environment variable.\n\n**Accepted (truthy):** `1`, `true`, `TRUE`, `yes`, `YES`, `on`, `ON`\n\n**Rejected (falsy):** `0`, `false`, `FALSE`, `no`, `NO`, `off`, `OFF`, `\"\"` (empty string)\n\n### 4. `detect_user_shell` — Parent Shell Detection Under `curl|sh`\n\nThis is the most complex test. It validates a regression scenario where the installer runs as `curl … | sh`, meaning the immediate parent process is `sh`, not the user's actual shell. The function must walk up the process tree to find the real shell.\n\n**Mock setup:** A fake `ps` binary is written to a temporary directory and prepended to `$PATH`. The mock uses a state file to simulate two `ps -o comm=` calls:\n\n| Call | Returns | Simulates |\n|---|---|---|\n| 1st `comm` query | `sh` | The curl\\|sh parent process |\n| `ppid` query | `222` | The parent PID of `sh` |\n| 2nd `comm` query | `zsh` | The user's actual shell |\n\nThe test runs the detection in a subprocess with the mocked `$PATH`:\n\n```sh\nDETECTED=$(HOME=\"$TMP_HOME\" PATH=\"$FAKE_BIN:$PATH\" SHELL=/bin/bash \\\n  FAKE_PS_STATE=\"$FAKE_PS_STATE\" INSTALLER_PATH=\"$INSTALLER_PATH\" \\\n  LIBREFANG_INSTALLER_SOURCE_ONLY=1 \\\n  sh -c '. \"$INSTALLER_PATH\"; detect_user_shell')\n```\n\nAsserts that the result is `zsh` — proving the function walked past the intermediate `sh` process.\n\n## Relationship to the Codebase\n\n```mermaid\ngraph LR\n    A[install_sh_test.sh] -->|sources with SOURCE_ONLY=1| B[web/public/install.sh]\n    A -->|mocks PATH| C[fake ps binary]\n    A -->|validates| D[shell_rc_from_shell]\n    A -->|validates| E[choose_shell_rc]\n    A -->|validates| F[is_enabled]\n    A -->|validates| G[detect_user_shell]\n    D & E & F & G -->|defined in| B\n```\n\nThe test file depends on exactly one production file: `web/public/install.sh`. It does not call any external services, network endpoints, or other test utilities. This makes it suitable for running in CI without side effects.\n\n## Adding New Tests\n\nFollow the existing pattern:\n\n1. Use the `fail` / `pass` helpers for assertions and reporting.\n2. Keep all file operations inside `$TMP_HOME` — do not touch the real `$HOME`.\n3. For functions that shell out to external commands, mock them via a temp directory prepended to `$PATH`, as demonstrated in the `detect_user_shell` test.\n4. Exit immediately on failure (`set -e` is active, and `fail` calls `exit 1`).","build-system-xtask":"# Build System — xtask\n\n# xtask — Build Automation\n\n## Overview\n\n`xtask` is the build automation layer for the LibreFang workspace. It follows the [cargo xtask pattern](https://github.com/matklad/cargo-xtask) — a convention where a `Cargo.toml` at the workspace root aliases `cargo xtask` to run a custom Rust binary instead of scattering shell scripts across the repository.\n\nEvery workflow that a contributor or CI pipeline needs — building, testing, releasing, publishing, cross-compiling — is exposed as a subcommand through a single CLI entry point powered by `clap`.\n\n### Why xtask Instead of Scripts\n\nShell scripts work until they don't. `xtask` solves real problems that emerged in this workspace:\n\n- **Portability.** Commands like `release`, `sync-versions`, and `changelog` need to run on Linux, macOS, and Windows without maintaining three script variants.\n- **Type safety.** Argument parsing, version validation, and file manipulation are handled by Rust and `serde` rather than fragile string manipulation in bash.\n- **Workspace awareness.** Commands operate on workspace metadata directly through `toml_edit` and `serde_json`, keeping version sync and cross-compilation accurate.\n- **Composability.** Commands can invoke each other (e.g., `release` orchestrates `changelog`, `sync-versions`, and `build-web`) without subprocess soup.\n\n## Architecture\n\n`xtask` is structured as a flat command dispatch. `clap` with the `derive` feature parses the subcommand name and flags, then each command runs as an independent function. There is no persistent state between commands — each invocation starts fresh.\n\n```mermaid\ngraph TD\n    CLI[\"cargo xtask &lt;command&gt;\"] --> Clap[\"clap arg parsing\"]\n    Clap --> Build[\"Build & Package\"]\n    Clap --> Quality[\"Quality & CI\"]\n    Clap --> Release[\"Release & Publish\"]\n    Clap --> Dev[\"Dev Workflow\"]\n    Clap --> Infra[\"Infra & Diagnostics\"]\n\n    Build --> BW[\"build-web\"]\n    Build --> Dist[\"dist\"]\n    Build --> Docker[\"docker\"]\n\n    Quality --> CI[\"ci\"]\n    Quality --> Fmt[\"fmt\"]\n    Quality --> PreCommit[\"pre-commit\"]\n    Quality --> Deps[\"deps\"]\n    Quality --> License[\"license-check\"]\n    Quality --> Coverage[\"coverage\"]\n    Quality --> Bench[\"bench\"]\n\n    Release --> Rel[\"release\"]\n    Rel --> CL[\"changelog\"]\n    Rel --> SV[\"sync-versions\"]\n    Rel --> BW\n    Release --> Pub[\"publish-sdks\"]\n\n    Dev --> DevCmd[\"dev\"]\n    Dev --> Setup[\"setup\"]\n    Dev --> DB[\"db\"]\n    Dev --> IT[\"integration-test\"]\n\n    Infra --> Doc[\"api-docs / codegen / check-links\"]\n    Infra --> Migrate[\"migrate\"]\n    Infra --> Doctor[\"doctor\"]\n```\n\n### Dependency Map\n\n| Crate Dependency | Purpose |\n|---|---|\n| `clap` (derive + env) | Subcommand parsing and flag definitions |\n| `serde` + `serde_json` | Parsing and writing JSON configs, OpenAPI specs, API responses |\n| `toml_edit` | Modifying `Cargo.toml` and `tauri.conf.json` while preserving formatting and comments |\n| `regex` | Changelog parsing, version string manipulation, link checking |\n| `chrono` | CalVer date components, changelog timestamps |\n| `base64` | Encoding for Docker auth, MSI-compatible version fields |\n| `librefang-migrate` | Framework migration logic for importing agents from OpenClaw/OpenFang |\n\n`librefang-migrate` is the only workspace crate that `xtask` depends on directly. The rest of the interaction with the workspace happens through subprocess calls (`cargo`, `pnpm`, `gh`, `npm`, `twine`) and file I/O against workspace paths.\n\n## Command Reference\n\nCommands are organized by workflow. Each command is invoked as `cargo xtask <name>` with the flags documented below.\n\n### Release & Publishing\n\n#### `release` — Full Release Flow\n\nOrchestrates the complete release pipeline: changelog generation, version synchronization, frontend builds, git commit/tag, and PR creation.\n\n```bash\ncargo xtask release --version 2026.3.2214        # explicit version\ncargo xtask release --version 2026.3.2214-beta1  # pre-release\ncargo xtask release --no-confirm                  # non-interactive (CI)\ncargo xtask release --no-push                     # local only, skip push + PR\ncargo xtask release --no-article                  # skip Dev.to article\n```\n\n**Preconditions:** Must be on `main` branch with a clean worktree. Requires `gh` CLI for PR creation.\n\nThis is the single entry point that composes `changelog`, `sync-versions`, and `build-web` into one atomic workflow.\n\n#### `changelog <version> [since-tag]`\n\nGenerates a `CHANGELOG.md` entry from merged PRs since the last tag. PRs are classified by conventional commit prefix (`feat:`, `fix:`, `refactor:`, `perf:`, `docs:`, `chore:`/`ci:`/`build:`/`test:`). Requires `gh` CLI.\n\n#### `sync-versions [version]`\n\nWrites the CalVer version string across every package in the workspace:\n\n| File | Notes |\n|---|---|\n| `Cargo.toml` (workspace root) | `[workspace.package] version` |\n| `sdk/javascript/package.json` | Direct write |\n| `sdk/python/setup.py` | PEP 440 conversion (`-beta1` → `b1`) |\n| `sdk/rust/Cargo.toml` + `sdk/rust/README.md` | Both updated |\n| `packages/whatsapp-gateway/package.json` | Direct write |\n| `crates/librefang-desktop/tauri.conf.json` | MSI-compatible base64 encoding for version field |\n\nWhen called with no argument, reads the current version from the workspace `Cargo.toml` and ensures all other files match. When called with an argument, bumps everything to the new version.\n\n#### `publish-sdks`\n\nPublishes SDKs to their registries. Flags: `--js` (npm), `--python` (PyPI via `twine`), `--rust` (crates.io). Use `--dry-run` to validate without publishing.\n\n### Build & Distribution\n\n#### `build-web`\n\nBuilds frontend targets via `pnpm`. Skips any directory missing a `package.json`.\n\n| Flag | Target Directory |\n|---|---|\n| `--dashboard` | `crates/librefang-api/dashboard/` (React) |\n| `--web` | `web/` (Vite + React) |\n| `--docs` | `docs/` (Next.js) |\n| *(no flag)* | All of the above |\n\n#### `dist`\n\nCross-compiles release binaries for multiple targets. Default targets: Linux (x86\\_64, aarch64), macOS (x86\\_64, aarch64), Windows (x86\\_64). Produces `.tar.gz` for Linux/macOS, `.zip` for Windows.\n\nUse `--cross` to invoke `cross` instead of `cargo` for cross-compilation. Use `--output` to specify the artifact directory.\n\n#### `docker`\n\nBuilds the Docker image from `deploy/Dockerfile` and tags it as `ghcr.io/librefang/librefang:<version>`. Supports `--push`, `--latest`, `--tag`, and `--platform` flags.\n\n### CI & Quality\n\n#### `ci`\n\nRuns the full local CI suite in order, fail-fast:\n\n1. `cargo build --workspace --lib`\n2. `cargo test --workspace` (unless `--no-test`)\n3. `cargo clippy --workspace --all-targets -- -D warnings`\n4. `pnpm run lint` in `web/` (unless `--no-web`)\n\nUse `--release` to build with the release profile. Use `--no-test --no-web` for the fastest check (build + clippy only).\n\n#### `fmt`\n\nUnified formatting check across Rust (`cargo fmt --check`) and frontend (`pnpm prettier --check`). Flags: `--fix` to auto-fix, `--no-web` for Rust only, `--no-rust` for web only.\n\n#### `pre-commit`\n\nRuns `fmt` + `clippy` + `test` as a pre-commit hook. Flags: `--no-test` (faster), `--no-clippy`, `--fix`.\n\n#### `coverage`\n\nGenerates test coverage via `cargo-llvm-cov`. Auto-installs the tool if missing. Flags: `--open` (open HTML report), `--lcov` (CI-friendly format), `--output <dir>`.\n\n#### `bench`\n\nRuns criterion benchmarks. Flags: `--name <bench>` (specific benchmark), `--save-baseline <name>`, `--baseline <name>` (compare), `--open` (HTML report).\n\n#### `deps`\n\nDependency audit using `cargo-audit`, `cargo-outdated`, and `pnpm audit`. Auto-installs missing tools. Flags: `--audit`, `--outdated`, `--web` to run subsets.\n\n#### `license-check`\n\nLicense compliance check using `cargo-deny` (falls back to `cargo metadata`). Flags: `--rust`, `--web`, `--deny \"GPL-3.0,AGPL-3.0\"` for custom denied licenses.\n\n### Development Workflow\n\n#### `dev`\n\nStarts the daemon and dashboard dev server together. Builds the daemon binary first, then runs both processes. Press Ctrl+C to stop. Flags: `--no-dashboard`, `--release`, `--port`.\n\n#### `setup`\n\nFirst-time environment setup for new contributors. Checks for required tools (cargo, rustup, pnpm, gh, docker, just), installs git hooks, fetches dependencies, runs `pnpm install`, and creates a default config. Flags: `--no-web`, `--no-fetch`.\n\n#### `integration-test`\n\nStarts the daemon, hits API endpoints (`/api/health`, `/api/agents`, `/api/budget`, `/api/network/status`), optionally tests LLM via `POST /api/agents/{id}/message`, verifies budget updated, then cleans up.\n\nRequires a pre-built binary at `target/release/librefang` (override with `--binary`). Flags: `--skip-llm`, `--api-key`, `--port`.\n\n#### `db`\n\nDatabase management: `--info` (show database info), `--backup <dir>` (copy db files), `--reset` (delete databases; daemon must be stopped). Use `--data-dir` for a custom data directory.\n\n#### `doctor`\n\nDeep environment diagnostics. Checks toolchain, port availability, daemon health, config validity, API keys, and workspace state. Use `--port` for a custom port.\n\n### Code Generation & Documentation\n\n#### `codegen`\n\nRuns code generators. Currently supports `--openapi` to regenerate `openapi.json` from utoipa annotations by running the spec test.\n\n#### `api-docs`\n\nGenerates a standalone Swagger UI HTML page from `openapi.json`. Flags: `--open` (open in browser), `--refresh` (regenerate spec first), `--output <dir>`.\n\n#### `check-links`\n\nChecks for broken links in documentation. Uses [lychee](https://github.com/lycheeverse/lychee) if installed, falls back to a built-in relative-link checker. Flags: `--basic`, `--path <dir>`, `--exclude <pattern>`.\n\n#### `validate-config`\n\nValidates `~/.librefang/config.toml` syntax and known fields. Flags: `--config <path>` (custom path), `--show` (print parsed config).\n\n### Utility\n\n#### `loc`\n\nLines of code statistics. Flags: `--crates` (per-crate breakdown), `--web` (include frontend), `--deps` (show crate dependency graph).\n\n#### `update-deps`\n\nBatch updates Rust (`cargo update`) and web (`pnpm update`) dependencies. Flags: `--rust`, `--web`, `--dry-run`, `--test` (run tests after updating).\n\n#### `clean-all`\n\nDeep clean of all build artifacts. Flags: `--rust` (`target/` + `dist/`), `--web` (`node_modules/` + `.next/` + `dist/`), `--dry-run` (preview).\n\n#### `migrate`\n\nImports agents from other frameworks (OpenClaw, OpenFang) into LibreFang using the `librefang-migrate` crate. Flags: `--source <name>`, `--source-dir <path>`, `--target-dir <path>`, `--dry-run`.\n\n## External Tool Dependencies\n\nSeveral commands shell out to external tools. Here is the full inventory:\n\n| Tool | Used By | Required For |\n|---|---|---|\n| `cargo` | `ci`, `dist`, `coverage`, `bench`, `pre-commit`, `dev` | All Rust workflows |\n| `pnpm` | `build-web`, `ci`, `setup`, `dev` | Frontend workflows |\n| `gh` | `release`, `changelog` | Release automation |\n| `npm` | `publish-sdks --js` | JS SDK publishing |\n| `twine` | `publish-sdks --python` | Python SDK publishing |\n| `docker` | `docker` | Container builds |\n| `cross` | `dist --cross` | Cross-compilation |\n| `cargo-llvm-cov` | `coverage` | Test coverage (auto-installed) |\n| `cargo-audit` | `deps --audit` | Security audit (auto-installed) |\n| `cargo-outdated` | `deps --outdated` | Dependency freshness (auto-installed) |\n| `cargo-deny` | `license-check` | License compliance (optional, graceful fallback) |\n| `lychee` | `check-links` | Link checking (optional, graceful fallback) |\n\nCommands that require an external tool check for its presence before running and produce a clear error message if it is missing. Tools marked \"auto-installed\" are installed automatically via `cargo install` when absent.\n\n## Adding a New Command\n\nTo add a new subcommand:\n\n1. **Define the CLI struct.** Add a `clap` `Args` struct and a variant to the top-level `Cli` enum in the main entry point.\n\n2. **Implement the command function.** Create a new module (or add to an existing one) with a `pub fn run(opts: &YourArgs) -> Result<()>`. Keep the function self-contained — read workspace state from files and environment, invoke tools via `std::process::Command`, and write results.\n\n3. **Dispatch from main.** Match on the new CLI variant and call the command function.\n\n4. **Follow the conventions:**\n   - Use `--dry-run` for any command with side effects.\n   - Use `--no-<step>` flags to allow skipping phases.\n   - Return a non-zero exit code on failure via `anyhow` error propagation.\n   - Print what the command is doing (tool name, target, file path) so output is self-documenting.\n\n## Conventions\n\n- **CalVer versioning.** All version strings follow `YYYY.M.DDMM` (e.g., `2026.3.2214`). Pre-release suffixes use the format `-beta1`, `-rc1`, etc. The `sync-versions` command handles format conversion for Python (PEP 440) and MSI.\n- **Fail-fast.** Commands that run multiple steps (e.g., `ci`, `release`) stop at the first failure.\n- **Idempotency.** Commands like `sync-versions` with no version argument are safe to run repeatedly — they converge all files to the workspace version without making changes if already correct.\n- **Workspace-relative paths.** All file operations are relative to the workspace root, located by walking up from `CARGO_MANIFEST_DIR` to find the root `Cargo.toml`.","channels":"# Channels\n\n# Channels Module (`librefang-channels`)\n\n## Purpose\n\nThe channel bridge layer converts messages from 40+ external messaging platforms into unified `ChannelMessage` events, routes them to the appropriate agent, and delivers responses back through the originating platform. Every platform-specific detail — webhook signatures, API quirks, message formats — is absorbed by individual adapters so the rest of the system works against a single interface.\n\n## Architecture\n\n```mermaid\ngraph LR\n    subgraph External Platforms\n        T[Telegram]\n        D[Discord]\n        S[Slack]\n        W[WhatsApp]\n        O[\"40+ others\"]\n    end\n\n    subgraph librefang-channels\n        A[Channel Adapters]\n        BM[BridgeManager]\n        R[AgentRouter]\n        RL[RateLimiter]\n        SN[Sanitizer]\n        FM[Formatter]\n        J[Journal]\n    end\n\n    subgraph Kernel\n        CBH[\"ChannelBridgeHandle<br/>(trait, impl in librefang-api)\"]\n    end\n\n    T & D & S & W & O -->|webhook / poll / ws| A\n    A -->|ChannelMessage stream| BM\n    BM -->|sanitize, rate-limit, route| R\n    BM -->|dispatch| CBH\n    CBH -->|agent response| BM\n    BM -->|formatted response| A\n    A -->|platform API| T & D & S & W & O\n```\n\n## Feature Flags\n\nChannel adapters are compiled behind individual Cargo feature flags (`channel-telegram`, `channel-discord`, etc.). The `default` feature enables popular channels; `all-channels` compiles everything.\n\nCore infrastructure (`bridge`, `router`, `types`, `formatter`, `sanitizer`, `rate_limiter`, `message_journal`, `sidecar`) is always compiled regardless of feature flags.\n\n## Core Types\n\n### `ChannelMessage`\n\nThe unified inbound message type. All adapters produce these. Key fields:\n\n- `channel: ChannelType` — originating platform (enum: `Telegram`, `Discord`, `Slack`, `WhatsApp`, `Custom(String)`, etc.)\n- `sender: ChannelUser` — who sent it (`platform_id`, `display_name`, optional `librefang_user`)\n- `content: ChannelContent` — what they sent (see below)\n- `is_group: bool` — group vs. DM context\n- `metadata: HashMap<String, serde_json::Value>` — adapter-specific data (`was_mentioned`, `guild_id`, `account_id`, `thread_route_agent`, `group_participants`, `agent_name`, `sender_user_id`, `message_id`)\n- `thread_id: Option<String>` — for threaded channels (Telegram forum topics, Slack threads)\n- `platform_message_id: String` — used for lifecycle reactions and journal entries\n\n### `ChannelContent`\n\nEnum covering all inbound content types:\n\n| Variant | Description |\n|---|---|\n| `Text(String)` | Plain text |\n| `Command { name, args }` | Parsed slash command |\n| `Image { url, caption, mime_type }` | Photo with optional caption |\n| `File { url, filename }` | File attachment |\n| `Voice { url, duration_seconds, caption }` | Voice message |\n| `Video { url, caption, duration_seconds, .. }` | Video |\n| `Audio { url, caption, duration_seconds, .. }` | Audio file |\n| `Location { lat, lon }` | Geolocation |\n| `Interactive { text, buttons }` | Message with inline buttons |\n| `ButtonCallback { action, message_text }` | User clicked a button |\n| `EditInteractive { message_id, text, buttons }` | Edit an interactive message |\n| `DeleteMessage { message_id }` | Delete a previously sent message |\n| `Sticker`, `Animation`, `MediaGroup`, `Poll`, `PollAnswer`, `FileData` | Additional Telegram-rich types |\n\n### `ChannelAdapter` trait\n\nEach adapter implements this trait. Key methods:\n\n- **Inbound**: `start()` → returns `Pin<Box<dyn Stream<Item = ChannelMessage>>>` (or `create_webhook_routes()` returning `(Router, Stream)`)\n- **Outbound**: `send(user, content)`, `send_in_thread(user, content, thread_id)`, `send_typing(user)`, `send_reaction(user, msg_id, reaction)`, `send_streaming(user, rx, thread_id)`\n- **Lifecycle**: `name()`, `channel_type()`, `stop()`, `supports_streaming()`, `suppress_error_responses()`\n- **Optional**: `typing_events()` → receiver of `TypingEvent` for debounce integration\n\n### `SenderContext`\n\nPropagated to the agent so it knows who is talking and from where. Includes channel, user ID, display name, group/mention status, thread ID, account ID, auto-route parameters, and group participant roster.\n\n## `ChannelBridgeHandle` Trait\n\nDefined in this crate to avoid circular dependencies (channels cannot depend on kernel). Implemented in `librefang-api`. Provides the kernel operations adapters need:\n\n| Method | Purpose |\n|---|---|\n| `send_message(agent_id, text)` | Basic agent query |\n| `send_message_with_sender(agent_id, text, sender)` | Query with sender identity |\n| `send_message_with_blocks(agent_id, blocks)` | Multimodal (text + images) |\n| `send_message_with_blocks_and_sender(...)` | Full multimodal + identity |\n| `send_message_streaming(agent_id, text)` | Streaming response (delta channel) |\n| `send_message_streaming_with_sender(...)` | Streaming with identity |\n| `find_agent_by_name(name)` | Name → AgentId lookup |\n| `list_agents()` | All running agents |\n| `spawn_agent_by_name(manifest)` | Create a new agent |\n| `reset_session`, `reboot_session`, `compact_session` | Session lifecycle |\n| `set_model`, `stop_run`, `set_thinking` | Runtime controls |\n| `session_usage`, `uptime_info` | Status queries |\n| `authorize_channel_user(channel, user_id, action)` | RBAC gate |\n| `channel_overrides(channel, account_id)` | Per-channel config |\n| `record_delivery(...)` | Delivery tracking for cron/workflow |\n| `check_auto_reply(agent_id, message)` | Auto-reply engine |\n| `subscribe_events()` | Kernel event broadcast receiver |\n| Workflow/trigger/schedule/approval management methods | Automation surface |\n| `budget_text`, `peers_text`, `a2a_agents_text` | Network/budget introspection |\n| `send_channel_push(channel, recipient, msg, thread_id)` | Proactive outbound via REST API |\n\nMost methods have sensible defaults (no-ops, \"not available\" strings, or fallback to simpler methods) so the kernel implementation can incrementally add support.\n\n## `BridgeManager`\n\nOwns all running adapters. Created with `BridgeManager::new(handle, router)` or `BridgeManager::with_sanitizer(handle, router, config)`.\n\n### Startup Flow\n\n1. **`start_adapter(adapter)`** — subscribes to the adapter's message stream, spawns a dispatch loop\n2. Adapters that provide `create_webhook_routes()` contribute axum routes mounted at `/channels/{name}/webhook`\n3. **`take_webhook_router()`** — returns merged router for the main API server\n4. **`start_approval_listener(adapters)`** — subscribes to kernel events and forwards approval notifications\n\nEach adapter gets its own tokio task with a concurrency semaphore (32 permits) to prevent unbounded memory growth under burst traffic.\n\n### Shutdown Flow\n\n1. `shutdown_tx` signals all dispatch loops to drain\n2. Each adapter's `stop()` is called (releases ports, connections)\n3. All tasks awaited to completion\n4. Journal compacted via `compact_journal()`\n\n### Message Debouncing\n\nWhen `message_debounce_ms` > 0 in channel overrides, rapid messages from the same sender are buffered and merged. Parameters:\n\n- `message_debounce_ms` — delay after last message before flushing\n- `message_debounce_max_ms` — hard deadline (default 30s)\n- `message_debounce_max_buffer` — flush early if buffer fills (default 64)\n\nTyping events from the adapter reset the debounce timer. Merged messages concatenate text; same-name commands merge their arguments.\n\n### Proactive Push\n\n`push_message(channel_type, recipient, message, thread_id)` sends an outbound message through a configured adapter without going through the agent loop. Used by `POST /api/agents/:id/push`.\n\n### Crash Recovery\n\nWhen a message journal is configured (`with_journal(journal)`):\n\n1. Every message is recorded before dispatch (`JournalStatus::Processing`)\n2. On success → `Completed`; on failure → `Failed` with error\n3. On restart, `recover_pending()` returns interrupted entries for re-dispatch\n4. `compact_journal()` prunes completed entries\n\n## Message Dispatch Pipeline\n\n`dispatch_message()` processes each inbound message through these stages:\n\n```\nInput Sanitization\n    ↓\nChannel Overrides Lookup\n    ↓\nDM/Group Policy Check\n    ↓\nRate Limiting (global + per-user)\n    ↓\nCommand Handling (early return for /cmd)\n    ↓\nImage Download → Multimodal Blocks (if applicable)\n    ↓\nButton Callback Routing (menu navigation)\n    ↓\nText Normalization (all content types → text)\n    ↓\nEmbedded Slash Command Detection\n    ↓\nBroadcast Routing (multi-agent)\n    ↓\nAgent Resolution (thread route → binding context → fallback)\n    ↓\nRBAC Authorization\n    ↓\nAuto-Reply Check\n    ↓\nJournal Recording\n    ↓\nTyping Indicator + Lifecycle Reactions (⏳→🤔→📝/✅/❌)\n    ↓\nStreaming or Non-Streaming Agent Call\n    ↓\nResponse Formatting & Delivery\n    ↓\nDelivery Recording\n```\n\n### Agent Resolution (`resolve_or_fallback`)\n\n1. **Thread routing**: if `metadata[\"thread_route_agent\"]` is set, resolve by name\n2. **Binding context routing**: uses `router.resolve_with_context()` with channel, account_id, peer_id, guild_id\n3. **Fallback**: find agent named \"assistant\", then first available agent, auto-set as user default\n\n### Stale Agent Re-resolution\n\nWhen an agent call fails with \"Agent not found\", the bridge checks if the agent was the channel default. If so, it re-resolves by name, updates the router cache, and retries once. This handles agent restarts transparently.\n\n### Streaming Path\n\nIf the adapter returns `true` from `supports_streaming()`:\n\n1. Calls `send_message_streaming_with_sender()` to get a delta receiver\n2. Tees the stream: forwards to `adapter.send_streaming()` while buffering a copy\n3. If streaming fails, falls back to sending the buffered text via the non-streaming path\n\n### Group Message Filtering (`should_process_group_message`)\n\nControlled by `ChannelOverrides.group_policy`:\n\n| Policy | Behavior |\n|---|---|\n| `Ignore` | All group messages dropped |\n| `CommandsOnly` | Only slash commands processed |\n| `MentionOnly` | Requires explicit mention, command, or regex trigger match |\n| `All` | Everything processed |\n\nThe **MentionOnly** policy supports regex trigger patterns (`group_trigger_patterns`) for substring matching. When the **addressee guard** is enabled (`LIBREFANG_GROUP_ADDRESSEE_GUARD=on`):\n\n- **OB-04**: If the message opens with a vocative addressing another participant (e.g., \"Caterina, chiedi...\"), it's skipped even if a trigger pattern matches mid-turn\n- **OB-05**: Substring matches must additionally pass positional vocative validation (`is_vocative_trigger`)\n\n### Command Handling\n\nBuilt-in commands are intercepted before reaching the agent:\n\n- `/start`, `/help`, `/status`, `/agents`, `/agent`, `/models`, `/providers`, `/new`, `/reboot`, `/compact`, `/model`, `/stop`, `/usage`, `/think`, `/skills`, `/hands`, `/btw`\n- Workflow/automation: `/workflows`, `/triggers`, `/schedules`, `/approvals`, `/approve`, `/reject`\n- System: `/budget`, `/peers`, `/a2a`\n\nCommands `/agents` and `/models` send interactive inline keyboards instead of plain text when agents/providers exist.\n\nCommand access is controlled per-channel:\n- `disable_commands: true` blocks all commands\n- `allowed_commands` is a whitelist (if non-empty, only listed commands work)\n- `blocked_commands` is a blacklist\n- Blocked commands are forwarded to the agent as plain text instead\n\n## Supporting Modules\n\n### `router` (`AgentRouter`)\n\nMaps `(channel, user)` pairs to agents. Supports:\n\n- **Direct routes**: explicit user → agent mapping\n- **Channel defaults**: default agent per channel\n- **User defaults**: auto-assigned on first fallback resolution\n- **Binding context**: routes based on `account_id`, `guild_id`, `peer_id`\n- **Broadcast**: one user → multiple agents (parallel or sequential)\n- **Auto-routing**: confidence-based with TTL, sticky bonus, divergence count\n\n### `rate_limiter` (`ChannelRateLimiter`)\n\nToken-bucket per-channel and per-user rate limiting. Configured via `ChannelOverrides.rate_limit_per_minute` and `rate_limit_per_user`.\n\n### `sanitizer` (`InputSanitizer`)\n\nPrompt injection detection for inbound messages. Three modes:\n\n- **Off**: no checking\n- **Warn**: log suspicious patterns but allow through\n- **Block**: reject with \"Your message could not be processed\"\n\n### `formatter`\n\nTransforms agent responses for display on each platform. Handles markdown → platform-specific formatting (e.g., Slack mrkdwn, Telegram HTML). Channel-specific default output formats via `default_output_format_for_channel()`.\n\n### `message_journal`\n\nSQLite-backed journal for crash recovery. Records message state transitions: `Processing` → `Completed` / `Failed`. On restart, `recover_pending()` returns interrupted entries. Periodic compaction prunes completed entries.\n\n### `http_client`\n\nInternal shared HTTP client with sensible defaults for adapter API calls.\n\n## Adding a New Channel Adapter\n\n1. Create `src/my_channel.rs` implementing `ChannelAdapter`\n2. Add `#[cfg(feature = \"channel-my-channel\")] pub mod my_channel;` to `lib.rs`\n3. Add the feature flag to `Cargo.toml` with appropriate dependencies\n4. Implement `start()` or `create_webhook_routes()` to produce a `ChannelMessage` stream\n5. Implement `send()` for outbound delivery\n6. Register in `librefang-api`'s `start_channel_bridge_with_config()` based on config\n\n## Configuration Entry Points\n\nThe kernel calls into this crate through:\n\n- **`BridgeManager::new(handle, router)`** or **`with_sanitizer(handle, router, config)`** — construction\n- **`start_adapter(adapter)`** — per-channel startup\n- **`start_approval_listener(adapters)`** — event forwarding\n- **`take_webhook_router()`** — collect webhook routes for the API server\n- **`recover_pending()`** — crash recovery on boot\n- **`stop()`** — graceful shutdown\n- **`compact_journal()`** — journal maintenance","cli":"# CLI\n\n# LibreFang CLI Module\n\n## Overview\n\nThe CLI (`crates/librefang-cli`) is the primary user-facing interface for LibreFang. It operates in two modes:\n\n- **Daemon client mode** — when a kernel daemon is running (`librefang start`), the CLI communicates over HTTP to `librefang_api::server`.\n- **Single-shot mode** — when no daemon is available, commands that need a kernel boot one in-process via `LibreFangKernel::boot`, execute, and exit.\n\nThe module is responsible for argument parsing, daemon lifecycle management, interactive onboarding, TUI screens, and all user-facing output formatting.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[\"main()\"] --> B{\"Daemon running?\"}\n    B -->|Yes| C[\"HTTP client → daemon API\"]\n    B -->|No| D[\"Boot in-process kernel\"]\n    A --> E[\"clap Parser\"]\n    E --> F[\"Commands enum\"]\n    F --> G[\"cmd_* handlers\"]\n    G --> C\n    G --> D\n    G --> H[\"TUI screens\"]\n    H --> I[\"launcher / init_wizard / free_provider_guide\"]\n```\n\n## Entry Point Flow\n\n`main()` executes in this order:\n\n1. **Initialize rustls crypto provider** — required before any async/TLS operations with rustls 0.23.\n2. **Load `.env`** — `dotenv::load_dotenv()` reads `~/.librefang/.env` into the process environment (system env takes priority).\n3. **Load language** — `load_language_from_config()` reads the `language` key from config and calls `i18n::init()`.\n4. **Parse CLI** — `Cli::parse()` via `clap`.\n5. **Determine TUI mode** — checks if the command needs a full-screen terminal (launcher, `tui`, `chat`, `agent chat`). TUI modes use file-based tracing to avoid corrupting the terminal; CLI modes install a Ctrl+C handler and trace to stderr.\n6. **Initialize tracing** — either `init_tracing_file` (TUI) or `init_tracing_stderr` (CLI), respecting `log_level` from config.\n7. **Dispatch to handler** — the `match cli.command` block routes to `cmd_*` functions.\n\n### No-Command Behavior\n\nWhen invoked with no subcommand:\n\n- **In a terminal** — launches the interactive `launcher` which presents options (Get Started, Chat, Dashboard, Desktop App, TUI, Help, Quit).\n- **Piped/non-terminal** — prints `--help` text.\n\n## Command Structure\n\nThe CLI uses `clap` with a `Commands` enum containing top-level commands and nested subcommand groups:\n\n| Top-level command | Subcommands | Purpose |\n|---|---|---|\n| `init` | — | Create `~/.librefang/`, config, .env |\n| `start` | — | Launch daemon (background, foreground, or tail) |\n| `stop` / `restart` | — | Daemon lifecycle |\n| `agent` | `new`, `spawn`, `list`, `chat`, `kill`, `set` | Agent management |\n| `chat` | — | Quick chat with default agent |\n| `spawn` | — | Alias for agent creation by template |\n| `models` | `list`, `aliases`, `providers`, `set` | LLM model browsing |\n| `config` | `show`, `edit`, `get`, `set`, `unset`, `set-key`, `delete-key`, `test-key` | Configuration management |\n| `channel` | `list`, `setup`, `test`, `enable`, `disable` | Messaging channel integrations |\n| `hand` | `list`, `active`, `status`, `install`, `activate`, `deactivate`, `info`, `check-deps`, `install-deps`, `pause`, `resume`, `settings`, `set`, `reload`, `chat` | Autonomous execution modules |\n| `skill` | `install`, `list`, `remove`, `search`, `test`, `publish`, `create` | Skill management |\n| `cron` | `list`, `create`, `delete`, `enable`, `disable` | Scheduled jobs |\n| `vault` | `init`, `set`, `list`, `remove` | Encrypted credential storage |\n| `security` | `status`, `audit`, `verify` | Security audit trail |\n| `memory` | `list`, `get`, `set`, `delete` | Agent KV store |\n| `webhooks` | `list`, `create`, `delete`, `test` | HTTP callback triggers |\n| `workflow` | `list`, `create`, `run` | Multi-step agent workflows |\n| `trigger` | `list`, `create`, `delete` | Event-driven triggers |\n| `approvals` | `list`, `approve`, `reject` | Human-in-the-loop approvals |\n| `gateway` | `start`, `stop`, `restart`, `status` | Low-level daemon control |\n| `service` | `install`, `uninstall`, `status` | Boot service (systemd/launchd/Windows) |\n| `devices` | `list`, `pair`, `remove` | Device pairing |\n\nAdditionally, convenience aliases exist: `agents` → `agent list`, `kill` → `agent kill`, `logs` → tail daemon log, `health` → quick check, `dashboard` → open browser, `qr` → device pairing, `onboard`/`setup`/`configure` → init flows.\n\n## Daemon Communication\n\n### Discovery\n\n`find_daemon()` locates a running daemon by:\n\n1. Reading `~/.librefang/daemon.json` via `read_daemon_info` from `librefang_api`.\n2. Normalizing the listen address (replacing `0.0.0.0` with `127.0.0.1` to avoid macOS DNS hangs).\n3. Making a health-check GET to `http://{addr}/api/health` with a 1-second connect / 2-second total timeout.\n\n### HTTP Client\n\n`daemon_client()` builds a `reqwest::blocking::Client` configured with:\n\n- 120-second timeout for long-running agent operations.\n- Automatic `Authorization: Bearer <key>` header when `api_key` is set in config (read via `read_api_key()`).\n\n`daemon_json()` is the standard response handler that parses JSON and exits with contextual error messages for timeouts, connection refused, or server errors.\n\n## Initialization System\n\n`cmd_init` has three paths:\n\n### Quick Mode (`--quick`)\n\n1. Creates `~/.librefang/` and `data/` subdirectory.\n2. Calls `sync_registry` to download provider/integration/assistant definitions.\n3. Initializes the credential vault and a git repo for config versioning.\n4. Auto-detects the best provider via `detect_best_provider()`.\n5. Writes `config.toml` from `INIT_DEFAULT_CONFIG_TEMPLATE` with detected values.\n6. Writes `config.example.toml` with the full annotated template.\n\n### Interactive Mode (default)\n\nRedirects to `cmd_init_upgrade()` if `config.toml` already exists (to avoid overwriting user settings — addresses issue #1862). Otherwise launches `tui::screens::init_wizard::run()`, a 5-step ratatui TUI wizard. On completion, executes the user's chosen launch action (Desktop, Dashboard, or Chat).\n\n### Upgrade Mode (`--upgrade`)\n\n1. Backs up existing `config.toml` with timestamp suffix.\n2. Forces registry sync (TTL=0).\n3. Ensures vault and git exist.\n4. Merges missing top-level config keys by appending TOML fragments — scalars are inserted before the first `[table]` header, tables are appended at the end. This preserves user comments and formatting.\n5. Checks for legacy `~/.openclaw` installations and outdated `require_approval` settings.\n\n## Provider Detection\n\n`detect_best_provider()` probes in order:\n\n1. **Cloud providers** — `librefang_runtime::drivers::detect_available_provider()` checks 13+ provider API keys (OpenAI, Anthropic, Gemini, Groq, DeepSeek, OpenRouter, Mistral, Together, Fireworks, xAI, Perplexity, Cohere, Azure OpenAI) plus `GOOGLE_API_KEY` alias.\n2. **Local Ollama** — TCP probe to `127.0.0.1:11434` with 500ms timeout.\n3. **Interactive guide** — launches `tui::screens::free_provider_guide` to help the user pick a free provider.\n4. **Fallback** — defaults to Groq with hints about free providers.\n\n## Daemon Lifecycle\n\n### Background Start\n\n`cmd_start` with default flags spawns a detached child process:\n\n1. Resolves the current executable path.\n2. Creates the log directory and opens the log file for stdout/stderr.\n3. On Unix: calls `setsid()` via `pre_exec` to detach from the terminal.\n4. On Windows: uses `DETACHED_PROCESS | CREATE_NEW_PROCESS_GROUP | CREATE_NO_WINDOW` creation flags.\n5. The child re-invokes the binary with `start --spawned`.\n6. The parent polls `find_daemon_in_home` for up to 10 seconds, then reports success or timeout.\n\n### Foreground Start\n\nWith `--foreground` or `--spawned`, boots `LibreFangKernel` in-process and runs `librefang_api::server::run_daemon` on a tokio runtime.\n\n## Ctrl+C Handling\n\n`install_ctrlc_handler()` is only installed for non-TUI CLI modes:\n\n- **Windows**: Uses `SetConsoleCtrlHandler` to intercept `CTRL_C_EVENT`. First press prints \"Interrupted.\" and exits cleanly. Second press hard-exits with code 130.\n- **Unix**: Relies on the default SIGINT handler which already interrupts `read_line` and terminates.\n\nTUI modes (`launcher`, `tui`, `chat`) skip this handler because `process::exit` bypasses ratatui's terminal restore, which would leave the terminal in raw mode.\n\n## Tracing Configuration\n\n| Mode | Output | Notes |\n|---|---|---|\n| CLI subcommands | stderr + `~/.librefang/daemon.log` | `init_tracing_stderr` with dual layers |\n| TUI / chat | `~/.librefang/tui.log` | `init_tracing_file` — stderr would corrupt the TUI |\n| Log level | From `log_level` in config.toml | Falls back to `\"info\"`, respects `RUST_LOG` |\n\n## Configuration Helpers\n\nSeveral functions read single fields from config without full deserialization:\n\n- `load_log_level_from_config()` — reads `log_level`.\n- `load_update_channel_from_config()` — reads `update_channel`, parses as `UpdateChannel` enum.\n- `load_log_dir_from_config()` — reads custom `log_dir` path.\n- `load_language_from_config()` — reads `language` for i18n.\n\n`daemon_config_context()` does full deserialization via `load_config()` and returns a `DaemonConfigContext` with `home_dir`, `api_key`, and `log_dir`.\n\n## File Permissions\n\nOn Unix, the module restricts permissions for security:\n\n- `restrict_file_permissions` — sets files to `0600` (owner-only read/write).\n- `restrict_dir_permissions` — sets directories to `0700` (owner-only rwx).\n\nApplied to `config.toml`, backups, vault file, log directory, and the `~/.librefang/` directory itself.\n\n## Submodules\n\n| Module | Visibility | Purpose |\n|---|---|---|\n| `desktop_install` | private | Find, download, and launch the Tauri desktop app binary |\n| `http_client` | private | Shared `reqwest::Client` builder with TLS configuration |\n| `i18n` | public | Translation system — `t()` and `t_args()` functions for localized strings |\n| `launcher` | private | Interactive first-run launcher (Get Started / Chat / Dashboard / Desktop / TUI) |\n| `mcp` | private | MCP (Model Context Protocol) server over stdio — bridges to Claude Code, Cursor, etc. |\n| `progress` | public | Terminal progress bar rendering with OSC fallback for terminal emulators |\n| `table` | public | Shared table formatting used across CLI output and API route responses |\n| `templates` | private | Agent template loading and management |\n| `tui` | private | Full ratatui-based TUI screens: init wizard, free provider guide, chat interface, channel setup |\n| `ui` | private | Low-level terminal output helpers: banners, success/error/hint messages, KV formatting, next-steps blocks |\n\n## Key Integration Points\n\n- **`librefang_kernel`** — `LibreFangKernel::boot()` for in-process kernel, `config::load_config()` for configuration.\n- **`librefang_api`** — `server::run_daemon()` for foreground mode, `read_daemon_info()` for daemon discovery.\n- **`librefang_types`** — shared types including `AgentId`, `AgentManifest`, `config::UpdateChannel`.\n- **`librefang_extensions`** — `dotenv` for `.env` loading, `vault::CredentialVault` for encrypted credential storage.\n- **`librefang_runtime`** — `registry_sync::sync_registry()` for provider/integration sync, `drivers::detect_available_provider()` for key detection, `model_catalog::ModelCatalog` for default model resolution.\n\n## Adding a New Command\n\n1. Add a variant to `Commands` (or a subcommand enum like `AgentCommands`) with `#[command(long_about = ...)]` and `#[arg(...)]` annotations.\n2. Add the match arm in `main()` dispatching to a `cmd_*` function.\n3. Implement the handler function — use `find_daemon()` + `daemon_client()` for daemon communication, or `LibreFangKernel::boot()` for single-shot execution.\n4. Use `ui::*` functions for output formatting and `i18n::t()` / `i18n::t_args()` for all user-facing strings.","configuration":"# Configuration\n\n# Configuration\n\nLibreFang uses a single TOML file — `~/.librefang/config.toml` — as the source of truth for all runtime behavior. The config is parsed into the `KernelConfig` struct defined in `librefang-kernel` and consumed by nearly every crate in the workspace.\n\n## File Location\n\nThe daemon resolves the config path at startup using the `dirs` crate:\n\n```\n~/.librefang/config.toml\n```\n\nOn first run, `librefang start` auto-initializes this file with sensible defaults. Run `librefang init` for an interactive setup wizard that walks through provider selection and API key configuration.\n\nA complete annotated example ships at `librefang.toml.example` in the repository root.\n\n## Loading and Deserialization\n\n`KernelConfig` derives `serde::Deserialize` and `serde::Serialize`. Every field uses `#[serde(default)]` so that a minimal config file (or a missing file entirely) produces a valid config with default values.\n\n### Adding a New Config Field\n\nThe project enforces a strict three-step checklist. Missing any step causes build failures or silent feature disablement:\n\n1. **Struct field** — Add the field to `KernelConfig` in `librefang-kernel`, with `#[serde(default)]`.\n2. **`Default` impl** — Add the corresponding entry in the manual `Default` implementation. This is not derived automatically because some fields require non-trivial initialization.\n3. **Serde derives** — The struct already has `Serialize`/`Deserialize` at the top level, so individual fields just need the attribute.\n\n```rust\n#[derive(Serialize, Deserialize)]\npub struct KernelConfig {\n    // ...existing fields...\n\n    /// Max concurrent sub-agent tasks (default: 3)\n    #[serde(default)]\n    pub subagent_lane: usize,\n}\n\nimpl Default for KernelConfig {\n    fn default() -> Self {\n        Self {\n            // ...existing defaults...\n            subagent_lane: 3,\n        }\n    }\n}\n```\n\n## Hot-Reload\n\nThe `[reload]` section controls how config changes are picked up without restarting the daemon:\n\n```toml\n[reload]\nmode = \"hybrid\"     # off | restart | hot | hybrid\ndebounce_ms = 500\n```\n\n| Mode | Behavior |\n|------|----------|\n| `off` | No reload. Restart the daemon to apply changes. |\n| `restart` | Watch the file and automatically restart the daemon process on change. |\n| `hot` | In-process reload — the kernel re-reads the TOML and swaps active settings. |\n| `hybrid` | Hot-reload where possible, graceful restart for fields that cannot be changed in-flight. |\n\nThe daemon watches `~/.librefang/config.toml` using filesystem change events and applies a debounce window to avoid thrashing on rapid edits.\n\n## Configuration Sections\n\n### Server\n\n```toml\napi_listen = \"0.0.0.0:4545\"    # Bind address. Use \"127.0.0.1:4545\" for local-only\nlog_level = \"info\"             # trace | debug | info | warn | error\nmode = \"default\"               # stable | default | dev\n```\n\n`mode` controls feature stability: `stable` locks to tested defaults, `dev` enables experimental features and verbose logging.\n\n### Authentication\n\n**Dashboard login** — HTTP Basic Auth for the web dashboard:\n\n```toml\ndashboard_user = \"librefang\"\ndashboard_pass = \"librefang\"   # Change after first login\n```\n\nThe password supports vault references and environment variable substitution:\n\n```toml\ndashboard_pass = \"vault:dashboard_password\"              # Encrypted vault lookup\n# Or: export LIBREFANG_DASHBOARD_PASS=your-secret\n```\n\n**API Bearer auth** — Set `api_key` to require `Authorization: Bearer <key>` on all API endpoints except those on the public allowlist (defined in `middleware.rs` in `librefang-api`).\n\n```toml\napi_key = \"your-secret-api-key\"\n```\n\n### Default LLM Model\n\n```toml\n[default_model]\nprovider = \"anthropic\"                    # Provider ID\nmodel = \"claude-sonnet-4-20250514\"        # Model identifier\napi_key_env = \"ANTHROPIC_API_KEY\"         # Env var holding the API key\n# base_url = \"\"                           # Override API endpoint\n```\n\nAgent manifests (`agent.toml`) can override this per-agent. When no override exists, the kernel falls back to `[default_model]`.\n\n### Embedding Configuration\n\n```toml\n[embedding]\nprovider = \"openai\"\nmodel = \"text-embedding-3-small\"\napi_key_env = \"OPENAI_API_KEY\"\ndimensions = 1536               # Optional: override auto-detected dimensions\n```\n\nBedrock is also supported — authentication uses standard AWS environment variables (`AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, `AWS_REGION`):\n\n```toml\n[embedding]\nprovider = \"bedrock\"\nmodel = \"amazon.titan-embed-text-v2:0\"\n# base_url = \"eu-west-1\"       # Region override (not a full URL)\n```\n\n### Memory\n\n```toml\n[memory]\ndecay_rate = 0.05               # Confidence decay per cycle\n\n[memory.decay]\nenabled = false                 # Enable time-based expiry\nsession_ttl_days = 7            # SESSION memories expire after N days\nagent_ttl_days = 30             # AGENT memories expire after N days\ndecay_interval_hours = 1        # Decay sweep frequency\n# USER memories never decay.\n```\n\n### Proactive Memory\n\nAuto-extract facts from conversations and auto-recall relevant memories during agent execution:\n\n```toml\n[proactive_memory]\nenabled = true\nauto_memorize = true\nauto_retrieve = true\nmax_retrieve = 10               # Max memories per retrieval\n# extraction_threshold = 0.7   # Min confidence to save\n# session_ttl_hours = 24\n# duplicate_threshold = 0.5\n# max_memories_per_agent = 1000\n```\n\n### Performance\n\n```toml\nprompt_caching = true           # Reduce LLM costs (Anthropic/OpenAI)\nstable_prefix_mode = true       # Improve cache hit rate\nusage_footer = \"tokens\"         # off | tokens | cost | full\n```\n\n### Task Queue Concurrency\n\nControls parallelism limits for the kernel's task lanes:\n\n```toml\n[queue.concurrency]\nmain_lane = 3                   # Concurrent user messages\ncron_lane = 2                   # Concurrent scheduled jobs\nsubagent_lane = 3               # Concurrent child agents\n```\n\n### Shell Execution Policy\n\nSecurity boundary for the `shell_exec` tool:\n\n```toml\n[exec_policy]\nmode = \"deny\"                   # deny | allowlist | full\ntimeout_secs = 30\nmax_output_bytes = 102400       # 100 KB\n```\n\n- `deny` — Block all shell execution.\n- `allowlist` — Only commands in the allowlist are permitted.\n- `full` — No restrictions (use with caution in production).\n\n### Approval Policy\n\nHuman-in-the-loop gating for dangerous tools:\n\n```toml\n[approval]\nrequire_approval = [\"shell_exec\"]\ntimeout_secs = 60\nauto_approve = false\n\ntrusted_senders = [\"admin_123\"]           # These user IDs bypass approval\n\n[[approval.channel_rules]]\nchannel = \"telegram\"\ndenied_tools = [\"shell_exec\"]\n\n[[approval.channel_rules]]\nchannel = \"admin_cli\"\nallowed_tools = [\"shell_exec\", \"file_write\", \"file_delete\"]\n```\n\n**TOTP second factor** for critical approvals:\n\n```toml\n[approval]\nsecond_factor = \"totp\"                    # \"none\" (default) or \"totp\"\ntotp_issuer = \"LibreFang\"\ntotp_grace_period_secs = 300              # Skip re-verification within window\ntotp_tools = [\"shell_exec\"]               # Only these tools require TOTP\n```\n\nSetup flow: `POST /api/approvals/totp/setup` → scan QR → `POST /api/approvals/totp/confirm`.\n\n### Session Management\n\n```toml\n[session]\nretention_days = 30                        # Auto-cleanup idle sessions (0 = unlimited)\nmax_sessions_per_agent = 100               # 0 = unlimited\ncleanup_interval_hours = 24\nreset_prompt = \"You are a helpful assistant.\"\n\n# Context injections — named entries injected at specific positions\n[[session.context_injection]]\nname = \"project-rules\"\ncontent = \"Always follow the project coding standards.\"\nposition = \"system\"                        # \"system\", \"before_user\", or \"after_reset\"\n# condition = \"agent.tags contains 'chat'\" # Optional: conditional injection\n```\n\n**Session compaction** — LLM-based context window management:\n\n```toml\n[compaction]\nthreshold = 80                # Compact when messages exceed this count\nkeep_recent = 20              # Messages to preserve after compaction\nmax_summary_tokens = 1024     # Token budget for the LLM summary\n```\n\n### Provider Overrides\n\n**Region selection** — some providers offer region-specific endpoints:\n\n```toml\n[provider_regions]\nqwen = \"intl\"\nminimax = \"china\"\n```\n\n**URL overrides** — redirect a provider to a custom endpoint:\n\n```toml\n[provider_urls]\nollama = \"http://localhost:11434/v1\"\nvllm = \"http://localhost:8000/v1\"\n```\n\n**API key overrides** — map provider IDs to environment variable names:\n\n```toml\n[provider_api_keys]\nopenai = \"OPENAI_API_KEY\"\nnvidia = \"NVIDIA_API_KEY\"\n```\n\n### Fallback Providers\n\nChain of LLM providers to try if the primary fails:\n\n```toml\n[[fallback_providers]]\nprovider = \"openai\"\nmodel = \"gpt-4o\"\napi_key_env = \"OPENAI_API_KEY\"\n```\n\n### Budget and Cost Control\n\n```toml\n[budget]\nmax_hourly_usd = 0.0           # 0 = unlimited\nmax_daily_usd = 0.0\nmax_monthly_usd = 0.0\nalert_threshold = 0.8          # Alert at 80% of limit\n```\n\n### Extended Thinking\n\nChain-of-thought for supported models (Claude, DeepSeek):\n\n```toml\n[thinking]\nbudget_tokens = 10000\nstream_thinking = false\n```\n\n### Web Tools\n\n```toml\n[web]\nsearch_provider = \"auto\"       # auto-detect: Tavily → Brave → Jina → Perplexity → DuckDuckGo\n\n[web.fetch]\nmax_chars = 50000              # Max chars extracted from web pages\ntimeout_secs = 30\nreadability = true             # Clean HTML → readable text\n```\n\n### Channels\n\nMessaging integrations are enabled by adding their sections. Each channel specifies a `default_agent` that receives incoming messages:\n\n```toml\n[channels.telegram]\nbot_token_env = \"TELEGRAM_BOT_TOKEN\"\ndefault_agent = \"assistant\"\nallowed_users = []              # User IDs, usernames, or @handles\n\n[channels.telegram.thread_routes]\n\"12345\" = \"research-agent\"     # Route forum threads to specific agents\n\n[channels.discord]\nbot_token_env = \"DISCORD_BOT_TOKEN\"\ndefault_agent = \"assistant\"\n\n[channels.slack]\nbot_token_env = \"SLACK_BOT_TOKEN\"\napp_token_env = \"SLACK_APP_TOKEN\"\ndefault_agent = \"assistant\"\n\n[channels.whatsapp]\nphone_number_id_env = \"WHATSAPP_PHONE_ID\"\naccess_token_env = \"WHATSAPP_ACCESS_TOKEN\"\ndefault_agent = \"assistant\"\n```\n\n### MCP Servers\n\nExternal tool integration via the Model Context Protocol:\n\n```toml\n[[mcp_servers]]\nname = \"filesystem\"\ntimeout_secs = 30\n\n[mcp_servers.transport]\ntype = \"stdio\"\ncommand = \"npx\"\nargs = [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/tmp\"]\n\n[[mcp_servers]]\nname = \"remote-tools\"\ntimeout_secs = 60\n\n[mcp_servers.transport]\ntype = \"sse\"\nurl = \"https://mcp.example.com/events\"\n```\n\nHTTP-compatible MCP servers with custom tool definitions:\n\n```toml\n[[mcp_servers]]\nname = \"internal-http\"\ntimeout_secs = 30\n\n[mcp_servers.transport]\ntype = \"http_compat\"\nbase_url = \"http://127.0.0.1:8080\"\n\n[[mcp_servers.transport.headers]]\nname = \"Authorization\"\nvalue_env = \"INTERNAL_HTTP_TOKEN\"\n\n[[mcp_servers.transport.tools]]\nname = \"search\"\npath = \"/search\"\nmethod = \"get\"\nrequest_mode = \"query\"\nresponse_mode = \"json\"\n```\n\n### Privacy Controls\n\nFilter PII before sending to LLM providers:\n\n```toml\n[privacy]\nmode = \"pseudonymize\"                     # \"off\", \"redact\", or \"pseudonymize\"\nredact_patterns = [\"\\\\bCUST-\\\\d{6}\\\\b\"]   # Additional regex patterns\n```\n\n### Vault\n\nEncrypted credential storage using AES-256-GCM:\n\n```toml\n[vault]\nenabled = true                 # Auto-detected if vault.enc exists\n```\n\nThe vault key is provided via the `LIBREFANG_VAULT_KEY` environment variable. It must base64-decode to exactly 32 bytes — generate with `openssl rand -base64 32`.\n\n### File Inbox\n\nAsync external commands via filesystem drops:\n\n```toml\n[inbox]\nenabled = false\ndirectory = \"~/.librefang/inbox/\"\npoll_interval_secs = 5\ndefault_agent = \"assistant\"\n```\n\nDrop text files into the directory. The first line may contain `agent:<name>` to target a specific agent.\n\n### Additional Sections\n\n| Section | Purpose |\n|---------|---------|\n| `[heartbeat]` | Autonomous agent health monitoring |\n| `[browser]` | Playwright-based web automation settings |\n| `[docker]` | Container sandbox configuration |\n| `[tts]` | Text-to-speech provider settings |\n| `[network]` | OFP P2P federation (requires `network_enabled = true`) |\n| `[external_auth]` | OAuth2/OIDC integration |\n| `[audit]` | Audit log retention |\n\n## Environment Variable Substitution\n\nFields ending in `_env` (e.g., `api_key_env`, `bot_token_env`) store the **name** of an environment variable, not the secret itself. The daemon reads the actual value at runtime from the process environment. This keeps secrets out of the config file.\n\n## Relationship to Other Crates\n\n```mermaid\ngraph TD\n    A[\"~/.librefang/config.toml\"] -->|parsed by| B[KernelConfig<br/>librefang-kernel]\n    B --> C[librefang-runtime<br/>LLM drivers, tools, MCP]\n    B --> D[librefang-api<br/>HTTP server, dashboard]\n    B --> E[librefang-memory<br/>embedding, decay]\n    B --> F[librefang-channels<br/>messaging adapters]\n    B --> G[librefang-extensions<br/>vault, OAuth2]\n    B --> H[librefang-cli<br/>daemon startup]\n```\n\n- **`librefang-kernel`** owns the `KernelConfig` struct and its `Default` impl. It parses the TOML at startup and distributes settings to subsystems.\n- **`librefang-runtime`** reads model config, execution policies, thinking budgets, and tool limits.\n- **`librefang-api`** uses `AppState` (built in `server.rs`) to expose config via the `/api/config` endpoint and applies middleware settings like auth.\n- **`librefang-memory`** consumes embedding and decay settings.\n- **`librefang-channels`** reads channel-specific sections to initialize adapters.\n- **`librefang-extensions`** manages the vault, reading vault key material from the environment.\n- **`librefang-cli`** handles `init` (wizard) and `start` (daemon launch), triggering the initial config load.\n\n## Common Pitfalls\n\n- **Forgetting the `Default` impl entry** — The build will fail with a \"field not initialized\" error. Every field in `KernelConfig` must have a corresponding line in the manual `Default` impl.\n- **`Option::None` defaults silently disabling features** — When multiple developers add fields in parallel, a field that defaults to `None` compiles fine but the feature won't activate. Always write integration tests at the injection site.\n- **Auth middleware allowlist** — New unauthenticated endpoints must be added to the `is_public` allowlist in `middleware.rs`, not by reordering routes in `server.rs`.\n- **Vault key size** — `LIBREFANG_VAULT_KEY` must base64-decode to exactly 32 bytes. 32 ASCII characters ≠ 32 bytes. Use `openssl rand -base64 32`.","dashboard":"# Dashboard\n\n# Dashboard Module\n\nThe Dashboard is a React single-page application providing the web management interface for LibreFang. It lives in `crates/librefang-api/dashboard/` and is served by the same HTTP server that exposes the REST API.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Browser\n        MAIN[\"main.tsx<br/>React root\"]\n        APP[\"App.tsx<br/>Shell layout + auth gate\"]\n        API[\"api.ts<br/>HTTP client + 140+ typed functions\"]\n        ROUTER[\"router.tsx<br/>TanStack Router<br/>30 lazy-loaded pages\"]\n        STORE[\"lib/store.ts<br/>Zustand UI state\"]\n        CP[\"CommandPalette\"]\n        NC[\"NotificationCenter\"]\n    end\n\n    MAIN --> APP\n    MAIN --> ROUTER\n    APP --> API\n    APP --> STORE\n    APP --> CP\n    APP --> NC\n\n    API -->|\"fetch + Bearer token\"| SERVER[\"LibreFang API Server<br/>/api/*\"]\n```\n\n## Entry Point — `main.tsx`\n\nBootstraps the application with three providers:\n\n- **`QueryClientProvider`** — TanStack Query with a 30-second stale time and single retry. All data-fetching hooks (`useQuery` / `useMutation`) in pages inherit these defaults.\n- **`RouterProvider`** — Receives the router tree built in `router.tsx`.\n- **`ToastContainer`** — Global toast notifications rendered at the root level.\n\nInternationalization is initialized as a side-effect import (`./lib/i18n`).\n\n## App Shell — `App.tsx`\n\nThe root component renders the full-page layout: sidebar, top header, and an `<Outlet />` for the current route.\n\n### Authentication Gate\n\nOn mount, `App` runs an auth check flow:\n\n1. Calls `checkDashboardAuthMode()` to determine the server's configured mode.\n2. If the mode is `\"none\"`, skips authentication entirely.\n3. Otherwise calls `verifyStoredAuth()` which probes `GET /api/security` with the stored Bearer token (up to 3 retries with 1-second backoff).\n4. If verification fails, renders `AuthDialog` as a full-screen modal.\n\nA **global 401 handler** is registered via `setOnUnauthorized()`. Any API response with status 401 fires this callback once, clears the stored token, and re-displays the login dialog. The `_unauthorizedFired` guard prevents infinite loops when multiple simultaneous requests all fail.\n\n### `AuthDialog`\n\nSupports three authentication modes defined by the `AuthMode` type:\n\n| Mode | Behavior |\n|------|----------|\n| `\"api_key\"` | Single password field; token stored directly via `setApiKey()` |\n| `\"credentials\"` | Username + password form; optionally followed by a TOTP 6-digit code if the server returns `requires_totp: true` |\n| `\"hybrid\"` | Tabbed UI allowing either method |\n\nOn successful auth, the user is redirected to `#/overview`.\n\n### `ChangePasswordModal`\n\nAllows the logged-in user to update their username and/or password. The form:\n- Pre-loads the current username via `getDashboardUsername()`.\n- Validates password match, minimum length (8 chars), and minimum username length (2 chars).\n- Requires the current password to verify identity before submitting changes via `changePassword()`.\n- On success, clears the stored token and reloads the page to force re-authentication.\n\n### Sidebar Navigation\n\nNavigation items are organized into six groups defined in `navGroups` (memoized on `t` and `terminalEnabled`):\n\n- **Core** — Overview, Chat, Agents, Approvals, Hands\n- **Configure** — Providers, Models, Media, Channels, Skills, Plugins, MCP Servers\n- **Config** — General, Memory, Tools, Channels, Security, Network, Infra, Settings\n- **Automate** — Workflows, Scheduler, Goals\n- **Observe** — Analytics, Memory, Logs, Runtime\n- **Advanced** — Comms, Terminal (conditional on `terminalEnabled`), Network, A2A, Telemetry\n\nThe sidebar supports two layout modes controlled by `navLayout` from the UI store:\n- **Default** — Groups are always expanded with visible section headers.\n- **Collapsible** — Group headers toggle with a chevron; state tracked in `collapsedNavGroups`.\n\nOn large screens, the sidebar collapses to a 96px icon-only strip via `toggleSidebar()`. On mobile, it slides in as an overlay with a backdrop.\n\nThe sidebar footer displays daemon health status, app version, and hostname.\n\n### Header Bar\n\nContains:\n- Mobile hamburger menu toggle (hidden on `lg:` breakpoint and above).\n- `NotificationCenter` — real-time notification bell.\n- Language toggle button — switches between English and Chinese.\n- Theme toggle — switches between `dark` and `light` by adding/removing the `dark` class on `<html>`.\n- User menu dropdown — links to Settings, Change Password modal, and Logout (only shown when `authMode !== \"none\"`).\n\n### Command Palette and Keyboard Shortcuts\n\n- `Cmd+K` / `Ctrl+K` opens the `CommandPalette`.\n- The `useKeyboardShortcuts` hook registers global shortcuts and triggers `ShortcutsHelp` via `onShowHelp`.\n\n### UI Store Dependencies\n\n`App` reads and writes these `useUIStore` selectors:\n\n| Selector | Purpose |\n|----------|---------|\n| `theme` / `toggleTheme` | Dark/light mode |\n| `language` / `setLanguage` | i18n locale |\n| `isMobileMenuOpen` / `setMobileMenuOpen` | Mobile sidebar overlay |\n| `isSidebarCollapsed` / `toggleSidebar` | Desktop sidebar width |\n| `navLayout` | Sidebar group display mode |\n| `collapsedNavGroups` / `toggleNavGroup` | Per-group collapse state |\n| `terminalEnabled` / `setTerminalEnabled` | Whether to show the Terminal nav item |\n\n## API Client — `api.ts`\n\nA fully-typed HTTP client layer with ~140 functions covering every REST endpoint the LibreFang server exposes.\n\n### HTTP Primitives\n\nFour generic helpers handle all requests:\n\n```\nget<T>(path)      → GET with JSON response\npost<T>(path, body, timeout?)  → POST with JSON body, 60s default timeout\nput<T>(path, body)  → PUT\npatch<T>(path, body) → PATCH\ndel<T>(path)      → DELETE\ngetText(path)     → GET returning plain text\n```\n\nAll primitives call `buildHeaders()` which merges caller-provided headers with auth headers from `authHeader()`. The auth header reads the Bearer token from `localStorage(\"librefang-api-key\")` and the user's language preference from `localStorage(\"i18nextLng\")`.\n\nTimeout behavior: `post()` uses `AbortController` with a configurable timeout. Two constants define standard timeouts:\n- `DEFAULT_POST_TIMEOUT_MS = 60_000` (60 seconds)\n- `LONG_RUNNING_TIMEOUT_MS = 300_000` (5 minutes, used for agent messages, workflow runs, skill/plugin installs)\n\n### Error Handling\n\n`parseError()` is called on every non-OK response:\n1. If status is 401 and a global handler is registered, it fires once (guarded by `_unauthorizedFired`), clears the API key, and invokes the callback set by `App`.\n2. Attempts to parse the response body as JSON, preferring the `detail` field over `error` for the error message.\n3. Falls back to HTTP status text.\n\n### Authentication Functions\n\n| Function | Endpoint | Notes |\n|----------|----------|-------|\n| `checkDashboardAuthMode()` | `GET /api/auth/dashboard-check` | Returns the `AuthMode` |\n| `getDashboardUsername()` | `GET /api/auth/dashboard-check` | Extracts `username` from same endpoint |\n| `dashboardLogin(username, password, totpCode?)` | `POST /api/auth/dashboard-login` | Stores returned token via `setApiKey()` |\n| `verifyStoredAuth()` | `GET /api/security` | Retries 3× on network error; clears token on 401 |\n| `changePassword(currentPw, newPw?, newUsername?)` | `POST /api/auth/change-password` | All fields optional except current password |\n\nToken management:\n- `setApiKey(key)` — writes to `localStorage(\"librefang-api-key\")`, resets the 401 guard.\n- `clearApiKey()` — removes from localStorage.\n- `hasApiKey()` — checks presence and non-empty length.\n\nWebSocket authentication uses `buildAuthenticatedWebSocketUrl(path)` which constructs a `ws://` or `wss://` URL and appends `?token=...` from the stored key.\n\n### Type Definitions\n\nThe file exports ~80 TypeScript interfaces modeling every API response shape. Key categories:\n\n- **Agents** — `AgentItem`, `AgentDetail`, `AgentSessionMessage`, `AgentMessageResponse`\n- **Providers & Models** — `ProviderItem`, `ModelItem`\n- **Channels** — `ChannelItem`, `ChannelField`\n- **Skills** — `SkillItem`, `ClawHubSkillDetail`, `FangHubSkill`\n- **Workflows** — `WorkflowItem`, `WorkflowStep`, `WorkflowRunDetail`, `DryRunResult`\n- **Memory** — `MemoryItem`, `MemoryStatsResponse`\n- **Hands** — `HandDefinitionItem`, `HandInstanceItem`, `HandSettingStatus`\n- **Approvals** — `ApprovalItem`, `ApprovalAuditEntry`\n- **Configuration** — `ConfigSectionSchema`, `RegistrySchema`\n- **Plugins** — `PluginItem`, `RegistryEntry`\n- **MCP Servers** — `McpServerConfigured`, `McpServerConnected`, `IntegrationTemplate`\n\n### API Function Naming Convention\n\nFunctions follow a predictable pattern:\n\n| Prefix | HTTP Method | Example |\n|--------|------------|---------|\n| `list*` | GET (collection) | `listAgents()`, `listMemories()` |\n| `get*` | GET (single) | `getAgentDetail()`, `getWorkflow()` |\n| `create*` / `spawn*` | POST | `createSchedule()`, `spawnAgent()` |\n| `send*` / `post*` | POST (action) | `sendAgentMessage()`, `postQuickInit()` |\n| `update*` / `set*` | PUT/PATCH | `updateSchedule()`, `setConfigValue()` |\n| `delete*` / `remove*` | DELETE | `deleteAgent()`, `removeCustomModel()` |\n| `test*` | POST (probe) | `testProvider()`, `testChannel()` |\n| `install*` / `uninstall*` | POST | `installSkill()`, `uninstallPlugin()` |\n\n## Router — `router.tsx`\n\nUses TanStack Router with a fl
