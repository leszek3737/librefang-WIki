gging/SKILL.md`\n- **Refactoring** → `gitnexus-refactoring/SKILL.md`\n- **Tool reference** → `gitnexus-guide/SKILL.md`\n- **CLI commands** → `gitnexus-cli/SKILL.md`\n\n## Relationship to the Rest of the Codebase\n\n`AGENTS.md` has no direct code dependencies — it is not imported or executed at runtime. Its connections are:\n\n```mermaid\ngraph LR\n  A[AGENTS.md] -->|routes to| S[Skill Files]\n  A -->|references| T[GitNexus MCP Tools]\n  T -->|queries| I[GitNexus Index]\n  I -->|built from| C[Source Code]\n```\n\nThe skill files (under `.claude/skills/gitnexus/`) contain the detailed procedures the agent follows for each task category. The MCP tools (`gitnexus_impact`, `gitnexus_query`, `gitnexus_context`, `gitnexus_detect_changes`, `gitnexus_rename`) are the runtime interface into the pre-built index, which itself is produced by running `npx gitnexus analyze` against the source tree.\n\n## Editing This File\n\nThe content between `<!-- gitnexus:start -->` and `<!-- gitnexus:end -->` is managed by GitNexus. Manual edits inside that region will be overwritten the next time the index is regenerated. To customize agent behavior, either:\n\n- Modify content **outside** the marker boundaries.\n- Adjust the GitNexus configuration that governs what gets written into the marked region.","other-claude-md":"# Other — CLAUDE.md\n\n# CLAUDE.md — GitNexus Integration for AI-Assisted Development\n\n## Purpose\n\n`CLAUDE.md` is an instruction manifest that governs how an AI coding agent (Claude Code) interacts with the **GitNexus** code intelligence platform. It defines mandatory safety protocols, available tools, and navigation strategies so that every code change is preceded by impact analysis and every commit is validated against the call graph.\n\nThis file lives at the repository root and is consumed automatically by Claude Code at the start of every session. It is not imported by any application code — it is purely an operational contract.\n\n## How It Works\n\nGitNexus maintains a pre-built index of the codebase (25,317 symbols, 58,626 relationships, 300 execution flows). The `CLAUDE.md` file instructs the AI agent to query this index through MCP (Model Context Protocol) tools **before** making edits, rather than relying on grep or text search. This ensures changes are evaluated against actual dependency relationships.\n\nThe file is wrapped in `<!-- gitnexus:start -->` / `<!-- gitnexus:end -->` markers, allowing GitNexus to update its contents automatically when the index is regenerated.\n\n## Mandatory Protocols\n\n### Pre-Edit Impact Analysis\n\nBefore modifying any symbol, the agent **must** run:\n\n```\ngitnexus_impact({target: \"symbolName\", direction: \"upstream\"})\n```\n\nThis returns the blast radius — direct callers, affected execution flows, and a risk classification. If the result is **HIGH** or **CRITICAL**, the agent must warn the user and await explicit confirmation before proceeding.\n\n### Pre-Commit Change Detection\n\nBefore committing, the agent **must** run:\n\n```\ngitnexus_detect_changes()\n```\n\nThis verifies that the diff only touches symbols and flows that were intentionally modified, catching unintended side effects.\n\n### Safe Renaming\n\nSymbol renames must go through `gitnexus_rename`, which rewrites all call-graph-referenced usages. Find-and-replace is explicitly forbidden because it misses cross-file references that the index tracks.\n\n## Available Tools\n\n| Tool | Purpose |\n|------|---------|\n| `gitnexus_query({query: \"concept\"})` | Semantic search returning process-grouped results ranked by relevance. Use instead of grep when exploring unfamiliar code. |\n| `gitnexus_context({name: \"symbolName\"})` | Full symbol profile: callers, callees, and every execution flow the symbol participates in. |\n| `gitnexus_impact({target, direction})` | Blast radius analysis with risk classification (LOW / MEDIUM / HIGH / CRITICAL). |\n| `gitnexus_detect_changes()` | Validates staged changes against expected scope. |\n| `gitnexus_rename` | Call-graph-aware rename across the entire codebase. |\n\n## Resource URIs\n\nGitNexus exposes data through MCP resources prefixed with `gitnexus://repo/crates/`:\n\n| URI | What It Returns |\n|-----|-----------------|\n| `gitnexus://repo/crates/context` | Codebase overview and index freshness status |\n| `gitnexus://repo/crates/clusters` | All functional areas (module groupings) |\n| `gitnexus://repo/crates/processes` | Catalog of all indexed execution flows |\n| `gitnexus://repo/crates/process/{name}` | Step-by-step trace for a single execution flow |\n\nCheck `context` first if any tool warns the index is stale, then regenerate with `npx gitnexus analyze`.\n\n## Skill Files\n\nThe `CLAUDE.md` file delegates detailed workflows to skill files under `.claude/skills/gitnexus/`:\n\n| Scenario | Skill File |\n|----------|------------|\n| Understanding architecture | `.claude/skills/gitnexus/gitnexus-exploring/SKILL.md` |\n| Assessing blast radius | `.claude/skills/gitnexus/gitnexus-impact-analysis/SKILL.md` |\n| Tracing bugs | `.claude/skills/gitnexus/gitnexus-debugging/SKILL.md` |\n| Refactoring / renaming / extracting | `.claude/skills/gitnexus/gitnexus-refactoring/SKILL.md` |\n| Tool and schema reference | `.claude/skills/gitnexus/gitnexus-guide/SKILL.md` |\n| CLI commands (index, status, clean) | `.claude/skills/gitnexus/gitnexus-cli/SKILL.md` |\n\n## Agent Workflow\n\nThe following diagram shows the decision flow an AI agent follows when this file is active:\n\n```mermaid\nflowchart TD\n    A[User requests code change] --> B{Is it a rename?}\n    B -- Yes --> C[gitnexus_rename]\n    B -- No --> D[gitnexus_impact on target symbol]\n    D --> E{Risk level?}\n    E -- HIGH/CRITICAL --> F[Warn user, await confirmation]\n    F --> G[Proceed with edit]\n    E -- LOW/MEDIUM --> G\n    G --> H[gitnexus_detect_changes]\n    H --> I{Scope matches intent?}\n    I -- Yes --> J[Commit]\n    I -- No --> K[Report unexpected side effects to user]\n```\n\n## Relationship to the Rest of the Codebase\n\nThis file has **no runtime or compile-time dependency** on any application module. It is not imported, required, or referenced by source code. Its sole consumer is the Claude Code agent runtime, which reads it at session initialization.\n\nThe file references the GitNexus index (stored externally) and skill files (stored in `.claude/skills/`), but nothing in the application's `src/` or `crates/` directories references this file in return.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\n## Overview\n\nThe dashboard is a React 19 single-page application that provides the web-based management interface for the LibreFang autonomous agent operating system. It is built on TanStack Router v1 for routing and TanStack Query v5 for server-state management, bundled with Vite and styled with Tailwind CSS v4.\n\nThe application is a PWA (Progressive Web App) with offline static-asset caching via a service worker.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Pages[\"Pages (src/pages/)\"] --> QueryHooks[\"Query Hooks (lib/queries/)\"]\n    Pages --> MutationHooks[\"Mutation Hooks (lib/mutations/)\"]\n    QueryHooks --> QueryOptions[\"queryOptions factories\"]\n    MutationHooks --> Invalidation[\"Cache Invalidation\"]\n    QueryOptions --> KeyFactories[\"Key Factories (keys.ts)\"]\n    QueryOptions --> HttpClient[\"HTTP Client (lib/http/client.ts)\"]\n    HttpClient --> ApiLayer[\"API Layer (api.ts)\"]\n    ApiLayer --> Backend[\"LibreFang Backend API\"]\n    Invalidation --> KeyFactories\n```\n\nPages never call `fetch()` or the raw API layer directly. All data flows through the hooks layer, ensuring consistent caching, invalidation, and authentication.\n\n## Entry Points and Shell\n\n- **HTML entry**: `index.html` — mounts `<div id=\"root\">` and loads `src/main.tsx` as a module\n- **App entry**: `src/main.tsx` — bootstraps React, TanStack Router, and TanStack Query providers\n- **PWA manifest**: `public/manifest.json` — configures standalone display mode, theme colors, and app icons\n- **Service worker**: `public/sw.js` — precaches `/dashboard/`, serves static assets via stale-while-revalidate, and bypasses caching entirely for `/api/` requests and non-GET methods\n\n## Data Layer\n\nThe data layer enforces a strict separation between raw API calls and UI components. It lives under `src/lib/` with four subdirectories:\n\n```\nsrc/lib/\n  http/\n    client.ts      # Typed wrapper over api.ts\n    errors.ts      # ApiError class\n  queries/\n    keys.ts        # Query-key factories for every domain\n    keys.test.ts   # Anchoring and hierarchy smoke tests\n    <domain>.ts    # queryOptions + useXxx hooks per domain\n  mutations/\n    <domain>.ts    # useXxx mutation hooks with invalidation\n  test/\n    query-client.tsx  # createQueryClientWrapper for hook tests\n```\n\n### Query Key Factories\n\nEvery domain has a key factory in `src/lib/queries/keys.ts` that produces hierarchical, anchored keys. Each sub-key spreads from the domain's `all` root so that broad invalidation cascades correctly:\n\n```ts\nexport const fooKeys = {\n  all: [\"foo\"] as const,\n  lists: () => [...fooKeys.all, \"list\"] as const,\n  list: (filters: FooFilters = {}) => [...fooKeys.lists(), filters] as const,\n  details: () => [...fooKeys.all, \"detail\"] as const,\n  detail: (id: string) => [...fooKeys.details(), id] as const,\n};\n```\n\nThe current domain factories are: `agents`, `analytics`, `approvals`, `channels`, `config`, `cron`, `fanghub`, `goals`, `hands`, `mcp`, `media`, `memory`, `models`, `network`, `overview`, `plugins`, `providers`, `runtime`, `schedules`, `sessions`, `skills`, `triggers`, `workflows`.\n\nThe test file `keys.test.ts` validates that every factory exists and that sub-keys are properly anchored. **Any change to `keys.ts` must be accompanied by a corresponding test update**, and a passing typecheck alone is insufficient — the key-factory tests catch anchoring regressions that TypeScript does not.\n\n### Query Hooks\n\nEach domain file under `src/lib/queries/` exports `queryOptions` factories and `useXxx` hooks:\n\n```ts\nexport const fooQueryOptions = (filters?: FooFilters) =>\n  queryOptions({\n    queryKey: fooKeys.list(filters ?? {}),\n    queryFn: () => listFoo(filters),\n    staleTime: 30_000,\n  });\n\nexport function useFoo(filters?: FooFilters, options?: UseFooOptions) {\n  return useQuery({ ...fooQueryOptions(filters), ...options });\n}\n```\n\nHooks accept an optional `UseFooOptions` bag (`enabled`, `staleTime`, `refetchInterval`) so call sites can override per-page behavior without duplicating query logic. Every override at a call site must carry an inline comment explaining why. Examples from the codebase:\n\n- `useApprovals({ enabled: open })` — gated by modal visibility\n- `useCommsEvents(50, { refetchInterval: 5_000 })` — fast polling for live events\n- `useModels({}, { enabled: isModelArg })` — gated by URL parameter\n- `useApprovalCount({ refetchInterval: 5_000 })` — bell-icon badge polling\n\n### Mutation Hooks\n\nMutations live in `src/lib/mutations/<domain>.ts`. Every mutation hook **must** perform its own cache invalidation inside `onSuccess`. Call sites may attach additional `onSuccess`/`onError` handlers for UI feedback (toasts, modal dismissal), but invalidation is never the caller's responsibility.\n\n**Invalidation scope rules (narrowest first):**\n\n| Scope | When to use | Example mutations |\n|-------|------------|-------------------|\n| `fooKeys.detail(id)` + `fooKeys.lists()` | Per-id update where the list projection also changes | `usePatchAgent`, `usePatchAgentConfig`, `useUpdateWorkflow` |\n| `fooKeys.lists()` only | List-shape change with no existing detail to refresh | `useCreateFoo`, `useDeleteFoo` |\n| `fooKeys.detail(id)` or nested sub-key | Change scoped to one detail, list unaffected | `useSendHandMessage` (invalidates `handKeys.session(instanceId)`) |\n| `fooKeys.all` | Bulk import / cache reset / cross-cutting schema migration | `useSpawnAgent`, `useDeleteAgent`, `useSuspendAgent`, `useResumeAgent` |\n\nSeveral mutations invalidate keys across multiple domains when the operation has cross-cutting effects:\n\n- **Agent lifecycle mutations** (`useSpawnAgent`, `useCloneAgent`, `useSuspendAgent`, `useDeleteAgent`, `useResumeAgent`) invalidate both `agentKeys.all` and `overviewKeys.snapshot()` — because the overview dashboard reflects agent counts and states.\n- **Hand lifecycle mutations** (`useActivateHand`, `useDeactivateHand`, `usePauseHand`, `useResumeHand`, `useUninstallHand`) invalidate `handKeys.all`, `agentKeys.all`, and `overviewKeys.snapshot()`.\n- **Config mutations** (`useSetConfigValue`, `useBatchSetConfigValues`) invalidate `configKeys.all`. `useReloadConfig` additionally invalidates `overviewKeys.snapshot()`.\n- **Provider mutations** (`useSetDefaultProvider`) invalidate `providerKeys.all`, `modelKeys.lists()`, and `runtimeKeys.status()`.\n- **Workflow mutations** (`useRunWorkflow`) invalidate `workflowKeys.runs(workflowId)`, `workflowKeys.lists()`, and the returned `workflowKeys.runDetail(runId)`.\n- **Schedule/trigger mutations** invalidate `scheduleKeys.all` + `cronKeys.all` (and `workflowKeys.lists()` for creates/updates/deletes).\n\n### API Client Layer\n\n`src/api.ts` contains the raw fetch calls that communicate with the LibreFang backend. Key behaviors:\n\n- **Authentication**: `setApiKey` / `clearApiKey` / `verifyStoredAuth` manage a bearer token in `localStorage` under the key `librefang-api-key`. Every request includes an `Authorization: Bearer <token>` header built by `buildHeaders` / `authHeader`.\n- **WebSocket auth**: `buildAuthenticatedWebSocketUrl` appends `?token=<key>` to WebSocket URLs.\n- **Error handling**: `parseError` normalizes API error responses. On a 401, `verifyStoredAuth` clears the stored key.\n- **Type generation**: `openapi:types` script generates `openapi/generated.ts` from the backend's OpenAPI schema at `http://127.0.0.1:4545/api/openapi.json`.\n\n`src/lib/http/client.ts` re-exports these with typed wrappers and is the import target for query/mutation hooks.\n\n## Agent Manifest System\n\nThe dashboard includes a complete TOML-based agent manifest serializer/parser for the agent creation and editing UI.\n\n### Key Modules\n\n- **`src/lib/agentManifest.ts`** — `emptyManifestForm()`, `emptyManifestExtras()`, `parseManifestToml(toml)`, `serializeManifestForm(form, extras?)`, `validateManifestForm(form)`\n- **`src/lib/agentManifestMarkdown.ts`** — `generateManifestMarkdown(form, extras?)` renders a human-readable Markdown summary of a manifest\n\n### Design\n\nThe manifest system separates **form state** (known, UI-editable fields) from **extras** (unknown/preserved fields that the form doesn't understand). This ensures round-trip fidelity: `parse(serialize(parse(toml)))` produces identical form state and extras.\n\nKey design decisions enforced by the test suite:\n\n1. **Numeric validation**: Negative values and numbers above `MAX_SAFE_INTEGER` are silently omitted from serialization rather than producing invalid TOML.\n2. **Mutual exclusion**: When a user selects a form-mode value (e.g., `exec_policy` shorthand or `response_format` mode), any previously-preserved extras table for the same key is dropped to avoid TOML key/table redefinition conflicts.\n3. **Section scoping**: Extras that produce nested tables inside form-known sections (like `[model.exotic_subtable]`) must not break TOML section scoping for subsequent sections like `[resources]`.\n4. **Alias normalization**: `exec_policy` aliases accepted by the kernel (`none`/`disabled` → `deny`, `restricted` → `allowlist`, `all`/`unrestricted` → `full`) are normalized to canonical form.\n5. **Fallback model extras**: Per-fallback-model `extra_params` (e.g., `enable_memory` for Qwen) survive round-trips.\n6. **Response format schemas**: `json_schema` schemas are always stored as strings to avoid React uncontrolled→controlled warnings.\n\n## Chat Utilities\n\n`src/lib/chat.ts` provides helpers for the chat/terminal interface:\n\n- **`normalizeRole(role)`** — normalizes API-provided roles (`\"User\"` → `\"user\"`)\n- **`asText(value)`** — converts unknown content to displayable text\n- **`formatMeta(meta)`** — formats usage metadata as `\"N in / M out | X iter | $Y.ZZZZ\"`\n- **`normalizeToolOutput(event)`** — extracts tool name, content preview, and error status from tool output events, filtering malformed entries\n\n## Chat Picker\n\n`src/lib/chatPicker.ts` exports `groupedPicker(agents, hands, showHandAgents)` which partitions agents into standalone agents and hand-grouped agents for the chat target picker:\n\n- When `showHandAgents` is `false`, all agents are returned flat as standalone.\n- Active hand instances are grouped under their `hand_name`, sorted alphabetically.\n- Within each group, the coordinator role appears first, then remaining roles alphabetically.\n- Inactive hands and hands with empty `agent_ids` are hidden entirely.\n- Hand-spawned agents never fall back to the standalone list — they are hidden when their hand is unavailable.\n\n## UI Components\n\n### MultiSelectCmdk\n\n`src/components/ui/MultiSelectCmdk.tsx` is a multi-select dropdown built on `cmdk` (Command Menu). It supports:\n\n- Chip-based display of selected values with per-chip remove buttons\n- Keyboard backspace to remove the last selected item\n- Search filtering of available options\n- Already-selected items are excluded from the dropdown list\n- Controlled via `value`/`onChange` props\n\n## Navigation\n\nThe dashboard shell provides navigation links to these top-level pages (validated by the E2E suite):\n\nOverview, Agents, Sessions, Approvals, Comms, Providers, Channels, Skills, Hands, Workflows, Scheduler, Goals, Analytics, Memory, Runtime, Logs.\n\n## Authentication Flow\n\nThe E2E test `dashboard.spec.ts` validates the sign-in dialog flow: when `GET /api/auth/dashboard-check` returns `{ mode: \"credentials\" }`, the dashboard presents a username/password dialog before granting access.\n\n## Testing\n\n### Unit Tests (Vitest)\n\n```bash\npnpm test                # run once\npnpm test:watch          # watch mode\n```\n\nThe test suite covers:\n- **API layer** (`src/api.test.ts`) — authentication helpers, bearer token injection, request body serialization, response unwrapping\n- **Agent manifest** (`src/lib/agentManifest.test.ts`) — serialization, parsing, validation, round-trip fidelity, edge cases (negative numbers, alias normalization, mutual exclusion, section scoping)\n- **Manifest markdown** (`src/lib/agentManifestMarkdown.test.ts`) — rendering of all manifest sections\n- **Chat utilities** (`src/lib/chat.test.ts`) — role normalization, metadata formatting, tool output handling\n- **Chat picker** (`src/lib/chatPicker.test.ts`) — grouping logic, sorting, filtering\n- **MultiSelectCmdk** (`src/components/ui/MultiSelectCmdk.test.tsx`) — selection, removal, search, filtering\n- **Query hooks** — enabled guards, correct query key usage, fetch behavior\n- **Mutation hooks** — invalidation scope for every mutation, cross-domain cascade behavior\n\nHook tests use `createQueryClientWrapper` from `src/lib/test/query-client.tsx`, which provides a real TanStack Query client with retry disabled and a spy on `invalidateQueries`.\n\n### E2E Tests (Playwright)\n\n```bash\npnpm e2e\n```\n\nPlaywright tests run against `http://127.0.0.1:4173` with the dev server started automatically. The config is in `playwright.config.ts` with a 30-second timeout and trace-on-first-retry.\n\n### Type Checking\n\n```bash\npnpm typecheck            # tsc --noEmit\n```\n\n## Build\n\n```bash\npnpm build                # vite build\npnpm preview              # preview production build\n```\n\nAll three verification steps must pass after any change to `src/lib/queries/`, `src/lib/mutations/`, or `src/api.ts`:\n\n```bash\npnpm typecheck && pnpm test && pnpm build\n```\n\n## Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts`\n2. Add/reuse a key factory in `src/lib/queries/keys.ts` — every sub-key must anchor from the domain's `all` root\n3. Add `queryOptions` + `useXxx` in `src/lib/queries/<domain>.ts`\n4. Add mutation hooks in `src/lib/mutations/<domain>.ts` with the narrowest valid invalidation scope\n5. Update `src/lib/queries/keys.test.ts` — add the factory to the existence list, add anchoring tests for non-trivial factories\n\n## Commit Convention\n\n```\nfeat(dashboard/<area>): description\nrefactor(dashboard/queries): description\nfix(dashboard/<area>): description\n```\n\nNo `Co-Authored-By` footers.\n\n## Key Dependencies\n\n| Package | Purpose |\n|---------|---------|\n| `react` / `react-dom` v19 | UI framework |\n| `@tanstack/react-router` v1 | File-based routing |\n| `@tanstack/react-query` v5 | Server-state management |\n| `@xyflow/react` | Workflow visual editor canvas |\n| `@xterm/xterm` + addons | Embedded terminal |\n| `recharts` | Analytics charts |\n| `cmdk` | Command palette / multi-select |\n| `zustand` | Client-side state management |\n| `i18next` + `react-i18next` | Internationalization |\n| `smol-toml` | TOML parsing/serialization for manifests |\n| `katex` + `rehype-katex` + `remark-math` | Math rendering in markdown |\n| `react-markdown` + `remark-gfm` | Markdown rendering |\n| `lucide-react` | Icons |\n| `qrcode` | QR code generation |\n| `tailwindcss` v4 | Styling |","other-librefang-api-static":"# Other — librefang-api-static\n\n# librefang-api-static — Static Locale Assets\n\n## Purpose\n\nThis module holds the **internationalization (i18n) locale files** for the LibreFang web dashboard. Every user-visible string in the UI — navigation labels, button text, error messages, tooltips, page headings, confirmation dialogs, toast notifications — is defined here rather than hardcoded in components. The frontend loads the appropriate JSON file at runtime based on the user's language preference.\n\nCurrently shipped languages:\n\n| File | Language |\n|------|----------|\n| `locales/en.json` | English (default) |\n| `locales/ja.json` | Japanese |\n\n---\n\n## Structure\n\nEach locale file is a single flat-ish JSON object with **top-level namespace keys** that map 1:1 to dashboard pages, feature areas, or shared UI categories. This keeps translations discoverable and avoids deeply nested paths.\n\n```mermaid\ngraph TD\n    A[locale file] --> B[Shared namespaces]\n    A --> C[Page namespaces]\n    A --> D[Feature namespaces]\n    \n    B --> B1[\"nav, btn, label, status\"]\n    B --> B2[\"time, theme, confirm, auth\"]\n    \n    C --> C1[\"overview, sessionsPage, agentsPage\"]\n    C --> C2[\"logsPage, runtimePage, approvals\"]\n    C --> C3[\"settingsPage, analyticsPage, memoryPage\"]\n    C --> C4[\"channelsPage, skillsPage, handsPage\"]\n    \n    D --> D1[\"agentChat, commsPage\"]\n    D --> D2[\"workflowsPage, workflowBuilder\"]\n    D --> D3[\"schedulerPage, pluginsPage\"]\n    D --> D4[\"setupWizard, goalsPage\"]\n```\n\n### Top-level namespaces\n\n| Namespace | Scope |\n|-----------|-------|\n| `nav` | Sidebar and top-level navigation labels |\n| `status` | Connection/status indicator strings |\n| `btn` | Shared button labels (Refresh, Save, Delete, etc.) |\n| `label` | Generic field labels (Status, Name, Key, Value) |\n| `auth` | API key gate screen |\n| `page` | Page title overrides |\n| `health` | Health check status text |\n| `stat` | Stat card titles (Agents Running, Tokens Used, etc.) |\n| `card` | Card headings on the overview page |\n| `agents` | Agent list area (sidebar) |\n| `detail` | Agent detail tabs (Info, Files, Config) |\n| `mode` | Agent mode labels (Observe, Assist, Full) |\n| `category` | Agent category filters |\n| `profile` | Tool profile descriptions (Minimal → Full) |\n| `template` | Agent template names and descriptions (10 built-in) |\n| `time` | Relative time strings |\n| `onboarding` | First-run onboarding banner |\n| `provider` | LLM provider setup UI |\n| `overview` | Dashboard overview page |\n| `security` | Security feature short names |\n| `agentChat` | Chat interface — commands, toasts, system messages, tips |\n| `sessionsPage` | Sessions and memory browser |\n| `agentsPage` | Agent creation and management |\n| `approvals` | Execution approval queue |\n| `logsPage` | Live logs and audit trail |\n| `runtimePage` | Runtime info display |\n| `settingsPage` | Full settings panel — providers, models, tools, security, network, budget, proactive memory, migration |\n| `workflowsPage` | Workflow list and execution |\n| `workflowBuilder` | Visual drag-and-drop workflow builder |\n| `schedulerPage` | Cron jobs and event triggers |\n| `channelsPage` | Messaging channel configuration |\n| `skillsPage` | Skills marketplace, MCP servers, quick-start skills |\n| `handsPage` | Curated autonomous capability packages |\n| `pluginsPage` | Plugin management |\n| `commsPage` | Inter-agent communication |\n| `setupWizard` | First-run setup wizard (5 steps) |\n| `goalsPage` | Goal tracking with sub-goals |\n| `analyticsPage` | Usage analytics and cost breakdown |\n| `memoryPage` | Proactive memory browser |\n| `theme` | Theme switcher labels |\n| `sidebar` | Sidebar shortcut hints |\n| `confirm` | Shared confirm dialog buttons |\n\nAdditionally, several **extension namespaces** (suffixed `2`) provide supplementary keys used by newer or refactored components: `agentChat2`, `settingsPage2`, `agentsPage2`, `schedulerPage2`, `analyticsPage2`, `memoryPage2`, `setupWizard2`.\n\n---\n\n## String Interpolation\n\nLocale values use `{curly brace}` placeholders for dynamic data. These are resolved at render time by the frontend's i18n library.\n\n| Pattern | Example Key | Example Output |\n|---------|-------------|----------------|\n| `{count}` | `\"sessionsPage.keysCount\": \"{count} key(s)\"` | `\"12 key(s)\"` |\n| `{name}` | `\"agentsPage.agentSpawned\": \"Agent \\\"{name}\\\" spawned\"` | `Agent \"researcher\" spawned` |\n| `{provider}` | `\"overview.providerReady\": \"{provider} - ready\"` | `\"anthropic - ready\"` |\n| `{model}` | `\"agentChat.toast.modelSwitched\": \"Switched to {model}\"` | `\"Switched to claude-3-opus\"` |\n| `{message}` | `\"agentChat.errorPrefix\": \"Error: {message}\"` | `\"Error: connection refused\"` |\n| Multiple | `\"overview.providersConfigured\": \"{configured}/{total} configured\"` | `\"3/12 configured\"` |\n| `{old}` / `{new}` | `\"agentChat.memoryConflict\"` | Memory conflict resolution display |\n\nThere is no pluralization framework in the JSON itself — the UI layer handles that logic or uses generic forms like `\"key(s)\"`.\n\n---\n\n## Key Naming Conventions\n\n| Suffix | Meaning |\n|--------|---------|\n| `Placeholder` | Input field placeholder text |\n| `Desc` / `Description` | Longer explanatory text below a heading |\n| `Title` | Dialog or section title |\n| `Confirm` | Confirmation dialog body text |\n| `Toast` | Transient notification message |\n| `Failed` | Error message for a failed action |\n| `Short` | Abbreviated form for compact displays |\n| `Prefix` / `Suffix` | Text fragments composed with other strings |\n| `Tab` | Tab label within a multi-tab view |\n\nError toast keys follow the pattern `<namespace>.<action>Failed` (e.g., `agentsPage.spawnAgentFailed`, `sessionsPage.deleteSessionFailed`).\n\n---\n\n## Adding a New Language\n\n1. **Copy `en.json`** to `locales/<locale-code>.json` (e.g., `fr.json`).\n2. **Translate all values** — leave the keys identical. Do not add or remove keys; the English file is the canonical schema.\n3. **Preserve `{placeholder}` tokens** exactly as they appear. A missing placeholder will cause a runtime interpolation error.\n4. **Preserve inline Markdown** where present (e.g., `agentChat.welcomeTips` contains `**bold**` and backtick-wrapped commands).\n5. **Register the locale** in the frontend's i18n configuration (outside this static module) so the app knows to offer it.\n\n### Validation checklist\n\n- [ ] Same key count as `en.json`\n- [ ] All `{placeholder}` tokens present in every translated value\n- [ ] No untranslated keys left as English (grep for common English words if translating to a non-Latin script)\n- [ ] JSON is valid (no trailing commas, properly escaped quotes)\n\n---\n\n## Coverage by Dashboard Area\n\nThe locale files cover the complete UI surface:\n\n- **22 navigation items** (`nav.*`)\n- **10 agent templates** with name + description (`template.*`)\n- **9 tool profiles** with label + description (`profile.*`)\n- **15 security features** with name, description, and threat/hint text (`settingsPage.coreFeatures.*`, `configurableFeatures.*`, `monitoringFeatures.*`)\n- **18 slash commands** with descriptions (`agentChat.cmd.*`)\n- **20+ cron preset labels** (`schedulerPage.cron.*`)\n- **18 skill categories** (`skillsPage.category.*`)\n- **20+ activity action types** (`overview.action*`)\n- **Full setup wizard** across 5 steps (`setupWizard.*`)\n\n---\n\n## Relationship to the Rest of the Codebase\n\n```mermaid\ngraph LR\n    subgraph Static Assets\n        EN[\"locales/en.json\"]\n        JA[\"locales/ja.json\"]\n    end\n    \n    subgraph Backend\n        API[\"librefang-api<br/>(Rust HTTP server)\"]\n    end\n    \n    subgraph Frontend\n        UI[\"Dashboard UI<br/>(JS/TS components)\"]\n        I18N[\"i18n library\"]\n    end\n    \n    API -->|\"serves /static/locales/*\"| UI\n    UI -->|\"loads at boot\"| I18N\n    EN --> I18N\n    JA --> I18N\n    I18N -->|\"t(key)\"| UI\n```\n\nThe Rust API server (`librefang-api`) serves these JSON files as static assets under `/static/locales/`. The frontend fetches the appropriate file during initialization, registers it with its i18n adapter, and all components reference strings via translation keys (e.g., `t('agentsPage.createAgent')`). No backend code parses these files — they are pure static assets consumed entirely by the client.","other-librefang-api-tests":"# Other — librefang-api-tests\n\n# librefang-api-tests\n\nIntegration, lifecycle, load, and spec-generation tests for the LibreFang HTTP API. These tests boot a real `LibreFangKernel`, bind axum to a random port, and exercise endpoints over actual HTTP using `reqwest`. No mocking layers are involved.\n\n## Running\n\n```bash\n# All tests in this crate\ncargo test -p librefang-api --test api_integration_test -- --nocapture\ncargo test -p librefang-api --test daemon_lifecycle_test -- --nocapture\ncargo test -p librefang-api --test load_test -- --nocapture\ncargo test -p librefang-api --test openapi_spec_test -- --nocapture\n\n# Tests that call a real LLM (requires GROQ_API_KEY in environment)\nGROQ_API_KEY=... cargo test -p librefang-api --test api_integration_test test_send_message_with_llm -- --nocapture\n\n# Skip the flaky concurrent-spawn/cycle tests (marked #[ignore])\ncargo test -p librefang-api --test load_test -- --nocapture --ignored\n```\n\n## Architecture\n\nEach test file builds its own server harness tailored to what it needs to verify:\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│  Test Files                                                      │\n│                                                                  │\n│  api_integration_test.rs                                         │\n│    ├── TestServer        (subset of routes, raw axum Router)     │\n│    ├── FullRouterHarness (server::build_router — full stack)     │\n│    └── start_test_server_with_auth() (auth middleware enabled)   │\n│                                                                  │\n│  daemon_lifecycle_test.rs                                        │\n│    └── Minimal Router (health + status + shutdown only)          │\n│                                                                  │\n│  load_test.rs                                                    │\n│    └── TestServer (extended route set including sessions/models) │\n│                                                                  │\n│  openapi_spec_test.rs                                            │\n│    └── utoipa::OpenApi::openapi() (no server needed)            │\n└─────────────────────────────────────────────────────────────────┘\n         │\n         ▼\n┌─────────────────────────────────────────┐\n│  Shared dependencies                     │\n│  LibreFangKernel  AppState  DaemonInfo   │\n│  KernelConfig  DefaultModelConfig        │\n└─────────────────────────────────────────┘\n```\n\n```mermaid\ngraph TD\n    A[\"start_test_server()\"] -->|creates| B[\"TestServer\"]\n    C[\"start_test_server_with_llm()\"] -->|delegates| D[\"start_test_server_with_provider()\"]\n    A --> D\n    D --> B\n    E[\"start_full_router()\"] -->|creates| F[\"FullRouterHarness\"]\n    G[\"start_test_server_with_auth()\"] -->|creates| B\n    B -->|binds 127.0.0.1:0| H[\"tokio::net::TcpListener\"]\n    F -->|calls| I[\"server::build_router()\"]\n```\n\n## Test Harnesses\n\n### `TestServer`\n\nThe primary harness used by `api_integration_test.rs` and `load_test.rs`. It constructs a minimal axum `Router` with a specific subset of routes, binds to an ephemeral port, and returns the base URL for `reqwest` calls.\n\nKey fields:\n- `base_url` — `http://127.0.0.1:{random_port}`\n- `config_path` — path to the temp `config.toml` (used by config-reload tests)\n- `state` — `Arc<AppState>` shared with the router, used for direct kernel assertions\n- `_tmp` — `tempfile::TempDir` dropped on teardown, cleaning up all temp files\n\nCleanup: the `Drop` impl calls `state.kernel.shutdown()`.\n\n### `FullRouterHarness`\n\nUsed when tests need the full middleware stack that `server::build_router()` provides — API versioning headers (`x-api-version`), dashboard locale serving, provider discovery with `is_local` flags, and migration endpoints. Instead of a hand-built router, it delegates to the production `server::build_router()` function and uses `tower::ServiceExt::oneshot` for in-process requests (no network hop).\n\n### Provider Variants\n\n| Harness function | Provider | API key env | Purpose |\n|---|---|---|---|\n| `start_test_server()` | ollama | `OLLAMA_API_KEY` | Default; no real LLM needed |\n| `start_test_server_with_llm()` | groq | `GROQ_API_KEY` | Real LLM round-trip tests |\n| `start_test_server_with_provider(...)` | configurable | configurable | Custom provider setup |\n| `start_test_server_with_auth(key)` | ollama | `OLLAMA_API_KEY` | Bearer-token auth enabled |\n\nAll variants create a `tempfile::TempDir`, write a `KernelConfig` as TOML, boot the kernel via `LibreFangKernel::boot_with_config`, construct `AppState` manually, and spawn the axum server in a background tokio task.\n\n## Test Coverage by File\n\n### `api_integration_test.rs`\n\nThe largest file, covering the full API surface:\n\n**Core endpoints**\n- `test_health_endpoint` — `/api/health` returns `{ status: \"ok\", version: \"...\" }`, omits sensitive fields (`database`, `agent_count`), and injects `x-request-id`.\n- `test_status_endpoint` — `/api/status` returns runtime details: `agent_count`, `uptime_seconds`, `default_provider`, agent list.\n- `test_request_id_header_is_uuid` — validates `x-request-id` is a parseable UUID.\n\n**API versioning**\n- `test_build_router_exposes_versioned_api_aliases` — both `/api/health` and `/api/v1/health` return `x-api-version: v1`. `/api/versions` lists current and supported versions.\n- `test_build_router_path_version_beats_unknown_accept_header` — path-based versioning takes precedence over `Accept: application/vnd.librefang.v99+json`.\n\n**Dashboard and providers**\n- `test_build_router_serves_dashboard_locales` — `/locales/{lang}.json` returns translation objects.\n- `test_build_router_providers_marks_local_providers` — `/api/providers` marks ollama with `is_local: true`.\n\n**Authentication**\n- `test_auth_health_is_public` — health endpoint bypasses auth.\n- `test_auth_rejects_no_token` — protected endpoints return 401 with \"Missing\" in error.\n- `test_auth_rejects_wrong_token` — wrong bearer token returns 401 with \"Invalid\".\n- `test_auth_accepts_correct_token` — correct token grants access.\n- `test_auth_disabled_when_no_key` — empty `api_key` in config disables auth entirely.\n- `test_build_router_unauthorized_responses_include_api_version_header` — even 401s include `x-api-version`.\n\n**Agent lifecycle**\n- `test_spawn_list_kill_agent` — full CRUD cycle: POST to create, GET to list, DELETE to kill. Verifies agent count changes correctly (default assistant is always present).\n- `test_multiple_agents_lifecycle` — spawns 3 named agents, verifies list count, kills selectively, verifies remaining.\n- `test_invalid_agent_id_returns_400` — non-UUID IDs return 400 for message, kill, and session endpoints.\n- `test_kill_nonexistent_agent_returns_404` — valid UUID that doesn't exist returns 404.\n- `test_spawn_invalid_manifest_returns_400` — malformed TOML returns 400 with \"Invalid manifest\" error.\n\n**Agent monitoring**\n- `test_agent_session_empty` — newly spawned agent has 0 messages.\n- `test_agent_monitoring_endpoints` — `/agents/{id}/metrics` returns token usage and tool call stats. `/agents/{id}/logs?level=...&n=...` filters audit log entries by outcome.\n- `test_send_message_with_llm` — gated behind `GROQ_API_KEY`. Spawns a groq agent, sends a message, verifies non-empty response and token counts > 0, checks session message count increases.\n\n**Agent list filtering/pagination**\n- `test_agent_list_paginated_response_format` — response shape: `{ items, total, offset, limit }`.\n- `test_agent_list_invalid_sort_returns_400` — unknown sort field returns 400.\n- `test_agent_list_valid_sort_fields` — `name`, `created_at`, `last_active`, `state` all return 200.\n- `test_agent_list_limit_clamped_to_max` — `limit=9999` clamps to 100.\n- `test_agent_list_pagination` — `offset`/`limit` return correct page slices.\n- `test_agent_list_text_search` — `q=` parameter filters by name/description.\n\n**Triggers and workflows**\n- `test_trigger_crud` — create, list (unfiltered and filtered by `agent_id`), delete. Verifies `enabled`, `max_fires` fields.\n- `test_workflow_crud` — create with steps, list, verify `steps` count.\n\n**Tools**\n- `test_list_tools` — returns `{ tools: [...], total: N }` with `total > 0`.\n- `test_get_tool_found` — fetches first tool by name, verifies `description` and `input_schema`.\n- `test_get_tool_not_found` — nonexistent tool returns 404.\n\n**MCP bridge** (issue #2699 regression guards)\n- `test_mcp_http_rehydrates_caller_context_from_agent_header` — `POST /mcp` with `X-LibreFang-Agent-Id` header passes caller identity to tools. Without the header, `cron_list` returns \"Agent ID required\".\n- `test_mcp_http_invalid_agent_header_falls_back_to_unauthenticated` — garbage/unknown agent IDs degrade gracefully (error, not 500).\n- `test_mcp_http_unrestricted_agent_can_call_any_tool` — agent with no `[capabilities]` section (unrestricted) can call any tool through the bridge.\n- `test_mcp_http_enforces_agent_tool_allowlist` — agent whose manifest only grants `file_read` cannot call `cron_list` through the bridge; gets \"Permission denied\".\n\n**Config hot-reload**\n- `test_config_reload_hot_reloads_proxy_changes` — writes new proxy config to disk, hits `/api/config/reload`, verifies `restart_required: false` and `ReloadProxy` in `hot_actions_applied`.\n\n**Migration**\n- `test_run_migrate_uses_daemon_home_when_target_dir_is_empty` — migration with empty `target_dir` writes to daemon's home directory.\n\n**Hands**\n- `list_active_hands_includes_definition_metadata` — installs a hand definition, activates it, attaches agent roles via `set_agents`, then verifies `/api/hands/active` returns enriched fields: `hand_name`, `hand_icon`, `coordinator_role`, and `agent_ids` map.\n\n### `daemon_lifecycle_test.rs`\n\nTests daemon startup, PID file management, and shutdown:\n\n- `test_daemon_info_serde_roundtrip` — `DaemonInfo` serializes to/from JSON correctly.\n- `test_read_daemon_info_from_file` — reads a valid `daemon.json`.\n- `test_read_daemon_info_missing_file` — returns `None` for missing file.\n- `test_read_daemon_info_corrupt_json` — returns `None` for invalid JSON.\n- `test_stale_daemon_info_detection` — `read_daemon_info` returns the file content even with a stale PID (PID liveness checking is the caller's responsibility).\n- `test_full_daemon_lifecycle` — boots kernel, starts server, writes `daemon.json`, verifies health and status endpoints, triggers shutdown, removes daemon info file.\n- `test_server_immediate_responsiveness` — health endpoint responds in <1 second after server start.\n\n### `load_test.rs`\n\nPerformance smoke tests with printed throughput/latency statistics:\n\n- `load_endpoint_latency` — measures p50/p95/p99 for 8 GET endpoints over 100 requests each, with 10-request warmup. Gates on p95 < 1 second.\n- `load_concurrent_reads` — 50 simultaneous GET requests across 4 endpoints; all must return 200.\n- `load_concurrent_agent_spawns` (`#[ignore]`) — 20 parallel POST spawns; allows 2 failures.\n- `load_spawn_kill_cycle` (`#[ignore]`) — 10 sequential spawn+kill cycles.\n- `load_session_management` — creates 10 sessions, lists them, switches through each.\n- `load_workflow_operations` — 15 concurrent workflow creates, then list.\n- `load_metrics_sustained` — 200 sequential hits to `/api/metrics`, verifying Prometheus output contains `librefang_agents_active`.\n\n### `openapi_spec_test.rs`\n\n- `generate_openapi_json` — calls `ApiDoc::openapi()`, validates the spec has an `openapi` version, `info.title`, and 100+ paths, then writes `openapi.json` to the repository root for SDK codegen and CI consumption.\n\n## Manifest Constants\n\nSeveral TOML manifest constants are defined for spawning test agents:\n\n| Constant | Provider | Tools granted | Purpose |\n|---|---|---|---|\n| `TEST_MANIFEST` | ollama | `file_read` | Default agent for most tests |\n| `LLM_MANIFEST` | groq | `file_read` | Real LLM round-trip tests |\n| `MCP_TEST_MANIFEST` | ollama | `cron_list`, `cron_create`, `cron_cancel` | MCP bridge caller-context tests |\n| `UNRESTRICTED_MANIFEST` | ollama | none (no `[capabilities]`) | MCP unrestricted-access tests |\n\n## Adding New Tests\n\n1. **Pick the right harness.** Use `start_test_server()` for most endpoint tests. Use `start_full_router()` when you need API versioning, locale files, or the full middleware stack. Use `start_test_server_with_auth(key)` for auth-specific tests.\n\n2. **Use `#[tokio::test(flavor = \"multi_thread\")]`.** The kernel requires a multi-threaded runtime. Single-threaded tests will panic.\n\n3. **Create a unique manifest** if your test needs specific capabilities. Name the agent distinctly to avoid collisions in list assertions.\n\n4. **Clean up agents** if the test spawns them and other tests in the same file share the server. Kill agents at the end of the test to avoid leaking into subsequent assertions.\n\n5. **Gate real LLM tests** behind `std::env::var(\"GROQ_API_KEY\")` with an early return and `eprintln!` message.\n\n6. **Mark flaky tests** with `#[ignore]` and a comment explaining the race condition. Load tests that depend on precise spawn/kill timing are the common case.","other-librefang-api":"# Other — librefang-api\n\n# librefang-api\n\nHTTP/WebSocket API server for the LibreFang Agent OS daemon. This crate exposes the daemon's capabilities—agent management, channel orchestration, skill execution, memory, extensions, and telemetry—through a network-accessible API.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[librefang-api] --> TYPES[librefang-types]\n    API --> KERNEL[librefang-kernel]\n    API --> RUNTIME[librefang-runtime]\n    API --> MEMORY[librefang-memory]\n    API --> CHANNELS[librefang-channels]\n    API --> WIRE[librefang-wire]\n    API --> SKILLS[librefang-skills]\n    API --> HANDS[librefang-hands]\n    API --> EXT[librefang-extensions]\n    API --> MIGRATE[librefang-migrate]\n    API --> TELEMETRY[librefang-telemetry]\n    CHANNELS -.-> |feature flags forwarded| API\n```\n\nThe API crate sits at the top of the dependency graph. It aggregates nearly every other `librefang-*` crate and wires them together behind an `axum`-based HTTP server with `tower` middleware.\n\n## Key Dependencies and Their Roles\n\n| Crate | Purpose in the API |\n|---|---|\n| `librefang-types` | Shared domain types (request/response bodies, identifiers, enums) |\n| `librefang-kernel` | Core agent lifecycle, configuration, and state management |\n| `librefang-runtime` | Process registry and execution sandboxing |\n| `librefang-memory` | Agent memory and conversation history persistence |\n| `librefang-channels` | Messaging channel integrations (Telegram, Discord, Slack, etc.) |\n| `librefang-wire` | Wire protocol definitions for inter-service communication |\n| `librefang-skills` | Skill registry and execution |\n| `librefang-hands` | Tool/action (\"hands\") execution framework |\n| `librefang-extensions` | Extension system including vault for secret management |\n| `librefang-migrate` | Database schema migrations |\n| `librefang-telemetry` | Logging, tracing, and metrics infrastructure |\n\nAdditional runtime dependencies include:\n\n- **`axum` / `tower` / `tower-http`** — HTTP framework, middleware, and utilities (CORS, compression, tracing, etc.)\n- **`governor`** — Rate limiting\n- **`jsonwebtoken`** — JWT authentication\n- **`argon2`** — Password hashing\n- **`hmac` / `sha2` / `subtle`** — HMAC-based request signing and constant-time comparison\n- **`dashmap`** — Concurrent in-memory state maps\n- **`portable-pty`** — Pseudo-terminal allocation (for interactive shell sessions over WebSocket)\n- **`utoipa`** — OpenAPI schema generation with `axum_extras` support\n- **`include_dir`** — Embeds the static dashboard assets at compile time\n\n## Feature Flags\n\nFeature flags control which channel backends and telemetry integrations are compiled in. This is critical for binary size and dependency management—each channel pulls in its own SDK/client.\n\n### Feature Groups\n\n**`default`** — `all-channels` + `telemetry`\n\n**`all-channels`** — Enables all 44 channel backends. Full list:\n\n```\ntelegram, discord, slack, matrix, email, webhook, whatsapp, signal,\nteams, mattermost, irc, google-chat, twitch, rocketchat, zulip, xmpp,\nbluesky, feishu, line, mastodon, messenger, reddit, revolt, viber,\nflock, guilded, keybase, nextcloud, nostr, pumble, threema, twist,\nwebex, dingtalk, discourse, gitter, gotify, linkedin, mumble, ntfy,\nqq, voice, wechat, wecom\n```\n\n**`mini`** — 12 core channels only: `telegram`, `discord`, `slack`, `matrix`, `email`, `webhook`, `whatsapp`, `signal`, `teams`, `mattermost`, `irc`, `google-chat`\n\n**`telemetry`** — Enables OpenTelemetry trace export (via `opentelemetry-otlp`) and Prometheus metrics exposition.\n\n### Forwarding Mechanism\n\nAll `channel-*` features are forwarded directly to `librefang-channels` using the same name:\n\n```toml\nchannel-telegram = [\"librefang-channels/channel-telegram\"]\n```\n\nThis means enabling a channel feature on the API crate automatically enables it in the shared channels crate.\n\n### Selecting a Minimal Build\n\nFor deployments that only need specific channels:\n\n```toml\n# In a downstream Cargo.toml or via cargo flags\nlibrefang-api = { default-features = false, features = [\"channel-telegram\", \"channel-discord\"] }\n```\n\n## Build Script (`build.rs`)\n\nThe build script performs three tasks:\n\n### 1. Static Dashboard Directory Scaffolding\n\n```rust\nlet dashboard_dir = \"...librefang-api/static/react\";\n```\n\nEnsures `static/react/` exists before compilation. This directory is gitignored because it contains build artifacts from the dashboard frontend (produced by `npm run build`). If the directory is empty, `include_dir!` embeds nothing and the runtime falls back to serving assets from `~/.librefang/dashboard/`.\n\nThis prevents `include_dir!` from failing on fresh clones or worktrees where the frontend hasn't been built yet.\n\n### 2. Build Metadata Injection\n\nThree environment variables are embedded at compile time via `cargo:rustc-env`:\n\n| Variable | Source | Example Value |\n|---|---|---|\n| `GIT_SHA` | `git rev-parse --short HEAD` | `a1b2c3d` |\n| `BUILD_DATE` | `date -u +%Y-%m-%d` | `2025-01-15` |\n| `RUSTC_VERSION` | `rustc --version` | `rustc 1.82.0 ...` |\n\nEach falls back to `\"unknown\"` if the command fails (e.g., building from a tarball without git). These are accessible at runtime via `env!()` macros and are typically exposed through a `/version` or `/health` endpoint.\n\n### 3. Unix-Specific Dependency\n\nOn Unix targets, `rustix` (with `process` feature) is included for low-level process operations.\n\n## Authentication and Security\n\nThe dependency set indicates three authentication mechanisms:\n\n- **JWT** (`jsonwebtoken`) — Token-based session authentication for API consumers\n- **Password hashing** (`argon2`) — Credential storage for local user accounts\n- **HMAC signing** (`hmac` + `sha2` + `subtle`) — Request signing with constant-time signature verification\n\nRate limiting is provided by `governor`.\n\n## OpenAPI Documentation\n\nThe `utoipa` dependency with `axum_extras` support means the crate automatically generates an OpenAPI specification from route definitions. This is typically served at a well-known path (e.g., `/docs/openapi.json`) and can power interactive API documentation.\n\n## WebSocket Support\n\nWebSocket endpoints are supported through `axum`'s native WebSocket handling. Key use cases indicated by dependencies:\n\n- **Interactive terminals** (`portable-pty`) — WebSocket-based shell sessions\n- **Real-time streaming** (`tokio-stream`, `futures`) — Event streams, agent output, and notification delivery\n\n## Connection to the Rest of the Codebase\n\nThe build script reaches into:\n\n- `librefang-runtime/src/process_registry.rs` — references the process registry at build time for validation\n- `librefang-extensions/src/vault.rs` — checks vault path existence during the build\n\nAt runtime, the API crate is the integration point that initializes the kernel, runs migrations, starts channel listeners, registers skills and hands, and binds the HTTP/WebSocket listener. All other crates provide the individual capabilities; this crate wires them into a coherent server.","other-librefang-channels-benches":"# Other — librefang-channels-benches\n\n# librefang-channels-benches\n\nCriterion benchmarks for channel message dispatch hot paths in the `librefang-channels` crate.\n\n## Purpose\n\nThis module provides repeatable microbenchmarks for the three performance-critical layers of the channel dispatch pipeline:\n\n| Layer | What it measures | Impact |\n|---|---|---|\n| **Serialization** | JSON encode/decode of `ChannelMessage` | Every inbound and outbound message |\n| **Routing** | Agent resolution via `AgentRouter` | Per-message dispatch decision |\n| **Formatting** | Markdown → platform-specific conversion + message splitting | Every outbound response |\n\nThese benchmarks guard against regressions in latency-sensitive paths where the agent OS processes messages from multiple platforms concurrently.\n\n## Running\n\n```bash\n# All benchmark groups\ncargo bench -p librefang-channels\n\n# Single group\ncargo bench -p librefang-channels -- serialization\ncargo bench -p librefang-channels -- routing\ncargo bench -p librefang-channels -- formatting\n```\n\nResults are saved under `target/criterion/` with HTML reports.\n\n## Benchmark Groups\n\n### `serialization` — Message Serde throughput\n\nThree benchmarks exercise `serde_json` on a representative `ChannelMessage` constructed by `make_sample_message()`:\n\n| Benchmark | Operation |\n|---|---|\n| `message_serialize` | `ChannelMessage` → JSON string |\n| `message_deserialize` | JSON string → `ChannelMessage` |\n| `message_roundtrip` | Serialize then immediately deserialize |\n\nThe sample message uses `ChannelType::Telegram`, a sender with no linked `librefang_user`, plain `Text` content, and an empty `metadata` map — a minimal-but-realistic payload.\n\n### `routing` — Agent resolution\n\nFour benchmarks cover every resolution path in `AgentRouter`:\n\n| Benchmark | Router setup | What it tests |\n|---|---|---|\n| `router_resolve_direct` | Default + direct route for `(Telegram, user-42)` | Fast-path: exact match on channel + peer |\n| `router_resolve_default_fallback` | Default only, query unknown Discord user | Fallback to default agent |\n| `router_resolve_binding_match` | Loaded `AgentBinding` for `(telegram, vip-user)` | Binding rule match via `load_bindings` |\n| `router_resolve_with_context` | Binding with `guild_id` + `roles` constraints, `BindingContext` provided | Context-aware match including role intersection |\n\nThe routing benchmarks exercise `resolve()` and `resolve_with_context()` from `librefang_channels::router`. The context-aware variant constructs a `BindingContext` with `Cow::Borrowed` fields and a `smallvec` of roles to match the shape used at runtime.\n\n```mermaid\nflowchart LR\n    A[\"resolve()\"] --> D{Route type?}\n    D -->|Direct map| E[\"Exact match\"]\n    D -->|Bindings| F[\"Rule match\"]\n    D -->|Neither| G[\"Default agent\"]\n    H[\"resolve_with_context()\"] --> I[\"BindingContext\\nrole/guild filter\"]\n    I --> F\n```\n\n### `formatting` — Output conversion and message splitting\n\n| Benchmark | Function under test | Input |\n|---|---|---|\n| `format_markdown_passthrough` | `format_for_channel(..., Markdown)` | Multi-paragraph markdown |\n| `format_telegram_html` | `format_for_channel(..., TelegramHtml)` | Same markdown |\n| `format_slack_mrkdwn` | `format_for_channel(..., SlackMrkdwn)` | Same markdown |\n| `format_plain_text` | `format_for_channel(..., PlainText)` | Same markdown |\n| `format_telegram_html_short` | `format_for_channel(..., TelegramHtml)` | `\"Hello world!\"` |\n| `split_message_short` | `split_message(\"Hello!\", 4096)` | Short string |\n| `split_message_long` | `split_message(500-line text, 4096)` | ~7 KB text |\n| `default_phase_emoji_all` | `default_phase_emoji()` for all major phases | 6 `AgentPhase` variants |\n\nThe long-form markdown input (`SAMPLE_MARKDOWN`) contains bold, italic, code spans, links, and lists to stress the parser across all output formats. `split_message_long` uses 500 lines of repeated text to exercise the chunking boundary logic in `split_message()` from `librefang_channels::types`.\n\n`default_phase_emoji_all` iterates over `Queued`, `Thinking`, `tool_use(\"web_fetch\")`, `Streaming`, `Done`, and `Error` to measure lookup cost across all phase variants including the stringly-typed tool-use case.\n\n## Dependencies on library internals\n\n```\nbench function                    →  library symbol\n─────────────────────────────────────────────────────────────\nmake_sample_message               →  ChannelMessage, ChannelUser,\n                                     ChannelContent, ChannelType  (types.rs)\nbench_router_resolve_*            →  AgentRouter::{new, set_default,\n                                     set_direct_route, register_agent,\n                                     load_bindings, resolve,\n                                     resolve_with_context}        (router.rs)\nbench_router_resolve_with_context →  BindingContext                (router.rs)\nbench_format_*                    →  format_for_channel            (formatter.rs)\nbench_split_message_*             →  split_message                 (types.rs)\nbench_default_phase_emoji         →  default_phase_emoji,\n                                     AgentPhase::tool_use          (types.rs)\n```\n\n## Adding new benchmarks\n\n1. **Identify the hot path** — anything called per-message or per-chunk is a candidate.\n2. **Add the bench function** following the existing pattern: construct fixtures outside the closure, use `black_box` on inputs, and call `c.iter(|| ...)`.\n3. **Register in the correct group** — `criterion_group!` macro in the relevant group, then ensure the group appears in `criterion_main!`.\n4. **Use realistic data** — avoid trivially small inputs that hide allocation costs, and avoid huge inputs that benchmark the allocator rather than the algorithm.","other-librefang-channels-src":"# Other — librefang-channels-src\n\n# Twitch IRC Channel Adapter (`librefang-channels-src`)\n\n## Purpose\n\nThis module provides a Twitch chat adapter that bridges Twitch IRC into the LibreFang channel system. It connects to Twitch's IRC gateway (`irc.chat.twitch.tv:6667`) over plain TCP, implements the IRC protocol for sending and receiving chat messages, and translates Twitch messages into the platform-agnostic `ChannelMessage` type.\n\n## Architecture\n\nThe adapter operates as a long-lived background task that maintains an IRC connection, handles keepalive, parses incoming messages, and emits them through an `mpsc` channel as a `Stream<ChannelMessage>`.\n\n```mermaid\nflowchart TD\n    A[TwitchAdapter::start] --> B[Spawn background task]\n    B --> C[Connect TCP to irc.chat.twitch.tv:6667]\n    C --> D[Send PASS + NICK]\n    D --> E[Send JOIN per channel]\n    E --> F[Read loop: read_line]\n    F --> G{Line type?}\n    G -->|PING| H[Send PONG]\n    G -->|PRIVMSG| I[parse_privmsg]\n    I --> J[Build ChannelMessage]\n    J --> K[Send via mpsc::tx]\n    G -->|EOF/Error| L[Reconnect with backoff]\n    H --> F\n```\n\n## Key Types\n\n### `TwitchAdapter`\n\nThe main struct implementing the `ChannelAdapter` trait. It holds:\n\n| Field | Purpose |\n|---|---|\n| `oauth_token` | Twitch OAuth token, wrapped in `Zeroizing<String>` for secure memory handling |\n| `channels` | List of Twitch channels to join (stored without `#` prefix) |\n| `nick` | Bot's IRC nickname, must match the token owner's Twitch username |\n| `account_id` | Optional identifier for multi-bot routing, injected into message metadata |\n| `shutdown_tx` / `shutdown_rx` | `watch` channel for graceful shutdown signaling |\n\nConstruction uses a builder pattern:\n\n```rust\nlet adapter = TwitchAdapter::new(token, vec![\"channel1\".into()], \"mybot\".into())\n    .with_account_id(Some(\"bot-farm-01\".into()));\n```\n\n### `parse_privmsg`\n\n```rust\nfn parse_privmsg(line: &str) -> Option<(String, String, String)>\n```\n\nParses raw IRC lines matching the format:\n\n```\n:nick!user@host PRIVMSG #channel :message text\n```\n\nReturns `(nick, channel, message)` on success. Returns `None` for non-PRIVMSG lines, malformed messages, or lines missing the `:` prefix. This is a pure function with no side effects, making it straightforward to test in isolation.\n\n## Connection Lifecycle\n\n### Start (`start()`)\n\n1. Creates an `mpsc::channel<ChannelMessage>(256)` for downstream consumption.\n2. Spawns an async task that enters a reconnection loop:\n   - **Connect**: Opens a TCP stream to `irc.chat.twitch.tv:6667`.\n   - **Authenticate**: Sends `PASS` and `NICK` commands. The `pass_string()` method normalizes the token—whether the caller includes the `oauth:` prefix or not, the output is always `PASS oauth:<token>\\r\\n`.\n   - **Join**: Sends a `JOIN` command for each channel in `self.channels`.\n   - **Read loop**: Uses `BufReader::read_line` inside a `tokio::select!` that also watches the shutdown signal. Each line is trimmed and dispatched:\n     - `PING` → responds with `PONG` and continues.\n     - `PRIVMSG` → parsed by `parse_privmsg`, converted to `ChannelMessage`, sent on the channel.\n     - EOF or read error → breaks out for reconnection.\n   - **Shutdown**: If `shutdown_rx` changes, sends `QUIT` and exits the task.\n3. Returns the receiver end wrapped as `ReceiverStream` (a `Stream<Item = ChannelMessage>`).\n\n### Reconnection\n\nOn connection failure or unexpected disconnect, the task applies exponential backoff starting at 1 second, doubling each attempt, capped at 60 seconds. Backoff resets to 1 second after a successful connection and channel join.\n\n### Send (`send()`)\n\nSends a message to a specific Twitch channel. The current implementation:\n\n1. Opens a fresh TCP connection per call (a production deployment would maintain a persistent write connection).\n2. Authenticates with `PASS` and `NICK`.\n3. Waits 500ms for Twitch to process authentication.\n4. Splits long messages using `split_message(&text, 500)` to respect the 500-character IRC limit.\n5. Sends each chunk as `PRIVMSG #channel :<chunk>`.\n6. Sends `QUIT` to close the connection.\n\nOnly `ChannelContent::Text` is supported for outbound messages. Non-text content results in the placeholder string `\"(Unsupported content type)\"`.\n\n### Stop (`stop()`)\n\nSends `true` on the shutdown `watch` channel. The background task detects this in its `select!` loop, sends `QUIT`, and exits cleanly.\n\n## Message Translation\n\nIncoming Twitch messages are classified before wrapping into `ChannelContent`:\n\n| Twitch message | `ChannelContent` variant |\n|---|---|\n| `Hello world` | `Text(\"Hello world\")` |\n| `!help args` | `Command { name: \"help\", args: [\"args\"] }` |\n| `/command foo bar` | `Command { name: \"command\", args: [\"foo\", \"bar\"] }` |\n\nMessages starting with `/` or `!` are parsed as commands; everything else is plain text.\n\nEach outgoing `ChannelMessage` includes:\n\n- `channel`: `ChannelType::Custom(\"twitch\".to_string())`\n- `platform_message_id`: A new UUID v4\n- `sender`: `ChannelUser` with `platform_id` set to the channel name and `display_name` set to the sender's nick\n- `is_group`: Always `true` (Twitch channels are group chats)\n- `metadata`: Contains `\"account_id\"` if the adapter was configured with one\n- `timestamp`: `Utc::now()`\n\nThe adapter filters out messages from the bot itself (case-insensitive nick comparison) and skips empty messages.\n\n## Security\n\n- The OAuth token is stored in `Zeroizing<String>`, which zeroizes memory on drop.\n- The token prefix is normalized in `pass_string()` so callers don't need to worry about whether they included `oauth:`.\n- No TLS is used (port 6667, plain TCP). In production, consider wrapping the connection in TLS or using port 6697 if Twitch supports it.\n\n## Dependencies on `crate::types`\n\nThe adapter relies on these shared types from the channel system:\n\n- `ChannelAdapter` trait — the interface this struct implements\n- `ChannelMessage`, `ChannelUser`, `ChannelContent`, `ChannelType` — message model types\n- `split_message` — utility for chunking messages to fit IRC length limits\n\n## Testing\n\nThe module includes unit tests covering:\n\n- Adapter construction and trait method outputs (`name()`, `channel_type()`)\n- `pass_string()` normalization with and without the `oauth:` prefix\n- `parse_privmsg()` for valid messages, commands, missing message bodies, non-PRIVMSG lines, and lines without the `:` prefix\n\nThe `parse_privmsg` function is pure and fully testable without network access. Integration testing of the full connection lifecycle would require mocking the TCP layer or a Twitch IRC stub server.","other-librefang-channels-tests":"# Other — librefang-channels-tests\n\n# Bridge Integration Tests\n\nEnd-to-end tests for the `BridgeManager` dispatch pipeline. No external services are contacted — all communication is in-process via real tokio channels and tasks.\n\n## Architecture\n\nThe tests wire together three real production components (`BridgeManager`, `AgentRouter`, `ChannelMessage` types) with mock implementations of the two trait boundaries the bridge depends on:\n\n```mermaid\ngraph LR\n    subgraph \"Test Infrastructure\"\n        TX[mpsc::Sender] -->|inject| MA[MockAdapter]\n        MA -->|start → Stream| BM[BridgeManager]\n        BM -->|dispatch| MH[MockHandle]\n        MH -->|response| BM\n        BM -->|send / send_streaming| MA\n        AR[AgentRouter] --- BM\n    end\n```\n\n- **`ChannelAdapter`** — mocked to inject test messages and capture outbound responses\n- **`ChannelBridgeHandle`** — mocked to echo messages, serve agent lists, simulate streaming deltas, or inject errors\n\n## Mock Implementations\n\n### Channel Adapters\n\n| Adapter | Streaming | Purpose |\n|---|---|---|\n| `MockAdapter` | No | Basic text/command flow. Captures `send()` output as `(platform_id, text)` pairs. Interactive button labels are flattened into text for assertions. |\n| `MockStreamingAdapter` | Yes (`supports_streaming → true`) | Captures `send_streaming()` deltas separately from `send()` calls, allowing tests to verify which code path was taken. |\n| `MockFailingStreamingAdapter` | Yes (always errors) | `send_streaming()` drains the delta channel then returns `Err`. Used to exercise fallback branches where the buffered text must be delivered via `send()` instead. |\n\nAll adapters are constructed via a `new(name, channel_type) → (Arc<Self>, mpsc::Sender<ChannelMessage>)` pattern. The sender is used by tests to inject messages into the adapter's stream.\n\n### Kernel Handles\n\n| Handle | `send_message_streaming_with_sender_status` | Purpose |\n|---|---|---|\n| `MockHandle` | N/A | Echoes via `send_message`. Records `(AgentId, message)` pairs. |\n| `MockStreamingHandle` | Emits words as individual deltas | Tests the streaming dispatch path. |\n| `MockProgressHandle` | Emits `🔧 tool_name` progress line + prose | Verifies non-streaming adapters (Discord/Slack) receive progress markers. |\n| `MockKernelErrorHandle` | Emits deltas then signals `Err` on status oneshot | Exercises the \"both kernel and transport fail\" outcome. |\n| `MockKernelOkHandle` | Emits text then signals `Ok` on status oneshot | Records `record_delivery` calls to verify metric correctness (Bug 1 fix). |\n\n## Message Helpers\n\n- **`make_text_msg(channel, user_id, text)`** — constructs a `ChannelMessage` with `ChannelContent::Text`\n- **`make_command_msg(channel, user_id, cmd, args)`** — constructs a `ChannelMessage` with `ChannelContent::Command`\n\nBoth set sensible defaults (`platform_message_id: \"msg1\"`, `is_group: false`, `thread_id: None`, empty metadata).\n\n## Test Coverage\n\n### Basic Dispatch\n\n| Test | Verifies |\n|---|---|\n| `test_bridge_dispatch_text_message` | Text message routes to the correct agent via `AgentRouter`; the echo response is sent back through the adapter; the handle receives the original message. |\n| `test_bridge_dispatch_agents_command` | `/agents` command returns a listing containing all registered agent names. |\n| `test_bridge_dispatch_help_command` | `/help` command returns text mentioning `/agents` and `/agent`. |\n| `test_bridge_dispatch_agent_select_command` | `/agent coder` updates the router so future messages from that user route to the selected agent. Also verifies the confirmation message. |\n| `test_bridge_dispatch_status_command` | `/status` returns agent count (e.g., \"2 agent(s) running\"). |\n| `test_bridge_dispatch_slash_command_in_text` | Plain text starting with `/agents` (not the `Command` variant) is still intercepted and handled as a command. |\n\n### Error Handling\n\n| Test | Verifies |\n|---|---|\n| `test_bridge_dispatch_no_agent_assigned` | When a user has no routed agent and none exist, a \"No agents available\" message is returned. |\n\n### Lifecycle and Multi-Adapter\n\n| Test | Verifies |\n|---|---|\n| `test_bridge_manager_lifecycle` | Start adapter → send 5 messages → verify 5 sequential echo responses → `stop()` completes without hanging. |\n| `test_bridge_multiple_adapters` | Two adapters (Telegram + Discord) run simultaneously in one `BridgeManager`. Messages sent to each adapter produce responses on the correct adapter only. |\n\n### Streaming Dispatch\n\n| Test | Verifies |\n|---|---|\n| `test_bridge_streaming_adapter_uses_send_streaming` | When both adapter and handle support streaming, `send_streaming` is called on the adapter and `send()` is **not** called. |\n| `test_bridge_non_streaming_adapter_falls_back_to_send` | When the adapter lacks streaming support, `send()` is used even though the handle supports streaming. |\n| `test_default_send_streaming_collects_and_sends` | The default `ChannelAdapter::send_streaming` implementation collects all deltas and calls `self.send()` with the assembled text. |\n\n### Progress Markers (V2 Pipeline)\n\n| Test | Verifies |\n|---|---|\n| `test_bridge_non_streaming_adapter_sees_progress_markers` | Non-streaming adapters receive progress markers (`🔧`) in the consolidated response, not just streaming-capable ones. |\n\n### Failure Path Recovery\n\n| Test | Verifies |\n|---|---|\n| `test_bridge_streaming_adapter_kernel_and_transport_both_fail` | When both `send_streaming` errors and the kernel reports failure, the fallback delivers the buffered partial text (including progress markers) via `send()`. |\n| `test_bridge_streaming_adapter_kernel_ok_transport_fail_records_clean_success` | **Bug 1 regression test.** When the kernel succeeds but `send_streaming` fails, the fallback `send()` delivers the buffered text and `record_delivery` is called with `(success=true, err=None)` — the transport-side stream error must not leak into the error field. |\n\n## Test Pattern\n\nEvery test follows the same structure:\n\n```\n1. Create mock handle with known agents\n2. Create AgentRouter, optionally pre-route users\n3. Create mock adapter(s)\n4. Instantiate BridgeManager::new(handle, router)\n5. manager.start_adapter(adapter).await\n6. Inject message(s) via mpsc::Sender\n7. tokio::time::sleep(100-300ms) — allow async dispatch\n8. Assert on adapter.get_sent() / adapter.get_streamed()\n9. Assert on handle.received / handle.deliveries()\n10. manager.stop().await\n```\n\n## Adding New Tests\n\n1. Determine which mock adapter and handle combination you need (see tables above).\n2. Use `make_text_msg` or `make_command_msg` to construct the inbound message.\n3. Pre-configure the `AgentRouter` via `set_user_default` if the test requires a routed user.\n4. Inject the message through the adapter's `mpsc::Sender`.\n5. Sleep briefly, then assert on the captured output.\n6. Always call `manager.stop().await` at the end to clean up spawned tasks.","other-librefang-channels":"# Other — librefang-channels\n\n# librefang-channels\n\nChannel Bridge Layer — pluggable messaging integrations for LibreFang.\n\n## Purpose\n\n`librefang-channels` provides a unified abstraction over dozens of messaging platforms and notification services. It translates LibreFang's internal message types into protocol-specific formats and handles the transmission, allowing the rest of the system to dispatch alerts and messages without knowing which platform will receive them.\n\n## Architecture\n\nThe crate is built around a channel-trait pattern. Each supported platform implements a common async interface, and features are used to compile in only the integrations you need.\n\n```\n┌──────────────────────────────┐\n│       librefang-types        │\n│   (shared message types)     │\n└──────────┬───────────────────┘\n           │\n           ▼\n┌──────────────────────────────┐\n│    librefang-channels        │\n│                              │\n│  ┌──────────┐  ┌──────────┐  │\n│  │ Telegram │  │ Discord  │  │\n│  └──────────┘  └──────────┘  │\n│  ┌──────────┐  ┌──────────┐  │\n│  │  Slack   │  │  Matrix  │  │\n│  └──────────┘  └──────────┘  │\n│         ...43 total...       │\n└──────────────────────────────┘\n```\n\nThe module depends on `librefang-types` for the shared message structures that flow through the system.\n\n## Supported Channels\n\nAll 43 channels and their feature flags:\n\n| Feature Flag | Platform | Extra Dependencies |\n|---|---|---|\n| `channel-telegram` | Telegram Bot API | — |\n| `channel-discord` | Discord Webhooks / Bot | — |\n| `channel-slack` | Slack Webhooks / API | — |\n| `channel-matrix` | Matrix (Element) | — |\n| `channel-email` | Email (SMTP/IMAP) | `lettre`, `imap`, `rustls-connector`, `mailparse` |\n| `channel-webhook` | Generic Webhooks | — |\n| `channel-whatsapp` | WhatsApp Business API | — |\n| `channel-signal` | Signal | — |\n| `channel-teams` | Microsoft Teams | — |\n| `channel-mattermost` | Mattermost | — |\n| `channel-irc` | IRC | — |\n| `channel-google-chat` | Google Chat | `rsa` |\n| `channel-twitch` | Twitch | — |\n| `channel-rocketchat` | Rocket.Chat | — |\n| `channel-zulip` | Zulip | — |\n| `channel-xmpp` | XMPP (Jabber) | — |\n| `channel-bluesky` | Bluesky (AT Protocol) | — |\n| `channel-feishu` | Feishu (Lark) | `aes`, `cbc` |\n| `channel-line` | LINE | — |\n| `channel-mastodon` | Mastodon | — |\n| `channel-messenger` | Facebook Messenger | — |\n| `channel-reddit` | Reddit | — |\n| `channel-revolt` | Revolt | — |\n| `channel-viber` | Viber | — |\n| `channel-voice` | Voice / TTS calls | — |\n| `channel-flock` | Flock | — |\n| `channel-guilded` | Guilded | — |\n| `channel-keybase` | Keybase | — |\n| `channel-nextcloud` | Nextcloud Talk | — |\n| `channel-nostr` | Nostr | `k256` |\n| `channel-pumble` | Pumble | — |\n| `channel-threema` | Threema | — |\n| `channel-twist` | Twist | — |\n| `channel-webex` | Cisco Webex | — |\n| `channel-dingtalk` | DingTalk | — |\n| `channel-discourse` | Discourse | — |\n| `channel-gitter` | Gitter | — |\n| `channel-gotify` | Gotify | — |\n| `channel-linkedin` | LinkedIn | — |\n| `channel-mumble` | Mumble | — |\n| `channel-ntfy` | ntfy.sh | — |\n| `channel-qq` | QQ | — |\n| `channel-wechat` | WeChat | — |\n| `channel-wecom` | WeCom (WeChat Work) | `aes`, `cbc`, `roxmltree` |\n| `channel-mqtt` | MQTT | `rumqttc` |\n\n**Note:** `channel-mqtt` is available under the `all-channels` feature but is **not** included in the `default` feature set.\n\n## Feature Flags\n\n### Default Behavior\n\nBy default, all channels except `channel-mqtt` are enabled. This means a bare dependency:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\" }\n```\n\ncompiles with 42 channels. If you only need a subset, disable default features and select explicitly:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", default-features = false, features = [\n    \"channel-telegram\",\n    \"channel-discord\",\n    \"channel-slack\",\n] }\n```\n\n### `all-channels`\n\nThe `all-channels` feature enables every channel including `channel-mqtt`. Use this when you want a complete build without listing each feature individually:\n\n```toml\n[dependencies]\nlibrefang-channels = { path = \"../librefang-channels\", default-features = false, features = [\"all-channels\"] }\n```\n\n### Channel-Specific Dependencies\n\nSix channels pull in additional crates when enabled. These are expressed as optional dependencies so they are only compiled when the corresponding feature is active:\n\n- **Email** — `lettre` (SMTP), `imap`, `rustls-connector`, `mailparse`\n- **Google Chat** — `rsa` (for service account JWT signing)\n- **Feishu** — `aes`, `cbc` (for encryption of event verification)\n- **WeCom** — `aes`, `cbc`, `roxmltree` (for message encryption and XML parsing)\n- **Nostr** — `k256` (for secp256k1 key handling)\n- **MQTT** — `rumqttc` (MQTT v5 client)\n\n## Core Dependencies\n\nThe crate relies on these shared workspace dependencies:\n\n| Crate | Role |\n|---|---|\n| `tokio` | Async runtime |\n| `reqwest` | HTTP client for REST-based channels |\n| `tokio-tungstenite` | WebSocket client for real-time channels |\n| `axum` | HTTP server for webhook receiver endpoints |\n| `serde` / `serde_json` | Serialization for API payloads |\n| `dashmap` | Concurrent channel state maps |\n| `async-trait` | Async trait definitions for channel interface |\n| `hmac` / `sha2` / `sha1` | Signature verification for webhook authenticity |\n| `tracing` | Structured logging |\n| `image` | Image processing (JPEG, PNG, WebP) |\n| `url` | URL parsing and construction |\n\n## Benchmarking\n\nA Criterion benchmark suite is configured under `benches/dispatch`. Run it with:\n\n```bash\ncargo bench -p librefang-channels\n```\n\nThis measures message dispatch throughput across the channel abstraction layer.\n\n## Adding a New Channel\n\nTo add a new messaging integration:\n\n1. **Add the feature flag** in `[features]`:\n   ```toml\n   channel-myplatform = []\n   ```\n   If the platform needs extra crates:\n   ```toml\n   channel-myplatform = [\"dep:some-crate\"]\n   ```\n\n2. **Add the feature to both lists** — append it to `default` and `all-channels`.\n\n3. **Add the optional dependency** (if any) under `[dependencies]`:\n   ```toml\n   some-crate = { workspace = true, optional = true }\n   ```\n\n4. **Implement the channel trait** in a new module under `src/`, gated by `#[cfg(feature = \"channel-myplatform\")]`.\n\n5. **Register the channel** in the dispatch/registry logic so it can be looked up at runtime.\n\n## Relationship to Other Modules\n\nThis crate sits between `librefang-types` (which defines the canonical message format) and the outside world. The core LibreFang engine or API layer calls into this module to send messages; it does not call back into other modules. This unidirectional dependency keeps the channel layer self-contained and testable in isolation.","other-librefang-cli-locales":"# Other — librefang-cli-locales\n\n# LibreFang CLI Locales\n\nLocalization resources for the `librefang-cli` crate, written in [Project Fluent](https://projectfluent.org/) (`.ftl`) format. This module is a static translation layer — no executable logic — consumed at runtime by the CLI to display user-facing messages in the user's preferred language.\n\n## Locale Inventory\n\n| Locale | Directory | Status |\n|--------|-----------|--------|\n| English (`en`) | `locales/en/main.ftl` | Source of truth |\n| Simplified Chinese (`zh-CN`) | `locales/zh-CN/main.ftl` | Complete translation |\n\nAll locales are single-file (`main.ftl`). Additional locales follow the same `locales/<BCP47-tag>/main.ftl` convention.\n\n## Message Format\n\nMessages use Fluent syntax with variable interpolation:\n\n```fluent\n# Simple string\ndaemon-stopped = LibreFang daemon stopped.\n\n# String with positional variable\nkernel-booted = Kernel booted ({ $provider }/{ $model })\n\n# Pluralization-ready count\nagents-loaded = { $count } agent(s) loaded\n```\n\n**Naming convention:** `category-description` or `category-description-fix`.\n\n- `*-fix` variants are remediation hints shown alongside the primary error (e.g., `error-boot-config` + `error-boot-config-fix`).\n- `section-*` messages are UI section headers.\n- `hint-*` messages are contextual guidance shown after an action.\n- `label-*` messages are short field labels for status tables.\n- `warn-*` messages flag configuration problems.\n- `value-*` messages provide human-readable descriptions for security features.\n\n## Message Categories\n\nThe ~250 messages in each locale file are organized into the following groups:\n\n### Daemon Lifecycle\nStartup, shutdown, background launch, health waits, and restart flows. Key messages: `daemon-starting`, `daemon-started-bg`, `daemon-bg-exited`, `daemon-restarting`.\n\n### Error Hierarchy\nThree tiers of errors, each with an accompanying `*-fix` message:\n\n| Tier | Prefix | Example |\n|------|--------|---------|\n| General | `error-*` | `error-write-config` |\n| Daemon communication | `error-daemon-*`, `error-request-*`, `error-connect-*` | `error-daemon-returned` |\n| Boot failures | `error-boot-*` | `error-boot-auth` |\n\nA `*-fix` companion always follows its parent error, providing an actionable command or diagnostic step.\n\n### Agent Management\nSpawn, kill, model assignment, and template resolution: `agent-spawned`, `agent-template-not-found`, `agent-killed`.\n\n### Configuration\nRead/write validation, key management, and `.env` operations: `config-set-success`, `config-parse-error`, `config-saved-key`.\n\n### Channel Setup\nProvider-specific onboarding for Telegram, Discord, Slack, WhatsApp, Email, Signal, and Matrix: `section-setup-telegram`, `channel-configured`, `channel-test-ok`.\n\n### Infrastructure Features\n- **Vault** — credential storage: `
