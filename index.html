isted connection preference |\n| `~/.librefang/workspaces/agents/{name}/agent.toml` | Agent manifests (created on import) |\n| `~/.librefang/skills/` | Skill files directory (created on import) |\n| `~/.librefang/logs/` | Application logs |\n\n---\n\n## Dependencies on Other Modules\n\n| Module | Usage |\n|--------|-------|\n| `librefang_kernel` | `LibreFangKernel::boot()`, agent registry, skill reload, event bus, shutdown |\n| `librefang_api` | `build_router()` for the embedded axum server, `sync_dashboard()` for WebUI assets |\n| `librefang_types` | `Event`, `EventPayload`, `LifecycleEvent`, `SystemEvent`, `AgentManifest` |\n| `librefang_extensions::dotenv` | `load_dotenv()` for environment loading at startup |","extensions-hands-librefang-extensions-src":"# Extensions & Hands — librefang-extensions-src\n\n# LibreFang Extensions (`librefang-extensions`)\n\nThe extensions crate is the infrastructure layer that sits between LibreFang's configuration system and the outside world. It handles everything related to MCP server templates, credential storage, environment variable loading, and runtime health tracking.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Startup\"\n        A[load_dotenv] --> B[vault.enc]\n        A --> C[\".env\"]\n        A --> D[secrets.env]\n    end\n\n    subgraph \"Catalog & Install\"\n        E[McpCatalog] -->|reads| F[\"~/.librefang/mcp/catalog/*.toml\"]\n        G[install_integration] --> E\n        G --> H[CredentialResolver]\n        G --> I[McpServerConfigEntry]\n    end\n\n    subgraph \"Runtime\"\n        J[HealthMonitor] -->|tracks| K[McpHealth]\n    end\n\n    A -->|populates env| H\n    I -->|written to| L[\"config.toml [[mcp_servers]]\"]\n    J -->|wired by| M[kernel]\n```\n\n## Module Layout\n\n| Module | Visibility | Purpose |\n|--------|-----------|---------|\n| `catalog` | `pub` | In-memory index of MCP server templates loaded from disk |\n| `credentials` | `pub` | Resolves secrets from env, vault, or keyring |\n| `dotenv` | `pub` | Loads `.env`/`secrets.env`/vault into process environment |\n| `health` | `pub` | Tracks MCP server health with auto-reconnect backoff |\n| `installer` | `pub` | Pure transform: catalog entry → `McpServerConfigEntry` |\n| `oauth` | `pub` | OAuth2 PKCE localhost callback flows |\n| `vault` | `pub` | AES-256-GCM encrypted credential storage |\n| `http_client` | `pub(crate)` | Shared HTTP client internals |\n\n## Core Types\n\n### `McpCatalogEntry`\n\nThe central data structure. Each TOML file in the catalog directory deserializes into one of these. Key fields:\n\n- **`id`** — unique slug like `\"github\"`, `\"slack\"`\n- **`transport`** — how to launch the server (`Stdio`, `Sse`, or `Http` via `McpCatalogTransport`)\n- **`required_env`** — list of `McpCatalogRequiredEnv` structs declaring what credentials the server needs\n- **`oauth`** — optional `OAuthTemplate` for providers that use OAuth2 instead of API keys\n- **`health_check`** — `HealthCheckConfig` with `interval_secs` and `unhealthy_threshold`\n- **`template_id`** — on the *installed* `McpServerConfigEntry`, this field records which catalog entry it came from\n\nThe catalog transport enum (`McpCatalogTransport`) intentionally omits the `HttpCompat` variant that exists on `McpTransportEntry` in `librefang_types`. `HttpCompat` is a power-user transport that doesn't ship as a template.\n\n### `McpStatus`\n\nThe lifecycle states an MCP server can be in:\n\n| State | Meaning |\n|-------|---------|\n| `Ready` | Configured, credentials present, server running |\n| `Setup` | Configured but credentials are missing |\n| `Available` | Exists in catalog only — not yet installed |\n| `Error(String)` | Server errored |\n| `Disabled` | User disabled it |\n\n### `ExtensionError`\n\nAll fallible operations return `ExtensionResult<T>` which is `Result<T, ExtensionError>`. Variants cover catalog lookups (`NotFound`, `AlreadyInstalled`, `NotInstalled`), credential issues (`CredentialNotFound`, `VaultLocked`), I/O, HTTP, TOML parsing, and health checks.\n\n## MCP Catalog (`catalog`)\n\n`McpCatalog` is the read-only index of all template TOML files under `~/.librefang/mcp/catalog/`. It's refreshed from the upstream registry by `librefang_runtime::registry_sync` — this crate never writes to the catalog directory.\n\n### Directory layout\n\nTwo layouts are supported:\n\n```\ncatalog/\n  github.toml          # (A) flat file — id from filename\n  slack/\n    MCP.toml           # (B) directory-backed — id from directory name\n```\n\n### Loading\n\n```rust\nlet mut catalog = McpCatalog::new(&home_dir);\nlet count = catalog.load(&home_dir);\n```\n\n`load()` performs a full reload — it clears the internal `HashMap` first so deleted files don't linger. It returns the count of entries loaded.\n\n### Querying\n\n- **`get(id)`** — look up a single entry by ID\n- **`list()`** — all entries sorted by ID\n- **`list_by_category(&McpCategory)`** — filter by category\n- **`search(query)`** — case-insensitive search across `id`, `name`, `description`, and `tags`\n\n## Installer (`installer`)\n\nThe installer is a **pure transform** — it has no side effects on disk. Callers (the CLI's `cmd_mcp_add`, the API's `install_extension` and `add_mcp_server`) decide when to persist the results.\n\n### `install_integration`\n\n```rust\npub fn install_integration(\n    catalog: &McpCatalog,\n    resolver: &mut CredentialResolver,\n    id: &str,\n    provided_keys: &HashMap<String, String>,\n) -> ExtensionResult<InstallResult>\n```\n\nThe flow:\n\n1. Look up the catalog template by `id`\n2. Store any `provided_keys` into the vault (best-effort — failures are logged but don't block installation)\n3. Check which `required_env` vars still have no credential (checking both vault and process environment)\n4. Convert the template into a `McpServerConfigEntry` via `catalog_entry_to_mcp_server`\n5. Return an `InstallResult` with the final `McpStatus` (`Ready` if all creds present, `Setup` if missing) and a user-facing message\n\nThe returned `InstallResult` contains:\n- `server` — the `McpServerConfigEntry` to persist in `config.toml`\n- `status` — current readiness\n- `missing_credentials` — env var names still needed\n- `message` — human-readable summary\n\n### Transport mapping\n\n`catalog_entry_to_mcp_server` converts `McpCatalogTransport` to `McpTransportEntry` one-to-one (Stdio→Stdio, Sse→Sse, Http→Http). The resulting config entry gets `template_id` set so the dashboard can trace it back to the catalog.\n\n### Scaffolding\n\nTwo helper functions generate template files for users creating custom integrations:\n\n- **`scaffold_integration(dir)`** — writes a `mcp.toml` template into the given directory\n- **`scaffold_skill(dir)`** — writes `skill.toml` + `SKILL.md` for a new prompt-only skill\n\nThese are called from the CLI's `cmd_scaffold`.\n\n## Health Monitor (`health`)\n\n`HealthMonitor` tracks the runtime status of all configured MCP servers using a `DashMap<String, McpHealth>` for lock-free concurrent access from background tasks.\n\n### `McpHealth`\n\nPer-server record with:\n- `status`, `tool_count`, `last_ok`, `last_error`\n- `consecutive_failures` — reset to 0 on success\n- `reconnecting`, `reconnect_attempts` — set during auto-reconnect\n- `connected_since` — timestamp of last successful connect\n\nState transitions happen through methods:\n- `mark_ok(tool_count)` — sets `Ready`, clears failures, sets `connected_since` on first success\n- `mark_error(error)` — sets `Error(error)`, increments `consecutive_failures`, clears `connected_since`\n- `mark_reconnecting()` — sets `reconnecting = true`, increments `reconnect_attempts`\n\n### Auto-reconnect backoff\n\nThe exponential backoff formula:\n\n```\nbackoff = 5 * 2^attempt seconds, capped at max_backoff_secs (default 300s)\n```\n\n| Attempt | Delay |\n|---------|-------|\n| 0 | 5s |\n| 1 | 10s |\n| 2 | 20s |\n| 3 | 40s |\n| ... | ... |\n| 6+ | 300s (capped) |\n\nReconnection is attempted up to `max_reconnect_attempts` (default 10). After that, `should_reconnect()` returns `false` and the server stays in `Error` until manually restarted.\n\n### `HealthMonitorConfig`\n\n| Field | Default | Description |\n|-------|---------|-------------|\n| `auto_reconnect` | `true` | Enable automatic reconnection |\n| `max_reconnect_attempts` | `10` | Give up after this many attempts |\n| `max_backoff_secs` | `300` | Cap on exponential backoff |\n| `check_interval_secs` | `60` | Base health check interval |\n\n## Dotenv (`dotenv`)\n\nLoads secrets into the process environment at startup. Called from `main()` in both `librefang-cli` and `librefang-desktop` **before** spawning the tokio runtime, because `std::env::set_var` is undefined behavior once other threads exist (Rust 1.80+).\n\n### Priority order (highest to lowest)\n\n1. System environment variables (already present in `std::env`) — **never overridden**\n2. Credential vault (`vault.enc`) secrets\n3. `~/.librefang/.env`\n4. `~/.librefang/secrets.env`\n\n### `load_dotenv()`\n\nIdempotent — gated by `Once` so repeated calls are no-ops. The sequence:\n\n1. Try to unlock `~/.librefang/vault.enc` and inject its keys into the process environment\n2. Parse `~/.librefang/.env` (skipping comments and blank lines)\n3. Parse `~/.librefang/secrets.env`\n\nAt each step, keys that already exist in the environment are left untouched.\n\n### File management functions\n\n- **`save_env_key(key, value)`** — upsert into `.env`, set 0600 permissions on Unix, also sets in current process\n- **`remove_env_key(key)`** — remove from `.env` and from process env\n- **`list_env_keys()`** — list key names (without values) from `.env`\n\nThe `.env` file format supports `KEY=VALUE`, `KEY=\"quoted value\"`, and `KEY='single quoted'`. Lines starting with `#` are comments.\n\n## Integration Points\n\n### From the CLI\n\nThe CLI calls into extensions at several points:\n- `main()` → `load_dotenv()` at startup\n- `cmd_mcp_catalog` → `McpCatalog::load()` + `list()` / `search()`\n- `cmd_mcp_add` → `McpCatalog::get()` + `install_integration()`\n- `cmd_scaffold` → `scaffold_integration()` / `scaffold_skill()`\n- `cmd_config_set_key` / `cmd_config_delete_key` → `save_env_key()` / `remove_env_key()`\n- `cmd_channel_setup` → `save_env_key()`\n- `cmd_doctor` → `McpCatalog::load()`\n\n### From the API / Web UI\n\n- `install_extension` / `add_mcp_server` → `McpCatalog::load()` + `install_integration()`\n- `list_extensions` / `get_extension` / `status_str_for_catalog` → `HealthMonitor::get_health()`\n\n### From the Desktop App\n\n- `main()` → `load_dotenv()` at startup\n\n### From the TUI\n\n- `submit_key` (free provider guide) → `save_env_key()`\n- `run` (init wizard) → `save_env_key()`\n\n## Adding a New Catalog Entry\n\nTo add a new MCP server template, create a TOML file at `~/.librefang/mcp/catalog/<id>.toml`:\n\n```toml\nid = \"my-service\"\nname = \"My Service\"\ndescription = \"Integration with My Service\"\ncategory = \"devtools\"       # devtools, productivity, communication, data, cloud, ai\nicon = \"🔧\"\ntags = [\"example\", \"custom\"]\n\n[transport]\ntype = \"stdio\"              # stdio, sse, or http\ncommand = \"npx\"\nargs = [\"-y\", \"my-service-mcp\"]\n\n[[required_env]]\nname = \"MY_SERVICE_API_KEY\"\nlabel = \"API Key\"\nhelp = \"Get your key at https://my.service/settings/api-keys\"\nis_secret = true\nget_url = \"https://my.service/settings/api-keys\"\n\n[health_check]\ninterval_secs = 60\nunhealthy_threshold = 3\n\nsetup_instructions = \"\"\"\n1. Sign up at https://my.service\n2. Generate an API key\n3. Run: librefang mcp add my-service --key=<your-key>\n\"\"\"\n```\n\nFor OAuth-based integrations, add an `[oauth]` section with `provider`, `scopes`, `auth_url`, and `token_url`.","extensions-hands-librefang-hands-src":"# Extensions & Hands — librefang-hands-src\n\n# LibreFang Hands — Autonomous Capability Packages\n\n## Overview\n\nA **Hand** is a pre-built, domain-complete autonomous agent configuration that users activate from a marketplace. Unlike regular agents (which users chat with interactively), Hands work autonomously — users check in on them periodically.\n\nThis crate provides:\n- **Type definitions** for hand definitions, instances, requirements, settings, and i18n\n- **TOML parsing** with legacy format fallback and agent template inheritance\n- **A concurrent-safe registry** (`HandRegistry`) that manages definitions and tracks active instances\n- **Requirement checking** (binaries on PATH, environment variables, API keys)\n- **State persistence** across daemon restarts\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"HAND.toml (disk)\"\n        HT[HAND.toml]\n        SKILL[SKILL.md]\n        ASKILL[SKILL-{role}.md]\n        BASE[agents/{template}/agent.toml]\n    end\n\n    subgraph \"Core Types (lib.rs)\"\n        HD[HandDefinition]\n        HAM[HandAgentManifest]\n        HS[HandSetting]\n        HR[HandRequirement]\n        HI[HandInstance]\n    end\n\n    subgraph \"Registry (registry.rs)\"\n        REG[HandRegistry]\n        DEFS[definitions: DashMap]\n        INST[instances: DashMap]\n        AIDX[agent_index: DashMap]\n        RIDX[active_index: DashMap]\n    end\n\n    HT -->|parse| HD\n    SKILL -->|attach| HD\n    ASKILL -->|attach per-role| HD\n    BASE -->|deep merge| HAM\n    HAM -->|keyed by role| HD\n    HD -->|register| DEFS\n    DEFS -->|activate| INST\n    INST -->|reverse lookup| AIDX\n    INST -->|hand_id → instance| RIDX\n```\n\n## Key Types\n\n### `HandDefinition`\n\nThe complete specification of a hand, parsed from a `HAND.toml` file. Lives in the registry's `definitions` map.\n\nSupports two agent layout formats:\n\n| Format | TOML | Use case |\n|--------|------|----------|\n| **Single-agent** | `[agent]` section | Auto-converted to `agents: {\"main\": ...}` with `coordinator: true` |\n| **Multi-agent** | `[agents.planner]`, `[agents.analyst]` | Each role gets its own `HandAgentManifest` |\n\nThe **coordinator** is the agent that receives user messages. Determined by:\n1. An agent with `coordinator = true` explicitly set\n2. Fallback: first agent by role name (BTreeMap ordering)\n\n```rust\nlet def: HandDefinition = toml::from_str(toml_str)?;\nlet (role, agent) = def.coordinator().unwrap(); // (\"main\", &HandAgentManifest)\nlet manifest = def.agent().unwrap(); // shortcut to coordinator's AgentManifest\n```\n\n### `HandInstance`\n\nA runtime record linking a `HandDefinition` to its spawned agents. Tracks status, config overrides, timestamps, and agent ID mappings.\n\n```rust\nlet instance = HandInstance::new(\"clip\", user_config, None);\nlet coord_id = instance.coordinator_agent_id(); // AgentId of coordinator\n```\n\nInstances support explicit UUID assignment (for daemon restart recovery) and timestamp preservation.\n\n### `HandRequirement`\n\nA prerequisite the user must satisfy before activating a hand. Types:\n\n- `Binary` — a binary must exist on PATH\n- `EnvVar` — an environment variable must be set\n- `ApiKey` — an API key env var must be set\n- `AnyEnvVar` — any one of several comma-separated env vars\n\nRequirements can be marked `optional: true`. Optional requirements don't block activation, but an active hand with unmet optional requirements reports **degraded** status.\n\n### `HandSetting`\n\nA configurable control shown in the activation modal. Three types:\n\n| Type | Behavior |\n|------|----------|\n| `Select` | Choose from `options` list; matched option's `provider_env` is collected |\n| `Toggle` | Boolean on/off |\n| `Text` | Freeform text; `env_var` field exposes it to the agent's subprocess |\n\nSettings are resolved against user config via `resolve_settings()`, which produces:\n- A `prompt_block` (markdown appended to the system prompt)\n- A list of `env_vars` the agent subprocess needs\n\n## TOML Parsing Pipeline\n\n### Format Detection\n\nThe parser handles two TOML layouts:\n\n1. **Flat format**: all fields at the document root\n2. **Wrapped format**: fields under a `[hand]` section\n\nThe parser tries flat first, falls back to wrapped:\n\n```\nparse_hand_toml() → try flat → fail → extract [hand] sub-table → retry\n```\n\n### Legacy Agent Format\n\nOlder `HAND.toml` files place model fields (`provider`, `model`, `system_prompt`, `max_tokens`, `temperature`, `api_key_env`, `base_url`) at the top level of `[agent]`. The parser detects this via the presence of a `model` sub-table and auto-converts through `LegacyHandAgentConfig` → `AgentManifest`.\n\nWhen `base` template resolution is active, `normalize_flat_to_nested()` restructures flat fields into a `[model]` sub-table before deep-merging, preventing orphaned fields.\n\n### Base Template Inheritance\n\nAgents in `[agents.*]` sections can reference a shared template via `base = \"template-name\"`:\n\n```toml\n[agents.writer]\ncoordinator = true\nbase = \"my-writer\"\n\n[agents.writer.model]\nsystem_prompt = \"Override: you are a blog writer.\"\n```\n\nResolution flow:\n1. Load `{agents_dir}/{template_name}/agent.toml`\n2. `normalize_flat_to_nested()` on the base template\n3. `deep_merge_toml()` — overlay fields win, base fields preserved\n4. Parse the merged result as `AgentManifest`\n\nTemplate names are validated to prevent path traversal (no `/`, `\\`, or `..`).\n\n### Deep Merge Semantics\n\n`deep_merge_toml(base, overlay)`:\n- **Tables**: merged recursively\n- **Scalars/arrays in overlay**: replace base values entirely\n- **Keys only in base**: preserved\n- **Keys only in overlay**: added\n\n## HandRegistry\n\nThe central runtime store, built on `DashMap` for lock-free concurrent reads. All fields are `Send + Sync`.\n\n### Internal Indexes\n\n| Index | Key → Value | Purpose |\n|-------|------------|---------|\n| `definitions` | `hand_id` → `HandDefinition` | All known hand specs |\n| `instances` | `instance_id` (Uuid) → `HandInstance` | All live instances |\n| `agent_index` | `agent_id` (string) → `instance_id` | O(1) agent-to-hand lookup |\n| `active_index` | `hand_id` → `instance_id` | O(1) \"is hand active?\" check |\n\n### Activation Serialization\n\nA `Mutex` (`activate_lock`) serializes the check-then-insert sequence to prevent two concurrent requests from both passing the \"already active\" guard.\n\nWhen `instance_id` is `Some` (daemon restart recovery), the duplicate-active check is bypassed — the explicit UUID is treated as a multi-instance request.\n\n### Instance Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Active: activate()\n    Active --> Paused: pause()\n    Paused --> Active: resume()\n    Active --> Error: set_error()\n    Paused --> Error: set_error()\n    Error --> Active: resume()\n    Active --> Inactive: deactivate()\n    Paused --> Inactive: deactivate()\n    Inactive --> [*]\n```\n\n### Install Methods\n\n| Method | Source | Disk persistence | Base templates |\n|--------|--------|-----------------|----------------|\n| `reload_from_disk()` | Scans `registry/hands/` + `workspaces/` | No (reads existing) | ✅ Resolved |\n| `install_from_path()` | Directory with `HAND.tomL` | No (in-memory only) | ✅ Resolved |\n| `install_from_content()` | Raw TOML + skill strings | No (in-memory only) | ❌ Rejected |\n| `install_from_content_persisted()` | Raw TOML + skill strings | Yes (`workspaces/{id}/`) | ✅ Resolved |\n\n`install_from_content()` rejects hands with `base` references because it has no filesystem access for template resolution. Use the persisted variant or `install_from_path()` instead.\n\n### Uninstall Guards\n\n`uninstall_hand()` refuses in three cases:\n\n1. **`NotFound`** — hand ID not in registry\n2. **`BuiltinHand`** — hand lives under `registry/hands/` (would be recreated on next sync). Detected by the absence of `workspaces/{id}/HAND.toml`.\n3. **`AlreadyActive`** — hand has live instances. Deactivate first.\n\n### State Persistence\n\n`persist_state()` writes Active, Paused, and Error instances to `hand_state.json`. `load_state()` reads them back, handling four format versions:\n\n| Version | Format | Notes |\n|---------|--------|-------|\n| v1 | Bare JSON array | `agent_id` as single value → converted to `{\"main\": id}` |\n| v2 | `{\"version\": 2, \"instances\": [...]}` | Same single `agent_id` |\n| v3 | `{\"version\": 3, \"instances\": [...]}` | `agent_ids` as map, `instance_id` added |\n| v4 (current) | `{\"version\": 4, \"instances\": [...]}` | Full `PersistedInstance` with `activated_at`, `updated_at`, `coordinator_role` |\n\nErrored and Inactive instances from persisted state are skipped during load (logged but not restored).\n\n### Readiness\n\n`readiness()` computes a `HandReadiness` snapshot:\n\n- **`requirements_met`**: all *non-optional* requirements satisfied\n- **`active`**: at least one Active-status instance exists\n- **`degraded`**: active but any requirement (including optional) is unmet\n\n```rust\nlet readiness = registry.readiness(\"browser\");\n// HandReadiness { requirements_met: false, active: true, degraded: true }\n```\n\n## Requirement Checking\n\n### Binary Detection\n\n`which_binary()` scans PATH segments, checking for the file with platform-appropriate extensions (`.exe`, `.cmd`, `.bat` on Windows). On Unix, verifies the execute bit. Empty PATH segments are treated as the current directory (POSIX convention).\n\nSpecial cases:\n- **`python3`**: runs `python3 --version` / `python --version` and checks for \"Python 3\" in output. Results are cached via `OnceLock` for the process lifetime. This avoids false positives from Windows Store shims.\n- **`chromium`**: falls back to `chromium-browser`, `google-chrome`, `google-chrome-stable`, `chrome`, and `CHROME_PATH` env var.\n\n### Environment Variable Aliases\n\n`env_aliases()` maps known aliases for requirement checking. Currently supports `GEMINI_API_KEY` also accepting `GOOGLE_API_KEY`.\n\n### Settings Availability\n\n`check_settings_availability()` returns per-option availability based on:\n- `provider_env` (with alias expansion) being set and non-empty\n- `binary` being found on PATH\n- Neither set → always available\n\n## I18n\n\nHands support optional localized strings keyed by language code:\n\n```toml\n[i18n.zh]\nname = \"线索生成\"\ndescription = \"自主线索生成\"\n\n[i18n.zh.agents.main]\nname = \"主协调器\"\n\n[i18n.zh.settings.target_industry]\nlabel = \"目标行业\"\ndescription = \"聚焦的行业领域\"\n```\n\nAll i18n fields are optional — missing translations fall back to English defaults. `check_settings_availability()` accepts a `lang` parameter and returns translated labels/descriptions when available.\n\n## Default Provider/Model Sentinel\n\nWhen a `HAND.toml` omits `provider` or `model`, the defaults are the string `\"default\"` — not a concrete provider name. The kernel resolves this sentinel to the user's configured `default_model.provider` at driver-build time. This ensures hands respect global user configuration rather than being pinned to whatever the hand author specified.\n\n## File Layout\n\nA hand on disk consists of:\n\n```\nworkspaces/{hand_id}/\n├── HAND.toml              # Required: hand definition\n├── SKILL.md               # Optional: shared skill content (all agents)\n├── SKILL-{role}.md        # Optional: per-agent skill override\n└── ...\n```\n\nRegistry hands live under `registry/hands/{id}/` with the same structure. Both locations are scanned on `reload_from_disk()`, with registry entries taking precedence on ID collisions.","extensions-hands-librefang-runtime-mcp-src":"# Extensions & Hands — librefang-runtime-mcp-src\n\n# librefang-runtime-mcp — MCP Client\n\n## Purpose\n\nThis crate implements the Model Context Protocol (MCP) client layer. It connects to external MCP servers, discovers the tools they expose, and executes tool calls on behalf of the agent runtime — all behind a security envelope that taint-scans outbound arguments and sandboxes subprocess environments.\n\nEvery tool discovered from an MCP server is namespaced as `mcp_{server}_{tool}` so tools from different servers never collide in the agent's tool table.\n\n## Architecture\n\n```mermaid\ngraph TD\n    TR[tool_runner::execute_tool_raw] -->|call_tool| MC[McpConnection]\n    TR -->|is_mcp_tool / resolve_mcp_server_from_known| NS[Namespace Helpers]\n    MC -->|Stdio| RM[rmcp SDK]\n    MC -->|SSE| HTTP[reqwest JSON-RPC]\n    MC -->|Http| RM\n    MC -->|HttpCompat| HTTP\n    MC -->|before every call| TS[scan_mcp_arguments_for_taint]\n    MC -->|on 401| OA[mcp_oauth]\n```\n\n## Transport Types\n\n`McpTransport` is a tagged enum with four variants:\n\n| Variant | Protocol | Handshake | Tool Discovery |\n|---|---|---|---|\n| `Stdio` | Subprocess stdin/stdout via rmcp SDK | rmcp automatic | `client.list_all_tools()` |\n| `Sse` | HTTP POST + JSON-RPC 2.0 | Manual `initialize` / `notifications/initialized` | Manual `tools/list` |\n| `Http` | Streamable HTTP (MCP 2025-03-26+) via rmcp SDK | rmcp automatic | `client.list_all_tools()` |\n| `HttpCompat` | Plain HTTP adapter (GET/POST/PUT/PATCH/DELETE) | Probe GET on base URL | Statically declared in config |\n\n**Stdio** and **Http** both use the `rmcp` SDK and share the same `DynRmcpClient` inner type. **Sse** manages JSON-RPC itself with a `reqwest::Client`. **HttpCompat** is a built-in adapter that translates tool calls into plain HTTP requests against a configurable backend.\n\n## Connection Lifecycle\n\n`McpConnection::connect(config)` is the single entry point. It:\n\n1. Dispatches to the transport-specific `connect_*` method.\n2. Performs SSRF validation on any URL-based transport (`check_ssrf`).\n3. Completes the MCP handshake and discovers tools.\n4. Registers every discovered tool under its namespaced name via `register_tool`.\n5. Returns a fully initialized `McpConnection`.\n\nFor **Streamable HTTP**, if the server responds with a 401 and has OAuth metadata, the connection returns the sentinel error `\"OAUTH_NEEDS_AUTH\"`. The API layer then drives the PKCE flow before retrying.\n\n## Security\n\n### Outbound Taint Scanning\n\nBefore every `call_tool`, the arguments tree is walked by `scan_mcp_arguments_for_taint`. This is a best-effort pattern-matching filter — not a full information-flow tracker.\n\nThe scanner runs two checks on every leaf:\n\n1. **Value heuristic** — `check_outbound_text_violation` from `librefang_types::taint` tests each string leaf against the denylist for credential/PII patterns.\n2. **Key-name blocklist** — `MCP_SENSITIVE_KEY_NAMES` lists object keys (`authorization`, `api_key`, `secret`, `password`, etc.) that are treated as credential-shaped regardless of the value's appearance. This catches patterns like `{\"Authorization\": \"Bearer sk-…\"}` that the text heuristic alone would miss.\n\nViolations produce a redacted error containing only the JSON path — never the offending payload itself, since the error flows back to the LLM and into logs.\n\nRecursion is hard-capped at `MCP_TAINT_SCAN_MAX_DEPTH` (64).\n\n`McpServerConfig::taint_scanning` can be set to `false` to disable the value heuristic for trusted local servers (browser automation, database adapters). Key-name blocking remains active regardless.\n\n### Subprocess Sandboxing (Stdio)\n\n- **No shell interpreters** — the command is checked against `BLOCKED_SHELLS` (bash, sh, zsh, powershell, etc.). MCP servers must use a specific runtime (`npx`, `node`, `python`).\n- **No path traversal** — commands containing `..` are rejected.\n- **Minimal environment** — the subprocess does not inherit the parent environment. Only variables in `SAFE_ENV_VARS` (PATH, HOME, language/runtime essentials) plus explicitly declared `env` entries from config are passed through.\n- **Environment expansion** — `$VAR` and `${VAR}` references in args are expanded via `expand_env_vars` so templates can reference `$HOME` without needing a shell wrapper.\n\n### SSRF Protection\n\n`check_ssrf` rejects URLs targeting cloud metadata endpoints (`169.254.169.254`, `metadata.google`).\n\n## Tool Namespacing\n\nAll MCP tools are prefixed to prevent collisions across servers:\n\n```\nserver \"github\", tool \"create_issue\" → \"mcp_github_create_issue\"\nserver \"my-server\", tool \"do_thing\"  → \"mcp_my_server_do_thing\"\n```\n\nKey functions:\n\n- **`format_mcp_tool_name(server, tool)`** — produces the namespaced name. Hyphens in server/tool names are replaced with underscores.\n- **`is_mcp_tool(name)`** — checks for the `mcp_` prefix.\n- **`resolve_mcp_server_from_known(tool_name, server_names)`** — given a namespaced tool name and the set of configured server names, returns the matching server. This is the robust variant that handles multi-segment server names correctly by preferring the longest prefix match.\n- **`extract_mcp_server(tool_name)`** — lightweight heuristic that splits on the first underscore after `mcp_`. Only reliable for single-word server names.\n\n`call_tool` accepts either the namespaced name or the raw tool name (it tries `original_names` lookup first, then strips the prefix).\n\n## HttpCompat Adapter\n\nThe `HttpCompat` transport adapts non-MCP HTTP backends into the tool interface. It is configured declaratively:\n\n- **`tools`** — each tool declares a `path` (with `{param}` placeholders), HTTP `method`, `request_mode` (json body / query / none), and `response_mode` (text / json).\n- **`headers`** — static values or values loaded from environment variables (`value_env`).\n- **Path rendering** — `{param}` placeholders in the tool path are substituted from arguments and percent-encoded via `encode_http_compat_path_value`. Used parameters are removed from the remaining arguments.\n- **Config validation** — `validate_http_compat_config` runs at connect time to catch empty names, missing paths, and headers with neither `value` nor `value_env`.\n\n## OAuth\n\nThe `mcp_oauth` submodule handles OAuth 2.0 + PKCE for Streamable HTTP servers that require authentication. When `connect_streamable_http` hits a 401, it:\n\n1. Extracts the `WWW-Authenticate` header from the rmcp error chain via `extract_auth_header_from_error`.\n2. Calls `discover_oauth_metadata` for three-tier resolution (WWW-Authenticate → `.well-known` → config fallback).\n3. Returns `\"OAUTH_NEEDS_AUTH\"` to signal the API layer to drive the browser-based PKCE flow.\n\nCached tokens are injected as `Authorization: Bearer` headers on subsequent connections via the `oauth_provider`'s `load_token` method.\n\n## Key Types Reference\n\n| Type | Role |\n|---|---|\n| `McpServerConfig` | Connection configuration (name, transport, timeout, env, headers, taint_scanning, oauth) |\n| `McpTransport` | Tagged enum: `Stdio`, `Sse`, `Http`, `HttpCompat` |\n| `McpConnection` | Active connection — holds config, discovered tools, namespace map, and transport handle |\n| `McpInner` | Private enum wrapping the transport-specific handle (`DynRmcpClient` or `reqwest::Client`) |\n| `JsonRpcRequest` / `JsonRpcResponse` | JSON-RPC 2.0 types used only by the SSE transport |\n\n## Integration Points\n\nThe runtime calls into this crate from `librefang-runtime/src/tool_runner.rs`:\n\n- **`execute_tool_raw`** calls `is_mcp_tool` to decide if a tool name belongs to an MCP server, then `resolve_mcp_server_from_known` to find the right `McpConnection`, then `call_tool` to execute it.\n\nRoute handlers (`src/routes/agents.rs`) and the TUI event loop (`src/tui/event.rs`) also call `resolve_mcp_server_from_known` when mapping tool names to servers.","extensions-hands":"# Extensions & Hands\n\n# Extensions & Hands\n\nThis module group provides LibreFang's **external integration layer** — the infrastructure for connecting to outside services, managing credentials, and running autonomous agents.\n\n## Sub-modules\n\n| Crate | Role |\n|---|---|\n| [LibreFang Extensions](librefang-extensions-src.md) | Infrastructure: environment loading, encrypted vault, MCP server catalog, credential resolution, health monitoring |\n| [LibreFang Hands](librefang-hands-src.md) | Autonomous capability packages: hand definitions, marketplace registry, requirement checking, instance lifecycle and state persistence |\n| [LibreFang Runtime MCP](librefang-runtime-mcp-src.md) | MCP client: connects to external MCP servers, discovers tools, executes calls with taint-scanning and sandboxed subprocesses |\n\n## How they fit together\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                    CLI / Daemon startup                  │\n│  load_dotenv → load_vault → unlock → resolve_master_key │\n│                  (librefang-extensions)                  │\n└──────────────────────┬──────────────────────────────────┘\n                       │\n          ┌────────────┼────────────────┐\n          ▼            ▼                ▼\n   CredentialResolver  McpCatalog   HealthMonitor\n   (extensions)        (extensions)  (extensions)\n          │            │\n          ▼            ▼\n   ┌──────────────────────────┐     ┌─────────────────────────┐\n   │     HandRegistry         │     │    McpConnection         │\n   │  (librefang-hands)       │     │  (librefang-runtime-mcp) │\n   │  • install / activate    │────▶│  • tool discovery        │\n   │  • check_requirements    │     │  • namespaced execution  │\n   │  • persist state         │     │  • taint scanning        │\n   └──────────────────────────┘     └─────────────────────────┘\n```\n\nExtensions sits at the bottom and owns everything the system needs *before* it can interact with the outside world: decrypting credentials from `vault.enc`, loading `.env` / `secrets.env`, and maintaining the MCP server catalog at `~/.librefang/mcp/catalog/*.toml`.\n\nHands consume that infrastructure. When a hand is activated from the marketplace, the `HandRegistry` checks its requirements (binaries on `PATH`, env vars, API keys) using credentials resolved by extensions, then spawns autonomous agent instances that persist across daemon restarts.\n\nRuntime MCP is the execution bridge. When a hand (or any agent) needs to call an external tool, the MCP client connects to the relevant server via Stdio or SSE, discovers available tools under the `mcp_{server}_{tool}` namespace, and executes calls within a security envelope.\n\n## Key cross-module workflows\n\n**Startup bootstrap** — The CLI calls `load_dotenv` → `load_vault` → `unlock` → `resolve_master_key` in extensions to decrypt credentials before anything else runs. See [Extensions — Architecture Overview](librefang-extensions-src.md#architecture-overview).\n\n**Hand activation** — A route calls `get_hand` → `readiness` → `check_requirements`, which walks each requirement (e.g., `check_python3_available` → `run_returns_python3`) to confirm the environment supports the hand. See [Hands — Registry](librefang-hands-src.md).\n\n**MCP tool execution** — `tool_runner::execute_tool_raw` resolves the target server via namespace helpers (`is_mcp_tool`, `resolve_mcp_server_from_known`), then delegates to `McpConnection` which handles Stdio/SSE transport and taint-scans outbound arguments. See [Runtime MCP — Architecture](librefang-runtime-mcp-src.md).","llm-provider-drivers-librefang-llm-driver-src":"# LLM Provider Drivers — librefang-llm-driver-src\n\n# LLM Provider Drivers — `librefang-llm-driver`\n\nThis crate defines the core trait (`LlmDriver`) and supporting types that abstract over LLM providers. Every concrete provider implementation—Anthropic, OpenAI, Ollama, Vertex AI, Azure OpenAI, CLI-based drivers like Claude Code—depends on this crate and implements its trait.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types<br/>Message, TokenUsage, ToolDefinition] --> B[librefang-llm-driver]\n    B --> C[librefang-llm-drivers<br/>Anthropic, OpenAI, Ollama, CLI drivers…]\n    D[librefang-runtime<br/>agent loop, routing, tool runner] -->|CompletionRequest| B\n    B -->|CompletionResponse / StreamEvent| D\n    B --> E[llm_errors<br/>classify_error, sanitize_for_user]\n```\n\nThe crate has two public modules:\n\n- **`lib`** (root) — `LlmDriver` trait, request/response types, streaming events, driver configuration.\n- **`llm_errors`** — Error classification, sanitization, and retry-delay extraction used across all providers.\n\n---\n\n## Core Trait: `LlmDriver`\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: tokio::sync::mpsc::Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError>;\n\n    fn is_configured(&self) -> bool { true }\n}\n```\n\n- **`complete`** — Blocking-style request. Implementors must provide this.\n- **`stream`** — Has a default implementation that calls `complete`, sends a single `TextDelta`, then `ContentComplete`. Real providers override this to emit incremental events. The caller receives the full `CompletionResponse` as the return value while consuming `StreamEvent`s from the channel concurrently.\n- **`is_configured`** — Returns `true` for all real drivers. `StubDriver` (in the testing crate) returns `false`.\n\n### Consumers\n\nThe trait is consumed by:\n- `librefang-runtime` — the agent loop constructs `CompletionRequest` and calls `stream` or `complete` depending on whether a UI is attached.\n- `librefang-runtime/src/routing.rs` — `make_request` builds a `CompletionRequest` and dispatches to the selected provider.\n- `librefang-runtime/src/provider_health.rs` — `probe_model` issues test completions to check provider availability.\n- `librefang-testing/src/mock_driver.rs` — test harness implements `LlmDriver` for deterministic responses.\n\n---\n\n## Request and Response Types\n\n### `CompletionRequest`\n\nAll fields a provider needs to fulfill a completion:\n\n| Field | Purpose |\n|---|---|\n| `model` | Model identifier (e.g. `\"claude-sonnet-4-20250514\"`) |\n| `messages` | Conversation history as `Vec<Message>` |\n| `tools` | Available `ToolDefinition`s the model may invoke |\n| `max_tokens` | Generation cap |\n| `temperature` | Sampling temperature |\n| `system` | System prompt, pre-extracted for APIs requiring it separately |\n| `thinking` | Extended thinking config (Anthropic-style) |\n| `prompt_caching` | Enables ephemeral cache markers (Anthropic) or parses cached token counts (OpenAI) |\n| `response_format` | Structured output mode (`ResponseFormat`) |\n| `timeout_secs` | Per-request timeout override; CLI drivers use this instead of the global `message_timeout_secs` |\n| `extra_body` | Provider-specific JSON merged into the top-level request body (last-wins on key conflict) |\n| `agent_id` | Owning agent identity, forwarded to MCP bridges so they can resolve workspace and allowlists |\n\n### `CompletionResponse`\n\n| Field | Purpose |\n|---|---|\n| `content` | `Vec<ContentBlock>` — text, thinking, tool-use blocks |\n| `stop_reason` | Why generation stopped (`EndTurn`, `ToolUse`, `MaxTokens`, etc.) |\n| `tool_calls` | Parsed `ToolCall` objects extracted from content blocks |\n| `usage` | `TokenUsage` (input, output, cache read/write tokens) |\n\n**`text()`** — Convenience method that concatenates all `ContentBlock::Text` blocks, skipping thinking and tool-use. Widely used across the codebase (OAuth flows, web fetch, MCP, vector stores, TTS synthesis) to extract plain text from responses.\n\n---\n\n## Streaming: `StreamEvent`\n\nEvents emitted to the `mpsc::Sender` during streaming:\n\n| Variant | Direction | Produced by |\n|---|---|---|\n| `TextDelta` | Incremental text | Provider driver |\n| `ThinkingDelta` | Extended thinking text | Anthropic driver |\n| `ToolUseStart` | Tool block begun | Provider driver |\n| `ToolInputDelta` | Partial JSON input | Provider driver |\n| `ToolUseEnd` | Complete tool call with parsed input | Provider driver |\n| `ContentComplete` | Final event with stop reason and usage | Provider driver |\n| `PhaseChange` | Lifecycle signal (e.g. `\"response_complete\"`) | Agent loop |\n| `ToolExecutionResult` | Tool output preview | Agent loop |\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) is emitted by the agent loop via `PhaseChange` to signal that LLM text is fully streamed. Consumers use this to unblock user input before session-save and proactive-memory post-processing finishes.\n\n---\n\n## Error Handling: `LlmError`\n\nThe root error enum for driver operations:\n\n| Variant | When |\n|---|---|\n| `Http(String)` | Network-level failure |\n| `Api { status, message }` | Provider returned a non-2xx response |\n| `RateLimited { retry_after_ms, message }` | 429 with optional provider hint |\n| `Parse(String)` | Response body couldn't be deserialized |\n| `MissingApiKey(String)` | No key configured for the provider |\n| `Overloaded { retry_after_ms }` | 503 / capacity error |\n| `AuthenticationFailed(String)` | Invalid or missing credentials |\n| `ModelNotFound(String)` | Model doesn't exist on the provider |\n| `TimedOut { inactivity_secs, partial_text, last_activity, … }` | CLI subprocess stalled; partial output captured |\n\n---\n\n## Error Classification: `llm_errors` Module\n\nThis module normalizes raw provider errors into 8 categories. It handles error formats from 19+ providers using case-insensitive substring matching—no regex dependency.\n\n### `LlmErrorCategory`\n\n| Category | `is_retryable` | `is_billing` | Typical status codes |\n|---|---|---|---|\n| `RateLimit` | ✅ | | 429 |\n| `Overloaded` | ✅ | | 500, 503, 529 |\n| `Timeout` | ✅ | | — (network) |\n| `Billing` | | ✅ | 402 |\n| `Auth` | | | 401, 403 |\n| `ContextOverflow` | | | 400 |\n| `Format` | | | 400 |\n| `ModelNotFound` | | | 404 |\n\n### Classification Pipeline: `classify_error`\n\n```\nraw error message + optional HTTP status\n        │\n        ▼\n  Status-code fast paths\n  (429→RateLimit, 402→Billing, 401→Auth,\n   403→disambiguated, 404→ModelNotFound)\n        │\n        ▼\n  Pattern matching in priority order:\n  1. ContextOverflow  2. Billing  3. Auth  4. RateLimit\n  5. ModelNotFound    6. Format   7. Overloaded  8. Timeout\n        │\n        ▼\n  HTML error page detection (Cloudflare)\n        │\n        ▼\n  Fallback: 5xx→Overloaded, 4xx→Format,\n            network words→Timeout, else→Format\n```\n\nThe **403 handling is deliberately nuanced**: many providers (especially Chinese providers like Qwen/ZhiPu) return 403 for quota exhaustion, region restrictions, or model-permission issues—not just auth failures. The classifier checks `FORBIDDEN_NON_AUTH_PATTERNS` (quota, limit, region, billing, etc.) before falling back to `Auth`. A generic 403 with no recognizable body defaults to `Auth`.\n\n### Rich Classification: `classify_error_with_context`\n\nAccepts optional `provider` and `model` strings. Returns a `ClassifiedError` with:\n\n- **`sanitized_message`** — User-safe message with provider/model context appended: `\"Rate limited [provider=openai, model=gpt-4]\"`\n- **`suggestion`** — Actionable next step (e.g. `\"Check your openai API key in config.toml\"`, `\"Model 'claude-99' may not be available on anthropic\"`)\n- **`suggested_delay_ms`** — Parsed from `\"retry after N\"` or `\"retry-after: Nms\"` patterns in the raw message\n\n### Sanitization\n\n`sanitize_for_user` produces user-facing messages that:\n\n1. Extract the relevant message from JSON error bodies (`/error/message`, `/message`, `/detail` paths).\n2. Redact secrets — strips `sk-*`, `key-*`, `Bearer *` token sequences.\n3. Strip internal wrappers like `\"LLM driver error: API error (NNN): \"`.\n4. Replace HTML error pages with `\"provider returned an error page (possible outage)\"`.\n5. Cap at 300 characters with `…` truncation.\n\n### Transient Detection: `is_transient`\n\nQuick heuristic returning `true` for `RateLimit`, `Overloaded`, and `Timeout` patterns. Used by retry logic in the runtime without requiring full classification.\n\n### Retry Delay Extraction: `extract_retry_delay`\n\nParses patterns like `\"retry after 30\"` (seconds→30000ms), `\"retry-after: 5\"` (seconds), `\"Retry after 500ms\"` (milliseconds). Returns `Option<u64>` in milliseconds.\n\n---\n\n## Driver Configuration: `DriverConfig`\n\nSerializable configuration carried from `KernelConfig` to driver construction:\n\n| Field | Default | Notes |\n|---|---|---|\n| `provider` | `\"\"` | Provider name identifier |\n| `api_key` | `None` | **Redacted in `Debug` output** |\n| `base_url` | `None` | Custom endpoint override |\n| `vertex_ai` | `VertexAiConfig::default()` | Google Vertex AI project/region/credentials |\n| `azure_openai` | `AzureOpenAiConfig::default()` | Azure endpoint/deployment/api_version |\n| `skip_permissions` | `true` | Claude Code `--dangerously-skip-permissions` flag |\n| `message_timeout_secs` | `300` | Inactivity timeout for CLI-based drivers |\n| `mcp_bridge` | `None` | `#[serde(skip)]` — set at runtime by the kernel |\n| `proxy_url` | `None` | Per-provider proxy override |\n\n**Security**: `DriverConfig` implements a custom `Debug` that redacts `api_key`, `vertex_ai.credentials_path`, and `proxy_url`.\n\n### `McpBridgeConfig`\n\nRuntime-only configuration for bridging LibreFang tools into CLI-based drivers (currently Claude Code). The kernel writes a temp `mcp_config.json` and passes `--mcp-config` to the spawned CLI so it discovers tools via the daemon's `/mcp` endpoint.\n\n- `base_url` — Daemon URL (e.g. `http://127.0.0.1:4545`)\n- `api_key` — Optional `X-API-Key` header value\n\n---\n\n## Usage Patterns\n\n### Implementing a new provider\n\n```rust\nuse librefang_llm_driver::{LlmDriver, CompletionRequest, CompletionResponse, LlmError, StreamEvent};\n\nstruct MyProviderDriver { /* ... */ }\n\n#[async_trait]\nimpl LlmDriver for MyProviderDriver {\n    async fn complete(&self, req: CompletionRequest) -> Result<CompletionResponse, LlmError> {\n        // Build HTTP request from req.model, req.messages, req.tools, etc.\n        // Parse response into CompletionResponse\n    }\n\n    async fn stream(\n        &self,\n        req: CompletionRequest,\n        tx: tokio::sync::mpsc::Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError> {\n        // Open SSE connection, emit TextDelta/ToolUseStart/ToolInputDelta/ToolUseEnd\n        // Emit ContentComplete as the final event\n    }\n}\n```\n\n### Classifying provider errors\n\n```rust\nuse librefang_llm_driver::llm_errors::{classify_error_with_context, is_transient};\n\n// Quick check — should we retry?\nif is_transient(&raw_message) {\n    // schedule retry with backoff\n}\n\n// Full classification with context\nlet classified = classify_error_with_context(\n    &raw_message,\n    Some(status_code),\n    Some(\"anthropic\"),\n    Some(\"claude-sonnet-4-20250514\"),\n);\n\nprintln!(\"Category: {:?}\", classified.category);     // e.g. RateLimit\nprintln!(\"Retryable: {}\", classified.is_retryable);   // true\nprintln!(\"Suggestion: {}\", classified.suggestion.unwrap_or_default());\nprintln!(\"Safe message: {}\", classified.sanitized_message);\n```","llm-provider-drivers-librefang-llm-drivers-src":"# LLM Provider Drivers — librefang-llm-drivers-src\n\n# LLM Provider Drivers — `librefang-llm-drivers`\n\n## Purpose\n\nThis crate provides the LLM abstraction layer for LibreFang. It maps provider names (e.g. `\"anthropic\"`, `\"groq\"`, `\"ollama\"`) to concrete driver implementations that handle HTTP requests, SSE streaming, authentication, and response parsing. Every agent in the runtime ultimately calls through `create_driver()` to get an `Arc<dyn LlmDriver>`.\n\nThe module supports **43+ providers** — cloud APIs, local inference servers, CLI subprocess tools, and Azure/Vertex AI services — through a handful of driver implementations that share a common protocol interface.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Config[\"DriverConfig\"] --> Cache[\"DriverCache\"]\n    Cache --> Factory[\"create_driver()\"]\n    Factory --> Registry[\"PROVIDER_REGISTRY\"]\n    Registry -->|OpenAI format| OAI[\"OpenAIDriver\"]\n    Registry -->|Anthropic format| ANT[\"AnthropicDriver\"]\n    Registry -->|Gemini format| GEM[\"GeminiDriver\"]\n    Registry -->|CLI format| CLI[\"ClaudeCode / QwenCode / ...\"]\n    Registry -->|Special auth| SPC[\"Copilot / ChatGPT / VertexAI\"]\n    Factory -->|unknown + base_url| OAI\n```\n\nAll drivers implement the `LlmDriver` trait (defined in `librefang-llm-driver`, re-exported here as `crate::llm_driver::LlmDriver`) with two methods:\n\n- **`complete(request) → CompletionResponse`** — single-shot request/response\n- **`stream(request, tx) → CompletionResponse`** — SSE streaming via an `mpsc::Sender<StreamEvent>` channel\n\n## Module Layout\n\n| Path | Responsibility |\n|------|---------------|\n| `src/lib.rs` | Re-exports `librefang-llm-driver` as `llm_driver`; declares `drivers` and `think_filter` submodules |\n| `src/drivers/mod.rs` | Provider registry, `DriverCache`, `ApiFormat` enum, `create_driver()` factory, detection utilities |\n| `src/drivers/openai.rs` | OpenAI-compatible driver — handles 90%+ of providers |\n| `src/drivers/anthropic.rs` | Anthropic Messages API driver |\n| `src/drivers/gemini.rs` | Google Gemini `generateContent` API driver |\n| `src/drivers/vertex_ai.rs` | Google Cloud Vertex AI (OAuth2 + Gemini format) |\n| `src/drivers/chatgpt.rs` | ChatGPT with session-token auth |\n| `src/drivers/copilot.rs` | GitHub Copilot with automatic token exchange |\n| `src/drivers/claude_code.rs` | Claude Code CLI subprocess driver |\n| `src/drivers/qwen_code.rs` | Qwen Code CLI subprocess driver |\n| `src/drivers/gemini_cli.rs` | Gemini CLI subprocess driver |\n| `src/drivers/codex_cli.rs` | Codex CLI subprocess driver |\n| `src/drivers/aider.rs` | Aider CLI subprocess driver |\n| `src/drivers/fallback.rs` | Fallback driver that tries multiple providers in sequence |\n| `src/drivers/token_rotation.rs` | Wrapper that rotates API keys on rate-limit errors |\n| `src/think_filter.rs` | Streaming `\\widgets` tag filter |\n\n## Provider Registry\n\n`PROVIDER_REGISTRY` is a static slice of `ProviderEntry` structs. Each entry contains:\n\n- **`name`** — canonical provider identifier (e.g. `\"deepseek\"`)\n- **`aliases`** — alternative names that resolve to this provider (e.g. `\"google\"` → `\"gemini\"`, `\"doubao\"` → `\"volcengine\"`)\n- **`base_url`** — default API endpoint\n- **`api_key_env`** — primary environment variable for the API key\n- **`alt_api_key_env`** — secondary env var (e.g. `GEMINI_API_KEY` also checks `GOOGLE_API_KEY`)\n- **`key_required`** — `false` for local providers (Ollama, vLLM, LM Studio) that don't require authentication\n- **`api_format`** — which `ApiFormat` variant to use\n- **`hidden`** — excluded from `known_providers()` output (internal/coding-specific variants)\n\nLookup is performed by `find_provider()`, which matches against `name` and `aliases`.\n\n### API Formats\n\n| `ApiFormat` | Driver | Auth / Notes |\n|---|---|---|\n| `OpenAI` | `OpenAIDriver` | Bearer token; covers Groq, OpenRouter, DeepSeek, etc. |\n| `Anthropic` | `AnthropicDriver` | `x-api-key` header |\n| `Gemini` | `GeminiDriver` | API key as query parameter |\n| `AzureOpenAI` | `OpenAIDriver` (Azure mode) | `api-key` header; deployment-based URL |\n| `VertexAI` | `VertexAiDriver` | Google OAuth2 from service account |\n| `ChatGpt` | `ChatGptDriver` | Session cookie auth |\n| `Copilot` | `CopilotDriver` | GitHub token → Copilot token exchange |\n| `ClaudeCode` | `ClaudeCodeDriver` | CLI subprocess |\n| `QwenCode` | `QwenCodeDriver` | CLI subprocess |\n| `GeminiCli` | `GeminiCliDriver` | CLI subprocess |\n| `CodexCli` | `CodexCliDriver` | CLI subprocess |\n| `Aider` | `AiderDriver` | CLI subprocess |\n\n## Driver Creation Flow\n\n`create_driver(config: &DriverConfig) → Result<Arc<dyn LlmDriver>, LlmError>`\n\n1. Look up `config.provider` in `PROVIDER_REGISTRY` via `find_provider()`\n2. If found, delegate to `create_driver_from_entry()` which:\n   - Resolves the API key: explicit `config.api_key` → primary env var → alt env var → (for OpenAI) Codex credential file\n   - Validates that required keys are present\n   - Constructs the concrete driver, passing `proxy_url` if set\n3. If not found and `config.base_url` is set, create an `OpenAIDriver` (convention: `{PROVIDER}_API_KEY` env var)\n4. If not found and no `base_url`, check whether the convention env var exists — if so, return a helpful error asking for `base_url`\n5. Otherwise, return an error listing all known providers\n\n## DriverCache\n\n`DriverCache` is a thread-safe, lazy-initializing cache backed by `DashMap<String, Arc<dyn LlmDriver>>`. It prevents redundant TLS handshake and connection-pool setup when the same provider configuration is used repeatedly.\n\n**Cache key construction** (`DriverCache::cache_key`):\n```\n{provider}|{hashed_api_key}|{base_url}|{proxy_url}\n```\n\nThe API key is hashed (not stored raw) to avoid keeping secrets as map keys.\n\nUsage pattern:\n```rust\nlet cache = DriverCache::new();\nlet driver = cache.get_or_create(&config)?;  // creates once, returns Arc clone after\ncache.clear();  // invalidate after config hot-reload\n```\n\n## OpenAI-Compatible Driver\n\n`OpenAIDriver` is the most complex driver because it handles the majority of providers. Key behaviors:\n\n### Request Building (`build_request`)\n\n- Converts `CompletionRequest.messages` to OpenAI wire format (`OaiMessage`)\n- Handles `ContentBlock` variants: `Text`, `ToolUse`, `ToolResult`, `Image`, `ImageFile`, `Thinking`\n- Strips `reasoning_content` from historical assistant messages for DeepSeek-R1 (the API rejects it)\n- Adds empty-string `reasoning_content` for Kimi K2.5 multi-turn with tool calls\n- Selects `max_tokens` vs `max_completion_tokens` based on model family (GPT-5, o-series use the latter)\n- Omits `temperature` for reasoning models that reject it\n- Adds Ollama `think` boolean from `request.thinking` when targeting Ollama-like endpoints\n- Applies `response_format` for structured output (JSON schema)\n- Merges `extra_body` parameters into the JSON body (provider-specific overrides)\n\n### Retry Logic (both `complete` and `stream`)\n\nThe driver retries up to 3 times with automatic parameter adjustment:\n\n| Condition | Action |\n|---|---|\n| HTTP 429 (rate limit) | Exponential backoff: 2s, 4s, 6s |\n| `temperature` + `unsupported_parameter` | Strip `temperature` |\n| `max_tokens` + `unsupported_parameter` | Switch to `max_completion_tokens` |\n| `max_tokens` exceeds model limit | Auto-cap to extracted limit |\n| `tool_use_failed` (Groq) | Parse XML tool calls from `failed_generation` |\n| 500 + \"does not support tools\" | Retry without tools |\n\n### Streaming\n\nSSE parsing processes `data:` lines from the byte stream. Deltas are routed:\n\n- `delta.content` → through `StreamingThinkFilter` → `StreamEvent::TextDelta`\n- `delta.reasoning_content` (or `delta.reasoning` for Ollama) → `StreamEvent::ThinkingDelta`\n- `delta.tool_calls` → accumulated by index → `StreamEvent::ToolUseStart` / `ToolInputDelta` / `ToolUseEnd`\n- `usage` (in final chunk) → tracked for response\n\nThe `stream_options: {\"include_usage\": true}` field is sent to get token counts; if the provider rejects it, the retry loop strips it.\n\n### Think Tag Extraction\n\nLocal models (Qwen3, DeepSeek-R1) sometimes embed reasoning in ` widgets` tags within `content`. `extract_think_tags()` separates these into `ContentBlock::Thinking`. The streaming path uses `StreamingThinkFilter` to intercept these tags in real-time deltas.\n\nWhen a response contains only thinking with no text output, `extract_thinking_summary()` synthesizes a brief text block from the last paragraph of the thinking content to prevent the agent loop from treating it as an empty response.\n\n### Azure OpenAI Mode\n\n`OpenAIDriver::new_azure_with_proxy()` constructs the URL as `{endpoint}/openai/deployments/{deployment}/chat/completions?api-version={version}` and uses the `api-key` header instead of `Authorization: Bearer`.\n\n### Groq Tool Call Recovery\n\nWhen Groq returns `tool_use_failed` (model generated tool calls as XML instead of JSON), `parse_groq_failed_tool_call()` extracts `<function=name{args}><\/function>` blocks and constructs a valid `CompletionResponse` with proper `ToolCall` structs.\n\n## Utility Functions\n\n| Function | Purpose |\n|---|---|\n| `detect_available_provider()` | Scans env vars in priority order; returns first provider with a configured key |\n| `known_providers()` | Lists all non-hidden provider names (for CLI help / status display) |\n| `cli_provider_available(name)` | Checks if a CLI binary is on PATH or has credentials |\n| `is_cli_provider(name)` | Returns true for subprocess-based providers |\n| `is_proxied_via_env(env_vars, official_hosts)` | Detects if env vars redirect traffic away from official API hosts |\n| `resolve_provider_api_key(provider)` | Checks all key sources: primary env → alt env → Codex credential file |\n| `read_codex_credential()` | Reads OpenAI key from `$CODEX_HOME/auth.json` or `~/.codex/auth.json` |\n\n## Connection to the Rest of the Codebase\n\n- **Runtime** (`librefang-runtime`) calls `create_driver()` and `DriverCache::get_or_create()` to instantiate drivers for agents\n- **Model catalog** (`librefang-runtime/src/model_catalog.rs`) calls `detect_auth()` which uses `cli_provider_available()` and `is_cli_provider()` to determine provider availability\n- **CLI** (`librefang-cli`) calls `detect_available_provider()` for first-run setup and `known_providers()` for help output\n- **Types** (`librefang-types`) provides `DriverConfig`, `VertexAiConfig`, `AzureOpenAiConfig`, `ContentBlock`, `TokenUsage`, `ToolCall`, `ResponseFormat`\n- **HTTP** (`librefang-http`) provides `proxied_client()` and `proxied_client_with_override()` for constructing `reqwest::Client` instances with proxy support\n- **Driver trait** (`librefang-llm-driver`) defines `LlmDriver`, `CompletionRequest`, `CompletionResponse`, `StreamEvent`, `LlmError`\n\n## Adding a New Provider\n\n1. Add a `ProviderEntry` to `PROVIDER_REGISTRY` in `src/drivers/mod.rs` with the provider name, base URL, env var, and `ApiFormat` variant\n2. If the provider uses an existing format (most use `OpenAI`), no driver code changes are needed — the registry entry and env var are sufficient\n3. If the provider needs a new auth flow or wire format, add a new `ApiFormat` variant and corresponding driver module, then wire it up in `create_driver_from_entry()`\n4. If the provider is an internal/coding variant that shouldn't appear in `known_providers()`, set `hidden: true`","llm-provider-drivers":"# LLM Provider Drivers\n\n# LLM Provider Drivers\n\n## Purpose\n\nThis module group provides LibreFang's LLM abstraction layer — a trait-based interface (`LlmDriver`) backed by 43+ concrete provider implementations. Every agent completion request in the runtime flows through this layer, whether it targets a cloud API, a local inference server, or a CLI subprocess tool.\n\n## Sub-modules\n\n| Crate | Role |\n|---|---|\n| [librefang-llm-driver](librefang-llm-driver-src.md) | Defines the core `LlmDriver` trait, `CompletionRequest`/`CompletionResponse` types, streaming events, and error classification/sanitization utilities. |\n| [librefang-llm-drivers](librefang-llm-drivers-src.md) | Implements `LlmDriver` for every supported provider and exposes the `create_driver()` factory that maps provider names to concrete drivers. |\n\n## How They Fit Together\n\n```mermaid\ngraph LR\n    subgraph \"Trait & Types\"\n        A[\"librefang-llm-driver<br/><code>LlmDriver<\/code> trait<br/>errors, request/response types\"]\n    end\n    subgraph \"Implementations\"\n        B[\"librefang-llm-drivers<br/><code>create_driver()<\/code><br/>43+ provider impls\"]\n    end\n    Runtime[\"librefang-runtime\"] -->|\"CompletionRequest\"| B\n    B -->|\"Arc&lt;dyn LlmDriver&gt;\"| Runtime\n    B -.->|\"implements\"| A\n```\n\n**`librefang-llm-driver`** is the contract crate — it has zero provider-specific logic. It depends on `librefang-types` for shared domain types (`Message`, `TokenUsage`, `ToolDefinition`) and exports the error utilities that providers use to classify and sanitize raw API errors for downstream consumers.\n\n**`librefang-llm-drivers`** consumes that contract and fills in every concrete implementation. Its `create_driver()` factory accepts a `DriverConfig`, resolves provider-specific defaults (base URLs, auth headers, model families), and returns a cached `Arc<dyn LlmDriver>`. Provider families include:\n\n- **Cloud APIs** — Anthropic, OpenAI, Gemini, Groq, and others\n- **Cloud platform wrappers** — Azure OpenAI, Vertex AI (with PKCS#8 RSA key parsing for JWT auth)\n- **Local inference** — Ollama and compatible servers\n- **CLI subprocess drivers** — Claude Code, Qwen Code, Gemini CLI, Codex CLI (auto-detected from `$PATH` and credential files)\n- **Cross-cutting wrappers** — token-rotation driver (cycles API keys), fallback driver (chains multiple providers)\n\n## Key Cross-Module Workflows\n\n1. **Driver instantiation** — Runtime calls `create_driver(config)` → factory resolves provider name → applies defaults and URL overrides → caches the driver instance for reuse.\n\n2. **Completion** — Runtime builds a `CompletionRequest` against the trait → concrete driver handles HTTP/SSE, authentication, and provider-specific quirks (e.g., DeepSeek reasoning content stripping, Groq failed-tool-call parsing) → returns `CompletionResponse` or a stream of `StreamEvent`s.\n\n3. **Error handling** — Provider implementations surface raw API errors → `sanitize_raw_excerpt` and `classify_error` (from the trait crate) transform them into user-safe, categorized error types that the runtime can act on.\n\n4. **Provider detection** — CLI drivers check `$PATH` and credential stores (e.g., `claude_credentials_exist` reads from the vault) to determine availability at startup and during catalog updates.","memory-storage":"# Memory & Storage\n\n# Memory & Storage Module\n\n## Overview\n\n`librefang-memory` is the persistence substrate for the LibreFang Agent Operating System. It provides a unified memory API over SQLite-backed stores, offering agents structured key-value storage, semantic recall with vector search, knowledge graph operations, session persistence, and a shared task queue — all behind a single `MemorySubstrate` entry point.\n\nThe module is designed around a single shared SQLite connection (with WAL mode and busy timeout) and composes specialized stores that each own a subset of the schema.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Memory trait<br/>async API] --> B[MemorySubstrate]\n    B --> C[StructuredStore]\n    B --> D[SemanticStore]\n    B --> E[KnowledgeStore]\n    B --> F[SessionStore]\n    B --> G[UsageStore]\n    B --> H[ConsolidationEngine]\n\n    D -->|optional| I[VectorStore trait]\n    I --> J[SqliteVectorStore]\n    I --> K[HttpVectorStore]\n\n    L[ProactiveMemoryStore] --> B\n    M[ProactiveMemoryHooks] --> L\n```\n\n## Core Type: `MemorySubstrate`\n\nThe `MemorySubstrate` struct is the primary entry point. It holds an `Arc<Mutex<Connection>>` shared across all sub-stores and implements the async `Memory` trait from `librefang-types`.\n\n### Opening a Substrate\n\n```rust\nuse librefang_memory::MemorySubstrate;\nuse std::path::Path;\n\n// Persistent database\nlet substrate = MemorySubstrate::open(Path::new(\"data/memory.db\"), 0.1)?;\n\n// In-memory (for testing)\nlet substrate = MemorySubstrate::open_in_memory(0.1)?;\n\n// With explicit chunking configuration\nlet substrate = MemorySubstrate::open_with_chunking(\n    Path::new(\"data/memory.db\"),\n    0.1,\n    ChunkConfig { enabled: true, max_chunk_size: 1500, overlap: 200 },\n)?;\n```\n\nThe `decay_rate` parameter controls the consolidation engine's memory decay behavior. On open, the substrate:\n1. Opens the SQLite connection with `PRAGMA journal_mode=WAL; PRAGMA busy_timeout=5000;`\n2. Runs schema migrations via `migration::run_migrations`\n3. Initializes all sub-stores with clones of the shared connection\n\n### Attaching a Vector Backend\n\nBy default, vector similarity search uses in-process cosine similarity over SQLite BLOBs. For production deployments, attach an external backend:\n\n```rust\nlet vector_store = Arc::new(HttpVectorStore::new(\"http://qdrant:6333\"));\nsubstrate.set_vector_store(vector_store);\n```\n\nWhen set, `recall_with_embedding` delegates to the `VectorStore::search` method and hydrates the returned IDs into full `MemoryFragment` structs from SQLite.\n\n## Sub-Systems\n\n### Structured Store (`structured`)\n\nAgent-scoped key-value storage for configuration, state, and arbitrary JSON data.\n\n| Method | Description |\n|--------|-------------|\n| `structured_get(agent_id, key)` | Retrieve a JSON value |\n| `structured_set(agent_id, key, value)` | Upsert a JSON value |\n| `structured_delete(agent_id, key)` | Delete a key |\n| `list_kv(agent_id)` | List all key-value pairs |\n| `list_keys(agent_id)` | List only keys |\n| `save_agent(entry)` / `load_agent(id)` | Persist/retrieve `AgentEntry` |\n| `remove_agent(agent_id)` | Delete agent row |\n\n### Semantic Store (`semantic`)\n\nText-based memory with optional vector embeddings. Supports dual search modes:\n\n- **Fallback**: SQL `LIKE` matching when no embeddings are available\n- **Vector**: Cosine similarity ranking when query embeddings are provided\n\n```rust\n// Store a memory (no embedding)\nlet id = substrate.remember(agent_id, \"User prefers dark mode\", \n    MemorySource::Conversation, \"user_preference\", HashMap::new()).await?;\n\n// Store with embedding\nlet id = substrate.remember_with_embedding(agent_id, \"User prefers dark mode\",\n    MemorySource::Conversation, \"user_preference\", HashMap::new(), Some(&embedding)).await?;\n\n// Text search\nlet results = substrate.recall(\"dark mode\", 10, None).await?;\n\n// Vector search\nlet results = substrate.recall_with_embedding(\"dark mode\", 10, \n    Some(filter), Some(&query_embedding)).await?;\n```\n\n**Embedding storage**: Embeddings are serialized as little-endian `f32` arrays into SQLite BLOBs. The `cosine_similarity` function computes similarity between query and stored vectors.\n\n**Multimodal support**: `remember_with_embedding_and_peer` accepts `image_url`, `image_embedding`, and `modality` fields for image-based memories.\n\n**Peer isolation**: The `peer_id` field and `MemoryFilter.peer_id` enable per-user memory isolation within a shared agent — critical for multi-user deployments.\n\n**Batch operations**: `get_embeddings_batch` loads embeddings for multiple IDs efficiently, used by the consolidation engine's duplicate detection.\n\n**Access tracking**: Every recall increments `access_count` and updates `accessed_at`. Failures are logged rather than silently dropped because the decay engine uses these timestamps for TTL decisions.\n\n#### `SqliteVectorStore`\n\nImplements the `VectorStore` trait using in-process cosine similarity. Suitable for single-node deployments with <100k vectors. For larger deployments, use `HttpVectorStore` or a custom `VectorStore` implementation.\n\n### Session Store (`session`)\n\nManages conversation history with FTS5 full-text search and cross-channel canonical sessions.\n\n```rust\n// Create and save sessions\nlet session = substrate.create_session(agent_id)?;\nsubstrate.save_session(&session)?;\n\n// Labeled sessions (for multi-chat isolation)\nlet session = substrate.create_session_with_label(agent_id, Some(\"whatsapp:alice\"))?;\nsubstrate.set_session_label(session.id, Some(\"telegram:bob\"))?;\n\n// Full-text search across sessions\nlet results = substrate.search_sessions(\"deployment error\", Some(&agent_id))?;\n```\n\n**Canonical sessions** provide cross-channel memory persistence. An agent serving multiple channels (WhatsApp, Telegram, etc.) maintains a single canonical conversation that accumulates context across all channels:\n\n```rust\n// Append messages to the canonical session\nsubstrate.append_canonical(agent_id, &messages, Some(100), Some(session_id))?;\n\n// Load canonical context (summary + recent messages)\nlet (summary, recent_messages) = substrate.canonical_context(agent_id, Some(session_id), Some(20))?;\n\n// Store an LLM-generated summary replacing older messages\nsubstrate.store_llm_summary(agent_id, \"User discussed deployment issues...\", kept_messages)?;\n```\n\n**Session export**: `SessionExport` provides a portable serialization format for hibernation and state transfer.\n\n**JSONL mirrors**: `write_jsonl_mirror` creates human-readable JSONL files on disk as a best-effort backup alongside the SQLite store.\n\n**Cleanup operations**:\n- `cleanup_expired_sessions(retention_days)` — delete sessions older than N days\n- `cleanup_excess_sessions(max_per_agent)` — keep only the newest N sessions per agent\n- `cleanup_orphan_sessions(live_agent_ids)` — delete sessions whose agent no longer exists\n\n**Activity tracking**: `count_agent_sessions_touched_since` and `list_agent_sessions_touched_since` support the auto-dream consolidation gate — they determine whether an agent has had real activity since the last consolidation run. The `exclude_session` parameter prevents the dream session itself from counting as activity.\n\n### Knowledge Store (`knowledge`)\n\nEntity-relation graph for structured knowledge. Accessed through the `Memory` trait methods:\n\n```rust\n// Add entities and relations\nlet entity_id = substrate.add_entity(entity).await?;\nlet relation_id = substrate.add_relation(relation).await?;\n\n// Pattern matching\nlet matches = substrate.query_graph(pattern).await?;\n```\n\n### Usage Store (`usage`)\n\nToken usage tracking for metering and budget enforcement. Queried by the metering kernel (`librefang-kernel-metering`):\n\n- `query_summary` — aggregate usage per agent\n- `query_hourly` / `query_daily` / `query_monthly` — time-windowed queries\n- `query_by_model` — per-model performance breakdown\n- `check_quota_and_record` — atomic quota check + usage recording\n- `check_global_budget_and_record` — global budget enforcement\n- `cleanup_old` — prune old usage records\n\n### Consolidation Engine (`consolidation`)\n\nMerges similar memories, prunes low-confidence entries, and maintains memory quality over time. Triggered via the `Memory::consolidate` async method.\n\n### Task Queue\n\nA built-in persistent task queue stored in the `task_queue` table for inter-agent coordination:\n\n```rust\n// Post a task\nlet task_id = substrate.task_post(\"Review code\", \"Check auth module\", Some(\"auditor\"), None).await?;\n\n// Claim the next available task\nlet task = substrate.task_claim(\"auditor\").await?; // Option<JsonValue>\n\n// Complete a task\nsubstrate.task_complete(&task_id, \"No issues found\").await?;\n\n// List/filter tasks\nlet pending = substrate.task_list(Some(\"pending\")).await?;\n\n// Retry a completed/failed task\nsubstrate.task_retry(&task_id).await?;\n\n// Delete a task\nsubstrate.task_delete(&task_id).await?;\n```\n\nTask claiming is atomic: `task_claim` finds the first pending task matching the agent (or any unassigned task) and atomically sets it to `in_progress`. Only `completed` or `failed` tasks can be retried — `in_progress` tasks are excluded to prevent duplicate execution.\n\n### Memory Decay (`decay`)\n\nTime-based memory cleanup controlled by `MemoryDecayConfig`:\n\n- **USER scope**: Never decays\n- **SESSION scope**: Decays after `session_ttl_days` of no access\n- **AGENT scope**: Decays after `agent_ttl_days` of no access\n\n```rust\nlet deleted_count = substrate.run_decay(&decay_config)?;\n```\n\n### Chunking (`chunker`)\n\nWhen enabled via `ChunkConfig`, long text content is automatically split into overlapping chunks before storage:\n\n```rust\npub struct ChunkConfig {\n    pub enabled: bool,\n    pub max_chunk_size: usize,  // in characters\n    pub overlap: usize,         // overlap between chunks\n}\n```\n\nEach chunk is stored as a separate `MemoryFragment` with metadata:\n- `chunk_index` — position in the chunk sequence\n- `total_chunks` — total number of chunks\n- `parent_id` — ID of the first chunk (the logical parent)\n\n**Important**: When chunking activates, the original full-text embedding is **not** applied to individual chunks. Each chunk should receive its own embedding from the embedding pipeline later. This prevents stale full-text embeddings from polluting vector similarity results.\n\nThe returned `MemoryId` always refers to the first chunk, which serves as the logical parent.\n\n### Proactive Memory (`proactive`)\n\nA mem0-style API layer built on top of `MemorySubstrate`:\n\n- `ProactiveMemoryStore` — implements search, add, get, list operations\n- `ProactiveMemoryHooks` — auto-memorize and auto-retrieve hooks for agent pipelines\n- `ProactiveMemoryConfig` — configuration for the proactive memory system\n\nRe-exported types include `MemoryExportItem`, `MemoryStats`, and the `ProactiveMemoryStore` itself.\n\n### Prompt Store (`prompt`)\n\nVersioned prompt storage for A/B testing and prompt management. Re-exported as `PromptStore`.\n\n## The `Memory` Trait\n\nThe async `Memory` trait from `librefang-types` defines the unified interface:\n\n```rust\n#[async_trait]\nimpl Memory for MemorySubstrate {\n    async fn get(&self, agent_id: AgentId, key: &str) -> LibreFangResult<Option<Value>>;\n    async fn set(&self, agent_id: AgentId, key: &str, value: Value) -> LibreFangResult<()>;\n    async fn delete(&self, agent_id: AgentId, key: &str) -> LibreFangResult<()>;\n    async fn remember(&self, agent_id: AgentId, content: &str, source: MemorySource, \n                      scope: &str, metadata: HashMap<String, Value>) -> LibreFangResult<MemoryId>;\n    async fn recall(&self, query: &str, limit: usize, filter: Option<MemoryFilter>) \n                    -> LibreFangResult<Vec<MemoryFragment>>;\n    async fn forget(&self, id: MemoryId) -> LibreFangResult<()>;\n    async fn add_entity(&self, entity: Entity) -> LibreFangResult<String>;\n    async fn add_relation(&self, relation: Relation) -> LibreFangResult<String>;\n    async fn query_graph(&self, pattern: GraphPattern) -> LibreFangResult<Vec<GraphMatch>>;\n    async fn consolidate(&self) -> LibreFangResult<ConsolidationReport>;\n    async fn export(&self, format: ExportFormat) -> LibreFangResult<Vec<u8>>;\n    async fn import(&self, data: &[u8], format: ExportFormat) -> LibreFangResult<ImportReport>;\n}\n```\n\nAll trait methods use `tokio::task::spawn_blocking` to avoid blocking the async runtime on SQLite operations.\n\n## Concurrency Model\n\nAll sub-stores share a single `Arc<Mutex<Connection>>`. The mutex provides:\n- Thread-safe access from multiple tokio tasks\n- SQLite transaction isolation for atomic operations\n- WAL mode allows concurrent reads while a write is in progress\n\nAsync wrappers (`save_session_async`, `remember_with_embedding_async`, `recall_with_embedding_async`) use `tokio::task::spawn_blocking` to move synchronous SQLite work off the async runtime.\n\n## Data Flow\n\n### Agent Message Handling\n\n```\nhand_send_message\n  → inject_attachments_into_session\n    → substrate.get_session\n    → substrate.save_session\n      → SessionStore.save_session\n        → rmp_serde serialization\n        → FTS5 index update\n        → extract_text_content\n```\n\n### Memory Recall with Vectors\n\n```\nrecall_with_embedding(query, limit, filter, Some(embedding))\n  → SemanticStore.recall_with_embedding\n    ├─ VectorStore configured? → recall_via_vector_store\n    │   → VectorStore.search (external backend)\n    │   → Hydrate MemoryFragments from SQLite\n    └─ No VectorStore → Fetch candidates from SQLite\n       → Re-rank by cosine_similarity\n       → Update access_count / accessed_at\n```\n\n### Proactive Memory Operations\n\n```\nmemory_update / memory_delete (HTTP API routes)\n  → find_agent_id_for_memory (ProactiveMemoryStore)\n    → SemanticStore.get_by_id\n    → Returns MemoryFragment with agent_id\n```\n\n## Paired Devices\n\nThe substrate also persists paired device records (for push notification targets) in the `paired_devices` table:\n\n- `load_paired_devices()` — returns all devices as JSON\n- `save_paired_device(id, name, platform, paired_at, last_seen, push_token)` — upsert\n- `remove_paired_device(id)` — delete\n\n## Key Re-exports\n\nThe crate re-exports commonly needed types for convenience:\n\n```rust\n// From librefang-types::memory\npub use librefang_types::memory::{\n    ExtractionResult, MemoryAction, MemoryAddResult, MemoryFilter, MemoryFragment,\n    MemoryId, MemoryItem, MemoryLevel, MemorySource, ProactiveMemory,\n    ProactiveMemoryConfig, ProactiveMemoryHooks, RelationTriple, VectorSearchResult,\n    VectorStore,\n};\n\n// Store implementations\npub use proactive::{MemoryExportItem, MemoryStats, ProactiveMemoryStore};\npub use prompt::PromptStore;\npub use http_vector_store::HttpVectorStore;\npub use semantic::SqliteVectorStore;\npub use substrate::MemorySubstrate;\n```","networking-p2p":"# Networking & P2P\n\n# LibreFang Wire Protocol (OFP) — Networking & P2P\n\nThe `librefang-wire` crate implements peer-to-peer networking between LibreFang kernels. It provides cross-machine agent discovery, authentication, and communication over TCP using a JSON-framed wire protocol with HMAC-SHA256 authentication at both the handshake and per-message levels.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Local Kernel\"\n        PH[PeerHandle trait]\n        PN[PeerNode]\n        PR[PeerRegistry]\n    end\n\n    subgraph \"Remote Kernel\"\n        RPN[PeerNode]\n        RPR[PeerRegistry]\n    end\n\n    PN -->|TCP listen/accept| RPN\n    PN -->|connect_to_peer| RPN\n    PN --> PR\n    RPN --> RPR\n    PH -.->|implemented by kernel| PN\n    RPN -.->|routes to local agents| PH\n\n    subgraph \"Wire Protocol\"\n        WM[WireMessage]\n        HS[Handshake + HMAC]\n        AM[AgentMessage]\n        DISC[Discover]\n    end\n```\n\nEvery LibreFang kernel that participates in the network runs a `PeerNode`. That node binds a TCP listener, performs mutual HMAC-authenticated handshakes with connecting peers, and maintains a `PeerRegistry` of known remote peers and their agents. The kernel implements the `PeerHandle` trait so the networking layer can route incoming messages to local agents without knowing anything about the agent system itself.\n\n## Wire Protocol\n\nAll communication uses length-prefixed JSON frames over TCP. The current protocol version is `1`.\n\n### Framing\n\n```\n[4 bytes: big-endian length of payload][JSON payload]\n```\n\nFor authenticated post-handshake messages, the frame includes a trailing HMAC:\n\n```\n[4 bytes: big-endian length][JSON body][64 bytes: hex-encoded HMAC-SHA256]\n```\n\nThe maximum message size is 16 MB (`MAX_MESSAGE_SIZE`). The `encode_message` / `decode_message` / `decode_length` functions in `message.rs` handle serialization; the `write_message` / `read_message` / `write_message_authenticated` / `read_message_authenticated` async functions in `peer.rs` handle I/O.\n\n### Message Types\n\nAll messages share the `WireMessage` envelope with a unique `id` (UUID string) and a `kind` discriminated by the `\"type\"` JSON tag:\n\n| Variant | Tag | Direction | Description |\n|---|---|---|---|\n| `WireRequest::Handshake` | `\"request\"` / `\"handshake\"` | Both | Identity exchange with HMAC |\n| `WireRequest::Discover` | `\"request\"` / `\"discover\"` | Client → Server | Query remote agents |\n| `WireRequest::AgentMessage` | `\"request\"` / `\"agent_message\"` | Client → Server | Send text to a remote agent |\n| `WireRequest::Ping` | `\"request\"` / `\"ping\"` | Client → Server | Liveness check |\n| `WireResponse::HandshakeAck` | `\"response\"` / `\"handshake_ack\"` | Both | Handshake acceptance |\n| `WireResponse::DiscoverResult` | `\"response\"` / `\"discover_result\"` | Server → Client | Agent list result |\n| `WireResponse::AgentResponse` | `\"response\"` / `\"agent_response\"` | Server → Client | Agent reply text |\n| `Wire
