crate for a concrete reason: test crates and lightweight consumers can depend on `librefang-llm-driver` alone, avoiding a transitive pull of `reqwest`, TLS libraries, and vendored SDKs into their build. **Do not merge these two crates.**\n\n## Key Components\n\n### `LlmDriver` Trait\n\nThe core async trait that every LLM provider must implement. Defined in `lib.rs`. Any new provider adds an implementation in `librefang-llm-drivers` — the trait itself rarely changes.\n\nWhen a new trait method is genuinely needed, open an issue for discussion first. The trait surface is kept minimal by design.\n\n### `LlmError` Enum\n\nDefined in `llm_errors.rs`. This is the single error type returned by `LlmDriver` methods. Every variant is structured — there are **no `String` catch-all variants** and **no `Box<dyn Error>` returns**.\n\nKey properties:\n\n- **Compositional query methods**: `is_retryable()`, and similar helpers, live directly on the enum. Each variant should answer questions like \"is this retryable?\", \"is this a quota or auth issue?\", and \"did the model produce invalid output?\".\n- **Source chain preservation**: Error variants use `#[source]` annotations (per #3745) so that `std::error::Error::source()` chains remain intact through the call stack.\n- **Partial response recovery**: The `Partial` variant carries the bytes accumulated so far during a streaming failure. Consumers use this to settle metering and billing without losing partial work (#3552).\n\n#### Adding a new error variant\n\n1. Add a typed variant with structured fields (not a `String`).\n2. Preserve the `#[source]` chain where the error wraps an underlying cause.\n3. Ensure `is_retryable()` and any other query methods handle the new variant.\n\n### Shared Driver-Side Types\n\nCommon types used across multiple provider implementations. These stay generic — nothing provider-specific belongs here.\n\n## Dependencies\n\nThe crate is deliberately dep-light:\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types |\n| `async-trait` | Async trait macro for `LlmDriver` |\n| `serde` / `serde_json` | Serialization of shared types |\n| `thiserror` | Derived `Error` impl for `LlmError` |\n| `tokio` | Async runtime primitives |\n\nNo networking libraries. No TLS. No vendored client SDKs.\n\n## Boundaries\n\n### What belongs here\n\n- The `LlmDriver` trait definition\n- `LlmError` and its query methods\n- Shared types used by multiple provider implementations\n\n### What does NOT belong here\n\n- HTTP client wiring or request construction\n- Retry strategies or backoff logic\n- Prompt formatting or provider-specific protocol details\n- Provider-specific response parsing\n\nThose all go into `librefang-llm-drivers`.\n\n### Forbidden imports\n\n| Must not import | Reason |\n|---|---|\n| `reqwest` or TLS crates | Would violate the dep-light guarantee |\n| `librefang-llm-drivers` | Circular dependency |\n| `librefang-runtime` / `librefang-kernel` | Driver trait must stand alone |\n\n## Testing\n\nThis crate has **no HTTP fixture tests**. Trait conformance is exercised through mock drivers built in `librefang-testing` (see `MockKernelBuilder`). Provider-specific integration tests live in `librefang-llm-drivers` next to the implementation under test.\n\n## Adding a New Driver\n\nNew drivers are implemented in `librefang-llm-drivers`. You should not need to touch this crate unless one of these is genuinely required:\n\n- A new method on the `LlmDriver` trait (rare — discuss in an issue first).\n- A new `LlmError` variant for a failure mode not yet covered.\n- A new shared type that multiple providers need.","other-librefang-llm-drivers-tests":"# Other — librefang-llm-drivers-tests\n\n# librefang-llm-drivers/tests — Integration Test Suite\n\n## Purpose\n\nThis module contains integration tests for the LLM driver layer. Every test spins up a `wiremock::MockServer` that impersonates an upstream LLM provider, fires real HTTP requests through the production driver code, and asserts on either the deserialized response or the raw wire-level request. No test touches a live API.\n\nThe tests lock in three cross-cutting contracts that all drivers must honour:\n\n| Contract | What it enforces |\n|---|---|\n| **Request shape** | URL path, required headers (`Authorization`, `x-api-key`, `anthropic-version`), JSON body fields (`model`, `messages`, `tools`, `max_tokens`, provider-specific envelopes) |\n| **Retry / rate-limit behaviour** | 429/529/503 retry loops, `Retry-After` honouring, lockout-file creation, backoff, adaptive parameter stripping (`temperature`, `max_tokens → max_completion_tokens`, tool removal on 500) |\n| **Trace headers** | `x-librefang-agent-id`, `x-librefang-session-id`, `x-librefang-step-id` emitted when present, omitted when absent, suppressed by `with_emit_caller_trace_headers(false)` |\n\n```mermaid\ngraph TD\n    subgraph \"Test infrastructure\"\n        CM[common/mod.rs]\n        CM -->|isolated_env| TE[TestEnv]\n        CM -->|mock_*_driver| DRV[Driver instances]\n        CM -->|collect_stream| SE[StreamEvent collector]\n        CM -->|lockout_file_exists| LF[Rate-limit lockout checks]\n    end\n\n    subgraph \"Anthropic\"\n        ARS[anthropic_request_shape]\n        ARE[anthropic_retry]\n        ATH[anthropic_trace_headers]\n    end\n\n    subgraph \"OpenAI\"\n        ORS[openai_request_shape]\n        ORC[openai_retry_complete]\n        ORS2[openai_retry_stream]\n        OTH[openai_trace_headers]\n    end\n\n    subgraph \"Gemini\"\n        GRS[gemini_request_shape]\n        GRE[gemini_retry]\n        GTH[gemini_trace_headers]\n    end\n\n    subgraph \"Other drivers\"\n        OD[ollama_driver]\n        BTH[bedrock_trace_headers]\n        CTH[chatgpt_trace_headers]\n        CP[copilot_trace_headers]\n        VT[vertex_ai_trace_headers]\n    end\n\n    ARS & ARE & ATH --> CM\n    ORS & ORC & ORS2 & OTH --> CM\n    GRS & GRE & GTH --> CM\n    OD & BTH & CTH & CP & VT --> CM\n```\n\n## File layout\n\n```\ntests/\n├── common/mod.rs                     # Shared helpers (see below)\n├── anthropic_request_shape.rs        # Wire contract: body, headers, tools\n├── anthropic_retry.rs                # 429 / 529 retry + lockout\n├── anthropic_trace_headers.rs        # x-librefang-* header emission\n├── openai_request_shape.rs           # Wire contract: body, auth, tools\n├── openai_retry_complete.rs          # Non-streaming retry + adaptive fallbacks\n├── openai_retry_stream.rs            # Streaming retry\n├── openai_trace_headers.rs           # x-librefang-* header emission\n├── gemini_request_shape.rs           # Wire contract: URL-embedded model, tools\n├── gemini_retry.rs                   # 429 / 503 / 403 retry\n├── gemini_trace_headers.rs           # x-librefang-* header emission\n├── ollama_driver.rs                  # Native Ollama driver (not compat shim)\n├── bedrock_trace_headers.rs          # Bedrock trace headers\n├── chatgpt_trace_headers.rs          # ChatGPT Responses API trace headers\n├── copilot_trace_headers.rs          # Copilot (delegated OpenAI) trace headers\n├── vertex_ai_trace_headers.rs        # Vertex AI trace headers\n└── shared_rate_guard_integration.rs  # Cross-driver rate-limit guard\n```\n\n## Test infrastructure — `common/mod.rs`\n\n### Environment isolation\n\n```rust\npub fn isolated_env() -> TestEnv\n```\n\nCreates a temporary directory, sets `LIBREFANG_HOME` to point at it (so lockout files and rate-limit state don't pollute the developer's home), sets `NO_PROXY` for localhost, and activates `backoff::enable_test_zero_backoff()` so retries happen instantly instead of waiting real seconds. The `TestEnv` guard drops the temp dir and backoff override on exit.\n\n### Driver factories\n\nEach function builds a production driver instance that routes requests to the given mock server instead of the real provider endpoint:\n\n| Function | Driver |\n|---|---|\n| `mock_openai_driver(server)` | `OpenAIDriver::with_proxy_and_timeout` |\n| `mock_anthropic_driver(server)` | `AnthropicDriver::with_proxy_and_timeout` |\n| `mock_gemini_driver(server)` | `GeminiDriver::with_proxy_and_timeout` |\n| `mock_ollama_driver(server)` | `OllamaDriver::with_proxy_and_timeout` (empty key) |\n\nAll use a 5-second timeout and a randomised API key prefixed with the provider's expected scheme (`sk-test-`, `sk-ant-test-`, `test-key-`).\n\n### Request builders\n\n| Function | Purpose |\n|---|---|\n| `simple_request(model)` | Minimal single-message request, no tools, `max_tokens=16` |\n| `request_with_tools(model)` | Includes one `get_weather` tool definition, `max_tokens=256` |\n| `request_with_temperature(model, temp)` | Like `simple_request` with a custom temperature |\n| `o_series_request()` | Targets `o3-mini` with `max_tokens=1000`, `temperature=1.0` |\n\nEach returns a `CompletionRequest` with `Arc<Vec<Message>>` messages and `Arc<Vec<ToolDefinition>>` tools suitable for cloning.\n\n### Response builders\n\nProvider-specific JSON fixtures that match the shape each driver's deserializer expects:\n\n| Function | Provider | Notes |\n|---|---|---|\n| `openai_200_body(text)` | OpenAI | `chat.completion` with `finish_reason: \"stop\"` |\n| `openai_429_response(secs)` | OpenAI | 429 with `retry-after` header |\n| `openai_sse_body(chunks)` | OpenAI | SSE with `data: [DONE]` terminator |\n| `anthropic_200_body(text)` | Anthropic | `message` with `stop_reason: \"end_turn\"` |\n| `anthropic_429_response()` | Anthropic | 429 with rate-limit headers |\n| `anthropic_529_response()` | Anthropic | 529 overloaded |\n| `anthropic_sse_body(text)` | Anthropic | Full SSE sequence: `message_start` → `content_block_delta` (char-by-char) → `message_stop` |\n| `gemini_200_body(text)` | Gemini | `candidates[]` with `finishReason: \"STOP\"` |\n| `gemini_429_response()` / `gemini_503_response()` | Gemini | `RESOURCE_EXHAUSTED` / `UNAVAILABLE` |\n| `gemini_sse_body(text)` | Gemini | Single-chunk SSE |\n\n### Stream collection\n\n```rust\npub async fn collect_stream(\n    driver: &dyn LlmDriver,\n    request: CompletionRequest,\n) -> (Result<CompletionResponse, LlmError>, Vec<StreamEvent>)\n```\n\nSpawns a background task that drains the `mpsc::Receiver<StreamEvent>` into a `Vec`, calls `driver.stream()`, then returns both the final result and the collected events. Used by every streaming test.\n\n### Lockout file helpers\n\n```rust\npub fn lockout_file_exists(provider: &str, api_key: &str) -> bool\npub fn create_lockout_file(provider: &str, api_key: &str, until: SystemTime)\n```\n\nThin wrappers around `shared_rate_guard::key_id_hash` and `shared_rate_guard::record` that check / create rate-limit lockout files under `$LIBREFANG_HOME/rate_limits/`.\n\n### Request inspection\n\n```rust\npub fn request_json(request: &Request) -> serde_json::Value\n```\n\nDeserializes the raw wiremock `Request` body into a `serde_json::Value` for field-level assertions.\n\n---\n\n## Contract tests by concern\n\n### 1. Request shape\n\nEach driver has a `*_request_shape.rs` file that pins the wire contract by inspecting both the recorded HTTP request (URL path, headers, query string) and the deserialized JSON body.\n\n**Anthropic** (`anthropic_request_shape.rs`):\n- POST to `/v1/messages`\n- Headers: `x-api-key`, `anthropic-version: 2023-06-01`, `content-type: application/json`\n- Body fields: `model`, `max_tokens`, `system`, `messages[]`, `tools[]` with `input_schema`\n- Tool-call response: `content[].type == \"tool_use\"` → `CompletionResponse.tool_calls` with `StopReason::ToolUse`\n- Streaming: per-character `TextDelta` events concatenated equal the final `resp.text()`\n\n**OpenAI** (`openai_request_shape.rs`):\n- POST to `/chat/completions`\n- Header: `Authorization: Bearer <key>`\n- Body: `model`, `messages[]`, `tools[]` with `type: \"function\"` envelope\n- Tool-call response: `finish_reason: \"tool_calls\"` → `StopReason::ToolUse`; `function.arguments` JSON string is parsed into a structured value\n- Streaming: chunk-based `TextDelta` aggregation + `ContentComplete`\n\n**Gemini** (`gemini_request_shape.rs`):\n- POST to `/v1beta/models/<model>:generateContent`\n- API key in `?key=` query string, not a header\n- Body: `contents[]`, `tools[].functionDeclarations[].parameters`\n- Tool-call response: `functionCall` part → `StopReason::ToolUse`; driver mints a synthetic `id` (Gemini doesn't provide one)\n- Streaming: single SSE chunk via `streamGenerateContent`\n\n### 2. Retry behaviour\n\nRetry tests use the naming convention `{prefix}{number}_{scenario}` (e.g. `aa1_429_retry_then_success`). The prefix identifies the provider file: `aa` = Anthropic, `oc` = OpenAI complete, `os` = OpenAI stream, `ag` = Gemini.\n\nCommon patterns across all providers:\n\n| Scenario | Behaviour |\n|---|---|\n| 429 then success | Retries with backoff, succeeds on Nth attempt, creates lockout file |\n| 429 exhaustion | Retries up to max (typically 3 retries = 4 total requests), returns `LlmError::RateLimited` |\n| 529/503 then success | Retries, succeeds, **no** lockout file (overloaded ≠ account-level rate limit) |\n| 529/503 exhaustion | Returns `LlmError::Overloaded` (Anthropic/Gemini) or `LlmError::Api` |\n| Pre-existing lockout | Returns `RateLimited` immediately without sending any HTTP request |\n| Streaming 429 retry | Same retry logic for `driver.stream()` as for `driver.complete()` |\n\n**Provider-specific adaptive retries (OpenAI only):**\n\n`openai_retry_complete.rs` tests additional fallback strategies the OpenAI driver employs when it receives specific 400/500 errors:\n\n| Test | Adaptive behaviour |\n|---|---|\n| `oc4_max_tokens_to_max_completion_tokens` | On 400 `\"max_tokens\" unsupported`, retries with `max_completion_tokens` instead |\n| `oc5_temperature_strip` | On 400 `\"temperature\" unsupported`, retries without the `temperature` field |\n| `oc6_toolless_retry_on_500` | On 500 with tools, retries with `tools` and `tool_choice` stripped |\n| `oc7_max_tokens_auto_cap` | On 400 \"max value is X\", retries with the server-advised cap |\n\nThese use custom `wiremock::Match` impls (`BodyContains`, `BodyNotContains`) to route mock responses based on request body content.\n\n### 3. Trace headers\n\nEvery driver has a `*_trace_headers.rs` file that tests the same four scenarios:\n\n1. **Headers emitted when set** — `CompletionRequest` with `agent_id`, `session_id`, `step_id` produces `x-librefang-agent-id`, `x-librefang-session-id`, `x-librefang-step-id` on the outbound request.\n2. **Headers omitted when absent** — All three fields are `None`; no `x-librefang-*` headers appear.\n3. **Headers suppressed by flag** — `Driver::with_emit_caller_trace_headers(false)` suppresses headers even when the fields are populated. This is the operator opt-out path.\n4. **Streaming path** (most but not all drivers) — `driver.stream()` also emits trace headers.\n\nDrivers tested for trace headers: OpenAI, Anthropic, Gemini, Bedrock, ChatGPT, Copilot, Vertex AI.\n\nNotable details:\n- **Copilot** delegates to an inner `OpenAIDriver`; tests use `CopilotDriver::new_for_test` to bypass the GitHub token exchange.\n- **ChatGPT** uses the Responses API path (`/codex/responses`) with its own SSE format requiring a `response.completed` event.\n- **Bedrock** uses Bearer token auth; the emit-flag test also serves as a SigV4 compatibility gate (documenting that if SigV4 is adopted, trace headers must be excluded from the canonical-request hash).\n\n### 4. Ollama native driver — `ollama_driver.rs`\n\nThe most extensive single-driver test file, covering the native Ollama API (`/api/chat`, not the OpenAI compat shim at `/v1/chat/completions`):\n\n| Test area | What's verified |\n|---|---|\n| **Request shape** | POST to `/api/chat`; `model`, `messages`, `options.{num_predict, temperature}`; no top-level `max_tokens` |\n| **Auth** | No `Authorization` when key is empty (localhost); `Bearer <key>` when set |\n| **Thinking** | `request.thinking = Some(_)` sets native `think: true` in body |\n| **Tool calls** | `tool_calls[].function` parsed with synthesised `ollama-call-*` IDs |\n| **First-class thinking** | `message.thinking` routes to `ContentBlock::Thinking` (not `<think/>` tags) |\n| **Streaming** | NDJSON aggregation of `content` deltas; `thinking` deltas via `StreamEvent::ThinkingDelta` (no leakage into `TextDelta`); `ToolUseStart`/`ToolUseEnd` event pairs |\n| **Stringified tool args** | `coerce_tool_args` handles models that double-encode arguments as a JSON string |\n| **Malformed tool chunks** | Unparseable `tool_calls` chunks are skipped; prior valid snapshot is preserved |\n| **Truncated streams** | Missing `done: true` returns partial text with zero usage (not a hard error) |\n| **Error mapping** | 404 → `ModelNotFound`, 401 → `AuthenticationFailed`, 502 raw body → `LlmError::Api` |\n| **Multi-modal** | `ContentBlock::Image` serialises as native `images: [...]` array, not OpenAI `image_url` |\n| **Tool results** | `ContentBlock::ToolResult` → `role: \"tool\"` with `tool_name` (not `tool_call_id`) |\n| **URL migration** | Legacy `/v1` suffix in base URL is silently stripped; explicit `/openai/v1` mount is preserved |\n\n---\n\n## Serial execution\n\nAll tests are annotated with `#[serial_test::serial]`. This is necessary because tests share global state through environment variables (`LIBREFANG_HOME`, `NO_PROXY`) and the backoff zero-delay guard, which is process-global. Running in parallel would cause races between environment mutations.\n\n## Adding a new driver test\n\n1. Create `tests/<driver>_request_shape.rs` with a `mod common;` import.\n2. Add a driver factory to `common/mod.rs` (e.g. `pub fn mock_xxx_driver(server: &MockServer) -> XxxDriver`).\n3. Add response builder functions to `common/mod.rs` matching the provider's wire format.\n4. Test the three contracts: request shape, retry (if applicable), and trace headers.\n5. Use `isolated_env()` at the top of every test to avoid polluting other tests' state.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers for the LibreFang platform. This crate bridges the abstract driver interface defined in `librefang-llm-driver` with real HTTP integrations for Anthropic, OpenAI, Gemini, Groq, Ollama, and other LLM providers. It also ships production-grade infrastructure for credential management, failover, rate limiting, and stream handling.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Consumer crates\"\n        A[Application code]\n    end\n\n    subgraph \"librefang-llm-drivers\"\n        B[FallbackChain]\n        C[Credentials]\n        D[Rate Limit Tracker]\n        E[Provider Drivers]\n        F[Retry / Backoff]\n        G[Stream Helpers]\n    end\n\n    subgraph \"Sibling crates\"\n        H[librefang-llm-driver<br/>trait + error types]\n        I[librefang-http]\n        J[librefang-types]\n        K[librefang-runtime-oauth]\n    end\n\n    A --> B\n    B --> E\n    E --> C\n    E --> D\n    E --> F\n    E --> G\n    E -.-> H\n    E -.-> I\n    C -.-> K\n    B -.-> H\n```\n\nEvery public driver implements the `LlmDriver` trait re-exported from `librefang-llm-driver`. Consumers interact with drivers through that trait, keeping their code provider-agnostic.\n\n## Public API\n\n### Provider Drivers\n\nThe `drivers` module contains one sub-module per provider. Each exposes a concrete driver struct that can be instantiated with provider-specific configuration and used through the `LlmDriver` trait.\n\nSupported providers:\n\n| Module | Provider | Notes |\n|---|---|---|\n| `drivers::anthropic` | Anthropic | Claude family models |\n| `drivers::openai` | OpenAI | GPT family models |\n| `drivers::gemini` | Google Gemini | |\n| `drivers::groq` | Groq | |\n| `drivers::ollama` | Ollama | Local / self-hosted models |\n\n### Fallback Chain\n\n```rust\nuse librefang_llm_drivers::drivers::fallback_chain::{FallbackChain, ChainEntry};\n```\n\n`FallbackChain` composes multiple driver instances into an ordered failover list. When a request fails for a transient reason (rate limit, network error, server error), the chain advances to the next entry automatically.\n\n- **`ChainEntry`** — pairs a driver with optional per-entry configuration (priority, weight, or provider-specific overrides).\n- **`FallbackChain`** — iterates entries on failure, reports the `FailoverReason` for each attempt, and returns the first successful response or the last error.\n\nThis is the recommended entry point for production workloads that require resilience across providers.\n\n### Credential Pool\n\n```rust\nuse librefang_llm_drivers::credential_pool::{\n    ArcCredentialPool, CredentialPool, PoolStrategy, PooledCredential, new_arc_pool,\n};\n```\n\nManages a shared pool of API keys so multiple concurrent tasks can draw credentials without hard-coding a single key.\n\n- **`CredentialPool`** / **`ArcCredentialPool`** — thread-safe pool backed by `DashMap`. `ArcCredentialPool` is the `Arc`-wrapped alias for cheap cloning across tasks.\n- **`new_arc_pool`** — convenience constructor that accepts an initial list of credentials and returns a ready-to-use `ArcCredentialPool`.\n- **`PoolStrategy`** — selects how the next credential is chosen (e.g., round-robin, random, least-recently-used). This lets you spread load evenly across keys to avoid per-key rate limits.\n- **`PooledCredential`** — wraps a raw credential string with bookkeeping metadata (last-used timestamp, usage counters) that the strategy consults.\n\n### Rate Limit Tracking\n\n```rust\nuse librefang_llm_drivers::rate_limit_tracker::{RateLimitBucket, RateLimitSnapshot};\n```\n\nProvides observability into per-provider rate-limit state gleaned from response headers.\n\n- **`RateLimitBucket`** — represents a single provider's rate-limit window (requests remaining, reset timestamp, etc.). Updated by drivers after each HTTP response.\n- **`RateLimitSnapshot`** — a read-only copy of current bucket state, suitable for logging, metrics emission, or display in dashboards.\n\n### Supporting Utilities\n\nThese modules are public so that custom driver implementations outside this crate can reuse them.\n\n| Module | Purpose |\n|---|---|\n| `backoff` | Exponential backoff calculation with jitter for retries. |\n| `retry_after` | Parses `Retry-After` headers (seconds or HTTP-date) into a `Duration`. |\n| `shared_rate_guard` | RAII-style guard that temporarily marks a rate-limit bucket as occupied, releasing it on drop. Prevents thundering-herd retries. |\n| `stream_backpressure` | Applies backpressure when consuming SSE/token streams so a slow consumer doesn't unboundedly buffer responses. |\n| `think_filter` | Strips or transforms \"thinking\" tokens that some providers emit during extended reasoning. |\n| `utf8_stream` | Handles partial UTF-8 sequences that can be split across chunk boundaries in byte-oriented streams. Reassembles them into valid `String` chunks. |\n\n### Re-exports\n\nFor convenience, the crate re-exports common types so consumers need fewer explicit dependencies:\n\n- **`llm_driver`** — the trait and associated types from `librefang-llm-driver`.\n- **`llm_errors`** — error categories shared across drivers.\n- **`FailoverReason`** — enum describing why a fallback occurred (rate-limited, timed out, server error, etc.).\n\n## How Drivers Work\n\nEach provider driver follows the same lifecycle:\n\n1. **Construction** — Instantiate the driver struct with an endpoint URL, a credential source (either a static key or a `CredentialPool`), optional model overrides, and HTTP client configuration via `librefang-http`.\n\n2. **Request building** — The driver translates the provider-agnostic request type from `librefang-types` into the provider's wire format (JSON body, headers, query parameters).\n\n3. **HTTP dispatch** — The request is sent through `librefang-http`, which may inject OAuth tokens from `librefang-runtime-oauth` when the credential pool supplies an OAuth-backed credential.\n\n4. **Response handling** — On success, the provider-specific JSON response is parsed back into the shared response type. On failure:\n   - Rate-limit responses update the `RateLimitBucket` and consult `retry_after`.\n   - Transient errors trigger the backoff/retry loop if the driver was constructed with retry enabled.\n   - Permanent errors are returned immediately.\n\n5. **Streaming** — For streaming requests, the driver opens an SSE connection and yields tokens through an async stream. `stream_backpressure` and `utf8_stream` ensure correct flow control and encoding.\n\n## Adding a New Provider\n\nTo add support for a new LLM provider:\n\n1. Create a new submodule under `drivers/` (e.g., `drivers::mistral`).\n2. Define a driver struct that holds configuration and an HTTP client.\n3. Implement the `LlmDriver` trait, delegating HTTP work to `librefang-http`.\n4. Use `backoff`, `retry_after`, `shared_rate_guard`, and `rate_limit_tracker` for retry and observability — these are designed to be shared across all drivers.\n5. For streaming, compose `stream_backpressure` and `utf8_stream` into your token pipeline.\n6. Register the driver in `FallbackChain` tests to verify failover behavior.\n\n## Key Dependencies\n\n| Crate | Role |\n|---|---|\n| `librefang-llm-driver` | Provides the `LlmDriver` trait and error types that every driver implements. |\n| `librefang-types` | Shared request/response types exchanged across the trait boundary. |\n| `librefang-http` | HTTP client construction, middleware, and request execution. |\n| `librefang-runtime-oauth` | OAuth token acquisition for providers that require it. |\n| `reqwest` | Underlying HTTP client. |\n| `tokio` | Async runtime for spawning tasks and timers. |\n| `dashmap` | Concurrent map backing `CredentialPool` and `RateLimitBucket`. |\n| `sha2` / `base64` | Credential hashing and encoding where needed. |\n| `zeroize` | Secure clearing of credential material from memory on drop. |\n| `serde` / `serde_json` | Serialization of provider wire formats. |","other-librefang-memory-src":"# Other — librefang-memory-src\n\n# RosterStore — SQLite-Backed Group Roster\n\n## Purpose\n\n`RosterStore` persists the membership of every group chat the daemon has seen. Instead of injecting the full roster into the agent's system prompt (expensive in tokens), agents query the store on demand through the `group_members` tool.\n\nThis means:\n- Roster data survives daemon restarts.\n- Token cost is zero until the agent actually needs to look up a member.\n- Membership state is scoped per `(channel_type, chat_id)` pair, so Telegram, Discord, and other channels coexist without collision.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[MemorySubstrate::open] -->|runs migrations| B[(SQLite)]\n    A -->|passes Pool| C[RosterStore]\n    C -->|upsert / members / remove| B\n    D[group_members tool] -->|reads via| C\n```\n\n`MemorySubstrate::open` is responsible for running the migration ladder (including `migration::migrate_v28`, which creates the `group_roster` table) **before** constructing the `RosterStore`. This design ensures that `RosterStore::new` can never panic on a locked or read-only database — schema failures surface at boot, not at first use.\n\n## Schema\n\nThe table is created externally by `migration::migrate_v28`. The expected shape is:\n\n| Column | Type | Role |\n|---|---|---|\n| `channel_type` | TEXT | Protocol identifier (e.g. `\"telegram\"`, `\"discord\"`) |\n| `chat_id` | TEXT | Platform-specific group identifier |\n| `user_id` | TEXT | Platform-specific user identifier |\n| `display_name` | TEXT | Human-readable name at time of last sighting |\n| `username` | TEXT | Nullable platform handle |\n| `first_seen` | INTEGER | Unix epoch seconds, set on INSERT |\n| `last_seen` | INTEGER | Unix epoch seconds, updated on every upsert |\n\nThe unique constraint is `(channel_type, chat_id, user_id)`.\n\n## API\n\n### `RosterStore::new(pool)`\n\nWraps an existing `r2d2::Pool<SqliteConnectionManager>`. Does **not** run DDL — see the design rationale above.\n\n### `upsert(channel, chat_id, user_id, display_name, username)`\n\nInserts a new member or updates an existing one. On conflict:\n- `display_name` is always overwritten with the latest value.\n- `username` is updated only if the new value is non-`NULL` (`COALESCE` preserves the old value).\n- `last_seen` is refreshed to the current timestamp.\n- `first_seen` remains unchanged.\n\n**Guard:** silently returns if `chat_id` or `user_id` is empty.\n\n### `members(channel, chat_id) -> Vec<(user_id, display_name, Option<username>)>`\n\nReturns all members of a group, ordered alphabetically by `display_name`. Returns an empty vec on pool exhaustion or if no members exist.\n\n### `remove_member(channel, chat_id, user_id)`\n\nDeletes a single member row. Silent no-op if the pool is exhausted.\n\n### `member_count(channel, chat_id) -> usize`\n\nReturns the number of rows for the given group. Returns `0` on pool exhaustion.\n\n## Error & Pool Exhaustion Handling\n\nEvery public method follows the same pattern when the connection pool is exhausted:\n\n1. Increments the `librefang_memory_pool_get_failed_total` counter (labels: `store = \"roster\"`, `op = \"<method_name>\"`).\n2. Emits a `tracing::warn!` with the channel and chat ID.\n3. Returns a safe default — empty vec, zero count, or silent return.\n\nThis ensures that transient pool pressure never crashes the daemon or propagates to the agent.\n\n## Integration Points\n\n| Caller | Direction | What happens |\n|---|---|---|\n| `MemorySubstrate::open` | inbound | Constructs `RosterStore` after running migrations |\n| `migration::run_migrations` | inbound (tests) | Sets up the `group_roster` table in test helpers |\n| `group_members` tool | outbound | Calls `members()` to serve agent queries |\n| Bridge / protocol layer | inbound | Calls `upsert()` when presence events arrive |\n\n## Testing\n\nTests use `in_memory_store()`, which builds a single-connection in-memory SQLite pool, runs the full migration ladder via `crate::migration::run_migrations`, and returns a ready-to-use `RosterStore`.\n\nCovered scenarios:\n- Basic insert and list ordering.\n- Idempotent upsert updating `display_name` while preserving the row.\n- Member removal and count consistency.\n- Empty chat IDs returning nothing.\n- Cross-chat isolation (members in one chat don't leak into another).\n- Empty `chat_id` / `user_id` inputs being silently rejected.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory/tests — Canonical Chat-Scoped Integration Tests\n\n## Purpose\n\nThis module contains integration regression tests that guard a critical privacy fix in the `librefang-memory` crate's canonical context system. The tests verify that conversation history stored for an agent is properly isolated by chat session, preventing cross-channel message leakage between WhatsApp DMs, groups, Telegram chats, or any other channels sharing the same agent.\n\n## Background: The Bug\n\nBefore the fix in `session.rs`, every `CanonicalEntry` was stored against an `AgentId` alone. When the kernel requested canonical context to build an LLM prompt, **all** entries for that agent were returned — regardless of which chat session originally produced them. In practice, this meant:\n\n- A WhatsApp DM user's messages could appear in a group chat prompt\n- Group messages could be injected into private DM prompts\n- Any two channels sharing an agent would see each other's history\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[\"append_canonical(agent, msgs, None, session_id)\"] --> B[(SQLite: canonical_entries)]\n    B --> C[\"canonical_context(agent, session_id, None)\"]\n    C --> D{session_id provided?}\n    D -- Yes --> E[\"Filter by session_id\"]\n    D -- No --> F[\"Return all entries (backward compat)\"]\n```\n\nEach `CanonicalEntry` row now carries a `session_id` column. The `canonical_context` read path applies a `WHERE` filter when a `SessionId` is supplied, or returns unfiltered results when `None` is passed.\n\n## Test Infrastructure\n\n### `setup() → SessionStore`\n\nCreates a fully initialized `SessionStore` backed by an in-memory SQLite database:\n\n1. Builds an `r2d2::Pool<SqliteConnectionManager>` with `max_size(1)`\n2. Runs database schema migrations via `run_migrations`\n3. Constructs and returns a `SessionStore` from the pool\n\nThis mirrors the real initialization path the kernel follows at startup, but without touching the filesystem.\n\n### `user_msg(text) → Message`\n\nHelper that constructs a `Message` with:\n- `role`: `Role::User`\n- `content`: `MessageContent::Text(text)`\n- `pinned`: `false`\n- `timestamp`: `None`\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**The primary regression test.** Simulates two WhatsApp conversations — a DM and a group chat — both routed to the same `AgentId`.\n\n**Flow:**\n\n1. Derive two distinct `SessionId`s via `SessionId::for_channel`:\n   - `session_dm` from `\"whatsapp:393331111111@s.whatsapp.net\"` (DM JID)\n   - `session_group` from `\"whatsapp:120363111111111111@g.us\"` (group JID)\n2. Assert the derived session IDs differ — the channel-derivation function must produce unique keys per chat.\n3. Append three messages in interleaved order:\n   - `\"dm-1\"` → `session_dm`\n   - `\"group-1\"` → `session_group`\n   - `\"dm-2\"` → `session_dm`\n4. Query `canonical_context(agent, Some(session_dm), None)` and assert only `[\"dm-1\", \"dm-2\"]` are returned — `\"group-1\"` must not leak.\n5. Query `canonical_context(agent, Some(session_group), None)` and assert only `[\"group-1\"]` is returned — `\"dm-1\"` and `\"dm-2\"` must not leak.\n\nThis exercises the full append → persist → load → filter roundtrip through the public API, which is exactly the path the kernel invokes on every inbound message and every prompt construction.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**Backward compatibility guard.** Verifies that passing `session_id = None` to `canonical_context` returns entries from all sessions, preserving the original cross-channel semantics for callers that haven't adopted per-session filtering.\n\n**Flow:**\n\n1. Derive `session_a` (WhatsApp) and `session_b` (Telegram).\n2. Append one message to each session.\n3. Call `canonical_context(agent, None, None)`.\n4. Assert both messages appear in the result set.\n\n## APIs Under Test\n\nThese tests exercise the following public surface from `librefang-memory` and `librefang-types`:\n\n| Function / Method | Crate | Role |\n|---|---|---|\n| `SessionStore::new(pool)` | `librefang-memory` | Construct the store |\n| `run_migrations(&conn)` | `librefang-memory` | Initialize schema |\n| `SessionStore::append_canonical(agent, msgs, summary, session_id)` | `librefang-memory` | Write tagged entries |\n| `SessionStore::canonical_context(agent, session_id, limit)` | `librefang-memory` | Read filtered (or unfiltered) entries |\n| `SessionId::for_channel(agent, channel_str)` | `librefang-types` | Derive a deterministic session ID from a channel address |\n| `AgentId::new()` | `librefang-types` | Create a fresh agent identifier |\n\n## Running\n\n```bash\n# From the workspace root\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n\n# With output\ncargo test -p librefang-memory --test canonical_chat_scoped_integration -- --nocapture\n```\n\nNo external services or filesystem paths are required. The tests use `:memory:` SQLite databases via `r2d2_sqlite`.\n\n## Contributing\n\nWhen adding new session-scoping behavior to `session.rs` or the canonical memory layer, add a corresponding test here. Tests should:\n\n- Use the public API exclusively (no direct SQL assertions)\n- Exercise both the filtered (`Some(session_id)`) and unfiltered (`None`) code paths\n- Append messages across multiple sessions before querying, to catch ordering and interleaving bugs\n- Assert on the full content of returned messages, not just counts","other-librefang-memory-wiki-tests":"# Other — librefang-memory-wiki-tests\n\n# librefang-memory-wiki-tests\n\nIntegration and acceptance tests for the `librefang-memory-wiki` crate, validating the `WikiVault` durable knowledge vault end-to-end against a real on-disk filesystem.\n\n## Purpose\n\nThis module serves two distinct testing roles:\n\n1. **Acceptance testing** (`wiki_acceptance.rs`) — Exercises the seven acceptance criteria from issue #3329. Each test creates a `WikiVault` backed by a temporary directory and asserts observable behavior: file layout, frontmatter persistence, hand-edit detection, render-mode link syntax, and backlink topology.\n\n2. **Contract testing** (`wiki_handle_contract.rs`) — Validates that the JSON shapes produced by `wiki_get`, `wiki_search`, and `wiki_write` remain stable across the `WikiAccess` trait boundary defined in `librefang-kernel-handle`. This prevents drift between the kernel-side adaptor and what downstream consumers (tool dispatchers, HTTP routes, dashboards) rely on.\n\n## Architecture\n\n```mermaid\ngraph TD\n    WA[wiki_acceptance.rs] -->|direct calls| WV[WikiVault]\n    WH[wiki_handle_contract.rs] -->|via WikiAccess trait| WHD[WikiHandle wrapper]\n    WHD -->|delegates to| WV\n    WA -->|asserts on| FS[TempDir filesystem]\n    WHD -->|serializes to| JSON[serde_json::Value]\n    WH -->|imports trait from| KH[librefang-kernel-handle]\n    WA -->|imports types from| LMW[librefang-memory-wiki]\n```\n\n## Test Utilities\n\n### `vault_in` (acceptance tests)\n\nConstructs a `WikiVault` rooted in a temporary directory with the specified `RenderMode` and `MemoryWikiIngestFilter::Tagged`:\n\n```rust\nfn vault_in(dir: &TempDir, render: RenderMode) -> WikiVault\n```\n\nUsed by every acceptance test except `default_config_is_disabled_and_construction_short_circuits`.\n\n### `provenance` (acceptance tests)\n\nBuilds a `ProvenanceEntry` with a fixed session (`\"sess_acceptance\"`) and channel (`\"test-harness\"`), parameterized by agent name and turn number:\n\n```rust\nfn provenance(agent: &str, turn: u64) -> ProvenanceEntry\n```\n\n### `WikiHandle` (contract tests)\n\nA thin `Option<Arc<WikiVault>>` wrapper that implements `librefang_kernel_handle::WikiAccess`. When the inner option is `None`, all methods return `KernelOpError::Unavailable`. This mirrors the production kernel-side adaptor where the vault may be disabled.\n\nThe implementation maps `WikiError` variants to `KernelOpError` variants:\n\n| `WikiError` | `KernelOpError` |\n|---|---|\n| `HandEditConflict` | `Internal` (with actionable message) |\n| `InvalidTopic` | `InvalidInput` |\n| `BodyTooLarge` | `InvalidInput` |\n| `NotFound` | `Internal` |\n| All others | `Internal` |\n\n### `vault_handle` (contract tests)\n\nConstructs a `WikiHandle` with an active vault:\n\n```rust\nfn vault_handle(dir: &TempDir) -> WikiHandle\n```\n\n## Acceptance Tests\n\nEach test maps to a bullet in the issue #3329 acceptance list, cited in its doc comment.\n\n### #1: Default config is disabled\n\n`default_config_is_disabled_and_construction_short_circuits` — Asserts `MemoryWikiConfig::default()` has `enabled: false` and that `WikiVault::new` returns `WikiError::Disabled` rather than constructing a vault.\n\n### #2: Isolated mode round-trip\n\n`isolated_mode_round_trip` — Writes a page via `vault.write`, verifies the `.md` file exists on disk, reads it back with `vault.get`, and confirms `vault.search` finds it by content. Also asserts `outcome.merged_with_external_edit` is `false` on a fresh write.\n\n### #3: Provenance accumulates\n\n`provenance_is_populated_on_every_write` — Writes to the same topic three times with different agents and turns. Verifies:\n- `page.frontmatter.provenance` has exactly 3 entries in order.\n- Agent names appear in the correct sequence.\n- The on-disk YAML contains `provenance:`, agent names, and `content_sha256:`.\n\n### #4: Hand-edit preservation\n\n`external_hand_edit_is_preserved_under_force` — Tests the hand-edit detection cycle:\n1. Write a page normally.\n2. Append content directly to the `.md` file (simulating a user editing in their editor).\n3. Assert a subsequent `write` without `force` returns `WikiError::HandEditConflict`.\n4. Assert `write` with `force=true` preserves the user's hand-typed content and appends provenance. The body passed to the forced write is intentionally discarded; `merged_with_external_edit` is `true`.\n\n### #5: Render modes\n\nTwo tests cover the two render modes:\n\n- `obsidian_mode_emits_wiki_link_syntax` — In `RenderMode::Obsidian`, `[[topic]]` syntax is preserved verbatim in the on-disk file; no rewriting to markdown links occurs.\n- `native_mode_emits_relative_markdown_links` — In `RenderMode::Native`, `[[topic]]` is rewritten to `[topic](topic.md)` plain markdown links.\n\n### #7: Backlink topology\n\n`five_pages_with_links_produce_five_files_and_correct_backlinks` — Creates five pages forming a link chain (alpha → beta → gamma → delta → epsilon). Verifies:\n- Six `.md` files exist (five topics plus auto-generated `index.md`).\n- `vault.backlinks()` returns exactly the expected `BacklinkEntry` set (6 entries, since alpha links to beta and gamma, beta links to gamma and delta, etc.).\n- `index.md` lists every topic and does not contain `_meta`.\n\n### Additional coverage\n\n- `render_mode_conversion_round_trip` — Asserts `RenderMode::from(MemoryWikiRenderMode::*)` round-trips correctly.\n- `reserved_modes_return_specific_error` — Asserts that `MemoryWikiMode::Bridge` produces `WikiError::ModeNotImplemented(\"bridge\")`, preventing silent misconfiguration.\n\n## Contract Tests\n\nThese tests validate the JSON wire format that any `WikiAccess` consumer can rely on. They exist because `librefang-kernel-handle` defines the trait but has no vault to test against, and `librefang-kernel` has a real impl but cannot build in the sandboxed CI environment due to system dependency constraints (libdbus, gdk).\n\n### Disabled vault\n\n`disabled_handle_returns_per_method_unavailable` — With `WikiHandle(None)`, all three methods (`wiki_get`, `wiki_search`, `wiki_write`) return `KernelOpError::Unavailable` with the method name as context.\n\n### Write response shape\n\n`wiki_write_response_shape_is_stable` — Asserts the JSON object returned by `wiki_write` contains:\n- `topic`: string matching the input topic.\n- `path`: string (the on-disk file path).\n- `content_sha256`: 64-character hex string.\n- `merged_with_external_edit`: boolean.\n\n### Malformed provenance\n\n`wiki_write_rejects_malformed_provenance_with_invalid_input` — Passing a JSON object without the required `agent` field surfaces as `KernelOpError::InvalidInput` (not `Internal`), with a message mentioning `\"provenance\"`.\n\n### Get response shape\n\n`wiki_get_returns_topic_frontmatter_body_object` — Asserts the JSON object has:\n- `topic`: string.\n- `body`: string.\n- `frontmatter`: object containing `topic`, `created`, `updated`, `content_sha256`, and `provenance` (an array of objects each with an `agent` field).\n\n### Search response shape\n\n`wiki_search_returns_array_of_topic_snippet_score_objects` — Asserts the response is a JSON array where each hit is an object with:\n- `topic`: string.\n- `snippet`: string.\n- `score`: number (f64).\n\n## Running\n\nThese are standard `#[test]` functions executed via `cargo test -p librefang-memory-wiki`. All tests create temporary directories (`tempfile::TempDir`) that are automatically cleaned up on drop. No external services or system dependencies are required.","other-librefang-memory-wiki":"# Other — librefang-memory-wiki\n\n# librefang-memory-wiki\n\nDurable markdown knowledge vault for the LibreFang Agent OS. Persists agent knowledge as markdown files with provenance frontmatter and supports Obsidian-friendly export.\n\n## Purpose\n\nThis module provides the long-term memory layer for LibreFang agents. Knowledge is stored as plain markdown files with YAML frontmatter encoding provenance metadata — creation timestamps, content hashes, source information — making the vault both human-readable and machine-verifiable. The output format is designed to be directly usable in [Obsidian](https://obsidian.md) or any markdown-aware tooling.\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[Agent Runtime] --> B[MemoryWiki]\n    B --> C[Markdown Files]\n    C --> D[YAML Frontmatter]\n    C --> E[Markdown Body]\n    B --> F[SHA-256 Hashing]\n    B --> G[Obsidian Export]\n    H[librefang-types] --> B\n```\n\nThe wiki wraps a filesystem-backed store. Each entry is a single markdown file containing a YAML frontmatter block with provenance metadata and a markdown body with the actual content. Content integrity is verified via SHA-256 hashes stored in the frontmatter.\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions used across the LibreFang ecosystem |\n| `serde` / `serde_json` / `serde_yaml` | Serialization of frontmatter and structured content |\n| `chrono` | Timestamp generation for provenance metadata |\n| `sha2` | SHA-256 hashing for content integrity verification |\n| `thiserror` | Ergonomic error types for vault operations |\n| `tracing` | Structured logging of vault operations |\n\n## Core Concepts\n\n### Provenance Frontmatter\n\nEvery wiki entry carries a YAML frontmatter block. This metadata enables auditability and tamper detection. Typical fields include:\n\n- **`created_at`** — ISO 8601 timestamp of when the entry was written.\n- **`updated_at`** — Timestamp of the most recent modification.\n- **`content_hash`** — SHA-256 digest of the markdown body, used to detect corruption or unauthorized edits.\n- **`source`** — Origin of the knowledge (e.g., agent ID, user input, derived reasoning).\n\n### Obsidian-Compatible Export\n\nThe vault produces markdown files compatible with Obsidian's conventions. This means:\n\n- Standard YAML frontmatter delimited by `---`.\n- Wikilink-style cross-references between entries where applicable.\n- Flat or hierarchically organized directory structure that Obsidian can open as a vault.\n\n## Error Handling\n\nAll fallible operations return errors derived from `thiserror`. Expected error categories include:\n\n- **I/O errors** — Filesystem permission issues, missing files, disk full.\n- **Serialization errors** — Malformed frontmatter that cannot be parsed.\n- **Integrity errors** — Content hash mismatches indicating corruption or tampering.\n\nConsumers should handle these gracefully, particularly in long-running agent sessions where the vault is accessed frequently.\n\n## Testing\n\nThe test suite uses `tempfile` to create isolated temporary directories, ensuring tests do not interfere with a real vault. `librefang-kernel-handle` is included as a dev-dependency for integration scenarios that require a kernel context.\n\n## Integration Points\n\nThis module depends on `librefang-types` for shared data structures. It does not make outgoing calls to other LibreFang modules, keeping it self-contained and easy to test in isolation. Other modules consume the wiki by reading from or writing to the vault directory.\n\nWhen integrating:\n\n1. **Initialize the vault** with a root directory path at agent startup.\n2. **Write entries** through the wiki API, which handles frontmatter generation and hashing automatically.\n3. **Read entries** by ID or through search/filter operations.\n4. **Export** the vault directory directly to Obsidian or sync it to external storage.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS. Provides persistent, queryable memory for agents through a unified trait that abstracts over three storage backends: structured key-value (SQLite), semantic text search, and a knowledge graph.\n\n## Architecture\n\nAgents interact with a single `Memory` trait rather than individual storage backends. Implementations of this trait compose the three stores into one `MemorySubstrate`.\n\n```\n┌─────────────────────────────────┐\n│           Memory trait          │\n│  search · add · get · list · …  │\n└──────────────┬──────────────────┘\n               │\n       MemorySubstrate\n               │\n   ┌───────────┼───────────┐\n   ▼           ▼           ▼\n┌──────┐  ┌────────┐  ┌──────────┐\n│Structured│Semantic │  │Knowledge │\n│ (SQLite) │(LIKE /  │  │ (SQLite) │\n│          │Qdrant)  │  │          │\n└──────────┘└────────┘  └──────────┘\n```\n\n## Storage Backends\n\n### Structured Store (`structured`)\n\nSQLite-backed storage for:\n\n- **Key/value pairs** — arbitrary agent state serialized via serde (JSON or MessagePack via `rmp-serde`).\n- **Sessions** — conversation and interaction context scoped to an agent run or user session.\n- **Audit trail** — append-only log of agent actions for traceability.\n\nUses `r2d2` connection pooling (`r2d2_sqlite`) for concurrent access.\n\n### Semantic Store (`semantic`, `http_vector_store`)\n\nFull-text search over stored text. Two paths:\n\n- **Current** — `LIKE`-based search in SQLite. Suitable for development and small deployments.\n- **Vector path** — `http_vector_store` targeting Qdrant for embedding-based similarity search. Not yet the default but available for integration.\n\n### Knowledge Graph (`knowledge`)\n\nSQLite-backed entity-relation store. Agents can record entities (nodes) and typed relations (edges) between them, then query the graph for multi-hop reasoning.\n\n## Proactive Memory (`proactive`)\n\nInspired by mem0, proactive memory automatically decides what to store, when to consolidate, and what to forget. This is the primary high-level API agents should use.\n\n### Core Types\n\n| Type | Role |\n|---|---|\n| `ProactiveMemory` | Unified API: `search`, `add`, `get`, `list`. The main entry point. |\n| `ProactiveMemoryHooks` | Auto-memorize and auto-retrieve hooks. Wire these into an agent's request/response pipeline so memory operations happen transparently. |\n| `ProactiveMemoryStore` | Concrete implementation backed by `MemorySubstrate`. |\n\n### Supporting Modules\n\n- **`chunker`** — Splits incoming text into memory-sized chunks before storage.\n- **`consolidation`** — Merges redundant or near-duplicate memories over time to keep the store clean.\n- **`decay`** — Time-based relevance scoring. Older or less-accessed memories lose priority and may be pruned.\n- **`migration`** — Schema migrations for the underlying SQLite databases. Run on startup to bring the store to the current version.\n- **`namespace_acl`** — Access control per namespace. Ensures agents can only read/write memory they are authorized for.\n- **`prompt`** — Prompt templates for memory-related LLM calls (e.g., deciding whether a piece of text is worth storing).\n- **`provider`** — Abstraction over the LLM provider used by consolidation and relevance scoring.\n- **`roster_store`** — Tracks which agents exist and their capabilities, used for cross-agent memory sharing decisions.\n- **`session`** — Session lifecycle management tied to the structured store.\n\n## Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types exchanged across workspace crates |\n| `tokio` | Async runtime |\n| `rusqlite` (FTS5) | SQLite engine for structured, knowledge, and semantic stores |\n| `r2d2` / `r2d2_sqlite` | Connection pooling |\n| `serde` / `serde_json` / `rmp-serde` | Serialization (JSON and MessagePack) |\n| `chrono` | Timestamps for audit trail and decay |\n| `uuid` | Unique IDs for entities, relations, memory entries |\n| `sha2` | Content hashing for deduplication |\n| `reqwest` | HTTP client for the Qdrant vector store path |\n| `tracing` | Structured logging |\n| `metrics` | Instrumentation counters and histograms |\n\n## Usage\n\n```rust\nuse librefang_memory::proactive::{ProactiveMemory, ProactiveMemoryStore, ProactiveMemoryHooks};\n\n// Create the substrate (backed by SQLite on disk)\nlet substrate = MemorySubstrate::open(\"agent.db\")?;\nlet store = ProactiveMemoryStore::new(substrate);\n\n// Add a memory\nstore.add(\"agent-1\", \"The user prefers dark mode\", None).await?;\n\n// Search\nlet results = store.search(\"agent-1\", \"user preferences\").await?;\n\n// Wire hooks into your agent pipeline for automatic memory\nlet hooks = ProactiveMemoryHooks::new(store);\n// hooks.on_request(...) → auto-retrieve\n// hooks.on_response(...) → auto-memorize\n```\n\n## Database Schema\n\nAll SQLite-backed stores are initialized via the `migration` module on first open. The module tracks the current schema version in a `_meta` table and applies pending migrations sequentially. No manual setup is required — calling `MemorySubstrate::open(path)` handles everything.\n\n## Testing\n\nTests use the `tempfile` crate to create throwaway database files:\n\n```rust\nlet dir = tempfile::tempdir()?;\nlet db_path = dir.path().join(\"test.db\");\nlet substrate = MemorySubstrate::open(&db_path)?;\n// ... run assertions\n```\n\n## Relationship to Other Crates\n\n`librefang-memory` sits below the agent runtime and above `librefang-types`. Agents import the `Memory` trait or `ProactiveMemory` and remain unaware of which backend handles their request. The `librefang-types` crate defines the data structures (entries, entities, relations) that flow through the memory API.","other-librefang-migrate-tests":"# Other — librefang-migrate-tests\n\n# Idempotency & Forward-Compatibility Tests\n\n## Purpose\n\n`tests/idempotency.rs` provides end-to-end integration tests that verify the **filesystem-level contract** of the migrate crate. While the in-crate unit tests in `src/openclaw.rs` check idempotency by asserting `report.imported.is_empty()` on a second run, these tests go further—they snapshot the entire destination directory tree as raw bytes and assert that nothing on disk changes across runs.\n\nThree behaviours are validated:\n\n1. **Second-run is a no-op** — a repeated migration produces a byte-identical destination tree (no duplicate sessions, no clobbered configs, no rewritten timestamps).\n2. **Partial-write recovery** — a migration interrupted mid-write (simulated by deleting a file) can be re-driven to a correct state without corrupting surviving entries.\n3. **Forward compatibility** — the prior major version's `KernelConfig` shape still deserialises and round-trips through `run_migrations`.\n\nThese tests were introduced for issue #3407.\n\n## Test Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Test Fixtures\"\n        OC[write_openclaw_workspace]\n        OF[write_openfang_workspace]\n        FIX[tests/fixtures/legacy_config/config_v1.toml]\n    end\n\n    subgraph \"Snapshot Infrastructure\"\n        ST[snapshot_tree] --> WI[walkdir_iter]\n    end\n\n    subgraph \"Migration Targets\"\n        OM[openclaw::migrate]\n        FM[openfang::migrate]\n        RM[run_migrations]\n    end\n\n    subgraph \"Idempotency Tests\"\n        T1[openclaw_second_run_is_byte_identical]\n        T2[openfang_second_run_is_byte_identical]\n    end\n\n    subgraph \"Recovery Tests\"\n        T3[openclaw_partial_write_is_recoverable]\n        T4[openfang_partial_write_is_recoverable]\n    end\n\n    subgraph \"Forward-Compat Tests\"\n        T5[legacy_v1_config_parses_into_current_kernel_config]\n        T6[legacy_v1_config_migrates_forward_to_current_version]\n    end\n\n    OC --> T1 & T3\n    OF --> T2 & T4\n    T1 & T2 & T3 & T4 --> ST\n    T1 & T3 --> OM\n    T2 & T4 --> FM\n    FIX --> T5 & T6\n    T5 --> KernelConfig\n    T6 --> RM\n```\n\n## Infrastructure Functions\n\n### `snapshot_tree(root: &Path) -> BTreeMap<PathBuf, Vec<u8>>`\n\nReads every regular file under `root` and returns a sorted map from relative path to byte contents. Using `BTreeMap` ensures deterministic iteration order, so `assert_eq!` failures point at the first differing path rather than depending on `HashMap` insertion order. Returns an empty map if `root` doesn't exist.\n\n### `walkdir_iter(root: &Path) -> Vec<PathBuf>`\n\nA small recursive directory walker built on `std::fs::read_dir`. Avoids pulling `walkdir` into dev-dependencies. Symlinks are deliberately ignored since neither migrator produces them. Results are sorted for deterministic ordering.\n\n### `write_openclaw_workspace(dir: &Path)`\n\nCreates a minimal but representative OpenClaw source workspace:\n\n- `openclaw.json` — agent definitions (coder, researcher), channel config (Telegram), memory and session settings\n- `memory/coder/MEMORY.md` — per-agent memory file\n- `sessions/agent_coder_main.jsonl` — a session file (critical for verifying no duplication on re-run)\n\n### `write_openfang_workspace(dir: &Path)`\n\nCreates a minimal OpenFang source workspace:\n\n- `config.toml` — kernel config with `config_version = 2`, API listen address, log level, and a `[default_model]` table\n- `secrets.env` — environment file that must be preserved verbatim\n- `agents/coder/agent.toml` — an agent manifest\n- `data/index.db` — a binary blob\n\n### `opts(source, src, dst) -> MigrateOptions`\n\nHelper that constructs a `MigrateOptions` with `dry_run: false`. Accepts a `MigrateSource` variant and the source/destination paths.\n\n## Test Details\n\n### A. Second-Run Byte-Identity\n\n#### `openclaw_second_run_is_byte_identical`\n\n1. Write an OpenClaw workspace to a temp directory.\n2. Run `openclaw::migrate` and snapshot the destination.\n3. Run migration again; assert `report.imported.is_empty()` (the marker file short-circuits before any writes).\n4. Snapshot the destination again and assert byte-equality with the first snapshot.\n\nThe OpenClaw migrator uses a `.openclaw_migrated` marker file to detect prior runs. This test confirms that the marker's timestamp body is not rewritten on a second invocation.\n\n#### `openfang_second_run_is_byte_identical`\n\n1. Write an OpenFang workspace to a temp directory.\n2. Run `openfang::migrate` and snapshot the destination. Assert something was imported and nothing was skipped.\n3. Run migration again; assert `report.imported.is_empty()` and that every previously-imported entry is now in `report.skipped`.\n4. Assert the two snapshots are byte-identical.\n\nOpenFang migration has no marker file—it relies on per-entry `dest_path.exists()` checks. Each source file should appear as \"skipped: already exists\" on re-run.\n\n### B. Partial-Write Recovery\n\n#### `openclaw_partial_write_is_recoverable`\n\n1. Run a clean migration and snapshot the baseline.\n2. Select a \"victim\" file (prefers an agent manifest like `agent.toml` for `coder`; falls back to any non-marker file).\n3. Delete the victim file **and** the `.openclaw_migrated` marker (simulating a process killed mid-write, before the marker was written).\n4. Re-run migration.\n5. Assert the victim file is recreated with its original byte content.\n6. Assert every other surviving file (excluding the marker, which may have a fresh timestamp) is byte-identical to the baseline.\n\nThis tests the **never-clobber semantics** implemented by `promote_staging` (issue #3795).\n\n#### `openfang_partial_write_is_recoverable`\n\n1. Run a clean migration and snapshot the baseline.\n2. Delete `agents/coder/agent.toml` (a rewritten file, exercising the rewrite path on recovery).\n3. Re-run migration.\n4. Assert the victim file is recreated with identical bytes.\n5. Assert every other file is unchanged.\n\nSince OpenFang has no marker, only the victim file needs to be deleted.\n\n### C. Forward Compatibility\n\nBoth forward-compat tests use the fixture at `tests/fixtures/legacy_config/config_v1.toml`, which represents the minimal v1 `KernelConfig` shape—`config_version = 1` plus an `[api]` table with `api_key`, `api_listen`, and `log_level`. This is the smallest representation that exercises deserialisation and migration; a complete v1 config is not used because the schema surface area makes it impractical to reconstruct.\n\n#### `legacy_v1_config_parses_into_current_kernel_config`\n\nAsserts that the v1 TOML fixture deserialises into the current `KernelConfig` type via `toml::from_str`. Unknown fields (like the `[api]` table) are ignored under `#[serde(default)]`; missing root fields fall back to `Default`. Verifies `config_version == 1`.\n\n#### `legacy_v1_config_migrates_forward_to_current_version`\n\nCalls `run_migrations(&mut raw, 1)` from `librefang_types::config` and asserts:\n\n- The returned version equals `CONFIG_VERSION`.\n- The `[api]` table is removed (hoisted to root level).\n- `api_key`, `api_listen`, and `log_level` appear as top-level keys with their original values.\n\n## Dependencies\n\n| Dependency | Usage |\n|---|---|\n| `librefang_migrate` | The crate under test—provides `openclaw::migrate`, `openfang::migrate`, `MigrateOptions`, `MigrateSource` |\n| `librefang_types` | Provides `config::KernelConfig`, `config::run_migrations`, `config::CONFIG_VERSION` for forward-compat tests |\n| `tempfile` | `TempDir` for isolated source/destination directories |\n| `toml` | Parsing the legacy fixture and inspecting migrated `toml::Value` |\n\n## Running\n\n```sh\n# All idempotency tests\ncargo test -p librefang-migrate --test idempotency\n\n# Individual tests\ncargo test -p librefang-migrate --test idempotency openclaw_second_run_is_byte_identical\ncargo test -p librefang-migrate --test idempotency openfang_partial_write_is_recoverable\ncargo test -p librefang-migrate --test idempotency legacy_v1_config_migrates_forward_to_current_version\n```","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing configurations, agents, and data from other agent frameworks into LibreFang.\n\n## Overview\n\n`librefang-migrate` provides tooling to bridge existing agent framework installations into the LibreFang ecosystem. It handles parsing foreign configuration formats, converting data structures to LibreFang-native types, and orchestrating the import process.\n\n## Purpose\n\nWhen adopting LibreFang, teams often have existing agent configurations, dialogue histories, or tool definitions housed in other frameworks. This module eliminates manual translation by:\n\n- **Discovering** source framework artifacts on the filesystem\n- **Parsing** configuration and data files across multiple formats (JSON, YAML, TOML, JSON5)\n- **Converting** parsed structures into `librefang-types` equivalents\n- **Reporting** migration issues with structured error handling\n\n## Dependency Rationale\n\nThe crate's dependencies reveal its design:\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Target type definitions — all migrated data is expressed using these shared types |\n| `serde` / `serde_json` / `serde_yaml` / `json5` / `toml` | Multi-format deserialization. Most agent frameworks use one of JSON, YAML, TOML, or JSON5 for configuration |\n| `walkdir` | Recursive directory traversal to discover source framework files |\n| `thiserror` | Typed, ergonomic error definitions for migration failures |\n| `tracing` | Instrumentation for migration progress and diagnostics |\n| `chrono` | Timestamp parsing and conversion during import |\n| `dirs` | Resolving standard platform directories (e.g., locating default framework config paths) |\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Source Framework Files] --> B[File Discovery<br/>walkdir]\n    B --> C[Format Detection &<br/>Deserialization]\n    C --> D[Type Conversion<br/>→ librefang-types]\n    D --> E[Migration Output]\n    C -->|parse failure| F[MigrationError<br/>thiserror]\n    D -->|validation failure| F\n```\n\nThe migration pipeline follows a linear flow: discover files in a source directory, deserialize each according to its detected format, convert the resulting structures into LibreFang types, and write the output. Errors at any stage are captured as `MigrationError` variants.\n\n## Integration with LibreFang\n\nThis module sits at the edge of the LibreFang workspace. It depends on `librefang-types` for its output contract but is not depended upon by any other crate. It is intended to be used as a CLI tool or a one-time setup utility, not as a runtime dependency.\n\n## Testing\n\nTests use `tempfile` (listed under `[dev-dependencies]`) to create isolated directory trees that simulate source framework layouts, ensuring migration logic works against realistic file structures without side effects.","other-librefang-runtime-mcp-tests":"# Other — librefang-runtime-mcp-tests\n\n# HttpCompat Integration Tests\n\n## Overview\n\nThe `http_compat_integration.rs` test module validates the `HttpCompat` MCP transport end-to-end against a real HTTP server (`wiremock`). `HttpCompat` is the simplest MCP transport: it maps statically-declared tool calls onto plain HTTP/JSON requests to a user-supplied base URL, without performing an MCP `initialize` handshake. This makes it the ideal integration test entry point since no actual MCP-protocol-speaking peer is required.\n\n## What Is Being Tested\n\nThe tests verify three critical behaviors that downstream consumers (the agent loop, dashboard, and tool dispatch) depend on:\n\n1. **Tool registration with namespacing** — `McpConnection::connect` succeeds and registers declared tools under the `mcp_<server>_<tool>` naming convention.\n2. **Tool invocation with path rendering** — `call_tool` issues a real HTTP request, interpolates path-template parameters from arguments, forwards remaining arguments as query parameters or JSON body, applies configured headers, and returns the backend response verbatim.\n3. **Unknown tool rejection** — calling a tool that was never registered returns a descriptive error rather than silently issuing an unrelated request.\n\n## Test Fixtures\n\n### `http_compat_config`\n\n```rust\nfn http_compat_config(base_url: String, tools: Vec<HttpCompatToolConfig>) -> McpServerConfig\n```\n\nBuilds a complete `McpServerConfig` configured with:\n\n- **Server name**: `\"test-server\"` — used as the namespace prefix for all tool names.\n- **Transport**: `McpTransport::HttpCompat` with a static `x-test-token` header (`\"integration-fixture\"`) attached to every request.\n- **Timeout**: 5 seconds.\n- **Taint scanning**: disabled, with an empty rule set handle from `empty_taint_rule_sets_handle()`.\n\nAll three test cases share this fixture to avoid duplicating boilerplate.\n\n### `weather_tool`\n\n```rust\nfn weather_tool() -> HttpCompatToolConfig\n```\n\nA representative tool configuration modeled as a weather lookup:\n\n| Field | Value |\n|---|---|\n| `name` | `\"get_weather\"` |\n| `path` | `\"/weather/{city}\"` |\n| `method` | `GET` |\n| `request_mode` | `Query` |\n| `response_mode` | `Json` |\n| `input_schema` | `{ city: string (required), units: string }` |\n\nThe `{city}` path template is the key detail — the driver must extract `city` from the call arguments, URL-encode it, interpolate it into the path, and consume that key so only `units` remains for the query string.\n\n## Test Cases\n\n### `http_compat_connect_registers_namespaced_tools`\n\n**Verifies**: `McpConnection::connect` succeeds and the tool appears in the connection's tool list under its namespaced name.\n\nThe test mounts a catch-all `GET /` mock (the connectivity probe fired during connect — failure is acceptable, but 200 is used here), then asserts:\n\n- The connection's tool list contains `mcp_test-server_get_weather` (produced by `format_mcp_tool_name(\"test-server\", \"get_weather\")`).\n- `conn.name()` returns `\"test-server\"`.\n\n**Why this matters**: The agent loop and tool dispatch key entirely on the prefixed `mcp_<server>_<tool>` form. A regression here breaks tool routing end-to-end.\n\n### `http_compat_call_tool_renders_path_and_returns_body`\n\n**Verifies**: `call_tool` renders path templates, strips consumed keys from the argument map, forwards remaining keys as query parameters, includes configured headers, and returns the response body.\n\nWiremock expectations:\n\n```\nGET /weather/Paris?units=metric\nHeader: x-test-token: integration-fixture\n→ 200 {\"city\": \"Paris\", \"tempC\": 18}\n```\n\nThe test calls `call_tool` with arguments `{\"city\": \"Paris\", \"units\": \"metric\"}` and asserts the response string contains `\"city\"`, `\"Paris\"`, and `\"18\"`.\n\n**Why this matters**: This exercises the full HTTP request pipeline — path interpolation, argument consumption, query serialization, header injection, and response forwarding — all against a real HTTP round-trip.\n\n### `http_compat_call_tool_unknown_name_errors`\n\n**Verifies**: Calling a tool name that was never registered fails with an error message mentioning the missing tool.\n\nThe test calls `call_tool(\"mcp_test-server_does_not_exist\", {})` and asserts the error string contains `\"not found\"`, `\"unknown\"`, or `\"does not exist\"`.\n\n**Why this matters**: Prevents silent misrouting where a typo in a tool name could cause an unrelated HTTP request to an unintended endpoint.\n\n## Execution Flow\n\n```mermaid\nsequenceDiagram\n    participant Test\n    participant wiremock\n    participant McpConnection\n\n    Test->>wiremock: Mount GET / mock (probe)\n    Test->>McpConnection: connect(config)\n    McpConnection->>wiremock: GET / (connectivity probe)\n    McpConnection-->>Test: Connection with registered tools\n\n    Test->>McpConnection: call_tool(\"mcp_test-server_get_weather\", args)\n    McpConnection->>wiremock: GET /weather/Paris?units=metric\n    wiremock-->>McpConnection: 200 {\"city\":\"Paris\",\"tempC\":18}\n    McpConnection-->>Test: Response body string\n```\n\n## Dependencies on Production Code\n\n| Symbol | Source | Purpose |\n|---|---|---|\n| `McpConnection` | `librefang-runtime-mcp` | The connection struct under test |\n| `McpServerConfig` | `librefang-runtime-mcp` | Configuration type for the server |\n| `McpTransport::HttpCompat` | `librefang-runtime-mcp` | The transport variant being tested |\n| `format_mcp_tool_name` | `librefang-runtime-mcp` | Produces the `mcp_<server>_<tool>` namespaced name |\n| `empty_taint_rule_sets_handle` | `librefang-runtime-mcp` | Provides a no-op taint rule set for test configs |\n| `HttpCompatToolConfig` | `librefang-types` | Per-tool declaration (path, method, schema) |\n| `HttpCompatHeaderConfig` | `librefang-types` | Static header injection config |\n| `HttpCompatMethod` / `HttpCompatRequestMode` / `HttpCompatResponseMode` | `librefang-types` | Enums for HTTP method, request serialization, and response handling |\n\n## Running\n\n```bash\n# Run just this test file\ncargo test -p librefang-runtime-mcp --test http_compat_integration\n\n# Run with output visible\ncargo test -p librefang-runtime-mcp --test http_compat_integration -- --nocapture\n```\n\nNo external services or environment variables are required — `wiremock` provides the HTTP server in-process.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This crate provides the integration layer that allows the LibreFang runtime to communicate with MCP-compatible tool servers, enabling dynamic tool discovery and invocation.\n\n## Purpose\n\nThe Model Context Protocol standardizes how applications expose tools and resources to AI models and other consumers. This crate acts as the **client side** of that protocol within the LibreFang ecosystem — it connects to MCP servers, discovers available tools, and executes tool calls on behalf of the runtime.\n\n## Architecture\n\n```\n┌─────────────────────┐\n│  LibreFang Runtime   │\n│                     │\n│  (orchestration,    │\n│   agent logic)      │\n└────────┬────────────┘\n         │ calls into\n         ▼\n┌─────────────────────┐       ┌─────────────────────┐\n│ librefang-runtime-  │  MCP  │   External MCP       │\n│       mcp           │◄─────►│   Tool Servers       │\n│                     │       │                     │\n│  client management, │       │  (file systems, DBs, │\n│  tool discovery,    │       │   APIs, custom tools)│\n│  invocation         │       └─────────────────────┘\n└─────────────────────┘\n```\n\n## Key Dependencies\n\n| Dependency | Role |\n|---|---|\n| `rmcp` | Rust MCP client library — handles the low-level MCP protocol mechanics (transport, message framing, handshake) |\n| `librefang-types` | Shared type definitions used across LibreFang crates |\n| `librefang-http` | HTTP client infrastructure, used for SSE-based MCP transports |\n| `reqwest` | Underlying HTTP client for network communication |\n| `arc-swap` | Lock-free atomic swapping of client state, enabling live reconnection or server rotation without blocking |\n| `sha2`, `base64` | Cryptographic hashing and encoding, likely used for message integrity or authentication tokens |\n| `rand` | Random number generation, likely for request IDs or nonce generation |\n| `url` | URL parsing and construction for MCP server endpoints |\n\n## Transport Layer\n\nMCP supports multiple transport mechanisms. Based on the dependency profile, this crate supports:\n\n- **HTTP/SSE (Server-Sent Events)** — the `reqwest` + `http` + `librefang-http` stack handles bidirectional communication over HTTP, with SSE for server-to-client streaming of tool results and notifications.\n- **Stdio** — if `rmcp` provides stdio transport, local MCP server processes can be spawned and communicated with via stdin/stdout.\n\n## Concurrency Model\n\nThe use of `arc-swap` indicates that MCP client instances are managed behind atomic references. This enables:\n\n- **Hot-swapping** of client connections when a server disconnects or needs to be rotated.\n- **Lock-free reads** — tool invocations from multiple concurrent tasks can access the active client without acquiring a mutex.\n- **Live reconfiguration** — updating the set of connected MCP servers without stopping the runtime.\n\nAll operations are fully async, built on `tokio`.\n\n## Error Handling\n\nErrors are structured through `thiserror`, providing typed error variants for:\n\n- Connection failures and transport errors\n- Tool invocation failures (tool not found, execution error)\n- Protocol-level errors (handshake failure, unsupported capability)\n- Serialization/deserialization errors\n\nTracing is integrated via the `tracing` crate, emitting structured spans for connection lifecycle events, tool calls, and error conditions.\n\n## Testing\n\nThe dev-dependency on `wiremock` enables mock HTTP servers for integration tests, allowing verification of MCP protocol interactions without requiring a real MCP server. Tests use `tokio` with the `macros` and `rt-multi-thread` features for async test functions.\n\n## Relationship to Other Crates\n\nThis crate is consumed by the main LibreFang runtime (or an agent runtime module) when it needs to interact with external tools. It sits between the high-level agent orchestration logic and the network layer:\n\n- **Downstream consumers**: The runtime calls into this crate to discover and invoke tools.\n- **Upstream dependencies**: This crate relies on `librefang-types` for shared data structures and `librefang-http` for HTTP transport infrastructure, keeping the MCP-specific logic self-contained.","other-librefang-runtime-oauth":"# Other — librefang-runtime-oauth\n\n# librefang-runtime-oauth\n\nOAuth authentication flows for LibreFang runtime drivers, providing token acquisition and refresh for third-party AI services such as ChatGPT and GitHub Copilot.\n\n## Purpose\n\nLibreFang integrates with proprietary AI backends that require OAuth-based authentication. This module encapsulates the complexity of those flows—PKCE generation, token exchange, refresh management, and secure credential handling—so that individual runtime drivers don't each need to reimplement the same OAuth machinery.\n\nThe crate is consumed by runtime drivers (e.g., the ChatGPT driver, the GitHub Copilot driver) as a shared dependency. Drivers call into this module to obtain valid access tokens, then pass those tokens to the HTTP layer when making API requests.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Runtime Driver] -->|requests token| B[librefang-runtime-oauth]\n    B -->|HTTP calls| C[librefang-http / reqwest]\n    B -->|reads/writes| D[librefang-types]\n    B -->|PKCE + secrets| E[Crypto Utilities]\n    E --> F[sha2 / base64 / rand / hex]\n    E --> G[zeroize]\n    A -->|token| H[AI Service API]\n```\n\n## Key Dependencies and Their Roles\n\n### OAuth Protocol Support\n\n| Dependency | Role |\n|---|---|\n| `sha2` | SHA-256 hashing for PKCE `code_challenge` derivation |\n| `base64` | URL-safe Base64 encoding of the code verifier and challenge |\n| `rand` | Cryptographically secure random generation of the `code_verifier` |\n| `hex` | Hex encoding for intermediate hash representations |\n\nThese four crates together form the standard PKCE (Proof Key for Code Exchange) pipeline. The typical flow is:\n\n1. Generate a random `code_verifier` using `rand`.\n2. Hash the verifier with SHA-256 via `sha2`.\n3. Base64url-encode the hash to produce the `code_challenge`.\n4. Send the challenge during the authorization request; present the original verifier during the token exchange.\n\n### Secure Credential Handling\n\n| Dependency | Role |\n|---|---|\n| `zeroize` | Ensures sensitive values (tokens, secrets, verifiers) are overwritten in memory when dropped, reducing the window for memory-scraping attacks |\n\nAny struct holding bearer tokens, refresh tokens, or client secrets should derive or implement `Zeroize` so that deallocation doesn't leave credentials in process memory.\n\n### HTTP Communication\n\n| Dependency | Role |\n|---|---|\n| `reqwest` | Underlying HTTP client for token endpoint requests |\n| `librefang-http` | LibreFang's HTTP abstraction layer; provides shared client configuration, retry policies, and proxy support |\n| `tokio` | Async runtime backing the HTTP calls |\n\nToken exchange and refresh calls go through `librefang-http` where possible, ensuring consistent TLS configuration, user-agent headers, and proxy handling across the application.\n\n### Serialization and Error Handling\n\n| Dependency | Role |\n|---|---|\n| `serde` / `serde_json` | Deserializing token endpoint responses and serializing request bodies |\n| `thiserror` | Ergonomic error types for OAuth-specific failure modes |\n| `tracing` | Structured logging of flow progress and failures (without logging secrets) |\n\n### Internal Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared type definitions—likely includes OAuth configuration structs, token response types, or credential types used across crates |\n\n## Integration Points\n\nThis module sits between the driver layer and the HTTP layer:\n\n- **Upstream consumers**: Runtime drivers for ChatGPT and GitHub Copilot. A driver calls this module when it needs to authenticate before making API requests.\n- **Downstream dependencies**: `librefang-http` and `reqwest` for outbound HTTP calls to OAuth token endpoints; `librefang-types` for shared data structures.\n\n## Security Considerations\n\n- **No credential logging**: The `tracing` integration should log flow state transitions (e.g., \"starting device code flow\", \"token refreshed\") but must never log `code_verifier`, `access_token`, or `refresh_token` values.\n- **Zeroize on drop**: All intermediate and final credential values should use types that implement `Zeroize` to minimize exposure in process memory.\n- **PKCE mandatory**: The dependency profile (sha2 + base64 + rand) indicates PKCE is used, which protects against authorization code interception attacks—critical for desktop/application flows where a client secret cannot be safely stored.","other-librefang-runtime-tests":"# Other — librefang-runtime-tests\n\n# librefang-runtime-tests\n\nIntegration test suite for `librefang-runtime`. Tests exercise the crate's public APIs end-to-end without requiring a live kernel, LLM driver, or external se
