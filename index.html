v_key(\"GITHUB_TOKEN\", \"ghp_...\")?;\n\n// Remove\ndotenv::remove_env_key(\"GITHUB_TOKEN\")?;\n\n// Query\nlet keys = dotenv::list_env_keys();\nlet exists = dotenv::env_file_exists();\n```\n\n**Escaping rules:** Values are written double-quoted when they contain spaces, `#`, `\"`, `\\`, newlines, or `=`. Escape sequences inside double quotes: `\\\\` → `\\`, `\\n` → newline, `\\r` → carriage return, `\\\"` → `\"`. Single-quoted values are literal (no escape processing).\n\n### Home directory resolution\n\n`$LIBREFANG_HOME` env var overrides the default `~/.librefang`. All file paths are derived from this root.\n\n---\n\n## MCP Catalog (`catalog.rs`)\n\nRead-only in-memory index of MCP server templates cached at `~/.librefang/mcp/catalog/`. Refreshed from the upstream `librefang-registry` by `librefang_runtime::registry_sync`.\n\n### Template file layouts\n\nTwo formats are recognized:\n\n- **Flat**: `<catalog_dir>/<id>.toml` — ID from filename\n- **Directory**: `<catalog_dir>/<id>/MCP.toml` — ID from directory name (for multi-file MCP packages)\n\n`load()` performs a full reload (clears existing entries first) to avoid stale entries lingering after deletion or rename.\n\n### Query API\n\n```rust\nlet mut catalog = McpCatalog::new(&home);\nlet count = catalog.load(&home);\n\nlet entry = catalog.get(\"github\");\nlet all = catalog.list();                    // sorted by ID\nlet tools = catalog.list_by_category(&McpCategory::DevTools);\nlet results = catalog.search(\"search\");      // matches id, name, description, tags\n```\n\nInstalled MCP servers reference catalog entries via an optional `template_id` field in their `[[mcp_servers]]` config.\n\n---\n\n## Health Monitor (`health.rs`)\n\nThread-safe health tracker for configured MCP servers, backed by a `DashMap<String, McpHealth>`.\n\n### Reconnect backoff\n\nExponential backoff: 5s → 10s → 20s → 40s → ... → capped at 5 minutes. Maximum 10 reconnect attempts before giving up (configurable via `HealthMonitorConfig`).\n\n### Core API\n\n```rust\nlet monitor = HealthMonitor::new(HealthMonitorConfig::default());\n\nmonitor.register(\"github\");\nmonitor.report_ok(\"github\", 12);              // 12 tools available\nmonitor.report_error(\"slack\", \"Connection refused\".into());\nmonitor.mark_reconnecting(\"slack\");\n\nlet health = monitor.get_health(\"github\");     // Option<McpHealth>\nlet should = monitor.should_reconnect(\"slack\"); // bool\nlet backoff = monitor.backoff_duration(3);     // Duration\nlet all = monitor.all_health();                // Vec<McpHealth>\n\nmonitor.unregister(\"github\");\n```\n\nThe `HealthMonitor` is consumed by the kernel's background health-check task and by `src/routes/skills.rs` which queries `get_health()` to surface extension status in the API.\n\n---\n\n## OAuth2 PKCE (`oauth.rs`)\n\nImplements the complete Authorization Code + PKCE flow for Google, GitHub, Microsoft, and Slack. Launches a temporary localhost HTTP server, opens the browser, receives the callback, and exchanges the code for tokens.\n\n### State token security (#3791)\n\nThe `state` parameter is HMAC-SHA256 signed and binds to the triple `(provider auth_url, client_id, redirect_uri)` plus a random nonce and absolute expiry (10 minutes). Verification rejects:\n\n- Bad HMAC (tampering)\n- Expired tokens\n- Provider mismatch (cross-flow injection)\n- Client ID mismatch\n- Redirect URI mismatch (listener swap)\n- Nonce mismatch (replay)\n- Duplicate callbacks (first-wins, subsequent get \"Gone\")\n\nThe HMAC key is process-local and re-seeded on every daemon restart, invalidating any in-flight flows from a prior process.\n\n### Core API\n\n```rust\nlet tokens = oauth::run_pkce_flow(&template, \"my-client-id\").await?;\n// tokens.access_token, tokens.refresh_token, tokens.expires_in, tokens.scope\n\n// Client ID resolution (defaults + config overrides)\nlet ids = oauth::resolve_client_ids(&oauth_config);\n```\n\n---\n\n## Installer (`installer.rs`)\n\nPure-transform functions that convert a catalog entry + provided credentials into a `McpServerConfigEntry` suitable for persisting into `config.toml`. **No side effects** — callers decide when to store the result.\n\n### `install_integration` flow\n\n1. Look up the template in the catalog by ID\n2. Store any user-provided credentials in the vault (best-effort)\n3. Check which required env vars still have no credential\n4. Build the `McpServerConfigEntry` (transport, env list, OAuth config)\n5. Return an `InstallResult` with status (`Ready` or `Setup`), missing credentials, and a user-facing message\n\n```rust\nlet result = install_integration(&catalog, &mut resolver, \"github\", &provided_keys)?;\n// result.id, result.server (McpServerConfigEntry), result.status, result.missing_credentials\n```\n\n### Scaffold generators\n\n- `scaffold_integration(dir)` — creates a `mcp.toml` template for a custom MCP server\n- `scaffold_skill(dir)` — creates `skill.toml` + `SKILL.md` for a custom skill\n\n---\n\n## HTTP Client (`http_client.rs`)\n\nShared `reqwest::ClientBuilder` preconfigured with:\n\n- Native CA roots (falling back to bundled `webpki-roots` if none found)\n- `rustls` with `aws_lc_rs` crypto provider\n- 10s connect timeout, 30s read timeout (prevents hung requests / SSRF amplification)\n- Max 5 redirects (prevents redirect-loop amplification)\n\nUse `new_client()` for a ready-built `reqwest::Client`, or `client_builder()` to customize before building.\n\n---\n\n## Error Handling\n\nAll errors flow through `ExtensionError`:\n\n| Variant | Meaning |\n|---------|---------|\n| `NotFound(id)` | Catalog entry doesn't exist |\n| `AlreadyInstalled(id)` | Server already in config |\n| `NotInstalled(id)` | Server not in config |\n| `CredentialNotFound(key)` | No source has this key |\n| `Vault(msg)` | Vault I/O or crypto error |\n| `VaultLocked` | No master key available |\n| `VaultKeyMismatch { hint }` | Sentinel verification failed — wrong key |\n| `OAuth(msg)` | OAuth flow error |\n| `TomlParse(msg)` | Catalog TOML parse error |\n| `Io(err)` | Filesystem error |\n| `Http(msg)` | HTTP request error |\n| `HealthCheck(msg)` | MCP health check failure |\n\n---\n\n## Integration Points\n\n- **Boot path**: `load_dotenv()` is called from `librefang-desktop`'s `main()` and `lib.rs` before the tokio runtime starts.\n- **API server**: `resolve_dashboard_credential()` in `librefang-api` calls `vault.unlock()` then `vault.get()` for auth token validation on every request.\n- **Skills routes**: `get_health()` is queried by `status_str_for_catalog`, `get_extension`, and `list_extensions` in `src/routes/skills.rs`.\n- **TUI**: `init_wizard::run()` and `free_provider_guide::submit_key()` call `save_env_key()` to persist user-supplied API keys.\n- **CLI**: `vault_rotate_key` integration tests exercise `init_with_key`, `set`, `rewrap_with_new_key`, `verify_or_install_sentinel`, and `iter_all_entries`.","hands-framework":"# Hands Framework\n\n# LibreFang Hands Framework\n\n## Overview\n\nA **Hand** is a curated, domain-complete autonomous agent package. Unlike regular agents that users converse with directly, Hands work autonomously in the background — the user checks in on them rather than driving every interaction. Users discover and activate Hands from a marketplace.\n\nThe Hands framework provides:\n\n- **Definition types** — the schema for HAND.toml configuration files\n- **TOML parsing** — with backward-compatible legacy format support and agent template inheritance\n- **Runtime registry** — thread-safe (`Send + Sync`) in-memory store for definitions and active instances, with crash-safe persistence\n- **Requirement checking** — pre-activation validation of binaries, environment variables, and API keys\n- **Settings resolution** — user-facing configuration with prompt generation for agent system prompts\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[HAND.toml + SKILL.md] -->|parse_hand_toml| B[HandDefinition]\n    C[Agent Template: agents/name/agent.toml] -->|base reference| B\n    B -->|register| D[HandRegistry]\n    D -->|activate| E[HandInstance]\n    E -->|persist_state| F[hand_state.json]\n    F -->|load_state on restart| D\n    D -->|kernel spawns agents| G[AgentId per role]\n    G -->|set_agents| E\n```\n\n## Core Concepts\n\n### Hand vs. Agent\n\n| Concept | Role |\n|---------|------|\n| **HandDefinition** | Static blueprint — parsed from HAND.toml. Describes what the hand does, what it needs, and its agent configuration. |\n| **HandInstance** | Runtime record — one active incarnation of a definition. Tracks spawned agent IDs, user config, status, and timestamps. |\n| **AgentManifest** | The actual agent specification (model, prompt, tools) — embedded inside a hand definition, one per role. |\n\n### Single-Agent vs. Multi-Agent\n\nHands support two TOML formats:\n\n**Single-agent** (`[agent]` section) — auto-converted to `{\"main\": ...}` with `coordinator = true`:\n\n```toml\n[agent]\nname = \"clip-agent\"\nsystem_prompt = \"You edit video clips.\"\n```\n\n**Multi-agent** (`[agents.<role>]` sections) — each role gets its own agent, one marked as coordinator:\n\n```toml\n[agents.planner]\ncoordinator = true\nname = \"planner-agent\"\nsystem_prompt = \"You plan tasks.\"\n\n[agents.worker]\nname = \"worker-agent\"\nsystem_prompt = \"You execute tasks.\"\n```\n\nThe coordinator is the agent that receives user messages. If no agent is explicitly marked `coordinator = true`, the first agent by role name (BTreeMap order) is used.\n\n## Hand Definition (HAND.toml)\n\n### Full Schema\n\n```toml\nid = \"clip\"\nversion = \"1.2.0\"\nname = \"Clip Maker\"\ndescription = \"Autonomous video clipping from transcripts\"\ncategory = \"content\"        # content|security|productivity|development|communication|data|finance|other\nicon = \"🎬\"\ntools = [\"shell_exec\", \"fs_read\", \"fs_write\"]\nskills = [\"video_processing\"]\nmcp_servers = []\nallowed_plugins = []\n\n[routing]\naliases = [\"video editor\", \"clip maker\"]\nweak_aliases = [\"cut video\", \"trim\"]\n\n[metadata]\nfrequency = \"periodic\"             # continuous|periodic|on-demand|daily|hourly\ntoken_consumption = \"medium\"       # low|medium|high\ndefault_active = false\nactivation_warning = \"Uses GPU acceleration\"\n\n[[requires]]\nkey = \"ffmpeg\"\nlabel = \"FFmpeg\"\nrequirement_type = \"binary\"        # binary|env_var|api_key|any_env_var\ncheck_value = \"ffmpeg\"\ndescription = \"Core video processing engine\"\noptional = false\n\n[requires.install]\nmacos = \"brew install ffmpeg\"\nwindows = \"winget install Gyan.FFmpeg\"\nlinux_apt = \"sudo apt install ffmpeg\"\nmanual_url = \"https://ffmpeg.org/download.html\"\nestimated_time = \"2-5 min\"\nsteps = [\"Download from ffmpeg.org\", \"Add to PATH\"]\n\n[[settings]]\nkey = \"stt_provider\"\nlabel = \"STT Provider\"\ndescription = \"Speech-to-text engine\"\nsetting_type = \"select\"            # select|text|toggle\ndefault = \"auto\"\n\n[[settings.options]]\nvalue = \"groq\"\nlabel = \"Groq Whisper\"\nprovider_env = \"GROQ_API_KEY\"\n\n[[settings.options]]\nvalue = \"local\"\nlabel = \"Local Whisper\"\nbinary = \"whisper\"\n\n[[dashboard.metrics]]\nlabel = \"Clips Created\"\nmemory_key = \"clips_count\"\nformat = \"number\"                  # number|duration|bytes|percentage|text|date\n\n# Single-agent format:\n[agent]\nname = \"clip-agent\"\nsystem_prompt = \"You create video clips.\"\n\n# --- OR multi-agent format: ---\n[agents.planner]\ncoordinator = true\nbase = \"my-writer\"                 # optional template reference\nname = \"planner-agent\"\nsystem_prompt = \"You plan clipping tasks.\"\n\n[agents.encoder]\nname = \"encoder-agent\"\nsystem_prompt = \"You encode video.\"\n\n# Localization:\n[i18n.zh]\nname = \"视频剪辑\"\ndescription = \"自主视频剪辑\"\n\n[i18n.zh.agents.planner]\nname = \"规划器\"\n\n[i18n.zh.settings.stt_provider]\nlabel = \"语音转文字引擎\"\n```\n\n### Agent Template Inheritance (`base` field)\n\nMulti-agent entries can reference a shared agent template via `base = \"<template_name>\"`. The template is loaded from `{agents_dir}/{template_name}/agent.toml`, and the hand's inline fields are deep-merged on top (hand values win).\n\nThis is only available in the `[agents.<role>]` format — the single-agent `[agent]` section does not support `base`. Template resolution requires filesystem access, so it's only available through `parse_hand_definition` or `install_from_path`, not through `install_from_content` (API-only installs without an agents directory).\n\nPath traversal is prevented: template names containing `..`, `/`, or `\\` are rejected.\n\n### Legacy Format Compatibility\n\nOlder HAND.toml files may use flat model fields at the top level of `[agent]`:\n\n```toml\n# Legacy flat format\n[agent]\nname = \"old-agent\"\nprovider = \"openai\"\nmodel = \"gpt-4\"\nsystem_prompt = \"...\"\nmax_tokens = 4096\ntemperature = 0.7\n```\n\nThe parser detects this automatically and converts it to the nested `ModelConfig` structure. The `provider` and `model` fields default to `\"default\"` — a sentinel resolved by the kernel to the user's global default model, so hands don't pin themselves to a specific provider.\n\n### Wrapped `[hand]` Format\n\nHAND.toml files can also use a wrapper where all fields sit under a `[hand]` section. Both formats are tried during parsing; the one that succeeds is used.\n\n## Core Types Reference\n\n### `HandDefinition`\n\nThe parsed, immutable blueprint. Key fields:\n\n| Field | Purpose |\n|-------|---------|\n| `id` | Unique identifier (e.g. `\"clip\"`) |\n| `agents` | `BTreeMap<String, HandAgentManifest>` — agent configs keyed by role name |\n| `requires` | Prerequisites checked before activation |\n| `settings` | User-configurable options shown in the activation modal |\n| `dashboard` | Metrics schema for the hand's dashboard view |\n| `routing` | Keywords for deterministic hand selection |\n| `skill_content` | Bundled SKILL.md content (populated at load, not in TOML) |\n| `agent_skill_content` | Per-role SKILL content from `SKILL-{role}.md` files |\n| `i18n` | Localized strings keyed by language code |\n\nKey methods:\n\n- **`coordinator()`** → returns the coordinator agent (explicitly marked, or first by role name)\n- **`agent()`** → backward-compatible single-agent accessor\n- **`is_multi_agent()`** → true when more than one agent is defined\n\n### `HandInstance`\n\nRuntime state of an activated hand. Tracks:\n\n- `instance_id` — UUID (random, or restored from persistence)\n- `status` — `Active`, `Paused`, `Error(String)`, or `Inactive`\n- `agent_ids` — `BTreeMap<String, AgentId>` mapping roles to spawned agents\n- `coordinator_role` — which role receives user messages\n- `config` — user-provided setting overrides\n- `agent_runtime_overrides` — per-role model/provider overrides from the dashboard\n- `activated_at` / `updated_at` — timestamps preserved across restarts\n\n### `HandAgentManifest`\n\nWraps an `AgentManifest` with hand-specific fields:\n\n- `coordinator: bool` — whether this agent receives user messages\n- `invoke_hint: Option<String>` — dispatch hint for other agents\n- `base: Option<String>` — template reference (if any)\n\n### `HandAgentRuntimeOverride`\n\nPer-role runtime overrides that survive daemon restarts:\n\n```rust\npub struct HandAgentRuntimeOverride {\n    pub model: Option<String>,\n    pub provider: Option<String>,\n    pub api_key_env: Option<Option<String>>,\n    pub base_url: Option<Option<String>>,\n    pub max_tokens: Option<u32>,\n    pub temperature: Option<f32>,\n    pub web_search_augmentation: Option<WebSearchAugmentationMode>,\n}\n```\n\n`None` means \"use the definition's default.\" `Some(None)` for `api_key_env`/`base_url` means \"explicitly clear it.\"\n\n## Parsing Pipeline\n\n```mermaid\ngraph LR\n    A[TOML string] -->|toml::from_str| B[HandDefinitionRaw]\n    B -->|build_hand_from_raw| C{agents section?}\n    C -->|yes| D[parse_multi_agent_entry per role]\n    C -->|no, agent section| E[parse_single_agent_section]\n    D -->|has base?| F[load template + deep_merge_toml]\n    F --> G[parse_single_agent_section]\n    E --> H[HandDefinition]\n    G --> H\n```\n\n### Key Functions\n\n**`parse_hand_definition(toml_content, agents_dir)`** — Filesystem-aware parser. Resolves `base` template references when `agents_dir` is provided. This is the path used by `install_from_path` and `reload_from_disk`.\n\n**`parse_hand_toml_with_agents_dir(toml_content, skill_content, agent_skill_content, agents_dir)`** — Higher-level entry point that attaches skill content after parsing. Tries flat format first, then wrapped `[hand]` format on failure.\n\n**`parse_multi_agent_entry(role, value, agents_dir)`** — Parses a single `[agents.<role>]` entry. Extracts `coordinator`, `invoke_hint`, `base`, then parses the agent manifest with legacy fallback.\n\n**`deep_merge_toml(base, overlay)`** — Recursive table merge. Overlay scalars and arrays replace base values; tables are merged recursively.\n\n**`normalize_flat_to_nested(value)`** — Moves legacy top-level model fields (`provider`, `model`, `system_prompt`, etc.) into a `[model]` sub-table so deep-merge works correctly.\n\n## HandRegistry\n\nThread-safe registry using `DashMap` for lock-free concurrent reads and `Mutex` for serializing mutations that must be atomic.\n\n### Data Structures\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `definitions` | `DashMap<String, HandDefinition>` | All known hand blueprints |\n| `instances` | `DashMap<Uuid, HandInstance>` | Active + paused + errored instances |\n| `agent_index` | `DashMap<String, Uuid>` | Reverse lookup: agent ID string → instance ID |\n| `active_index` | `DashMap<String, Uuid>` | Reverse lookup: hand ID → active instance ID |\n| `activate_lock` | `Mutex<()>` | Serializes check-then-insert for activation |\n| `persist_lock` | `Mutex<()>` | Serializes disk writes |\n\n### Installation Methods\n\n| Method | Source | Base Templates | Persists to Disk |\n|--------|--------|----------------|------------------|\n| `install_from_path` | Directory with HAND.toml | ✅ | No |\n| `install_from_content` | Raw TOML string | ❌ (rejected) | No |\n| `install_from_content_persisted` | Raw TOML string | ✅ | Yes (`workspaces/{id}/`) |\n| `reload_from_disk` | Scans `registry/hands/` + `workspaces/` | ✅ | No |\n\n`install_from_content` explicitly rejects hands with `base` references because there's no filesystem to resolve templates from.\n\n### Uninstallation\n\n`uninstall_hand(home_dir, hand_id)`:\n\n1. Refuses if the hand is built-in (lives in `registry/hands/`, not `workspaces/`)\n2. Refuses if any instance is still active\n3. Removes the in-memory definition\n4. Deletes the `workspaces/{id}/` directory\n\n### Activation Flow\n\n1. Verify the definition exists\n2. Acquire `activate_lock`\n3. Check `active_index` for existing active instance (single-instance enforcement)\n4. Create `HandInstance` with UUID (fresh or restored)\n5. Insert into `instances` and `active_index`\n\nThe kernel then spawns agents and calls `set_agents()` to populate `agent_ids`.\n\n### Deactivation Flow\n\n1. Remove from `instances`\n2. Clean up `agent_index` entries\n3. Remove from `active_index` (only if it still points to this instance)\n4. Re-insert another active instance of the same hand if one exists (multi-instance edge case on restart)\n\n## Persistence & State Management\n\nState is persisted to `hand_state.json` using atomic writes (write to temp file → `fsync` → `rename` → parent directory `fsync`).\n\n### Version History\n\n| Version | Changes |\n|---------|---------|\n| v1 | Bare JSON array, single `agent_id` |\n| v2 | `{ version, instances }` wrapper |\n| v3 | Multi-agent: `agent_ids` as `BTreeMap<role, AgentId>`, `coordinator_role` |\n| v4 | `activated_at` / `updated_at` timestamps |\n| **v5** (current) | `agent_runtime_overrides` per role |\n\nLoading is forward-compatible: v5 code reads v1–v4 files. Legacy `config.__model_overrides__` blobs are migrated to `agent_runtime_overrides` without overwriting existing v5 entries. Backward compatibility: a v4 daemon loading a v5 file silently drops the `agent_runtime_overrides` field (users must re-apply from the dashboard after a downgrade).\n\nOnly `Active`, `Paused`, and `Error` instances are persisted. `Inactive` instances are skipped. On reload, `Error` instances are also skipped (logged but not restored).\n\n### `HandStateEntry`\n\nThe data structure returned by `load_state()` for the kernel to process during restart recovery:\n\n- `old_agent_ids` — the pre-restart agent UUIDs, used to reassign cron jobs\n- `instance_id` — preserved UUID for deterministic agent ID regeneration\n- `activated_at` / `updated_at` — original timestamps (None for legacy files)\n\n## Requirements Checking\n\n### Requirement Types\n\n| Type | Check | Example |\n|------|-------|---------|\n| `Binary` | Binary exists on PATH | `ffmpeg`, `python3`, `chromium` |\n| `EnvVar` | Environment variable is set and non-empty | `HOME` |\n| `ApiKey` | Same as EnvVar (semantic distinction) | `OPENAI_API_KEY` |\n| `AnyEnvVar` | Any of a comma-separated list is set | `OPENAI_API_KEY,GROQ_API_KEY` |\n\nSpecial cases:\n- **`python3`**: Runs the binary and checks for \"Python 3\" in the output (avoids Windows Store shim false positives). Result cached via `OnceLock`.\n- **`chromium`**: Checks multiple binary names (`chromium-browser`, `google-chrome`, etc.), `CHROME_PATH` env var, and macOS `.app` paths.\n\nOptional requirements (`.optional = true`) do not block activation but contribute to the `degraded` status flag when unmet.\n\n## Settings Resolution\n\n`resolve_settings(settings, config)` produces a `ResolvedSettings` with:\n\n- **`prompt_block`** — Markdown appended to the system prompt (e.g. `## User Configuration\\n- STT: Groq Whisper (groq)`)\n- **`env_vars`** — List of environment variable names the agent subprocess needs access to\n\nResolution logic per setting type:\n\n| Type | Behavior |\n|------|----------|\n| `Select` | Finds matching option, uses its `label` for display, collects `provider_env` if present |\n| `Toggle` | Displays \"Enabled\" or \"Disabled\" |\n| `Text` | Displays value if non-empty, collects `env_var` if present |\n\nFalls back to `setting.default` when the user hasn't provided a value.\n\n## Internationalization\n\n`HandI18n` provides optional localized strings per language code:\n\n```toml\n[i18n.zh]\nname = \"线索生成\"\ndescription = \"自主线索生成\"\n\n[i18n.zh.agents.main]\nname = \"主协调器\"\n\n[i18n.zh.settings.target_industry]\nlabel = \"目标行业\"\n```\n\nAll fields are optional — omitting a field falls back to the English default. The `check_settings_availability()` method accepts a `lang` parameter and returns translated labels/descriptions when available.\n\n## Readiness\n\n`HandRegistry::readiness(hand_id)` returns a `HandReadiness` snapshot:\n\n| Field | Meaning |\n|-------|---------|\n| `requirements_met` | All **non-optional** requirements are satisfied |\n| `active` | At least one instance is in `Active` status |\n| `degraded` | Active but some requirement (optional or not) is unmet |\n\nThis is used by the API to show the hand's operational status at a glance.\n\n## Error Handling\n\nAll operations return `HandResult<T>` (= `Result<T, HandError>`). Error variants:\n\n| Variant | When |\n|---------|------|\n| `NotFound` | Hand definition doesn't exist |\n| `AlreadyActive` | Hand already has an active instance |\n| `AlreadyRegistered` | Duplicate hand ID during installation |\n| `BuiltinHand` | Attempted to uninstall a registry hand |\n| `InstanceNotFound` | UUID doesn't match any instance |\n| `ActivationFailed` | Instance collision or other activation error |\n| `TomlParse` | HAND.toml syntax or schema error |\n| `Io` | Filesystem error |\n| `Config` | Semantic config error (e.g., base template without agents_dir) |\n\n## Integration Points\n\nThe Hands framework is consumed by:\n\n- **Kernel** (`src/kernel/`) — activates/deactivates hands, spawns agents, applies runtime overrides, manages persistence lifecycle\n- **API layer** (`src/routes/`) — exposes hand listing, activation, deactivation, settings, and runtime override endpoints\n- **Route handlers** (`src/routes/skills.rs`) — uses `agent_id()` and `find_by_agent()` to resolve hand context from incoming messages\n- **Manifest helpers** (`src/kernel/manifest_helpers.rs`) — calls `resolve_settings()` to build the system prompt and `is_multi_agent()` to configure agent dispatching\n- **Registry sync** — populates `registry/hands/` which is scanned on startup by `reload_from_disk()`","infrastructure-libraries-librefang-http-src":"# Infrastructure Libraries — librefang-http-src\n\n# librefang-http — Centralized HTTP Client with Proxy and TLS Fallback\n\n## Purpose\n\nEvery outbound HTTP connection in the application should go through this module. It guarantees two things that vanilla `reqwest::Client` does not:\n\n1. **Proxy settings are applied uniformly** — from `config.toml`, environment variables, or both.\n2. **TLS works on systems without system CA certificates** — minimal Docker images, musl builds on Termux/Android, etc. — by falling back to bundled Mozilla CA roots.\n\nAll other crates (`librefang-runtime`, `librefang-runtime-mcp`, `librefang-api`, route handlers, tool runners, etc.) import client builders from here rather than constructing `reqwest::Client` instances directly.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[\"init_proxy(ProxyConfig)\"] -->|\"writes GLOBAL_PROXY + env vars\"| B[(\"GLOBAL_PROXY<br/>(RwLock)\")]\n    A -->|\"initial call only\"| C[(\"HTTP_PROXY<br/>HTTPS_PROXY<br/>NO_PROXY\")]\n    \n    D[\"proxied_client_builder()\"] --> E[\"active_proxy()\"]\n    E --> B\n    D --> F[\"build_http_client(proxy)\"]\n    F --> G[\"tls_config()\"]\n    G --> H[(\"TLS_CONFIG<br/>(OnceLock)\")]\n    H --> I[\"webpki-roots<br/>(bundled Mozilla CAs)\"]\n    H --> J[\"rustls-native-certs<br/>(system CAs)\"]\n    \n    K[\"proxied_client()\"] --> D\n    L[\"proxied_client_fallback()\"] --> D\n    M[\"proxied_client_with_override(url)\"] --> G\n```\n\n## Initialization Sequence\n\nAt daemon startup, call `init_proxy` once with the `[proxy]` section from `config.toml`:\n\n```rust\nlet proxy_cfg: ProxyConfig = config.proxy; // deserialized from config.toml\ninit_proxy(proxy_cfg);\n```\n\nThis does two things:\n\n- Stores the config in the global `GLOBAL_PROXY` (`RwLock<Option<ProxyConfig>>`).\n- On the **initial** call only (when `GLOBAL_PROXY` is still `None`), exports the proxy values as environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`). This ensures crates that build their own `reqwest::Client` without using this module (e.g., `librefang-channels`) still pick up the proxy settings via reqwest's built-in env-var detection.\n\n**Thread safety note:** `std::env::set_var` is racy in multi-threaded contexts. The module only calls it during the synchronous bootstrap phase before the Tokio runtime spawns worker threads. Hot-reload calls update `GLOBAL_PROXY` only — never the environment variables.\n\n## TLS Configuration\n\n### How it works\n\n`tls_config()` returns a cached `rustls::ClientConfig` built once and reused for every client:\n\n1. Seeds the root store with **bundled Mozilla CA roots** (`webpki_roots::TLS_SERVER_ROOTS`). This guarantees common public CAs are trusted regardless of the host system.\n2. Supplements with **system CA certificates** (`rustls_native_certs::load_native_certs()`). This adds org-internal or self-signed CAs and keeps trust anchors current without a release.\n3. If no system certs are found, logs at debug level and continues with bundled roots only.\n\nThis ordering means the bundled roots are always present, and system certs act as additive supplements — never replacements.\n\n### When to use\n\nYou don't call `tls_config()` directly unless you're building a `reqwest::Client` with custom options. The standard builder functions (`proxied_client_builder`, `proxied_client`, etc.) already call it internally.\n\n## Public API\n\n### `init_proxy(cfg: ProxyConfig)`\n\nSets the global proxy configuration. Call once at startup; can be called again for hot-reload. Validates proxy URL schemes (`http://`, `https://`, `socks5://`, `socks5h://`) and logs warnings for invalid URLs without crashing.\n\n### `proxied_client_builder() -> reqwest::ClientBuilder`\n\nReturns a pre-configured `ClientBuilder` with:\n- TLS from `tls_config()` (bundled + system CA roots)\n- Proxy settings from `GLOBAL_PROXY` (explicit values take precedence; `None` fields fall through to reqwest's env-var detection)\n- `User-Agent: librefang/<version>`\n- Connect timeout: 30s\n- Read timeout: 300s (per-read inactivity, not total request time — safe for streaming LLM responses)\n\nCallers can chain additional options (e.g., `.timeout()`, custom headers) before `.build()`.\n\n### `proxied_client() -> reqwest::Client`\n\nConvenience wrapper: calls `proxied_client_builder()` and builds immediately. Panics if construction fails (it shouldn't with this configuration).\n\nUse this when you need a ready-to-use client with no further customization. Widely used across the codebase:\n\n- OAuth flows (`start_device_auth_flow`, `exchange_code_for_tokens_with_redirect_uri`, `refresh_access_token`)\n- Provider health checks and API key probing\n- Image generation, media transcription, webhook testing\n- Plugin and channel operations\n\n### `proxied_client_fallback() -> reqwest::Client`\n\nIdentical to `proxied_client()` but adds a **total per-request timeout of 300 seconds**. Used when a per-provider proxy override is invalid, ensuring a stuck upstream cannot block the agent loop indefinitely. Callers should log a warning before using this fallback.\n\n### `proxied_client_with_override(proxy_url: &str) -> reqwest::Result<reqwest::Client>`\n\nBuilds a client that routes **all** traffic through the given proxy URL, ignoring `GLOBAL_PROXY` entirely. Used for per-provider proxy overrides. Returns an error if the URL is invalid — callers that want best-effort behavior should call `proxied_client()` on error and log a warning.\n\n### `build_http_client(proxy: &ProxyConfig) -> reqwest::ClientBuilder`\n\nLower-level function that accepts an explicit `ProxyConfig` instead of reading from the global state. Prefer `proxied_client_builder()` unless you need to pass a specific config.\n\n### `tls_config() -> rustls::ClientConfig`\n\nReturns the cached TLS configuration. Useful when constructing a `reqwest::Client` outside the standard builder path.\n\n### Backward-compatible aliases\n\n| Alias | Delegates to |\n|---|---|\n| `client_builder()` | `proxied_client_builder()` |\n| `new_client()` | `proxied_client()` |\n\n## Proxy Resolution Order\n\nWhen a request is made through a client built by this module:\n\n1. **Explicit config values** from `ProxyConfig` (`http_proxy`, `https_proxy`, `no_proxy`) are applied directly as `reqwest::Proxy` objects on the builder.\n2. **When config fields are `None`**, reqwest's built-in environment variable detection provides the fallback (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`).\n3. **`init_proxy()`** exports config values to env vars on first call, so both paths converge.\n\nThis avoids double-application: if the config has an explicit value, it's set on the builder; if not, reqwest reads the env var that `init_proxy()` already set.\n\n## Default Timeouts\n\nAll clients built through this module include sensible defaults:\n\n| Timeout | Value | Rationale |\n|---|---|---|\n| Connect | 30s | Caps TCP + TLS handshake; generous for slow international links to LLM providers |\n| Read | 300s | Per-read inactivity timeout, not total request time. Streaming LLM responses keep it alive; a true stall fires it |\n\nThe fallback client (`proxied_client_fallback`) adds a **total** timeout of 300s on top.\n\n## Usage Patterns\n\n### Standard client (most common)\n\n```rust\nuse librefang_http::proxied_client;\n\nlet client = proxied_client();\nlet resp = client.get(\"https://api.example.com/health\").send().await?;\n```\n\n### Customized builder\n\n```rust\nuse librefang_http::proxied_client_builder;\n\nlet client = proxied_client_builder()\n    .timeout(std::time::Duration::from_secs(60))\n    .build()?;\n```\n\n### Per-provider proxy override\n\n```rust\nuse librefang_http::{proxied_client_with_override, proxied_client_fallback};\n\nmatch proxied_client_with_override(&provider.proxy_url) {\n    Ok(client) => client,\n    Err(e) => {\n        tracing::warn!(\"Invalid proxy for provider {}: {e}\", provider.name);\n        proxied_client_fallback()\n    }\n}\n```\n\n### Direct TLS config (for non-reqwest consumers)\n\n```rust\nuse librefang_http::tls_config;\n\nlet tls = tls_config();\n// use with a custom hyper client, etc.\n```\n\n## Valid Proxy URL Schemes\n\nThe module accepts these schemes in proxy URLs:\n\n- `http://`\n- `https://`\n- `socks5://`\n- `socks5h://` (DNS resolution through the proxy)\n\nInvalid schemes are logged with a redacted URL and skipped; the client is still built successfully without that proxy.","infrastructure-libraries-librefang-kernel-handle-src":"# Infrastructure Libraries — librefang-kernel-handle-src\n\n# librefang-kernel-handle\n\nRole traits that define the seam between the LibreFang agent runtime and the kernel implementation.\n\n## Purpose\n\nEvery tool invocation, agent lifecycle event, and cross-agent message in LibreFang crosses a trait boundary. This crate defines that boundary. Rather than coupling the runtime to a concrete kernel type, the runtime accepts trait objects (`Arc<dyn SomeRoleTrait>`) so it can run against the real kernel, a test stub, or a minimal embedded harness without knowing the difference.\n\nHistorically this was a single `KernelHandle` trait with 50+ methods spanning 14 unrelated domains (issue #3746). That design forced every caller to depend on the entire kernel surface and made mocking painful. The crate now exposes **19 focused role traits**, each covering one capability domain. `KernelHandle` survives as a supertrait alias with a blanket impl, so the ~117 existing `Arc<dyn KernelHandle>` call sites keep compiling unchanged.\n\n## Architecture\n\n```mermaid\ngraph BT\n    AC[AgentControl]\n    MA[MemoryAccess]\n    WA[WikiAccess]\n    TQ[TaskQueue]\n    EB[EventBus]\n    KG[KnowledgeGraph]\n    CC[CronControl]\n    AG[ApprovalGate]\n    HC[HandsControl]\n    AR[A2ARegistry]\n    CS[ChannelSender]\n    PS[PromptStore]\n    WR[WorkflowRunner]\n    GC[GoalControl]\n    TP[ToolPolicy]\n    AA[ApiAuth]\n    SW[SessionWriter]\n    AF[AcpFsBridge]\n    AT[AcpTerminalBridge]\n    CQ[CatalogQuery]\n\n    KH[\"KernelHandle<br/>(supertrait alias)\"]\n\n    AC & MA & WA & TQ & EB & KG & CC & AG & HC & AR & CS & PS & WR & GC & TP & AA & SW & AF & AT & CQ --> KH\n\n    style KH fill:#2d6,stroke:#000,color:#000\n```\n\nAny type that implements all 19 role traits automatically satisfies `KernelHandle` via the blanket `impl<T> KernelHandle for T`. New code should narrow to only the role bounds it needs.\n\n## Error Handling\n\nAll trait methods return results through two re-exports:\n\n| Type | Definition |\n|---|---|\n| `KernelOpError` | Alias for `librefang_types::error::LibreFangError` — the workspace-wide structured error enum |\n| `KernelResult<T>` | Alias for `Result<T, KernelOpError>` |\n\nThis avoids a parallel \"kernel handle error\" type. Callers can match directly on variants (`AgentNotFound`, `CapabilityDenied`, `Unavailable`) instead of substring-matching error strings. Every layer — runtime, kernel, API — shares the same vocabulary, so cross-layer conversion is a no-op.\n\n## Role Trait Reference\n\n### Agent Lifecycle\n\n**`AgentControl`** *(async)* — Spawning, messaging, listing, killing agents. Covers:\n\n- `spawn_agent` / `spawn_agent_checked` — create from TOML manifest, with optional capability-inheritance enforcement\n- `send_to_agent` / `send_to_agent_as` — inter-agent RPC; the `_as` variant supports cancel cascading from a parent agent (issue #3044)\n- `run_forked_agent_oneshot` — forked agent turn that collapses to a single text response, used by proactive memory extractors to share the parent's prompt-cache prefix with Anthropic\n- `list_agents`, `find_agents`, `kill_agent` — discovery and lifecycle\n- `touch_heartbeat`, `fire_agent_step` — runtime bookkeeping\n- `max_agent_call_depth` — config read (default: 5)\n\n**`HandsControl`** *(async)* — Specialized autonomous agents (\"Hands\"). Install from TOML, activate with config, check status, deactivate. All methods default to `Unavailable`.\n\n**`A2ARegistry`** *(sync)* — Read-only directory of discovered external A2A agents. Returns `(name, url)` pairs.\n\n### Memory & Knowledge\n\n**`MemoryAccess`** *(sync)* — Shared cross-agent key-value store with per-peer namespace isolation. The `memory_acl_for_sender` method resolves per-user RBAC ACLs (issue #3054 Phase 2), returning `None` when RBAC is disabled.\n\n**`WikiAccess`** *(sync)* — Durable markdown knowledge vault (issue #3329). Mirrors `MemoryAccess` but targets the wiki substrate. Methods return `serde_json::Value` to avoid a dependency on `librefang-memory-wiki` types:\n\n- `wiki_get` — fetch a page (returns `unavailable` when the vault is disabled, `not_found` when the topic doesn't exist)\n- `wiki_search` — case-insensitive substring search, topic-name hits outrank body hits\n- `wiki_write` — write with provenance tracking and optimistic-concurrency protection (`force` flag)\n\n**`KnowledgeGraph`** *(async)* — Entity/relation insert and pattern query. Methods take entities and relations by reference so callers retain ownership for retries without extra clones (issue #3553).\n\n### Task & Workflow\n\n**`TaskQueue`** *(async)* — Shared task queue: post, claim, complete, list, delete, retry, get-by-id, update-status. Tasks are represented as `serde_json::Value` to avoid coupling to the kernel's internal task model.\n\n**`WorkflowRunner`** *(async)* — Declarative workflow execution with structured metadata. Key methods:\n\n- `run_workflow` — synchronous execute, returns `(run_id, output)`\n- `start_workflow_async` / `start_workflow_async_tracked` — fire-and-forget with optional agent/session tracking for completion events (issue #4983)\n- `list_workflows` → `WorkflowSummary` — includes `has_input_schema` flag\n- `describe_workflow` → `WorkflowDescription` — surfaces step names and input parameters so the agent can discover *how to call* a workflow before invoking it (issue #4982)\n- `get_workflow_run` → `WorkflowRunSummary` — includes per-step outputs in execution order\n- `cancel_workflow_run` — cancel a running or paused workflow\n\nAll workflow-related structs (`WorkflowSummary`, `WorkflowInputParam`, `WorkflowDescription`, `StepOutputSummary`, `WorkflowRunSummary`) are `#[non_exhaustive]` and constructed via `new()` methods to allow future field additions without breaking downstream crates.\n\n### Events & Goals\n\n**`EventBus`** *(async)* — Fire-and-forget custom events for proactive agent triggers. Single method: `publish_event`.\n\n**`GoalControl`** *(sync)* — List active goals (optionally filtered by agent) and update goal status/progress.\n\n### Approval & Policy\n\n**`ApprovalGate`** *(async + sync)* — Tool approval lifecycle and RBAC gate resolution:\n\n- `requires_approval` / `requires_approval_with_context` — check if a tool needs human approval\n- `is_tool_denied_with_context` — hard-deny check per sender/channel\n- `resolve_user_tool_decision` — combines user tool policy, channel rules, and role-based escalation into a single `UserToolGate` verdict (`Allow` / `Deny` / `NeedsApproval`). Defaults to `Allow` so installations without `AuthManager` keep pre-M3 behavior\n- `request_approval` — blocking wait for approval decision\n- `submit_tool_approval` / `resolve_tool_approval` — non-blocking submit + resolve with deferred execution payloads\n- `get_approval_status` — poll current status\n\n**`ToolPolicy`** *(sync)* — Read-side config queries that parameterize tool execution:\n\n- `tool_timeout_secs` / `tool_timeout_secs_for` — global and per-tool timeouts with glob matching\n- `skill_env_passthrough_policy` — operator gate over skill environment variable access\n- `readonly_workspace_prefixes` / `named_workspace_prefixes` — workspace access mode enforcement\n- `channel_file_download_dir` — attachment download directory for channel bridges\n- `deduplicate_file_reads` — session-scoped file-read deduplication toggle\n- `effective_upload_dir` — runtime-generated upload storage location\n\n### Channels & Communication\n\n**`ChannelSender`** *(async + sync)* — Outbound channel adapters:\n\n- `send_channel_message` / `send_channel_media` / `send_channel_file_data` / `send_channel_poll` — send text, media, raw file bytes, and polls to users on named channel adapters (email, telegram, etc.). File data uses `bytes::Bytes` for zero-cost cloning in wrapping layers (issue #3553).\n- `roster_upsert` / `roster_members` / `roster_remove_member` — group chat roster management\n- `resolve_channel_owner` — find which agent owns a `(channel, chat_id)` pair\n\n### Prompts & Experiments\n\n**`PromptStore`** *(sync)* — Prompt version management and A/B experiments. Create, list, get, delete, set-active for versions; create, list, get, update-status for experiments; auto-track prompt changes. Methods that accept complex types (`create_prompt_version`, `create_experiment`) take them by reference (issue #3553).\n\n### Scheduling\n\n**`CronControl`** *(async)* — Agent-owned scheduled jobs: create, list, cancel. All default to `Unavailable`.\n\n### API Server Support\n\n**`ApiAuth`** *(sync)* — Single method `auth_snapshot()` returning an `ApiAuthSnapshot` that captures every auth-relevant config field in one atomic read. This prevents middleware from mixing pre-reload and post-reload config during hot-reload races.\n\nReturns raw (unresolved) config strings so the API server can apply its own credential-resolution logic (env-var overrides, `vault:` prefix expansion) without importing `KernelConfig`.\n\n**`SessionWriter`** *(sync, blocking I/O)* — Pre-inject content blocks into an agent session before an LLM turn. Used by the HTTP attachment upload path (issue #3744) and by `tool_channel_send` to mirror outbound messages.\n\n> **Blocking I/O caveat:** The production implementation calls `MemorySubstrate::save_session` synchronously (SQLite write). Async callers must wrap in `tokio::task::spawn_blocking` to avoid stalling worker threads. This will be resolved when issue #3579 migrates the substrate to async I/O.\n\n### ACP Editor Bridges\n\n**`AcpFsBridge`** *(async)* — Routes `fs/read_text_file` and `fs/write_text_file` through an attached ACP editor instead of the local filesystem (issue #3313). The kernel maps a `SessionId` to a registered `Arc<dyn AcpFsClient>`. Sessions without an editor return `Unavailable` — tools should fall back to local I/O.\n\n**`AcpTerminalBridge`** *(async)* — Routes `terminal/*` commands through the editor's PTY so output appears in the editor's terminal panel. Same registration/lookup pattern as `AcpFsBridge`. Returns `AcpTerminalRunResult` with output, truncation flag, exit code, and signal information.\n\n**`AcpFsClient`** and **`AcpTerminalClient`** are the object-safe client halves, implemented by `librefang-acp` adapter types and stored per-session by the kernel.\n\n### Model Catalog\n\n**`CatalogQuery`** *(sync)* — Read-side projection of model-catalog metadata. Currently surfaces `reasoning_echo_policy_for(model)` so the OpenAI-compat driver can dispatch the correct wire shape for `reasoning_content` per model (issue #4842). Returns `ReasoningEchoPolicy::None` by default, which triggers the legacy substring-based fallback.\n\n## Using the Traits\n\n### Import everything\n\n```rust\nuse librefang_kernel_handle::prelude::*;\n```\n\nThis brings in `KernelHandle` and every role trait, so method calls like `kernel.send_channel_message(...)` resolve regardless of which role trait owns them.\n\n### Narrow bounds in new code\n\nInstead of requiring the full kernel surface:\n\n```rust\n// Legacy — pulls in everything\nfn process_approval(kernel: &Arc<dyn KernelHandle>) { ... }\n```\n\nExpress only what you need:\n\n```rust\n// Narrow — only the approval capability\nfn process_approval(kernel: &(dyn ApprovalGate + Send + Sync)) { ... }\n```\n\nThis makes dependencies explicit, enables smaller mocks, and turns a missing capability into a compile error rather than a runtime `Err(\"not available\")`.\n\n### Building a mock\n\nEach role trait has default impls for every method. A stub that doesn't need a particular capability can simply leave the defaults (they return `Unavailable` errors or empty data). The crate's own tests demonstrate this pattern — `StubKernel` implements the required methods for `AgentControl` and `TaskQueue` explicitly, then uses empty `impl CronControl for StubKernel {}` blocks for traits where the defaults are sufficient.\n\n## Default Implementations and Migration Strategy\n\nDefaults that return `Err(\"X not available\")` are preserved from the pre-split god-trait to keep the structural refactor a zero-behavior-change operation. They are gathered onto their owning role trait so future PRs can tighten each contract independently — removing defaults one role at a time rather than needing to land 30+ removals atomically.\n\nThe practical impact: a stub that forgets to override, say, `wiki_get` gets a runtime error, not a panic. As roles mature, defaults should be removed so missing overrides become compile errors.\n\n## Object Safety\n\nEvery role trait is individually object-safe. The test suite verifies this by constructing `Arc<dyn EachRoleTrait>` from the `StubKernel` type. If a role trait gains a non-object-safe method (generic parameter, `Self` by value, etc.), the corresponding test stops compiling and flags the regression immediately.\n\n## Key Data Types\n\n| Type | Purpose |\n|---|---|\n| `AgentInfo` | Agent metadata returned by list/discovery: id, name, state, model info, tags, tools |\n| `WorkflowSummary` | Registered workflow definition with step count and schema flag |\n| `WorkflowInputParam` | One parameter in a workflow's input schema (name, type, required, description) |\n| `WorkflowDescription` | Full workflow metadata + input schema for agent discovery |\n| `WorkflowRunSummary` | Running or completed workflow instance with per-step outputs |\n| `StepOutputSummary` | Single step's name and final output |\n| `ApiAuthSnapshot` | Atomic snapshot of all auth config fields |\n| `ApiUserConfigSnapshot` | Per-user config values for API-key table construction |\n| `DashboardRawConfig` | Raw dashboard credential strings before env-var/vault resolution |\n| `AcpTerminalRunResult` | Terminal command result: output, truncation flag, exit code/signal |\n\nAll workflow types are `#[non_exhaustive]` with `new()` constructors. Future field additions use `with_<field>(self, …)` setters on the constructors, keeping downstream code compiling.","infrastructure-libraries-librefang-kernel-metering-src":"# Infrastructure Libraries — librefang-kernel-metering-src\n\n# librefang-kernel-metering\n\nLLM cost tracking and spending quota enforcement engine. Records every LLM call's token usage and cost into a SQLite-backed store, gates new calls against configurable budgets, and prevents concurrent requests from collectively overshooting caps.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller -->|\"1. reserve_global_budget()\"| ME[MeteringEngine]\n    ME -->|\"reads spent\"| US[UsageStore<br/>SQLite]\n    ME -->|\"reads pending\"| CL[CostReservationLedger<br/>in-memory]\n    ME -->|\"returns\"| MR[MeteringReservation]\n    Caller -->|\"2. dispatch LLM call\"| LLM[LLM Provider]\n    Caller -->|\"3a. settle()\"| MR\n    Caller -->|\"3b. check_all_and_record()\"| ME\n    ME -->|\"writes UsageRecord\"| US\n    ME -->|\"budget exceeded?\"| ES[ProviderExhaustionStore]\n    ES -->|\"skips provider\"| FC[FallbackChain]\n```\n\nThe typical call lifecycle for a gated LLM dispatch:\n\n1. **Reserve** — call `reserve_global_budget` with an estimated cost. The engine checks settled spend (SQLite) + pending reservations (in-memory) against the hourly/daily/monthly caps. Returns a `MeteringReservation` on success.\n2. **Dispatch** — send the request to the LLM provider.\n3. **Settle** — on success, call `MeteringReservation::settle` and then `check_all_and_record` to atomically verify all quotas and persist the actual usage. On failure, call `MeteringReservation::release`.\n\n## Key Types\n\n### `MeteringEngine`\n\nThe primary entry point. Holds:\n\n| Field | Purpose |\n|---|---|\n| `store: Arc<UsageStore>` | SQLite-backed persistent usage records |\n| `pending: Arc<CostReservationLedger>` | In-memory ledger of reserved-but-unsettled cost |\n| `exhaustion: Option<ProviderExhaustionStore>` | Shared with the LLM fallback chain; when a per-provider budget trips, the provider is flagged here so subsequent calls skip it |\n\n**Construction:**\n\n```rust\nlet engine = MeteringEngine::new(store)\n    .with_exhaustion_store(exhaustion_store);\n```\n\n`with_exhaustion_store` is optional — without it, the engine functions identically to its pre-#4807 behavior (quota errors still fire, but providers are not flagged for the fallback chain).\n\n### `MeteringReservation`\n\nA `#[must_use]` RAII token. Holds the estimated USD reserved against the global budget. Three disposal paths:\n\n- **`settle()`** — call after recording actual usage. Releases the reservation.\n- **`release()`** — call on dispatch failure (no cost was incurred). Releases the reservation.\n- **`Drop`** — safety net. If neither `settle` nor `release` was called (e.g., a panic between reserve and settle), the `Drop` impl releases the reservation automatically.\n\n### `BudgetStatus`\n\nRead-only snapshot returned by `budget_status`. Serialized via serde, used for dashboards and alerting. Contains spend, limit, and percentage for hourly/daily/monthly windows plus the configured alert threshold.\n\n## Budget Enforcement Layers\n\nThe engine enforces four independent budget scopes. All use the same time windows (hourly, daily, monthly). A limit of `0.0` means **unlimited** — that window is skipped entirely.\n\n| Scope | Method | When to call |\n|---|---|---|\n| **Per-agent** | `check_quota`, `check_quota_and_record` | Gate individual agent spend against its `ResourceQuota` |\n| **Global** | `check_global_budget`, `check_global_budget_and_record` | Gate total system spend against `BudgetConfig` top-level limits |\n| **Per-provider** | `check_provider_budget` | Gate a specific provider (e.g., `openai`, `groq`) against operator-set caps |\n| **Per-user** | `check_user_budget` | Gate a specific user's cumulative spend (RBAC M5) |\n\n### Atomic check-and-record\n\n`check_all_and_record` is the **preferred post-call method**. It checks per-agent quotas, global budget, *and* per-provider budget (resolved from `budget.providers` map by the record's provider field) in a single SQLite transaction. If any check fails, the record is **not** inserted — no partial state.\n\nNarrower atomic variants exist for simpler call sites:\n\n- `check_quota_and_record` — per-agent only\n- `check_global_budget_and_record` — global only\n\n### Pre-call reservation vs. post-call check\n\nThe `>` vs `>=` asymmetry between `reserve_global_budget` and `check_global_budget` is intentional:\n\n- **Pre-call** (`reserve_global_budget`) uses `>` — a single call that exactly reaches the cap is still allowed through. This avoids rejecting a fresh kernel's very first call.\n- **Post-call** (`check_global_budget`, `check_all_and_record`) uses `>=` — once the limit is fully consumed, no further calls are dispatched.\n\n## Provider Exhaustion Integration (#4807)\n\nWhen a per-provider budget gate trips and an exhaustion store is attached, the engine calls `flag_provider_budget_exhausted`, which marks the provider as `ExhaustionReason::BudgetExceeded` for `DEFAULT_LONG_BACKOFF`. The LLM fallback chain reads the same store and skips that provider without dispatching a request.\n\nThis integration is deliberately narrow: the engine only depends on `ProviderExhaustionStore`, `ExhaustionReason`, and `DEFAULT_LONG_BACKOFF` from `librefang-llm-driver` — nothing else from the driver crate is used.\n\nThe `exhaustion_store()` accessor returns a clone of the attached store so callers can wire it into other layers (e.g., an `AuxClient` built after the engine).\n\n## Cost Estimation\n\nTwo estimation paths:\n\n### `estimate_cost` (catalog-free)\n\nUses hardcoded default rates ($1.00/M input, $3.00/M output). Intended for unit tests and contexts where no model catalog is available. The `model` parameter is accepted for API compatibility but **not consulted** — the same rates apply regardless.\n\n### `estimate_cost_with_catalog` (preferred)\n\nReads pricing from the `ModelCatalog`. Resolution order:\n\n1. Look up the model ID (or alias) in the catalog.\n2. If found and pricing is non-zero, use catalog rates.\n3. If found but both input and output cost are `$0.0` **and** the provider is `chatgpt` (session-auth models), fall back to default rates. Budgets still need a conservative non-zero estimate even though the catalog reports zero.\n4. If not found, fall back to default rates.\n\n### Cache token pricing\n\n`estimate_cost_from_rates` applies multiplier adjustments for prompt caching:\n\n| Token type | Multiplier vs. base input price |\n|---|---|\n| Regular input | 1.0× |\n| Cache-read | 0.1× (90% discount) |\n| Cache-creation | 1.25× (25% surcharge) |\n| Output | 1.0× of output price |\n\nRegular input tokens are calculated as `total_input - cache_read - cache_creation` (saturating subtraction).\n\n## Dependencies\n\n| Crate | Usage |\n|---|---|\n| `librefang-memory` | `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage` — SQLite persistence |\n| `librefang-llm-driver` | `ProviderExhaustionStore`, `ExhaustionReason`, `DEFAULT_LONG_BACKOFF` — exhaustion signaling |\n| `librefang-types` | `AgentId`, `UserId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `UserBudgetConfig`, `LibreFangError` |\n| `librefang-runtime` | `ModelCatalog`, `ModelCatalogEntry` — catalog-driven pricing |\n\n## Common Patterns\n\n### Full gated dispatch\n\n```rust\nlet reservation = engine.reserve_global_budget(&budget, estimated_cost)?;\n\nmatch dispatch_llm_call(&request).await {\n    Ok(response) => {\n        reservation.settle();\n        let record = build_usage_record(response);\n        engine.check_all_and_record(&record, &quota, &budget)?;\n    }\n    Err(_) => reservation.release(),\n}\n```\n\n### Pre-dispatch provider gate\n\n```rust\nif let Some(provider_budget) = budget.providers.get(&provider_name) {\n    engine.check_provider_budget(&provider_name, provider_budget)?;\n}\n```\n\n### User budget check (post-call)\n\n`check_user_budget` is a **post-call** gate — it runs after `check_all_and_record` succeeds. At that point the cost is already in the rolled-up totals. \"Exceeded\" means the *next* call from this user will be denied, not that the current one is rolled back.\n\n```rust\nengine.check_all_and_record(&record, &quota, &budget)?;\nif let Some(user_budget) = &user_config.budget {\n    engine.check_user_budget(user_id, user_budget)?;\n}\n```\n\n## Data Cleanup\n\n`cleanup(days)` removes usage records older than the specified number of days. Returns the count of deleted rows. Call periodically to prevent unbounded SQLite growth.","infrastructure-libraries-librefang-kernel-router-src":"# Infrastructure Libraries — librefang-kernel-router-src\n\n# librefang-kernel-router\n\nMessage-to-agent routing engine for the LibreFang kernel. Given a user message, this module determines which specialist agent template or multi-agent hand should handle it, using a blended scoring model of keyword matching and optional semantic similarity.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[\"User message\"] --> ASH[\"auto_select_hand()\"]\n    MSG --> AST[\"auto_select_template()\"]\n\n    ASH --> HRC[\"hand_route_candidates()\"]\n    HRC --> CACHE_H{\"Hand cache valid?\"}\n    CACHE_H -- yes --> RETURN_H[\"Return cached candidates\"]\n    CACHE_H -- no --> BUILD_H[\"build_hand_route_candidates()\"]\n    BUILD_H --> LOAD_H[\"load_hand_route_candidates()\"]\n    LOAD_H --> PARSE[\"parse_hand_toml_with_agents_dir()\"]\n    PARSE --> CONVERT[\"hand_route_candidate_from_definition()\"]\n\n    AST --> RULES[\"TEMPLATE_RULES scoring\"]\n    AST --> META[\"auto_select_template_from_metadata()\"]\n    META --> MRC[\"manifest_route_candidates()\"]\n    MRC --> CACHE_M{\"Manifest cache valid?\"}\n    CACHE_M -- yes --> RETURN_M[\"Return cached candidates\"]\n    CACHE_M -- no --> BUILD_M[\"build_manifest_route_candidates()\"]\n    BUILD_M --> LOAD_M[\"load_template_manifest_at()\"]\n\n    ASH --> SCORE[\"Score + blend semantic_scores\"]\n    AST --> SCORE\n    SCORE --> RESULT[\"HandSelection / TemplateSelection\"]\n```\n\n## Two Routing Domains\n\nThe module handles two distinct routing decisions that the kernel makes independently:\n\n### Hand Routing\n\nA **hand** is a multi-agent orchestration defined in a `HAND.toml` file. `auto_select_hand()` scores the message against phrases extracted from each installed hand's `[routing]` section and description.\n\n**Phrase sources** (per hand):\n| Source | Weight | Example |\n|---|---|---|\n| `routing.aliases` (strong) | 6 pts each | `\"deep research\"` |\n| `routing.weak_aliases` (weak) | 1 pt each | `\"research\"` |\n| Description-derived phrases | 6 pts each | `\"systematic review\"` |\n| ID tokens (≥3 chars, non-generic) | 1 pt each | `\"browser\"` from `browser` |\n\nMinimum score to match: **2** (a single weak hit is rejected as noise).\n\n### Template Routing\n\nA **template** is a single agent specialist. `auto_select_template()` evaluates the message against:\n\n1. **`TEMPLATE_RULES`** — a curated table of 29 specialists, each with bilingual (English + Chinese) regex patterns classified as strong (weight 6) or weak (weight 1).\n2. **Manifest metadata** — `agent.toml` files under the agents directory. The `[metadata.routing]` section can declare `aliases` (weight 6), `weak_aliases` (weight 1), and `exclude_generated = true` to suppress auto-generated phrases.\n3. **Auto-generated phrases** from the template name, tags, and description (weight 2).\n\nWhen multiple specialists score equally and the message contains multi-domain indicators (`\"同时\"`, `\"multi\"`, `\"协作\"`, etc.), the router falls back to the `\"orchestrator\"` template.\n\nIf nothing matches at all, `\"orchestrator\"` is returned as the default.\n\n## Semantic Blending\n\nBoth routing functions accept an optional `semantic_scores: Option<&HashMap<String, f32>>` — a map from template/hand ID to cosine similarity score (0.0–1.0). These are blended into the keyword score:\n\n| Component | Value |\n|---|---|\n| `MAX_SEMANTIC_BONUS` | 5 points (at similarity 1.0) |\n| `SEMANTIC_ONLY_THRESHOLD` | 0.55 similarity for semantic-only fallback |\n\nWhen keyword matching finds zero hits, the router checks semantic scores against the threshold. Any template or hand above 0.55 gets `(similarity × 5)` points, potentially routing purely on meaning. This is how Chinese/Japanese/Korean input routes correctly when embedding similarity is provided by the kernel.\n\n**Keyword priority is preserved**: if keyword matching strongly favors candidate A and semantic scores favor candidate B, A wins because keyword points (6+ per strong hit) typically exceed the maximum semantic bonus of 5.\n\n## Caching\n\nThree global caches avoid redundant work on every inbound message:\n\n| Cache | Static | Invalidation |\n|---|---|---|\n| `REGEX_CACHE` | `OnceLock<Mutex<HashMap<String, Regex>>>` | Never (compiled patterns are stable) |\n| `HAND_ROUTE_CACHE` | `OnceLock<Mutex<Option<HandRouteCacheEntry>>>` | `invalidate_hand_route_cache()` |\n| `MANIFEST_CACHE` | `OnceLock<Mutex<Option<ManifestCacheEntry>>>` | `invalidate_manifest_cache()` |\n\nBoth hand and manifest caches are keyed by directory path. If the `home_dir` or `agents_dir` changes between calls, the cache is automatically rebuilt.\n\nCall `invalidate_hand_route_cache()` and `invalidate_manifest_cache()` after config hot-reload, agent install/uninstall, or hand registry changes.\n\n## Home Directory Resolution\n\nHand routing resolves its base directory with this priority:\n\n1. Explicit call to `set_hand_route_home_dir()` (highest)\n2. `LIBREFANG_HOME` environment variable\n3. `~/.librefang` (default)\n\nHands are loaded from `{home}/registry/hands/*/HAND.toml`. The agents registry at `{home}/registry/agents` is passed to `parse_hand_toml_with_agents_dir()` so hands that declare `base = \"<template>\"` for their agents can resolve correctly without log spam.\n\n## Public API\n\n### Routing Functions\n\n```rust\npub fn auto_select_hand(\n    message: &str,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> HandSelection\n```\n\nReturns `HandSelection { hand_id: Option<String>, reason: String, score: usize }`. `hand_id` is `None` when no hand meets the minimum score.\n\n```rust\npub fn auto_select_template(\n    message: &str,\n    agents_dir: &Path,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> TemplateSelection\n```\n\nReturns `TemplateSelection { template: String, reason: String, score: usize }`. Falls back to `\"orchestrator\"` when nothing matches.\n\n### Manifest Loading\n\n```rust\npub fn load_template_manifest(\n    home_dir: &Path,\n    template: &str,\n) -> Result<AgentManifest, String>\n```\n\nLoads `agent.toml` from `{home_dir}/workspaces/agents/{template}/agent.toml`. Template names are validated to contain only `[a-zA-Z0-9_-]`.\n\n```rust\npub fn all_template_descriptions(agents_dir: &Path) -> Vec<(String, String)>\n```\n\nReturns `(template_name, embeddable_text)` pairs for all non-excluded templates. Used by the kernel to build embedding vectors for semantic routing. The `\"assistant\"` template is excluded from routing.\n\n### Cache Management\n\n```rust\npub fn set_hand_route_home_dir(home_dir: &Path)\npub fn invalidate_hand_route_cache()\npub fn invalidate_manifest_cache()\n```\n\n## Phrase Extraction Internals\n\nThe module extracts routing phrases from free-text descriptions and tags with language-aware logic:\n\n- **ASCII phrases**: Split on whitespace/punctuation, strip generic English words (the 48-word `GENERIC_ENGLISH_WORDS` list), generate word-boundary regex patterns. Multi-word sequences and individual content words (≥4 chars) are both extracted.\n- **CJK phrases**: Kept as-is when 2–32 characters long. Matched via `str::contains` on lowercased input rather than word-boundary regex, since CJK languages don't use whitespace delimiters.\n- **Deduplication**: `dedupe()` preserves insertion order while removing duplicates.\n\nThe `phrase_matches()` function handles both cases: ASCII phrases compile to a regex with `[\\s_-]+` between words (so `\"code review\"` matches `\"code-review\"` and `\"code_review\"`), while non-ASCII phrases use substring matching.\n\n## TEMPLATE_RULES Reference\n\n29 built-in specialists, each with bilingual strong/weak patterns:\n\n| Template | Strong keywords (en) | Strong keywords (zh) |\n|---|---|---|\n| `hello-world` | hello, hi, hey, greet, welcome | 打招呼, 欢迎词, 自我介绍 |\n| `coder` | implement, build, refactor, patch | 写代码, 实现功能, 脚本, 编码 |\n| `debugger` | debug, traceback, stack trace | 报错, 异常, 错误日志, 故障排查 |\n| `test-engineer` | test, unit test, integration test | 测试用例, 单元测试, 覆盖率 |\n| `code-reviewer` | code review, review this diff/pr | 代码审查, 找回归风险 |\n| `architect` | architecture, system/technical design | 架构设计, 模块划分, 技术方案 |\n| `security-auditor` | security, vulnerability, XSS, CSRF | 安全审计, 漏洞, SQL注入 |\n| `devops-lead` | deploy, CI/CD, Kubernetes, Docker | 部署, 上线, 容器, K8s |\n| `researcher` | research, look up, fact check | 调研, 查资料, 事实核查 |\n| `analyst` | business/competitive/trend analysis | 竞品分析, 漏斗分析 |\n| `data-scientist` | ML, regression, classification | 统计建模, 预测模型 |\n| `planner` | plan, roadmap, timeline, milestone | 项目计划, 里程碑, 任务拆解 |\n| `writer` | write article, blog post, rewrite | 写一篇, 起草文章, 文案 |\n| `tutor` | teach me, explain step by step | 教我, 辅导学习, 作业辅导 |\n| `doc-writer` | docs, readme, documentation | 技术文档, 操作手册, 说明文档 |\n| `translator` | translate, localization | 翻译, 中译英, 术语统一 |\n| `orchestrator` | orchestrate, delegate, multi-agent | 多代理, 复杂任务, 拆成子任务 |\n| ... | ... | ... |\n\nSee `TEMPLATE_RULES` in source for the complete list including `email-assistant`, `meeting-assistant`, `social-media`, `sales-assistant`, `customer-support`, `recruiter`, `legal-assistant`, `personal-finance`, `recipe-assistant`, `travel-planner`, `health-tracker`, `home-automation`, and `ops`.\n\n## Dependencies\n\n- **`librefang_types`** — `AgentManifest` struct definition\n- **`librefang_hands`** — `parse_hand_toml_with_agents_dir()` for loading HAND.toml files\n- **`regex_lite`** — Pattern compilation with case-insensitive matching\n- **`serde_json`** — Parsing `[metadata.routing]` from manifest metadata","infrastructure-libraries-librefang-migrate-src":"# Infrastructure Libraries — librefang-migrate-src\n\n# librefang-migrate-src\n\nMigration engine for importing agent configurations from external frameworks into LibreFang's native format.\n\n## Overview\n\nThis module converts workspaces from other agent frameworks—primarily **OpenClaw** and **OpenFang**—into LibreFang's TOML-based configuration, agent manifests, secrets, memory files, sessions, and workspace directories. It supports both scanning (read-only preview) and full migration with workspace-level atomicity.\n\n```mermaid\ngraph TD\n    CLI[\"CLI / TUI / API routes\"] --> run_migration[\"run_migration()\"]\n    run_migration --> |OpenClaw| OC[\"openclaw::migrate()\"]\n    run_migration --> |OpenFang| OF[\"openfang::migrate()\"]\n    OC --> Scan[\"scan_openclaw_workspace()\"]\n    OC --> Migrate[\"migrate() → staging → promote\"]\n    Scan --> ScanResult[\"ScanResult\"]\n    Migrate --> Report[\"MigrationReport\"]\n```\n\n## Public API\n\n### `run_migration`\n\nEntry point dispatched by the CLI, TUI init wizard, and HTTP API routes.\n\n```rust\npub fn run_migration(options: &MigrateOptions) -> Result<MigrationReport, MigrateError>\n```\n\nRoutes to `openclaw::migrate()` or `openfang::migrate()` based on `MigrateOptions::source`. Returns `MigrateError::UnsupportedSource` for `LangChain` and `AutoGpt` (planned, not yet implemented).\n\n### `MigrateOptions`\n\n```rust\npub struct MigrateOptions {\n    pub source: MigrateSource,    // OpenClaw | LangChain | AutoGpt | OpenFang\n    pub source_dir: PathBuf,      // Source workspace directory\n    pub target_dir: PathBuf,      // LibreFang home directory\n    pub dry_run: bool,            // Preview only, no disk writes\n}\n```\n\n### `MigrateError`\n\nAll error variants that can occur during migration:\n\n| Variant | Meaning |\n|---|---|\n| `SourceNotFound` | Source directory does not exist |\n| `ConfigParse` / `AgentParse` | Malformed source config |\n| `Io` / `Yaml` / `TomlSerialize` | I/O or serialization failures |\n| `Json5Parse` | Invalid JSON5 in `openclaw.json` |\n| `UnsupportedSource` | Framework not yet supported |\n| `InvalidId` | Agent ID contains path traversal (`../`, absolute path, NUL bytes) |\n| `UnsupportedVersion` | `openclaw.json` declares schema version outside `{1, 2}` |\n| `StagingExists` | Stale staging directory from a previous failed run |\n\n## OpenClaw Migration\n\nThe `openclaw` module handles the full import pipeline for OpenClaw workspaces.\n\n### Supported Source Formats\n\n**Modern (JSON5):** A single `openclaw.json` file containing agents, channels, models, tools, and all other configuration. Also recognizes legacy filenames `clawdbot.json`, `moldbot.json`, and `moltbot.json`.\n\n```\n~/.openclaw/\n├── openclaw.json          # JSON5 — primary config\n├── auth-profiles.json     # Credentials (not migrated)\n├── sessions/              # JSONL conversation logs\n├── memory/                # Per-agent MEMORY.md files\n├── memory-search/         # SQLite vector index (not portable)\n├── skills/                # Skill definitions\n└── workspaces/            # Per-agent working directories\n```\n\n**Legacy (YAML):** Older installations using `config.yaml` + `agents/<name>/agent.yaml` + `messaging/<channel>.yaml`.\n\n### Workspace Detection\n\n`detect_openclaw_home()` checks in order:\n\n1. `OPENCLAW_STATE_DIR` environment variable\n2. `~/.openclaw`, `~/.clawdbot`, `~/.moldbot`, `~/.moltbot`, `~/openclaw`, `~/.config/openclaw`\n3. Windows: `%APPDATA%\\openclaw`, `%LOCALAPPDATA%\\openclaw`\n\nA candidate directory is accepted if it contains a recognizable config file or has `sessions/` or `memory/` subdirectories.\n\n### Scanning\n\n`scan_openclaw_workspace(path)` returns a `ScanResult` listing agents, channels, skills, and whether memory exists—without modifying anything. Used by the TUI init wizard and API routes for preview.\n\n### Migration Pipeline\n\n`migrate(options)` performs the following steps:\n\n1. **Idempotency check** — If `.openclaw_migrated` marker exists in the target, the migration is skipped to preserve user edits since the first import.\n\n2. **Staging** — All writes go to a sibling `.migrate-staging` directory (see Atomicity below). If a stale staging directory exists from a previous failed run, the migration aborts with `StagingExists`.\n\n3. **Config migration** — Converts global model defaults, memory settings, and channel configurations into `config.toml`. Writes API tokens to `secrets.env`.\n\n4. **Agent migration** — Each agent entry produces `agents/<id>/agent.toml` with model config, system prompt, tool profile, capabilities, fallback models, skill allowlist, tool blocklist, and workspace path.\n\n5. **Memory migration** — Copies `memory/<agent>/MEMORY.md` or `agents/<agent>/MEMORY.md` to `agents/<agent>/imported_memory.md`.\n\n6. **Workspace migration** — Copies `workspaces/<agent>/` or `agents/<agent>/workspace/` to `agents/<agent>/workspace/`.\n\n7. **Session migration** — Copies `sessions/*.jsonl` to `imported_sessions/`.\n\n8. **Skipped features** — Cron, hooks, auth profiles, skills, vector index, and session/memory backend config are reported as skipped with actionable guidance.\n\n9. **Promotion** — The staging tree is atomically moved into the real target. Existing files in the target are **never clobbered**; if a conflict exists, the staged copy is dropped and a warning is emitted.\n\n10. **Marker** — `.openclaw_migrated` is written with a timestamp. Re-running the migration is a no-op until the user deletes this file.\n\n### Atomicity and Safety\n\n- **Workspace-level:** All writes target a staging directory first. Only after every migration step succeeds is staging promoted to the real target via per-file renames. A crash mid-migration leaves the staging directory intact for inspection; the real target is untouched.\n- **File-level:** `atomic_write()` writes to a `.tmp` sibling, then renames into place, preventing torn writes.\n- **Backup:** Before overwriting any existing file (`config.toml`, `agent.toml`, `imported_memory.md`), the original is renamed to `<name>.bak.<timestamp>`.\n- **Non-clobbering promotion:** `promote_staging()` skips any file that already exists in the target, ensuring user edits are never silently overwritten.\n- **Idempotency:** The `.openclaw_migrated` marker prevents accidental re-import.\n\n### Security\n\n- **Path traversal prevention (#3794):** `validate_migration_id()` rejects agent IDs containing `..`, absolute paths, or NUL bytes. Only single normal path components are accepted.\n- **Schema version gating (#3797):** `openclaw.json` files declaring a version outside `{1, 2}` are rejected with `UnsupportedVersion`.\n- **Secret file permissions:** `write_secret_env()` restricts `secrets.env` to mode `0o600` on Unix.\n- **Secret validation:** Key and value must not contain newline characters.\n\n### Channel Migration\n\nSupports 13 channel types from the JSON5 config. Each channel is converted to a TOML table under `[channels.<name>]` in `config.toml`.\n\n| Channel | Key fields migrated | Notes |\n|---|---|---|\n| Telegram | `bot_token_env`, `allowed_users`, policies | Token → `secrets.env` |\n| Discord | `bot_token_env`, `allowed_users`, policies | Token → `secrets.env` |\n| Slack | `bot_token_env`, `app_token_env`, policies | `allow_from` unmappable (channel-based, not user-based) |\n| WhatsApp | `auth_dir` credentials copied | Baileys re-auth may be needed |\n| Signal | `api_url` (from `http_host`+`http_port`), `account` | |\n| Matrix | `access_token_env`, `homeserver_url`, `user_id`, `allowed_rooms` | Token → `secrets.env` |\n| Google Chat | Service account file copied to `credentials/` | |\n| Teams | `app_id`, `app_password_env`, `allowed_tenants` | Warns about `signature_required` default |\n| IRC | `server`, `port`, `nick`, `use_tls`, `channels`, `password_env` | |\n| Mattermost | `token_env`, `server_url` | |\n| Feishu | `app_id`, `app_secret_env`, `region` (derived from domain) | |\n| iMessage | Skipped | macOS-only, manual setup required |\n| BlueBubbles | Skipped | No LibreFang adapter |\n\nPolicy mapping:\n\n| OpenClaw DM Policy | LibreFang |\n|---|---|\n| `open` | `respond` |\n| `allowlist` / `allow_list` | `allowed_only` |\n| `pairing` / `disabled` | `ignore` |\n\n| OpenClaw Group Policy | LibreFang |\n|---|---|\n| `open` / `all` | `all` |\n| `mention` / `mention_only` | `mention_only` |\n| `commands` / `slash_only` | `commands_only` |\n| `disabled` / `ignore` | `ignore` |\n\n### Agent Conversion\n\n`convert_agent_from_json()` and `convert_legacy_agent()` produce a complete TOML agent manifest:\n\n- **Model:** Splits `\"provider/model\"` references via `split_model_ref()`. Falls back to `anthropic/claude-sonnet-4-20250514` if no model is specified.\n- **Provider mapping:** `map_provider()` normalizes provider names (e.g., `\"claude\"` → `\"anthropic\"`, `\"gemini\"` → `\"google\"`).\n- **Fallback models:** Extracted from `OpenClawAgentModelDetailed::fallbacks` as `[[fallback_models]]` entries.\n- **System prompt:** Extracted from the `identity` field, which may be a raw string or a structured object. `extract_identity_prompt()` recursively searches for common prompt-bearing keys (`systemPrompt`, `instructions`, `persona`, etc.).\n- **Tools:** Mapped via `librefang_types::tool_compat::map_tool_name()`. Unrecognized tools are reported as warnings. Tool profiles (`minimal`, `coding`, `research`, etc.) are resolved via `ToolProfile::tools()`.\n- **Capabilities:** Derived from the tool list—`shell` from `shell_exec`, `network` from `web_fetch`/`web_search`, `agent_message`/`agent_spawn` from `agent_send`/`agent_list`.\n- **Tool blocklist:** OpenClaw's `tools.deny` list is preserved as `tool_blocklist`.\n- **Skills:** Per-agent skill allowlists are preserved.\n- **Workspace:** Custom workspace paths are preserved.\n\n### Identity Prompt Extraction\n\nThe `identity` field in OpenClaw configs can take many shapes. `extract_identity_prompt()` handles:\n\n- Raw string: `\"You are a helpful assistant.\"`\n- Structured objects with keys: `systemPrompt`, `system_prompt`, `prompt`, `instructions`, `instruction`, `content`, `text`, `value`, `persona`, `identity`, `description`\n- Arrays of the above (joined with double newlines)\n- Nested objects (recursed)\n\n## OpenFang Migration\n\n`openfang::migrate()` handles imports from OpenFang, a community fork using the same configuration format. It rewrites environment variable references and checks for schema drift via `warn_on_schema_drift()`.\n\n## Migration Report\n\n`MigrationReport` (from `report.rs`) tracks everything that happened:\n\n- **`imported`**: List of `MigrateItem` entries (config, agents, channels, memory, sessions, secrets) with destination paths.\n- **`skipped`**: List of `SkippedItem` entries with reasons (unsupported features, unmappable config).\n- **`warnings`**: Non-fatal issues (unmapped tools, policy incompatibilities, backup notifications).\n\nThe report is serialized to `migration_report.md` in the target directory.\n\n## Integration Points\n\nThis module is called from three places:\n\n- **TUI init wizard** (`tui/screens/init_wizard.rs`): `detect_openclaw_home()` for auto-detection, `scan_openclaw_workspace()` for preview, `run_migration()` for execution.\n- **HTTP API routes** (`src/routes/config.rs`): `migrate_detect`, `migrate_scan`, `run_migrate` endpoints.\n- **External tests** (`librefang-migrate/tests/idempotency.rs`): Direct `MigrateOptions` construction.\n\nKey dependencies on other crates:\n\n- `librefang_types`: `KernelConfig` types, `CONFIG_VERSION`, `ToolProfile`, `tool_compat` functions\n- External: `json5`, `serde_yaml`, `toml`, `serde_json`, `chrono`, `walkdir`, `dirs`, `thiserror`","infrastructure-libraries-librefang-rl-export-src":"# Infrastructure Libraries — librefang-rl-export-src\n\n# librefang-rl-export\n\nLong-horizon RL rollout trajectory exporter — the LibreFang-side egress surface that uploads finished agent rollouts to upstream RL-tracking services.\n\n## Purpose\n\nWhen a reinforcement learning agent finishes a rollout, the trajectory data (token sequences, masks, scores, tool interactions) needs to land in an external service for training and analysis. This crate is the delivery layer: it takes opaque trajectory bytes produced by the rollout environment and ships them to the operator's chosen upstream — **Weights & Biases**, **Tinker**, or **Atropos** — without inspecting or transcoding the payload.\n\nThe crate is format-agnostic by design (RFC #3330). The wire format for trajectories is owned by the producer; this crate forwards bytes verbatim and will remain stable across format iterations.\n\n## Architecture\n\n```mermaid\ngraph TD\n    Caller[\"Caller\"] --> export[\"export()\"]\n    export --> SSRF[\"SSRF validation\"]\n    export --> Secret[\"resolve_env_secret()\"]\n    SSRF -->|WandB / Tinker| Public[\"EgressMode::Public\"]\n    SSRF -->|Atropos| Loopback[\"EgressMode::LoopbackOrPrivate\"]\n    Secret -->|ok| Dispatch\n    Secret -->|err| InvalidConfig[\"ExportError::InvalidConfig\"]\n    Dispatch{\"match ExportTarget\"}\n    Dispatch -->|WandB| WB[\"wandb::export_to_wandb\"]\n    Dispatch -->|Tinker| TK[\"tinker::export_to_tinker\"]\n    Dispatch -->|Atropos| AT[\"atropos::export_to_atropos\"]\n    WB --> Retry[\"retry_upload()\"]\n    TK --> Retry\n    AT --> Retry\n    Retry -->|ok| Receipt[\"ExportReceipt\"]\n    Retry -->|transient| Backoff[\"exponential backoff, retry\"]\n    Retry -->|permanent| ErrorReturn[\"ExportError\"]\n```\n\n## Public API\n\n### `export(target, payload) -> Result<ExportReceipt, ExportError>`\n\nThe sole public entry point. Dispatches to the appropriate exporter based on `ExportTarget` variant. All I/O runs through the workspace-shared HTTP client (`librefang_http::proxied_client()`), respecting operator proxy and TLS configuration.\n\n### `ExportTarget`\n\n`#[non_exhaustive]` enum selecting the upstream:\n\n| Variant | Authentication | Egress mode |\n|---|---|---|\n| `WandB` | API key via env-var indirection → HTTP Basic | Public only |\n| `Tinker` | API key via env-var indirection → `X-API-Key` header | Public only |\n| `Atropos` | None (local microservice) | Loopback / RFC-1918 only |\n\nEach variant carries configuration specific to its upstream (project names, base URL overrides, tuning knobs). API keys are never inlined — the `*_env` fields hold the **name** of an environment variable, resolved at upload time via `resolve_env_secret()`. This keeps secrets out of config files, history snapshots, and process dumps.\n\n### `RlTrajectoryExport`\n\nThe input payload:\n\n- **`trajectory_bytes: Vec<u8>`** — opaque
