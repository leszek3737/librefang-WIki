responses. All are re-exported from the crate root.\n\n### `test_request`\n\nBuilds an `axum::http::Request<Body>` suitable for passing to `Router::oneshot()`:\n\n```rust,ignore\n// GET with no body\nlet req = test_request(Method::GET, \"/api/health\", None);\n\n// POST with JSON body (automatically sets Content-Type: application/json)\nlet req = test_request(\n    Method::POST,\n    \"/api/agents\",\n    Some(r#\"{\"name\": \"test-agent\", \"model\": \"gpt-4\"}\"#),\n);\n```\n\nWhen `body` is `Some(...)`, the `content-type: application/json` header is set automatically. When `None`, the body is empty with no content-type header.\n\n### `assert_json_ok`\n\nAsserts the response has status `200 OK` and the body is valid JSON. Returns the parsed `serde_json::Value`. Panics with a descriptive message on failure (includes the raw response body for debugging):\n\n```rust,ignore\nlet body = assert_json_ok(response).await;\nassert_eq!(body[\"agents\"].as_array().unwrap().len(), 3);\n```\n\n### `assert_json_error`\n\nSame as `assert_json_ok` but checks for a specific error status code:\n\n```rust,ignore\nlet body = assert_json_error(response, StatusCode::NOT_FOUND).await;\nassert_eq!(body[\"error\"], \"agent not found\");\n```\n\n---\n\n## Putting It All Together\n\nA typical integration test combines all components:\n\n```rust,ignore\n#[tokio::test]\nasync fn test_spawn_and_message_agent() {\n    // 1. Set up mock LLM\n    let llm = MockLlmDriver::with_response(\"Hello! I am a test agent.\")\n        .with_tokens(50, 20);\n\n    // 2. Build test app\n    let test = TestAppState::new();\n    let app = test.router();\n\n    // 3. Spawn an agent\n    let spawn_req = test_request(\n        Method::POST,\n        \"/api/agents\",\n        Some(r#\"{\"name\": \"testy\", \"model\": \"mock\"}\"#),\n    );\n    let response = app.clone().oneshot(spawn_req).await.unwrap();\n    let body = assert_json_ok(response).await;\n    let agent_id = body[\"id\"].as_str().unwrap();\n\n    // 4. Send a message\n    let msg_req = test_request(\n        Method::POST,\n        &format!(\"/api/agents/{agent_id}/message\"),\n        Some(r#\"{\"content\": \"Hello!\"}\"#),\n    );\n    let response = app.oneshot(msg_req).await.unwrap();\n    let body = assert_json_ok(response).await;\n    assert!(body[\"response\"].is_string());\n\n    // 5. Verify LLM was called\n    assert_eq!(llm.call_count(), 1);\n}\n```","infrastructure-utilities":"# Infrastructure & Utilities\n\n# Infrastructure & Utilities\n\nShared foundations that every other LibreFang crate depends on — HTTP transport, kernel abstractions, cost enforcement, routing, observability, migration tooling, and test infrastructure.\n\n## What This Module Group Provides\n\nThese crates have no dependency on each other (except [`librefang-testing`](librefang-testing-src.md), which mocks several of them). They are grouped here because they are horizontal concerns: cross-cutting capabilities that the kernel, runtime, API, and CLI layers all consume but that don't implement business logic themselves.\n\n| Sub-module | One-line role |\n|---|---|\n| [`librefang-http`](librefang-http-src.md) | Centralized HTTP client factory — proxy config, TLS fallback, uniform request handling |\n| [`librefang-kernel-handle`](librefang-kernel-handle-src.md) | Trait that lets runtime tools call back into the kernel without creating a circular dependency |\n| [`librefang-kernel-metering`](librefang-kernel-metering-src.md) | Token/cost tracking and quota enforcement across agent, global, provider, and user budgets |\n| [`librefang-kernel-router`](librefang-kernel-router-src.md) | Routes incoming messages to the best hand or template using keywords, metadata, and embeddings |\n| [`librefang-migrate`](librefang-migrate-src.md) | Imports agents, channels, sessions, and config from external frameworks (OpenClaw) into LibreFang format |\n| [`librefang-telemetry`](librefang-telemetry-src.md) | OpenTelemetry/Prometheus recording helpers and HTTP path normalization |\n| [`librefang-testing`](librefang-testing-src.md) | In-memory mock kernel, mock LLM drivers, and `TestAppState` builder for integration tests |\n\n## How They Fit Together\n\n```\n┌─────────────────────────────────────────────────────┐\n│                   Consumer layers                    │\n│          (API · CLI · Kernel · Runtime)              │\n└──────┬──────────┬──────────┬──────────┬─────────────┘\n       │          │          │          │\n       ▼          ▼          ▼          ▼\n  ┌─────────┐ ┌────────┐ ┌───────┐ ┌──────────┐\n  │  HTTP   │ │Metering│ │Router │ │Telemetry │\n  │ client  │ │ quotas │ │routing│ │ metrics  │\n  └─────────┘ └────────┘ └───────┘ └──────────┘\n       ▲          ▲          ▲\n       │          │          │\n       │      ┌───┴──────────┴───┐\n       │      │  KernelHandle    │\n       │      │  (trait bridge)  │\n       │      └──────────────────┘\n       │\n  ┌────┴─────────────────────────────────────────┐\n  │              librefang-testing                │\n  │  (mocks for all of the above, in-memory DB)  │\n  └──────────────────────────────────────────────┘\n```\n\n**Request lifecycle across crates:** When a user message arrives, [`librefang-kernel-router`](librefang-kernel-router-src.md) selects the appropriate hand or template. Before the LLM call is dispatched, [`librefang-kernel-metering`](librefang-kernel-metering-src.md) checks quota across all budget dimensions. The runtime processes the response using [`librefang-kernel-handle`](librefang-kernel-handle-src.md) callbacks to reach back into the kernel (spawning sub-agents, reading shared memory, requesting approval). Every outbound HTTP request — whether to an LLM provider or an external API — flows through [`librefang-http`](librefang-http-src.md). Throughout, [`librefang-telemetry`](librefang-telemetry-src.md) records request metrics.\n\n**Migration path:** [`librefang-migrate`](librefang-migrate-src.md) operates independently at import time, converting external framework data (OpenClaw JSON5/YAML layouts, channel definitions, secrets) into LibreFang's TOML-based workspace format.\n\n**Testing foundation:** Every crate's integration tests rely on [`librefang-testing`](librefang-testing-src.md), which provides `TestAppState`, `MockKernelBuilder`, configurable mock LLM drivers, and an in-memory SQLite database — enabling full route and kernel testing without external services.","kernel-core":"# Kernel Core\n\n# Kernel Core: Approval & RBAC\n\nThe kernel core module provides two fundamental safety layers that gate every tool invocation in LibreFang:\n\n- **Approval gating** (`approval.rs`) — intercepts dangerous tool calls and requires explicit human approval before execution proceeds.\n- **RBAC authorization** (`auth.rs`) — maps channel identities to LibreFang users with hierarchical roles, then enforces minimum-role checks on kernel actions and per-user tool policies.\n\nTogether these form a defense-in-depth boundary: RBAC determines *who* can do *what*, and the approval system adds *explicit human confirmation* for the most dangerous operations.\n\n## Architecture Overview\n\n```mermaid\nflowchart TD\n    subgraph Incoming\n        A[Channel message]\n    end\n\n    subgraph Auth Layer\n        B[AuthManager.identify]\n        C[AuthManager.authorize]\n        D[resolve_role_for_sender]\n        B --> C\n        D --> C\n    end\n\n    subgraph Approval Layer\n        E[requires_approval_with_context]\n        F{Needs approval?}\n        G[request_approval — blocking]\n        H[submit_request — deferred]\n        I[resolve / resolve_batch]\n        J[expire_pending_requests]\n        K{TOTP required?}\n    end\n\n    subgraph Storage\n        L[In-memory pending DashMap]\n        M[Recent approvals VecDeque]\n        N[SQLite audit log]\n        O[TOTP lockout state]\n    end\n\n    A --> B\n    C --> E\n    E --> F\n    F -- Yes --> G\n    F -- Yes, deferred --> H\n    F -- No --> EXEC[Execute tool]\n    G --> I\n    H --> I\n    I --> K\n    K -- Yes, verified --> EXEC\n    K -- No --> DENIED[Denied / Error]\n    J --> L\n    I --> N\n    I --> O\n```\n\n---\n\n## Approval Manager (`approval.rs`)\n\n### Purpose\n\nWhen an agent attempts to call a dangerous tool (e.g., `shell_exec`, `file_delete`), the kernel intercepts the call and creates an approval request. A human operator must explicitly approve, deny, or skip the request before the tool executes — or the request escalates / times out according to policy.\n\n### Two Execution Paths\n\nThe approval manager supports two modes, chosen by the caller:\n\n| Path | Entry Point | Behavior | Use Case |\n|------|-------------|----------|----------|\n| **Blocking** | `request_approval()` | Awaits resolution via `tokio::sync::oneshot`. Returns the decision directly. | Agent loop needs the result before continuing. |\n| **Deferred** | `submit_request()` | Stores a `DeferredToolExecution` and returns the UUID immediately. Resolution returns the deferred payload atomically. | Non-blocking agent responses; kernel drains deferred executions after approval. |\n\n### Constants\n\n| Constant | Value | Purpose |\n|----------|-------|---------|\n| `MAX_PENDING_PER_AGENT` | 5 | Prevents any single agent from flooding the approval queue. |\n| `MAX_RECENT_APPROVALS` | 100 | In-memory ring buffer for dashboard visibility. |\n| `MAX_ESCALATIONS` | 3 | Maximum escalation rounds before falling back to `TimedOut`. |\n| `TOTP_MAX_FAILURES` | 5 | Consecutive TOTP failures before lockout. |\n| `TOTP_LOCKOUT_SECS` | 300 | Lockout duration in seconds after max failures. |\n\n### Policy Checking\n\nThree methods determine whether a tool call requires human approval:\n\n- **`requires_approval(tool_name)`** — Checks the tool name against the `require_approval` list. Supports glob patterns (`file_*`, `*`, `*_exec`).\n\n- **`requires_approval_with_context(tool_name, sender_id, channel)`** — Full context-aware check with bypass logic:\n  1. Trusted sender → auto-approve (returns `false`).\n  2. Channel rule explicitly allows → auto-approve.\n  3. Channel rule explicitly denies → force approval (returns `true`).\n  4. Otherwise → fall through to the `require_approval` glob list.\n\n- **`is_tool_denied_with_context(tool_name, sender_id, channel)`** — Returns `true` only when a channel rule hard-denies the tool. Trusted senders bypass this check.\n\nGlob matching is delegated to `librefang_types::capability::glob_matches`, supporting prefix wildcards (`file_*`), suffix wildcards (`*_exec`), and catch-all (`*`).\n\n### Timeout and Escalation\n\nWhen `timeout_fallback` is configured as `Escalate { extra_timeout_secs }`, an unapproved request goes through up to `MAX_ESCALATIONS` rounds. Each round adds `extra_timeout_secs` to the effective timeout:\n\n```\neffective_timeout = base_timeout + (extra_timeout_secs × escalation_count)\n```\n\nAfter max escalations, the request resolves as `TimedOut`. The `Skip` fallback resolves immediately as `Skipped`. The default fallback also resolves as `TimedOut`.\n\nThe kernel calls `expire_pending_requests()` periodically to sweep deferred requests that have exceeded their timeout. This returns:\n- Escalated requests (still pending, bumped `escalation_count`).\n- Expired requests with their terminal decision and `DeferredToolExecution` payload.\n\n### Resolution\n\n`resolve(request_id, decision, decided_by, totp_verified, user_id)` is the single resolution path. It:\n\n1. Checks the TOTP gate if the decision is `Approved` and the tool requires TOTP.\n2. Removes the pending request from the `DashMap`.\n3. Records the decision in the recent-history ring buffer.\n4. Writes an audit entry to SQLite if `audit_db` is configured.\n5. Sends the decision to the blocking oneshot sender (if present).\n6. Returns the `ApprovalResponse` and the `DeferredToolExecution` (if present).\n\nBatch helpers:\n- **`resolve_batch(ids, decision, decided_by)`** — Iterates `resolve()` for each ID. Does not support TOTP.\n- **`resolve_all_for_session(session_id, decision, decided_by)`** — Resolves every pending request matching a session ID atomically. Mirrors the Hermes-Agent `resolve_gateway_approval(..., resolve_all=True)` pattern. TOTP-required requests within the session are skipped (not counted).\n\n### Session-Scoped Queries\n\nThese methods support dashboard and agent-loop scoping:\n\n- **`list_pending_for_session(session_id)`** — Returns all pending `ApprovalRequest`s for a session.\n- **`has_pending_for_session(session_id)`** — Boolean check, mirrors `has_blocking_approval(session_key)`.\n- **`list_pending()`** / **`get_pending(id)`** — General-purpose queries.\n- **`list_recent(limit)`** — Newest-first from the in-memory ring buffer.\n\n### Audit Log\n\nWhen constructed with `new_with_db()`, every resolution writes an `ApprovalAuditEntry` to the `approval_audit` SQLite table. Query methods:\n\n- **`query_audit(limit, offset, agent_id, tool_name)`** — Paginated read with optional filters.\n- **`audit_count(agent_id, tool_name)`** — Total count for pagination UI.\n\n### TOTP Second Factor\n\nWhen `ApprovalPolicy.second_factor == SecondFactor::Totp`, approved requests require a valid TOTP code.\n\n**Lifecycle:**\n\n1. **Setup**: `generate_totp_secret(issuer, account)` returns `(base32_secret, otpauth_uri, qr_base64_png)`. Uses SHA-1, 6 digits, 30-second step, ±1 window.\n\n2. **Verification**: `verify_totp_code(secret_base32, code)` or `verify_totp_code_with_issuer(...)` checks the code against the current time window.\n\n3. **Grace period**: After a successful TOTP verification, the user enters a grace window (`totp_grace_period_secs`). Subsequent approvals for the same `user_id` bypass TOTP until the window expires. Set `totp_grace_period_secs: 0` to require TOTP every time.\n\n4. **Lockout**: After `TOTP_MAX_FAILURES` consecutive failures, the sender is locked out for `TOTP_LOCKOUT_SECS`. State is persisted to SQLite (`totp_lockout` table) and restored on daemon restart. Expired lockouts are discarded at load time so a restart does not extend the original 5-minute window.\n\n5. **Recovery codes**: `generate_recovery_codes()` produces 8 codes in `DDDD-DDDD` format. `verify_recovery_code(stored_json, code)` consumes a matching code from the JSON array.\n\n**Per-tool TOTP**: When `ApprovalPolicy.totp_tools` is non-empty, only the listed tools require TOTP. An empty list means all tools require TOTP when `second_factor == Totp`.\n\n### Risk Classification\n\n`classify_risk(tool_name)` is a static helper that maps tool names to risk levels:\n\n| Tool | Risk Level |\n|------|-----------|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n### Policy Hot-Reload\n\n`update_policy(policy)` swaps the active `ApprovalPolicy` behind an `RwLock`. The next `requires_approval*` or `resolve` call reads the new policy. No pending requests are affected — they were submitted under the old policy.\n\n---\n\n## RBAC Auth Manager (`auth.rs`)\n\n### Purpose\n\nThe `AuthManager` maps platform-specific identities (Telegram user ID, Discord user ID, etc.) to LibreFang users with roles, then enforces permission checks on kernel actions.\n\n### Role Hierarchy\n\n```mermaid\ngraph LR\n    V[Viewer ● 0] --> U[User ● 1]\n    U --> A[Admin ● 2]\n    A --> O[Owner ● 3]\n```\n\nRoles are ordered: a higher role implicitly includes all lower-role permissions.\n\n| Role | Abilities |\n|------|-----------|\n| **Viewer** | Read-only: view agent output. Cannot chat. |\n| **User** | Chat with agents, view config. |\n| **Admin** | Spawn/kill agents, install skills, view usage. |\n| **Owner** | Modify config, manage users. |\n\n### Role Resolution\n\n`resolve_role_for_sender(sender, mapping, role_query)` determines a sender's role through a three-level precedence:\n\n1. **Explicit `UserConfig.role`** — If the sender is bound to a registered user via `channel_bindings`, that user's configured role wins outright. The platform is never queried.\n\n2. **Channel-derived role** — When no explicit binding exists, the manager queries the platform (Telegram, Discord, Slack) via `ChannelRoleQuery::lookup_role()` and translates the platform role through `ChannelRoleMapping`.\n\n3. **Default-deny** — Falls through to `Viewer` (minimum privilege).\n\n**Caching**: Resolved roles are cached per `(channel, account_id, chat_id, user_id)` for the session lifetime. Transient platform errors are **not** cached — the next call re-queries the platform so a momentary 5xx doesn't lock the user out permanently. Only definitive outcomes populate the cache.\n\n`invalidate_role_cache()` clears the cache on session restart. `reload()` also clears it during config hot-reload.\n\n### Channel Bindings\n\nUsers are registered in `config.toml` with channel bindings:\n\n```toml\n[[users]]\nname = \"alice\"\nrole = \"admin\"\n\n[users.channel_bindings]\ntelegram = \"123456789\"\ndiscord = \"987654321\"\n```\n\nThe `AuthManager` indexes these as `\"telegram:123456789\"` → `UserId`. Lookup is `O(1)` via `DashMap`. There is no bare `platform_id` fallback — the `(channel_type, platform_id)` tuple is required to prevent cross-channel attribution leaks.\n\n### Authorization Flow\n\n`authorize(user_id, action)` checks that the user's role meets the minimum required role for the action. Returns `Ok(())` on success, `Err(LibreFangError::AuthDenied)` on failure.\n\n### Per-User Tool Policy (RBAC M3)\n\nEach `UserIdentity` carries a `ResolvedUserPolicy` built from `UserConfig`:\n\n- **`tool_policy`** — Allow/deny lists for tool names.\n- **`tool_categories`** — Tool group membership rules (resolved against kernel `ToolPolicy.groups`).\n- **`memory_access`** — Controls which memory scopes the user can read/write.\n- **`channel_tool_rules`** — Per-channel tool overrides.\n\nThe gate path reads the resolved (default-filled) form. The diagnostic/simulator path reads the raw `Option<...>` fields (`raw_tool_policy`, `raw_tool_categories`, `raw_memory_access`) to distinguish \"not declared\" from \"configured-but-empty\".\n\n### Effective Permissions Diagnostic\n\n`effective_permissions(user_id)` returns an `EffectivePermissions` snapshot containing every RBAC input for a user: role, raw tool policy, tool categories, memory access, budget, channel tool rules, and channel bindings. This is a read-only dump of configured policy slices — not a recomputation of the runtime gate decision.\n\n### Config Hot-Reload\n\n`reload(user_configs, tool_groups)` atomically replaces:\n- The user identity map.\n- The channel binding index.\n- The role cache (cleared to prevent stale privileges).\n- The tool groups snapshot.\n\nThis is called under a write guard so concurrent `identify`/`resolve_user_tool_decision` calls observe a clean snapshot before or after the swap, never a torn one.\n\n### Per-User Budgets (RBAC M5)\n\n`UserIdentity::budget` carries optional `UserBudgetConfig` spending caps. When present, the `MeteringEngine` enforces per-user budget windows after every LLM call.\n\n---\n\n## Integration with the Runtime\n\nThe approval and auth modules are consumed by:\n\n- **`librefang-runtime` ToolRunner** — Before executing any tool, the runner calls `requires_approval_with_context()` and `is_tool_denied_with_context()` to determine gating. RBAC enforcement routes through the approval queue when the user's policy requires it.\n- **Kernel agent loop** — Calls `request_approval()` (blocking) for synchronous tool calls, or `submit_request()` (deferred) for non-blocking ones. Periodically calls `expire_pending_requests()` to sweep timed-out deferred executions.\n- **API routes** — `/api/approval/resolve` calls `resolve()`. Batch and session-scoped endpoints call `resolve_batch()` and `resolve_all_for_session()`.\n- **Dashboard** — `list_pending()`, `list_recent()`, `query_audit()`, `effective_permissions()` feed the approval queue UI and permission simulator.\n- **Config hot-reload** — `update_policy()` (approval) and `reload()` (auth) are wired to `HotAction::ReloadAuth` so policy edits take effect without a daemon restart.","llm-provider-drivers-librefang-llm-driver-src":"# LLM Provider Drivers — librefang-llm-driver-src\n\n# LLM Provider Drivers — `librefang-llm-driver`\n\nThis crate defines the abstract interface between LibreFang's runtime and every LLM provider it supports. All higher-level code—agent loops, compactors, context engines, memory systems—interacts with LLMs exclusively through the types and traits defined here.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph Consumers\n        AL[agent_loop]\n        CP[compactor]\n        CE[context_engine]\n        PM[proactive_memory]\n        RT[routing]\n    end\n\n    subgraph \"librefang-llm-driver\"\n        LD[\"LlmDriver trait<br/>complete() / stream()\"]\n        CR[CompletionRequest]\n        CO[CompletionResponse]\n        SE[StreamEvent]\n        LE[LlmError]\n        FE[FailoverReason]\n        CE2[classify_error]\n    end\n\n    subgraph \"Concrete Drivers (librefang-llm-drivers)\"\n        AN[Anthropic]\n        OA[OpenAI]\n        GG[Google / Vertex AI]\n        OL[Ollama / Local]\n        AZ[Azure OpenAI]\n        CC[Claude Code CLI]\n    end\n\n    AL -->|builds| CR\n    AL -->|calls| LD\n    CP -->|calls| LD\n    CE -->|calls| LD\n    PM -->|calls| LD\n    RT -->|builds| CR\n    LD -->|returns| CO\n    LD -->|streams| SE\n    LD -->|errors| LE\n    LE -->|failover_reason| FE\n    AL -->|classify_error| CE2\n    LD -.->|implemented by| AN\n    LD -.->|implemented by| OA\n    LD -.->|implemented by| GG\n    LD -.->|implemented by| OL\n    LD -.->|implemented by| AZ\n    LD -.->|implemented by| CC\n```\n\n## Core Trait: `LlmDriver`\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError>;\n\n    fn is_configured(&self) -> bool { true }\n    fn family(&self) -> LlmFamily { LlmFamily::Other }\n}\n```\n\n- **`complete`** — Mandatory. Sends a single request, returns the full response.\n- **`stream`** — Has a default implementation that wraps `complete()` and emits `TextDelta` + `ContentComplete` events. Concrete drivers override this to provide true incremental streaming.\n- **`is_configured`** — Returns `false` only for `StubDriver`. All real drivers use the default (`true`).\n- **`family`** — Identifies the provider family for cross-cutting policy (prompt caching, tool schema normalization). Defaults to `Other`; in-tree drivers override it.\n\n## Request and Response Types\n\n### `CompletionRequest`\n\nAll fields a consumer needs to construct an LLM call:\n\n| Field | Purpose |\n|---|---|\n| `model` | Model identifier string |\n| `messages` | Conversation history (`Vec<Message>`) |\n| `tools` | Available tools (`Vec<ToolDefinition>`) |\n| `max_tokens` | Generation limit |\n| `temperature` | Sampling temperature |\n| `system` | Extracted system prompt (for APIs requiring it separately) |\n| `thinking` | Extended thinking configuration (provider-specific) |\n| `prompt_caching` | Enable prompt cache markers (Anthropic: `cache_control` breakpoints; OpenAI: automatic prefix caching) |\n| `cache_ttl` | Cache duration hint (`None` = 5m ephemeral, `Some(\"1h\")` = 1-hour with Anthropic beta header) |\n| `response_format` | Structured output mode (`ResponseFormat`) |\n| `timeout_secs` | Per-request timeout override for CLI drivers |\n| `extra_body` | Provider-specific parameters merged into the API body (last-wins) |\n| `agent_id` | Owning agent identity for MCP bridge routing |\n\n### `CompletionResponse`\n\n| Field | Purpose |\n|---|---|\n| `content` | Raw content blocks (`Vec<ContentBlock>`) |\n| `stop_reason` | Why generation stopped |\n| `tool_calls` | Extracted tool invocations |\n| `usage` | Token counts |\n\nThe `text()` method concatenates all `ContentBlock::Text` variants into a single `String`, filtering out `Thinking` blocks.\n\n## Streaming Events (`StreamEvent`)\n\nEmitted during `stream()` calls via a `tokio::sync::mpsc::Sender`:\n\n- **`TextDelta`** — Incremental text fragment\n- **`ThinkingDelta`** — Incremental reasoning text (extended thinking models)\n- **`ToolUseStart` / `ToolInputDelta` / `ToolUseEnd`** — Tool call lifecycle (start → streaming JSON input → complete with parsed input)\n- **`ContentComplete`** — Final event with `StopReason` and `TokenUsage`\n- **`PhaseChange`** — Agent lifecycle phase transitions (e.g., `\"response_complete\"`)\n- **`ToolExecutionResult`** — Tool execution outcome (emitted by agent loop, not drivers)\n- **`OwnerNotice`** — Private notice routed to owner DM (emitted by agent loop)\n\nThe constant `PHASE_RESPONSE_COMPLETE` (`\"response_complete\"`) signals that streaming text is done and post-processing (session save, memory) is about to begin. Consumers use this to unblock user input before the full payload is finalized.\n\n## Provider Families (`LlmFamily`)\n\nCoarse-grained grouping for policy-level decisions:\n\n| Variant | Providers |\n|---|---|\n| `Anthropic` | Claude direct API, Anthropic-compatible hosts, Claude Code CLI |\n| `OpenAi` | OpenAI, Azure OpenAI, Groq, OpenRouter, DeepInfra, Together, Cerebras, and all OpenAI-compatible shim proxies |\n| `Google` | Gemini API, Vertex AI Gemini, Gemini CLI |\n| `Local` | Ollama, LM Studio, vLLM, sglang, llama.cpp (native protocols only; local servers accessed via OpenAI shim report `OpenAi`) |\n| `Other` | Cohere, AI21, custom CLIs, out-of-tree drivers (default) |\n\nSerialized as `snake_case` in JSON (e.g., `\"open_ai\"`). The `Display` impl matches the serde form.\n\n## Error Handling\n\n### `LlmError`\n\nDriver-level error enum. Key variants:\n\n- **`Api { status, message }`** — HTTP error with status code and provider message\n- **`RateLimited { retry_after_ms, message }`** — Explicit rate limit with optional backoff hint\n- **`Overloaded { retry_after_ms }`** — Transient capacity error\n- **`TimedOut { inactivity_secs, partial_text, last_activity }`** — CLI subprocess timeout with captured partial output\n- **`AuthenticationFailed` / `MissingApiKey`** — Configuration errors\n- **`ModelNotFound`** — Unknown model identifier\n- **`Parse`** — Response deserialization failure (not recoverable by switching providers)\n- **`Http`** — Transport-level failure (connection refused, TLS error)\n\n#### `LlmError::failover_reason()`\n\nMaps any `LlmError` variant into a `FailoverReason` for the `FallbackChain` provider-switching logic. Classification is structural (variant + status + message keywords) and allocation-free:\n\n| LlmError variant | FailoverReason |\n|---|---|\n| `RateLimited { .. }` | `RateLimit(Some(ms))` |\n| `Overloaded { .. }` | `RateLimit(Some(ms))` |\n| `Api { status: 429, .. }` | `RateLimit(None)` |\n| `Api { status: 401, .. }` | `AuthError` |\n| `Api { status: 402, .. }` | `CreditExhausted` |\n| `Api { status: 403, .. }` | Keyword-dependent: rate-limit keywords → `RateLimit`, billing keywords → `CreditExhausted`, model keywords → `ModelUnavailable`, otherwise `HttpError` |\n| `Api { status: 404, .. }` | Model-specific keywords → `ModelUnavailable`, else `HttpError` |\n| `Api { status: 413, .. }` | `ContextTooLong` |\n| `Api { status: 503, .. }` | `ModelUnavailable` |\n| `Api { status: 400, .. }` | Context keywords → `ContextTooLong`, else `HttpError` |\n| `ModelNotFound` | `ModelUnavailable` |\n| `AuthenticationFailed` / `MissingApiKey` | `AuthError` |\n| `TimedOut` | `Timeout` |\n| `Parse` | `Unknown` |\n| `Http` | `HttpError` |\n\n### Error Classification (`llm_errors` module)\n\nIndependent classification pipeline used by the runtime to build user-facing error messages and drive retry logic.\n\n#### `classify_error(message, status) → ClassifiedError`\n\nClassifies raw API errors into 8 categories using HTTP status code fast-paths followed by case-insensitive substring pattern matching:\n\n| Priority | Category | Key Signals |\n|---|---|---|\n| 1 | `ContextOverflow` | `\"context_length_exceeded\"`, `\"token limit\"`, `\"prompt is too long\"` |\n| 2 | `Billing` | Status 402, `\"payment required\"`, `\"insufficient credits\"` |\n| 3 | `Auth` | Status 401, `\"invalid api key\"`, `\"authentication_error\"` |\n| 4 | `RateLimit` | Status 429, `\"rate limit\"`, `\"quota exceeded\"`, `\"tpm limit\"` |\n| 5 | `ModelNotFound` | Status 404, `\"model not found\"`, `\"unknown model\"` |\n| 6 | `Format` | Status 400, `\"invalid request\"`, `\"schema\"`, `\"validation_error\"` |\n| 7 | `Overloaded` | Status 500/503, `\"overloaded\"`, `\"service unavailable\"` |\n| 8 | `Timeout` | `\"etimedout\"`, `\"econnreset\"`, `\"connection refused\"` |\n\n**Status code fast-paths** are checked first (429, 402, 401, 403, 404 have unambiguous mappings). Status 403 is special: it handles provider-specific ambiguity where Chinese providers and Anthropic use 403 for rate limits, billing blocks, and model permissions, not just authentication failures. The classifier checks `FORBIDDEN_NON_AUTH_PATTERNS` (quota, region, model keywords) before falling back to `Auth`.\n\nHTML error pages (Cloudflare 521–530, `cf-error-code`) are detected and classified as `Overloaded`.\n\n#### `classify_error_with_context(message, status, provider, model)`\n\nEnriched version that attaches provider/model metadata and generates actionable suggestions. Preferred entry point when context is available.\n\n#### `ClassifiedError` Fields\n\n- `category: LlmErrorCategory` — One of 8 categories\n- `is_retryable: bool` — True for `RateLimit`, `Overloaded`, `Timeout`\n- `is_billing: bool` — True only for `Billing`\n- `suggested_delay_ms: Option<u64>` — Parsed from `\"retry after N\"` patterns\n- `sanitized_message: String` — User-safe message with API keys redacted, JSON extracted, HTML stripped\n- `raw_message: String` — Original error for logging\n- `provider` / `model` — Optional context\n- `suggestion` — Actionable resolution hint\n\n#### Sanitization Pipeline\n\n```\nraw error string\n  → is_html_error_page? → \"provider returned an error page\"\n  → extract_json_message? → pull .error.message / .message / .detail\n  → redact_secrets → replace sk-*/key-*/Bearer * with <redacted>\n  → strip_llm_wrapper → remove \"LLM driver error: API error (NNN): \" prefix\n  → cap_message → truncate to 200 chars at UTF-8 boundaries\n```\n\nThe `cap_message` function handles multi-byte UTF-8 (CJK, emoji) safely by walking back to the nearest char boundary before truncation.\n\n#### `extract_retry_delay(message) → Option<u64>`\n\nParses `\"retry after N\"`, `\"retry-after: N\"`, `\"try again in N\"` from error messages. Values without an `ms` suffix are treated as seconds and converted to milliseconds.\n\n#### `is_transient(message) → bool`\n\nQuick heuristic checking if an error is retryable (timeout patterns, overloaded patterns, rate limit patterns, SSL transient patterns like `bad_record_mac`). Used by `stream_with_retry` in the runtime agent loop.\n\n### `FailoverReason`\n\nProvider-switching taxonomy driving `FallbackChain` recovery:\n\n| Variant | Recovery Strategy |\n|---|---|\n| `RateLimit(Option<u64>)` | Sleep (optional hint ms), retry same provider |\n| `CreditExhausted` | Skip to next provider immediately |\n| `ModelUnavailable` | Skip to next provider |\n| `ContextTooLong` | Propagate to caller (must compress) |\n| `Timeout` | Skip to next provider |\n| `HttpError` | Skip to next provider |\n| `AuthError` | Skip to next provider (next slot may have valid key) |\n| `Unknown` | Propagate immediately |\n\n## Driver Configuration\n\n### `DriverConfig`\n\nSerializable configuration for constructing a driver:\n\n| Field | Default | Purpose |\n|---|---|---|\n| `provider` | `\"\"` | Provider identifier string |\n| `api_key` | `None` | API key (redacted in `Debug` output) |\n| `base_url` | `None` | Override API endpoint |\n| `vertex_ai` | `Default` | Vertex AI project/region/credentials |\n| `azure_openai` | `Default` | Azure endpoint/deployment/api_version |\n| `skip_permissions` | `true` | `--dangerously-skip-permissions` for Claude Code CLI |\n| `message_timeout_secs` | `300` | Inactivity timeout for CLI drivers (not wall-clock) |\n| `mcp_bridge` | `None` | MCP bridge config (not serialized, set by kernel) |\n| `proxy_url` | `None` | Per-provider proxy override |\n| `request_timeout_secs` | `None` | Per-provider HTTP read timeout (API drivers only) |\n\nThe `Debug` impl redacts `api_key`, `vertex_ai.credentials_path`, and `proxy_url` to prevent credential leakage in logs.\n\n### `McpBridgeConfig`\n\nConfiguration for bridging LibreFang tools into CLI-based drivers (Claude Code) via MCP:\n\n```rust\npub struct McpBridgeConfig {\n    pub base_url: String,     // Daemon URL, e.g. \"http://127.0.0.1:4545\"\n    pub api_key: Option<String>,  // X-API-Key header\n}\n```\n\nThe driver writes a temp `mcp_config.json` and passes `--mcp-config` to the spawned CLI subprocess. The MCP endpoint lives at `{base_url}/mcp`.\n\n## Integration Points\n\n**Downstream consumers** (in `librefang-runtime` and `librefang-memory`) that use these types:\n\n- `agent_loop::run_agent_loop` / `run_agent_loop_streaming` — Build `CompletionRequest`, call `complete`/`stream`, consume `StreamEvent`\n- `agent_loop::build_user_facing_llm_error` — Calls `classify_error` to produce user-facing messages\n- `agent_loop::stream_with_retry` — Calls `is_transient` to decide retry behavior\n- `compactor::summarize_messages` / `summarize_in_chunks` — Build `CompletionRequest` for context compression\n- `context_engine` / `context_compressor` — Call `complete` for context enrichment\n- `proactive_memory::decide_action` / `extract_memories` — Use `complete` for memory decisions\n- `routing::make_request` — Constructs `CompletionRequest` for routing probes\n- `provider_health::probe_model` — Calls `complete` for health checks\n- `http_vector_store::search` / `insert` — Uses response `text()` for embedding queries\n\n**Upstream dependency**: Concrete driver implementations live in the separate `librefang-llm-drivers` crate, which implements `LlmDriver` for each provider and re-exports `McpBridgeConfig`.","llm-provider-drivers-librefang-llm-drivers-src":"# LLM Provider Drivers — librefang-llm-drivers-src\n\n# librefang-llm-drivers — LLM Provider Drivers\n\n## Purpose\n\nThis crate provides a unified abstraction layer over multiple LLM providers (Anthropic, OpenAI, AWS Bedrock, Google Vertex AI) and CLI-based coding assistants (Aider, Claude Code, Qwen Code). Every provider is wrapped behind the `LlmDriver` trait so that the rest of the codebase can dispatch completions and streaming requests without knowing which backend is in use.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Consumer Layer\"\n        AL[agent_loop]\n        CE[context_engine]\n        MU[media_understanding]\n    end\n\n    subgraph \"Credential & Retry Infrastructure\"\n        CP[CredentialPool]\n        BO[backoff::jittered_backoff]\n        RLT[RateLimitTracker]\n        TF[ThinkFilter]\n    end\n\n    subgraph \"LlmDriver Implementations\"\n        AN[AnthropicDriver]\n        OA[OpenAIDriver]\n        BR[BedrockDriver]\n        VA[VertexAIDriver]\n        TR[TokenRotationDriver]\n        AD[AiderDriver]\n        CC[ClaudeCodeDriver]\n        QC[QwenCodeDriver]\n    end\n\n    AL --> CP\n    CE --> CP\n    MU --> CP\n    CP -->|acquire key| AN\n    CP -->|acquire key| OA\n    AN --> BO\n    AN --> RLT\n    OA --> BO\n    TR -->|wraps| AN\n    TR -->|wraps| OA\n```\n\n## Core Trait — `LlmDriver`\n\nEvery provider implements `LlmDriver` (defined in the companion `librefang-llm-driver` crate) which exposes two methods:\n\n| Method | Description |\n|--------|-------------|\n| `complete(CompletionRequest) -> Result<CompletionResponse, LlmError>` | Blocking (async) request/response completion |\n| `stream(CompletionRequest, mpsc::Sender<StreamEvent>) -> Result<CompletionResponse, LlmError>` | Server-sent-events streaming; sends incremental deltas through the channel and returns the assembled response |\n\nImplementations also expose `family() -> LlmFamily` to identify the provider family (Anthropic, OpenAI, etc.) for provider-specific logic elsewhere in the system.\n\n### Key Types\n\n- **`CompletionRequest`** — Model ID, message history, tools, system prompt, temperature, max tokens, prompt caching flags, thinking configuration, and response format.\n- **`CompletionResponse`** — Content blocks (text, tool use, thinking), stop reason, tool calls list, and token usage.\n- **`StreamEvent`** — Incremental events emitted during streaming: `TextDelta`, `ThinkingDelta`, `ToolUseStart`, `ToolInputDelta`, `ToolUseEnd`, `ContentComplete`.\n- **`LlmError`** — `Http`, `Api { status, message }`, `RateLimited`, `Overloaded`, `Parse`, `MissingApiKey`.\n\n---\n\n## Credential Pool — `credential_pool`\n\nMulti-key failover for a single provider. Holds multiple API keys ranked by priority and selects among non-exhausted credentials using a pluggable strategy.\n\n### Selection Strategies\n\n| Strategy | Behaviour |\n|----------|-----------|\n| `FillFirst` | Always pick the highest-priority available key until exhausted, then fall back. Maximises premium key utilisation. |\n| `RoundRobin` | Cycle through available keys in priority order. Distributes load evenly. **(default)** |\n| `Random` | Pick a random available key on each call. |\n| `LeastUsed` | Pick the key with the lowest `request_count`. |\n\n### Exhaustion and Cooldown\n\nWhen a key receives a 429 (rate-limited) or 402 (quota-exhausted) response, call `mark_exhausted(&key)`. The credential is excluded from selection for `exhausted_ttl` (default 1 hour, configurable via `with_exhausted_ttl`). On success, `mark_success(&key)` increments the request counter and clears any active exhaustion marker immediately (early recovery).\n\n### Thread Safety\n\nThe pool wraps all mutable state in a single `Mutex` so that the round-robin index and credential list are read/written atomically together, eliminating TOCTOU races. The `ArcCredentialPool` type alias (`Arc<CredentialPool>`) is the recommended handle for sharing across async tasks.\n\n### Key Redaction\n\nAll diagnostic output (`Debug` impl, `CredentialSnapshot`) redacts API keys to a `****abcd` hint (last 4 characters). Raw key strings never appear in logs or panic messages.\n\n---\n\n## Backoff — `backoff`\n\nJittered exponential backoff for retry loops shared by all HTTP-based drivers.\n\n### Formula\n\n```\ndelay = max(exp_delay, floor) + jitter\nexp_delay = min(base × 2^(attempt-1), max_delay)\njitter ∈ [0, jitter_ratio × base_for_jitter]\n```\n\n### Seed Diversity\n\nThe random seed combines `SystemTime::now().subsec_nanos()` with a process-global Weyl-sequence counter (`JITTER_COUNTER`), ensuring diverse seeds even when multiple concurrent retry loops fire within the same clock tick.\n\n### Convenience Functions\n\n| Function | Base | Cap | Jitter | Use Case |\n|----------|------|-----|--------|----------|\n| `standard_retry_delay(attempt, floor)` | 2 s | 60 s | 50% | Standard LLM API retries; `floor` accepts `Retry-After` header value |\n| `tool_use_retry_delay(attempt)` | 1.5 s | 60 s | 50% | Faster base for tool-use failures |\n\n### Retry-After Floor\n\nPass a `Retry-After` `Duration` as the `floor` argument to honour server-supplied minimum delays. The floor is capped at 300 s to prevent pathological values from stalling the retry loop.\n\n---\n\n## HTTP-Based Drivers\n\n### Anthropic — `drivers/anthropic`\n\nFull implementation of the Anthropic Messages API (version `2023-06-01`).\n\n**Features:**\n- System prompt extraction from messages or dedicated field\n- Tool use with structured `input` (ensured to be a JSON object via `ensure_object`)\n- Extended thinking (`budget_tokens` ≥ 1024, automatic `max_tokens` adjustment)\n- Prompt caching with rolling-window `cache_control` markers\n- SSE streaming with `TextDelta`, `ThinkingDelta`, `ToolUseStart/InputDelta/End` events\n- Retry on 429/529 with `standard_retry_delay` and `Retry-After` header extraction\n- Rate limit header logging via `RateLimitSnapshot`\n\n#### Prompt Caching — Rolling Window\n\nAnthropic allows at most 4 `cache_control` breakpoints per request. The driver distributes them as:\n\n1. **System block** — always 1 marker\n2. **Last tool definition** — 1 marker when tools are present\n3. **Trailing messages** — remaining 2–3 markers on the newest messages\n\nThis maximises the cached prefix length for multi-turn conversations. Empty `Blocks` payloads (e.g. thinking-only turns after filtering) are skipped without consuming breakpoint slots.\n\n#### Cache TTL\n\n| `cache_ttl` | Marker | Beta Header |\n|-------------|--------|-------------|\n| `None` (default) | `{\"type\": \"ephemeral\"}` (5 min) | No |\n| `Some(\"1h\")` | `{\"type\": \"ephemeral\", \"ttl\": \"1h\"}` | `extended-cache-ttl-2025-04-11` |\n\n#### Structured Output\n\nAnthropic has no native `response_format` field. When `ResponseFormat::Json` or `ResponseFormat::JsonSchema` is requested, formatting instructions are appended to the system prompt.\n\n#### Tool Input Normalisation — `ensure_object`\n\nThe Anthropic API requires tool `input` to be a JSON object. `ensure_object` handles malformed inputs from hallucinating models:\n- `null` → `{}`\n- JSON string containing an object → parse and use the object\n- Any other type → `{\"raw_input\": <value>}` (preserves original for debugging)\n\n---\n\n### OpenAI — `drivers/openai`\n\nOpenAI-compatible API driver (also used for any provider with an OpenAI-compatible endpoint). Referenced by Anthropic for shared `parse_tool_args` and `malformed_tool_input` helpers.\n\n### AWS Bedrock — `drivers/bedrock`\n\nUses the Bedrock Converse API with bearer token authentication (`AWS_BEARER_TOKEN_BEDROCK`).\n\n**Credential resolution order:**\n1. `bedrock_api_key` constructor argument\n2. `AWS_BEARER_TOKEN_BEDROCK` environment variable\n\n**Region resolution:**\n1. `region` constructor argument\n2. `AWS_REGION` environment variable\n3. `AWS_DEFAULT_REGION` environment variable\n4. Default: `us-east-1`\n\n**Message conversion:** Converts LibreFang message types to Bedrock's `ConverseRequest` format. Tool use/result blocks are mapped to Bedrock's `toolUse`/`toolResult` structures. Includes `validate_bedrock_tool_pairing` to ensure tool-use/tool-result message alternation requirements are met.\n\n**Unsupported content blocks:** `Image`, `ImageFile`, `Thinking`, and `Unknown` are silently dropped during conversion.\n\n---\n\n### Vertex AI — `drivers/vertex_ai`\n\nGoogle Vertex AI driver with JWT-based service account authentication. Implements RSA-SHA256 signing in pure Rust (no OpenSSL dependency) with custom ASN.1/DER parsing for PKCS#8 keys (`parse_pkcs8_rsa`). Supports token acquisition from both service account JSON and `gcloud` CLI.\n\n### Token Rotation — `drivers/token_rotation`\n\nWrapper driver that manages multiple API keys/credentials and rotates among them based on exhaustion state and usage metrics. Uses `resets_sooner` logic to prefer tokens with later reset times.\n\n---\n\n## CLI-Based Drivers\n\nThese drivers spawn external CLI tools as subprocesses rather than making HTTP API calls. They handle their own LLM provider authentication via standard environment variables.\n\n### Aider — `drivers/aider`\n\nSpawns `aider` in non-interactive mode (`--message`) with `--yes-always --no-auto-commits --no-git` flags. Model IDs are mapped by stripping the `aider/` prefix (e.g. `aider/sonnet` → `--model sonnet`).\n\n### Claude Code — `drivers/claude_code`\n\nWraps the Claude Code CLI. Checks for credentials in the user's home directory (`claude_credentials_exist` → `claude_credentials_in_dir`).\n\n### Qwen Code — `drivers/qwen_code`\n\nWraps the Qwen Code CLI. Similar credential discovery pattern, with `common_cli_paths` for binary detection and `home_dir` for credential location.\n\n---\n\n## Supporting Modules\n\n### Rate Limit Tracker — `rate_limit_tracker`\n\nParses provider-specific rate limit headers into `RateLimitSnapshot` structs. Provides `display()` formatting for diagnostics (used by CLI commands like `doctor`, `update`, `init`). Includes utilities like `usage_ratio`, `ascii_bar`, `fmt_seconds`, `fmt_bucket_line`, and datetime parsing (`parse_iso8601_to_unix`, `parse_http_date_to_unix`).\n\n### Think Filter — `think_filter`\n\nStateful filter that strips `<think&gt;...&lt;/think>` blocks from streaming text deltas using `partial_suffix_match` for robust handling of tags split across multiple deltas. Used to suppress internal reasoning output from models that emit think tags.\n\n---\n\n## Driver Discovery — `drivers/mod.rs`\n\nThe `ProviderEntry` system and `detect_available_provider` / `cli_provider_available` / `is_cli_provider` functions determine which drivers are available at runtime. This feeds into the model catalog's `detect_auth` flow and the CLI's `detect_best_provider` startup sequence.\n\n---\n\n## Integration Points\n\n### Who calls `CredentialPool::acquire`?\n\n| Caller | Context |\n|--------|---------|\n| `agent_loop::call_with_retry` | Main agent completion loop |\n| `agent_loop::stream_with_retry` | Streaming agent loop |\n| `context_engine::after_turn` | Post-turn context processing |\n| `hooks::run_hook` | Hook execution |\n| `media_understanding::process_attachments` | Image/file processing |\n| `media_understanding::transcribe_audio` | Audio transcription |\n| `command_lane::submit` | Command submission |\n\n### Who reads `RateLimitTracker::display`?\n\nCLI commands (`doctor`, `update`, `init`, `start`), dotenv/vault loading, plugin runtime, registry sync, and Docker sandbox creation all use rate limit display for diagnostics and status reporting.","llm-provider-drivers":"# LLM Provider Drivers\n\n# LLM Provider Drivers\n\nThis module group provides LibreFang's complete LLM integration layer — a trait-based abstraction that decouples the rest of the codebase from any specific LLM provider, plus concrete driver implementations for seven backends.\n\n## Sub-modules\n\n| Sub-module | Role |\n|---|---|\n| [librefang-llm-driver](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait, request/response types (`CompletionRequest`, `CompletionResponse`, `StreamEvent`), and error classification infrastructure |\n| [librefang-llm-drivers](librefang-llm-drivers-src.md) | Ships concrete `LlmDriver` implementations for Anthropic, OpenAI, AWS Bedrock, Google Vertex AI, Aider, Claude Code, and Qwen Code, along with shared credential pooling, rate-limit tracking, and think-tag filtering |\n\n## How they fit together\n\n```\n┌─────────────────────────────────────────────────────┐\n│  Consumers: agent_loop, compactor, context_engine,  │\n│  proactive_memory, routing, media_understanding     │\n└──────────────────────┬──────────────────────────────┘\n                       │  calls trait methods only\n                       ▼\n┌──────────────────────────────────────────────────────┐\n│  librefang-llm-driver                                │\n│  LlmDriver trait · CompletionRequest · StreamEvent   │\n│  LlmError · classify_error · extract_retry_delay     │\n└──────────────────────┬──────────────────────────────┘\n                       │  implements trait\n                       ▼\n┌──────────────────────────────────────────────────────┐\n│  librefang-llm-drivers                               │\n│  Provider impls · CredentialPool · RateLimitTracker  │\n│  ThinkFilter · jittered_backoff                      │\n└──────────────────────────────────────────────────────┘\n```\n\n**librefang-llm-driver** owns the contract: the `LlmDriver` trait (`complete()`, `stream()`), the shared request/response types, and the error taxonomy (`LlmError`, `FailoverReason`) with utilities like `classify_error` and `sanitize_raw_excerpt`. No provider-specific logic lives here.\n\n**librefang-llm-drivers** fills in that contract. Each provider (Anthropic, OpenAI, Bedrock, Vertex AI, Aider, Claude Code, Qwen Code) implements `LlmDriver`. The crate also supplies cross-provider infrastructure:\n\n- **CredentialPool** — round-robin credential rotation that skips exhausted keys.\n- **RateLimitTracker** — parses rate-limit headers (ISO 8601 and HTTP date formats) and exposes usage-ratio diagnostics used by the CLI.\n- **ThinkFilter** — a streaming filter that strips `<think …>…<\/think)` blocks from model output.\n- **jittered_backoff** — retry pacing shared across all provider implementations.\n\n## Key cross-module workflow\n\nA typical completion request flows like this:\n\n1. A consumer (e.g., `agent_loop`) builds a `CompletionRequest` (types from **llm-driver**).\n2. It calls `driver.stream(req)` or `driver.complete(req)` against the `LlmDriver` trait.\n3. The concrete implementation in **llm-drivers** acquires a credential from `CredentialPool`, applies `jittered_backoff` for retries, and tracks rate limits via `RateLimitTracker`.\n4. On error, the driver calls back into **llm-driver**'s `classify_error` (and related helpers like `extract_retry_delay`, `is_transient`) to determine whether to retry, fail over, or surface the error to the caller.\n5. Streaming responses pass through `ThinkFilter` before reaching the consumer as `StreamEvent` values.","memory-system":"# Memory System\n\n# Memory System (`librefang-memory`)\n\nThe memory substrate for the LibreFang Agent Operating System. It provides persistent, searchable, multi-layered memory for autonomous agents through three storage backends unified behind a single API.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"External API\"\n        PM[ProactiveMemoryStore]\n        NSG[MemoryNamespaceGuard]\n    end\n\n    subgraph \"Three-Store Model\"\n        SS[SemanticStore]\n        KS[KnowledgeStore]\n        ST[StructuredStore]\n    end\n\n    subgraph \"Storage Backends\"\n        SQLITE[(SQLite)]\n        VEC[VectorStore]\n    end\n\n    subgraph \"Background Maintenance\"\n        CONS[ConsolidationEngine]\n        DECAY[run_decay]\n        CHUNK[chunker]\n        MIG[migration]\n    end\n\n    PM --> SS\n    PM --> KS\n    PM --> ST\n    PM --> NSG\n    SS --> SQLITE\n    SS --> VEC\n    KS --> SQLITE\n    ST --> SQLITE\n    CONS --> SQLITE\n    DECAY --> SQLITE\n    MIG --> SQLITE\n```\n\n## The Three-Store Model\n\nEvery agent's memory is divided into three independent stores, each backed by SQLite:\n\n| Store | Purpose | Tables | Primary API |\n|-------|---------|--------|-------------|\n| **Structured** | Key-value pairs, agent manifests, per-agent state | `kv_store`, `agents` | `StructuredStore` |\n| **Semantic** | Free-text memories with optional vector embeddings | `memories` | `SemanticStore` |\n| **Knowledge Graph** | Entities and typed relations | `entities`, `relations` | `KnowledgeStore` |\n\nAll three are wrapped by `MemorySubstrate`, which owns a shared `Arc<Mutex<Connection>>` and provides transactional access across stores.\n\n## Semantic Memory (`semantic.rs`)\n\nThe most heavily used store. Memories are text fragments with metadata, confidence scores, and optional embedding vectors.\n\n### Storage and Retrieval\n\n- **Insert**: Stores a memory row with content, scope, confidence, and optional embedding blob. When an embedding is provided, it's serialized to bytes via `embedding_to_bytes`.\n- **Recall (`recall_with_embedding`)**: If the caller provides a query embedding, computes cosine similarity against stored embeddings and ranks results. Falls back to `LIKE` text matching when no embedding is available.\n- **Access tracking**: Every recall updates `accessed_at` and increments `access_count`, which feeds into confidence decay and TTL-based cleanup.\n\n### Scope Constants\n\nScopes determine memory lifecycle:\n\n| Scope | String | Persistence |\n|-------|--------|-------------|\n| User | `\"user_memory\"` | Permanent — never decayed |\n| Session | `\"session_memory\"` | TTL-based cleanup via `session_ttl_hours` |\n| Agent | `\"agent_memory\"` | TTL-based cleanup via `agent_ttl_days` |\n\n## Knowledge Graph (`knowledge.rs`)\n\nStores entities (`Entity`) and relations (`Relation`) in two SQLite tables with JOIN-based graph queries.\n\n### Entity and Relation Lookup\n\nThe `query_graph` method joins `relations` → `entities` twice (source + target) using a flexible match:\n\n```sql\nJOIN entities s ON (r.source_entity = s.id OR (r.source_entity = s.name AND s.agent_id = r.agent_id))\n```\n\nThis dual-match (by ID **or** by name) is critical — the MCP tool layer often references entities by name rather than by generated UUID. The regression test `test_query_graph_relation_references_by_name` guards this.\n\n### Key Operations\n\n- `add_entity`: Upserts by ID (ON CONFLICT updates name/properties).\n- `add_relation`: Creates a typed edge with confidence.\n- `has_relation`: Checks existence by source/target ID **or** name.\n- `delete_by_agent`: Cascading delete of all entities and relations for a given agent.\n\n## Structured Store (`structured.rs`)\n\nPer-agent key-value storage. Keys are namespaced — the namespace ACL guard checks prefixes like `kv:*` to determine access. Used for agent manifests, runtime state, and memory metadata that doesn't fit the semantic model.\n\n## Session Management (`session.rs`)\n\nManages conversation history with:\n\n- **Canonical sessions**: Cross-channel persistent context stored in `canonical_sessions`, with compaction cursor and summary support.\n- **Per-channel sessions**: Individual session records in `sessions` table with FTS5 full-text search via `sessions_fts`.\n- **Cleanup**: `cleanup_expired_sessions` soft-deletes session memories older than the configured TTL; `cleanup_expired_sessions_global` does the same across all agents.\n- **JSONL mirror**: `write_jsonl_mirror` appends messages to an on-disk JSONL file for external analysis.\n\n## Proactive Memory (`proactive.rs`)\n\nThe mem0-style high-level API that agents use directly. Implements the `ProactiveMemory` and `ProactiveMemoryHooks` traits.\n\n### `ProactiveMemoryStore`\n\nWraps all three stores plus an `EmbeddingFn` driver and a `MemoryExtractor`. The key methods:\n\n| Method | Behavior |\n|--------|----------|\n| `search` | Semantic search across all memory levels, returns ranked `MemoryItem` results |\n| `add` | Extracts facts from conversation messages via `MemoryExtractor`, stores as scoped memories |\n| `get` | Retrieves user-level memories for a given user ID |\n| `list` / `list_all` | Lists memories with optional filtering |\n| `auto_memorize` | Hook called after each agent turn to extract and store new facts |\n| `auto_retrieve` | Hook called before agent execution to inject relevant memories into context |\n\n### Embedding Integration\n\nWhen constructed with `.with_embedding(driver)`, memories are stored with vector embeddings and search uses cosine similarity. Without an embedding driver, the system falls back to `LIKE` text matching. This is configured at initialization, not at query time.\n\n### Confidence Decay\n\n`decay_confidence` applies exponential decay to memories not accessed in over a day:\n\n```\nnew_confidence = original_confidence × e^(-rate × days_since_access) × boost\n```\n\nWhere `boost = min(1.0 + log₂(access_count), 2.0)` rewards frequently accessed memories. Rate-limited to run at most once per hour via `maybe_decay_confidence`.\n\n### Auto-Consolidation\n\nEvery 10 `auto_memorize` calls per agent, the store triggers consolidation: merging highly similar memories (>90% Jaccard text similarity) and decaying low-confidence entries.\n\n## Text Chunking (`chunker.rs`)\n\nSplits long documents into overlapping chunks suitable for embedding. The strategy is hierarchical:\n\n1. **Paragraph boundaries** (`\\n\\n`) — preferred split points.\n2. **Sentence boundaries** (`. ` / `.\\n` / `。` / `？` / `！`) — for oversized paragraphs.\n3. **Hard character limit** — when even a single sentence exceeds `max_size`.\n\nOverlap is implemented by prepending the last `overlap` characters of the previous chunk to the start of the next. The `pack_with_overlap` function greedily packs segments into chunks and drops overlap if it would cause the new chunk to exceed `max_size`.\n\n## Memory Consolidation (`consolidation.rs`)\n\nTwo-phase background maintenance:\n\n1. **Confidence decay**: Reduces confidence of memories not accessed in 7+ days by a configurable decay factor, floored at 0.1.\n2. **Duplicate merging**: Compares all active memory pairs using Jaccard text similarity. When similarity exceeds 90%, the lower-confidence duplicate is soft-deleted and the keeper's confidence is lifted to the higher value if needed. Capped at 100 merges per run to avoid O(n²) blowup.\n\nEach merge is wrapped in a SQLite transaction via `unchecked_transaction` to prevent partial state (soft-deleted duplicate with un-updated keeper).\n\n## Time-Based Decay (`decay.rs`)\n\nHard-deletes stale memories based on scope-specific TTLs configured in `MemoryDecayConfig`:\n\n- **USER scope**: Never deleted.\n- **SESSION scope**: Deleted when `accessed_at` is older than `session_ttl_days`.\n- **AGENT scope**: Deleted when `accessed_at` is older than `agent_ttl_days`.\n\nThis is distinct from consolidation — consolidation reduces confidence and merges duplicates, while decay outright removes expired entries. Accessing a memory (via search/recall) resets the timer by updating `accessed_at`.\n\n## Namespace ACL (`namespace_acl.rs`)\n\nPer-user access control for memory namespaces. Every API call site checks a `MemoryNamespaceGuard` before proceeding.\n\n### Namespace Patterns\n\n- `proactive` — proactive-memory fragments\n- `kv:*` — structured key-value entries (glob-matched)\n- `shared:<scope>` — peer-scoped shared memory\n- `kg` — knowledge graph\n\n### Gate Methods\n\n| Method | Required Permission |\n|--------|-------------------|\n| `check_read(namespace)` | `readable_namespaces` contains namespace |\n| `check_write(namespace)` | `writable_namespaces` contains namespace |\n| `check_delete(namespace)` | Write access **and** `delete_allowed` flag |\n| `check_export(namespace)` | Read access **and** `export_allowed` flag |\n\n### PII Redaction\n\nWhen `pii_access` is false (the default), the guard redacts PII from returned `MemoryItem` objects before they reach the user. Redaction uses two signals:\n\n1. **Metadata label**: If `metadata[\"taint_labels\"]` contains `\"Pii\"` (case-insensitive), the entire content is replaced with `[REDACTED:PII]`.\n2. **Regex scan**: `redact_pii_in_text` detects email addresses, phone numbers, SSNs, and credit card numbers, replacing matches with `[REDACTED:PII]`.\n\nBoth signals are checked because storage layers don't always propagate metadata flags, and regex can't detect structured PII in custom fields. The redaction pipeline is:\n\n```\nmemory_get_user → get_with_guard → redact_all → redact_item → redact_pii_in_text\n```\n\n## HTTP Vector Store (`http_vector_store.rs`)\n\nA `VectorStore` implementation that delegates to a remote HTTP service. Used when running an external vector database (Qdrant, Weaviate, etc.) instead of the built-in SQLite-backed store.\n\n### API Contract\n\n| Method | Endpoint | Purpose |\n|--------|----------|---------|\n| `insert` | `POST /insert` | Store an embedding with payload and metadata |\n| `search` | `POST /search` | Nearest-neighbor search with optional filter |\n| `delete` | `DELETE /delete` | Remove an embedding by ID |\n| `get_embeddings` | `POST /get_embeddings` | Bulk-fetch embeddings by IDs |\n\nThe base URL is configured at construction and trailing slashes are normalized. All errors are wrapped in `LibreFangError::Internal` with the HTTP status and response body.\n\n## Schema Migrations (`migration.rs`)\n\nVersion-controlled SQLite schema currently at version 23. Uses `PRAGMA user_version` to track the current version. Each migration function (`migrate_v1` through `migrate_v23`) is idempotent — column additions are guarded by `column_exists` checks.\n\nNotable migrations:\n- **v3**: Embedding column for vector search\n- **v9**: Performance indexes for proactive memory queries\n- **v10**: `agent_id` on entities/relations for per-agent cleanup\n- **v12**: FTS5 virtual table for full-text session search\n- **v13**: Prompt versioning and A/B testing tables\n- **v15**: Multimodal memory columns (image URL, image embedding, modality)\n- **v16**: `peer_id` for per-user memory isolation\n- **v22–v23**: RBAC attribution (`user_id`, `channel`) on `audit_entries` and `usage_events`\n\n## Memory Provider Plugin System (`provider.rs`)\n\nExposes `MemoryProvider` trait and `MemoryManager` for pluggable memory backends. `NullMemoryProvider` is a no-op implementation used when memory is disabled.\n\n## Usage Tracking (`usage.rs`)\n\nRecords per-request cost and token usage in `usage_events` with columns for agent, model, token counts, cost, latency, provider, and (as of v23) user/channel attribution for per-user budget rollup.\n\n## Integration Points\n\nThe memory system connects to the rest of LibreFang through these paths:\n\n- **Agent loop** (`librefang-runtime/src/agent_loop.rs`): Calls `save_session_async` after each turn, `remember_with_embedding_async` for proactive memory, and `recall_with_embedding_async` for context injection. PII redaction is applied via `redact_all` before recalled memories reach the LLM.\n- **Context engine** (`librefang-runtime/src/context_engine.rs`): Constructs `MemorySubstrate` and injects memories into agent context.\n- **Session compactor** (`librefang-runtime/src/compactor.rs`): Reads session history to decide when compaction is needed.\n- **API routes** (`src/routes/memory.rs`): HTTP endpoints for `memory_get_user`, `memory_search_agent`, `memory_list` — all gated through `MemoryNamespaceGuard`.\n- **Config types** (`src/config/types.rs`): `ChunkConfig` and `MemoryDecayConfig` control chunking and TTL behavior.","other-librefang-api-dashboard":"# Other — librefang-api-dashboard\n\n# LibreFang API Dashboard\n\n## Overview\n\nThe LibreFang Dashboard is a single-page application providing the web management interface for the LibreFang autonomous agent operating system. It is built on **React 19**, **TanStack Router v1**, and **TanStack Query v5**, with a strict layered data architecture that separates pages from API concerns through a shared hooks layer.\n\nThe dashboard covers every operational surface of the system: agent lifecycle management, session inspection, approval gates, channel configuration, skill installation, workflow execution, memory management, analytics, runtime control, and more.\n\n## Architecture\n\n```mermaid\ngraph TD\n    P[\"Pages (src/pages/)\"] --> Q[\"useXxx hooks (lib/queries/)\"]\n    P --> M[\"useMutate hooks (lib/mutations/)\"]\n    Q --> QO[\"queryOptions + queryKey factories\"]\n    M --> HC[\"HTTP client (lib/http/client.ts)\"]\n    Q --> HC\n    HC --> API[\"Raw API (src/api.ts)\"]\n    API --> BE[\"Backend (/api/*)\"]\n    M -.invalidates.-> QO\n```\n\n### Directory Layout\n\n```\nsrc/\n  main.tsx                    # Application entry point\n  api.ts                      # Raw fetch wrappers, auth helpers, WebSocket URL builder\n  index.css                   # Tailwind v4 theme, animation system, dark mode\n  lib/\n    http/\n      client.ts               # Thin wrapper over api.ts + typed re-exports\n      errors.ts               # ApiError class\n    queries/\n      keys.ts                 # All query-key factories (hierarchical)\n      keys.test.ts            # Anchoring and smoke tests for key factories\n      <domain>.ts             # queryOptions + useXxx hooks per domain\n    mutations/\n      <domain>.ts             # useXxx mutation hooks with cache invalidation\n    agentManifest.ts          # TOML parse/serialize for agent manifests\n    agentManifestMarkdown.ts  # Markdown generation from manifest form state\n    chat.ts                   # Message normalization, usage formatting\n    chatPicker.ts             # Agent/hand grouping for chat picker UI\n    csvParser.ts              # RFC-4180 CSV parser for user imports\n    test/\n      query-client.tsx        # Shared TanStack Query test wrapper\n  pages/                      # Route page components\n  components/\n    ui/                       # Reusable UI primitives (MultiSelectCmdk, DeliveryTargetsEditor, etc.)\ne2e/\n  dashboard.spec.ts           # Playwright end-to-end tests\npublic/\n  sw.js                       # Service worker (stale-while-revalidate for static assets)\n  manifest.json               # PWA manifest\n```\n\n## Data Layer\n\nThe dashboard enforces a strict unidirectional data flow. Pages and components never call `fetch()` or `api.*` directly — all data access goes through the hooks layer.\n\n### Query Key Factories\n\nEvery domain has a hierarchical key factory in `src/lib/queries/keys.ts`. All sub-keys are anchored to the domain's `all` key so that broad invalidation works correctly:\n\n```ts\nexport const agentKeys = {\n  all:        [\"agents\"] as const,\n  lists:      ()            => [...agentKeys.all, \"list\"] as const,\n  list:       (filters)     => [...agentKeys.lists(), filters] as const,\n  details:    ()            => [...agentKeys.all, \"detail\"] as const,\n  detail:     (id: string)  => [...agentKeys.details(), id] as const,\n  sessions:   (id: string)  => [...agentKeys.detail(id), \"sessions\"] as const,\n  experiments:(id: string)  => [...agentKeys.detail(id), \"experiments\"] as const,\n  promptVersions:(id:string)=> [...agentKeys.detail(id), \"promptVersions\"] as const,\n};\n```\n\n**Why anchoring matters**: A mutation that invalidates `agentKeys.all` will refetch every cached sub-key (`detail(id)`, `sessions(id)`, `experiments(id)`, etc.) for every cached agent. This is why mutations default to the narrowest valid keys and reserve `all` for truly cross-cutting changes.\n\n### Query Hooks\n\nEach domain file exports `queryOptions` (for prefetching/suspense) and a `useXxx` hook:\n\n```ts\nexport const agentQueryOptions = (filters?: AgentFilters) =>\n  queryOptions({\n    queryKey: agentKeys.list(filters ?? {}),\n    queryFn:  () => listAgents(filters),\n    staleTime: 30_000,\n  });\n\nexport function useAgents(filters?: AgentFilters, options: UseAgentsOptions = {}) {\n  const { enabled, staleTime, refetchInterval } = options;\n  return useQuery({\n    ...agentQueryOptions(filters),\n    enabled,\n    staleTime,\n    refetchInterval,\n  });\n}\n```\n\nThe options passthrough (`enabled`, `staleTime`, `refetchInterval`) lets call sites override polling/gating without rebuilding queries. Every override carries an inline comment explaining why. Examples in the codebase:\n\n- `useApprovals({ enabled: open })` — only poll when the panel is open\n- `useCommsEvents(50, { refetchInterval: 5_000 })` — fast poll for live events\n- `useModels({}, { enabled: isModelArg })` — gate on tab state\n\n### Mutation Hooks\n\nMutations encapsulate both the write operation **and** the cache invalidation logic. Call sites never need to know which keys are affected:\n\n```ts\nexport function usePatchAgent() {\n  const qc = useQueryClient();\n  return useMutation({\n    mutationFn: patchAgent,\n    onSuccess: (_data, variables) => {\n      qc.invalidateQueries({ queryKey: agentKeys.lists() });\n      qc.invalidateQueries({ queryKey: agentKeys.detail(variables.agentId) });\n    },\n  });\n}\n```\n\n**Invalidation scope guidelines** (from narrowest to broadest):\n\n| Scope | When to use | Example |\n|---|---|---|\n| `domainKeys.detail(id)` + `domainKeys.lists()` | Per-id update where the list projection also changes (default template) | `usePatchAgent`, `useSetSessionLabel` |\n| `domainKeys.lists()` | List-shape change, no existing detail is stale | `useCreateAgentSession`, `useDeleteSchedule` |\n| `domainKeys.detail(id)` or nested sub-key | Change scoped to one detail or nested collection, list unaffected | `useDeletePromptVersion` → `agentKeys.promptVersions(id)` |\n| `domainKeys.all` | Bulk import, cache reset, cross-cutting schema change | `useActivateHand` (affects agents + hands + overview) |\n\nCall sites may attach their own `onSuccess`/`onError` for UI feedback (toasts, modal dismissal) — this is orthogonal to invalidation and stays at the call site.\n\n### Adding a New Endpoint\n\n1. Add the raw call in `src/api.ts` (or re-export via `src/lib/http/client.ts`).\n2. Add a key factory in `src/lib/queries/keys.ts` anchored to `all`.\n3. Add `queryOptions` + `useXxx` in `src/lib/queries/<domain>.ts`.\n4. Add mutation(s) in `src/lib/mutations/<domain>.ts` with invalidation.\n5. Update `src/lib/queries/keys.test.ts` with anchoring tests.\n6. Run `pnpm typecheck && pnpm test --run && pnpm build`.\n\n### Exceptions: Non-Cached Data\n\nStreaming/SSE connections, imperative fire-and-forget control channels (e.g. terminal window lifecycle in `TerminalTabs.tsx`), and one-shot probes that must not be cached may call `fetch` directly. These are kept narrow and annotated with comments explaining why.\n\n## Authentication\n\nThe dashboard authenticates to the backend using an API key stored in `localStorage` under the key `librefang-api-key`:\n\n- `setApiKey(token)` — stores the key\n- `getStoredApiKey()` — retrieves it\n- `clearApiKey()` — removes it\n- `verifyStoredAuth()` — probes a protected endpoint; clears the key on 401\n- `buildAuthenticatedWebSocketUrl(path)` — appends `?token=...` for WebSocket connections\n\nAll API calls go through `buildHeaders()` → `authHeader()` which attaches `Authorization: Bearer <key>`.\n\nThe sign-in dialog appears when `/api/auth/dashboard-check` returns `{ mode: \"credentials\" }`.\n\n## Agent Manifest System\n\n`src/lib/agentManifest.ts` handles round-tripping agent configuration as TOML — the kernel's native format.\n\n### Core Functions\n\n| Function | Purpose |\n|---|---|\n| `parseManifestToml(toml)` | Parse TOML string → `{ ok, form, extras }` |\n| `serializeManifestForm(form, extras?)` | Serialize form state → TOML string |\n| `validateManifestForm(form)` | Return array of missing required field names |\n| `emptyManifestForm()` | Create blank form with sensible defaults |\n| `emptyManifestExtras()` | Create blank extras container for unknown fields |\n\n### Key Design Decisions\n\n**Form vs. Extras**: The form captures all first-class fields the UI knows about (name, model, resources, capabilities, thinking, autonomous, routing, fallback_models, context_injection, response_format, exec_policy, schedule, etc.). Anything the form doesn't understand (custom provider params, future schema extensions) is preserved in `extras` and re-serialized verbatim — so round-tripping through the dashboard never loses data.\n\n**Mutual exclusion**: When the user picks a form-managed value (e.g., `exec_policy_shorthand = \"deny\"`), the serializer suppresses the preserved `[exec_policy]` table extras to avoid TOML key/table redefinition conflicts. The same applies to `response_format`.\n\n**Number handling**: `parseInteger` rejects negative values and integers above `MAX_SAFE_INTEGER` — the kernel's u32/u64 deserializers would reject these, so the serializer omits them rather than emitting invalid TOML.\n\n**Alias normalization**: `exec_policy` aliases (`none`/`disabled` → `deny`, `restricted` → `allowlist`, `all`/`unrestricted` → `full`) are normalized at parse time so the form dropdown always shows the canonical value.\n\n### Markdown Generation\n\n`src/lib/agentManifestMarkdown.ts` generates human-readable Markdown from manifest form state, used for agent detail views and export.\n\n## UI Components\n\n### MultiSelectCmdk\n\nA command-palette-style multi-select built on `cmdk`. Supports:\n- Chip display with per-item remove buttons\n- Backspace to remove last selection\n- Search filtering of available options\n- Already-selected items hidden from the dropdown\n\n### DeliveryTargetsEditor\n\nBuilder for scheduler delivery targets with four target types and validation:\n\n| Type | Required fields | Validation |\n|---|---|---|\n| `channel` | `channel_type`, `recipient` | Optional `thread_id`, `account_id` stripped when empty |\n| `webhook` | `url` | Must be http(s), blocks localhost/loopback/link-local/metadata IPs (SSRF protection) |\n| `local_file` | `path` | Rejects absolute paths and `..` traversal |\n| `email` | `to` | Optional `subject_template` stripped when empty |\n\n## Chat and Picker Utilities\n\n### `chat.ts`\n\n- `normalizeRole(role)` — normalizes API PascalCase roles (`User` → `user`)\n- `asText(value)` — converts unknown message content to string\n- `formatMeta(usage)` — formats token counts, iterations, and cost\n- `normalizeToolOutput(event)` — extracts persistent display data from tool output events\n\n### `chatPicker.ts`\n\n`groupedPicker(agents, hands, showHandAgents)` partitions agents into standalone agents and hand groups for the chat picker UI:\n\n- When `showHandAgents` is false, returns a flat list (hand agents included as standalone)\n- Active hands are grouped under their hand name, sorted alphabetically\n- Within each group, the coordinator agent is listed first, then others alphabetically by role\n- Paused/empty hands are hidden entirely\n\n## CSV Parser\n\n`csvParser.ts` implements RFC-4180 CSV parsing for user bulk imports:\n\n- Strips UTF-8 BOM from input\n- Preserves embedded newlines and commas inside quoted fields\n- Handles CRLF, CR, and LF line endings\n- `parseUsersCsv(csv, roles)` validates required `name`/`role` columns, flags invalid roles, and maps unknown columns to `channel_bindings`\n\n## Styling and Theming\n\nThe dashboard uses **Tailwind CSS v4** with a semantic color palette defined as CSS custom properties:\n\n```\n--color-brand         → Semantic brand color (Sky 600 light / Sky 400 dark)\n--color-success       → Emerald\n--color-warning       → Amber\n--color-error         → Rose\n--color-accent        → Violet\n--color-main          → Page background\n--color-surface       → Card/panel background\n--color-surface-hover → Hover state\n--color-border-subtle → Subtle borders\n--color-text-dim      → Muted text\n```\n\nCustom breakpoints extend Tailwind's defaults for QHD (1920px) and 4K (2560px) displays.\n\n### Animation System\n\nApple-style spring physics animations are defined in `src/index.css`:\n\n- `animate-fade-in-up` — page entrance (fade + rise + deblur, 600ms)\n- `animate-fade-in-scale` — modal entrance (scale spring + deblur, 500ms)\n- `animate-slide-in-right` — panel slide-in (280ms)\n- `animate-message-in` — chat message entrance (220ms, no blur)\n- `.stagger-children` — cascaded entrance with 40ms offset per child (disabled on mobile)\n- `.card-glow` — hover depth effect with spring transitions\n\nAll animations respect `prefers-reduced-motion: reduce`.\n\n## Service Worker\n\n`public/sw.js` provides offline-capable caching:\n\n- **API requests** (`/api/*`): network-only, never cached\n- **Static assets**: stale-while-revalidate\n- **Non-GET requests**: bypassed entirely\n- Precaches `/dashboard/` on install\n\n## Testing\n\n### Unit Tests (Vitest + React Testing Library)\n\n```bash\npnpm test --run        # Run all unit tests\npnpm test:watch        # Watch mode\n```\n\nKey test areas:\n- **Mutation invalidation**: Every mutation hook has tests verifying the exact query keys it invalidates (see `src/lib/mutations/*.test.tsx`)\n- **Key factory anchoring**: `keys.test.ts` verifies all factories exist and sub-keys are properly anchored to `all`\n- **Agent manifest round-tripping**: `agentManifest.test.ts` covers parse → serialize → re-parse for full fidelity, including edge cases (negative integers, exec_policy aliases, response_format mutual exclusion, nested-table extras)\n- **CSV parsing**: RFC-4180 compliance, BOM handling, embedded newlines\n- **UI components**: `MultiSelectCmdk`, `DeliveryTargetsEditor` tested via Testing Library + userEvent\n\n### E2E Tests (Playwright)\n\n```bash\npnpm e2e               # Run Playwright tests against dev server\n```\n\nThe E2E suite verifies:\n- Dashboard shell loads with all navigation links visible (Overview, Agents, Sessions, Approvals, Comms, Providers, Channels, Skills, Hands, Workflows, Scheduler, Goals, Analytics, Memory, Runtime, Logs)\n- Page navigation works (Comms → Hands → Goals)\n- Sign-in dialog appears when credentials are required\n\nConfiguration in `playwright.config.ts` runs against `http://127.0.0.1:4173` with a 30-second timeout and trace-on-first-retry.\n\n### Build Verification\n\nAfter any change to queries, mutations, or `api.ts`, all three must pass:\n\n```bash\npnpm typecheck         # tsc --noEmit\npnpm test --run        # vitest\npnpm build             # vite build\n```\n\nTypecheck alone is insufficient — the key-factory tests catch anchoring regressions that the compiler cannot.\n\n## Build and Development\n\n```bash\npnpm dev               # Vite dev server\npnpm build             # Production build\npnpm preview           # Preview production build\npnpm typecheck         # TypeScript check\npnpm openapi:types     # Generate types from OpenAPI spec at http://127.0.0.1:4545/api/openapi.json\n```\n\nThe dashboard targets the LibreFang API at `http://127.0.0.1:4545` by default. OpenAPI types are generated via `openapi-typescript` into `openapi/generated.ts`.\n\n## Connection to the Rest of the System\n\nThe dashboard is the primary operational interface for the LibreFang kernel. It communicates exclusively via the HTTP API (`/api/*`) and authenticated WebSocket connections:\n\n- **Agent lifecycle**: spawn, clone, suspend, resume, delete agents; patch configs and tool allowlists\n- **Session streaming**: real-time message streams via WebSocket (`/api/agents/{id}/ws`)\n- **Approval gates**: approve/reject pending human-in-the-loop decisions\n- **Channel bridges**: configure Telegram, Discord, and other channel integrations\n- **Skill management**: install from FangHub, ClawHub, or SkillHub registries\n- **Hand orchestration**: activate/deactivate/pause multi-agent hand instances\n- **Workflow execution**: run and dry-run workflows with live status tracking\n- **Runtime control**: create/restore backups, manage task queues, trigger session cleanup, shutdown server\n\nAll write operations flow through the mutation hooks layer, ensuring cache consistency across the SPA without manual refresh.","other-librefang-api-src":"# Other — librefang-api-src\n\n# Login Page (`librefang-api/src/login_page.html`)\n\n## Purpose\n\nA self-contained HTML page that provides the authentication gate for the LibreFang dashboard. It ships as a single file with no external dependencies — all styling and logic is embedded inline. The backend serves this page to unauthenticated users, and upon successful login, it stores the resulting session token in `localStorage` and redirects into the dashboard.\n\n## When It Is Served\n\nThe page is intended to be returned by the API server whenever a request to a protected route lacks valid credentials (e.g., an expired or missing `librefang-api-key`). It is referenced by the server, not a standalone file users open directly.\n\n## Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant U as Browser\n    participant S as API Server\n    U->>S: GET protected route (no/invalid token)\n    S-->>U: Serve login_page.html\n    U->>S: POST /api/auth/dashboard-login {username, password}\n    alt TOTP required\n        S-->>U: {requires_totp: true}\n        Note over U: Shows TOTP field\n        U->>S: POST /api/auth/dashboard-login {username, password, totp_code}\n    end\n    S-->>U: {ok: true, token: \"...\"}\n    Note over U: Store token in localStorage\n
