plugin configuration.\n3. Produces platform-specific bundle artifacts in `target/release/bundle/`.\n\n```bash\n# Development (uses Tauri dev server, hot reload)\ncargo tauri dev\n\n# Production build (uses custom-protocol feature automatically)\ncargo tauri build\n```\n\n## Packaging\n\nTauri's bundle configuration produces installers for all targets:\n\n| Platform | Formats |\n|---|---|\n| Linux | `.deb`, `.AppImage` |\n| macOS | `.dmg` (min macOS 12.0) |\n| Windows | NSIS installer (WebView2 bootstrapper included) |\n\nIcons are expected at `icons/` in the project root with the standard Tauri naming convention (`icon.ico`, `icon.png`, `32x32.png`, `128x128.png`, `128x128@2x.png`).\n\n## Auto-Update Flow\n\n1. `tauri-plugin-updater` polls the GitHub Releases endpoint on startup or schedule.\n2. The endpoint returns a JSON manifest signed with the Ed25519 key embedded in `tauri.conf.json`.\n3. The signature is verified against the bundled public key before any download.\n4. On Windows, updates install in `passive` mode (user sees a progress bar, no manual steps).\n5. On Linux/macOS, the updated bundle replaces the current installation per Tauri's platform behavior.\n\nTo rotate the signing key, update the `pubkey` field and re-sign all release assets with the new minisign key.\n\n## Security Considerations\n\n- The CSP allows `'unsafe-inline'` and `'unsafe-eval'` in script sources. This is typical for development convenience but should be locked down for production if the threat model requires it.\n- No Windows code-signing certificate is configured (`certificateThumbprint: null`). Production Windows builds should set this to avoid SmartScreen warnings.\n- macOS entitlements and exception domains are unconfigured. If the app needs network or hardware access on macOS, entitlements must be added and codesigned with an Apple Developer certificate.\n- The embedded update public key is compile-time static. Compromise of the corresponding secret key allows distributing malicious updates.","other-librefang-extensions":"# Other — librefang-extensions\n\n# librefang-extensions\n\nExtension and integration system for LibreFang. Provides one-click MCP (Model Context Protocol) server setup, a local credential vault with AES-256-GCM encryption, and OAuth2 PKCE authentication flows for third-party service integrations.\n\n## Overview\n\nThis crate acts as the integration layer between LibreFang's core runtime and external services. It handles three distinct concerns:\n\n| Concern | Purpose |\n|---|---|\n| **MCP Server Setup** | Bootstrap and configure MCP-compatible servers with minimal user interaction |\n| **Credential Vault** | Encrypt and persist sensitive credentials (API keys, tokens) at rest |\n| **OAuth2 PKCE** | Perform browser-based OAuth2 authorization code flows with PKCE for services that require it |\n\nThe module is designed as a library crate consumed by higher-level LibreFang components. It has no binary target.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-types] --> B[librefang-extensions]\n    B --> C[Credential Vault]\n    B --> D[MCP Server Setup]\n    B --> E[OAuth2 PKCE Client]\n    C -->|aes-gcm + argon2| F[Encrypted Store on Disk]\n    E -->|reqwest + axum| G[OAuth2 Token Exchange]\n    D --> H[MCP Server Configuration]\n```\n\n## Key Dependency Rationale\n\n### Cryptography Stack\n\n- **`aes-gcm`** — Authenticated encryption (AES-256-GCM) for the credential vault. Provides both confidentiality and integrity for stored secrets.\n- **`argon2`** — Key derivation from user-provided passphrases. Used to derive the AES-GCM encryption key from a vault password.\n- **`sha2`** — Additional hashing utilities, used in PKCE code verifier/challenge generation.\n- **`zeroize`** — Ensures sensitive key material and credentials are zeroed from memory when dropped.\n- **`rand`** — Cryptographically secure random number generation for nonce, IV, and PKCE code verifier generation.\n\n### Networking Stack\n\n- **`reqwest`** — HTTP client for outbound OAuth2 token exchange requests and MCP server health checks. Uses `rustls` as the TLS backend (not native TLS).\n- **`rustls` + `webpki-roots` + `rustls-native-certs`** — TLS implementation. Combines Mozilla's root certificate bundle with the OS-native certificate store for broad compatibility.\n- **`axum`** — Lightweight HTTP server used locally to handle the OAuth2 redirect callback (catching the authorization code).\n\n### Concurrency and Storage\n\n- **`dashmap`** — Concurrent hash map for in-memory caching of decrypted credentials and active OAuth2 sessions without locking the entire map.\n- **`tokio`** — Async runtime integration. All I/O operations (file, network) are async.\n- **`dirs`** — Resolves platform-specific directories (`~/.local/share`, `%APPDATA%`, etc.) for vault file storage.\n\n### Serialization\n\n- **`serde` + `serde_json` + `toml`** — Vault metadata and MCP server configurations are serialized as JSON for the vault store and TOML for user-facing configuration files.\n\n## Credential Vault\n\nThe vault persists encrypted credentials to disk. The encryption pipeline:\n\n1. User supplies a **vault passphrase**.\n2. **Argon2** derives a 256-bit key from the passphrase with a random salt.\n3. Credentials are serialized to JSON, then encrypted with **AES-256-GCM** using a random nonce.\n4. The ciphertext, salt, and nonce are written to a file in the platform data directory.\n\nOn read, the process reverses. In-memory representations of sensitive values use `zeroize::Zeroize` to clear memory on drop.\n\n### Vault File Location\n\nResolved via the `dirs` crate, typically:\n\n| Platform | Path |\n|---|---|\n| Linux | `~/.local/share/librefang/vault.dat` |\n| macOS | `~/Library/Application Support/librefang/vault.dat` |\n| Windows | `%APPDATA%\\librefang\\vault.dat` |\n\n## OAuth2 PKCE Flow\n\nThe module implements the full Authorization Code Flow with PKCE (RFC 7636):\n\n1. Generate a cryptographically random **code verifier**.\n2. Compute the **code challenge** as `BASE64URL(SHA256(code_verifier))`.\n3. Open the user's browser to the authorization endpoint with the challenge.\n4. Spawn a local **axum** HTTP server on a random high port to receive the redirect callback.\n5. Exchange the authorization code + code verifier for tokens via `reqwest` POST to the token endpoint.\n6. Store the resulting access/refresh tokens in the credential vault.\n\n## MCP Server Setup\n\nProvides streamlined configuration and bootstrapping for MCP-compatible servers. This includes:\n\n- Parsing MCP server configuration from TOML files.\n- Validating configuration against expected schemas from `librefang-types`.\n- Generating default configurations for common MCP server implementations.\n\n## Error Handling\n\nAll fallible operations return `Result<T, ExtensionError>` where `ExtensionError` is derived via `thiserror`. Error variants cover:\n\n- Vault encryption/decryption failures\n- File I/O errors\n- OAuth2 protocol errors (invalid state, token exchange failures)\n- Network/TLS errors from `reqwest` and `rustls`\n- Serialization/deserialization errors\n\n## Relationship to Other Crates\n\n| Crate | Relationship |\n|---|---|\n| `librefang-types` | Consumes shared types for credentials, server configs, and error types |\n| `librefang-runtime` | Test dependency only — used in integration tests to verify vault and OAuth flows against a runtime environment |\n\nThis crate is consumed by the main LibreFang application and any CLI/GUI frontends that need to manage extensions, authenticate with external services, or persist credentials.\n\n## Testing\n\nIntegration tests use:\n\n- **`tempfile`** — Isolated temporary directories for vault file tests, avoiding pollution of user data directories.\n- **`serial_test`** — Serializes tests that touch shared resources (port bindings for OAuth callback servers, temp directories).\n- **`tokio-test`** — Async test utilities for runtime-dependent operations.\n\nRun tests with:\n\n```bash\ncargo test -p librefang-extensions\n```","other-librefang-hands":"# Other — librefang-hands\n\n# librefang-hands\n\nHands system for LibreFang — curated autonomous capability packages.\n\n## Overview\n\nIn LibreFang, a **Hand** is a discrete, curated capability package that defines an autonomous behavior or skill. Hands encapsulate everything needed to describe and manage a specific capability — its identity, configuration, metadata, and lifecycle state. This module provides the infrastructure for defining, loading, storing, and querying hands throughout the system.\n\nThink of hands as installable \"skills\" — each one is self-contained, identifiable, and can be activated or deactivated independently.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[TOML / JSON Config Files] -->|Deserialize| B[Hand Definitions]\n    B --> C[Hand Registry - DashMap]\n    C -->|Query by UUID| D[Consumers]\n    C -->|Query by name/tag| D\n    E[librefang-types] -->|Shared types & traits| B\n    D --> F[librefang-runtime]\n```\n\n## Key Concepts\n\n### Hand\n\nA hand represents a single autonomous capability. Each hand carries:\n\n- **Unique identity** — identified by UUID, ensuring global uniqueness across the system\n- **Metadata** — name, description, version, and timestamps (via `chrono`) tracking creation and modification\n- **Configuration** — arbitrary structured data loaded from TOML or JSON, typed against definitions from `librefang-types`\n- **Lifecycle state** — tracks whether a hand is loaded, active, disabled, or errored\n\n### Hand Registry\n\nThe module maintains a thread-safe registry of all known hands, backed by `DashMap`. This provides:\n\n- **Concurrent access** — multiple threads can read and write hand entries without external locking\n- **Fast lookup** — hands can be retrieved by UUID or by name\n- **Safe mutation** — atomic insert, update, and remove operations\n\n## Dependencies & Rationale\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions, traits, and domain primitives used across all LibreFang crates |\n| `serde` / `serde_json` / `toml` | Declarative hand definitions loaded from TOML or JSON configuration files |\n| `dashmap` | Lock-free concurrent hashmap backing the hand registry |\n| `uuid` | Unique identification of each hand instance |\n| `chrono` | Timestamps for hand creation, modification, and lifecycle events |\n| `thiserror` | Ergonomic, typed error definitions for loading and validation failures |\n| `tracing` | Structured logging for hand lifecycle events and registry operations |\n\n## Loading Hands\n\nHands are defined declaratively in configuration files (TOML preferred, JSON supported). The module deserializes these into typed hand structures using `serde`, validates them, and inserts them into the registry.\n\nTypical loading flow:\n\n1. Read a TOML or JSON file containing one or more hand definitions\n2. Deserialize into the hand type using the serde-derived structures\n3. Validate required fields (name present, UUID unique, configuration well-formed)\n4. Assign a UUID if not provided\n5. Record creation timestamp via `chrono`\n6. Insert into the `DashMap`-backed registry\n7. Emit a `tracing` event confirming the hand was loaded\n\n## Error Handling\n\nAll fallible operations return typed errors derived via `thiserror`. Error categories include:\n\n- **Parse errors** — malformed TOML or JSON input\n- **Validation errors** — missing required fields, invalid configuration values\n- **Registry errors** — duplicate hand names or UUIDs, hand not found on lookup\n- **I/O errors** — file not found, permission denied during loading\n\nConsumers should match on the specific error variants to decide on recovery strategies.\n\n## Relationship to Other Crates\n\n- **`librefang-types`** — provides the foundational types that hand definitions build on. This crate depends on it but does not depend on the runtime.\n- **`librefang-runtime`** — consumes hands at execution time. It appears as a dev-dependency here for integration testing, meaning the dependency direction is `librefang-runtime → librefang-hands`.\n- **The broader system** — any crate that needs to query available capabilities does so through this module's registry.\n\n## Testing\n\nThe dev-dependencies reveal the testing approach:\n\n- **`tokio-test`** — async test utilities for testing concurrent registry operations\n- **`tempfile`** — creates temporary config files for loading tests without touching the filesystem\n- **`librefang-runtime`** — integration tests verifying hands work correctly when consumed by the runtime\n- **`serial_test`** — serializes tests that share mutable global state (the registry), preventing race conditions in the test suite\n\n## Extending\n\nTo add a new hand type or capability:\n\n1. Define the configuration schema in the hand's TOML structure\n2. Ensure any new domain types are added to `librefang-types` if they are shared\n3. Add deserialization and validation logic in this crate\n4. Write tests using `tempfile` for config loading and `serial_test` for registry mutations\n5. Verify integration with `librefang-runtime` via the dev-dependency test suite","other-librefang-http":"# Other — librefang-http\n\n# librefang-http\n\nShared HTTP client builder providing consistent TLS configuration and proxy support across the LibreFang workspace.\n\n## Purpose\n\nThis crate centralizes the construction of `reqwest::Client` instances so that every component in LibreFang——shares identical TLS and proxy behaviour. Rather than each binary configuring its own HTTP stack, they delegate to this library to produce a pre-configured client.\n\n## Dependencies\n\n| Crate | Role |\n|---|---|\n| `reqwest` | Underlying HTTP client |\n| `rustls` | TLS backend (avoids native OpenSSL linkage) |\n| `webpki-roots` | Mozilla CA certificate bundle |\n| `rustls-native-certs` | System certificate store loader |\n| `librefang-types` | Shared type definitions across the workspace |\n| `tracing` | Diagnostic logging |\n\n## TLS Certificate Resolution\n\nThe crate implements a two-tier certificate loading strategy:\n\n1. **Native certificates first** — loads certificates from the operating system's trust store via `rustls-native-certs`.\n2. **WebPKI roots as fallback** — if native certificate loading fails or yields no results, falls back to Mozilla's `webpki-roots` bundle.\n\nThis ensures the client works both in environments with managed PKI (corporate proxies, custom CAs installed system-wide) and in minimal containers where no system cert store exists.\n\n```mermaid\nflowchart TD\n    A[Build reqwest Client] --> B[Load native system certs]\n    B -->|Found| C[Use native certs as root store]\n    B -->|None or error| D[Fallback to webpki-roots]\n    C --> E[Configure rustls TLS on reqwest]\n    D --> E\n```\n\n## Proxy Support\n\nThe builder configures `reqwest` to respect standard proxy environment variables (`HTTP_PROXY`, `HTTPS_PROXY`, `NO_PROXY`) automatically. This is critical for deployments behind corporate firewalls or when routing traffic through inspection proxies.\n\n## Integration with Other Crates\n\n```mermaid\ngraph LR\n    A[librefang-types] --> B[librefang-http]\n    B --> C[librefang-cli]\n    B --> D[other consumers]\n```\n\n`librefang-http` consumes types from `librefang-types` and exposes a client builder that downstream crates call at startup. Because it has no incoming or outgoing internal call edges, it functions as a leaf utility——dependents call into it, but it does not call back into the rest of the workspace.\n\n## Usage Pattern\n\nConsumers depend on this crate in their `Cargo.toml` and use the builder to obtain a ready-made `reqwest::Client` rather than constructing one directly. All TLS configuration, certificate loading, and proxy setup is handled internally, keeping downstream code focused on request logic rather than transport concerns.","other-librefang-kernel-handle":"# Other — librefang-kernel-handle\n\n# librefang-kernel-handle\n\nDefines the `KernelHandle` trait — the primary abstraction that in-process callers use to interact with the LibreFang kernel.\n\n## Purpose\n\nThis crate provides a consistent interface for any component running inside the same process as the LibreFang kernel. Rather than coupling callers directly to a concrete kernel implementation, dependents code against the `KernelHandle` trait. This decouples the \"what you can do\" from the \"how it's implemented,\" making testing, mocking, and architectural layering straightforward.\n\nThe trait is **async** (via `async-trait`) and is designed to be used with the Tokio runtime.\n\n## When to Use This Crate\n\n- You are building an in-process service, plugin, or subsystem that needs to call into the LibreFang kernel.\n- You need to mock or stub kernel interactions in tests for a component that lives in the same process.\n- You are implementing the kernel itself and need to expose a handle that satisfies this contract.\n\n## Dependencies and What They Signal\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared domain types (request/response structs, error types, etc.) that flow through the kernel interface. |\n| `async-trait` | Enables the trait to declare async methods that callers can `await`. |\n| `serde` / `serde_json` | Trait methods likely accept or return types that are `Serialize`/`Deserialize` — for example, when forwarding structured data through the kernel boundary. |\n| `tokio` | The async runtime backing the trait's futures. |\n| `tracing` | Instrumentation for kernel handle invocations. |\n| `uuid` | Identity types used in requests or correlation tracking. |\n\n## Architecture\n\n```\n┌──────────────────────┐\n│   In-process Caller   │\n│  (service, plugin,    │\n│   test harness, etc.) │\n└──────────┬───────────┘\n           │ depends on trait\n           ▼\n┌──────────────────────┐\n│   KernelHandle trait  │  ← this crate\n└──────────┬───────────┘\n           │ implemented by\n           ▼\n┌──────────────────────┐\n│   LibreFang Kernel    │\n│   (concrete impl)     │\n└──────────────────────┘\n```\n\nThe concrete kernel lives in a separate crate and implements `KernelHandle`. Callers only reference this trait crate, keeping them insulated from kernel internals.\n\n## Integration with the Wider Codebase\n\n- **`librefang-types`** is the shared vocabulary. Any struct or enum that crosses the kernel boundary is defined there, not here. This crate re-uses those types in its trait signatures.\n- Concrete implementations of `KernelHandle` live elsewhere (typically in the kernel crate itself or in a dedicated integration layer).\n- Downstream crates add `librefang-kernel-handle` as a dependency and accept an `impl KernelHandle` (or `Arc<dyn KernelHandle>`) in their constructors.\n\n## Testing Patterns\n\nBecause the trait is the sole contract, unit tests for callers typically:\n\n1. Create a mock/stub that implements `KernelHandle`.\n2. Wire the mock into the component under test.\n3. Assert that the component invokes the expected trait methods with the expected arguments.\n\nNo real kernel is needed for these tests — the trait is the seam.","other-librefang-kernel-metering":"# Other — librefang-kernel-metering\n\n# librefang-kernel-metering\n\nCost metering and quota enforcement for the LibreFang kernel.\n\n## Overview\n\nThis crate provides the accounting and quota infrastructure that tracks resource consumption during kernel operations. It is responsible for metering computational costs — such as memory allocations, API calls, or execution time — and enforcing limits before resources are exhausted.\n\n## Purpose in the Kernel\n\nLibreFang meters resource usage to prevent runaway or malicious workloads from consuming unbounded kernel resources. This module acts as the ledger and gatekeeper:\n\n- **Metering**: Recording resource consumption as operations occur.\n- **Quota enforcement**: Rejecting or halting operations when a configured limit is breached.\n\n## Dependencies\n\n| Dependency | Role |\n|---|---|\n| `librefang-types` | Shared types used across the kernel — likely provides metering-related type definitions, cost units, or quota descriptors. |\n| `librefang-memory` | Memory subsystem — metering likely intercepts or queries allocation state to track memory costs. |\n| `librefang-runtime` | Runtime support — provides the execution context in which metering checks occur (e.g., per-request or per-session contexts). |\n| `serde` | Serialization — quota configurations and metering snapshots are likely serializable for persistence or transport. |\n\n## Architectural Position\n\n```mermaid\ngraph TD\n    A[Incoming Operation] --> B{Metering Check}\n    B -->|Within Quota| C[Execute Operation]\n    C --> D[Record Cost]\n    B -->|Over Quota| E[Reject / Halt]\n    D --> F[Updated Ledger]\n    F --> B\n```\n\nEvery operation that carries a cost flows through the metering layer. The ledger is updated after successful execution, and the accumulated total is checked before the next operation proceeds.\n\n## Current Status\n\nThis module is in an early or stub state. No internal types, functions, or execution flows have been implemented yet. The dependency graph and package description define its intended scope, but the public API has not been populated.\n\n## Expected Conventions\n\nWhen contributing to this module, follow these patterns consistent with the rest of the LibreFang kernel:\n\n- **Cost types** should be newtypes or structs deriving `serde::Serialize` / `serde::Deserialize` for portability.\n- **Quota configuration** should be decoupled from enforcement logic — accept quota parameters rather than hardcoding limits.\n- **Metering checks** should be cheap, synchronous, and infallible when within quota. Rejection paths should return a clear error type (likely defined in `librefang-types`).\n- **State** should be scoped to a context (session, request, tenant) rather than global, to support concurrent workloads.","other-librefang-kernel-router":"# Other — librefang-kernel-router\n\n# librefang-kernel-router\n\nHand and template routing engine for the LibreFang kernel. This module is responsible for resolving incoming requests to the appropriate **hand** (handler) and **template** based on configurable routing rules.\n\n## Overview\n\nLibreFang processes requests through named *hands*—discrete handler units that encapsulate specific behavior. The router determines which hand (and which template variant) should handle a given input by evaluating a routing table of pattern-matching rules.\n\nThe routing table is loaded from TOML configuration files discovered on the local filesystem. Rules are expressed as regex patterns matched against request identifiers, with priority and fallback semantics governing conflict resolution.\n\n## Dependencies\n\n| Crate | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions (request identifiers, route entries, errors) |\n| `librefang-hands` | Hand registry and hand trait definitions |\n| `serde` / `serde_json` | Deserialization of routing tables and serialization of route resolution results |\n| `regex-lite` | Pattern matching for route rule evaluation |\n| `toml` | Parsing of routing configuration files |\n| `dirs` | Resolving platform-specific config directory paths |\n| `tracing` | Structured logging of route resolution decisions |\n\n### Dev Dependencies\n\n- **`tempfile`** — Creates isolated temporary directories for config-loading tests.\n- **`librefang-runtime`** — Provides the runtime context needed for integration tests that exercise full route resolution.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    A[Routing Config TOML] -->|Parsed| B[Route Table]\n    B --> C{Incoming Request}\n    C -->|Match against patterns| D[Resolved Hand + Template]\n    D --> E[librefang-hands]\n    F[librefang-types] --> B\n    F --> C\n```\n\n### Route Table\n\nThe routing table is a declarative mapping loaded from TOML. Each entry associates a regex pattern with a target hand name and an optional template name. On startup, the router reads configuration from a platform-appropriate directory (resolved via `dirs`) and compiles the patterns into matchers.\n\n### Resolution Strategy\n\nWhen resolving a request, the router evaluates rules in a defined order. The first pattern that matches the request identifier determines the target hand and template. If no rule matches, a fallback or error result is returned depending on configuration.\n\nThe `tracing` crate is used to emit diagnostic events during resolution, aiding debugging of misconfigured or ambiguous routes.\n\n## Integration with the Kernel\n\nThis module sits between the raw request layer and the hand execution layer:\n\n1. **Input** — A request identifier (typed via `librefang-types`).\n2. **Processing** — The router matches the identifier against its compiled route table using `regex-lite`.\n3. **Output** — A resolved hand name and template name, which the kernel then dispatches to the appropriate handler from `librefang-hands`.\n\n## Configuration\n\nRouting rules are defined in TOML files located in the LibreFang configuration directory. The `dirs` crate resolves the platform-specific config path (e.g., `~/.config/librefang/` on Linux).\n\nExample structure of a routing configuration:\n\n```toml\n[[route]]\npattern = \"^greeting\\\\..*\"\nhand = \"greeting-hand\"\ntemplate = \"default\"\n\n[[route]]\npattern = \"^farewell\\\\..*\"\nhand = \"farewell-hand\"\ntemplate = \"default\"\n```\n\nRules are evaluated in file order. More specific patterns should be listed before broader catch-all patterns.\n\n## Testing\n\nUnit tests use `tempfile` to create isolated config directories, ensuring tests don't depend on the host system's LibreFang configuration. Integration tests pull in `librefang-runtime` to exercise the full resolution pipeline from config loading through hand dispatch.","other-librefang-kernel-src":"# Other — librefang-kernel-src\n\n# librefang-kernel\n\nThe central orchestrator crate for LibreFang. It manages agent lifecycles, tool dispatch, skill evolution, approval workflows, channel routing, and auto-reply background processing.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Kernel Core\n        A[LibreFangKernel] --> B[AgentRegistry]\n        A --> C[SkillRegistry]\n        A --> D[SessionMemory]\n        A --> E[ApprovalManager]\n    end\n\n    subgraph Background Services\n        A --> F[AutoReplyEngine]\n        A --> G[ApprovalSweepTask]\n    end\n\n    subgraph Agent Spawning\n        A --> H[spawn_agent_inner]\n        H --> I{Has parent?}\n        I -->|Yes| J[Privilege subset check]\n        I -->|No| K[Top-level registration]\n        J --> B\n        K --> B\n    end\n\n    subgraph Tool Resolution\n        A --> L[available_tools]\n        L --> M[Declared tools / profiles]\n        L --> N[Default-available skill_evolve_*]\n        L --> O[Exec policy auto-promotion]\n    end\n```\n\n## Auto-Reply Engine\n\n**File:** `auto_reply.rs`\n\nA concurrency-limited background engine that triggers automatic agent replies based on incoming messages. It enforces suppression patterns and caps concurrent in-flight replies via a tokio `Semaphore`.\n\n### `AutoReplyChannel`\n\nDefines the delivery target for an auto-reply:\n\n| Field | Type | Description |\n|---|---|---|\n| `channel_type` | `String` | Platform identifier (e.g. `\"telegram\"`, `\"discord\"`) |\n| `peer_id` | `String` | Recipient user or conversation ID |\n| `thread_id` | `Option<String>` | Optional thread for platforms that support threaded replies |\n\n### `AutoReplyEngine`\n\n```rust\npub struct AutoReplyEngine {\n    config: AutoReplyConfig,\n    semaphore: Arc<Semaphore>,\n}\n```\n\nConstructed from `AutoReplyConfig`. The semaphore is initialized with `max_concurrent.max(1)` permits, guaranteeing at least one concurrent slot even if the config is zero.\n\n#### `should_reply`\n\n```rust\npub fn should_reply(&self, message: &str, _channel_type: &str, agent_id: AgentId) -> Option<AgentId>\n```\n\nGate-check whether a message should trigger an auto-reply. Returns `None` if:\n\n1. Auto-reply is disabled (`config.enabled == false`)\n2. The message (case-insensitive) contains any `suppress_patterns` substring\n\nReturns `Some(agent_id)` when the message passes both checks.\n\n#### `execute_reply`\n\n```rust\npub async fn execute_reply<F>(\n    &self,\n    kernel_handle: Arc<dyn KernelHandle>,\n    agent_id: AgentId,\n    message: String,\n    reply_channel: AutoReplyChannel,\n    send_fn: F,\n) -> Result<tokio::task::JoinHandle<()>, String>\n```\n\nSpawns a background tokio task that:\n\n1. Acquires a semaphore permit (non-blocking; returns `Err` immediately if at capacity)\n2. Calls `kernel_handle.send_to_agent` with a timeout (`config.timeout_secs`)\n3. On success, invokes `send_fn(response, reply_channel)` to deliver the result\n4. On agent error or timeout, logs a warning — the caller is not notified of failure\n\nThe `send_fn` parameter is a closure `Fn(String, AutoReplyChannel) -> BoxFuture<'static, ()>` that handles actual delivery to the channel adapter. The semaphore permit is held for the lifetime of the spawned task (dropped when `_permit` goes out of scope).\n\n#### Accessors\n\n| Method | Returns |\n|---|---|\n| `is_enabled()` | `bool` — mirrors `config.enabled` |\n| `config()` | `&AutoReplyConfig` — read-only reference |\n| `available_permits()` | `usize` — current semaphore capacity (useful for monitoring) |\n\n## Kernel Test Coverage & Documented Invariants\n\nThe `kernel/tests.rs` file serves as both a regression suite and living documentation of kernel behavioral contracts. The key invariants it establishes are described below.\n\n### Agent Spawning & Lineage\n\n#### Parent-child privilege restriction\n\n`spawn_agent_inner` enforces that a child agent's capabilities must be a **strict subset** of its parent's. This prevents privilege escalation where a restricted parent spawns an unrestricted child:\n\n- A parent with only `file_read` cannot spawn a child requesting `shell_exec` or `*` wildcard tools.\n- A child requesting only `file_read` under a parent with `[file_read, file_write]` succeeds.\n- Spawning with a `parent` argument pointing to a non-existent `AgentId` fails closed with a \"not registered\" error.\n\n#### Default model override\n\nWhen a global `DefaultModelConfig` is set (e.g. a local Ollama model), agents spawned with `provider: \"default\"` and `model: \"default\"` defer concrete resolution to execution time. The manifest stores the placeholder values; `resolve_driver` applies the real provider/model at LLM-call time.\n\n#### Provider switching clears stale overrides\n\n`set_agent_model` clears `api_key_env` and `base_url` overrides when the provider changes. This prevents a provider switch from accidentally routing requests to the previous provider's endpoint with stale credentials. Same-provider model swaps intentionally preserve per-agent overrides.\n\n### Tool Availability\n\n#### Glob pattern matching\n\nDeclared tool names support glob patterns. `\"file_*\"` matches `file_read`, `file_write`, `file_list` but not `web_fetch` or `shell_exec`.\n\n#### Exec policy auto-promotion\n\nAn agent that declares `shell_exec` in `capabilities.tools` without an explicit `exec_policy` has its policy automatically promoted to `ExecSecurityMode::Full`. Without this, the global default (Deny) would silently strip `shell_exec` from `available_tools()`.\n\n#### `tools_disabled` override\n\nWhen `manifest.tools_disabled == true`, `available_tools()` returns an empty list regardless of declared capabilities, profiles, or MCP servers.\n\n#### Default-available skill evolution tools\n\nAll `skill_evolve_*` tools (`skill_evolve_create`, `skill_evolve_update`, `skill_evolve_patch`, `skill_evolve_delete`, `skill_evolve_rollback`, `skill_evolve_write_file`, `skill_evolve_remove_file`, `skill_read_file`) are always available to every agent, even those with restrictive `capabilities.tools`. This ensures any agent can self-evolve skills regardless of its declared tool set.\n\n### Hand Activation\n\n- `activate_hand` does **not** seed `tool_allowlist` or `tool_blocklist` on the manifest. The runtime tool surface is determined solely by capabilities/profiles/MCP, not runtime filters.\n- `deactivate_hand` followed by `activate_hand` rebuilds an identical runtime profile (capabilities, profile, allowlist, blocklist, MCP servers).\n\n### Skill Registry Management\n\n#### Disabled list filtering\n\n`config.skills.disabled` excludes named skills at boot. The skill directory may exist on disk, but the registry will not load it. This filter is re-applied on every `reload_skills()` call.\n\n#### Extra directories overlay\n\n`config.skills.extra_dirs` loads skills from additional filesystem paths. When a skill exists in both the primary `skills/` directory and an extra dir, the **local** install wins.\n\n#### Stable mode freeze\n\nWhen `config.mode == KernelMode::Stable`, the skill registry is frozen at boot. `reload_skills()` becomes a no-op, and the background review gate refuses to spawn new reviews. Pre-existing skills remain visible.\n\n### Approval & Notification Routing\n\nEscalated approval notifications prefer the per-request `route_to` targets over policy routing rules, agent notification rules, and global approval channels. This ensures explicit escalation targets always take precedence.\n\n`spawn_approval_sweep_task` is idempotent — calling it multiple times does not create duplicate sweep tasks. The `approval_sweep_started` atomic flag is cleared on shutdown.\n\n### JSON Extraction from LLM Responses\n\n`extract_json_from_llm_response` handles multiple LLM output formats:\n\n- JSON inside `` ```json `` code blocks (takes the first valid block)\n- Bare JSON objects (`{...}`)\n- JSON surrounded by prose text\n- JSON with nested braces inside string values (parsed correctly, not by naive brace matching)\n- Returns `None` for malformed JSON or responses with no JSON at all\n\n### Ephemeral Messaging\n\n`send_message_ephemeral` sends a one-shot message to an agent without modifying its session history. It errors on unknown agent IDs. Even when the LLM call fails, the session's message count remains unchanged.\n\n### Peer-Scoped Keys\n\n```rust\nfn peer_scoped_key(key: &str, peer_id: Option<&str>) -> String\n```\n\nNamespaces a key under `peer:<peer_id>:<key>` when a peer ID is provided. Returns the key unchanged when `peer_id` is `None`. Used for per-user memory isolation.\n\n### Thinking Config Overrides\n\n`apply_thinking_override` modifies an agent manifest's thinking configuration:\n\n| Override value | Effect |\n|---|---|\n| `None` | No change — preserves existing thinking config |\n| `Some(false)` | Clears `manifest.thinking` entirely (disables extended thinking) |\n| `Some(true)` | Ensures thinking is enabled; inserts defaults if absent, preserves existing `budget_tokens` if present |\n\n### Condition Evaluation\n\n`evaluate_condition` supports `agent.tags contains '<tag>'` syntax. Returns `true` for `None` or empty conditions. Unknown condition formats return `false` (strict default — prevents accidental injection).\n\n### Trace Summarization\n\n`summarize_traces_for_review` produces a bounded summary of tool decision traces:\n\n- Short traces (≤ ~5 entries) are included verbatim\n- Long traces show the first entries, last entries, and an \"omitted\" marker in between\n- Used by the background skill review pipeline to keep LLM context windows bounded\n\n### Reviewer Block Sanitization\n\n`sanitize_reviewer_block` and `sanitize_reviewer_line` prepare LLM output for the reviewer prompt by:\n\n- Stripping triple-backtick code fences (prevents injection of fake JSON responses)\n- Removing `<data>`/`<\/data>` envelope markers (prevents escape from the prompt envelope)\n- Stripping control characters (`\\x00`, `\\x07`, etc.) while preserving newlines and tabs\n- Truncating by character count (not byte count) with a `…[truncated]` marker, safe on UTF-8 boundaries","other-librefang-kernel-tests":"# Other — librefang-kernel-tests\n\n# librefang-kernel-tests\n\nIntegration and end-to-end tests for the `librefang-kernel` crate. These tests exercise the kernel's major subsystems—agent spawning, hand lifecycle, WASM execution, workflow orchestration, and CLI tooling—against real infrastructure where possible.\n\n## Test Files\n\n| File | Scope | Requires LLM |\n|------|-------|-------------|\n| `integration_test.rs` | Basic agent spawn → message → response pipeline | Yes (`GROQ_API_KEY`) |\n| `multi_agent_test.rs` | Hand lifecycle, state persistence, agent registry | No (mostly) |\n| `wasm_agent_integration_test.rs` | WASM module loading, execution, fuel limits | No |\n| `workflow_integration_test.rs` | Workflow registration, multi-step pipelines | Yes (one test) |\n| `purge_sentinels_test.rs` | `purge_sentinels` CLI binary | No |\n\n## Running\n\n```bash\n# All tests that don't need external services\ncargo test -p librefang-kernel -- --nocapture\n\n# Include live LLM integration tests\nGROQ_API_KEY=gsk_... cargo test -p librefang-kernel -- --nocapture\n```\n\nTests that require `GROQ_API_KEY` print a skip message and return early when the variable is unset—they never fail due to missing credentials.\n\n## Architecture\n\nEach test file follows the same pattern: construct a `KernelConfig` pointing at an isolated temp directory, boot the kernel, exercise a subsystem, assert invariants, then `kernel.shutdown()`.\n\n```mermaid\ngraph TD\n    TC[test_config helper] --> KC[KernelConfig]\n    KC --> BK[LibreFangKernel::boot_with_config]\n    BK --> SA[spawn_agent]\n    BK --> AH[activate_hand]\n    BK --> RW[register_workflow / run_workflow]\n    BK --> SM[send_message]\n    BK --> SM2[send_message_streaming]\n    BK --> SD[kernel.shutdown]\n```\n\n## Test Coverage by Subsystem\n\n### Agent Spawning and Messaging (`integration_test.rs`)\n\nTwo tests validate the core LLM pipeline:\n\n- **`test_full_pipeline_with_groq`** — Boots the kernel, spawns a single agent from a TOML `AgentManifest`, sends a message via the Groq API, asserts the response is non-empty and token usage is reported, then kills the agent.\n- **`test_multiple_agents_different_models`** — Spawns two agents configured with different Groq models (`llama-3.3-70b-versatile` and `llama-3.1-8b-instant`), sends each a message, verifies both respond independently.\n\nBoth use `test_config()` which creates a fresh temp directory under `$TMPDIR/librefang-integration-test` and configures the default model provider as `\"groq\"`.\n\n### Hand Lifecycle (`multi_agent_test.rs`)\n\nThe largest test file. Covers the hand activation/deactivation system and its interaction with the agent registry.\n\n**Test fixtures** are three hand TOML definitions:\n\n- `HAND_A` (`test-clip`) — single-agent hand with tools `[\"file_read\", \"file_write\", \"shell_exec\"]`\n- `HAND_B` (`test-devops`) — single-agent hand with `[\"shell_exec\"]`\n- `HAND_C` (`test-research`) — multi-agent hand with `analyst` and `planner` roles, where `planner` is the explicit coordinator\n\n**Lifecycle tests:**\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_activate_hand_spawns_agent` | Activation creates an agent in the registry |\n| `test_deactivate_kills_agent` | Deactivation removes the agent from the registry |\n| `test_pause_and_resume_hand` | Pause sets status to `\"Paused\"`, agent persists; resume restores `\"Active\"` |\n| `test_deterministic_agent_id` | `AgentId::from_hand_agent(\"test-clip\", \"main\", None)` matches the spawned ID |\n| `test_deterministic_id_stable_across_reactivation` | Same hand+role produces the same agent ID after deactivate/reactivate |\n| `test_explicit_coordinator_role_used_for_routes` | `HAND_C` routes resolve to the `planner` coordinator, not `main` |\n\n**Metadata and inheritance:**\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_agent_tagged_with_hand_metadata` | Agent gets tags `\"hand:test-clip\"` and `\"hand_instance:{uuid}\"` |\n| `test_hand_tools_applied_to_agent` | Agent manifest inherits the hand's tool list |\n| `test_system_prompt_preserved` | Agent's system prompt contains the hand's prompt text |\n| `test_default_provider_resolved_to_kernel_default` | `provider = \"default\"` is resolved to the actual kernel provider, not left as the string `\"default\"` |\n\n**State persistence (`test_hand_state_persistence`):**\n\nAfter activation, the kernel writes `hand_state.json` to `{data_dir}/`. The test asserts:\n\n- Schema version is `4`\n- Instance fields (`instance_id`, `status`, `activated_at`, `updated_at`) are typed strings\n- `agent_ids` is a map from role names to `AgentId` strings\n- `coordinator_role` is persisted for multi-agent hands (`test_multi_agent_hand_state_persists_coordinator_role`)\n\n**Coexistence and isolation:**\n\n- `test_multiple_hands_coexist` — Two hands can be active simultaneously with distinct agent IDs\n- `test_deactivate_one_hand_preserves_other` — Deactivating one hand doesn't affect the other's agent\n- `test_find_instance_by_agent_id` — `kernel.hands().find_by_agent(id)` reverse-lookups work\n\n**Error cases:**\n\n- `test_activate_nonexistent_hand_fails`\n- `test_deactivate_nonexistent_instance_fails`\n- `test_pause_nonexistent_instance_fails`\n- `test_resume_nonexistent_instance_fails`\n\n**Trigger migration (`test_reactivation_restores_triggers_to_original_roles`):**\n\nRegisters a trigger on the `analyst` role, deactivates the hand, reactivates it, and asserts the trigger stays attached to `analyst` and does not leak to `planner`. Validates that reactivation uses the legacy deterministic ID format so triggers survive.\n\n**Live LLM test (`test_six_agent_fleet`):**\n\nSpawns six agents (coder, researcher, writer, ops, analyst, hello-world) using two different Groq models, sends each a tailored prompt, asserts all responses are non-empty, and prints a fleet summary with aggregate token usage.\n\n### WASM Agent Execution (`wasm_agent_integration_test.rs`)\n\nTests the `module = \"wasm:...\"` agent path using hand-written WAT (WebAssembly Text Format) modules. All tests are self-contained—no external services needed.\n\n**WAT modules defined as string constants:**\n\n| Constant | Behavior |\n|----------|----------|\n| `HELLO_WAT` | Returns fixed `{\"response\":\"hello from wasm\"}` from a data section |\n| `ECHO_WAT` | Returns the input JSON as-is (ptr/len passthrough) |\n| `INFINITE_LOOP_WAT` | Infinite `br` loop—tests fuel exhaustion |\n| `HOST_CALL_PROXY_WAT` | Forwards input to the `librefang.host_call` import |\n\nAll modules export `memory`, `alloc` (bump allocator), and `execute` (returns `i64` with ptr in high 32 bits, len in low 32 bits).\n\n**Tests:**\n\n| Test | What it verifies |\n|------|-----------------|\n| `test_wasm_agent_hello_response` | Fixed-response module returns `\"hello from wasm\"` |\n| `test_wasm_agent_echo` | Echo module's response contains the input message |\n| `test_wasm_agent_fuel_exhaustion` | Infinite loop returns an error containing `\"Fuel exhausted\"` or `\"fuel\"` |\n| `test_wasm_agent_missing_module` | Nonexistent `.wasm` file produces an error mentioning the filename |\n| `test_wasm_agent_host_call_time` | Host-call proxy executes end-to-end through the kernel's host function dispatch |\n| `test_wasm_agent_streaming_fallback` | `send_message_streaming` on a WASM agent produces at least 2 events (`TextDelta` + `ContentComplete`) and the final result matches the module output |\n| `test_multiple_wasm_agents` | Two WASM agents coexist in the registry; both execute correctly |\n| `test_mixed_wasm_and_llm_agents` | WASM and `builtin:chat` agents coexist; WASM agent executes while LLM agent is registered but not messaged |\n\nAll WASM tests use `#[tokio::test(flavor = \"multi_thread\")]` and configure `provider = \"ollama\"` / `model = \"test\"` since no real LLM is needed—the WASM runtime handles execution directly.\n\n### Workflow Orchestration (`workflow_integration_test.rs`)\n\nTests the workflow engine: registration, agent resolution, run creation, and full multi-step execution.\n\n**Kernel-level wiring (no LLM):**\n\n- **`test_workflow_register_and_resolve`** — Spawns `agent-alpha` and `agent-beta`, creates a two-step `Workflow` with `StepAgent::ByName` references, calls `kernel.register_workflow()`, verifies `workflow_engine().list_workflows()` returns the registered workflow, asserts `agent_registry().find_by_name()` resolves correctly, and creates a run via `workflow_engine().create_run()`.\n- **`test_workflow_agent_by_id`** — Creates a workflow referencing an agent by `StepAgent::ById` and verifies run creation succeeds.\n- **`test_trigger_registration_with_kernel`** — Registers `TriggerPattern::Lifecycle` and `TriggerPattern::SystemKeyword` triggers on an agent, verifies `kernel.list_triggers()` returns both, filters by agent ID, and tests `kernel.remove_trigger()`.\n\n**Full E2E with Groq (`test_workflow_e2e_with_groq`):**\n\n1. Boots kernel with Groq config, calls `kernel.set_self_handle()`\n2. Spawns `wf-analyst` and `wf-writer` agents\n3. Creates a two-step sequential workflow: analyze → summarize, with Mustache-style `{{input}}` templates\n4. Calls `kernel.run_workflow()` with input text\n5. Asserts the workflow completes with `WorkflowRunState::Completed`\n6. Verifies `step_results` has 2 entries with correct step names and positive token counts\n7. Verifies `workflow_engine().list_runs()` returns 1 run\n\n### Purge Sentinels CLI (`purge_sentinels_test.rs`)\n\nBlack-box tests for the `purge_sentinels` binary that removes whole-line sentinel markers (e.g., `NO_REPLY`, `[no reply needed]`) from markdown files.\n\nUses `env!(\"CARGO_BIN_EXE_purge_sentinels\")` to locate the compiled binary and `tempfile::TempDir` for isolated fixtures.\n\n**Fixture setup (`fixture_dir()`):**\n\nCreates four files:\n- `a.md` — contains `NO_REPLY` and `[no reply needed]` as whole lines\n- `b.md` — `NO_REPLY` embedded mid-sentence (should be preserved)\n- `c.md` — clean file\n- `nested/d.md` — lowercase `no_reply` with whitespace\n\n**Tests:**\n\n| Test | Behavior |\n|------|----------|\n| `dry_run_reports_counts_and_touches_nothing` | `--dry-run` prints removed count but leaves all files unchanged, no `.bak` created |\n| `apply_creates_backup_and_rewrites` | `--apply` creates `.bak` with original content, rewrites file without whole-line sentinels, leaves mid-sentence sentinels intact, skips clean files, recurses into subdirectories |\n| `apply_is_idempotent` | Second `--apply` reports `removed=0` and leaves files/backups unchanged |\n| `apply_aborts_when_existing_bak_differs` | Pre-seeded stale `.bak` causes non-zero exit with `\"backup mismatch\"` error; stale `.bak` is preserved |\n| `nonexistent_path_exits_non_zero` | Invalid path produces error containing `\"does not exist\"` |\n\n## Common Patterns\n\n### Config Construction\n\nEvery test creates an isolated `KernelConfig`:\n\n```rust\nfn test_config(name: &str) -> KernelConfig {\n    let tmp = std::env::temp_dir().join(format!(\"librefang-hand-test-{name}\"));\n    let _ = std::fs::remove_dir_all(&tmp);\n    std::fs::create_dir_all(&tmp).unwrap();\n\n    KernelConfig {\n        home_dir: tmp.clone(),\n        data_dir: tmp.join(\"data\"),\n        default_model: DefaultModelConfig { /* ... */ },\n        ..KernelConfig::default()\n    }\n}\n```\n\nEach test uses a unique subdirectory name so tests can run in parallel without conflict.\n\n### Hand Installation\n\n```rust\nfn install_hand(kernel: &LibreFangKernel, toml_content: &str) {\n    kernel\n        .hands()\n        .install_from_content(toml_content, \"\")\n        .unwrap_or_else(|e| panic!(\"Failed to install hand: {e}\"));\n}\n```\n\n### Conditional LLM Tests\n\n```rust\nif std::env::var(\"GROQ_API_KEY\").is_err() {\n    eprintln!(\"GROQ_API_KEY not set, skipping integration test\");\n    return;\n}\n```\n\n### Cleanup\n\nEvery test calls `kernel.shutdown()` at the end. Temp directories are cleaned up when `TempDir` drops, or on the next test run via `remove_dir_all` in the config helper.\n\n## Key API Surfaces Tested\n\n| API | Tested In |\n|-----|-----------|\n| `LibreFangKernel::boot_with_config` | All kernel tests |\n| `kernel.spawn_agent(manifest)` | `integration_test`, `wasm_*`, `workflow_*`, `multi_agent_test` (fleet) |\n| `kernel.send_message(agent_id, msg)` | `integration_test`, `wasm_*` |\n| `kernel.send_message_streaming(agent_id, msg, None)` | `wasm_agent_streaming_fallback` |\n| `kernel.kill_agent(agent_id)` | `integration_test`, `wasm_*` |\n| `kernel.activate_hand(id, params)` | `multi_agent_test` |\n| `kernel.deactivate_hand(instance_id)` | `multi_agent_test` |\n| `kernel.pause_hand(instance_id)` | `multi_agent_test` |\n| `kernel.resume_hand(instance_id)` | `multi_agent_test` |\n| `kernel.hands().install_from_content(...)` | `multi_agent_test` |\n| `kernel.hands().get_instance(instance_id)` | `multi_agent_test` |\n| `kernel.hands().find_by_agent(agent_id)` | `multi_agent_test` |\n| `kernel.agent_registry().get(agent_id)` | All kernel tests |\n| `kernel.agent_registry().find_by_name(name)` | `workflow_integration_test` |\n| `kernel.agent_registry().count()` / `.list()` | `wasm_*`, `multi_agent_test` (fleet) |\n| `kernel.register_workflow(workflow)` | `workflow_integration_test` |\n| `kernel.run_workflow(wf_id, input)` | `workflow_integration_test` |\n| `kernel.workflow_engine().list_workflows()` | `workflow_integration_test` |\n| `kernel.workflow_engine().create_run(...)` / `.get_run(...)` / `.list_runs(...)` | `workflow_integration_test` |\n| `kernel.register_trigger(...)` / `.list_triggers(...)` / `.remove_trigger(...)` | `workflow_integration_test`, `multi_agent_test` |\n| `kernel.set_self_handle()` | `workflow_integration_test` (E2E) |","other-librefang-kernel":"# Other — librefang-kernel\n\n# librefang-kernel\n\nThe core orchestration crate for the **LibreFang Agent OS**. This module acts as the central kernel that wires together all subsystems — runtime execution, LLM driving, skill dispatch, hand (action) execution, memory, metering, routing, channel I/O, and extensions — into a cohesive agent platform.\n\n## Architecture\n\n`librefang-kernel` is an **integration layer**. It does not implement subsystem logic itself; instead, it imports every other `librefang-*` crate and coordinates them to provide the top-level agent lifecycle.\n\n```mermaid\ngraph TD\n    K[librefang-kernel] --> R[librefang-runtime]\n    K --> LD[librefang-llm-driver]\n    K --> SK[librefang-skills]\n    K --> H[librefang-hands]\n    K --> M[librefang-memory]\n    K --> KR[librefang-kernel-router]\n    K --> KM[librefang-kernel-metering]\n    K --> CH[librefang-channels]\n    K --> W[librefang-wire]\n    K --> E[librefang-extensions]\n    K --> T[librefang-types]\n```\n\n## Key Responsibilities\n\n| Area | Delegated Crate | Role of the Kernel |\n|------|----------------|-------------------|\n| **Message routing** | `librefang-kernel-router` | Wires incoming messages to the correct handler pipeline |\n| **Metering / billing** | `librefang-kernel-metering` | Tracks token usage, operation counts, and enforces quotas |\n| **Agent runtime** | `librefang-runtime` | Manages agent lifecycle, task spawning, and execution context |\n| **LLM interaction** | `librefang-llm-driver` | Drives completion requests, handles streaming responses |\n| **Skill dispatch** | `librefang-skills` | Resolves and invokes registered skills based on agent intent |\n| **Action execution** | `librefang-hands` | Executes concrete actions (tool calls, API requests, etc.) |\n| **Persistence** | `librefang-memory` | Manages conversation history, agent state, and long-term recall |\n| **Channel I/O** | `librefang-channels` | Abstracts inbound/outbound communication channels |\n| **Wire protocol** | `librefang-wire` | Serialisation and framing for inter-service communication |\n| **Extensions** | `librefang-extensions` | Loads and manages third-party or user-supplied extensions |\n| **Shared types** | `librefang-types` | Common data structures used across all crates |\n\n## External Dependency Highlights\n\nThe kernel pulls in several categories of external crates to support its orchestration role:\n\n- **Async runtime:** `tokio`, `futures`, `async-trait`\n- **Serialisation:** `serde`, `serde_json`, `toml`, `serde_yaml`\n- **Concurrency primitives:** `dashmap`, `arc-swap`, `crossbeam`\n- **Storage:** `rusqlite` (embedded SQLite for local state)\n- **Observability:** `tracing`, `tracing-subscriber`\n- **Time & scheduling:** `chrono`, `chrono-tz`, `cron`\n- **Security:** `totp-rs` (TOTP 2FA), `zeroize` (secure memory clearing), `subtle` (constant-time crypto utilities)\n- **Networking:** `reqwest` (HTTP client for outbound calls)\n- **Text processing:** `regex`, `regex-lite`\n\n### Platform-specific: Unix\n\nOn Unix targets, `libc` is included directly. This is typically used for low-level system interactions such as signal handling, file descriptor management, or process control that `tokio` does not expose.\n\n## Binary: `purge_sentinels`\n\nThe crate ships a utility binary:\n\n```\nbin/purge_sentinels.rs\n```\n\nThis tool is responsible for cleaning up **sentinel** records — marker entries used to track in-progress or stale operations (for example, orphaned task locks, incomplete session markers, or expired scheduling tokens). Run it as a maintenance task to reclaim storage and ensure agent state consistency.\n\n```bash\n# Run via cargo\ncargo run --bin purge_sentinels\n```\n\n## Integration Guide\n\n### Adding the Kernel to a Workspace Crate\n\n```toml\n[dependencies]\nlibrefang-kernel = { path = \"../librefang-kernel\" }\n```\n\nThis transitively brings in the full agent stack. If you only need a subset of functionality, depend on the specific sub-crate directly instead.\n\n### Feature Flags\n\n`librefang-channels` is imported with `default-features = false`, meaning the kernel explicitly opts into only the channel features it needs. If you are consuming the kernel and require additional channel backends, enable them at the `librefang-channels` level in your own `Cargo.toml`.\n\n## Testing\n\nDev-dependencies include `tokio-test` and `tempfile`, indicating that kernel tests use:\n\n- **Async test utilities** (`tokio-test`) for running agent pipelines under a tokio runtime.\n- **Temporary filesystem resources** (`tempfile`) for SQLite databases and file-backed state in isolation.\n\nRun the test suite:\n\n```bash\ncargo test -p librefang-kernel\n```\n\n## Conventions\n\n1. **No business logic here.** The kernel wires crates together. If you find yourself writing domain logic in this crate, it likely belongs in a sub-crate.\n2. **Top-level entry points.** The agent boot sequence, configuration loading, and graceful shutdown live here because they require touching every subsystem.\n3. **Configuration is format-agnostic.** With `toml`, `serde_json`, and `serde_yaml` all available, configuration can be supplied in any of these formats. The kernel normalises them into a unified `Config` structure (defined in `librefang-types`).","other-librefang-llm-driver":"# Other — librefang-llm-driver\n\n# librefang-llm-driver\n\n## Purpose\n\n`librefang-llm-driver` provides the abstract interface and shared types for LLM (Large Language Model) integration within LibreFang. It defines the contract that concrete LLM backend implementations must satisfy, while remaining backend-agnostic. This separation allows the rest of the codebase to interact with LLM services through a uniform API, regardless of whether the underlying provider is OpenAI, a local model, or any other backend.\n\n## Role in the Architecture\n\nThis module sits between the application logic and concrete LLM implementations. It is a **pure interface module** — it contains no executable business logic, no network calls, and no side effects. Other crates depend on it to:\n\n- Implement concrete LLM drivers against the defined trait\n- Consume LLM capabilities without coupling to a specific provider\n\n```mermaid\ngraph TD\n    A[Application Logic] --> B[librefang-llm-driver<br/>Trait + Types]\n    B --> C[Concrete Driver A<br/>e.g., OpenAI]\n    B --> D[Concrete Driver B<br/>e.g., Local Model]\n    E[librefang-types] --> B\n```\n\n## Key Dependencies\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared domain types used across the LibreFang workspace |\n| `async-trait` | Enables async methods in trait definitions |\n| `serde` / `serde_json` | Serialization of request/response types and error payloads |\n| `thiserror` | Derived `Error` enum for driver-specific error variants |\n| `tokio` | Async runtime primitives for trait signatures |\n\n## Core Components\n\n### LlmDriver Trait\n\nThe central abstraction, defined via `async-trait`. Any struct that represents an LLM backend must implement this trait. The trait defines the operations available for interacting with an LLM, such as sending prompts and receiving completions.\n\nImplementors are expected to handle:\n\n- Constructing provider-specific HTTP requests internally\n- Translating provider-specific errors into the module's error type\n- Returning results using the shared response types defined here\n\n### Request and Response Types\n\nShared data structures that represent:\n\n- **Requests**: Prompts, system messages, conversation context, and configuration parameters (temperature, max tokens, etc.)\n- **Responses**: Generated text, token usage metadata, and model identification\n\nThese types derive `Serialize` and `Deserialize` to support serialization for logging, caching, or inter-process communication.\n\n### Error Types\n\nA consolidated error enum (via `thiserror`) representing failure modes common across LLM backends:\n\n- Network or connectivity failures\n- API-level errors (rate limiting, authentication, invalid requests)\n- Response parsing errors\n- Timeout errors\n\nConcrete drivers map their provider-specific error codes into these variants, keeping the consumer's error handling provider-agnostic.\n\n## Implementing a New Driver\n\nTo add support for a new LLM backend:\n\n1. Create a new crate that depends on `librefang-llm-driver`\n2. Define a struct representing your backend connection (API key, endpoint URL, client handle, etc.)\n3. Implement the `LlmDriver` trait for that struct\n4. Translate the backend's native response format into the shared response types\n5. Map backend-specific errors into the module's error enum\n\n## Design Decisions\n\n- **No default implementation**: This module intentionally provides no concrete driver, no HTTP client, and no fallback logic. It exists solely to define the interface.\n- **Async-first**: All trait methods are async, reflecting the inherently I/O-bound nature of LLM API calls.\n- **Minimal dependency surface**: Aside from `librefang-types`, this module carries no domain-specific logic, keeping the trait contract clean and focused.","other-librefang-llm-drivers":"# Other — librefang-llm-drivers\n\n# librefang-llm-drivers\n\nConcrete LLM provider drivers implementing the `librefang-llm-driver` trait. Each driver translates the crate's unified LLM interface into provider-specific HTTP API calls, handling authentication, request formatting, response parsing, and streaming.\n\n## Purpose\n\nThis crate is the bridge between the abstract LLM driver interface and real-world provider APIs. It ships ready-to-use driver implementations for major LLM providers (Anthropic, OpenAI, Gemini, and others), so consumers can instantiate a driver and pass it to higher-level orchestration without worrying about each provider's unique API surface.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[librefang-llm-driver<br/>trait definition] --> B[librefang-llm-drivers<br/>concrete implementations]\n    B --> C[librefang-http<br/>HTTP client layer]\n    B --> D[librefang-runtime-oauth<br/>OAuth token flow]\n    B --> E[librefang-types<br/>shared types & models]\n    F[Consumer code] --> A\n    F --> B\n```\n\nEach driver is a struct that implements the trait from `librefang-llm-driver`. Drivers delegate HTTP communication to `librefang-http` rather than constructing `reqwest` clients directly, keeping transport concerns in one place.\n\n## Dependency Breakdown\n\n| Dependency | Role in this crate |\n|---|---|\n| `librefang-llm-driver` | Provides the trait each concrete driver implements. |\n| `librefang-types` | Shared types — message formats, model identifiers, completion responses, error types. |\n| `librefang-http` | HTTP client abstraction; drivers use this to make requests instead of raw `reqwest`. |\n| `librefang-runtime-oauth` | OAuth flows required by providers like Gemini that use Google's auth. |\n| `serde` / `serde_json` | Serializing requests and deserializing provider-specific JSON responses. |\n| `tokio` / `tokio-stream` / `futures` | Async runtime support and SSE/response stream handling. |\n| `reqwest` | Underlying HTTP client (used via `librefang-http`). |\n| `bytes` | Efficient byte handling for streaming response bodies. |\n| `dashmap` | Concurrent hashmap — used for caching auth tokens, session state, or rate-limit counters across async tasks. |\n| `sha2` / `hmac` / `hex` | Request signing for providers that require HMAC-based authentication schemes. |\n| `zeroize` | Secure clearing of sensitive data (API keys, tokens) from memory. |\n| `rand` | Randomness for nonce generation or request IDs. |\n| `chrono` / `uuid` | Timestamps and unique identifiers for request metadata. |\n| `base64` | Encoding binary payloads or auth headers. |\n| `regex-lite` | Lightweight pattern matching on provider response payloads. |\n| `url` | Programmatic URL construction for provider endpoints. |\n\n## Provider Implementations\n\nBased on the crate description, the following providers are supported:\n\n- **Anthropic** — Claude API integration\n- **OpenAI** — GPT-family models via the OpenAI API\n- **Gemini** — Google's Gemini models, using OAuth from `librefang-runtime-oauth`\n\nEach provider driver is responsible for:\n\n1. **Authentication** — Attaching the correct auth mechanism (API key header, Bearer token, OAuth token, HMAC signature).\n2. **Request formatting** — Translating the generic message/completion request into the provider's JSON schema.\n3. **Response parsing** — Deserializing the provider's response into the shared types from `librefang-types`.\n4. **Streaming** — Converting provider-specific SSE or chunked responses into a unified async stream.\n\n## Integration with the Codebase\n\nTo use a driver, consumer code selects the appropriate implementation, constructs it with provider-specific configuration (API key, endpoint, model), and uses it through the `librefang-llm-driver` trait:\n\n```\nlibrefang-types        ← shared data structures\nlibrefang-llm-driver   ← trait definition (no implementations)\nlibrefang-llm-drivers  ← concrete drivers (this crate)\nlibrefang-http         ← shared HTTP transport\nlibrefang-runtime-oauth ← OAuth support for Google/Gemini\n```\n\nThe trait boundary means consumers remain decoupled from any single provider. Swapping from OpenAI to Anthropic is a matter of constructing a different driver struct — the calling code stays the same.\n\n## Security Considerations\n\n- **`zeroize`** ensures API keys and tokens are cleared from memory when dropped.\n- **`dashmap`** provides safe concurrent access to cached credentials without unsafe code.\n- Auth tokens managed through `librefang-runtime-oauth` follow standard OAuth2 refresh flows rather than storing long-lived credentials.","other-librefang-memory-tests":"# Other — librefang-memory-tests\n\n# librefang-memory-tests\n\nIntegration regression tests for the `librefang-memory` crate, specifically guarding **chat-scoped canonical context isolation** — a privacy-critical fix in `SessionStore` that prevents cross-session message leakage between conversations handled by the same agent.\n\n## Background: The Privacy Bug\n\nBefore the fix under test, `CanonicalEntry` records in the session store were **not** tagged with the originating `SessionId`. When the kernel loaded canonical context to build an LLM prompt, every conversation sharing the same `AgentId` received the full union of all messages across all sessions. Concretely, a WhatsApp DM and a WhatsApp group chat — both routed to the same agent — would inject each other's history into the LLM context, leaking private messages into group prompts and vice versa.\n\nThe fix adds a `SessionId` tag at write time (`append_canonical`) and filters by that tag at read time (`canonical_context`).\n\n## Test Architecture\n\n```mermaid\nflowchart TD\n    A[\"setup()\"] --> B[\"Connection::open_in_memory\"]\n    B --> C[\"run_migrations\"]\n    C --> D[\"SessionStore::new\"]\n\n    E[\"append_canonical\"] --> F[\"canonical_context\"]\n\n    subgraph \"Session isolation boundary\"\n        G[\"session_dm\"]\n        H[\"session_group\"]\n    end\n\n    F -. \"filters by SessionId\" .-> G\n    F -. \"filters by SessionId\" .-> H\n```\n\n## Test Harness\n\n### `setup()`\n\nCreates an ephemeral `SessionStore` backed by an in-memory SQLite database:\n\n1. Opens `Connection::open_in_memory`.\n2. Runs `run_migrations` to create the schema.\n3. Returns `SessionStore::new(Arc<Mutex<Connection>>)`.\n\nEvery test starts from a blank slate. The `Arc<Mutex<Connection>>` mirrors the production wiring where the store is shared across async tasks.\n\n### `user_msg(text)`\n\nHelper that constructs a `Message` with `Role::User` and `MessageContent::Text`. Used to build payloads for `append_canonical`.\n\n## Test Cases\n\n### `canonical_context_isolates_two_whatsapp_chats_for_same_agent`\n\n**Purpose:** Verifies that two distinct chat channels derived for the same agent produce isolated canonical contexts — the core privacy guarantee.\n\n**Steps:**\n\n1. Create a single `AgentId`.\n2. Derive two `SessionId` values via `SessionId::for_channel`:\n   - `session_dm` — from `\"whatsapp:393331111111@s.whatsapp.net\"` (DM)\n   - `session_group` — from `\"whatsapp:120363111111111111@g.us\"` (group)\n3. Assert the two session IDs differ (different chats must produce different sessions).\n4. Append messages interleaved across sessions:\n   - `\"dm-1\"` → `session_dm`\n   - `\"group-1\"` → `session_group`\n   - `\"dm-2\"` → `session_dm`\n5. Call `canonical_context(agent, Some(session_dm), None)` and assert returned messages are exactly `[\"dm-1\", \"dm-2\"]` — no group content.\n6. Call `canonical_context(agent, Some(session_group), None)` and assert returned messages are exactly `[\"group-1\"]` — no DM content.\n\n**What it catches:** A regression where `canonical_context` stops filtering by `SessionId`, or `append_canonical` stops tagging entries with the session. Both would cause cross-contamination of private and group message history.\n\n### `canonical_context_unfiltered_returns_all_for_backward_compat`\n\n**Purpose:** Ensures that passing `session_id = None` to `canonical_context` returns **all** canonical entries across sessions, preserving backward compatibility for callers that haven't adopted per-session filtering.\n\n**Steps:**\n\n1. Append `\"a-1\"` under `session_a` (WhatsApp channel).\n2. Append `\"b-1\"` under `session_b` (Telegram channel).\n3. Call `canonical_context(agent, None, None)`.\n4. Assert both `\"a-1\"` and `\"b-1\"` appear in results.\n\n**What it catches:** A regression where `None` no longer acts as a \"no filter\" sentinel — for example, if the implementation mistakenly requires a `SessionId` and returns empty results or errors when none is provided.\n\n## API Surface Exercised\n\n| Function | Crate | Role in test |\n|---|---|---|\n| `SessionStore::new` | `librefang-memory` | Construct the store |\n| `run_migrations` | `librefang-memory::migration` | Initialize the schema |\n| `SessionStore::append_canonical` | `librefang-memory::session` | Write tagged messages |\n| `SessionStore::canonical_context` | `librefang-memory::session` | Read filtered messages |\n| `SessionId::for_channel` | `librefang-types::agent` | Derive session from channel identifier |\n| `AgentId::new` | `librefang-types::agent` | Create a unique agent |\n\n## Running\n\n```bash\ncargo test -p librefang-memory --test canonical_chat_scoped_integration\n```\n\nBoth tests are pure-unit (in-memory SQLite, no network) and complete in milliseconds. They should be run in CI on every push to guard against regressions in session-scoped memory isolation.","other-librefang-memory":"# Other — librefang-memory\n\n# librefang-memory\n\nMemory substrate for the LibreFang Agent OS.\n\n## Overview\n\n`librefang-memory` provides the persistent storage and retrieval layer for the LibreFang Agent OS. It serves as the substrate upon which agents store state, conversation history, task results, and any data that must survive across sessions. The module abstracts storage operations behind async interfaces, allowing the rest of the system to interact with memory without coupling to specific storage backends.\n\n## Architecture\n\nThe crate relies on **SQLite** (`rusqlite`) as its primary storage engine, chosen for its reliability, zero-configuration deployment, and suitability for single-node agent runtimes. Data is serialized using either JSON (`serde_json`) or MessagePack (`rmp-serde`), depending on the context — JSON for human-readable debugging and interchange, MessagePack for compact binary storage of large structures.\n\n```mermaid\ngraph TD\n    A[Agent OS Components] --> B[librefang-memory]\n    B --> C[SQLite Storage]\n    B --> D[Serialization Layer]\n    D --> E[serde_json]\n    D --> F[rmp-serde / MessagePack]\n    B --> G[librefang-types]\n    B --> H[sha2 / Integrity Hashing]\n```\n\n## Dependencies and Their Roles\n\n| Dependency | Purpose |\n|---|---|\n| `librefang-types` | Shared type definitions used across all LibreFang crates. Memory entries and metadata structures are defined here. |\n| `rusqlite` | Embedded SQLite database engine for persistent, queryable storage. |\n| `serde`, `serde_json`, `rmp-serde` | Serialization framework with JSON and MessagePack backends for flexible data encoding. |\n| `tokio` | Async runtime. All storage operations are non-blocking. |\n| `async-trait` | Enables async method definitions in traits, used for storage backend abstraction. |\n| `sha2` | Cryptographic hashing for data integrity verification and content-addressed storage keys. |\n| `chrono` | Timestamp management for memory entries — creation, access, and expiration tracking. |\n| `uuid` | Unique identifier generation for memory records and sessions. |\n| `reqwest` | HTTP client, likely used for memory synchronization or remote storage backends. |\n| `tracing` | Structured logging and instrumentation of storage operations. |\n| `thiserror` | Ergonomic error type definitions for storage failures. |\n\n## Key Concepts\n\n### Memory as a Substrate\n\nRather than exposing a simple key-value interface, this module is designed as a *substrate* — a low-level layer that higher-level abstractions (conversation managers, task planners, knowledge graphs) build upon. This means the module prioritizes flexibility and correctness over opinionated data models.\n\n### Async Storage Interface\n\nAll operations are async via `tokio`, ensuring that disk I/O never blocks the agent's event loop. The `async-trait` dependency indicates that storage backends are defined as traits with async methods, allowing for swappable implementations (local SQLite, remote services, or in-memory mocks for testing).\n\n### Content Integrity\n\nThe presence of `sha2` suggests that stored data is content-addressed or integrity-checked. This prevents silent data corruption and enables deduplication — identical content maps to the same hash regardless of how many times it is stored.\n\n### Serialization Flexibility\n\nSupporting both JSON and MessagePack allows the module to balance readability against storage efficiency. JSON is useful during development and for entries that may be inspected directly. MessagePack reduces storage footprint for high-volume binary data such as embeddings or large structured records.\n\n## Relationship to Other Crates\n\n- **`librefang-types`**: Defines the data structures that `librefang-memory` persists. The memory crate depends on these types but does not define them.\n- **Agent modules**: Consume `librefang-memory` to store and retrieve state. They never interact with SQLite directly.\n- **Testing crates**: Use `tempfile` (listed in dev-dependencies) to create ephemeral database files for isolated test runs.\n\n## Testing\n\nTests use `tempfile` to create temporary directories for SQLite databases, ensuring test isolation and no side effects on the host filesystem. The `tokio-test` dependency enables synchronous-style tests for async storage operations.","other-librefang-migrate":"# Other — librefang-migrate\n\n# librefang-migrate\n\nMigration engine for importing agent configurations and data from other agent frameworks into LibreFang's internal format.\n\n## Purpose\n\nThis crate provides the tooling needed to bring existing agent definitions, configurations, and related data from third-party agent frameworks into the LibreFang ecosystem. It handles format detection, parsing, schema mapping, and conversion into native `librefang-types` structures.\n\n## When to Use\n\n- Onboarding a team that previously used a different agent framework and needs their agents ported into LibreFang.\n- Bulk-importing agent definitions from exported configuration files.\n- Writing one-time migration scripts as part of a framework migration.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    A[Source Configs] --> B[Directory Walk]\n    B --> C[Format Detection]\n    C --> D[Parse JSON/YAML/TOML/JSON5]\n    D --> E[Schema Mapping]\n    E --> F[librefang-types]\n    F --> G[Migrated Output]\n```\n\nThe migration pipeline follows a straightforward progression: discover source files on disk, detect their serialization format, parse them into intermediate representations, map fields to LibreFang's schema, and emit validated `librefang-types` objects.\n\n## Supported Input Formats\n\nThe crate pulls in parsers for four common configuration formats, covering most agent framework exports:\n\n| Format | Crate | Typical Use |\n|--------|-------|-------------|\n| JSON | `serde_json` | Common export format, REST API dumps |\n| YAML | `serde_yaml` | Popular in CI/CD-oriented agent frameworks |\n| TOML | `toml` | Rust-ecosystem agent configs |\n| JSON5 | `json5` | Human-friendly JSON with comments and trailing commas |\n\nAll four are handled through `serde` deserialization, so the parsing layer is uniform regardless of format.\n\n## Key Dependencies\n\n### Internal\n\n- **`librefang-types`** — The target schema. All migrated data is ultimately converted into types defined here. This is the only internal dependency, keeping the migration crate loosely coupled from the rest of the system.\n\n### File Discovery & I/O\n\n- **`walkdir`** — Recursive directory traversal for discovering source configuration files in a given migration root.\n- **`dirs`** — Resolves standard platform directories (config home, data home, etc.) so migration sources and output paths can be specified relative to conventional locations.\n\n### Data Handling\n\n- **`chrono`** — Timestamp parsing and generation. Source frameworks may encode creation/modification dates in various formats; `chrono` handles normalization.\n- **`uuid`** — Generates new UUIDs for migrated entities that need fresh identifiers in the LibreFang system.\n\n### Error Handling & Observability\n\n- **`thiserror`** — Defines structured error types covering parse failures, schema mismatches, missing fields, and I/O errors. Callers can pattern-match on specific migration failure modes.\n- **`tracing`** — Instrumentation throughout the migration pipeline. Expect spans for directory traversal, per-file parsing, and entity conversion, with warnings logged for skipped or partially-migrated records.\n\n## Testing\n\nThe dev-dependency on **`tempfile`** indicates that tests construct temporary directory trees with sample configuration files, run the migration pipeline against them, and assert on the output. This allows tests to cover:\n\n- Multi-format detection in a single directory.\n- Handling of malformed or incomplete source files.\n- Nested directory structures.\n- Empty directories and missing expected files.\n\n## Integration Points\n\nThis crate is designed as a standalone library with no incoming or outgoing internal calls at the crate level. Other crates or binaries in the workspace consume it by calling into its public API with a source directory or file path, receiving back a collection of `librefang-types` objects ready for persistence or further processing.\n\nTo use from another crate:\n\n```toml\n[dependencies]\nlibrefang-migrate = { path = \"../librefang-migrate\" }\n```\n\nThe migration results (typed `librefang-types` structs) can then be passed to whatever persistence or indexing layer the application uses.","other-librefang-runtime-mcp":"# Other — librefang-runtime-mcp\n\n# librefang-runtime-mcp\n\nMCP (Model Context Protocol) client for the LibreFang runtime. This module provides the integration layer between the LibreFang runtime and MCP-compatible services, enabling communication with AI model endpoints and tool servers using the Model Context Protocol specification.\n\n## Purpose\n\nThe Model Context Protocol standardizes how applications communicate with language models and their associated tooling. This crate implements the client side of that protocol, allowing the LibreFang runtime to:\n\n- Discover and invoke tools exposed by MCP servers\n- Manage connections to MCP-compatible endpoints\n- Serialize and deserialize MCP protocol messages using the shared `librefang-types` definitions\n\n## Architecture\n\n```mermaid\ngraph LR\n    A[LibreFang Runtime] --> B[librefang-runtime-mcp]\n    B --> C[rmcp]\n    B --> D[librefang-http]\n    B --> E[librefang-types]\n    C --> F[MCP Server]\n    D --> F\n```\n\nThe module sits between the LibreFang runtime core and external MCP servers. It relies on `rmcp` for the core MCP client implementation, `librefang-http` for transport-level HTTP communication, and `librefang-types` for shared data structures used across the codebase.\n\n## Dependencies\n\n### Internal Crates\n\n| Crate | Role |\n|---|---|\n| `librefang-types` | Shared type definitions for MCP messages, tool schemas, and protocol structures |\n| `librefang-http` | HTTP client abstraction used for transport-level communication with MCP servers |\n\n### External Crates\n\n| Crate | Role |\n|---|---|\n| `rmcp` | Rust MCP client library providing protocol-level primitives |\n| `reqwest` | Underlying HTTP client (used transitively via `librefang-http`) |\n| `tokio` | Async runtime for non-blocking I/O |\n| `serde` / `serde_json` | Serialization of MCP request/response payloads |\n| `http` | HTTP type primitives (method, header map, status codes) |\n| `base64` / `sha2` | Encoding and hashing, likely for authentication or payload verification |\n| `url` | URL parsing and construction for MCP endpoints |\n| `rand` | Random number generation, likely for nonce or session identifiers |\n| `tracing` | Structured logging and diagnostics |\n| `async-trait` | Async trait support for trait definitions |\n\n## Integration Points\n\nThis module is consumed by higher-level runtime components that need to interact with MCP servers. It does not directly call into other LibreFang crates beyond `librefang-http` and `librefang-types`, keeping its responsibility focused on MCP protocol handling.\
