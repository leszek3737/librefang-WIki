sponsibility of the post-call `check_all_and_record` path.\n\n## Cost Estimation\n\n### `estimate_cost_with_catalog` (preferred)\n\nLooks up pricing from the `ModelCatalog`. Falls back to default rates ($1/$3 per million tokens) for unknown models.\n\nSpecial case: ChatGPT session-auth models (`provider == \"chatgpt\"`) with zero catalog prices use legacy default rates so budgets still have a conservative non-zero estimate.\n\nSubscription-based providers (e.g. `alibaba-coding-plan`) have zero token costs — metering will show $0.00. Users must monitor usage via the provider's console.\n\n### `estimate_cost` (fallback)\n\nAlways uses default rates. Useful in tests or when no catalog is available.\n\n### Token Pricing\n\nThe `estimate_cost_from_rates` function applies these multipliers:\n\n| Token type | Price multiplier |\n|---|---|\n| Regular input | 1.0× `input_per_m` |\n| Cache-read input | 0.1× `input_per_m` |\n| Cache-creation input | 1.25× `input_per_m` |\n| Output | 1.0× `output_per_m` |\n\nRegular input is computed as `total_input - cache_read - cache_creation`.\n\n## Typical Call Flow\n\n```\n// 1. Pre-call: reserve estimated cost\nlet reservation = engine.reserve_global_budget(&budget, estimated_usd)?;\n\n// 2. Dispatch the LLM call\nlet response = dispatch_llm_call(model, prompt).await;\n\nmatch response {\n    Ok(llm_response) => {\n        // 3. Build the usage record from actual token counts\n        let record = UsageRecord { cost_usd, input_tokens, output_tokens, ... };\n\n        // 4. Atomically check all quotas + persist (single SQLite txn)\n        engine.check_all_and_record(&record, &quota, &budget)?;\n\n        // 5. Release the in-memory reservation (SQLite now has the real cost)\n        reservation.settle();\n    }\n    Err(_) => {\n        // No cost incurred — just release the reservation\n        reservation.release();\n    }\n}\n```\n\n## Dependencies\n\n| Crate | What it provides |\n|---|---|\n| `librefang_memory` | `UsageStore`, `UsageRecord`, `UsageSummary`, `ModelUsage`, `MemorySubstrate` |\n| `librefang_types` | `AgentId`, `UserId`, `ResourceQuota`, `BudgetConfig`, `ProviderBudget`, `UserBudgetConfig`, `LibreFangError`, `ModelCatalogEntry` |\n| `librefang_runtime` | `ModelCatalog` (for `estimate_cost_with_catalog`) |\n\n## Record Cleanup\n\n`cleanup(days)` delegates to `UsageStore::cleanup_old` and returns the number of rows deleted. Call periodically to prevent unbounded SQLite growth.","kernel-core-librefang-kernel-router-src":"# Kernel Core — librefang-kernel-router-src\n\n# Kernel Core — `librefang-kernel-router-src`\n\nThe routing engine that decides which specialist agent or multi-agent hand should handle an incoming user message. It layers keyword matching, manifest metadata, and optional embedding-based semantic similarity to produce a scored routing decision.\n\n## Architecture\n\n```mermaid\nflowchart TD\n    MSG[\"Incoming message\"] --> HAND[\"auto_select_hand()\"]\n    MSG --> TPL[\"auto_select_template()\"]\n\n    HAND --> HRC[\"hand_route_candidates()\"]\n    HRC --> HDD[\"registry/hands/*/HAND.toml\"]\n    HRC --> CACHE_H[\"HAND_ROUTE_CACHE\"]\n\n    TPL --> RULES[\"TEMPLATE_RULES (built-in regex)\"]\n    TPL --> META[\"auto_select_template_from_metadata()\"]\n    META --> MRC[\"manifest_route_candidates()\"]\n    MRC --> AGENTS[\"agents/*/agent.toml\"]\n    MRC --> CACHE_M[\"MANIFEST_CACHE\"]\n\n    TPL -->|\"multi-domain?\"| ORCH[\"→ orchestrator\"]\n    TPL -->|\"no match\"| ORCH\n\n    HAND -->|\"semantic_scores\"| SEM[\"Semantic bonus blending\"]\n    TPL -->|\"semantic_scores\"| SEM\n```\n\n## Public API\n\n### `auto_select_hand(message, semantic_scores) → HandSelection`\n\nSelects the best hand for a message. Hands are multi-agent workflows loaded from `HAND.toml` definitions in the registry.\n\n```rust\npub fn auto_select_hand(\n    message: &str,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> HandSelection\n```\n\n- **`message`** — the raw user message text.\n- **`semantic_scores`** — optional map of `hand_id → cosine similarity` from an embedding model. Used to boost scores for cross-lingual matching.\n\nReturns a `HandSelection`:\n```rust\npub struct HandSelection {\n    pub hand_id: Option<String>,  // None means no match\n    pub reason: String,            // human-readable explanation\n    pub score: usize,              // aggregate routing score\n}\n```\n\n### `auto_select_template(message, agents_dir, semantic_scores) → TemplateSelection`\n\nSelects the best single-agent template specialist. Evaluates built-in keyword rules first, then manifest metadata. Falls back to `\"orchestrator\"` when no single specialist clearly wins or when multi-domain intent is detected.\n\n```rust\npub fn auto_select_template(\n    message: &str,\n    agents_dir: &Path,\n    semantic_scores: Option<&HashMap<String, f32>>,\n) -> TemplateSelection\n```\n\nReturns a `TemplateSelection`:\n```rust\npub struct TemplateSelection {\n    pub template: String,  // template directory name\n    pub reason: String,\n    pub score: usize,\n}\n```\n\n### Manifest Loading\n\n```rust\npub fn load_template_manifest(home_dir: &Path, template: &str) -> Result<AgentManifest, String>\n```\n\nLoads and parses `workspaces/agents/<template>/agent.toml`. Validates the template name against ASCII alphanumeric/dash/underscore characters via `is_safe_template_name`.\n\n```rust\npub fn all_template_descriptions(agents_dir: &Path) -> Vec<(String, String)>\n```\n\nReturns `(template_name, embed_text)` pairs for all routable templates (excludes `\"assistant\"`). Used by the kernel to build embedding vectors for semantic routing.\n\n### Cache Management\n\n```rust\npub fn set_hand_route_home_dir(home_dir: &Path)\npub fn invalidate_hand_route_cache()\npub fn invalidate_manifest_cache()\n```\n\nCall `set_hand_route_home_dir` at startup to set the LibreFang home directory for hand loading. Call the invalidate functions after config hot-reload or agent install/uninstall to force cache rebuilds.\n\n## Scoring System\n\nThe router uses a weighted scoring model across three signal tiers:\n\n| Signal | Weight | Source |\n|---|---|---|\n| Explicit alias / strong keyword | **6** | `aliases`/`strong_aliases` in HAND.toml `[routing]`, or hand-curated regex rules |\n| Generated phrase | **2** | Auto-derived from template name, description, and tags |\n| Weak phrase | **1** | `weak_aliases` in config, or id-derived tokens (after filtering generic words) |\n| Semantic bonus | **0–5** | `floor(similarity × 5.0)` from embedding cosine similarity |\n\n### Thresholds\n\n- **`MIN_HAND_SCORE = 2`** — a hand candidate must score ≥ 2 to be considered. A single weak hit (score 1) is rejected as noise.\n- **`SEMANTIC_ONLY_THRESHOLD = 0.55`** — minimum similarity for semantic-only fallback when keyword matching produces zero hits.\n\n### Multi-domain Detection\n\nIn `auto_select_template`, when the top two scored templates differ and the message contains multi-domain markers (`同时`, `分别`, `协作`, `多个`, `multi`, `together`), the router selects `\"orchestrator\"` instead of either specialist.\n\n## Keyword Matching Pipeline\n\n### Built-in Rules (`TEMPLATE_RULES`)\n\n~30 hand-curated `RouteRule` entries, each with:\n- **strong patterns** — high-confidence regex patterns (both English and Chinese)\n- **weak patterns** — lower-confidence patterns\n- **target** — the template name to route to\n\nPatterns are compiled once and cached in `REGEX_CACHE` (`OnceLock<Mutex<HashMap<String, Regex>>>`). All regex matching is case-insensitive (`(?i)` prefix).\n\n### Manifest Metadata Routing\n\nFor each template directory under `agents_dir` containing an `agent.toml`:\n\n1. Reads `[metadata.routing]` from the manifest:\n   - `aliases` / `strong_aliases` → explicit aliases (weight 6)\n   - `weak_aliases` → weak phrases (weight 1)\n   - `exclude_generated = true` → skip auto-generation\n2. Auto-generates phrases from:\n   - Template name via `english_variants()` — splits on `-` and `_`, filters tokens ≥ 3 chars that aren't in `GENERIC_ENGLISH_WORDS`\n   - Description via `description_phrases()` — splits on language-aware punctuation, strips generic English stop words from edges\n   - Tags via `tag_phrases()` — passes through non-ASCII tags directly, generates variants for ASCII tags\n3. Scores against the message using `phrase_matches()`.\n\n### Hand Routing from HAND.toml\n\nHands are loaded from `<home_dir>/registry/hands/*/HAND.toml` using `librefang_hands::registry::parse_hand_toml_with_agents_dir`. Each hand's `[routing]` section provides `aliases` and `weak_aliases`. Additional strong phrases are derived from the hand's description. Weak phrases include id-derived tokens after generic word filtering.\n\nParse failures are logged at WARN level (not silently swallowed) since routing runs on every inbound message.\n\n## Phrase Matching\n\n`phrase_matches(message, phrase)` handles two cases:\n\n- **ASCII phrases** — builds a word-boundary regex: `(^|[^a-z0-9])<escaped>([^a-z0-9]|$)`, with spaces mapped to `[\\s_-]+`. Uses the global `REGEX_CACHE`.\n- **Unicode phrases** — case-insensitive `contains` check.\n\n## Text Processing Utilities\n\n### `description_phrases(text)`\n\nSplits description text into chunks using language-aware separators (ASCII punctuation, CJK punctuation: `、。，；：（）–—`). For ASCII chunks, strips generic English words from leading/trailing edges via `normalize_phrase_chunk`, then generates candidates through `ascii_phrase_candidates`. For CJK chunks, passes through directly if 2–32 characters.\n\n### `english_variants(text)`\n\nProduces routing variants: the original lowercase form, space-separated form (replacing `-`/`_`), and individual parts ≥ 3 characters.\n\n### `GENERIC_ENGLISH_WORDS`\n\nA stop-list of ~45 common English words (`a`, `the`, `helper`, `specialist`, `assistant`, etc.) filtered out during phrase generation to reduce noise.\n\n## Caching\n\nThree `OnceLock<Mutex<...>>` caches avoid redundant work on every message:\n\n| Cache | Key | Invalidated by |\n|---|---|---|\n| `REGEX_CACHE` | regex pattern string | never (grows, never stale) |\n| `MANIFEST_CACHE` | `agents_dir` path | `invalidate_manifest_cache()` |\n| `HAND_ROUTE_CACHE` | resolved home dir string | `invalidate_hand_route_cache()` |\n\nThe manifest and hand caches also auto-rebuild if their key (directory path) changes between calls.\n\n## Home Directory Resolution\n\n`resolve_hand_route_home_dir()` checks in order:\n1. Explicit path set via `set_hand_route_home_dir()`\n2. `LIBREFANG_HOME` environment variable\n3. `~/.librefang` (falling back to temp dir if no home)\n\n## Dependencies on Other Crates\n\n- **`librefang_types`** — `AgentManifest` struct for parsed agent.toml manifests\n- **`librefang_hands`** — `parse_hand_toml_with_agents_dir()` for HAND.toml parsing and `HandDefinition`\n- **`regex_lite`** — regex compilation and matching\n- **`serde_json`** — reading `[metadata.routing]` from manifest's JSON-value metadata field","kernel-core-librefang-kernel-src":"# Kernel Core — librefang-kernel-src\n\n# Kernel Core — `librefang-kernel-src`\n\nThe kernel core provides two foundational subsystems that underpin agent identity continuity and safe tool execution: the **Agent Identity Registry** and the **Approval Manager**.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"Agent Identity Registry\"\n        AIR[AgentIdentityRegistry]\n        TOML[\"agent_identities.toml\"]\n        AIR -->|atomic persist| TOML\n    end\n\n    subgraph \"Approval Manager\"\n        AM[ApprovalManager]\n        AM -->|pending + audit| SQLite[(SQLite)]\n        AM -->|broadcast events| TX[events_tx]\n        AM -->|remembered decisions| RD[DashMap cache]\n    end\n\n    API[\"librefang-api\"] -->|load / register / purge| AIR\n    API -->|request_approval / resolve / TOTP| AM\n    ACP[\"ACP Bridge\"] -->|subscribe| TX\n    AgentLoop[\"Agent Loop\"] -->|register_if_absent| AIR\n    AgentLoop -->|requires_approval_with_context_for| AM\n```\n\n---\n\n## Agent Identity Registry\n\n**File:** `agent_identity_registry.rs`\n\n### Purpose\n\nThe registry persists `agent_name → canonical_uuid` mappings independently of the SQLite agent rows. Without it, respawning an agent (after a panic, manifest reload, or explicit kill) would generate a fresh `AgentId`, silently orphaning sessions, memories, and cron jobs keyed under the prior UUID.\n\nWhile `AgentId::from_name` (UUID v5) already derives IDs deterministically from agent names, the registry adds an explicit history layer that survives derivation changes (namespace bumps, normalisation changes) and supports a **delete-vs-purge** distinction:\n\n- **Kill agent** — keeps the registry entry intact; a later respawn reuses the same UUID, so surviving sessions remain reachable.\n- **Purge agent** (`?purge_identity=true`) — drops the entry; the next spawn starts from a clean slate.\n\n### Storage\n\nA TOML file at `<home_dir>/agent_identities.toml`, written atomically via temp-file → fsync → rename. The schema is intentionally narrow:\n\n```toml\n[agents.nika]\ncanonical_uuid = \"660bef7c-04d5-4480-8af2-0ce029981a14\"\ncreated_at = \"2026-04-01T10:00:00Z\"\n```\n\nThe file is human-readable for emergency surgery but is **not** a user-editable config. A malformed file is never overwritten during `load()` — the operator gets an empty in-memory view and the original file remains on disk for manual recovery.\n\n### Concurrency Model\n\n- A `DashMap<String, AgentIdentityRecord>` serves reads and inserts lock-free.\n- A separate `Mutex` serialises on-disk writes so two concurrent `register_if_absent` calls never produce an interleaved file.\n\n### Key Methods\n\n| Method | Description |\n|---|---|\n| `AgentIdentityRegistry::load(home_dir)` | Eagerly loads existing TOML. Load errors are logged and treated as empty — never panics or returns `Err`. |\n| `AgentIdentityRegistry::in_memory()` | Creates a registry with no persistence (test helper). `persist()` becomes a no-op. |\n| `register_if_absent(name, uuid)` | Inserts `name → uuid` only if no entry exists. **First UUID wins** — subsequent calls return the original. Persists on insert. |\n| `get(name)` | Returns `Option<AgentId>` for a previously recorded name. |\n| `purge(name)` | Removes the entry and returns the dropped UUID. Persists on success. |\n| `persist()` | Snapshots the DashMap to disk via atomic write. No-op when no persist path is set. |\n| `list()` | Returns a `BTreeMap` snapshot (deterministic key order for diagnostics). |\n\n### Persistence Failure Handling\n\nDisk errors during `register_if_absent` or `purge` are logged as warnings. The in-memory map is always authoritative for the running process — a momentarily wedged disk must not block the kernel.\n\n---\n\n## Approval Manager\n\n**File:** `approval.rs`\n\n### Purpose\n\nThe `ApprovalManager` gates dangerous tool operations (shell execution, file writes, etc.) behind human approval. It supports two execution paths:\n\n1. **Blocking** — `request_approval()` blocks the agent loop until a human resolves the request, times out, or the request escalates.\n2. **Deferred (non-blocking)** — `submit_request()` stores a `DeferredToolExecution` payload and returns immediately. Resolution via `resolve()` atomically returns both the decision and the deferred payload for the caller to execute.\n\n### Policy Evaluation\n\nWhether a tool requires approval is determined by `ApprovalPolicy` through a layered check:\n\n```\n1. Trusted sender?  → bypass everything\n2. Channel rule?    → explicit allow/deny for (channel, tool)\n3. Remembered \"always\" decision? → short-circuit (allow_always / reject_always)\n4. Default require_approval list (supports glob patterns: \"file_*\", \"*\")\n```\n\nThe agent-aware variants `requires_approval_with_context_for` and `is_tool_denied_with_context_for` consult the remembered-decisions cache before falling through to policy. This supports the ACP permission bridge (#3313), where a user's \"always allow\" or \"always reject\" choice persists for the `(agent_id, tool_name)` pair in memory.\n\n### Request Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --> Submitted: request_approval / submit_request\n    Submitted --> Pending: db_insert_pending + broadcast\n    Pending --> Escalating: timeout (Escalate policy, count < 3)\n    Escalating --> Pending: re-inserted with bumped count\n    Pending --> Resolved: resolve() by operator\n    Pending --> TimedOut: timeout (non-escalate policy)\n    Pending --> Skipped: timeout (Skip policy)\n    Escalating --> TimedOut: timeout after MAX_ESCALATIONS\n    Resolved --> [*]\n    TimedOut --> [*]\n    Skipped --> [*]\n```\n\n**Escalation:** When `timeout_fallback` is `Escalate { extra_timeout_secs }`, a timed-out request is re-inserted with `escalation_count += 1` up to `MAX_ESCALATIONS` (3). After the final escalation, the request resolves as `TimedOut`.\n\n**Pending limit:** Each agent is capped at 5 concurrent pending requests (`MAX_PENDING_PER_AGENT`). A 6th request is immediately denied.\n\n### Persistence Across Restarts (#3611)\n\nWhen constructed via `new_with_db`, the manager persists pending approvals and TOTP lockout state to SQLite:\n\n- **`pending_approvals` table** — on submission, a row is inserted along with a `pending` audit entry. On resolution/expiry, the row is deleted.\n- **Deferred payload serialization** — the `DeferredToolExecution` is JSON-serialized into `deferred_payload`. On daemon restart, `restore_pending_approvals` decodes and integrity-checks each row:\n  - `agent_id`, `tool_name`, and `session_id` in the payload must match their respective row columns. A mismatch (indicating tampering) drops the deferred slot while keeping the pending request visible in the UI for manual investigation.\n- **TOTP lockout state** — `totp_lockout` table persists `(sender_id, failures, locked_at)`. Entries whose lockout window expired during downtime are discarded at load time.\n\n### Broadcast Events (#3313)\n\n`ApprovalManager` exposes a `broadcast::Sender<ApprovalEvent>` (capacity 256). External transports (ACP adapter, dashboard) subscribe via `subscribe()`. Events fired:\n\n- `ApprovalEvent::Created(request)` — on `request_approval` or `submit_request`\n- `ApprovalEvent::Resolved { request_id, decision, decided_by }` — on `resolve()`\n\nSlow consumers may see `RecvError::Lagged` and should re-sync via `list_pending()` rather than treating the broadcast as the source of truth.\n\n### Remembered Decisions (#3313)\n\nIn-memory cache mapping `(agent_id, tool_name) → ApprovalDecision` for \"always allow\" / \"always reject\" choices made through the ACP permission UI. Not persisted across daemon restarts (follow-up tracked).\n\n| Method | Behaviour |\n|---|---|\n| `remember(agent_id, tool_name, decision)` | Records an \"always\" decision. |\n| `recall(agent_id, tool_name)` | Retrieves a cached decision, if any. |\n| `forget(agent_id, tool_name)` | Removes the cached decision. |\n\n### Session-Scoped Operations\n\nMethods mirroring Hermes-Agent's approval model:\n\n- `resolve_all_for_session(session_id, decision, decided_by)` — resolves every pending request belonging to a session atomically. Returns the count resolved. Does **not** handle deferred payloads; callers needing deferred execution should loop `resolve_tool_approval`.\n- `list_pending_for_session(session_id)` / `has_pending_for_session(session_id)` — query/filter pending requests by session.\n\n### TOTP Second Factor\n\nWhen `ApprovalPolicy.second_factor == SecondFactor::Totp`, approvals for tools matching `totp_protected_tools` require a valid TOTP code.\n\n**Verification flow:**\n1. Caller verifies the code via `verify_totp(secret, code, issuer)` (RFC 6238, SHA-1, 6 digits, 30-second step, ±1 window).\n2. Caller passes `totp_verified: true` to `resolve()`.\n3. If TOTP is required but not verified, `resolve()` returns `Err`.\n\n**Grace period:** After a successful TOTP verification, `record_totp_grace(user_id)` starts a window (`totp_grace_period_secs`) during which subsequent approvals skip TOTP. Each success resets the failure counter.\n\n**Brute-force protection (#3372, #3584):**\n- 5 consecutive failures (`TOTP_MAX_FAILURES`) triggers a 5-minute lockout (`TOTP_LOCKOUT_SECS`).\n- `check_and_record_totp_failure(sender_id)` performs an atomic lockout-check + failure-record under `failure_rw_mutex`, eliminating TOCTOU races.\n- Failures and lockout state persist to `totp_lockout` table. If the DB write fails, the method returns `Err` — callers must reject fail-secure.\n\n**Replay prevention (#3359):**\n- `is_totp_code_used(code)` / `record_totp_code_used(code)` track SHA-256 hashes of used codes in `totp_used_codes` with a 60-second lookback window.\n- `record_totp_code_used_for(code, bound_to)` binds the code to an action key (e.g. `\"approval:<uuid>\"`) for audit traceability.\n\n**Recovery codes:**\n- `generate_recovery_codes()` produces 8 codes in `XXXX-XXXX-XXXX-XXXX` hex format (64 bits entropy per code from a CSPRNG).\n- `verify_recovery_code(stored_json, code)` uses constant-time comparison (`subtle::ConstantTimeEq`) across all stored codes to prevent timing side-channels (#3591). On match, the code is consumed and the updated list is returned.\n- `is_recovery_code_format(code)` accepts both the new hex format and the legacy `DDDD-DDDD` decimal format for backward compatibility.\n\n### OAuth Nonce Consumption (#3944)\n\nThe manager also tracks consumed OIDC state nonces to prevent OAuth callback replay:\n\n- `is_oauth_nonce_used(nonce)` — checks SHA-256 hash against `oauth_used_nonces` with a 1-hour window.\n- `record_oauth_nonce_used(nonce)` — persists the hash and prunes entries older than 1 hour.\n\n### Audit Logging\n\nAll resolutions (including timeouts and escalations) are written to `approval_audit` via `push_recent()`. Each entry includes the full `ApprovalAuditEntry` with request metadata, decision, decider, timestamp, and whether a second factor was used.\n\n**Query methods:**\n- `query_audit(limit, offset, agent_id, tool_name)` — paginated queries with optional filters.\n- `audit_count(agent_id, tool_name)` — total count with optional filters.\n- `prune_audit(older_than_days)` — hard-deletes entries older than `N` days. Uses `datetime()` comparison to handle RFC3339 variants correctly (#3468).\n\n### Risk Classification\n\n`classify_risk(tool_name)` returns a static risk level:\n\n| Tool | Risk |\n|---|---|\n| `shell_exec` | Critical |\n| `file_write`, `file_delete`, `apply_patch` | High |\n| `web_fetch`, `browser_navigate` | Medium |\n| Everything else | Low |\n\n### Policy Hot-Reload\n\n`update_policy(policy)` replaces the active `ApprovalPolicy` behind a `RwLock`. All policy checks read a snapshot, so a hot-reload takes effect on the next check without disrupting in-flight requests.\n\n---\n\n## Integration Points\n\n### From `librefang-api`\n\nThe API layer is the primary consumer:\n\n- **WebSocket handler** (`handle_agent_ws` in `ws.rs`) calls `subscribe_changes` on the registry.\n- **OAuth callback** (`consume_oauth_nonce` in `oauth.rs`) calls `is_oauth_nonce_used` and `record_oauth_nonce_used`.\n- **Dashboard login** (`dashboard_login` in `server.rs`) calls `verify_totp`, `is_totp_code_used`, `record_totp_code_used`, and `policy`.\n- **Auth middleware** (`auth` in `middleware.rs`) calls `from_str_role` from the auth module.\n- **OpenAI compatibility** (`list_models`) calls `list_arcs` on the registry.\n\n### From the Agent Loop\n\n- `register_if_absent` is called during agent spawn to establish or retrieve the canonical UUID.\n- `requires_approval_with_context_for` is called before each tool invocation to determine whether the agent must pause for approval.\n\n### From the ACP Bridge\n\n- Subscribes to `ApprovalEvent` via `subscribe()` for low-latency permission prompts.\n- Records remembered decisions via `remember()` on \"always allow/reject\" choices.","kernel-core":"# Kernel Core\n\n# Kernel Core\n\nThe kernel core is the foundation of the agent runtime, providing identity management, cost controls, message routing, the runtime–kernel interface, and shared HTTP infrastructure. Every other layer in the system ultimately depends on one or more of these sub-modules.\n\n## Sub-modules at a glance\n\n| Sub-module | Responsibility |\n|---|---|\n| [Kernel — Identity & Approvals](librefang-kernel-src.md) | Agent identity registry (atomic TOML persistence) and approval manager (SQLite-backed pending approvals, TOTP gates, audit trail, remembered decisions) |\n| [Kernel — Metering](librefang-kernel-metering-src.md) | LLM cost tracking and quota enforcement at four levels (per-agent, global, per-provider, per-user) via a reservation ledger backed by a SQLite `UsageStore` |\n| [Kernel — Router](librefang-kernel-router-src.md) | Message-to-agent routing using keyword rules, manifest metadata, and optional embedding similarity to select specialist hands or templates |\n| [Kernel — Handle](librefang-kernel-handle-src.md) | 18 granular role traits (`AgentControl`, `MemoryAccess`, `ApprovalGate`, etc.) composing the `KernelHandle` supertrait — the seam between runtime and kernel |\n| [Kernel — HTTP](librefang-http-src.md) | Centralized HTTP client factory with uniform proxy support, resilient TLS (webpki-roots + system certs), and bearer-token redaction |\n\n## How they fit together\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                    Agent Runtime                         │\n│          (depends on KernelHandle role traits)           │\n└──────────────────────┬──────────────────────────────────┘\n                       │\n          ┌────────────┼────────────────┐\n          ▼            ▼                ▼\n   ┌────────────┐ ┌──────────┐  ┌──────────────┐\n   │  Router     │ │ Metering │  │  Identity &  │\n   │  (who?)     │ │ (budget) │  │  Approvals   │\n   └──────┬─────┘ └────┬─────┘  └──────┬───────┘\n          │            │               │\n          └────────────┼───────────────┘\n                       ▼\n              ┌─────────────────┐\n              │  HTTP Client    │\n              │  (all outbound) │\n              └─────────────────┘\n```\n\n## Key cross-cutting workflows\n\n**Incoming message processing.** A user message arrives and the [Router](librefang-kernel-router-src.md) scores candidate hands and templates to select the best specialist. The chosen agent's identity is loaded from the [Identity Registry](librefang-kernel-src.md). If the agent invokes a gated tool, the [Approval Manager](librefang-kernel-src.md) checks remembered decisions or queues a pending approval (with optional TOTP). All LLM calls during this flow pass through the [Metering engine](librefang-kernel-metering-src.md), which reserves estimated budget before dispatch and records actual cost atomically on completion.\n\n**Provider health probing.** When the API lists available providers, the call flows through the [HTTP client](librefang-http-src.md) — `proxied_client_builder` → `build_http_client` → `tls_config` — ensuring consistent proxy routing and certificate validation even on minimal hosts (Docker, Termux, musl). Metering tracks the cost of these probe calls at the per-provider level.\n\n**Skill workshop & agent learning.** The system captures repeated tool patterns and user corrections, persists pending skill candidates, and routes them through the Approval Manager for review. Approved skills are created under an agent identity from the registry, with the entire HTTP surface protected by the shared TLS/proxy configuration.\n\n**Narrow dependency via role traits.** Rather than importing the full kernel surface, callers express minimal bounds — `T: ApprovalGate` for approval workflows, `T: MemoryAccess` for context retrieval — through the role traits defined in [Handle](librefang-kernel-handle-src.md). This keeps individual components testable and decoupled while the `KernelHandle` supertrait remains available for the main runtime entry point.","llm-drivers-librefang-llm-driver-src":"# LLM Drivers — librefang-llm-driver-src\n\n# LLM Driver — `librefang-llm-driver`\n\nThe shared trait definition, request/response types, and error-classification infrastructure that every LLM provider driver in LibreFang depends on. Concrete drivers (Anthropic, OpenAI, Gemini, Ollama, CLI-based providers, etc.) live in `librefang-llm-drivers` and implement the [`LlmDriver`](#the-llmdriver-trait) trait defined here.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Agent Loop] -->|CompletionRequest| B[LlmDriver trait]\n    B -->|complete / stream| C[Concrete Driver]\n    C -->|LlmError| D[failover_reason]\n    D --> E[FallbackChain]\n    C -->|CompletionResponse| A\n    F[llm_errors] --> G[classify_error]\n    G --> H[ClassifiedError]\n    D -.->|uses types from| F\n```\n\nThe crate is split into two files:\n\n| File | Responsibility |\n|---|---|\n| `src/lib.rs` | `LlmDriver` trait, `CompletionRequest`, `CompletionResponse`, `StreamEvent`, `LlmError`, `DriverConfig`, `LlmFamily` |\n| `src/llm_errors.rs` | Error classification (`classify_error`), sanitization, retry-delay extraction, `FailoverReason`, `ProviderErrorCode` |\n\n---\n\n## The `LlmDriver` Trait\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: tokio::sync::mpsc::Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError> { /* default impl */ }\n\n    fn is_configured(&self) -> bool { true }\n    fn family(&self) -> LlmFamily { LlmFamily::Other }\n}\n```\n\n### `complete`\n\nBlocking (from the caller's perspective) request/response. Returns the full `CompletionResponse` once the model finishes generating.\n\n### `stream`\n\nThe default implementation wraps `complete` — it calls `complete`, then emits `TextDelta` and `ContentComplete` events on the channel. Concrete drivers override this to emit true incremental deltas.\n\n**Receiver-dropped handling (#3543):** If the receiving end of `tx` is dropped (client disconnect, abort), `stream` returns `LlmError::Http(\"stream receiver dropped\")` rather than silently swallowing the error. This prevents callers from continuing to drive cancelled work.\n\n### `is_configured`\n\nReturns `false` only for `StubDriver`. All real drivers keep the default (`true`).\n\n### `family`\n\nReturns the high-level [`LlmFamily`](#llmfamily) this driver belongs to. Out-of-tree drivers compile without overriding this; in-tree drivers override it to enable family-level shared policy (prompt-cache semantics, tool-schema style, etc.).\n\n---\n\n## `CompletionRequest`\n\n```rust\npub struct CompletionRequest {\n    pub model: String,\n    pub messages: Arc<Vec<Message>>,\n    pub tools: Arc<Vec<ToolDefinition>>,\n    pub max_tokens: u32,\n    pub temperature: f32,\n    pub system: Option<String>,\n    pub thinking: Option<ThinkingConfig>,\n    pub prompt_caching: bool,\n    pub cache_ttl: Option<&'static str>,\n    pub response_format: Option<ResponseFormat>,\n    pub timeout_secs: Option<u64>,\n    pub extra_body: Option<HashMap<String, serde_json::Value>>,\n    pub agent_id: Option<String>,\n    pub session_id: Option<String>,\n    pub step_id: Option<String>,\n}\n```\n\nKey design points:\n\n- **`messages` and `tools` are wrapped in `Arc`.** The agent loop, retry logic, and fallback chain all clone requests. Without `Arc`, each clone would deep-copy 200–600 KB of message history and the full tool-definition list per turn. With `Arc`, cloning is an O(1) refcount bump. All driver code reads through `&request.messages` / `request.tools`, which auto-deref through `Arc<Vec<_>>`.\n\n- **`prompt_caching` / `cache_ttl`:** When enabled, the Anthropic driver injects `cache_control: {\"type\": \"ephemeral\"}` markers (system block, last tool, trailing 2–3 messages). OpenAI uses automatic prefix caching (no request changes). `cache_ttl` defaults to 5 minutes; `Some(\"1h\")` enables the 1-hour extended cache on Anthropic.\n\n- **`extra_body`:** Provider-specific parameters merged into the top-level API request body. Values take precedence over standard parameters on conflict (last-wins in JSON serialization).\n\n- **`agent_id` / `session_id` / `step_id`:** Caller correlation keys forwarded as `x-librefang-agent-id`, `x-librefang-session-id`, `x-librefang-step-id` HTTP headers on OpenAI-compatible endpoints. Controlled by [`DriverConfig::emit_caller_trace_headers`](#security-note). `None` for out-of-band callers (compaction, routing probes, tests).\n\n- **`timeout_secs`:** Per-request override of the global `message_timeout_secs`. Used by the agent loop to grant longer timeouts for browser-tool requests.\n\n---\n\n## `CompletionResponse`\n\n```rust\npub struct CompletionResponse {\n    pub content: Vec<ContentBlock>,\n    pub stop_reason: StopReason,\n    pub tool_calls: Vec<ToolCall>,\n    pub usage: TokenUsage,\n}\n```\n\n### `text()` helper\n\nConcatenates all `ContentBlock::Text` blocks into a single `String`, skipping `Thinking` and other block types.\n\n---\n\n## `StreamEvent`\n\nEvents emitted during streaming LLM completion:\n\n| Variant | Description |\n|---|---|\n| `TextDelta { text }` | Incremental text content |\n| `ToolUseStart { id, name }` | A tool-use block has begun |\n| `ToolInputDelta { text }` | Incremental JSON input for an in-progress tool call |\n| `ToolUseEnd { id, name, input }` | Tool-use block complete with parsed input |\n| `ThinkingDelta { text }` | Incremental thinking/reasoning text |\n| `ContentComplete { stop_reason, usage }` | Entire response is complete |\n| `PhaseChange { phase, detail }` | Agent lifecycle phase change (UX indicator) |\n| `ToolExecutionResult { name, result_preview, is_error }` | Tool execution result (emitted by agent loop, not driver) |\n| `OwnerNotice { text }` | Private notice routed to the owner's DM (WhatsApp gateway, etc.) |\n\nThe constant [`PHASE_RESPONSE_COMPLETE`] (`\"response_complete\"`) is emitted via `PhaseChange` to signal that the final LLM text has been streamed and post-processing (session save, proactive memory) is about to begin. Consumers use this to unblock user input before the full response payload is ready.\n\n---\n\n## `LlmError`\n\n```rust\n#[non_exhaustive]\npub enum LlmError {\n    Http(String),\n    Api { status: u16, message: String, code: Option<ProviderErrorCode> },\n    RateLimited { retry_after_ms: u64, message: Option<String> },\n    Parse(String),\n    MissingApiKey(String),\n    Overloaded { retry_after_ms: u64 },\n    AuthenticationFailed(String),\n    ModelNotFound(String),\n    TimedOut { inactivity_secs: u64, partial_text: Option<Arc<str>>, partial_text_len: usize, last_activity: String },\n}\n```\n\n### `Api.code` field (#3745)\n\nWhen a driver parses a structured error response (e.g. JSON `error.code`), it populates `code: Some(ProviderErrorCode::...)`. This lets `failover_reason()` classify via the typed enum — exhaustive, locale-independent, and immune to provider rewording. When `code` is `None`, classification falls back to status-code-only heuristics (no substring matching of the human-readable message). Drivers needing fine-grained behaviour from ambiguous statuses (403, 404, 400) must populate `code`.\n\n### `TimedOut.partial_text` (#3552)\n\n`partial_text` is `Option<Arc<str>>` so cloning the error variant is an O(1) refcount bump rather than copying potentially-megabyte payloads. The `Display` impl references only `partial_text_len`, `inactivity_secs`, and `last_activity` — the body is opaque to most consumers. CLI-driver callers that want to forward the partial to the user can pattern-match the variant and clone cheaply.\n\n### `failover_reason()`\n\nClassifies any `LlmError` into a [`FailoverReason`](#failoverreason) that drives provider-switching decisions in `FallbackChain`. The method is purely structural (variant + embedded status/code), allocation-free, and infallible.\n\nClassification logic in priority order:\n\n1. **`RateLimited` / `Overloaded`** → `FailoverReason::RateLimit(retry_after_ms)`. Back off, then retry the same provider.\n2. **`Api` with typed `code`** → Classifies by `ProviderErrorCode` enum. `RateLimit` → `RateLimit`, `CreditExhausted` → `CreditExhausted`, `ContextLengthExceeded` → `ContextTooLong`, `ModelNotFound`/`ServerUnavailable` → `ModelUnavailable`, `AuthError` → `AuthError`, `ServerError`/`BadRequest` → `HttpError` (with 413 → `ContextTooLong` special case).\n3. **`Api` without `code`** → Status-code-only: 429 → `RateLimit`, 401 → `AuthError`, 402 → `CreditExhausted`, 413 → `ContextTooLong`, 503 → `ModelUnavailable`, everything else → `HttpError`.\n4. **`TimedOut`** → `FailoverReason::Timeout`. Skip to next provider.\n5. **`ModelNotFound`** → `FailoverReason::ModelUnavailable`. Skip to next provider.\n6. **`AuthenticationFailed` / `MissingApiKey`** → `FailoverReason::AuthError`. Skip to next provider (another slot may have a valid key).\n7. **`Parse`** → `FailoverReason::Unknown`. Propagate to caller (switching providers won't help).\n8. **`Http`** → `FailoverReason::HttpError`. Skip to next provider.\n\n---\n\n## `LlmFamily`\n\n```rust\n#[non_exhaustive]\npub enum LlmFamily {\n    Anthropic,   // Claude direct API, Anthropic-compatible providers, Claude Code CLI\n    OpenAi,      // OpenAI Chat Completions wire format (OpenAI, Azure, Groq, OpenRouter, etc.)\n    Google,      // Gemini API, Vertex AI Gemini, Gemini CLI\n    Local,       // Ollama, LM Studio, vLLM, sglang, llama.cpp (native protocol)\n    Other,       // Cohere v2, Aider, custom CLIs, default for unmarked drivers\n}\n```\n\nIntentionally coarser than per-provider identification. Exists so cross-cutting policy code (prompt-cache replay, tool-schema normalisation) can hang off a single dimension without per-driver duplication. Serializes as `snake_case` (`\"open_ai\"`, not `\"openai\"`).\n\n---\n\n## `DriverConfig`\n\n```rust\npub struct DriverConfig {\n    pub provider: String,\n    pub api_key: Option<String>,\n    pub base_url: Option<String>,\n    pub vertex_ai: VertexAiConfig,\n    pub azure_openai: AzureOpenAiConfig,\n    pub skip_permissions: bool,               // default: true\n    pub message_timeout_secs: u64,            // default: 300\n    pub mcp_bridge: Option<McpBridgeConfig>,  // not serialized\n    pub proxy_url: Option<String>,\n    pub request_timeout_secs: Option<u64>,\n    pub emit_caller_trace_headers: bool,      // default: true\n}\n```\n\n### Security note\n\nThe `Debug` impl **redacts** `api_key`, `vertex_ai.credentials_path`, and `proxy_url` to `<redacted>`. These fields never appear in log output through `{:?}` formatting.\n\n### Key fields\n\n- **`skip_permissions`**: Adds `--dangerously-skip-permissions` to spawned CLI processes (Claude Code). Defaults to `true` because LibreFang runs as a daemon with no interactive terminal; the RBAC layer already restricts agent capabilities.\n\n- **`message_timeout_secs`**: Inactivity-based timeout for CLI-based providers. The process is killed after this many seconds of silence on stdout, not wall-clock time.\n\n- **`mcp_bridge`**: When set, the driver writes a temp `mcp_config.json` and passes `--mcp-config` to the spawned CLI. Not serialized — set only by the kernel at construction time.\n\n- **`emit_caller_trace_headers`**: Controls whether `x-librefang-agent-id`, `x-librefang-session-id`, and `x-librefang-step-id` are sent on outbound HTTP requests. Operators with strict zero-egress policies can set this to `false` in config. Currently only honoured by the OpenAI-compatible driver.\n\n---\n\n## Error Classification (`llm_errors`)\n\nThe `llm_errors` submodule classifies raw LLM API errors from 19+ providers into structured categories. Classification is done via case-insensitive substring checks — no regex dependency.\n\n### `classify_error(message, status) -> ClassifiedError`\n\nMain entry point when provider/model context is not available.\n\n**Classification priority:**\n\n1. **Status-code fast paths** (unambiguous codes): 429 → RateLimit, 402 → Billing, 401 → Auth, 404 → ModelNotFound. Status 403 is special-cased because it's ambiguous across providers (see below).\n2. **Pattern matching** (most specific first): ContextOverflow → Billing → Auth → RateLimit → ModelNotFound → Format → Overloaded → Timeout.\n3. **HTML/Cloudflare detection**: Error pages (Cloudflare 521–530, `<!DOCTYPE`, `<html`) are classified as Overloaded.\n4. **Fallback**: 5xx → Overloaded, 4xx → Format, network-sounding words → Timeout, everything else → Format.\n\n**403 handling for Chinese providers:** Status 403 is checked against `FORBIDDEN_NON_AUTH_PATTERNS` (quota, region, model permission, etc.) before falling back to Auth. This prevents false-positive auth classification when providers like Qwen or ZhiPu return 403 for quota/billing/region issues.\n\n### `classify_error_with_context(message, status, provider, model) -> ClassifiedError`\n\nPreferred entry point when provider/model information is available. Enriches the classified error with:\n- `provider` and `model` fields\n- `suggestion`: actionable user-facing advice (e.g. \"Check your openai account balance and billing settings.\")\n- Enriched `sanitized_message` with `[provider=X, model=Y]` suffix\n\n### `LlmErrorCategory`\n\n```rust\npub enum LlmErrorCategory {\n    RateLimit,       // 429, quota, too many requests. is_retryable = true\n    Overloaded,      // 503, overloaded, high demand.     is_retryable = true\n    Timeout,         // ETIMEDOUT, ECONNRESET, etc.       is_retryable = true\n    Billing,         // 402, insufficient credits.        is_billing = true\n    Auth,            // 401/403, invalid key.\n    ContextOverflow, // context_length_exceeded, prompt too long.\n    Format,          // 400, malformed request, schema violation.\n    ModelNotFound,   // unknown model, 404.\n}\n```\n\n### `FailoverReason`\n\nProvider-switching taxonomy used by `FallbackChain`. Maps from `LlmError::failover_reason()`:\n\n| Variant | HTTP hint | Recovery action |\n|---|---|---|\n| `RateLimit(Option<u64>)` | 429 | Sleep (optional hint ms), retry same provider |\n| `CreditExhausted` | 402 | Skip to next provider |\n| `ContextTooLong` | 413 | Propagate to caller (must compress) |\n| `ModelUnavailable` | 503 / 404 | Skip to next provider |\n| `Timeout` | Network timeout | Skip to next provider |\n| `HttpError` | Other 4xx/5xx | Skip to next provider |\n| `AuthError` | 401 | Skip to next provider |\n| `Unknown` | — | Propagate immediately |\n\n### `ProviderErrorCode`\n\nTyped classification populated by drivers when they parse structured error responses:\n\n```rust\npub enum ProviderErrorCode {\n    RateLimit,              // 429-equivalent\n    CreditExhausted,        // 402-equivalent\n    ContextLengthExceeded,  // Context window overflow\n    ModelNotFound,          // Model not available on this slot\n    AuthError,              // 401/403 authentication failure\n    ServerUnavailable,      // 503-equivalent\n    ServerError,            // 500-class\n    BadRequest,             // 400-class\n}\n```\n\n### Sanitization pipeline\n\n`sanitize_for_user(category, raw)` produces user-safe messages by:\n\n1. Detecting HTML error pages → \"provider returned an error page (possible outage)\"\n2. Extracting `.error.message` / `.message` / `.detail` from JSON bodies\n3. Stripping `sk-`, `key-`, `Bearer ` prefixes (replaced with `<redacted>`)\n4. Stripping `\"LLM driver error: API error (NNN): \"` wrappers\n5. Capping at 200 chars (excerpt) or 300 chars (final message) with UTF-8–safe truncation\n\n### Helper functions\n\n- **`extract_retry_delay(message) -> Option<u64>`**: Parses \"retry after N\", \"retry-after: N\", \"try again in N\" patterns. Recognizes `ms` suffix; defaults to seconds → milliseconds conversion.\n- **`is_transient(message) -> bool`**: Quick heuristic checking for timeout, overloaded, rate-limit, or SSL transient patterns.\n- **`is_html_error_page(body) -> bool`**: Detects Cloudflare error pages, HTML tags, and Cloudflare-specific error codes.\n\n---\n\n## Implementing a New Driver\n\n1. Depend on `librefang-llm-driver` for the trait and types.\n2. Implement `LlmDriver` with at minimum `complete`.\n3. Override `stream` for incremental delta support.\n4. Override `family()` to return the correct `LlmFamily` variant.\n5. When parsing structured error responses, populate `LlmError::Api { code: Some(ProviderErrorCode::...), ... }` for precise failover classification.\n6. Use `DriverConfig` for construction; it handles API keys, base URLs, timeouts, and proxy settings.","llm-drivers-librefang-llm-drivers-src":"# LLM Drivers — librefang-llm-drivers-src\n\n# LibreFang LLM Drivers (`librefang-llm-drivers`)\n\n## Overview\n\nThis crate provides a unified abstraction layer for communicating with LLM providers. It implements the `LlmDriver` trait across multiple backends—cloud APIs, CLI tools, and local model servers—and wraps each with retry logic, credential pooling, rate-limit guards, and streaming support.\n\nThe module is the sole point of contact between the rest of the LibreFang codebase and external LLM services. Every request flows through the same typed interface regardless of which provider ultimately handles it.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Consumer Layer\"\n        A[kernel / routes]\n        B[session runtime]\n        C[channel bridge]\n    end\n\n    subgraph \"Driver Interface\"\n        D[LlmDriver trait<br>complete() / stream()]\n    end\n\n    subgraph \"Provider Drivers\"\n        E[AnthropicDriver]\n        F[OpenAIDriver]\n        G[GeminiDriver]\n        H[VertexAIDriver]\n        I[OllamaDriver]\n        J[Claude Code CLI]\n        K[Qwen Code CLI]\n        L[AiderDriver]\n        M[FallbackDriver]\n    end\n\n    subgraph \"Cross-Cutting\"\n        N[CredentialPool]\n        O[Backoff / Retry]\n        P[RateLimitTracker]\n        Q[SharedRateGuard]\n        R[Utf8StreamDecoder]\n    end\n\n    A --> D\n    B --> D\n    C --> D\n    D --> E\n    D --> F\n    D --> G\n    D --> H\n    D --> I\n    D --> J\n    D --> K\n    D --> L\n    D --> M\n    E --- N\n    E --- O\n    E --- P\n    E --- Q\n    E --- R\n```\n\n---\n\n## Core Trait: `LlmDriver`\n\nDefined in `llm_driver.rs`, the trait is the contract every provider implements:\n\n```rust\n#[async_trait]\npub trait LlmDriver: Send + Sync {\n    async fn complete(&self, request: CompletionRequest)\n        -> Result<CompletionResponse, LlmError>;\n\n    async fn stream(\n        &self,\n        request: CompletionRequest,\n        tx: mpsc::Sender<StreamEvent>,\n    ) -> Result<CompletionResponse, LlmError>;\n\n    fn family(&self) -> LlmFamily;\n}\n```\n\n- **`complete`** — Sends a single-shot request and returns the full response.\n- **`stream`** — Opens an SSE connection, emits `StreamEvent` variants (text deltas, tool-use start/end, thinking deltas, content-complete) over the `mpsc::Sender`, and returns the assembled `CompletionResponse` once the stream finishes.\n- **`family`** — Returns the provider family (`Anthropic`, `OpenAi`, `Gemini`, etc.) for logging and routing.\n\n### `CompletionRequest`\n\nThe universal request struct carried by every driver:\n\n| Field | Type | Purpose |\n|---|---|---|\n| `model` | `String` | Provider-specific model identifier |\n| `messages` | `Arc<Vec<Message>>` | Conversation history (user/assistant/system) |\n| `tools` | `Arc<Vec<ToolDefinition>>` | Available tools for this request |\n| `system` | `Option<String>` | Explicit system prompt |\n| `max_tokens` | `u32` | Response token limit |\n| `temperature` | `f32` | Sampling temperature |\n| `thinking` | `Option<ThinkingConfig>` | Extended thinking / chain-of-thought budget |\n| `prompt_caching` | `bool` | Enable Anthropic prompt-caching markers |\n| `cache_ttl` | `Option<&'static str>` | Cache duration hint (`\"1h\"` for extended) |\n| `response_format` | `Option<ResponseFormat>` | JSON / JSON-schema output constraints |\n| `timeout_secs` | `Option<u64>` | Per-request timeout override |\n| `extra_body` | `Option<serde_json::Value>` | Passthrough fields for provider-specific options |\n| `agent_id` / `session_id` / `step_id` | `Option<String>` | Trace-correlation headers |\n\n### `CompletionResponse`\n\nUniform response across all providers:\n\n| Field | Type | Purpose |\n|---|---|---|\n| `content` | `Vec<ContentBlock>` | Text, Thinking, ToolUse, Image blocks |\n| `stop_reason` | `StopReason` | Why generation ended (EndTurn, ToolUse, MaxTokens, etc.) |\n| `tool_calls` | `Vec<ToolCall>` | Extracted tool invocations for the agent loop |\n| `usage` | `TokenUsage` | Input/output token counts including cache metrics |\n\n### `LlmError`\n\nStructured error type with provider-specific context:\n\n```rust\npub enum LlmError {\n    Http(String),\n    Parse(String),\n    Api { status: u16, message: String, code: Option<ProviderErrorCode> },\n    RateLimited { retry_after_ms: u64, message: Option<String> },\n    Overloaded { retry_after_ms: u64 },\n    KeyExhausted,\n    AllKeysExhausted,\n    ContextLengthExceeded { ... },\n    ContentFiltered { ... },\n}\n```\n\n`ProviderErrorCode` provides a normalized classification (e.g., `RateLimit`, `AuthError`, `CreditExhausted`, `ModelNotFound`) derived from each provider's native error taxonomy. This allows the `FallbackDriver` and upper layers to make failover decisions without parsing human-readable error strings.\n\n---\n\n## Provider Drivers\n\n### Anthropic (`drivers/anthropic.rs`)\n\nFull implementation of the Anthropic Messages API with:\n\n- **Tool use**: Serializes tool definitions and deserializes `tool_use` / `tool_result` content blocks. Malformed tool inputs (null, non-object strings, primitives) are wrapped in `{\"raw_input\": ...}` rather than silently dropped via `ensure_object()`.\n- **Extended thinking**: When `ThinkingConfig.budget_tokens >= 1024`, the driver enables Anthropic's thinking mode and adjusts `max_tokens` to exceed the budget by 1024.\n- **Prompt caching**: Implements Anthropic's `system_and_3` rolling-window strategy. Anthropic allows at most 4 `cache_control` breakpoints per request. The driver allocates them as:\n  1. System prompt block (always, when caching is on)\n  2. Last tool definition (when tools exist)\n  3. Remaining slots on the trailing message blocks (newest first)\n\n  Empty `Blocks` payloads (e.g., Thinking-only turns after filtering) do not consume a breakpoint slot—this ensures the rolling window doesn't silently shrink.\n\n- **Cache TTL**: Two modes controlled by `cache_ttl`:\n  - `None` (default): 5-minute ephemeral cache; markers carry `{\"type\": \"ephemeral\"}`.\n  - `Some(\"1h\")`: 1-hour cache; markers carry `{\"type\": \"ephemeral\", \"ttl\": \"1h\"}` and the `extended-cache-ttl-2025-04-11` beta header is attached.\n\n- **Retry logic**: 429 and 529 responses trigger up to 3 retries with jittered exponential backoff. 429 lockouts are persisted to `shared_rate_guard` for cross-process coordination; 529 (overloaded) is not persisted since it reflects server capacity, not account limits.\n- **Rate-limit headers**: Extracted via `RateLimitSnapshot::from_headers()` and logged at warn/debug level.\n- **Streaming**: SSE parser accumulates content blocks incrementally. A `Utf8StreamDecoder` handles partial UTF-8 codepoints across chunk boundaries. If the consumer drops the receiver, the stream is cancelled on the next chunk (`receiver_dropped` flag via the `send_or_mark_dropped!` macro).\n- **Trace headers**: Optionally emits `x-librefang-{agent,session,step}-id` headers, gated by `emit_caller_trace_headers` (default `true`).\n\n### OpenAI-Compatible (`drivers/openai.rs`)\n\nHandles OpenAI, Azure OpenAI, Groq, DeepSeek, Cerebras, xAI, and any provider with an OpenAI-compatible chat completions endpoint. Key functions referenced from the call graph:\n\n- `parse_tool_args` — Incremental JSON parser for streaming tool-call arguments, handling nested objects and trailing commas.\n- `extract_thinking_summary` / `extract_think_tags` — Extract chain-of-thought from DeepSeek and similar models that emit thinking in `<think/>` tags.\n- `is_deepseek_reasoner` — Model name detection for thinking-mode activation.\n- `parse_groq_failed_tool_call` — Handles Groq's non-standard tool-call failure format.\n\n### Google Gemini (`drivers/gemini.rs`, `drivers/gemini_cli.rs`)\n\nTwo backends:\n\n- **API driver** (`gemini.rs`): Direct Gemini API with tool use, thinking mode, and image support. Extracts system prompts and handles Gemini's `FunctionCall` / `FunctionResponse` mapping.\n- **CLI driver** (`gemini_cli.rs`): Wraps the `gemini` CLI tool, detects credentials via `credentials_in_dir()`.\n\n### Vertex AI (`drivers/vertex_ai.rs`)\n\nGoogle Cloud Vertex AI with JWT-based service account authentication. Uses:\n\n- ASN.1 DER parsing (`asn1_unwrap_sequence`, `asn1_read_content`) for service account key extraction.\n- PKCS#1 v1.5 signing (`pkcs1_v15_pad`) for JWT signatures.\n- Region and project resolution from `DriverConfig`.\n- Base64 URL encoding for JWT payloads.\n\n### Ollama (`drivers/ollama.rs`)\n\nLocal model server driver. Notable behaviors:\n\n- `sanitize_base_url` — Strips trailing `/v1` or `/api` paths to avoid double-pathing.\n- Models user/assistant blocks with image attachments into Ollama's message format.\n- Handles thinking blocks and tool calls in streaming responses.\n\n### CLI Drivers\n\nThree CLI-based drivers share a common pattern: spawn a subprocess, pass a text prompt, capture stdout.\n\n| Driver | Binary | Key Feature |\n|---|---|---|\n| `ClaudeCodeDriver` | `claude` | Detects credentials in `~/.claude/`; supports image file references |\n| `QwenCodeDriver` | `qwen-coder` | Reads `oauth_creds.json` from configurable directory; applies caller-trace env vars |\n| `AiderDriver` | `aider` | Strips `aider/` prefix from model IDs; uses `--yes-always --no-auto-commits --no-git` flags |\n| `CodexCliDriver` | `codex` | Supports `--full-auto` mode flags |\n\nEach CLI driver:\n1. Detects availability (`detect()` / `available()`) by running `--version`.\n2. Builds args from the prompt and model.\n3. Spawns via `tokio::process::Command` with piped stdout/stderr.\n4. Parses authentication errors from stderr for actionable error messages.\n\n### Fallback Driver (`drivers/fallback.rs`)\n\nWraps multiple drivers and selects among them based on health:\n\n- `health_order` — Sorts drivers by EWMA (exponentially weighted moving average) response health. Healthy drivers always precede unhealthy ones.\n- Transparently retries on the next driver when one fails with a retriable error.\n\n### Token Rotation (`drivers/token_rotation.rs`)\n\nRotates API keys within a single provider, tracking request counts and exhaustion states per token.\n\n---\n\n## Cross-Cutting Concerns\n\n### Backoff (`backoff.rs`)\n\nJittered exponential backoff for retry loops. Formula:\n\n```\ndelay = max(exp(base × 2^(attempt-1), max_delay), floor) + jitter\n```\n\nwhere `jitter ∈ [0, jitter_ratio × base_delay]`.\n\n**Seed diversity**: The random seed combines `SystemTime::now().subsec_nanos()` XOR'd with a process-global Weyl-sequence counter (`JITTER_COUNTER`). This ensures diverse seeds even when the OS clock has coarse granularity (e.g., 15 ms on Windows) and when multiple retry loops fire concurrently.\n\n**Overflow safety**: All exponential computation happens in `f64` space before constructing a `Duration`, preventing panics from `Duration::mul_f64` when `base × 2^attempt` exceeds `Duration`'s internal nanosecond range (which occurs around attempt 34 for a 2-second base).\n\nTwo convenience functions:\n- `standard_retry_delay(attempt, floor)` — 2 s base, 60 s cap, 50% jitter.\n- `tool_use_retry_delay(attempt)` — 1.5 s base, 60 s cap, 50% jitter, no floor.\n\n**Test support**: `enable_test_zero_backoff()` returns a guard that forces all backoff delays to zero (respecting only the floor). The guard restores normal behavior on drop.\n\n### Credential Pool (`credential_pool.rs`)\n\nThread-safe pool of API keys for a single provider, designed for failover when one key hits rate limits or quota exhaustion.\n\n**Selection strategies**:\n\n| Strategy | Behavior |\n|---|---|\n| `FillFirst` | Always pick highest-priority available key; maximize premium key usage |\n| `RoundRobin` | Cycle through available keys in priority order; even load distribution |\n| `Random` | Pick a random available key using an LCG (no `rand` dependency) |\n| `LeastUsed` | Pick the key with the lowest `request_count` |\n\n**Exhaustion handling**: Keys marked exhausted (via `mark_exhausted()`) are placed in cooldown for `exhausted_ttl` (default 1 hour). `mark_success()` immediately clears the exhaustion marker and increments the request counter.\n\n**Thread safety**: All mutable state (credential list + round-robin index) is behind a single `Mutex`, eliminating TOCTOU between index reads and credential selection.\n\n**Diagnostics**: `snapshot()` returns `Vec<CredentialSnapshot>` with redacted key hints (`****abcd`), priorities, request counts, and exhaustion status—safe for logs and dashboards.\n\n**Convenience type**: `ArcCredentialPool = Arc<CredentialPool>` for sharing across async tasks.\n\n### Rate Limit Tracking (`rate_limit_tracker.rs`)\n\n`RateLimitSnapshot` parses provider-specific rate-limit headers (`x-ratelimit-*`, `anthropic-ratelimit-*`) into a structured snapshot with warning detection and human-readable display.\n\n### Shared Rate Guard (`shared_rate_guard.rs`)\n\nCross-process rate-limit coordination. When a 429 is received:\n\n1. `record_429_from_headers()` persists the lockout state (keyed by hashed API key + provider).\n2. `pre_request_check()` short-circuits requests when the key is still in lockout, avoiding wasted API calls.\n\nThis prevents thundering-herd scenarios when multiple LibreFang processes share the same API key.\n\n### UTF-8 Stream Decoder (`utf8_stream.rs`)\n\nHandles partial UTF-8 codepoints that split across SSE chunk boundaries (particularly relevant for CJK text). The decoder buffers incomplete sequences and emits replacement characters (`U+FFFD`) on `finish()` if a codepoint remains truncated at stream end.\n\n### Retry-After Parsing (`retry_after.rs`)\n\nParses `Retry-After` headers in both delta-seconds and HTTP-date formats. Returns `Duration::ZERO` for invalid or past dates, with `duration_to_ms_or_fallback()` providing a safe default when the header is absent.\n\n### Trace Headers (`drivers/trace_headers.rs`)\n\nBuilds `x-librefang-{agent,session,step}-id` HTTP headers from `CompletionRequest` fields. Controlled per-driver via `with_emit_caller_trace_headers()`—useful when upstream providers reject unknown headers.\n\n---\n\n## Driver Construction\n\nDrivers are constructed through `create_driver()` in `drivers/mod.rs`, which reads `DriverConfig` and instantiates the appropriate backend. Provider-specific defaults (base URLs, model mappings, timeout values) are resolved via `provider_defaults()`.\n\nDetection functions (`cli_provider_available`, `aider_available`, `claude_code_available`, etc.) check for CLI tool presence and credential files, enabling the wizard UI to show only configured providers.\n\n## Error Classification Flow\n\n```mermaid\ngraph LR\n    A[HTTP Response] --> B{Status Code}\n    B -->|429| C[RateLimited<br>record to SharedRateGuard<br>retry with backoff]\n    B -->|529| D[Overloaded<br>retry with backoff<br>no cross-process lockout]\n    B -->|402/403| E[CreditExhausted<br>mark key exhausted in pool]\n    B -->|401| F[AuthError]\n    B -->|404| G[ModelNotFound]\n    B -->|413| H[ContextLengthExceeded]\n    B -->|Other 4xx/5xx| I[Api status + message<br>classify by ProviderErrorCode]\n    C --> J{Retries left?}\n    D --> J\n    J -->|Yes| K[Backoff + retry]\n    J -->|No| L[Return LlmError]\n```\n\nEach provider maps its native error taxonomy to `ProviderErrorCode` (e.g., Anthropic's `error.type` field is mapped in `anthropic_error_code()`). This normalization lets the `FallbackDriver` decide whether to fail over (server errors, rate limits) or surface the error immediately (auth, model-not-found).\n\n## Testing Conventions\n\n- **Zero backoff guard**: Integration tests call `enable_test_zero_backoff()` to eliminate sleep delays. The `ZeroBackoffGuard` restores real backoff on drop.\n- **Lockout files**: Tests create/remove lockout files via `key_id_hash()` to exercise `SharedRateGuard` without real API calls.\n- **Provider detection**: CLI availability tests use temporary directories with mock credential files rather than relying on the host system's installed tools.","llm-drivers":"# LLM Drivers\n\n# LLM Drivers\n\nThe LLM Drivers module group provides LibreFang's complete interface to large language model services. It ships a provider-agnostic trait layer together with concrete driver implementations for cloud APIs, local model servers, and CLI-based tools.\n\n## How the crates relate\n\nThe two sub-modules follow a trait/impl split:\n\n| Crate | Role |\n|---|---|\n| [`librefang-llm-driver`](librefang-llm-driver-src.md) | Defines the `LlmDriver` trait, shared request/response types (`CompletionRequest`, `CompletionResponse`), and the error-classification infrastructure (`LlmError`, `ClassifiedError`, `classify_error`) that every backend depends on. |\n| [`librefang-llm-drivers`](librefang-llm-drivers-src.md) | Implements `LlmDriver` for every supported provider—Anthropic, OpenAI, Azure OpenAI, Vertex AI (Gemini), Ollama, Claude Code CLI, Qwen Code, and custom endpoints—and adds cross-cutting infrastructure: retry logic, token rotation, rate-limit guards, credential pooling, driver caching, and streaming utilities. |\n\n```mermaid\ngraph LR\n    subgraph \"Consumer Layer\"\n        A[Agent Loop]\n        B[Session Runtime]\n        C[Routes / API]\n    end\n\n    subgraph \"librefang-llm-driver\"\n        TRAIT[\"LlmDriver trait\"]\n        REQ[\"CompletionRequest\"]\n        RESP[\"CompletionResponse\"]\n        ERR[\"LlmError → ClassifiedError\"]\n    end\n\n    subgraph \"librefang-llm-drivers\"\n        D1[OpenAI / Azure]\n        D2[Anthropic / Claude Code]\n        D3[Vertex AI]\n        D4[Ollama]\n        D5[Qwen Code]\n        D6[Custom Providers]\n        CACHE[Driver Cache]\n        ROTATE[Token Rotation]\n    end\n\n    A & B & C --> REQ\n    REQ --> TRAIT\n    TRAIN --> D1 & D2 & D3 & D4 & D5 & D6\n    D1 & D2 & D3 & D4 & D5 & D6 --> RESP\n    D1 & D2 & D3 & D4 & D5 & D6 --> ERR\n    ERR -->|failover_reason| A\n    CACHE -.->|get_or_create| D1 & D2 & D3 & D4 & D5 & D6\n    ROTATE -.-> D1 & D3\n```\n\n## Key cross-module workflows\n\n1. **Request lifecycle** — A consumer (agent loop, session runtime, API route) builds a `CompletionRequest` from the shared types in `librefang-llm-driver`, calls `LlmDriver::complete` or `LlmDriver::stream`, and receives a typed `CompletionResponse`. The consumer never knows which backend handled the call.\n\n2. **Error classification and failover** — Any driver can return an `LlmError`. The `classify_error` function in `librefang-llm-driver` maps it to a `ClassifiedError` whose `failover_reason` field drives the fallback chain in the caller. This keeps retry/failover decisions decoupled from individual provider error formats.\n\n3. **Driver instantiation and caching** — `librefang-llm-drivers` exposes `create_driver_from_entry` and a driver cache (`get_or_create`) that resolve a `DriverConfig` (defined in `librefang-llm-driver`) into a concrete, possibly Arc-shared, driver instance. Credential pooling and provider auto-detection happen at this boundary.\n\n4. **Token rotation** — For providers that use rotating credentials (e.g. Vertex AI service account keys, Azure tokens), the rotation wrapper in `librefang-llm-drivers` intercepts `complete` calls, detects rate-limit or auth failures, and swaps the active key before retrying—without the consumer or the trait layer needing to know.\n\n5. **Streaming** — Streaming responses flow through `utf8_stream` utilities in `librefang-llm-drivers`, ensuring consistent UTF-8 decoding across all providers before reaching the session runtime.\n\nConsult the individual sub-module pages for driver-specific configuration options, supported environment variables, and implementation details.","memory-system-librefang-memory-src":"# Memory System — librefang-memory-src\n\n# Memory System — `librefang-memory`\n\n## Overview\n\n`librefang-memory` is the persistent memory substrate for the LibreFang Agent Operating System. It provides a unified API over three storage paradigms — structured key-value, semantic vector search, and a knowledge graph — all backed by SQLite via a shared `r2d2` connection pool. Agents, the kernel, and the HTTP API layer interact with a single `MemorySubstrate` rather than individual stores.\n\n## Architecture\n\n```mermaid\ngraph TD\n    API[\"HTTP API routes\"] --> PS[\"ProactiveMemoryStore\"]\n    Kernel[\"Kernel (cron, tasks)\"] --> Sub[\"MemorySubstrate\"]\n    PS --> Sub\n\n    Sub --> Structured[\"StructuredStore (KV)\"]\n    Sub --> Semantic[\"SqliteVectorStore\"]\n    Sub --> KG[\"KnowledgeStore\"]\n    Sub --> Session[\"SessionStore\"]\n    Sub --> Usage[\"UsageTracker\"]\n    Sub --> Prompt[\"PromptStore\"]\n    Sub --> Idem[\"IdempotencyStore\"]\n\n    Semantic -->|\"delegates to\"| HttpVS[\"HttpVectorStore\"]\n    Consolidation[\"ConsolidationEngine\"] --> Sub\n    Decay[\"decay module\"] --> Sub\n\n    Structured --> SQLite[\"SQLite (r2d2 pool)\"]\n    Semantic --> SQLite\n    KG --> SQLite\n    Session --> SQLite\n    Usage --> SQLite\n    Prompt --> SQLite\n    Idem --> SQLite\n```\n\n## Core Type: `MemorySubstrate`\n\n`MemorySubstrate` (in `substrate.rs`) is the central facade. It holds the `r2d2::Pool<SqliteConnectionManager>` and exposes methods for every subsystem: KV get/set, session save/load, task queue operations, memory recall, consolidation, and agent removal. It is `Clone`-safe (the pool is `Arc`-wrapped internally).\n\nCreate an in-memory instance for testing:\n\n```rust\nlet substrate = MemorySubstrate::open_in_memory();\n```\n\nThe kernel creates a file-backed instance at startup, running `migration::run_migrations` on the connection before serving requests.\n\n## Storage Subsystems\n\n### Structured Store (`structured.rs`)\n\nPer-agent key-value storage. Keys are scoped to an `(agent_id, key)` pair with versioning. Namespace ACL guards (`namespace_acl.rs`) control which key prefixes an external caller can read or mutate.\n\n### Semantic Store (`semantic.rs` — `SqliteVectorStore`)\n\nText-based memory search. Stores memory records in the `memories` table with optional embedding BLOBs (LE `f32` arrays). Supports:\n\n- **Recall**: Retrieve memories by agent, ordered by confidence and recency\n- **Insert with embedding**: Store a content string alongside its vector embedding\n- **LIKE-based fallback search**: When no vector backend is available\n\nImplements the `VectorStore` trait from `librefang-types`.\n\n### HTTP Vector Store (`http_vector_store.rs`)\n\nA `VectorStore` implementation that delegates to a remote HTTP service (e.g., Qdrant, Weaviate). All operations are async via `reqwest`:\n\n| Endpoint | Method | Purpose |\n|---|---|---|\n| `/insert` | POST | Store an embedding with payload and metadata |\n| `/search` | POST | Nearest-neighbour search |\n| `/delete` | DELETE | Remove an embedding by ID |\n| `/get_embeddings` | POST | Batch-fetch embeddings by ID |\n\nConstructed with `HttpVectorStore::new(\"http://host:port/path\")` — trailing slashes are stripped automatically.\n\n### Knowledge Graph (`knowledge.rs`)\n\n`KnowledgeStore` manages entities and relations in SQLite. Key methods:\n\n- **`add_entity(entity, agent_id)`** — Upsert an entity (generates a UUID if `id` is empty)\n- **`add_relation(relation, agent_id)`** — Create a typed, weighted edge between two entities\n- **`query_graph(pattern)`** — Pattern-matching query over the `(source, relation, target)` triple\n- **`has_relation(source, relation_type, target)`** — Existence check (matches by ID or name)\n- **`delete_by_agent(agent_id)`** — Remove all entities and relations for an agent (transactional)\n\nRelations can reference entities by **ID or name**. The SQL JOIN in `query_graph` handles both cases, which is important because the MCP tool layer often references entities by name rather than ID.\n\n### Session Store (`session.rs`, `session_store.rs`)\n\nPersists conversation sessions as MessagePack blobs in the `sessions` table. Features:\n\n- **Message count denormalization**: The `message_count` column avoids deserializing the blob for listing (migration v32 backfills this).\n- **Full-text search**: An FTS5 virtual table (`sessions_fts`) indexes session content for text search.\n- **Canonical sessions**: Cross-channel persistent memory via `canonical_sessions` table.\n- **JSONL mirror**: Optional write-ahead log for session content.\n\n### Prompt Store (`prompt.rs`)\n\nVersioned prompt management with A/B experiment support. Tables: `prompt_versions`, `prompt_experiments`, `prompt_experiment_results`. Experiments track traffic splits and success criteria.\n\n### Usage Tracker (`usage.rs`)\n\nCost and token metering in `usage_events`. Records per-agent, per-model input/output tokens and cost. Supports aggregation queries for dashboards and billing.\n\n### Idempotency Store (`idempotency.rs`)\n\nSQLite-backed cache for HTTP `Idempotency-Key` semantics. Records expire after 24 hours. The lookup path opportunistically prunes expired rows so the table self-trims without a background job.\n\nKey types:\n- `IdempotencyStore` trait — pluggable backend (testable with mocks)\n- `SqliteIdempotencyStore` — production implementation using the shared pool\n- `CachedResponse { status: u16, body: Vec<u8> }` — replayed verbatim on duplicate requests\n\nFirst-writer-wins via `INSERT OR IGNORE`.\n\n### Provider System (`provider.rs`)\n\nPlugin architecture for memory providers. `MemoryManager` holds a registry of `MemoryProvider` implementations (trait with methods like `prefetch`, `notify_turn_complete`). A `NullMemoryProvider` is registered as the built-in default; external providers are registered at startup. Errors in external providers are isolated and logged rather than propagated.\n\n## Memory Lifecycle\n\n### Chunking (`chunker.rs`)\n\nLong documents are split into overlapping chunks before embedding. `chunk_text(text, max_size, overlap)` applies a three-tier splitting strategy:\n\n1. **Paragraph boundaries** (`\\n\\n`)\n2. **Sentence boundaries** (`. `, `.\\n`, `。`, `？`, `！`)\n3. **Hard character limit** (only when a single sentence exceeds `max_size`)\n\nSegments are then greedily packed into chunks with `overlap` characters of context carried forward from the previous chunk. All operations are Unicode-aware (char-based, not byte-based).\n\n### Decay (`decay.rs`)\n\nTime-based soft-deletion based on memory scope and TTL:\n\n| Scope | TTL Config Key | Behavior |\n|---|---|---|\n| `user_memory` | — | **Never decays** (permanent) |\n| `session_memory` | `session_ttl_days` | Soft-deletes after N days of no access |\n| `agent_memory` | `agent_ttl_days` | Soft-deletes after N days of no access |\n\n`run_decay(pool, config)` performs the sweep. Accessing a memory via search/recall resets `accessed_at`, extending the lifetime. Decay writes `deleted = 1` and stamps `deleted_at`; hard removal happens later.\n\n`prune_soft_deleted_memories(pool, older_than_days)` reclaims space by hard-deleting rows that have been soft-deleted for longer than the specified window.\n\n### Consolidation (`consolidation.rs`)\n\n`ConsolidationEngine` runs periodic consolidation cycles:\n\n1. **Confidence decay**: Reduces confidence of memories not accessed in 7 days by `(1 - decay_rate)`, floored at 0.1.\n2. **Duplicate merging**: For each agent, loads active memories sorted by confidence (DESC), then pairwise compares using `text_similarity`. Pairs above 90% similarity are merged:\n   - **Keeper**: Higher-confidence row survives\n   - **Confidence**: `max(keeper, loser)`\n   - **Access count**: Summed (`keeper + loser`)\n   - **Metadata**: JSON union; keeper wins on key conflicts; non-object payloads preserved verbatim\n   - **Embedding**: Running confidence-weighted average (accumulates across multiple losers, not pairwise re-blended)\n   - **Loser**: Soft-deleted (`deleted = 1`)\n\nThe merge runs in a single outer transaction (one fsync) capped at 100 merges per run to avoid O(n²) blowup. Agent isolation is enforced — memories from different agents are never compared or merged.\n\nEmbedding merge edge cases:\n- **Dimension mismatch**: Keeper's embedding preserved verbatim\n- **Keeper has no embedding, loser does**: Asymmetric — keeper adopts loser's vector (better than losing it on soft-delete)\n- **Both absent**: Stays `None`\n\n## Database Schema (`migration.rs`)\n\nThe migration system manages 36 schema versions. Key tables:\n\n| Table | Purpose | Key Indexes |\n|---|---|---|\n| `agents` | Agent registry | PK `id` |\n| `sessions` | Conversation history | `agent_id`, FTS5 via `sessions_fts` |\n| `memories` | Semantic memories | `(deleted, agent_id, confidence DESC, accessed_at DESC)`, `scope` |\n| `entities` | Knowledge graph nodes | `agent_id`, `name` |\n| `relations` | Knowledge graph edges | `source_entity`, `target_entity`, `agent_id` |\n| `kv_store` | Per-agent key-value | PK `(agent_id, key)` |\n| `usage_events` | Cost metering | `(agent_id, timestamp)` |\n| `prompt_versions` | Prompt version history | `UNIQUE(agent_id, version)` |\n| `prompt_experiments` | A/B test definitions | — |\n| `idempotency_keys` | HTTP replay cache | PK `key`, `expires_at` |\n| `audit_entries` | Merkle audit trail | `agent_id`, `timestamp`, `action` |\n| `task_queue` | Async task queue | `(status, priority DESC)` |\n\nSchema version is tracked via `PRAGMA user_version` and a `migrations` audit table. A self-healing pass on boot backfills any missing audit rows. Downgrade is refused — if the binary's `SCHEMA_VERSION` is lower than the database's, migrations fail with a clear error message.\n\n## Connecting to the Rest of the Codebase\n\n- **`librefang-api`** calls `ProactiveMemoryStore` and `MemorySubstrate` from HTTP route handlers (`src/routes/memory.rs`, `src/routes/skills.rs`).\n- **Kernel cron jobs** (`src/kernel/cron_tick.rs`, `src/kernel/cron_compaction.rs`) trigger session saves, decay, and compaction.\n- **`librefang-types`** defines the shared traits (`VectorStore`, `ProactiveMemory`), config structs (`MemoryDecayConfig`, `ChunkConfig`), and error types (`LibreFangError`).\n- **`librefang-runtime`** uses `HttpVectorStore` when the vector backend is a remote service.\n- **Agent removal** (`remove_agent_inner` in `substrate.rs`) cascades deletes across sessions, memories, KV pairs, entities, and relations.\n\n## Key Re-exports from `lib.rs`\n\n```\nMemorySubstrate, SessionStore, ProactiveMemoryStore\nSqliteVectorStore, HttpVectorStore\nMemoryManager, MemoryProvider, MemoryError, NullMemoryProvider\nMemoryNamespaceGuard, NamespaceGate\nPromptStore\n```\n\nPlus all types from `librefang_types::memory`: `MemoryFilter`, `MemoryItem`, `VectorSearchResult`, `ExtractionResult`, etc.","memory-system-librefang-memory-wiki-src":"# Memory System — librefang-memory-wiki-src\n\n# Memory Wiki (`librefang-memory-wiki`)\n\nA durable, file-backed markdown knowledge vault for LibreFang Agent OS. Where the memory substrate (`librefang-memory`) excels at vector similarity search over snippets, this crate provides a navigable knowledge base that agents and humans can read and edit — including inside Obsidian or any Markdown editor.\n\nEvery page carries structured provenance frontmatter so any reader can audit which agent, session, and turn produced a claim.\n\n## Activation\n\nThe vault is **off by default**. Operators opt in through `config.toml`:\n\n```toml\n[memory_wiki]\nenabled = true\nmode = \"isolated\"            # only mode wired in v1\nvault_path = \"~/.librefang/wiki/main\"\nrender_mode = \"native\"       # native | obsidian\ningest_filter = \"tagged\"     # tagged | all (all has no effect in v1)\n```\n\nIf `vault_path` is unset, the vault roots itself under the kernel's `home_dir` (not the environment-derived `LIBREFANG_HOME`), so embedded profiles and tests don't mix data with a developer's personal vault.\n\n## Vault Layout\n\n```text\n<vault_path>/\n  <topic>.md              # one page per topic\n  index.md                # auto-generated alphabetical index\n  _meta/\n    compile-state.json    # mtime + sha256 per page from last compile\n    backlinks.json        # { target -> [source, ...] } from every [[link]]\n```\n\nTopic filenames map 1:1 to topic strings: `widgets.md` holds the `widgets` topic. The `index` topic and any name starting with `_` are reserved.\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[wiki_write caller] -->|topic, body with placeholders, provenance| B[WikiVault::write]\n    B --> C{validate_topic}\n    C -->|ok| D{body size check}\n    D -->|ok| E[acquire write_lock Mutex]\n    E --> F[read existing page]\n    F --> G{detect drift vs compile-state}\n    G -->|drifted, force=false| H[HandEditConflict error]\n    G -->|drifted, force=true| I[preserve external body, append provenance]\n    G -->|no drift| J[rewrite links, use caller body]\n    I --> K[render frontmatter + body to disk]\n    J --> K\n    K --> L[update compile-state.json]\n    L --> M[rebuild index.md + backlinks.json]\n```\n\n## Module Structure\n\n| File | Responsibility |\n|------|---------------|\n| `lib.rs` | Crate-level docs, re-exports of public types |\n| `error.rs` | `WikiError` enum and `WikiResult<T>` alias |\n| `frontmatter.rs` | YAML frontmatter parse/render/split; `Frontmatter` and `ProvenanceEntry` types |\n| `render.rs` | `RenderMode` enum — link rewriting and extraction |\n| `vault.rs` | `WikiVault` — the core read/write/search/backlinks engine |\n\n## Key Types\n\n### `WikiVault`\n\nThe primary entry point. Constructed via `WikiVault::new(config, home_dir)` (which checks `enabled` and rejects unsupported modes) or `WikiVault::with_root(...)` for tests.\n\nAll mutations go through a `Mutex<()`>` write lock, so concurrent `write` calls to the same vault are serialised.\n\n**Public API:**\n\n| Method | Description |\n|--------|-------------|\n| `new(config, home_dir)` | Construct from config; returns `WikiError::Disabled` if not opted in |\n| `with_root(root, render_mode, ingest_filter)` | Bypass enabled-check; used by tests and after kernel validation |\n| `root()` | Vault directory path |\n| `render_mode()` | Active `RenderMode` |\n| `write(topic, body, provenance, force)` | Create or update a page |\n| `get(topic)` | Read a single page |\n| `search(query, limit)` | Substring search across all pages |\n| `backlinks()` | List all `source → target` backlink entries |\n\n### `Frontmatter`\n\nStructured YAML header on every page:\n\n```yaml\n---\ntopic: project-conventions\ncreated: 2026-05-06T10:30:00Z\nupdated: 2026-05-06T11:00:00Z\ncontent_sha256: 6a4f...\nprovenance:\n  - agent: agent_xyz\n    session: sess_abc\n    channel: cli\n    turn: 4\n    at: 2026-05-06T10:30:00Z\n---\n```\n\n`content_sha256` is `Frontmatter::hash_body(body)` — a SHA-256 of the body with its trailing newline stripped. This hash is the drift-detection key: if the on-disk hash differs from what the compiler recorded, a human edited the file externally.\n\nWhen a page has no frontmatter at all (hand-authored in an editor), `Frontmatter::default_for(topic)` synthesises one with `created = updated = now`, empty provenance, and a blank `content_sha256`.\n\n### `ProvenanceEntry`\n\nTracks the origin of eac
