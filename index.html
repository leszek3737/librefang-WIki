at expands to a tool list and derives capabilities\n- `tool_allowlist` / `tool_blocklist` ŌĆö fine-grained tool filtering applied after profile expansion\n- `tools_disabled` ŌĆö nuclear option to disable all tools\n- `exec_policy` ŌĆö per-agent shell execution policy override\n\n**Workspaces**\n- `workspace` ŌĆö private agent directory (auto-created on spawn)\n- `workspaces` ŌĆö map of named `WorkspaceDecl` entries for shared directories\n- `generate_identity_files` ŌĆö whether to create `SOUL.md`, `USER.md`, etc.\n\n**Resource Limits** (`ResourceQuota`)\n- `max_memory_bytes` (256 MB default), `max_cpu_time_ms` (30s default)\n- `max_tool_calls_per_minute` (60), `max_llm_tokens_per_hour` (inherits global default)\n- `max_cost_per_hour_usd`, `max_cost_per_day_usd`, `max_cost_per_month_usd` ŌĆö cost controls (0.0 = unlimited)\n\n**Autonomous Operation** (`AutonomousConfig`)\n- `max_iterations` ŌĆö LLM loop cap per invocation (default: 50)\n- `max_restarts` ŌĆö crash recovery limit\n- `heartbeat_interval_secs`, `heartbeat_timeout_secs` ŌĆö liveness monitoring\n- `quiet_hours` ŌĆö cron expression for downtime windows\n\n**Advanced Features**\n- `auto_dream_enabled`, `auto_dream_min_hours`, `auto_dream_min_sessions` ŌĆö background memory consolidation\n- `auto_evolve` ŌĆö post-turn skill evolution review\n- `web_search_augmentation` ŌĆö automatic web search injection for non-tool-calling models (`Off`, `Auto`, `Always`)\n- `show_progress` ŌĆö surface tool execution markers in channel replies\n- `cache_context` ŌĆö read `context.md` once vs. every turn\n\n### `ModelConfig` Notes\n\nThe `model` field accepts both `model` and `name` as TOML keys (via `#[serde(alias = \"name\")]`) for backward compatibility. Provider-specific parameters go in `extra_params`, which is flattened into the API request body:\n\n```toml\n[model]\nprovider = \"qwen\"\nmodel = \"qwen3.6\"\nenable_memory = true           # ŌåÆ extra_params\nmemory_max_window = 50         # ŌåÆ extra_params\n```\n\n### `ToolProfile` Expansion\n\nEach profile expands to a concrete tool list and derives implied capabilities:\n\n| Profile | Tools | Network | Shell | Agent Spawn |\n|---|---|---|---|---|\n| `Minimal` | `file_read`, `file_list` | Ō£Ś | Ō£Ś | Ō£Ś |\n| `Coding` | `file_read/write`, `file_list`, `shell_exec`, `web_fetch` | Ō£ō | Ō£ō | Ō£Ś |\n| `Research` | `web_fetch`, `web_search`, `file_read/write` | Ō£ō | Ō£Ś | Ō£Ś |\n| `Messaging` | `agent_send/list`, `channel_send`, `memory_*` | Ō£Ś | Ō£Ś | Ō£ō |\n| `Automation` | All of Coding + Messaging | Ō£ō | Ō£ō | Ō£ō |\n| `Full` / `Custom` | `[\"*\"]` (all tools) | Ō£ō | Ō£ō | Ō£ō |\n\n### Workspace Declarations (`WorkspaceDecl`)\n\nTwo mutually exclusive modes (enforced at kernel boot, not schema level, to allow dashboard hot-reload editing):\n\n- **`path`** ŌĆö relative to `workspaces_dir`, kernel creates if missing\n- **`mount`** ŌĆö absolute host path, must be whitelisted in `config.toml: allowed_mount_roots`\n\nBoth support `mode` = `ReadWrite` (default) or `ReadOnly`.\n\n## Agent Entry (`AgentEntry`)\n\nRuntime snapshot of a registered agent ŌĆö combines the manifest with lifecycle state:\n\n- `state` ŌĆö `Created`, `Running`, `Suspended`, `Terminated`, `Crashed`\n- `mode` ŌĆö `Observe` (no tools), `Assist` (read-only tools only), `Full` (all granted tools)\n- `session_id` ŌĆö currently active session\n- `force_session_wipe` ŌĆö next invocation clears message history (operator action or stuck-loop recovery)\n- `resume_pending` ŌĆö agent interrupted by restart, continues on same transcript\n- `has_processed_message` ŌĆö sticky flag set on first real inbound message; prevents heartbeat monitor from flagging never-worked agents as unresponsive\n\n`AgentMode::filter_tools()` enforces the permission boundary at runtime:\n- `Observe` ŌåÆ empty list\n- `Assist` ŌåÆ only `file_read`, `file_list`, `memory_list`, `memory_recall`, `web_fetch`, `web_search`, `agent_list`\n- `Full` ŌåÆ all tools pass through\n\n## Approval System\n\nControls human-in-the-loop gating for dangerous agent operations.\n\n### Flow\n\n1. Agent attempts a tool call (e.g., `shell_exec`)\n2. Kernel checks `ApprovalPolicy.require_approval` ŌĆö if matched, creates an `ApprovalRequest` and pauses the agent\n3. Request routes to notification targets (configurable per tool pattern, per channel)\n4. Human operator responds with an `ApprovalResponse` containing an `ApprovalDecision`\n5. If `Approved`, the tool executes. If `Denied`/`TimedOut`/`Skipped`, the tool is not executed.\n\n### `ApprovalDecision`\n\n```\nApproved           ŌåÆ proceed\nDenied             ŌåÆ block\nTimedOut           ŌåÆ auto-denied after timeout\nSkipped            ŌåÆ skip tool, agent continues\nModifyAndRetry     ŌåÆ agent retries with human feedback\n```\n\nCustom serialization: simple variants are plain strings; `ModifyAndRetry` is `{\"type\": \"modify_and_retry\", \"feedback\": \"...\"}`.\n\n### `ApprovalPolicy`\n\nKey configuration:\n\n| Field | Default | Purpose |\n|---|---|---|\n| `require_approval` | `[\"shell_exec\", \"file_write\", \"file_delete\", \"apply_patch\", \"skill_evolve_*\"]` | Tools requiring human approval |\n| `timeout_secs` | 60 | Auto-deny window (10ŌĆō300 range) |\n| `auto_approve` | `false` | Shorthand: clears require list |\n| `timeout_fallback` | `Deny` | Behavior on timeout: `Deny`, `Skip`, or `Escalate` |\n| `trusted_senders` | `[]` | User IDs that bypass approval |\n| `channel_rules` | `[]` | Per-channel allow/deny tool lists |\n| `second_factor` | `None` | TOTP enforcement scope |\n| `totp_tools` | `[]` | Tools requiring TOTP (empty = all approved tools) |\n| `audit_retention_days` | 90 | Approval audit log pruning |\n\nThe `require_approval` field accepts both a string list and a boolean shorthand in TOML:\n\n```toml\nrequire_approval = false          # ŌåÆ empty list (no tools gated)\nrequire_approval = true           # ŌåÆ default mutation set\nrequire_approval = [\"shell_exec\"] # ŌåÆ explicit list\n```\n\n### `ChannelToolRule`\n\nPer-channel tool authorization with deny-wins semantics:\n\n```toml\n[[channel_rules]]\nchannel = \"telegram\"\nallowed_tools = [\"file_read\", \"web_search\"]\ndenied_tools = [\"shell_exec\"]\n```\n\nTool names support glob patterns (`\"file_*\"`, `\"*_read\"`, `\"*\"`). `denied_tools` takes precedence over `allowed_tools`.\n\n### `TimeoutFallback`\n\n- `Deny` ŌĆö reject on timeout (default)\n- `Skip` ŌĆö skip the tool, agent continues without it\n- `Escalate { extra_timeout_secs }` ŌĆö extend timeout and re-notify (up to 3 escalation cycles)\n\n### Second Factor (`SecondFactor`)\n\n| Value | Login TOTP | Approval TOTP |\n|---|---|---|\n| `None` | Ō£Ś | Ō£Ś |\n| `Totp` | Ō£Ś | Ō£ō |\n| `Login` | Ō£ō | Ō£Ś |\n| `Both` | Ō£ō | Ō£ō |\n\nA grace period (`totp_grace_period_secs`, default 300s, max 3600s) allows subsequent approvals within the window to skip TOTP re-verification.\n\n### Notification Routing\n\n`ApprovalRoutingRule` maps tool patterns to specific notification targets:\n\n```toml\n[[routing]]\ntool_pattern = \"shell_*\"\nroute_to = [{ channel_type = \"telegram\", recipient = \"-1001234567890\" }]\n```\n\n`AgentNotificationRule` provides per-agent-name-pattern overrides with event type filtering.\n\n### Validation\n\nBoth `ApprovalRequest` and `ApprovalPolicy` expose `validate()` methods that enforce length limits, character constraints, and range bounds. Call these at deserialization boundaries to reject malformed input early.\n\n## Serialization Compatibility\n\nThe crate uses several custom serde helpers from `crate::serde_compat`:\n\n- `vec_lenient` ŌĆö accepts both arrays and missing fields (defaults to empty vec)\n- `map_lenient` ŌĆö same for maps\n- `exec_policy_lenient` ŌĆö accepts string shorthand or full table for exec policy\n\nAll enum variants use `#[serde(rename_all = \"snake_case\")]` for consistent wire format.\n\n## Constants That Must Never Change\n\n| Constant | Location | Reason |\n|---|---|---|\n| `LIBREFANG_USER_NAMESPACE` | `agent.rs` | Rotates every `UserId`, breaks audit correlation |\n| `AgentId::NAMESPACE` | `agent.rs` | Rotates every `AgentId`, breaks session/cron associations |\n| `CHANNEL_SESSION_NAMESPACE` | `agent.rs` | Rotates channel session IDs |\n| `CRON_RUN_SESSION_NAMESPACE` | `agent.rs` | Rotates per-fire cron session IDs |","skills-extensions-librefang-extensions-src":"# Skills & Extensions ŌĆö librefang-extensions-src\n\n# librefang-extensions\n\nMCP server catalog, credential vault, OAuth2 PKCE flows, health monitoring, and installation logic for LibreFang. This crate is the bridge between the upstream registry (template definitions) and the kernel's running MCP server instances.\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Disk\"\n        CAT[\"~/.librefang/mcp/catalog/*.toml\"]\n        VAULT[\"~/.librefang/vault.enc\"]\n        DOTENV[\"~/.librefang/.env\"]\n        SECRETS[\"~/.librefang/secrets.env\"]\n        CONFIG[\"~/.librefang/config.toml\"]\n    end\n\n    subgraph \"librefang-extensions\"\n        MC[\"McpCatalog<br/>(read-only templates)\"]\n        CR[\"CredentialResolver<br/>(priority chain)\"]\n        CV[\"CredentialVault<br/>(AES-256-GCM)\"]\n        HM[\"HealthMonitor<br/>(DashMap + backoff)\"]\n        INST[\"install_integration()<br/>(pure transform)\"]\n        OA[\"OAuth PKCE<br/>(localhost callback)\"]\n        DE[\"dotenv loader<br/>(process env)\"]\n    end\n\n    subgraph \"Consumers\"\n        KERNEL[\"librefang-kernel\"]\n        CLI[\"librefang-cli\"]\n        API[\"librefang-api\"]\n    end\n\n    CAT --> MC\n    VAULT --> CV\n    MC --> INST\n    CR --> INST\n    CV --> CR\n    DOTENV --> CR\n    INST -->|McpServerConfigEntry| CONFIG\n    OA -->|OAuthTokens| CV\n    CV --> DE\n    DE -->|std::env| KERNEL\n    HM --> KERNEL\n    KERNEL --> CV\n    CLI --> CV\n    API --> CV\n    API --> INST\n```\n\n## Core Types (`lib.rs`)\n\nAll shared types live at the crate root. The key ones:\n\n| Type | Purpose |\n|------|---------|\n| `McpCatalogEntry` | A template definition from the registry ŌĆö id, name, transport, required credentials, OAuth config, i18n overrides |\n| `McpCatalogTransport` | Transport template: `Stdio`, `Sse`, or `Http` (mirrors `McpTransportEntry` without the `HttpCompat` variant) |\n| `McpStatus` | Lifecycle state: `Available` ŌåÆ `Setup` ŌåÆ `Ready`, or `Error(String)`, or `Disabled` |\n| `McpCategory` | Browsing category: `DevTools`, `Productivity`, `Communication`, `Data`, `Cloud`, `AI` |\n| `OAuthTemplate` | Provider, scopes, auth/token URLs for PKCE flows |\n| `ExtensionError` | Unified error enum ŌĆö `NotFound`, `VaultLocked`, `OAuth(String)`, `Io`, etc. |\n\n`McpCatalogEntry` supports i18n overrides via an `i18n: HashMap<String, McpCatalogI18n>` field keyed by BCP-47 tag. The API routes resolve `Accept-Language` against this table and fall back to the top-level English fields.\n\n## MCP Catalog (`catalog`)\n\n`McpCatalog` is an in-memory, read-only view of TOML template files under `~/.librefang/mcp/catalog/`. The upstream `librefang-runtime::registry_sync` refreshes these files from the registry; this module only reads them.\n\nTwo disk layouts are supported:\n\n- **Flat**: `<id>.toml` ŌĆö ID extracted from filename\n- **Directory**: `<id>/MCP.toml` ŌĆö ID from directory name (for multi-file MCP packages)\n\n`McpCatalog::load()` performs a full reload (clears existing entries first) and returns the count loaded. Parse failures are warned and skipped. Query methods:\n\n- `get(id)` ŌĆö direct lookup\n- `list()` ŌĆö all entries sorted by ID\n- `list_by_category(category)` ŌĆö filtered by `McpCategory`\n- `search(query)` ŌĆö case-insensitive substring match on id, name, description, and tags\n\nThe catalog is **not** the source of truth for installed servers. Installed servers are `[[mcp_servers]]` entries in `config.toml`, optionally with a `template_id` pointing back to a catalog entry.\n\n## Credential Resolution Chain\n\nCredentials are resolved through a priority chain in `CredentialResolver`:\n\n```text\n1. Encrypted vault (~/.librefang/vault.enc)\n2. Dotenv file (~/.librefang/.env)\n3. Process environment variable\n4. Interactive prompt (CLI only, when enabled)\n```\n\nEach source is tried in order; the first hit wins. All returned values are wrapped in `Zeroizing<String>`.\n\nKey methods:\n\n- **`resolve(key)`** ŌĆö returns `Option<Zeroizing<String>>` trying all sources\n- **`has_credential(key)`** ŌĆö checks availability without prompting\n- **`resolve_all(keys)`** ŌĆö batch resolution returning `HashMap<String, Zeroizing<String>>`\n- **`missing_credentials(keys)`** ŌĆö returns which keys have no value in any source\n- **`store_in_vault(key, value)`** ŌĆö persists a credential to the vault (if configured)\n- **`clear_dotenv_cache(key)`** ŌĆö evicts a stale entry from the boot-time `.env` snapshot (used after dashboard deletion)\n\nThe resolver accepts an optional `CredentialVault` and optional `.env` path at construction. Interactive prompting is opt-in via `.with_interactive(true)`.\n\n## Credential Vault (`vault`)\n\nAES-256-GCM encrypted storage at `~/.librefang/vault.enc`. Secrets are serialized as JSON, encrypted with a key derived via Argon2id from a master key + random salt.\n\n### Master key resolution\n\n```text\n1. Cached key (from prior unlock/init ŌĆö avoids keyring race in parallel tests)\n2. LIBREFANG_VAULT_KEY env var\n3. OS keyring (Windows Credential Manager / macOS Keychain / Linux Secret Service)\n4. File-based AES-256-GCM wrapped store at <data_local_dir>/librefang/.keyring\n```\n\nThe env var takes precedence over the OS keyring to support CI/headless deployments where the env var is the intended source of truth.\n\n### OS keyring behavior\n\nThe OS keyring is used by default on Linux and Windows. On macOS it is **disabled by default** (`default_use_os_keyring_for_platform()` returns `false`) because the Keychain ACL is bound to the per-binary code signature ŌĆö every `cargo build` invalidates the ACL and triggers another permission prompt. Override at three levels:\n\n1. **Config**: `VaultConfig.use_os_keyring` ŌåÆ `CredentialVault::init_with_config()`\n2. **Env var**: `LIBREFANG_VAULT_NO_KEYRING=1` (always wins)\n3. **Platform default**: disabled on macOS, enabled elsewhere\n\nWhen the OS keyring is unavailable or disabled, the master key is stored in a file wrapped with AES-256-GCM using a key derived from a machine fingerprint (`SHA-512` of domain-tagged OS identifiers).\n\n### On-disk format\n\nThe vault file starts with a 4-byte magic `OFV1`, followed by a JSON `VaultFile` containing:\n\n- `version` (always 1)\n- `salt` ŌĆö Argon2id salt (base64)\n- `nonce` ŌĆö AES-GCM nonce (base64)\n- `ciphertext` ŌĆö encrypted entries (base64)\n- `schema_version` ŌĆö AAD schema version (0 = legacy path-only, 1 = version + path)\n\nThe AAD binds the ciphertext to the vault file path, preventing file-swap attacks. Version 0 (legacy) uses path-only AAD for backward compatibility; `save()` always writes schema version 1.\n\n### Keyring file migration\n\nThe file-based keyring store is at version 3. Version 2 files (pre-#4159, derived wrap key from raw `random_id`) are auto-migrated to version 3 on first successful decrypt. The v2 read path will be removed after two release cycles.\n\n### Lifecycle\n\n```rust\nlet mut vault = CredentialVault::new(path);\nvault.init()?;            // generate key, create vault.enc\n// ... later ...\nvault.unlock()?;          // decrypt into memory\nvault.set(\"KEY\".into(), Zeroizing::new(\"secret\".into()))?;  // encrypt + save\nlet val = vault.get(\"KEY\");  // returns Option<Zeroizing<String>>\n```\n\n`Drop` clears all in-memory entries and the cached key. All writes use atomic rename (`.tmp` ŌåÆ final) with 0600 permissions on Unix.\n\n## Process-wide Dotenv Loading (`dotenv`)\n\n`dotenv::load_dotenv()` is called once from synchronous `main()` **before** spawning any tokio runtime. It loads secrets into `std::env` in this priority order (highest first):\n\n```text\n1. System environment variables (never overridden)\n2. Credential vault (vault.enc ŌåÆ unlock ŌåÆ inject into env)\n3. ~/.librefang/.env\n4. ~/.librefang/secrets.env\n```\n\nA `Once` gate makes repeated calls safe no-ops. The vault is unlocked silently; failures are printed to stderr (no tracing subscriber exists yet).\n\n**Thread safety**: `std::env::set_var` is UB once other threads exist. This function must be called before the tokio runtime starts.\n\n### File management\n\n- `save_env_key(key, value)` ŌĆö upsert into `.env` with atomic write, also sets in process env\n- `remove_env_key(key)` ŌĆö remove from `.env` and process env\n- `list_env_keys()` ŌĆö key names only (no values)\n- `env_file_exists()` ŌĆö existence check\n\nValues containing special characters (spaces, `#`, `\"`, `\\`, newlines, `\\r`, `'`, `=`) are automatically double-quoted with escape sequences on write. Single-quoted values are treated as literals; double-quoted values support `\\n`, `\\r`, `\\\"`, `\\\\` escapes.\n\n## OAuth2 PKCE (`oauth`)\n\n`run_pkce_flow()` implements the complete Authorization Code flow with PKCE for Google, GitHub, Microsoft, and Slack:\n\n1. Generate PKCE verifier + S256 challenge\n2. Bind a random localhost port, build HMAC-signed state token\n3. Open browser to authorization URL\n4. Wait for callback on `/callback` with 5-minute timeout\n5. Exchange authorization code for tokens via POST to token endpoint\n\n### State token security (#3791)\n\nState tokens are HMAC-signed and bind the flow to `(provider, client_id, redirect_uri, nonce, expiry)`. The HMAC key is a per-process random 32-byte value (re-seeded on every daemon restart). Verification checks:\n\n- Valid HMAC signature (constant-time comparison)\n- Non-expired payload (10-minute TTL)\n- Provider, client_id, and redirect_uri match the expected values\n- Nonce matches the in-process value\n- Only the first valid callback wins (subsequent replays are rejected)\n\nClient IDs default to placeholder values; override them via `OAuthConfig` in `config.toml`.\n\n## Health Monitor (`health`)\n\n`HealthMonitor` tracks the status of configured MCP servers using a `DashMap<String, McpHealth>` for concurrent access from background tasks.\n\nEach `McpHealth` record tracks: status, tool count, last-ok timestamp, last error, consecutive failures, reconnect state, and connected-since time.\n\n### Auto-reconnect\n\nExponential backoff: 5s ŌåÆ 10s ŌåÆ 20s ŌåÆ 40s ŌåÆ ... ŌåÆ capped at 300s (5 minutes). Maximum 10 reconnect attempts by default. Configurable via `HealthMonitorConfig`:\n\n```rust\nHealthMonitorConfig {\n    auto_reconnect: true,\n    max_reconnect_attempts: 10,\n    max_backoff_secs: 300,\n    check_interval_secs: 60,\n}\n```\n\nA healthy `report_ok()` resets consecutive failures and reconnect attempts. `should_reconnect(id)` returns true only when the status is `Error` and attempts remain.\n\n## Installer (`installer`)\n\n`install_integration()` is a **pure transform** ŌĆö no side effects. It takes a catalog template ID and optional credential map, and returns an `InstallResult` containing:\n\n- The `McpServerConfigEntry` to persist into `config.toml`\n- Final status (`Ready` if all credentials present, `Setup` if missing)\n- List of missing credential names\n- User-facing message\n\nThe caller (API route or CLI command) is responsible for writing the entry to config and triggering a kernel reload.\n\n`catalog_entry_to_mcp_server()` maps the template's transport, required env vars, and OAuth config into a `McpServerConfigEntry` with `template_id` set for traceability.\n\n### Scaffolding\n\n- `scaffold_integration(dir)` ŌĆö generates a starter `mcp.toml` template for custom MCP servers\n- `scaffold_skill(dir)` ŌĆö generates `skill.toml` + `SKILL.md` for custom skills\n\n## HTTP Client (`http_client`)\n\n`client_builder()` returns a `reqwest::ClientBuilder` configured with:\n\n- Native CA roots (via `rustls-native-certs`) with webpki fallback\n- `aws-lc-rs` TLS provider\n- 10s connect timeout, 30s read timeout\n- Maximum 5 redirects\n- No client auth\n\n`new_client()` builds the client (panics on failure, which should never happen with bundled roots).\n\n## File Layout\n\n```text\n~/.librefang/\nŌö£ŌöĆŌöĆ config.toml              # [[mcp_servers]] ŌĆö installed servers\nŌö£ŌöĆŌöĆ vault.enc                # AES-256-GCM encrypted secrets\nŌö£ŌöĆŌöĆ .env                     # User-managed env vars\nŌö£ŌöĆŌöĆ secrets.env              # Additional secrets file\nŌööŌöĆŌöĆ mcp/catalog/             # Registry templates (read-only)\n    Ōö£ŌöĆŌöĆ github.toml\n    Ōö£ŌöĆŌöĆ slack.toml\n    ŌööŌöĆŌöĆ ...\n\n<data_local_dir>/librefang/\nŌööŌöĆŌöĆ .keyring                 # File-based master key store (when OS keyring unavailable)\n```\n\n## Integration Points\n\n**Incoming** (who calls this crate):\n\n| Caller | What |\n|--------|------|\n| `librefang-cli` | `vault init/set/remove/list`, `mcp add`, startup dotenv load |\n| `librefang-kernel` | `vault unlock/get/set` for MCP OAuth tokens, `HealthMonitor` for connection tracking |\n| `librefang-api` | `vault unlock/get` for dashboard auth, `install_integration` for the skills API |\n| TUI init wizard | `vault init`, `vault.exists()` to gate setup steps |\n| All binaries | `dotenv::load_dotenv()` from synchronous main |\n\n**Outgoing** (what this crate depends on):\n\n| Dependency | Usage |\n|------------|-------|\n| `librefang-types` | `McpServerConfigEntry`, `McpTransportEntry`, `McpOAuthConfig`, `OAuthTokens`, `OAuthConfig` |\n| `librefang-runtime` | `registry_sync::resolve_home_dir_for_tests()` for test setup |\n\n## Security Notes\n\n- All secret values use `Zeroizing<String>` or `Zeroizing<[u8; 32]>` for automatic memory zeroing on drop\n- Vault files are written with 0600 permissions via atomic rename\n- AES-256-GCM AAD binds ciphertext to the vault file path, preventing file-swap attacks\n- OAuth state tokens are HMAC-SHA256 signed with a per-process key, preventing cross-flow code injection\n- The vault's cached master key avoids repeated keyring queries, which reduces exposure to keyring race conditions in parallel environments\n- `LIBREFANG_VAULT_KEY` env var takes precedence over the keyring for deterministic CI behavior","skills-extensions-librefang-skills-src":"# Skills & Extensions ŌĆö librefang-skills-src\n\n# librefang-skills\n\nSkill lifecycle management for LibreFang ŌĆö marketplace installation, agent-driven evolution, configuration injection, and security scanning.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph \"External Sources\"\n        CH[ClawHub API]\n        COS[Skillhub COS]\n        LOCAL[Local Workspace]\n    end\n\n    subgraph \"Installation Pipeline\"\n        SEARCH[ClawHubClient<br/>search / browse / install]\n        DL[Download + SHA256 verify]\n        CONVERT[Format Detection<br/>SKILL.md / package.json ŌåÆ skill.toml]\n        SCAN[Security Scan<br/>manifest + prompt injection]\n    end\n\n    subgraph \"Runtime\"\n        REG[SkillRegistry<br/>load / reload / freeze]\n        LOADER[Tool Execution<br/>shell / node / python]\n        INJECT[Config Injection<br/>config_vars ŌåÆ system prompt]\n    end\n\n    subgraph \"Evolution\"\n        EVO[Evolution API<br/>create / update / patch / rollback]\n        FUZZY[Fuzzy Matching<br/>6-strategy find-and-replace]\n        LOCK[File Locking<br/>per-skill flock]\n        ATOMIC[Atomic Writes<br/>temp + rename]\n    end\n\n    CH --> SEARCH --> DL --> CONVERT --> SCAN --> REG\n    COS --> DL\n    LOCAL --> REG\n    REG --> LOADER\n    REG --> INJECT\n    REG --> EVO\n    EVO --> FUZZY\n    EVO --> LOCK\n    EVO --> ATOMIC\n```\n\n---\n\n## Module Structure\n\n| File | Responsibility |\n|---|---|\n| `clawhub.rs` | ClawHub marketplace client ŌĆö search, browse, download, install |\n| `config_injection.rs` | Collect and resolve skill-declared config variables into the system prompt |\n| `evolution.rs` | Agent-driven skill creation, fuzzy patching, version history, rollback |\n| `openclaw_compat.rs` | SKILL.md / package.json format detection and conversion to `skill.toml` |\n| `verify.rs` | Security scanning ŌĆö manifest validation and prompt injection detection |\n| `registry.rs` | `SkillRegistry` ŌĆö load, reload, freeze, query installed skills |\n| `loader.rs` | Tool dispatch ŌĆö execute shell, Node.js, and Python skill runtimes |\n| `publish.rs` | Manifest validation for skill publishing |\n\n---\n\n## ClawHub Marketplace Client\n\n### `ClawHubClient`\n\nHTTP client for the [ClawHub API](https://clawhub.ai/api/v1/) (3,000+ community skills). All API calls go through `get_with_retry`, which handles rate-limiting (429) and server errors (5xx) with exponential backoff capped at 30 seconds, respecting the `Retry-After` header when present.\n\n```rust\nlet client = ClawHubClient::new(PathBuf::from(\"/tmp/cache\"));\n```\n\n**Constructor options:**\n\n| Method | Behavior |\n|---|---|\n| `ClawHubClient::new(cache_dir)` | Connects to `https://clawhub.ai/api/v1` |\n| `ClawHubClient::with_url(base_url, cache_dir)` | Custom API URL (for testing or self-hosted registries) |\n\nTLS verification can be disabled by setting `LIBREFANG_DANGEROUSLY_SKIP_TLS_VERIFICATION=true` or `1` ŌĆö intended exclusively for development against servers with expired certificates.\n\n### API Methods\n\n| Method | Endpoint | Returns |\n|---|---|---|\n| `search(query, limit)` | `GET /api/v1/search?q=...&limit=N` | `ClawHubSearchResponse` (key: `results`) |\n| `browse(sort, limit, cursor)` | `GET /api/v1/skills?sort=...&limit=N&cursor=...` | `ClawHubBrowseResponse` (key: `items`) |\n| `get_skill(slug)` | `GET /api/v1/skills/{slug}` | `ClawHubSkillDetail` |\n| `get_file(slug, path)` | `GET /api/v1/skills/{slug}/file?path=...` | Raw file content as `String` |\n| `install(slug, target_dir)` | `GET /api/v1/download?slug=...` ŌåÆ security pipeline | `ClawHubInstallResult` |\n| `install_from_bytes(slug, target_dir, bytes)` | Same pipeline, caller-provided bytes | `ClawHubInstallResult` |\n| `is_installed(slug, skills_dir)` | Filesystem check | `bool` |\n\n**Sort options** (`ClawHubSort` enum): `Trending`, `Updated`, `Downloads`, `Stars`, `Rating`.\n\n### Installation Pipeline\n\n`install()` and `install_from_bytes()` share a core pipeline via `install_with_expected_sha256()`:\n\n1. **Fetch detail** ŌĆö best-effort `get_skill(slug)` to obtain `expected_sha256` from the registry\n2. **SHA256 validation** ŌĆö if the registry provided a hash, mismatch returns `SkillError::SecurityBlocked` immediately (fail-fast on supply-chain tampering, issue #3827)\n3. **Format detection** ŌĆö SKILL.md (starts with `---`), zip archive (magic bytes `PK`), or package.json\n4. **Extraction** ŌĆö zip entries are path-sanitized via `resolve_skill_child_path` (rejects absolute paths, `..` components)\n5. **Conversion** ŌĆö SKILL.md ŌåÆ `skill.toml` via `openclaw_compat::convert_skillmd`; package.json ŌåÆ `openclaw_compat::convert_openclaw_skill`\n6. **Prompt injection scan** ŌĆö `SkillVerifier::scan_prompt_content()`; critical-severity findings block installation\n7. **Binary dependency check** ŌĆö `which_check()` for each required binary; missing binaries produce warnings\n8. **Manifest security scan** ŌĆö `SkillVerifier::security_scan()`\n9. **Atomic promotion** ŌĆö extraction happens in a `.staging-{slug}-{pid}-{counter}` directory, then `rename()` to the final location\n\nThe staging directory uses a process-local `AtomicU64` counter (plus pid and nanosecond timestamp) so concurrent installs never collide.\n\n### Slug Validation\n\nAll slug-accepting methods call `validate_slug()`, which requires non-empty ASCII alphanumeric strings with hyphens and underscores only. This prevents path traversal through the slug parameter.\n\n### Backward-Compatible Aliases\n\n```rust\npub type ClawHubListResponse = ClawHubBrowseResponse;\npub type ClawHubSearchResults = ClawHubSearchResponse;\npub type ClawHubEntry = ClawHubBrowseEntry;\n```\n\nThese exist for callers written against older API names.\n\n---\n\n## Config Injection\n\nSkills declare configuration dependencies in their `skill.toml`:\n\n```toml\n[[config_vars]]\nkey = \"wiki.base_url\"\ndescription = \"Base URL of the internal wiki\"\ndefault = \"https://wiki.example.com\"\n```\n\n### Resolution Flow\n\n1. **`collect_config_vars(skills)`** ŌĆö gathers all `[[config_vars]]` from enabled skills, deduplicating by key (first declaration wins). Skips incomplete entries (empty key or description) and disabled skills.\n\n2. **`resolve_config_vars(vars, config_toml)`** ŌĆö walks the config TOML tree at the path `skills.config.<logical-key>`. Falls back to the declared `default`. Omits entries with neither a config value nor a default (avoids injecting empty strings).\n\n3. **`format_config_section(resolved)`** ŌĆö formats resolved pairs as a system-prompt section:\n\n```\n## Skill Config Variables\nwiki.base_url = https://wiki.corp.example.com\ndb.host = localhost\n```\n\nReturns an empty string when `resolved` is empty, so callers can cheaply skip injection with an `is_empty()` check.\n\n### Storage Convention\n\nA logical key `wiki.base_url` is stored in `~/.librefang/config.toml` as:\n\n```toml\n[skills.config.wiki]\nbase_url = \"https://wiki.corp.example.com\"\n```\n\nThe dotted logical key maps to nested TOML tables: `skills` ŌåÆ `config` ŌåÆ `wiki` ŌåÆ `base_url`.\n\n---\n\n## Skill Evolution\n\nAgent-driven skill creation and mutation with version history, rollback, and concurrency safety.\n\n### Concurrency Model\n\nAll mutation operations acquire a **per-skill exclusive file lock** via `acquire_skill_lock()`. Lock files live at `{skills_dir}/.evolution-locks/{skill_name}.lock` ŌĆö outside the skill directory itself, so `remove_dir_all()` doesn't conflict with the open lock handle on Windows.\n\nThe lock uses `fs2::FileExt::lock_exclusive()` (flock on Unix, LockFileEx on Windows).\n\n### Atomic Writes\n\n`atomic_write(path, content)` writes to a temp file then `rename()`s it into place. Temp filenames incorporate pid, thread id, a monotonic `AtomicU64` counter, and a nanosecond timestamp for collision resistance even under concurrent callers.\n\n### Core Operations\n\n| Function | Purpose | Version bump |\n|---|---|---|\n| `create_skill(skills_dir, name, description, prompt_context, tags, author)` | Create a new PromptOnly skill | Sets `0.1.0` |\n| `update_skill(skill, new_prompt_context, changelog, author)` | Full prompt_context rewrite | Semver patch bump |\n| `patch_skill(skill, old_str, new_str, changelog, replace_all, author)` | Fuzzy find-and-replace | Semver patch bump |\n| `rollback_skill(skill, author)` | Restore previous version | Semver patch bump |\n| `delete_skill(skills_dir, name)` | Delete agent-evolved skill only | N/A |\n| `uninstall_skill(skills_dir, name)` | Delete any installed skill | N/A |\n\nAll operations re-read `skill.toml` from disk **after** acquiring the lock, ensuring the version chain is serial even under concurrent writers.\n\n### Version Management\n\nEach mutation appends a `SkillVersionEntry` to `.evolution.json`:\n\n```json\n{\n  \"versions\": [\n    {\n      \"version\": \"0.1.2\",\n      \"timestamp\": \"2026-03-15T10:30:00+00:00\",\n      \"changelog\": \"Fixed prompt wording [strategy: Exact, matches: 1]\",\n      \"content_hash\": \"a3f2...\",\n      \"author\": \"agent:uuid-here\"\n    }\n  ],\n  \"use_count\": 15,\n  \"evolution_count\": 3,\n  \"mutation_count\": 2\n}\n```\n\n- **`evolution_count`** ŌĆö total entries written including initial creation (may lag `versions.len()` after truncation)\n- **`mutation_count`** ŌĆö post-creation edits only; a freshly-created skill reports `0`\n- **`use_count`** ŌĆö bumped by `record_skill_usage()` after successful tool invocations\n- **History cap** ŌĆö last 10 versions kept (`MAX_VERSION_HISTORY`); oldest entries pruned\n- **Rollback snapshots** ŌĆö stored in `.rollback/` with nanosecond-precision filenames to prevent collision\n\nVersion bumping uses the `semver` crate, correctly handling pre-release tags and build metadata.\n\n### Fuzzy Matching (6 Strategies)\n\n`fuzzy_find_and_replace()` tries strategies in strict-to-loose order. Each strategy reports itself via `MatchStrategy` so agents and dashboards can distinguish exact from approximate matches:\n\n| Priority | Strategy | Description |\n|---|---|---|\n| 1 | `Exact` | Literal substring match |\n| 2 | `LineTrimmed` | Trim each line's leading/trailing whitespace |\n| 3 | `WhitespaceNormalized` | Collapse whitespace runs to single space per line |\n| 4 | `IndentFlexible` | Strip all leading whitespace |\n| 5 | `BlockAnchor` | Match first + last line, require Ōēź60% middle similarity |\n| 6 | `WhitespaceStripped` | Remove all whitespace from both sides, substring match (CJK-friendly) |\n\nEmpty `old_str` is rejected before any strategy runs ŌĆö `content.replace(\"\", new_str)` would corrupt content at every character boundary.\n\nMultiple matches without `replace_all=true` return an error immediately (does not fall through to looser strategies). When all strategies fail, the error includes the closest-matching content lines (character-overlap similarity > 0.3) so agents can self-correct.\n\n### Supporting Files\n\nSkills can manage auxiliary files in four allowed subdirectories: `references/`, `templates/`, `scripts/`, `assets/`.\n\n| Function | Purpose |\n|---|---|\n| `write_supporting_file(skill, rel_path, content)` | Write file Ōēż 1 MiB with path traversal + symlink escape checks |\n| `remove_supporting_file(skill, rel_path)` | Delete file, prune empty ancestor directories |\n| `list_supporting_files(skill)` | Recursively list files per subdirectory (max depth 16) |\n\nBoth write and remove operations acquire the per-skill lock and perform canonical-path containment verification to prevent symlink-based escape attacks. Security scanning runs **before** writing so rejected content doesn't wipe pre-existing files.\n\n### Delete vs. Uninstall\n\n- **`delete_skill`** ŌĆö agent-facing path. Refuses to delete skills with `source` other than `Local` or `Native`. Skills with no `source` field are rejected as unclassified.\n- **`uninstall_skill`** ŌĆö user-facing path (dashboard \"Uninstall\", CLI `librefang skill remove`). Removes any skill regardless of source. Both acquire the per-skill lock and re-check existence under the lock.\n\n### Validation\n\n- **Skill names**: lowercase alphanumeric + hyphens/underscores, 1ŌĆō64 chars, must start with alphanumeric\n- **Prompt content**: max 160,000 characters (~55k tokens); security scan blocks critical-severity injection patterns\n- **Description**: non-empty, max 1024 characters\n- **Supporting file paths**: must start with an allowed subdirectory, no `..` or absolute paths, max 1 MiB\n\n---\n\n## Key Types\n\n### `EvolutionResult`\n\nReturned by all evolution operations. Includes post-operation counters so agents don't need a separate query:\n\n```rust\npub struct EvolutionResult {\n    pub success: bool,\n    pub message: String,\n    pub skill_name: String,\n    pub version: Option<String>,\n    pub match_strategy: Option<MatchStrategy>,  // patch operations only\n    pub match_count: Option<usize>,              // patch operations only\n    pub evolution_count: Option<u64>,\n    pub mutation_count: Option<u64>,\n    pub use_count: Option<u64>,\n}\n```\n\n### `ClawHubInstallResult`\n\n```rust\npub struct ClawHubInstallResult {\n    pub skill_name: String,\n    pub version: String,\n    pub slug: String,\n    pub warnings: Vec<SkillWarning>,\n    pub tool_translations: Vec<(String, String)>,  // OpenClaw ŌåÆ LibreFang name mappings\n    pub is_prompt_only: bool,\n}\n```\n\n### API Response Types\n\nClawHub uses camelCase JSON. Search and browse have different structures:\n\n- **Search** (`ClawHubSearchResponse`): flat entries under `results`, includes `score`\n- **Browse** (`ClawHubBrowseResponse`): richer entries under `items` with nested `stats` and `latestVersion`\n- **Detail** (`ClawHubSkillDetail`): `skill` + `latestVersion` + `owner` + `moderation` + optional `expectedSha256`\n\nAll types use `#[serde(default)]` extensively so missing fields don't break deserialization.\n\n---\n\n## Integration Points\n\n**Called by:**\n- `librefang-runtime/src/tool_runner.rs` ŌĆö evolve tools (create, patch, update, rollback, write_file, remove_file, delete), tool dispatch via `find_tool_provider`\n- `librefang-cli/src/main.rs` ŌĆö `cmd_skill_list`, `cmd_doctor`, `load_installed_skill`\n- `src/routes/skills.rs` ŌĆö marketplace browse/search/install, skill listing, evolve endpoints\n- `src/routes/agents.rs` ŌĆö agent skill attachment via `skill_names`\n- `src/routes/network.rs` ŌĆö MCP tool definitions via `all_tool_definitions`\n- `src/routes/system.rs` ŌĆö tool invocation via `find_tool_provider`\n\n**Depends on:**\n- `librefang-extensions/src/vault.rs` ŌĆö filesystem existence checks\n- `librefang-hands` ŌĆö TLS provider for HTTP client builder\n- `src/config/types.rs` ŌĆö `EnvPassthroughPolicy` for env var filtering in tool execution","skills-extensions":"# Skills & Extensions\n\n# Skills & Extensions\n\nLibreFang's capability layer ŌĆö everything the system can *do* beyond its core kernel lives here. The two sub-modules divide the responsibility between **skill lifecycle** (install, evolve, execute) and **infrastructure services** (credentials, MCP servers, health monitoring) that skills and the broader platform depend on.\n\n## Sub-modules\n\n| Sub-module | Responsibility |\n|---|---|\n| [librefang-skills](librefang-skills-src.md) | Skill marketplace client (ClawHub), format detection, security scanning, runtime registry, tool execution, and agent-driven evolution |\n| [librefang-extensions](librefang-extensions-src.md) | MCP server catalog, AES-256-GCM credential vault, OAuth2 PKCE flows, health monitoring, and dotenv/secrets resolution |\n\n## How they fit together\n\n```mermaid\ngraph LR\n    subgraph librefang-skills\n        CH[ClawHubClient]\n        SCAN[Security Scan]\n        REG[SkillRegistry]\n        EVO[Evolution Engine]\n        LOADER[Tool Execution]\n    end\n\n    subgraph librefang-extensions\n        CAT[McpCatalog]\n        VAULT[CredentialVault]\n        OAUTH[OAuth2 PKCE]\n        HM[Health Monitor]\n    end\n\n    CH -->|install| SCAN -->|register| REG -->|run| LOADER\n    EVO -->|create_skill| VAULT\n    LOADER -->|credential lookup| VAULT\n    CAT -->|template defs| REG\n    HM -->|status checks| CAT\n```\n\n**Skills own the \"what\"** ŌĆö declaring, fetching, sandboxing, and evolving agent capabilities. **Extensions own the \"where and how safely\"** ŌĆö managing encrypted credentials, MCP server templates, and OAuth flows that skills consume at runtime.\n\n## Key cross-cutting workflows\n\n### Skill installation ŌåÆ credential storage\nWhen a skill requires API keys or service tokens, the installation flow in `librefang-skills` (via `ClawHubClient` ŌåÆ security scan ŌåÆ `SkillRegistry`) delegates to `CredentialVault` in `librefang-extensions` to persist secrets under AES-256-GCM encryption. The vault's `exists` check is called during both `create_skill` (evolution) and `detect_skillmd` (OpenClaw compatibility) to verify credential state before proceeding.\n\n### Terminal authentication through the vault\nAPI-level operations like `rename_window` and `delete_window` flow through `authorize_terminal_request` ŌåÆ `resolve_dashboard_credential` ŌåÆ `vault::unlock` ŌåÆ `resolve_master_key`. This chain ensures every privileged action authenticates against the encrypted vault, making `librefang-extensions` the security gatekeeper for skills executed in terminal contexts.\n\n### Tool execution with credential injection\nAt runtime, `SkillManifest` and `SkillTools` in the loader resolve environment variables through `CredentialResolver`'s priority chain (`config.toml` ŌåÆ `.env` ŌåÆ `secrets.env` ŌåÆ vault). The `env_passthrough_allowlist` in `SkillRequirements` controls which variables reach the executing tool, keeping the sandbox tight.\n\n### Agent-driven evolution with vault access\nThe evolution engine (`librefang-skills/src/evolution.rs`) records `SkillVersionEntry` snapshots and calls `create_skill`, which crosses into the vault to check for existing credentials before creating a new evolved skill variant. This ensures evolved skills inherit or safely extend their predecessor's credential configuration."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
